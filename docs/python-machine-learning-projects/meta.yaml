    \ say any manufacturing company, has a plan of developing, implementing and resolving\
    \ its workflow issues. The term JPPS is often used for job process planning and\
    \ scheduling problem. The plan represents a sequence of operations made available\
    \ across machines. These operations tend to produce the items under consideration\
    \ with an assurance of quick, reliable delivery of the products in expected time.\n\
    \n  Production can be categorized into single item and batch production. With\
    \ respect to batch production, the following criteria hold good:\n\n  - The production\
    \ is in a specific order format.\n  - Limited resources are available and used\
    \ for production.\n  - Several products are manufactured at the same time. However,\
    \ a single product is manufactured at a single location, which causes scheduling\
    \ problems:\n    - If orders are received after the scheduling has been completed,\
    \ different tasks are given higher priority.\n    - If orders are cancelled or\
    \ an equipment malfunctions, the entire production needs to be rescheduled.\n\
    \    - If the response batch production is too slow, unpredictable events might\
    \ occur.\n    - Another cause of concern is the time delay between process planning\
    \ and the actual beginning of the plan. The more the delay, the more the plan\
    \ tends to become unworkable. Moreover, fixing the plans can further lead to bottleneck\
    \ situations as dynamic manufacturing environments tend to modify at least 20\
    \ to 30% of all plans.\n    - Yet another issue with is that the production plans\
    \ are made without considering all aspects of production. This results in delivery\
    \ delays, extra costs and low machine utilization.\n\nTherefore, the planning\
    \ and scheduling goals should be integrated to create more realistic plans and\
    \ schedules. This could lead to faster and better response to"

- md: '## 4. Describe the working of the machine learning algorithm.


    **Ans.** The machine learning algorithm is broadly divided into two parts: supervised
    algorithm and unsupervised algorithm. We can further divide the supervised algorithm
    based on the type of problem, like regression and classification.


    Before implementing the algorithm, we need to get the data ready, understand the
    data, remove all outliers, clean the data, perform imputation, normalization,
    divide and split the data into a train and a test set.


    According to the problem, we can apply the algorithm. Suppose we need to predict
    the price of the land. Since this is a regression problem, we need to find all
    the important features of the land, like location, size and nearby market, based
    on all the important features. We can use linear regression or random forest to
    predict the price of the land.


    Suppose we have a problem that needs to be answered with “YES” or “NO”. This is
    typically a classification problem. Here, we can use logistic regression, support
    vector machines, and decision trees to decide the output. We can also go for deep
    learning in case of image classification.


    In unsupervised learning, we usually have the problem of clustering, like in social
    and retail domain problems. We need to cluster the users who have similar kind
    of behavior or purchase history; this help the company determine whom they should
    provide the offer. Most used algorithms are k nearest neighbor, principal vector
    composition and singular vector decomposition.


    ## 5. Elaborate on any two applications of machine learning for industries.


    **Ans.** For better understanding of machine learning, let’s consider the practical
    usage of ML in different domains of the industry:


    **Recommendations:** Machine learning is widely used by e-commerce and entertainment
    companies like Amazon and Netflix for product recommendation to users. Whenever
    we search for some product on Amazon, we start getting advertisements for the
    same product while browsing the internet using the same browser; this is because
    of machine learning.


    Google understands user interest using various machine learning algorithms and
    suggests the product as per customer interest.


    Similarly, when we use Netflix, we find some recommendations for entertainment
    series, movies, and such; this is also done with the help of machine learning.


    **Sentimental Analysis:** Applications of sentiment analysis include campaign
    monitoring, brand monitoring, stock market analysis and compliance monitoring.
    Let’s understand sentiment analysis with the simplest implementation: using a
    word list with scores ranging from +5 (positive) to -5 (negative). For this, let’s
    use the AFINN scored word list. Say one of your customers wrote, “I loved the
    product, but the packaging was not good”. In the AFINN word list, ‘loved’ and
    ‘not good’ have +3 and -2 scores, respectively. If you combine these two scores,
    you will get +1. This means the user sentiment was mildly positive. Again, this
    is the simplest example of sentiment analysis. Complex models combine NLP and
    machine learning algorithms to analyze large pieces of text. According to Amadeus
    IT group, 90% of American travelers with smartphones share their photos and travel
    experience on social media and review services. TripAdvisor gets about 280 reviews
    from travelers every minute. With a large pool of valuable data from 390 million
    unique visitors and 435 million reviews, it analyses this information to enhance
    its service. Machine learning techniques at TripAdvisor focus on analyzing brand-related
    reviews.


    ## 6. Differentiate between machine learning and deep learning.


    **Ans.** While there are many differences between these two subsets of artificial
    intelligence, here are five of the most important ones:


    - **Human Intervention:** Machine learning requires more human intervention to
    get results. On the other hand, deep learning is more complex to set up but requires
    minimal human intervention thereafter.

    - **Hardware:** Machine learning programs tend to be less complex than deep learning
    algorithms and can often run on conventional computers, but deep learning systems
    require far more powerful hardware and resources. This demand for power has meant
    increased use of graphical processing units. GPUs are useful for their high bandwidth
    memory and the ability to hide latency (delays) in memory transfer due to thread
    parallelism (the ability of many operations to run efficiently at the same time).

    - **Time:** Machine learning systems can be set up and operate quickly, but they
    may be limited in the power of their results. Deep learning systems take more
    time to set up but can generate results instantaneously (although the quality
    is likely to improve over time as more data becomes available).

    - **Approach:** Machine learning tends to require structured data and uses traditional
    algorithms like linear regression. Deep learning employs neural networks and is
    built to accommodate large volumes of unstructured data.

    - **Applications:** Machine learning is already in use in your email inbox, bank,
    and doctor’s office. Deep learning technology enables more complex and autonomous
    programs, like self-driving cars or robots that perform surgeries.



  - '[PAGE 180]


    +   1. Based on the reviewer’s opinion, features of an object, topic or event
    from each sentence are identified and then extracted.

    2. The opinion of all the users about the features are determined.


    The opinion, be it positive or negative, is determined based on the features considered.
    This could further provide the users with some insightful information related
    to opinions on a particular topic.


    # Image processing


    It is a method in which input is provided to the system in the form of images.
    These images are then processed to either get an enhanced image or extract some
    useful information from them. It is the process of transforming an image into
    a digital form and performing certain operations to get some useful information
    from it. Fixed sequences of operations are performed at each pixel of an image.
    The image processor performs the first sequence of operations on the image, pixel
    by pixel. Once that is done, a second set of operations are performed. The output
    value can be computed at any pixel of the image. Thus, image processing is a method
    that tends to either enhance the image or gather alerting insights from it. These
    insights can further be fed to an algorithm in order to classify, predict or cluster
    images. The image processing system treats all images as 2D signals where predetermined
    signal processing methods are applied.


    Everyone uses smartphones in their daily lives. With technology, better cameras
    and visual effects are major considerations while buying a new smartphone. Depending
    on the viewpoint and illumination, the human brain can recognize many objects,
    categories and scenes. This is due to the most important sense organ: vision.
    Any vision task fundamentally relies on the ability to recognize objects. So,
    object recognition itself forms a part of recognizing an image, transforming and
    then performing information retrieval on it. Thus, an image has a very important
    role in image processing. Challenging problems in image processing include classifying
    and identifying objects in images. Digital image processing techniques help in
    manipulating these digital images through the use of computers. Thus, image processing
    forms the core part of computer vision and plays a crucial role in many real-world
    examples like robotics, self-driving cars and object detection.


    # Importance of image processing


    Following are the points explaining the importance of image processing:'
  - '[PAGE 181]


    **Image:** Based on the number of pixels, an image is said to be represented by
    its dimensions (height and width). For example, if the dimensions of an image
    are 600 x 400 (width x height), the total number of pixels in the image is 240000.

    The pixel forms a point on the image that takes on a specific shade, opacity or
    color, and is represented as follows:


    +   - **Grayscale:** The pixel is represented as an integer having a value between
    0 and 255, where 0 indicates complete black and 255 specifies complete white.

    - **RGB:** In this, the pixel is made up of 3 integers between 0 and 255. Each
    integer represents the intensity of red, green, and blue colors.

    - **RGBA:** Similar to the RGB, this image representation is an extension of RGB
    with an added alpha field that represents the opacity of the image.


    # Purpose of image processing


    Image processing is divided into five groups based on the purpose:


    +   - **Visualization:** Its purpose is to observe and find the objects that are
    not visible in the image.

    - **Image recognition:** It distinguishes between images or detects objects in
    the image.

    - **Image sharpening and restoration:** Its aim is to create an enhanced image
    from the original image.

    - **Pattern recognition:** It deals with measuring the various patterns around
    the objects in the image.

    - **Image retrieval:** It focuses on browsing and searching images of interest.


    # Basic Image Processing System


    An image processing system has various steps, as shown in *Figure 4.16*:'
  - '[PAGE 182]


    ![](img/05e0d1e671c636fe8ee73a026cd179da_182_0.png)


    Figure 4.16: Basic Image Processing Steps


    +   1. **Image acquisition:** This forms the first step or process in digital
    image processing. It is defined as the action of retrieving an image from some
    source. The image so acquired is a complete raw or unprocessed image. Therefore,
    pre-processing operations like scaling need to be performed on them.


    2. **Image enhancement:** It is a process of adjusting the digital images so that
    the results are suitable for display or further image analysis. The focus is on
    modifying the images so that they are more pleasing to the eyes. As the name suggests,
    the image enhancement techniques aim to bring out the detail that has got obscured
    or highlight certain features of interest in an image. This step includes sharpening
    of images, adjusting the brightness and contrast, removing noise and so on. As
    the features vary from person to person, this step is subjective in nature.


    3. **Image restoration:** The appearance of an image can be improved through the
    image restoration mechanism. However, image restoration is objective in nature
    as compared to the image enhancement step. Thus, it is a process of recovering
    an image that has been degraded by some degraded knowledge function, along with
    addition of noise. These restoration techniques are based on mathematical or probabilistic
    models of image degradation.


    4. **Color image processing:** Color image processing includes processing of colored
    images, either as RGB or indexed images.'
  - "[PAGE 183]\n\n+   5. **Image compression:** Its main aim is to reduce the storage\
    \ required to save an image or the bandwidth to transmit it.\n6. **Morphological\
    \ Processing:** Morphological processing is useful in the representation and description\
    \ of the shape of an image. Basic morphological operations, like dilation and\
    \ erosion, are performed in this step.\n7. **Segmentation:** Segmentation procedures\
    \ partition an image into multiple segments or objects and is the most difficult\
    \ part in image processing.\n8. **Representation and description:** This step\
    \ is divided into two parts: the representation step and the description step:\n\
    \    a. **Representation:** It converts the data into a suitable form for computer\
    \ processing in terms of the following:\n        i. **Boundary representation:**\
    \ It mainly focuses on the external characteristics of the image, such as the\
    \ corners.\n        ii. **Regional representation:** This part focuses on the\
    \ internal characteristics of the image, such as the texture of the image.\n \
    \   b. **Description:** It deals with extracting the attributes that result in\
    \ some quantitative information of interest and distinguishes one object from\
    \ the other.\n        i. **Object recognition:** Based on its descriptors, a label\
    \ can be assigned to an object through the process of object recognition.\n  \
    \      ii. **Knowledge Base:** Knowledge about a problem domain is coded into\
    \ image processing in the form of a knowledge database. This knowledge base can\

    \n**F度量：** F度量（也称F分数）是测试准确性的度量。它考虑了测试的**精确率**和**召回率**来计算分数：\n\n- **精确率**定义为正确正例结果的数量除以预测的正例总数。\n\
    - **召回率**定义为正确正例结果的数量除以实际正例总数。\n\nF1分数试图在精确率和召回率之间找到平衡，如下所示：\n\n**精确率：** 它是正确正例结果的数量除以分类器预测的正例数量：\n\
    \n$精确率 = 真正例/ (真正例 + 假正例)$\n\n**召回率：** 它是正确正例结果的数量除以*所有*相关样本（所有应被识别为正例的样本）的数量：\n\
    \n$召回率 = 真正例/ (真负例 + 假正例)$\n\nF1分数是精确率和召回率的调和平均值。F1分数的范围是[0, 1]。它表示分类器正确分类且未遗漏大量实例的情况。F1分数越大，模型的性能越好。\n\
    \n## 回归指标\n\n回归问题通过平均绝对误差和均方根误差来评估：\n\n- **平均绝对误差（MAE）**定义为预测值与实际值之间绝对差值的总和。\n\
    \  它衡量了预测值与实际输出之间的距离。然而，它们无法提供误差方向的信息，即数据是被低估还是高估。\n- **均方根误差（RMSE）**衡量误差的平均大小。这是通过取预测值与实际观测值之间平方差的平均值的平方根来确定的。\n\
    \  由于取了误差的平方，较大误差的影响比小误差更显著。因此，模型现在可以更关注较大的误差。\n\n## 结论\n\n本章重点介绍了各种基于机器学习的算法，并深入探讨了程序开发的方式。它首先介绍了机器学习建模流程及其预处理的概念。通过回归、分类和聚类算法，进一步阐述了监督学习和无监督学习算法，随后介绍了神经网络和支持向量机算法。通过Python中的各种数据科学库，详细说明了算法需要表示的格式。本章最后通过评估用于给定问题陈述的算法来确定最佳算法。\n\
    下一章将讨论机器学习的应用领域。前几章解释的概念将通过几个案例研究进行阐述。\n\n## 问题\n\n**1. 解释机器学习建模流程中涉及的步骤。**\n\
    **答.** 这种方法涉及六个步骤：\n\n1. 问题识别\n2. 数据整理\n3. 探索性数据分析\n4. 预处理和训练数据开发\n5. 建模\n6. 文档化\n\
    \n**第一步：问题识别**\n这是定义你想解决的问题并确定通过解决该问题你想实现什么的过程。\n**第二步：数据整理**\n数据整理涉及获取原始数据并为其处理和分析做准备。\n\
    **第三步：探索性数据分析**\n**探索性数据分析（EDA）**是一种总结和可视化数据集重要特征和统计属性的方法。\n可视化数据将帮助你理解它，以识别出现的主题。识别这些趋势将帮助你对数据形成假设。\n\
    \n**第四步：预处理和训练数据开发**\n数据预处理是指从数据集中移除超出值范围和不可能组合等内容的过程。这是一个重要的步骤，因为分析未经适当筛选的数据可能导致误导性或不正确的结果。此步骤还包括将数据集拆分为测试和训练子集的过程。\n\
    \n**第五步：建模**\n建模是第五步。在此步骤中，你将利用清理和处理后的数据进行预测性洞察。\n请注意，建模包括模型训练和选择，以及模型部署。\n\n\
    **第六步：文档化**\n表达信息的方式通常与信息本身同样重要，甚至更重要。即使你通过数据分析发现了非常有价值的见解，如果你没有正确地传达你的想法，你可能很难将该见解付诸实践。这就是讲故事的作用所在：当你将你的见解组织成一个好故事并有效地讲述这个故事时，你将更有可能对你正在从事的项目产生积极影响。\n\
    \n**2. 描述机器学习算法的各种类别。**\n**答.** 当谈到机器学习类型的分类学时，一个好的分类将方法分为六个维度：\n\n1. 监督学习与无监督学习\n\
    2. 批量学习与在线学习\n3. 基于实例的学习与基于模型的学习\n\n在监督学习模型中，算法被给予一个带标签的训练数据集，并使用答案键来评估其理解数据的能力。无监督学习模型的特点是算法试图在没有训练的情况下自行理解未标记的数据集。\n\
    \n批量学习：如果系统无法增量学习，必须使用所有可用数据进行训练，则机器学习算法执行批量学习。由于这既需要时间又需要计算能力，学习过程通常在离线进行（这被称为“离线学习”）。系统被训练然后启动；启动后它不会继续学习。如果获得新数据，则需要训练系统的新版本来替换"

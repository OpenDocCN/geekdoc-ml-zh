  mdcn: "使用预处理数据，可以构建模型。各种机器学习模型及其类别包括*图3.3*中所示的模型：\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_80_0.png)\n\
    \n机器学习模型分为以下几类：\n\n## 监督学习\n\n它包括确定映射函数 Y = f(X)，其中 Y 和 X 分别表示输出和输入变量。监督学习分为以下几类：\n\
    \n- **分类**：在此方法中，输出被分为不同的类别。这个输出目标变量被称为分类变量。最重要的分类算法包括K近邻、朴素贝叶斯、决策树/随机森林、支持向量机和逻辑回归，如*图3.3*所示。\n\
    - **回归**：在此方法中，输出被观察为数值型，目标变量被称为连续变量。回归算法包括线性回归、支持向量回归、决策树/随机森林、高斯过程回归和集成方法。\n\
    \n## 无监督学习\n\n在此方法中，未标记、未分类的数据被输入系统。相应的机器学习算法在没有预先训练的情况下作用于这些数据，因此系统的输出取决于编码的算法。无监督学习进一步分为两类：\n\
    \n- **聚类**：在此方法中，具有相似特征的成员被组合在一起。但是，组标签事先未知。用于聚类的方法包括高斯混合模型、K均值聚类、提升法、层次聚类、K均值聚类和谱聚类。\n\
    - **关联**：在此方法中，算法尝试在没有标记数据可用的情况下进行学习。它有助于发现大型数据库中变量之间的有趣关系。使用的方法包括关联规则挖掘以及从关系数据库和数据仓库中挖掘多层次关联规则。\n\
    \n## 在数据上训练和测试模型\n\n为了获得准确的输出，系统的输入和使用的算法都需要恰到好处。为了实现优化的训练模型，数据被分为三部分：\n\n- **训练数据**：分类器使用这些数据进行训练。\n\
    \n直线的方程是 y=mx+b，其中 x 是输入，m 是该直线的斜率，b 是 y 轴截距。由于斜率 m 可以取多个值，斜率可以用“权重”矩阵表示，并且可以有一个与之相关的偏置，如*图3.4*所示：\n\
    \n![](img/05e0d1e671c636fe8ee73a026cd179da_81_0.png)\n\n然后重复此过程。每次更新权重和偏置的迭代或周期称为一个训练“步骤”。当训练开始时，考虑前面的例子，会通过数据绘制一条随机线。随着训练的每一步进展，这条线会逐步移动，越来越接近理想线。整个过程涉及使用两组数据，即验证数据和测试数据，详细说明如下：\n\
    \n- **验证数据**：从训练数据中使用一组未见过的数据来调整分类器的参数。交叉验证用于估计机器学习模型在未见数据上的能力。在训练分类器时，只有训练集或验证集可用。\n\
    - **测试数据**：分类器的性能在未见过的测试数据上进行测试，并且仅在测试分类器时可用。它用于评估训练模型的性能。一旦确定了数据集，就会开发一个混淆矩阵，该矩阵表明分类模型训练得有多好。混淆矩阵由四个参数表示：\n\
    \    - **真正例**：这些是预测为真且实际预测输出正确的情况。这里更倾向于更高的值。\n    - **真负例**：在这种情况下，我们预测为假，并且我们的预测输出是正确的。这里更倾向于更高的值。\n\
    \    - **假正例**：在这里，我们预测为真，但实际预测输出为假。\n    - **假负例**：在这里，预测为假，而实际预测输出被发现为真。\n\n\
    模型的准确性也可以使用混淆矩阵来确定，如下所示：\n\n$$Accuracy = \\frac{True\\ positives + True\\ negatives}{total\\\
    \ number\\ of\\ samples}$$\n\n在数据集不平衡的情况下，准确性不是分类模型的正确评估参数。对于这种情况，精确率或召回率被用作更好的评估参数。\n\
    \n## 评估\n\n训练完成后，进行评估以确定模型的好坏。因此，模型评估有助于找到以下内容：\n\n- 代表尚未见过的数据的最佳模型\n- 通过调整模型的超参数，所选模型在未来将如何良好运行\n\
    - 如何提高准确性\n- 如何通过观察混淆矩阵来增加真正例和真负例的数量\n\n因此，模型评估构成了模型开发过程不可或缺的一部分。\n\n## 超参数调优\n\
    \n评估完成后，需要改进训练以提高准确性或减少达到理想条件所需的迭代次数。一种这样的方法是调整在训练过程中可能被隐式假设的参数。这将需要测试这些假设。另一个考虑的参数是“学习率”。它表示基于前一个训练步骤的信息和考虑的初始条件，直线在每一步中移动的距离。该值提供了关于模型准确性和训练所需时间的信息。\n\
    \n## 预测\n\n预测或推断是确定输出正确性的步骤。\n\n## 使用的指标\n\n虽然准确性是评估机器学习模型的指标之一，但公平性和包容性提供了一种衡量标准，以理解数据引入的偏差，并确保模型在所有人口统计群体中提供公平的预测。因此，公平性可以说包含三个步骤：\n\
    \n- 识别数据集不平衡\n- 确保所有群体得到公平对待\n- 设置预测阈值\n\n## 回归算法\n\n这些算法根据输入到系统的输入特征预测输出值。回归技术主要根据三个指标进行分类：自变量的数量、因变量的类型和回归线的形状。\n\
    \n## 回归技术的类型\n\n回归算法包括线性回归、回归树、套索回归和多元回归。\n\n## 线性回归\n\n它是一种广为人知的监督学习算法，用于预测连续的实数输出，即基于给定的自变量（x，预测变量）预测因变量值（y，称为目标）。因此，它确定了\
    \ x（输入）和 y（输出）之间的线性关系。因此，名称是线性回归。线性回归据说基于线性、二次、多项式或非线性的假设。假设是基于一些隐藏参数和输入值的函数。简单线性回归只有一个自变量，而多元线性回归有多个自变量，如表3.1所示：\n\
    \n| 简单线性回归 | 多元线性回归 |\n| :--- | :--- |\n| 自变量和因变量之间存在线性关系。 | 它使用多个变量来预测结果。 |\n\
    | 它对异常值非常敏感。 | 它对模型的微小变化敏感，并存在多重共线性和自相关问题。 |\n| 它只有一个自变量。 | 可以使用前向选择、后向消除和逐步法来选择最显著的自变量。\
    \ |\n\n表3.1：简单线性回归和多元线性回归\n\n## 逻辑回归\n\n当因变量 y 在性质上是二元的（0/1，真/假，是/否）时，确定逻辑回归。换句话说，标签在性质上是分类的或离散的。这导致输出\
    \ Y 的值在 0 和 1 之间，并使用以下对数几率比方程表示：\n\n$$Odds = \\frac{p}{1-p}$$\n= (事件发生的概率 / (事件不发生的概率)\n\
    \n- 逻辑回归可以处理各种类型的关系，因为它对预测的几率比应用了非线性对数变换。\n- 自变量之间不应有任何相关性，即没有多重共线性。\n- 有序逻辑回归的因变量具有有序值。\n\
    - 当因变量属于多类方法时，考虑多项逻辑回归。\n\n## 多项式回归\n\n如果自变量的幂大于1，则回归方程是多项式回归方程，如多项式方程所示。在此"

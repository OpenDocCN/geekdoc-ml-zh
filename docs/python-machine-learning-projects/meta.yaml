    ## 类处理\n\nPython通过支持类的创建和处理来支持面向对象编程。Python是一种面向对象的编程语言，其中我们创建的一切都被视为对象。类用于创建对象。它由变量和作用于这些变量的函数组成，以执行各种任务。可以使用\
    \ **class** 关键字定义一个类。\n\n## 示例15：\n\n```\n>>>class MyClass:\n    def f(self):\n\
    \        return 'Hello World'\n>>> x=MyClass()  #创建类的实例\n>>> x.f()        #调用方法\n\
    ```\n\n这里定义了一个简单的类，只有一个函数，用于显示‘Hello World’。\n\n## 示例16：\n\n```\n>>>class MyPerson:\n\
    \    def __init__(self,name,age):\n        self.name=name\n        self.age=age\n\
    \    def printName(self):\n        print(\"My name is \"+self.name)\n```\n\n这里，类定义了两个函数和两个变量。`__init__`\
    \ 是一个特殊函数，称为构造函数。当创建类的实例时，构造函数默认会被调用。`self` 参数是对类当前实例的引用，用于访问属于类的变量。它不必命名为self；你可以随意命名，但它必须是类中任何函数的第一个参数。\n\
    \n## 异常处理\n\n在程序内部优雅地处理错误是一种良好的编程实践。这种嵌入在程序中的错误处理过程称为异常处理。与其他流行语言一样，Python也支持使用\
    \ `try` 和 `except` 语句进行错误处理，如示例17所示。\n\n## 示例17：\n\n```\n>>>try:\n    print(a)\n\
    except:\n    print(\"Variable not defined exception has occurred.\")\n```\n\n\
    这里，由于变量 `a` 未定义，代码将抛出错误，并且 `except` 块中的语句将被执行，如示例18所示。\n\n## 示例18：\n\n```\n>>>try:\n\
    \    a=0\n    tot=145\n    c=tot/a\n    print(c)\nexcept ZeroDivisionError:\n\
    \    print(\"Divide by Zero error.\")\n```\n\n我们可以使用系统定义的标准错误来引发异常，然后之后的语句将被执行。一些有用的异常包括\
    \ **IndexError**、**ImportError**、**IOError**、**ZeroDivisionError** 和 **TypeError**。\n\
    \n## 文件处理\n\nPython不需要任何显式的库来读取或写入文件。它有内置函数来完成这些操作。读取和显示文件内容的步骤如下：\n\n- 1. 以读模式打开文件：\n\
    \    >>>f=open(\"MyFile.txt\",\"r\")\n- 2. 从文件读取：\n    >>> data=f.read()\n- 3.\
    \ 显示读取的数据：\n    >>> print(data)\n- 4. 关闭文件：\n    >>>f.close()\n\n这里，**open()**\
    \ 方法接受两个参数：文件名和文件需要以何种模式打开。对于从文件读取，模式是“r”。写入文件的步骤如下：\n\n- 1. 以写模式打开文件：\n    >>>f=open(\"\
    MyFile.txt\",\"w\")\n- 2. 写入文件：\n    >>> data=f.write(S)\n- 3. 显示写入的数据：\n    >>>\
    \ print(data)\n- 4. 关闭文件：\n    >>>f.close()\n\n这里，在 **open()** 方法中，模式可以是“w”或“w+”。在“w+”模式下，如果文件不存在，则在写入字符串之前会创建它。写入文件时，文件中已存在的内容会被覆盖。下表2.2总结了读取文件时使用的函数：\n\
    \n| 方法 | 用途 |\n|---|---|\n| f1 =open(‘filename’, ‘r’) | 打开文件‘data’用于输入 |\n| S\
    \ = f1.read() | 将整个文件读入一个字符串 |\n| S = f1.readline() | 只读取一行 |\n| L = f1.readlines()\
    \ | 返回一个行字符串列表 |\n\n*表2.2：读取文件的函数*\n\n下表2.3总结了写入文件时使用的函数：\n\n| 方法 | 用途 |\n|---|---|\n\
    | f = open(‘filename’, ‘w’) | 打开文件‘data’用于写入 |\n| f.write(S) | 将字符串S写入文件 |\n|\
    \ f.writelines(L) | 将列表L中的每个字符串写入文件 |\n| f.close() | 关闭文件 |\n\n*表2.3：写入文件的函数*\n\
    \n这里，模式可以是“r”、”w”、”w+”、”a”和”a+”。模式”a”和”a+”用于在现有文件或新文件中追加或添加数据。\n\n## 示例19：\n\n\
    ```\n>>>f=open(\"Numbers.txt\",\"w+\")\n>>>for num in range(10,20):\n    f.writeline(\"\
    The number is %d\",%dnum)\n>>>f.close()\n>>>f=open(\"Numbers.txt\",\"r\")\n>>>f=f.readlines()\n\
    >>>for line in f:\n    print(line)\n>>>f.close()\n```\n\n这里，文件以写模式打开，并将10到20的数字写入其中。文件关闭后，再次以读模式打开以读取数据。**for**\

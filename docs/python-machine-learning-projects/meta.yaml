    # Expectation–Maximization (EM) Clustering using Gaussian Mixture Models (GMM)


    One of the major drawbacks of K-Means is its naive use of the mean value for the
    cluster center. We can see why this isn’t the best way of doing things by looking
    at the image below. On the left-hand side, it looks quite obvious to the human
    eye that there are two circular clusters with different radii centered at the
    same mean. K-Means can’t handle this because the mean values of the clusters are
    close together. K-Means also fails in cases where the clusters are not circular,
    again as a result of using the mean as cluster center.


    **Gaussian Mixture Models (GMMs)** give us more flexibility than K-Means. With
    GMMs, we assume that the data points are Gaussian distributed; this is a less
    restrictive assumption than saying they are circular using the mean. That way,
    we have two parameters to describe the shape of the clusters: the mean and the
    standard deviation! Taking an example in two dimensions, this means that the clusters
    can take any kind of elliptical shape (since we have a standard deviation in both
    the x and y directions). Thus, each Gaussian distribution is assigned to a single
    cluster.


    To find the parameters of the Gaussian for each cluster (for example, the mean
    and standard deviation), we will use an optimization algorithm called **Expectation–Maximization
    (EM)**. Take a look at the following image as an illustration of the Gaussians
    being fitted to the clusters. Then we can proceed with the process of Expectation–Maximization
    clustering using GMMs:'
  - '[PAGE 133]


    ![](img/05e0d1e671c636fe8ee73a026cd179da_133_0.png)


    1. EM algorithm begins by selecting the number of clusters (like K-Means does)
    and randomly initializing the Gaussian distribution parameters for each cluster.
    One can try to provide a good guesstimate for the initial parameters by taking
    a quick look at the data too. Given these Gaussian distributions for each cluster,
    compute the probability that each data point belongs to a particular cluster.
    The closer a point is to the Gaussian’s center, the more likely it belongs to
    that cluster. This should make intuitive sense since with a Gaussian distribution,
    we are assuming that most of the data lies closer to the center of the cluster.


    2. Based on these probabilities, we compute a new set of parameters for the Gaussian
    distributions such that we maximize the probabilities of data points within the
    clusters. We compute these new parameters using a weighted sum of the data point
    positions, where the weights are the probabilities of the data point belonging
    in that particular cluster. To explain this visually, we can look at the preceding
    image, in particular, the yellow cluster, as an example. The distribution starts
    off randomly on the first iteration, but we can see that most yellow points are
    to the right of that distribution. When we compute a sum weighted by the probabilities,
    even though there are some points near the center,'
  - '[PAGE 134]


    most of them are on the right. Thus, naturally, the distribution’s mean is shifted
    closer to those set of points. We can also see that most points are “top-right
    to bottom-left”. Therefore, the standard deviation changes to create an ellipse
    that is more fitted to these points, to maximize the sum weighted by the probabilities.


    3. Steps 2 and 3 are repeated iteratively until convergence, where the distributions
    don’t change much from iteration to iteration.


    There are two key advantages to using GMMs. Firstly, GMMs are a lot more **flexible**
    in terms of **cluster covariance** than K-Means; due to the standard deviation
    parameter, the clusters can take on any ellipse shape, rather than being restricted
    to circles. K-Means is actually a special case of GMM in which each cluster’s
    covariance along all dimensions approaches 0. Secondly, since GMMs use probabilities,
    they can have multiple clusters per data point. So if a data point is in the middle
    of two overlapping clusters, we can simply define its class by saying it belongs
    X-percent to class 1 and Y-percent to class 2, that is, GMMs support **mixed membership**.


    # Agglomerative Hierarchical Clustering


    Hierarchical clustering algorithms fall into two categories: top-down or bottom-up.
    Bottom-up algorithms treat each data point as a single cluster at the outset and
    then successively merge (or *agglomerate*) pairs of clusters until all of them
    have been merged into a single cluster that contains all data points. Bottom-up
    hierarchical clustering is, therefore, called *hierarchical agglomerative clustering*
    or *HAC*. This hierarchy of clusters is represented as a tree (or dendrogram).
    The root of the tree is the unique cluster that gathers all the samples, and the
    leaves are the clusters with only one sample:


    ![](img/05e0d1e671c636fe8ee73a026cd179da_134_0.png)


    1. We begin by treating each data point as a single cluster, that is, if there
    are X data points in our dataset, then we have X clusters. We then select a distance'
  - "[PAGE 135]\n\nmetric that measures the distance between two clusters. As an example,\
    \ we will use *average linkage*, which defines the distance between two clusters\
    \ to be the average distance between data points in the first cluster and data\
    \ points in the second cluster.\n\n2. On each iteration, we combine two clusters\
    \ into one. The two clusters to be combined are selected as those with the smallest\
    \ average linkage, that is, according to our selected distance metric, these two\
    \ clusters are the closest and, therefore, are the most similar and should be\
    \ combined.\n\n3. Step 2 is repeated until we reach the root of the tree, that\
    \ is, until we only have one cluster that contains all data points. This way,\
    \ we can select how many clusters we want in the end, simply by choosing when\
    \ to stop combining the clusters, that is, when to stop building the tree!\n\n\
    Hierarchical clustering does not require us to specify the number of clusters,\
    \ and we can even select which number of clusters looks best since we are building\
    \ a tree. Additionally, the algorithm is not sensitive to the choice of distance\
    \ metric; all of them tend to work equally well. On the other hand, with other\
    \ clustering algorithms, the choice of distance metric is critical. A particularly\
    \ good use case of hierarchical clustering methods is when the underlying data\
    \ has a hierarchical structure and you want to recover the hierarchy; other clustering\
    \ algorithms can’t do this. These advantages of hierarchical clustering come at\
    \ the cost of lower efficiency, as it has a time complexity of $O(n^3)$, unlike\
    \ the linear complexity of K-Means and GMM.\n\n# 5. Describe in detail the python\

    As a data scientist, the data we are offered consists of many features; this sounds
    good for building good robust model, but there is a challenge. How would you identify
    highly significant variable(s) out of 1000 or 2000 variables? In such cases, dimensionality
    reduction algorithm helps, along with algorithms like Decision Tree, Random Forest,
    PCA, Factor Analysis, Identifying based on correlation matrix, missing value ratio
    and others.


    **XGBoost:** This is another classic gradient boosting algorithm that’s known
    to be the decisive choice between winning and losing in some Kaggle competitions.


    XGBoost has immensely high predictive power, which makes it the best choice for
    accuracy in events as it possesses both linear model and the tree learning algorithm,

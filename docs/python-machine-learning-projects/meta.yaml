    \n+   • **Gradient Descent (GD) or steepest descent algorithm**\nIt is an iterative\
    \ first-order optimization algorithm that is used to find a local minimum/maximum\
    \ of a given function. This is done to minimize a cost/loss function.\nThe performance\
    \ of a model is measured through the cost function applied for any given data.\
    \ It quantifies the error between predicted values and expected values and presents\
    \ it in the form of a single real number. To achieve the goal of minimizing the\
    \ cost function, it performs two steps iteratively:\nAt a point, the gradient\
    \ (slope) is determined by calculating the first-order derivative of the function.\n\
    Take a step (move) in the direction opposite to the gradient. The opposite direction\
    \ of the slope increases from the current point by alpha times the gradient at\
    \ that point. The alpha value indicates the learning rate: a tuning parameter\
    \ in the optimization process that decides the length of the steps.\n• **Evolutionary\
    \ Algorithms (EA)**\nThese form a heuristic-based approach to solve problems that\
    \ cannot be easily solved in polynomial time. They constitute of a constitute\

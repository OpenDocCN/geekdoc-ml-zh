    ## Retail


    Online shopping is the trend these days. Business organizations are providing
    services like recommending products and their combinations that have been previously
    purchased based on the buying history. Retailers rely on machine learning to capture
    data, analyze it and use it to personalize a shopping experience and provide customer
    insights along with price optimization.


    ## Oil and gas


    Machine learning models are being trained to determine new energy sources, analyze
    minerals in the ground, predict refinery sensor failure, and streamline oil distribution
    to make the refineries more efficient and cost-effective.


    ## Transportation


    The transportation industry majorly relies on making routes more efficient and
    predicting potential problems. So, machine learning algorithms to be developed
    have to analyze, the incoming data needs to be modeled. This can further be used
    to identify patterns and trends to generate optimized routes. Thus, machine learning
    is an important tool for various transportation organizations.


    Other set of applications used include the following:


    ## Facebook’s News Feed


    The News Feed uses machine learning to personalize each member’s feed. If a member
    frequently stops scrolling to read a particular friend’s posts, the News Feed
    will start showing more of that friend’s activity earlier in the feed. This is
    done by performing statistical analysis and predictive analytics to identify patterns
    in the user’s data and using those patterns to populate the News Feed.


    ## Enterprise application


    In the **Customer Relationship Management (CRM)** system, machine learning utilizes
    learning models to analyze the emails and informs the sales team members about
    the most important mails to respond to first. Similarly, **Human resource (HR)**
    systems use machine learning models to identify the characteristics of effective
    employees and use this to find the best applicants for open positions.


    Machine learning software help users automatically identify important data points
    for providing business insights and intelligence.


    ## Self-driving cars


    Machine learning uses deep learning neural networks to identify objects and determine
    optimal actions for safely steering a vehicle.


    ## Virtual assistant


    In order to interpret natural speech, personal schedules or previously defined
    preferences and take action, smart assistants utilize machine learning technology
    through several deep learning models.


    ## Difference between the terms data science, data mining, machine learning and
    deep learning


    Although each of these methods have the same goals, i.e., to extract insights,
    patterns and relationships that can be used to make decisions, each one has a
    different approach and ability to determine them, as indicated by [Table 1.1](#).


    ## Data Science and Data Mining


    Data science deals with the entire scope of collecting and processing data, while
    data mining involves analyzing large amounts of data to discover patterns and
    other useful information.


    Data mining involves the use of traditional statistical methods to identify previously
    unknown patterns from data, such as statistical algorithms, machine learning,
    text analytics and time series analysis. It also includes the study and practice
    of data storage and data manipulation. Refer the table [Table 1.1](#):


    | Characteristics | Data Science | Data Mining |

    | :--- | :--- | :--- |

    | Definition | Process of collecting data | Analysis of data |

    | Works on | Structured, semi structured and unstructured data | Structured data
    |

    | Approach | A multi-disciplinary approach consisting of statistics, data visualization
    and natural language processing | A part of data science |

    | Process | Finds patterns in present and historical data | Operates on historical
    data |


    Table 1.1: Difference between data science and data mining


    ## Machine learning and deep learning


    Machine learning is developed based on its ability to probe data for its structures.
    It uses an iterative approach to learn from data, so the learning is easily automated.


    Deep learning combines advances in computing power and neural networks to learn
    complicated patterns in large amounts of data for identifying objects in images
    and words in sounds, as indicated by Table 1.2:


    | Characteristics | Machine Learning | Deep Learning |

    |---|---|---|

    | Optimal data volumes | Thousands of data points | Millions of data points |

    | Outputs | Numerical values | Numerical values and free form data |

    | Working | Uses automated algorithms that learn to model functions and predict
    future actions based on the data | Uses neural networks |

    | Feature Selection | Requires specific techniques | Automatically done |

    | Management | Algorithms are directed by data analysis to examine specific variables
    in data sets | Algorithms are self-directed on data analysis |


    Table 1.2: Difference between machine learning and deep learning


    ## Conclusion


    This chapter introduced you to the key terms used in data science, data mining,
    artificial intelligence, machine learning and deep learning. Various types of
    machine learning algorithms, the methods applied and models deployed for learning
    were also explored here. The working of the machine learning algorithms and the
    challenges faced while developing the machine learning algorithm were then specified.
    This was followed by clearing the concepts of machine learning with the help of
    several examples. We also looked at the difference between data science, data
    mining, machine learning and deep learning technologies.


    In the next chapter, the very popular Python language will be introduced. Then,
    we will explore code editors, IDE and the working of Python, along with its basic
    structure, control statements, and exception handling in detail.


    ## Questions and Answers


    1. **Define the terms machine learning, data science and artificial intelligence
    with examples.**


    **Ans. Machine learning (ML)** algorithms enable computers to learn from data
    and even improve themselves without being explicitly programmed. You may already
    be using a device that utilizes ML, for example, a wearable fitness tracker like
    Fitbit or an intelligent home assistant like Google Home.


    **Data science:** Data science is the technology that studies the data trend to
    make the best possible use of data. Machine learning algorithm, deep learning
    algorithm and Python libraries make the data science domain more powerful. It
    includes the following:


    - Statistics (traditional analysis you’re used to thinking about)

    - Visualization (Graphs and tools)


    Data science is used in domains like fraud detection, share market prediction,
    disease prediction, chatbot, social media management, user profiling and speech
    recognition.


    **Artificial intelligence:** It is a technique that makes machines capable enough
    to perform tasks that humans are not capable of. These machines are not only trained
    to do tasks but also improve over time. For example, carrying a tray of drinks
    through a crowded bar and serving them to the correct customer is something servers
    do every day, but it is a complex exercise in decision-making and based on a high
    volume of data being transmitted between neurons in the human brain.


    In broader terms, machine learning and deep learning are the subset of artificial
    intelligence and data science’s tools to get the data ready for the implementation
    whether it is cleaning, exploratory data analysis, imputation or splitting.


    2. **Explain the various models used in machine learning.**


    **Ans.** Let us talk about the various models in machine learning.


    **Linear regression:** It is used to estimate real values (houses cost, number
    of calls, total sales and so on) based on continuous variable(s). Here, we establish
    a relationship between independent and dependent variables by fitting a best line.
    This best fit line is known as regression line and represented by a linear equation
    Y= a *X + b.


    The best way to understand linear regression is to relive this childhood experience.
    Let us say, you ask a child in fifth grade to list the people in their class by
    increasing order of weight, without asking them their weights! What do you think
    the child will do? They would likely look (visually analyze) at their classmates’
    height and build and arrange them using a combination of these visible parameters.
    This is linear regression in real life! The child has actually figured out that
    height and build would be correlated to the weight by a relationship, which looks
    like the equation.


    In this equation:


    - Y: Dependent variable

    - A: Slope

    - X: Independent variable

    - B: Intercept


    These coefficients A and B are derived based on minimizing the sum of squared
    difference of distance between data points and regression line.


    Look at the following example. Here, we have identified the best fit line having
    linear equation y=0.2811x+13.9. Using this equation, we can find the weight, knowing
    the height of a person. Refer [Figure 1.3](Figure 1.3):'

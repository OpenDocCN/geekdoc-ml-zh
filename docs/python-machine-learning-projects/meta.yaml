    These algorithms predict the output values based on input features fed into the
    system. Regression techniques are mainly categorized based on three metrics: the
    number of independent variables, the type of dependent variables and the shape
    of the regression line.


    # Types of regression techniques


    Regression algorithms include linear regression, regression trees, lasso regression
    and multivariate regression.



    # Objectives


    On completion of this chapter, you will be able to understand the various key
    terms and the fundamentals of machine learning. Additionally, you will be able
    to understand the types, the models and the mechanism of machine learning. You
    will become familiar with the challenges and limitations observed while applying
    machine learning algorithms. These will be elaborated through a number of application
    areas along with the differences between the various related technologies employed.


    # Introduction to Machine Learning (ML)


    Machine learning is defined as the ability of a computer system to learn from
    the environment where the data is provided through enabling algorithms. These
    algorithms gather insights and take data-driven decisions with minimal human intervention.
    This enables us to make predictions on previously unanalyzed data. So instead
    of writing code, one just needs to feed the data to the generic algorithm, and
    the algorithm/machine builds the logic based on the given data. This helps improve
    the output from its experience without the need for any explicit programming.
    Thus, it can be said that machine learning is a term closely associated with data
    science, and it involves observing and studying data or experiences to identify
    patterns and set up a reasoning system based on the findings. Another way of describing
    machine learning is to say that it is a science of building hardware or software
    that can achieve tasks by learning from examples.


    The examples come as {input, output} pairs. When new inputs are given, a trained
    machine can predict the output. For example, recommendations for online products
    purchased or suggestions for the persons who bought the product is machine learning.
    The terms used in machine learning include a target that is called a **label**,
    a variable used in statistics that is called a **feature**, and transformation
    in statistics that is called **feature creation**.


    # Models in Machine Learning'
  - '[PAGE 22]


    Machine learning models can be categorized into three basic models: supervised,
    unsupervised and reinforcement learning.


    # Supervised machine learning model through training


    Supervised learning is said to be a learning obtained by training a machine or
    a model. On getting trained, predictions can be made for new data, also known
    as test data.

    This model works on the data provided to the system. The data available is divided
    into **training** and **testing** data. A supervised learning model analyses the
    given training data and draws inferences from it. Therefore, mapping between the
    input and output pair and proper labeling of data is crucial in supervised machine
    learning models.

    The major aim of a supervised model is to utilize historical data, understand
    its behavior and determine future forecasts based on the historical data available
    and maintained in the database.

    For example, to differentiate between plants and flowers, a few labeled pictures
    of both categories need to be fed. This will enable the machine learning algorithm
    to differentiate between, identify and learn about them based on their characteristics.
    Once the algorithm is trained, classifying the remaining images would become a
    lot easier for the algorithm.


    # Unsupervised machine learning model: Self-sufficient learning


    Such a model does not use any classified or labelled parameters. It learns through
    observation and finds structures in the data. It focuses on discovering hidden
    structures, patterns and relationships from unlabeled data, which enhances the
    functionality of the system by creating a number of clusters for further analysis.

    The unsupervised system or its algorithms are not given the “right answer.” The
    algorithm is expected to determine, interpret, and review its data and conclude
    from what is being shown to them through the iterative deep learning approach.
    Unsupervised learning can use both generative learning models and a retrieval-based
    approach.'
- md: 'These algorithms use self-organizing maps, nearest-neighbor mapping, k-means
    clustering and singular value decomposition as its techniques for operations.

    Unsupervised learning also known as neural networks works well for recognizing
    images, performing operations on transactional data, performing speech to text
    conversion and natural language generation.


    ## Semi-supervised machine learning model


    This model is a combination of supervised and unsupervised learning. It works
    using a small amount of labeled and large amount of unlabeled data for training
    to improve the learning accuracy.

    Here, all the unlabeled data is fed in, and the machine applies the various algorithms,
    such as classification, regression and prediction. Then, it understands the characteristics
    and classifies the information from the data provided.

    This learning provides an effective solution when the cost associated with labeling
    is too high.


    ## Reinforcement machine learning model: Hit and Trial


    This learning model interacts with the environment on a trial-and-error basis,
    determining the best outcome. Reinforcement learning comprises of three primary
    components: the **agent** (the learner or decision maker), the **environment**
    (everything the agent interacts with) and **actions** (what the agent can do).
    The agent here is rewarded or penalized with a point. Based on the actions they
    take, the output should be maximized over a given amount of time. Steps that produce
    favorable outcomes are rewarded, and steps that produce undesired outcomes are
    penalized until the algorithm learns the optimal process.

    Thus, the goal in reinforcement learning is to learn the best policy to obtain
    maximum rewards.

    Reinforcement learning is often used for robotics, gaming and navigation. For
    example, to understand a game of chess, an ML algorithm will not analyze individual
    moves; it will study the game as a whole.


    ## Types of Machine Learning Algorithms


    Based on the various models developed, Machine learning is sub-categorized into
    three types: supervised, unsupervised and reinforcement-based algorithms, as represented
    in Figure 1.1:


    ![](img/05e0d1e671c636fe8ee73a026cd179da_24_0.png)


    As mentioned in Figure 1.1, supervised and unsupervised algorithms work on continuous
    and categorical data that is provided. The supervised algorithms that work on
    continuous data include regression, decision trees, random forests and classification
    based methods for categorical data. Unsupervised algorithms include clustering,
    association analysis and the Hidden Markov model.


    ## Working of Machine Learning algorithm


    Machine Learning algorithm is trained using a training data set. This training
    leads to creation of a model. When new input data is introduced to this model,
    the ML algorithm makes a prediction.

    The following figure depicts the working of ML algorithm:


    ![](img/05e0d1e671c636fe8ee73a026cd179da_25_0.png)


    If the accuracy of the prediction obtained is acceptable, the associated machine
    learning algorithm is deployed. However, if the accuracy obtained is not acceptable,
    the algorithm is repeatedly trained with an augmented training data set till its
    accuracy gets acceptable, as represented in [Figure 1.2](Figure 1.2).


    ## Challenges for Machine Learning Projects


    Employing a machine learning method can be extremely tedious, but it can serve
    as a revenue charger for a company. While machine learning is still evolving,
    various challenges faced by the organizations include the following:


    **Understanding the limits of contemporary machine learning technology**

    Many companies expect the algorithms to learn quickly and deliver precise predictions
    to complex queries. Therefore, they face the challenge of educating customers
    about the possible applications of their innovative technology. A business working
    on a practical machine learning application needs to invest time and resources
    and take substantial risks. Also, machine learning engineers and data scientists
    cannot guarantee that the training process of a model can be replicated. Therefore,
    frequent tests should be done to develop the best possible and desired outcomes.


    **The black box problem**

    Understanding how the algorithms work made the ML models simple and shallow methods
    in the early days. However, as ML algorithms work on large sets of data, algorithms
    have moved from neural networks to deep learning algorithms. These networks gave
    good accuracy, but the logic and the models developed to do so was not known.
    This problem is called a black box problem.


    **Data collection**

    Immense amount of data is available to train a machine learning model. Data engineering
    plays a significant role in collecting and streamlining the data. Though data
    storage has become cheap, it requires time to collect enough data or buy ready
    sets of data, which is also expensive. Additionally, preparing data for algorithm
    training is a complicated process. To do that, one needs:

    - To know the problem that the algorithm needs to solve,

    - To establish data collection mechanisms and train the algorithm,

    - Data reduction with attribute sampling, record sampling, or aggregating;

    - To decompose the data and rescale it, a complex and expensive task;


    Data privacy is yet another challenge. Differentiating between sensitive and insensitive
    data is essential to implement machine learning correctly and efficiently.


    ## Feature Selection


    In a dataset, you may have 1000 features or more, but only selected features help
    in the prediction; selecting those features is the challenging task. Here, domain
    knowledge and data scientist expertise come into the picture.

    It is a challenge to select the smallest possible subset of input variables (features)
    that will give optimal or the best predictions.


    ## Performance prediction


    Once optimized predictions are made, the challenge is to predict their generalized
    performance on new, unseen data.

    For measuring the performance, we have parameters to check; for example, we have
    classification matrix, accuracy, recall, precision, roc-auc curve and so on in
    classification problems, and we have accuracy, mean squared error, Adjusted R2
    squared error and so on in regression problems.

    To overcome the various challenges faced, the focus should be on understanding
    the concepts behind data collection, feature selection and extraction, applying
    the right algorithm and predicting the performance and accuracy of the applied
    algorithms.


    ## Limitations of machine learning


    The applications of machine learning are observed in various domains, from the
    financial and retail sectors to agriculture, banking and many more. However, machine
    learning algorithms have their own limitations, mentioned as follows:

    - Each narrow application needs to be specially trained

    - Requires large amounts of *hand-crafted*, *structured* training data

    - Learning must generally be supervised: training data must be tagged

    - Require lengthy offline/ batch training

    - Does not learn incrementally or interactively in real time

    - Poor transfer learning ability, reusability of modules and integration

    - Systems are opaque, making them very hard to debug

    - Performance cannot be audited or guaranteed

    - They encode correlation, not causation or ontological relationships

    - Do not encode entities, or spatial relationships between entities

    - Only handle very narrow aspects of natural language


    To obtain the best results, various techniques need to be properly employed while
    considering all limitations.


    ## Application areas of ML


    Various industries have embraced machine learning technologies to gain competitive
    advantage. Domains that utilize machine learning include the following:


    **Financial services**

    Predictions are made by applying appropriate machine learning algorithms to identify
    two important factors: determining insights into data for identifying investment
    opportunities or helping investors to know when to trade. Additionally, various
    data mining and machine learning algorithms are utilized to perform cyber surveillance
    to prevent frauds from occurring, and to identify clients with high-risk profiles
    in banking sector and other businesses in the financial industry.


    **Government**

    For a government organization, there is a huge collection of data obtained from
    multiple sources, and records are maintained over years. Such data forms the prime
    source from where data can be mined, and insights generated to improve public
    safety and provide utilities for the welfare of the society. Machine learning
    can play an important role in determining such services. It can also help detect
    fraud and minimize identity theft.


    **Health care**

    Due to the advent of wearable devices, sensor technology incorporated in the healthcare
    sector can provide access to a patient’s health in real time. This'
  mdcn: '这些算法采用自组织映射、最近邻映射、k均值聚类和奇异值分解等技术进行操作。

    无监督学习也称为神经网络，在图像识别、事务数据操作、语音转文本转换和自然语言生成方面表现良好。


    ## 半监督机器学习模型


    该模型结合了监督学习和无监督学习。它使用少量已标记数据和大量未标记数据进行训练，以提高学习准确性。

    在此过程中，所有未标记数据被输入，机器应用各种算法，如分类、回归和预测。然后，它理解特征并对提供的数据信息进行分类。

    当标记成本过高时，这种学习提供了有效的解决方案。


    ## 强化机器学习模型：试错法


    该学习模型基于试错法与环境交互，确定最佳结果。强化学习包含三个主要组成部分：**智能体**（学习者或决策者）、**环境**（智能体交互的所有事物）和**动作**（智能体可以执行的操作）。这里的智能体会根据所采取的动作获得奖励或惩罚。在给定时间内，输出应最大化。产生有利结果的步骤会获得奖励，产生不良结果的步骤会受到惩罚，直到算法学会最优过程。

    因此，强化学习的目标是学习获得最大奖励的最佳策略。

    强化学习常用于机器人、游戏和导航。例如，要理解一局国际象棋，机器学习算法不会分析单个走法；它会整体研究整个游戏。


    ## 机器学习算法类型


    根据开发的各种模型，机器学习细分为三种类型：监督、无监督和基于强化的算法，如图1.1所示：


    ![](img/05e0d1e671c636fe8ee73a026cd179da_24_0.png)


    如图1.1所述，监督和无监督算法处理提供的连续和分类数据。处理连续数据的监督算法包括回归、决策树、随机森林，而处理分类数据的基于分类的方法。无监督算法包括聚类、关联分析和隐马尔可夫模型。


    ## 机器学习算法的工作原理


    机器学习算法使用训练数据集进行训练。这种训练导致模型的创建。当新的输入数据被引入该模型时，机器学习算法会进行预测。

    下图描述了机器学习算法的工作原理：


    ![](img/05e0d1e671c636fe8ee73a026cd179da_25_0.png)


    如果获得的预测准确性可以接受，则部署相关的机器学习算法。然而，如果获得的准确性不可接受，则使用增强的训练数据集反复训练算法，直到其准确性达到可接受水平，如[图1.2](Figure
    1.2)所示。


    ## 机器学习项目的挑战


    采用机器学习方法可能极其繁琐，但它可以成为公司的收入增长点。虽然机器学习仍在发展中，但组织面临的各种挑战包括以下几点：


    **理解当代机器学习技术的局限性**

    许多公司期望算法能够快速学习并为复杂查询提供精确预测。因此，他们面临着向客户普及其创新技术可能应用的挑战。从事实际机器学习应用的企业需要投入时间和资源，并承担相当大的风险。此外，机器学习工程师和数据科学家无法保证模型的训练过程可以复制。因此，应进行频繁测试以开发最佳和期望的结果。


    **黑盒问题**

    早期，理解算法如何工作使得机器学习模型成为简单而浅层的方法。然而，随着机器学习算法处理大型数据集，算法已从神经网络发展到深度学习算法。这些网络提供了良好的准确性，但其背后的逻辑和开发的模型却不得而知。这个问题被称为黑盒问题。


    **数据收集**

    有海量数据可用于训练机器学习模型。数据工程在收集和整理数据方面发挥着重要作用。虽然数据存储变得便宜，但收集足够的数据或购买现成数据集需要时间，而且成本也很高。此外，为算法训练准备数据是一个复杂的过程。为此，需要：

    - 了解算法需要解决的问题，

    - 建立数据收集机制并训练算法，

    - 通过属性采样、记录采样或聚合进行数据缩减；

    - 分解数据并重新缩放，这是一项复杂且昂贵的任务；


    数据隐私是另一个挑战。区分敏感和非敏感数据对于正确高效地实施机器学习至关重要。


    ## 特征选择


    在一个数据集中，你可能有1000个或更多特征，但只有选定的特征有助于预测；选择这些特征是一项具有挑战性的任务。这里，领域知识和数据科学家的专业知识就派上了用场。

    选择尽可能小的输入变量（特征）子集以获得最优或最佳预测是一个挑战。


    ## 性能预测


    一旦做出优化预测，挑战就在于预测其在新的、未见过的数据上的泛化性能。

    为了衡量性能，我们有参数需要检查；例如，在分类问题中，我们有分类矩阵、准确性、召回率、精确率、roc-auc曲线等；在回归问题中，我们有准确性、均方误差、调整后的R2平方误差等。

    为了克服面临的各种挑战，重点应放在理解数据收集、特征选择和提取背后的概念，应用正确的算法，并预测所应用算法的性能和准确性。


    ## 机器学习的局限性


    机器学习的应用可见于各个领域，从金融和零售部门到农业、银行业等等。然而，机器学习算法有其自身的局限性，如下所述：

    - 每个狭窄应用都需要专门训练

    - 需要大量的*手工制作*、*结构化*训练数据

    - 学习通常必须是监督的：训练数据必须被标记

    - 需要长时间的离线/批量训练

    - 不能在实时中增量或交互式地学习

    - 迁移学习能力差，模块可重用性和集成性差

    - 系统不透明，使其非常难以调试

    - 性能无法审计或保证

    - 它们编码相关性，而非因果关系或本体关系

    - 不编码实体或实体之间的空间关系

    - 只能处理自然语言非常狭窄的方面


    为了获得最佳结果，需要在考虑所有局限性的同时，正确运用各种技术。


    ## 机器学习的应用领域


    各行各业都已采用机器学习技术以获得竞争优势。利用机器学习的领域包括以下：


    **金融服务**

    通过应用适当的机器学习算法进行预测，以识别两个重要因素：确定数据洞察以识别投资机会，或帮助投资者了解何时进行交易。此外，利用各种数据挖掘和机器学习算法进行网络监控，以防止欺诈发生，并在银行业和金融行业的其他业务中识别高风险客户。


    **政府**

    对于政府组织，有从多个来源获得的大量数据，且记录保存多年。此类数据构成了主要来源，可以从中挖掘数据并生成洞察，以改善公共安全并为社会福利提供效用。机器学习可以在确定此类服务方面发挥重要作用。它还可以帮助检测欺诈并减少身份盗窃。


    **医疗保健**

    由于可穿戴设备的出现，医疗保健领域结合的传感器技术可以实时获取患者的健康状况。这'

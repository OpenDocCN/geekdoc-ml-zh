    \n## Lasso 回归\n\n最小绝对收缩和选择算子，即 Lasso，可以减少线性回归模型的变异性并提高其准确性。\n\n## ElasticNet 回归\n\
    \nElasticNet 是 Lasso 和岭回归技术的混合体，当存在多个相关特征时非常有用。\n\n## 分类\n\n分类模型试图从观测值中得出结论。一旦输入数据，分类模型将预测一个或多个输出值。因此，分类模型的目标是找到将目标变量类别分开的决策边界。使用训练数据集来获得更好的边界条件；这将有助于确定每个目标类别。一旦确定了这些边界条件，重点就转向预测目标类别。这个过程被称为分类。\n\
    \n## 分类算法中使用的术语\n\n机器学习中的分类算法使用输入训练数据来预测后续数据落入预定类别之一的可能性。与分类相关的术语包括以下内容：\n\n-\
    \ **分类器：** 它被定义为将输入数据与特定类别相关联的算法。\n- **分类模型**：一种试图从给定的训练输入值中得出结论的模型。\n- **特征**：它是被观察现象的单个可测量属性。\n\
    - **二元分类**：它对只有两种可能结果的任务进行分类，例如，性别分类（男/女）。\n- **多类分类**：它对具有两个以上类别的任务进行分类，每个样本只分配一个目标标签。\n\
    - **多标签分类**：在这种情况下，每个样本被映射到一组目标标签（多个类别）。\n\n## 分类算法的类型\n\n分类算法大致分为以下几类：\n\n- **线性分类器**\n\
    \  线性分类器根据输入特征的线性组合将数据分类为标签。因此，它只能用于分类线性可分的数据。线性分类器进一步分为以下几类：\n  - **逻辑回归**\n\
    \    它对于理解自变量对单个结果变量的影响最为有用。然而，它仅在预测变量为二元时有效，并且假设所有预测变量彼此独立且数据没有缺失值。\n  - **朴素贝叶斯分类器**\n\
    \    它基于贝叶斯定理，假设每对特征之间存在独立性。它需要较少的训练数据，并且与其他方法相比被认为非常快。然而，它被认为是一个糟糕的估计器。简单来说，**朴素贝叶斯分类器**假设某个特征在类别中的存在与任何其他特征的存在无关。贝叶斯定理有助于从\
    \ P(c)、P(x) 和 P(x|c) 计算后验概率 P(c|x)，如下所示：\n    $$P(c | x) = P(x1 | c) * P(x2 |\
    \ c) * P(xn | c) * P(c)$$\n    这里，\n    - P(c|x) 是给定预测变量（属性）的类别（目标）的后验概率。\n  \
    \  - P(c) 是类别的先验概率。\n    - P(x|c) 是似然度，即给定类别的预测变量的概率。\n    - P(x) 是预测变量的先验概率。\n\
    \n## 支持向量机\n\n支持向量机将训练数据表示为空间中的点，这些点被尽可能宽的间隙分隔开。SVM 被认为在高维空间中有效，并且据说内存效率高。然而，该算法不直接提供概率估计。\n\
    \n![](img/05e0d1e671c636fe8ee73a026cd179da_87_0.png)\n\n从图 3.5 可以明显看出，H1 不是一个好的超平面，因为它没有将类别分开；H2\
    \ 形成了一个更好的超平面，但只有很小的间隔；H3 以最大间隔（距离）将它们分开。\n\n## k-近邻\n\n它是一种惰性学习，因为它只是存储训练数据的实例。分类是通过每个点的\
    \ k 个最近邻的多数投票来完成的。它易于实现，对噪声训练数据具有鲁棒性，并且如果训练数据量大则有效。然而，它需要确定 K 的值，并且计算成本很高。\n\n\
    ## 决策树\n\n这些算法产生一系列规则，使数据分类成为可能，并使结果组尽可能不同。它们易于理解和可视化。它们也可以处理数值和分类数据。然而，也可以创建复杂的决策树。但是，它们可能无法很好地泛化，数据的微小变化可能导致完全不同的树。\n\
    \n- **随机森林**\n  它被定义为一个拟合多个决策树的元估计器。然而，样本是有放回抽样绘制的，并且难以实现。\n- **神经网络**\n  它由几个称为神经元的单元组成，这些单元按层排列。它们将输入向量转换为输出。每个单元接收一个输入，对其应用一个函数，然后将输出传递给下一层。\n\
    \n## 分类的性能度量\n\n分类问题最常用的性能指标包括以下内容：\n\n准确率 = (真阳性 + 真阴性) / 总观测数\n\n准确率定义为正确预测的观测值与总观测数的比率：\n\
    \nF1 分数：$\\frac{2 \\times 精确率 \\times 召回率}{精确率 + 召回率}$\n\n它被定义为精确率和召回率的加权平均值。\n\
    \n**精确率**：当预测为正值时，预测正确的频率\n\n**召回率**：预测正确的次数\n\n## 聚类\n\n聚类是一种无监督学习方法，其目标是在数据元素中找到不同的组。这涉及根据指定的条件或标准对数据点进行分组。因此，同一组中的数据点具有相似的属性或特征，而不同组中的数据点具有不同的特征。\n\
    \n聚类的例子包括市场细分、图像压缩和文档聚类。\n\n## 聚类算法\n\n采用各种聚类算法来寻找相似数据点之间的分组。它进一步用于区分聚类。这些包括以下内容：\n\
    \n## K-均值聚类\n\n这是最广为人知的算法，易于理解和实现。此外，k-均值函数运行速度快，计算量少。然而，在 k-均值算法中，必须事先确定要使用的组数，并且它还从随机选择聚类中心开始；因此，它在算法的不同运行中产生不同的聚类结果，缺乏一致性。\n\
    \n## 均值漂移聚类\n\n它通过基于滑动窗口质心的算法确定数据点的密度。\n\n- **基于密度的带噪声应用空间聚类 (DBSCAN)**\n  它是一种基于密度的聚类算法，不需要预设聚类数量。它将异常值识别为噪声，并可以找到任意大小和形状的聚类。然而，由于距离\
    \ epsilon ε，处理具有不同密度的聚类对 DBSCAN 来说是一项任务。\n- **使用高斯混合模型 (GMM) 的期望最大化 (EM) 聚类**\n\
    \  在该算法中，假设数据点服从高斯分布，并且由于标准差参数可以呈现任何椭圆形状，然后被分配到单个聚类。据说它们灵活且限制较少。进一步补充，GMM 支持混合成员资格，即\
    \ GMM 在类别 1 中占 X%，在类别 2 中占 Y%。为了找到每个聚类的高斯分布的均值和标准差参数，进行名为**期望最大化 (EM)** 的优化算法，如下所示：\n\
    \  1. 首先通过随机初始化每个聚类的高斯分布参数来选择聚类数量。\n  2. 然后确定每个数据点属于特定聚类的概率。当一个点更接近高斯中心时，它被认为属于该聚类。\n\
    \  3. 然后使用数据点位置的加权和计算新的参数集。权重指定数据点属于特定聚类的概率。\n  4. 重复步骤 2 和 3 直到收敛。\n\n## 凝聚层次聚类\n\
    \n层次聚类被认为是基于原型的聚类算法的替代方案，其中不需要指定聚类数量，它将通过"

    \n在本章中，我们将学习以下主题：\n\n- 机器学习建模流程\n    - 预处理中使用的术语\n    - 数据预处理的必要性\n    - 在数据上训练和测试模型\n\
    \    - 评估\n    - 超参数调优\n    - 预测\n- 回归算法\n    - 回归技术的类型\n    - 逐步回归\n    - 岭回归\n\
    \    - Lasso 回归\n    - 弹性网络回归\n- 分类\n    - 分类回归中使用的术语\n    - 分类回归的类型\n    - 分类的性能度量\n\
    - 聚类\n    - 聚类算法\n- 神经网络和支持向量机\n    - 构建模块：神经元\n    - 将神经元组合成神经网络\n    - 训练神经网络\n\
    \    - 神经网络架构\n- Python 中的数据科学库\n    - Numpy\n    - Pandas\n    - MatplotLib\n\
    - 机器学习系统的评估\n    - 测试和训练数据集\n    - 性能度量\n    - 模型评估技术\n    - 模型评估指标\n\n### 目标\n\
    \n完成本章后，你将能够理解机器学习中预处理的必要性，以及用于机器学习的各种算法和用 Python 编写的数据科学库。你还应该能够了解代码编辑器和 Python\

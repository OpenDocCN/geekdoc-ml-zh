    # System development


    To develop the correct website for product purchase, various steps need to be
    performed by considering a number of factors prior to the purchase. This recommendation
    system development can follow the waterfall model of system development. This
    model is used to create a system with a linear and sequential approach. It is
    termed as waterfall because the model develops systematically from one phase to
    another in a downward fashion. It is also referred to as a linear-sequential life
    cycle model. It is considered to be simple to use and understand. In a waterfall
    model, each phase must be completed before the next phase can begin, and the phases
    do not overlap in any way.


    Waterfall model is essential to ensure that appropriate system is developed and
    meets the requirements in terms of feasibility and implementation. This approach
    comprises of developing the system through various phases, as represented in [Figure
    4.12](https://example.com/figure4.12):'

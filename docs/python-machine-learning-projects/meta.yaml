  md: 'These algorithms mimic natural selection, where only the fittest individuals
    survive through the process of mutation, selection and crossover. The main classes
    of EA are as follows:


    +   - **Genetic algorithms (GAs)**: It provides the solution for optimization
    problems where each candidate solution has a set of properties (or genes) that
    can mutate or change until we find the best solution.

    - **Evolution strategies (ESs)**: These algorithms provide population-based solutions
    that are based on concepts of biological evolution. In this, a number of possible
    solutions is first determined. Each of these solutions is evaluated through a
    ‘fitness function’ that indicates how good they are. The solution population evolves
    over time and further determines better solutions.

    - **Differential evolution (DE)**: These algorithms handle nonlinear and non-differentiable
    multidimensional objective functions while requiring very few control parameters
    to go towards the minimization of cost functions.


    **Estimation of distribution algorithms (EDAs)** or **probabilistic model-building
    genetic algorithms (PMBGAs)**: They help in determining the best candidate solutions

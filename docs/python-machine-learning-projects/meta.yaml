    parameters that affect customer churn needs to be identified. The various data
    parameters that can be considered include the following:


    +   - **Satisfaction data:** This data could consist of information about communication,
    faults, mechanism of installation and so on. It could help determine the impact
    of different levels of satisfaction data on the overall churn, resulting in exploratory

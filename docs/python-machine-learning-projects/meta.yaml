  - '[PAGE 210]


    Once the key data parameters are identified, a basic machine learning pipeline
    is built, and its performance is determined. The best model suitable for a specific
    telecom company can then be determined by comparing the different model types.
    Let’s look at the approach that could be utilized.


    # Step 1: Problem Definition


    Based on the key challenge, it is identified that there is a need to predict whether
    a customer would churn. To determine that, machine learning models need to be
    trained. The training of a model can be performed on 80% of the data available,
    while the remaining 20% can be utilized for testing the trained models. This threshold
    of 80:20 can be made dynamic to 70:30, depending on the application requirement.
    Further, the testing can be used to assess the prediction with regard to churning
    or not churning.


    # Step 2: Data Collection


    As mentioned, different types of data and its corresponding dataset needs to be
    formed. Its use case pipeline using the Panda and NumPy for data handling and
    processing needs to be further developed. Further, Matplotlib needs to be used
    for visualization, as explained in detail in [Chapter 2, Python Basics for ML](Chapter
    2, Python Basics for ML) and [Chapter 3, “An Overview of ML Algorithms”](Chapter
    3, “An Overview of ML Algorithms”).


    # Step 3: Exploratory Data Analysis (EDA)


    In order to further explore the data, the concepts behind data structures and
    the domain knowledge need to be understood, initial preprocessing and cleaning
    of the data has to be performed, and the topic of investigation must be understood.
    Further, the various patterns and inconsistencies in the data, such as skewness,
    outliers and missing values need to be determined using standard Panda functions.
    This could lead to building and validating the hypotheses. To add to this, the
    unique values for every feature needs to be understood in this step.

    The features can also be clustered into different categories through classification
    labels, such as the following:


    # Churning Label


    +   - **Churn, phone service, multiple lines**: Various analysis in terms of whether
    a customer has churned, has a phone or not are determined. The answer to this
    classification label would be in a Yes or No format.

    - Customer services booked

    - **Phone Service**: This indicates whether a customer has a phone service (Yes,
    No)'
  - '[PAGE 211]


    +   - **Type of internet service provider and backup facility**: It indicates
    the service provided for individual customers, such as DSL, Fiber optic or none.
    It also indicates whether the customer has opted for online backup, resulting
    in a yes, no or no service provider.

    - **Streaming services**: This indicates whether the customer has a facility of
    streaming TV, movies and other related operations. This again results in a Yes,
    No or No internet service.


    # Customer account information


    It deals with the contract term for which the customers have stayed with the company,
    billing, payment method and charges to the customers. This provides quantitative
    information like the number of months, years, credit card payment, bank transfer
    and so on.


    # Customers demographic information


    This information provides the customers’ personal details in terms of their customerID,
    gender and whether they have dependents.


    # Building the hypothesis


    Hypotheses can then be made with respect to the following:


    +   - The customer would be less likely to churn if the contract duration is longer.
    The longer the contract duration, the less likely it is that the customer will
    churn. This is because they are less frequently confronted with the termination
    or prolongation decision.

    - Customers are willing to cancel simple contracts with few associated product
    components quicker and more often than complex product bundles.

    - In order to keep the services running for their families, the customers might
    churn less.


    The major drivers of churn are tenure, contract duration terms and number of additional
    services.


    # Feature extraction


    Based on the data types and its values, the features could be categorized. This
    can be done through label encoding into categorical data such as gender, phone
    service, paperless billing and so on. The outputs of these values is either a
    yes or no value. These can be transformed to binary integers for further analysis.
    For variables taking more than two values, such as online security, online backup
    and so on, payment method, One-hot encoding can be implemented. Here, for each'
  - '[PAGE 212]


    value, a new variable can be created with a binary integer indicating whether
    this value had occurred in the data entry earlier (1 or 0). Values of numerical
    features are rescaled between a range of 0 and 1 through the min-max scaling method.


    With respect to the preceding example of customer churning, it can be said that
    customers who churn have a lower tenure of around 10 months with higher monthly
    charges. Churning is said to be maximum for senior citizens and monthly contract
    customers.


    # Step 4: Feature Engineering


    In this step, a new feature is generated from the existing ones and a correlation
    analysis is performed. It could be observed that customers having one additional
    service could have a higher churn rate as compared to customers with more services.


    # Step 5: Train/Test Split


    The data set gathered can now be divided into training and testing data. This
    could then be applied for the conduction of model training and testing. Depending
    on the threshold identified, the information can be split into 80:20 or 70:30,
    that is, the split between training and testing data. Y axis, that is, the dependent
    class, can represent the churn, while the other features can be treated as the
    independent variables, that is, the X axis.


    # Step 6: Model Evaluation Metrics


    Various metrics could be used to evaluate the performance of the chosen models:


    +   - **Feature weights:** This metric could indicate the top features used by
    the model to generate the predictions.

    - **Confusion matrix:** It could indicate a grid of true and false predictions
    compared to the actual values.

    - **Accuracy score:** This could represent the overall accuracy of the model.

    - **ROC Curve:** This could specify the **true positive rate (TPR)** along with
    **false positive rate (FPR)** for different thresholds of class predictions. This
    would, In turn, help determine the churn prediction.

    - **Precision-Recall-Curve:** This could compare the **false positive rate (FPR)**
    and **false negative rate (FNR)** for different thresholds of class predictions.


    # Step 7: Selection, Training, Prediction and Assessment of the Model


    Machine learning models like K-nearest neighbors, logistic regression, random
    forest and support vector machines can be tested. Their performances can further
    be measured, and the models can then be optimized by tuning their'
  - '[PAGE 213]


    hyperparameters. It can be observed that K-Nearest Neighbors could be fast, simple
    and instance-based as compared to Logistic Regression, which would be a linear-based
    model. Random Forest could be identified to be slower yet an accurate ensemble
    model based. Support Vector Machines can be used for non-linear operations. Various
    machine learning models can be deployed to predict churn. These could include
    the following:


    +   - **Classification model or supervised learning:** It helps identify whether
    a customer could churn.

    - **Regression analysis:** Separate models using techniques like regression analysis
    and predictive dashboards can be built to predict customers churning from the
    business.


    Applying these machine learning models could result in developing targeted marketing
    and reduction in acquisition costs.


    # Step 8: Hyperparameter Tuning/Model Improvement


    The concept of cross-validation is used during hyperparameter tuning to address
    the Biasing by bias arising due to split of the data in the train-test-split part.
    Hyperparameter tuning can be incorporated through grid search and randomized search.


    The following [figure 4.20](figure_4.20) represents the process of developing
    the system. It indicates the way of building and deploying the models to determine
    the highest and lowest customer churn information. As represented in figure A
    in the following image, building the model consists of performing historical data
    analysis by identifying significant variables and developing the model. [Figure
    4.20](figure_4.20) represents the deployment mechanism that comprises capturing
    the live feed of historical data and developing the propensity model. This could
    be used to generate the score that differentiates between the high and low likelihood
    of customer churn.'

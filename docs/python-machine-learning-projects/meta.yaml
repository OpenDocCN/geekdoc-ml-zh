    Python提供了一种处理异常的方法，以便代码可以没有任何中断地执行。如果我们不处理异常，解释器将不会执行异常之后的所有代码。\nPython有许多内置异常，使我们的程序能够无中断地运行并给出输出。\n\
    \n## try-except语句\n\n如果Python程序包含可能引发异常的可疑代码，我们必须将该代码放在try块中。try块后面必须跟except语句，该语句包含一个代码块，如果在try块中发生某些异常，该代码块将被执行。\n\
    \n语法：\n\n```python\ntry:\n    #代码块\nexcept Exception1:\n    #代码块\nexcept Exception2:\n\

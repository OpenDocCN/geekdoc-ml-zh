  md: "Figure 3.2: Movement of Data\n\nBasic preprocessing techniques used to convert\
    \ raw data into clean data involve the following steps:\n\n+   1. **Conversion\
    \ of data**: Data in any form must be converted into numeric form for machine\
    \ learning models to handle it.\n2. **Handling the missing values**: Whenever\
    \ any missing data in a data set is observed, one of the following can be considered:\n\
    \   a. **Ignoring the missing values**: The corresponding row or column of data\
    \ can be removed as needed.\n   b. **Filling the missing values**: In this approach,\
    \ the missing data can be filled manually. The value added in the missing data\
    \ field can be the mean, median or the highest frequency value.\n   c. **Machine\
    \ learning**: Another approach is to predict the data that can be added in the\
    \ empty position based on the existing data.\n3. **Outlier detection**: Some data\
    \ might deviate drastically from other observations in the data set; such type\
    \ of data is said to be error data.\n\nThus, data preprocessing forms one of the\
    \ most important steps in machine learning to build accurate machine learning\
    \ models.\n\n# Preprocessing in ML\n\nPreprocessing in an ML algorithm is divided\
    \ into six steps, as listed here:\n\n+   1. Importing the libraries\n2. Importing\
    \ the dataset\n3. Dealing with the missing data in the dataset\n4. Encoding categorical\
    \ data\n5. Splitting the dataset into training set and test set\n6. Feature scaling\n\
    \nThis entire process can be automated using machine learning algorithms, mathematical\
    \ modelling and statistical knowledge.\n\n# Researching the best model for the\
    \ data\n\nThe next step in the workflow is to choose a model; many models have\
    \ been created over the years. The main goal of using an ML model is to train\
    \ the best performing"

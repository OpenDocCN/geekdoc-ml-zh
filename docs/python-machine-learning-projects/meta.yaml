    | 输出 | 数值 | 数值和自由形式数据 |

    | 工作方式 | 使用自动学习的算法来建模函数并根据数据预测未来的操作 | 使用神经网络 |

    | 特征选择 | 需要特定技术 | 自动完成 |

    | 算法管理 | 算法由数据分析指导，以检查数据集中的特定变量 | 算法在数据分析上是自导向的 |


    表 1.2：机器学习和深度学习之间的区别



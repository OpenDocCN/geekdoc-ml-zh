    \ number of correct positive results divided by the number of positive results\
    \ predicted by the class:\n\n*Precision = True Positives/ (True Positives + False\
    \ Positives)*\n\n**Recall:** It is the number of correct positive results divided\
    \ by the number of *all* relevant samples (all samples that should have been identified\
    \ as positive):\n\n*Recall = True Positives/ (True Negatives + False Positives)*\n\
    \nF1 Score is the harmonic mean between precision and recall. The range for F1\
    \ Score is [0, 1]. It indicates the instances when the classifier classifies correctly\
    \ and does not miss a significant number of instances. The greater the F1 Score,\
    \ the better is the performance of the model.\n\n# Regression Metrics\n\nRegression\
    \ problems are evaluated by mean absolute error and root mean squared error:\n\
    \n+   - **Mean Absolute Error (MAE)** is defined as the sum of the absolute differences\
    \ between predictions and actual values.\n  It gives the measure of how far the\
    \ predictions were from the actual output. However, they don’t give any idea of\

    # Hyperparameter tuning


    Once evaluation is performed, training needs to be improved to enhance the accuracy
    or reduce the number of iterations required to reach the ideal condition. One
    such approach is tuning the parameters that would have been implicitly assumed
    while training. This would require testing those assumptions.

    Another parameter under consideration is the “learning rate”. It indicates how
    far the line shifts during each step, based on the information from the previous
    training step and the initial conditions considered. This value provides information
    about the accuracy of the model and the amount of time the training would take.


    # Prediction


    Prediction, or inference, is the step that determines the correctness of the output.


    # Metrics Used


    Though accuracy is one of the metrics for evaluating a machine learning model,
    fairness and inclusion provides a measure to understand the bias introduced by
    the data and ensure that the model provides equitable predictions across all demographic
    groups. Thus, fairness can be said to comprise of three steps:


    +   - Identify dataset imbalances

    - Ensure fair treatment for all groups

    - Set prediction thresholds



    Figure 4.12: WaterFall Model


    The phases that represent the Waterfall model include the following:


    +   - **Requirement Gathering and analysis:** All the data requirements are captured
    in this phase.

    - **System Design:** The requirements specified in the first phase are studied
    and the system design is prepared.

    - **Implementation:** Small programs called units are then developed and tested
    for functionality. These are further moved to the next phase in an integrated
    manner.

    - **Integration and Testing:** All the units developed are then integrated into
    a system after they are tested. Post integration, the entire system is tested

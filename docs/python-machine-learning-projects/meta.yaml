    \ equitable predictions across all demographic groups. Thus, fairness can be said\
    \ to comprise of three steps:\n\n- Identify dataset imbalances\n- Ensure fair\
    \ treatment for all groups\n- Set prediction thresholds\n\n## Regression algorithms\n\
    \nThese algorithms predict the output values based on input features fed into\
    \ the system. Regression techniques are mainly categorized based on three metrics:\
    \ the number of independent variables, the type of dependent variables and the\
    \ shape of the regression line.\n\n## Types of regression techniques\n\nRegression\
    \ algorithms include linear regression, regression trees, lasso regression and\

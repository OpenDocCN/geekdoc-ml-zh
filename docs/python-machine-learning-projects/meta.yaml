    ## F1 分数


    在上一节中，我们讨论了分类问题的精确率和召回率，并强调了根据用例选择精确率/召回率的重要性。如果对于某个用例，我们试图同时获得最佳的精确率和召回率，该怎么办？F1
    分数是分类问题中精确率和召回率值的调和平均数。F1 分数的公式如下：


    $$F_1 = \left( \frac{\text{recall}^{-1} + \text{precision}^{-1}}{2} \right)^{-1}
    = 2 \cdot \frac{\text{precision} \cdot \text{recall}}{\text{precision} + \text{recall}}$$


    现在，一个显而易见的问题是，“为什么我们取调和平均数而不是算术平均数？”。这是因为调和平均数对极端值的惩罚更大。让我们通过一个例子来理解这一点。我们有一个二元分类模型，结果如下：


    精确率：0，召回率：1


    这里，如果我们取算术平均数，得到 0.5。很明显，前面的结果来自一个愚蠢的分类器，它只是忽略输入并将其中一个类别作为输出进行预测。现在，如果我们取调和平均数，我们将得到
    0，这是准确的，因为这个模型根本没有用。


    这看起来很简单。然而，在某些情况下，数据科学家可能希望给予精确率或召回率更高的重要性/权重。为此，稍微修改前面的表达式，引入一个可调参数 beta，我们得到以下公式：


    $$F_{\beta} = (1 + \beta^2) \cdot \frac{\text{precision} \cdot \text{recall}}{(\beta^2
    \cdot \text{precision}) + \text{recall}}$$


    Fbeta 衡量模型相对于一个认为召回率比精确率重要 β 倍的用户的有效性。


    ## 均方根误差 (RMSE)


    RMSE 是回归问题中最常用的评估指标。它基于误差是无偏的且服从正态分布的假设。以下是关于 RMSE 需要考虑的关键点：


    1.  “平方根”的力量使该指标能够显示大量的偏差。

    2.  该指标的“平方”性质有助于提供更稳健的结果，防止正负误差值相互抵消。换句话说，该指标恰当地显示了误差项的可能大小。

    3.  它避免了使用绝对误差值，这在数学计算中是极不希望的。

    4.  当我们有更多样本时，使用 RMSE 重建误差分布被认为更可靠。

    5.  RMSE 受异常值影响很大。因此，请确保在使用此指标之前已从数据集中移除异常值。

    6.  与平均绝对误差相比，RMSE 给予更大的权重并惩罚较大的误差。


    RMSE 指标由以下公式给出：


    ![](img/05e0d1e671c636fe8ee73a026cd179da_144_0.png)


    其中，N 是观测值的总数。


    ## R 平方/调整后 R 平方


    我们了解到，当 RMSE 降低时，模型的性能会提高。然而，这些值本身并不直观。


    在分类问题的情况下，如果模型的准确率为 0.8，我们可以将其与准确率为 0.5 的随机模型进行比较，从而衡量我们的模型有多好。因此，随机模型可以被视为基准。但当我们谈论
    RMSE 指标时，我们没有*可以*比较的基准。


    这就是我们可以使用 R 平方指标的地方。R 平方的公式如下：


    ![](img/05e0d1e671c636fe8ee73a026cd179da_144_1.png)


    ![](img/05e0d1e671c636fe8ee73a026cd179da_144_2.png)


    **MSE(model)：** 预测值与实际值之间的均方误差

    **MSE(baseline)：** 均值预测与实际值之间的均方误差

    换句话说，我们的回归模型与一个非常简单的模型（该模型仅将训练集的目标均值作为预测值）相比有多好。


    ## 调整后 R 平方


    一个与基准表现相当的模型，其 R 平方值为 0。模型越好，r2 值越高。具有所有正确预测的最佳模型，其 R 平方值为 1。然而，当向模型添加新特征时，R 平方值要么增加，要么保持不变。R
    平方值会因添加对模型没有价值的特征而增加。因此，R 平方的一个改进版本是调整后 R 平方。调整后 R 平方的公式如下：


    $$\bar{R}^2 = 1 - (1 - R^2) \left[ \frac{n - 1}{n - (k + 1)} \right]$$


    其中，

    **k**：特征数量

    **n**：样本数量


    如您所见，该指标考虑了特征的数量。当我们添加更多特征时，分母中的项 n-(k +1) 减小，因此整个表达式增大。

    如果 R 平方没有增加，意味着添加的特征对我们的模型没有价值。因此，总的来说，我们从 1 中减去了一个更大的值，调整后的 r2 相应地会减小。



  - '[PAGE 238]


    Metaheuristic algorithms are capable of providing practical solutions in today’s
    computing world. These metaheuristic algorithms can be used in the healthcare
    domain to diagnose diseases practically with better results. The major objective
    of this study is to:


    +   - Extract information and patterns for diagnosis

    - Determine the techniques along with metaheuristic that can be considered impactful
    in diagnosing the diseases

    - Determine the metaheuristic techniques and its respective algorithms that can
    be used in a decision support system to select and optimize the features for diagnosing
    diseases like heart disease, Alzheimer’s disease and diabetes.

    - Develop the framework for executing metaheuristic techniques to diagnose diseases

    - Evaluate the various algorithms for diagnosing the diseases in terms of the
    accuracy, precision, F1 score, error rate, sensitivity, specificity, an area under
    a curve, and so on

    - Determine the application areas where metaheuristics technique can be used


    • **Considerations for the case study**

    For collecting the data, different sets of sensors and complex techniques for
    analyzing, recognition, decoding and forecasting the information are required.

    In the healthcare sector, metaheuristics can be applied to improve classification
    and detection systems, leading to an increase in the early detection and treatment
    rate of various diseases, decreasing complications and so on.

    Metaheuristics techniques can be broadly classified into the following:


    +   - **Single solution-based algorithms:** Here, a single optimal solution is
    determined from all the randomly generated solutions.

    - **Population solution-based algorithms:** Here, values of all the randomly generated
    solutions are updated iteratively, and only then the best solution is developed.


    • **System development**

    The system development can focus on a survey-based approach, followed by the waterfall
    method, which was explained in a previous chapter. Extensive study of metaheuristic
    algorithms in the healthcare sector, followed by determining the structure, performing
    its analysis, and looking at its implementation can lead to a better system.'

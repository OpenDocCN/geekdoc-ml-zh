  md: '**Ans.** Tabu Search is a metaheuristic procedure for solving optimization
    problems designed to guide other methods to escape the trap of local minima. It
    is used to find optimal and nearly optimal solutions for a wide range of classical
    and practical problems, from scheduling to telecommunications, character recognition
    and neural networks. To avoid falling in a local minima, it uses memory so that
    it can remember moves and solutions that are already exploited. Also, it uses
    memory functions to allow searching strategies like intensify and diversif in
    search space.


    Tabu Search can be used to guide other processes that use a set of moves for transforming
    one solution into another, and it provides guidance for measuring the attractiveness
    of these moves. Example of moves are swapping two tasks, changing the value of
    a variable (increase or decrease).


    Tabu Search is based on three main concepts:


    +   - The use of flexible attribute-based memory structures that allows evaluation
    criteria and historical search information to be exploited move thoroughly than
    by rigid memory structures or by memory-less systems The flexible attribute-based
    memory structures allow evaluation criteria and historical search information
    to be exploited in better way.

    - A mechanism that evaluates the movement based on specific criteria in tabu search


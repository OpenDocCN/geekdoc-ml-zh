    \n机器学习模型是一段代码，旨在通过用数据训练机器使其变得智能。\n\n如*图 3.1*所示，输入到系统的数据包括训练数据和测试数据，分别由 1a 和 1b\
    \ 表示。训练数据集是机器学习模型在其上进行训练的数据，由 2a 表示。\n\n机器学习模型包含根据指定问题使用的算法。该算法基于多个性能度量进行评估，这些度量将在本章后面解释；它们分别由\
    \ 3a、3b 和 3c 表示。\n\n当新数据（称为测试数据）到来时，模型根据所选算法和确定的度量进行评估，由 2b、3b 和 3c 表示。获得的模型输出（由\
    \ 4 表示）然后用于预测任务，由 5 表示：\n\n因此，在用数据训练机器之前，机器学习工作流可以定义为三个阶段。让我们看看这些阶段。\n\n### 收集数据\n\
    \n这一步被认为是重要的，因为收集的数据的质量和数量将直接决定预测模型的好坏。为任何机器学习项目收集的数据通常包括从各种来源（如文件或数据库）收集的数据，以及传感器数据或实时数据。然而，这些数据不能直接用于分析，因为大多数现实世界的数据是杂乱的，这意味着数据可能存在以下一个或多个问题：\n\
    \n- **缺失数据**：这是由于应用程序中的技术问题而未连续创建或不可用的数据。\n- **噪声数据**：此数据指的是在手动收集数据过程中由人为造成的错误，或在收集数据时由设备技术问题引起的错误。\n\
    - **不一致数据**：此类数据指的是由于数据重复或名称或值中的错误而导致的错误。\n\n任何此类数据的存在都会降低结果的质量。因此，进行数据预处理或准备来解决这个问题。\n\
    \n### 数据预处理\n\n机器学习的下一步是数据准备，即将数据加载到合适的位置并为训练做准备。同时，对数据进行相关的可视化，以确定不同变量之间的任何相关关系或数据变量之间的任何不平衡。在机器学习中，有一个\
    \ 80/20 法则：每个数据科学家预计至少花费 80% 的时间进行数据预处理，剩下的 20% 时间用于执行分析。\n\n数据预处理被确定为清理原始数据（即从现实世界收集的数据）并将其转换为干净数据集的过程，然后才能将其输入算法。\n\
    \n### 预处理中使用的术语\n\n在预处理数据之前，有必要了解所使用的术语：原始数据和准备好的数据。\n\n#### 原始数据（或简称数据）\n\n以其源形式存在的数据，即数据仓库中的数据或从流式系统发送的、尚未为机器学习任务准备的数据，称为原始数据。\n\
    \n#### 准备好的数据\n\n在源中经过解析、连接、聚合和汇总到适当粒度，并以表格形式放入以供机器学习操作的数据，称为准备好的数据。\n\n### 数据预处理的必要性\n\
    \n为了从机器学习模型中获得更好的结果，底层数据必须以适当的方式、格式化，并最好放在一个数据集中。数据必须从原始状态转变为结构化状态，然后进行预处理，如*图\
    \ 3.2*所示：\n\n用于将原始数据转换为干净数据的基本预处理技术涉及以下步骤：\n\n1. **数据转换**：任何形式的数据都必须转换为数字形式，以便机器学习模型能够处理它。\n\
    2. **处理缺失值**：每当观察到数据集中存在缺失数据时，可以考虑以下方法之一：\n    a. **忽略缺失值**：可以根据需要删除相应的行或列数据。\n\
    \    b. **填充缺失值**：在这种方法中，可以手动填充缺失数据。添加到缺失数据字段中的值可以是平均值、中位数或最高频率值。\n    c. **机器学习**：另一种方法是根据现有数据预测可以添加到空位置的数据。\n\
    3. **异常值检测**：某些数据可能与数据集中的其他观察值严重偏离；此类数据被称为错误数据。\n\n因此，数据预处理是机器学习中构建准确机器学习模型的最重要步骤之一。\n\
    \n### 机器学习中的预处理\n\n机器学习算法中的预处理分为六个步骤，如下所列：\n\n1. 导入库\n2. 导入数据集\n3. 处理数据集中的缺失数据\n\
    4. 编码分类数据\n5. 将数据集分割为训练集和测试集\n6. 特征缩放\n\n整个过程可以使用机器学习算法、数学建模和统计知识实现自动化。\n\n###\
    \ 研究适合数据的最佳模型\n\n工作流的下一步是选择模型；多年来已经创建了许多模型。使用机器学习模型的主要目标是训练性能最佳的"

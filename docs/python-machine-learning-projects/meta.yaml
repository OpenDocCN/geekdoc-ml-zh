    # Algorithms that can be employed'
  - "[PAGE 241]\n\nDifferent metaheuristic algorithms can be used to detect and classify\
    \ various health-related diseases. These algorithms can include **Spider Monkey\
    \ Optimization (SMO)**, **Cuckoo Search Optimization (CSO)**, **Whale Optimization\
    \ Algorithm (WOA)** and **Dragonfly Algorithm (DA)** for diagnosing various diseases,\
    \ like cancer, COVID, diabetes, heart disease, genetic disease and Alzheimer’s\
    \ disease. However, for ease of understanding, SMO and CSO have been elaborated\
    \ on as follows:\n\n+   - **Spider Monkey Optimization**\n    In this technique,\
    \ the societal behavior of the spider monkeys, also known as fusion-fission, is\
    \ used to find the optimal solutions. These monkeys change their behavior according\
    \ to the availability of the food. When the availability of food is high, the\
    \ cluster is bigger; when food is scarce, the cluster is divided into more clusters.\
    \ The aim of this algorithm is to diagnose diseases by optimizing the dataset\
    \ with symptoms of diseases. Thus, development of the algorithm comprises of the\
    \ following:\n    - **Initialization of the parameters:** The initialization of\
    \ the population can be done using a random distribution process.\n        $$SM_{ij}\
    \ = SM_{\\min j} + R(0,1) \\times (SM_{\\max j} - SM_{\\min j})$$\n        Where\
    \ SMi indicates the $i^{th}$ spider monkey; and SM min j and SMmax j refer to\
    \ the minimum and maximum ranges, respectively.\n        R (0,1) refers to the\
    \ numbers that are generated randomly between the values 0 and 1.\n    - **Determining\
    \ the fitness function value:** This value is determined using the probability\
    \ function. This gives the value of position of the spider monkey, as shown in\
    \ the following equation:\n        $$P_i = 0.9 \\times \\frac{fitness_i}{\\max\
    \ fitness} + 0.1$$\n        Where max fitness gives the maximum fitness value\
    \ of the population, and fitness i gives the fitness value of the ith spider.\
    \ The following figure shows the steps followed for diseases diagnosis:"
  - "[PAGE 242]\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_242_0.png)\n\nFigure 5.3:\
    \ Spider Monkey optimization for disease diagnosis\n\n+   - **Determining the\
    \ local and global values**\n  Based on the fitness function, these values can\
    \ be used to find the best solution. Further, the finalized values can aid in\
    \ determining the prominent features. These values can further be used to optimize\
    \ the performance value.\n- **Prediction of disease**\n  Based on the selected\
    \ features determined in step 3, the diseases can be predicted. The entire process\
    \ is represented in [Figure 5.2](#).\n\n# Cuckoo Search Optimization\n\nThis method\
    \ simulates the behavior of the “Cuckoo” bird, and hence the name. All are aware\
    \ that the cuckoo bird lays it is eggs in some other birds’ nests. To do so, it\
    \ first aims to identify the best and safest nest for laying its eggs. However,\
    \ the host bird may realize that the eggs do not belong to them. Hence, they could\
    \ throw them out or choose a new place for it is nest. This best place could be\
    \ determined by checking the similarity between the eggs of the host bird, and\
    \ the availability of food.\n\nBased on the same logic, a technique could be developed\
    \ to check the status of the lungs of patients who suffered from COVID-19. The\
    \ algorithm developed could be as follows:\n\n+   - Input the images of the lungs:\
    \ the images could be X-ray images.\n- Identify the important features from the\
    \ images that would be useful for diagnosis.\n- The features can then be selected,\
    \ extracted and segmented. Extraction and segmentation of the images can be performed\
    \ through the Gabor filter bank and **Fuzzy C-Means (FCM)**, or by using rough\
    \ sets.\n- Classifier models like Naïve Bayes, K-mean or neuro-fuzzy classifier,\
    \ along with Cuckoo Search optimization, can be applied to these images."
  - '[PAGE 243]


    +   o Cuckoo Optimization method can then be used to train the neural network
    (if used) and determine the optimal value of the threshold. The accuracy and the
    root mean square error can be determined.

    o The accuracy of the system can be determined by selecting appropriate features
    in terms of geometry, texture and statistics.


    # Tools utilization


    For Spider Monkey Optimization, a Jaya Spider Monkey Optimization classifier can
    be used, based on convolutional long short–term memory. Time series data can be
    used to further predict confirmed, death, and recovered cases.


    Spider monkey classification algorithm can be used to classify various types of
    diabetes and dengue fever. The system developed for diagnosis can be trained using
    a Probabilistic Neural Network.


    Cuckoo search optimization can be used to determine the initial parameters through
    a support vector machine, particle swarm and **Principal Component Analysis (PCA)**
    optimization for early diagnosis of heart diseases. PCA can discard irrelevant
    features and speed up the convergence.


    # Constraints / Limitations while developing the metaheuristic system


    The focus of this study is on the diagnosis of the disease with respect to the
    symptoms identified:


    +   • Other parameters like age-related diseases, population density and level
    of healthcare facilities available can be considered.

    • Use of limited computing resources can lead to more time consumption, so focus
    also needs to be on utilizing state-of-the-art computing resources.

    • The systems being developed should be incorporated in clinical settings.

    • More datasets and deep learning techniques can be used to optimize the diagnosis
    and performance of the system being developed.

    • The optimizing process can be complex. Also, a lack of information about a person
    can lead to an erroneous diagnosis.

    • Lack of experience of a physician can lead to inaccurate treatment.


    # Evaluation Measures


    Various metaheuristic algorithms, such as spider monkey optimization, grey wolf
    optimization, and shuffled frog leaping algorithm, can be compared in terms of
    their average accuracy, average sensitivity, average, standard deviation, mean
    gradient, specificity, precision, recall, F-measure, Total time for detection,
    Root mean square errors, mean square errors, number of recovered cases, number
    of deaths and so on.'
- md: "## Case Study 2: Genetic Algorithm (GA) in Batch Production\n\nThis is a case\
    \ study on job process planning and scheduling in batch production.\n\n### Topic\n\
    GA enables us to determine the possible schedules for jobs at hand in an iterative\
    \ manner. This case study elaborates on the application of job process planning\
    \ and scheduling into the production of turned parts using genetic algorithm (GA)\
    \ approach to achieve optimum plans.\n\nEvery organization, say any manufacturing\
    \ company, has a plan of developing, implementing and resolving its workflow issues.\
    \ The term JPPS is often used for job process planning and scheduling problem.\
    \ The plan represents a sequence of operations made available across machines.\
    \ These operations tend to produce the items under consideration with an assurance\
    \ of quick, reliable delivery of the products in expected time.\n\nProduction\
    \ can be categorized into single item and batch production. With respect to batch\
    \ production, the following criteria hold good:\n\n- The production is in a specific\
    \ order format.\n- Limited resources are available and used for production.\n\
    - Several products are manufactured at the same time. However, a single product\
    \ is manufactured at a single location, which causes scheduling problems:\n  -\
    \ If orders are received after the scheduling has been completed, different tasks\
    \ are given higher priority.\n  - If orders are cancelled or an equipment malfunctions,\
    \ the entire production needs to be rescheduled.\n  - If the response batch production\
    \ is too slow, unpredictable events might occur.\n  - Another cause of concern\
    \ is the time delay between process planning and the actual beginning of the plan.\
    \ The more the delay, the more the plan tends to become unworkable. Moreover,\
    \ fixing the plans can further lead to bottleneck situations as dynamic manufacturing\
    \ environments tend to modify at least 20 to 30% of all plans.\n  - Yet another\
    \ issue with is that the production plans are made without considering all aspects\
    \ of production. This results in delivery delays, extra costs and low machine\
    \ utilization.\n\nTherefore, the planning and scheduling goals should be integrated\
    \ to create more realistic plans and schedules. This could lead to faster and\
    \ better response to customers’ requests.\n\n### Problem Definition\nThe following\
    \ problems are discussed in this case study:\n- To identify a method for allocating\
    \ orders in the most optimal way.\n- Based on planning and automatic capturing\
    \ of data in real time, there is a need to create a dynamic planning model.\n\n\
    ### Objectives of the case study\nThe following objectives of the case study are\
    \ mentioned:\n- Scheduling model\n- Resolving technical difficulties using GA\n\
    - Determining the optimum size of a batch using GA\n- Integrating the improved\
    \ scheduling algorithm into existing information systems\n- Determining the **Shortest\
    \ Production Time (SPT)** of all products, while taking account of alternative\
    \ sequence of operations\n\n### Considerations for the case study\nFollowing are\
    \ the considerations for the case study:\n- In order to set up a dynamic planning\
    \ and scheduling model, integrated IT support for logistics manipulative processes\
    \ can be incorporated.\n- Dynamic models can be considered for production planning,\
    \ taking care of real-time data and acquisition methods.\n- Only one product can\
    \ be produced on one machine at a time.\n- Each product can be machined independently\
    \ from the other.\n- Each product can have one to three alternative plans.\n-\
    \ In the alternative plan, the sequence of operations needs to be predefined for\
    \ each product.\n- Size of a batch needs to be divided into equal smaller units.\n\
    - Automated, computer-aided planning can lead to integration of process planning\
    \ and scheduling.\n\n### System development\nPlanning and scheduling of products\
    \ in the production of turned parts is considered to be one of the complex problems.\
    \ The process planning and scheduling model that can be utilized is presented\
    \ in [Figure 5.3](Figure 5.3).\n\nThe model can be divided into three steps. The\
    \ first and second steps could be termed as the static or pre-planning phase.\
    \ Based on the available resources, production quantities and material needs,\
    \ various plans can be laid down in these phases.\n\nStep 1: **Process planning\
    \ for new parts**\nIn this step, there is an involvement of the customers and\
    \ suppliers. Checking resources (machines), estimating the quantity of new parts,\
    \ new part process plan and estimated quantities, resource optimization and scheduling\
    \ algorithm can be planned in this step. Feedback can be provided to product designer,\
    \ and formal part approval can be sought from the customer.\n\nStep 2: **Process\
    \ planning**\nIn this step, alternate plans can be set into the ERP systems. Based\
    \ on rough calculations of capacities, periodic comparisons between customers’\
    \ order predictions and resources can be performed, as shown in the previous figure.\
    \ Once a year, strategic optimization of resources can be undertaken for better\
    \ utilization of resources.\n\nStep 3: **Operational scheduling phase**\nIn this\
    \ step, realistic conditions and target functions get involved. Comparisons between\
    \ the available and required resources are performed. In case they differ, an\
    \ extra plan can be included in the process. Detailed production scheduling of\
    \ the manufacturing plan can then be determined to ensure timely delivery of materials\
    \ and tools by suppliers.\n\nOnce the schedule has been completed, it forms a\
    \ working frame. Optimum schedules are those wherein no modifications are to be\
    \ done. The following diagram shows the planning and scheduling model:\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_247_0.png)\n\
    \nFigure 5.4: Integrated process planning and scheduling model\n\n### Algorithms\
    \ that can be employed\nManufacturing information systems form the backbone of\
    \ planning and managing production. This can further integrate the ERP systems\
    \ and GA scheduling software. The algorithm can comprise the following steps:\n\
    - The data stored in the ERP information system can be input to the system.\n\
    - In order to calculate the optimum plan and schedule along with the data optimization\
    \ of the plan with GAs can be performed.\n- Once done, the collected data can\
    \ be returned to the information system.\n\n*Figure 5.5* shows the data management\
    \ system and the integrated process planning and scheduling.\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_249_0.png)\n\
    \nFigure 5.5: Data flow chart for scheduling\n\n### Software that can be used\n\
    Data can be selected from the ERP system through its ODBC and SQL interface. Process\
    \ planning and scheduling queries can be handled through relational databases\
    \ like MS SQL and Visual Basic (VB) interface. A GA can be used to optimize the\
    \ process.\n\n### Tools that can be used\nSimulated-based GA can be used to minimize\
    \ mean tardiness and makespan in **Job Shop Scheduling Problem (JSS)**, and to\
    \ arrange machines in a flexible processing system using variable transferable\
    \ costs as their target function. GA can further be used to study job shop scheduling\
    \ under machine breakdown and unavailability situations. **Advanced Overlapping\
    \ Production Planning Model (AOPP)** and random key GA with forward-backward improvements\
    \ can be used for scheduling problems in a **Manufacturing Supply Chain Environment\
    \ (MSCE)**. Hybrid GA can be used to strengthen the search ability and improve\
    \ the convergence of the GA. Self-guided algorithm, parallel GA and embedded GA\
    \ can be used to minimize the makespan.\n\n### Evaluation parameters\nProduct\
    \ throughput time, close-to-optimum manufacturing schedule, time to manufacture\
    \ one unit, volume of order, machine usage time, preparation time and finishing\
    \ time need to be determined. Also, order execution costs, including depreciation\
    \ costs and labor costs, can be calculated. Thus, GA can be applied to complex\
    \ problems from production and scheduling to forming a set of rules for turned\
    \ parts.\n\n## Optimization using Python\n\nPython provides good support for optimization\
    \ algorithms in machine learning, and libraries are available for working with\
    \ these metaheuristic algorithms. This section will introduce some of these libraries/packages\
    \ that can be used for optimization.\n\n**SwarmPackagePy Library** ([https://pypi.org/project/SwarmPackagePy/](https://pypi.org/project/SwarmPackagePy/))\n\
    This is a library in Python that provides implementation of 14 optimization algorithms,\
    \ including Artificial Bee Algorithm, Cuckoo Search Algorithm, Firefly algorithm\
    \ and Particle Swarm algorithm.\n\nYou can install the library using the following\
    \ command:\n\n```\npip install SwarmPackagePy\n```\n\nThis library works well\
    \ with Python 3.5 and onward. The code is freely available for understanding and\
    \ modification on GitHub. The package includes many algorithms that are popular\
    \ and used frequently for various applications for optimization in machine learning.\n\
    \nFor example, the Cuckoo search algorithm can be invoked as follows:"
  mdcn: "## 案例研究 2：批量生产中的遗传算法（GA）\n\n这是一个关于批量生产中作业工艺规划与调度的案例研究。\n\n### 主题\n遗传算法使我们能够以迭代方式确定当前作业的可能调度方案。本案例研究详细阐述了如何运用遗传算法（GA）方法，将作业工艺规划与调度应用于车削零件的生产，以实现最优计划。\n\
    \n任何组织，例如任何制造公司，都有其开发、实施和解决工作流程问题的计划。术语 JPPS 通常用于指代作业工艺规划与调度问题。该计划代表了在各台机器上可用的操作序列。这些操作旨在生产所考虑的产品，并确保在预期时间内快速、可靠地交付产品。\n\
    \n生产可分为单件生产和批量生产。就批量生产而言，以下标准成立：\n\n- 生产遵循特定的订单格式。\n- 可用的资源有限，并用于生产。\n- 同时生产多种产品。然而，单个产品在单个地点生产，这会导致调度问题：\n\
    \  - 如果在调度完成后收到订单，则不同的任务会被赋予更高的优先级。\n  - 如果订单被取消或设备发生故障，则需要重新安排整个生产。\n  - 如果批量生产响应过慢，可能会发生不可预测的事件。\n\
    \  - 另一个值得关注的问题是工艺规划与计划实际开始之间的时间延迟。延迟越长，计划就越容易变得不可行。此外，固定计划可能会进一步导致瓶颈情况，因为动态制造环境往往会修改至少\
    \ 20% 到 30% 的所有计划。\n  - 另一个问题是，生产计划的制定没有考虑生产的各个方面。这会导致交货延迟、成本增加和机器利用率低下。\n\n因此，应将规划和调度目标整合起来，以创建更现实的计划和调度方案。这可以带来对客户需求更快、更好的响应。\n\
    \n### 问题定义\n本案例研究讨论了以下问题：\n- 确定一种以最优化方式分配订单的方法。\n- 基于规划和实时自动数据捕获，需要创建一个动态规划模型。\n\
    \n### 案例研究的目标\n本案例研究提到了以下目标：\n- 调度模型\n- 使用 GA 解决技术难题\n- 使用 GA 确定批量的最优规模\n- 将改进的调度算法集成到现有信息系统中\n\
    - 在考虑替代操作顺序的同时，确定所有产品的**最短生产时间（SPT）**\n\n### 案例研究的考虑因素\n以下是本案例研究的考虑因素：\n- 为了建立动态规划和调度模型，可以整合物流操作过程的集成\
    \ IT 支持。\n- 可以考虑用于生产规划的动态模型，同时兼顾实时数据和采集方法。\n- 一台机器一次只能生产一种产品。\n- 每种产品可以独立于其他产品进行加工。\n\
    - 每种产品可以有一到三个替代计划。\n- 在替代计划中，需要为每种产品预定义操作顺序。\n- 批量的规模需要划分为相等的较小单元。\n- 自动化、计算机辅助规划可以实现工艺规划和调度的集成。\n\
    \n### 系统开发\n车削零件生产中的产品规划和调度被认为是复杂问题之一。可以使用的工艺规划和调度模型如[图 5.3](Figure 5.3)所示。\n\n\
    该模型可分为三个步骤。第一步和第二步可称为静态或预规划阶段。基于可用资源、生产数量和材料需求，可以在这些阶段制定各种计划。\n\n步骤 1：**新零件的工艺规划**\n\
    在此步骤中，涉及客户和供应商。可以在此步骤中规划资源检查（机器）、估算新零件数量、新零件工艺计划和估算数量、资源优化以及调度算法。可以向产品设计师提供反馈，并向客户寻求正式的零件批准。\n\
    \n步骤 2：**工艺规划**\n在此步骤中，可以将替代计划设置到 ERP 系统中。基于产能的粗略计算，可以定期比较客户订单预测和资源，如前图所示。每年可以进行一次资源的战略优化，以更好地利用资源。\n\
    \n步骤 3：**操作调度阶段**\n在此步骤中，涉及实际条件和目标函数。比较可用资源和所需资源。如果存在差异，可以在过程中加入额外的计划。然后可以确定制造计划的详细生产调度，以确保供应商及时交付材料和工具。\n\
    \n一旦调度完成，它就形成了一个工作框架。最优调度是指无需进行任何修改的调度。下图展示了规划和调度模型：\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_247_0.png)\n\
    \n图 5.4：集成工艺规划和调度模型\n\n### 可采用的算法\n制造信息系统是规划和管理生产的支柱。这可以进一步集成 ERP 系统和 GA 调度软件。该算法可包含以下步骤：\n\
    - 可以将存储在 ERP 信息系统中的数据输入到系统中。\n- 为了计算最优计划和调度，可以连同数据一起使用 GA 进行计划优化。\n- 完成后，可以将收集到的数据返回到信息系统。\n\
    \n*图 5.5* 展示了数据管理系统和集成的工艺规划与调度。\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_249_0.png)\n\
    \n图 5.5：调度数据流程图\n\n### 可使用的软件\n可以通过 ERP 系统的 ODBC 和 SQL 接口选择数据。工艺规划和调度查询可以通过关系数据库（如\
    \ MS SQL）和 Visual Basic (VB) 接口来处理。可以使用 GA 来优化该过程。\n\n### 可使用的工具\n基于仿真的 GA 可用于最小化**作业车间调度问题（JSS）**中的平均延迟时间和完工时间，并使用可变传输成本作为目标函数，在柔性加工系统中安排机器。GA\
    \ 还可用于研究机器故障和不可用情况下的作业车间调度。**高级重叠生产计划模型（AOPP）**和具有前向-后向改进的随机密钥 GA 可用于**制造供应链环境（MSCE）**中的调度问题。混合\
    \ GA 可用于增强搜索能力并改善 GA 的收敛性。自引导算法、并行 GA 和嵌入式 GA 可用于最小化完工时间。\n\n### 评估参数\n需要确定产品吞吐时间、接近最优的制造调度、制造一个单位的时间、订单量、机器使用时间、准备时间和精加工时间。此外，可以计算订单执行成本，包括折旧成本和人工成本。因此，GA\

  md: '![](img/05e0d1e671c636fe8ee73a026cd179da_93_0.png)


    Figure 3.8: Neural Network


    There are two layers that every NN has. These layers are the hidden layer that
    fall between the input and output layers. As represented in Figure3.8, the network
    has two inputs (x1 and x2) and a hidden layer with two neurons (h1 and h2). The
    hidden layer is said to be any layer that is in between the input (first) layer
    and output (last) layer. The output layer with 1 neuron (O1) is further represented
    that has inputs from h1 and h2. The hidden layers H1 and H2 then help to develop
    the output neuron O1.


    # Training the neural network


    It refers to training the network in such a way that it minimizes the losses.

    The losses are defined in terms of **Mean squared error (MSE)**


    $$MSE = \frac{1}{n} \sum_{i=1}^{n} (Y_i - \hat{Y}_i)^2$$


    Where n is the number of samples, y represents the variable being predicted, and
    $Y_i$ is the true value of the variable (the “correct answer”). $\hat{Y}_i$ is
    the predicted value of the variable the network outputs. $(yi - y\hat{})^2$ (is
    known as the squared error).

    The goal is to minimize the error. A guess, an error measurement, an incremental
    change in its weights and adjustment to the coefficients are performed at every
    step of learning from the neural network.

    A model represents the collection of weights. These weights map the inputs that
    enter the network to a set of outputs, forming the guess made by the network.
    This is often known as scoring input. Therefore, the guess is being represented
    by **Guess = input * weight**. The actual data, also known ground truth, is then
    compared to the guess to determine the error.'

    +   - **Backpropagation**: Algorithm for calculating the gradient of a loss function
    with respect to variables of a model.


    You may recall from calculus that the first-order derivative of a function for
    a specific value of an input variable is the rate of change or curvature of the
    function for that input. When we have multiple input variables for a function,
    they form a vector, and the vector of first-order derivatives (partial derivatives)

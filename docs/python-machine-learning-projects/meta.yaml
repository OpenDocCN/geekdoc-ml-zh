    # 7. What are the main characteristics of Evolutionary Algorithms?


    **Ans.** Evolutionary algorithms are a heuristic-based approach to solving problems
    that cannot be easily solved in polynomial time, such as classically NP-Hard problems,
    and anything else that would take far too long to exhaustively process. When used
    on their own, they are typically applied to combinatorial problems; however, genetic
    algorithms are often used in tandem with other methods, acting as a quick way
    to find a somewhat optimal starting place for another algorithm to work off of.


    The premise of an **Evolutionary Algorithm** (to be further known as an EA) is
    quite simple, given that you are familiar with the process of natural selection.
    An EA involves four steps: initialization, selection, genetic operators, and termination.
    These steps each correspond, roughly, to a particular facet of natural selection,
    and they provide easy ways to modularize implementations of this algorithm category.
    Simply put, in an EA, fitter members will survive and'
  merge: -1
  pgno: 258
- img_proc: true
  md: 'proliferate, while unfit members will die off and not contribute to the gene
    pool of further generations, much like in natural selection.


    **Initialization**: In order to begin our algorithm, we must first create an initial
    population of solutions. The population will contain an arbitrary number of possible
    solutions to the problem, often called members. It will often be created randomly
    (within the constraints of the problem), or if some prior knowledge of the task
    is known, roughly centered on what is believed to be ideal. It is important that
    the population encompasses a wide range of solutions because it represents a gene
    pool; so, if we wish to explore many different possibilities over the course of
    the algorithm, we should aim to have many different genes present.


    **Selection**: Once a population is created, members of the population must be
    evaluated according to a fitness function. A fitness function is a function that
    takes in the characteristics of a member and outputs a numerical representation
    of how viable a solution it is. Creating the fitness function can often be very
    difficult, and it is important to find a good function that accurately represents
    the data; it is very problem-specific. Now, we calculate the fitness of all members
    and select a portion of the top-scoring members.


    **Genetic Operators**: This step includes two substeps: crossover and mutation.
    After selecting the top members (typically the top two, but this number can vary),
    these members are used to create the next generation in the algorithm. Using the
    characteristics of the selected parents, new children are created, which are a
    mixture of the parents’ qualities. Doing this can often be difficult, depending
    on the type of data, but typically in combinatorial problems, it is possible to
    mix combinations and output valid combinations from these inputs. Now, we must
    introduce new genetic material into the generation. If we do not perform this
    crucial step, we will become stuck in local extrema very quickly, and we will
    not obtain optimal results. This step is mutation, and we do this, quite simply,
    by changing a small portion of the children such that they no longer perfectly
    mirror subsets of the parents’ genes. Mutation typically occurs probabilistically,
    in that the chance of a child receiving a mutation and the severity of the mutation
    are governed by a probability distribution.


    **Termination**: Eventually, the algorithm must end. There are two cases in which
    this usually occurs: either the algorithm reaches maximum runtime, or the algorithm
    reaches some threshold of performance. At this point, a final solution is selected
    and returned.



  md: "process comprises of working with 2 sets of data namely validation and testing\
    \ data elaborated as follows:\n\n+   - **Validation data:** A set of unseen data\
    \ is used from the training data to tune the parameters of the classifier. Cross-validation\
    \ is used to estimate the skill of a machine learning model on the unseen data.\
    \ While training the classifier, only the training or validation set is available.\n\
    - **Testing data:** The performance of the classifier is tested on the unseen\
    \ test data and is available only while testing the classifier. It is used for\
    \ evaluating the trained model’s performance. Once the data set is determined,\
    \ a confusion matrix is developed, which indicates how well the classification\
    \ model is trained. Confusion matrix is represented by four parameters:\n    -\
    \ **True positives:** These are cases in which the predicted TRUE and the actual\
    \ predicted output is correct. More values are preferred here.\n    - **True negatives:**\
    \ In this case, we predicted FALSE and our predicted output is correct. More values\
    \ are preferred here.\n    - **False positives:** In this, we predicted TRUE,\
    \ but the actual predicted output is FALSE.\n    - **False negatives:** In this,\
    \ the prediction is FALSE, while the actual predicted output is found to be TRUE.\n\
    \nThe accuracy of the model can also be determined using the confusion matrix,\
    \ as follows:\n\n$$Accuracy = \\frac{True\\ positives + True\\ negatives}{total\\\
    \ number\\ of\\ samples}$$\n\nIn the case of an imbalanced dataset, accuracy is\
    \ not the correct evaluation parameter for classification model. For this type\
    \ of situation, the precision or recall is used as a better evaluation parameter.\n\
    \n# Evaluation\n\nOn completion of the training, evaluation is done to determine\
    \ the goodness of the model. Thus, model evaluation helps find the following:\n\
    \n+   - The best model representing the data that has not yet been seen\n- How\
    \ well the chosen model will work in the future by tuning the hyperparameters\
    \ of the model\n- How to improve the accuracy\n- How to increase the number of\
    \ true positives and true negatives by observing the confusion matrix"

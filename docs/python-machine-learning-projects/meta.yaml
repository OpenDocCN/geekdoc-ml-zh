    \n## ElasticNet Regression\n\nElasticNet is a hybrid of Lasso and Ridge Regression\
    \ techniques and is useful when there are multiple features that are correlated.\n\
    \n## Classification\n\nA classification model attempts to draw conclusions from\
    \ the observed values. Once data input is given, the classification model would\
    \ predict one or more output value. Therefore, the objective of the classification\
    \ model is to find the decision boundary that separates the target variable’s\
    \ categories. Training dataset is used to get better boundary conditions; this\
    \ would aid in determining each target class. Once these boundary conditions are\
    \ determined, the focus is on predicting the target class. This process is known\
    \ as classification.\n\n## Terminology used in Classification Algorithms\n\nClassification\
    \ algorithms in machine learning use input training data to predict the likelihood\
    \ that subsequent data will fall into one of the predetermined categories. The\
    \ terms that get associated with classification include the following:\n\n- **Classifier:**\
    \ It is defined as an algorithm that relates the input data to a specific category.\n\
    - **Classification model**: A model that tries to draw conclusions from the input\
    \ values given for training.\n- **Feature**: It is an individual measurable property\
    \ of a phenomenon being observed.\n- **Binary Classification**: It classifies\
    \ a task having only two possible outcomes, for example, gender classification\
    \ (Male / Female).\n- **Multi-class classification**: It classifies a task having\
    \ more than two classes, with each sample assigned to only one target label.\n\
    - **Multi-label classification**: In this, each sample is mapped to a set of target\
    \ labels (more than one class).\n\n## Types of classification algorithms\n\nClassification\
    \ algorithms are broadly classified into the following:\n\n- **Linear classifiers**\n\
    \  A linear classifier classifies data into labels based on a linear combination\
    \ of input features. Therefore, it can only be used to classify data that is linearly\
    \ separable. Linear classifiers are further classified into the following:\n \
    \ - **Logistic regression**\n    It is most useful for understanding the influence\
    \ of independent variables on a single outcome variable. However, it works only\
    \ when the predicted variable is binary, and it assumes that all predictors are\
    \ independent of each other and the data does not have missing values.\n  - **Naive\
    \ Bayes classifier**\n    It is based on the Bayes theorem, assuming that there\
    \ is independence between every pair of features. It requires lesser amounts of\
    \ training data and is considered to be very fast compared to other methods. However,\
    \ it is said to be a bad estimator. In simple terms, a **Naive Bayes classifier**\
    \ assumes that the presence of a particular feature in a class is unrelated to\
    \ the presence of any other feature. Bayes theorem helps to compute posterior\
    \ probability P(c|x) from P(c), P(x) and P(x|c), as follows:\n    $$P(c | x) =\
    \ P(x1 | c) * P(x2 | c) * P(xn | c) * P(c)$$\n    Here,\n    - P(c|x) is the posterior\
    \ probability of class (target), given predictor (attribute).\n    - P(c) is the\
    \ prior probability of class.\n    - P(x|c) is the likelihood, that is, the probability\
    \ of a predictor given class.\n    - P(x) is the prior probability of the predictor.\n\
    \n## Support vector machines\n\nSupport vector machines represent the training\
    \ data as points in space separated by a gap as wide as possible. SVM is considered\
    \ to be effective in high-dimensional spaces and is also said to be memory efficient.\
    \ However, the algorithm does not directly provide probability estimates.\n\n\
    ![](img/05e0d1e671c636fe8ee73a026cd179da_87_0.png)\n\nFrom Figure 3.5, it is evident\
    \ that H1 is not a good hyperplane as it doesn’t separate the classes, H2 forms\
    \ a better hyperplane, but only with small margin, and H3 separates them with\
    \ maximum margin (distance).\n\n## k-nearest neighbor\n\nIt is a type of lazy\
    \ learning as it simply stores instances of the training data. Classification\
    \ is done through majority voting of the k-nearest neighbors of each point. It\
    \ is easy to implement robust to noisy training data and is effective if training\
    \ data is large. However, it needs to determine the value of K, and the computation\
    \ cost is high.\n\n## Decision trees\n\nThese algorithms produce a sequence of\
    \ rules that enable data classification and make the resultant groups as distinct\
    \ as possible. These are simple to understand and visualize. They can also handle\
    \ numerical and categorical data. However, complex decision trees can also be\
    \ created. However, they would not be able to generalize well, and small variations\
    \ in its data might result in a completely different tree.\n\n- **Random forest**\n\
    \  It is defined as a meta-estimator that fits several decision trees. However,\
    \ the samples are drawn with replacement and are difficult to implement.\n- **Neural\
    \ networks**\n  It consists of several units called neurons that are arranged\
    \ in layers. They convert an input vector into an output. Each unit takes an input,\
    \ to which a function is applied, and the unit passes the output to the next layer.\n\
    \n## Performance measures for classification\n\nThe most commonly used performance\
    \ metrics for classification problem include the following:\n\nAccuracy = (TruePositive\
    \ + TrueNegative) / Total observations\n\nAccuracy is defined as a ratio of correctly\
    \ predicted observation to the total number of observations:\n\nF1-Score: $\\\
    frac{2 \\times Precision \\times Recall}{Precision + Recall}$\n\nIt is defined\
    \ as the weighted average of precision and recall.\n\n**Precision**: How often\
    \ the prediction is correct when a positive value is predicted\n\n**Recall**:\
    \ The number of times the prediction is correct\n\n## Clustering\n\nClustering\
    \ is an unsupervised learning method whose objective is to find different groups\
    \ within the elements in the data. This involves grouping data points based on\
    \ the specified condition or criteria. Thus, datapoints in the same group have\
    \ similar properties or features, while those in different groups have different\
    \ characteristics.\n\nExamples of clustering include market segmentation, image\
    \ compression and document clustering.\n\n## Clustering algorithms\n\nVarious\
    \ clustering algorithms are incorporated to find the grouping between similar\
    \ data points. It is further used differentiate between clusters. These include\
    \ the following:\n\n## K-Means Clustering\n\nIt is the most widely known algorithm\
    \ that is easy to understand and implement. Further, k – means functions fast,\
    \ with only a few computations. However, in k-Means algorithm, number of groups\
    \ to be used must be determined beforehand, and it also starts with a random choice\
    \ of cluster centers; therefore, it yields different clustering results on different\
    \ runs of the algorithm and lacks consistency.\n\n## Mean-Shift Clustering\n\n\
    It determines the density of data points through a sliding-window-centroid – based\
    \ algorithm.\n\n- **Density-Based Spatial Clustering of Applications with Noise\
    \ (DBSCAN)**\n  It is a density-based clustering algorithm that does not require\
    \ a pre-set number of clusters. It identifies outliers as noise and can find arbitrarily\
    \ sized and shaped clusters. However, handling clusters with varying density is\
    \ a task with DBSCAN because of distance epsilon ε.\n- **Expectation–Maximization\
    \ (EM) Clustering using Gaussian Mixture Models (GMM)**\n  In this algorithm,\
    \ it is assumed that the data points are Gaussian distributed and can take any\
    \ elliptical shape due to the standard deviation parameter, which is then assigned\
    \ to a single cluster. They are said to be flexible and less restrictive. To add\
    \ to this further, GMM supports mixed membership, that is, GMM belongs to X-percent\
    \ in class 1 and Y-percent in class 2. In order to find the mean and standard\
    \ deviation parameters of the Gaussian for each cluster, an optimization algorithm\
    \ named **Expectation–Maximization (EM)** is undertaken as follows:\n  1. The\
    \ number of clusters is first selected by randomly initializing the Gaussian distribution\
    \ parameters for each cluster.\n  2. The probability of each data point belonging\
    \ to a particular cluster is then determined. When a point is closer to the Gaussian’s\
    \ center, it is considered to belong to that cluster.\n  3. New sets of parameters\
    \ are then computed using a weighted sum of the data point positions. The weights\
    \ specify the probability that the data point belongs to the specific cluster.\n\
    \  4. Steps 2 and 3 are repeated iteratively till convergence.\n\n## Agglomerative\
    \ Hierarchical Clustering\n\nHierarchical clustering is considered to be an alternative\
    \ to prototype-based clustering algorithm, where there is no need to specify the\
    \ number of clusters, it will find it by"

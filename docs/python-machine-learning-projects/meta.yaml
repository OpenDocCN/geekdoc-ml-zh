    # Predictive analytics


    It is defined as a statistical technique that uses machine learning and data mining
    techniques to predict and forecast likely future outcomes. Historical and existing
    data is analyzed and a model is generated to forecast likely outcomes. For example,
    in order to determine the amount of revenue generated for a software company,
    there would be a need to create a model. This model can be formed based on the
    historical sales data and marketing expenditures across multiple regions. This
    enables them to determine the impact of the marketing spend.

    As the name suggests, **Predictive analytics** is derived from two terms: **Predictive**,
    which deals with making predictions and **Analytics**, which performs analysis
    on the data.

    Therefore, it is said to be a branch of advanced analytics that is used to make
    predictions about unknown future events.


    # Importance of predictive analytics


    In order to analyze the current data and make predictions about future outcomes
    and performances, it uses techniques ranging from data mining and statistics to
    modeling, machine learning and artificial intelligence. These techniques focus
    on identifying the likelihood of a possible outcome based on the past or historical
    data provided. Thus, the aim of predictive analysis is to provide the best assessment
    of what will happen in the future.



- img_proc: true
  md: 'optimization algorithms, this chapter focuses on a few promising and widely
    used algorithms.


    # Single solution-based algorithms


    These algorithms are based on applying the heuristics on the single solution and
    finding the better solution. They work toward the betterment of the solution and
    use the exploitation method substantially. There are many popular algorithms available;
    let’s look at a few of them in brief:


    +   - Simulated Annealing

    - Tabu Search

    - Variable Neighborhood search


    # Simulated annealing


    This method is inspired by the slow cooling of metals. Cooling of metals is achieved
    by reducing the atomic movements, which, in turn, reduces the density of lattice
    defects till the lowest energy state is reached and the metal gets the desired
    structure. In algorithms, at every annealing temperature, a new solution is provided
    to the problem under consideration. Here, the temperature is the most important
    parameter to get an optimized solution.


    The steps of the algorithm are as follows:


    +   1. Start with the initial solution S₀ and set the initial temperature as t₀.

    2. A temperature reduction function, popularly called alpha, is required to be
    set up, which can be based on Linear Reduction rule, Geometric Reduction rule
    or Slow Decrease rule. Each reduction rule will decrease the temperature at a
    different rate.

    3. Here, the looping starts, and the next step is repeated until the termination
    condition is met. The termination condition is based on the value of low temperature
    with satisfactory performance.

    4. From the solutions generated, pick up one solution and calculate the difference
    between the costs of the old solution and the new solution. The solutions are
    generated by altering the parameter values.

    5. If the new solution cost is better, then accept that solution. After a certain
    amount of looping, the performance stabilizes and the final solution is solicited.


    Simulated Annealing is a very effective and simple to implement optimization algorithm
    and is used to solve many classic problems, like Travelling Salesman Problem and
    scheduling problems. The main advantage is that it sticks with local minima.


    # Tabu Search'
  merge: -1
  pgno: 229
- img_proc: true
  md: 'Tabu search is a stochastic optimization method that is effective because of
    local search methods and is generally used for mathematical optimizations. The
    strong point of Tabu search is that it uses memory effectively to store and track
    the previous solutions. This makes local search very effective. Tabu search explores
    good solutions so that intelligent search mechanisms can be employed to explore
    new potential regions. It uses adaptive memory, which helps in creating flexible
    and effective search strategy.


    The algorithm steps are as follows:


    +   1. Start with an initial solution S₀, which is any feasible solution to start
    with.

    2. Find the next neighboring solutions and start populating the Tabu list, which
    is the memory that stores either moves to solutions or complete solutions generated
    by the algorithm. The solutions in the Tab list satisfy the aspiration criteria.
    Aspiration criteria is optional and decides the quality of the solution. If the
    current solution is better, it is stored in Tabu List and remains there for a
    tenure called Tabu Tenure. The aspiration criteria ensures that stagnant solutions
    are not created.

    3. The new solution is compared with the previous solution and is included in
    the list if it is found to be better.

    4. The process is repeated till the termination criteria is met. The diversification
    in the solution space is ensured by giving a chance to potentially bad solutions
    as well. Diversification strategies are made so that newer regions are explored
    and moves that are not part of Tabu List are explored and given a chance.


    Tabu search is applied to both discrete and continuous mathematical optimization
    problems, and it is also used for solving problems in chemical and mechanical
    streams.


    # Variable Neighborhood Search


    Variable neighborhood search is used for solving combinatorial optimization problems
    and global optimization problems. The exploration is very strong in the neighborhood
    search, and a move to a new solution is made only if the improvement in current
    solution is seen. It uses effective local search methods in neighborhoods to get
    new solutions till local optima.


    The variable search algorithms consider that local minima provide some information
    about the global one. Thus, an organized search considering local optima is employed
    and requires very few parameters to be tuned in.


    # Population-based algorithms


    Population-based algorithms are more popular because they work on multiple solutions.
    These algorithms are inspired by nature, natural activities, behavior, biology,
    physics and even human activities like teaching and learning. These algorithms
    use'
  merge: -1
  pgno: 230
- img_proc: true
  md: 'exploration method or global search method substantially. Broadly, they can
    be categorized as follows:


    **Evolutionary techniques:** Evolutionary techniques are popular for training
    machine learning models. Evolutionary techniques use the biological concepts of
    natural selection, evolution and mutation. These techniques have proven beneficial
    for solving many real-life optimization problems effectively. The techniques are
    easy to implement and require only a few parameters to train the model. A few
    popular evolutionary techniques are as follows:


    +   - Genetic algorithm

    - Differential evolution

    - Evolutionary programming


    Genetic Algorithms: Genetic algorithms are popular optimization algorithm proposed
    by Holland. They are based on genetic, mutation and selection mechanisms. The
    generalized algorithm can be explained as follows:


    +   1. Generate initial random population.

    2. Calculate the fitness of the generated population and select only the fittest.

    3. Select the parents from this initial fit population.

    4. Select the genetic operator, either crossover operator or mutation operator,
    to generate the children.

    5. Repeat steps 2 to 5 until the stopping condition is met.


    The stopping condition is generally based on number of iterations required to
    get the optimal solution. The major parameters in genetic algorithms are fitness
    function and genetic operator. The new solution is generated using a genetic operator,
    either crossover or mutation. The crossover can be one-point crossover, two-point
    crossover, multi-point crossover or uniform crossover. The basic mutation chooses
    one or more genes to randomly change, and the invasion operator randomly chooses
    two gene points to inverse the genes. The selection of mutation operator depends
    on the encoding used, which can be binary encoding, natural numbers, real number,
    and so on. The selection operator also plays an important role in generation of
    new solution, and there are various election operators that can be used, such
    as roulette wheel selection, stochastic universal sampling, local selection and
    tournament selection.


    The genetic algorithm is the simplest to implement and is an effective optimization
    algorithm applied to various domains of engineering problems.


    # **Differential Evolution**


    Nonlinear and non-differential continuous space function optimizations can be
    solved effectively using differential evolution.'
  merge: -1
  pgno: 231
- img_proc: true
  md: 'The differential evolution algorithm starts with an initial population of candidate
    solutions, which are iteratively improved by introducing the mutations into the
    population and then crossover functions. The fittest candidate solutions that
    yield a lower objective function value are retained then. The main advantages
    of differential evolution are that control parameters are few, and it can handle
    nonlinear and non-differentiable multi-dimensional objective functions. The difference
    between genetic algorithm and differential evolution is that the solution is only
    updated when the new solution is better that the old one.


    The algorithm steps are as follows:


    +   1. Generate initial random population.

    2. Calculate the fitness of the generated population and select only the fittest.

    3. Execute the mutation operation and crossover operation and then select the
    children using selection operation.

    4. Add the optimized solutions to the population.

    5. Repeat steps 2 to 5 until the stopping condition is reached.


    The fitness function here controls the size of population and maintains the fittest
    values only.


    # Evolutionary Programming


    Evolutionary programming is a stochastic optimization strategy that helps solve
    numerical and combinatorial optimization problems. The convergence rate of evolutionary
    programming is rarely slow, and the main variation operator here is mutation.


    The basic steps in evolutionary programming are as follows:


    +   1. Generate the initial random population. The speed of optimization depends
    on the number of populations, so generating number of solutions in the population
    is important.

    2. The generated population is tested for fitness, and only fit solutions are
    retained. Generally, a stochastic tournament determines the solutions to be retained
    in the population.

    3. New children or offsprings are generated using mutation. The offsprings are
    mutated according to the distribution of mutation type, which ranges from minor
    to extreme. The mutation brings functional changes in the parents and is judged
    based on this change.

    4. Steps 2 and 3 are repeated until the stopping criteria is met.


    One thing to note here is that evolutionary programming does not use genetic or
    crossover operator to generate offspring.'

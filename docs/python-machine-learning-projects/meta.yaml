    0       Bob\n1    Jessica\n2       Mary\n3       John\nName: Names, dtype: object\n\
    ```\n\n这里，显示了索引值为 10 的 'Name' 列中的数据。第二个命令显示了从索引 0 开始到 3 结束的行中 'Name' 列的值。\n\n\
    **示例 9：**\n\n```python\n>>>df.iloc[10,1]\nDimple\n>>>df.iloc[0:3,1]\n0    1968\n\

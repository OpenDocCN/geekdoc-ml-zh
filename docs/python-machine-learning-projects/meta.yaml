  md: '**Unsupervised learning:** In this method, unlabeled, uncategorized data is
    input to the system. The respective machine learning algorithm acts on this data
    without prior training, so the output of the system depends on the coded algorithms.

    Unsupervised learning is further divided into two categories:


    +   - **Clustering:** In this, members with similar features are combined. However,
    the group, labels are not known prior. Methods used for clustering include Gaussian
    mixtures, K-Means Clustering, Boosting, Hierarchical Clustering, K-Means Clustering,
    and Spectral Clustering.

    - **Association:** In this, the algorithm tries to learn without the availability
    of labeled data. It aids in discovering interesting relations between variables
    in large databases. The methods used are Associative rule mining and Mining Multilevel
    Association Rules from Relational Databases and Data Warehouses.


    # Training and testing the model on data


    To get an accurate output, the input to the system and the algorithm used need
    to be just right. To achieve an optimized training model, the data is split into
    three parts:


    +   - **Training data:** The classifier is trained using this data.


    The equation for straight line is y=mx+b, where x is the input, m is the slope
    of that line, and b is the y-intercept. As the slope m can take up a number of
    values, the slope can be represented by “weights” matrix and can have a bias associated
    with it, as shown in *Figure 3.4*:


    ![](img/05e0d1e671c636fe8ee73a026cd179da_81_0.png)


    This process is then repeated. Each iteration or cycle of updating the weights
    and biases is called one training “step”. When the training is initiated, considering
    the preceding example, a random line is drawn through the data. As each step of
    the training progresses, the line moves, step by step, closer to the ideal line.
    The entire'

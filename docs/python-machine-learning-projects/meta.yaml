    # 7. Explain the various metrics used to evaluate ML algorithms.


    Ans. When we talk about predictive models, we are talking either about a regression
    model (continuous output) or a classification model (nominal or binary output).
    The evaluation metrics used in each of these models are different.


    In classification problems, we use two types of algorithms (based on the kind
    of output they create):


    +   1. **Class output**: Algorithms like SVM and KNN create a class output. For
    instance, in a binary classification problem, the outputs will be either 0 or
    1. Today we have algorithms that can convert these class outputs to probability,
    but these algorithms are not well accepted by the statistics community.

    2. **Probability output**: Algorithms like Logistic Regression, Random Forest,
    Gradient Boosting and Ada boost give probability outputs. Converting probability
    outputs to class output is just a matter of creating a threshold probability.


    In regression problems, we do not have such inconsistencies in output. The output
    is always continuous in nature and requires no further treatment.


    # Confusion Matrix


    A confusion matrix is an N * N matrix, where N is the number of classes being
    predicted. For the problem at hand, we have N=2, and hence, we get a 2 X 2 matrix.
    Here are a few definitions you need to remember for a confusion matrix:


    +   - **Accuracy**: The proportion of the total number of predictions that were
    correct

    - **Positive Predictive Value or Precision**: The proportion of positive cases
    that were correctly identified

    - **Negative Predictive Value**: The proportion of negative cases that were correctly
    identified

    - **Sensitivity or Recall**: The proportion of actual positive cases that are
    correctly identified.'

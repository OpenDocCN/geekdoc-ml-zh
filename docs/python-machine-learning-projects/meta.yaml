    \ 属性指定。\n\nMatplotlib 库提供了许多其他类型的可视化技术，如堆叠柱状图和箱线图。这里讨论的图表是最常用和广泛使用的，用于有效理解或可视化数据。\n\
    \n## 机器学习系统评估\n\n如前面章节所述，一旦问题被定义，就必须准备数据。数据大致分为训练数据和测试数据，可以在其上应用各种机器学习算法来解决你的问题。\n\
    \n## 测试和训练数据集\n\n训练和测试数据是通过从数据集中随机选择 66% 的数据样本用于训练，34% 用于测试，或使用其他复杂的采样方法获得的。然后根据测试集评估训练好的数据。为了测试算法，我们需要定义一个测试框架。\n\
    \n测试框架是用于指定将用于训练和测试算法的数据的术语。它根据度量标准评估系统，并评估其性能，代表问题陈述的可学习性。因此，测试框架的主要目标是能够快速且一致地根据对所解决问题的公平表示和所选性能度量来测试算法。\n\
    \n## 性能度量\n\n它是对训练模型在测试数据集上所做的预测的测量。因此，性能度量提供了一种评估所考虑问题解决方案的机制。\n\n根据问题的类别（如分类、回归和聚类），确定了许多性能度量。这些分数确定了相关性，并对问题领域提供了有意义的见解。\n\

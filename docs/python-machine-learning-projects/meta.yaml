    # Uses or applications of Predictive Analytics


    Predictive analytics are utilized by various organizations to help them solve
    difficult problems, uncover new opportunities and aids by acting as a decision-making
    tool. Predictive analytics is used in a variety of industries, and can be relevant
    and applied in many sectors, such as banking and financial services, retail, pharmaceuticals,
    healthcare, insurance, oil gas and utilities, government public sectors, and aerospace.
    These analytics can be used in a number of areas:


    **Forecasting:** Predictive analytics has an important role in the manufacturing
    sector. As manufacturing units work on the principle of supply chain management,
    it requires the right amount of data to be input to the system. This ensures smooth
    functioning of the manufacturing system and maintaining timelines. Therefore,
    to ensure optimal utilization of resources, there is a need to forecast the right
    amount of resources (data) at the input and maintain proper inventory of the raw
    material required for manufacturing the product. Predictive modeling enables such
    accurate forecasts by providing clean, good-quality and correct amount of data
    as input.


    **Reducing Risks:** Based on a consumer’s behavior and credit history, their credit
    ratings are determined. This helps the application categorize the consumers into
    premium customers, regular, defaulter customers, corporate spying or cyber-attacks.
    Predictive analytics thus helps to determine the credit rating of an applicant
    or consumer. Based on the applicant’s credit history, it is determined whether
    the consumer will be able to repay the extended credit. Thus, predictive analytics
    is used to predict the risk that the applicant might fail to perform on any credit
    extended.


    **Underwriting:** Insurance companies need to determine whether they will have
    to shell out money on claims made by the applicants on various causes, on a case-to-case
    basis. This would ensure that the company would be able to manage their financial
    portfolio accordingly. The method employed by the companies is to analyze the
    past records of the applicant as well as the claims filed by similar policyholders.
    These predictions can be performed by applying several predictive analytics models.'

    # Recommendation Generation


    Recommendations are the suggestions given to users with respect to items bought
    frequently or the most popular items.


    # Importance of recommendation systems


    There is explosive growth in the amount of digital content on the internet. Many
    keep accessing, updating and adding information on the internet. All this leads
    to the problem of information overload, which, in turn, hinders timely access
    to items of interest.

    Apart from this, there has been a huge increase in the number of choices and timely
    access to the dynamic generation of information.

    There is a need to have a system that segregates, prioritizes, personalizes and
    efficiently delivers relevant information to the user. One such system is the
    recommender system.

    Recommender systems search a huge amount of dynamically generated information
    and data usage history. These systems estimate and predict user content preference
    and provide users with the content and services of their choice and interests.
    Thus, these systems filter out vital information and predict or recommend an item
    to the user based on their preference. Thus, recommender systems are an important
    class of machine learning algorithms that offer “relevant” suggestions to users.

    Examples of companies using recommendation systems include Amazon, Facebook, LinkedIn,
    YouTube and Netflix. Recommendation systems provide customer satisfaction, save
    user browsing time and increase the consumption time at the website. All this
    results in revenue generation for the organizations handling those websites.


    # Key terms used


    Let’s look at the key terms associated with recommender systems.'
  - '[PAGE 149]


    # Items/Documents


    These represent the entities recommended by the recommender system.


    # Query/Context


    The recommender system determines relevant information to recommend items to the
    users. This information forms the query that can be a combination of user Information,
    such as user ID or items the user previously interacted with along with the user’s
    device and their location as additional context.


    **Embedding:** Embeddings represent categorical features as continuous-valued
    features. In other words, they translate a high-dimensional vector into a low-dimensional
    space known as an embedding space. In this case, queries or items to recommend
    have to be mapped to the embedding space.


    Two commonly used recommendations are given here:


    +   - **Home page recommendations:** In this, personalized home pages are provided
    based on users’ interest. These are often used as content-based recommendations.

    - **Related item recommendations:** These recommendations are based on determining
    related or similar items. This works on the fundamentals of collaborative filtering.


    # Approaches for building recommendation systems


    Recommender systems are categorized as either content-based system or collaborative
    filtering.


    *Figure 4.1* represents the various techniques used for building accurate and
    efficient recommendation systems:'
  - '[PAGE 150]


    ![](img/05e0d1e671c636fe8ee73a026cd179da_150_0.png)


    Figure 4.1: Techniques used for Recommendation systems


    Various approaches include the usage of the following.


    **Content-based filtering:** In this method, the predictions are based on the
    information provided by the users/users’ profiles, while the choices or similarity
    of choice of other users are ignored. This information is obtained using the features
    extracted from the content of the items the user has evaluated in the past. Thus,
    it can be said that this method matches the user’s characteristics. Meaningful
    recommendations are generated by applying various models that could include the
    following:


    +   - Vector space models like **Term Frequency Inverse Document Frequency(TF/IDF)**

    - Probabilistic models like Naïve Bayes Classifier, Decision Trees or Neural Networks
    to model the relationship between different documents within a corpus


    **Collaborative filtering:** It is the most commonly used filtering method, and
    it recommends items based on the identification of the products by similar choices
    of other users. It uses their opinion to recommend items to the active user.

    It includes building a database in terms of a user-item matrix of preferences
    by the users. It further matches users with relevant interests and preferences.
    These are done by calculating similarities, called neighborhoods, between their
    profiles to'
  - '[PAGE 151]


    make predictions or recommendations. Predictions are represented by a numerical
    value, Rij, expressing the predicted score of item j for user i while recommendations
    indicate a list of top N items that the user would prefer the most.


    Collaborative filtering is further classified into two categories:


    +   - **Memory-based:** In this, the items already rated by the user play a relevant
    role in searching for a neighbor that shares similar preferences.

    - **Model-based:** This technique analyzes the user-item matrix to identify relations
    between items; they use these relations to compare the list of top-N recommendations
    and employ the previous ratings to learn a model.


    For example, Amazon generates a table of similar items offline using an item-to-item
    matrix and then recommends other similar products based on users’ purchase history.


    **Hybrid filtering:** In order to increase the accuracy and performance of the
    recommender system, hybrid filtering is used. It combines two or more filtering
    techniques. Based on their operations, hybrid systems are classified into weighted
    hybrid, mixed hybrid, switching hybrid, feature-combination hybrid, cascade hybrid,
    feature-augmented hybrid and meta-level hybrid.


    Applying the concept of machine learning, hybrid approaches for recommender systems
    can be implemented by utilizing the following concepts:


    +   - Content-based and collaborative-based predictions separately

    - Combining the content-based capabilities and collaborative-based approach, or
    by unifying the approaches into a single model


    Combining the content-based capabilities and collaborative-based approach can
    aid in overcoming the cold start, the sparsity problem and the knowledge engineering
    bottleneck in knowledge-based approaches. However, out of the various recommendation
    approaches stated, content-based recommendation results in an accurate recommendation.


    # Basic recommendation systems


    The architecture for recommendation systems broadly consists of the candidate
    generation, scoring and re-ranking components.


    # Candidate Generation'
- md: 'At this stage, from the huge corpus of data available, the system generates
    a smaller subset of candidates. The aim is that given a query, the system generates
    a set of relevant candidates.


    Two common candidate generation approaches are listed in Table 4.1:


    | Type | Example |

    |---|---|

    | Content based filtering | If user A watches two cute cat videos, then the system
    can recommend cute animal videos to that user. |

    | Collaborative filtering | If user A is similar to user B, and user B likes video
    1, then the system can recommend video 1 to user A (even if user A hasn''t seen
    any videos similar to video 1). |


    **Table 4.1:** *Candidate generation approaches*


    Both content-based and collaborative filtering map each item and query (or context).


    These embeddings are used for candidate generation as follows: Given a query embedding
    q∈E, the system looks for item embeddings x∈E that are close to q, that is, embeddings
    with high similarity s(q,x). To determine the degree of similarity, the recommendation
    systems rely on cosine, dot product or Euclidean distance measures, where:


    - Cosine is the cosine of the angle between the two vectors, s(q, x) = cos(q,
    x)

    - The dot product of two vectors is given by s(q, x) = ||x||||q||cos(q, x)

    - Euclidean distance is given as (q, x) = ||q - x|| = $\sum_{i=1}^{n} q_i - x_i$
    smaller distance means higher similarity


    ## Scoring


    Another model then scores and ranks the candidates so that the most relevant information
    is in the top10 items displayed on the screen.


    ## Re-ranking


    Re-ranking is required so that the user''s likes/dislikes, and other preferences
    and constraints are considered.


    ## Recommendation generation


    To perform the recommendation, the system undergoes several phases:


    ### Information collection phase


    In this phase, information such as the behaviour and the resources the user accesses
    is collected. Based on which, a user’s profile or model is created. This acts
    as the input to the system. Thus, the user’s preference data is collected in two
    ways:


    - **Explicit data:** Here, the users are directly asked whether they like a particular
    item. Based on this data, the profile is built as per the user’s interest. However,
    the drawback of this type of collection is that not every user gives feedback
    or rating; even if they do so, it may mean different to different people.

    - **Implicit Data:** In this, the information is derived from the users’ interaction
    with the site. This interaction, by observing user behavior, is interpreted as
    an indication of the users’ interest or disinterest.


    ### Learning phase


    In this phase, learning algorithms are applied on the data captured in the information
    collection phase.


    ### Prediction/recommendation phase


    It recommends or predicts the items the user may prefer. *Figure 4.2* highlights
    the recommendation phases:


    ![](img/05e0d1e671c636fe8ee73a026cd179da_153_0.png)


    *Figure 4.2: Recommendation phases*


    ## Evaluation metrics for recommendation algorithms


    Accuracy and coverage are mainly considered as the evaluation metrics for recommending
    users/items based on the type of filtering technique.


    **Accuracy:** It is defined as the number of correct recommendations out of the
    total possible recommendations. Statistical and decision support accuracy metrics
    further determine the accuracy of recommendation systems.


    ### Statistical accuracy metric


    It evaluates the accuracy of the technique used by comparing the predicted ratings
    directly with actual user ratings through the following:


    **Mean Absolute Error (MAE):** It is determined as follows:


    ![](img/05e0d1e671c636fe8ee73a026cd179da_154_0.png)


    Where $P_{ui}$ is the predicted rating for user $u$ on item $i$, $r_{ui}$ is the
    actual ratio and $N$ is the total number of ratings on the item set. The lower
    the MAE, the more accurate the recommendation. It is given by the following:


    **Decision support accuracy metrics:** It helps the users in selecting the high-quality
    items out of the available set of items. These metrics include reversal rate,
    weighted errors, **Receivers Operating Characteristics (ROC)**, **Precision-Recall
    Curve (PRC)**, precision, recall and *F*-measure. Precision and recall are the
    most preferred evaluation metrics and are determined as follows:


    **Precision:** It is represented as the fraction of recommended items that is
    actually relevant to the user.


    $Precision = \frac{TP}{TP+FP}$ where $TP$-True Positive, $FP$-False Positive


    **Recall:** It is defined as *the fraction of relevant items that are also part
    of the set of recommended items*


    $Recall = \frac{TP}{TP+FN}$ where TP=True Positive, FN=False Negative


    **Coverage:** *It measures the fraction of objects in the search space the system
    is able to provide recommendations or predictions for.*


    ## Case study on Recommendation system: E-learning system domain


    In today’s scenario, the education system has grown leaps and bounds; it has everything
    ranging from regular academics and remote to distance learning, on-your-own-pace
    learning, and certification courses. Therefore, it becomes a challenging task
    for any student (person) to identify the right type of course, the teaching and
    learning approach, and the benefits that could be derived from these courses,
    based on their preferences and requirements.


    To overcome this issue, **Recommender Systems (RS)** are used to recommend the
    course or a list of similar courses that a student can undertake, based on their
    preferences.


    ### Recommender systems


    Many users undertake a number of courses to improve their skill sets. However,
    there is a lot of confusion and anxiety as to the type of course to be undertaken,
    the most efficient, in-demand course at a particular time or the most beneficial
    course for them. Identifying a suitable course for an individual can be tedious
    as it would involve accessing several platforms, searching for the available courses,
    selecting courses, reading each course syllabus carefully, and choosing appropriate
    content.


    ### Problem definition


    Gathering and consolidating information from multiple sources to make useful recommendations
    is a hard problem that many recommendation systems attempt to solve. There is
    a need for a recommender system to enhance the effectiveness of course choice.


    ### Objective of the case study


    The objective of this study is to do the following:


    - Design and develop a hybrid Recommender system that can be integrated to enhance
    the effectiveness of any E-learning system.

    - To ease information access and provide personalization to learners.


    Need for the system: In order to provide correct, accurate and the best-suited
    course for an individual, a model needs to be developed. The inputs to the system
    have to be based on the requirements of the users, courses and feedback of the
    correctly recommend courses.


    Further, a number of statistical and sentimental analysis parameters will need
    to be considered.


    A hybrid recommendation model is required based on features of users, courses
    and feedback to correctly recommend the courses. Various statistical and sentimental
    analysis related parameters are used to give a recommendation based on the existing
    (prior) dataset. These features could include information (features) about the
    various courses/professors, ratings of the topic along with the passing percentage
    and the subject structure to give the best recommendation.


    ### Considerations for the case study


    The focus for developing the e-learning recommender system is to guide the learner
    to select the courses as per their requirement. Therefore:


    - a. Deep learning mechanisms need to be incorporated to extract meaningful features
    and provide learning through multiple levels of representation and abstraction.

    - b. Ontology to retrieve useful information and make accurate recommendations.


    Therefore, there is a need to apply deep learning and ontology mechanisms to get
    an accurate recommendation system, leading to what is called the hybrid model.


    ### System development


    To develop the recommender system, various steps need to be performed where the
    individual taking the course can be considered to be a student.


    The recommendation system development can follow the **System Development Life
    Cycle (SDLC)** approach. SDLC is essential to ensure that the appropriate system
    is developed and meets the requirements in terms of features, usability,'
  mdcn: '在此阶段，系统从海量可用数据中生成一个较小的候选子集。其目标是，给定一个查询，系统能生成一组相关的候选项目。



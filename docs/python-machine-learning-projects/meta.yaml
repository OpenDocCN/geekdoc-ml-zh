    # Building a predictive model


    Prior to building a predictive model, we need to identify the historical data
    and the outcome that needs to be predicted. This is because the model can infer
    outcomes from historical data but cannot predict the data it has never seen before.
    Here are the steps used to build a predictive analytics model:


    +   1. **Ensure correctness of the input data:** The correctness of the data input,
    both in terms of its volume and breadth, is critical to determine an accurate
    prediction.

    2. **Clean the data:** Various ways to clean, transform and combine the raw data
    need to be determined for better predictions. The data so obtained needs to be
    properly transformed into appropriate data features that are most suitable for
    a given model.

    3. **Remove unwanted data:** Removing data that is not relevant to a model needs
    to be eliminated as the additional data can slow the model down or lead to less
    accurate models.

    4. **Determine the predictive modeling approach to be used:** Approaches like
    parametric and non-parametric approaches need to be chosen to perform predictive
    modeling and analytics.

    5. **Preprocess the data into a form suitable for the chosen modeling algorithm:**
    The cleaned and transformed data, as represented in step 2,'

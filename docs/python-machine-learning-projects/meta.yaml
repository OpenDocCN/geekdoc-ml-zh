  md: 'algorithms, which are used over a wide variety of applications. This algorithm
    is widely applied in biometric and biomedical systems.


    # Cuckoo Search Optimization


    The basic algorithm is explained as follows:


    +   - Each cuckoo selects a nest arbitrarily and lays an egg in it.

    - The best nests among the nests with increased quality of eggs are considered
    for the following generation.

    - For a specified quantity of nests, a host bird finds a foreign egg with a probability
    of [0, 1]. Under such conditions, the host bird may either desert the nest or
    throw the egg and then build a new nest in other places.


    The final condition can be approximated by substituting a fraction of the n host
    nests with novel ones. The fitness or quality Bi of a solution is equivalent to
    the value of the objective function. From the execution point, the demonstration
    followed is that every egg in a nest indicates a solution, and every cuckoo can
    lay only one egg, that is, one solution. In addition, no reverence can be carried
    out among an egg, a cuckoo or a nest.


    The objective is to exploit the novel and capable cuckoo egg (solution) to substitute
    the worst solution in the nest. The CS approach is effectual for general optimization
    issues as it sustains a balance between global random walk and the local random
    walk. The equilibrium between global and local random walks is adjusted by a switching
    constraint Pr ε [0,1]. Global and local random walks are demonstrated by Eq. (1)
    and Eq. (2), respectively.


    Accordingly, in Eq. (1), and denote the present positions chosen by arbitrary
    permutation, β indicates the positive step size scaling factor, indicates the
    subsequent position, s denotes the step size, indicates the product of two vectors,
    F signifies the heavy side function, Pr symbolizes a variable that is exploited
    to switch among global and random walks, and ε denotes an arbitrary variable from
    uniform distribution.


    In Eq. (2), M (s, τ) indicates Levy distribution exploited to describe the step
    size of an arbitrary walk. The Levy flight offers an arbitrary walk when the random
    step length is obtained from a Levy distribution, as shown in Eq. (3). It includes
    an infinite variance with an infinite mean. In Eq. (3), t indicates the count
    of iteration and λ = 0, 1, 2, 3.


    ```

    $$Y_i^{t+1} = Y_i^t + \beta s \otimes F(Pr - \varepsilon) \otimes (Y_j^t - Y_k^t)
    \quad (1)$$

    $$Y_i^{t+1} = Y_i^t + \beta M(s, \tau) \quad (2)$$

    $$Levy \approx u = \varepsilon^{-\lambda} \quad (3)$$

    ```


    The CS algorithm suggested by Yang and Deb works on three basic conditions:


    +   - Only one egg at one time is laid by the cuckoo. This egg is then dumped
    in a randomly chosen nest.'

    - 教育系统学习分析案例研究\n- 面临的挑战\n- 方法\n- 其他案例研究\n- 结论\n\n## 5. 机器学习算法中的优化\n\n- 引言\n- 结构\n\
    - 目标\n- 优化——机器学习项目的需求\n  - 优化技术的类型\n    - 传统方法\n    - 元启发式方法\n  - 基本优化技术\n   \
    \ - 反向传播优化\n    - 梯度下降优化\n- 优化的元启发式方法\n  - 元启发式算法的类型\n    - 基于单解的算法\n    - 基于种群的算法\n\
    - 通过优化学习参数改进机器学习算法\n  - 案例研究1：医疗保健中的元启发式优化技术\n  - 案例研究2：批量生产中的遗传算法（GA）\n- 使用Python进行优化\n\
    - 结论\n- 问题\n\n## 索引\n\n# 第1章\n机器学习导论\n\n## 引言\n\n术语*机器学习*由*亚瑟·塞缪尔*于1959年提出。这个术语背后的基本思想是“机器能否做到我们人类能做的事情？”，而不是问“机器能思考吗？”。这些问题推动了机器学习的发展，其中机器像人类一样，倾向于从经验中学习。目标是随着经验的积累提高性能。本章介绍相关术语，如数据科学、数据挖掘、人工智能、机器学习和深度学习。主要重点是让你熟悉机器学习中使用的方法和技术。为了理解核心概念，本章探讨了任何给定机器学习算法的工作过程。近年来，机器学习技术有了显著改进，这通过开发机器学习算法时的各种应用、局限性和面临的挑战进行了阐述。\n\
    \n## 结构\n\n在本章中，我们将讨论以下主题：\n\n- 机器学习导论\n- 机器学习模型\n  - 通过训练的监督机器学习模型\n  - 无监督机器学习模型\n\
    \  - 半结构化机器学习模型\n  - 强化机器学习模型\n- 机器学习算法的工作原理\n- 机器学习项目的挑战\n- 机器学习的局限性\n- 机器学习的应用领域\n\
    - 数据科学、数据挖掘、机器学习和深度学习这些术语之间的区别\n\n## 目标\n\n完成本章后，你将能够理解各种关键术语和机器学习的基础知识。此外，你将能够理解机器学习的类型、模型和机制。你将熟悉应用机器学习算法时观察到的挑战和局限性。这些将通过多个应用领域以及所采用的各种相关技术之间的差异进行阐述。\n\
    \n## 机器学习（ML）导论\n\n机器学习被定义为计算机系统通过启用算法从提供数据的环境中学习的能力。这些算法收集见解，并在最少的人为干预下做出数据驱动的决策。这使我们能够对先前未分析的数据进行预测。因此，无需编写代码，只需将数据馈送给通用算法，算法/机器就会根据给定数据构建逻辑。这有助于根据其经验改进输出，而无需任何显式编程。因此，可以说机器学习是一个与数据科学密切相关的术语，它涉及观察和研究数据或经验以识别模式，并基于发现建立推理系统。描述机器学习的另一种方式是，它是一门构建能够通过从示例中学习来完成任务的硬件或软件的科学。\n\
    \n示例以{输入，输出}对的形式出现。当给出新的输入时，经过训练的机器可以预测输出。例如，对在线购买产品的推荐或对购买该产品的人员的建议就是机器学习。机器学习中使用的术语包括称为**标签**的目标，统计中使用的变量称为**特征**，统计中的转换称为**特征创建**。\n\
    \n## 机器学习中的模型\n\n机器学习模型可以分为三种基本模型：监督学习、无监督学习和强化学习。\n\n## 通过训练的监督机器学习模型\n\n监督学习被认为是通过训练机器或模型获得的学习。经过训练后，可以对新数据（也称为测试数据）进行预测。\n\
    该模型在提供给系统的数据上工作。可用数据分为**训练**数据和**测试**数据。监督学习模型分析给定的训练数据并从中得出推论。因此，在监督机器学习模型中，输入和输出对之间的映射以及数据的正确标记至关重要。\n\
    监督模型的主要目标是利用历史数据，理解其行为，并根据数据库中可用和维护的历史数据确定未来的预测。\n例如，要区分植物和花卉，需要提供两个类别的少量标记图片。这将使机器学习算法能够根据其特征进行区分、识别和学习。一旦算法经过训练，对剩余图像的分类将变得容易得多。\n\
    \n## 无监督机器学习模型：自给自足的学习\n\n这种模型不使用任何分类或标记的参数。它通过观察学习，并在数据中发现结构。它专注于从未标记的数据中发现隐藏的结构、模式和关系，这通过创建多个集群进行进一步分析来增强系统的功能。\n\
    无监督系统或其算法没有被给予“正确答案”。算法需要通过迭代深度学习方法来确定、解释和审查其数据，并从展示给它们的内容中得出结论。无监督学习可以使用生成学习模型和基于检索的方法。"

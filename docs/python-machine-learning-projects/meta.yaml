    \ developing the recommendation system\n\nFollowing are the limitations while\
    \ developing the recommendation systems:\n\n+   - **Data sparsity**\n  Data sparsity\
    \ is the term used to describe the phenomenon of not observing enough data in\
    \ a dataset.\n  For example, as mentioned earlier, collaborative filtering methods\
    \ recommend courses based on user's past preferences. Therefore, new users of\
    \ the system will need to rate enough courses to enable the systems to capture\
    \ their preferences accurately and provide reliable recommendations. Similarly,\
    \ when new courses are added to the system, they need to be rated by a substantial\
    \ number of users before they can be recommended to users.\n  Thus, identification\
    \ of the right type of algorithm for recommending a course is very important.\n\
    - **Cold Start Problem**\n  The cold start problem occurs when the system is unable\
    \ to form any relation between users and the course for which it has insufficient\
    \ data. There are two types of cold-start problems:\n  - **User cold-start problems:**\
    \ When there is almost no information available about the user\n  - **Product\
    \ (course) cold-start problems:** When there is almost no information about the\
    \ course asked for\n\nThe reasons due to which the system fails to give recommendations\
    \ include the following:\n\n+   - **Systematic Bootstrapping**\n  It represents\
    \ the starting of the system when there is almost no information on which the\
    \ recommender may rely.\n- **Low Interaction (Few instances available)**"
- md: "When new courses are added to the catalogue, the item cold-start problem occurs\
    \ when there are none or very few interactions. This forms a problem for collaborative\
    \ filtering algorithms as they generate recommendations based on the item’s interactions.\
    \ However, if a few interactions are available, a collaborative algorithm can\
    \ recommend the course. However, the quality of those recommendations would be\
    \ poor.\n\n- **Entry of new users**\n  This problem occurs when a new user enrolls\
    \ in the system and the recommender is required to offer recommendations for a\
    \ set length of time without depending on the user’s previous interactions, as\
    \ none have been recorded yet. This issue is important as the user who would receive\
    \ poor-quality recommendations may opt to leave the system before giving enough\
    \ interaction to allow the recommender to understand their interests. Their preferences\
    \ are obtained to create an initial user profile, especially when dealing with\
    \ new users.\n- **Lack of Data**\n  A lot of data is required to make effective\
    \ recommendations.\n\n## Evaluation Metrics\n\nEvaluation is important for assessing\
    \ the effectiveness of recommendation algorithms. The commonly used metrics can\
    \ include the following:\n\n- Accuracy\n- The mean squared error\n- Root mean\
    \ squared error\n\nInformation retrieval metrics that are useful to assess the\
    \ quality of a recommendation method include the following:\n\n- Precision\n-\
    \ Recall\n- Diversity\n- Novelty\n- Coverage\n\n## Text Analysis and Mining\n\n\
    Text mining is defined as the non-trivial extraction of hidden, previously unknown\
    \ and potentially useful information from a large amount of textual data.\n\n\
    Text mining operates on unstructured or semi-structured data sets like emails,\
    \ text documents and HTML files. Text mining (also referred to as *text analytics*)\
    \ is an **Artificial Intelligence (AI)** technology that uses **Natural Language\
    \ Processing (NLP)** to transform the free (unstructured) text in documents and\
    \ databases into normalized, structured data suitable, identify meaningful patterns\
    \ and new insights for analysis. Through use of advanced machine learning algorithms\
    \ like Naïve Bayes, Support Vector Machines (SVM) and other deep learning algorithms,\
    \ several organizations can explore and discover hidden relationships within their\
    \ unstructured data.\n\nThe terms, text mining and text analytics are used interchangeably.\
    \ Through the use of machine learning algorithms, statistics and linguistics,\
    \ textual patterns and trends within the unstructured data can be identified.\
    \ By utilizing text mining and text analysis, further quantitative insights can\
    \ be obtained on the structured data.\n\n### Importance of text mining\n\nText\
    \ mining, also known as text analytics systems, focuses on determining key knowledge\
    \ from a corpus of texts, like its relevance to the designated subject, and representing\
    \ the details of its content, such as any specific entities and its linkages.\
    \ Text mining tools analyze documents to identify entities and extract relationships\
    \ between them, unlocking hidden information to identify and develop new hypotheses.\
    \ Thus, text mining can be used to make large quantities of unstructured data\
    \ accessible. By extracting information, patterns, trends and insights hidden\
    \ in large amounts of information can be made available. Text being one of the\
    \ most common data types within databases, its data can be organized as follows:\n\
    \n- **Structured data:** This data consists of maintaining the information in\
    \ standardized row and column format that is, a tabular format. This makes it\
    \ easier to process, store and apply various machine learning algorithms on the\
    \ available data. Structured data can include inputs like names, addresses, and\
    \ phone numbers.\n- **Unstructured data:** Unlike structured data, this data does\
    \ not have a predefined data format. The data represented can include text information\
    \ from several sources, such as text information from social media, product reviews\
    \ or information from rich media formats like video and audio files.\n- **Semi-structured\
    \ data:** This is a combination of structured and unstructured data formats, where\
    \ an organization might not have enough structure nor a format to meet the requirements\
    \ of a database; examples include XML, JSON and HTML files.\n\nAs 80% of data\
    \ in the world is present in an unstructured format, text mining forms an important\
    \ practice in organizations.\n\n### Basic blocks of text mining system using ML\n\
    \nText mining involves considering unstructured text data as input and processing\
    \ it. This processing deals with handling parsing, along with the addition of\
    \ some derived linguistic features, deriving patterns within the structured data\
    \ final evaluation and interpretation of the output, as indicated in *Figure 4.5*:\n\
    \n![](img/05e0d1e671c636fe8ee73a026cd179da_164_0.png)\n\nText analysis involves\
    \ information retrieval information extraction, data mining techniques like association\
    \ and link analysis, visualization, and predictive analytics. The goal is to turn\
    \ text (unstructured data) into data (structured format) for analysis by utilizing\
    \ **Natural Language Processing (NLP)** methods. The various activities performed\
    \ to mine the text and determine the patterns are represented in the following\
    \ *figure 4.6*:\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_165_0.png)\n\nBefore\
    \ applying various text mining techniques, text preprocessing needs to be performed,\
    \ as represented in [Figure 4.6](#figure-46).\n\n**Text preprocessing:** This\
    \ step includes cleaning and transforming text data into a usable format. Once\
    \ text preprocessing is complete, based on the relevant attribute generation,\
    \ a number of text mining algorithms can be applied to derive insights from the\
    \ data.\n\n**Text transformation (attribute generation):** A text document is\
    \ represented by the words (features) it contains and their occurrences. Two main\
    \ approaches of document representation are Bag of words and Vector Space.\n\n\
    **Feature or attribute selection:** Feature selection, also known as variable\
    \ selection, is the process of selecting a subset of important features for use\
    \ in model creation. The main assumption when using a feature selection technique\
    \ is that the data contains many redundant or irrelevant features that provide\
    \ no extra or relevant information in any context. Feature selection technique\
    \ is a subset of the more general field of feature extraction.\n\n**Data mining:**\
    \ At this point, the text mining process merges with the traditional data mining\
    \ process. Classic data mining techniques are used in the structured database\
    \ that resulted from the previous stages.\n\n**Evaluate:** The result is evaluated\
    \ at this stage. After evaluation, the result can be discarded, or the generated\
    \ result can be used as an input for the next set of sequence.\n\n### Steps involved\
    \ in preparing an unstructured text document for deeper analysis\n\nThere are\
    \ seven basic steps involved in preparing an unstructured text document for deeper\
    \ analysis:\n\n1. **Language identification:** It helps determine the language\
    \ of operation.\n2. **Tokenization:** Most text analytics systems rely on rule-based\
    \ algorithms to tokenize alphabetic languages. The textual information is broken\
    \ down into pieces called tokens. These tokens can be words, phonemes, or full\
    \ sentences. These can be obtained by splitting the text on white spaces and at\
    \ punctuation marks that do not belong to abbreviations identified. The various\
    \ characteristics and its representations are listed in Table 4.2:\n\n| Characteristics\
    \ | Represents |\n|---|---|\n| Feature Extraction | Entities, Themes, Categories,\
    \ Intentions, Summaries, Sentiments |\n| Text Preparation (Multi layered) | Tokenizing,\
    \ Sentence breaking, PoS, Chunk, Syntax, Lexical chaining |\n| Base Knowledge\
    \ | Machine learning models, NLP, Training of words |\n\n*Table 4.2: Text analytics*\n\
    \n3. **Sentence breaking:** It is used to determine the boundaries that exist\
    \ in a sentence.\n4. **Part of Speech Tagging (PoS):** It is the process of determining\
    \ the part of speech of every token, i.e., whether a given token represents a\
    \ proper noun, common noun or verb, and then tagging it. **Part-of-Speech (POS)**\
    \ tagging means word class assignment to each token. Its input is given by the\
    \ tokenized text. Taggers have to cope with unknown and ambiguous word-tag mappings.\
    \ Rule-based approaches like ENGTWOL operate on dictionaries containing words\
    \ formed with the associated POS labels, morphological and syntactic features.\
    \ Context-sensitive rules help to choose the appropriate labels during application.\n\
    5. **Chunking:** It means assigning PoS-tagged tokens to phrases."
  mdcn: "当新课程被添加到目录中时，如果没有任何或极少的交互记录，就会出现项目冷启动问题。这对协同过滤算法构成了挑战，因为它们是基于项目的交互来生成推荐的。然而，如果存在少量交互，协同算法可以推荐该课程。不过，这些推荐的质量会比较差。\n\
    \n- **新用户进入**\n  当新用户注册系统时，就会出现这个问题。此时，推荐系统需要在一段时间内提供推荐，而不能依赖用户之前的交互记录，因为系统中尚未记录任何信息。这个问题很重要，因为收到低质量推荐的用户可能会在提供足够交互以让推荐系统了解其兴趣之前，就选择离开系统。为了创建初始用户档案，尤其是在处理新用户时，需要获取他们的偏好信息。\n\
    - **数据缺乏**\n  要进行有效的推荐，需要大量的数据。\n\n## 评估指标\n\n评估对于衡量推荐算法的有效性至关重要。常用的指标可以包括以下几种：\n\
    \n- 准确率\n- 均方误差\n- 均方根误差\n\n用于评估推荐方法质量的信息检索指标包括以下几种：\n\n- 精确率\n- 召回率\n- 多样性\n\
    - 新颖性\n- 覆盖率\n\n## 文本分析与挖掘\n\n文本挖掘被定义为从大量文本数据中提取隐藏的、先前未知的、潜在有用的信息的非平凡过程。\n\n文本挖掘处理的是非结构化或半结构化的数据集，如电子邮件、文本文档和HTML文件。文本挖掘（也称为*文本分析*）是一项**人工智能（AI）**技术，它利用**自然语言处理（NLP）**将文档和数据库中的自由（非结构化）文本转换为规范化的、结构化的数据，以便识别有意义的模式和新的见解用于分析。通过使用先进的机器学习算法，如朴素贝叶斯、支持向量机（SVM）和其他深度学习算法，许多组织可以探索和发现其非结构化数据中隐藏的关系。\n\
    \n术语“文本挖掘”和“文本分析”可以互换使用。通过使用机器学习算法、统计学和语言学，可以识别非结构化数据中的文本模式和趋势。通过利用文本挖掘和文本分析，可以从结构化数据中获得进一步的定量见解。\n\
    \n### 文本挖掘的重要性\n\n文本挖掘，也称为文本分析系统，专注于从文本语料库中确定关键知识，例如其与指定主题的相关性，并表示其内容的详细信息，例如任何特定实体及其关联。文本挖掘工具分析文档以识别实体并提取它们之间的关系，从而解锁隐藏信息以识别和开发新的假设。因此，文本挖掘可用于使大量非结构化数据变得可访问。通过提取信息，可以获取隐藏在大量信息中的模式、趋势和见解。文本是数据库中最常见的数据类型之一，其数据可以组织如下：\n\
    \n- **结构化数据：** 这种数据以标准化的行和列格式（即表格格式）维护信息。这使得处理、存储和对可用数据应用各种机器学习算法变得更加容易。结构化数据可以包括姓名、地址和电话号码等输入。\n\
    - **非结构化数据：** 与结构化数据不同，这种数据没有预定义的数据格式。所表示的数据可以包括来自多个来源的文本信息，例如来自社交媒体的文本信息、产品评论或来自视频和音频文件等富媒体格式的信息。\n\
    - **半结构化数据：** 这是结构化和非结构化数据格式的组合，其中组织可能没有足够的结构或格式来满足数据库的要求；示例包括XML、JSON和HTML文件。\n\
    \n由于世界上80%的数据以非结构化格式存在，文本挖掘在组织中形成了一项重要的实践。\n\n### 使用ML的文本挖掘系统的基本模块\n\n文本挖掘涉及将非结构化文本数据作为输入并进行处理。此处理涉及处理解析，以及添加一些派生的语言特征，从结构化数据中推导模式，最终评估和解释输出，如*图4.5*所示：\n\
    \n![](img/05e0d1e671c636fe8ee73a026cd179da_164_0.png)\n\n文本分析涉及信息检索、信息提取、数据挖掘技术（如关联和链接分析）、可视化以及预测分析。其目标是利用**自然语言处理（NLP）**方法将文本（非结构化数据）转换为数据（结构化格式）以进行分析。执行以挖掘文本并确定模式的各种活动在以下*图4.6*中表示：\n\
    \n![](img/05e0d1e671c636fe8ee73a026cd179da_165_0.png)\n\n在应用各种文本挖掘技术之前，需要执行文本预处理，如[图4.6](#figure-46)所示。\n\
    \n**文本预处理：** 此步骤包括清理文本数据并将其转换为可用格式。一旦文本预处理完成，基于相关的属性生成，就可以应用许多文本挖掘算法从数据中获取见解。\n\
    \n**文本转换（属性生成）：** 文本文档由其包含的单词（特征）及其出现次数表示。文档表示的两种主要方法是词袋模型和向量空间模型。\n\n**特征或属性选择：**\
    \ 特征选择，也称为变量选择，是选择重要特征子集用于模型创建的过程。使用特征选择技术时的主要假设是，数据包含许多冗余或无关的特征，这些特征在任何上下文中都不提供额外或相关的信息。特征选择技术是更广泛的特征提取领域的一个子集。\n\
    \n**数据挖掘：** 在这一点上，文本挖掘过程与传统的数据挖掘过程合并。经典的数据挖掘技术用于前几个阶段生成的结构化数据库。\n\n**评估：** 在此阶段评估结果。评估后，结果可以被丢弃，或者生成的结果可以作为下一组序列的输入。\n\
    \n### 准备非结构化文本文档以进行深入分析的步骤\n\n准备非结构化文本文档以进行深入分析涉及七个基本步骤：\n\n1. **语言识别：** 它有助于确定操作语言。\n\
    2. **分词：** 大多数文本分析系统依赖基于规则的算法对字母语言进行分词。文本信息被分解成称为标记的片段。这些标记可以是单词、音素或完整句子。这些可以通过在空格和不属于已识别缩写的标点符号处分割文本来获得。各种特征及其表示列于表4.2：\n\
    \n| 特征 | 表示 |\n|---|---|\n| 特征提取 | 实体、主题、类别、意图、摘要、情感 |\n| 文本准备（多层） | 分词、断句、词性标注、组块、句法、词汇链\
    \ |\n| 基础知识 | 机器学习模型、自然语言处理、词汇训练 |\n\n*表4.2：文本分析*\n\n3. **断句：** 它用于确定句子中存在的边界。\n\
    4. **词性标注（PoS）：** 它是确定每个标记的词性的过程，即给定的标记代表专有名词、普通名词还是动词，然后对其进行标注。**词性（POS）**标注意味着为每个标记分配词类。其输入由分词后的文本提供。标注器必须处理未知和有歧义的词-标签映射。基于规则的方法，如ENGTWOL，操作于包含带有相关POS标签、形态和句法特征的单词的词典。上下文敏感的规则有助于在应用过程中选择合适的标签。\n\
    5. **组块：** 它意味着将带有词性标签的标记分配给短语。"

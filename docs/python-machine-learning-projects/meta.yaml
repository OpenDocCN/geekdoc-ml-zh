    \ the model is tested on a data that is different from the training data. The\
    \ dataset is, thus, randomly divided into three subsets:\n    - **Training set**\
    \ is a subset of the dataset used to build the model.\n    - **Validation set**\
    \ is a subset used to assess the performance of the model built in the training\
    \ phase.\n    - **Test set**, or unseen data, is a subset of the dataset used\
    \ to assess the likely future performance of a model.\n\nIf a model fits the training\
    \ set much better than it fits the test set, then the model is said to overfit.\n\
    \n+   - **Cross-Validation:** Cross-validation is a more sophisticated approach\
    \ that operates on using the entire transformed dataset to train and test a given\
    \ algorithm, as compared to using test and train datasets.\n- In this technique,\
    \ the original dataset is divided into two parts: a training set that is used\
    \ to train the machine learning model, and an independent set used to evaluate\
    \ the analysis.\n\n# Model evaluation metrics\n\nThe performance of the machine\

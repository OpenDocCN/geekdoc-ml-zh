    # Expectation–Maximization (EM) Clustering using Gaussian Mixture Models (GMM)


    One of the major drawbacks of K-Means is its naive use of the mean value for the
    cluster center. We can see why this isn’t the best way of doing things by looking
    at the image below. On the left-hand side, it looks quite obvious to the human
    eye that there are two circular clusters with different radii centered at the
    same mean. K-Means can’t handle this because the mean values of the clusters are
    close together. K-Means also fails in cases where the clusters are not circular,
    again as a result of using the mean as cluster center.


    **Gaussian Mixture Models (GMMs)** give us more flexibility than K-Means. With
    GMMs, we assume that the data points are Gaussian distributed; this is a less
    restrictive assumption than saying they are circular using the mean. That way,
    we have two parameters to describe the shape of the clusters: the mean and the
    standard deviation! Taking an example in two dimensions, this means that the clusters
    can take any kind of elliptical shape (since we have a standard deviation in both
    the x and y directions). Thus, each Gaussian distribution is assigned to a single
    cluster.


    To find the parameters of the Gaussian for each cluster (for example, the mean
    and standard deviation), we will use an optimization algorithm called **Expectation–Maximization
    (EM)**. Take a look at the following image as an illustration of the Gaussians
    being fitted to the clusters. Then we can proceed with the process of Expectation–Maximization
    clustering using GMMs:'

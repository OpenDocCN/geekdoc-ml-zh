    MS SQL and Visual Basic (VB) interface. A GA can be used to optimize the process.


    +   - **Tools that can be used**

    Simulated-based GA can be used to minimize mean tardiness and makespan in **Job
    Shop Scheduling Problem (JSS)**, and to arrange machines in a flexible processing
    system using variable transferable costs as their target function. GA can further
    be used to study job shop scheduling under machine breakdown and unavailability
    situations. **Advanced Overlapping Production Planning Model (AOPP)** and random
    key GA with forward-backward improvements can be used for scheduling problems
    in a **Manufacturing Supply Chain Environment (MSCE)**. Hybrid GA can be used
    to strengthen the search ability and improve the convergence of the GA. Self-guided
    algorithm, parallel GA and embedded GA can be used to minimize the makespan.


    +   - **Evaluation parameters**

    Product throughput time, close-to-optimum manufacturing schedule, time to manufacture
    one unit, volume of order, machine usage time, preparation time and finishing
    time need to be determined. Also, order execution costs, including depreciation
    costs and labor costs, can be calculated. Thus, GA can be applied to complex problems
    from production and scheduling to forming a set of rules for turned parts.



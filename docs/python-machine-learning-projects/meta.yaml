  md: 'It is the process of evaluating the result of the cluster objectively and quantitatively
    by applying cluster validation indices. These indices are divided into three main
    categories:


    **External Indices:** This scoring method is used if the provided original data
    is labelled. On this, a clustering structure is matched. The most used index is
    this case is the Adjusted Rand index.


    ![](img/05e0d1e671c636fe8ee73a026cd179da_91_0.png)


    Where a is the number of points that are in the same clusters, in C and in K

    **b** is the number of points that are in both clusters

    **n** is the total number of samples


    $$ARI = RI - Expected Index / Max(RI) - Expected Index$$


    The value of ARI ranges between -1 to 1. The higher the value of ARI, the better
    it matches the original data.


    **Internal Validation Indices:** This method is used when the data is unlabeled.
    The index used for internal validation is the Silhouette Coefficient.


    **Silhouette Coefficient:** For each data point, it is defined as follows:


    $$Si = bi - ai / Max(bi - ai)$$


    Where **a** is the average distance to the other sample for a in the same cluster.

    **B** is the average distance to other sample i in the closest neighboring cluster.

    The **Silhouette Coefficient** (SC) is given by the following:

    **Sc** is the average of the sum of Si for each point

    Its value ranges between -1 to 1. The higher the value obtained, the better is
    the K value selected. It is preferred only for K-Means and hierarchical clustering
    algorithms and not for DBSCAN.



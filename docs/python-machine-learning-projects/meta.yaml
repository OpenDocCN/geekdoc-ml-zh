    ## Dedicated to


    To my parents, in-laws, daughter, husband Mr. Rahul Vora, and family members

    — Dr. Deepali R Vora


    To my parents, in-laws, husband Mr. Sachin S Bhatia, and family members

    — Dr. Gresha S Bhatia


    ## About the Authors


    **Dr. Deepali R Vora** is a Professor and Head of Computer Science & Engineering
    at Symbiosis Institute of Technology, Pune, and has completed her Ph.D. in Computer
    Science and Engineering from Amity University, Mumbai. She has more than 22 years
    of teaching, research as well as Industrial experience. She has more than 60 research
    papers published in Journals and Conferences of International and national repute.
    She has co-authored three books and delivered various talks in Data Science and
    Machine learning. She has conducted hands-on sessions in Data Science using Python
    for students and faculty. She was appointed as a Syllabus Revision Committee member
    with Mumbai University and developed the course content for B.E. (Information
    Technology) course. She has received grants for conducting research and organizing
    training courses for faculties. She acts as a technical advisor and reviewer for
    many International Conferences and Journals. Her blogs on KnowledgeHut have received
    wide acknowledgment. She has developed a course on “Deep Learning” on the Unschool
    platform.


    **Dr. Gresha S Bhatia** is the Deputy Head of the Computer Engineering Department
    at Vivekanand Education Society’s Institute of Technology (VESIT), Mumbai, and
    has completed her Ph.D. Technology from the University of Mumbai. She has more
    than 25 years of industry and teaching experience. She has published more than
    50 research papers in International Journals, conferences, and national conferences
    of repute. She has been awarded Microsoft AI for Earth Grant in the year 2019
    as well as Minor Research Grant from the University of Mumbai. She has authored
    a book and has delivered sessions on Machine learning and Social Computing. She
    has also been a member of the Syllabus Revision Committee of Mumbai University
    for the undergraduate and postgraduate programs in Engineering. She has also been
    a technical advisor and reviewer for the number of International Conferences and
    Journals.


    ## About the Reviewer


    **Ravi Choudhary** is a Data Scientist from New Delhi, India. He has several years
    of experience working for the Government of India and Top Global companies. Ravi
    holds a Master’s degree in Artificial Intelligence from IIT and applies his expertise
    in this field to his work in data science. He is an expert in machine learning
    and has extensive experience developing and implementing advanced algorithms and
    models to extract insights from large and complex datasets. He has a deep understanding
    of various machine learning techniques, such as supervised and unsupervised learning,
    deep learning, and natural language processing. Ravi has applied his expertise
    in machine learning to a wide range of industries, including finance, healthcare,
    and transportation. His work has led to significant improvements in efficiency,
    accuracy, and performance. He is also known for his ability to communicate complex
    technical concepts to non-technical stakeholders and effectively collaborate with
    cross-functional teams.


    ## Acknowledgements


    We would like to take this opportunity to thank a few people for their continued
    support while writing this book. First and foremost, we would like to thank our
    parents and parents-in-law for encouraging us to author the book.


    This journey was possible due to the constant support of our life partner, who
    has been our pillar of strength.


    We are grateful to the BPB publishing house, which showed us the path and initiated
    our learning process.


    Our sincere gratitude to all our family members and well-wishers for always standing
    by us.


    We sincerely thank all those who have directly or indirectly supported us while
    authoring this book.


    ## Preface


    This book covers different aspects of machine learning, and the importance of
    developing machine learning algorithms that can be applied to real-life projects.
    The book elaborates on the need and different types of machine learning algorithms.
    It shows how the right amount of data, and the correct amount of training can
    help build optimized systems. These optimized systems can help reduce the cost
    as well as training errors. This book further provides a number of questions to
    be solved that gives a practical approach. It further gives importance for understanding
    the python code, its basic concepts as well as the implementation code for machine
    learning projects.


    This book is divided into five chapters. The book elaborates on the need for machine
    learning, its challenges and limitations. It further explores the development
    of machine learning algorithms through use of Python code. The working of the
    machine learning algorithms is emphasized through real-life case studies. The
    best algorithm that can be applied to a case study is elaborated through the various
    optimization and meta-heuristic approaches. The details of the chapters are specified
    below.


    **Chapter 1: Introduction to ML –** introduces the terms artificial intelligence,
    data science and machine learning and the differences between them. The various
    models, the types of machine learning algorithms, and the challenges and limitations
    faced are further explored. The chapter will further dwell on the working and
    the application areas of machine learning.


    **Chapter 2: Python Basics for ML –** will cover the concepts behind the Python
    programming language. The syntax and the need for python programming is further
    emphasized. It will elaborate on python tools and libraries. It further handles
    the concepts of file and exception handling, which form the crux of the machine
    learning domain.


    **Chapter 3: An Overview of ML Algorithms –** will introduce the various Machine
    learning algorithms. The major focus is to provide familiarity with the machine
    learning programs that can learn from the data provided and improve from experience,
    without any human intervention. These learning tasks may include learning the
    function that maps the input to the outputs or learning through the hidden structure
    in unlabeled data using algorithms coined under supervised and unsupervised learning.
    To further understand the core concepts, this chapter will explore the working
    process of any given machine learning algorithm through a number of examples.
    As Python forms a handy tool to get started with supervised and unsupervised learning,
    this chapter will explore its various functionalities. The chapter will further
    elaborate on the performance measures to be considered for evaluating the machine
    learning system that would have been developed.


    **Chapter 4: Case Studies and Projects in Machine Learning** will provide an insight
    into the various case studies that use the concepts and algorithms of machine
    learning. This chapter will further introduce recommendation systems, its needs,
    the process of generating the recommendation systems as well as the current systems
    incorporating recommendation systems. Another case study will be focused on the
    application of machine learning algorithms on text mining applications, opinion
    mining and sentiment analysis. This chapter will further elaborate on applying
    various machine learning algorithms to image processing applications. More case
    studies incorporating predictive analysis, Social Media Analytics, Customer churning
    analytics, and Analytics in Education Systems will be explored in detail.


    **Chapter 5: Optimization in ML Algorithm** will focus on the improvements in
    training the algorithms for the most accurate outputs. The chapter will thus focus
    on determining the best element or path, or techniques to improve the efficiency
    of algorithms by decreasing the training time as well as the cost incurred for
    the same. The concept of optimization and the hybrid algorithms that can be utilized
    will then be explained. The need for optimization techniques in Machine Learning
    based projects will then be highlighted. This will lead to applying techniques
    for optimization. The basic optimization techniques will then be explored, and
    the current research area on meta-heuristic approach will be further elaborated.
    To conclude the chapter, the various python libraries that could be available
    for optimization in Machine Learning projects will be explained.'

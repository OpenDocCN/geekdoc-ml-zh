    \  $p_{ij}$ 表示样本i属于类别j的概率\n  对数损失越接近0表示准确率越高，而对数损失远离0表示准确率越低。\n\n## 曲线下面积（AUC）\n\
    \n它是评估二分类问题最常用的指标之一，可以区分正类和负类。**真正例率（灵敏度）**：真正例率定义为正确识别为正例的正数据点相对于所有正数据点的比例。\n\
    $真正例率 = 真正例/\\ (假负例\\ +\\ 真正例)$\n\n**假正例率（特异性）**定义为假正例率，它指定被错误地视为正例的负数据点相对于所有负数据点的比例。\n\

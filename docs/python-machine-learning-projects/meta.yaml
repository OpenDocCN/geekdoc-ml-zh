- md: '## Random Forest


    The random forest algorithm is an expansion of decision tree in that you first
    construct a multitude of decision trees with training data and then fit your new
    data within one of the trees as a “random forest.”


    It averages your data to connect it to the nearest tree on the data scale. Random
    forest models are helpful as they remedy for the decision tree’s problem of “forcing”
    data points within a category unnecessarily.


    ## Support Vector Machines (SVM)


    It uses algorithms to train and classify data within degrees of polarity, taking
    it to a degree beyond *X/Y* prediction.


    For a simple visual explanation, we will use two tags, i.e., *red* and *blue*,
    with two data features, i.e., *X* and *Y*, and then train our classifier to output
    an *X/Y* coordinate as either *red* or *blue*.


    The SVM then assigns a hyperplane that best separates the tags. In two dimensions,
    this is simply a line. Anything on one side of the line is *red*, and anything
    on the other side is *blue*. In sentiment analysis, for example, this would be
    *positive* and *negative*.


    In order to maximize machine learning, the best hyperplane is the one with the
    largest distance between each tag:


    However, as data sets become more complex, it may not be possible to draw a single
    line to classify the data into two camps:


    Using SVM, the more complex the data, the more accurate the predictor will become.
    Imagine the previous figure in three dimensions, with a Z-axis added, so it becomes
    a circle.

    Mapped back to two dimensions with the best hyperplane, it looks as shown in the
    following image:


    SVM allows for more accurate machine learning because it’s multidimensional.


    ## Clustering algorithms


    Following are the clustering algorithms:


    ### K-Means Clustering


    K-Means is probably the most well-known clustering algorithm. It’s taught in many
    introductory data science and machine learning classes and is easy to understand
    and implement in code:


    K means algorithm can be represented by the following steps:


    1.  We select several classes/groups to use and randomly initialize their respective
    center points. To figure out the number of classes to use, it’s good to take a
    quick look at the data and identify any distinct groupings. The center points
    are vectors of the same length as each data point vector and are the “X’s” in
    the preceding image.

    2.  Each data point is classified by computing the distance between that point
    and each group center; the point is put in the group whose center is the closest
    to it.

    3.  Based on these classified points, we recomputed the group center by taking
    the mean of all the vectors in the group.

    4.  Repeat these steps for a set number of iterations or until the group centers
    don’t change much between iterations. You can also opt to randomly initialize
    the group centers a few times, and then select the run that looks like it provided
    the best results.


    K-Means has the advantage that it’s pretty fast, as all we’re really doing is
    computing the distances between points and group centers; very few computations!
    This, it has linear complexity $O(n)$.


    On the other hand, K-Means has a couple of disadvantages. Firstly, you have to
    select how many groups/classes there are. Ideally, with a clustering algorithm,
    we’d want to figure it out as the aim is to gain some insight from the data. K-means
    also starts with a random choice of cluster centers; therefore, it may yield different
    clustering results on different runs of the algorithm. Thus, the results may not
    be repeatable and lack consistency. Other cluster methods are more consistent.


    K-Medians is another clustering algorithm related to K-Means, except we use the
    median vector of the group instead of recomputing the group center points using
    the mean. This method is less sensitive to outliers (because of using the median)
    but is much slower for larger datasets as sorting is required on each iteration
    when computing the median vector.


    ### Mean-Shift Clustering


    Mean shift clustering is a sliding-window-based algorithm that attempts to find
    dense areas of data points. It is a centroid-based algorithm, which means the
    goal is to locate the center point of each group/class; it works by updating candidates
    for center points to be the mean of the points within the sliding-window. These
    candidate windows are then filtered in a post-processing stage to eliminate near-duplicates,
    forming the final set of center points and their corresponding groups:


    Mean shift clustering can be represented as follows:


    1.  To explain mean-shift, we will consider a set of points in two-dimensional
    space, like in the preceding illustration. We begin with a circular sliding window
    centered at a point C (randomly selected) and having radius r as the kernel. Mean
    shift is a hill-climbing algorithm that involves shifting this kernel iteratively
    to a higher density region on each step until convergence.

    2.  At every iteration, the sliding window is shifted toward regions of higher
    density by shifting the center point to the mean of the points within the window
    (hence the name). The density within the sliding window is proportional to the
    number of points inside it. Naturally, by shifting to the mean of the points in
    the window, it will gradually move toward areas of higher point density.

    3.  We continue shifting the sliding window according to the mean until there
    is no direction in which a shift can accommodate more points inside the kernel.
    Check out the preceding graphic; we keep moving the circle until we are no longer
    increasing the density (that is, number of points in the window).

    4.  This process of steps 1 to 3 is done with many sliding windows until all points
    lie within a window. When multiple sliding windows overlap, the window containing
    the most points is preserved. The data points are then clustered according to
    the sliding window in which they reside.


    In contrast to K-means clustering, there is no need to select the number of clusters
    as mean-shift automatically discovers this. That’s a massive advantage. The fact
    that the cluster centers converge toward the points of maximum density is also
    quite desirable as it is quite intuitive to understand and fits well in a naturally
    data-driven sense. The drawback is that the selection of the window size/radius
    “r” can be non-trivial.


    ### Density-Based Spatial Clustering of Applications with Noise (DBSCAN)


    DBSCAN is a density-based clustered algorithm similar to mean-shift, but with
    a couple of notable advantages.


    1.  DBSCAN begins with an arbitrary starting data point that has not been visited.
    The neighborhood of this point is extracted using a distance epsilon ε (all points
    that are within the ε distance are neighborhood points).

    2.  If there is a sufficient number of points (according to minPoints) within
    this neighborhood, the clustering process starts and the current data point becomes
    the first point in the new cluster. Otherwise, the point will be labeled as noise
    (this noisy point might later become part of the cluster). In both cases, that
    point is marked as “visited”.

    3.  For this first point in the new cluster, the points within its ε distance
    neighborhood also become part of the same cluster. This procedure of making all
    points in the ε neighborhood belong to the same cluster is then repeated for all
    the new points that have been just added to the cluster group.

    4.  Steps 2 and 3 are repeated until all points in the cluster are determined,
    that is, all points within the ε neighborhood of the cluster have been visited
    and labeled.


    Once we’re done with the current cluster, a new unvisited point is retrieved and
    processed, leading to the discovery of a further cluster or noise. This process
    continues until all points are marked as visited. Since all points will have been
    visited at the end of this, each point will have been marked as either belonging
    to a cluster or being noise.


    DBSCAN has some great advantages over other clustering algorithms. Firstly, it
    does not require a pre-set number of clusters at all. It also identifies outliers
    as noises, unlike mean-shift, which simply throws them into a cluster even if
    the data point is very different. Additionally, it can find arbitrarily sized
    and arbitrarily shaped clusters quite well.


    The main drawback of DBSCAN is that it doesn’t perform as well as others when
    the clusters are of varying density. This is because the setting of the distance
    threshold ε and minPoints for identifying the neighborhood points will vary from
    cluster to cluster when the density varies. This drawback also occurs with very'
  mdcn: '## 随机森林


    随机森林算法是决策树的扩展，它首先使用训练数据构建大量决策树，然后将新数据拟合到其中一棵树中，形成“随机森林”。


    它对数据进行平均处理，以将其连接到数据尺度上最近的树。随机森林模型很有用，因为它们解决了决策树不必要地将数据点“强制”归入某个类别的问题。


    ## 支持向量机（SVM）


    它使用算法在极性程度内训练和分类数据，将其提升到超越*X/Y*预测的层次。


    为了进行简单的可视化解释，我们将使用两个标签，即*红色*和*蓝色*，以及两个数据特征，即*X*和*Y*，然后训练我们的分类器输出一个*X/Y*坐标，该坐标被标记为*红色*或*蓝色*。


    然后，SVM分配一个最佳分隔标签的超平面。在二维空间中，这仅仅是一条线。线的一侧的所有内容都是*红色*，另一侧的所有内容都是*蓝色*。例如，在情感分析中，这将是*正面*和*负面*。


    为了最大化机器学习效果，最佳超平面是每个标签之间距离最大的那个：


    然而，随着数据集变得更加复杂，可能无法画出一条单一的线将数据分为两个阵营：


    使用SVM，数据越复杂，预测器就越准确。想象一下上图在三维空间中，添加了一个Z轴，因此它变成了一个圆形。使用最佳超平面映射回二维空间，它看起来如下图所示：


    SVM允许更准确的机器学习，因为它是多维的。


    ## 聚类算法


    以下是聚类算法：


    ### K-均值聚类


    K-均值可能是最著名的聚类算法。它在许多数据科学和机器学习入门课程中都有教授，并且易于理解和实现代码：


    K均值算法可以通过以下步骤表示：


    1.  我们选择要使用的几个类别/组，并随机初始化它们各自的中心点。为了确定要使用的类别数量，最好快速查看数据并识别任何明显的分组。中心点是与每个数据点向量长度相同的向量，并且是上图中的“X”。

    2.  通过计算该点与每个组中心之间的距离对每个数据点进行分类；该点被放入其中心最接近它的组中。

    3.  基于这些已分类的点，我们通过取组中所有向量的平均值来重新计算组中心。

    4.  重复这些步骤一定次数的迭代，或者直到组中心在迭代之间变化不大。您也可以选择随机初始化组中心几次，然后选择看起来提供最佳结果的运行。


    K-均值的优势在于它相当快，因为我们真正做的只是计算点与组中心之间的距离；计算量非常少！因此，它具有线性复杂度$O(n)$。


    另一方面，K-均值有几个缺点。首先，您必须选择有多少个组/类别。理想情况下，使用聚类算法，我们希望找出它，因为目标是从数据中获得一些见解。K-均值也从随机选择聚类中心开始；因此，在算法的不同运行中可能会产生不同的聚类结果。因此，结果可能不可重复且缺乏一致性。其他聚类方法更一致。


    K-中值是另一种与K-均值相关的聚类算法，不同之处在于我们使用组的中值向量，而不是使用平均值重新计算组中心点。这种方法对异常值不太敏感（因为使用了中值），但对于较大的数据集来说要慢得多，因为在计算中值向量时每次迭代都需要排序。


    ### 均值漂移聚类


    均值漂移聚类是一种基于滑动窗口的算法，旨在寻找数据点的密集区域。它是一种基于质心的算法，这意味着目标是定位每个组/类别的中心点；它通过将中心点更新为滑动窗口内点的平均值来工作。然后在后处理阶段过滤这些候选窗口以消除近似重复项，形成最终的中心点集及其对应的组：


    均值漂移聚类可以表示如下：


    1.  为了解释均值漂移，我们将考虑二维空间中的一组点，如上图所示。我们从一个以点C（随机选择）为中心、半径为r的圆形滑动窗口开始，作为核。均值漂移是一种爬山算法，它涉及在每一步迭代地将此核移动到更高密度的区域，直到收敛。

    2.  在每次迭代中，滑动窗口通过将中心点移动到窗口内点的平均值（因此得名）而向更高密度的区域移动。滑动窗口内的密度与其内部的点数成正比。自然地，通过移动到窗口内点的平均值，它将逐渐向点密度更高的区域移动。

    3.  我们继续根据平均值移动滑动窗口，直到没有方向可以容纳更多点在核内。查看上图；我们继续移动圆圈，直到不再增加密度（即窗口中的点数）。

    4.  步骤1到3的过程使用许多滑动窗口执行，直到所有点都位于一个窗口内。当多个滑动窗口重叠时，保留包含最多点的窗口。然后根据数据点所在的滑动窗口对其进行聚类。


    与K-均值聚类相比，无需选择聚类数量，因为均值漂移会自动发现这一点。这是一个巨大的优势。聚类中心收敛到最大密度点的事实也非常可取，因为它非常直观易懂，并且在自然数据驱动的意义上非常契合。缺点是窗口大小/半径“r”的选择可能非同小可。


    ### 基于密度的带噪声应用空间聚类（DBSCAN）


    DBSCAN是一种类似于均值漂移的基于密度的聚类算法，但具有几个显著优势。


    1.  DBSCAN从一个任意的、尚未访问的起始数据点开始。使用距离epsilon ε提取该点的邻域（所有在ε距离内的点都是邻域点）。

    2.  如果该邻域内有足够数量的点（根据minPoints），则聚类过程开始，当前数据点成为新聚类中的第一个点。否则，该点将被标记为噪声（此噪声点可能稍后成为聚类的一部分）。在这两种情况下，该点都被标记为“已访问”。

    3.  对于新聚类中的第一个点，其ε距离邻域内的点也成为同一聚类的一部分。然后对刚刚添加到聚类组中的所有新点重复此过程，使ε邻域内的所有点都属于同一聚类。

    4.  重复步骤2和3，直到聚类中的所有点都被确定，即聚类ε邻域内的所有点都已被访问和标记。


    一旦我们完成了当前聚类，就会检索并处理一个新的未访问点，从而发现另一个聚类或噪声。此过程持续进行，直到所有点都被标记为已访问。由于最终所有点都将被访问，因此每个点都将被标记为属于某个聚类或为噪声。


    DBSCAN相对于其他聚类算法有一些显著优势。首先，它根本不需要预设聚类数量。它还将异常值识别为噪声，这与均值漂移不同，后者即使数据点非常不同也会将其放入聚类中。此外，它可以很好地发现任意大小和任意形状的聚类。


    DBSCAN的主要缺点是当聚类密度不同时，其性能不如其他算法。这是因为当密度变化时，用于识别邻域点的距离阈值ε和minPoints的设置会因聚类而异。这个缺点也出现在非常'

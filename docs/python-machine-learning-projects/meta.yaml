    optimization algorithms, this chapter focuses on a few promising and widely used
    algorithms.


    # Single solution-based algorithms


    These algorithms are based on applying the heuristics on the single solution and
    finding the better solution. They work toward the betterment of the solution and
    use the exploitation method substantially. There are many popular algorithms available;
    let’s look at a few of them in brief:


    +   - Simulated Annealing

    - Tabu Search

    - Variable Neighborhood search


    # Simulated annealing


    This method is inspired by the slow cooling of metals. Cooling of metals is achieved
    by reducing the atomic movements, which, in turn, reduces the density of lattice
    defects till the lowest energy state is reached and the metal gets the desired
    structure. In algorithms, at every annealing temperature, a new solution is provided
    to the problem under consideration. Here, the temperature is the most important
    parameter to get an optimized solution.


    The steps of the algorithm are as follows:


    +   1. Start with the initial solution S₀ and set the initial temperature as t₀.

    2. A temperature reduction function, popularly called alpha, is required to be
    set up, which can be based on Linear Reduction rule, Geometric Reduction rule
    or Slow Decrease rule. Each reduction rule will decrease the temperature at a
    different rate.

    3. Here, the looping starts, and the next step is repeated until the termination
    condition is met. The termination condition is based on the value of low temperature
    with satisfactory performance.

    4. From the solutions generated, pick up one solution and calculate the difference
    between the costs of the old solution and the new solution. The solutions are
    generated by altering the parameter values.

    5. If the new solution cost is better, then accept that solution. After a certain
    amount of looping, the performance stabilizes and the final solution is solicited.


    Simulated Annealing is a very effective and simple to implement optimization algorithm
    and is used to solve many classic problems, like Travelling Salesman Problem and
    scheduling problems. The main advantage is that it sticks with local minima.


    # Tabu Search'
- md: "Tabu search is a stochastic optimization method that is effective because of\
    \ local search methods and is generally used for mathematical optimizations. The\
    \ strong point of Tabu search is that it uses memory effectively to store and\
    \ track the previous solutions. This makes local search very effective. Tabu search\
    \ explores good solutions so that intelligent search mechanisms can be employed\
    \ to explore new potential regions. It uses adaptive memory, which helps in creating\
    \ flexible and effective search strategy.\n\nThe algorithm steps are as follows:\n\
    \n1.  Start with an initial solution S₀, which is any feasible solution to start\
    \ with.\n2.  Find the next neighboring solutions and start populating the Tabu\
    \ list, which is the memory that stores either moves to solutions or complete\
    \ solutions generated by the algorithm. The solutions in the Tabu list satisfy\
    \ the aspiration criteria. Aspiration criteria is optional and decides the quality\
    \ of the solution. If the current solution is better, it is stored in Tabu List\
    \ and remains there for a tenure called Tabu Tenure. The aspiration criteria ensures\
    \ that stagnant solutions are not created.\n3.  The new solution is compared with\
    \ the previous solution and is included in the list if it is found to be better.\n\
    4.  The process is repeated till the termination criteria is met. The diversification\
    \ in the solution space is ensured by giving a chance to potentially bad solutions\
    \ as well. Diversification strategies are made so that newer regions are explored\
    \ and moves that are not part of Tabu List are explored and given a chance.\n\n\
    Tabu search is applied to both discrete and continuous mathematical optimization\
    \ problems, and it is also used for solving problems in chemical and mechanical\
    \ streams.\n\n## Variable Neighborhood Search\n\nVariable neighborhood search\
    \ is used for solving combinatorial optimization problems and global optimization\
    \ problems. The exploration is very strong in the neighborhood search, and a move\
    \ to a new solution is made only if the improvement in current solution is seen.\
    \ It uses effective local search methods in neighborhoods to get new solutions\
    \ till local optima.\n\nThe variable search algorithms consider that local minima\
    \ provide some information about the global one. Thus, an organized search considering\
    \ local optima is employed and requires very few parameters to be tuned in.\n\n\
    ## Population-based algorithms\n\nPopulation-based algorithms are more popular\
    \ because they work on multiple solutions. These algorithms are inspired by nature,\
    \ natural activities, behavior, biology, physics and even human activities like\
    \ teaching and learning. These algorithms use exploration method or global search\
    \ method substantially. Broadly, they can be categorized as follows:\n\n### Evolutionary\
    \ techniques\n\nEvolutionary techniques are popular for training machine learning\
    \ models. Evolutionary techniques use the biological concepts of natural selection,\
    \ evolution and mutation. These techniques have proven beneficial for solving\
    \ many real-life optimization problems effectively. The techniques are easy to\
    \ implement and require only a few parameters to train the model. A few popular\
    \ evolutionary techniques are as follows:\n\n-   Genetic algorithm\n-   Differential\
    \ evolution\n-   Evolutionary programming\n\n**Genetic Algorithms:** Genetic algorithms\
    \ are popular optimization algorithm proposed by Holland. They are based on genetic,\
    \ mutation and selection mechanisms. The generalized algorithm can be explained\
    \ as follows:\n\n1.  Generate initial random population.\n2.  Calculate the fitness\
    \ of the generated population and select only the fittest.\n3.  Select the parents\
    \ from this initial fit population.\n4.  Select the genetic operator, either crossover\
    \ operator or mutation operator, to generate the children.\n5.  Repeat steps 2\
    \ to 5 until the stopping condition is met.\n\nThe stopping condition is generally\
    \ based on number of iterations required to get the optimal solution. The major\
    \ parameters in genetic algorithms are fitness function and genetic operator.\
    \ The new solution is generated using a genetic operator, either crossover or\
    \ mutation. The crossover can be one-point crossover, two-point crossover, multi-point\
    \ crossover or uniform crossover. The basic mutation chooses one or more genes\
    \ to randomly change, and the invasion operator randomly chooses two gene points\
    \ to inverse the genes. The selection of mutation operator depends on the encoding\
    \ used, which can be binary encoding, natural numbers, real number, and so on.\
    \ The selection operator also plays an important role in generation of new solution,\
    \ and there are various selection operators that can be used, such as roulette\
    \ wheel selection, stochastic universal sampling, local selection and tournament\
    \ selection.\n\nThe genetic algorithm is the simplest to implement and is an effective\
    \ optimization algorithm applied to various domains of engineering problems.\n\
    \n### Differential Evolution\n\nNonlinear and non-differential continuous space\
    \ function optimizations can be solved effectively using differential evolution.\n\
    \nThe differential evolution algorithm starts with an initial population of candidate\
    \ solutions, which are iteratively improved by introducing the mutations into\
    \ the population and then crossover functions. The fittest candidate solutions\
    \ that yield a lower objective function value are retained then. The main advantages\
    \ of differential evolution are that control parameters are few, and it can handle\
    \ nonlinear and non-differentiable multi-dimensional objective functions. The\
    \ difference between genetic algorithm and differential evolution is that the\
    \ solution is only updated when the new solution is better than the old one.\n\
    \nThe algorithm steps are as follows:\n\n1.  Generate initial random population.\n\
    2.  Calculate the fitness of the generated population and select only the fittest.\n\
    3.  Execute the mutation operation and crossover operation and then select the\
    \ children using selection operation.\n4.  Add the optimized solutions to the\
    \ population.\n5.  Repeat steps 2 to 5 until the stopping condition is reached.\n\
    \nThe fitness function here controls the size of population and maintains the\
    \ fittest values only.\n\n### Evolutionary Programming\n\nEvolutionary programming\
    \ is a stochastic optimization strategy that helps solve numerical and combinatorial\
    \ optimization problems. The convergence rate of evolutionary programming is rarely\
    \ slow, and the main variation operator here is mutation.\n\nThe basic steps in\
    \ evolutionary programming are as follows:\n\n1.  Generate the initial random\
    \ population. The speed of optimization depends on the number of populations,\
    \ so generating number of solutions in the population is important.\n2.  The generated\
    \ population is tested for fitness, and only fit solutions are retained. Generally,\
    \ a stochastic tournament determines the solutions to be retained in the population.\n\
    3.  New children or offsprings are generated using mutation. The offsprings are\
    \ mutated according to the distribution of mutation type, which ranges from minor\
    \ to extreme. The mutation brings functional changes in the parents and is judged\
    \ based on this change.\n4.  Steps 2 and 3 are repeated until the stopping criteria\
    \ is met.\n\nOne thing to note here is that evolutionary programming does not\
    \ use genetic or crossover operator to generate offspring.\n\n## Swarm Intelligence\n\
    \nSwarm Intelligence was introduced in 1989 and it uses the concepts of using\
    \ knowledge of collective group to reach the optimized solution. The basic concept\
    \ is that a group of objects (people, animals, insects and so on) are given the\
    \ same problem to solve. They use all resources to find the best solution for\
    \ the problem. So, instead of using a single object’s intelligence, the algorithms\
    \ use the group’s intelligence to find optimal solution. One thing to keep in\
    \ mind is that all objects behave individually and try to find the optimal or\
    \ best solution. Swarm Intelligence has gained popularity as it proved beneficial\
    \ for large domain of problems. These algorithms are also nature-inspired algorithms.\
    \ There are numerous algorithms introduced, and some are still being discovered.\
    \ Let’s look at a few popular algorithms that use Swarm Intelligence:\n\n-   Particle\
    \ Swarm optimization\n-   Ant colony optimization\n-   Cuckoo Search Optimization\n\
    \n**Particle Swarm Optimization:** This is one of the most popular optimization\
    \ techniques introduced in 1995. It is also a stochastic optimization technique\
    \ that models the behavior of animals or insects to find the optimal solution.\
    \ For example, birds look or hunt for food in flocks. Particle swarm optimization\
    \ is a robust and efficient technique to solve various optimization problems.\n\
    \nHere, individual particles are part of solution space and always convey their\
    \ positions to the neighboring particles. The goal is to find the best position\
    \ in the search space. Every particle’s position is adjusted based on velocity\
    \ and difference between the current position, the optimal position found by particle\
    \ itself and the best position found by neighbor. The iterations ensure that the\
    \ focus of the swarm is more on the search space, which contains high-quality\
    \ solutions.\n\nIt is observed that Particle Swarm optimization performance is\
    \ best for a wide variety of real-world optimization problems.\n\nThe broad steps\
    \ are as follows:\n\n1.  Generate the initial swarm particles randomly.\n2.  Repeat\
    \ steps 3 to 5 till the termination criteria are met.\n3.  For every particle,\
    \ choose between the current position of the particle and the best position found\
    \ out by the particle. Let this be $p_i$.\n4.  Find the best position of the particle\
    \ determined by the group of swarms, that is, neighboring particles. Let this\
    \ be $p_g$.\n5.  Update the velocity and position of the particles based on the\
    \ values of $p_i$ and $p_g$, as shown in the following equations:\n\n    $v_i\
    \ = v_i + c_1 * rand_1 * (p_i - x_i) + c_2 * rand_2 * (p_g - x_i)$"
  mdcn: "禁忌搜索是一种随机优化方法，其有效性源于局部搜索方法，通常用于数学优化。禁忌搜索的优势在于它能有效利用内存来存储和追踪先前的解。这使得局部搜索非常有效。禁忌搜索探索优质解，以便能够采用智能搜索机制来探索新的潜在区域。它使用自适应记忆，这有助于创建灵活且有效的搜索策略。\n\
    \n算法步骤如下：\n\n1.  从一个初始解 S₀ 开始，它可以是任何可行解。\n2.  寻找下一个邻域解，并开始填充禁忌列表，该列表是存储算法生成的移动到解或完整解的记忆。禁忌列表中的解满足期望准则。期望准则是可选的，并决定解的质量。如果当前解更好，它会被存储在禁忌列表中，并在一个称为禁忌期限的期限内保留。期望准则确保不会产生停滞的解。\n\
    3.  将新解与先前解进行比较，如果发现更好，则将其包含在列表中。\n4.  重复该过程，直到满足终止条件。通过给潜在的不良解也提供机会，确保了解空间的多样性。制定多样化策略是为了探索新的区域，并探索不属于禁忌列表的移动并给予机会。\n\
    \n禁忌搜索应用于离散和连续的数学优化问题，也用于解决化学和机械领域的问题。\n\n## 变邻域搜索\n\n变邻域搜索用于解决组合优化问题和全局优化问题。邻域搜索中的探索非常强大，只有在观察到当前解有所改善时才会移动到新解。它在邻域中使用有效的局部搜索方法来获取新解，直到达到局部最优。\n\
    \n变邻域搜索算法认为局部最小值提供了关于全局最小值的一些信息。因此，采用考虑局部最优的有组织搜索，并且只需要调整很少的参数。\n\n## 基于种群的算法\n\
    \n基于种群的算法更受欢迎，因为它们基于多个解进行工作。这些算法的灵感来源于自然、自然活动、行为、生物学、物理学，甚至人类活动如教学和学习。这些算法大量使用探索方法或全局搜索方法。广义上，它们可以分类如下：\n\
    \n### 进化技术\n\n进化技术因其在训练机器学习模型方面的应用而广受欢迎。进化技术使用自然选择、进化和变异的生物学概念。这些技术已被证明能有效解决许多现实生活中的优化问题。这些技术易于实现，并且只需要很少的参数来训练模型。一些流行的进化技术如下：\n\
    \n-   遗传算法\n-   差分进化\n-   进化规划\n\n**遗传算法：** 遗传算法是由 Holland 提出的一种流行的优化算法。它们基于遗传、变异和选择机制。通用算法可以解释如下：\n\
    \n1.  生成初始随机种群。\n2.  计算生成种群的适应度，并仅选择最适应的个体。\n3.  从这个初始适应种群中选择父代。\n4.  选择遗传算子，交叉算子或变异算子，来生成子代。\n\
    5.  重复步骤 2 到 5，直到满足停止条件。\n\n停止条件通常基于获得最优解所需的迭代次数。遗传算法中的主要参数是适应度函数和遗传算子。新解是使用遗传算子（交叉或变异）生成的。交叉可以是单点交叉、两点交叉、多点交叉或均匀交叉。基本变异选择一个或多个基因进行随机改变，而入侵算子随机选择两个基因点来反转基因。变异算子的选择取决于所使用的编码，可以是二进制编码、自然数、实数等。选择算子在生成新解中也起着重要作用，可以使用各种选择算子，例如轮盘赌选择、随机通用采样、局部选择和锦标赛选择。\n\
    \n遗传算法是最容易实现的，并且是一种有效的优化算法，应用于工程问题的各个领域。\n\n### 差分进化\n\n非线性和不可微的连续空间函数优化可以使用差分进化有效解决。\n\
    \n差分进化算法从一组候选解的初始种群开始，通过向种群引入变异然后交叉函数进行迭代改进。然后保留产生较低目标函数值的最适应的候选解。差分进化的主要优点是控制参数少，并且可以处理非线性和不可微的多维目标函数。遗传算法和差分进化的区别在于，只有当新解优于旧解时才会更新解。\n\
    \n算法步骤如下：\n\n1.  生成初始随机种群。\n2.  计算生成种群的适应度，并仅选择最适应的个体。\n3.  执行变异操作和交叉操作，然后使用选择操作选择子代。\n\
    4.  将优化后的解添加到种群中。\n5.  重复步骤 2 到 5，直到达到停止条件。\n\n这里的适应度函数控制种群大小，并仅保留最适应的值。\n\n###\
    \ 进化规划\n\n进化规划是一种随机优化策略，有助于解决数值和组合优化问题。进化规划的收敛速度很少慢，这里的主要变异算子是变异。\n\n进化规划的基本步骤如下：\n\
    \n1.  生成初始随机种群。优化的速度取决于种群数量，因此在种群中生成一定数量的解很重要。\n2.  对生成的种群进行适应度测试，仅保留适应的解。通常，随机锦标赛决定保留在种群中的解。\n\
    3.  使用变异生成新的子代或后代。后代根据变异类型的分布进行变异，该分布范围从轻微到极端。变异给父代带来功能性变化，并根据此变化进行判断。\n4.  重复步骤\
    \ 2 和 3，直到满足停止标准。\n\n这里需要注意的一点是，进化规划不使用遗传或交叉算子来生成后代。\n\n## 群体智能\n\n群体智能于 1989\
    \ 年引入，它利用集体群体的知识来达到优化解的概念。基本概念是，一组对象（人、动物、昆虫等）被赋予相同的问题来解决。它们利用所有资源来寻找问题的最佳解决方案。因此，算法不是使用单个对象的智能，而是使用群体的智能来寻找最优解。需要记住的一点是，所有对象都独立行动，并试图找到最优或最佳解。群体智能因其对大量问题领域有益而广受欢迎。这些算法也是受自然启发的算法。已经引入了无数算法，有些仍在被发现。让我们看看一些使用群体智能的流行算法：\n\
    \n-   粒子群优化\n-   蚁群优化\n-   布谷鸟搜索优化\n\n**粒子群优化：** 这是 1995 年引入的最受欢迎的优化技术之一。它也是一种随机优化技术，模拟动物或昆虫的行为来寻找最优解。例如，鸟类成群结队地寻找或捕食。粒子群优化是一种强大且高效的技术，可用于解决各种优化问题。\n\
    \n在这里，单个粒子是解空间的一部分，并始终将其位置传达给相邻粒子。目标是在搜索空间中找到最佳位置。每个粒子的位置根据速度以及当前位置、粒子本身找到的最佳位置和邻居找到的最佳位置之间的差异进行调整。迭代确保群体的焦点更多地放在包含高质量解的搜索空间上。\n\
    \n据观察，粒子群优化在各种现实世界优化问题中表现最佳。\n\n大致步骤如下：\n\n1.  随机生成初始群体粒子。\n2.  重复步骤 3 到 5，直到满足终止条件。\n\
    3.  对于每个粒子，在粒子的当前位置和粒子找到的最佳位置之间进行选择。设此为 $p_i$。\n4.  找到由群体（即相邻粒子）确定的粒子的最佳位置。设此为\
    \ $p_g$。\n5.  根据 $p_i$ 和 $p_g$ 的值更新粒子的速度和位置，如下方程所示：\n\n    $v_i = v_i + c_1 *\
    \ rand_1 * (p_i - x_i) + c_2 * rand_2 * (p_g - x_i)$"

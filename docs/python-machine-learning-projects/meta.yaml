    \n例如，可以编写以下代码来显示奇数列的数据，其中列数为 10，行数为 10：\n\n`df.iloc[0:9,0:9:2]`\n\n使用 loc 函数可以通过指定起始和结束列名来实现相同的功能。\n\
    \n## 使用 Pandas 进行基本描述性统计\n\nPandas 有许多内置函数，通过运行基本统计函数来帮助理解数据。这些函数及其描述在下表中给出：\n\

    \ follows:\n  $Logarithmic\\ loss = -\\frac{1}{n} \\sum_{i=1}^{n} \\sum_{j=1}^{m}\
    \ y_{ij} * log(p_{ij})$\n  Where,\n  $y_{ij}$ indicates whether sample i belongs\
    \ to class j\n  $p_{ij}$ indicates the probability of sample i belonging to class\
    \ j\n  Log loss nearer to 0 indicates higher accuracy, while log loss away from\
    \ 0 indicates lower accuracy.\n\n# Area under curve (AUC)\n\nIt is one of the\
    \ most used metrics for the evaluation of binary classification problems, and\
    \ it can discriminate between positive and negative classes. **True Positive Rate\
    \ (Sensitivity)**: True Positive Rate is defined as Itspecifies the proportion\
    \ of positive data points that are correctly identified as positive, with respect\
    \ to all positive data points.\n$True\\ Positive\\ Rate = True\\ Positive/\\ (False\\\
    \ Negative\\ +\\ True\\ Positive)$"

    # Optimization – Need of ML projects


    Optimization is the selection of the best element using some criterion from a
    set of available alternatives. The goal of optimization is to provide near perfect,
    effective and all possible alternatives. Maximizing or minimizing some function
    related to application or features of the application is the process of optimization.
    For example, minimizing the cost function or the mean square error is the goal
    of optimization in typical ML algorithms.


    Optimization is important when money and time are concerned. Machine learning
    often uses optimization algorithms to enhance algorithms’ learning performance.
    Reducing the cost function is the main aim of any optimization technique in machine
    learning. Optimization can include optimization of weights, activation nodes,
    network architecture and learning parameters. Training optimization improves the
    generalization ability of any model. In complex models, tuning of hyperparameters
    or finding the most suitable values for hyperparameters is the goal of optimization
    in Machine Learning.


    # Types of optimization techniques


    Broadly optimization techniques can be divided into two approaches:


    # Conventional Approach


    Conventional optimization approaches like gradient descent and back propagation
    are very popular and widely used. They can be categorized as first-order or second-order
    optimization techniques. The major advantage of using the conventional approaches
    is that they are very easy to use and implement. These are the direct methods
    that do not use any derivative information of the objective function. Here, only
    objective function values are used to guide the process.


    A variation in these techniques is also used to improve the performance of machine
    learning algorithms like momentum-based gradient descent and Stochastic gradient
    descent depending on the application where these machine learning algorithms are
    used.


    # Metaheuristic Approach


    A metaheuristic algorithm is evolved to find or generate a good solution to an
    optimization problem. Metaheuristics works when one has limited computation capacity
    and incomplete information available. The strength of metaheuristic'
  merge: -1
  pgno: 222
- img_proc: true
  md: "algorithms lies in two techniques: exploitation and exploration. Exploitation\
    \ is nothing but searching unknown and new areas in the search space where the\
    \ current good solution is found. Exploration is nothing but taking advantage\
    \ of the solutions that are already discovered. A metaheuristic is a procedure\
    \ that amalgamates these two techniques to find a good solution.\n\nThe overall\
    \ performance of the metaheuristic algorithms depends on the optimum use of these\
    \ two techniques. The efficiency also depends on how finely these two techniques\
    \ are balanced. Metaheuristic algorithms work on local and global levels to find\
    \ a solution. Thus, imbalanced exploration and exploitation will cause a problem.\
    \ Less exploration and more exploitation will cause trouble in finding the local\
    \ and global optimum. Also, more exploration and less exploitation will create\
    \ problems in convergence. Thus, the system will slow down, hampering its overall\
    \ performance of the system. The epitome of the metaheuristic algorithms is how\
    \ this balance between the two techniques is achieved.\n\nThere are wide varieties\
    \ of metaheuristic algorithms available, so clear differentiation between them\
    \ may not be possible. On a broad scale, these algorithms can be divided into\
    \ two groups:\n\n+   - **Single solution-based algorithms**\n  Single solution-based\
    \ algorithms concentrate on improving a single solution. Simulated Annealing and\
    \ Tabu search are examples of single solution-based algorithms. These algorithms\
    \ concentrate on local search by exploiting the local search space.\n- **Population-based\
    \ algorithms**\n  As the name suggests, population-based algorithms work on multiple\
    \ solutions and focus on finding the best among them using heuristics. These algorithms\
    \ are strong in global search.\n  These algorithms can be further divided into\
    \ the following:\n  - **Evolutionary algorithms:** Genetic algorithms are the\
    \ most popular evolutionary algorithms. Other than this, Genetic Programming,\
    \ Evolutionary Programming, and Differential Evolution are some of the popular\
    \ evolutionary algorithms. Evolutionary algorithms use an evolutionary framework\
    \ and genetic operators to generate new solutions. Genetic operators are mutation,\
    \ crossover, selection and so on. These operators are used repeatedly to evolve\
    \ new and optimal solutions.\n  These algorithms can be applied to different nonlinear\
    \ problems. The stopping criteria in evolutionary algorithms are indicated by\
    \ the fitness function, which, in turn, determines the quality of the solution.\
    \ Defining a proper fitness function is the key to evolutionary algorithms."

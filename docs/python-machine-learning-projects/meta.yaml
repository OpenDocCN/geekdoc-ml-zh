    \ require a pre-set number of clusters. It identifies outliers as noise and can\
    \ find arbitrarily sized and shaped clusters. However, handling clusters with\
    \ varying density is a task with DBSCAN because of distance epsilon ε.\n- **Expectation–Maximization\
    \ (EM) Clustering using Gaussian Mixture Models (GMM)**\n\nIn this algorithm,\
    \ it is assumed that the data points are Gaussian distributed and can take any\
    \ elliptical shape due to the standard deviation parameter, which is then assigned\
    \ to a single cluster. They are said to be flexible and less restrictive. To add\
    \ to this further, GMM supports mixed membership, that is, GMM belongs to X-percent\
    \ in class 1 and Y-percent in class 2. In order to find the mean and standard\
    \ deviation parameters of the Gaussian for each cluster, an optimization algorithm\
    \ named **Expectation–Maximization (EM)** is undertaken as follows:\n\n+   1.\
    \ The number of clusters is first selected by randomly initializing the Gaussian\
    \ distribution parameters for each cluster.\n2. The probability of each data point\
    \ belonging to a particular cluster is then determined. When a point is closer\
    \ to the Gaussian’s center, it is considered to belong to that cluster.\n3. New\
    \ sets of parameters are then computed using a weighted sum of the data point\
    \ positions. The weights specify the probability that the data point belongs to\
    \ the specific cluster.\n4. Steps 2 and 3 are repeated iteratively till convergence.\n\
    \n# Agglomerative Hierarchical Clustering\n\nHierarchical clustering is considered\
    \ to be an alternative to prototype-based clustering algorithm, where there is\
    \ no need to specify the number of clusters, it will find it by"
- md: "itself. Hierarchical clustering algorithms are categorized as follows:\n\n\
    - **Top-down algorithm**\n  This method starts by bringing all datapoints in one\
    \ single cluster. Then, it splits the cluster iteratively into smaller ones till\
    \ each one of them contains only one sample.\n- **Bottom-up algorithm**\n  It\
    \ is also known as hierarchical agglomerative clustering or HAC. In this, each\
    \ data point is considered as a single cluster, which is then successively merged\
    \ or paired merged and has all data points. Dendrograms, visualization of a binary\
    \ hierarchical clustering, also known as the hierarchy of clusters, is represented\
    \ as a tree. The root of this tree represents all the samples gathered, whereas\
    \ the leaves represent the clusters with only one sample, as represented in *Figure\
    \ 3.6*:\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_90_0.png)\n\nThe algorithm\
    \ comprises of the following steps:\n\n1. In the first step, every data point\
    \ is supposed to be a single cluster.\n2. A distance metric is specified to measure\
    \ the distance between two clusters.\n3. Two clusters are then combined into one\
    \ on every iteration based on the smallest distance between them.\n4. The previous\
    \ step is repeated till the root of the tree is reached, that is, only one cluster\
    \ with all data points is obtained.\n\n## Clustering Validation\n\nIt is the process\
    \ of evaluating the result of the cluster objectively and quantitatively by applying\
    \ cluster validation indices. These indices are divided into three main categories:\n\
    \n**External Indices:** This scoring method is used if the provided original data\
    \ is labelled. On this, a clustering structure is matched. The most used index\
    \ is this case is the Adjusted Rand index.\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_91_0.png)\n\
    \nWhere a is the number of points that are in the same clusters, in C and in K\n\
    **b** is the number of points that are in both clusters\n**n** is the total number\
    \ of samples\n\n$$ARI = RI - Expected Index / Max(RI) - Expected Index$$\n\nThe\
    \ value of ARI ranges between -1 to 1. The higher the value of ARI, the better\
    \ it matches the original data.\n\n**Internal Validation Indices:** This method\
    \ is used when the data is unlabeled. The index used for internal validation is\
    \ the Silhouette Coefficient.\n\n**Silhouette Coefficient:** For each data point,\
    \ it is defined as follows:\n\n$$Si = bi - ai / Max(bi - ai)$$\n\nWhere **a**\
    \ is the average distance to the other sample for a in the same cluster.\n**B**\
    \ is the average distance to other sample i in the closest neighboring cluster.\n\
    The **Silhouette Coefficient** (SC) is given by the following:\n**Sc** is the\
    \ average of the sum of Si for each point\nIts value ranges between -1 to 1. The\
    \ higher the value obtained, the better is the K value selected. It is preferred\
    \ only for K-Means and hierarchical clustering algorithms and not for DBSCAN.\n\
    \n## Neural Network and SVM\n\nA neural network is a class of machine learning\
    \ algorithm that is used to model complex patterns in the datasets through multiple\
    \ hidden layers and non-linear activation functions.\n\n## Building Blocks: Neurons\n\
    \nThe basic unit of a neural network is the neuron. It takes the inputs, processes\
    \ them with mathematical operations and produces an output as represented by a\
    \ 2-input neuron in Figure 3.7:\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_92_0.png)\n\
    \nThe operation that is performed is as follows:\n\n1. Each input is multiplied\
    \ by a weight, where x1 and x2 are the inputs, and w1 and w2 are the weights.\n\
    \n$$x1 \\rightarrow x1 * w1$$\n$$x2 \\rightarrow x2 * w2$$\n\n2. All the weighted\
    \ inputs are then added with a bias b:\n\n$$(x1 * w1) + (x2 * w2) + b$$\n\n3.\
    \ The sum is passed through an activation function that converts an unbounded\
    \ input into predictable form given in the following equation. This process of\
    \ passing inputs forward to get an output is known as feedforward. Activation\
    \ functions are also known as mapping functions. They take some input on the x-axis\
    \ and output a value in a restricted range.\n\n$$y = f(x1 * w1 + x2 * w2 + b)$$\n\
    \n## Combining Neurons into a Neural Network\n\nA neural network comprises of\
    \ a bunch of neurons connected to each other, as shown in Figure 3.8:\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_93_0.png)\n\
    \nFigure 3.8: Neural Network\n\nThere are two layers that every NN has. These\
    \ layers are the hidden layer that fall between the input and output layers. As\
    \ represented in Figure 3.8, the network has two inputs (x1 and x2) and a hidden\
    \ layer with two neurons (h1 and h2). The hidden layer is said to be any layer\
    \ that is in between the input (first) layer and output (last) layer. The output\
    \ layer with 1 neuron (O1) is further represented that has inputs from h1 and\
    \ h2. The hidden layers H1 and H2 then help to develop the output neuron O1.\n\
    \n## Training the neural network\n\nIt refers to training the network in such\
    \ a way that it minimizes the losses.\nThe losses are defined in terms of **Mean\
    \ squared error (MSE)**\n\n$$MSE = \\frac{1}{n} \\sum_{i=1}^{n} (Y_i - \\hat{Y}_i)^2$$\n\
    \nWhere n is the number of samples, y represents the variable being predicted,\
    \ and $Y_i$ is the true value of the variable (the “correct answer”). $\\hat{Y}_i$\
    \ is the predicted value of the variable the network outputs. $(yi - y\\hat{})^2$\
    \ (is known as the squared error).\nThe goal is to minimize the error. A guess,\
    \ an error measurement, an incremental change in its weights and adjustment to\
    \ the coefficients are performed at every step of learning from the neural network.\n\
    A model represents the collection of weights. These weights map the inputs that\
    \ enter the network to a set of outputs, forming the guess made by the network.\
    \ This is often known as scoring input. Therefore, the guess is being represented\
    \ by **Guess = input * weight**. The actual data, also known ground truth, is\
    \ then compared to the guess to determine the error.\n\n## Neural Network Architectures\n\
    \nThere are different architecture styles of neural networks that can be used.\
    \ These include the following:\n\n- **Perceptrons or feed-forward neural network**\n\
    \  Perceptron is the first generation of neural networks, proposed by Rosenblatt;\
    \ it is shown in *Figure 3.9*. It feeds information from the front to the back.\
    \ Training perceptrons is done through backpropagation, where the error is backpropagated.\
    \ This error is the difference between the input and the output data. Training\
    \ gives the network paired datasets of inputs and outputs. Inputs are sent into\
    \ the neuron, where they are processed, resulting in an output. With a sufficient\
    \ number of hidden neurons, the algorithm models the relationship between the\
    \ input and output. Multilayer perceptrons comprise three or more layers with\
    \ a nonlinear activation function.\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_94_0.png)\n\
    \n- **Convolutional neural network**\n  It is a variation of the multilayer perceptron\
    \ and uses backpropagation in a feedforward network comprising of several hidden\
    \ layers, replicated units in each layer and output pooling of nearby replicated\
    \ units.\n\n- **Recursive neural network**\n  It uses weights to make structured\
    \ predictions.\n\n- **Recurrent neural network (RNN)**\n  It connects neurons\
    \ in a directed cycle manner without utilizing the activation function. They are\
    \ said to be stateless perceptrons. RNN combines two properties:\n\n- It comprises\
    \ of a distributed hidden state that allows the neurons them to store information\
    \ about the past efficiently.\n- It possesses nonlinear dynamics that allow the\
    \ neurons them to update their hidden state in complicated ways.\n\n## Long /\
    \ Short-Term Memory\n\nIt uses the recurrent neural network architecture and combats\
    \ the vanishing/exploding gradient problem by introducing gates and explicitly\
    \ defining memory cell. The working of this memory cell comprises of storing the\
    \ previous value of data till a “forget gate” tells the cell to forget those values.\n\
    \n## Gated recurrent units (GRU)\n\nThey do not need the cell layer to pass the\
    \ values. The calculations within each iteration ensure that the probability of\
    \ retaining the old or new information is high. GRUs are incrementally faster\
    \ and easier to run, but they are less expressive.\n\n## Hopfield network\n\n\
    Recurrent networks of non-linear units are hard to analyze as they settle to a\
    \ stable state, oscillate or follow chaotic trajectories in different manners.\
    \ To resolve these issues, John Hopfield introduced the **Hopfield Network (HN)**.\
    \ In the HN network, every neuron is connected to every other neuron, where the\
    \ networks are trained by setting the value of the neurons to the desired pattern,\
    \ and then the weights are computed. The weights do not change after this. Once\
    \ trained for a pattern, the network converges to only that learned pattern.\n\
    \n## Boltzmann machine\n\nIt is a type of stochastic recurrent neural network,\
    \ which is capable of learning internal representations and can represent and\
    \ solve difficult combinatorial problems. In this, only some neurons are marked\
    \ as input neurons, and others act as hidden. Once the output is obtained, the\
    \ input neurons that have binary activation patterns become output neurons. The\
    \ process begins by using random weights and learning through backpropagation.\n\
    \n## Deep belief networks\n\nUsing backpropagation has some problems, such as\
    \ the following:\n\na. Back propagation method performs on labeled training data\
    \ while most of the data is unlabeled.\nb. It operates in a very slow manner in\
    \ networks having multiple hidden layers."
  mdcn: "其本身。层次聚类算法分类如下：\n\n- **自顶向下算法**\n  该方法首先将所有数据点归入一个单一簇中。然后，它迭代地将该簇分裂成更小的簇，直到每个簇仅包含一个样本。\n\
    - **自底向上算法**\n  也称为层次聚合聚类或HAC。在此方法中，每个数据点被视为一个单独的簇，然后通过逐次合并或配对合并，最终形成包含所有数据点的簇。树状图是二元层次聚类的可视化表示，也称为簇的层次结构，它以树的形式呈现。这棵树的根代表所有收集到的样本，而叶子则代表仅包含一个样本的簇，如*图3.6*所示：\n\
    \n![](img/05e0d1e671c636fe8ee73a026cd179da_90_0.png)\n\n该算法包含以下步骤：\n\n1.  在第一步中，每个数据点都被假定为一个单独的簇。\n\
    2.  指定一个距离度量来衡量两个簇之间的距离。\n3.  然后，在每次迭代中，根据两个簇之间的最小距离，将两个簇合并为一个。\n4.  重复上一步骤，直到达到树的根节点，即获得一个包含所有数据点的单一簇。\n\
    \n## 聚类验证\n\n这是通过应用聚类验证指标来客观、定量地评估聚类结果的过程。这些指标主要分为三大类：\n\n**外部指标：** 如果提供的原始数据带有标签，则使用此评分方法。它将聚类结构与真实标签进行匹配。此情况下最常用的指标是调整兰德指数。\n\
    \n![](img/05e0d1e671c636fe8ee73a026cd179da_91_0.png)\n\n其中 a 是在聚类 C 和聚类 K 中属于同一簇的点的数量。\n\
    **b** 是同时属于两个簇的点的数量。\n**n** 是样本总数。\n\n$$ARI = RI - Expected Index / Max(RI) -\
    \ Expected Index$$\n\nARI 的值范围在 -1 到 1 之间。ARI 的值越高，与原始数据的匹配度越好。\n\n**内部验证指标：**\
    \ 当数据没有标签时使用此方法。用于内部验证的指标是轮廓系数。\n\n**轮廓系数：** 对于每个数据点，其定义如下：\n\n$$Si = bi - ai\
    \ / Max(bi - ai)$$\n\n其中 **a** 是点 i 到同一簇中其他样本的平均距离。\n**B** 是点 i 到最近邻簇中其他样本的平均距离。\n\
    **轮廓系数** (SC) 由以下公式给出：\n**Sc** 是每个点的 Si 之和的平均值。\n其值范围在 -1 到 1 之间。获得的值越高，表明选择的\
    \ K 值越好。它仅适用于 K-Means 和层次聚类算法，不适用于 DBSCAN。\n\n## 神经网络与支持向量机\n\n神经网络是一类机器学习算法，用于通过多个隐藏层和非线性激活函数来建模数据集中的复杂模式。\n\
    \n## 基本构件：神经元\n\n神经网络的基本单元是神经元。它接收输入，通过数学运算进行处理，并产生输出，如图3.7所示的2输入神经元：\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_92_0.png)\n\
    \n执行的操作如下：\n\n1.  每个输入乘以一个权重，其中 x1 和 x2 是输入，w1 和 w2 是权重。\n\n$$x1 \\rightarrow\
    \ x1 * w1$$\n$$x2 \\rightarrow x2 * w2$$\n\n2.  然后，所有加权输入与一个偏置 b 相加：\n\n$$(x1\
    \ * w1) + (x2 * w2) + b$$\n\n3.  求和结果通过一个激活函数，该函数将无界输入转换为如下方程所示的可预测形式。这种将输入向前传递以获得输出的过程称为前馈。激活函数也称为映射函数。它们在\
    \ x 轴上接收一些输入，并在受限范围内输出一个值。\n\n$$y = f(x1 * w1 + x2 * w2 + b)$$\n\n## 将神经元组合成神经网络\n\
    \n神经网络由一组相互连接的神经元组成，如图3.8所示：\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_93_0.png)\n\
    \n图3.8：神经网络\n\n每个神经网络都有两个层。这些层是位于输入层和输出层之间的隐藏层。如图3.8所示，该网络有两个输入（x1 和 x2）和一个包含两个神经元（h1\
    \ 和 h2）的隐藏层。隐藏层是指位于输入（第一）层和输出（最后）层之间的任何层。具有1个神经元（O1）的输出层进一步表示，其输入来自 h1 和 h2。隐藏层\
    \ H1 和 H2 然后帮助生成输出神经元 O1。\n\n## 训练神经网络\n\n它指的是以最小化损失的方式训练网络。\n损失根据**均方误差 (MSE)**\
    \ 来定义。\n\n$$MSE = \\frac{1}{n} \\sum_{i=1}^{n} (Y_i - \\hat{Y}_i)^2$$\n\n其中 n\
    \ 是样本数量，y 代表被预测的变量，$Y_i$ 是该变量的真实值（“正确答案”）。$\\hat{Y}_i$ 是网络输出的变量预测值。$(yi - y\\\
    hat{})^2$（被称为平方误差）。\n目标是最小化误差。在神经网络学习的每一步中，都会进行一次猜测、误差测量、权重的增量变化以及系数的调整。\n模型代表权重的集合。这些权重将进入网络的输入映射到一组输出，形成网络做出的猜测。这通常被称为对输入进行评分。因此，猜测由\
    \ **Guess = input * weight** 表示。然后，将实际数据（也称为真实值）与猜测进行比较以确定误差。\n\n## 神经网络架构\n\n\
    可以使用不同架构风格的神经网络。包括以下几种：\n\n- **感知器或前馈神经网络**\n  感知器是第一代神经网络，由罗森布拉特提出；如*图3.9*所示。它将信息从前往后传递。训练感知器是通过反向传播完成的，其中误差被反向传播。这个误差是输入数据和输出数据之间的差异。训练为网络提供成对的输入和输出数据集。输入被送入神经元，在那里进行处理，产生输出。通过足够数量的隐藏神经元，该算法可以建模输入和输出之间的关系。多层感知器包含三层或更多层，并具有非线性激活函数。\n\
    \n![](img/05e0d1e671c636fe8ee73a026cd179da_94_0.png)\n\n- **卷积神经网络**\n  它是多层感知器的一种变体，在包含多个隐藏层、每层具有复制单元以及对附近复制单元进行输出池化的前馈网络中使用反向传播。\n\
    \n- **递归神经网络**\n  它使用权重来进行结构化预测。\n\n- **循环神经网络 (RNN)**\n  它以有向循环的方式连接神经元，而不使用激活函数。它们被称为无状态感知器。RNN\
    \ 结合了两个特性：\n\n- 它包含一个分布式隐藏状态，允许神经元高效地存储关于过去的信息。\n- 它具有非线性动力学特性，允许神经元以复杂的方式更新其隐藏状态。\n\
    \n## 长短期记忆\n\n它使用循环神经网络架构，通过引入门控机制和明确定义记忆单元来解决梯度消失/爆炸问题。该记忆单元的工作原理包括存储数据的先前值，直到“遗忘门”告诉单元忘记这些值。\n\
    \n## 门控循环单元 (GRU)\n\n它们不需要单元层来传递值。每次迭代中的计算确保保留旧信息或新信息的概率很高。GRU 运行速度更快、更容易，但表达能力较弱。\n\
    \n## Hopfield 网络\n\n非线性单元的循环网络很难分析，因为它们会以不同的方式稳定到稳定状态、振荡或遵循混沌轨迹。为了解决这些问题，约翰·霍普菲尔德引入了\
    \ **Hopfield 网络 (HN)**。在 HN 网络中，每个神经元都与其他每个神经元相连，其中网络通过将神经元的值设置为期望模式来训练，然后计算权重。此后权重不再改变。一旦针对某个模式训练完成，网络只会收敛到那个学习到的模式。\n\
    \n## 玻尔兹曼机\n\n它是一种随机循环神经网络，能够学习内部表示，并可以表示和解决困难的组合问题。在此，只有一些神经元被标记为输入神经元，其他神经元充当隐藏神经元。一旦获得输出，具有二元激活模式的输入神经元就成为输出神经元。该过程从使用随机权重开始，并通过反向传播进行学习。\n\
    \n## 深度信念网络\n\n使用反向传播存在一些问题，例如：\n\na. 反向传播方法在有标签的训练数据上执行，而大多数数据是无标签的。\nb. 在具有多个隐藏层的网络中，它的运行速度非常慢。"

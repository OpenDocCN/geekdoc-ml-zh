  - '[PAGE 189]


    Major characteristics of predictive analytics are as listed here:


    +   - Some predictive models are complex in nature

    - Most predictive models operate at a fast rate

    - Predictive analytics perform their calculations in real time

    - The predictive model is revised regularly to incorporate changes in its underlying
    data


    # Machine Learning vs Predictive Modeling


    Table 4.3 represents the comparison between machine learning and predictive modeling:


    | Characteristics | Machine Learning (ML) | Predictive Modeling (PM) |

    | :--- | :--- | :--- |

    | **Definition** | Data is provided at the input without applying any set of predetermined
    rules and regulations | Current and historical sets of data are provided to find
    patterns and behaviors in predictive modeling algorithms |

    | **Operations** | Machine learning algorithms are trained to learn from their
    past mistakes to improve future performance | It makes informed predictions based
    on historical data about future events only |

    | **Principle** | Machine learning forms the core set of algorithms for performing
    predictive modeling | Predictive modelling can be said to be a subset and an application
    of machine learning |

    | **Working** | Whenever a new set of data is added to ML systems, they can adapt
    and learn from it automatically, without the need of being directly programmed
    | It includes a series of statistical techniques and uses statistics to estimate
    or predict future outcomes, given a set of input data |

    | **Techniques used** | ML algorithms are broadly classified into supervised and
    unsupervised learning algorithms | Predictive modeling is further identified through
    descriptive analysis, diagnostic analysis, predictive analysis and prescriptive
    analysis |

    | **Approaches and Models** | The various approaches considered in machine learning
    include Decision tree learning, Association rule learning, Artificial neural networks,
    Deep learning, Inductive logic programming, Support vector machines, Clustering,
    Bayesian networks, Reinforcement learning, Genetic algorithms and Rule-based learning
    | Data in predictive modeling is handled using Naïve Bayes, K-nearest neighbor,
    Support vector machines, Boosted trees, Random forests, **Classification and Regression
    trees(CART)**, Neural Networks, Ordinary Least Squares, Logistic and Robust Regression
    algorithms |

    | **Applications** | Applications that utilize machine learning algorithms include
    Bioinformatics, Brain-machine interfaces, Computer vision, Object recognition,
    Detecting credit card fraud, | These include Uplift modeling, Archaeology, Customer
    relationship management, Auto insurance, Healthcare, Marketing campaigns optimization,
    Fraud detection, Risk |'
  - '[PAGE 190]


    | | | |

    |---|---|---|

    | | Linguistics, Marketing, Machine perception, Medical diagnosis, Economics,
    Insurance, and Online advertising | reduction, Customer retention, Sales funnel
    insights, Crisis Management, Disaster Management, Financial modeling Market trend
    and analysis, and Credit scoring |

    | **Update Handling** | Updations are performed automatically in ML algorithms
    | These models require updations to be run manually multiple times |

    | **Utilization of Technology** | ML modeling are data-driven models | PM techniques
    are use case-driven systems |

    | **Drawbacks** | 1. Large amounts of data are needed to train the system<br>2.
    Correct ML algorithm needs to be chosen<br>3. Only the right algorithm will give
    an optimized solution | 1. It requires a large amount of data that can be applied
    for predictive analysis<br>2. For making accurate outcomes, apt method needs to
    be applied |


    *Table 4.3: Machine Learning Vs Predictive Modeling*


    # Building a predictive model


    Prior to building a predictive model, we need to identify the historical data
    and the outcome that needs to be predicted. This is because the model can infer
    outcomes from historical data but cannot predict the data it has never seen before.
    Here are the steps used to build a predictive analytics model:


    +   1. **Ensure correctness of the input data:** The correctness of the data input,
    both in terms of its volume and breadth, is critical to determine an accurate
    prediction.

    2. **Clean the data:** Various ways to clean, transform and combine the raw data
    need to be determined for better predictions. The data so obtained needs to be
    properly transformed into appropriate data features that are most suitable for
    a given model.

    3. **Remove unwanted data:** Removing data that is not relevant to a model needs
    to be eliminated as the additional data can slow the model down or lead to less
    accurate models.

    4. **Determine the predictive modeling approach to be used:** Approaches like
    parametric and non-parametric approaches need to be chosen to perform predictive
    modeling and analytics.

    5. **Preprocess the data into a form suitable for the chosen modeling algorithm:**
    The cleaned and transformed data, as represented in step 2,'
  - '[PAGE 191]


    needs to be further processed and readied depending on the approach decided in
    step 4.


    +   6. **Identify the data to be used for training the model:** Data used for
    the purpose of training the model has to be identified.

    7. **Train, or estimate, model parameters from the training data set:** The actual
    model building starts here by determining and estimating the training and model
    parameters for the model to be developed.

    8. **Determine the model performance and check the model’s adequacy:** The performance
    of the model developed and considered as per step 4 is verified, and it is validated
    for accuracy.

    9. **Apply the model on the test data and determine its accuracy:** Based on the
    acceptable level of performance and accuracy of model considered, the model is
    tested on the test data.

    10. **Utilize the model for further predictions:** Once the performance of the
    model satisfies the accuracy levels and is acceptable, it can be used for other
    sets of predictions.


    # Types of predictive algorithms


    Predictive algorithms either use machine learning or deep learning for performing
    predictions, where machine learning works on structured data while deep learning
    deals with unstructured data like video, audio and text. Let’s look at the algorithms
    commonly used in predictive analytics.


    # Decision Trees


    +   - They are one of the simplest models and are considered easy to understand.

    - These techniques aid in making a decisions quickly.

    - These represent tree-like structures having branches and leaves, where the branches
    represent the available choices and the leaves indicate a particular decision.

    - The data of the trees are placed into different sections based on certain characteristics
    or variables.


    # Random Forest


    +   - A combination of decision trees forms the random forest algorithm.

    - The combined trees are distinct and are not related to each other.'
  - '[PAGE 192]


    +   - They can use both classification and regression to classify large amounts
    of data.


    # Regression


    +   - As mentioned in the previous chapter, in the regression model, the relationship
    between all the inputs found in the dataset is represented through a formula.

    - This model uses statistical analysis to determine patterns in large sets of
    data when there is a linear relationship between the inputs.


    # Neural Networks


    +   - Complex data relationships are handled through these.

    - These models utilize artificial intelligence and pattern recognition to determine
    the relationship.

    - It is mainly used when there is too much data on hand and no formula suffices
    to find a relationship between the inputs and outputs in the dataset provided.


    # Generalized Linear Model (GLM) for Two Values


    In this algorithm, the number of variables is reduced to find the “best fit” for
    the data variables considered.


    # Gradient Boosted Model


    +   - It uses several combined decision trees that are related to each other.

    - It builds one tree at a time.

    - The next related tree is built to correct flaws in the previous tree.

    - It is used in developing rankings.


    # K-Means


    +   - It is considered a fast algorithm.

    - It groups similar data points together.

    - K-means algorithms are often used for the clustering model.


    # Prophet


    +   - These algorithms are usually used for capacity planning, inventory needs,
    sales quotas and resource allocations.

    - They are highly flexible.'
- md: '## Types of Predictive Analytical Models


    Based on the previously mentioned techniques, predictive analytics models are
    broadly classified into the following:


    **Classification model:** It is considered to be the simplest model that categorizes
    the data to handle simple and direct query responses. An example use case would
    be to answer the question “Is this a fake account number?”.


    **Clustering model:** As the name suggests, this model groups data based on common
    attributes. This grouping can be done by bringing together things or people with
    shared characteristics or behaviors. For example, based on the operations done
    by people in the same or similar situations in the past, loan approval can be
    given to a person.


    **Forecast model:** Based on learning from historical data, this model works on
    numerical data. For example, at a call center, the number of calls a call center
    executive should be able to handle per day or week is determined by looking at
    historical data.


    **Outliers model:** This model works by analyzing abnormal or data points outside
    a specified range. For example, a bank can use this model to determine whether
    a transaction done by a customer is outside of their normal buying habits. This
    would enable them to determine a fraud situation.


    **Time series model:** The evaluation in this model is based on time as a parameter
    that is applied on a sequence of data points. For example, based on the number
    of patients admitted to the hospital over a period of weeks, predictions can be
    made as to the number of patients the hospital might expect in the near future,
    over months or the rest of the year.


    ## Comparison of Predictive Modeling and Predictive Analytics


    The differences between predictive modeling and predictive analytics are listed
    in *Table 4.4*:


    | Characteristics | Predictive Modeling | Predictive Analytics |

    | :--- | :--- | :--- |

    | Steps of operation | 1. Data gathering and cleansing<br>2. Data analysis/transformation<br>3.
    Building a predictive model<br>4. Inferences/evaluation | Business process includes:<br>1.
    Defining the project<br>2. Data collection<br>3. Data analysis<br>4. Statistics<br>5.
    Modeling<br>6. Deployment<br>7. Model monitoring |

    | Process | It is an iterative process | It analyses historic and transaction
    data |

    | Techniques applied | Runs one or more algorithms on data sets that are reusable
    | Applies statistics, data mining, machine learning and artificial intelligence
    techniques to predict the outcome |

    | Classification | Is classified into parametric and non-parametric model | Comprise
    predictive, description and decision related models |

    | Applications | Used in vehicle insurance, healthcare and so on | Used in project
    risk management, fraud detection |

    | Type of model/analytics performed | Types of model categories include predictive,
    descriptive and decision models | Types of analytics performed are regression
    and machine learning techniques |


    Table 4.4: Predictive Modeling and Predictive Analytics


    ## Predictive modeling vs data analytics


    The difference between predictive modeling and data analytics is elaborated on
    in Table 4.5:


    | Characteristics | Predictive Modeling | Data Analytics |

    |---|---|---|

    | Definition | It is defined as a statistical technique to predict future behavior.
    | It is defined as a science of analyzing raw data to make conclusions about that
    information. |

    | Known as | It is known as predictive analytics. | It is also known as data analysis.
    |

    | Term used | It is termed as predictive modelling in academic applications and
    predictive analytics in commercial applications. | It is termed as: 1. Prescriptive
    analytics on the basis of data analysis 2. Predictive analytics on the basis of
    the prediction of future possibilities of business events 3. Descriptive analytics
    on the basis of extracting the description based on the data 4. Diagnostic analytics
    or diagnostics on the basis of determining the cause behind the glitches in the
    business processes |

    | Depends on | It depends on the access to sufficient volumes of accurate, clean
    and relevant data. | It depends on the data being used and the goal of the analysis.
    |

    | Process | It follows an iterative process, due to which it automatically creates
    accurate predictive models about the future. | It is used to study the behavior
    of the created model, which is about to be predicted. |

    | Algorithms Used | Decision trees, K-means clustering and neural network | Linear
    and logistic regression, clustering, K-nearest neighbors, PCA, time-series and
    sequencing |

    | Used for | It is extensively used in analytical customer relationship management
    and data mining to produce customer-level models. | It is used in finding hidden
    patterns, unidentified correlations, customer preferences and market trends. |

    | Solutions | Predictive modeling solutions are a form of data-mining technology
    that works by analyzing historical and current data and generating a model to
    help predict future outcomes. | Business Intelligence (BI) and analytics services
    provide a foundation for insight and analysis to make more insightful business
    decisions and execute them quickly. |


    Table 4.5: Comparison between Predictive Modeling Vs Data Analytics


    ## Comparison between Predictive Analytics and Data Analytics


    Table 4.6 compares predictive analytics and data analytics:


    | Characteristics | Predictive analytics | Data Analytics |

    | --- | --- | --- |

    | Definition | It operates on the current and past data trends. | It deals with
    refining the data. |

    | Prerequisite | Technical and statistical knowledge is required. | Strong statistical
    knowledge is required to perform data analytics operations. |

    | Focus | The focus is on inferring a pattern on which predictions could be made.
    | It focuses on drawing conclusions from the dataset. |

    | Objective | It is a specialized form of analytics whose main purpose is to evaluate
    the risk and predict future outcomes. | It is a general form of analytics whose
    purpose is to make data-driven decisions. |

    | Steps for building the model | Model the data, train the model, then predict
    and forecast the outcome. | Collect, inspect, clean and transform the data in
    order to reach the conclusion. |

    | Approach | Forecasting and predictions use advanced computational models and
    algorithms. | In order to build deep insights on data, traditional algorithms
    are used. |

    | Procedure | Clean data is used to build a predictive model. | Raw data is collected,
    cleaned and transformed to perform data analytics. |

    | Outcome | Reliable predictive model is generated as an outcome of predictive
    analytics. | Predictive or non-predictive models can be obtained as an outcome
    of data analytics. |

    | Usage | It helps to answer questions such as “what will happen if”, for example,
    “What will happen if the demand of a product goes down by 10%?” | It can be used
    to find hidden patterns, unidentified correlations, customer preferences that
    could help to make more informed decisions for businesses. |

    | Applications | Sales Forecasting, Crisis Management, Analytical customer relationship
    management, Clinical decision support systems (CRM) | Fraud and Risk Detection,
    Delivery Logistics, Customer Interactions, Digital Advertisement and so on |


    Table 4.6: Comparison between Predictive Analytics and Data Analytics


    ## Uses or applications of Predictive Analytics


    Predictive analytics are utilized by various organizations to help them solve
    difficult problems, uncover new opportunities and aids by acting as a decision-making
    tool. Predictive analytics is used in a variety of industries, and can be relevant
    and applied in many sectors, such as banking and financial services, retail, pharmaceuticals,
    healthcare, insurance, oil gas and utilities, government public sectors, and aerospace.
    These analytics can be used in a number of areas:


    **Forecasting:** Predictive analytics has an important role in the manufacturing
    sector. As manufacturing units work on the principle of supply chain management,
    it requires the right amount of data to be input to the system. This ensures smooth
    functioning of the manufacturing system and maintaining timelines. Therefore,
    to ensure optimal utilization of resources, there is a need to forecast the right
    amount of resources (data) at the input and maintain proper inventory of the raw
    material required for manufacturing the product. Predictive modeling enables such
    accurate forecasts by providing clean, good-quality and correct amount of data
    as input.


    **Reducing Risks:** Based on a consumer’s behavior and credit history, their credit
    ratings are determined. This helps the application categorize the consumers into
    premium customers, regular, defaulter customers, corporate spying or cyber-attacks.
    Predictive analytics thus helps to determine the credit rating of an applicant
    or consumer. Based on the applicant’s credit history, it is determined whether
    the consumer will be able to repay the extended credit. Thus, predictive analytics
    is used to predict the risk that the applicant might fail to perform on any credit
    extended.


    **Underwriting:** Insurance companies need to determine whether they will have
    to shell out money on claims made by the applicants on various causes, on a case-to-case
    basis. This would ensure that the company would be able to manage their financial
    portfolio accordingly. The method employed by the companies is to analyze the
    past records of the applicant as well as the claims filed by similar policyholders.
    These predictions can be performed by applying several predictive analytics models.'
  mdcn: '## 预测分析模型的类型


    基于前述技术，预测分析模型大致可分为以下几类：


    **分类模型：** 这被认为是最简单的模型，它对数据进行分类，以处理简单直接的查询响应。一个示例用例是回答“这是一个虚假账户吗？”这类问题。


    **聚类模型：** 顾名思义，该模型根据共同属性对数据进行分组。这种分组可以通过将具有共同特征或行为的事物或人聚集在一起来实现。例如，根据过去处于相同或相似情况下的人的操作，可以向某人批准贷款。


    **预测模型：** 该模型基于从历史数据中学习，处理数值数据。例如，在呼叫中心，通过查看历史数据来确定呼叫中心坐席每天或每周应能处理的呼叫数量。


    **异常值模型：** 该模型通过分析异常或超出指定范围的数据点来工作。例如，银行可以使用此模型来确定客户的交易是否超出了其正常的购买习惯。这将帮助他们识别欺诈情况。


    **时间序列模型：** 该模型的评估基于时间作为参数，应用于一系列数据点。例如，根据一段时间内（数周）医院收治的患者数量，可以预测医院在未来数月或年内可能预期的患者数量。


    ## 预测建模与预测分析的比较


    预测建模与预测分析之间的差异列于*表 4.4*：


    | 特征 | 预测建模 | 预测分析 |

    | :--- | :--- | :--- |

    | 操作步骤 | 1. 数据收集与清洗<br>2. 数据分析/转换<br>3. 构建预测模型<br>4. 推断/评估 | 业务流程包括：<br>1. 定义项目<br>2.
    数据收集<br>3. 数据分析<br>4. 统计<br>5. 建模<br>6. 部署<br>7. 模型监控 |

    | 流程 | 这是一个迭代过程 | 它分析历史和交易数据 |

    | 应用技术 | 在可重用的数据集上运行一个或多个算法 | 应用统计学、数据挖掘、机器学习和人工智能技术来预测结果 |

    | 分类 | 分为参数模型和非参数模型 | 包括预测、描述和决策相关模型 |

    | 应用领域 | 用于车辆保险、医疗保健等 | 用于项目风险管理、欺诈检测 |

    | 执行的模型/分析类型 | 模型类别包括预测、描述和决策模型 | 执行的分析类型是回归和机器学习技术 |


    表 4.4：预测建模与预测分析


    ## 预测建模与数据分析


    预测建模与数据分析之间的差异在表 4.5 中详细阐述：


    | 特征 | 预测建模 | 数据分析 |

    |---|---|---|

    | 定义 | 它被定义为一种预测未来行为的统计技术。 | 它被定义为分析原始数据以得出关于该信息的结论的科学。 |

    | 别称 | 它被称为预测分析。 | 它也被称为数据分析。 |

    | 术语使用 | 在学术应用中称为预测建模，在商业应用中称为预测分析。 | 根据不同基础称为：1. 基于数据分析的规范性分析 2. 基于预测业务事件未来可能性的预测性分析
    3. 基于从数据中提取描述的描述性分析 4. 基于确定业务流程故障原因的诊断性分析或诊断 |

    | 依赖于 | 它依赖于访问足够数量的准确、干净和相关的数据。 | 它取决于所使用的数据和分析的目标。 |

    | 流程 | 它遵循迭代过程，因此能自动创建关于未来的准确预测模型。 | 它用于研究即将被预测的已创建模型的行为。 |

    | 使用的算法 | 决策树、K-均值聚类和神经网络 | 线性回归和逻辑回归、聚类、K-近邻、PCA、时间序列和序列分析 |

    | 用途 | 它广泛应用于分析型客户关系管理和数据挖掘，以生成客户级模型。 | 它用于发现隐藏模式、未识别的关联、客户偏好和市场趋势。 |

    | 解决方案 | 预测建模解决方案是数据挖掘技术的一种形式，通过分析历史和当前数据并生成模型来帮助预测未来结果。 | 商业智能和分析服务为洞察和分析提供基础，以做出更有见地的商业决策并快速执行。
    |


    表 4.5：预测建模与数据分析的比较


    ## 预测分析与数据分析的比较


    表 4.6 比较了预测分析和数据分析：


    | 特征 | 预测分析 | 数据分析 |

    | --- | --- | --- |

    | 定义 | 它基于当前和过去的数据趋势进行操作。 | 它涉及数据的提炼。 |

    | 前提条件 | 需要技术和统计知识。 | 执行数据分析操作需要强大的统计知识。 |

    | 重点 | 重点在于推断出可以进行预测的模式。 | 它侧重于从数据集中得出结论。 |

    | 目标 | 它是分析的一种专门形式，其主要目的是评估风险并预测未来结果。 | 它是分析的一种通用形式，其目的是做出数据驱动的决策。 |

    | 构建模型的步骤 | 对数据建模，训练模型，然后预测和预测结果。 | 收集、检查、清理和转换数据以得出结论。 |

    | 方法 | 预测和预测使用先进的计算模型和算法。 | 为了构建对数据的深入洞察，使用传统算法。 |

    | 流程 | 使用干净的数据来构建预测模型。 | 收集、清理和转换原始数据以执行数据分析。 |

    | 结果 | 作为预测分析的结果，生成可靠的预测模型。 | 作为数据分析的结果，可以获得预测性或非预测性模型。 |

    | 用途 | 它有助于回答诸如“如果……会发生什么”之类的问题，例如，“如果产品的需求下降10%会发生什么？” | 它可用于发现隐藏模式、未识别的关联、客户偏好，这些可以帮助企业做出更明智的决策。
    |

    | 应用领域 | 销售预测、危机管理、分析型客户关系管理、临床决策支持系统 | 欺诈和风险检测、配送物流、客户互动、数字广告等 |


    表 4.6：预测分析与数据分析的比较


    ## 预测分析的用途或应用


    预测分析被各种组织利用，帮助他们解决难题、发现新机会，并作为决策工具提供帮助。预测分析应用于各行各业，并且可以与许多领域相关并应用，例如银行和金融服务、零售、制药、医疗保健、保险、石油天然气和公用事业、政府公共部门以及航空航天。这些分析可用于多个领域：


    **预测：** 预测分析在制造业中发挥着重要作用。由于制造单元基于供应链管理原则运作，它需要向系统输入正确数量的数据。这确保了制造系统的平稳运行并保持时间线。因此，为了确保资源的最优利用，需要在输入端预测正确数量的资源（数据），并保持制造产品所需原材料的适当库存。预测建模通过提供干净、高质量且数量正确的数据作为输入，能够实现这种准确的预测。


    **降低风险：** 根据消费者的行为和信用历史，确定其信用评级。这有助于将消费者分类为优质客户、普通客户、违约客户、企业间谍或网络攻击。因此，预测分析有助于确定申请人或消费者的信用评级。根据申请人的信用历史，确定消费者是否能够偿还所延长的信贷。因此，预测分析用于预测申请人可能无法履行任何信贷义务的风险。


    **承保：** 保险公司需要确定他们是否必须为申请人提出的各种原因索赔支付费用，这需要逐案评估。这将确保公司能够相应地管理其财务组合。公司采用的方法是分析申请人的历史记录以及类似保单持有人提出的索赔。这些预测可以通过应用多种预测分析模型来执行。'

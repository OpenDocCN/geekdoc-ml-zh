- md: "Most machine learning applications include classification and regression algorithms.\
    \ Hence, the evaluation metrics used for classification and regression applications\
    \ include the following.\n\n## Classification Metrics\n\nThe metrics used in classification\
    \ problems include the following:\n\n- **Classification accuracy**\n  Accuracy\
    \ is defined as the ratio of the number of correct predictions to the total number\
    \ of input samples.\n  $Accuracy = Number\\ of\\ correct\\ predictions\\ /\\ Total\\\
    \ number\\ of\\ predictions\\ made$\n- **Confusion matrix**\n  A confusion matrix\
    \ provides a more detailed split between correct and incorrect classifications\
    \ for each class. It describes the performance of the model with a matrix as an\
    \ output.\n- **Logarithmic loss or logloss**\n  Logarithmic loss measures the\
    \ performance of a multi-class classification model, where the prediction input\
    \ is a probability value between 0 and 1.\n  In this evaluation method, the classifier\
    \ assigns probability to each class for all the samples. Suppose there are N samples\
    \ belonging to M classes, then the logloss is calculated as follows:\n  $Logarithmic\\\
    \ loss = -\\frac{1}{n} \\sum_{i=1}^{n} \\sum_{j=1}^{m} y_{ij} * log(p_{ij})$\n\
    \  Where,\n  $y_{ij}$ indicates whether sample i belongs to class j\n  $p_{ij}$\
    \ indicates the probability of sample i belonging to class j\n  Log loss nearer\
    \ to 0 indicates higher accuracy, while log loss away from 0 indicates lower accuracy.\n\
    \n## Area under curve (AUC)\n\nIt is one of the most used metrics for the evaluation\
    \ of binary classification problems, and it can discriminate between positive\
    \ and negative classes. **True Positive Rate (Sensitivity)**: True Positive Rate\
    \ is defined as It specifies the proportion of positive data points that are correctly\
    \ identified as positive, with respect to all positive data points.\n$True\\ Positive\\\
    \ Rate = True\\ Positive/\\ (False\\ Negative\\ +\\ True\\ Positive)$\n\n**False\
    \ Positive Rate (Specificity)** is defined as False Positive Rate It specifies\
    \ the proportion of negative data points that are mistakenly considered as positive,\
    \ with respect to all negative data points.\n\n$False\\ Positive\\ Rate = False\\\
    \ Positive/ (False\\ Positive + True\\ Negative)$\n\nBoth False Positive Rate\
    \ and True Positive Rate have values in the range [0, 1] and are computed at threshold\
    \ values. AUC has a range of [0, 1]. The greater the value, the better is the\
    \ performance of the model.\n\n**F-Measure:** F-measure (also F-score) is a measure\
    \ of a test’s accuracy. It considers the **precision** and the **recall** of the\
    \ test to compute the score:\n\n- **Precision** is defined as the number of correct\
    \ positive results divided by the total predicted positive observations.\n- **Recall**\
    \ is defined as the number of correct positive results divided by the number of\
    \ total actual positives.\n\nF1 Score tries to find the balance between precision\
    \ and recall, as follows:\n\n**Precision:** It is the number of correct positive\
    \ results divided by the number of positive results predicted by the class:\n\n\
    $Precision = True\\ Positives/ (True\\ Positives + False\\ Positives)$\n\n**Recall:**\
    \ It is the number of correct positive results divided by the number of *all*\
    \ relevant samples (all samples that should have been identified as positive):\n\
    \n$Recall = True\\ Positives/ (True\\ Negatives + False\\ Positives)$\n\nF1 Score\
    \ is the harmonic mean between precision and recall. The range for F1 Score is\
    \ [0, 1]. It indicates the instances when the classifier classifies correctly\
    \ and does not miss a significant number of instances. The greater the F1 Score,\
    \ the better is the performance of the model.\n\n## Regression Metrics\n\nRegression\
    \ problems are evaluated by mean absolute error and root mean squared error:\n\
    \n- **Mean Absolute Error (MAE)** is defined as the sum of the absolute differences\
    \ between predictions and actual values.\n  It gives the measure of how far the\
    \ predictions were from the actual output. However, they don’t give any idea of\
    \ the direction of the error, that is, whether the data is under predicted or\
    \ over predicted.\n- **Root Mean Squared Error (RMSE)** measures the average magnitude\
    \ of the error. This is determined by taking the square root of the average of\
    \ squared differences between the prediction and the actual observation.\n  As\
    \ the square of the error is taken, the effect of larger errors becomes more pronounced\
    \ than smaller errors. Hence, the model can now focus more on the larger errors.\n\
    \n## Conclusion\n\nThis chapter focused on various ML-based algorithms and gave\

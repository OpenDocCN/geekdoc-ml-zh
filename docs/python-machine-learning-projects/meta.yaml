  - "[PAGE 162]\n\nWhen new courses are added to the catalogue, the item cold-start\
    \ problem occurs when there are none or very few interactions. This forms a problem\
    \ for collaborative filtering algorithms as they generate recommendations based\
    \ on the item’s interactions. However, if a few interactions are available, a\
    \ collaborative algorithm can recommend the course. However, the quality of those\
    \ recommendations would be poor.\n\n+   - **Entry of new users**\n  This problem\
    \ occurs when a new user enrolls in the system and the recommender is required\
    \ to offer recommendations for a set length of time without depending on the user’s\
    \ previous interactions, as none have been recorded yet. This issue is important\
    \ as the user who would receive poor-quality recommendations may opt to leave\
    \ the system before giving enough interaction to allow the recommender to understand\
    \ their interests. Their preferences are obtained to create an initial user profile,\
    \ especially when dealing with new users.\n- **Lack of Data**\n  A lot of data\
    \ is required to make effective recommendations.\n\n# Evaluation Metrics\n\nEvaluation\
    \ is important for assessing the effectiveness of recommendation algorithms. The\
    \ commonly used metrics can include the following:\n\n+   - Accuracy\n- The mean\
    \ squared error\n- Root mean squared error\n\nInformation retrieval metrics that\
    \ are useful to assess the quality of a recommendation method include the following:\n\
    \n+   - Precision\n- Recall\n- Diversity\n- Novelty\n- Coverage\n\n# Text Analysis\
    \ and Mining\n\nText mining is defined as the non-trivial extraction of hidden,\
    \ previously unknown and potentially useful information from a large amount of\
    \ textual data."
  - '[PAGE 163]


    Text mining operates on unstructured or semi-structured data sets like emails,
    text documents and HTML files. Text mining (also referred to as *text analytics*)
    is an **Artificial Intelligence (AI)** technology that uses **Natural Language
    Processing (NLP)** to transform the free (unstructured) text in documents and
    databases into normalized, structured data suitable, identify meaningful patterns
    and new insights for analysis. Through use of advanced machine learning algorithms
    like Naïve Bayes, Support Vector Machines (SVM) and other deep learning algorithms,
    several organizations can explore and discover hidden relationships within their
    unstructured data.


    The terms, text mining and text analytics are used interchangeably. Through the
    use of machine learning algorithms, statistics and linguistics, textual patterns
    and trends within the unstructured data can be identified. By utilizing text mining
    and text analysis, further quantitative insights can be obtained on the structured
    data.


    # Importance of text mining


    Text mining, also known as text analytics systems, focuses on determining key
    knowledge from a corpus of texts, like its relevance to the designated subject,
    and representing the details of its content, such as any specific entities and
    its linkages. Text mining tools analyze documents to identify entities and extract
    relationships between them, unlocking hidden information to identify and develop
    new hypotheses. Thus, text mining can be used to make large quantities of unstructured
    data accessible. By extracting information, patterns, trends and insights hidden
    in large amounts of information can be made available. Text being one of the most
    common data types within databases, its data can be organized as follows:


    +   - **Structured data:** This data consists of maintaining the information in
    standardized row and column format that is, a tabular format. This makes it easier
    to process, store and apply various machine learning algorithms on the available
    data. Structured data can include inputs like names, addresses, and phone numbers.

    - **Unstructured data:** Unlike structured data, this data does not have a predefined
    data format. The data represented can include text information from several sources,
    such as text information from social media, product reviews or information from
    rich media formats like video and audio files.

    - **Semi-structured data:** This is a combination of structured and unstructured
    data formats, where an organization might not have enough structure nor a format
    to meet the requirements of a database; examples include XML, JSON and HTML files.'
  - '[PAGE 164]


    As 80% of data in the world is present in an unstructured format, text mining
    forms an important practice in organizations.


    # Basic blocks of text mining system using ML


    Text mining involves considering unstructured text data as input and processing
    it. This processing deals with handling parsing, along with the addition of some
    derived linguistic features, deriving patterns within the structured data final
    evaluation and interpretation of the output, as indicated in *Figure 4.5*:


    ![](img/05e0d1e671c636fe8ee73a026cd179da_164_0.png)


    Text analysis involves information retrieval information extraction, data mining
    techniques like association and link analysis, visualization, and predictive analytics.
    The goal is to turn text (unstructured data) into data (structured format) for
    analysis by utilizing **Natural Language Processing (NLP)** methods. The various
    activities performed to mine the text and determine the patterns are represented
    in the following *figure 4.6*:'
  - '[PAGE 165]


    ![](img/05e0d1e671c636fe8ee73a026cd179da_165_0.png)


    Before applying various text mining techniques, text preprocessing needs to be
    performed, as represented in [Figure 4.6](#figure-46).


    **Text preprocessing:** This step includes cleaning and transforming text data
    into a usable format. Once text preprocessing is complete, based on the relevant
    attribute generation, a number of text mining algorithms can be applied to derive
    insights from the data.


    **Text transformation (attribute generation):** A text document is represented
    by the words (features) it contains and their occurrences. Two main approaches
    of document representation are Bag of words and Vector Space.


    **Feature or attribute selection:** Feature selection, also known as variable
    selection, is the process of selecting a subset of important features for use
    in model creation. The main assumption when using a feature selection technique
    is that the data contains many redundant or irrelevant features that provide no
    extra or relevant information in any context. Feature selection technique is a
    subset of the more general field of feature extraction.


    **Data mining:** At this point, the text mining process merges with the traditional
    data mining process. Classic data mining techniques are used in the structured
    database that resulted from the previous stages.'
  - '[PAGE 166]


    **Evaluate:** The result is evaluated at this stage. After evaluation, the result
    can be discarded, or the generated result can be used as an input for the next
    set of sequence.


    # Steps involved in preparing an unstructured text document for deeper analysis


    There are seven basic steps involved in preparing an unstructured text document
    for deeper analysis:


    +   1. **Language identification:** It helps determine the language of operation.

    2. **Tokenization:** Most text analytics systems rely on rule-based algorithms
    to tokenize alphabetic languages. The textual information is broken down into
    pieces called tokens. These tokens can be words, phonemes, or full sentences.
    These can be obtained by splitting the text on white spaces and at punctuation
    marks that do not belong to abbreviations identified. The various characteristics
    and its representations are listed in Table 4.2:


    | Characteristics | Represents |

    |---|---|

    | Feature Extraction | Entities, Themes, Categories, Intentions, Summaries, Sentiments
    |

    | Text Preparation (Multi layered) | Tokenizing, Sentence breaking, PoS, Chunk,
    Syntax, Lexical chaining |

    | Base Knowledge | Machine learning models, NLP, Training of words |


    *Table 4.2: Text analytics*


    +   3. **Sentence breaking:** It is used to determine the boundaries that exist
    in a sentence.

    4. **Part of Speech Tagging (PoS):** It is the process of determining the part
    of speech of every token, i.e., whether a given token represents a proper noun,
    common noun or verb, and then tagging it. **Part-of-Speech (POS)** tagging means
    word class assignment to each token. Its input is given by the tokenized text.
    Taggers have to cope with unknown and ambiguous word-tag mappings. Rule-based
    approaches like ENGTWOL operate on dictionaries containing words formed with the
    associated POS labels, morphological and syntactic features. Context-sensitive
    rules help to choose the appropriate labels during application.

    5. **Chunking:** It means assigning PoS-tagged tokens to phrases.'
- md: '## Text mining techniques


    Text mining techniques include techniques for information retrieval, natural language
    processing and sentiment analysis, as elaborated here:


    ## Information Retrieval (IR)


    IR systems work on applying algorithms to track user behaviors and identify relevant
    data. Thus, based on a pre-defined set of queries or phrases, this technique returns
    relevant information or documents. Information retrieval is commonly used in library
    catalog systems and Google search engines. Common IR sub-tasks include the following:


    - **Text cleanup:** Text cleanup is a mechanism that removes any unnecessary or
    unwanted information, for example, removing advertisements from web pages, normalizing
    text converted from binary formats, and dealing with tables, figures and formulas.

    - **Tokenization:** This deals with the process of splitting the long-form text
    into sentences and words called “tokens”.

    - **Stemming:** This step involves separating the prefixes and suffixes from words
    to derive the root word form and meaning.


    ## Natural language processing (NLP)


    Natural language processing enables computers to understand human language in
    both written and verbal form. By analyzing sentence structure and grammar, NLP
    algorithms help the computers to read information. These sub-tasks include the
    following:


    - **Summarization:** As the word suggests, this technique creates a concise summary
    of the specified document’s main points.

    - **Part-of-Speech (PoS) tagging:** This step enables semantic analysis on unstructured
    text. Based on its part of speech, this technique assigns a tag to every token
    in the document.

    - **Text categorization or text classification:** Through this technique, text
    documents are classified based on predefined topics or categories.

    - **Sentiment analysis:** This task is used to provide information about perceptions
    of brands, products, services and changes in customer attitudes over time. Therefore,
    it detects positive, negative or neutral sentiments about a product or brand,
    leading to insights that can improve business processes and user experiences.


    Information extraction deals with extracting structured information from free
    text and storing the various entities, attributes and related information in the
    database. Common information extraction sub-tasks include the following:


    - **Feature selection**, also known as attribute selection, is a process of selecting
    the important features (dimensions) that contribute the most to the output of
    a predictive analytics model.

    - In order to improve the accuracy of a classification task, the sub-task i.e.,
    **feature extraction**, is employed. Its aim is to select a subset of features.

    - **Named-entity recognition (NER)** is also known as entity identification or
    entity extraction. Its major purpose is to find and categorize specific entities
    in the available text.

    - **Data mining:** It is the process of identifying patterns and extracting useful
    insights from datasets. This technique evaluates structured as well as unstructured
    data to identify new information. Text mining is said to be a sub-field of data
    mining.


    ## Sentiment analysis


    Sentiment analysis is a machine learning tool that analyzes text for its polarity.
    The polarity may be positive, negative or neutral. Text analysis techniques are
    used to interpret and classify the emotions within text data, which, in turn,
    makes the machines automatically learn how to detect sentiment without any human
    input.


    Sentiment analysis models can be trained to understand the context, sarcasm and
    misapplied words. The tools used in sentiment analysis help businesses to identify
    the sentiment of the customer towards a particular product, a brand or a service
    provided. Once the machines are trained through machine learning tools, they learn
    to detect the sentiments automatically without any human intervention. A number
    of techniques and complex algorithms can be used to command and train machines
    to perform sentiment analysis. Each technique has its own pros and cons, but when
    used together, they can provide exceptional results, as shown in Figure 4.7:


    ![](img/05e0d1e671c636fe8ee73a026cd179da_169_0.png)


    Now, let’s look at the most frequently used algorithms for sentiment analysis.


    ## Naive Bayes


    Naive Bayes algorithms are considered to be one of the simplest groups of probabilistic
    algorithms. These algorithms help by performing sentiment analysis classification,
    in which a probability is assigned for the occurrence of the word of text. This
    assignment represents a polarity of positive or negative to the given word or
    phrase.


    Bayes’ theorem works as follows: Naive Bayes algorithm evaluates words against
    each other. Thus, the likelihood that a word, phrase, or text has occurred positive
    or negative, can be determined by the well-trained machine learning models. Utilizing
    techniques like lemmatization, stop word removal or TF-IDF, Naive Bayes provides
    better accuracy.


    ## Linear regression


    Given X features, linear regression, being a statistical algorithm, helps to predict
    the Y value. Machine learning algorithms work on the datasets provided. These
    algorithms further determine the relationship between the variables, which are
    represented through the X-Y axis. The straight-line pattern running across the
    various coordinates helps determine further predictions in relationships.


    With respect to word polarity, linear regression determines the relationship between
    the words and phrases (X input) and the polarity (Y output). This relationship
    provides output on a scale of polarity from being “really positive” to “really
    negative”, along with the values between them.


    ## Support Vector Machines (SVM)


    A support vector machine is also a supervised machine learning model that uses
    its algorithms to train and classify text within the sentiment polarity model.
    As an example, mentioned in *Figure 4.8*, consider the red and blue marks as tags
    that represent two data features: X and Y. The SVM classifier could then be trained
    to output the X-Y coordinates as either red or blue.


    ![](img/05e0d1e671c636fe8ee73a026cd179da_170_0.png)


    An SVM algorithm further assigns a hyperplane to the data features (X-Y) coordinates,
    as shown in *Figure 4.9*. This hyperplane best separates the two tags. For a two-dimensional
    representation, this hyperplane represents a straight line, similar to a line
    in linear regression. One side of the hyperplane line represents the *red* tag,
    while the other side of the line specifies the *blue tag*. This representation
    works well for sentiment analysis, where one of the tags would represent the positive
    sentiment, while the other tag would indicate the negative sentiment.


    The hyperplane that provides the largest distance between each tag is considered
    as the best hyperplane in machine learning. Refer to the following [figure 4.9](#figure-4-9):


    ![](img/05e0d1e671c636fe8ee73a026cd179da_171_0.png)


    **Figure 4.9:** Representation of the hyperplane


    However, as data sets become more complex, using a single line to separate the
    data features into two regions is difficult, as represented by [Figure 4.10](#figure-4-10):


    ![](img/05e0d1e671c636fe8ee73a026cd179da_172_0.png)


    Using SVM, more complex the data, more accurate the predictor will become. Imagine
    the preceding figure in three dimensions, i.e. with a Z axis added. This leads
    to make the figure represent a circle. This figure can be mapped to its two-dimensional
    representation. This would result in the best hyperplane, represented by [Figure
    4.11](#figure-411):


    ![](img/05e0d1e671c636fe8ee73a026cd179da_172_1.png)


    SVM allows for more accurate machine learning because it is multidimensional.'
  mdcn: '## 文本挖掘技术


    文本挖掘技术包括信息检索、自然语言处理和情感分析等技术，具体阐述如下：


    ## 信息检索（IR）


    IR系统的工作原理是应用算法来追踪用户行为并识别相关数据。因此，基于预定义的查询或短语集合，该技术会返回相关的信息或文档。信息检索广泛应用于图书馆目录系统和谷歌搜索引擎。常见的IR子任务包括以下几项：


    - **文本清理：** 文本清理是一种移除任何不必要或不需要信息的机制，例如，从网页中移除广告、规范化从二进制格式转换的文本，以及处理表格、图形和公式。

    - **分词：** 这涉及将长文本分割成句子和单词（称为“标记”）的过程。

    - **词干提取：** 这一步涉及从单词中分离前缀和后缀，以推导出词根形式和含义。


    ## 自然语言处理（NLP）


    自然语言处理使计算机能够理解书面和口头形式的人类语言。通过分析句子结构和语法，NLP算法帮助计算机读取信息。这些子任务包括以下几项：


    - **摘要生成：** 顾名思义，该技术为指定文档的主要观点创建一个简洁的摘要。

    - **词性标注：** 这一步使得对非结构化文本进行语义分析成为可能。根据其词性，该技术为文档中的每个标记分配一个标签。

    - **文本分类或文本归类：** 通过此技术，文本文档根据预定义的主题或类别进行分类。

    - **情感分析：** 此任务用于提供有关品牌、产品、服务感知以及客户态度随时间变化的信息。因此，它检测关于产品或品牌的积极、消极或中立情感，从而获得可以改进业务流程和用户体验的洞察。


    信息提取涉及从自由文本中提取结构化信息，并将各种实体、属性和相关信息存储在数据库中。常见的信息提取子任务包括以下几项：


    - **特征选择**，也称为属性选择，是选择对预测分析模型输出贡献最大的重要特征（维度）的过程。

    - 为了提高分类任务的准确性，采用了子任务，即**特征提取**。其目标是选择特征的一个子集。

    - **命名实体识别（NER）**也称为实体识别或实体提取。其主要目的是在可用文本中查找和分类特定实体。

    - **数据挖掘：** 它是从数据集中识别模式和提取有用洞察的过程。该技术评估结构化和非结构化数据以识别新信息。文本挖掘被认为是数据挖掘的一个子领域。


    ## 情感分析


    情感分析是一种机器学习工具，用于分析文本的极性。极性可以是积极的、消极的或中立的。文本分析技术用于解释和分类文本数据中的情感，这反过来又使机器能够自动学习如何检测情感，而无需任何人工输入。


    情感分析模型可以经过训练以理解上下文、讽刺和误用的词语。情感分析中使用的工具帮助企业识别客户对特定产品、品牌或所提供服务的情感。一旦机器通过机器学习工具进行了训练，它们就能学会自动检测情感，而无需任何人工干预。可以使用多种技术和复杂的算法来指挥和训练机器执行情感分析。每种技术都有其自身的优缺点，但当它们结合使用时，可以提供卓越的结果，如图4.7所示：


    ![](img/05e0d1e671c636fe8ee73a026cd179da_169_0.png)


    现在，让我们看看最常用于情感分析的算法。


    ## 朴素贝叶斯


    朴素贝叶斯算法被认为是最简单的概率算法组之一。这些算法通过执行情感分析分类来提供帮助，其中为文本单词的出现分配一个概率。此分配表示给定单词或短语的积极或消极极性。


    贝叶斯定理的工作原理如下：朴素贝叶斯算法对单词进行相互评估。因此，一个单词、短语或文本出现积极或消极的可能性，可以通过训练有素的机器学习模型来确定。利用词形还原、停用词移除或TF-IDF等技术，朴素贝叶斯提供了更好的准确性。


    ## 线性回归


    给定X特征，线性回归作为一种统计算法，有助于预测Y值。机器学习算法基于提供的数据集工作。这些算法进一步确定变量之间的关系，这些关系通过X-Y轴表示。穿过各个坐标的直线模式有助于确定关系中的进一步预测。


    关于单词极性，线性回归确定单词和短语（X输入）与极性（Y输出）之间的关系。这种关系提供了一个从“非常积极”到“非常消极”的极性尺度输出，以及它们之间的值。


    ## 支持向量机（SVM）


    支持向量机也是一种监督机器学习模型，它使用其算法在情感极性模型中训练和分类文本。例如，在*图4.8*中提到的，将红色和蓝色标记视为代表两个数据特征X和Y的标签。然后，SVM分类器可以被训练为将X-Y坐标输出为红色或蓝色。


    ![](img/05e0d1e671c636fe8ee73a026cd179da_170_0.png)


    SVM算法进一步为数据特征（X-Y）坐标分配一个超平面，如*图4.9*所示。这个超平面最好地分隔了两个标签。对于二维表示，这个超平面代表一条直线，类似于线性回归中的一条线。超平面线的一侧代表*红色*标签，而线的另一侧指定*蓝色*标签。这种表示法对于情感分析非常有效，其中一个标签代表积极情感，而另一个标签表示消极情感。


    提供每个标签之间最大距离的超平面被认为是机器学习中的最佳超平面。请参阅以下[图4.9](#figure-4-9)：


    ![](img/05e0d1e671c636fe8ee73a026cd179da_171_0.png)


    **图4.9：** 超平面的表示


    然而，随着数据集变得更加复杂，使用单条线将数据特征分成两个区域变得困难，如[图4.10](#figure-4-10)所示：


    ![](img/05e0d1e671c636fe8ee73a026cd179da_172_0.png)


    使用SVM，数据越复杂，预测器就会变得越准确。想象一下前面的图在三维空间中，即添加了一个Z轴。这导致该图表示一个圆。这个图可以映射到它的二维表示。这将产生最佳超平面，如[图4.11](#figure-411)所示：


    ![](img/05e0d1e671c636fe8ee73a026cd179da_172_1.png)


    SVM允许更准确的机器学习，因为它是多维的。'

    \n# Support vector machine (SVM)\n\nIt is a supervised machine learning algorithm\
    \ where each data item is plotted as a point in n-dimensional space, n being the\
    \ number of features considered. The value of each feature is said to be the value\
    \ of a particular coordinate. SVM classifier segregates the classes distinctly.\
    \ For this, a hyperplane, also known as the decision boundary, is determined to\
    \ differentiate between two classes for given classification problem. The key\
    \ operation of SVM is the identification of the correct hyperplane that separates\
    \ the data into distinct classes.\n\nConsider the three hyperplanes A, B, and\
    \ C. In order to identify the right hyperplane and to classify square and circle,\
    \ the thumb rule is to identify the hyperplane that separates the two classes\
    \ better. Refer to the following figure:\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_96_0.png)"
  - '[PAGE 97]


    Figure 3.10: Hyperplane B as separator


    As observed in Figure 3.10, hyperplane “B” clearly separates the square and the
    circle. However, if all the three hyperplanes segregate the classes well, it is
    essential to identify the best hyperplane. The best hyperplane is identified to
    be the one that has the maximum distances between their nearest data point and
    the hyperplane. This distance is known as the margin. Refer to the following figure:


    ![](img/05e0d1e671c636fe8ee73a026cd179da_97_0.png)


    Figure 3.11: Representation of margin


    Figure 3.11 shows that the margin for hyperplane C is more as compared to A and
    B. SVM and neural networks have several differences between them, as represented
    in Table 3.2:


    | Support Vector Machines (SVM) | Neural Networks (NN) |

    |---|---|

    | SVMs works by creating one or more hyper planes that separate the data clusters.
    | Single neural network neuron is an SVM without kernel having different cost
    functions. |

    | SVMs are conceptually simpler. | Neural networks are considered complex due
    to the hidden layers. |

    | SVMs are theoretically founded. | NNs are heuristic in nature. |

    | SVMs attempt to maximize the margin between the hyper planes and the clusters.
    | They try to map m-dimensional inputs to another dimensional space without directly
    determining a separator margin between classes. |

    | SVMs only rely on the support vectors. | Neural networks are preferred when
    data points are structured. |

    | SVM implementation finds the optimal set of | Neural networks get stuck in a
    local minima. |'

    \n## Python：输入与输出命令\n\n让我们开始复习Python的基础知识。任何语言之所以丰富，是因为其数据结构的支持。与同类语言相比，Python提供了额外的数据结构，这使其适用于机器学习应用。图2.4突出了Python的重要数据结构。数据结构有两种类型：\n\
    \n- **基本数据结构**：这些数据结构是通用和常见的数据类型，也是其他编程语言的一部分。\n- **非基本数据结构**：这些是Python特有的特殊数据结构，其开发考虑了它们在数据分析领域的应用。\n\
    \n![](img/05e0d1e671c636fe8ee73a026cd179da_52_0.png)\n\n**图2.4：** Python中的数据结构\n\

    useful information from them. It is the process of transforming an image into
    a digital form and performing certain operations to get some useful information
    from it. Fixed sequences of operations are performed at each pixel of an image.
    The image processor performs the first sequence of operations on the image, pixel
    by pixel. Once that is done, a second set of operations are performed. The output
    value can be computed at any pixel of the image. Thus, image processing is a method
    that tends to either enhance the image or gather alerting insights from it. These
    insights can further be fed to an algorithm in order to classify, predict or cluster
    images. The image processing system treats all images as 2D signals where predetermined
    signal processing methods are applied.



    # ## Basic Optimization Techniques


    As discussed in an earlier section, there are two basic optimization techniques:
    backpropagation and gradient descent.


    # ### Backpropagation optimization


    The backpropagation algorithm is used in a feedforward neural network with supervised
    training. The input from the input layer is passed through the activation functions
    present in the hidden layer. While passing through, the input is assigned weights.
    Now the output from the hidden layer becomes the input for the next layer, and
    so on. The final output is obtained through the output layer. This resultant output
    and the initial input are compared, and the error is calculated. This error is
    used to fine-tune the weights at that layer. This process is followed recursively
    from the output layer to the input layer. Thus, the weights are modified and adjusted;
    this process is followed till minimum error is achieved and the final output is
    computed.'
- md: 'In this entire process, the weights are adjusted. The adjustment of the threshold
    value is first obtained at the output layer. The two parameters, i.e., the calculated
    error in the output at the output layer and the learning rate parameter used in
    the adjustment calculation for weights at subsequent particular layer, are multiplied
    to get the adjusted value of the threshold. Thus, the backpropagation algorithm
    learns the correct classification from the training data. Then, it is tested on
    the test data to find out how well the network classifies the test data. Thus,
    an important consideration in applying backpropagation learning is how well the
    network generalizes.


    Having said that, there are many problems with back propagation learning:


    - **Local minima:** Backpropagation always works toward adjusting the weights
    of the network so that the error reduces. But while achieving this, the error
    may start increasing. Thus, the algorithm contradicts itself.

    - **Network paralysis:** Network paralysis is the phenomenon where the units are
    forced to operate at extreme values. These extreme values form a region where
    the derivative of the activation function is very small. Very large values of
    weights during training cause units to work at extreme values.

    - **Slow convergence:** The multilayer neural network may require many reparations
    to get optimal values of the weights. Also, if the network gets stuck in local
    minima, convergence rate still slows down.


    ## Gradient descent optimization


    Gradient descent is another optimization method used to find the values of functions’
    parameters that minimize a cost function. Here, gradient measures the change in
    the output of a function if the inputs change by a small value. The gradient descent
    is basic optimization used in all ML projects. There are several variations of
    gradient descent: momentum-based gradient descent, stochastic gradient descent,
    Nesterov accelerated gradient descent and so on. But again, it also has a few
    disadvantages:


    - **Slow processing:** The process of gradient descent is very slow as it requires
    the computation of cost functions based on several parameters.

    - **Scaling problem:** The number of iterations to be taken to minimize the cost
    function depends on the scale of the problem as the direction is not well defined.

    - **Local minima:** Gradient descent operation depends on a learning parameter
    or step. A small step may increase the convergence time and a large step may skip
    the local minima. Fine-tuning the learning parameter is challenging.


    Conventional approach uses squared-based error as cost function for optimization,
    which may not be suitable for every classification problem. In most classification
    problems, accuracy and miss-classification rate are used as cost functions to
    determine whether it is a good or bad classifier.


    ## Metaheuristic approaches to optimization


    One may ask what’s the difference between heuristic and metaheuristic techniques?
    Heuristic techniques are problem-based and are specific to a problem, whereas
    metaheuristic-based techniques are independent of any specific problem and can
    be applied in large, general domain of problems. Metaheuristic algorithms work
    fine when the number of solutions is very large. As these are generalized algorithms,
    they are suitable for various applications. These algorithms are designed to address
    complex problems. Nonlinear and non-differentiable problems can also be handled
    very effectively by these algorithms.


    A metaheuristic algorithm follows a step-by-step procedure to generate the solution.
    These steps are as follows:


    1. **Initialization:** Use random values as a seed in population and initialize
    the population in the search domain.

    2. **Evaluation:** Fitness of each one of the population is evaluated.

    3. **Generation:** Generate a new population using evolutionary operations as
    suggested in each algorithm.

    4. **Repetition:** Repeat the steps 2 and 3 until stopping criteria are satisfied.


    Metaheuristic optimization works with an objective function that assigns a value
    to each solution in the space. The set of parameters are used to obtain the global
    maxima or minima of the objective function. The initial solution is derived using
    some heuristic, and then metaheuristics are used to improve this solution using
    an iterative process. The iterative process is terminated when the stopping criteria
    are met. The stopping criteria can be anything, as defined by the user like number
    of iterations, time completed and so on. The metaheuristic algorithms find a good
    solution in the existing solution space, but they do not guarantee the best solution.


    The main advantage of using metaheuristic approach over the traditional approach
    is that their global optimal search is better. This property makes them usable
    in various problems to improve the solution. Metaheuristic algorithms are more
    adaptive and are intelligent in nature because they learn while they run. On the
    contrary, heuristic algorithms apply trial and error mechanism, which makes the
    search dependent on computational capacity.


    Metaheuristic algorithms in optimization have its own advantages:


    - Easy to understand

    - Easy for implementation

    - All-encompassing application domains: have applications in various domains as
    these algorithms are generative in nature

    - Can be combined with other approaches making them widely usable

    - Complex problems with large solutions can be solved faster


    Disadvantages of these algorithms can be as follows:


    - No mathematical foundation

    - Convergence rate is very slow many times

    - Does not provide the best solution

    - Their performance is dependent on the fine-tuning of the parameters

    - The solution that one gets initially may not be repeated under the same conditions

    - It is difficult to decide which algorithm is best suited for which kind of application
    and under which circumstances. So, it’s mostly trial and error for any application.


    These optimization algorithms use the exploration and exploitation methods to
    devise new optimal solutions. Term explorations indicates a process of searching
    large area to find good, feasible solutions. The time required to search large
    or wide search space will downgrade the performance of the algorithm; this is
    where exploitation comes to the rescue. Exploitation restricts the search to a
    small area so that solutions can be refined. Exploration is introduced at earlier
    stages and exploitation is introduced at the later stages in the process.


    Exploration and exploitation are two important steps in any optimization algorithm.
    Exploration always ensures that the proper and promising regions of the search
    space are invaded, whereas exploitation always ensures that optimal solutions
    are found within the given region. To reach the optimal solution, it is important
    to fine-tune these components carefully. There is always a tradeoff between these
    components, so proper balancing is required, which is difficult to achieve. Mostly,
    the component values are dependent on applications under consideration.


    The metaheuristic nature of algorithms helps achieve this balance. Every optimization
    algorithm has its own strategy for exploration and exploitation, which makes it
    unique in every aspect. Metaheuristic algorithms are effective for real-life engineering
    problems but one thing to keep in mind is that due to their nature, they cannot
    be generic for all kinds of applications. They may provide the best results for
    one application but not perform well for another. The performance of one optimizer
    to solve a set of problems does not guarantee to solve all optimization problems
    with different natures.


    ## Types of metaheuristic algorithms


    As indicated earlier, metaheuristic algorithms are broadly classified into single
    solution-based, population-based and hybrid models. Though there are large number
    of optimization algorithms, this chapter focuses on a few promising and widely
    used algorithms.


    ## Single solution-based algorithms


    These algorithms are based on applying the heuristics on the single solution and
    finding the better solution. They work toward the betterment of the solution and
    use the exploitation method substantially. There are many popular algorithms available;
    let’s look at a few of them in brief:


    - Simulated Annealing

    - Tabu Search

    - Variable Neighborhood search


    ## Simulated annealing


    This method is inspired by the slow cooling of metals. Cooling of metals is achieved
    by reducing the atomic movements, which, in turn, reduces the density of lattice
    defects till the lowest energy state is reached and the metal gets the desired
    structure. In algorithms, at every annealing temperature, a new solution is provided
    to the problem under consideration. Here, the temperature is the most important
    parameter to get an optimized solution.


    The steps of the algorithm are as follows:


    1. Start with the initial solution S₀ and set the initial temperature as t₀.

    2. A temperature reduction function, popularly called alpha, is required to be
    set up, which can be based on Linear Reduction rule, Geometric Reduction rule
    or Slow Decrease rule. Each reduction rule will decrease the temperature at a
    different rate.

    3. Here, the looping starts, and the next step is repeated until the termination
    condition is met. The termination condition is based on the value of low temperature
    with satisfactory performance.

    4. From the solutions generated, pick up one solution and calculate the difference
    between the costs of the old solution and the new solution. The solutions are
    generated by altering the parameter values.

    5. If the new solution cost is better, then accept that solution. After a certain
    amount of looping, the performance stabilizes and the final solution is solicited.


    Simulated Annealing is a very effective and simple to implement optimization algorithm
    and is used to solve many classic problems, like Travelling Salesman Problem and
    scheduling problems. The main advantage is that it sticks with local minima.


    ## Tabu Search'

    ## Machine Learning vs Predictive Modeling


    Table 4.3 represents the comparison between machine learning and predictive modeling:


    | Characteristics | Machine Learning (ML) | Predictive Modeling (PM) |

    | :--- | :--- | :--- |

    | **Definition** | Data is provided at the input without applying any set of predetermined
    rules and regulations | Current and historical sets of data are provided to find
    patterns and behaviors in predictive modeling algorithms |

    | **Operations** | Machine learning algorithms are trained to learn from their
    past mistakes to improve future performance | It makes informed predictions based
    on historical data about future events only |

    | **Principle** | Machine learning forms the core set of algorithms for performing
    predictive modeling | Predictive modelling can be said to be a subset and an application
    of machine learning |

    | **Working** | Whenever a new set of data is added to ML systems, they can adapt
    and learn from it automatically, without the need of being directly programmed
    | It includes a series of statistical techniques and uses statistics to estimate
    or predict future outcomes, given a set of input data |

    | **Techniques used** | ML algorithms are broadly classified into supervised and
    unsupervised learning algorithms | Predictive modeling is further identified through
    descriptive analysis, diagnostic analysis, predictive analysis and prescriptive
    analysis |

    | **Approaches and Models** | The various approaches considered in machine learning
    include Decision tree learning, Association rule learning, Artificial neural networks,
    Deep learning, Inductive logic programming, Support vector machines, Clustering,
    Bayesian networks, Reinforcement learning, Genetic algorithms and Rule-based learning
    | Data in predictive modeling is handled using Naïve Bayes, K-nearest neighbor,
    Support vector machines, Boosted trees, Random forests, **Classification and Regression
    trees (CART)**, Neural Networks, Ordinary Least Squares, Logistic and Robust Regression
    algorithms |

    | **Applications** | Applications that utilize machine learning algorithms include

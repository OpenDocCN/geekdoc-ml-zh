    # Long / Short-Term Memory


    It uses the recurrent neural network architecture and combats the vanishing/exploding
    gradient problem by introducing gates and explicitly defining memory cell. The
    working of this memory cell comprises of storing the previous value of data till
    a“forget gat”” tells the cell to forget those values.


    # Gated recurrent units (GRU)


    They do not need the cell layer to pass the values. The calculations within each
    iteration ensure that the probability of retaining the old or new information
    is high. GRUs are incrementally faster and easier to run, but they are less expressive.


    # Hopfield network


    Recurrent networks of non-linear units are hard to analyze as they settle to a
    stable state, oscillate or follow chaotic trajectories in different manners. To
    resolve these issues, John Hopfield introduced the **Hopfield Network (HN)**.
    In the HN network, every neuron is connected to every other neuron, where the
    networks are trained by setting the value of the neurons to the desired pattern,
    and then the weights are computed. The weights do not change after this. Once
    trained for a pattern, the network converges to only that learned pattern.


    # Boltzmann machine


    It is a type of stochastic recurrent neural network, which is capable of learning
    internal representations and can represent and solve difficult combinatorial problems.
    In this, only some neurons are marked as input neurons, and others act as hidden.
    Once the output is obtained, the input neurons that have binary activation patterns
    become output neurons. The process begins by using random weights and learning
    through backpropagation.


    # Deep belief networks


    Using backpropagation has some problems, such as the following:


    +   a. Back propagation method performs on labeled training data while most of
    the data is unlabeled.

    b. It operates in a very slow manner in networks having multiple hidden layers.'

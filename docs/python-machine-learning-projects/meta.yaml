    # Classification


    A classification model attempts to draw conclusions from the observed values.
    Once data input is given, the classification model would predict one or more output
    value. Therefore, the objective of the classification model is to find the decision
    boundary that separates the target variable’s categories. Training dataset is
    used to get better boundary conditions; this would aid in determining each target
    class. Once these boundary conditions are determined, the focus is on predicting
    the target class. This process is known as classification.


    # Terminology used in Classification Algorithms


    Classification algorithms in machine learning use input training data to predict
    the likelihood that subsequent data will fall into one of the predetermined categories.
    The terms that get associated with classification include the following:


    +   - **Classifier:** It is defined as an algorithm that relates the input data
    to a specific category.'

    ```\n\nThe output of the previous code is shown in the following figure:\n\n#\
    \ Gold medal achievements of countries\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_113_0.png)\n\
    \nFigure 3.18: Pie Chart\n\nDue to the explode property of the **pie()** function,\
    \ one can easily see the blue portion bulging out. The pie chart started from\
    \ angle 140, indicated by the **startangle=140** property.\n\nThe Matplotlib library\
    \ provides many other types of visualization techniques, like stacked bar graph\
    \ and box plot. The plots discussed here are most commonly and widely used to\
    \ understand or visualize the data effectively.\n\n## Evaluation of ML Systems\n\
    \nAs discussed in the preceding chapters, once the problem has been defined, the\
    \ data must be prepared. Data is broadly classified into training and testing\
    \ data on which various machine learning algorithms can be applied to solve your\
    \ problem.\n\n## Test and Train Datasets\n\nTraining and testing data are obtained\
    \ from the dataset by selecting a random split of 66% of data samples for training\
    \ and 34% for testing or using other complicated sampling methods. Trained data\
    \ are then evaluated against the test set. In order to test the algorithms, we\
    \ need to define a test harness.\n\nTest harness is the term used to specify the\
    \ data that would be used for training and testing the algorithm. It evaluates\
    \ the system against the measure and assesses its performance representing how\
    \ Learnable the problem statement is. Thus, the major goal of the test harness\
    \ is to be able to quickly and consistently test the algorithms against a fair\
    \ representation of the problem being solved and a chosen performance measure.\n\
    \n## Performance Measure\n\nIt is the measurement of the predictions made by the\
    \ trained model on the test dataset. Thus, performance measure provides a mechanism\
    \ to evaluate the solution of the problem under consideration.\n\nA number of\
    \ performance measures are determined based on the class of problem, such as classification,\
    \ regression and clustering. These scores determine the relevance and give a meaningful\
    \ insight into the problem domain.\n\n## Model Evaluation Techniques\n\nIn order\
    \ to evaluate the performance of the model, test set data is used as this data\
    \ has not been seen by the model. Models performance is evaluated based on the\
    \ following methods:\n\n- **Holdout:** In this method, the model is tested on\
    \ a data that is different from the training data. The dataset is, thus, randomly\
    \ divided into three subsets:\n    - **Training set** is a subset of the dataset\
    \ used to build the model.\n    - **Validation set** is a subset used to assess\
    \ the performance of the model built in the training phase.\n    - **Test set**,\
    \ or unseen data, is a subset of the dataset used to assess the likely future\
    \ performance of a model.\n\nIf a model fits the training set much better than\
    \ it fits the test set, then the model is said to overfit.\n\n- **Cross-Validation:**\
    \ Cross-validation is a more sophisticated approach that operates on using the\
    \ entire transformed dataset to train and test a given algorithm, as compared\
    \ to using test and train datasets.\n- In this technique, the original dataset\
    \ is divided into two parts: a training set that is used to train the machine\
    \ learning model, and an independent set used to evaluate the analysis.\n\n##\
    \ Model evaluation metrics\n\nThe performance of the machine learning task is\
    \ obtained by determining how well an algorithm performs on unseen data. The wellness\
    \ of the algorithm (model) is obtained through its evaluation metrics, which,\
    \ in turn, depend on the problem to be solved."

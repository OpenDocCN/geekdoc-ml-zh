- md: '## 3. Differentiate between the following:


    ### a. Simple and multi regression


    Both are regression problems, and both have the same assumptions, but the major
    difference comes in terms of the number of independent variables. In simple regression,
    the number of independent variables is one, but in multi regression, the number
    is more than one.


    In simple regression:

    $$Y = mx + c$$

    where, m represents the slope.


    In multi regression:

    $$Y = b0x1 + b1x2 + ... + c$$

    Equation work.


    Multi regression problems have wide scope of practical use, while simple regression
    is only suitable for understanding the concepts behind regression.


    ### b. SVM and neural networks


    **SVM:** Many advanced algorithms handle more complex datasets, and **Support
    Vector Machines (SVM)** are among the most popular. SVMs are supervised learning
    models that analyze data to determine the data’s class (you could use an SVM to
    figure out that ‘carrot’ belongs to the ‘vegetable’ class and ‘cat’ belongs to
    the ‘animal’ class).


    A kernel generally refers to the kernel trick — when you use a linear classifier
    to solve a nonlinear problem. You can also use kernels to compute similarities
    between different data in a set. Refer to the following figure:


    ![](img/05e0d1e671c636fe8ee73a026cd179da_120_0.png)


    *Figure 3.19: Support vector machines*


    In support vector machines, we use kernel trick, which increases the dimension
    to make the nonlinear value a linear value. The purpose of doing this is that
    the algorithms have to segregate the classes by hyperplane. Hyperplane can be
    2-D,3-D or more, depending on the input class dimensions.


    The main goal of SVM is to maximize the margin between two support vectors.


    **Neural Network:** Deep learning, which is a subset of machine learning, is the
    human brain embedded in a machine. It is inspired by the working of a human brain
    and therefore, is a set of neural network algorithms that tries to mimic the working
    of a human brain and learn from the experiences.


    A neural network is a computational learning system that uses a network of functions
    to understand and translate a data input of one form into the desired output,
    usually in another form. The concept of the artificial neural network was inspired
    by human biology and the way neurons in the human brain function together to understand
    inputs from human senses.


    **Introduction:** Deep learning, which is a subset of machine learning, It is
    inspired by the working of a human brain and therefore, is a set of neural network
    algorithms that tries to mimic the human brain and learn from the experiences.


    In this section, we will learn how a basic neural network works and how it improves
    itself to make the best predictions.


    **Artificial Neural Networks and Its components:** A neural network is a computational
    learning system that uses a network of functions to understand and translate a
    data input of one form into the desired output, usually in another form. In simple
    words, a neural network is a set of algorithms that tries to recognize the patterns
    in, relationships between and information from data through a process that is
    inspired by and works like the human brain/biology. Refer to the following figure:


    ![](img/05e0d1e671c636fe8ee73a026cd179da_121_0.png)


    **Components/Architecture of Neural Network:** A simple neural network consists
    of three components:


    - Input layer

    - Hidden layer

    - Output layer


    **Input Layer:** Input nodes are the inputs/information from the outside world
    provided to the model to learn and derive conclusions from. Input nodes pass the
    information to the next layer, that is, the hidden layer.


    **Hidden Layer:** This is the set of neurons where all the computations are performed
    on the input data. There can be any number of hidden layers in a neural network.
    The simplest network consists of a single hidden layer.


    **Output layer:** The output layer is the output/conclusions of the model derived
    from all the computations performed. There can be single or multiple nodes in
    the output layer. If we have a binary classification problem, the output node
    is 1, but in the case of multi-class classification, the output nodes can be more
    than 1.


    ## 4. Explain the various classification and clustering algorithms in detail.


    ### Ans. Logistic regression


    Logistic regression is a calculation used to predict a binary outcome: either
    something happens, or it does not. This can be exhibited as Yes/No, Pass/Fail,
    Alive/Dead, and so on.


    Independent variables are analyzed to determine the binary outcome, with the results
    falling in one of two categories. The independent variables can be categorical
    or numeric, but the dependent variable is always categorical. The variables are
    represented as:


    $P(Y = 1|X)$ or $P(Y = 0|X)$


    It calculates the probability of dependent variable $Y$, given independent variable
    $X$.


    This can be used to calculate the probability of a word having a positive or negative
    connotation (0, 1, or on a scale between). Or it can be used to determine the
    object contained in a photo (tree, flower, grass, and so on.), with each object
    given a probability between 0 and 1.


    ### Naive Bayes


    Naive Bayes calculates the possibility of whether a data point belongs within
    a certain category. In text analysis, it can be used to categorize words or phrases
    as belonging to a preset “tag” (classification) or not. Consider the following
    example:


    | Text | Tag |

    |---|---|

    | "A great game" | Sports |

    | "The election was over" | Not sports |

    | "Very clean match" | Sports |

    | "A clean but forgettable game" | Sports |

    | "It was a close election" | Not sports |


    *Figure 3.21: Text analysis*


    To decide whether or not a phrase should be tagged as “sports,” you need to calculate:
    determine *the probability of A, if B is true, is equal to the probability of
    B, if A is true, times the probability of A being true, divided by the probability
    of B being true*.


    ### K-nearest Neighbors


    K-nearest neighbors (k-NN) is a pattern recognition algorithm that uses training
    datasets to find the k closest relatives in future examples.


    When k-NN is used in classification, you place data within the category of its
    nearest neighbor. If k = 1, then it would be placed in the class nearest 1. K
    is classified by a plurality poll of its neighbors.


    ### Decision Tree


    A decision tree is a supervised learning algorithm that is perfect for classification
    problems, as it’s able to order classes on a precise level. It works like a flow
    chart, separating data points into two similar categories at a time from “tree
    trunk” to “branches,” to “leaves,” where the categories become more finitely similar.
    This creates categories within categories, enabling organic classification with
    limited human supervision.



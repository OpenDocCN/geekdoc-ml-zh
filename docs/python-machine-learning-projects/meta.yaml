    # Challenges of predictive modeling


    The following are the challenges of predictive modeling:


    +   - Too much data availability can develop meaningless or erroneous outcomes.

    - Large volumes of data get exposed in predictive modeling.

    - Maintaining security and privacy is also a challenge that needs to be handled.

    - **Data preparation**: Acquiring and obtaining the correct and right amount of
    data that could be used for performing predictive modeling is a challenge. Almost
    80 % of the development time is spent in getting the right data.

    - Data collection is yet another challenge faced to obtain the desired results
    as output. This is only possible if the data is cleaned and properly managed.

    - **Overfitting of information**: There is a need to avoid overfitting of data.
    If the testing on training data is overdone, it could result in a model that appears
    very accurate. However, this model is applicable to a single-use case and therefore,
    would not be able to generalize the model.

    - **Technical and cultural barriers**: Organizations tend to avoid sharing their
    data as it is considered to be their asset. Therefore, systems that store useful
    data are not connected directly to a centralized pool of information. So, even
    though predictive modeling is considered to be a mathematical problem, getting
    the correct, substantial data for modeling may be a challenge faced by the users.

    - **Choosing the right business case**: Developing algorithms and insights into
    a business problem need not address significant business challenges. On investigation,
    it could be observed that the correlation developed between the results and the
    problem faced does not actually present an insight that the business can use.
    Thus, it can be said that predictive modeling initiatives need to have a solid
    foundation of business relevance.

    - **Time as a factor**: Time plays an important role in how predictive modeling
    systems work for a business. Though a model may be successful at one point in
    time, customer behavior changes with time, so a model must be updated.'

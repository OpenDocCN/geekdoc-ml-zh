    \ 函数将显示有关数字列的统计信息，指示列中的最小值和最大值。\n\n## 数据转换\n\n实时数据以各种形式存在，或者是数字和文本数据的组合。在应用机器学习算法之前，这些数据需要进行转换。转换数据的一种方法是使用\
    \ Pandas 的 **Apply** 或 **Map** 函数。\n\n**示例 10：**\n\n```python\n>>>mapping = {'male':0,'female':1}\n\
    >>>df['Gender']=df['Sex'].apply(lambda x:mapping[x])\n```\n\n这里，mapping 是一个字典类型的变量，包含两个键值对。**apply**\
    \ 函数使用此字典将 'Sex' 列中的分类值（male/female）转换为数值（0 或 1）。这里，mapping 应用于数据框的每一行。**map**\

    One of the most interesting things about the XGBoost is that it is also called
    a regularized boosting technique. It helps reduce overfit modelling and has a
    massive support for a range of languages, such as Scala, Java, R, Python, Julia
    and C++.


    It supports distributed and widespread training on many machines that encompass

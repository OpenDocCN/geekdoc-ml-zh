    Thus, before training the machine with data, machine learning workflow can be
    defined in three stages. Let’s look at these stages.


    # Gathering data


    This step is considered important because the quality and quantity of data that
    is gathered would directly determine how good the predictive model could be. Data
    collected for any ML project usually consists of data gathered from various sources,
    such as a file or database, and sensor data or real-time data. However, this data
    cannot be directly used for analysis as most real-world data is messy, which means
    the data might have one or more of the following issues:


    +   - **Missing data**: This is data that is not continuously created or not available
    due to technical issues in the application.

    - **Noisy data**: This data is referred to as the errors caused by humans during
    manually gathering the data or error caused by technical problems of the device
    at the time of collecting the data.'

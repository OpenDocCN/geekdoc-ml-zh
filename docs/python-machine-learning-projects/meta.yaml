    # Data preprocessing


    The next step of machine learning is data preparation, wherein the data is loaded
    into a suitable place and prepared for training. At the same time, pertinent visualizations
    of the data are done to determine any relevant relationships between different
    variables or any imbalances between data variables. In machine learning, there
    is an 80/20 rule: every data scientist is expected to spend at least 80% of the
    time on data preprocessing and the remaining 20% of the time on performing the
    analysis.


    Data preprocessing is identified as a process of cleaning the raw data, that is,
    the data collected from the real world, and converting it into a clean data set
    before it is fed to the algorithm.


    # Terms used in preprocessing


    Before preprocessing data, it is necessary to know the terms utilized: raw data
    and prepared data.


    # Raw data (or just data)


    The data in its source form, which is the data in a data warehouse or the data
    sent from streaming systems that are not prepared for the ML task, is termed as
    raw data.


    # Prepared data


    Data in sources that have been parsed, joined, aggregated and summarized to the
    right granularity and put into a tabular form for ML operations is referred to
    as prepared data.


    # Need for Data Preprocessing


    In order to achieve better results from a machine learning model, the underlying
    data has to be in a proper manner, formatted and preferably in one data set. The
    data has to move from being raw to structured and then preprocessed, as shown
    in *Figure 3.2*:


    ![](img/05e0d1e671c636fe8ee73a026cd179da_78_0.png)'

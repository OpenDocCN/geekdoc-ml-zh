  - '[PAGE 208]


    +   - The overall customer experience is lacking

    - Customers do not get the value they expect from the product

    - Absence of onboarding process to help users start with the offerings

    - Product is expensive as compared to competitors’ products

    - UI/UX is not interactive and immersive

    - A number of bugs and glitches

    - The site takes more processing time and is slow


    # Case study for a Telecom Company


    It is a known fact that there has always been a lot of churning in the telecom
    industry. For every 100 people joining as customers, 30-35% opt out in a year.
    Therefore, a telecommunication company need to capture new customers and prevent
    contract termination. This termination is also known as churn or attrition. Reasons
    identified as the causes of churn include better price offers, more lucrative
    packages and bad service experiences.


    So, there is a need for the companies to identify customers who would probably
    opt out and devise strategies or prediction models to prevent them from doing
    so. Churn analytics enables the prediction of customer churn and identifies the
    underlying reasons for the churn. Churn metrics could be used to determine the
    percentage of customers who cancelled a product or service within a given period.


    # The Business Challenge


    Telecom companies are facing extreme customer attrition and need a lot of funds
    to acquire a new customer. As soon as a customer leaves the company, future revenue
    from the customer as well as the resources spent to acquire this customer are
    lost. So, there is a need to prevent this across the cross-section of the organization.
    To do this, companies need to do the following:


    +   - Identify customers who are likely to churn and deploy interventions to prevent
    the churning

    - Formulate plans and develop strategies for customer retention

    - Cater to provide services to customers and improve profits


    # The approach


    Based on customer behavior, demographics and network behavior, a number of classification
    and hybrid models could be applied to predict the churn with increasing accuracy.
    Mechanisms such as discounts and special offers need to be devised to retain their
    customers. In order to perform this prediction, key data'
- md: 'parameters that affect customer churn needs to be identified. The various data
    parameters that can be considered include the following:


    - **Satisfaction data:** This data could consist of information about communication,
    faults, mechanism of installation and so on. It could help determine the impact
    of different levels of satisfaction data on the overall churn, resulting in exploratory
    analysis.

    - **Service Level data:** Based on service level data like billing, delivery,
    assurance, customer satisfaction data and complaints, a predictive churn model
    can be built, as shown in Figure 4.19.


    ![Decision Tree churn prediction model](img/05e0d1e671c636fe8ee73a026cd179da_209_0.png)


    **Figure 4.19:** *Decision Tree churn prediction model*


    This analysis can help determine the factors affecting the churn of customers.


    Once the key data parameters are identified, a basic machine learning pipeline
    is built, and its performance is determined. The best model suitable for a specific
    telecom company can then be determined by comparing the different model types.
    Let’s look at the approach that could be utilized.


    ## Step 1: Problem Definition


    Based on the key challenge, it is identified that there is a need to predict whether
    a customer would churn. To determine that, machine learning models need to be
    trained. The training of a model can be performed on 80% of the data available,
    while the remaining 20% can be utilized for testing the trained models. This threshold
    of 80:20 can be made dynamic to 70:30, depending on the application requirement.
    Further, the testing can be used to assess the prediction with regard to churning
    or not churning.


    ## Step 2: Data Collection


    As mentioned, different types of data and its corresponding dataset needs to be
    formed. Its use case pipeline using the Panda and NumPy for data handling and
    processing needs to be further developed. Further, Matplotlib needs to be used
    for visualization, as explained in detail in Chapter 2, Python Basics for ML and
    Chapter 3, “An Overview of ML Algorithms”.


    ## Step 3: Exploratory Data Analysis (EDA)


    In order to further explore the data, the concepts behind data structures and
    the domain knowledge need to be understood, initial preprocessing and cleaning
    of the data has to be performed, and the topic of investigation must be understood.
    Further, the various patterns and inconsistencies in the data, such as skewness,
    outliers and missing values need to be determined using standard Panda functions.
    This could lead to building and validating the hypotheses. To add to this, the
    unique values for every feature needs to be understood in this step.


    The features can also be clustered into different categories through classification
    labels, such as the following:


    ### Churning Label


    - **Churn, phone service, multiple lines**: Various analysis in terms of whether
    a customer has churned, has a phone or not are determined. The answer to this
    classification label would be in a Yes or No format.

    - Customer services booked

    - **Phone Service**: This indicates whether a customer has a phone service (Yes,
    No)

    - **Type of internet service provider and backup facility**: It indicates the
    service provided for individual customers, such as DSL, Fiber optic or none. It
    also indicates whether the customer has opted for online backup, resulting in
    a yes, no or no service provider.

    - **Streaming services**: This indicates whether the customer has a facility of
    streaming TV, movies and other related operations. This again results in a Yes,
    No or No internet service.


    ### Customer account information


    It deals with the contract term for which the customers have stayed with the company,
    billing, payment method and charges to the customers. This provides quantitative
    information like the number of months, years, credit card payment, bank transfer
    and so on.


    ### Customers demographic information


    This information provides the customers’ personal details in terms of their customerID,
    gender and whether they have dependents.


    ### Building the hypothesis


    Hypotheses can then be made with respect to the following:


    - The customer would be less likely to churn if the contract duration is longer.
    The longer the contract duration, the less likely it is that the customer will
    churn. This is because they are less frequently confronted with the termination
    or prolongation decision.

    - Customers are willing to cancel simple contracts with few associated product
    components quicker and more often than complex product bundles.

    - In order to keep the services running for their families, the customers might
    churn less.


    The major drivers of churn are tenure, contract duration terms and number of additional
    services.


    ### Feature extraction


    Based on the data types and its values, the features could be categorized. This
    can be done through label encoding into categorical data such as gender, phone
    service, paperless billing and so on. The outputs of these values is either a
    yes or no value. These can be transformed to binary integers for further analysis.
    For variables taking more than two values, such as online security, online backup
    and so on, payment method, One-hot encoding can be implemented. Here, for each
    value, a new variable can be created with a binary integer indicating whether
    this value had occurred in the data entry earlier (1 or 0). Values of numerical
    features are rescaled between a range of 0 and 1 through the min-max scaling method.


    With respect to the preceding example of customer churning, it can be said that
    customers who churn have a lower tenure of around 10 months with higher monthly
    charges. Churning is said to be maximum for senior citizens and monthly contract
    customers.


    ## Step 4: Feature Engineering


    In this step, a new feature is generated from the existing ones and a correlation
    analysis is performed. It could be observed that customers having one additional
    service could have a higher churn rate as compared to customers with more services.


    ## Step 5: Train/Test Split


    The data set gathered can now be divided into training and testing data. This
    could then be applied for the conduction of model training and testing. Depending
    on the threshold identified, the information can be split into 80:20 or 70:30,
    that is, the split between training and testing data. Y axis, that is, the dependent
    class, can represent the churn, while the other features can be treated as the
    independent variables, that is, the X axis.


    ## Step 6: Model Evaluation Metrics


    Various metrics could be used to evaluate the performance of the chosen models:


    - **Feature weights:** This metric could indicate the top features used by the
    model to generate the predictions.

    - **Confusion matrix:** It could indicate a grid of true and false predictions
    compared to the actual values.

    - **Accuracy score:** This could represent the overall accuracy of the model.

    - **ROC Curve:** This could specify the **true positive rate (TPR)** along with
    **false positive rate (FPR)** for different thresholds of class predictions. This
    would, in turn, help determine the churn prediction.

    - **Precision-Recall-Curve:** This could compare the **false positive rate (FPR)**
    and **false negative rate (FNR)** for different thresholds of class predictions.


    ## Step 7: Selection, Training, Prediction and Assessment of the Model


    Machine learning models like K-nearest neighbors, logistic regression, random
    forest and support vector machines can be tested. Their performances can further
    be measured, and the models can then be optimized by tuning their hyperparameters.
    It can be observed that K-Nearest Neighbors could be fast, simple and instance-based
    as compared to Logistic Regression, which would be a linear-based model. Random
    Forest could be identified to be slower yet an accurate ensemble model based.
    Support Vector Machines can be used for non-linear operations. Various machine
    learning models can be deployed to predict churn. These could include the following:


    - **Classification model or supervised learning:** It helps identify whether a
    customer could churn.

    - **Regression analysis:** Separate models using techniques like regression analysis
    and predictive dashboards can be built to predict customers churning from the
    business.


    Applying these machine learning models could result in developing targeted marketing
    and reduction in acquisition costs.


    ## Step 8: Hyperparameter Tuning/Model Improvement


    The concept of cross-validation is used during hyperparameter tuning to address
    the biasing arising due to split of the data in the train-test-split part. Hyperparameter
    tuning can be incorporated through grid search and randomized search.


    The following Figure 4.20 represents the process of developing the system. It
    indicates the way of building and deploying the models to determine the highest
    and lowest customer churn information. As represented in figure A in the following
    image, building the model consists of performing historical data analysis by identifying
    significant variables and developing the model. Figure 4.20 represents the deployment
    mechanism that comprises capturing the live feed of historical data and developing
    the propensity model. This could be used to generate the score that differentiates
    between the high and low likelihood of customer churn.'
  mdcn: '需要识别影响客户流失的参数。可以考虑的各种数据参数包括以下内容：


    - **满意度数据：** 这些数据可能包含关于沟通、故障、安装机制等方面的信息。它有助于确定不同满意度数据水平对整体流失的影响，从而进行探索性分析。

    - **服务水平数据：** 基于服务水平数据，如计费、交付、保障、客户满意度数据和投诉，可以构建预测性流失模型，如图4.19所示。


    ![决策树流失预测模型](img/05e0d1e671c636fe8ee73a026cd179da_209_0.png)


    **图4.19：** *决策树流失预测模型*


    此分析有助于确定影响客户流失的因素。


    一旦确定了关键数据参数，就可以构建一个基本的机器学习流程，并确定其性能。然后，通过比较不同的模型类型，可以确定最适合特定电信公司的模型。让我们看看可以采用的方法。


    ## 步骤1：问题定义


    基于关键挑战，我们确定需要预测客户是否会流失。为此，需要训练机器学习模型。模型的训练可以在80%的可用数据上进行，而剩余的20%可用于测试训练好的模型。这个80:20的比例可以根据应用需求动态调整为70:30。此外，测试可用于评估关于流失或不流失的预测。


    ## 步骤2：数据收集


    如前所述，需要形成不同类型的数据及其相应的数据集。需要进一步开发使用Panda和NumPy进行数据处理和处理的用例流程。此外，需要使用Matplotlib进行可视化，如第2章“机器学习的Python基础”和第3章“机器学习算法概述”中详细解释的那样。


    ## 步骤3：探索性数据分析（EDA）


    为了进一步探索数据，需要理解数据结构背后的概念和领域知识，必须执行数据的初步预处理和清理，并且必须理解调查主题。此外，需要使用标准的Panda函数确定数据中的各种模式和不一致性，例如偏度、异常值和缺失值。这可能导致构建和验证假设。此外，在此步骤中需要理解每个特征的唯一值。


    特征也可以通过分类标签聚类到不同的类别中，例如以下内容：


    ### 流失标签


    - **流失、电话服务、多条线路**：确定关于客户是否流失、是否有电话等方面的各项分析。此分类标签的答案将以“是”或“否”的格式呈现。

    - 预订的客户服务

    - **电话服务**：这表明客户是否有电话服务（是，否）

    - **互联网服务提供商类型和备份设施**：它表明为个人客户提供的服务，例如DSL、光纤或无。它还表明客户是否选择了在线备份，导致是、否或无服务提供商。

    - **流媒体服务**：这表明客户是否有流媒体电视、电影和其他相关操作的设施。这再次导致是、否或无互联网服务。


    ### 客户账户信息


    它涉及客户与公司保持的合同期限、计费、付款方式和向客户收取的费用。这提供了定量信息，如月数、年数、信用卡支付、银行转账等。


    ### 客户人口统计信息


    此信息提供客户的个人详细信息，如客户ID、性别以及是否有受抚养人。


    ### 构建假设


    然后可以针对以下内容制定假设：


    - 如果合同期限较长，客户流失的可能性较小。合同期限越长，客户流失的可能性越小。这是因为他们面临终止或延长决定的频率较低。

    - 客户愿意比复杂的产品捆绑更快、更频繁地取消关联产品组件较少的简单合同。

    - 为了保持服务为家人运行，客户可能会减少流失。


    流失的主要驱动因素是任期、合同期限条款和附加服务数量。


    ### 特征提取


    根据数据类型及其值，可以对特征进行分类。这可以通过标签编码为分类数据来完成，例如性别、电话服务、无纸化账单等。这些值的输出是“是”或“否”值。这些可以转换为二进制整数以进行进一步分析。对于取值超过两个的变量，例如在线安全、在线备份等、付款方式，可以实现独热编码。这里，对于每个值，可以创建一个新变量，其二进制整数表示该值是否在数据条目中先前出现过（1或0）。数值特征的值通过最小-最大缩放方法在0到1的范围内重新缩放。


    关于前面的客户流失示例，可以说流失的客户的任期较低，约为10个月，但月度费用较高。流失在老年人和月度合同客户中最为严重。


    ## 步骤4：特征工程


    在此步骤中，从现有特征生成新特征，并执行相关性分析。可以观察到，与拥有更多服务的客户相比，拥有一项附加服务的客户可能具有更高的流失率。


    ## 步骤5：训练/测试拆分


    现在可以将收集到的数据集分为训练数据和测试数据。然后可以将其应用于进行模型训练和测试。根据确定的阈值，信息可以按80:20或70:30拆分，即训练数据和测试数据之间的拆分。Y轴，即因变量类别，可以代表流失，而其他特征可以被视为自变量，即X轴。


    ## 步骤6：模型评估指标


    可以使用各种指标来评估所选模型的性能：


    - **特征权重：** 此指标可以指示模型用于生成预测的顶级特征。

    - **混淆矩阵：** 它可以指示与实际值相比的真实和错误预测的网格。

    - **准确率分数：** 这可以代表模型的整体准确性。

    - **ROC曲线：** 这可以指定不同类别预测阈值的**真正例率（TPR）**以及**假正例率（FPR）**。这反过来将有助于确定流失预测。

    - **精确率-召回率曲线：** 这可以比较不同类别预测阈值的**假正例率（FPR）**和**假负例率（FNR）**。


    ## 步骤7：模型的选择、训练、预测和评估


    可以测试K近邻、逻辑回归、随机森林和支持向量机等机器学习模型。可以进一步测量它们的性能，然后可以通过调整其超参数来优化模型。可以观察到，与逻辑回归（一种基于线性的模型）相比，K近邻可能更快、更简单且基于实例。随机森林可以被识别为较慢但准确的基于集成的模型。支持向量机可用于非线性操作。可以部署各种机器学习模型来预测流失。这些可能包括以下内容：


    - **分类模型或监督学习：** 它有助于识别客户是否会流失。

    - **回归分析：** 可以使用回归分析等技术构建单独的模型和预测仪表板，以预测客户从企业流失。


    应用这些机器学习模型可能导致制定有针对性的营销策略并降低获客成本。


    ## 步骤8：超参数调整/模型改进


    在超参数调整期间使用交叉验证的概念，以解决在训练-测试拆分部分由于数据拆分而产生的偏差。超参数调整可以通过网格搜索和随机搜索来实现。


    下图4.20表示开发系统的过程。它指示了构建和部署模型以确定最高和最低客户流失信息的方式。如下图中的图A所示，构建模型包括通过识别重要变量并开发模型来执行历史数据分析。图4.20表示部署机制，该机制包括捕获历史数据的实时馈送并开发倾向模型。这可用于生成分数，以区分客户流失的高可能性和低可能性。'

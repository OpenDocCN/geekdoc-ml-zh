    **Ans.** Tabu Search is a metaheuristic procedure for solving optimization problems
    designed to guide other methods to escape the trap of local minima. It is used
    to find optimal and nearly optimal solutions for a wide range of classical and
    practical problems, from scheduling to telecommunications, character recognition
    and neural networks. To avoid falling in a local minima, it uses memory so that
    it can remember moves and solutions that are already exploited. Also, it uses
    memory functions to allow searching strategies like intensify and diversif in
    search space.


    Tabu Search can be used to guide other processes that use a set of moves for transforming
    one solution into another, and it provides guidance for measuring the attractiveness
    of these moves. Example of moves are swapping two tasks, changing the value of
    a variable (increase or decrease).


    Tabu Search is based on three main concepts:


    +   - The use of flexible attribute-based memory structures that allows evaluation
    criteria and historical search information to be exploited move thoroughly than
    by rigid memory structures or by memory-less systems The flexible attribute-based
    memory structures allow evaluation criteria and historical search information
    to be exploited in better way.

    - A mechanism that evaluates the movement based on specific criteria in tabu search

    - The use of memory functions of different time spans from short term to long
    term, to implement strategies for intensify,

    - To focus on a specific region, to diversifications — that drive the search in
    new regions.


    # 7. What are the main characteristics of Evolutionary Algorithms?


    **Ans.** Evolutionary algorithms are a heuristic-based approach to solving problems
    that cannot be easily solved in polynomial time, such as classically NP-Hard problems,
    and anything else that would take far too long to exhaustively process. When used
    on their own, they are typically applied to combinatorial problems; however, genetic
    algorithms are often used in tandem with other methods, acting as a quick way
    to find a somewhat optimal starting place for another algorithm to work off of.


    The premise of an **Evolutionary Algorithm** (to be further known as an EA) is
    quite simple, given that you are familiar with the process of natural selection.
    An EA involves four steps: initialization, selection, genetic operators, and termination.
    These steps each correspond, roughly, to a particular facet of natural selection,
    and they provide easy ways to modularize implementations of this algorithm category.
    Simply put, in an EA, fitter members will survive and'

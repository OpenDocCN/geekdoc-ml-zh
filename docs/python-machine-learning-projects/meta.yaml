    text documents are classified based on predefined topics or categories.

    - **Sentiment analysis**: This task is used to provide information about perceptions
    of brands, products, services and changes in customer attitudes over time. Therefore,
    it detects positive, negative or neutral sentiments about a product or brand,
    leading to insights that can improve business processes and user experiences.


    Information extraction deals with extracting structured information from free
    text and storing the various entities, attributes and related information in the
    database. Common information extraction sub-tasks include the following:


    +   - Feature selection, also known as attribute selection, is a process of selecting
    the important features (dimensions) that contribute the most to the output of
    a predictive analytics model.

    - In order to improve the accuracy of a classification task, the sub-task i.e.,
    feature extraction, is employed. Its aim is to select a subset of features.

    - **Named-entity recognition (NER)** is also known as entity identification or
    entity extraction. Its major purpose is to find and categorize specific entities
    in the available text.

    - **Data mining**: It is the process of identifying patterns and extracting useful
    insights from datasets. This technique evaluates structured as well as unstructured
    data to identify new information. Text mining is said to be a sub-field of data
    mining.


    # Sentiment analysis


    Sentiment analysis is a machine learning tool that analyzes text for its polarity.
    The polarity may be positive, negative or neutral. Text analysis techniques are
    used to interpret and classify the emotions within text data, which, in turn,
    makes the machines automatically learn how to detect sentiment without any human
    input.


    Sentiment analysis models can be trained to understand the context, sarcasm and
    misapplied words. The tools used in sentiment analysis help businesses to identify
    the sentiment of the customer towards a particular product, a brand or a service
    provided. Once the machines are trained through machine learning tools, they learn
    to detect the sentiments automatically without any human intervention. A number
    of techniques and complex algorithms can be used to command and train'
  - '[PAGE 169]


    machines to perform sentiment analysis. Each technique has its own pros and cons,
    but when used together, they can provide exceptional results, as shown in Figure
    4.7:


    ![](img/05e0d1e671c636fe8ee73a026cd179da_169_0.png)


    Now, let’s look at the most frequently used algorithms for sentiment analysis.


    # Naive Bayes


    Naive Bayes algorithms are considered to be one of the simplest groups of probabilistic
    algorithms. These algorithms help by performing sentiment analysis classification,
    in which a probability is assigned for the occurrence of the word of text. This
    assignment represents a polarity of positive or negative to the given word or
    phrase.


    Bayes’ theorem works as follows: Naive Bayes algorithm evaluates words against
    each other. Thus, the likelihood that a word, phrase, or text has occurred positive
    or negative, can be determined by the well-trained machine learning models. Utilizing
    techniques like lemmatization, stop word removal or TF-IDF, Naive Bayes provides
    better accuracy.


    # Linear regression


    Given X features, linear regression, being a statistical algorithm, helps to predict
    the Y value. Machine learning algorithms work on the datasets provided. These'
  - '[PAGE 170]


    algorithms further determine the relationship between the variables, which are
    represented through the X-Y axis. The straight-line pattern running across the
    various coordinates helps determine further predictions in relationships.

    With respect to word polarity, linear regression determines the relationship between
    the words and phrases (X input) and the polarity (Y output). This relationship
    provides output on a scale of polarity from being “really positive” to “really
    negative”, along with the values between them.


    # Support Vector Machines (SVM)


    A support vector machine is also a supervised machine learning model that uses
    its algorithms to train and classify text within the sentiment polarity model.
    As an example, mentioned in *Figure 4.8*, consider the red and blue marks as tags
    that represent two data features: X and Y. The SVM classifier could then be trained
    to output the X-Y coordinates as either red or blue.


    ![](img/05e0d1e671c636fe8ee73a026cd179da_170_0.png)


    An SVM algorithm further assigns a hyperplane to the data features (X-Y) coordinates,
    as shown in *Figure 4.9*. This hyperplane best separates the two tags. For a two-dimensional
    representation, this hyperplane represents a straight line, similar to a line
    in linear regression. One side of the hyperplane line represents the *red* tag,
    while the other side of the line specifies the *blue tag*. This representation
    works well for sentiment analysis, where one of the tags would represent the positive
    sentiment, while the other tag would indicate the negative sentiment.'
  - '[PAGE 171]


    The hyperplane that provides the largest distance between each tag is considered
    as the best hyperplane in machine learning. Refer to the following [figure 4.9](#figure-4-9):


    ![](img/05e0d1e671c636fe8ee73a026cd179da_171_0.png)


    **Figure 4.9:** Representation of the hyperplane


    However, as data sets become more complex, using a single line to separate the
    data features into two regions is difficult, as represented by [Figure 4.10](#figure-4-10):'
  - '[PAGE 172]


    ![](img/05e0d1e671c636fe8ee73a026cd179da_172_0.png)


    Using SVM, more complex the data, more accurate the predictor will be the predictor
    will become. Imagine the preceding figure in three dimensions, i.e. with a Z axis
    added. This leads to make the figure represent a circle. This figure can be mapped
    to its two-dimensional representation. This would result in the best hyperplane,
    represented by [Figure 4.11](#figure-411):


    ![](img/05e0d1e671c636fe8ee73a026cd179da_172_1.png)


    SVM allows for more accurate machine learning because it is multidimensional.'
- md: "## Deep learning\n\nAs the name suggests, \"deep\" represents going into the\
    \ depth of understanding, while \"learning\" indicates understanding. Thus, deep\
    \ learning forms a subfield of machine learning that aims to determine and understand\
    \ data the way the human brain does, using \"artificial neural network.\" Deep\
    \ learning is considered to be a hierarchical machine learning representation.\
    \ It is considered to be a multi-level learning that permits a machine to automatically\
    \ chain a number of human-created processes together. By allowing multiple algorithms\
    \ to be used progressively, deep learning can solve complex problems just like\
    \ humans do.\n\n## Building a sentiment analysis model\n\nFollowing are the steps\
    \ to build a sentiment analysis model, assuming that data is available in the\
    \ system:\n\n- 1. Choose the model\n- 2. Choose the classifier\n- 3. Import the\
    \ data\n- 4. Train the sentiment analysis classifier\n- 5. Test the classifier\n\
    \n## Case study on product recommendation system based on sentiment analysis\n\
    \nFor online shopping, the reviews and rating given by customers lead to further\
    \ footfalls. However, the current online product recommendation systems that are\
    \ based on reviews have randomness in their review pattern. This randomness can\
    \ be due to some fake reviews that would make the buyer confused.\n\nTo overcome\
    \ this issue, a system can be developed that can focus on the genuineness and\
    \ trustworthiness of the reviews and can enhance the accuracy of the recommendation\
    \ system.\n\n## Product recommendation\n\nRecommender systems, in general, are\
    \ used in various domains, such as movies, music, news, books, research articles,\
    \ search queries, social tags, and products. E-commerce sites like eBay, Amazon,\
    \ Flipkart, and Alibaba use proprietary recommendation algorithms so that they\
    \ would be in a better position to serve their customers with the products they\
    \ have. A product recommendation system predicts and shows the items that a user\
    \ would like to purchase according to likes, recent searches and product reviews.\
    \ Review helpfulness aids in reducing risks and uncertainty faced by users in\
    \ online shopping. With the growing amount of information on the internet and\
    \ a significant rise in the number of users, it has become important for companies\
    \ to search, map according to the user's preferences and taste, and provide them\
    \ with the relevant chunk of information. Therefore, there needs to be a system\
    \ that can scrape the unwanted reviews. These reviews can be from different online\
    \ websites or from opinion mined and sentiment analysis. These can also work on\
    \ factors like the buyer's profile, previous purchases, star ratings, whether\
    \ the review has been given after purchasing, and so on. Based on all the listed\
    \ factors and reviewer's trustworthiness, the website from which the user should\
    \ buy the product can be recommended.\n\n## Problem definition\n\nThere is a need\
    \ to design a system to recommend the e-commerce website from which the buyer\
    \ should buy a certain product. The focus needs to be on factors like user trustworthiness,\
    \ frequent visits, previous purchases, previous reviews and trustworthy review\
    \ analysis. Depending on user trustworthiness, sentiment analysis can be performed\
    \ on trusted reviews to generate the number of positive and negative results.\n\
    \n## System development\n\nTo develop the correct website for product purchase,\
    \ various steps need to be performed by considering a number of factors prior\
    \ to the purchase. This recommendation system development can follow the waterfall\
    \ model of system development. This model is used to create a system with a linear\
    \ and sequential approach. It is termed as waterfall because the model develops\
    \ systematically from one phase to another in a downward fashion. It is also referred\
    \ to as a linear-sequential life cycle model. It is considered to be simple to\
    \ use and understand. In a waterfall model, each phase must be completed before\
    \ the next phase can begin, and the phases do not overlap in any way.\n\nWaterfall\
    \ model is essential to ensure that appropriate system is developed and meets\
    \ the requirements in terms of feasibility and implementation. This approach comprises\
    \ of developing the system through various phases, as represented in [Figure 4.12](https://example.com/figure4.12):\n\
    \n![Figure 4.12: WaterFall Model](img/05e0d1e671c636fe8ee73a026cd179da_175_0.png)\n\
    \nThe phases that represent the Waterfall model include the following:\n\n- **Requirement\
    \ Gathering and analysis:** All the data requirements are captured in this phase.\n\
    - **System Design:** The requirements specified in the first phase are studied\
    \ and the system design is prepared.\n- **Implementation:** Small programs called\
    \ units are then developed and tested for functionality. These are further moved\
    \ to the next phase in an integrated manner.\n- **Integration and Testing:** All\
    \ the units developed are then integrated into a system after they are tested.\
    \ Post integration, the entire system is tested for any faults and failures.\n\
    - **Deployment of system:** The product is then deployed in the customer environment\
    \ or released into the market.\n- **Maintenance:** Maintenance of the system or\
    \ the product developed in the customer's environment is performed.\n\n**System\
    \ Design:** The system can start with the user searching for a particular product\
    \ and end with the recommendation of the website to the user, as represented in\
    \ [Figure 4.13](#):\n\n![Figure 4.13](img/05e0d1e671c636fe8ee73a026cd179da_176_0.png)\n\
    \nWhen a user searches for a product on the web page, the reviews from the e-commerce\
    \ websites can be scrapped. The data collected can include the reviewer's details,\
    \ the review, trustworthy factors and so on. Untrustworthy reviews or fake reviews\
    \ can be removed from the database. Further, sentiment analysis can be carried\
    \ out on the cleaned data using NLP to recommend the website from which the user\
    \ should buy the product.\n\n## Considerations for the case study\n\nThe steps\
    \ that need to be followed while developing this system is shown in Figure 4.14:\n\
    \n![Figure 4.14](img/05e0d1e671c636fe8ee73a026cd179da_176_1.png)\n\n### 1. Data\
    \ Collection and Scraping\n\nWhen the user enters the product, the data is collected\
    \ from various e-commerce websites, such as Amazon and Flipkart. This data includes\
    \ the images of the product, features of the product, product ID, star ratings\
    \ and reviews from each website. All this data is obtained through scrapers, which\
    \ are different for different websites.\n\n### 2. User Trustworthiness\n\nThis\
    \ block will determine whether the review given by the specific user is trustworthy\
    \ based on various factors of the user like previous reviews, previous purchases,\
    \ visits and so on.\n\n### 3. Sentiment Analysis\n\nBased on the trusted reviews,\
    \ sentiment analysis is performed in this block, as shown in [Figure 4.15](https://example.com).\
    \ For this operation, Python libraries and NLTK can be utilized. This analysis\
    \ would categorize the reviews as positive or negative and can be implemented\
    \ using the Logistic Regression Model to produce results. Refer to the following\
    \ [figure 4.15](https://example.com):\n\n![Figure 4.15](img/05e0d1e671c636fe8ee73a026cd179da_177_0.png)\n\
    \n### 4. Feature Comparison\n\nThe features recorded during the scraping process\
    \ are compared in this block. These features run through the sentiment analysis\
    \ and produce much better results.\n\n### 5. Results\n\nThis block finally recommends\
    \ the website from which the user should buy the product based on the previous\
    \ analysis done.\n\n### 6. Algorithms that can be employed\n\nVarious algorithms/programming\
    \ languages can be applied:\n\n- a. **Implementation of Scrapper:** A web scrapper\
    \ is a tool designed to accurately and quickly extract data from the web pages.\
    \ This data is vital and becomes the differentiator between the same product on\
    \ various websites like Amazon and Flipkart. For analyzing and accessing the real-time\
    \ reviews, scraping is required. Web scraping is the process of automating the\
    \ fetching of the required data in an efficient and agile manner. This is also\
    \ known as web extraction or harvesting. The scrapper is implemented in two phases:\n\
    \    - i. **Scrapper for initial links** can be implemented in JavaScript. This\
    \ element can automate the process and search for the desired product, name, photo,\
    \ price and so on to extract the relevant links.\n    - ii. **Scrapper for e-commerce\
    \ websites** can be implemented using Scrapy, which is a scraping framework in\
    \ Python. It helps in quickly scraping large amounts of data with various features\
    \ like seamless extraction with IP jumping. These scrappers focus on scrapping\
    \ the data other than the basic information, like reviewer's name, review title,\
    \ review text, review date, star rating and whether the purchase is verified for\
    \ that product on both websites.\n- 7. **Implementation of Sentiment Analysis\
    \ Model:** The sentiment analysis model can be implemented using Python and various\
    \ Machine Learning libraries such as NumPy, Pandas, Matplotlib, Sklearn, and NLTK.\
    \ NLTK is a base library for sentiment analysis that contains text processing\
    \ libraries for basic operation like tokenization, lemmatization and filtering.\
    \ The algorithm that can be used for Sentiment Analysis is logistic Regression.\
    \ The model is trained using the Amazon open-source product review dataset and\
    \ then can be used on real-time data.\n- 8. **Database Management:** The unstructured\
    \ data that is scrapped from the web pages needs to be stored for analysis. The\
    \ data fetched can be stored in the database in CSV format. For database management,\
    \ Firebase and MongoDB can be used:\n    - i. **Firebase:** It can be used during\
    \ the initial scrapper for the links to store the links for the products and their\
    \ corresponding features, like product dimensions, battery power, connectivity,\
    \ weight, display, camera, and color.\n    - ii. **MongoDB:** MongoDB, an unstructured\
    \ database, can be used to store all the contents of the review. These can be\
    \ used later when the same product is searched, thus saving computing time.\n\
    - 9. **Trustworthiness Filters:** Following are the trustworthiness filters:\n\
    \    - i. Depending on the user and other properties, the trustworthiness of the\
    \ review is determined. The output of this determination indicates whether the\
    \ sentiment should be included for analysis."
  mdcn: "## 深度学习\n\n顾名思义，“深度”代表深入理解，“学习”则指理解。因此，深度学习构成了机器学习的一个子领域，旨在使用“人工神经网络”来确定和理解数据，其方式类似于人脑。深度学习被认为是一种层次化的机器学习表示。它被视为一种多层次学习，允许机器自动将多个人为创建的过程链接在一起。通过允许多个算法逐步使用，深度学习可以像人类一样解决复杂问题。\n\
    \n## 构建情感分析模型\n\n假设系统中已有数据，构建情感分析模型的步骤如下：\n\n- 1. 选择模型\n- 2. 选择分类器\n- 3. 导入数据\n\
    - 4. 训练情感分析分类器\n- 5. 测试分类器\n\n## 基于情感分析的产品推荐系统案例研究\n\n对于在线购物，客户的评论和评分会带来更多的流量。然而，当前基于评论的在线产品推荐系统在其评论模式中存在随机性。这种随机性可能是由于一些虚假评论造成的，这会让买家感到困惑。\n\
    \n为了克服这个问题，可以开发一个系统，专注于评论的真实性和可信度，并提高推荐系统的准确性。\n\n## 产品推荐\n\n推荐系统通常用于各种领域，例如电影、音乐、新闻、书籍、研究文章、搜索查询、社交标签和产品。像eBay、亚马逊、Flipkart和阿里巴巴这样的电子商务网站使用专有的推荐算法，以便更好地为客户提供他们拥有的产品。产品推荐系统根据喜好、最近的搜索和产品评论来预测并显示用户可能想要购买的物品。评论的有用性有助于降低用户在在线购物中面临的风险和不确定性。随着互联网上信息量的不断增长和用户数量的显著增加，公司需要根据用户的偏好和品味进行搜索、映射，并为他们提供相关的信息块，这一点变得非常重要。因此，需要一个系统来过滤掉不需要的评论。这些评论可能来自不同的在线网站，或者来自意见挖掘和情感分析。它们还可以基于诸如买家资料、先前的购买、星级评分、评论是否在购买后给出等因素进行工作。基于所有列出的因素以及评论者的可信度，可以推荐用户应该从哪个网站购买产品。\n\
    \n## 问题定义\n\n需要设计一个系统来推荐买家应该从哪个电子商务网站购买特定产品。重点需要放在诸如用户可信度、频繁访问、先前的购买、先前的评论和可信评论分析等因素上。根据用户的可信度，可以对可信评论进行情感分析，以生成正面和负面结果的数量。\n\
    \n## 系统开发\n\n为了开发正确的产品购买网站，需要在购买前考虑许多因素并执行多个步骤。此推荐系统开发可以遵循系统开发的瀑布模型。该模型用于以线性和顺序方法创建系统。它被称为瀑布，是因为该模型以向下的方式从一个阶段系统地发展到另一个阶段。它也被称为线性顺序生命周期模型。它被认为易于使用和理解。在瀑布模型中，每个阶段必须在下一阶段开始之前完成，并且各阶段不能以任何方式重叠。\n\
    \n瀑布模型对于确保开发适当的系统并在可行性和实施方面满足要求至关重要。这种方法包括通过多个阶段开发系统，如[图4.12](https://example.com/figure4.12)所示：\n\
    \n![图4.12：瀑布模型](img/05e0d1e671c636fe8ee73a026cd179da_175_0.png)\n\n代表瀑布模型的阶段包括以下内容：\n\
    \n- **需求收集和分析：** 在此阶段捕获所有数据需求。\n- **系统设计：** 研究第一阶段指定的需求，并准备系统设计。\n- **实现：** 然后开发称为单元的小程序并测试其功能。这些单元以集成的方式移至下一阶段。\n\
    - **集成和测试：** 所有开发的单元在测试后集成到一个系统中。集成后，对整个系统进行测试，以查找任何故障和错误。\n- **系统部署：** 然后将产品部署到客户环境中或发布到市场。\n\
    - **维护：** 在客户环境中对系统或开发的产品进行维护。\n\n**系统设计：** 系统可以从用户搜索特定产品开始，到向用户推荐网站结束，如[图4.13](#)所示：\n\
    \n![图4.13](img/05e0d1e671c636fe8ee73a026cd179da_176_0.png)\n\n当用户在网页上搜索产品时，可以从电子商务网站抓取评论。收集的数据可以包括评论者详情、评论、可信因素等。不可信的评论或虚假评论可以从数据库中删除。此外，可以使用NLP对清理后的数据进行情感分析，以推荐用户应该从哪个网站购买产品。\n\
    \n## 案例研究的注意事项\n\n开发此系统需要遵循的步骤如图4.14所示：\n\n![图4.14](img/05e0d1e671c636fe8ee73a026cd179da_176_1.png)\n\
    \n### 1. 数据收集和抓取\n\n当用户输入产品时，数据从各种电子商务网站（如亚马逊和Flipkart）收集。这些数据包括每个网站的产品图片、产品功能、产品ID、星级评分和评论。所有这些数据都是通过抓取器获得的，不同网站的抓取器不同。\n\
    \n### 2. 用户可信度\n\n此模块将根据用户的各种因素（如先前的评论、先前的购买、访问等）确定特定用户给出的评论是否可信。\n\n### 3. 情感分析\n\
    \n基于可信评论，在此模块中进行情感分析，如[图4.15](https://example.com)所示。对于此操作，可以使用Python库和NLTK。此分析将评论分类为正面或负面，并可以使用逻辑回归模型实现以产生结果。参考以下[图4.15](https://example.com)：\n\
    \n![图4.15](img/05e0d1e671c636fe8ee73a026cd179da_177_0.png)\n\n### 4. 功能比较\n\n\
    在此模块中比较抓取过程中记录的功能。这些功能经过情感分析，产生更好的结果。\n\n### 5. 结果\n\n此模块最终根据先前的分析推荐用户应该从哪个网站购买产品。\n\
    \n### 6. 可采用的算法\n\n可以应用各种算法/编程语言：\n\n- a. **抓取器的实现：** 网页抓取器是一种旨在准确快速地从网页中提取数据的工具。这些数据至关重要，成为亚马逊和Flipkart等不同网站上相同产品的区分因素。为了分析和访问实时评论，需要抓取。网页抓取是以高效和敏捷的方式自动获取所需数据的过程。这也称为网页提取或收割。抓取器分两个阶段实现：\n\
    \    - i. **初始链接的抓取器** 可以用JavaScript实现。此元素可以自动化该过程，并搜索所需的产品、名称、照片、价格等以提取相关链接。\n\
    \    - ii. **电子商务网站的抓取器** 可以使用Scrapy实现，Scrapy是Python中的一个抓取框架。它有助于快速抓取大量数据，具有各种功能，如通过IP跳转进行无缝提取。这些抓取器专注于抓取基本信息以外的数据，例如评论者姓名、评论标题、评论文本、评论日期、星级评分以及两个网站上该产品的购买是否经过验证。\n\
    - 7. **情感分析模型的实现：** 情感分析模型可以使用Python和各种机器学习库（如NumPy、Pandas、Matplotlib、Sklearn和NLTK）实现。NLTK是情感分析的基础库，包含用于基本操作（如分词、词形还原和过滤）的文本处理库。可用于情感分析的算法是逻辑回归。该模型使用亚马逊开源产品评论数据集进行训练，然后可用于实时数据。\n\
    - 8. **数据库管理：** 从网页抓取的非结构化数据需要存储以供分析。获取的数据可以以CSV格式存储在数据库中。对于数据库管理，可以使用Firebase和MongoDB：\n\
    \    - i. **Firebase：** 可以在初始链接抓取器中使用，以存储产品的链接及其相应功能，例如产品尺寸、电池功率、连接性、重量、显示屏、摄像头和颜色。\n\
    \    - ii. **MongoDB：** MongoDB是一个非结构化数据库，可用于存储评论的所有内容。当搜索相同产品时，这些内容可以稍后使用，从而节省计算时间。\n\
    - 9. **可信度过滤器：** 以下是可信度过滤器：\n    - i. 根据用户和其他属性，确定评论的可信度。此确定的输出表明情感是否应包含在分析中。"

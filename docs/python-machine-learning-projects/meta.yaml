    | **1** | 3,834 | 639 | 4,473 | 85.7% |

    | **0** | 16 | 951 | 967 | 1.7% |

    | **Grand Total** | 3,850 | 1,590 | 5,440 | |

    | | 99.6% | 40.19% | 88.0% | |


    Figure 3.31: Confusion matrix


    The accuracy for the problem at hand comes out to be 88%. As you can see from
    the preceding two tables, the positive predictive value is high, but the negative
    predictive value is quite low. The same holds for sensitivity and specificity.
    This is primarily driven by the threshold value we have chosen. If we decrease
    our threshold value, the two pairs of starkly different numbers will come closer.


    In general, we are concerned with one of the previously defined metrics. For instance,
    in a pharmaceutical company, they will be more concerned with minimal wrong positive
    diagnosis. Hence, they will be more concerned about high specificity. On the other
    hand, an attrition model will be more concerned with sensitivity. A confusion
    matrix is generally used only with class output models.


    # F1 Score


    In the previous section, we discussed precision and recall for classification
    problems and also highlighted the importance of choosing precision/recall based
    on our use case. What if for a use case, we are trying to get the best precision
    and recall at the same time? F1-Score is the harmonic mean of precision and recall
    values for a classification problem. The formula for F1-Score is as follows:


    $$F_1 = \left( \frac{\text{recall}^{-1} + \text{precision}^{-1}}{2} \right)^{-1}
    = 2 \cdot \frac{\text{precision} \cdot \text{recall}}{\text{precision} + \text{recall}}$$


    Now, an obvious question that comes to mind is, ‘Why are we taking a harmonic
    mean and not an arithmetic mean?’. This is because HM punishes extreme values'
  merge: -1
  pgno: 142
- img_proc: true
  md: 'more. Let us understand this with an example. We have a binary classification
    model with the following results:


    Precision: 0, Recall: 1


    Here, if we take the arithmetic mean, we get 0.5. It is clear that the preceding
    result comes from a dumb classifier that just ignores the input and predicts one
    of the classes as output. Now, if we were to take HM, we will get 0, which is
    accurate as this model is not useful at all.


    This seems simple. There are situations, however, for which a data scientist would
    like to give a percentage more importance/weight to either precision or recall.
    Altering the previous expression a bit to include an adjustable parameter beta
    for this purpose, we get the following:


    $$F_{\beta} = (1 + \beta^2) \cdot \frac{\text{precision} \cdot \text{recall}}{(\beta^2
    \cdot \text{precision}) + \text{recall}}$$


    Fbeta measures the effectiveness of a model with respect to a user who attaches
    β times as much importance to recall as precision.


    # Root Mean Squared Error (RMSE)


    RMSE is the most popular evaluation metric used in regression problems. It follows
    an assumption that errors are unbiased and follow a normal distribution. Here
    are the key points to consider on RMSE:


    +   1. The power of ‘square root’ empowers this metric to a show large number
    of deviations.

    2. The ‘squared’ nature of this metric helps deliver more robust results, which
    prevents cancelling the positive and negative error values. In other words, this
    metric aptly displays the plausible magnitude of error term.

    3. It avoids the use of absolute error values, which is highly undesirable in
    mathematical calculations.

    4. When we have more samples, reconstructing the error distribution using RMSE
    is considered more reliable.

    5. RMSE is highly affected by outlier values. Hence, make sure you’ve removed
    outliers from your data set before using this metric.

    6. As compared to mean absolute error, RMSE gives higher weightage and punishes
    large errors.


    RMSE metric is given by the following:'
  merge: -1
  pgno: 143
- img_proc: true
  md: '![](img/05e0d1e671c636fe8ee73a026cd179da_144_0.png)


    Here, N is the total number of observations.


    # R-Squared/Adjusted R-Squared


    We learned that when the RMSE decreases, the model’s performance improves. However,
    these values alone are not intuitive.


    In the case of a classification problem, if the model has an accuracy of 0.8,
    we can gauge how good our model is against a random model that has an accuracy
    of 0.5. So the random model can be treated as a benchmark. But when we talk about
    the RMSE metrics, we do not *have* a benchmark to compare.


    This is where we can use R-Squared metric. The formula for R-Squared is as follows:


    ![](img/05e0d1e671c636fe8ee73a026cd179da_144_1.png)


    ![](img/05e0d1e671c636fe8ee73a026cd179da_144_2.png)


    **MSE(model):** Mean squared error of the predictions against the actual values

    **MSE(baseline):** Mean squared error of mean prediction against the actual values

    In other words, how good our regression model as compared to a very simple model
    that just predicts the mean value of target from the train set as predictions.


    # Adjusted R-Squared


    A model performing equal to baseline would give R-Squared as 0. The better the
    model, the higher the r2 value. The best model with all correct predictions would
    give R-Squared as 1. However, on adding new features to the model, the R-Squared
    value either increases or remains the same. R-Squared for adding features that
    add no value to the model. So, an improved version of the R-Squared is the adjusted
    R-Squared. The formula for adjusted R-Squared is given by the following:'
  merge: -1
  pgno: 144
- img_proc: true
  md: '$$\bar{R}^2 = 1 - (1 - R^2) \left[ \frac{n - 1}{n - (k + 1)} \right]$$


    Here,

    **k**: Number of features

    **n**: Number of samples


    As you can see, this metric takes the number of features into account. When we
    add more features, the term in the denominator n-(k +1) decreases, so the whole
    expression increases.

    If R-Squared does not increase, it means the feature added isn’t valuable for
    our model. So overall, we subtract a greater value from 1, and the adjusted r2,
    in turn, would decrease.



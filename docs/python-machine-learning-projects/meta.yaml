    identified as the causes of churn include better price offers, more lucrative
    packages and bad service experiences.


    So, there is a need for the companies to identify customers who would probably
    opt out and devise strategies or prediction models to prevent them from doing
    so. Churn analytics enables the prediction of customer churn and identifies the
    underlying reasons for the churn. Churn metrics could be used to determine the
    percentage of customers who cancelled a product or service within a given period.


    # The Business Challenge


    Telecom companies are facing extreme customer attrition and need a lot of funds

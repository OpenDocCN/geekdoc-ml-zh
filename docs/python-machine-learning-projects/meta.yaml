  - '[PAGE 106]


    The real-time data available is in various forms or is a combination of numeric
    and textual data. This data need transformation before a machine learning algorithm
    is applied. One way of transforming data is using Pandas **Apply** or **Map**
    function.


    # **Example 10:**


    ```

    >>>mapping = {''male'':0,''female'':1}

    >>>df[''Gender'']=df[''Sex''].apply(lambda x:mapping[x])

    ```


    Here, mapping is a dictionary type of variable with two key-value pairs. The **apply**
    function uses this dictionary to convert the categorical values (male/female)
    into numerical values(0 or 1) from the ‘Sex’ column. Here, the mapping is applied
    on each row of dataframe. The generalized syntax of **map** and **apply** functions
    are as follows:


    ```

    df[‘col’].apply(func,axis=0/1)

    df[‘col’].map(func/series)

    ```


    The **col** indicates the column on which the transformation is to be applied.
    The difference between the two functions is that **apply** can be used on object
    types series and dataframe both, and the **map** function can be used with only
    series object type.


    # ## Data Preprocessing – Handling missing values


    Pandas provide various functions to handle the missing values in the data. To
    apply machine learning function, these values require preprocessing. The following
    table shows various methods to handle missing values.


    | Function | Description |

    | :--- | :--- |

    | dropna() | Drops missing observations |

    | dropna(how=''all'') | Drops observations where all cells is NA |

    | dropna(axis=1, how=''all'') | Drops column if all the values are missing |

    | dropna(thresh = 5) | Drops rows that contain less than 5 non-missing values
    |

    | fillna(0) | Replaces missing values with zeros |

    | isnull() | Returns True if the value is missing |

    | notnull() | Returns True for non-missing values |


    *Table 3.7: Handling Missing Values*



    \ input to the system. The respective machine learning algorithm acts on this\
    \ data without prior training, so the output of the system depends on the coded\
    \ algorithms. Unsupervised learning is further divided into two categories:\n\n\
    - **Clustering:** In this, members with similar features are combined. However,\
    \ the group labels are not known prior. Methods used for clustering include Gaussian\
    \ mixtures, K-Means Clustering, Boosting, Hierarchical Clustering, K-Means Clustering,\
    \ and Spectral Clustering.\n- **Association:** In this, the algorithm tries to\
    \ learn without the availability of labeled data. It aids in discovering interesting\
    \ relations between variables in large databases. The methods used are Associative\
    \ rule mining and Mining Multilevel Association Rules from Relational Databases\
    \ and Data Warehouses.\n\n## Training and testing the model on data\n\nTo get\
    \ an accurate output, the input to the system and the algorithm used need to be\
    \ just right. To achieve an optimized training model, the data is split into three\
    \ parts:\n\n- **Training data:** The classifier is trained using this data.\n\n\
    The equation for straight line is y=mx+b, where x is the input, m is the slope\
    \ of that line, and b is the y-intercept. As the slope m can take up a number\
    \ of values, the slope can be represented by “weights” matrix and can have a bias\
    \ associated with it, as shown in *Figure 3.4*:\n\n![](img/05e0d1e671c636fe8ee73a026cd179da_81_0.png)\n\
    \nThis process is then repeated. Each iteration or cycle of updating the weights\
    \ and biases is called one training “step”. When the training is initiated, considering\
    \ the preceding example, a random line is drawn through the data. As each step\
    \ of the training progresses, the line moves, step by step, closer to the ideal\
    \ line. The entire process comprises of working with 2 sets of data namely validation\
    \ and testing data elaborated as follows:\n\n- **Validation data:** A set of unseen\
    \ data is used from the training data to tune the parameters of the classifier.\
    \ Cross-validation is used to estimate the skill of a machine learning model on\
    \ the unseen data. While training the classifier, only the training or validation\
    \ set is available.\n- **Testing data:** The performance of the classifier is\
    \ tested on the unseen test data and is available only while testing the classifier.\
    \ It is used for evaluating the trained model’s performance. Once the data set\
    \ is determined, a confusion matrix is developed, which indicates how well the\
    \ classification model is trained. Confusion matrix is represented by four parameters:\n\
    \    - **True positives:** These are cases in which the predicted TRUE and the\
    \ actual predicted output is correct. More values are preferred here.\n    - **True\
    \ negatives:** In this case, we predicted FALSE and our predicted output is correct.\
    \ More values are preferred here.\n    - **False positives:** In this, we predicted\
    \ TRUE, but the actual predicted output is FALSE.\n    - **False negatives:**\
    \ In this, the prediction is FALSE, while the actual predicted output is found\
    \ to be TRUE.\n\nThe accuracy of the model can also be determined using the confusion\
    \ matrix, as follows:\n\n$$Accuracy = \\frac{True\\ positives + True\\ negatives}{total\\\
    \ number\\ of\\ samples}$$\n\nIn the case of an imbalanced dataset, accuracy is\
    \ not the correct evaluation parameter for classification model. For this type\
    \ of situation, the precision or recall is used as a better evaluation parameter.\n\
    \n## Evaluation\n\nOn completion of the training, evaluation is done to determine\
    \ the goodness of the model. Thus, model evaluation helps find the following:\n\
    \n- The best model representing the data that has not yet been seen\n- How well\
    \ the chosen model will work in the future by tuning the hyperparameters of the\
    \ model\n- How to improve the accuracy\n- How to increase the number of true positives\
    \ and true negatives by observing the confusion matrix\n\nThus, model evaluation\
    \ forms an integral part of the model development process.\n\n## Hyperparameter\
    \ tuning\n\nOnce evaluation is performed, training needs to be improved to enhance\
    \ the accuracy or reduce the number of iterations required to reach the ideal\
    \ condition. One such approach is tuning the parameters that would have been implicitly\
    \ assumed while training. This would require testing those assumptions. Another\
    \ parameter under consideration is the “learning rate”. It indicates how far the\
    \ line shifts during each step, based on the information from the previous training\
    \ step and the initial conditions considered. This value provides information\
    \ about the accuracy of the model and the amount of time the training would take.\n\
    \n## Prediction\n\nPrediction, or inference, is the step that determines the correctness\
    \ of the output.\n\n## Metrics Used\n\nThough accuracy is one of the metrics for\

    # Swarm Intelligence


    Swarm Intelligence was introduced in 1989 and it uses the concepts of using knowledge
    of collective group to reach the optimized solution. The basic concept is that
    a group of objects (people, animals, insects and so on) are given the same problem
    to solve. They use all resources to find the best solution for the problem. So,
    instead of using a single object’s intelligence, the algorithms use the group’s
    intelligence to find optimal solution. One thing to keep in mind is that all objects
    behave individually and try to find the optimal or best solution. Swarm Intelligence
    has gained popularity as it proved beneficial for large domain of problems. These
    algorithms are also nature-inspired algorithms. There are numerous algorithms
    introduced, and some are still being discovered. Let’s look at a few popular algorithms
    that use Swarm Intelligence:


    +   - Particle Swarm optimization

    - Ant colony optimization

    - Cuckoo Search Optimization


    **Particle Swarm Optimization:** This is one of the most popular optimization
    techniques introduced in 1995. It is also a stochastic optimization technique
    that models the behavior of animals or insects to find the optimal solution. For
    example, birds look or hunt for food in flocks. Particle swarm optimization is
    a robust and efficient technique to solve various optimization problems.


    Here, individual particles are part of solution space and always convey their
    positions to the neighboring particles. The goal is to find the best position
    in the search space. Every particle’s position is adjusted based on velocity and
    difference between the current position, the optimal position found by particle
    itself and the best position found by neighbor. The iterations ensure that the
    focus of the swarm is more on the search space, which contains high-quality solutions.


    It is observed that Particle Swarm optimization performance is best for a wide
    variety of real-world optimization problems.


    The broad steps are as follows:


    +   1. Generate the initial swarm particles randomly.

    2. Repeat steps 3 to 5 till the termination criteria are met.

    3. For every particle, choose between the current position of the particle and
    the best position found out by the particle. Let this be $p_i$.

    4. Find the best position of the particle determined by the group of swarms, that
    is, neighboring particles. Let this be $p_g$.

    5. Update the velocity and position of the particles based on the values of $p_i$
    and $p_g$, as shown in the following equations:


    ```

    $v_i = v_i + c_1 * rand_1 * (p_i - x_i) + c_2 * rand_2 * (p_g - x_i)$

    ```'

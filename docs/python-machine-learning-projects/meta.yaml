    +   - **Top-down algorithm**\n  This method starts by bringing all datapoints\
    \ in one single cluster. Then, it splits the cluster iteratively into smaller\
    \ ones till each one of them contains only one sample.\n- **Bottom-up algorithm**\n\
    \  It is also known as hierarchical agglomerative clustering or HAC. In this,\

  md: '# Preface


    This book covers different aspects of machine learning, and the importance of
    developing machine learning algorithms that can be applied to real-life projects.
    The book elaborates on the need and different types of machine learning algorithms.
    It shows how the right amount of data, and the correct amount of training can
    help build optimized systems. These optimized systems can help reduce the cost
    as well as training errors. This book further provides a number of questions to
    be solved that gives a practical approach. It further gives importance for understanding
    the python code, its basic concepts as well as the implementation code for machine
    learning projects.


    This book is divided into five chapters. The book elaborates on the need for machine
    learning, its challenges and limitations. It further explores the development
    of machine learning algorithms through use of Python code. The working of the
    machine learning algorithms is emphasized through real-life case studies. The
    best algorithm that can be applied to a case study is elaborated through the various
    optimization and meta-heuristic approaches. The details of the chapters are specified
    below.


    **Chapter 1: Introduction to ML –** introduces the terms artificial intelligence,
    data science and machine learning and the differences between them. The various
    models, the types of machine learning algorithms, and the challenges and limitations
    faced are further explored. The chapter will further dwell on the working and
    the application areas of machine learning.


    **Chapter 2: Python Basics for ML –** will cover the concepts behind the Python
    programming language. The syntax and the need for python programming is further
    emphasized. It will elaborate on python tools and libraries. It further handles
    the concepts of file and exception handling, which form the crux of the machine
    learning domain.


    **Chapter 3: An Overview of ML Algorithms –** will introduce the various Machine
    learning algorithms. The major focus is to provide familiarity with the machine
    learning programs that can learn from the data provided and improve from experience,
    without any human intervention. These learning'
  merge: -1
  pgno: 8
- img_proc: true
  md: 'tasks may include learning the function that maps the input to the outputs
    or learning through the hidden structure in unlabeled data using algorithms coined
    under supervised and unsupervised learning. To further understand the core concepts,
    this chapter will explore the working process of any given machine learning algorithm
    through a number of examples. As Python forms a handy tool to get started with
    supervised and unsupervised learning, this chapter will explore its various functionalities.
    The chapter will further elaborate on the performance measures to be considered
    for evaluating the machine learning system that would have been developed.


    # Chapter 4: Case Studies and Projects in Machine Learning


    will provide an insight into the various case studies that use the concepts and
    algorithms of machine learning. This chapter will further introduce recommendation
    systems, its needs, the process of generating the recommendation systems as well
    as the current systems incorporating recommendation systems. Another case study
    will be focused on the application of machine learning algorithms on text mining
    applications, opinion mining and sentiment analysis. This chapter will further
    elaborate on applying various machine learning algorithms to image processing
    applications. More case studies incorporating predictive analysis, Social Media
    Analytics, Customer churning analytics, and Analytics in Education Systems will
    be explored in detail.


    # Chapter 5: Optimization in ML Algorithm


    will focus on the improvements in training the algorithms for the most accurate
    outputs. The chapter will thus focus on determining the best element or path,
    or techniques to improve the efficiency of algorithms by decreasing the training
    time as well as the cost incurred for the same. The concept of optimization and
    the hybrid algorithms that can be utilized will then be explained. The need for
    optimization techniques in Machine Learning based projects will then be highlighted.
    This will lead to applying techniques for optimization. The basic optimization
    techniques will then be explored, and the current research area on meta-heuristic
    approach will be further elaborated. To conclude the chapter, the various python
    libraries that could be available for optimization in Machine Learning projects
    will be explained.'
  merge: -1
  pgno: 9

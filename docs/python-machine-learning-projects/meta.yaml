    # 2. Explain the various models used in machine learning.


    Ans. Let us talk about the various models in machine learning.


    **Linear regression:** It is used to estimate real values (houses cost, number
    of calls, total sales and so on) based on continuous variable(s). Here, we establish
    a relationship between independent and dependent variables by fitting a best line.
    This best fit line is known as regression line and represented by a linear equation
    Y= a *X + b.


    The best way to understand linear regression is to relive this childhood experience.
    Let us say, you ask a child in fifth grade to list the people in their class by
    increasing order of weight, without asking them their weights! What do you think
    the child will do? They would likely look (visually analyze) at their classmates’
    height and build and arrange them using a combination of these visible parameters.
    This is linear regression in real life! The child has actually figured out that
    height and build would be correlated to the weight by a relationship, which looks
    like the equation.


    In this equation:


    +   - Y: Dependent variable

    - A: Slope

    - X: Independent variable

    - B: Intercept


    These coefficients A and B are derived based on minimizing the sum of squared
    difference of distance between data points and regression line.


    Look at the following example. Here, we have identified the best fit line having
    linear equation y=0.2811x+13.9. Using this equation, we can find the weight, knowing
    the height of a person. Refer [Figure 1.3](Figure 1.3):'
- md: '## 1.3 线性回归


    线性回归主要分为两种类型：简单线性回归和多元线性回归。简单线性回归的特点是只有一个自变量，而多元线性回归（顾名思义）的特点是有多个（多于1个）自变量。在寻找最佳拟合线时，你可以拟合多项式或曲线回归，这些被称为多项式或曲线回归。


    ## 1.4 逻辑回归


    **逻辑回归：** 不要被它的名字搞混！它是一种分类算法，而不是回归算法。它用于根据给定的一组自变量来估计离散值（二元值，如0/1、是/否、真/假）。简单来说，它通过将数据拟合到一个logit函数来预测事件发生的概率。因此，它也被称为logit回归。由于它预测的是概率，其输出值介于0和1之间（正如预期的那样）。


    让我们通过一个简单的例子来理解这一点。


    假设你的朋友给你一个谜题来解决。只有两种结果场景：要么你解决了它，要么你没有。现在，想象一下，你被给予各种各样的谜题/测验，以了解你擅长哪些科目。这项研究的结果会是这样的：如果给你一个基于三角学的十年级问题，你有70%的可能性解决它。另一方面，如果是一个五年级的历史问题，得到答案的概率只有30%。这就是逻辑回归提供给你的。


    从数学上讲，结果的对数几率被建模为预测变量的线性组合：


    odds = p / (1-p) = 事件发生的概率 / 事件不发生的概率


    ln(odds) = ln(p/(1-p))


    logit(p) = ln(p/(1-p)) = b0 + b1X1 + b2X2 + b3X3.... + bkXk


    这里，p是感兴趣特征存在的概率。它选择的参数是最大化观察样本值的似然性，而不是最小化平方误差之和（如普通回归中那样）。


    你可能会问，为什么要取对数？为了简单起见，我们可以说这是复制阶跃函数的最佳数学方法之一。请参考下图（图1.4）。


    **图1.4：** *感兴趣特征存在的概率*


    ## 1.5 决策树


    **决策树：** 这是我最喜欢的算法之一，并且使用非常频繁。它是一种监督学习算法，主要用于分类问题。令人惊讶的是，它对分类和连续因变量都有效。在这个算法中，我们根据最重要的属性/自变量将总体分成两个或更多同质集合，以形成尽可能不同的组。请参考下图（图1.5）。


    **图1.5：** *因变量*

    **来源：** *statsexchange*


    在前面的图像中，你可以看到总体根据多个属性被分为四个不同的组，以识别“他们是否会玩”。为了将总体分成不同的异质组，它使用了诸如基尼系数、信息增益、卡方和熵等技术。


    理解决策树如何工作的最佳方式是玩Jezzball，这是微软的一款经典游戏，如下图所示。本质上，你有一个有移动墙壁的房间，你需要创建墙壁，以便在没有球的情况下清理出最大面积。请参考图1.6。


    **图1.6：Jezzball**


    所以，每次你用一堵墙分割房间时，你都试图在同一个房间里创造两个不同的总体。决策树的工作方式类似，通过将总体分成组。


    ## 1.6 kNN（k-近邻算法）


    **kNN（k-近邻算法）：** 它可以用于分类和回归问题。然而，在工业界，它更广泛地用于分类问题。K-近邻是一个简单的算法，它存储所有可用的案例，并通过其k个邻居的多数投票来分类新案例。被分配给某个类别的案例是其K个近邻中最常见的，通过距离函数来衡量。


    这些距离函数可以是欧几里得距离、曼哈顿距离、闵可夫斯基距离和汉明距离。前三个函数用于连续函数，第四个（汉明距离）用于分类变量。如果K=1，则该案例被简单地分配给其最近邻的类别。有时，在执行kNN建模时，选择K会成为一个挑战。


    kNN可以很容易地映射到我们的现实生活中。如果你想了解一个你没有任何信息的人，你可能会想了解他们的亲密朋友和他们所在的圈子，并获取关于他们的信息。


    在选择kNN之前，需要考虑以下事项：


    -   kNN计算成本高

    -   变量应该被归一化，否则高范围变量可能会产生偏差

    -   在进行kNN之前，需要进行更多的预处理工作，例如去除异常值或噪声


    ## 1.7 K-Means（K-均值聚类）


    **K-Means：** 它是一种无监督算法，用于解决聚类问题。其过程遵循一种简单易懂的方法，通过一定数量的聚类（假设k个聚类）来对给定的数据集进行分类。聚类内的数据点是同质的，而与其他组的数据点是异质的。


    还记得从墨迹中辨认形状吗？如图1.7所示，K均值算法与这个活动有些相似。你观察形状和分布，以解读存在多少个不同的聚类/总体。


    **图1.7：** *存在的聚类/总体*


    以下是K-means形成聚类的方式：


    1.  K-means为每个聚类选择k个点，称为质心。

    2.  每个数据点与最近的质心形成一个聚类，即k个聚类。

    3.  它根据现有的聚类成员找到每个聚类的质心。这里，我们有了新的质心。

    4.  由于我们有了新的质心，重复步骤2和3。找到每个数据点到新质心的最近距离，并将其与新的k个聚类关联起来。重复此过程直到收敛，即质心不再变化。


    让我们看看如何确定K的值。


    在K-means中，我们有聚类，每个聚类都有自己的质心。聚类内质心与数据点之间差值的平方和构成了该聚类的组内平方和值。此外，当所有聚类的平方和值相加时，它等于该聚类解决方案的总组内平方和值。


    我们知道，随着聚类数量的增加，这个值会不断减小。然而，如果你绘制结果，你可能会看到平方距离之和在某个k值之前急剧下降，之后下降得更慢。在这里，我们可以找到最优的聚类数量。请参考下图（图1.8）。


    **图1.8：** 最优聚类数量


    ## 1.8 降维算法


    **降维算法：** 在过去的4-5年里，各个阶段的数据捕获呈指数级增长。企业/政府机构/研究组织不仅在识别新的数据源，还在非常详细地捕获数据。


    例如，电子商务公司正在捕获更多关于客户的细节，如他们的人口统计信息、网络爬取历史、他们喜欢或不喜欢什么、他们的购买历史、反馈等等，以便为他们提供个性化的关注。


    作为一名数据科学家，我们获得的数据包含许多特征；这对于构建良好的稳健模型来说听起来不错，但也存在一个挑战。你如何从1000或2000个变量中识别出高度显著的变量？在这种情况下，降维算法会有所帮助，此外还有决策树、随机森林、PCA、因子分析、基于相关矩阵的识别、缺失值比率等算法。


    ## 1.9 XGBoost


    **XGBoost：** 这是另一种经典的梯度提升算法，它被认为是某些Kaggle竞赛中决定胜负的关键选择。


    XGBoost具有极高的预测能力，这使其成为追求准确性的最佳选择，因为它同时拥有线性模型和树学习算法，使其比现有的梯度提升技术快近10倍。


    它支持各种目标函数，如回归、分类和排序。


    关于XGBoost最有趣的一点是，它也被称为正则化提升技术。它有助于减少过拟合建模，并对多种语言有广泛的支持，如Scala、Java、R、Python、Julia和C++。


    它支持在许多机器上进行分布式和广泛的训练，这些机器包括GCE、AWS、Azure和Yarn集群。XGBoost还可以与Spark、Flink和其他云数据流系统集成，并在提升过程的每次迭代中内置交叉验证。


    ## 3. 阐述在实施机器学习算法时面临的挑战。


    **答：数据不可用：** 尽管数据丰富，但在医疗保健和农业等各个领域仍然存在数据短缺。


    **复杂数据：** 随着更好的互联网连接和社交媒体，我们每秒都在生成数据，但这些数据对机器学习没有用处。存在大量的数据操纵、提取和'

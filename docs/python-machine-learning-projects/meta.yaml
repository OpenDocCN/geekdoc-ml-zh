    \n## Index\n\n# CHAPTER 1\nIntroduction to ML\n\n## Introduction\n\nThe term *machine\
    \ learning* was coined by *Arthur Samuel* in 1959. The basic idea behind the coined\
    \ term was “Can machines do what we as humans can do?” rather than asking “Can\
    \ machines think?” These questions led to the development of machine learning\
    \ where, just like human beings, machines tend to learn from experience. The aim\
    \ is to improve the performance with experience. This chapter introduces the related\
    \ terms, such as data science, data mining, artificial intelligence, machine learning\
    \ and deep learning. The major focus is to familiarize you with the methods and\
    \ techniques used in machine learning. To understand the core concepts, this chapter\
    \ explores the working process of any given machine learning algorithm. In the\
    \ recent years, machine learning technology has improved drastically, which is\
    \ elaborated through the various applications, limitations and the challenges\
    \ faced while developing the machine learning algorithms.\n\n## Structure\n\n\
    In this chapter, we will discuss the following topics:\n\n- Introduction to Machine\
    \ Learning\n- Models of Machine Learning\n  - Supervised machine learning model\
    \ through training\n  - Unsupervised machine learning model\n  - Semi-structured\
    \ machine learning model\n  - Reinforcement machine learning model\n- Working\
    \ of Machine Learning algorithm\n- Challenges for Machine Learning Projects\n\
    - Limitations of Machine Learning\n- Application areas of Machine Learning\n-\
    \ Difference between the terms data science, data mining, machine learning and\
    \ deep learning\n\n## Objectives\n\nOn completion of this chapter, you will be\
    \ able to understand the various key terms and the fundamentals of machine learning.\
    \ Additionally, you will be able to understand the types, the models and the mechanism\
    \ of machine learning. You will become familiar with the challenges and limitations\
    \ observed while applying machine learning algorithms. These will be elaborated\
    \ through a number of application areas along with the differences between the\
    \ various related technologies employed.\n\n## Introduction to Machine Learning\
    \ (ML)\n\nMachine learning is defined as the ability of a computer system to learn\
    \ from the environment where the data is provided through enabling algorithms.\
    \ These algorithms gather insights and take data-driven decisions with minimal\
    \ human intervention. This enables us to make predictions on previously unanalyzed\
    \ data. So instead of writing code, one just needs to feed the data to the generic\
    \ algorithm, and the algorithm/machine builds the logic based on the given data.\
    \ This helps improve the output from its experience without the need for any explicit\
    \ programming. Thus, it can be said that machine learning is a term closely associated\
    \ with data science, and it involves observing and studying data or experiences\
    \ to identify patterns and set up a reasoning system based on the findings. Another\
    \ way of describing machine learning is to say that it is a science of building\
    \ hardware or software that can achieve tasks by learning from examples.\n\nThe\
    \ examples come as {input, output} pairs. When new inputs are given, a trained\
    \ machine can predict the output. For example, recommendations for online products\
    \ purchased or suggestions for the persons who bought the product is machine learning.\
    \ The terms used in machine learning include a target that is called a **label**,\
    \ a variable used in statistics that is called a **feature**, and transformation\
    \ in statistics that is called **feature creation**.\n\n## Models in Machine Learning\n\
    \nMachine learning models can be categorized into three basic models: supervised,\
    \ unsupervised and reinforcement learning.\n\n## Supervised machine learning model\
    \ through training\n\nSupervised learning is said to be a learning obtained by\
    \ training a machine or a model. On getting trained, predictions can be made for\
    \ new data, also known as test data.\nThis model works on the data provided to\
    \ the system. The data available is divided into **training** and **testing**\
    \ data. A supervised learning model analyses the given training data and draws\
    \ inferences from it. Therefore, mapping between the input and output pair and\
    \ proper labeling of data is crucial in supervised machine learning models.\n\
    The major aim of a supervised model is to utilize historical data, understand\
    \ its behavior and determine future forecasts based on the historical data available\
    \ and maintained in the database.\nFor example, to differentiate between plants\
    \ and flowers, a few labeled pictures of both categories need to be fed. This\
    \ will enable the machine learning algorithm to differentiate between, identify\
    \ and learn about them based on their characteristics. Once the algorithm is trained,\
    \ classifying the remaining images would become a lot easier for the algorithm.\n\
    \n## Unsupervised machine learning model: Self-sufficient learning\n\nSuch a model\
    \ does not use any classified or labelled parameters. It learns through observation\
    \ and finds structures in the data. It focuses on discovering hidden structures,\
    \ patterns and relationships from unlabeled data, which enhances the functionality\
    \ of the system by creating a number of clusters for further analysis.\nThe unsupervised\
    \ system or its algorithms are not given the “right answer.” The algorithm is\
    \ expected to determine, interpret, and review its data and conclude from what\
    \ is being shown to them through the iterative deep learning approach. Unsupervised\
    \ learning can use both generative learning models and a retrieval-based approach."

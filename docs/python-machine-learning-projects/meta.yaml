- md: "## Pandas\n\nThis is the most useful library for data preprocessing and preparing\
    \ the data for the machine learning algorithm. The data from various files like\
    \ CSV, Excel, and such can be easily read using Pandas. The data is available\
    \ in a spreadsheet-like manner, which makes processing easily. There are three\
    \ basic data structures at the core of Pandas library:\n\n- **Series**: One-dimensional\
    \ array-like object containing data and label (or index)\n- **Dataframe**: Spreadsheet-like\
    \ data structure containing an order collection of columns that has both a row\
    \ and column index\n- **Panel**: Collection of dataframes but rarely used data\
    \ structure\n\n## Populating the Dataframe\n\nA dataframe can be populated by\
    \ reading the data from the file. There are various functions to read data from\
    \ different files. We will look at the two most popular functions to read data\
    \ from CSV and Excel file.\n\n**Example 6:**\n\n```python\n>>>import pandas as\
    \ pd\n>>>df=pd.read_csv(\"d://myfolder//myfile.csv\",headers=None,\nnames=['Names',\
    \ 'birthdates'])\n```\n\nIn the previous example, the data is read from the CSV\
    \ file stored on the disk. Generally, CSV files do not have headers, that is,\
    \ the data starts from the first line in the file. So, no headers use the **headers=None**\
    \ attribute. The **names** attribute is used to specify the headings of the columns\
    \ of data. The following figure shows the snapshot of the output from a **DataFrame**\
    \ object when viewed in Jupyter notebook.\n\n| | Names | birthdates |\n|---|---|---|\n\
    | 0 | Bob | 1968 |\n| 1 | Jessica | 1955 |\n| 2 | Mary | 1977 |\n| 3 | John |\
    \ 1978 |\n| 4 | Mel | 1973 |\n| 5 | Max | 2001 |\n\n*Figure 3.12: Output from\
    \ a DataFrame object in Jupyter Notebook*\n\nOn the same line, to read the data\
    \ from the Excel file, use the **read_excel()** function.\n\n**Example 7:**\n\n\
    ```python\n>>>import pandas as pd\n>>>df=pd.read_excel(\"d://myfolder//myfile.xlsx\"\
    )\n```\n\nHere, the file contains the headers for the various columns in the Excel\
    \ on the first line, so there is no need to specify the name of the columns while\
    \ reading the file.\n\n## Displaying the Data Using Dataframe\n\nOnce the data\
    \ is available in dataframe, it can be viewed using various functions of the **dataframe**\
    \ object. The following table show the summary of these functions:\n\n| Function\
    \ | Usage |\n|---|---|\n| df.head() | Shows the top 5 rows of the data in Dataframe\
    \ |\n| df.tail() | Shows the bottom 5 rows of the data in Dataframe |\n| df.sample(5)\
    \ | Shows randomly chosen 5 rows of the data in Dataframe |\n| print(df) | Will\
    \ print entire data from the Dataframe; not advisable as the data is mostly too\
    \ large to be displayed |\n| df['column name'] | Displays data from that specific\
    \ column only |\n| df[['column name 1', 'column name 2']] | Displays data from\
    \ the specified two columns |\n\n*Table 3.5: Summary of Display functions of Dataframe*\n\
    \n**Note: Observe the syntax of multiple column display.**\n\n## Accessing the\
    \ Data Selectively in Dataframe\n\nThe data in the dataframe can be accessed primarily\
    \ using two functions: **loc** and **iloc**.\n\n**Example 8:**\n\n```python\n\
    >>>df.loc[10, 'Name']\nDimple\n\n>>>df.loc[0:3, 'Name']\n0       Bob\n1    Jessica\n\
    2       Mary\n3       John\nName: Names, dtype: object\n```\n\nHere, the data\
    \ in the 'Name' column with index value 10 is displayed. The second command displays\
    \ the values from the 'Name' column from the rows with index starting from 0 and\
    \ ending with 3.\n\n**Example 9:**\n\n```python\n>>>df.iloc[10,1]\nDimple\n>>>df.iloc[0:3,1]\n\
    0    1968\n1    1955\n2    1977\nName: birthdates, dtype: int64\n```\n\nHere,\
    \ using the **iloc** method, we can provide the column names as integer values.\
    \ The column indices always start with 0 in Python. In both functions, we can\
    \ use ':' to provide start and end values for the row index and the column index.\
    \ In short, the syntax for both is as follows:\n\n`df.loc[row_index, column_index]`\
    \ where one can specify row_index or column_index as start:end:step\n\nFor example,\
    \ one can write the following to display the data in odd columns, where the number\
    \ of columns is 10 and the number of rows is 10:\n\n`df.iloc[0:9,0:9:2]`\n\nThe\
    \ same thing with loc function can be achieved by specifying the start and end\
    \ column names.\n\n## Basic Descriptive Statistics using Pandas\n\nPandas has\
    \ many inbuilt functions that help understand the data by running the basic statistical\
    \ functions. These functions and their descriptions are given in the following\
    \ table:\n\n| df.method() | Description |\n|---|---|\n| describe | Basic statistics\
    \ (count, mean, std, min, quantiles, max) |\n| min, max | Minimum and maximum\
    \ values |\n| mean, median, mode | Arithmetic average, median and mode |\n| var,\
    \ std | Variance and standard deviation |\n| sem | Standard error of mean |\n\
    | skew | Sample skewness |\n| kurt | Kurtosis |\n\n*Table 3.6: Basic descriptive\
    \ statistics*\n\nThe following example illustrates the use of one of the statistical\
    \ functions:\n\n**Example 9:**\n\n```python\n>>>df.describe()\n      Gender\n\
    count  8.000000\nmean   0.375000\nstd    0.517549\nmin    0.000000\n25%    0.000000\n\
    50%    0.000000\n75%    1.000000\nmax    1.000000\n```\n\nThe dataframe has only\
    \ one column named ‘Gender’ and few rows of data. So, the **describe()** function\
    \ will display the statistical information about the numeric columns indicating\
    \ the minimum and maximum values in the column.\n\n## Data transformation\n\n\
    The real-time data available is in various forms or is a combination of numeric\
    \ and textual data. This data need transformation before a machine learning algorithm\
    \ is applied. One way of transforming data is using Pandas **Apply** or **Map**\
    \ function.\n\n**Example 10:**\n\n```python\n>>>mapping = {'male':0,'female':1}\n\
    >>>df['Gender']=df['Sex'].apply(lambda x:mapping[x])\n```\n\nHere, mapping is\
    \ a dictionary type of variable with two key-value pairs. The **apply** function\
    \ uses this dictionary to convert the categorical values (male/female) into numerical\
    \ values(0 or 1) from the ‘Sex’ column. Here, the mapping is applied on each row\
    \ of dataframe. The generalized syntax of **map** and **apply** functions are\
    \ as follows:\n\n```python\ndf['col'].apply(func,axis=0/1)\ndf['col'].map(func/series)\n\
    ```\n\nThe **col** indicates the column on which the transformation is to be applied.\
    \ The difference between the two functions is that **apply** can be used on object\
    \ types series and dataframe both, and the **map** function can be used with only\
    \ series object type.\n\n## Data Preprocessing – Handling missing values\n\nPandas\
    \ provide various functions to handle the missing values in the data. To apply\
    \ machine learning function, these values require preprocessing. The following\
    \ table shows various methods to handle missing values.\n\n| Function | Description\
    \ |\n|---|---|\n| dropna() | Drops missing observations |\n| dropna(how='all')\
    \ | Drops observations where all cells is NA |\n| dropna(axis=1, how='all') |\
    \ Drops column if all the values are missing |\n| dropna(thresh = 5) | Drops rows\
    \ that contain less than 5 non-missing values |\n| fillna(0) | Replaces missing\
    \ values with zeros |\n| isnull() | Returns True if the value is missing |\n|\
    \ notnull() | Returns True for non-missing values |\n\n*Table 3.7: Handling Missing\
    \ Values*\n\n## MatplotLib\n\n**MatplotLib** is an important library of Python\
    \ that helps in data visualization. Understanding the data is very important for\
    \ a data scientist before devising any machine learning-based model. This library\
    \ helps in understanding data in a visual way. Data can be visualized using various\
    \ graphical methods, like line graph, bar graph and pie chart."
  mdcn: "## Pandas\n\n这是数据预处理和为机器学习算法准备数据时最有用的库。使用 Pandas 可以轻松读取来自 CSV、Excel 等各种文件的数据。数据以类似电子表格的方式呈现，便于处理。Pandas\

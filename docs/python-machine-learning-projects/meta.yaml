    **Figure 3.24:** *Hyperplane with largest distance between each tag*


    However, as data sets become more complex, it may not be possible to draw a single
    line to classify the data into two camps:


    ![](img/05e0d1e671c636fe8ee73a026cd179da_126_0.png)


    **Figure 3.25:** *More complex dataset*


    Using SVM, the more complex the data, the more accurate the predictor will become.
    Imagine the previous figure in three dimensions, with a Z-axis added, so it becomes
    a circle.

    Mapped back to two dimensions with the best hyperplane, it looks as shown in the

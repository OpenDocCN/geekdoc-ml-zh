  - "[PAGE 221]\n\n# CHAPTER 5\n\n# Optimization in ML Algorithm\n\n# Introduction\n\
    \nMachine learning projects are incomplete without the improvements, specifically\
    \ when it comes to training of algorithms. Researchers have tried hard to reduce\
    \ the cost involved in training of algorithms. This is where optimization comes\
    \ into the picture. In Chapter 4, “Case studies and Projects in Machine Learning”,\
    \ we have seen projects in the various domains. There is a scope for improvement\
    \ in these projects using various hybrid algorithms and optimization techniques.\
    \ Optimization is important when money and time are concerned. The goal of optimization\
    \ is to find the best element, path or techniques to improve the efficiency of\
    \ algorithms by decreasing the training time. This chapter introduces the concept\
    \ of optimization and explains its importance in Machine Learning-based projects.\
    \ The chapter starts with basic optimization techniques and goes on to discuss\
    \ metaheuristic approaches. The chapter also throws light on Python libraries\
    \ available for optimization.\n\n# Structure\n\n+   - Optimization: Need of ML\
    \ Projects\n  - Types of optimization techniques\n- Basic Optimization techniques\n\
    - Meta-heuristic Approaches to Optimization\n  - Types of Metaheuristic algorithms\n\
    - Improvisation of ML algorithms by optimizing the learning parameters\n  - Case\
    \ study 1: Metaheuristic Optimization Techniques in Healthcare\n  - Case Study\
    \ 2: Genetic Algorithm (GA) in Batch Production\n- Optimization using Python\n\
    \n# Objectives\n\nIn this chapter, you will understand the importance of optimization\
    \ and learn the basic optimization techniques. You will be introduced to various\
    \ categories of optimization"
- md: "## Optimization – Need of ML projects\n\nOptimization is the selection of the\
    \ best element using some criterion from a set of available alternatives. The\
    \ goal of optimization is to provide near perfect, effective and all possible\
    \ alternatives. Maximizing or minimizing some function related to application\
    \ or features of the application is the process of optimization. For example,\
    \ minimizing the cost function or the mean square error is the goal of optimization\
    \ in typical ML algorithms.\n\nOptimization is important when money and time are\
    \ concerned. Machine learning often uses optimization algorithms to enhance algorithms’\
    \ learning performance. Reducing the cost function is the main aim of any optimization\
    \ technique in machine learning. Optimization can include optimization of weights,\
    \ activation nodes, network architecture and learning parameters. Training optimization\
    \ improves the generalization ability of any model. In complex models, tuning\
    \ of hyperparameters or finding the most suitable values for hyperparameters is\
    \ the goal of optimization in Machine Learning.\n\n## Types of optimization techniques\n\
    \nBroadly optimization techniques can be divided into two approaches:\n\n### Conventional\
    \ Approach\n\nConventional optimization approaches like gradient descent and back\
    \ propagation are very popular and widely used. They can be categorized as first-order\
    \ or second-order optimization techniques. The major advantage of using the conventional\
    \ approaches is that they are very easy to use and implement. These are the direct\
    \ methods that do not use any derivative information of the objective function.\
    \ Here, only objective function values are used to guide the process.\n\nA variation\
    \ in these techniques is also used to improve the performance of machine learning\
    \ algorithms like momentum-based gradient descent and Stochastic gradient descent\
    \ depending on the application where these machine learning algorithms are used.\n\
    \n### Metaheuristic Approach\n\nA metaheuristic algorithm is evolved to find or\
    \ generate a good solution to an optimization problem. Metaheuristics works when\
    \ one has limited computation capacity and incomplete information available. The\
    \ strength of metaheuristic algorithms lies in two techniques: exploitation and\
    \ exploration. Exploitation is nothing but searching unknown and new areas in\
    \ the search space where the current good solution is found. Exploration is nothing\
    \ but taking advantage of the solutions that are already discovered. A metaheuristic\
    \ is a procedure that amalgamates these two techniques to find a good solution.\n\
    \nThe overall performance of the metaheuristic algorithms depends on the optimum\
    \ use of these two techniques. The efficiency also depends on how finely these\
    \ two techniques are balanced. Metaheuristic algorithms work on local and global\
    \ levels to find a solution. Thus, imbalanced exploration and exploitation will\
    \ cause a problem. Less exploration and more exploitation will cause trouble in\
    \ finding the local and global optimum. Also, more exploration and less exploitation\
    \ will create problems in convergence. Thus, the system will slow down, hampering\
    \ its overall performance of the system. The epitome of the metaheuristic algorithms\
    \ is how this balance between the two techniques is achieved.\n\nThere are wide\
    \ varieties of metaheuristic algorithms available, so clear differentiation between\
    \ them may not be possible. On a broad scale, these algorithms can be divided\
    \ into two groups:\n\n- **Single solution-based algorithms**\n  Single solution-based\
    \ algorithms concentrate on improving a single solution. Simulated Annealing and\
    \ Tabu search are examples of single solution-based algorithms. These algorithms\
    \ concentrate on local search by exploiting the local search space.\n- **Population-based\
    \ algorithms**\n  As the name suggests, population-based algorithms work on multiple\
    \ solutions and focus on finding the best among them using heuristics. These algorithms\
    \ are strong in global search.\n  These algorithms can be further divided into\
    \ the following:\n  - **Evolutionary algorithms:** Genetic algorithms are the\
    \ most popular evolutionary algorithms. Other than this, Genetic Programming,\
    \ Evolutionary Programming, and Differential Evolution are some of the popular\
    \ evolutionary algorithms. Evolutionary algorithms use an evolutionary framework\
    \ and genetic operators to generate new solutions. Genetic operators are mutation,\
    \ crossover, selection and so on. These operators are used repeatedly to evolve\
    \ new and optimal solutions.\n    These algorithms can be applied to different\
    \ nonlinear problems. The stopping criteria in evolutionary algorithms are indicated\
    \ by the fitness function, which, in turn, determines the quality of the solution.\
    \ Defining a proper fitness function is the key to evolutionary algorithms.\n\
    \  - **Swarm Intelligence:** Particle Swarm Optimization, Artificial bee Colony\
    \ algorithms, Grey wolf optimization, and bird flocking are some of the widely\
    \ used examples of swarm intelligence algorithms. These algorithms are inspired\
    \ by the behavior of various decentralized but self-organized systems. In short,\
    \ these are nature inspired algorithms. For example, in Particle Swarm Optimization,\
    \ the behavior of a flock of birds for getting their food is observed. The heuristics\
    \ are generated by observing this behavior.\n    In these algorithms, the food\
    \ indicates the problem solution and the methods these birds use to get food are\
    \ mimicked in real time to create a global search. In ant colony optimization,\
    \ the behavior of the ants to search food is observed. Ants in their natural habitat\
    \ use the shortest path to get to a sample of food. They establish good communication\
    \ between them to find these shortest paths and traverse routes in a disrupted\
    \ manner. This behavior is mimicked in Ant colony optimization algorithms. There\
    \ are many algorithms that are inspired by the nature and behavior of various\
    \ animals and birds.\n  - **Hybrid algorithms**\n    Conventional algorithms are\
    \ good at local search and metaheuristic algorithms are good at global search.\
    \ Hybrid algorithms make the most of both these strengths by combining conventional\
    \ algorithms with metaheuristic algorithms.\n\nThe following Figure 5.1 shows\
    \ the brief classification of the optimization algorithms for easy understanding:\n\
    \n![Taxonomy of Optimization](img/05e0d1e671c636fe8ee73a026cd179da_225_0.png)\n\
    \n*Figure 5.1: Taxonomy of Optimization*\n\nFor example, Genetic Algorithms with\
    \ Back Propagation are used to train Artificial Neural Networks giving a better\
    \ approach to learning. Hybrid algorithms are good at search and converge fast.\
    \ These algorithms are also called memetic algorithms. Under hybrid models, two\
    \ different metaheuristic algorithms are also used to get an optimized solution.\n\
    \nThe diagrammatic representation of taxonomy of optimization is shown in Figure\
    \ 5.1.\n\n## Basic Optimization Techniques\n\nAs discussed in an earlier section,\
    \ there are two basic optimization techniques: backpropagation and gradient descent.\n\
    \n### Backpropagation optimization\n\nThe backpropagation algorithm is used in\
    \ a feedforward neural network with supervised training. The input from the input\
    \ layer is passed through the activation functions present in the hidden layer.\
    \ While passing through, the input is assigned weights. Now the output from the\
    \ hidden layer becomes the input for the next layer, and so on. The final output\
    \ is obtained through the output layer. This resultant output and the initial\
    \ input are compared, and the error is calculated. This error is used to fine-tune\
    \ the weights at that layer. This process is followed recursively from the output\
    \ layer to the input layer. Thus, the weights are modified and adjusted; this\
    \ process is followed till minimum error is achieved and the final output is computed."
  mdcn: "## 优化——机器学习项目的必需\n\n优化是从一组可用备选方案中，根据某些准则选择最佳元素的过程。优化的目标是提供近乎完美、有效且尽可能多的备选方案。最大化或最小化与应用或其特性相关的某个函数，就是优化的过程。例如，在典型的机器学习算法中，优化的目标就是最小化代价函数或均方误差。\n\
    \n当涉及金钱和时间时，优化就显得尤为重要。机器学习经常使用优化算法来提升算法的学习性能。降低代价函数是机器学习中任何优化技术的主要目标。优化可以包括权重、激活节点、网络架构和学习参数的优化。训练优化能够提升任何模型的泛化能力。在复杂模型中，调整超参数或为超参数找到最合适的值，就是机器学习中优化的目标。\n\
    \n## 优化技术的类型\n\n广义上，优化技术可分为两种方法：\n\n### 传统方法\n\n传统的优化方法，如梯度下降和反向传播，非常流行且被广泛使用。它们可以归类为一阶或二阶优化技术。使用传统方法的主要优势在于它们易于使用和实现。这些是直接方法，不使用目标函数的任何导数信息。这里，仅使用目标函数值来指导过程。\n\
    \n这些技术的变体也被用于提升机器学习算法的性能，例如基于动量的梯度下降和随机梯度下降，具体取决于这些机器学习算法的应用场景。\n\n### 元启发式方法\n\
    \n元启发式算法是为寻找或生成优化问题的良好解决方案而发展起来的。当计算能力有限且信息不完整时，元启发式方法就能发挥作用。元启发式算法的优势在于两种技术：**利用**和**探索**。**利用**就是在搜索空间中，针对当前找到的良好解决方案，搜索未知的新区域。**探索**则是利用已经发现的解决方案。元启发式是一种将这两种技术结合起来以找到良好解决方案的程序。\n\
    \n元启发式算法的整体性能取决于对这两种技术的最优利用。其效率也取决于这两种技术的平衡程度。元启发式算法在局部和全局层面工作以寻找解决方案。因此，不平衡的探索和利用会导致问题。探索不足而利用过多，会在寻找局部和全局最优解时遇到困难。同样，探索过多而利用不足，则会在收敛方面产生问题。因此，系统会变慢，妨碍其整体性能。元启发式算法的精髓就在于如何实现这两种技术之间的平衡。\n\
    \n现有的元启发式算法种类繁多，因此可能无法对它们进行清晰的区分。从广义上讲，这些算法可分为两组：\n\n- **基于单解的算法**\n  基于单解的算法专注于改进单个解决方案。模拟退火和禁忌搜索是基于单解的算法的例子。这些算法通过利用局部搜索空间，专注于局部搜索。\n\
    - **基于种群的算法**\n  顾名思义，基于种群的算法处理多个解决方案，并专注于使用启发式方法从中找到最佳方案。这些算法在全局搜索方面表现强劲。\n \
    \ 这些算法可进一步分为以下几类：\n  - **进化算法：** 遗传算法是最流行的进化算法。除此之外，遗传编程、进化规划和差分进化也是一些流行的进化算法。进化算法使用进化框架和遗传算子来生成新的解决方案。遗传算子包括变异、交叉、选择等。这些算子被反复使用，以进化出新的和最优的解决方案。\n\
    \    这些算法可以应用于不同的非线性问题。进化算法中的停止标准由适应度函数指示，而适应度函数又决定了解决方案的质量。定义一个合适的适应度函数是进化算法的关键。\n\
    \  - **群体智能：** 粒子群优化、人工蜂群算法、灰狼优化和鸟群聚集是一些广泛使用的群体智能算法的例子。这些算法受到各种去中心化但自组织系统行为的启发。简而言之，这些是受自然启发的算法。例如，在粒子群优化中，观察了一群鸟获取食物的行为。通过观察这种行为来生成启发式规则。\n\
    \    在这些算法中，食物代表问题的解决方案，而这些鸟类获取食物的方法被实时模拟，以创建全局搜索。在蚁群优化中，观察了蚂蚁寻找食物的行为。蚂蚁在其自然栖息地使用最短路径来获取食物样本。它们之间建立良好的沟通以找到这些最短路径，并以一种分散的方式穿越路径。这种行为在蚁群优化算法中被模拟。有许多算法受到各种动物和鸟类的自然习性和行为的启发。\n\
    \  - **混合算法**\n    传统算法擅长局部搜索，而元启发式算法擅长全局搜索。混合算法通过将传统算法与元启发式算法相结合，充分利用了这两种优势。\n\
    \n下图5.1展示了优化算法的简要分类，以便于理解：\n\n![优化分类法](img/05e0d1e671c636fe8ee73a026cd179da_225_0.png)\n\
    \n*图5.1：优化分类法*\n\n例如，遗传算法与反向传播结合用于训练人工神经网络，提供了一种更好的学习方法。混合算法擅长搜索且收敛速度快。这些算法也被称为模因算法。在混合模型下，也使用两种不同的元启发式算法来获得优化的解决方案。\n\
    \n优化分类法的图示表示如图5.1所示。\n\n## 基本优化技术\n\n如前一节所述，有两种基本的优化技术：反向传播和梯度下降。\n\n### 反向传播优化\n\
    \n反向传播算法用于具有监督训练的前馈神经网络。来自输入层的输入通过隐藏层中存在的激活函数传递。在传递过程中，输入被分配权重。现在，隐藏层的输出成为下一层的输入，依此类推。最终输出通过输出层获得。将这个结果输出与初始输入进行比较，并计算误差。这个误差用于微调该层的权重。这个过程从输出层递归地进行到输入层。因此，权重被修改和调整；这个过程持续进行，直到达到最小误差并计算出最终输出。"

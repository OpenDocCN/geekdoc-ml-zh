  mdcn: "## 影响分析\n\n1.  客户流失分析可能表明，导致流失的原因是配送延迟的可能性。\n2.  增值服务对客户流失的影响可能是导致流失的主要原因之一。\n\
    \n## 教育系统中的学习分析案例研究\n\n随着教育数据的飞速增长，需要改进数据存储、提升计算资源、算法和分析工具。这些进步对于理解学习环境、进行预测、优化学习流程、在组织内做出明智且更优的教育决策是必要的。这可以通过学习分析的概念来实现。因此，学习分析用于评估和分析关于学习者及学习环境的信息。\n\
    \n为了将学习分析系统整合到教育机构中，需要开发可操作的框架和采纳模型。然而，这些模型可能因国家和组织的不同而有所差异。主要的利益相关者包括那些通过安全开放的沟通渠道来传达、遵循和推广学习分析的人员。\n\
    \n## 学习分析带来的组织效益\n\n利用学习分析的各种益处包括：\n\n-   识别有风险的学生以及可能在学习中取得成功的学生。\n-   监控和提升组织能力。\n\
    -   制定教育政策和跨学校的资源分配。这样做是为了增强和优化教育流程、降低辍学率、提高留存率和成功率，并预测学校表现。\n\n-   **数据收集**\n\
    \    收集的数据可用于确定数据的用途或目的。这些数据可大致分为以下几类：\n    -   **总结性与描述性：** 在学习阶段（也称为学习期）结束后提供详细见解。\n\
    \    -   **形成性与（近）实时性：** 这种学习从持续进行的信息中捕获数据，以通过直接干预来改进流程。\n    -   **预测性与规范性：**\
    \ 这预测结果的可能性，以便为未来的干预、策略和行动制定计划。\n\n## 面临的挑战\n\n让我们来看看面临的挑战。\n\n## 采纳\n\n-   采纳学习分析面临的挑战之一是确定是完全采纳还是分阶段逐步扩大采纳学习分析机制。\n\
    -   由于组织内不同层级涉及多个利益相关者，应用学习分析导致流程开发变得复杂。\n-   开发对功能、干预策略和隐私感知的偏好需要开发工具。因此，需要成立治理委员会，专注于采纳学习分析，并成立一个小组专注于教育数据的隐私和伦理使用。\n\
    \n## 教师诊断支持系统\n\n为了提供诊断支持，需要收集有关学生的信息：\n\n-   **学生的个人特征：** 这可能包括特定领域的知识、能力和情感动机特征。\n\
    -   **教学特征描述：** 这可能表明学习内容及其特征。\n-   还可以收集有关学生对该学科的兴趣及其对该主题知识的信息。\n\n## 方法\n\n\
    开发的重点可以分阶段进行：课程开始前、课程进行中以及课程结束后，如[图 4.21](Figure 4.21)所示。开发也可以采用客户端-服务器模型或移动应用程序开发。\n\
    \n表 4.9 列出了信息及其来源：\n\n| 序号 | 关注领域 | 信息描述 | 信息来源 |\n| :--- | :--- | :--- | :---\
    \ |\n| 1. | 学生 | 学生的个人特征 | 学生 |\n| | | 学生的评估 | |\n| 2. | 教师 | 教学特征 | 教师 |\n\n\
    学习分析也可用于考试。根据收集的证据，我们可以确定成功率、识别有不及格风险的学生、注册学生人数、辍学人数、平均风险可能性、学生平均年龄、性别分布等。可以采用的流程如[图\
    \ 4.22](#)所示。\n\n根据所遵循的流程，可以确定有关学生获得的学分、教职员工留存率、学生进步和学生满意度等方面的见解。在应用机器学习算法时，可以考虑各种测试用例场景，例如：\n\
    \n-   **在宏观层面：** 学习分析见解有助于确定教职员工的目标留存计划。\n-   **在中观层面：** 可以整合机器学习算法来改进教学实践。\n\
    -   **在微观层面：** 可以确定专注于学生进步、识别处于不及格区域学生的算法。还可以开发针对个别学生执行纠正措施的算法。\n\n利用各种模型、标准、可视化指标和设计指南将使学习分析更加有效。此外，实施各种机器学习算法、学习管理系统（LMS）和学生信息系统（SIS）有助于为更好的教育学习系统开发见解。因此，学习分析的采纳可用于以下方面：\n\
    \n-   开发与就业市场需求相适应的学术课程\n-   为学生的职业生涯做准备\n-   通过自适应和按需学习方法提供灵活的学习机会\n-   支持学生需求并为学生改善学习环境\n\
    -   以最经济的方式实现灵活的教学和学习方法\n\n## 其他案例研究\n\n**Netflix 对预测分析的利用：** 对于像 Netflix 这样的公司来说，数据收集至关重要。根据用户的行为和过去的观看模式，Netflix\
    \ 收集客户信息，并利用这些信息根据客户偏好进行预测。\n\n## 结论\n\n本章重点介绍了机器学习适用性的各种案例研究。这些案例包括缓解信息过载问题并为用户提供系统中不易获得的产品和服务访问权限的推荐系统。接着是将机器学习算法应用于多媒体系统的文本和图像元素。进一步探讨了利用机器学习算法的各种案例研究。下一章详细阐述了机器学习算法中的优化，并阐明了如何使用各种启发式优化算法来为机器学习算法确定正确的参数值。\n\
    \n## 加入我们的书籍 Discord 空间\n\n加入书籍的 Discord 工作区，获取最新更新、优惠、全球科技动态、新书发布以及与作者的交流会：\n\
    \nhttps://discord.bpbonline.com\n\n# 第 5 章\n\n## 机器学习算法中的优化\n\n## 引言\n\n机器学习项目离不开改进，尤其是在算法训练方面。研究人员一直在努力降低算法训练所涉及的成本。这就是优化发挥作用的地方。在第\
    \ 4 章“机器学习案例研究与项目”中，我们已经看到了各个领域的项目。这些项目通过使用各种混合算法和优化技术还有改进的空间。当涉及金钱和时间时，优化非常重要。优化的目标是找到最佳元素、路径或技术，通过减少训练时间来提高算法的效率。本章介绍了优化的概念，并解释了其在基于机器学习的项目中的重要性。本章从基本的优化技术开始，接着讨论元启发式方法。本章还介绍了可用于优化的\
    \ Python 库。\n\n## 结构\n\n-   优化：机器学习项目的需求\n    -   优化技术的类型\n-   基本优化技术\n-   优化的元启发式方法\n\
    \    -   元启发式算法的类型\n-   通过优化学习参数改进机器学习算法\n    -   案例研究 1：医疗保健中的元启发式优化技术\n    -\

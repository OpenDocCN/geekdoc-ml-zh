    | 过程 | 在当前和历史数据中寻找模式 | 在历史数据上操作 |


    表 1.1：数据科学和数据挖掘之间的区别


    ## 机器学习和深度学习


    机器学习是基于其探测数据结构的能力而开发的。它使用迭代方法从数据中学习，因此学习很容易自动化。


    深度学习结合了计算能力和神经网络的进步，以学习大量数据中的复杂模式，用于识别图像中的物体和声音中的单词，如表 1.2 所示：


    | 特征 | 机器学习 | 深度学习 |

    |---|---|---|


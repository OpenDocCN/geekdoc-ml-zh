    # 3. Compare Backpropagation and Gradient descent approach to optimization.


    **Ans.** Stochastic gradient descent is an optimization algorithm for minimizing
    the loss of a predictive model with regard to a training dataset.


    Backpropagation is an automatic differentiation algorithm for calculating gradients
    for the weights in a neural network graph structure.


    **Gradient Descent** is an optimization algorithm that finds the set of input
    variables for a target function that results in a minimum value of the target
    function, called the minimum of the function.


    As its name suggests, gradient descent involves calculating the gradient of the
    target function.


    You may recall from calculus that the first-order derivative of a function calculates
    the slope or curvature of a function at a given point. Read left to right, a positive
    derivative suggests that the target function is sloping uphill, and a negative
    derivative suggests the target function is sloping downhill.


    +   - **Derivative:** Slope or curvature of a target function with respect to
    specific input values to the function.


    If the target function takes multiple input variables, they can be taken together
    as a vector of variables. Working with vectors and matrices is referred to linear
    algebra, and doing calculus with structures from linear algebra is called matrix
    calculus or vector calculus. In vector calculus, the vector of first-order derivatives
    (partial derivatives) is generally referred to as the gradient of the target function.


    - **Gradient:** Vector of partial derivatives of a target function with respect
    to input variables.


    The gradient descent algorithm requires the calculation of the gradient of the
    target function with respect to the specific values of the input values. The gradient
    point’s uphill, so the negative of the gradient of each input variable is followed
    downhill to result in new values for each variable that results in a lower evaluation
    of the target function.


    A step size is used to scale the gradient and control how much to change each
    input variable with respect to the gradient.


    - **Step Size:** Learning rate or alpha, a hyperparameter used to control how
    much to change each input variable with respect to the gradient.


    This process is repeated until the minimum of the target function is located,
    a maximum number of candidate solutions are evaluated, or some other stop'

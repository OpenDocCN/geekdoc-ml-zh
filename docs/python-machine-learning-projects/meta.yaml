    # Types of Predictive Analytical Models


    Based on the previously mentioned techniques, predictive analytics models are
    broadly classified into the following:


    **Classification model:** It is considered to be the simplest model that categorizes
    the data to handle simple and direct query responses. An example use case would
    be to answer the question “Is this a fake account number?”.


    **Clustering model:** As the name suggests, this model groups data based on common
    attributes. This grouping can be done by bringing together things or people with
    shared characteristics or behaviors. For example, based on the operations done
    by people in the same or similar situations in the past, loan approval can be
    given to a person.


    **Forecast model:** Based on learning from historical data, this model works on
    numerical data. For example, at a call center, the number of calls a call center
    executive should be able to handle per day or week is determined by looking at
    historical data.


    **Outliers model:** This model works by analyzing abnormal or data points outside
    a specified range. For example, a bank can use this model to determine whether
    a transaction done by a customer is outside of their normal buying habits. This
    would enable them to determine a fraud situation.


    **Time series model:** The evaluation in this model is based on time as a parameter
    that is applied on a sequence of data points. For example, based on the number
    of patients admitted to the hospital over a period of weeks, predictions can be
    made as to the number of patients the hospital might expect in the near future,
    over months or the rest of the year.



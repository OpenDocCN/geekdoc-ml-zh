    \    - **训练集** 是用于构建模型的数据集子集。\n    - **验证集** 是用于评估在训练阶段构建的模型性能的子集。\n    - **测试集**，或未见过的数据，是用于评估模型未来可能性能的数据集子集。\n\
    \n如果模型在训练集上的拟合程度远好于在测试集上的拟合程度，则称该模型过拟合。\n\n- **交叉验证：** 交叉验证是一种更复杂的方法，它使用整个转换后的数据集来训练和测试给定算法，而不是使用测试和训练数据集。\n\
    - 在此技术中，原始数据集被分为两部分：用于训练机器学习模型的训练集，以及用于评估分析的独立集。\n\n## 模型评估指标\n\n机器学习任务的性能是通过确定算法在未见过的数据上的表现来获得的。算法（模型）的优劣是通过其评估指标获得的，而评估指标又取决于要解决的问题。"

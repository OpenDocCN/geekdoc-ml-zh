  md: 'At this stage, from the huge corpus of data available, the system generates
    a smaller subset of candidates. The aim is that given a query, the system generates
    a set of relevant candidates.


    Two common candidate generation approaches are listed in Table 4.1:


    | Type | Example |

    |---|---|

    | Content based filtering | If user A watches two cute cat videos, then the system
    can recommend cute animal videos to that user. |

    | Collaborative filtering | If user A is similar to user B, and user B likes video
    1, then the system can recommend video 1 to user A (even if user A hasn''t seen
    any videos similar to video 1). |


    **Table 4.1:** *Candidate generation approaches*


    Both content-based and collaborative filtering map each item and query (or context).


    These embeddings are used for candidate generation as follows: Given a query embedding
    q∈E, the system looks for item embeddings x∈E that are close to q, that is, embeddings
    with high similarity s(q,x). To determine the degree of similarity, the recommendation
    systems rely on cosine, dot product or Euclidean distance measures, where:


    +   - Cosine is the cosine of the angle between the two vectors, s(q, x) = cos(q,
    x)

    - The dot product of two vectors is given by s(q, x) = ||x||||q||cos(q, x)

    - Euclidean distance is given as (q, x) = ||q - x|| = $\sum_{i=1}^{n} q_i - x_i$
    smaller distance means higher similarity


    # **Scoring**


    Another model then scores and ranks the candidates so that the most relevant information
    is in the top10 items displayed on the screen.


    # **Re-ranking**


    Re-ranking is required so that the user''s likes/dislikes, and other preferences
    and constraints are considered.



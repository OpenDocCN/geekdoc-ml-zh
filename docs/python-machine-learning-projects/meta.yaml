  md: 'The basic unit of a neural network is the neuron. It takes the inputs, processes
    them with mathematical operations and produces an output as represented by a 2-input
    neuron in Figure 3.7:


    ![](img/05e0d1e671c636fe8ee73a026cd179da_92_0.png)


    The operation that is performed is as follows:


    +   1. Each input is multiplied by a weight, where x1 and x2 are the inputs, andw1
    and w2 are the weights.


    $$x1 \rightarrow x1 * w1$$

    $$x2 \rightarrow x2 * w2$$


    2. All the weighted inputs are then added with a bias b:


    $$(x1 * w1) + (x2 * w2) + b$$


    3. The sum is passed through an activation function that converts an unbounded
    input into predictable form given in the following equation. This process of passing
    inputs forward to get an output is known as feedforward. Activation functions
    are also known as mapping functions. They take some input on the x-axis and output
    a value in a restricted range.


    $$y = f(x1 * w1 + x2 * w2 + b). y = f(x1 * w1 + x2 * w2 + b)$$


    # Combining Neurons into a Neural Network


    A neural network comprises of a bunch of neurons connected to each other, as shown
    in Figure3.8:'

  mdcn: "大多数机器学习应用都包含分类和回归算法。因此，用于分类和回归应用的评估指标包括以下内容。\n\n## 分类指标\n\n分类问题中使用的指标包括以下内容：\n\
    \n- **分类准确率**\n  准确率定义为正确预测的数量与输入样本总数的比率。\n  $准确率 = 正确预测的数量\\ /\\ 预测总数$\n- **混淆矩阵**\n\

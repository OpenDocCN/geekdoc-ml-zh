    # Agglomerative Hierarchical Clustering


    Hierarchical clustering algorithms fall into two categories: top-down or bottom-up.
    Bottom-up algorithms treat each data point as a single cluster at the outset and
    then successively merge (or *agglomerate*) pairs of clusters until all of them
    have been merged into a single cluster that contains all data points. Bottom-up
    hierarchical clustering is, therefore, called *hierarchical agglomerative clustering*
    or *HAC*. This hierarchy of clusters is represented as a tree (or dendrogram).
    The root of the tree is the unique cluster that gathers all the samples, and the
    leaves are the clusters with only one sample:



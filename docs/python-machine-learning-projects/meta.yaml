  - '[PAGE 34]


    ![](img/05e0d1e671c636fe8ee73a026cd179da_34_0.png)


    **Figure 1.3:** Graph presenting the weight


    Linear regression is mainly of two types: simple linear regression and multiple
    linear regression. Simple linear regression is characterized by one independent
    variable, and multiple linear regression (as the name suggests) is characterized
    by multiple (more than 1) independent variables. While finding the best fit line,
    you can fit a polynomial or curvilinear regression, and these are known as polynomial
    or curvilinear regression.


    **Logistic regression:** Don’t get confused by its name! It is a classification,
    not a regression algorithm. It is used to estimate discrete values (binary values
    like 0/1, yes/no, true/false) based on a given set of independent variable (s).
    In simple words, it predicts the probability of occurrence of an event by fitting
    data to a logit function. Hence, it is also known as logit regression. Since it
    predicts the probability, its output values lies between 0 and 1 (as expected).


    Again, let us try and understand this through a simple example.


    Let’s say your friend gives you a puzzle to solve. There are only two outcome
    scenarios: either you solve it or you don’t. Now, imagine that you are being given
    wide range of puzzles/quizzes to understand which subjects you are good at. The
    outcome of this study would be'
  - '[PAGE 35]


    something like this: if you are given a trigonometry based tenth grade problem,
    you are 70% likely to solve it. On the other hand, if it is fifth grade history
    question, the probability of getting an answer is only 30%. This is what logistic
    regression provides you.


    Coming to math, the log odds of the outcome is modeled as a linear combination
    of the predictor variables:


    odds= p/ (1-p) = Probability of event occurrence / Probability of event non-occurrence


    ln(odds) = ln(p/(1-p))


    logit(p) = ln(p/(1-p)) = b0+b1X1+b2X2+b3X3....+bkXk


    Here, p is the probability of the presence of the characteristic of interest.
    It chooses parameters that maximize the likelihood of observing the sample values
    rather than those that minimize the sum of squared errors (like in ordinary regression).


    You may ask, why take a log? For the sake of simplicity, let’s just say that this
    is one of the best mathematical ways to replicate a step function. Refer to the
    following [Figure 1.4](Figure 1.4).'
  - '[PAGE 36]


    ![](img/05e0d1e671c636fe8ee73a026cd179da_36_0.png)


    **Figure 1.4:** *Probability of the presence of the characteristic of interest*


    **Decision Tree:** This is one of my favorite algorithms and is used quite frequently.
    It is a type of supervised learning algorithm that is mostly used for classification
    problems. Surprisingly, it works for both categorical and continuous dependent
    variables. In this algorithm, we split the population into two or more homogeneous
    sets based on the most significant attributes/independent variables to make as
    distinct groups as possible. Refer to the following [Figure 1.5](Figure 1.5).'
  - '[PAGE 37]


    ![](img/05e0d1e671c636fe8ee73a026cd179da_37_0.png)


    **Figure 1.5:** *Dependent variable*

    **Source:** *statsexchange*


    In the preceding image, you can see that population is classified into four different
    groups based on multiple attributes to identify ‘whether they will play’. To split
    the population into different heterogeneous groups, it uses techniques like Gini,
    Information Gain, Chi-square and entropy.


    The best way to understand how decision tree works is to play Jezzball, a classic
    game from Microsoft, as shown in the following figure. Essentially, you have a
    room with moving walls, and you need to create walls such that maximum area gets
    cleared off without the balls. Refer the *Figure 1.6*.'
  - '[PAGE 38]


    ![](img/05e0d1e671c636fe8ee73a026cd179da_38_0.png)


    **Figure 1.6: Jezzball**


    So, every time you split the room with a wall, you are trying to create two different
    populations in the same room. Decision trees work in a similar fashion by dividing
    a population into groups.


    **kNN (k-Nearest Neighbors):** It can be used for both classification and regression
    problems. However, it is more widely used in classification problems in the industry.
    K-nearest neighbors is a simple algorithm that stores all available cases and
    classifies new cases by a majority vote of its k neighbors. The case being assigned
    to the class is the most common among its K-nearest neighbors measured by a distance
    function.


    These distance functions can be Euclidean, Manhattan, Minkowski and Hamming distance.
    The first three functions are used for continuous function, and the fourth one
    (Hamming) is used for categorical variables. If K = 1, the case is simply assigned
    to the class of its nearest neighbor. At times, choosing K turns out to be a challenge
    while performing kNN modeling.


    KNN can easily be mapped to our real lives. If you want to learn about a person
    you have no information about, you might like to find out'
  - '[PAGE 39]


    about their close friends and the circles they move in, and gain access to information
    about them.


    The following are the things to consider before selecting kNN:


    +   - KNN is computationally expensive

    - Variables should be normalized, else higher range variables can bias it

    - Works on pre-processing stage more before going for kNN, like an outlier or
    noise removal


    **K-Means:** It is a type of unsupervised algorithm that solves the clustering
    problem. Its procedure follows a simple and easy way to classify a given data
    set through a certain number of clusters (assume k clusters). Data points inside
    a cluster are homogeneous and heterogeneous to peer groups.


    Remember figuring out shapes from ink blots? as shown in [Figure 1.7](Figure 1.7),
    k means algorithm is somewhat similar to this activity. You look at the shape
    and spread to decipher how many different clusters/population is present.'
  - '[PAGE 40]


    ![](img/05e0d1e671c636fe8ee73a026cd179da_40_0.png)


    **Figure 1.7:** *Cluster / population present*


    Here’s how K-means forms cluster:


    +   1. K-means picks k number of points for each cluster known as centroids.

    2. Each data point forms a cluster with the closest centroids, i.e., k clusters.

    3. It finds the centroid of each cluster based on the existing cluster members.
    Here, we have new centroids.'
  - '[PAGE 41]


    4. As we have new centroids, repeat step 2 and 3. Find the closest distance for
    each data point from new centroids and get associated with new k-clusters. Repeat
    this process until convergence occurs, i.e., centroids do not change.


    Let’s look at how to determine the value of K.


    In K-means, we have clusters, and each cluster has its own centroid. The sum of
    the square of the difference between centroid and the data points within a cluster
    constitutes within the sum of the square value for that cluster. Also, when the
    sum of square values for all the clusters are added, it equals the total within
    the sum of square value for the cluster solution.


    We know that as the number of cluster increases, this value keeps on decreasing.
    However, if you plot the result, you may see that the sum of squared distance
    decreases sharply up to some value of k and then more slowly after that. Here,
    we can find the optimal number of clusters. Refer the following [Figure 1.8](#figure-1-8).


    ![](img/05e0d1e671c636fe8ee73a026cd179da_41_0.png)


    **Figure 1.8:** Optimal number of clusters



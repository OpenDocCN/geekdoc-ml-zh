    # Density-Based Spatial Clustering of Applications with Noise (DBSCAN)


    DBSCAN is a density-based clustered algorithm similar to mean-shift, but with
    a couple of notable advantages.


    +   1. DBSCAN begins with an arbitrary starting data point that has not been visited.
    The neighborhood of this point is extracted using a distance epsilon ε (all points
    that are within the ε distance are neighborhood points).

    2. If there is a sufficient number of points (according to minPoints) within this
    neighborhood, the clustering process starts and the current data point becomes
    the first point in the new cluster. Otherwise, the point will be labeled as noise
    (this noisy point might later become part of the cluster). In both cases, that
    point is marked as “visited”.

    3. For this first point in the new cluster, the points within its ε distance neighborhood
    also become part of the same cluster. This procedure of making all points in the
    ε neighborhood belong to the same cluster is then repeated for all the new points
    that have been just added to the cluster group.

    4. Steps 2 and 3 are repeated until all points in the cluster are determined,
    that is, all points within the ε neighborhood of the cluster have been visited
    and labeled.


    Once we’re done with the current cluster, a new unvisited point is retrieved and
    processed, leading to the discovery of a further cluster or noise. This process
    continues until all points are marked as visited. Since all points will have been
    visited at the end of this, each point will have been marked as either belonging
    to a cluster or being noise.


    DBSCAN has some great advantages over other clustering algorithms. Firstly, it
    does not require a pe-set number of clusters at all. It also identifies outliers
    as noises, unlike mean-shift, which simply throws them into a cluster even if
    the data point is very different. Additionally, it can find arbitrarily sized
    and arbitrarily shaped clusters quite well.


    The main drawback of DBSCAN is that it doesn’t perform as well as others when
    the clusters are of varying density. This is because the setting of the distance
    threshold ε and minPoints for identifying the neighborhood points will vary from
    cluster to cluster when the density varies. This drawback also occurs with very'

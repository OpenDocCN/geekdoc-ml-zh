    这里，函数的第一次使用生成从0开始的10个值。第二次使用给出起始和结束值，第三次使用生成具有相等步长的值。\n\n另一个有趣且广泛使用的函数是**linspace()**；其语法如下：\n\
    \n**linspace(start, end, no. of values)**\n\n**示例4：**\n\n```\n>>>np.linspace(1.,\

    1, True/ False, Yes/ No) in nature. In other words, the label is either categorical
    or discrete in nature. This leads to the value of the output Y to be between0
    and 1, and represented by the following equation using log odds ratio:


    $$Odds = \frac{p}{1-p}$$

    = (probability of event occurance / (probability of not event occurance)


    +   - Logistic regression can handle various types of relationships as it applies
    a non-linear log transformation to the predicted odds ratio.

    - There should not be any correlation between independent variables, that is,
    no multicollinearity.

    - Ordinal logistic regression has ordinal values of dependent variables.

    - Multinomial logistic regression is considered when the dependent variables belong
    to multi class approach.



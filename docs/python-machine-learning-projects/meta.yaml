    \n### 示例3：\n\n```\n>>>choice=input(\"Which fruit do you like\")\nApple\n>>>print(choice)\n\
    Apple\n```\n\n读取数字时必须小心。**input()**函数默认将所有值视为字符串。读取数字时，可以使用**int()**和**float()**函数将这些值转换为适当的数据类型。\n\
    \n## 逻辑语句\n\n与任何其他编程语言一样，Python支持关系和逻辑运算符以及逻辑语句。\n支持的关系运算符有 <, >, <=, >=, !=,\
    \ ==。\n逻辑运算符是 *AND*、*OR*、*NOT*。\n逻辑语句if、else在决策时很常用。Python语法如下：\n\n```\nif condition\
    \ :\n    Statements\nelse:\n    Statements\n```\n\n或者，为了更具决定性，可以使用级联语句。这里需要记住的一点是，Python不提供任何块标记运算符。额外的空格用于标记或分组语句。任何不必要的空格在Python中都会被视为错误。\n\
    \n```\nif condition :\n    statements\nelif condition:\n    statements\nelse:\n\
    \    statements\n```\n\n### 示例4：\n\n```\n>>>a,b=10,20\n>>>if a>b :\n    print(a-b)\n\
    \    else :\n        print(b-a)\n10\n```\n\n### 示例5：\n\n```\n>>>a = 200\n>>>b\
    \ = 33\n>>>if b > a:\n    print(\"b is greater than a\")\nelif a == b:\n    print(\"\
    a and b are equal\")\nelse:\n    print(\"a is greater than b\")\n```\n\n前面的代码将打印\
    \ - **a is greater than b**。\n\n## 循环与控制语句\n\n为了帮助在编程中重复执行语句，使用了基于条件的循环语句。Python主要支持两种循环语句：**for循环**和**while循环**。\n\
    \n### 示例6：\n\n```\n>>>for x in range(1,10):\n    print(x)\n```\n\n**for**语句广泛用于遍历字符串、元组和列表。\n\
    \n### 示例7：\n\n```\n>>>a, b, n = 0, 1, 10\n>>>sum=0; count=1\n>>>while (count <\
    \ n):\n    count=count+1\n    a=b; b=sum\n    sum=a+b\n    print(' ',sum)\n```\n\
    \n**while**用于根据需要重复语句。示例7中的代码将打印著名的斐波那契数列的前10项。\n我们可以使用**break**语句根据某些条件停止循环迭代或退出循环。**continue**语句用于跳过循环中的部分语句并开始新的迭代。\n\
    \n### 示例8：\n\n```\n>>>for num in range (1,10):\n    print(num)\n    if(num ==5):\n\
    \        break;\n```\n\n### 示例9：\n\n```\n>>>for num in range (1,10):\n    if(num\
    \ ==5):\n        continue;\n    print(num)\n```\n\n示例8的输出是12345；当值达到5后，**for**循环停止。相反，示例9的输出是1234678910；由于**continue**语句，**print(num)**语句没有为5执行。\n\
    \n## 函数与模块\n\n函数是自包含的语句块，就像执行特定任务的程序一样。函数包含一组语句，每当我们在程序中引用该函数时，这些语句就会被执行。在Python中，可以使用**def**关键字定义函数。\n\
    Python中函数定义的通用语法如下：\n**def function_name(list of parameters) :**\n    **statements**\n\
    \n### 示例10：\n\n```\n>>>def max(x,y) :\n    if x > y :\n        return x\n    else:\n\
    \        return y\n>>>max(10,20)\n```"

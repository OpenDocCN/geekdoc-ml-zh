    \ for each open set $(g \\in H, r \\in (0, \\infty))$ in $H$. We call such an\
    \ $F : \\Omega \\rightarrow H$ a random element of $H$. Intuitively, a random\
    \ element is a random variable that takes a value in $H$. Thus far, we have assumed\
    \ that $f : \\Omega \\times E \\rightarrow \\mathbb{R}$ is measurable at each\
    \ $x \\in E$ (stochastic process). This section addresses situations in which\
    \ we do not assume such measurability. For simplicity, we write $F(\\omega)$ as\
    \ $F$, similar to the elements of $H$.\n\nAlthough we do not go into details in\
    \ this book, it is known that the following relationship holds between stochastic\
    \ processes and random elements. It is only necessary to understand the close\
    \ relationship between the two.\n\n**Proposition 70** (Hsing-Eubank [14])\n\n\
    +   1. If $f : \\Omega \\times E \\rightarrow \\mathbb{R}$ is measurable w.r.t.\
    \ $\\Omega \\times E$ and $f(\\omega, \\cdot) \\in H$, for $\\omega \\in \\Omega$,\
    \ then $f(\\omega, \\cdot)$ is a random element of $H$.\n2. If $f(\\cdot, x) \\\
    rightarrow \\mathbb{R}$ is measurable for each $x \\in E$ and $f(\\omega, \\cdot)$\
    \ is continuous for each $\\omega \\in \\Omega$, then $f(\\omega, \\cdot)$ is\
    \ a random element.\n3. If $f : \\Omega \\times E \\rightarrow \\mathbb{R}$ is\
    \ a (zero-mean) mean-square continuous process and its covariance function is\
    \ $k$, then a random element of $H$ exists such that the covariance operator is\
    \ $H \\ni g \\mapsto \\int_E k(\\cdot, y)g(y)d\\mu(y) \\in H$."

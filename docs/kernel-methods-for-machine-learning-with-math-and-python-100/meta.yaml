    by substituting $x = y$ in 5. 4. $\Rightarrow$ 3. is due to


    $$\|x - \sum_{k=1}^n \langle x, e_k \rangle e_k\|^2 = \|x\|^2 - \sum_{k=1}^n |\langle
    x, e_k \rangle|^2 \to 0$$


    as $n \to \infty$ for each $x \in H$. For 3. $\Rightarrow$ 2., note the implication
    $\langle x, e_k \rangle = 0, k = 1, 2, \dots \Rightarrow x \perp \text{span}\{e_k\}$,
    which implies that $x \perp \text{span}\{e_k\}$ from the continuity of inner products.


    $$\sum_{i=1}^{\infty} \langle T_1 e_{1,i}, T_2 e_{1,i} \rangle_2 = \sum_{i=1}^{\infty}
    \sum_{j=1}^{\infty} \langle T_1 e_{1,i}, e_{2,j} \rangle_2 \langle T_2 e_{1,i},
    e_{2,j} \rangle_2$$


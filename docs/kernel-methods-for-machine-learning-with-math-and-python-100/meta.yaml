- md: "## Chapter 1\nPositive Definite Kernels\n\nIn data analysis and various information\
    \ processing tasks, we use kernels to evaluate the similarities between pairs\
    \ of objects. In this book, we deal with mathematically defined kernels called\
    \ positive definite kernels. Let the elements $x, y$ of a set $E$ correspond to\
    \ the elements (functions) $\\Psi(x), \\Psi(y)$ of a linear space $H$ called the\
    \ reproducing kernel Hilbert space. The kernel $k(x, y)$ corresponds to the inner\
    \ product $\\langle \\Psi(x), \\Psi(y) \\rangle_H$ in the linear space $H$. Additionally,\
    \ by choosing a nonlinear map $\\Psi$, this kernel can be applied to various problems.\
    \ The set $E$ may be a string, a tree, or a graph, even if it is not a real-numbered\
    \ vector, as long as the kernel satisfies positive definiteness. After defining\
    \ probability and Lebesgue integrals in the second half, we will learn about kernels\
    \ by using characteristic functions (Bochner's theorem).\n\n## 1.1 Positive Definiteness\
    \ of a Matrix\n\nLet $n \\geq 1$; we say that a square matrix $A$ is symmetric\
    \ if $A \\in \\mathbb{R}^{n \\times n}$ is equal to its transpose ($A^\\top =\
    \ A$)$^1$, and we say that $A$ is nonnegative definite if all the eigenvalues\
    \ are nonnegative.\n\n**Proposition 1** (nonnegative definite matrix) *The following\
    \ three conditions are equivalent for a symmetric matrix $A \\in \\mathbb{R}^{n\
    \ \\times n}$.*\n\n1. A matrix $B \\in \\mathbb{R}^{n \\times n}$ exists such\
    \ that $A = B^\\top B$.\n2. $x^\\top Ax \\geq 0$ for any $x \\in \\mathbb{R}^n$.\n\
    3. The eigenvalues of $A$ are nonnegative.\n\nProof: $1. \\Rightarrow 2.$ holds\
    \ because $A = B^\\top B \\Rightarrow x^\\top Ax = x^\\top B^\\top Bx = \\|Bx\\\
    |^2 \\geq 0$. $2. \\Rightarrow 3.$ follows from the fact that $x^\\top Ax \\geq\
    \ 0, x \\in \\mathbb{R}^n \\Rightarrow 0 \\leq y^\\top Ay = y^\\top \\lambda y\
    \ = \\lambda \\|y\\|^2$ for an eigenvalue $\\lambda$ of $A$ and its eigenvector\
    \ $y \\in \\mathbb{R}^n$. $3.\\Rightarrow 1.$ holds since $\\lambda_1, \\dots,\
    \ \\lambda_n \\ge 0 \\Rightarrow A = PDP^\\top = P\\sqrt{D}\\sqrt{D}P^\\top =\
    \ (\\sqrt{D}P^\\top)^\\top \\sqrt{D}P^\\top$, where $D$ and $\\sqrt{D}$ are diagonal\
    \ matrices with elements $\\lambda_1, \\dots, \\lambda_n$ and $\\sqrt{\\lambda_1},\
    \ \\dots, \\sqrt{\\lambda_n}$, and $P$ is the corresponding orthogonal matrix.\n\
    \nA nonnegative definite matrix $A$ is symmetric. In this book, we say that a\
    \ nonnegative definite matrix is positive definite if all of its eigenvalues are\
    \ positive. In addition, we assume that the elements of any matrix are real. However,\
    \ the following fact is often useful when we deal with complex numbers and Fourier\
    \ transformations.\n\n**Corollary 1** *For a nonnegative definite matrix $A \\\
    in \\mathbb{R}^{n \\times n}$, we have that $z^\\top A\\overline{z} \\ge 0$ for\
    \ any $z \\in \\mathbb{C}^n$, where $i = \\sqrt{-1}$ is the imaginary unit, and\
    \ we write the conjugate $x - iy$ of $z = x + iy \\in \\mathbb{C}$ with $x, y\
    \ \\in \\mathbb{R}$ as $\\overline{z}$.*\n\nProof: Since there exists a $B \\\
    in \\mathbb{R}^{n \\times n}$ such that $A = B^\\top B$ for a nonnegative definite\
    \ matrix $A \\in \\mathbb{R}^{n \\times n}$, we have that\n$$z^\\top A\\overline{z}\
    \ = (Bz)^\\top \\overline{Bz} = |Bz|^2 \\ge 0$$\nfor any $z = [z_1, \\dots, z_n]\
    \ \\in \\mathbb{C}^n$.\n\n### Example 1\n\n```python\n# In this chapter, we assume\
    \ that the following has been executed.\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\nfrom matplotlib import style\nstyle.use(\"seaborn-ticks\")\n```\n\n\
    ```python\nn = 3\nB = np.random.normal(size=n**2).reshape(3, 3)\nA = np.dot(B.T,\
    \ B)\nvalues, vectors = np.linalg.eig(A)\nprint(\"values :\\n\", values, \"\\\
    n\\nvectors :\\n\", vectors, \"\\n\")\n```\n\n```\nvalues:\n[0.09337468 7.75678625\
    \ 4.43554113]\nvectors:\n[[ 0.49860775  0.84350568  0.199721  ]\n [ 0.39606374\
    \ -0.42663779  0.81308899]\n [-0.77105371  0.32631023  0.54680692]]\n```\n\n```python\n\
    S = []\nfor i in range(10):\n    z = np.random.normal(size = n)\n    y = np.squeeze(z.T.dot(A.dot(z)))\n\
    \    S.append(y)\n    if (i+1) % 5 == 0:\n        print(\"S [%d : %d] : \"%((i-4),i),\
    \ S[i-4:i])\n```\n\n```\nS[0:4]: [23.24608872999895, 6.601263342526701, 5.334515801733688,\
    \ 14.886876186736613]\nS[5:9]: [18.85503241886245, 34.30290091714191, 1.025291282540866,\
    \ 29.59512428090335]\n```\n\n## 1.2 Kernels\n\nLet $E$ be a set. We often express\
    \ similarity between elements $x, y \\in E$ by using a bivariate function $k :\
    \ E \\times E \\to \\mathbb{R}$ not just for data analysis but also for various\
    \ information processing tasks. The larger $k(x, y)$ is, the more similar $x,\
    \ y$ are. We call such a function $k : E \\times E \\to \\mathbb{R}$ a kernel.\n\
    \n**Example 2** (*Epanechnikov kernel*) We use the kernel $k : E \\times E \\\
    to \\mathbb{R}$ such that\n\n$$k(x, y) = D\\left(\\frac{|x - y|}{\\lambda}\\right)$$\n\
    \n$$D(t) = \\begin{cases} \\frac{3}{4}(1 - t^2), & |t| \\le 1 \\\\ 0, & \\text{Otherwise}\
    \ \\end{cases}$$\n\nfor $\\lambda > 0$, and we construct the following function\
    \ (the Nadaraya-Watson estimator) from observations $(x_1, y_1), \\dots, (x_N,\
    \ y_N) \\in E \\times \\mathbb{R}$:\n\n$$\\hat{f}(x) = \\frac{\\sum_{i=1}^N k(x,\
    \ x_i)y_i}{\\sum_{j=1}^N k(x, x_j)}.$$\n\nFor a given input $x_* \\in E$ that\
    \ is different from the $N$ pairs of inputs, we return the weighted sum of $y_1,\
    \ \\dots, y_N$,\n\n$$\\frac{k(x_*, x_1)}{\\sum_{j=1}^N k(x_*, x_j)}, \\dots, \\\
    frac{k(x_*, x_N)}{\\sum_{j=1}^N k(x_*, x_j)},$$\n\nas the output $\\hat{f}(x_*)$.\
    \ Because we assume that a larger $k(x, y)$ yields a more similar $x, y \\in E$,\
    \ the more similar $x_*$ and $x_i$ are, the larger the weight of $y_i$.\n\nGiven\
    \ an input $x_* \\in E$ for $i = 1, \\dots, N$, we weight $y_i$ such that $x_i\
    \ - \\lambda \\le x_* \\le x_i + \\lambda$ is proportional to $k(x_i, x_*)$. If\
    \ we make the $\\lambda$ value smaller, we predict $y_*$ by using only the $(x_i,\
    \ y_i)$ for which $x_i$ and $x_*$ are close. We display the output obtained when\
    \ we execute the following code in Fig. 1.1.\n\n![](img/075acd5c7a7f62a80a28ffffee1ae5d9_13_0.png)\n\
    \nFig. 1.1 We use the Epanechnikov kernel and Nadaraya-Watson estimator to draw\
    \ the curves for ќї = 0.05, 0.35, 0.5. Finally, we obtain the optimal ќї value and\
    \ present it in the same graph\n\n```python\nn = 250\nx = 2 * np.random.normal(size\
    \ = n)\ny = np.sin(2 * np.pi * x) + np.random.normal(size = n) / 4 # Data Generation\n\
    \ndef D(t): # Function Definition D\n    return np.maximum(0.75 * (1 - t**2),\
    \ 0)\n\ndef k(x, y, lam): # Function Definition K\n    return D(np.abs((x - y)\
    \ / lam))\n\ndef f(z, lam): # Function Definition f\n    S = 0; T = 0\n    for\
    \ i in range(n):\n        S = S + k(x[i], z, lam) * y[i]\n        T = T + k(x[i],\
    \ z, lam)\n    return S / T\n\nplt.figure(num=1, figsize=(15, 8), dpi=80)\nplt.xlim(-3,\
    \ 3); plt.ylim(-2, 3)\nplt.xticks(fontsize = 14); plt.yticks(fontsize = 14)\n\
    plt.scatter(x, y, facecolors='none', edgecolors = \"k\", marker = \"o\")\n\nxx\
    \ = np.arange(-3, 3, 0.1)\nyy = [[] for _ in range(3)]\nlam = [0.05, 0.35, 0.50]\n\
    color = [\"g\", \"b\", \"r\"]\nfor i in range(3):\n    for zz in xx:\n       \
    \ yy[i].append(f(zz, lam[i]))\n    plt.plot(xx, yy[i], c = color[i], label = lam[i])\n\
    \nplt.legend(loc = \"upper_left\", frameon = True, prop={'size':14})\nplt.title(\"\
    Nadaraya-Watson Estimator\", fontsize = 20)\n```\n\n## 1.3 Positive Definite Kernels\n\
    \nThe kernels that we consider in this book satisfy the positive definiteness\
    \ criterion defined below. Suppose $k : E \\times E \\to \\mathbb{R}$ is symmetric,\
    \ i.e., $k(x, y) = k(y, x), x, y \\in E$. For $x_1, \\dots, x_n \\in E (n \\ge\
    \ 1)$, we say that the matrix\n\n$$\\begin{bmatrix} k(x_1, x_1) & \\cdots & k(x_1,\
    \ x_n) \\\\ \\vdots & \\ddots & \\vdots \\\\ k(x_n, x_1) & \\cdots & k(x_n, x_n)\
    \ \\end{bmatrix} \\in \\mathbb{R}^{n \\times n} \\quad (1.1)$$\n\nis the Gram\
    \ matrix w.r.t. $k$ of order $n$. We say that $k$ is a positive definite kernel$^2$\
    \ if the Gram matrix of order $n$ is nonnegative definite for any $n \\ge 1$ and\
    \ $x_1, \\dots, x_n \\in E$.\n\n**Example 3** The kernel in Example 2 does not\
    \ satisfy positive definiteness. In fact, when $\\lambda = 2$, $n = 3$, and $x_1\
    \ = -1$, $x_2 = 0$, $x_3 = 1$, the matrix consisting of $K_\\lambda(x_i, y_i)$\
    \ can be written as\n\n$$\\begin{bmatrix} k(x_1, x_1) & k(x_1, x_2) & k(x_1, x_3)\
    \ \\\\ k(x_2, x_1) & k(x_2, x_2) & k(x_2, x_3) \\\\ k(x_3, x_1) & k(x_3, x_2)\
    \ & k(x_3, x_3) \\end{bmatrix} = \\begin{bmatrix} 3/4 & 9/16 & 0 \\\\ 9/16 & 3/4\
    \ & 9/16 \\\\ 0 & 9/16 & 3/4 \\end{bmatrix}$$\n\nand the determinant is computed\
    \ as $3^3/2^6 - 3^5/2^{10} - 3^5/2^{10} = -3^3/2^9$. In general, the determinant\
    \ of a matrix is the product of its eigenvalues, and we find that at least one\
    \ of the three eigenvalues is negative.\n\n**Example 4** For random variables\
    \ $\\{X_i\\}_{i=1}^\\infty$ that are not necessarily independent, if $k(X_i, X_j)$\
    \ is the covariance between $X_i, X_j$, the Gram matrix of any order is the covariance\
    \ matrix among a finite number of $X_j$, which means that $k$ is positive definite.\
    \ We discuss Gaussian processes based on this fact in Chap. 6.\n\nBy assuming\
    \ positive definiteness, the theory of kernels will be developed in this book.\
    \ Hereafter, when we state kernels, we are referring to positive definite kernels.\n\
    \nLet $H$ be a linear space (vector space) equipped with an inner product $\\\
    langle \\cdot, \\cdot \\rangle_H$. Then, we often construct a positive definite\
    \ kernel with\n\n$$k(x, y) = \\langle \\Psi(x), \\Psi(y) \\rangle_H. \\quad (1.2)$$\n\
    \nBy using an arbitrary map $\\Psi : E \\to H$. We say that such a $\\Psi$ is\
    \ a feature map. In this chapter, we may assume that the linear space $H$ is the\
    \ Euclidean space $H = \\mathbb{R}^d$ of dimensionality $d$ with the standard\
    \ inner product $\\langle x, y \\rangle_{\\mathbb{R}^d} = x^\\top y, x, y \\in\
    \ \\mathbb{R}^d$. We define the linear space and inner product concepts in Chap.\
    \ 2.\n\n**Proposition 2** *The kernel $k : E \\times E \\to \\mathbb{R}$ defined\
    \ in (1.2) is positive definite.*\n\n$^1$ We write the transpose of matrix $A$\
    \ as $A^\\top$.\n\n$^2$ Although it seems appropriate to say вАЬa nonnegative definite\
    \ kernelвАЭ, the custom of saying вАЬa positive definite kernelвАЭ has been established."

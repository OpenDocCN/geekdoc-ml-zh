    \    return(alpha)\n# Usual Function\ndef alpha(K,x,y):\n    alpha=np.dot(np.linalg.inv(K+lam*np.eye(n)),y)\n\
    \    return alpha\n# Numerical Comparison\nalpha_1=alpha(K,x,y)\nalpha_2=alpha_m(K,x,y,m)\n\
    r=np.sort(x)\nw=np.zeros(n)\nv=np.zeros(n)\nfor j in range(n):\n    S_1=0\n  \
    \  S_2=0\n    for i in range(n):\n        S_1=S_1+alpha_1[i]*k(x[i],r[j])\n  \
    \      S_2=S_2+alpha_2[i]*k(x[i],r[j])\n    w[j]=S_1\n    v[j]=S_2\nplt.scatter(x,\
    \ y, facecolors='none', edgecolors = \"k\", marker = \"o\")\nplt.plot(r, w, c\
    \ = \"r\", label = \"w/o_Approx\")\nplt.plot(r, v, c = \"b\", label = \"with_Approx\"\
    )\nplt.xlim(-1.5, 2)\nplt.ylim(-2, 8)\nplt.xlabel(\"x\")\nplt.ylabel(\"y\")\n\
    plt.title(\"Kernel_Regression\")\nplt.legend(loc = \"upper_left\", frameon = True,\
    \ prop={'size':14})\n```\n\n## 4.7 Incomplete Cholesky Decomposition\n\nIn general,\
    \ we can decompose a positive definite matrix $A \\in \\mathbb{R}^{N \\times N}$\
    \ into $A = RR^\\top$. By using a lower triangular matrix $R$ with nonnegative\
    \ diagonal components. Such a decomposition is called the Cholesky decomposition\
    \ of $A$.\n\n> **Proposition 47** *For a positive definite matrix $A \\in \\mathbb{R}^{n\
    \ \\times n}$, there exists a Cholesky decomposition $A = RR^\\top$ that is unique\
    \ if and only if $A$ is positive definite.*\n\nMany books cover this material.\
    \ For the proofs, see, for example, [9]. The following is the Cholesky decomposition\
    \ procedure. We construct the process so that we can stop anytime to obtain an\
    \ approximation of $RR^\\top$ with rank $r \\leq N$.\n\n1. In the initial stage,\
    \ $B = A$, and $R$ is a zero matrix.\n\n![](img/075acd5c7a7f62a80a28ffffee1ae5d9_127_0.png)\n\
    \nFig. 4.8 We approximated data with $N = 300$ and ranks $m = 10, 20$. The upper\
    \ and lower subfigures display the results obtained when running $\\lambda = 10^{-5}$\
    \ and $\\lambda = 10^{-3}$, respectively. The red and blue lines are the results\
    \ obtained without approximation and with approximation, respectively. The accuracy\
    \ is almost the same as that in the case without approximation when $m = 20$.\
    \ The larger the value of $\\lambda$ is, the smaller the approximation error becomes\n\
    \n2. For each $i = 1, \\ldots, r$, the first $i$ columns of $R$ are set so that\
    \ $B_{j,i} = \\sum_{h=1}^{N} R_{j,h} R_{i,h}$ for $j = 1, \\ldots, N$. In other\
    \ words, the setup is complete through the $i$th column of $B$.\n\n$$R = \\begin{bmatrix}\
    \ R_{1,1} & 0 & \\cdots & \\cdots & 0 \\\\ \\vdots & \\ddots & \\ddots & \\cdots\
    \ & 0 \\\\ R_{i,1} & \\vdots & R_{i,i} & 0 & \\cdots & 0 \\\\ R_{i+1,1} & \\vdots\
    \ & R_{i+1,i} & 0 & \\cdots & 0 \\\\ \\vdots & \\vdots & \\vdots & \\vdots & \\\
    ddots & \\vdots \\\\ R_{N,1} & \\cdots & R_{N,i} & 0 & \\cdots & 0 \\end{bmatrix}.$$\n\
    \nIn this case, we swap the two subscripts in $B$ by multiplying a matrix $Q$\
    \ from the front and rear of $B$.\n\n3. The final result is that $RR^\\top = B\
    \ = P^\\top AP$ with $P = Q_1 \\cdots Q_N$. Therefore, $A = PRR^\\top P^\\top$,\
    \ and we have that $PR(PR)^\\top$ is the Cholesky decomposition."

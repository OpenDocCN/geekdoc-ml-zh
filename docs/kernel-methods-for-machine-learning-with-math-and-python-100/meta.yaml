    # Chapter 2

    Hilbert Spaces


    When considering machine learning and data science issues, in many cases, the
    calculus and linear algebra courses taken during the first year of university
    provide sufficient background information. However, we require knowledge of metric
    spaces and their completeness, as well as linear algebras with nonfinite dimensions,
    for kernels. If your major is not mathematics, we might have few opportunities
    to study these topics, and it may be challenging to learn them in a short period.
    This chapter aims to learn Hilbert spaces, the projection theorem, linear operators,
    and (some of) the compact operators necessary for understanding kernels. Unlike
    finite-dimensional linear spaces, ordinary Hilbert spaces require scrutiny of
    their completeness.


    # 2.1 Metric Spaces and Their Completeness


    Let $M$ be a set. We say that a bivariate function $d : M \times M \rightarrow
    \mathbb{R}$ is a distance if


    +   1. $d(x, y) \geq 0$;

    2. $d(x, y) = 0 \Longleftrightarrow x = y$;

    3. $d(x, y) = d(y, x)$; and

    4. $d(x, z) \leq d(x, y) + d(y, z)$


    for $x, y, z \in M$, and the pair $(M, d)$ is a metric space$^1$.


    Let $E$ be a subset of the metric space $M$. We say that $E$ is an open set if
    a positive constant $\epsilon$ exists such that $U(x, \epsilon) := \{y \in M |
    d(x, y) < \epsilon\} \subseteq E$ for each $x \in E$. Moreover, we say that $y
    \in M$ is a convergence point of $E$ if $U(y, \epsilon) \cap E \neq \{\}$ for
    an arbitrary $\epsilon > 0$, and $E$ is a closed set if $E$ contains all the convergence
    points of $E$.


    $^1$ We call $M$ a metric space rather than $(M, d)$ when we do not stress $d$
    or when $d$ is apparent.'
  - '[PAGE 39]


    Example 24 The set $M = [0, 1]$ is a closed set because the neighborhood $U(y,
    \epsilon)$ of $y \notin M$ has no intersection with $M$ if we make the radius
    $\epsilon > 0$ smaller, which means that $M$ contains all the convergence points
    of $M$. On the other hand, $M = (0, 1)$ is an open set because $M$ contains the
    neighborhood $U(y, \epsilon)$ of $y \in M$ if we make the radius $\epsilon > 0$
    smaller. If we add $\{0\}, \{1\}$ to the interval $(0, 1), (0, 1], [0, 1)$, we
    obtain the closed set $[0, 1]$.


    We say that the minimum closed set in $M$ that contains $E$ is the closure of
    $E$, and we write this as $\overline{E}$. If $E$ is not a closed set, then $E$
    does not contain all the convergence points. Thus, the closure is the set of convergence
    points of $E$. Moreover, we say that $E$ is dense in $M$ if $\overline{E} = M$,
    which is equivalent to the following conditions. вАЬ$y \in E$ exists such that $d(x,
    y) < \epsilon$ for an arbitrary $\epsilon > 0$ and $x \in M$вАЭ, and вАЬeach point
    in $M$ is a convergence point of $E$вАЭ. Furthermore, we say that $M$ is separable
    if it contains a dense subset that consists of countable points.


    Example 25 For the distance $d(x, y) := |x - y|$ with $x, y \in \mathbb{R}$ and
    the metric space $(\mathbb{R}, d)$, each irrational number $a \in \mathbb{R} \setminus
    \mathbb{Q}$ is a convergence point of $\mathbb{Q}$. In fact, for an arbitrary
    $\epsilon > 0$, the interval $(a - \epsilon, a + \epsilon)$ contains a rational
    number $b \in \mathbb{Q}$. Thus, $\mathbb{Q}$ does not contain the convergence
    point $a \notin \mathbb{Q}$ and is not a closed set in $\mathbb{R}$. Moreover,
    the closure of $\mathbb{Q}$ is $\mathbb{R}$ ($\mathbb{Q}$ is dense in $\mathbb{R}$).
    Furthermore, since $\mathbb{Q}$ is a countable set, we find that $\mathbb{R}$
    is separable.


    Let $(M, d)$ be a metric space. We say that a sequence $\{x_n\}$ in $M$ converges
    to $x \in M$ if $d(x_n, x) \to 0$ as $n \to \infty$ for $x \in M$, and we write
    this as $x_n \to x$. On the other hand, we say that a sequence $\{x_n\}$ in $M$
    is Cauchy if $d(x_m, x_n) \to 0$ as $m, n \to \infty$, i.e., if $\sup_{m,n \ge
    N} d(x_m, x_n) \to 0$ as $N \to \infty$.


    If $\{x_n\}$ converges to some $x \in M$, then it is a Cauchy sequence. However,
    the converse does not hold. We say that a metric space $(M, d)$ is complete if
    each Cauchy sequence $\{x_n\}$ in $M$ converges to an element in $M$. We say that
    $(M, d)$ is bounded if there exists a $C > 0$ such that $d(x, y) < C$ for an arbitrary
    $x, y \in M$, and the minimum and maximum values are the upper and lower limits
    if $M$ is bounded from above and below, respectively.


    Example 26 An arbitrary Cauchy sequence is bounded. In fact, for any $\epsilon
    > 0$, we can choose $N := N(\epsilon)$ such that $m, n \ge N \Rightarrow d(x_m,
    x_n) < \epsilon$, and we have


    $$\min\{x_1, \dots, x_{N-1}, x_N - \epsilon\} \le x_n \le \max\{x_1, \dots, x_{N-1},
    x_N + \epsilon\}.$


    Example 27 ($\mathbb{Q}$ is Not Complete) The sequence $\{a_n\}$ defined by $a_1=1$,
    $a_{n+1} = \frac{1}{2}a_n + \frac{1}{a_n}$ ($n \ge 1$) is in $\mathbb{Q}$. However,
    we can prove that $\{a_n\}$ is a Cauchy sequence in $\mathbb{Q}$ but $a_n \to
    \sqrt{2} \notin \mathbb{Q}$ (Exercise 17).


    Proposition 6 $\mathbb{R}$ is complete.


    $^2 \{x_n\}$ with $x_n \in M$ for each $n$.'

    Proof: The claim is due to BochnerвАЩs theorem (Proposition 5). See the appendix
    at the end of this chapter for details.


    Based on Proposition 45, we generate $\sqrt{2} \cos(\omega^\top x + b)$ $m \ge
    1$ times, i.e., $(w_i, b_i), i = 1, \dots, m$, and construct the function


    $z_i(x) = \sqrt{2} \cos(\omega_i^\top x + b_i) \quad i = 1, \dots, m.$


    From the law of large numbers, the constructed


    $\hat{k}(x, y) := \frac{1}{m} \sum_{i=1}^m z_i(x) z_i(y)$


    approaches $k(x, y)$. Utilizing this fact, when $m$ is small compared to $N$,
    the method to reduce the complexity of kernel computation is called random Fourier
    features (RFF).


    We claim that the RFF possesses the following property:


    $P(|k(x, y) - \hat{k}(x, y)| \ge \epsilon) \le 2 \exp(-m\epsilon^2/8) \quad (4.29)$


    **Proposition 46 (HoeffdingвАЩs Inequality)** *For independent random variables
    $X_i, i = 1, \dots, n$, each of which takes values in $[a_i, b_i]$, and an arbitrary
    $\epsilon > 0$, we have*


    $P(|\overline{X} - \mathbb{E}[\overline{X}]| \ge \epsilon) \le 2 \exp\left(-\frac{2n^2\epsilon^2}{\sum_{i=1}^n
    (b_i - a_i)^2}\right) \quad (4.30)$


    where $\overline{X}$ denotes the sample mean $(X_1 + \dots + X_n)/n$.



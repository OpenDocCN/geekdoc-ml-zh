    \n48. еЬ®ж†Є PCA дЄ≠пЉМжИСдїђеЄМжЬЫдЄЇдЄАдЄ™дЄ≠ењГеМЦзЪД Gram зЯ©йШµжЙЊеИ∞ $\\alpha$пЉМе¶В (4.9) жЙАз§ЇгАВйАЪињЗе°ЂеЖЩдЄЛйЭҐзЪДз©ЇзЩљжЭ•еЃМжИРеЗљжХ∞ `kernel_pca_train`гАВ\n\
    \n```python\ndef kernel_pca_train(x, k):\n    n = x.shape[0]\n    K = np.zeros((n,\
    \ n))\n    S = [0] * n; T = [0] * n\n    for i in range(n):\n        for j in\
    \ range(n):\n            K[i, j] = k(x[i, :], x[j, :])\n    for i in range(n):\n\
    \        S[i] = np.sum(K[i, :])\n    for j in range(n):\n        T[j] = np.sum(K[:,\
    \ j])\n    U = np.sum(K)\n    for i in range(n):\n        for j in range(n):\n\
    \            K[i, j] = K[i, j] - S[i] / n - T[j] / n + U / n**2\n    val, vec\
    \ = np.linalg.eig(K)\n    idx = val.argsort()[::-1]  # decreasing order as R\n\
    \    val = val[idx]\n    vec = vec[:, idx]\n    alpha = np.zeros((n, n))\n   \
    \ for i in range(n):\n        alpha[:, i] = vec[:, i] / val[i]**0.5\n    return\
    \ alpha\n```\n\nеЯЇдЇОдїОжХ∞жНЃ $X$гАБж†ЄеЗљжХ∞ $k$ еТМеЗљжХ∞ `kernel_pca_train` еЊЧеИ∞зЪД $\\alpha$пЉМжИСдїђеЄМжЬЫиЃ°зЃЧ\
    \ $z \\in \\mathbb{R}^{N \\times p}$пЉИ$x_1, \\dots, x_N$ дЄ≠зЪДдїїжДПдЄАдЄ™пЉЙзЪДеЊЧеИЖпЉИжЬАе§Ъ $1 \\leq\
    \ m \\leq p$ зїіпЉЙгАВеЃМжИРдЄЛйЭҐзЪДеЗљжХ∞пЉЪ\n\n```python\ndef kernel_pca_test(x, k, alpha, m, z):\n\
    \    n = x.shape[0]\n    pca = np.zeros(m)\n    for i in range(n):\n        pca\
    \ = pca + alpha[i, 0:m] * k(x[i, :], z)\n    return pca\n```\n\nж£АжЯ•жЮДйА†зЪДеЗљжХ∞жШѓеР¶иГљдЄОдї•дЄЛз®ЛеЇПдЄАиµЈеЈ•дљЬпЉЪ\n\
    \n```python\nsigma2 = 0.01\ndef k(x, y):\n    return np.exp(-np.linalg.norm(x\

    # 1.6 Kernels for Strings, Trees, and Graphs


    As discussed in Chap.4, the space $E$ of the covariates is projected via the feature
    map $\Psi : E \to H$. The method of evaluating similarity via the inner product
    (kernel) in another linear space ( RKHS ) has been widely used in machine learning
    and data science. If the similarities between the elements of the set $E$ are
    accurately represented, then this approach yields improved regression and classification
    processing performance. As this is a kernel configuration method, we provide the
    notions of convolutional and marginalized kernels and illustrate them by introducing
    string, tree, and graph kernels.


    First, we define positive definite kernels $k_1, \dots, k_d$ for the sets $E_1,
    \dots, E_d$. Suppose that we define a set $E$ and a map $R : E_1 \times \cdots

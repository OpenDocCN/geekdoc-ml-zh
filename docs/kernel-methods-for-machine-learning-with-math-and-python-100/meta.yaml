    the following, we consider the unbiased estimator


    $$\widehat{\text{MMD}}_U^2 = \frac{1}{n(n-1)} \sum_{i \neq j} h(z_i, z_j)$$


    for


    $$h(z_i, z_j) := k(x_i, x_j) + k(y_i, y_j) - k(x_i, y_j) - k(x_j, y_i) \quad (5.6)$$


    with $z_i = (x_i, y_i)$.


    We define


    $$h_c(z_1, \dots, z_c) := \mathbb{E}_{Z_{c+1} \dots Z_m} h(z_1, \dots, z_c, Z_{c+1},
    \dots, Z_m),$$


    which is obtained by taking the expectation of the $U$ statistics (5.5) over $Z_{c+1},
    \dots, Z_m$ for $1 \le c \le m$. Moreover, we define


    $$\tilde{h}_c(z_1, \dots, z_c) := h_c(z_1, \dots, z_c) - \theta$$


    for $\theta = \mathbb{E}[h(Z_1, \dots, Z_m)]$.



    Proof: If $\{e_j\}$ forms an orthonormal basis of $H$, we can express an arbitrary
    $x \in H$ as $x = \sum_{j=1}^\infty \langle x, e_j \rangle e_j$. $E := \{x \in
    H : \langle x, e_j \rangle \in \mathbb{Q}, j = 1, 2, \dots\}$ is dense and countable.
    In fact, $\{\langle x, e_j \rangle\}$ and $\{e_j\}$ are countable sets, as is
    $E$, that is, the combination of these two sets, which means that $H$ is separable.
    On the other hand, if $H$ is separable, by extracting linearly independent elements
    from $H$ that are dense and countable via Gram-Schmidt''s method, we can construct
    an orthonormal basis $\{e_n\}$. Thus, we see that any linear combination of these
    elements is dense in $H$. From the third part of Proposition 16, $\{e_j\}$ is
    an orthonormal basis of $H$. $\square$


    Proposition 17 implies the following:


    **Proposition 18** $L^2[a, b]$ is separable under the $L^2$ norm.


    In this book, we assume that the Hilbert space we deal with is separable.


    # 2.4 Projection Theorem


    Let $V$ and $M$ be a linear space equipped with an inner product and its subspace,
    respectively. We define the orthogonal complement of $M$ as


    $$M^\perp := \{x \in V : \langle x, y \rangle = 0 \text{ for all } y \in M\}.$$


    For subspaces $M_1$ and $M_2$ of $V$, we write the direct sum of $M_1$, $M_2$
    as $M_1 + M_2$. In particular, when $M_1$, $M_2$ are orthogonal to each other,
    i.e.,


    $$x_1 \perp x_2, \quad x_1 \in M_1, \quad x_2 \in M_2, \tag{2.9}$$


    we write it as $M_1 \oplus M_2 := \{x_1 + x_2 : x_1 \in M_1, x_2 \in M_2\}$.


    **Proposition 19** (Projection Theorem) *Let $M$ be a closed subset of a Hilbert
    space $H$. Then, for an arbitrary $x \in H$, there exists a $y \in M$ that minimizes
    $\|x - y\|$. Moreover such a $y$ satisfies*



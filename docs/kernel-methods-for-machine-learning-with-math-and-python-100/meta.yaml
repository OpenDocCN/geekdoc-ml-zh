    \ k, alpha, 2, x[i, :])\n\nmin1 = np.min(z[:, 0]); min2 = np.min(z[:, 1])\nmax1\
    \ = np.max(z[:, 0]); max2 = np.max(z[:, 1])\nplt.xlim(min1, max1)\nplt.ylim(min2,\
    \ max2)\nplt.xlabel(\"First\")\nplt.ylabel(\"Second\")\nplt.title(\"Kernel_PCA_(Gauss_0.01)\"\
    )\nfor i in range(n):\n    if i != 4:\n        plt.text(x = z[i, 0], y = z[i,\
    \ 1], s = i)\nplt.text(z[4, 0], z[4, 1], 5, c = \"r\")\n```\n\n49. иѓБжШОжЩЃйАЪ PCA еТМдљњзФ®зЇњжАІж†ЄзЪДж†Є\

    \ \\Psi_{2,1}(y_1, y_2) \\rangle_H = 1 + x_1y_1 + x_2y_2 = 1 + x^\\top y = k(x,\
    \ y)$\n\n$\\langle \\Psi_{2,2}(x_1, x_2), \\Psi_{2,2}(y_2, y_2) \\rangle_H = 1\
    \ + x_1^2y_1^2 + x_2^2y_2^2 + 2x_1y_1 + 2x_2y_2 + 2x_1x_2y_1y_2$\n\n$= (1 + x_1y_1\
    \ + x_2y_2)^2 = (1 + x^\\top y)^2 = k(x, y)$.\n\n**Example 11** *(Infinite-Dimensional\
    \ Polynomial Kernel)* Let $0 < r \\le \\infty, d \\ge 1$, and $E := \\{x \\in\
    \ \\mathbb{R}^d \\| \\|x\\|_2 < \\sqrt{r}\\}$. Let $f : (-r, r) \\to \\mathbb{R}$\
    \ be $C^\\infty$. We assume that the function can be Taylor-expanded by\n\n$f(x)\
    \ = \\sum_{n=0}^{\\infty} a_n x^n, \\quad x \\in (-r, r)$.\n\nIf $a_0 > 0, a_1,\
    \ a_2, \\dots \\ge 0$, then $f(x^\\top y)$ is a positive definite kernel for $x,\
    \ y \\in E$. The exponential type is an infinite-dimensional polynomial kernel\
    \ and is positive definite.\n\n**Example 12** In Example 2, we use the Nadaraya-Watson\
    \ estimator to determine the Gaussian kernel (Figs. 1.2 and 1.3).\n\n```\npython\n\
    def K(x, y, sigma2):\n    return np.exp(-np.linalg.norm(x - y)**2/2/sigma2)\n\n\
    def F(z, sigma2):  # Function Definition f\n    S=0; T=0\n    for i in range(n):\n\
    \        S = S + K(x[i], z, sigma2) * y[i]\n        T = T + K(x[i], z, sigma2)\n\
    \    return S / T\n```\n\nWe often obtain the optimal value for each of the kernel\

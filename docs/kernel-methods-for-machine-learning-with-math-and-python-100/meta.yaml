    # 5.3 The HSIC and Independence Test


    Let $(E, \mathcal{F}, P)$ be a probability space. We say that events $A, B \in
    \mathcal{F}$ are independent if $P(A)P(B) = P(A \cap B)$.


    Suppose that sequences $x_1, \dots, x_N \in \mathbb{R}$ and $y_1, \dots, y_N \in
    \mathbb{R}$ with the same length $N \ge 1$ have occurred according to the distributions
    of the random variables $X, Y$. We wish to test the independence of $X, Y$, where
    both $x_i, x_j$ and $y_i, y_j$ are independent, but we do not know whether $x_i,
    y_i$ are independent.


    For example, if the empirical correlation coefficient


    $$\hat{\rho} = \frac{(1/N) \sum_{i=1}^N (x_i - \bar{x}) \sum_{i=1}^N (y_i - \bar{y})}{\{(1/N)
    \sum_{i=1}^N (x_i - \bar{x})^2\}^{1/2} \{(1/N) \sum_{i=1}^N (y_i - \bar{y})^2\}^{1/2}}$$


    is close to zero for $\bar{x} := (1/N) \sum_{i=1}^N x_i$ and $\bar{y} := (1/N)
    \sum_{i=1}^N y_i$, then we may say that the variables are independent.


    **Example 74** (Gaussian Distribution) For simplicity, we assume that $X, Y$ follows
    the standard Gaussian distribution. If $X, Y$ are independent (written as $X \perp\!\!\perp
    Y$), then their covariance


    $$\mathbb{E}[XY] = \int_E \int_E xy f_{XY}(x, y) dxdy = \int_E \int_E xy f_X(x)
    f_Y(y) dxdy = \int_E x f_X(x) dx \int_E y f_Y(y) dy$$


    is 0, and $\rho_{XY} = \mathbb{E}[XY] = 0$ follows. Since we can write $f_{XY}(x,
    y)$ as


    $$\frac{1}{2\sqrt{1 - \rho_{XY}^2}} \exp\left\{-\frac{1}{2(1 - \rho_{XY}^2)} (x^2
    - 2\rho_{XY}xy + y^2)\right\},$$


    we see that $\rho_{XY} = 0$ implies $f_{XY}(x, y) = f_X(x) f_Y(y)$. Hence, $\rho_{XY}
    = 0 \Longleftrightarrow X \perp\!\!\perp Y$ follows.


    However, as in the following derivation, in general, $\rho_{XY} = 0$ does not
    mean that $X \perp\!\!\perp Y$.


    **Example 75** Let $X = \cos \theta$ and $Y = \sin \theta$. We uniformly generate
    random variables $0 \le \theta < 2\pi$, which means that $(X, Y)$ is uniform over
    the unit circle. If $X$ is determined, then $Y = \pm \sqrt{1 - X^2}$, and if one
    of $X, Y$ is determined, then at most two possibilities exist for the other. Therefore,
    the two variables are not independent. However, since the mean of $X, Y$ is $\mu_X
    = \mu_Y = 0$, the covariance can be calculated as


    $$\mathbb{E}_{XY}[(X - \mu_X)(Y - \mu_Y)] = \mathbb{E}_{XY}[XY] = \mathbb{E}_{XY}[\cos
    \theta \sin \theta] = \frac{1}{2} \mathbb{E}_{XY}[\sin 2\theta] = 0$$


    and the correlation coefficient $\rho_{XY}$ is 0.'

    # 2.5 Linear Operators


    Let $X_1, X_2$ be linear spaces with norms of $\|\cdot\|_1, \|\cdot\|_2$, respectively,
    and let $T : X_1 \to X_2$ be the map that linearly transforms an element in $X_1$
    to an element in $X_2$. We call such a $T$ a linear operator. We define an image
    and a kernel by


    $$\mathrm{Im}(T) := \{Tx : x \in X_1\} \subseteq X_2$$


    and


    $$\mathrm{Ker}(T) := \{x \in X_1 : Tx = 0\} \subseteq X_1,$$


    and we call the dimensionality of $\mathrm{Im}(T)$ the rank of $T$. We say that
    the linear operator $T : X_1 \to X_2$ is bounded if for each $x \in X_1$, there
    exists a constant $C > 0$ such that


    $$\|Tx\|_2 \leq C\|x\|_1.$$


    We write the set of such $T$''s as $B(X_1, X_2)$. In particular, we write $B(X_1,
    X_2)$ as $B(X)$ when $X_1 = X_2 = X$.


    **Proposition 21** *A linear operator $T$ is bounded if and only if $T$ is uniformly
    continuous.*


    Proof: If $T$ is uniformly continuous, then there exists a $\delta > 0$ such that
    $\|x\|_1 \leq \delta \Rightarrow \|Tx\|_2 \leq 1$. Since $\|\frac{\delta x}{\|x\|}\|
    \leq \delta$, we have


    $$\|Tx\|_2 = \|T(\frac{\delta x}{\|x\|_1})\|_2 \frac{\|x\|_1}{\delta} \leq \frac{\|x\|_1}{\delta}$$


    for any $x \neq 0$. On the other hand, if $T$ is bounded, there exists a constant
    $C$ that does not depend on $x \in X_1$ such that


    $$\|T(x_n - x)\|_2 \leq C\|x_n - x\|_1$$


    for any $\{x_n\}$ and an $x \in X_1$ such that $x_n \to x$ as $n \to \infty$.
    $\square$


    Hereafter, we define the operator norm of $T \in B(X_1, X_2)$ by


    $$\|T\| := \sup_{x \in X_1, \|x\|_1 = 1} \|Tx\|_2. \tag{2.12}$$'
  - '[PAGE 53]


    Thus, for an arbitrary $x \in X_1$, we have


    $$\|Tx\|_2 \leq \|T\| \|x\|_1 \,.$


    **Example 41** Let $X_1 := \mathbb{R}^p$ and $X_2 := \mathbb{R}^q$. If the norm
    is the Euclidean norm, then we can write the linear operator $T : \mathbb{R}^p
    \to \mathbb{R}^q$ as $T : x \mapsto Bx$ by using some $B \in \mathbb{R}^{q \times
    p}$. If the matrix $B$ is square, the norm $\|T\|$ is the square root of the maximum
    eigenvalue of the nonnegative definite matrix $A := B^\top B$.


    $$\|T\|^2 = \max_{\|x\|=1} x^\top B^\top Bx = \max_{\|x\|=1} \|Bx\|^2 \,.$


    **Example 42** For $K : [0, 1]^2 \to \mathbb{R}$, let


    $$\int_0^1 \int_0^1 K^2(x, y) dxdy$$


    be finite. We define the integral operator by the linear operator $T$ in $L^2[0,
    1]$ such that


    $$(Tf)(\cdot) = \int_0^1 K(\cdot, x) f(x) dx \qquad (2.13)$$


    for $f \in L^2[0, 1]$. Note that (2.13) belongs to $L^2[0, 1]$ and that $T$ is
    bounded: From


    $$|(Tf)(x)|^2 \leq \int_0^1 K^2(x, y) dy \int_0^1 f^2(y) dy = \|f\|_2^2 \int_0^1
    K^2(x, y) dy \,,$$


    we have


    $$\|Tf\|_2^2 = \int_0^1 |(Tf)(x)|^2 dx \leq \|f\|_2^2 \int_0^1 \int_0^1 K^2(x,
    y) dxdy \,.$


    We call such a $K$ an integral operator kernel and distinguish between the positive
    definite kernels we deal with in this book.


    In particular, we call any linear operator with $X_2 = \mathbb{R}$ a linear functional.


    **Proposition 22** (Riesz''s Representation Theorem) *Let $H$ be a Hilbert space
    with an inner product $\langle \cdot, \cdot \rangle$ and a norm of $\| \cdot \|$,
    and let $T \in B(H, \mathbb{R})$. Then, there exists a unique $e_T \in H$ such
    that*


    $$Tf = \langle f, e_T \rangle \,, \quad f \in H \qquad (2.14)$$


    *and $\|T\| = \|e_T\|$.*'
- md: '## 2.6 Compact Operators


    Let $(M, d)$ and $E$ be a metric space and a subset of $M$, respectively. If any
    infinite sequence in $E$ contains a subsequence that converges to an element in
    $E$, then we say that $E$ is sequentially compact. If $\{x_n\}$ has a subsequence
    that converges to $x$, then $x$ is a convergence point of $\{x_n\}$.


    **Example 46** Let $E := \mathbb{R}$ and $d(x, y) := |x - y|$ for $x, y \in \mathbb{R}$.
    Then, $E$ is not sequentially compact. In fact, the sequence $x_n = n$ has no
    convergence points. For $E = (0, 1]$, the sequence $x_n = 1/n$ converges to $0
    \notin (0, 1]$ as $n \to \infty$, and the convergence point of any subsequence
    is only 0. Therefore, $E = (0, 1]$ is not sequentially compact.


    **Proposition 24** *Let $(M, d)$ and $E$ be a metric space and a subset of $M$,
    respectively. Then, $E$ is sequentially compact if and only if $E$ is compact.*


    Proof: Many books on geometry deal with the proof of equivalence. See such books
    for the details of this proof.


    In this section, we explain compactness by using the terminology of sequential
    compactness.


    Let $X_1, X_2$ be linear spaces equipped with norms, and let $T \in B(X_1, X_2)$.
    We say that $T$ is compact if $\{Tx_n\}$ contains a convergence subsequence for
    any bounded sequence $\{x_n\}$ in $X_1$.


    **Example 47** The orthonormal basis $\{e_j\}$ in a Hilbert space $H$ is bounded
    because $\|e_j\| = 1$. However, for an identity map, we have that $\|e_i - e_j\|
    = \sqrt{2}$ for any $i \neq j$. Thus, the sequence $e_1, e_2, \dots$ does not
    have any convergence points in $H$. Hence, the identity operator for any infinite-dimensional
    Hilbert space is not compact.


    **Proposition 25** *For any bounded linear operator $T$, the following hold.*


    - 1. If the rank is finite, then the operator $T$ is compact.

    - 2. If a sequence of finite-rank operators $\{T_n\}$ exists such that $\|T_n
    - T\| \to 0$ as $n \to \infty$, then $T$ is compact$^8$.


    Proof: See the appendix at the end of this chapter.


    Let $H$ and $T \in B(H)$ be a Hilbert space and its bounded linear operator, respectively.
    If $\lambda \in \mathbb{R}$ and $0 \neq e \in H$ exist such that


    $$Te = \lambda e \,,$$


    then we say that $\lambda$ and $e$ are an eigenvalue and an eigenvector of $T$,
    respectively.


    **Proposition 26** *Let $T \in B(H)$ and $e_j \in \text{Ker}(T - \lambda_j I)$
    for $j = 1, 2, \dots$ If the eigenvalues $\lambda_j \neq 0$ have different values,
    then*


    1. $e_j$ is linearly independent.

    2. If $T$ is self-adjoint, then $\{e_j\}$ are orthogonal.


    Proof: See the appendix at the end of this chapter.


    **Example 48** Let $T \in B(H)$ be a compact operator. For each eigenvalue $\lambda
    \neq 0$, the eigenspace $\text{Ker}(T - \lambda I)$ has a finite dimensionality.
    In fact, if $\text{Ker}(T - \lambda I)$ is of infinite dimensionality for an eigenvalue
    $\lambda \neq 0$, then $\lambda$ contains infinitely many eigenvectors $e_j$,
    and if we apply the operator $T$ to them, then as in Example 47, $\{\lambda e_j\}$
    does not have any convergence subsequence. Thus, $T$ is not compact, which is
    a contradiction.


    **Example 49** For any $C > 0$, the absolute values of a finite number of eigenvalues
    $\lambda_i$ for a compact operator $T$ exceed $C$. Suppose that the absolute values
    of an infinite number of eigenvalues $\lambda_1, \lambda_2, \dots$ exceed $C$.
    Let $M_0 := \{0\}$, $M_i := \text{span}\{e_1, \dots, e_i\}$, $e_j \in \text{Ker}(T
    - \lambda_j I)$, $j = 1, 2, \dots$, $i = 1, 2, \dots$. Since the $\{e_1, \dots,
    e_i\}$ are linearly independent, each $M_i \cap M_{i-1}^\perp$ is one dimensional
    for $i = 1, 2, \dots$. Thus, if we define the orthonormal sequence $x_i \in \text{Ker}(T
    - \lambda_i I) \cap M_{i-1}^\perp$, $i = 1, 2, \dots$ via Gram-Schmidt, then we
    have


    $$\|Tx_i - Tx_k\|^2 = \|Tx_i\|^2 + \|Tx_k\|^2 \geq 2C^2$$


    for $i > k$. Thus, $\{Tx_i\}$ has no convergence subsequence.


    Example 49 implies that the set of nonzero eigenvalues of $T$ is countable.

    We summarize the above discussion and its implications below.


    **Proposition 27** Let $T$ be a self-adjoint compact operator of a Hilbert space
    $H$. Then, the set of nonzero eigenvalues of $T$ is finite, or the sequence of
    eigenvalues converges to zero. Each eigenvalue has a finite multitude, and any
    pair of eigenvectors corresponding to different eigenvalues is an orthogonal pair.
    Let $\lambda_1, \lambda_2, \dots$ be a sequence of eigenvalues such that $|\lambda_1|
    \geq |\lambda_2| \geq \dots$, and let $e_1, e_2, \dots$ be any corresponding eigenvectors
    that are orthogonal (orthogonalized eigenvectors via Gram-Schmidt) if they possess
    the same eigenvalue. Then, $\{e_j\}$ is the orthonormal basis of $\overline{\text{Im}(T)}$,
    and we can express $T$ by


    $$Tx = \sum_{j=1}^{\infty} \lambda_j \langle x, e_j \rangle e_j \quad (2.16)$$


    for each $x \in H$.


    Proof: We utilize the following steps, where the second item is equivalent to
    $(\text{Ker}(T))^\perp = \overline{\text{Im}(T)}$ because $T = T^*$.


    1. Show that $H = \text{Ker}(T) \oplus (\text{Ker}(T))^\perp$.

    2. Show that $(\text{Ker}(T))^\perp = \overline{\text{Im}(T^*)}$.

    3. Show that $\overline{\text{span}\{e_j \mid j \ge 1\}} \subseteq \text{Im}(T)$.

    4. Show that $\overline{\text{span}\{e_j \mid j \ge 1\}} \supseteq \text{Im}(T)$.


    See the appendix at the end of this chapter.


    We say that an operator $T$ is nonnegative definite if


    $$\langle Tx, x \rangle = \left\langle \sum_{i=1}^\infty \lambda_i \langle x,
    e_i \rangle e_i, \sum_{j=1}^\infty \langle x, e_j \rangle e_j \right\rangle =
    \sum_{i=1}^\infty \lambda_i \langle x, e_i \rangle^2 \ge 0$$


    for arbitrary $H \ni x = \sum_{i=1}^\infty \langle x, e_i \rangle e_i$; this condition
    is equivalent to $\lambda_1 \ge 0$, $\lambda_2 \ge 0$, $\dots$


    **Proposition 28** *If $T$ is nonnegative definite, we have*


    $$\lambda_k = \max_{e \in \text{span}\{e_1, \dots, e_{k-1}\}^\perp} \frac{\langle
    Te, e \rangle}{\|e\|^2} \qquad (2.17)$$


    which expresses the maximum value over the Hilbert space $H$ when $k = 1$.


    Proof: The claim follows from (2.16) and $\lambda_j \ge 0$:


    $$\max_{e \in \{e_1, \dots, e_{k-1}\}^\perp, \|e\|=1} \langle Te, e \rangle =
    \max_{\|e\|=1} \sum_{j=k}^\infty \lambda_j \langle e, e_j \rangle^2 = \lambda_k.$$


    Let $H_1$, $H_2$ be Hilbert spaces, $\{e_i\}$ an orthonormal basis of $H_1$, and
    $T \in B(H_1, H_2)$.


    If


    $$\sum_{i=1}^\infty \|Te_i\|^2$$


    takes a finite value, we say that $T$ is a Hilbert-Schmidt (HS) operator, and
    we write the set of HS operators in $B(H_1, H_2)$ as $B_{HS}(H_1, H_2)$.


    We define the inner product of $T_1, T_2 \in B_{HS}(H_1, H_2)$ and the HS norm
    of $T \in B_{HS}(H_1, H_2)$ by $\langle T_1, T_2 \rangle_{HS} := \sum_{j=1}^\infty
    \langle T_1 e_j, T_2 e_j \rangle_2$ and


    $$\|T\|_{HS} := \langle T, T \rangle_{HS}^{1/2} = \left\{ \sum_{i=1}^\infty \|Te_i\|_2^2
    \right\}^{1/2},$$


    respectively.


    **Proposition 29** *The HS norm value of $T \in B(H_1, H_2)$ does not depend on
    the choice of orthonormal basis $\{e_i\}$.*


    Proof: Let $\{e_{1,i}\}$, $\{e_{2,j}\}$ be arbitrary orthonormal bases of Hilbert
    spaces $H_1$, $H_2$, and let $T_1, T_2 \in B(H_1, H_2)$. Then, for $T_k e_{1,i}
    = \sum_{j=1}^\infty \langle T_k e_{1,i}, e_{2,j} \rangle_2 e_{2,j}$, $T_k^* e_{2,j}
    = \sum_{i=1}^\infty \langle T_k^* e_{2,j}, e_{1,i} \rangle_1 e_{1,i}$, and $k
    = 1, 2$, we have


    Proof: See the appendix at the end of this chapter.


    **Example 43** (*RKHS*) Let $x \in E$, and let $T_x : H \to \mathbb{R}$ be the
    map from $f \in H$ to $f(x)$. Then, $T_x$ is linear because


    $$T_x(af + bg) = (af + bg)(x) = af(x) + bg(x) = aT_x(f) + bT_x(g) .$$


    We assume that $T_x$ is bounded for each $x \in E$. Then, from Proposition 22,
    there exists a $k_x \in H$ such that


    $$f(x) = T_x(f) = \langle f, k_x \rangle$$


    $x \in E$, and $\|T_x\| = \|k_x\|$.


    **Proposition 23** (*Adjoint Operator*) Let $H_i$ be a Hilbert space with an inner
    product $\langle \cdot, \cdot \rangle_i$ for $i = 1, 2$ and $T \in B(H_1, H_2)$.
    Then, there exists a $T^* \in B(H_2, H_1)$ such that


    $$\langle Tx_1, x_2 \rangle_2 = \langle x_1, T^*x_2 \rangle_1 , \quad x_1 \in
    H_1, \quad x_2 \in H_2 .$$


    Proof: If we fix $x_2 \in H_2$ and regard $\langle Tx_1, x_2 \rangle_2$ as a function
    of $x_1 \in H_1$, then from $x_1 \mapsto \langle Tx_1, x_2 \rangle_2 \leq \|x_1\|_2
    \|x_2\|_2$, $T$ is a bounded operator w.r.t. $x_1 \in H_1$. From Proposition 22,
    for each $x_2 \in H_2$, there exists $y_2(x_2) \in H_1$ such that $\langle Tx_1,
    x_2 \rangle_2 = \langle x_1, y(x_2) \rangle_1$. If we define $T^*x_2 = y_2(x_2)$,
    then $T^*$ is a bounded linear map. The boundness property is due to


    $$\|T^*x_2\|_1^2 = |\langle x_2, TT^*x_2 \rangle|_2 \leq \|T\| \|T^*x_2\|_1 \|x_2\|_2
    .$$


    We call the $T^*$ in Proposition 23 the adjoint operator of $T$. In particular,
    if $T^* = T$, we call such an operator $T$ self-adjoint.


    **Example 44** Let $H = \mathbb{R}^p$. We can express any $T \in B(H)$ by a square
    matrix $T \in \mathbb{R}^{p \times p}$. From


    $$\langle Tx, y \rangle = x^\top T^\top y = \langle x, T^\top y \rangle ,$$


    we see that the adjoint $T^*$ is the transpose matrix of $T^\top$ and that $T$
    can be written as a symmetric matrix if and only if $T$ is self-adjoint.


    **Example 45** For the integral operator of $L^2[0, 1]$ in Example 42, from Fubini''s
    theorem, we have that


    $$\langle Tf, g \rangle = \int_0^1 \int_0^1 K(x, y) f(x) g(y) dx dy = \langle
    f, \int_0^1 K(y, \cdot) g(y) dy \rangle ,$$


    and $y \mapsto (T^*g)(y) = \int_0^1 K(x, y) g(x) dx$ is an adjoint operator. If
    the integral operator kernel $K$ is symmetric, the operator $T$ is self-adjoint.


    $^8$ It is known that the converse is true.'

    \ variance of $f(\\omega, x) - m(x)$ are 0 and $k(x, x)$, respectively, and the\
    \ covariance between $f(\\omega, x) - m(x)$ and $f(\\omega, y) - m(y)$ is $k(x,\
    \ y)$, from\n\n$$\\begin{aligned} \\mathbb{E}[|f(\\omega, x) - f(\\omega, y)|^2]\
    \ &= \\mathbb{E}[\\{(f(\\omega, x) - m(x)) - \\{f(\\omega, y) - m(y)\\} - \\{m(x)\
    \ - m(y)\\}\\}^2] \\\\ &= k(x, x) + k(y, y) - 2k(x, y) + \\{m(x) - m(y)\\}^2.\
    \ \\end{aligned}$$\n\nThe continuity of $m, k$ implies (6.30). Conversely, if\
    \ we assume (6.30), then the continuity of $m$ is obtained from\n\n$$|m(x) - m(y)|\
    \ = |\\mathbb{E}[f(\\omega, x) - f(\\omega, y)]| \\leq \\{\\mathbb{E}[|f(\\omega,\
    \ x) - f(\\omega, y)|^2]\\}^{1/2}.$$\n\nWithout loss of generality, if we assume\
    \ that $m \\equiv 0$, then we have\n\n$$k(x, y) - k(x', y') = \\{k(x, y) - k(x',\
    \ y)\\} + \\{k(x', y) - k(x', y')\\},$$\n\nand each of the right-hand side terms\
    \ are bounded by\n\n$$\\begin{aligned} |k(x, y) - k(x', y)| &= |\\mathbb{E}[f(\\\
    omega, x)f(\\omega, y)] - \\mathbb{E}[f(\\omega, x')f(\\omega, y)]| \\\\ &\\leq\
    \ \\mathbb{E}[f(\\omega, y)^2]^{1/2}\\mathbb{E}[|f(\\omega, x) - f(\\omega, x')|^2]^{1/2}\
    \ = \\{k(y, y)\\}^{1/2}\\{\\mathbb{E}[|f(\\omega, x) - f(\\omega, x')|^2]\\}^{1/2}\
    \ \\end{aligned}$$\n\nand\n\n$$|k(x', y) - k(x', y')| \\leq \\{k(x', x')\\}^{1/2}\\\
    {\\mathbb{E}[|f(\\omega, y) - f(\\omega, y')|^2]\\}^{1/2}.$$"

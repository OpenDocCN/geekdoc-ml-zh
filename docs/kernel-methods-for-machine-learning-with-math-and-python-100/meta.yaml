  md: 'under $y_i(x_i\beta + \beta_0) \geq 1 - \epsilon_i$, $\epsilon_i \geq 0$ for
    $i = 1, \dots, N$ by using a constant $C > 0$ (the prime problem). We further
    transform it into the problem of finding $0 \leq \alpha_i \leq C$, $i = 1, 2,
    \dots, N$ that maximizes


    $$\sum_{i=1}^N \alpha_i - \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N \alpha_i \alpha_j
    y_i y_j x_i x_j^\top \quad (4.11)$$


    under $\sum_{i=1}^N \alpha_i y_i = 0$, where $x_i$ is the $i$th row vector of
    $X$ (the dual problem)$^1$. The constant $C > 0$ is a parameter that represents
    the flexibility of the boundary surface. The higher the value is, the more samples
    are used to determine the boundary (samples with $\alpha_i \neq 0$, i.e., support
    vectors). Although we sacrifice the fit of the data, we reduce the boundary variation
    caused by sample data to prevent overtraining. Then, from the support vectors,
    we can calculate the slope of the boundary with the following formula:


    $$\beta = \sum_{i=1}^N \alpha_i y_i x_i^\top \in \mathbb{R}^p.$$


    Then, suppose that we replace the boundary surface with a curved surface by replacing
    the inner product $x_i x_j^\top$ with a general nonlinear kernel $k(x_i, x_j)$.
    Then, we can obtain complicated boundary surfaces rather than planes. However,
    the theoretical basis for replacing the product with a kernel is not clear.


    Therefore, in the following, we derive the same results by formulating the optimization
    using $k : E \times E \to \mathbb{R}$. As in to the previous application of the
    representation theorem, we find the $f \in H$ that minimizes


    $$\frac{1}{2} \|f\|_H^2 + C \sum_{i=1}^N \epsilon_i - \sum_{i=1}^N \alpha_i [y_i
    \{f(x_i) + \beta_0\} - (1 - \epsilon_i)] - \sum_{i=1}^N \mu_i \epsilon_i. \quad
    (4.12)$$


    Noting that $f(x_i) = f_1(x_i)$, $i = 1, \dots, N$ and $\|f\|_H \geq \|f_1\|_H$,
    we find $\gamma_1, \dots, \gamma_N$ such that $f(\cdot) = \sum_{i=1}^N \gamma_i
    k(x_i, \cdot)$.


    The Karush-Kuhn-Tucker (KKT) condition results in the following nine equations:


    $$y_i \{f(x_i) + \beta_0\} - (1 - \epsilon_i) \geq 0$$

    $$\epsilon_i \geq 0$$

    $$\alpha_i [y_i \{f(x_i) + \beta_0\} - (1 - \epsilon_i)] = 0$$

    $$\mu_i \epsilon_i = 0$$


    > $^1$ We see this derivation in several references, such as Joe Suzuki, вАЬStatistical
    Learning with Math and PythonвАЭ (Springer); C. M. Bishop, вАЬPattern Recognition
    and Machine LearningвАЭ (Springer); Hastie, Tibshirani, and Friedman, вАЬElements
    of Statistical LearningвАЭ (Springer); and other primary machine learning books.'

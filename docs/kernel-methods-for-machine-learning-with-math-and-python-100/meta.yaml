    \ y) \\phi_i(x_j) = \\lambda_i \\phi_i(y) \\,, \\quad y \\in E \\qquad (3.18)$$\n\
    \n$i = 1, 2, \\dots$ Since we have\n\n$$\\frac{1}{m} \\sum_{i=1}^m \\phi_j(x_i)\
    \ \\phi_k(x_i) = \\delta_{j,k}$$\n\nif we substitute $x_1, \\dots, x_m$ into $y$\
    \ in (3.18), we find that there exists an orthogonal matrix $U \\in \\mathbb{R}^{m\
    \ \\times m}$ such that\n\n$$K_m U = U \\Lambda \\,,$$\n\nwhere $K_m \\in \\mathbb{R}^{m\
    \ \\times m}$ is the Gram matrix and $\\Lambda$ is the diagonal matrix with the\
    \ elements $\\lambda_1^{(m)} = m\\lambda_1, \\dots, \\lambda_m^{(m)} = m\\lambda_m$.\
    \ If we substitute $\\phi_i(x_j) = \\sqrt{m} U_{j,i}$, $\\lambda_i = \\frac{\\\
    lambda_i^{(m)}}{m}$ into (3.18), we obtain\n\n$$\\phi_i(\\cdot) = \\frac{\\sqrt{m}}{\\\
    lambda_i^{(m)}} \\sum_{j=1}^m K(x_j, \\cdot) U_{j,i} \\,. \\qquad (3.19)$$\n\n\
    We require that the distribution of $x_1, \\dots, x_m \\in E$ coincide with the\
    \ measure $\\mu$ of the integral operator. It is known that if we make $m$ larger\
    \ in $\\lambda_i^{(m)}/m$, the term converges to the eigenvalue $\\lambda_i$.\
    \ For the proof and the convergence process, consult Baker (Theorem 3.4 [3]).\n\
    \nWe write the procedure using the Python as below.\n\n**Example 62** We obtain\
    \ the eigenvalue and eigenfunction by using the following program with a Gaussian\
    \ kernel, where the measure required for the definition of the integral kernel\
    \ should be the same as the measure used when providing random numbers. Even with\
    \ the same Gaussian kernel, if $x_1, \\dots, x_N$ follows a different distribution,\
    \ we obtain different eigenvalues and eigenfunctions. We compare the cases in\
    \ which $N = 300$ and $N = 1000$ to find that the eigenvalues and eigenfunctions\
    \ coincide (Figs. 3.2 and 3.3).\n\n### The First 100 Eigenvalues\n\n![](img/075acd5c7a7f62a80a28ffffee1ae5d9_87_0.png)\n\
    \nFig. 3.2 The eigenvalues obtained in Example 62. We compare the cases involving\
    \ $m = 1000$ samples and the first $m = 300$ samples. The largest eigenvalues\
    \ for both cases coincide\n\n```python\n# Kernel Definition\nsigma = 1\ndef k(x,\
    \ y):\n    return np.exp(-(x - y)**2 / sigma**2)\n# Generate Samples and Define\
    \ the Gram Matrix\nm = 300\nx = np.random.randn(m) - 2 * np.random.randn(m)**2\
    \ + 3 * np.random.randn(m)**3\n# Eigenvalues and Eigenvectors\nK = np.zeros((m,\
    \ m))\nfor i in range(m):\n    for j in range(m):\n        K[i, j] = k(x[i], x[j])\n\
    values, vectors = np.linalg.eig(K)\nlam = values / m\nalpha = np.zeros((m, m))\n\
    for i in range(m):\n    alpha[:, i] = vectors[i, :] * np.sqrt(m) / (values[i]\
    \ + 10e-16)\n# Display Graph\ndef F(y, i):\n    S = 0\n    for j in range(m):\n\
    \        S = S + alpha[j, i] * k(x[j], y)\n    return S\ni = 1  ## Execute it\
    \ changing i\ndef G(y):\n    return F(y, i)\nw = np.linspace(-2, 2, 100)\nplt.plot(w,\
    \ G(w))\nplt.title(\"Eigen Values and their Eigen Functions\")\n```\n\nFinally,\
    \ we present the RKHS obtained from Mercer's theorem (Proposition 41). In Example\
    \ 57, we pointed out that the condition was too loose for the $L^2$-space to be\
    \ an RKHS. The following proposition suggests the restrictions that we should\
    \ add.\n\n![](img/075acd5c7a7f62a80a28ffffee1ae5d9_88_0.png)\n\n![](img/075acd5c7a7f62a80a28ffffee1ae5d9_88_1.png)\n\
    \n![](img/075acd5c7a7f62a80a28ffffee1ae5d9_88_2.png)\n\n![](img/075acd5c7a7f62a80a28ffffee1ae5d9_88_3.png)\n\
    \n**Fig. 3.3** The eigenfunctions obtained in Example 62. We show a comparison\
    \ between the functions of the $m = 1000$ samples and the first $m = 300$ samples.\
    \ The eigenfunctions coincide for the first three largest eigenvalues, but they\
    \ are far from each other for the fourth eigenvalue. However, the fourth eigenvalues\
    \ coincide\n\n**Proposition 42** Let $\\{(\\lambda_j, e_j)\\}$ be an eigenvalue\
    \ of an integral operator with a positive definite kernel $k$ and an orthonormal\
    \ eigenfunction. In this case.\n\n$$H = \\left\\{ \\sum_{j=1}^{\\infty} \\beta_j\
    \ e_j \\mid \\sum_{j=1}^{\\infty} \\frac{\\beta_j^2}{\\lambda_j} < \\infty \\\
    right\\}$$\n\n$$\\langle f, g \\rangle_H := \\sum_{j=1}^{\\infty} \\frac{\\int_E\
    \ f(x)e_j(x)d\\eta(x) \\int_E g(x)e_j(x)d\\eta(x)}{\\lambda_j} \\quad (3.20)$$\n\
    \ngives the RKHS.\n\nThe proposition claims that if we restrict the elements $\\\
    sum_{j=1}^{\\infty} \\beta_j e_j$ for which $\\sum_{j=1}^{\\infty} \\beta_j^2\
    \ < \\infty$ to those for which $\\sum_{j=1}^{\\infty} \\frac{\\beta_j^2}{\\lambda_j}\
    \ < \\infty$, the $L^2$ space becomes an RKHS.\n\nProof: From the definition of\
    \ the inner product (3.20), we can write $\\langle e_i, e_j \\rangle_H = \\frac{1}{\\\
    lambda_i} \\delta_{i,j}$. Thus, we have\n\n$$\\int_E \\{\\sum_{j=1}^\\infty \\\
    beta_j e_j(x)\\}^2 d\\beta(x) < \\infty \\Longleftrightarrow \\sum_{j=1}^\\infty\
    \ \\frac{\\beta_j^2}{\\lambda_j} < \\infty,$$\n\nand $H$ is a Hilbert space. From\
    \ Mercer's theorem, we can write $k(x, \\cdot) = \\sum_{j=1}^\\infty \\lambda_j\
    \ e_j(x)e_j(\\cdot)$, so we have\n\n$$\\sum_{j=1}^\\infty \\frac{\\{\\lambda_j\
    \ e_j(x)\\}^2}{\\lambda_j} = \\sum_{j=1}^\\infty \\lambda_j e_j(x)e_j(x) = k(x,\
    \ x) < \\infty$$\n\nand $k(x, \\cdot) \\in H$. Finally, since $\\int_E k(\\cdot,\
    \ y)e_j(y)d\\eta(y) = \\lambda_j e_j(\\cdot)$, we have\n\n$$\\langle f, k(\\cdot,\
    \ x) \\rangle_H = \\sum_{j=1}^\\infty \\frac{1}{\\lambda_j} \\int_E f(y)e_j(y)d\\\
    eta(y) \\int_E k(x, y)e_j(y)d\\eta(y)$$\n$$= \\sum_{j=1}^\\infty \\{\\int_E f(y)e_j(y)d\\\
    eta(y)\\}e_j(x) = f(x),$$\n\nwhich is the reproducing property. $\\square$\n\n\
    As seen from the proof, the eigenvector $\\{e_j\\}$ of Mercer's theorem is orthonormal\
    \ in the $L^2$ space, but in the obtained RKHS, the norm is $\\lambda_j^{-1/2}$.\
    \ We can see that the RKHS reduces $\\{\\beta_j\\}$ faster than the $L^2$ space.\n\
    \n## Appendix\n\n## Proof of Proposition 34\n\nLet $k: E \\times E \\to \\mathbb{R}$\
    \ be the positive definite kernel of a Hilbert space $H$. We show that for the\
    \ linear space $H_0$ spanned by $k(x, \\cdot), x \\in E$, the bivariate function\n\
    \n$$\\langle f, g \\rangle_{H_0} = \\sum_{i=1}^m \\sum_{j=1}^n a_i b_j k(x_i,\
    \ y_j)$$\n\nis an inner product between\n\n$$f(\\cdot) = \\sum_{i=1}^m a_i k(x_i,\
    \ \\cdot) \\text{ and } g(\\cdot) = \\sum_{j=1}^n b_j k(y_j, \\cdot) \\in H_0.\
    \ \\quad (3.21)$$\n\n$$\\langle f, g \\rangle_{H_0} = \\sum_{i=1}^m a_i g(x_i)\
    \ = \\sum_{j=1}^m b_j f(x_j)$$"

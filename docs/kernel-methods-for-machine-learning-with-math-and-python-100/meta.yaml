    \in E$ is


    $P(Y = 1|x) = \frac{1}{1 + \exp(-f(x))}$, (6.5)


    where the Gaussian process $f : \Omega \times E \rightarrow \mathbb{R}$ is used.
    We wish to estimate $f$ from the actual $x_1, \dots, x_N \in \mathbb{R}^p$ (row
    vector) and $y_1, \dots, y_N \in \{-1, 1\}$. To maximize the likelihood, we minimize
    the negative log-likelihood


    $\sum_{i=1}^N \log[1 + \exp\{-y_i f(x_i)\}]$.


    If we set $f_X = [f_1, \dots, f_N]^\top = [f(x_1), \dots, f(x_N)]^\top \in \mathbb{R}^N$,
    $v_i := e^{-y_i f_i}$, and $l(f_X) := \sum_{i=1}^N \log(1 + v_i)$, then we have'

    # Proof of Proposition 19


    Let $M$ be a closed subset of $H$. We show that for each $x \in H$, there exists
    a unique $y \in M$ that minimizes $\|x - y\|$ and that we have


    $$\langle x - y, z - y \rangle \leq 0 \qquad (2.20)$$


    for $z \in M$. To this end, we first show that any sequence $\{y_n\}$ in $M$ for
    which


    $$\lim_{n \to \infty} \|x - y_n\|^2 = \inf_{y \in M} \|x - y\|^2 \qquad (2.21)$$


    is Cauchy. Since $M$ is a linear space, we have $(y_n + y_m)/2 \in M$ and


    $$\|y_n - y_m\|^2 = 2\|x - y_n\|^2 + 2\|x - y_m\|^2 - 4\|x - \frac{y_n + y_m}{2}\|^2$$

    $$\leq 2\|x - y_n\|^2 + 2\|x - y_m\|^2 - 4 \inf_{y \in M} \|x - y\|^2 \to 0.$$


    Hence, $\{y_n\}$ is Cauchy. Then, suppose that more than one lower limit $y$ exists,
    and let $u \neq v$ be such a $y$. For example, for $\{y_n\}$, let $y_{2m-1} \to
    u$, and let $y_{2m} \to v$ satisfy (2.21). However, this limit is not Cauchy and
    contradicts the discussion shown thus far. Hence, the $y$ that achieves the limit
    in (2.21) is unique. In the following, we assume that $y$ gives the lower limit.


    Moreover, note that


    $$\|x - \{az + (1-a)y\}\|^2 \geq \|x - y\|^2 \Longleftrightarrow 2a\langle x -
    y, z - y \rangle \leq a^2\|z - y\|^2$$


    for arbitrary $0 < a < 1$ and $z \in M$, and if $\langle x - y, z - y \rangle
    > 0$, the inequality flips for small $a > 0$. Thus, we have $\langle x - y, z
    - y \rangle \leq 0$.



    = b$, then for an arbitrary $\epsilon > 0$, we require


    $$\left\{\sum_{i=1}^n \frac{b-a}{n} \sup_{x_{i-1}<x<x_i} f(x)\right\} - \left\{\sum_{i=1}^n
    \frac{b-a}{n} \inf_{x_{i-1}<x<x_i} f(x)\right\} < \epsilon$$


    to define the definite integral. Because we assume that $f$ is uniformly continuous,

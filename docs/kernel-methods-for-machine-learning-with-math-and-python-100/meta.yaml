    does not depend on the choice of $f, g$ in (3.21). In particular, $\langle f,
    g \rangle_{H_0}$ is symmetric. Since $k$ is a positive definite kernel, we have


    ```

    $$\|f\|^2 = \sum_{i=1}^m \sum_{j=1}^n a_i a_j k(x_i, x_j) \ge 0.$$

    ```


    Moreover, from


    ```

    $$|f(x)| = |\langle f(\cdot), k(x, \cdot) \rangle_{H_0}| \le \|f\|_{H_0} \sqrt{k(x,
    x)},$$

    ```


    we have $\|f\|_{H_0} = 0 \Rightarrow f = 0$. In the following, we construct the
    linear space $H$ obtained by completing $H_0$.


    Let $\{f_n\}$ be a Cauchy sequence in $H_0$. For an arbitrary $x \in E$ and $m,
    n \ge 1$, we have


    ```

    $$|f_m(x) - f_n(x)| \le \|f_m - f_n\|_{H_0} \sqrt{k(x, x)},$$

    ```


    and $\{f_n(x)\}$ is Cauchy. Since this sequence is a real sequence, it has a convergence
    point for each $x \in E$. In the following, let $H$ be the set of $f : E \to \mathbb{R}$
    such that the $\{f_n(x)\}$ for which $\{f_n\}$ is Cauchy in $H_0$ converges to
    $f(x)$ for each $x \in E$. In general, $H_0$ is a subset of $H$. In the following,
    we define an inner product in $H$ and prove that $H$ is an RKHS with a reproducing
    kernel $k$.


    **Lemma 4** Suppose that $\{f_n\}$ is a Cauchy sequence in $H_0$. If the sequence
    $\{f_n(x)\}$ converges to 0 for each $x \in E$, then we have


    ```

    $$\lim_{n \to \infty} \|f_n\|_{H_0} = 0.$$

    ```


    Proof of Lemma 4: Since a Cauchy sequence is bounded (Example 26), there exists
    a $B > 0$ such that $\|f_n\| < B$, $n = 1, 2, \ldots$ Moreover, since the above
    sequence is a Cauchy sequence, for an arbitrary $\epsilon > 0$, there exists an
    $N$ such that $n > N \Rightarrow \|f_n - f_N\| < \epsilon/B$. Thus, for $f_N(x)
    = \sum_{i=1}^p \alpha_i k(x_i, x) \in H_0$, $\alpha_i \in \mathbb{R}$, $x_i \in
    E$, and $i = 1, 2, \ldots$, we have that when $n > N$


    ```

    $$\|f_n\|_{H_0}^2 = \langle f_n - f_N, f_n \rangle_{H_0} + \langle f_N, f_n \rangle_{H_0}
    \le \|f_n - f_N\|_{H_0} \|f_n\|_{H_0} + \sum_{i=1}^p \alpha_i |f_n(x_i)|.$$

    ```


    Each of the first and second terms is at most $\epsilon$ since we have $f_n(x_i)
    \to 0$ as $n \to \infty$ for each $i = 1, \ldots, p$. Hence, we have Lemma 4.
    $\square$


    For Cauchy sequences $\{f_n\}, \{g_n\}$ in $H_0$, we define $f, g \in H$ such
    that $\{f_n(x)\}, \{g_n(x)\}$ converge to $f(x), g(x)$, respectively, for each
    $x \in E$. Then, $\{\langle f_n, g_n \rangle_{H_0}\}$ is Cauchy:


    ```

    $$|\langle f_n, g_n \rangle_{H_0} - \langle f_m, g_m \rangle_{H_0}| = |\langle
    f_n, g_n - g_m \rangle_{H_0} + \langle f_n - f_m, g_m \rangle_{H_0}|$$

    $$\le \|f_n\|_{H_0} \|g_n - g_m\|_{H_0} + \|f_n - f_m\|_{H_0} \|g_m\|_{H_0}.$$

    ```'
  - '[PAGE 91]


    Since $\{\langle f_n, g_n \rangle_{H_0}\}$ is real and Cauchy, it converges (Proposition
    6). The inner product obtained by convergence depends only on $f(x), g(x) (x \in
    E)$.


    Let $\{f''_n\}, \{g''_n\}$ be other Cauchy sequences in $H_0$ that converge to
    $f, g$ for each $x \in E$. Then, $\{f_n - f''_n\}, \{g_n - g''_n\}$ are Cauchy
    sequences that converge to 0 for each $x \in E$, and from Lemma 4, we have $\|f_n
    - f''_n\|_{H_0}, \|g_n - g''_n\|_{H_0} \to 0$ as $n \to \infty$, which means that


    $$|\langle f_n, g_n \rangle_{H_0} - \langle f''_n, g''_n \rangle_{H_0}| = |\langle
    f_n, g_n - g''_n \rangle_{H_0} + \langle f_n - f''_n, g''_n \rangle_{H_0}|$$

    $$\leq \|f_n\|_{H_0}\|g_n - g''_n\|_{H_0} + \|f_n - f''_n\|_{H_0}\|g''_n\|_{H_0}
    \to 0.$$


    Thus, the convergence point of $\{\langle f_n, g_n \rangle_{H_0}\}$ does not depend
    on $\{f_n\}, \{g_n\}$ but on $f, g \in H$. We define the inner product of $H$
    by


    $$\langle f, g \rangle_H := \lim_{n \to \infty} \langle f_n, g_n \rangle_{H_0}.$$


    To show that this expression satisfies the definition of an inner product, we
    assume that $\|f\|_H = \langle f, f \rangle_H = 0$. Then, for each $x \in E$,
    as $n \to \infty$, from


    $$|f_n(x)| = |\langle f_n(\cdot), k(x, \cdot) \rangle| \leq \sqrt{k(x, x)}\|f_n\|_{H_0}
    \to 0,$$


    we have $|f(x)| = \lim_{n \to \infty} |f_n(x)| = 0$.


    Moreover, since we have defined $f \in H$ according to $\lim_{n \to \infty} f_n(x)
    (x \in E)$ for any Cauchy sequence $\{f_n\}$ in $H_0$ that converges to $f$, from
    the definition of inner products, we have


    $$\|f - f_n\|_H = \lim_{m \to \infty} \|f_m - f_n\|_{H_0} \to 0 \quad (3.22)$$


    $n \to \infty$, and $H_0$ is dense in $H$.


    We show that $H$ is complete. Let $\{f_n\}$ be a Cauchy sequence in $H$. From
    denseness, there exists a sequence $\{f''_n\}$ in $H_0$ such that


    $$\|f_n - f''_n\|_H \to 0 \quad (3.23)$$


    as $n \to \infty$. Therefore, given an arbitrary $\epsilon > 0$, for $m, n > N$,
    we have $\|f_n - f''_n\|_H, \|f_m - f''_m\|_H, \|f_n - f_m\|_H < \epsilon/3$ and


    $$\|f''_n - f''_m\|_{H_0} = \|f''_n - f''_m\|_H \leq \|f_n - f''_n\|_H + \|f_n
    - f_m\|_H + \|f_m - f''_m\|_H \leq \epsilon$$


    for $f''_n, f''_m \in H_0 \subseteq H$. Thus, $\{f''_n\}$ is a Cauchy sequence
    in $H_0$, and we define $f \in H$ by the convergence of $f(x)$ for each $x \in
    E$. Moreover, from (3.22), we have $\|f - f''_n\|_H \to 0$. Combining this with
    (3.23), we obtain


    $$\|f - f_n\|_H \leq \|f - f''_n\|_H + \|f''_n - f_n\|_H \to 0$$


    as $n \to \infty$. Hence, $H$ is complete.'

    for a $g : \mathbb{R} \to \mathbb{R}$ that is monotonically increasing and bounded
    from above, we have


    $$\lim_{y \to \infty} \frac{1}{y} \int_{0}^{y} g(x) dx = \lim_{x \to \infty} g(x).$$



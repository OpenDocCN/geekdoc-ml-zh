  md: 'Proof: We arbitrarily fix $n = 1, 2, \cdots$ and $x_1, \cdots, x_n \in E$ and
    denote the Gram matrix (1.1) by $K$. Then, from the definition of inner products,
    for an arbitrary $z = [z_1, \cdots, z_n] \in \mathbb{R}^n$, we have


    $$z^\top K z = \sum_{i=1}^n \sum_{j=1}^n z_i z_j \langle \Psi(x_i), \Psi(x_j)
    \rangle_H = \left( \sum_{i=1}^n z_i \Psi(x_i), \sum_{j=1}^n z_j \Psi(x_j) \right)_H
    = \left\| \sum_{j=1}^n z_j \Psi(x_j) \right\|_H^2 \geq 0,$$


    where we write $\|a\|_H := \langle a, a \rangle_H^{1/2}$ for $a \in H$.


    **Proposition 3** *If the matrices $A$, $B$ are nonnegative definite, then so
    is the Hadamard product $A \circ B$ (elementwise multiplication).*


    Proof: See the appendix at the end of this chapter.


    Proposition 3 is helpful for proving the second part of the following proposition.


    **Proposition 4** *If the kernels $k_1, k_2, \ldots$ are positive definite, then
    so are the following $E \times E \to \mathbb{R}$:*


    +   1. $ak_1 + bk_2$ ($a, b \geq 0$),

    2. $k_1 k_2$,

    3. the limit$^3$ of $\{k_i\}$ when it converges,

    4. $k$ has only one value $a \geq 0$ (constant function), and

    5. $f(x)k(x, y)f(y)$ ($x, y \in E$) for an arbitrary $f : E \to \mathbb{R}$,


    where the third point claims that the limit $k_\infty(x, y) := \lim_{i \to \infty}
    k_i(x, y)$ satisfies positive definiteness for any $x, y \in E$.


    Proof: $ak_1 + bk_2$ is positive definite because


    $$x^\top Ax \geq 0, x^\top Bx \geq 0 \Rightarrow x^\top (aA + bB)x \geq 0$$


    for $A, B \in \mathbb{R}^{n \times n}$. The product $k_1 k_2$ is positive definite
    because if $A = (A_{i,j})$, $B = (B_{i,j})$ are nonnegative definite, then so
    is the Hadamard product $A \circ B$ (Proposition 3). The third statement assumes
    the existence of a positive integer $n$ such that


    $$B_\infty = \sum_{j=1}^n \sum_{h=1}^n z_j z_h k_\infty(x_j, x_h) = -\epsilon$$


    for $x_1, \cdots, x_n \in E$, $z_1, \ldots, z_n \in \mathbb{R}$, and $\epsilon
    > 0$. Then, the difference between $B_i := \sum_{j=1}^n \sum_{h=1}^n z_j z_h k_i(x_j,
    x_h) \geq 0$ and $B_\infty$ becomes arbitrarily close to zero as $i \to \infty$.
    However, the difference is at least $\epsilon > 0$, which is a contradiction and
    means that $B_\infty \geq 0$. If a kernel takes only a (nonnegative) constant
    value $a$, since all the values in (1.1) are $a \geq 0$, we have


    $^3$ the limit of $k_i(x, y)$ for each $(x, y) \in E$.'

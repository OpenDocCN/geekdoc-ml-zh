    **Proposition 40** *An integral operator $T_K$ is nonnegative definite if and
    only if $K : E \times E \to \mathbb{R}$ is nonnegative definite, i.e., $K$ is
    a positive definite kernel.*


    Proof: See the Appendix at the end of this chapter.


    **Proposition 41** *(Mercer [21]) Let $K : E \times E \to \mathbb{R}$ be a continuous
    positive definite kernel and $T_K$ be the corresponding integral operator. Let
    $\{(\lambda_j, e_j)\}_{j=1}^\infty$ be the sequence of eigenvalues and eigenvectors
    of $T_K$. Then, we can write*


    $$K(x, y) = \sum_{j=1}^\infty \lambda_j e_j(x) e_j(y),$$


    *and this sum absolutely and uniformly converges.*


    By absolute convergence, we mean that the sum of the absolute values converges,
    and by uniform convergence, we mean that the upper bound of the error that does
    not depend on $x, y \in E$ converges to zero.


    Proof: Note that $K_n(x, y) := K(x, y) - \sum_{j=1}^n \lambda_j e_j(x) e_j(y)$
    is continuous and that the integral operator $T_{K_n}$ is nonnegative definite.
    In fact, for each $f \in L^2(E, \mathcal{F}, \mu)$, we have


    $$\langle T_{K_n} f, f \rangle = \langle T_K f, f \rangle - \sum_{j=1}^n \lambda_j
    \langle f, e_j \rangle^2 = \sum_{j=n+1}^\infty \lambda_j \langle f, e_j \rangle^2
    \geq 0.$$



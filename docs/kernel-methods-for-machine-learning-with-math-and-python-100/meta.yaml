    top$, where $D$ and $\\sqrt{D}$ are diagonal matrices with elements $\\lambda_1,\
    \ \\dots, \\lambda_n$ and $\\sqrt{\\lambda_1}, \\dots, \\sqrt{\\lambda_n}$, and\
    \ $P$ is the corresponding orthogonal matrix.\n\nA nonnegative definite matrix\
    \ $A$ is symmetric. In this book, we say that a nonnegative definite matrix is\
    \ positive definite if all of its eigenvalues are positive. In addition, we assume\

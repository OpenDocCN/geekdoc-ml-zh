    Next, we show that $k$ is the corresponding reproducing kernel of the Hilbert
    space $H$. Property (3.1) holds immediately because $k(x, \cdot) \in H_0 \subseteq
    H, x \in E$. For another property (3.2), since $f \in H$ is a limit of the Cauchy
    sequence $\{f_n\}$ in $H_0$ at $x \in E$, we have


    $$f(x) = \lim_{n \to \infty} f_n(x) = \lim_{n \to \infty} \langle f_n(\cdot),
    k(x, \cdot) \rangle_{H_0} = \langle f, k(x, \cdot) \rangle_H .$$


    Finally, we show that such an $H$ uniquely exists. Suppose that $G$ exists and
    shares the same properties possessed by $H$. Since $H$ is a closure of $H_0$,
    $G$ should contain $H$ as a subspace. Since $H$ is closed, from (2.11), we write
    $G = H \oplus H^\perp$. However, since $k(x, \cdot) \in H, x \in E$ and $\langle
    f(\cdot), k(x, \cdot) \rangle_G = 0$ for $f \in H^\perp$, we have $f(x) = 0, x
    \in E$, which means that $H^\perp = \{0\}$. $\square$


    # Proof of Proposition 38


    From our assumption, we have $k(x, \cdot) = k_1(x, \cdot) + k_2(x, \cdot) \in
    H$ for each $x \in E$. We define $N^\perp \ni (h_1(x, \cdot), h_2(x, \cdot)) :=
    v^{-1}(k(x, \cdot))$ for each $x \in E$, where $h_1(x, \cdot), h_2(x, \cdot)$
    are elements in $H_1, H_2$ for $x \in E$, but $h_1, h_2$ are not necessarily reproducing
    kernels $k_1, k_2$ of $H_1, H_2$, respectively. Since $k(x, \cdot) = k_1(x, \cdot)
    + k_2(x, \cdot)$, we have


    $$h_1(x, \cdot) - k_1(x, \cdot) + h_2(x, \cdot) - k_2(x, \cdot) = k(x, \cdot)
    - k(x, \cdot) = 0$$


    and $z := (h_1(x, \cdot) - k_1(x, \cdot), h_2(x, \cdot) - k_2(x, \cdot)) \in N$,
    so


    $$0 = \langle 0, f \rangle_H = \langle z, (f_1, f_2) \rangle_F$$


    for $f \in H$ and $N^\perp \ni (f_1, f_2) := v^{-1}(f)$. Thus, we have


    $$\langle f_1, h_1(x, \cdot) \rangle_1 + \langle f_2, h_2(x, \cdot) \rangle_2
    = \langle f_1, k_1(x, \cdot) \rangle_1 + \langle f_2, k_2(x, \cdot) \rangle_2,$$


    which implies the reproducing property:


    $$\langle f, k(x, \cdot) \rangle_H = \langle v^{-1}(f), v^{-1}(k(x, \cdot)) \rangle_F
    = \langle (f_1, f_2), (h_1(x, \cdot), h_2(x, \cdot)) \rangle_F$$

    $$= \langle (f_1, f_2), (k_1(x, \cdot), k_2(x, \cdot)) \rangle_F = f_1(x) + f_2(x)
    = f(x) .$$


    Furthermore, let $(f_1, f_2) \in F$, $f := f_1 + f_2$, and $(g_1, g_2) := (f_1,
    f_2) - v^{-1}(f)$. Then, from $(g_1, g_2) \in N$ and $v^{-1}(f) \in N^\perp$,
    we have


    $$\|(f_1, f_2)\|_F^2 = \|v^{-1}(f)\|_F^2 + \|(g_1, g_2)\|_F^2 .$$


    Combining this with (3.4) and (3.5), we have


    $$\|f\|_H^2 = \|v^{-1}(f)\|_F^2 \le \|(f_1, f_2)\|_F^2 = \|f_1\|_{H_1}^2 + \|f_2\|_{H_2}^2,$$


    where the equality holds when $(f_1, f_2) = v^{-1}(f)$. $\square$'

    is a probability density function, and the characteristic function $\phi_n$ approaches
    $\phi$ as $n \to \infty$. If we verify the claim, by Levy''s convergence theorem
    [15], $\phi$ is the characteristic function. We show the $d = 1$ case first.


    $$f_n(x) = \frac{1}{2\pi} \int_{-\infty}^{\infty} \phi(t) e^{-t^2/n} e^{-ixt}
    dt.$$


    For $a > 0$, we have


    $$\int_{-a}^{a} f_n(x) dx = \frac{1}{2\pi} \int_{-a}^{a} \int_{-\infty}^{\infty}
    \phi(t) e^{-t^2/n} e^{-ixt} dt dx = \frac{1}{2\pi} \int_{-\infty}^{\infty} \phi(t)
    e^{-t^2/n} \frac{2 \sin at}{t} dt,$$


    where we use Fubini''s theorem for the last equality. Then, for $b > 0$, from
    $\int_{0}^{b} \sin(at) da = \frac{1 - \cos bt}{t} \ge 0$, $\int_{-\infty}^{\infty}
    \frac{1 - \cos t}{t^2} dt = \pi$, and $\phi(0) = 1$, as $b \to \infty$, we have


    $$\frac{1}{b} \int_{0}^{b} \{\int_{-a}^{a} f_n(x) dx\} da = \frac{1}{b} \int_{0}^{b}
    \frac{1}{2\pi} \int_{-\infty}^{\infty} \phi(t) e^{-t^2/n} \frac{2 \sin at}{t}
    dadt$$

    $$= \frac{1}{2\pi} \int_{-\infty}^{\infty} \phi(t) e^{-t^2/n} \frac{2(1 - \cos
    tb)}{t^2 b} dt = \frac{1}{2\pi} \int_{-\infty}^{\infty} \phi(\frac{u}{b}) e^{-(u/b)^2/n}
    \frac{2(1 - \cos u)}{u^2} du \to 1,$$


    where we use the dominant convergence theorem for the last equality. In general,
    for a $g : \mathbb{R} \to \mathbb{R}$ that is monotonically increasing and bounded
    from above, we have


    $$\lim_{y \to \infty} \frac{1}{y} \int_{0}^{y} g(x) dx = \lim_{x \to \infty} g(x).$$


    Thus, we have $\int_{-\infty}^{\infty} f_n(x) dx = 1$.


    Finally, we show that $\phi_n \to \phi$ ($n \to \infty$):


    $$\phi_n(z) := \lim_{a \to \infty} \int_{-a}^{a} e^{iza} \frac{1}{2\pi} \int_{-\infty}^{\infty}
    \phi(t) e^{-t^2/n} e^{-ita} dt$$


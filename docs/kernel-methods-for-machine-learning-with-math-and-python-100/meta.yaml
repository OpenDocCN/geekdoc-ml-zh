  md: '# Chapter 2

    Hilbert Spaces


    When considering machine learning and data science issues, in many cases, the
    calculus and linear algebra courses taken during the first year of university
    provide sufficient background information. However, we require knowledge of metric
    spaces and their completeness, as well as linear algebras with nonfinite dimensions,
    for kernels. If your major is not mathematics, we might have few opportunities
    to study these topics, and it may be challenging to learn them in a short period.
    This chapter aims to learn Hilbert spaces, the projection theorem, linear operators,
    and (some of) the compact operators necessary for understanding kernels. Unlike
    finite-dimensional linear spaces, ordinary Hilbert spaces require scrutiny of
    their completeness.


    # 2.1 Metric Spaces and Their Completeness


    Let $M$ be a set. We say that a bivariate function $d : M \times M \rightarrow
    \mathbb{R}$ is a distance if


    +   1. $d(x, y) \geq 0$;


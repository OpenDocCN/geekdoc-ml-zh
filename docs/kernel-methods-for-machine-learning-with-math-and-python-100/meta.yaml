    \ by setting $k_1(x_1, y_1) = k_3(x_3, y_3) = 1$ and $k_2(x_2, y_2) = I(x_2 =\
    \ y_2 = u)$, we have\n\n$$c_u(x)c_u(y) = \\sum_{R(x_1, x_2, x_3) = x} \\sum_{R(y_1,\
    \ y_2, y_3) = y} 1 \\cdot I(x_2 = y_2 = u) \\cdot 1$$\n\n$$k(x, y) = \\sum_u c_u(x)c_u(y)\
    \ = \\sum_{R(x_1, x_2, x_3) = x} \\sum_{R(y_1, y_2, y_3) = y} 1 \\cdot I(x_2 =\
    \ y_2) \\cdot 1.$$\n\nThus, we observe that the string kernel can be expressed\

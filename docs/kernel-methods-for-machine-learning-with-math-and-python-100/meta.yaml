    \ by multiplying the kernel ridge regression formula (4.6) by $k_{x,X}$ from the\
    \ left, we observe that the former is a specific case of the latter when setting\
    \ $\\lambda = \\sigma^2$.\n\n## 6.2 Classification\n\nWe consider the classification\
    \ problem next. We assume that the random variable $Y$ takes the value $Y = \\\
    pm 1$ and that its conditional probability given $x \\in E$ is\n\n$P(Y = 1|x)\
    \ = \\frac{1}{1 + \\exp(-f(x))}$, (6.5)\n\nwhere the Gaussian process $f : \\\
    Omega \\times E \\rightarrow \\mathbb{R}$ is used. We wish to estimate $f$ from\
    \ the actual $x_1, \\dots, x_N \\in \\mathbb{R}^p$ (row vector) and $y_1, \\dots,\
    \ y_N \\in \\{-1, 1\\}$. To maximize the likelihood, we minimize the negative\
    \ log-likelihood\n\n$\\sum_{i=1}^N \\log[1 + \\exp\\{-y_i f(x_i)\\}]$.\n\nIf we\
    \ set $f_X = [f_1, \\dots, f_N]^\\top = [f(x_1), \\dots, f(x_N)]^\\top \\in \\\
    mathbb{R}^N$, $v_i := e^{-y_i f_i}$, and $l(f_X) := \\sum_{i=1}^N \\log(1 + v_i)$,\
    \ then we have\n\n$$\\frac{\\partial v_i}{\\partial f_i} = -y_i v_i \\ , \\quad\
    \ \\frac{\\partial l(f_X)}{\\partial f_i} = -\\frac{y_i v_i}{1 + v_i} \\ , \\\
    quad \\frac{\\partial^2 l(f_X)}{\\partial f_i^2} = \\frac{v_i}{(1 + v_i)^2} \\\
    \ ,$$\n\nwhere we use $y_i^2 = 1$. Given an initial value, we wait for the Newton-Raphson\
    \ update $f_X \\leftarrow f_X - (\\nabla^2 l(f_X))^{-1} \\nabla l(f_X)$ to converge.\
    \ The update formula is\n\n$$f_X \\leftarrow f_X + W^{-1} u \\ ,$$\n\nwhere $u\
    \ = \\left( \\frac{y_i v_i}{1 + v_i} \\right)_{i=1,\\dots,N}$ and $W = \\text{diag}\
    \ \\left( \\frac{v_i}{(1 + v_i)^2} \\right)_{i=1,\\dots,N}$. In other words, we\
    \ repeat the following two steps:\n\n- 1. Obtain $v$, $u$, and $W$ from $f_X$.\n\
    - 2. Calculate $f_X + W^{-1} u$ and substitute it into $f_X$\n\nfor $v := [v_1,\
    \ \\dots, v_N]^\\top \\in \\mathbb{R}^N$.\n\nNext, we consider maximizing the\
    \ likelihood $\\prod_{i=1}^N \\frac{1}{1 + \\exp\\{-y_i f(x_i)\\}}$ multiplied\
    \ by the prior distribution of $f_X$, i.e., finding the solution with the maximum\
    \ posterior probability. Here, the mean is often set to 0 as the prior probability\
    \ of $f$ in the formulation of (6.5). Suppose first that the prior probability\
    \ of $f_X \\in \\mathbb{R}^N$ is\n\n$$\\frac{1}{\\sqrt{(2\\pi)^N \\det k_{XX}}}\
    \ \\exp\\left\\{-\\frac{f_X^\\top k_{XX}^{-1} f_X}{2}\\right\\} \\ ,$$\n\nwhere\
    \ $k_{XX}$ is the Gram matrix $(k(x_i, x_j))_{i,j=1,\\dots,N}$. If we set\n\n\
    $$L(f_X) = l(f_X) + \\frac{1}{2} f_X^\\top k_{XX}^{-1} f_X + \\frac{1}{2} \\log\
    \ \\det k_{XX} + \\frac{N}{2} \\log 2\\pi \\ , \\qquad (6.6)$$\n\nthen we have\n\
    \n$$\\nabla L(f_X) = \\nabla l(f_X) + k_{XX}^{-1} f_X = -u + k_{XX}^{-1} f_X \\\
    qquad (6.7)$$\n\nand\n\n$$\\nabla^2 L(f_X) = \\nabla^2 l(f_X) + k_{XX}^{-1} =\

    (x, y) \mapsto k(x, y) \in \mathbb{R}$ is measurable, then the function $E \ni
    y \mapsto k(x, y) \in \mathbb{R}$ is measurable for each $x \in E$ (even if $y
    \in E$ is fixed, $(x, y) \mapsto k(x, y)$ is still measurable). In the following,
    we show that any function belonging to $H$ is measurable. First, we note that
    $H_0 = \text{span}\{k(x, \cdot) | x \in E\}$ is dense in $H$. Additionally, we

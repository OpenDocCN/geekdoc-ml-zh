    \nInstead of writing the HSIC as $\\|m_{XY} - m_X m_Y\\|^2_{H_X \\otimes H_Y}$,\
    \ by using the HS norm, we may write it as $\\|\\Sigma_{XY}\\|^2_{HS}$ or $\\\
    |\\Sigma_{YX}\\|^2_{HS}$. In fact, if $\\{e_{X,i}\\}$ and $\\{e_{Y,j}\\}$ are\
    \ orthonormal bases of $H_X, H_Y$, respectively, then from the definition of $\\\
    |\\cdot\\|_{HS}$ (Sect. 2.6) and (5.1), we have\n\n$\\|\\Sigma_{YX}\\|_{HS}^2\
    \ = \\sum_{i=1}^\\infty \\|\\Sigma_{YX}e_{X,i}\\|_{H_Y}^2 = \\sum_{i=1}^\\infty\
    \ \\sum_{j=1}^\\infty \\langle e_{Y,j}, \\Sigma_{YX}e_{X,i}\\rangle_{H_Y}^2$\n\
    $= \\sum_{i=1}^\\infty \\sum_{j=1}^\\infty \\langle e_{X,i} \\otimes e_{Y,j},\
    \ m_{XY} - m_X m_Y\\rangle_{H_X \\otimes H_Y}^2 = \\|m_{XY} - m_X m_Y\\|_{H_X\
    \ \\otimes H_Y}^2$.\n\nSimilarly, $\\|\\Sigma_{XY}\\|_{HS}^2$ has the same value.\n\
    \n## 5.4 Characteristic and Universal Kernels\n\nLet $H$ and $k$ be an RKHS and\
    \ its reproducing kernel, respectively. Let $\\mathcal{P}$ be the set of distributions\
    \ that a random variable $X$ follows. Then, we can define the map\n\n$\\mathcal{P}\
    \ \\ni \\mu \\mapsto \\int k(x, \\cdot) d\\mu(x) \\in H$ ,\n\nwhich we call the\
    \ embedding of probabilities in the RKHS.\n\nSince each element of $H$ is generated\
    \ by $k(x, \\cdot)$ ($x \\in E$) or can be written as the limit of its sequence,\
    \ we describe the condition as\n\n$\\int_E k(x, y) d\\mu(x) = 0$ , $y \\in E \\\
    Rightarrow \\mu = 0$\n\nfor $\\mu := \\mu_1 - \\mu_2$. Moreover, $\\int_E k(x,\
    \ y) d\\mu(x) = 0$ ($y \\in E$) implies that\n\n$\\int_E \\int_E k(x, y) d\\mu(x)\
    \ d\\mu(y) = 0$ . (5.10)\n\nIf we use $k(x, y) = \\phi(x - y) = \\int_E e^{i(x-y)w}\
    \ d\\eta(w)$ (Proposition 5), then we can write (5.10) as\n\n$\\int_E |\\int_E\
    \ e^{iwx} d\\mu(x)|^2 d\\eta(w) = 0$ .\n\nIn other words, for the measure $\\\
    eta$,\n\n$\\hat{\\mu}(w) := \\int_E e^{iwx} d\\mu(x) = 0$ (5.11)\n\nalmost surely\
    \ holds.\n\nIn the following, let $\\eta$ be a finite measure. We call the set\
    \ of $x \\in E$ such that $\\eta(U(x, \\epsilon)) > 0$ for any $\\epsilon > 0$\
    \ the support of $\\eta$ and denote it by $E(\\eta)$. We note that the support\
    \ of a finite measure is always a closed set. In fact, for $x \\in E \\setminus\
    \ E(\\eta)$, if the radius $\\epsilon$ of the open set $U(x, \\epsilon)$ is sufficiently\
    \ small, then $E(\\eta)$, $U(x, \\epsilon)$ has no intersection.\n\nHere, if $E(\\\
    eta) = E$, then (5.11) means that $\\mu = 0$, i.e., $\\mu_1 = \\mu_2$. On the\
    \ other hand, if $E(\\eta) \\subseteq E$, then a $\\mu \\neq 0$ exists such that\
    \ (5.11) holds.\n\n**Proposition 54** $k(x, y) = \\phi(x - y)$ is characteristic\
    \ if and only if the support of the finite measure $\\eta$ of $k(x - y) = \\int_E\
    \ e^{i(x-y)w} d\\eta(w)$ coincides with $E$.\n\nFor the proof of necessity, see\
    \ the Appendix at the end of this chapter.\n\n**Example 80** The Gaussian kernel\
    \ in Example 19 and the Laplace kernel in Example 20 are zero-mean Gaussian- and\
    \ Laplace-distributed, respectively, and the support is the entire interval. Therefore,\
    \ they are characteristic kernels. On the other hand, the kernel\n\n$$k(x, y)\
    \ = \\phi(x - y)$$\n\nobtained from the characteristic function\n\n$$\\phi(t)\
    \ = \\frac{2(1 - \\cos(at))}{a^2t^2}$$\n\nwhose probability distribution is a\
    \ triangular distribution,\n\n$$f(x) = \\begin{cases} (1 - \\frac{|x|}{a})/a,\
    \ & |x| < a \\\\ 0, & \\text{Otherwise} \\end{cases}$$\n\nis not a characteristic\
    \ kernel if its support is not equal to $E$.\n\n**Proposition 55** *If the reproducing\
    \ kernel $k_1$, $k_2$ expressed by the bivariate difference between RKHSs $H_1$,\
    \ $H_2$ are both characteristic, then the reproducing kernel $k_1k_2$ of RKHS\
    \ $H_1 \\otimes H_2$ is also characteristic.*\n\nProof: If both of $k_1(x_1, y_1)\
    \ = \\phi_1(x_1 - y_1)$, $k_2(x_2, y_2) = \\phi_2(x_2 - y_2)$ are characteristic,\
    \ then the supports of $\\eta_1$, $\\eta_2$ are $E$. Since $k_1(x_1, y_1)k_2(x_2,\
    \ y_2)$ can be expressed by\n\n$$\\phi_1(x_1 - y_1)\\phi_2(x_2 - y_2) = \\int_E\
    \ \\int_E e^{i(x_1-y_1)^\\top w_1} e^{i(x_2-y_2)^\\top w_2} d\\eta_1(w_1)d\\eta_2(w_2)$$\n\
    $$= \\int_E \\int_E e^{i(x_1-y_1, x_2-y_2)^\\top (w_1, w_2)} d\\eta_1(w_1)d\\\
    eta_2(w_2),$$\n\n$k_1$, $k_2$ is characteristic as well. $\\square$\n\nLet $E$\

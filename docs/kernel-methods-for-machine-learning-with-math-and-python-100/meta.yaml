    In the following, we show that the posterior probability of the function $f(\cdot)$
    given the value of $Y$ is still a Gaussian process. To this end, we use the following
    proposition.


    **Proposition 61** Suppose that the simultaneous distribution of random variables
    $a \in \mathbb{R}^N$, $b \in \mathbb{R}^n$ can be expressed by


    $$\begin{bmatrix} a \ b \end{bmatrix} \sim N \left( \begin{bmatrix} \mu_a \ \mu_b
    \end{bmatrix}, \begin{bmatrix} A & C \ C^\top & B \end{bmatrix} \right),$$


    where $\mu_a$, $\mu_b$ are the expectations, $A \in \mathbb{R}^{N \times N}$,
    $B \in \mathbb{R}^{n \times n}$ are the covariance matrices ($A$: positive definite;
    $B$: nonnegative definite), and $C \in \mathbb{R}^{N \times n}$ is the covariance
    matrix between them. Then, the conditional probability of $b$ given $a$ is


    $$b|a \sim N(\mu_b + C^\top A^{-1}(a - \mu_a), B - C^\top A^{-1}C). \quad (6.2)$$


    Proof: Consult Lauritzen, вАЬGraphical ModelsвАЭ [20] p256.


    Hence, from Proposition 61, the posterior distribution of $f_Z \in \mathbb{R}^n$
    under $Y \in \mathbb{R}^N$ is $N(\mu'', \Sigma'')$, where


    $$\mu'' := m_Z + k_{ZX}(k_{XX} + \sigma^2 I)^{-1}(Y - m_X) \in \mathbb{R}^n$$


    and


    $$\Sigma'' := k_{ZZ} - k_{ZX}(k_{XX} + \sigma^2 I)^{-1}k_{XZ} \in \mathbb{R}^{n
    \times n}.$$


    If we set $n = 1$ and $z_1 = x$, then the distribution of $f(x)$ becomes


    $$m''(x) := m(x) + k_{xX}(k_{XX} + \sigma^2 I)^{-1}(Y - m_X) \quad (6.3)$$


    $$k''(x, x) := k(x, x) - k_{xX}(k_{XX} + \sigma^2 I)^{-1}k_{Xx}. \quad (6.4)$$


    We summarize the discussion as follows.


    **Proposition 62** Suppose that the prior distribution of $f(\cdot)$ is a Gaussian
    process $(m, k)$. If we obtain $x_1, \dots, x_N$, $y_1, \dots, y_N$ according

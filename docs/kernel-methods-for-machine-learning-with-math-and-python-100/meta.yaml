    $k(x, y) = \frac{1}{N} \sum_{i=1}^N \{F_i(x) - m_N(x)\}\{F_i(y) - m_N(y)\} = \frac{1}{N}
    \eta(x)^\top (C - d)^\top (C - d)\eta(y)$,


    if we set the eigenvectors as $\phi(x) = b^\top \eta(x)$ ($b \in \mathbb{R}^m$),
    then the eigenvalue problem for the covariance operator


    $\int_E k(x, y)\phi(y)dy = \lambda \phi(x)$


    under $b^\top Wb = 1$ reduces to the problem of finding a $b$ such that


    $\eta(x)^\top \frac{1}{N} (C - d)^\top (C - d)\eta(x)\eta(x)^\top b = \lambda
    \eta(x)^\top b$,


    which is equivalent to


    $\frac{1}{N} (C - d)^\top (C - d)Wb = \lambda b$.


    In particular, if we set $u := W^{1/2}b$, it becomes the problem of finding a
    $u \in \mathbb{R}^m$ such that


    $\frac{1}{N} W^{1/2}(C - d)^\top (C - d)W^{1/2}u = \lambda u$



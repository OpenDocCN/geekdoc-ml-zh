    To this end, Gretton et al. [12] thought that to test the independence of random
    variables $X, Y$, if we map $E \ni X \mapsto k_X(X, \cdot) \in H_X$ and $E \ni
    Y \mapsto k_Y(Y, \cdot) \in H_Y$ for kernels $k_X, k_Y$, and perform the test
    of independence based on the covariance between $k_X(X, \cdot)$ and $k_Y(Y, \cdot)$,
    such an inconvenience would not occur. They devised a statistical test for $\mathbb{E}[k_X(X,
    \cdot)k_Y(Y, \cdot)] = \mathbb{E}[k_X(X, \cdot)]\mathbb{E}[k_Y(Y, \cdot)]$ rather
    than $\mathbb{E}[XY] = \mathbb{E}[X]\mathbb{E}[Y]$. We define


    $$HSIC(X, Y) := \|m_X m_Y - m_{XY}\|^2_{H_X \otimes H_Y} \in \mathbb{R},$$


    which is the norm of the covariance $m_X m_Y - m_{XY} \in H_1 \otimes H_2$, i.e.,
    the Hilbert-Schmidt information criterion (HSIC). Since the HSIC is a norm, it
    is zero only if $m_X m_Y - m_{XY} \in H_X \otimes H_Y$ is zero. The HSIC is the
    $MMD^2$ when $m_P = m_X m_Y$ with $m_Q = m_{XY}$.


    **Proposition 52** (Gretton et al. [12]) *When the reproducing kernels $k_X, k_Y
    : E \to \mathbb{R}$ in $H_X, H_Y$ are both characteristic kernels, the random
    variables $X, Y$ that take values in $E$ being independent and $HSIC(X, Y) = 0$
    are equivalent, i.e.,*


    $$HSIC(X, Y) = 0 \Longleftrightarrow X \perp\!\!\!\perp Y.$


    Proof: If $k_X, k_Y$ are both characteristic, then from Proposition 55 (see below),
    $k_X k_Y$ is also characteristic. Therefore, for $m_X(\cdot) := \int_E k_X(x,
    \cdot)dP_X(x) \in H_X$, $m_Y(\cdot) := \int_E k_Y(y, \cdot)dP_Y(y) \in H_Y$, and
    $m_{XY}(\cdot, \star) := \int_E k_X(x, \cdot)k_Y(y, \star)dP_{XY}(x, y) \in H_X
    \otimes H_Y$, the map $P_{X \otimes Y} \ni P_{XY} \mapsto m_{XY} \in H_X \otimes
    H_Y$ is injective. Hence, we have


    $$X \perp\!\!\!\perp Y \Longleftrightarrow P_{XY} = P_X P_Y \Longleftrightarrow
    m_{XY} = m_X m_Y \Longleftrightarrow HSIC(X, Y) = 0,$$


    where the second $\Longleftrightarrow$ is due to (5.2).


    From Propositions 50 and 52, we have that


    **Corollary 2** *both of the reproducing kernels $k_X, k_Y : E \to \mathbb{R}$
    of $H_X, H_Y$ are characteristic, and we obtain*


    $$\Sigma_{XY} = \Sigma_{YX} = 0 \Longleftrightarrow X \perp\!\!\!\perp Y.$$


    If we abbreviate $\| \cdot \|_{X \otimes Y}$ and $\langle \cdot, \cdot \rangle_{X
    \otimes Y}$ as $\| \cdot \|$ and $\langle \cdot, \cdot \rangle$, respectively,
    then we have


    $$\|m_{XY}\|^2 = \langle \mathbb{E}_{XY}[k_X(X, \cdot)k_Y(Y, \cdot)], \mathbb{E}_{X''Y''}[k_X(X'',
    \cdot)k_Y(Y'', \cdot)] \rangle$$

    $$= \mathbb{E}_{XY} \mathbb{E}_{X''Y''} [\langle k_X(X, \cdot)k_Y(Y, \cdot), k_X(X'',
    \cdot)k_Y(Y'', \cdot) \rangle]$$

    $$= \mathbb{E}_{XYX''Y''} [k_X(X, X'')k_Y(Y, Y'')],$$'

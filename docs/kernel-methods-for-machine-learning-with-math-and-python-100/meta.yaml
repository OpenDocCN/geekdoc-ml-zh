    # 2.5 Linear Operators


    Let $X_1, X_2$ be linear spaces with norms of $\|\cdot\|_1, \|\cdot\|_2$, respectively,
    and let $T : X_1 \to X_2$ be the map that linearly transforms an element in $X_1$
    to an element in $X_2$. We call such a $T$ a linear operator. We define an image
    and a kernel by


    $$\mathrm{Im}(T) := \{Tx : x \in X_1\} \subseteq X_2$$


    and


    $$\mathrm{Ker}(T) := \{x \in X_1 : Tx = 0\} \subseteq X_1,$$


    and we call the dimensionality of $\mathrm{Im}(T)$ the rank of $T$. We say that
    the linear operator $T : X_1 \to X_2$ is bounded if for each $x \in X_1$, there
    exists a constant $C > 0$ such that


    $$\|Tx\|_2 \leq C\|x\|_1.$$


    We write the set of such $T$''s as $B(X_1, X_2)$. In particular, we write $B(X_1,
    X_2)$ as $B(X)$ when $X_1 = X_2 = X$.


    **Proposition 21** *A linear operator $T$ is bounded if and only if $T$ is uniformly
    continuous.*


    Proof: If $T$ is uniformly continuous, then there exists a $\delta > 0$ such that
    $\|x\|_1 \leq \delta \Rightarrow \|Tx\|_2 \leq 1$. Since $\|\frac{\delta x}{\|x\|}\|
    \leq \delta$, we have


    $$\|Tx\|_2 = \|T(\frac{\delta x}{\|x\|_1})\|_2 \frac{\|x\|_1}{\delta} \leq \frac{\|x\|_1}{\delta}$$


    for any $x \neq 0$. On the other hand, if $T$ is bounded, there exists a constant
    $C$ that does not depend on $x \in X_1$ such that


    $$\|T(x_n - x)\|_2 \leq C\|x_n - x\|_1$$


    for any $\{x_n\}$ and an $x \in X_1$ such that $x_n \to x$ as $n \to \infty$.
    $\square$


    Hereafter, we define the operator norm of $T \in B(X_1, X_2)$ by


    $$\|T\| := \sup_{x \in X_1, \|x\|_1 = 1} \|Tx\|_2. \tag{2.12}$$'

    $K_N = \frac{1}{N} \sum_{i=1}^N (F_i - m_N) \otimes (F_i - m_N)$, (6.40)


    we can estimate the mean $m$ and covariance operator$^1$ $K$.


    In the following, we examine how to perform principal component analysis (PCA)
    based on functional data analysis [24].


    Then, to obtain the eigenfunctions and eigenvalues, for $x_1, \dots, x_n \in E$,
    $1 \le n \le N$, $F_i : E \to \mathbb{R}$, we apply the ordinary (nonfunctional)
    PCA approach to $X = (F_i(x_k))$ ($i = 1, \dots, N$ and $k = 1, \dots, n$).


    +   1. Prepare the basis function $\eta = [\eta_1, \dots, \eta_m]^\top : E \to
    \mathbb{R}^m$.

    2. Calculate $W = (w_{i,j}) = \int_E \eta(x)\eta(x)^\top dx$ such that $W = (w_{i,j})
    = \int_E \eta_i(x)\eta_j(x)dx$.

    3. Find $C = (c_{i,j})_{i=1,\dots,N,j=1,\dots,m} \in \mathbb{R}^{N \times m}$
    such that $F_i(x) = \sum_{j=1}^m c_i^\top \eta_j(x)$.

    4. Find the coefficients $d_1, \dots, d_m$ of the estimated mean function $m_N(x)
    := \frac{1}{N} \sum_{i=1}^N F_i(x)$ ($m_N(x) = \sum_{j=1}^m d_j^\top \eta_j(x)$).

    5. Since the variance function is


    $k(x, y) = \frac{1}{N} \sum_{i=1}^N \{F_i(x) - m_N(x)\}\{F_i(y) - m_N(y)\} = \frac{1}{N}
    \eta(x)^\top (C - d)^\top (C - d)\eta(y)$,


    if we set the eigenvectors as $\phi(x) = b^\top \eta(x)$ ($b \in \mathbb{R}^m$),
    then the eigenvalue problem for the covariance operator


    $\int_E k(x, y)\phi(y)dy = \lambda \phi(x)$


    under $b^\top Wb = 1$ reduces to the problem of finding a $b$ such that


    $\eta(x)^\top \frac{1}{N} (C - d)^\top (C - d)\eta(x)\eta(x)^\top b = \lambda
    \eta(x)^\top b$,


    which is equivalent to


    $\frac{1}{N} (C - d)^\top (C - d)Wb = \lambda b$.


    In particular, if we set $u := W^{1/2}b$, it becomes the problem of finding a
    $u \in \mathbb{R}^m$ such that


    $\frac{1}{N} W^{1/2}(C - d)^\top (C - d)W^{1/2}u = \lambda u$


    under $\|u\| = 1$.



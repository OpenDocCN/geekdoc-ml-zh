    Then, to obtain the eigenfunctions and eigenvalues, for $x_1, \dots, x_n \in E$,
    $1 \le n \le N$, $F_i : E \to \mathbb{R}$, we apply the ordinary (nonfunctional)
    PCA approach to $X = (F_i(x_k))$ ($i = 1, \dots, N$ and $k = 1, \dots, n$).


    +   1. Prepare the basis function $\eta = [\eta_1, \dots, \eta_m]^\top : E \to
    \mathbb{R}^m$.

    2. Calculate $W = (w_{i,j}) = \int_E \eta(x)\eta(x)^\top dx$ such that $W = (w_{i,j})
    = \int_E \eta_i(x)\eta_j(x)dx$.

    3. Find $C = (c_{i,j})_{i=1,\dots,N,j=1,\dots,m} \in \mathbb{R}^{N \times m}$
    such that $F_i(x) = \sum_{j=1}^m c_i^\top \eta_j(x)$.

    4. Find the coefficients $d_1, \dots, d_m$ of the estimated mean function $m_N(x)
    := \frac{1}{N} \sum_{i=1}^N F_i(x)$ ($m_N(x) = \sum_{j=1}^m d_j^\top \eta_j(x)$).


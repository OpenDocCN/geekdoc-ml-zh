    \          + 0.0001*np.identity(p)), X.T), y)\n    return np.squeeze(beta)\n\n\
    N = 365; n = 35; m = 5; p = 100; df = df.coordinates[0].data_matrix\nC = np.zeros((n,\
    \ p))\nfor i in range(n):\n    x = np.arange(1, N+1) * (2 * np.pi / N) - np.pi\n\
    \    y = df[i]\n    C[i, :] = beta(x, y)\npca = PCA()\npca.fit(C)\nB = pca.components_.T\n\
    xx = C.dot(B)\n```\n\nEach line of $C \\in \\mathbb{R}^{n \\times p}$ is the coefficient\
    \ ($p$) of a function. Then, $B \\in \\mathbb{R}^{p \\times m}$ ($m \\le p$) is\
    \ the principal component vector, and $xx$ is the score of each function. The\
    \ $m$th column vector of $B$ is the vector of $m$ principal components (the coefficients\
    \ in front of $\\eta_j(x)$ for $j = 1, \\ldots, p$). We change $m$ and the function\
    \ $z$ and run the following program to see if we can recover the original function.\n\
    \n## Reconstructions for $m = 2, 3, 4, 5, 6$\n\n![](img/075acd5c7a7f62a80a28ffffee1ae5d9_207_0.png)\n\
    \nFig. 6.6 We present the output of approximating Toronto's annual temperature\
    \ by using $m = 2, 3, 4, 5, 6$ principal components. As $m$ increases, the data\
    \ are faithfully recovered from the original data\n\n```python\ndef z(i, m, x):\
    \    ## The approximated function using m components rather than m\n    S = 0\n\
    \    for j in range(p):\n        for k in range(m):\n            for r in range(p):\n\
    \                S = S + C[i, j] * B[j, k] * B[r, k] * g(r, x)\n    return S\n\
    \nx_seq = np.arange(-np.pi, np.pi, 2 * np.pi / 100)\nplt.figure()\nplt.xlim(-np.pi,\

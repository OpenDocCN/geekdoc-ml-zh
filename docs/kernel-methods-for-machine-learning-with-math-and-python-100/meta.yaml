    cdots Q_N$гАВеЫ†ж≠§пЉМ$A = PRR^\\top P^\\top$пЉМеєґдЄФжИСдїђжЬЙ $PR(PR)^\\top$ жШѓCholeskyеИЖиІ£гАВ"

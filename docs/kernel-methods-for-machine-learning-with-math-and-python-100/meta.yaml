  - "[PAGE 206]\n\nExample 92 For $E = [-\\pi, \\pi]$, if we set\n\n$$\\eta_j(x) =\
    \ \\begin{cases} \\frac{1}{\\sqrt{2\\pi}}, & j = 1 \\ \\frac{1}{\\sqrt{\\pi}}\
    \ \\cos kx, & j = 2k \\ \\frac{1}{\\sqrt{\\pi}} \\sin kx, & j = 2k + 1 \\end{cases},$$\n\
    \nwe have\n\n$$\\int_{-\\pi}^{\\pi} \\eta_i(x)\\eta_j(x)dx = \\delta_{i,j},$$\n\
    \nand $W$ is the unit matrix of size $p$. Therefore, the eigenequation becomes\
    \ $\\frac{1}{n}(C - d)^\\top (C - d)u = \\lambda u$, and we can apply $C \\in\
    \ \\mathbb{R}^{n \\times p}$ instead of the design matrix to the PCA procedure\
    \ (even if we set $d = 0$ in the above procedure, the centering step will be completed\
    \ automatically). In this example, we apply Canadian weather data from the fda\
    \ package containing a daily list of, the temperature and precipitation for each\
    \ day of the year in each Canadian city. We construct the following programs in\
    \ various ways. We do not give the $n$ functions from the beginning but from $N\
    \ = 365$ days, as this represents the change in temperature by a linear sum of\
    \ $p$ bases (Fourie transformation). Therefore, we can say that the function is\
    \ discretized using a sufficiently large $p$.\n\n```\nX, y = skfda.datasets.fetch_weather(return_X_y=True,\
    \ as_frame=True)\ndf = X.iloc[:, 0].values\ndef g(j, x):                    ##\
    \ Basis consisting of p elements\n    if j == 0:\n        return 1 / np.sqrt(2\
    \ * np.pi)\n    if j % 1 == 0:\n        return np.cos((j // 2) * x) / np.sqrt(np.pi)\n\
    \    else:\n        return np.sin((j // 2) * x) / np.sqrt(np.pi)\n\ndef beta(x,\
    \ y):                 ## Coefficients in front of the p elements\n    X = np.zeros((N,\
    \ p))\n    for i in range(N):\n        for j in range(p):\n            X[i, j]\
    \ = g(j, x[i])\n    beta = np.dot(np.dot(np.linalg.inv(np.dot(X.T, X)\n      \
    \          + 0.0001*np.identity(p)), X.T), y)\n    return np.squeeze(beta)\n\n\
    N = 365; n = 35; m = 5; p = 100; df = df.coordinates[0].data_matrix\nC = np.zeros((n,\
    \ p))\nfor i in range(n):\n    x = np.arange(1, N+1) * (2 * np.pi / N) - np.pi\n\
    \    y = df[i]\n    C[i, :] = beta(x, y)\npca = PCA()\npca.fit(C)\nB = pca.components_.T\n\
    xx = C.dot(B)\n```\n\nEach line of $C \\in \\mathbb{R}^{n \\times p}$ is the coefficient\
    \ ($p$) of a function. Then, $B \\in \\mathbb{R}^{p \\times m}$ ($m \\le p$) is\
    \ the principal component vector, and $xx$ is the score of each function. The\
    \ $m$th column vector of $B$ is the vector of $m$ principal components (the coefficients"

    ## Chapter 3

    Reproducing Kernel Hilbert Space


    Thus far, we have learned that a feature map $\Psi : E \ni x \mapsto k(x, \cdot)$
    is obtained by the positive definite kernel $k : E \times E \to \mathbb{R}$. In
    this chapter, we generate a linear space $H_0$ based on its image $k(x, \cdot)(x
    \in E)$ and construct a Hilbert space $H$ by completing this linear space, where
    $H$ is called the reproducing kernel Hilbert space (RKHS), which satisfies the
    reproducing property of the kernel $k$ ($k$ is the reproducing kernel of $H$).
    In this chapter, we first understand that there is a one-to-one correspondence
    between the kernel $k$ and the RKHS $H$ and that $H_0$ is dense in $H$ (via the
    Moore-Aronszajn theorem). Furthermore, we introduce the RKHS represented by the
    sum of RKHSs and apply it to Sobolev spaces. We prove Mercer''s theorem regarding
    integral operators in the second half of this chapter and compute their eigenvalues
    and eigenfunctions. This chapter is the core of the theory contained in this book,
    and the later chapters correspond to its applications.


    ### 3.1 RKHSs


    Let $H$ be a Hilbert space whose elements are functions $f : E \to \mathbb{R}$.

    A function $k : E \times E \to \mathbb{R}$ is said to be a reproducing kernel
    of a Hilbert space $H$ with an inner product $\langle \cdot, \cdot \rangle_H$
    if it satisfies the following two conditions.


    1. For each $x \in E$, we have

    $$k(x, \cdot) \in H. \tag{3.1}$$

    2. Reproducing property: for each $f \in H$ and $x \in E$,

    $$f(x) = \langle f, k(x, \cdot) \rangle_H. \tag{3.2}$$


    When $H$ has a reproducing kernel, we say that $H$ is a reproducing kernel Hilbert
    space (RKHS). The reproducing property (3.2) is called a kernel trick.


    **Example 51** Let $\{e_1, \dots, e_p\}$ be an orthonormal basis of a finite-dimensional
    Hilbert space $H$. If we define


    $$k(x, y) := \sum_{i=1}^p e_i(x)e_i(y) \quad (3.3)$$


    for $x, y \in E$, then we have $k(x, \cdot) \in H$ and


    $$\langle e_j(\cdot), k(x, \cdot) \rangle_H = \sum_{i=1}^p \langle e_j, e_i \rangle_H
    e_i(x) = e_j(x)$$


    for each $1 \le j \le p$. Thus, for any $f(\cdot) = \sum_{i=1}^p f_i e_i(\cdot)
    \in H$, $f_i \in \mathbb{R}$, we have $\langle f(\cdot), k(x, \cdot) \rangle_H
    = f(x)$ (reproducing property). Therefore, $H$ is an RKHS, and (3.3) is a reproducing
    kernel.


    **Proposition 32** *The reproducing kernel $k$ of the RKHS $H$ is unique, symmetric
    $k(x, y) = k(y, x)$, and nonnegative definite.*


    Proof: If $k_1, k_2$ are RKHSs of $H$, then by the reproducing property, we have
    that


    $$f(x) = \langle f, k_1(x, \cdot) \rangle_H = \langle f, k_2(x, \cdot) \rangle_H
    \,.$$


    In other words,


    $$\langle f, k_1(x, \cdot) - k_2(x, \cdot) \rangle_H = 0$$


    holds for all $f \in H$, $x \in E$ for which $k_1 = k_2$ (Proposition 16). Additionally,
    the symmetry of a reproducing kernel follows from that of its inner product:


    $$k(x, y) = \langle k(x, \cdot), k(y, \cdot) \rangle_H = \langle k(y, \cdot),
    k(x, \cdot) \rangle_H = k(y, x) \,.$$


    The nonnegative definiteness of the reproducing kernel can be shown as follows.


    $$\sum_{i=1}^n \sum_{j=1}^n z_i z_j k(x_i, x_j) = \sum_{i=1}^n \sum_{j=1}^n z_i
    z_j \langle k(x_i, \cdot), k(x_j, \cdot) \rangle_H = \langle \sum_{i=1}^n z_i
    k(x_i, \cdot), \sum_{j=1}^n z_j k(x_j, \cdot) \rangle_H \ge 0$$


    $\square$



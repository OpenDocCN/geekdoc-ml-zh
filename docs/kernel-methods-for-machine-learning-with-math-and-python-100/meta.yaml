    $= \frac{1}{\sqrt{2\pi\sigma^2}} \int_{-\infty}^{\infty} \exp\left[-\frac{\{x-(\mu+it\sigma^2)\}^2}{2\sigma^2}\right]
    dx \cdot \exp\left\{i\mu t - \frac{t^2\sigma^2}{2}\right\}$


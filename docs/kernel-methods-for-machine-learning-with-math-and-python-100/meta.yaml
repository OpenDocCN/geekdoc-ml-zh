    # 5.4 Characteristic and Universal Kernels


    Let $H$ and $k$ be an RKHS and its reproducing kernel, respectively. Let $\mathcal{P}$
    be the set of distributions that a random variable $X$ follows. Then, we can define
    the map


    $\mathcal{P} \ni \mu \mapsto \int k(x, \cdot) d\mu(x) \in H$ ,


    which we call the embedding of probabilities in the RKHS.


    Since each element of $H$ is generated by $k(x, \cdot)$ ($x \in E$) or can be
    written as the limit of its sequence, we describe the condition as


    $\int_E k(x, y) d\mu(x) = 0$ , $y \in E \Rightarrow \mu = 0$


    for $\mu := \mu_1 - \mu_2$. Moreover, $\int_E k(x, y) d\mu(x) = 0$ ($y \in E$)
    implies that


    $\int_E \int_E k(x, y) d\mu(x) d\mu(y) = 0$ . (5.10)


    If we use $k(x, y) = \phi(x - y) = \int_E e^{i(x-y)w} d\eta(w)$ (Proposition 5),
    then we can write (5.10) as


    $\int_E |\int_E e^{iwx} d\mu(x)|^2 d\eta(w) = 0$ .


    In other words, for the measure $\eta$,


    $\hat{\mu}(w) := \int_E e^{iwx} d\mu(x) = 0$ (5.11)


    almost surely holds.


    In the following, let $\eta$ be a finite measure. We call the set of $x \in E$
    such that $\eta(U(x, \epsilon)) > 0$ for any $\epsilon > 0$ the support of $\eta$
    and denote it by $E(\eta)$. We note that the support of a finite measure is always
    a closed set. In fact, for $x \in E \setminus E(\eta)$, if'

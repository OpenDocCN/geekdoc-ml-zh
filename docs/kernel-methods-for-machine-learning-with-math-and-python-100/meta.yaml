    Under the null hypothesis, $X, Y$ follow the same distribution, and we have


    $$h_1(z_1) = \mathbb{E}_{Z_2}[h(z_1, Z_2)] = \mathbb{E}[k(x_i, X_j)] + \mathbb{E}[k(y_i,
    Y_j)] - \mathbb{E}[k(x_i, Y_j)] - \mathbb{E}[k(x_j, Y_i)] = 0.$$


    Moreover, under the null hypothesis, since $\theta = \mathbb{E}h(Z_1, \dots, Z_m)
    = 0$, we have $\tilde{h}_2(z_1, z_2) = h(z_1, z_2)$.


    Hereafter, we set the number of samples as $N(= m = n)$.


    **Proposition 51** (Serfling [27]) *Suppose that the $U$ statistics are $\mathbb{E}h^2
    < \infty$ and that $h_1(z_1)$ is zero (degenerated). Let $\lambda_1, \lambda_2,
    \dots$ be the eigenvalues of the conjugate integral operation*


    $$L^2 \ni f(\cdot) \to \int \hat{h}_2(\cdot, y) f(y) d\eta(y)$$'
  - '[PAGE 145]


    whose kernel is $\tilde{h}_2(z_1, z_2)^1$. Then, $N$ times the $U$ statistics
    converges to the random variable


    $$\sum_{j=1}^{\infty} \lambda_j (\chi_j^2 - 1)$$


    as $m \to \infty$, where $\chi_1^2, \chi_2^2, \dots$ are random variables that
    are independent of each other and follow a $\chi^2$ distribution with one degree
    of freedom.


    For the proof, see Sect. 5.5.2 of Serfling [27] (page 193-199).


    Note that $\tilde{h}_2(z_1, z_2) = h(z_1, z_2)$ is given by (5.6), which is symmetric
    but not nonnegative definite. Therefore, Mercer''s theorem cannot be applied.
    However, an integral operator is generally compact (Proposition 39), and if the
    kernel of an integral operator is symmetric, then the integral operator is self-adjoint
    (e.g., 45). Therefore, from Proposition 27, eigenvalues and eigenfunctions exist.
    However, since they are not nonnegative definite, some eigenvalues may not be
    nonnegative.


    In the following, we write $\{\lambda_i\}_{i=1}^{\infty}$ and $\{\phi_i(\cdot)\}_{i=1}^{\infty}$
    as the eigenvalues and eigenfunctions, respectively, of the integral operator


    $$T_{\tilde{h}}: L^2[E, \mu] \ni f \mapsto \int_E \tilde{h}_2(\cdot, y) f(y) d\eta(y)
    \in L^2[E, \eta]$$


    For the kernel $h_2$ when $\eta = P = Q$. Then, we have


    $$\int_E h_2(x, y) \phi_i(y) d\eta(y) = \lambda_i \phi_i(x)$$


    $$\int_E \phi_i(x) \phi_j(x) d\eta(x) = \delta_{i,j} . \qquad (5.7)$$


    Utilizing Proposition 51, we find that $N \widehat{\text{MMD}}_U^2$ converges
    to the random variable


    $$\sum_{j=1}^{\infty} \lambda_j (\chi_j^2 - 1)$$


    as the sample size $N \to \infty$.



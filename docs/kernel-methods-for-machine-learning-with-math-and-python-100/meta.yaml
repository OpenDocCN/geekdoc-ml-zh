  - "[PAGE 28]\n\n$c(u, v) := \\prod_{i=1}^{m} \\{1 + c(u_i, v_i)\\}$.\n\nFor example,\
    \ suppose that we assign one of the labels $A, T, G, C$ to each vertex in Fig.\
    \ 1.4. We may write this in a Python function as follows, where we assume that\
    \ we assign no identical labels to the vertices at the same level of the tree.\
    \ Note that the function calls itself (it is a recursive function). For example,\
    \ the function requires the value $C(4, 2)$ when it obtains $C(1, 1)$.\n\n```\n\
    def C(i, j):\n    S, T = s[i], t[j]\n    # Return zero when verteces i and j of\
    \ the trees s and t do not coincides\n    if S[0] != T[0]:\n        return 0\n\
    \    # Return zero when either verteces i or j of the trees s and t does not have\
    \ a descendant\n    if S[1] is None:\n        return 0\n    if T[1] is None:\n\
    \        return 0\n    if len(S[1]) != len(T[1]):\n        return 0\n    U = []\n\
    \    for x in S[1]:\n        U.append(s[x][0])\n    U1 = sorted(U)\n    V = []\n\
    \    for y in T[1]:\n        V.append(t[y][0])\n    V1 = sorted(V)\n    m = len(U)\n\
    \    # Return zero when the labels of the descendants do not coincide\n    for\
    \ h in range(m):\n        if U1[h] != V1[h]:\n            return 0\n    U2 = np.array(S[1])[np.argsort(U)]\n\
    \    V2 = np.array(T[1])[np.argsort(V)]\n    W = 1\n    for h in range(m):\n \
    \       W = W * (1 + C(U2[h], V2[h]))\n    return W\n```\n\n```\ndef k(s, t):\n\
    \    m, n = len(s), len(t)\n    kernel = 0\n    for i in range(m):\n        for\

    $= \begin{cases} g_0(x) = \beta_1 + \beta_2 x + \beta_3 x^2 + \beta_4 x^3, & x
    < \xi_1 \ g_j(x) = g_{j-1}(x) + \beta_{j+4}(x - \xi_j)^3, & \xi_j \le x < \xi_{j+1}

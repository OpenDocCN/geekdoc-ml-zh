    Fig. 5.5 Proof of Proposition 57. As $n$ grows, the slope of $f_n$ rapidly increases
    at the border of $F, U$. Therefore, if $\int_E f_n dP = \int_E f_n dQ$ for all
    $\{f_n\}$, we require $P = Q$ (Dudley вАЬReal Analysis and ProbabilityвАЭ [6])


    where $\sup$ is the supremum when dividing $\mathcal{F}$ into $B_i \in \mathcal{F}$,
    we define the constant $c := |\nu|(E)$ and the finite measures $\mu_1 := \frac{1}{c}|\nu|$
    and $\mu_2 := \frac{1}{c}\{|\nu| - \nu\}$. From $\nu(E) = 0$, we observe that
    $\mu_1$ and $\mu_2$ are both probabilities and that $\mu_1 \neq \mu_2$. Additionally,
    we have


    $$c(d\mu_1 - d\mu_2) = d\nu = 2\cos(w_0 x)d\mu \,.$$


    From FubiniвАЩs theorem, we can write the difference between the expectations w.r.t.
    probabilities $\mu_1, \mu_2$ as


    $$\int_E \phi(x - y)d\mu_1(y) - \int_E \phi(x - y)d\mu_2(y) = \frac{1}{c} \int_E
    \phi(x - y)2\cos(w_0^\top y)d\mu(y)$$

    $$= \frac{1}{c} \int 2\cos(w_0^\top y) \int e^{i(x-y)^\top w} d\eta d\mu(y) =

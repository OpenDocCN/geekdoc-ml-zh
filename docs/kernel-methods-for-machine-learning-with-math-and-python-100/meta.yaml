    Let $E$ be a compact set. Suppose that the RKHS $H$ induced by the kernel $k :
    E \times E \rightarrow H$ is a dense (under the uniform norm) subset of the set
    $C(E)$ of continuous functions $E \rightarrow \mathbb{R}$. Then, we say that the
    kernel $k$ is universal.


    To show that the kernel $k$ is universal, we only need to see if the corresponding
    RKHS satisfies the two Stone-Weierstrass conditions (Proposition 12). Proposition
    56 gives a sufficient condition for the kernel $k$ to be universal (see Chap.
    2 for'

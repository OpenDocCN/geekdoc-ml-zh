    if we make $\delta = x_i - x_{i-1} = \frac{b-a}{n}$ smaller (i.e., we make $n$
    larger).


    ## 2.2 Linear Spaces and Inner Product Spaces


    We say that a set $V$ is a linear space$^3$ if it satisfies the following conditions:
    for $x, y \in V$ and $\alpha \in \mathbb{R}$,


    1. $x + y \in V$ and

    2. $\alpha x \in V$.


    **Example 31** If we define the sum of $x = [x_1, \dots, x_d]$, $y = [y_1, \dots,
    y_d] \in \mathbb{R}^d$ and the multiplication by a constant $\alpha \in \mathbb{R}$
    as $x + y = [x_1 + y_1, \dots, x_d + y_d]$ and $\alpha x = [\alpha x_1, \dots,
    \alpha x_d]$, respectively, then the $d$-dimensional Euclidean space $\mathbb{R}^d$
    forms a linear space.


    **Example 32** ($L^2$ Space) The set $L^2[0, 1]$ of functions $f : [0, 1] \to
    \mathbb{R}$ for which $\int_0^1 \{f(x)\}^2 dx$ takes a finite value is a linear
    space because


    $$\int_0^1 \{f(x) + g(x)\}^2 dx \le 2 \int_0^1 f(x)^2 dx + 2 \int_0^1 g(x)^2 dx
    < \infty$$

    $$\int_0^1 \{\alpha f(x)\}^2 dx = \alpha^2 \int_0^1 f(x)^2 dx < \infty$$


    for $\alpha \in \mathbb{R}$ when $\int_0^1 \{f(x)\}^2 dx < \infty$ and $\int_0^1
    g(x)^2 dx < \infty$.


    Let $V$ be a linear space. We say that any bivariate function $\langle \cdot,
    \cdot \rangle : V \times V \to \mathbb{R}$ that obeys the four conditions below
    is an inner product:


    1. $\langle x, x \rangle \ge 0$;

    2. $\langle \alpha x + \beta y, z \rangle = \alpha \langle x, z \rangle + \beta
    \langle y, z \rangle$;

    3. $\langle x, y \rangle = \langle y, x \rangle$; and

    4. $\langle x, x \rangle = 0 \Longleftrightarrow x = 0$


    for $x, y, z \in V$ and $\alpha, \beta \in \mathbb{R}$.


    $^3$ The same as a vector space.


    **Example 33** For the linear space $\mathbb{R}^d$ in Example 31,


    $$\langle x, y \rangle = \sum_{i=1}^d x_i y_i$$


    for $x = [x_1, \dots, x_d]$, and $y = [y_1, \dots, y_d] \in \mathbb{R}^d$ is an
    inner product because the first three conditions are obvious, and the last condition
    holds because


    $$\langle x, x \rangle = 0 \Longleftrightarrow \sum_{i=1}^d x_i^2 = 0 \Longleftrightarrow
    x = 0.$$


    For a given linear space, we need to choose its inner product. We say that a linear
    space equipped with an inner product is an inner product space.


    **Example 34** (Inner Product of the $L^2$ Space) Let $L^2[0, 1]$ be the linear
    space in Example 32. The bivariate function


    $$\langle f, g \rangle = \int_0^1 f(x)g(x)dx$$


    $f, g \in L^2[0, 1]$ is not an inner product because the last condition fails.
    If $f(1/2) = 1$ and $f(x) = 0$ for $x \neq 1/2$, then we have


    $$\langle f, f \rangle = \int_0^1 f(x)^2 dx = 0.$$


    Strictly speaking, we construct such an inner product, identifying$^4$ $f, g \in
    L^2$ if and only if $\int_0^1 (f(x) - g(x))^2 dx = 0$, which may rarely be noticed.


    Let $V$ be a linear space. We say that any function $\| \cdot \| : V \to \mathbb{R}$
    that obeys the four conditions below is a norm.


    1. $\|x\| \geq 0$;

    2. $\|av\| = |a|\|x\|$;

    3. $\|x + y\| \leq \|x\| + \|y\|$ (triangle inequality); and

    4. $\|x\| = 0 \Longleftrightarrow x = 0$


    for $x, y \in V$ and $a \in \mathbb{R}$.


    If we define the norm of $V$, then we can construct a metric space with the distance
    $d(x, y) = \|x - y\|$. If we define the inner product of $V$, the function


    $$\|x\| = \langle x, x \rangle^{1/2}$$


    $^4$ We define the equivalent relation $\sim$ such that $f - g \in \{h | \int_0^1
    (h(x))^2 dx = 0\} \Longleftrightarrow f \sim g$ and construct the inner product
    for the quotient space $L^2 / \sim$.


    satisfies the four conditions of a norm, and we call this norm a norm induced
    by an inner product.



  md: '# Chapter 6

    Gaussian Processes and Functional Data Analyses


    A stochastic process may be defined either as a sequence of random variables $\{X_t\}_{t
    \in T}$, where $T$ is a set of times, or as a function $X_t(\omega) : T \to \mathbb{R}$
    of $\omega \in \Omega$. We define a Gaussian process as a stochastic process $\{X_t\}$
    such that $X_t$ ($t \in T''$) follows a multivariate Gaussian distribution for
    any finite subset $T''$ of $T$. In this chapter, we generalize the one-dimensional
    $T$ to a multidimensional set $E$ for the consideration of Gaussian processes.
    We mainly deal with the variations of $\omega \in \Omega$ in $f(\omega, x)$, while
    thus far, we have dealt with the variations of $x \in E$ in $f(\omega, x)$. The
    Gaussian process has been applied to various aspects of machine learning. We examine
    the relation between Gaussian processes and kernels. The chapter''s first half
    consists of regression, classification, and computational reduction treatments,
    and the last part studies the KarhunenвАУLo√®ve expansion and its surrounding theory.
    Finally, we study functional data analyses, which are closely related to stochastic
    processes.


    # 6.1 Regression


    Let $E$ and $(\Omega, \mathcal{F}, \mu)$ be a set and a probability space. If
    the correspondence between $\Omega \ni \omega \mapsto f(\omega, x) \in \mathbb{R}$
    is measurable for each $x \in E$, i.e., if $f(\omega, x)$ is a random variable
    at each $x \in E$, then we say that $f : \Omega \times E \to \mathbb{R}$ is a
    stochastic process. Moreover, if the random variables $f(\omega, x_1), \dots,
    f(\omega, x_N)$ follow an $N$-variable Gaussian distribution for any $N \ge 1$
    and any finite number of elements $x_1, \dots, x_N \in E$, then we call $f$ a
    Gaussian process. We define the covariance between $x_i, x_j \in E$ by


    $$\int_{\Omega} \{f(\omega, x_i) - m(x_i)\}\{f(\omega, x_j) - m(x_j)\}d\mu(\omega)
    \,,$$


    where $m(x) := \int_{\Omega} f(\omega, x)d\mu(\omega)$ is the expectation of $f(\omega,
    x)$ for $x \in E$. Then, no matter what $N$ and $x_1, \dots, x_N$ we choose, their
    covariance matrices are nonnegative'

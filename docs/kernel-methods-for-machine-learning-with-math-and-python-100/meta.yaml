  - '[PAGE 99]


    # Chapter 4

    Kernel Computations


    In Chap. 1, we learned that the kernel $k(x, y) \in \mathbb{R}$ represents the
    similarity between two elements $x, y$ in a set $E$. Chapter 3 described the relationships
    between a kernel $k$, its feature map $E \ni x \mapsto k(x, \cdot) \in H$, and
    its reproducing kernel Hilbert space $H$. In this chapter, we consider $k(x, \cdot)$
    to be a function of $E \to \mathbb{R}$ for each $x \in E$, and we perform data
    processing for $N$ actual data pairs $(x_1, y_1), \dots, (x_N, y_N)$ of covariates
    and responses. The $x_i, i = 1, \dots, N$ (row vectors) are $p$-dimensional and
    given by the matrix $X \in \mathbb{R}^{N \times p}$. The responses $y_i$ ($i =
    1, \dots, N$) may be real or binary. This chapter discusses kernel ridge regression,
    principal component analysis, support vector machines (SVMs), and splines, and
    we find the $f \in H$ that minimizes the objective function under various constraints.
    It is known that we can write the optimal $f$ in the form $\sum_{i=1}^N \alpha_i
    k(x_i, \cdot)$ (representation theorem), and the problem reduces to finding the
    optimal $\alpha_1, \dots, \alpha_N$.


    In the second half, we address the problem of computational complexity. The computation
    of a kernel takes more than $O(N^3)$, and real-time calculation is hard when $N$
    is greater than 1000. In particular, we consider how to reduce the rank of the
    Gram matrix $K$. Specifically, we learn actual procedures for random Fourier features,
    Nystr√ґm approximation, and incomplete Cholesky decomposition.


    # 4.1 Kernel Ridge Regression


    We say that finding the $\beta \in \mathbb{R}^p$ (column vector) that minimizes
    $\sum_{i=1}^N (y_i - x_i \beta)^2$ is the least-squares problem. If we assume
    that we have executed the centralization process such that $y_i \leftarrow y_i
    - \bar{y}$ and $x_{i,j} \leftarrow x_{i,j} - \bar{x}_j$ for $\bar{y} = \frac{1}{N}
    \sum_{i=1}^N y_i$ and'
  - '[PAGE 100]


    $\bar{x}_j = \frac{1}{N} \sum_{i=1}^N x_{i,j}$ and that the matrix $X^\top X$
    is nonsingular, we can obtain the solution as $\hat{\beta} = (X^\top X)^{-1} X^\top
    y$ from $X = (x_{i,j})$ and $y = (y_i)$. In the following, we prepare a kernel
    $k : E \times E \to \mathbb{R}$ and consider the problem of finding the $f \in
    H$ that minimizes


    $$L := \sum_{i=1}^N (y_i - f(x_i))^2.$$


    As we considered in Example 40, we express the RKHS $H$ as the sum of


    $$M := \text{span}(\{k(x_i, \cdot)\}_{i=1}^N)$$


    and


    $$M^\perp = \{f \in H | \langle f, k(x_i, \cdot) \rangle_H = 0, i = 1, \dots,
    N\}.$$


    If we set $f = f_1 + f_2, f_1 \in M, f_2 \in M^\perp$, then we have


    $$\sum_{i=1}^N (y_i - f(x_i))^2 = \sum_{i=1}^N (y_i - f_1(x_i))^2 = \sum_{i=1}^N
    (y_i - \sum_{j=1}^N \alpha_j k(x_j, x_i))^2 \quad (4.1)$$


    and $E := \mathbb{R}^p$; we then obtain


    $$f(x_i) = \langle f_1(\cdot) + f_2(\cdot), k(x_i, \cdot) \rangle_H = \langle
    f_1(\cdot), k(x_i, \cdot) \rangle_H = f_1(x_i)$$


    for $i = 1, \dots, N$. Thus, the minimization of $L$ reduces to that of


    $$L = \sum_{i=1}^N \{y_i - \sum_{j=1}^N \alpha_j k(x_j, x_i)\}^2 = \|y - K\alpha\|^2,
    \quad (4.2)$$


    where $K = (k(x_i, x_j))_{i,j=1,\dots,N}$ is a Gram matrix, and the norm $\|z\|$
    of $z = [z_1, \dots, z_N] \in \mathbb{R}$ denotes $\sqrt{\sum_{i=1}^N z_i^2}$.
    The above principle is the representation theorem.


    If we differentiate $L$ by $\alpha$, we have $-K(y - K\alpha) = 0$. If $K$ is
    positive definite rather than nonnegative definite, then the solution becomes
    $\hat{\alpha} = K^{-1}y$.


    If we use the $\hat{f} \in H$ obtained as above that minimizes (4.2), then we
    can predict the value of $y$ given a new $x \in \mathbb{R}^p$ via


    $$\hat{f}(x) = \sum_{i=1}^n \hat{\alpha}_i k(x_i, x).$$'

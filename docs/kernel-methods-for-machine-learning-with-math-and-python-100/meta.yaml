    that takes the expectation w.r.t. $\sigma_1, \dots, \sigma_m$. If we further take
    the expectation of (5.17) w.r.t. the probability $P$, then we call the obtained
    value $R(\mathcal{F}, P)$ the Rademacher complexity.



    # Appendix: Proofs of Propositions


    # Proof of Proposition 13


    We show that a simple function approximates an arbitrary $f \in L_2^2$ and that
    a continuous function approximates an arbitrary simple function. Hereafter, we
    denote the $L^2$ norm by $\|\cdot\|$.


    Since $f \in L_2$ is measurable, if $f$ is nonnegative, the sequence $\{f_n\}$
    of simple functions defined by


    $$f_n(\omega) = \begin{cases} (k-1)2^{-n}, & (k-1)2^{-n} \leq f(\omega) < k2^{-n},
    1 \leq k \leq n2^n \ n, & n \leq f(\omega) \leq \infty \end{cases}$$


    satisfies $0 \leq f_1(\omega) \leq f_2(\omega) \leq \cdots \leq f(\omega)$ and
    $|f_n(\omega) - f(\omega)|^2 \to 0$ almost surely. Since the right-hand side of
    $|f_n(\omega) - f(\omega)|^2 \leq 4\{f(\omega)\}^2$ is finite when integrated,
    from the dominant convergence theorem, we have


    $$\|f_n - f\|^2 \to 0.$$


    We can show a similar derivation for a general $f$ that is not necessarily nonnegative,
    as derived in Chap. 1.'
  - '[PAGE 60]


    On the other hand, let $A$ be a closed subset of $[a, b]$, and let $K_A$ be the
    indicator function ($K_A(e) = 1$ if $e \in A$; $K_A(e) = 0$ otherwise). If we
    define $h(x) := \inf_{y \in A} \{|x - y|\}$ and $g_n^A(x) := \frac{1}{1 + nh(x)}$,
    then $g_n^A$ is continuous, $g_n^A(x) \le 1$ for $x \in [a, b]$, $g_n^A(x) = 1$
    for $x \in A$, and $\lim_{n \to \infty} g_n^A(x) = 0$ for $x \in B := [a, b] \setminus
    A$. Thus, we have


    $$\lim_{n \to \infty} \|g_n^A - K_A\| = \lim_{n \to \infty} \left( \int_B g_n^A(x)^2
    dx \right)^{1/2} = \left( \int_B \lim_{n \to \infty} g_n^A(x)^2 dx \right)^{1/2}
    = 0,$$


    where the second equality follows from the dominant convergence theorem. Moreover,
    if $A, A''$ are disjoint, then $\alpha g_n^A + \alpha'' g_n^{A''}$ with $\alpha,
    \alpha'' > 0$ approximates $\alpha K_A + \alpha'' K_{A''}$. In fact, we have


    $$\|\alpha g_n^A + \alpha'' g_n^{A''} - (\alpha K_A + \alpha'' K_{A''})\| \le
    \alpha \|g_n^A - K_A\| + \alpha'' \|g_n^{A''} - K_{A''}\|.$$


    Hence, a sequence of continuous functions can approximate an arbitrary simple
    function. $\square$


    # Proof of Proposition 14


    Suppose that $\{f_n\}$ is a Cauchy sequence in $L^2$, which means that


    $$\lim_{N \to \infty} \sup_{m, n \ge N} \|f_m - f_n\|_2 = 0. \tag{2.18}$$


    Then, there exists a sequence $\{n_k\}$ such that


    $$\left\| \sum_{k=1}^\infty |f_{n_{k+1}} - f_{n_k}| \right\|_2 \le \sum_{k=1}^\infty

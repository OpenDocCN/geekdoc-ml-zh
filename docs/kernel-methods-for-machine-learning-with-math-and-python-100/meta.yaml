    **Proposition 30** *An HS operator is compact.*


    Proof: Let $T \in B(H_1, H_2)$ be an HS operator, $x \in H_1$, and


    $$T_n x := \sum_{i=1}^{n} \langle Tx, e_{2i} \rangle_2 e_{2i} ,$$


    where $\{e_{2i}\}$ is an orthonormal basis of $H_2$. Since the image of $T_n$
    is of finite dimensionality, $T_n$ is compact. Thus, from the second item of Proposition
    25, it is sufficient to show that $\|T - T_n\| \to 0$ as $n \to \infty$. However,
    since $(T - T_n)x = \sum_{i=n+1}^{\infty} \langle Tx, e_{2,i} \rangle_2 e_{2,i}$,
    we have that when $\|x\|_1 \le 1$,


    $$\|(T - T_n)x\|_2^2 = \sum_{i=n+1}^{\infty} \langle Tx, e_{2,i} \rangle_2^2 =
    \sum_{i=n+1}^{\infty} \langle x, T^* e_{2,i} \rangle_1^2 \le \sum_{i=n+1}^{\infty}
    \|T^* e_{2,i}\|^2 .$$


    Because $T^*$ is an HS operator, the right-hand side converges to zero, where
    $T$ is an HS operator if and only if $T^*$ is an HS operator due to the derivation
    in Proposition 29. $\square$


    **Example 50** When an operator is expressed by a matrix $T = (T_{i,j})$ such
    that $T \in B(\mathbb{R}^m, \mathbb{R}^n)$, $m, n \ge 1$, the HS norm becomes
    the squared sum of the $mn$ elements of this matrix. In fact, if $T$ is expressed
    by a matrix $\mathbb{R}^{n \times m}$, then the HS norm is the Frobenius norm:


    $$\|T\|_{HS}^2 = \sum_{i=1}^{n} \|Te_{X,i}\|^2 = \sum_{j=1}^{n} \|T^*e_{Y,j}\|^2
    = \sum_{i=1}^{m} \sum_{j=1}^{n} T_{i,j}^2 ,$$


    where $e_{X,i} \in \mathbb{R}^m$ is a column vector such that the $i$th element
    is one and the other elements are zeros, and $e_{Y,j} \in \mathbb{R}^n$ is a column
    vector such that the $j$th element is one and the other elements are zeros.


    Let $T \in B(H)$ be nonnegative definite and $\{e_i\}$ be an orthonormal basis
    of $H$. If


    $$\|T\|_{TR} := \sum_{j=1}^{\infty} \langle Te_j, e_j \rangle$$'

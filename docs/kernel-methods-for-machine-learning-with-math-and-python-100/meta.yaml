    $\|f_1 + f_2\|_H^2 = \|f_1\|_H^2 + \|f_2\|_H^2 \geq \|f_1\|_H^2$

    $= \|\sum_{j=1}^N \alpha_j k(x_j, \cdot)\|_H^2 = \sum_{r=1}^N \sum_{s=1}^N \alpha_r
    \alpha_s k(x_r, x_s) = \alpha^\top K \alpha$.


    Hence, we can formulate (4.8) as the maximization of


    $\alpha^\top K^\top K \alpha - \mu(\alpha^\top K \alpha - 1)$.


    If we substitute $\beta = K^{1/2}\alpha$, then since $K$ is symmetric, we have


    $\beta^\top K \beta - \mu(\beta^\top \beta - 1)$.


    Let $\lambda_1, \ldots, \lambda_N$ and $u_1, \ldots, u_N$ be the eigenvalues and
    eigenvectors of the eigenequation $K\beta = \lambda\beta$, respectively. Then,
    we have [26]


    $\alpha = K^{-1/2}\beta = \frac{1}{\sqrt{\lambda}}\beta = \frac{u_1}{\sqrt{\lambda_1}},
    \ldots, \frac{u_N}{\sqrt{\lambda_N}}$.


    If we centralize the Gram matrix $K = (k(x_i, x_j))$, then the $(i, j)$th element
    of the modified Gram matrix is


    $\langle k(x_i, \cdot) - \frac{1}{N}\sum_{h=1}^N k(x_h, \cdot), k(x_j, \cdot)
    - \frac{1}{N}\sum_{h=1}^N k(x_h, \cdot) \rangle_H$

    $= k(x_i, x_j) - \frac{1}{N}\sum_{h=1}^N k(x_i, x_h) - \frac{1}{N}\sum_{l=1}^N
    k(x_j, x_l)$

    $+ \frac{1}{N^2}\sum_{h=1}^N \sum_{l=1}^N k(x_h, x_l)$. (4.9)


    To obtain the score (size $1 \leq m \leq p$) of $x \in \mathbb{R}^p$ (row vector),
    we use the first $m$ columns of $A = [\alpha_1, \ldots, \alpha_N]^\top \in \mathbb{R}^{N
    \times p}$. Let $x_i \in \mathbb{R}^p$ and $\alpha_i \in \mathbb{R}^m$ be a row
    vector of $X$ and the $i$th column of $A \in \mathbb{R}^{N \times m}$, respectively.
    Then,


    $\sum_{i=1}^N \alpha_i k(x_i, x) \in \mathbb{R}^m$


    is the score of $x \in \mathbb{R}^p$.


    Compared to ordinary PCA, kernel PCA requires a computational time of $O(N^3)$.
    Therefore, when $N$ is large compared to $p$, the computational complexity may
    be enormous. In the Python, we can write the procedure as follows:'

    \ \\sum_{i \\neq j} h(z_i, z_j)$$\n\nfor\n\n$$h(z_i, z_j) := k(x_i, x_j) + k(y_i,\
    \ y_j) - k(x_i, y_j) - k(x_j, y_i) \\quad (5.6)$$\n\nwith $z_i = (x_i, y_i)$.\n\
    \nWe define\n\n$$h_c(z_1, \\dots, z_c) := \\mathbb{E}_{Z_{c+1} \\dots Z_m} h(z_1,\
    \ \\dots, z_c, Z_{c+1}, \\dots, Z_m),$$\n\nwhich is obtained by taking the expectation\
    \ of the $U$ statistics (5.5) over $Z_{c+1}, \\dots, Z_m$ for $1 \\le c \\le m$.\
    \ Moreover, we define\n\n$$\\tilde{h}_c(z_1, \\dots, z_c) := h_c(z_1, \\dots,\
    \ z_c) - \\theta$$\n\nfor $\\theta = \\mathbb{E}[h(Z_1, \\dots, Z_m)]$.\n\n**Example\
    \ 72** For (5.6), we have $h_2(z_1, z_2) = h(z_1, z_2)$ since $m = 2$. Under the\
    \ null hypothesis, $X, Y$ follow the same distribution, and we have\n\n$$h_1(z_1)\
    \ = \\mathbb{E}_{Z_2}[h(z_1, Z_2)] = \\mathbb{E}[k(x_i, X_j)] + \\mathbb{E}[k(y_i,\
    \ Y_j)] - \\mathbb{E}[k(x_i, Y_j)] - \\mathbb{E}[k(x_j, Y_i)] = 0.$$\n\nMoreover,\
    \ under the null hypothesis, since $\\theta = \\mathbb{E}h(Z_1, \\dots, Z_m) =\
    \ 0$, we have $\\tilde{h}_2(z_1, z_2) = h(z_1, z_2)$.\n\nHereafter, we set the\
    \ number of samples as $N(= m = n)$.\n\n**Proposition 51** (Serfling [27]) *Suppose\
    \ that the $U$ statistics are $\\mathbb{E}h^2 < \\infty$ and that $h_1(z_1)$ is\
    \ zero (degenerated). Let $\\lambda_1, \\lambda_2, \\dots$ be the eigenvalues\
    \ of the conjugate integral operation*\n\n$$L^2 \\ni f(\\cdot) \\to \\int \\hat{h}_2(\\\
    cdot, y) f(y) d\\eta(y)$$\n\nwhose kernel is $\\tilde{h}_2(z_1, z_2)^1$. Then,\
    \ $N$ times the $U$ statistics converges to the random variable\n\n$$\\sum_{j=1}^{\\\
    infty} \\lambda_j (\\chi_j^2 - 1)$$\n\nas $m \\to \\infty$, where $\\chi_1^2,\
    \ \\chi_2^2, \\dots$ are random variables that are independent of each other and\
    \ follow a $\\chi^2$ distribution with one degree of freedom.\n\nFor the proof,\
    \ see Sect. 5.5.2 of Serfling [27] (page 193-199).\n\nNote that $\\tilde{h}_2(z_1,\
    \ z_2) = h(z_1, z_2)$ is given by (5.6), which is symmetric but not nonnegative\
    \ definite. Therefore, Mercer's theorem cannot be applied. However, an integral\
    \ operator is generally compact (Proposition 39), and if the kernel of an integral\
    \ operator is symmetric, then the integral operator is self-adjoint (e.g., 45).\
    \ Therefore, from Proposition 27, eigenvalues and eigenfunctions exist. However,\
    \ since they are not nonnegative definite, some eigenvalues may not be nonnegative.\n\
    \nIn the following, we write $\\{\\lambda_i\\}_{i=1}^{\\infty}$ and $\\{\\phi_i(\\\
    cdot)\\}_{i=1}^{\\infty}$ as the eigenvalues and eigenfunctions, respectively,\
    \ of the integral operator\n\n$$T_{\\tilde{h}}: L^2[E, \\mu] \\ni f \\mapsto \\\
    int_E \\tilde{h}_2(\\cdot, y) f(y) d\\eta(y) \\in L^2[E, \\eta]$$\n\nFor the kernel\
    \ $h_2$ when $\\eta = P = Q$. Then, we have\n\n$$\\int_E h_2(x, y) \\phi_i(y)\
    \ d\\eta(y) = \\lambda_i \\phi_i(x)$$\n\n$$\\int_E \\phi_i(x) \\phi_j(x) d\\eta(x)\
    \ = \\delta_{i,j} . \\qquad (5.7)$$\n\nUtilizing Proposition 51, we find that\
    \ $N \\widehat{\\text{MMD}}_U^2$ converges to the random variable\n\n$$\\sum_{j=1}^{\\\
    infty} \\lambda_j (\\chi_j^2 - 1)$$\n\nas the sample size $N \\to \\infty$.\n\n\
    **Example 73** With two sets of 100 samples that follow the standard Gauss distribution,\
    \ we obtain eigenvalues by using the method described in Sect. 3.3 and construct\
    \ a distribution following the null hypothesis using the U-statistic to perform\
    \ the test (Fig. 5.2 Left). We also perform the same test by doubling the standard\
    \ deviation of one pair of samples (Fig. 5.2 Right).\n\n$^1$ The kernel $K: E\
    \ \\times E \\to \\mathbb{R}$ in the integral operation $L^2(E, \\eta) \\ni f\
    \ \\mapsto Kf(\\cdot) = \\int_E K(\\cdot, x) f(x) d\\eta(x)$ is called a kernel\
    \ of the integral operator even if it is not positive definite.\n\n![](img/075acd5c7a7f62a80a28ffffee1ae5d9_146_0.png)\n\
    \n![](img/075acd5c7a7f62a80a28ffffee1ae5d9_146_1.png)\n\nFig. 5.2 Test performed\
    \ using the U-statistic for the two-sample problem. The same (left) and different\
    \ (right) distributions of X, Y are employed. The blue line is the statistic,\
    \ and the red dotted line is the boundary of the rejection region. We can see\
    \ that the distribution obtained according to the null hypothesis has almost the\
    \ same shape as that in Fig.5.1.\n\n```python\nsigma = 1\ndef k(x, y):\n    return\
    \ np.exp(-(x - y)**2 / sigma**2)\n# Data Generation\nn = 100\nx = np.random.randn(n)\n\
    y = np.random.randn(n)    # The Distributions are equal\n#y = 2 * np.random.randn(n)\
    \ # The Distributions are not equal\n# Distribution under null hypothesis\nK =\
    \ np.zeros((n, n))\nfor i in range(n):\n    for j in range(n):\n        K[i ,j]\
    \ = k(x[i], x[j]) + k(y[i], y[j]) \\\n                 - k(x[i], y[j]) - k(x[j],\
    \ y[i])\nlam, vec = np.linalg.eig(K)\nlam = lam / n\nr = 20\nz = []\nfor h in\
    \ range(10000):\n    z.append(np.longdouble(1/n*(np.sum(lam[0:r]\n    *(np.random.chisquare(df\
    \ = 1, size = r)-1)))))\nv = np.quantile(z, 0.95)\n# Statistics\nS = 0\nfor i\
    \ in range(n - 1):\n    for j in range(i + 1, n):\n        S = S + k(x[i], x[j])\
    \ + k(y[i], y[j]) \\\n             - k(x[i], y[j]) - k(x[j], y[i])\nu = np.longdouble(S\
    \ / n / (n - 1))\nx = np.linspace(min(min(z), u, v), max(max(z), u, v), 200)\n\
    # Display of the graph\ndensity = kde.gaussian_kde(z)\nplt.plot(x, density(x))\n\
    plt.axvline(x = v, c = \"r\", linestyle = \"--\")\nplt.axvline(x = u, c = \"b\"\
    )\n```"

    # 1.4 Probability


    Each set is an event when the sets are closed by set operations (union, intersection,
    and complement).


    **Example 13** We consider a set consisting of the subsets of $E = \{1, 2, 3,
    4, 5, 6\}$ (dice eyes) that are closed by set operations:


    $\{E, \{\}, \{1, 3\}, \{5\}, \{2, 4, 6\}, \{1, 3, 5\}, \{2, 4, 5, 6\}, \{1, 2,
    3, 4, 6\}\}$.


    If any of these eight elements undergo the union, intersection, or complement
    operations, the result remains one of these eight elements. In that sense, we
    can say that these eight elements are closed by the set operations. The subsets
    $\{1, 3\}$ and $\{2, 4, 5, 6\}$ are events, but $\{2, 4\}$ is not. On the other
    hand, for the entire set $E$, if we include $\{1\}, \{2\}, \{3\}, \{4\}, \{5\},
    \{6\}$ as events, $2^6$ events should be considered. Even if the entire set $E$
    is identical, whether it is an event differs depending on the set $\mathcal{F}$
    of events.


    In the following, we start our discussion after defining the entire set $E$ and
    the set $\mathcal{F}$ of subsets (events) of $E$ closed by the set operations.
    Any open interval $(a, b)$ with $a, b \in \mathbb{R}$ is a subset of the whole
    real number system $\mathbb{R}$. Applying set operations (union, set product,
    and set complement) to multiple open intervals does not form an open interval,
    but the result remains a subset of $\mathbb{R}$. We call any subset of $\mathbb{R}$
    obtained from an open set by set operations a Borel set of $\mathbb{R}$, and we
    denote such a subset as $\mathbb{B}$. A set obtained by further applying set operations
    to Borel sets remains a Borel set.


    **Example 14** For $a, b \in \mathbb{R}$, the following are Borel sets: $\{a\}
    = \bigcap_{n=1}^\infty (a - 1/n, a + 1/n)$, $[a, b) = \{a\} \cup (a, b)$, $(a,
    b] = \{b\} \cup (a, b)$, $[a, b] = \{a\} \cup (a, b)$, $\mathbb{R} = \bigcup_{n=0}^\infty
    (-2^n, 2^n)$, $\mathbb{Z} = \bigcup_{n=0}^\infty [-n, n]$, and $[\sqrt{2}, 3)
    \cup \mathbb{Z}$.


    As described above, we assume that we have defined the entire set $E$ and the
    set $\mathcal{F}$ of events. At this time, the $\mu : \mathcal{F} \to [0, 1]$
    that satisfies the following three conditions is called a probability.


    +   1. $\mu(A) \geq 0, A \in \mathcal{F}$,

    2. $A_i \cap A_j = \{\} \Rightarrow \mu(\bigcup_{i=1}^\infty A_i) = \sum_{i=1}^\infty
    \mu(A_i)$, and

    3. $\mu(E) = 1$.


    We say that $\mu$ is a measure if $\mu$ satisfies the first two conditions, and
    we say that this measure is finite if $\mu(E)$ takes a finite value. We say that
    $(E, \mathcal{F}, \mu)$ is either a probability space or a measure space, depending
    on whether $\mu(E) = 1$ or not.


    For probability and measure spaces, if $\{e \in E | X(e) \in B\}$ is an event
    for any Borel set $B$, which means that $\{e \in E | X(e) \in B\} \in \mathcal{F}$,
    we say that the function $X : E \to \mathbb{R}$ is measurable in $X$. In particular,
    if we have a probability space, $X$ is a random variable. Whether $X$ is measurable
    depends on $(E, \mathcal{F})$ rather than $(E, \mathcal{F}, \mu)$.'

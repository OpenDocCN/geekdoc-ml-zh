    # 1.3 Positive Definite Kernels


    The kernels that we consider in this book satisfy the positive definiteness criterion
    defined below. Suppose $k : E \times E \to \mathbb{R}$ is symmetric, i.e., $k(x,
    y) = k(y, x), x, y \in E$. For $x_1, \dots, x_n \in E (n \ge 1)$, we say that
    the matrix


    $$\begin{bmatrix} k(x_1, x_1) & \cdots & k(x_1, x_n) \ \vdots & \ddots & \vdots
    \ k(x_n, x_1) & \cdots & k(x_n, x_n) \end{bmatrix} \in \mathbb{R}^{n \times n}
    \quad (1.1)$$


    is the Gram matrix w.r.t. $k$ of order $n$. We say that $k$ is a positive definite
    kernel$^2$ if the Gram matrix of order $n$ is nonnegative definite for any $n
    \ge 1$ and $x_1, \dots, x_n \in E$.


    **Example 3** The kernel in Example 2 does not satisfy positive definiteness.
    In fact, when $\lambda = 2$, $n = 3$, and $x_1 = -1$, $x_2 = 0$, $x_3 = 1$, the
    matrix consisting of $K_\lambda(x_i, y_i)$ can be written as


    $$\begin{bmatrix} k(x_1, x_1) & k(x_1, x_2) & k(x_1, x_3) \ k(x_2, x_1) & k(x_2,
    x_2) & k(x_2, x_3) \ k(x_3, x_1) & k(x_3, x_2) & k(x_3, x_3) \end{bmatrix} = \begin{bmatrix}
    3/4 & 9/16 & 0 \ 9/16 & 3/4 & 9/16 \ 0 & 9/16 & 3/4 \end{bmatrix}$$


    and the determinant is computed as $3^3/2^6 - 3^5/2^{10} - 3^5/2^{10} = -3^3/2^9$.
    In general, the determinant of a matrix is the product of its eigenvalues, and
    we find that at least one of the three eigenvalues is negative.


    **Example 4** For random variables $\{X_i\}_{i=1}^\infty$ that are not necessarily
    independent, if $k(X_i, X_j)$ is the covariance between $X_i, X_j$, the Gram matrix
    of any order is the covariance matrix among a finite number of $X_j$, which means
    that $k$ is positive definite. We discuss Gaussian processes based on this fact
    in Chap. 6.


    By assuming positive definiteness, the theory of kernels will be developed in
    this book. Hereafter, when we state kernels, we are referring to positive definite
    kernels.


    Let $H$ be a linear space (vector space) equipped with an inner product $\langle
    \cdot, \cdot \rangle_H$. Then, we often construct a positive definite kernel with


    $$k(x, y) = \langle \Psi(x), \Psi(y) \rangle_H. \quad (1.2)$$


    By using an arbitrary map $\Psi : E \to H$. We say that such a $\Psi$ is a feature
    map. In this chapter, we may assume that the linear space $H$ is the Euclidean
    space $H = \mathbb{R}^d$ of dimensionality $d$ with the standard inner product
    $\langle x, y \rangle_{\mathbb{R}^d} = x^\top y, x, y \in \mathbb{R}^d$. We define
    the linear space and inner product concepts in Chap. 2.


    **Proposition 2** *The kernel $k : E \times E \to \mathbb{R}$ defined in (1.2)
    is positive definite.*


    $^2$ Although it seems appropriate to say вАЬa nonnegative definite kernelвАЭ, the
    custom of saying вАЬa positive definite kernelвАЭ has been established.'
- md: "## 1.3 Positive Definite Kernels\n\nProof: We arbitrarily fix $n = 1, 2, \\\
    cdots$ and $x_1, \\cdots, x_n \\in E$ and denote the Gram matrix (1.1) by $K$.\
    \ Then, from the definition of inner products, for an arbitrary $z = [z_1, \\\
    cdots, z_n] \\in \\mathbb{R}^n$, we have\n\n$$z^\\top K z = \\sum_{i=1}^n \\sum_{j=1}^n\
    \ z_i z_j \\langle \\Psi(x_i), \\Psi(x_j) \\rangle_H = \\left( \\sum_{i=1}^n z_i\
    \ \\Psi(x_i), \\sum_{j=1}^n z_j \\Psi(x_j) \\right)_H = \\left\\| \\sum_{j=1}^n\
    \ z_j \\Psi(x_j) \\right\\|_H^2 \\geq 0,$$\n\nwhere we write $\\|a\\|_H := \\\
    langle a, a \\rangle_H^{1/2}$ for $a \\in H$.\n\n**Proposition 3** *If the matrices\
    \ $A$, $B$ are nonnegative definite, then so is the Hadamard product $A \\circ\
    \ B$ (elementwise multiplication).*\n\nProof: See the appendix at the end of this\
    \ chapter.\n\nProposition 3 is helpful for proving the second part of the following\
    \ proposition.\n\n**Proposition 4** *If the kernels $k_1, k_2, \\ldots$ are positive\
    \ definite, then so are the following $E \\times E \\to \\mathbb{R}$:*\n\n- 1.\
    \ $ak_1 + bk_2$ ($a, b \\geq 0$),\n- 2. $k_1 k_2$,\n- 3. the limit$^3$ of $\\\
    {k_i\\}$ when it converges,\n- 4. $k$ has only one value $a \\geq 0$ (constant\
    \ function), and\n- 5. $f(x)k(x, y)f(y)$ ($x, y \\in E$) for an arbitrary $f :\
    \ E \\to \\mathbb{R}$,\n\nwhere the third point claims that the limit $k_\\infty(x,\
    \ y) := \\lim_{i \\to \\infty} k_i(x, y)$ satisfies positive definiteness for\
    \ any $x, y \\in E$.\n\nProof: $ak_1 + bk_2$ is positive definite because\n\n\
    $$x^\\top Ax \\geq 0, x^\\top Bx \\geq 0 \\Rightarrow x^\\top (aA + bB)x \\geq\
    \ 0$$\n\nfor $A, B \\in \\mathbb{R}^{n \\times n}$. The product $k_1 k_2$ is positive\
    \ definite because if $A = (A_{i,j})$, $B = (B_{i,j})$ are nonnegative definite,\
    \ then so is the Hadamard product $A \\circ B$ (Proposition 3). The third statement\
    \ assumes the existence of a positive integer $n$ such that\n\n$$B_\\infty = \\\
    sum_{j=1}^n \\sum_{h=1}^n z_j z_h k_\\infty(x_j, x_h) = -\\epsilon$$\n\nfor $x_1,\
    \ \\cdots, x_n \\in E$, $z_1, \\ldots, z_n \\in \\mathbb{R}$, and $\\epsilon >\
    \ 0$. Then, the difference between $B_i := \\sum_{j=1}^n \\sum_{h=1}^n z_j z_h\
    \ k_i(x_j, x_h) \\geq 0$ and $B_\\infty$ becomes arbitrarily close to zero as\
    \ $i \\to \\infty$. However, the difference is at least $\\epsilon > 0$, which\
    \ is a contradiction and means that $B_\\infty \\geq 0$. If a kernel takes only\
    \ a (nonnegative) constant value $a$, since all the values in (1.1) are $a \\\
    geq 0$, we have\n\n$$\n\\begin{bmatrix} a & \\cdots & a \\\\ \\vdots & \\ddots\
    \ & \\vdots \\\\ a & \\cdots & a \\end{bmatrix} = \\begin{bmatrix} \\sqrt{a/n}\
    \ & \\cdots & \\sqrt{a/n} \\\\ \\vdots & \\ddots & \\vdots \\\\ \\sqrt{a/n} &\
    \ \\cdots & \\sqrt{a/n} \\end{bmatrix}^\\top \\begin{bmatrix} \\sqrt{a/n} & \\\
    cdots & \\sqrt{a/n} \\\\ \\vdots & \\ddots & \\vdots \\\\ \\sqrt{a/n} & \\cdots\
    \ & \\sqrt{a/n} \\end{bmatrix}.\n$$\n\nThe last claim is due to the implication\n\
    \n$$x^\\top A x \\geq 0, x \\in \\mathbb{R}^n \\Rightarrow x^\\top D A D x \\\
    geq 0, x \\in \\mathbb{R}^n,$$\n\nwhich we can examine by substituting $y = Dx$\
    \ into $y^\\top A y \\geq 0$. In particular, we may regard $A$ and $D$ as the\
    \ matrix (1.1) and diagonal matrix with the elements $f(x_1), \\cdots, f(x_n)$,\
    \ respectively.\n\nIn addition, the $f(x)f(y)$ obtained by substituting $k(x,\
    \ y) = 1$ for $x, y \\in E$ in the last item of Proposition 4 is positive definite.\
    \ Moreover, the\n\n$$\\frac{k(x, y)}{\\sqrt{k(x, x)k(y, y)}} \\quad (1.3)$$\n\n\
    obtained by substituting $f(x) = \\{k(x, x)\\}^{-1/2}$ for $k(x, x) > 0$ ($x \\\
    in E$) in the last item of Proposition 4 is positive definite. Furthermore, the\
    \ value obtained by substituting $n = 2$, $x_1 = x$, and $x_2 = y$ into (1.1)\
    \ is nonnegative, and the absolute value of (1.3) does not exceed one. We say\
    \ that (1.3) is the positive definite kernel obtained by normalizing $k(x, y)$.\n\
    \n**Example 5** (Linear Kernel) Let $E := \\mathbb{R}^d$. Then, the kernel $k(x,\
    \ y) = x^\\top A y = \\langle Bx, By \\rangle_H$, $x, y \\in \\mathbb{R}^d$ using\
    \ the nonnegative definite matrix $A = B^\\top B \\in \\mathbb{R}^{d \\times d}$,\
    \ $B \\in \\mathbb{R}^{d \\times d}$ is positive definite because it corresponds\
    \ to the case in which the map $\\Psi$ in Proposition 2 is $E \\ni x \\mapsto\
    \ Bx \\in H$. In particular, if $A$ is the unit matrix, then the map $\\Psi$ is\
    \ the identity map. In this sense, the positive definite kernel is an extension\
    \ of the inner product $k(x, y) = x^\\top y$.\n\n**Example 6** (Exponential Type)\
    \ Let $\\beta > 0$, $n \\geq 0$, and $x, y \\in \\mathbb{R}^d$. Then,\n\n$$k_m(x,\
    \ y) := 1 + \\beta x^\\top y + \\frac{\\beta^2}{2} (x^\\top y)^2 + \\cdots + \\\
    frac{\\beta^m}{m!} (x^\\top y)^m \\quad (1.4)$$\n\n($m \\geq 1$) is a polynomial\
    \ of the products of positive definite kernels, and the coefficients are nonnegative.\
    \ From the first two items of Proposition 4, this kernel is a positive definite\
    \ kernel. Additionally, because (1.4) is a Taylor expansion up to the order $m$,\
    \ from the third item of Proposition 4,\n\n$$k_\\infty(x, y) := \\exp(\\beta x^\\\
    top y) = \\lim_{m \\to \\infty} k_m(x, y)$$\n\nis a positive definite kernel as\
    \ well.\n\n**Example 7** (Gaussian Kernel) The kernel\n\n$$k(x, y) := \\exp\\\
    left\\{-\\frac{1}{2\\sigma^2}\\|x - y\\|^2\\right\\}, \\quad \\sigma > 0$$\n\n\
    for $x, y \\in \\mathbb{R}^d$ can be written as\n\n$$\\exp\\left\\{-\\frac{1}{2\\\
    sigma^2}\\|x - y\\|^2\\right\\} = \\exp\\left\\{-\\frac{\\|x\\|^2}{2\\sigma^2}\\\
    right\\} \\exp\\left\\{\\frac{x^\\top y}{\\sigma^2}\\right\\} \\exp\\left\\{-\\\
    frac{\\|y\\|^2}{2\\sigma^2}\\right\\}.$$\n\nThus, from the fifth item of Proposition\
    \ 4 and the fact that $\\exp(\\beta x^\\top y)$ with $\\beta = \\sigma^{-2}$ is\
    \ positive definite, we see that (1.5) is positive definite.\n\n**Example 8**\
    \ (Polynomial Kernel) The kernel\n\n$$k_{m,d}(x, y) := (x^\\top y + 1)^m$$\n\n\
    for $x, y \\in \\mathbb{R}^d, d = 1, 2, \\dots$ is a polynomial of positive definite\
    \ kernels (linear kernels $x^\\top y$), and its coefficients are nonnegative.\
    \ From the first two items of Proposition 4, (1.6) is positive definite.\n\n**Example\
    \ 9** If we normalize the linear kernel by (1.3), we obtain $x^\\top y / \\|x\\\
    | \\|y\\|$, where we denote $\\|a\\| := \\langle a, a \\rangle^{1/2}$ for $a \\\
    in \\mathbb{R}^n$. The Gaussian kernel (1.5) remains the same even if we normalize\
    \ it. The polynomial kernel becomes\n\n$$\\left( \\frac{x^\\top y + 1}{\\sqrt{x^\\\
    top x + 1} \\sqrt{y^\\top y + 1}} \\right)^m$$\n\nif we normalize it.\n\nThe converse\
    \ is true for Proposition 2, which will be proven in Chap. 3: for any nonnegative\
    \ definite kernel $k$, there exists a feature map $\\Psi : E \\to H$ such that\
    \ $k(x, y) = \\langle \\Psi(x), \\Psi(y) \\rangle_H$.\n\n**Example 10** (Polynomial\
    \ Kernel) Let $m, d \\ge 1$. The feature map of the kernel $k_{m,d}(x, y) = (x^\\\
    top y + 1)^m$ with $x, y \\in \\mathbb{R}^d$ is\n\n$$\\Psi_{m,d}(x_1, \\dots,\
    \ x_d) = \\left( \\sqrt{\\frac{m!}{m_0! m_1! \\dots m_d!}} x_1^{m_1} \\dots x_d^{m_d}\
    \ \\right)_{m_0, m_1, \\dots, m_d \\ge 0},$$\n\nwhere the indices $(m_0, m_1,\
    \ \\dots, m_d)$ range over $m_0, m_1, \\dots, m_d \\ge 0$ and $m_0 + m_1 + \\\
    dots + m_d = m$, and we assume that an order exists among the indices $(m_0, m_1,\
    \ \\dots, m_d)$. If we use the multinomial theorem,\n\n$$(\\sum_{i=0}^d z_i)^m\
    \ = \\sum_{m_0 + m_1 + \\dots + m_d = m} \\frac{m!}{m_0! m_1! \\dots m_d!} z_1^{m_1}\
    \ \\dots z_d^{m_d}$$\n\n$(z_0 = 1)$, we see that\n\n$$(x^\\top y + 1)^m = \\langle\
    \ \\Psi_{m,d}(x), \\Psi_{m,d}(y) \\rangle_H$$\n\nwith $x_0 = y_0 = 1$. For example,\
    \ we have\n\n$$\\Psi_{1,2}(x_1, x_2) = [1, x_1, x_2]$$\n\n$$\\Psi_{2,2}(x_1, x_2)\
    \ = [1, x_1^2, x_2^2, \\sqrt{2}x_1, \\sqrt{2}x_2, \\sqrt{2}x_1x_2]$$\n\nbecause\n\
    \n$$\\langle \\Psi_{2,1}(x_1, x_2), \\Psi_{2,1}(y_1, y_2) \\rangle_H = 1 + x_1y_1\
    \ + x_2y_2 = 1 + x^\\top y = k(x, y)$$\n\n$$\\langle \\Psi_{2,2}(x_1, x_2), \\\
    Psi_{2,2}(y_2, y_2) \\rangle_H = 1 + x_1^2y_1^2 + x_2^2y_2^2 + 2x_1y_1 + 2x_2y_2\
    \ + 2x_1x_2y_1y_2$$\n\n$$= (1 + x_1y_1 + x_2y_2)^2 = (1 + x^\\top y)^2 = k(x,\
    \ y).$$\n\n**Example 11** *(Infinite-Dimensional Polynomial Kernel)* Let $0 <\
    \ r \\le \\infty, d \\ge 1$, and $E := \\{x \\in \\mathbb{R}^d \\mid \\|x\\|_2\
    \ < \\sqrt{r}\\}$. Let $f : (-r, r) \\to \\mathbb{R}$ be $C^\\infty$. We assume\
    \ that the function can be Taylor-expanded by\n\n$$f(x) = \\sum_{n=0}^{\\infty}\
    \ a_n x^n, \\quad x \\in (-r, r).$$\n\nIf $a_0 > 0, a_1, a_2, \\dots \\ge 0$,\
    \ then $f(x^\\top y)$ is a positive definite kernel for $x, y \\in E$. The exponential\
    \ type is an infinite-dimensional polynomial kernel and is positive definite.\n\
    \n**Example 12** In Example 2, we use the Nadaraya-Watson estimator to determine\
    \ the Gaussian kernel (Figs. 1.2 and 1.3).\n\n```python\ndef K(x, y, sigma2):\n\
    \    return np.exp(-np.linalg.norm(x - y)**2/2/sigma2)\n\ndef F(z, sigma2):  #\
    \ Function Definition f\n    S=0; T=0\n    for i in range(n):\n        S = S +\
    \ K(x[i], z, sigma2) * y[i]\n        T = T + K(x[i], z, sigma2)\n    return S\
    \ / T\n```\n\nWe often obtain the optimal value for each of the kernel parameters\
    \ via cross validation (CV)$^4$. If the parameters take continuous values, we\
    \ select a finite number of candidates and obtain the evaluation value for each\
    \ parameter as follows. Divide the $N$ samples into $K$ groups and conduct estimation\
    \ with the samples belonging to group $K - 1$ group. Perform testing with the\
    \ samples belonging to the one remaining group and calculate the corresponding\
    \ score. Repeat the procedure $K$ times (changing\n\n$^3$ the limit of $k_i(x,\
    \ y)$ for each $(x, y) \\in E$.\n\n$^4$ Joe Suzuki, \"Statistical Learning with\
    \ Math and Python\", Chap. 4, Springer."

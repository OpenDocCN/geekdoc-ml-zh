    # Proof of Lemma 3


    We assume that $f_n(x)$ monotonically increases as $n$ grows for each $x \in E$.
    Let $\epsilon > 0$ be arbitrary. For each $x \in E$, let $n(x)$ be the minimum
    $n$ such that $|f_n(x) - f(x)| < \epsilon$. From continuity, for each $x \in E$,
    we set $U(x)$ so that


    $$y \in U(x) \Rightarrow |f(x) - f(y)| < \epsilon, \quad |f_{n(x)}(x) - f_{n(x)}(y)|
    < \epsilon.$$


    Then, we have


    $$f(y) - f_{n(x)}(y) \le f(x) + \epsilon - f_{n(x)}(y) \le f_{n(x)}(x) + 2\epsilon
    - f_{n(x)}(y) \le |f_{n(x)}(x) - f_{n(x)}(y)| + 2\epsilon < 3\epsilon.$$


    Moreover, since $E$ is compact, we may suppose that $E \subseteq \bigcup_{i=1}^m
    U(x_i)$. If $N$ is the maximum value of $n(x_1), \dots, n(x_m)$, for $n \ge N$,
    we have


    $$f(y) - f_n(y) \le f(y) - f_{n(x_i)}(y) \le 3\epsilon$$



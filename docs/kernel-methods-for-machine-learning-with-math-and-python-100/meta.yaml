    $P(X \ge \epsilon) \le \inf_{s>0} e^{-s\epsilon} \mathbb{E}[e^{sX}] \quad (4.31)$


    To prove this lemma, we use the following lemma.


    **Lemma 6 (MarkovвАЩs Inequality)** *For a random variable $X$ that takes nonnegative

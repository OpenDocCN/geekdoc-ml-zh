    \nConsider binary discrimination using support vector machines (SVMs). Given $X\
    \ \\in \\mathbb{R}^{N \\times p}$ and $y \\in \\{1, -1\\}^N$, we find the boundary\
    \ $Y = X\\beta + \\beta_0$ with the $\\beta \\in \\mathbb{R}^p$ and $\\beta_0\
    \ \\in \\mathbb{R}$ that maximize the margin. Let $\\gamma \\ge 0$. We wish to\
    \ maximize the margin $M$ by ranging $(\\beta_0, \\beta) \\in \\mathbb{R} \\times\
    \ \\mathbb{R}^p$ and $\\epsilon_i \\ge 0, i = 1, \\dots, N$ to satisfy\n\n$$\\\
    sum_{i=1}^N \\epsilon_i \\le \\gamma$$\n\nand\n\n$$y_i(\\beta_0 + x_i\\beta) \\\
    ge M(1 - \\epsilon_i), \\quad i = 1, \\dots, N.$$\n\nWe often formulate this as\
    \ the problem of minimizing\n\n$$\\frac{1}{2}\\|\\beta\\|^2 + C \\sum_{i=1}^N\
    \ \\epsilon_i \\qquad (4.10)$$\n\nunder $y_i(x_i\\beta + \\beta_0) \\geq 1 - \\\
    epsilon_i$, $\\epsilon_i \\geq 0$ for $i = 1, \\dots, N$ by using a constant $C\
    \ > 0$ (the prime problem). We further transform it into the problem of finding\
    \ $0 \\leq \\alpha_i \\leq C$, $i = 1, 2, \\dots, N$ that maximizes\n\n$$\\sum_{i=1}^N\
    \ \\alpha_i - \\frac{1}{2} \\sum_{i=1}^N \\sum_{j=1}^N \\alpha_i \\alpha_j y_i\
    \ y_j x_i x_j^\\top \\quad (4.11)$$\n\nunder $\\sum_{i=1}^N \\alpha_i y_i = 0$,\
    \ where $x_i$ is the $i$th row vector of $X$ (the dual problem)$^1$. The constant\
    \ $C > 0$ is a parameter that represents the flexibility of the boundary surface.\
    \ The higher the value is, the more samples are used to determine the boundary\
    \ (samples with $\\alpha_i \\neq 0$, i.e., support vectors). Although we sacrifice\
    \ the fit of the data, we reduce the boundary variation caused by sample data\
    \ to prevent overtraining. Then, from the support vectors, we can calculate the\

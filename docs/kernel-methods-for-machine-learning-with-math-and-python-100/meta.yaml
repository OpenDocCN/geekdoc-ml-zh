  md: '# 5.5 Introduction to Empirical Processes


    In this section, we study a mathematical approach to machine learning called the
    empirical process. We analyze the accuracy of the MMD estimators by using the
    Rademacher complexity and concentration inequalities. Through this example, we
    learn the concept of empirical processes. The derivation performed in this section
    is based on Gretton et al.''s [11] proof of a proposition regarding the accuracy
    of the two-sample problem.


    In this section, we prove the following proposition. We define the MMD by


    $$\sup_{f \in \mathcal{F}} \mathbb{E}_P[f(X)] - \mathbb{E}_Q[f(X)],$$


    where $\mathcal{F}$ is a class of functions. This chapter also deals with the
    case in which $\mathcal{F} := \{f \in H \| \|f\|_H \le 1\}$.



    **Proposition 56** (Steinwart [29]) *Let $E$ be compact, and let $k : E \times
    E \to \mathbb{R}$ be a continuous function with $k(x, x) > 0$ for $x \in E$. If
    there exists an injective feature map*


    $$\Psi : E \ni x \to \Psi(x) = (\Psi_1(x), \Psi_2(x), \dots) \in l_2 := \{(\alpha_1,
    \alpha_2, \dots) \in \mathbb{R}^\infty | \sum_{i=1}^\infty \alpha_i^2 < \infty\}$$


    *and $A := \text{span}\{\Psi_1, \Psi_2, \dots\}$ is an algebra, then $k$ is a
    universal kernel.*


    Proof: Since $k(x, x) > 0$, $x \in E$, the first condition of Proposition 12 is
    satisfied. Since $k(\cdot, \cdot)$ is continuous, $\Psi(x) = k(x, \cdot) \in l_2$
    is also continuous at each $x \in E$. Moreover, since $\Psi$ is injective, the
    second condition of Proposition 12 is satisfied, and $A$ is dense in $C(E)$. Furthermore,
    any $\sum_i \alpha_i \Psi_i(\cdot) \in A$ is also an element of RKHS $H$ with
    $k$ as the reproducing kernel. Let $\{e_i\}$ be an orthonormal basis of $H$ and
    $f := \sum_i \alpha_i e_i \in H$. Then, $\langle f(\cdot), \Psi(x) \rangle = f(x)$
    holds, which further implies that $\sum_i \alpha_i \Psi_i(x) = \langle \sum_i
    \alpha_i e_i, \sum_i \Psi_i(x) e_i \rangle = f(x)$. $\square$


    **Corollary 3** *The infinite-dimensional polynomial kernel (Example 11) is a
    universal kernel in each compact set of $E$.*


    Proof: The feature map $\Psi$ is injective. Moreover, $A := \text{span}\{\Psi_{m_1,
    \dots, m_d} | m_1, \dots, m_d \ge 0\}$ is a $d$-variable polynomial (algebra),
    and from Proposition 56, the kernel $k$ is universal. $\square$



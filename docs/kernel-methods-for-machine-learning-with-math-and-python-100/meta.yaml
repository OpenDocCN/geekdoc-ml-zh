    \ as\n\n$$\\begin{aligned} f_X &\\leftarrow f_X + (W + k_{XX}^{-1})^{-1} (u -\
    \ k_{XX}^{-1} f_X) \\\\ &= (W + k_{XX}^{-1})^{-1} \\{(W + k_{XX}^{-1}) f_X - k_{XX}^{-1}\

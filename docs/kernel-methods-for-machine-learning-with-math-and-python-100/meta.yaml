    We cannot obtain the solution of a linear regression problem when the rank of
    $X$ is smaller than $p$, i.e., $N < p$. Thus, we often minimize


    $$\sum_{i=1}^{N} (y_i - x_i \beta)^2 + \lambda \|\beta\|_2^2$$


    for cases in which $\lambda > 0$. We call such a modification of linear regression
    a ridge. The $\beta$ to be minimized is given by $(X^\top X + \lambda I)^{-1}
    X^\top y$. In fact, we derive the formula by differentiating


    $$\|y - X\beta\|^2 + \lambda \beta^\top \beta$$


    by $\beta$ and equating it to zero; we obtain


    $$-X^\top (y - X\beta) + \lambda \beta = 0.$



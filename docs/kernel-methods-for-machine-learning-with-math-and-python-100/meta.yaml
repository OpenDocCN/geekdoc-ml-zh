  md: '# Proof of Proposition 67


    We define $I_f^{(n)}(g) := I_f(g; \{(E_i, x_i)\}_{1 \le i \le M(n)})$. Then, we
    have $\mathbb{E}[I_f^{(n)}(g)] = 0$. From $\mathbb{E}[f(\omega, x)] = 0$, $x \in
    E$, and the convergence proven thus far, we obtain the first claim:


    $|\mathbb{E}[I_f(\omega, g)]| = |\mathbb{E}[I_f(\omega, g) - I_f^{(n)}(g)]| \le
    \{\mathbb{E}[\{I_f(\omega, g) - I_f^{(n)}(g)\}^2]\}^{1/2} \to 0$


    as $n \to \infty$. From the uniform continuity of $k$, we obtain the second claim:


    $|\mathbb{E}[I_f(\omega, g) f(\omega, x)] - \int_E k(x, y)g(y)d\mu(y)|$

    $\le |\mathbb{E}[\{I_f(\omega, g) - I_f^{(n)}(g)\} f(\omega, x)]| + |\mathbb{E}[I_f^{(n)}(g)
    f(\omega, x)] - \int_E k(x, y)g(y)d\mu(y)|$

    $\le \{\mathbb{E}[\{I_f(\omega, g) - I_f^{(n)}(g)\}^2]\}^{1/2} \{\mathbb{E}[f(\omega,
    x)^2]\}^{1/2}$

    $+ |\sum_{i=1}^{M(n)} \int_{E_i} |k(x, x_i) - k(x, y)|g(y)d\mu(y)| \to 0$


    as $n \to \infty$. From


    $\mathbb{E}[I_f^{(n)}(g) I_f^{(n)}(h)] = \sum_{i=1}^{M(n)} \sum_{j=1}^{M(n)} k(x_i,
    x_j) \int_{E_i} g(x)d\mu(x) \int_{E_j} h(y)d\mu(y)$

    $\to \int_E \int_E k(x, y)g(x)h(y)d\mu(x)d\mu(y)$,


    we obtain the third claim:


    $|\mathbb{E}[I_f(\omega, g) I_f(\omega, h)] - \int_E \int_E k(x, y)g(x)h(y)d\mu(x)d\mu(y)|$

    $\le |\mathbb{E}[\{I_f(\omega, g) - I_f^{(n)}(g)\}\{I_f(\omega, h) - I_f^{(n)}(h)\}
    + \{I_f(\omega, g) - I_f^{(n)}(g)\}I_f^{(n)}(h)$

    $+ \{I_f(\omega, h) - I_f^{(n)}(h)\}I_f^{(n)}(g)]$

    $+ |\mathbb{E}[I_f^{(n)}(g) I_f^{(n)}(h)] - \int_E \int_E k(x, y)g(x)h(y)d\mu(x)d\mu(y)|$

    $\le (\mathbb{E}[\{I_f(\omega, g) - I_f^{(n)}(g)\}^2])^{1/2} (\mathbb{E}[\{I_f(\omega,
    h) - I_f^{(n)}(h)\}^2])^{1/2}$

    $+ (\mathbb{E}[\{I_f(\omega, g) - I_f^{(n)}(g)\}^2])^{1/2} (\mathbb{E}[I_f^{(n)}(h)^2])^{1/2}$

    $+ (\mathbb{E}[\{I_f(\omega, h) - I_f^{(n)}(h)\}^2])^{1/2} (\mathbb{E}[I_f^{(n)}(g)^2])^{1/2}$

    $+ \sum_i \sum_j \int_{E_i} \int_{E_j} |k(x, y) - k(x_i, x_j)|g(x)h(y)d\mu(x)d\mu(y)
    \to 0$.'

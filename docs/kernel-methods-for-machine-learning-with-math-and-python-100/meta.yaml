    \ 0 & \\cdots & 0 \\\\ R_{i+1,1} & \\vdots & R_{i+1,i} & 0 & \\cdots & 0 \\\\\
    \ \\vdots & \\vdots & \\vdots & \\vdots & \\ddots & \\vdots \\\\ R_{N,1} & \\\
    cdots & R_{N,i} & 0 & \\cdots & 0 \\end{bmatrix}.$$\n\nеЬ®ињЩзІНжГЕеЖµдЄЛпЉМжИСдїђйАЪињЗеЬ® $B$ зЪДеЙНеРОдєШдї•зЯ©йШµ\

    \n47. еЬ®ж†Є PCA дЄ≠пЉМиЃЊ $k$ дЄЇдЄАдЄ™ж†ЄеЗљжХ∞пЉМ$x_1, \\dots, x_N$ дЄЇж†ЈжЬђпЉМдЄФдї§ $f(\\cdot) := \\sum_{i=1}^N\

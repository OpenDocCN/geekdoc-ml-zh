    4. A random element in an RKHS $H(k)$ with a measurable reproducing kernel $k$
    is a stochastic process, and a stochastic process that takes values in RKHS $H(k)$
    is a random element of $H(k)$.


    For the proof, see Chap. 7 in [14].


    In this section, we learn the properties of random elements and apply them to
    functional data analysis [24].


    First, we consider the average $\mathbb{E}[\langle F, g \rangle]$ of $\langle
    F, g \rangle$ for each $g \in H$ under $\mathbb{E}[\|F\|] < \infty$. Since $g
    \mapsto \mathbb{E}[\langle F, g \rangle]$ is a linear functional, there exists
    a unique $m \in H$ such that


    $$\mathbb{E}[\langle F, g \rangle] = \langle m, g \rangle \quad (6.36)$$


    from Proposition 22. We write this formally as $m = \mathbb{E}[F]$, which is the
    definition of the mean of a random element $F$.


    **Proposition 71** If $\mathbb{E}\|F\|^2 < \infty$, then


    $$\mathbb{E}\|F - m\|^2 = \mathbb{E}\|F\|^2 - \|m\|^2$$


    holds.


    Proof: If we substitute $g = m$ into (6.36), we obtain


    $$\mathbb{E}\|F - m\|^2 = \mathbb{E}\|F\|^2 - 2\mathbb{E}\langle F, m \rangle
    + \|m\|^2 = \mathbb{E}\|F\|^2 - 2\langle m, m \rangle + \|m\|^2 .$$


    Since $\mathbb{E}\|F\|^2 < \infty$ implies that $\mathbb{E}\|F\| < \infty$, we
    proceed with our discussion by assuming the former case.


    Regarding covariance, if $H = \mathbb{R}^p$, then the covariance matrix is


    $$\mathbb{E}[(F - \mathbb{E}[F])(F - \mathbb{E}[F])^\top] = \mathbb{E}[(F - \mathbb{E}[F])
    \otimes (F - \mathbb{E}[F])] \in \mathbb{R}^{p \times p}$$


    for $F \in \mathbb{R}^p$. For the general Hilbert space $H$, the correspondence


    $$H^2 \ni \langle g, h \rangle \mapsto \mathbb{E}[\langle F - m, g \rangle \langle
    F - m, h \rangle] \in \mathbb{R}$$


    is linear for each of $g$ and $h$. Moreover, if $\mathbb{E}\|F\|^2 < \infty$,
    then it is bounded from


    $$\mathbb{E}[\langle F - m, g \rangle \langle F - m, h \rangle] \leq \mathbb{E}\|F
    - m\|^2 \cdot \|g\| \|h\| \leq \mathbb{E}\|F\|^2 \cdot \|g\| \|h\| .$$


    If we define $u \otimes v \in B(H)$ by


    $$H \ni w \mapsto (u \otimes v)w = \langle u, w \rangle v \in H$$


    for $u, v, w \in H$, then a $K \in B(H)$ exists such that'

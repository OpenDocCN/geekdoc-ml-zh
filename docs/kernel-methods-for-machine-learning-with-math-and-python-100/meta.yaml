    # Proof of Proposition 40


    Since $K$ is uniformly continuous, if $d$ is the distance $E \times E$, there
    exists a $\delta_n$ such that

    $$d((x_1, y_1), (x_2, y_2)) < \delta_n \Rightarrow |K(x_1, y_1) - K(x_2, y_2)|
    < n^{-1}$$

    for $n = 1, 2, \ldots$ and arbitrary $x_1, x_2, y_1, y_2 \in E$. Since $E$ is
    compact, we can cover it with a finite number of balls $\{E_{n,i}\}_{i=1}^m$ of
    diameter $\delta_n$. If we arbitrarily choose $v_i \in E_{n,i}$ and define $K_n(x,
    y) := K(v_i, v_j)$ for $(x, y) \in E_{n,i} \times E_{n,j}$, from the uniform continuity
    of $K$, we obtain

    $$\max_{(x,y) \in E \times E} |K(x, y) - K_n(x, y)| < \frac{1}{n}.$$

    Let $T_K, T_{K_n}$ be the integral operators of $K, K_n$. Then, we have

    $$|\langle T_K f, f \rangle - \langle T_{K_n} f, f \rangle| \leq n^{-1} \|f\|^2$$

    and

    $$\langle T_{K_n} f, f \rangle = \sum_{i=1}^m \sum_{j=1}^m K(v_i, v_j) \int_{E_{n,i}}
    f(x) d\mu(x) \int_{E_{n,j}} f(y) d\mu(y)$$

    for an arbitrary $n$, and we have $\langle T_K f, f \rangle \geq 0$. Conversely,
    suppose that $\langle T_K f, f \rangle \geq 0$. If there exist $x_1, \ldots, x_m
    \in E$, $z_1, \ldots, z_m \in \mathbb{R}$ such that $\sum_{i=1}^m \sum_{j=1}^m
    z_i z_j k(x_i, x_j) < 0$, since $K$ is uniformly continuous, there exist $E_1,
    \ldots, E_m \in \mathcal{F}$ such that

    $$\max_{x_h, y_h \in E_h, h=1, \ldots, m} \sum_{i=1}^m \sum_{j=1}^m z_i z_j K(x_i,
    y_j) < 0$$

    and $\mu(E_1), \ldots, \mu(E_m) > 0$. However, from the mean value theorem, we
    have

    $$\langle T_K f, f \rangle := \sum_{i=1}^m \sum_{j=1}^m z_i z_j \{\mu(E_i) \mu(E_j)\}^{-1}
    \int_{E_i} \int_{E_j} k(x, y) d\mu(x) d\mu(y) < 0.$$

    for $f = \sum_{i=1}^m z_i \{\mu(E_i)\}^{-1} I_{E_i}$, which contradicts the fact
    that $T_K$ is positive definite.'

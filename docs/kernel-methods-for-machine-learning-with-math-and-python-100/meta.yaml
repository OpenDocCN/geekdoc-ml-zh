    If we observe $Y \in \{-1, 1\}^N$, we obtain the estimate $\hat{f}$ with the Newton-Raphson
    method and calculate $\hat{W}$. We consider the Laplace approximation of $f_X|Y$,
    i.e., we approximate the Gaussian distribution as follows (Rasmussen-Williams
    [25]):


    $$f_X|Y \sim N(\hat{f}, (\hat{W} + k_{XX}^{-1})^{-1}).$$


    That is, the covariance matrix is the inverse of $\hat{W} + k_{XX}^{-1}$, which
    is the Hessian $\nabla^2 L(\hat{f})$ of (6.8). Then, the variations in (6.11),

    top)^{-1}L\\beta = (LL^\\top)^{-1}LL^\\top\\alpha = \\alpha$$\n\nand\n\n$$k_{XX}(k_{XX}\
    \ + \\sigma^2 I)^{-1}k_{Xx} = (L\\gamma)^\\top (LL^\\top)^{-1}L\\gamma = \\gamma^\\\
    top\\gamma \\text{ .}$$\n\nFinally, from $\\alpha, \\beta, \\gamma$, we have\n\
    \n$$m'(x) = m(x) + k_{Xx}\\alpha$$\n\nand\n\n$$k'(x, x) = k(x, x) - \\gamma^\\\
    top\\gamma \\text{ .}$$\n\nWe can write the calculations of $m(x), k(x, x)$ in\
    \ forms that are completed in $O(N^3)$ and $O(N^3/3)$ time in Python as follows.\n\
    \n```\ndef gp_1(x_pred):\n    h = np.zeros(n)\n    for i in range(n):\n      \
    \  h[i] = k(x_pred, x[i])\n    R = np.linalg.inv(K + sigma_2*np.identity(n)) \
    \ # O(n^3) Computation\n    mm = mu(x_pred) + np.dot(np.dot(h.T, R), (y-mu(x)))\n\
    \    ss = k(x_pred, x_pred) - np.dot(np.dot(h.T, R), h)\n    return {\"mm\":mm,\
    \ \"ss\":ss}\n\ndef gp_2(x_pred):\n    h = np.zeros(n)\n    for i in range(n):\n\
    \        h[i] = k(x_pred, x[i])\n    L = np.linalg.cholesky(K + sigma_2*np.identity(n))\
    \  # O(n^3/3) Computation\n    alpha = np.linalg.solve(L, np.linalg.solve(L.T,\
    \ (y - mu(x))))  # O(n^2) Computation\n    mm = mu(x_pred) + np.sum(np.dot(h.T,\
    \ alpha))\n    gamma = np.linalg.solve(L.T, h)  # O(n^2) Computation\n    ss =\
    \ k(x_pred, x_pred) - np.sum(gamma**2)\n    return {\"mm\":mm, \"ss\":ss}\n```\n\

    that we have executed the centralization process such that $y_i \leftarrow y_i
    - \bar{y}$ and $x_{i,j} \leftarrow x_{i,j} - \bar{x}_j$ for $\bar{y} = \frac{1}{N}
    \sum_{i=1}^N y_i$ and'

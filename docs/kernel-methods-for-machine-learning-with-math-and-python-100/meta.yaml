    > 0$, there exists a $\Delta(z)$ for each $z \in M$ such that


    $$d_1(x, z) < \Delta(z) \Rightarrow d_2(f(x), f(z)) < \epsilon . \quad (2.2)$$


    From Proposition 7, we can prepare a finite number of neighborhoods to cover $M$.
    Let $U_1, \dots, U_m$ be neighborhoods with centers $z_1, \dots, z_m$ and radii
    $\Delta(z_1)/2, \dots, \Delta(z_m)/2$. Suppose that we choose $x, y \in M$ such
    that $d_1(x, y) < \delta := \frac{1}{2} \min_{1 \le i \le m} \Delta(z_i)$. Because
    $x$ belongs to one of the $U_1, \dots, U_m$, without loss of generality, we assume
    that $x \in U_i$. From the distance property, we have


    $$d_1(x, z_i) < \frac{1}{2} \Delta(z_i) < \Delta(z_i)$$

    $$d_1(y, z_i) \le d_1(x, y) + d_1(x, z_i) < \Delta(z_i) .$$


    Combining these inequalities, from the assumption that $f$ is continuous and (2.2),
    we have


    $$d_2(f(x), f(y)) \le d_2(f(x), f(z_i)) + d_2(f(y), f(z_i)) < \epsilon + \epsilon
    = 2\epsilon .$$


    Since $\epsilon > 0$ is arbitrary and $\delta$ does not depend on $x, y$, $f$
    is uniformly continuous. $\square$



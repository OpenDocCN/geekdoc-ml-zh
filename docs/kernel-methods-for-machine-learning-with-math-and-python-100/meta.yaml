    k(y_1, \cdot) - \dots - \frac{1}{N} k(y_N, \cdot) \| \, ,$$


    then from the triangular inequality, we obtain


    $$|f(x_1, \dots, x_N, y_1, \dots, y_N) - f(x_1, \dots, x_{j-1}, x, x_{j+1}, \dots,
    x_N, y_1, \dots, y_N)|$$

    $$\leq \frac{1}{N} \|k(x_j, \cdot) - k(x, \cdot)\| \leq \frac{2}{N} \sqrt{k_{max}}
    \, .$$



    \ In fact, for $x_1, \\ldots, x_n \\in E$ and an arbitrary $z_1, \\ldots, z_n\
    \ \\in \\mathbb{R}$, we have\n\n$$\\sum_{i=1}^n \\sum_{j=1}^n z_i z_j k(x_i, x_j)\
    \ = \\sum_t \\{\\sum_{i=1}^n z_i c_t(x_i)\\}^2 \\geq 0.$$\n\nLet $V_x$, $V_y$\
    \ be the sets of vertices in trees $x$, $y$, respectively; we write $I(u, t) =\

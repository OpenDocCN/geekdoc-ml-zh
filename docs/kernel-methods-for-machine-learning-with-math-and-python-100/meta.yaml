    n = 100\nfor a in [0, 0.1, 0.2, 0.4, 0.6, 0.8]:  # a is the correlation\n    x\
    \ = np.random.randn(n)\n    z = np.random.randn(n)\n    y = a * x + np.sqrt(1\
    \ - a**2) * z\n    print(HSIC_1(x, y, k_x, k_y))\n```"

    deduced from Proposition 56 is often used.


    **Proposition 56** (Steinwart [29]) *Let $E$ be compact, and let $k : E \times
    E \to \mathbb{R}$ be a continuous function with $k(x, x) > 0$ for $x \in E$. If
    there exists an injective feature map*


    $$\Psi : E \ni x \to \Psi(x) = (\Psi_1(x), \Psi_2(x), \dots) \in l_2 := \{(\alpha_1,
    \alpha_2, \dots) \in \mathbb{R}^\infty | \sum_{i=1}^\infty \alpha_i^2 < \infty\}$$


    *and $A := \text{span}\{\Psi_1, \Psi_2, \dots\}$ is an algebra, then $k$ is a
    universal kernel.*


    Proof: Since $k(x, x) > 0$, $x \in E$, the first condition of Proposition 12 is
    satisfied. Since $k(\cdot, \cdot)$ is continuous, $\Psi(x) = k(x, \cdot) \in l_2$
    is also continuous at each $x \in E$. Moreover, since $\Psi$ is injective, the
    second condition of Proposition 12 is satisfied, and $A$ is dense in $C(E)$. Furthermore,
    any $\sum_i \alpha_i \Psi_i(\cdot) \in A$ is also an element of RKHS $H$ with
    $k$ as the reproducing kernel. Let $\{e_i\}$ be an orthonormal basis of $H$ and
    $f := \sum_i \alpha_i e_i \in H$. Then, $\langle f(\cdot), \Psi(x) \rangle = f(x)$
    holds, which further implies that $\sum_i \alpha_i \Psi_i(x) = \langle \sum_i
    \alpha_i e_i, \sum_i \Psi_i(x) e_i \rangle = f(x)$. $\square$


    **Corollary 3** *The infinite-dimensional polynomial kernel (Example 11) is a
    universal kernel in each compact set of $E$.*


    Proof: The feature map $\Psi$ is injective. Moreover, $A := \text{span}\{\Psi_{m_1,
    \dots, m_d} | m_1, \dots, m_d \ge 0\}$ is a $d$-variable polynomial (algebra),
    and from Proposition 56, the kernel $k$ is universal. $\square$


    **Example 81** (Gaussian Kernel) *The exponential type (Example 6) $k_\infty$
    is the universal kernel from Corollary 3. The feature map of the Gaussian kernel
    (Example 7) is the $\Psi(x)$ of $k_\infty$ divided by $\gamma(x) := k(x, x)^{1/2}
    > 0$. For $f \in C(E)$, since $\gamma f \in C(E)$, if we let $\|\gamma f(\cdot)
    - \sum_i \alpha_i \Psi(\cdot)\|_\infty \le \|\gamma\|_\infty \epsilon$, then we
    have*


    $$\|f(\cdot) - \sum_i \alpha_i \gamma^{-1} \Psi(\cdot)\|_\infty \le \|\gamma\|_\infty^{-1}
    \|\gamma f(\cdot) - \sum_i \alpha_i \Psi(\cdot)\|_\infty \le \epsilon$$


    *Therefore, the Gaussian kernel is universal as well.*


    The necessary and sufficient condition for Proposition 54 assume that the kernel
    is a function of the difference between two variables. The following is a sufficient
    condition, but it refers to kernels in general.


    **Proposition 57** *A universal kernel on a compact set is characteristic.*


    Proof: See the Appendix at the end of the chapter.


    **Example 82** *The Gaussian kernel is characteristic. If a characteristic kernel
    based on a triangular distribution (Example 80) has a support up to a distance
    $a > 0$ from the origin and $E$ is a compact set that includes some points outside
    the support, then its kernel is not universal.*


    ## 5.5 Introduction to Empirical Processes


    In this section, we study a mathematical approach to machine learning called the
    empirical process. We analyze the accuracy of the MMD estimators by using the
    Rademacher complexity and concentration inequalities. Through this example, we
    learn the concept of empirical processes. The derivation performed in this section
    is based on Gretton et al.''s [11] proof of a proposition regarding the accuracy
    of the two-sample problem.


    In this section, we prove the following proposition. We define the MMD by


    $$\sup_{f \in \mathcal{F}} \mathbb{E}_P[f(X)] - \mathbb{E}_Q[f(X)],$$


    where $\mathcal{F}$ is a class of functions. This chapter also deals with the
    case in which $\mathcal{F} := \{f \in H | \|f\|_H \le 1\}$.


    **Proposition 58** Suppose that a $k_{max}$ exists such that $0 \le k(x, y) \le
    k_{max}$ for each $x, y \in E$. Then, for any $\epsilon > 0$, we have


    $$P\left(\left|\widehat{MMD}_B^2 - MMD^2\right| > \frac{4k_{max}}{N} + \epsilon\right)
    \le 2 \exp\left(-\epsilon^2 \frac{N}{4k_{max}}\right),$$


    where the estimator $\widehat{MMD}_B^2$ of $MMD^2$ is given by (5.3), and we assume
    that the number of samples for $x, y$ is equal to $N$ and that $P \neq Q$.


    For the proof of Proposition 58, we use an inequality that slightly generalizes
    Proposition 46.


    **Proposition 59** (McDiarmid) Let $f : E^m \to \mathbb{R}$ imply that a $c_i
    < \infty$ ($i = 1, \cdots, m$) exists satisfying


    $$\sup_{x, x_1, \dots, x_m} |f(x_1, \dots, x_m) - f(x_1, \dots, x_{i-1}, x, x_{i+1},
    \dots, x_m)| \le c_i.$$


    For any probability measure $P$, $\epsilon > 0$ and $X_1, \dots, X_m$, we have


    $$P\left(f(x_1, \dots, x_m) - \mathbb{E}_{X_1 \dots X_m} f(X_1, \dots, X_m) >
    \epsilon\right) < \exp\left(-\frac{2\epsilon^2}{\sum_{i=1}^m c_i^2}\right) \quad
    (5.12)$$


    and


    $$P\left(|f(x_1, \dots, x_m) - \mathbb{E}_{X_1 \dots X_m} f(X_1, \dots, X_m)|
    > \epsilon\right) < 2 \exp\left(-\frac{2\epsilon^2}{\sum_{i=1}^m c_i^2}\right).
    \quad (5.13)$$


    Proof: Hereafter, we denote $f(X_1, \cdots, X_N)$ and $\mathbb{E}[f(X_1, \cdots,
    X_N)]$ by $f$ and $\mathbb{E}[f]$, respectively. If we define


    $$V_1 := \mathbb{E}_{X_2 \cdots X_N}[f|X_1] - \mathbb{E}_{X_1 \cdots X_N}[f]$$

    $$\vdots$$

    $$V_i := \mathbb{E}_{X_{i+1} \cdots X_N}[f|X_1, \cdots, X_i] - \mathbb{E}_{X_1
    \cdots X_N}[f|X_1, \cdots, X_{i-1}]$$

    $$\vdots$$

    $$V_N := f - \mathbb{E}_{X_N}[f|X_1, \cdots, X_{N-1}]$$


    for $i = 1, i = 2, \cdots, N - 1$, and $i = N$, then we have


    $$f - \mathbb{E}_{X_1 \cdots X_N}[f] = \sum_{i=1}^N V_i. \tag{5.14}$$


    From


    $$\mathbb{E}_{X_i} \{ \mathbb{E}_{X_{i+1} \cdots X_N}[f|X_1, \cdots, X_i] | X_1,
    \cdots, X_{i-1} \} = \mathbb{E}_{X_i \cdots X_N}[f|X_1, \cdots, X_{i-1}]$$


    we have


    $$\mathbb{E}_{X_i}[V_i|X_1, \cdots, X_{i-1}] = 0. \tag{5.15}$$


    From (5.14), we have


    $$f - \mathbb{E}[f] > \epsilon \Longleftrightarrow \exp\{t \sum_{i=1}^N V_i\}
    > e^{t\epsilon} \text{ for arbitrary } t > 0.$$


    If we apply Markov''s inequality (Lemma 6) to the latter equation, then we have


    $$P(f - \mathbb{E}[f] \geq \epsilon) \leq \inf_{t>0} e^{-t\epsilon} \mathbb{E}[\exp\{t

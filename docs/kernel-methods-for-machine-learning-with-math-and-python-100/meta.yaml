  md: '# Chapter 4

    Kernel Computations


    In Chap. 1, we learned that the kernel $k(x, y) \in \mathbb{R}$ represents the
    similarity between two elements $x, y$ in a set $E$. Chapter 3 described the relationships
    between a kernel $k$, its feature map $E \ni x \mapsto k(x, \cdot) \in H$, and
    its reproducing kernel Hilbert space $H$. In this chapter, we consider $k(x, \cdot)$
    to be a function of $E \to \mathbb{R}$ for each $x \in E$, and we perform data
    processing for $N$ actual data pairs $(x_1, y_1), \dots, (x_N, y_N)$ of covariates
    and responses. The $x_i, i = 1, \dots, N$ (row vectors) are $p$-dimensional and
    given by the matrix $X \in \mathbb{R}^{N \times p}$. The responses $y_i$ ($i =
    1, \dots, N$) may be real or binary. This chapter discusses kernel ridge regression,
    principal component analysis, support vector machines (SVMs), and splines, and
    we find the $f \in H$ that minimizes the objective function under various constraints.
    It is known that we can write the optimal $f$ in the form $\sum_{i=1}^N \alpha_i
    k(x_i, \cdot)$ (representation theorem), and the problem reduces to finding the
    optimal $\alpha_1, \dots, \alpha_N$.


    In the second half, we address the problem of computational complexity. The computation
    of a kernel takes more than $O(N^3)$, and real-time calculation is hard when $N$
    is greater than 1000. In particular, we consider how to reduce the rank of the
    Gram matrix $K$. Specifically, we learn actual procedures for random Fourier features,
    Nystr√ґm approximation, and incomplete Cholesky decomposition.


    # 4.1 Kernel Ridge Regression



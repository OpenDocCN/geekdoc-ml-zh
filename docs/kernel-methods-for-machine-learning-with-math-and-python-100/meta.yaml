    we fix $x \in E_X, y \in E_Y$.

    3. Show that $g(x, y) = \langle f(\cdot, \star), k(x, \cdot, y, \star) \rangle_H$.


    For details, consult the proof at the end of this chapter. $\square$


    Then, we introduce the notion of expectation w.r.t. the variables $X, Y$. If we
    assume that $\mathbb{E}[k_X(X, X)]$ and $\mathbb{E}[k_Y(Y, Y)]$ are finite, then
    $\mathbb{E}_{XY}[k_X(X, \cdot)k_Y(Y, \cdot)]$ is obtained by taking the expectation

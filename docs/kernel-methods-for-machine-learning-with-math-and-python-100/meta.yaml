    $P(X \geq \epsilon) = P(sX \geq s\epsilon) = P(\exp(sX) \geq \exp(s\epsilon))
    \leq e^{-s\epsilon} \mathbb{E}[e^{sX}]$


    for $s > 0$. To prove Proposition 46, we use the following lemma:


    > **Lemma 7** (Hoeffding) *Suppose that a random variable $X$ satisfies $\mathbb{E}[X]
    = 0$ for $a \leq X \leq b$. Then, for an arbitrary $\epsilon > 0$, we have*


    $$\mathbb{E}[e^{\epsilon X}] \leq e^{\epsilon^2(b-a)^2/8}.$$


    (4.32)


    Proof: See the appendix at the end of this chapter.


    Returning to the proof of Proposition 46, let $S_n := \sum_{i=1}^n X_i$, and apply
    Lemma 5 to obtain


    $$P(S_n - \mathbb{E}[S_n] \geq \epsilon) \leq \min_{s>0} e^{-s\epsilon} \mathbb{E}[\exp\{s(S_n
    - \mathbb{E}[S_n])\}].$$


    In particular, since $X_1, \dots, X_n$ are independent, we have


    $$e^{-s\epsilon} \mathbb{E}[\exp\{s(S_n - \mathbb{E}[S_n])\}] = e^{-s\epsilon}
    \prod_{i=1}^n \mathbb{E}[e^{s(X_i - \mathbb{E}[X_i])}].$$


    Moreover, by applying Lemma 7, we obtain


    $$P(S_n - \mathbb{E}[S_n] \geq \epsilon) \leq \min_{s>0} \exp\{-s\epsilon + \frac{s^2}{8}
    \sum_{i=1}^n (b_i - a_i)^2\},$$


    in which the minimum value is attained when $s := 4\epsilon / \sum_{i=1}^n (b_i
    - a_i)^2$, and we have


    $$P(S_n - \mathbb{E}[S_n] \geq \epsilon) \leq \exp\{-2\epsilon^2 / \sum_{i=1}^n
    (b_i - a_i)^2\}.$$


    Furthermore, if we replace $X_1, \dots, X_n$ with $-X_1, \dots, -X_n$, we obtain


    $$P(S_n - \mathbb{E}[S_n] \leq -\epsilon) \leq \exp\{-2\epsilon^2 / \sum_{i=1}^n
    (b_i - a_i)^2\}.$$


    Hence, we have


    $$P(|S_n - \mathbb{E}[S_n]| \geq \epsilon) = 1 - P(|S_n - \mathbb{E}[S_n]| \leq
    \epsilon)$$

    $$\leq P(S_n - \mathbb{E}[S_n] \geq \epsilon) + P(S_n - \mathbb{E}[S_n] \leq -\epsilon)
    \leq 2 \exp\{-2\epsilon^2 / \sum_{i=1}^n (b_i - a_i)^2\}.$$


    If we substitute $\bar{X} = S_n/n$, we obtain Proposition 46. $\square$'

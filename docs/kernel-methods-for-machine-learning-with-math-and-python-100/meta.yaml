    \rangle| + |\langle x_n - x, y \rangle| \leq \|x_n\| \cdot \|y_n - y\| + \|x_n
    - x\| \cdot \|y\| \to 0$.


    ## 2.3 Hilbert Spaces


    We say that a vector space in which a norm is defined and the distance is complete
    is a Banach space. Hereafter, we denote by $C(E)$ the set of continuous functions
    defined over $E$.


    **Example 36** If $p \geq 1$, the vector space $\mathbb{R}^p$ is complete under
    the standard inner product and is a Hilbert space. On the other hand, the vector
    space $\mathbb{Q}^p$ is not complete under the standard inner product and does
    not make a Hilbert space in this case.'

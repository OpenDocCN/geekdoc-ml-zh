  md: "We often write the statistics as $\\widehat{HSIC} = \\frac{1}{N^2}\\text{trace}(K_X\
    \ H K_Y H)$, where $K_X = (k_X(x_i, x_j))_{i,j}$, $K_Y = (k_Y(y_i, y_j))_{i,j}$,\
    \ $H := I - \\frac{1}{N} E$, $I \\in \\mathbb{R}^{N \\times N}$ is the unit matrix,\
    \ and $E \\in \\mathbb{R}^{N \\times N}$ is a matrix in which all the elements\
    \ are ones. In fact, we have\n\n$$\\begin{aligned} \\text{trace}(K_X H K_Y H)\
    \ &= \\sum_i (K_X H K_Y H)_{i,i} = \\sum_i \\sum_j (K_X H)_{i,j} (K_Y H)_{j,i}\
    \ \\ &= \\sum_i \\sum_j \\left(\\sum_h k_X(x_i, x_h)(\\delta_{h,j} - \\frac{1}{N})\\\
    right) \\left\\{\\sum_h k_Y(y_j, y_h)(\\delta_{h,i} - \\frac{1}{N})\\right\\}\
    \ \\ &= \\sum_i \\sum_j \\left\\{k_X(x_i, x_j)k_Y(y_i, y_j) - \\frac{1}{N}k_X(x_i,\
    \ x_j)\\sum_h k_Y(y_i, y_h)\\right. \\ &\\quad \\left. - \\frac{1}{N}k_Y(y_i,\
    \ y_j)\\sum_h k_X(x_i, x_h) + \\frac{1}{N^2}\\sum_h k_X(x_i, x_h)\\sum_r k_Y(y_j,\
    \ y_r)\\right\\} \\ &= \\sum_i \\sum_j k_X(x_i, x_j)k_Y(y_i, y_j) - \\frac{2}{N}\\\
    sum_i \\sum_j k_X(x_i, x_j)\\sum_h k_Y(y_i, y_h) \\ &\\quad + \\frac{1}{N^2}\\\
    sum_i \\sum_h k_X(x_i, x_h)\\sum_j \\sum_r k_Y(y_j, y_r). \\end{aligned}$$\n\n\
    ```\npython\ndef HSIC_1(x, y, k_x, k_y):\n    n = len(x)\n    K_x = np.zeros((n,\
    \ n))\n    for i in range(n):\n        for j in range(n):\n            K_x[i,\
    \ j] = k_x(x[i], x[j])\n    K_y = np.zeros((n, n))\n    for i in range(n):\n \
    \       for j in range(n):\n            K_y[i, j] = k_y(y[i], y[j])\n    E = np.ones((n,\
    \ n))\n    H = np.identity(n) - E/n\n    return np.sum(np.diag(np.diag(K_x.dot(H).dot(K_y).dot(H))))\
    \ / n**2\n```\n\n**Example 76** We execute the above process for $\\sigma^2 =\

    \ -\\int_0^1 r^{(q+1)}(x)s^{(q-1)}(x)dx = \\cdots = (-1)^{q-1} \\int_0^1 r^{(2q-1)}(x)s'(x)dx$$\n\
    $$= (-1)^{q-1} \\sum_{j=1}^{N-1} r^{(2q-1)}(x_j^+) [s(x_{j+1}) - s(x_j)] = 0 \\\

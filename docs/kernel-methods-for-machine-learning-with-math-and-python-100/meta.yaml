    plt.title(\"Reconstruction for each m\")\nplt.plot(x, df[13], label = \"Original\"\
    )\nfor m in range(2, 7):\n    plt.plot(x_seq, z(13, m, x_seq), c = color[m], label\
    \ = \"m=%d\"%m)\nplt.legend(loc = \"lower center\", ncol = 2)\n```\n\nFigure 6.6\
    \ shows the output of approximating the annual temperature in Toronto by using\
    \ $m = 2, 3, 4, 5, 6$ principal components.\n\nNext, we list the principal components\
    \ in order of increasing eigenvalue and draw a graph of their contribution ratio\
    \ (Fig. 6.7).\n\n```python\nlam = pca.explained_variance_\nratio = lam / sum(lam)\

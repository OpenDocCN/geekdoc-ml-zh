    We say that $\mu$ is absolutely continuous if the probability $\mu(B)$ diminishes
    when the width sum of the intervals in any Borel set $B$ approaches zero. The
    necessary and sufficient condition ensuring that a probability density function
    exists for the probability $\mu$ is that $\mu$ is absolutely continuous. If $X$
    takes a finite number of values, the probability density function does not exist,
    which means that $\mu$ is not absolutely continuous. If $X$ takes values of $a_1
    < \cdots < a_m$, then the distribution function can be written as


    $$F_X(x) = \sum_{j: a_j \le x} \mu(\{a_j\}) \,.$$


    **Example 16** Suppose that $X$ follows the standard Gaussian distribution. If
    we make $\epsilon > 0$ close to zero, $F_X(x + \epsilon) - F_X(x - \epsilon)$
    (for any $x \in \mathbb{R}$) approaches zero, which means that the probability
    is absolutely continuous. On the other hand, suppose that $X$ takes values of
    $0, 1$; even if we make $\epsilon > 0$ close to zero, $F_X(1 + \epsilon) - F_X(1
    - \epsilon)$ does not approach zero, which means that the probability is not absolutely
    continuous.


    If we use the Lebesgue integral, we can express the probability without distinguishing
    between discrete and continuous variables.


    **Example 17** For $E = \mathbb{R}$, if the probability density function $f_X$
    exists, the expectation of $X$ can be written as $\int_E x d\mu = \int_{-\infty}^\infty
    t f_X(t) dt$. On the other hand, if $X$ takes values of $a_1 < \cdots < a_m$,
    we have $\int_E x d\mu = \sum_{j=1}^m a_j \mu(\{a_j\})$.


    # 1.5 BochnerвАЩs Theorem


    We consider the case in which a kernel is a function of the difference between
    $x, y \in E$. According to BochnerвАЩs theorem, which is the main topic of this
    section and will be used in later chapters, the kernel should coincide with a
    characteristic function in terms of probability and statistics (up to a constant).


    When utilizing a univariate function $\phi : E \to \mathbb{R}$, we often use kernels
    in the form $k(x, y) = \phi(x - y)$, such as the Gaussian kernel. The kernel $k$
    being positive definite is equivalent to the inequality


    $$\sum_{i=1}^n \sum_{j=1}^n z_i z_j \phi(x_i - x_j) \ge 0 \,, \quad z = [z_1,
    \dots, z_n] \in \mathbb{R}^n \qquad (1.8)$$


    for an arbitrary $n \ge 1$, $x_1, \dots, x_n \in E$.


    Let $i = \sqrt{-1}$ be the imaginary unit. We define the characteristic function
    of a random variable $X$ by $\varphi : \mathbb{R}^d \to \mathbb{C}$:'

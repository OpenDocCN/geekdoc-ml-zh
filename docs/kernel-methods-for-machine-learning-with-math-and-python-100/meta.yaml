  md: '2. Not just a story

    If programming codes are available, you can immediately take action. It is unfortunate
    when an ML book does not offer the source codes. Even if a package is available,
    if we cannot see the inner workings of the programs, all we can do is input data
    into those programs. In KMMP, the program codes are available for most of the
    procedures. In cases where the reader does not understand the math, the codes
    will help them know what it means.


    3. Not just a how-to book: an academic book written by a university professor.

    This book explains how to use the package and provides examples of executions
    for those unfamiliar with them. Still, because only the inputs and outputs are
    visible, we can see the procedure as a black box. In this sense, the reader will
    have limited satisfaction because they will not obtain the subject''s essence.
    KMMP intends to show the reader the heart of ML and is more of a full-fledged
    academic book.


    4. Solve 100 exercises: problems are improved with feedback from university students

    The exercises in this book have been used in university lectures and refined based
    on students'' feedback. The best 100 problems were selected. Each chapter (except
    the exercises) explains the solutions, and you can solve all of the exercises
    by reading the book.


    5. Self-contained

    All of us have been discouraged by phrases such as "for the details, please refer
    to the literature XX". Unless you are an enthusiastic reader or researcher, nobody
    will seek out those references. In this book, we have presented the material so
    that consulting external references is not required. Additionally, the proofs
    are simple derivations, and the complicated proofs are given in the appendices
    at the end of each chapter. KMMP completes all discussions, including the appendices.


    6. Readers'' pages: questions, discussion, and program files The reader can ask
    any question on the book via https://bayesnet.org/books.



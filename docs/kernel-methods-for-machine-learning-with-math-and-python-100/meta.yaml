  md: "```\npython\ndef kernel_pca_train(x, k):\n    n = x.shape[0]\n    K = np.zeros((n,\
    \ n))\n    S = [0] * n; T = [0] * n\n    for i in range(n):\n        for j in\
    \ range(n):\n            K[i, j] = k(x[i, :], x[j, :])\n    for i in range(n):\n\
    \        S[i] = np.sum(K[i, :])\n    for j in range(n):\n        T[j] = np.sum(K[:,\
    \ j])\n    U = np.sum(K)\n    for i in range(n):\n        for j in range(n):\n\
    \            K[i, j] = K[i, j] - S[i] / n - T[j] / n + U / n**2\n    val, vec\
    \ = np.linalg.eig(K)\n    idx = val.argsort()[::-1]  # decreasing order as R\n\
    \    val = val[idx]\n    vec = vec[:,idx]\n    alpha = np.zeros((n, n))\n    for\
    \ i in range(n):\n        alpha[:, i] = vec[:, i] / val[i]**0.5\n    return alpha\n\
    ```\n\n```\npython\ndef kernel_pca_test(x, k, alpha, m, z):\n    n = x.shape[0]\n\
    \    pca = np.zeros(m)\n    for i in range(n):\n        pca = pca + alpha[i, 0:m]\
    \ * k(x[i, :], z)\n    return pca\n```\n\nIn kernel PCA, when we use the linear\
    \ kernel, the scores are consistent with those of PCA without any kernel. For\
    \ simplicity, we assume that $X$ is normalized. If we do not use the kernel, then\
    \ by the singular value decomposition of $X = U \\Sigma V^\\top$ ($U \\in \\mathbb{R}^{N\
    \ \\times p}$, $\\Sigma \\in \\mathbb{R}^{p \\times p}$, $V \\in \\mathbb{R}^{p\
    \ \\times p}$), the multiplication of $\\frac{1}{N-1} X^\\top X = \\frac{1}{N-1}\
    \ V \\Sigma^2 V^\\top$ and $V^\\top$ is $\\frac{1}{N-1} X^\\top X V = \\frac{1}{N-1}\
    \ V \\Sigma^2$. Thus, each column of $V$ is a principal component vector, and\
    \ the scores of $x_1, \\dots, x_N \\in \\mathbb{R}^p$ (row vector) are the first\
    \ $m$ columns of\n\n$$XV = U \\Sigma V^\\top \\cdot V = U \\Sigma \\,.$$\n\nOn\
    \ the other hand, for the linear kernel, we may write the Gram matrix as $K =\
    \ XX^\\top = U \\Sigma^2 U^\\top$ and have $KU = XX^\\top U = U \\Sigma^2$. That\
    \ is, each column of $U$ is $\\beta_1, \\dots, \\beta_N$, and the columns $\\\
    alpha_1, \\dots, \\alpha_N$ of $K^{-1/2}U$ are the principal component vectors.\
    \ Therefore, the scores of $x_1, \\dots, x_N \\in \\mathbb{R}^p$ (row vectors)\
    \ are the first $m$ columns of\n\n$$K \\cdot K^{-1/2}U = U \\Sigma^2 U^\\top \\\
    cdot (U \\Sigma^2 U^\\top)^{-1/2} \\cdot U = U \\Sigma \\,.$$\n\nFurthermore,\

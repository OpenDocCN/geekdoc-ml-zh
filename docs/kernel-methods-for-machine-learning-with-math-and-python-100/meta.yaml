- md: "## 5.3 The HSIC and Independence Test\n\nLet $(E, \\mathcal{F}, P)$ be a probability\
    \ space. We say that events $A, B \\in \\mathcal{F}$ are independent if $P(A)P(B)\
    \ = P(A \\cap B)$.\n\nSuppose that sequences $x_1, \\dots, x_N \\in \\mathbb{R}$\
    \ and $y_1, \\dots, y_N \\in \\mathbb{R}$ with the same length $N \\ge 1$ have\
    \ occurred according to the distributions of the random variables $X, Y$. We wish\
    \ to test the independence of $X, Y$, where both $x_i, x_j$ and $y_i, y_j$ are\
    \ independent, but we do not know whether $x_i, y_i$ are independent.\n\nFor example,\
    \ if the empirical correlation coefficient\n\n$$\\hat{\\rho} = \\frac{(1/N) \\\
    sum_{i=1}^N (x_i - \\bar{x}) \\sum_{i=1}^N (y_i - \\bar{y})}{\\{(1/N) \\sum_{i=1}^N\
    \ (x_i - \\bar{x})^2\\}^{1/2} \\{(1/N) \\sum_{i=1}^N (y_i - \\bar{y})^2\\}^{1/2}}$$\n\
    \nis close to zero for $\\bar{x} := (1/N) \\sum_{i=1}^N x_i$ and $\\bar{y} :=\
    \ (1/N) \\sum_{i=1}^N y_i$, then we may say that the variables are independent.\n\
    \n**Example 74** (Gaussian Distribution) For simplicity, we assume that $X, Y$\
    \ follows the standard Gaussian distribution. If $X, Y$ are independent (written\
    \ as $X \\perp\\!\\!\\perp Y$), then their covariance\n\n$$\\mathbb{E}[XY] = \\\
    int_E \\int_E xy f_{XY}(x, y) dxdy = \\int_E \\int_E xy f_X(x) f_Y(y) dxdy = \\\
    int_E x f_X(x) dx \\int_E y f_Y(y) dy$$\n\nis 0, and $\\rho_{XY} = \\mathbb{E}[XY]\
    \ = 0$ follows. Since we can write $f_{XY}(x, y)$ as\n\n$$\\frac{1}{2\\sqrt{1\
    \ - \\rho_{XY}^2}} \\exp\\left\\{-\\frac{1}{2(1 - \\rho_{XY}^2)} (x^2 - 2\\rho_{XY}xy\
    \ + y^2)\\right\\},$$\n\nwe see that $\\rho_{XY} = 0$ implies $f_{XY}(x, y) =\
    \ f_X(x) f_Y(y)$. Hence, $\\rho_{XY} = 0 \\Longleftrightarrow X \\perp\\!\\!\\\
    perp Y$ follows.\n\nHowever, as in the following derivation, in general, $\\rho_{XY}\
    \ = 0$ does not mean that $X \\perp\\!\\!\\perp Y$.\n\n**Example 75** Let $X =\
    \ \\cos \\theta$ and $Y = \\sin \\theta$. We uniformly generate random variables\
    \ $0 \\le \\theta < 2\\pi$, which means that $(X, Y)$ is uniform over the unit\
    \ circle. If $X$ is determined, then $Y = \\pm \\sqrt{1 - X^2}$, and if one of\
    \ $X, Y$ is determined, then at most two possibilities exist for the other. Therefore,\
    \ the two variables are not independent. However, since the mean of $X, Y$ is\
    \ $\\mu_X = \\mu_Y = 0$, the covariance can be calculated as\n\n$$\\mathbb{E}_{XY}[(X\
    \ - \\mu_X)(Y - \\mu_Y)] = \\mathbb{E}_{XY}[XY] = \\mathbb{E}_{XY}[\\cos \\theta\
    \ \\sin \\theta] = \\frac{1}{2} \\mathbb{E}_{XY}[\\sin 2\\theta] = 0$$\n\nand\
    \ the correlation coefficient $\\rho_{XY}$ is 0.\n\nTo this end, Gretton et al.\
    \ [12] thought that to test the independence of random variables $X, Y$, if we\
    \ map $E \\ni X \\mapsto k_X(X, \\cdot) \\in H_X$ and $E \\ni Y \\mapsto k_Y(Y,\
    \ \\cdot) \\in H_Y$ for kernels $k_X, k_Y$, and perform the test of independence\
    \ based on the covariance between $k_X(X, \\cdot)$ and $k_Y(Y, \\cdot)$, such\
    \ an inconvenience would not occur. They devised a statistical test for $\\mathbb{E}[k_X(X,\
    \ \\cdot)k_Y(Y, \\cdot)] = \\mathbb{E}[k_X(X, \\cdot)]\\mathbb{E}[k_Y(Y, \\cdot)]$\
    \ rather than $\\mathbb{E}[XY] = \\mathbb{E}[X]\\mathbb{E}[Y]$. We define\n\n\
    $$HSIC(X, Y) := \\|m_X m_Y - m_{XY}\\|^2_{H_X \\otimes H_Y} \\in \\mathbb{R},$$\n\
    \nwhich is the norm of the covariance $m_X m_Y - m_{XY} \\in H_1 \\otimes H_2$,\
    \ i.e., the Hilbert-Schmidt information criterion (HSIC). Since the HSIC is a\
    \ norm, it is zero only if $m_X m_Y - m_{XY} \\in H_X \\otimes H_Y$ is zero. The\
    \ HSIC is the $MMD^2$ when $m_P = m_X m_Y$ with $m_Q = m_{XY}$.\n\n**Proposition\
    \ 52** (Gretton et al. [12]) *When the reproducing kernels $k_X, k_Y : E \\to\
    \ \\mathbb{R}$ in $H_X, H_Y$ are both characteristic kernels, the random variables\
    \ $X, Y$ that take values in $E$ being independent and $HSIC(X, Y) = 0$ are equivalent,\
    \ i.e.,*\n\n$$HSIC(X, Y) = 0 \\Longleftrightarrow X \\perp\\!\\!\\!\\perp Y.$$\n\
    \nProof: If $k_X, k_Y$ are both characteristic, then from Proposition 55 (see\
    \ below), $k_X k_Y$ is also characteristic. Therefore, for $m_X(\\cdot) := \\\
    int_E k_X(x, \\cdot)dP_X(x) \\in H_X$, $m_Y(\\cdot) := \\int_E k_Y(y, \\cdot)dP_Y(y)\
    \ \\in H_Y$, and $m_{XY}(\\cdot, \\star) := \\int_E k_X(x, \\cdot)k_Y(y, \\star)dP_{XY}(x,\
    \ y) \\in H_X \\otimes H_Y$, the map $P_{X \\otimes Y} \\ni P_{XY} \\mapsto m_{XY}\
    \ \\in H_X \\otimes H_Y$ is injective. Hence, we have\n\n$$X \\perp\\!\\!\\!\\\
    perp Y \\Longleftrightarrow P_{XY} = P_X P_Y \\Longleftrightarrow m_{XY} = m_X\
    \ m_Y \\Longleftrightarrow HSIC(X, Y) = 0,$$\n\nwhere the second $\\Longleftrightarrow$\
    \ is due to (5.2).\n\nFrom Propositions 50 and 52, we have that\n\n**Corollary\
    \ 2** *both of the reproducing kernels $k_X, k_Y : E \\to \\mathbb{R}$ of $H_X,\
    \ H_Y$ are characteristic, and we obtain*\n\n$$\\Sigma_{XY} = \\Sigma_{YX} = 0\
    \ \\Longleftrightarrow X \\perp\\!\\!\\!\\perp Y.$$\n\nIf we abbreviate $\\| \\\
    cdot \\|_{X \\otimes Y}$ and $\\langle \\cdot, \\cdot \\rangle_{X \\otimes Y}$\
    \ as $\\| \\cdot \\|$ and $\\langle \\cdot, \\cdot \\rangle$, respectively, then\
    \ we have\n\n$$\\|m_{XY}\\|^2 = \\langle \\mathbb{E}_{XY}[k_X(X, \\cdot)k_Y(Y,\
    \ \\cdot)], \\mathbb{E}_{X'Y'}[k_X(X', \\cdot)k_Y(Y', \\cdot)] \\rangle$$\n$$=\
    \ \\mathbb{E}_{XY} \\mathbb{E}_{X'Y'} [\\langle k_X(X, \\cdot)k_Y(Y, \\cdot),\
    \ k_X(X', \\cdot)k_Y(Y', \\cdot) \\rangle]$$\n$$= \\mathbb{E}_{XYX'Y'} [k_X(X,\
    \ X')k_Y(Y, Y')],$$\n\n$\\langle m_{XY}, m_X m_Y \\rangle = \\langle \\mathbb{E}_{XY}[k_X(X,\
    \ \\cdot)k_Y(Y, \\cdot)], \\mathbb{E}_{X'}[k_X(X', \\cdot)]\\mathbb{E}_{Y'}[k_Y(Y',\
    \ \\cdot)] \\rangle$\n$= \\mathbb{E}_{XY} \\{ \\mathbb{E}_{X'} [\\langle k_X(X,\
    \ \\cdot)k_Y(Y, \\cdot), k_X(X', \\cdot)\\mathbb{E}_{Y'}[k_Y(Y', \\cdot)] \\rangle]\
    \ \\}$\n$= \\mathbb{E}_{XY} \\{ \\mathbb{E}_{X'} [k_X(X, X')] \\mathbb{E}_{Y'}\
    \ [\\langle k_Y(Y, \\cdot), k_Y(Y', \\cdot) \\rangle] \\}$\n$= \\mathbb{E}_{XY}\
    \ \\{ \\mathbb{E}_{X'} [k_X(X, X')] \\mathbb{E}_{Y'} [k_Y(Y, Y')] \\},$\n\nand\n\
    \n$\\|m_X m_Y\\|^2 = \\langle \\mathbb{E}_X[k_X(X, \\cdot)]\\mathbb{E}_Y[k_Y(Y,\
    \ \\cdot)], \\mathbb{E}_{X'}[k_X(X', \\cdot)]\\mathbb{E}_{Y'}[k_Y(Y', \\cdot)]\
    \ \\rangle$\n$= \\mathbb{E}_X \\mathbb{E}_{X'} [k_X(X, X')] \\mathbb{E}_Y \\mathbb{E}_{Y'}\
    \ [k_Y(Y, Y')],$\n\nwhere $X, X'$ ($Y, Y'$) are independent and follow the same\
    \ distribution. Hence, we can write $HSIC(X, Y)$ as\n\n$HSIC(X, Y) := \\|m_{XY}\
    \ - m_X m_Y\\|^2$\n$= \\mathbb{E}_{XX'YY'} [k_X(X, X')k_Y(Y, Y')] - 2\\mathbb{E}_{XY}\
    \ \\{ \\mathbb{E}_{X'} [k_X(X, X')] \\mathbb{E}_{Y'} [k_Y(Y, Y')] \\}$\n$+ \\\
    mathbb{E}_{XX'} [k_X(X, X')] \\mathbb{E}_{YY'} [k_Y(Y, Y')] . \\quad (5.8)$\n\n\
    When applying the HSIC, we often construct the following estimator, replacing\
    \ the mean by the relative frequency.\n\n$\\widehat{HSIC} := \\frac{1}{N^2} \\\
    sum_i \\sum_j k_X(x_i, x_j)k_Y(y_i, y_j) - \\frac{2}{N^3} \\sum_i \\sum_j k_X(x_i,\
    \ x_j) \\sum_h k_Y(y_i, y_h)$\n$+ \\frac{1}{N^4} \\sum_i \\sum_j k_X(x_i, x_j)\
    \ \\sum_h \\sum_r k_Y(y_h, y_r) \\quad (5.9)$\n\nFor example, we can write the\
    \ HSIC in the Python as follows.\n\n```python\ndef HSIC_1(x, y, k_x, k_y):\n \
    \   n = len(x)\n    S = 0\n    for i in range(n):\n        for j in range(n):\n\
    \            S = S + k_x(x[i], x[j])*k_y(y[i], y[j])\n    T = 0\n    for i in\
    \ range(n):\n        T_1 = 0\n        for j in range(n):\n            T_1 = T_1\
    \ + k_x(x[i], x[j])\n        T_2 = 0\n        for l in range(n):\n           \
    \ T_2 = T_2 + k_y(y[i], y[l])\n        T = T + T_1 * T_2\n    U = 0\n    for i\
    \ in range(n):\n        for j in range(n):\n            U = U + k_x(x[i], x[j])\n\
    \    V = 0\n    for i in range(n):\n        for j in range(n):\n            V\
    \ = V + k_y(y[i], y[j])\n    return S/n**2 - 2*T/n**3 + U*V/n**4\n```\n\nWe often\
    \ write the statistics as $\\widehat{HSIC} = \\frac{1}{N^2}\\text{trace}(K_X H\
    \ K_Y H)$, where $K_X = (k_X(x_i, x_j))_{i,j}$, $K_Y = (k_Y(y_i, y_j))_{i,j}$,\
    \ $H := I - \\frac{1}{N} E$, $I \\in \\mathbb{R}^{N \\times N}$ is the unit matrix,\
    \ and $E \\in \\mathbb{R}^{N \\times N}$ is a matrix in which all the elements\
    \ are ones. In fact, we have\n\n$$\\begin{aligned} \\text{trace}(K_X H K_Y H)\
    \ &= \\sum_i (K_X H K_Y H)_{i,i} = \\sum_i \\sum_j (K_X H)_{i,j} (K_Y H)_{j,i}\
    \ \\\\ &= \\sum_i \\sum_j \\left(\\sum_h k_X(x_i, x_h)(\\delta_{h,j} - \\frac{1}{N})\\\
    right) \\left\\{\\sum_h k_Y(y_j, y_h)(\\delta_{h,i} - \\frac{1}{N})\\right\\}\
    \ \\\\ &= \\sum_i \\sum_j \\left\\{k_X(x_i, x_j)k_Y(y_i, y_j) - \\frac{1}{N}k_X(x_i,\
    \ x_j)\\sum_h k_Y(y_i, y_h)\\right. \\\\ &\\quad \\left. - \\frac{1}{N}k_Y(y_i,\
    \ y_j)\\sum_h k_X(x_i, x_h) + \\frac{1}{N^2}\\sum_h k_X(x_i, x_h)\\sum_r k_Y(y_j,\
    \ y_r)\\right\\} \\\\ &= \\sum_i \\sum_j k_X(x_i, x_j)k_Y(y_i, y_j) - \\frac{2}{N}\\\
    sum_i \\sum_j k_X(x_i, x_j)\\sum_h k_Y(y_i, y_h) \\\\ &\\quad + \\frac{1}{N^2}\\\
    sum_i \\sum_h k_X(x_i, x_h)\\sum_j \\sum_r k_Y(y_j, y_r). \\end{aligned}$$\n\n\
    ```python\ndef HSIC_1(x, y, k_x, k_y):\n    n = len(x)\n    K_x = np.zeros((n,\
    \ n))\n    for i in range(n):\n        for j in range(n):\n            K_x[i,\
    \ j] = k_x(x[i], x[j])\n    K_y = np.zeros((n, n))\n    for i in range(n):\n \
    \       for j in range(n):\n            K_y[i, j] = k_y(y[i], y[j])\n    E = np.ones((n,\
    \ n))\n    H = np.identity(n) - E/n\n    return np.sum(np.diag(np.diag(K_x.dot(H).dot(K_y).dot(H))))\
    \ / n**2\n```\n\n**Example 76** We execute the above process for $\\sigma^2 =\
    \ 1$ and\n\n$$k_X(x, y) = k_Y(x, y) = \\exp\\left(-\\frac{1}{2\\sigma^2}\\|x -\
    \ y\\|^2\\right)$$\n\n(Gaussian kernel) as follows.\n\n```python\ndef k_x(x, y):\n\
    \    return np.exp(-np.linalg.norm(x - y)**2/2)\nk_y = k_x\nk_z = k_x\nn = 100\n\
    for a in [0, 0.1, 0.2, 0.4, 0.6, 0.8]:  # a is the correlation\n    x = np.random.randn(n)\n\
    \    z = np.random.randn(n)\n    y = a * x + np.sqrt(1 - a**2) * z\n    print(HSIC_1(x,\
    \ y, k_x, k_y))\n```"

    the radius $\epsilon$ of the open set $U(x, \epsilon)$ is sufficiently small,
    then $E(\eta)$, $U(x, \epsilon)$ has no intersection.


    Here, if $E(\eta) = E$, then (5.11) means that $\mu = 0$, i.e., $\mu_1 = \mu_2$.
    On the other hand, if $E(\eta) \subseteq E$, then a $\mu \neq 0$ exists such that
    (5.11) holds.


    **Proposition 54** $k(x, y) = \phi(x - y)$ is characteristic if and only if the
    support of the finite measure $\eta$ of $k(x - y) = \int_E e^{i(x-y)w} d\eta(w)$
    coincides with $E$.


    For the proof of necessity, see the Appendix at the end of this chapter.


    **Example 80** The Gaussian kernel in Example 19 and the Laplace kernel in Example

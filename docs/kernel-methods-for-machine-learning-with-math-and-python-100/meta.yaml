    (i.e., the probability density function $f_X$ exists), then $\varphi(t) := \mathbb{E}[\exp(it^\top
    X)] = \int_E \exp(it^\top x) f_X(x) dx$ is the Fourier transformation of $f_X(x)
    = \frac{d\mu(x)}{dx}$, and $f_X(x)$ can be recovered from $\varphi(x)$ via the
    inverse Fourier transformation


    $f_X(x) = \frac{1}{2\pi} \int_{-\infty}^{\infty} \varphi(t) e^{-it^\top x} dt$.


    **Example 18** The characteristic function of the Gaussian distribution with a

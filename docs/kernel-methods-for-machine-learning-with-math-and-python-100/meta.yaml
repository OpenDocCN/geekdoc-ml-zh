    \ import PCA\nimport skfda\n```\n\n```\n# Definition of (m, k)\ndef m(x):\n  \
    \  return 0\ndef k(x, y):\n    return np.exp(-(x-y)**2/2)\n# Definition of gp_sample\n\
    def gp_sample(x, m, k):\n    n = len(x)\n    m_x = m(x)\n    k_xx = np.zeros((n,\

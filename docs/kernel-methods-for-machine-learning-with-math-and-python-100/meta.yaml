- md: "## Chapter 4\nKernel Computations\n\nIn Chap. 1, we learned that the kernel\
    \ $k(x, y) \\in \\mathbb{R}$ represents the similarity between two elements $x,\
    \ y$ in a set $E$. Chapter 3 described the relationships between a kernel $k$,\
    \ its feature map $E \\ni x \\mapsto k(x, \\cdot) \\in H$, and its reproducing\
    \ kernel Hilbert space $H$. In this chapter, we consider $k(x, \\cdot)$ to be\
    \ a function of $E \\to \\mathbb{R}$ for each $x \\in E$, and we perform data\
    \ processing for $N$ actual data pairs $(x_1, y_1), \\dots, (x_N, y_N)$ of covariates\
    \ and responses. The $x_i, i = 1, \\dots, N$ (row vectors) are $p$-dimensional\
    \ and given by the matrix $X \\in \\mathbb{R}^{N \\times p}$. The responses $y_i$\
    \ ($i = 1, \\dots, N$) may be real or binary. This chapter discusses kernel ridge\
    \ regression, principal component analysis, support vector machines (SVMs), and\
    \ splines, and we find the $f \\in H$ that minimizes the objective function under\
    \ various constraints. It is known that we can write the optimal $f$ in the form\
    \ $\\sum_{i=1}^N \\alpha_i k(x_i, \\cdot)$ (representation theorem), and the problem\
    \ reduces to finding the optimal $\\alpha_1, \\dots, \\alpha_N$.\n\nIn the second\
    \ half, we address the problem of computational complexity. The computation of\
    \ a kernel takes more than $O(N^3)$, and real-time calculation is hard when $N$\
    \ is greater than 1000. In particular, we consider how to reduce the rank of the\
    \ Gram matrix $K$. Specifically, we learn actual procedures for random Fourier\
    \ features, Nystr√ґm approximation, and incomplete Cholesky decomposition.\n\n\
    ## 4.1 Kernel Ridge Regression\n\nWe say that finding the $\\beta \\in \\mathbb{R}^p$\
    \ (column vector) that minimizes $\\sum_{i=1}^N (y_i - x_i \\beta)^2$ is the least-squares\
    \ problem. If we assume that we have executed the centralization process such\
    \ that $y_i \\leftarrow y_i - \\bar{y}$ and $x_{i,j} \\leftarrow x_{i,j} - \\\
    bar{x}_j$ for $\\bar{y} = \\frac{1}{N} \\sum_{i=1}^N y_i$ and $\\bar{x}_j = \\\
    frac{1}{N} \\sum_{i=1}^N x_{i,j}$ and that the matrix $X^\\top X$ is nonsingular,\
    \ we can obtain the solution as $\\hat{\\beta} = (X^\\top X)^{-1} X^\\top y$ from\
    \ $X = (x_{i,j})$ and $y = (y_i)$. In the following, we prepare a kernel $k :\
    \ E \\times E \\to \\mathbb{R}$ and consider the problem of finding the $f \\\
    in H$ that minimizes\n\n$$L := \\sum_{i=1}^N (y_i - f(x_i))^2.$$\n\nAs we considered\
    \ in Example 40, we express the RKHS $H$ as the sum of\n\n$$M := \\text{span}(\\\
    {k(x_i, \\cdot)\\}_{i=1}^N)$$\n\nand\n\n$$M^\\perp = \\{f \\in H | \\langle f,\
    \ k(x_i, \\cdot) \\rangle_H = 0, i = 1, \\dots, N\\}.$$\n\nIf we set $f = f_1\
    \ + f_2, f_1 \\in M, f_2 \\in M^\\perp$, then we have\n\n$$\\sum_{i=1}^N (y_i\
    \ - f(x_i))^2 = \\sum_{i=1}^N (y_i - f_1(x_i))^2 = \\sum_{i=1}^N (y_i - \\sum_{j=1}^N\
    \ \\alpha_j k(x_j, x_i))^2 \\quad (4.1)$$\n\nand $E := \\mathbb{R}^p$; we then\
    \ obtain\n\n$$f(x_i) = \\langle f_1(\\cdot) + f_2(\\cdot), k(x_i, \\cdot) \\rangle_H\
    \ = \\langle f_1(\\cdot), k(x_i, \\cdot) \\rangle_H = f_1(x_i)$$\n\nfor $i = 1,\
    \ \\dots, N$. Thus, the minimization of $L$ reduces to that of\n\n$$L = \\sum_{i=1}^N\
    \ \\{y_i - \\sum_{j=1}^N \\alpha_j k(x_j, x_i)\\}^2 = \\|y - K\\alpha\\|^2, \\\
    quad (4.2)$$\n\nwhere $K = (k(x_i, x_j))_{i,j=1,\\dots,N}$ is a Gram matrix, and\
    \ the norm $\\|z\\|$ of $z = [z_1, \\dots, z_N] \\in \\mathbb{R}$ denotes $\\\
    sqrt{\\sum_{i=1}^N z_i^2}$. The above principle is the representation theorem.\n\
    \nIf we differentiate $L$ by $\\alpha$, we have $-K(y - K\\alpha) = 0$. If $K$\
    \ is positive definite rather than nonnegative definite, then the solution becomes\
    \ $\\hat{\\alpha} = K^{-1}y$.\n\nIf we use the $\\hat{f} \\in H$ obtained as above\
    \ that minimizes (4.2), then we can predict the value of $y$ given a new $x \\\
    in \\mathbb{R}^p$ via\n\n$$\\hat{f}(x) = \\sum_{i=1}^n \\hat{\\alpha}_i k(x_i,\
    \ x).$$\n\nWe can construct a procedure to compute $\\alpha$ as follows:\n\n```\n\
    # We install skfda module beforehand\npip install cvxopt\n```\n\n```\n# In this\
    \ chapter, we assume that the following have been executed.\nimport numpy as np\n\
    import pandas as pd\nfrom sklearn.decomposition import PCA\nimport cvxopt\nfrom\
    \ cvxopt import solvers\nfrom cvxopt import matrix\nimport matplotlib.pyplot as\
    \ plt\nfrom matplotlib import style\nstyle.use(\"seaborn-ticks\")\nfrom numpy.random\
    \ import randn # Gaussian random numbers\nfrom scipy.stats import norm\n```\n\n\
    ```\ndef alpha(k, x, y):\n    n = len(x)\n    K = np.zeros((n, n))\n    for i\
    \ in range(n):\n        for j in range(n):\n            K[i, j] = k(x[i], x[j])\n\
    \    return np.linalg.inv(K + 10e-5 * np.identity(n)).dot(y)\n    # Add 10^(-5)\
    \ I to K for making it invertible\n```\n\n**Example 63** Utilizing the function\
    \ alpha, we execute kernel regression via polynomial and Gaussian kernels for\
    \ $n = 50$ data ($\\lambda = 0.1$). We present the output in Fig.4.1.\n\n```\n\
    def k_p(x, y):        # Kernel Definition\n    return (np.dot(x.T, y) + 1)**3\n\
    def k_g(x, y):        # Kernel Definition\n    return np.exp(-(x - y)**2 / 2)\n\
    ```\n\n```\nlam = 0.1\nn = 50; x = np.random.randn(n); y = 1 + x + x**2 + np.random.randn(n)\
    \ # Data Generation\nalpha_p = alpha(k_p, x, y)\nalpha_g = alpha(k_g, x, y)\n\n\
    z = np.sort(x); u = []; v = []\nfor j in range(n):\n    S = 0\n    for i in range(n):\n\
    \        S = S + alpha_p[i] * k_p(x[i], z[j])\n    u.append(S)\n    S = 0\n  \
    \  for i in range(n):\n        S = S + alpha_g[i] * k_g(x[i], z[j])\n    v.append(S)\n\
    \nplt.scatter(x, y, facecolors='none', edgecolors = \"k\", marker = \"o\")\n```\n\
    \n## Kernel Regression\n\n![](img/075acd5c7a7f62a80a28ffffee1ae5d9_102_0.png)\n\
    \nFig. 4.1 We execute kernel regression by using polynomial and Gaussian kernels\n\
    \n```\nplt.plot(z, u, c = \"r\", label = \"Polynomial_Kernel\")\nplt.plot(z, v,\
    \ c = \"b\", label = \"Gauss_Kernel\")\nplt.xlim(-1, 1)\nplt.ylim(-1, 5)\nplt.xlabel(\"\
    x\")\nplt.ylabel(\"y\")\nplt.title(\"Kernel_Regression\")\nplt.legend(loc = \"\
    upper_left\", frameon = True, prop={'size':14})\n```\n\nWe cannot obtain the solution\
    \ of a linear regression problem when the rank of $X$ is smaller than $p$, i.e.,\
    \ $N < p$. Thus, we often minimize\n\n$$\\sum_{i=1}^{N} (y_i - x_i \\beta)^2 +\
    \ \\lambda \\|\\beta\\|_2^2$$\n\nfor cases in which $\\lambda > 0$. We call such\
    \ a modification of linear regression a ridge. The $\\beta$ to be minimized is\
    \ given by $(X^\\top X + \\lambda I)^{-1} X^\\top y$. In fact, we derive the formula\
    \ by differentiating\n\n$$\\|y - X\\beta\\|^2 + \\lambda \\beta^\\top \\beta$$\n\
    \nby $\\beta$ and equating it to zero; we obtain\n\n$$-X^\\top (y - X\\beta) +\
    \ \\lambda \\beta = 0.$$\n\nWe consider extending ridge regression to the problem\
    \ of finding the $f \\in H$ that minimizes\n\n$$L' := \\sum_{i=1}^{N} (y_i - f(x_i))^2\
    \ + \\lambda \\|f\\|_H^2 .$$\n\nSince $f_1$ and $f_2$ are orthogonal, we have\n\
    \n$$\\|f\\|_H^2 = \\|f_1\\|_H^2 + \\|f_2\\|_H^2 + 2\\langle f_1, f_2 \\rangle_H\
    \ = \\|f_1\\|_H^2 + \\|f_2\\|_H^2 \\geq \\|f_1\\|_H^2 .$$\n\nFrom (4.1), (4.3),\
    \ and (4.4), we also have\n\n$$L' \\geq \\sum_{i=1}^{N} (y_i - f_1(x_i))^2 + \\\
    lambda \\|f_1\\|_H^2 .$$\n\nIf we note that the second term can be expressed by\n\
    \n$$\\|f_1\\|_H^2 = \\left\\langle \\sum_{i=1}^{N} \\alpha_i k(x_i, \\cdot), \\\
    sum_{j=1}^{N} \\alpha_j k(x_j, \\cdot) \\right\\rangle_H = \\sum_{i=1}^{N} \\\
    sum_{j=1}^{N} \\alpha_i \\alpha_j \\langle k(x_i, \\cdot), k(x_j, \\cdot) \\rangle_H\
    \ = \\alpha^\\top K \\alpha$$\n\nfor $\\alpha = [\\alpha_1, \\dots, \\alpha_N]^\\\
    top$, then the minimization of $L'$ reduces to that of\n\n$$\\|y - K\\alpha\\\
    |^2 + \\lambda \\alpha^\\top K \\alpha .$$\n\nIf we differentiate the equation\
    \ by $\\alpha$ and set it equal to zero, we obtain\n\n$$-K(y - K\\alpha) + \\\
    lambda K \\alpha = 0 .$$\n\nIf $K$ is nonsingular, we have\n\n$$\\hat{\\alpha}\
    \ = (K + \\lambda I)^{-1} y .$$\n\nFinally, if we use the $\\hat{f} \\in H$ that\
    \ minimizes the (4.3) obtained thus far, we can predict the value of $y$ given\
    \ a new $x \\in \\mathbb{R}^p$ via\n\n$$\\hat{f}(x) = \\sum_{i=1}^{n} \\hat{\\\
    alpha}_i k(x_i, x) .$$\n\nFor example, we can construct a procedure that finds\
    \ $\\alpha$ as follows:\n\n```\ndef alpha(k, x, y):\n    n = len(x)\n    K = np.zeros((n,\
    \ n))\n    for i in range(n):\n        for j in range(n):\n            K[i, j]\
    \ = k(x[i], x[j])\n    return np.linalg.inv(K + lam * np.identity(n)).dot(y)\n\
    ```\n\n96\n\n4 Kernel Computations\n\nFig. 4.2 We execute kernel ridge regression\
    \ using polynomial and Gaussian kernels\n\n![](img/075acd5c7a7f62a80a28ffffee1ae5d9_104_0.png)\n\
    \nExample 64 Using the function alpha, we execute kernel ridge regression for\

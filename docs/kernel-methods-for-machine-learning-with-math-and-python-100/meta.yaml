    \ RR^\\top$пЉМељУдЄФдїЕељУ $A$ жШѓж≠£еЃЪзЪДгАВ*\n\nиЃЄе§Ъдє¶з±НйГљжґµзЫЦдЇЖињЩдЄАеЖЕеЃєгАВжЬЙеЕ≥иѓБжШОпЉМиѓЈеПВиІБдЊЛе¶В[9]гАВдї•дЄЛжШѓCholeskyеИЖиІ£ињЗз®ЛгАВжИСдїђжЮДеїЇиѓ•ињЗз®ЛпЉМдї•дЊњеПѓдї•еЬ®дїїдљХжЧґеАЩеБЬж≠ҐпЉМдї•иОЈеЊЧзІ©\
    \ $r \\leq N$ зЪД $RR^\\top$ ињСдЉЉгАВ\n\n1.  еЬ®еИЭеІЛйШґжЃµпЉМ$B = A$пЉМдЄФ $R$ жШѓдЄАдЄ™йЫґзЯ©йШµгАВ\n\n![](img/075acd5c7a7f62a80a28ffffee1ae5d9_127_0.png)\n\
    \nеЫЊ 4.8 жИСдїђеѓє $N = 300$ дЄФзІ© $m = 10, 20$ зЪДжХ∞жНЃињЫи°МдЇЖињСдЉЉгАВдЄКдЄЛе≠РеЫЊеИЖеИЂжШЊз§ЇдЇЖињРи°М $\\lambda = 10^{-5}$\
    \ еТМ $\\lambda = 10^{-3}$ жЧґиОЈеЊЧзЪДзїУжЮЬгАВзЇҐзЇњеТМиУЭзЇњеИЖеИЂжШѓжЬ™ињСдЉЉеТМињСдЉЉиОЈеЊЧзЪДзїУжЮЬгАВељУ $m = 20$ жЧґпЉМеЕґз≤ЊеЇ¶дЄОжЬ™ињСдЉЉзЪДжГЕеЖµеЗ†дєОзЫЄеРМгАВ$\\\
    lambda$ зЪДеАЉиґКе§ІпЉМињСдЉЉиѓѓеЈЃиґКе∞ПгАВ\n\n2.  еѓєдЇОжѓПдЄ™ $i = 1, \\ldots, r$пЉМ$R$ зЪДеЙН $i$ еИЧиҐЂиЃЊзљЃдЄЇдљњеЊЧеѓєдЇО $j =\

    \ of $z = x + iy \\in \\mathbb{C}$ with $x, y \\in \\mathbb{R}$ as $\\overline{z}$.*\n\
    \nProof: Since there exists a $B \\in \\mathbb{R}^{n \\times n}$ such that $A\

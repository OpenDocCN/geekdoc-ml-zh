    # 3.3 Mercer''s Theorem


    Let $(E, \mathcal{F}, \mu)$ be a measure space. We assume that the integral operator
    kernel $K : E \times E \to \mathbb{R}$ is a measurable function and is not necessarily
    nonnegative definite.


    Suppose that $\int \int_{E \times E} K^2(x, y)d\mu(x)d\mu(y)$ takes finite values.
    Then, we define the integral operator $T_K$ by


    $$(T_K f)(\cdot) := \int_E K(x, \cdot) f(x) d\mu(x) \quad (3.10)$$


    for $f \in L^2(E, \mathcal{B}, \mu)$. Since


    $$\|T_K f\|^2 = \int_E \{(T_K f)(x)\}^2 d\mu(x) \le \int \int_{E \times E} \{K(x,
    y)\}^2 d\mu(x)d\mu(y) \int_E \{f(z)\}^2 d\mu(z)$$

    $$= \|f\|^2 \int \int_{E \times E} \{K(x, y)\}^2 d\mu(x)d\mu(y),$$


    we have $T_K \in B(L^2(E, \mathcal{B}, \mu))$ and


    $$\|T_K\| \le \left( \int \int_{E \times E} K^2(x, y) d\mu(x)d\mu(y) \right)^{1/2}.$$


    In the following, we assume that $K : E \times E \to \mathbb{R}$ is continuous
    and that the entire set $E$ is compact (such as $E = [0, 1]$). Thus, we assume
    that the integral operator kernel $K$ is uniformly continuous (Proposition 8).


    **Lemma 1** For each $f \in L^2(E, \mathcal{F}, \mu)$, $T_K f(\cdot)$ is uniformly
    continuous.


    Proof: Since $E \times E \to \mathbb{R}$ is uniformly continuous, we achieve $|K(x,
    y) - K(x, z)| < \epsilon$ by making $|y - z|$ smaller for arbitrary $x \in E$
    and $\epsilon > 0$. Thus, we have


    $$\left| \int_E K(x, y) f(x) d\mu(x) - \int_E K(x, z) f(x) d\mu(x) \right| \le
    \epsilon \|f\|.$$'

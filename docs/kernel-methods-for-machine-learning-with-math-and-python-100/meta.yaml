    ## Proof of Proposition 48


    The fact that $E \ni x \mapsto k(x, \cdot) \in H$ is measurable means that $\mathbb{E}[k(X,
    \cdot)]$ can be treated as a random variable. However, the events in $E \times
    E$ are the direct products of the events generated by each $E$ (the elements of
    $\mathcal{F} \times \mathcal{F}$). Therefore, if the function $E \times E \ni
    (x, y) \mapsto k(x, y) \in \mathbb{R}$ is measurable, then the function $E \ni
    y \mapsto k(x, y) \in \mathbb{R}$ is measurable for each $x \in E$ (even if $y
    \in E$ is fixed, $(x, y) \mapsto k(x, y)$ is still measurable). In the following,
    we show that any function belonging to $H$ is measurable. First, we note that
    $H_0 = \text{span}\{k(x, \cdot) | x \in E\}$ is dense in $H$. Additionally, we
    note that for the sequence $\{f_n\}$ in $H_0$, $\|f - f_n\|_H \to 0$ ($n \to \infty$)
    means that $|f(x) - f_n(x)| \to 0$ for each $x \in E$ (Proposition 35). The following
    lemma implies that $f$ is measurable.



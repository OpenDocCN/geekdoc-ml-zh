  md: 'If we observe $Y \in \{-1, 1\}^N$, we obtain the estimate $\hat{f}$ with the
    Newton-Raphson method and calculate $\hat{W}$. We consider the Laplace approximation
    of $f_X|Y$, i.e., we approximate the Gaussian distribution as follows (Rasmussen-Williams
    [25]):


    $$f_X|Y \sim N(\hat{f}, (\hat{W} + k_{XX}^{-1})^{-1}).$$


    That is, the covariance matrix is the inverse of $\hat{W} + k_{XX}^{-1}$, which
    is the Hessian $\nabla^2 L(\hat{f})$ of (6.8). Then, the variations in (6.11),
    (6.12) are independent, and $f(x|Y) = N(m_*, k_*)$. Note that we can calculate
    the posterior probability for each $x \in E$:


    $$m_* = k_{xX} k_{XX}^{-1} \hat{f}$$


    $$k_* = k_{xx} - k_{xX} k_{XX}^{-1} k_{Xx} + k_{xX} k_{XX}^{-1} (\hat{W} + k_{XX}^{-1})^{-1}
    k_{XX}^{-1} k_{Xx}$$

    $$= k_{xx} - k_{xX} (\hat{W}^{-1} + k_{XX})^{-1} k_{Xx},$$


    where the last transformation is due to $A = k_{XX}$ and $W = \hat{W}^{-1}$ in
    (6.9), and $U, V$ are the unit matrices. Thus, we can compute the expectation
    (prediction value) w.r.t. $f(x)|Y \sim N(m_*, k_*)$ in the sigmoid function


    $$P(Y = 1|x) = \frac{1}{1 + \exp(-f(x))}$$


    $$\int_E \frac{1}{1 + \exp(-z)} \frac{1}{\sqrt{2\pi k_*}} \exp[-\frac{1}{2k_*}
    \{z - m_*\}^2] dz.$$


    To implement this step, we only need to compute $\hat{u}$ from $\hat{f}$. Since
    (6.7) is zero when the updates converge, from (6.13), we have that


    $$m_* = k_{xX} \hat{u}$$


    and


    $$(k_{XX} + W^{-1})^{-1} = W^{1/2} W^{-1/2} (k_{XX} + W^{-1})^{-1} W^{-1/2} W^{1/2}$$

    $$= W^{1/2} (I + W^{1/2} k_{XX} W^{1/2})^{-1} W^{1/2}.$$


    Hence, we compute $\alpha \in \mathbb{R}^N$ such that $I + \hat{W}^{1/2} k_{XX}
    \hat{W}^{1/2} = LL^\top$ (Cholesky decomposition) and $L\alpha = \hat{W}^{1/2}
    k_{Xx}$ in $O(N^3/3)$ time. Then, we have


    $$k_* = k_{xx} - \alpha^\top \alpha$$


    since we have


    $$k_{xX} W^{1/2} (LL^\top)^{-1} W^{1/2} k_{Xx} = k_{xX} W^{1/2} (L^{-1})^\top
    L^{-1} W^{1/2} k_{Xx} = \alpha^\top \alpha.$$'

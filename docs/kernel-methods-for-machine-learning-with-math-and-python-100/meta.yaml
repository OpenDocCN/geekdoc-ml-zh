    $\hat{f}(\cdot) = \sum_{i=1}^N \hat{\alpha}_i \hat{k}(x_i, \cdot)$ by using $\hat{\alpha}
    \in \mathbb{R}^N$ for $(\hat{K} + \lambda I_N)\hat{\alpha} = y$ for $Z = (Z_j(x_i))
    \in \mathbb{R}^{N \times m}$ and the unit $I_N \in \mathbb{R}^{N \times N}$.


    Using Woodbury''s formula, for $U \in \mathbb{R}^{r \times s}$, $V \in \mathbb{R}^{s
    \times r}$, $r, s \ge 1$,


    $$U(I_s + VU) = (I_r + UV)U.$$


    And we have


    $$Z^\top(ZZ^\top + \lambda I_N)^{-1} = (Z^\top Z + \lambda I_m)^{-1}Z^\top.$$


    Let $x \in E$ be a value other than the $x_1, \dots, x_N$ used for estimation,
    and let $z(x) := [z_1(x), \dots, z_m(x)]$ (row vector). Then, for


    $$\hat{\beta} := (Z^\top Z + \lambda I_m)^{-1}Z^\top y, \quad (4.33)$$


    we have


    $$\hat{f}(x) = \sum_{i=1}^N \alpha_i \hat{k}(x, x_i) = z(x) \sum_{i=1}^N z^\top(x_i)\hat{\alpha}_i
    = z(x)Z^\top\hat{\alpha} = z(x)Z^\top(\hat{K} + \lambda I_N)^{-1}y$$

    $$= z(x)(Z^\top Z + \lambda I_m)^{-1}Z^\top y = z(x)\hat{\beta}.$$


    Then, for the new $x \in E$, we can find its value from $\hat{f}(x) = z(x)\hat{\beta}$.
    The computational complexity of (4.33) is $O(m^2N)$ for the multiplication of
    $Z^\top Z$, $O(m^3)$ for finding the inverse of $Z^\top Z + \lambda I_m \in \mathbb{R}^{m
    \times m}$, $O(Nm)$ for the multiplication of $Z^\top y$, and $O(m^2)$ for multiplying
    $(Z^\top Z + \lambda I_m)^{-1}$ and $Z^\top y$. Thus, overall, the process requires
    only $O(N^2m)$ complexity at most. On the other hand, the process takes $O(N^3)$
    time when using the kernel without approximation. If $m = N/10$, the computational
    time becomes $1/100$. Obtaining $\hat{f}(x)$ from a new $x \in E$ also takes only

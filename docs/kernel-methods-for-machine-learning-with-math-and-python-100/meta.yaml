    \ x_j - \\frac{1}{N} \\sum_{h=1}^N x_i x_h - \\frac{1}{N} \\sum_{l=1}^N x_j x_l\
    \ + \\frac{1}{N} \\sum_{h=1}^N \\sum_{l=1}^N x_l x_h = (x_i - \\bar{x})(x_j -\
    \ \\bar{x})$$"

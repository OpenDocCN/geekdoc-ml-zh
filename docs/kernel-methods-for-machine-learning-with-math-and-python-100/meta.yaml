    \ 14.886876186736613]\nS[5:9]: [18.85503241886245, 34.30290091714191, 1.025291282540866,\
    \ 29.59512428090335]\n\n# 1.2 Kernels\n\nLet $E$ be a set. We often express similarity\
    \ between elements $x, y \\in E$ by using a bivariate function $k : E \\times\
    \ E \\to \\mathbb{R}$ not just for data analysis but also for various information\
    \ processing tasks. The larger $k(x, y)$ is, the more similar $x, y$ are. We call\
    \ such a function $k : E \\times E \\to \\mathbb{R}$ a kernel.\n\n**Example 2**\
    \ (*Epanechnikov kernel*) We use the kernel $k : E \\times E \\to \\mathbb{R}$\
    \ such that\n\n$$k(x, y) = D\\left(\\frac{|x - y|}{\\lambda}\\right)$$\n\n$$D(t)\
    \ = \\begin{cases} \\frac{3}{4}(1 - t^2), & |t| \\le 1 \\ 0, & Otherwise \\end{cases}$$\n\
    \nfor $\\lambda > 0$, and we construct the following function (the Nadaraya-Watson\
    \ estimator) from observations $(x_1, y_1), \\dots, (x_N, y_N) \\in E \\times\
    \ \\mathbb{R}$:\n\n$$\\hat{f}(x) = \\frac{\\sum_{i=1}^N k(x, x_i)y_i}{\\sum_{j=1}^N\
    \ k(x, x_j)}.$$\n\nFor a given input $x_* \\in E$ that is different from the $N$\
    \ pairs of inputs, we return the weighted sum of $y_1, \\dots, y_N$,\n\n$$\\frac{k(x_*,\
    \ x_1)}{\\sum_{j=1}^N k(x_*, x_j)}, \\dots, \\frac{k(x_*, x_N)}{\\sum_{j=1}^N\
    \ k(x_*, x_j)},$$\n\nas the output $\\hat{f}(x_*)$. Because we assume that a larger\
    \ $k(x, y)$ yields a more similar $x, y \\in E$, the more similar $x_*$ and $x_i$\
    \ are, the larger the weight of $y_i$.\n\nGiven an input $x_* \\in E$ for $i =\
    \ 1, \\dots, N$, we weight $y_i$ such that $x_i - \\lambda \\le x_* \\le x_i +\
    \ \\lambda$ is proportional to $k(x_i, x_*)$. If we make the $\\lambda$ value\
    \ smaller, we predict $y_*$ by using only the $(x_i, y_i)$ for which $x_i$ and\
    \ $x_*$ are close. We display the output obtained when we execute the following\
    \ code in Fig. 1.1."

    Now, let us use the unbiased estimate of the HSIC, $\widehat{HSIC}_U$, to find
    the theoretical asymptotic distribution according to the null hypothesis. Noting
    that


    $$\widehat{HSIC} = \frac{1}{N^4} \sum_{i=1}^N \sum_{j=1}^N \sum_{q=1}^N \sum_{r=1}^N
    h(z_i, z_j, z_q, z_r)$$


    for $z_i = (x_i, y_i)$, we have


    $$h(z_i, z_j, z_q, z_r) = \frac{1}{4!} \sum_{(t,u,v,w)}^{i,j,h,r} \{k_X(x_t, x_u)k_Y(y_t,
    y_u) + k_X(x_t, x_u)k_Y(y_v, y_w) - 2k_X(x_t, x_u)k_Y(y_t, y_v)\},$$


    where $\sum_{(t,u,v,w)}^{i,j,q,r}$ denotes the sum such that $(i, j, q, r)$ ranges
    over $(t, u, v, w) = (i, j, h, r)$, i.e., the sum over the permutations of $(i,
    j, h, r)$. If we modify this estimate to make it an unbiased estimator, we obtain


    $$\widehat{HSIC}_U = \frac{1}{\binom{N}{4}} \sum_{i<j<q<r} h(z_i, z_j, z_q, z_r),$$


    where $\sum_{i,j,q,r}$ is the sum that ranges over $1 \le i, j, q, r \le N$ without
    any overlap. For example, we can construct the program as follows. Since the program
    consumes memory, the number of samples should be limited to 100 or less. Additionally,



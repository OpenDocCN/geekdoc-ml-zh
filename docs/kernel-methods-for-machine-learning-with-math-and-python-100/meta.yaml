    \ $A$ is satisfied.\n\n**Example 22** (Tree Kernel) Suppose that we assign a label\
    \ to each vertex of trees $x$, $y$. We wish to evaluate the similarity between\
    \ $x$, $y$ based on how many subtrees are shared. We denote by $c_t(x)$, $c_t(y)$\
    \ the numbers of occurrences of subtree $t$ in $x$, $y$, respectively. Then, the\

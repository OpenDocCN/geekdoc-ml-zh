  md: '# 4.2 Kernel Principle Component Analysis


    We review the procedure of principal component analysis (PCA) when we do not use
    any kernel. We centralize each of the columns in the matrix $X$ and vector $y$.
    We first compute the $v_1 := v \in \mathbb{R}^p$ that maximizes $v^\top X^\top
    Xv$ under $v^\top v = 1$. Similarly, for $i = 2, \dots, p$, we repeatedly compute
    $v_i$ with the $v^\top v = 1$ that maximizes $v^\top X^\top Xv$ and is orthogonal
    to $v_1, \dots, v_{i-1} \in \mathbb{R}^p$. In the actual cases, we do not use
    all of the $v_1, \dots, v_p$ but compress $\mathbb{R}^p$ to the $v_1, \dots, v_m$
    ($1 \le m \le p$) with the largest eigenvalues. We compute the $v \in \mathbb{R}^p$
    that maximizes


    $$v^\top X^\top Xv - \mu(v^\top v - 1)$$


    with a $\mu > 0$ Lagrange coefficient to find $v \in \mathbb{R}^p$ with the $v^\top
    v = 1$ that maximizes $v^\top X^\top Xv$. In PCA, we often compute


    $$\begin{bmatrix} xv_1 \ \vdots \ xv_m \end{bmatrix} \in \mathbb{R}^m$$


    for each row vector $x \in \mathbb{R}^p$ using the obtained $v_1, \dots, v_m \in
    \mathbb{R}^p$. We call such a value the score of $x$, which is the vector obtained
    by projecting $x$ onto the $m$ elements.


    We may apply a problem that is similar to PCA for an RKHS $H$ via the feature
    map $\Phi : E \ni x_i \mapsto k(x_i, \cdot) \in H$ rather than the PCA in $\mathbb{R}^p$.
    To this end, we consider the problem of finding the $f \in H$ that maximizes


    $$\sum_{j=1}^N f(x_i)^2 - \mu(\|f\|_H^2 - 1)$$


    with an $\mu > 0$ Lagrange coefficient.


    If we use the linear kernel (the standard inner product), we can express $f \in
    H$ by $f(\cdot) = \langle w, \cdot \rangle_E$ with $w \in E$. Thus, (4.7) and
    (4.8) coincide. The centralization in the kernel PCA is for the Gram matrix $K$
    rather than the matrix $X$. For the other part, the extension follows in the same
    manner.


    As discussed in the previous section, we apply the representation theorem. Thus,
    for $f_1 \in M := \text{span}(\{k(x_i, \cdot)\}_{i=1}^N)$ and $f_2 \in M^\perp$,
    we have


    $$\sum_{i=1}^N f(x_i)^2 = \sum_{i=1}^N \langle f_1(\cdot) + f_2(\cdot), k(x_i,
    \cdot) \rangle_H^2 = \sum_{i=1}^N \langle f_1(\cdot), k(x_i, \cdot) \rangle_H^2
    = \sum_{i=1}^N f_1(x_i)^2$$

    $$= \sum_{i=1}^N \left( \sum_{j=1}^N \alpha_j k(x_j, x_i) \right)^2 = \sum_{i=1}^N
    \sum_{r=1}^N \sum_{s=1}^N \alpha_r \alpha_s k(x_r, x_i) k(x_s, x_i) = \alpha^\top
    K^2 \alpha$$'

    Proof: If $\{x_n\}$ is a Cauchy sequence in $\mathbb{R}$, then $\{x_n\}$ is bounded
    (Example 26). If we write the upper and lower limits of $\{x_n\}_{n=s}^\infty$
    as $l_s, m_s$, respectively, the monotone sequences $\{m_s\}, \{l_s\}$ in $\mathbb{R}$
    share the same limit. In fact, from the above assumption, we can make $l_s - m_s
    = \sup\{|x_p - x_q| : p, q \geq s\}$ as small as possible. Thus, $\mathbb{R}$
    is complete. $\square$


    If the number of dimensions is finite, we may check completeness for each dimension,
    and we see that $\mathbb{R}^p$ is complete for any $p \geq 1$.


    Suppose that we arbitrarily set a neighborhood $U(P)$ for each $P \in M$ beforehand.
    We say that a set $M$ is compact if there exist finite $m$ and $P_1, \dots, P_m
    \in M$ such that $M \subseteq \bigcup_{i=1}^m U(P_i)$.


    **Example 28** Let $M = (0, 1)$, and suppose that we define the neighborhood $U(x)
    := (\frac{1}{2}x, \frac{3}{2}x)$ for each $x \in M$ beforehand. Then, for any
    $n$ and $x_1, \dots, x_n \in M$, we have


    $$(0, 1) \not\subseteq \bigcup_{i=1}^n \left(\frac{1}{2}x_i, \frac{3}{2}x_i\right),$$


    which means that $M$ is not compact.


    **Proposition 7** (Heine-Borel) *For $\mathbb{R}^p$, any bounded closed set $M$
    is compact.*


    Proof: Suppose that we have set a neighborhood $U(P)$ for each $P \in M$ and that
    $M \subseteq \bigcup_{i=1}^m U(P_i)$ cannot be realized by any $m$ and $P_1, \dots,
    P_m$. If we divide the closed set (rectangular) that contains $M \subseteq \mathbb{R}^p$
    into two components for each dimension, then at least one of the $2^p$ rectangles
    cannot be covered by a finite number of neighborhoods. If we repeat this procedure,
    then the volume of the rectangle that a finite number of neighborhoods cannot
    cover becomes sufficiently small for the center to converge to a $P^* \in M$;
    furthermore, we can cover the rectangle with $U(P^*)$, which is a contradiction.
    $\square$


    Let $(M_1, d_1), (M_2, d_2)$ be metric spaces. We say that the map $f : M_1 \to
    M_2$ is continuous at $x \in M_1$ if for any $\epsilon > 0$, there exists $\delta(x,
    \epsilon)$ such that for $y \in M_1$,


    $$d_1(x, y) < \delta(x, \epsilon) \Rightarrow d_2(f(x), f(y)) < \epsilon. \tag{2.1}$$


    In particular, if there exists $\delta(x, \epsilon)$ that does not depend on $x
    \in M_1$ in (2.1), we say that $f$ is uniformly continuous.


    **Example 29** The function $f(x) = 1/x$ defined on the interval $(0, 1]$ is continuous
    but is not uniformly continuous. In fact, if we make $x$ approach $y$ after fixing
    $y$, we can make $d_2(f(x), f(y)) = |\frac{1}{x} - \frac{1}{y}|$ as small as possible,
    which means that $f$ is continuous in $(0, 1]$. However, when we make $x$ approach
    $y$ to make $d_2(f(x), f(y))$ smaller than a constant, we observe that for each
    $\epsilon > 0$, the smaller $y$ is, the smaller $d_1(x, y) = |x - y|$ should be.
    Thus, no such $\delta(\epsilon)$ for which $d_1(x, y) < \delta(\epsilon) \Rightarrow
    d_2(f(x), f(y)) < \epsilon$ exists if $\delta(\epsilon)$ does not depend on $x,
    y \in M$ (Fig. 2.1).'

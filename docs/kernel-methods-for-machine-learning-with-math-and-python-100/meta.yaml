    where $z_j$ follows an independent standard Gaussian distribution.


    Let $E := [0, 1]$ and $(\Omega, \mathcal{F}, P)$ be a probability space. Then,
    we call the map $\Omega \times E \ni (\omega, x) \mapsto f(\omega, x) \in \mathbb{R}$
    that satisfies the following conditions a Brownian motion.


    +   1. $f(\omega, 0) = 0$, $f(\omega, x) - f(\omega, y) \sim N(0, y - x)$, and
    $0 \le x < y$.

    2. $f(\omega, x_2) - f(\omega, x_1), \dots, f(\omega, x_{n-1}) - f(\omega, x_n)$
    are independent for any $n = 1, 2, \dots$ and $0 \le x_1 < x_2 < \dots < x_n$.

    3. There exists an $\Omega \in \mathcal{F}$ with a probability of 1, and $E \ni
    x \mapsto f(\omega, x)$ is continuous for each $\omega \in \Omega$.


    In this case, we have the following proposition.


    **Proposition 69** The map $\Omega \times E \ni (\omega, x) \mapsto f(\omega,
    x) \in \mathbb{R}$ is a Brownian motion if and only if the following three conditions
    are satisfied simultaneously.


    +   1. It is a Gaussian process.

    2. The covariance function of $x, y \in E$ is given by $k(x, y) = \min(x, y)$.

    3. $f(\omega, \cdot)$ is continuous with a probability of 1.


    Proof: The first two conditions in the definition imply the first condition in
    Proposition 69. Moreover, if $x < y$, then we have


    $\mathbb{E}[f(\omega, x)f(\omega, y)] = \mathbb{E}[f(\omega, x)^2] + \mathbb{E}[f(\omega,
    x)\{f(\omega, y) - f(\omega, x)\}] = x$ ,


    which implies the second condition of Proposition 69. On the contrary, supposing
    that $m \equiv 0$ for simplicity, if we assume that the first two items of Proposition
    69 hold, then because $k(x, x) = x$, when $x \le y \le z$, we have


    $\mathbb{E}[f(\omega, x)\{f(\omega, y) - f(\omega, z)\}] = k(x, y) - k(x, z) =
    x - x = 0$


    and


    $\mathbb{E}[f(\omega, y)\{f(\omega, y) - f(\omega, z)\}] = k(y, y) - k(y, z) =
    y - y = 0$ ,


    which implies that


    $\mathbb{E}[\{f(\omega, x) - f(\omega, y)\}\{f(\omega, y) - f(\omega, z)\}] =
    0$ .


    Moreover, from $k(0, 0) = 0$, the variance of $f(\omega, 0)$ is zero, so we have
    $f(\omega, 0) = 0$. Furthermore, we have


    $\mathbb{E}[\{f(\omega, x) - f(\omega, y)\}^2] = k(x, x) - 2k(x, y) + k(y, y)
    = x - 2x + y = y - x$ .


    **Example 89** (Brownian Motion as a Gaussian Process) For the integral operator
    (Example 58) on the covariance function of a Brownian motion $k(x, y) = \min(x,
    y)$ ($x, y \in E$), its eigenvalues and eigenfunctions are (3.13) and (3.14),
    respectively.'

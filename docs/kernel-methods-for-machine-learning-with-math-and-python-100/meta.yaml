    the eigen equation is


    $$\int_0^1 \min(x, y)e(y)dy = \lambda e(x) \tag{3.11}$$


    i.e.,


    $$\int_0^x ye(y)dy + x \int_x^1 e(y)dy = \lambda e(x) \,.$$


    If we differentiate the both sides by $x$, we obtain


    $$xe(x) + \int_x^1 e(y)dy - xe(x) = \lambda e''(x) \,,$$


    i.e.,


    $$\int_x^1 e(y)dy = \lambda e''(x) \,. \tag{3.12}$$


    If we further differentiate both sides by $x$, then we obtain $e(x) = -\lambda
    e''''(x)$ and


    $$e(y) = \alpha \sin(y/\sqrt{\lambda}) + \beta \cos(y/\sqrt{\lambda}) \,.$$


    If we substitute $x = 0$ into (3.11), then we have $e(0) = 0$, which is equivalent
    to $\beta = 0$. From (3.12), we have $e''(1) = 0$, i.e., $\alpha \cos(1/\sqrt{\lambda})
    = 0$. Thus, we obtain


    $$1/\sqrt{\lambda} = (2j - 1)\pi/2 \,, \quad j = 1, 2, \ldots \,.$$


    Therefore, the eigenvalues are


    $$\lambda_j = \frac{4}{\{(2j - 1)\pi\}^2} \tag{3.13}$$


    and the orthonormal eigenfunctions are


    $$e_j(x) = \sqrt{2} \sin\left( \frac{(2j - 1)\pi}{2} x \right) \tag{3.14}$$


    where to derive $\alpha = \sqrt{2}$, we use


    $$\int_0^1 \sin^2\left(\frac{y}{\sqrt{\lambda}}\right)dy = \int_0^1 \frac{1 -
    \cos(\frac{2y}{\sqrt{\lambda}})}{2}dy = \frac{1}{2} - \frac{1}{2}\left[\frac{\sqrt{\lambda}}{2}
    \sin \frac{2y}{\sqrt{\lambda}}\right]_0^1 = \frac{1}{2} \,.$$



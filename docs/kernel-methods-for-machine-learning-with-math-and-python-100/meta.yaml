    $$|MMD^2 - \widehat{MMD}_B^2| = | \sup_{f \in \mathcal{F}} \{\mathbb{E}_P(f) -
    \mathbb{E}_Q(f)\} - \sup_{f \in \mathcal{F}} \{\frac{1}{N} \sum_{i=1}^N f(x_i)
    - \frac{1}{N} \sum_{j=1}^N f(y_j)\}|$$

    $$\leq \sup_{f \in \mathcal{F}} |\mathbb{E}_P(f) - \mathbb{E}_Q(f) - \{\frac{1}{N}

    # Proof of Proposition 3


    $D$ is a diagonal matrix whose components are the eigenvalues $\lambda_i \ge 0$
    of the non-negative definite matrix $A$, and $U$ is an orthogonal matrix whose
    column vectors are unit eigenvectors $u_i$ that are orthogonal to each other.
    Then, we can write $A = UDU^\top = \sum_{i=1}^n \lambda_i u_i u_i^\top$. Similarly,
    if $\mu_i, v_i, i = 1, \dots, n$ are the eigenvalues and eigenvectors of matrix
    $B$, respectively, then we can write $B = \sum_{i=1}^n \mu_i v_i v_i^\top$. At
    this moment, we have


    $(u_i u_i^\top) \circ (v_j v_j^\top) = (u_{i,k} u_{i,l} \cdot v_{j,k} v_{j,l})_{k,l}
    = (u_{i,k} v_{j,k} \cdot u_{i,l} v_{j,l})_{k,l} = (u_i \circ v_j)(u_i \circ v_j)^\top$.


    Note that this matrix is nonnegative definite. In fact, if we write $u_i \circ
    v_j = [y_1, \dots, y_n] \in \mathbb{R}^n$, then component $(h, l)$ of $(u_i \circ
    v_j)(u_i \circ v_j)^\top$ is $y_h y_l$, which means that $\sum_{h=1}^n \sum_{l=1}^n
    z_h z_l y_h y_l = (\sum_{h=1}^n z_h y_h)^2 \ge 0$ for any $z_1, \dots, z_n$. Since
    matrices $A$ and $B$ are nonnegative definite, we have that $\lambda_i, \mu_j
    \ge 0$ for each $i, j = 1, \dots, n$, which means that


    $A \circ B = \sum_{i=1}^n \sum_{j=1}^n \lambda_i \mu_j (u_i u_i^\top) \circ (v_j
    v_j^\top) = \sum_{i=1}^n \sum_{j=1}^n \lambda_i \mu_j (u_i \circ v_j)(u_i \circ
    v_j)^\top$


    is nonnegative definite. $\square$


    # Proof of Proposition 5


    We only show the case in which $\phi(0) = \eta(E) = 1$ because the extension is
    straightforward. Suppose that (1.9) holds. Then, we have


    $\sum_{j=1}^n \sum_{k=1}^n z_j z_k \phi(x_j - x_k) = \int_E \sum_{j=1}^n z_j e^{ix_j
    t} \sum_{k=1}^n z_k e^{-ix_k t} d\eta(t) = \int_E |\sum_{j=1}^n z_j e^{ix_j t}|^2
    d\eta(t) \ge 0$.


    and (1.8) follows. Conversely, suppose that (1.8) holds. Since the matrix consisting
    of $\phi(x_i - x_j)$ for the $(i, j)$th element is nonnegative definite and symmetric,
    we have that $\phi(x) = \phi(-x), x \in \mathbb{R}$. If we substitute $n = 2,
    x_1 = u$, and $x_2 = 0$, then we obtain


    $[z_1, z_2] \begin{bmatrix} 1 & \phi(u) \ \phi(u) & 1 \end{bmatrix} \begin{bmatrix}
    z_1 \ z_2 \end{bmatrix} \ge 0$


    and $\phi(u)^2 \le 1$ because the determinant is nonnegative. Since $\phi$ is
    bounded and continuous, it is uniformly continuous. On the other hand, $e^{-\|t\|^2/n}
    e^{-ix^\top t}$ is uniformly continuous as well. In the following, we show that


    $f_n(x) := \frac{1}{2\pi} \int_{-\infty}^\infty \phi(t) e^{-\|t\|^2/n} e^{-ix^\top
    t} dt$'

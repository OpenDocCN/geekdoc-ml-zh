    $P(X \ge \epsilon) \le \inf_{s>0} e^{-s\epsilon} \mathbb{E}[e^{sX}] \quad (4.31)$


    To prove this lemma, we use the following lemma.


    **Lemma 6 (MarkovвАЩs Inequality)** *For a random variable $X$ that takes nonnegative
    values, we have*


    $P(X \ge \epsilon) \le \frac{\mathbb{E}[X]}{\epsilon} \quad (4.32)$


    Lemma 6 is due to


    $\mathbb{E}[X] = \mathbb{E}[X \cdot I(X \ge \epsilon)] + \mathbb{E}[X \cdot I(X
    < \epsilon)] \ge \mathbb{E}[X \cdot I(X \ge \epsilon)] \ge \epsilon P(X \ge \epsilon)
    \quad (4.33)$



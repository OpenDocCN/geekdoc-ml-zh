    be the set of distributions that $X$ follows. Then, we can define the map


    $\mathcal{P} \ni \mu \mapsto \int k(x, \cdot) d\mu(x) \in H$,


    which we call the embedding of probabilities in the RKHS. Suppose that the map
    is injective, i.e., if the expectations $\int k(x, \cdot) d\mu_1(x)$ and $\int
    k(x, \cdot) d\mu_2(x)$ have the same value, then the probabilities $\mu_1$, $\mu_2$
    coincide. We call such a reproducing kernel $k$ of an RKHS $H$ characteristic.


    We learn some applications by using characteristic kernels, such as two-sample
    problems and independence tests, and we consider the associated theory in later
    sections of this chapter.


    ## 5.2 The MMD and Two-Sample Problem


    Gretton et al. (2008), [11] proposed a statistical testing approach for testing
    whether two distributions share given independent sequences $x_1, \dots, x_m \in
    \mathbb{R}$ and $y_1, \dots, y_n \in \mathbb{R}$. We write the two distributions
    as $P$, $Q$ and regard $P = Q$ as the null hypothesis. Let $H$ and $k$ be an RKHS
    and its reproducing kernel respectively; we define $m_P := \mathbb{E}_P[k(X, \cdot)]
    = \int_E k(x, \cdot) dP(x)$, $m_Q := \mathbb{E}_Q[k(X, \cdot)] = \int_E k(x, \cdot)
    dQ(x) \in H$. We note that the random variable $X : E \rightarrow \mathbb{R}$
    is measurable, and either $P$ or $Q$ is the probability distribution that $X$
    follows.


    Let $\mathcal{F}$ be a set of functions that satisfies a condition. In general,
    the quantity defined by


    $$\sup_{f \in \mathcal{F}} \{\mathbb{E}_P[f(X)] - \mathbb{E}_Q[f(X)]\}$$


    is called the MMD (maximum mean discrepancy), and we assume that


    $$\mathcal{F} := \{f \in H \mid \|f\|_H \leq 1\},$$


    which means that we regard the MMD as


    $$\text{MMD}^2 = \sup_{f \in \mathcal{F}} \{\mathbb{E}_P[f(X)] - \mathbb{E}_Q[f(X)]\}^2
    = \sup_{f \in \mathcal{F}} \{\langle m_P, f \rangle - \langle m_Q, f \rangle\}^2$$

    $$= \sup_{f \in \mathcal{F}} \{\langle m_P - m_Q, f \rangle\}^2 = \|m_P - m_Q\|_H^2.$$


    If the kernel $k$ is characteristic, then we have


    $$\text{MMD} = 0 \Longleftrightarrow m_P = m_Q \Longleftrightarrow P = Q \qquad
    (5.2)$$


    and


    $$\text{MMD}^2$$

    $$= \langle m_P, m_P \rangle + \langle m_Q, m_Q \rangle - 2\langle m_P, m_Q \rangle$$

    $$= (\mathbb{E}_X[k(X, \cdot)], \mathbb{E}_{X''}[k(X'', \cdot)]) + (\mathbb{E}_Y[k(Y,
    \cdot)], \mathbb{E}_{Y''}[k(Y'', \cdot)]) - 2(\mathbb{E}_X[k(X, \cdot)], \mathbb{E}_Y[k(Y,
    \cdot)])$$

    $$= \mathbb{E}_{XX''}[k(X, X'')] + \mathbb{E}_{YY''}[k(Y, Y'')] - 2\mathbb{E}_{XY}[k(X,
    Y)],$$


    where $X''$ and $X$ ($Y''$ and $Y$) are independent and follow the same distribution.
    However, we do not know $m_X, m_Y$ from the two-sample data. Thus, we execute
    the test using their estimates:


    $$\widehat{\text{MMD}}_B^2 := \frac{1}{m^2} \sum_{i=1}^m \sum_{j=1}^m k(x_i, x_j)
    + \frac{1}{n^2} \sum_{i=1}^n \sum_{j=1}^n k(y_i, y_j) - \frac{2}{mn} \sum_{i=1}^m
    \sum_{j=1}^n k(x_i, y_j)$$

    $$\frac{1}{m(m-1)} \sum_{i=1}^m \sum_{j \neq i} k(x_i, x_j) + \frac{1}{n(n-1)}
    \sum_{i=1}^n \sum_{j \neq i} k(y_i, y_j) - \frac{2}{mn} \sum_{i=1}^m \sum_{j=1}^n
    k(x_i, y_j). \qquad (5.3)$$

    $$\qquad (5.4)$$


    Then, the estimate (5.4) is unbiased while (5.3) is biased:


    $$\mathbb{E}[\frac{1}{m(m-1)} \sum_{i=1}^m \sum_{j \neq i} k(X_i, X_j)] = \frac{1}{m}
    \sum_{i=1}^m \mathbb{E}_{X_i}[\frac{1}{m-1} \sum_{j \neq i} \mathbb{E}_{X_j}[k(X_i,
    X_j)]] = \mathbb{E}_{XX''}[k(X, X'')].$$'

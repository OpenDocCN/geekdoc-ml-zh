- md: "## 4.2 Kernel Principle Component Analysis\n\nWe review the procedure of principal\
    \ component analysis (PCA) when we do not use any kernel. We centralize each of\
    \ the columns in the matrix $X$ and vector $y$. We first compute the $v_1 := v\
    \ \\in \\mathbb{R}^p$ that maximizes $v^\\top X^\\top Xv$ under $v^\\top v = 1$.\
    \ Similarly, for $i = 2, \\dots, p$, we repeatedly compute $v_i$ with the $v^\\\
    top v = 1$ that maximizes $v^\\top X^\\top Xv$ and is orthogonal to $v_1, \\dots,\
    \ v_{i-1} \\in \\mathbb{R}^p$. In the actual cases, we do not use all of the $v_1,\
    \ \\dots, v_p$ but compress $\\mathbb{R}^p$ to the $v_1, \\dots, v_m$ ($1 \\le\
    \ m \\le p$) with the largest eigenvalues. We compute the $v \\in \\mathbb{R}^p$\
    \ that maximizes\n\n$$v^\\top X^\\top Xv - \\mu(v^\\top v - 1)$$\n\nwith a $\\\
    mu > 0$ Lagrange coefficient to find $v \\in \\mathbb{R}^p$ with the $v^\\top\
    \ v = 1$ that maximizes $v^\\top X^\\top Xv$. In PCA, we often compute\n\n$$\\\
    begin{bmatrix} xv_1 \\ \\vdots \\ xv_m \\end{bmatrix} \\in \\mathbb{R}^m$$\n\n\
    for each row vector $x \\in \\mathbb{R}^p$ using the obtained $v_1, \\dots, v_m\
    \ \\in \\mathbb{R}^p$. We call such a value the score of $x$, which is the vector\
    \ obtained by projecting $x$ onto the $m$ elements.\n\nWe may apply a problem\
    \ that is similar to PCA for an RKHS $H$ via the feature map $\\Phi : E \\ni x_i\
    \ \\mapsto k(x_i, \\cdot) \\in H$ rather than the PCA in $\\mathbb{R}^p$. To this\
    \ end, we consider the problem of finding the $f \\in H$ that maximizes\n\n$$\\\
    sum_{j=1}^N f(x_i)^2 - \\mu(\\|f\\|_H^2 - 1)$$\n\nwith an $\\mu > 0$ Lagrange\
    \ coefficient.\n\nIf we use the linear kernel (the standard inner product), we\
    \ can express $f \\in H$ by $f(\\cdot) = \\langle w, \\cdot \\rangle_E$ with $w\
    \ \\in E$. Thus, (4.7) and (4.8) coincide. The centralization in the kernel PCA\
    \ is for the Gram matrix $K$ rather than the matrix $X$. For the other part, the\
    \ extension follows in the same manner.\n\nAs discussed in the previous section,\
    \ we apply the representation theorem. Thus, for $f_1 \\in M := \\text{span}(\\\
    {k(x_i, \\cdot)\\}_{i=1}^N)$ and $f_2 \\in M^\\perp$, we have\n\n$$\\sum_{i=1}^N\
    \ f(x_i)^2 = \\sum_{i=1}^N \\langle f_1(\\cdot) + f_2(\\cdot), k(x_i, \\cdot)\
    \ \\rangle_H^2 = \\sum_{i=1}^N \\langle f_1(\\cdot), k(x_i, \\cdot) \\rangle_H^2\
    \ = \\sum_{i=1}^N f_1(x_i)^2$$\n$$= \\sum_{i=1}^N \\left( \\sum_{j=1}^N \\alpha_j\
    \ k(x_j, x_i) \\right)^2 = \\sum_{i=1}^N \\sum_{r=1}^N \\sum_{s=1}^N \\alpha_r\
    \ \\alpha_s k(x_r, x_i) k(x_s, x_i) = \\alpha^\\top K^2 \\alpha$$\n\n$\\|f_1 +\
    \ f_2\\|_H^2 = \\|f_1\\|_H^2 + \\|f_2\\|_H^2 \\geq \\|f_1\\|_H^2$\n$= \\|\\sum_{j=1}^N\
    \ \\alpha_j k(x_j, \\cdot)\\|_H^2 = \\sum_{r=1}^N \\sum_{s=1}^N \\alpha_r \\alpha_s\
    \ k(x_r, x_s) = \\alpha^\\top K \\alpha$.\n\nHence, we can formulate (4.8) as\
    \ the maximization of\n\n$\\alpha^\\top K^\\top K \\alpha - \\mu(\\alpha^\\top\
    \ K \\alpha - 1)$.\n\nIf we substitute $\\beta = K^{1/2}\\alpha$, then since $K$\
    \ is symmetric, we have\n\n$\\beta^\\top K \\beta - \\mu(\\beta^\\top \\beta -\
    \ 1)$.\n\nLet $\\lambda_1, \\ldots, \\lambda_N$ and $u_1, \\ldots, u_N$ be the\
    \ eigenvalues and eigenvectors of the eigenequation $K\\beta = \\lambda\\beta$,\
    \ respectively. Then, we have [26]\n\n$\\alpha = K^{-1/2}\\beta = \\frac{1}{\\\
    sqrt{\\lambda}}\\beta = \\frac{u_1}{\\sqrt{\\lambda_1}}, \\ldots, \\frac{u_N}{\\\
    sqrt{\\lambda_N}}$.\n\nIf we centralize the Gram matrix $K = (k(x_i, x_j))$, then\
    \ the $(i, j)$th element of the modified Gram matrix is\n\n$\\langle k(x_i, \\\
    cdot) - \\frac{1}{N}\\sum_{h=1}^N k(x_h, \\cdot), k(x_j, \\cdot) - \\frac{1}{N}\\\
    sum_{h=1}^N k(x_h, \\cdot) \\rangle_H$\n$= k(x_i, x_j) - \\frac{1}{N}\\sum_{h=1}^N\
    \ k(x_i, x_h) - \\frac{1}{N}\\sum_{l=1}^N k(x_j, x_l)$\n$+ \\frac{1}{N^2}\\sum_{h=1}^N\
    \ \\sum_{l=1}^N k(x_h, x_l)$. (4.9)\n\nTo obtain the score (size $1 \\leq m \\\
    leq p$) of $x \\in \\mathbb{R}^p$ (row vector), we use the first $m$ columns of\
    \ $A = [\\alpha_1, \\ldots, \\alpha_N]^\\top \\in \\mathbb{R}^{N \\times p}$.\
    \ Let $x_i \\in \\mathbb{R}^p$ and $\\alpha_i \\in \\mathbb{R}^m$ be a row vector\
    \ of $X$ and the $i$th column of $A \\in \\mathbb{R}^{N \\times m}$, respectively.\
    \ Then,\n\n$\\sum_{i=1}^N \\alpha_i k(x_i, x) \\in \\mathbb{R}^m$\n\nis the score\
    \ of $x \\in \\mathbb{R}^p$.\n\nCompared to ordinary PCA, kernel PCA requires\
    \ a computational time of $O(N^3)$. Therefore, when $N$ is large compared to $p$,\
    \ the computational complexity may be enormous. In the Python, we can write the\
    \ procedure as follows:\n\n```python\ndef kernel_pca_train(x, k):\n    n = x.shape[0]\n\
    \    K = np.zeros((n, n))\n    S = [0] * n; T = [0] * n\n    for i in range(n):\n\
    \        for j in range(n):\n            K[i, j] = k(x[i, :], x[j, :])\n    for\
    \ i in range(n):\n        S[i] = np.sum(K[i, :])\n    for j in range(n):\n   \
    \     T[j] = np.sum(K[:, j])\n    U = np.sum(K)\n    for i in range(n):\n    \
    \    for j in range(n):\n            K[i, j] = K[i, j] - S[i] / n - T[j] / n +\
    \ U / n**2\n    val, vec = np.linalg.eig(K)\n    idx = val.argsort()[::-1]  #\
    \ decreasing order as R\n    val = val[idx]\n    vec = vec[:,idx]\n    alpha =\
    \ np.zeros((n, n))\n    for i in range(n):\n        alpha[:, i] = vec[:, i] /\
    \ val[i]**0.5\n    return alpha\n```\n\n```python\ndef kernel_pca_test(x, k, alpha,\
    \ m, z):\n    n = x.shape[0]\n    pca = np.zeros(m)\n    for i in range(n):\n\
    \        pca = pca + alpha[i, 0:m] * k(x[i, :], z)\n    return pca\n```\n\nIn\
    \ kernel PCA, when we use the linear kernel, the scores are consistent with those\
    \ of PCA without any kernel. For simplicity, we assume that $X$ is normalized.\
    \ If we do not use the kernel, then by the singular value decomposition of $X\
    \ = U \\Sigma V^\\top$ ($U \\in \\mathbb{R}^{N \\times p}$, $\\Sigma \\in \\mathbb{R}^{p\
    \ \\times p}$, $V \\in \\mathbb{R}^{p \\times p}$), the multiplication of $\\\
    frac{1}{N-1} X^\\top X = \\frac{1}{N-1} V \\Sigma^2 V^\\top$ and $V^\\top$ is\
    \ $\\frac{1}{N-1} X^\\top X V = \\frac{1}{N-1} V \\Sigma^2$. Thus, each column\
    \ of $V$ is a principal component vector, and the scores of $x_1, \\dots, x_N\
    \ \\in \\mathbb{R}^p$ (row vector) are the first $m$ columns of\n\n$$XV = U \\\
    Sigma V^\\top \\cdot V = U \\Sigma \\,.$$\n\nOn the other hand, for the linear\
    \ kernel, we may write the Gram matrix as $K = XX^\\top = U \\Sigma^2 U^\\top$\
    \ and have $KU = XX^\\top U = U \\Sigma^2$. That is, each column of $U$ is $\\\
    beta_1, \\dots, \\beta_N$, and the columns $\\alpha_1, \\dots, \\alpha_N$ of $K^{-1/2}U$\
    \ are the principal component vectors. Therefore, the scores of $x_1, \\dots,\
    \ x_N \\in \\mathbb{R}^p$ (row vectors) are the first $m$ columns of\n\n$$K \\\
    cdot K^{-1/2}U = U \\Sigma^2 U^\\top \\cdot (U \\Sigma^2 U^\\top)^{-1/2} \\cdot\
    \ U = U \\Sigma \\,.$$\n\nFurthermore, we compare the results in terms of centralization.\
    \ Equation (4.9) is\n\n$$x_i x_j - \\frac{1}{N} \\sum_{h=1}^N x_i x_h - \\frac{1}{N}\
    \ \\sum_{l=1}^N x_j x_l + \\frac{1}{N} \\sum_{h=1}^N \\sum_{l=1}^N x_l x_h = (x_i\
    \ - \\bar{x})(x_j - \\bar{x})$$\n\nfor the linear kernel, which is consistent\
    \ with that of the ordinary PCA approach. Therefore, the obtained score is the\
    \ same.\n\n**Example 65** We performed kernel PCA on a data set called US Arrests\
    \ in Python. We wished to project the ratio of the resident population living\
    \ in urban areas and the incidence rates of homicide, violent crime, and assaults\
    \ on women (number of arrests per 100,000 people) for all 50 states of the U.S.\
    \ onto the axes of two variables using PCA. We performed kernel PCA with a Gaussian\
    \ kernel ($\\sigma^2 = 0.01, 0.08$), kernel PCA with a linear kernel, and ordinary\
    \ PCA. We observed that the differences in the features of the 50 states were\
    \ not evident in the results of ordinary PCA and kernel PCA with the linear kernel\
    \ (Fig. 4.3a,b). With the Gaussian kernel ($\\sigma^2 = 0.08$), the 50 states\
    \ were divided into four categories (Fig. 4.3c). As far as the data were concerned,\
    \ California's figures (fewer homicides for a higher urban population) differed\
    \ from those of the other states. Nevertheless, when we set $\\sigma = 0.01$,\
    \ the differences between\n\n![](img/075acd5c7a7f62a80a28ffffee1ae5d9_108_0.png)\n\
    \nFig. 4.3 For the US Arrests data, we ran the ordinary PCA and kernel PCA methods\
    \ (linear; Gaussian with $\\sigma^2 = 0.08, 0.01$), and we display the scores\
    \ here. In the figure, 1 to 50 are the IDs given to the states, and California's\
    \ ID is 5 (written in red). The results of the kernel PCA approach differ greatly\
    \ depending on what kernel we choose. Additionally, since kernel PCA is unsupervised,\
    \ it is not possible to use CV to select the optimal parameters. The scores of\
    \ ordinary PCA and PCA with the linear kernel should be identical. Although the\
    \ directions of both axes are opposite, which is common in PCA, we can conclude\
    \ that they match"

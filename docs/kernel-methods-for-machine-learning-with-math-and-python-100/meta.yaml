    \sum_{i=0}^{p} \frac{(p+i)!}{i!(p-i)!} \left( \frac{\sqrt{8\nu} z}{l} \right)^{p-i}
    . \quad (6.35)$$


    For example, we express $\nu = 5/2, 3/2, 1/2$ as follows. In particular, we call
    the stochastic process with $\nu = 1/2$ the Ornstein-Uhlenbeck process.


    $$\varphi_{5/2}(z) = \left( 1 + \frac{\sqrt{5} z}{l} + \frac{5 z^2}{3 l^2} \right)
    \exp\left(-\frac{\sqrt{5} z}{l}\right)$$


    $$\varphi_{3/2}(z) = \left( 1 + \frac{\sqrt{3} z}{l} \right) \exp\left(-\frac{\sqrt{3}
    z}{l}\right)$$


    $$\varphi_{1/2}(z) = \exp(-z/l).$$



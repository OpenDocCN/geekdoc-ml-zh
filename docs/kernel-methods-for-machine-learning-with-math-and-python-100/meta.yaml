  md: 'Proposition 44 Let $r \in W_q[0, 1]$ be a natural spline with knots $x_1, \dots,
    x_N$ and a maximum order of $2q - 1$, and suppose that $g \in W_q[0, 1]$ satisfies
    $g(x_i) = r(x_i)$ for $i = 1, 2, \dots, N$. Then, we have


    $$\int_0^1 \{r^{(q)}(x)\}^2 dx \le \int_0^1 \{g^{(q)}(x)\}^2 dx.$$


    Moreover, the maximum order of $s$ is $q - 1$ such that $s(x_i) = 0$ for $s :=
    g - r$ and $i = 1, 2, \dots, N$, and if $N \ge q$, then the function $s$ is zero.


    Proof: See the appendix at the end of this chapter.


    Since the natural splines of the highest order $2q - 1$ possess $N$ dimensions,
    an $r \in W_q[0, 1]$ exists that shares the values $r(x_1) = g(x_1), \dots, r(x_N)
    = g(x_N)$ at the $N$ boundaries $x_1, \dots, x_N$. Among them, since the second
    term in (4.25) is the optimum, the natural spline of the highest order $2q - 1$
    is optimal.


    To summarize the above, the problem of finding the $f$ that minimizes (4.25) in
    $W_q[0, 1]$ reduces to finding the solution over the range of (4.26), (4.27).
    In other words, we can think of the problem in a subspace with $N$ dimensions.


    Moreover, the basis consists of $N$ elements regardless of whether $q \ge 1$,
    and if we set $g(\cdot) = \sum_{j=1}^N \beta_j g_j(\cdot)$, the problem is to
    find the $\beta_1, \dots, \beta_N$ that minimize


    $$\sum_{i=1}^N \{y_i - \sum_{i=1}^n \sum_{j=1}^N \beta_j g_j(x_i)\}^2 + \lambda
    \sum_{i=1}^N \sum_{j=1}^N \beta_i \beta_j \int_0^1 g_i^{(q)}(x) g_j^{(q)}(x) dx.$$


    Let $X = (g_j(x_i)) \in \mathbb{R}^{N \times N}$, $G = (\int_0^1 g_i^{(q)}(x)
    g_j^{(q)}(x) dx) \in \mathbb{R}^{N \times N}$, and $y = [y_1, \dots, y_N]^\top$.
    The optimal solution $\beta = [\beta_1, \dots, \beta_N]^\top$ is given by


    $$\beta = (X^\top X + \lambda G)^{-1} X^\top y.$$


    # 4.5 Random Fourier Features


    In the following, we examine computational cost reduction methods.


    In particular, in this section, we learn about random Fourier features, which
    we can apply to the case where the kernel $k(x, y)$ ($x, y \in E$) is a function
    of $x - y$.


    Proposition 45 (Rahimi and Recht [23]) Suppose that $k : E \times E \ni (x, y)
    \mapsto k(x, y) \in \mathbb{R}$ is a function of $x - y$. Then, we have


    $$k(x, y) = 2\mathbb{E}_{\omega, b} \cos(\omega^\top x + b) \cos(\omega^\top y
    + b), \quad (4.28)$$


    where the expectation $\mathbb{E}_{\omega, b}$ is calculated over $\omega \sim
    \mu$ (the probability of $k$ in Proposition 5) and $b \in [0, 2\pi)$ (the uniform
    distribution).'

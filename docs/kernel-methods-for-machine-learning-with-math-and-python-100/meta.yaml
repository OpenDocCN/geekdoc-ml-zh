    # 6.1 Regression


    ![](img/075acd5c7a7f62a80a28ffffee1ae5d9_182_0.png)


    Fig. 6.1 We show the range of 3 $\sigma$ above and below the average (left) and
    executed different samples five times (right)


    obtained by substituting $m_X = m(x) = 0$ into the average formula of the Gaussian
    process (6.3) with the equation


    $k_{x,X}\hat{\alpha} = k_{xX}(K + \lambda I)^{-1}Y$


    obtained by multiplying the kernel ridge regression formula (4.6) by $k_{x,X}$
    from the left, we observe that the former is a specific case of the latter when
    setting $\lambda = \sigma^2$.


    # 6.2 Classification


    We consider the classification problem next. We assume that the random variable
    $Y$ takes the value $Y = \pm 1$ and that its conditional probability given $x
    \in E$ is


    $P(Y = 1|x) = \frac{1}{1 + \exp(-f(x))}$, (6.5)


    where the Gaussian process $f : \Omega \times E \rightarrow \mathbb{R}$ is used.
    We wish to estimate $f$ from the actual $x_1, \dots, x_N \in \mathbb{R}^p$ (row
    vector) and $y_1, \dots, y_N \in \{-1, 1\}$. To maximize the likelihood, we minimize
    the negative log-likelihood


    $\sum_{i=1}^N \log[1 + \exp\{-y_i f(x_i)\}]$.


    If we set $f_X = [f_1, \dots, f_N]^\top = [f(x_1), \dots, f(x_N)]^\top \in \mathbb{R}^N$,
    $v_i := e^{-y_i f_i}$, and $l(f_X) := \sum_{i=1}^N \log(1 + v_i)$, then we have'
  - '[PAGE 183]


    $$\frac{\partial v_i}{\partial f_i} = -y_i v_i \ , \quad \frac{\partial l(f_X)}{\partial
    f_i} = -\frac{y_i v_i}{1 + v_i} \ , \quad \frac{\partial^2 l(f_X)}{\partial f_i^2}
    = \frac{v_i}{(1 + v_i)^2} \ ,$$


    where we use $y_i^2 = 1$. Given an initial value, we wait for the Newton-Raphson
    update $f_X \leftarrow f_X - (\nabla^2 l(f_X))^{-1} \nabla l(f_X)$ to converge.
    The update formula is


    $$f_X \leftarrow f_X + W^{-1} u \ ,$$


    where $u = \left( \frac{y_i v_i}{1 + v_i} \right)_{i=1,\dots,N}$ and $W = \text{diag}
    \left( \frac{v_i}{(1 + v_i)^2} \right)_{i=1,\dots,N}$. In other words, we repeat
    the following two steps:


    +   1. Obtain $v$, $u$, and $W$ from $f_X$.

    2. Calculate $f_X + W^{-1} u$ and substitute it into $f_X$


    for $v := [v_1, \dots, v_N]^\top \in \mathbb{R}^N$.


    Next, we consider maximizing the likelihood $\prod_{i=1}^N \frac{1}{1 + \exp\{-y_i
    f(x_i)\}}$ multiplied by the prior distribution of $f_X$, i.e., finding the solution
    with the maximum posterior probability. Here, the mean is often set to 0 as the
    prior probability of $f$ in the formulation of (6.5). Suppose first that the prior
    probability of $f_X \in \mathbb{R}^N$ is


    $$\frac{1}{\sqrt{(2\pi)^N \det k_{XX}}} \exp\left\{-\frac{f_X^\top k_{XX}^{-1}
    f_X}{2}\right\} \ ,$$


    where $k_{XX}$ is the Gram matrix $(k(x_i, x_j))_{i,j=1,\dots,N}$. If we set


    $$L(f_X) = l(f_X) + \frac{1}{2} f_X^\top k_{XX}^{-1} f_X + \frac{1}{2} \log \det
    k_{XX} + \frac{N}{2} \log 2\pi \ , \qquad (6.6)$$


    then we have


    $$\nabla L(f_X) = \nabla l(f_X) + k_{XX}^{-1} f_X = -u + k_{XX}^{-1} f_X \qquad
    (6.7)$$


    and


    $$\nabla^2 L(f_X) = \nabla^2 l(f_X) + k_{XX}^{-1} = W + k_{XX}^{-1} \ . \qquad
    (6.8)$$


    Thus, we may express the update formula as


    $$\begin{aligned} f_X &\leftarrow f_X + (W + k_{XX}^{-1})^{-1} (u - k_{XX}^{-1}
    f_X) \ &= (W + k_{XX}^{-1})^{-1} \{(W + k_{XX}^{-1}) f_X - k_{XX}^{-1} f_X + u\}
    \ &= (W + k_{XX}^{-1})^{-1} (W f_X + u) \ . \end{aligned}$$



    # Chapter 5

    The MMD and HSIC


    In this chapter, we introduce the concept of random variables $X : E \rightarrow
    \mathbb{R}$ in an RKHS and discuss testing problems in RKHS. In particular, we
    define a statistic and its null hypothesis for the two-sample problem and the
    corresponding independence test. We do not know the distribution according to
    the null hypothesis under a finite sample in either case. Therefore, we introduce
    a permutation test and a U-statistic with which we construct the process and run
    the program. Then, we study the notions of characteristics and universal kernels
    to learn what kernels are valid for such tests. Finally, we learn about empirical
    processes, which are often used in the mathematical analyses of machine learning
    and deep learning methods.


    # 5.1 Random Variables in RKHSs


    In Chap. 1, we proved that a function $X : E \rightarrow \mathbb{R}$ that takes
    values in $\mathbb{R}$ is measurable if $\{\omega \in E | X(\omega) \in B\}$ for
    any Borel set $B$ is an event (element) in $\mathcal{F}$, and we call such an
    $X$ a random variable.

    In the following, we say that a kernel $k$ is measurable if the set of $(x, y)$
    such that $k(x, y) \in B$ is an event in $E \times E$, and we assume that any
    kernel $k$ is measurable. Moreover, in this chapter, the expectation $\mathbb{E}[k(X,
    X)]$ of $k(x, x) \in \mathbb{R}$, $x \in E$, is bounded, which means that both
    $\mathbb{E}[\sqrt{k(X, X)}] \leq \sqrt{\mathbb{E}[k(X, X)]}$ are bounded.


    **Proposition 48** Let $k : E \times E \rightarrow \mathbb{R}$ be measurable.
    Then, the map $\Psi : E \ni x \mapsto k(x, \cdot) \in H$ is measurable. Thus,
    $k(X, \cdot)$ is a random variable in $H$ for any random variable $X$ that takes
    values in $E$.


    Proof: See the appendix at the end of this chapter.

    Let $X : E \rightarrow \mathbb{R}$ be a random variable. The linear functional
    $T : H \rightarrow \mathbb{R}$ with


    $$T(f) := \mathbb{E}[f(X)] = \mathbb{E}[\langle f(\cdot), k(X, \cdot) \rangle_H]
    \leq \mathbb{E}[\|f\|_H \sqrt{k(X, X)}] \leq \|f\|_H \mathbb{E}[\sqrt{k(X, X)}]$$'
- md: 'satisfies $\frac{T(f)}{\|f\|_H} \leq \mathbb{E}[\sqrt{k(X, X)}] < \infty$.
    From Proposition 22, there exists an $m_X \in H$ such that


    $$\mathbb{E}[f(X)] = \langle f(\cdot), m_X(\cdot) \rangle_H$$


    for any $f \in H$. We call such an $m_X$ the expectation of $k(X, \cdot)$, and
    we write $m_X(\cdot) = \mathbb{E}[k(X, \cdot)]$. Then, we have


    $$\mathbb{E}[\langle f(\cdot), k(X, \cdot) \rangle_H] = \langle f(\cdot), \mathbb{E}[k(X,
    \cdot)] \rangle_H,$$


    which means that we can change the order of the inner product and expectation
    operations. Let $E_X, E_Y$ be sets. We define the tensor product $H_0$ of RKHSs
    $H_X$ and $H_Y$ consisting of kernels $k_X : E_X \to \mathbb{R}$ and $k_Y : E_Y
    \to \mathbb{R}$, respectively, by the set of functions $E_X \times E_Y \to \mathbb{R}$,

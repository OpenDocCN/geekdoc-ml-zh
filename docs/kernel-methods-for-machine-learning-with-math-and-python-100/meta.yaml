    \ kernel $k : E \\times E \\rightarrow \\mathbb{R}$. Therefore, the Gaussian process\
    \ can be uniquely expressed in terms of a pair $(m, k)$ containing the mean $m(x)$\
    \ of each $x \\in E$ and the covariance $k(x, x')$ of each $(x, x') \\in E \\\
    times E$.\n\nIn general, a random variable is a map of $\\Omega \\rightarrow \\\
    mathbb{R}$, and we should make $\\omega$ explicit, i.e., $f(\\omega, x)$, but\
    \ for simplicity, for the time being, we make $\\omega$ implicit, i.e., $f(x)$,\
    \ even if it is a random variable.\n\n**Example 83** Let $m_X \\in \\mathbb{R}^N$\
    \ and $k_{XX} \\in \\mathbb{R}^{N \\times N}$ be the mean and covariance matrix,\
    \ respectively, of the Gaussian process $(m, k)$ at $x_1, \\dots, x_N \\in E :=\
    \ \\mathbb{R}$. In general, for a mean $\\mu$ and a covariance matrix $\\Sigma\
    \ \\in \\mathbb{R}^{N \\times N}$, $\\Sigma$ is nonnegative definite, and there\
    \ exists a lower triangular matrix $R \\in \\mathbb{R}^{N \\times N}$ with $\\\
    Sigma = RR^\\top$ (Cholesky decomposition). Therefore, to generate random numbers\
    \ that follow $N(m_X, k_{XX})$ from $N$ independent random numbers $u_1, \\dots,\
    \ u_N$ that follow the standard Gaussian distribution, we can calculate $f_X :=\
    \ R_X u + m_X \\in \\mathbb{R}^N$ for $k_{XX} := R_X R_X^\\top$ with $u = [u_1,\
    \ \\dots, u_N]$. In fact, the expectation and the covariance matrix of $f_X$ are\
    \ $m_X$ and\n\n$$\\mathbb{E}[(f_X - m_X)(f_X - m_X)^\\top] = \\mathbb{E}[R_X u\
    \ u^\\top R_X^\\top] = R_X \\mathbb{E}[u u^\\top] R_X^\\top = R_X R_X^\\top =\
    \ k_{XX},$$\n\nrespectively This procedure can be described in Python as follows.\n\
    \n```\n# Install the module skfda via\npip install scikit-fda\n```\n\n```\n# In\
    \ this chapter, we assume that the following has been executed.\nimport numpy\

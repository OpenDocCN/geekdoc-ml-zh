    Positive Definite Kernels


    In data analysis and various information processing tasks, we use kernels to evaluate
    the similarities between pairs of objects. In this book, we deal with mathematically
    defined kernels called positive definite kernels. Let the elements $x, y$ of a
    set $E$ correspond to the elements (functions) $\Psi(x), \Psi(y)$ of a linear
    space $H$ called the reproducing kernel Hilbert space. The kernel $k(x, y)$ corresponds
    to the inner product $\langle \Psi(x), \Psi(y) \rangle_H$ in the linear space
    $H$. Additionally, by choosing a nonlinear map $\Psi$, this kernel can be applied
    to various problems. The set $E$ may be a string, a tree, or a graph, even if
    it is not a real-numbered vector, as long as the kernel satisfies positive definiteness.
    After defining probability and Lebesgue integrals in the second half, we will
    learn about kernels by using characteristic functions (Bochner''s theorem).


    # 1.1 Positive Definiteness of a Matrix


    Let $n \geq 1$; we say that a square matrix $A$ is symmetric if $A \in \mathbb{R}^{n
    \times n}$ is equal to its transpose ($A^\top = A$)$^1$, and we say that $A$ is
    nonnegative definite if all the eigenvalues are nonnegative.


    **Proposition 1** (nonnegative definite matrix) *The following three conditions
    are equivalent for a symmetric matrix $A \in \mathbb{R}^{n \times n}$.*


    +   1. A matrix $B \in \mathbb{R}^{n \times n}$ exists such that $A = B^\top B$.

    2. $x^\top Ax \geq 0$ for any $x \in \mathbb{R}^n$.

    3. The eigenvalues of $A$ are nonnegative.


    Proof: $1. \Rightarrow 2.$ holds because $A = B^\top B \Rightarrow x^\top Ax =
    x^\top B^\top Bx = \|Bx\|^2 \geq 0$. $2. \Rightarrow 3.$ follows from the fact
    that $x^\top Ax \geq 0, x \in \mathbb{R}^n \Rightarrow 0 \leq y^\top Ay = y^\top
    \lambda y = \lambda \|y\|^2$ for


    $^1$ We write the transpose of matrix $A$ as $A^\top$.'

    $\mathbb{E}_{XY}[\|k_X(X, \cdot)k_Y(Y, \cdot)\|_{H_X \otimes H_Y}] = \mathbb{E}_{XY}[\|k_X(X,
    \cdot)\|_{H_X} \|k_Y(Y, \cdot)\|_{H_Y}]$

    $= \mathbb{E}_{XY}[\sqrt{k_X(X, X)k_Y(Y, Y)}] \leq \sqrt{\mathbb{E}_X[k_X(X, X)]\mathbb{E}_Y[k_Y(Y,
    Y)]}$.


    Thus, the left-hand side takes a finite value, and we have


    $\mathbb{E}_{XY}[f(X, Y)] = \mathbb{E}_{XY}[\langle f, k_X(X, \cdot)k_Y(Y, \cdot)
    \rangle] \leq \|f\|_{H_X \otimes H_Y} \mathbb{E}_{XY}[\|k_X(X, \cdot)k_Y(Y, \cdot)\|_{H_X
    \otimes H_Y}]$


    for $f \in H_X \otimes H_Y$. From Proposition 22 (Riesz''s representation theorem),
    there exists an $m_{XY} \in H_X \otimes H_Y$ such that


    $\mathbb{E}_{XY}[f(X, Y)] = \langle f, m_{XY} \rangle$


    and we write


    $m_{XY} := \mathbb{E}_{XY}[k_X(X, \cdot)k_Y(Y, \cdot)]$


    which means that we can change the order of the inner product and expectation
    operations:


    $\mathbb{E}_{XY}[\langle f, k_X(X, \cdot)k_Y(Y, \cdot) \rangle] = \langle f, \mathbb{E}_{XY}[k_X(X,
    \cdot)k_Y(Y, \cdot)] \rangle$.



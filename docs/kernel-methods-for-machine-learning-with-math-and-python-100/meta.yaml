    In fact, if we set $g \in \text{Ker}(K)$, then $K$ is self-adjoint ($K = K^*$)
    and


    $$\langle g, Kh \rangle = \langle Kg, h \rangle = 0, \quad h \in H.$


    Therefore, $g$ is orthogonal to any element of $\text{Im}(K)$, and we require
    $g \in \text{Im}(K)^\perp$. Conversely, if $g \in \text{Im}(K)^\perp$, then $KKg
    \in \text{Im}(K)$ and $\|Kg\| = \langle g, K K g \rangle = 0$, i.e., we have $g
    \in \text{Ker}(K)$. This means that for $g \in \text{Im}(K)^\perp$, we have $\mathbb{E}[\langle
    F, g \rangle^2] = \langle Kg, g \rangle = 0$, and $F$ is orthogonal to any $g
    \in \text{Im}(K)^\perp$ with a probability of 1. Therefore, from Proposition 20,
    with a probability of 1, we have


    $$F \in (\text{Im}(K))^{\perp\perp} = \overline{\text{Im}(K)}.$$


    Additionally, from Propositions 27 and 31 and the first item of Proposition 73,
    the following holds.


    **Proposition 74** The eigenvalue function $\{e_j\}$ of the covariance operator
    $K$ is an orthonormal basis of $\text{Im}(K)$; the corresponding eigenvalues $\{\lambda_j\}_{j=1}^\infty$
    are nonnegative, monotonically decrease, and converge to 0. Furthermore, the multitude
    of each of the nonzero eigenvalues is finite.


    Additionally, from Propositions 73 and 74, the following holds.


    **Proposition 75** If $\{f_j\}$ is an orthonormal basis of $H$, then we have


    $$\mathbb{E}\|F - \sum_{j=1}^n \langle F, f_j \rangle f_j\|^2 = \mathbb{E}\|F\|^2
    - \sum_{j=1}^n \langle K f_j, f_j \rangle, \quad (6.38)$$


    which is minimized when $f_j = e_j$ ($1 \le j \le n$).


    Proof: The following two equations imply (6.38).


    $$\mathbb{E}\|F - \sum_{j=1}^n \langle F, f_j \rangle f_j\|^2 = \mathbb{E}\|F\|^2
    + \mathbb{E}\|\sum_{j=1}^n \langle F, f_j \rangle f_j\|^2 - 2\mathbb{E}\left[\langle
    F, \sum_{j=1}^n \langle F, f_j \rangle f_j\rangle\right]$$


    $$\mathbb{E}\|\sum_{j=1}^n \langle F, f_j \rangle f_j\|^2 = \mathbb{E}\left[\langle
    F, \sum_{j=1}^n \langle F, f_j \rangle f_j\rangle\right] = \sum_{j=1}^n \mathbb{E}[\langle
    F, f_j \rangle^2] = \sum_{j=1}^n \langle K f_j, f_j \rangle.$$


    Then, from $\mathbb{E}\|F\|^2 = \|K\|_{TR} = \sum_{j=1}^\infty \lambda_j$ (Proposition

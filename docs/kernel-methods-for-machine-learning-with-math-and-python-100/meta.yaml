  md: "Here, to replace the $(i, j)$ rows and $(i, j)$ columns of the symmetric matrix\
    \ $B$, let $Q$ be the matrix obtained by replacing the $(i, j)$, $(j, i)$ and\
    \ $(i, i)$, $(j, j)$ components of the unit matrix with 1 and 0, respectively,\
    \ and multiplying $B$ by the symmetric matrix $Q$ from the front and rear of $B$.\
    \ For example,\n\n$$QBQ = \\begin{bmatrix} 1 & 0 & 0 \\ 0 & 0 & 1 \\ 0 & 1 & 0\
    \ \\end{bmatrix} \\begin{bmatrix} b_{11} & b_{12} & b_{13} \\ b_{21} & b_{22}\
    \ & b_{23} \\ b_{31} & b_{32} & b_{33} \\end{bmatrix} \\begin{bmatrix} 1 & 0 &\
    \ 0 \\ 0 & 0 & 1 \\ 0 & 1 & 0 \\end{bmatrix} = \\begin{bmatrix} b_{11} & b_{13}\
    \ & b_{12} \\ b_{31} & b_{33} & b_{32} \\ b_{21} & b_{23} & b_{22} \\end{bmatrix}.$$\n\
    \nSpecifically, for $i = 1, 2, \\cdots, r$, we perform the following steps: Assume\
    \ that $\\epsilon > 0$.\n\n+   1. Let $k$ be the $j$ ($i \\le j \\le N$) that\
    \ maximizes $R_{j,j}^2 = B_{j,j} - \\sum_{h=1}^{i-1} R_{j,h}^2$.\n    (a) Swap\
    \ the $i$th and $k$th rows and $i$th and $k$th columns of $B$.\n    (b) Let $Q_{i,k}\
    \ := 1$, $Q_{k,i} := 1$, $Q_{i,i} := 0$, $Q_{k,k} := 0$.\n    (c) Swap $R_{i,1},\
    \ \\cdots, R_{i,i-1}$ and $R_{k,1}, \\cdots, R_{k,i-1}$.\n    (d) $R_{i,i} = \\\
    sqrt{B_{k,k} - \\sum_{h=1}^{i-1} R_{k,h}^2}$.\n2. End if $R_{i,i} < \\epsilon$.\n\
    3. $R_{j,i} = \\frac{1}{R_{i,i}}(B_{j,i} - \\sum_{h=1}^{i-1} R_{j,h} R_{i,h})$\
    \ for each $j = i + 1, \\cdots, N$.\n\nOnce the $i$th column is completed, $B_{j,i}\
    \ = \\sum_{h=1}^N R_{j,h} R_{i,h}$ follows, and $R_{j,i}$ remains the same after\
    \ that for each $j = 1, \\ldots, N$. Then, $B = RR^\\top$ follows if the procedure\
    \ completes up to $r = N$.\n\nAt the beginning of each $i = 1, 2, \\ldots, r$,\
    \ we select the $j$ that maximizes $R_{j,j}^2 = B_{j,j} - \\sum_{h=1}^{i-1} R_{j,h}^2\
    \ \\ge 0$. In step 3, the components of the $j$th ($j = i + 1, \\ldots, N$) rows\
    \ of the $i$th column join, but we divide them by $R_{i,i}$. Compared to the case\
    \ where other values are selected as $R_{i,i}$ in step 1, the absolute value of\
    \ $R_{j,i}$ after dividing by $R_{i,i}$ becomes smaller, and the $B_{j,j} - \\\
    sum_{h=1}^i R_{j,h}^2$ in the next step becomes larger for each $j$. If $R_{r,r}^2$\
    \ takes a negative value, then regardless of the selection order, there is no\
    \ solution to the Cholesky decomposition, contradicting Proposition 47 (the uniqueness\
    \ of the solution is also guaranteed). Even in the case of an incomplete Cholesky\
    \ decomposition, we use the first $r$ columns when running $r = N$.\n\nWe show\
    \ the code for executing the incomplete Cholesky decomposition below:\n\n```\n\
    python\ndef im_ch(A,m):\n    n=A.shape[1]\n    R=np.zeros((n,n))\n    P=np.eye(n)\n\
    \    for i in range(m):\n        max_R=-np.inf\n        for j in range(i,n):\n\
    \            RR=A[j,j]\n            for h in range(i):\n                RR=RR-R[j,h]**2\n\
    \            if RR>max_R:\n                k=j\n```"

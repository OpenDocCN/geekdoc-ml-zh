    where $\overline{X}$ denotes the sample mean $(X_1 + \dots + X_n)/n$.


    Proof: We use the Chernoff bound and HoeffdingвАЩs lemma, which are shown below.


    **Lemma 5 (Chernoff Bound)** *For a random variable $X$ and an arbitrary $\epsilon

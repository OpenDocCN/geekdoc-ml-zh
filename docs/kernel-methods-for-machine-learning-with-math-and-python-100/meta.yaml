    with the constants $\beta_1, \dots, \beta_{J+4} \in \mathbb{R}$ is a spline function
    of order three with knots $0 < \xi_1 < \dots < \xi_J < 1$. We may define the spline
    function of order three by the function $g$, which is a piecewise polynomial for
    each of the $J + 1$ intervals whose $g, g'', g''''$ are continuous at the $J$
    knots. The spline expressed by (4.19) consists of a linear space, and


    $1, x, x^2, x^3, (x - \xi_1)_+^3, \dots, (x - \xi_J)_+^3$


    can be its basis.


    In particular, we consider the natural spline of order three in which we pose
    more conditions such as


    $g''''(\xi_1) = g''''''(\xi_1) = 0$


    and


    $g''''(\xi_J) = g''''''(\xi_J) = 0$.


    The resulting curve is not of order three in $x \le \xi_1, \xi_J \le x$, and we

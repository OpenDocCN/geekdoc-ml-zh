    ## Preface


    ## How to Overcome Your Kernel Weakness


    Among machine learning methods, kernels have always been a particular weakness
    of mine. I tried to read вАЬIntroduction to Kernel MethodsвАЭ by Kenji Fukumizu (in
    Japanese) but failed many times. I invited Prof. Fukumizu to give an intensive
    lecture at Osaka University and listened to the course for a week with the students,
    but I could not understand the bookвАЩs essence. When I first started writing this
    book, my goal was to rid my sense of weakness. However, now that this book is
    completed, I can tell readers how they can overcome their own kernel weaknesses.


    Most people, even machine learning researchers, do not understand kernels and
    use them. If you open this page, I believe you have a positive feeling that you
    want to overcome your weakness.


    The shortest path I would most recommend for achieving this is to learn mathematics
    by starting from the basics. Kernels work according to the mathematics behind
    them. It is essential to think through this concept until you understand it. The
    mathematics needed to understand kernels are called functional analysis (Chap.
    2). Even if you know linear algebra or differential and integral calculus, you
    may be confused. Vectors are finite dimensional, but a set of functions is infinite
    dimensional and can be treated as linear algebra. If the concept of completeness
    is new to you, I hope you will take the time to learn about it. However, if you
    get through this second chapter, I think you will understand everything about
    kernels.


    This book is the third volume (of six) in the 100 Exercises for Building Logic
    set. Since this is a book, there must be a reason for publishing it (the so-called
    cause) when existing books on kernels can be found. The following are some of
    the features of this book.


    - 1. The mathematical propositions of kernels are proven, and the correct conclusions
    are stated so that the reader can reach the essence of kernels.

    - 2. As in the other books in the 100 Mathematical Problems in Machine Learning
    series, source programs and running examples are presented to promote understanding.
    It is not easy for readers to understand the results if only mathematical formulas
    are given, and this is especially true for kernels.

    - 3. Once the reader understands the basic topics of functional analysis (Chap.
    2), the applications in the subsequent chapters are discussed, and no prior knowledge
    of mathematics is assumed.

    - 4. This kernel considers both the kernel of the RKHS and the kernel of the Gaussian
    process. A clear distinction is made between the two treatments. In this book,
    the two types of kernels are discussed in Chaps. 5 and 6, respectively.


    We surveyed books on kernels both in Japan and overseas but found that none satisfied
    two or more of the above characteristics.


    I have experienced many failures leading up to the publication of this book. Every
    year, I give a lecture (at the graduate school of Osaka University). Each area
    of machine learning is studied by solving 100 mathematical and programming exercises.
    Sparse estimation (2018) and graphical models (2019) have gained popularity, and
    the 2020 kernel lecture has more than 100 students enrolled. However, although
    I prepared for the lectures for more than 2 days every week, the talks did not
    go well, probably due to my weakness regarding the subject. This was evident from
    the class questionnaires provided by the students. However, I analyzed each of
    these problems and made improvements, and this book was born.


    I hope that readers will learn about kernels efficiently without following the
    same path that I took (consuming much time and energy through trial and error).
    Reading this book does not mean that you will write a paper immediately, but it
    will give you a solid foundation. You will be able to read kernel papers smoothly,
    which had previously seemed difficult, and you will be able to see the whole kernel
    paradigm from a higher level. This book is also enjoyable, even for researchers
    in machine learning. We hope that you will use this book to achieve success in
    your respective fields.


    ## What Makes KMMP Unique?


    I have summarized the features of this book as follows.


    - 1. Developing logic

    We mathematically formulate and solve each ML problem and build those programs
    to grasp the subjectвАЩs essence. The KMMP (Kernel methods for Machine learning
    with Math and Python) instills вАЬlogicвАЭ in the minds of the readers. The reader
    will acquire both the knowledge and ideas of ML. Even if new technology emerges,
    they will be able to follow the changes smoothly. After solving the 100 problems,
    most students would say, вАЬI learned a lotвАЭ.

    - 2. Not just a story

    If programming codes are available, you can immediately take action. It is unfortunate
    when an ML book does not offer the source codes. Even if a package is available,
    if we cannot see the inner workings of the programs, all we can do is input data
    into those programs. In KMMP, the program codes are available for most of the
    procedures. In cases where the reader does not understand the math, the codes
    will help them know what it means.

    - 3. Not just a how-to book: an academic book written by a university professor.

    This book explains how to use the package and provides examples of executions
    for those unfamiliar with them. Still, because only the inputs and outputs are
    visible, we can see the procedure as a black box. In this sense, the reader will
    have limited satisfaction because they will not obtain the subject''s essence.
    KMMP intends to show the reader the heart of ML and is more of a full-fledged
    academic book.

    - 4. Solve 100 exercises: problems are improved with feedback from university
    students

    The exercises in this book have been used in university lectures and refined based
    on students'' feedback. The best 100 problems were selected. Each chapter (except
    the exercises) explains the solutions, and you can solve all of the exercises
    by reading the book.

    - 5. Self-contained

    All of us have been discouraged by phrases such as "for the details, please refer
    to the literature XX". Unless you are an enthusiastic reader or researcher, nobody
    will seek out those references. In this book, we have presented the material so
    that consulting external references is not required. Additionally, the proofs
    are simple derivations, and the complicated proofs are given in the appendices
    at the end of each chapter. KMMP completes all discussions, including the appendices.

    - 6. Readers'' pages: questions, discussion, and program files

    The reader can ask any question on the book via https://bayesnet.org/books.



    \ `retrieve_task` 函数重新运行示例 2-1，并确认它仍然按预期运行。\n\n## 使用 Ray 的 wait 函数进行非阻塞调用\n\n\
    注意在示例 2-1 中，我们使用了 `ray.get(object_references)` 来访问结果。这个调用是阻塞的，这意味着我们的驱动程序必须等待所有结果都可用。在我们的情况下，这没什么大不了的；程序现在不到一秒就完成了。但想象一下，处理每个数据库条目需要几分钟。在这种情况下，你会希望释放驱动程序进程以执行其他任务，而不是无所事事地坐着。此外，最好在结果可用时就处理它们（有些完成得比其他快得多），而不是等待所有项目都被处理完毕。还有一个需要记住的问题是，如果其中一个数据库条目无法按预期检索会发生什么？假设数据库连接中某处存在死锁。驱动程序将只是挂起，永远无法检索所有条目。因此，使用合理的超时时间是个好主意。假设我们不想等待超过最长数据检索任务\
    \ 10 倍的时间才停止任务。以下是你可以通过使用 `wait` 来实现这一点的方法：\n\n```python\nstart = time.time()\n\
    object_references = [\n    retrieve_task.remote(item, db_object_ref) for item\
    \ in range(8)\n]\nall_data = []\n\nwhile len(object_references) > 0:\n    finished,\

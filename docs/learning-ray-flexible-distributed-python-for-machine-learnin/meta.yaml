    \ Using `tune.sample_from` you can tackle this situation (or more complex and\
    \ nested ones) like this:\n\n```python\nfrom ray import tune\nimport numpy as\
    \ np\n\nsearch_space = {\n    \"weight\": tune.sample_from(\n        lambda context:\
    \ np.random.uniform(low=0.0, high=1.0)\n    ),\n```"

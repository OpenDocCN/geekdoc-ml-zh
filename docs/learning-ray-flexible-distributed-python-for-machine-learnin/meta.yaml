  md: "# Using the Ray Job Submission server\n\nYou can run scripts on the cluster\
    \ by using the Ray Job Submission server. You can use the server to send a script\
    \ or a bundle of dependencies and run custom scripts with that set of dependencies.\
    \ To start, you'll need to port-forward the job submission server port:\n\n```\n\
    kubectl port-forward service/raycluster-complete-head-svc 8265:8265\n```\n\nNow,\
    \ submit the script by setting the RAY_ADDRESS variable to the job server submission\
    \ endpoint and using the Ray Job Submission CLI:\n\n```\nexport RAY_ADDRESS=\"\
    http://localhost:8265\"\n\nray job submit --working-dir=. -- python script.py\n\
    ```\n\nYou'll see an output that looks like:\n\n```\nJob submission server address:\

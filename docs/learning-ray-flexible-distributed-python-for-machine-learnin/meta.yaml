  - "[PAGE 84]\n\n```\nclass SimulationActor(Simulation):\n    \"\"\"Ray actor for\
    \ a Simulation.\"\"\"\n    def __init__(self):\n        env = Environment()\n\
    \        super().__init__(env)\n```\n\n❶ This Ray actor wraps our Simulation class\
    \ in a straightforward way.\n\nWith the foundations on Ray Core you've developed\
    \ in Chapter 2, you should have no problems reading this code. It might take some\
    \ practice to be able to write it yourself, but conceptually you should be on\
    \ top of this example.\n\nMoving on, let's define a train_policy_parallel function\
    \ that distributes this RL workload on your local Ray Cluster. To do so, we create\
    \ a policy on the driver and a total of four SimulationActor instances that we\
    \ can use for distributed rollouts. We then put the policy into the object store\
    \ with ray.put and pass it to the remote rollout calls as an argument to collect\
    \ experiences for a given number of training episodes. We then use ray.wait to\
    \ get the finished rollouts (and account for the fact that some rollouts might\
    \ finish earlier than others) and update our policy with the collected experiences.\
    \ Finally, we return the trained policy:\n\n```\ndef train_policy_parallel(env,\
    \ num_episodes=1000, num_simulations=4):\n    \"\"\"Parallel policy training function.\"\
    \"\"\n    policy = Policy(env) ❶\n    simulations = [SimulationActor.remote()\
    \ for _ in range(num_simulations)] ❷\n\n    policy_ref = ray.put(policy) ❸\n \
    \   for _ in range(num_episodes):\n        experiences = [sim.rollout.remote(policy_ref)\
    \ for sim in simulations] ❹\n\n        while len(experiences) > 0:\n         \
    \   finished, experiences = ray.wait(experiences) ❺\n            for xp in ray.get(finished):\n\
    \                update_policy(policy, xp)\n\n    return policy\n```\n\n+   ❶\
    \ Initialize a policy for the given environment.\n❷ Instead of one simulation,\
    \ create four simulation actors.\n❸ Put the policy into the object store.\n❹ For\
    \ each of the 1,000 episodes, collect experience data in parallel using our simulation\
    \ actors."
  - '[PAGE 85]


    5 Finished rollouts can be retrieved from the object store and used to update
    the policy.


    This allows us to take the last step and run the training procedure in parallel
    and then evaluate the result as before:


    ```

    parallel_policy = train_policy_parallel(environment)

    evaluate_policy(environment, parallel_policy)

    ```


    The result of those two lines is the same as before, when we ran the serial version
    of the RL training for the maze. We hope you appreciate how `train_policy_parallel`
    has the same high-level structure as `train_policy`. It''s a good exercise to
    compare the two line-by-line.


    Essentially, all it took to parallelize the training process was to use the `ray.remote`
    decorator on a class in a suitable way and then use the right `remote` calls.
    Of course, you need some experience to get this right. But notice how little time
    we spent on thinking about distributed computing and how much time we could spend
    on the actual application code. We didn''t need to adopt an entirely new programming
    paradigm and could simply approach the problem in the most natural way. Ultimately,
    that''s what you want—and Ray is great at giving you this kind of flexibility.


    To wrap things up, let''s have a quick look at the execution graph of the Ray
    application that we''ve just built. **Figure 3-1** summarizes this task graph
    in a compact way.



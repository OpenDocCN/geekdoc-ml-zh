    notable data processing systems, but we’ll defer an in-depth discussion until
    Chapter 6.


    # Model Training


    Moving on to the next set of libraries, let’s look at the distributed training
    capabilities of Ray. For that, you have access to two libraries. One is dedicated
    to reinforcement learning specifically; the other one has a different scope and
    is aimed primarily at supervised learning tasks.


    # Reinforcement learning with Ray RLlib


    Let’s start with Ray RLlib for reinforcement learning (RL). This library is powered
    by the modern ML frameworks TensorFlow and PyTorch, and you can choose which one
    to use. Both frameworks seem to converge more and more conceptually, so you can
    pick the one you like most without losing much in the process. Throughout the
    book we use both TensorFlow and PyTorch examples so you can get a feel for both
    frameworks when using Ray.'
  - '[PAGE 34]


    For this section, go ahead and install TensorFlow with `pip install tensorflow`
    right now.16 To run the code example, you also need to install the gym library
    with `pip install "gym==0.25.0"`.


    One of the easiest ways to run examples with RLlib is to use the command-line
    tool `rllib`, which we already installed implicitly when we ran `pip install "ray[rllib]"`.
    Once you run more complex examples in Chapter 4, you will mostly rely on its Python
    API, but for now we want to get a first taste of running RL experiments with RLlib.


    We''ll look at a fairly classic control problem of balancing a pole on a cart.
    Imagine you have a pole like the one in Figure 1-3, fixed at a joint of a cart,
    and subject to gravity. The cart is free to move along a frictionless track, and
    you can manipulate the cart by giving it a push from the left or the right with
    a fixed force. If you do this well enough, the pole will remain in an upright
    position. For each time step the pole didn''t fall over, we get a reward of 1.
    Collecting a high reward is our goal, and the question is whether we can teach
    a reinforcement learning algorithm to do this for us.


    ![](img/6489687a3a178f2884963bddc928992c_34_0.png)


    Figure 1-3. Controlling a pole attached to a cart by asserting force to the left
    or the right


    Specifically, we want to train a reinforcement learning agent that can carry out
    two actions, namely, push to the left or to the right, observe what happens when
    interacting with the environment in that way, and learn from the experience by
    maximizing the reward.


    To tackle this problem with Ray RLlib, we can use a so-called *tuned* example,
    which is a preconfigured algorithm that runs well for a given problem. You can
    run a tuned example with a single command. RLlib comes with many such examples,
    and you can list them all with `rllib example list`.


    One of the available examples is `cartpole-ppo`, a tuned example that uses the
    PPO algorithm to solve the cart-pole problem, specifically, the CartPole-v1 environment
    from OpenAI Gym. You can take a look at the configuration of this example by typing
    `rllib example get cartpole-ppo`, which will first download the example


    16 If you''re on a Mac, you''ll have to install `tensorflow-macos`. In general,
    if you encounter any issues installing Ray or its dependencies on your system,
    please refer to the installation guide.'
- md: "## Distributed training with Ray Train\n\nRay RLlib is dedicated to reinforcement\
    \ learning, but what do you do if you need to train models for other types of\
    \ machine learning, like supervised learning? You can use another Ray library\
    \ for distributed training in this case: Ray Train. At this point, we don't have\
    \ enough knowledge of frameworks such as TensorFlow to give you a concise and\
    \ informative example for Ray Train. If you're interested in distributed training,\
    \ you can jump ahead to Chapter 6.\n\n## Hyperparameter Tuning\n\nNaming things\
    \ is hard, but *Ray Tune*, which you can use to tune all sorts of parameters,\
    \ hits the spot. It was built specifically to find good hyperparameters for machine\
    \ learning models. The typical setup is as follows:\n\n- You want to run an extremely\
    \ computationally expensive training function. In ML, it’s not uncommon to run\
    \ training procedures that take days, if not weeks, but let’s say you’re dealing\
    \ with just a couple of minutes.\n- As a result of training, you compute a so-called\
    \ objective function. Usually you want to either maximize your gains or minimize\
    \ your losses in terms of performance of your experiment.\n- The tricky bit is\
    \ that your training function might depend on certain parameters, called hyperparameters,\
    \ that influence the value of your objective function.\n- You may have a hunch\
    \ what individual hyperparameters should be, but tuning them all can be difficult.\
    \ Even if you can restrict these parameters to a sensible range, it’s usually\
    \ prohibitive to test a wide range of combinations. Your training function is\
    \ simply too expensive.\n\nWhat can you do to efficiently sample hyperparameters\
    \ and get “good enough” results on your objective? The field concerned with solving\
    \ this problem is called *hyperparameter optimization* (HPO), and Ray Tune has\
    \ an enormous suite of algorithms for tackling it. Let’s look an example of Ray\
    \ Tune used for the situation we just explained. The focus is yet again on Ray\
    \ and its API, not on a specific ML task (which we simply simulate for now):\n\
    \n```python\nfrom ray import tune\nimport math\nimport time\n\ndef training_function(config):\
    \  # ❶\n    x, y = config[\"x\"], config[\"y\"]\n    time.sleep(10)\n    score\
    \ = objective(x, y)\n    tune.report(score=score)  # ❷\n\ndef objective(x, y):\n\
    \    return math.sqrt((x**2 + y**2)/2)  # ❸\n\nresult = tune.run(  # ❹\n    training_function,\n\
    \    config={\n        \"x\": tune.grid_search([-1, -.5, 0, .5, 1]),  # ❺\n  \
    \      \"y\": tune.grid_search([-1, -.5, 0, .5, 1])\n    })\n\nprint(result.get_best_config(metric=\"\
    score\", mode=\"min\"))\n```\n\n1. Simulate an expensive training function that\
    \ depends on two hyperparameters, x and y, read from a config.\n2. After sleeping\
    \ for 10 seconds to simulate training and computing the objective, the score is\
    \ reported to tune.\n3. The objective computes the mean of the squares of x and\
    \ y and returns the square root of this term. This type of objective is fairly\
    \ common in ML.\n4. Use tune.run to initialize hyperparameter optimization on\
    \ our training_function.\n5. A key part is to provide a parameter space for x\
    \ and y for tune to search over.\n\nNotice how the output of this run is structurally\
    \ similar to what you saw in the RLlib example. That's no coincidence, as RLlib\
    \ (like many other Ray libraries) uses Ray Tune under the hood. If you look closely,\
    \ you will see PENDING runs that wait for execution, as well as RUNNING and TERMINATED\
    \ runs. Tune takes care of selecting, scheduling, and executing your training\
    \ runs automatically.\n\nSpecifically, this Tune example finds the best possible\
    \ choices of parameters x and y for a training_function with a given objective\
    \ we want to minimize. Even though the objective function might look a little\
    \ intimidating at first, since we compute the sum of squares of x and y, all values\
    \ will be non-negative. That means the smallest value is obtained at x=0 and y=0,\
    \ which evaluates the objective function to 0.\n\nWe do a so-called grid search\
    \ over all possible parameter combinations. As we explicitly pass in 5 possible\
    \ values for both x and y, that's a total of 25 combinations that get fed into\
    \ the training function. Since we instruct training_function to sleep for 10 seconds,\
    \ testing all combinations of hyperparameters sequentially would take more than\
    \ 4 minutes total. Since Ray is smart about parallelizing this workload, this\
    \ whole experiment took only about 35 seconds for us, but it might take much longer,\
    \ depending on where you run it.\n\nNow, imagine each training run would have\
    \ taken several hours, and we'd have 20 instead of 2 hyperparameters. That makes\
    \ grid search infeasible, especially if you don't have educated guesses on the\
    \ parameter range. In such situations you'll have to use more elaborate HPO methods\
    \ from Ray Tune, as discussed in Chapter 5."
  mdcn: "## 使用 Ray Train 进行分布式训练\n\nRay RLlib 专注于强化学习，但如果你需要为其他类型的机器学习（如监督学习）训练模型该怎么办？在这种情况下，你可以使用另一个\
    \ Ray 库进行分布式训练：Ray Train。目前，我们对 TensorFlow 等框架的了解还不够深入，无法为你提供一个简洁且信息丰富的 Ray Train\
    \ 示例。如果你对分布式训练感兴趣，可以跳到第 6 章。\n\n## 超参数调优\n\n命名事物很难，但 *Ray Tune*（你可以用它来调整各种参数）正中下怀。它专门为寻找机器学习模型的良好超参数而构建。典型的设置如下：\n\
    \n- 你想运行一个计算成本极高的训练函数。在机器学习中，运行需要数天甚至数周的训练过程并不少见，但假设你处理的只是几分钟。\n- 作为训练的结果，你需要计算一个所谓的**目标函数**。通常，你希望根据实验的性能最大化收益或最小化损失。\n\
    - 棘手的是，你的训练函数可能依赖于某些参数，称为**超参数**，这些参数会影响目标函数的值。\n- 你可能对各个超参数应该是什么有一个直觉，但调整它们可能很困难。即使你可以将这些参数限制在合理的范围内，测试广泛的组合通常也是不可行的。你的训练函数成本太高了。\n\
    \n你能做些什么来高效地采样超参数并获得“足够好”的目标结果？解决这个问题的领域称为 *超参数优化*（HPO），Ray Tune 拥有一套庞大的算法来解决它。让我们看一个\
    \ Ray Tune 用于我们刚才解释的情况的例子。重点再次放在 Ray 及其 API 上，而不是特定的机器学习任务（我们目前只是模拟）：\n\n```python\n\
    from ray import tune\nimport math\nimport time\n\ndef training_function(config):\
    \  # ❶\n    x, y = config[\"x\"], config[\"y\"]\n    time.sleep(10)\n    score\
    \ = objective(x, y)\n    tune.report(score=score)  # ❷\n\ndef objective(x, y):\n\
    \    return math.sqrt((x**2 + y**2)/2)  # ❸\n\nresult = tune.run(  # ❹\n    training_function,\n\
    \    config={\n        \"x\": tune.grid_search([-1, -.5, 0, .5, 1]),  # ❺\n  \
    \      \"y\": tune.grid_search([-1, -.5, 0, .5, 1])\n    })\n\nprint(result.get_best_config(metric=\"\
    score\", mode=\"min\"))\n```\n\n1. 模拟一个依赖于两个超参数 x 和 y 的昂贵训练函数，从配置中读取。\n2. 在休眠\
    \ 10 秒以模拟训练并计算目标后，将分数报告给 tune。\n3. 目标函数计算 x 和 y 的平方和的平均值，并返回该项的平方根。这种类型的目标在机器学习中相当常见。\n\
    4. 使用 tune.run 在我们的 training_function 上初始化超参数优化。\n5. 一个关键部分是为 x 和 y 提供一个参数空间供\
    \ tune 搜索。\n\n注意这次运行的输出在结构上与你在 RLlib 示例中看到的相似。这并非巧合，因为 RLlib（以及许多其他 Ray 库）在底层使用了\
    \ Ray Tune。如果你仔细观察，你会看到 PENDING（等待执行）、RUNNING（运行中）和 TERMINATED（已终止）的运行。Tune 会自动负责选择、调度和执行你的训练运行。\n\
    \n具体来说，这个 Tune 示例为具有给定目标（我们希望最小化）的 training_function 找到了参数 x 和 y 的最佳选择。尽管目标函数起初可能看起来有点令人生畏，因为我们计算\
    \ x 和 y 的平方和，但所有值都是非负的。这意味着最小值在 x=0 和 y=0 处获得，此时目标函数的值为 0。\n\n我们对所有可能的参数组合进行了所谓的网格搜索。由于我们明确地为\
    \ x 和 y 传递了 5 个可能的值，因此总共有 25 种组合被输入到训练函数中。由于我们指示 training_function 休眠 10 秒，顺序测试所有超参数组合总共需要超过\
    \ 4 分钟。由于 Ray 在并行化此工作负载方面很智能，对我们来说整个实验只花了大约 35 秒，但根据你运行它的位置，可能需要更长时间。\n\n现在，想象一下每次训练运行需要几个小时，并且我们有\
    \ 20 个而不是 2 个超参数。这使得网格搜索变得不可行，特别是如果你对参数范围没有合理的猜测。在这种情况下，你将不得不使用 Ray Tune 中更复杂的\
    \ HPO 方法，如第 5 章所述。"

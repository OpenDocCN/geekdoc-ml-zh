    \ of the full dataset, run it through the local copy of the model, and perform\
    \ backpropagation to update the model weights. After each epoch, the worker will\
    \ use Ray Train utilities to report the result and save the current model weights\
    \ for use later:\n\n```\nfrom ray.air import session\nfrom ray.air.config import\
    \ ScalingConfig\nimport ray.train as train\nfrom ray.train.torch import TorchCheckpoint,\
    \ TorchTrainer\n\ndef train_loop_per_worker(config: dict):\n    batch_size = config.get(\"\
    batch_size\", 32)\n    lr = config.get(\"lr\", 1e-2)\n    num_epochs = config.get(\"\
    num_epochs\", 3)\n\n    dataset_shard = session.get_dataset_shard(\"train\")\n\
    \n    model = FarePredictor()\n    dist_model = train.torch.prepare_model(model)\n\
    \n    loss_function = nn.SmoothL1Loss()\n    optimizer = torch.optim.Adam(dist_model.parameters(),\
    \ lr=lr)\n\n    for epoch in range(num_epochs):\n        loss = 0\n        num_batches\
    \ = 0\n        for batch in dataset_shard.iter_torch_batches(\n            batch_size=batch_size,\
    \ dtypes=torch.float\n        ):\n            labels = torch.unsqueeze(batch[LABEL_COLUMN],\
    \ dim=1)\n            inputs = torch.cat(\n                [torch.unsqueeze(batch[f],\
    \ dim=1) for f in FEATURE_COLUMNS],\n                dim=1\n            )\n  \
    \          output = dist_model(inputs)\n            batch_loss = loss_function(output,\
    \ labels)\n            optimizer.zero_grad()\n            batch_loss.backward()\n\
    \            optimizer.step()\n\n            num_batches += 1\n            loss\
    \ += batch_loss.item()\n\n        session.report(\n            {\"epoch\": epoch,\
    \ \"loss\": loss},\n            checkpoint=TorchCheckpoint.from_model(dist_model)\n\
    \        )\n```"

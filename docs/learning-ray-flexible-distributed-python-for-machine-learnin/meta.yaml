    \ argument `num_episodes` in the `train_policy` function, rather than `num_games`.\n\
    \n> ## Q-Learning\n\nThe Q-Learning algorithm we just implemented is often the\
    \ first algorithm taught in RL classes, mostly because it is relatively easy to\
    \ reason with. You collect and tabulate experience data that shows you how well\
    \ state-action pairs work, and then you update the table according to the Q-Learning\
    \ update rule.\n\nFor RL problems that have a huge number of either states or\
    \ actions, the Q-table can become excessively large. The algorithm then becomes\
    \ inefficient, because it would take too much time to collect enough experience\
    \ data for all (relevant) state-action pairs.\n\nOne way to address this issue\
    \ is to use a neural network to approximate the Q-table. By this we mean that\
    \ you can employ a deep neural network to learn a function that maps states to\
    \ actions. This approach is called Deep Q-Learning, and the networks used for\
    \ learning are called Deep Q-Networks (DQN). From Chapter 4 on, we will exclusively\
    \ use deep learning to tackle RL problems in this book.\n\nNow that we have a\

    \ words, the driver owns `task`, `val`, and `res` according to Ray’s ownership\
    \ definition. In contrast, `res` depends on `task`, but there’s no ownership relationship\
    \ between the two. When `task` gets called, it takes `val` as a dependency. It\
    \ then calls `task_owned` and assigns `res_owned` and hence owns them both. Lastly,\
    \ `task_owned` itself does not own anything, but certainly `res_owned` depends\
    \ on it. Figure 2-2 sums up this discussion about worker nodes, showing all involved\
    \ components.\n\n![Figure 2-2. The system components comprising a Ray worker node](img/6489687a3a178f2884963bddc928992c_59_0.png)\n\
    \n¹³ This is an extremely limited description of how Ray handles failures in general.\

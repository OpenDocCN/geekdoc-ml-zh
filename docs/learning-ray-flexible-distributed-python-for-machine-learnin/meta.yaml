  mdcn: "这个示例实际上是 Ray Serve 的“hello world”：我们通过一个基本的 HTTP 端点部署了一个单一模型。但请注意，我们不得不手动解析输入的\
    \ HTTP 请求并将其传递给模型。对于这个基础示例来说，这只是一行代码，但现实世界的应用程序通常接受更复杂的输入模式，而手写 HTTP 逻辑可能既繁琐又容易出错。为了能够编写更具表现力的\
    \ HTTP API，Serve 集成了 [FastAPI Python 框架](https://fastapi.tiangolo.com/)。²\n\n\
    一个 Serve 部署可以包装一个 FastAPI 应用，利用其富有表现力的 API 来解析输入和配置 HTTP 行为。在下面的示例中，我们依赖 FastAPI\

  md: '# Speed and scalability


    Another of Ray’s design principles is the speed at which Ray executes its tasks.
    It can handle millions of tasks per second, and you incur very low latencies with
    it. Ray is built to execute its tasks with just milliseconds of latency.


    For a distributed system to be fast, it also needs to scale well. Ray is efficient
    at distributing and scheduling your tasks across your compute cluster. And it
    does so in a fault-tolerant way, too. As you’ll learn in detail in Chapter 9,
    Ray Clusters support *autoscaling* to support highly elastic workloads. Ray’s
    autoscaler tries to launch or stop machines in your cluster to match the current
    demand. This helps both to minimize costs and to ensure that your cluster has
    enough resources to run your workload.


    In distributed systems, it’s not a question of if, but when, things will go wrong.
    A machine might have an outage, abort a task, or simply go up in flames.⁵ In any
    case, Ray is built to recover quickly from failures, which contributes to its
    overall speed.


    As we haven’t talked about Ray’s architecture (Chapter 2 will introduce you to
    it), we can’t tell you how these design principles are realized just yet. Let’s
    instead shift our attention to what Ray can do for you in practice.


    # Three Layers: Core, Libraries, and Ecosystem


    Now that you know why Ray was built and what its creators had in mind, let’s look
    at the three layers of Ray. This presentation is not the only way to slice it,
    but it’s the way that makes most sense for this book:


    +   - A low-level, distributed computing framework for Python with a concise core
    API and tooling for cluster deployment called Ray Core.⁶

    - A set of high-level libraries built and maintained by the creators of Ray. This
    includes the so-called Ray AIR to use these libraries with a unified API in common
    machine learning workloads.

    - A growing ecosystem of integrations and partnerships with other notable projects
    that span many aspects of the first two layers.


    There’s a lot to unpack here, and we’ll look into each of these layers individually
    in the remainder of this chapter.


    > 5 This might sound drastic, but it’s not a joke. To name just one example, in
    March 2021 a French datacenter powering millions of websites burned down completely.
    If your whole cluster burns down, we’re afraid Ray can’t help you.


    6 This is a Python book, so we’ll exclusively focus on Python, but you should
    know that Ray also has a Java API, which is less mature than its Python equivalent
    at this point.'

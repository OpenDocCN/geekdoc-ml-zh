    Cluster.


    We chose the combination of Keras and Hyperopt as example of using Tune with an
    advanced ML framework and a third-party HPO library. But we could have chosen
    any other machine learning library and practically any other HPO library supported
    by Tune. If you''re interested in diving deeper into any of the many integrations
    Tune has to offer, check out the [Ray Tune documentation examples](https://docs.ray.io/en/latest/tune/examples.html).


    ## Summary


    Tune is arguably one of the most versatile HPO tools you can choose today. It''s
    feature-rich, offering many search algorithms, advanced schedulers, complex search
    spaces, custom stoppers, and many other features that we couldn''t cover in this
    chapter. Also, it seamlessly integrates with most notable HPO tools, such as Optuna
    or Hyperopt, making it easy to migrate from these tools or simply leverage their
    features through Tune. You can view Ray Tune as a flexible, distributed HPO framework
    that *extends* others that might work only on single machines.


    # CHAPTER 6


    ## Data Processing with Ray


    Edward Oakes


    In Chapter 5 you learned how to tune hyperparameters for your machine learning
    experiments. Of course, the key component to applying machine learning in practice
    is data. In this chapter we’ll explore the core set of data processing capabilities
    on Ray: Ray Data.


    While not meant to replace more general data processing systems such as Apache
    Spark or Apache Hadoop, Ray Data offers basic data processing capabilities and
    a standard way to load, transform, and pass data to different parts of a Ray application.
    This enables an ecosystem of libraries on Ray to speak the same language so users
    can mix and match functionality in a framework-agnostic way to meet their needs.


    The central component of the Ray Data ecosystem, Ray Datasets, offers the core
    abstractions for loading, transforming, and passing references to data in a Ray
    Cluster. Datasets are the “glue” that enables different libraries to interoperate
    on top of Ray. You’ll see this in action in “External Library Integrations” on
    page 134, where we show how you can do dataframe processing using the full expressiveness
    of the Dask API using Dask on Ray and transform the result into a dataset. The
    main benefits of Ray Datasets are:


    - Flexibility

    It supports a wide range of data formats, work seamlessly with library integrations
    like Dask on Ray, and can be passed between Ray tasks and actors without copying
    data.


    - Performance for ML workloads

    It offers important features like accelerator support, pipelining, and global
    random shuffles that accelerate ML training and inference workloads.


    This chapter will familiarize you with the core concepts for doing data processing
    on Ray and help you understand how to accomplish common patterns as well as why
    you would choose to use different pieces to accomplish a task. We assume a basic
    familiarity with data processing concepts such as `map`, `filter`, `groupby`,
    and `partition`, but it’s not intended to be a tutorial on data science in general
    or a deep dive into the internals of how these operations are implemented. Readers
    with a limited data science background should not have a problem following along.


    We’ll start introducing the core building block: Ray Datasets. This will cover
    the architecture, basics of the API, and an example of how Ray Datasets can enable
    building complex data-intensive applications. Then, we’ll briefly cover external
    library integrations on Ray, focusing on Dask on Ray. Finally, we’ll bring it
    all together by building a scalable end-to-end machine learning pipeline in a
    single Python script.


    ![](img/6489687a3a178f2884963bddc928992c_143_0.png)


    The notebook for this chapter is available [on GitHub](https://github.com) along
    with the [data used in the end-to-end example](https://github.com).


    ## Ray Datasets


    The main goal of Ray Datasets is to support a scalable, flexible abstraction for
    data processing on Ray. Datasets are intended to be the standard way to read,
    write, and transfer data across the full ecosystem of Ray libraries. One of the
    most powerful uses of Ray Datasets is acting as the data ingest and preprocessing
    layer for machine learning workloads, allowing you to efficiently scale up training
    using Ray Train and Ray Tune. We explore this in more detail in “Building an ML
    Pipeline” on page 136.


    If you’ve worked with other distributed data processing APIs such as Apache Spark’s
    Resilient Distributed Datasets in the past, the Ray Datasets API will be very
    familiar. The core of the API leans on functional programming and offers standard
    functionality such as reading and writing different data sources; performing basic
    transformations like `map`, `filter`, and `sort`; and performing some simple aggregations
    such as `groupby`.


    Under the hood, Ray Datasets implements distributed [Apache Arrow](https://arrow.apache.org/).
    Apache Arrow is a unified columnar data format for data processing libraries and
    applications. Integrating with Apache Arrow means that Datasets get interoperability
    with many of the most popular processing libraries, such as NumPy and Pandas,
    out of the box.


    A Ray Dataset consists of a list of Ray object references, each of which points
    at a “block” of data. These blocks are either Arrow tables or Python lists (for
    data that isn’t supported by the Arrow format) in Ray’s shared memory object store,
    and the compute over the data such as for map or filter operations happens in
    Ray tasks (and sometimes actors).


    Because Ray Datasets relies on the core Ray primitives of tasks and objects in
    the shared memory object store, it inherits key benefits of Ray: scalability to
    hundreds of nodes, efficient memory usage due to sharing memory across processes
    on the same node, as well as object spilling and recovery to gracefully handle
    failures. Additionally, because Datasets are just lists of object references,
    they can also be passed between tasks and actors efficiently without needing to
    make a copy of the data, which is crucial for making data-intensive applications
    and libraries scalable.


    ## Ray Datasets Basics


    This section will give an overview of Ray Datasets, covering how to get started
    reading, writing, and transforming datasets. This is not a comprehensive reference
    but rather an introduction to the basic concepts so we can build up to some interesting
    examples later, showing what makes Ray Datasets powerful. For up-to-date information
    on what’s supported and exact syntax, see the [Ray Datasets documentation](https://docs.ray.io/en/latest/data/dataset.html).


    To follow along with the examples in this section, make sure Ray Datasets is installed
    locally:


    ```

    pip install "ray[data]==2.2.0"

    ```


    ### Creating a Ray Dataset


    First, let’s create a simple Dataset and perform some basic operations on it:


    ```

    import ray


    # Create a dataset containing integers in the range [0, 10000).

    ds = ray.data.range(10000)


    # Basic operations: show the size of the dataset, get a few samples,

    # print the schema.

    print(ds.count())  # -> 10000

    print(ds.take(5))  # -> [0, 1, 2, 3, 4]

    print(ds.schema())  # -> <class ''int''>

    ```


    Here we created a Dataset containing the numbers from 0 to 10,000 and then printed
    some basic information about it: the total number of records, a few samples, and
    the schema.


    ### Reading from and writing to storage


    Of course, for real workloads you’ll often want to read from and write to persistent
    storage to load your data and write the results. Writing and reading Ray Datasets
    is simple; for example, to write a Dataset to a CSV file and then load it back
    into memory, we just need to use the built-in `write_csv` and `read_csv` utilities:


    ```

    # Save the dataset to a local file and load it back.

    ray.data.range(10000).write_csv("local_dir")

    ds = ray.data.read_csv("local_dir")

    print(ds.count())

    ```


    Datasets supports a number of common serialization formats such as CSV, JSON,
    and Parquet and can read from or write to local disk as well as remote storage
    like HDFS or AWS S3.


    In the preceding example, we provided just a local file path ("local_dir") so
    the dataset was written to a directory on the local machine. If we wanted to write
    to and read from S3 instead, we would provide a path like "s3://my_bucket/" and
    Datasets would automatically handle efficiently reading and writing remote storage,
    parallelizing the requests across many tasks to improve throughput.


    Note that Ray Datasets also supports custom data sources that you can use to write
    to any external data storage system that isn''t supported out of the box.


    ### Built-in transformations


    Now that we understand the basic APIs around how to create and inspect Datasets,
    let''s take a look at some of the built-in operations we can do on them. The following
    code sample shows three basic operations that Ray Datasets supports:


    ```

    ds1 = ray.data.range(10000)

    ds2 = ray.data.range(10000)

    ds3 = ds1.union(ds2) ①

    print(ds3.count())  # -> 20000


    # Filter the combined dataset to only the even elements.

    ds3 = ds3.filter(lambda x: x % 2 == 0) ②

    print(ds3.count())  # -> 10000

    print(ds3.take(5))  # -> [0, 2, 4, 6, 8]


    # Sort the filtered dataset.

    ds3 = ds3.sort() ③

    print(ds3.take(5))  # -> [0, 0, 2, 2, 4]

    ```


    - ① union two Datasets together. The result is a new Dataset that contains all
    the records of both.

    - ② filter the elements of a Dataset to include only even integers by providing
    a custom filter function.


    > 1 If you''re interested in following an example that reads actual data from
    an S3 bucket, see the Batch Inference example in Ray''s documentation.'

  md: '# CHAPTER 8


    # Online Inference with Ray Serve


    Edward Oakes


    In Chapters 6 and 7 you learned how to use Ray to process data, train ML models,
    and apply them in a batch inference setting. However, many of the most exciting
    use cases for machine learning involve *online inference*.


    Online inference is the process of using ML models to enhance API endpoints that
    users interact with directly or indirectly. This is important in situations where
    latency matters: you can''t simply apply models to data behind the scenes and
    serve the results. There are many real-world examples of use cases where online
    inference can provide a lot of value, for example:


    *Recommendation systems*

    Providing recommendations for products (e.g., online shopping) or content (e.g.,
    social media) is a bread-and-butter use case for machine learning. While it''s
    possible to do this offline, recommendation systems often benefit from reacting
    to users'' preferences in real time. This requires performing online inference
    using recent behavior as a key feature.


    *Chat bots*

    Online services often have real-time chat windows to provide support to customers
    from the comfort of their keyboard. Traditionally, these chat windows were staffed
    by customer support staff, but a recent trend to reduce labor costs and improve
    time-to-resolution is replacing them with ML-powered chat bots that can be online
    24/7. These chat bots require a sophisticated mix of multiple machine learning
    techniques and must be able to respond to customer input in real time.'
  merge: -1
  pgno: 178
- img_proc: true
  md: 'Estimating arrival times

    Ride sharing, navigation, and food delivery services all rely on being able to
    provide an accurate estimate of arrival times (e.g., for your driver, yourself,
    or your dinner). Providing accurate estimates is very difficult because it requires
    accounting for real-world factors such as traffic patterns, weather, and accidents.
    Estimates are also refreshed many times over the course of one trip.


    These are just a few examples of how applying machine learning in an online setting
    can provide a lot of value in application domains that are traditionally very
    difficult (imagine writing logic by hand to estimate arrival times!). The list
    of applications goes on: a number of nascent domains such as self-driving cars,
    robotics, and video-processing pipelines are also being redefined by machine learning.


    All these applications share one crucial requirement: latency. In the case of
    online services, low latency is paramount for providing a good user experience.
    For applications that interact with the real world (such as robotics or self-driving
    cars), higher latency can have even stronger implications for safety or accuracy.


    This chapter will provide a gentle introduction to Ray Serve, a Ray-native library
    that enables building online inference applications on top of Ray. First, we will
    discuss the challenges of online inference that Ray Serve addresses. Then, we''ll
    cover the architecture of Ray Serve and introduce its core functionality. Finally,
    we will use Ray Serve to build an end-to-end online inference API consisting of
    multiple natural language processing models. You can follow along with the code
    [in the notebook for this chapter](#).


    # Key Characteristics of Online Inference


    In the previous section we discussed that the main goal of online inference is
    to interact with ML models with low latency. However, this has long been a key
    requirement for API backends and web servers, so a natural question is: what''s
    different about serving ML models?


    # ML Models Are Compute Intensive


    Many of the challenges in online inference are a result of one key characteristic:
    ML models are very compute intensive. Compared to traditional web serving where
    requests are primarily handled by I/O-intensive database queries or other API
    calls, most ML models boil down to performing many linear algebra computations:
    provide a recommendation, estimate an arrival time, or detect an object in an
    image. This is especially true for the recent trend of “deep learning,” which
    is an arm of ML characterized by neural networks that are growing larger over
    time. Often, deep learning models can also benefit significantly from using specialized
    hardware'
  merge: -1
  pgno: 179
- img_proc: true
  md: 'such as GPUs or TPUs, which have special-purpose instructions optimized for
    ML computations and enable vectorized computations across multiple inputs in parallel.


    Many online inference applications must be run 24/7. When combined with the fact
    that ML models are compute intensive, operating online inference services can
    be very expensive, requiring allocation of many CPUs and GPUs at all times. The
    primary challenges of online inference boil down to serving models in a way that
    minimizes end-to-end latency while also reducing cost. Key properties that online
    inference systems provide to satisfy these requirements include:


    +   - Support for specialized hardware such as GPUs and TPUs.

    - The ability to scale the resources used for a model up and down in response
    to request load.

    - Support for request batching to take advantage of vectorized computations.


    # ML Models Aren’t Useful in Isolation


    Often when ML is discussed in the academic or research setting, the focus is on
    an individual, isolated task such as object recognition or classification. However,
    real-world applications are not usually so clear cut and well defined. Instead,
    a combination of multiple ML models and business logic is required to solve a
    problem from end to end. For example, consider a product recommendation use case.
    While we could apply a multitude of known ML techniques to the core problem of
    making a recommendation, a lot of equally important challenges exist around the
    edges, many of which will be specific to each use case:


    +   - Validating inputs and outputs to ensure the result returned to the user
    makes sense semantically. Often, we may have some manual rules such as avoiding
    returning the same recommendation to a user multiple times in succession.

    - Fetching up-to-date information about the user and available products and converting
    it into features for the model (in some cases, this may be performed by an online
    feature store).

    - Combining the results of multiple models using manual rules such as filtering
    the top results or selecting the model with highest confidence.


    Implementing an online inference API requires the ability to integrate all of
    these pieces into one unified service. Therefore, it’s important to have the flexibility
    to compose multiple models along with custom business logic. These pieces can’t
    be viewed in isolation: the “glue” logic often needs to evolve alongside the models
    themselves.'

    \n在过去的十年里，机器学习和数据应用的计算需求已经远远超出了单台服务器或单个处理器（包括 GPU 和 TPU 等硬件加速器）的能力。这一趋势使我们别无选择，只能将这些应用分布式化。不幸的是，构建这样的分布式应用是出了名的困难。\n\
    \n在过去的几年里，Ray 已经成为简化此类应用开发的首选框架。Ray 包括一个灵活的核心和一组强大的库，使开发人员能够轻松扩展各种工作负载，包括训练、超参数调优、强化学习、模型服务和非结构化数据的批处理。Ray\
    \ 是最受欢迎的开源项目之一，已被数千家公司用于实现从机器学习平台到推荐系统、欺诈检测以及训练一些最大模型（包括 Open AI 的 ChatGPT）的一切。\n\
    \n在本书中，Max Pumperla、Edward Oakes 和 Richard Liaw 出色地完成了任务，他们使用易于理解的示例，对 Ray 及其库进行了温和而全面的介绍。在本书结束时，你将掌握\
    \ Ray 中的关键概念和抽象，并能够从你的笔记本电脑开发并快速扩展端到端的机器学习应用到大型本地集群或云端。\n\n> — Ion Stoica\n> Anyscale\
    \ 和 Databricks 联合创始人，\n> 加州大学伯克利分校教授\n> 2023 年 1 月\n\n# 序言\n\n分布式计算是一个引人入胜的话题。回顾计算的早期，人们不禁会对今天如此多的公司将其工作负载分布在计算机集群上这一事实印象深刻。我们已经找到了高效的方法来做到这一点，这令人印象深刻，但横向扩展也变得越来越必要。单个计算机的速度越来越快，然而我们对大规模计算的需求却不断超过单台机器所能提供的能力。\n\
    \n认识到扩展既是必要也是挑战，Ray 旨在让分布式计算对开发人员来说变得简单。它使非专家也能使用分布式计算，并使你能够相当容易地将 Python 脚本扩展到多个节点。Ray\
    \ 擅长扩展*数据密集型和计算密集型工作负载*，例如数据预处理和模型训练——并且它明确针对需要扩展的机器学习工作负载。虽然今天可以在没有 Ray 的情况下扩展这两种类型的工作负载，但你可能需要为每种工作负载使用不同的\
    \ API 和分布式系统。管理多个分布式系统可能在许多方面既混乱又低效。\n\n随着 2022 年 8 月 Ray 2.0 的发布，Ray AI Runtime\
    \ 的加入进一步增强了 Ray 对复杂 ML 工作负载的支持。AIR 是一组库和工具的集合，可以轻松地在单个分布式系统中构建和部署端到端的 ML 应用。借助\
    \ AIR，即使是最复杂的工作流通常也可以表示为*单个 Python 脚本*。这意味着你可以先在本地运行程序，这在调试和开发速度方面可以产生很大的不同。\n\
    \n数据科学家从 Ray 中受益，因为他们可以依赖不断增长的 Ray ML 库和第三方集成生态系统。Ray AIR 帮助你快速原型化想法，并更容易地从开发过渡到生产。与许多其他分布式系统不同，Ray\
    \ 还原生支持 GPU，这对于 ML 工程师等角色可能特别重要。为了支持数据工程师，Ray 还与 Kubernetes 等工具紧密集成，并且可以在多云设置中部署。\n\
    \n你可以将其用作统一的计算层，为你的工作负载提供扩展、容错、调度和编排。换句话说，对于各种角色来说，投入*学习 Ray*是非常值得的。\n\n## 谁应该阅读本书\n\
    \n你拿起本书很可能是因为你对 Ray 的某些方面感兴趣。也许你是一名分布式系统工程师，想了解 Ray 引擎的工作原理。你也可能是一名对学习新技术感兴趣的软件开发人员。或者你可能是一名数据工程师，想要评估\
    \ Ray 与类似工具的比较。你也可能是一名机器学习从业者或数据科学家，需要找到扩展实验的方法。\n\n无论你的具体角色是什么，要充分利用本书，共同点是能够熟练地使用\
    \ Python 编程。本书的示例是用 Python 编写的，需要具备该语言的中级知识。正如你作为 Python 开发者所深知的那样，明确胜于隐含。所以，让我们明确地说，了解\
    \ Python 意味着你知道如何在系统上使用命令行，如何在遇到困难时获得帮助，以及如何自己设置编程环境。\n\n如果你以前从未使用过分布式系统，那也没关系。我们在书中涵盖了你开始使用所需的所有基础知识。除此之外，你可以在笔记本电脑上运行这里介绍的大多数代码示例。涵盖基础知识意味着我们无法对分布式系统进行过于详细的介绍。本书最终专注于使用\
    \ Ray 的应用程序开发人员，特别是数据科学和 ML。\n\n对于本书的后续章节，你需要对 ML 有一定的熟悉程度，但我们不期望你在这个领域工作过。特别是，你应该对\
    \ ML 范式及其与传统编程的区别有基本的了解。你还应该知道使用 NumPy 和 Pandas 的基础知识。此外，你应该至少能够*阅读*使用流行的 TensorFlow\
    \ 和 PyTorch 库的示例。在 API 层面，能够理解代码流程就足够了，但你不需要知道如何编写自己的模型。我们涵盖了使用两种主流深度学习库（TensorFlow\
    \ 和 PyTorch）的示例，以说明无论你偏好哪种框架，都可以如何使用 Ray 进行 ML 工作负载。\n\n我们在高级 ML 主题上涵盖了很多内容，但主要焦点是\
    \ Ray 作为一种技术以及如何使用它。我们讨论的 ML 示例对你来说可能是新的，可能需要再次阅读，但你仍然可以专注于 Ray 的 API 以及如何在实践中使用它。了解了这些要求，以下是你可能从本书中获得的内容："

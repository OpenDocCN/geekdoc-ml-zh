- md: "## Systems Related to Ray\n\nWith the architecture and functionality of it\
    \ in mind, how does Ray relate to other systems? Here are the basics:\n\n- Ray\
    \ can be used as a parallelization framework for Python and shares properties\
    \ with tools like celery or multiprocessing. In fact, there's a drop-in replacement\
    \ for the latter implemented in Ray.\n- Ray is also related to data processing\
    \ frameworks such as Spark, Dask, Flink, and MARS. We'll explore these relationships\
    \ in Chapter 11, when talking about Ray's ecosystem.\n- As a distributed computing\
    \ tool, Ray also deals with the problems of cluster management and orchestration,\
    \ and we'll see how Ray does that in relation to tools like Kubernetes in Chapter\
    \ 9.\n- Since Ray is implementing the actor model of concurrency, it's also interesting\
    \ to explore its relationship with frameworks like Akka.\n- Lastly, since Ray\
    \ banks on a performant, low-level API for communication, there's a certain relationship\
    \ with high-performance computing (HPC) frameworks and communication protocols\
    \ like the message passing interface (MPI).\n\n## A Simple MapReduce Example with\
    \ Ray\n\nWe can't let you go without discussing an example of one of the most\
    \ important milestones in distributed computing in recent decades, namely, *MapReduce*.\
    \ Many successful big data technologies like Hadoop are based on this programming\
    \ model, and it's worth revisiting in the context of Ray. To keep things simple,\
    \ we'll restrict our MapReduce implementation to a single use case, the task of\
    \ counting word occurrences across several documents. This is an almost trivial\
    \ task in single processing, but it becomes an interesting challenge once a massive\
    \ corpus of documents is involved and you need multiple compute nodes to crunch\
    \ the numbers.\n\nImplementing a MapReduce word-count example might be the most\
    \ well-known example we have in distributed computing,¹⁵ so it's worth knowing.\
    \ If you don't know about this classic paradigm, it's based on three straightforward\
    \ steps:\n\n1. Take a set of documents and transform or “map” its elements (for\
    \ instance the words contained in them) according to a function you provide. This\
    \ *map phase* produces key-value pairs by design, in which a *key* represents\
    \ a document element and a *value* is simply a metric you want to compute for\
    \ that element.\n\n¹⁵ It's a *drosophila melanogaster* of sorts, not unlike computing\
    \ a classifier on the ubiquitous MNIST dataset.\n\nSince we're interested in counting\
    \ words, whenever we encounter a word in a document, our *map function* will simply\
    \ emit the pair (word, 1) to indicate that we found one occurrence of it.\n\n\
    2. Collect and group all the outputs of the map phase according to their key.\
    \ Since we work in a distributed setup and the same key might be present on several\
    \ compute nodes, this might require shuffling of data between nodes. For that\
    \ reason this step is often referred to as the *shuffle phase*.<sup>16</sup> To\
    \ give you an idea of what grouping might mean in our concrete use case, let's\
    \ say we have a total of four (word, 1) occurrences produced in the map phase.\
    \ The shuffle would then co-locate all occurrences of the same word on the same\
    \ node.\n\n3. Aggregate or “reduce” the elements from the shuffle step, which\
    \ is why we refer to it as the *reduce phase*. Continuing with the example we\
    \ laid out, we simply sum up all word occurrences on each node to get the final\
    \ count. For instance, four occurrences of (word, 1) would be reduced to word:\
    \ 4.\n\nEvidently, MapReduce gets its name from the first and last of these three\
    \ phases, but the second one is arguably just as important. While schematically\
    \ these phases may look simple, their power lies in the fact that they can be\
    \ massively parallelized across hundreds of machines.\n\nIn Figure 2-4 we illustrate\
    \ an example of applying the three MapReduce phases to a corpus of documents that\
    \ has been distributed across three partitions. To run MapReduce on a distributed\
    \ corpus of documents, we first map each document to a set of key-value pairs,\
    \ then shuffle the results to ensure that all key-value pairs with the same key\
    \ are on the same node, and finally reduce the key-value pairs to compute the\
    \ final word counts.\n\nLet's implement the MapReduce algorithm for our word-count\
    \ use case in Python and parallelize the computation using Ray. First, load example\
    \ data so that you get a better idea of what we're operating on:\n\n```python\n\
    import subprocess\nzen_of_python = subprocess.check_output([\"python\", \"-c\"\
    , \"import this\"])\ncorpus = zen_of_python.split() ❶\n\nnum_partitions = 3\n\
    chunk = len(corpus) // num_partitions\npartitions = [ ❷\n    corpus[i * chunk:\
    \ (i + 1) * chunk] for i in range(num_partitions)\n]\n```\n\n<sup>16</sup> In\
    \ general, a shuffle is any operation that requires redistributing data across\
    \ its partitions. Shuffles can be quite costly. If your map phase operates on\
    \ *N* partitions, it will produce *N* × *N* results that need to be shuffled.\n\
    \n1. Our text corpus is the content of the Zen of Python.\n2. Split the corpus\
    \ into three partitions.\n\n![](img/6489687a3a178f2884963bddc928992c_64_0.png)\n\
    \nThe data we're using is the so-called Zen of Python, a small set of guidelines\
    \ by the Python community. The Zen is hidden in an “Easter egg” and gets printed\
    \ when you type `import this` in a Python session. It's worth reading these guidelines\
    \ as a Python programmer, but for this exercise we're only interested in counting\
    \ the words they contain. Put simply, we load the Zen of Python, treat each line\
    \ as a separate “document,” and split it into three partitions.\n\nTo start our\
    \ implementation of MapReduce, we'll first cover the map phase and discuss how\
    \ Ray can help us take care of shuffling the results.\n\n## Mapping and Shuffling\
    \ Document Data\n\nTo define the map phase, we need a map function that we apply\
    \ to each document. In our case, we want to emit the pair (word, 1) for each word\
    \ we find in a document. For simple text documents loaded as Python strings, it\
    \ looks like this:¹⁷\n\n> ¹⁷ Note the usage of yield in the map function. This\
    \ is the quickest way of building a generator with the data we need in Python.\
    \ You could also build and return a list of pairs, if that's clearer to you.\n\
    \n```python\ndef map_function(document):\n    for word in document.lower().split():\n\
    \        yield word, 1\n```\n\nNext, we want to apply this map function to a whole\
    \ corpus of documents. We do this by making the following apply_map function a\
    \ Ray task via the @ray.remote decorator. When we call apply_map, we'll apply\
    \ it to three partitions (num_partitions=3) of document data, just like we indicated\
    \ in Figure 2-4. Note that apply_map will return three lists, one for each partition.\
    \ As you will see in a moment, we do this so that Ray can automatically shuffle\
    \ the results of the map phase to the right nodes for us:\n\n```python\nimport\
    \ ray\n\n@ray.remote\ndef apply_map(corpus, num_partitions=3):\n    map_results\
    \ = [list() for _ in range(num_partitions)]\n    for document in corpus:\n   \
    \     for result in map_function(document):\n            first_letter = result[0].decode(\"\
    utf-8\")[0]\n            word_index = ord(first_letter) % num_partitions\n   \
    \         map_results[word_index].append(result)\n    return map_results\n```\n\
    \n1. The Ray task apply_map returns one result for each data partition.\n2. Assign\
    \ each (word, 1) pair to a partition by using the ord function to generate a word_index.\
    \ This ensures that each occurrence of a word gets shuffled to the same partition.\n\
    3. The pairs are then successively appended to the correct list.\n\nFor a text\
    \ corpus that can be loaded on a single machine, this is overkill, and we could\
    \ count the words instead. But in a distributed setting, in which we have to partition\
    \ the data across several nodes, this map phase makes perfect sense.\n\nTo apply\
    \ the map phase to our corpus of documents in parallel, we use a remote call on\
    \ apply_map as we've done many times before in this chapter. The notable difference\
    \ is that now we also instruct Ray to return three results (one for each partition)\
    \ via the num_returns argument:\n\n```python\nmap_results = [\n    apply_map.options(num_returns=num_partitions)\n\
    \    .remote(data, num_partitions)\n    for data in partitions\n]\n\nfor i in\
    \ range(num_partitions):\n    mapper_results = ray.get(map_results[i])\n```"
  mdcn: "## 与 Ray 相关的系统\n\n考虑到其架构和功能，Ray 与其他系统有何关联？以下是基础知识：\n\n-   Ray 可以用作 Python\
    \ 的并行化框架，并与 celery 或 multiprocessing 等工具共享特性。事实上，Ray 中实现了后者的直接替代品。\n-   Ray 也与\
    \ Spark、Dask、Flink 和 MARS 等数据处理框架相关。我们将在第 11 章讨论 Ray 的生态系统时探讨这些关系。\n-   作为分布式计算工具，Ray\
    \ 也处理集群管理和编排的问题，我们将在第 9 章看到 Ray 如何与 Kubernetes 等工具协同工作。\n-   由于 Ray 实现了并发的 actor\
    \ 模型，探索其与 Akka 等框架的关系也很有趣。\n-   最后，由于 Ray 依赖于高性能的底层通信 API，它与高性能计算（HPC）框架和通信协议（如消息传递接口（MPI））存在一定的关联。\n\
    \n## 使用 Ray 的简单 MapReduce 示例\n\n在结束之前，我们不能不讨论近几十年来分布式计算中最重要的里程碑之一，即 *MapReduce*\
    \ 的一个示例。许多成功的大数据技术（如 Hadoop）都基于这种编程模型，在 Ray 的背景下重新审视它很有价值。为简单起见，我们将 MapReduce\
    \ 实现限制在一个用例上：统计多个文档中的单词出现次数。在单处理中，这几乎是一个微不足道的任务，但当涉及大量文档语料库并且需要多个计算节点来处理数据时，它就变成了一个有趣的挑战。\n\
    \n实现 MapReduce 单词计数示例可能是我们分布式计算中已知最广泛的示例，¹⁵ 因此值得了解。如果你不了解这个经典范式，它基于三个简单的步骤：\n\n\
    1.  获取一组文档，并根据你提供的函数转换或“映射”其元素（例如其中包含的单词）。这个 *映射阶段* 按设计产生键值对，其中 *键* 代表文档元素，*值*\
    \ 只是你想为该元素计算的度量。\n\n¹⁵ 这有点像 *黑腹果蝇*，与在无处不在的 MNIST 数据集上计算分类器并无不同。\n\n由于我们感兴趣的是计算单词，因此每当我们在文档中遇到一个单词时，我们的\
    \ *映射函数* 将简单地发出对 (word, 1) 来表示我们找到了它的一个出现。\n\n2.  根据键收集和分组映射阶段的所有输出。由于我们在分布式环境中工作，并且相同的键可能存在于多个计算节点上，这可能需要在节点之间进行数据混洗。因此，此步骤通常被称为\
    \ *混洗阶段*。<sup>16</sup> 为了让你了解分组在我们的具体用例中可能意味着什么，假设我们在映射阶段总共产生了四个 (word, 1) 出现。混洗随后会将所有相同单词的出现放在同一个节点上。\n\
    \n3.  聚合或“归约”来自混洗步骤的元素，这就是为什么我们称其为 *归约阶段*。继续我们前面的例子，我们只需将每个节点上的所有单词出现次数相加，以获得最终计数。例如，四个\
    \ (word, 1) 的出现将被归约为 word: 4。\n\n显然，MapReduce 的名称来源于这三个阶段中的第一个和最后一个，但第二个阶段可以说同样重要。虽然从示意图上看这些阶段可能很简单，但它们的强大之处在于它们可以在数百台机器上大规模并行化。\n\
    \n在图 2-4 中，我们说明了将三个 MapReduce 阶段应用于分布在三个分区上的文档语料库的示例。要在分布式文档语料库上运行 MapReduce，我们首先将每个文档映射到一组键值对，然后混洗结果以确保所有具有相同键的键值对位于同一节点上，最后归约键值对以计算最终的单词计数。\n\
    \n让我们用 Python 为我们的单词计数用例实现 MapReduce 算法，并使用 Ray 并行化计算。首先，加载示例数据，以便你更好地了解我们正在处理的内容：\n\
    \n```python\nimport subprocess\nzen_of_python = subprocess.check_output([\"python\"\

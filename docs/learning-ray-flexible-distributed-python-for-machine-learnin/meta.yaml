    +   1. Simulate an expensive training function that depends on two hyperparameters,
    x and y, read from a config.

    2. After sleeping for 10 seconds to simulate training and computing the objective,
    the score is reported to tune.

    3. The objective computes the mean of the squares of x and y and returns the square
    root of this term. This type of objective is fairly common in ML.

    4. Use tune.run to initialize hyperparameter optimization on our training_function.

    5. A key part is to provide a parameter space for x and y for tune to search over.


    Notice how the output of this run is structurally similar to what you saw in the
    RLlib example. That''s no coincidence, as RLlib (like many other Ray libraries)
    uses Ray Tune under the hood. If you look closely, you will see PENDING runs that
    wait for execution, as well as RUNNING and TERMINATED runs. Tune takes care of
    selecting, scheduling, and executing your training runs automatically.


    Specifically, this Tune example finds the best possible choices of parameters
    x and y for a training_function with a given objective we want to minimize. Even
    though the objective function might look a little intimidating at first, since
    we compute the sum of squares of x and y, all values will be non-negative. That
    means the smallest value is obtained at x=0 and y=0, which evaluates the objective
    function to 0.


    We do a so-called grid search over all possible parameter combinations. As we
    explicitly pass in 5 possible values for both x and y, that''s a total of 25 combinations
    that get fed into the training function. Since we instruct training_function to
    sleep for 10 seconds, testing all combinations of hyperparameters sequentially
    would take more than 4 minutes total. Since Ray is smart about parallelizing this
    workload, this whole experiment took only about 35 seconds for us, but it might
    take much longer, depending on where you run it.


    Now, imagine each training run would have taken several hours, and we''d have
    20 instead of 2 hyperparameters. That makes grid search infeasible, especially
    if you don''t have educated guesses on the parameter range. In such situations
    you''ll have to use more elaborate HPO methods from Ray Tune, as discussed in
    Chapter 5.'

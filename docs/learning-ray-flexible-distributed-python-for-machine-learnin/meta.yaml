    \ Running on a CPU, this might be marginally faster than running sequentially,\
    \ but running the same handler on a GPU we would observe a significant speedup\
    \ for the batched version.\n\n# Multimodel Inference Graphs\n\nUp until now, we’ve\
    \ been deploying and querying a single Serve deployment wrapping one ML model.\
    \ As described earlier, ML models often are not useful in isolation: many applications\
    \ require multiple models to be composed together and for business logic to be\

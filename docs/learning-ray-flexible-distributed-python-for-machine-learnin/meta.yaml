  - "[PAGE 109]\n\n```\npython\ndef is_done(self, agent_id):\n    return self.agents[agent_id]\
    \ == self.goal\n```\n\nNext, to port the step method to our multi-agent setup,\
    \ you have to know that MultiAgentEnv now expects the action passed to a step\
    \ to be a dictionary with keys corresponding to the agent IDs, too. We define\
    \ a step by looping through all available agents and acting on their behalf:17\n\
    \n```\npython\ndef step(self, action): ①\n    agent_ids = action.keys()\n\n  \
    \  for agent_id in agent_ids:\n        seeker = self.agents[agent_id]\n      \
    \  if action[agent_id] == 0:  # move down\n            seeker = (min(seeker[0]\
    \ + 1, 4), seeker[1])\n        elif action[agent_id] == 1:  # move left\n    \
    \        seeker = (seeker[0], max(seeker[1] - 1, 0))\n        elif action[agent_id]\
    \ == 2:  # move up\n            seeker = (max(seeker[0] - 1, 0), seeker[1])\n\
    \        elif action[agent_id] == 3:  # move right\n            seeker = (seeker[0],\
    \ min(seeker[1] + 1, 4))\n        else:\n            raise ValueError(\"Invalid\
    \ action\")\n        self.agents[agent_id] = seeker ②\n\n    observations = {i:\
    \ self.get_observation(i) for i in agent_ids} ③\n    rewards = {i: self.get_reward(i)\
    \ for i in agent_ids}\n    done = {i: self.is_done(i) for i in agent_ids}\n\n\
    \    done[\"__all__\"] = all(done.values()) ④\n\n    return observations, rewards,\
    \ done, self.info\n```\n\n+   1. Actions in a step are now per-agent dictionaries.\n\
    2. After applying the correct action for each seeker, set the correct states of\
    \ all agents.\n3. observations, rewards, and dones are also dictionaries with\
    \ agent IDs as keys.\n4. Additionally, RLlib needs to know when all agents are\
    \ done.\n\n17 Note how this can lead to issues like deciding which agent gets\
    \ to act first. In our simple maze problem the order of actions is irrelevant,\
    \ but in more complex scenarios this becomes a crucial part of modeling the RL\
    \ problem correctly."
  - "[PAGE 110]\n\nThe last step is to modify rendering the environment, which we\
    \ do by denoting each agent by its ID when printing the maze to the screen:\n\n\
    ```\ndef render(self, *args, **kwargs):\n    os.system('cls' if os.name == 'nt'\
    \ else 'clear')\n    grid = [['|' + ' ' for _ in range(5)] + ['|\\n'] for _ in\
    \ range(5)]\n    grid[self.goal[0]][self.goal[1]] = '|G'\n    grid[self.agents[1][0]][self.agents[1][1]]\
    \ = '|1'\n    grid[self.agents[2][0]][self.agents[2][1]] = '|2'\n    print(''.join([''.join(grid_row)\
    \ for grid_row in grid]))\n```\n\nRandomly rolling out an episode until *one*\
    \ of the agents reaches the goal can, for instance, be done by the following code:¹⁸\n\
    \n```\nimport time\n\nenv = MultiAgentMaze()\n\nwhile True:\n    obs, rew, done,\
    \ info = env.step(\n        {1: env.action_space.sample(), 2: env.action_space.sample()}\n\
    \    )\n    time.sleep(0.1)\n    env.render()\n    if any(done.values()):\n  \
    \      break\n```\n\nNote how we have to make sure to pass two random samples\
    \ by means of a Python dictionary into the step method, and how we check if any\
    \ of the agents are done yet. We use this break condition for simplicity because\
    \ it's highly unlikely that both seekers find their way to the goal at the same\

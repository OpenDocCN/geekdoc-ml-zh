    # An Overview of the Ray Core API


    If you recall what we did in the previous example, you''ll notice that we used
    a total of just six API methods.11 We used `ray.init()` to start the cluster and
    `@ray.remote` to turn functions and classes into tasks and actors. Then we used
    `ray.put()` to pass values into Ray''s object store and `ray.get()` to retrieve
    objects from the cluster. Finally, we used `.remote()` on actor methods or tasks
    to run code on our cluster, and `ray.wait` to avoid blocking calls.


    While six API methods might not seem like much, those are the only ones you''ll
    likely ever care about when using the Ray API.12 We briefly summarize them in
    Table 2-1 so you can easily reference them in the future.


    11 To paraphrase Alan Kay, to get simplicity, you need to find slightly more sophisticated
    building blocks. The Ray API does just that for distributed Python.


    12 Check out the API reference to see that there are in fact quite a few more
    methods available. At some point you should invest in understanding the arguments
    of `init`, but all other methods likely won''t be of interest to you, if you''re
    not an administrator of your Ray Cluster.'

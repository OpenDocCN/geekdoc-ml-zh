  md: 'Next, let''s see if we can take some observations from our environment and
    pass them to the model we just extracted from our policy. This part is a bit technically
    involved because models are a bit more difficult to access directly in RLlib.
    Normally you would only interface with a model through your policy, which takes
    care of preprocessing the observations, among other things. Luckily, we can access
    the preprocessor used by the policy, transform the observations from our environment,
    and then pass them to the model:


    ```

    from ray.rllib.models.preprocessors import get_preprocessor


    env = GymEnvironment()

    obs_space = env.observation_space

    preprocessor = get_preprocessor(obs_space)(obs_space)


    observations = env.reset()

    transformed = preprocessor.transform(observations).reshape(1, -1)


    model_output, _ = model({"obs": transformed})

    ```


    +   1. Use get_preprocessor to access the preprocessor used by the policy.

    2. You can use transform on any observations obtained from your env to the format
    expected by the model. Note that we need to reshape the observations too.

    3. Get the model output by calling the model on a preprocessed observation dictionary.


    Having computed our model_output, we can now access the Q-values and the action
    distribution of the model for this output:


    ```

    q_values = model.get_q_value_distributions(model_output)

    print(q_values)


    action_distribution = policy.dist_class(model_output, model)

    sample = action_distribution.sample()

    print(sample)

    ```


    +   1. The get_q_value_distributions method is specific to DQN models only.

    2. By accessing dist_class we get the policy''s action distribution class.

    3. Action distributions can be sampled from.'

  md: '# CHAPTER 10


    # Getting Started with the Ray AI Runtime


    We’ve come a long way since you read about Ray AIR in Chapter 1. Besides the fundamentals
    of Ray Clusters and the basics of the Ray Core API, you’ve picked up a good understanding
    of all higher-level libraries of Ray that can be leveraged in AI workloads, namely,
    Ray RLlib, Tune, Train, Datasets, and Serve in the chapters leading up to this
    one. The main reason we deferred a deeper discussion of Ray AIR until now is that
    it’s so much easier to think about its concepts and compute complex examples if
    you know its building blocks.


    In this chapter we’ll introduce you to the core concepts of Ray AIR and how you
    can use it to build and deploy common workflows. We’ll build an AIR application
    that leverages many of Ray’s data science libraries that you already know about.
    We will also tell you when and why to use AIR and give you a brief overview of
    its technical underpinnings. An in-depth discussion of the relationship of AIR
    with other systems, such as integrations and key differences, will be tackled
    in Chapter 11 when we talk about Ray’s ecosystem as it relates to AIR.


    # Why Use AIR?


    Running ML workloads with Ray has been a constant evolution over the last couple
    of years. Ray RLlib and Tune were the first libraries built on top of Ray Core.
    Components like Ray Train, Serve, and more recently Ray Datasets followed shortly
    after. The addition of Ray AIR as an umbrella for all other Ray ML libraries is
    the result of active discussions with and feedback from the ML community. Ray,
    as a Python-native tool with good GPU support and stateful primitives (Ray actors)
    for complex ML workloads, is a natural candidate for building a runtime like AIR.


    Ray AIR is a unified toolkit for your ML workloads that offers many third-party
    integrations for model training or accessing custom data sources. In the spirit
    of the'
  merge: -1
  pgno: 216
- img_proc: true
  md: 'other ML libraries built on top of Ray Core, AIR hides lower-level abstractions
    and provides an intuitive API that was inspired by common patterns from tools
    such as scikit-learn.


    At its core, Ray AIR was built for both data scientists and ML engineers alike.
    As a data scientist, you can use it to build and scale your end-to-end experiments
    or individual subtasks such as preprocessing, training, tuning, scoring, or serving
    of ML models. As an ML engineer, you can go so far as to build a custom ML platform
    on top of AIR or simply leverage its unified API to integrate it with other libraries
    from your ecosystem. And Ray always gives you the flexibility to drop down and
    delve into the lower-level Ray Core API.


    As part of the Ray ecosystem, AIR can leverage all its benefits, which includes
    a seamless transition from experimentation on a laptop to production workflows
    on a cluster. You often see data science teams “hand over” their ML code to teams
    responsible for production systems. In practice this can be expensive and time-consuming,
    as this process often involves modifying or even rewriting parts of the code.
    As we will see, Ray AIR helps you with this transition because AIR takes care
    of concerns such as scalability, reliability, and robustness for you.


    Ray AIR already has a respectable number of integrations today, but it’s also
    fully extensible. And as we will show you in the next section, its unified API
    provides a smooth workflow that allows you to drop-in-replace many of its components.
    For instance, you can use the same interface to define an XGBoost or PyTorch Trainer
    with AIR, which makes experimentation with various ML models convenient.


    At the same time, by choosing AIR you can avoid the problem of working with several
    (distributed) systems and writing glue code for them that’s difficult to deal
    with. Teams working with many moving parts often experience rapid deprecation
    of integrations and a high maintenance burden. These issues can lead to *migration
    fatigue*, a reluctance to adopt new ideas due to the anticipated complexity of
    system changes.



    \ check the Python type of the first item with `type(object_references[0])`, you'll\
    \ see that it's in fact an `ObjectRef`. These object references correspond to\
    \ futures, which you need to ask the result of. This is what the call to `ray.get(...)`\
    \ is for. Whenever you call `remote` on a Ray task, it will immediately return\
    \ one or more object references. You should consider Ray tasks the primary method\
    \ of creating objects. In the next section we'll show you an example that chains\
    \ multiple tasks together and lets Ray take care of passing and resolving the\
    \ objects between them.\n\n⁵ Strictly speaking, this first example is a bit of\
    \ an anti-pattern, as you should not normally share mutable state across Ray tasks\
    \ through global variables. Having said that, for this toy data example you shouldn't\
    \ overthink this part. Rest assured that we'll show you a better way of doing\
    \ things in the next section.\n\n⁶ This book is geared to data science practitioners,\
    \ so we won't discuss the conceptual details of Ray's architecture here. If you're\

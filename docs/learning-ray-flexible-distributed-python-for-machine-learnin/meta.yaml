    | Integration | Type | Description |

    |---|---|---|

    | Text, binary, image files, CSV, JSON | Basic data formats | Supporting such
    basic formats should not strictly speaking be considered an integration, but it’s
    worth knowing that Ray Datasets can load and store these formats. |

    | NumPy, Pandas, Arrow, Parquet, Python objects | Advanced data formats | Ray
    Datasets supports working with common ML data libraries such as NumPy and Pandas

    # CHAPTER 2

    Getting Started with Ray Core


    For a book on distributed Python, it’s not without a certain irony that Python
    on its own is largely ineffective for distributed computing. Its interpreter is
    effectively single threaded. For instance, this makes it difficult to leverage
    multiple CPUs on the same machine, let alone a whole cluster of machines, using
    plain Python. That means you need extra tooling, and luckily the Python ecosystem
    has some options for you. Libraries like multiprocessing can help you distribute
    work on a single machine,¹ but not beyond.


    Seen as a Python library, the Ray Core API is powerful enough to make general
    distributed programming more accessible to the Python community as a whole. By
    way of analogy, some companies get by with deploying pretrained ML models for
    their use cases, but that strategy is not always effective. It’s often inevitable
    to need to train custom models to be successful. In the same way, your distributed
    workloads *might* just fit into the (potentially limiting) programming model of
    existing frameworks, but Ray Core can unlock the full spectrum of building distributed
    applications, due to its generality.² As it is so fundamental, we dedicate this
    whole chapter to the basics of Ray Core and spend all of Chapter 3 on building
    an interesting application with the Core API. This way you’re equipped with practical
    knowledge about Ray Core and can use it in later chapters and your own projects.


    In this chapter you’ll understand how Ray Core handles distributed computing by
    spinning up a local cluster, and you’ll learn how to use Ray’s lean and powerful
    API to parallelize some interesting computations. For instance, you’ll build an
    example that


    1 Note that Ray comes with a drop-in replacement for multiprocessing that you
    might find useful for certain workloads.

    2 This represents a trade-off in terms of generality versus specialization. By
    also providing specialized yet interoperable libraries on top of the Core API,
    Ray provides tooling at various levels of abstraction.'
- md: "## An Introduction to Ray Core\n\nThe bulk of this chapter is an extended Ray\
    \ Core example that we'll build together. Many of Ray's concepts can be explained\
    \ with a good example, so that's exactly what we'll do.\n\n![](img/6489687a3a178f2884963bddc928992c_45_0.png)\n\
    \nAs before, you can follow this example by typing the code yourself (which is\
    \ highly recommended) or by following the [notebook for this chapter](http://example.com).\
    \ In any case, make sure you have Ray installed, for instance with `pip install\
    \ ray`.\n\nIn [Chapter 1](http://example.com) we showed you how start a local\
    \ cluster simply by calling `import ray` and then initializing it with `ray.init()`.\
    \ After running this code you will see output of the following form. We omit a\
    \ lot of information in this example output, as that would require you to understand\
    \ more of Ray's internals first:\n\n```\n... INFO services.py:1263 -- View the\
    \ Ray dashboard at http://127.0.0.1:8265\n{'node_ip_address': '192.168.1.41',\n\
    ...\n'node_id': '...'}\n```\n\nThis output indicates that your Ray Cluster is\
    \ up and running. As you can see from the first line of the output, Ray comes\
    \ with its own, prepackaged dashboard.³ You can check it out at [http://127.0.0.1:8265](http://127.0.0.1:8265),\
    \ unless your output shows a different port. You can take your time if you want\
    \ to explore the dashboard. For instance, you should see all your CPU cores listed\
    \ and the total utilization of your (trivial) Ray application. To see the resource\
    \ utilization of your Ray Cluster in Python, you can simply call `ray.cluster_resources()`.\
    \ The output should look something like this:\n\n```\n{'CPU': 12.0,\n 'memory':\
    \ 14203886388.0,\n 'node:127.0.0.1': 1.0,\n 'object_store_memory': 2147483648.0}\n\
    ```\n\n> ³ The dashboard is being redesigned as we write these lines. As much\
    \ as we'd like to show you screenshots of it and walk you through it, you'll have\
    \ to [discover it for yourself](http://example.com) for now.\n\nYou'll need a\
    \ running Ray Cluster to run the examples in this chapter, so make sure you've\
    \ started one before continuing. The goal of this section is to give you a quick\
    \ introduction to the Ray Core API, which we'll simply refer to as the Ray API\
    \ from now on.\n\nFor Python programmers, the great thing about the Ray API is\
    \ that it hits so close to home. It uses familiar concepts such as decorators,\
    \ functions, and classes to provide you with a fast learning experience. The Ray\
    \ API aims to provide a universal programming interface for distributed computing.\
    \ That's certainly no easy feat, but we think Ray succeeds in this respect, as\
    \ it provides you with good abstractions that are intuitive to learn and use.\
    \ Ray's engine does all the heavy lifting for you in the background. This design\
    \ philosophy is what enables Ray to be used with existing Python libraries and\
    \ systems.\n\nNote that the reason we start out with Ray Core in this book is\
    \ that we believe it has massive potential to make distributed computing more\
    \ accessible. In essence, this chapter is all about getting a peek behind the\
    \ curtains of what makes Ray work so well and how you can pick up its fundamentals.\
    \ If you're a less experienced Python programmer or just want to focus on higher-level\
    \ tasks, Ray Core might take some getting used to.⁴ Having said that, we emphatically\
    \ recommend learning the Ray Core API, as it's a great way to get into distributed\
    \ computing with Python.\n\n⁴ In case you fall into these categories, it might\
    \ be comforting to hear that many data scientists rarely use Ray Core directly.\
    \ Instead, they work directly with Ray's higher-level libraries like Datasets,\
    \ Train, or Tune.\n\n## A First Example Using the Ray API\n\nTo give you an example,\
    \ take the following function that retrieves and processes data from a database.\
    \ Our sample database is a plain Python list containing the words of the title\
    \ of this book. We act as if retrieving an individual item from this database\
    \ and further processing it is expensive by letting Python sleep:\n\n```\nimport\
    \ time\n\ndatabase = [\n    \"Learning\", \"Ray\",\n    \"Flexible\", \"Distributed\"\
    , \"Python\", \"for\", \"Machine\", \"Learning\"\n]\n\ndef retrieve(item):\n \
    \   time.sleep(item / 10.)\n    return item, database[item]\n```\n\n❶ A sample\
    \ database containing string data with the title of this book.\n\n❷ Emulate a\
    \ data-crunching operation that takes a long time.\n\nOur database has eight items\
    \ in total. If we were to retrieve all items sequentially, how long would that\
    \ take? For the item with index 5, we wait for half a second (5 / 10) and so on.\
    \ In total, we can expect a runtime of around (0 + 1 + 2 + 3 + 4 + 5 + 6 + 7)\
    \ / 10 = 2.8 seconds. Let's see if that's what we actually get:\n\n```\ndef print_runtime(input_data,\
    \ start_time):\n    print(f'Runtime: {time.time() - start_time:.2f} seconds, data:')\n\
    \    print(*input_data, sep='\\n')\n```\n\n```\nstart = time.time()\ndata = [retrieve(item)\
    \ for item in range(8)] ❶\nprint_runtime(data, start) ❷\n```\n\n❶ Uses a list\
    \ comprehension to retrieve all eight items.\n\n❷ Unpacks the data to print each\
    \ item on its own line.\n\nIf you run this code, you should see the following\
    \ output:\n\n```\nRuntime: 2.82 seconds, data:\n(0, 'Learning')\n(1, 'Ray')\n\
    (2, 'Flexible')\n(3, 'Distributed')\n(4, 'Python')\n(5, 'for')\n(6, 'Machine')\n\
    (7, 'Learning')\n```\n\nThere's a little overhead that brings the total runtime\
    \ to 2.82 seconds. On your end this might be slightly less, or much more, depending\
    \ on your computer. The important takeaway is that our naive Python implementation\
    \ is not able to run this function in parallel.\n\nThis may not come as a surprise\
    \ to you, but you could at least have suspected that Python list comprehensions\
    \ are more efficient in that regard. The runtime we got is pretty much the worst-case\
    \ scenario, namely, the 2.8 seconds we calculated prior to running the code. If\
    \ you think about it, it might even be a bit frustrating to see that a program\
    \ that essentially sleeps most of its runtime is that slow overall. Ultimately\
    \ you can blame the *Global Interpreter Lock* (GIL) for that, but it gets enough\
    \ of the blame already.\n\n## Python’s Global Interpreter Lock\n\nThe GIL is undoubtedly\
    \ one of the most infamous features of the Python language. In a nutshell, it’s\
    \ a lock that makes sure only one thread on your computer can ever execute your\
    \ Python code at a time. If you use multithreading, the threads need to take turns\
    \ controlling the Python interpreter.\n\nThe GIL has been implemented for good\
    \ reasons. For one, it makes memory management that much easier in Python. Another\
    \ key advantage is that it makes single-threaded programs quite fast. Programs\
    \ that primarily use lots of system input and output (we say they are I/O-bound),\
    \ like reading files or databases, benefit as well. One of the major downsides\
    \ is that CPU-bound programs are essentially single-threaded. In fact, CPU-bound\
    \ tasks might even run *faster* when not using multithreading, as the latter incurs\
    \ write-lock overheads on top of the GIL.\n\nGiven all that, the GIL might somewhat\
    \ paradoxically be one of the reasons for Python’s popularity, if you believe\
    \ [Larry Hastings](https://www.youtube.com/watch?v=KlZnEq4VrDI). Interestingly,\
    \ Hastings also led (unsuccessful) efforts to remove it in a project called *GILectomy*,\
    \ which is exactly the kind of complicated surgery that it sounds like. The jury\
    \ is still out, but [Sam Gross](https://github.com/colesbury/nogil) might just\
    \ have found a way to remove the GIL in his nogil branch of Python 3.9. For now,\
    \ if you absolutely have to work around the GIL, consider using an implementation\
    \ different from CPython. CPython is Python’s standard implementation, and if\
    \ you don’t know that you’re using it, you’re definitely using it. Implementations\
    \ like Jython, IronPython, or PyPy don’t have a GIL, but they come with their\
    \ own drawbacks.\n\n## Functions and remote Ray tasks\n\nIt’s reasonable to assume\
    \ that such a task can benefit from parallelization. Perfectly distributed, the\
    \ runtime should not take much longer than the longest subtask, namely, 7/ 10\
    \ = 0.7 seconds. So, let’s see how you can extend this example to run on Ray.\
    \ To do so, start by using the `@ray.remote` decorator as follows:\n\n```\n@ray.remote\n\
    def retrieve_task(item):\n    return retrieve(item)\n```\n\n- 1. Make any Python\
    \ function a Ray task with just this decorator.\n- 2. All else remains unchanged.\
    \ `retrieve_task` just passes through to `retrieve`.\n\nIn this way, the function\
    \ `retrieve_task` becomes a so-called Ray task. In essence, a Ray task is a function\
    \ that gets executed on a different process than it was called from, potentially\
    \ on a different machine."
  mdcn: "## Ray Core 简介\n\n本章的大部分内容将是一个我们将共同构建的扩展 Ray Core 示例。Ray 的许多概念都可以通过一个好例子来解释，这正是我们将要做的。\n\
    \n![](img/6489687a3a178f2884963bddc928992c_45_0.png)\n\n和之前一样，你可以通过自己输入代码（强烈推荐）或参考[本章的\
    \ notebook](http://example.com) 来跟随这个示例。无论如何，请确保你已经安装了 Ray，例如通过 `pip install ray`。\n\
    \n在[第 1 章](http://example.com)中，我们向你展示了如何通过简单地调用 `import ray` 然后使用 `ray.init()`\
    \ 初始化来启动一个本地集群。运行此代码后，你将看到以下形式的输出。在此示例输出中，我们省略了很多信息，因为那需要你首先了解更多的 Ray 内部机制：\n\n\
    ```\n... INFO services.py:1263 -- View the Ray dashboard at http://127.0.0.1:8265\n\
    {'node_ip_address': '192.168.1.41',\n...\n'node_id': '...'}\n```\n\n此输出表明你的 Ray\
    \ 集群已启动并正在运行。从输出的第一行可以看出，Ray 自带一个预打包的仪表板。³ 你可以在 [http://127.0.0.1:8265](http://127.0.0.1:8265)\
    \ 查看它，除非你的输出显示了不同的端口。如果你想探索仪表板，可以花些时间。例如，你应该能看到所有列出的 CPU 核心以及你的（简单的）Ray 应用程序的总利用率。要在\
    \ Python 中查看 Ray 集群的资源使用情况，只需调用 `ray.cluster_resources()`。输出应类似于：\n\n```\n{'CPU':\
    \ 12.0,\n 'memory': 14203886388.0,\n 'node:127.0.0.1': 1.0,\n 'object_store_memory':\
    \ 2147483648.0}\n```\n\n> ³ 仪表板正在我们撰写这些文字时进行重新设计。尽管我们很想向你展示它的截图并带你浏览，但目前你只能[自己探索](http://example.com)。\n\
    \n你需要一个正在运行的 Ray 集群来运行本章中的示例，因此请确保在继续之前已启动一个。本节的目标是让你快速了解 Ray Core API，从现在起我们将简单地称之为\
    \ Ray API。\n\n对于 Python 程序员来说，Ray API 的妙处在于它非常贴近你的习惯。它使用了诸如装饰器、函数和类等熟悉的概念，为你提供快速的学习体验。Ray\
    \ API 旨在为分布式计算提供一个通用的编程接口。这当然不是一项简单的任务，但我们认为 Ray 在这方面取得了成功，因为它为你提供了直观易学易用的良好抽象。Ray\
    \ 的引擎在后台为你完成了所有繁重的工作。这种设计哲学使得 Ray 能够与现有的 Python 库和系统一起使用。\n\n请注意，我们在这本书中从 Ray\
    \ Core 开始的原因是我们相信它在使分布式计算更易于访问方面具有巨大潜力。本质上，本章是关于一窥 Ray 运行如此出色的幕后原理，以及你如何掌握其基础。如果你是一个经验较少的\
    \ Python 程序员，或者只想专注于更高层次的任务，Ray Core 可能需要一些时间来适应。⁴ 话虽如此，我们强烈建议学习 Ray Core API，因为这是用\
    \ Python 进入分布式计算领域的好方法。\n\n⁴ 如果你属于这些类别，听到许多数据科学家很少直接使用 Ray Core 可能会让你感到宽慰。相反，他们直接使用\
    \ Ray 的高级库，如 Datasets、Train 或 Tune。\n\n## 使用 Ray API 的第一个示例\n\n为了给你一个例子，考虑以下从数据库检索和处理数据的函数。我们的示例数据库是一个普通的\
    \ Python 列表，包含本书标题的单词。我们通过让 Python 休眠来模拟从数据库中检索单个项目并进一步处理它的开销：\n\n```\nimport\
    \ time\n\ndatabase = [\n    \"Learning\", \"Ray\",\n    \"Flexible\", \"Distributed\"\
    , \"Python\", \"for\", \"Machine\", \"Learning\"\n]\n\ndef retrieve(item):\n \
    \   time.sleep(item / 10.)\n    return item, database[item]\n```\n\n❶ 一个包含本书标题字符串数据的示例数据库。\n\
    \n❷ 模拟一个耗时较长的数据处理操作。\n\n我们的数据库总共有八个条目。如果我们顺序检索所有条目，这需要多长时间？对于索引为 5 的条目，我们等待半秒（5\
    \ / 10），依此类推。总的来说，我们可以预期运行时间约为 (0 + 1 + 2 + 3 + 4 + 5 + 6 + 7) / 10 = 2.8 秒。让我们看看实际结果是否如此：\n\
    \n```\ndef print_runtime(input_data, start_time):\n    print(f'Runtime: {time.time()\
    \ - start_time:.2f} seconds, data:')\n    print(*input_data, sep='\\n')\n```\n\
    \n```\nstart = time.time()\ndata = [retrieve(item) for item in range(8)] ❶\nprint_runtime(data,\
    \ start) ❷\n```\n\n❶ 使用列表推导式检索所有八个条目。\n\n❷ 解包数据以将每个条目打印在单独的行上。\n\n如果你运行此代码，你应该会看到以下输出：\n\
    \n```\nRuntime: 2.82 seconds, data:\n(0, 'Learning')\n(1, 'Ray')\n(2, 'Flexible')\n\
    (3, 'Distributed')\n(4, 'Python')\n(5, 'for')\n(6, 'Machine')\n(7, 'Learning')\n\
    ```\n\n有一点额外开销使总运行时间达到 2.82 秒。在你那边，这可能会稍少一些，或者多得多，这取决于你的计算机。重要的结论是，我们朴素的 Python\
    \ 实现无法并行运行此函数。\n\n这可能并不让你感到惊讶，但你至少可能怀疑过 Python 列表推导式在这方面更高效。我们得到的运行时间几乎是最坏的情况，即我们在运行代码之前计算的\
    \ 2.8 秒。仔细想想，看到一个本质上大部分运行时间都在休眠的程序整体上如此缓慢，甚至可能有点令人沮丧。最终你可以将此归咎于*全局解释器锁*（GIL），但它已经承受了足够的指责。\n\
    \n## Python 的全局解释器锁\n\nGIL 无疑是 Python 语言最臭名昭著的特性之一。简而言之，它是一个锁，确保你的计算机上一次只有一个线程可以执行你的\
    \ Python 代码。如果你使用多线程，线程需要轮流控制 Python 解释器。\n\nGIL 的实现有其充分的理由。首先，它使 Python 中的内存管理变得容易得多。另一个关键优势是它使单线程程序相当快。主要使用大量系统输入和输出（我们称它们为\
    \ I/O 密集型）的程序，如读取文件或数据库，也能受益。主要缺点之一是 CPU 密集型程序本质上是单线程的。事实上，CPU 密集型任务在不使用多线程时甚至可能运行得*更快*，因为后者在\
    \ GIL 之上还会产生写锁开销。\n\n考虑到所有这些，如果你相信 [Larry Hastings](https://www.youtube.com/watch?v=KlZnEq4VrDI)，GIL\
    \ 可能有点矛盾地成为 Python 流行的原因之一。有趣的是，Hastings 还领导了（未成功的）在名为 *GILectomy* 的项目中移除它的努力，这正是它听起来的那种复杂手术。目前尚无定论，但\
    \ [Sam Gross](https://github.com/colesbury/nogil) 可能已经在他的 Python 3.9 nogil 分支中找到了移除\
    \ GIL 的方法。目前，如果你绝对需要绕过 GIL，可以考虑使用不同于 CPython 的实现。CPython 是 Python 的标准实现，如果你不知道你正在使用它，那你肯定在使用它。像\
    \ Jython、IronPython 或 PyPy 这样的实现没有 GIL，但它们有自己的缺点。\n\n## 函数和远程 Ray 任务\n\n可以合理地假设这样的任务可以从并行化中受益。完美分布的情况下，运行时间不应比最长的子任务长太多，即\
    \ 7/10 = 0.7 秒。那么，让我们看看如何扩展这个示例以在 Ray 上运行。为此，首先使用 `@ray.remote` 装饰器，如下所示：\n\n\
    ```\n@ray.remote\ndef retrieve_task(item):\n    return retrieve(item)\n```\n\n\
    - 1. 只需使用这个装饰器就可以将任何 Python 函数变成一个 Ray 任务。\n- 2. 其他一切保持不变。`retrieve_task` 只是传递给\
    \ `retrieve`。\n\n通过这种方式，函数 `retrieve_task` 成为一个所谓的 Ray 任务。本质上，Ray 任务是一个在与调用它的进程不同的进程上执行的函数，可能在不同的机器上。"

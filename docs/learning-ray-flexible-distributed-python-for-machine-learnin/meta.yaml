  md: 'Figure 8-1 provides a basic view of how a Ray Serve application runs on top
    of a Ray Cluster: multiple deployments are placed across a Ray Cluster. Each deployment
    is made up of one more “replicas,” each of which is a Ray actor. Incoming traffic
    is routed through an HTTP proxy that will load-balance requests across the replicas.¹


    ![](img/6489687a3a178f2884963bddc928992c_182_0.png)


    Figure 8-1. The architecture of a Ray Serve application


    Under the hood, the deployments making up a Ray Serve application are managed
    by a centralized *controller* actor. This is a detached actor managed by Ray that
    will be restarted upon failure. The controller is in charge of creating and updating
    replica actors, broadcasting updates to other actors in the system, and performing
    health checking and failure recovery. If a replica or an entire Ray node crashes
    for any reason, the controller will detect the failures and ensure that the actors
    are recovered and can continue serving traffic.


    # Defining a Basic HTTP Endpoint


    This section will introduce Ray Serve by defining a simple HTTP endpoint wrapping
    a single ML model. The model we’ll deploy is a sentiment classifier: given a text
    input, it will predict if the output had a positive or negative sentiment. We’ll
    be using a pretrained sentiment classifier from the [Hugging Face Transformers
    library](https://huggingface.co/docs/transformers), which provides a simple Python
    API for pretrained models that will abstract away the details of the model and
    allow us to focus on the serving logic.


    To deploy this model using Ray Serve, we need to define a Python class and turn
    it into a Serve *deployment* using the `@serve.deployment` decorator. The decorator
    allows us to pass a number of useful options to configure the deployment; we will
    explore some of those options in “Scaling and Resource Allocation” on page 163:


    ¹ Deployments can also send traffic to each other directly. This enables building
    more complex applications involving model composition or mixing ML models with
    business logic.'

    \n## 不断增长的生态系统\n\nRay的高级库功能强大，值得在本书中进行更深入的探讨。虽然它们对数据科学生命周期的有用性是不可否认的，但我们也不想给人留下Ray是你现在唯一需要的印象。毫不奇怪，最好和最成功的框架是那些与现有解决方案和思想良好集成的框架。最好专注于你的核心优势，并利用其他工具来弥补你解决方案中的不足，Ray在这方面做得很好。\n\
    \n在整本书中，特别是在第11章，我们将讨论许多建立在Ray之上的有用的第三方库。Ray生态系统还与现有工具有许多集成。举个例子，回想一下Ray Datasets是Ray的数据加载和计算库。如果你碰巧有一个已经使用Spark或Dask等数据处理引擎的现有项目，18\
    \ 你可以将这些工具与Ray一起使用。具体来说，你可以使用Dask-on-Ray调度器在Ray集群上运行整个Dask生态系统，或者你可以使用Spark on\
    \ Ray项目将你的Spark工作负载与Ray集成。同样，Modin项目是Pandas DataFrames的分布式直接替代品，它使用Ray（或Dask）作为分布式执行引擎（“Pandas\
    \ on Ray”）。\n\n这里的共同主题是，Ray并不试图取代所有这些工具，而是与它们集成，同时仍然让你访问其原生的Ray Datasets库。我们将在第11章更详细地讨论Ray与更广泛生态系统中其他工具的关系。\n\
    \n许多Ray库的一个重要方面是它们将常用工具无缝集成为*后端*。Ray通常创建通用接口，而不是试图创建新标准。19 这些接口允许你以分布式方式运行任务，这是大多数相应后端不具备的特性，或者不具备同等程度。例如，Ray\
    \ RLlib和Train由TensorFlow和PyTorch的全部功能支持。而Ray Tune支持几乎所有著名的HPO工具中的算法，包括Hyperopt、Optuna、Nevergrad、Ax、SigOpt等等。这些工具默认都不是分布式的，但Tune将它们统一在一个*用于分布式工作负载的通用接口*中。\n\
    \n18 Spark是由伯克利的另一个实验室AMPLab创建的。互联网上充斥着博客文章声称Ray因此应该被视为Spark的替代品。最好将它们视为具有不同优势的工具，两者都可能长期存在。\n\
    \n19 在深度学习框架Keras成为TensorFlow的官方部分之前，它最初是为各种底层框架（如Theano或CNTK）提供的便捷API规范。从这个意义上说，Ray\
    \ RLlib有机会成为“强化学习的Keras”，而Ray Tune可能就是“超参数优化的Keras”。更广泛采用所缺少的部分可能只是一个更优雅的API。\n\
    \n## 总结\n\n图1-4概述了我们所阐述的Ray的三层结构。Ray的核心分布式执行引擎位于框架的中心。Ray Core API是一个用于分布式计算的通用库，Ray\
    \ Clusters允许你以多种方式部署你的工作负载。\n\n对于实际的数据科学工作流，你可以使用Ray Datasets进行数据处理，Ray RLib进行强化学习，Ray\
    \ Train进行分布式模型训练，Ray Tune进行超参数调优，Ray Serve进行模型服务。你已经看到了每个库的示例，并对其API包含的内容有了概念。Ray\
    \ AIR为所有其他Ray ML库提供了统一的API，并且是根据数据科学家的需求构建的。\n\n除此之外，Ray的生态系统有许多扩展、集成和后端，我们将在后面更深入地探讨。也许你已经能在图1-4中发现一些你认识和喜欢的工具？\n\
    \n![](img/6489687a3a178f2884963bddc928992c_42_0.png)\n\nRay Core API位于图1-4的中心，周围是RLib、Ray\
    \ Tune、Ray Train、Ray Serve、Ray Datasets等库，以及许多无法在此一一列举的第三方集成。\n\n# 第2章\nRay Core入门\n\
    \n对于一本关于分布式Python的书籍来说，Python本身在分布式计算方面基本上无效，这具有某种讽刺意味。它的解释器实际上是单线程的。例如，这使得使用纯Python难以利用同一台机器上的多个CPU，更不用说整个机器集群了。这意味着你需要额外的工具，幸运的是Python生态系统为你提供了一些选择。像multiprocessing这样的库可以帮助你在单台机器上分配工作，1\
    \ 但仅限于此。\n\n作为一个Python库，Ray Core API功能强大，足以让整个Python社区更容易进行通用分布式编程。打个比方，一些公司通过部署预训练的机器学习模型来满足他们的用例，但这种策略并不总是有效。通常不可避免地需要训练自定义模型才能成功。同样，你的分布式工作负载*可能*只是适合现有框架的（可能有限的）编程模型，但由于其通用性，Ray\
    \ Core可以解锁构建分布式应用程序的全部潜力。2 由于它如此基础，我们将整章用于Ray Core的基础知识，并在第3章中全部用于使用Core API构建一个有趣的应用程序。这样你就掌握了关于Ray\
    \ Core的实用知识，并可以在后面的章节和你自己的项目中使用它。\n\n在本章中，你将通过启动一个本地集群来理解Ray Core如何处理分布式计算，并且你将学习如何使用Ray精简而强大的API来并行化一些有趣的计算。例如，你将构建一个示例，该示例\n\
    \n1 注意，Ray自带了multiprocessing的直接替代品，你可能会发现它对某些工作负载有用。\n2 这代表了通用性与专业化之间的权衡。通过在Core\
    \ API之上提供专门但可互操作的库，Ray提供了各种抽象级别的工具。"

    behind Ray AIR, such as how it manages memory or handles failures. We can give
    you only a brief overview of these topics but will provide links to more advanced
    material as we go.


    ## AIR Workload Execution


    Let’s have a closer look at the execution model of AIR.


    ### Stateless execution


    Ray Datasets use Ray tasks or actors to execute transformations. Tasks are preferred
    since they allow for easier and more flexible scheduling. The Datasets library
    uses a scheduling strategy that evenly balances tasks and their output across
    your cluster.


    Actors are used if a transformation has state or needs an expensive setup, like
    loading large model checkpoints. In this case, loading large models in an actor
    once to reuse it for inference tasks can benefit overall performance. When Ray
    Datasets is using actors, these actors are created first, and the necessary data
    (in our example the loaded model) is transferred to them before the transformation
    in question gets executed.


    In general, datasets are stored in Ray object store memory, while large datasets
    are spilled to disk. But for stateless transformations there is often no need
    to keep intermediate results in memory. Using *pipelining* on Datasets, as we''ve
    shown in Chapter 6, data can instead be streamed to and from storage to increase
    performance.⁸ The idea is to load only the fraction of the data currently needed
    to execute a transformation. This can drastically reduce the memory footprint
    of the transformation and often speed up the overall execution.


    ### Stateful execution


    Ray Train and RLlib spawn actors for their distributed training workers. As demonstrated
    multiple times, both libraries also integrate seamlessly with Tune. In Chapter
    5 we detailed how Tune launches Trials, which in essence are groups of actors
    executing a certain workload. If you use Train or RLlib with Tune, that in turn
    means that a tree of actors gets created, namely, an actor for each Tune Trial,
    and subactors for the parallel training workers requested by Train or RLlib.


    In terms of workload execution, this naturally creates an inner and an outer layer.
    Each subactor in a Tune Trial has full autonomy over its workload, as requested
    in the respective Train or RLlib training run you specified. This represents the
    inner execution layer. On the outer layer, Tune needs to monitor the status of
    individual trials, which it does by periodically reporting metrics to the Trial
    driver. Figure 10-9 illustrates this nested creation and execution of Ray actors
    for this scenario.


    ![](img/6489687a3a178f2884963bddc928992c_231_0.png)


    Figure 10-9. Running distributed training on AIR with Tune


    ### Composite workload execution


    Composite workloads leverage both task- and actor-based computation simultaneously.
    This can lead to interesting resource allocation challenges. Trial actors need
    to reserve their resources upfront, but stateless tasks don''t. The problem you
    can run into is that all available resources might get reserved for your training
    actors with none left for data loading tasks.


    AIR prevents this by allowing Tune to reserve a maximum of 80% of a node''s CPU.
    You can tune this parameter, but this is a sensible default that ensures basic
    resource availability for stateless computations. In the common scenario in which
    your training operations leverage GPUs and your data processing steps don''t,
    this becomes a nonissue.


    ### Online serving execution


    For online serving Ray Serve manages a pool of stateless actors to serve your
    requests. Some actors listen for incoming requests and call other actors to perform
    the predictions. Requests are automatically load-balanced using a round-robin
    algorithm to the pool of actors hosting the models. Load metrics are sent to the
    Serve component to perform autoscaling.


    ## AIR Memory Management


    In this section we take a bit of a deep dive into the specific memory management
    techniques of AIR. We''ll discuss to what extent the Ray object store is used
    by AIR. You can skip this section if you find it too technical. The upshot is
    that Ray employs smart techniques that will ensure your data and compute are properly
    distributed and scheduled.


    When you load data using Ray Datasets, you already know that internally these
    Datasets are partitioned into blocks of data in your cluster. A block is simply
    a collection of Ray objects. Choosing the right block size is difficult and presents
    a trade-off between the overhead of having to manage too many small blocks and
    risking out-of-memory (OOM) exceptions due to blocks that are too large. AIR takes
    a pragmatic approach and tries to distribute in such a way that blocks don''t
    exceed 512 MB. In case this can''t be ensured, a warning will be issued. Should
    a block not fit into memory, AIR will spill your data to local disk.


    Your stateful workloads will use the Ray object store to varying degrees. For
    instance, RLlib uses Ray objects to broadcast model weights to individual rollout
    workers and for experience data collection. Tune uses it to set up Trials by sending
    and retrieving AIR Checkpoints. For technical reasons actors risk running into
    OOM issues if too



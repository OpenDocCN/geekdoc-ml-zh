    # Example: Training Copies of a Classifier in Parallel


    One of the key benefits of Datasets is that they can be passed between tasks and
    actors. In this section, we''ll explore how this functionality can be used to
    write efficient implementations of complex distributed workloads such as distributed
    hyperparameter tuning and machine learning training. We''ll implement an example
    of *distributed* training of ML models in this section, a topic that we''ll cover
    in much more detail in [Chapter 7](#) when we introduce you to Ray Train.


    As discussed in [Chapter 5](#), a common pattern in machine learning training
    is to explore a range of hyperparameters to find the ones that result in the best
    model. We may want to run across a wide range of hyperparameters, and doing this
    naively could be very expensive. Ray Data allows us to easily share the same in-memory
    data across a range of parallel training runs in a single Python script: we can
    load and preprocess the data once and then pass a reference to it to many downstream
    actors who can read the data from shared memory.


    Additionally, sometimes when working with very large datasets, it is not feasible
    to load the full training data into memory in a single process or on a single
    machine. In this case, it''s common to *shard* the data, which means to give each
    worker its own subset of the data that can fit into memory. This local subset
    of the data is called a *data shard*. After each worker trains on its shard of
    data in parallel, the results are combined either synchronously or asynchronously
    using a parameter server. Two important considerations can make this difficult
    to get right:


    +   - Many distributed training algorithms take a *synchronous* approach, requiring
    the workers to synchronize their weights after each training epoch. This means
    there needs to be some coordination between the workers to maintain consistency
    between which batch of data they are operating on.

    - It''s important that each worker gets a random sample of the data during each
    epoch. A global random shuffle has been shown to perform better than local shuffle
    or no shuffle.'

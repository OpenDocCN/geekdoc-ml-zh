    # Model Training


    Having properly shaped our CIFAR-10 to train and test data using Ray Datasets,
    we can now define a classifier to train our data on. As this is likely the most
    natural scenario, we’re going to define a PyTorch model to define an AIR Trainer
    here. But it’s worth reminding you of what you learned in Chapter 7: you could
    just as easily switch frameworks at this point and work with Keras, Hugging Face,
    scikit-learn, or any other library supported by AIR.


    We will proceed in three steps: define a PyTorch model, specify the training loop
    that AIR should run using this model, and define an AIR Trainer that we can fit
    on our training data. To start with, let’s define a simple convolutional neural
    network with max pooling and rectified linear (relu) activations with PyTorch
    that’s built to operate on our CIFAR-10 dataset. If you know PyTorch, the following
    definition of



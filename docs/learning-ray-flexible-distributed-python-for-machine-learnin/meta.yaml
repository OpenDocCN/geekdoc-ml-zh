    \ features we've discussed:\n\n+   - We'll be combining custom business logic\
    \ along with multiple ML models.\n- The inference graph will consist of all three\
    \ multimodel patterns: pipelining, broadcasting, and conditional logic.\n- Each\
    \ model will be hosted as a separate Serve deployment so they can be independently\
    \ scaled and given their own resource allocation."

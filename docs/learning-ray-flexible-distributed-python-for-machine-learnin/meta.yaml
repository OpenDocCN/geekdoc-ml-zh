    \ self.agents[1]}, 2: {'obs': self.agents[2]}}\n\n    def reset(self):\n     \
    \   self.agents = {1: (4, 0), 2: (0, 4)}\n\n        return {1: self.get_observation(1),\
    \ 2: self.get_observation(2)}\n```\n\n+   1. Action and observation spaces stay\
    \ exactly the same as before.\n2. We now have two seekers with (0, 4) and (4,\

    \n我们仍然想在这个示例上做更多工作，⁷ 但让我们在这里退一步，回顾一下我们到目前为止做了什么。你从一个 Python 函数开始，并用 `@ray.remote`\
    \ 装饰它。这使你的函数成为一个 Ray 任务。然后，你没有在代码中调用原始函数，而是对 Ray 任务调用了 `.remote(...)`。最后一步是使用\

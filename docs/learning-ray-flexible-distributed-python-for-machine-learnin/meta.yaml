  md: "You should note that the Docker images we're using are quite large and can\
    \ take a while to download. Also, even if you see the expected output from `kubectl\
    \ get service`, that doesn't mean your cluster is ready to use yet. You should\
    \ look at the pod status and make sure they are all actually in “Running” state.\n\
    \n# Interacting with the KubeRay Cluster\n\nYou might be wondering why we spend\
    \ so much time on Kubernetes, since you're most likely just interested in learning\
    \ how to run Ray scripts on it. That's understandable, and we'll get to that in\
    \ a moment.\n\nFirst, let's use the following Python script as the desired script\
    \ to run on the cluster. We'll name it `script.py` (for simplicity), and the script\
    \ will connect to the Ray Cluster and run a couple standard Ray commands:\n\n\
    ```\nimport ray\nray.init(address=\"auto\")\nprint(ray.cluster_resources())\n\n\
    @ray.remote\ndef test():\n    return 12\n\nray.get([test.remote() for i in range(12)])\n\
    ```\n\nThere are three primary ways to run this script: using `kubectl exec`,\
    \ Ray Job Submission, or Ray Client. We'll cover them in the following sections.\n\
    \n# Running Ray programs with kubectl\n\nTo start with, you can directly interact\
    \ with the head pod via `kubectl exec`. Use this command to get a Python interpreter\
    \ on the head pod:\n\n```\nkubectl exec `kubectl get pods -o custom-columns=POD:metadata.name\
    \ |\\n  grep raycluster-complete-head` -it -c ray-head -- python\n```\n\nWith\
    \ this Python terminal, you can connect and run your own Ray application:\n\n\
    ```\nimport ray\nray.init(address=\"auto\")\n...\n```\n\nThere are other ways\
    \ of interacting with these services without `kubectl`, but they will require\
    \ some networking setup. The easiest route, and the one we'll take in what follows,\
    \ is to use port-forwarding."

    \ the maze repeatedly, rewarding the seeker for finding the goal and smartly keeping\
    \ track of which of the seeker's decisions worked and which didn't. Because running\
    \ simulations can be parallelized and our RL algorithm can also be trained in\
    \ parallel, we use the Ray API to parallelize the whole process.\n\nWe're not\
    \ quite ready to deploy this application on an actual Ray Cluster composed of\

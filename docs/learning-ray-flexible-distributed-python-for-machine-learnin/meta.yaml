    ## AIR 工作负载执行


    让我们更仔细地看看 AIR 的执行模型。


    ### 无状态执行


    Ray Datasets 使用 Ray 任务或 Actor 来执行转换。任务是首选，因为它们允许更简单和更灵活的调度。Datasets 库使用一种调度策略，将任务及其输出均匀地平衡到你的集群中。


    如果转换有状态或需要昂贵的设置（如加载大型模型检查点），则使用 Actor。在这种情况下，在 Actor 中加载大型模型一次以重复用于推理任务可以提高整体性能。当
    Ray Datasets 使用 Actor 时，这些 Actor 首先被创建，并在执行相关转换之前将必要的数据（在我们的示例中是加载的模型）传输给它们。


    通常，数据集存储在 Ray 对象存储内存中，而大型数据集会溢出到磁盘。但对于无状态转换，通常没有必要将中间结果保留在内存中。使用我们在第 6 章中展示的 Datasets
    上的*流水线*，数据可以改为在存储之间流式传输以提高性能。⁸ 其思想是仅加载当前执行转换所需的数据部分。这可以显著减少转换的内存占用，并通常加快整体执行速度。


    ### 有状态执行


    Ray Train 和 RLlib 为其分布式训练工作节点生成 Actor。正如多次演示的那样，这两个库也与 Tune 无缝集成。在第 5 章中，我们详细介绍了
    Tune 如何启动试验，这些试验本质上是执行特定工作负载的 Actor 组。如果你将 Train 或 RLlib 与 Tune 一起使用，这反过来意味着会创建一个
    Actor 树，即每个 Tune 试验一个 Actor，以及 Train 或 RLlib 请求的并行训练工作节点的子 Actor。


    在工作负载执行方面，这自然创建了一个内层和一个外层。Tune 试验中的每个子 Actor 对其工作负载拥有完全自主权，如你指定的相应 Train 或 RLlib
    训练运行中所要求的。这代表了内层执行。在外层，Tune 需要监控各个试验的状态，它通过定期向试验驱动程序报告指标来实现。图 10-9 说明了此场景下 Ray
    Actor 的这种嵌套创建和执行。


    ![](img/6489687a3a178f2884963bddc928992c_231_0.png)


    图 10-9. 使用 Tune 在 AIR 上运行分布式训练


    ### 复合工作负载执行


    复合工作负载同时利用基于任务和基于 Actor 的计算。这可能导致有趣的资源分配挑战。试验 Actor 需要预先保留其资源，但无状态任务则不需要。你可能遇到的问题是，所有可用资源可能都被你的训练
    Actor 预留，而没有剩余资源用于数据加载任务。


    AIR 通过允许 Tune 最多保留节点 CPU 的 80% 来防止这种情况。你可以调整此参数，但这是一个合理的默认值，可确保无状态计算的基本资源可用性。在你的训练操作利用
    GPU 而数据处理步骤不利用的常见情况下，这将成为一个非问题。


    ### 在线服务执行


    对于在线服务，Ray Serve 管理一个无状态 Actor 池来服务你的请求。一些 Actor 监听传入的请求，并调用其他 Actor 来执行预测。请求使用轮询算法自动负载均衡到托管模型的
    Actor 池。负载指标被发送到 Serve 组件以执行自动扩展。


    ## AIR 内存管理


    在本节中，我们将深入探讨 AIR 的特定内存管理技术。我们将讨论 AIR 在多大程度上使用 Ray 对象存储。如果你觉得它太技术性，可以跳过本节。要点是 Ray
    采用了智能技术，确保你的数据和计算得到适当的分发和调度。


    当你使用 Ray Datasets 加载数据时，你已经知道这些 Datasets 在内部被分区为集群中的数据块。一个块只是 Ray 对象的集合。选择正确的块大小很困难，并且需要在管理过多小块的开销和因块过大而导致内存不足（OOM）异常的风险之间进行权衡。AIR
    采取务实的方法，尝试以不超过 512 MB 的块大小进行分发。如果无法确保这一点，将发出警告。如果一个块无法放入内存，AIR 将把你的数据溢出到本地磁盘。


    你的有状态工作负载将不同程度地使用 Ray 对象存储。例如，RLlib 使用 Ray 对象将模型权重广播到各个 rollout 工作节点，并用于经验数据收集。Tune
    使用它通过发送和检索 AIR Checkpoint 来设置试验。出于技术原因，如果 Actor 太多，可能会遇到 OOM 问题。



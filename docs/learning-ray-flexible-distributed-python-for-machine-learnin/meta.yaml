    ```


    In particular, this output shows that the minimum reward attained on average per
    episode is 1.0, which in turn means that the agent always reached the goal and
    collected the maximum reward (1.0).


    8 If you set num_rollout_workers to 0, only the local worker on the head node
    will be created, and all sampling from the env is done there. This is particularly
    useful for debugging, as no additional Ray actor processes are spawned.'
  - "[PAGE 98]\n\n# Saving, loading, and evaluating RLlib models\n\nReaching the goal\
    \ for this simple example isn't too difficult, but let's see if evaluating the\
    \ trained algorithm confirms that the agent can also do so in an optimal way,\
    \ namely, by taking only the minimum number of eight steps to reach the goal.\n\
    \nTo do so, we utilize another mechanism that you've already seen from the RLlib\
    \ CLI: *checkpointing*. Creating algorithm checkpoints is useful to ensure you\
    \ can recover your work in case of a crash or simply to track training progress\
    \ persistently. You can create a checkpoint of an RLlib algorithm at any point\
    \ in the training process by calling `algo.save()`. Once you have a checkpoint,\
    \ you can easily restore your Algorithm with it. Evaluating a model is as simple\
    \ as calling `algo.evaluate(checkpoint)` with the checkpoint you created. Here's\
    \ how it looks if you put it all together:\n\n```\nfrom ray.rllib.algorithms.algorithm\
    \ import Algorithm\n\ncheckpoint = algo.save()  # 1\nprint(checkpoint)\n\nevaluation\
    \ = algo.evaluate()  # 2\nprint(pretty_print(evaluation))\n\nalgo.stop()  # 3\n\
    restored_algo = Algorithm.from_checkpoint(checkpoint)  # 4\n```\n\n+   1. Save\
    \ algorithms to create checkpoints.\n2. Evaluate RLlib algorithms at any point\
    \ in time by calling evaluate.\n3. Stop an algo to free all claimed resources.\n\
    4. Restore any Algorithm from a given checkpoint with from_checkpoint.\n\nLooking\
    \ at the output of this example, we can now confirm that the trained RLlib algorithm\
    \ did indeed converge to a good solution for the maze problem, as indicated by\
    \ episodes of length 8 in evaluation:\n\n```\n~/ray_results/DQN_GymEnvironment_2022-02-09_10-19-301o3m9r6d/checkpoint_000010/\n\
    checkpoint-10 evaluation:\n...\nepisodes_this_iter: 5\nhist_stats:\n  episode_lengths:\n\
    \  - 8\n  - 8\n  ...\n```"
  - "[PAGE 99]\n\n# Computing actions\n\nRLlib algorithms have much more functionality\
    \ than just the train, evaluate, save, and from_checkpoint methods we've seen\
    \ so far. For example, you can directly compute actions given the current state\
    \ of an environment. In Chapter 3 we implemented episode rollouts by stepping\
    \ through an environment and collecting rewards. We can easily do the same with\
    \ RLlib for our GymEnvironment:\n\n```\nenv = GymEnvironment()\ndone = False\n\
    total_reward = 0\nobservations = env.reset()\n\nwhile not done:\n    action =\
    \ algo.compute_single_action(observations)\n    observations, reward, done, info\
    \ = env.step(action)\n    total_reward += reward\n```\n\nTo compute actions for\
    \ given observations, use compute_single_action.\n\nIn case you should need to\
    \ compute many actions at once, not just a single one, you can use the compute_actions\
    \ method instead, which takes dictionaries of observations as input and produces\
    \ dictionaries of actions with the same dictionary keys as output:\n\n```\naction\
    \ = algo.compute_actions(\n    {\"obs_1\": observations, \"obs_2\": observations}\n\
    )\nprint(action)\n# {'obs_1': 0, 'obs_2': 1}\n```\n\nFor multiple actions, use\
    \ compute_actions.\n\n# Accessing policy and model states\n\nRemember that each\
    \ reinforcement learning algorithm is based on a policy that chooses next actions\
    \ given the agent's current observations of the environment. Each policy is in\
    \ turn based on an underlying model.\n\nIn the case of vanilla Q-Learning that\
    \ we discussed in Chapter 3, the model was a simple lookup table of state-action\
    \ values, also called Q-values. And that policy used this model for predicting\
    \ next actions in case it decided to exploit what the model had learned so far\
    \ or to explore the environment with random actions otherwise.\n\nWhen using Deep\
    \ Q-Learning, the underlying model of the policy is a neural network that, loosely\
    \ speaking, maps observations to actions. Note that for choosing next actions\
    \ in an environment, we're ultimately not interested in the concrete values of\
    \ the approximated Q-values, but rather in the probabilities of taking each action.\
    \ The probability distribution over all possible actions is called an action distribution."
- md: "In the maze we're using as a running example, we can move up, right, down,\
    \ or left. So, in our case an action distribution is a vector of four probabilities,\
    \ one for each action. In the case of Q-Learning, the algorithm will always *greedily*\
    \ choose the action with the highest probability of this distribution, while other\
    \ algorithms will sample from it.\n\nTo make things concrete, let's look at how\
    \ you access policies and models in RLlib:⁹\n\n```\npolicy = algo.get_policy()\n\
    print(policy.get_weights())\n\nmodel = policy.model\n```\n\nBoth `policy` and\
    \ `model` have many useful methods to explore. In this example we use `get_weights`\
    \ to inspect the parameters of the model underlying the policy (which are called\
    \ *weights* by standard convention).\n\nTo convince you that not just one model\
    \ is at play here but in fact a collection of models,¹⁰ we can access all the\
    \ workers we used in training and then ask each worker's policy for their weights\
    \ using `foreach_worker`:\n\n```\nworkers = algo.workers\nworkers.foreach_worker(\n\
    \    lambda remote_trainer: remote_trainer.get_policy().get_weights()\n)\n```\n\
    \nIn this way, you can access every method available on an `Algorithm` instance\
    \ on each of your workers. In principle, you can use this to *set* model parameters\
    \ as well, or otherwise configure your workers. RLlib workers are ultimately Ray\
    \ actors, so you can alter and manipulate them in almost any way you like.\n\n\
    We haven't talked about the specific implementation of Deep Q-Learning used in\
    \ DQN, but the model used is a bit more complex than what we've described so far.\
    \ Every RLlib model obtained from a policy has a `base_model` that has a neat\
    \ `summary` method to describe itself:¹¹\n\n```\nmodel.base_model.summary()\n\
    ```\n\n⁹ The Policy class in RLlib today will be replaced in a future release.\
    \ The new Policy class will likely be a drop-in replacement for the most part\
    \ and exhibit some minor differences. The idea of the class remains the same,\
    \ though: a *policy* is a class that encapsulates the logic of choosing actions\
    \ given observations, and it gives you access to the underlying models used.\n\
    \n¹⁰ Technically speaking, only the *local* model is used for actual training.\
    \ The two worker models are used for action computation and data collection (rollouts).\
    \ After each training step, the local model sends its current weights to the workers\
    \ for synchronization. Fully distributed training, as opposed to distributed sampling,\
    \ will be available across all RLlib algorithms in future Ray versions.\n\n¹¹\
    \ This is true by default, since we're using TensorFlow and Keras under the hood.\
    \ Should you opt to change the framework specification of your algorithm to work\
    \ with PyTorch directly, do `print(model)`, in which case `model` is a `torch.nn.Module`.\
    \ Access to the underlying model will be unified across all frameworks in the\
    \ future.\n\nAs you can see from the following output, this model takes in our\
    \ observations. The shape of these observations is a bit strangely annotated as\
    \ [(None, 25)], but essentially this means we have the expected 5 × 5 maze grid\
    \ values correctly encoded. The model follows with two so-called Dense layers\
    \ and predicts a single value at the end:¹²\n\n```\nModel: \"model\"\n__________________________________________________________________________________________________\n\
    Layer (type)                    Output Shape         Param #     Connected to\
    \                     \n==================================================================================================\n\
    observations (InputLayer)       [(None, 25)]         0                       \
    \                     \n__________________________________________________________________________________________________\n\
    fc_1 (Dense)                    (None, 256)          6656        observations[0][0]\
    \                \n__________________________________________________________________________________________________\n\
    fc_out (Dense)                  (None, 256)          65792       fc_1[0][0]  \
    \                      \n__________________________________________________________________________________________________\n\
    value_out (Dense)               (None, 1)            257         fc_1[0][0]  \
    \                      \n==================================================================================================\n\
    Total params: 72,705\nTrainable params: 72,705\nNon-trainable params: 0\n__________________________________________________________________________________________________\n\
    ```\n\nNote that it's perfectly possible to customize this model for your RLlib\
    \ experiments. If your environment is complex and has a big observation space,\
    \ for instance, you might need a bigger model to capture that complexity. However,\
    \ doing so requires in-depth knowledge of the underlying neural network framework\
    \ (in this case TensorFlow), which we don't assume you have.¹³\n\n## State-Action\
    \ Values and State-Value Functions\n\nSo far we've been mostly concerned with\
    \ the concept of state-action values, since this concept takes center stage in\
    \ the formulation of Q-Learning that we used extensively so far. The model we\
    \ just had a look at has a dedicated output (in deep learning terms called a *head*)\
    \ for predicting Q-values. You can access and summarize this part of the model\
    \ through `model.q_value_head.summary()`.\n\nIn contrast it's also possible to\
    \ ask how valuable a particular *state* is, without specifying an action that\
    \ pairs with it. This leads to the concept of *state-value functions*, or simply\
    \ *value functions*, that are very important in the RL literature. We can't go\
    \ into more detail in this RLlib introduction, but note that you have access to\
    \ a *value function head* as well through `model.state_value_head.summary()`.\n\
    \n¹² The \"value\" output of this network represents the Q-value of state-action\
    \ pairs.\n\n¹³ To learn more about customizing your RLlib models, check out the\
    \ guide to custom models in the Ray documentation.\n\nNext, let's see if we can\
    \ take some observations from our environment and pass them to the model we just\
    \ extracted from our policy. This part is a bit technically involved because models\
    \ are a bit more difficult to access directly in RLlib. Normally you would only\
    \ interface with a model through your policy, which takes care of preprocessing\
    \ the observations, among other things. Luckily, we can access the preprocessor\
    \ used by the policy, transform the observations from our environment, and then\
    \ pass them to the model:\n\n```\nfrom ray.rllib.models.preprocessors import get_preprocessor\n\
    \nenv = GymEnvironment()\nobs_space = env.observation_space\npreprocessor = get_preprocessor(obs_space)(obs_space)\n\
    \nobservations = env.reset()\ntransformed = preprocessor.transform(observations).reshape(1,\
    \ -1)\n\nmodel_output, _ = model({\"obs\": transformed})\n```\n\n1. Use `get_preprocessor`\
    \ to access the preprocessor used by the policy.\n2. You can use `transform` on\
    \ any observations obtained from your env to the format expected by the model.\
    \ Note that we need to reshape the observations too.\n3. Get the model output\
    \ by calling the model on a preprocessed observation dictionary.\n\nHaving computed\
    \ our `model_output`, we can now access the Q-values and the action distribution\
    \ of the model for this output:\n\n```\nq_values = model.get_q_value_distributions(model_output)\n\
    print(q_values)\n\naction_distribution = policy.dist_class(model_output, model)\n\
    sample = action_distribution.sample()\nprint(sample)\n```\n\n1. The `get_q_value_distributions`\
    \ method is specific to DQN models only.\n2. By accessing `dist_class` we get\
    \ the policy's action distribution class.\n3. Action distributions can be sampled\
    \ from.\n\n## Configuring RLlib Experiments\n\nNow that you've seen the basic\
    \ Python training API of RLlib in an example, let's take a step back and discuss\
    \ in more depth how to configure and run RLlib experiments. By now you know that\
    \ to define an Algorithm, you start with the respective AlgorithmConfig and then\
    \ build your algorithm from it. So far we've used only the `rollout` method of\
    \ an AlgorithmConfig to set the number of rollout workers to two, and set our\
    \ environment accordingly.\n\nIf you want to alter the behavior of your RLlib\
    \ training run, chain more utility methods onto the AlgorithmConfig instance and\
    \ then call `build` on it at the end. As RLlib algorithms are fairly complex,\
    \ they come with many configuration options. To make things easier, the common\
    \ properties of algorithms are naturally grouped into useful categories.¹⁴ Each\
    \ such category comes with its own respective AlgorithmConfig method:\n\n- **training()**\n\
    \  Takes care of all training-related configuration options of your algorithm.\
    \ The training method is the one place that RLlib algorithms differ in their configuration.\
    \ All the following methods are algorithm-agnostic.\n- **environment()**\n  Configures\
    \ all aspects of your environment.\n- **rollouts()**\n  Modifies the setup and\
    \ behavior of your rollout workers.\n- **exploration()**\n  Alters the behavior\
    \ of your exploration strategy.\n- **resources()**\n  Configures the compute resources\
    \ used by your algorithm.\n- **offline_data()**\n  Defines options for training\
    \ with so-called offline data, a topic we cover in \"Working with Offline Data\"\
    \ on page 97.\n- **multi_agent()**\n  Specifies options for training algorithms\
    \ using *multiple agents*. We discuss an explicit example of this in the next\
    \ section.\n\n¹⁴ We list only the methods we introduce in this chapter. Apart\
    \ from those we mention, you also find options for evaluation of your algorithms,\
    \ reporting, debugging, checkpointing, adding callbacks, altering your deep learning\
    \ framework, requesting resources, and accessing experimental features."
  mdcn: "在我们作为示例的迷宫中，我们可以向上、向右、向下或向左移动。因此，在我们的案例中，动作分布是一个包含四个概率的向量，每个动作对应一个概率。在Q-Learning的情况下，算法总是会*贪婪地*选择该分布中概率最高的动作，而其他算法则会从中进行采样。\n\
    \n为了具体说明，让我们看看如何在RLlib中访问策略和模型：⁹\n\n```\npolicy = algo.get_policy()\nprint(policy.get_weights())\n\
    \nmodel = policy.model\n```\n\n`policy`和`model`都有许多有用的方法可供探索。在这个例子中，我们使用`get_weights`来检查策略底层模型的参数（按照标准惯例，这些参数被称为*权重*）。\n\
    \n为了让你相信这里起作用的不仅仅是一个模型，而实际上是一组模型，¹⁰我们可以访问训练中使用的所有工作者，然后使用`foreach_worker`向每个工作者的策略请求其权重：\n\
    \n```\nworkers = algo.workers\nworkers.foreach_worker(\n    lambda remote_trainer:\
    \ remote_trainer.get_policy().get_weights()\n)\n```\n\n通过这种方式，你可以访问`Algorithm`实例上每个工作者的所有可用方法。原则上，你也可以用它来*设置*模型参数，或者以其他方式配置你的工作者。RLlib工作者本质上是Ray\
    \ actors，因此你几乎可以以任何你喜欢的方式修改和操作它们。\n\n我们还没有讨论DQN中使用的深度Q-Learning的具体实现，但所使用的模型比我们目前描述的要复杂一些。从策略获得的每个RLlib模型都有一个`base_model`，它有一个简洁的`summary`方法来描述自身：¹¹\n\
    \n```\nmodel.base_model.summary()\n```\n\n⁹ RLlib中的Policy类将在未来版本中被替换。新的Policy类很可能在大多数情况下可以无缝替换，并表现出一些细微的差异。该类的核心思想保持不变：*策略*是一个封装了根据观测选择动作逻辑的类，它让你能够访问底层使用的模型。\n\
    \n¹⁰ 严格来说，只有*本地*模型用于实际训练。两个工作者模型用于动作计算和数据收集（rollouts）。在每个训练步骤之后，本地模型会将其当前权重发送给工作者进行同步。完全分布式训练（相对于分布式采样）将在未来Ray版本中适用于所有RLlib算法。\n\
    \n¹¹ 这是默认情况，因为我们底层使用的是TensorFlow和Keras。如果你选择将算法的框架规范更改为直接使用PyTorch，请执行`print(model)`，此时`model`是一个`torch.nn.Module`。未来，对底层模型的访问将在所有框架中统一。\n\
    \n从以下输出可以看出，该模型接收我们的观测。这些观测的形状被奇怪地标注为[(None, 25)]，但这本质上意味着我们正确编码了预期的5×5迷宫网格值。模型随后是两个所谓的全连接层，并在最后预测一个单一值：¹²\n\
    \n```\nModel: \"model\"\n__________________________________________________________________________________________________\n\
    Layer (type)                    Output Shape         Param #     Connected to\
    \                     \n==================================================================================================\n\
    observations (InputLayer)       [(None, 25)]         0                       \
    \                     \n__________________________________________________________________________________________________\n\
    fc_1 (Dense)                    (None, 256)          6656        observations[0][0]\
    \                \n__________________________________________________________________________________________________\n\
    fc_out (Dense)                  (None, 256)          65792       fc_1[0][0]  \
    \                      \n__________________________________________________________________________________________________\n\
    value_out (Dense)               (None, 1)            257         fc_1[0][0]  \
    \                      \n==================================================================================================\n\
    Total params: 72,705\nTrainable params: 72,705\nNon-trainable params: 0\n__________________________________________________________________________________________________\n\
    ```\n\n请注意，完全有可能为你的RLlib实验自定义此模型。例如，如果你的环境很复杂且具有很大的观测空间，你可能需要一个更大的模型来捕捉这种复杂性。然而，这样做需要深入了解底层的神经网络框架（在本例中是TensorFlow），我们并不假设你具备这些知识。¹³\n\
    \n## 状态-动作值与状态值函数\n\n到目前为止，我们主要关注的是状态-动作值的概念，因为这个概念在我们广泛使用的Q-Learning公式中占据核心地位。我们刚刚查看的模型有一个专门的输出（在深度学习术语中称为*头*）来预测Q值。你可以通过`model.q_value_head.summary()`访问并总结模型的这一部分。\n\
    \n相比之下，也可以询问一个特定*状态*有多有价值，而不指定与之配对的动作。这引出了*状态值函数*或简称*值函数*的概念，这在强化学习文献中非常重要。我们无法在这篇RLlib介绍中深入探讨更多细节，但请注意，你也可以通过`model.state_value_head.summary()`访问*值函数头*。\n\
    \n¹² 该网络的“value”输出代表状态-动作对的Q值。\n\n¹³ 要了解更多关于自定义RLlib模型的信息，请查看Ray文档中的自定义模型指南。\n\
    \n接下来，让我们看看是否可以从环境中获取一些观测，并将它们传递给我们刚刚从策略中提取的模型。这部分在技术上有点复杂，因为在RLlib中直接访问模型有点困难。通常，你只会通过策略与模型交互，策略负责预处理观测以及其他事情。幸运的是，我们可以访问策略使用的预处理器，转换来自环境的观测，然后将它们传递给模型：\n\
    \n```\nfrom ray.rllib.models.preprocessors import get_preprocessor\n\nenv = GymEnvironment()\n\
    obs_space = env.observation_space\npreprocessor = get_preprocessor(obs_space)(obs_space)\n\
    \nobservations = env.reset()\ntransformed = preprocessor.transform(observations).reshape(1,\
    \ -1)\n\nmodel_output, _ = model({\"obs\": transformed})\n```\n\n1. 使用`get_preprocessor`访问策略使用的预处理器。\n\
    2. 你可以对从环境中获得的任何观测使用`transform`，将其转换为模型期望的格式。注意我们还需要重塑观测。\n3. 通过在预处理后的观测字典上调用模型来获取模型输出。\n\
    \n计算出`model_output`后，我们现在可以访问模型的Q值和该输出的动作分布：\n\n```\nq_values = model.get_q_value_distributions(model_output)\n\
    print(q_values)\n\naction_distribution = policy.dist_class(model_output, model)\n\
    sample = action_distribution.sample()\nprint(sample)\n```\n\n1. `get_q_value_distributions`方法仅适用于DQN模型。\n\
    2. 通过访问`dist_class`，我们获得策略的动作分布类。\n3. 动作分布可以进行采样。\n\n## 配置RLlib实验\n\n既然你已经通过一个示例了解了RLlib的基本Python训练API，让我们退一步，更深入地讨论如何配置和运行RLlib实验。到现在你已经知道，要定义一个Algorithm，你需要从相应的AlgorithmConfig开始，然后从中构建你的算法。到目前为止，我们只使用了AlgorithmConfig的`rollout`方法来将rollout工作者数量设置为两个，并相应地设置我们的环境。\n\
    \n如果你想改变RLlib训练运行的行为，请在AlgorithmConfig实例上链接更多实用方法，最后调用`build`。由于RLlib算法相当复杂，它们提供了许多配置选项。为了简化，算法的常见属性被自然地分组到有用的类别中。¹⁴\
    \ 每个这样的类别都有其对应的AlgorithmConfig方法：\n\n- **training()**\n  处理算法所有与训练相关的配置选项。训练方法是RLlib算法在配置上有所不同的地方。以下所有方法都与算法无关。\n\
    - **environment()**\n  配置环境的所有方面。\n- **rollouts()**\n  修改rollout工作者的设置和行为。\n-\
    \ **exploration()**\n  改变探索策略的行为。\n- **resources()**\n  配置算法使用的计算资源。\n- **offline_data()**\n\
    \  定义使用所谓离线数据进行训练的选项，这是我们在第97页“使用离线数据”中涵盖的主题。\n- **multi_agent()**\n  指定使用*多个智能体*训练算法的选项。我们将在下一节讨论一个具体的例子。\n\
    \n¹⁴ 我们只列出了本章介绍的方法。除了我们提到的那些，你还可以找到用于评估算法、报告、调试、检查点、添加回调、更改深度学习框架、请求资源和访问实验性功能的选项。"

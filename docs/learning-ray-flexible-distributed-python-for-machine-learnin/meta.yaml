  md: "# Building an Advanced Environment\n\nLet's make our maze GymEnvironment a\
    \ bit more challenging. First, we increase its size from a 5 × 5 to an 11 × 11\
    \ grid. Then we introduce obstacles in the maze that the agent can pass through\
    \ but only by incurring a penalty, a negative reward of -1. This way our seeker\
    \ agent will have to learn to avoid obstacles while still finding the goal. Also,\
    \ we randomize the agent's starting position. All of this makes the RL problem\
    \ harder to solve. Let's look at the initialization of this new AdvancedEnv first:\n\
    \n```\nfrom gym.spaces import Discrete\nimport random\nimport os\n\nclass AdvancedEnv(GymEnvironment):\n\
    \n    def __init__(self, seeker=None, *args, **kwargs):\n        super().__init__(*args,\
    \ **kwargs)\n        self.maze_len = 11\n        self.action_space = Discrete(4)\n\
    \        self.observation_space = Discrete(self.maze_len * self.maze_len)\n\n\
    \        if seeker: ①\n            assert 0 <= seeker[0] < self.maze_len and \\\
    n                   0 <= seeker[1] < self.maze_len\n            self.seeker =\
    \ seeker\n        else:\n            self.reset()\n\n        self.goal = (self.maze_len-1,\
    \ self.maze_len-1)\n        self.info = {'seeker': self.seeker, 'goal': self.goal}\n\
    \n        self.punish_states = [ ②\n            (i, j) for i in range(self.maze_len)\
    \ for j in range(self.maze_len)\n            if i % 2 == 1 and j % 2 == 0\n  \
    \      ]\n```\n\n+   1. Set the seeker position upon initialization.\n2. Introduce\
    \ punish_states as obstacles for the agent.\n\nNext, when resetting the environment,\
    \ we want to make sure to reset the agent's position to a random state.20 We also\
    \ increase the positive reward for reaching the goal to 5 to offset the negative\
    \ reward for passing through an obstacle (which will\n\n> 20 In the definition\
    \ of reset, we allow the seeker to reset on top of the goal to keep the definition\
    \ simpler. Allowing this trivial edge case does not affect learning."
  merge: -1
  pgno: 115
- img_proc: true
  md: "happen a lot before the RL algorithm picks up on the obstacle locations). Balancing\
    \ rewards like this is a crucial task in calibrating your RL experiments:\n\n\
    ```\ndef reset(self):\n    \"\"\"Reset seeker position randomly, return observations.\"\
    \"\"\n    self.seeker = (\n        random.randint(0, self.maze_len - 1),\n   \
    \     random.randint(0, self.maze_len - 1)\n    )\n    return self.get_observation()\n\
    \ndef get_observation(self):\n    \"\"\"Encode the seeker position as integer\"\
    \"\"\n    return self.maze_len * self.seeker[0] + self.seeker[1]\n\ndef get_reward(self):\n\
    \    \"\"\"Reward finding the goal and punish forbidden states\"\"\"\n    reward\
    \ = -1 if self.seeker in self.punish_states else 0\n    reward += 5 if self.seeker\
    \ == self.goal else 0\n    return reward\n\ndef render(self, *args, **kwargs):\n\
    \    \"\"\"Render the environment, e.g. by printing its representation.\"\"\"\n\
    \    os.system('cls' if os.name == 'nt' else 'clear')\n    grid = [['|' + ' '\
    \ for _ in range(self.maze_len)] +\n            ['|\\n'] for _ in range(self.maze_len)]\n\
    \    for punish in self.punish_states:\n        grid[punish[0]][punish[1]] = '|X'\n\
    \    grid[self.goal[0]][self.goal[1]] = '|G'\n    grid[self.seeker[0]][self.seeker[1]]\
    \ = '|S'\n    print(''.join([''.join(grid_row) for grid_row in grid]))\n```\n\n\
    There are many other ways you could make this environment more difficult, like\
    \ making it much bigger, introducing a negative reward for every step the agent\
    \ takes in a certain direction, or punishing the agent for trying to walk off\
    \ the grid. By now you should understand the problem setting well enough to customize\
    \ the maze further.\n\nWhile you might have success training this environment,\
    \ this is a good opportunity to introduce some advanced concepts that you can\
    \ apply to other RL problems.\n\n# Applying Curriculum Learning\n\nOne of the\
    \ most interesting features of RLlib is providing an Algorithm with a curriculum\
    \ to learn from. Instead of letting the algorithm learn from arbitrary environment\
    \ setups, we cherry-pick states that are much easier to learn from and then slowly\
    \ but surely introduce more difficult states. Building a learning curriculum is\
    \ a great way to make your experiments converge to solutions quicker. To apply\
    \ curriculum learning, the only thing you need is a view on which starting states\
    \ are easier than others. This can be a challenge for many environments, but it's\
    \ easy to come up with a simple"
  merge: -1
  pgno: 116
- img_proc: true
  md: "curriculum for our advanced maze. Namely, the distance of the seeker from the\
    \ goal can be used as a measure of difficulty. The distance measure we'll use\
    \ for simplicity is the sum of the absolute distance of both seeker coordinates\
    \ from the goal to define a difficulty.\n\nTo run curriculum learning with RLlib,\
    \ we define a CurriculumEnv that extends both our AdvancedEnv and a so-called\
    \ TaskSettableEnv from RLlib. The interface of TaskSettableEnv is very simple\
    \ in that you have to define only how to get the current difficulty (get_task)\
    \ and how to set a required difficulty (set_task). Here's the full definition\
    \ of this CurriculumEnv:\n\n```\nfrom ray.rllib.env.apis.task_settable_env import\
    \ TaskSettableEnv\n\nclass CurriculumEnv(AdvancedEnv, TaskSettableEnv):\n\n  \
    \  def __init__(self, *args, **kwargs):\n        AdvancedEnv.__init__(self)\n\n\
    \    def difficulty(self): ①\n        return abs(self.seeker[0] - self.goal[0])\
    \ + \\n               abs(self.seeker[1] - self.goal[1])\n\n    def get_task(self):\
    \ ②\n        return self.difficulty()\n\n    def set_task(self, task_difficulty):\
    \ ③\n        while not self.difficulty() <= task_difficulty:\n            self.reset()\n\
    ```\n\n+   ① Define the difficulty of the current state as the sum of the absolute\
    \ distance of both seeker coordinates from the goal.\n② To define get_task we\
    \ can then simply return the current difficulty.\n③ To set a task difficulty,\
    \ we reset the environment until its difficulty is *at most* the specified task_difficulty.\n\
    \nTo use this environment for curriculum learning, we need to define a curriculum\
    \ function that tells the algorithm when and how to set the task difficulty. We\
    \ have many options here, but we use a schedule that simply increases the difficulty\
    \ by one every 1,000 time steps trained:\n\n```\ndef curriculum_fn(train_results,\
    \ task_settable_env, env_ctx):\n    time_steps = train_results.get(\"timesteps_total\"\
    )\n    difficulty = time_steps // 1000\n    print(f\"Current difficulty: {difficulty}\"\
    )\n    return difficulty\n```"
  merge: -1

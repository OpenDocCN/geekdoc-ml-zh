    ## About the Authors


    **Max Pumperla** is a data science professor and software engineer located in
    Hamburg, Germany. He’s an active open source contributor, maintainer of several
    Python packages, author of machine learning books, and speaker at international
    conferences. He currently works as a software engineer at Anyscale. As head of
    product research at Pathmind Inc. he developed reinforcement learning solutions
    for industrial applications at scale using Ray RLlib, Serve, and Tune. Max has
    been a core developer of DL4J at Skymind, helped grow and extend the Keras ecosystem,
    and is a Hyperopt maintainer.


    **Edward Oakes** is a software engineer and team lead at Anyscale, where he leads
    the development of Ray Serve and is one of the top open source contributors to
    Ray. Prior to Anyscale, he was a graduate student in the EECS department at UC
    Berkeley.


    **Richard Liaw** is a software engineer at Anyscale, working on open source tools
    for distributed machine learning. He is on leave from the PhD program at the Computer
    Science Department at UC Berkeley, advised by Joseph Gonzalez, Ion Stoica, and
    Ken Goldberg.


    ## Colophon


    The animal on the cover of *Learning Ray* is a marbled electric ray (*Torpedo
    marmorata*), also known as a torpedo ray. Marbled electric rays can be found in
    the eastern Atlantic Ocean from Africa to Norway, as well as in the Mediterranean
    Sea. They are bottom dwellers, preferring to live in shallow to moderately deep
    water in rocky reefs, seagrass beds, and muddy flats.


    Marbled electric rays are mottled brown and black, camouflaging them in the muddy
    waters where they hide during the day. At night, the rays emerge to hunt and forage
    for small fish such as gobies, mullet, mackerel, and damselfish. These rays can
    grow up to 2 feet long, expand their jaws to swallow fish larger than their mouths,
    and kill with an electric charge of up to 200 volts.


    Because these rays are capable of electrocution, they have few natural predators.
    Many of the animals on O’Reilly covers are endangered; all of them are important
    to the world.


    The cover illustration is by Karen Montgomery, based on an antique line engraving
    from Lydekker’s *Royal Natural History*. The cover fonts are Gilroy Semibold and
    Guardian Sans. The text font is Adobe Minion Pro; the heading font is Adobe Myriad
    Condensed; and the code font is Dalton Maag’s Ubuntu Mono.



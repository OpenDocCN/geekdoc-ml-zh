    2022 increased the support for complex ML workloads in Ray even further. AIR is
    a collection of libraries and tools that make it easy to build and deploy end-to-end
    ML applications in a single distributed system. With AIR, even the most complex
    workflows can usually be expressed as a *single Python script*. That means you
    can run your programs locally first, which can make a big difference in terms
    of debugging and development speed.


    Data scientists benefit from Ray because they can rely on a growing ecosystem
    of Ray ML libraries and third-party integrations. Ray AIR helps you to quickly
    prototype ideas and go more easily from development to production. Unlike many
    other distributed systems, Ray has native support for GPUs as well, which can
    be particularly important to roles like ML engineers. To support data engineers,
    Ray also has tight integrations with tools like Kubernetes and can be deployed
    in multicloud setups.'
  - '[PAGE 15]


    And you can use it as a unified compute layer to provide scaling, fault tolerance,
    scheduling, and orchestration of your workloads. In other words, it''s well worth
    investing in *learning Ray* for a variety of roles.


    # Who Should Read This Book


    It''s likely that you picked up this book because you''re interested in some aspects
    of Ray. Maybe you''re a distributed systems engineer who wants to know how Ray''s
    engine works. You might also be a software developer interested in picking up
    a new technology. Or you could be a data engineer who wants to evaluate how Ray
    compares to similar tools. You could also be a machine learning practitioner or
    data scientist who needs to find ways to scale experiments.


    No matter your concrete role, the common denominator to get the most out of this
    book is to feel comfortable programming in Python. This book''s examples are written
    in Python, and an intermediate knowledge of the language is a requirement. Explicit
    is better than implicit, as you know full well as a Pythonista. So, let us be
    explicit by saying that knowing Python implies to me that you know how to use
    the command line on your system, how to get help when stuck, and how to set up
    a programming environment on your own.


    If you''ve never worked with distributed systems before, that''s OK. We cover
    all the basics you need to get started with that in the book. On top of that,
    you can run most code examples presented here on your laptop. Covering the basics
    means that we can''t go into too much detail about distributed systems. This book
    is ultimately focused on application developers using Ray, specifically for data
    science and ML.


    For the later chapters of this book, you''ll need some familiarity with ML, but
    we don''t expect you to have worked in the field. In particular, you should have
    a basic understanding of the ML paradigm and how it differs from traditional programming.
    You should also know the basics of using NumPy and Pandas. Also, you should at
    least feel comfortable *reading* examples using the popular TensorFlow and PyTorch
    libraries. It''s enough to follow the flow of the code, on the API level, but
    you don''t need to know how to write your own models. We cover examples using
    both dominant deep learning libraries (TensorFlow and PyTorch) to illustrate how
    you can use Ray for ML workloads, regardless of your preferred framework.


    We cover a lot of ground in advanced ML topics, but the main focus is on Ray as
    a technology and how to use it. The ML examples we discuss might be new to you
    and could require a second reading, but you can still focus on Ray''s API and
    how to use it in practice. Knowing the requirements, here''s what you might get
    out of this book:'
- md: 'If you are a data scientist, Ray will open up new ways for you to think about
    and build distributed ML applications. You will know how to do hyperparameter
    selection for your experiments at scale, gain practical knowledge on large-scale
    model training, and get to know a state-of-the-art reinforcement learning library.

    - If you are a data engineer, you will learn to use Ray Datasets for large-scale
    data ingesting, how to improve your pipelines by leveraging tools such as Dask
    on Ray, and how to effectively deploy models at scale.

    - If you are an engineer, you will understand how Ray works under the hood, how
    to run and scale Ray Clusters in the cloud, and how Ray can be used to build applications
    that integrate with projects you know.


    You can learn all of these topics regardless of your role, of course. Our hope
    is that by the end of this book, you will have learned to appreciate Ray for all
    its strengths.


    ## Goals of This Book


    This book was written primarily for readers who are new to Ray and want to get
    the most out of it quickly. We chose the material in such a way that you will
    understand the core ideas behind Ray and learn to use its main building blocks.
    Having read it, you will feel comfortable navigating more complex topics on your
    own that go beyond this introduction.


    We should also be clear about what this book is not. It’s not built to give you
    the most information possible, like API references or definitive guides. It’s
    also not crafted to help you tackle concrete tasks, like how-to guides or cookbooks
    do. This book is focused on learning and understanding Ray and giving you interesting
    examples to start with.


    Software develops and deprecates quickly, but the fundamental concepts underlying
    software often remain stable even across major release cycles. We’re trying to
    strike a balance here between conveying ideas and providing you with concrete
    code examples. The ideas you find in this book will ideally remain useful even
    when the code eventually needs updating.


    While Ray’s documentation keeps getting better, we do believe that books can offer
    qualities that are difficult to match in a project’s documentation. Since you’re
    reading these lines, we realize we might be knocking down open doors with this
    statement. But some of the best tech books we know spark interest in a project
    and make you want to dig through terse API references that you’d never have touched
    otherwise. We hope this is one of those books.


    ## Navigating This Book


    We organized this book to guide you naturally from core concepts to more sophisticated
    topics of Ray. Many of the ideas explained come with example code that you can
    find in the book’s [GitHub repo](https://github.com/).


    In a nutshell, the first three chapters of the book teach the basics of Ray as
    a distributed Python framework with practical examples. Chapters 4 to 10 introduce
    Ray’s high-level libraries and show how to build applications with them. The last
    chapter gives you a conclusive overview of Ray’s ecosystem and shows you where
    to go next. Here’s what you can expect from each chapter:


    *Chapter 1, “An Overview of Ray”*

    Introduces you to Ray as a system composed of three layers: its core, its ML libraries,
    and its ecosystem. You’ll run your first examples with Ray’s libraries in this
    chapter to give you a glimpse of what you can do with Ray.


    *Chapter 2, “Getting Started with Ray Core”*

    Walks you through the foundations of the Ray project, namely, its core API. It
    also discusses how Ray tasks and actors naturally extend from Python functions
    and classes. You will also learn about Ray’s system components and how they work
    together.


    *Chapter 3, “Building Your First Distributed Application”*

    Guides you through implementing a distributed reinforcement learning application
    with Ray Core. You will implement this app from scratch and see Ray’s flexibility
    in distributing your Python code in action.


    *Chapter 4, “Reinforcement Learning with Ray RLlib”*

    Gives you a quick introduction to reinforcement learning and shows how Ray implements
    important concepts in RLlib. After building some examples together, we’ll also
    dive into more advanced topics like curriculum learning or working with offline
    data.


    *Chapter 5, “Hyperparameter Optimization with Ray Tune”*

    Covers why efficiently tuning hyperparameters is hard, how Ray Tune works conceptually,
    and how you can use it in practice for your machine learning projects.


    *Chapter 6, “Data Processing with Ray”*

    Introduces you to the Ray Datasets abstraction of Ray and how it fits into the
    landscape of other data processing systems. You will also learn how to work with
    third-party integrations such as Dask on Ray.


    *Chapter 7, “Distributed Training with Ray Train”*

    Provides you with the basics of distributed model training and shows you how to
    use Ray Train with ML frameworks like PyTorch. We also show you how to add custom
    preprocessors to your models, how to monitor training with callbacks, and how
    to tune the hyperparameters of your models with Tune.


    *Chapter 8, “Online Inference with Ray Serve”*

    Teaches you the basics of exposing your trained ML models as API endpoints that
    can be queried from anywhere. We discuss how Ray Serve addresses the challenges
    of online inference, cover its architecture, and show you how to use it in practice.


    *Chapter 9, “Ray Clusters”*

    Discusses how you configure, launch, and scale Ray Clusters for your applications.
    You’ll learn about Ray’s Cluster launcher CLI and autoscaler, as well as how to
    set up clusters in the cloud. We’ll also show you how to deploy Ray on Kubernetes
    and with other cluster managers.


    *Chapter 10, “Getting Started with the Ray AI Runtime”*

    Introduces you to Ray AIR, a unified toolkit for your ML workloads that offers
    many third-party integrations for model training or accessing custom data sources.


    *Chapter 11, “Ray’s Ecosystem and Beyond”*

    Gives you an overview of the many interesting extensions and integrations that
    Ray has attracted over the years.


    ## How to Use the Code Examples


    You can find all the code for this book in its [GitHub repository](https://github.com/).
    In the GitHub repo you’ll find a *notebook* folder with notebooks for each chapter.
    We built the examples in such a way that you can either type along as you read
    or follow the main text and run the code from GitHub at another time. The choice
    is yours.


    For the examples we assume that you have Python 3.7 or later installed. At the
    time of this writing, support for Python 3.10 for Ray is experimental, so we can
    currently only recommend a Python version no later than 3.9. All code examples
    assume that you have Ray installed, and each chapter adds its own specific requirements.
    The examples have been tested on Ray version 2.2.0, and we recommend that you
    stick to this version for the whole book.


    ## Conventions Used in This Book


    The following typographical conventions are used in this book:


    *Italic*

    Indicates new terms, URLs, email addresses, filenames, and file extensions.


    Constant width

    Used for program listings, as well as within paragraphs to refer to program elements
    such as variable or function names, databases, data types, environment variables,
    statements, and keywords.


    **Constant width bold**

    Shows commands or other text that should be typed literally by the user.


    <Text in angle brackets>

    Should be replaced with user-supplied values or by values determined by context.


    ![](img/6489687a3a178f2884963bddc928992c_19_0.png)


    This element signifies a general note.


    ![](img/6489687a3a178f2884963bddc928992c_19_1.png)


    This element indicates a warning or caution.


    ## Using Code Examples


    Supplemental material (code examples, exercises, etc.) is available for download
    at https://oreil.ly/learning_ray_repo.


    If you have a technical question or a problem using the code examples, please
    send email to bookquestions@oreilly.com.


    This book is here to help you get your job done. In general, if example code is
    offered with this book, you may use it in your programs and documentation. You
    do not need to contact us for permission unless you''re reproducing a significant
    portion of the code. For example, writing a program that uses several chunks of
    code from this book does not require permission. Selling or distributing examples
    from O''Reilly books does require permission. Answering a question by citing this
    book and quoting example code does not require permission. Incorporating a significant
    amount of example code from this book into your product''s documentation does
    require permission.'
  mdcn: '如果你是一名数据科学家，Ray将为你开辟思考和构建分布式机器学习应用的新途径。你将了解如何大规模进行实验的超参数选择，获得大规模模型训练的实践知识，并接触一个最先进的强化学习库。

    - 如果你是一名数据工程师，你将学习使用Ray Datasets进行大规模数据摄取，如何利用Ray上的Dask等工具改进你的数据管道，以及如何有效地大规模部署模型。

    - 如果你是一名工程师，你将理解Ray的内部工作原理，如何在云端运行和扩展Ray集群，以及如何使用Ray构建与你已知项目集成的应用程序。


    当然，无论你的角色如何，你都可以学习所有这些主题。我们希望，读完本书后，你将学会欣赏Ray的所有优势。


    ## 本书目标


    本书主要为Ray的新手读者编写，旨在帮助他们快速掌握Ray的精髓。我们精心挑选了材料，以便你理解Ray背后的核心思想，并学会使用其主要构建模块。阅读本书后，你将能够自信地独立探索超出本入门范围的更复杂主题。


    我们也需要明确本书的定位。它并非旨在提供尽可能多的信息，如API参考或权威指南。它也不是为了帮助你完成具体任务，如操作指南或实用手册。本书专注于学习和理解Ray，并为你提供有趣的入门示例。


    软件发展迅速，淘汰也快，但软件背后的基本概念通常在主要版本周期中保持稳定。我们试图在传达思想和提供具体代码示例之间取得平衡。本书中的思想理想情况下即使在代码最终需要更新时仍然有用。


    虽然Ray的文档在不断改进，但我们确实相信书籍可以提供项目文档难以匹敌的特质。既然你正在阅读这些文字，我们意识到这番话可能有些多余。但我们所知的一些最好的技术书籍，能够激发人们对项目的兴趣，让你愿意去钻研那些你原本不会接触的简洁API参考。我们希望本书就是其中之一。


    ## 本书导航


    我们组织本书的目的是引导你自然地从核心概念过渡到Ray更复杂的主题。许多解释的思想都附有示例代码，你可以在本书的[GitHub仓库](https://github.com/)中找到。


    简而言之，本书前三章通过实际示例教授Ray作为分布式Python框架的基础知识。第4至10章介绍Ray的高级库，并展示如何使用它们构建应用程序。最后一章对Ray的生态系统进行了总结性概述，并指明了下一步的学习方向。以下是各章内容概览：


    *第1章，“Ray概述”*

    向你介绍Ray作为一个由三层组成的系统：其核心、其机器学习库及其生态系统。你将在本章运行使用Ray库的第一个示例，初步了解Ray能做什么。


    *第2章，“Ray Core入门”*

    引导你了解Ray项目的基础，即其核心API。它还讨论了Ray的任务和参与者如何自然地从Python函数和类扩展而来。你还将了解Ray的系统组件及其协同工作方式。


    *第3章，“构建你的第一个分布式应用”*

    指导你使用Ray Core实现一个分布式强化学习应用。你将从头开始实现这个应用，并亲眼看到Ray在分发Python代码方面的灵活性。


    *第4章，“使用Ray RLlib进行强化学习”*

    快速介绍强化学习，并展示Ray如何在RLlib中实现重要概念。在共同构建一些示例之后，我们还将深入探讨更高级的主题，如课程学习或使用离线数据。


    *第5章，“使用Ray Tune进行超参数优化”*

    涵盖高效调整超参数为何困难、Ray Tune的概念原理，以及如何在机器学习项目中实际使用它。


    *第6章，“使用Ray进行数据处理”*

    向你介绍Ray的数据集抽象及其在其他数据处理系统格局中的定位。你还将学习如何与第三方集成（如Ray上的Dask）协作。


    *第7章，“使用Ray Train进行分布式训练”*

    提供分布式模型训练的基础知识，并展示如何将Ray Train与PyTorch等机器学习框架结合使用。我们还将向你展示如何为模型添加自定义预处理器、如何使用回调监控训练，以及如何使用Tune调整模型的超参数。


    *第8章，“使用Ray Serve进行在线推理”*

    教你将训练好的机器学习模型作为API端点暴露的基础知识，这些端点可以从任何地方查询。我们讨论Ray Serve如何应对在线推理的挑战，介绍其架构，并展示如何在实践中使用它。


    *第9章，“Ray集群”*

    讨论如何为你的应用程序配置、启动和扩展Ray集群。你将了解Ray的集群启动器CLI和自动扩缩器，以及如何在云端设置集群。我们还将向你展示如何在Kubernetes和其他集群管理器上部署Ray。


    *第10章，“Ray AI Runtime入门”*

    向你介绍Ray AIR，这是一个用于机器学习工作负载的统一工具包，为模型训练或访问自定义数据源提供了许多第三方集成。


    *第11章，“Ray生态系统及未来”*

    概述Ray多年来吸引的众多有趣的扩展和集成。


    ## 如何使用代码示例


    你可以在本书的[GitHub仓库](https://github.com/)中找到所有代码。在GitHub仓库中，你会找到一个*notebook*文件夹，其中包含每章的笔记本。我们构建示例的方式是，你可以边阅读边输入代码，也可以先阅读正文，稍后再从GitHub运行代码。选择权在你。


    对于示例，我们假设你已安装Python 3.7或更高版本。在撰写本文时，Ray对Python 3.10的支持尚处于实验阶段，因此我们目前仅推荐使用不高于3.9的Python版本。所有代码示例都假设你已安装Ray，每章还会添加其特定的要求。示例已在Ray
    2.2.0版本上测试，我们建议你在阅读全书时使用此版本。


    ## 本书使用的约定


    本书使用以下排版约定：


    *斜体*

    表示新术语、URL、电子邮件地址、文件名和文件扩展名。


    等宽字体

    用于程序清单，以及在段落中引用程序元素，如变量或函数名、数据库、数据类型、环境变量、语句和关键字。


    **等宽粗体**

    显示用户应原样输入的命令或其他文本。


    <尖括号中的文本>

    应替换为用户提供的值或由上下文确定的值。


    ![](img/6489687a3a178f2884963bddc928992c_19_0.png)


    此元素表示一般性说明。


    ![](img/6489687a3a178f2884963bddc928992c_19_1.png)


    此元素表示警告或注意事项。


    ## 使用代码示例


    补充材料（代码示例、练习等）可从 https://oreil.ly/learning_ray_repo 下载。


    如果你对使用代码示例有技术问题或遇到问题，请发送电子邮件至 bookquestions@oreilly.com。


    本书旨在帮助你完成工作。通常，如果本书提供了示例代码，你可以在你的程序和文档中使用它。除非你复制了代码的大部分，否则无需联系我们获取许可。例如，编写一个使用本书中多个代码片段的程序不需要许可。销售或分发O''Reilly书籍中的示例则需要许可。通过引用本书和引用示例代码来回答问题不需要许可。将本书中大量的示例代码纳入你的产品文档则需要许可。'

  md: '```

    for worker, shard in zip(workers, shards

    )])

    ```


    +   1. Generate training and validation data for a classification problem.

    2. Convert the training data to a Dataset by using `from_items`.

    3. Define a DatasetPipeline using `.repeat`. This is similar to using `.window`
    as we showed earlier, but it allows us to iterate over the same dataset multiple
    times (in this case, 10).

    4. Shuffle the data randomly each time it is repeated.

    5. We want each worker to have its own local shard of the data, so we `split`
    the DatasetPipeline into multiple smaller ones that can be passed to each worker.

    6. Wait for training to complete on all the workers.


    To run the training on the workers, we invoke their `train` method and pass in
    one shard of the DatasetPipeline to each. We then block, waiting for training
    to complete across all the workers. To summarize what happens during this phase:


    +   1. Each epoch, each worker gets a random shard of the data.

    2. The worker trains its local model on the shard of data assigned to it.

    3. Once a worker has finished training on the current shard, it blocks until the
    other workers have finished.

    4. The preceding three steps repeat for the remaining epochs (in this case, 10
    total).


    Finally, we can test the trained models from each worker on some test data to
    determine which alpha value produced the most accurate model:


    ```

    # Get validation results from each worker.

    print(ray.get([worker.test.remote(X_test, Y_test) for worker in workers]))

    ```


    In reality, for this type of workload you should reach for Ray Tune or Ray Train,
    which we''ll cover in the next chapter, but this example conveys the power of
    Ray Datasets for machine learning workloads. In just a few snippets of Python
    code, we implemented a complex distributed hyperparameter tuning and training
    workflow that could easily be scaled up to hundreds of machines and is agnostic
    to any framework or specific ML task.'

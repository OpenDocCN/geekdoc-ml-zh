  md: 'Actors are used if a transformation has state or needs an expensive setup,
    like loading large model checkpoints. In this case, loading large models in an
    actor once to reuse it for inference tasks can benefit overall performance. When
    Ray Datasets is using actors, these actors are created first, and the necessary
    data (in our example the loaded model) is transferred to them before the transformation
    in question gets executed.


    In general, datasets are stored in Ray object store memory, while large datasets
    are spilled to disk. But for stateless transformations there is often no need
    to keep intermediate results in memory. Using *pipelining* on Datasets, as we''ve
    shown in Chapter 6, data can instead be streamed to and from storage to increase
    performance.⁸ The idea is to load only the fraction of the data currently needed
    to execute a transformation. This can drastically reduce the memory footprint
    of the transformation and often speed up the overall execution.


    # Stateful execution


    Ray Train and RLlib spawn actors for their distributed training workers. As demonstrated
    multiple times, both libraries also integrate seamlessly with Tune. In Chapter
    5 we detailed how Tune launches Trials, which in essence are groups of actors
    executing a certain workload. If you use Train or RLlib with Tune, that in turn
    means that a tree of actors gets created, namely, an actor for each Tune Trial,
    and subactors for the parallel training workers requested by Train or RLlib.


    In terms of workload execution, this naturally creates an inner and an outer layer.
    Each subactor in a Tune Trial has full autonomy over its workload, as requested
    in the respective Train or RLlib training run you specified. This represents the
    inner execution layer. On the outer layer, Tune needs to monitor the status of
    individual trials, which it does by periodically reporting metrics to the Trial
    driver. Figure 10-9 illustrates this nested creation and execution of Ray actors
    for this scenario.



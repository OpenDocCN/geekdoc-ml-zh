    # Introduction to Ray Train by Example


    Ray Train is a library for distributed data-parallel training on Ray. It offers
    key tools for different parts of the training workflow, from feature processing
    to scalable training to integrations with ML tracking tools, to export mechanisms
    for models.


    In a basic ML training pipeline you will use the following key components of Ray
    Train:


    *Trainers*

    Ray Train has several Trainer classes that make it possible to do distributed
    training. Trainers are wrapper classes around third-party training frameworks
    like XGBoost, Pytorch, and TensorFlow providing integration with core Ray actors
    (for distribution), Ray Tune, and Ray Datasets.


    *Predictors*

    Once you have a trained model, you can use it to get predictions. For batches
    of input data you use so-called batch predictors, which are also used to evaluate
    the performance of a model on a validation set.


    Additionally, Ray Train provides several common *Preprocessor* objects and utilities
    to process dataset objects into consumable features for Trainers. Finally, Ray
    Train provides a *Checkpoint* class that allows you to save and restore the state
    of a training run. In our first walk-through we will not use any preprocessors,
    but we will cover them in more detail later.


    Ray Train is built with first-class support for training on large datasets. Along
    the same philosophy that you should not have to think about *how* to parallelize
    your code, you can simply “connect” your large dataset to Ray Train without thinking
    about how to ingest and feed your data into different parallel workers.


    Let’s put these components into practice by walking through our first Ray Train
    example. To load the training data, we’re going to leverage our knowledge from
    Chapter 6 and make heavy use of Ray Datasets.


    # Predicting Big Tips in NYC Taxi Rides


    This section walks through a practical, end-to-end example of building a deep
    learning pipeline using Ray. We will build a binary classification model to predict
    whether a taxi ride will result in a big tip (>20% of the fare) using the public
    New York City Taxi and Limousine Commission (TLC) Trip Record Data. Our workflow
    will closely resemble that of a typical ML practitioner:


    +   1. Load the data, do some basic preprocessing, and compute features we’ll
    use in our model.

    2. Define a neural network and train it using distributed data-parallel training.'

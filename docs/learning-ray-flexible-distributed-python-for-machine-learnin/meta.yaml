    # AIR Workload Execution


    Let’s have a closer look at the execution model of AIR.


    # Stateless execution


    Ray Datasets use Ray tasks or actors to execute transformations. Tasks are preferred
    since they allow for easier and more flexible scheduling. The Datasets library
    uses a scheduling strategy that evenly balances tasks and their output across
    your cluster.


    7 On top of multiple replicas for single models, AIR also supports deployment

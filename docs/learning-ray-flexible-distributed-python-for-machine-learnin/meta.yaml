  md: '# Setting Up Your First KubeRay Cluster


    You can deploy the operator by cloning the [KubeRay repository](https://github.com/ray-project/kuberay)
    and calling the following command:


    ```

    export KUBERAY_VERSION=v0.3.0


    kubectl create -k "github.com/ray-project/kuberay/manifests/\ncluster-scope-resources?ref=${KUBERAY_VERSION}&timeout=90s"


    kubectl apply -k "github.com/ray-project/kuberay/manifests/\nbase?ref=${KUBERAY_VERSION}&timeout=90s"

    ```


    You can verify that the operator has been deployed using this command:


    ```

    kubectl -n ray-system get pods

    ```


    When deployed, the operator will watch for Kubernetes events (create/delete/update)
    for the `raycluster` resource updates. Upon these events, the operator can create
    a cluster consisting of a head pod and multiple worker pods, delete a cluster,
    or update the cluster by adding or removing worker pods. Now let''s deploy a new
    Ray Cluster using a provided default cluster configuration (we''ll get to this
    YAML file later):


    ```

    wget "https://raw.githubusercontent.com/ray-project/kuberay/\n${KUBERAY_VERSION}/ray-operator/config/samples/ray-cluster.complete.yaml"


    kubectl create -f ray-cluster.complete.yaml

    ```


    The KubeRay operator configures a Kubernetes service targeting the Ray head pod.
    To identify the service, run:


    ```

    kubectl get service --selector=ray.io/cluster=raycluster-complete

    ```


    The output of this command should resemble the following structure:


    | NAME | TYPE | CLUSTER-IP | EXTERNAL-IP |

    | :--- | :--- | :--- | :--- |

    | raycluster-complete-head-svc | ClusterIP | xx.xx.xxx.xx | <none> |

    | PORT(S) | AGE | | |

    | 6379/TCP,8265/TCP,10001/TCP | 6m10s | | |


    The three ports indicated in the output correspond to the following services of
    the Ray head pod:


    +   - **6379**: The Ray head''s GCS service. Ray worker pods connect to this service
    when joining the cluster.

    - **8265**: Exposes the Ray Dashboard and the Ray Job Submission service.

    - **10001**: Exposes the Ray Client server.'

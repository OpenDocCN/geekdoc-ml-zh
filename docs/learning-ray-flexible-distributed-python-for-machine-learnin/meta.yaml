- md: "## Core feature: binding multiple deployments\n\nAll types of multimodel inference\
    \ graphs in Ray Serve center around the ability to pass a reference to one deployment\
    \ into the constructor of another. To do this, we use another feature of the `.bind()`\
    \ API: a bound deployment can be passed to another call to `.bind()`, and this\
    \ will resolve to a \"handle\" to the deployment at runtime. This enables deployments\
    \ to be deployed and instantiated independently and then call each other at runtime.\
    \ Here is the most basic example of a multideployment Serve application:\n\n```python\n\
    @serve.deployment\nclass DownstreamModel:\n    def __call__(self, inp: str):\n\
    \        return \"Hi from downstream model!\"\n\n@serve.deployment\nclass Driver:\n\
    \    def __init__(self, downstream):\n        self._d = downstream\n\n    async\
    \ def __call__(self, *args) -> str:\n        return await self._d.remote()\n\n\
    downstream = DownstreamModel.bind()\ndriver = Driver.bind(downstream)\n```\n\n\
    In this example, the downstream model is passed into the \"driver\" deployment.\
    \ Then at runtime the driver deployment calls into the downstream model. The driver\
    \ could take any number of models passed in, and the downstream model could even\
    \ take other downstream models of its own.\n\n## Pattern 1: Pipelining\n\nThe\
    \ first common multimodel pattern among ML applications is \"pipelining\": calling\
    \ multiple models in sequence, where the input of one model depends on the output\
    \ of the previous. Image processing, for example, often consists of a pipeline\
    \ with multiple stages of transformations such as cropping, segmentation, and\
    \ object recognition or optical character recognition (OCR). Each of these models\
    \ may have different properties, with some of them being lightweight transformations\
    \ that can run on a CPU and others being heavyweight deep learning models that\
    \ run on a GPU.\n\nSuch pipelines can easily be expressed using Serve's API. Each\
    \ stage of the pipeline is defined as an independent deployment, and each deployment\
    \ is passed into a top-level \"pipeline driver.\" In the following example, we\
    \ pass two deployments into a top-level driver, and the driver calls them in sequence.\
    \ Note that many requests to the driver could be happening concurrently; therefore,\
    \ it is possible to efficiently saturate all stages of the pipeline:\n\n```python\n\
    @serve.deployment\nclass DownstreamModel:\n    def __init__(self, my_val: str):\n\
    \        self._my_val = my_val\n\n    def __call__(self, inp: str):\n        return\
    \ inp + \"|\" + self._my_val\n\n\n@serve.deployment\nclass PipelineDriver:\n \
    \   def __init__(self, model1, model2):\n        self._m1 = model1\n        self._m2\
    \ = model2\n\n    async def __call__(self, *args) -> str:\n        intermediate\
    \ = self._m1.remote(\"input\")\n        final = self._m2.remote(intermediate)\n\
    \        return await final\n\n\nm1 = DownstreamModel.bind(\"val1\")\nm2 = DownstreamModel.bind(\"\
    val2\")\npipeline_driver = PipelineDriver.bind(m1, m2)\n```\n\nTo test this example,\
    \ you can once again use the `serve run` API. Sending a test request to the pipeline\
    \ returns `'input|val1|val2'` as output: each downstream \"model\" appended its\
    \ own value to construct the final result. In practice, each of these deployments\
    \ could be wrapping its own ML model, and a single request may flow across many\
    \ physical nodes in a cluster.\n\n## Pattern 2: Broadcasting\n\nIn addition to\
    \ sequentially chaining models together, it's often useful to broadcast an input\
    \ or intermediate result to multiple models in parallel. This could be to perform\
    \ \"ensembling,\" or combining the results of multiple independent models into\
    \ a single result, or used in a situation where different models may perform better\
    \ on different inputs. Often the results of the models need to be combined in\
    \ some way into a final result: either simply concatenated or maybe a single result\
    \ chosen from the lot.\n\nThis is expressed very similarly to the pipelining example:\
    \ a number of downstream models are passed into a top-level driver. In this case,\
    \ it's important that we call the models in parallel: waiting for the result of\
    \ each before calling the next would dramatically increase the overall latency\
    \ of the system:\n\n```python\n@serve.deployment\nclass DownstreamModel:\n   \
    \ def __init__(self, my_val: str):\n        self._my_val = my_val\n\n    def __call__(self):\n\
    \        return self._my_val\n\n@serve.deployment\nclass BroadcastDriver:\n  \
    \  def __init__(self, model1, model2):\n        self._m1 = model1\n        self._m2\
    \ = model2\n\n    async def __call__(self, *args) -> str:\n        output1, output2\
    \ = self._m1.remote(), self._m2.remote()\n        return [await output1, await\
    \ output2]\n\nm1 = DownstreamModel.bind(\"val1\")\nm2 = DownstreamModel.bind(\"\
    val2\")\nbroadcast_driver = BroadcastDriver.bind(m1, m2)\n```\n\nTesting this\
    \ endpoint after running it once again with `serve run` returns `[\"val1\", \"\
    val2\"]`, the combined output of the two models called in parallel.\n\n## Pattern\
    \ 3: Conditional logic\n\nFinally, while many ML applications fit roughly into\
    \ one of the preceding patterns, often having static control flow can be very\
    \ limiting. Take, for instance, the example of building a service to extract license\
    \ plate numbers from user-uploaded images. In this case, we'll likely need to\
    \ build an image processing pipeline as discussed, but we also don't simply want\
    \ to feed any image into the pipeline blindly. If the user uploads something other\
    \ than a car or an image that is low quality, we likely want to short circuit,\
    \ avoid calling into the heavyweight and expensive pipeline, and provide a useful\
    \ error message. Similarly, in a product recommendation use case we may want to\
    \ select a downstream model based on user input or the result of an intermediate\
    \ model. Each of these examples requires embedding custom logic alongside our\
    \ ML models.\n\nWe can accomplish this trivially using Serve's multimodel API\
    \ because our computation graph is defined as ordinary Python logic rather than\
    \ as a statically defined graph. For instance, in the next example, we use a simple\
    \ random number generator (RNG) to decide which of two downstream models to call\
    \ into. In a real-world example, the RNG could be replaced with business logic,\
    \ a database query, or the result of an intermediate model:\n\n```python\n@serve.deployment\n\
    class DownstreamModel:\n    def __init__(self, my_val: str):\n        self._my_val\
    \ = my_val\n\n    def __call__(self):\n        return self._my_val\n\n\n@serve.deployment\n\
    class ConditionalDriver:\n    def __init__(self, model1, model2):\n        self._m1\
    \ = model1\n        self._m2 = model2\n\n    async def __call__(self, *args) ->\
    \ str:\n        import random\n        if random.random() > 0.5:\n           \
    \ return await self._m1.remote()\n        else:\n            return await self._m2.remote()\n\
    \n\nm1 = DownstreamModel.bind(\"val1\")\nm2 = DownstreamModel.bind(\"val2\")\n\
    conditional_driver = ConditionalDriver.bind(m1, m2)\n```\n\nEach call to this\
    \ endpoint returns either \"val1\" or \"val2\" with 50/50 probability.\n\n## End-to-End\
    \ Example: Building an NLP-Powered API\n\nIn this section, we'll use Ray Serve\
    \ to build an end-to-end natural language processing (NLP) pipeline hosted for\
    \ online inference. Our goal will be to provide a Wikipedia summarization endpoint\
    \ that will leverage multiple NLP models and some custom logic to provide a succinct\
    \ summary of the most relevant Wikipedia page for a given search term.\n\nThis\
    \ task will bring together many of the concepts and features we've discussed:\n\
    \n- We'll be combining custom business logic along with multiple ML models.\n\
    - The inference graph will consist of all three multimodel patterns: pipelining,\
    \ broadcasting, and conditional logic.\n- Each model will be hosted as a separate\
    \ Serve deployment so they can be independently scaled and given their own resource\
    \ allocation."
  mdcn: "## 核心特性：绑定多个部署\n\nRay Serve 中所有类型的多模型推理图都围绕一个核心能力展开：将一个部署的引用传递给另一个部署的构造函数。为此，我们使用了\
    \ `.bind()` API 的另一项特性：一个已绑定的部署可以传递给另一个 `.bind()` 调用，这将在运行时解析为该部署的“句柄”。这使得部署能够独立部署和实例化，然后在运行时相互调用。以下是一个最基本的多部署\
    \ Serve 应用示例：\n\n```python\n@serve.deployment\nclass DownstreamModel:\n    def\
    \ __call__(self, inp: str):\n        return \"Hi from downstream model!\"\n\n\
    @serve.deployment\nclass Driver:\n    def __init__(self, downstream):\n      \
    \  self._d = downstream\n\n    async def __call__(self, *args) -> str:\n     \
    \   return await self._d.remote()\n\ndownstream = DownstreamModel.bind()\ndriver\
    \ = Driver.bind(downstream)\n```\n\n在此示例中，下游模型被传递给“驱动”部署。然后在运行时，驱动部署调用下游模型。驱动可以接受任意数量的传入模型，而下游模型甚至可以接受其自身的其他下游模型。\n\
    \n## 模式 1：流水线\n\nML 应用中第一种常见的多模型模式是“流水线”：按顺序调用多个模型，其中一个模型的输入依赖于前一个模型的输出。例如，图像处理通常包含一个由多个转换阶段组成的流水线，如裁剪、分割以及目标识别或光学字符识别（OCR）。这些模型中的每一个都可能具有不同的特性，其中一些是可以在\
    \ CPU 上运行的轻量级转换，而另一些是在 GPU 上运行的重量级深度学习模型。\n\n这样的流水线可以轻松地使用 Serve 的 API 来表达。流水线的每个阶段被定义为一个独立的部署，每个部署被传递给一个顶层的“流水线驱动”。在下面的示例中，我们将两个部署传递给一个顶层驱动，驱动按顺序调用它们。请注意，对驱动的许多请求可能并发发生；因此，可以有效地使流水线的所有阶段达到饱和：\n\
    \n```python\n@serve.deployment\nclass DownstreamModel:\n    def __init__(self,\
    \ my_val: str):\n        self._my_val = my_val\n\n    def __call__(self, inp:\
    \ str):\n        return inp + \"|\" + self._my_val\n\n\n@serve.deployment\nclass\
    \ PipelineDriver:\n    def __init__(self, model1, model2):\n        self._m1 =\
    \ model1\n        self._m2 = model2\n\n    async def __call__(self, *args) ->\
    \ str:\n        intermediate = self._m1.remote(\"input\")\n        final = self._m2.remote(intermediate)\n\
    \        return await final\n\n\nm1 = DownstreamModel.bind(\"val1\")\nm2 = DownstreamModel.bind(\"\
    val2\")\npipeline_driver = PipelineDriver.bind(m1, m2)\n```\n\n要测试此示例，您可以再次使用\
    \ `serve run` API。向流水线发送测试请求会返回 `'input|val1|val2'` 作为输出：每个下游“模型”都附加了自己的值以构建最终结果。在实践中，这些部署中的每一个都可能封装了自己的\
    \ ML 模型，单个请求可能流经集群中的多个物理节点。\n\n## 模式 2：广播\n\n除了将模型按顺序链接在一起之外，将输入或中间结果并行广播给多个模型通常也很有用。这可以用于执行“集成”，即将多个独立模型的结果组合成一个单一结果，或者用于不同模型可能在不同输入上表现更好的情况。通常，模型的结果需要以某种方式组合成最终结果：要么简单地连接，要么从众多结果中选择一个。\n\
    \n这与流水线示例的表达方式非常相似：将多个下游模型传递给一个顶层驱动。在这种情况下，重要的是我们要并行调用模型：等待每个模型的结果再调用下一个将显著增加系统的整体延迟：\n\
    \n```python\n@serve.deployment\nclass DownstreamModel:\n    def __init__(self,\
    \ my_val: str):\n        self._my_val = my_val\n\n    def __call__(self):\n  \
    \      return self._my_val\n\n@serve.deployment\nclass BroadcastDriver:\n    def\
    \ __init__(self, model1, model2):\n        self._m1 = model1\n        self._m2\
    \ = model2\n\n    async def __call__(self, *args) -> str:\n        output1, output2\
    \ = self._m1.remote(), self._m2.remote()\n        return [await output1, await\
    \ output2]\n\nm1 = DownstreamModel.bind(\"val1\")\nm2 = DownstreamModel.bind(\"\
    val2\")\nbroadcast_driver = BroadcastDriver.bind(m1, m2)\n```\n\n使用 `serve run`\
    \ 再次运行此端点后进行测试，返回 `[\"val1\", \"val2\"]`，这是并行调用的两个模型的组合输出。\n\n## 模式 3：条件逻辑\n\n\
    最后，虽然许多 ML 应用大致符合前面模式之一，但拥有静态控制流通常会非常受限。以构建一个从用户上传的图像中提取车牌号的服务为例。在这种情况下，我们可能需要构建一个如前所述的图像处理流水线，但我们也不希望盲目地将任何图像输入流水线。如果用户上传的不是汽车图像或图像质量较低，我们可能希望短路，避免调用重量级且昂贵的流水线，并提供有用的错误消息。类似地，在产品推荐用例中，我们可能希望根据用户输入或中间模型的结果选择下游模型。这些示例中的每一个都需要在我们的\
    \ ML 模型旁边嵌入自定义逻辑。\n\n我们可以使用 Serve 的多模型 API 轻松实现这一点，因为我们的计算图是用普通的 Python 逻辑定义的，而不是静态定义的图。例如，在下一个示例中，我们使用一个简单的随机数生成器（RNG）来决定调用两个下游模型中的哪一个。在实际示例中，RNG\
    \ 可以被业务逻辑、数据库查询或中间模型的结果所取代：\n\n```python\n@serve.deployment\nclass DownstreamModel:\n\
    \    def __init__(self, my_val: str):\n        self._my_val = my_val\n\n    def\
    \ __call__(self):\n        return self._my_val\n\n\n@serve.deployment\nclass ConditionalDriver:\n\
    \    def __init__(self, model1, model2):\n        self._m1 = model1\n        self._m2\
    \ = model2\n\n    async def __call__(self, *args) -> str:\n        import random\n\
    \        if random.random() > 0.5:\n            return await self._m1.remote()\n\
    \        else:\n            return await self._m2.remote()\n\n\nm1 = DownstreamModel.bind(\"\
    val1\")\nm2 = DownstreamModel.bind(\"val2\")\nconditional_driver = ConditionalDriver.bind(m1,\
    \ m2)\n```\n\n每次调用此端点，都有 50% 的概率返回 \"val1\" 或 \"val2\"。\n\n## 端到端示例：构建一个 NLP 驱动的\
    \ API\n\n在本节中，我们将使用 Ray Serve 构建一个用于在线推理的端到端自然语言处理（NLP）流水线。我们的目标是提供一个维基百科摘要端点，该端点将利用多个\
    \ NLP 模型和一些自定义逻辑，为给定的搜索词提供最相关维基百科页面的简洁摘要。\n\n此任务将汇集我们讨论过的许多概念和特性：\n\n- 我们将把自定义业务逻辑与多个\
    \ ML 模型结合起来。\n- 推理图将包含所有三种多模型模式：流水线、广播和条件逻辑。\n- 每个模型将作为单独的 Serve 部署托管，以便它们可以独立扩展并获得自己的资源分配。"

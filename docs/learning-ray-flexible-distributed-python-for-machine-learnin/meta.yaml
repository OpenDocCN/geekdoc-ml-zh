    \ to make sure that you don't run out of physical resources.\n\nApart from resources,\
    \ the other requirement the scheduler takes care of is *dependency resolution*.\
    \ That means it needs to ensure that each worker has all the objects it needs\
    \ to execute a task in the local object store. For that to work, the scheduler\
    \ will first resolve local dependencies by looking up values in its object store.\

    # Request Batching


    Many machine learning models can be efficiently *vectorized*, meaning that multiple
    computations can be run in parallel more efficiently than running them sequentially.
    This is especially beneficial when running models on GPUs that are purpose-built
    for efficiently performing many computations in parallel. In the context of online
    inference this offers a path for optimization: serving multiple requests (possibly
    from different sources) in parallel can drastically improve the throughput of
    the system (and therefore save cost).


    Two high-level strategies take advantage of request batching: client-side batching
    and server-side batching. In *client-side batching*, the server accepts multiple
    inputs in a single request, and clients include logic to send them in batches
    instead of one at a time. This is useful in situations where a single client is
    frequently sending many inference requests. *Server-side batching*, in contrast,
    enables the server to batch multiple requests without requiring any modification
    on the client. This can also be used to batch requests across multiple clients,
    which enables efficient batching even in situations with many clients that send
    relatively few requests each.


    Ray Serve offers a built-in utility for server-side batching, the `@serve.batch`
    decorator, that requires just a few code changes. This batching support uses Python''s
    asyncio capabilities to enqueue multiple requests into a single function call.
    The function should take in a list of inputs and return the corresponding list
    of outputs.


    Once again, let''s revisit the sentiment classifier from earlier and this time
    modify it to perform server-side batching. The underlying Hugging Face pipeline
    supports vectorized inference; all we need to do is pass a list of inputs, and
    it will return the corresponding list of outputs. We''ll split the call to the
    classifier into a new method, `classify_batched`, that will take a list of input
    texts as input, perform inference across them, and return the outputs in a formatted
    list. `classify_batched` will use the `@serve.batch` decorator to automatically
    perform batching. The behavior can be configured using the `max_batch_size` and
    `batch_timeout_wait_s` parameters. Here we''ll set the max batch size to 10 and
    wait for up to 100 ms:


    ```

    app = FastAPI()


    @serve.deployment

    @serve.ingress(app)

    ```'

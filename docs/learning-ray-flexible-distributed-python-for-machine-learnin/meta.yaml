  - "[PAGE 195]\n\nwill allow us to return a helpful response in error conditions\
    \ such as when no result is found or the sentiment analysis comes back as negative:\n\
    \n```\nfrom pydantic import BaseModel\n\nclass Response(BaseModel):\n    success:\
    \ bool\n    message: str = \"\"\n    summary: str = \"\"\n    named_entities:\
    \ List[str] = []\n```\n\nNext, we need to define the actual control flow logic\
    \ that will run in the driver deployment. The driver itself will not do any of\
    \ the actual heavy lifting; instead, it will call into our three downstream model\
    \ deployments and interpret their results. It will also house the FastAPI app\
    \ definition, parsing the input and returning the correct Response model based\
    \ on the results of the pipeline:\n\n```\nfrom fastapi import FastAPI\n\napp =\
    \ FastAPI()\n\n\n@serve.deployment\n@serve.ingress(app)\nclass NLPPipelineDriver:\n\
    \    def __init__(self, sentiment_analysis, summarizer, entity_recognition):\n\
    \        self._sentiment_analysis = sentiment_analysis\n        self._summarizer\
    \ = summarizer\n        self._entity_recognition = entity_recognition\n\n    @app.get(\"\
    /\", response_model=Response)\n    async def summarize_article(self, search_term:\
    \ str) -> Response:\n        # Fetch the top page content for the search term\
    \ if found.\n        page_content = fetch_wikipedia_page(search_term)\n      \
    \  if page_content is None:\n            return Response(success=False, message=\"\
    No pages found.\")\n\n        # Conditionally continue based on the sentiment\
    \ analysis.\n        is_positive = await self._sentiment_analysis.remote(page_content)\n\
    \        if not is_positive:\n            return Response(success=False, message=\"\
    Only positivitiy allowed!\")\n\n        # Query the summarizer and named entity\
    \ recognition models in parallel.\n        summary_result = self._summarizer.remote(page_content)\n\
    \        entities_result = self._entity_recognition.remote(page_content)\n   \
    \     return Response(\n            success=True,\n            summary=await summary_result,\n\
    \            named_entities=await entities_result\n        )\n```"
- md: "Fetch the page content in the main handler's body using our `fetch_wikipedia_page`\
    \ logic (if no result is found, an error is returned). Then, we call into the\
    \ sentiment analysis model. If this returns negative, we terminate early and return\
    \ an error to avoid calling the other expensive ML models. Finally, we broadcast\
    \ the article contents to both the summary and named entity recognition models\
    \ in parallel. The results of the two models are stitched together into the final\
    \ response, and we return success. Remember that we may have many calls to this\
    \ handler running concurrently: the calls to the downstream models don't block\
    \ the driver, and it could coordinate calls to many replicas of the heavyweight\
    \ models.\n\n## Putting It All Together\n\nAt this point, we have defined all\
    \ the core logic. All that's left is to bind the graph of deployments together\
    \ and run it:\n\n```\nsentiment_analysis = SentimentAnalysis.bind()\nsummarizer\
    \ = Summarizer.bind()\nentity_recognition = EntityRecognition.bind(threshold=0.95,\
    \ max_entities=5)\nnlp_pipeline_driver = NLPPipelineDriver.bind(\n    sentiment_analysis,\
    \ summarizer, entity_recognition)\n```\n\nFirst, we need to instantiate each of\
    \ the deployments with any relevant input arguments. For example, here we pass\
    \ a threshold and limit for the entity recognition model. The most important piece\
    \ we pass is a reference to each of the three models into the driver so it can\
    \ coordinate the computation. Now that we've defined the full NLP pipeline, we\
    \ can run it using `serve run`:⁴\n\n```\nserve run app:nlp_pipeline_driver\n```\n\
    \nThis will deploy each of the four deployments locally and make the driver available\
    \ at http://localhost:8000. We can query the pipeline using the `requests` to\
    \ see it in action. First, let's try querying for an entry on Ray Serve:\n\n```\n\
    import requests\n\nprint(requests.get(\n    \"http://localhost:8000/\", params={\"\
    search_term\": \"rayserve\"}\n).text)\n'{\"success\":false,\"message\":\"No pages\
    \ found.\",\n \"summary\":\"\",\"named_entities\":[]}'\n```\n\n⁴ The models we\
    \ use in this example are quite large, so be warned that it will likely take several\
    \ minutes to download them the first time you run this example.\n\nUnfortunately,\
    \ this page doesn't exist yet! The first chunk of validation business logic kicks\
    \ in and returns a “No pages found” message. Let's try looking for something more\
    \ common:\n\n```\nprint(requests.get(\n    \"http://localhost:8000/\", params={\"\
    search_term\": \"war\"}\n).text)\n'{\"success\":false,\"message\":\"Only positivity\
    \ allowed!\", \"summary\":\"\",\"named_entities\":[]}'\n```\n\nMaybe we were just\
    \ interested in learning about history, but this article was a bit too negative\
    \ for our sentiment classifier. Let's try something more neutral this time—what\
    \ about science?\n\n```\nprint(requests.get(\n    \"http://localhost:8000/\",\
    \ params={\"search_term\": \"physicist\"}\n).text)\n'{\"success\":true,\"message\"\
    :\"\",\"summary\":\" Physics is the natural science that studies matter, its fundamental\
    \ constituents, its motion and behavior through space and time, and the related\
    \ entities of energy and force . During the Scientific Revolution in the 17th\
    \ century these natural sciences emerged as unique research endeavors in their\
    \ own right . Physics intersects with many interdisciplinary areas of research,\
    \ such as biophysics and quantum chemistry . \",\"named_entities\":[\"Scientific\"\
    ,\"Revolution\", \"Ancient\",\"Greek\",\"Egyptians\"]}'\n```\n\nThis example successfully\
    \ ran through the full pipeline: the API responded with a cogent summary of the\
    \ article and a list of relevant named entities.\n\nTo recap, in this section\
    \ we built an online NLP API using Ray Serve. This inference graph consisted of\
    \ multiple ML models in addition to custom business logic and dynamic control\
    \ flow. Each model can be independently scaled and have its own resource allocation,\
    \ and we can exploit vectorized computations using server-side batching. Because\
    \ we were able to test the API locally, the next step would be to deploy to production.\
    \ Ray Serve makes it easy to deploy on Kubernetes or other cloud provider offerings\
    \ using the Ray Cluster launcher, and we could easily scale up to handle many\
    \ users by tweaking the resource allocations for our deployments.\n\n## Summary\n\
    \nThis chapter introduced Ray Serve, a Ray-native library for building online\
    \ inference APIs. Ray Serve is focused on solving the unique challenges of serving\
    \ machine learning models in production, offering functionality to efficiently\
    \ scale models and allocate resources as well as compose multiple models along\
    \ with business logic. Additionally, like all of Ray, Serve is designed to be\
    \ a general-purpose solution that avoids vendor lock-in.\n\nAlthough we walked\
    \ through an end-to-end example of a multimodel pipeline, this chapter has covered\
    \ only a small portion of Ray Serve’s functionality and best practices for real-world\
    \ applications. For more detail and examples, read the [Ray Serve documentation](https://docs.ray.io/en/latest/serve/index.html).\n\
    \n# CHAPTER 9\n\n# Ray Clusters\n\nRichard Liaw\n\nSo far we have focused on teaching\
    \ you the basics of Ray for building machine learning applications. You know how\
    \ to parallelize your Python code with Ray Core and run reinforcement learning\
    \ experiments with RLlib. You’ve also seen how to preprocess data with Ray Datasets,\
    \ tune hyperparameters with Ray Tune, and train models with Ray Train. But one\
    \ of the key features that Ray brings is the ability to scale out seamlessly onto\
    \ multiple machines. Outside a lab environment or a big tech company, it may be\
    \ difficult set up multiple machines and join them into a single Ray Cluster.\
    \ This chapter is all about how to do that.¹\n\nCloud technology has commoditized\
    \ access to cheap machines for anyone. But it is often quite difficult to figure\
    \ out the right APIs to handle the cloud provider tools. The Ray team has provided\
    \ a couple of tools that abstract the complexity away. There are three primary\
    \ ways of launching or deploying a Ray Cluster. You can do so manually, via a\
    \ Kubernetes operator, or via the cluster launcher CLI tool.\n\nIn the first part\
    \ of this chapter we’ll cover these three methods in detail.² We only briefly\
    \ explain manual cluster creation and the cluster launcher CLI, and we spend most\
    \ of our time explaining how to use the Kubernetes operator. After that, we’ll\
    \ cover how to run Ray Clusters on the cloud and how to autoscale them up and\
    \ down.\n\n¹ Ray itself is not opinionated about how you set up your cluster.\
    \ In fact, you have many options, many of which are described in this chapter.\
    \ Apart from the open source solutions we’re describing here, there are also fully\
    \ managed commercial solutions available, such as those offered by Anyscale or\
    \ Domino Data Lab.\n\n² While this chapter technically has an accompanying notebook,\
    \ the material presented here is not well-suited for development in an interactive\
    \ Python session. We recommend that you work through these examples on the command\
    \ line. No matter where you decide to work, make sure to have Ray installed with\
    \ `pip install \"ray==2.2.0\"`.\n\n## Manually Creating a Ray Cluster\n\nLet's\
    \ start with the most basic way of creating a Ray Cluster. To build a Ray Cluster\
    \ manually we assume that you have a list of machines that can communicate with\
    \ each other and have Ray installed on them.³\n\nTo start with, you can choose\
    \ any machine to be the head node. On this node, run the following command:\n\n\
    ```\nray start --head --port=6379\n```\n\nThis command will print out the IP address\
    \ of the Ray GCS server that was started, namely, the local node IP address plus\
    \ the port number you specified:⁴\n\n```\n...\nNext steps\nTo connect to this\
    \ Ray runtime from another node, run\nray start --address='<head-address>:6379'\n\
    \nIf connection fails, check your firewall settings and network configuration.\n\
    ```\n\nYou need this `<head-address>` to connect your other nodes to the cluster,\
    \ so make sure to copy it. If you omit the `--port` argument, Ray will use a random\
    \ port.\n\nNext, we can connect every other node in your cluster to the head node\
    \ by running a single command on each node:\n\n```\nray start --address=<head-address>\n\
    ```\n\nMake sure to pass the correct `<head-address>`, which should look something\
    \ like 123.45.67.89:6379. Running this command, you should see output of the following\
    \ form:\n\n```\n-----------------------\nRay runtime started.\n-----------------------\n\
    \nTo terminate the Ray runtime, run\nray stop\n```\n\nIf you wish to specify that\
    \ a machine has 10 CPUs and 1 GPU, you can do this with the flags `--num-cpus=10`\
    \ and `--num-gpus=1`. If you see `Ray runtime started.`, then\n\n³ Depending on\
    \ your setup or work situation, this might not be a realistic assumption for you.\
    \ Don't worry, we'll cover ways to create Ray Clusters that don't require you\
    \ to have any machines running. In any case, knowing the steps involved for manual\
    \ Ray Cluster creation is useful to fall back on.\n\n⁴ If you already have remote\
    \ Redis instances, you can use them by specifying the environment variable RAY_REDIS_ADDRESS=ip1:port1,ip2:port2....\
    \ Ray will use the first address as primary and the rest as shards."
  mdcn: "在主处理函数的主体中，使用我们的 `fetch_wikipedia_page` 逻辑获取页面内容（如果未找到结果，则返回错误）。然后，我们调用情感分析模型。如果分析结果为负面，我们会提前终止并返回错误，以避免调用其他昂贵的机器学习模型。最后，我们将文章内容并行广播给摘要模型和命名实体识别模型。两个模型的结果被拼接成最终响应，然后我们返回成功。请记住，我们可能有许多对此处理函数的并发调用：对下游模型的调用不会阻塞驱动程序，它可以协调对多个重量级模型副本的调用。\n\
    \n## 整合所有部分\n\n至此，我们已经定义了所有核心逻辑。剩下的就是将部署图绑定在一起并运行它：\n\n```\nsentiment_analysis\
    \ = SentimentAnalysis.bind()\nsummarizer = Summarizer.bind()\nentity_recognition\
    \ = EntityRecognition.bind(threshold=0.95, max_entities=5)\nnlp_pipeline_driver\
    \ = NLPPipelineDriver.bind(\n    sentiment_analysis, summarizer, entity_recognition)\n\
    ```\n\n首先，我们需要用任何相关的输入参数实例化每个部署。例如，这里我们为实体识别模型传递了一个阈值和限制。我们传递的最重要的部分是对三个模型的引用给驱动程序，以便它可以协调计算。现在我们已经定义了完整的\
    \ NLP 流水线，我们可以使用 `serve run` 来运行它：⁴\n\n```\nserve run app:nlp_pipeline_driver\n\
    ```\n\n这将在本地部署四个部署，并使驱动程序在 http://localhost:8000 可用。我们可以使用 `requests` 查询流水线以查看其运行情况。首先，让我们尝试查询一个关于\
    \ Ray Serve 的条目：\n\n```\nimport requests\n\nprint(requests.get(\n    \"http://localhost:8000/\"\
    , params={\"search_term\": \"rayserve\"}\n).text)\n'{\"success\":false,\"message\"\
    :\"No pages found.\",\n \"summary\":\"\",\"named_entities\":[]}'\n```\n\n⁴ 我们在此示例中使用的模型相当大，因此请注意，首次运行此示例时可能需要几分钟来下载它们。\n\
    \n不幸的是，这个页面还不存在！第一块验证业务逻辑启动并返回“未找到页面”消息。让我们尝试查找一些更常见的内容：\n\n```\nprint(requests.get(\n\
    \    \"http://localhost:8000/\", params={\"search_term\": \"war\"}\n).text)\n\
    '{\"success\":false,\"message\":\"Only positivity allowed!\", \"summary\":\"\"\
    ,\"named_entities\":[]}'\n```\n\n也许我们只是想了解历史，但这篇文章对我们的情感分类器来说有点太负面了。这次让我们尝试一些更中性的内容——科学怎么样？\n\
    \n```\nprint(requests.get(\n    \"http://localhost:8000/\", params={\"search_term\"\
    : \"physicist\"}\n).text)\n'{\"success\":true,\"message\":\"\",\"summary\":\"\
    \ Physics is the natural science that studies matter, its fundamental constituents,\
    \ its motion and behavior through space and time, and the related entities of\
    \ energy and force . During the Scientific Revolution in the 17th century these\
    \ natural sciences emerged as unique research endeavors in their own right . Physics\
    \ intersects with many interdisciplinary areas of research, such as biophysics\
    \ and quantum chemistry . \",\"named_entities\":[\"Scientific\",\"Revolution\"\
    , \"Ancient\",\"Greek\",\"Egyptians\"]}'\n```\n\n这个示例成功运行了整个流水线：API 用文章的简明摘要和相关命名实体列表进行了响应。\n\
    \n回顾一下，在本节中，我们使用 Ray Serve 构建了一个在线 NLP API。这个推理图由多个机器学习模型以及自定义业务逻辑和动态控制流组成。每个模型都可以独立扩展并拥有自己的资源分配，我们可以利用服务器端批处理进行向量化计算。由于我们能够在本地测试\
    \ API，下一步将是部署到生产环境。Ray Serve 使得使用 Ray Cluster 启动器在 Kubernetes 或其他云提供商产品上部署变得容易，我们可以通过调整部署的资源分配轻松扩展以处理许多用户。\n\
    \n## 总结\n\n本章介绍了 Ray Serve，一个用于构建在线推理 API 的 Ray 原生库。Ray Serve 专注于解决在生产环境中服务机器学习模型的独特挑战，提供高效扩展模型和分配资源的功能，以及将多个模型与业务逻辑组合的能力。此外，与所有\
    \ Ray 一样，Serve 被设计为一个通用解决方案，避免供应商锁定。\n\n尽管我们通过了一个多模型流水线的端到端示例，但本章仅涵盖了 Ray Serve\
    \ 功能的一小部分以及实际应用的最佳实践。有关更多细节和示例，请阅读 [Ray Serve 文档](https://docs.ray.io/en/latest/serve/index.html)。\n\
    \n# 第 9 章\n\n# Ray 集群\n\nRichard Liaw\n\n到目前为止，我们一直专注于教你使用 Ray 构建机器学习应用程序的基础知识。你知道如何使用\
    \ Ray Core 并行化你的 Python 代码，以及如何使用 RLlib 运行强化学习实验。你还看到了如何使用 Ray Datasets 预处理数据、使用\
    \ Ray Tune 调整超参数以及使用 Ray Train 训练模型。但 Ray 带来的关键特性之一是能够无缝扩展到多台机器。在实验室环境或大型科技公司之外，设置多台机器并将它们连接成一个单一的\
    \ Ray 集群可能很困难。本章就是关于如何做到这一点的。¹\n\n云技术使任何人都能以商品化的方式访问廉价的机器。但通常很难弄清楚处理云提供商工具的正确\
    \ API。Ray 团队提供了一些工具来抽象复杂性。启动或部署 Ray 集群有三种主要方式。你可以手动执行，通过 Kubernetes 操作符，或通过集群启动器\
    \ CLI 工具。\n\n在本章的第一部分，我们将详细介绍这三种方法。² 我们只简要解释手动集群创建和集群启动器 CLI，我们将大部分时间用于解释如何使用\
    \ Kubernetes 操作符。之后，我们将介绍如何在云上运行 Ray 集群以及如何自动扩展它们。\n\n¹ Ray 本身对如何设置集群没有固定看法。事实上，你有很多选择，其中许多在本章中都有描述。除了我们在此描述的开源解决方案外，还有完全托管的商业解决方案可用，例如\
    \ Anyscale 或 Domino Data Lab 提供的解决方案。\n\n² 虽然本章在技术上有一个配套的笔记本，但此处介绍的内容不太适合在交互式\
    \ Python 会话中进行开发。我们建议你在命令行上完成这些示例。无论你决定在哪里工作，请确保使用 `pip install \"ray==2.2.0\"\
    ` 安装了 Ray。\n\n## 手动创建 Ray 集群\n\n让我们从创建 Ray 集群的最基本方式开始。要手动构建 Ray 集群，我们假设你有一组可以相互通信并安装了\
    \ Ray 的机器。³\n\n首先，你可以选择任何机器作为头节点。在此节点上，运行以下命令：\n\n```\nray start --head --port=6379\n\
    ```\n\n此命令将打印出已启动的 Ray GCS 服务器的 IP 地址，即本地节点 IP 地址加上你指定的端口号：⁴\n\n```\n...\nNext\
    \ steps\nTo connect to this Ray runtime from another node, run\nray start --address='<head-address>:6379'\n\
    \nIf connection fails, check your firewall settings and network configuration.\n\
    ```\n\n你需要这个 `<head-address>` 来将你的其他节点连接到集群，因此请确保复制它。如果省略 `--port` 参数，Ray 将使用随机端口。\n\
    \n接下来，我们可以通过在每个节点上运行一个命令将集群中的每个其他节点连接到头节点：\n\n```\nray start --address=<head-address>\n\
    ```\n\n确保传递正确的 `<head-address>`，它应该看起来像 123.45.67.89:6379。运行此命令，你应该会看到以下形式的输出：\n\
    \n```\n-----------------------\nRay runtime started.\n-----------------------\n\
    \nTo terminate the Ray runtime, run\nray stop\n```\n\n如果你希望指定一台机器有 10 个 CPU 和\
    \ 1 个 GPU，你可以使用标志 `--num-cpus=10` 和 `--num-gpus=1` 来做到这一点。如果你看到 `Ray runtime started.`，那么\n\
    \n³ 根据你的设置或工作情况，这对你来说可能不是一个现实的假设。别担心，我们将介绍创建 Ray 集群的方法，这些方法不需要你运行任何机器。无论如何，了解手动创建\
    \ Ray 集群所涉及的步骤作为后备知识是有用的。\n\n⁴ 如果你已经有远程 Redis 实例，你可以通过指定环境变量 RAY_REDIS_ADDRESS=ip1:port1,ip2:port2...\
    \ 来使用它们。Ray 将使用第一个地址作为主地址，其余作为分片。"

  md: "# Fetching Content and Preprocessing\n\nThe first step is to fetch the most\
    \ relevant page from Wikipedia given a user-provided search term. For this, we\
    \ will leverage the Wikipedia package on PyPI to do the heavy lifting. We'll first\
    \ search for the term and then select the top result and return its page content.\
    \ If no results are found, we'll return None—this edge case will be handled later\
    \ when we define the API:\n\n```\nfrom typing import Optional\n\nimport wikipedia\n\
    \ndef fetch_wikipedia_page(search_term: str) -> Optional[str]:\n    results =\
    \ wikipedia.search(search_term)\n    # If no results, return to caller.\n    if\
    \ len(results) == 0:\n        return None\n\n    # Get the page for the top result.\n\
    \    return wikipedia.page(results[0]).content\n```\n\n# NLP Models\n\nNext, we\
    \ need to define the ML models that will do the heavy lifting of our API. We'll\
    \ be using the Hugging Face Transformers library as it provides convenient APIs\
    \ to pretrained state-of-the-art ML models so we can focus on the serving logic.\n\
    \nThe first model we'll use is a sentiment classifier, the same one we used in\
    \ the preceding examples. The deployment for this model will take advantage of\
    \ vectorized computations using Serve's batching API:\n\n```\nfrom ray import\
    \ serve\nfrom transformers import pipeline\nfrom typing import List\n\n@serve.deployment\n\
    class SentimentAnalysis:\n    def __init__(self):\n        self._classifier =\
    \ pipeline(\"sentiment-analysis\")\n\n    @serve.batch(max_batch_size=10, batch_wait_timeout_s=0.1)\n\
    \    async def is_positive_batched(self, inputs: List[str]) -> List[bool]:\n \
    \       results = self._classifier(inputs, truncation=True)\n        return [result[\"\
    label\"] == \"POSITIVE\" for result in results]\n\n    async def __call__(self,\
    \ input_text: str) -> bool:\n        return await self.is_positive_batched(input_text)\n\
    ```"
  merge: -1
  pgno: 193
- img_proc: true
  md: "We'll also use a text summarization model to provide a succinct summary for\
    \ the selected article. This model takes an optional `max_length` argument to\
    \ cap the length of the summary. Because we know this is the most computationally\
    \ expensive of the models, we set `num_replicas=2`; that way, if we have many\
    \ requests coming in at the same time, it can keep up with the throughput of the\
    \ other models. In practice, we may need more replicas to keep up with the input\
    \ load, but we could know that only from profiling and monitoring:\n\n```\n@serve.deployment(num_replicas=2)\n\
    class Summarizer:\n    def __init__(self, max_length: Optional[int] = None):\n\
    \        self._summarizer = pipeline(\"summarization\")\n        self._max_length\
    \ = max_length\n\n    def __call__(self, input_text: str) -> str:\n        result\
    \ = self._summarizer(\n            input_text, max_length=self._max_length, truncation=True)\n\
    \        return result[0][\"summary_text\"]\n```\n\nThe final model in our pipeline\
    \ will be a named entity recognition model: this will attempt to extract named\
    \ entities from the text. Each result will have a confidence score, so we can\
    \ set a threshold to accept only results above a certain threshold. We may also\
    \ want to cap the total number of entities returned. The request handler for this\
    \ deployment calls the model and then uses some basic business logic to enforce\
    \ the provided confidence threshold and limit the number of entities:\n\n```\n\
    @serve.deployment\nclass EntityRecognition:\n    def __init__(self, threshold:\
    \ float = 0.90, max_entities: int = 10):\n        self._entity_recognition = pipeline(\"\
    ner\")\n        self._threshold = threshold\n        self._max_entities = max_entities\n\
    \n    def __call__(self, input_text: str) -> List[str]:\n        final_results\
    \ = []\n        for result in self._entity_recognition(input_text):\n        \
    \    if result[\"score\"] > self._threshold:\n                final_results.append(result[\"\
    word\"])\n            if len(final_results) == self._max_entities:\n         \
    \       break\n\n        return final_results\n```\n\n# HTTP Handling and Driver\
    \ Logic\n\nWith the input preprocessing and ML models defined, we're ready to\
    \ define the HTTP API and driver logic. First, we define the schema of the response\
    \ that we'll return from the API using Pydantic. The response includes whether\
    \ the request was successful and a status message in addition to our summary and\
    \ named entities. This"
  merge: -1
  pgno: 194
- img_proc: true
  md: "will allow us to return a helpful response in error conditions such as when\
    \ no result is found or the sentiment analysis comes back as negative:\n\n```\n\
    from pydantic import BaseModel\n\nclass Response(BaseModel):\n    success: bool\n\
    \    message: str = \"\"\n    summary: str = \"\"\n    named_entities: List[str]\
    \ = []\n```\n\nNext, we need to define the actual control flow logic that will\
    \ run in the driver deployment. The driver itself will not do any of the actual\
    \ heavy lifting; instead, it will call into our three downstream model deployments\
    \ and interpret their results. It will also house the FastAPI app definition,\
    \ parsing the input and returning the correct Response model based on the results\
    \ of the pipeline:\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n\n\
    @serve.deployment\n@serve.ingress(app)\nclass NLPPipelineDriver:\n    def __init__(self,\
    \ sentiment_analysis, summarizer, entity_recognition):\n        self._sentiment_analysis\
    \ = sentiment_analysis\n        self._summarizer = summarizer\n        self._entity_recognition\
    \ = entity_recognition\n\n    @app.get(\"/\", response_model=Response)\n    async\
    \ def summarize_article(self, search_term: str) -> Response:\n        # Fetch\
    \ the top page content for the search term if found.\n        page_content = fetch_wikipedia_page(search_term)\n\
    \        if page_content is None:\n            return Response(success=False,\
    \ message=\"No pages found.\")\n\n        # Conditionally continue based on the\
    \ sentiment analysis.\n        is_positive = await self._sentiment_analysis.remote(page_content)\n\
    \        if not is_positive:\n            return Response(success=False, message=\"\
    Only positivitiy allowed!\")\n\n        # Query the summarizer and named entity\
    \ recognition models in parallel.\n        summary_result = self._summarizer.remote(page_content)\n\
    \        entities_result = self._entity_recognition.remote(page_content)\n   \
    \     return Response(\n            success=True,\n            summary=await summary_result,\n\
    \            named_entities=await entities_result\n        )\n```"
  merge: -1
  pgno: 195
- img_proc: true
  md: "Fetch the page content in the main handler's body using our `fetch_wikipedia_page`\
    \ logic (if no result is found, an error is returned). Then, we call into the\
    \ sentiment analysis model. If this returns negative, we terminate early and return\
    \ an error to avoid calling the other expensive ML models. Finally, we broadcast\
    \ the article contents to both the summary and named entity recognition models\
    \ in parallel. The results of the two models are stitched together into the final\
    \ response, and we return success. Remember that we may have many calls to this\
    \ handler running concurrently: the calls to the downstream models don't block\
    \ the driver, and it could coordinate calls to many replicas of the heavyweight\
    \ models.\n\n# Putting It All Together\n\nAt this point, we have defined all the\
    \ core logic. All that's left is to bind the graph of deployments together and\
    \ run it:\n\n```\nsentiment_analysis = SentimentAnalysis.bind()\nsummarizer =\
    \ Summarizer.bind()\nentity_recognition = EntityRecognition.bind(threshold=0.95,\
    \ max_entities=5)\nnlp_pipeline_driver = NLPPipelineDriver.bind(\n    sentiment_analysis,\
    \ summarizer, entity_recognition)\n```\n\nFirst, we need to instantiate each of\
    \ the deployments with any relevant input arguments. For example, here we pass\
    \ a threshold and limit for the entity recognition model. The most important piece\
    \ we pass is a reference to each of the three models into the driver so it can\
    \ coordinate the computation. Now that we've defined the full NLP pipeline, we\
    \ can run it using `serve run`:⁴\n\n```\nserve run app:nlp_pipeline_driver\n```\n\
    \nThis will deploy each of the four deployments locally and make the driver available\
    \ at http://localhost:8000. We can query the pipeline using the `requests` to\
    \ see it in action. First, let's try querying for an entry on Ray Serve:\n\n```\n\
    import requests\n\nprint(requests.get(\n    \"http://localhost:8000/\", params={\"\
    search_term\": \"rayserve\"}\n).text)\n'{\"success\":false,\"message\":\"No pages\
    \ found.\",\n \"summary\":\"\",\"named_entities\":[]}'\n```\n\n⁴ The models we\
    \ use in this example are quite large, so be warned that it will likely take several\
    \ minutes to download them the first time you run this example."

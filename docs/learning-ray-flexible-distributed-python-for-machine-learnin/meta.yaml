  md: "The algorithm-specific configuration in `training()` becomes even more relevant\
    \ once you've settled on an algorithm and want to squeeze it for performance.\
    \ In practice, RLlib provides you with good defaults to get started.\n\nFor more\
    \ details on configuring RLlib experiments, look up configuration arguments in\
    \ the [API reference for RLlib algorithms](https://docs.ray.io/en/latest/rllib/rllib-algorithms.html).\
    \ But before we move on to examples, you should learn about the most common configuration\
    \ options in practice.\n\n# Resource Configuration\n\nWhether you use Ray RLlib\
    \ locally or on a cluster, you can specify the resources used for the training\
    \ process. Here are the most important options to consider. We continue using\
    \ the DQN algorithm as an example, but this would apply to any other RLlib algorithm\
    \ as well:\n\n```\nfrom ray.rllib.algorithms.dqn import DQNConfig\n\nconfig =\
    \ DQNConfig().resources(\n    num_gpus=1,  # ①\n    num_cpus_per_worker=2,  #\
    \ ②\n    num_gpus_per_worker=0,  # ③\n)\n```\n\n+   ① Specify the number of GPUs\
    \ to use for training. It's important to check whether your algorithm of choice\
    \ supports GPUs first. This value can also be fractional. For example, if using\
    \ four rollout workers in DQN (`num_rollout_workers=4`), you can set `num_gpus=0.25`\
    \ to pack all four workers on the same GPU so that all rollout workers benefit\
    \ from the potential speedup. This affects only the local learner process, not\
    \ the rollout workers.\n\n② Set the number of CPUs to use for each rollout worker.\n\
    \n③ Set the number of GPUs used per worker.\n\n# Rollout Worker Configuration\n\
    \nRLlib lets you configure how your rollouts are computed and how to distribute\
    \ them:\n\n```\nfrom ray.rllib.algorithms.dqn import DQNConfig\n\nconfig = DQNConfig().rollouts(\n\
    \    num_rollout_workers=4,  # ①\n    num_envs_per_worker=1,  # ②\n    create_env_on_local_worker=True,\
    \  # ③\n)\n```\n\n+   ① You've seen this already. It specifies the number of Ray\
    \ workers to use."

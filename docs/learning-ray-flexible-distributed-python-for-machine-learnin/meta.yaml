    In addition to these operations, Datasets also support common aggregations you
    might expect such as groupby, sum, min, etc. You can also pass a user-defined
    function for custom aggregations.


    # Blocks and repartitioning


    One important thing to keep in mind when using Ray Datasets is the concept of
    *blocks*. Blocks are the underlying chunks of data that make up a Dataset; operations
    are applied to the underlying data one block at a time. If the number of blocks
    in a Dataset is too high, each block will be small, and there will be a lot of
    overhead for each operation. If the number of blocks is too small, operations
    won''t be able to be parallelized as efficiently.


    If we take a peek under the hood of the previous example, we can see that the
    initial datasets we created each had 200 blocks by default. When we combined them,
    the resulting Dataset had 400 blocks. Given that the number of blocks is important
    for efficiency, we may want to reshuffle the data to match our original 200 blocks
    and retain the same parallelism. This process of changing the number of blocks
    is called *repartitioning*, and Ray Datasets offers a simple `.repartition(num_blocks)`
    API to achieve it. Let''s use the API to repartition our resulting dataset back
    into 200 blocks:


    ```

    ds1 = ray.data.range(10000)

    print(ds1.num_blocks())  # -> 200

    ds2 = ray.data.range(10000)

    print(ds2.num_blocks())  # -> 200

    ds3 = ds1.union(ds2)

    print(ds3.num_blocks())  # -> 400


    print(ds3.repartition(200).num_blocks())  # -> 200

    ```


    Blocks also control the number of files that are created when we write a Dataset
    to storage (so if you want all of the data to be coalesced into a single output
    file, you should call `.repartition(1)` before writing it).


    # Schemas and data formats


    To this point, we''ve been operating on simple Ray Datasets made up only of integers.
    However, for more complex data processing we often want to have a schema, allowing
    us to more easily comprehend the data and enforce types on each column.


    Given that Datasets are meant to be the point of interoperation for applications
    and libraries on Ray, they are designed to be agnostic to a specific datatype
    and offer flexibility to read, write, and convert between many popular data formats.
    Datasets support Arrow''s columnar format, which enables converting between different
    types'

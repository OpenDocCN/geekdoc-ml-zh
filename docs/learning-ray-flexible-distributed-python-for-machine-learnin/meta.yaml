    \ looked at the classical cart-pole balancing problem. Recall that we didn't implement\
    \ this cart-pole environment; it came out of the box with RLlib.\n\nIn contrast,\
    \ in [Chapter 3](chapter3_link) we implemented a simple maze game on our own.\
    \ The problem with this implementation is that we can't directly use it with RLlib\
    \ or any other RL library for that matter. The reason is that in RL you have ubiquitous\
    \ standards, and our environments need to implement certain interfaces. The best\
    \ known and most widely used library for RL environments is gym, an [open source\
    \ Python project](open_source_link) from OpenAI.\n\nLet's have a look at what\
    \ Gym is and how to convert our maze Environment from the previous chapter to\
    \ a Gym environment compatible with RLlib.\n\n# Building a Gym Environment\n\n\

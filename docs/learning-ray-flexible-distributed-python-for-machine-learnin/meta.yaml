  md: "# Using the RLlib Python API\n\nIn the end, the RLlib CLI is merely a wrapper\
    \ around its underlying Python library. As you will likely spend most of your\
    \ time coding your RL experiments in Python, we'll focus the rest of this chapter\
    \ on aspects of this API.\n\nTo run RL workloads with RLlib from Python, the `Algorithm`\
    \ class is your main entry point. Always start with a corresponding `AlgorithmConfig`\
    \ class to define an algorithm. For instance, in the previous section we used\
    \ a `DQNConfig` as a starting point, and the `rllib train` command took care of\
    \ instantiating the DQN algorithm for us. All other RLlib algorithms follow the\
    \ same pattern.\n\n# Training RLlib algorithms\n\nEvery RLlib `Algorithm` comes\
    \ with reasonable default parameters, meaning that you *can* initialize them without\
    \ having to tweak any configuration parameters for these algorithms.⁷\n\nThat\
    \ said, it's worth noting that RLlib algorithms are highly configurable, as you\
    \ will see in the following example. We start by creating a `DQNConfig` object.\
    \ Then we specify its environment and set the number of rollout workers to two\
    \ by using the `rollouts` method. This means that the DQN algorithm will spawn\
    \ two Ray actors, each using a CPU by default, to run the algorithm in parallel.\
    \ Also, for later evaluation purposes, we set `create_env_on_local_worker` to\
    \ `True`:\n\n```\nfrom ray.tune.logger import pretty_print\nfrom maze_gym_env\
    \ import GymEnvironment\nfrom ray.rllib.algorithms.dqn import DQNConfig\n\nconfig\
    \ = (DQNConfig().environment(GymEnvironment)\n          .rollouts(num_rollout_workers=2,\
    \ create_env_on_local_worker=True))\n\npretty_print(config.to_dict())\n\nalgo\
    \ = config.build()\n\nfor i in range(10):\n    result = algo.train()\n\nprint(pretty_print(result))\n\
    ```\n\n⁷ Of course, configuring your models is a crucial part of RL experiments.\
    \ We will discuss configuration of RLlib algorithms in more detail in the next\
    \ section."

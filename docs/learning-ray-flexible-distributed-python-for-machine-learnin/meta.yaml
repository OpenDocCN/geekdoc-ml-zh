    ))\n\ntune.run(objective, config=search_space)\n```\n\nThere are many more interesting\
    \ features to explore in Ray Tune, but let's switch gears here and look into some\
    \ machine learning applications using Tune.\n\n## Machine Learning with Tune\n\
    \nAs we've seen, Tune is versatile and allows you to tune hyperparameters for\
    \ any objective you give it. In particular, you can use it with any machine learning\
    \ framework you're interested in. This section provides two examples. First, we're\
    \ going to use Tune to optimize parameters of an RLlib experiment, and then we'll\
    \ tune a Keras model using Optuna through Tune.\n\n## Using RLlib with Tune\n\n\
    RLlib and Tune have been designed to work together, so you can quite easily set\
    \ up an HPO experiment for your existing RLlib code. In fact, RLlib trainers can\
    \ be passed into the first argument of tune.run, as Trainable. You can choose\
    \ between the actual trainer class, like DQNTrainer, or its string representation,\
    \ like \"DQN\". As Tune metric you can pass any metric tracked by your RLlib experiment,\
    \ for instance \"episode_reward_mean\". And the config argument to tune.run is\
    \ just your RLlib trainer configuration, but you can use the full power of Tune's\
    \ search space API to sample hyperparameters like the learning rate or training\
    \ batch size.⁴ Here's a full example of what we just described, running a tuned\
    \ RLlib experiment on the CartPole-v0 Gym environment:\n\n```\nfrom ray import\
    \ tune\n\nanalysis = tune.run(\n    \"DQN\",\n    metric=\"episode_reward_mean\"\
    ,\n    mode=\"max\",\n    config={\n        \"env\": \"CartPole-v1\",\n      \
    \  \"lr\": tune.uniform(1e-5, 1e-4),\n        \"train_batch_size\": tune.choice([10000,\
    \ 20000, 40000]),\n    },\n)\n```\n\n⁴ In case you were wondering why the \"config\"\
    \ argument in tune.run was not called search_space, the historical reason lies\
    \ in this interoperability with RLlib config objects.\n\n## Tuning Keras Models\n\
    \nTo wrap up this chapter, let's look at a slightly more involved example. As\
    \ we mentioned, this is not primarily a machine learning book but rather an introduction\
    \ to Ray and its libraries. Thus we can neither introduce you to the basics of\
    \ ML nor spend much time on introducing ML frameworks in detail. So, in this section\
    \ we assume familiarity with Keras and its API and some basic knowledge about\
    \ supervised learning. If you do not have these prerequisites, you should still\
    \ be able to follow along and focus on the Ray Tune–specific parts. You can view\
    \ the following example as a more realistic scenario of applying Tune to machine\
    \ learning workloads.\n\nFrom a bird's-eye view, we'll take the following steps:\n\
    \n- 1. Load a common dataset.\n- 2. Prepare it for an ML task.\n- 3. Define a\
    \ Tune objective by creating a deep learning model with Keras that reports an\
    \ accuracy metric to Tune.\n- 4. Use Tune's Hyperopt integration to define a search\
    \ algorithm that tunes a set of hyperparameters of our Keras model.\n\nThe Tune\
    \ workflow remains the same: we define an objective and a search space and then\
    \ use tune.run with the configuration we want. On a high level, the process of\
    \ using Tune with any ML framework works as shown in Figure 5-2.\n\n![](img/6489687a3a178f2884963bddc928992c_137_0.png)\n\
    \nTo define a dataset to train on, let's write a simple load_data utility function\
    \ that loads the famous MNIST data that ships with Keras. MNIST consists of 28\
    \ × 28 pixel images of handwritten digits. We normalize the pixel values to be\
    \ between 0 and 1 and make the labels for those 10 digits categorical variables.\
    \ Here's how you can do this purely with Keras's built-in functionality (make\
    \ sure to use pip install tensorflow before running this):\n\n```\nfrom tensorflow.keras.datasets\
    \ import mnist\nfrom tensorflow.keras.utils import to_categorical\n\ndef load_data():\n\
    \    (x_train, y_train), (x_test, y_test) = mnist.load_data()\n    num_classes\
    \ = 10\n    x_train, x_test = x_train / 255.0, x_test / 255.0\n    y_train = to_categorical(y_train,\
    \ num_classes)\n    y_test = to_categorical(y_test, num_classes)\n    return (x_train,\
    \ y_train), (x_test, y_test)\n\nload_data()\n```\n\nNote that after defining `load_data`,\
    \ we call it once so that the data gets downloaded locally. That’s because when\
    \ you call `mnist.load_data()`, it first looks for a locally cached copy. If we\
    \ didn’t load the data first, several Tune workers would try to download the data\
    \ in parallel, which can lead to problems.⁵\n\nNext, we define a Tune objective\
    \ function, or trainable, by loading the data we just defined, setting up a sequential\
    \ Keras model with hyperparameters selected from the config we pass into our objective,\
    \ and then compile and fit the model. To define our deep learning model, we first\
    \ flatten the MNIST input images to vectors and then add two fully connected layers\
    \ (called Dense in Keras) and a Dropout layer in between.\n\nThe hyperparameters\
    \ we want to tune are the activation function of the first Dense layer, the Dropout\
    \ rate, and the number of “hidden” output units of the first layer. We could tune\
    \ any other hyperparameter of this model the same way; this selection is just\
    \ an example.\n\nWe could manually report a metric of interest in the same way\
    \ we did in other examples in this chapter (e.g., by returning a dictionary in\
    \ our objective or using `tune.report(...)`). But since Tune comes with a proper\
    \ Keras integration, we can use the so-called `TuneReportCallback` as a custom\
    \ Keras callback that we pass into our model’s fit method. This is what our Keras\
    \ objective function looks like:\n\n```\nfrom tensorflow.keras.models import Sequential\n\
    from tensorflow.keras.layers import Flatten, Dense, Dropout\nfrom ray.tune.integration.keras\
    \ import TuneReportCallback\n```\n\n⁵ This can even lead to a rare condition in\
    \ which one worker starts downloading the data and another one checks for and\
    \ sees a local copy. But since the download is not complete, the second worker\
    \ will try to open a potentially corrupted file. This goes to show that, while\
    \ Ray takes care of a lot of things in the background, you still need to be mindful\
    \ about how you write your code.\n\n```\ndef objective(config):\n    (x_train,\
    \ y_train), (x_test, y_test) = load_data()\n    model = Sequential()\n    model.add(Flatten(input_shape=(28,\
    \ 28)))\n    model.add(Dense(config[\"hidden\"], activation=config[\"activation\"\
    ]))\n    model.add(Dropout(config[\"rate\"]))\n    model.add(Dense(10, activation=\"\
    softmax\"))\n\n    model.compile(loss=\"categorical_crossentropy\", metrics=[\"\
    accuracy\"])\n    model.fit(x_train, y_train, batch_size=128, epochs=10,\n   \
    \           validation_data=(x_test, y_test),\n              callbacks=[TuneReportCallback({\"\
    mean_accuracy\": \"accuracy\"})])\n```\n\nNext, let's use a custom search algorithm\
    \ to tune this objective. Specifically, we're using the HyperOptSearch algorithm,\
    \ which gives us access to Hyperopt's TPE algorithm through Tune. To use this\
    \ integration, make sure to install Hyperopt on your machine (for instance with\
    \ `pip install hyperopt==0.2.7`). HyperOptSearch allows us to define a list of\
    \ promising initial hyperparameter choices to investigate.\n\nThis is entirely\
    \ optional, but sometimes you might have good guesses to start from. In our case,\
    \ we go with a dropout \"rate\" of 0.2, 128 \"hidden\" units, and a rectified\
    \ linear unit (ReLU) \"activation\" function initially. Other than that, we can\
    \ define a search space with the tune utility just as we did before. Finally,\
    \ we can get an analysis object to determine the best hyperparameters found by\
    \ passing everything into a `tune.run` call:\n\n```\nfrom ray import tune\nfrom\
    \ ray.tune.suggest.hyperopt import HyperOptSearch\n\ninitial_params = [{\"rate\"\
    : 0.2, \"hidden\": 128, \"activation\": \"relu\"}]\nalgo = HyperOptSearch(points_to_evaluate=initial_params)\n\
    \nsearch_space = {\n    \"rate\": tune.uniform(0.1, 0.5),\n    \"hidden\": tune.randint(32,\
    \ 512),\n    \"activation\": tune.choice([\"relu\", \"tanh\"])\n}\n\nanalysis\
    \ = tune.run(\n    objective,\n    name=\"keras_hyperopt_exp\",\n    search_alg=algo,\n\
    \    metric=\"mean_accuracy\",\n    mode=\"max\",\n    stop={\"mean_accuracy\"\
    : 0.99},\n    num_samples=10,\n    config=search_space,\n)\nprint(\"Best hyperparameters\
    \ found were: \", analysis.best_config)\n```"

    \ Define multiple policies for our agents, each with a different \"gamma\" value.\n\
    2. Each agent can then be mapped to a policy with a custom `policy_mapping_fn`.\n\
    \nAs you can see, running multi-agent RL experiments is a first-class citizen\
    \ of RLlib, and there's a lot more that could be said about it. The support of\
    \ MARL problems is probably one of RLlib's strongest features.\n\n# Working with\
    \ Policy Servers and Clients\n\nFor the last example in this section, let's assume\
    \ our original `GymEnvironment` can be simulated only on a machine that can't\
    \ run RLlib, for instance because it doesn't have enough resources available.\
    \ We can run the environment on a `PolicyClient` that can ask a respective `server`\
    \ for suitable next actions to apply to the environment. The server, in turn,\
    \ does not know about the environment. It only knows how to ingest input data\
    \ from a `PolicyClient`, and it is responsible for running all RL-related code;\
    \ in particular, it defines an RLlib `AlgorithmConfig` object and trains an `Algorithm`.\n\
    \nTypically, you want to run the server that trains your algorithm on a powerful\
    \ Ray Cluster, and then the respective client runs outside that cluster. Figure\
    \ 4-3 schematically illustrates this setup."

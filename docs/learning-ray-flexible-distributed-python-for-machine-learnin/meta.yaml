  md: "# Ray Datasets and Preprocessors\n\nThe standard way to load data in Ray AIR\
    \ is with Ray Datasets. AIR Preprocessors are used to transform input data into\
    \ features for ML experiments. We've already briefly touched on preprocessors\
    \ in Chapter 7 but have not discussed them in the context of AIR yet.\n\nSince\
    \ Ray AIR Preprocessors operate on Datasets and leverage the Ray ecosystem, they\
    \ allow you to scale your preprocessing steps efficiently. During training an\
    \ AIR Preprocessor is *fitted* to the specified training data and can then later\
    \ be used for both training and serving.¹ AIR comes packaged with many common\
    \ preprocessors that cover many use cases. If you don't find the one you need,\
    \ you can easily define a custom preprocessor on your own.\n\nIn our example,\
    \ we want to read a CSV file from an S3 bucket into a columnar dataset first,\
    \ using the `read_csv` utility. Then we split our dataset into a training and\
    \ a test dataset and define an AIR Preprocessor, `StandardScaler`, which normalizes\
    \ all specified columns of our dataset to have a mean of 0 and a variance of 1.\
    \ Note that just specifying a preprocessor does not transform the data just yet.\
    \ Here is how you implement this:\n\n```\nimport ray\nfrom ray.data.preprocessors\
    \ import StandardScaler\n\ndataset = ray.data.read_csv(\n    \"s3://anonymous@air-example-data/breast_cancer.csv\"\
    \n) ❶\n\ntrain_dataset, valid_dataset = dataset.train_test_split(test_size=0.2)\n\
    test_dataset = valid_dataset.drop_columns(cols=[\"target\"]) ❷\n\npreprocessor\
    \ = StandardScaler(columns=[\"mean radius\", \"mean texture\"]) ❸\n```\n\n+  \
    \ ❶ Load the breast cancer CSV file from S3 using Ray Datasets.\n❷ After defining\
    \ a training and a test dataset, we drop the target column on the test data.\n\
    ❸ Define an AIR Preprocessor to scale two variables of the dataset to be normally\
    \ distributed.\n\n> ¹ This gives you parity between your training and serving\
    \ pipelines, which makes working with AIR convenient because you don't have to\
    \ reimplement pipelines for different use cases."

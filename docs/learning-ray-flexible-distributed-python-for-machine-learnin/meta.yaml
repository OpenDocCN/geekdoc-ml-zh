    ## AIR 故障模型


    AIR 通过*谱系重建*为大多数无状态计算提供容错性。这意味着如果数据集块因节点故障而丢失，Ray 将通过重新提交必要的任务来重建它们，从而使工作负载能够扩展到大型集群。请注意，容错不适用于主节点故障。存储集群元数据的全局控制服务（GCS）崩溃将终止集群中的所有作业。¹⁰


    涉及有状态计算的作业主要依赖于基于检查点的容错。Tune 将根据其故障配置中设置的检查点间隔，从最后一个检查点重新启动分布式试验。这意味着 Tune 可以有效地在由“Spot
    实例”组成的集群上运行试验。此外，在整个集群故障的情况下，可以从实验范围的检查点恢复整个 Tune 实验。


    复合工作负载继承了无状态和有状态工作负载的容错策略，兼得两者之长。这意味着谱系重建适用于工作负载的无状态部分，而应用级检查点仍然适用于整体计算。


    ⁹ 有状态工作负载使用 Python 的堆内存，该内存不由 Ray 管理。

    ¹⁰ GCS 可以部署在*高可用性*（HA）模式下以防止这种情况，但这通常仅对在线服务工作负载有益。


    ## 自动扩展 AIR 工作负载


    AIR 库可以在我们在第 9 章介绍的自动扩展 Ray 集群上运行。对于无状态工作负载，如果有排队的任务（或排队的数据集计算参与者），Ray 将自动扩展。对于有状态工作负载，如果有待处理的放置组（即
    Tune 试验）尚未在集群中调度，Ray 将自动扩展。当节点空闲时，Ray 将自动缩减。当节点上没有资源使用，并且内存中或磁盘上没有 Ray 对象时，该节点被视为空闲。由于大多数
    AIR 库利用对象，这意味着如果节点持有其他节点上的工作线程引用的对象（例如另一个试验使用的数据集块），则可能会保留这些节点。


    你应该意识到，自动扩展可能导致集群中的数据平衡不理想，因为较早启动的节点在其生命周期内自然会运行更多任务。考虑限制（例如从某个最小集群大小开始）或禁用自动扩展，以优化数据密集型工作负载的效率。



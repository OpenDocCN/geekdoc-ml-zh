    ## Online serving


    Lastly, AIR is built to handle scalable online serving of (multiple) models. The
    transition from the previous three workloads to serving is frictionless by design,
    as you still operate within the same AIR ecosystem.


    Figure 10-7 illustrates the typical stateless tasks of Ray AIR.


    ![](img/6489687a3a178f2884963bddc928992c_229_0.png)


    These four tasks map to Ray''s libraries straightforwardly. For instance, in this
    chapter we''ve discussed several ways in which Ray Datasets are used for stateless
    computation. You could run batch inference on a given Dataset by passing it into
    a BatchPredictor loaded from an AIR Checkpoint. Or you could preprocess a Dataset
    to produce features for later training.⁶


    Likewise, there are three AIR libraries dedicated to stateful computations, namely,
    Train, Tune, and RLlib. As we''ve seen, both Train and RLlib integrate seamlessly
    with Tune in AIR by passing the respective Trainer objects into a Tuner.


    When it comes to advanced composite workloads, Ray AIR and its combined usage
    of both tasks and actors really shines. For instance, some ML training procedures
    need to perform complex data processing tasks during training. Others may require
    shuffling the training dataset before each epoch. Since Ray AIR''s training libraries
    (based on actors) can seamlessly leverage data processing operations (mostly based
    on tasks), even the most complex use cases can be reflected in AIR.


    Also, since you can use any AIR Checkpoint with Ray Serve, AIR makes it easy to
    switch from training to serving workloads, using the same infrastructure. We''ve
    seen how you can use a PredictorDeployment to host a model behind an HTTP endpoint,
    which is optimized for low latency and high throughput. By deploying AIR, you
    can scale your prediction services to multiple replicas and use Ray’s autoscaling
    features to adjust your cluster according to inbound traffic.⁷


    You can use these types of workloads in different scenarios, too. For instance,
    you can use AIR to replace and scale out a single component of an existing pipeline.
    Or you can create your own end-to-end machine learning apps with AIR, as we’ve
    indicated in this chapter. Lastly, you can also use AIR to build your own AI platform,
    a topic that we’ll look at in Chapter 11.


    Figure 10-8 summarizes how these four types of AI workloads are covered by AIR

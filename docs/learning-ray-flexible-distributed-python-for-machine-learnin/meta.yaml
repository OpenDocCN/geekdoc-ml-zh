    # Manually Creating a Ray Cluster


    Let''s start with the most basic way of creating a Ray Cluster. To build a Ray
    Cluster manually we assume that you have a list of machines that can communicate
    with each other and have Ray installed on them.³


    To start with, you can choose any machine to be the head node. On this node, run
    the following command:


    ```

    ray start --head --port=6379

    ```


    This command will print out the IP address of the Ray GCS server that was started,
    namely, the local node IP address plus the port number you specified:⁴


    ```

    ...

    Next steps

    To connect to this Ray runtime from another node, run

    ray start --address=''<head-address>:6379''


    If connection fails, check your firewall settings and network configuration.

    ```


    You need this `<head-address>` to connect your other nodes to the cluster, so
    make sure to copy it. If you omit the `--port` argument, Ray will use a random
    port.


    Next, we can connect every other node in your cluster to the head node by running
    a single command on each node:


    ```

    ray start --address=<head-address>

    ```


    Make sure to pass the correct `<head-address>`, which should look something like
    123.45.67.89:6379. Running this command, you should see output of the following
    form:


    ```

    -----------------------

    Ray runtime started.

    -----------------------


    To terminate the Ray runtime, run

    ray stop

    ```


    If you wish to specify that a machine has 10 CPUs and 1 GPU, you can do this with
    the flags `--num-cpus=10` and `--num-gpus=1`. If you see `Ray runtime started.`,
    then


    ³ Depending on your setup or work situation, this might not be a realistic assumption
    for you. Don''t worry, we''ll cover ways to create Ray Clusters that don''t require
    you to have any machines running. In any case, knowing the steps involved for
    manual Ray Cluster creation is useful to fall back on.


    4 If you already have remote Redis instances, you can use them by specifying the
    environment variable RAY_REDIS_ADDRESS=ip1:port1,ip2:port2.... Ray will use the
    first address as primary and the rest as shards.'

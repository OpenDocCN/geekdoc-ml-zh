  md: '# Summary


    Figure 1-4 gives you an overview of the three layers of Ray as we laid them out.
    Ray’s core distributed execution engine sits at the center of the framework. The
    Ray Core API is a versatile library for distributed computing, and Ray Clusters
    allow you to deploy your workloads in a variety of ways.


    For practical data science workflows you can use Ray Datasets for data processing,
    Ray RLib for reinforcement learning, Ray Train for distributed model training,
    Ray Tune for hyperparameter tuning, and Ray Serve for model serving. You’ve seen

    \ Ray architecture whitepaper.\n\nWe still want to work more on this example,⁷\
    \ but let's take a step back here and recap what we did so far. You started with\
    \ a Python function and decorated it with `@ray.remote`. This made your function\
    \ a Ray task. Then, instead of calling the original function in your code, you\
    \ called `.remote(...)` on the Ray task. The last step was to use `.get(...)`\
    \ to get the results from your Ray Cluster. This procedure is so intuitive that\
    \ you might be able to create your own Ray task from another function without\
    \ having to look back at this example. Why don't you give it a try right now?\n\
    \nComing back to our example: by using Ray tasks, what did we gain in terms of\
    \ performance? The runtime clocks in at 0.71 seconds for us, which is just slightly\
    \ more than the longest subtask, which comes in at 0.7 seconds. That's great and\
    \ much better than before, but we can further improve our program by leveraging\
    \ more of Ray's API.\n\n## Using the object store with put and get\n\nOne thing\
    \ you might have noticed is that in the definition of `retrieve` we *directly*\
    \ accessed items from our database. When working on a local Ray Cluster, this\
    \ is fine, but imagine you're running on an actual cluster that includes several\
    \ computers. How would all those computers access the same data? Remember from\
    \ Chapter 1 that in a Ray Cluster there is one head node with a driver process\
    \ (running `ray.init()`) and many worker nodes with worker processes executing\
    \ your tasks. By default, Ray will create as many worker processes as there are\
    \ CPU cores on your machine. Our database is currently defined on the driver only,\
    \ but the workers running your tasks need to have access to it to run the `retrieve`\
    \ task. Luckily, Ray provides an easy way to share *objects* between the driver\
    \ and workers (or between workers). You can simply use `put` to place your data\
    \ into Ray's *distributed object store*. In our definition of `retrieve_task`\
    \ we explicitly pass in a `db` argument, to which we later will pass our `db_object_ref`\
    \ object:\n\n```python\ndb_object_ref = ray.put(database) ①\n\n@ray.remote\ndef\
    \ retrieve_task(item, db): ②\n    time.sleep(item / 10.)\n    return item, db[item]\n\
    ```\n\n① put your database into the object store and receive a reference to it.\
    \ This way we can explicitly pass this reference to our Ray task later.\n\n② The\
    \ Ray task `retrieve_task` takes the object reference as an argument.\n\n⁷ This\
    \ example has been adapted from Dean Wampler's fantastic report \"What Is Ray?\"\
    .\n\nBy using the object store this way, you can let Ray handle data access across\
    \ the whole cluster. We'll talk about how exactly values are passed between nodes\
    \ and within workers when talking about Ray's infrastructure. While the interaction\
    \ with the object store requires some overhead, it gives you performance gains\
    \ when working with larger, more realistic datasets. For now, the important part\
    \ is that this step is essential in a truly distributed setting. If you like,\
    \ try to rerun Example 2-1 with this new `retrieve_task` function and confirm\
    \ that it still runs as expected.\n\n## Using Ray's wait function for nonblocking\
    \ calls\n\nNote how in Example 2-1 we used `ray.get(object_references)` to access\
    \ results. This call is blocking, which means that our driver has to wait for\
    \ all the results to be available. That's not a big deal in our case; the program\
    \ now finishes in under a second. But imagine that the processing of each database\
    \ item would take several minutes. In that case, you would want to free up the\
    \ driver process for other tasks, instead of sitting idly by. Also, it would be\
    \ great to process results as they come in (some finish much quicker than others),\
    \ rather than waiting for all items to be processed. One more question to keep\
    \ in mind is, what happens if one of the database items can't be retrieved as\
    \ expected? Let's say there's a deadlock somewhere in the database connection.\
    \ The driver would simply hang and never retrieve all items. For that reason it's\
    \ a good idea to work with reasonable timeouts. Let's say we don't want to wait\
    \ longer than 10 times the longest data retrieval task before stopping the task.\
    \ Here's how you can do that with Ray by using `wait`:\n\n```python\nstart = time.time()\n\
    object_references = [\n    retrieve_task.remote(item, db_object_ref) for item\
    \ in range(8)\n]\nall_data = []\n\nwhile len(object_references) > 0:\n    finished,\
    \ object_references = ray.wait(\n        object_references, num_returns=2, timeout=7.0\n\
    \    )\n    data = ray.get(finished)\n    print_runtime(data, start)\n    all_data.extend(data)\n\
    ```\n\n1. Run `remote` on our `retrieve_task` and pass the respective item we\
    \ want to retrieve and the object reference to our database.\n2. Instead of blocking,\
    \ loop through unfinished `object_references`.\n3. We asynchronously wait for\
    \ finished data with a reasonable timeout. `object_references` gets overridden\
    \ here, to prevent an infinite loop.\n4. Print results as they come in, namely\
    \ in blocks of two.\n5. append new data to the `all_data` until finished.\n\n\
    As you can see, `ray.wait` returns two arguments: finished values and futures\
    \ that still need to be processed. We use the `num_returns` argument, which defaults\
    \ to 1, to let `wait` return whenever a new pair of database items is available.\
    \ This results in the following output for us:\n\n```\nRuntime: 0.11 seconds,\
    \ data:\n(0, 'Learning')\n(1, 'Ray')\nRuntime: 0.31 seconds, data:\n(2, 'Flexible')\n\
    (3, 'Distributed')\nRuntime: 0.51 seconds, data:\n(4, 'Python')\n(5, 'for')\n\
    Runtime: 0.71 seconds, data:\n(6, 'Machine')\n(7, 'Learning')\n```\n\nNote how\
    \ in the while loop, instead of just printing results, we could have done many\
    \ other things, like starting entirely new tasks on other workers with the values\
    \ already retrieved up to this point.\n\n## Handling task dependencies\n\nSo far\
    \ our example program has been fairly easy on a conceptual level. It consists\
    \ of a single step: retrieving a bunch of database items. Now, imagine that once\
    \ your data is loaded you want to run a follow-up processing task. To be more\
    \ concrete, let's say we want to use the result of our first retrieve task to\
    \ query other, related data (pretend that you're querying data from a different\
    \ table in the same database). Example 2-2 sets up such a task and runs both our\
    \ `retrieve_task` and `follow_up_task` consecutively.\n\n**Example 2-2. Running\
    \ a follow-up task that depends on another Ray task**\n\n```python\n@ray.remote\n\
    def follow_up_task(retrieve_result): ①\n    original_item, _ = retrieve_result\n\
    \    follow_up_result = retrieve(original_item + 1) ②\n    return retrieve_result,\
    \ follow_up_result ③\n\nretrieve_refs = [retrieve_task.remote(item, db_object_ref)\
    \ for item in [0, 2, 4, 6]]\nfollow_up_refs = [follow_up_task.remote(ref) for\
    \ ref in retrieve_refs] ④\n```"

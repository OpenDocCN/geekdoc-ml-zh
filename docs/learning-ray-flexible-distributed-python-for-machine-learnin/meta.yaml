  md: "The last step is to modify rendering the environment, which we do by denoting\
    \ each agent by its ID when printing the maze to the screen:\n\n```\ndef render(self,\
    \ *args, **kwargs):\n    os.system('cls' if os.name == 'nt' else 'clear')\n  \
    \  grid = [['|' + ' ' for _ in range(5)] + ['|\\n'] for _ in range(5)]\n    grid[self.goal[0]][self.goal[1]]\
    \ = '|G'\n    grid[self.agents[1][0]][self.agents[1][1]] = '|1'\n    grid[self.agents[2][0]][self.agents[2][1]]\
    \ = '|2'\n    print(''.join([''.join(grid_row) for grid_row in grid]))\n```\n\n\
    Randomly rolling out an episode until *one* of the agents reaches the goal can,\
    \ for instance, be done by the following code:¹⁸\n\n```\nimport time\n\nenv =\
    \ MultiAgentMaze()\n\nwhile True:\n    obs, rew, done, info = env.step(\n    \
    \    {1: env.action_space.sample(), 2: env.action_space.sample()}\n    )\n   \
    \ time.sleep(0.1)\n    env.render()\n    if any(done.values()):\n        break\n\
    ```\n\nNote how we have to make sure to pass two random samples by means of a\
    \ Python dictionary into the step method, and how we check if any of the agents\
    \ are done yet. We use this break condition for simplicity because it's highly\
    \ unlikely that both seekers find their way to the goal at the same time by chance.\
    \ But of course we'd like both agents to complete the maze eventually.\n\nIn any\
    \ case, equipped with our MultiAgentMaze, training an RLlib Algorithm works *exactly*\
    \ the same way as before:\n\n```\nfrom ray.rllib.algorithms.dqn import DQNConfig\n\
    \nsimple_trainer = DQNConfig().environment(env=MultiAgentMaze).build()\nsimple_trainer.train()\n\
    ```\n\nThis covers the simplest case of training a multi-agent reinforcement learning\
    \ (MARL) problem. But if you remember what we said earlier, when using multiple\
    \ agents, there's always a mapping between agents and policies. By not specifying\
    \ such a mapping, both of our seekers were implicitly assigned to the same policy.\
    \ This can\n\n> 18 Deciding when an episode is done is a crucial part of multi-agent\
    \ RL, and it depends entirely on the problem at hand and what you want to achieve."

    \ `object_references`。\n3. 我们以合理的超时时间异步等待完成的数据。这里的 `object_references` 被覆盖，以防止无限循环。\n\
    4. 在结果可用时打印它们，即每两个一组。\n5. 将新数据附加到 `all_data` 直到完成。\n\n如你所见，`ray.wait` 返回两个参数：已完成的值和仍需处理的\

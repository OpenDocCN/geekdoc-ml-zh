    ds.show(5)

    ```


    ❶ Creating a Dataset by using `from_items` from the `ray.data` module.


    ❷ Printing the first five items of the Dataset.


    To show a Dataset means to print some of its values. You should see precisely
    five elements on your command line, like this:


    ```

    {''name'': ''0'', ''data'': 0}

    {''name'': ''1'', ''data'': 1}

    {''name'': ''2'', ''data'': 2}

    {''name'': ''3'', ''data'': 3}

    {''name'': ''4'', ''data'': 4}

    ```


    Great, now you have some rows, but what can you do with that data? The Dataset
    API bets heavily on functional programming, as this paradigm is well suited for
    data transformations.


    Even though Python 3 made a point of hiding some of its functional programming
    capabilities, you''re probably familiar with functionality such as `map`, `filter`,
    `flat_map`, and others. If not, it''s easy enough to pick up: `map` takes each
    element of your dataset and transforms it into something else, in parallel; `filter`
    removes data points according to a Boolean filter function; and the slightly more
    elaborate `flat_map` first maps values similarly to `map`, but then it also "flattens"
    the result. For instance, if `map` produced a list of lists, `flat_map` would
    flatten out the nested lists and give you just a list. Equipped with these three
    functional API calls,¹⁵ let''s see how easily you can transform your dataset `ds`:


    ```

    squares = ds.map(lambda x: x["data"] ** 2) ❶


    evens = squares.filter(lambda x: x % 2 == 0) ❷

    evens.count()


    cubes = evens.flat_map(lambda x: [x, x**3]) ❸

    sample = cubes.take(10) ❹

    print(sample)

    ```


    ❶ We map each row of `ds` to only keep the square value of its data entry.



  md: "```\ndef map_function(document):\n    for word in document.lower().split():\n\
    \        yield word, 1\n```\n\nNext, we want to apply this map function to a whole\
    \ corpus of documents. We do this by making the following apply_map function a\
    \ Ray task via the @ray.remote decorator. When we call apply_map, we'll apply\
    \ it to three partitions (num_partitions=3) of document data, just like we indicated\
    \ in Figure 2-4. Note that apply_map will return three lists, one for each partition.\
    \ As you will see in a moment, we do this so that Ray can automatically shuffle\
    \ the results of the map phase to the right nodes for us:\n\n```\nimport ray\n\
    \n@ray.remote\ndef apply_map(corpus, num_partitions=3):\n    map_results = [list()\
    \ for _ in range(num_partitions)]\n    for document in corpus:\n        for result\
    \ in map_function(document):\n            first_letter = result[0].decode(\"utf-8\"\
    )[0]\n            word_index = ord(first_letter) % num_partitions\n          \
    \  map_results[word_index].append(result)\n    return map_results\n```\n\n+  \
    \ 1. The Ray task apply_map returns one result for each data partition.\n2. Assign\
    \ each (word, 1) pair to a partition by using the ord function to generate a word_index.\
    \ This ensures that each occurrence of a word gets shuffled to the same partition.\n\
    3. The pairs are then successively appended to the correct list.\n\nFor a text\
    \ corpus that can be loaded on a single machine, this is overkill, and we could\
    \ count the words instead. But in a distributed setting, in which we have to partition\
    \ the data across several nodes, this map phase makes perfect sense.\n\nTo apply\
    \ the map phase to our corpus of documents in parallel, we use a remote call on\
    \ apply_map as we've done many times before in this chapter. The notable difference\
    \ is that now we also instruct Ray to return three results (one for each partition)\
    \ via the num_returns argument:\n\n```\nmap_results = [\n    apply_map.options(num_returns=num_partitions)\n\
    \    .remote(data, num_partitions)\n    for data in partitions\n]\n\nfor i in\
    \ range(num_partitions):\n    mapper_results = ray.get(map_results[i])\n```"

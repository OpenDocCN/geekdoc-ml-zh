- md: "## Building a Simulation\n\nWith the Environment class implemented, what does\
    \ it take to tackle the problem of “teaching” the seeker to play the game well?\
    \ How can it find the goal consistently in the minimum number of eight steps necessary?\
    \ We’ve equipped the maze environment with reward information so that the seeker\
    \ can use this signal to learn to play the game. In RL, you play games repeatedly\
    \ and learn from the experience you gain in the process. The player of the game\
    \ is often referred to as an *agent* that takes *actions* in the environment,\
    \ observes its *state*, and receives a *reward*.<sup>2</sup> The better an agent\
    \ learns, the better it becomes at interpreting the current game state (observations)\
    \ and finding actions that lead to more rewarding outcomes.\n\nRegardless of the\
    \ RL algorithm you want to use, you need to have a way of simulating the game\
    \ repeatedly to collect experience data. For this reason, we're going to implement\
    \ a simple `Simulation` class.\n\nThe other useful abstraction we need to proceed\
    \ is that of a `Policy`, a way of specifying actions. Right now the only thing\
    \ we can do to play the game is sample random actions for our seeker. What a `Policy`\
    \ allows us to do is to get better actions for the current state of the game.\
    \ In fact, we define a `Policy` to be a class with a `get_action` method that\
    \ takes a game state and returns an action.\n\nRemember that in our game the seeker\
    \ has a total of 25 possible states on the grid and can carry out four actions.\
    \ A simple idea would be to look at pairs of states and actions and assign a high\
    \ value to a pair if carrying out this action in this state will lead to a high\
    \ reward, and a low value otherwise. For instance, from your intuition of the\
    \ game it should be clear that going down or right is always a good idea, whereas\
    \ going left or up is not. Then, create a 25 × 4 lookup table of all possible\
    \ state-action pairs and store it in our `Policy`. Then we could simply ask our\
    \ policy to return the highest value of any action, given a state. Of course,\
    \ implementing an algorithm that finds good values for these state-action pairs\
    \ is the challenging part. Let's implement this idea of a `Policy` first and worry\
    \ about a suitable algorithm later:\n\n```python\nimport numpy as np\n\nclass\
    \ Policy:\n\n    def __init__(self, env):\n        \"\"\"A Policy suggests actions\
    \ based on the current state.\n        We do this by tracking the value of each\
    \ state-action pair.\n        \"\"\"\n        self.state_action_table = [\n  \
    \          [0 for _ in range(env.action_space.n)]\n            for _ in range(env.observation_space.n)\n\
    \        ]\n        self.action_space = env.action_space\n\n    def get_action(self,\
    \ state, explore=True, epsilon=0.1):\n        \"\"\"Explore randomly or exploit\
    \ the best value currently available.\"\"\"\n        if explore and random.uniform(0,\
    \ 1) < epsilon:\n            return self.action_space.sample()\n        return\
    \ np.argmax(self.state_action_table[state])\n```\n\n> <sup>2</sup> As we'll see\
    \ in Chapter 4, you can run RL on multiplayer games too. Making the maze environment\
    \ a so-called multi-agent environment, in which multiple seekers compete for the\
    \ goal, is an interesting exercise.\n\n1. Define a nested list of values for each\
    \ state-action pair, initialized to zero.\n2. Explore random actions on demand\
    \ so that we don't get stuck in suboptimal behavior.\n3. Introduce an explore\
    \ parameter to the get_action method because we might want to explore actions\
    \ randomly in the game. By default, this happens 10% of the time.\n4. Return the\
    \ action with the highest value in the lookup table, given the current state.\n\
    \nWe've snuck a little implementation detail into the Policy definition that might\
    \ be a bit confusing. The get_action method has an explore parameter. Without\
    \ it, if you learn an extremely poor policy (e.g., one that always wants you to\
    \ move left), you have no chance of ever finding better solutions. In other words,\
    \ sometimes you need to explore new ways and not \"exploit\" your current understanding\
    \ of the game. As indicated before, we haven't discussed how to learn to improve\
    \ the values in the state_action_table of our policy. For now, just keep in mind\
    \ that the policy gives us the actions we want to follow when simulating the maze\
    \ game.\n\nMoving on to the Simulation class we spoke about earlier, a simulation\
    \ should take an Environment and compute actions of a given Policy until the goal\
    \ is reached and the game ends. The data we observe when \"rolling out\" a full\
    \ game like this is what we call the experience we gained. Accordingly, our Simulation\
    \ class has a rollout method that computes experiences for a full game and returns\
    \ them. Here's what the implementation of the Simulation class looks like:\n\n\
    ```python\nclass Simulation(object):\n    def __init__(self, env):\n        \"\
    \"\"Simulates rollouts of an environment, given a policy to follow.\"\"\"\n  \
    \      self.env = env\n\n    def rollout(self, policy, render=False, explore=True,\
    \ epsilon=0.1): ❶\n        \"\"\"Returns experiences for a policy rollout.\"\"\
    \"\n        experiences = []\n        state = self.env.reset() ❷\n        done\
    \ = False\n        while not done:\n            action = policy.get_action(state,\
    \ explore, epsilon) ❸\n            next_state, reward, done, info = self.env.step(action)\
    \ ❹\n            experiences.append([state, action, reward, next_state]) ❺\n \
    \           state = next_state\n            if render: ❻\n                time.sleep(0.05)\n\
    \                self.env.render()\n        return experiences\n```\n\n1. Compute\
    \ a game “rollout” by following the actions of a policy, and optionally render\
    \ the simulation.\n2. To be sure, reset the environment before each rollout.\n\
    3. The passed-in policy drives the actions we take. The explore and epsilon parameters\
    \ are passed through.\n4. Step through the environment by applying the policy’s\
    \ action.\n5. Define an experience as a (state, action, reward, next_state) quadruple.\n\
    6. Optionally render the environment at each step.\n\nNote that each entry of\
    \ the experiences we collect in a rollout consists of four values: the current\
    \ state, the action taken, the reward received, and the next state. The algorithm\
    \ we’re going to implement in a moment will use these experiences to learn from\
    \ them. Other algorithms might use other experience values, but those are the\
    \ ones we need to proceed.\n\nWe now have a policy that hasn’t learned anything\
    \ just yet, but we can already test its interface to see if it works. Let’s try\
    \ it out by initializing a Simulation object, calling its rollout method on a\
    \ not-so-smart Policy, and then printing the state_action_table of it:\n\n```python\n\
    untrained_policy = Policy(environment)\nsim = Simulation(environment)\n\nexp =\
    \ sim.rollout(untrained_policy, render=True, epsilon=1.0) ①\nfor row in untrained_policy.state_action_table:\n\
    \    print(row) ②\n```\n\n1. Roll out one full game with an “untrained” policy\
    \ that we render.\n2. The state-action values are currently all zero.\n\nIf you\
    \ feel like we haven’t made much progress since the previous section, rest assured\
    \ that things will come together in the next one. The prep work of setting up\
    \ a Simulation and a Policy were necessary to frame the problem correctly. Now\
    \ the only thing that’s left is to devise a smart way to update the internal state\
    \ of the Policy based on the experiences we’ve collected so that it actually learns\
    \ to play the maze game."
  mdcn: "## 构建模拟环境\n\n在实现了环境类之后，要解决“教会”探索者玩好游戏的问题，还需要什么？如何让它在最少的八步内持续找到目标？我们为迷宫环境配备了奖励信息，以便探索者可以利用这一信号来学习玩游戏。在强化学习中，你会反复玩游戏，并从过程中获得的经验中学习。游戏的玩家通常被称为*智能体*，它在环境中执行*动作*，观察其*状态*，并获得*奖励*。<sup>2</sup>\
    \ 智能体学习得越好，它就越擅长解读当前的游戏状态（观察），并找到能带来更丰厚回报的动作。\n\n无论你想使用哪种强化学习算法，你都需要一种方法来反复模拟游戏以收集经验数据。因此，我们将实现一个简单的`Simulation`类。\n\
    \n我们继续进行所需的另一个有用的抽象是`Policy`，即指定动作的方式。目前，我们玩这个游戏唯一能做的就是为我们的探索者随机采样动作。`Policy`允许我们做的是为当前游戏状态获取更好的动作。事实上，我们定义一个`Policy`为一个类，它有一个`get_action`方法，该方法接受一个游戏状态并返回一个动作。\n\
    \n请记住，在我们的游戏中，探索者在网格上总共有25种可能的状态，并可以执行四种动作。一个简单的想法是查看状态和动作的配对，如果在该状态下执行此动作会导致高奖励，则为该配对分配高值，否则分配低值。例如，根据你对游戏的直觉，向下或向右走总是一个好主意，而向左或向上走则不是。然后，创建一个25\
    \ × 4的查找表，包含所有可能的状态-动作配对，并将其存储在我们的`Policy`中。然后，我们可以简单地要求我们的策略在给定状态下返回任何动作的最高值。当然，实现一个为这些状态-动作配对找到好值的算法才是具有挑战性的部分。让我们先实现这个`Policy`的想法，稍后再考虑合适的算法：\n\
    \n```python\nimport numpy as np\n\nclass Policy:\n\n    def __init__(self, env):\n\
    \        \"\"\"A Policy suggests actions based on the current state.\n       \
    \ We do this by tracking the value of each state-action pair.\n        \"\"\"\n\
    \        self.state_action_table = [\n            [0 for _ in range(env.action_space.n)]\n\
    \            for _ in range(env.observation_space.n)\n        ]\n        self.action_space\
    \ = env.action_space\n\n    def get_action(self, state, explore=True, epsilon=0.1):\n\
    \        \"\"\"Explore randomly or exploit the best value currently available.\"\
    \"\"\n        if explore and random.uniform(0, 1) < epsilon:\n            return\
    \ self.action_space.sample()\n        return np.argmax(self.state_action_table[state])\n\
    ```\n\n> <sup>2</sup> 正如我们将在第4章看到的，你也可以在多人游戏中运行强化学习。将迷宫环境变成所谓的多智能体环境，让多个探索者竞争目标，是一个有趣的练习。\n\
    \n1.  定义一个嵌套列表，用于存储每个状态-动作配对的值，初始化为零。\n2.  根据需要探索随机动作，以免陷入次优行为。\n3.  在`get_action`方法中引入一个`explore`参数，因为我们可能想在游戏中随机探索动作。默认情况下，这会在10%的情况下发生。\n\
    4.  在给定当前状态下，返回查找表中值最高的动作。\n\n我们在`Policy`定义中悄悄加入了一个可能有点令人困惑的实现细节。`get_action`方法有一个`explore`参数。如果没有它，如果你学到了一个极其糟糕的策略（例如，一个总是想让你向左移动的策略），你就永远没有机会找到更好的解决方案。换句话说，有时你需要探索新的方法，而不是“利用”你当前对游戏的理解。如前所述，我们还没有讨论如何学习改进我们策略的`state_action_table`中的值。现在，请记住，策略在模拟迷宫游戏时为我们提供了想要遵循的动作。\n\
    \n接下来谈谈我们之前提到的`Simulation`类，模拟应该接受一个环境，并计算给定策略的动作，直到达到目标并结束游戏。当我们像这样“展开”一个完整游戏时观察到的数据，就是我们所说获得的经验。因此，我们的`Simulation`类有一个`rollout`方法，它计算完整游戏的经验并返回它们。`Simulation`类的实现如下所示：\n\
    \n```python\nclass Simulation(object):\n    def __init__(self, env):\n       \
    \ \"\"\"Simulates rollouts of an environment, given a policy to follow.\"\"\"\n\
    \        self.env = env\n\n    def rollout(self, policy, render=False, explore=True,\
    \ epsilon=0.1): ❶\n        \"\"\"Returns experiences for a policy rollout.\"\"\
    \"\n        experiences = []\n        state = self.env.reset() ❷\n        done\
    \ = False\n        while not done:\n            action = policy.get_action(state,\
    \ explore, epsilon) ❸\n            next_state, reward, done, info = self.env.step(action)\
    \ ❹\n            experiences.append([state, action, reward, next_state]) ❺\n \
    \           state = next_state\n            if render: ❻\n                time.sleep(0.05)\n\
    \                self.env.render()\n        return experiences\n```\n\n1.  通过遵循策略的动作来计算游戏的“展开”，并可选择渲染模拟。\n\
    2.  为确保无误，在每次展开前重置环境。\n3.  传入的策略驱动我们采取的动作。`explore`和`epsilon`参数被传递下去。\n4.  通过应用策略的动作来逐步执行环境。\n\
    5.  将经验定义为（状态，动作，奖励，下一状态）四元组。\n6.  可选择在每一步渲染环境。\n\n请注意，我们在一次展开中收集的每个经验条目包含四个值：当前状态、采取的动作、获得的奖励和下一状态。我们即将实现的算法将使用这些经验来从中学习。其他算法可能会使用其他经验值，但这些是我们继续进行所需的经验值。\n\
    \n我们现在有一个尚未学到任何东西的策略，但我们已经可以测试它的接口，看看它是否工作。让我们尝试一下，初始化一个`Simulation`对象，在一个不太聪明的`Policy`上调用其`rollout`方法，然后打印它的`state_action_table`：\n\
    \n```python\nuntrained_policy = Policy(environment)\nsim = Simulation(environment)\n\
    \nexp = sim.rollout(untrained_policy, render=True, epsilon=1.0) ①\nfor row in\
    \ untrained_policy.state_action_table:\n    print(row) ②\n```\n\n1.  使用一个“未经训练”的策略展开一个完整的游戏，我们对其进行渲染。\n\
    2.  状态-动作值目前全部为零。\n\n如果你觉得自上一节以来我们没有取得多大进展，请放心，事情将在下一节中变得清晰。设置`Simulation`和`Policy`的准备工作对于正确构建问题是必要的。现在剩下的唯一事情就是设计一种聪明的方法，根据我们收集到的经验来更新`Policy`的内部状态，以便它真正学会玩迷宫游戏。"

  md: "Then, we can instantiate a TorchTrainer model, which has three required arguments:\n\
    \n**train_loop_per_worker**\nThis function trains your model for each worker.\
    \ It has access to the datasets provided and can be fed an optional config dictionary\
    \ that can be passed to your trainer as `train_loop_config`. This function will\
    \ typically report metrics, e.g., via a session.\n\n**datasets**\nThis dictionary\
    \ can contain several keys with Ray Datasets as values. It's kept flexible so\
    \ that you can have training data, validation data, or any other type of data\
    \ needed for your training loop.\n\n**scaling_config**\nThis ScalingConfig object\
    \ specifies how your training should scale. For instance, you can specify the\
    \ number of training workers with `num_workers` and the use of GPUs with the `use_gpu`\
    \ flag. We'll elaborate on this more in the next section.\n\nHere's how you set\
    \ up your Trainer in our example:\n\n```\nfrom ray.air.config import ScalingConfig\n\
    from ray.train.torch import TorchTrainer\n\ntrainer = TorchTrainer(\n    train_loop_per_worker=distributed_training_loop,\n\
    \    scaling_config=ScalingConfig(\n        num_workers=2,\n        use_gpu=False\n\
    \    ),\n    datasets={\"train\": train_dataset}\n)\n\nresult = trainer.fit()\n\
    ```\n\nWith an initialized Trainer, you can call `fit()`, which will execute the\
    \ training across your Ray Cluster. Figure 7-2 summarizes working with a TorchTrainer."

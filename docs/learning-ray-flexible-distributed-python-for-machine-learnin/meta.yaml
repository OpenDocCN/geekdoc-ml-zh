  md: "# Specifying resources\n\nBy default, each Tune trial will run on one CPU and\
    \ leverage as many CPUs as available for concurrent trials. For instance, if you\
    \ run Tune on a laptop with 8 CPUs, any of the experiments computed so far in\
    \ this chapter will spawn eight concurrent trials and allocate one CPU for each\
    \ trial. Changing this behavior can be controlled using the `resources_per_trial`\
    \ argument of a Tune run.\n\nYou can also determine the number of GPUs used per\
    \ trial. Plus, Tune allows you to use *fractional resources*; i.e., you can share\
    \ resources between trials. So, let's say that you have a machine with 12 CPUs\
    \ and 2 GPUs and you request the following resources for your objective:\n\n```\n\
    from ray import tune\n\ntune.run(\n    objective,\n    config=search_space,\n\
    \    num_samples=10,\n    resources_per_trial={\"cpu\": 2, \"gpu\": 0.5}\n)\n\
    ```\n\nThat means Tune can schedule and execute up to four concurrent trials on\
    \ your machine, as this would max out GPU utilization on this machine (while you'd\
    \ still have four idle CPUs for other tasks). If you want, you can also specify\
    \ the amount of \"memory\" used by a trial by passing the number of bytes into\
    \ `resources_per_trial`. Also note that should you need to explicitly *restrict*\
    \ the number of concurrent trials, you can do so by passing in the `max_concurrent_trials`\
    \ parameter to your `tune.run(...)`. In the preceding example, if you want to\
    \ always keep one GPU available for other tasks, you can limit the number of concurrent\
    \ trials to two by setting `max_concurrent_trials = 2`.\n\nNote that everything\
    \ we just exemplified for resources on a single machine naturally extends to any\
    \ Ray Cluster and its available resources. In any case, Ray will always try to\
    \ schedule the next trials, but it will wait and ensure enough resources are available\
    \ before executing them.\n\n# Callbacks and metrics\n\nIf you've spent some time\
    \ investigating the outputs of the Tune runs we've started in this chapter so\
    \ far, you'll have noticed that each trial comes equipped with a lot of information\
    \ by default, such as the trial ID, its execution date, and much more. What's\
    \ interesting is that Tune not only allows you to customize the metrics you want\
    \ to report, you can also hook into a `tune.run` by providing *callbacks*. Let's\
    \ compute a quick, representative example that does both."
  merge: -1

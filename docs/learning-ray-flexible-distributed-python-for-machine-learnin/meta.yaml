  md: '# Navigating This Book


    We organized this book to guide you naturally from core concepts to more sophisticated
    topics of Ray. Many of the ideas explained come with example code that you can
    find in the book’s [GitHub repo](https://github.com/).


    In a nutshell, the first three chapters of the book teach the basics of Ray as
    a distributed Python framework with practical examples. Chapters 4 to 10 introduce
    Ray’s high-level libraries and show how to build applications with them. The last
    chapter gives you a conclusive overview of Ray’s ecosystem and shows you where
    to go next. Here’s what you can expect from each chapter:


    *Chapter 1, “An Overview of Ray”*

    Introduces you to Ray as a system composed of three layers: its core, its ML libraries,
    and its ecosystem. You’ll run your first examples with Ray’s libraries in this
    chapter to give you a glimpse of what you can do with Ray.


    *Chapter 2, “Getting Started with Ray Core”*

    Walks you through the foundations of the Ray project, namely, its core API. It
    also discusses how Ray tasks and actors naturally extend from Python functions
    and classes. You will also learn about Ray’s system components and how they work
    together.


    *Chapter 3, “Building Your First Distributed Application”*

    Guides you through implementing a distributed reinforcement learning application
    with Ray Core. You will implement this app from scratch and see Ray’s flexibility
    in distributing your Python code in action.


    *Chapter 4, “Reinforcement Learning with Ray RLlib”*

    Gives you a quick introduction to reinforcement learning and shows how Ray implements
    important concepts in RLlib. After building some examples together, we’ll also
    dive into more advanced topics like curriculum learning or working with offline
    data.


    *Chapter 5, “Hyperparameter Optimization with Ray Tune”*

    Covers why efficiently tuning hyperparameters is hard, how Ray Tune works conceptually,
    and how you can use it in practice for your machine learning projects.


    *Chapter 6, “Data Processing with Ray”*

    Introduces you to the Ray Datasets abstraction of Ray and how it fits into the
    landscape of other data processing systems. You will also learn how to work with
    third-party integrations such as Dask on Ray.'
  merge: -1
  pgno: 17
- img_proc: true
  md: 'Chapter 7, “Distributed Training with Ray Train”

    Provides you with the basics of distributed model training and shows you how to
    use Ray Train with ML frameworks like PyTorch. We also show you how to add custom
    preprocessors to your models, how to monitor training with callbacks, and how
    to tune the hyperparameters of your models with Tune.


    Chapter 8, “Online Inference with Ray Serve”

    Teaches you the basics of exposing your trained ML models as API endpoints that
    can be queried from anywhere. We discuss how Ray Serve addresses the challenges
    of online inference, cover its architecture, and show you how to use it in practice.


    Chapter 9, “Ray Clusters”

    Discusses how you configure, launch, and scale Ray Clusters for your applications.
    You’ll learn about Ray’s Cluster launcher CLI and autoscaler, as well as how to
    set up clusters in the cloud. We’ll also show you how to deploy Ray on Kubernetes
    and with other cluster managers.


    Chapter 10, “Getting Started with the Ray AI Runtime”

    Introduces you to Ray AIR, a unified toolkit for your ML workloads that offers
    many third-party integrations for model training or accessing custom data sources.


    Chapter 11, “Ray’s Ecosystem and Beyond”

    Gives you an overview of the many interesting extensions and integrations that
    Ray has attracted over the years.


    # How to Use the Code Examples


    You can find all the code for this book in its [GitHub repository](https://github.com/).
    In the GitHub repo you’ll find a *notebook* folder with notebooks for each chapter.
    We built the examples in such a way that you can either type along as you read
    or follow the main text and run the code from GitHub at another time. The choice
    is yours.


    For the examples we assume that you have Python 3.7 or later installed. At the
    time of this writing, support for Python 3.10 for Ray is experimental, so we can
    currently only recommend a Python version no later than 3.9. All code examples
    assume that you have Ray installed, and each chapter adds its own specific requirements.
    The examples have been tested on Ray version 2.2.0, and we recommend that you
    stick to this version for the whole book.'

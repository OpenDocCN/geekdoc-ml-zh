- img_proc: true
  md: "This is expressed very similarly to the pipelining example: a number of downstream\
    \ models are passed into a top-level driver. In this case, it's important that\
    \ we call the models in parallel: waiting for the result of each before calling\
    \ the next would dramatically increase the overall latency of the system:\n\n\
    ```\n@serve.deployment\nclass DownstreamModel:\n    def __init__(self, my_val:\
    \ str):\n        self._my_val = my_val\n\n    def __call__(self):\n        return\
    \ self._my_val\n\n@serve.deployment\nclass BroadcastDriver:\n    def __init__(self,\
    \ model1, model2):\n        self._m1 = model1\n        self._m2 = model2\n\n \
    \   async def __call__(self, *args) -> str:\n        output1, output2 = self._m1.remote(),\
    \ self._m2.remote()\n        return [await output1, await output2]\n\nm1 = DownstreamModel.bind(\"\
    val1\")\nm2 = DownstreamModel.bind(\"val2\")\nbroadcast_driver = BroadcastDriver.bind(m1,\
    \ m2)\n```\n\nTesting this endpoint after running it once again with `serve run`\
    \ returns `[\"val1\", \"val2\"]`, the combined output of the two models called\
    \ in parallel.\n\n# Pattern 3: Conditional logic\n\nFinally, while many ML applications\
    \ fit roughly into one of the preceding patterns, often having static control\
    \ flow can be very limiting. Take, for instance, the example of building a service\
    \ to extract license plate numbers from user-uploaded images. In this case, we'll\
    \ likely need to build an image processing pipeline as discussed, but we also\
    \ don't simply want to feed any image into the pipeline blindly. If the user uploads\
    \ something other than a car or an image that is low quality, we likely want to\
    \ short circuit, avoid calling into the heavyweight and expensive pipeline, and\
    \ provide a useful error message. Similarly, in a product recommendation use case\
    \ we may want to select a downstream model based on user input or the result of\
    \ an intermediate model. Each of these examples requires embedding custom logic\
    \ alongside our ML models.\n\nWe can accomplish this trivially using Serve's multimodel\
    \ API because our computation graph is defined as ordinary Python logic rather\
    \ than as a statically defined graph. For instance, in the next example, we use\
    \ a simple random number generator"

    \n1.  我们的文本语料库是 Python 之禅的内容。\n2.  将语料库分成三个分区。\n\n![](img/6489687a3a178f2884963bddc928992c_64_0.png)\n\
    \n我们使用的数据是所谓的 Python 之禅，这是 Python 社区的一小组准则。之禅隐藏在一个“彩蛋”中，当你在 Python 会话中输入 `import\
    \ this` 时会打印出来。作为 Python 程序员，值得阅读这些准则，但在这个练习中，我们只对计算它们包含的单词感兴趣。简单地说，我们加载 Python\
    \ 之禅，将每一行视为一个单独的“文档”，并将其分成三个分区。\n\n为了开始实现 MapReduce，我们将首先介绍映射阶段，并讨论 Ray 如何帮助我们处理结果的混洗。\n\
    \n## 映射和混洗文档数据\n\n要定义映射阶段，我们需要一个应用于每个文档的映射函数。在我们的例子中，我们希望为文档中找到的每个单词发出对 (word,\
    \ 1)。对于作为 Python 字符串加载的简单文本文档，它看起来像这样：¹⁷\n\n> ¹⁷ 注意映射函数中 yield 的用法。这是在 Python\
    \ 中使用我们需要的数据构建生成器的最快方式。如果你觉得更清楚，也可以构建并返回一个对列表。\n\n```python\ndef map_function(document):\n\
    \    for word in document.lower().split():\n        yield word, 1\n```\n\n接下来，我们希望将此映射函数应用于整个文档语料库。我们通过使用\

    \n## Ray Serve 简介\n\nRay Serve 是基于Ray构建的可扩展计算层，用于提供机器学习模型服务。Serve具有框架无关性，不绑定特定机器学习库，而是将模型视为普通Python代码。此外，它允许灵活地将常规Python业务逻辑与机器学习模型结合。这使得构建完整的在线推理服务成为可能：Serve应用可以验证用户输入、查询数据库、跨多个机器学习模型执行可扩展推理，并在处理单个推理请求的过程中完成结果组合、过滤和验证。事实上，组合多个机器学习模型的结果正是Ray\

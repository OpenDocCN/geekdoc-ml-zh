    To give you a glimpse of Ray''s ecosystem by means of a concrete example,¹ we''re
    going to show you how to use Ray AIR with data and models from the PyTorch ecosystem,
    how to log your hyperparameter tuning runs to MLflow, and how to deploy your trained
    models with Ray''s Gradio integration. Along the way we give you an overview and
    discuss usage patterns of other noteworthy integrations at each respective stage.


    To follow the code examples in this chapter, make sure to install the following
    dependencies in your Python environment:


    ```

    pip install "ray[air, serve]==2.2.0" "gradio==3.5.0" "requests==2.28.1"

    pip install "mlflow==1.30.0" "torch==1.12.1" "torchvision==0.13.1"


    \ - 1, 0))\n    elif action == 2:  # move up\n        self.seeker = (max(self.seeker[0]\
    \ - 1, 0), self.seeker[1])\n    elif action == 3:  # move right\n        self.seeker\
    \ = (self.seeker[0], min(self.seeker[1] + 1, 4))\n    else:\n        raise ValueError(\"\
    Invalid action\")\n\n    obs = self.get_observation()\n    rew = self.get_reward()\n\
    \    done = self.is_done()\n    return obs, rew, done, self.info ❶\n```\n\n❶ Returns\
    \ the observation, reward, whether we're done, and any additional information\
    \ we might find useful after taking a step in the specified direction.\n\nWe said\
    \ the step method was the last essential method, but we actually want to define\
    \ one more helper method that's extremely useful for visualizing the game and\
    \ helping us understand it. This render method will print the current state of\
    \ the game to the command line:\n\n```python\ndef render(self, *args, **kwargs):\n\
    \    \"\"\"Render the environment, e.g., by printing its representation.\"\"\"\
    \n    os.system('cls' if os.name == 'nt' else 'clear') ❶\n\n    grid = [['| '\
    \ for _ in range(5)] + ['|\\n'] for _ in range(5)]\n    grid[self.goal[0]][self.goal[1]]\
    \ = '|G'\n    grid[self.seeker[0]][self.seeker[1]] = '|S' ❷\n    print(''.join([''.join(grid_row)\
    \ for grid_row in grid])) ❸\n```\n\n❶ Clear the screen.\n❷ Draw the grid and mark\
    \ the goal as G and the seeker as S on it.\n❸ The grid then gets rendered by printing\
    \ it to your screen.\n\nGreat, now we have completed the implementation of our\
    \ Environment class that's defining our 2D-maze game. We can step through this\
    \ game, know when it's done, and reset it again. The player of the game, the seeker,\
    \ can also observe its environment and get rewarded for finding the goal.\n\n\
    Let's use this implementation to play a game of find-the-goal for a seeker that\
    \ simply takes random actions. This can be done by creating a new Environment,\
    \ sampling and applying actions to it, and rendering the environment until the\
    \ game is over:\n\n```python\nimport time\n\nenvironment = Environment()\n```"
  mdcn: "为了让你有个概念，我们正在构建的应用程序结构如下：\n\n-   实现一个简单的二维迷宫游戏，玩家可以在其中向四个主要方向移动。\n-   将迷宫初始化为一个5×5的网格，玩家被限制在其中。25个网格单元格中的一个是“目标”，一个被称为*探索者*的玩家必须到达那里。\n\
    -   采用强化学习算法，而不是硬编码解决方案，以便探索者学会找到目标。\n-   反复运行迷宫模拟，奖励探索者找到目标，并智能地跟踪探索者的哪些决策有效，哪些无效。因为运行模拟可以并行化，我们的强化学习算法也可以并行训练，所以我们使用Ray\
    \ API来并行化整个过程。\n\n我们还没有准备好将这个应用程序部署到由多个节点组成的实际Ray集群上，所以目前我们将继续使用本地集群。如果你对基础设施主题感兴趣，并想了解如何设置Ray集群，请直接跳到第9章。无论如何，请确保你已通过`pip\
    \ install ray`安装了Ray。\n\n让我们从实现我们刚刚勾勒的二维迷宫开始。思路是在Python中实现一个简单的网格，该网格跨越一个从(0,\
    \ 0)开始到(4, 4)结束的5×5网格，并正确定义玩家如何在网格中移动。为此，我们首先需要一个在四个基本方向上移动的抽象。这四个动作，即向上、向下、向左和向右移动，可以在Python中编码为一个我们称之为Discrete的类。在多个离散动作上移动的抽象非常有用，我们将把它泛化到*n*个方向，而不仅仅是四个。如果你担心的话，这不是过早优化——我们实际上马上就需要一个通用的Discrete类：\n\
    \n```python\nimport random\n\nclass Discrete:\n    def __init__(self, num_actions:\
    \ int):\n        \"\"\"Discrete action space for num_actions.\n        Discrete(4)\
    \ can be used as encoding moving in\n        one of the cardinal directions.\n\
    \        \"\"\"\n        self.n = num_actions\n\n    def sample(self):\n     \
    \   return random.randint(0, self.n - 1) ❶\n\nspace = Discrete(4)\nprint(space.sample())\
    \ ❷\n```\n\n1.  一个离散动作可以在0到n – 1之间均匀采样。\n2.  例如，一个Discrete(4)的采样将给你0、1、2或3。\n\n\
    像这个例子中那样从Discrete(4)采样将随机返回0、1、2或3。我们如何解释这些数字取决于我们自己，所以让我们按顺序选择“向下”、“向左”、“向上”和“向右”。\n\
    \n现在我们知道如何编码在迷宫中移动了，让我们来编写迷宫本身，包括目标单元格和试图找到目标的探索者玩家的位置。为此，我们将实现一个名为Environment的Python类。之所以这样命名，是因为迷宫是玩家“生活”的环境。为了简单起见，我们将始终把探索者放在(0,\
    \ 0)，目标放在(4, 4)。为了让探索者移动并找到目标，我们用一个Discrete(4)的action_space来初始化Environment。\n\n\
    我们需要为我们的迷宫环境设置最后一点信息：探索者位置的编码。原因是我们稍后将实现一个算法，该算法跟踪哪些动作在哪些探索者位置导致了好的结果。通过将探索者位置编码为Discrete(5*5)，它变成了一个更容易处理的单个数字。在强化学习术语中，通常将玩家可以访问的游戏信息称为观察。因此，类比于我们可以为探索者执行的动作，我们也可以为它定义一个observation_space。以下是我们刚刚讨论内容的实现：\n\
    \n```python\nimport os\n\nclass Environment:\n    def __init__(self, *args, **kwargs):\n\
    \        self.seeker, self.goal = (0, 0), (4, 4)  # 1\n        self.info = {'seeker':\
    \ self.seeker, 'goal': self.goal}\n\n        self.action_space = Discrete(4) \
    \ # 2\n        self.observation_space = Discrete(5*5)  # 3\n```\n\n1.  探索者初始化在迷宫的左上角，目标在右下角。\n\
    2.  我们的探索者可以向下、向左、向上和向右移动。\n3.  它总共可以处于25种状态，每种状态对应网格上的一个位置。\n\n请注意，我们还定义了一个info变量，它可以用来打印关于迷宫当前状态的信息，例如用于调试目的。为了从探索者的视角玩一个实际的“寻找目标”游戏，我们需要定义几个辅助方法。显然，当探索者找到目标时，游戏应被视为“完成”。此外，我们应该奖励探索者找到目标。当游戏结束时，我们应该能够将其重置为初始状态，以便再次玩。为了完善，我们还定义了一个get_observation方法，该方法返回编码后的探索者位置。继续我们对Environment类的实现，这转化为以下四个方法：\n\
    \n```python\ndef reset(self):\n    \"\"\"Reset seeker position and return observations.\"\
    \"\"\n    self.seeker = (0, 0)\n    return self.get_observation()\n\ndef get_observation(self):\n\
    \    \"\"\"Encode the seeker position as integer\"\"\"\n    return 5 * self.seeker[0]\
    \ + self.seeker[1]\n\ndef get_reward(self):\n    \"\"\"Reward finding the goal\"\
    \"\"\n    return 1 if self.seeker == self.goal else 0\n\ndef is_done(self):\n\
    \    \"\"\"We're done if we found the goal\"\"\"\n    return self.seeker == self.goal\n\
    ```\n\n1.  要玩新游戏，请将网格重置为其原始状态。\n2.  将探索者元组转换为环境observation_space中的一个值。\n3.  探索者仅在到达目标时获得奖励。\n\
    4.  如果探索者在目标处，游戏结束。\n\n要实现的最后一个关键方法是step方法。想象一下，你正在玩我们的迷宫游戏，并决定下一步向右移动。step方法将接受这个动作（即3，是“向右”的编码）并将其应用于游戏的内部状态。为了反映变化，step方法将返回探索者的观察、其奖励、游戏是否结束以及游戏的info值。以下是step方法的工作原理：\n\
    \n```python\ndef step(self, action):\n    \"\"\"Take a step in a direction and\
    \ return all available information.\"\"\"\n    if action == 0:  # move down\n\
    \        self.seeker = (min(self.seeker[0] + 1, 4), self.seeker[1])\n    elif\
    \ action == 1:  # move left\n        self.seeker = (self.seeker[0], max(self.seeker[1]\
    \ - 1, 0))\n    elif action == 2:  # move up\n        self.seeker = (max(self.seeker[0]\
    \ - 1, 0), self.seeker[1])\n    elif action == 3:  # move right\n        self.seeker\
    \ = (self.seeker[0], min(self.seeker[1] + 1, 4))\n    else:\n        raise ValueError(\"\
    Invalid action\")\n\n    obs = self.get_observation()\n    rew = self.get_reward()\n\
    \    done = self.is_done()\n    return obs, rew, done, self.info ❶\n```\n\n❶ 返回观察、奖励、我们是否完成，以及在指定方向上迈出一步后我们可能发现有用的任何其他信息。\n\
    \n我们说过step方法是最后一个关键方法，但我们实际上还想定义另一个辅助方法，它对于可视化游戏和帮助我们理解游戏非常有用。这个render方法将把游戏的当前状态打印到命令行：\n\
    \n```python\ndef render(self, *args, **kwargs):\n    \"\"\"Render the environment,\
    \ e.g., by printing its representation.\"\"\"\n    os.system('cls' if os.name\
    \ == 'nt' else 'clear') ❶\n\n    grid = [['| ' for _ in range(5)] + ['|\\n'] for\
    \ _ in range(5)]\n    grid[self.goal[0]][self.goal[1]] = '|G'\n    grid[self.seeker[0]][self.seeker[1]]\
    \ = '|S' ❷\n    print(''.join([''.join(grid_row) for grid_row in grid])) ❸\n```\n\
    \n❶ 清除屏幕。\n❷ 绘制网格，并在上面将目标标记为G，探索者标记为S。\n❸ 然后通过将其打印到屏幕上来渲染网格。\n\n太好了，现在我们已经完成了定义我们二维迷宫游戏的Environment类的实现。我们可以逐步执行这个游戏，知道它何时完成，并再次重置它。游戏的玩家，即探索者，也可以观察其环境并因找到目标而获得奖励。\n\
    \n让我们使用这个实现来玩一个“寻找目标”游戏，其中探索者只是采取随机动作。这可以通过创建一个新的Environment，对其采样并应用动作，并渲染环境直到游戏结束来完成：\n\
    \n```python\nimport time\n\nenvironment = Environment()\n```"

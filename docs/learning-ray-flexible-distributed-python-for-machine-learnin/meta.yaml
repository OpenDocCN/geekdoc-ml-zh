    This quick example covers the basics of Tune, but there’s a lot more to unpack.
    The tune.run function is quite powerful and takes a lot of arguments for you to
    configure your runs. To understand these different configuration options, we first
    need to introduce you to the key concepts of Tune.


    # How Does Tune Work?


    To effectively work with Tune, you must understand six key concepts, four of which
    you used in the previous example. Here’s an overview of Ray Tune’s components
    and how you should think about them:


    Search spaces

    These spaces determine which parameters to select. Search spaces define the range
    of values for each parameter and how they should be sampled. They are defined
    as dictionaries and use Tune’s sampling functions to specify valid hyperparameter
    values. You have already seen tune.uniform, but there are many more options to
    choose from.


    Trainables

    A Trainable is Tune’s formal representation of an objective you want to “tune.”
    Tune has a class-based API as well, but we will use only the function-based API
    in this book. For us, a Trainable is a function with a single argument: a search
    space, which reports scores to Tune. The easiest way to report a score is by returning
    a dictionary with the value you’re interested in.


    Trials

    By triggering tune.run(...), Tune will set up trials and schedule them for execution
    on your cluster. A trial contains all the necessary information about a single
    run of your objective, given a set of hyperparameters.'
- md: "## Analyses\n\nCompleting a `tune.run` call returns an `ExperimentAnalysis`\
    \ object, with the results of all trials. You can use this object to drill down\
    \ into the results of your trials.\n\n## Search algorithms\n\nTune supports a\
    \ large variety of search algorithms, which are at the core of how to tune your\
    \ hyperparameters. So far you've implicitly encountered Tune's default search\
    \ algorithm, which randomly selects hyperparameters from the search space.\n\n\
    ## Schedulers\n\nThe last, crucial component of a Tune experiment is that of a\
    \ scheduler. Schedulers plan and execute what the search algorithm selects. By\
    \ default, Tune schedules trials selected by your search algorithm on a first-in-first-out\
    \ (FIFO) basis. In practice, you can think of schedulers as a way to speed up\
    \ your experiments, for instance by stopping unsuccessful trials early.\n\nFigure\
    \ 5-1 sums up these major Tune components and their relationships.\n\n![](img/6489687a3a178f2884963bddc928992c_128_0.png)\n\
    \nIn this chapter we exclusively use `tune.run` to illustrate Tune's functionality.\
    \ Tune also had an API called `Tuner` added in Ray 2.0 as part of Ray AIR, which\
    \ you will learn more about in Chapter 7 and use within Ray AIR in Chapter 10.\n\
    \nAt the time of this writing, `tune.run` is still the more mature API. For instance,\
    \ experiments using `tune.run(...)` return an `ExperimentAnalysis` object, a powerful\
    \ tool for analyzing your results. Analogous calls using the `Tuner` API return\
    \ a so-called `ResultGrid` instead. In the long run `ResultGrid` will succeed\
    \ `ExperimentAnalysis`, but it is not yet at feature parity.\n\nTo learn more,\
    \ see the Tune API documentation on this topic.\n\nNote that internally Tune runs\
    \ are started on the driver process of your Ray Cluster, which spawns several\
    \ worker processes (using Ray actors) that execute individual trials of your HPO\
    \ experiment. Your trainables, defined on the driver, have to be sent to the workers,\
    \ and trial results need to be communicated to the driver running `tune.run(...)`.\n\
    \nSearch spaces, trainables, trials, and analyses don't need much additional explanation,\
    \ and we'll see more examples of each of those components in the rest of this\
    \ chapter. But search algorithms, *searchers* for short, and schedulers need a\
    \ bit more elaboration.\n\n## Search algorithms\n\nAll advanced search algorithms\
    \ provided by Tune, and the many third-party HPO libraries it integrates with,\
    \ fall under the umbrella of *Bayesian optimization*. Unfortunately, going into\
    \ the details of specific Bayesian search algorithms is far beyond the scope of\
    \ this book. The basic idea is that you update your beliefs about which hyperparameter\
    \ ranges are worth exploring based on the results of your previous trials. Techniques\
    \ using this principle make more informed decisions and, hence, tend to be more\
    \ efficient than independently sampling parameters (e.g., at random).\n\nApart\
    \ from the basic random search we've seen already, and *grid search*, which picks\
    \ hyperparameters from a predefined \"grid\" of choices, Tune integrates with\
    \ a wide range of Bayesian optimization searchers. For instance, Tune integrates\
    \ with the popular Hyperopt and Optuna libraries,² and you can use the popular\
    \ TPE (Tree-structured Parzen Estimator) searcher with Tune through both of these\
    \ libraries. Not only that, Tune also integrates with tools such as Ax, BlendSearch,\
    \ FLAML, Dragonfly, scikit-Optimize, Bayesian optimization, HpBandSter, Nevergrad,\
    \ ZOOpt, SigOpt, and HEBO. If you need to run HPO experiments with any of these\
    \ tools on a cluster or want to easily switch between them, Tune is the way to\
    \ go.\n\nTo make things more concrete, let's rewrite our basic random search Tune\
    \ example from earlier to use the Bayesian optimization library. To do so, make\
    \ sure you install this library in your Python environment first, e.g., with `pip\
    \ install bayesian-optimization`:\n\n```python\nfrom ray.tune.suggest.bayesopt\
    \ import BayesOptSearch\n\nalgo = BayesOptSearch(random_search_steps=4)\n```\n\
    \n> ² In open source software, it's important to determine who is responsible\
    \ for maintaining an integration. We will discuss this more in Chapter 11, which\
    \ covers Ray's ecosystem as a whole. In the case of Tune, among the integrations\
    \ listed here, the Hyperopt and Optuna integrations are maintained by the Ray\
    \ Tune team; the rest are community-sponsored.\n\n```python\ntune.run(\n    tune_objective,\n\
    \    config=search_space,\n    metric=\"score\",\n    mode=\"min\",\n    search_alg=algo,\n\
    \    stop={\"training_iteration\": 10},\n)\n```\n\nNote that we \"warm start\"\
    \ our Bayesian optimization with four random steps at the beginning, and we explicitly\
    \ stop the trial runs after 10 training iterations.\n\nBecause we're not just\
    \ randomly selecting parameters with `BayesOptSearch`: the `search_alg` we use\
    \ in our Tune run needs to know which metric to optimize for and whether to minimize\
    \ or optimize this metric. As we've argued before, we want to achieve a \"min\"\
    \ \"score\".\n\n## Schedulers\n\nNext, let's discuss how to use *trial schedulers*\
    \ in Tune to make your runs more efficient. We also use this section to introduce\
    \ a slightly different way to report your metrics to Tune within an objective\
    \ function.\n\nSo let's say that instead of computing a score straight-up, like\
    \ we did in the previous examples, we compute an *intermediate score* in a loop.\
    \ This is a situation that often occurs in supervised machine learning scenarios,\
    \ when training a model for several iterations (we'll see concrete applications\
    \ of this in \"Machine Learning with Tune\" on page 115). With good hyperparameter\
    \ choices selected, this immediate score might stagnate way before the loop in\
    \ which it is computed. In other words, if we're not seeing enough incremental\
    \ changes, why not stop the trial early? This is exactly one of the cases Tune's\
    \ schedulers are built for.\n\nHere's a quick example of such an objective function.\
    \ This is a toy example, but it will help us think about the optimal hyperparameters\
    \ we want Tune to find more easily than if we started with a complex example:\n\
    \n```python\ndef objective(config):\n    for step in range(30):  # ①\n       \
    \ score = config[\"weight\"] * (step ** 0.5) + config[\"bias\"]\n        tune.report(score=score)\
    \  # ②\n\nsearch_space = {\"weight\": tune.uniform(0, 1), \"bias\": tune.uniform(0,\
    \ 1)}\n```\n\n- 1. Often you may want to compute intermediate scores, e.g., in\
    \ a \"training loop.\"\n- 2. You can use `tune.report` to let Tune know about\
    \ these intermediate scores.\n\nThe score we want to minimize here is the square\
    \ root of a positive number times a weight, plus adding a bias term. It's clear\
    \ that both of these hyperparameters need to be as small as possible to minimize\
    \ the score for any positive x. Given that the square root function \"flattens\
    \ out,\" we might not have to compute all 30 passes through the loop to find sufficiently\
    \ good values for our two hyperparameters. If each score computation took an hour,\
    \ stopping early could be a huge boost in making your experiments run quicker.\n\
    \nLet's illustrate this idea by using the popular Hyperband algorithm as our trial\
    \ scheduler. This scheduler needs to be passed a metric and mode (again, we minimize\
    \ our score). We also make sure to run for 10 samples so as not to stop prematurely:\n\
    \n```python\nfrom ray.tune.schedulers import HyperBandScheduler\n\nscheduler =\
    \ HyperBandScheduler(metric=\"score\", mode=\"min\")\n\nanalysis = tune.run(\n\
    \    objective,\n    config=search_space,\n    scheduler=scheduler,\n    num_samples=10,\n\
    )\n\nprint(analysis.get_best_config(metric=\"score\", mode=\"min\"))\n```\n\n\
    Note that in this case we did not specify a search algorithm, which means that\
    \ Hyperband will run on parameters selected by random search. We also could have\
    \ *combined* this scheduler with another search algorithm instead. This would\
    \ have allowed us to pick better trial hyperparameters and stop bad trials early.\
    \ However, note that not every scheduler can be combined with search algorithms.\
    \ Check [Tune's scheduler compatibility matrix](https://docs.ray.io/en/latest/tune/tutorials/tune-scheduler.html)\
    \ for more information.\n\nTo wrap up this discussion, apart from Hyperband, Tune\
    \ includes distributed implementations of early stopping algorithms such as the\
    \ Median Stopping Rule, ASHA, Population Based Training (PBT), and Population\
    \ Based Bandits (PB2).\n\n## Configuring and Running Tune\n\nBefore looking into\
    \ more concrete machine learning examples using Ray Tune, let's dive into some\
    \ useful topics that help you get more out of your Tune experiments, such as properly\
    \ utilizing resources, stopping and resuming trials, adding callbacks to your\
    \ Tune runs, or defining custom and conditional search spaces."

    # CHAPTER 5

    Hyperparameter Optimization

    with Ray Tune


    In Chapter 4 you learned how to build and run various reinforcement learning experiments.
    Running such experiments can be expensive, in terms of both compute resources
    and the time it takes to run them. This expense only gets amplified as you move
    on to more challenging tasks, since it is unlikely that you can just pick an algorithm
    out of the box and run it to get a good result. In other words, at some point
    you''ll need to tune the hyperparameters of your algorithms to get the best results.
    As we''ll see in this chapter, tuning machine learning models is hard, but Ray
    Tune is an excellent choice to help you tackle this task.


    Ray Tune is a powerful tool for hyperparameter optimization (HPO). Not only does
    it work in a distributed manner by default (and works in any other Ray library
    discussed in this book), but it''s also one of the most feature-rich HPO libraries
    available. To top this off, Tune integrates with some of the most prominent HPO
    libraries out there, such as Hyperopt, Optuna, and many more. This makes Tune
    an ideal candidate for distributed HPO experiments, whether you''re coming from
    other libraries or starting from scratch.


    In this chapter we''ll first revisit in a bit more depth why HPO is hard to do
    and how you could naively implement it yourself with Ray. We then teach you the
    core concepts of Ray Tune and how you can use it to tune the RLlib models built
    in the previous chapter. To wrap things up, we''ll also have a look at how to
    use Tune for supervised learning tasks, using frameworks like Keras. Along the
    way, we demonstrate how Tune integrates with other HPO libraries and introduce
    you to some of its more advanced features.'
  - '[PAGE 123]


    # Tuning Hyperparameters


    Let''s briefly recap the basics of hyperparameter optimization. If you''re familiar
    with HPO, you can skip this section, but since we''re also discussing aspects
    of distributed HPO, you might still benefit from following along. As always, you
    can find a notebook for this chapter in [the book''s GitHub repository](https://github.com/).


    In our first RL experiment introduced in Chapter 3, we defined a very basic Q-Learning
    algorithm whose internal *state-action values* were updated according to an explicit
    update rule. After initialization, we never touched these *model parameters* directly;
    they were learned by the algorithm. By contrast, in setting up the algorithm,
    we explicitly chose a weight and a `discount_factor` parameter prior to training.
    We didn''t tell you how we chose to set these parameters back then; we simply
    accepted that they were good enough to crack the problem at hand.


    In the same way, in Chapter 4 we initialized an RLlib algorithm with a config
    that used two rollout workers for our DQN algorithm by setting `num_rollout_workers=2`.
    Parameters like these are called *hyperparameters*, and finding good choices for
    them can be crucial for successful experiments. The field of hyperparameter optimization
    is devoted to efficiently finding such good choices.


    # Building a Random Search Example with Ray


    Hyperparameters like the weight or the `discount_factor` of our Q-Learning algorithm
    are *continuous* parameters, so we can''t possibly test all combinations of them.
    What''s more, these parameter choices may not be independent of each other. If
    we want them to be selected for us, we also need to specify a *value range* for
    each of them (both hyperparameters need to be between 0 and 1 in this case). So,
    how do we determine good or even optimal hyperparameters?


    Let''s look at an example that implements a naive yet effective approach to tuning
    hyperparameters. This example will also allow us to introduce some terminology
    that we''ll use later. The core idea is that we can attempt to *randomly sample*
    hyperparameters, run the algorithm for each sample, and then select the best run
    based on the results. But to do the theme of this book justice, we don''t just
    want to run this in a sequential loop; we want to compute our runs in parallel
    using Ray.


    To keep things simple we''ll revisit our simple Q-Learning algorithm from Chapter
    3. We defined the signature of the main training function as `train_policy(env,
    num_episodes=10000, weight=0.1, discount_factor=0.9)`. That means we can tune
    the weight and `discount_factor` parameters of our algorithm by passing in different
    values to the `train_policy` function and see how the algorithm performs. To do
    that, let''s define a so-called *search space* for our hyperparameters. For both'
- md: "parameters in question we uniformly sample values between 0 and 1, for a total\
    \ of 10 choices.\n\nHere's what that looks like:\n\n```python\nimport random\n\
    search_space = []\nfor i in range(10):\n    random_choice = {\n        'weight':\
    \ random.uniform(0, 1),\n        'discount_factor': random.uniform(0, 1)\n   \
    \ }\n    search_space.append(random_choice)\n```\n\nNext, we define an *objective\
    \ function*, or simply *objective*. The role of an objective function is to evaluate\
    \ the performance of a given set of hyperparameters for a desired task. In our\
    \ case, we want to train our RL algorithm and evaluate the trained policy. Recall\
    \ that in Chapter 3 we also defined an `evaluate_policy` function for precisely\
    \ this purpose. The `evaluate_policy` function was defined to return the average\
    \ number of steps it took for an agent to reach the goal in the underlying maze\
    \ environment. In other words, we want to find a set of hyperparameters that minimizes\
    \ the result of our objective function. To parallelize the objective function,\
    \ we'll use the `ray.remote` decorator to make our objective a Ray task:\n\n```python\n\
    import ray\n\n@ray.remote\ndef objective(config):\n    environment = Environment()\n\
    \    policy = train_policy(\n        environment,\n        weight=config[\"weight\"\
    ],\n        discount_factor=config[\"discount_factor\"]\n    )\n    score = evaluate_policy(environment,\
    \ policy)\n    return [score, config]\n```\n\n1.  Pass in a dictionary with a\
    \ hyperparameter sample into our objective.\n2.  Train our RL policy using the\
    \ chosen hyperparameters.\n3.  Afterward we can evaluate the policy to retrieve\
    \ the score we want to minimize.\n4.  Return both score and hyperparameter choice\
    \ for later analysis.\n\nFinally, we can run the objective function in parallel\
    \ using Ray by iterating over the search space and collecting the results:\n\n\
    ```python\nresult_objects = [objective.remote(choice) for choice in search_space]\n\
    results = ray.get(result_objects)\n\nresults.sort(key=lambda x: x[0])\nprint(results[-1])\n\
    ```\n\nThe actual results of this hyperparameter run are not very interesting\
    \ because the problem is easy to solve (most runs will return the optimum of eight\
    \ steps, regardless of the hyperparameters chosen). What’s more interesting here\
    \ is how easy it is to parallelize the objective function with Ray. In fact, we’d\
    \ like to encourage you to rewrite the preceding example to simply loop through\
    \ the search space and call the objective function for each sample, just to confirm\
    \ how painfully slow such a serial loop can be.\n\nConceptually, the three steps\
    \ we took to run that example are representative of how hyperparameter tuning\
    \ works in general. First, you define a search space, then you define an objective\
    \ function, and finally you run an analysis to find the best hyperparameters.\
    \ In HPO it is common to speak of one evaluation of the objective function per\
    \ hyperparameter sample as a *trial*, and all trials form the basis for your analysis.\
    \ How parameters are sampled from the search space (in our case, randomly) is\
    \ up to a *search algorithm* to decide. In practice, finding good hyperparameters\
    \ is easier said than done, so let’s have a closer look at why this problem is\
    \ so hard.\n\n## Why Is HPO Hard?\n\nIf you zoom out from the previous example,\
    \ you can see several intricacies involved in making the process of hyperparameter\
    \ tuning work well. Here’s a quick overview of the most important ones:\n\n- Your\
    \ search space can be composed of a large number of hyperparameters. These parameters\
    \ might have different data types and ranges. Some parameters might be correlated\
    \ or even depend on others. Sampling good candidates from complex, high-dimensional\
    \ spaces is a difficult task.\n- Picking parameters at random can work surprisingly\
    \ well, but it’s not always the best option. In general, you need to test more\
    \ complex search algorithms to find the best parameters.\n- In particular, even\
    \ if you parallelize your hyperparameter search like we just did, a single run\
    \ of your objective function can take a long time to complete. That means you\
    \ can’t afford to run too many searches overall. For instance, training neural\
    \ networks can take hours to complete, so your hyperparameter search needs to\
    \ be efficient.\n- When distributing search, you need to have enough compute resources\
    \ available to run searches over the objective function effectively. For instance,\
    \ you might need a GPU to compute your objective function fast enough, so all\
    \ your search runs need to have access to a GPU. Allocating the necessary resources\
    \ for each trial is critical for speeding up your search.\n- You need convenient\
    \ tooling for your HPO experiments, like stopping bad runs early, saving intermediate\
    \ results, restarting from previous trials, or pausing and resuming runs.\n\n\
    As a mature, distributed HPO framework, Ray Tune addresses all these topics and\
    \ provides a simple interface for running hyperparameter tuning experiments. Before\
    \ we look into how Tune works, let's rewrite our previous example to use Tune.\n\
    \n## An Introduction to Tune\n\nTo get your first taste of Tune, porting over\
    \ our naive Ray Core implementation of random search to Tune is straightforward\
    \ and follows the same three steps as before. First, we define a search space,\
    \ but this time using `tune.uniform`, instead of the random library:\n\n```python\n\
    from ray import tune\n\nsearch_space = {\n    \"weight\": tune.uniform(0, 1),\n\
    \    \"discount_factor\": tune.uniform(0, 1),\n}\n```\n\nNext, we can define an\
    \ objective function that looks almost the same as before. We designed it like\
    \ that. The only differences are that this time we return the score as a dictionary,\
    \ and we don't need a `ray.remote` decorator because Tune will take care of distributing\
    \ this objective function for us internally:\n\n```python\ndef tune_objective(config):\n\
    \    environment = Environment()\n    policy = train_policy(\n        environment,\n\
    \        weight=config[\"weight\"],\n        discount_factor=config[\"discount_factor\"\
    ]\n    )\n    score = evaluate_policy(environment, policy)\n\n    return {\"score\"\
    : score}\n```\n\nWith this `tune_objective` function defined, we can pass it to\
    \ a `tune.run` call, together with the search space we defined. By default, Tune\
    \ will run a random search for you, but you can also specify other search algorithms,\
    \ as you will see soon.¹ Calling tune.run generates random search trials for your\
    \ objective and returns an analysis object that contains information about the\
    \ hyperparameter search. We can get the best hyperparameters found by calling\
    \ get_best_config and specifying the metric and mode arguments (we want to minimize\
    \ our score):\n\n```python\nanalysis = tune.run(tune_objective, config=search_space)\n\
    print(analysis.get_best_config(metric=\"score\", mode=\"min\"))\n```\n\nThis quick\
    \ example covers the basics of Tune, but there’s a lot more to unpack. The tune.run\
    \ function is quite powerful and takes a lot of arguments for you to configure\
    \ your runs. To understand these different configuration options, we first need\
    \ to introduce you to the key concepts of Tune.\n\n## How Does Tune Work?\n\n\
    To effectively work with Tune, you must understand six key concepts, four of which\
    \ you used in the previous example. Here’s an overview of Ray Tune’s components\
    \ and how you should think about them:\n\n**Search spaces**\nThese spaces determine\
    \ which parameters to select. Search spaces define the range of values for each\
    \ parameter and how they should be sampled. They are defined as dictionaries and\
    \ use Tune’s sampling functions to specify valid hyperparameter values. You have\
    \ already seen tune.uniform, but there are many more options to choose from.\n\
    \n**Trainables**\nA Trainable is Tune’s formal representation of an objective\
    \ you want to “tune.” Tune has a class-based API as well, but we will use only\
    \ the function-based API in this book. For us, a Trainable is a function with\
    \ a single argument: a search space, which reports scores to Tune. The easiest\
    \ way to report a score is by returning a dictionary with the value you’re interested\
    \ in.\n\n**Trials**\nBy triggering tune.run(...), Tune will set up trials and\
    \ schedule them for execution on your cluster. A trial contains all the necessary\
    \ information about a single run of your objective, given a set of hyperparameters."

- md: "This example is effectively the “hello world” of Ray Serve: we deployed a single\
    \ model behind a basic HTTP endpoint. Note, however, that we had to manually parse\
    \ the input HTTP request and feed it into our model. For this basic example it\
    \ was just a single line of code, but real-world applications often take a more\
    \ complex schema as input, and hand-writing HTTP logic can be tedious and error-prone.\
    \ To enable writing more expressive HTTP APIs, Serve integrates with the [FastAPI\
    \ Python framework](https://fastapi.tiangolo.com/).²\n\nA Serve deployment can\
    \ wrap a FastAPI app, using its expressive APIs for parsing inputs and configuring\
    \ HTTP behavior. In the following example, we rely on FastAPI to handle parsing\
    \ the `input_text` query parameter, allowing removal of the boilerplate parsing\
    \ code:\n\n```python\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n@serve.deployment\n\
    @serve.ingress(app)\nclass SentimentAnalysis:\n    def __init__(self):\n     \
    \   self._classifier = pipeline(\"sentiment-analysis\")\n\n    @app.get(\"/\"\
    )\n    def classify(self, input_text: str) -> str:\n        return self._classifier(input_text)[0][\"\
    label\"]\n\nfastapi_deployment = SentimentAnalysis.bind()\n```\n\nThe modified\
    \ deployment should have exactly the same behavior on this example (try it using\
    \ `serve run`!), but it will gracefully handle invalid inputs. These may look\
    \ like minor benefits for this simple example, but for more complex APIs this\
    \ can make a world of difference. We won't delve deeper into the details of FastAPI\
    \ here, but for more information on its features and syntax, check out their excellent\
    \ [documentation](https://fastapi.tiangolo.com/).\n\n² Under the hood, Ray Serve\
    \ serializes the user-provided FastAPI app object. Then, when each deployment\
    \ replica runs, Ray Serve deserializes and runs the FastAPI app the same way it\
    \ would be run in a typical web server. At runtime, there will be an independent\
    \ FastAPI server running in each Ray Serve replica.\n\n## Scaling and Resource\
    \ Allocation\n\nAs mentioned, machine learning models are often compute hungry.\
    \ Therefore, it's important to be able to allocate the correct amount of resources\
    \ to your ML application to handle request loads while minimizing cost. Ray Serve\
    \ allows you to adjust the resources dedicated to a deployment in two ways: by\
    \ tuning the number of *replicas* of the deployment and tuning the resources allocated\
    \ to each replica. By default, a deployment consists of a single replica that\
    \ uses a single CPU, but these parameters can be adjusted in the `@serve.deployment`\
    \ decorator (or using the corresponding `deployment.options` API).\n\nLet's modify\
    \ the `SentimentClassifier` example to scale out to multiple replicas and adjust\
    \ the resource allocation so that each replica uses two CPUs instead of one (in\
    \ practice, you would want to profile and understand your model to set this parameter\
    \ correctly). We'll also add a print statement to log the process ID of the process\
    \ handling each request to show that the requests are now load balanced across\
    \ two replicas:\n\n```python\napp = FastAPI()\n\n@serve.deployment(num_replicas=2,\
    \ ray_actor_options={\"num_cpus\": 2})\n@serve.ingress(app)\nclass SentimentAnalysis:\n\
    \    def __init__(self):\n        self._classifier = pipeline(\"sentiment-analysis\"\
    )\n\n    @app.get(\"/\")\n    def classify(self, input_text: str) -> str:\n  \
    \      import os\n        print(\"from process:\", os.getpid())\n        return\
    \ self._classifier(input_text)[0][\"label\"]\n\nscaled_deployment = SentimentAnalysis.bind()\n\
    ```\n\nRunning this new version of our classifier with `serve run app:scaled_deployment`\
    \ and querying it using `requests` as we did previously, you should see that there\

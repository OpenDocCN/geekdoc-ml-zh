    # CHAPTER 1

    ## An Overview of Ray


    One of the reasons we need efficient distributed computing is that we''re collecting
    ever more data with great variety at increasing speeds. The storage systems, data
    processing, and analytics engines that have emerged in the past decade are crucial
    to the success of many companies. Interestingly, most “big data” technologies
    are built for and operated by (data) engineers who are in charge of data collection
    and processing tasks. The rationale is to free up data scientists to do what they''re
    best at. As a data science practitioner, you might want to focus on training complex
    machine learning models, running efficient hyperparameter selection, building
    entirely new and custom models or simulations, or serving your models to showcase
    them.


    At the same time, it might be *inevitable* to scale these workloads to a compute
    cluster. To do that, the distributed system of your choice needs to support all
    of these fine-grained “big compute” tasks, potentially on specialized hardware.
    Ideally, it also fits into the big data tool chain you''re using and is fast enough
    to meet your latency requirements. In other words, distributed computing has to
    be powerful and flexible enough for complex data science workloads—and Ray can
    help you with that.


    Python is likely the most popular language for data science today; it''s certainly
    the one we find the most useful for our daily work. Python is now more than 30
    years old, but it still has a growing and active community. The rich PyData ecosystem
    is an essential part of a data scientist''s toolbox. How can you make sure to
    scale out your workloads while still leveraging the tools you need? That''s a
    difficult problem, especially since communities can''t be forced to just toss
    their toolbox or programming language. That means distributed computing tools
    for data science have to be built for their existing community.


    ## What Is Ray?


    What we like about Ray is that it checks all these boxes. It’s a flexible distributed
    computing framework built for the Python data science community.


    Ray is easy to get started and keeps simple things simple. Its core API is as
    lean as it gets and helps you reason effectively about the distributed programs
    you want to write. You can efficiently parallelize Python programs on your laptop
    and run the code you tested locally on a cluster practically without any changes.
    Its high-level libraries are easy to configure and can seamlessly be used together.
    Some of them, like Ray’s reinforcement learning library, would likely have a bright
    future as standalone projects, distributed or not. While Ray’s core is built in
    C++, it’s been a Python-first framework since day one,¹ integrates with many important
    data science tools, and can count on a growing ecosystem.


    Distributed Python is not new, and Ray is not the first framework in this space
    (nor will it be the last), but it is special in what it has to offer. Ray is particularly
    strong when you combine several of its modules and have custom, machine learning–heavy
    workloads that would be difficult to implement otherwise. It makes distributed
    computing easy enough to run your complex workloads flexibly by leveraging the
    Python tools you know and want to use. In other words, by *learning Ray* you get
    to know *flexible distributed Python for machine learning*. And showing you how
    is what this book is all about.


    In this chapter you’ll get a first glimpse of what Ray can do for you. We will
    discuss the three layers that make up Ray: its core engine, high-level libraries,
    and ecosystem. Throughout the chapter we’ll first show you code examples to give
    you a feel for Ray. You can view this chapter as a quick preview of the book;
    we defer any in-depth treatment of Ray’s APIs and components to later chapters.


    ## What Led to Ray?


    Programming distributed systems is hard. It requires specific knowledge and experience
    you might not have. Ideally, such systems get out of your way and provide abstractions
    to let you focus on your job. But in practice, as Joel Spolsky notes, “all nontrivial
    abstractions, to some degree, are leaky,” and getting clusters of computers to
    do what you want is undoubtedly difficult. Many software systems require resources
    that far exceed what single servers can do. Even if one server were enough, modern
    systems need to be failsafe and provide features like high availability. That


    ¹ By “Python-first” we mean that all higher-level libraries are written in Python
    and that the development of new features is driven by the needs of the Python
    community. Having said this, Ray has been designed to support multiple language
    bindings and, for example, comes with a Java API. So, it’s not out of the question
    that Ray might support other languages that are important to the data science
    ecosystem.'

    There are many more interesting features to explore in Ray Tune, but let's switch\
    \ gears here and look into some machine learning applications using Tune.\n\n\
    # Machine Learning with Tune\n\nAs we've seen, Tune is versatile and allows you\
    \ to tune hyperparameters for any objective you give it. In particular, you can\
    \ use it with any machine learning framework you're interested in. This section\
    \ provides two examples. First, we're going to use Tune to optimize parameters\
    \ of an RLlib experiment, and then we'll tune a Keras model using Optuna through\
    \ Tune.\n\n# Using RLlib with Tune\n\nRLlib and Tune have been designed to work\
    \ together, so you can quite easily set up an HPO experiment for your existing\
    \ RLlib code. In fact, RLlib trainers can be passed into the first argument of\
    \ tune.run, as Trainable. You can choose between the actual trainer class, like\
    \ DQNTrainer, or its string representation, like \"DQN\". As Tune metric you can\
    \ pass any metric tracked by your RLlib experiment, for instance \"episode_reward_mean\"\
    . And the config argument to tune.run is just your RLlib trainer configuration,\
    \ but you can use the full power of Tune's search space API to sample hyperparameters\
    \ like the learning rate or training batch size.⁴ Here's a full example of what\
    \ we just described, running a tuned RLlib experiment on the CartPole-v0 Gym environment:\n\
    \n```\nfrom ray import tune\n\nanalysis = tune.run(\n    \"DQN\",\n    metric=\"\
    episode_reward_mean\",\n    mode=\"max\",\n    config={\n        \"env\": \"CartPole-v1\"\
    ,\n        \"lr\": tune.uniform(1e-5, 1e-4),\n        \"train_batch_size\": tune.choice([10000,\
    \ 20000, 40000]),\n    },\n)\n```\n\n4 In case you were wondering why the \"config\"\
    \ argument in tune.run was not called search_space, the historical reason lies\
    \ in this interoperability with RLlib config objects."

    \ 控制器。任何标准的 Ingress 控制器都应能与 Ray Client 和 Ray Dashboard 配合使用。请选择与你的网络和安全要求兼容的解决方案——更进一步的指导超出了本书的范围。\n\
    \n## 配置 KubeRay\n\n让我们更仔细地了解在 Kubernetes 上运行的 Ray 集群的配置。示例文件 `kuberay/ray-operator/config/samples/ray-cluster.complete.yaml`\

- img_proc: true
  md: "The score we want to minimize here is the square root of a positive number\
    \ times a weight, plus adding a bias term. It's clear that both of these hyperparameters\
    \ need to be as small as possible to minimize the score for any positive x. Given\
    \ that the square root function “flattens out,” we might not have to compute all\
    \ 30 passes through the loop to find sufficiently good values for our two hyperparameters.\
    \ If each score computation took an hour, stopping early could be a huge boost\
    \ in making your experiments run quicker.\n\nLet's illustrate this idea by using\
    \ the popular Hyperband algorithm as our trial scheduler. This scheduler needs\
    \ to be passed a metric and mode (again, we minimize our score). We also make\
    \ sure to run for 10 samples so as not to stop prematurely:\n\n```\nfrom ray.tune.schedulers\
    \ import HyperBandScheduler\n\nscheduler = HyperBandScheduler(metric=\"score\"\
    , mode=\"min\")\n\nanalysis = tune.run(\n    objective,\n    config=search_space,\n\
    \    scheduler=scheduler,\n    num_samples=10,\n)\n\nprint(analysis.get_best_config(metric=\"\
    score\", mode=\"min\"))\n```\n\nNote that in this case we did not specify a search\
    \ algorithm, which means that Hyperband will run on parameters selected by random\
    \ search. We also could have *combined* this scheduler with another search algorithm\
    \ instead. This would have allowed us to pick better trial hyperparameters and\
    \ stop bad trials early. However, note that not every scheduler can be combined\
    \ with search algorithms. Check [Tune's scheduler compatibility matrix](https://docs.ray.io/en/latest/tune/tutorials/tune-scheduler.html)\
    \ for more information.\n\nTo wrap up this discussion, apart from Hyperband, Tune\
    \ includes distributed implementations of early stopping algorithms such as the\
    \ Median Stopping Rule, ASHA, Population Based Training (PBT), and Population\
    \ Based Bandits (PB2).\n\n# Configuring and Running Tune\n\nBefore looking into\
    \ more concrete machine learning examples using Ray Tune, let's dive into some\
    \ useful topics that help you get more out of your Tune experiments, such as properly\
    \ utilizing resources, stopping and resuming trials, adding callbacks to your\
    \ Tune runs, or defining custom and conditional search spaces."

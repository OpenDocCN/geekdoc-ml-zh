    # Key Characteristics of Online Inference


    In the previous section we discussed that the main goal of online inference is
    to interact with ML models with low latency. However, this has long been a key
    requirement for API backends and web servers, so a natural question is: what''s
    different about serving ML models?


    # ML Models Are Compute Intensive


    Many of the challenges in online inference are a result of one key characteristic:
    ML models are very compute intensive. Compared to traditional web serving where
    requests are primarily handled by I/O-intensive database queries or other API
    calls, most ML models boil down to performing many linear algebra computations:
    provide a recommendation, estimate an arrival time, or detect an object in an
    image. This is especially true for the recent trend of “deep learning,” which
    is an arm of ML characterized by neural networks that are growing larger over
    time. Often, deep learning models can also benefit significantly from using specialized
    hardware'

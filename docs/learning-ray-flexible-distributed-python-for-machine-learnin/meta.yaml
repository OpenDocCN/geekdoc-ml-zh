    of structured data such as Python dictionaries, DataFrames, and serialized Parquet
    files.


    The simplest way to create a Dataset with a schema is to create it from a list
    of Python dictionaries:


    ```

    ds = ray.data.from_items([{"id": "abc", "value": 1}, {"id": "def", "value": 2}])

    print(ds.schema())  # -> id: string, value: int64

    ```


    In this case, the schema was inferred from the keys in the dictionaries we passed
    in. We can also convert to/from data types from popular libraries such as Pandas:


    ```

    pandas_df = ds.to_pandas()  # pandas_df will inherit the schema from our Dataset.

    ```


    Here we went from a Dataset to a Pandas DataFrame, but this also works in reverse:
    if you create a Dataset from a DataFrame, it will automatically inherit the schema
    from the DataFrame.


    # Computing Over Ray Datasets


    In the previous section, we introduced some of the functionality built in with
    Ray Datasets such as filtering, sorting, and creating unions. However, one of
    the most powerful parts of Ray Datasets is that it allows you to harness the flexible
    compute model of Ray and perform computations efficiently over large amounts of
    data.


    The primary way to perform a custom transformation on a Dataset is using `.map()`.
    This allows you to pass a custom function that will be applied to the records
    of a Dataset. A basic example might be to square the records of a Dataset:


    ```

    ds = ray.data.range(10000).map(lambda x: x ** 2)

    ds.take(5)  # -> [0, 1, 4, 9, 16]

    ```


    In this example, we passed a simple lambda function, and the data we operated
    on was integers, but we could pass any function here and operate on structured
    data that supports the Arrow format.


    We can also choose to map batches of data instead of individual records using
    `.map_batches()`. Some types of computations are much more efficient when they''re
    *vectorized*, meaning that they use an algorithm or implementation that is more
    efficient operating on a set of items instead of one at a time.


    Revisiting our simple example of squaring the values in the Dataset, we can rewrite
    it to be performed in batches and use the `numpy.square`-optimized implementation
    instead of the naive Python implementation:


    ```

    import numpy as np

    ```


    ```

    ds = ray.data.range(10000).map_batches(lambda batch: np.square(batch).tolist())

    ds.take(5)  # -> [0, 1, 4, 9, 16]

    ```'
  - "[PAGE 148]\n\nVectorized computations are especially useful on GPUs when performing\
    \ deep learning training or inference. However, generally performing computations\
    \ on GPUs also has significant fixed cost due to needing to load model weights\
    \ or other data into the GPU RAM. For this purpose, Ray Datasets supports mapping\
    \ data using Ray actors. Ray actors are long-lived and can hold state, as opposed\
    \ to stateless Ray tasks, so we can cache expensive operations costs by running\
    \ them in the actor's constructor (such as loading a model onto a GPU).\n\nFor\
    \ example, to perform batch inference using Datasets, we need to pass a class\
    \ instead of a function, specify that this computation should run using actors,\
    \ and use `.map_batches()` so we can perform vectorized inference. Datasets will\
    \ automatically autoscale a group of actors to perform the map operation:\n\n\
    ```\ndef load_model():\n    # Returns a dummy model for this example.\n    # In\
    \ reality, this would likely load some model weights onto a GPU.\n    class DummyModel:\n\
    \        def __call__(self, batch):\n            return batch\n\n    return DummyModel()\n\
    \nclass MLModel:\n    def __init__(self):\n        # load_model() will only run\
    \ once per actor that's started.\n        self._model = load_model()\n\n    def\
    \ __call__(self, batch):\n        return self._model(batch)\n\nds.map_batches(MLModel,\
    \ compute=\"actors\")\n```\n\nTo run the inference on a GPU, we would pass `num_gpus=1`\
    \ to the `map_batches` call to specify that the actors running the map function\
    \ each require a GPU.\n\n# Dataset Pipelines\n\nBy default, Dataset operations\
    \ are blocking, meaning they run synchronously from start to finish and there\
    \ is only a single operation happening at a time. This pattern can be very inefficient\
    \ for some workloads, however. For example, consider the following set of Dataset\
    \ transformations on Parquet data that might be used to do batch inference for\
    \ a machine learning model:²\n\n> ² Parquet is a structured, column-oriented format\
    \ that enables efficient compression, data storage, and data retrieval. Many example\
    \ and real-world datasets use Parquet, so it is used in the example provided.\

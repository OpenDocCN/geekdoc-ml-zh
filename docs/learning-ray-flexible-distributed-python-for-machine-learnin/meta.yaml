  md: '# # What Is Ray?


    What we like about Ray is that it checks all these boxes. It’s a flexible distributed
    computing framework built for the Python data science community.


    Ray is easy to get started and keeps simple things simple. Its core API is as
    lean as it gets and helps you reason effectively about the distributed programs
    you want to write. You can efficiently parallelize Python programs on your laptop
    and run the code you tested locally on a cluster practically without any changes.
    Its high-level libraries are easy to configure and can seamlessly be used together.
    Some of them, like Ray’s reinforcement learning library, would likely have a bright
    future as standalone projects, distributed or not. While Ray’s core is built in
    C++, it’s been a Python-first framework since day one,¹ integrates with many important
    data science tools, and can count on a growing ecosystem.


    Distributed Python is not new, and Ray is not the first framework in this space
    (nor will it be the last), but it is special in what it has to offer. Ray is particularly
    strong when you combine several of its modules and have custom, machine learning–heavy
    workloads that would be difficult to implement otherwise. It makes distributed
    computing easy enough to run your complex workloads flexibly by leveraging the
    Python tools you know and want to use. In other words, by *learning Ray* you get
    to know *flexible distributed Python for machine learning*. And showing you how
    is what this book is all about.


    In this chapter you’ll get a first glimpse of what Ray can do for you. We will
    discuss the three layers that make up Ray: its core engine, high-level libraries,
    and ecosystem. Throughout the chapter we’ll first show you code examples to give
    you a feel for Ray. You can view this chapter as a quick preview of the book;
    we defer any in-depth treatment of Ray’s APIs and components to later chapters.


    # # What Led to Ray?


    Programming distributed systems is hard. It requires specific knowledge and experience

    \ 的 replicas 字段指定要保留在集群中的每个组的工作 Pod 数量。\n\n**rayStartParams**\n这是一个字符串到字符串的映射，包含传递给\
    \ Ray Pod 的 ray start 入口点的参数。有关参数的完整列表，请参阅 [ray start 文档](https://docs.ray.io/en/latest/ray-core/starting-ray.html#ray-start)。我们特别注意\
    \ num-cpus 和 num-gpus 字段参数：\n\n**num-cpus**\n此字段告诉 Ray 调度器有多少 CPU 可供 Ray Pod 使用。CPU\
    \ 数量可以从组规范 Pod 模板中指定的 Kubernetes 资源限制中自动检测。有时覆盖此自动检测的值很有用。例如，设置 num-cpus: \"0\"\
    \ 将阻止具有非零 CPU 要求的 Ray 工作负载被调度到头节点上。\n\n**num-gpus**\n这指定 Ray Pod 可用的 GPU 数量。在撰写本文时，此字段*不会*从组规范的\
    \ Pod 模板中检测。因此，对于 GPU 工作负载，必须显式设置 num-gpus。\n\n**template**\n这是 headGroup 或 workerGroup\
    \ 配置的主要部分所在。模板是一个 Kubernetes Pod 模板，决定了组中 Pod 的配置。\n\n**resources**\n为每个组规范指定容器\
    \ CPU 和内存请求及限制非常重要。对于 GPU 工作负载，你可能还希望指定 GPU 限制，例如，如果使用 Nvidia GPU 设备插件，则为 nvidia.com/gpu:\
    \ 1。\n\n**nodeSelector 和 tolerations**\n你可以通过设置 Pod 规范的 nodeSelector 和 tolerations\
    \ 字段来控制工作组 Ray Pod 的调度。具体来说，这些字段决定了 Pod 可以被调度到哪些 Kubernetes 节点上。请注意，KubeRay Operator\
    \ 在 Pod 级别操作——KubeRay 对底层 Kubernetes 节点的设置是无关的。Kubernetes 节点配置由你的 Kubernetes 集群管理员负责。\n\
    \n**Ray 容器镜像**\n指定集群 Ray 容器使用的镜像非常重要。集群的头节点和工作节点都应使用相同的 Ray 版本。在大多数情况下，为给定 Ray\
    \ 集群的头节点和所有工作节点使用完全相同的容器镜像是有意义的。要为集群指定自定义依赖项，你应该基于官方 rayproject/ray 镜像之一构建一个镜像。\n\
    \n**卷挂载**\n卷挂载可用于保留源自 Ray 容器的日志或其他应用程序数据。（参见第 189 页的“配置 KubeRay 日志记录”。）\n\n**容器环境变量**\n\
    容器环境变量可用于修改 Ray 的行为。例如，RAY_LOG_TO_STDERR 会将日志重定向到 STDERR，而不是写入容器的文件系统。\n\n## 配置\
    \ KubeRay 日志记录\n\nRay 集群进程通常将日志写入 Pod 中的 /tmp/ray/session_latest/logs 目录。这些日志在\
    \ Ray Dashboard 中也可见。要将 Ray 日志保留到 Pod 生命周期之外，你可以使用以下技术之一：\n\n**从容器文件系统聚合日志**\n\
    对于此策略，在 Ray 容器中挂载一个 mountPath 为 /tmp/ray/ 的 empty-dir 卷（参见前面的示例配置）。你可以将日志卷挂载到运行日志聚合工具（如\
    \ Promtail）的 sidecar 容器中。\n\n**容器 STDERR 日志记录**\n另一种方法是将日志重定向到 STDERR。为此，在所有 Ray\
    \ 容器上设置环境变量 RAY_LOG_TO_STDERR=1。在 Kubernetes 配置方面，这意味着在每个 Ray groupSpec 的 Ray\
    \ 容器的 env 字段中添加一个条目：\n\n```\nenv:\n  ...\n  - name: \"RAY_LOG_TO_STDERR\"\n  \
    \  value: \"1\"\n  ...\n```\n\n然后，你可以使用一个专门用于从 STDERR 和 STDOUT 流聚合日志的 Kubernetes\
    \ 日志工具。\n\n## 使用 Ray 集群启动器\n\nRay 集群启动器的目标是使在任何云上部署 Ray 集群变得容易。它将为你执行以下操作：\n\n\
    - 使用云提供商的 SDK 预置一个新实例/机器。\n- 执行 shell 命令以使用提供的选项设置 Ray。\n- 可选地运行任何自定义的、用户定义的设置命令。这对于设置环境变量和安装包很有用。⁶\n\
    - 为你初始化 Ray 集群。\n- 部署一个自动扩缩容进程。\n\n我们将在第 194 页的“自动扩缩容”中详细介绍自动扩缩容的细节。现在，让我们专注于使用集群启动器部署\
    \ Ray 集群。为此，你需要提供一个集群配置文件。\n\n## 配置你的 Ray 集群\n\n要运行你的 Ray 集群，你必须在集群配置文件中指定资源要求。\n\
    \n以下是我们“脚手架”集群规范。这大约是你启动集群所需的最低配置。有关集群 YAML 文件的更多信息，请参阅此处的一个大型示例（我们称之为 cluster.yaml）：\n\
    \n```\n# 此集群头节点和工作节点的唯一标识符。\ncluster_name: minimal\n```"

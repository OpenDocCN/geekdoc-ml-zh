    \ us-west-2a\n\n# How Ray will authenticate with newly launched nodes.\nauth:\n\
    \    ssh_user: ubuntu\n\n## Using the Cluster Launcher CLI\n\nNow that you have\
    \ a cluster configuration file, you can use the Cluster Launcher CLI to deploy\
    \ the specified cluster:\n\n```\nray up cluster.yaml\n```\n\nThis single line\
    \ of code will take care of everything done via the manual cluster setup. It will\
    \ interact with the cloud provider to provision the head node and start the appropriate\
    \ Ray services or processes on that node.\n\nThis single line of code will not\
    \ automatically start all specified nodes. In fact, it will start only a single\
    \ “head” node, and run `ray start --head ...` on that head node. A Ray autoscaling\
    \ process will then use the provided cluster configuration to start the worker\
    \ nodes as a background thread after the head node has started.\n\n## Interacting\
    \ with a Ray Cluster\n\nAfter you start a cluster, you’ll often want to interact\
    \ with it through a variety of actions:\n\n- Run a script on the cluster\n- Move\
    \ files, logs, and artifacts off the cluster\n- SSH onto the nodes to inspect\
    \ machine details\n\nThere is a CLI for interacting with clusters launched by\

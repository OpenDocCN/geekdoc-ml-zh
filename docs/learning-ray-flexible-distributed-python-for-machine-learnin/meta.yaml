    \ that require a stopping condition with more context or explicit state, you can\
    \ also define a custom Stopper class to pass into the `stop` argument of your\
    \ Tune run, but we won't cover this case here.\n\n## Custom and conditional search\
    \ spaces\n\nThe last more advanced topic we'll cover here is that of complex search\
    \ spaces. So far, we've looked only at hyperparameters that were independent of\

    \ `tune.run` 来*停止*你的试验。最简单的方法是提供一个包含停止条件的字典。以下是如何在达到 `training_iteration` 计数为\
    \ 10（所有 Tune 运行的内置指标）后停止运行我们的目标分析：\n\n```python\ntune.run(\n    objective,\n \

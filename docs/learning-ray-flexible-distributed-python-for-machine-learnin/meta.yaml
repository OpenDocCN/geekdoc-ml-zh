    ## Working with Cloud Clusters\n\nThis section demonstrates how to deploy Ray\
    \ Clusters on AWS and other cloud providers.\n\n### AWS\n\nFirst, install boto\
    \ (`pip install boto3`) and configure your AWS credentials in `$HOME/.aws/credentials`,\
    \ as described in the boto docs.\n\nOnce boto is configured to manage resources\
    \ on your AWS account, you should be ready to launch your cluster. The provided\
    \ `example-full.yaml` cluster config file will create a small cluster with an\
    \ `m5.large` head node (on-demand) configured to autoscale up to two `m5.large`\
    \ spot instance workers.\n\nTest that it works by running the following commands\
    \ from your local machine:\n\n```\n# Create or update the cluster. When the command\
    \ finishes, it will print\n# out the command that can be used to SSH into the\
    \ cluster head node.\n$ ray up ray/python/ray/autoscaler/aws/example-full.yaml\n\
    \n# Get a remote screen on the head node.\n$ ray attach ray/python/ray/autoscaler/aws/example-full.yaml\n\
    # Try running a Ray program with 'ray.init(address=\"auto\")'.\n\n# Tear down\
    \ the cluster.\n$ ray down ray/python/ray/autoscaler/aws/example-full.yaml\n```\n\
    \n### Using Other Cloud Providers\n\nRay Clusters can be deployed on most major\
    \ clouds, including GCP and Azure. Here is a template to get started for Google\
    \ Cloud:\n\n```\n# A unique identifier for the head node and workers of this cluster.\n\
    cluster_name: minimal\n\n# The maximum number of worker nodes to launch in addition\
    \ to the head\n# node. min_workers default to 0.\nmax_workers: 1\n\n# Cloud-provider\
    \ specific configuration.\nprovider:\n    type: gcp\n    region: us-west1\n  \
    \  availability_zone: us-west1-a\n    project_id: null # Globally unique project\
    \ id\n\n# How Ray will authenticate with newly launched nodes.\nauth:\n    ssh_user:\
    \ ubuntu\n```\n\nHere is a template to get started for Azure:\n\n```\n# An unique\
    \ identifier for the head node and workers of this cluster.\ncluster_name: minimal\n\
    \n# The maximum number of workers nodes to launch in addition to the head\n# node.\
    \ min_workers default to 0.\nmax_workers: 1\n\n# Cloud-provider specific configuration.\n\
    provider:\n    type: azure\n    location: westus2\n    resource_group: ray-cluster\n\
    \n# How Ray will authenticate with newly launched nodes.\nauth:\n    ssh_user:\
    \ ubuntu\n    # You must specify paths to matching private and public key pair\
    \ files.\n    # Use `ssh-keygen -t rsa -b 4096` to generate a new ssh key pair.\n\
    \    ssh_private_key: ~/.ssh/id_rsa\n    # Changes to this should match what is\
    \ specified in file_mounts.\n    ssh_public_key: ~/.ssh/id_rsa.pub\n```\n\nYou\
    \ can read more about this on [the Ray documentation](https://docs.ray.io/en/latest/cluster/cloud/index.html).\n\
    \n## Autoscaling\n\nRay is designed to support highly elastic workloads that are\
    \ most efficient on an autoscaling cluster. At a high level, the autoscaler attempts\
    \ to launch and terminate nodes to ensure that workloads have sufficient resources\
    \ to run, while minimizing the idle resources. It does this by considering:\n\n\
    - User-specified hard limits (min/max workers)\n- User-specified node types (nodes\
    \ in a Ray Cluster do *not* have to be homogenous)\n- Information from the Ray\
    \ Core's scheduling layer about the current resource usage/demands of the cluster\n\
    - Programmatic autoscaling hints\n\nThe autoscaler resource demand scheduler will\
    \ look at the pending tasks, actors, and placement groups, resource demands from\
    \ the cluster. It will then try to add the minimum list of nodes that can fulfill\
    \ these demands.\n\nWhen worker nodes are idle for more than `idle_timeout_minutes`,\
    \ they will be removed. The head node is never removed unless the cluster is torn\
    \ down.\n\nThe autoscaler uses a simple *binpacking algorithm* to pack the user\
    \ demands into the available cluster resources. The remaining unfulfilled demands\
    \ are placed on the smallest list of nodes that satisfies the demand while maximizing\
    \ utilization (starting from the smallest node). You can learn more about the\
    \ autoscaling algorithm in the [Autoscaling section of the Ray architecture whitepaper](https://docs.ray.io/en/latest/cluster/kubernetes/user-guides/configure-autoscaling.html).\n\
    \nRay also provides documentation and tooling for other cluster managers such\
    \ as YARN, SLURM, and LFS. You can read more about this in the [Ray documentation](https://docs.ray.io/en/latest/cluster/kubernetes/user-guides/configure-autoscaling.html).\n\
    \n## Summary\n\nIn this chapter you learned how to spin up your own Ray Clusters\
    \ so that you can deploy your Ray applications on them. Besides manually setting\
    \ up and shutting down clusters, we had a closer look at deploying Ray Clusters\
    \ on Kubernetes using KubeRay. We also looked at the Ray Cluster Launcher in detail\
    \ and discussed how to work with cloud clusters on clouds such as AWS, GCP, and\
    \ Azure. Finally, we discussed how to use the Ray autoscaler to scale your Ray\
    \ Clusters.\n\nNow that you know more about scaling Ray Clusters, we'll come back\
    \ to the application side of things in [Chapter 10](https://docs.ray.io/en/latest/cluster/kubernetes/user-guides/configure-autoscaling.html)\
    \ and discuss how all the Ray ML libraries we've seen effectively come together\
    \ to form the Ray AI Runtime.\n\n# CHAPTER 10\n\n# Getting Started with the Ray\
    \ AI Runtime\n\nWe’ve come a long way since you read about Ray AIR in Chapter\
    \ 1. Besides the fundamentals of Ray Clusters and the basics of the Ray Core API,\

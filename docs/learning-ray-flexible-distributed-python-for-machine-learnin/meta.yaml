    It''s ideal, when possible, to size each Ray pod such that it takes up the entire
    Kubernetes node on which it is scheduled. In other words, it''s best to run one
    large Ray pod per Kubernetes node; running multiple Ray pods on one Kubernetes
    node introduces unnecessary overhead. However, running multiple Ray pods on one
    Kubernetes node makes sense in some situations, such as if:


    +   - Many users are running Ray Clusters on a Kubernetes cluster with limited
    compute resources.

    - You or your organization is not directly managing Kubernetes nodes (e.g., when
    deploying on GKE Autopilot).


    Some of the primary configuration values that you may use are:


    **headGroupSpec *and* workerGroupSpecs**

    A Ray Cluster consists of a head pod and a number of worker pods. The head pod''s
    configuration is specified under headGroupSpec. Configuration for worker pods
    is specified under workerGroupSpecs. There may be multiple worker groups, each
    group with its own configuration template. The replicas field of a workerGroup
    specifies the number of worker pods of each group to keep in the cluster.


    **rayStartParams**

    This is a string-string map of arguments to the Ray pod''s ray start entry point.
    For the full list of arguments, refer to the [documentation for ray start](https://docs.ray.io/en/latest/ray-core/starting-ray.html#ray-start).
    We make special note of the num-cpus and num-gpus field arguments:


    **num-cpus**

    This field tells the Ray Scheduler how many CPUs are available to the Ray pod.
    The CPU count can be autodetected from the Kubernetes resource limits specified
    in the group spec''s pod template. It is sometimes useful to override this autodetected
    value. For example, setting num-cpus: "0" will prevent Ray workloads with nonzero
    CPU requirements from being scheduled on the head node.


    **num-gpus**

    This specifies the number of GPUs available to the Ray pod. At the time of writing,
    this field is *not* detected from the group spec''s pod template. Thus, num-gpus
    must be set explicitly for GPU workloads.'
  - '[PAGE 210]


    template

    This is where the bulk of the headGroup or workerGroup''s configuration goes.
    The template is a Kubernetes Pod template that determines the configuration for
    the pods in the group.


    resources

    It''s important to specify container CPU and memory requests and limits for each
    group spec. For GPU workloads, you may also wish to specify GPU limits, e.g.,
    nvidia.com/gpu: 1 if using an Nvidia GPU device plug-in.


    nodeSelector and tolerations

    You can control the scheduling of a worker group''s Ray pods by setting the nodeSelector
    and tolerations fields of the pod spec. Specifically, these fields determine on
    which Kubernetes nodes the pods may be scheduled. Note that the KubeRay operator
    operates at the level of pods—KubeRay is agnostic to the setup of the underlying
    Kubernetes nodes. Kubernetes node configuration is left to your Kubernetes cluster''s
    admins.


    Ray container images

    It''s important to specify the images used by your cluster''s Ray containers.
    The head and workers of the clusters should all use the same Ray version. In most
    cases, it makes sense to use the exact same container image for the head and all
    workers of a given Ray Cluster. To specify custom dependencies for your cluster,
    you should build an image based on one of the official rayproject/ray images.


    Volume mounts

    Volume mounts can be used to preserve logs or other application data originating
    in your Ray containers. (See "Configuring Logging for KubeRay" on page 189.)


    Container environment variables

    Container environment variables may be used to modify Ray''s behavior. For example,
    RAY_LOG_TO_STDERR will redirect logs to STDERR rather than writing them to the
    container''s filesystem.


    # Configuring Logging for KubeRay


    Ray Cluster processes typically write logs to the directory /tmp/ray/session_latest/logs
    in the pod. These logs are also visible in the Ray Dashboard. To persist Ray logs
    beyond the lifetime of a pod, you may use one of the following techniques:


    Aggregate logs from the container''s filesystem

    For this strategy, mount an empty-dir volume with mountPath /tmp/ray/ in the Ray
    container (see the preceding example configuration). You can mount the log volume
    into a sidecar container running a log aggregation tool such as Promtail.'
  - "[PAGE 211]\n\nContainer STDERR logging\nAn alternative is to redirect logging\
    \ to STDERR. To do this, set the environment variable RAY_LOG_TO_STDERR=1 on all\
    \ Ray containers. In terms of Kubernetes configuration, that means adding an entry\
    \ to the env field of the Ray container in each Ray groupSpec:\n\n```\nenv:\n\
    \  ...\n  - name: \"RAY_LOG_TO_STDERR\"\n    value: \"1\"\n  ...\n```\n\nYou may\
    \ then use a Kubernetes logging tool geared toward aggregation from the STDERR\
    \ and STDOUT streams.\n\n# Using the Ray Cluster Launcher\n\nThe goal of the Ray\
    \ Cluster Launcher is to make it easy to deploy a Ray Cluster on any cloud. Here's\
    \ what it will do for you:\n\n+   - Provision a new instance/machine using the\
    \ cloud provider's SDK.\n- Execute shell commands to set up Ray with the provided\
    \ options.\n- Optionally run any custom, user-defined setup commands. This can\
    \ be useful for setting environment variables and installing packages.⁶\n- Initialize\
    \ the Ray Cluster for you.\n- Deploy an autoscaler process.\n\nWe will walk you\
    \ through the details of autoscaling in “Autoscaling” on page 194. For now, let's\
    \ focus on using the cluster launcher to deploy a Ray Cluster. To do so, you need\
    \ to provide a cluster configuration file.\n\n# Configuring Your Ray Cluster\n\
    \nTo run your Ray Cluster, you must specify the resource requirements in a cluster\
    \ configuration file.\n\nHere's our “scaffold” cluster specification. This is\
    \ just about the minimum you'll need to specify to launch your cluster. For more\
    \ information about cluster YAML files, see a large example here (let's call it\
    \ cluster.yaml):\n\n```\n# An unique identifier for the head node and workers\
    \ of this cluster.\ncluster_name: minimal\n```"

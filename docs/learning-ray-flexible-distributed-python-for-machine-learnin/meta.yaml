    \ 服务\n\n在前面的示例中，我们使用了端口转发作为访问 Ray 头节点服务的简单方式。对于生产用例，你可能需要考虑其他暴露这些服务的方法。以下说明适用于在\
    \ Kubernetes 上运行的服务。\n\n默认情况下，Ray 服务可以从运行 Ray Operator 的 Kubernetes 集群*内部*的任何位置访问。例如，要从与\
    \ Ray 集群处于同一 Kubernetes 命名空间的 Pod 中使用 Ray Client，请使用 `ray.init(\"ray://raycluster-complete-head-svc:10001\"\

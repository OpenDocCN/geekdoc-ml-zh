  md: "In this example we want to focus on the details of Ray Train itself, so we'll\
    \ use a much simpler training dataset and a small neural network that takes random\
    \ noise as input. We define a three-layer NeuralNetwork, an explicit training_loop,\
    \ similar to the one we saw in the previous section, that you can use to train\
    \ the model. For clarity, we extract the training code run for each epoch in a\
    \ helper function called train_one_epoch:\n\n```\nimport torch\nimport torch.nn\
    \ as nn\nimport torch.nn.functional as F\nfrom ray.data import from_torch\n\n\
    num_samples = 20\ninput_size = 10\nlayer_size = 15\noutput_size = 5\nnum_epochs\
    \ = 3\n\nclass NeuralNetwork(nn.Module):\n    def __init__(self):\n        super().__init__()\n\
    \        self.fc1 = nn.Linear(input_size, layer_size)\n        self.relu = nn.ReLU()\n\
    \        self.fc2 = nn.Linear(layer_size, output_size)\n\n    def forward(self,\
    \ x):\n        x = F.relu(self.fc1(x))\n        x = self.fc2(x)\n        return\
    \ x\n\ndef train_data():\n    return torch.randn(num_samples, input_size) ❶\n\n\
    input_data = train_data()\nlabel_data = torch.randn(num_samples, output_size)\n\
    train_dataset = from_torch(input_data) ❷\n\ndef train_one_epoch(model, loss_fn,\
    \ optimizer): ❸\n    output = model(input_data)\n    loss = loss_fn(output, label_data)\n\
    \    optimizer.zero_grad()\n    loss.backward()\n    optimizer.step()\n\ndef training_loop():\
    \ ❹\n    model = NeuralNetwork()\n```"

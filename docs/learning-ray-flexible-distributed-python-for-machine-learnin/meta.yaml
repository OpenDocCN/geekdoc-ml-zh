  md: 'of structured data such as Python dictionaries, DataFrames, and serialized
    Parquet files.


    The simplest way to create a Dataset with a schema is to create it from a list
    of Python dictionaries:


    ```

    ds = ray.data.from_items([{"id": "abc", "value": 1}, {"id": "def", "value": 2}])

    print(ds.schema())  # -> id: string, value: int64

    ```


    In this case, the schema was inferred from the keys in the dictionaries we passed
    in. We can also convert to/from data types from popular libraries such as Pandas:


    ```

    pandas_df = ds.to_pandas()  # pandas_df will inherit the schema from our Dataset.

    ```


    Here we went from a Dataset to a Pandas DataFrame, but this also works in reverse:
    if you create a Dataset from a DataFrame, it will automatically inherit the schema
    from the DataFrame.


    # Computing Over Ray Datasets


    In the previous section, we introduced some of the functionality built in with
    Ray Datasets such as filtering, sorting, and creating unions. However, one of
    the most powerful parts of Ray Datasets is that it allows you to harness the flexible
    compute model of Ray and perform computations efficiently over large amounts of
    data.


    The primary way to perform a custom transformation on a Dataset is using `.map()`.
    This allows you to pass a custom function that will be applied to the records
    of a Dataset. A basic example might be to square the records of a Dataset:


    ```

    ds = ray.data.range(10000).map(lambda x: x ** 2)

    ds.take(5)  # -> [0, 1, 4, 9, 16]

    ```


    In this example, we passed a simple lambda function, and the data we operated
    on was integers, but we could pass any function here and operate on structured
    data that supports the Arrow format.


    We can also choose to map batches of data instead of individual records using
    `.map_batches()`. Some types of computations are much more efficient when they''re
    *vectorized*, meaning that they use an algorithm or implementation that is more
    efficient operating on a set of items instead of one at a time.


    Revisiting our simple example of squaring the values in the Dataset, we can rewrite
    it to be performed in batches and use the `numpy.square`-optimized implementation
    instead of the naive Python implementation:


    ```

    import numpy as np

    ```


    ```

    ds = ray.data.range(10000).map_batches(lambda batch: np.square(batch).tolist())

    ds.take(5)  # -> [0, 1, 4, 9, 16]

    ```'

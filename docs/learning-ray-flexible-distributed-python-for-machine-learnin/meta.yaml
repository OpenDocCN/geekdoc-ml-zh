  md: "![](img/6489687a3a178f2884963bddc928992c_112_0.png)\n\nFigure 4-3. Working\
    \ with policy servers and clients in RLlib\n\n# Defining a server\n\nLet's start\
    \ by defining the server side of such an application first. We define a so-called\
    \ PolicyServerInput that runs on localhost on port 9900. This policy input is\
    \ what the client will provide later. With this policy_input defined as input\
    \ to our algorithm configuration, we can define yet another DQN to run on the\
    \ server:\n\n```\n# policy_server.py\nimport ray\nfrom ray.rllib.agents.dqn import\
    \ DQNConfig\nfrom ray.rllib.env.policy_server_input import PolicyServerInput\n\
    import gym\n\nray.init()\n\ndef policy_input(context):\n    return PolicyServerInput(context,\
    \ \"localhost\", 9900) ❶\n\nconfig = DQNConfig()\\n    .environment(\n       \
    \ env=None, ❷\n        action_space=gym.spaces.Discrete(4), ❸\n        observation_space=gym.spaces.Discrete(5*5))\\\
    n    .debugging(log_level=\"INFO\")\\n    .rollouts(num_rollout_workers=0)\\n\
    \    .offline_data(❹\n        input=policy_input,\n        input_evaluation=[])\n\
    \nalgo = config.build()\n```\n\n❶ The policy_input function returns a PolicyServerInput\
    \ object running on localhost on port 9900."

  md: 'you want to work both in a multi-agent and external environment setting, RLlib
    offers a `MultiAgentExternalEnv` environment that combines both.


    # Working with Multiple Agents


    The basic idea of defining multi-agent environments in RLlib is simple. You first
    assign each agent an agent ID. Then, whatever you previously defined as a single
    value in a Gym environment (observations, rewards, etc.), you now define as a
    dictionary with agent IDs as keys and values per agent. Of course, the details
    are a little more complicated than that in practice. But once you have defined
    an environment hosting several agents, you have to define how these agents should
    learn.


    In a single-agent environment there’s one agent and one policy to learn. In a
    multi-agent environment there are multiple agents that might map to one or several
    policies. For instance, if you have a group of homogenous agents in your environment,
    then you could define a single policy for all of them. If they all *act* the same
    way, then their behavior can be learned the same way. In contrast, you might have
    situations with heterogeneous agents in which each of them has to learn a separate
    policy. Between these two extremes, there’s a spectrum of possibilities, as shown
    in Figure 4-2.


    We continue to use our maze game as a running example for this chapter. This way
    you can check for yourself how the interfaces differ in practice. So, to put the
    ideas we just outlined into code, let’s define a multi-agent version of the `GymEnvironment`
    class. Our `MultiAgentEnv` class will have precisely two agents, which we encode
    in a Python dictionary called `agents`, but in principle this works with any number
    of agents.


    ![](img/6489687a3a178f2884963bddc928992c_107_0.png)


    *Figure 4-2. Mapping agents to policies in multi-agent reinforcement learning
    problems*'
  merge: -1
  pgno: 107
- img_proc: true
  md: "We start by initializing and resetting our new environment:\n\n```\nfrom ray.rllib.env.multi_agent_env\
    \ import MultiAgentEnv\nfrom gym.spaces import Discrete\nimport os\n```\n\n```\n\
    class MultiAgentMaze(MultiAgentEnv):\n\n    def __init__(self, *args, **kwargs):\n\
    \        self.action_space = Discrete(4)\n        self.observation_space = Discrete(5*5)\n\
    \        self.agents = {1: (4, 0), 2: (0, 4)}\n        self.goal = (4, 4)\n  \
    \      self.info = {1: {'obs': self.agents[1]}, 2: {'obs': self.agents[2]}}\n\n\
    \    def reset(self):\n        self.agents = {1: (4, 0), 2: (0, 4)}\n\n      \
    \  return {1: self.get_observation(1), 2: self.get_observation(2)}\n```\n\n+ \
    \  1. Action and observation spaces stay exactly the same as before.\n2. We now\
    \ have two seekers with (0, 4) and (4, 0) starting positions in an agents dictionary.\n\
    3. For the info object, we're using agent IDs as keys.\n4. Observations are now\
    \ per-agent dictionaries.\n\nNotice that we didn't touch the action and observation\
    \ spaces at all. That's because we're using two essentially identical agents here\
    \ that can reuse the same spaces. In more complex situations you'd have to account\
    \ for the fact that the actions and observations might look different for some\
    \ agents.16\n\nTo continue, let's generalize our helper methods get_observation,\
    \ get_reward, and is_done to work with multiple agents. We do this by passing\
    \ in an action_id to their signatures and handling each agent the same way as\
    \ before:\n\n```\ndef get_observation(self, agent_id):\n    seeker = self.agents[agent_id]\n\
    \    return 5 * seeker[0] + seeker[1]\n\ndef get_reward(self, agent_id):\n   \
    \ return 1 if self.agents[agent_id] == self.goal else 0\n```\n\n> 16 You can find\
    \ a good example that defines different observation and action spaces for multiple\
    \ agents in the RLlib documentation."
  merge: -1

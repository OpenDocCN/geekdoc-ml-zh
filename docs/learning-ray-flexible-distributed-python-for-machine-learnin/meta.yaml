  md: '# Recapping RL Terminology


    Before we wrap up this chapter, let''s discuss the concepts we''ve encountered
    in the maze example in a broader context. Doing so will prepare you for more complex
    RL settings in the next chapter and show you where we simplified things a little
    for this chapter''s running example. If you know RL well enough, you can skip
    this section.


    Every RL problem starts with the formulation of an *environment*, which describes
    the dynamics of the “game” you want to play. The environment hosts a player or
    *agent* that interacts with its environment through a simple interface. The agent
    can request information from the environment, namely, its current *state* within
    the environment, the *reward* it has received in this state, and whether the game
    is *done* or not. In observing states and rewards, the agent can learn to make
    decisions based on the information it receives. Specifically, the agent will emit
    an *action* that can be executed by the environment by taking the next step.


    The mechanism used by an agent to produce actions for a given state is called
    a *policy*, and we sometimes say that the agent follows a given policy. Given
    a policy, we can simulate or *roll out* a few steps or an entire game using that
    policy. During a rollout we can collect *experiences*, which collect information
    about the current state and reward, the next action, and the resulting state.
    An entire sequence of steps from start to finish is referred to as an *episode*,
    and the environment can be reset to its initial state to start a new episode.


    The policy we used in this chapter was based on the simple idea of tabulating
    *state-action values* (also called *Q-values*), and the algorithm used to update
    the policy from the experiences collected during rollouts is called *Q-Learning*.
    More generally, you can consider the state-action table we implemented as the
    *model* used by the policy. In the next chapter you will see examples of more
    complex models, such as a neural network to learn state-action values. The policy
    can decide to *exploit* what it has learned about the environment by choosing
    the best available value of its model or *explore* the environment by choosing
    a random action.


    Many of the basic concepts introduced here hold for any RL problem, but we''ve
    made a few simplifying assumptions. For instance, there could be *multiple agents*
    acting in the environment (imagine having multiple seekers competing for reaching
    the goal first), and we''ll look into so-called multi-agent environments and multi-agent
    RL and in the next chapter. Also, we assumed that the *action space* of an agent
    was *discrete*, meaning that the agent could take only a fixed set of actions.
    You can, of course, also have *continuous* action spaces, and the cart–pole example
    from Chapter 1 is one example of this. Especially when you have multiple agents,
    action spaces can be more complicated, and you might need tuples of actions or
    even to nest them accordingly. The *observation space* we''ve considered for the
    maze game was also quite simple and was modeled as a discrete set of states. You
    can easily imagine that complex agents'
  merge: -1
  pgno: 87
- img_proc: true
  md: 'like robots interacting with their environments might work with image or video
    data as observations, which would require a more complex observation space too.


    Another crucial assumption we made is that the environment is *deterministic*,
    meaning that when our agent chose to take an action, the resulting state would
    always reflect that choice. In general environments this is not the case, and
    there can be elements of randomness at play in the environment. For instance,
    we could have implemented a coin flip in the maze game, and whenever tails came
    up, the agent would get pushed in a random direction. In that scenario, we couldn''t
    have planned ahead like we did in this chapter because actions would not deterministically
    lead to the same next state every time. To reflect this probabilistic behavior,
    in general we have to account for *state transition probabilities* in our RL experiments.


    The last simplifying assumption I''d like to talk about here is that we''ve been
    treating the environment and its dynamics as a game that can be perfectly simulated.
    But the fact is that some physical systems can''t be faithfully simulated. In
    that case you might still interact with this physical environment through an interface
    like the one we defined in our `Environment` class, but there would be some communication
    overhead involved. In practice, *reasoning* about RL problems as if they were
    games takes very little away from the experience.


    # Summary


    To recap, we''ve implemented a simple maze problem in plain Python and then solved
    the task of finding the goal in that maze using a straightforward reinforcement
    learning algorithm. We then took this solution and ported it to a distributed
    Ray application in roughly 25 lines of code. We did so without having to plan
    up front how to work with Ray—we simply used the Ray API to parallelize our Python
    code. This example shows how Ray gets out of your way and lets you focus on your
    application code. It also demonstrates how custom workloads that use advanced
    techniques like RL can be efficiently implemented and distributed with Ray.


    In [Chapter 4](https://example.com/chapter4), you''ll build on what you''ve learned
    here and see how easy it is to solve our maze problem directly with the higher-level
    Ray RLlib library.'

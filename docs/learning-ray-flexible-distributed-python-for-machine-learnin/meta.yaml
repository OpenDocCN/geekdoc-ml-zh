    now be able to connect to the cluster with ray.init(address=''auto'').


    ![](img/6489687a3a178f2884963bddc928992c_202_0.png)


    If the head node and the new node you want to connect are on a separate subnet
    with Network Address Translation (NAT), you can''t use the <head-address> printed
    by the command starting the head node as --address. In this case, you need to
    find the address that will reach the head node from the new node. If the head
    node has a domain address like compute04.berkeley.edu, you can use that in place
    of an IP address and rely on the DNS.


    If you see Unable to connect to GCS at ..., it means the head node is inaccessible
    at the given --address. This could be for several reasons. For example, maybe
    the head node is not actually running, a different version of Ray is running at
    the specified address, the specified address is wrong, or firewall settings are
    preventing access.


    If the connection fails, to check whether each port can be reached from a node,
    you can use a tool such as nmap or nc. Here''s an example of how to run a check
    with both tools in a successful case:⁵



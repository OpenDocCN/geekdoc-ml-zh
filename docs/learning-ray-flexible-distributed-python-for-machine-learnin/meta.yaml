    \ 中回调和指标的用户指南。\n\n## 检查点、停止和恢复\n\n你启动的 Tune 试验越多，每个试验单独运行的时间越长，尤其是在分布式环境中，你就越需要一种机制来保护你免受故障影响、停止运行或从先前的结果中重新开始运行。Tune\
    \ 通过为你定期创建*检查点*来实现这一点。检查点频率由 Tune 动态调整，以确保至少 95% 的时间用于运行试验，而不会将太多资源用于存储检查点。\n\n\
    在我们刚刚计算的示例中，默认使用的检查点目录或 `logdir` 的形式为 `~/ray_results/<your-objective>_<date>_<time>`。如果你知道实验的这个检查点目录，你可以很容易地像这样恢复它：\n\
    \n```python\nanalysis = tune.run(\n    objective,\n    name=\"<your-logdir>\"\

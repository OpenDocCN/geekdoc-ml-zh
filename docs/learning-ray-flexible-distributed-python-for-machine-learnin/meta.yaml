  md: '# Tuning Keras Models


    To wrap up this chapter, let''s look at a slightly more involved example. As we
    mentioned, this is not primarily a machine learning book but rather an introduction
    to Ray and its libraries. Thus we can neither introduce you to the basics of ML
    nor spend much time on introducing ML frameworks in detail. So, in this section
    we assume familiarity with Keras and its API and some basic knowledge about supervised
    learning. If you do not have these prerequisites, you should still be able to
    follow along and focus on the Ray Tune–specific parts. You can view the following
    example as a more realistic scenario of applying Tune to machine learning workloads.


    From a bird''s-eye view, we''ll take the following steps:


    +   1. Load a common dataset.

    2. Prepare it for an ML task.

    3. Define a Tune objective by creating a deep learning model with Keras that reports
    an accuracy metric to Tune.

    4. Use Tune''s Hyperopt integration to define a search algorithm that tunes a
    set of hyperparameters of our Keras model.


    The Tune workflow remains the same: we define an objective and a search space
    and then use tune.run with the configuration we want. On a high level, the process
    of using Tune with any ML framework works as shown in Figure 5-2.


    ![](img/6489687a3a178f2884963bddc928992c_137_0.png)


    To define a dataset to train on, let''s write a simple load_data utility function
    that loads the famous MNIST data that ships with Keras. MNIST consists of 28 ×
    28 pixel images of handwritten digits. We normalize the pixel values to be between
    0 and 1 and make the labels for those 10 digits categorical variables. Here''s
    how you can do this purely with Keras''s built-in functionality (make sure to
    use pip install tensorflow before running this):'
  merge: -1
  pgno: 137
- img_proc: true
  md: "```\nfrom tensorflow.keras.datasets import mnist\nfrom tensorflow.keras.utils\
    \ import to_categorical\n\ndef load_data():\n    (x_train, y_train), (x_test,\
    \ y_test) = mnist.load_data()\n    num_classes = 10\n    x_train, x_test = x_train\
    \ / 255.0, x_test / 255.0\n    y_train = to_categorical(y_train, num_classes)\n\
    \    y_test = to_categorical(y_test, num_classes)\n    return (x_train, y_train),\
    \ (x_test, y_test)\n\nload_data()\n```\n\nNote that after defining `load_data`,\
    \ we call it once so that the data gets downloaded locally. That’s because when\
    \ you call `mnist.load_data()`, it first looks for a locally cached copy. If we\
    \ didn’t load the data first, several Tune workers would try to download the data\
    \ in parallel, which can lead to problems.⁵\n\nNext, we define a Tune objective\
    \ function, or trainable, by loading the data we just defined, setting up a sequential\
    \ Keras model with hyperparameters selected from the config we pass into our objective,\
    \ and then compile and fit the model. To define our deep learning model, we first\
    \ flatten the MNIST input images to vectors and then add two fully connected layers\
    \ (called Dense in Keras) and a Dropout layer in between.\n\nThe hyperparameters\
    \ we want to tune are the activation function of the first Dense layer, the Dropout\
    \ rate, and the number of “hidden” output units of the first layer. We could tune\
    \ any other hyperparameter of this model the same way; this selection is just\
    \ an example.\n\nWe could manually report a metric of interest in the same way\
    \ we did in other examples in this chapter (e.g., by returning a dictionary in\
    \ our objective or using `tune.report(...)`). But since Tune comes with a proper\
    \ Keras integration, we can use the so-called `TuneReportCallback` as a custom\
    \ Keras callback that we pass into our model’s fit method. This is what our Keras\
    \ objective function looks like:\n\n```\nfrom tensorflow.keras.models import Sequential\n\
    from tensorflow.keras.layers import Flatten, Dense, Dropout\nfrom ray.tune.integration.keras\
    \ import TuneReportCallback\n```\n\n⁵ This can even lead to a rare condition in\
    \ which one worker starts downloading the data and another one checks for and\
    \ sees a local copy. But since the download is not complete, the second worker\
    \ will try to open a potentially corrupted file. This goes to show that, while\
    \ Ray takes care of a lot of things in the background, you still need to be mindful\
    \ about how you write your code."
  merge: -1

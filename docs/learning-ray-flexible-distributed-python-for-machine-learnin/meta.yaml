  - '[PAGE 1]


    # Learning Ray


    Get started with Ray, the open source distributed computing framework that simplifies
    the process of scaling compute-intensive Python workloads. With this practical
    book, Python programmers, data engineers, and data scientists will learn how to
    leverage Ray locally and spin up compute clusters. You’ll be able to use Ray to
    structure and run machine learning programs at scale.


    Authors Max Pumperla, Edward Oakes, and Richard Liaw show you how to build machine
    learning applications with Ray. You’ll understand how Ray fits into the current
    landscape of machine learning tools and discover how Ray continues to integrate
    ever more tightly with these tools. Distributed computation is hard, but by using
    Ray you’ll find it easy to get started.


    +   - Learn how to build your first distributed applications with Ray Core

    - Conduct hyperparameter optimization with Ray Tune

    - Use the Ray RLlib library for reinforcement learning

    - Manage distributed training with the Ray Train library

    - Use Ray to perform data processing with Ray Datasets

    - Learn how to work with Ray Clusters and serve models with Ray Serve

    - Build end-to-end machine learning applications with Ray AIR


    Max Pumperla is a data science professor, and a software engineer at Anyscale.

    Edward Oakes is a software engineer and team lead at Anyscale.

    Richard Liaw is a software engineer at Anyscale.


    > "A fantastic introduction to the Ray distributed computing framework from the
    perspective of three of its key contributors. The authors gracefully decompose
    the daunting topics of distributed computing and machine learning into a series
    of easy-to-follow examples."

    —Patrick Ames

    Principal Engineer, Amazon


    > "The definitive book on distributed systems applied to Machine Learning. This
    is an accessible introduction to building massively distributed data applications
    from the comfort of your Jupyter notebook."

    —Mark Saroufim

    Staff Applied AI Engineer, PyTorch, Meta'

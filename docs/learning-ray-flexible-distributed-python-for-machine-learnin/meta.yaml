- md: "# Learning Ray\n\nFlexible Distributed Python for Machine Learning\n\nMax Pumperla,\n\
    Edward Oakes\n& Richard Liaw\nForeword by Ion Stoica\n\n# Learning Ray\n\nGet\
    \ started with Ray, the open source distributed computing framework that simplifies\
    \ the process of scaling compute-intensive Python workloads. With this practical\
    \ book, Python programmers, data engineers, and data scientists will learn how\
    \ to leverage Ray locally and spin up compute clusters. You’ll be able to use\
    \ Ray to structure and run machine learning programs at scale.\n\nAuthors Max\
    \ Pumperla, Edward Oakes, and Richard Liaw show you how to build machine learning\
    \ applications with Ray. You’ll understand how Ray fits into the current landscape\
    \ of machine learning tools and discover how Ray continues to integrate ever more\
    \ tightly with these tools. Distributed computation is hard, but by using Ray\
    \ you’ll find it easy to get started.\n\n- Learn how to build your first distributed\
    \ applications with Ray Core\n- Conduct hyperparameter optimization with Ray Tune\n\
    - Use the Ray RLlib library for reinforcement learning\n- Manage distributed training\
    \ with the Ray Train library\n- Use Ray to perform data processing with Ray Datasets\n\
    - Learn how to work with Ray Clusters and serve models with Ray Serve\n- Build\
    \ end-to-end machine learning applications with Ray AIR\n\nMax Pumperla is a data\
    \ science professor, and a software engineer at Anyscale.\nEdward Oakes is a software\
    \ engineer and team lead at Anyscale.\nRichard Liaw is a software engineer at\
    \ Anyscale.\n\n> \"A fantastic introduction to the Ray distributed computing framework\
    \ from the perspective of three of its key contributors. The authors gracefully\
    \ decompose the daunting topics of distributed computing and machine learning\
    \ into a series of easy-to-follow examples.\"\n—Patrick Ames\nPrincipal Engineer,\
    \ Amazon\n\n> \"The definitive book on distributed systems applied to Machine\
    \ Learning. This is an accessible introduction to building massively distributed\
    \ data applications from the comfort of your Jupyter notebook.\"\n—Mark Saroufim\n\
    Staff Applied AI Engineer, PyTorch, Meta\n\n# Learning Ray\n\nFlexible Distributed\
    \ Python for Machine Learning\n\nMax Pumperla, Edward Oakes, and Richard Liaw\n\

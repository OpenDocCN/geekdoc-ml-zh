  md: "dictionary with a stopping condition. Here's how you stop running our objective\
    \ analysis after reaching a training_iteration count of 10, a built-in metric\
    \ of all Tune runs:\n\n```\ntune.run(\n    objective,\n    config=search_space,\n\
    \    stop={\"training_iteration\": 10})\n```\n\nOne of the drawbacks of specifying\
    \ a stopping condition this way is that it assumes the metric in question is *increasing*.\
    \ For instance, the score we compute starts high and is something we want to minimize.\
    \ To formulate a flexible stopping condition for our score, the best way is to\
    \ provide a stopping function as follows:\n\n```\ndef stopper(trial_id, result):\n\
    \    return result[\"score\"] < 2\n```\n\n```\ntune.run(\n    objective,\n   \
    \ config=search_space,\n    stop=stopper)\n```\n\nIn situations that require a\
    \ stopping condition with more context or explicit state, you can also define\
    \ a custom Stopper class to pass into the stop argument of your Tune run, but\
    \ we won't cover this case here.\n\n# Custom and conditional search spaces\n\n\
    The last more advanced topic we'll cover here is that of complex search spaces.\
    \ So far, we've looked only at hyperparameters that were independent of each other,\
    \ but in practice, some often depend on others. Also, while Tune's built-in search\
    \ spaces have quite a lot to offer, sometimes you want to sample parameters from\
    \ a more exotic distribution or your own modules.\n\nHere's how you can handle\
    \ both situations in Tune. Continuing with our simple objective example, let's\
    \ say that instead of Tune's tune.uniform you want to use the random.uniform sampler\
    \ from the numpy package for your weight parameter. And then your bias parameter\
    \ should be weight times a standard normal variable. Using tune.sample_from you\
    \ can tackle this situation (or more complex and nested ones) like this:\n\n```\n\
    from ray import tune\nimport numpy as np\n\nsearch_space = {\n    \"weight\":\
    \ tune.sample_from(\n        lambda context: np.random.uniform(low=0.0, high=1.0)\n\
    \    ),\n```"

    \ We pass the training_loop to the train_loop_per_worker argument of our AIR trainer\
    \ and specify the configuration for this loop by passing a dictionary with the\
    \ necessary keys to the train_loop_config.\n\nTo make things more interesting\
    \ and to showcase another Ray integration, we will log the results of our TorchTrainer\

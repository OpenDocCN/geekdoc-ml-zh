  md: 'Table 2-1. The six major API methods of Ray Core


    | API call | Description |

    | :--- | :--- |

    | ray.init() | Initializes your Ray Cluster. Pass in an address to connect to
    an existing cluster. |

    | @ray.remote | Turns functions into tasks and classes into actors. |

    | ray.put() | Puts values into Ray''s object store. |

    | ray.get() | Gets values from the object store. Returns the values you''ve put
    there or that were computed by a task or actor. |

    | .remote() | Runs actor methods or tasks on your Ray Cluster and is used to instantiate
    actors. |

    | ray.wait() | Returns two lists of object references, one with finished tasks
    we''re waiting for and one with unfinished tasks. |


    Now that you''ve seen the Ray API in action, let''s spend some time on its system
    architecture.


    # Understanding Ray System Components


    You''ve seen how the Ray API can be used and understand the design philosophy
    behind Ray. Now it''s time to get a better understanding of the underlying system
    components. In other words, how does Ray work and how does it achieve what it
    does?


    # Scheduling and Executing Work on a Node


    You know that Ray Clusters consist of nodes. We''ll first look at what happens
    on individual nodes, before we zoom out and discuss how the whole cluster interoperates.


    As we''ve already discussed, a worker node consists of several worker processes
    or simply workers. Each worker has a unique ID, an IP address, and a port by which
    they can be referenced. Workers are called “workers” for a reason; they''re components
    that blindly execute the work you give them. But who tells them what to do and
    when? A worker might be busy already, it may not have the proper resources to
    run a task (e.g., access to a GPU), and it might not even have the values it needs
    to run a given task. On top of that, workers have no knowledge of what happens
    before or after they''ve executed their workload; there''s no coordination.


    To address these issues, each worker node has a component called *Raylet*. Think
    of Raylets as the smart components of a node that manage the worker processes.
    Raylets are shared between jobs and consist of two components, a *task scheduler*
    and an *object store*.


    Let''s talk about object stores first. In the running example in this chapter,
    we''ve already used the concept of an object store loosely, without explicitly
    specifying it. Each node of a Ray Cluster is equipped with an object store, within
    that node''s'

    \ self._classifier(input_text)[0][\"label\"]\n\nscaled_deployment = SentimentAnalysis.bind()\n\
    ```\n\n使用 `serve run app:scaled_deployment` 运行我们分类器的这个新版本，并像之前一样使用 `requests`\
    \ 进行查询，你应该会看到现在有两个模型副本在处理请求！我们只需以同样的方式调整 `num_replicas`，就可以轻松扩展到数十或数百个副本：Ray 能够在单个集群中扩展到数百台机器和数千个进程。\n\
    \n在这个示例中，我们扩展到了静态数量的副本，每个副本消耗两个完整的 CPU，但 Serve 也支持更具表现力的资源分配策略。例如：\n\n- 启用部署使用\

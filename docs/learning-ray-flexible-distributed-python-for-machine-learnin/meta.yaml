    # CHAPTER 4


    # Reinforcement Learning with Ray RLlib


    In Chapter 3 you built an RL environment, a simulation to play out some games,
    an RL algorithm, and the code to parallelize the training of the algorithm—all
    completely from scratch. It’s good to know how to do all that, but in practice
    the only thing you really want to do when training RL algorithms is the first
    part, namely, specifying your custom environment, the “game” you want to play.¹
    Most of your efforts will go into selecting the right algorithm, setting it up,
    finding the best parameters for the problem, and generally focusing on training
    a well-performing policy.


    Ray RLlib is an industry-grade library for building RL algorithms at scale. You’ve
    already seen a first example of RLlib in Chapter 1, but in this chapter we’ll
    go into much more depth. The great thing about RLlib is that it’s a mature library
    for developers that comes with good abstractions to work with. As you will see,
    many of these abstractions you already know from the previous chapter.


    We start out by giving you an overview of RLlib’s capabilities. Then we quickly
    revisit the maze game from Chapter 3 and show you how to tackle it both with the
    RLlib CLI and the RLlib Python API in a few lines of code. You’ll see how easy
    RLlib is to get started before learning about its key concepts, such as RLlib
    environments and algorithms.


    We’ll also take a closer look at some advanced RL topics that are extremely useful
    in practice but are not often properly supported in other RL libraries. For instance,
    you will learn how to create a curriculum for your RL agents so that they can
    learn simple scenarios before moving on to more complex ones. You will also see
    how RLlib deals


    1 We’re using a simple game to illustrate the process of RL. There is a multitude
    of interesting industry applications of RL that are not games.'

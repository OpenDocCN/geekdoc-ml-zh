  md: "resources dedicated to a deployment in two ways: by tuning the number of *replicas*\
    \ of the deployment and tuning the resources allocated to each replica. By default,\
    \ a deployment consists of a single replica that uses a single CPU, but these\
    \ parameters can be adjusted in the `@serve.deployment` decorator (or using the\
    \ corresponding `deployment.options` API).\n\nLet's modify the `SentimentClassifier`\
    \ example to scale out to multiple replicas and adjust the resource allocation\
    \ so that each replica uses two CPUs instead of one (in practice, you would want\
    \ to profile and understand your model to set this parameter correctly). We'll\
    \ also add a print statement to log the process ID of the process handling each\
    \ request to show that the requests are now load balanced across two replicas:\n\
    \n```\napp = FastAPI()\n\n@serve.deployment(num_replicas=2, ray_actor_options={\"\
    num_cpus\": 2})\n@serve.ingress(app)\nclass SentimentAnalysis:\n    def __init__(self):\n\
    \        self._classifier = pipeline(\"sentiment-analysis\")\n\n    @app.get(\"\
    /\")\n    def classify(self, input_text: str) -> str:\n        import os\n   \
    \     print(\"from process:\", os.getpid())\n        return self._classifier(input_text)[0][\"\
    label\"]\n\nscaled_deployment = SentimentAnalysis.bind()\n```\n\nRunning this\
    \ new version of our classifier with `serve run app:scaled_deployment` and querying\
    \ it using `requests` as we did previously, you should see that there are now\
    \ two copies of the model handling requests! We could easily scale up to tens\
    \ or hundreds of replicas just by tweaking `num_replicas` in the same way: Ray\
    \ enables scaling to hundreds of machines and thousands of processes in a single\
    \ cluster.\n\nIn this example we scaled to a static number of replicas with each\
    \ replica consuming two full CPUs, but Serve also supports more expressive resource\
    \ allocation policies. For example:\n\n+   - Enabling a deployment to use GPUs\
    \ simply requires setting `num_gpus` instead of `num_cpus`. Serve supports the\
    \ same resource types as Ray Core, so deployments can also use TPUs or other custom\
    \ resources.\n- Resources can be *fractional*, allowing replicas to be efficiently\
    \ bin-packed. For example, if a single replica doesn't saturate a full GPU, you\
    \ can allocate `num_gpus=0.5` to it and multiplex with another model."

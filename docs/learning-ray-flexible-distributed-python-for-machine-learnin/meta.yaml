  md: '# Autoscaling AIR Workloads


    AIR libraries can run on autoscaling Ray Clusters that we introduced in Chapter
    9. For stateless workloads, Ray will autoscale automatically if there are queued
    tasks (or queued Dataset compute actors). For stateful workloads, Ray will autoscale
    up if there are pending placement groups (i.e., Tune trials) not yet scheduled
    in the cluster. Ray will autoscale down when nodes are idle. A node is considered
    idle when there is no resource usage on the node and also no Ray objects in memory
    or spilled on disk on the node. Since most AIR libraries leverage objects, this
    means that nodes may be kept if they are holding objects referenced by workers
    on other nodes (e.g., Dataset block used by another trial).


    You should be aware that autoscaling may result in less than ideal data balancing
    in the cluster because nodes that are started earlier naturally run more tasks
    over their lifetime. Consider limiting (e.g., starting with a certain minimum
    cluster size) or disabling autoscaling to optimize the efficiency of data-intensive
    workloads.


    # Summary


    In this chapter you’ve seen how all the Ray libraries we’ve introduced come together
    to form the Ray AI Runtime. You’ve learned about all the key concepts that allow
    you to build scalable ML projects, from experimentation to production. In particular,
    you’ve seen how Ray Datasets are used for stateless computations such as feature
    preprocessing, and how Ray Train, Tune, and RLib are used for stateful computations
    such as model training. Seamlessly combining these types of computations in complex
    AI workloads and scaling them out to large clusters is a key strength of AIR.
    Deploying your AIR projects comes essentially for free, as AIR fully integrates
    with Ray Serve as well.


    In Chapter 11 we’ll show you how Ray, and particularly AIR, fits into the broader
    landscape of related tools. Knowing the rich set of integrations and extensions
    of Ray’s ecosystem will help you understand how to leverage Ray in your own projects.'

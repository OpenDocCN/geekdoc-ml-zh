    The actual results of this hyperparameter run are not very interesting because
    the problem is easy to solve (most runs will return the optimum of eight steps,
    regardless of the hyperparameters chosen). What’s more interesting here is how
    easy it is to parallelize the objective function with Ray. In fact, we’d like
    to encourage you to rewrite the preceding example to simply loop through the search
    space and call the objective function for each sample, just to confirm how painfully
    slow such a serial loop can be.


    Conceptually, the three steps we took to run that example are representative of
    how hyperparameter tuning works in general. First, you define a search space,
    then you define an objective function, and finally you run an analysis to find
    the best hyperparameters. In HPO it is common to speak of one evaluation of the
    objective function per hyperparameter sample as a *trial*, and all trials form
    the basis for your analysis. How parameters are sampled from the search space
    (in our case, randomly) is up to a *search algorithm* to decide. In practice,
    finding good hyperparameters is easier said than done, so let’s have a closer
    look at why this problem is so hard.


    # Why Is HPO Hard?


    If you zoom out from the previous example, you can see several intricacies involved
    in making the process of hyperparameter tuning work well. Here’s a quick overview
    of the most important ones:


    +   - Your search space can be composed of a large number of hyperparameters.
    These parameters might have different data types and ranges. Some parameters might
    be correlated or even depend on others. Sampling good candidates from complex,
    high-dimensional spaces is a difficult task.

    - Picking parameters at random can work surprisingly well, but it’s not always
    the best option. In general, you need to test more complex search algorithms to
    find the best parameters.

    - In particular, even if you parallelize your hyperparameter search like we just
    did, a single run of your objective function can take a long time to complete.
    That means you can’t afford to run too many searches overall. For instance, training
    neural networks can take hours to complete, so your hyperparameter search needs
    to be efficient.'

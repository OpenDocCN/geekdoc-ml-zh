    \    metric=\"score\",\n    mode=\"min\",\n    search_alg=algo,\n    stop={\"\
    training_iteration\": 10},\n)\n```\n\nNote that we “warm start” our Bayesian optimization\
    \ with four random steps at the beginning, and we explicitly stop the trial runs\
    \ after 10 training iterations.\n\nBecause we’re not just randomly selecting parameters\
    \ with BayesOptSearch: the search_alg we use in our Tune run needs to know which\
    \ metric to optimize for and whether to minimize or optimize this metric. As we’ve\
    \ argued before, we want to achieve a “min” “score”.\n\n# Schedulers\n\nNext,\
    \ let’s discuss how to use *trial schedulers* in Tune to make your runs more efficient.\
    \ We also use this section to introduce a slightly different way to report your\
    \ metrics to Tune within an objective function.\n\nSo let’s say that instead of\
    \ computing a score straight-up, like we did in the previous examples, we compute\
    \ an *intermediate score* in a loop. This is a situation that often occurs in\
    \ supervised machine learning scenarios, when training a model for several iterations\
    \ (we’ll see concrete applications of this in “Machine Learning with Tune” on\
    \ page 115). With good hyperparameter choices selected, this immediate score might\
    \ stagnate way before the loop in which it is computed. In other words, if we’re\
    \ not seeing enough incremental changes, why not stop the trial early? This is\
    \ exactly one of the cases Tune’s schedulers are built for.\n\nHere’s a quick\
    \ example of such an objective function. This is a toy example, but it will help\
    \ us think about the optimal hyperparameters we want Tune to find more easily\
    \ than if we started with a complex example:\n\n```\ndef objective(config):\n\
    \    for step in range(30):  # ①\n        score = config[\"weight\"] * (step **\
    \ 0.5) + config[\"bias\"]\n        tune.report(score=score)  # ②\n\nsearch_space\
    \ = {\"weight\": tune.uniform(0, 1), \"bias\": tune.uniform(0, 1)}\n```\n\n+ \
    \  1. Often you may want to compute intermediate scores, e.g., in a “training\
    \ loop.”\n2. You can use tune.report to let Tune know about these intermediate\
    \ scores."
  - "[PAGE 131]\n\nThe score we want to minimize here is the square root of a positive\
    \ number times a weight, plus adding a bias term. It's clear that both of these\
    \ hyperparameters need to be as small as possible to minimize the score for any\
    \ positive x. Given that the square root function “flattens out,” we might not\
    \ have to compute all 30 passes through the loop to find sufficiently good values\
    \ for our two hyperparameters. If each score computation took an hour, stopping\
    \ early could be a huge boost in making your experiments run quicker.\n\nLet's\
    \ illustrate this idea by using the popular Hyperband algorithm as our trial scheduler.\
    \ This scheduler needs to be passed a metric and mode (again, we minimize our\
    \ score). We also make sure to run for 10 samples so as not to stop prematurely:\n\
    \n```\nfrom ray.tune.schedulers import HyperBandScheduler\n\nscheduler = HyperBandScheduler(metric=\"\
    score\", mode=\"min\")\n\nanalysis = tune.run(\n    objective,\n    config=search_space,\n\
    \    scheduler=scheduler,\n    num_samples=10,\n)\n\nprint(analysis.get_best_config(metric=\"\
    score\", mode=\"min\"))\n```\n\nNote that in this case we did not specify a search\
    \ algorithm, which means that Hyperband will run on parameters selected by random\
    \ search. We also could have *combined* this scheduler with another search algorithm\
    \ instead. This would have allowed us to pick better trial hyperparameters and\
    \ stop bad trials early. However, note that not every scheduler can be combined\
    \ with search algorithms. Check [Tune's scheduler compatibility matrix](https://docs.ray.io/en/latest/tune/tutorials/tune-scheduler.html)\
    \ for more information.\n\nTo wrap up this discussion, apart from Hyperband, Tune\
    \ includes distributed implementations of early stopping algorithms such as the\
    \ Median Stopping Rule, ASHA, Population Based Training (PBT), and Population\
    \ Based Bandits (PB2).\n\n# Configuring and Running Tune\n\nBefore looking into\
    \ more concrete machine learning examples using Ray Tune, let's dive into some\
    \ useful topics that help you get more out of your Tune experiments, such as properly\
    \ utilizing resources, stopping and resuming trials, adding callbacks to your\
    \ Tune runs, or defining custom and conditional search spaces."
- md: "## Specifying resources\n\nBy default, each Tune trial will run on one CPU\
    \ and leverage as many CPUs as available for concurrent trials. For instance,\
    \ if you run Tune on a laptop with 8 CPUs, any of the experiments computed so\
    \ far in this chapter will spawn eight concurrent trials and allocate one CPU\
    \ for each trial. Changing this behavior can be controlled using the `resources_per_trial`\
    \ argument of a Tune run.\n\nYou can also determine the number of GPUs used per\
    \ trial. Plus, Tune allows you to use *fractional resources*; i.e., you can share\
    \ resources between trials. So, let's say that you have a machine with 12 CPUs\
    \ and 2 GPUs and you request the following resources for your objective:\n\n```python\n\
    from ray import tune\n\ntune.run(\n    objective,\n    config=search_space,\n\
    \    num_samples=10,\n    resources_per_trial={\"cpu\": 2, \"gpu\": 0.5}\n)\n\
    ```\n\nThat means Tune can schedule and execute up to four concurrent trials on\
    \ your machine, as this would max out GPU utilization on this machine (while you'd\
    \ still have four idle CPUs for other tasks). If you want, you can also specify\
    \ the amount of \"memory\" used by a trial by passing the number of bytes into\
    \ `resources_per_trial`. Also note that should you need to explicitly *restrict*\
    \ the number of concurrent trials, you can do so by passing in the `max_concurrent_trials`\
    \ parameter to your `tune.run(...)`. In the preceding example, if you want to\
    \ always keep one GPU available for other tasks, you can limit the number of concurrent\
    \ trials to two by setting `max_concurrent_trials = 2`.\n\nNote that everything\
    \ we just exemplified for resources on a single machine naturally extends to any\
    \ Ray Cluster and its available resources. In any case, Ray will always try to\
    \ schedule the next trials, but it will wait and ensure enough resources are available\
    \ before executing them.\n\n## Callbacks and metrics\n\nIf you've spent some time\
    \ investigating the outputs of the Tune runs we've started in this chapter so\
    \ far, you'll have noticed that each trial comes equipped with a lot of information\
    \ by default, such as the trial ID, its execution date, and much more. What's\
    \ interesting is that Tune not only allows you to customize the metrics you want\
    \ to report, you can also hook into a `tune.run` by providing *callbacks*. Let's\
    \ compute a quick, representative example that does both.\n\nSlightly modifying\
    \ a previous example, let's say we want to log a specific message whenever a trial\
    \ returns a result. To do so, all you need to do is implement the `on_trial_result`\
    \ method on a Callback object from the `ray.tune` package.³ Here's how that would\
    \ look for an objective function that reports a score:\n\n```python\nfrom ray\
    \ import tune\nfrom ray.tune import Callback\nfrom ray.tune.logger import pretty_print\n\
    \nclass PrintResultCallback(Callback):\n    def on_trial_result(self, iteration,\
    \ trials, trial, result, **info):\n        print(f\"Trial {trial} in iteration\
    \ {iteration}, \"\n              f\"got result: {result['score']}\")\n\ndef objective(config):\n\
    \    for step in range(30):\n        score = config[\"weight\"] * (step ** 0.5)\
    \ + config[\"bias\"]\n        tune.report(score=score, step=step, more_metrics={})\n\
    ```\n\nNote that, apart from the score, we also report `step` and `more_metrics`\
    \ to Tune. In fact, you could expose any other metric you'd like to track there,\
    \ and Tune would add it to its trial metrics. Here's how you'd run a Tune experiment\
    \ with our custom callback and print the custom metrics we just defined:\n\n```python\n\
    search_space = {\"weight\": tune.uniform(0, 1), \"bias\": tune.uniform(0, 1)}\n\
    \nanalysis = tune.run(\n    objective,\n    config=search_space,\n    mode=\"\
    min\",\n    metric=\"score\",\n    callbacks=[PrintResultCallback()])\n\nbest\
    \ = analysis.best_trial\nprint(pretty_print(best.last_result))\n```\n\nRunning\
    \ this code will result in the following outputs (additional to what you'll see\
    \ in any other Tune run). Note that we need to specify `mode` and `metric` explicitly\
    \ here so that Tune knows what we mean by `best_result`. First, you should see\
    \ the output of our callback, while the trials are running:\n\n```\n...\nTrial\
    \ objective_85955_00000 in iteration 57, got result: 1.5379782083952644\nTrial\
    \ objective_85955_00000 in iteration 58, got result: 1.5539087627537493\nTrial\
    \ objective_85955_00000 in iteration 59, got result: 1.569535794562848\nTrial\
    \ objective_85955_00000 in iteration 60, got result: 1.5848760187255326\nTrial\
    \ objective_85955_00000 in iteration 61, got result: 1.5999446700996236\n...\n\
    ```\n\nThen, at the very end of the program, we print the metrics of the best\
    \ available trial, which includes the three custom metrics we defined. The following\
    \ output omits some default metrics to make it more readable. We recommend that\
    \ you run an example like this on your own, in particular to get used to reading\
    \ the outputs of Tune trials (which can be a bit overwhelming due to their concurrent\
    \ nature):\n\n```\nResult logdir: /Users/maxpumperla/ray_results/objective_2022-05-23_15-52-01\n\
    ...\ndone: true\nexperiment_id: ea5d89c2018f483183a005a1b5d47302\nexperiment_tag:\
    \ 0_bias=0.73356,weight=0.16088\nhostname: mac\niterations_since_restore: 30\n\
    more_metrics: {}\nscore: 1.5999446700996236\nstep: 29\ntrial_id: '85955_00000'\n\
    ...\n```\n\nWe used `on_trial_result` as an example of a method to implement a\
    \ custom Tune Callback, but you have many other useful options that are relatively\
    \ self-explanatory. It's not very helpful to list them all here, but some particularly\
    \ useful callback methods are `on_trial_start`, `on_trial_error`, `on_experiment_end`,\
    \ and `on_checkpoint`. The latter hints at an important aspect of Tune runs that\
    \ we'll discuss next.\n\n³ If you want to learn more about how to use callbacks\
    \ in Tune or create your own callbacks, check out the user guide on callbacks\
    \ and metrics in Tune.\n\n## Checkpoints, stopping, and resuming\n\nThe more Tune\
    \ trials you kick off and the longer they each run individually, especially in\
    \ a distributed setting, the more you need a mechanism to protect you against\
    \ failures, stop a run, or pick a run up again from previous results. Tune makes\
    \ this possible by periodically creating *checkpoints* for you. The checkpoint\
    \ cadence is dynamically adjusted by Tune to ensure at least 95% of the time is\
    \ spent on running trials, and not too many resources are devoted to storing checkpoints.\n\
    \nIn the example we just computed, the checkpoint directory, or `logdir`, used\
    \ by default is of the form `~/ray_results/<your-objective>_<date>_<time>`. If\
    \ you know this checkpoint directory of your experiment, you can easily resume\
    \ it like so:\n\n```python\nanalysis = tune.run(\n    objective,\n    name=\"\
    <your-logdir>\",\n    resume=True,\n    config=search_space)\n```\n\nSimilarly,\
    \ you can *stop* your trials by defining stopping conditions and explicitly passing\
    \ them to your `tune.run`. The easiest option for doing that is by providing a\

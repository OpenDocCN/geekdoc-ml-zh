- md: "## CHAPTER 4\n\n## Reinforcement Learning with Ray RLlib\n\nIn Chapter 3 you\
    \ built an RL environment, a simulation to play out some games, an RL algorithm,\
    \ and the code to parallelize the training of the algorithm—all completely from\
    \ scratch. It’s good to know how to do all that, but in practice the only thing\
    \ you really want to do when training RL algorithms is the first part, namely,\
    \ specifying your custom environment, the “game” you want to play.¹ Most of your\
    \ efforts will go into selecting the right algorithm, setting it up, finding the\
    \ best parameters for the problem, and generally focusing on training a well-performing\
    \ policy.\n\nRay RLlib is an industry-grade library for building RL algorithms\
    \ at scale. You’ve already seen a first example of RLlib in Chapter 1, but in\
    \ this chapter we’ll go into much more depth. The great thing about RLlib is that\
    \ it’s a mature library for developers that comes with good abstractions to work\
    \ with. As you will see, many of these abstractions you already know from the\
    \ previous chapter.\n\nWe start out by giving you an overview of RLlib’s capabilities.\
    \ Then we quickly revisit the maze game from Chapter 3 and show you how to tackle\
    \ it both with the RLlib CLI and the RLlib Python API in a few lines of code.\
    \ You’ll see how easy RLlib is to get started before learning about its key concepts,\
    \ such as RLlib environments and algorithms.\n\nWe’ll also take a closer look\
    \ at some advanced RL topics that are extremely useful in practice but are not\
    \ often properly supported in other RL libraries. For instance, you will learn\
    \ how to create a curriculum for your RL agents so that they can learn simple\
    \ scenarios before moving on to more complex ones. You will also see how RLlib\
    \ deals with having multiple agents in a single environment and how to leverage\
    \ experience data that you’ve collected outside your current application to improve\
    \ your agent’s performance.\n\n¹ We’re using a simple game to illustrate the process\
    \ of RL. There is a multitude of interesting industry applications of RL that\
    \ are not games.\n\n## An Overview of RLlib\n\nBefore we dive into any examples,\
    \ let’s quickly discuss what RLlib is and what it can do. As part of the Ray ecosystem,\
    \ RLlib inherits all the performance and scalability benefits of Ray. In particular,\
    \ RLlib is distributed by default, so you can scale your RL training to as many\
    \ nodes as you want.\n\nAnother benefit of being built on top of Ray is that RLlib\
    \ integrates tightly with other Ray libraries. For instance, the hyperparameters\
    \ of any RLlib algorithm can be tuned with Ray Tune, as we will see in Chapter\
    \ 5. You can also seamlessly deploy your RLlib models with Ray Serve.²\n\nWhat’s\
    \ extremely useful is that RLlib works with both of the predominant deep learning\
    \ frameworks at the time of this writing: PyTorch and TensorFlow. You can use\
    \ either one of them as your backend and can easily switch between them, often\
    \ by changing just one line of code. That’s a huge benefit, as companies are often\
    \ locked into their underlying deep learning framework and can’t afford to switch\
    \ to another system and rewrite their code.\n\nRLlib also has a track record of\
    \ solving real-world problems and is a mature library used by many companies to\
    \ bring their RL workloads to production. The RLlib API appeals to many engineers,\
    \ as it offers the right level of abstraction for many applications while still\
    \ being flexible enough to be extended.\n\nApart from these more general benefits,\
    \ RLlib has a lot of RL-specific features that we will cover in this chapter.\
    \ In fact, RLlib is so feature rich that it would deserve a book on its own, which\
    \ means we can touch on just some aspects of it here. For instance, RLlib has\
    \ a rich library of advanced RL algorithms to choose from. In this chapter we\
    \ will focus on a few select ones, but you can track the growing list of options\
    \ on the RLlib algorithms page. RLlib also has many options for specifying RL\
    \ environments and is very flexible in handling them during training; for an overview\
    \ of RLlib environments see the documentation.\n\n² We don’t cover this integration\
    \ in this book, but you can learn more about deploying RLlib models in the “Serving\
    \ RLlib Models” tutorial in the Ray documentation.\n\n## Getting Started with\
    \ RLlib\n\nTo use RLlib, make sure you have installed it on your computer:\n\n\
    ```\npip install \"ray[rllib]==2.2.0\"\n```\n\nCheck out the accompanying notebook\
    \ for this chapter if you don't feel like typing the code yourself.\n\nEvery RL\
    \ problem starts with having an interesting environment to investigate. In Chapter\
    \ 1 we looked at the classical cart-pole balancing problem. Recall that we didn't\
    \ implement this cart-pole environment; it came out of the box with RLlib.\n\n\
    In contrast, in Chapter 3 we implemented a simple maze game on our own. The problem\
    \ with this implementation is that we can't directly use it with RLlib or any\
    \ other RL library for that matter. The reason is that in RL you have ubiquitous\
    \ standards, and our environments need to implement certain interfaces. The best\
    \ known and most widely used library for RL environments is gym, an open source\
    \ Python project from OpenAI.\n\nLet's have a look at what Gym is and how to convert\
    \ our maze Environment from the previous chapter to a Gym environment compatible\
    \ with RLlib.\n\n## Building a Gym Environment\n\nIf you look at the well-documented\
    \ and easy-to-read gym.Env environment interface on GitHub, you'll notice that\
    \ an implementation of this interface has two mandatory class variables and three\
    \ methods that subclasses need to implement. You don't have to check the source\
    \ code, but we do encourage you to have a look. You might just be surprised by\
    \ how much you already know about these environments.\n\nIn short, the interface\
    \ of a Gym environment looks like the following pseudocode:\n\n```\nimport gym\n\
    \nclass Env:\n    action_space: gym.spaces.Space\n    observation_space: gym.spaces.Space\
    \  # 1\n\n    def step(self, action):  # 2\n        ...\n\n    def reset(self):\
    \  # 3\n        ...\n\n    def render(self, mode=\"human\"):\n        ...\n```\n\
    \n1. The gym.Env interface has an action and an observation space.\n2. The Env\
    \ can run a step and returns a tuple of observations, reward, done condition,\
    \ and further info.\n3. An Env can reset itself, which will return the initial\
    \ observations of a new episode.\n4. We can render an Env for different purposes,\
    \ such as for human display or as a string representation.\n\nYou'll recall from\
    \ Chapter 3 that this is very similar to the interface of the maze Environment\
    \ we built there. In fact, Gym has a so-called Discrete space implemented in gym.spaces,\
    \ which means we can make our maze Environment a gym.Env as follows. We assume\
    \ that you store this code in a file called maze_gym_env.py and that the code\
    \ for the Environment from Chapter 3 is located at the top of that file (or is\
    \ imported there):\n\n```\n# maze_gym_env.py | Original definition of Environment\
    \ goes at the top.\n\nimport gym\nfrom gym.spaces import Discrete ①\n\nclass GymEnvironment(Environment,\
    \ gym.Env): ②\n    def __init__(self, *args, **kwargs):\n        \"\"\"Make our\
    \ original Environment a gym `Env`.\"\"\"\n        super().__init__(*args, **kwargs)\n\
    \ngym_env = GymEnvironment()\n```\n\n1. Replace our own Discrete implementation\

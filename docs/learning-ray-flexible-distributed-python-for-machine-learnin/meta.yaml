    \n² 在底层，Ray Serve 会序列化用户提供的 FastAPI 应用对象。然后，当每个部署副本运行时，Ray Serve 会以与在典型 Web 服务器中运行相同的方式反序列化并运行该\
    \ FastAPI 应用。在运行时，每个 Ray Serve 副本中都会有一个独立的 FastAPI 服务器在运行。\n\n## 扩展与资源分配\n\n如前所述，机器学习模型通常非常消耗计算资源。因此，能够为你的\
    \ ML 应用分配正确数量的资源以处理请求负载，同时最小化成本，这一点非常重要。Ray Serve 允许你通过两种方式调整分配给部署的资源：调整部署的*副本*数量，以及调整分配给每个副本的资源。默认情况下，一个部署由一个使用单个\

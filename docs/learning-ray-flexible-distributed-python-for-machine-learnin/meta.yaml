    as “computer scientists.”<sup>12</sup>


    In broad strokes, doing data science is an iterative process that entails requirements
    engineering, data collection and processing, building models and evaluating them,
    and deploying solutions. Machine learning is not necessarily part of this process
    but often is. If ML is involved, you can further specify some steps:


    *Data processing*

    To train ML models, you need data in a format that your ML model understands.
    The process of transforming and selecting what data should be fed into your model
    is often called *feature engineering*. This step can be messy. You’ll benefit
    a lot if you can rely on common tools to do the job.


    *Model training*

    In ML you need to train your algorithms on data that got processed in the previous
    step. This includes selecting the right algorithm for the job, and it helps if
    you can choose from a wide variety.


    *Hyperparameter tuning*

    Machine learning models have parameters that are tuned in the model training step.
    Most ML models also have another set of parameters called *hyperparameters* that
    can be modified prior to training. These parameters can heavily influence the
    performance of your resulting ML model and need to be tuned properly. There are
    good tools to help automate that process.


    *Model serving*

    Trained models need to be deployed. To serve a model means to make it available
    to whomever needs access by whatever means necessary. In prototypes, you often
    use simple HTTP servers, but there are many specialized software packages for
    ML model serving.


    This list is by no means exhaustive, and there’s a lot more to be said about building
    ML applications.<sup>13</sup> However, it is true that these four steps are crucial
    for the success of a data science project using ML.


    Ray has dedicated libraries for each of the four ML-specific steps we just listed.
    Specifically, you can take care of your data processing needs with *Ray Datasets*,
    run distributed model training with *Ray Train*, run your reinforcement learning



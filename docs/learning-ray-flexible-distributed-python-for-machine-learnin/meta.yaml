    # CHAPTER 3


    # Building Your First Distributed Application


    Now that you’ve seen the basics of the Ray API in action, let’s build something
    more realistic with it. By the end of this chapter, you will have built a reinforcement
    learning (RL) problem from scratch, implemented your first algorithm to tackle
    it, and used Ray tasks and actors to parallelize this solution to a local cluster—all
    in less than 250 lines of code.


    This chapter is designed to work for readers who don’t have any experience with
    RL. We’ll work on a straightforward problem and develop the necessary skills to
    tackle it hands-on. Since Chapter 4 is devoted entirely to this topic, we’ll skip
    all advanced RL topics and language and just focus on the problem at hand. But
    even if you’re a quite advanced RL user, you’ll likely benefit from implementing
    a classic algorithm in a distributed setting.


    This is the last chapter working *only* with Ray Core. We hope you learn to appreciate
    how powerful and flexible it is and how quickly you can implement distributed
    experiments that would otherwise take considerable efforts to scale.


    Before we jump into any implementation, let’s quickly talk about the paradigm
    of RL in a bit more detail. Feel free to skip this section if you’ve worked with
    RL before.


    # Introducing Reinforcement Learning


    One of my (Max’s) favorite mobile apps can automatically classify or “label” individual
    plants in our garden. The app works by simply showing it a picture of the plant
    in question. That’s immensely helpful; I’m terrible at distinguishing them. (I’m
    not bragging about the size of my garden; I’m just bad at it.) In the last couple
    of years we’ve seen a surge of impressive applications similar to this one.'
  - '[PAGE 71]


    Ultimately, the promise of AI is to build intelligent agents that go far beyond
    classifying objects. Imagine an AI application that not only knows your plants
    but can take care of them too. Such an application would have to do the following:


    +   - Operate in dynamic environments (like the change of seasons)

    - React to changes in the environment (like a heavy storm or pests)

    - Take sequences of actions (like watering and fertilizing plants)

    - Accomplish long-term goals (like prioritizing plant health)


    By observing its environment, such an AI would also learn to explore the possible
    actions it could take and come up with better solutions over time. If you feel
    like this example is artificial or too far out, it’s not difficult to come up
    with examples on your own that share all these requirements. Think of managing
    and optimizing a supply chain, strategically restocking a warehouse considering
    fluctuating demands, or orchestrating the processing steps in an assembly line.
    Another famous example of what you could expect from AI is Stephen Wozniak’s famous
    “Coffee Test”: if you’re invited to a friend’s house, you can navigate to the
    kitchen, spot the coffee machine and all necessary ingredients, figure out how
    to brew a cup of coffee, and sit down to enjoy it. A machine should be able to
    do the same, except the last part might be a bit of a stretch. What other examples
    can you think of?


    You can frame all the requirements naturally in RL, a subfield of machine learning.¹
    For now, it’s enough to understand that RL is about agents interacting with their
    environment by observing it and emitting actions. In RL, agents evaluate their
    environments by attributing a reward (e.g., how healthy is my plant on a linear
    scale). The term “reinforcement” comes from the fact that agents will ideally
    learn to seek behavior that leads to good outcomes (high reward) and shy away
    from punishing situations (low or negative reward).


    The interaction of agents with their environment is usually modeled by creating
    a computer simulation of it (although sometimes that’s not feasible). So, let’s
    build an example of such a simulation with agents acting in their environments
    to give you an idea of what this looks like in practice.


    # Setting Up a Simple Maze Problem


    As with the previous chapters, we encourage you to code this chapter and build
    this application as we go. If you don’t want to do that, you can simply follow
    [the notebook for this chapter](the notebook for this chapter).


    > ¹ We don’t yet have gardening robots, and we don’t know which AI paradigm will
    get us there. RL isn’t necessarily the answer; it is just a paradigm that naturally
    fits into this specific discussion of AI goals.'

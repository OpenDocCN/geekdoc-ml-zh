    # CHAPTER 9


    # Ray Clusters


    Richard Liaw


    So far we have focused on teaching you the basics of Ray for building machine
    learning applications. You know how to parallelize your Python code with Ray Core
    and run reinforcement learning experiments with RLlib. You’ve also seen how to
    preprocess data with Ray Datasets, tune hyperparameters with Ray Tune, and train
    models with Ray Train. But one of the key features that Ray brings is the ability
    to scale out seamlessly onto multiple machines. Outside a lab environment or a
    big tech company, it may be difficult set up multiple machines and join them into
    a single Ray Cluster. This chapter is all about how to do that.¹


    Cloud technology has commoditized access to cheap machines for anyone. But it
    is often quite difficult to figure out the right APIs to handle the cloud provider
    tools. The Ray team has provided a couple of tools that abstract the complexity
    away. There are three primary ways of launching or deploying a Ray Cluster. You
    can do so manually, via a Kubernetes operator, or via the cluster launcher CLI
    tool.


    In the first part of this chapter we’ll cover these three methods in detail.²
    We only briefly explain manual cluster creation and the cluster launcher CLI,
    and we spend most of our time explaining how to use the Kubernetes operator. After
    that, we’ll cover how to run Ray Clusters on the cloud and how to autoscale them
    up and down.


    1 Ray itself is not opinionated about how you set up your cluster. In fact, you
    have many options, many of which are described in this chapter. Apart from the
    open source solutions we’re describing here, there are also fully managed commercial
    solutions available, such as those offered by Anyscale or Domino Data Lab.


    2 While this chapter technically has an accompanying notebook, the material presented
    here is not well-suited for development in an interactive Python session. We recommend
    that you work through these examples on the command line. No matter where you
    decide to work, make sure to have Ray installed with `pip install "ray==2.2.0"`.'

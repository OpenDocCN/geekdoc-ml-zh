    \ way: Ray enables scaling to hundreds of machines and thousands of processes\
    \ in a single cluster.\n\nIn this example we scaled to a static number of replicas\
    \ with each replica consuming two full CPUs, but Serve also supports more expressive\
    \ resource allocation policies. For example:\n\n- Enabling a deployment to use\
    \ GPUs simply requires setting `num_gpus` instead of `num_cpus`. Serve supports\
    \ the same resource types as Ray Core, so deployments can also use TPUs or other\
    \ custom resources.\n- Resources can be *fractional*, allowing replicas to be\
    \ efficiently bin-packed. For example, if a single replica doesn't saturate a\
    \ full GPU, you can allocate `num_gpus=0.5` to it and multiplex with another model.\n\
    - For applications with varying request load, a deployment can be configured to\

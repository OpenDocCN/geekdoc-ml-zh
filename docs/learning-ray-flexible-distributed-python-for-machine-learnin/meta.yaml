    with many of the most popular processing libraries, such as NumPy and Pandas,
    out of the box.


    A Ray Dataset consists of a list of Ray object references, each of which points
    at a “block” of data. These blocks are either Arrow tables or Python lists (for
    data that isn’t supported by the Arrow format) in Ray’s shared memory object store,
    and the'
  - '[PAGE 144]


    compute over the data such as for map or filter operations happens in Ray tasks
    (and sometimes actors).


    Because Ray Datasets relies on the core Ray primitives of tasks and objects in
    the shared memory object store, it inherits key benefits of Ray: scalability to
    hundreds of nodes, efficient memory usage due to sharing memory across processes
    on the same node, as well as object spilling and recovery to gracefully handle
    failures. Additionally, because Datasets are just lists of object references,
    they can also be passed between tasks and actors efficiently without needing to
    make a copy of the data, which is crucial for making data-intensive applications
    and libraries scalable.


    # Ray Datasets Basics


    This section will give an overview of Ray Datasets, covering how to get started
    reading, writing, and transforming datasets. This is not a comprehensive reference
    but rather an introduction to the basic concepts so we can build up to some interesting
    examples later, showing what makes Ray Datasets powerful. For up-to-date information
    on what’s supported and exact syntax, see the [Ray Datasets documentation](https://docs.ray.io/en/latest/data/dataset.html).


    To follow along with the examples in this section, make sure Ray Datasets is installed
    locally:


    ```

    pip install "ray[data]==2.2.0"

    ```


    # Creating a Ray Dataset


    First, let’s create a simple Dataset and perform some basic operations on it:


    ```

    import ray


    # Create a dataset containing integers in the range [0, 10000).

    ds = ray.data.range(10000)


    # Basic operations: show the size of the dataset, get a few samples,

    # print the schema.

    print(ds.count())  # -> 10000

    print(ds.take(5))  # -> [0, 1, 2, 3, 4]

    print(ds.schema())  # -> <class ''int''>

    ```


    Here we created a Dataset containing the numbers from 0 to 10,000 and then printed
    some basic information about it: the total number of records, a few samples, and
    the schema.


    # Reading from and writing to storage


    Of course, for real workloads you’ll often want to read from and write to persistent
    storage to load your data and write the results. Writing and reading Ray Datasets
    is simple; for example, to write a Dataset to a CSV file and then load it back
    into memory, we just need to use the built-in `write_csv` and `read_csv` utilities:'
  - '[PAGE 145]


    ```

    # Save the dataset to a local file and load it back.

    ray.data.range(10000).write_csv("local_dir")

    ds = ray.data.read_csv("local_dir")

    print(ds.count())

    ```


    Datasets supports a number of common serialization formats such as CSV, JSON,
    and Parquet and can read from or write to local disk as well as remote storage
    like HDFS or AWS S3.


    In the preceding example, we provided just a local file path ("local_dir") so
    the dataset was written to a directory on the local machine. If we wanted to write
    to and read from S3 instead, we would provide a path like "s3://my_bucket/" and
    Datasets would automatically handle efficiently reading and writing remote storage,
    parallelizing the requests across many tasks to improve throughput.


    Note that Ray Datasets also supports custom data sources that you can use to write
    to any external data storage system that isn''t supported out of the box.


    # Built-in transformations


    Now that we understand the basic APIs around how to create and inspect Datasets,
    let''s take a look at some of the built-in operations we can do on them. The following
    code sample shows three basic operations that Ray Datasets supports:


    ```

    ds1 = ray.data.range(10000)

    ds2 = ray.data.range(10000)

    ds3 = ds1.union(ds2) ①

    print(ds3.count())  # -> 20000


    # Filter the combined dataset to only the even elements.

    ds3 = ds3.filter(lambda x: x % 2 == 0) ②

    print(ds3.count())  # -> 10000

    print(ds3.take(5))  # -> [0, 2, 4, 6, 8]


    # Sort the filtered dataset.

    ds3 = ds3.sort() ③

    print(ds3.take(5))  # -> [0, 0, 2, 2, 4]

    ```


    +   ① union two Datasets together. The result is a new Dataset that contains all
    the records of both.

    ② filter the elements of a Dataset to include only even integers by providing
    a custom filter function.


    > 1 If you''re interested in following an example that reads actual data from
    an S3 bucket, see the Batch Inference example in Ray''s documentation.'
- md: "## Blocks and repartitioning\n\nOne important thing to keep in mind when using\
    \ Ray Datasets is the concept of *blocks*. Blocks are the underlying chunks of\
    \ data that make up a Dataset; operations are applied to the underlying data one\
    \ block at a time. If the number of blocks in a Dataset is too high, each block\
    \ will be small, and there will be a lot of overhead for each operation. If the\
    \ number of blocks is too small, operations won't be able to be parallelized as\
    \ efficiently.\n\nIf we take a peek under the hood of the previous example, we\
    \ can see that the initial datasets we created each had 200 blocks by default.\
    \ When we combined them, the resulting Dataset had 400 blocks. Given that the\
    \ number of blocks is important for efficiency, we may want to reshuffle the data\
    \ to match our original 200 blocks and retain the same parallelism. This process\
    \ of changing the number of blocks is called *repartitioning*, and Ray Datasets\
    \ offers a simple `.repartition(num_blocks)` API to achieve it. Let's use the\
    \ API to repartition our resulting dataset back into 200 blocks:\n\n```\nds1 =\
    \ ray.data.range(10000)\nprint(ds1.num_blocks())  # -> 200\nds2 = ray.data.range(10000)\n\
    print(ds2.num_blocks())  # -> 200\nds3 = ds1.union(ds2)\nprint(ds3.num_blocks())\
    \  # -> 400\n\nprint(ds3.repartition(200).num_blocks())  # -> 200\n```\n\nBlocks\
    \ also control the number of files that are created when we write a Dataset to\
    \ storage (so if you want all of the data to be coalesced into a single output\
    \ file, you should call `.repartition(1)` before writing it).\n\n## Schemas and\
    \ data formats\n\nTo this point, we've been operating on simple Ray Datasets made\
    \ up only of integers. However, for more complex data processing we often want\
    \ to have a schema, allowing us to more easily comprehend the data and enforce\
    \ types on each column.\n\nGiven that Datasets are meant to be the point of interoperation\
    \ for applications and libraries on Ray, they are designed to be agnostic to a\
    \ specific datatype and offer flexibility to read, write, and convert between\
    \ many popular data formats. Datasets support Arrow's columnar format, which enables\
    \ converting between different types of structured data such as Python dictionaries,\
    \ DataFrames, and serialized Parquet files.\n\nThe simplest way to create a Dataset\
    \ with a schema is to create it from a list of Python dictionaries:\n\n```\nds\
    \ = ray.data.from_items([{\"id\": \"abc\", \"value\": 1}, {\"id\": \"def\", \"\
    value\": 2}])\nprint(ds.schema())  # -> id: string, value: int64\n```\n\nIn this\
    \ case, the schema was inferred from the keys in the dictionaries we passed in.\
    \ We can also convert to/from data types from popular libraries such as Pandas:\n\
    \n```\npandas_df = ds.to_pandas()  # pandas_df will inherit the schema from our\
    \ Dataset.\n```\n\nHere we went from a Dataset to a Pandas DataFrame, but this\
    \ also works in reverse: if you create a Dataset from a DataFrame, it will automatically\
    \ inherit the schema from the DataFrame.\n\n## Computing Over Ray Datasets\n\n\
    In the previous section, we introduced some of the functionality built in with\
    \ Ray Datasets such as filtering, sorting, and creating unions. However, one of\
    \ the most powerful parts of Ray Datasets is that it allows you to harness the\
    \ flexible compute model of Ray and perform computations efficiently over large\
    \ amounts of data.\n\nThe primary way to perform a custom transformation on a\
    \ Dataset is using `.map()`. This allows you to pass a custom function that will\
    \ be applied to the records of a Dataset. A basic example might be to square the\
    \ records of a Dataset:\n\n```\nds = ray.data.range(10000).map(lambda x: x **\
    \ 2)\nds.take(5)  # -> [0, 1, 4, 9, 16]\n```\n\nIn this example, we passed a simple\
    \ lambda function, and the data we operated on was integers, but we could pass\
    \ any function here and operate on structured data that supports the Arrow format.\n\
    \nWe can also choose to map batches of data instead of individual records using\
    \ `.map_batches()`. Some types of computations are much more efficient when they're\
    \ *vectorized*, meaning that they use an algorithm or implementation that is more\
    \ efficient operating on a set of items instead of one at a time.\n\nRevisiting\
    \ our simple example of squaring the values in the Dataset, we can rewrite it\
    \ to be performed in batches and use the `numpy.square`-optimized implementation\
    \ instead of the naive Python implementation:\n\n```\nimport numpy as np\n\nds\
    \ = ray.data.range(10000).map_batches(lambda batch: np.square(batch).tolist())\n\
    ds.take(5)  # -> [0, 1, 4, 9, 16]\n```\n\nVectorized computations are especially\
    \ useful on GPUs when performing deep learning training or inference. However,\
    \ generally performing computations on GPUs also has significant fixed cost due\
    \ to needing to load model weights or other data into the GPU RAM. For this purpose,\
    \ Ray Datasets supports mapping data using Ray actors. Ray actors are long-lived\
    \ and can hold state, as opposed to stateless Ray tasks, so we can cache expensive\
    \ operations costs by running them in the actor's constructor (such as loading\
    \ a model onto a GPU).\n\nFor example, to perform batch inference using Datasets,\
    \ we need to pass a class instead of a function, specify that this computation\
    \ should run using actors, and use `.map_batches()` so we can perform vectorized\
    \ inference. Datasets will automatically autoscale a group of actors to perform\
    \ the map operation:\n\n```\ndef load_model():\n    # Returns a dummy model for\
    \ this example.\n    # In reality, this would likely load some model weights onto\
    \ a GPU.\n    class DummyModel:\n        def __call__(self, batch):\n        \
    \    return batch\n\n    return DummyModel()\n\nclass MLModel:\n    def __init__(self):\n\
    \        # load_model() will only run once per actor that's started.\n       \
    \ self._model = load_model()\n\n    def __call__(self, batch):\n        return\
    \ self._model(batch)\n\nds.map_batches(MLModel, compute=\"actors\")\n```\n\nTo\
    \ run the inference on a GPU, we would pass `num_gpus=1` to the `map_batches`\
    \ call to specify that the actors running the map function each require a GPU.\n\
    \n## Dataset Pipelines\n\nBy default, Dataset operations are blocking, meaning\
    \ they run synchronously from start to finish and there is only a single operation\
    \ happening at a time. This pattern can be very inefficient for some workloads,\
    \ however. For example, consider the following set of Dataset transformations\
    \ on Parquet data that might be used to do batch inference for a machine learning\
    \ model:²\n\n> ² Parquet is a structured, column-oriented format that enables\
    \ efficient compression, data storage, and data retrieval. Many example and real-world\
    \ datasets use Parquet, so it is used in the example provided. However, the code\
    \ could easily be modified to use a different format by changing the read_parquet\
    \ and write_parquet calls.\n\n```\nds = (ray.data.read_parquet(\"s3://my_bucket/input_data\"\
    )\n      .map(cpu_intensive_preprocessing)\n      .map_batches(gpu_intensive_inference,\
    \ compute=\"actors\", num_gpus=1)\n      .repartition(10))\n\nds.write_parquet(\"\
    s3://my_bucket/output_predictions\")\n```\n\nThere are five stages to this process,\
    \ and each stresses different parts of the system:\n\n1. Reading from remote storage\
    \ requires ingress bandwidth to the cluster and may be limited by the throughput\
    \ of the storage system. In this stage, a group of Ray tasks is spawned that will\
    \ read from remote storage in parallel, and the resulting blocks of data are stored\
    \ in the Ray object store.\n\n2. Preprocessing the inputs requires CPU resources.\
    \ The objects from the first phase are passed into a group of tasks that will\
    \ execute the cpu_intensive_preprocessing function on each block.\n\n3. Vectorized\
    \ inference on the model requires GPU resources. The same process as in the second\
    \ stage is repeated for gpu_intensive_inference, except this time the function\
    \ is run on actors that are each allocated a GPU, and multiple blocks are passed\
    \ into each function call (in batches). Actors are used for this step to avoid\
    \ repeatedly reloading the model used for inference onto the GPU.\n\n4. Repartitioning\
    \ requires network bandwidth within the cluster. After completing stage 3, more\
    \ tasks are spawned to repartition the data into 10 blocks and write each of those\
    \ 10 blocks to remote storage.\n\n5. Writing to remote storage requires egress\
    \ bandwidth from the cluster and may be limited by the throughput of storage once\
    \ again.\n\nFigure 6-1 depicts a basic implementation where each stage runs in\
    \ sequence. This naive implementation idles resources because each stage is blocking\
    \ and run in sequence. For example, because GPU resources are used only in the\
    \ final stage, they will be idle waiting for all of the data to be loaded and\
    \ preprocessed."
  mdcn: "## 块与重分区\n\n使用 Ray 数据集时，需要牢记的一个重要概念是 *块*。块是构成数据集的底层数据块；操作会逐块应用于底层数据。如果数据集中的块数过多，每个块就会很小，每次操作的开销就会很大。如果块数过少，操作就无法高效地并行化。\n\
    \n如果我们深入探究上一个示例的底层，会发现我们最初创建的数据集默认各有 200 个块。当我们将它们合并时，生成的数据集有 400 个块。鉴于块数对效率很重要，我们可能希望重新洗牌数据，以匹配我们最初的\
    \ 200 个块并保持相同的并行度。这种改变块数的过程称为 *重分区*，Ray 数据集提供了一个简单的 `.repartition(num_blocks)`\
    \ API 来实现它。让我们使用该 API 将生成的数据集重新分区回 200 个块：\n\n```\nds1 = ray.data.range(10000)\n\
    print(ds1.num_blocks())  # -> 200\nds2 = ray.data.range(10000)\nprint(ds2.num_blocks())\
    \  # -> 200\nds3 = ds1.union(ds2)\nprint(ds3.num_blocks())  # -> 400\n\nprint(ds3.repartition(200).num_blocks())\
    \  # -> 200\n```\n\n块还控制着将数据集写入存储时创建的文件数量（因此，如果您希望所有数据合并到单个输出文件中，应在写入之前调用 `.repartition(1)`）。\n\
    \n## 模式与数据格式\n\n到目前为止，我们一直在操作仅由整数组成的简单 Ray 数据集。然而，对于更复杂的数据处理，我们通常希望有一个模式，以便更容易理解数据并对每一列强制执行类型。\n\
    \n鉴于数据集旨在成为 Ray 上应用程序和库的互操作点，它们被设计为与特定数据类型无关，并提供灵活性来读取、写入和转换许多流行的数据格式。数据集支持 Arrow\
    \ 的列式格式，这使得可以在不同类型的结构化数据之间进行转换，例如 Python 字典、DataFrame 和序列化的 Parquet 文件。\n\n创建带有模式的数据集的最简单方法是从\
    \ Python 字典列表创建：\n\n```\nds = ray.data.from_items([{\"id\": \"abc\", \"value\"\
    : 1}, {\"id\": \"def\", \"value\": 2}])\nprint(ds.schema())  # -> id: string,\
    \ value: int64\n```\n\n在这种情况下，模式是从我们传入的字典的键推断出来的。我们还可以与流行库（如 Pandas）的数据类型进行转换：\n\
    \n```\npandas_df = ds.to_pandas()  # pandas_df 将继承我们数据集的模式。\n```\n\n这里我们从数据集转换到了\
    \ Pandas DataFrame，但这也适用于反向操作：如果您从 DataFrame 创建数据集，它将自动继承 DataFrame 的模式。\n\n##\
    \ 在 Ray 数据集上进行计算\n\n在上一节中，我们介绍了 Ray 数据集内置的一些功能，例如过滤、排序和创建联合。然而，Ray 数据集最强大的部分之一是它允许您利用\
    \ Ray 的灵活计算模型，并对大量数据执行高效计算。\n\n对数据集执行自定义转换的主要方式是使用 `.map()`。这允许您传递一个自定义函数，该函数将应用于数据集的记录。一个基本示例可能是对数据集的记录进行平方：\n\
    \n```\nds = ray.data.range(10000).map(lambda x: x ** 2)\nds.take(5)  # -> [0,\
    \ 1, 4, 9, 16]\n```\n\n在这个例子中，我们传递了一个简单的 lambda 函数，我们操作的数据是整数，但我们可以传递任何函数并操作支持\
    \ Arrow 格式的结构化数据。\n\n我们也可以选择使用 `.map_batches()` 映射数据批次，而不是单个记录。某些类型的计算在 *向量化*\
    \ 时效率要高得多，这意味着它们使用一种算法或实现，该算法或实现对一组项目进行操作比一次操作一个项目更高效。\n\n重新审视我们对数据集中的值进行平方的简单示例，我们可以将其重写为以批处理方式执行，并使用\
    \ `numpy.square` 优化实现，而不是简单的 Python 实现：\n\n```\nimport numpy as np\n\nds = ray.data.range(10000).map_batches(lambda\
    \ batch: np.square(batch).tolist())\nds.take(5)  # -> [0, 1, 4, 9, 16]\n```\n\n\
    向量化计算在执行深度学习训练或推理时在 GPU 上特别有用。然而，通常在 GPU 上执行计算也有显著的固定成本，因为需要将模型权重或其他数据加载到 GPU\
    \ 内存中。为此，Ray 数据集支持使用 Ray actor 映射数据。Ray actor 是长期运行的并且可以保持状态，这与无状态的 Ray 任务不同，因此我们可以通过在\
    \ actor 的构造函数中运行昂贵的操作（例如将模型加载到 GPU 上）来缓存这些成本。\n\n例如，要使用数据集执行批量推理，我们需要传递一个类而不是一个函数，指定该计算应使用\
    \ actor 运行，并使用 `.map_batches()` 以便我们可以执行向量化推理。数据集将自动扩展一组 actor 来执行映射操作：\n\n```\n\
    def load_model():\n    # 在此示例中返回一个虚拟模型。\n    # 实际上，这可能会将一些模型权重加载到 GPU 上。\n   \
    \ class DummyModel:\n        def __call__(self, batch):\n            return batch\n\
    \n    return DummyModel()\n\nclass MLModel:\n    def __init__(self):\n       \
    \ # load_model() 将在每个启动的 actor 上仅运行一次。\n        self._model = load_model()\n\n\
    \    def __call__(self, batch):\n        return self._model(batch)\n\nds.map_batches(MLModel,\
    \ compute=\"actors\")\n```\n\n要在 GPU 上运行推理，我们需要向 `map_batches` 调用传递 `num_gpus=1`，以指定运行映射函数的每个\
    \ actor 都需要一个 GPU。\n\n## 数据集管道\n\n默认情况下，数据集操作是阻塞的，这意味着它们从开始到结束同步运行，并且一次只有一个操作在发生。然而，这种模式对于某些工作负载来说可能非常低效。例如，考虑以下对\
    \ Parquet 数据的数据集转换集，这些转换可能用于为机器学习模型执行批量推理：²\n\n> ² Parquet 是一种结构化的、面向列的格式，支持高效压缩、数据存储和数据检索。许多示例和真实世界的数据集使用\
    \ Parquet，因此在提供的示例中使用了它。但是，通过更改 read_parquet 和 write_parquet 调用，可以轻松修改代码以使用不同的格式。\n\
    \n```\nds = (ray.data.read_parquet(\"s3://my_bucket/input_data\")\n      .map(cpu_intensive_preprocessing)\n\
    \      .map_batches(gpu_intensive_inference, compute=\"actors\", num_gpus=1)\n\
    \      .repartition(10))\n\nds.write_parquet(\"s3://my_bucket/output_predictions\"\
    )\n```\n\n这个过程有五个阶段，每个阶段都强调系统的不同部分：\n\n1.  从远程存储读取需要集群的入口带宽，并且可能受到存储系统吞吐量的限制。在此阶段，会生成一组\
    \ Ray 任务，这些任务将并行地从远程存储读取，生成的数据块存储在 Ray 对象存储中。\n\n2.  预处理输入需要 CPU 资源。第一阶段的对象被传递到一组任务中，这些任务将在每个块上执行\
    \ `cpu_intensive_preprocessing` 函数。\n\n3.  模型上的向量化推理需要 GPU 资源。与第二阶段相同的过程为 `gpu_intensive_inference`\
    \ 重复，只是这次函数在每个都分配了 GPU 的 actor 上运行，并且多个块以批处理方式传递给每个函数调用。此步骤使用 actor 是为了避免重复将用于推理的模型重新加载到\
    \ GPU 上。\n\n4.  重分区需要集群内的网络带宽。完成第 3 阶段后，会生成更多任务将数据重新分区为 10 个块，并将这 10 个块中的每一个写入远程存储。\n\
    \n5.  写入远程存储需要集群的出口带宽，并且可能再次受到存储吞吐量的限制。\n\n图 6-1 描绘了一个基本实现，其中每个阶段按顺序运行。这种简单的实现会使资源闲置，因为每个阶段都是阻塞的并按顺序运行。例如，由于\
    \ GPU 资源仅在最后阶段使用，它们将空闲等待所有数据加载和预处理完成。"

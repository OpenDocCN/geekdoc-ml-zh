  md: 'In case you already have an ML platform, such as Vertex or SageMaker, you can
    use any subset of Ray AIR to augment your system.¹⁴ In other words, AIR can complement
    existing ML platforms by integrating with existing pipeline or workflow orchestrators,
    storage, and tracking services, without requiring a replacement of your entire
    ML platform.


    # How to Integrate AIR into Your ML Platform


    Now that you have a deeper understanding of the relationship of Ray, and AIR in
    particular, to other ecosystem components, let''s summarize what it takes to build
    your own ML platform and integrate Ray with other ecosystem components.


    The core of your ML system build with AIR consists of a set of Ray Clusters, each
    responsible for different jobs. For instance, one cluster might run preprocessing,
    train a PyTorch model, and run inference; another one might simply pick up previously
    trained models for batch inference and model serving, and so on. You can leverage
    the Ray Autoscaler to fulfill your scaling needs and could deploy the whole system
    on Kubernetes with KubeRay. You can then augment this core system with other components
    as you see fit, for example:


    +   - You might want to add other compute steps to your setup, such as running
    data-intensive preprocessing tasks with Spark.

    - You can use a workflow orchestrator such as AirFlow, Oozie, or SageMaker Pipelines
    to schedule and create your Ray Clusters and run Ray AIR apps and services. Each
    AIR app can be part of a larger orchestrated workflow, for instance by tying into
    a Spark ETL job from the first bullet point.¹⁵

    - You can also create your Ray AIR clusters for interactive use with Jupyter notebooks,
    for instance hosted by Google Colab or Databricks Notebooks.

    - If you need access to a feature store such as Feast or Tecton, Ray Train, Datasets,
    and Serve have an integration for such tools.¹⁶

    - For experiment tracking or metric stores, Ray Train and Tune provide integration
    with tools such as MLflow and Weights & Biases.

    - You can also retrieve and store your data and models from external storage solutions
    like S3, as shown.


    Figure 11-2 puts all the pieces together in one concise diagram.


    14 We use the term *ML platform* in the broadest sense possible, namely, to signify
    any system that is responsible for running end-to-end ML workloads.


    15 Orchestration of task graphs can be handled entirely within Ray AIR. External
    workflow orchestrators will integrate nicely but are needed only if running non-Ray
    steps.


    16 The Ray team has built a demo of a reference architecture that showcases the
    Feast integration.'

    # Systems Related to Ray


    With the architecture and functionality of it in mind, how does Ray relate to
    other systems? Here are the basics:


    +   - Ray can be used as a parallelization framework for Python and shares properties
    with tools like celery or multiprocessing. In fact, there''s a drop-in replacement
    for the latter implemented in Ray.

    - Ray is also related to data processing frameworks such as Spark, Dask, Flink,
    and MARS. We''ll explore these relationships in Chapter 11, when talking about
    Ray''s ecosystem.

    - As a distributed computing tool, Ray also deals with the problems of cluster
    management and orchestration, and we''ll see how Ray does that in relation to
    tools like Kubernetes in Chapter 9.

    - Since Ray is implementing the actor model of concurrency, it''s also interesting
    to explore its relationship with frameworks like Akka.

    - Lastly, since Ray banks on a performant, low-level API for communication, there''s
    a certain relationship with high-performance computing (HPC) frameworks and communication
    protocols like the message passing interface (MPI).


    # A Simple MapReduce Example with Ray


    We can''t let you go without discussing an example of one of the most important
    milestones in distributed computing in recent decades, namely, *MapReduce*. Many
    successful big data technologies like Hadoop are based on this programming model,
    and it''s worth revisiting in the context of Ray. To keep things simple, we''ll
    restrict our MapReduce implementation to a single use case, the task of counting
    word occurrences across several documents. This is an almost trivial task in single
    processing, but it becomes an interesting challenge once a massive corpus of documents
    is involved and you need multiple compute nodes to crunch the numbers.


    Implementing a MapReduce word-count example might be the most well-known example
    we have in distributed computing,¹⁵ so it''s worth knowing. If you don''t know
    about this classic paradigm, it''s based on three straightforward steps:


    +   1. Take a set of documents and transform or “map” its elements (for instance
    the words contained in them) according to a function you provide. This *map phase*
    produces key-value pairs by design, in which a *key* represents a document element
    and a *value* is simply a metric you want to compute for that element.


    ¹⁵ It''s a *drosophila melanogaster* of sorts, not unlike computing a classifier
    on the ubiquitous MNIST dataset.'
  - "[PAGE 63]\n\nSince we're interested in counting words, whenever we encounter\
    \ a word in a document, our *map function* will simply emit the pair (word, 1)\
    \ to indicate that we found one occurrence of it.\n\n2. Collect and group all\
    \ the outputs of the map phase according to their key. Since we work in a distributed\
    \ setup and the same key might be present on several compute nodes, this might\
    \ require shuffling of data between nodes. For that reason this step is often\
    \ referred to as the *shuffle phase*.<sup>16</sup> To give you an idea of what\
    \ grouping might mean in our concrete use case, let's say we have a total of four\
    \ (word, 1) occurrences produced in the map phase. The shuffle would then co-locate\
    \ all occurrences of the same word on the same node.\n\n3. Aggregate or “reduce”\
    \ the elements from the shuffle step, which is why we refer to it as the *reduce\
    \ phase*. Continuing with the example we laid out, we simply sum up all word occurrences\
    \ on each node to get the final count. For instance, four occurrences of (word,\
    \ 1) would be reduced to word: 4.\n\nEvidently, MapReduce gets its name from the\
    \ first and last of these three phases, but the second one is arguably just as\
    \ important. While schematically these phases may look simple, their power lies\
    \ in the fact that they can be massively parallelized across hundreds of machines.\n\
    \nIn Figure 2-4 we illustrate an example of applying the three MapReduce phases\
    \ to a corpus of documents that has been distributed across three partitions.\
    \ To run MapReduce on a distributed corpus of documents, we first map each document\
    \ to a set of key-value pairs, then shuffle the results to ensure that all key-value\
    \ pairs with the same key are on the same node, and finally reduce the key-value\
    \ pairs to compute the final word counts.\n\nLet's implement the MapReduce algorithm\
    \ for our word-count use case in Python and parallelize the computation using\
    \ Ray. First, load example data so that you get a better idea of what we're operating\
    \ on:\n\n```\nimport subprocess\nzen_of_python = subprocess.check_output([\"python\"\
    , \"-c\", \"import this\"])\ncorpus = zen_of_python.split() ❶\n\nnum_partitions\
    \ = 3\nchunk = len(corpus) // num_partitions\npartitions = [ ❷\n    corpus[i *\
    \ chunk: (i + 1) * chunk] for i in range(num_partitions)\n]\n```\n\n<sup>16</sup>\
    \ In general, a shuffle is any operation that requires redistributing data across\
    \ its partitions. Shuffles can be quite costly. If your map phase operates on\
    \ *N* partitions, it will produce *N* × *N* results that need to be shuffled."

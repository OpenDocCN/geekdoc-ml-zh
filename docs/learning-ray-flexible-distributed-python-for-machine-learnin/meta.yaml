    \n通过打印配置字典，你可以验证`num_rollout_workers`参数被设置为2。⁸ 结果包含关于DQN算法状态和训练结果的详细信息，这些信息过于冗长，无法在此处展示。我们现在最相关的部分是关于算法奖励的信息，理想情况下，这表明算法学会了如何解决迷宫问题。你应该会看到如下形式的输出（为清晰起见，我们只显示最相关的信息）：\n\

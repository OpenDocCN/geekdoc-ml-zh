    \ AIR into Your ML Platform\n- Where to Go from Here?\n- Summary\n\n# Index\n\n\
    # Foreword\n\nFor the past decade, the computation demands of machine learning\
    \ and data applications have vastly outgrown the capabilities of a single server\
    \ or a single processor, including hardware accelerators such as GPUs and TPUs.\
    \ This trend leaves us no choice but to distribute these applications. Unfortunately,\
    \ building such distributed applications is notoriously difficult.\n\nOver the\
    \ past few years, Ray has emerged as the framework of choice to simplify the development\
    \ of such applications. Ray includes a flexible core and a set of powerful libraries\
    \ that enable the developers to easily scale a variety of workloads, including\
    \ training, hyperparameter tuning, reinforcement learning, model serving, and\
    \ batch processing of unstructured data. Ray is one of the most popular open source\
    \ projects and has been used by thousands of companies to implement everything\
    \ from machine learning platforms to recommendation systems, fraud detection,\
    \ and training some of the largest models, including Open AI’s ChatGPT.\n\nIn\
    \ this book, Max Pumperla, Edward Oakes, and Richard Liaw have done an outstanding\
    \ job in providing a gentle and comprehensive introduction to Ray and its libraries\
    \ using easy to follow examples. At the end of this book, you will master the\
    \ key concepts and abstractions in Ray and be able to develop and quickly scale\
    \ end-to-end machine learning applications from your laptop to large on-premise\
    \ clusters or to the cloud.\n\n> — Ion Stoica\n> Cofounder of Anyscale and Databricks,\
    \ and\n> Professor, UC Berkeley Berkeley, California\n> January 2023\n\n# Preface\n\
    \nDistributed computing is a fascinating topic. Looking back at the early days\
    \ of computing, one can’t help but be impressed by the fact that so many companies\
    \ today distribute their workloads across clusters of computers. It’s impressive\
    \ that we have figured out efficient ways to do so, but scaling out is also becoming\
    \ more and more of a necessity. Individual computers keep getting faster, and\
    \ yet our need for large-scale computing keeps exceeding what single machines\
    \ can do.\n\nRecognizing that scaling is both a necessity and a challenge, Ray\
    \ aims to make distributed computing simple for developers. It makes distributed\
    \ computing accessible to nonexperts and makes it possible to scale your Python\
    \ scripts across multiple nodes fairly easily. Ray is good at scaling both *data-\
    \ and compute-heavy workloads*, such as data preprocessing and model training—and\
    \ it explicitly targets machine learning (ML) workloads with the need to scale.\
    \ While it is possible today to scale these two types of workloads without Ray,\
    \ you would likely have to use different APIs and distributed systems for each.\
    \ And managing several distributed systems can be messy and inefficient in many\
    \ ways.\n\nThe addition of the Ray AI Runtime (AIR) with the release of Ray 2.0\
    \ in August 2022 increased the support for complex ML workloads in Ray even further.\
    \ AIR is a collection of libraries and tools that make it easy to build and deploy\
    \ end-to-end ML applications in a single distributed system. With AIR, even the\
    \ most complex workflows can usually be expressed as a *single Python script*.\
    \ That means you can run your programs locally first, which can make a big difference\
    \ in terms of debugging and development speed.\n\nData scientists benefit from\
    \ Ray because they can rely on a growing ecosystem of Ray ML libraries and third-party\
    \ integrations. Ray AIR helps you to quickly prototype ideas and go more easily\
    \ from development to production. Unlike many other distributed systems, Ray has\
    \ native support for GPUs as well, which can be particularly important to roles\
    \ like ML engineers. To support data engineers, Ray also has tight integrations\
    \ with tools like Kubernetes and can be deployed in multicloud setups.\n\nAnd\
    \ you can use it as a unified compute layer to provide scaling, fault tolerance,\
    \ scheduling, and orchestration of your workloads. In other words, it's well worth\
    \ investing in *learning Ray* for a variety of roles.\n\n## Who Should Read This\
    \ Book\n\nIt's likely that you picked up this book because you're interested in\
    \ some aspects of Ray. Maybe you're a distributed systems engineer who wants to\
    \ know how Ray's engine works. You might also be a software developer interested\
    \ in picking up a new technology. Or you could be a data engineer who wants to\
    \ evaluate how Ray compares to similar tools. You could also be a machine learning\
    \ practitioner or data scientist who needs to find ways to scale experiments.\n\
    \nNo matter your concrete role, the common denominator to get the most out of\
    \ this book is to feel comfortable programming in Python. This book's examples\
    \ are written in Python, and an intermediate knowledge of the language is a requirement.\
    \ Explicit is better than implicit, as you know full well as a Pythonista. So,\
    \ let us be explicit by saying that knowing Python implies to me that you know\
    \ how to use the command line on your system, how to get help when stuck, and\
    \ how to set up a programming environment on your own.\n\nIf you've never worked\
    \ with distributed systems before, that's OK. We cover all the basics you need\
    \ to get started with that in the book. On top of that, you can run most code\
    \ examples presented here on your laptop. Covering the basics means that we can't\
    \ go into too much detail about distributed systems. This book is ultimately focused\
    \ on application developers using Ray, specifically for data science and ML.\n\
    \nFor the later chapters of this book, you'll need some familiarity with ML, but\
    \ we don't expect you to have worked in the field. In particular, you should have\
    \ a basic understanding of the ML paradigm and how it differs from traditional\
    \ programming. You should also know the basics of using NumPy and Pandas. Also,\
    \ you should at least feel comfortable *reading* examples using the popular TensorFlow\
    \ and PyTorch libraries. It's enough to follow the flow of the code, on the API\
    \ level, but you don't need to know how to write your own models. We cover examples\
    \ using both dominant deep learning libraries (TensorFlow and PyTorch) to illustrate\
    \ how you can use Ray for ML workloads, regardless of your preferred framework.\n\
    \nWe cover a lot of ground in advanced ML topics, but the main focus is on Ray\
    \ as a technology and how to use it. The ML examples we discuss might be new to\
    \ you and could require a second reading, but you can still focus on Ray's API\
    \ and how to use it in practice. Knowing the requirements, here's what you might\
    \ get out of this book:"

    \ The better an agent learns, the better it becomes at interpreting the current\
    \ game state (observations) and finding actions that lead to more rewarding outcomes.\n\
    \nRegardless of the RL algorithm you want to use, you need to have a way of simulating\
    \ the game repeatedly to collect experience data. For this reason, we're going\
    \ to implement a simple `Simulation` class.\n\nThe other useful abstraction we\
    \ need to proceed is that of a `Policy`, a way of specifying actions. Right now\
    \ the only thing we can do to play the game is sample random actions for our seeker.\
    \ What a `Policy` allows us to do is to get better actions for the current state\
    \ of the game. In fact, we define a `Policy` to be a class with a `get_action`\
    \ method that takes a game state and returns an action.\n\nRemember that in our\
    \ game the seeker has a total of 25 possible states on the grid and can carry\
    \ out four actions. A simple idea would be to look at pairs of states and actions\
    \ and assign a high value to a pair if carrying out this action in this state\
    \ will lead to a high reward, and a low value otherwise. For instance, from your\
    \ intuition of the game it should be clear that going down or right is always\
    \ a good idea, whereas going left or up is not. Then, create a 25 × 4 lookup table\
    \ of all possible state-action pairs and store it in our `Policy`. Then we could\
    \ simply ask our policy to return the highest value of any action, given a state.\
    \ Of course, implementing an algorithm that finds good values for these state-action\
    \ pairs is the challenging part. Let's implement this idea of a `Policy` first\
    \ and worry about a suitable algorithm later:\n\n```\nimport numpy as np\n\nclass\
    \ Policy:\n\n    def __init__(self, env):\n        \"\"\"A Policy suggests actions\
    \ based on the current state.\n        We do this by tracking the value of each\
    \ state-action pair.\n        \"\"\"\n        self.state_action_table = [\n  \
    \          [0 for _ in range(env.action_space.n)]\n            for _ in range(env.observation_space.n)\n\
    \        ]\n        self.action_space = env.action_space\n\n    def get_action(self,\
    \ state, explore=True, epsilon=0.1):\n        \"\"\"Explore randomly or exploit\
    \ the best value currently available.\"\"\"\n        if explore and random.uniform(0,\
    \ 1) < epsilon:\n            return self.action_space.sample()\n        return\
    \ np.argmax(self.state_action_table[state])\n```\n\n> <sup>2</sup> As we'll see\
    \ in Chapter 4, you can run RL on multiplayer games too. Making the maze environment\
    \ a so-called multi-agent environment, in which multiple seekers compete for the\
    \ goal, is an interesting exercise."

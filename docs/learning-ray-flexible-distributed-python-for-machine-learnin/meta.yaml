    \ The two worker models are used for action computation and data collection (rollouts).\
    \ After each training step, the local model sends its current weights to the workers\
    \ for synchronization. Fully distributed training, as opposed to distributed sampling,\
    \ will be available across all RLlib algorithms in future Ray versions.\n\n11\
    \ This is true by default, since we're using TensorFlow and Keras under the hood.\
    \ Should you opt to change the framework specification of your algorithm to work\
    \ with PyTorch directly, do `print(model)`, in which case `model` is a `torch.nn.Module`.\
    \ Access to the underlying model will be unified across all frameworks the future."
  - "[PAGE 101]\n\nAs you can see from the following output, this model takes in our\
    \ observations. The shape of these observations is a bit strangely annotated as\
    \ [(None, 25)], but essentially this means we have the expected 5 × 5 maze grid\
    \ values correctly encoded. The model follows with two so-called Dense layers\
    \ and predicts a single value at the end:¹²\n\n```\nModel: \"model\"\n__________________________________________________________________________________________________\n\
    Layer (type)                    Output Shape         Param #     Connected to\
    \                     \n==================================================================================================\n\
    observations (InputLayer)       [(None, 25)]         0                       \
    \                     \n__________________________________________________________________________________________________\n\
    fc_1 (Dense)                    (None, 256)          6656        observations[0][0]\
    \                \n__________________________________________________________________________________________________\n\
    fc_out (Dense)                  (None, 256)          65792       fc_1[0][0]  \
    \                      \n__________________________________________________________________________________________________\n\
    value_out (Dense)               (None, 1)            257         fc_1[0][0]  \
    \                      \n==================================================================================================\n\
    Total params: 72,705\nTrainable params: 72,705\nNon-trainable params: 0\n__________________________________________________________________________________________________\n\
    ```\n\nNote that it's perfectly possible to customize this model for your RLlib\
    \ experiments. If your environment is complex and has a big observation space,\
    \ for instance, you might need a bigger model to capture that complexity. However,\
    \ doing so requires in-depth knowledge of the underlying neural network framework\
    \ (in this case TensorFlow), which we don't assume you have.¹³\n\n> ## State-Action\
    \ Values and State-Value Functions\n\nSo far we've been mostly concerned with\
    \ the concept of state-action values, since this concept takes center stage in\
    \ the formulation of Q-Learning that we used extensively so far. The model we\
    \ just had a look at has a dedicated output (in deep learning terms called a *head*)\
    \ for predicting Q-values. You can access and summarize this part of the model\
    \ through `model.q_value_head.summary()`.\n\nIn contrast it's also possible to\
    \ ask how valuable a particular *state* is, without specifying an action that\
    \ pairs with it. This leads to the concept of *state-value functions*, or simply\
    \ *value functions*, that are very important in the RL literature. We can't go\
    \ into more detail in this RLlib introduction, but note that you have access to\
    \ a *value function head* as well through `model.state_value_head.summary()`.\n\
    \n12 The \"value\" output of this network represents the Q-value of state-action\
    \ pairs.\n\n13 To learn more about customizing your RLlib models, check out the\
    \ guide to custom models in the Ray documentation."
  - '[PAGE 102]


    Next, let''s see if we can take some observations from our environment and pass
    them to the model we just extracted from our policy. This part is a bit technically
    involved because models are a bit more difficult to access directly in RLlib.
    Normally you would only interface with a model through your policy, which takes
    care of preprocessing the observations, among other things. Luckily, we can access
    the preprocessor used by the policy, transform the observations from our environment,
    and then pass them to the model:


    ```

    from ray.rllib.models.preprocessors import get_preprocessor


    env = GymEnvironment()

    obs_space = env.observation_space

    preprocessor = get_preprocessor(obs_space)(obs_space)


    observations = env.reset()

    transformed = preprocessor.transform(observations).reshape(1, -1)


    model_output, _ = model({"obs": transformed})

    ```


    +   1. Use get_preprocessor to access the preprocessor used by the policy.

    2. You can use transform on any observations obtained from your env to the format
    expected by the model. Note that we need to reshape the observations too.

    3. Get the model output by calling the model on a preprocessed observation dictionary.


    Having computed our model_output, we can now access the Q-values and the action
    distribution of the model for this output:


    ```

    q_values = model.get_q_value_distributions(model_output)

    print(q_values)


    action_distribution = policy.dist_class(model_output, model)

    sample = action_distribution.sample()

    print(sample)

    ```


    +   1. The get_q_value_distributions method is specific to DQN models only.

    2. By accessing dist_class we get the policy''s action distribution class.

    3. Action distributions can be sampled from.'
  - "[PAGE 103]\n\n# Configuring RLlib Experiments\n\nNow that you've seen the basic\
    \ Python training API of RLlib in an example, let's take a step back and discuss\
    \ in more depth how to configure and run RLlib experiments. By now you know that\
    \ to define an Algorithm, you start with the respective AlgorithmConfig and then\
    \ build your algorithm from it. So far we've used only the rollout method of an\
    \ AlgorithmConfig to set the number of rollout workers to two, and set our environment\
    \ accordingly.\n\nIf you want to alter the behavior of your RLlib training run,\
    \ chain more utility methods onto the AlgorithmConfig instance and then call build\
    \ on it at the end. As RLlib algorithms are fairly complex, they come with many\
    \ configuration options. To make things easier, the common properties of algorithms\
    \ are naturally grouped into useful categories.14 Each such category comes with\
    \ its own respective AlgorithmConfig method:\n\n+   - **training()**\n  Takes\
    \ care of all training-related configuration options of your algorithm. The training\
    \ method is the one place that RLlib algorithms differ in their configuration.\
    \ All the following methods are algorithm-agnostic.\n- **environment()**\n  Configures\
    \ all aspects of your environment.\n- **rollouts()**\n  Modifies the setup and\
    \ behavior of your rollout workers.\n- **exploration()**\n  Alters the behavior\
    \ of your exploration strategy.\n- **resources()**\n  Configures the compute resources\
    \ used by your algorithm.\n- **offline_data()**\n  Defines options for training\
    \ with so-called offline data, a topic we cover in \"Working with Offline Data\"\
    \ on page 97.\n- **multi_agent()**\n  Specifies options for training algorithms\
    \ using *multiple agents*. We discuss an explicit example of this in the next\
    \ section.\n\n14 We list only the methods we introduce in this chapter. Apart\
    \ from those we mention, you also find options for evaluation of your algorithms,\
    \ reporting, debugging, checkpointing, adding callbacks, altering your deep learning\
    \ framework, requesting resources, and accessing experimental features."
- md: "The algorithm-specific configuration in `training()` becomes even more relevant\
    \ once you've settled on an algorithm and want to squeeze it for performance.\
    \ In practice, RLlib provides you with good defaults to get started.\n\nFor more\
    \ details on configuring RLlib experiments, look up configuration arguments in\
    \ the [API reference for RLlib algorithms](https://docs.ray.io/en/latest/rllib/rllib-algorithms.html).\
    \ But before we move on to examples, you should learn about the most common configuration\
    \ options in practice.\n\n## Resource Configuration\n\nWhether you use Ray RLlib\
    \ locally or on a cluster, you can specify the resources used for the training\
    \ process. Here are the most important options to consider. We continue using\
    \ the DQN algorithm as an example, but this would apply to any other RLlib algorithm\
    \ as well:\n\n```python\nfrom ray.rllib.algorithms.dqn import DQNConfig\n\nconfig\
    \ = DQNConfig().resources(\n    num_gpus=1,  # ①\n    num_cpus_per_worker=2, \
    \ # ②\n    num_gpus_per_worker=0,  # ③\n)\n```\n\n- ① Specify the number of GPUs\
    \ to use for training. It's important to check whether your algorithm of choice\
    \ supports GPUs first. This value can also be fractional. For example, if using\
    \ four rollout workers in DQN (`num_rollout_workers=4`), you can set `num_gpus=0.25`\
    \ to pack all four workers on the same GPU so that all rollout workers benefit\
    \ from the potential speedup. This affects only the local learner process, not\
    \ the rollout workers.\n- ② Set the number of CPUs to use for each rollout worker.\n\
    - ③ Set the number of GPUs used per worker.\n\n## Rollout Worker Configuration\n\
    \nRLlib lets you configure how your rollouts are computed and how to distribute\
    \ them:\n\n```python\nfrom ray.rllib.algorithms.dqn import DQNConfig\n\nconfig\
    \ = DQNConfig().rollouts(\n    num_rollout_workers=4,  # ①\n    num_envs_per_worker=1,\
    \  # ②\n    create_env_on_local_worker=True,  # ③\n)\n```\n\n- ① You've seen this\
    \ already. It specifies the number of Ray workers to use.\n- ② Specify the number\
    \ of environments to evaluate per worker. This setting allows you to “batch” evaluation\
    \ of environments. In particular, if your models take a long time to evaluate,\
    \ grouping environments like this can speed up training.\n- ③ When `num_rollout_workers\
    \ > 0`, the driver (“local worker”) does not need an environment. That’s because\
    \ sampling and evaluation is done by the rollout workers. If you still want an\
    \ environment on the driver, you can set this option to True.\n\n## Environment\
    \ Configuration\n\n```python\nfrom ray.rllib.algorithms.dqn import DQNConfig\n\
    \nconfig = DQNConfig().environment(\n    env=\"CartPole-v1\",  # 1\n    env_config={\"\
    my_config\": \"value\"},  # 2\n    observation_space=None,\n    action_space=None,\
    \  # 3\n    render_env=True,  # 4\n)\n```\n\n- 1 Specify the environment you want\
    \ to use for training. This can be either a string of an environment known to\
    \ Ray RLlib, such as any Gym environment, or the class name of a custom environment\
    \ you’ve implemented.15\n- 2 Optionally specify a dictionary of configuration\
    \ options for your environment that will be passed to the environment constructor.\n\
    - 3 You can specify the observation and action spaces of your environment too.\
    \ If you don’t specify them, they will be inferred from the environment.\n- 4\
    \ False by default, this property allows you to turn on rendering of the environment,\
    \ which requires you to implement the `render` method of your environment.\n\n\
    Note that we left out many available configuration options for each of the types\
    \ we listed. On top of that, we can’t touch on aspects here that alter the behavior\
    \ of the RL training procedure in this introduction (like modifying the underlying\
    \ model to use). But the good news is that you’ll find all the information you\
    \ need in the [RLlib Training API documentation](https://docs.ray.io/en/latest/rllib/rllib-training.html).\n\
    \n15 There’s also a way to *register* your environments so that you can refer\
    \ to them by name, but this requires using Ray Tune. You will learn about this\
    \ feature in [Chapter 5](https://example.com/chapter5).\n\n## Working with RLlib\
    \ Environments\n\nSo far we've introduced you to just Gym environments, but RLlib\
    \ supports a wide variety of environments. After giving you a quick overview of\
    \ all available options (see Figure 4-1), we'll show you two concrete examples\
    \ of advanced RLlib environments in action.\n\n### An Overview of RLlib Environments\n\
    \nAll available RLlib environments extend a common BaseEnv class. If you want\
    \ to work with several copies of the same gym.Env environment, you can use RLlib's\
    \ VectorEnv wrapper. Vectorized environments are useful, but they are straightforward\
    \ generalizations of what you've seen already. The two other types of environments\
    \ available in RLlib are more interesting and deserve more attention.\n\n![](img/6489687a3a178f2884963bddc928992c_106_0.png)\n\
    \nThe first is called MultiAgentEnv, which allows you to train a model with multiple\
    \ agents. Working with multiple agents can be tricky. That's because you have\
    \ to take care to define your agents within your environment with a suitable interface\
    \ and account for the fact that each agent might have a completely different way\
    \ of interacting with its environment.\n\nWhat's more is that agents might interact\
    \ with each other, and they have to respect each other's actions. In more advanced\
    \ settings, there might even be a hierarchy of agents that explicitly depend on\
    \ each other. In short, running multi-agent RL experiments is difficult, and we'll\
    \ see how RLlib handles this in the next example.\n\nThe other type of environment\
    \ we will look at is called ExternalEnv, which can be used to connect external\
    \ simulators to RLlib. For instance, imagine our simple maze problem from earlier\
    \ was a simulation of an actual robot navigating a maze. It might not be suitable\
    \ in such scenarios to co-locate the robot (or its simulation, implemented in\
    \ a different software stack) with RLlib's learning agents. To account for that,\
    \ RLlib provides you with a simple client-server architecture for communicating\
    \ with external simulators, which allows communication over a REST API. In case\
    \ you want to work both in a multi-agent and external environment setting, RLlib\
    \ offers a `MultiAgentExternalEnv` environment that combines both.\n\n### Working\
    \ with Multiple Agents\n\nThe basic idea of defining multi-agent environments\
    \ in RLlib is simple. You first assign each agent an agent ID. Then, whatever\
    \ you previously defined as a single value in a Gym environment (observations,\
    \ rewards, etc.), you now define as a dictionary with agent IDs as keys and values\
    \ per agent. Of course, the details are a little more complicated than that in\
    \ practice. But once you have defined an environment hosting several agents, you\
    \ have to define how these agents should learn.\n\nIn a single-agent environment\
    \ there’s one agent and one policy to learn. In a multi-agent environment there\
    \ are multiple agents that might map to one or several policies. For instance,\
    \ if you have a group of homogenous agents in your environment, then you could\
    \ define a single policy for all of them. If they all *act* the same way, then\
    \ their behavior can be learned the same way. In contrast, you might have situations\
    \ with heterogeneous agents in which each of them has to learn a separate policy.\
    \ Between these two extremes, there’s a spectrum of possibilities, as shown in\
    \ Figure 4-2.\n\nWe continue to use our maze game as a running example for this\
    \ chapter. This way you can check for yourself how the interfaces differ in practice.\
    \ So, to put the ideas we just outlined into code, let’s define a multi-agent\
    \ version of the `GymEnvironment` class. Our `MultiAgentEnv` class will have precisely\
    \ two agents, which we encode in a Python dictionary called `agents`, but in principle\
    \ this works with any number of agents.\n\n![](img/6489687a3a178f2884963bddc928992c_107_0.png)\n\
    \n*Figure 4-2. Mapping agents to policies in multi-agent reinforcement learning\
    \ problems*\n\nWe start by initializing and resetting our new environment:\n\n\
    ```python\nfrom ray.rllib.env.multi_agent_env import MultiAgentEnv\nfrom gym.spaces\
    \ import Discrete\nimport os\n```\n\n```python\nclass MultiAgentMaze(MultiAgentEnv):\n\
    \n    def __init__(self, *args, **kwargs):\n        self.action_space = Discrete(4)\n\
    \        self.observation_space = Discrete(5*5)\n        self.agents = {1: (4,\
    \ 0), 2: (0, 4)}\n        self.goal = (4, 4)\n        self.info = {1: {'obs':\
    \ self.agents[1]}, 2: {'obs': self.agents[2]}}\n\n    def reset(self):\n     \
    \   self.agents = {1: (4, 0), 2: (0, 4)}\n\n        return {1: self.get_observation(1),\
    \ 2: self.get_observation(2)}\n```\n\n- 1. Action and observation spaces stay\
    \ exactly the same as before.\n- 2. We now have two seekers with (0, 4) and (4,\
    \ 0) starting positions in an agents dictionary.\n- 3. For the info object, we're\
    \ using agent IDs as keys.\n- 4. Observations are now per-agent dictionaries.\n\
    \nNotice that we didn't touch the action and observation spaces at all. That's\
    \ because we're using two essentially identical agents here that can reuse the\
    \ same spaces. In more complex situations you'd have to account for the fact that\
    \ the actions and observations might look different for some agents.16\n\nTo continue,\
    \ let's generalize our helper methods get_observation, get_reward, and is_done\
    \ to work with multiple agents. We do this by passing in an action_id to their\
    \ signatures and handling each agent the same way as before:\n\n```python\ndef\
    \ get_observation(self, agent_id):\n    seeker = self.agents[agent_id]\n    return\
    \ 5 * seeker[0] + seeker[1]\n\ndef get_reward(self, agent_id):\n    return 1 if\
    \ self.agents[agent_id] == self.goal else 0\n```\n\n> 16 You can find a good example\
    \ that defines different observation and action spaces for multiple agents in\
    \ the RLlib documentation."
  mdcn: "一旦你选定了算法并希望优化其性能，`training()`中的算法特定配置就变得更加重要。实际上，RLlib为你提供了良好的默认设置以供入门。\n\
    \n有关配置RLlib实验的更多详细信息，请查阅[RLlib算法API参考文档](https://docs.ray.io/en/latest/rllib/rllib-algorithms.html)。但在我们进入示例之前，你应该了解实践中最常见的配置选项。\n\
    \n## 资源配置\n\n无论你是在本地还是在集群上使用Ray RLlib，你都可以指定训练过程所使用的资源。以下是需要考虑的最重要选项。我们继续以DQN算法为例，但这同样适用于任何其他RLlib算法：\n\
    \n```python\nfrom ray.rllib.algorithms.dqn import DQNConfig\n\nconfig = DQNConfig().resources(\n\
    \    num_gpus=1,  # ①\n    num_cpus_per_worker=2,  # ②\n    num_gpus_per_worker=0,\
    \  # ③\n)\n```\n\n- ① 指定用于训练的GPU数量。首先检查你选择的算法是否支持GPU非常重要。此值也可以是小数。例如，如果在DQN中使用四个rollout\
    \ workers（`num_rollout_workers=4`），你可以设置`num_gpus=0.25`，将所有四个workers打包到同一个GPU上，这样所有rollout\
    \ workers都能从潜在的加速中受益。这只影响本地学习者进程，不影响rollout workers。\n- ② 设置每个rollout worker使用的CPU数量。\n\
    - ③ 设置每个worker使用的GPU数量。\n\n## Rollout Worker配置\n\nRLlib允许你配置rollouts的计算方式及其分配方式：\n\
    \n```python\nfrom ray.rllib.algorithms.dqn import DQNConfig\n\nconfig = DQNConfig().rollouts(\n\
    \    num_rollout_workers=4,  # ①\n    num_envs_per_worker=1,  # ②\n    create_env_on_local_worker=True,\
    \  # ③\n)\n```\n\n- ① 你已经见过这个了。它指定了要使用的Ray workers数量。\n- ② 指定每个worker评估的环境数量。此设置允许你“批量”评估环境。特别是，如果你的模型评估时间很长，像这样对环境进行分组可以加速训练。\n\
    - ③ 当`num_rollout_workers > 0`时，驱动程序（“本地worker”）不需要环境。这是因为采样和评估由rollout workers完成。如果你仍然希望驱动程序上有一个环境，可以将此选项设置为True。\n\
    \n## 环境配置\n\n```python\nfrom ray.rllib.algorithms.dqn import DQNConfig\n\nconfig\
    \ = DQNConfig().environment(\n    env=\"CartPole-v1\",  # 1\n    env_config={\"\
    my_config\": \"value\"},  # 2\n    observation_space=None,\n    action_space=None,\
    \  # 3\n    render_env=True,  # 4\n)\n```\n\n- 1 指定你想要用于训练的环境。这可以是Ray RLlib已知环境的字符串，例如任何Gym环境，也可以是你实现的自定义环境的类名。15\n\
    - 2 可选地指定一个配置选项字典，该字典将传递给环境构造函数。\n- 3 你也可以指定环境的观察空间和动作空间。如果你不指定它们，它们将从环境中推断出来。\n\
    - 4 默认为False，此属性允许你开启环境渲染，这需要你实现环境的`render`方法。\n\n请注意，我们省略了每种列出类型中许多可用的配置选项。除此之外，我们在此介绍中无法涉及改变RL训练过程行为的方面（例如修改要使用的底层模型）。但好消息是，你将在[RLlib训练API文档](https://docs.ray.io/en/latest/rllib/rllib-training.html)中找到所有需要的信息。\n\
    \n15 还有一种方法可以*注册*你的环境，以便你可以通过名称引用它们，但这需要使用Ray Tune。你将在[第5章](https://example.com/chapter5)中了解此功能。\n\
    \n## 使用RLlib环境\n\n到目前为止，我们只向你介绍了Gym环境，但RLlib支持各种各样的环境。在快速概述所有可用选项（见图4-1）之后，我们将向你展示两个高级RLlib环境实际应用的具体示例。\n\
    \n### RLlib环境概述\n\n所有可用的RLlib环境都扩展了一个共同的BaseEnv类。如果你想使用同一个gym.Env环境的多个副本，可以使用RLlib的VectorEnv包装器。向量化环境很有用，但它们只是你已经见过的东西的简单推广。RLlib中可用的另外两种环境类型更有趣，值得更多关注。\n\
    \n![](img/6489687a3a178f2884963bddc928992c_106_0.png)\n\n第一种称为MultiAgentEnv，它允许你训练一个具有多个代理的模型。使用多个代理可能很棘手。因为你必须注意在环境中以合适的接口定义你的代理，并考虑到每个代理可能与其环境交互的方式完全不同。\n\
    \n更重要的是，代理可能相互交互，并且必须尊重彼此的动作。在更高级的设置中，甚至可能存在一个明确相互依赖的代理层次结构。简而言之，运行多代理RL实验很困难，我们将在下一个示例中看到RLlib如何处理这个问题。\n\
    \n我们将要研究的另一种环境类型称为ExternalEnv，可用于将外部模拟器连接到RLlib。例如，想象一下我们之前简单的迷宫问题是一个实际机器人在迷宫中导航的模拟。在这种场景中，将机器人（或其模拟，在不同的软件栈中实现）与RLlib的学习代理放在一起可能并不合适。为此，RLlib为你提供了一个简单的客户端-服务器架构，用于与外部模拟器通信，允许通过REST\
    \ API进行通信。如果你想同时在多代理和外部环境设置中工作，RLlib提供了一个结合两者的`MultiAgentExternalEnv`环境。\n\n###\
    \ 使用多个代理\n\n在RLlib中定义多代理环境的基本思想很简单。你首先为每个代理分配一个代理ID。然后，无论你之前在Gym环境中定义为单个值的内容（观察、奖励等），你现在都定义为一个以代理ID为键、每个代理对应一个值的字典。当然，实践中的细节比这更复杂一些。但一旦你定义了一个托管多个代理的环境，你就必须定义这些代理应该如何学习。\n\
    \n在单代理环境中，有一个代理和一个策略需要学习。在多代理环境中，有多个代理可能映射到一个或多个策略。例如，如果你的环境中有一组同质代理，那么你可以为所有代理定义一个单一策略。如果它们都以相同的方式*行动*，那么它们的行为可以以相同的方式学习。相反，你可能会遇到异质代理的情况，其中每个代理都必须学习一个单独的策略。在这两个极端之间，存在一系列可能性，如图4-2所示。\n\
    \n我们继续使用我们的迷宫游戏作为本章的持续示例。这样你可以自己检查接口在实践中如何不同。因此，为了将我们刚刚概述的想法转化为代码，让我们定义一个`GymEnvironment`类的多代理版本。我们的`MultiAgentEnv`类将恰好有两个代理，我们将其编码在一个名为`agents`的Python字典中，但原则上这适用于任意数量的代理。\n\
    \n![](img/6489687a3a178f2884963bddc928992c_107_0.png)\n\n*图4-2. 多代理强化学习问题中代理到策略的映射*\n\
    \n我们首先初始化并重置我们的新环境：\n\n```python\nfrom ray.rllib.env.multi_agent_env import MultiAgentEnv\n\

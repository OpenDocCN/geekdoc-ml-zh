  md: '# Training a Reinforcement Learning Model


    Imagine we have a set of experiences that we''ve collected from a couple of games.
    What would be a smart way to update the values in the `state_action_table` of
    our Policy? Here''s one idea. Let''s say you''re sitting at position (3,5), and
    you''ve decided to go right, which puts you at (4,5), just one step away from
    the goal. Clearly you could then just go right and collect a reward of 1. That
    must mean the current state you''re in, combined with an action of going “right,”
    should have a high value. In other words, the value of this particular state-action
    pair should be high. In contrast, moving left in the same situation does not lead
    to anything, and the corresponding state-action pair should have a low value.


    More generally, let''s say you were in a given state, you decided to take an action,
    leading to a reward, and you''re then in `next_state`. Remember that this is how
    we defined an experience. With our `policy.state_action_table` we can peek a little
    ahead and see if we can expect to gain anything from actions taken from `next_state`.
    That is, we can compute:


    ```

    next_max = np.max(policy.state_action_table[next_state])

    ```


    How should we compare the knowledge of this value to the current state-action
    value, which is `value = policy.state_action_table[state][action]`? There are
    many ways to go about this, but we clearly can''t completely discard the current
    value and put too much trust in `next_max`. After all, this is just a single piece
    of experience we''re using here. So as a first approximation, why don''t we simply
    compute a weighted sum of the old and the expected value and go with `new_value
    = 0.9 * value + 0.1 * next_max`? Here, the values 0.9 and 0.1 have been chosen
    somewhat arbitrarily; the only important pieces are that the first value is high
    enough to reflect our preference to keep the old value and that both weights sum
    to 1. That formula is a good starting point, but the problem is that we''re not
    at all factoring in the crucial information that we''re getting from the reward.
    In fact, we should put more trust in the current `reward` value than in the projected
    `next_max` value, so it''s a good idea to discount the latter a little, let''s
    say by 10%. Updating the state-action value would then look like this:


    ```

    new_value = 0.9 * value + 0.1 * (reward + 0.9 * next_max)

    ```


    Depending on your level of experience with this kind of reasoning, the last few
    paragraphs might be a lot to digest. If you''ve understood the explanations up
    to this point, the remainder of this chapter will likely come easily to you. Mathematically,
    this was the last (and only) hard part of this example. If you''ve worked with
    RL before, you will have noticed that this is an implementation of the so-called
    Q-Learning algorithm. It''s called that because the state-action table can be
    described as a function Q(state, action) that returns values for these pairs.'

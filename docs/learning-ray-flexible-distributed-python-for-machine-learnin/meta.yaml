    \            ),\n        )\n```\n\n1.  训练循环首先定义了使用的模型、损失函数和优化器。注意这里使用了 prepare_model。\n\
    2.  在此 worker 上加载训练数据集分片，并创建一个包含其数据批次的迭代器。\n3.  根据我们之前的定义，我们的数据是一个具有 \"image\"\
    \ 和 \"label\" 列的 Pandas DataFrame。\n4.  在训练循环中计算前向和反向传播，就像我们使用任何 PyTorch 模型一样。\n\
    5.  跟踪每 1,000 个训练批次的运行损失项。\n6.  最后，通过传递一个包含当前模型状态的 Checkpoint，使用我们的 AIR session\
    \ 报告此损失。\n\n考虑到我们正在执行一个相当标准的训练过程，这个函数的定义可能感觉有点长。虽然在这种情况下为 PyTorch 模型创建一个简单的包装器当然是可能的，但定义你自己的训练循环可以让你完全自定义以处理更复杂的场景。我们将\
    \ training_loop 传递给 AIR trainer 的 train_loop_per_worker 参数，并通过将包含必要键的字典传递给 train_loop_config\
    \ 来指定此循环的配置。\n\n为了使事情更有趣并展示另一个 Ray 集成，我们将通过向我们的 RunConfig 传递一个回调来将 TorchTrainer\
    \ 训练运行的结果记录到 MLflow，即一个 MLflowLoggerCallback：\n\n```python\nfrom ray.train.torch\
    \ import TorchTrainer\nfrom ray.air.config import ScalingConfig, RunConfig\nfrom\
    \ ray.air.callbacks.mlflow import MLflowLoggerCallback\n\ntrainer = TorchTrainer(\n\
    \    train_loop_per_worker=train_loop,\n    train_loop_config={\"batch_size\"\
    : 10, \"epochs\": 5},\n    datasets={\"train\": train_dataset},\n    scaling_config=ScalingConfig(num_workers=2),\n\
    \    run_config=RunConfig(callbacks=[\n        MLflowLoggerCallback(experiment_name=\"\
    torch_trainer\")\n    ])\n)\nresult = trainer.fit()\n```\n\n你也可以通过向你的 AIR Trainer\
    \ 或 Tuner 传递类似的回调来使用其他第三方日志库，例如 *Weights & Biases* 或 *CometML*。⁴\n\n² 你可以在 Ray\
    \ Datasets 文档中看到持续更新的支持格式列表。Datasets 支持的输出格式与输入格式在很大程度上重叠。\n\n³ 例如，使用 WandbLoggerCallback，你不仅可以将训练结果记录到\
    \ Weights & Biases，还可以自动上传你的检查点，如本 Ray 教程所示。"

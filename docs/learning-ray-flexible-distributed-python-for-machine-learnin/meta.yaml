  - "[PAGE 240]\n\nthe neural network Net should be straightforward. If you don't,\
    \ it suffices to know that to define a torch.nn.Module the only thing you need\
    \ to provide is the definition of a forward pass of your neural net:\n\n```\n\
    import torch\nimport torch.nn as nn\nimport torch.nn.functional as F\n\nclass\
    \ Net(nn.Module):\n    def __init__(self):\n        super().__init__()\n     \
    \   self.conv1 = nn.Conv2d(3, 6, 5)\n        self.pool = nn.MaxPool2d(2, 2)\n\
    \        self.conv2 = nn.Conv2d(6, 16, 5)\n        self.fc1 = nn.Linear(16 * 5\
    \ * 5, 120)\n        self.fc2 = nn.Linear(120, 84)\n        self.fc3 = nn.Linear(84,\
    \ 10)\n\n    def forward(self, x):\n        x = self.pool(F.relu(self.conv1(x)))\n\
    \        x = self.pool(F.relu(self.conv2(x)))\n        x = torch.flatten(x, 1)\n\
    \        x = F.relu(self.fc1(x))\n        x = F.relu(self.fc2(x))\n        x =\
    \ self.fc3(x)\n        return x\n```\n\nYou already know that to define an AIR\
    \ TorchTrainer for our Net you need a training dataset, a scaling, and an optional\
    \ run configuration.³ You also need to tell AIR what each worker should do when\
    \ calling fit, by defining an explicit training loop that grants you maximal flexibility\
    \ for your training process. The training function takes a config dictionary that\
    \ we can use to specify properties at runtime.\n\nThe training loop we're using\
    \ here is just what you would expect: we simply load the model and the data on\
    \ each worker and then train on batches of data for a specified number of epochs\
    \ (while reporting the training progress). That's a fairly standard training loop,\
    \ but there are a couple of crucial spots at which you have to be careful:\n\n\
    +   - To load the model on a worker, use the `prepare_model` utility from `ray.train.torch`\
    \ on our `Net()`.\n- To access the data shard available to the worker, access\
    \ `get_dataset_shard` on your current `ray.air.session`. For training, we use\
    \ the \"train\" key of that shard and transform it to batches of the right size\
    \ using `iter_torch_batches`."
  - "[PAGE 241]\n\n+   - To pass information about the training metrics you're interested\
    \ in, use session.report from AIR.\n\nHere's the full definition of our PyTorch\
    \ training loop for each worker:\n\n```\nfrom ray import train\nfrom ray.air import\
    \ session, Checkpoint\n\ndef train_loop(config):\n    model = train.torch.prepare_model(Net())\n\
    \    loss_fct = nn.CrossEntropyLoss()\n    optimizer = torch.optim.SGD(model.parameters(),\
    \ lr=0.001, momentum=0.9)\n\n    train_batches = session.get_dataset_shard(\"\
    train\").iter_torch_batches(\n        batch_size=config[\"batch_size\"],\n   \
    \ )\n\n    for epoch in range(config[\"epochs\"]):\n        running_loss = 0.0\n\
    \        for i, data in enumerate(train_batches):\n            inputs, labels\
    \ = data[\"image\"], data[\"label\"]\n\n            optimizer.zero_grad()\n  \
    \          forward_outputs = model(inputs)\n            loss = loss_fct(forward_outputs,\
    \ labels)\n            loss.backward()\n            optimizer.step()\n\n     \
    \       running_loss += loss.item()\n            if i % 1000 == 0:\n         \
    \       print(f\"[{epoch + 1}, {i + 1:4d}] loss: \"\n                      f\"\
    {running_loss / 1000:.3f}\")\n                running_loss = 0.0\n\n        session.report(\n\
    \            dict(running_loss=running_loss),\n            checkpoint=Checkpoint.from_dict(\n\
    \                dict(model=model.module.state_dict())\n            ),\n     \
    \   )\n```\n\n❶ The training loop defines the model, loss, and optimizer used\
    \ first. Note the use of prepare_model here.\n\n❷ Load the train dataset shard\
    \ on this worker and create an iterator containing batches of data from it."

  md: "# Configuring RLlib Experiments\n\nNow that you've seen the basic Python training\
    \ API of RLlib in an example, let's take a step back and discuss in more depth\
    \ how to configure and run RLlib experiments. By now you know that to define an\
    \ Algorithm, you start with the respective AlgorithmConfig and then build your\
    \ algorithm from it. So far we've used only the rollout method of an AlgorithmConfig\
    \ to set the number of rollout workers to two, and set our environment accordingly.\n\
    \nIf you want to alter the behavior of your RLlib training run, chain more utility\
    \ methods onto the AlgorithmConfig instance and then call build on it at the end.\
    \ As RLlib algorithms are fairly complex, they come with many configuration options.\
    \ To make things easier, the common properties of algorithms are naturally grouped\
    \ into useful categories.14 Each such category comes with its own respective AlgorithmConfig\
    \ method:\n\n+   - **training()**\n  Takes care of all training-related configuration\
    \ options of your algorithm. The training method is the one place that RLlib algorithms\
    \ differ in their configuration. All the following methods are algorithm-agnostic.\n\
    - **environment()**\n  Configures all aspects of your environment.\n- **rollouts()**\n\
    \  Modifies the setup and behavior of your rollout workers.\n- **exploration()**\n\
    \  Alters the behavior of your exploration strategy.\n- **resources()**\n  Configures\
    \ the compute resources used by your algorithm.\n- **offline_data()**\n  Defines\
    \ options for training with so-called offline data, a topic we cover in \"Working\
    \ with Offline Data\" on page 97.\n- **multi_agent()**\n  Specifies options for\
    \ training algorithms using *multiple agents*. We discuss an explicit example\
    \ of this in the next section.\n\n14 We list only the methods we introduce in\
    \ this chapter. Apart from those we mention, you also find options for evaluation\
    \ of your algorithms, reporting, debugging, checkpointing, adding callbacks, altering\
    \ your deep learning framework, requesting resources, and accessing experimental\
    \ features."
  merge: -1

  - "[PAGE 174]\n\n# Preprocessing with Ray Train\n\nData preprocessing is a common\
    \ technique for transforming raw data into features for an ML model, and we've\
    \ seen many examples in this and the previous chapter. So far we've “manually”\
    \ preprocessed our data by writing custom functions to transform our data into\
    \ the right format. But Ray Train has several built-in preprocessors for common\
    \ use cases and also provides interfaces to define your own custom logic.\n\n\
    The `Preprocessor` is the core class offered by Ray Train for handling data preprocessing.\
    \ Each preprocessor has the following APIs:\n\n+   - `.transform()`\n  Used to\
    \ process and apply a processing transformation to a dataset.\n- `.fit()`\n  Used\
    \ to calculate and store aggregate state about the dataset on a preprocessor.\
    \ Returns `self` for chaining.\n- `.fit_transform()`\n  Syntactic sugar for performing\
    \ transformations that require aggregate state. May be optimized at the implementation\
    \ level for specific preprocessors.\n- `.transform_batch()`\n  Used to apply the\
    \ same transformation on batches for prediction.\n\nWe often want to make sure\
    \ we can use the same data preprocessing operations at training time and at serving\
    \ time. Training-serving skew, a major problem in deploying ML, describes a situation\
    \ where there is a difference between performance during training and performance\
    \ during serving. This skew is often caused by a discrepancy between how you handle\
    \ data in the training and serving pipelines. Thus, you want to make sure you\
    \ have consistent data handling for training and serving.\n\nYou can use the preceding\
    \ preprocessors by passing them to the constructor of a trainer. That means once\
    \ you've created a preprocessor, you don't have to apply it to your Ray Datasets\
    \ manually. Instead, you can pass it to your trainer, and Ray Train will take\
    \ care of applying it in a distributed fashion. Here is how this works schematically:\n\
    \n```\nfrom ray.data.preprocessors import StandardScaler\nfrom ray.train.xgboost\
    \ import XGBoostTrainer\n\ntrainer = XGBoostTrainer(\n    preprocessor=StandardScaler(...),\n\
    \    # ...\n)\nresult = trainer.fit()\n```"
- md: "Some preprocessing operators such as one-hot encoders are easy to run in training\
    \ and transfer to serving. However, other operators such as those that do standardization\
    \ are a bit trickier, since you don't want to do large data crunching (to find\
    \ the mean of a particular column) during serving time.\n\nFortunately, the Ray\
    \ Train preprocessors are serializable so you can easily get consistency from\
    \ training to serving just by serializing these operators. For instance, you can\
    \ simply pickle a preprocessor like this:\n\n```python\nimport pickle\nfrom ray.data.preprocessors\
    \ import StandardScaler\n\npreprocessor = StandardScaler(...)\npickle.dumps(preprocessor)\n\
    ```\n\nNext, let's discuss a concrete example of a training procedure using preprocessors,\
    \ by also showing you how to tune your Trainer's hyperparameters.\n\n## Integrating\
    \ Trainers with Ray Tune\n\nRay Train provides an integration with Ray Tune that\
    \ allows you to perform HPO in just a few lines of code. Tune will create one\
    \ trial per hyperparameter configuration. In each trial, a new Trainer will be\
    \ initialized and run the training function with its generated configuration.\n\
    \nIn the following code, we create an XGBoostTrainer and specify hyperparameter\
    \ ranges for common hyperparameters. Specifically, we're going to choose between\
    \ two different preprocessors in our training scenario. To be precise, we will\
    \ use a StandardScaler, which translates and scales each specified column by its\
    \ mean and standard deviation (the resulting columns will thus follow a standard\
    \ normal distribution) and MinMaxScaler, which simply scales each column to the\
    \ range [0, 1].\n\nHere's the corresponding parameter space we will search over\
    \ next:\n\n```python\nimport ray\n\nfrom ray.air.config import ScalingConfig\n\
    from ray import tune\nfrom ray.data.preprocessors import StandardScaler, MinMaxScaler\n\
    \ndataset = ray.data.from_items(\n    [{\"X\": x, \"Y\": 1} for x in range(0,\
    \ 100)] +\n    [{\"X\": x, \"Y\": 0} for x in range(100, 200)]\n)\nprep_v1 = StandardScaler(columns=[\"\
    X\"])\nprep_v2 = MinMaxScaler(columns=[\"X\"])\n\nparam_space = {\n    \"scaling_config\"\
    : ScalingConfig(\n        num_workers=tune.grid_search([2, 4]),\n        resources_per_worker={\n\
    \            \"CPU\": 2,\n            \"GPU\": 0,\n        },\n    ),\n    \"\
    preprocessor\": tune.grid_search([prep_v1, prep_v2]),\n    \"params\": {\n   \
    \     \"objective\": \"binary:logistic\",\n        \"tree_method\": \"hist\",\n\
    \        \"eval_metric\": [\"logloss\", \"error\"],\n        \"eta\": tune.loguniform(1e-4,\
    \ 1e-1),\n        \"subsample\": tune.uniform(0.5, 1.0),\n        \"max_depth\"\
    : tune.randint(1, 9),\n    },\n}\n```\n\nWe can now create a Trainer as before,\
    \ this time going with an XGBoostTrainer and then passing it to an instance of\
    \ a Tuner from Ray Tune, which we can `.fit()` just like the trainer itself:\n\
    \n```python\nfrom ray.train.xgboost import XGBoostTrainer\nfrom ray.air.config\
    \ import RunConfig\nfrom ray.tune import Tuner\n\ntrainer = XGBoostTrainer(\n\
    \    params={},\n    run_config=RunConfig(verbose=2),\n    preprocessor=None,\n\
    \    scaling_config=None,\n    label_column=\"Y\",\n    datasets={\"train\": dataset}\n\
    )\n\ntuner = Tuner(\n    trainer,\n    param_space=param_space,\n)\n\nresults\
    \ = tuner.fit()\n```\n\nNote that we're using another component of a Ray Trainer\
    \ here that you haven't seen before, the RunConfig. This configuration is used\
    \ for all runtime options of a Trainer, in our case the log verbosity of the experiment\
    \ (0 would be silent; 1 gives only status updates; 2, the default, gives status\
    \ updates and brief results; and 3 gives detailed results).\n\nCompared to other\
    \ distributed hyperparameter tuning solutions, Ray Tune and Ray Train have some\
    \ unique features. Ray's solution is fault-tolerant, and it has the ability to\
    \ specify the dataset and preprocessor as a parameter, as well as to adjust the\
    \ number of workers during training time.\n\n## Using Callbacks to Monitor Training\n\
    \nTo explore one more feature of Ray Train, you may want to plug in your training\
    \ code with your favorite experiment management framework. Ray Train provides\
    \ an interface to fetch intermediate results and callbacks to process or log them.\
    \ It comes with built-in callbacks for popular tracking frameworks, but you can\
    \ implement your own callback via Tune's LoggerCallback interface.\n\nFor instance,\
    \ you can log results in JSON format using the JsonLoggerCallback, to TensorBoard\
    \ using the TBXLoggerCallback, or to MLflow using the MLFlowLoggerCallback. The\
    \ following example shows how you can use all three in one single training run\
    \ by specifying a list of callbacks:\n\n```python\nfrom ray.air.callbacks.mlflow\
    \ import MLflowLoggerCallback\nfrom ray.tune.logger import TBXLoggerCallback,\
    \ JsonLoggerCallback\n\ntraining_loop = ...\ntrainer = ...\n\ntrainer.fit(\n \
    \   training_loop,\n    callbacks=[\n        MLflowLoggerCallback(),\n       \
    \ TBXLoggerCallback(),\n        JsonLoggerCallback()\n    ]\n)\n```\n\n## Summary\n\
    \nIn this chapter, we've discussed the basics of distributed model training and\
    \ showed you how to run data-parallel training with Ray Train. We walked you through\
    \ an extensive example that used both Ray Data and Ray Train on an interesting\
    \ dataset. Specifically, we demonstrated how to use Dask on Ray to load, preprocess,\
    \ and featurize your datasets, and then use Ray Train to run a distributed PyTorch\
    \ training loop. We then discussed Ray Trainers in more detail and showed how\
    \ they integrate with Ray Tune via Tuners, how you can use them with preprocessors,\
    \ and how you can use callbacks to monitor training.\n\n3 MLflow and TensorBoard\
    \ are open source projects for ML experiment tracking and visualization. They\
    \ are very useful for monitoring the progress of your machine learning model.\n\
    \n# CHAPTER 8\n\n## Online Inference with Ray Serve\n\nEdward Oakes\n\nIn Chapters\
    \ 6 and 7 you learned how to use Ray to process data, train ML models, and apply\
    \ them in a batch inference setting. However, many of the most exciting use cases\
    \ for machine learning involve *online inference*.\n\nOnline inference is the\
    \ process of using ML models to enhance API endpoints that users interact with\
    \ directly or indirectly. This is important in situations where latency matters:\
    \ you can't simply apply models to data behind the scenes and serve the results.\
    \ There are many real-world examples of use cases where online inference can provide\
    \ a lot of value, for example:\n\n*Recommendation systems*\nProviding recommendations\
    \ for products (e.g., online shopping) or content (e.g., social media) is a bread-and-butter\
    \ use case for machine learning. While it's possible to do this offline, recommendation\
    \ systems often benefit from reacting to users' preferences in real time. This\
    \ requires performing online inference using recent behavior as a key feature.\n\
    \n*Chat bots*\nOnline services often have real-time chat windows to provide support\
    \ to customers from the comfort of their keyboard. Traditionally, these chat windows\
    \ were staffed by customer support staff, but a recent trend to reduce labor costs\
    \ and improve time-to-resolution is replacing them with ML-powered chat bots that\
    \ can be online 24/7. These chat bots require a sophisticated mix of multiple\
    \ machine learning techniques and must be able to respond to customer input in\
    \ real time.\n\n*Estimating arrival times*\nRide sharing, navigation, and food\
    \ delivery services all rely on being able to provide an accurate estimate of\
    \ arrival times (e.g., for your driver, yourself, or your dinner). Providing accurate\
    \ estimates is very difficult because it requires accounting for real-world factors\
    \ such as traffic patterns, weather, and accidents. Estimates are also refreshed\

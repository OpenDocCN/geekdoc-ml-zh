  md: "a reference between them. Each of these deployments can use all of the features\
    \ we've discussed up to this point: they can be independently scaled, perform\
    \ request batching, and use flexible resource allocations.\n\nThis section illustrates\
    \ common multimodel serving patterns but doesn't actually contain any ML models\
    \ yet. The focus is on the core capabilities that Serve provides.\n\n# Core feature:\
    \ binding multiple deployments\n\nAll types of multimodel inference graphs in\
    \ Ray Serve center around the ability to pass a reference to one deployment into\
    \ the constructor of another. To do this, we use another feature of the .bind()\
    \ API: a bound deployment can be passed to another call to .bind(), and this will\
    \ resolve to a “handle” to the deployment at runtime. This enables deployments\
    \ to be deployed and instantiated independently and then call each other at runtime.\
    \ Here is the most basic example of a multideployment Serve application:\n\n```\n\
    @serve.deployment\nclass DownstreamModel:\n    def __call__(self, inp: str):\n\
    \        return \"Hi from downstream model!\"\n\n@serve.deployment\nclass Driver:\n\
    \    def __init__(self, downstream):\n        self._d = downstream\n\n    async\
    \ def __call__(self, *args) -> str:\n        return await self._d.remote()\n\n\
    downstream = DownstreamModel.bind()\ndriver = Driver.bind(downstream)\n```\n\n\
    In this example, the downstream model is passed into the “driver” deployment.\
    \ Then at runtime the driver deployment calls into the downstream model. The driver\
    \ could take any number of models passed in, and the downstream model could even\
    \ take other downstream models of its own.\n\n# Pattern 1: Pipelining\n\nThe first\
    \ common multimodel pattern among ML applications is “pipelining”: calling multiple\
    \ models in sequence, where the input of one model depends on the output of the\
    \ previous. Image processing, for example, often consists of a pipeline with multiple\
    \ stages of transformations such as cropping, segmentation, and object recognition\
    \ or optical character recognition (OCR). Each of these models may have different"
  merge: -1
  pgno: 188
- img_proc: true
  md: "properties, with some of them being lightweight transformations that can run\
    \ on a CPU and others being heavyweight deep learning models that run on a GPU.\n\
    \nSuch pipelines can easily be expressed using Serve's API. Each stage of the\
    \ pipeline is defined as an independent deployment, and each deployment is passed\
    \ into a top-level “pipeline driver.” In the following example, we pass two deployments\
    \ into a top-level driver, and the driver calls them in sequence. Note that many\
    \ requests to the driver could be happening concurrently; therefore, it is possible\
    \ to efficiently saturate all stages of the pipeline:\n\n```\n@serve.deployment\n\
    class DownstreamModel:\n    def __init__(self, my_val: str):\n        self._my_val\
    \ = my_val\n\n    def __call__(self, inp: str):\n        return inp + \"|\" +\
    \ self._my_val\n\n\n@serve.deployment\nclass PipelineDriver:\n    def __init__(self,\
    \ model1, model2):\n        self._m1 = model1\n        self._m2 = model2\n\n \
    \   async def __call__(self, *args) -> str:\n        intermediate = self._m1.remote(\"\
    input\")\n        final = self._m2.remote(intermediate)\n        return await\
    \ final\n\n\nm1 = DownstreamModel.bind(\"val1\")\nm2 = DownstreamModel.bind(\"\
    val2\")\npipeline_driver = PipelineDriver.bind(m1, m2)\n```\n\nTo test this example,\
    \ you can once again use the serve run API. Sending a test request to the pipeline\
    \ returns \"'input|val1|val2'\" as output: each downstream “model” appended its\
    \ own value to construct the final result. In practice, each of these deployments\
    \ could be wrapping its own ML model, and a single request may flow across many\
    \ physical nodes in a cluster.\n\n# Pattern 2: Broadcasting\n\nIn addition to\
    \ sequentially chaining models together, it’s often useful to broadcast an input\
    \ or intermediate result to multiple models in parallel. This could be to perform\
    \ “ensembling,” or combining the results of multiple independent models into a\
    \ single result, or used in a situation where different models may perform better\
    \ on different inputs. Often the results of the models need to be combined in\
    \ some way into a final result: either simply concatenated or maybe a single result\
    \ chosen from the lot."

- md: "## Model Serving\n\nThe last of Ray's high-level libraries we'll discuss specializes\
    \ in model serving and is simply called *Ray Serve*. To see an example of it in\
    \ action, you need a trained ML model to serve. Luckily, nowadays, you can find\
    \ many interesting models on the internet that have already been trained for you.\
    \ For instance, Hugging Face has a variety of models available for you to download\
    \ directly in Python. The model we'll use is a language model called *GPT-2* that\
    \ takes text as input and produces text to continue or complete the input. For\
    \ example, you can prompt a question and GPT-2 will try to complete it.\n\nServing\
    \ such a model is a good way to make it accessible. You may not know how to load\
    \ and run a TensorFlow model on your computer, but you do know how to ask a question\
    \ in plain English. Model serving hides the implementation details of a solution\
    \ and lets users focus on providing inputs and understanding outputs of a model.\n\
    \nTo proceed, make sure to run `pip install transformers` to install the Hugging\
    \ Face library that has the model we want to use.17 With that we can now import\
    \ and start an instance of Ray's serve library, load and deploy a GPT-2 model,\
    \ and ask it for the meaning of life, like so:\n\n```\nfrom ray import serve\n\
    from transformers import pipeline\nimport requests\n\nserve.start() ❶\n\n@serve.deployment\
    \ ❷\ndef model(request):\n    language_model = pipeline(\"text-generation\", model=\"\
    gpt2\") ❸\n    query = request.query_params[\"query\"]\n    return language_model(query,\
    \ max_length=100) ❹\n\nmodel.deploy() ❺\n\nquery = \"What's the meaning of life?\"\
    \nresponse = requests.get(f\"http://localhost:8000/model?query={query}\") ❻\n\
    print(response.text)\n```\n\n17 Depending on the operating system you're using,\
    \ you may need to install the Rust compiler first to make this work. For instance,\
    \ on a Mac, you can install it with `brew install rust`.\n\n1. Start serve locally.\n\
    2. The @serve.deployment decorator turns a function with a request parameter into\
    \ a serve deployment.\n3. Loading language_model inside the model function for\
    \ every request is inefficient, but it's the quickest way to show you a deployment.\n\
    4. Ask the model to give us at most 100 characters to continue our query.\n5.\
    \ Formally deploy the model so that it can start receiving requests over HTTP.\n\
    6. Use the indispensable requests library to get a response for any question you\
    \ might have.\n\nIn Chapter 9 you will learn how to properly deploy models in\
    \ various scenarios, but for now we encourage you to play around with this example\
    \ and test different queries. Running the last two lines of code repeatedly will\
    \ give you different answers practically every time. Here's a darkly poetic gem,\
    \ raising more questions, from one query that we've slightly censored for underaged\
    \ readers:\n\n```\n[{\n    \"generated_text\": \"What's the meaning of life?\\\
    n\\nIs there one way or another of living?\\n\\nHow does it feel to be trapped\
    \ in a relationship?\\n\\nHow can it be changed before it's too late?\\n\\nWhat\
    \ did we call it in our time?\\n\\nWhere do we fit within this world and what\
    \ are we going to live for?\\n\\nMy life as a person has been shaped by the love\
    \ I've received from others.\"\n}]\n```\n\nThis concludes our whirlwind tour of\
    \ Ray's data science libraries, the second of Ray's layers. Ultimately, all high-level\
    \ Ray libraries presented in this chapter are extensions of the Ray Core API.\
    \ Ray makes it relatively easy to build new extensions, and there are a few more\
    \ that we can't discuss in full in this book. For instance, there is the relatively\
    \ recent addition of Ray Workflows, which allows you to define and run long-running\
    \ applications with Ray.\n\nBefore we wrap up this chapter, let's have a very\
    \ brief look at the third layer, the growing ecosystem around Ray.\n\n## A Growing\
    \ Ecosystem\n\nRay's high-level libraries are powerful and deserve a much deeper\
    \ treatment throughout the book. While their usefulness for the data science experimentation\
    \ lifecycle is undeniable, we also don't want to give the impression that Ray\
    \ is all you need from now on. No surprise, the best and most successful frameworks\
    \ are the ones that integrate well with existing solutions and ideas. It's better\
    \ to focus on your core strengths and leverage other tools for what's missing\
    \ in your solution, and Ray does this quite well.\n\nThroughout the book, and\
    \ in Chapter 11 in particular, we will discuss many useful third-party libraries\
    \ built on top of Ray. The Ray ecosystem also has a lot of integrations with existing\
    \ tools. To give you an example of that, recall that Ray Datasets is Ray's data\
    \ loading and compute library. If you happen to have an existing project that\
    \ already uses data processing engines like Spark or Dask,18 you can use those\
    \ tools together with Ray. Specifically, you can run the entire Dask ecosystem\
    \ on top of a Ray Cluster using the Dask-on-Ray scheduler, or you can use the\
    \ Spark on Ray project to integrate your Spark workloads with Ray. Likewise, the\
    \ Modin project is a distributed drop-in replacement for Pandas DataFrames that\
    \ uses Ray (or Dask) as a distributed execution engine (\"Pandas on Ray\").\n\n\
    The common theme here is that Ray doesn't try to replace all these tools, but\
    \ rather integrates with them while still giving you access to its native Ray\
    \ Datasets library. We'll go into much more detail about the relationship of Ray\
    \ with other tools in the broader ecosystem in Chapter 11.\n\nOne important aspect\
    \ of many Ray libraries is that they seamlessly integrate common tools as *backends*.\
    \ Ray often creates common interfaces, instead of trying to create new standards.19\
    \ These interfaces allow you to run tasks in a distributed fashion, a property\
    \ most of the respective backends don't have, or not to the same extent. For instance,\
    \ Ray RLlib and Train are backed by the full power of TensorFlow and PyTorch.\
    \ And Ray Tune supports algorithms from practically every notable HPO tool available,\
    \ including Hyperopt, Optuna, Nevergrad, Ax, SigOpt, and many others. None of\
    \ these tools is distributed by default, but Tune unifies them in a *common interface\
    \ for distributed workloads*.\n\n18 Spark was created by another lab in Berkeley,\
    \ AMPLab. The internet is full of blog posts claiming that Ray should therefore\
    \ be seen as a replacement of Spark. It's better to think of them as tools with\
    \ different strengths that are both likely here to stay.\n\n19 Before the deep\
    \ learning framework Keras became an official part of TensorFlow, it started out\
    \ as a convenient API specification for various lower-level frameworks such as\
    \ Theano or CNTK. In that sense, Ray RLlib has the chance to become \"Keras for\
    \ RL,\" and Ray Tune might just be \"Keras for HPO.\" The missing piece for more\
    \ adoption might just be a more elegant API for both.\n\n## Summary\n\nFigure\
    \ 1-4 gives you an overview of the three layers of Ray as we laid them out. Ray’s\
    \ core distributed execution engine sits at the center of the framework. The Ray\
    \ Core API is a versatile library for distributed computing, and Ray Clusters\
    \ allow you to deploy your workloads in a variety of ways.\n\nFor practical data\
    \ science workflows you can use Ray Datasets for data processing, Ray RLib for\
    \ reinforcement learning, Ray Train for distributed model training, Ray Tune for\
    \ hyperparameter tuning, and Ray Serve for model serving. You’ve seen examples\
    \ for each of these libraries and have an idea of what their APIs entail. Ray\
    \ AIR provides a unified API for all other Ray ML libraries and was built with\
    \ the needs of data scientists in mind.\n\nOn top of that, Ray’s ecosystem has\
    \ many extensions, integrations, and backends that we’ll look more into later.\
    \ Maybe you can already spot a few tools you know and like in Figure 1-4?\n\n\
    ![](img/6489687a3a178f2884963bddc928992c_42_0.png)\n\nThe Ray Core API sits at\
    \ the center of Figure 1-4, surrounded by the libraries RLib, Ray Tune, Ray Train,\
    \ Ray Serve, Ray Datasets, and the many third-party integrations that are too\
    \ many to list here.\n\n# CHAPTER 2\nGetting Started with Ray Core\n\nFor a book\
    \ on distributed Python, it’s not without a certain irony that Python on its own\
    \ is largely ineffective for distributed computing. Its interpreter is effectively\
    \ single threaded. For instance, this makes it difficult to leverage multiple\
    \ CPUs on the same machine, let alone a whole cluster of machines, using plain\
    \ Python. That means you need extra tooling, and luckily the Python ecosystem\
    \ has some options for you. Libraries like multiprocessing can help you distribute\
    \ work on a single machine,1 but not beyond.\n\nSeen as a Python library, the\
    \ Ray Core API is powerful enough to make general distributed programming more\
    \ accessible to the Python community as a whole. By way of analogy, some companies\
    \ get by with deploying pretrained ML models for their use cases, but that strategy\
    \ is not always effective. It’s often inevitable to need to train custom models\
    \ to be successful. In the same way, your distributed workloads *might* just fit\
    \ into the (potentially limiting) programming model of existing frameworks, but\
    \ Ray Core can unlock the full spectrum of building distributed applications,\
    \ due to its generality.2 As it is so fundamental, we dedicate this whole chapter\
    \ to the basics of Ray Core and spend all of Chapter 3 on building an interesting\
    \ application with the Core API. This way you’re equipped with practical knowledge\
    \ about Ray Core and can use it in later chapters and your own projects.\n\nIn\
    \ this chapter you’ll understand how Ray Core handles distributed computing by\
    \ spinning up a local cluster, and you’ll learn how to use Ray’s lean and powerful\
    \ API to parallelize some interesting computations. For instance, you’ll build\
    \ an example that\n\n1 Note that Ray comes with a drop-in replacement for multiprocessing\
    \ that you might find useful for certain workloads.\n2 This represents a trade-off\
    \ in terms of generality versus specialization. By also providing specialized\
    \ yet interoperable libraries on top of the Core API, Ray provides tooling at\
    \ various levels of abstraction."
  mdcn: "## 模型服务\n\n我们将讨论的Ray高级库中，最后一个专门用于模型服务，简称为*Ray Serve*。要查看其实际应用示例，你需要一个训练好的机器学习模型来提供服务。幸运的是，如今你可以在互联网上找到许多已经为你训练好的有趣模型。例如，Hugging\
    \ Face提供了多种模型供你直接在Python中下载。我们将使用的模型是一个名为*GPT-2*的语言模型，它以文本作为输入，并生成文本以继续或完成输入。例如，你可以提出一个问题，GPT-2会尝试完成它。\n\

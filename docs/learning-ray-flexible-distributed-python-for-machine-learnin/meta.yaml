- img_proc: true
  md: 'Note that internally Tune runs are started on the driver process of your Ray
    Cluster, which spawns several worker processes (using Ray actors) that execute
    individual trials of your HPO experiment. Your trainables, defined on the driver,
    have to be sent to the workers, and trial results need to be communicated to the
    driver running `tune.run(...)`.


    Search spaces, trainables, trials, and analyses don''t need much additional explanation,
    and we''ll see more examples of each of those components in the rest of this chapter.
    But search algorithms, *searchers* for short, and schedulers need a bit more elaboration.


    # Search algorithms


    All advanced search algorithms provided by Tune, and the many third-party HPO
    libraries it integrates with, fall under the umbrella of *Bayesian optimization*.
    Unfortunately, going into the details of specific Bayesian search algorithms is
    far beyond the scope of this book. The basic idea is that you update your beliefs
    about which hyperparameter ranges are worth exploring based on the results of
    your previous trials. Techniques using this principle make more informed decisions
    and, hence, tend to be more efficient than independently sampling parameters (e.g.,
    at random).


    Apart from the basic random search we''ve seen already, and *grid search*, which
    picks hyperparameters from a predefined "grid" of choices, Tune integrates with
    a wide range of Bayesian optimization searchers. For instance, Tune integrates
    with the popular Hyperopt and Optuna libraries,² and you can use the popular TPE
    (Tree-structured Parzen Estimator) searcher with Tune through both of these libraries.
    Not only that, Tune also integrates with tools such as Ax, BlendSearch, FLAML,
    Dragonfly, scikit-Optimize, Bayesian optimization, HpBandSter, Nevergrad, ZOOpt,
    SigOpt, and HEBO. If you need to run HPO experiments with any of these tools on
    a cluster or want to easily switch between them, Tune is the way to go.


    To make things more concrete, let''s rewrite our basic random search Tune example
    from earlier to use the Bayesian optimization library. To do so, make sure you
    install this library in your Python environment first, e.g., with `pip install
    bayesian-optimization`:


    ```

    from ray.tune.suggest.bayesopt import BayesOptSearch


    algo = BayesOptSearch(random_search_steps=4)

    ```


    > ² In open source software, it''s important to determine who is responsible for
    maintaining an integration. We will discuss this more in Chapter 11, which covers
    Ray''s ecosystem as a whole. In the case of Tune, among the integrations listed
    here, the Hyperopt and Optuna integrations are maintained by the Ray Tune team;
    the rest are community-sponsored.'

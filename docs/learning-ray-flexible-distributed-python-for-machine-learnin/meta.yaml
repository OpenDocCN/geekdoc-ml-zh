  - '[PAGE 203]


    Now, if you want to stop the Ray processes on any node, simply run `ray stop`.
    That''s the manual way of creating a Ray Cluster. Let''s move on to discussing
    the deployment of your Ray Clusters with the popular Kubernetes orchestration
    framework.


    # Deployment on Kubernetes


    Kubernetes is an industry-standard platform for cluster resource management. It
    allows software teams to seamlessly deploy, manage, and scale their business applications
    in a wide variety of production environments. It was initially developed by Google,
    but many organizations have now adopted Kubernetes as their cluster resource management
    solution.


    The community-maintained [KubeRay project](https://github.com/ray-project/kuberay)
    is the standard way of deploying and managing Ray Clusters on Kubernetes. The
    KubeRay operator helps deploy and manage Ray Clusters on top of Kubernetes (Figure
    9-1). Clusters are defined as a custom `RayCluster` resource and managed by a
    fault-tolerant Ray controller. The operator automates provisioning, management,
    autoscaling, and operations of Ray Clusters deployed to Kubernetes. The main features
    of this operator are:


    +   - Management of first-class `RayCluster` via a custom resource.

    - Support for heterogeneous worker types in a single Ray Cluster.

    - Built-in monitoring via Prometheus.

    - Use of `PodTemplate` to create Ray pods.

    - Updated status based on the running pods.

    - Automatically populate environment variables in the containers.

    - Automatically prefix your container command with the Ray start command.

    - Automatically adding the volumeMount at `/dev/shm` for shared memory.

    - Use of `ScaleStrategy` to remove specific nodes in specific groups.


    ![](img/6489687a3a178f2884963bddc928992c_203_0.png)'
  - '[PAGE 204]


    # Setting Up Your First KubeRay Cluster


    You can deploy the operator by cloning the [KubeRay repository](https://github.com/ray-project/kuberay)
    and calling the following command:


    ```

    export KUBERAY_VERSION=v0.3.0


    kubectl create -k "github.com/ray-project/kuberay/manifests/\ncluster-scope-resources?ref=${KUBERAY_VERSION}&timeout=90s"


    kubectl apply -k "github.com/ray-project/kuberay/manifests/\nbase?ref=${KUBERAY_VERSION}&timeout=90s"

    ```


    You can verify that the operator has been deployed using this command:


    ```

    kubectl -n ray-system get pods

    ```


    When deployed, the operator will watch for Kubernetes events (create/delete/update)
    for the `raycluster` resource updates. Upon these events, the operator can create
    a cluster consisting of a head pod and multiple worker pods, delete a cluster,
    or update the cluster by adding or removing worker pods. Now let''s deploy a new
    Ray Cluster using a provided default cluster configuration (we''ll get to this
    YAML file later):


    ```

    wget "https://raw.githubusercontent.com/ray-project/kuberay/\n${KUBERAY_VERSION}/ray-operator/config/samples/ray-cluster.complete.yaml"


    kubectl create -f ray-cluster.complete.yaml

    ```


    The KubeRay operator configures a Kubernetes service targeting the Ray head pod.
    To identify the service, run:


    ```

    kubectl get service --selector=ray.io/cluster=raycluster-complete

    ```


    The output of this command should resemble the following structure:


    | NAME | TYPE | CLUSTER-IP | EXTERNAL-IP |

    | :--- | :--- | :--- | :--- |

    | raycluster-complete-head-svc | ClusterIP | xx.xx.xxx.xx | <none> |

    | PORT(S) | AGE | | |

    | 6379/TCP,8265/TCP,10001/TCP | 6m10s | | |


    The three ports indicated in the output correspond to the following services of
    the Ray head pod:


    +   - **6379**: The Ray head''s GCS service. Ray worker pods connect to this service
    when joining the cluster.

    - **8265**: Exposes the Ray Dashboard and the Ray Job Submission service.

    - **10001**: Exposes the Ray Client server.'
  - "[PAGE 205]\n\nYou should note that the Docker images we're using are quite large\
    \ and can take a while to download. Also, even if you see the expected output\
    \ from `kubectl get service`, that doesn't mean your cluster is ready to use yet.\
    \ You should look at the pod status and make sure they are all actually in “Running”\
    \ state.\n\n# Interacting with the KubeRay Cluster\n\nYou might be wondering why\
    \ we spend so much time on Kubernetes, since you're most likely just interested\
    \ in learning how to run Ray scripts on it. That's understandable, and we'll get\
    \ to that in a moment.\n\nFirst, let's use the following Python script as the\
    \ desired script to run on the cluster. We'll name it `script.py` (for simplicity),\
    \ and the script will connect to the Ray Cluster and run a couple standard Ray\
    \ commands:\n\n```\nimport ray\nray.init(address=\"auto\")\nprint(ray.cluster_resources())\n\
    \n@ray.remote\ndef test():\n    return 12\n\nray.get([test.remote() for i in range(12)])\n\
    ```\n\nThere are three primary ways to run this script: using `kubectl exec`,\
    \ Ray Job Submission, or Ray Client. We'll cover them in the following sections.\n\
    \n# Running Ray programs with kubectl\n\nTo start with, you can directly interact\
    \ with the head pod via `kubectl exec`. Use this command to get a Python interpreter\
    \ on the head pod:\n\n```\nkubectl exec `kubectl get pods -o custom-columns=POD:metadata.name\
    \ |\\n  grep raycluster-complete-head` -it -c ray-head -- python\n```\n\nWith\
    \ this Python terminal, you can connect and run your own Ray application:\n\n\
    ```\nimport ray\nray.init(address=\"auto\")\n...\n```\n\nThere are other ways\
    \ of interacting with these services without `kubectl`, but they will require\
    \ some networking setup. The easiest route, and the one we'll take in what follows,\
    \ is to use port-forwarding."
  - "[PAGE 206]\n\n# Using the Ray Job Submission server\n\nYou can run scripts on\
    \ the cluster by using the Ray Job Submission server. You can use the server to\
    \ send a script or a bundle of dependencies and run custom scripts with that set\
    \ of dependencies. To start, you'll need to port-forward the job submission server\
    \ port:\n\n```\nkubectl port-forward service/raycluster-complete-head-svc 8265:8265\n\
    ```\n\nNow, submit the script by setting the RAY_ADDRESS variable to the job server\
    \ submission endpoint and using the Ray Job Submission CLI:\n\n```\nexport RAY_ADDRESS=\"\
    http://localhost:8265\"\n\nray job submit --working-dir=. -- python script.py\n\
    ```\n\nYou'll see an output that looks like:\n\n```\nJob submission server address:\
    \ http://127.0.0.1:8265\n2022-05-20 23:35:36,066 INFO dashboard_sdk.py:276\n--\
    \ Uploading package gcs://_ray_pkg_533a957683abeba8.zip.\n2022-05-20 23:35:36,067\
    \ INFO packaging.py:416\n-- Creating a file package for local directory '.'.\n\
    \n--------------------------------------------------------------------------------\n\
    Job 'raysubmit_U5hfr1rqJZWwJmLP' submitted successfully\n--------------------------------------------------------------------------------\n\
    \nNext steps\n  Query the logs of the job:\n    ray job logs raysubmit_U5hfr1rqJZWwJmLP\n\
    \  Query the status of the job:\n    ray job status raysubmit_U5hfr1rqJZWwJmLP\n\
    \  Request the job to be stopped:\n    ray job stop raysubmit_U5hfr1rqJZWwJmLP\n\
    \nTailing logs until the job exits (disable with --no-wait):\n{'memory': 47157884109.0,\
    \ 'object_store_memory': 2147483648.0,\n 'CPU': 16.0, 'node:127.0.0.1': 1.0}\n\
    \n--------------------------------------------------------------------------------\n\
    Job 'raysubmit_U5hfr1rqJZWwJmLP' succeeded\n--------------------------------------------------------------------------------\n\
    ```\n\nYou can use --no-wait to run the job in the background.\n\n# Ray Client\n\
    \nTo connect to the cluster via Ray Client from your local machine, first make\
    \ sure the local Ray installation and Python minor version match the Ray and Python\
    \ versions running in the Ray Cluster. To do that, you can run ray --version and\
    \ python --version on both instances. In practice, you will be using a container,\
    \ in which"
- md: "case you can simply make sure you run everything in the same container. Also,\
    \ if the versions don't match, you will see a warning message informing you of\
    \ the issue.\n\nNext, run the following command:\n\n```\nkubectl port-forward\
    \ service/raycluster-complete-head-svc 10001:10001\n```\n\nThis command will block.\
    \ The local port 10001 will now be forwarded to the Ray head's Ray Client server.\n\
    \nTo run a Ray workload on your remote Ray Cluster, open a local Python shell\
    \ and start a Ray Client connection:\n\n```\nimport ray\nray.init(address=\"ray://localhost:10001\"\
    )\nprint(ray.cluster_resources())\n```\n\n```\n@ray.remote\ndef test():\n    return\
    \ 12\n```\n\n```\nray.get([test.remote() for i in range(12)])\n```\n\nWith this\
    \ method, you can just run the Ray program directly on your laptop (instead of\
    \ needing to ship the code over via `kubectl` or job submission).\n\n## Exposing\
    \ KubeRay\n\nIn the previous examples, we used port-forwarding as a simple way\
    \ to access the Ray head's services. For production use cases, you may want to\
    \ consider other means of exposing these services. The following notes are generic\
    \ to services running on Kubernetes.\n\nBy default, the Ray service is accessible\
    \ from anywhere *within* the Kubernetes cluster where the Ray operator is running.\
    \ For example, to use the Ray Client from a pod in the same Kubernetes namespace\
    \ as the Ray Cluster, use `ray.init(\"ray://raycluster-complete-head-svc:10001\"\
    )`.\n\nTo connect from another Kubernetes namespace, use `ray.init(\"ray://raycluster-complete-head-svc.default.svc.cluster.local:10001\"\
    )`. (If the Ray Cluster is a nondefault namespace, use the namespace in place\
    \ of `default`.)\n\nIf you are trying to access the service from outside the cluster,\
    \ use an ingress controller. Any standard ingress controller should work with\
    \ Ray Client and Ray Dashboard. Pick a solution compatible with your networking\
    \ and security requirements—further guidance is beyond the scope of this book.\n\
    \n## Configuring KubeRay\n\nLet's take a closer look at the configuration for\
    \ a Ray Cluster running on Kubernetes. The example file `kuberay/ray-operator/config/samples/ray-cluster.complete.yaml`\
    \ is a good reference. Here is a condensed view of a Ray Cluster config's most\
    \ salient features:\n\n```\napiVersion: ray.io/v1alpha1\nkind: RayCluster\nmetadata:\n\
    \  name: raycluster-complete\nspec:\n  headGroupSpec:\n    rayStartParams:\n \
    \     port: '6379'\n      num-cpus: '1'\n      ...\n    template: # Pod template\n\
    \      metadata: # Pod metadata\n      spec: # Pod spec\n        containers:\n\
    \        - name: ray-head\n          image: rayproject/ray:1.12.1\n          resources:\n\
    \            limits:\n              cpu: \"1\"\n              memory: \"1024Mi\"\
    \n            requests:\n              cpu: \"1\"\n              memory: \"1024Mi\"\
    \n          ports:\n          - containerPort: 6379\n            name: gcs\n \
    \         - containerPort: 8265\n            name: dashboard\n          - containerPort:\
    \ 10001\n            name: client\n          env:\n          - name: \"RAY_LOG_TO_STDERR\"\
    \n            value: \"1\"\n          volumeMounts:\n          - mountPath: /tmp/ray\n\
    \            name: ray-logs\n        volumes:\n        - name: ray-logs\n    \
    \      emptyDir: {}\n  workerGroupSpecs:\n  - groupName: small-group\n    replicas:\
    \ 2\n    rayStartParams:\n      ...\n    template: # Pod template\n```\n\n```\n\
    ...\n- groupName: medium-group\n...\n```\n\nIt's ideal, when possible, to size\
    \ each Ray pod such that it takes up the entire Kubernetes node on which it is\
    \ scheduled. In other words, it's best to run one large Ray pod per Kubernetes\
    \ node; running multiple Ray pods on one Kubernetes node introduces unnecessary\
    \ overhead. However, running multiple Ray pods on one Kubernetes node makes sense\
    \ in some situations, such as if:\n\n- Many users are running Ray Clusters on\
    \ a Kubernetes cluster with limited compute resources.\n- You or your organization\
    \ is not directly managing Kubernetes nodes (e.g., when deploying on GKE Autopilot).\n\
    \nSome of the primary configuration values that you may use are:\n\n**headGroupSpec\
    \ *and* workerGroupSpecs**\nA Ray Cluster consists of a head pod and a number\
    \ of worker pods. The head pod's configuration is specified under headGroupSpec.\
    \ Configuration for worker pods is specified under workerGroupSpecs. There may\
    \ be multiple worker groups, each group with its own configuration template. The\
    \ replicas field of a workerGroup specifies the number of worker pods of each\
    \ group to keep in the cluster.\n\n**rayStartParams**\nThis is a string-string\
    \ map of arguments to the Ray pod's ray start entry point. For the full list of\
    \ arguments, refer to the [documentation for ray start](https://docs.ray.io/en/latest/ray-core/starting-ray.html#ray-start).\
    \ We make special note of the num-cpus and num-gpus field arguments:\n\n**num-cpus**\n\
    This field tells the Ray Scheduler how many CPUs are available to the Ray pod.\
    \ The CPU count can be autodetected from the Kubernetes resource limits specified\
    \ in the group spec's pod template. It is sometimes useful to override this autodetected\
    \ value. For example, setting num-cpus: \"0\" will prevent Ray workloads with\
    \ nonzero CPU requirements from being scheduled on the head node.\n\n**num-gpus**\n\
    This specifies the number of GPUs available to the Ray pod. At the time of writing,\
    \ this field is *not* detected from the group spec's pod template. Thus, num-gpus\
    \ must be set explicitly for GPU workloads.\n\n**template**\nThis is where the\
    \ bulk of the headGroup or workerGroup's configuration goes. The template is a\
    \ Kubernetes Pod template that determines the configuration for the pods in the\
    \ group.\n\n**resources**\nIt's important to specify container CPU and memory\
    \ requests and limits for each group spec. For GPU workloads, you may also wish\
    \ to specify GPU limits, e.g., nvidia.com/gpu: 1 if using an Nvidia GPU device\
    \ plug-in.\n\n**nodeSelector and tolerations**\nYou can control the scheduling\
    \ of a worker group's Ray pods by setting the nodeSelector and tolerations fields\
    \ of the pod spec. Specifically, these fields determine on which Kubernetes nodes\
    \ the pods may be scheduled. Note that the KubeRay operator operates at the level\
    \ of pods—KubeRay is agnostic to the setup of the underlying Kubernetes nodes.\
    \ Kubernetes node configuration is left to your Kubernetes cluster's admins.\n\
    \n**Ray container images**\nIt's important to specify the images used by your\
    \ cluster's Ray containers. The head and workers of the clusters should all use\
    \ the same Ray version. In most cases, it makes sense to use the exact same container\
    \ image for the head and all workers of a given Ray Cluster. To specify custom\
    \ dependencies for your cluster, you should build an image based on one of the\
    \ official rayproject/ray images.\n\n**Volume mounts**\nVolume mounts can be used\
    \ to preserve logs or other application data originating in your Ray containers.\
    \ (See \"Configuring Logging for KubeRay\" on page 189.)\n\n**Container environment\
    \ variables**\nContainer environment variables may be used to modify Ray's behavior.\
    \ For example, RAY_LOG_TO_STDERR will redirect logs to STDERR rather than writing\
    \ them to the container's filesystem.\n\n## Configuring Logging for KubeRay\n\n\
    Ray Cluster processes typically write logs to the directory /tmp/ray/session_latest/logs\
    \ in the pod. These logs are also visible in the Ray Dashboard. To persist Ray\
    \ logs beyond the lifetime of a pod, you may use one of the following techniques:\n\
    \n**Aggregate logs from the container's filesystem**\nFor this strategy, mount\
    \ an empty-dir volume with mountPath /tmp/ray/ in the Ray container (see the preceding\
    \ example configuration). You can mount the log volume into a sidecar container\
    \ running a log aggregation tool such as Promtail.\n\n**Container STDERR logging**\n\
    An alternative is to redirect logging to STDERR. To do this, set the environment\
    \ variable RAY_LOG_TO_STDERR=1 on all Ray containers. In terms of Kubernetes configuration,\
    \ that means adding an entry to the env field of the Ray container in each Ray\
    \ groupSpec:\n\n```\nenv:\n  ...\n  - name: \"RAY_LOG_TO_STDERR\"\n    value:\
    \ \"1\"\n  ...\n```\n\nYou may then use a Kubernetes logging tool geared toward\
    \ aggregation from the STDERR and STDOUT streams.\n\n## Using the Ray Cluster\
    \ Launcher\n\nThe goal of the Ray Cluster Launcher is to make it easy to deploy\
    \ a Ray Cluster on any cloud. Here's what it will do for you:\n\n- Provision a\
    \ new instance/machine using the cloud provider's SDK.\n- Execute shell commands\
    \ to set up Ray with the provided options.\n- Optionally run any custom, user-defined\
    \ setup commands. This can be useful for setting environment variables and installing\
    \ packages.⁶\n- Initialize the Ray Cluster for you.\n- Deploy an autoscaler process.\n\
    \nWe will walk you through the details of autoscaling in “Autoscaling” on page\
    \ 194. For now, let's focus on using the cluster launcher to deploy a Ray Cluster.\
    \ To do so, you need to provide a cluster configuration file.\n\n## Configuring\
    \ Your Ray Cluster\n\nTo run your Ray Cluster, you must specify the resource requirements\
    \ in a cluster configuration file.\n\nHere's our “scaffold” cluster specification.\
    \ This is just about the minimum you'll need to specify to launch your cluster.\
    \ For more information about cluster YAML files, see a large example here (let's\
    \ call it cluster.yaml):\n\n```\n# An unique identifier for the head node and\
    \ workers of this cluster.\ncluster_name: minimal\n```"

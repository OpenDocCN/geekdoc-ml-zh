  md: '# Composite workload execution


    Composite workloads leverage both task- and actor-based computation simultaneously.
    This can lead to interesting resource allocation challenges. Trial actors need
    to reserve their resources upfront, but stateless tasks don''t. The problem you
    can run into is that all available resources might get reserved for your training
    actors with none left for data loading tasks.


    AIR prevents this by allowing Tune to reserve a maximum of 80% of a node''s CPU.
    You can tune this parameter, but this is a sensible default that ensures basic
    resource availability for stateless computations. In the common scenario in which
    your training operations leverage GPUs and your data processing steps don''t,
    this becomes a nonissue.


    # Online serving execution


    For online serving Ray Serve manages a pool of stateless actors to serve your
    requests. Some actors listen for incoming requests and call other actors to perform
    the predictions. Requests are automatically load-balanced using a round-robin
    algorithm to the pool of actors hosting the models. Load metrics are sent to the
    Serve component to perform autoscaling.


    # AIR Memory Management


    In this section we take a bit of a deep dive into the specific memory management
    techniques of AIR. We''ll discuss to what extent the Ray object store is used
    by AIR. You can skip this section if you find it too technical. The upshot is
    that Ray employs smart techniques that will ensure your data and compute are properly
    distributed and scheduled.


    When you load data using Ray Datasets, you already know that internally these
    Datasets are partitioned into blocks of data in your cluster. A block is simply
    a collection of Ray objects. Choosing the right block size is difficult and presents
    a trade-off between the overhead of having to manage too many small blocks and
    risking out-of-memory (OOM) exceptions due to blocks that are too large. AIR takes
    a pragmatic approach and tries to distribute in such a way that blocks don''t
    exceed 512 MB. In case this can''t be ensured, a warning will be issued. Should
    a block not fit into memory, AIR will spill your data to local disk.


    Your stateful workloads will use the Ray object store to varying degrees. For
    instance, RLlib uses Ray objects to broadcast model weights to individual rollout
    workers and for experience data collection. Tune uses it to set up Trials by sending
    and retrieving AIR Checkpoints. For technical reasons actors risk running into
    OOM issues if too'

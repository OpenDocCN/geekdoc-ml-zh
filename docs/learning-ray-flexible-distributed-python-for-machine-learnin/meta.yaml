    ```\n\nNotice that both the classify and classify_batched methods now use Python’s\
    \ async and await syntax, meaning that many of these calls can run concurrently\
    \ in the same process.\n\nTo test this behavior, we’ll use the serve.run Python\
    \ API to send requests using the Python-native handle to our deployment:\n\n```\n\

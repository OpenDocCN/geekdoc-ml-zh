    ![](img/6489687a3a178f2884963bddc928992c_209_0.png)


    It''s ideal, when possible, to size each Ray pod such that it takes up the entire
    Kubernetes node on which it is scheduled. In other words, it''s best to run one
    large Ray pod per Kubernetes node; running multiple Ray pods on one Kubernetes
    node introduces unnecessary overhead. However, running multiple Ray pods on one
    Kubernetes node makes sense in some situations, such as if:


    +   - Many users are running Ray Clusters on a Kubernetes cluster with limited
    compute resources.

    - You or your organization is not directly managing Kubernetes nodes (e.g., when
    deploying on GKE Autopilot).


    Some of the primary configuration values that you may use are:


    **headGroupSpec *and* workerGroupSpecs**

    A Ray Cluster consists of a head pod and a number of worker pods. The head pod''s
    configuration is specified under headGroupSpec. Configuration for worker pods
    is specified under workerGroupSpecs. There may be multiple worker groups, each
    group with its own configuration template. The replicas field of a workerGroup
    specifies the number of worker pods of each group to keep in the cluster.


    **rayStartParams**

    This is a string-string map of arguments to the Ray pod''s ray start entry point.
    For the full list of arguments, refer to the [documentation for ray start](https://docs.ray.io/en/latest/ray-core/starting-ray.html#ray-start).
    We make special note of the num-cpus and num-gpus field arguments:


    **num-cpus**

    This field tells the Ray Scheduler how many CPUs are available to the Ray pod.
    The CPU count can be autodetected from the Kubernetes resource limits specified
    in the group spec''s pod template. It is sometimes useful to override this autodetected
    value. For example, setting num-cpus: "0" will prevent Ray workloads with nonzero
    CPU requirements from being scheduled on the head node.


    **num-gpus**

    This specifies the number of GPUs available to the Ray pod. At the time of writing,
    this field is *not* detected from the group spec''s pod template. Thus, num-gpus
    must be set explicitly for GPU workloads.'

    +   1. The predict function maps Gradio inputs to outputs by leveraging our predictor.

    2. The Gradio interface has one input (an image), one output (a label for 1 of
    10 categories of the CIFAR-10 dataset), and a function fn to connect the two.

    3. We bind the Gradio demo to a Ray Serve GradioServer object that gets deployed
    on two replicas with two CPUs each as resources.


    To run this application, you can now simply type the following command into a
    shell:⁶


    ```

    serve run gradio_demo:app

    ```


    This command spins up our Serve-backed Gradio demo that you can access on localhost:8000.
    You can upload or drag and drop images into the respective input field and request
    predictions that you see in the output field of the app.⁷


    It''s important to note that this example is really just a thin wrapper around
    Gradio and would work with any other Gradio app of your choice. In fact, if you
    called demo.launch() instead of defining the Serve app in your script, you could
    simply launch this as a regular Gradio app with python gradio_demo.py.


    The other noteworthy detail that''s easy to overlook is that we fed our predictor
    a NumPy array. If you check the definition of the data format we used for training,
    you''ll recall that predictor is expected to work on Ray Dataset instances. The
    predictor instance is also smart enough to infer that a single NumPy input must
    be the "image" portion of the full input (we don''t need a "label" to run inference).


    To wrap up this section, review Table 11-4, which lists Serve''s current integrations.



  md: "# Saving, loading, and evaluating RLlib models\n\nReaching the goal for this\
    \ simple example isn't too difficult, but let's see if evaluating the trained\
    \ algorithm confirms that the agent can also do so in an optimal way, namely,\
    \ by taking only the minimum number of eight steps to reach the goal.\n\nTo do\
    \ so, we utilize another mechanism that you've already seen from the RLlib CLI:\
    \ *checkpointing*. Creating algorithm checkpoints is useful to ensure you can\
    \ recover your work in case of a crash or simply to track training progress persistently.\
    \ You can create a checkpoint of an RLlib algorithm at any point in the training\
    \ process by calling `algo.save()`. Once you have a checkpoint, you can easily\
    \ restore your Algorithm with it. Evaluating a model is as simple as calling `algo.evaluate(checkpoint)`\
    \ with the checkpoint you created. Here's how it looks if you put it all together:\n\
    \n```\nfrom ray.rllib.algorithms.algorithm import Algorithm\n\ncheckpoint = algo.save()\
    \  # 1\nprint(checkpoint)\n\nevaluation = algo.evaluate()  # 2\nprint(pretty_print(evaluation))\n\
    \nalgo.stop()  # 3\nrestored_algo = Algorithm.from_checkpoint(checkpoint)  # 4\n\
    ```\n\n+   1. Save algorithms to create checkpoints.\n2. Evaluate RLlib algorithms\
    \ at any point in time by calling evaluate.\n3. Stop an algo to free all claimed\
    \ resources.\n4. Restore any Algorithm from a given checkpoint with from_checkpoint.\n\
    \nLooking at the output of this example, we can now confirm that the trained RLlib\
    \ algorithm did indeed converge to a good solution for the maze problem, as indicated\
    \ by episodes of length 8 in evaluation:\n\n```\n~/ray_results/DQN_GymEnvironment_2022-02-09_10-19-301o3m9r6d/checkpoint_000010/\n\
    checkpoint-10 evaluation:\n...\nepisodes_this_iter: 5\nhist_stats:\n  episode_lengths:\n\
    \  - 8\n  - 8\n  ...\n```"

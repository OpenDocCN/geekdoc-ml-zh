    \ ML computations and enable vectorized computations across multiple inputs in\
    \ parallel.\n\nMany online inference applications must be run 24/7. When combined\
    \ with the fact that ML models are compute intensive, operating online inference\
    \ services can be very expensive, requiring allocation of many CPUs and GPUs at\
    \ all times. The primary challenges of online inference boil down to serving models\
    \ in a way that minimizes end-to-end latency while also reducing cost. Key properties\
    \ that online inference systems provide to satisfy these requirements include:\n\
    \n- Support for specialized hardware such as GPUs and TPUs.\n- The ability to\
    \ scale the resources used for a model up and down in response to request load.\n\
    - Support for request batching to take advantage of vectorized computations.\n\
    \n## ML Models Aren’t Useful in Isolation\n\nOften when ML is discussed in the\
    \ academic or research setting, the focus is on an individual, isolated task such\
    \ as object recognition or classification. However, real-world applications are\
    \ not usually so clear cut and well defined. Instead, a combination of multiple\
    \ ML models and business logic is required to solve a problem from end to end.\
    \ For example, consider a product recommendation use case. While we could apply\
    \ a multitude of known ML techniques to the core problem of making a recommendation,\
    \ a lot of equally important challenges exist around the edges, many of which\
    \ will be specific to each use case:\n\n- Validating inputs and outputs to ensure\
    \ the result returned to the user makes sense semantically. Often, we may have\
    \ some manual rules such as avoiding returning the same recommendation to a user\
    \ multiple times in succession.\n- Fetching up-to-date information about the user\
    \ and available products and converting it into features for the model (in some\
    \ cases, this may be performed by an online feature store).\n- Combining the results\
    \ of multiple models using manual rules such as filtering the top results or selecting\
    \ the model with highest confidence.\n\nImplementing an online inference API requires\
    \ the ability to integrate all of these pieces into one unified service. Therefore,\
    \ it’s important to have the flexibility to compose multiple models along with\
    \ custom business logic. These pieces can’t be viewed in isolation: the “glue”\
    \ logic often needs to evolve alongside the models themselves.\n\n## An Introduction\
    \ to Ray Serve\n\nRay Serve is a scalable compute layer for serving ML models\
    \ on top of Ray. Serve is framework-agnostic, meaning that it isn't tied to a\
    \ specific ML library; rather, it treats models as ordinary Python code. Additionally,\
    \ it allows you to flexibly combine normal Python business logic alongside ML\
    \ models. This makes it possible to build online inference services completely:\
    \ a Serve application could validate user input, query a database, perform scalable\
    \ inference across multiple ML models, and combine, filter, and validate the output—all\
    \ in the process of handling a single inference request. Indeed, combining the\
    \ results of multiple ML models is one of the key strengths of Ray Serve, as you'll\
    \ see in “Multimodel Inference Graphs” on page 166.\n\nWhile flexible, Ray Serve\
    \ has purpose-built features for compute-heavy ML models, enabling dynamic scaling\
    \ and resource allocation to ensure that request load can be handled efficiently\
    \ across many CPUs and/or GPUs. Here, Serve inherits a lot of benefits from being\
    \ built on top of Ray: it's scalable to hundreds of machines, offers flexible\
    \ scheduling policies, and offers low-overhead communication across processes\
    \ using Ray's core APIs.\n\nThis section incrementally introduces core functionality\
    \ from Ray Serve with a focus on how it helps address the challenges of online\
    \ inference previously outlined. To follow along with the code samples in this\
    \ section, you'll need the following Python packages installed locally:\n\n```\n\
    pip install \"ray[serve]==2.2.0\" \"transformers==4.21.2\" \"requests==2.28.1\"\
    \n```\n\nRunning the examples assumes that you have the code saved locally in\
    \ a file named *app.py* in the current working directory.\n\n## Architectural\
    \ Overview\n\nRay Serve is built on top of Ray, so it inherits a lot of benefits\
    \ such as scalability, low-overhead communication, an API well suited to parallelism,\
    \ and the ability to leverage shared memory via the object store. The core primitive\
    \ in Ray Serve is a *deployment*, which you can think of as a managed group of\
    \ Ray actors that can be addressed together and that will handle requests load-balanced\
    \ across them. Each actor in a deployment is called a *replica* in Ray Serve.\
    \ Often, a deployment will map one-to-one with an ML model, but deployments can\
    \ contain arbitrary Python code, so they might also house business logic.\n\n\
    Ray Serve enables exposing deployments over HTTP and defining the input parsing\
    \ and output logic. However, one of the most important features of Ray Serve is\
    \ that deployments can also call into each other directly using a native Python\
    \ API, which will translate to direct actor calls between the replicas. This enables\
    \ flexible, high-performance composition of models and business logic; you'll\
    \ see this in action later in the section.\n\nFigure 8-1 provides a basic view\
    \ of how a Ray Serve application runs on top of a Ray Cluster: multiple deployments\
    \ are placed across a Ray Cluster. Each deployment is made up of one or more “replicas,”\
    \ each of which is a Ray actor. Incoming traffic is routed through an HTTP proxy\
    \ that will load-balance requests across the replicas.¹\n\n![Figure 8-1. The architecture\
    \ of a Ray Serve application](img/6489687a3a178f2884963bddc928992c_182_0.png)\n\
    \nUnder the hood, the deployments making up a Ray Serve application are managed\
    \ by a centralized *controller* actor. This is a detached actor managed by Ray\
    \ that will be restarted upon failure. The controller is in charge of creating\
    \ and updating replica actors, broadcasting updates to other actors in the system,\
    \ and performing health checking and failure recovery. If a replica or an entire\
    \ Ray node crashes for any reason, the controller will detect the failures and\
    \ ensure that the actors are recovered and can continue serving traffic.\n\n##\
    \ Defining a Basic HTTP Endpoint\n\nThis section will introduce Ray Serve by defining\
    \ a simple HTTP endpoint wrapping a single ML model. The model we’ll deploy is\
    \ a sentiment classifier: given a text input, it will predict if the output had\
    \ a positive or negative sentiment. We’ll be using a pretrained sentiment classifier\
    \ from the [Hugging Face Transformers library](https://huggingface.co/docs/transformers),\
    \ which provides a simple Python API for pretrained models that will abstract\
    \ away the details of the model and allow us to focus on the serving logic.\n\n\
    To deploy this model using Ray Serve, we need to define a Python class and turn\
    \ it into a Serve *deployment* using the `@serve.deployment` decorator. The decorator\
    \ allows us to pass a number of useful options to configure the deployment; we\
    \ will explore some of those options in “Scaling and Resource Allocation” on page\
    \ 163:\n\n¹ Deployments can also send traffic to each other directly. This enables\
    \ building more complex applications involving model composition or mixing ML\
    \ models with business logic.\n\n```python\nfrom ray import serve\nfrom transformers\
    \ import pipeline\n\n@serve.deployment\nclass SentimentAnalysis:\n    def __init__(self):\n\
    \        self._classifier = pipeline(\"sentiment-analysis\")\n\n    def __call__(self,\
    \ request) -> str:\n        input_text = request.query_params[\"input_text\"]\n\
    \        return self._classifier(input_text)[0][\"label\"]\n```\n\nThere are a\
    \ few important points to note here. First, we instantiate our model in the constructor\
    \ of the class. This model may be very large, so downloading it and loading it\
    \ into memory can be slow (up to several minutes). In Ray Serve, the code in the\
    \ constructor will be run only once in each replica on startup, and any properties\
    \ can be cached for future use. Second, we define the logic to handle a request\
    \ in the `__call__` method. This takes a Starlette HTTP request as input and can\
    \ return any JSON-serializable output. In this case, we'll return a single string\
    \ from the output of our model: \"POSITIVE\" or \"NEGATIVE\".\n\nOnce a deployment\
    \ is defined, we use the `.bind()` API to instantiate a copy of it. This is where\
    \ we can pass optional arguments to the constructor to configure the deployment\
    \ (such as a remote path to download model weights from). Note that this doesn't\
    \ actually run the deployment but packages it with its arguments (this will be\
    \ more important later when we combine multiple models):\n\n```python\nbasic_deployment\
    \ = SentimentAnalysis.bind()\n```\n\nWe can run the bound deployment using the\
    \ `serve.run` Python API or corresponding `serve run` CLI command. Assuming you\
    \ save the preceding code in a file called `app.py`, you can run it locally with\
    \ the following command:\n\n```\nserve run app:basic_deployment\n```\n\nThis will\
    \ instantiate a single replica of our deployment and host it behind a local HTTP\
    \ server. To test it, we can use the Python `requests` package:\n\n```python\n\
    import requests\n\nprint(requests.get(\n    \"http://localhost:8000/\", params={\"\
    input_text\": \"Hello friend!\"}\n).json())\n```\n\nTesting the sentiment classifier\
    \ on a sample input text of \"Hello friend!\", it correctly classifies the text\
    \ as positive!"

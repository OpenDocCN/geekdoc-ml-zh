    Ray 库并为处理常见 AI 工作负载提供一致框架的伞状项目。而 Ray 日益增长的第三方集成数量，是经验丰富的从业者另一个绝佳的切入点。让我们逐一深入了解每个层次。


    ## 一个分布式计算框架


    从核心来看，Ray 是一个分布式计算框架。我们在此仅提供基本术语，并在第 2 章深入探讨 Ray 的架构。简而言之，Ray 设置并管理计算机集群，以便你可以在其上运行分布式任务。一个
    Ray 集群由通过网络相互连接的节点组成。你针对所谓的 *驱动程序*（即程序根）进行编程，它位于 *头节点* 上。驱动程序可以运行 *作业*（即任务的集合），这些作业在集群中的节点上运行。具体来说，一个作业的各个任务在
    *工作节点* 上的 *工作进程* 中运行。图 1-1 展示了 Ray 集群的基本结构。请注意，我们目前还不关心节点之间的通信；此图仅显示了 Ray 集群的布局。


    ![](img/6489687a3a178f2884963bddc928992c_27_0.png)


    图 1-1. Ray 集群的基本组件


    有趣的是，Ray 集群也可以是一个 *本地集群*，即仅由你自己的计算机组成的集群。在这种情况下，只有一个节点，即头节点，它包含驱动程序进程和一些工作进程。默认的工作进程数量是你机器上可用的
    CPU 数量。


    ⁷ 如此多的库构建在 Ray Core 之上的原因之一是它非常精简且易于理解。本书的目标之一是激励你使用 Ray 编写自己的应用程序，甚至是库。


    掌握了这些知识，现在是时候动手实践并运行你的第一个本地 Ray 集群了。在任何主要操作系统上使用 pip 安装 Ray 应该都能无缝进行：


    ```

    pip install "ray[rllib, serve, tune]==2.2.0"

    ```


    通过简单的 `pip install ray`，你将只安装 Ray 的基础部分。由于我们想探索一些高级功能，我们安装了“额外组件” `rllib`、`serve`
    和 `tune`，我们稍后会讨论它们。⁸ 根据你的系统配置，你可能不需要在此安装命令中使用引号。


    接下来，继续启动一个 Python 会话。例如，你可以使用 `ipython` 解释器，它通常适合跟随简单的示例。在你的 Python 会话中，你现在可以轻松地导入并初始化
    Ray：


    ```

    import ray

    ray.init()

    ```


    ![](img/6489687a3a178f2884963bddc928992c_28_0.png)


    如果你不想自己输入命令，也可以跳转到[本章的 Jupyter notebook](link_placeholder) 并在那里运行代码。选择权在你，但无论如何请记住使用
    Python 3.7 或更高版本。⁹


    通过这两行代码，你已经在本地机器上启动了一个 Ray 集群。这个集群可以利用你计算机上所有可用的核心作为工作进程。目前你的 Ray 集群还没做太多事情，但情况即将改变。


    你用来启动集群的 `init` 函数是你将在[第 2 章](link_placeholder)深入了解的六个基本 API 调用之一。总的来说，*Ray Core
    API* 非常易于访问和使用。但由于它也是一个相当底层的接口，用它构建有趣的示例需要时间。[第 2 章](link_placeholder)有一个详尽的入门示例，帮助你开始使用
    Ray Core API，而在[第 3 章](link_placeholder)中，你将看到如何为强化学习构建一个更有趣的 Ray 应用程序。


    在前面的代码中，你没有向 `ray.init(...)` 函数提供任何参数。如果你想在“真实”集群上运行 Ray，你必须向 `init` 传递更多参数。这个
    `init` 调用通常被称为 *Ray 客户端*，它用于交互式地连接到现有的 Ray 集群。¹⁰ 你可以在 [Ray 文档](https://docs.ray.io/)中阅读更多关于使用
    Ray 客户端连接到生产集群的信息。


    ⁸ 我们通常只在需要时才在本书中引入依赖项，这应该使跟随学习更容易。相比之下，[GitHub 上的笔记本](link_placeholder)为你提供了预先安装所有依赖项的选项，这样你就可以专注于运行代码。


    ⁹ 在撰写本文时，Ray 尚不支持 Python 3.10，因此坚持使用 3.7 到 3.9 之间的版本应该最适合跟随本书学习。


    当然，如果你曾经使用过计算集群，你就知道其中有许多陷阱和复杂性。例如，你可以在由云提供商（如 Amazon Web Services (AWS)、Google
    Cloud Platform (GCP) 或 Microsoft Azure）托管的集群上部署 Ray 应用程序——每种选择都需要良好的部署和维护工具。你也可以在自己的硬件上启动集群，或使用
    Kubernetes 等工具来部署你的 Ray 集群。在[第 9 章](https://example.com/chapter9)（接下来是具体的 Ray
    应用程序章节），我们将回到使用 Ray 集群扩展工作负载的主题。


    在继续介绍 Ray 的高级库之前，让我们简要总结一下 Ray 作为分布式计算框架的两个基础组件：


    *Ray 集群*

    此组件负责分配资源、创建节点并确保它们健康运行。开始使用 Ray 集群的一个好方法是其[专用快速入门指南](https://docs.ray.io/cluster/quickstart.html)。


    *Ray Core*

    一旦你的集群启动并运行，你就使用 Ray Core API 来对其进行编程。你可以通过遵循此组件的[官方演练](https://docs.ray.io/ray-overview/examples.html)来开始使用
    Ray Core。


    ## 一套数据科学库


    接下来介绍 Ray 的第二层，在本节中，我们将简要介绍 Ray 自带的所有数据科学库。为此，让我们首先从鸟瞰的角度了解数据科学意味着什么。一旦你理解了这个背景，回顾
    Ray 的高级库并了解它们如何对你有用就会容易得多。


    ## Ray AIR 和数据科学工作流


    “数据科学”（DS）这个有些难以捉摸的术语近年来发展了很多，你可以在网上找到许多定义，其有用性各不相同。¹¹ 对我们来说，它是*通过利用数据来获取洞察并构建现实世界应用的实践*。这是一个相当宽泛的定义，适用于一个本质上实用且应用的领域，其核心是构建和理解事物。从这个意义上说，将这个领域的从业者描述为“数据科学家”，就像将黑客描述为“计算机科学家”一样，是一个糟糕的误称。<sup>12</sup>


    大致来说，做数据科学是一个迭代过程，包括需求工程、数据收集与处理、构建模型并评估它们，以及部署解决方案。机器学习不一定是这个过程的一部分，但通常是。如果涉及机器学习，你可以进一步指定一些步骤：


    *数据处理*

    要训练机器学习模型，你需要以机器学习模型理解的格式提供数据。转换和选择哪些数据应输入模型的过程通常称为*特征工程*。这一步可能很混乱。如果你能依赖通用工具来完成这项工作，你将受益匪浅。


    *模型训练*

    在机器学习中，你需要在上一步处理过的数据上训练你的算法。这包括为任务选择正确的算法，如果你能从各种各样的算法中选择，那会很有帮助。


    *超参数调优*

    机器学习模型有在模型训练步骤中调整的参数。大多数机器学习模型还有一组称为*超参数*的参数，可以在训练前修改。这些参数会严重影响最终机器学习模型的性能，需要进行适当的调优。有很好的工具可以帮助自动化这个过程。


    *模型服务*

    训练好的模型需要被部署。服务模型意味着通过任何必要的手段，使其可供任何需要访问的人使用。在原型中，你通常使用简单的 HTTP 服务器，但有许多专门的软件包用于机器学习模型服务。


    这个列表绝非详尽，关于构建机器学习应用程序还有很多可以说的。<sup>13</sup> 然而，确实这四个步骤对于使用机器学习的数据科学项目的成功至关重要。


    Ray 为我们刚刚列出的四个机器学习特定步骤中的每一个都提供了专用库。具体来说，你可以使用 *Ray Datasets* 处理数据处理需求，使用 *Ray
    Train* 运行分布式模型训练，运行你的强化学习


    ¹⁰ 还有其他与 Ray 集群交互的方式，例如 [Ray Jobs CLI](https://docs.ray.io/cluster/jobs-overview.html)。


    ¹¹ 我们从不喜欢将数据科学归类为学科的交叉点，比如数学、编码和商业。归根结底，这并没有告诉你从业者*做*什么。


    ¹² 作为一个有趣的练习，我们推荐阅读保罗·格雷厄姆关于这个主题的著名文章《黑客与画家》，并将“计算机科学”替换为“数据科学”。那么黑客 2.0 会是什么样子？


    ¹³ 如果你想更全面地了解构建机器学习应用程序时数据科学过程的整体视图，Emmanuel Ameisen 的《Building Machine Learning
    Powered Applications》（O''Reilly）完全致力于此。'

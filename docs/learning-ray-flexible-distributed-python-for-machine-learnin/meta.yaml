    n')\n```\n\n```\nstart = time.time()\ndata = [retrieve(item) for item in range(8)]\
    \ ❶\nprint_runtime(data, start) ❷\n```\n\n❶ Uses a list comprehension to retrieve\
    \ all eight items.\n\n❷ Unpacks the data to print each item on its own line.\n\
    \nIf you run this code, you should see the following output:\n\n```\nRuntime:\
    \ 2.82 seconds, data:\n(0, 'Learning')\n(1, 'Ray')\n(2, 'Flexible')\n(3, 'Distributed')\n\
    (4, 'Python')\n(5, 'for')\n(6, 'Machine')\n(7, 'Learning')\n```\n\nThere's a little\
    \ overhead that brings the total runtime to 2.82 seconds. On your end this might\
    \ be slightly less, or much more, depending on your computer. The important takeaway\
    \ is that our naive Python implementation is not able to run this function in\
    \ parallel.\n\nThis may not come as a surprise to you, but you could at least\
    \ have suspected that Python list comprehensions are more efficient in that regard.\
    \ The runtime we got is pretty much the worst-case scenario, namely, the 2.8 seconds\
    \ we calculated prior to running the code. If you think about it, it might even\
    \ be a bit frustrating to see that a program that essentially sleeps most of its\
    \ runtime is that slow overall. Ultimately you can blame the *Global Interpreter\
    \ Lock* (GIL) for that, but it gets enough of the blame already."
  - "[PAGE 48]\n\n# Python’s Global Interpreter Lock\n\nThe GIL is undoubtedly one\
    \ of the most infamous features of the Python language. In a nutshell, it’s a\
    \ lock that makes sure only one thread on your computer can ever execute your\
    \ Python code at a time. If you use multithreading, the threads need to take turns\
    \ controlling the Python interpreter.\n\nThe GIL has been implemented for good\
    \ reasons. For one, it makes memory management that much easier in Python. Another\
    \ key advantage is that it makes single-threaded programs quite fast. Programs\
    \ that primarily use lots of system input and output (we say they are I/O-bound),\
    \ like reading files or databases, benefit as well. One of the major downsides\
    \ is that CPU-bound programs are essentially single-threaded. In fact, CPU-bound\
    \ tasks might even run *faster* when not using multithreading, as the latter incurs\
    \ write-lock overheads on top of the GIL.\n\nGiven all that, the GIL might somewhat\
    \ paradoxically be one of the reasons for Python’s popularity, if you believe\
    \ [Larry Hastings](https://www.youtube.com/watch?v=KlZnEq4VrDI). Interestingly,\
    \ Hastings also led (unsuccessful) efforts to remove it in a project called *GILectomy*,\
    \ which is exactly the kind of complicated surgery that it sounds like. The jury\
    \ is still out, but [Sam Gross](https://github.com/colesbury/nogil) might just\
    \ have found a way to remove the GIL in his nogil branch of Python 3.9. For now,\
    \ if you absolutely have to work around the GIL, consider using an implementation\
    \ different from CPython. CPython is Python’s standard implementation, and if\
    \ you don’t know that you’re using it, you’re definitely using it. Implementations\
    \ like Jython, IronPython, or PyPy don’t have a GIL, but they come with their\
    \ own drawbacks.\n\n# Functions and remote Ray tasks\n\nIt’s reasonable to assume\
    \ that such a task can benefit from parallelization. Perfectly distributed, the\
    \ runtime should not take much longer than the longest subtask, namely, 7/ 10\
    \ = 0.7 seconds. So, let’s see how you can extend this example to run on Ray.\
    \ To do so, start by using the `@ray.remote` decorator as follows:\n\n```\n@ray.remote\n\
    def retrieve_task(item):\n    return retrieve(item)\n```\n\n+   1. Make any Python\
    \ function a Ray task with just this decorator.\n2. All else remains unchanged.\
    \ `retrieve_task` just passes through to `retrieve`.\n\nIn this way, the function\
    \ `retrieve_task` becomes a so-called Ray task. In essence, a Ray task is a function\
    \ that gets executed on a different process than it was called from, potentially\
    \ on a different machine."
- md: "That's an extremely convenient design choice, as you can focus on your Python\
    \ code first and don't have to completely change your mindset or programming paradigm\
    \ to use Ray. Note that in practice you would have simply added the `@ray.remote`\
    \ decorator to your original retrieve function (after all, that's the intended\
    \ use of decorators), but to keep things as clear as possible, we didn't want\
    \ to touch previous code.\n\nEasy enough, so what do you have to change in the\
    \ code that retrieves the database entries and measures performance? It turns\
    \ out, not much. Example 2-1 shows how you would do that.⁵\n\n**Example 2-1. Measuring\
    \ performance of your Ray task**\n\n```python\nstart = time.time()\nobject_references\
    \ = [ ①\n    retrieve_task.remote(item) for item in range(8)\n]\ndata = ray.get(object_references)\
    \ ②\nprint_runtime(data, start)\n```\n\n① To run `retrieve_task` on your local\

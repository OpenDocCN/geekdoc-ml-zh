  - "[PAGE 149]\n\n```\nds = (ray.data.read_parquet(\"s3://my_bucket/input_data\"\
    )\n      .map(cpu_intensive_preprocessing)\n      .map_batches(gpu_intensive_inference,\
    \ compute=\"actors\", num_gpus=1)\n      .repartition(10))\n\nds.write_parquet(\"\
    s3://my_bucket/output_predictions\")\n```\n\nThere are five stages to this process,\
    \ and each stresses different parts of the system:\n\n+   1. Reading from remote\
    \ storage requires ingress bandwidth to the cluster and may be limited by the\
    \ throughput of the storage system. In this stage, a group of Ray tasks is spawned\
    \ that will read from remote storage in parallel, and the resulting blocks of\
    \ data are stored in the Ray object store.\n\n2. Preprocessing the inputs requires\
    \ CPU resources. The objects from the first phase are passed into a group of tasks\
    \ that will execute the cpu_intensive_preprocessing function on each block.\n\n\
    3. Vectorized inference on the model requires GPU resources. The same process\
    \ as in the second stage is repeated for gpu_intensive_inference, except this\
    \ time the function is run on actors that are each allocated a GPU, and multiple\
    \ blocks are passed into each function call (in batches). Actors are used for\
    \ this step to avoid repeatedly reloading the model used for inference onto the\
    \ GPU.\n\n4. Repartitioning requires network bandwidth within the cluster. After\
    \ completing stage 3, more tasks are spawned to repartition the data into 10 blocks\
    \ and write each of those 10 blocks to remote storage.\n\n5. Writing to remote\
    \ storage requires egress bandwidth from the cluster and may be limited by the\
    \ throughput of storage once again.\n\nFigure 6-1 depicts a basic implementation\
    \ where each stage runs in sequence. This naive implementation idles resources\
    \ because each stage is blocking and run in sequence. For example, because GPU\
    \ resources are used only in the final stage, they will be idle waiting for all\
    \ of the data to be loaded and preprocessed.\n\nthe code could easily be modified\
    \ to use a different format by changing the read_parquet and write_parquet calls."
- md: "## Example: Training Copies of a Classifier in Parallel\n\nOne of the key benefits\
    \ of Datasets is that they can be passed between tasks and actors. In this section,\
    \ we'll explore how this functionality can be used to write efficient implementations\
    \ of complex distributed workloads such as distributed hyperparameter tuning and\
    \ machine learning training. We'll implement an example of *distributed* training\
    \ of ML models in this section, a topic that we'll cover in much more detail in\
    \ [Chapter 7](#) when we introduce you to Ray Train.\n\nAs discussed in [Chapter\
    \ 5](#), a common pattern in machine learning training is to explore a range of\
    \ hyperparameters to find the ones that result in the best model. We may want\
    \ to run across a wide range of hyperparameters, and doing this naively could\
    \ be very expensive. Ray Data allows us to easily share the same in-memory data\
    \ across a range of parallel training runs in a single Python script: we can load\
    \ and preprocess the data once and then pass a reference to it to many downstream\
    \ actors who can read the data from shared memory.\n\nAdditionally, sometimes\
    \ when working with very large datasets, it is not feasible to load the full training\
    \ data into memory in a single process or on a single machine. In this case, it's\
    \ common to *shard* the data, which means to give each worker its own subset of\
    \ the data that can fit into memory. This local subset of the data is called a\
    \ *data shard*. After each worker trains on its shard of data in parallel, the\
    \ results are combined either synchronously or asynchronously using a parameter\
    \ server. Two important considerations can make this difficult to get right:\n\
    \n- Many distributed training algorithms take a *synchronous* approach, requiring\
    \ the workers to synchronize their weights after each training epoch. This means\
    \ there needs to be some coordination between the workers to maintain consistency\
    \ between which batch of data they are operating on.\n- It's important that each\
    \ worker gets a random sample of the data during each epoch. A global random shuffle\
    \ has been shown to perform better than local shuffle or no shuffle.\n\nFigure\
    \ 6-3 illustrates how the ray.data package is used to create shards of data forming\
    \ a Ray Dataset from a given input dataset.\n\nLet’s walk through an example of\
    \ how we can implement this type of pattern using Ray Datasets. In the example,\
    \ we will train multiple copies of a machine learning model using different hyperparameters\
    \ across different workers in parallel.\n\nWe’ll be training a scikit-learn SGDClassifier\
    \ algorithm on a generated binary classification dataset, and the hyperparameter\
    \ we’ll tune is the regularization term of this classifier.³ The actual details\
    \ of the ML task and model aren’t too important to this example: you could replace\
    \ the model and data with any number of examples. The main thing to focus on here\
    \ is how we orchestrate the data loading and computation using Datasets.\n\nTo\
    \ follow along with the examples in this section, make sure you have Ray Datasets\
    \ and scikit-learn installed locally:⁴\n\n```\npip install \"ray[data]==2.2.0\"\
    \ \"scikit-learn==1.0.2\"\n```\n\nFirst, let’s define our TrainingWorker that\
    \ will train a copy of the classifier on the data:\n\n```\nfrom sklearn import\
    \ datasets\nfrom sklearn.linear_model import SGDClassifier\nfrom sklearn.model_selection\
    \ import train_test_split\n\n@ray.remote\nclass TrainingWorker:\n    def __init__(self,\
    \ alpha: float):\n        self._model = SGDClassifier(alpha=alpha)\n\n    def\
    \ train(self, train_shard: ray.data.Dataset):\n        for i, epoch in enumerate(train_shard.iter_epochs()):\n\
    \            X, Y = zip(*list(epoch.iter_rows()))\n            self._model.partial_fit(X,\
    \ Y, classes=[0, 1])\n\n        return self._model\n\n    def test(self, X_test:\
    \ np.ndarray, Y_test: np.ndarray):\n        return self._model.score(X_test, Y_test)\n\
    ```\n\nThere are three important things to note about the TrainingWorker:\n\n\
    - It's a simple wrapper around the SGDClassifier and instantiates it with a given\
    \ alpha value.\n- The main training function happens in the train method. For\
    \ each epoch, it trains the classifier on the data available.\n- We also have\
    \ a test method that can be used to run the trained model against a testing set.\n\
    \nNow, let's instantiate a number of TrainingWorker instances with different hyperparameters\
    \ (alpha values):\n\n```\nALPHA_VALS = [0.00008, 0.00009, 0.0001, 0.00011, 0.00012]\n\
    \nprint(f\"Starting {len(ALPHA_VALS)} training workers.\")\nworkers = [TrainingWorker.remote(alpha)\
    \ for alpha in ALPHA_VALS]\n```\n\nNext, we generate training and validation data\
    \ and convert the training data to a Dataset. Here, we're using .repeat() to create\
    \ a DatasetPipeline. This defines the number of epochs that our training will\
    \ run for. In each epoch, the subsequent operations will be applied to the Dataset,\
    \ and the workers will be able to iterate over the resulting data. We also shuffle\
    \ the data randomly and shard it to be passed to the training workers, each getting\
    \ an equal chunk:\n\n```\nX_train, X_test, Y_train, Y_test = train_test_split(\n\
    \    *datasets.make_classification()\n)\n\ntrain_ds = ray.data.from_items(list(zip(X_train,\
    \ Y_train)))\nshards = (train_ds.repeat(10)\n          .random_shuffle_each_window()\n\
    \          .split(len(workers), locality_hints=workers))\n\nray.get([\n    worker.train.remote(shard)\n\
    ])\n```\n\n³ SGD stands for stochastic gradient descent, which is a common optimization\
    \ algorithm used in machine learning, and specifically deep learning.\n\n⁴ In\
    \ this and the following two chapters, we’re discussing more advanced ML examples\
    \ that need additional dependencies. We pin the versions of these dependencies\
    \ here and in the book’s GitHub repo to ensure the examples work as expected.\
    \ Having said that, the examples very likely work with a relatively wide range\
    \ of versions, as long as you make sure they’re not too old."
  mdcn: "## 示例：并行训练分类器的多个副本\n\n数据集的一个关键优势在于它们可以在任务和参与者之间传递。在本节中，我们将探讨如何利用这一功能来编写复杂分布式工作负载的高效实现，例如分布式超参数调优和机器学习训练。我们将在本节中实现一个*分布式*训练机器学习模型的示例，这个主题我们将在[第7章](#)介绍Ray\
    \ Train时更详细地讨论。\n\n正如[第5章](#)所讨论的，机器学习训练中的一个常见模式是探索一系列超参数，以找到能产生最佳模型的参数。我们可能希望在广泛的超参数范围内运行，而简单地这样做可能非常昂贵。Ray\
    \ Data允许我们在单个Python脚本中轻松地在多个并行训练运行之间共享相同的内存数据：我们可以加载和预处理数据一次，然后将引用传递给许多下游参与者，这些参与者可以从共享内存中读取数据。\n\
    \n此外，有时在处理非常大的数据集时，将完整的训练数据加载到单个进程或单台机器的内存中是不可行的。在这种情况下，通常会对数据进行*分片*，这意味着为每个工作节点分配其自己的、可以放入内存的数据子集。这个本地数据子集称为*数据分片*。在每个工作节点并行地在其数据分片上训练之后，结果会使用参数服务器同步或异步地组合。两个重要的考虑因素可能使这难以正确实现：\n\
    \n- 许多分布式训练算法采用*同步*方法，要求工作节点在每个训练周期后同步其权重。这意味着工作节点之间需要进行一些协调，以维护它们正在处理的数据批次的一致性。\n\
    - 重要的是每个工作节点在每个周期都能获得数据的随机样本。全局随机洗牌已被证明比局部洗牌或不洗牌表现更好。\n\n图6-3展示了如何使用ray.data包从给定的输入数据集创建数据分片，从而形成Ray数据集。\n\
    \n让我们通过一个示例来了解如何使用Ray数据集实现这种类型的模式。在这个示例中，我们将使用不同的超参数，在不同的工作节点上并行训练机器学习模型的多个副本。\n\
    \n我们将在一个生成的二分类数据集上训练一个scikit-learn SGDClassifier算法，我们将调整的超参数是该分类器的正则化项。³ 这个示例并不太关注机器学习任务和模型的实际细节：你可以用任何数量的示例替换模型和数据。这里主要关注的是我们如何使用数据集来编排数据加载和计算。\n\
    \n要跟随本节中的示例，请确保你已在本地安装了Ray数据集和scikit-learn：⁴\n\n```\npip install \"ray[data]==2.2.0\"\
    \ \"scikit-learn==1.0.2\"\n```\n\n首先，让我们定义我们的TrainingWorker，它将在数据上训练分类器的一个副本：\n\
    \n```\nfrom sklearn import datasets\nfrom sklearn.linear_model import SGDClassifier\n\
    from sklearn.model_selection import train_test_split\n\n@ray.remote\nclass TrainingWorker:\n\
    \    def __init__(self, alpha: float):\n        self._model = SGDClassifier(alpha=alpha)\n\
    \n    def train(self, train_shard: ray.data.Dataset):\n        for i, epoch in\
    \ enumerate(train_shard.iter_epochs()):\n            X, Y = zip(*list(epoch.iter_rows()))\n\
    \            self._model.partial_fit(X, Y, classes=[0, 1])\n\n        return self._model\n\
    \n    def test(self, X_test: np.ndarray, Y_test: np.ndarray):\n        return\
    \ self._model.score(X_test, Y_test)\n```\n\n关于TrainingWorker有三个重要点需要注意：\n\n- 它是SGDClassifier的一个简单包装器，并使用给定的alpha值实例化它。\n\
    - 主要的训练函数发生在train方法中。对于每个周期，它在可用数据上训练分类器。\n- 我们还有一个test方法，可用于在测试集上运行训练好的模型。\n\n\
    现在，让我们使用不同的超参数（alpha值）实例化多个TrainingWorker实例：\n\n```\nALPHA_VALS = [0.00008, 0.00009,\
    \ 0.0001, 0.00011, 0.00012]\n\nprint(f\"Starting {len(ALPHA_VALS)} training workers.\"\
    )\nworkers = [TrainingWorker.remote(alpha) for alpha in ALPHA_VALS]\n```\n\n接下来，我们生成训练和验证数据，并将训练数据转换为数据集。这里，我们使用.repeat()来创建一个DatasetPipeline。这定义了我们的训练将运行的周期数。在每个周期中，后续操作将应用于数据集，参与者将能够迭代结果数据。我们还随机洗牌数据并将其分片传递给训练工作节点，每个节点获得相等的一块：\n\
    \n```\nX_train, X_test, Y_train, Y_test = train_test_split(\n    *datasets.make_classification()\n\
    )\n\ntrain_ds = ray.data.from_items(list(zip(X_train, Y_train)))\nshards = (train_ds.repeat(10)\n\
    \          .random_shuffle_each_window()\n          .split(len(workers), locality_hints=workers))\n\
    \nray.get([\n    worker.train.remote(shard)\n])\n```\n\n³ SGD代表随机梯度下降，这是机器学习，特别是深度学习中常用的一种优化算法。\n\
    \n⁴ 在本章和接下来的两章中，我们将讨论需要额外依赖项的更高级的机器学习示例。我们在这里和本书的GitHub仓库中固定了这些依赖项的版本，以确保示例按预期工作。话虽如此，只要确保版本不是太旧，这些示例很可能在相对广泛的版本范围内都能工作。"

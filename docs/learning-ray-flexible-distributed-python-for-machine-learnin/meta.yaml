  - "[PAGE 117]\n\ncurriculum for our advanced maze. Namely, the distance of the seeker\
    \ from the goal can be used as a measure of difficulty. The distance measure we'll\
    \ use for simplicity is the sum of the absolute distance of both seeker coordinates\
    \ from the goal to define a difficulty.\n\nTo run curriculum learning with RLlib,\
    \ we define a CurriculumEnv that extends both our AdvancedEnv and a so-called\
    \ TaskSettableEnv from RLlib. The interface of TaskSettableEnv is very simple\
    \ in that you have to define only how to get the current difficulty (get_task)\
    \ and how to set a required difficulty (set_task). Here's the full definition\
    \ of this CurriculumEnv:\n\n```\nfrom ray.rllib.env.apis.task_settable_env import\
    \ TaskSettableEnv\n\nclass CurriculumEnv(AdvancedEnv, TaskSettableEnv):\n\n  \
    \  def __init__(self, *args, **kwargs):\n        AdvancedEnv.__init__(self)\n\n\
    \    def difficulty(self): ①\n        return abs(self.seeker[0] - self.goal[0])\
    \ + \\n               abs(self.seeker[1] - self.goal[1])\n\n    def get_task(self):\
    \ ②\n        return self.difficulty()\n\n    def set_task(self, task_difficulty):\
    \ ③\n        while not self.difficulty() <= task_difficulty:\n            self.reset()\n\
    ```\n\n+   ① Define the difficulty of the current state as the sum of the absolute\
    \ distance of both seeker coordinates from the goal.\n② To define get_task we\
    \ can then simply return the current difficulty.\n③ To set a task difficulty,\
    \ we reset the environment until its difficulty is *at most* the specified task_difficulty.\n\
    \nTo use this environment for curriculum learning, we need to define a curriculum\
    \ function that tells the algorithm when and how to set the task difficulty. We\
    \ have many options here, but we use a schedule that simply increases the difficulty\
    \ by one every 1,000 time steps trained:\n\n```\ndef curriculum_fn(train_results,\
    \ task_settable_env, env_ctx):\n    time_steps = train_results.get(\"timesteps_total\"\
    )\n    difficulty = time_steps // 1000\n    print(f\"Current difficulty: {difficulty}\"\
    )\n    return difficulty\n```"
- md: "To test this curriculum function, we need to add it to our RLlib algorithm\
    \ config by setting the `env_task_fn` property to our `curriculum_fn`. Note that\
    \ before training a DQN for 15 iterations, we also set an `output` folder in our\
    \ config. This will store experience data of our training run to the specified\
    \ `temp` folder:²¹\n\n```python\nfrom ray.rllib.algorithms.dqn import DQNConfig\n\
    import tempfile\n\ntemp = tempfile.mkdtemp() ❶\n\ntrainer = (\n    DQNConfig()\n\
    \    .environment(env=CurriculumEnv, env_task_fn=curriculum_fn) ❷\n    .offline_data(output=temp)\
    \ ❸\n    .build()\n)\n\nfor i in range(15):\n    trainer.train()\n```\n\n- ❶ Create\
    \ a `temp` file to store our training data for later use.\n- ❷ Set the `CurriculumEnv`\
    \ as our environment in the `environment` part of our config and assign our `curriculum_fn`\
    \ to the `env_task_fn` property.\n- ❸ Use the `offline_data` method to store output\
    \ in our `temp` folder.\n\nRunning this algorithm, you should see how the task\
    \ difficulty increases over time, thereby giving the algorithm easy examples to\
    \ start with so that it can learn from them and progress to more difficult tasks.\n\
    \nCurriculum learning is a great technique to be aware of and RLlib allows you\
    \ to easily incorporate it into your experiments through the curriculum API we\
    \ just discussed.\n\n## Working with Offline Data\n\nIn our previous curriculum\
    \ learning example we stored training data to a temporary folder. What's interesting\
    \ is that you already know from Chapter 3 that in Q-Learning you can collect experience\
    \ data first and decide when to use it in a training step later. This separation\
    \ of data collection and training opens up many possibilities. For instance, maybe\
    \ you have a good heuristic that can solve your problem in an imperfect yet reasonable\
    \ manner. Or you have records of human interaction with your environment, demonstrating\
    \ how to solve the problem by example.\n\nThe topic of collecting experience data\
    \ for later training is often discussed as working with *offline data*. It's called\
    \ \"offline\" because it's not directly generated by a policy interacting online\
    \ with the environment. Algorithms that don't rely on training on their own policy\
    \ output are called *off-policy algorithms*, and Q-Learning, particularly DQN,\
    \ is just one such example. Algorithms that don't share this property are called\
    \ on-policy algorithms. In other words, off-policy algorithms can be used to train\
    \ on offline data.²²\n\nTo use the data we stored in the *temp* folder, we can\
    \ create a new DQNConfig that takes this folder as input. We will also set explore\
    \ to False, since we simply want to exploit the data previously collected for\
    \ training—the algorithm will not explore according to its own policy.\n\nUsing\
    \ the resulting RLlib algorithm works exactly as before, which we demonstrate\
    \ by training it for 10 iterations and then evaluating it:\n\n```python\nimitation_algo\
    \ = (\n    DQNConfig()\n    .environment(env=AdvancedEnv)\n    .evaluation(off_policy_estimation_methods={})\n\
    \    .offline_data(input_=temp)\n    .exploration(explore=False)\n    .build())\n\
    \nfor i in range(10):\n    imitation_algo.train()\n\nimitation_algo.evaluate()\n\
    ```\n\nNote that we called the algorithm *imitation_algo*. That's because this\
    \ training procedure intends to *imitate* the behavior reflected in the data we\
    \ collected before. This type of learning by demonstration in RL is therefore\
    \ often called *imitation learning* or *behavior cloning*.\n\n## Other Advanced\
    \ Topics\n\nBefore concluding this chapter, let's have a look at a few other advanced\
    \ topics that RLlib has to offer. You've already seen how flexible RLlib is: working\
    \ with a range of different environments, configuring your experiments, training\
    \ on a curriculum, or running imitation learning. This section gives you a taste\
    \ of what else is possible.\n\nWith RLlib, you can completely customize the models\
    \ and policies used under the hood. If you've worked with deep learning before,\
    \ you know how important it can be to have a good model architecture in place.\
    \ In RL this is often not as crucial as in supervised learning, but it is still\
    \ a vital part of successfully running advanced experiments.\n\nYou can also change\
    \ the way your observations are preprocessed by providing custom preprocessors.\
    \ For our simple maze examples, there was nothing to preprocess, but when working\
    \ with image or video data, preprocessing is often a crucial step.\n\nIn our *AdvancedEnv*\
    \ we introduced states to avoid. Our agents had to learn to do this, but RLlib\
    \ has a feature to automatically avoid them through so-called *parametric action\
    \ spaces*. Loosely speaking, what you can do is \"mask out\" all undesired actions\
    \ from the action space for each point in time. In some cases it can also be necessary\
    \ to have variable observation spaces, which is also fully supported by RLlib.\n\
    \nWe briefly touched on the topic of offline data. RLlib has a full-fledged Python\
    \ API for reading and writing experience data that can be used in various situations.\n\
    \nWe have worked solely with DQN here for simplicity, but RLlib has an impressive\
    \ range of training algorithms. To name just one, the MARWIL algorithm is a complex\
    \ hybrid algorithm with which you can run imitation learning from offline data,\
    \ while also mixing in regular training on data generated \"online.\"\n\n## Summary\n\
    \nYou've seen a selection of interesting RLlib features in this chapter. We covered\
    \ training multi-agent environments, working with offline data generated by another\
    \ agent, setting up a client-server architecture to split simulations from RL\
    \ training, and using curriculum learning to specify increasingly difficult tasks.\n\
    \nWe've also given you a quick overview of the main concepts underlying RLlib\
    \ and how to use its CLI and Python API. In particular, we've shown how to configure\
    \ your RLlib algorithms and environments to your needs. As we've covered only\
    \ a small part of RLlib's possibilities, we encourage you to read its [documentation\
    \ and explore its API](https://docs.ray.io/en/latest/rllib/index.html).\n\nIn\
    \ the next chapter you'll learn how to tune the hyperparameters of your RLlib\
    \ models and policies with Ray Tune.\n\n# CHAPTER 5\n## Hyperparameter Optimization\
    \ with Ray Tune\n\nIn Chapter 4 you learned how to build and run various reinforcement\
    \ learning experiments. Running such experiments can be expensive, in terms of\
    \ both compute resources and the time it takes to run them. This expense only\
    \ gets amplified as you move on to more challenging tasks, since it is unlikely\
    \ that you can just pick an algorithm out of the box and run it to get a good\
    \ result. In other words, at some point you'll need to tune the hyperparameters\
    \ of your algorithms to get the best results. As we'll see in this chapter, tuning\
    \ machine learning models is hard, but Ray Tune is an excellent choice to help\
    \ you tackle this task.\n\nRay Tune is a powerful tool for hyperparameter optimization\
    \ (HPO). Not only does it work in a distributed manner by default (and works in\
    \ any other Ray library discussed in this book), but it's also one of the most\
    \ feature-rich HPO libraries available. To top this off, Tune integrates with\
    \ some of the most prominent HPO libraries out there, such as Hyperopt, Optuna,\
    \ and many more. This makes Tune an ideal candidate for distributed HPO experiments,\
    \ whether you're coming from other libraries or starting from scratch.\n\nIn this\
    \ chapter we'll first revisit in a bit more depth why HPO is hard to do and how\
    \ you could naively implement it yourself with Ray. We then teach you the core\
    \ concepts of Ray Tune and how you can use it to tune the RLlib models built in\
    \ the previous chapter. To wrap things up, we'll also have a look at how to use\
    \ Tune for supervised learning tasks, using frameworks like Keras. Along the way,\
    \ we demonstrate how Tune integrates with other HPO libraries and introduce you\
    \ to some of its more advanced features.\n\n## Tuning Hyperparameters\n\nLet's\
    \ briefly recap the basics of hyperparameter optimization. If you're familiar\
    \ with HPO, you can skip this section, but since we're also discussing aspects\
    \ of distributed HPO, you might still benefit from following along. As always,\
    \ you can find a notebook for this chapter in [the book's GitHub repository](https://github.com/).\n\
    \nIn our first RL experiment introduced in Chapter 3, we defined a very basic\
    \ Q-Learning algorithm whose internal *state-action values* were updated according\
    \ to an explicit update rule. After initialization, we never touched these *model\
    \ parameters* directly; they were learned by the algorithm. By contrast, in setting\
    \ up the algorithm, we explicitly chose a weight and a `discount_factor` parameter\
    \ prior to training. We didn't tell you how we chose to set these parameters back\
    \ then; we simply accepted that they were good enough to crack the problem at\
    \ hand.\n\nIn the same way, in Chapter 4 we initialized an RLlib algorithm with\
    \ a config that used two rollout workers for our DQN algorithm by setting `num_rollout_workers=2`.\
    \ Parameters like these are called *hyperparameters*, and finding good choices\
    \ for them can be crucial for successful experiments. The field of hyperparameter\
    \ optimization is devoted to efficiently finding such good choices.\n\n## Building\
    \ a Random Search Example with Ray\n\nHyperparameters like the weight or the `discount_factor`\
    \ of our Q-Learning algorithm are *continuous* parameters, so we can't possibly\
    \ test all combinations of them. What's more, these parameter choices may not\
    \ be independent of each other. If we want them to be selected for us, we also\
    \ need to specify a *value range* for each of them (both hyperparameters need\
    \ to be between 0 and 1 in this case). So, how do we determine good or even optimal\
    \ hyperparameters?\n\nLet's look at an example that implements a naive yet effective\
    \ approach to tuning hyperparameters. This example will also allow us to introduce\
    \ some terminology that we'll use later. The core idea is that we can attempt\
    \ to *randomly sample* hyperparameters, run the algorithm for each sample, and\
    \ then select the best run based on the results. But to do the theme of this book\
    \ justice, we don't just want to run this in a sequential loop; we want to compute\
    \ our runs in parallel using Ray.\n\nTo keep things simple we'll revisit our simple\
    \ Q-Learning algorithm from Chapter 3. We defined the signature of the main training\
    \ function as `train_policy(env, num_episodes=10000, weight=0.1, discount_factor=0.9)`.\
    \ That means we can tune the weight and `discount_factor` parameters of our algorithm\
    \ by passing in different values to the `train_policy` function and see how the\
    \ algorithm performs. To do that, let's define a so-called *search space* for\
    \ our hyperparameters. For both"
  mdcn: "要测试此课程函数，我们需要将其添加到 RLlib 算法配置中，方法是将 `env_task_fn` 属性设置为我们的 `curriculum_fn`。请注意，在训练\
    \ DQN 进行 15 次迭代之前，我们还在配置中设置了一个 `output` 文件夹。这将把我们训练运行的经验数据存储到指定的 `temp` 文件夹中：²¹\n\
    \n```python\nfrom ray.rllib.algorithms.dqn import DQNConfig\nimport tempfile\n\
    \ntemp = tempfile.mkdtemp() ❶\n\ntrainer = (\n    DQNConfig()\n    .environment(env=CurriculumEnv,\
    \ env_task_fn=curriculum_fn) ❷\n    .offline_data(output=temp) ❸\n    .build()\n\
    )\n\nfor i in range(15):\n    trainer.train()\n```\n\n- ❶ 创建一个 `temp` 文件来存储我们的训练数据以供后续使用。\n\
    - ❷ 在配置的 `environment` 部分将 `CurriculumEnv` 设置为我们的环境，并将我们的 `curriculum_fn` 分配给\
    \ `env_task_fn` 属性。\n- ❸ 使用 `offline_data` 方法将输出存储到我们的 `temp` 文件夹中。\n\n运行此算法，你应该会看到任务难度如何随时间增加，从而为算法提供简单的示例作为起点，以便它能够从中学习并逐步处理更困难的任务。\n\
    \n课程学习是一项值得了解的优秀技术，RLlib 允许你通过我们刚刚讨论的课程 API 轻松地将其纳入你的实验中。\n\n## 处理离线数据\n\n在我们之前的课程学习示例中，我们将训练数据存储到了一个临时文件夹。有趣的是，你从第\
    \ 3 章已经知道，在 Q-Learning 中，你可以先收集经验数据，然后决定何时在训练步骤中使用它。这种数据收集和训练的分离带来了许多可能性。例如，也许你有一个好的启发式方法，可以以不完美但合理的方式解决你的问题。或者你有人类与环境交互的记录，通过示例展示如何解决问题。\n\
    \n收集经验数据以供后续训练的主题通常被称为处理*离线数据*。它被称为“离线”，是因为它不是由策略与环境在线交互直接生成的。不依赖于在其自身策略输出上进行训练的算法被称为*离线策略算法*，而\
    \ Q-Learning，特别是 DQN，就是这样一个例子。不具备此属性的算法被称为在线策略算法。换句话说，离线策略算法可用于在离线数据上进行训练。²²\n\
    \n要使用我们存储在 *temp* 文件夹中的数据，我们可以创建一个新的 DQNConfig，将该文件夹作为输入。我们还将把 explore 设置为 False，因为我们只想利用之前收集的数据进行训练——算法不会根据其自身的策略进行探索。\n\
    \n使用生成的 RLlib 算法的工作方式与之前完全相同，我们通过训练 10 次迭代然后进行评估来演示：\n\n```python\nimitation_algo\
    \ = (\n    DQNConfig()\n    .environment(env=AdvancedEnv)\n    .evaluation(off_policy_estimation_methods={})\n\
    \    .offline_data(input_=temp)\n    .exploration(explore=False)\n    .build())\n\
    \nfor i in range(10):\n    imitation_algo.train()\n\nimitation_algo.evaluate()\n\
    ```\n\n注意我们将算法命名为 *imitation_algo*。这是因为此训练过程旨在*模仿*我们之前收集的数据中反映的行为。因此，这种在强化学习中通过示范进行学习的方式通常被称为*模仿学习*或*行为克隆*。\n\
    \n## 其他高级主题\n\n在结束本章之前，让我们看看 RLlib 提供的其他一些高级主题。你已经看到了 RLlib 的灵活性：处理各种不同的环境、配置你的实验、进行课程训练或运行模仿学习。本节将让你了解其他可能的功能。\n\
    \n使用 RLlib，你可以完全自定义底层使用的模型和策略。如果你之前使用过深度学习，你就知道拥有一个好的模型架构有多重要。在强化学习中，这通常不像在监督学习中那么关键，但它仍然是成功运行高级实验的重要组成部分。\n\
    \n你还可以通过提供自定义预处理器来改变观测数据的预处理方式。对于我们的简单迷宫示例，没有什么需要预处理的，但在处理图像或视频数据时，预处理通常是一个关键步骤。\n\
    \n在我们的 *AdvancedEnv* 中，我们引入了需要避免的状态。我们的智能体必须学会这样做，但 RLlib 有一个功能，可以通过所谓的*参数化动作空间*自动避免它们。粗略地说，你可以做的是在每个时间点从动作空间中“屏蔽掉”所有不需要的动作。在某些情况下，也可能需要可变的观测空间，RLlib\
    \ 也完全支持这一点。\n\n我们简要介绍了离线数据的主题。RLlib 拥有一个功能齐全的 Python API，用于读写经验数据，可用于各种情况。\n\n\
    为了简单起见，我们在这里只使用了 DQN，但 RLlib 拥有令人印象深刻的训练算法范围。仅举一例，MARWIL 算法是一种复杂的混合算法，你可以用它从离线数据运行模仿学习，同时还可以混合使用“在线”生成的数据进行常规训练。\n\
    \n## 总结\n\n在本章中，你了解了 RLlib 的一系列有趣功能。我们涵盖了训练多智能体环境、处理由另一个智能体生成的离线数据、设置客户端-服务器架构以将模拟与强化学习训练分离，以及使用课程学习来指定日益困难的任务。\n\
    \n我们还简要概述了 RLlib 的主要概念以及如何使用其 CLI 和 Python API。特别是，我们展示了如何根据你的需求配置 RLlib 算法和环境。由于我们只涵盖了\

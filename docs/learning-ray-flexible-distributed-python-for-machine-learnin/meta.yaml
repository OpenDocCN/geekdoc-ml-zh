    \n```\n\n运行示例前，请确保代码已保存在当前工作目录的*app.py*文件中。\n\n## 架构概览\n\nRay Serve构建于Ray之上，继承了可扩展性、低开销通信、适合并行的API以及通过对象存储利用共享内存等优势。其核心抽象是*部署*，可视为由Ray\
    \ actor组成的托管组，这些actor可统一寻址并负载均衡处理请求。部署中的每个actor在Ray Serve中称为*副本*。通常部署与机器学习模型一一对应，但也可包含任意Python代码，因此可能承载业务逻辑。\n\

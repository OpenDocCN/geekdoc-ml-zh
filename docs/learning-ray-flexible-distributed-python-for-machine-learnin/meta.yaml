  md: "```\nfrom ray import serve\n\nfrom transformers import pipeline\n\n\n@serve.deployment\n\
    class SentimentAnalysis:\n    def __init__(self):\n        self._classifier =\
    \ pipeline(\"sentiment-analysis\")\n\n    def __call__(self, request) -> str:\n\
    \        input_text = request.query_params[\"input_text\"]\n        return self._classifier(input_text)[0][\"\
    label\"]\n```\n\nThere are a few important points to note here. First, we instantiate\
    \ our model in the constructor of the class. This model may be very large, so\
    \ downloading it and loading it into memory can be slow (up to several minutes).\
    \ In Ray Serve, the code in the constructor will be run only once in each replica\
    \ on startup, and any properties can be cached for future use. Second, we define\
    \ the logic to handle a request in the __call__ method. This takes a Starlette\
    \ HTTP request as input and can return any JSON-serializable output. In this case,\
    \ we'll return a single string from the output of our model: \"POSITIVE\" or \"\
    NEGATIVE\".\n\nOnce a deployment is defined, we use the .bind() API to instantiate\
    \ a copy of it. This is where we can pass optional arguments to the constructor\
    \ to configure the deployment (such as a remote path to download model weights\
    \ from). Note that this doesn't actually run the deployment but packages it with\
    \ its arguments (this will be more important later when we combine multiple models):\n\
    \n```\nbasic_deployment = SentimentAnalysis.bind()\n```\n\nWe can run the bound\
    \ deployment using the serve.run Python API or corresponding serve run CLI command.\
    \ Assuming you save the preceding code in a file called app.py, you can run it\
    \ locally with the following command:\n\n```\nserve run app:basic_deployment\n\
    ```\n\nThis will instantiate a single replica of our deployment and host it behind\
    \ a local HTTP server. To test it, we can use the Python requests package:\n\n\
    ```\nimport requests\n\nprint(requests.get(\n    \"http://localhost:8000/\", params={\"\
    input_text\": \"Hello friend!\"}\n).json())\n```\n\nTesting the sentiment classifier\
    \ on a sample input text of \"Hello friend!\", it correctly classifies the text\
    \ as positive!"

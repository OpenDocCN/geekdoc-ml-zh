    # # Where to Go from Here?


    We''ve come a long way from an overview of Ray in [Chapter 1](#) to the discussion
    of its ecosystem in this one. But as this is an introductory book, we''ve just
    touched the proverbial tip of the iceberg of Ray''s capabilities. While you should
    now have a good grasp of the basics of Ray Core and how Ray Clusters work and
    know when to use AIR and its constituent libraries Datasets, Train, RLlib, Tune
    and Serve, there''s still so much more to learn about each aspect.


    To start with, the extensive [user guides of Ray Core](#) will give you a much
    deeper understanding about Ray tasks, actors, and objects; their placement on
    cluster nodes; and how to handle dependencies for your applications. In particular,
    you will find interesting patterns and anti-patterns to design your Ray Core programs
    well and avoid common pitfalls. To learn more about the inner workings of Ray,
    we recommend reading some of the advanced papers on Ray, such as its [architecture
    whitepaper](#).


    An interesting topic we skipped entirely is Ray''s tooling around *observability*.
    The official [Ray Observability documentation](#) is a good starting point for
    this topic. You can learn how to debug and profile your Ray applications there,
    log information from your Ray Clusters, monitor their behavior, and export important
    metrics there.'
  - '[PAGE 253]


    You will also find an introduction to the *Ray dashboard* there,17 which can help
    you understand your Ray programs.


    The focus of this book has been to introduce the core ideas of Ray to ML practitioners
    and give you practical starting points to tackle your workloads with Ray. However,
    a topic that deserves more attention than the one chapter we could include in
    this book is how to build, scale, and maintain Ray Clusters. Currently, the best
    introduction to advanced Ray Cluster topics is [the Ray documentation](https://docs.ray.io/).
    There you can learn how to deploy clusters on all major cloud providers, how to
    scale clusters on Kubernetes, and how to submit Ray jobs to a cluster, in much
    more detail than we could cover here.


    In this chapter we could mention the majority of Ray integrations only in passing.
    If you want to learn more about Ray’s third-party integrations, [Ray’s Ecosystem
    page](https://www.ray.io/ecosystem) is a good starting point. Also, it’s important
    to mention that [more Ray libraries](https://docs.ray.io/en/latest/ray-overview/libs.html)
    are available that simply didn’t make the cut for this book, like Ray Workflows
    and a distributed, drop-in replacement for Python’s multiprocessing library.


    Lastly, if you’re interested in becoming part of the Ray community, there are
    many good ways of doing so. You can join the [Ray Slack](https://ray.io/slack)
    to get in touch with Ray developers and other community members, or join Ray’s
    [discussion forum](https://discuss.ray.io/) to get your questions answered. If
    you want to help develop Ray, whether contributing to the documentation, adding
    a new use case, or helping the open source community with new features or bug
    fixes, you should check out the official [contributor guide to Ray](https://docs.ray.io/en/latest/ray-contribute/overview.html).


    # Summary


    In this chapter you learned more about Ray’s ecosystem, as seen from its AI Runtime.
    You’ve seen the full extent of available integrations of Ray AIR libraries and
    an example of training and serving an ML model using three different integrations:
    PyTorch for data loading and training, MLflow for logging, and Gradio for serving
    your model. You should now be able to go out there and run your own AIR experiments,
    together with all the tools you’re already using or intend to use in the future.
    We’ve also discussed Ray’s limits, how it compares to various related systems,
    and how you can use Ray with other tools to augment or build out your own ML platforms.'
  - '[PAGE 254]


    This wraps up this chapter and the book. We hope it piqued your interest in Ray
    and helped you start your journey with it. The introduction of AIR brought many
    new features to the Ray ecosystem, and there''s certainly more on the road map
    to be excited about. There''s no doubt that you can now dive into any advanced
    Ray material—maybe you already have an idea about building your first own Ray
    app.'

    This example showed how Ray Train and Datasets can be used to implement an end-to-end
    machine learning workflow as a single application. We were able to featurize the
    dataset, train and validate an ML model, and then apply that model across a different
    dataset in a single Python script. Ray Datasets acted as the glue layer, connecting
    the different stages and avoiding expensive serialization costs between them.
    We also used checkpoints to store the model and ran a Ray Train batch prediction
    job to apply the model to a new dataset.


    Now, that you''ve seen your first example of Ray Train, let''s take a closer look
    at its primary abstraction, the Trainer.


    # More on Trainers in Ray Train


    As you''ve seen in the example of using a TorchTrainer, Trainers are framework-specific
    classes that run model training in a distributed fashion. All Ray Trainer classes
    share a common interface. At this point, it''s enough to know about two aspects
    of this interface, namely:


    +   - The .fit() method, which fits a given Trainer with the given datasets, configuration,
    and desired scaling properties

    - The .checkpoint property, which returns the Ray Checkpoint object for this Trainer


    Ray Train''s Trainers integrate with common machine learning frameworks such as
    PyTorch, Hugging Face, TensorFlow, Horovod, scikit-learn, and more. There''s even
    a Trainer specifically for RLlib models, which we don''t cover here. Let''s discuss
    another PyTorch example to point out specific aspects of the Trainer API, with
    an emphasis on how to migrate an existing PyTorch model to Ray Train.


    > ## Gradient Boosting Frameworks


    Ray Train also offers support for gradient boosted decision tree frameworks.


    XGBoost is an optimized distributed gradient boosting library designed to be highly
    efficient, flexible, and portable. It implements ML algorithms under the gradient
    boosting framework. XGBoost provides a parallel tree boosting that solves many
    data science problems quickly and accurately.


    LightGBM is a gradient boosting framework based on tree-based learning algorithms.
    Compared to XGBoost, it is a relatively new framework but one that is quickly
    becoming popular in both academic and production use cases.


    To use these frameworks, you can use the XGBoostTrainer and LightGBMTrainer classes,
    respectively.'

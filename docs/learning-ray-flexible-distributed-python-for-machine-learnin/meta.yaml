  md: 'template

    This is where the bulk of the headGroup or workerGroup''s configuration goes.
    The template is a Kubernetes Pod template that determines the configuration for
    the pods in the group.


    resources

    It''s important to specify container CPU and memory requests and limits for each
    group spec. For GPU workloads, you may also wish to specify GPU limits, e.g.,
    nvidia.com/gpu: 1 if using an Nvidia GPU device plug-in.


    nodeSelector and tolerations

    You can control the scheduling of a worker group''s Ray pods by setting the nodeSelector
    and tolerations fields of the pod spec. Specifically, these fields determine on
    which Kubernetes nodes the pods may be scheduled. Note that the KubeRay operator
    operates at the level of pods—KubeRay is agnostic to the setup of the underlying
    Kubernetes nodes. Kubernetes node configuration is left to your Kubernetes cluster''s
    admins.


    Ray container images

    It''s important to specify the images used by your cluster''s Ray containers.
    The head and workers of the clusters should all use the same Ray version. In most
    cases, it makes sense to use the exact same container image for the head and all
    workers of a given Ray Cluster. To specify custom dependencies for your cluster,
    you should build an image based on one of the official rayproject/ray images.


    Volume mounts

    Volume mounts can be used to preserve logs or other application data originating
    in your Ray containers. (See "Configuring Logging for KubeRay" on page 189.)


    Container environment variables

    Container environment variables may be used to modify Ray''s behavior. For example,
    RAY_LOG_TO_STDERR will redirect logs to STDERR rather than writing them to the
    container''s filesystem.


    # Configuring Logging for KubeRay


    Ray Cluster processes typically write logs to the directory /tmp/ray/session_latest/logs
    in the pod. These logs are also visible in the Ray Dashboard. To persist Ray logs
    beyond the lifetime of a pod, you may use one of the following techniques:


    Aggregate logs from the container''s filesystem

    For this strategy, mount an empty-dir volume with mountPath /tmp/ray/ in the Ray
    container (see the preceding example configuration). You can mount the log volume
    into a sidecar container running a log aggregation tool such as Promtail.'

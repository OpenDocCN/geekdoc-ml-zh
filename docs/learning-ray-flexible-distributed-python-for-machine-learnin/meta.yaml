- md: "Table 11-2 summarizes all ML training-related integrations of Ray, which span\
    \ both Ray Train and RLlib.\n\nTable 11-2. The Ray Train and RLlib ecosystem\n\
    \n| Integration | Type |\n|---|---|\n| TensorFlow, PyTorch, XGBoost, LightGBM,\
    \ Horovod | Train integrations maintained by the Ray Team |\n| scikit-learn, Hugging\
    \ Face, Lightning | Train integrations maintained by the community |\n| TensorFlow,\
    \ PyTorch, OpenAI gym | RLlib integrations maintained by the Ray Team |\n| JAX,\
    \ Unity | RLlib integrations maintained by the Ray Team |\n\nWe distinguish between\
    \ community-sponsored integrations and ones that are maintained by the Ray team\
    \ itself. Most integrations we’ve talked about in this book were native integrations,\
    \ but due to the collaborative nature of open source software, you often feel\
    \ no difference in maturity between native and third-party integrations.\n\nTo\
    \ wrap up the training-related integrations of AIR, Table 11-3 offers a bird’s-eye\
    \ view at Tune’s ecosystem.\n\nTable 11-3. The Ray Tune ecosystem\n\n| Integration\
    \ | Type |\n|---|---|\n| Optuna, Hyperopt, Ax, BayesOpt, BOHB, Dragonfly, FLAML,\
    \ HEBO, Nevergrad, SigOpt, skopt, ZOOpt | Hyperparameter optimization library\
    \ |\n| TensorBoard, MLflow, Weights & Biases, CometML | Logging and experimentation\
    \ management |\n\n## Model Serving\n\nGradio is a popular way for practitioners\
    \ to demo their ML models, and it provides many simple primitives to create graphical\
    \ user interface elements simply by describing them through the gradio library\
    \ in Python. As you will see, defining and deploying Gradio interfaces is straightforward,\
    \ but it’s even easier to then wrap them in a so-called GradioServer from Ray\
    \ Serve, which allows you to scale any Gradio app on a Ray Cluster.\n\nTo showcase\
    \ how to run a Gradio app with Ray Serve on the model we just trained, let’s first\
    \ store the result of our training procedure to disk. We do this by writing the\
    \ respective AIR Checkpoint to a local folder of our choice so that we can restore\
    \ this model *from checkpoint* in another script:\n\n```\nCHECKPOINT_PATH = \"\
    torch_checkpoint\"\nresult.checkpoint.to_directory(CHECKPOINT_PATH)\n```\n\nNext,\
    \ let’s create a file called `gradio_demo.py` next to the \"torch_checkpoint\"\
    \ path for simplicity. In this script, let’s load our PyTorch model again by first\
    \ restoring the TorchCheckpoint and then using this checkpoint and our Net() definition\
    \ to create a TorchPredictor that we can use for inference:\n\n```\n# gradio_demo.py\n\
    from ray.train.torch import TorchCheckpoint, TorchPredictor\n\nCHECKPOINT_PATH\
    \ = \"torch_checkpoint\"\ncheckpoint = TorchCheckpoint.from_directory(CHECKPOINT_PATH)\n\
    predictor = TorchPredictor.from_checkpoint(\n    checkpoint=checkpoint,\n    model=Net()\n\
    )\n```\n\nNote that this requires you to import, or otherwise make available,\
    \ the definition of Net in the *gradio_demo.py* script.⁵\n\nNext, we have to define\
    \ the Gradio Interface, which we define to take images as input and produce labels\
    \ as output. Additionally, we have to specify how an input Image has to be transformed\
    \ to produce a Label. By default, Gradio represents images as NumPy arrays, so\
    \ we can ensure that this array has the right shape and data type and then pass\
    \ it to our predictor. As this predictor, namely, our TorchPredictor, produces\
    \ a probability distribution, we take the argmax of its prediction to get an integer\
    \ result that we can use as a label. Put the following code into your *gradio_demo.py*\
    \ Python script:\n\n```\nfrom ray.serve.gradio_integrations import GradioServer\n\
    import gradio as gr\nimport numpy as np\n\ndef predict(payload): ①\n    payload\
    \ = np.array(payload, dtype=np.float32)\n    array = payload.reshape((1, 3, 32,\
    \ 32))\n    return np.argmax(predictor.predict(array))\n\ndemo = gr.Interface(\
    \ ②\n    fn=predict,\n    inputs=gr.Image(),\n    outputs=gr.Label(num_top_classes=10)\n\
    )\n\napp = GradioServer.options( ③\n    num_replicas=2,\n    ray_actor_options={\"\
    num_cpus\": 2}\n).bind(demo)\n```\n\n5 For simplicity, we duplicated the definition\
    \ of Net in *gradio_demo.py* on GitHub.\n\n1. The predict function maps Gradio\
    \ inputs to outputs by leveraging our predictor.\n2. The Gradio interface has\
    \ one input (an image), one output (a label for 1 of 10 categories of the CIFAR-10\
    \ dataset), and a function fn to connect the two.\n3. We bind the Gradio demo\
    \ to a Ray Serve GradioServer object that gets deployed on two replicas with two\
    \ CPUs each as resources.\n\nTo run this application, you can now simply type\
    \ the following command into a shell:⁶\n\n```\nserve run gradio_demo:app\n```\n\
    \nThis command spins up our Serve-backed Gradio demo that you can access on localhost:8000.\
    \ You can upload or drag and drop images into the respective input field and request\
    \ predictions that you see in the output field of the app.⁷\n\nIt's important\
    \ to note that this example is really just a thin wrapper around Gradio and would\
    \ work with any other Gradio app of your choice. In fact, if you called demo.launch()\
    \ instead of defining the Serve app in your script, you could simply launch this\
    \ as a regular Gradio app with python gradio_demo.py.\n\nThe other noteworthy\
    \ detail that's easy to overlook is that we fed our predictor a NumPy array. If\
    \ you check the definition of the data format we used for training, you'll recall\
    \ that predictor is expected to work on Ray Dataset instances. The predictor instance\
    \ is also smart enough to infer that a single NumPy input must be the \"image\"\
    \ portion of the full input (we don't need a \"label\" to run inference).\n\n\
    To wrap up this section, review Table 11-4, which lists Serve's current integrations.\n\
    \nTable 11-4. The Ray Serve ecosystem\n\n| Library | Description |\n|---|---|\n\
    | Serving frameworks and applications | FastAPI, Flask, Streamlit, Gradio |\n\
    | Explainability and observability | Arize, Seldon Alibi, WhyLabs |\n\n6 When\
    \ using the Gradio integration, Ray Serve will automatically run a Gradio app\
    \ under the hood. The Gradio app is instrumented to access the type hints on each\
    \ Serve deployment. When the user submits a request, the Gradio app displays the\
    \ output of each deployment using a Gradio Block that matches the output type.\n\
    \n7 The application expects images of the right size, as we didn't want to make\
    \ preprocessing in predict more involved than necessary. You can use the image\
    \ data provided in the repository of this book or simply search for CIFAR-10 images\
    \ online to test the app yourself.\n\n## Building Custom Integrations\n\nBefore\
    \ explaining the relationship of Ray with other complex software frameworks in\
    \ a bit more detail, let’s talk about how to build your own integrations for Ray\
    \ AIR. Since AIR is designed for extensibility, you can find suitable interfaces\
    \ for all the tasks you want to build custom integrations for.\n\nFor example,\
    \ let’s say you want to read data from Snowflake, train a JAX model on it, and\
    \ log your tuning results to Neptune.⁸ At the time of this writing, there are\
    \ no such integrations available, but it’s likely this will change in the future.\
    \ We didn’t pick these integrations (Snowflake, JAX, Neptune) to showcase any\
    \ preference; they just happen to be interesting tools from the ecosystem. In\
    \ any case, it’s worth knowing how to build such integrations.\n\nTo load data\
    \ from Snowflake into a Ray Dataset, you have to create a new Data source. You\
    \ define a Datasource by specifying how to set it up (create_reader), how to write\
    \ to the source (do_write), and what happens on successful and failed write attempts\
    \ (on_write_complete and on_write_failed). Given a concrete SnowflakeDatasource\
    \ implementation, you could then read your data into a Ray Dataset:\n\n```\nfrom\
    \ ray.data import read_datasource, datasource\n\nclass SnowflakeDatasource(datasource.Datasource):\n\
    \    pass\n\ndataset = read_datasource(SnowflakeDatasource(), ...)\n```\n\nNext,\
    \ let’s say you have an interesting JAX model that you want to scale out using\
    \ Ray Train’s capabilities. Specifically, let’s assume you want to run data-parallel\
    \ training of the model, that is, to train this single model on several data shards\
    \ in parallel. For this purpose, Ray comes with a so-called DataParallelTrainer.\
    \ To define one, you have to create a train_loop_per_worker for your training\
    \ framework and define how JAX should be handled by Train internally.⁹ With a\
    \ JaxTrainer implementation, you can leverage the same Trainer interface that\
    \ we’ve used in all AIR examples:\n\n```\nfrom ray.train.data_parallel_trainer\
    \ import DataParallelTrainer\n\nclass JaxTrainer(DataParallelTrainer):\n```\n\n\
    8 In this chapter we’re going to assume that you know about these different tools\
    \ from the ecosystem. If you don’t, for this section it’s enough to understand\
    \ that Snowflake is a database solution that you might want to integrate with,\
    \ JAX is an ML framework, and Neptune can be used for experiment tracking.\n\n\
    9 To be precise, you have to define a Backend for JAX, together with a BackendConfig.\
    \ Your DataParallel Trainer then has to be initialized with this backend and your\
    \ training loop."
  mdcn: "表 11-2 总结了 Ray 所有与机器学习训练相关的集成，这些集成涵盖了 Ray Train 和 RLlib。\n\n表 11-2. Ray Train\
    \ 和 RLlib 生态系统\n\n| 集成 | 类型 |\n|---|---|\n| TensorFlow, PyTorch, XGBoost, LightGBM,\
    \ Horovod | 由 Ray 团队维护的 Train 集成 |\n| scikit-learn, Hugging Face, Lightning |\
    \ 由社区维护的 Train 集成 |\n| TensorFlow, PyTorch, OpenAI gym | 由 Ray 团队维护的 RLlib 集成\
    \ |\n| JAX, Unity | 由 Ray 团队维护的 RLlib 集成 |\n\n我们区分了社区支持的集成和由 Ray 团队本身维护的集成。本书中讨论的大多数集成都是原生集成，但由于开源软件的协作性质，你通常感觉不到原生集成和第三方集成在成熟度上有什么差异。\n\
    \n为了总结 AIR 的训练相关集成，表 11-3 提供了 Tune 生态系统的鸟瞰图。\n\n表 11-3. Ray Tune 生态系统\n\n| 集成\
    \ | 类型 |\n|---|---|\n| Optuna, Hyperopt, Ax, BayesOpt, BOHB, Dragonfly, FLAML,\
    \ HEBO, Nevergrad, SigOpt, skopt, ZOOpt | 超参数优化库 |\n| TensorBoard, MLflow, Weights\
    \ & Biases, CometML | 日志记录和实验管理 |\n\n## 模型服务\n\nGradio 是从业者展示其机器学习模型的一种流行方式，它提供了许多简单的原语，只需通过\
    \ Python 中的 gradio 库描述它们，即可创建图形用户界面元素。正如你将看到的，定义和部署 Gradio 接口非常简单，但将其包装在 Ray Serve\
    \ 的所谓 GradioServer 中则更为容易，这允许你在 Ray 集群上扩展任何 Gradio 应用。\n\n为了展示如何使用 Ray Serve 在我们刚刚训练的模型上运行\
    \ Gradio 应用，我们首先将训练过程的结果存储到磁盘。我们通过将相应的 AIR 检查点写入我们选择的本地文件夹来实现这一点，以便我们可以在另一个脚本中*从检查点*恢复此模型：\n\
    \n```\nCHECKPOINT_PATH = \"torch_checkpoint\"\nresult.checkpoint.to_directory(CHECKPOINT_PATH)\n\
    ```\n\n接下来，为了简单起见，让我们在 \"torch_checkpoint\" 路径旁边创建一个名为 `gradio_demo.py` 的文件。在此脚本中，让我们通过首先恢复\
    \ TorchCheckpoint，然后使用此检查点和我们的 Net() 定义来创建一个 TorchPredictor，从而再次加载我们的 PyTorch\
    \ 模型，我们可以将其用于推理：\n\n```\n# gradio_demo.py\nfrom ray.train.torch import TorchCheckpoint,\
    \ TorchPredictor\n\nCHECKPOINT_PATH = \"torch_checkpoint\"\ncheckpoint = TorchCheckpoint.from_directory(CHECKPOINT_PATH)\n\
    predictor = TorchPredictor.from_checkpoint(\n    checkpoint=checkpoint,\n    model=Net()\n\
    )\n```\n\n请注意，这要求你在 *gradio_demo.py* 脚本中导入或以其他方式提供 Net 的定义。⁵\n\n接下来，我们必须定义 Gradio\
    \ 接口，我们将其定义为接收图像作为输入并产生标签作为输出。此外，我们必须指定如何转换输入图像以产生标签。默认情况下，Gradio 将图像表示为 NumPy\
    \ 数组，因此我们可以确保此数组具有正确的形状和数据类型，然后将其传递给我们的预测器。由于此预测器（即我们的 TorchPredictor）产生概率分布，我们取其预测的\
    \ argmax 以获得一个整数结果，我们可以将其用作标签。将以下代码放入你的 *gradio_demo.py* Python 脚本中：\n\n```\n\
    from ray.serve.gradio_integrations import GradioServer\nimport gradio as gr\n\
    import numpy as np\n\ndef predict(payload): ①\n    payload = np.array(payload,\
    \ dtype=np.float32)\n    array = payload.reshape((1, 3, 32, 32))\n    return np.argmax(predictor.predict(array))\n\
    \ndemo = gr.Interface( ②\n    fn=predict,\n    inputs=gr.Image(),\n    outputs=gr.Label(num_top_classes=10)\n\
    )\n\napp = GradioServer.options( ③\n    num_replicas=2,\n    ray_actor_options={\"\
    num_cpus\": 2}\n).bind(demo)\n```\n\n5 为简单起见，我们在 GitHub 上的 *gradio_demo.py* 中复制了\
    \ Net 的定义。\n\n1. predict 函数通过利用我们的预测器将 Gradio 输入映射到输出。\n2. Gradio 接口有一个输入（图像）、一个输出（CIFAR-10\
    \ 数据集 10 个类别之一的标签）和一个连接两者的函数 fn。\n3. 我们将 Gradio 演示绑定到一个 Ray Serve GradioServer\
    \ 对象，该对象以两个副本部署，每个副本使用两个 CPU 作为资源。\n\n要运行此应用程序，你现在只需在 shell 中输入以下命令：⁶\n\n```\n\
    serve run gradio_demo:app\n```\n\n此命令启动我们由 Serve 支持的 Gradio 演示，你可以在 localhost:8000\
    \ 访问它。你可以将图像上传或拖放到相应的输入字段中，并请求预测，你会在应用程序的输出字段中看到结果。⁷\n\n重要的是要注意，这个示例实际上只是 Gradio\
    \ 的一个薄包装器，可以与你选择的任何其他 Gradio 应用一起工作。事实上，如果你调用 demo.launch() 而不是在脚本中定义 Serve 应用，你可以简单地使用\
    \ python gradio_demo.py 将其作为常规 Gradio 应用启动。\n\n另一个值得注意且容易被忽视的细节是，我们向预测器输入了一个 NumPy\
    \ 数组。如果你检查我们用于训练的数据格式定义，你会回想起预测器被期望处理 Ray Dataset 实例。预测器实例也足够智能，可以推断出单个 NumPy\
    \ 输入必须是完整输入的“图像”部分（我们不需要“标签”来运行推理）。\n\n为了结束本节，请查看表 11-4，其中列出了 Serve 当前的集成。\n\n\
    表 11-4. Ray Serve 生态系统\n\n| 库 | 描述 |\n|---|---|\n| 服务框架和应用程序 | FastAPI, Flask,\
    \ Streamlit, Gradio |\n| 可解释性和可观测性 | Arize, Seldon Alibi, WhyLabs |\n\n6 使用 Gradio\
    \ 集成时，Ray Serve 将在底层自动运行一个 Gradio 应用。该 Gradio 应用经过检测以访问每个 Serve 部署上的类型提示。当用户提交请求时，Gradio\
    \ 应用使用与输出类型匹配的 Gradio Block 显示每个部署的输出。\n\n7 该应用程序期望正确大小的图像，因为我们不想让 predict 中的预处理比必要的更复杂。你可以使用本书仓库中提供的图像数据，或者直接在线搜索\
    \ CIFAR-10 图像来自己测试该应用程序。\n\n## 构建自定义集成\n\n在更详细地解释 Ray 与其他复杂软件框架的关系之前，让我们谈谈如何为\
    \ Ray AIR 构建你自己的集成。由于 AIR 旨在实现可扩展性，你可以为所有想要构建自定义集成的任务找到合适的接口。\n\n例如，假设你想从 Snowflake\
    \ 读取数据，在其上训练一个 JAX 模型，并将你的调优结果记录到 Neptune。⁸ 在撰写本文时，尚无此类集成可用，但这在未来可能会改变。我们选择这些集成（Snowflake、JAX、Neptune）并非为了展示任何偏好；它们只是生态系统中有趣的工具。无论如何，了解如何构建此类集成是值得的。\n\
    \n要将数据从 Snowflake 加载到 Ray Dataset 中，你必须创建一个新的数据源。你通过指定如何设置它（create_reader）、如何写入源（do_write）以及成功和失败的写入尝试会发生什么（on_write_complete\
    \ 和 on_write_failed）来定义 Datasource。给定一个具体的 SnowflakeDatasource 实现，你可以将数据读入 Ray\
    \ Dataset：\n\n```\nfrom ray.data import read_datasource, datasource\n\nclass SnowflakeDatasource(datasource.Datasource):\n\
    \    pass\n\ndataset = read_datasource(SnowflakeDatasource(), ...)\n```\n\n接下来，假设你有一个有趣的\
    \ JAX 模型，你想使用 Ray Train 的功能来扩展它。具体来说，假设你想运行模型的数据并行训练，即在几个数据分片上并行训练这个单一模型。为此，Ray\
    \ 附带了一个所谓的 DataParallelTrainer。要定义一个，你必须为你的训练框架创建一个 train_loop_per_worker，并定义\
    \ Train 内部应如何处理 JAX。⁹ 有了 JaxTrainer 实现，你可以利用我们在所有 AIR 示例中使用的相同 Trainer 接口：\n\n\
    ```\nfrom ray.train.data_parallel_trainer import DataParallelTrainer\n\nclass\
    \ JaxTrainer(DataParallelTrainer):\n```\n\n8 在本章中，我们将假设你了解生态系统中的这些不同工具。如果你不了解，对于本节来说，只需理解\
    \ Snowflake 是一个你可能想要集成的数据库解决方案，JAX 是一个机器学习框架，Neptune 可用于实验跟踪。\n\n9 准确地说，你必须为 JAX\
    \ 定义一个 Backend，以及一个 BackendConfig。你的 DataParallel Trainer 然后必须使用此后端和你的训练循环进行初始化。"

  md: "```\ntune.run(\n    tune_objective,\n    config=search_space,\n    metric=\"\
    score\",\n    mode=\"min\",\n    search_alg=algo,\n    stop={\"training_iteration\"\
    : 10},\n)\n```\n\nNote that we “warm start” our Bayesian optimization with four\
    \ random steps at the beginning, and we explicitly stop the trial runs after 10\
    \ training iterations.\n\nBecause we’re not just randomly selecting parameters\
    \ with BayesOptSearch: the search_alg we use in our Tune run needs to know which\
    \ metric to optimize for and whether to minimize or optimize this metric. As we’ve\
    \ argued before, we want to achieve a “min” “score”.\n\n# Schedulers\n\nNext,\
    \ let’s discuss how to use *trial schedulers* in Tune to make your runs more efficient.\
    \ We also use this section to introduce a slightly different way to report your\
    \ metrics to Tune within an objective function.\n\nSo let’s say that instead of\
    \ computing a score straight-up, like we did in the previous examples, we compute\
    \ an *intermediate score* in a loop. This is a situation that often occurs in\
    \ supervised machine learning scenarios, when training a model for several iterations\
    \ (we’ll see concrete applications of this in “Machine Learning with Tune” on\
    \ page 115). With good hyperparameter choices selected, this immediate score might\
    \ stagnate way before the loop in which it is computed. In other words, if we’re\
    \ not seeing enough incremental changes, why not stop the trial early? This is\
    \ exactly one of the cases Tune’s schedulers are built for.\n\nHere’s a quick\
    \ example of such an objective function. This is a toy example, but it will help\
    \ us think about the optimal hyperparameters we want Tune to find more easily\
    \ than if we started with a complex example:\n\n```\ndef objective(config):\n\
    \    for step in range(30):  # ①\n        score = config[\"weight\"] * (step **\
    \ 0.5) + config[\"bias\"]\n        tune.report(score=score)  # ②\n\nsearch_space\
    \ = {\"weight\": tune.uniform(0, 1), \"bias\": tune.uniform(0, 1)}\n```\n\n+ \
    \  1. Often you may want to compute intermediate scores, e.g., in a “training\
    \ loop.”\n2. You can use tune.report to let Tune know about these intermediate\
    \ scores."

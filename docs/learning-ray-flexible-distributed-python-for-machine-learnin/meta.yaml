  - '[PAGE 217]


    other ML libraries built on top of Ray Core, AIR hides lower-level abstractions
    and provides an intuitive API that was inspired by common patterns from tools
    such as scikit-learn.


    At its core, Ray AIR was built for both data scientists and ML engineers alike.
    As a data scientist, you can use it to build and scale your end-to-end experiments
    or individual subtasks such as preprocessing, training, tuning, scoring, or serving
    of ML models. As an ML engineer, you can go so far as to build a custom ML platform
    on top of AIR or simply leverage its unified API to integrate it with other libraries
    from your ecosystem. And Ray always gives you the flexibility to drop down and
    delve into the lower-level Ray Core API.


    As part of the Ray ecosystem, AIR can leverage all its benefits, which includes
    a seamless transition from experimentation on a laptop to production workflows
    on a cluster. You often see data science teams “hand over” their ML code to teams
    responsible for production systems. In practice this can be expensive and time-consuming,
    as this process often involves modifying or even rewriting parts of the code.
    As we will see, Ray AIR helps you with this transition because AIR takes care
    of concerns such as scalability, reliability, and robustness for you.


    Ray AIR already has a respectable number of integrations today, but it’s also
    fully extensible. And as we will show you in the next section, its unified API
    provides a smooth workflow that allows you to drop-in-replace many of its components.
    For instance, you can use the same interface to define an XGBoost or PyTorch Trainer
    with AIR, which makes experimentation with various ML models convenient.


    At the same time, by choosing AIR you can avoid the problem of working with several
    (distributed) systems and writing glue code for them that’s difficult to deal
    with. Teams working with many moving parts often experience rapid deprecation
    of integrations and a high maintenance burden. These issues can lead to *migration
    fatigue*, a reluctance to adopt new ideas due to the anticipated complexity of
    system changes.


    ![](img/6489687a3a178f2884963bddc928992c_217_0.png)


    As with every chapter, you can follow the code examples in [the accompanying Jupyter
    notebook](link_placeholder).'

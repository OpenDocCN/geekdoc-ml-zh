  md: '+   - One of the models will leverage vectorized computation via batching.

    - The API will be defined using Ray Serve''s FastAPI for input parsing and defining
    our output schema.


    Our online inference pipeline will be structured as shown in Figure 8-2:


    +   1. The user will provide a keyword search term.

    2. We''ll fetch the content for the most relevant Wikipedia article for the search
    term.

    3. A sentiment analysis model will be applied to the article. Anything with a
    “negative” sentiment will be rejected, and we''ll return early.

    4. The article content will be broadcast to summarizer and named entity recognition
    models.

    5. We''ll return a composed result based on the summarizer and named entity recognition
    outputs.


    ![](img/6489687a3a178f2884963bddc928992c_192_0.png)


    Figure 8-2. The architecture for an NLP pipeline to summarize Wikipedia articles


    This pipeline will be exposed over HTTP and return the results in a structured
    format. By the end of this section, we''ll have the pipeline running from end
    to end locally and ready to scale up on a cluster. Let''s get started!


    Before we dive into the code, you''ll need the following Python packages installed
    locally:


    ```

    pip install "ray[serve]==2.2.0" "transformers==4.21.2"


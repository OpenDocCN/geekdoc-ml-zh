    \ that brings the total runtime to 2.82 seconds. On your end this might be slightly\
    \ less, or much more, depending on your computer. The important takeaway is that\
    \ our naive Python implementation is not able to run this function in parallel.\n\
    \nThis may not come as a surprise to you, but you could at least have suspected\

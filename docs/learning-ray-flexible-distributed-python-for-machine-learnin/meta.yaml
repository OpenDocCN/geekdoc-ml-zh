  - '[PAGE 120]


    With RLlib, you can completely customize the models and policies used under the
    hood. If you''ve worked with deep learning before, you know how important it can
    be to have a good model architecture in place. In RL this is often not as crucial
    as in supervised learning, but it is still a vital part of successfully running
    advanced experiments.


    You can also change the way your observations are preprocessed by providing custom
    preprocessors. For our simple maze examples, there was nothing to preprocess,
    but when working with image or video data, preprocessing is often a crucial step.


    In our *AdvancedEnv* we introduced states to avoid. Our agents had to learn to
    do this, but RLlib has a feature to automatically avoid them through so-called
    *parametric action spaces*. Loosely speaking, what you can do is “mask out” all
    undesired actions from the action space for each point in time. In some cases
    it can also be necessary to have variable observation spaces, which is also fully
    supported by RLlib.


    We briefly touched on the topic of offline data. RLlib has a full-fledged Python
    API for reading and writing experience data that can be used in various situations.


    We have worked solely with DQN here for simplicity, but RLlib has an impressive
    range of training algorithms. To name just one, the MARWIL algorithm is a complex
    hybrid algorithm with which you can run imitation learning from offline data,
    while also mixing in regular training on data generated “online.”


    # Summary


    You''ve seen a selection of interesting RLlib features in this chapter. We covered
    training multi-agent environments, working with offline data generated by another
    agent, setting up a client-server architecture to split simulations from RL training,
    and using curriculum learning to specify increasingly difficult tasks.


    We''ve also given you a quick overview of the main concepts underlying RLlib and
    how to use its CLI and Python API. In particular, we''ve shown how to configure
    your RLlib algorithms and environments to your needs. As we''ve covered only a
    small part of RLlib''s possibilities, we encourage you to read its [documentation
    and explore its API](https://docs.ray.io/en/latest/rllib/index.html).


    In the next chapter you''ll learn how to tune the hyperparameters of your RLlib
    models and policies with Ray Tune.'

    \ say there's a deadlock somewhere in the database connection. The driver would\
    \ simply hang and never retrieve all items. For that reason it's a good idea to\
    \ work with reasonable timeouts. Let's say we don't want to wait longer than 10\
    \ times the longest data retrieval task before stopping the task. Here's how you\
    \ can do that with Ray by using wait:\n\n```\nstart = time.time()\nobject_references\
    \ = [\n    retrieve_task.remote(item, db_object_ref) for item in range(8)\n]\n\
    all_data = []\n\nwhile len(object_references) > 0:\n    finished, object_references\
    \ = ray.wait(\n        object_references, num_returns=2, timeout=7.0\n    )\n\
    \    data = ray.get(finished)\n    print_runtime(data, start)\n    all_data.extend(data)\n\

  md: '# Working with RLlib Environments


    So far we''ve introduced you to just Gym environments, but RLlib supports a wide
    variety of environments. After giving you a quick overview of all available options
    (see Figure 4-1), we''ll show you two concrete examples of advanced RLlib environments
    in action.


    # An Overview of RLlib Environments


    All available RLlib environments extend a common BaseEnv class. If you want to
    work with several copies of the same gym.Env environment, you can use RLlib''s
    VectorEnv wrapper. Vectorized environments are useful, but they are straightforward
    generalizations of what you''ve seen already. The two other types of environments
    available in RLlib are more interesting and deserve more attention.


    ![](img/6489687a3a178f2884963bddc928992c_106_0.png)


    The first is called MultiAgentEnv, which allows you to train a model with multiple
    agents. Working with multiple agents can be tricky. That''s because you have to
    take care to define your agents within your environment with a suitable interface
    and account for the fact that each agent might have a completely different way
    of interacting with its environment.


    What''s more is that agents might interact with each other, and they have to respect
    each other''s actions. In more advanced settings, there might even be a hierarchy
    of agents that explicitly depend on each other. In short, running multi-agent
    RL experiments is difficult, and we''ll see how RLlib handles this in the next
    example.


    The other type of environment we will look at is called ExternalEnv, which can
    be used to connect external simulators to RLlib. For instance, imagine our simple
    maze problem from earlier was a simulation of an actual robot navigating a maze.
    It might not be suitable in such scenarios to co-locate the robot (or its simulation,
    implemented in a different software stack) with RLlib''s learning agents. To account
    for that, RLlib provides you with a simple client-server architecture for communicating
    with external simulators, which allows communication over a REST API. In case'

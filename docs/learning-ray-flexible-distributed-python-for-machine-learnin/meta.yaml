  md: "Vectorized computations are especially useful on GPUs when performing deep\
    \ learning training or inference. However, generally performing computations on\
    \ GPUs also has significant fixed cost due to needing to load model weights or\
    \ other data into the GPU RAM. For this purpose, Ray Datasets supports mapping\
    \ data using Ray actors. Ray actors are long-lived and can hold state, as opposed\
    \ to stateless Ray tasks, so we can cache expensive operations costs by running\
    \ them in the actor's constructor (such as loading a model onto a GPU).\n\nFor\
    \ example, to perform batch inference using Datasets, we need to pass a class\
    \ instead of a function, specify that this computation should run using actors,\
    \ and use `.map_batches()` so we can perform vectorized inference. Datasets will\
    \ automatically autoscale a group of actors to perform the map operation:\n\n\
    ```\ndef load_model():\n    # Returns a dummy model for this example.\n    # In\
    \ reality, this would likely load some model weights onto a GPU.\n    class DummyModel:\n\
    \        def __call__(self, batch):\n            return batch\n\n    return DummyModel()\n\
    \nclass MLModel:\n    def __init__(self):\n        # load_model() will only run\
    \ once per actor that's started.\n        self._model = load_model()\n\n    def\
    \ __call__(self, batch):\n        return self._model(batch)\n\nds.map_batches(MLModel,\
    \ compute=\"actors\")\n```\n\nTo run the inference on a GPU, we would pass `num_gpus=1`\
    \ to the `map_batches` call to specify that the actors running the map function\
    \ each require a GPU.\n\n# Dataset Pipelines\n\nBy default, Dataset operations\
    \ are blocking, meaning they run synchronously from start to finish and there\
    \ is only a single operation happening at a time. This pattern can be very inefficient\
    \ for some workloads, however. For example, consider the following set of Dataset\
    \ transformations on Parquet data that might be used to do batch inference for\
    \ a machine learning model:²\n\n> ² Parquet is a structured, column-oriented format\
    \ that enables efficient compression, data storage, and data retrieval. Many example\

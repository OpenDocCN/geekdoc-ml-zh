  mdcn: "## 接下来该去哪里？\n\n从[第1章](#)对Ray的概述，到本章对其生态系统的讨论，我们已经走了很长一段路。但作为一本入门书籍，我们只是触及了Ray能力的冰山一角。虽然你现在应该已经很好地掌握了Ray\
    \ Core的基础知识、Ray集群的工作原理，并且知道何时使用AIR及其组成部分库（Datasets、Train、RLlib、Tune和Serve），但关于每个方面，还有很多东西需要学习。\n\
    \n首先，详尽的[Ray Core用户指南](#)将让你更深入地了解Ray任务、Actor和对象；它们在集群节点上的放置；以及如何处理应用程序的依赖关系。特别是，你会发现一些有趣的模式和反模式，以帮助你设计好Ray\
    \ Core程序并避免常见陷阱。要了解更多关于Ray内部工作原理的内容，我们建议阅读一些关于Ray的高级论文，例如其[架构白皮书](#)。\n\n我们完全跳过的一个有趣话题是Ray围绕*可观测性*的工具。官方的[Ray可观测性文档](#)是这个话题的一个良好起点。你可以在那里学习如何调试和分析你的Ray应用程序，从Ray集群记录信息，监控它们的行为，并导出重要指标。\n\
    \n你还会在那里找到关于*Ray仪表板*的介绍，它可以帮助你理解你的Ray程序。\n\n本书的重点是向机器学习从业者介绍Ray的核心思想，并为你提供使用Ray处理工作负载的实用起点。然而，有一个主题比本书能包含的一章内容更值得关注，那就是如何构建、扩展和维护Ray集群。目前，关于高级Ray集群主题的最佳入门资料是[Ray文档](https://docs.ray.io/)。在那里，你可以比我们在这里能涵盖的更详细地学习如何在所有主要云提供商上部署集群，如何在Kubernetes上扩展集群，以及如何向集群提交Ray作业。\n\
    \n在本章中，我们只能顺带提及大多数Ray集成。如果你想了解更多关于Ray的第三方集成，[Ray生态系统页面](https://www.ray.io/ecosystem)是一个很好的起点。同样，重要的是要提到[更多的Ray库](https://docs.ray.io/en/latest/ray-overview/libs.html)可用，但它们未能入选本书，例如Ray\
    \ Workflows和一个分布式、可直接替代Python multiprocessing库的库。\n\n最后，如果你有兴趣成为Ray社区的一员，有很多好方法可以做到。你可以加入[Ray\
    \ Slack](https://ray.io/slack)与Ray开发者和其他社区成员联系，或者加入Ray的[讨论论坛](https://discuss.ray.io/)来获得问题解答。如果你想帮助开发Ray，无论是为文档做贡献、添加新的用例，还是帮助开源社区开发新功能或修复错误，你应该查看官方的[Ray贡献者指南](https://docs.ray.io/en/latest/ray-contribute/overview.html)。\n\
    \n## 总结\n\n在本章中，你从AI运行时的角度了解了更多关于Ray生态系统的内容。你已经看到了Ray AIR库可用的全部集成，以及一个使用三种不同集成（用于数据加载和训练的PyTorch、用于日志记录的MLflow和用于模型服务的Gradio）来训练和提供机器学习模型的示例。你现在应该能够走出去，运行自己的AIR实验，连同你已经在使用或打算在未来使用的所有工具。我们还讨论了Ray的局限性，它与各种相关系统的比较，以及如何将Ray与其他工具结合使用来增强或构建你自己的机器学习平台。\n\
    \n这结束了本章和本书。我们希望它激发了你对Ray的兴趣，并帮助你开始了与它的旅程。AIR的引入为Ray生态系统带来了许多新功能，而且路线图上肯定还有更多令人兴奋的内容。毫无疑问，你现在可以深入任何高级Ray材料——也许你已经有了构建第一个自己的Ray应用程序的想法。\n\

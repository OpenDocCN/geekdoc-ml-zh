    n    --algo DQN\\n    --env maze_gym_env.Environment\\n    --steps 100\n```\n\n\
    The algorithm used in --algo and the environment specified with --env have to\
    \ match the ones used in the training run, and we evaluate the trained algorithm\
    \ for a total of 100 steps. This should lead to output of the following form:\n\
    \n```\nEpisode #1: reward: 1.0\nEpisode #2: reward: 1.0\nEpisode #3: reward: 1.0\n\
    ...\nEpisode #13: reward: 1.0\n```\n\nIt should not come as a big surprise that\
    \ the DQN algorithm from RLlib gets the maximum reward of 1 for the simple maze\
    \ environment we tasked it with every single time.\n\nBefore moving on to the\
    \ Python API, we should mention that the RLlib CLI uses Ray Tune under the hood,\
    \ for instance, to create the checkpoints of your algorithms. You will learn more\
    \ about this integration in Chapter 5.\n\n⁵ To be precise, RLlib uses a double\
    \ and dueling DQN.\n\n⁶ In the GitHub repo for this book we've also included an\
    \ equivalent maze.yml file that you could use via rllib train file maze.yml (no\
    \ --type needed).\n\n## Using the RLlib Python API\n\nIn the end, the RLlib CLI\
    \ is merely a wrapper around its underlying Python library. As you will likely\
    \ spend most of your time coding your RL experiments in Python, we'll focus the\
    \ rest of this chapter on aspects of this API.\n\nTo run RL workloads with RLlib\
    \ from Python, the `Algorithm` class is your main entry point. Always start with\
    \ a corresponding `AlgorithmConfig` class to define an algorithm. For instance,\
    \ in the previous section we used a `DQNConfig` as a starting point, and the `rllib\
    \ train` command took care of instantiating the DQN algorithm for us. All other\
    \ RLlib algorithms follow the same pattern.\n\n## Training RLlib algorithms\n\n\
    Every RLlib `Algorithm` comes with reasonable default parameters, meaning that\
    \ you *can* initialize them without having to tweak any configuration parameters\
    \ for these algorithms.⁷\n\nThat said, it's worth noting that RLlib algorithms\
    \ are highly configurable, as you will see in the following example. We start\
    \ by creating a `DQNConfig` object. Then we specify its environment and set the\
    \ number of rollout workers to two by using the `rollouts` method. This means\
    \ that the DQN algorithm will spawn two Ray actors, each using a CPU by default,\
    \ to run the algorithm in parallel. Also, for later evaluation purposes, we set\
    \ `create_env_on_local_worker` to `True`:\n\n```\nfrom ray.tune.logger import\
    \ pretty_print\nfrom maze_gym_env import GymEnvironment\nfrom ray.rllib.algorithms.dqn\
    \ import DQNConfig\n\nconfig = (DQNConfig().environment(GymEnvironment)\n    \
    \      .rollouts(num_rollout_workers=2, create_env_on_local_worker=True))\n\n\
    pretty_print(config.to_dict())\n\nalgo = config.build()\n\nfor i in range(10):\n\
    \    result = algo.train()\n\nprint(pretty_print(result))\n```\n\n⁷ Of course,\
    \ configuring your models is a crucial part of RL experiments. We will discuss\
    \ configuration of RLlib algorithms in more detail in the next section.\n\n1.\
    \ Set the environment to our custom GymEnvironment class and configure the number\
    \ of rollout workers and ensure that an environment instance is created on the\
    \ local worker.\n2. Use the DQNConfig from RLlib to build a DQN algorithm for\
    \ training. This time we use two rollout workers.\n3. Call the train method to\
    \ train the algorithm for 10 iterations.\n4. With the pretty_print utility, we\
    \ can generate human-readable output of the training results.\n\nNote that the\
    \ number of training iterations has no special meaning, but it should be enough\
    \ for the algorithm to learn to solve the maze problem adequately. The example\
    \ just goes to show that you have full control over the training process.\n\n\
    From printing the config dictionary, you can verify that the num_rollout_workers\
    \ parameter is set to 2.⁸ The result contains detailed information about the state\
    \ of the DQN algorithm and the training results, which are too verbose to show\
    \ here. The part that's most relevant for us right now is information about the\
    \ reward of the algorithm, which ideally indicates that the algorithm learned\
    \ to solve the maze problem. You should see output of the following form (we're\
    \ showing only the most relevant information for clarity):\n\n```\n...\nepisode_reward_max:\
    \ 1.0\nepisode_reward_mean: 1.0\nepisode_reward_min: 1.0\nepisodes_this_iter:\
    \ 15\nepisodes_total: 19\n...\ntraining_iteration: 10\n...\n```\n\nIn particular,\
    \ this output shows that the minimum reward attained on average per episode is\
    \ 1.0, which in turn means that the agent always reached the goal and collected\
    \ the maximum reward (1.0).\n\n⁸ If you set num_rollout_workers to 0, only the\
    \ local worker on the head node will be created, and all sampling from the env\
    \ is done there. This is particularly useful for debugging, as no additional Ray\
    \ actor processes are spawned.\n\n## Saving, loading, and evaluating RLlib models\n\
    \nReaching the goal for this simple example isn't too difficult, but let's see\
    \ if evaluating the trained algorithm confirms that the agent can also do so in\
    \ an optimal way, namely, by taking only the minimum number of eight steps to\
    \ reach the goal.\n\nTo do so, we utilize another mechanism that you've already\
    \ seen from the RLlib CLI: *checkpointing*. Creating algorithm checkpoints is\
    \ useful to ensure you can recover your work in case of a crash or simply to track\
    \ training progress persistently. You can create a checkpoint of an RLlib algorithm\
    \ at any point in the training process by calling `algo.save()`. Once you have\
    \ a checkpoint, you can easily restore your Algorithm with it. Evaluating a model\
    \ is as simple as calling `algo.evaluate(checkpoint)` with the checkpoint you\
    \ created. Here's how it looks if you put it all together:\n\n```\nfrom ray.rllib.algorithms.algorithm\
    \ import Algorithm\n\ncheckpoint = algo.save()  # 1\nprint(checkpoint)\n\nevaluation\
    \ = algo.evaluate()  # 2\nprint(pretty_print(evaluation))\n\nalgo.stop()  # 3\n\
    restored_algo = Algorithm.from_checkpoint(checkpoint)  # 4\n```\n\n1. Save algorithms\
    \ to create checkpoints.\n2. Evaluate RLlib algorithms at any point in time by\
    \ calling evaluate.\n3. Stop an algo to free all claimed resources.\n4. Restore\
    \ any Algorithm from a given checkpoint with from_checkpoint.\n\nLooking at the\
    \ output of this example, we can now confirm that the trained RLlib algorithm\
    \ did indeed converge to a good solution for the maze problem, as indicated by\
    \ episodes of length 8 in evaluation:\n\n```\n~/ray_results/DQN_GymEnvironment_2022-02-09_10-19-301o3m9r6d/checkpoint_000010/\n\
    checkpoint-10 evaluation:\n...\nepisodes_this_iter: 5\nhist_stats:\n  episode_lengths:\n\
    \  - 8\n  - 8\n  ...\n```\n\n## Computing actions\n\nRLlib algorithms have much\
    \ more functionality than just the train, evaluate, save, and from_checkpoint\
    \ methods we've seen so far. For example, you can directly compute actions given\
    \ the current state of an environment. In Chapter 3 we implemented episode rollouts\
    \ by stepping through an environment and collecting rewards. We can easily do\
    \ the same with RLlib for our GymEnvironment:\n\n```\nenv = GymEnvironment()\n\
    done = False\ntotal_reward = 0\nobservations = env.reset()\n\nwhile not done:\n\
    \    action = algo.compute_single_action(observations)\n    observations, reward,\
    \ done, info = env.step(action)\n    total_reward += reward\n```\n\nTo compute\
    \ actions for given observations, use compute_single_action.\n\nIn case you should\
    \ need to compute many actions at once, not just a single one, you can use the\
    \ compute_actions method instead, which takes dictionaries of observations as\
    \ input and produces dictionaries of actions with the same dictionary keys as\
    \ output:\n\n```\naction = algo.compute_actions(\n    {\"obs_1\": observations,\
    \ \"obs_2\": observations}\n)\nprint(action)\n# {'obs_1': 0, 'obs_2': 1}\n```\n\
    \nFor multiple actions, use compute_actions.\n\n## Accessing policy and model\
    \ states\n\nRemember that each reinforcement learning algorithm is based on a\
    \ policy that chooses next actions given the agent's current observations of the\
    \ environment. Each policy is in turn based on an underlying model.\n\nIn the\
    \ case of vanilla Q-Learning that we discussed in Chapter 3, the model was a simple\
    \ lookup table of state-action values, also called Q-values. And that policy used\
    \ this model for predicting next actions in case it decided to exploit what the\
    \ model had learned so far or to explore the environment with random actions otherwise.\n\
    \nWhen using Deep Q-Learning, the underlying model of the policy is a neural network\
    \ that, loosely speaking, maps observations to actions. Note that for choosing\
    \ next actions in an environment, we're ultimately not interested in the concrete\
    \ values of the approximated Q-values, but rather in the probabilities of taking\
    \ each action. The probability distribution over all possible actions is called\
    \ an action distribution."

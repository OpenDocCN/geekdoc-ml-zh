    You can imagine Ray''s core engine with its API at the center of things, on which
    everything else builds. Ray''s data science libraries build on top of Ray Core
    and provide a domain-specific abstraction layer.⁷ In practice, many data scientists
    will use these libraries directly, while ML or platform engineers might rely heavily
    on building their tools as extensions of the Ray Core API. Ray AIR can be seen
    as an umbrella that links Ray libraries and offers a consistent framework for
    dealing with common AI workloads. And the growing number of third-party integrations
    for Ray is another great entry point for experienced practitioners. Let''s look
    into each one of the layers one by one.


    # A Distributed Computing Framework


    At its core, Ray is a distributed computing framework. We''ll provide you with
    just the basic terminology here and talk about Ray''s architecture in depth in
    Chapter 2. In short, Ray sets up and manages clusters of computers so that you
    can run distributed tasks on them. A Ray Cluster consists of nodes that are connected
    to each other via a network. You program against the so-called *driver*, the program
    root, which lives on the *head node*. The driver can run *jobs*, a collection
    of tasks, that are run on the nodes in the cluster. Specifically, the individual
    tasks of a job are run on *worker* processes on *worker nodes*. Figure 1-1 illustrates
    the basic structure of a Ray Cluster. Note that we''re not concerned with communication
    between nodes just yet; this diagram merely shows the layout of a Ray Cluster.


    ![](img/6489687a3a178f2884963bddc928992c_27_0.png)


    Figure 1-1. The basic components of a Ray Cluster


    What''s interesting is that a Ray Cluster can also be a *local cluster*, a cluster
    consisting of just your own computer. In this case, there''s just one node, namely,
    the head node, which has the driver process and some worker processes. The default
    number of worker processes is the number of CPUs available on your machine.


    7 One of the reasons so many libraries are built on top of Ray Core is that it''s
    so lean and straightforward to reason about. One of the goals of this book is
    to inspire you to write your own applications, or even libraries, with Ray.'

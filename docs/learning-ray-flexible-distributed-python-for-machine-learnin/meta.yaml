  md: "```\nclass SimulationActor(Simulation):\n    \"\"\"Ray actor for a Simulation.\"\
    \"\"\n    def __init__(self):\n        env = Environment()\n        super().__init__(env)\n\
    ```\n\n❶ This Ray actor wraps our Simulation class in a straightforward way.\n\
    \nWith the foundations on Ray Core you've developed in Chapter 2, you should have\
    \ no problems reading this code. It might take some practice to be able to write\
    \ it yourself, but conceptually you should be on top of this example.\n\nMoving\
    \ on, let's define a train_policy_parallel function that distributes this RL workload\
    \ on your local Ray Cluster. To do so, we create a policy on the driver and a\
    \ total of four SimulationActor instances that we can use for distributed rollouts.\
    \ We then put the policy into the object store with ray.put and pass it to the\
    \ remote rollout calls as an argument to collect experiences for a given number\
    \ of training episodes. We then use ray.wait to get the finished rollouts (and\
    \ account for the fact that some rollouts might finish earlier than others) and\
    \ update our policy with the collected experiences. Finally, we return the trained\
    \ policy:\n\n```\ndef train_policy_parallel(env, num_episodes=1000, num_simulations=4):\n\
    \    \"\"\"Parallel policy training function.\"\"\"\n    policy = Policy(env)\
    \ ❶\n    simulations = [SimulationActor.remote() for _ in range(num_simulations)]\
    \ ❷\n\n    policy_ref = ray.put(policy) ❸\n    for _ in range(num_episodes):\n\
    \        experiences = [sim.rollout.remote(policy_ref) for sim in simulations]\
    \ ❹\n\n        while len(experiences) > 0:\n            finished, experiences\
    \ = ray.wait(experiences) ❺\n            for xp in ray.get(finished):\n      \
    \          update_policy(policy, xp)\n\n    return policy\n```\n\n+   ❶ Initialize\
    \ a policy for the given environment.\n❷ Instead of one simulation, create four\
    \ simulation actors.\n❸ Put the policy into the object store.\n❹ For each of the\
    \ 1,000 episodes, collect experience data in parallel using our simulation actors."

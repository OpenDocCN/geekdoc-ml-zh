  - '[PAGE 231]


    Actors are used if a transformation has state or needs an expensive setup, like
    loading large model checkpoints. In this case, loading large models in an actor
    once to reuse it for inference tasks can benefit overall performance. When Ray
    Datasets is using actors, these actors are created first, and the necessary data
    (in our example the loaded model) is transferred to them before the transformation
    in question gets executed.


    In general, datasets are stored in Ray object store memory, while large datasets
    are spilled to disk. But for stateless transformations there is often no need
    to keep intermediate results in memory. Using *pipelining* on Datasets, as we''ve
    shown in Chapter 6, data can instead be streamed to and from storage to increase
    performance.⁸ The idea is to load only the fraction of the data currently needed
    to execute a transformation. This can drastically reduce the memory footprint
    of the transformation and often speed up the overall execution.


    # Stateful execution


    Ray Train and RLlib spawn actors for their distributed training workers. As demonstrated
    multiple times, both libraries also integrate seamlessly with Tune. In Chapter
    5 we detailed how Tune launches Trials, which in essence are groups of actors
    executing a certain workload. If you use Train or RLlib with Tune, that in turn
    means that a tree of actors gets created, namely, an actor for each Tune Trial,
    and subactors for the parallel training workers requested by Train or RLlib.


    In terms of workload execution, this naturally creates an inner and an outer layer.
    Each subactor in a Tune Trial has full autonomy over its workload, as requested
    in the respective Train or RLlib training run you specified. This represents the
    inner execution layer. On the outer layer, Tune needs to monitor the status of
    individual trials, which it does by periodically reporting metrics to the Trial
    driver. Figure 10-9 illustrates this nested creation and execution of Ray actors
    for this scenario.


    ![](img/6489687a3a178f2884963bddc928992c_231_0.png)


    Figure 10-9. Running distributed training on AIR with Tune


    ⁸ All crucial AIR components such as Trainer or BatchPredictor support this pipelining
    feature.'
  - '[PAGE 232]


    # Composite workload execution


    Composite workloads leverage both task- and actor-based computation simultaneously.
    This can lead to interesting resource allocation challenges. Trial actors need
    to reserve their resources upfront, but stateless tasks don''t. The problem you
    can run into is that all available resources might get reserved for your training
    actors with none left for data loading tasks.


    AIR prevents this by allowing Tune to reserve a maximum of 80% of a node''s CPU.
    You can tune this parameter, but this is a sensible default that ensures basic
    resource availability for stateless computations. In the common scenario in which
    your training operations leverage GPUs and your data processing steps don''t,
    this becomes a nonissue.


    # Online serving execution


    For online serving Ray Serve manages a pool of stateless actors to serve your
    requests. Some actors listen for incoming requests and call other actors to perform
    the predictions. Requests are automatically load-balanced using a round-robin
    algorithm to the pool of actors hosting the models. Load metrics are sent to the
    Serve component to perform autoscaling.


    # AIR Memory Management


    In this section we take a bit of a deep dive into the specific memory management
    techniques of AIR. We''ll discuss to what extent the Ray object store is used
    by AIR. You can skip this section if you find it too technical. The upshot is
    that Ray employs smart techniques that will ensure your data and compute are properly
    distributed and scheduled.


    When you load data using Ray Datasets, you already know that internally these
    Datasets are partitioned into blocks of data in your cluster. A block is simply
    a collection of Ray objects. Choosing the right block size is difficult and presents
    a trade-off between the overhead of having to manage too many small blocks and
    risking out-of-memory (OOM) exceptions due to blocks that are too large. AIR takes
    a pragmatic approach and tries to distribute in such a way that blocks don''t
    exceed 512 MB. In case this can''t be ensured, a warning will be issued. Should
    a block not fit into memory, AIR will spill your data to local disk.


    Your stateful workloads will use the Ray object store to varying degrees. For
    instance, RLlib uses Ray objects to broadcast model weights to individual rollout
    workers and for experience data collection. Tune uses it to set up Trials by sending
    and retrieving AIR Checkpoints. For technical reasons actors risk running into
    OOM issues if too'
- md: 'much memory is required relative to the allocated resources.⁹ If you know your
    memory requirements in advance, you can adapt the memory in your `ScalingConfig`
    accordingly, or simply ask for additional cpu resources.


    In composite workloads stateful actors (e.g., for training) have to access data
    created by stateless tasks (e.g., for preprocessing), which makes memory allocation
    more challenging. Let''s look at two scenarios:


    - If the actors responsible for training have enough space (in the object store)
    to fit all training data in memory, the situation is simple. First the preprocessing
    steps run, and then all data blocks are downloaded to the respective nodes. Training
    actors then simply iterate data that''s kept in memory.

    - Otherwise, data processing needs *pipelined execution*, which means that data
    will be processed by tasks on the fly and will be downloaded on demand by training
    Actors afterward. If the respective training actor is co-located on the node that
    did the processing, data will be retrieved from shared memory.


    ## AIR Failure Model


    AIR offers fault tolerance for most stateless computations through *lineage reconstruction*.
    This means Ray will reconstruct Dataset blocks if they are lost due to node failures
    by resubmitting the necessary tasks, enabling workloads to scale to large clusters.
    Note that fault tolerance does not apply to head node failures. And a crash of
    the Global Control Service (GCS) storing cluster metadata will kill all your jobs
    in the cluster.¹⁰


    Jobs involving stateful computations primarily rely on checkpoint-based fault
    tolerance. Tune will restart distributed trials from their last checkpoint as
    configured in its failure configuration. With a configured checkpoint interval,
    this means that Tune can run trials effectively on clusters consisting of “spot
    instances.” In addition, it is possible to resume entire Tune experiments from
    the experiment-wide checkpoint in case of whole-cluster failure.


    Composite workloads inherit the fault-tolerance strategies of both stateless and
    stateful workloads, retaining the best of both worlds. This means that lineage
    reconstruction applies to the stateless portion of the workload, and application-level
    checkpointing still applies to the overall computation.


    ⁹ Stateful workloads use Python''s heap memory, which is not managed by Ray.

    ¹⁰ GCS can be deployed in *high availability* (HA) mode to prevent this, but that
    is typically beneficial only for online serving workloads.


    ## Autoscaling AIR Workloads


    AIR libraries can run on autoscaling Ray Clusters that we introduced in Chapter
    9. For stateless workloads, Ray will autoscale automatically if there are queued
    tasks (or queued Dataset compute actors). For stateful workloads, Ray will autoscale
    up if there are pending placement groups (i.e., Tune trials) not yet scheduled
    in the cluster. Ray will autoscale down when nodes are idle. A node is considered
    idle when there is no resource usage on the node and also no Ray objects in memory
    or spilled on disk on the node. Since most AIR libraries leverage objects, this
    means that nodes may be kept if they are holding objects referenced by workers
    on other nodes (e.g., Dataset block used by another trial).


    You should be aware that autoscaling may result in less than ideal data balancing
    in the cluster because nodes that are started earlier naturally run more tasks
    over their lifetime. Consider limiting (e.g., starting with a certain minimum
    cluster size) or disabling autoscaling to optimize the efficiency of data-intensive
    workloads.


    ## Summary


    In this chapter you’ve seen how all the Ray libraries we’ve introduced come together
    to form the Ray AI Runtime. You’ve learned about all the key concepts that allow
    you to build scalable ML projects, from experimentation to production. In particular,
    you’ve seen how Ray Datasets are used for stateless computations such as feature
    preprocessing, and how Ray Train, Tune, and RLib are used for stateful computations
    such as model training. Seamlessly combining these types of computations in complex
    AI workloads and scaling them out to large clusters is a key strength of AIR.
    Deploying your AIR projects comes essentially for free, as AIR fully integrates
    with Ray Serve as well.


    In Chapter 11 we’ll show you how Ray, and particularly AIR, fits into the broader
    landscape of related tools. Knowing the rich set of integrations and extensions
    of Ray’s ecosystem will help you understand how to leverage Ray in your own projects.



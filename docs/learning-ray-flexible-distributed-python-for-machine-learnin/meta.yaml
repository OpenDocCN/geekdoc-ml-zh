    ```\n\n```python\ntune.run(\n    objective,\n    config=search_space,\n    stop=stopper)\n\
    ```\n\n在需要更多上下文或显式状态的停止条件的情况下，你还可以定义一个自定义的 Stopper 类来传递给你的 Tune 运行的 `stop` 参数，但我们不会在这里介绍这种情况。\n\
    \n## 自定义和条件搜索空间\n\n我们将在这里介绍的最后一个更高级的主题是复杂搜索空间。到目前为止，我们只研究了彼此独立的超参数，但在实践中，一些参数通常依赖于其他参数。此外，虽然\

  md: '# An Introduction to Ray Serve


    Ray Serve is a scalable compute layer for serving ML models on top of Ray. Serve
    is framework-agnostic, meaning that it isn''t tied to a specific ML library; rather,
    it treats models as ordinary Python code. Additionally, it allows you to flexibly
    combine normal Python business logic alongside ML models. This makes it possible
    to build online inference services completely: a Serve application could validate
    user input, query a database, perform scalable inference across multiple ML models,
    and combine, filter, and validate the output—all in the process of handling a
    single inference request. Indeed, combining the results of multiple ML models
    is one of the key strengths of Ray Serve, as you''ll see in “Multimodel Inference
    Graphs” on page 166.


    While flexible, Ray Serve has purpose-built features for compute-heavy ML models,
    enabling dynamic scaling and resource allocation to ensure that request load can
    be handled efficiently across many CPUs and/or GPUs. Here, Serve inherits a lot
    of benefits from being built on top of Ray: it''s scalable to hundreds of machines,
    offers flexible scheduling policies, and offers low-overhead communication across
    processes using Ray''s core APIs.


    This section incrementally introduces core functionality from Ray Serve with a
    focus on how it helps address the challenges of online inference previously outlined.
    To follow along with the code samples in this section, you''ll need the following
    Python packages installed locally:


    ```

    pip install "ray[serve]==2.2.0" "transformers==4.21.2" "requests==2.28.1"

    ```


    Running the examples assumes that you have the code saved locally in a file named
    *app.py* in the current working directory.


    # Architectural Overview


    Ray Serve is built on top of Ray, so it inherits a lot of benefits such as scalability,
    low-overhead communication, an API well suited to parallelism, and the ability
    to leverage shared memory via the object store. The core primitive in Ray Serve
    is a *deployment*, which you can think of as a managed group of Ray actors that
    can be addressed together and that will handle requests load-balanced across them.
    Each actor in a deployment is called a *replica* in Ray Serve. Often, a deployment
    will map one-to-one with an ML model, but deployments can contain arbitrary Python
    code, so they might also house business logic.


    Ray Serve enables exposing deployments over HTTP and defining the input parsing
    and output logic. However, one of the most important features of Ray Serve is
    that deployments can also call into each other directly using a native Python
    API, which will translate to direct actor calls between the replicas. This enables
    flexible, high-performance composition of models and business logic; you''ll see
    this in action later in the section.'

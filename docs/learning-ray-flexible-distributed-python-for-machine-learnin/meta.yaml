    \ currently in flight.\n\nFor more details about resource allocation options,\
    \ refer to the [latest Ray Serve documentation](https://docs.ray.io/en/latest/serve/index.html).\n\
    \n## Request Batching\n\nMany machine learning models can be efficiently *vectorized*,\
    \ meaning that multiple computations can be run in parallel more efficiently than\
    \ running them sequentially. This is especially beneficial when running models\
    \ on GPUs that are purpose-built for efficiently performing many computations\
    \ in parallel. In the context of online inference this offers a path for optimization:\
    \ serving multiple requests (possibly from different sources) in parallel can\
    \ drastically improve the throughput of the system (and therefore save cost).\n\
    \nTwo high-level strategies take advantage of request batching: client-side batching\
    \ and server-side batching. In *client-side batching*, the server accepts multiple\
    \ inputs in a single request, and clients include logic to send them in batches\
    \ instead of one at a time. This is useful in situations where a single client\
    \ is frequently sending many inference requests. *Server-side batching*, in contrast,\
    \ enables the server to batch multiple requests without requiring any modification\
    \ on the client. This can also be used to batch requests across multiple clients,\
    \ which enables efficient batching even in situations with many clients that send\

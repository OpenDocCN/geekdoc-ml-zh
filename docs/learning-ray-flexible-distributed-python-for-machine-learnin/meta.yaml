- md: "## Working with Policy Servers and Clients\n\nFor the last example in this\
    \ section, let's assume our original `GymEnvironment` can be simulated only on\
    \ a machine that can't run RLlib, for instance because it doesn't have enough\
    \ resources available. We can run the environment on a `PolicyClient` that can\
    \ ask a respective `server` for suitable next actions to apply to the environment.\
    \ The server, in turn, does not know about the environment. It only knows how\
    \ to ingest input data from a `PolicyClient`, and it is responsible for running\
    \ all RL-related code; in particular, it defines an RLlib `AlgorithmConfig` object\
    \ and trains an `Algorithm`.\n\nTypically, you want to run the server that trains\
    \ your algorithm on a powerful Ray Cluster, and then the respective client runs\
    \ outside that cluster. Figure 4-3 schematically illustrates this setup.\n\n![Figure\
    \ 4-3. Working with policy servers and clients in RLlib](img/6489687a3a178f2884963bddc928992c_112_0.png)\n\
    \n## Defining a server\n\nLet's start by defining the server side of such an application\
    \ first. We define a so-called PolicyServerInput that runs on localhost on port\
    \ 9900. This policy input is what the client will provide later. With this policy_input\
    \ defined as input to our algorithm configuration, we can define yet another DQN\
    \ to run on the server:\n\n```python\n# policy_server.py\nimport ray\nfrom ray.rllib.agents.dqn\
    \ import DQNConfig\nfrom ray.rllib.env.policy_server_input import PolicyServerInput\n\
    import gym\n\nray.init()\n\ndef policy_input(context):\n    return PolicyServerInput(context,\
    \ \"localhost\", 9900) ❶\n\nconfig = DQNConfig()\\\n    .environment(\n      \
    \  env=None, ❷\n        action_space=gym.spaces.Discrete(4), ❸\n        observation_space=gym.spaces.Discrete(5*5))\\\
    \n    .debugging(log_level=\"INFO\")\\\n    .rollouts(num_rollout_workers=0)\\\
    \n    .offline_data(❹\n        input=policy_input,\n        input_evaluation=[])\n\
    \nalgo = config.build()\n```\n\n❶ The policy_input function returns a PolicyServerInput\
    \ object running on localhost on port 9900.\n\n❷ We explicitly set the env to\
    \ None because this server does not need one.\n\n❸ We therefore need to define\
    \ both an observation_space and an action_space, as the server is not able to\
    \ infer them from the environment.\n\n❹ To make this work, we need to feed our\
    \ policy_input into the experiment's input.\n\nWith this algo defined,¹⁹ we can\
    \ now start a training session on the server like so:\n\n```python\n# policy_server.py\n\
    if __name__ == \"__main__\":\n    time_steps = 0\n    for _ in range(100):\n \
    \       results = algo.train()\n        checkpoint = algo.save() ❶\n        if\
    \ time_steps >= 1000: ❷\n            break\n        time_steps += results[\"timesteps_total\"\
    ]\n```\n\n❶ Train for a maximum of 100 iterations and store checkpoints after\
    \ each iteration.\n\n❷ If training surpasses 1,000 time steps, we stop the training.\n\
    \nIn what follows we assume that you store the last two code snippets in a file\
    \ called policy_server.py. If you want to, you can now start this policy server\
    \ on your local machine by running `python policy_server.py` in a terminal.\n\n\
    ## Defining a client\n\nNext, to define the corresponding client side of the application,\
    \ we define a Policy Client that connects to the server we just started. Since\
    \ we can't assume that you have several computers at home (or available in the\
    \ cloud), contrary to what we said prior, we will start this client on the same\
    \ machine. In other words, the client will connect to http://localhost:9900, but\
    \ if you can run the server on a different machine, you could replace localhost\
    \ with the IP address of that machine, provided it's available in the network.\n\
    \nPolicy clients have a fairly lean interface. They can trigger the server to\
    \ start or end an episode, get next actions from it, and log reward information\
    \ to it (that it would otherwise not have). With that said, here's how you define\
    \ such a client:\n\n¹⁹ For technical reasons, we have to specify observation and\
    \ action spaces here, which might not be necessary in future releases of RLlib,\
    \ as it leaks environment information. Also note that we need to set input_evaluation\
    \ to an empty list to make this server work."
  mdcn: "## 使用策略服务器与客户端\n\n在本节的最后一个示例中，我们假设原始的`GymEnvironment`只能在无法运行RLlib的机器上进行模拟，例如因为资源不足。我们可以在一个`PolicyClient`上运行该环境，该客户端可以向相应的`server`请求适用于环境的下一步动作。而服务器本身并不了解环境，它只知道如何从`PolicyClient`接收输入数据，并负责运行所有与强化学习相关的代码；特别是，它定义了一个RLlib的`AlgorithmConfig`对象并训练一个`Algorithm`。\n\
    \n通常，你会希望在强大的Ray集群上运行训练算法的服务器，而相应的客户端则在该集群之外运行。图4-3示意性地说明了这种设置。\n\n![图4-3. 在RLlib中使用策略服务器与客户端](img/6489687a3a178f2884963bddc928992c_112_0.png)\n\
    \n## 定义服务器\n\n让我们首先定义这样一个应用的服务器端。我们定义一个所谓的PolicyServerInput，它在本地主机的9900端口上运行。这个策略输入就是客户端稍后将要提供的内容。将这个policy_input定义为算法配置的输入后，我们可以定义另一个DQN在服务器上运行：\n\
    \n```python\n# policy_server.py\nimport ray\nfrom ray.rllib.agents.dqn import\
    \ DQNConfig\nfrom ray.rllib.env.policy_server_input import PolicyServerInput\n\
    import gym\n\nray.init()\n\ndef policy_input(context):\n    return PolicyServerInput(context,\
    \ \"localhost\", 9900) ❶\n\nconfig = DQNConfig()\\\n    .environment(\n      \
    \  env=None, ❷\n        action_space=gym.spaces.Discrete(4), ❸\n        observation_space=gym.spaces.Discrete(5*5))\\\
    \n    .debugging(log_level=\"INFO\")\\\n    .rollouts(num_rollout_workers=0)\\\
    \n    .offline_data(❹\n        input=policy_input,\n        input_evaluation=[])\n\
    \nalgo = config.build()\n```\n\n❶ policy_input函数返回一个在本地主机9900端口上运行的PolicyServerInput对象。\n\
    \n❷ 我们将env显式设置为None，因为此服务器不需要环境。\n\n❸ 因此，我们需要同时定义observation_space和action_space，因为服务器无法从环境中推断它们。\n\
    \n❹ 为了使其工作，我们需要将我们的policy_input作为实验的输入提供。\n\n定义好这个algo后，¹⁹我们现在可以像这样在服务器上启动一个训练会话：\n\
    \n```python\n# policy_server.py\nif __name__ == \"__main__\":\n    time_steps\
    \ = 0\n    for _ in range(100):\n        results = algo.train()\n        checkpoint\
    \ = algo.save() ❶\n        if time_steps >= 1000: ❷\n            break\n     \
    \   time_steps += results[\"timesteps_total\"]\n```\n\n❶ 最多训练100次迭代，并在每次迭代后保存检查点。\n\
    \n❷ 如果训练超过1000个时间步，我们就停止训练。\n\n接下来，我们假设你将上面两段代码片段保存在一个名为policy_server.py的文件中。如果你愿意，现在可以通过在终端中运行`python\
    \ policy_server.py`在本地机器上启动这个策略服务器。\n\n## 定义客户端\n\n接下来，为了定义应用的相应客户端，我们定义一个连接到我们刚刚启动的服务器的策略客户端。由于我们不能假设你家里有几台计算机（或在云中有可用的计算机），与我们之前所说的相反，我们将在同一台机器上启动这个客户端。换句话说，客户端将连接到http://localhost:9900，但如果你能在不同的机器上运行服务器，只要该机器在网络中可用，你可以将localhost替换为该机器的IP地址。\n\
    \n策略客户端的接口相当简洁。它们可以触发服务器开始或结束一个回合，从中获取下一个动作，并将奖励信息记录到服务器（否则服务器将没有这些信息）。话虽如此，以下是定义这样一个客户端的方法：\n\
    \n¹⁹ 由于技术原因，我们必须在这里指定观察和动作空间，这在RLlib的未来版本中可能不再必要，因为它泄露了环境信息。另请注意，我们需要将input_evaluation设置为空列表才能使此服务器工作。"

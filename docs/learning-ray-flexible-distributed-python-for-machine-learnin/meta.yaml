    \ these environments.\n\nIn short, the interface of a Gym environment looks like\
    \ the following pseudocode:\n\n```\nimport gym\n\nclass Env:\n    action_space:\
    \ gym.spaces.Space\n    observation_space: gym.spaces.Space  # 1\n\n    def step(self,\
    \ action):  # 2\n        ...\n\n    def reset(self):  # 3\n```"

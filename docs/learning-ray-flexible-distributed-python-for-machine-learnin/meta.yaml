    # Key AIR Concepts by Example


    AIR''s design philosophy is to provide you with the ability to *tackle your ML
    workloads in a single script, run by a single system*. Let''s begin with AIR and
    its critical concepts by walking through an extended usage example. Here''s what
    we''re going to do:


    +   1. Load the breast cancer data set that you''ve already seen in Chapter 7
    as a Ray Dataset and use AIR to preprocess it.

    2. Define an XGBoost model for training a classifier on this data.

    3. Set up a so-called Tuner for our training procedure to tune its hyperparameters.

    4. Store checkpoints of trained models.

    5. Run batch prediction using AIR.

    6. Deploy our predictor as a service with AIR.


    You tackle these steps by building scalable pipelines with the AIR API. To follow
    along this example, make sure to install the following requirements:


    ```

    pip install "ray[air]>=2.2.0" "xgboost-ray>=0.1.10" "xgboost>=1.6.2"

    pip install "numpy>=1.19.5" "pandas>=1.3.5" "pyarrow>=6.0.1" "aiorwlock==1.3.0"

    ```


    Figure 10-1 summarizes the steps we''re going to take in the following example,
    alongside the AIR components we''ll use.


    ![](img/6489687a3a178f2884963bddc928992c_218_0.png)'

    \ 编排框架来部署你的 Ray 集群。\n\n## 在 Kubernetes 上部署\n\nKubernetes 是一个行业标准的集群资源管理平台。它允许软件团队在各种生产环境中无缝部署、管理和扩展他们的业务应用程序。它最初由\

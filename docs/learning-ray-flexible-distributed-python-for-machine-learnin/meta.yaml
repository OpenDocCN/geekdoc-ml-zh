- md: 'You can imagine Ray''s core engine with its API at the center of things, on
    which everything else builds. Ray''s data science libraries build on top of Ray
    Core and provide a domain-specific abstraction layer.⁷ In practice, many data
    scientists will use these libraries directly, while ML or platform engineers might
    rely heavily on building their tools as extensions of the Ray Core API. Ray AIR
    can be seen as an umbrella that links Ray libraries and offers a consistent framework
    for dealing with common AI workloads. And the growing number of third-party integrations
    for Ray is another great entry point for experienced practitioners. Let''s look
    into each one of the layers one by one.


    ## A Distributed Computing Framework


    At its core, Ray is a distributed computing framework. We''ll provide you with
    just the basic terminology here and talk about Ray''s architecture in depth in
    Chapter 2. In short, Ray sets up and manages clusters of computers so that you
    can run distributed tasks on them. A Ray Cluster consists of nodes that are connected
    to each other via a network. You program against the so-called *driver*, the program
    root, which lives on the *head node*. The driver can run *jobs*, a collection
    of tasks, that are run on the nodes in the cluster. Specifically, the individual
    tasks of a job are run on *worker* processes on *worker nodes*. Figure 1-1 illustrates
    the basic structure of a Ray Cluster. Note that we''re not concerned with communication
    between nodes just yet; this diagram merely shows the layout of a Ray Cluster.


    ![](img/6489687a3a178f2884963bddc928992c_27_0.png)


    Figure 1-1. The basic components of a Ray Cluster


    What''s interesting is that a Ray Cluster can also be a *local cluster*, a cluster
    consisting of just your own computer. In this case, there''s just one node, namely,
    the head node, which has the driver process and some worker processes. The default
    number of worker processes is the number of CPUs available on your machine.


    ⁷ One of the reasons so many libraries are built on top of Ray Core is that it''s
    so lean and straightforward to reason about. One of the goals of this book is
    to inspire you to write your own applications, or even libraries, with Ray.


    With that knowledge at hand, it''s time to get your hands dirty and run your first
    local Ray Cluster. Installing Ray on any of the major operating systems should
    work seamlessly using pip:


    ```

    pip install "ray[rllib, serve, tune]==2.2.0"

    ```


    With a simple `pip install ray`, you will install just the basics of Ray. Since
    we want to explore some advanced features, we installed the “extras” `rllib`,
    `serve`, and `tune`, which we''ll discuss in a bit.⁸ Depending on your system
    configuration, you may not need the quotation marks in this installation command.


    Next, go ahead and start a Python session. You could, for instance, use the `ipython`
    interpreter, which is often suitable for following simple examples. In your Python
    session you can now easily import and initialize Ray:


    ```

    import ray

    ray.init()

    ```


    ![](img/6489687a3a178f2884963bddc928992c_28_0.png)


    If you don''t feel like typing in the commands yourself, you can also jump into
    the [Jupyter notebook for this chapter](link_placeholder) and run the code there.
    The choice is up to you, but in any case please remember to use Python version
    3.7 or later.⁹


    With those two lines of code, you''ve started a Ray Cluster on your local machine.
    This cluster can utilize all the cores available on your computer as workers.
    Right now your Ray Cluster doesn''t do much, but that''s about to change.


    The `init` function you use to start the cluster is one of the six fundamental
    API calls that you will learn about in depth in [Chapter 2](link_placeholder).
    Overall, the *Ray Core API* is very accessible and easy to use. But since it is
    also a rather low-level interface, it takes time to build interesting examples
    with it. [Chapter 2](link_placeholder) has an extensive first example to get you
    started with the Ray Core API, and in [Chapter 3](link_placeholder) you''ll see
    how to build a more interesting Ray application for reinforcement learning.


    In the preceding code you didn''t provide any arguments to the `ray.init(...)`
    function. If you wanted to run Ray on a “real” cluster, you''d have to pass more
    arguments to `init`. This `init` call is often called the *Ray Client*, and it
    is used to interactively connect to an existing Ray Cluster.¹⁰ You can read more
    about using the Ray Client to connect to your production clusters in the [Ray
    documentation](https://docs.ray.io/).


    ⁸ We generally introduce dependencies in this book only when we need them, which
    should make it easier to follow along. In contrast, the [notebooks on GitHub](link_placeholder)
    give you the option to install all dependencies up front so that you can focus
    on running the code instead.


    ⁹ At the time of this writing, there''s no Python 3.10 support for Ray, so sticking
    to a version between 3.7 and 3.9 should work best to follow this book.


    Of course, if you''ve ever worked with compute clusters, you know there are many
    pitfalls and intricacies. For instance, you can deploy Ray applications on clusters
    hosted by cloud providers such as Amazon Web Services (AWS), Google Cloud Platform
    (GCP), or Microsoft Azure—and each choice needs good tooling for deployment and
    maintenance. You can also spin up a cluster on your own hardware or use tools
    such as Kubernetes to deploy your Ray Clusters. In [Chapter 9](https://example.com/chapter9)
    (following chapters with concrete Ray applications), we''ll come back to the topic
    of scaling workloads with Ray Clusters.


    Before moving on to Ray''s higher-level libraries, let''s briefly summarize the
    two foundational components of Ray as a distributed computation framework:


    *Ray Clusters*

    This component is in charge of allocating resources, creating nodes, and ensuring
    they are healthy. A good way to get started with Ray Clusters is its [dedicated
    quick start guide](https://docs.ray.io/cluster/quickstart.html).


    *Ray Core*

    Once your cluster is up and running, you use the Ray Core API to program against
    it. You can get started with Ray Core by following [the official walkthrough](https://docs.ray.io/ray-overview/examples.html)
    for this component.


    ## A Suite of Data Science Libraries


    Moving on to the second layer of Ray, in this section we''ll briefly introduce
    all the data science libraries that Ray comes with. To do so, let''s first take
    a bird''s-eye view of what it means to do data science. Once you understand this
    context, it''s much easier to review Ray''s higher-level libraries and see how
    they can be useful to you.


    ## Ray AIR and the Data Science Workflow


    The somewhat elusive term “data science” (DS) has evolved quite a bit in recent
    years, and you can find many definitions of varying usefulness online.¹¹ To us,
    it''s *the practice of gaining insights and building real-world applications by
    leveraging data*. That''s quite a broad definition of an inherently practical
    and applied field that centers around building and understanding things. In that
    sense, describing practitioners of this field as “data scientists” is about as
    bad a misnomer as describing hackers as “computer scientists.”<sup>12</sup>


    In broad strokes, doing data science is an iterative process that entails requirements
    engineering, data collection and processing, building models and evaluating them,
    and deploying solutions. Machine learning is not necessarily part of this process
    but often is. If ML is involved, you can further specify some steps:


    *Data processing*

    To train ML models, you need data in a format that your ML model understands.
    The process of transforming and selecting what data should be fed into your model
    is often called *feature engineering*. This step can be messy. You’ll benefit
    a lot if you can rely on common tools to do the job.


    *Model training*

    In ML you need to train your algorithms on data that got processed in the previous
    step. This includes selecting the right algorithm for the job, and it helps if
    you can choose from a wide variety.


    *Hyperparameter tuning*

    Machine learning models have parameters that are tuned in the model training step.
    Most ML models also have another set of parameters called *hyperparameters* that
    can be modified prior to training. These parameters can heavily influence the
    performance of your resulting ML model and need to be tuned properly. There are
    good tools to help automate that process.


    *Model serving*

    Trained models need to be deployed. To serve a model means to make it available
    to whomever needs access by whatever means necessary. In prototypes, you often
    use simple HTTP servers, but there are many specialized software packages for
    ML model serving.


    This list is by no means exhaustive, and there’s a lot more to be said about building
    ML applications.<sup>13</sup> However, it is true that these four steps are crucial
    for the success of a data science project using ML.


    Ray has dedicated libraries for each of the four ML-specific steps we just listed.
    Specifically, you can take care of your data processing needs with *Ray Datasets*,
    run distributed model training with *Ray Train*, run your reinforcement learning


    ¹⁰ There are other means of interacting with Ray Clusters, such as the [Ray Jobs
    CLI](https://docs.ray.io/cluster/jobs-overview.html).


    ¹¹ We never liked the categorization of data science as an intersection of disciplines,
    like math, coding, and business. Ultimately, that doesn''t tell you what practitioners
    *do*.


    ¹² As a fun exercise, we recommend reading Paul Graham’s famous “Hackers and Painters”
    essay on this topic and replace “computer science” with “data science.” What would
    hacking 2.0 be?


    ¹³ If you want to understand more about the holistic view of the data science
    process when building ML applications, *Building Machine Learning Powered Applications*
    by Emmanuel Ameisen (O’Reilly) is entirely dedicated to it.'

    \ 个 CPU 的笔记本电脑上运行 Tune，本章中计算的任何实验都将生成八个并发试验，并为每个试验分配一个 CPU。可以通过 Tune 运行的 `resources_per_trial`\
    \ 参数来控制此行为。\n\n你还可以确定每个试验使用的 GPU 数量。此外，Tune 允许你使用*分数资源*；即，你可以在试验之间共享资源。因此，假设你有一台具有\

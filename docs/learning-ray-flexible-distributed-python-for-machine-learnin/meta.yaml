  - "[PAGE 60]\n\n# The Head Node\n\nWe've already indicated in Chapter 1 that each\
    \ Ray Cluster has one special node called a *head node*. So far you know that\
    \ this node has a driver process.¹⁴ Drivers can submit tasks themselves but can't\
    \ execute them. You also know that the head node can have some worker processes,\
    \ which is important to be able to run local clusters consisting of a single node.\n\
    \nThe head node is identical to other worker nodes, but it additionally runs processes\
    \ responsible for cluster management such as the autoscaler (that we cover in\
    \ Chapter 9) and a component called *Global Control Service* (GCS). This is an\
    \ important component that carries global information about the cluster. The GCS\
    \ is a key-value store that stores information such as system-level metadata.\
    \ For instance, it has a table with heartbeat signals for each Raylet to ensure\
    \ they are still reachable. Raylets, in turn, send heartbeat signals to the GCS\
    \ to indicate that they are alive. The GCS also stores the locations of Ray actors.\
    \ The ownership model just discussed tells us that all object information is stored\
    \ at their owner worker process, which avoids making the GCS a bottleneck.\n\n\
    # Distributed Scheduling and Execution\n\nLet's briefly talk about cluster orchestration\
    \ and how nodes manage, plan, and execute tasks. When talking about worker nodes,\
    \ we've indicated that there are several components to distributing workloads\
    \ with Ray. Here's an overview of the steps and intricacies involved in this process:\n\
    \n*Distributed memory*\n    The object stores of individual Raylets manage memory\
    \ on a node. But sometimes objects need to be transferred between nodes, which\
    \ is called *distributed object transfer*. This is needed for remote dependency\
    \ resolution so that workers have the objects they need to run tasks.\n\n*Communication*\n\
    \    Most of the communication in a Ray Cluster, such as object transfer, takes\
    \ place via *gRPC*.\n\n*Resource management and fulfillment*\n    On a node, Raylets\
    \ are responsible for granting resources and *leasing* worker processes to task\
    \ owners. All schedulers across nodes form the distributed scheduler, which effectively\
    \ means that nodes can schedule tasks on other nodes.\n\n14 In fact, it could\
    \ have multiple drivers, but this is not essential for our discussion. Starting\
    \ a single driver on the head node is the most common, but driver processes also\
    \ can be started on any node in the cluster, and multiple drivers can be on a\
    \ single cluster."

    *Model serving*

    Trained models need to be deployed. To serve a model means to make it available
    to whomever needs access by whatever means necessary. In prototypes, you often
    use simple HTTP servers, but there are many specialized software packages for
    ML model serving.


    This list is by no means exhaustive, and there’s a lot more to be said about building
    ML applications.<sup>13</sup> However, it is true that these four steps are crucial
    for the success of a data science project using ML.


    Ray has dedicated libraries for each of the four ML-specific steps we just listed.
    Specifically, you can take care of your data processing needs with *Ray Datasets*,
    run distributed model training with *Ray Train*, run your reinforcement learning


    12 As a fun exercise, we recommend reading Paul Graham’s famous “Hackers and Painters”
    essay on this topic and replace “computer science” with “data science.” What would
    hacking 2.0 be?

    13 If you want to understand more about the holistic view of the data science
    process when building ML applications, *Building Machine Learning Powered Applications*
    by Emmanuel Ameisen (O’Reilly) is entirely dedicated to it.'
- md: "workloads with *Ray RLlib*, tune your hyperparameters efficiently with *Ray\
    \ Tune*, and serve your models with *Ray Serve*. And the way Ray is built, all\
    \ these libraries are *distributed by design*, a point we can’t stress enough.\n\
    \nWhat’s more is that all of these steps are part of a process and are rarely\
    \ tackled in isolation. Not only do you want all the libraries involved to seamlessly\
    \ interoperate, it can also be a decisive advantage if you can work with a consistent\
    \ API throughout the whole data science process. This is exactly what Ray AIR\
    \ was built for: having a common runtime and API for your experiments and the\
    \ ability to scale your workloads when you’re ready. Figure 1-2 shows a quick\
    \ overview of all the components of AIR.\n\n![](img/6489687a3a178f2884963bddc928992c_31_0.png)\n\
    \n*Figure 1-2. Ray AIR as an umbrella of all current data science libraries of\
    \ Ray*\n\nWhile introducing the Ray AI Runtime API would be too much for this\
    \ chapter (you can jump ahead to Chapter 10 for that), we’ll introduce you to\
    \ all the building blocks that feed into it. Let’s go through each of Ray’s DS\
    \ libraries one by one.\n\n## Data Processing with Ray Datasets\n\nThe first high-level\
    \ library of Ray we’ll talk about is Ray Datasets. This library contains a data\
    \ structure aptly called `Dataset`, a multitude of connectors for loading data\
    \ from various formats and systems, an API for transforming such datasets, a way\
    \ to build data processing pipelines with them, and many integrations with other\
    \ data processing frameworks. The `Dataset` abstraction builds on the powerful\
    \ Arrow framework.¹⁴\n\nTo use Ray Datasets, you need to install Arrow for Python,\
    \ for instance by running `pip install pyarrow`. The following simple example\
    \ creates a distributed `Dataset` on your local Ray Cluster from a Python data\
    \ structure. Specifically, you’ll create a dataset from a Python dictionary containing\
    \ a string `name` and an integer-valued `data` for 10,000 entries:\n\n```python\n\
    import ray\nitems = [{\"name\": str(i), \"data\": i} for i in range(10000)]\n\
    ds = ray.data.from_items(items)\nds.show(5)\n```\n\n❶ Creating a Dataset by using\
    \ `from_items` from the `ray.data` module.\n\n❷ Printing the first five items\
    \ of the Dataset.\n\nTo show a Dataset means to print some of its values. You\
    \ should see precisely five elements on your command line, like this:\n\n```\n\
    {'name': '0', 'data': 0}\n{'name': '1', 'data': 1}\n{'name': '2', 'data': 2}\n\
    {'name': '3', 'data': 3}\n{'name': '4', 'data': 4}\n```\n\nGreat, now you have\
    \ some rows, but what can you do with that data? The Dataset API bets heavily\
    \ on functional programming, as this paradigm is well suited for data transformations.\n\
    \nEven though Python 3 made a point of hiding some of its functional programming\
    \ capabilities, you're probably familiar with functionality such as `map`, `filter`,\
    \ `flat_map`, and others. If not, it's easy enough to pick up: `map` takes each\
    \ element of your dataset and transforms it into something else, in parallel;\
    \ `filter` removes data points according to a Boolean filter function; and the\
    \ slightly more elaborate `flat_map` first maps values similarly to `map`, but\
    \ then it also \"flattens\" the result. For instance, if `map` produced a list\
    \ of lists, `flat_map` would flatten out the nested lists and give you just a\
    \ list. Equipped with these three functional API calls,¹⁵ let's see how easily\
    \ you can transform your dataset `ds`:\n\n```python\nsquares = ds.map(lambda x:\
    \ x[\"data\"] ** 2) ❶\n\nevens = squares.filter(lambda x: x % 2 == 0) ❷\nevens.count()\n\
    \ncubes = evens.flat_map(lambda x: [x, x**3]) ❸\nsample = cubes.take(10) ❹\nprint(sample)\n\
    ```\n\n❶ We map each row of `ds` to only keep the square value of its data entry.\n\
    \n❷ Then we filter the squares to keep only even numbers (a total of five thousand\
    \ elements).\n\n❸ We then use flat_map to augment the remaining values with their\
    \ respective cubes.\n\n❹ To take a total of 10 values means to leave Ray and return\
    \ a Python list with these values that we can print.\n\nThe drawback of Dataset\
    \ transformations is that each step gets executed synchronously. In this example\
    \ that is a nonissue, but for complex tasks that, for example, mix reading files\
    \ and processing data, you would want an execution that can overlap individual\
    \ tasks. DatasetPipeline does exactly that. Let’s rewrite the previous example\
    \ into a pipeline:\n\n```python\npipe = ds.window() ❶\nresult = pipe \\\n    .map(lambda\
    \ x: x[\"data\"] ** 2) \\\n    .filter(lambda x: x % 2 == 0) \\\n    .flat_map(lambda\
    \ x: [x, x**3]) ❷\nresult.show(10)\n```\n\n❶ You can turn a Dataset into a pipeline\
    \ by calling .window() on it.\n\n❷ Pipeline steps can be chained to yield the\
    \ same result as before.\n\nThere’s a lot more to be said about Ray Datasets,\
    \ especially its integration with notable data processing systems, but we’ll defer\
    \ an in-depth discussion until Chapter 6.\n\n## Model Training\n\nMoving on to\
    \ the next set of libraries, let’s look at the distributed training capabilities\
    \ of Ray. For that, you have access to two libraries. One is dedicated to reinforcement\
    \ learning specifically; the other one has a different scope and is aimed primarily\
    \ at supervised learning tasks.\n\n### Reinforcement learning with Ray RLlib\n\
    \nLet’s start with Ray RLlib for reinforcement learning (RL). This library is\
    \ powered by the modern ML frameworks TensorFlow and PyTorch, and you can choose\
    \ which one to use. Both frameworks seem to converge more and more conceptually,\
    \ so you can pick the one you like most without losing much in the process. Throughout\
    \ the book we use both TensorFlow and PyTorch examples so you can get a feel for\
    \ both frameworks when using Ray.\n\nFor this section, go ahead and install TensorFlow\
    \ with `pip install tensorflow` right now.¹⁶ To run the code example, you also\
    \ need to install the gym library with `pip install \"gym==0.25.0\"`.\n\nOne of\
    \ the easiest ways to run examples with RLlib is to use the command-line tool\
    \ `rllib`, which we already installed implicitly when we ran `pip install \"ray[rllib]\"\
    `. Once you run more complex examples in Chapter 4, you will mostly rely on its\
    \ Python API, but for now we want to get a first taste of running RL experiments\
    \ with RLlib.\n\nWe'll look at a fairly classic control problem of balancing a\
    \ pole on a cart. Imagine you have a pole like the one in Figure 1-3, fixed at\
    \ a joint of a cart, and subject to gravity. The cart is free to move along a\
    \ frictionless track, and you can manipulate the cart by giving it a push from\
    \ the left or the right with a fixed force. If you do this well enough, the pole\
    \ will remain in an upright position. For each time step the pole didn't fall\
    \ over, we get a reward of 1. Collecting a high reward is our goal, and the question\
    \ is whether we can teach a reinforcement learning algorithm to do this for us.\n\
    \n![](img/6489687a3a178f2884963bddc928992c_34_0.png)\n\n*Figure 1-3. Controlling\
    \ a pole attached to a cart by asserting force to the left or the right*\n\nSpecifically,\
    \ we want to train a reinforcement learning agent that can carry out two actions,\
    \ namely, push to the left or to the right, observe what happens when interacting\
    \ with the environment in that way, and learn from the experience by maximizing\
    \ the reward.\n\nTo tackle this problem with Ray RLlib, we can use a so-called\
    \ *tuned* example, which is a preconfigured algorithm that runs well for a given\
    \ problem. You can run a tuned example with a single command. RLlib comes with\
    \ many such examples, and you can list them all with `rllib example list`.\n\n\
    One of the available examples is `cartpole-ppo`, a tuned example that uses the\
    \ PPO algorithm to solve the cart-pole problem, specifically, the CartPole-v1\
    \ environment from OpenAI Gym. You can take a look at the configuration of this\
    \ example by typing `rllib example get cartpole-ppo`, which will first download\
    \ the example.\n\n¹⁴ In Chapter 6 we will introduce you to the fundamentals of\
    \ what makes Ray Datasets work, including its use of Arrow. For now, we want to\
    \ focus on its API and concrete usage patterns.\n\n¹⁵ We'll elaborate more on\
    \ this in later chapters, specifically in Chapter 6, but note that Ray Datasets\
    \ is not meant as a general-purpose data processing library. Tools such as Spark\
    \ have more mature and optimized support for large-scale data processing.\n\n\
    ¹⁶ If you're on a Mac, you'll have to install `tensorflow-macos`. In general,\
    \ if you encounter any issues installing Ray or its dependencies on your system,\
    \ please refer to the installation guide."

    # An Overview of RLlib


    Before we dive into any examples, let’s quickly discuss what RLlib is and what
    it can do. As part of the Ray ecosystem, RLlib inherits all the performance and
    scalability benefits of Ray. In particular, RLlib is distributed by default, so
    you can scale your RL training to as many nodes as you want.


    Another benefit of being built on top of Ray is that RLlib integrates tightly
    with other Ray libraries. For instance, the hyperparameters of any RLlib algorithm
    can be tuned with Ray Tune, as we will see in Chapter 5. You can also seamlessly
    deploy your RLlib models with Ray Serve.²


    What’s extremely useful is that RLlib works with both of the predominant deep
    learning frameworks at the time of this writing: PyTorch and TensorFlow. You can
    use either one of them as your backend and can easily switch between them, often
    by changing just one line of code. That’s a huge benefit, as companies are often
    locked into their underlying deep learning framework and can’t afford to switch
    to another system and rewrite their code.


    RLlib also has a track record of solving real-world problems and is a mature library
    used by many companies to bring their RL workloads to production. The RLlib API
    appeals to many engineers, as it offers the right level of abstraction for many
    applications while still being flexible enough to be extended.


    Apart from these more general benefits, RLlib has a lot of RL-specific features
    that we will cover in this chapter. In fact, RLlib is so feature rich that it
    would deserve a book on its own, which means we can touch on just some aspects
    of it here. For instance, RLlib has a rich library of advanced RL algorithms to
    choose from. In this chapter we will focus on a few select ones, but you can track
    the growing list of options on the RLlib algorithms page. RLlib also has many
    options for specifying RL environments and is very flexible in handling them during
    training; for an overview of RLlib environments see the documentation.


    ² We don’t cover this integration in this book, but you can learn more about deploying
    RLlib models in the “Serving RLlib Models” tutorial in the Ray documentation.'

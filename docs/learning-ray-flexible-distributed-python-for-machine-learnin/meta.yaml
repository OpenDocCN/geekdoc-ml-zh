    \ data:\n(4, 'Python')\n(5, 'for')\nRuntime: 0.71 seconds, data:\n(6, 'Machine')\n\
    (7, 'Learning')\n```\n\n注意在 while 循环中，我们本可以做许多其他事情，而不仅仅是打印结果，例如使用到目前为止已检索到的值在其他工作进程上启动全新的任务。\n\
    \n## 处理任务依赖关系\n\n到目前为止，我们的示例程序在概念层面上相当简单。它由一个步骤组成：检索一堆数据库项目。现在，想象一下，一旦你的数据加载完毕，你想运行一个后续处理任务。更具体地说，假设我们想使用第一个检索任务的结果来查询其他相关数据（假装你正在查询同一数据库中不同表的数据）。示例\
    \ 2-2 设置了这样一个任务，并连续运行我们的 `retrieve_task` 和 `follow_up_task`。\n\n**示例 2-2. 运行依赖于另一个\
    \ Ray 任务的后续任务**\n\n```python\n@ray.remote\ndef follow_up_task(retrieve_result):\
    \ ①\n    original_item, _ = retrieve_result\n    follow_up_result = retrieve(original_item\
    \ + 1) ②\n    return retrieve_result, follow_up_result ③\n\nretrieve_refs = [retrieve_task.remote(item,\
    \ db_object_ref) for item in [0, 2, 4, 6]]\nfollow_up_refs = [follow_up_task.remote(ref)\
    \ for ref in retrieve_refs] ④\n```"

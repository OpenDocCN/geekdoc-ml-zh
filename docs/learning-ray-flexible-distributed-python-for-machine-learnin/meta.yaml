    generally require large amounts of data to be trained, and that ML models tend
    to get larger. OpenAI has shown exponential growth in compute needed to train
    AI models in their paper “AI and Compute”. The number of operations needed for
    AI systems in their study is measured in petaflops (thousands of trillions of
    operations per second) and has been *doubling every 3.4 months* since 2012.


    Compare this to Moore’s law,² which states that the number of transistors in computers
    would double every two years. Even if you’re bullish on Moore’s law, you can see
    how there’s a clear need for distributed computing in ML. You should also understand
    that many tasks in ML can be naturally decomposed to run in parallel. So, why
    not speed things up if you can?³


    Distributed computing is generally perceived as hard. But why is that? Shouldn’t
    it be realistic to find good abstractions to run your code on clusters without
    having to constantly think about individual machines and how they interoperate?
    What if we specifically focused on AI workloads?


    Researchers at RISELab at UC Berkeley created Ray to address these questions.
    They were looking for efficient ways to speed up their workloads by distributing
    them. The workloads they had in mind were quite flexible in nature and didn’t
    fit into the frameworks available at the time. RISELab also wanted to build a
    system that took care of how the work was distributed. With reasonable default
    behaviors in place, researchers should be able to focus on their work, regardless
    of the specifics of their compute cluster. And ideally they should have access
    to all their favorite tools in Python. For this reason, Ray was built with an
    emphasis on high-performance and heterogeneous workloads.⁴ To understand these
    points better, let’s have a closer look at Ray’s design philosophy.


    ² Moore’s law held for a long time, but there might be signs that it’s slowing
    down. Some even say it’s dead. We’re not here to argue these points. What’s important
    is not that our computers generally keep getting faster, but the relation to the
    amount of compute we need.


    ³ There are many ways to speed up ML training, from basic to sophisticated. For
    instance, we’ll spend a considerable amount of time elaborating on distributed
    data processing in Chapter 6 and distributed model training in Chapter 7.


    ⁴ Anyscale, the company behind Ray, is building a managed Ray platform and offers
    hosted solutions for your Ray applications.


    ## Ray’s Design Principles


    Ray is built with several design principles in mind. Its API is designed for simplicity
    and generality, and its compute model aims for flexibility. Its system architecture
    is designed for performance and scalability. Let’s look at each of these in more
    detail.


    ### Simplicity and abstraction


    Ray’s API not only banks on simplicity, it’s also intuitive to pick up (as you’ll
    see in Chapter 2). It doesn’t matter whether you want to use all the CPU cores
    on your laptop or leverage all the machines in your cluster. You might have to
    change a line of code or two, but the Ray code you use stays essentially the same.
    And as with any good distributed system, Ray manages task distribution and coordination
    under the hood. That’s great, because you’re not bogged down by reasoning about
    the mechanics of distributed computing. A good abstraction layer allows you to
    focus on your work, and we think Ray has done a great job of giving you one.


    Since Ray’s API is so generally applicable and pythonic, it’s easy to integrate
    with other tools. For instance, Ray actors can call into or be called by existing
    distributed Python workloads. In that sense, Ray makes for good “glue code” for
    distributed workloads, too, as it’s performant and flexible enough to communicate
    between different systems and frameworks.


    ### Flexibility and heterogeneity


    For AI workloads, in particular when dealing with paradigms like reinforcement
    learning, you need a flexible programming model. Ray’s API is designed to make
    it easy to write flexible and composable code. Simply put, if you can express
    your workload in Python, you can distribute it with Ray. Of course, you still
    need to make sure you have enough resources available and be mindful of what you
    want to distribute. But Ray doesn’t limit what you can do with it.


    Ray is also flexible when it comes to heterogeneity of computations. For instance,
    let’s say you work on a complex simulation. Simulations can usually be decomposed
    into several tasks or steps. Some of these steps might take hours to run, others
    just a few milliseconds, but they always need to be scheduled and executed quickly.
    Sometimes a single task in a simulation can take a long time, but other, smaller
    tasks should be able to run in parallel without blocking it. Also, subsequent
    tasks may depend on the outcome of an upstream task, so you need a framework to
    allow for dynamic execution that deals well with task dependencies. Ray gives
    you full flexibility when running heterogeneous workflows like that.


    You also need to ensure you are flexible in your resource usage, and Ray supports
    heterogeneous hardware. For instance, some tasks might have to run on a GPU, while
    others run best on a couple of CPU cores. Ray provides you with that flexibility.


    ### Speed and scalability


    Another of Ray’s design principles is the speed at which Ray executes its tasks.
    It can handle millions of tasks per second, and you incur very low latencies with
    it. Ray is built to execute its tasks with just milliseconds of latency.


    For a distributed system to be fast, it also needs to scale well. Ray is efficient
    at distributing and scheduling your tasks across your compute cluster. And it
    does so in a fault-tolerant way, too. As you’ll learn in detail in Chapter 9,
    Ray Clusters support *autoscaling* to support highly elastic workloads. Ray’s
    autoscaler tries to launch or stop machines in your cluster to match the current
    demand. This helps both to minimize costs and to ensure that your cluster has
    enough resources to run your workload.


    In distributed systems, it’s not a question of if, but when, things will go wrong.
    A machine might have an outage, abort a task, or simply go up in flames.⁵ In any
    case, Ray is built to recover quickly from failures, which contributes to its
    overall speed.


    As we haven’t talked about Ray’s architecture (Chapter 2 will introduce you to
    it), we can’t tell you how these design principles are realized just yet. Let’s
    instead shift our attention to what Ray can do for you in practice.


    ## Three Layers: Core, Libraries, and Ecosystem


    Now that you know why Ray was built and what its creators had in mind, let’s look
    at the three layers of Ray. This presentation is not the only way to slice it,
    but it’s the way that makes most sense for this book:


    - A low-level, distributed computing framework for Python with a concise core
    API and tooling for cluster deployment called Ray Core.⁶

    - A set of high-level libraries built and maintained by the creators of Ray. This
    includes the so-called Ray AIR to use these libraries with a unified API in common
    machine learning workloads.

    - A growing ecosystem of integrations and partnerships with other notable projects
    that span many aspects of the first two layers.


    There’s a lot to unpack here, and we’ll look into each of these layers individually
    in the remainder of this chapter.


    > ⁵ This might sound drastic, but it’s not a joke. To name just one example, in
    March 2021 a French datacenter powering millions of websites burned down completely.
    If your whole cluster burns down, we’re afraid Ray can’t help you.


    ⁶ This is a Python book, so we’ll exclusively focus on Python, but you should
    know that Ray also has a Java API, which is less mature than its Python equivalent
    at this point.'

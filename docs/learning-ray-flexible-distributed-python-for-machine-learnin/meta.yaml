    # # Workloads That Are Suited for AIR


    Now that we''ve seen examples of AIR and its fundamental concepts, let''s zoom
    out a little and discuss in principle which kinds of workloads you can run with
    it. We''ve tackled all of these workloads already throughout the book, but it''s
    good to recap them systematically. As the name suggests, AIR is built to capture
    common tasks in AI projects. These tasks can be roughly classified in the following
    way:


    *Stateless computation*


    Tasks like preprocessing data or computing model predictions on a batch of data
    are stateless. Stateless workloads can be computed independently in parallel.
    If you recall our treatment of Ray tasks from [Chapter 2](https://docs.ray.io/en/latest/ray-core/tasks.html),
    stateless computation is exactly what they were built for. AIR primarily uses
    Ray tasks for stateless workloads. Many *big data processing* tools fall into
    this category.


    *Stateful computation*


    In contrast, model training and hyperparameter tuning are stateful operations,
    as they update the model state during their respective training procedure. Updating
    stateful workers in such *distributed training* is a difficult topic that Ray
    handles for you. AIR uses Ray actors for stateful computations.


    *Composite workloads*


    Combining stateless and stateful computation, for instance by first processing
    features and then training a model, is quite common in AI workloads. In fact,
    it''s rare for end-to-end projects to exclusively use one or the other. Running
    such advanced composite workloads in a distributed fashion can be described as

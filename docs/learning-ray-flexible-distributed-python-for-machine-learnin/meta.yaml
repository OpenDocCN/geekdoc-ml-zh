    2. Do basic cleaning, and drop null values and outliers.\n3. Add three new features:\
    \ trip duration, hour the trip started, and day of the week.\n4. Calculate the\
    \ label column: if the tip was more or less than 20% of the fare.\n5. Drop all\
    \ unused columns.\n6. Return a repartitioned Ray Dataset created *from Dask*.\n\
    \nThis involves basic data loading and cleaning as well as transforming some columns\
    \ into a format that can be used as features in our ML model. For instance, we\
    \ transform the pickup and drop-off date-times, which are provided as a string,\
    \ into three numerical features: *trip_duration*, *hour*, and *day_of_week*. This\
    \ is made easy by Dask's built-in support for [Python datetime utilities](https://docs.python.org/3/library/datetime.html).\
    \ If this data is going to be used for training, we also need to compute the label\
    \ column.\n\nFinally, once we've computed our preprocessed Dask DataFrame, we\
    \ transform it into a Ray Dataset so we can pass it into our training and inference\
    \ processes later.\n\n# Defining a Deep Learning Model\n\nNow that we've cleaned\
    \ and prepared the data, we need to define a model architecture that we'll use\
    \ for the model. In practice, this would likely be an iterative process and involve\
    \ researching the state of the art for similar problems. For the sake of our example,\
    \ we'll keep things simple and use a basic PyTorch neural network that we call\
    \ FarePredictor. The neural network has three linear transformations starting\
    \ with the dimension of our feature vector, and then it outputs a value between\
    \ 0 and 1 using a Sigmoid activation function. We also use *batch normalization*\
    \ layers in"
  - "[PAGE 165]\n\nthe network to improve training. This output value will be rounded\
    \ to produce the binary prediction of whether or not the ride will result in a\
    \ big tip:\n\n```\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional\
    \ as F\n\nclass FarePredictor(nn.Module):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.fc1 = nn.Linear(6, 256)\n        self.fc2 = nn.Linear(256, 16)\n\
    \        self.fc3 = nn.Linear(16, 1)\n\n        self.bn1 = nn.BatchNorm1d(256)\n\
    \        self.bn2 = nn.BatchNorm1d(16)\n\n    def forward(self, x):\n        x\
    \ = F.relu(self.fc1(x))\n        x = self.bn1(x)\n        x = F.relu(self.fc2(x))\n\
    \        x = self.bn2(x)\n        x = torch.sigmoid(self.fc3(x))\n\n        return\
    \ x\n```\n\n# Distributed Training with Ray Train\n\nNow that we've defined the\
    \ neural network architecture, we need a way to efficiently train it on our data.\
    \ This dataset is very large, so our best bet is to perform *data-parallel training*.\n\
    \nThis means we train the model on multiple machines in parallel, each of which\
    \ has a copy of the model and a subset of the data. We will use Ray Train to define\
    \ a scalable training process that will use [PyTorch DataParallel](https://pytorch.org/docs/stable/nn.html#torch.nn.DataParallel)\
    \ under the hood. We won't go into conceptual details of the training process\
    \ here, but we'll discuss them in the sections following this end-to-end example.\n\
    \n> The upcoming example uses imports from the `ray.air` module. We mentioned\
    \ Ray AIR in [Chapter 1](https://example.com/chapter1) and will introduce it formally\
    \ in [Chapter 10](https://example.com/chapter10). For now, treat this module as\
    \ a useful utility for defining and running your distributed training processes.\n\
    \nIn particular, we're using a so-called AIR session that can be used to report\
    \ metrics collected during the training process. This follows a usage pattern\
    \ similar to the `tune.report` API that we discussed in [Chapter 5](https://example.com/chapter5)."
  - "[PAGE 166]\n\nThe first thing we need to do is define the core logic needed to\
    \ train on a batch of data on each worker in each epoch. This will take in a local\
    \ shard of the full dataset, run it through the local copy of the model, and perform\
    \ backpropagation to update the model weights. After each epoch, the worker will\
    \ use Ray Train utilities to report the result and save the current model weights\
    \ for use later:\n\n```\nfrom ray.air import session\nfrom ray.air.config import\
    \ ScalingConfig\nimport ray.train as train\nfrom ray.train.torch import TorchCheckpoint,\
    \ TorchTrainer\n\ndef train_loop_per_worker(config: dict):\n    batch_size = config.get(\"\
    batch_size\", 32)\n    lr = config.get(\"lr\", 1e-2)\n    num_epochs = config.get(\"\
    num_epochs\", 3)\n\n    dataset_shard = session.get_dataset_shard(\"train\")\n\
    \n    model = FarePredictor()\n    dist_model = train.torch.prepare_model(model)\n\
    \n    loss_function = nn.SmoothL1Loss()\n    optimizer = torch.optim.Adam(dist_model.parameters(),\
    \ lr=lr)\n\n    for epoch in range(num_epochs):\n        loss = 0\n        num_batches\
    \ = 0\n        for batch in dataset_shard.iter_torch_batches(\n            batch_size=batch_size,\
    \ dtypes=torch.float\n        ):\n            labels = torch.unsqueeze(batch[LABEL_COLUMN],\
    \ dim=1)\n            inputs = torch.cat(\n                [torch.unsqueeze(batch[f],\
    \ dim=1) for f in FEATURE_COLUMNS],\n                dim=1\n            )\n  \
    \          output = dist_model(inputs)\n            batch_loss = loss_function(output,\
    \ labels)\n            optimizer.zero_grad()\n            batch_loss.backward()\n\
    \            optimizer.step()\n\n            num_batches += 1\n            loss\
    \ += batch_loss.item()\n\n        session.report(\n            {\"epoch\": epoch,\
    \ \"loss\": loss},\n            checkpoint=TorchCheckpoint.from_model(dist_model)\n\
    \        )\n```"
  - "[PAGE 167]\n\n+   1. Pass a config dictionary into our training loop to specify\
    \ some parameters at runtime.\n2. Retrieve the data shard for the current worker,\
    \ using Ray Train's get_data_shard utility.\n3. Prepare the PyTorch model for\
    \ distributed training by applying prepare_model.\n4. Define a standard PyTorch\
    \ training loop, iterating over batches of data and performing backpropagation.\n\
    5. The only nonstandard part is the use of iter_torch_batches to iterate over\
    \ the data shard.\n6. After each epoch, report the loss computed and a model checkpoint\
    \ using a Ray session.\n\nIn case you're not familiar with PyTorch, note that\
    \ the code between the definition of the loss_function and aggregating the batch_loss\
    \ to our loss is a standard training loop for a PyTorch model (except for iterating\
    \ over batches of the dataset shard, which is specific to Ray).\n\nNow that the\
    \ training process has been defined, we need to load the training and validation\
    \ data to feed into our training workers. Here, we call the load_dataset function\
    \ defined earlier that will do preprocessing and featurization.²\n\nThis dataset\
    \ is passed into a TorchTrainer along with some configuration parameters such\
    \ as the batch size, number of epochs, and number of workers to use. Each worker\
    \ will have access to a shard of the data locally and can iterate over it. After\
    \ training has completed, we can fetch the final trained checkpoint from the returned\
    \ result object:\n\n```\ntrainer = TorchTrainer(\n    train_loop_per_worker=train_loop_per_worker,\
    \ ①\n    train_loop_config={ ②\n        \"lr\": 1e-2, \"num_epochs\": 3, \"batch_size\"\
    : 64\n    },\n    scaling_config=ScalingConfig(num_workers=2), ③\n    datasets={\
    \ ④\n        \"train\": load_dataset(\"nyc_tlc_data/yellow_tripdata_2020-01.parquet\"\
    )\n    },\n)\n```\n\n> ² The code loads only a subset of the data for testing;\
    \ to run at scale we would use all partitions of the data when calling load_dataset\
    \ and increase num_workers when training the model."
  - "[PAGE 168]\n\n```\nresult = trained_model.fit()\ntrained_model = result.checkpoint\n\
    ```\n\n+   1. Each TorchTrainer requires you to specify a `train_loop_per_worker`.\n\
    2. Optionally, if your train loop takes in a `config` dictionary, you can specify\
    \ it as `train_loop_config`.\n3. Every Ray Train Trainer needs a so-called `ScalingConfig`\
    \ to know how to scale training on your Ray Cluster.\n4. Another required argument\
    \ of each Trainer is a `datasets` dictionary. We define a \"train\" Dataset here,\
    \ and that is what we use in our training loop.\n5. You can simply `.fit()` a\
    \ TorchTrainer to start training.\n\nThe last line exports our trained model as\
    \ a checkpoint for later use in downstream applications like serving and inference.\
    \ Ray Train generates these checkpoints to serialize intermediate state for training.\
    \ Checkpoints can include both models and other training artifacts, such as preprocessors.\n\
    \n# Distributed Batch Inference\n\nOnce we've trained a model and gotten the best\
    \ accuracy, the next step is to actually apply it in practice. Sometimes this\
    \ means powering a low-latency service, which we'll explore in Chapter 8, but\
    \ often the task is to apply the model across batches of data as they come in.\n\
    \nLet's use the trained model weights from our `trained_model` and apply them\
    \ across a new batch of data (in this case, it'll just be another chunk of the\
    \ same public dataset). To do this, first we need to load, preprocess, and featurize\
    \ the data in the same way we did for training. Then we will load our model and\
    \ map it across the whole dataset. Ray Datasets allows us to do this efficiently\
    \ with Ray actors, even using GPUs just by changing one parameter. We simply load\
    \ the trained model checkpoint and call `.predict_pipelined()` on it. This will\
    \ use Ray Datasets to perform distributed batch inference across the data:\n\n\
    ```\nfrom ray.train.torch import TorchPredictor\nfrom ray.train.batch_predictor\
    \ import BatchPredictor\n\nbatch_predictor = BatchPredictor(trained_model, TorchPredictor)\n\
    ds = load_dataset(\n    \"nyc_tlc_data/yellow_tripdata_2021-01.parquet\", include_label=False)\n\
    \nbatch_predictor.predict_pipelined(ds, blocks_per_window=10)\n```"
- md: "This example showed how Ray Train and Datasets can be used to implement an\
    \ end-to-end machine learning workflow as a single application. We were able to\
    \ featurize the dataset, train and validate an ML model, and then apply that model\
    \ across a different dataset in a single Python script. Ray Datasets acted as\
    \ the glue layer, connecting the different stages and avoiding expensive serialization\
    \ costs between them. We also used checkpoints to store the model and ran a Ray\
    \ Train batch prediction job to apply the model to a new dataset.\n\nNow, that\
    \ you've seen your first example of Ray Train, let's take a closer look at its\
    \ primary abstraction, the Trainer.\n\n## More on Trainers in Ray Train\n\nAs\
    \ you've seen in the example of using a TorchTrainer, Trainers are framework-specific\
    \ classes that run model training in a distributed fashion. All Ray Trainer classes\
    \ share a common interface. At this point, it's enough to know about two aspects\
    \ of this interface, namely:\n\n- The `.fit()` method, which fits a given Trainer\
    \ with the given datasets, configuration, and desired scaling properties.\n- The\
    \ `.checkpoint` property, which returns the Ray Checkpoint object for this Trainer.\n\
    \nRay Train's Trainers integrate with common machine learning frameworks such\
    \ as PyTorch, Hugging Face, TensorFlow, Horovod, scikit-learn, and more. There's\
    \ even a Trainer specifically for RLlib models, which we don't cover here. Let's\
    \ discuss another PyTorch example to point out specific aspects of the Trainer\
    \ API, with an emphasis on how to migrate an existing PyTorch model to Ray Train.\n\
    \n### Gradient Boosting Frameworks\n\nRay Train also offers support for gradient\
    \ boosted decision tree frameworks.\n\nXGBoost is an optimized distributed gradient\
    \ boosting library designed to be highly efficient, flexible, and portable. It\
    \ implements ML algorithms under the gradient boosting framework. XGBoost provides\
    \ a parallel tree boosting that solves many data science problems quickly and\
    \ accurately.\n\nLightGBM is a gradient boosting framework based on tree-based\
    \ learning algorithms. Compared to XGBoost, it is a relatively new framework but\
    \ one that is quickly becoming popular in both academic and production use cases.\n\
    \nTo use these frameworks, you can use the `XGBoostTrainer` and `LightGBMTrainer`\
    \ classes, respectively.\n\nIn this example we want to focus on the details of\
    \ Ray Train itself, so we'll use a much simpler training dataset and a small neural\
    \ network that takes random noise as input. We define a three-layer `NeuralNetwork`,\
    \ an explicit `training_loop`, similar to the one we saw in the previous section,\
    \ that you can use to train the model. For clarity, we extract the training code\
    \ run for each epoch in a helper function called `train_one_epoch`:\n\n```python\n\
    import torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom ray.data\
    \ import from_torch\n\nnum_samples = 20\ninput_size = 10\nlayer_size = 15\noutput_size\
    \ = 5\nnum_epochs = 3\n\nclass NeuralNetwork(nn.Module):\n    def __init__(self):\n\
    \        super().__init__()\n        self.fc1 = nn.Linear(input_size, layer_size)\n\
    \        self.relu = nn.ReLU()\n        self.fc2 = nn.Linear(layer_size, output_size)\n\
    \n    def forward(self, x):\n        x = F.relu(self.fc1(x))\n        x = self.fc2(x)\n\
    \        return x\n\ndef train_data():\n    return torch.randn(num_samples, input_size)\
    \ ❶\n\ninput_data = train_data()\nlabel_data = torch.randn(num_samples, output_size)\n\
    train_dataset = from_torch(input_data) ❷\n\ndef train_one_epoch(model, loss_fn,\
    \ optimizer): ❸\n    output = model(input_data)\n    loss = loss_fn(output, label_data)\n\
    \    optimizer.zero_grad()\n    loss.backward()\n    optimizer.step()\n\ndef training_loop():\
    \ ❹\n    model = NeuralNetwork()\n    loss_fn = nn.MSELoss()\n    optimizer =\
    \ torch.optim.SGD(model.parameters(), lr=0.1)\n    for epoch in range(num_epochs):\n\
    \        train_one_epoch(model, loss_fn, optimizer)\n```\n\n1. Use a randomly\
    \ generated dataset.\n2. Create a Ray Dataset from this data with `from_torch`.\n\
    3. Extract the PyTorch code to train one epoch into a helper function.\n4. This\
    \ training loop can be run as is to train your PyTorch model on a single machine.\n\
    \nTypically, if you wanted to distribute your training without Ray Train, you\
    \ would need to do these two things:\n\n- Establish a backend that coordinates\
    \ interprocess communication.\n- Instantiate multiple parallel processes on each\
    \ node that you want to distribute your training across.\n\nIn contrast, let's\
    \ see how easy it is to use Ray Train to distribute your training process.\n\n\
    ## Migrating to Ray Train with Minimal Code Changes\n\nWith Ray Train, you can\
    \ make a one-line change to your code to take care of both interprocess communication\
    \ and process instantiation under the hood.\n\nThe code change is made by calling\
    \ `prepare_model` on the PyTorch model that you plan to train. This change is\
    \ literally the only difference between the `training_loop` defined before and\
    \ the following `distributed_training_loop`:\n\n```python\nfrom ray.train.torch\
    \ import prepare_model\n\ndef distributed_training_loop():\n    model = NeuralNetwork()\n\
    \    model = prepare_model(model)  # ①\n    loss_fn = nn.MSELoss()\n    optimizer\
    \ = torch.optim.SGD(model.parameters(), lr=0.1)\n    for epoch in range(num_epochs):\n\
    \        train_one_epoch(model, loss_fn, optimizer)\n```\n\n① Prepare the model\
    \ for distributed training by calling `prepare_model`.\n\nThen, we can instantiate\
    \ a `TorchTrainer` model, which has three required arguments:\n\n**train_loop_per_worker**\n\
    This function trains your model for each worker. It has access to the datasets\
    \ provided and can be fed an optional config dictionary that can be passed to\
    \ your trainer as `train_loop_config`. This function will typically report metrics,\
    \ e.g., via a session.\n\n**datasets**\nThis dictionary can contain several keys\
    \ with Ray Datasets as values. It's kept flexible so that you can have training\
    \ data, validation data, or any other type of data needed for your training loop.\n\
    \n**scaling_config**\nThis `ScalingConfig` object specifies how your training\
    \ should scale. For instance, you can specify the number of training workers with\
    \ `num_workers` and the use of GPUs with the `use_gpu` flag. We'll elaborate on\
    \ this more in the next section.\n\nHere's how you set up your Trainer in our\
    \ example:\n\n```python\nfrom ray.air.config import ScalingConfig\nfrom ray.train.torch\
    \ import TorchTrainer\n\ntrainer = TorchTrainer(\n    train_loop_per_worker=distributed_training_loop,\n\
    \    scaling_config=ScalingConfig(\n        num_workers=2,\n        use_gpu=False\n\
    \    ),\n    datasets={\"train\": train_dataset}\n)\n\nresult = trainer.fit()\n\
    ```\n\nWith an initialized Trainer, you can call `fit()`, which will execute the\
    \ training across your Ray Cluster. Figure 7-2 summarizes working with a TorchTrainer.\n\
    \n![](img/6489687a3a178f2884963bddc928992c_173_0.png)\n\nFigure 7-2. Working with\
    \ a TorchTrainer requires you to specify a training loop, datasets, and a scaling\
    \ configuration\n\n## Scaling Out Trainers\n\nThe Ray Train philosophy is that\
    \ the user should not need to think about how to parallelize their code. Specifying\
    \ a `scaling_config` allows you to scale your training without writing distributed\
    \ logic and to declaratively specify the *compute resources* used by a Trainer.\
    \ The nice thing about this specification is that you don't need to think about\
    \ the underlying hardware. In particular, you can use hundreds of workers by specifying\
    \ the parameters of your cluster nodes in your `ScalingConfig` accordingly:\n\n\
    ```python\nimport ray\nfrom ray.air.config import ScalingConfig\nfrom ray.train.xgboost\
    \ import XGBoostTrainer\n\nray.init(address=\"auto\")  # 1\n\nscaling_config =\
    \ ScalingConfig(num_workers=200, use_gpu=True)  # 2\n\ntrainer = XGBoostTrainer(\
    \  # 3\n    scaling_config=scaling_config,\n    # ...\n)\n```\n\n1. Connect to\
    \ an existing, large Ray Cluster here.\n2. Define a `ScalingConfig` according\
    \ to the cluster's available resources.\n3. We can then use Ray Train's XGBoost\
    \ integration to train a model on this cluster.\n\n## Preprocessing with Ray Train\n\
    \nData preprocessing is a common technique for transforming raw data into features\
    \ for an ML model, and we've seen many examples in this and the previous chapter.\
    \ So far we've “manually” preprocessed our data by writing custom functions to\
    \ transform our data into the right format. But Ray Train has several built-in\
    \ preprocessors for common use cases and also provides interfaces to define your\
    \ own custom logic.\n\nThe `Preprocessor` is the core class offered by Ray Train\
    \ for handling data preprocessing. Each preprocessor has the following APIs:\n\
    \n- `.transform()`\n  Used to process and apply a processing transformation to\
    \ a dataset.\n- `.fit()`\n  Used to calculate and store aggregate state about\
    \ the dataset on a preprocessor. Returns `self` for chaining.\n- `.fit_transform()`\n\
    \  Syntactic sugar for performing transformations that require aggregate state.\
    \ May be optimized at the implementation level for specific preprocessors.\n-\
    \ `.transform_batch()`\n  Used to apply the same transformation on batches for\
    \ prediction.\n\nWe often want to make sure we can use the same data preprocessing\
    \ operations at training time and at serving time. Training-serving skew, a major\
    \ problem in deploying ML, describes a situation where there is a difference between\
    \ performance during training and performance during serving. This skew is often\
    \ caused by a discrepancy between how you handle data in the training and serving\
    \ pipelines. Thus, you want to make sure you have consistent data handling for\
    \ training and serving.\n\nYou can use the preceding preprocessors by passing\
    \ them to the constructor of a trainer. That means once you've created a preprocessor,\
    \ you don't have to apply it to your Ray Datasets manually. Instead, you can pass\
    \ it to your trainer, and Ray Train will take care of applying it in a distributed\
    \ fashion. Here is how this works schematically:\n\n```python\nfrom ray.data.preprocessors\
    \ import StandardScaler\nfrom ray.train.xgboost import XGBoostTrainer\n\ntrainer\
    \ = XGBoostTrainer(\n    preprocessor=StandardScaler(...),\n    # ...\n)\nresult\
    \ = trainer.fit()\n```"
  mdcn: "本示例展示了如何使用 Ray Train 和 Datasets 将端到端的机器学习工作流实现为一个单一应用。我们能够在一个 Python 脚本中完成数据集的特征化、机器学习模型的训练与验证，然后将该模型应用于另一个不同的数据集。Ray\
    \ Datasets 充当了粘合层，连接了各个阶段，并避免了它们之间昂贵的序列化成本。我们还使用了检查点来存储模型，并运行了一个 Ray Train 批量预测作业，将模型应用于新数据集。\n\
    \n现在，你已经看到了 Ray Train 的第一个示例，让我们更深入地了解它的主要抽象概念——Trainer。\n\n## 关于 Ray Train 中的\
    \ Trainer\n\n正如你在使用 TorchTrainer 的示例中所见，Trainer 是特定于框架的类，用于以分布式方式运行模型训练。所有 Ray\
    \ Trainer 类都共享一个通用接口。目前，了解这个接口的两个方面就足够了，即：\n\n- `.fit()` 方法，用于使用给定的数据集、配置和所需的扩展属性来拟合给定的\
    \ Trainer。\n- `.checkpoint` 属性，返回此 Trainer 的 Ray Checkpoint 对象。\n\nRay Train 的\
    \ Trainer 集成了常见的机器学习框架，如 PyTorch、Hugging Face、TensorFlow、Horovod、scikit-learn\
    \ 等。甚至还有一个专门用于 RLlib 模型的 Trainer，我们这里不作介绍。让我们讨论另一个 PyTorch 示例，以指出 Trainer API\
    \ 的特定方面，重点是如何将现有的 PyTorch 模型迁移到 Ray Train。\n\n### 梯度提升框架\n\nRay Train 还提供了对梯度提升决策树框架的支持。\n\
    \nXGBoost 是一个优化的分布式梯度提升库，旨在实现高效、灵活和可移植。它在梯度提升框架下实现了机器学习算法。XGBoost 提供了并行树提升，能够快速准确地解决许多数据科学问题。\n\
    \nLightGBM 是一个基于树学习算法的梯度提升框架。与 XGBoost 相比，它是一个相对较新的框架，但在学术和生产用例中正迅速普及。\n\n要使用这些框架，你可以分别使用\
    \ `XGBoostTrainer` 和 `LightGBMTrainer` 类。\n\n在本示例中，我们将重点关注 Ray Train 本身的细节，因此我们将使用一个简单得多的训练数据集和一个以随机噪声作为输入的小型神经网络。我们定义了一个三层的\
    \ `NeuralNetwork`，一个类似于我们在上一节中看到的显式 `training_loop`，你可以用它来训练模型。为了清晰起见，我们将每个 epoch\
    \ 运行的训练代码提取到一个名为 `train_one_epoch` 的辅助函数中：\n\n```python\nimport torch\nimport\
    \ torch.nn as nn\nimport torch.nn.functional as F\nfrom ray.data import from_torch\n\
    \nnum_samples = 20\ninput_size = 10\nlayer_size = 15\noutput_size = 5\nnum_epochs\
    \ = 3\n\nclass NeuralNetwork(nn.Module):\n    def __init__(self):\n        super().__init__()\n\
    \        self.fc1 = nn.Linear(input_size, layer_size)\n        self.relu = nn.ReLU()\n\
    \        self.fc2 = nn.Linear(layer_size, output_size)\n\n    def forward(self,\
    \ x):\n        x = F.relu(self.fc1(x))\n        x = self.fc2(x)\n        return\
    \ x\n\ndef train_data():\n    return torch.randn(num_samples, input_size) ❶\n\n\
    input_data = train_data()\nlabel_data = torch.randn(num_samples, output_size)\n\
    train_dataset = from_torch(input_data) ❷\n\ndef train_one_epoch(model, loss_fn,\
    \ optimizer): ❸\n    output = model(input_data)\n    loss = loss_fn(output, label_data)\n\
    \    optimizer.zero_grad()\n    loss.backward()\n    optimizer.step()\n\ndef training_loop():\
    \ ❹\n    model = NeuralNetwork()\n    loss_fn = nn.MSELoss()\n    optimizer =\
    \ torch.optim.SGD(model.parameters(), lr=0.1)\n    for epoch in range(num_epochs):\n\
    \        train_one_epoch(model, loss_fn, optimizer)\n```\n\n1. 使用随机生成的数据集。\n2.\
    \ 使用 `from_torch` 从该数据创建一个 Ray Dataset。\n3. 将训练一个 epoch 的 PyTorch 代码提取到一个辅助函数中。\n\
    4. 此训练循环可以直接运行，以在单机上训练你的 PyTorch 模型。\n\n通常，如果你想在没有 Ray Train 的情况下分发训练，你需要做这两件事：\n\
    \n- 建立一个协调进程间通信的后端。\n- 在你想要分发训练的每个节点上实例化多个并行进程。\n\n相比之下，让我们看看使用 Ray Train 来分发你的训练过程是多么容易。\n\
    \n## 以最小的代码更改迁移到 Ray Train\n\n使用 Ray Train，你只需对代码进行一行更改，即可在底层处理进程间通信和进程实例化。\n\n\
    代码更改是通过调用你计划训练的 PyTorch 模型上的 `prepare_model` 来完成的。这个更改是之前定义的 `training_loop` 和下面的\
    \ `distributed_training_loop` 之间唯一的区别：\n\n```python\nfrom ray.train.torch import\
    \ prepare_model\n\ndef distributed_training_loop():\n    model = NeuralNetwork()\n\
    \    model = prepare_model(model)  # ①\n    loss_fn = nn.MSELoss()\n    optimizer\
    \ = torch.optim.SGD(model.parameters(), lr=0.1)\n    for epoch in range(num_epochs):\n\
    \        train_one_epoch(model, loss_fn, optimizer)\n```\n\n① 通过调用 `prepare_model`\
    \ 为分布式训练准备模型。\n\n然后，我们可以实例化一个 `TorchTrainer` 模型，它有三个必需参数：\n\n**train_loop_per_worker**\n\
    此函数为每个 worker 训练你的模型。它可以访问提供的数据集，并可以接收一个可选的配置字典，该字典可以作为 `train_loop_config` 传递给你的\
    \ trainer。此函数通常会报告指标，例如通过会话。\n\n**datasets**\n此字典可以包含多个键，其值为 Ray Datasets。它保持灵活，以便你可以拥有训练数据、验证数据或你的训练循环所需的任何其他类型的数据。\n\
    \n**scaling_config**\n此 `ScalingConfig` 对象指定你的训练应如何扩展。例如，你可以使用 `num_workers` 指定训练\
    \ worker 的数量，并使用 `use_gpu` 标志指定是否使用 GPU。我们将在下一节中更详细地讨论这一点。\n\n以下是你在我们的示例中设置 Trainer\
    \ 的方法：\n\n```python\nfrom ray.air.config import ScalingConfig\nfrom ray.train.torch\
    \ import TorchTrainer\n\ntrainer = TorchTrainer(\n    train_loop_per_worker=distributed_training_loop,\n\
    \    scaling_config=ScalingConfig(\n        num_workers=2,\n        use_gpu=False\n\
    \    ),\n    datasets={\"train\": train_dataset}\n)\n\nresult = trainer.fit()\n\
    ```\n\n初始化 Trainer 后，你可以调用 `fit()`，它将在你的 Ray 集群上执行训练。图 7-2 总结了使用 TorchTrainer\
    \ 的工作流程。\n\n![](img/6489687a3a178f2884963bddc928992c_173_0.png)\n\n图 7-2. 使用 TorchTrainer\
    \ 需要你指定一个训练循环、数据集和扩展配置\n\n## 扩展 Trainer\n\nRay Train 的理念是用户不需要考虑如何并行化他们的代码。指定\
    \ `scaling_config` 允许你在不编写分布式逻辑的情况下扩展训练，并声明式地指定 Trainer 使用的*计算资源*。这种规范的好处在于你不需要考虑底层硬件。特别是，你可以通过在\
    \ `ScalingConfig` 中相应地指定集群节点的参数来使用数百个 worker：\n\n```python\nimport ray\nfrom ray.air.config\
    \ import ScalingConfig\nfrom ray.train.xgboost import XGBoostTrainer\n\nray.init(address=\"\
    auto\")  # 1\n\nscaling_config = ScalingConfig(num_workers=200, use_gpu=True)\
    \  # 2\n\ntrainer = XGBoostTrainer(  # 3\n    scaling_config=scaling_config,\n\
    \    # ...\n)\n```\n\n1. 在此处连接到现有的大型 Ray 集群。\n2. 根据集群的可用资源定义一个 `ScalingConfig`。\n\
    3. 然后我们可以使用 Ray Train 的 XGBoost 集成在此集群上训练模型。\n\n## 使用 Ray Train 进行预处理\n\n数据预处理是将原始数据转换为机器学习模型特征的常用技术，我们在本章和上一章中已经看到了许多例子。到目前为止，我们通过编写自定义函数将数据转换为正确的格式来“手动”预处理数据。但\
    \ Ray Train 有几个针对常见用例的内置预处理器，也提供了定义自己的自定义逻辑的接口。\n\n`Preprocessor` 是 Ray Train\
    \ 提供的用于处理数据预处理的核心类。每个预处理器都有以下 API：\n\n- `.transform()`\n  用于处理并应用处理转换到数据集。\n-\
    \ `.fit()`\n  用于计算和存储关于数据集的聚合状态到预处理器。返回 `self` 以支持链式调用。\n- `.fit_transform()`\n\
    \  执行需要聚合状态的转换的语法糖。对于特定的预处理器，可能在实现层面进行优化。\n- `.transform_batch()`\n  用于对批次应用相同的转换以进行预测。\n\
    \n我们通常希望确保在训练时和提供服务时使用相同的数据预处理操作。训练-服务偏差是部署机器学习时的一个主要问题，它描述了训练期间的性能与提供服务期间的性能之间存在差异的情况。这种偏差通常是由于在训练和服务管道中处理数据的方式不一致造成的。因此，你希望确保训练和服务具有一致的数据处理。\n\
    \n你可以通过将预处理器传递给 trainer 的构造函数来使用它们。这意味着一旦你创建了一个预处理器，就不必手动将其应用于你的 Ray Datasets。相反，你可以将其传递给你的\
    \ trainer，Ray Train 将负责以分布式方式应用它。以下是其工作原理的示意图：\n\n```python\nfrom ray.data.preprocessors\
    \ import StandardScaler\nfrom ray.train.xgboost import XGBoostTrainer\n\ntrainer\
    \ = XGBoostTrainer(\n    preprocessor=StandardScaler(...),\n    # ...\n)\nresult\
    \ = trainer.fit()\n```"

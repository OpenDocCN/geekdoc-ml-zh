- img_proc: true
  md: "Slightly modifying a previous example, let's say we want to log a specific\
    \ message whenever a trial returns a result. To do so, all you need to do is implement\
    \ the on_trial_result method on a Callback object from the ray.tune package.³\
    \ Here's how that would look for an objective function that reports a score:\n\
    \n```\nfrom ray import tune\nfrom ray.tune import Callback\nfrom ray.tune.logger\
    \ import pretty_print\n\nclass PrintResultCallback(Callback):\n    def on_trial_result(self,\
    \ iteration, trials, trial, result, **info):\n        print(f\"Trial {trial} in\
    \ iteration {iteration}, \"\n              f\"got result: {result['score']}\"\
    )\n\ndef objective(config):\n    for step in range(30):\n        score = config[\"\
    weight\"] * (step ** 0.5) + config[\"bias\"]\n        tune.report(score=score,\
    \ step=step, more_metrics={})\n```\n\nNote that, apart from the score, we also\
    \ report step and more_metrics to Tune. In fact, you could expose any other metric\
    \ you'd like to track there, and Tune would add it to its trial metrics. Here's\
    \ how you'd run a Tune experiment with our custom callback and print the custom\
    \ metrics we just defined:\n\n```\nsearch_space = {\"weight\": tune.uniform(0,\
    \ 1), \"bias\": tune.uniform(0, 1)}\n\nanalysis = tune.run(\n    objective,\n\
    \    config=search_space,\n    mode=\"min\",\n    metric=\"score\",\n    callbacks=[PrintResultCallback()])\n\
    \nbest = analysis.best_trial\nprint(pretty_print(best.last_result))\n```\n\nRunning\
    \ this code will result in the following outputs (additional to what you'll see\
    \ in any other Tune run). Note that we need to specify mode and metric explicitly\
    \ here so that Tune knows what we mean by best_result. First, you should see the\
    \ output of our callback, while the trials are running:\n\n```\n...\nTrial objective_85955_00000\
    \ in iteration 57, got result: 1.5379782083952644\nTrial objective_85955_00000\
    \ in iteration 58, got result: 1.5539087627537493\nTrial objective_85955_00000\
    \ in iteration 59, got result: 1.569535794562848\n```\n\n3 If you want to learn\
    \ more about how to use callbacks in Tune or create your own callbacks, check\
    \ out the user guide on callbacks and metrics in Tune."

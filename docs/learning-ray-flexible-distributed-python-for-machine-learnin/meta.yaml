  md: '# A Growing Ecosystem


    Ray''s high-level libraries are powerful and deserve a much deeper treatment throughout
    the book. While their usefulness for the data science experimentation lifecycle
    is undeniable, we also don''t want to give the impression that Ray is all you
    need from now on. No surprise, the best and most successful frameworks are the
    ones that integrate well with existing solutions and ideas. It''s better to focus
    on your core strengths and leverage other tools for what''s missing in your solution,
    and Ray does this quite well.


    Throughout the book, and in Chapter 11 in particular, we will discuss many useful
    third-party libraries built on top of Ray. The Ray ecosystem also has a lot of
    integrations with existing tools. To give you an example of that, recall that
    Ray Datasets is Ray''s data loading and compute library. If you happen to have
    an existing project that already uses data processing engines like Spark or Dask,¹⁸
    you can use those tools together with Ray. Specifically, you can run the entire
    Dask ecosystem on top of a Ray Cluster using the Dask-on-Ray scheduler, or you
    can use the Spark on Ray project to integrate your Spark workloads with Ray. Likewise,
    the Modin project is a distributed drop-in replacement for Pandas DataFrames that
    uses Ray (or Dask) as a distributed execution engine (“Pandas on Ray”).


    The common theme here is that Ray doesn''t try to replace all these tools, but
    rather integrates with them while still giving you access to its native Ray Datasets
    library. We''ll go into much more detail about the relationship of Ray with other
    tools in the broader ecosystem in Chapter 11.


    One important aspect of many Ray libraries is that they seamlessly integrate common
    tools as *backends*. Ray often creates common interfaces, instead of trying to
    create new standards.¹⁹ These interfaces allow you to run tasks in a distributed
    fashion, a property most of the respective backends don''t have, or not to the
    same extent. For instance, Ray RLlib and Train are backed by the full power of
    TensorFlow and PyTorch. And Ray Tune supports algorithms from practically every
    notable HPO tool available, including Hyperopt, Optuna, Nevergrad, Ax, SigOpt,
    and many others. None of these tools is distributed by default, but Tune unifies
    them in a *common interface for distributed workloads*.


    18 Spark was created by another lab in Berkeley, AMPLab. The internet is full
    of blog posts claiming that Ray should therefore be seen as a replacement of Spark.
    It''s better to think of them as tools with different strengths that are both
    likely here to stay.


    19 Before the deep learning framework Keras became an official part of TensorFlow,
    it started out as a convenient API specification for various lower-level frameworks
    such as Theano or CNTK. In that sense, Ray RLlib has the chance to become “Keras
    for RL,” and Ray Tune might just be “Keras for HPO.” The missing piece for more
    adoption might just be a more elegant API for both.'
  merge: -1

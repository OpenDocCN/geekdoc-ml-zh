    \ `FarePredictor` 的基础 PyTorch 神经网络。该神经网络包含三个线性变换，起始维度为我们的特征向量维度，然后通过 Sigmoid 激活函数输出一个介于\
    \ 0 和 1 之间的值。我们还在网络中使用了 *批归一化* 层以改善训练效果。这个输出值将被四舍五入，以产生关于行程是否会产生大额小费的二元预测：\n\n\
    ```python\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as\
    \ F\n\nclass FarePredictor(nn.Module):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.fc1 = nn.Linear(6, 256)\n        self.fc2 = nn.Linear(256, 16)\n\
    \        self.fc3 = nn.Linear(16, 1)\n\n        self.bn1 = nn.BatchNorm1d(256)\n\
    \        self.bn2 = nn.BatchNorm1d(16)\n\n    def forward(self, x):\n        x\
    \ = F.relu(self.fc1(x))\n        x = self.bn1(x)\n        x = F.relu(self.fc2(x))\n\
    \        x = self.bn2(x)\n        x = torch.sigmoid(self.fc3(x))\n\n        return\
    \ x\n```\n\n## 使用 Ray Train 进行分布式训练\n\n既然我们已经定义了神经网络架构，就需要一种方法来高效地在我们的数据上训练它。这个数据集非常大，因此我们最好的选择是执行\
    \ *数据并行训练*。\n\n这意味着我们在多台机器上并行训练模型，每台机器都有模型的一个副本和数据的一个子集。我们将使用 Ray Train 来定义一个可扩展的训练过程，该过程将在底层使用\
    \ [PyTorch DataParallel](https://pytorch.org/docs/stable/nn.html#torch.nn.DataParallel)。我们不会在此处深入探讨训练过程的概念细节，但会在本端到端示例之后的章节中进行讨论。\n\
    \n> 即将展示的示例使用了来自 `ray.air` 模块的导入。我们在 [第 1 章](https://example.com/chapter1) 中提到了\
    \ Ray AIR，并将在 [第 10 章](https://example.com/chapter10) 中正式介绍它。目前，请将此模块视为定义和运行分布式训练过程的实用工具。\n\
    \n具体来说，我们使用了一个所谓的 AIR 会话，它可以用来报告训练过程中收集的指标。这遵循了与我们在 [第 5 章](https://example.com/chapter5)\
    \ 中讨论的 `tune.report` API 类似的使用模式。\n\n我们需要做的第一件事是定义在每个 epoch 中在每个 worker 上训练一批数据所需的核心逻辑。这将接收完整数据集的一个本地分片，将其通过模型的本地副本运行，并执行反向传播以更新模型权重。每个\
    \ epoch 结束后，worker 将使用 Ray Train 工具报告结果并保存当前模型权重以供后续使用：\n\n```python\nfrom ray.air\
    \ import session\nfrom ray.air.config import ScalingConfig\nimport ray.train as\
    \ train\nfrom ray.train.torch import TorchCheckpoint, TorchTrainer\n\ndef train_loop_per_worker(config:\
    \ dict):\n    batch_size = config.get(\"batch_size\", 32)\n    lr = config.get(\"\
    lr\", 1e-2)\n    num_epochs = config.get(\"num_epochs\", 3)\n\n    dataset_shard\
    \ = session.get_dataset_shard(\"train\")\n\n    model = FarePredictor()\n    dist_model\
    \ = train.torch.prepare_model(model)\n\n    loss_function = nn.SmoothL1Loss()\n\
    \    optimizer = torch.optim.Adam(dist_model.parameters(), lr=lr)\n\n    for epoch\
    \ in range(num_epochs):\n        loss = 0\n        num_batches = 0\n        for\
    \ batch in dataset_shard.iter_torch_batches(\n            batch_size=batch_size,\
    \ dtypes=torch.float\n        ):\n            labels = torch.unsqueeze(batch[LABEL_COLUMN],\
    \ dim=1)\n            inputs = torch.cat(\n                [torch.unsqueeze(batch[f],\
    \ dim=1) for f in FEATURE_COLUMNS],\n                dim=1\n            )\n  \
    \          output = dist_model(inputs)\n            batch_loss = loss_function(output,\
    \ labels)\n            optimizer.zero_grad()\n            batch_loss.backward()\n\
    \            optimizer.step()\n\n            num_batches += 1\n            loss\
    \ += batch_loss.item()\n\n        session.report(\n            {\"epoch\": epoch,\
    \ \"loss\": loss},\n            checkpoint=TorchCheckpoint.from_model(dist_model)\n\
    \        )\n```\n\n1.  将一个配置字典传入我们的训练循环，以在运行时指定一些参数。\n2.  使用 Ray Train 的 `get_data_shard`\
    \ 工具检索当前 worker 的数据分片。\n3.  通过应用 `prepare_model` 为分布式训练准备 PyTorch 模型。\n4.  定义一个标准的\
    \ PyTorch 训练循环，遍历数据批次并执行反向传播。\n5.  唯一非标准的部分是使用 `iter_torch_batches` 来遍历数据分片。\n\
    6.  每个 epoch 后，使用 Ray 会话报告计算出的损失和一个模型检查点。\n\n如果您不熟悉 PyTorch，请注意，从定义 `loss_function`\
    \ 到将 `batch_loss` 聚合到我们的 `loss` 之间的代码是 PyTorch 模型的标准训练循环（除了遍历数据集分片的批次，这是 Ray 特有的）。\n\
    \n既然训练过程已经定义好了，我们需要加载训练和验证数据来馈送到我们的训练 worker 中。在这里，我们调用之前定义的 `load_dataset` 函数，该函数将进行预处理和特征化。²\n\
    \n这个数据集与一些配置参数（如批大小、epoch 数和要使用的 worker 数）一起传递给 `TorchTrainer`。每个 worker 将在本地访问数据的一个分片并可以对其进行迭代。训练完成后，我们可以从返回的结果对象中获取最终训练好的检查点：\n\
    \n```python\ntrainer = TorchTrainer(\n    train_loop_per_worker=train_loop_per_worker,\
    \ ①\n    train_loop_config={ ②\n        \"lr\": 1e-2, \"num_epochs\": 3, \"batch_size\"\
    : 64\n    },\n    scaling_config=ScalingConfig(num_workers=2), ③\n    datasets={\
    \ ④\n        \"train\": load_dataset(\"nyc_tlc_data/yellow_tripdata_2020-01.parquet\"\
    )\n    },\n)\n```\n\n> ² 代码仅加载了数据的一个子集用于测试；要大规模运行，我们将在调用 `load_dataset` 时使用所有数据分区，并在训练模型时增加\
    \ `num_workers`。\n\n```python\nresult = trained_model.fit()\ntrained_model = result.checkpoint\n\
    ```\n\n1.  每个 `TorchTrainer` 都需要您指定一个 `train_loop_per_worker`。\n2.  可选地，如果您的训练循环接受一个\
    \ `config` 字典，您可以将其指定为 `train_loop_config`。\n3.  每个 Ray Train Trainer 都需要一个所谓的\
    \ `ScalingConfig`，以了解如何在您的 Ray 集群上扩展训练。\n4.  每个 Trainer 的另一个必需参数是 `datasets` 字典。我们在这里定义了一个\
    \ \"train\" 数据集，这就是我们在训练循环中使用的数据集。\n5.  您只需对 `TorchTrainer` 调用 `.fit()` 即可开始训练。\n\
    \n最后一行将我们训练好的模型导出为一个检查点，以供下游应用程序（如服务和推理）后续使用。Ray Train 生成这些检查点以序列化训练的中间状态。检查点可以包括模型和其他训练工件，例如预处理器。\n\
    \n## 分布式批量推理\n\n一旦我们训练好模型并获得了最佳准确度，下一步就是将其实际应用于实践中。有时这意味着驱动一个低延迟服务，我们将在第 8 章中探讨这一点，但通常任务是在数据批次到来时跨批次应用模型。\n\
    \n让我们使用来自 `trained_model` 的训练好的模型权重，并将其应用于一批新数据（在这种情况下，它只是同一公共数据集的另一部分）。为此，首先我们需要以与训练相同的方式加载、预处理和特征化数据。然后我们将加载我们的模型并将其映射到整个数据集。Ray\
    \ Datasets 允许我们使用 Ray actors 高效地完成此操作，甚至只需更改一个参数即可使用 GPU。我们只需加载训练好的模型检查点并对其调用\
    \ `.predict_pipelined()`。这将使用 Ray Datasets 在数据上执行分布式批量推理：\n\n```python\nfrom ray.train.torch\
    \ import TorchPredictor\nfrom ray.train.batch_predictor import BatchPredictor\n\
    \nbatch_predictor = BatchPredictor(trained_model, TorchPredictor)\nds = load_dataset(\n\
    \    \"nyc_tlc_data/yellow_tripdata_2021-01.parquet\", include_label=False)\n\n\
    batch_predictor.predict_pipelined(ds, blocks_per_window=10)\n```"

  - '[PAGE 58]


    Raylet, and all objects stored collectively form the distributed object store
    of a cluster. The object store manages a *shared pool of memory* across workers
    on the same node and ensures that workers can access objects that were created
    on a different node. The object store is implemented in Plasma, which now belongs
    to the Apache Arrow project. Functionally, the object store takes care of memory
    management and ultimately makes sure workers have access to the objects they need.


    The second component of a Raylet is its scheduler. The scheduler takes care of
    *resource management*, among other things. For instance, if a task requires access
    to four CPUs, the scheduler needs to make sure it can find a free worker process
    that can grant access to said resources. By default, the scheduler knows about
    and acquires information about the number of CPUs and GPUs, as well as the amount
    of memory available on its node. If a scheduler can''t provide the required resources,
    it simply can''t schedule execution of a task right away and needs to queue it.
    The scheduler limits which tasks are running concurrently to make sure that you
    don''t run out of physical resources.


    Apart from resources, the other requirement the scheduler takes care of is *dependency
    resolution*. That means it needs to ensure that each worker has all the objects
    it needs to execute a task in the local object store. For that to work, the scheduler
    will first resolve local dependencies by looking up values in its object store.
    If the required value is not available on this node''s object store, the scheduler
    will communicate with other nodes (we''ll tell you how in a bit) and pull in remote
    dependencies. Once the scheduler has ensured enough resources for a task, resolved
    all needed dependencies, and found a worker for a task, it can schedule the task
    for execution.


    Task scheduling is a very difficult topic, even if we''re talking only about single
    nodes. You can easily imagine scenarios in which an incorrectly or naively planned
    task execution can “block” downstream tasks because not enough resources remain.
    Especially in a distributed context, assigning work like this can be become tricky
    very quickly.


    Now that you know about Raylets, let''s briefly come back to worker processes
    and wrap up the discussion by explaining how Ray can recover from failures and
    the concepts needed to do so.


    In short, workers store metadata for all the tasks they invoke and the object
    references returned by those tasks. This concept, called *ownership*, means the
    process that generates an object reference is also responsible for its resolution.
    In other words, each worker process “owns” the tasks it submits, which includes
    proper execution and ensuring availability of results. Worker processes need to
    track what they own, for instance in case of failures, which is why they have
    a so-called *ownership table*. This way, if a task fails and needs to be recomputed,
    the worker already owns all'

    \ 50/50 probability.\n\n# End-to-End Example: Building an NLP-Powered API\n\n\
    In this section, we'll use Ray Serve to build an end-to-end natural language processing\
    \ (NLP) pipeline hosted for online inference. Our goal will be to provide a Wikipedia\

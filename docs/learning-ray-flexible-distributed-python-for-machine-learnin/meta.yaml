    \n## 搜索算法\n\nTune 支持多种搜索算法，这些算法是调整超参数的核心。到目前为止，你已经隐式地接触了 Tune 的默认搜索算法，它从搜索空间中随机选择超参数。\n\
    \n## 调度器\n\nTune 实验的最后一个关键组件是调度器。调度器负责规划和执行搜索算法所选择的内容。默认情况下，Tune 按照先进先出（FIFO）的原则调度由你的搜索算法选择的试验。实际上，你可以将调度器视为加速实验的一种方式，例如通过提前停止不成功的试验。\n\
    \n图 5-1 总结了这些主要的 Tune 组件及其关系。\n\n![](img/6489687a3a178f2884963bddc928992c_128_0.png)\n\
    \n在本章中，我们专门使用 `tune.run` 来说明 Tune 的功能。Tune 在 Ray 2.0 中还添加了一个名为 `Tuner` 的 API，作为\
    \ Ray AIR 的一部分，你将在第 7 章了解更多，并在第 10 章中在 Ray AIR 中使用它。\n\n在撰写本文时，`tune.run` 仍然是一个更成熟的\
    \ API。例如，使用 `tune.run(...)` 的实验返回一个 `ExperimentAnalysis` 对象，这是一个分析结果的强大工具。而使用\
    \ `Tuner` API 的类似调用则返回一个所谓的 `ResultGrid`。从长远来看，`ResultGrid` 将取代 `ExperimentAnalysis`，但目前其功能尚未完全对等。\n\
    \n要了解更多信息，请参阅关于此主题的 Tune API 文档。\n\n请注意，在内部，Tune 运行是在你的 Ray 集群的驱动程序进程上启动的，该进程会生成多个工作进程（使用\
    \ Ray actors）来执行你的 HPO 实验的各个试验。你在驱动程序上定义的可训练对象必须发送到工作进程，并且试验结果需要与运行 `tune.run(...)`\
    \ 的驱动程序进行通信。\n\n搜索空间、可训练对象、试验和分析不需要太多额外的解释，我们将在本章的其余部分看到更多关于这些组件的示例。但是搜索算法（简称\
    \ *searchers*）和调度器需要稍作详细说明。\n\n## 搜索算法\n\nTune 提供的所有高级搜索算法，以及它集成的众多第三方 HPO 库，都属于\
    \ *贝叶斯优化* 的范畴。不幸的是，深入探讨特定贝叶斯搜索算法的细节远远超出了本书的范围。其基本思想是，根据先前试验的结果，更新你对哪些超参数范围值得探索的信念。使用此原则的技术能做出更明智的决策，因此往往比独立采样参数（例如随机采样）更高效。\n\
    \n除了我们已经看到的基本随机搜索和从预定义的“网格”中选择超参数的 *网格搜索* 之外，Tune 还集成了广泛的贝叶斯优化搜索器。例如，Tune 与流行的\
    \ Hyperopt 和 Optuna 库集成，² 你可以通过这两个库在 Tune 中使用流行的 TPE（树结构 Parzen 估计器）搜索器。不仅如此，Tune\
    \ 还与 Ax、BlendSearch、FLAML、Dragonfly、scikit-Optimize、Bayesian optimization、HpBandSter、Nevergrad、ZOOpt、SigOpt\
    \ 和 HEBO 等工具集成。如果你需要在集群上使用这些工具中的任何一个运行 HPO 实验，或者想要轻松地在它们之间切换，Tune 是不二之选。\n\n为了更具体地说明，让我们将之前的基本随机搜索\
    \ Tune 示例重写为使用贝叶斯优化库。为此，请确保首先在你的 Python 环境中安装此库，例如使用 `pip install bayesian-optimization`：\n\
    \n```python\nfrom ray.tune.suggest.bayesopt import BayesOptSearch\n\nalgo = BayesOptSearch(random_search_steps=4)\n\
    ```\n\n> ² 在开源软件中，确定谁负责维护集成非常重要。我们将在第 11 章中更详细地讨论这一点，该章涵盖了 Ray 的整个生态系统。对于 Tune\
    \ 而言，在此处列出的集成中，Hyperopt 和 Optuna 集成由 Ray Tune 团队维护；其余的则由社区赞助。\n\n```python\ntune.run(\n\
    \    tune_objective,\n    config=search_space,\n    metric=\"score\",\n    mode=\"\
    min\",\n    search_alg=algo,\n    stop={\"training_iteration\": 10},\n)\n```\n\
    \n请注意，我们以四个随机步骤“热启动”我们的贝叶斯优化，并且我们在 10 次训练迭代后明确停止试验运行。\n\n因为我们不仅仅是使用 `BayesOptSearch`\
    \ 随机选择参数：我们在 Tune 运行中使用的 `search_alg` 需要知道要优化哪个指标以及是最大化还是最小化该指标。正如我们之前所论证的，我们希望实现“最小化”“分数”。\n\
    \n## 调度器\n\n接下来，让我们讨论如何在 Tune 中使用 *试验调度器* 来使你的运行更高效。我们还将在本节中介绍一种在目标函数中向 Tune 报告指标的略有不同的方式。\n\
    \n假设我们不是像之前的示例那样直接计算分数，而是在循环中计算一个 *中间分数*。这种情况在监督机器学习场景中经常发生，当训练模型进行多次迭代时（我们将在第\
    \ 115 页的“使用 Tune 进行机器学习”中看到具体应用）。如果选择了良好的超参数，这个中间分数可能在计算它的循环结束之前就停滞不前了。换句话说，如果我们没有看到足够的增量变化，为什么不提前停止试验呢？这正是\
    \ Tune 调度器旨在解决的情况之一。\n\n这是一个此类目标函数的快速示例。这是一个简单的示例，但它将帮助我们比从复杂示例开始更容易地思考我们希望 Tune\
    \ 找到的最佳超参数：\n\n```python\ndef objective(config):\n    for step in range(30): \
    \ # ①\n        score = config[\"weight\"] * (step ** 0.5) + config[\"bias\"]\n\
    \        tune.report(score=score)  # ②\n\nsearch_space = {\"weight\": tune.uniform(0,\
    \ 1), \"bias\": tune.uniform(0, 1)}\n```\n\n- 1. 你可能经常想要计算中间分数，例如在“训练循环”中。\n-\
    \ 2. 你可以使用 `tune.report` 让 Tune 知道这些中间分数。\n\n我们这里想要最小化的分数是一个正数乘以权重再加上一个偏置项的平方根。很明显，为了最小化任何正\
    \ x 的分数，这两个超参数都需要尽可能小。鉴于平方根函数会“趋于平缓”，我们可能不必计算所有 30 次循环就能为我们的两个超参数找到足够好的值。如果每次分数计算需要一个小时，提前停止可以极大地加快你的实验运行速度。\n\
    \n让我们通过使用流行的 Hyperband 算法作为试验调度器来说明这个想法。这个调度器需要传入一个指标和模式（同样，我们最小化分数）。我们还确保运行 10\
    \ 个样本，以免过早停止：\n\n```python\nfrom ray.tune.schedulers import HyperBandScheduler\n\
    \nscheduler = HyperBandScheduler(metric=\"score\", mode=\"min\")\n\nanalysis =\
    \ tune.run(\n    objective,\n    config=search_space,\n    scheduler=scheduler,\n\
    \    num_samples=10,\n)\n\nprint(analysis.get_best_config(metric=\"score\", mode=\"\
    min\"))\n```\n\n请注意，在这种情况下，我们没有指定搜索算法，这意味着 Hyperband 将在随机搜索选择的参数上运行。我们也可以将此调度器与另一个搜索算法\
    \ *结合* 使用。这将允许我们选择更好的试验超参数并提前停止不良试验。但是，请注意，并非每个调度器都可以与搜索算法结合使用。有关更多信息，请查看 [Tune\
    \ 的调度器兼容性矩阵](https://docs.ray.io/en/latest/tune/tutorials/tune-scheduler.html)。\n\
    \n总结一下这个讨论，除了 Hyperband 之外，Tune 还包括分布式实现的早期停止算法，例如中位数停止规则、ASHA、基于种群的训练（PBT）和基于种群的强盗算法（PB2）。\n\
    \n## 配置和运行 Tune\n\n在深入探讨使用 Ray Tune 的更具体的机器学习示例之前，让我们先探讨一些有用的主题，这些主题可以帮助你从 Tune\
    \ 实验中获得更多收益，例如正确利用资源、停止和恢复试验、向你的 Tune 运行添加回调，或定义自定义和条件搜索空间。"

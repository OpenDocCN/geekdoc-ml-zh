    要从Python使用RLlib运行强化学习工作负载，`Algorithm`类是你的主要入口点。始终从相应的`AlgorithmConfig`类开始来定义算法。例如，在上一节中，我们使用了`DQNConfig`作为起点，而`rllib\
    \ train`命令负责为我们实例化DQN算法。所有其他RLlib算法都遵循相同的模式。\n\n## 训练RLlib算法\n\n每个RLlib `Algorithm`都带有合理的默认参数，这意味着你*可以*在不调整这些算法的任何配置参数的情况下初始化它们。⁷\n\
    \n话虽如此，值得注意的是RLlib算法是高度可配置的，正如你将在以下示例中看到的。我们首先创建一个`DQNConfig`对象。然后我们指定其环境，并通过使用`rollouts`方法将rollout工作节点数设置为两个。这意味着DQN算法将生成两个Ray\
    \ actor，默认情况下每个使用一个CPU，以并行运行算法。此外，为了后续评估目的，我们将`create_env_on_local_worker`设置为`True`：\n\
    \n```\nfrom ray.tune.logger import pretty_print\nfrom maze_gym_env import GymEnvironment\n\

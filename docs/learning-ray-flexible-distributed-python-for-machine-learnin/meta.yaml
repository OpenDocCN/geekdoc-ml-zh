  md: "We're almost there, so let's formalize the procedure with an update_policy\
    \ function for a policy and collected experiences:\n\n```\ndef update_policy(policy,\
    \ experiences, weight=0.1, discount_factor=0.9):\n    \"\"\"Updates a given policy\
    \ with a list of (state, action, reward, state)\n    experiences.\"\"\"\n    for\
    \ state, action, reward, next_state in experiences: ①\n        next_max = np.max(policy.state_action_table[next_state])\
    \ ②\n        value = policy.state_action_table[state][action] ③\n        new_value\
    \ = (1 - weight) * value + weight * \\n                    (reward + discount_factor\
    \ * next_max) ④\n        policy.state_action_table[state][action] = new_value\
    \ ⑤\n```\n\n+   ① Loop through all experiences in order.\n② Choose the maximum\
    \ value among all possible actions in the next state.\n③ Extract the current state-action\
    \ value.\n④ The new value is the weighted sum of the old value and the expected\
    \ value, which is the sum of the current reward and the discounted next_max.\n\
    ⑤ After updating, set the new state_action_table value.\n\nHaving this function\
    \ in place now makes it simple to train a policy to make better decisions. We\
    \ can use the following procedure:\n\n+   1. Initialize a policy and a simulation.\n\
    2. Run the simulation many times, let's say for a total of 10,000 runs.\n3. For\
    \ each game, first collect the experiences by running a rollout.\n4. Then update\
    \ the policy by calling update_policy on the collected experiences.\n\nThat's\
    \ it! The following train_policy function implements this procedure:\n\n```\n\
    def train_policy(env, num_episodes=10000, weight=0.1, discount_factor=0.9):\n\
    \    \"\"\"Training a policy by updating it with rollout experiences.\"\"\"\n\
    \    policy = Policy(env)\n    sim = Simulation(env)\n    for _ in range(num_episodes):\n\
    \        experiences = sim.rollout(policy) ①\n        update_policy(policy, experiences,\
    \ weight, discount_factor) ②\n\n    return policy\n\ntrained_policy = train_policy(environment)\
    \ ③\n```"

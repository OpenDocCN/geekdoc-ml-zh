    \ it still runs as expected.\n\n# Using Ray's wait function for nonblocking calls\n\
    \nNote how in Example 2-1 we used ray.get(object_references) to access results.\
    \ This call is blocking, which means that our driver has to wait for all the results\
    \ to be available. That's not a big deal in our case; the program now finishes\
    \ in under a second. But imagine that the processing of each database item would\
    \ take several minutes. In that case, you would want to free up the driver process\
    \ for other tasks, instead of sitting idly by. Also, it would be great to process\
    \ results as they come in (some finish much quicker than others), rather than\

  - "[PAGE 150]\n\n![](img/6489687a3a178f2884963bddc928992c_150_0.png)\n\nFigure 6-1.\
    \ A naive Dataset computation, leading to idle resources between stages\n\nIn\
    \ this scenario, it would be more efficient to *pipeline* the stages instead and\
    \ allow them to overlap as shown in Figure 6-2. This means that as soon as some\
    \ data has been read from storage, it is fed into the preprocessing stage, then\
    \ to the inference stage, and so on.\n\n![](img/6489687a3a178f2884963bddc928992c_150_1.png)\n\
    \nFigure 6-2. An optimized DatasetPipeline that enables overlapping compute between\
    \ stages and reduces idle resources\n\nThis pipelining will improve the overall\
    \ resource usage of the end-to-end workload, improving throughput and therefore\
    \ decreasing the cost it takes to run the computation (fewer idle resources is\
    \ better!).\n\nDatasets can be converted to `DatasetPipelines` using `ds.window()`,\
    \ enabling the pipelining behavior that we want in this scenario. A window specifies\
    \ the number of blocks that will be passed through a stage in the pipeline before\
    \ being passed to the next stage. This behavior can be tuned using the `blocks_per_window`\
    \ parameter, which defaults to 10.\n\nLet's rewrite the inefficient pseudocode\
    \ to use a DatasetPipeline instead:\n\n```\npython\nds = (ray.data.read_parquet(\"\
    s3://my_bucket/input_data\")\n      .window(blocks_per_window=5)\n      .map(cpu_intensive_preprocessing)\n\
    \      .map_batches(gpu_intensive_inference, compute=\"actors\", num_gpus=1)\n\
    \      .repartition(10))\nds.write_parquet(\"s3://my_bucket/output_predictions\"\
    )\n```"

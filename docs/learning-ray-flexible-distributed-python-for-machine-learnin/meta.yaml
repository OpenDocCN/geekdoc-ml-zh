  mdcn: "# 学习 Ray\n\n面向机器学习的灵活分布式 Python\n\nMax Pumperla,\nEdward Oakes\n& Richard\
    \ Liaw\nIon Stoica 作序\n\n# 学习 Ray\n\n开始使用 Ray，这是一个开源分布式计算框架，它简化了扩展计算密集型 Python\
    \ 工作负载的过程。通过这本实用的书籍，Python 程序员、数据工程师和数据科学家将学习如何在本地利用 Ray 并启动计算集群。你将能够使用 Ray 来大规模构建和运行机器学习程序。\n\
    \n作者 Max Pumperla、Edward Oakes 和 Richard Liaw 将向你展示如何使用 Ray 构建机器学习应用。你将理解 Ray\
    \ 如何融入当前的机器学习工具格局，并发现 Ray 如何与这些工具日益紧密地集成。分布式计算是困难的，但通过使用 Ray，你会发现入门很容易。\n\n- 学习如何使用\
    \ Ray Core 构建你的第一个分布式应用\n- 使用 Ray Tune 进行超参数优化\n- 使用 Ray RLlib 库进行强化学习\n- 使用 Ray\
    \ Train 库管理分布式训练\n- 使用 Ray Datasets 进行数据处理\n- 学习如何使用 Ray Clusters 并通过 Ray Serve\
    \ 提供模型服务\n- 使用 Ray AIR 构建端到端的机器学习应用\n\nMax Pumperla 是一位数据科学教授，也是 Anyscale 的软件工程师。\n\
    Edward Oakes 是 Anyscale 的软件工程师和团队负责人。\nRichard Liaw 是 Anyscale 的软件工程师。\n\n> \"\
    从三位核心贡献者的视角，对 Ray 分布式计算框架的精彩介绍。作者们优雅地将分布式计算和机器学习这两个令人生畏的主题分解成一系列易于理解的示例。\"\n—Patrick\
    \ Ames\n亚马逊首席工程师\n\n> \"关于分布式系统应用于机器学习的权威著作。这是一本易于理解的入门书，教你如何在舒适的 Jupyter notebook\
    \ 环境中构建大规模分布式数据应用。\"\n—Mark Saroufim\nMeta PyTorch 首席应用 AI 工程师\n\n# 学习 Ray\n\n\

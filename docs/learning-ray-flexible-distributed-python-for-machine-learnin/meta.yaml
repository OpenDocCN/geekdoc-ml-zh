  - '[PAGE 180]


    such as GPUs or TPUs, which have special-purpose instructions optimized for ML
    computations and enable vectorized computations across multiple inputs in parallel.


    Many online inference applications must be run 24/7. When combined with the fact
    that ML models are compute intensive, operating online inference services can
    be very expensive, requiring allocation of many CPUs and GPUs at all times. The
    primary challenges of online inference boil down to serving models in a way that
    minimizes end-to-end latency while also reducing cost. Key properties that online
    inference systems provide to satisfy these requirements include:


    +   - Support for specialized hardware such as GPUs and TPUs.

    - The ability to scale the resources used for a model up and down in response
    to request load.

    - Support for request batching to take advantage of vectorized computations.


    # ML Models Aren’t Useful in Isolation


    Often when ML is discussed in the academic or research setting, the focus is on
    an individual, isolated task such as object recognition or classification. However,
    real-world applications are not usually so clear cut and well defined. Instead,
    a combination of multiple ML models and business logic is required to solve a
    problem from end to end. For example, consider a product recommendation use case.
    While we could apply a multitude of known ML techniques to the core problem of
    making a recommendation, a lot of equally important challenges exist around the
    edges, many of which will be specific to each use case:


    +   - Validating inputs and outputs to ensure the result returned to the user
    makes sense semantically. Often, we may have some manual rules such as avoiding
    returning the same recommendation to a user multiple times in succession.

    - Fetching up-to-date information about the user and available products and converting
    it into features for the model (in some cases, this may be performed by an online
    feature store).

    - Combining the results of multiple models using manual rules such as filtering
    the top results or selecting the model with highest confidence.


    Implementing an online inference API requires the ability to integrate all of
    these pieces into one unified service. Therefore, it’s important to have the flexibility
    to compose multiple models along with custom business logic. These pieces can’t
    be viewed in isolation: the “glue” logic often needs to evolve alongside the models
    themselves.'

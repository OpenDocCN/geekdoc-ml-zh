    ,\n    num_boost_round=20,\n    params={\n        \"objective\": \"binary:logistic\"\
    ,\n        \"eval_metric\": [\"logloss\", \"error\"],\n    },\n    datasets={\"\
    train\": train_dataset, \"valid\": valid_dataset},\n    preprocessor=preprocessor,\n\
    )\nresult = trainer.fit()\nprint(result.metrics)\n```\n\n❶ Every Trainer comes\
    \ with a scaling configuration. Here we're using two Ray workers and no GPU.\n\
    \n❷ XGBoostTrainers need specific configuration, as well as a training objective\
    \ and evaluation metrics to track.\n\n❸ The Trainer specifies the datasets it's\
    \ supposed to operate on.²\n\n❹ In the same way, you can provide AIR Preprocessors\
    \ that the Trainer should use.\n\n❺ After everything is defined, a simple `fit`\
    \ call is enough to start the training procedure.\n\nTrainers provide scalable\
    \ ML training that operates on AIR Datasets and preprocessors. On top of that,\
    \ they're also built to integrate well with Ray Tune for HPO, as we'll see next.\n\
    \nTo summarize this section, Figure 10-2 shows how AIR Trainers fit ML models\
    \ on Ray Datasets given AIR Preprocessors and a scaling configuration.\n\n² Technically\
    \ speaking, not every trainer needs to specify a `datasets` argument. You can\
    \ also use framework-specific data loaders, though we can't show you any examples\
    \ here."
- md: "## Tuners and Checkpoints\n\n*Tuners*, introduced with Ray 2.0 as part of AIR,\
    \ offer scalable hyperparameter tuning through Ray Tune. Tuners work seamlessly\
    \ with AIR Trainers, but also support arbitrary training functions. In our example,\
    \ instead of calling `fit()` on your trainer instance from the previous section,\
    \ you can pass your trainer into a Tuner. To do so, a Tuner needs to be instantiated\
    \ with a parameter space to search over, a so-called TuneConfig. This config has\
    \ all Tune-specific configurations like the metric you want to optimize and an\
    \ optional RunConfig that lets you configure runtime-specific aspects such as\
    \ the log verbosity of your Tune run.\n\nContinuing with the XGBoostTrainer we\
    \ defined earlier, here's how you wrap that trainer instance in a Tuner to calibrate\
    \ the `max_depth` parameter of your XGBoost model:\n\n```python\nfrom ray import\
    \ tune\n\nparam_space = {\"params\": {\"max_depth\": tune.randint(1, 9)}}\nmetric\
    \ = \"train-logloss\"\n\nfrom ray.tune.tuner import Tuner, TuneConfig\nfrom ray.air.config\
    \ import RunConfig\n\ntuner = Tuner(\n    trainer,\n    param_space=param_space,\n\
    \    run_config=RunConfig(verbose=1),\n    tune_config=TuneConfig(num_samples=2,\
    \ metric=metric, mode=\"min\"),\n)\nresult_grid = tuner.fit()\n\nbest_result =\
    \ result_grid.get_best_result()\nprint(\"Best Result:\", best_result)\n```\n\n\
    1. Initialize your Tuner with a Trainer instance, which in turn specifies the\
    \ scaling configuration of the run.\n2. Your Tuner also takes a `param_space`\
    \ to search over.\n3. It also needs a dedicated `TuneConfig` to tell Tune how\
    \ to optimize your Trainer, given its parameter space.\n4. Tuner runs are started\
    \ the same way as Trainers, namely, by calling `.fit()`.\n\nWhenever you run AIR\
    \ Trainers or Tuners, they generate framework-specific checkpoints. You can use\
    \ these checkpoints to load models for usage across several AIR libraries, such\
    \ as Tune, Train, or Serve. You can get a checkpoint by accessing the result of\
    \ a `.fit()` call on either a Trainer or a Tuner. In our example, that means you\
    \ can simply access a checkpoint on the `best_result` object, or any other entry\
    \ from the `result_grid` like this:\n\n```python\ncheckpoint = best_result.checkpoint\n\
    print(checkpoint)\n```\n\nThe other main way to work with checkpoints is by creating\
    \ one from an existing, framework-specific model. Every ML framework supported\
    \ by AIR can be used to do this, but since it's easiest to define a simple model\
    \ with it, we're going to show you how this looks for a sequential TensorFlow\
    \ Keras model:\n\n```python\nfrom ray.train.tensorflow import TensorflowCheckpoint\n\
    import tensorflow as tf\n\nmodel = tf.keras.Sequential([\n    tf.keras.layers.InputLayer(input_shape=(1,)),\n\
    \    tf.keras.layers.Dense(1)\n])\n\nkeras_checkpoint = TensorflowCheckpoint.from_model(model)\n\
    ```\n\nHaving checkpoints is great because they're AIR's native model exchange\
    \ format. You can also use them to pick up trained models at a later stage, without\
    \ having to worry about custom ways to store and load the models in question.\
    \ Figure 10-3 schematically shows how AIR Tuners work with AIR Trainers.\n\n##\
    \ Batch Predictors\n\nOnce you have trained a model through AIR, that is, by fitting\
    \ either a Trainer or a Tuner, you can use the resulting AIR Checkpoint for prediction\
    \ on batches of data in Python. To do that you create a BatchPredictor from your\
    \ Checkpoint and then use its predict method on your Dataset. In our case we need\
    \ to use the framework-specific class of the predictor, namely, XGBoostPredictor,\
    \ to tell AIR how to load the checkpoint correctly:\n\n```python\nfrom ray.train.batch_predictor\
    \ import BatchPredictor\nfrom ray.train.xgboost import XGBoostPredictor\n\ncheckpoint\
    \ = best_result.checkpoint\nbatch_predictor = BatchPredictor.from_checkpoint(checkpoint,\
    \ XGBoostPredictor) ❶\n\npredicted_probabilities = batch_predictor.predict(test_dataset)\
    \ ❷\npredicted_probabilities.show()\n```\n\n❶ Load an XGBoost model from a checkpoint\
    \ into a BatchPredictor object.\n❷ Run batch inference on our test dataset to\
    \ get predicted probabilities.\n\nThis can be visualized in Figure 10-4.\n\n##\
    \ Deployments\n\nInstead of using a BatchPredictor and interacting with the model\
    \ in question directly, you can leverage Ray Serve to deploy an inference service\
    \ that you can query over HTTP. You do that by using the PredictorDeployment class\
    \ and deploy it using our checkpoint. The only slightly tricky part about this\
    \ is that our model operates on dataframes, which we can't directly send over\
    \ HTTP. That means we need to explicitly tell our prediction service how to pick\
    \ up and transform the *payload* we define and create a dataframe from it. We\
    \ do this by specifying an *adapter* for our deployment:³\n\n```python\nfrom ray\
    \ import serve\nfrom fastapi import Request\nimport pandas as pd\nfrom ray.serve\
    \ import PredictorDeployment\n\nasync def adapter(request: Request):\n    payload\
    \ = await request.json()\n    return pd.DataFrame.from_dict(payload)\n\nserve.start(detached=True)\n\
    deployment = PredictorDeployment.options(name=\"XGBoostService\")\n\ndeployment.deploy(\n\
    \    XGBoostPredictor,\n    checkpoint,\n    http_adapter=adapter\n)\n\nprint(deployment.url)\n\
    ```\n\n1. An adapter takes an HTTP request object and returns data in a format\
    \ accepted by our model.\n2. After starting Serve we can create a deployment for\
    \ our model.\n3. To actually deploy the deployment object we need to pass in the\
    \ model check point, the adapter function, and the XGBoostPredictor class for\
    \ correct model loading.\n\n> ³ If you run the following example from a Jupyter\
    \ notebook, you do not have to worry about it blocking the notebook—it will run\
    \ just fine. Starting a server like this is often implemented as a blocking call,\
    \ but PredictorDeployment isn't.\n\nTo test this deployment, let's create some\
    \ sample input from our test data that we can throw at our service. For simplicity,\
    \ we take the first item of our test dataset and convert it to a Python dictionary\
    \ so that the ubiquitous Requests library can post a request to our deployment\
    \ URL with it:\n\n```python\nimport requests\n\nfirst_item = test_dataset.take(1)\n\
    sample_input = dict(first_item[0])\n\nresult = requests.post(\n    deployment.url,\n\
    \    json=[sample_input]\n)\nprint(result.json())\n\nserve.shutdown()\n```\n\n\
    1. Posts our sample_input to deployment.url with requests.\n2. After you're finished\
    \ using the service, you can safely shut down Ray Serve.\n\nFigure 10-5 summarizes\
    \ how AIR deployments with the PredictorDeployment class work.\n\nFigure 10-6\
    \ gives you a quick visual overview of all the components and concepts involved\
    \ in Ray AIR, including pseudocode for all the main AIR components we've covered\
    \ in this chapter.\n\nIt’s important to stress again that we’ve been using *a\
    \ single Python script* for this example and a single distributed system in Ray\
    \ AIR to do all the heavy lifting. In fact, you can use this example script and\
    \ scale it out to a large cluster that uses CPUs for preprocessing and GPUs for\
    \ training and separately configure the deployment simply by modifying the parameters\
    \ of the scaling configuration and similar options in that script. This isn’t\
    \ as easy or common as it may seem, and it is not unusual for data scientists\
    \ to have to use multiple frameworks (e.g., one for data loading and processing,\
    \ one for training, and one for serving).\n\nYou can also use Ray AIR with RLlib,\
    \ but the integration is still in its early stages. For instance, to integrate\
    \ RLlib with AIR Trainers, you'd use the `RLTrainer` that allows you to pass in\
    \ all arguments that you'd pass to a standard RLlib algorithm. After training,\
    \ you can store the resulting RL model in an AIR Checkpoint, just as with any\
    \ other AIR Trainer. To deploy your trained RL model, you can use Serve's `PredictorDeployment`\
    \ class by passing your checkpoint along with the `RLPredictor` class.\n\nThis\
    \ API might be subject to change, but you can see an example of how this works\
    \ in the [AIR documentation](https://docs.ray.io/en/latest/ray-air/index.html).\n\
    \n## Workloads That Are Suited for AIR\n\nNow that we've seen examples of AIR\
    \ and its fundamental concepts, let's zoom out a little and discuss in principle\
    \ which kinds of workloads you can run with it. We've tackled all of these workloads\
    \ already throughout the book, but it's good to recap them systematically. As\
    \ the name suggests, AIR is built to capture common tasks in AI projects. These\
    \ tasks can be roughly classified in the following way:\n\n*Stateless computation*\n\
    \nTasks like preprocessing data or computing model predictions on a batch of data\
    \ are stateless. Stateless workloads can be computed independently in parallel.\
    \ If you recall our treatment of Ray tasks from [Chapter 2](https://docs.ray.io/en/latest/ray-core/tasks.html),\
    \ stateless computation is exactly what they were built for. AIR primarily uses\
    \ Ray tasks for stateless workloads. Many *big data processing* tools fall into\
    \ this category.\n\n*Stateful computation*\n\nIn contrast, model training and\
    \ hyperparameter tuning are stateful operations, as they update the model state\
    \ during their respective training procedure. Updating stateful workers in such\
    \ *distributed training* is a difficult topic that Ray handles for you. AIR uses\
    \ Ray actors for stateful computations.\n\n*Composite workloads*\n\nCombining\
    \ stateless and stateful computation, for instance by first processing features\
    \ and then training a model, is quite common in AI workloads. In fact, it's rare\
    \ for end-to-end projects to exclusively use one or the other. Running such advanced\
    \ composite workloads in a distributed fashion can be described as *big data processing*.\n\
    \n⁴ Of course, the model used for inference has to be loaded first, but since\
    \ its parameters don't change during prediction, trained models can be considered\
    \ static data in this case. We sometimes refer to this situation as *soft state*.\n\
    \n⁵ Sometimes AIR uses Ray actors for stateless tasks for performance reasons,\
    \ such as caching models in batch inference."
  mdcn: "## 调优器与检查点\n\n*调优器*是随 Ray 2.0 作为 AIR 的一部分引入的，它通过 Ray Tune 提供可扩展的超参数调优功能。调优器可与\
    \ AIR 训练器无缝协作，同时也支持任意训练函数。在我们的示例中，你无需像上一节那样在训练器实例上调用 `fit()`，而是可以将训练器传递给调优器。为此，需要使用一个参数空间（即所谓的\
    \ TuneConfig）来实例化调优器。此配置包含所有 Tune 特定的配置，例如你想优化的指标，以及一个可选的 RunConfig，用于配置运行时特定的方面，如\
    \ Tune 运行的日志详细程度。\n\n继续使用我们之前定义的 XGBoostTrainer，以下是如何将该训练器实例包装在调优器中，以校准 XGBoost\
    \ 模型的 `max_depth` 参数：\n\n```python\nfrom ray import tune\n\nparam_space = {\"\
    params\": {\"max_depth\": tune.randint(1, 9)}}\nmetric = \"train-logloss\"\n\n\
    from ray.tune.tuner import Tuner, TuneConfig\nfrom ray.air.config import RunConfig\n\
    \ntuner = Tuner(\n    trainer,\n    param_space=param_space,\n    run_config=RunConfig(verbose=1),\n\
    \    tune_config=TuneConfig(num_samples=2, metric=metric, mode=\"min\"),\n)\n\
    result_grid = tuner.fit()\n\nbest_result = result_grid.get_best_result()\nprint(\"\
    Best Result:\", best_result)\n```\n\n1. 使用训练器实例初始化你的调优器，该训练器指定了运行的扩展配置。\n2. 你的调优器还需要一个\
    \ `param_space` 进行搜索。\n3. 它还需要一个专用的 `TuneConfig` 来告诉 Tune 如何根据其参数空间优化你的训练器。\n\
    4. 调优器的运行方式与训练器相同，即调用 `.fit()`。\n\n每当你运行 AIR 训练器或调优器时，它们都会生成特定于框架的检查点。你可以使用这些检查点来加载模型，以便在多个\
    \ AIR 库（如 Tune、Train 或 Serve）中使用。你可以通过访问训练器或调优器的 `.fit()` 调用结果来获取检查点。在我们的示例中，这意味着你可以简单地访问\
    \ `best_result` 对象上的检查点，或 `result_grid` 中的任何其他条目，如下所示：\n\n```python\ncheckpoint\
    \ = best_result.checkpoint\nprint(checkpoint)\n```\n\n使用检查点的另一种主要方式是从现有的、特定于框架的模型创建一个。AIR\
    \ 支持的每个 ML 框架都可以用来完成此操作，但由于使用它定义一个简单模型最为容易，我们将向你展示如何为顺序 TensorFlow Keras 模型实现这一点：\n\
    \n```python\nfrom ray.train.tensorflow import TensorflowCheckpoint\nimport tensorflow\
    \ as tf\n\nmodel = tf.keras.Sequential([\n    tf.keras.layers.InputLayer(input_shape=(1,)),\n\
    \    tf.keras.layers.Dense(1)\n])\n\nkeras_checkpoint = TensorflowCheckpoint.from_model(model)\n\
    ```\n\n拥有检查点非常棒，因为它们是 AIR 的原生模型交换格式。你也可以使用它们在后续阶段获取训练好的模型，而无需担心存储和加载相关模型的自定义方式。图\
    \ 10-3 示意性地展示了 AIR 调优器如何与 AIR 训练器协同工作。\n\n## 批量预测器\n\n一旦你通过 AIR 训练了一个模型（即通过拟合训练器或调优器），你就可以使用生成的\
    \ AIR 检查点在 Python 中对批量数据进行预测。为此，你需要从检查点创建一个 BatchPredictor，然后在其 Dataset 上使用其 predict\
    \ 方法。在我们的案例中，我们需要使用预测器的特定于框架的类，即 XGBoostPredictor，来告诉 AIR 如何正确加载检查点：\n\n```python\n\
    from ray.train.batch_predictor import BatchPredictor\nfrom ray.train.xgboost import\
    \ XGBoostPredictor\n\ncheckpoint = best_result.checkpoint\nbatch_predictor = BatchPredictor.from_checkpoint(checkpoint,\
    \ XGBoostPredictor) ❶\n\npredicted_probabilities = batch_predictor.predict(test_dataset)\
    \ ❷\npredicted_probabilities.show()\n```\n\n❶ 将 XGBoost 模型从检查点加载到 BatchPredictor\
    \ 对象中。\n❷ 在我们的测试数据集上运行批量推理以获取预测概率。\n\n这可以在图 10-4 中可视化。\n\n## 部署\n\n你可以利用 Ray Serve\
    \ 部署一个推理服务，通过 HTTP 进行查询，而不是使用 BatchPredictor 并直接与相关模型交互。你可以通过使用 PredictorDeployment\
    \ 类并使用我们的检查点来部署它。唯一稍微棘手的部分是，我们的模型操作的是数据框，我们无法直接通过 HTTP 发送。这意味着我们需要明确告诉我们的预测服务如何获取并转换我们定义的\
    \ *payload* 并从中创建一个数据框。我们通过为部署指定一个 *adapter* 来实现这一点：³\n\n```python\nfrom ray import\
    \ serve\nfrom fastapi import Request\nimport pandas as pd\nfrom ray.serve import\
    \ PredictorDeployment\n\nasync def adapter(request: Request):\n    payload = await\
    \ request.json()\n    return pd.DataFrame.from_dict(payload)\n\nserve.start(detached=True)\n\
    deployment = PredictorDeployment.options(name=\"XGBoostService\")\n\ndeployment.deploy(\n\
    \    XGBoostPredictor,\n    checkpoint,\n    http_adapter=adapter\n)\n\nprint(deployment.url)\n\
    ```\n\n1. 适配器接收一个 HTTP 请求对象，并返回我们的模型接受的数据格式。\n2. 启动 Serve 后，我们可以为我们的模型创建一个部署。\n\
    3. 要实际部署部署对象，我们需要传入模型检查点、适配器函数以及用于正确模型加载的 XGBoostPredictor 类。\n\n> ³ 如果你从 Jupyter\
    \ notebook 运行以下示例，你不必担心它会阻塞 notebook——它会运行得很好。像这样启动服务器通常实现为阻塞调用，但 PredictorDeployment\
    \ 不是。\n\n要测试此部署，让我们从测试数据中创建一些示例输入，可以将其发送到我们的服务。为简单起见，我们获取测试数据集的第一项并将其转换为 Python\
    \ 字典，以便通用的 Requests 库可以向我们的部署 URL 发送请求：\n\n```python\nimport requests\n\nfirst_item\
    \ = test_dataset.take(1)\nsample_input = dict(first_item[0])\n\nresult = requests.post(\n\
    \    deployment.url,\n    json=[sample_input]\n)\nprint(result.json())\n\nserve.shutdown()\n\
    ```\n\n1. 使用 requests 将我们的 sample_input 发送到 deployment.url。\n2. 使用完服务后，你可以安全地关闭\
    \ Ray Serve。\n\n图 10-5 总结了使用 PredictorDeployment 类的 AIR 部署如何工作。\n\n图 10-6 为你提供了\
    \ Ray AIR 中涉及的所有组件和概念的快速视觉概览，包括本章涵盖的所有主要 AIR 组件的伪代码。\n\n需要再次强调的是，我们在这个示例中使用了 *单个\
    \ Python 脚本* 和 Ray AIR 中的单个分布式系统来完成所有繁重的工作。事实上，你可以使用此示例脚本并将其扩展到使用 CPU 进行预处理、GPU\
    \ 进行训练的大型集群，并通过修改该脚本中的扩展配置参数和类似选项来单独配置部署。这并不像看起来那么容易或常见，数据科学家通常不得不使用多个框架（例如，一个用于数据加载和处理，一个用于训练，一个用于服务）的情况并不少见。\n\
    \n你也可以将 Ray AIR 与 RLlib 一起使用，但集成仍处于早期阶段。例如，要将 RLlib 与 AIR 训练器集成，你需要使用 `RLTrainer`，它允许你传入所有你将传递给标准\
    \ RLlib 算法的参数。训练完成后，你可以将生成的 RL 模型存储在 AIR 检查点中，就像使用任何其他 AIR 训练器一样。要部署你训练好的 RL 模型，你可以使用\
    \ Serve 的 `PredictorDeployment` 类，传入你的检查点以及 `RLPredictor` 类。\n\n此 API 可能会发生变化，但你可以在\
    \ [AIR 文档](https://docs.ray.io/en/latest/ray-air/index.html) 中看到一个关于其工作原理的示例。\n\
    \n## 适合 AIR 的工作负载\n\n既然我们已经看到了 AIR 及其基本概念的示例，让我们稍微退一步，从原则上讨论你可以用它运行哪些类型的工作负载。我们已经在本书中处理了所有这些工作负载，但系统地回顾一下它们是很好的。顾名思义，AIR\
    \ 旨在捕获 AI 项目中的常见任务。这些任务可以大致分类如下：\n\n*无状态计算*\n\n像预处理数据或在一批数据上计算模型预测这样的任务是无状态的。无状态工作负载可以独立并行计算。如果你回想一下我们在\
    \ [第 2 章](https://docs.ray.io/en/latest/ray-core/tasks.html) 中对 Ray 任务的讨论，无状态计算正是它们的设计目的。AIR\
    \ 主要使用 Ray 任务处理无状态工作负载。许多 *大数据处理* 工具属于此类。\n\n*有状态计算*\n\n相比之下，模型训练和超参数调优是有状态操作，因为它们在各自的训练过程中会更新模型状态。在这种\
    \ *分布式训练* 中更新有状态工作者是一个困难的问题，Ray 会为你处理。AIR 使用 Ray actors 进行有状态计算。\n\n*复合工作负载*\n\
    \n结合无状态和有状态计算，例如先处理特征然后训练模型，在 AI 工作负载中相当常见。事实上，端到端项目很少只使用其中一种。以分布式方式运行这种高级复合工作负载可以描述为\
    \ *大数据处理*。\n\n⁴ 当然，用于推理的模型必须首先加载，但由于其参数在预测期间不会改变，训练好的模型在这种情况下可以被视为静态数据。我们有时将这种情况称为\
    \ *软状态*。\n\n⁵ 有时 AIR 出于性能原因使用 Ray actors 处理无状态任务，例如在批量推理中缓存模型。"

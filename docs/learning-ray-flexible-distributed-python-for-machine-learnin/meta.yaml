    \n让我们修改 `SentimentClassifier` 示例，将其扩展到多个副本，并调整资源分配，使每个副本使用两个 CPU 而不是一个（在实践中，你需要分析和理解你的模型以正确设置此参数）。我们还将添加一个打印语句来记录处理每个请求的进程\
    \ ID，以显示请求现在已跨两个副本进行负载均衡：\n\n```python\napp = FastAPI()\n\n@serve.deployment(num_replicas=2,\
    \ ray_actor_options={\"num_cpus\": 2})\n@serve.ingress(app)\nclass SentimentAnalysis:\n\
    \    def __init__(self):\n        self._classifier = pipeline(\"sentiment-analysis\"\
    )\n\n    @app.get(\"/\")\n    def classify(self, input_text: str) -> str:\n  \

  md: '# CHAPTER 7

    Distributed Training with Ray Train


    Edward Oakes & Richard Liaw


    In Chapter 6 we discussed how to train copies of a simple model on shards of data
    using Ray Datasets—but there’s much more to distributed training than that. As
    we indicated in Chapter 1, Ray has a dedicated library for distributed training
    called Ray Train. It comes with an extensive suite of machine learning training
    integrations and allows you to scale your experiments seamlessly on Ray Clusters.


    We will start this chapter by showing you why you might need to scale your ML
    training and then introduce you to the different ways of doing so. After that,
    we’ll introduce Ray Train and walk through an extensive end-to-end example. We’ll
    also cover some key concepts you need to know to use Ray Train, such as preprocessors,
    trainers, and checkpoints. Finally, we’ll cover some of the more advanced functionality
    that Ray Train provides. As always, you can use the notebook for this chapter
    to follow along.


    # The Basics of Distributed Model Training


    Machine learning often requires a lot of heavy computation. Depending on the type
    of model that you’re training, whether it be a gradient boosted tree or a neural
    network, you may face some common problems with training ML models:


    +   - The time it takes to finish training is too long.

    - The data is too large to fit into one machine.

    - The model itself is too large to fit into a single machine.'
  merge: -1
  pgno: 160
- img_proc: true
  md: 'For the first case, training can be accelerated by processing data with increased
    throughput. Some ML algorithms, such as neural networks, can parallelize parts
    of the computation to speed up training.¹


    In the second case, your choice of algorithm may require you to fit all the available
    data from a dataset into memory, but the given single-node memory may not be sufficient.
    If that''s the case, you would need to split the data across multiple nodes and
    train in a distributed manner. On the other hand, sometimes your algorithm may
    not require data to be distributed, but if you''re using a distributed database
    system to begin with, you still want a training framework that can leverage your
    distributed data.


    When your model doesn''t fit into a single machine, you may need to split it up
    into multiple parts spread across multiple machines. The approach of splitting
    models across multiple machines is called *model parallelism*. To run into this
    issue, you first need a model that is large enough to not fit into a single machine.
    Usually, large companies like Google or Meta need model parallelism, and they
    also rely on in-house solutions to handle the distributed training.


    The first two problems often arise much earlier in ML development than the third.
    The solutions we just sketched for these problems fall under the umbrella of data-parallel
    training. Instead of splitting up the model across multiple machines, you rely
    on distributed data to speed up training.


    Specifically for the first problem, if you can speed up your training process,
    hopefully with minimal or no loss in accuracy, and you can do so cost-efficiently,
    why not go for it? And if you have distributed data, whether by necessity for
    your algorithm or the way you store your data, you need a training solution to
    deal with it. As you will see, Ray Train is built for efficient, data-parallel
    training. Figure 7-1 summarizes the two basic types of distributed training.


    ![](img/6489687a3a178f2884963bddc928992c_161_0.png)


    Figure 7-1. Data parallelism versus model parallelism in distributed training


    ¹ This applies specifically to the gradient computation in neural networks.'

    \ because our computation graph is defined as ordinary Python logic rather than\
    \ as a statically defined graph. For instance, in the next example, we use a simple\
    \ random number generator"
  - "[PAGE 191]\n\n(RNG) to decide which of two downstream models to call into. In\
    \ a real-world example, the RNG could be replaced with business logic, a database\
    \ query, or the result of an intermediate model:\n\n```\n@serve.deployment\nclass\
    \ DownstreamModel:\n    def __init__(self, my_val: str):\n        self._my_val\
    \ = my_val\n\n    def __call__(self):\n        return self._my_val\n\n\n@serve.deployment\n\
    class ConditionalDriver:\n    def __init__(self, model1, model2):\n        self._m1\
    \ = model1\n        self._m2 = model2\n\n    async def __call__(self, *args) ->\
    \ str:\n        import random\n        if random.random() > 0.5:\n           \
    \ return await self._m1.remote()\n        else:\n            return await self._m2.remote()\n\
    \n\nm1 = DownstreamModel.bind(\"val1\")\nm2 = DownstreamModel.bind(\"val2\")\n\
    conditional_driver = ConditionalDriver.bind(m1, m2)\n```\n\nEach call to this\
    \ endpoint returns either \"val1\" or \"val2\" with 50/50 probability.\n\n# End-to-End\
    \ Example: Building an NLP-Powered API\n\nIn this section, we'll use Ray Serve\
    \ to build an end-to-end natural language processing (NLP) pipeline hosted for\
    \ online inference. Our goal will be to provide a Wikipedia summarization endpoint\
    \ that will leverage multiple NLP models and some custom logic to provide a succinct\
    \ summary of the most relevant Wikipedia page for a given search term.\n\nThis\
    \ task will bring together many of the concepts and features we've discussed:\n\
    \n+   - We'll be combining custom business logic along with multiple ML models.\n\
    - The inference graph will consist of all three multimodel patterns: pipelining,\
    \ broadcasting, and conditional logic.\n- Each model will be hosted as a separate\
    \ Serve deployment so they can be independently scaled and given their own resource\
    \ allocation."
- md: "## Fetching Content and Preprocessing\n\nThe first step is to fetch the most\
    \ relevant page from Wikipedia given a user-provided search term. For this, we\
    \ will leverage the Wikipedia package on PyPI to do the heavy lifting. We'll first\
    \ search for the term and then select the top result and return its page content.\
    \ If no results are found, we'll return None—this edge case will be handled later\
    \ when we define the API:\n\n```python\nfrom typing import Optional\n\nimport\
    \ wikipedia\n\ndef fetch_wikipedia_page(search_term: str) -> Optional[str]:\n\
    \    results = wikipedia.search(search_term)\n    # If no results, return to caller.\n\
    \    if len(results) == 0:\n        return None\n\n    # Get the page for the\
    \ top result.\n    return wikipedia.page(results[0]).content\n```\n\n## NLP Models\n\
    \nNext, we need to define the ML models that will do the heavy lifting of our\
    \ API. We'll be using the Hugging Face Transformers library as it provides convenient\
    \ APIs to pretrained state-of-the-art ML models so we can focus on the serving\
    \ logic.\n\nThe first model we'll use is a sentiment classifier, the same one\
    \ we used in the preceding examples. The deployment for this model will take advantage\
    \ of vectorized computations using Serve's batching API:\n\n```python\nfrom ray\
    \ import serve\nfrom transformers import pipeline\nfrom typing import List\n\n\
    @serve.deployment\nclass SentimentAnalysis:\n    def __init__(self):\n       \
    \ self._classifier = pipeline(\"sentiment-analysis\")\n\n    @serve.batch(max_batch_size=10,\
    \ batch_wait_timeout_s=0.1)\n    async def is_positive_batched(self, inputs: List[str])\
    \ -> List[bool]:\n        results = self._classifier(inputs, truncation=True)\n\
    \        return [result[\"label\"] == \"POSITIVE\" for result in results]\n\n\
    \    async def __call__(self, input_text: str) -> bool:\n        return await\
    \ self.is_positive_batched(input_text)\n```\n\nWe'll also use a text summarization\
    \ model to provide a succinct summary for the selected article. This model takes\
    \ an optional `max_length` argument to cap the length of the summary. Because\
    \ we know this is the most computationally expensive of the models, we set `num_replicas=2`;\
    \ that way, if we have many requests coming in at the same time, it can keep up\
    \ with the throughput of the other models. In practice, we may need more replicas\
    \ to keep up with the input load, but we could know that only from profiling and\
    \ monitoring:\n\n```python\n@serve.deployment(num_replicas=2)\nclass Summarizer:\n\
    \    def __init__(self, max_length: Optional[int] = None):\n        self._summarizer\
    \ = pipeline(\"summarization\")\n        self._max_length = max_length\n\n   \
    \ def __call__(self, input_text: str) -> str:\n        result = self._summarizer(\n\
    \            input_text, max_length=self._max_length, truncation=True)\n     \
    \   return result[0][\"summary_text\"]\n```\n\nThe final model in our pipeline\
    \ will be a named entity recognition model: this will attempt to extract named\
    \ entities from the text. Each result will have a confidence score, so we can\
    \ set a threshold to accept only results above a certain threshold. We may also\
    \ want to cap the total number of entities returned. The request handler for this\
    \ deployment calls the model and then uses some basic business logic to enforce\
    \ the provided confidence threshold and limit the number of entities:\n\n```python\n\
    @serve.deployment\nclass EntityRecognition:\n    def __init__(self, threshold:\
    \ float = 0.90, max_entities: int = 10):\n        self._entity_recognition = pipeline(\"\
    ner\")\n        self._threshold = threshold\n        self._max_entities = max_entities\n\
    \n    def __call__(self, input_text: str) -> List[str]:\n        final_results\
    \ = []\n        for result in self._entity_recognition(input_text):\n        \
    \    if result[\"score\"] > self._threshold:\n                final_results.append(result[\"\
    word\"])\n            if len(final_results) == self._max_entities:\n         \
    \       break\n\n        return final_results\n```\n\n## HTTP Handling and Driver\
    \ Logic\n\nWith the input preprocessing and ML models defined, we're ready to\
    \ define the HTTP API and driver logic. First, we define the schema of the response\
    \ that we'll return from the API using Pydantic. The response includes whether\
    \ the request was successful and a status message in addition to our summary and\
    \ named entities. This will allow us to return a helpful response in error conditions\
    \ such as when no result is found or the sentiment analysis comes back as negative:\n\
    \n```python\nfrom pydantic import BaseModel\n\nclass Response(BaseModel):\n  \
    \  success: bool\n    message: str = \"\"\n    summary: str = \"\"\n    named_entities:\
    \ List[str] = []\n```\n\nNext, we need to define the actual control flow logic\
    \ that will run in the driver deployment. The driver itself will not do any of\
    \ the actual heavy lifting; instead, it will call into our three downstream model\
    \ deployments and interpret their results. It will also house the FastAPI app\
    \ definition, parsing the input and returning the correct Response model based\
    \ on the results of the pipeline:\n\n```python\nfrom fastapi import FastAPI\n\n\
    app = FastAPI()\n\n\n@serve.deployment\n@serve.ingress(app)\nclass NLPPipelineDriver:\n\
    \    def __init__(self, sentiment_analysis, summarizer, entity_recognition):\n\
    \        self._sentiment_analysis = sentiment_analysis\n        self._summarizer\
    \ = summarizer\n        self._entity_recognition = entity_recognition\n\n    @app.get(\"\
    /\", response_model=Response)\n    async def summarize_article(self, search_term:\
    \ str) -> Response:\n        # Fetch the top page content for the search term\
    \ if found.\n        page_content = fetch_wikipedia_page(search_term)\n      \
    \  if page_content is None:\n            return Response(success=False, message=\"\
    No pages found.\")\n\n        # Conditionally continue based on the sentiment\
    \ analysis.\n        is_positive = await self._sentiment_analysis.remote(page_content)\n\
    \        if not is_positive:\n            return Response(success=False, message=\"\
    Only positivity allowed!\")\n\n        # Query the summarizer and named entity\
    \ recognition models in parallel.\n        summary_result = self._summarizer.remote(page_content)\n\
    \        entities_result = self._entity_recognition.remote(page_content)\n   \
    \     return Response(\n            success=True,\n            summary=await summary_result,\n\
    \            named_entities=await entities_result\n        )\n```\n\nOur online\
    \ inference pipeline will be structured as shown in Figure 8-2:\n\n1. The user\
    \ will provide a keyword search term.\n2. We'll fetch the content for the most\
    \ relevant Wikipedia article for the search term.\n3. A sentiment analysis model\
    \ will be applied to the article. Anything with a “negative” sentiment will be\
    \ rejected, and we'll return early.\n4. The article content will be broadcast\
    \ to summarizer and named entity recognition models.\n5. We'll return a composed\
    \ result based on the summarizer and named entity recognition outputs.\n\n![Figure\
    \ 8-2. The architecture for an NLP pipeline to summarize Wikipedia articles](img/6489687a3a178f2884963bddc928992c_192_0.png)\n\
    \nThis pipeline will be exposed over HTTP and return the results in a structured\
    \ format. By the end of this section, we'll have the pipeline running from end\
    \ to end locally and ready to scale up on a cluster. Let's get started!\n\nBefore\
    \ we dive into the code, you'll need the following Python packages installed locally:\n\
    \n```\npip install \"ray[serve]==2.2.0\" \"transformers==4.21.2\"\npip install\
    \ \"requests==2.28.1\" \"wikipedia==1.4.0\"\n```\n\nAdditionally, in this section\
    \ we'll assume that all the code samples are available locally in a file called\
    \ `app.py` so we can run the deployments using `serve run` from the same directory.³\n\
    \n> ³ We've created this `app.py` file for you in the book's GitHub repository.\
    \ After cloning the repo and installing all the dependencies, you should be able\
    \ to run `serve run app:<deployment_name>` directly from the notebook directory\
    \ for each deployment we're referencing in a `serve run` call in this chapter."
  mdcn: "## 获取内容与预处理\n\n第一步是根据用户提供的搜索词，从维基百科获取最相关的页面。为此，我们将利用 PyPI 上的 Wikipedia 包来完成繁重的工作。我们将首先搜索该术语，然后选择第一个结果并返回其页面内容。如果未找到结果，我们将返回\
    \ None——这个边界情况将在我们定义 API 时处理：\n\n```python\nfrom typing import Optional\n\nimport\
    \ wikipedia\n\ndef fetch_wikipedia_page(search_term: str) -> Optional[str]:\n\
    \    results = wikipedia.search(search_term)\n    # If no results, return to caller.\n\
    \    if len(results) == 0:\n        return None\n\n    # Get the page for the\
    \ top result.\n    return wikipedia.page(results[0]).content\n```\n\n## NLP 模型\n\
    \n接下来，我们需要定义将承担我们 API 主要工作的机器学习模型。我们将使用 Hugging Face Transformers 库，因为它提供了便捷的\
    \ API 来访问预训练的最先进机器学习模型，这样我们就可以专注于服务逻辑。\n\n我们将使用的第一个模型是情感分类器，与我们在前面示例中使用的相同。该模型的部署将利用\
    \ Serve 的批处理 API 进行向量化计算：\n\n```python\nfrom ray import serve\nfrom transformers\
    \ import pipeline\nfrom typing import List\n\n@serve.deployment\nclass SentimentAnalysis:\n\
    \    def __init__(self):\n        self._classifier = pipeline(\"sentiment-analysis\"\
    )\n\n    @serve.batch(max_batch_size=10, batch_wait_timeout_s=0.1)\n    async\
    \ def is_positive_batched(self, inputs: List[str]) -> List[bool]:\n        results\
    \ = self._classifier(inputs, truncation=True)\n        return [result[\"label\"\
    ] == \"POSITIVE\" for result in results]\n\n    async def __call__(self, input_text:\
    \ str) -> bool:\n        return await self.is_positive_batched(input_text)\n```\n\
    \n我们还将使用一个文本摘要模型，为选定的文章提供简洁的摘要。该模型接受一个可选的 `max_length` 参数来限制摘要的长度。因为我们知道这是所有模型中计算成本最高的，所以我们设置\
    \ `num_replicas=2`；这样，如果同时有大量请求进来，它就能跟上其他模型的吞吐量。在实践中，我们可能需要更多的副本来跟上输入负载，但这只能通过性能分析和监控来了解：\n\
    \n```python\n@serve.deployment(num_replicas=2)\nclass Summarizer:\n    def __init__(self,\
    \ max_length: Optional[int] = None):\n        self._summarizer = pipeline(\"summarization\"\
    )\n        self._max_length = max_length\n\n    def __call__(self, input_text:\
    \ str) -> str:\n        result = self._summarizer(\n            input_text, max_length=self._max_length,\
    \ truncation=True)\n        return result[0][\"summary_text\"]\n```\n\n我们流水线中的最后一个模型将是一个命名实体识别模型：它将尝试从文本中提取命名实体。每个结果都会有一个置信度分数，因此我们可以设置一个阈值，只接受高于某个阈值的结果。我们可能还想限制返回的实体总数。此部署的请求处理程序调用模型，然后使用一些基本的业务逻辑来强制执行提供的置信度阈值并限制实体数量：\n\
    \n```python\n@serve.deployment\nclass EntityRecognition:\n    def __init__(self,\
    \ threshold: float = 0.90, max_entities: int = 10):\n        self._entity_recognition\
    \ = pipeline(\"ner\")\n        self._threshold = threshold\n        self._max_entities\
    \ = max_entities\n\n    def __call__(self, input_text: str) -> List[str]:\n  \
    \      final_results = []\n        for result in self._entity_recognition(input_text):\n\
    \            if result[\"score\"] > self._threshold:\n                final_results.append(result[\"\
    word\"])\n            if len(final_results) == self._max_entities:\n         \
    \       break\n\n        return final_results\n```\n\n## HTTP 处理与驱动逻辑\n\n定义了输入预处理和机器学习模型后，我们就可以定义\
    \ HTTP API 和驱动逻辑了。首先，我们使用 Pydantic 定义将从 API 返回的响应模式。响应包括请求是否成功以及状态消息，此外还有我们的摘要和命名实体。这将使我们能够在错误情况下（例如未找到结果或情感分析返回负面结果时）返回有用的响应：\n\
    \n```python\nfrom pydantic import BaseModel\n\nclass Response(BaseModel):\n  \
    \  success: bool\n    message: str = \"\"\n    summary: str = \"\"\n    named_entities:\
    \ List[str] = []\n```\n\n接下来，我们需要定义将在驱动部署中运行的实际控制流逻辑。驱动本身不会执行任何实际的繁重工作；相反，它将调用我们的三个下游模型部署并解释它们的结果。它还将包含\
    \ FastAPI 应用定义，解析输入并根据流水线的结果返回正确的 Response 模型：\n\n```python\nfrom fastapi import\
    \ FastAPI\n\napp = FastAPI()\n\n\n@serve.deployment\n@serve.ingress(app)\nclass\
    \ NLPPipelineDriver:\n    def __init__(self, sentiment_analysis, summarizer, entity_recognition):\n\
    \        self._sentiment_analysis = sentiment_analysis\n        self._summarizer\
    \ = summarizer\n        self._entity_recognition = entity_recognition\n\n    @app.get(\"\
    /\", response_model=Response)\n    async def summarize_article(self, search_term:\
    \ str) -> Response:\n        # Fetch the top page content for the search term\
    \ if found.\n        page_content = fetch_wikipedia_page(search_term)\n      \
    \  if page_content is None:\n            return Response(success=False, message=\"\
    No pages found.\")\n\n        # Conditionally continue based on the sentiment\
    \ analysis.\n        is_positive = await self._sentiment_analysis.remote(page_content)\n\
    \        if not is_positive:\n            return Response(success=False, message=\"\
    Only positivity allowed!\")\n\n        # Query the summarizer and named entity\
    \ recognition models in parallel.\n        summary_result = self._summarizer.remote(page_content)\n\
    \        entities_result = self._entity_recognition.remote(page_content)\n   \
    \     return Response(\n            success=True,\n            summary=await summary_result,\n\
    \            named_entities=await entities_result\n        )\n```\n\n我们的在线推理流水线将如图\
    \ 8-2 所示构建：\n\n1.  用户将提供一个关键词搜索词。\n2.  我们将获取与搜索词最相关的维基百科文章的内容。\n3.  一个情感分析模型将应用于该文章。任何具有“负面”情感的内容都将被拒绝，并且我们将提前返回。\n\
    4.  文章内容将被广播给摘要模型和命名实体识别模型。\n5.  我们将根据摘要模型和命名实体识别模型的输出返回一个组合结果。\n\n![图 8-2. 用于摘要维基百科文章的\
    \ NLP 流水线架构](img/6489687a3a178f2884963bddc928992c_192_0.png)\n\n该流水线将通过 HTTP 暴露，并以结构化格式返回结果。在本节结束时，我们将使流水线在本地端到端运行，并准备好在集群上扩展。让我们开始吧！\n\
    \n在深入代码之前，您需要在本地安装以下 Python 包：\n\n```\npip install \"ray[serve]==2.2.0\" \"transformers==4.21.2\"\
    \npip install \"requests==2.28.1\" \"wikipedia==1.4.0\"\n```\n\n此外，在本节中，我们将假设所有代码示例都在本地一个名为\
    \ `app.py` 的文件中，这样我们就可以使用 `serve run` 从同一目录运行部署。³\n\n> ³ 我们已经在本书的 GitHub 仓库中为您创建了这个\
    \ `app.py` 文件。克隆仓库并安装所有依赖项后，您应该能够直接从笔记本目录运行 `serve run app:<deployment_name>`\
    \ 来执行本章中 `serve run` 调用中引用的每个部署。"

    \nprint(f\"Starting {len(ALPHA_VALS)} training workers.\")\nworkers = [TrainingWorker.remote(alpha)\
    \ for alpha in ALPHA_VALS]\n```\n\nNext, we generate training and validation data\
    \ and convert the training data to a Dataset. Here, we're using .repeat() to create\
    \ a DatasetPipeline. This defines the number of epochs that our training will\
    \ run for. In each epoch, the subsequent operations will be applied to the Dataset,\
    \ and the workers will be able to iterate over the resulting data. We also shuffle\
    \ the data randomly and shard it to be passed to the training workers, each getting\
    \ an equal chunk:\n\n```\nX_train, X_test, Y_train, Y_test = train_test_split(\n\
    \    *datasets.make_classification()\n)\n\ntrain_ds = ray.data.from_items(list(zip(X_train,\
    \ Y_train)))\nshards = (train_ds.repeat(10)\n          .random_shuffle_each_window()\n\
    \          .split(len(workers), locality_hints=workers))\n\nray.get([\n    worker.train.remote(shard)\n\
    ])\n```"
- md: '## External Library Integrations


    While Ray Datasets supports a number of common data processing functionalities
    out of the box, as we’ve discussed, it’s not a replacement for full data processing
    systems. Instead, as shown in Figure 6-4, it’s more focused on performing “last
    mile” processing such as basic data loading, cleaning, and featurization before
    ML training or inference.


    ![](img/6489687a3a178f2884963bddc928992c_155_0.png)


    However, a number of other, more fully featured DataFrame and relational data
    processing systems integrate with Ray, such as:


    - Dask on Ray

    - RayDP (Spark on Ray)

    - Modin (Pandas on Ray)

    - MARS on Ray


    These are standalone data processing libraries you may be familiar with outside
    the context of Ray. Each of these tools has an integration with the Ray Core that
    enables more expressive data processing than comes with the built-in Ray Datasets
    while still using Ray’s deployment tooling, scalable scheduling, and shared memory
    object store for exchanging data. As shown in Figure 6-5, this complements Ray
    Datasets and enables end-to-end data processing on Ray.


    Figure 6-5 shows the benefit of Ray Data ecosystem integrations, enabling more
    expressive data processing on Ray. These libraries integrate with Ray Datasets
    to feed into downstream libraries such as Ray Train.


    ![](img/6489687a3a178f2884963bddc928992c_156_0.png)


    Figure 6-5. Ray Data ecosystem integrations enable more expressive data processing
    on Ray


    For the purposes of this book, we’ll explore Dask on Ray in slightly more depth
    to give you a feel for what these integrations look like. If you’re interested
    in the details of a specific integration, see the latest [Ray documentation](https://docs.ray.io/)
    for up-to-date information.


    To follow along with the examples in this section, install Ray and Dask:


    ```

    pip install "ray[data]==2.2.0" "dask==2022.2.0"

    ```


    **Dask** is a Python library for parallel computing that is specifically targeted
    at scaling analytics and scientific computing workloads to a cluster. One of the
    most popular features of Dask is **Dask DataFrames**, which offers a subset of
    the Pandas DataFrame API that can be scaled to a cluster of machines in cases
    where processing in memory on a single node is not feasible. DataFrames work by
    creating a *task graph* that is submitted to a scheduler for execution. The most
    typical way to execute Dask DataFrames operations is using the Dask distributed
    scheduler, but there is a pluggable API that allows other schedulers to execute
    these task graphs as well.


    Ray comes packaged with a Dask scheduler backend, allowing Dask DataFrame task
    graphs to be executed as Ray tasks and therefore use the Ray scheduler and shared
    memory object store. This doesn’t require modifying the core DataFrames code at
    all; instead, to run using Ray, all you need to do is first connect to a running
    Ray Cluster (or run Ray locally) and then enable the Ray scheduler backend:


    ```

    import ray

    from ray.util.dask import enable_dask_on_ray


    ray.init()  # Start or connect to Ray.

    enable_dask_on_ray()  # Enable the Ray scheduler backend for Dask.

    ```


    Now we can run regular Dask DataFrames code and have it scaled across the Ray
    Cluster. For example, we might want to do some time-series analysis using standard
    DataFrame operations like filter and groupby and compute the standard deviation
    (example taken from Dask documentation):


    ```

    import dask


    df = dask.datasets.timeseries()

    df = df[df.y > 0].groupby("name").x.std()

    df.compute()  # Trigger the task graph to be evaluated.

    ```


    If you''re used to Pandas or other DataFrame libraries, you might wonder why we
    need to call df.compute(). This is because Dask is lazy by default and will compute
    results only on demand, allowing it to optimize the task graph that will be executed
    across the cluster.


    One of the most powerful aspects of Dask on Ray is that it integrates very nicely
    with Ray Datasets. We can convert a Ray Dataset to a Dask DataFrame and vice versa
    using built-in utilities:


    ```

    import ray

    ds = ray.data.range(10000)


    # Convert the Dataset to a Dask DataFrame.

    df = ds.to_dask()

    print(df.std().compute())  # -> 2886.89568


    # Convert the Dask DataFrame back to a Dataset.

    ds = ray.data.from_dask(df)

    print(ds.std())  # -> 2886.89568

    ```


    This simple example might not look impressive because we''re able to compute the
    standard deviation using either Dask DataFrames or Ray Datasets. However, as you''ll
    see in the next section when we build an end-to-end ML pipeline, this enables
    powerful workflows. For example, we can use the full expressiveness of DataFrames
    to do our featurization and preprocessing and then pass the data directly into
    downstream operations such as distributed training or inference while keeping
    everything in memory. This highlights how Ray Datasets enables a wide range of
    use cases on top of Ray and how integrations like Dask on Ray make the ecosystem
    even more powerful.


    ## Building an ML Pipeline


    Although we were able to build a simple distributed training application from
    scratch in the previous section, there were many edge cases, opportunities for
    performance optimization, and usability features that we would want to address
    to build a real-world application. As you''ve learned in Chapters 4 and 5, Ray
    has an ecosystem of libraries that enable us to build production-ready ML applications.
    In this section, we''ll explore how to use Datasets as the “glue layer” to build
    an ML pipeline from end to end.


    To successfully productionize a machine learning model, we need to collect and
    catalog data using standard ETL processes. However, that''s not the end of the
    story: to train a model, we also often need to do featurization of the data before
    feeding into our training process, and how we feed the data into training can
    strongly impact cost and performance. After training a model, we''ll also want
    to run inference across many different datasets—that''s the whole point of training
    the model, after all!


    Though this might seem like just a chain of steps, in practice the data processing
    workflow for ML is an iterative process of experimentation to define the right
    set of features and train a high-performing model on them. Efficiently loading,
    transforming, and feeding the data into training and inference is also crucial
    for performance, which translates directly to cost for compute-intensive models.
    Implementing such ML pipelines often means stitching together multiple systems
    and materializing intermediate results to remote storage between the stages. This
    has two major downsides:


    - It requires orchestrating many different systems and programs for a single workflow.
    This can be a lot for any ML practitioner to handle, so many people use workflow
    orchestration systems like Apache Airflow. While Airflow has its benefits, it''s
    also a lot of complexity to introduce (especially in development).

    - Running our ML workflow across multiple systems means we need to read from and
    write to storage between each stage.⁵ This incurs significant overhead and cost
    due to data transfer and serialization.


    In contrast, using Ray we are able to build a complete ML pipeline as a single
    application that can be run as a single Python script as depicted in Figure 6-6.
    The ecosystem of built-in and third-party libraries makes it possible to mix and
    match the right functionality for a given use case and build scalable, production-ready
    pipelines. Importantly, Ray Datasets acts as the glue layer that enables efficient
    data loading, preprocessing, and computing while avoiding expensive serialization
    costs and keeping intermediate data in shared memory.


    Figure 6-6 shows a simplified version of the typical ML workflow and where Ray
    fits in that flow. ML''s multiple steps often require iteration; without Ray this
    means stitching together many independent systems for one end-to-end process.
    Ray acts as a unified compute layer, enabling most of the workflow to be run as
    a single application.


    > 5 Another challenge of relying on many tools is cultural. Knowledge transfer
    of best practices can be costly, especially in larger companies.'
  mdcn: '## 外部库集成


    虽然 Ray Datasets 开箱即用地支持许多常见的数据处理功能，但正如我们所讨论的，它并不能替代完整的数据处理系统。相反，如图 6-4 所示，它更专注于执行“最后一公里”的处理，例如在机器学习训练或推理之前进行基本的数据加载、清洗和特征化。


    ![](img/6489687a3a178f2884963bddc928992c_155_0.png)


    然而，许多其他功能更全面的 DataFrame 和关系型数据处理系统与 Ray 集成，例如：


    - Dask on Ray

    - RayDP (Spark on Ray)

    - Modin (Pandas on Ray)

    - MARS on Ray


    这些是你可能在 Ray 上下文之外就熟悉的独立数据处理库。这些工具中的每一个都与 Ray Core 集成，能够实现比内置 Ray Datasets 更具表现力的数据处理，同时仍然使用
    Ray 的部署工具、可扩展调度和用于数据交换的共享内存对象存储。如图 6-5 所示，这补充了 Ray Datasets，并实现了在 Ray 上的端到端数据处理。


    图 6-5 展示了 Ray 数据生态系统集成的好处，使得在 Ray 上能够进行更具表现力的数据处理。这些库与 Ray Datasets 集成，将数据馈送到下游库，例如
    Ray Train。


    ![](img/6489687a3a178f2884963bddc928992c_156_0.png)


    图 6-5. Ray 数据生态系统集成使得在 Ray 上能够进行更具表现力的数据处理


    为了本书的目的，我们将更深入地探讨 Dask on Ray，让你了解这些集成是什么样子的。如果你对特定集成的细节感兴趣，请参阅最新的 [Ray 文档](https://docs.ray.io/)
    以获取最新信息。


    要跟随本节中的示例，请安装 Ray 和 Dask：


    ```

    pip install "ray[data]==2.2.0" "dask==2022.2.0"

    ```


    **Dask** 是一个用于并行计算的 Python 库，专门针对将分析和科学计算工作负载扩展到集群。Dask 最受欢迎的功能之一是 **Dask DataFrames**，它提供了
    Pandas DataFrame API 的一个子集，可以在单节点内存处理不可行的情况下扩展到机器集群。DataFrames 通过创建一个*任务图*来工作，该任务图被提交给调度器执行。执行
    Dask DataFrames 操作最典型的方式是使用 Dask 分布式调度器，但也有一个可插拔的 API，允许其他调度器也执行这些任务图。


    Ray 附带了一个 Dask 调度器后端，允许 Dask DataFrame 任务图作为 Ray 任务执行，从而使用 Ray 调度器和共享内存对象存储。这不需要修改核心
    DataFrames 代码；相反，要使用 Ray 运行，你只需要先连接到一个正在运行的 Ray 集群（或在本地运行 Ray），然后启用 Ray 调度器后端：


    ```

    import ray

    from ray.util.dask import enable_dask_on_ray


    ray.init()  # 启动或连接到 Ray。

    enable_dask_on_ray()  # 为 Dask 启用 Ray 调度器后端。

    ```


    现在我们可以运行常规的 Dask DataFrames 代码，并让它在 Ray 集群上扩展。例如，我们可能想使用标准的 DataFrame 操作（如 filter
    和 groupby）进行一些时间序列分析，并计算标准差（示例取自 Dask 文档）：


    ```

    import dask


    df = dask.datasets.timeseries()

    df = df[df.y > 0].groupby("name").x.std()

    df.compute()  # 触发任务图进行评估。

    ```


    如果你习惯于 Pandas 或其他 DataFrame 库，你可能会想知道为什么我们需要调用 `df.compute()`。这是因为 Dask 默认是惰性的，只在需要时计算结果，从而允许它优化将在集群上执行的任务图。


    Dask on Ray 最强大的方面之一是它与 Ray Datasets 集成得非常好。我们可以使用内置工具将 Ray Dataset 转换为 Dask DataFrame，反之亦然：


    ```

    import ray

    ds = ray.data.range(10000)


    # 将 Dataset 转换为 Dask DataFrame。

    df = ds.to_dask()

    print(df.std().compute())  # -> 2886.89568


    # 将 Dask DataFrame 转换回 Dataset。

    ds = ray.data.from_dask(df)

    print(ds.std())  # -> 2886.89568

    ```


    这个简单的例子可能看起来并不令人印象深刻，因为我们能够使用 Dask DataFrames 或 Ray Datasets 来计算标准差。然而，正如你将在下一节中看到的，当我们构建一个端到端的机器学习管道时，这实现了强大的工作流。例如，我们可以使用
    DataFrame 的全部表现力来进行特征化和预处理，然后将数据直接传递到下游操作，如分布式训练或推理，同时将所有内容保留在内存中。这突显了 Ray Datasets
    如何在 Ray 之上支持广泛的用例，以及像 Dask on Ray 这样的集成如何使生态系统更加强大。


    ## 构建机器学习管道


    尽管我们在上一节中能够从头开始构建一个简单的分布式训练应用程序，但要构建一个真实世界的应用程序，我们需要解决许多边缘情况、性能优化机会和可用性功能。正如你在第
    4 章和第 5 章中学到的，Ray 拥有一个生态系统库，使我们能够构建生产就绪的机器学习应用程序。在本节中，我们将探讨如何使用 Datasets 作为“粘合层”来端到端地构建机器学习管道。


    要成功地将机器学习模型投入生产，我们需要使用标准的 ETL 流程来收集和编目数据。然而，这还不是全部：为了训练模型，我们通常还需要在将数据馈送到训练过程之前进行特征化，而我们如何将数据馈送到训练过程会强烈影响成本和性能。训练模型后，我们还希望在许多不同的数据集上运行推理——毕竟，这就是训练模型的全部意义！


    虽然这看起来可能只是一系列步骤，但在实践中，机器学习的数据处理工作流是一个迭代的实验过程，旨在定义正确的特征集并在其上训练高性能模型。高效地加载、转换并将数据馈送到训练和推理对于性能也至关重要，这直接转化为计算密集型模型的成本。实现这样的机器学习管道通常意味着将多个系统拼接在一起，并在阶段之间将中间结果物化到远程存储。这有两个主要缺点：


    - 它需要为单个工作流编排许多不同的系统和程序。这对任何机器学习从业者来说都可能负担很重，因此许多人使用像 Apache Airflow 这样的工作流编排系统。虽然
    Airflow 有其优点，但它也引入了很大的复杂性（尤其是在开发中）。

    - 跨多个系统运行我们的机器学习工作流意味着我们需要在每个阶段之间从存储读取和写入。⁵ 由于数据传输和序列化，这会产生显著的开销和成本。


    相比之下，使用 Ray，我们能够将完整的机器学习管道构建为一个单一的应用程序，可以作为单个 Python 脚本运行，如图 6-6 所示。内置和第三方库的生态系统使得可以为给定用例混合和匹配正确的功能，并构建可扩展、生产就绪的管道。重要的是，Ray
    Datasets 作为粘合层，实现了高效的数据加载、预处理和计算，同时避免了昂贵的序列化成本，并将中间数据保留在共享内存中。


    图 6-6 展示了典型机器学习工作流的简化版本以及 Ray 在该流程中的位置。机器学习的多个步骤通常需要迭代；没有 Ray，这意味着为一个端到端流程拼接许多独立的系统。Ray
    作为一个统一的计算层，使得大部分工作流可以作为单个应用程序运行。


    > 5 依赖许多工具的另一个挑战是文化方面的。最佳实践的知识转移可能成本高昂，尤其是在较大的公司中。'

  md: '# Autoscaling


    Ray is designed to support highly elastic workloads that are most efficient on
    an autoscaling cluster. At a high level, the autoscaler attempts to launch and
    terminate nodes to ensure that workloads have sufficient resources to run, while
    minimizing the idle resources. It does this by considering:


    +   - User-specified hard limits (min/max workers)

    - User-specified node types (nodes in a Ray Cluster do *not* have to be homogenous)

    - Information from the Ray Core''s scheduling layer about the current resource
    usage/demands of the cluster

    - Programmatic autoscaling hints


    The autoscaler resource demand scheduler will look at the pending tasks, actors,
    and placement groups, resource demands from the cluster. It will then try to add
    the minimum list of nodes that can fulfill these demands.


    When worker nodes are idle for more than `idle_timeout_minutes`, they will be
    removed. The head node is never removed unless the cluster is torn down.


    The autoscaler uses a simple *binpacking algorithm* to pack the user demands into
    the available cluster resources. The remaining unfulfilled demands are placed
    on the smallest list of nodes that satisfies the demand while maximizing utilization
    (starting from the smallest node). You can learn more about the autoscaling algorithm
    in the [Autoscaling section of the Ray architecture whitepaper](https://docs.ray.io/en/latest/cluster/kubernetes/user-guides/configure-autoscaling.html).


    Ray also provides documentation and tooling for other cluster managers such as
    YARN, SLURM, and LFS. You can read more about this in the [Ray documentation](https://docs.ray.io/en/latest/cluster/kubernetes/user-guides/configure-autoscaling.html).


    # Summary


    In this chapter you learned how to spin up your own Ray Clusters so that you can
    deploy your Ray applications on them. Besides manually setting up and shutting
    down clusters, we had a closer look at deploying Ray Clusters on Kubernetes using
    KubeRay. We also looked at the Ray Cluster Launcher in detail and discussed how
    to work with cloud clusters on clouds such as AWS, GCP, and Azure. Finally, we
    discussed how to use the Ray autoscaler to scale your Ray Clusters.


    Now that you know more about scaling Ray Clusters, we''ll come back to the application
    side of things in [Chapter 10](https://docs.ray.io/en/latest/cluster/kubernetes/user-guides/configure-autoscaling.html)
    and discuss how all the Ray ML libraries we''ve seen effectively come together
    to form the Ray AI Runtime.'

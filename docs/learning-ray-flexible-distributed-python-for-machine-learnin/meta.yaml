- img_proc: true
  md: "```\ndef objective(config):\n    (x_train, y_train), (x_test, y_test) = load_data()\n\
    \    model = Sequential()\n    model.add(Flatten(input_shape=(28, 28)))\n    model.add(Dense(config[\"\
    hidden\"], activation=config[\"activation\"]))\n    model.add(Dropout(config[\"\
    rate\"]))\n    model.add(Dense(10, activation=\"softmax\"))\n\n    model.compile(loss=\"\
    categorical_crossentropy\", metrics=[\"accuracy\"])\n    model.fit(x_train, y_train,\
    \ batch_size=128, epochs=10,\n              validation_data=(x_test, y_test),\n\
    \              callbacks=[TuneReportCallback({\"mean_accuracy\": \"accuracy\"\
    })])\n```\n\nNext, let's use a custom search algorithm to tune this objective.\
    \ Specifically, we're using the HyperOptSearch algorithm, which gives us access\
    \ to Hyperopt's TPE algorithm through Tune. To use this integration, make sure\
    \ to install Hyperopt on your machine (for instance with `pip install hyperopt==0.2.7`).\
    \ HyperOptSearch allows us to define a list of promising initial hyperparameter\
    \ choices to investigate.\n\nThis is entirely optional, but sometimes you might\
    \ have good guesses to start from. In our case, we go with a dropout \"rate\"\
    \ of 0.2, 128 \"hidden\" units, and a rectified linear unit (ReLU) \"activation\"\
    \ function initially. Other than that, we can define a search space with the tune\
    \ utility just as we did before. Finally, we can get an analysis object to determine\
    \ the best hyperparameters found by passing everything into a `tune.run` call:\n\
    \n```\nfrom ray import tune\nfrom ray.tune.suggest.hyperopt import HyperOptSearch\n\
    \ninitial_params = [{\"rate\": 0.2, \"hidden\": 128, \"activation\": \"relu\"\
    }]\nalgo = HyperOptSearch(points_to_evaluate=initial_params)\n\nsearch_space =\
    \ {\n    \"rate\": tune.uniform(0.1, 0.5),\n    \"hidden\": tune.randint(32, 512),\n\
    \    \"activation\": tune.choice([\"relu\", \"tanh\"])\n}\n\nanalysis = tune.run(\n\
    \    objective,\n    name=\"keras_hyperopt_exp\",\n    search_alg=algo,\n    metric=\"\
    mean_accuracy\",\n    mode=\"max\",\n    stop={\"mean_accuracy\": 0.99},\n   \
    \ num_samples=10,\n    config=search_space,\n)\nprint(\"Best hyperparameters found\
    \ were: \", analysis.best_config)\n```"

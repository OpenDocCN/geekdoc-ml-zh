    \n    while True:\n        action = client.get_action(episode_id, obs)\n\n   \
    \     obs, reward, done, info = env.step(action)\n\n        client.log_returns(episode_id,\
    \ reward, info=info)\n\n        if done:\n            client.end_episode(episode_id,\

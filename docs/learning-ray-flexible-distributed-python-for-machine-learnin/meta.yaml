    \n## 使用 Ray Job Submission 服务器\n\n你可以通过使用 Ray Job Submission 服务器在集群上运行脚本。你可以使用该服务器发送脚本或依赖包，并使用该依赖集运行自定义脚本。首先，你需要对作业提交服务器端口进行端口转发：\n\

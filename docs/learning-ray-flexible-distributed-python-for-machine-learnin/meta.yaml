- img_proc: true
  md: "To test this curriculum function, we need to add it to our RLlib algorithm\
    \ config by setting the `env_task_fn` property to our `curriculum_fn`. Note that\
    \ before training a DQN for 15 iterations, we also set an `output` folder in our\
    \ config. This will store experience data of our training run to the specified\
    \ `temp` folder:²¹\n\n```\nfrom ray.rllib.algorithms.dqn import DQNConfig\nimport\
    \ tempfile\n\ntemp = tempfile.mkdtemp() ❶\n\ntrainer = (\n    DQNConfig()\n  \
    \  .environment(env=CurriculumEnv, env_task_fn=curriculum_fn) ❷\n    .offline_data(output=temp)\
    \ ❸\n    .build()\n)\n\nfor i in range(15):\n    trainer.train()\n```\n\n+   ❶\
    \ Create a `temp` file to store our training data for later use.\n\n❷ Set the\
    \ `CurriculumEnv` as our environment in the `environment` part of our config and\
    \ assign our `curriculum_fn` to the `env_task_fn` property.\n\n❸ Use the `offline_data`\
    \ method to store output in our `temp` folder.\n\nRunning this algorithm, you\
    \ should see how the task difficulty increases over time, thereby giving the algorithm\
    \ easy examples to start with so that it can learn from them and progress to more\
    \ difficult tasks.\n\nCurriculum learning is a great technique to be aware of\
    \ and RLlib allows you to easily incorporate it into your experiments through\
    \ the curriculum API we just discussed.\n\n# Working with Offline Data\n\nIn our\
    \ previous curriculum learning example we stored training data to a temporary\
    \ folder. What's interesting is that you already know from Chapter 3 that in Q-Learning\
    \ you can collect experience data first and decide when to use it in a training\
    \ step later. This separation of data collection and training opens up many possibilities.\
    \ For instance, maybe you have a good heuristic that can solve your problem in\
    \ an"
  merge: -1
  pgno: 118
- img_proc: true
  md: "imperfect yet reasonable manner. Or you have records of human interaction with\
    \ your environment, demonstrating how to solve the problem by example.\n\nThe\
    \ topic of collecting experience data for later training is often discussed as\
    \ working with *offline data*. It's called “offline” because it's not directly\
    \ generated by a policy interacting online with the environment. Algorithms that\
    \ don't rely on training on their own policy output are called *off-policy algorithms*,\
    \ and Q-Learning, particularly DQN, is just one such example. Algorithms that\
    \ don't share this property are called on-policy algorithms. In other words, off-policy\
    \ algorithms can be used to train on offline data.²²\n\nTo use the data we stored\
    \ in the *temp* folder, we can create a new DQNConfig that takes this folder as\
    \ input. We will also set explore to False, since we simply want to exploit the\
    \ data previously collected for training—the algorithm will not explore according\
    \ to its own policy.\n\nUsing the resulting RLlib algorithm works exactly as before,\
    \ which we demonstrate by training it for 10 iterations and then evaluating it:\n\
    \n```\nimitation_algo = (\n    DQNConfig()\n    .environment(env=AdvancedEnv)\n\
    \    .evaluation(off_policy_estimation_methods={})\n    .offline_data(input_=temp)\n\
    \    .exploration(explore=False)\n    .build())\n\nfor i in range(10):\n    imitation_algo.train()\n\
    \nimitation_algo.evaluate()\n```\n\nNote that we called the algorithm *imitation_algo*.\
    \ That's because this training procedure intends to *imitate* the behavior reflected\
    \ in the data we collected before. This type of learning by demonstration in RL\
    \ is therefore often called *imitation learning* or *behavior cloning*.\n\n# Other\
    \ Advanced Topics\n\nBefore concluding this chapter, let's have a look at a few\
    \ other advanced topics that RLlib has to offer. You've already seen how flexible\
    \ RLlib is: working with a range of different environments, configuring your experiments,\
    \ training on a curriculum, or running imitation learning. This section gives\
    \ you a taste of what else is possible."
  merge: -1
  pgno: 119
- img_proc: true
  md: 'With RLlib, you can completely customize the models and policies used under
    the hood. If you''ve worked with deep learning before, you know how important
    it can be to have a good model architecture in place. In RL this is often not
    as crucial as in supervised learning, but it is still a vital part of successfully
    running advanced experiments.


    You can also change the way your observations are preprocessed by providing custom
    preprocessors. For our simple maze examples, there was nothing to preprocess,
    but when working with image or video data, preprocessing is often a crucial step.


    In our *AdvancedEnv* we introduced states to avoid. Our agents had to learn to
    do this, but RLlib has a feature to automatically avoid them through so-called
    *parametric action spaces*. Loosely speaking, what you can do is “mask out” all
    undesired actions from the action space for each point in time. In some cases
    it can also be necessary to have variable observation spaces, which is also fully
    supported by RLlib.


    We briefly touched on the topic of offline data. RLlib has a full-fledged Python
    API for reading and writing experience data that can be used in various situations.


    We have worked solely with DQN here for simplicity, but RLlib has an impressive
    range of training algorithms. To name just one, the MARWIL algorithm is a complex
    hybrid algorithm with which you can run imitation learning from offline data,
    while also mixing in regular training on data generated “online.”


    # Summary


    You''ve seen a selection of interesting RLlib features in this chapter. We covered
    training multi-agent environments, working with offline data generated by another
    agent, setting up a client-server architecture to split simulations from RL training,
    and using curriculum learning to specify increasingly difficult tasks.


    We''ve also given you a quick overview of the main concepts underlying RLlib and
    how to use its CLI and Python API. In particular, we''ve shown how to configure
    your RLlib algorithms and environments to your needs. As we''ve covered only a
    small part of RLlib''s possibilities, we encourage you to read its [documentation
    and explore its API](https://docs.ray.io/en/latest/rllib/index.html).


    In the next chapter you''ll learn how to tune the hyperparameters of your RLlib
    models and policies with Ray Tune.'

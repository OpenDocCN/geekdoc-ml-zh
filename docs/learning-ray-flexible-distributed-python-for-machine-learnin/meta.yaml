  md: "2 Specify the number of environments to evaluate per worker. This setting allows\
    \ you to “batch” evaluation of environments. In particular, if your models take\
    \ a long time to evaluate, grouping environments like this can speed up training.\n\
    \n3 When `num_rollout_workers > 0`, the driver (“local worker”) does not need\
    \ an environment. That’s because sampling and evaluation is done by the rollout\
    \ workers. If you still want an environment on the driver, you can set this option\
    \ to True.\n\n# Environment Configuration\n\n```\nfrom ray.rllib.algorithms.dqn\
    \ import DQNConfig\n\nconfig = DQNConfig().environment(\n    env=\"CartPole-v1\"\
    ,  # 1\n    env_config={\"my_config\": \"value\"},  # 2\n    observation_space=None,\n\
    \    action_space=None,  # 3\n    render_env=True,  # 4\n)\n```\n\n1 Specify the\
    \ environment you want to use for training. This can be either a string of an\
    \ environment known to Ray RLlib, such as any Gym environment, or the class name\
    \ of a custom environment you’ve implemented.15\n\n2 Optionally specify a dictionary\
    \ of configuration options for your environment that will be passed to the environment\
    \ constructor.\n\n3 You can specify the observation and action spaces of your\
    \ environment too. If you don’t specify them, they will be inferred from the environment.\n\
    \n4 False by default, this property allows you to turn on rendering of the environment,\
    \ which requires you to implement the `render` method of your environment.\n\n\
    Note that we left out many available configuration options for each of the types\

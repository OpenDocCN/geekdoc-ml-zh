- md: '## An Overview of Ray’s Integrations


    Let’s summarize all the integrations mentioned in this chapter (and throughout
    the book) in one concise diagram. In Figure 11-1 we list all integrations available
    at the time of writing.


    ![](img/6489687a3a178f2884963bddc928992c_248_0.png)


    ## Ray and Other Systems


    We''ve not made any direct comparisons with other systems up to this point, for
    the simple reason that it makes little sense to compare Ray to something if you
    don''t have a good grasp of what Ray is yet. As Ray is quite flexible and comes
    with a lot of components, it can be compared to different types of tools in the
    broader ML ecosystem.


    Let''s start with a comparison of the more obvious candidates, namely, Python-based
    frameworks for cluster computing.


    ## Distributed Python Frameworks


    If you consider frameworks for distributed computing that offer full Python support
    and don''t lock you into any cloud offering, the current “big three” are Dask,
    Spark, and Ray. While there are certain technical and context-dependent performance
    differences between these frameworks, it''s best to compare them in terms of the
    workloads you want to run on them. Table 11-5 compares the most common workload
    types.


    Table 11-5. Comparing workload type support of Ray, Dask, and Spark


    | Workload type | Dask | Spark | Ray |

    |---|---|---|---|

    | Structured data processing | First-class support | First-class support | Supported
    via Ray Datasets and integrations, but not first class |

    | Low-level parallelism | First-class support via tasks | None | First-class support
    via tasks and actors |

    | Deep learning workloads | Supported, but not first class | Supported, but not
    first class | First-class support via several ML libraries |


    ## Ray AIR and the Broader ML Ecosystem


    Ray AIR focuses primarily on *AI compute*, for instance by providing any kind
    of distributed training via Ray Train, but it’s not built to cover every aspect
    of an AI workload. For instance, AIR chooses to integrate with tracking and monitoring
    tools for ML experiments, as well as with data storage solutions, rather than
    providing native solutions. Table 11-6 identifies the ecosystem’s complementary
    components.


    Table 11-6. Complementary ecosystem components


    | Category | Examples |

    |---|---|

    | ML tracking and observability | MLflow, Weights & Biases, Arize, etc. |

    | Training frameworks | PyTorch, TensorFlow, Lightning, JAX, etc. |

    | ML feature stores | Feast, Tecton, etc. |


    On the other side of the spectrum, you can find categories of tools for which
    Ray AIR can be considered an alternative. For instance, there are many framework-specific
    toolkits such as TorchX or TFX that tie in tightly with their respective frameworks.
    In contrast, AIR is framework-agnostic, thereby preventing vendor lock-in, and
    offers similar tooling.¹⁰


    It’s also interesting to briefly touch on how Ray AIR compares to specific cloud
    offerings. Some major cloud services offer comprehensive toolkits to tackle ML
    workloads in Python. To name just one, AWS Sagemaker is a great all-in-one package
    that allows you to connect well with your AWS ecosystem. AIR does not aim to replace
    tools like SageMaker. Instead, it aims to provide alternatives for compute-intensive
    components like training, evaluation, and serving.¹¹


    AIR also represents a valid alternative to ML workflow frameworks such as KubeFlow
    or Flyte. In contrast to many container-based solutions, AIR offers an intuitive,
    high-level Python API and offers native support for distributed data. Table 11-7
    summarizes these alternatives.


    Table 11-7. Alternative ecosystem components


    | Category | Examples |

    |---|---|

    | Framework-specific toolkits | TorchX, TFX, etc. |

    | ML workflow frameworks | KubeFlow, Flyte, FBLearner Flow |


    Sometimes the situation is not as clear-cut, and Ray AIR can be seen or used as
    both an alternative or a complementary component in the ML ecosystem.


    For instance, as open source systems, Ray and AIR in particular can be used within
    hosted ML platforms such as SageMaker, but you can also build your own ML Platforms
    with it.¹² Also, as mentioned, AIR can’t always compete with dedicated big data
    processing systems like Spark or Dask, but often Ray Datasets can be enough to
    suit your processing needs.


    As we mentioned in Chapter 10, it is central to AIR’s design philosophy to have
    the ability to express your ML workloads in a single script and execute it on
    Ray as a single distributed system. Since Ray handles all the task placement and
    execution on your cluster for you under the hood, there’s usually no need to explicitly
    orchestrate your workloads (or stitch together many complex distributed systems).
    Of course, this philosophy should not be taken too literally—sometimes you need
    multiple systems or to split up tasks into several stages. On the other hand,
    dedicated workflow orchestration tools like Argo or AirFlow can be very useful
    when used in a complementary fashion.¹³ For instance, you might want to run Ray
    as a step in the Lightning MLOps framework. Table 11-8 provides an overview of
    components that can be used alongside AIR or for which AIR can be an alternative.


    Table 11-8. Ecosystem components that AIR can complement or substitute


    | Category | Examples |

    |---|---|

    | ML platforms | SageMaker, Azure ML, Vertex AI, Databricks |

    | Data processing systems | Spark, Dask |

    | Workflow orchestrators | Argo, AirFlow, Metaflow |

    | MLOps frameworks | ZenML, Lightning |


    In case you already have an ML platform, such as Vertex or SageMaker, you can
    use any subset of Ray AIR to augment your system.¹⁴ In other words, AIR can complement
    existing ML platforms by integrating with existing pipeline or workflow orchestrators,
    storage, and tracking services, without requiring a replacement of your entire
    ML platform.


    ## How to Integrate AIR into Your ML Platform


    Now that you have a deeper understanding of the relationship of Ray, and AIR in
    particular, to other ecosystem components, let''s summarize what it takes to build
    your own ML platform and integrate Ray with other ecosystem components.


    The core of your ML system build with AIR consists of a set of Ray Clusters, each
    responsible for different jobs. For instance, one cluster might run preprocessing,
    train a PyTorch model, and run inference; another one might simply pick up previously
    trained models for batch inference and model serving, and so on. You can leverage
    the Ray Autoscaler to fulfill your scaling needs and could deploy the whole system
    on Kubernetes with KubeRay. You can then augment this core system with other components
    as you see fit, for example:


    - You might want to add other compute steps to your setup, such as running data-intensive
    preprocessing tasks with Spark.

    - You can use a workflow orchestrator such as AirFlow, Oozie, or SageMaker Pipelines
    to schedule and create your Ray Clusters and run Ray AIR apps and services. Each
    AIR app can be part of a larger orchestrated workflow, for instance by tying into
    a Spark ETL job from the first bullet point.¹⁵

    - You can also create your Ray AIR clusters for interactive use with Jupyter notebooks,
    for instance hosted by Google Colab or Databricks Notebooks.

    - If you need access to a feature store such as Feast or Tecton, Ray Train, Datasets,
    and Serve have an integration for such tools.¹⁶

    - For experiment tracking or metric stores, Ray Train and Tune provide integration
    with tools such as MLflow and Weights & Biases.

    - You can also retrieve and store your data and models from external storage solutions
    like S3, as shown.


    Figure 11-2 puts all the pieces together in one concise diagram.


    ¹⁰ This represents a clear trade-off, as framework-specific tools are highly customized
    and offer many benefits.

    ¹¹ Anyscale itself provides a managed service with enterprise features to support
    building ML applications on top of Ray.

    ¹² We’ll give you a rough sketch for how to do this in the next section.

    ¹³ Ray has a library called Ray Workflows, which is currently in alpha. Compared
    to tools such as AirFlow, Workflows is more low-level but allows you to run durable
    application workflows natively on Ray. You can find more information about Workflows
    in the Ray documentation.

    ¹⁴ We use the term *ML platform* in the broadest sense possible, namely, to signify
    any system that is responsible for running end-to-end ML workloads.

    ¹⁵ Orchestration of task graphs can be handled entirely within Ray AIR. External
    workflow orchestrators will integrate nicely but are needed only if running non-Ray
    steps.

    ¹⁶ The Ray team has built a demo of a reference architecture that showcases the
    Feast integration.'
  mdcn: '## Ray 集成概览


    让我们用一张简洁的图表来总结本章（以及全书）中提到的所有集成。图 11-1 列出了截至撰写时所有可用的集成。


    ![](img/6489687a3a178f2884963bddc928992c_248_0.png)


    ## Ray 与其他系统


    到目前为止，我们还没有与其他系统进行任何直接比较，原因很简单：如果你对 Ray 还没有很好的理解，那么将 Ray 与其他东西进行比较意义不大。由于 Ray
    非常灵活且包含许多组件，它可以与更广泛的 ML 生态系统中不同类型的工具进行比较。


    让我们从比较更明显的候选者开始，即基于 Python 的集群计算框架。


    ## 分布式 Python 框架


    如果你考虑那些提供完整 Python 支持且不将你锁定在任何特定云服务中的分布式计算框架，目前的“三巨头”是 Dask、Spark 和 Ray。虽然这些框架之间存在某些技术性和依赖于上下文的性能差异，但最好根据你想要运行的工作负载来比较它们。表
    11-5 比较了最常见的工作负载类型。


    表 11-5. Ray、Dask 和 Spark 的工作负载类型支持比较


    | 工作负载类型 | Dask | Spark | Ray |

    |---|---|---|---|

    | 结构化数据处理 | 一流支持 | 一流支持 | 通过 Ray Datasets 和集成支持，但非一流 |

    | 底层并行性 | 通过任务提供一流支持 | 无 | 通过任务和 Actor 提供一流支持 |

    | 深度学习工作负载 | 支持，但非一流 | 支持，但非一流 | 通过多个 ML 库提供一流支持 |


    ## Ray AIR 与更广泛的 ML 生态系统


    Ray AIR 主要专注于 *AI 计算*，例如通过 Ray Train 提供各种分布式训练，但它并非旨在覆盖 AI 工作负载的每个方面。例如，AIR 选择与
    ML 实验的跟踪和监控工具以及数据存储解决方案集成，而不是提供原生解决方案。表 11-6 识别了生态系统的互补组件。


    表 11-6. 互补的生态系统组件


    | 类别 | 示例 |

    |---|---|

    | ML 跟踪与可观测性 | MLflow、Weights & Biases、Arize 等 |

    | 训练框架 | PyTorch、TensorFlow、Lightning、JAX 等 |

    | ML 特征存储 | Feast、Tecton 等 |


    另一方面，你可以找到一些工具类别，Ray AIR 可以被视为其替代方案。例如，有许多与特定框架紧密集成的框架专用工具包，如 TorchX 或 TFX。相比之下，AIR
    与框架无关，从而避免了供应商锁定，并提供类似的工具。¹⁰


    简要探讨 Ray AIR 与特定云服务的比较也很有趣。一些主要的云服务提供全面的工具包来处理 Python 中的 ML 工作负载。仅举一例，AWS Sagemaker
    是一个出色的一体化包，允许你与 AWS 生态系统良好连接。AIR 并不旨在取代像 SageMaker 这样的工具。相反，它旨在为训练、评估和服务等计算密集型组件提供替代方案。¹¹


    AIR 也是 KubeFlow 或 Flyte 等 ML 工作流框架的有效替代方案。与许多基于容器的解决方案相比，AIR 提供了直观的高级 Python API，并原生支持分布式数据。表
    11-7 总结了这些替代方案。


    表 11-7. 替代的生态系统组件


    | 类别 | 示例 |

    |---|---|

    | 框架专用工具包 | TorchX、TFX 等 |

    | ML 工作流框架 | KubeFlow、Flyte、FBLearner Flow |


    有时情况并非如此清晰，Ray AIR 可以在 ML 生态系统中被视为或用作替代方案或互补组件。


    例如，作为开源系统，Ray（尤其是 AIR）可以在 SageMaker 等托管 ML 平台内使用，但你也可以用它来构建自己的 ML 平台。¹² 此外，如前所述，AIR
    并不总是能与 Spark 或 Dask 等专用大数据处理系统竞争，但 Ray Datasets 通常足以满足你的处理需求。


    正如我们在第 10 章中提到的，AIR 设计理念的核心是能够在一个脚本中表达你的 ML 工作负载，并将其作为单个分布式系统在 Ray 上执行。由于 Ray
    在底层为你处理集群上的所有任务放置和执行，通常无需显式编排你的工作负载（或拼接许多复杂的分布式系统）。当然，这个理念不应过于字面化——有时你需要多个系统或将任务分成几个阶段。另一方面，像
    Argo 或 AirFlow 这样的专用工作流编排工具在互补使用时非常有用。¹³ 例如，你可能希望将 Ray 作为 Lightning MLOps 框架中的一个步骤运行。表
    11-8 概述了可以与 AIR 一起使用或 AIR 可以作为其替代方案的组件。


    表 11-8. AIR 可以补充或替代的生态系统组件


    | 类别 | 示例 |

    |---|---|

    | ML 平台 | SageMaker、Azure ML、Vertex AI、Databricks |

    | 数据处理系统 | Spark、Dask |

    | 工作流编排器 | Argo、AirFlow、Metaflow |

    | MLOps 框架 | ZenML、Lightning |


    如果你已经拥有一个 ML 平台，例如 Vertex 或 SageMaker，你可以使用 Ray AIR 的任何子集来增强你的系统。¹⁴ 换句话说，AIR 可以通过与现有的流水线或工作流编排器、存储和跟踪服务集成来补充现有的
    ML 平台，而无需替换你的整个 ML 平台。


    ## 如何将 AIR 集成到你的 ML 平台中


    现在你对 Ray（尤其是 AIR）与其他生态系统组件的关系有了更深入的理解，让我们总结一下构建自己的 ML 平台并将 Ray 与其他生态系统组件集成所需的条件。


    使用 AIR 构建的 ML 系统的核心是一组 Ray 集群，每个集群负责不同的作业。例如，一个集群可能运行预处理、训练 PyTorch 模型并运行推理；另一个集群可能只是获取先前训练好的模型进行批量推理和服务，等等。你可以利用
    Ray Autoscaler 来满足你的扩展需求，并可以使用 KubeRay 将整个系统部署在 Kubernetes 上。然后，你可以根据需要使用其他组件来增强这个核心系统，例如：


    - 你可能希望向你的设置中添加其他计算步骤，例如使用 Spark 运行数据密集型预处理任务。

    - 你可以使用 AirFlow、Oozie 或 SageMaker Pipelines 等工作流编排器来调度和创建你的 Ray 集群，并运行 Ray AIR
    应用和服务。每个 AIR 应用都可以成为更大编排工作流的一部分，例如通过与第一个要点中的 Spark ETL 作业关联。¹⁵

    - 你还可以创建用于与 Jupyter 笔记本交互使用的 Ray AIR 集群，例如由 Google Colab 或 Databricks Notebooks
    托管的集群。

    - 如果你需要访问 Feast 或 Tecton 等特征存储，Ray Train、Datasets 和 Serve 已经与这些工具集成了。¹⁶

    - 对于实验跟踪或指标存储，Ray Train 和 Tune 提供了与 MLflow 和 Weights & Biases 等工具的集成。

    - 你也可以从 S3 等外部存储解决方案中检索和存储你的数据和模型，如图所示。


    图 11-2 将所有部分整合在一张简洁的图表中。


    ¹⁰ 这代表了一个明确的权衡，因为框架专用工具是高度定制的，并提供了许多好处。

    ¹¹ Anyscale 本身提供了一项具有企业功能的托管服务，以支持在 Ray 上构建 ML 应用。

    ¹² 我们将在下一节中为你提供一个粗略的草图，说明如何做到这一点。

    ¹³ Ray 有一个名为 Ray Workflows 的库，目前处于 alpha 阶段。与 AirFlow 等工具相比，Workflows 更底层，但允许你在
    Ray 上原生运行持久化应用工作流。你可以在 Ray 文档中找到有关 Workflows 的更多信息。

    ¹⁴ 我们在最广泛的意义上使用 *ML 平台* 这个术语，即表示任何负责运行端到端 ML 工作负载的系统。

    ¹⁵ 任务图的编排可以完全在 Ray AIR 内部处理。外部工作流编排器会很好地集成，但仅在运行非 Ray 步骤时才需要。

    ¹⁶ Ray 团队构建了一个参考架构的演示，展示了 Feast 集成。'

    ## Deployment on Kubernetes\n\nKubernetes is an industry-standard platform for\
    \ cluster resource management. It allows software teams to seamlessly deploy,\
    \ manage, and scale their business applications in a wide variety of production\
    \ environments. It was initially developed by Google, but many organizations have\
    \ now adopted Kubernetes as their cluster resource management solution.\n\nThe\
    \ community-maintained [KubeRay project](https://github.com/ray-project/kuberay)\
    \ is the standard way of deploying and managing Ray Clusters on Kubernetes. The\
    \ KubeRay operator helps deploy and manage Ray Clusters on top of Kubernetes (Figure\
    \ 9-1). Clusters are defined as a custom `RayCluster` resource and managed by\
    \ a fault-tolerant Ray controller. The operator automates provisioning, management,\
    \ autoscaling, and operations of Ray Clusters deployed to Kubernetes. The main\
    \ features of this operator are:\n\n- Management of first-class `RayCluster` via\
    \ a custom resource.\n- Support for heterogeneous worker types in a single Ray\
    \ Cluster.\n- Built-in monitoring via Prometheus.\n- Use of `PodTemplate` to create\
    \ Ray pods.\n- Updated status based on the running pods.\n- Automatically populate\
    \ environment variables in the containers.\n- Automatically prefix your container\
    \ command with the Ray start command.\n- Automatically adding the volumeMount\
    \ at `/dev/shm` for shared memory.\n- Use of `ScaleStrategy` to remove specific\
    \ nodes in specific groups.\n\n![](img/6489687a3a178f2884963bddc928992c_203_0.png)\n\
    \n## Setting Up Your First KubeRay Cluster\n\nYou can deploy the operator by cloning\
    \ the [KubeRay repository](https://github.com/ray-project/kuberay) and calling\
    \ the following command:\n\n```\nexport KUBERAY_VERSION=v0.3.0\n\nkubectl create\
    \ -k \"github.com/ray-project/kuberay/manifests/cluster-scope-resources?ref=${KUBERAY_VERSION}&timeout=90s\"\
    \n\nkubectl apply -k \"github.com/ray-project/kuberay/manifests/base?ref=${KUBERAY_VERSION}&timeout=90s\"\
    \n```\n\nYou can verify that the operator has been deployed using this command:\n\
    \n```\nkubectl -n ray-system get pods\n```\n\nWhen deployed, the operator will\
    \ watch for Kubernetes events (create/delete/update) for the `raycluster` resource\
    \ updates. Upon these events, the operator can create a cluster consisting of\
    \ a head pod and multiple worker pods, delete a cluster, or update the cluster\
    \ by adding or removing worker pods. Now let's deploy a new Ray Cluster using\
    \ a provided default cluster configuration (we'll get to this YAML file later):\n\
    \n```\nwget \"https://raw.githubusercontent.com/ray-project/kuberay/${KUBERAY_VERSION}/ray-operator/config/samples/ray-cluster.complete.yaml\"\
    \n\nkubectl create -f ray-cluster.complete.yaml\n```\n\nThe KubeRay operator configures\
    \ a Kubernetes service targeting the Ray head pod. To identify the service, run:\n\
    \n```\nkubectl get service --selector=ray.io/cluster=raycluster-complete\n```\n\
    \nThe output of this command should resemble the following structure:\n\n| NAME\
    \ | TYPE | CLUSTER-IP | EXTERNAL-IP |\n| :--- | :--- | :--- | :--- |\n| raycluster-complete-head-svc\
    \ | ClusterIP | xx.xx.xxx.xx | `<none>` |\n| PORT(S) | AGE | | |\n| 6379/TCP,8265/TCP,10001/TCP\
    \ | 6m10s | | |\n\nThe three ports indicated in the output correspond to the following\
    \ services of the Ray head pod:\n\n- **6379**: The Ray head's GCS service. Ray\
    \ worker pods connect to this service when joining the cluster.\n- **8265**: Exposes\
    \ the Ray Dashboard and the Ray Job Submission service.\n- **10001**: Exposes\
    \ the Ray Client server.\n\nYou should note that the Docker images we're using\
    \ are quite large and can take a while to download. Also, even if you see the\
    \ expected output from `kubectl get service`, that doesn't mean your cluster is\
    \ ready to use yet. You should look at the pod status and make sure they are all\
    \ actually in \"Running\" state.\n\n## Interacting with the KubeRay Cluster\n\n\
    You might be wondering why we spend so much time on Kubernetes, since you're most\
    \ likely just interested in learning how to run Ray scripts on it. That's understandable,\
    \ and we'll get to that in a moment.\n\nFirst, let's use the following Python\
    \ script as the desired script to run on the cluster. We'll name it `script.py`\
    \ (for simplicity), and the script will connect to the Ray Cluster and run a couple\
    \ standard Ray commands:\n\n```\nimport ray\nray.init(address=\"auto\")\nprint(ray.cluster_resources())\n\
    \n@ray.remote\ndef test():\n    return 12\n\nray.get([test.remote() for i in range(12)])\n\
    ```\n\nThere are three primary ways to run this script: using `kubectl exec`,\
    \ Ray Job Submission, or Ray Client. We'll cover them in the following sections.\n\
    \n## Running Ray programs with kubectl\n\nTo start with, you can directly interact\
    \ with the head pod via `kubectl exec`. Use this command to get a Python interpreter\
    \ on the head pod:\n\n```\nkubectl exec `kubectl get pods -o custom-columns=POD:metadata.name\
    \ | grep raycluster-complete-head` -it -c ray-head -- python\n```\n\nWith this\
    \ Python terminal, you can connect and run your own Ray application:\n\n```\n\
    import ray\nray.init(address=\"auto\")\n...\n```\n\nThere are other ways of interacting\
    \ with these services without `kubectl`, but they will require some networking\
    \ setup. The easiest route, and the one we'll take in what follows, is to use\
    \ port-forwarding.\n\n## Using the Ray Job Submission server\n\nYou can run scripts\
    \ on the cluster by using the Ray Job Submission server. You can use the server\
    \ to send a script or a bundle of dependencies and run custom scripts with that\
    \ set of dependencies. To start, you'll need to port-forward the job submission\
    \ server port:\n\n```\nkubectl port-forward service/raycluster-complete-head-svc\
    \ 8265:8265\n```\n\nNow, submit the script by setting the `RAY_ADDRESS` variable\
    \ to the job server submission endpoint and using the Ray Job Submission CLI:\n\
    \n```\nexport RAY_ADDRESS=\"http://localhost:8265\"\n\nray job submit --working-dir=.\
    \ -- python script.py\n```\n\nYou'll see an output that looks like:\n\n```\nJob\
    \ submission server address: http://127.0.0.1:8265\n2022-05-20 23:35:36,066 INFO\
    \ dashboard_sdk.py:276\n-- Uploading package gcs://_ray_pkg_533a957683abeba8.zip.\n\
    2022-05-20 23:35:36,067 INFO packaging.py:416\n-- Creating a file package for\
    \ local directory '.'.\n\n--------------------------------------------------------------------------------\n\
    Job 'raysubmit_U5hfr1rqJZWwJmLP' submitted successfully\n--------------------------------------------------------------------------------\n\
    \nNext steps\n  Query the logs of the job:\n    ray job logs raysubmit_U5hfr1rqJZWwJmLP\n\
    \  Query the status of the job:\n    ray job status raysubmit_U5hfr1rqJZWwJmLP\n\
    \  Request the job to be stopped:\n    ray job stop raysubmit_U5hfr1rqJZWwJmLP\n\
    \nTailing logs until the job exits (disable with --no-wait):\n{'memory': 47157884109.0,\
    \ 'object_store_memory': 2147483648.0,\n 'CPU': 16.0, 'node:127.0.0.1': 1.0}\n\
    \n--------------------------------------------------------------------------------\n\
    Job 'raysubmit_U5hfr1rqJZWwJmLP' succeeded\n--------------------------------------------------------------------------------\n\
    ```\n\nYou can use `--no-wait` to run the job in the background.\n\n## Ray Client\n\
    \nTo connect to the cluster via Ray Client from your local machine, first make\
    \ sure the local Ray installation and Python minor version match the Ray and Python\
    \ versions running in the Ray Cluster. To do that, you can run `ray --version`\
    \ and `python --version` on both instances. In practice, you will be using a container,\
    \ in which"

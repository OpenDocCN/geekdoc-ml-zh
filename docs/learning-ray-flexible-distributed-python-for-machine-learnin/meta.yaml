    \      .repartition(10))\n\nds.write_parquet(\"s3://my_bucket/output_predictions\"\
    )\n```\n\nThere are five stages to this process, and each stresses different parts\
    \ of the system:\n\n+   1. Reading from remote storage requires ingress bandwidth\

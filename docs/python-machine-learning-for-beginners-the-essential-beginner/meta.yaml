- md: "## Multivariate Plots: Interaction Among Multiple Variables\n\nAnother type\
    \ of visualization is multi-variable or “multivariate” visualization. With the\
    \ help of multivariate visualization, we can understand interaction between multiple\
    \ attributes of our dataset. The following are some techniques in Python to implement\
    \ multivariate visualization:\n\n## Correlation Matrix Plot\n\nCorrelation is\
    \ an indication about the changes between two variables. In our previous chapters,\
    \ we have discussed Pearson’s Correlation coefficients and the importance of Correlation\
    \ too. We can plot correlation matrix to show which variable is having a high\
    \ or low correlation in respect to another variable.\n\n### Example\n\nIn the\
    \ following example, Python script will generate and plot correlation matrix for\
    \ the Pima Indian Diabetes dataset. It can be generated with the help of `corr()`\
    \ function on Pandas DataFrame and plotted with the help of pyplot.\n\n```python\n\
    from matplotlib import pyplot\nfrom pandas import read_csv\nimport numpy\nPath\
    \ = r'C:\\pima-indians-diabetes.csv'\nnames = ['preg', 'plas', 'pres', 'skin',\
    \ 'test', 'mass', 'pedi', 'age',\n'class']\ndata = read_csv(Path, names=names)\n\
    correlations = data.corr()\nfig = pyplot.figure()\nax = fig.add_subplot(111)\n\
    cax = ax.matshow(correlations, vmin=-1, vmax=1)\nfig.colorbar(cax)\nticks = numpy.arange(0,9,1)\n\
    ax.set_xticks(ticks)\nax.set_yticks(ticks)\nax.set_xticklabels(names)\nax.set_yticklabels(names)\n\
    pyplot.show()\n```\n\n### Output\n\nFrom the above output of correlation matrix,\
    \ we can see that it is symmetrical i.e. the bottom left is same as the top right.\
    \ It is also observed that each variable is positively correlated with each other.\n\
    \n## Scatter Matrix Plot\n\nScatter plots shows how much one variable is affected\
    \ by another or the relationship between them with the help of dots in two dimensions.\
    \ Scatter plots are very much like line graphs in the concept that they use horizontal\
    \ and vertical axes to plot data points.\n\n### Example\n\nIn the following example,\
    \ Python script will generate and plot Scatter matrix for the Pima Indian Diabetes\
    \ dataset. It can be generated with the help of `scatter_matrix()` function on\
    \ Pandas DataFrame and plotted with the help of pyplot.\n\n```python\nfrom matplotlib\
    \ import pyplot\nfrom pandas import read_csv\nfrom pandas.tools.plotting import\
    \ scatter_matrix\npath = r\"C:\\pima-indians-diabetes.csv\"\nnames = ['preg',\
    \ 'plas', 'pres', 'skin', 'test', 'mass', 'pedi', 'age',\n         'class']\n\
    data = read_csv(path, names=names)\nscatter_matrix(data)\npyplot.show()\n```\n\
    \n### Output\n\n## DATA FEATURE SELECTION\n\nThe performance of machine learning\
    \ model is directly proportional to the data features used to train it. The performance\
    \ of ML model will be affected negatively if the data features provided to it\
    \ are irrelevant. On the other hand, use of relevant data features can increase\
    \ the accuracy of your ML model especially linear and logistic regression.\n\n\
    Now the question arise that what is automatic feature selection? It may be defined\
    \ as the process with the help of which we select those features in our data that\
    \ are most relevant to the output or prediction variable in which we are interested.\
    \ It is also called attribute selection.\n\nThe following are some of the benefits\
    \ of automatic feature selection before modeling the data:\n\n- Performing feature\
    \ selection before data modeling will reduce the overfitting.\n- Performing feature\
    \ selection before data modeling will increases the accuracy of ML model.\n- Performing\
    \ feature selection before data modeling will reduce the training time.\n\n##\
    \ Feature Selection Techniques\n\nThe followings are automatic feature selection\
    \ techniques that we can use to model ML data in Python:\n\n## Univariate Selection\n\
    \nThis feature selection technique is very useful in selecting those features,\
    \ with the help of statistical testing, having strongest relationship with the\
    \ prediction variables. We can implement univariate feature selection technique\
    \ with the help of `SelectKBest` class of scikit-learn Python library.\n\n###\
    \ Example\n\nIn this example, we will use Pima Indians Diabetes dataset to select\
    \ 4 of the attributes having best features with the help of chi-square statistical\
    \ test.\n\n```python\nfrom pandas import read_csv\nfrom numpy import set_printoptions\n\
    from sklearn.feature_selection import SelectKBest\nfrom sklearn.feature_selection\
    \ import chi2\npath = r'C:\\pima-indians-diabetes.csv'\nnames = ['preg', 'plas',\
    \ 'pres', 'skin', 'test', 'mass', 'pedi', 'age', 'class']\ndataframe = read_csv(path,\
    \ names=names)\narray = dataframe.values\n```\n\nNext, we will separate array\
    \ into input and output components:\n\n```python\nX = array[:, 0:8]\nY = array[:,8]\n\
    ```\n\nThe following lines of code will select the best features from dataset:\n\
    \n```python\ntest = SelectKBest(score_func=chi2, k=4)\nfit = test.fit(X,Y)\n```\n\
    \nWe can also summarize the data for output as per our choice. Here, we are setting\
    \ the precision to 2 and showing the 4 data attributes with best features along\
    \ with best score of each attribute:\n\n```python\nset_printoptions(precision=2)\n\
    print(fit.scores_)\nfeatured_data = fit.transform(X)\nprint(\"\\nFeatured data:\\\
    n\", featured_data[0:4])\n```\n\n### Output\n\n## Recursive Feature Elimination\n\
    \nAs the name suggests, RFE (Recursive feature elimination) feature selection\
    \ technique removes the attributes recursively and builds the model with remaining\
    \ attributes. We can implement RFE feature selection technique with the help of\
    \ `RFE` class of scikit-learn Python library.\n\n### Example\n\nIn this example,\
    \ we will use RFE with logistic regression algorithm to select the best 3 attributes\
    \ having the best features from Pima Indians Diabetes dataset.\n\n```python\n\
    from pandas import read_csv\nfrom sklearn.feature_selection import RFE\nfrom sklearn.linear_model\
    \ import LogisticRegression\npath = r'C:\\pima-indians-diabetes.csv'\nnames =\
    \ ['preg', 'plas', 'pres', 'skin', 'test', 'mass', 'pedi', 'age',\n         'class']\n\
    dataframe = read_csv(path, names=names)\narray = dataframe.values\n```\n\nNext,\
    \ we will separate the array into its input and output components:\n\n```python\n\
    X = array[:, 0:8]\nY = array[:, 8]\n```\n\nThe following lines of code will select\
    \ the best features from a dataset:\n\n```python\nmodel = LogisticRegression()\n\
    rfe = RFE(model, 3)\nfit = rfe.fit(X, Y)\nprint(\"Number of Features: %d\")\n\
    print(\"Selected Features: %s\")\nprint(\"Feature Ranking: %s\")\n```\n\n### Output\n\
    \n```\nNumber of Features: 3\nSelected Features: [ True False False False False\
    \ True True False]\nFeature Ranking: [1 2 3 5 6 1 1 4]\n```\n\nWe can see in above\
    \ output, RFE choose preg, mass and pedi as the first 3 best features. They are\
    \ marked as 1 in the output.\n\n## Principal Component Analysis (PCA)\n\nPCA,\
    \ generally called data reduction technique, is very useful feature selection\
    \ technique as it uses linear algebra to transform the dataset into a compressed\
    \ form. We can implement PCA feature selection technique with the help of `PCA`\
    \ class of scikit-learn Python library. We can select number of principal components\
    \ in the output.\n\n### Example\n\nIn this example, we will use PCA to select\
    \ best 3 Principal components from Pima Indians Diabetes dataset.\n\n```python\n\
    from pandas import read_csv\nfrom sklearn.decomposition import PCA\npath = r'C:\\\
    pima-indians-diabetes.csv'\nnames = ['preg', 'plas', 'pres', 'skin', 'test', 'mass',\
    \ 'pedi', 'age', 'class']\ndataframe = read_csv(path, names=names)\narray = dataframe.values\n\
    ```\n\nNext, we will separate array into input and output components:\n\n```python\n\
    X = array[:,0:8]\nY = array[:,8]\n```\n\nThe following lines of code will extract\
    \ features from dataset:\n\n```python\npca = PCA(n_components=3)\nfit = pca.fit(X)\n\
    print(\"Explained Variance: %s\" % fit.explained_variance_ratio_)\nprint(fit.components_)\n\
    ```\n\n### Output"
  mdcn: "## 多变量图：多个变量之间的交互\n\n另一种可视化类型是多变量或“多元”可视化。借助多变量可视化，我们可以理解数据集中多个属性之间的交互。以下是在Python中实现多变量可视化的一些技术：\n\
    \n## 相关矩阵图\n\n相关性表示两个变量之间的变化关系。在前面的章节中，我们已经讨论了皮尔逊相关系数以及相关性的重要性。我们可以绘制相关矩阵来显示哪个变量相对于另一个变量具有高或低的相关性。\n\
    \n### 示例\n\n在以下示例中，Python脚本将为皮马印第安人糖尿病数据集生成并绘制相关矩阵。它可以通过Pandas DataFrame的`corr()`函数生成，并借助pyplot进行绘制。\n\
    \n```python\nfrom matplotlib import pyplot\nfrom pandas import read_csv\nimport\
    \ numpy\nPath = r'C:\\pima-indians-diabetes.csv'\nnames = ['preg', 'plas', 'pres',\
    \ 'skin', 'test', 'mass', 'pedi', 'age',\n'class']\ndata = read_csv(Path, names=names)\n\
    correlations = data.corr()\nfig = pyplot.figure()\nax = fig.add_subplot(111)\n\
    cax = ax.matshow(correlations, vmin=-1, vmax=1)\nfig.colorbar(cax)\nticks = numpy.arange(0,9,1)\n\
    ax.set_xticks(ticks)\nax.set_yticks(ticks)\nax.set_xticklabels(names)\nax.set_yticklabels(names)\n\
    pyplot.show()\n```\n\n### 输出\n\n从上面的相关矩阵输出中，我们可以看到它是对称的，即左下角与右上角相同。还观察到每个变量之间都呈正相关。\n\
    \n## 散点矩阵图\n\n散点图通过二维中的点来显示一个变量受另一个变量影响的程度，或它们之间的关系。散点图在概念上与折线图非常相似，它们都使用水平轴和垂直轴来绘制数据点。\n\
    \n### 示例\n\n在以下示例中，Python脚本将为皮马印第安人糖尿病数据集生成并绘制散点矩阵。它可以通过Pandas DataFrame的`scatter_matrix()`函数生成，并借助pyplot进行绘制。\n\
    \n```python\nfrom matplotlib import pyplot\nfrom pandas import read_csv\nfrom\
    \ pandas.tools.plotting import scatter_matrix\npath = r\"C:\\pima-indians-diabetes.csv\"\
    \nnames = ['preg', 'plas', 'pres', 'skin', 'test', 'mass', 'pedi', 'age',\n  \
    \       'class']\ndata = read_csv(path, names=names)\nscatter_matrix(data)\npyplot.show()\n\
    ```\n\n### 输出\n\n## 数据特征选择\n\n机器学习模型的性能与用于训练它的数据特征直接成正比。如果提供给模型的数据特征不相关，ML模型的性能将受到负面影响。另一方面，使用相关的数据特征可以提高ML模型的准确性，特别是线性和逻辑回归模型。\n\
    \n现在问题出现了，什么是自动特征选择？它可以定义为一个过程，通过这个过程我们选择数据中与我们感兴趣的输出或预测变量最相关的特征。它也称为属性选择。\n\n\
    在建模数据之前进行自动特征选择的一些好处如下：\n\n- 在数据建模之前执行特征选择将减少过拟合。\n- 在数据建模之前执行特征选择将提高ML模型的准确性。\n\
    - 在数据建模之前执行特征选择将减少训练时间。\n\n## 特征选择技术\n\n以下是我们可以在Python中用于建模ML数据的自动特征选择技术：\n\n\
    ## 单变量选择\n\n这种特征选择技术在选择那些与预测变量具有最强关系的特征方面非常有用，它借助统计测试来实现。我们可以使用scikit-learn Python库的`SelectKBest`类来实现单变量特征选择技术。\n\
    \n### 示例\n\n在这个例子中，我们将使用皮马印第安人糖尿病数据集，借助卡方统计测试来选择4个具有最佳特征的属性。\n\n```python\nfrom\
    \ pandas import read_csv\nfrom numpy import set_printoptions\nfrom sklearn.feature_selection\
    \ import SelectKBest\nfrom sklearn.feature_selection import chi2\npath = r'C:\\\
    pima-indians-diabetes.csv'\nnames = ['preg', 'plas', 'pres', 'skin', 'test', 'mass',\
    \ 'pedi', 'age', 'class']\ndataframe = read_csv(path, names=names)\narray = dataframe.values\n\
    ```\n\n接下来，我们将数组分离为输入和输出部分：\n\n```python\nX = array[:, 0:8]\nY = array[:,8]\n\
    ```\n\n以下代码行将从数据集中选择最佳特征：\n\n```python\ntest = SelectKBest(score_func=chi2, k=4)\n\
    fit = test.fit(X,Y)\n```\n\n我们也可以根据自己的选择来总结输出数据。在这里，我们将精度设置为2，并显示具有最佳特征的4个数据属性以及每个属性的最佳分数：\n\
    \n```python\nset_printoptions(precision=2)\nprint(fit.scores_)\nfeatured_data\
    \ = fit.transform(X)\nprint(\"\\nFeatured data:\\n\", featured_data[0:4])\n```\n\
    \n### 输出\n\n## 递归特征消除\n\n顾名思义，RFE（递归特征消除）特征选择技术递归地移除属性，并使用剩余属性构建模型。我们可以使用scikit-learn\
    \ Python库的`RFE`类来实现RFE特征选择技术。\n\n### 示例\n\n在这个例子中，我们将使用RFE与逻辑回归算法，从皮马印第安人糖尿病数据集中选择具有最佳特征的前3个属性。\n\
    \n```python\nfrom pandas import read_csv\nfrom sklearn.feature_selection import\
    \ RFE\nfrom sklearn.linear_model import LogisticRegression\npath = r'C:\\pima-indians-diabetes.csv'\n\
    names = ['preg', 'plas', 'pres', 'skin', 'test', 'mass', 'pedi', 'age',\n    \
    \     'class']\ndataframe = read_csv(path, names=names)\narray = dataframe.values\n\
    ```\n\n接下来，我们将数组分离为输入和输出部分：\n\n```python\nX = array[:, 0:8]\nY = array[:, 8]\n\
    ```\n\n以下代码行将从数据集中选择最佳特征：\n\n```python\nmodel = LogisticRegression()\nrfe = RFE(model,\
    \ 3)\nfit = rfe.fit(X, Y)\nprint(\"Number of Features: %d\")\nprint(\"Selected\
    \ Features: %s\")\nprint(\"Feature Ranking: %s\")\n```\n\n### 输出\n\n```\nNumber\
    \ of Features: 3\nSelected Features: [ True False False False False True True\
    \ False]\nFeature Ranking: [1 2 3 5 6 1 1 4]\n```\n\n从上面的输出中，我们可以看到RFE选择了preg、mass和pedi作为前3个最佳特征。它们在输出中被标记为1。\n\
    \n## 主成分分析（PCA）\n\nPCA通常被称为数据降维技术，是一种非常有用的特征选择技术，因为它使用线性代数将数据集转换为压缩形式。我们可以使用scikit-learn\
    \ Python库的`PCA`类来实现PCA特征选择技术。我们可以选择输出中主成分的数量。\n\n### 示例\n\n在这个例子中，我们将使用PCA从皮马印第安人糖尿病数据集中选择最佳的3个主成分。\n\
    \n```python\nfrom pandas import read_csv\nfrom sklearn.decomposition import PCA\n\
    path = r'C:\\pima-indians-diabetes.csv'\nnames = ['preg', 'plas', 'pres', 'skin',\
    \ 'test', 'mass', 'pedi', 'age', 'class']\ndataframe = read_csv(path, names=names)\n\
    array = dataframe.values\n```\n\n接下来，我们将数组分离为输入和输出部分：\n\n```python\nX = array[:,0:8]\n\
    Y = array[:,8]\n```\n\n以下代码行将从数据集中提取特征：\n\n```python\npca = PCA(n_components=3)\n\
    fit = pca.fit(X)\nprint(\"Explained Variance: %s\" % fit.explained_variance_ratio_)\n\
    print(fit.components_)\n```\n\n### 输出"

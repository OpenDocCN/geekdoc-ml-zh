  md: '# Instance based Learning


    Instance based learning method is one of the useful methods that build the ML
    models by doing generalization based on the input data. It is opposite to the
    previously studied learning methods in the way that this kind of learning involves
    ML systems as well as methods that uses the raw data points themselves to draw
    the outcomes for newer data samples without building an explicit model on training
    data.


    In simple words, instance-based learning basically starts working by looking at
    the input data points and then using a'
  merge: -1

  md: '# Multivariate Plots: Interaction Among Multiple Variables


    Another type of visualization is multi-variable or “multivariate” visualization.
    With the help of multivariate visualization, we can understand interaction between
    multiple attributes of our dataset. The following are some techniques in Python
    to implement multivariate visualization:'
  merge: -1
  pgno: 78
- img_proc: true
  md: '# Correlation Matrix Plot


    Correlation is an indication about the changes between two variables. In our previous
    chapters, we have discussed Pearson’s Correlation coefficients and the importance
    of Correlation too. We can plot correlation matrix to show which variable is having
    a high or low correlation in respect to another variable.


    # Example


    In the following example, Python script will generate and plot correlation matrix
    for the Pima Indian Diabetes dataset. It'
  merge: -1
  pgno: 79
- img_proc: true
  md: 'can be generated with the help of corr()

    function on Pandas DataFrame and

    plotted with the help of pyplot.


    ```

    from matplotlib import pyplot

    from pandas import read_csv

    import numpy

    Path = r''C:\pima-indians-diabetes.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'',

    ''class'']

    data = read_csv(Path, names=names)

    correlations = data.corr()

    fig = pyplot.figure()

    ax = fig.add_subplot(111)

    cax = ax.matshow(correlations, vmin=-1, vmax=1)

    fig.colorbar(cax)

    ticks = numpy.arange(0,9,1)

    ax.set_xticks(ticks)

    ax.set_yticks(ticks)

    ax.set_xticklabels(names)

    ax.set_yticklabels(names)

    pyplot.show()

    ```


    # Output'
  merge: -1
  pgno: 80
- img_proc: true
  md: '![](img/38b3fb70f67e4c0792b0f55606127b19_81_0.png)


    From the above output of correlation matrix, we can see that it is symmetrical
    i.e. the bottom left is same as the top right. It is also observed that each variable
    is positively correlated with each other.'
  merge: -1

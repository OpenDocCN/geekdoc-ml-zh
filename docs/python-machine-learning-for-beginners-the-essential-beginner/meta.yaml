  md: '# MACHINE LEARNING METHODS


    There are various ML algorithms, techniques and methods that can be used to build
    models for solving real-life problems by using data. In this chapter, we are going
    to discuss such different kinds of methods.


    # Different Types of Methods


    The following are various ML methods based on some broad categories:


    Based on human supervision'
  merge: -1
  pgno: 42
- img_proc: true
  md: 'In the learning process, some of the methods that are based on human supervision
    are as follows:


    # Supervised Learning


    Supervised learning algorithms or methods are the most commonly used ML algorithms.
    This method or learning algorithm take the data sample i.e. the training data
    and its associated output i.e. labels or responses with each data samples during
    the training process.


    The main objective of supervised learning algorithms is to learn an association
    between input data samples'
  merge: -1
  pgno: 43
- img_proc: true
  md: 'and corresponding outputs after performing multiple training data instances.


    For example, we have x: Input variables and Y: Output variable


    Now, apply an algorithm to learn the mapping function from the input to output
    as follows: Y=f(x)


    Now, the main objective would be to approximate the mapping function so well that
    even when we have new input data (x), we can easily predict the output variable
    (Y) for that new input data.'
  merge: -1
  pgno: 44
- img_proc: true
  md: 'It is called supervised because the whole process of learning can be thought
    as it is being supervised by a teacher or supervisor. Examples of supervised machine
    learning algorithms includes Decision tree, Random Forest, KNN, Logistic Regression
    etc.


    Based on the ML tasks, supervised learning algorithms can be divided into following
    two broad classes:


    +   - Classification

    - Regression'
  merge: -1
  pgno: 45
- img_proc: true
  md: '# Classification


    The key objective of classification-based tasks is to predict categorial output
    labels or responses for the given input data. The output will be based on what
    the model has learned in training phase. As we know that the categorial output
    responses means unordered and discrete values, hence each output response will
    belong to a specific class or category. We will discuss Classification and associated
    algorithms in detail in the upcoming chapters also.'
  merge: -1
  pgno: 46
- img_proc: true
  md: '# Regression


    The key objective of regression-based tasks is to predict output labels or responses
    which are continues numeric values, for the given input data. The output will
    be based on what the model has learned in its training phase. Basically, regression
    models use the input data features (independent variables) and their corresponding
    continuous numeric output values (dependent or outcome variables) to learn specific
    association between inputs and corresponding outputs.


    # Unsupervised Learning'
  merge: -1
  pgno: 47
- img_proc: true
  md: 'As the name suggests, it is opposite to supervised ML methods or algorithms
    which means in unsupervised machine learning algorithms we do not have any supervisor
    to provide any sort of guidance. Unsupervised learning algorithms are handy in
    the scenario in which we do not have the liberty, like in supervised learning
    algorithms, of having pre-labeled training data and we want to extract useful
    pattern from input data.


    For example, it can be understood as follows:


    Suppose we have:'
  merge: -1
  pgno: 48
- img_proc: true
  md: 'x: Input variables, then there would be no corresponding output variable and
    the algorithms need to discover the interesting pattern in data for learning.


    Examples of unsupervised machine learning algorithms includes K-means clustering,
    K- nearest neighbors etc.


    Based on the ML tasks, unsupervised learning algorithms can be divided into following
    broad classes:


    +   - Clustering

    - Association

    - Dimensionality Reduction'
  merge: -1
  pgno: 49
- img_proc: true
  md: '# Clustering


    Clustering methods are one of the most useful unsupervised ML methods. These algorithms
    used to find similarity as well as relationship patterns among data samples and
    then cluster those samples into groups having similarity based on features. The
    real-world example of clustering is to group the customers by their purchasing
    behavior.


    # Association


    Another useful unsupervised ML method is Association which is used to analyze'
  merge: -1
  pgno: 50
- img_proc: true
  md: 'large dataset to find patterns which further represents the interesting relationships
    between various items. It is also termed as Association Rule Mining or Market
    basket analysis which is mainly used to analyze customer shopping patterns.


    # Dimensionality Reduction


    This unsupervised ML method is used to reduce the number of feature variables
    for each data sample by selecting set of principal or representative features.
    A question arises here is that why we need to reduce the dimensionality? The reason
    behind is the problem of feature space'
  merge: -1
  pgno: 51
- img_proc: true
  md: 'complexity which arises when we start analyzing and extracting millions of
    features from data samples. This problem generally refers to “curse of dimensionality”.
    PCA (Principal Component Analysis), K-nearest neighbors and discriminant analysis
    are some of the popular algorithms for this purpose.


    # Anomaly Detection


    This unsupervised ML method is used to find out the occurrences of rare events
    or observations that generally do not occur. By using the learned knowledge, anomaly
    detection methods would be'
  merge: -1
  pgno: 52
- img_proc: true
  md: 'able to differentiate between anomalous or a normal data point. Some of the
    unsupervised algorithms like clustering, KNN can detect anomalies based on the
    data and its features.


    # Semi-supervised Learning


    Such kind of algorithms or methods are neither fully supervised nor fully unsupervised.
    They basically fall between the two i.e. supervised and unsupervised learning
    methods. These kinds of algorithms generally use small supervised learning component
    i.e. small amount of pre-labeled annotated data and large unsupervised learning'
  merge: -1
  pgno: 53
- img_proc: true
  md: 'component i.e. lots of unlabeled data for training. We can follow any of the
    following approaches for implementing semi-supervised learning methods:


    +   - The first and simple approach is to build the supervised model based on
    small amount of labeled and annotated data and then build the unsupervised model
    by applying the same to the large amounts of unlabeled data to get more labeled
    samples. Now, train the model on them and repeat the process.'
  merge: -1
  pgno: 54
- img_proc: true
  md: '+   - The second approach needs some extra efforts. In this approach, we can
    first use the unsupervised methods to cluster similar data samples, annotate these
    groups and then use a combination of this information to train the model.


    # Reinforcement Learning


    These methods are different from previously studied methods and very rarely used
    also. In this kind of learning algorithms, there would be an agent that we want
    to train over a period of time so that it can interact with a specific environment.
    The agent will follow a set of strategies for interacting with the'
  merge: -1
  pgno: 55
- img_proc: true
  md: 'environment and then after observing the environment it will take actions regards
    the current state of the environment. The following are the main steps of reinforcement
    learning methods:


    +   - Step1: First, we need to prepare an agent with some initial set of strategies.

    - Step2: Then observe the environment and its current state.

    - Step3: Next, select the optimal policy regards the current state of the environment
    and perform important action.'
  merge: -1
  pgno: 56
- img_proc: true
  md: '+   - Step4: Now, the agent can get corresponding reward or penalty as per
    accordance with the action taken by it in previous step.

    - Step5: Now, we can update the strategies if it is required so.

    - Step6: At last, repeat steps 2-5 until the agent got to learn and adopt the
    optimal policies.'
  merge: -1
  pgno: 57

- md: '## Why Python for Data Science?


    Python is the fifth most important language as well as most popular language for
    Machine learning and data science. The following are the features of Python that
    makes it the preferred choice of language for data science:


    ### Extensive set of packages


    Python has an extensive and powerful set of packages which are ready to be used
    in various domains. It also has packages like numpy, scipy, pandas, scikit-learn
    etc. which are required for machine learning and data science.


    ### Easy prototyping


    Another important feature of Python that makes it the choice of language for data
    science is the easy and fast prototyping. This feature is useful for developing
    new algorithm.


    ### Collaboration feature


    The field of data science basically needs good collaboration and Python provides
    many useful tools that make this extremely.


    ### One language for many domains


    A typical data science project includes various domains like data extraction,
    data manipulation, data analysis, feature extraction, modelling, evaluation, deployment
    and updating the solution. As Python is a multi-purpose language, it allows the
    data scientist to address all these domains from a common platform.


    ## Components of Python ML Ecosystem


    In this section, let us discuss some core Data Science libraries that form the
    components of Python Machine learning ecosystem. These useful components make
    Python an important language for Data Science. Though there are many such components,
    let us discuss some of the importance components of Python ecosystem here:


    ### Jupyter Notebook


    Jupyter notebooks basically provides an interactive computational environment
    for developing Python based Data Science applications. They are formerly known
    as ipython notebooks. The following are some of the features of Jupyter notebooks
    that makes it one of the best components of Python ML ecosystem:


    - Jupyter notebooks can illustrate the analysis process step by step by arranging
    the stuff like code, images, text, output etc. in a step by step manner.

    - It helps a data scientist to document the thought process while developing the
    analysis process.

    - One can also capture the result as the part of the notebook.

    - With the help of jupyter notebooks, we can share our work with a peer also.


    ### Installation and Execution


    If you are using Anaconda distribution, then you need not install jupyter notebook
    separately as it is already installed with it. You just need to go to Anaconda
    Prompt and type the following command:


    ```

    C:\>jupyter notebook

    ```


    After pressing enter, it will start a notebook server at localhost:8888 of your
    computer. It is shown in the following screen shot:


    ![](img/38b3fb70f67e4c0792b0f55606127b19_27_0.png)


    Now, after clicking the New tab, you will get a list of options. Select Python
    3 and it will take you to the new notebook for start working in it. You will get
    a glimpse of it in the following screenshots:


    ![](img/38b3fb70f67e4c0792b0f55606127b19_28_0.png)


    ![](img/38b3fb70f67e4c0792b0f55606127b19_28_1.png)


    On the other hand, if you are using standard Python distribution then jupyter
    notebook can be installed using popular python package installer, pip.


    ```

    pip install jupyter

    ```


    ### Types of Cells in Jupyter Notebook


    The following are the three types of cells in a jupyter notebook:


    Code cells: As the name suggests, we can use these cells to write code. After
    writing the code/content, it will send it to the kernel that is associated with
    the notebook.


    Markdown cells: We can use these cells for notating the computation process. They
    can contain the stuff like text, images, Latex equations, HTML tags etc.


    Raw cells: The text written in them is displayed as it is. These cells are basically
    used to add the text that we do not wish to be converted by the automatic conversion
    mechanism of jupyter notebook.


    ### NumPy


    It is another useful component that makes Python as one of the favorite languages
    for Data Science. It basically stands for Numerical Python and consists of multidimensional
    array objects. By using NumPy, we can perform the following important operations:


    - Mathematical and logical operations on arrays.

    - Fourier transformation

    - Operations associated with linear algebra.


    We can also see NumPy as the replacement of MatLab because NumPy is mostly used
    along with Scipy (Scientific Python) and Matplotlib (plotting library).


    ### Installation and Execution


    If you are using Anaconda distribution, then no need to install NumPy separately
    as it is already installed with it. You just need to import the package into your
    Python script with the help of following:


    ```

    import numpy as np

    ```


    On the other hand, if you are using standard Python distribution then NumPy can
    be installed using popular python package installer, pip.


    ```

    pip install NumPy

    ```


    After installing NumPy, you can import it into your Python script as you did above.


    ### Pandas


    It is another useful Python library that makes Python one of the favorite languages
    for Data Science. Pandas is basically used for data manipulation, wrangling and
    analysis. It was developed by Wes McKinney in 2008. With the help of Pandas, in
    data processing we can accomplish the following five steps:


    - Load

    - Prepare

    - Manipulate

    - Model

    - Analyze


    ### Data representation in Pandas


    The entire representation of data in Pandas is done with the help of following
    three data structures:


    Series: It is basically a one-dimensional ndarray with an axis label which means
    it is like a simple array with homogeneous data. For example, the following series
    is a collection of integers 1,5,10,15,24,25...


    | 1 | 5 | 10 | 15 | 24 | 25 | 28 | 36 | 40 | 89 |


    Data frame: It is the most useful data structure and used for almost all kind
    of data representation and manipulation in pandas. It is basically a two-dimensional
    data structure which can contain heterogeneous data. Generally, tabular data is
    represented by using data frames. For example, the following table shows the data
    of students having their names and roll numbers, age and gender:


    | Name | Roll number | Age | Gender |

    |---|---|---|---|

    | Aarav | 1 | 15 | Male |

    | Harshit | 2 | 14 | Male |

    | Kanika | 3 | 16 | Female |

    | Mayank | 4 | 15 | Male |


    Panel: It is a 3-dimensional data structure containing heterogeneous data. It
    is very difficult to represent the panel in graphical representation, but it can
    be illustrated as a container of DataFrame.


    The following table gives us the dimension and description about above mentioned
    data structures used in Pandas:


    | Data Structure | Dimension | Description |

    | :--- | :--- | :--- |

    | Series | 1-D | Size immutable, 1-D homogeneous data |

    | DataFrames | 2-D | Size Mutable, Heterogeneous data in tabular form |

    | Panel | 3-D | Size-mutable array, container of DataFrame. |


    We can understand these data structures as the higher dimensional data structure
    is the container of lower dimensional data structure.


    ### Installation and Execution


    If you are using Anaconda distribution, then no need to install Pandas separately
    as it is already installed with it. You just need to import the package into your
    Python script with the help of following:


    ```

    import pandas as pd

    ```


    On the other hand, if you are using standard Python distribution then Pandas can
    be installed using popular python package installer, pip.


    ```

    pip install Pandas

    ```'
  mdcn: '## 为什么选择Python进行数据科学？


    Python是第五重要的语言，也是机器学习和数据科学领域最受欢迎的语言。以下是Python的特性，使其成为数据科学的首选语言：


    ### 丰富的软件包


    Python拥有广泛而强大的软件包，可随时用于各个领域。它还包含机器学习和数据科学所需的软件包，如numpy、scipy、pandas、scikit-learn等。


    ### 易于原型开发


    Python的另一个重要特性是易于快速原型开发，这使其成为数据科学的选择语言。此特性对于开发新算法非常有用。


    ### 协作特性


    数据科学领域基本上需要良好的协作，Python提供了许多有用的工具，使协作变得极其便捷。


    ### 一门语言，多个领域


    一个典型的数据科学项目包括多个领域，如数据提取、数据处理、数据分析、特征提取、建模、评估、部署和更新解决方案。由于Python是一种多用途语言，它允许数据科学家从一个通用平台处理所有这些领域。


    ## Python机器学习生态系统组件


    在本节中，我们将讨论一些核心数据科学库，它们构成了Python机器学习生态系统的组件。这些有用的组件使Python成为数据科学的重要语言。虽然有许多这样的组件，但让我们在这里讨论Python生态系统的一些重要组件：


    ### Jupyter Notebook


    Jupyter笔记本基本上提供了一个交互式计算环境，用于开发基于Python的数据科学应用程序。它们以前被称为ipython笔记本。以下是Jupyter笔记本的一些特性，使其成为Python机器学习生态系统的最佳组件之一：


    - Jupyter笔记本可以通过逐步安排代码、图像、文本、输出等内容来逐步说明分析过程。

    - 它帮助数据科学家在开发分析过程中记录思考过程。

    - 也可以将结果作为笔记本的一部分捕获。

    - 借助Jupyter笔记本，我们还可以与同行分享我们的工作。


    ### 安装和执行


    如果您使用的是Anaconda发行版，则无需单独安装Jupyter笔记本，因为它已经随附安装。您只需转到Anaconda提示符并键入以下命令：


    ```

    C:\>jupyter notebook

    ```


    按下回车键后，它将在您计算机的localhost:8888上启动一个笔记本服务器。如下图所示：


    ![](img/38b3fb70f67e4c0792b0f55606127b19_27_0.png)


    现在，单击“新建”选项卡后，您将获得一个选项列表。选择Python 3，它将带您进入新笔记本以开始工作。您将在以下截图中看到其概览：


    ![](img/38b3fb70f67e4c0792b0f55606127b19_28_0.png)


    ![](img/38b3fb70f67e4c0792b0f55606127b19_28_1.png)


    另一方面，如果您使用的是标准Python发行版，则可以使用流行的Python包安装程序pip安装Jupyter笔记本。


    ```

    pip install jupyter

    ```


    ### Jupyter Notebook中的单元格类型


    以下是Jupyter笔记本中的三种单元格类型：


    代码单元格：顾名思义，我们可以使用这些单元格编写代码。编写代码/内容后，它会将其发送到与笔记本关联的内核。


    Markdown单元格：我们可以使用这些单元格来注释计算过程。它们可以包含文本、图像、Latex方程、HTML标签等内容。


    原始单元格：其中的文本将按原样显示。这些单元格基本上用于添加我们不希望被Jupyter笔记本的自动转换机制转换的文本。


    ### NumPy


    这是另一个有用的组件，使Python成为数据科学的首选语言之一。它基本上代表数值Python，包含多维数组对象。通过使用NumPy，我们可以执行以下重要操作：


    - 数组上的数学和逻辑运算。

    - 傅里叶变换

    - 与线性代数相关的操作。


    我们也可以将NumPy视为MatLab的替代品，因为NumPy通常与Scipy（科学Python）和Matplotlib（绘图库）一起使用。


    ### 安装和执行


    如果您使用的是Anaconda发行版，则无需单独安装NumPy，因为它已经随附安装。您只需借助以下命令将包导入Python脚本：


    ```

    import numpy as np

    ```


    另一方面，如果您使用的是标准Python发行版，则可以使用流行的Python包安装程序pip安装NumPy。


    ```

    pip install NumPy

    ```


    安装NumPy后，您可以像上面一样将其导入Python脚本。


    ### Pandas


    这是另一个有用的Python库，使Python成为数据科学的首选语言之一。Pandas基本上用于数据操作、整理和分析。它由Wes McKinney于2008年开发。借助Pandas，在数据处理中我们可以完成以下五个步骤：


    - 加载

    - 准备

    - 操作

    - 建模

    - 分析


    ### Pandas中的数据表示


    Pandas中的整个数据表示借助以下三种数据结构完成：


    Series：它基本上是一个带有轴标签的一维ndarray，这意味着它就像一个包含同质数据的简单数组。例如，以下系列是整数1,5,10,15,24,25...的集合。


    | 1 | 5 | 10 | 15 | 24 | 25 | 28 | 36 | 40 | 89 |


    DataFrame：它是最有用的数据结构，几乎用于pandas中所有类型的数据表示和操作。它基本上是一个二维数据结构，可以包含异构数据。通常，表格数据使用数据框表示。例如，下表显示了具有姓名、学号、年龄和性别的学生数据：


    | 姓名 | 学号 | 年龄 | 性别 |

    |---|---|---|---|

    | Aarav | 1 | 15 | 男 |

    | Harshit | 2 | 14 | 男 |

    | Kanika | 3 | 16 | 女 |

    | Mayank | 4 | 15 | 男 |


    Panel：它是一个包含异构数据的三维数据结构。在图形表示中表示Panel非常困难，但可以将其说明为DataFrame的容器。


    下表给出了Pandas中使用的上述数据结构的维度和描述：


    | 数据结构 | 维度 | 描述 |

    | :--- | :--- | :--- |

    | Series | 1-D | 大小不可变，一维同质数据 |

    | DataFrames | 2-D | 大小可变，表格形式的异构数据 |

    | Panel | 3-D | 大小可变的数组，DataFrame的容器。 |


    我们可以理解这些数据结构，因为更高维度的数据结构是更低维度数据结构的容器。


    ### 安装和执行


    如果您使用的是Anaconda发行版，则无需单独安装Pandas，因为它已经随附安装。您只需借助以下命令将包导入Python脚本：


    ```

    import pandas as pd

    ```


    另一方面，如果您使用的是标准Python发行版，则可以使用流行的Python包安装程序pip安装Pandas。


    ```

    pip install Pandas

    ```'

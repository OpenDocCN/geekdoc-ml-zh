  md: '# DATA FEATURE SELECTION


    The performance of machine learning model is directly proportional to the data
    features used to train it. The performance of ML model will be affected negatively
    if the data features provided to it are irrelevant. On the other hand, use of
    relevant data features can increase the accuracy of your ML model especially linear
    and logistic regression.


    Now the question arise that what is automatic feature selection? It may be defined
    as the process with the help of which we select those features in our data that
    are most relevant to the output'
  merge: -1
  pgno: 85
- img_proc: true
  md: 'or prediction variable in which we are interested. It is also called attribute
    selection.


    The following are some of the benefits of automatic feature selection before modeling
    the data:


    +   - Performing feature selection before data modeling will reduce the overfitting.

    - Performing feature selection before data modeling will increases the accuracy
    of ML model.'
  merge: -1
  pgno: 86
- img_proc: true
  md: '+   - Performing feature selection before data modeling will reduce the training
    time


    # Feature Selection Techniques


    The followings are automatic feature selection techniques that we can use to model
    ML data in Python:


    # Univariate Selection


    This feature selection technique is very useful in selecting those features, with
    the help of statistical testing, having strongest relationship with the prediction'
  merge: -1
  pgno: 87
- img_proc: true
  md: 'variables. We can implement univariate feature selection technique with the
    help of SelectKBest0class of scikit-learn Python library.


    Example:


    In this example, we will use Pima Indians Diabetes dataset to select 4 of the
    attributes having best features with the help of chi-square statistical test.


    ```

    from pandas import read_csv

    from numpy import set_printoptions


    from sklearn.feature_selection import SelectKBest

    ```


    ```

    from sklearn.feature_selection import chi2

    path = r''C:\pima-indians-diabetes.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(path, names=names)

    array = dataframe.values

    ```'
  merge: -1
  pgno: 88
- img_proc: true
  md: 'Next, we will separate array into input and output components:


    ```

    X = array[:, 0:8]

    Y = array[:,8]

    ```


    The following lines of code will select the best features from dataset:


    ```

    test = SelectKBest(score_func=chi2, k=4)

    fit = test.fit(X,Y)

    ```


    We can also summarize the data for output as per our choice. Here, we are setting
    the precision to 2 and showing the 4 data attributes with best features along
    with best score of each attribute:'
  merge: -1
  pgno: 89
- img_proc: true
  md: '```

    set_printoptions(precision=2)

    print(fit.scores_)

    featured_data = fit.transform(X)

    print("\nFeatured data:\n", featured_data[0:4])

    ```


    # Output


    ![](img/38b3fb70f67e4c0792b0f55606127b19_90_0.png)


    # Recursive Feature Elimination



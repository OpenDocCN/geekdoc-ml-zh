  md: '# Based on learning ability


    In the learning process, the following are some methods that are based on learning
    ability:


    # Batch Learning


    In many cases, we have end-to-end Machine Learning systems in which we need to
    train the model in one go by using whole available training data. Such kind of
    learning method or algorithm is called Batch or Offline learning. It is called
    Batch or Offline learning because it is a one-time procedure and the model will
    be trained with data in one single'
  merge: -1
  pgno: 59
- img_proc: true
  md: 'batch. The following are the main steps of Batch learning methods:


    Step1: First, we need to collect all the training data for start training the
    model.


    Step2: Now, start the training of model by providing whole training data in one
    go.


    Step3: Next, stop learning/training process once you got satisfactory results/performance.


    Step4: Finally, deploy this trained model into production. Here, it will predict
    the output for new data sample.'
  merge: -1
  pgno: 60
- img_proc: true
  md: '# Online Learning


    It is completely opposite to the batch or offline learning methods. In these learning
    methods, the training data is supplied in multiple incremental batches, called
    mini- batches, to the algorithm. Followings are the main steps of Online learning
    methods:


    Step1: First, we need to collect all the training data for starting training of
    the model.


    Step2: Now, start the training of model by providing a mini-batch of training
    data to the algorithm.'
  merge: -1
  pgno: 61
- img_proc: true
  md: 'Step3: Next, we need to provide the mini-batches of training data in multiple
    increments to the algorithm.


    Step4: As it will not stop like batch learning hence after providing whole training
    data in mini-batches, provide new data samples also to it.


    Step5: Finally, it will keep learning over a period of time based on the new data
    samples.


    # Based on Generalization Approach


    In the learning process, followings are some methods that are based on generalization
    approaches:'

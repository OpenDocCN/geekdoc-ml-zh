    # Principal Component Analysis (PCA)


    PCA, generally called data reduction technique, is very useful feature selection
    technique as it uses linear algebra to transform the dataset into a compressed
    form. We can implement PCA feature selection technique with the help of PCA class
    of scikit-learn Python'
  merge: -1
  pgno: 93
- img_proc: true
  md: 'library. We can select number of principal components in the output.


    Example:


    In this example, we will use PCA to select best 3 Principal components from Pima
    Indians Diabetes dataset.


    ```

    python

    from pandas import read_csv

    from sklearn.decomposition import PCA

    path = r''C:\pima-indians-diabetes.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(path, names=names)

    array = dataframe.values

    ```


    Next, we will separate array into input and output components:'

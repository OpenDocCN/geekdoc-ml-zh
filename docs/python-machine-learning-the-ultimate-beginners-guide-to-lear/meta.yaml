    # # Chapter 13: Machine Learning Models


    There are many models of machine learning. These theoretical models describe the
    heuristics used to accomplish the ideal, allowing the machines to learn on their
    own.


    # ## Decision Tree


    The decision tree technique is one of the most commonly used ML techniques. Either
    formally or informally, we decide on a single course of action from many possibilities
    based on previous experience. The possibilities look like branches, and we take
    one of them and reject the others.


    The decision tree model gets its name from the shape created when its decision
    processes are drawn out graphically. A decision tree offers a great deal of flexibility
    in terms of what input values it can receive. The tree’s outputs can take the
    form of a category, binary, or numerical data. The strength of decision trees
    is in how the degree of influence of different input variables can be determined
    by the level of decision nodes in which they are considered.


    A big weakness of decision trees is the fact that every decision boundary is a
    forced binary split. There is no nuance. Each decision is either yes or no, one
    or zero. Moreover, the decision criteria can consider only a single variable at
    a time. There cannot be a combination of more than one input variable.


    Decision trees cannot be updated incrementally, which means a trained training
    set cannot be used for new data. Instead, a new one has to be created to work
    with new training data.


    Ensemble methods address many tree limitations. In essence, the ensemble method
    uses more than one tree to increase output accuracy. There are two main ensemble
    methods — bagging and boosting.


    The bagging ensemble method, also known as Bootstrap Aggregation, is meant to
    reduce decision tree variance. The training data is broken up randomly into subsets,
    and each subset is used to train a decision tree. The results from all trees are
    averaged, providing a more robust predictive accuracy than any single tree on
    its own.


    The boosting ensemble method resembles a multi-stage rocket. The main booster
    of a rocket supplies the vehicle with a large amount of inertia. When its fuel
    is spent, it detaches, and the second stage combines its acceleration to the inertia
    already imparted to the rocket and so on.


    For decision trees, the first tree operates on the training data and produces
    its output. The next tree uses the earlier tree’s output as its input. When the
    input is in error, the weighting it is given makes it more likely the next tree
    will identify and at least partially mitigate this error. The end result of the
    run is a strong learner emerging from a series of weaker learners.


    # ## Linear Regression


    The premise of linear regression methods rests on the assumption that the output,
    a numeric value, may be expressed as a combination of the input variable set,
    which will also be a numeric value.


    A simple example might look like this:

    x = a1y1, a2y2, a3y3

    Where x is the output, a1, a2, a3, and so on, these are the weights that are accorded
    to each input.

    Y’s values would be the inputs.


    A weakness of the linear regression model is the fact that it assumes linear input
    features, which might not be the case. Inputs must be tested mathematically for
    linearity.


    # ## K-Means Clustering Algorithm


    K-means is an unsupervised machine learning algorithm for cluster analysis. It
    is an iterative, non-deterministic method. The algorithm operates on data sets
    using predefined clusters. Clusters are like categories; for example, if you were
    searching for shoes with the search term “Nike,” the search would return all the
    pages containing Nike shoes. But the word “Nike” has more than one classification
    as it also pertains to clothes, and other items branded under the trade name.
    The K-Means clustering algorithm is used to group results with similar concepts.
    Thus, the algorithm will group all results that pertain to Nike shoes into one
    cluster, all results that pertain to Nike shirts in another, and so on.


    # ### K-Means Clustering Applications


    K-Means Clustering algorithms are used by most web search engines to cluster web
    pages by similarity and to identify the relevance of search results. K-Mean clustering
    is a valuable tool in any application where unstructured data needs to be divided
    into meaningful categories.



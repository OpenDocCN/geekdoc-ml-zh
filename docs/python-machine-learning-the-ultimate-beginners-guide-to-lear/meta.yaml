  md: '# Chapter 16:

    Machine Learning and the Future


    For all the negative press and doubts, the future of machine learning and AI are
    very real but also not as bad as one may think. There is enormous potential for
    this field. There are systems to make human life better, safer, and more comfortable.


    These future machine learning systems include the following:


    # Security


    Facial recognition and aberrant behavior detection, are the toolkits from machine
    learning that are available today. They will become ubiquitous in the future,
    protecting the public from criminal behavior and getting people in trouble the
    help they need.


    In the cyber world, machine learning will grow and increase its influence in identifying
    cyber-attacks, malicious software code, and unexpected communication attempts.
    At the same time, dark hat software crackers are also working on machine learning
    tools to aid them in breaking into networks, accessing private data, and causing
    service disruptions. The future of the cyber world will be an ongoing war between
    white and black hat machine learning tools, much like the war of good and evil
    anywhere in the world really.


    Another sweeping change to security would be autonomous drones controlled by machine
    learning algorithms. Drones can maintain constant aerial surveillance over entire
    cities at very little cost. With advancements in image recognition, motion capture,
    video recognition, and natural language processing, they will be able to communicate
    with people on the street, respond to natural disasters, and automobile accidents.
    They will also be able to ferry medications needed in emergency situations where
    traditional service vehicles cannot gain access. They will be able to find and
    rescue lost hikers by leading them to safety, delivering them needed supplies,
    and alerting authorities of their GPS location.


    # Markets


    The rise of machine learning will generate completely new artificial intelligence-based
    products and services. Entire industries will be created to service this new software,
    as well as new products to be added to the Internet of Things. This may include
    a whole new generation of robots complete with learning algorithms and the ability
    to see, hear, and communicate by using natural language.


    # Retail


    In the retail sector, service ML creates a more personalized and all-around better
    customer service. Machines do not have moods or are influenced by their surroundings
    as easily as humans are. If they are able to learn they can quickly adjust and
    adapt to the customers’ needs with a few short questions. Instead of merely showing
    a person what they want, machine learning will be dedicated to showing them what
    they need.


    A smart algorithm looking out for a person''s well-being, for instance, would
    not throw more and more fast food ads at an at-risk consumer. Instead, reminders
    about their health, coupons for gym memberships, or recipes for their favorite
    salads might become part of the artificial intelligence toolkit for notifications.
    Machine learning will help to balance people’s lives in many ways by using knowledge
    about general health, and even their own medical records, to provide information
    about not only what they want, but also what they might need.


    # Healthcare


    Machine learning will know almost everything about a person through records on
    the Internet and records that have been captured from a visit to the doctor. These
    records would not only be for the patient’s benefit but for the doctor’s or healthcare
    provider’s. A person not wearing the medic-alert badge could be saved by their
    healthcare records for instance.


    On the diagnostic side, machine learning will do the busy work it is best at:
    examining our x-rays, blood-work, mammograms, and so on, looking for patterns
    human beings cannot see. This will afford pre-emptive diagnostic information to
    doctors so they can head off serious illness at early stages or prevent them altogether.


    Many if not most surgeries will be performed by artificial intelligence-enabled
    robots, either assisting human surgeons, being supervised by them, or even, eventually,
    working fully autonomously.


    Machine learning will be able to more effectively monitor things such as blood
    gasses under anesthesia, heart rate, and other health measures during operations.
    They are able to react in milliseconds should something appear to be wrong. Iatrogenic
    disease will decrease dramatically, if not disappear completely.


    # The Environment and Sustainability


    Machine learning will be able to study the movement of people in cities, what
    they use and don’t use, their patterns'
  merge: -1
  pgno: 78
- img_proc: true
  md: 'of use, how they travel, and where. Deep learning from this data will allow
    city planners to employ machine learning algorithms to design and construct both
    more efficient and pleasant cities. It will allow massive increases in density
    without sacrificing quality of life. These efficiencies will reduce or even possibly
    eliminate net carbon emissions from cities.


    # Augmented Reality


    When wearing Google, Microsoft, Apple, or Facebook glasses in the future, the
    embedded processes, video capture, audio capture, and microphones on these devices
    will do much more than give directions to find a location. Machine learning will
    be able to see what we see and provide explanations along with predictive guidance
    throughout our day. Imagine having your day “painted” with relevant information
    on interior walls and doors, and outside on buildings with signs, guiding you
    through your schedule topped off with the information you need when you need it.


    # Information Technology


    Machine learning will become a tool people and businesses can apply as needed
    like SaaS. This MLaaS will allow software to be aware of its surroundings, to
    see people, to hear people, and speak to people in a natural language. Connected
    to the Internet, every device will become smart, and generate an ecosphere around
    people that attends to their needs and concerns, often before they even realize
    they have them. These “Cognitive Services” will provide APIs and SDKs, leading
    to rapid “smart” software development and deployment.


    Specialized hardware will increase the speed of machine learning training, as
    well as increase its speed in servicing the public. Dedicated AI chips will bring
    about a huge change in artificial intelligence speed and ubiquity.


    Microcomputers will come equipped with machine learning capabilities so that even
    the smallest device will be able to understand its surroundings. Where there is
    no convenient power supply, these devices will run on dime-sized batteries, lasting
    for months or years of service before needing replacement.


    # Trust Barriers


    Natural speech means we will be able to talk to our devices and be understood
    by them. The current trust barriers between some people, business sectors, and
    governments will slowly break down as machine learning demonstrates its reliability
    and effectiveness. Improved unsupervised learning will reduce the time required
    to develop new machine learning software with required specifications.


    # Conclusion


    The impact of machine learning on our world is already ubiquitous. Our cars, our
    phones, our houses, and so much more are already being controlled and maintained
    through rudimentary machine learning systems. But in the future, machine learning
    will radically change the world. Some of those changes are easy to predict. In
    the next decade or two, people will no longer drive cars. Instead, automated cars
    will drive people. But in many other ways, the effect of machine learning on our
    world is difficult to predict.


    ML and AI raise many questions such as:


    +   - Will machine learning algorithms replace so many jobs, from trucking to
    accounting to many other disciplines?

    - If so, what will there be left for humans to do?

    - In 100 years, will there be work for anyone at all?


    For all our advancements on the topics, the fact is we don’t know the answer to
    questions like these. So far there is no limit to what machine learning can accomplish,
    given time and data and the will to use it to achieve a particular task. If machines
    do advance to such limits as anticipated, things will still be done, such as food
    will still be grown, picked, and delivered. The difference will be in how the
    food is being grown, picked, and delivered.


    The only real certainty about artificial intelligence and machine learning is
    that it is increasing in both speed of deployment and in areas of influence. It
    promises many benefits and many radical changes in our society. In order to not
    get left behind, it stands to reason that learning and growing with ML and AI
    gives a person a greater edge and foothold on the future.


    # Machine Learning Recap


    In conclusion, machine learning is a branch of artificial intelligence that involves
    the design and development of systems capable of showing an improvement in performance
    based on their previous experiences. This means that, when reacting to the same
    situation, a machine should show improvement from time to time.


    With machine learning, software systems are able to predict accurately without
    having to be programmed explicitly.'

    For this exercise you are going to use **Python 3.8.3**.

    Choose the version from the “**Active Python Releases**” or click on the “**Download
    Python 3.8.3**” button beneath the “**Download the latest version for Windows**”
    section. Make sure it is the 64-bit version, as the current version of TensorFlow
    works best with the 64-bit.


    The file will download into the “Downloads” folder on your computer.


    Check that the file is there once the download has been completed.


    ## Installing Python on Windows


    From the “Downloads” folder, double click on the “python-3.8.3” executable file.

    Click on the “Run” button from the “Open File - Security Warning” dialogue box
    that will appear.

    Make sure to tick the “Add Python 3.9 to Path” at the bottom of the “Install Python
    3.8.3 (xx-bit)” screen. Keep the default installation directory, unless you are
    a more advanced user and would like to install the software in another location.
    For the sake of this training exercise, the default directory has not been changed
    to simplify the process.

    Click the “Install Now” option on the “Install Python 3.8.3 (xx-bit)” screen.


    If the “Access Control” warning screen comes up, click on “Yes” to allow the application
    permission to install on the system.

    The “**Setup Progress**” screen will appear with the installation progress for
    installing Python.


    When Python is finished installing the “**Setup was successful**” screen will
    appear. Python will now be installed on your system.


    ### Setting Up the Python Environment


    You will need to check to see if Python is running on the system. If you did not
    tick the “Add Python to Path” box, you will need to add it to the **System Environment
    Variable** path. To check if it was put into the **System Environment Variable**
    path, go to the “**Control Panel - System and Security - System Properties.**”


    Click on the “**Advanced**” tab.


    Click on the “**Environment Variables**” button.


    Click on “**Path**” under “System variables” and then the “**Edit**” button.


    For systems earlier than Windows 10, you will need to place your cursor at the
    end of the “**Variable value**” path to check if the following line (or similar,
    depending on where you installed Python) appears. For Windows 10 you will add
    a new path to the list of variables.


    The following variable path should appear in the “**Variable value**” box:


    ```

    ;C:\Python\Python 38-32

    ```


    If there is no reference to the Python.exe file, find the path to the Python executable
    file and type it in here as per the example above. **NOTE:** Do not forget to
    separate each system path variable entry with a “;” for Windows OS earlier than
    Windows 10, or it will create problems and not pick up the application. When you
    are done checking the System path variable click “**OK**” until you have exited
    the **System Variable** screen. You can also close down the “**Control Panel**”
    before moving on to test the Python installation.


    From the Start menu, type **cmd** in the search box and hit enter. This will load
    the command line screen to test that the Python installation installed correctly
    and can be accessed. The following screen (or similar) will appear:


    To test the Python installation type the following into the command line:


    ```

    python --version

    ```


    The following or similar should appear on the screen:


    The version of Python that was recently installed on the machine should appear
    beneath the command you typed in. If it does not appear there, you will need to
    check the **System Variable Path**.


    There are a few ways to load the Python command line:


    - Create a desktop shortcut

    - Access Idle or the Python command line from the “**Start**” menu “**Programs**”
    option

    - Access Python through the **DOS** command line using **cmd** from the “**Start**”
    menu **run/search** facility.


    For the sake of this exercise the **cmd** option is going to be used.


    From the cmd command line prompt type:


    ```

    python

    ```


    If you are going to be using Python you will need to use **pip** (Preferred Installer
    Program). **Pip** is the package installer for Python and if you have Python version
    2.7 and higher, it should already be installed with Python. To check that **pip**
    is installed, type the following into the Python command line:


    ```

    pip --version

    ```


    It should return the version of pip. If it is older than 20.1.1 (the new version
    at the time of writing this book is version 20.1.1) then **pip** will need to
    be upgraded. In order to be able to run **pip** from the command line, you can
    add the **pip** program path to the System Environment Variable Path as you did
    for the Python executable. The **pip** executable file is usually found in the
    following Python directory:


    ```

    <Python installation path>\Python\Python38-32\Scripts

    ```


    To upgrade **pip** type the following into the command line prompt:


    ```

    python -m pip install --upgrade pip

    ```


    When the **pip** upgrade is finished type:


    ```

    pip --version

    ```


    The version should be 20.1.1


    The Python **pip** utility should now be the latest version.


    ## Install NumPy With Pip


    Now you need to check if the NumPy library is installed. NumPy is needed for the
    support of matrices, high-level math functions, and multi-dimensional arrays that
    are large. You can check if NumPy was pre-installed with Python by using the following
    test on the Python command line:


    ```

    import numpy

    ```


    If the command line returns an error “**No module named ‘numpy’**” you will need
    to get the library. At the command line prompt type the following:


    ```

    pip install numpy

    ```


    If you have pip loaded and referenced correctly in the System Variable Path, pip
    will download and install the NumPy library as per the image below.


    ## Install SciPy With Pip


    Now you need to check if the SciPy library is installed. You can check if SciPy
    was pre-installed with Python by using the following test on the Python command
    line:


    ```

    import scipy

    ```


    If the command line returns an error “**No module named ‘scipy’**” you will need
    to get the library. At the command line prompt type the following:


    ```

    pip install scipy

    ```


    If you have **pip** loaded and referenced correctly in the System Variable Path,
    **pip** will download and install the SciPy library as per the image below.


    ## Installing Anaconda


    The latest version of Anaconda is 3.7 and it can be retrieved from the Anaconda.com
    website. For the sake of this book, version 3.7 64-bit will be used to keep the
    book up to date at time of print. The 64-bit version is advisable as TensorFlow
    works best with 64-bit. As TensorFlow is open source software, it is free to download
    and use.

    If you already have Anaconda installed on your machine, you can use it to follow
    along as long as it is 2.7 or higher. It is good to note that there may be differences
    between the earlier versions and the current ones. Please check the Anaconda.com
    website for more details on the differences between the versions.


    ## Download Anaconda


    On the Anaconda.com website, scroll down the page until you find the “**Downloads**”
    button.


    There is an option to download earlier releases under the “**Anaconda Installers**”
    section of the page.


    For this exercise you are going to use the **Python 3.7** version which relates
    to your machine (i.e. 32-bit or 64-bit). Choose the version from the “**Anaconda
    Installers**” screen and it will start to download the installer file into the
    “**Downloads**” folder on the machine.


    Check that the file is there once the download has been completed.


    ## Installing Anaconda on Windows


    From the “**Downloads**” folder, double click on the “**Anaconda3.2020.02-Windows-xx**”
    executable file. Click on the “**Run**” button from the “**Open File - Security
    Warning**” dialogue box that will appear.'

  md: '# # Chapter 5:

    ## K-Nearest Neighbors (KNN) Algorithm


    To build more complex classifiers, the KNN algorithm is the most popular. Having
    outperformed many powerful classifiers, it remains one of the most simple algorithms.
    The simplicity of the KNN algorithm is the reason why it is used in numerous applications
    of data compression, economic forecasting, and genetics. The algorithm can be
    used for solving both regression and classification problems. It is a supervised
    learning algorithm.


    The KNN algorithm is the best place to start when you are learning machine language
    as it is an easy concept to grasp and is the basis for a lot of ML concepts.


    ![](img/989db6cb032c6b8914db5e5a7c2b4a41_37_0.png)


    Machine learning models use available data of past examples to learn from and
    then to make predicted outcomes based on certain input criteria. For instance,
    when you are teaching a child to learn, you teach them how to differentiate between
    two similar objects by their characteristics. An example would be teaching a child
    the difference between a chicken and a duck. You would show them a picture then
    add a few characteristics for each. These characteristics could include things
    such as:


    +   - A chicken has feathers, claws, and a beak.

    - A duck has feathers, a bill, and webbed feet.

    - A chicken clucks.

    - A duck quacks.


    If you showed the child a picture of a duck, they would then be able to use those
    characteristics to determine that the picture is of a duck.


    Similar to teaching a child how to differentiate and recognize objects, the KNN
    model data set is made up of training observations (x, y). Using information that
    has been input or made available for the ML model, the KNN model has to determine
    the relationship between x and y to predict an outcome. For instance, if x is
    given a value the algorithm needs to predict what the corresponding value for
    y should be. If you input the value quack (x), the KNN algorithm uses the list
    of characteristics available in its data sets to determine it should look at data
    for a duck (y).


    The KNN model will get to the predicted outcome of the “quack” being a duck because
    the model is based on feature similarities. It will group characteristics based
    on their similarities, which is why a KNN classifier can be used for classification
    of features. For instance, a duck and a chicken have feathers. So, they can be
    grouped as birds. However there are different species and subspecies of birds.
    While most birds have feathers, there are a few species that have webbed feet,
    and most water birds have them. But, only a duck quacks, has webbed feet, and
    feathers. Therefore the predicted outcome would be a duck based on **feature similarity**.


    The KNN model is most commonly used to classify a data point. It does this based
    on the classification of its nearest neighbors. For example, is it a chicken or
    not? The KNN model builds on its current data set by classifying'

    \ the Lift Chart, or Area Under the Curve (AUC) are other methods that you can\
    \ use to decide whether to reject or accept a model.\n\n# Chapter 5: K-Nearest\
    \ Neighbors (KNN) Algorithm\n\nTo build more complex classifiers, the KNN algorithm\

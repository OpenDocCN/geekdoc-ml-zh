  md: "# # Chapter 6: Using TensorFlow\n\nTo use TensorFlow you have to understand\
    \ the concept of Deep Learning, which was touched on briefly at the beginning\
    \ of this book. It is part of Machine Learning that mimics the functions of the\
    \ human brain.\n\nBy using complex algorithms, deep learning models learn from\
    \ unstructured data to train a neural network. A neural network typically consists\
    \ of an input layer and an output layer with various hidden layers in between.\
    \ Deep learning is where artificial intelligence begins. Any neural network with\
    \ more than 3 hidden layers is known as a deep neural network.\n\n# ## The Layers\
    \ of a Neural Network and Their Functions\n\n+   - **Input Layer** — The input\
    \ layer accepts various inputs such as large volumes of data or pixel layers of\
    \ an image, for example. It passes the input on to the hidden layer(s) of the\
    \ neural network.\n- **Hidden Layer(s)** — The hidden layer(s) accepts the input\
    \ data and processes it by performing complex algorithms, operations, and feature\
    \ extraction. Hidden layers have weights and biases that are continuously updated\
    \ during the training process. There are different neurons, each of which has\
    \ multiple weights and one bias (variables).\n- **Output Layer** — The output\
    \ layer outputs the predicted outcome.\n\n# ## Deep Learning Libraries\n\nThere\
    \ are many deep learning libraries that can be used for machine learning models.\
    \ This book uses TensorFlow, which offers many APIs that can be used to work with\
    \ TensorFlow.\n\nAt the beginning of this book you were introduced to what TensorFlow\
    \ is. It was created by Google as an open source library that can be used for\
    \ both traditional mesh learning and deep learning. When TensorFlow was first\
    \ developed it was used to run numerical computations, mostly large ones.\n\n\
    It soon became apparent that TensorFlow was also good for deep learning. Data\
    \ is input in multidimensional arrays. These arrays are known as tensors that\
    \ are extremely good at handling very large amounts of data.\n\nTensorFlow can\
    \ work with CPUs and GPUs, as it works with Data Flow graphs. These graphs consist\
    \ of edges and nodes. This makes it easier to use compacted data across a network.\n\
    \n# ## Tensors\n\nIn TensorFlow, data is fed into the network as tensors, which\
    \ are arrays of dissimilar data such as ranks or dimensions that become the input\
    \ for a neural network. Tensors store data in such a way that it makes it easier\
    \ for the data to be processed during computation.\n\nThe data is stored in a\
    \ tensor, then fed into the hidden layers to be processed to form a desired output.\n\
    \nTensor is divided up into:\n\n+   - Dimensions — The Tensor dimension is how\
    \ many elements there are for the tensor. You can get:\n    - A single dimension\
    \ tensor, which could be 5 rows by 1 column (5 x 1)\n    - You can get a tensor\
    \ that is 5 rows by 4 columns (5 x 4)\n    - Multi-Dimensional tensors are 3 x\
    \ 3 x 3.\n- Rank — Tensor Ranks are the dimensions ranked based on the dimension\
    \ of the tensor, for instance:\n    - A tensor that only has one element in it\
    \ has a rank of 0, and is known as a scalar or s= [200]\n    - A single dimensional\
    \ tensor which has a row or column of data in it has a rank of 1. It is a vector\
    \ or v=[10,11,12]\n    - A two-dimensional tensor which has more than one row\
    \ or column of data in it has a rank of 2 and is known as a matrix or m=[2,4,5],[6,7,8]\n\
    \    - A three-dimensional tensor has rank 3, t = [2,4,5],[6,7,8],[9,10,11]\n\n\
    There can be Ranks 4, 5, and higher depending on the dimension of the tensor(s).\n\
    \n# ## Data Flow Graphs\n\nOnce the data, which is stored in tensors, is passed\
    \ to the next layer, a computation process is run. This computation process is\
    \ done as data flow graphs. TensorFlow models are created by preparing graphs\
    \ and nodes to be executed during a session where the data used is taken from\
    \ the data stored in the tensors."
  merge: -1
  pgno: 51
- img_proc: true
  md: "The first step is to create the graph. During this step no data is actually\
    \ being executed or used. It is not like traditional coding, as the graph is executed\
    \ during a session.\nFor each TensorFlow object a Data Flow Graph is created to\
    \ represent that object.\nMathematical computations in the Data Flow Graph are\
    \ known as “**nodes**.”\nAn “**edge**” in the Data Flow Graph represents multidimensional\
    \ arrays.\n\n**Tensorflow programs work by:**\n\n+   - Building a Data Flow Graph\
    \ — This is where you write the code to create a computational graph.\n- Creating\
    \ a session — This is the session where you execute the code.\n- Executing the\
    \ Data Flow Graph — The graph is executed during the session.\n\n**TensorFlow\
    \ Programming Elements**\nWriting TensorFlow models is not done in the normal\
    \ way a person would code in Python or another programming language. It is a bit\
    \ different and as such, there are a few basic programming elements you need to\
    \ be aware of.\nThese elements include:\n\n+   - **Constants** — Constants are\
    \ similar to variables, but the parameter values of constants do not change. A\
    \ constant is defined using the following:\n    - tf.constant()\n    - example:\
    \ a=tf.constant(3.0)\n- **Variables** — Variables are trainable parameters for\
    \ a graph. Variables can change as their values are variable. A variable is defined\
    \ using the following:\n    - tf.variable()\n    - example: a=tf.Variable([.3])\n\
    - **Placeholders** — Placeholders allow for data to be fed into tensors from an\
    \ outside source such as a file. Place holders have to be fed by using the feed_dict\
    \ parameter.\n    - tf.placeholder()\n    - example:\n        - a = tf.placeholder(tf.float32)\n\
    \        - b = a*2\n        - with tf.Session() as sess:\n        - result = sess.run(b.fee_dict=(a:3.0))\n\
    - **Session** — Once the data has been assimilated and a Data Flow Graph has been\
    \ created, a session is nuanced to evaluate the nodes, and this is known as **TensorFlow\
    \ runtime**.\n\nEvery time you create a constant, variable, or placeholder, you\
    \ are performing an operation or creating a node. These operations form what is\
    \ called a node, and each of these nodes will run when you create a session.\n\
    \n# Getting Started with TensorFlow\n\nYou can use either Python or Anaconda for\
    \ the following TensorFlow exercises. Anaconda Jupyter Notebook has been used\
    \ for the sake of this book.\nOpen the Anaconda Navigator."

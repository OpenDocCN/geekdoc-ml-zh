    as Facebook, for example, constantly offer friend suggestions of “people you may
    know.” This is a simple concept of learning through experience. Facebook’s technology
    watches who your friends are as well as friends of those friends. It also logs
    what profiles you visit, how often, what articles you follow, and pages you visit.
    By aggregating this information, machine learning is able to predict people you
    are more likely to enjoy interacting with and so recommends them to you as friend
    suggestions.


    The same sort of process is used when uploading a picture to Facebook of yourself
    and some friends. Facebook uses machine learning to identify those people in your
    photo by comparing them to images your friends have uploaded of themselves. These
    photos are scanned for the poses people are making, as well as any unique features
    in the background, geo-locating the image if it can.


    ### Online Customer Support


    Many websites offer a service to text chat with customer service while you browse
    their pages. While some companies do employ live chat support staff, there are
    those that use chatbots instead or a mixture of the two. Many companies cannot
    afford to pay a person to provide this service, so instead a chatbot will answer
    questions relying on details from the website to provide its answers. Machine
    learning means these chatbots get better over time, learning how to and how not
    to answer questions, and to seem more human in their interactions.


    ### Search Engine Results, Refined


    Search engine providers rely on machine learning to refine their responses to
    search terms. They monitor your activity after you’ve been given some results
    to examine. Do you click on the first link and stay on this page for a long time?
    Or do you navigate to page 2 or 3 or further down the results they have provided,
    clicking some links and immediately returning? This means the results returned
    did not satisfy your query as well as they could. Machine learning uses this feedback
    to improve the search algorithms used.


    ### Product Recommendations and Market Personalization


    Browsing online products is another way ML learns a person''s online habits. You
    may have noticed that once you have browsed a product the Google adverts on a
    site may change to a similar one, or Facebook will suddenly insert random pages
    about the product while you are browsing the app.


    As the search engine ML stores the products you browse, you will find similar
    products popping up on Twitter and even as spam or promotions in your email. Using
    the kind of information gathered from shopping or browsing habits, machine learning
    is used to tailor everything from specific email campaigns aimed at you personally,
    to similar product advertisements. It will start to offer up various coupons or
    deals by the retailers offering the product you’ve been looking at. As the amount
    of data for these machine learning algorithms grows, a person can expect this
    personal approach to advertising to become even more focused and accurate.


    ### Financial Trading


    Being able to “predict the market” is something of a holy grail in financial circles.
    The truth is humans have never been much better at this than chance. However,
    machine learning is bringing the holy grail of marketing prediction closer to
    a reality. Using the power of massive supercomputers crunching enormous quantities
    of data, large financial firms with proprietary predictive systems make a large
    volume of high-speed transactions.


    With high speed and enough volume, even low-probability trades can end up making
    these firms enormous amounts of money.



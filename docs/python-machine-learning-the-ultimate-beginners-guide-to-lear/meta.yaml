  md: '# # Chapter 15: Limitation of Machine Learning


    There are many problems and limitations with machine learning. Concerns about
    machine learning limitations have been summarized in a simple phrase, which outlines
    the main objections to machine learning. It suggests machine learning is greedy,
    brittle, opaque, and shallow.


    # ## Problematic Limitation of Machine Learning


    If you examine each of those terms in detail, it clearly outlines that although
    machine learning has come along in leaps and bounds since its inception, it is
    far from perfect. But being aware of these limitations when one is learning about
    ML may help to deal with these limitations and bridge the gap between remarkable
    to outstanding performance.


    # ### Greedy


    By calling it greedy, critics of machine learning point to the need for massive
    amounts of training data to be available in order to successfully train machine
    learning systems to acceptable levels of error. Because machine learning systems
    are trained and not programmed, their usefulness will be directly proportional
    to the amount as well as the quality of the data sets available that are used
    to train them.


    Related to the size of training data required is the fact that, for supervised
    and semi-supervised machine learning training, the raw data used must first be
    labeled. In these types of ML systems that data needs to be labeled so that it
    can be meaningfully employed by the software to train.


    In essence, the task of labeling training data means to clean up the raw content
    and prepare it for the software to ingest. But labeling data can itself be a very
    complex task, as well as often a laborious and tedious one. Improperly labeled
    data fed into a supervised machine learning system will produce nothing of value.
    It will just be a waste of time.


    # ### Brittle


    To say machine learning is brittle is to highlight a very real and difficult problem
    in Artificial Intelligence. Machine learning systems are trained to provide extremely
    accurate and valuable predictions based on the data it has been trained to deal
    with. The problem, however, comes in when asking that trained system to examine
    a data set even slightly different from the type it was trained on. This will
    often cause a complete failure of the system to produce any predictive value.
    Hence, machine learning systems are unable to contextualize what they have learned
    and apply it to even extremely similar circumstances to those on which they have
    been trained. At the same time, attempting to train an already trained machine
    learning algorithm with a different data set will cause the system to “forget”
    its previous learning. This means all the previous training, data evaluation,
    and collection was a waste of time.


    Bias in machine learning systems is another example of how machine learning systems
    can be brittle. There are several different kinds of bias that threaten Artificial
    Intelligence which include:


    +   - **Bias in Data** —Machine learning is, for the foreseeable future at least,
    at the mercy of the data used to train it. If this data is biased in any way,
    whether deliberately or by accident, those biases hidden within it may be passed
    onto the machine learning system itself. If not caught during the training stage,
    this bias can taint the work of the system when it is out in the real world doing
    what it was designed to do.

    - **Acquired Bias** —While interacting with people in the real world, machine
    learning systems can acquire the biases of the people they are exposed to. A real-world
    example was Microsoft’s Tay, a chatbot designed to interact with people on Twitter
    using natural language. Within 24 hours, Microsoft was forced to pull the plug
    on their offensive chatbot that did not start out as the racist chatbot it became
    in its short 24-hour lifespan. The truly disturbing thing about Tay was that the
    ML actually started to generate its own comments on the controversial topic, leaving
    machine learning critics and skeptics to become even more critical and skeptical
    in the face of a company with as much tech clout as Microsoft not being able to
    properly train or control their chatbot.

    - **Emergent Bias** —An echo chamber is a group or collection of people who all
    believe the same things. This could be a political meeting in a basement or a
    chat room on the Internet. Echo chambers are not tolerant of outside ideas, especially
    those that disagree with or attempt to refute the group’s core beliefs. Facebook
    has become, in many ways, the preeminent echo chamber producer on Earth. But while
    the echo chamber phrase is meant to describe a group of people with similar ideas,
    Facebook’s artificial intelligence has taken this idea one step further. It has
    emerged as an echo chamber of one. What this does on social media platforms such
    as Facebook is only let what agrees with the information you have been collecting
    reach you, while information that may not agree with you gets'
  merge: -1
  pgno: 74
- img_proc: true
  md: 'discarded or not let through. You may have noticed that when you started out
    on the social media platform you got all sorts of news feeds being fed through.
    As you browsed the Internet, opened pages, and read various articles, what appeared
    on your feed pertained more and more to these searches, articles, and views. Emergent
    bias is like having a group of people protecting you from the outside world by
    deflecting bad news, bad influences, and so on. Emergent bias does not allow for
    a person to challenge their beliefs. How we know we are correct about a particular
    issue is by testing our beliefs against those who believe otherwise. Do our arguments
    hold up to their criticism or might we be wrong? In a Facebook echo chamber, that
    kind of learning and growth becomes less and less possible. Some studies suggest
    that spending time with people who agree with you tends to polarize groups, making
    the divisions between them worse. Machine learning, unless otherwise trained,
    tends to develop tunnel vision by not allowing opposing ideals.


    +   - **Goals Conflict Bias** —Machine learning can often support and reinforce
    biases that exist in the real world, because doing so increases their reward system.
    For ML systems it is rewarded when it achieves its goal. For example, say you
    run a college and you want to increase enrollment. The contract you have with
    the advertising company is that you will pay a certain amount for each click you
    get, meaning someone has seen your advertisement for the college and was interested
    enough to at least click on the link. In cases like these, simple generic adverts
    like “Go to College!” wouldn’t work very well, especially when competition these
    days is so steep. In order to attract the attention required you would have to
    run several simultaneous ad campaigns highlighting the college’s courses, strength,
    and benefits. It is in the advertiser’s best interest to get as many clicks to
    the college’s landing pages as possible. To do this the advertiser employs a machine
    learning algorithm to track who clicks on what advertisement. In turn, the ML
    begins to target those groups with the specific ads to gain more clicks. Although
    this at first seems like a win-win situation for the college and the advertiser
    the ML is developing a conflict bias. Targeting groups of people is a lot similar
    to profiling in that it may favor men for engineering, women for nursing, and
    so on, which means eventually only women will see the adverts for courses such
    as nursing and men for engineering. This aligns with an unfortunate cultural stereotype
    that still exists in western culture, and your college may be seen to be unwittingly
    perpetuating it. In its desire to be rewarded, the machine learning assigned to
    maximizing clicks for your advertising campaign found an existing social bias
    and exploited it to increase revenue for its owner. These two goals, increasing
    your enrollment and reducing gender bias in employment, have come into conflict
    and machine learning sacrificed one to achieve the other.


    # Opaque


    One of the main criticisms of machine learning, and in particular, against Neural
    Networks, is that they are unable to explain to their creators why they arrive
    at the decisions they do.


    This is a problem for two reasons:


    +   - More and more countries are adopting Internet laws that include a right
    to an explanation. The most influential of these laws is the GDPR (The EU General
    Data Protection Regulation). This law guarantees EU citizens the right to an explanation
    why an algorithm that deals with an important part of their lives made the decision
    given to them. For example, an EU citizen turned down for a loan by a machine
    learning algorithm has a right to demand why this happened. Because some artificial
    intelligence tools like neural networks are often not capable of providing any
    explanation for their decision, and the fact this decision is hidden in layers
    of math not readily available for human examination, such an explanation may not
    be possible. This has, in fact, slowed down the adoption of artificial intelligence
    in some areas.

    - The importance of an artificial intelligence to be able to explain its decisions
    to its creators by verifying that the underlying process is in fact meeting expectations
    in the real world. For machine learning, the decision-making process is mathematical
    and probabilistic. In the real world, decisions often need to be confirmed by
    the reasoning used to achieve them. Take, for example, a self-driving car involved
    in an accident. Assuming the hardware of the car is not completely destroyed,
    experts will want to know why the car took the actions it did. Perhaps there is
    a court case, and the decision of liability rests on how and why the car took
    the actions it did. Without transparency around the decision-making process of
    the software, justice might not be served in the courts, software engineers may
    not be able to find and correct flaws, and more people might be in danger from
    the same software running in different cars.


    # **Philosophical Objections and Limitation to Machine Learning**


    Along with real world problems of machine learning, there are also the philosophical
    ones. People do not like'
  merge: -1
  pgno: 75
- img_proc: true
  md: 'change, especially change that may take away a piece of their world in the
    form of their job or replace them in any way. This becomes a real issue if you
    consider not only the rate at which the technology industry is growing but the
    direction it is growing in.


    From the invention of the calculator through to the computer, mankind has been
    fed on movies about machines one day taking over the world. Those who have seen
    the first *Star Trek* movies would have seen technology that was then a thing
    of awe, and now not only have become a reality but one that is fast becoming obsolete.
    Maybe not the space ships, but talking computers and things like tablets.


    The invention of the first robot in the automobile industry caused a huge uproar
    as the robots could not only perform the function a lot more accurately, they
    did not need down time. This meant that production could be increased and the
    need for human operators decreased. Hence the reason why movies like the *Terminator*
    ring through a person''s mind when they think of machine learning and AI.


    If you stop to think just how much machines are starting to worm their way into
    a person’s every day life, you realize that maybe humans do have a bit of a cause
    to be at least wary if not skeptical. Already the new generations are so attached
    to their devices that there are actual clinics that deal with “Internet” and “technology”
    addictions. When was the last time you saw a young person actually reading a paper
    book? Or looking up when they were walking or taking public transportation?


    Although ML and AI are amazing concepts that are designed to improve the quality
    of human lives, the fact of the matter is they still raise ethical and philosophical
    questions along with some strong objections.


    A few of these objections include:


    # Jobs


    One of the main concerns surrounding artificial intelligence is the way these
    systems are encroaching upon human employment. Automation is not a new problem,
    and vast numbers of jobs have already been lost in manufacturing and other such
    industries to robots and automated systems.


    Because of this, some argue that this concern that machines and artificial intelligence
    will take over so many jobs there will be no more economy, is not really a threat.
    There have been a few such takeovers in the past. The economy proved to be able
    to shift, adapt, and people found other jobs. Some could even argue that the net
    number of jobs has increased since the loss of so many jobs to automation.


    So what is the real problem around jobs loss due to automation?


    The problem comes in during the next round of job losses due to AI which will
    be unprecedented. Artificial intelligence will not only replace drudgery and danger.
    It will keep going. There are around 3.5 million AI currently in existence, but
    how long until the number has increased ten-fold and then ten-fold again as AI
    becomes more advanced? Think about the trucking industry. How long until all trucking
    is handled by machine learning systems running self-driving trucks? And what about
    ride-sharing services like Uber and Lyft? What becomes of the human element that
    used to offer these services?


    The question to ask is not what jobs will be replaced, but what jobs can’t be
    replaced. In the machine learning round of employment disruption, white collar
    jobs are just as much in jeopardy as blue. What about accountants, financial advisers,
    copywriters, and advertisers?


    The pro-artificial intelligence camp argues that this disruption will open up
    new kinds of jobs, things we can’t even imagine. Each major disruption of the
    economy in the past that displaced many forms of employment with automation often
    caused the creation of new employment unforeseen before the disruption. The difference
    with artificial intelligence is there is no reason to believe these new forms
    of employment won’t quickly be taken over by machine learning systems as well.


    And all the above assumes the use of the current type of very specific machine
    learning. What happens if researchers are able to generalize learning in artificial
    intelligence? What if these systems become able to generalize what they learn
    and apply what they know in new and different contexts? Such a generalized artificial
    intelligence system could very quickly learn to do just about anything. So that
    begs the question of just how real a *Terminator* type future for the human race
    could actually be. If all jobs become AI, where does that leave humans?


    # Evil Systems'

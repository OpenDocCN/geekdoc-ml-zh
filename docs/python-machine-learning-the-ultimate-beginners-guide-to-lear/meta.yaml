    # # Chapter 1:

    ## History of Machine Learning


    The history of machine learning is embedded in the history of computing and man’s
    curiosity about artificially mimicking the brain. Most computing functions are
    made up of a series of complex algorithms. So, it should come as no surprise that
    computers were born from mathematics, in particular, Boolean logic.


    In Babylon, which is modern day Iraq, counting tools which are known as abacuses
    were used as far back as 300 B.C. The Abacus is an important computing reference
    because it was one of the first counting machines in history. It was also a prelude
    to the first gear-driven calculating clock developed by Wilhelm Schickard in 1623.
    It was a calculating machine that could add and subtract up to six-digit numbers.


    The dynamics of the workings of computers were figured out by mathematicians over
    a span of hundreds of years. It was through the expansion of various theories
    and prototypes developed by the minds of these great mathematicians from times
    past that computing developed to where it is today.


    # ### Computing History Timeline


    **In 1652**, an 18-year-old young man, Blaise Pascal, became one of France’s most
    revered mathematicians and was hailed a child prodigy. Pascal invented the first
    digital calculator to help his father calculate tax accounting. It was known as
    the Arithmetique or Pascaline. It was an arithmetic machine that could add, subtract,
    multiply, and divide.


    **In 1671** the Step Reckoner was designed by Gottfried Wilhelm Leibniz. It was
    a calculating machine that updated Pascal’s idea and added a new dimension of
    multiplication to the machine. The machine was built in 1673. Although Leibniz
    was a staunch advocate of the binary system, his machine used the decimal system.


    **In 1689**, Gottfried Wilhelm Leibniz created the binary number system that is
    still used in computing today. He developed the binary number system using only
    ones and zeros to convert logical verbal statements into mathematical ones. In
    1703, he wrote an article on how zeros and ones could easily represent numbers
    (Gonzalez, 2018).


    **In 1801**, a loom created by Joseph Marie Jacquard of France automatically wove
    fabric designs based on wooden punch cards inserted into the machine. The first
    computers used a design that was much the same as this loom.


    **In 1822**, English inventor Charles Babbage was funded by the English government
    to design a steam-driven calculating machine. The machine was supposed to be able
    to calculate tables of numbers, but the project was a failure. The machine was
    known as the Difference Engine. Babbage did, however, find ways to try to make
    the calculator a more viable project, and by **1833** he had begun to develop
    a better machine, the Analytical Engine. It was the first “fully program controlled,
    automatic mechanical digital computer” (“Analytical Engine”, n.d.). There were
    four components to the machine, which were the reader, the mill, the store, and
    the printer. Babbage died before completing the Analytical Engine, but it was
    a machine that was worthy of being called the first computer.


    **In 1842**, Ada Lovelace, deemed the world''s first computer programmer, wrote
    the first ever machine algorithm. The algorithm was written for Babbage''s Analytical
    Engine, which at the time only existed on paper.


    **In 1847**, George Boole started Boolean algebra which was first called the algebra
    of logic. Boolean logic is the logic upon which systems like telephone switching
    is based. It is also logic upon which computers operate and are designed.


    **In 1936**, Alan Turing invented an idea of a “Universal Machine” that would
    be able to analyze and perform a given set of tasks. In 1930, the death of someone
    close to him made him become obsessed with the brain and the mind, as he believed
    his friend''s mind did not just die with him. The paper that Turning published
    in 1936 has become known as the “Foundation of computer science” (“Alan Turning”,
    n.d.) In **1946**, Turing designed the Automatic Computing Engine (ACE).


    **In 1943**, a neurophysiologist, Warren McCulloch, teamed up with a mathematician,
    Walter Pitts, and co-wrote a paper theorizing how neurons in the human brain might
    function. They then modeled their theory by building a simple neural network with
    electrical circuits. Their paper gave a simplified model of a neural network with
    electrical circuits which has had an important impact on artificial neural networks.


    **In 1949**, Donald Hebb created a model based on the brain cell interaction which
    he published in a book. The book, “The Organization of Behavior,” discussed Hebb''s
    theories on communication and excitement between neurons. The model which Hebb
    described in his book reveals a way that the relationship between two artificial
    neurons can be altered.


    **In 1950**, Alan Turing, in one of his philosophical papers, put forward the
    “Learning Machine.” His idea was to compare the outputs of a human against that
    of a machine. This paper was to become the paper that he would be remembered for
    and was what the Turing Test was adapted from. The Turing Test is still used today
    to determine the intelligence behavior of a machine. In order for an AI to be
    determined as intelligent, it must be able to think'

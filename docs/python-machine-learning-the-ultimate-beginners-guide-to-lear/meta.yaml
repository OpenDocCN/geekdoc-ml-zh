    Either Python **pip** or Anaconda **conda** can be used to install Scikit-learn.


    # **Installing Scikit-Learn with Python Pip Without a Virtual Environment**


    To install Scikit-Learn with Python and ensure it is the latest version that is
    compatible with your Python installation, open a **cmd** screen and type the following:


    ```

    pip install -U scikit-learn

    ```


    The following screen will appear when installing Scikit-Learn.


    ![](img/989db6cb032c6b8914db5e5a7c2b4a41_28_0.png)


    Allow the installation to run to completion, which could take a few minutes.


    # **Installing Scikit-Learn with Python Pip in a Virtual Environment**


    If you have an Anaconda installation, it is best to create a different virtual
    environment to run Scikit-Learn for Python in. To run this from the command line
    prompt, follow these instructions:


    Install the virtual environment for Python:


    ```

    pip install virtualenv

    ```


    Create the virtual environment for Scikit-Learn:


    ```

    python -m venv sklearn-venv

    ```


    Once the environment has been set, type the following into the command line prompt
    to activate the sklearn-venv environment:


    ```

    sklearn-venv\Scripts\activate

    ```


    Once that script has run, you can then install Scikit-learn with the same commands
    as used above:


    ```

    pip install -U scikit-learn

    ```


    Allow the package installer to successfully install the library.


    # **Checking the Python Pip Scikit-Learn Installation**


    To check the Scikit-Learn **pip** installation type the following into the command
    line once the installation has completed successfully:


    ```

    python -m pip show scikit-learn

    ```


    This will bring up the version of Scikit-Learn (at the time of writing this book
    the version was 0.23.1) and where the library was installed.


    # **Installing Scikit-Learn with Anaconda Conda Without a Virtual Environment**


    To install Scikit-Learn with Anaconda and ensure it is the latest version that
    is compatible with your Anaconda installation, run the **Anaconda Prompt** and
    type the following:


    ```

    conda install scikit-learn

    ```'

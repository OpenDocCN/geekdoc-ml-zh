  - "[PAGE 39]\n\n# How to Determine the “k” Parameter\n\n**Parameter tuning** is\
    \ what the process of determining the correct value for “k” in the KNN model is\
    \ called. As KNN is a feature similarity-based algorithm, setting up the correct\
    \ parameter for “k” is of the utmost importance to ensure predicted output is\
    \ as accurate as possible.\n\nThe KNN model below determines whether or not a\
    \ fruit is an apple or an orange.\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_39_0.png)\n\
    \nThe headache in choosing the correct “k” factor is trying to eliminate too much\
    \ bias. For instance, in the diagram above, if you determine k=4, then the new\
    \ variable would be an orange based on the 4 nearest neighbor votes. However,\
    \ if you determined that k=9, the new variable would then be an apple. The trick\
    \ to determining the “k” factor is to limit bias as much as possible.\n\n# How\
    \ to Choose the Value of k?\n\nIf the “k” factor is too low, there is not going\
    \ to be enough information and if it is too high, there is going to be too much\
    \ data to process.\n\nThe easiest method for choose a “k” value:\n\n+   - Use\
    \ the square root of “n” where n = total number of data points.\n- If the square\
    \ root is an even number, either subtract or add 1 to the value to ensure that\
    \ “k” values are odd values. If a “k” value is an even number, there is always\
    \ the risk of failure. For example, the apples and oranges diagram could have\
    \ ended up with an undetermined new value. The new value’s nearest 4 neighbors\
    \ could have been 2 apples and 2 oranges instead of 2 apples and 3 oranges.\n\
    - Round the “k” value to the nearest whole number.\n- For the diagram above with\
    \ the apples and oranges, the “k” value would be:\n    - k = Square Root{14}\n\
    \    - k = 3.74\n    - k = 4\n    - k = 4 + 1\n    - **k = 5**\n\n# When to Use\
    \ KNN Models?\n\nYou can use the KNN algorithm when the following criteria is\
    \ met:\n\n+   - All data has a label — apples, oranges, grapes, etc.\n- Data sets\
    \ are small and not too complex — KNN doesn’t learn discriminative function from\
    \ the"

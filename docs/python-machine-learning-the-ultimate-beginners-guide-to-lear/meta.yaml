  md: "![](img/989db6cb032c6b8914db5e5a7c2b4a41_43_0.png)\n\n+   - a = (XA - XB) —Horizontal\
    \ distance\n- b = (YA - YB) —Vertical distance\n- Putting the formula together\
    \ to calculate C:\n  - c² = a² + b²\n  - c² = (XA - XB)² + (YA - YB)²\n  - c =\
    \ Square Root{(XA - XB)² + (YA - YB)²}\n- Putting the values into the formula\
    \ to calculate C:\n  - c = Square Root{(2 - 1)² + (5 - 0)²}\n  - c = Square Root{(1²\
    \ + 5²)}\n  - c = Square Root{1 + 25}\n  - c = Square Root{26}\n  - c = 5.099\n\
    \n# KNN Distance Between Two Points/Euclidean Distance Calculation\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_43_1.png)\n\

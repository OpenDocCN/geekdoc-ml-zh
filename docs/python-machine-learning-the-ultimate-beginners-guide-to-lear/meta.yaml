    \ Data Flow Graph are known as “**nodes**.”\nAn “**edge**” in the Data Flow Graph\
    \ represents multidimensional arrays.\n\n**Tensorflow programs work by:**\n\n\
    +   - Building a Data Flow Graph — This is where you write the code to create\
    \ a computational graph.\n- Creating a session — This is the session where you\
    \ execute the code.\n- Executing the Data Flow Graph — The graph is executed during\
    \ the session.\n\n**TensorFlow Programming Elements**\nWriting TensorFlow models\
    \ is not done in the normal way a person would code in Python or another programming\
    \ language. It is a bit different and as such, there are a few basic programming\
    \ elements you need to be aware of.\nThese elements include:\n\n+   - **Constants**\
    \ — Constants are similar to variables, but the parameter values of constants\
    \ do not change. A constant is defined using the following:\n    - tf.constant()\n\
    \    - example: a=tf.constant(3.0)\n- **Variables** — Variables are trainable\
    \ parameters for a graph. Variables can change as their values are variable. A\
    \ variable is defined using the following:\n    - tf.variable()\n    - example:\
    \ a=tf.Variable([.3])\n- **Placeholders** — Placeholders allow for data to be\
    \ fed into tensors from an outside source such as a file. Place holders have to\
    \ be fed by using the feed_dict parameter.\n    - tf.placeholder()\n    - example:\n\
    \        - a = tf.placeholder(tf.float32)\n        - b = a*2\n        - with tf.Session()\
    \ as sess:\n        - result = sess.run(b.fee_dict=(a:3.0))\n- **Session** — Once\
    \ the data has been assimilated and a Data Flow Graph has been created, a session\
    \ is nuanced to evaluate the nodes, and this is known as **TensorFlow runtime**.\n\
    \nEvery time you create a constant, variable, or placeholder, you are performing\
    \ an operation or creating a node. These operations form what is called a node,\
    \ and each of these nodes will run when you create a session.\n\n# Getting Started\

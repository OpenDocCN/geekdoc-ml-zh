    In the early 1980s a coke machine at Carnegie Mellon University was one of the
    first examples of the Internet of Things. By accessing the coke machine over the
    Internet, it could be determined if there was stock in the machine and what the
    temperature of the drink was.


    The Internet of Things (IoT) has substantially evolved since the early 1980s and
    now includes devices such as smartphones, wireless sensors for security devices,
    GPS systems, and so on. IoT is a term that applies to any device that is connected
    to or through the Internet. These can be devices ranging from a jet engine to
    a robotic arm in a factory or a sensor in a thermostat.


    # Uses for the Internet of Things


    The IoT can be classified as anything with an on or off switch that either works
    through or can work with the Internet. In today''s fast past and ever evolving
    high-tech world, IoT plays a huge part in anyone who has the Internet, or is connected
    to, the Internet''s life.

    Uses for the IoT include:


    # Consumer Applications


    Internet of Things devices created for consumer use range from smartphones to
    connected vehicles, health monitoring devices, and machine ordering devices. A
    lot of these devices have their software origins in programming methods, like
    those devised in Python.


    # Smart Homes


    Home automation is where your smart house manages the house''s resources for the
    occupant(s). These resources include lighting, fridge, air conditioning, security,
    media, and so on. In a lot of homes certain appliances such refrigerators can
    organize part of the grocery list, security systems can alert owners of perimeter
    breeches to their smartphones and can log workers in and out of the property.


    # Elder and Disabled Care


    Smart homes are able to take care of the elderly or disabled, making it easier
    to monitor them. It also allows the person in need of care a little more independence
    and 24/7 help and monitoring.


    # Healthcare Industry


    Smart Healthcare is a fast-emerging trend where computers, the Internet, and artificial
    intelligence are merging to improve our quality of life. The Internet of Health
    Things (IoHT) is a specific branch of the Internet of Things. IoHT is designed
    for health and medically related purposes and is what is driving the digitization
    of the healthcare'

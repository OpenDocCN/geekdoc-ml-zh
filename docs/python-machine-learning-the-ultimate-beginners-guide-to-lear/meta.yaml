    Type the following code into a blank Jupyter Notebook cell to get the accuracy
    score for the test:


    ```

    print(accuracy_score(y_test,y_pred))

    ```


    Run the code and if it runs without an error, it will return the following:


    ```

    0.8181818181818182

    ```


    The test ran with an accuracy of 0.82


    In data science, the f1 score is how many false positives there were. The accuracy
    score is what the model actually got right.'

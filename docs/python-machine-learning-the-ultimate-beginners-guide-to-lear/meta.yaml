    \ setting the classifier variable, and these are:\n\n- n_neighbors=n — This is\
    \ the “k” initializer that establishes the number of nearest neighbors to use.\
    \ To get this number type the following into a blank cell in the Jupyter Notebook:\n\
    \n```\nlen(y)\n```\n\n- You should end up with 768, which is the lines of data\
    \ in the diabetes data set\n\n```\nimport math\nmath.sqrt(len(y_test))\n```\n\n\
    - You should end up with a number 12.409673645990857\n- This is the number you\
    \ are going to use as the “k” nearest neighbor number.\n- If you round the number\
    \ up to a whole number you will get 12. As you now should know, using an even\
    \ number for voters is not ideal.\n- We take away 1 in order to use a value of\
    \ 11 instead to make sure the prediction is more accurate.\n\n- p=n — This is\
    \ the “power parameter” which establishes the metric that is going to be used.\
    \ For instance, you want to know if a person is at risk for diabetes or not. This\
    \ is a **Yes** or **No** scenario.\n- metric=’Euclidean’ — This defines the metric\

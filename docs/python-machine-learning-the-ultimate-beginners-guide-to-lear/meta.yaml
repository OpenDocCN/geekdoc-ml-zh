    \ MACHINE LEARNING STEP-BY-STEP USING SCIKIT-LEARN AND TENSORFLOW\n\nMARK REED\n\
    \n# Python Machine Learning\n\nThe Ultimate Beginner's Guide to Learn Python Machine\
    \ Learning Step by Step using Scikit-Learn and Tensorflow\n\nMark Reed\n\n© Copyright\
    \ 2020 - All rights reserved.\n\nThe content contained within this book may not\

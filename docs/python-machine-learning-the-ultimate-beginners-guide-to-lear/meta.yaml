    # # Chapter 12: Machine Learning and Robotics


    ![](img/989db6cb032c6b8914db5e5a7c2b4a41_66_0.png)


    Robots can be defined as machines, often programmable by a computer, that are
    able to carry out a series of complex actions without intervention. A robot can
    have its control systems embedded or be controlled by an external device. Unlike
    the popular movie stereotype, robots do not look like humans. Instead, they are
    usually designed to perform a task, and that requirement determines how they appear.


    George Devol invented the first digitally operated and programmable called Unimate
    in 1954 (Unimate, n.d.). Unimate was bought by General Motors in 1961 for the
    purpose of lifting hot metal die castings, and it became the first mass produced
    robot. And like computers, robots have changed our society. Their strength, agility,
    and ability to continue to execute the same repetitive tasks perfectly are an
    enormous benefit to industry and society alike. And while they did cause some
    serious disruption to the manufacturing industries, putting many people out of
    work, their ascension in our societies has provided far more employment opportunities
    than they have taken.


    There are several categories of robots which include:


    # ## Industrial or Service Robots


    Industrial or service robots are probably the most popular or familiar types of
    robots. They appear in most automated factories and industries. They usually consist
    of an “arm” with one or more joints, which ends with a gripper or manipulating
    device. They first appeared in automobile factories such as General Motors (Unimate).
    They are fixed in one location and are unable to move about. Industrial robots
    are more commonly found in manufacturing and industrial locations. Service robots
    are basically the same in design as industrial robots but are found outside of
    manufacturing industries. Service robots can be found in shopping malls, banks,
    entertainment centers, or where there is a need for customer interaction.


    # ## Educational Robots


    Educational robots are used as teacher aids or for educational purposes. As early
    as the 1980s, robots were introduced to children with the turtle robot controlled
    by LEGO. When combined with LEGO, educational robots moved beyond the robotic
    turtles and onto robot kits which became known as LEGO Mindstorm. These kits are
    used in classrooms all around the world for elementary and middle school students.
    Students can even compete in the LEGO League where they get to design, build,
    and program LEGO robots. These LEGO robots need to be able to perform certain
    functions in order to complete various challenges.


    Robotics plays a vital role in the education of children for the twenty-first
    century and beyond. Kids that are incapable of communicating with the world around
    them are able to do so through robots. As the world is becoming more and more
    reliant on technology, robotics is a way to ensure children are able to understand
    the world they are living in.'
- md: '# Modular Robots


    Modular robots consist of several independent units that work together. They can
    be identical or have one or more variations in design. Modular robots are able
    to attach together to form shapes that allow them to perform tasks. The programming
    of modular robotic systems is more complex than a single robot, but ongoing research
    in many universities and corporate settings is proving that this design approach
    is superior to single large robots for many types of applications. When combined
    with Swarm Intelligence (SI), modular robots are proving quite adept at creative
    problem-solving.


    # Collaborative Robots


    Collaborative robots are designed to work with human beings. They are mostly industrial
    robots that include safety features to ensure they do not harm anyone as they
    go about their assigned tasks. An excellent example of this kind of collaborative
    robot is Baxter (Baxter, n.d.). Introduced in 2012, Baxter is an industrial robot
    designed to be programmed to accomplish simple tasks but is able to sense when
    it comes into contact with a human being and stops moving.


    # Robotic Learning


    When robots are coupled with machine learning, researchers use the term “Robotic
    Learning.” This field has a contemporary impact in at least four important areas:


    # Vision


    Machine learning has allowed robots to sense their environment visually and to
    make sense of what they are seeing. New items can be understood and classified
    without the need to program the robot ahead of time to recognize its environment.


    # Grasping


    Coupled with vision, machine learning allows robots to manipulate items in their
    environment. This includes new items that the system may not have known before.
    Industrial or service robots would need to be reprogrammed in order to interact
    or recognize something new. With the introduction of machine learning, the robot
    comes equipped with the ability to navigate new item shapes and sizes automatically
    with no programming necessary.


    # Motion Control


    With the aid of machine learning, robots are able to move about their environments
    and avoid obstacles in order to continue their assigned tasks.


    # Data


    Robots are now able to understand patterns in data, both physical and logistical,
    and act accordingly.


    # Examples of Industrial Robots and Machine Learning


    One example of the benefit of applying machine learning to robots is of an industrial
    robot which receives boxes of frozen food along a conveyor. Because it is frozen,
    these boxes often have frost, sometimes quite a lot of frost. This actually changes
    the shape of the box randomly. Thus, a traditionally-trained robot with very little
    tolerance for these shape changes would fail to grasp the boxes correctly. With
    machine learning algorithms, the robot is now able to adapt to different shapes,
    random as they are and in real time, and successfully grasp the boxes.


    Another industrial example includes a factory with over 90,000 different parts.
    It would not be possible to teach a robot how to manipulate these many items.
    With machine learning, the robot is able to be fed images of new parts it will
    be dealing with, and it can determine its own method to manipulate them.


    As more and more robots are combined with machine learning algorithms, industry
    becomes more reliant on them. There are millions of robots being used globally
    every day in nearly every sector of society.


    # Neural Networks with Scikit-learn


    Neural networks are a machine learning framework that tries to mimic the way the
    natural biological neural networks operate. Humans have the capacity to identify
    patterns with a very high degree of accuracy. Any time you see a cow, you can
    immediately recognize that it is a cow. This also applies to when you see a goat.
    The reason is that you have learned over a period of time what a cow or a goat
    looks like and what differentiates the two.


    Artificial neural networks refer to computation systems that try to imitate the
    capabilities of human learning. This is done through complex architecture that
    resembles the nervous system of a human being.


    # Chapter 13: Machine Learning Models


    There are many models of machine learning. These theoretical models describe the
    heuristics used to accomplish the ideal, allowing the machines to learn on their
    own.


    ## Decision Tree


    The decision tree technique is one of the most commonly used ML techniques. Either
    formally or informally, we decide on a single course of action from many possibilities
    based on previous experience. The possibilities look like branches, and we take
    one of them and reject the others.


    The decision tree model gets its name from the shape created when its decision
    processes are drawn out graphically. A decision tree offers a great deal of flexibility
    in terms of what input values it can receive. The tree’s outputs can take the
    form of a category, binary, or numerical data. The strength of decision trees
    is in how the degree of influence of different input variables can be determined
    by the level of decision nodes in which they are considered.


    A big weakness of decision trees is the fact that every decision boundary is a
    forced binary split. There is no nuance. Each decision is either yes or no, one
    or zero. Moreover, the decision criteria can consider only a single variable at
    a time. There cannot be a combination of more than one input variable.


    Decision trees cannot be updated incrementally, which means a trained training
    set cannot be used for new data. Instead, a new one has to be created to work
    with new training data.


    Ensemble methods address many tree limitations. In essence, the ensemble method
    uses more than one tree to increase output accuracy. There are two main ensemble
    methods — bagging and boosting.


    The bagging ensemble method, also known as Bootstrap Aggregation, is meant to
    reduce decision tree variance. The training data is broken up randomly into subsets,
    and each subset is used to train a decision tree. The results from all trees are
    averaged, providing a more robust predictive accuracy than any single tree on
    its own.


    The boosting ensemble method resembles a multi-stage rocket. The main booster
    of a rocket supplies the vehicle with a large amount of inertia. When its fuel
    is spent, it detaches, and the second stage combines its acceleration to the inertia
    already imparted to the rocket and so on.


    For decision trees, the first tree operates on the training data and produces
    its output. The next tree uses the earlier tree’s output as its input. When the
    input is in error, the weighting it is given makes it more likely the next tree
    will identify and at least partially mitigate this error. The end result of the
    run is a strong learner emerging from a series of weaker learners.


    ## Linear Regression


    The premise of linear regression methods rests on the assumption that the output,
    a numeric value, may be expressed as a combination of the input variable set,
    which will also be a numeric value.


    A simple example might look like this:

    x = a1y1, a2y2, a3y3

    Where x is the output, a1, a2, a3, and so on, these are the weights that are accorded
    to each input.

    Y’s values would be the inputs.


    A weakness of the linear regression model is the fact that it assumes linear input
    features, which might not be the case. Inputs must be tested mathematically for
    linearity.


    ## K-Means Clustering Algorithm


    K-means is an unsupervised machine learning algorithm for cluster analysis. It
    is an iterative, non-deterministic method. The algorithm operates on data sets
    using predefined clusters. Clusters are like categories; for example, if you were
    searching for shoes with the search term “Nike,” the search would return all the
    pages containing Nike shoes. But the word “Nike” has more than one classification
    as it also pertains to clothes, and other items branded under the trade name.
    The K-Means clustering algorithm is used to group results with similar concepts.
    Thus, the algorithm will group all results that pertain to Nike shoes into one
    cluster, all results that pertain to Nike shirts in another, and so on.


    ### K-Means Clustering Applications


    K-Means Clustering algorithms are used by most web search engines to cluster web
    pages by similarity and to identify the relevance of search results. K-Mean clustering
    is a valuable tool in any application where unstructured data needs to be divided
    into meaningful categories.



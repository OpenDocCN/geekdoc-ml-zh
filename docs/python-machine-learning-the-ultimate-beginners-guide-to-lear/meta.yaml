    \n```\nX = dataset.iloc[:, 0:8]\ny = dataset.iloc[:, 8]\nX_train, X_test, y_train,\
    \ y_test = train_test_split(X, y, random_state=0, test_size=0.2)\n```\n\nRun the\
    \ script and if there are no errors in the code it will return you to a blank\
    \ cell.\n\n## Scaling the Features\n\nWhen you loaded the sklearn features while\
    \ setting up the environment to run the diabetes sample data set, you loaded the\

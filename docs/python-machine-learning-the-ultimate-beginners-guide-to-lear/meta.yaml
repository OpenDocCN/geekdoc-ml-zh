    \nClick the “**Next**” button which will take you to an informational screen.\n\
    Press the “**Next**” button to be taken to the “**Completing Anaconda3 2020.02\
    \ (xx-bit) Setup**” screen. Uncheck the “**Anaconda Individual Tutorial**” and\
    \ “**Learn More About Anaconda**” then click the “**Finish**” button.\n\n## Setting\
    \ Up the Anaconda Environment\n\nThere are a few ways to load the Anaconda command\
    \ line:\n\n- Create a desktop short-cut\n- Access Anaconda command line from the\
    \ “**Start**” menu “**Programs**” option\n- Access Anaconda through the **DOS**\
    \ command line using **cmd** from the “**Start**” menu **run/search** facility.\n\
    \nFor the sake of this exercise the “**Start**” menu “**Programs**” option is\
    \ going to be used.\nGo to the “**Start**” menu “**Programs**” and find “**Anaconda3\
    \ (xx-bit)**” then open up the folder.\nChoose “**Anaconda Prompt (anaconda3)**.”\n\
    \n![](img/989db6cb032c6b8914db5e5a7c2b4a41_26_0.png)\n\nAt the command line prompt\
    \ type:\npython\nThe Anaconda Python command line shell will load and look similar\
    \ to the screen below.\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_26_1.png)\n\
    \nIf you want to test the Anaconda installation, import a file called “The Zen\
    \ of Python” by Tim Peter by typing the following into the command line:\nimport\
    \ this\nCheck that “**conda**” is installed in Anaconda, as it is the package\
    \ installer for Anaconda.\nIf you have the **Anaconda Prompt** open and **Python**\
    \ loaded, first exit the Python command line by typing the following:\nexit()\n\
    This will take you back to the **Anaconda Prompt** and you can type in the following:\n\
    conda --version\nThis should show the version of conda. At the time of printing\
    \ this book the latest version was 4.8.3. **Conda.exe** should come preloaded\
    \ with the newer versions of Anaconda. However, they are not always the latest\
    \ version of **conda** and may need to be upgraded. If the currently installed\
    \ version of conda is older than version 4.8.3 then you should upgrade to the\
    \ latest version.\n\nTo upgrade **conda**, type the following into the **Anaconda\
    \ Prompt** command line:\n\n`conda update conda`\n\nWhen the **conda** upgrade\
    \ is finished type:\n\n`conda --version`\n\nThe **conda** version should be 4.8.3\n\
    \n![](img/989db6cb032c6b8914db5e5a7c2b4a41_27_0.png)\n\nThe Anaconda **conda**\
    \ utility should now be the latest version.\n\n## Install NumPy and SciPy With\
    \ Conda\n\nTo find out if NumPy and SciPy are loaded, type in the following for\
    \ a full list of loaded modules:\n\n`conda list`\n\nScroll the list to ensure\
    \ that Numpy and SciPy are loaded. If they are not loaded, you will have to install\
    \ them by typing in the following at the **Anaconda Prompt**:\n\n- **To download\
    \ NumPy**\n  `conda install numpy`\n- **To download SciPy**\n  `conda install\
    \ scipy`\n\n## Installing Scikit-Learn\n\nEither Python **pip** or Anaconda **conda**\
    \ can be used to install Scikit-learn.\n\n### Installing Scikit-Learn with Python\
    \ Pip Without a Virtual Environment\n\nTo install Scikit-Learn with Python and\
    \ ensure it is the latest version that is compatible with your Python installation,\
    \ open a **cmd** screen and type the following:\n\n```\npip install -U scikit-learn\n\
    ```\n\nThe following screen will appear when installing Scikit-Learn.\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_28_0.png)\n\
    \nAllow the installation to run to completion, which could take a few minutes.\n\
    \n### Installing Scikit-Learn with Python Pip in a Virtual Environment\n\nIf you\
    \ have an Anaconda installation, it is best to create a different virtual environment\
    \ to run Scikit-Learn for Python in. To run this from the command line prompt,\
    \ follow these instructions:\n\nInstall the virtual environment for Python:\n\n\
    ```\npip install virtualenv\n```\n\nCreate the virtual environment for Scikit-Learn:\n\
    \n```\npython -m venv sklearn-venv\n```\n\nOnce the environment has been set,\
    \ type the following into the command line prompt to activate the sklearn-venv\
    \ environment:\n\n```\nsklearn-venv\\Scripts\\activate\n```\n\nOnce that script\
    \ has run, you can then install Scikit-learn with the same commands as used above:\n\
    \n```\npip install -U scikit-learn\n```\n\nAllow the package installer to successfully\
    \ install the library.\n\n### Checking the Python Pip Scikit-Learn Installation\n\
    \nTo check the Scikit-Learn **pip** installation type the following into the command\
    \ line once the installation has completed successfully:\n\n```\npython -m pip\
    \ show scikit-learn\n```\n\nThis will bring up the version of Scikit-Learn (at\
    \ the time of writing this book the version was 0.23.1) and where the library\
    \ was installed.\n\n### Installing Scikit-Learn with Anaconda Conda Without a\
    \ Virtual Environment\n\nTo install Scikit-Learn with Anaconda and ensure it is\
    \ the latest version that is compatible with your Anaconda installation, run the\
    \ **Anaconda Prompt** and type the following:\n\n```\nconda install scikit-learn\n\
    ```\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_29_0.png)\n\nAllow the installation\
    \ to complete. This can take several minutes.\n\n### Installing Scikit-Learn with\
    \ Anaconda Conda in a Virtual Environment\n\nIf you have a Python environment,\
    \ then it is best to create an environment to install and run Scikit-Learn for\
    \ Anaconda that will not interfere with your Python installations.\n\nTo create\
    \ a SciKit Learn environment from the **Anaconda Prompt**, do the following:\n\
    \n```\nconda create -n sklearn-env\n```\n\nThe next step is to activate the environment\
    \ by typing the following into the **Anaconda Prompt**:\n\n```\nactivate sklearn-env\n\
    ```\n\nNext, install Scikit-Learn into the Anaconda virtual environment. At the\
    \ **Anaconda Prompt**, type the following:\n\n```\nconda install scikit-learn\n\
    ```\n\nAllow the installation to run through to completion.\n\n### Checking the\
    \ Anaconda Conda Scikit-Learn Installation\n\nTo check the Scikit-Learn **conda**\
    \ installation, type the following into the command line once the installation\
    \ has completed successfully:\n\n```\nconda list scikit-learn\n```\n\nThis will\
    \ bring up the version of Scikit-Learn (at the time of writing this book the version\
    \ was 0.21.1) and where the library was installed.\n\n## Installing TensorFlow\n\
    \nTensorFlow is a framework that is required for deep learning. It comes with\
    \ a myriad of functionalities that allow a system to carry out deep learning functions.\
    \ TensorFlow also has APIs that allow for the interaction between nearly all the\
    \ most popular programming languages. The programming languages include Rust,\
    \ Haskell, Java, C++, and Go.\n\nAs with most Python or Python compatible libraries,\
    \ TensorFlow is free to download and use from the Internet as it is open source\
    \ software. TensorFlow can be installed using either Python **pip** or Anaconda\
    \ **conda** package installation programs. For the sake of this book the CPU-only\
    \ version of TensorFlow is to be installed.\n\n### Installing TensorFlow With\
    \ Python Pip Without a Virtual Environment\n\nTo install TensorFlow with Python\
    \ and ensure it is the latest version that is compatible with your Python installation,\

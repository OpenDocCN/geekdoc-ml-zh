    +   - n_neighbors=n — This is the “k” initializer that establishes the number
    of nearest neighbors to use. To get this number type the following into a blank
    cell in the Jupyter Notebook:


    ![](img/989db6cb032c6b8914db5e5a7c2b4a41_49_1.png)


    ```

    len(y)

    ```


    +   - You should end up with 768, which is the lines of data in the diabetes data
    set


    ```

    import math

    math.sqrt(len(y_test))

    ```


    +   - You should end up with a number 12.409673645990857

    - This is the number you are going to use as the “k” nearest neighbor number.

    - If you round the number up to a whole number you will get 12. As you now should
    know, using an even number for voters is not ideal.

    - We take away 1 in order to use a value of 11 instead to make sure the prediction
    is more accurate.


    +   - p=n — This is the “power parameter” which establishes the metric that is
    going to be used. For instance, you want to know if a person is at risk for diabetes
    or not. This is a **Yes** or **No** scenario.

    - metric=’Euclidean’ — This defines the metric you are going to use. There are
    a few metrics you can use for this, but the Euclidean one is the most commonly
    used.


    Run the code and if there are no errors you should get returned to a blank cell.


    ![](img/989db6cb032c6b8914db5e5a7c2b4a41_49_2.png)


    You will need to fit the training data to the model. To do this, type the following
    into a blank cell into Jupyter Notebook:


    ```

    classifier.fit(X_train, y_train)

    ```


    Run the code and if there are no errors, your screen should now look similar to
    the example below.'
- md: "## Chapter 6: Using TensorFlow\n\nTo use TensorFlow you have to understand\
    \ the concept of Deep Learning, which was touched on briefly at the beginning\
    \ of this book. It is part of Machine Learning that mimics the functions of the\
    \ human brain.\n\nBy using complex algorithms, deep learning models learn from\
    \ unstructured data to train a neural network. A neural network typically consists\
    \ of an input layer and an output layer with various hidden layers in between.\
    \ Deep learning is where artificial intelligence begins. Any neural network with\
    \ more than 3 hidden layers is known as a deep neural network.\n\n### The Layers\
    \ of a Neural Network and Their Functions\n\n- **Input Layer** — The input layer\
    \ accepts various inputs such as large volumes of data or pixel layers of an image,\
    \ for example. It passes the input on to the hidden layer(s) of the neural network.\n\
    - **Hidden Layer(s)** — The hidden layer(s) accepts the input data and processes\
    \ it by performing complex algorithms, operations, and feature extraction. Hidden\
    \ layers have weights and biases that are continuously updated during the training\
    \ process. There are different neurons, each of which has multiple weights and\
    \ one bias (variables).\n- **Output Layer** — The output layer outputs the predicted\
    \ outcome.\n\n### Deep Learning Libraries\n\nThere are many deep learning libraries\
    \ that can be used for machine learning models. This book uses TensorFlow, which\
    \ offers many APIs that can be used to work with TensorFlow.\n\nAt the beginning\
    \ of this book you were introduced to what TensorFlow is. It was created by Google\
    \ as an open source library that can be used for both traditional mesh learning\
    \ and deep learning. When TensorFlow was first developed it was used to run numerical\
    \ computations, mostly large ones.\n\nIt soon became apparent that TensorFlow\
    \ was also good for deep learning. Data is input in multidimensional arrays. These\
    \ arrays are known as tensors that are extremely good at handling very large amounts\
    \ of data.\n\nTensorFlow can work with CPUs and GPUs, as it works with Data Flow\
    \ graphs. These graphs consist of edges and nodes. This makes it easier to use\
    \ compacted data across a network.\n\n### Tensors\n\nIn TensorFlow, data is fed\
    \ into the network as tensors, which are arrays of dissimilar data such as ranks\
    \ or dimensions that become the input for a neural network. Tensors store data\
    \ in such a way that it makes it easier for the data to be processed during computation.\n\
    \nThe data is stored in a tensor, then fed into the hidden layers to be processed\
    \ to form a desired output.\n\nTensor is divided up into:\n\n- Dimensions — The\
    \ Tensor dimension is how many elements there are for the tensor. You can get:\n\
    \    - A single dimension tensor, which could be 5 rows by 1 column (5 x 1)\n\
    \    - You can get a tensor that is 5 rows by 4 columns (5 x 4)\n    - Multi-Dimensional\
    \ tensors are 3 x 3 x 3.\n- Rank — Tensor Ranks are the dimensions ranked based\
    \ on the dimension of the tensor, for instance:\n    - A tensor that only has\
    \ one element in it has a rank of 0, and is known as a scalar or s= [200]\n  \
    \  - A single dimensional tensor which has a row or column of data in it has a\
    \ rank of 1. It is a vector or v=[10,11,12]\n    - A two-dimensional tensor which\
    \ has more than one row or column of data in it has a rank of 2 and is known as\
    \ a matrix or m=[2,4,5],[6,7,8]\n    - A three-dimensional tensor has rank 3,\
    \ t = [2,4,5],[6,7,8],[9,10,11]\n\nThere can be Ranks 4, 5, and higher depending\
    \ on the dimension of the tensor(s).\n\n### Data Flow Graphs\n\nOnce the data,\
    \ which is stored in tensors, is passed to the next layer, a computation process\
    \ is run. This computation process is done as data flow graphs. TensorFlow models\
    \ are created by preparing graphs and nodes to be executed during a session where\
    \ the data used is taken from the data stored in the tensors.\n\nThe first step\
    \ is to create the graph. During this step no data is actually being executed\
    \ or used. It is not like traditional coding, as the graph is executed during\
    \ a session.\nFor each TensorFlow object a Data Flow Graph is created to represent\
    \ that object.\nMathematical computations in the Data Flow Graph are known as\
    \ “**nodes**.”\nAn “**edge**” in the Data Flow Graph represents multidimensional\
    \ arrays.\n\n**Tensorflow programs work by:**\n\n- Building a Data Flow Graph\
    \ — This is where you write the code to create a computational graph.\n- Creating\
    \ a session — This is the session where you execute the code.\n- Executing the\
    \ Data Flow Graph — The graph is executed during the session.\n\n**TensorFlow\
    \ Programming Elements**\nWriting TensorFlow models is not done in the normal\
    \ way a person would code in Python or another programming language. It is a bit\
    \ different and as such, there are a few basic programming elements you need to\
    \ be aware of.\nThese elements include:\n\n- **Constants** — Constants are similar\
    \ to variables, but the parameter values of constants do not change. A constant\
    \ is defined using the following:\n    - tf.constant()\n    - example: a=tf.constant(3.0)\n\
    - **Variables** — Variables are trainable parameters for a graph. Variables can\
    \ change as their values are variable. A variable is defined using the following:\n\
    \    - tf.variable()\n    - example: a=tf.Variable([.3])\n- **Placeholders** —\
    \ Placeholders allow for data to be fed into tensors from an outside source such\
    \ as a file. Place holders have to be fed by using the feed_dict parameter.\n\
    \    - tf.placeholder()\n    - example:\n        - a = tf.placeholder(tf.float32)\n\
    \        - b = a*2\n        - with tf.Session() as sess:\n        - result = sess.run(b.feed_dict={a:3.0})\n\
    - **Session** — Once the data has been assimilated and a Data Flow Graph has been\
    \ created, a session is nuanced to evaluate the nodes, and this is known as **TensorFlow\
    \ runtime**.\n\nEvery time you create a constant, variable, or placeholder, you\
    \ are performing an operation or creating a node. These operations form what is\
    \ called a node, and each of these nodes will run when you create a session.\n\
    \n### Getting Started with TensorFlow\n\nYou can use either Python or Anaconda\
    \ for the following TensorFlow exercises. Anaconda Jupyter Notebook has been used\
    \ for the sake of this book.\nOpen the Anaconda Navigator.\n\nOnce the Navigator\
    \ has opened in your default browser, launch the Jupyter Notebook. Depending on\
    \ your system and default browser, loading the Navigator can take a few to several\
    \ minutes to load.\n\nOpen a “New”, “Python 3” Notebook.\n\nName the Notebook\
    \ TensorFlow 1\n\nThe first step is to load or rather import the TensorFlow libraries\
    \ and modules. To do this, type the following into the blank Notebook cell:\n\n\
    ```python\nimport tensorflow as tf\n```\n\nRun the code and if there are no errors,\
    \ you should get returned to a blank cell.\n\n### Working with TensorFlow Variables,\
    \ Constants, Strings, Updates, Sessions, Placeholders, and Arrays\n\nCreate your\
    \ first TensorFlow **Variable** by typing in the following in a blank Notebook\
    \ cell:\n\n```python\nfirst=tf.Variable(0)\n```\n\nRun the code and if it runs\
    \ without errors you will be returned to a blank cell.\n\nCreate your first TensorFlow\
    \ **constant** by typing in the following in a blank Notebook cell:\n\n```python\n\
    second=tf.Variable(1)\n```\n\nRun the code and if it runs without errors you will\
    \ be returned to a blank cell.\n\nCreate a new variable by adding the variable\
    \ and constant. You can do this by typing in the following in a blank Notebook\
    \ cell:\n\n```python\nnew_value=tf.add(first,second)\n```\n\nRun the code and\
    \ if it runs without errors you will be returned to a blank cell.\n\nUpdate the\
    \ first variable by assigning the new_value to it. You can do this with the “update”\
    \ parameter. Do this by typing in the following in a blank Notebook cell:\n\n\
    ```python\nupdate=tf.assign(first,new_value)\n```\n\nRun the code and if it runs\
    \ without errors, you will be returned to a blank cell.\n\nIn the Graph Data if\
    \ you have **Variables** they need to be **initialized** before you can start\
    \ a session, or the session will terminate with an error. To initialize the variables\
    \ in a graph, type the following into in a blank Notebook cell:\n\n```python\n\
    init_vbs=tf.global_variables_initializer()\n```\n\nRun the code and if it runs\
    \ without errors, you will be returned to a blank cell.\n\nCreate your first **session**\
    \ for Graph Data Flow. You do this by typing the following into in a blank Notebook\
    \ cell:\n\n```python\nsess=tf.Session()\nsess.run(init_vbs)\nprint(sess.run(first))\n\
    ```\n\nThe next step is to set the y_pred. To do this type the following into\
    \ a blank Jupyter Notebook cell:\n\n```python\ny_pred = classifier.predict(X_test)\n\
    y_pred\n```\n\nRun the code and if there are no errors, your screen should look\
    \ similar to the example below.\n\nTo evaluate the model you will be using the\
    \ **confusion matrix**. In a blank Jupyter Notebook cell type the following:\n\
    \n```python\nclassifier = KNeighborsClassifier(n_neighbors=11,p=2,metric='euclidean')\n\
    print (cm)\n```\n\nRun the code and if there were no errors, your screen should\
    \ look like the example below.\n\nThe confusion list matrix breaks down as follows:\n\
    \n- The 94 and 32 are predictions that were correct\n- The 13 and 15 were predictions\
    \ that were missed\n\nNext you will print out the f1_score which measures the\
    \ accuracy of the test for the model. To print the f1_score type the following\
    \ code into a blank cell in the Jupyter Notebook:\n\n```python\nprint(f1_score(y_test,\
    \ y_pred))\n```\n\nRun the code and if it runs without an error, it will return\
    \ the following:\n\n```\n0.6956521739130436\n```\n\nThis is to what fraction the\
    \ test ran the f1 score, which would be 0.69.\n\nType the following code into\
    \ a blank Jupyter Notebook cell to get the accuracy score for the test:\n\n```python\n\
    print(accuracy_score(y_test,y_pred))\n```\n\nRun the code and if it runs without\
    \ an error, it will return the following:\n\n```\n0.8181818181818182\n```\n\n\
    The test ran with an accuracy of 0.82\n\nIn data science, the f1 score is how\
    \ many false positives there were. The accuracy score is what the model actually\
    \ got right."
  mdcn: "## 第六章：使用TensorFlow\n\n要使用TensorFlow，你必须理解深度学习的概念，本书开头已简要提及。深度学习是机器学习的一部分，它模拟人脑的功能。\n\
    \n通过使用复杂的算法，深度学习模型从非结构化数据中学习，以训练神经网络。神经网络通常由一个输入层和一个输出层组成，中间包含多个隐藏层。深度学习是人工智能的起点。任何拥有超过3个隐藏层的神经网络都被称为深度神经网络。\n\
    \n### 神经网络的层及其功能\n\n- **输入层** — 输入层接受各种输入，例如大量数据或图像的像素层。它将输入传递给神经网络的隐藏层。\n- **隐藏层**\
    \ — 隐藏层接收输入数据，并通过执行复杂的算法、操作和特征提取来处理它。隐藏层具有权重和偏置，这些参数在训练过程中会不断更新。存在不同的神经元，每个神经元都有多个权重和一个偏置（变量）。\n\
    - **输出层** — 输出层输出预测结果。\n\n### 深度学习库\n\n有许多深度学习库可用于机器学习模型。本书使用TensorFlow，它提供了许多可用于与TensorFlow交互的API。\n\
    \n在本书开头，你已经了解了TensorFlow是什么。它是由Google创建的一个开源库，既可用于传统的网格学习，也可用于深度学习。TensorFlow最初开发时主要用于运行数值计算，尤其是大规模计算。\n\
    \n很快人们就发现TensorFlow也非常适合深度学习。数据以多维数组的形式输入。这些数组被称为张量，它们在处理海量数据方面表现极其出色。\n\nTensorFlow可以与CPU和GPU协同工作，因为它基于数据流图运行。这些图由边和节点组成。这使得在网络中使用压缩数据变得更加容易。\n\
    \n### 张量\n\n在TensorFlow中，数据以张量的形式输入网络，张量是不同数据的数组，例如秩或维度，它们成为神经网络的输入。张量以一种便于在计算过程中处理数据的方式存储数据。\n\
    \n数据存储在张量中，然后被馈送到隐藏层进行处理，以形成所需的输出。\n\n张量分为：\n\n- **维度** — 张量的维度是指张量包含多少个元素。你可以得到：\n\
    \    - 单维张量，可以是5行1列（5 x 1）\n    - 你可以得到一个5行4列的张量（5 x 4）\n    - 多维张量是3 x 3 x 3。\n\
    - **秩** — 张量的秩是根据张量的维度进行排序的维度，例如：\n    - 仅包含一个元素的张量秩为0，被称为标量或 s= [200]\n    -\
    \ 包含一行或一列数据的单维张量秩为1。它是一个向量或 v=[10,11,12]\n    - 包含多行或多列数据的二维张量秩为2，被称为矩阵或 m=[2,4,5],[6,7,8]\n\
    \    - 三维张量秩为3，t = [2,4,5],[6,7,8],[9,10,11]\n\n根据张量的维度，可能存在秩4、5或更高的张量。\n\n###\
    \ 数据流图\n\n一旦存储在张量中的数据被传递到下一层，就会运行一个计算过程。这个计算过程是通过数据流图完成的。TensorFlow模型是通过准备图和节点来创建的，这些节点在会话期间执行，所使用的数据取自存储在张量中的数据。\n\
    \n第一步是创建图。在此步骤中，实际上没有数据被执行或使用。这与传统的编码不同，因为图是在会话期间执行的。\n为每个TensorFlow对象创建一个数据流图来表示该对象。\n\
    数据流图中的数学计算被称为“**节点**”。\n数据流图中的“**边**”代表多维数组。\n\n**TensorFlow程序的工作方式：**\n\n- 构建数据流图\
    \ — 这是你编写代码以创建计算图的地方。\n- 创建会话 — 这是你执行代码的会话。\n- 执行数据流图 — 图在会话期间执行。\n\n**TensorFlow编程元素**\n\
    编写TensorFlow模型的方式与人们在Python或其他编程语言中编码的常规方式不同。它有些不同，因此，你需要了解一些基本的编程元素。\n这些元素包括：\n\
    \n- **常量** — 常量类似于变量，但常量的参数值不会改变。常量使用以下方式定义：\n    - tf.constant()\n    - 示例：a=tf.constant(3.0)\n\
    - **变量** — 变量是图的可训练参数。变量可以改变，因为它们的值是可变的。变量使用以下方式定义：\n    - tf.variable()\n   \
    \ - 示例：a=tf.Variable([.3])\n- **占位符** — 占位符允许从外部源（如文件）将数据馈送到张量中。占位符必须使用feed_dict参数进行馈送。\n\
    \    - tf.placeholder()\n    - 示例：\n        - a = tf.placeholder(tf.float32)\n\
    \        - b = a*2\n        - with tf.Session() as sess:\n        - result = sess.run(b.feed_dict={a:3.0})\n\
    - **会话** — 一旦数据被吸收并且数据流图被创建，就需要一个会话来评估节点，这被称为**TensorFlow运行时**。\n\n每次你创建一个常量、变量或占位符时，你都在执行一个操作或创建一个节点。这些操作构成了所谓的节点，当你创建会话时，每个节点都会运行。\n\
    \n### TensorFlow入门\n\n你可以使用Python或Anaconda进行以下TensorFlow练习。为了本书的方便，使用了Anaconda\
    \ Jupyter Notebook。\n打开Anaconda Navigator。\n\n一旦Navigator在你的默认浏览器中打开，启动Jupyter\
    \ Notebook。根据你的系统和默认浏览器，加载Navigator可能需要几分钟到几分钟的时间。\n\n打开一个“New”，“Python 3”笔记本。\n\
    \n将笔记本命名为TensorFlow 1\n\n第一步是加载或导入TensorFlow库和模块。为此，在空白的笔记本单元格中输入以下内容：\n\n```python\n\
    import tensorflow as tf\n```\n\n运行代码，如果没有错误，你应该会返回到一个空白单元格。\n\n### 使用TensorFlow变量、常量、字符串、更新、会话、占位符和数组\n\
    \n在空白的笔记本单元格中输入以下内容，创建你的第一个TensorFlow **变量**：\n\n```python\nfirst=tf.Variable(0)\n\
    ```\n\n运行代码，如果没有错误，你将返回到一个空白单元格。\n\n在空白的笔记本单元格中输入以下内容，创建你的第一个TensorFlow **常量**：\n\
    \n```python\nsecond=tf.Variable(1)\n```\n\n运行代码，如果没有错误，你将返回到一个空白单元格。\n\n通过将变量和常量相加来创建一个新变量。你可以在空白的笔记本单元格中输入以下内容来完成此操作：\n\
    \n```python\nnew_value=tf.add(first,second)\n```\n\n运行代码，如果没有错误，你将返回到一个空白单元格。\n\
    \n通过将new_value赋值给第一个变量来更新它。你可以使用“update”参数来完成此操作。在空白的笔记本单元格中输入以下内容：\n\n```python\n\
    update=tf.assign(first,new_value)\n```\n\n运行代码，如果没有错误，你将返回到一个空白单元格。\n\n在图数据中，如果你有**变量**，在启动会话之前需要**初始化**它们，否则会话将因错误而终止。要初始化图中的变量，在空白的笔记本单元格中输入以下内容：\n\
    \n```python\ninit_vbs=tf.global_variables_initializer()\n```\n\n运行代码，如果没有错误，你将返回到一个空白单元格。\n\
    \n为图数据流创建你的第一个**会话**。在空白的笔记本单元格中输入以下内容：\n\n```python\nsess=tf.Session()\nsess.run(init_vbs)\n\
    print(sess.run(first))\n```\n\n下一步是设置y_pred。为此，在空白的Jupyter笔记本单元格中输入以下内容：\n\n```python\n\
    y_pred = classifier.predict(X_test)\ny_pred\n```\n\n运行代码，如果没有错误，你的屏幕应该看起来类似于下面的示例。\n\
    \n要评估模型，你将使用**混淆矩阵**。在空白的Jupyter笔记本单元格中输入以下内容：\n\n```python\nclassifier = KNeighborsClassifier(n_neighbors=11,p=2,metric='euclidean')\n\
    print (cm)\n```\n\n运行代码，如果没有错误，你的屏幕应该看起来像下面的示例。\n\n混淆列表矩阵分解如下：\n\n- 94和32是正确的预测\n\
    - 13和15是错误的预测\n\n接下来，你将打印出f1_score，它衡量模型测试的准确性。要在Jupyter笔记本的空白单元格中打印f1_score，请输入以下代码：\n\
    \n```python\nprint(f1_score(y_test, y_pred))\n```\n\n运行代码，如果没有错误，它将返回以下内容：\n\n\
    ```\n0.6956521739130436\n```\n\n这是测试运行的f1分数的比例，即0.69。\n\n在空白的Jupyter笔记本单元格中输入以下代码以获取测试的准确率分数：\n\
    \n```python\nprint(accuracy_score(y_test,y_pred))\n```\n\n运行代码，如果没有错误，它将返回以下内容：\n\
    \n```\n0.8181818181818182\n```\n\n测试的准确率为0.82\n\n在数据科学中，f1分数衡量的是假阳性的数量。准确率分数是模型实际正确的比例。"

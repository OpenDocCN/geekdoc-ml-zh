    # # Chapter 8:

    ## Machine Learning and Big Data


    Big Data is the practice of dealing with large volumes of data. Although computer
    scientists have been dealing with Big Data for decades, the term Big Data comes
    from the 1990s. What sets Big Data apart from standard data sets is the sheer
    volume of the data that is collected, processed, learned from, and continues to
    grow exponentially.


    Today the term Big Data brings with it a series of assumptions and practices that
    have made it a field all its own. Big Data is data containing more variety arriving
    in increasing volumes and with increasing velocity.


    # ### The 5 V’s of Big Data


    # #### Volume


    The term Big Data was coined in the early 2000s, when the amount of data available
    for analysis was too overwhelming for conventional systems to handle. Volume refers
    to the sheer amount of data produced these days with no signs of slowing down.
    Most systems analysts and infrastructure managers base their systems on data growth
    doubling every two years.


    # #### Velocity


    Along with the rise in the amount of data being created, there has been an increase
    in the speed at which it is produced. Things like smartphones, RFID chips, and
    real-time facial recognition produce enormous amounts of data that is produced
    in real time. Real-time data is data that has to be dealt with as soon as it is
    created. The increasing speed of this data being produced puts a heavy strain
    on the capacity of a system’s bandwidth, processing power, and storage space.


    # #### Variety


    Data does not get produced in a single format. It is stored numerically in detailed
    databases, produced in structure-less text and email documents, or stored digitally
    in streaming audio and video. There is stock market data, financial transactions,
    and so on, all of it uniquely structured. So not only must large amounts of data
    be handled very quickly, it is produced in many formats that require distinct
    methods of handling for each type.


    # #### Value


    Data can be a valuable commodity if it can be extracted and used in a structured,
    useful way. The less structure a data set has, the more processing it needs to
    produce useful results for it. Conventional data processing tools are not able
    to process extremely large amounts of data, and this is where the value of Big
    Data comes in.


    # #### Veracity


    Not all data that is captured is of value or can be used, especially when dealing
    with assumptions and predictions parsed out of large data sets. When dealing with
    large data sets, knowing the veracity of the data being used plays an important
    part in the output generated. Data veracity can be limited by factors such as
    data bias, errors introduced due to software bugs, data set omissions, questionable
    data sources, and human error. By limiting the amount of human interaction using
    machine learning and AI as much as possible allows for less error due to things
    such as wrong keystrokes, not reading data correctly, etc.


    # ### Big Data Uses


    The point of dealing with all this data is to identify useful detail out of all
    the noise. Noise in data refers to data that is deemed repetitive or unnecessary.
    Valuable data allows businesses to find ways to reduce costs, increase speed and
    efficiency, design new products and brands, and make better, more informed decisions.


    Some examples for current uses of Big Data include:


    # #### Product Development


    Big Data can be used to predict customer demand. Using current and past products
    and services to classify key attributes, they can then model these attributes’
    relationships and their success in the market.


    # #### Predictive Maintenance


    Buried in structured data are indices that can predict the mechanical failure
    of machine parts and systems. Year of manufacture make and model, and so on, provide
    a way to predict future breakdowns. This data, when correctly analyzed, can predict
    problems before they happen so maintenance can be deployed preemptively, reducing
    both cost and system downtime.


    # #### Customer Experience


    Using Big Data, businesses can get a much clearer view of the customer experience
    by examining social media, website visit metrics, call logs, and any other recorded
    customer interaction to modify and improve the customer'
  - '[PAGE 59]


    experience. Big Data allows for better customer relations due to the amount and
    detail of the data companies can extract. By using Big Data to identify problematic
    issues, businesses can handle them quickly and effectively, thereby reducing the
    risk of negative customer experiences or press.


    # Fraud & Compliance


    Big Data helps identify data patterns suggesting fraud or tampering. Aggregation
    of these large data sets makes regulatory reporting much faster.


    # Operation Efficiency


    Big Data is currently providing the most value and return in the area of operation
    efficiency. Big Data helps companies analyze and assess production systems, examine
    customer feedback and product returns, as well as a host of other useful business
    factors. This in turn can help companies reduce outages, waste, and can help them
    to anticipate future demand and trends. Big Data can also be useful in assessing
    current decision-making processes and how well they function in meeting demand.


    # Innovation


    Big Data''s strength is in creating better relations between meaningful labels.
    For a large business, this can mean helping businesses, people, institutions,
    and other entities to predict market trends. Being able to understand the customer
    gives companies an edge in the marketplace to lead the way in innovation. Knowing
    if a product is valuable but could be more valuable with certain modifications
    due to customer feedback can help organizations get ahead of their competition.
    Innovation driven by Big Data is really only limited by the ingenuity and creativity
    of the people curating it.'

    # Introduction


    If you have worked as a programmer in any other language, you will quickly be
    able to grasp the concept of Python. As with any type of new knowledge, it will
    come with a learning curve. However, Python is not a difficult language to learn
    and it doesn’t come with a steep learning curve. This makes Python an ideal language
    for beginner programmers just starting out.


    It is also open-source software, which means it is free and easily accessible
    for anyone to download. Over the last several years Python has become very popular
    among the programming community. It has a large and growing list of libraries
    and open source packages readily available for download across the Internet.


    Python is also one of the preferred programming languages for machine learning
    (MI) and is fast becoming one of the top programming languages for teaching MI.
    It is a powerful object-oriented, interactive, and interpreted programming language
    that utilizes concise syntax that is clear and easy to learn and follow. Python
    has many exceptions, high-level dynamic data types, dynamic typing, modules, and
    classes. It can also interface easily with other programming languages including
    C ++, C, and Java.


    Python is almost ten to fifteen times faster than languages such as C++, C, and
    JavaScript. Because of the object-orientated nature of Python programming, it
    makes translation a smooth and straightforward process. It can also be used to
    create easy automation interfaces and scripting for programming languages as an
    extension language.


    When it comes to machine learning, Python is considered to be one of the preferred
    languages as it:


    +   - Uses clear and concise syntax

    - Has a lot of code libraries

    - Can interface with nearly all the available platforms and languages

    - Is Open Source and readily available to download from the Internet


    # What is Machine Learning?


    In today''s technology-driven world there are so many different disciplines that
    pop up, it’s easy to get confused. For example, a lot of people tend to think
    machine learning (ML) and artificial intelligence (AI) are the same things. Although
    ML does get used together with AI, they are not the same thing. However, ML is
    a subset of AI.


    # The Difference Between Machine Learning (ML) and Artificial Intelligence (AI)


    Artificial intelligence and machine learning are sometimes hard to tell apart,
    especially as more and more systems now integrate ML with AI systems.


    # Artificial Intelligence (AI)


    Any system such as a phone, a robot, car, refrigerator, or a computer program
    that is made to be smart is AI. Some examples of AI systems include:


    +   - Siri

    - Alexa

    - Video Games

    - Smart Phones

    - Smart Cars

    - Smart Home devices


    # Machine Learning (ML)


    Machine learning systems are systems that start with basic knowledge but get smarter
    and smarter over time. These machines are designed to learn by themselves and
    can gain knowledge to get smarter without human intervention. More and more AI
    systems now integrate ML. They do so to create smarter AI systems that can learn
    by themselves without having to constantly physically update them.


    Some examples of ML systems include:


    +   - Speech recognition systems

    - Clinical diagnostic systems

    - Financial and banking services

    - Virtual personal assistants

    - Online customer support applications'
  - '[PAGE 6]


    +   - Google and other search engines

    - Online fraud detection systems

    - Social media services

    - Automated product recommendation systems.


    # **Some Acronyms to be Aware of When Learning ML:**


    While learning ML you will come across quite a few acronyms in reference to various
    applications.

    These acronyms include:


    # **Artificial Neural Networks (ANN)**


    Although there have been models of this type of networking since the 1940s, they
    were not very efficient models.

    These types of networks work well with massively large data sets and in recent
    years have advanced to become

    extremely powerful and useful. ANN models are inspired by the brain''s biological
    nervous system and the way it

    processes information. The most common systems they are used for include:


    +   - Classification systems

    - Self-driving cars

    - Stock market prediction systems

    - Character recognition systems


    # **Automated Speech Recognition (ASR)**


    ASR is a program integrated into various hardware systems that is designed to
    recognize voice or speech patterns. It

    can identify and process a human’s voice. This gives humans the ability to interface
    with a system by talking to it.

    ASR is limited in that it does not allow for open-ended conversation. Instead,
    ASR offers a menu of options a

    person can choose from to answer specific questions. The most common systems they
    are used for include:


    +   - GPS software

    - Phone answering messaging services

    - Automated telephone banking

    - Customer service interfaces


    # **Deep Learning (DL)**


    Deep learning systems learn by gathering information from data sets. These are
    large data sets that continue to

    grow. DL is part of ML but is the part that deals with much larger data sets or
    sources. DL systems, like ML

    systems, get smarter as they learn and grow. Some examples of systems that use
    DL include:


    +   - Voice-activated assistants

    - Self-driving cars

    - Voice-activated search engines or facilities

    - Language translation services such as French into English

    - Automatic text generators

    - Prediction software

    - Statistical software

    - Survey software

    - Spam filters

    - Advertising suggestion software

    - Plagiarism checkers


    # **Natural Language Processing (NLP)**


    NLP is the more advanced version of ASR. NLP allows for interaction between a
    human and a device. ASR has a

    menu of words or options that a person has to choose from to get a response or
    be directed. NLP uses an open-

    ended chat format that is close to having a real-time conversation with the machine.


    Some systems that use NLP that you may be familiar with include:


    +   - Siri

    - Alexa'
- md: '## Classification of Machine Learning Algorithms


    An algorithm is used to solve a problem and generate a solution in a computer
    program. It is a sequence of instructions given to the system which makes it function
    in the way the programmer designs it to. For instance, something as simple as
    logging in to a system is causing a sequence of instructions to be carried out
    within the program. Based on various instructions, rules, and parameters, computer
    algorithms are designed to process and organize these instructions accordingly.


    Machine learning is about computer algorithms that create a new set of rules.
    This means that instead of a programmer manually teaching the system by writing
    code after code of updated instructions, the computer has a set of instructions
    that enable it to learn from data input and grow, allowing for tasks that before
    could not be manually programmed to be carried out by the system. These are tasks
    such as a system recognizing and processing voices. Taking basic data sets and
    using them to learn and grow for systems that require predictive or suggestive
    outcomes is the basis of machine learning.


    Machine learning can be categorized into three general methods or techniques:


    ## Reinforcement Learning


    Reinforcement learning is a rewards-based system of learning. The system is either
    penalized or rewarded for the task it carries out. The programmer may set the
    basic rules and rewards policies for the system but will not give the system any
    clues as to how to carry out or solve the task.


    For instance, a self-driving car has to figure out how to get the passenger from
    A to B without harming the passer while keeping the car on the road and avoiding
    other cars. The car may have been fed a series of maps, general road rules, and
    information of objects it may encounter along the way. The car has to figure out
    the best way to perform its task and stick to rules to successfully complete the
    task it has been given. The car can leverage the power of being able to search
    through an ever-growing database of parallel scenarios to determine how to complete
    the task.


    ## Supervised Learning


    When children are taught, they are given examples of what they need to learn.
    Through these examples, children learn to make choices and base outcomes on these
    choices. For example, you can show a child a round ball and tell them it is a
    soccer ball. Then you can show an oblong eye-shaped ball and tell them it is a
    rugby ball. When they are asked to identify or retrieve a rugby ball, the child
    will pick the ball they were told and shown to be a rugby ball. This is what is
    called supervised learning. It is the process whereby a system''s response to
    new data input is generated using a set of known data and outcomes to generate
    a reasonable predicted outcome.


    For instance, let''s say you want to establish what the average price of a house
    in a certain neighborhood might be. You would input what a 2 bedroom, 2 bathroom
    house on the block recently sold for. You would also input what a 3 bedroom, 2
    bathroom house on the block recently sold for. Using that information you could
    find out what a 4 bedroom, 2 bathroom house on the block is estimated to sell
    for.


    For numeric labels in supervised learning the model is referred to as a “classification.”
    The model is known as a “regression” for categorical labels. Supervised learning
    algorithms include:


    - For regression problems, linear/logistic regression are used

    - For classification problems, support vectors are used

    - Random forest can be used for both regression and classification problems


    ## Unsupervised Learning


    Unsupervised learning is where the system has input data but no example outcomes.
    That machine is given the basic data and must learn more about the data to establish
    an outcome.


    For instance, an automated recommendation system is a prime example of an unsupervised
    learning system. This type of system uses a person''s past viewing or searching
    history to make suggestions based on the choices the person made in the past.
    As the person searches more subjects or views more videos, the system will adjust
    the suggestions accordingly.


    Unsupervised learning does not use labels and the algorithms are left to discover
    and learn on their own. Unsupervised algorithms can be separated into two groups:


    - Association, which is where the algorithm bases the outcome on similar problems.
    For instance, a customer who buys toothpaste will most likely also want a toothbrush.

    - Clustering is what groups customers into buyers of toothpaste.


    ## What is Scikit Learn?


    Scikit Learn is a Python library that contains tools such as regression, clustering,
    dimensionality reductions, and classification for statistical modeling and machine
    learning. Scikit Learn tools are used for building ML models, unlike Pandas and
    NumPy which are used for data summarizing, reading, and manipulation.


    Scikit learn, like Python, is a library that is free to download and use. It has
    features that include:


    - K-Neighbors

    - Random forests

    - Support vector machines


    ## What is Tensorflow?


    Tensorflow is an open-source library that is free to download and use and was
    created by Google. It is used for the development of deep learning (DL) models
    and allows for quick and easy computations of complex numerical operations across
    multiple platforms. Programmers use it for neural networks that are more large-scale
    and usually have multiple layers. Its primary use is for discovering, creating,
    and predicting, as well as classification, understanding, and perception in ML
    models.


    Python is used as a front-end application programming interface (API) for Tensorflow.
    Tensorflow is used to build, run, and train deep neural networks for systems which
    include:


    - Word embedding

    - Natural language processing (NLP)

    - Handwritten digit classification

    - Image recognition

    - Recurrent neural networks.


    # Chapter 1: History of Machine Learning


    The history of machine learning is embedded in the history of computing and man’s
    curiosity about artificially mimicking the brain. Most computing functions are
    made up of a series of complex algorithms. So, it should come as no surprise that
    computers were born from mathematics, in particular, Boolean logic.


    In Babylon, which is modern day Iraq, counting tools which are known as abacuses
    were used as far back as 300 B.C. The Abacus is an important computing reference
    because it was one of the first counting machines in history. It was also a prelude
    to the first gear-driven calculating clock developed by Wilhelm Schickard in 1623.
    It was a calculating machine that could add and subtract up to six-digit numbers.


    The dynamics of the workings of computers were figured out by mathematicians over
    a span of hundreds of years. It was through the expansion of various theories
    and prototypes developed by the minds of these great mathematicians from times
    past that computing developed to where it is today.


    ## Computing History Timeline


    **In 1652**, an 18-year-old young man, Blaise Pascal, became one of France’s most
    revered mathematicians and was hailed a child prodigy. Pascal invented the first
    digital calculator to help his father calculate tax accounting. It was known as
    the Arithmetique or Pascaline. It was an arithmetic machine that could add, subtract,
    multiply, and divide.


    **In 1671** the Step Reckoner was designed by Gottfried Wilhelm Leibniz. It was
    a calculating machine that updated Pascal’s idea and added a new dimension of
    multiplication to the machine. The machine was built in 1673. Although Leibniz
    was a staunch advocate of the binary system, his machine used the decimal system.


    **In 1689**, Gottfried Wilhelm Leibniz created the binary number system that is
    still used in computing today. He developed the binary number system using only
    ones and zeros to convert logical verbal statements into mathematical ones. In
    1703, he wrote an article on how zeros and ones could easily represent numbers
    (Gonzalez, 2018).


    **In 1801**, a loom created by Joseph Marie Jacquard of France automatically wove
    fabric designs based on wooden punch cards inserted into the machine. The first
    computers used a design that was much the same as this loom.


    **In 1822**, English inventor Charles Babbage was funded by the English government
    to design a steam-driven calculating machine. The machine was supposed to be able
    to calculate tables of numbers, but the project was a failure. The machine was
    known as the Difference Engine. Babbage did, however, find ways to try to make
    the calculator a more viable project, and by **1833** he had begun to develop
    a better machine, the Analytical Engine. It was the first “fully program controlled,
    automatic mechanical digital computer” (“Analytical Engine”, n.d.). There were
    four components to the machine, which were the reader, the mill, the store, and
    the printer. Babbage died before completing the Analytical Engine, but it was
    a machine that was worthy of being called the first computer.


    **In 1842**, Ada Lovelace, deemed the world''s first computer programmer, wrote
    the first ever machine algorithm. The algorithm was written for Babbage''s Analytical
    Engine, which at the time only existed on paper.


    **In 1847**, George Boole started Boolean algebra which was first called the algebra
    of logic. Boolean logic is the logic upon which systems like telephone switching
    is based. It is also logic upon which computers operate and are designed.


    **In 1936**, Alan Turing invented an idea of a “Universal Machine” that would
    be able to analyze and perform a given set of tasks. In 1930, the death of someone
    close to him made him become obsessed with the brain and the mind, as he believed
    his friend''s mind did not just die with him. The paper that Turing published
    in 1936 has become known as the “Foundation of computer science” (“Alan Turing”,
    n.d.). In **1946**, Turing designed the Automatic Computing Engine (ACE).


    **In 1943**, a neurophysiologist, Warren McCulloch, teamed up with a mathematician,
    Walter Pitts, and co-wrote a paper theorizing how neurons in the human brain might
    function. They then modeled their theory by building a simple neural network with
    electrical circuits. Their paper gave a simplified model of a neural network with
    electrical circuits which has had an important impact on artificial neural networks.


    **In 1949**, Donald Hebb created a model based on the brain cell interaction which
    he published in a book. The book, “The Organization of Behavior,” discussed Hebb''s
    theories on communication and excitement between neurons. The model which Hebb
    described in his book reveals a way that the relationship between two artificial
    neurons can be altered.


    **In 1950**, Alan Turing, in one of his philosophical papers, put forward the
    “Learning Machine.” His idea was to compare the outputs of a human against that
    of a machine. This paper was to become the paper that he would be remembered for
    and was what the Turing Test was adapted from. The Turing Test is still used today
    to determine the intelligence behavior of a machine. In order for an AI to be
    determined as intelligent, it must be able to think.'
  mdcn: '## 机器学习算法的分类


    算法用于在计算机程序中解决问题并生成解决方案。它是一系列提供给系统的指令，使其按照程序员设计的方式运行。例如，登录系统这样简单的操作，也会在程序内部触发一系列指令的执行。基于各种指令、规则和参数，计算机算法被设计用来相应地处理和组织这些指令。


    机器学习是关于创建新规则集的计算机算法。这意味着，程序员无需通过编写一行又一行更新的指令来手动教导系统，而是让计算机拥有一套指令，使其能够从数据输入中学习并成长，从而允许系统执行以前无法通过手动编程完成的任务。这些任务包括系统识别和处理语音等。利用基础数据集，为需要预测性或建议性结果的系统进行学习和成长，这就是机器学习的基础。


    机器学习可以分为三种通用方法或技术：


    ## 强化学习


    强化学习是一种基于奖励的学习系统。系统因其执行的任务而受到惩罚或奖励。程序员可能会为系统设定基本规则和奖励策略，但不会给系统任何关于如何执行或解决任务的提示。


    例如，一辆自动驾驶汽车必须弄清楚如何在不伤害行人的情况下，将乘客从A点送到B点，同时保持汽车在道路上行驶并避开其他车辆。汽车可能被输入了一系列地图、通用道路规则以及沿途可能遇到的物体信息。汽车必须找出执行任务的最佳方式并遵守规则，才能成功完成给定的任务。汽车可以利用其搜索不断增长的并行场景数据库的能力，来确定如何完成任务。


    ## 监督学习


    当教导孩子时，我们会给他们需要学习内容的示例。通过这些示例，孩子学会做出选择并基于这些选择得出结果。例如，你可以给孩子看一个圆球并告诉他们这是足球。然后你可以给他们看一个椭圆形的橄榄球并告诉他们这是橄榄球。当被要求识别或找出橄榄球时，孩子会拿起他们被告知并看到是橄榄球的那个球。这就是所谓的监督学习。它是一个系统使用一组已知数据和结果来生成对新数据输入的合理预测结果的过程。


    例如，假设你想确定某个社区房屋的平均价格。你会输入该街区一套2卧室、2浴室房屋最近的售价。你还会输入该街区一套3卧室、2浴室房屋最近的售价。利用这些信息，你可以估算出该街区一套4卧室、2浴室房屋的预计售价。


    在监督学习中，对于数值标签，模型被称为“分类”。对于类别标签，模型被称为“回归”。监督学习算法包括：


    - 对于回归问题，使用线性/逻辑回归

    - 对于分类问题，使用支持向量机

    - 随机森林可用于回归和分类问题


    ## 无监督学习


    无监督学习是指系统有输入数据但没有示例结果。机器被给予基础数据，必须进一步学习数据以建立结果。


    例如，自动推荐系统是无监督学习系统的一个典型例子。这类系统使用个人过去的观看或搜索历史，根据其过去的选择提出建议。随着个人搜索更多主题或观看更多视频，系统会相应地调整建议。


    无监督学习不使用标签，算法被留待自行发现和学习。无监督算法可以分为两组：


    - 关联，即算法基于相似问题得出结果。例如，购买牙膏的顾客很可能也会想要牙刷。

    - 聚类，即将顾客分组为牙膏购买者。


    ## 什么是 Scikit Learn？


    Scikit Learn 是一个 Python 库，包含用于统计建模和机器学习的工具，如回归、聚类、降维和分类。Scikit Learn 工具用于构建 ML
    模型，而 Pandas 和 NumPy 则用于数据汇总、读取和操作。


    Scikit learn 和 Python 一样，是一个可以免费下载和使用的库。其功能包括：


    - K-近邻算法

    - 随机森林

    - 支持向量机


    ## 什么是 Tensorflow？


    Tensorflow 是一个开源库，可以免费下载和使用，由 Google 创建。它用于开发深度学习（DL）模型，并允许在多个平台上快速轻松地进行复杂数值运算。程序员将其用于更大规模且通常具有多层的神经网络。其主要用途是在
    ML 模型中进行发现、创建和预测，以及分类、理解和感知。


    Python 被用作 Tensorflow 的前端应用程序编程接口（API）。Tensorflow 用于为以下系统构建、运行和训练深度神经网络：


    - 词嵌入

    - 自然语言处理（NLP）

    - 手写数字分类

    - 图像识别

    - 循环神经网络。


    # 第一章：机器学习的历史


    机器学习的历史植根于计算历史以及人类对人工模拟大脑的好奇心。大多数计算功能都由一系列复杂的算法组成。因此，计算机诞生于数学，特别是布尔逻辑，这并不奇怪。


    早在公元前300年，在现今的伊拉克巴比伦，就使用了称为算盘的计数工具。算盘是一个重要的计算参考，因为它是历史上最早的计数机器之一。它也是1623年威廉·席卡德开发的第一台齿轮驱动计算钟的前奏。那是一台可以进行六位数加减运算的计算机器。


    计算机工作原理的动力学机制是由数学家们在数百年间逐步弄清楚的。正是通过这些伟大数学家过去所发展的各种理论和原型的扩展，计算才发展到了今天的地步。


    ## 计算历史时间线


    **1652年**，18岁的年轻人布莱兹·帕斯卡成为法国最受尊敬的数学家之一，并被誉为神童。帕斯卡发明了第一台数字计算器，以帮助他的父亲计算税款。它被称为算术器或帕斯卡计算器。它是一台可以进行加、减、乘、除运算的算术机器。


    **1671年**，戈特弗里德·威廉·莱布尼茨设计了步进计算器。这是一台更新了帕斯卡想法并为机器增加了乘法新维度的计算机器。该机器于1673年制造。尽管莱布尼茨是二进制系统的坚定倡导者，但他的机器使用的是十进制系统。


    **1689年**，戈特弗里德·威廉·莱布尼茨创造了至今仍在计算中使用的二进制数系统。他仅使用1和0开发了二进制数系统，将逻辑语言陈述转换为数学陈述。1703年，他撰写了一篇关于零和一如何能轻松表示数字的文章（Gonzalez,
    2018）。


    **1801年**，法国人约瑟夫·玛丽·雅卡尔制造的一台织布机，根据插入机器的木制穿孔卡片自动编织织物图案。第一台计算机的设计与此织布机非常相似。


    **1822年**，英国发明家查尔斯·巴贝奇获得英国政府资助，设计一台蒸汽驱动的计算机器。该机器本应能够计算数字表，但项目失败了。这台机器被称为差分机。然而，巴贝奇确实找到了尝试使计算器成为更可行项目的方法，到**1833年**，他开始开发一台更好的机器——分析机。它是第一台“完全程序控制、自动机械数字计算机”（“Analytical
    Engine”，n.d.）。该机器有四个组成部分：读取器、磨坊、存储器和打印机。巴贝奇在完成分析机之前去世，但这台机器值得被称为第一台计算机。


    **1842年**，被誉为世界上第一位计算机程序员的阿达·洛芙莱斯，编写了有史以来第一个机器算法。该算法是为巴贝奇的分析机编写的，当时该机器仅存在于纸面上。


    **1847年**，乔治·布尔创立了布尔代数，最初称为逻辑代数。布尔逻辑是电话交换等系统所基于的逻辑。它也是计算机运行和设计所基于的逻辑。


    **1936年**，艾伦·图灵提出了“通用机器”的概念，该机器能够分析并执行给定的一组任务。1930年，一位亲近之人的去世使他开始痴迷于大脑和心智，因为他相信他朋友的心智并非随他一同消亡。图灵于1936年发表的论文被称为“计算机科学的基础”（“Alan
    Turing”，n.d.）。**1946年**，图灵设计了自动计算引擎（ACE）。


    **1943年**，神经生理学家沃伦·麦卡洛克与数学家沃尔特·皮茨合作，共同撰写了一篇论文，理论化了人类大脑中的神经元可能如何运作。然后，他们通过使用电路构建一个简单的神经网络来建模他们的理论。他们的论文提供了一个使用电路的简化神经网络模型，这对人工神经网络产生了重要影响。


    **1949年**，唐纳德·赫布基于脑细胞相互作用创建了一个模型，并将其发表在一本书中。这本书《行为的组织》讨论了赫布关于神经元之间通信和兴奋的理论。赫布在书中描述的模型揭示了一种改变两个人工神经元之间关系的方法。


    **1950年**，艾伦·图灵在他的一篇哲学论文中提出了“学习机器”。他的想法是比较人类的输出与机器的输出。这篇论文将成为他被铭记的论文，也是图灵测试改编的来源。图灵测试至今仍用于确定机器的智能行为。为了使人工智能被判定为智能，它必须能够思考。'

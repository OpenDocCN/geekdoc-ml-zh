    The Internet of Things allows for the remote control and scheduling of systems
    such as internal lighting, HVAC, ovens, and so on.


    In order to successfully implement energy management on this scale, the system
    needs the power of machine learning to provide the predictive models. ML is necessary
    in energy management to anticipate and balance loads, aided by the constant flow

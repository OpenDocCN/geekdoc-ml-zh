    \n## 将数据集拆分为训练集和测试集\n\n要拆分数据集，你需要告诉模型数据集中的哪些列是训练数据，哪些是结果或答案的一部分。对于糖尿病数据集，有 9 列，对于模型来说是从\
    \ 0:8（: 表示到，如果单独使用 : 则表示全部）。\n\n在以下命令中，你将看到第一行是 x = dataset.iloc[:, 0:8]，这是**训练数据**。这意味着：\n\
    \n- : — 表示包含所有行\n- 0:8 — 表示所有列，直到但不包括第 9 列。模型从零开始计数。\n\n下一行将是结果或答案数据的一部分。它将写为\
    \ y = dataset.iloc[:, 8]。这意味着：\n\n- : — 表示包含所有行\n- 8 — 告诉模型在哪里找到结果\n\n代码的最后一行只是设置\
    \ train_test_split。\n在 Jupyter Notebook 的空白单元格中输入以下内容：\n\n```\nX = dataset.iloc[:,\

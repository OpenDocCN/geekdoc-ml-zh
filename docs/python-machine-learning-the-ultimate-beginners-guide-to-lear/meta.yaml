  - '[PAGE 30]


    If you need to install a **GPU** version for TensorFlow, type the following command
    into the **cmd** command line:


    ```

    pip install -U tensorflow-gpu

    ```


    This will install the TensorFlow **GPU** version for your Windows system. **GPU**
    is a more advanced modelling system of TensorFlow and is used for huge amounts
    of data and graphics/images. It is also used to work with more complex tasks than
    **CPU** and can be quite a bit slower than **CPU**.


    # Installing TensorFlow With Python Pip with a Virtual Environment


    If you created the sklearn-venv environment when you installed Scikit-Learn, then
    you should install TensorFlow into that environment. You can activate that environment
    by typing in the following at the **cmd** prompt:


    ```

    sklearn-venv\Scripts\activate

    ```


    Follow the same installation process for installing Scikit-Learn as you would
    when you are installing it without the virtual environment.


    # Installing TensorFlow With Anaconda Conda Without a Virtual Environment


    To install TensorFlow with Anaconda and ensure it is the latest version that is
    compatible with your Anaconda installation, open the **Anaconda Prompt** screen
    and type the following:


    ```

    conda install tensorflow

    ```


    The above command will help you install the **CPU** only version for TensorFlow.


    If you need to install a **GPU** version for TensorFlow, type the following command
    into the **Anaconda Prompt** command line:


    ```

    conda install tensorflow-gpu

    ```


    This will install the TensorFlow **GPU** version for your Windows system.


    # Installing TensorFlow With Anaconda Conda With a Virtual Environment


    If you have already created a conda virtual environment for Scikit-Learn, then
    use the same environment. If you have not, follow the same procedure to create
    an Anaconda environment as shown in the “**Installing Scikit-Learn in Anaconda
    with a Virtual Environment.**” Once you have the Anaconda virtual environment,
    activate it using the following command:


    ```

    activate sklearn-env

    ```


    Install TensorFlow by typing in:


    ```

    conda install tensorflow

    ```


    This will install the TensorFlow CPU version for your Windows system.'
  - "[PAGE 31]\n\n# # Chapter 4: Using Scikit-Learn\n\nTo start using Scikit-Learn\

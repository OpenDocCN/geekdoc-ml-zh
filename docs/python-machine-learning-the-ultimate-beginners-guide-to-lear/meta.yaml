    # Support Vector Machine


    Support Vector Machine algorithms are supervised machine learning algorithms that
    can be used for classification and regression analysis. It is most often used
    for classification problems which the algorithm does by dividing categories using
    a hyperplane, which is a flat 3-dimensional sheet. It splits the data by category
    into separate dimensions and will continue to add dimension until there is no
    data overlap.


    It is an incredibly powerful method for classifying data that is not without its
    issues. One of these issues is that looking at data once it has been mapped into
    higher dimensions isn’t possible. The more it is split, the bigger chance there
    is of the data becoming gibberish. The process of SVM is not suited for very large
    data sets that are more complex and need more time to train. SVM is more suited
    to smaller, less complex data sets that do not take much training.


    # Machine Learning and Swarm Intelligence


    Swarm Intelligence (SI) is defined as collaborative behavior, natural or artificial,
    of decentralized, self-organized systems. An ant colony or a “swarm” of autonomous
    mini-drones in a lab fall into the category of swarm intelligence.


    In artificial intelligence, a swarm is typically a collection of agents that interact
    with each other and their environment. The inspiration for Swarm Intelligence
    comes from nature, from the collaboration of bees, or the flocking of birds, the
    gathering of herd animals, or any group of creatures with no centralized decision-making
    process but rather a collaborative one. These creatures appear to act intelligently
    even when no single individual one exhibits any signs of exceptional intelligence.


    # Swarm Behavior


    One of the central tenets gleaned from swarm research has been the notion of emergent
    behavior. When a number of individuals are given simple rules for complex behavior,
    some behaviors seem to arise despite there being no rule or instruction to create
    them.


    An artificial life program, called Boids, was created by Craig Reynolds in 1986,
    which simulated birds flocking together. In this program, each individual bird
    was given a simple set of rules to follow. When he let the birds free, his experimental
    birds behaved like a real bird flock. He soon discovered that he could add more
    rules to make more complex flocking behavior in the likes of goal seeking or obstacle
    avoidance.


    # Applications of Swarm Intelligence


    Swarm Intelligence can be applied in many areas. Military applications include
    research into techniques for unmanned vehicle control. For NASA, swarm tech has
    been considered for the mapping of planets. In a 1992 paper, George Bekey and
    M. Anthony Lewis discussed using swarm intelligence in nanobots inserted into
    the human body to attack and destroy cancer tumors.


    # Ant-based Routing


    In the telecommunication industry, the use of Swarm Intelligence has been researched
    using a routing table where small control packets, called ants, are rewarded for
    successfully traversing a route. Variations on this research include forwards,
    backward, and bi-directional rewards. Such systems are not repeatable because
    they behave randomly, so commercial uses have thus far proved elusive.


    One promising application for Swarm Intelligence is wireless communication networks.
    In this case, the network relies on a limited number of locations that are expected
    to provide adequate coverage for users. Stochastic diffusion search (SDS) was
    modeled to address the problematic application areas of various ant-based swarm
    intelligence, with great success in some cases.


    Airlines have experimented with ant-based Swarm Intelligence. Southwest Airlines
    uses software that employs swarm theory to manage its airlines on the ground.
    Each pilot acts like an “ant” in the swarm, discovering through experience what
    gate is best for him or her. This behavior turns out to be the best for the airline
    as well. The pilot colony uses the gates each one is familiar with to create more
    efficient arrival and departure times. This also offers the added bonus of data
    feedback to ensure there are limited to no gate backups, thus cutting down on
    delays.'
  - '[PAGE 70]


    # Crowd Simulation


    The movies are using Swarm Intelligence simulations for depicting animal and human
    crowds instead of trying to recreate real life ones. In *Batman Returns*, Swarm
    Intelligence was employed to create realistic bat simulations in the scenes where
    there were swarms of bats. For the *Lord of the Rings* movies, Swarm Intelligence
    simulations were employed to depict the massive battle scenes.


    # Human Swarms


    When combined with mediating software, a network of distributed people can be
    organized into swarms by implementing closed-loop, real-time control systems.
    These systems, acting out in real-time, allow human actors to act in a unified
    manner, a collective intelligence that operates like a single mind, making predictions
    or answering questions. Testing in academic settings suggests these human swarms
    can out-perform individuals in a wide variety of real-world situations.


    Swarm Intelligence and Machine Intelligence are both forms of artificial intelligence.
    There is much debate about SI being a subset of machine intelligence as it is
    a different approach toward the goal of smart machines. SI models the behavior
    of a particular kind of animal or animals, to achieve desired results. Thus, Swarm
    Intelligence and machine intelligence, even if one is not classified as a subset
    of the other, can complement each other. In an attempt to determine emotions from
    subtext text, a Swarm Intelligence approach will differ from a monolithic approach.
    Instead of one machine learning algorithm to detect emotion in text, a swarm approach
    might be to create many simple machine learning algorithms, each designed to detect
    a single emotion. These heuristics can be layered in hierarchies to avoid any
    emotion-detector fouling up the end result.


    For example, take a machine learning swarm meant to detect emotion in written
    text while examining this sentence: “When I pulled back the covers of my bed this
    morning, a giant spider ran over my leg, and I immediately ran out of the bedroom
    screaming.”


    This is a complex sentence and as such it is difficult for a natural language
    machine learning algorithm to parse for emotion. However, a swarm of simple machine
    learning algorithms dedicated to detecting one kind of emotion would likely have
    the terror algorithm scoring high, while fun and happiness scored low.


    Another more difficult example would be the following sentence:


    > “I watched the game yesterday and saw us kick butt in the first period, but
    by the third, I was terrified we would lose.”


    Human beings understand hyperbole. The writer is not terrified, but anxious the
    team will lose the game. Our swarm machine intelligence algorithms could have
    the fear or terror algorithm scoring high, but this would be inaccurate. Because
    swarm models can be hierarchical, one model’s output could be the input of another.
    In this case, a master model that detects emotion could filter through the outputs
    of each individual emotion algorithm, noting that “excitement” had been triggered
    by “kick butt,” parse that the subject of the sentence is a sport, and determine
    that anxiety is a better fit than terror.


    If you take the above into account, then it seems only fair to define Swarm Intelligence
    as an application of machine learning with an extremely narrow focus.'
- md: '## Chapter 14: Applications of Machine Learning


    Most people in today’s world are using real-world applications of machine learning
    in their everyday lives. Some of these applications are easily recognized, while
    others are hidden and operating in the background to make people’s lives easier,
    more convenient, or safer. Though you might not recognize it, there are many technological
    advancements in your home that work through programming and training to become
    more accessible. These devices have the ability to learn and provide the basis
    for modern technology upon which mankind is very much reliant in the modern day.


    Applications of machine learning in the everyday modern world include:


    ### Virtual Personal Assistants


    The application of virtual personal assistants (VPA) include Google Assistant,
    Apple’s Siri, Amazon’s Alexa, and Microsoft’s Cortana. But these are only a few
    of the more widely used and well-known virtual assistants people interact with
    almost every day. They are also the most popular and well-known examples of applied
    machine learning systems in use in the modern world.


    However, most personal assistants rely on more than one kind of machine learning
    technique in order to operate at their full potential. Most VPA’s are either voice,
    motions, or need text entered to be activated. Thus, a person needs to first establish
    communication with the VPA using either a common writing script or voice in their
    language of choice. This establishes the connection or rapport with the machine
    which will answer back in the same language. Speech recognition is one of the
    machine learning skills these assistants use to understand you. Once the VPA has
    recognized the command and understood it, it will set in motion another machine
    learning technique to search for the desired answers being asked for. The last
    step in the process will be to respond with those answers and then track the response
    which the VPA will compare to previous responses. These answers are stored and
    used to assimilate more accurate ones in order to be more precise and efficient
    for any future requests.


    ### Computing Predictions


    Anyone that has used either Google or Apple maps has used a form of machine learning
    to help them arrive at a given destination. These apps in turn store locations,
    directions, and speeds in a central location to lead you to your destination,
    providing turn details and so on before you actually reach the turning point.
    At the same time, they are aggregating the data from all of the users nearby who
    are using their service to make more accurate predictions with regard to road
    travel information. This information includes tracking traffic congestion in order
    to offer a modified route to your destination in real-time to avoid delays to
    the journey. When there are not enough people using the app at any given time,
    the system relies on predictive machine learning from previous traffic data accumulated
    from a previous time the journey to the same location was taken. This way the
    ML can anticipate the traffic if it is unable to collect the data in real-time.


    Rideshare companies such as Uber and Lyft are prime examples of companies that
    make use of machine learning applications. These applications are used to determine
    the cost of a ride, based on the user''s current location and their destination
    based on various trends, previous customers, and data gathered about the route.
    These services would become technically impossible without machine learning crunching
    massive amounts of data, both historical and in real-time.


    ### Online Fraud Detection


    Securing cyberspace is one of the many goals of machine learning. Tracking online
    fraud is an important tool for achieving this goal. PayPal employs machine learning
    in its efforts to prevent money laundering. Their software can track the millions
    of transactions taking place and separate legitimate from illegitimate transactions
    going on between buyers and sellers.


    ### Data Security


    Another form of security in cyberspace is combating malware. This is a massive
    problem that continues to escalate and become more sophisticated. Machine learning
    is able to quickly search and find anomalies that point to malware in order to
    combat the issue before it becomes a problem. Machine learning can detect malware
    with a high degree of accuracy, and most new malware strains can be caught almost
    as quickly as they can be created and dealt with just as efficiently.


    Machine learning is also very good at monitoring data access and finding anomalies,
    which might predict possible security breaches.


    ### Personal Security


    Everyone getting on a plane or entering a large event is screened to ensure the
    safety of the flight or event. Machine learning is starting to aid the manual
    checking of people, spotting anomalies human screenings might miss, and helping
    to prevent false alarms. This help promises to speed up security screening in
    a substantial way, while at the same time ensuring safer events through the more
    powerful screening processes machine learning can provide.


    What this means in real-life is the elimination of long slow queues in places
    like airports, large events, and so on.


    ### Video Surveillance


    The problem with video surveillance is that for it to really be 24hr and 365 days
    a year, it has to be constantly surveyed. Humans tend to get distracted, need
    bathrooms, coffee, and food breaks. They also doze off when they become bored
    or can miss things if something becomes too monotonous.


    The benefit is machine learning never gets tired, or needs a break, or has its
    attention wander, so nothing is ever missed. Machine learning can focus on anomalous
    behavior like standing for a long time without moving, sleeping on benches, or
    stumbling, meaning human beings can be freed up to do what they do much better:
    deal with these people as required.


    ### Social Media Services



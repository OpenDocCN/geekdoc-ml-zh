    \n+   - Taking the graph above as an example, you would know the location of **Point\
    \ A** and the location of **Point B** on the graph.\n    - **Point A:** X = 2\
    \ and Y = 5 (2,5)\n    - **Point B:** X = 1 and Y = 0 (1,0)\n- What needs to be\
    \ calculated is **Point C**, which is the **distance** between **Point A** and\
    \ **Point B**.\n- The calculation would look like the following formula:\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_41_1.png)"

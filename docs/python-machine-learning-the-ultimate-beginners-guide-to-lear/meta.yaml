    \ If it was not imported correctly there will be an error message.\n\nYou can\
    \ start creating machine learning models with Scikit-learn and use the libraries\
    \ that are included with the package.\n\n# ## The Learning Problem\n\nMachine\
    \ Learning is based on a training set and a testing set. The training set is used\
    \ to learn various properties from the data set. The testing set is used to test\
    \ what was learned in the training set.\n\nLearning problems in machine language\
    \ have two categories, as already discussed in a previous chapter. Learning problems\
    \ need to take into consideration various data sets of n samples. It uses these\
    \ samples to try and predict the unknown data properties.\n\nThe two problem categories\
    \ are classed as:\n\n+   - **Supervised Learning**, when the machine algorithm's\
    \ data has a few more attributes to it that need to have a predictive outcome.\
    \ For instance, for a human it is when a child gets shown the color red and is\
    \ told that it is red. Then they are shown a few other colors and are told they\
    \ are not red. This classifies the problem as being either the color red or not\
    \ the color red. Supervised learning problems are used to solve either:\n    -\
    \ **Classification problems**, problems that are known to have discrete output\
    \ values. For instance, it is either the color red or it is not the color red;\
    \ there is no other possibility or grey areas. Classification data will have the\
    \ following elements to it:\n        - **A predictor** or predictors. For example,\
    \ based on an age group, predicting how many people enjoy vanilla ice-cream. In\
    \ this case the age would be the predictor for the output\n        - **A label**\
    \ which is the output, and for a classification it is represented by an integer\
    \ which could be 1, 2, -2, or 0. When you think of a label think of it as a yes\
    \ or a no tag, because labels cannot be used to perform mathematical operations.\
    \ Think about adding Yes, they like ice cream + No, they do not like ice cream\
    \ together. It makes no sense to do so as they are simply labels.\n    - **Regression**\
    \ is when the machine learning algorithm needs to compare one or more continuous\
    \ variables in order to predict an outcome. For instance, think of the average\
    \ weight of a person that is 5 foot 3 inches. It could go one further to predict\
    \ the weight of a person depending on their height and build. Regression will\
    \ have one or more independent variables and a dependent variable. For the example\
    \ above, weight would be the dependent variable which is predicted depending on\
    \ the height and build of the person.\n- **Unsupervised Learning** is when the\
    \ machine learning algorithm is given a data set that consists only of functions\
    \ and features. There is no target data set of example outcomes (labels). For\
    \ example, the machine is only given input data and nothing to base its predictions\
    \ on. Therefore the machine has to learn the basic structure of the data instead.\
    \ Some unsupervised learning structures include:\n    - **Clustering**, when a\
    \ group of similar objects are grouped together in a cluster. Clustering is useful\
    \ in applications such as statistical data analysis and data mining.\n    - **Density\
    \ estimation**, when an estimate is formed on observed data. Histograms, Parzen\
    \ windows, and vector quantization are examples techniques of density estimation."

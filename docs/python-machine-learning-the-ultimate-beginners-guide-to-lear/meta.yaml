    Run the code and if it runs without errors you will be returned to a blank cell.


    Create a new variable by adding the variable and constant. You can do this by
    typing in the following in a blank Notebook cell:


    ```

    python

    new_value=tf.add(first,second)

    ```


    Run the code and if it runs without errors you will be returned to a blank cell.


    Update the first variable by assigning the new_value to it. You can do this with
    the “update” parameter. Do this by typing in the following in a blank Notebook
    cell:


    ```

    python

    update=tf.assign(first,new_value)

    ```


    Run the code and if it runs without errors, you will be returned to a blank cell.


    In the Graph Data if you have **Variables** they need to be **initialized** before
    you can start a session, or the session will terminate with an error. To initialize
    the variables in a graph, type the following into in a blank Notebook cell:


    ```

    python

    init_vbs=tf.global_variables_initializer()

    ```


    Run the code and if it runs without errors, you will be returned to a blank cell.


    Create your first **session** for Graph Data Flow. You do this by typing the following
    into in a blank Notebook cell:


    ```

    python

    sess=tf.Session()

    sess.run(init_vbs)

    print(sess.run(first))

    ```'

  md: '# Classification of Machine Learning Algorithms


    An algorithm is used to solve a problem and generate a solution in a computer
    program. It is a sequence of instructions given to the system which makes it function
    in the way the programmer designs it to. For instance, something as simple as
    logging in to a system is causing a sequence of instructions to be carried out
    within the program. Based on various instructions, rules, and parameters, computer
    algorithms are designed to process and organize these instructions accordingly.


    Machine learning is about computer algorithms that create a new set of rules.
    This means that instead of a programmer manually teaching the system by writing
    code after code of updated instructions, the computer has a set of instructions
    that enable it to learn from data input and grow, allowing for tasks that before
    could not be manually programmed to be carried out by the system. These are tasks
    such as a system recognizing and processing voices. Taking basic data sets and
    using them to learn and grow for systems that require predictive or suggestive
    outcomes is the basis of machine learning.


    Machine learning can be categorized into three general methods or techniques:


    # Reinforcement Learning


    Reinforcement learning is a rewards-based system of learning. The system is either
    penalized or rewarded for the task it carries out. The programmer may set the
    basic rules and rewards policies for the system but will not give the system any
    clues as to how to carry out or solve the task.


    For instance, a self-driving car has to figure out how to get the passenger from
    A to B without harming the passer while keeping the car on the road and avoiding
    other cars. The car may have been fed a series of maps, general road rules, and
    information of objects it may encounter along the way. The car has to figure out
    the best way to perform its task and stick to rules to successfully complete the
    task it has been given. The car can leverage the power of being able to search
    through an ever-growing database of parallel scenarios to determine how to complete
    the task.


    # Supervised Learning


    When children are taught, they are given examples of what they need to learn.
    Through these examples, children learn to make choices and base outcomes on these
    choices. For example, you can show a child a round ball and tell them it is a
    soccer ball. Then you can show an oblong eye-shaped ball and tell them it is a
    rugby ball. When they are asked to identify or retrieve a rugby ball, the child
    will pick the ball they were told and shown to be a rugby ball. This is what is
    called supervised learning. It is the process whereby a system''s response to
    new data input is generated using a set of known data and outcomes to generate
    a reasonable predicted outcome.


    For instance, let''s say you want to establish what the average price of a house
    in a certain neighborhood might be. You would input what a 2 bedroom, 2 bathroom
    house on the block recently sold for. You would also input what a 3 bedroom, 2
    bathroom house on the block recently sold for. Using that information you could
    find out what a 4 bedroom, 2 bathroom house on the block is estimated to sell
    for.


    For numeric labels in supervised learning the model is referred to as a “classification.”
    The model is known as a “regression” for categorical labels. Supervised learning
    algorithms include:


    +   - For regression problems, linear/logistic regression are used

    - For classification problems, support vectors are used

    - Random forest can be used for both regression and classification problems


    # Unsupervised Learning


    Unsupervised learning is where the system has input data but no example outcomes.
    That machine is given the basic data and must learn more about the data to establish
    an outcome.


    For instance, an automated recommendation system is a prime example of an unsupervised
    learning system. This type of system uses a person''s past viewing or searching
    history to make suggestions based on the choices the person made in the past.
    As the person searches more subjects or views more videos, the system will adjust
    the suggestions accordingly.


    Unsupervised learning does not use labels and the algorithms are left to discover
    and learn on their own. Unsupervised algorithms can be separated into two groups:


    +   - Association, which is where the algorithm bases the outcome on similar problems.
    For instance, a customer who buys toothpaste will most likely also want a toothbrush.

    - Clustering is what groups customers into buyers of toothpaste.


    # What is Scikit Learn?


    Scikit Learn is a Python library that contains tools such as regression, clustering,
    dimensionality reductions, and'

    For instance, say Mary weighs 110 lbs. and is 5''1" tall. How can you determine
    if she is overweight or normal weight?


    The KNN algorithm assumes that similar things are closer together. Therefore,
    in order for the algorithm to be true, similar data points should exist in close
    proximity to each other. For example, the classification of the green and red
    grapes used in an example above.


    Using the assumption that similar data points are closely related, to find the
    nearest neighbors you would need to calculate the Euclidean distance, or what
    you may have learned in math as calculating the distance between two points.


    # The Distance Between Two Points/Euclidean Distance Calculation'

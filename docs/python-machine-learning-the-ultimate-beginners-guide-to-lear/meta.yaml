    # # Chapter 7: Machine Learning and Neural Networks


    TensorFlow is used for Deep Learning Neural networks models. Neural Networks were
    first developed in the late 1950s. They were modeled on the understanding of how
    the human brain works. Neural networks are a subset of Machine Learning and AI.
    They have been designed to mimic certain aspects of human neurons. Neural Networks
    pass data through interconnected nodes. The data is analyzed, classified, and
    then passed on to the next node, for further classification and categorization.
    Most Neural Networks usually contain two to three hidden layers which makes them
    Deep Learning Neural Networks. There are Deep Learning Neural Networks that contain
    hundreds of layers.


    # ## Neural Networks


    There are many types of Neural Networks and these include the following:


    # ### Feedforward Neural Networks


    Feedforward Neural Networks are the simplest form of Neural Networks. They work
    by way of data that flows through a feedforward network from the input, through
    to the node layers containing the neurons, and exits through the output layer.
    The data flow in one direction and unlike the more modern neural networks, feedforward
    networks do not cycle or iterate over the data. They perform a single operation
    on the input data and provide the solution in an output stream.


    # ### Single-Layer Perceptron


    Single-Layer Perceptron is a form of a feedforward neural network with only one
    layer of nodes. It is the simplest form of a feedforward neural network. The input
    is sent to each node already weighted. The neuron either fires or does not fire
    based on the input, weight, and a set minimal threshold. The value is set as either
    activated or deactivated depending on if the criteria is met or not.


    # ### Multi-Layer Perceptron


    Multi-layer perceptrons consist of two or more layers, with the output of the
    upper layer becoming the input of the lower layer. Because there are many layers,
    this form of neural network often takes advantage of backpropagation, where the
    produced output is compared with the expected output. The degree of error is fed
    back through the network to adjust the weights on the appropriate nodes, all with
    the intention of producing an output closer to the desired output state. It is
    these multi-layer algorithm networks with backpropagation that have become some
    of the most successful and powerful Machine Learning models.


    # ### Recurrent Neural Networks


    Recurrent Neural Networks propagate data in both directions. Data flows forward
    like feedforward networks but also backward from later to earlier processing stages.
    Recurrent neural networks’ main strength is the ability to remember previous states.
    Before recurrent neural networks, a neural network would forget previous tasks
    once it began a new one. Recurrent neural networks allow information to persist.
    This means they can take input from subsequent events and “remember” their experience
    in previous ones. Recurrent neural networks are a series of input and output networks
    with the output of the first becoming the input of the second. It follows that
    the output of the second series becomes the input of the third, and so on. This
    cycling allows Recurrent Neural Networks to develop closer and closer approximations
    to the desired output.'
- md: '## Chapter 8: Machine Learning and Big Data


    Big Data is the practice of dealing with large volumes of data. Although computer
    scientists have been dealing with Big Data for decades, the term Big Data comes
    from the 1990s. What sets Big Data apart from standard data sets is the sheer
    volume of the data that is collected, processed, learned from, and continues to
    grow exponentially.


    Today the term Big Data brings with it a series of assumptions and practices that
    have made it a field all its own. Big Data is data containing more variety arriving
    in increasing volumes and with increasing velocity.


    ### The 5 V’s of Big Data


    #### Volume


    The term Big Data was coined in the early 2000s, when the amount of data available
    for analysis was too overwhelming for conventional systems to handle. Volume refers
    to the sheer amount of data produced these days with no signs of slowing down.
    Most systems analysts and infrastructure managers base their systems on data growth
    doubling every two years.


    #### Velocity


    Along with the rise in the amount of data being created, there has been an increase
    in the speed at which it is produced. Things like smartphones, RFID chips, and
    real-time facial recognition produce enormous amounts of data that is produced
    in real time. Real-time data is data that has to be dealt with as soon as it is
    created. The increasing speed of this data being produced puts a heavy strain
    on the capacity of a system’s bandwidth, processing power, and storage space.


    #### Variety


    Data does not get produced in a single format. It is stored numerically in detailed
    databases, produced in structure-less text and email documents, or stored digitally
    in streaming audio and video. There is stock market data, financial transactions,
    and so on, all of it uniquely structured. So not only must large amounts of data
    be handled very quickly, it is produced in many formats that require distinct
    methods of handling for each type.


    #### Value


    Data can be a valuable commodity if it can be extracted and used in a structured,
    useful way. The less structure a data set has, the more processing it needs to
    produce useful results for it. Conventional data processing tools are not able
    to process extremely large amounts of data, and this is where the value of Big
    Data comes in.


    #### Veracity


    Not all data that is captured is of value or can be used, especially when dealing
    with assumptions and predictions parsed out of large data sets. When dealing with
    large data sets, knowing the veracity of the data being used plays an important
    part in the output generated. Data veracity can be limited by factors such as
    data bias, errors introduced due to software bugs, data set omissions, questionable
    data sources, and human error. By limiting the amount of human interaction using
    machine learning and AI as much as possible allows for less error due to things
    such as wrong keystrokes, not reading data correctly, etc.


    ### Big Data Uses


    The point of dealing with all this data is to identify useful detail out of all
    the noise. Noise in data refers to data that is deemed repetitive or unnecessary.
    Valuable data allows businesses to find ways to reduce costs, increase speed and
    efficiency, design new products and brands, and make better, more informed decisions.


    Some examples for current uses of Big Data include:


    #### Product Development


    Big Data can be used to predict customer demand. Using current and past products
    and services to classify key attributes, they can then model these attributes’
    relationships and their success in the market.


    #### Predictive Maintenance


    Buried in structured data are indices that can predict the mechanical failure
    of machine parts and systems. Year of manufacture, make and model, and so on,
    provide a way to predict future breakdowns. This data, when correctly analyzed,
    can predict problems before they happen so maintenance can be deployed preemptively,
    reducing both cost and system downtime.


    #### Customer Experience


    Using Big Data, businesses can get a much clearer view of the customer experience
    by examining social media, website visit metrics, call logs, and any other recorded
    customer interaction to modify and improve the customer experience. Big Data allows
    for better customer relations due to the amount and detail of the data companies
    can extract. By using Big Data to identify problematic issues, businesses can
    handle them quickly and effectively, thereby reducing the risk of negative customer
    experiences or press.


    #### Fraud & Compliance


    Big Data helps identify data patterns suggesting fraud or tampering. Aggregation
    of these large data sets makes regulatory reporting much faster.


    #### Operation Efficiency


    Big Data is currently providing the most value and return in the area of operation
    efficiency. Big Data helps companies analyze and assess production systems, examine
    customer feedback and product returns, as well as a host of other useful business
    factors. This in turn can help companies reduce outages, waste, and can help them
    to anticipate future demand and trends. Big Data can also be useful in assessing
    current decision-making processes and how well they function in meeting demand.


    #### Innovation


    Big Data''s strength is in creating better relations between meaningful labels.
    For a large business, this can mean helping businesses, people, institutions,
    and other entities to predict market trends. Being able to understand the customer
    gives companies an edge in the marketplace to lead the way in innovation. Knowing
    if a product is valuable but could be more valuable with certain modifications
    due to customer feedback can help organizations get ahead of their competition.
    Innovation driven by Big Data is really only limited by the ingenuity and creativity
    of the people curating it.


    ## Chapter 9: Machine Learning Classification and Regression


    Regression and classification are two types of machine learning outputs that can
    be produced. This is called predictive modelling, which is when a model is designed
    to make a new data prediction based on historical data.


    ### Classification Problems


    A classification problem involves an input that requires an output in the form
    of a label or category. Regression problems, on the other hand, involve an input
    that requires an output value as a quantity.


    Classification problems are expected to produce an output that is a label or category.
    For instance, a function is created from an examination of the input data that
    produces a discrete output. A familiar example of a classification problem is
    whether a given email is spam or not spam.


    Classification can involve probability, providing a probability estimate along
    with its classification. 0.7 spam, for example, suggests a 70% chance an existing
    email is spam. If this percentage meets or exceeds the acceptable level for a
    spam label, then the email is classified as spam and therefore the email needs
    to go into the spam folder. Otherwise, it is classified as not spam and will be
    delivered to the inbox.


    One common method to determine a classification problem’s algorithm probability
    of accuracy is to compare the results of its predictive model against the actual
    classification of the data set it has examined. On a data set of 5 emails, for
    example, where the algorithm has successfully classified 4 out of 5 of the emails
    in the set, the algorithm could be said to have an accuracy of 80%.


    ### Regression Problems


    In a regression problem, the expected output is in the form of an unlimited numerical
    range. The price of a used car is a good example. The input might be the year,
    color, mileage, condition, etc., and the expected output is a dollar value, such
    as $4,500 - $6,500. The skill set of a regression algorithm can be determined
    using various mathematical techniques. A common skill set measure for a regression
    algorithm is to calculate the root mean squared error, RMSE.


    Although it is possible to modify each of the above methods to produce each others’
    result, such as turning a classification algorithm into a regression algorithm
    and vice versa, the output requirements of the two define each algorithm quite
    clearly:


    - Classification algorithms produce a discrete category result which can be evaluated
    for accuracy, while regression algorithms cannot.

    - Regression algorithms produce a ranging result and can be evaluated using root
    mean squared error, while classification algorithms cannot.


    While machine learning employs both types of methods for problem-solving, both
    classification and regression, what method is employed for any particular problem
    depends on the nature of the problem and how the solution needs to be presented.'
  mdcn: '## 第八章：机器学习与大数据


    大数据是处理海量数据的实践。尽管计算机科学家处理大数据已有数十年，但“大数据”一词源自20世纪90年代。大数据与标准数据集的区别在于其收集、处理、学习的数据量巨大，且呈指数级持续增长。


    如今，“大数据”一词带来了一系列假设和实践，使其成为一个独立的领域。大数据是指包含更多多样性、以更快速度增长且数量不断增加的数据。


    ### 大数据的5V特征


    #### 体量（Volume）


    “大数据”一词在21世纪初被提出，当时可供分析的数据量过于庞大，传统系统难以处理。体量指的是当今产生的数据总量巨大，且没有放缓的迹象。大多数系统分析师和基础设施管理者将其系统建立在数据每两年翻一番的增长预期之上。


    #### 速度（Velocity）


    随着数据量的增加，其产生速度也在加快。智能手机、RFID芯片和实时人脸识别等技术产生了海量的实时数据。实时数据是指必须在产生后立即处理的数据。这种数据产生速度的加快，对系统带宽、处理能力和存储空间造成了巨大压力。


    #### 多样性（Variety）


    数据并非以单一格式产生。它以数字形式存储在详细数据库中，以无结构文本和电子邮件文档形式产生，或以数字流媒体音频和视频形式存储。还有股市数据、金融交易数据等等，所有这些都具有独特的结构。因此，不仅要快速处理大量数据，而且数据以多种格式产生，每种类型都需要不同的处理方法。


    #### 价值（Value）


    如果数据能够以结构化、有用的方式被提取和使用，它就可以成为有价值的商品。数据集的结构越少，需要的处理就越多，才能产生有用的结果。传统的数据处理工具无法处理极其大量的数据，而这正是大数据的价值所在。


    #### 真实性（Veracity）


    并非所有捕获的数据都有价值或可用，尤其是在处理从大型数据集中解析出的假设和预测时。在处理大型数据集时，了解所使用数据的真实性对生成的输出起着重要作用。数据真实性可能受到数据偏差、软件错误引入的错误、数据集遗漏、可疑数据源和人为错误等因素的限制。通过尽可能使用机器学习和人工智能来减少人为交互，可以减少因错误按键、未正确读取数据等造成的错误。


    ### 大数据的用途


    处理所有这些数据的目的是从所有噪声中识别出有用细节。数据中的噪声是指被认为是重复或不必要的数据。有价值的数据使企业能够找到降低成本、提高速度和效率、设计新产品和品牌以及做出更好、更明智决策的方法。


    大数据当前用途的一些示例包括：


    #### 产品开发


    大数据可用于预测客户需求。利用当前和过去的产品和服务来分类关键属性，然后可以对这些属性之间的关系及其市场成功进行建模。


    #### 预测性维护


    结构化数据中隐藏着可以预测机器部件和系统机械故障的指标。制造年份、品牌和型号等提供了预测未来故障的方法。这些数据经过正确分析，可以在问题发生前预测问题，从而可以提前部署维护，降低成本和系统停机时间。


    #### 客户体验


    利用大数据，企业可以通过检查社交媒体、网站访问指标、通话记录以及任何其他记录的客户互动，更清晰地了解客户体验，从而修改和改善客户体验。大数据使企业能够提取大量详细数据，从而改善客户关系。通过使用大数据识别问题，企业可以快速有效地处理它们，从而降低负面客户体验或负面报道的风险。


    #### 欺诈与合规


    大数据有助于识别表明欺诈或篡改的数据模式。这些大型数据集的聚合使监管报告速度大大加快。


    #### 运营效率


    大数据目前在运营效率领域提供了最大的价值和回报。大数据帮助公司分析和评估生产系统，检查客户反馈和产品退货，以及其他许多有用的业务因素。这反过来可以帮助公司减少停机、浪费，并帮助他们预测未来的需求和趋势。大数据也可用于评估当前的决策过程及其在满足需求方面的运作效果。


    #### 创新


    大数据的优势在于在有意义的标签之间建立更好的联系。对于大型企业来说，这可能意味着帮助企业、个人、机构和其他实体预测市场趋势。能够理解客户使公司在市场上具有优势，能够引领创新。了解一个产品是否有价值，但根据客户反馈进行某些修改后可能更有价值，可以帮助组织领先于竞争对手。由大数据驱动的创新实际上只受限于管理它的人员的独创性和创造力。


    ## 第九章：机器学习分类与回归


    回归和分类是两种可以产生的机器学习输出类型。这被称为预测建模，即设计一个模型基于历史数据进行新的数据预测。


    ### 分类问题


    分类问题涉及需要以标签或类别形式输出的输入。另一方面，回归问题涉及需要以数量形式输出值的输入。


    分类问题预期产生标签或类别的输出。例如，通过检查输入数据创建一个函数，产生离散输出。分类问题的一个常见例子是给定的电子邮件是垃圾邮件还是非垃圾邮件。


    分类可以涉及概率，提供概率估计及其分类。例如，0.7的垃圾邮件概率表示现有邮件有70%的可能性是垃圾邮件。如果此百分比达到或超过垃圾邮件标签的可接受水平，则该邮件被分类为垃圾邮件，因此需要放入垃圾邮件文件夹。否则，它被分类为非垃圾邮件并会投递到收件箱。


    确定分类问题算法准确率概率的一种常见方法是将预测模型的结果与其检查的数据集的实际分类进行比较。例如，在一个包含5封电子邮件的数据集中，如果算法成功分类了其中4封，则可以说该算法的准确率为80%。


    ### 回归问题


    在回归问题中，预期输出是无限数值范围的形式。二手车的价格就是一个很好的例子。输入可能是年份、颜色、里程、状况等，预期输出是一个美元价值，例如4,500美元
    - 6,500美元。回归算法的技能集可以使用各种数学技术来确定。回归算法的一个常见技能集度量是计算均方根误差（RMSE）。


    虽然可以修改上述每种方法以产生另一种方法的结果，例如将分类算法转换为回归算法，反之亦然，但两种算法的输出要求相当清晰地定义了每种算法：


    - 分类算法产生离散的类别结果，可以评估其准确性，而回归算法则不能。

    - 回归算法产生范围结果，可以使用均方根误差进行评估，而分类算法则不能。


    虽然机器学习在解决问题时同时使用这两种方法（分类和回归），但针对任何特定问题采用哪种方法取决于问题的性质以及解决方案需要如何呈现。'

  md: '# Introduction


    If you have worked as a programmer in any other language, you will quickly be
    able to grasp the concept of Python. As with any type of new knowledge, it will
    come with a learning curve. However, Python is not a difficult language to learn
    and it doesn’t come with a steep learning curve. This makes Python an ideal language
    for beginner programmers just starting out.


    It is also open-source software, which means it is free and easily accessible
    for anyone to download. Over the last several years Python has become very popular
    among the programming community. It has a large and growing list of libraries
    and open source packages readily available for download across the Internet.


    Python is also one of the preferred programming languages for machine learning
    (MI) and is fast becoming one of the top programming languages for teaching MI.
    It is a powerful object-oriented, interactive, and interpreted programming language
    that utilizes concise syntax that is clear and easy to learn and follow. Python
    has many exceptions, high-level dynamic data types, dynamic typing, modules, and
    classes. It can also interface easily with other programming languages including
    C ++, C, and Java.


    Python is almost ten to fifteen times faster than languages such as C++, C, and
    JavaScript. Because of the object-orientated nature of Python programming, it
    makes translation a smooth and straightforward process. It can also be used to
    create easy automation interfaces and scripting for programming languages as an
    extension language.


    When it comes to machine learning, Python is considered to be one of the preferred
    languages as it:


    +   - Uses clear and concise syntax

    - Has a lot of code libraries

    - Can interface with nearly all the available platforms and languages

    - Is Open Source and readily available to download from the Internet


    # What is Machine Learning?


    In today''s technology-driven world there are so many different disciplines that
    pop up, it’s easy to get confused. For example, a lot of people tend to think
    machine learning (ML) and artificial intelligence (AI) are the same things. Although
    ML does get used together with AI, they are not the same thing. However, ML is
    a subset of AI.


    # The Difference Between Machine Learning (ML) and Artificial Intelligence (AI)


    Artificial intelligence and machine learning are sometimes hard to tell apart,
    especially as more and more systems now integrate ML with AI systems.


    # Artificial Intelligence (AI)


    Any system such as a phone, a robot, car, refrigerator, or a computer program
    that is made to be smart is AI. Some examples of AI systems include:


    +   - Siri

    - Alexa

    - Video Games

    - Smart Phones

    - Smart Cars

    - Smart Home devices


    # Machine Learning (ML)


    Machine learning systems are systems that start with basic knowledge but get smarter
    and smarter over time. These machines are designed to learn by themselves and
    can gain knowledge to get smarter without human intervention. More and more AI
    systems now integrate ML. They do so to create smarter AI systems that can learn
    by themselves without having to constantly physically update them.


    Some examples of ML systems include:


    +   - Speech recognition systems

    - Clinical diagnostic systems

    - Financial and banking services

    - Virtual personal assistants

    - Online customer support applications'
  merge: -1
  pgno: 5
- img_proc: true
  md: '+   - Google and other search engines

    - Online fraud detection systems

    - Social media services

    - Automated product recommendation systems.


    # **Some Acronyms to be Aware of When Learning ML:**


    While learning ML you will come across quite a few acronyms in reference to various
    applications.

    These acronyms include:


    # **Artificial Neural Networks (ANN)**


    Although there have been models of this type of networking since the 1940s, they
    were not very efficient models.

    These types of networks work well with massively large data sets and in recent
    years have advanced to become

    extremely powerful and useful. ANN models are inspired by the brain''s biological
    nervous system and the way it

    processes information. The most common systems they are used for include:


    +   - Classification systems

    - Self-driving cars

    - Stock market prediction systems

    - Character recognition systems


    # **Automated Speech Recognition (ASR)**


    ASR is a program integrated into various hardware systems that is designed to
    recognize voice or speech patterns. It

    can identify and process a human’s voice. This gives humans the ability to interface
    with a system by talking to it.

    ASR is limited in that it does not allow for open-ended conversation. Instead,
    ASR offers a menu of options a

    person can choose from to answer specific questions. The most common systems they
    are used for include:


    +   - GPS software

    - Phone answering messaging services

    - Automated telephone banking

    - Customer service interfaces


    # **Deep Learning (DL)**


    Deep learning systems learn by gathering information from data sets. These are
    large data sets that continue to

    grow. DL is part of ML but is the part that deals with much larger data sets or
    sources. DL systems, like ML

    systems, get smarter as they learn and grow. Some examples of systems that use
    DL include:


    +   - Voice-activated assistants

    - Self-driving cars

    - Voice-activated search engines or facilities

    - Language translation services such as French into English

    - Automatic text generators

    - Prediction software

    - Statistical software

    - Survey software

    - Spam filters

    - Advertising suggestion software

    - Plagiarism checkers


    # **Natural Language Processing (NLP)**


    NLP is the more advanced version of ASR. NLP allows for interaction between a
    human and a device. ASR has a

    menu of words or options that a person has to choose from to get a response or
    be directed. NLP uses an open-

    ended chat format that is close to having a real-time conversation with the machine.


    Some systems that use NLP that you may be familiar with include:


    +   - Siri

    - Alexa'

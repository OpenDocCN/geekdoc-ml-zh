  md: '# # Chapter 9:

    ## Machine Learning Classification and Regression


    Regression and classification are two types of machine learning outputs that can
    be produced. This is called predictive modelling, which is when a model is designed
    to make a new data prediction based on historical data.


    # ### Classification Problems


    A classification problem involves an input that requires an output in the form
    of a label or category. Regression problems, on the other hand, involve an input
    that requires an output value as a quantity.


    Classification problems are expected to produce an output that is a label or category.
    For instance, a function is created from an examination of the input data that
    produces a discrete output. A familiar example of a classification problem is
    whether a given email is spam or not spam.


    Classification can involve probability, providing a probability estimate along
    with its classification. 0.7 spam, for example, suggests a 70% chance an existing
    email is spam. If this percentage meets or exceeds the acceptable level for a
    spam label, then the email is classified as spam and therefore the email needs
    to go into the spam folder. Otherwise, it is classified as not spam and will be
    delivered to the inbox.


    One common method to determine a classification problem’s algorithm probability
    of accuracy is to compare the results of its predictive model against the actual
    classification of the data set it has examined. On a data set of 5 emails, for
    example, where the algorithm has successfully classified 4 out of 5 of the emails
    in the set, the algorithm could be said to have an accuracy of 80%.


    # ### Regression Problems


    In a regression problem, the expected output is in the form of an unlimited numerical
    range. The price of a used car is a good example. The input might be the year,
    color, mileage, condition, etc., and the expected output is a dollar value, such
    as $4,500 - $6,500. The skill set of a regression algorithm can be determined
    using various mathematical techniques. A common skill set measure for a regression
    algorithm is to calculate the root mean squared error, RMSE.


    Although it is possible to modify each of the above methods to produce each others’
    result, such as turning a classification algorithm into a regression algorithm
    and vice versa, the output requirements of the two define each algorithm quite
    clearly:


    +   - Classification algorithms produce a discrete category result which can be
    evaluated for accuracy, while regression algorithms cannot.

    - Regression algorithms produce a ranging result and can be evaluated using root
    mean squared error, while classification algorithms cannot.


    While machine learning employs both types of methods for problem-solving, both
    classification and regression, what method is employed for any particular problem
    depends on the nature of the problem and how the solution needs to be presented.'

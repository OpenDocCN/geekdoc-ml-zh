- md: "## Regression\n\nMachine learning regression models are used to predict continuous\
    \ variables based on one or many predictor values. For example, predicting a person's\
    \ weight based on their height and frame.\n\n## Linear regression\n\nThis is the\
    \ most popular type of predictive analysis. Linear regression involves asking\
    \ the following two things:\n\n- Do the predictor variables forecast the results\
    \ of an outcome variable accurately?\n- Which particular variables are key predictors\
    \ of the final variable, and in what standard does it impact the outcome variable?\n\
    \n## Naming variables\n\nThe regression’s dependent variable has many different\
    \ names. Some names include outcome variable, criterion variable, and many others.\
    \ The independent variable can be called an exogenous variable or repressor.\n\
    \n## Functions of the regression analysis include:\n\n- Trend Forecasting\n- Determine\
    \ the strength of predictors\n- Predict an effect\n\n## Breaking down regression\n\
    \nLinear regression and multiple regression are the two basic states of regression.\
    \ Linear regression contains an independent variable to be able to forecast the\
    \ outcome of a dependent variable. To assist multiple regression when predicting\
    \ a result, there are quite a few independent variables to lend a helping hand.\n\
    \nRegression is a useful tool among the financial and investment institutions.\
    \ This is because it can be used to predict the sales of a particular product\
    \ or company based on the previous sales and GDP growth among many other factors.\
    \ A common regression model used in the finance sector is the capital pricing\
    \ model.\n\nThe example below describes the formula used in linear and multiple\
    \ regression.\n\n```\nLinear Regression: Y = a + bX + u\nMultiple Regression:\
    \ Y = a + b1X1 + b2X2 + ... + u\n```\n\n## This example is broken down as:\n\n\
    Y = the dependent variable, which is what needs to be predicted\nX = the independent\
    \ variable that uses the Y variable upon which to base the predicted outcome\n\
    a = the intercept value\nb = the slope value\nu = the regression residual value\n\
    \n## Choosing the best regression model\n\nSelecting the right linear regression\
    \ model can be very difficult and confusing. Trying to model it with sample data\
    \ cannot make it easier. This section reviews some of the most popular statistical\
    \ methods which one can use to choose models and challenges that you might come\
    \ across. It also lists some practical advice to use to select the correct regression\
    \ model.\n\nIt always begins with a researcher who would like to expand the relationship\
    \ between the response variable and predictors. The research team that is accorded\
    \ with the responsibility to perform investigation essentially measures a lot\
    \ of variables but only has a few in the model. The analysts will make efforts\
    \ to reduce the variables that are different and apply the ones which have an\
    \ accurate relationship. As time moves on, the analysts continue to add more models.\n\
    \n## Statistical methods to use to find the best regression model\n\nIf you want\
    \ a great model in regression, then it is important to take into consideration\
    \ the type of variables which you want to test as well as other variables which\
    \ can affect the response.\n\n## Modified R-squared and Predicted R-squared\n\n\
    Your model should have higher modified and predicted R-squared values. The statistics\
    \ shown below help eliminate critical issues which revolve around R-squared.\n\
    \n- The adjusted R-squared increases once a new term improves the model.\n- Predicted\
    \ R-squared belongs to the cross-validation that helps define the manner in which\
    \ your model can generalize remaining data sets.\n\n## P-values for the Predictors\n\
    \nWhen it comes to regression, a low value of P denotes statistically significant\
    \ terms. The term “reducing the model” refers to the process of factoring in all\
    \ candidate predictors contained in a model.\n\n## Stepwise regression\n\nThis\
    \ is an automated technique which can select important predictors found in the\
    \ exploratory stages of creating a model.\n\n## Real World Challenges\n\nThere\
    \ are different statistical approaches for choosing the best model. However, complications\
    \ still exist.\n\n- The best model happens when the variables are measured by\
    \ the study.\n- The sample data could be unusual because of the type of data collection\
    \ method. A false positive and false negative process happens when you handle\
    \ samples.\n- If you deal with enough models, you’ll get variables that are significant\
    \ but only correlated by chance.\n- P-values can be different depending on the\
    \ specific terms found in the model.\n- Studies have discovered that the best\

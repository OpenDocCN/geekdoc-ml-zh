    # Regression


    Machine learning regression models are used to predict continuous variables based
    on one or many predictor values. For example, predicting a person''s weight based
    on their height and frame.


    # Linear regression


    This is the most popular type of predictive analysis. Linear regression involves
    asking the following two things:


    +   - Do the predictor variables forecast the results of an outcome variable accurately?

    - Which particular variables are key predictors of the final variable, and in
    what standard does it impact the outcome variable?


    # Naming variables


    The regression’s dependent variable has many different names. Some names include
    outcome variable, criterion variable, and many others. The independent variable
    can be called an exogenous variable or repressor.


    # Functions of the regression analysis include:


    +   - Trend Forecasting

    - Determine the strength of predictors

    - Predict an effect


    # Breaking down regression


    Linear regression and multiple regression are the two basic states of regression.
    Linear regression contains an independent variable to be able to forecast the
    outcome of a dependent variable. To assist multiple regression when predicting
    a result, there are quite a few independent variables to lend a helping hand.


    Regression is a useful tool among the financial and investment institutions. This
    is because it can be used to predict the sales of a particular product or company
    based on the previous sales and GDP growth among many other factors. A common
    regression model used in the finance sector is the capital pricing model.


    The example below describes the formula used in linear and multiple regression.


    ```

    Linear Regression: Y = a + bX + u

    Multiple Regression: Y = a +b1X1 + b2X2 + ... + u

    ```


    # This example is broken down as:


    Y = the dependent variable, which is what needs to be predicted

    X = the independent variable that uses the Y variable upon which to base the predicted
    outcome

    a = the intercept value

    b = the slope value

    u = the regression residual value


    # Choosing the best regression model


    Selecting the right linear regression model can be very difficult and confusing.
    Trying to model it with sample data'

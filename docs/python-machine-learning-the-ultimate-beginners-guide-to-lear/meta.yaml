    # # Chapter 2: Approaches to Machine Learning


    Although machine learning has been around for a few decades now, it never really
    took off until the twentieth century. Although some advancements were made before
    then, in the twenty-first century machine learning has become one of the world’s
    most influential technologies. The advancements in the AI field have come along
    in huge leaps and bounds with no signs of having reached even a fraction of its
    potential.


    If we look at movies such as the first *Star Trek*, the stars interacted with
    their computers. The computers were intelligent and could run predictions for
    the crew. The newer science fiction movies have even more advanced AI systems.
    These “fictional systems” amaze and fascinate the audiences who mostly think that
    these systems are just figments of the writer''s imagination.


    Most people, even without realizing it or taking too much time to think about
    it, interact with AI and ML every day. Each time you ask Siri or Alexa a question,
    you are interacting with an AI with ML capabilities. Even when doing a search
    on Google you are interacting with ML.


    Machines inspired by human cognition in order to mimic the human brain systems
    have to go through a learning process. This learning process is where the machine
    has to figure out a set of rules, then build off those by trying out various scenarios.
    The machine learns from how well it performs while trying out different rules
    in order to successfully complete a scenario. The machine is not so much concerned
    with how it is being interacted with but rather with what meaningful results were
    produced from the interaction.


    # ## Machine Learning Terminology


    Before you can really get into ML, there is some terminology that may be useful
    to know. The following terms are some of the most important ones to be aware of.


    # ### Machine Learning Data Set


    The data set is an important part of the machine learning structure. A data set
    contains examples of data the machine needs to learn in order to solve problems.


    # ### Features


    The example data will contain features and functions that the machine needs to
    use to learn from. These features are pieces of information that get fed to the
    ML system algorithm and are used to help the machine understand and learn.


    # ### Machine Learning Model


    A machine learning model is the result of what a machine learning system has learned
    from its training. For instance, a self-driving car model would be trained to
    deduce the best and safest route it should take.


    # ## The Machine Language Process


    Creating a machine language algorithm is a step-by-step process. The following
    steps make up the machine language creation process:


    +   1. **Collection of Data**

    This is the first stage to creating a ML algorithm, as it is what the algorithm
    will be based upon. This is all the data that the ML will need to learn from to
    deliver the desired results.


    2. **Preparation of Data**

    The second stage is sorting the data to find the features that the ML will need
    in order to perform optimally.


    3. **Machine Learning Training**

    At this stage the ML algorithm will be fed the carefully chosen feature-filled
    data collection. It is at this stage that ML will start to learn from that data
    it has been fed. It learns how to solve complex problems and produce solutions.
    For instance, a search engine is fed certain information when it starts out. The
    more people use the search engine, the more it is able to predict each person''s
    preferences based on the pages they search.


    4. **Evaluating the Machine Learning Model**

    Evaluating the ML model is the phase where the ML algorithm gets put to the test
    in order to determine how successful it is.'

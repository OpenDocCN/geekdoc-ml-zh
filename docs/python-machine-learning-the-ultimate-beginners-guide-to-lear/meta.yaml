    \ numpy.NaN，这意味着没有数据。然后你将设置平均数据，该数据会从数据集中移除任何非数据以进行计算。\n\n要设置此标准，在新单元格中输入以下内容：\n\
    \n```\nzero_not_accepted = ['Glucose', 'BloodPressure', 'SkinThickness', 'BMI',\

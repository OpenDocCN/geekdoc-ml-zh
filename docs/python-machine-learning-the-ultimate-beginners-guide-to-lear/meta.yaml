    \ is only for personal use. You cannot amend, distribute, sell, use, quote or\
    \ paraphrase any part, or the content within this book, without the consent of\
    \ the author or publisher.\n\n**Disclaimer Notice:**\n\nPlease note the information\
    \ contained within this document is for educational and entertainment purposes\
    \ only. All effort has been executed to present accurate, up to date, reliable,\
    \ complete information. No warranties of any kind are declared or implied. Readers\
    \ acknowledge that the author is not engaged in the rendering of legal, financial,\
    \ medical or professional advice. The content within this book has been derived\
    \ from various sources. Please consult a licensed professional before attempting\
    \ any techniques outlined in this book.\n\nBy reading this document, the reader\
    \ agrees that under no circumstances is the author responsible for any losses,\
    \ direct or indirect, that are incurred as a result of the use of the information\
    \ contained within this document, including, but not limited to, errors, omissions,\
    \ or inaccuracies.\n\n# Table of Contents\n\n- Introduction\n- What is Machine\
    \ Learning?\n    - The Difference Between Machine Learning (ML) and Artificial\
    \ Intelligence (AI)\n    - Some Acronyms to be Aware of When Learning ML:\n- Classification\
    \ of Machine Learning Algorithms\n- What is Scikit Learn?\n- What is Tensorflow?\n\
    - Chapter 1: History of Machine Learning\n- Chapter 2: Approaches to Machine Learning\n\
    \    - Machine Learning Terminology\n    - The Machine Language Process\n- Chapter\
    \ 3: Machine Learning Environment Setup\n    - Setting Up Python and Anaconda\n\
    \        - Installing Python\n        - Setting Up the Python Environment\n  \
    \      - Installing Anaconda\n        - Setting Up the Anaconda Environment\n\
    \    - Installing Scikit-Learn\n    - Installing TensorFlow\n- Chapter 4: Using\
    \ Scikit-Learn\n    - The Learning Problem\n    - Loading Data Sets\n    - Regression\n\
    - Chapter 5: K-Nearest Neighbors (KNN) Algorithm\n    - How to Determine the “k”\
    \ Parameter\n        - How to Choose the Value of k?\n        - When to Use KNN\
    \ Models?\n        - How the KNN Algorithm Works\n    - The Workings of the KNN\
    \ Algorithm\n    - Implementing KNN Algorithm\n- Chapter 6: Using TensorFlow\n\
    \    - Getting Started with TensorFlow\n        - Working with TensorFlow Variables,\
    \ Constants, Strings, Updates, Sessions, Placeholders, and Arrays\n        - Working\
    \ TensorFlow Data Flow Graph and Programming Structure\n- Chapter 7: Machine Learning\
    \ and Neural Networks\n    - Neural Networks\n- Chapter 8: Machine Learning and\
    \ Big Data\n    - The 5 V’s of Big Data\n    - Big Data Uses\n- Chapter 9: Machine\
    \ Learning Classification and Regression\n- Chapter 10: Machine Learning and the\
    \ Cloud\n    - Benefits of Cloud-Based Machine Learning\n- Chapter 11: Machine\
    \ Learning and the Internet of Things (IoT)\n    - Uses for the Internet of Things\n\
    \    - IoT Security Concerns\n- Chapter 12: Machine Learning and Robotics\n  \
    \  - Robotic Learning\n    - Examples of Industrial Robots and Machine Learning\n\
    \    - Neural Networks with Scikit-learn\n- Chapter 13: Machine Learning Models\n\
    - Chapter 14: Machine Learning and Swarm Intelligence\n- Chapter 15: Applications\
    \ of Machine Learning\n    - Problematic Limitation of Machine Learning\n    -\
    \ Philosophical Objections and Limitation to Machine Learning\n- Chapter 16: Machine\
    \ Learning and the Future\n- Conclusion\n- References\n- Images\n\n# Introduction\n\
    \nIf you have worked as a programmer in any other language, you will quickly be\
    \ able to grasp the concept of Python. As with any type of new knowledge, it will\
    \ come with a learning curve. However, Python is not a difficult language to learn\
    \ and it doesn’t come with a steep learning curve. This makes Python an ideal\
    \ language for beginner programmers just starting out.\n\nIt is also open-source\
    \ software, which means it is free and easily accessible for anyone to download.\
    \ Over the last several years Python has become very popular among the programming\
    \ community. It has a large and growing list of libraries and open source packages\
    \ readily available for download across the Internet.\n\nPython is also one of\
    \ the preferred programming languages for machine learning (ML) and is fast becoming\
    \ one of the top programming languages for teaching ML. It is a powerful object-oriented,\
    \ interactive, and interpreted programming language that utilizes concise syntax\
    \ that is clear and easy to learn and follow. Python has many exceptions, high-level\
    \ dynamic data types, dynamic typing, modules, and classes. It can also interface\
    \ easily with other programming languages including C++, C, and Java.\n\nPython\
    \ is almost ten to fifteen times faster than languages such as C++, C, and JavaScript.\
    \ Because of the object-oriented nature of Python programming, it makes translation\
    \ a smooth and straightforward process. It can also be used to create easy automation\
    \ interfaces and scripting for programming languages as an extension language.\n\
    \nWhen it comes to machine learning, Python is considered to be one of the preferred\
    \ languages as it:\n\n- Uses clear and concise syntax\n- Has a lot of code libraries\n\
    - Can interface with nearly all the available platforms and languages\n- Is Open\
    \ Source and readily available to download from the Internet\n\n# What is Machine\
    \ Learning?\n\nIn today's technology-driven world there are so many different\
    \ disciplines that pop up, it’s easy to get confused. For example, a lot of people\
    \ tend to think machine learning (ML) and artificial intelligence (AI) are the\
    \ same things. Although ML does get used together with AI, they are not the same\
    \ thing. However, ML is a subset of AI.\n\n# The Difference Between Machine Learning\
    \ (ML) and Artificial Intelligence (AI)\n\nArtificial intelligence and machine\
    \ learning are sometimes hard to tell apart, especially as more and more systems\
    \ now integrate ML with AI systems.\n\n# Artificial Intelligence (AI)\n\nAny system\
    \ such as a phone, a robot, car, refrigerator, or a computer program that is made\
    \ to be smart is AI. Some examples of AI systems include:\n\n- Siri\n- Alexa\n\
    - Video Games\n- Smart Phones\n- Smart Cars\n- Smart Home devices\n\n# Machine\
    \ Learning (ML)\n\nMachine learning systems are systems that start with basic\
    \ knowledge but get smarter and smarter over time. These machines are designed\
    \ to learn by themselves and can gain knowledge to get smarter without human intervention.\
    \ More and more AI systems now integrate ML. They do so to create smarter AI systems\
    \ that can learn by themselves without having to constantly physically update\
    \ them.\n\nSome examples of ML systems include:\n\n- Speech recognition systems\n\
    - Clinical diagnostic systems\n- Financial and banking services\n- Virtual personal\
    \ assistants\n- Online customer support applications\n- Google and other search\
    \ engines\n- Online fraud detection systems\n- Social media services\n- Automated\
    \ product recommendation systems.\n\n# Some Acronyms to be Aware of When Learning\
    \ ML:\n\nWhile learning ML you will come across quite a few acronyms in reference\
    \ to various applications. These acronyms include:\n\n# Artificial Neural Networks\
    \ (ANN)\n\nAlthough there have been models of this type of networking since the\
    \ 1940s, they were not very efficient models. These types of networks work well\
    \ with massively large data sets and in recent years have advanced to become extremely\
    \ powerful and useful. ANN models are inspired by the brain's biological nervous\
    \ system and the way it processes information. The most common systems they are\
    \ used for include:\n\n- Classification systems\n- Self-driving cars\n- Stock\
    \ market prediction systems\n- Character recognition systems\n\n# Automated Speech\
    \ Recognition (ASR)\n\nASR is a program integrated into various hardware systems\
    \ that is designed to recognize voice or speech patterns. It can identify and\
    \ process a human’s voice. This gives humans the ability to interface with a system\
    \ by talking to it. ASR is limited in that it does not allow for open-ended conversation.\
    \ Instead, ASR offers a menu of options a person can choose from to answer specific\
    \ questions. The most common systems they are used for include:\n\n- GPS software\n\
    - Phone answering messaging services\n- Automated telephone banking\n- Customer\
    \ service interfaces\n\n# Deep Learning (DL)\n\nDeep learning systems learn by\
    \ gathering information from data sets. These are large data sets that continue\
    \ to grow. DL is part of ML but is the part that deals with much larger data sets\
    \ or sources. DL systems, like ML systems, get smarter as they learn and grow.\
    \ Some examples of systems that use DL include:\n\n- Voice-activated assistants\n\
    - Self-driving cars\n- Voice-activated search engines or facilities\n- Language\
    \ translation services such as French into English\n- Automatic text generators\n\
    - Prediction software\n- Statistical software\n- Survey software\n- Spam filters\n\
    - Advertising suggestion software\n- Plagiarism checkers\n\n# Natural Language\
    \ Processing (NLP)\n\nNLP is the more advanced version of ASR. NLP allows for\
    \ interaction between a human and a device. ASR has a menu of words or options\
    \ that a person has to choose from to get a response or be directed. NLP uses\
    \ an open-ended chat format that is close to having a real-time conversation with\
    \ the machine.\n\nSome systems that use NLP that you may be familiar with include:\n\
    \n- Siri\n- Alexa"

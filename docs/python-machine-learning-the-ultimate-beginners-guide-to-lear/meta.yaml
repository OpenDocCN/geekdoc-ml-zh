    ## IoT Security Concerns


    Security is one of the main concerns for users of the conventional Internet, and
    security of the Internet of Things is a much-discussed topic. Many people are
    concerned that the industry is developing too rapidly and without an appropriate
    discussion about the security issues involved in these devices and their networks.
    The Internet of Things, in addition to the standard security concerns found on
    the Internet, has unique challenges. These challenges include security controls
    in industry, Internet of Things business processes, hybrid systems, and end nodes,
    as well as invasion of privacy issues as data can be easily traced, collected,
    and stored to be used for various means.


    Security is likely the main concern over adopting Internet of Things tech. Cyber-attacks
    on components of this industry are likely to increase as the scale of IoT adoption
    increases. There is the real possibility of cyber threats becoming physical ones,
    as opposed to merely a virtual threat.


    Current Internet of Things systems have many security vulnerabilities including
    a lack of encrypted communication between devices, weak authentication, especially
    where some devices are allowed to run in production environments with the default
    credentials implemented. The lack of verification or encryption of software updates,
    and even SQL injection, provide bad actors the ability to easily steal user credentials,
    intercept data, and collect Personally Identifiable Information that can be used
    in malevolent ways. It is also the easiest route to hackers injecting malware
    into updated firmware.


    There are a lot of conspiracy theorists who keep on about “big brother spying
    on the world.” The thing is, some Internet-connected devices do spy on people
    in their own homes, and these devices are devices such as kitchen appliances,
    thermostats, security and computer cameras, and televisions. Many components of
    modern cars are susceptible to manipulation should a bad actor gain access to
    the vehicle’s onboard systems. Cars can have a bad actor manipulate components
    that include dashboard displays, the horn, heating or cooling systems, the hood
    and trunk releases, the engine, the door locks, and even the braking system. Vehicles
    with wireless connectivity are vulnerable to wireless remote attacks which means
    that they can be tampered with while the driver is using the vehicle.


    Demonstration attacks on Internet-connected devices have been made to many devices
    including medical ones such as insulin pumps, implantable cardioverter defibrillators,
    and pacemakers. Because some of these devices have severe limitations on their
    size and processing power, they are usually unable to make use of standard security
    measures. These devices are incapable of using strong encryption methods for communication
    or even employing firewalls due to the nature of them.


    Privacy concerns over the Internet of Things have two main thrusts:


    ### Legitimate Uses


    Governments and large corporations may set up massive IoT services which by their
    nature collect enormous amounts of data. To a private entity, this data can be
    monetized in many different ways, with little or no recourse for the people whose
    lives and activities are swept up in the data collection.


    For governments, massive data collection from the Internet of Things networks
    provide the data necessary to provide services and infrastructure, to save resources
    and reduce emission, and so on. At the same time, these systems will collect enormous
    amounts of data on citizens, including their locations, activities, shopping habits,
    travel, and so on.


    To some, this is the realization of a true surveillance state. Without a legal
    framework in place to prevent governments from simply scooping up endless amounts
    of data to do with as they wish, it is difficult to refute this argument.


    ### Illegitimate Uses


    Illegitimate uses of the massive Internet of Things networks include everything
    from DDOS (distributed denial of service) attacks through malware attacks on one
    or more of the IoT devices on the network.


    Security vulnerabilities in even one device on an Internet of Things network can,
    by the sheer nature of the devices full IoT communication capability, mean an
    infected device may not only provide its illegitimate host with the data it provides,
    but metadata of other devices in the network including the main system that houses
    all the information and processes.


    In 2016, a DDOS attack powered by an Internet of Things device compromised by
    a malware infection led to over 300,000 device infections and brought down both
    a DNS provider and several major websites. This Mirai Botnet was able to single
    out for attack devices that consisted mostly of IP cameras, DVRs, printers, and
    routers.


    While there are several initiatives being made to increase security in the Internet
    of Things marketplace, there are still the hurdles of government regulation and
    intergovernmental cooperation that need to be clearly defined and understood on
    a global scale in order to ensure public safety and privacy.


    ## Chapter 12: Machine Learning and Robotics


    Robots can be defined as machines, often programmable by a computer, that are
    able to carry out a series of complex actions without intervention. A robot can
    have its control systems embedded or be controlled by an external device. Unlike
    the popular movie stereotype, robots do not look like humans. Instead, they are
    usually designed to perform a task, and that requirement determines how they appear.


    George Devol invented the first digitally operated and programmable robot called
    Unimate in 1954 (Unimate, n.d.). Unimate was bought by General Motors in 1961
    for the purpose of lifting hot metal die castings, and it became the first mass
    produced robot. And like computers, robots have changed our society. Their strength,
    agility, and ability to continue to execute the same repetitive tasks perfectly
    are an enormous benefit to industry and society alike. And while they did cause
    some serious disruption to the manufacturing industries, putting many people out
    of work, their ascension in our societies has provided far more employment opportunities
    than they have taken.


    There are several categories of robots which include:


    ### Industrial or Service Robots


    Industrial or service robots are probably the most popular or familiar types of
    robots. They appear in most automated factories and industries. They usually consist
    of an “arm” with one or more joints, which ends with a gripper or manipulating
    device. They first appeared in automobile factories such as General Motors (Unimate).
    They are fixed in one location and are unable to move about. Industrial robots
    are more commonly found in manufacturing and industrial locations. Service robots
    are basically the same in design as industrial robots but are found outside of
    manufacturing industries. Service robots can be found in shopping malls, banks,
    entertainment centers, or where there is a need for customer interaction.


    ### Educational Robots


    Educational robots are used as teacher aids or for educational purposes. As early
    as the 1980s, robots were introduced to children with the turtle robot controlled
    by LEGO. When combined with LEGO, educational robots moved beyond the robotic
    turtles and onto robot kits which became known as LEGO Mindstorm. These kits are
    used in classrooms all around the world for elementary and middle school students.
    Students can even compete in the LEGO League where they get to design, build,
    and program LEGO robots. These LEGO robots need to be able to perform certain
    functions in order to complete various challenges.


    Robotics plays a vital role in the education of children for the twenty-first
    century and beyond. Kids that are incapable of communicating with the world around
    them are able to do so through robots. As the world is becoming more and more
    reliant on technology, robotics is a way to ensure children are able to understand
    the world they are living in.'

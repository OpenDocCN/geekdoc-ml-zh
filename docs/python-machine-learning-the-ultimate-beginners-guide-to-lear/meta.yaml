- md: '## Chapter 16: Machine Learning and the Future


    For all the negative press and doubts, the future of machine learning and AI are
    very real but also not as bad as one may think. There is enormous potential for
    this field. There are systems to make human life better, safer, and more comfortable.


    These future machine learning systems include the following:


    ### Security


    Facial recognition and aberrant behavior detection are the toolkits from machine
    learning that are available today. They will become ubiquitous in the future,
    protecting the public from criminal behavior and getting people in trouble the
    help they need.


    In the cyber world, machine learning will grow and increase its influence in identifying
    cyber-attacks, malicious software code, and unexpected communication attempts.
    At the same time, dark hat software crackers are also working on machine learning
    tools to aid them in breaking into networks, accessing private data, and causing
    service disruptions. The future of the cyber world will be an ongoing war between
    white and black hat machine learning tools, much like the war of good and evil
    anywhere in the world really.


    Another sweeping change to security would be autonomous drones controlled by machine
    learning algorithms. Drones can maintain constant aerial surveillance over entire
    cities at very little cost. With advancements in image recognition, motion capture,
    video recognition, and natural language processing, they will be able to communicate
    with people on the street, respond to natural disasters, and automobile accidents.
    They will also be able to ferry medications needed in emergency situations where
    traditional service vehicles cannot gain access. They will be able to find and
    rescue lost hikers by leading them to safety, delivering them needed supplies,
    and alerting authorities of their GPS location.


    ### Markets


    The rise of machine learning will generate completely new artificial intelligence-based
    products and services. Entire industries will be created to service this new software,
    as well as new products to be added to the Internet of Things. This may include
    a whole new generation of robots complete with learning algorithms and the ability
    to see, hear, and communicate by using natural language.


    ### Retail


    In the retail sector, service ML creates a more personalized and all-around better
    customer service. Machines do not have moods or are influenced by their surroundings
    as easily as humans are. If they are able to learn they can quickly adjust and
    adapt to the customers’ needs with a few short questions. Instead of merely showing
    a person what they want, machine learning will be dedicated to showing them what
    they need.


    A smart algorithm looking out for a person''s well-being, for instance, would
    not throw more and more fast food ads at an at-risk consumer. Instead, reminders
    about their health, coupons for gym memberships, or recipes for their favorite
    salads might become part of the artificial intelligence toolkit for notifications.
    Machine learning will help to balance people’s lives in many ways by using knowledge
    about general health, and even their own medical records, to provide information
    about not only what they want, but also what they might need.


    ### Healthcare


    Machine learning will know almost everything about a person through records on
    the Internet and records that have been captured from a visit to the doctor. These
    records would not only be for the patient’s benefit but for the doctor’s or healthcare
    provider’s. A person not wearing the medic-alert badge could be saved by their
    healthcare records for instance.


    On the diagnostic side, machine learning will do the busy work it is best at:
    examining our x-rays, blood-work, mammograms, and so on, looking for patterns
    human beings cannot see. This will afford pre-emptive diagnostic information to
    doctors so they can head off serious illness at early stages or prevent them altogether.


    Many if not most surgeries will be performed by artificial intelligence-enabled
    robots, either assisting human surgeons, being supervised by them, or even, eventually,
    working fully autonomously.


    Machine learning will be able to more effectively monitor things such as blood
    gasses under anesthesia, heart rate, and other health measures during operations.
    They are able to react in milliseconds should something appear to be wrong. Iatrogenic
    disease will decrease dramatically, if not disappear completely.


    ### The Environment and Sustainability


    Machine learning will be able to study the movement of people in cities, what
    they use and don’t use, their patterns.


    ---


    Change, especially change that may take away a piece of their world in the form
    of their job or replace them in any way, becomes a real issue if you consider
    not only the rate at which the technology industry is growing but the direction
    it is growing in.


    From the invention of the calculator through to the computer, mankind has been
    fed on movies about machines one day taking over the world. Those who have seen
    the first *Star Trek* movies would have seen technology that was then a thing
    of awe, and now not only have become a reality but one that is fast becoming obsolete.
    Maybe not the space ships, but talking computers and things like tablets.


    The invention of the first robot in the automobile industry caused a huge uproar
    as the robots could not only perform the function a lot more accurately, they
    did not need down time. This meant that production could be increased and the
    need for human operators decreased. Hence the reason why movies like the *Terminator*
    ring through a person''s mind when they think of machine learning and AI.


    If you stop to think just how much machines are starting to worm their way into
    a person’s every day life, you realize that maybe humans do have a bit of a cause
    to be at least wary if not skeptical. Already the new generations are so attached
    to their devices that there are actual clinics that deal with “Internet” and “technology”
    addictions. When was the last time you saw a young person actually reading a paper
    book? Or looking up when they were walking or taking public transportation?


    Although ML and AI are amazing concepts that are designed to improve the quality
    of human lives, the fact of the matter is they still raise ethical and philosophical
    questions along with some strong objections.


    A few of these objections include:


    ### Jobs


    One of the main concerns surrounding artificial intelligence is the way these
    systems are encroaching upon human employment. Automation is not a new problem,
    and vast numbers of jobs have already been lost in manufacturing and other such
    industries to robots and automated systems.


    Because of this, some argue that this concern that machines and artificial intelligence
    will take over so many jobs there will be no more economy, is not really a threat.
    There have been a few such takeovers in the past. The economy proved to be able
    to shift, adapt, and people found other jobs. Some could even argue that the net
    number of jobs has increased since the loss of so many jobs to automation.


    So what is the real problem around jobs loss due to automation?


    The problem comes in during the next round of job losses due to AI which will
    be unprecedented. Artificial intelligence will not only replace drudgery and danger.
    It will keep going. There are around 3.5 million AI currently in existence, but
    how long until the number has increased ten-fold and then ten-fold again as AI
    becomes more advanced? Think about the trucking industry. How long until all trucking
    is handled by machine learning systems running self-driving trucks? And what about
    ride-sharing services like Uber and Lyft? What becomes of the human element that
    used to offer these services?


    The question to ask is not what jobs will be replaced, but what jobs can’t be
    replaced. In the machine learning round of employment disruption, white collar
    jobs are just as much in jeopardy as blue. What about accountants, financial advisers,
    copywriters, and advertisers?


    The pro-artificial intelligence camp argues that this disruption will open up
    new kinds of jobs, things we can’t even imagine. Each major disruption of the
    economy in the past that displaced many forms of employment with automation often
    caused the creation of new employment unforeseen before the disruption. The difference
    with artificial intelligence is there is no reason to believe these new forms
    of employment won’t quickly be taken over by machine learning systems as well.


    And all the above assumes the use of the current type of very specific machine
    learning. What happens if researchers are able to generalize learning in artificial
    intelligence? What if these systems become able to generalize what they learn
    and apply what they know in new and different contexts? Such a generalized artificial
    intelligence system could very quickly learn to do just about anything. So that
    begs the question of just how real a *Terminator* type future for the human race
    could actually be. If all jobs become AI, where does that leave humans?


    ### Evil Systems


    The threat of machine learning used by bad actors is very real. How do we control
    who gains access to this powerful technology? The genie is out of the bottle.
    It can’t be put back in. So, how do we keep it from falling into the wrong hands?
    We need only keep in mind a simple chatbot that became a racist hellion in under
    24 hours to know this is a real issue.


    ### Taking Over the World


    So plots like the *Terminator* are probably far-fetched, but if you think about
    it, you can understand why this could be of great concern to humans. Already most
    people date online, companies are developing various robotic dolls for companions,
    and the new generation would rather text the person sitting right next to them
    than actually talk.


    Humans are becoming more and more reliant on their technology, so it is only normal
    for one to wonder when this is going to end, especially when you have some of
    the leading minds of the world such as Elon Musk and Steven Hawking voicing their
    strong opinions on the subject. Even the father of the World Wide Web has his
    doubts about the way in which his creation is being used. It is not hard to see
    why the conspiracy theorist, anti-technology, and human rights protestors may
    be against creations such as ML and AI.'
  mdcn: '## 第十六章：机器学习与未来


    尽管存在负面报道和质疑，机器学习和人工智能的未来既真实存在，也并非如人们想象的那般糟糕。这个领域蕴含着巨大的潜力。未来将出现让人类生活更美好、更安全、更舒适的系统。


    这些未来的机器学习系统包括：


    ### 安全


    人脸识别和异常行为检测是当今机器学习已提供的工具包。未来它们将无处不在，保护公众免受犯罪行为侵害，并为陷入困境的人们提供所需帮助。


    在网络世界，机器学习将不断发展并增强其在识别网络攻击、恶意软件代码和异常通信尝试方面的影响力。与此同时，黑帽软件破解者也在开发机器学习工具，以协助他们入侵网络、访问私人数据并造成服务中断。网络世界的未来将是白帽与黑帽机器学习工具之间持续不断的战争，这与世界任何地方的正邪之争并无二致。


    安全领域的另一项重大变革将是受机器学习算法控制的自主无人机。无人机可以以极低的成本对整个城市进行持续的空中监视。随着图像识别、运动捕捉、视频识别和自然语言处理技术的进步，它们将能够与街上的人们交流，应对自然灾害和交通事故。它们还能在传统服务车辆无法进入的紧急情况下运送所需药物。它们能够通过引导迷路的徒步旅行者到达安全地点、运送所需物资并通知当局其GPS位置来找到并营救他们。


    ### 市场


    机器学习的兴起将催生全新的基于人工智能的产品和服务。将创建全新的产业来服务这种新软件，同时也会有新产品被添加到物联网中。这可能包括一整代全新的机器人，它们配备学习算法，并具备看、听以及使用自然语言交流的能力。


    ### 零售


    在零售领域，服务型机器学习能创造更个性化、更全面的优质客户服务。机器没有情绪，也不像人类那样容易受环境影响。如果它们能够学习，就可以通过几个简短的问题快速调整并适应客户的需求。机器学习将不仅仅向人们展示他们想要的东西，而是致力于向他们展示他们需要的东西。


    例如，一个关注个人健康的智能算法，不会向高风险消费者投放越来越多的快餐广告。相反，关于健康的提醒、健身房会员优惠券或他们喜爱的沙拉食谱，可能会成为人工智能通知工具包的一部分。机器学习将通过利用关于一般健康状况甚至个人医疗记录的知识，在许多方面帮助平衡人们的生活，不仅提供他们想要的信息，也提供他们可能需要的信息。


    ### 医疗保健


    机器学习将通过互联网记录和就诊记录了解一个人的几乎所有信息。这些记录不仅对患者有益，对医生或医疗服务提供者也同样有益。例如，一个未佩戴医疗警报徽章的人，其医疗记录也可能挽救他的生命。


    在诊断方面，机器学习将从事它最擅长的繁忙工作：检查我们的X光片、血液检查、乳房X光片等，寻找人类无法察觉的模式。这将为医生提供预防性的诊断信息，使他们能够在早期阶段阻止严重疾病的发生或完全预防它们。


    许多（即使不是大多数）手术将由支持人工智能的机器人执行，它们要么协助人类外科医生，要么在人类监督下工作，甚至最终可能完全自主操作。


    机器学习将能够更有效地监测手术过程中的血气、心率和其他健康指标。一旦出现异常，它们能在毫秒内做出反应。医源性疾病将急剧减少，甚至可能完全消失。


    ### 环境与可持续性


    机器学习将能够研究城市中人们的活动、他们的使用与不使用习惯及其模式。


    ---


    变革，尤其是可能以工作被取代或任何形式被替代的形式夺走人们一部分世界的变革，如果你不仅考虑技术行业的发展速度，还考虑其发展方向，就会成为一个真正的问题。


    从计算器的发明到计算机的出现，人类一直被关于机器有朝一日接管世界的电影所“喂养”。看过第一部*《星际迷航》*电影的人会看到当时令人敬畏的技术，而如今这些技术不仅已成为现实，而且正迅速过时。也许不是宇宙飞船，而是会说话的计算机和平板电脑之类的东西。


    汽车工业中第一个机器人的发明引起了巨大轰动，因为机器人不仅能更精确地执行功能，而且不需要停机时间。这意味着产量可以增加，对人类操作员的需求减少。因此，当人们想到机器学习和人工智能时，*《终结者》*这样的电影就会浮现在脑海中。


    如果你停下来想想机器开始如何渗透到人们的日常生活中，你就会意识到，也许人类确实有理由至少保持谨慎，如果不是怀疑的话。如今新一代人如此依赖他们的设备，以至于出现了专门治疗“网络”和“技术”成瘾的诊所。你上次看到一个年轻人真正阅读纸质书是什么时候？或者在走路或乘坐公共交通工具时抬头看路？


    尽管机器学习和人工智能是旨在提高人类生活质量的惊人概念，但事实是它们仍然引发了伦理和哲学问题以及一些强烈的反对意见。


    其中一些反对意见包括：


    ### 工作


    围绕人工智能的主要担忧之一是这些系统正在侵占人类就业。自动化并非新问题，制造业和其他类似行业已经有大量工作岗位被机器人和自动化系统取代。


    因此，有人认为，担心机器和人工智能会接管如此多的工作岗位以至于经济不复存在的担忧，并非真正的威胁。过去已经发生过几次这样的接管。事实证明经济能够转型、适应，人们找到了其他工作。有些人甚至可以争辩说，自自动化导致大量工作岗位流失以来，净就业人数实际上增加了。


    那么，因自动化导致的工作岗位流失，真正的问题是什么？


    问题出现在下一轮由人工智能导致的、前所未有的工作岗位流失中。人工智能不仅将取代单调乏味和危险的工作。它将继续前进。目前大约有350万个人工智能存在，但随着人工智能变得更加先进，这个数字增加十倍，然后再增加十倍，需要多长时间？想想卡车运输业。所有卡车运输都由运行自动驾驶卡车的机器学习系统处理，这需要多久？那么像Uber和Lyft这样的共享出行服务呢？曾经提供这些服务的人类因素会怎样？


    要问的问题不是哪些工作将被取代，而是哪些工作无法被取代。在机器学习导致的就业颠覆中，白领工作与蓝领工作同样岌岌可危。那么会计、财务顾问、文案撰稿人和广告商呢？


    支持人工智能的阵营认为，这种颠覆将开辟新的工作类型，一些我们甚至无法想象的工作。过去每一次重大的经济颠覆，用自动化取代了许多形式的就业，往往导致了在颠覆之前无法预见的新就业的产生。人工智能的不同之处在于，没有理由相信这些新的就业形式不会很快也被机器学习系统接管。


    而以上所有假设都基于当前非常特定类型的机器学习。如果研究人员能够实现人工智能的泛化学习会怎样？如果这些系统能够将其所学进行概括，并在新的、不同的环境中应用它们所知会怎样？这样一个泛化的人工智能系统可以非常快速地学会做几乎任何事情。这就引出了一个问题：对于人类来说，*《终结者》*式的未来究竟有多真实？如果所有工作都变成人工智能，人类将何去何从？


    ### 邪恶系统


    恶意行为者使用机器学习的威胁非常真实。我们如何控制谁获得这项强大技术的访问权？精灵已经出瓶。它无法被放回。那么，我们如何防止它落入错误的人手中？我们只需记住一个简单的聊天机器人在不到24小时内变成种族主义恶魔的例子，就知道这是一个真实的问题。


    ### 接管世界


    所以像*《终结者》*那样的情节可能有些牵强，但如果你仔细想想，就能理解为什么这会引起人类极大的担忧。如今大多数人通过网络约会，公司正在开发各种机器人玩偶作为伴侣，新一代人宁愿给坐在旁边的人发短信，也不愿真正交谈。


    人类正变得越来越依赖他们的技术，因此人们想知道这一切何时会结束是很正常的，尤其是当世界上一些顶尖的思想家，如埃隆·马斯克和史蒂芬·霍金，就这个话题发表他们强烈意见的时候。即使是万维网之父也对他的创造物被使用的方式表示怀疑。不难理解为什么阴谋论者、反技术人士和人权抗议者可能会反对像机器学习和人工智能这样的创造物。'

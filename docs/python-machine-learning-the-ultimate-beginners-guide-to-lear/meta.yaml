  md: '# Crowd Simulation


    The movies are using Swarm Intelligence simulations for depicting animal and human
    crowds instead of trying to recreate real life ones. In *Batman Returns*, Swarm
    Intelligence was employed to create realistic bat simulations in the scenes where
    there were swarms of bats. For the *Lord of the Rings* movies, Swarm Intelligence
    simulations were employed to depict the massive battle scenes.


    # Human Swarms


    When combined with mediating software, a network of distributed people can be
    organized into swarms by implementing closed-loop, real-time control systems.
    These systems, acting out in real-time, allow human actors to act in a unified
    manner, a collective intelligence that operates like a single mind, making predictions
    or answering questions. Testing in academic settings suggests these human swarms
    can out-perform individuals in a wide variety of real-world situations.


    Swarm Intelligence and Machine Intelligence are both forms of artificial intelligence.
    There is much debate about SI being a subset of machine intelligence as it is
    a different approach toward the goal of smart machines. SI models the behavior
    of a particular kind of animal or animals, to achieve desired results. Thus, Swarm
    Intelligence and machine intelligence, even if one is not classified as a subset
    of the other, can complement each other. In an attempt to determine emotions from
    subtext text, a Swarm Intelligence approach will differ from a monolithic approach.
    Instead of one machine learning algorithm to detect emotion in text, a swarm approach
    might be to create many simple machine learning algorithms, each designed to detect
    a single emotion. These heuristics can be layered in hierarchies to avoid any
    emotion-detector fouling up the end result.


    For example, take a machine learning swarm meant to detect emotion in written
    text while examining this sentence: “When I pulled back the covers of my bed this
    morning, a giant spider ran over my leg, and I immediately ran out of the bedroom
    screaming.”


    This is a complex sentence and as such it is difficult for a natural language
    machine learning algorithm to parse for emotion. However, a swarm of simple machine
    learning algorithms dedicated to detecting one kind of emotion would likely have
    the terror algorithm scoring high, while fun and happiness scored low.


    Another more difficult example would be the following sentence:


    > “I watched the game yesterday and saw us kick butt in the first period, but
    by the third, I was terrified we would lose.”


    Human beings understand hyperbole. The writer is not terrified, but anxious the
    team will lose the game. Our swarm machine intelligence algorithms could have
    the fear or terror algorithm scoring high, but this would be inaccurate. Because
    swarm models can be hierarchical, one model’s output could be the input of another.
    In this case, a master model that detects emotion could filter through the outputs
    of each individual emotion algorithm, noting that “excitement” had been triggered
    by “kick butt,” parse that the subject of the sentence is a sport, and determine
    that anxiety is a better fit than terror.


    If you take the above into account, then it seems only fair to define Swarm Intelligence
    as an application of machine learning with an extremely narrow focus.'

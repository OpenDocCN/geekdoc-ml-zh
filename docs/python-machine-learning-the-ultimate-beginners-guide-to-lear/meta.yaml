    # Installing TensorFlow


    TensorFlow is a framework that is required for deep learning. It comes with a
    myriad of functionalities that allow a system to carry out deep learning functions.
    TensorFlow also has APIs that allow for the interaction between nearly all the
    most popular programming languages. The programming languages include Rust, Haskell,
    Java, C++, and Go.


    As with most Python or Python compatible libraries, TensorFlow is free to download
    and use from the Internet as it is open source software. TensorFlow can be installed
    using either Python **pip** or Anaconda **conda** package installation programs.
    For the sake of this book the CPU-only version of TensorFlow is to be installed.


    # Installing TensorFlow With Python Pip Without a Virtual Environment


    To install TensorFlow with Python and ensure it is the latest version that is
    compatible with your Python installation, open a **cmd** screen and type the following:


    ```

    pip install -U tensorflow

    ```


    The above command will help you install the **CPU** only version for TensorFlow.
    The **CPU** version of TensorFlow is faster and is a much easier system for beginners
    to work with. It is also recommended for the simpler machine learning models.
    When you are first starting out with machine learning model’s, **CPU** is a lot
    easier to work with to design and train these types of models.'
- md: "If you need to install a **GPU** version for TensorFlow, type the following\
    \ command into the **cmd** command line:\n\n```\npip install -U tensorflow-gpu\n\
    ```\n\nThis will install the TensorFlow **GPU** version for your Windows system.\
    \ **GPU** is a more advanced modelling system of TensorFlow and is used for huge\
    \ amounts of data and graphics/images. It is also used to work with more complex\
    \ tasks than **CPU** and can be quite a bit slower than **CPU**.\n\n## Installing\
    \ TensorFlow With Python Pip with a Virtual Environment\n\nIf you created the\
    \ sklearn-venv environment when you installed Scikit-Learn, then you should install\
    \ TensorFlow into that environment. You can activate that environment by typing\
    \ in the following at the **cmd** prompt:\n\n```\nsklearn-venv\\Scripts\\activate\n\
    ```\n\nFollow the same installation process for installing Scikit-Learn as you\
    \ would when you are installing it without the virtual environment.\n\n## Installing\
    \ TensorFlow With Anaconda Conda Without a Virtual Environment\n\nTo install TensorFlow\
    \ with Anaconda and ensure it is the latest version that is compatible with your\
    \ Anaconda installation, open the **Anaconda Prompt** screen and type the following:\n\
    \n```\nconda install tensorflow\n```\n\nThe above command will help you install\
    \ the **CPU** only version for TensorFlow.\n\nIf you need to install a **GPU**\
    \ version for TensorFlow, type the following command into the **Anaconda Prompt**\
    \ command line:\n\n```\nconda install tensorflow-gpu\n```\n\nThis will install\
    \ the TensorFlow **GPU** version for your Windows system.\n\n## Installing TensorFlow\
    \ With Anaconda Conda With a Virtual Environment\n\nIf you have already created\
    \ a conda virtual environment for Scikit-Learn, then use the same environment.\
    \ If you have not, follow the same procedure to create an Anaconda environment\
    \ as shown in the “**Installing Scikit-Learn in Anaconda with a Virtual Environment.**”\
    \ Once you have the Anaconda virtual environment, activate it using the following\
    \ command:\n\n```\nactivate sklearn-env\n```\n\nInstall TensorFlow by typing in:\n\
    \n```\nconda install tensorflow\n```\n\nThis will install the TensorFlow CPU version\
    \ for your Windows system.\n\n# Chapter 4: Using Scikit-Learn\n\nTo start using\
    \ Scikit-Learn you will first need to go into either Python or Anaconda to import\
    \ the library for use. To import Scikit-learn type in the following at the command\
    \ line prompt of either **cmd** or **Anaconda Prompt**:\n\n```\nFor Python:\n\
    import sklearn\n\nFor Anaconda:\nPython\nImport sklearn\n```\n\nAllow the command\
    \ to complete. You will know if it imported the module successfully as it will\
    \ return to a new prompt line. If it was not imported correctly there will be\
    \ an error message.\n\nYou can start creating machine learning models with Scikit-learn\
    \ and use the libraries that are included with the package.\n\n## The Learning\
    \ Problem\n\nMachine Learning is based on a training set and a testing set. The\
    \ training set is used to learn various properties from the data set. The testing\
    \ set is used to test what was learned in the training set.\n\nLearning problems\
    \ in machine language have two categories, as already discussed in a previous\
    \ chapter. Learning problems need to take into consideration various data sets\
    \ of n samples. It uses these samples to try and predict the unknown data properties.\n\
    \nThe two problem categories are classed as:\n\n- **Supervised Learning**, when\
    \ the machine algorithm's data has a few more attributes to it that need to have\
    \ a predictive outcome. For instance, for a human it is when a child gets shown\
    \ the color red and is told that it is red. Then they are shown a few other colors\
    \ and are told they are not red. This classifies the problem as being either the\
    \ color red or not the color red. Supervised learning problems are used to solve\
    \ either:\n    - **Classification problems**, problems that are known to have\
    \ discrete output values. For instance, it is either the color red or it is not\
    \ the color red; there is no other possibility or grey areas. Classification data\
    \ will have the following elements to it:\n        - **A predictor** or predictors.\
    \ For example, based on an age group, predicting how many people enjoy vanilla\
    \ ice-cream. In this case the age would be the predictor for the output.\n   \
    \     - **A label** which is the output, and for a classification it is represented\
    \ by an integer which could be 1, 2, -2, or 0. When you think of a label think\
    \ of it as a yes or a no tag, because labels cannot be used to perform mathematical\
    \ operations. Think about adding Yes, they like ice cream + No, they do not like\
    \ ice cream together. It makes no sense to do so as they are simply labels.\n\
    \    - **Regression** is when the machine learning algorithm needs to compare\
    \ one or more continuous variables in order to predict an outcome. For instance,\
    \ think of the average weight of a person that is 5 foot 3 inches. It could go\
    \ one further to predict the weight of a person depending on their height and\
    \ build. Regression will have one or more independent variables and a dependent\
    \ variable. For the example above, weight would be the dependent variable which\
    \ is predicted depending on the height and build of the person.\n- **Unsupervised\
    \ Learning** is when the machine learning algorithm is given a data set that consists\
    \ only of functions and features. There is no target data set of example outcomes\
    \ (labels). For example, the machine is only given input data and nothing to base\
    \ its predictions on. Therefore the machine has to learn the basic structure of\
    \ the data instead. Some unsupervised learning structures include:\n    - **Clustering**,\
    \ when a group of similar objects are grouped together in a cluster. Clustering\
    \ is useful in applications such as statistical data analysis and data mining.\n\
    \    - **Density estimation**, when an estimate is formed on observed data. Histograms,\
    \ Parzen windows, and vector quantization are examples techniques of density estimation.\n\
    \n## Loading Data Sets\n\nIn order to give the ML algorithm something to work\
    \ with it needs data sets to be loaded. To demonstrate how this is done, follow\
    \ the command below to load a demonstration data set called iris. To load a Scikit-learn\
    \ data set, type in the following at the command line prompt of either **cmd**\
    \ (for Python) or **Anaconda Prompt**:\n\n**For Python:**\n\n```\nfrom sklearn\
    \ import datasets\ndigits = datasets.load_digits()\n```\n\n**For Anaconda:**\n\
    \n```\nPython\n\nfrom sklearn import datasets\ndigits = datasets.load_digits()\n\
    ```\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_32_0.png)\n\nThe data for data\
    \ sets are usually stored in the .data member of the data set. This data set will\
    \ contain information in the **n_features** and **n_samples** arrays that show\
    \ what the data is, and the features that data has. The **.target** member is\
    \ where some solutions to variables can be found.\n\nFor instance, if we had an\
    \ array that contained the alphabet, all the letters would be stored **.data**\
    \ member from a to z, whereas a combination of the most common words could be\
    \ stored in the **.target** member. This would be the variation of words or word\
    \ combinations.\n\nThe iris data set contains an array of numbers. To see what\
    \ is in the data set, type the following at the command line prompt of either\
    \ **cmd** (for Python) or **Anaconda Prompt**:\n\n**For Python:**\n\n```\nprint(digits.data)\n\
    ```\n\n**For Anaconda:**\n\n```\nPython\n\nprint(digits.data)\n```\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_33_0.png)\n\
    \nTo see what some of the predicted outcomes for the arrays of numbers in iris\
    \ are you can type at the command line prompt of either **cmd** (for Python) or\
    \ **Anaconda Prompt**:\n\n**For Python:**\n\n```\ndigits.target\n```\n\n**For\
    \ Anaconda:**\n\n```\nPython\n\ndigits.target\n```\n\nThis will return a 2D array\
    \ which will feature the **n_samples** array which correspond to the **n_features**\
    \ array.\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_33_1.png)\n\nYou can sort\
    \ the data into a more usable format. The following example takes part of a target\
    \ array and shapes it. At the command line prompt of either **cmd** (for Python)\
    \ or **Anaconda Prompt** type:\n\n**For Python:**\n\n```\ndigits.images[2]\n```\n\
    \n**For Anaconda:**\n\n```\nPython\n\ndigits.images[2]\n```"
  mdcn: "如果你需要安装 **GPU** 版本的 TensorFlow，请在 **cmd** 命令行中输入以下命令：\n\n```\npip install\
    \ -U tensorflow-gpu\n```\n\n这将为你的 Windows 系统安装 TensorFlow **GPU** 版本。**GPU** 是\
    \ TensorFlow 更高级的建模系统，用于处理海量数据和图形/图像。它也用于处理比 **CPU** 更复杂的任务，但速度可能比 **CPU** 慢得多。\n\
    \n## 使用 Python Pip 和虚拟环境安装 TensorFlow\n\n如果你在安装 Scikit-Learn 时创建了 sklearn-venv\
    \ 环境，那么你应该将 TensorFlow 安装到该环境中。你可以通过在 **cmd** 提示符下输入以下命令来激活该环境：\n\n```\nsklearn-venv\\\
    Scripts\\activate\n```\n\n请遵循与安装 Scikit-Learn 时相同的安装流程，就像在没有虚拟环境中安装一样。\n\n## 使用\
    \ Anaconda Conda 且不使用虚拟环境安装 TensorFlow\n\n要使用 Anaconda 安装 TensorFlow 并确保它是与你的\
    \ Anaconda 安装兼容的最新版本，请打开 **Anaconda Prompt** 界面并输入以下内容：\n\n```\nconda install\
    \ tensorflow\n```\n\n上述命令将帮助你安装仅支持 **CPU** 的 TensorFlow 版本。\n\n如果你需要安装 **GPU**\
    \ 版本的 TensorFlow，请在 **Anaconda Prompt** 命令行中输入以下命令：\n\n```\nconda install tensorflow-gpu\n\
    ```\n\n这将为你的 Windows 系统安装 TensorFlow **GPU** 版本。\n\n## 使用 Anaconda Conda 和虚拟环境安装\
    \ TensorFlow\n\n如果你已经为 Scikit-Learn 创建了 conda 虚拟环境，那么请使用相同的环境。如果没有，请按照“**在 Anaconda\
    \ 中使用虚拟环境安装 Scikit-Learn**”中所示的相同步骤创建一个 Anaconda 环境。一旦你有了 Anaconda 虚拟环境，请使用以下命令激活它：\n\
    \n```\nactivate sklearn-env\n```\n\n通过输入以下内容安装 TensorFlow：\n\n```\nconda install\
    \ tensorflow\n```\n\n这将为你的 Windows 系统安装 TensorFlow CPU 版本。\n\n# 第 4 章：使用 Scikit-Learn\n\
    \n要开始使用 Scikit-Learn，你首先需要进入 Python 或 Anaconda 来导入该库以供使用。要导入 Scikit-learn，请在 **cmd**\
    \ 或 **Anaconda Prompt** 的命令行提示符下输入以下内容：\n\n```\nFor Python:\nimport sklearn\n\n\
    For Anaconda:\nPython\nImport sklearn\n```\n\n允许命令完成。如果模块导入成功，它将返回到一个新的提示行，你就会知道。如果没有正确导入，将会出现错误消息。\n\
    \n你可以开始使用 Scikit-learn 创建机器学习模型，并使用该包中包含的库。\n\n## 学习问题\n\n机器学习基于训练集和测试集。训练集用于从数据集中学习各种属性。测试集用于测试在训练集中学到的内容。\n\
    \n机器语言中的学习问题有两类，正如前面章节所讨论的。学习问题需要考虑包含 n 个样本的各种数据集。它使用这些样本来尝试预测未知的数据属性。\n\n这两类问题被归类为：\n\
    \n- **监督学习**，当机器算法的数据具有更多需要预测结果的属性时。例如，对于人类来说，当一个孩子被展示红色并被告知它是红色时。然后他们被展示其他几种颜色，并被告知它们不是红色。这将问题分类为红色或非红色。监督学习问题用于解决：\n\
    \    - **分类问题**，已知具有离散输出值的问题。例如，它是红色或不是红色；没有其他可能性或灰色地带。分类数据将包含以下元素：\n        -\
    \ **一个预测器**或多个预测器。例如，根据年龄组预测有多少人喜欢香草冰淇淋。在这种情况下，年龄将是输出的预测器。\n        - **一个标签**，即输出，对于分类，它由一个整数表示，可以是\
    \ 1、2、-2 或 0。当你想到标签时，把它想象成一个是或否的标签，因为标签不能用于执行数学运算。想想把“是，他们喜欢冰淇淋”和“不，他们不喜欢冰淇淋”加在一起。这样做没有意义，因为它们只是标签。\n\
    \    - **回归**，当机器学习算法需要比较一个或多个连续变量以预测结果时。例如，想想一个身高 5 英尺 3 英寸的人的平均体重。它可以更进一步，根据一个人的身高和体型来预测其体重。回归将有一个或多个自变量和一个因变量。对于上面的例子，体重将是因变量，它根据人的身高和体型进行预测。\n\
    - **无监督学习**，当机器学习算法被给予一个仅包含函数和特征的数据集时。没有示例结果（标签）的目标数据集。例如，机器只被给予输入数据，而没有可以基于其进行预测的内容。因此，机器必须学习数据的基本结构。一些无监督学习结构包括：\n\
    \    - **聚类**，当一组相似的对象被分组到一个簇中时。聚类在统计数据分析和数据挖掘等应用中很有用。\n    - **密度估计**，当根据观测数据形成估计时。直方图、Parzen\
    \ 窗和向量量化是密度估计的技术示例。\n\n## 加载数据集\n\n为了给 ML 算法提供可处理的内容，需要加载数据集。要演示如何操作，请按照以下命令加载一个名为\
    \ iris 的演示数据集。要加载 Scikit-learn 数据集，请在 **cmd**（用于 Python）或 **Anaconda Prompt**\
    \ 的命令行提示符下输入以下内容：\n\n**对于 Python：**\n\n```\nfrom sklearn import datasets\ndigits\
    \ = datasets.load_digits()\n```\n\n**对于 Anaconda：**\n\n```\nPython\n\nfrom sklearn\
    \ import datasets\ndigits = datasets.load_digits()\n```\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_32_0.png)\n\
    \n数据集的数据通常存储在数据集的 .data 成员中。此数据集将包含在 **n_features** 和 **n_samples** 数组中的信息，这些数组显示了数据是什么以及数据具有的特征。**.target**\
    \ 成员是变量的一些解决方案可以找到的地方。\n\n例如，如果我们有一个包含字母表的数组，所有字母都将存储在 **.data** 成员中，从 a 到 z，而最常用单词的组合可以存储在\
    \ **.target** 成员中。这将是单词或单词组合的变体。\n\niris 数据集包含一个数字数组。要查看数据集中有什么，请在 **cmd**（用于\
    \ Python）或 **Anaconda Prompt** 的命令行提示符下输入以下内容：\n\n**对于 Python：**\n\n```\nprint(digits.data)\n\
    ```\n\n**对于 Anaconda：**\n\n```\nPython\n\nprint(digits.data)\n```\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_33_0.png)\n\
    \n要查看 iris 中数字数组的一些预测结果，你可以在 **cmd**（用于 Python）或 **Anaconda Prompt** 的命令行提示符下输入：\n\
    \n**对于 Python：**\n\n```\ndigits.target\n```\n\n**对于 Anaconda：**\n\n```\nPython\n\
    \ndigits.target\n```\n\n这将返回一个二维数组，其中包含与 **n_features** 数组对应的 **n_samples** 数组。\n\
    \n![](img/989db6cb032c6b8914db5e5a7c2b4a41_33_1.png)\n\n你可以将数据整理成更可用的格式。以下示例获取目标数组的一部分并对其进行整形。在\
    \ **cmd**（用于 Python）或 **Anaconda Prompt** 的命令行提示符下输入：\n\n**对于 Python：**\n\n```\n\
    digits.images[2]\n```\n\n**对于 Anaconda：**\n\n```\nPython\n\ndigits.images[2]\n\
    ```"

  md: "# Distance Betweent 2 Points\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_42_0.png)\n\
    \n+   - To solve Point C you would need to plot a dotted line from Point A (b)\
    \ to the x-axis and from Point B (a) to connect with the dotted line from Point\
    \ A.\n- These dotted lines form a right-angled triangle from the known points\
    \ on the graph.\n- When we form a right-angle triangle where the **Pythagoras\
    \ theorem** states:\n  The biggest side of the triangle (the hypotenuse) is equal\
    \ to the sum of the other two sides (“Pythagoras Theorem”, 2009).\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_42_1.png)\n\
    \n+   - The Pythagoras formula is:\n  - a²+b²=c²\n- To calculate C:"

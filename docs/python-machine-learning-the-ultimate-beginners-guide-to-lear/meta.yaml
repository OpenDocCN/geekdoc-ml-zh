    \ 7 to 288, and the next column having data from 1 to 5.\n\nTo scale the data\
    \ you are only going to fit it for the training data but ensure that the testing\
    \ data still makes sense and processes the data correctly.\n\nIn a blank cell\
    \ in the Jupyter Notebook, type the following:\n\n```\nsc_X = StandardScaler()\n\
    X_train = sc_X.fit_transform(X_train)\nX_test = sc_X.transform(X_test)\n```\n\n\
    Run the script. Once the script has run without error it will return to a blank\
    \ cell.\n\n## Building and Training the Diabetes Test Model\n\nNow that you have\
    \ set up all the data, it is time to build and then train the model. To fit the\
    \ train data into the model you are going to have to use **KNeighborsClassifier**\
    \ to define the model.\n\nThe first step is to define the model and initialize\

- md: "## How to Determine the “k” Parameter\n\n**Parameter tuning** is what the process\
    \ of determining the correct value for “k” in the KNN model is called. As KNN\
    \ is a feature similarity-based algorithm, setting up the correct parameter for\
    \ “k” is of the utmost importance to ensure predicted output is as accurate as\
    \ possible.\n\nThe KNN model below determines whether or not a fruit is an apple\
    \ or an orange.\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_39_0.png)\n\nThe headache\
    \ in choosing the correct “k” factor is trying to eliminate too much bias. For\
    \ instance, in the diagram above, if you determine k=4, then the new variable\
    \ would be an orange based on the 4 nearest neighbor votes. However, if you determined\
    \ that k=9, the new variable would then be an apple. The trick to determining\
    \ the “k” factor is to limit bias as much as possible.\n\n## How to Choose the\
    \ Value of k?\n\nIf the “k” factor is too low, there is not going to be enough\
    \ information and if it is too high, there is going to be too much data to process.\n\
    \nThe easiest method for choose a “k” value:\n\n- Use the square root of “n” where\
    \ n = total number of data points.\n- If the square root is an even number, either\
    \ subtract or add 1 to the value to ensure that “k” values are odd values. If\
    \ a “k” value is an even number, there is always the risk of failure. For example,\
    \ the apples and oranges diagram could have ended up with an undetermined new\
    \ value. The new value’s nearest 4 neighbors could have been 2 apples and 2 oranges\
    \ instead of 2 apples and 3 oranges.\n- Round the “k” value to the nearest whole\
    \ number.\n- For the diagram above with the apples and oranges, the “k” value\
    \ would be:\n    - k = Square Root{14}\n    - k = 3.74\n    - k = 4\n    - k =\
    \ 4 + 1\n    - **k = 5**\n\n## When to Use KNN Models?\n\nYou can use the KNN\
    \ algorithm when the following criteria is met:\n\n- All data has a label — apples,\
    \ oranges, grapes, etc.\n- Data sets are small and not too complex — KNN doesn’t\
    \ learn discriminative function from the training sets of the model. It is known\
    \ as a lazy learner and is used for data sets that are no more than about 1GB.\n\
    - Noise-free or clean data sets — This means that data must be clearly defined\
    \ without too many variables. For instance, it is a dog or a cat, not a small\
    \ dog, or small dog with long hair, or a cat with no fur, etc.\n\n## How the KNN\
    \ Algorithm Works\n\nA data set that determines if a person was **overweight**\
    \ or **normal weight** would have two main variables:\n\n- Height\n- Weight\n\n\
    Consider the weight chart table below as the data set to determine if a person\
    \ is overweight or normal weight by plotting their height variable and their weight\
    \ variable.\n\n| Height (Feet & Inches) | Weight (Pounds) | Group/Class |\n|---|---|---|\n\
    | 4'9\" | 63 lb. | Normal Weight |\n| 4'10\" | 110 lb. | Overweight |\n| 4'11\"\
    \ | 115 lb. | Overweight |\n| 5'0\" | 110 lb. | Normal Weight |\n| 5'1\" | 116\
    \ lb. | Normal Weight |\n| 5'2\" | 121 lb. | Normal Weight |\n| 5'3\" | 127 lb.\
    \ | Normal Weight |\n| 5'4\" | 160 lb. | Overweight |\n\nUsing the data from the\
    \ table above along with the KNN algorithm, you have to determine if a person\
    \ is overweight or normal weight using their height and weight as the criteria.\n\
    \n![](img/989db6cb032c6b8914db5e5a7c2b4a41_40_0.png)\n\nFor instance, say Mary\
    \ weighs 110 lbs. and is 5'1\" tall. How can you determine if she is overweight\
    \ or normal weight?\n\nThe KNN algorithm assumes that similar things are closer\
    \ together. Therefore, in order for the algorithm to be true, similar data points\
    \ should exist in close proximity to each other. For example, the classification\
    \ of the green and red grapes used in an example above.\n\nUsing the assumption\
    \ that similar data points are closely related, to find the nearest neighbors\
    \ you would need to calculate the Euclidean distance, or what you may have learned\
    \ in math as calculating the distance between two points.\n\n## The Distance Between\
    \ Two Points/Euclidean Distance Calculation\n\nWhen you were at school you would\
    \ have learned to calculate the distance between two points. In a nutshell, this\
    \ calculation assumes that when you know the vertical and horizontal positions\
    \ of two points, you can calculate a straight line between these two points.\n\
    \nFor everyone who needs a fast recap on the distance between two points calculation:\n\
    \n![](img/989db6cb032c6b8914db5e5a7c2b4a41_41_0.png)\n\n- Taking the graph above\
    \ as an example, you would know the location of **Point A** and the location of\
    \ **Point B** on the graph.\n    - **Point A:** X = 2 and Y = 5 (2,5)\n    - **Point\
    \ B:** X = 1 and Y = 0 (1,0)\n- What needs to be calculated is **Point C**, which\
    \ is the **distance** between **Point A** and **Point B**.\n- The calculation\
    \ would look like the following formula:\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_41_1.png)\n\
    \n## Distance Between 2 Points\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_42_0.png)\n\
    \n- To solve Point C you would need to plot a dotted line from Point A (b) to\
    \ the x-axis and from Point B (a) to connect with the dotted line from Point A.\n\
    - These dotted lines form a right-angled triangle from the known points on the\
    \ graph.\n- When we form a right-angle triangle where the **Pythagoras theorem**\
    \ states:\n  The biggest side of the triangle (the hypotenuse) is equal to the\
    \ sum of the other two sides (“Pythagoras Theorem”, 2009).\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_42_1.png)\n\
    \n- The Pythagoras formula is:\n  - a²+b²=c²\n- To calculate C:\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_43_0.png)\n\
    \n- a = (XA - XB) —Horizontal distance\n- b = (YA - YB) —Vertical distance\n-\
    \ Putting the formula together to calculate C:\n  - c² = a² + b²\n  - c² = (XA\
    \ - XB)² + (YA - YB)²\n  - c = Square Root{(XA - XB)² + (YA - YB)²}\n- Putting\
    \ the values into the formula to calculate C:\n  - c = Square Root{(2 - 1)² +\
    \ (5 - 0)²}\n  - c = Square Root{(1² + 5²)}\n  - c = Square Root{1 + 25}\n  -\
    \ c = Square Root{26}\n  - c = 5.099\n\n## KNN Distance Between Two Points/Euclidean\
    \ Distance Calculation\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_43_1.png)\n\
    \nTo understand how to calculate the Euclidean distance for the KNN algorithm,\
    \ take a look at the chart above. Using the measurements from the previous height\
    \ to weight chart, you can clearly see the weights that are normal and those that\
    \ are overweight.\n\nTo determine if Mary is overweight or normal weight, the\
    \ KNN algorithm will calculate the distance between each data point from the unknown\
    \ data point within the existing data set.\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_44_0.png)\n\
    \n![](img/989db6cb032c6b8914db5e5a7c2b4a41_44_1.png)\n\nOnce the KNN algorithm\
    \ has calculated the distance between the known data points in the data set, it\
    \ then votes on how to classify the unknown data point by its closest neighbors\
    \ based on k=3, which makes the unknown variable a normal weight. Thus, Mary is\
    \ normal weight based on her height and current weight.\n\n## The Workings of\
    \ the KNN Algorithm\n\nThe KNN algorithm works along the following procedure:\n\
    \n- Data is loaded into the algorithm\n- K is then initialized to the required\
    \ number of neighbors (k=n)\n- Each data point query fed into the algorithm will:\n\
    \    - Calculate the distance between the example data and the query\n    - Create\
    \ an ordered collection from the index and distance data\n- Sort the data from\
    \ the smallest entries to the largest by distance\n- The K entries will be assigned\
    \ labels\n    - Regression models will return mean labels\n    - Classification\
    \ models will return mode labels\n\n## Implementing KNN Algorithm\n\nTo demonstrate\
    \ how to implement the KNN algorithm, you will be using a sample data set to predict\
    \ diabetes.\n\nThe goal of the exercise is to predict if a person is at risk for\
    \ diabetes.\n\nThe data set contains a list of 768 people. The list is a mixture\
    \ of people who did or did not get diagnosed with diabetes.\n\nThe CSV file for\
    \ this data set contains 9 columns of data all pertaining to information that\
    \ helps the KNN algorithm predict whether or not a person is at risk for diabetes.\n\
    \nTo get started, open either the **Python IDE** or **Jupyter Notebook for Anaconda**.\
    \ For this book the Jupyter Notebook will be used. To access Jupyter Notebook\
    \ you will need to launch the Anaconda Navigator."
  mdcn: "## 如何确定“k”参数\n\n**参数调优**是指确定KNN模型中“k”正确值的过程。由于KNN是一种基于特征相似性的算法，为“k”设置正确的参数对于确保预测输出尽可能准确至关重要。\n\
    \n下面的KNN模型用于判断一个水果是苹果还是橙子。\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_39_0.png)\n\
    \n选择正确“k”因子的难点在于试图消除过多的偏差。例如，在上图中，如果你确定k=4，那么根据4个最近邻居的投票，新变量将被判定为橙子。然而，如果你确定k=9，那么新变量将被判定为苹果。确定“k”因子的诀窍在于尽可能限制偏差。\n\
    \n## 如何选择k值？\n\n如果“k”因子太低，信息量将不足；如果太高，则会有太多数据需要处理。\n\n选择“k”值最简单的方法：\n\n- 使用“n”的平方根，其中n\
    \ = 数据点的总数。\n- 如果平方根是偶数，则将该值减去或加上1，以确保“k”值为奇数。如果“k”值为偶数，则总是存在失败的风险。例如，苹果和橙子的图表最终可能产生一个未确定的新值。新值的最近4个邻居可能是2个苹果和2个橙子，而不是2个苹果和3个橙子。\n\
    - 将“k”值四舍五入到最接近的整数。\n- 对于上面的苹果和橙子图表，“k”值将是：\n    - k = 平方根{14}\n    - k = 3.74\n\
    \    - k = 4\n    - k = 4 + 1\n    - **k = 5**\n\n## 何时使用KNN模型？\n\n当满足以下条件时，你可以使用KNN算法：\n\
    \n- 所有数据都有标签——苹果、橙子、葡萄等。\n- 数据集较小且不太复杂——KNN不会从模型的训练集中学习判别函数。它被称为惰性学习器，用于不超过约1GB的数据集。\n\
    - 无噪声或干净的数据集——这意味着数据必须定义清晰，没有太多变量。例如，它是一只狗或一只猫，而不是一只小狗，或一只长毛小狗，或一只无毛的猫等。\n\n##\
    \ KNN算法如何工作\n\n一个判断一个人是**超重**还是**正常体重**的数据集将有两个主要变量：\n\n- 身高\n- 体重\n\n考虑下面的体重图表作为数据集，通过绘制身高变量和体重变量来判断一个人是超重还是正常体重。\n\
    \n| 身高（英尺和英寸） | 体重（磅） | 组别/类别 |\n|---|---|---|\n| 4'9\" | 63 lb. | 正常体重 |\n| 4'10\"\
    \ | 110 lb. | 超重 |\n| 4'11\" | 115 lb. | 超重 |\n| 5'0\" | 110 lb. | 正常体重 |\n| 5'1\"\
    \ | 116 lb. | 正常体重 |\n| 5'2\" | 121 lb. | 正常体重 |\n| 5'3\" | 127 lb. | 正常体重 |\n\
    | 5'4\" | 160 lb. | 超重 |\n\n使用上表中的数据以及KNN算法，你必须使用身高和体重作为标准来判断一个人是超重还是正常体重。\n\n\
    ![](img/989db6cb032c6b8914db5e5a7c2b4a41_40_0.png)\n\n例如，假设玛丽体重110磅，身高5'1\"。你如何判断她是超重还是正常体重？\n\
    \nKNN算法假设相似的事物彼此更接近。因此，为了使算法成立，相似的数据点应该彼此靠近。例如，上面示例中使用的绿色和红色葡萄的分类。\n\n基于相似数据点紧密相关的假设，要找到最近的邻居，你需要计算欧几里得距离，或者你在数学中学过的计算两点之间距离的方法。\n\
    \n## 两点之间的距离/欧几里得距离计算\n\n当你在学校时，你学过计算两点之间的距离。简而言之，这个计算假设当你知道两点的垂直和水平位置时，你可以计算这两点之间的直线距离。\n\
    \n对于需要快速回顾两点之间距离计算的人：\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_41_0.png)\n\n\
    - 以上图为例，你知道图上**点A**和**点B**的位置。\n    - **点A：** X = 2，Y = 5 (2,5)\n    - **点B：**\
    \ X = 1，Y = 0 (1,0)\n- 需要计算的是**点C**，即**点A**和**点B**之间的**距离**。\n- 计算将如下公式所示：\n\n\
    ![](img/989db6cb032c6b8914db5e5a7c2b4a41_41_1.png)\n\n## 两点之间的距离\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_42_0.png)\n\
    \n- 要解决点C，你需要从点A (b) 向x轴画一条虚线，并从点B (a) 连接到点A的虚线。\n- 这些虚线从图上的已知点形成一个直角三角形。\n- 当我们形成一个直角三角形时，**勾股定理**指出：\n\
    \  三角形最大的边（斜边）等于另外两边的平方和（“勾股定理”，2009）。\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_42_1.png)\n\
    \n- 勾股公式是：\n  - a²+b²=c²\n- 要计算C：\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_43_0.png)\n\
    \n- a = (XA - XB) —水平距离\n- b = (YA - YB) —垂直距离\n- 将公式组合起来计算C：\n  - c² = a² + b²\n\
    \  - c² = (XA - XB)² + (YA - YB)²\n  - c = 平方根{(XA - XB)² + (YA - YB)²}\n- 将数值代入公式计算C：\n\
    \  - c = 平方根{(2 - 1)² + (5 - 0)²}\n  - c = 平方根{(1² + 5²)}\n  - c = 平方根{1 + 25}\n\
    \  - c = 平方根{26}\n  - c = 5.099\n\n## KNN两点之间的距离/欧几里得距离计算\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_43_1.png)\n\
    \n要理解如何为KNN算法计算欧几里得距离，请看上面的图表。使用之前身高体重图表中的测量值，你可以清楚地看到哪些体重是正常的，哪些是超重的。\n\n为了判断玛丽是超重还是正常体重，KNN算法将计算现有数据集中每个已知数据点与未知数据点之间的距离。\n\
    \n![](img/989db6cb032c6b8914db5e5a7c2b4a41_44_0.png)\n\n![](img/989db6cb032c6b8914db5e5a7c2b4a41_44_1.png)\n\
    \n一旦KNN算法计算出数据集中已知数据点之间的距离，它就会根据k=3，通过其最近的邻居投票来决定如何分类未知数据点，这使得未知变量为正常体重。因此，根据她的身高和当前体重，玛丽是正常体重。\n\
    \n## KNN算法的工作原理\n\nKNN算法按照以下流程工作：\n\n- 数据被加载到算法中\n- 然后将K初始化为所需的邻居数（k=n）\n- 输入算法的每个数据点查询将：\n\
    \    - 计算示例数据与查询之间的距离\n    - 根据索引和距离数据创建一个有序集合\n- 按距离从小到大对数据进行排序\n- K个条目将被分配标签\n\
    \    - 回归模型将返回平均标签\n    - 分类模型将返回众数标签\n\n## 实现KNN算法\n\n为了演示如何实现KNN算法，你将使用一个样本数据集来预测糖尿病。\n\
    \n该练习的目标是预测一个人是否有患糖尿病的风险。\n\n该数据集包含768人的列表。该列表是已确诊和未确诊糖尿病的人的混合。\n\n此数据集的CSV文件包含9列数据，所有这些数据都与帮助KNN算法预测一个人是否有患糖尿病风险的信息有关。\n\
    \n首先，打开**Python IDE**或**Anaconda的Jupyter Notebook**。本书将使用Jupyter Notebook。要访问Jupyter\
    \ Notebook，你需要启动Anaconda Navigator。"

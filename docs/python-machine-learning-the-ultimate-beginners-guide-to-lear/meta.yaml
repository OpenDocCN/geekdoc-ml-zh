    \ Neural Networks were first developed in the late 1950s. They were modeled on\
    \ the understanding of how the human brain works. Neural networks are a subset\
    \ of Machine Learning and AI. They have been designed to mimic certain aspects\
    \ of human neurons. Neural Networks pass data through interconnected nodes. The\
    \ data is analyzed, classified, and then passed on to the next node, for further\
    \ classification and categorization. Most Neural Networks usually contain two\
    \ to three hidden layers which makes them Deep Learning Neural Networks. There\
    \ are Deep Learning Neural Networks that contain hundreds of layers.\n\n## Neural\
    \ Networks\n\nThere are many types of Neural Networks and these include the following:\n\
    \n### Feedforward Neural Networks\n\nFeedforward Neural Networks are the simplest\
    \ form of Neural Networks. They work by way of data that flows through a feedforward\
    \ network from the input, through to the node layers containing the neurons, and\
    \ exits through the output layer. The data flow in one direction and unlike the\
    \ more modern neural networks, feedforward networks do not cycle or iterate over\
    \ the data. They perform a single operation on the input data and provide the\
    \ solution in an output stream.\n\n### Single-Layer Perceptron\n\nSingle-Layer\
    \ Perceptron is a form of a feedforward neural network with only one layer of\
    \ nodes. It is the simplest form of a feedforward neural network. The input is\
    \ sent to each node already weighted. The neuron either fires or does not fire\
    \ based on the input, weight, and a set minimal threshold. The value is set as\
    \ either activated or deactivated depending on if the criteria is met or not.\n\
    \n### Multi-Layer Perceptron\n\nMulti-layer perceptrons consist of two or more\
    \ layers, with the output of the upper layer becoming the input of the lower layer.\
    \ Because there are many layers, this form of neural network often takes advantage\
    \ of backpropagation, where the produced output is compared with the expected\
    \ output. The degree of error is fed back through the network to adjust the weights\
    \ on the appropriate nodes, all with the intention of producing an output closer\
    \ to the desired output state. It is these multi-layer algorithm networks with\
    \ backpropagation that have become some of the most successful and powerful Machine\
    \ Learning models.\n\n### Recurrent Neural Networks\n\nRecurrent Neural Networks\
    \ propagate data in both directions. Data flows forward like feedforward networks\
    \ but also backward from later to earlier processing stages. Recurrent neural\
    \ networks’ main strength is the ability to remember previous states. Before recurrent\
    \ neural networks, a neural network would forget previous tasks once it began\
    \ a new one. Recurrent neural networks allow information to persist. This means\
    \ they can take input from subsequent events and “remember” their experience in\
    \ previous ones. Recurrent neural networks are a series of input and output networks\
    \ with the output of the first becoming the input of the second. It follows that\
    \ the output of the second series becomes the input of the third, and so on. This\
    \ cycling allows Recurrent Neural Networks to develop closer and closer approximations\
    \ to the desired output."

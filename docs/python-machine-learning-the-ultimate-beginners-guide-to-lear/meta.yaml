    \ which takes any non-data out of the data set for computation.\n\nTo set this\
    \ criterion, in a new cell type the following:\n\n```\nzero_not_accepted = ['Glucose',\
    \ 'BloodPressure', 'SkinThickness', 'BMI', 'Insulin']\nfor column in zero_not_accepted:\n\
    \    dataset[column] = dataset[column].replace(0, np.NaN)\n    mean = int(dataset[column].mean(skipna=True))\n\
    \    dataset[column] = dataset[column].replace(np.NaN, mean)\n```\n\nRun the script.\
    \ It should return you to a blank cell if there are no errors in the script.\n\
    \n## Split the Data Set into Training and Testing\n\nTo split the data set you\

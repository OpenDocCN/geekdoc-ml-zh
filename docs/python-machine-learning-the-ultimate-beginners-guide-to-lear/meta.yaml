    马克·里德\n\n# Python 机器学习\n\n使用 Scikit-Learn 和 TensorFlow 逐步学习 Python 机器学习的终极初学者指南\n\
    \n马克·里德\n\n© 版权所有 2020 - 保留所有权利。\n\n未经作者或出版商直接书面许可，不得复制、转载或传播本书所含内容。\n\n在任何情况下，出版商或作者均不对因本书所含信息直接或间接造成的任何损害、赔偿或金钱损失承担任何责任或法律责任。\n\

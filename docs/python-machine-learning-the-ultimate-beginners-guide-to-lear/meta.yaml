    # # Chapter 9:

    ## Machine Learning Classification and Regression


    Regression and classification are two types of machine learning outputs that can
    be produced. This is called predictive modelling, which is when a model is designed
    to make a new data prediction based on historical data.


    # ### Classification Problems


    A classification problem involves an input that requires an output in the form
    of a label or category. Regression problems, on the other hand, involve an input
    that requires an output value as a quantity.


    Classification problems are expected to produce an output that is a label or category.
    For instance, a function is created from an examination of the input data that
    produces a discrete output. A familiar example of a classification problem is
    whether a given email is spam or not spam.


    Classification can involve probability, providing a probability estimate along
    with its classification. 0.7 spam, for example, suggests a 70% chance an existing
    email is spam. If this percentage meets or exceeds the acceptable level for a
    spam label, then the email is classified as spam and therefore the email needs
    to go into the spam folder. Otherwise, it is classified as not spam and will be
    delivered to the inbox.


    One common method to determine a classification problem’s algorithm probability
    of accuracy is to compare the results of its predictive model against the actual
    classification of the data set it has examined. On a data set of 5 emails, for
    example, where the algorithm has successfully classified 4 out of 5 of the emails
    in the set, the algorithm could be said to have an accuracy of 80%.


    # ### Regression Problems


    In a regression problem, the expected output is in the form of an unlimited numerical
    range. The price of a used car is a good example. The input might be the year,
    color, mileage, condition, etc., and the expected output is a dollar value, such
    as $4,500 - $6,500. The skill set of a regression algorithm can be determined
    using various mathematical techniques. A common skill set measure for a regression
    algorithm is to calculate the root mean squared error, RMSE.


    Although it is possible to modify each of the above methods to produce each others’
    result, such as turning a classification algorithm into a regression algorithm
    and vice versa, the output requirements of the two define each algorithm quite
    clearly:


    +   - Classification algorithms produce a discrete category result which can be
    evaluated for accuracy, while regression algorithms cannot.

    - Regression algorithms produce a ranging result and can be evaluated using root
    mean squared error, while classification algorithms cannot.


    While machine learning employs both types of methods for problem-solving, both
    classification and regression, what method is employed for any particular problem
    depends on the nature of the problem and how the solution needs to be presented.'
- md: '## Chapter 10: Machine Learning and the Cloud


    Cloud computing is a complex, and at times expensive, undertaking. It involves
    the integration of hundreds or even thousands of computer servers stored in large
    data centers that can be housed anywhere in the world. An example of a cloud computing
    system is Amazon Web Services (AWS) which has a data center that can host as many
    as 80,000 servers. This “raw iron” serves as the backbone of the cloud service.
    The servers operate virtual machine managers called hypervisors. Hypervisors can
    be either software or hardware.


    The advantage of cloud computing goes to the consumer subscribing to the supplier
    of the cloud computing services. Companies like Amazon who offer cloud computing
    services absorb the costs of these large data centers so their customers don’t
    have to. The consumer gets to reap the benefit of a virtual networking environment
    that they can access from anywhere in the world instead of being limited to an
    office.


    Cloud computing plays a valuable role in machine learning in that it can cut out
    the exorbitant costs of equipment. The machine learning process is an expensive
    process and gets even more so when you consider the equipment required to run
    it. Large corporations that have billion dollar yearly turnover struggle to keep
    up with the system demands ML can put on them. For institutes such as colleges
    or universities, this can be even more daunting. Cloud computing and its on the
    fly management of systems resources can drastically cut the cost of machine learning.


    Companies using cloud computing to implement machine learning do not need an IT
    department capable of creating and managing the AI infrastructure either. This
    is taken care of by the companies offering the cloud services.


    Just as cloud-based services offer SaaS (software as a service) solutions, machine
    learning cloud services offer SDKs (software developer kits) and APIs (application
    programming interfaces) to embed machine learning functions into applications.
    These connections offer support for most programming languages. This allows for
    developers to harness the power of machine learning processes directly in their
    applications, which is where the most value lies.


    ## Benefits of Cloud-Based Machine Learning


    Cloud-based machine learning projects make it easy for a company or organization
    to use limited levels of resources during experimentation and training of the
    model. It provides on the fly systems scaling that can increase or decrease processing
    power or storage capacity as and when needed. Although a lot of ML programming
    resources are open source, the scale of the processing and storage can be limiting
    cost-wise. Cloud-based machine learning systems make systems resources more obtainable
    and cost effective for both business and individuals.


    Amazon AWS, Google Cloud Platform, and Microsoft Azure have many machine learning
    services that do not require knowledge of Artificial Intelligence, theories of
    machine learning, or even a data science team. Each of these platforms offer their
    own benefits, and which one you chose depends entirely on what your ML needs are.


    ## Chapter 11: Machine Learning and the Internet of Things (IoT)


    In the early 1980s a coke machine at Carnegie Mellon University was one of the
    first examples of the Internet of Things. By accessing the coke machine over the
    Internet, it could be determined if there was stock in the machine and what the
    temperature of the drink was.


    The Internet of Things (IoT) has substantially evolved since the early 1980s and
    now includes devices such as smartphones, wireless sensors for security devices,
    GPS systems, and so on. IoT is a term that applies to any device that is connected
    to or through the Internet. These can be devices ranging from a jet engine to
    a robotic arm in a factory or a sensor in a thermostat.


    ## Uses for the Internet of Things


    The IoT can be classified as anything with an on or off switch that either works
    through or can work with the Internet. In today''s fast past and ever evolving
    high-tech world, IoT plays a huge part in anyone who has the Internet, or is connected
    to, the Internet''s life.


    Uses for the IoT include:


    ### Consumer Applications


    Internet of Things devices created for consumer use range from smartphones to
    connected vehicles, health monitoring devices, and machine ordering devices. A
    lot of these devices have their software origins in programming methods, like
    those devised in Python.


    ### Smart Homes


    Home automation is where your smart house manages the house''s resources for the
    occupant(s). These resources include lighting, fridge, air conditioning, security,
    media, and so on. In a lot of homes certain appliances such refrigerators can
    organize part of the grocery list, security systems can alert owners of perimeter
    breeches to their smartphones and can log workers in and out of the property.


    ### Elder and Disabled Care


    Smart homes are able to take care of the elderly or disabled, making it easier
    to monitor them. It also allows the person in need of care a little more independence
    and 24/7 help and monitoring.


    ### Healthcare Industry


    Smart Healthcare is a fast-emerging trend where computers, the Internet, and artificial
    intelligence are merging to improve our quality of life. The Internet of Health
    Things (IoHT) is a specific branch of the Internet of Things. IoHT is designed
    for health and medically related purposes and is what is driving the digitization
    of the healthcare system. The digitization of the healthcare system provides connectivity
    between properly equipped healthcare services and medical resources. IoHT also
    allows for the remote monitoring and in some cases operation of healthcare systems
    and notification systems.


    Combined with machine learning, the health care IoHT ecosphere can improve a person''s
    quality of life, guard against drug errors, encourage health and wellness, and
    respond to or even predict responses by emergency personnel.


    ### Transportation Industry


    The IoT assists various transportation systems in the integration of control,
    communications, and information processing. It can be applied throughout the entire
    transportation system — drivers, users, vehicles, and infrastructure. This integration
    allows for inter and even intra-vehicle communication, logistics and fleet management
    vehicle control, smart traffic control, electronic toll collection systems, smart
    parking, as well as safety and road assistance. By using various smart sensors,
    IoT applied to transportation can help companies that operate vehicle fleets avoid
    road accidents by assessing various anomalies in both the driver and vehicle.


    ### Building and Home Automation


    IoT devices can be used in any kind of building capable of monitoring and controlling
    the electrical, mechanical, and electronic systems within the building. Building
    and home automation are beneficial for better and more efficient management of
    energy, air control, and fire prevention.


    ### Manufacturing Industry


    Manufacturing equipment can be fitted with IoT devices for:


    - Sensing

    - Identification

    - Communication

    - Actuation monitoring

    - Processing

    - Networking


    IoT in manufacturing allows for the seamless integration between manufacturing
    and control systems. It has changed the face of manufacturing in that companies
    are now able to:


    - Manufacture new products a lot faster

    - Reduce human error

    - Increase productivity

    - Reduce waste


    The IoT can be applied to employ digital control systems for automating process
    controls, manage service information systems in the optimization of plant safety
    and security, as well as maintain and control operating tools.


    Machine learning, when integrated into these networked systems, allows asset management
    and surveillance to maximize reliability by employing predictive maintenance and
    statistical evaluation. Machine learning allows IoT to maximize reliability through
    asset management using predictive maintenance, statistical evaluation, and measurements.


    The manufacturing industry has its own version of the Internet of Things, the
    industrial Internet of Things (IIoT). Since its inception, it has changed the
    face of the manufacturing industry and had a huge positive impact on the manufacturing
    industry’s bottom line.


    ### Agriculture


    The IoT has also proved useful in the agricultural industry, allowing farmers
    to collect useful data about humidity, wind speed and direction, temperature,
    soil composition, and pest infestations. The collection of this data when combined
    with machine learning algorithms allows farmers to automate farm techniques. These
    techniques include improving crop quality and quantity, minimizing risk, reducing
    crop maintenance, and minimizing waste. Farmers can monitor soil temperature and
    moisture, then use the data to determine more accurate times to water or fertilize
    fields.


    ### Energy Management


    There are not many electrical devices in today’s world that cannot attach to the
    Internet. Smart Houses already have energy management functions, but it will not
    be long before most electrical devices that connect to the Internet will be able
    to communicate with a power source. This will allow for the power source and device
    to balance energy.'
  mdcn: '## 第十章：机器学习与云计算


    云计算是一项复杂且有时成本高昂的工程。它涉及将数百甚至数千台计算机服务器集成到大型数据中心中，这些数据中心可以位于世界任何地方。云计算系统的一个例子是亚马逊网络服务（AWS），其数据中心可容纳多达80,000台服务器。这些“裸机”构成了云服务的支柱。服务器运行着称为虚拟机管理程序（hypervisor）的虚拟机管理器。虚拟机管理程序可以是软件或硬件。


    云计算的优势在于订阅云计算服务的消费者。像亚马逊这样提供云计算服务的公司吸收了这些大型数据中心的成本，因此其客户无需承担这些费用。消费者可以受益于一个虚拟网络环境，他们可以从世界任何地方访问该环境，而不仅限于办公室。


    云计算在机器学习中发挥着宝贵的作用，因为它可以削减设备的高昂成本。机器学习过程本身就是一个昂贵的过程，考虑到运行它所需的设备，成本会更高。即使是年营业额达数十亿美元的大型公司，也难以跟上机器学习对其系统提出的需求。对于学院或大学等机构来说，这可能更加令人生畏。云计算及其对系统资源的动态管理可以大幅降低机器学习的成本。


    使用云计算来实施机器学习的公司也不需要一个能够创建和管理AI基础设施的IT部门。这些都由提供云服务的公司负责处理。


    正如基于云的服务提供SaaS（软件即服务）解决方案一样，机器学习云服务也提供SDK（软件开发工具包）和API（应用程序编程接口），以便将机器学习功能嵌入到应用程序中。这些连接支持大多数编程语言。这使得开发者能够直接在其应用程序中利用机器学习过程的力量，而这正是价值所在。


    ## 基于云的机器学习的优势


    基于云的机器学习项目使公司或组织在模型的实验和训练阶段能够轻松使用有限水平的资源。它提供动态的系统扩展，可以根据需要增加或减少处理能力或存储容量。尽管许多机器学习编程资源是开源的，但处理和存储的规模在成本方面可能成为限制因素。基于云的机器学习系统使系统资源对企业和个人都更易获得且更具成本效益。


    亚马逊AWS、谷歌云平台和微软Azure提供许多机器学习服务，这些服务不需要了解人工智能、机器学习理论，甚至不需要数据科学团队。每个平台都有其各自的优势，选择哪一个完全取决于你的机器学习需求。


    ## 第十一章：机器学习与物联网（IoT）


    20世纪80年代初，卡内基梅隆大学的一台可乐机是物联网的早期示例之一。通过互联网访问这台可乐机，可以确定机器中是否有存货以及饮料的温度。


    自20世纪80年代初以来，物联网（IoT）已经发生了巨大演变，现在包括智能手机、用于安全设备的无线传感器、GPS系统等设备。物联网是一个适用于任何连接到互联网或通过互联网连接的设备的术语。这些设备可以是从小型喷气发动机到工厂中的机械臂或恒温器中的传感器。


    ## 物联网的用途


    物联网可以被归类为任何具有开关且通过互联网工作或可以与互联网协同工作的设备。在当今快节奏且不断发展的高科技世界中，物联网在任何拥有互联网或连接到互联网的人的生活中都扮演着重要角色。


    物联网的用途包括：


    ### 消费者应用


    为消费者使用而创建的物联网设备范围从智能手机到联网车辆、健康监测设备和机器订购设备。其中许多设备的软件起源于编程方法，例如在Python中设计的方法。


    ### 智能家居


    家庭自动化是指你的智能房屋为居住者管理房屋资源。这些资源包括照明、冰箱、空调、安防、媒体等。在许多家庭中，某些电器（如冰箱）可以组织部分购物清单，安防系统可以在周边发生入侵时向业主的智能手机发出警报，并可以记录工作人员进出房产的情况。


    ### 老年人和残疾人护理


    智能家居能够照顾老年人或残疾人，使监测他们变得更容易。它也为需要护理的人提供了一点独立性，以及全天候的帮助和监测。


    ### 医疗保健行业


    智能医疗保健是一个快速兴起的趋势，计算机、互联网和人工智能正在融合以提高我们的生活质量。健康物联网（IoHT）是物联网的一个特定分支。IoHT专为健康和医疗相关目的而设计，是推动医疗保健系统数字化的动力。医疗保健系统的数字化提供了配备适当的医疗服务与医疗资源之间的连接。IoHT还允许远程监测，在某些情况下甚至可以操作医疗保健系统和通知系统。


    结合机器学习，医疗保健IoHT生态系统可以提高个人的生活质量，防止用药错误，促进健康和福祉，并响应甚至预测急救人员的反应。


    ### 交通运输行业


    物联网协助各种交通系统整合控制、通信和信息处理。它可以应用于整个交通系统——驾驶员、用户、车辆和基础设施。这种整合允许车辆之间甚至车辆内部的通信、物流和车队管理、车辆控制、智能交通控制、电子收费系统、智能停车以及安全和道路援助。通过使用各种智能传感器，应用于交通的物联网可以帮助运营车队的公司通过评估驾驶员和车辆的各种异常情况来避免道路事故。


    ### 建筑和家庭自动化


    物联网设备可用于任何能够监测和控制建筑物内电气、机械和电子系统的建筑。建筑和家庭自动化有助于更好、更高效地管理能源、空气控制和防火。


    ### 制造业


    制造设备可以安装物联网设备，用于：


    -   感知

    -   识别

    -   通信

    -   执行监控

    -   处理

    -   网络


    制造业中的物联网允许制造和控制系统之间的无缝集成。它改变了制造业的面貌，使公司现在能够：


    -   更快地制造新产品

    -   减少人为错误

    -   提高生产力

    -   减少浪费


    物联网可以应用于采用数字控制系统来自动化过程控制，管理服务信息系统以优化工厂的安全和安保，以及维护和控制操作工具。


    机器学习集成到这些网络系统中后，可以通过采用预测性维护和统计评估，使资产管理和监控最大化可靠性。机器学习允许物联网通过使用预测性维护、统计评估和测量进行资产管理来最大化可靠性。


    制造业有自己的物联网版本，即工业物联网（IIoT）。自诞生以来，它改变了制造业的面貌，并对制造业的利润产生了巨大的积极影响。


    ### 农业


    物联网在农业行业也被证明是有用的，允许农民收集有关湿度、风速和风向、温度、土壤成分和害虫侵扰的有用数据。收集这些数据并与机器学习算法相结合，使农民能够自动化农场技术。这些技术包括提高作物质量和数量、最小化风险、减少作物维护以及最小化浪费。农民可以监测土壤温度和湿度，然后利用这些数据确定更准确的灌溉或施肥时间。


    ### 能源管理


    当今世界没有多少电气设备不能连接到互联网。智能家居已经具有能源管理功能，但不久之后，大多数连接到互联网的电气设备将能够与电源进行通信。这将允许电源和设备平衡能源。'

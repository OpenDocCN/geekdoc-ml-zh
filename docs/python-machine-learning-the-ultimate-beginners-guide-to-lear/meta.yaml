    **In 1951,** the first artificial neural network, called SNARC (Stochastic Neural
    Analog Reinforcement Calculator), was created by Marvin Minsky and Dean Edmonds.


    **In 1952,** IBM’s Poughkeepsie Laboratory was where Arthur Samuel began working
    on some of the first machine learning programs. As a pioneer in the fields of
    artificial intelligence and computer gaming, Samuel developed a system that could
    play checkers. The program was one of a kind and one of the first programs that
    improved on its game by being able to learn. In 1959, Arthur Samuel came up with
    the term “machine learning” for systems that could learn and improve themselves
    with little to no human intervention.


    **In 1958,** Frank Rosenblatt designed “Perceptron,” which was the first artificial
    neural network with its primary function to recognize shapes and patterns.


    **In 1959,** Bernard Widrow and Marcian Hoff created ADELINE, a neural network
    that could recognize binary patterns and predict what the next bit would be in
    a stream of bits. MADELINE was the next generation neural network to follow ADELINE.
    Both these models were developed at Stanford University. Although MADELINE’s technology
    proved to be extremely useful, as it was able to detect and get rid of phone line
    echo, it didn’t take off until the 1970s. This was due to the more popular Von
    Neumann architecture which proved a lot simpler to use and understand than complex
    neural networks. Ever since it took off in the late 1970s, MADELINE neural network
    technology has been used even into modern days.


    **In 1982,** neural networks once again had the world''s attention when Japan
    started to focus on advanced neural networks. America, not to be left behind,
    also allocated funding to the research of advanced neural networks. It was in
    the same year that John Hopfield put forward his suggestion of creating a network
    that mimicked, as best it could, the working of neurons. This network would work
    with bidirectional lines much the same as neurons do.


    **In 1986,** Widrow and Hoff’s neural network model was expanded on by researchers
    at Stanford University. The researchers extended the algorithm used by Widrow
    and Hoff in order to create “slow learners” by allowing for neural networks to
    use multiple layers. These “slow learners” would allow for the system to learn
    well into the future.


    **In 1997,** after almost a decade of not much advancement in the field of machine
    learning, a computer called Deep Blue defeated the world chess champion of the
    time. Deep Blue was an IBM computer that initially started as a computer called
    ChipTest. ChipTest was invented by Feng Hsiung Hsu and a classmate of his, Murray
    Campbell. After the two students were hired by IBM in 1989, they continued their
    work on ChipTest but renamed it Deep Blue. The 1997 chess match against reigning
    champion Garry Kasparov lasted for 7 days and consisted of a six-game match. The
    match drew a lot of attention to the new computer system and machine learning.


    **The 21st century** has seen many advances in machine learning, as business has

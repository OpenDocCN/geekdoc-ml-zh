    # Chapter 10:

    Machine Learning and the Cloud


    ![](img/989db6cb032c6b8914db5e5a7c2b4a41_61_0.png)


    Cloud computing is a complex, and at times expensive, undertaking. It involves
    the integration of hundreds or even thousands of computer servers stored in large
    data centers that can be housed anywhere in the world. An example of a cloud computing
    system is Amazon Web Services (AWS) which has a data center that can host as many
    as 80,000 servers. This “raw iron” serves as the backbone of the cloud service.
    The servers operate virtual machine managers called hypervisors. Hypervisors can
    be either software or hardware.


    The advantage of cloud computing goes to the consumer subscribing to the supplier
    of the cloud computing services. Companies like Amazon who offer cloud computing
    services absorb the costs of these large data centers so their customers don’t
    have to. The consumer gets to reap the benefit of a virtual networking environment
    that they can access from anywhere in the world instead of being limited to an
    office.


    Cloud computing plays a valuable role in machine learning in that it can cut out
    the exorbitant costs of equipment. Th machine learning process is an expensive
    process and gets even more so when you consider the equipment required to run
    it. Large corporations that have billion dollar yearly turnover struggle to keep
    up with the system demands ML can put on them. For institutes such as colleges
    or universities, this can be even more daunting. Cloud computing and its on the
    fly management of systems resources can drastically cut the cost of machine learning.


    Companies using cloud computing to implement machine learning do not need an IT
    department capable of creating and managing the AI infrastructure either. This
    is taken care of by the companies offering the cloud services.


    Just as cloud-based services offer SaaS (software as a service) solutions, machine
    learning cloud services offer SDKs (software developer kits) and APIs (application
    programming interfaces) to embed machine learning functions into applications.
    These connections offer support for most programming languages. This allows for
    developers to harness the power of machine learning processes directly in their
    applications, which is where the most value lies.


    # Benefits of Cloud-Based Machine Learning


    Cloud-based machine learning projects make it easy for a company or organization
    to use limited levels of resources during experimentation and training of the
    model. It provides on the fly systems scaling that can increase or decrease processing
    power or storage capacity as and when needed. Although a lot of ML programming
    resources are open source, the scale of the processing and storage can be limiting
    cost-wise. Cloud-based machine learning systems make systems resources more obtainable
    and cost effective for both business and individuals.


    Amazon AWS, Google Cloud Platform, and Microsoft Azure have many machine learning
    services that do not require knowledge of Artificial Intelligence, theories of
    machine learning, or even a data science team. Each of these platforms offer their
    own benefits, and which one you chose depends entirely on what your ML needs are.'

    From here, our goal is to take the Anaconda program and get it to work on creating
    the virtual environment that we want so that the package from TensorFlow is going
    to work properly. The conda command is going to come into play here again to make
    this happen. Since we are going through the steps that are needed to create a
    brand new environment now, we will need to name it tensorenviron, and then the
    rest of the syntax to help us get this new environment created includes:


    ```

    conda create -n tensorenviron

    ```


    After you type this code into the compiler, the program is going to stop and ask
    you whether you want to create the new environment, or if you would rather cancel

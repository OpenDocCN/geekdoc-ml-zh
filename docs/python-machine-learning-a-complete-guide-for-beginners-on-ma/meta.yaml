    \ 语句。该语句的工作方式与我们一直使用的 `import` 语句相同。我们不是使用模块名称来获取其属性，而是可以直接通过属性名称访问它们。例如：\n\n\
    ```\n>>> from MyModule import Myfct\n>>> Myfct(2)\n2 by 2 is: 4\n```\n\n该语句创建了函数名称的副本，而无需使用模块名称。`from\
    \ import` 语句还有另一种形式，使用 `*`。该语句允许复制模块中分配给对象的所有名称。例如：\n\n```\n>>> from MyModule\
    \ import *\n>>> Myfct(2)\n2 by 2 is: 4\n```\n\n因为模块名称变成了变量（即对象的引用），Python 支持使用别名导入模块。然后我们可以使用别名而不是其名称来访问其属性。例如，我们可以为模块指定一个别名，如下所示：\n\
    \n```\n>>> import Mymodule as md\n>>> md.Myfct(2)\n2 by 2 is: 4\n```\n\n除函数外的数据对象也以相同的方式通过属性语法访问。例如，我们可以在模块中定义和初始化数据对象，然后在程序中使用它们。让我们考虑以下代码来创建一个名为\
    \ `ExModule.py` 的模块。\n\n```\nA = 9\nName = 'John'\n```\n\n在这个例子中，我们初始化了变量 `A`\
    \ 和 `Name`。\n现在，导入模块后，我们可以获取这两个变量，如下所示：\n\n```\n>>> import ExModule\n>>> print('A\
    \ is: ', ExModule.A)\nA is: 9\n>>> print('Name is: ', ExModule.Name)\nName is:\

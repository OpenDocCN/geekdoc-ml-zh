    \ 允许更改可共享的对象。例如，让我们考虑以下代码来定义名为 `ExModul1.py` 的模块：\n\n```\nA = 9\nMyList = [90,\
    \ 40, 80]\n```\n\n现在，让我们导入这个模块并尝试更改属性的值"

    \ if two students in a class have over 45 score mark.\n\n```python\n>>> score_1\
    \ = 46\n>>> score_2 = 30\n>>> score_1 >= 45 or score_2 >= 45\nTrue\n>>> score_1\
    \ = 30\n>>> score_1 >= 45 or score_2 >= 45\nFalse\n```\n\nWe began by declaring\
    \ two variables score_1 and score_2 and assign values to them. In the third line,\
    \ we test the OR condition using the two variables. The test in that line satisfies\
    \ the condition because one of the expressions is true. Then, it changed the value\
    \ of the variable score to 30; however, it fails both conditions and therefore\
    \ evaluates false.\n\nBesides using the “And” and “OR” conditional statements\
    \ to check multiple conditions, we can also test the availability of a value in\

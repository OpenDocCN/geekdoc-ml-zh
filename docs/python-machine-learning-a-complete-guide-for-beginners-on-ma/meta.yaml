  md: 'choose the algorithm that it can be used to process the data set and decide
    the output with high accuracy. It does this, by using the training data set which
    consists of historical data and output.


    Therefore, in the classical world, we will tell the machine to process data based
    on a set of instructions, while in the Machine Learning setup, we will never instruct
    a system. The computer will have to interact with the data set, develop an algorithm

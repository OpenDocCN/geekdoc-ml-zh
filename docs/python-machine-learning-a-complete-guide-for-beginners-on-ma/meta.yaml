    # How to Import a Module


    We have talked about importing a module without really explaining what happens
    behind in Python. The Imports are a very fundamental concept in Python programming
    structure. In this section, we are going to cover in-depth how really Python imports
    modules within a program. Python follows three steps to import a file or a module
    within the work environment of a program. The first step consists of finding the
    file that contains the module. The second step consists of compiling the module
    to a byte-code if required. Finally, the third step runs the code within the module
    file to build the objects that are defined. These three steps are run only when
    the module is imported for the first time during the execution of a program. This
    module and all its objects are loaded in the memory. When the module is imported
    further in the program, it skips all three steps and just fetch the objects defined
    by the module and are saved in memory.



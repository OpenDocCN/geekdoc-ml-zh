    Models of Machine Learning train the machines to learn from all the available
    data and offer different services like prediction or classification that in turn
    have multiple real-life applications like self-driving cars, the ability of smartphones
    to recognize the user’s face or how Google Home or Alexa can recognize your accent
    and voice and how the accuracy of the machines improves if they have been learning
    for longer.


    # Advantages and Disadvantages of Machine Learning


    # Disadvantages


    In Machine Learning, we always train the model and then validate that model on
    a small data set. We then use that model to predict the output for some unseen
    or new data. You will find it difficult to identify if there was a bias in the
    model that you have created. If you cannot identify the bias, your inferences
    will be incorrect.


    Some social scientists will begin to rely only on Machine Learning. It is important
    to remember that improvements should be made to some'
  - '[PAGE 13]


    unsupervised Machine Learning tasks.


    # Some of the advantages


    Human beings cannot process large volumes of data, let alone analyze that data.
    There is a lot of real-time data that is being produced, and if there is no automatic
    system to understand and analyze that data, we cannot reach any conclusion.


    Machine Learning is getting better. With the advent of deep learning systems,
    the costs of data engineering and pre-processing of data are reducing.'
  - '[PAGE 14]


    # Machine Learning – Concepts & Terms


    Machine Learning is done by feeding the machine with relevant training data sets.
    Ordinary systems, that is, systems without any artificial intelligence, can always
    provide an output based on the input that is provided to the system. A system
    with artificial intelligence, however, can learn, predict, and improve the results
    it provides through training.


    Let us look at a simple example of how children learn to identify objects, or
    in other words, how a child will associate a word with an object. Let us assume
    that there is a bowl of apples and oranges on the table. You, as an adult or parent,
    will introduce the round and red object as an apple, and the other object as an
    orange. In this example, the words apple and orange are labels, and the shapes
    and colors are attributes. You can also train a machine using a set of labels
    and attributes. The machine will learn to identify the object based on the attributes
    that are provided to it as input.


    The models that are based on labeled training data sets are termed as supervised
    Machine Learning models. When children go to school, their teachers and professors
    give them some feedback about their progress. In the same way, a supervised Machine
    Learning model allows the engineer to provide some feedback to the machine.


    Let us take an example of an input [red, round]. Here, both the child and the
    machine will understand that any object which is round and red is an apple. Let
    us now place a cricket ball in front of either the machine or the child. You can
    feed the machine with the response negative 1 or 0 depending on whether the prediction
    is wrong or right. You can always add more attributes if necessary. This is the
    only way that a machine will learn. It is also for this reason that if you use
    a large-high-quality data set and spend more time training the machine, the machine
    will give you better and more accurate results.


    Before we proceed further, you must understand the difference between the concepts
    of Machine Learning, artificial intelligence, and deep learning. Most people use
    these concepts interchangeably, but it is important to know that they are not
    the same.


    *Machine Learning, Artificial Intelligence and Deep Learning:*

    *The diagram below will give you an idea of how these terms relate.*'
- md: '## Objectives of Machine Learning


    The system of Machine Learning usually has one of the following objectives.


    - Predict a category

    - Predict a quantity

    - Anomaly Detector Systems

    - Clustering Systems


    ## Predict a category


    The model of Machine Learning helps analyze the input data and then predicts a
    category under which the output will fall. The prediction in such cases is usually
    a binary answer that’s based on “yes” or “no.” For instance, it helps with answers
    like, “will it rain today or not?” “Is this a fruit?” “Is this mail spam or not?”
    And so on. This is attained by referencing a group of data that will indicate
    whether a certain email falls under the category of spam or not based on specific
    keywords. This process is known as classification.


    ## Predict a quantity


    This system is usually used to predict a value like predicting the rainfall according
    to different attributes of the weather like the temperature, percentage of humidity,
    air pressure and so on. This sort of prediction is referred to as regression.
    The regression algorithm has various subdivisions like linear regression, multiple
    regression, etc.


    ## Anomaly Detector Systems


    The purpose of a model in anomaly detection is to detect any outliers in the given
    set of data. These applications are used in banking and e-commerce systems wherein
    the system is built to flag any unusual transactions. All this helps to detect
    fraudulent transactions.


    ## Clustering Systems


    These forms of systems are still in the initial stages, but their applications
    are numerous and can drastically change the way business is conducted. In this
    system, the user is classified into different clusters according to various behavioral
    factors like their age group, the region they live in or even the kind of programs
    they like to view. According to this clustering, the business can now suggest
    different programs or shows a user might be interested in watching according to
    the cluster that the said user belongs to during classification.


    ## Categories of Machine Learning Systems


    In the case of traditional machines, the programmer will give the machine a set
    of instructions and the input parameters, which the machine will use to compute
    make some calculations and derive an output using specific commands. In the case
    of Machine Learning systems, however, the system is never restricted by any command
    that the engineer provides, the machine will choose the algorithm that it can
    be used to process the data set and decide the output with high accuracy. It does
    this, by using the training data set which consists of historical data and output.


    Therefore, in the classical world, we will tell the machine to process data based
    on a set of instructions, while in the Machine Learning setup, we will never instruct
    a system. The computer will have to interact with the data set, develop an algorithm
    using the historical data set, make decisions like a human being would, analyze
    the information and then provide an output. The machine, unlike a human being,
    can process large data sets in short periods and provide results with high accuracy.


    There are different types of Machine Learning algorithms, and they are classified
    based on the purpose of that algorithm. There are three categories in Machine
    Learning systems:


    1. Supervised Learning

    2. Unsupervised Learning

    3. Reinforced Learning


    ## Supervised Learning


    In this model, the engineers feed the machine with labeled data. In other words,
    the engineer will determine what the output of the system or specific data sets
    should be. This type of algorithm is also called a predictive algorithm.


    For example, consider the following table:


    | Currency (label) | Weight (Feature) |

    | :--- | :--- |

    | 1 USD | 10 gm |

    | 1 EUR | 5 gm |

    | 1 INR | 3 gm |

    | 1 RU | 7 gm |


    In the above table, each currency is given an attribute of weight. Here, the currency
    is the label, and the weight is the attribute or feature.


    The supervised Machine Learning system with first we fed with this training data
    set, and when it comes across any input of 3 grams, it will predict that the coin
    is a 1 INR coin. The same can be said for a 10-gram coin.


    Classification and regression algorithms are a type of supervised Machine Learning
    algorithms. Regression algorithms are used to predict match scores or house prices,
    while classification algorithms identify which category the data should belong
    to.


    We will discuss some of these algorithms in detail in the later parts of the book,
    where you will also learn how to build or implement these algorithms using Python.


    ## Unsupervised Learning


    In this type of model, the system is more sophisticated in the sense that it will
    learn to identify patterns in unlabeled data and produce an output. This is a
    kind of algorithm that is used to draw any meaningful inference from large data
    sets. This model is also called the descriptive model since it uses data and summarizes
    that data to generate a description of the data sets. This model is often used
    in data mining applications that involve large volumes of unstructured input data.


    For instance, if a system is Python input of name, runs and wickets, the system
    will visualize that data on a graph and identify the clusters. There will be two
    clusters generated - one cluster is for the batsman while the other is for the
    bowlers. When any new input is fed, the person will certainly fall into one of
    these clusters, which will help the machine predict whether the player is a batsman
    or a bowler.


    | Name | Runs | Wickets |

    |---|---|---|

    | Rachel | 100 | 3 |

    | John | 10 | 50 |

    | Paul | 60 | 10 |

    | Sam | 250 | 6 |

    | Alex | 90 | 60 |


    Sample data set for a match. Based on this, the cluster model can group the players
    into batsmen or bowlers.


    Some common algorithms which fall under unsupervised Machine Learning include
    density estimation, clustering, data reduction and compressing.


    The clustering algorithm summarizes the data and presents it differently. This
    is a technique used in data mining applications. Density estimation is used when
    the objective is to visualize any large data set and create a meaningful summary.
    This will bring us the concept of data reduction and dimensionality. These concepts
    explain that the analysis or output should always deliver the summary of the data
    set without the loss of any valuable information. In simple words, these concepts
    say that the complexity of data can be reduced if the derived output is useful.


    ## Reinforced learning


    This type of learning is similar to how human beings learn, in the sense that
    the system will learn to behave in a specific environment, and take actions based
    on that environment. For example, human beings do not touch fire because they
    know it will hurt and they have been told that will hurt. Sometimes, out of curiosity,
    we may put a finger into the fire, and learn that it will burn. This means that
    we will be careful with fire in the future.


    The table below will summarize and give an overview of the differences between
    supervised and unsupervised Machine Learning. This will also list the popular
    algorithms that are used in each of these models.


    | Supervised Learning | Unsupervised Learning |

    |---|---|

    | Works with labeled data | Works with unlabeled data |

    | Takes Direct feedback | No feedback loop |

    | Predicts output based on input data. Therefore also called “Predictive Algorithm”
    | Finds the hidden structure/pattern from input data. Sometimes called as “Descriptive
    Model” |

    | Some common classes of supervised algorithms include: Logistic Regression Linear
    Regression (Numeric prediction) Polynomial Regression Regression trees (Numeric
    | Some common classes of unsupervised algorithms include: Clustering, Compressing,
    density estimation & data reduction K-means Clustering (Clustering) Association
    Rules (Pattern Detection) |'
  mdcn: '## 机器学习的目标


    机器学习系统通常具有以下目标之一。


    - 预测类别

    - 预测数量

    - 异常检测系统

    - 聚类系统


    ## 预测类别


    机器学习模型帮助分析输入数据，然后预测输出所属的类别。在这种情况下，预测通常是一个基于“是”或“否”的二元答案。例如，它有助于回答诸如“今天会下雨吗？”“这是水果吗？”“这封邮件是垃圾邮件吗？”等问题。这是通过参考一组数据来实现的，该数据将根据特定关键词指示某封电子邮件是否属于垃圾邮件类别。这个过程被称为分类。


    ## 预测数量


    这个系统通常用于预测一个值，例如根据天气的不同属性（如温度、湿度百分比、气压等）预测降雨量。这种预测被称为回归。回归算法有多种细分，如线性回归、多元回归等。


    ## 异常检测系统


    异常检测中模型的目的是检测给定数据集中的任何异常值。这些应用用于银行和电子商务系统，其中系统被构建用于标记任何异常交易。所有这些都有助于检测欺诈性交易。


    ## 聚类系统


    这类系统仍处于初始阶段，但其应用广泛，并可能极大地改变业务开展方式。在此系统中，用户根据各种行为因素（如年龄组、居住地区甚至喜欢观看的节目类型）被分类到不同的集群中。根据这种聚类，企业现在可以根据用户在分类时所属的集群，向用户推荐其可能感兴趣的节目或演出。


    ## 机器学习系统的类别


    对于传统机器，程序员会给机器一组指令和输入参数，机器将使用这些参数进行计算，并使用特定命令得出输出。然而，在机器学习系统的情况下，系统从不受工程师提供的任何命令限制，机器将选择可用于处理数据集并以高精度决定输出的算法。它通过使用由历史数据和输出组成的训练数据集来实现这一点。


    因此，在经典世界中，我们会告诉机器根据一组指令处理数据，而在机器学习设置中，我们从不指示系统。计算机必须与数据集交互，使用历史数据集开发算法，像人类一样做出决策，分析信息，然后提供输出。与人类不同，机器可以在短时间内处理大型数据集并提供高精度的结果。


    机器学习算法有不同的类型，它们根据算法的目的进行分类。机器学习系统有三个类别：


    1. 监督学习

    2. 无监督学习

    3. 强化学习


    ## 监督学习


    在这个模型中，工程师向机器提供带标签的数据。换句话说，工程师将确定系统或特定数据集的输出应该是什么。这种类型的算法也称为预测算法。


    例如，考虑以下表格：


    | 货币（标签） | 重量（特征） |

    | :--- | :--- |

    | 1 USD | 10 gm |

    | 1 EUR | 5 gm |

    | 1 INR | 3 gm |

    | 1 RU | 7 gm |


    在上表中，每种货币都被赋予了重量属性。这里，货币是标签，重量是属性或特征。


    监督机器学习系统首先将使用此训练数据集进行训练，当遇到任何3克的输入时，它将预测该硬币是1 INR硬币。对于10克的硬币也可以这样说。


    分类和回归算法是监督机器学习算法的一种类型。回归算法用于预测比赛分数或房价，而分类算法则识别数据应属于哪个类别。


    我们将在本书的后续部分详细讨论其中一些算法，届时您还将学习如何使用Python构建或实现这些算法。


    ## 无监督学习


    在这种类型的模型中，系统更为复杂，因为它将学习识别未标记数据中的模式并产生输出。这是一种用于从大型数据集中得出任何有意义推断的算法。该模型也称为描述性模型，因为它使用数据并总结该数据以生成数据集的描述。该模型通常用于涉及大量非结构化输入数据的数据挖掘应用中。


    例如，如果系统输入姓名、跑分和三柱门的数据，系统将在图表上可视化这些数据并识别集群。将生成两个集群——一个集群用于击球手，另一个用于投球手。当输入任何新数据时，该人肯定会落入其中一个集群，这将帮助机器预测该球员是击球手还是投球手。


    | 姓名 | 跑分 | 三柱门 |

    |---|---|---|

    | Rachel | 100 | 3 |

    | John | 10 | 50 |

    | Paul | 60 | 10 |

    | Sam | 250 | 6 |

    | Alex | 90 | 60 |


    比赛的示例数据集。基于此，聚类模型可以将球员分为击球手或投球手。


    一些属于无监督机器学习的常见算法包括密度估计、聚类、数据缩减和压缩。


    聚类算法总结数据并以不同的方式呈现。这是数据挖掘应用中使用的一种技术。当目标是可视化任何大型数据集并创建有意义的摘要时，会使用密度估计。这将引出数据缩减和维度的概念。这些概念解释说，分析或输出应始终提供数据集的摘要，而不丢失任何有价值的信息。简单来说，这些概念表明，如果派生输出有用，数据的复杂性可以降低。


    ## 强化学习


    这种类型的学习类似于人类的学习方式，即系统将学习在特定环境中表现，并根据该环境采取行动。例如，人类不碰火，因为他们知道这会受伤，并且他们被告知这会受伤。有时，出于好奇，我们可能会把手指伸进火里，然后知道这会烫伤。这意味着我们以后会小心火。


    下表将总结并概述监督和无监督机器学习之间的区别。它还将列出每种模型中使用的流行算法。


    | 监督学习 | 无监督学习 |

    |---|---|

    | 处理带标签的数据 | 处理未标记的数据 |

    | 接受直接反馈 | 无反馈循环 |

    | 根据输入数据预测输出。因此也称为“预测算法” | 从输入数据中发现隐藏的结构/模式。有时称为“描述性模型” |

    | 一些常见的监督算法类别包括：逻辑回归、线性回归（数值预测）、多项式回归、回归树（数值） | 一些常见的无监督算法类别包括：聚类、压缩、密度估计和数据缩减、K均值聚类（聚类）、关联规则（模式检测）
    |'

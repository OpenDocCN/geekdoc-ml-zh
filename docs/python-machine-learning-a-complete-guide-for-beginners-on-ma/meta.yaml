    of functions and/or object classes that are made available to be used within different
    programs. We used the notion of modules earlier in this chapter to use some function
    from the math library. In this chapter, we are going to cover in-depth on how
    to develop and define modules. To use modules in a Python program, the following
    statements are used: import, from, reload. The first one imports the whole module.
    The second allows import only a specific name or element from the module. The
    third one, reload, allows reloading a code of a module while Python is running
    and without stopping in it. Before digging into their definition and development,
    let’s start first by the utility of modules or packages within Python.


    # Modules Concept and Utility Within Python


    Modules are a very simple way to make a system component organized. Modules allow
    reusing the same code over and over. So far, we were working in a Python interactive
    session. Every code we have written and tested is lost once we exit the interactive
    session. Modules are saved in files that make them persistent, reusable, and sharable.
    You can consider modules as a set of files where you can define functions, names,
    data objects, attributes, and so on. Modules are a tool to group several components
    of a system in a single place. In Python programming, modules are among the highest-level
    unit. They point to the name of packages and tools. Besides, they allow the sharing
    of the implemented data. You only need one copy of the module to be able to use
    across a large program. If an object is to be used in different functions and
    programs, coding it as a module allows share it with other programmers. To have
    a sense of the architecture of Python coding, we go through some general structure
    explanation. We have been using so far in this book very simple code examples
    that do not have a high-level structure. In large applications, a program is a
    set of several Python files. By Python files, we mean files that contain Python
    code and have a .py extension. There is one main high-level program and the other
    files are the modules. The high-level file consists of the main code that dictates
    the control flow and executes the application. Module files define the tools that
    are needed to process elements and components of the main program and maybe elsewhere.
    The main program makes use of the tools that are specified in the modules.'

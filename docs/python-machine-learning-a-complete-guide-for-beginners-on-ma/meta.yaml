    \ both conditions will evaluate to true.\n\nTo make the code more readable, we\
    \ can use parentheses in each test. However, it is not compulsory to do such but\
    \ makes it simpler. Let us use parentheses to demonstrate the difference between\
    \ the previous code and the one below.\n\n```python\n(score_1 >= 45) and (score_2\
    \ >= 45)\n```\n\n## Using “OR”\n\nThe “OR” keyword allows you to check multiple\
    \ conditions as the “AND” keyword. However, the difference here is that the “OR”\

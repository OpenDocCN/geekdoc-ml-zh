    >>> print('B is: ', B)\nB is: 9\n```\n\n如果我们使用 `from import` 语句导入属性，属性的名称将成为脚本中的变量。例如：\n\
    \n```\n>>> from ExModule import A, Name\n>>> print('A is: ', A, 'and Name is:\

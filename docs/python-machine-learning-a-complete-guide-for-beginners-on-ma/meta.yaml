    \ will be easier for you to understand if statements. There are various types\
    \ of if statements to use in Python, depending on your choice. In this section,\
    \ you will learn the different if statements possible and the best situation to\
    \ apply them, respectively.\n\n## Simple If Statements\n\nIn any programming language,\
    \ the “if statement” is the simplest to come across. It only requires a test or\
    \ condition with a single action following it, respectively. The syntax for this\
    \ statement is as follows:\n\n```python\nif condition:\n    perform action\n```\n\
    \nThe first line can contain any conditional statement with the second following\
    \ the action to take. Ensure to indent the second line for clarity purposes. If\
    \ the conditional statement is true, then the code under the condition is executed.\
    \ However, if it is false, the code is ignored.\n\nFor instance, we have set a\
    \ standard that the minimum score for a person to qualify for a football match\
    \ is 20. We want to test if such a person is qualified to participate.\n\n```python\n\
    person = 21\nif person >= 20:\n    print(\"You are qualified for the football\

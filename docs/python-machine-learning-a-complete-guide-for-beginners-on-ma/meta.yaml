    deep learning has emerged from these types of neural networks.


    Recurrent neural networks are another category that uses a different type of nodes.
    Like a feedforward neural network, each hidden layer processes the information
    to the next layer. However, outputs of the hidden layers are saved and processed
    back to the previous layer. The first layer, comprised of the input layer, is

    file to build the objects that are defined. These three steps are run only when
    the module is imported for the first time during the execution of a program. This
    module and all its objects are loaded in the memory. When the module is imported
    further in the program, it skips all three steps and just fetch the objects defined
    by the module and are saved in memory.



- img_proc: true
  md: '# Artificial Neural Networks


    This chapter discusses the integral aspect of artificial neural networks. It also
    covers their component in particular activation functions and how to train an
    artificial neural network, as well as the different advantages of using an artificial
    neural network.


    # Definition of artificial neural network


    The employment of artificial neural networks is a widely used approach in Machine
    Learning. It is inspired by the brain system of humans. The objective of neural
    networks is to replicate how the human brain learns. The neural network system
    is an ensemble of input and output layers and a hidden layer that transforms the
    input layer into useful information to the output layer. Usually, several hidden
    layers are implemented in an artificial neural network. The figure below presents
    an example of a neural network system composed of 2 hidden layers:


    ![](img/4b9e3e90c99abe539b0396e58850eb2e_77_0.png)


    Example of an artificial neural network


    Before going further and explaining how neural networks work, let’s first define
    what a neuron is. A neuron is simply a mathematical equation expressed as the
    sum of the weighted inputs. Let’s consider $X = \{x_1, x_2, ..., x_M\}$ a vector
    of M inputs, the neuron is a linear combination of all inputs defined as follows:

    $F(X = \{x_1, x_2, ..., x_M\}) = w_1x_1 + w_2x_2 + ... + w_Mx_M$,

    being $w_1, w_2, ..., w_M$ the weights assigned to each input. The function F
    can also be represented as:'
  merge: -1
  pgno: 77
- img_proc: true
  md: '# F(X) = WX


    Where W is a weight matrix and X a vector of data. The second formulation is very
    convenient when programming a neural network model. The weights are determined
    during the training procedure. Training an artificial neural network means finding
    the optimal weights W that provide the most accurate output.


    To each neuron, an activation function is applied the resulted weighted sum of
    inputs X. The role of the activation function is deciding whether the neuron should
    be activated or not according to the model’s prediction. This process is applied
    to each layer of the network. In the next sub-sections, we will discuss in detail
    the role and types of activation functions as well as the different types of neural
    networks.


    # What is an activation function and its role in neural network models?


    Activation functions are formulated as mathematical functions. These functions
    are a crucial component of an artificial neural network model. For each neuron,
    an activation function is associated. The activation function decides whether
    to activate the neuron or not. For instance, let’s consider the output from a
    neuron, which is:


    ```

    Y = \sum weight \times input + bias

    ```


    The output Y can be of any value. The neuron does not have any information on
    the reasonable range of values that Y can take. For this purpose, the activation
    function is implemented in the neural network to check Y values and make a decision
    on whether the neural connections should consider this neuron activated or not.


    There are different types of activation functions. The most instinctive function
    is the step function. This function sets a threshold and decides to activate or
    not activate a neuron if it exceeds a certain threshold. In other words, the output
    of this function is 1 if Y is greater than a threshold and 0 otherwise. Formally,
    the activation function is:


    ```

    F = \begin{cases} 1, & \text{if Y > threshold} \ 0, & \text{otherwise} \end{cases}

    ```


    where 1 means ’activated’ and 0 means ’not-activated’.'
  merge: -1
  pgno: 78
- img_proc: true
  md: 'This activation function can be used for a classification problem where the
    output should be yes or no (i.e., 1 or 0). However, it has some drawbacks. For
    example, let’s consider a set of several categories (i.e., class1, class2, ...,
    etc.) to which input may belong to. If this activation function is used and more
    than one neuron is activated, the output will be 1 for all neurons. In this case,
    it is hard to distinguish between the classes and decide into which class the
    input belongs to because all neuron outputs are 1. In short, the step function
    does not support multiple output values and classification into several classes.


    Linear activation function, unlike the step function, provides a range of activation
    values. It computes an output that is proportional to the input. Formally:


    **F(X) = WX,**


    where X is the input.


    This function supports several outputs rather than just 1 or 0 values. This function,
    because it is linear, does not support backpropagation for model training. Backpropagation
    is the process that relies on function derivative or gradient to update the parameters,
    in particular, the weights. The derivative (i.e., gradient) of the linear activation
    function is a constant which is equal to W and is not related to changes in the
    input X. Therefore, it does not provide information on which weights applied to
    the input can give accurate predictions.


    Moreover, all layers can be reduced to one layer when using the linear function.
    The fact that all layers are using a linear function, the final layer is a linear
    function of the first layer. So, no matter how many layers are used in the neural
    network, they are equivalent to the first layer, and there is no point in using
    multiple layers. A neural network with multiple layers connected with a linear
    activation function is just a linear regression model that cannot support the
    complexity of input data.


    The majority of neural networks use non-linear activation functions because, in
    the majority of real-world applications, relations between the output and the
    input features are non-linear. The non-linear functions allow the neural network
    to map complex patterns between the inputs and the outputs. They also allow the
    neural network to learn the complex process that governs complex data or high
    dimension data such as images, audios, among others.'
  merge: -1
  pgno: 79
- img_proc: true
  md: 'The non-linear functions allow overcoming the drawbacks of linear functions
    and step functions. They support backpropagation (i.e., the derivative is not
    a constant and depends on the changes of the input) and stacking several layers
    (i.e., the combination of non-linear functions is non-linear). Several non-linear
    functions exist and can be used within a neural network. In this book, we are
    going to cover the most commonly used non-linear activation functions in Machine
    Learning applications.


    # The sigmoid function


    The sigmoid function is one of the most used activation functions within an artificial
    neural network. Formally, a sigmoid function is equal to the inverse of the sum
    of 1 and the exponential of inputs:


    F(X) = \frac{1}{1 + \exp(-X)}


    Outputs of a sigmoid function are bounded by 0 and 1. More precisely, the outputs
    take any value between 0 and 1 and provide clear predictions. In fact, when the
    X is greater than 2 or lower than -2, the value of Y is close to the edge of the
    curve (i.e., closer to 0 or 1).


    ![](img/4b9e3e90c99abe539b0396e58850eb2e_80_0.png)


    The disadvantage of this activation function, as we can see from the figure above,
    is the small change in the output for input values under -4 and above 4. This
    problem is called ‘vanishing gradient’ which means that the gradient is very small
    on horizontal extremes of the curve. This makes a neural network using the sigmoid
    function, learning very slowly when they approach the edges and computationally
    expensive.


    # The tanh function


    The tanh function is another activation function used that is similar to the'
  merge: -1
  pgno: 80
- img_proc: true
  md: 'sigmoid function. The mathematical formulation of this function is:


    $$F(X) = \tanh(X) = \frac{2}{1 + \exp(-2X)} - 1$$


    This function is a scaled sigmoid function. Therefore, it has the same characteristics
    as the sigmoid function. However, the outputs of this function range between -1
    and 1, and the gradient are more pronounced than the gradient of the sigmoid function.
    Unlike the sigmoid function, the tanh function is zero-centered, which makes it
    very useful for inputs with negative, neutral, and positive values. The drawback
    of this function, as for the sigmoid function, is the vanishing gradient issue
    and computationally expensive.


    # The ReLu function


    The Rectified Linear Unit function or what is known as ReLu function, is also
    a widely used activation function, which is computationally efficient. This function
    is efficient and allows the neural network to converge quickly compared to the
    sigmoid and tanh function because it uses simple mathematical formulations. ReLu
    returns X as output if X is positive or 0 otherwise. Formally, this activation
    function is formulated as


    $$F(X) = \max(0, X)$$


    This activation function is not bounded and takes values from 0 to +inf. Although
    it has a similar shape as a linear function (i.e., this function is equal to identity
    for positive values), the ReLu function has a derivative. The drawback of the
    ReLu is that the derivative (i.e., the gradient) is 0 when the inputs are negative.
    This means as for the linear functions, the backpropagation cannot be processed,
    and the neural network cannot learn unless the inputs are greater than 0. This
    aspect of the ReLu, gradient equal to 0 when the inputs are negative, is called
    the dying ReLu problem.


    To prevent the dying ReLu problem, two ReLu variations can be used, namely the
    Leaky ReLu function and the Parametric ReLu function. The Leakey ReLu function
    returns as output the maximum of X and X by 0.1. In other words, the leaky ReLu
    is equal to the identity function when X is greater than 0 and is equal to the
    product of 0.1 and X when X is less than zero. This function is provided as follows:


    $$F(X) = \max(0.1X, X)$$


    This function has a small positive gradient which is 0.1 when X has negative'
  merge: -1
  pgno: 81
- img_proc: true
  md: 'values, which make this function support backpropagation for negative values.
    However, it may not provide a consistent prediction for these negative values.


    The parametric ReLu function is similar to the Leaky ReLu function, which takes
    the gradient as a parameter to the neural network to define the output when X
    is negative. The mathematical formulation of this function is as follows:


    F(X) = max(aX, X)


    There are other variations of the ReLu function such as the exponential linear
    ReLu. This function, unlike the other variations of the ReLu the Leaky ReLu and
    parametric ReLu, has a log curve for negative values of X instead of the linear
    curves like the Leaky ReLu and the parametric ReLu functions. The downside of
    this function is it saturates for large negative values of X. Other variations
    exist which all rely on the same concept of defining a gradient greater than 0
    when X has negative values.


    # The Softmax function


    The Softmax function is another type of activation function used differently than
    the one presented previously. This function is usually applied only to the output
    layer when a classification of the inputs into several different classes is needed.
    In fact, the Softmax function supports several classes and provides the probability
    of input to belong to a specific class. It normalizes outputs of every category
    between 0 and 1 then divides by their sum to provide that probability.


    Given all these activation functions, where each one has its pros and cons, the
    question now is: which one should be used in a neural network? The answer is:
    simply having a better understanding of the problem in hand will help guide into
    a specific activation function, especially if the characteristics of the function
    being approximated are known beforehand. For instance, a sigmoid function is a
    good choice for a classification problem. In case the nature of the function being
    approximated is unknown, it is highly recommended to start with a ReLu function
    rather than trying other activation functions. Overall, the ReLu function works
    well for a wide range of applications. It is an ongoing research, and you may
    try your activation function.


    An important aspect of choosing an activation function is the sparsity of the
    activation. Sparsity means that not all neurons are activated. This is a desired'
  merge: -1
  pgno: 82
- img_proc: true
  md: 'characteristic in a neural network because it makes the network learns faster
    and less prone to overfitting. Let’s imagine a large neural network with multiple
    neurons if all neurons were activated; it means all these neurons are processed
    to describe the final output. This makes the neural network very dense and computationally
    exhaustive to process. The sigmoid and the tanh activation functions have this
    property of activating almost all neurons, which makes them computationally inefficient
    unlike the ReLu function and its variations that cause the inactivation of some
    negative values. That is the reason why it is recommended to start with the ReLu
    function when approximating a function with unknown characteristics.


    # What are the types of artificial neural networks?


    Several categories of artificial neural networks with different properties and
    complexities exist. The first and simplest neural network developed is the perceptron.
    The perceptron computes the sum of the inputs, applies an activation function,
    and provides the result to the output layer.


    Another old and simple approach is the feedforward neural network. This type of
    artificial neural network has only one single layer. It is a category that is
    fully connected to the following layer where each node is attached to the others.
    It propagates the information in one direction from the inputs to the outputs
    through the hidden layer. This process is known as the front propagated wave that
    usually uses what is called the activation function. This activation function
    processes the data in each node of the layers. This neural network returns a sum
    of weights by the inputs calculated according to the hidden layer’s activation
    function. The category of feedforward neural network usually uses the backpropagation
    method for the training process and the logistic function as an activation function.


    Several other neural networks are a derivation of this type of network. For example,
    the radial-basis-function *neural* networks. This is a feedforward neural network
    that depends on the radial basis function instead of the logistic function. This
    type of neural networks have two layers, wherein the inner layer, the features,
    and radial basis function are combined. The radial function computes the distance
    of each point to the relative center. This neural network is useful for continuous
    values to evaluate the distance from the target value.


    In contrast, the logistic function is used for mapping arbitrary binary values'
  merge: -1
  pgno: 83
- img_proc: true
  md: '(i.e., 0 or 1; yes or no). Deep feedforward neural networks are a multilayer
    feedforward neural network. They became the most commonly used neural network
    types used in Machine Learning as they yield better results. A new dydydytype
    of learning called deep learning has emerged from these types of neural networks.


    Recurrent neural networks are another category that uses a different type of nodes.
    Like a feedforward neural network, each hidden layer processes the information
    to the next layer. However, outputs of the hidden layers are saved and processed
    back to the previous layer. The first layer, comprised of the input layer, is
    processed as the product of the sum of the weighted features. The recurrent process
    is applied in hidden layers. At each step, every node will save information from
    the previous step. It uses memory, while the computation is running. In short,
    the recurrent neural network uses forward propagation and backpropagation to self-learn
    from the previous time steps to improve the predictions. In other words, information
    is processed in two directions, unlike the feedforward neural networks.


    A multilayer perceptron, or multilayer neural network, is a neural network that
    has at least three or more layers. This category of networks is fully connected
    where every node is attached to all other nodes in the following layers.


    Convolutional neural networks are typically useful for image classification or
    recognition. The processing used by this type of artificial neural network is
    designed to deal with pixel data. The convolutional neural networks are a multi-layer
    network that is based on convolutions, which apply filters for neuron activation.
    When the same filter is applied to a neuron, it leads to an activation of the
    same feature and results in what is called a feature map. The feature map reflects
    the strength and importance of a feature of input data.


    Modular neural networks are formed from more than one connected neural network.
    These networks rely on the concept of ‘divide and conquer.’ They are handy for
    very complex problems because they allow combining different types of neural networks.
    Therefore, they allow combining the strengths of a different neural network to
    solve a complex problem where each neural network can handle a specific task.


    # How to train an artificial neural network?


    As explained at the beginning of this chapter, neural networks compute a'
  merge: -1
  pgno: 84
- img_proc: true
  md: 'weighted sum of inputs and apply an activation function at each layer. Then
    it provides the final result to the output layer. This procedure is commonly named
    *forward propagation*. To train these artificial neural networks, weights need
    to be optimized to obtain the optimal weights that produce the most accurate outputs.
    The process of the training an artificial neural network is as follows:


    +   1. Initialize the weights

    2. Apply the forward propagation process

    3. Evaluate the neural network performance

    4. Apply the backward propagation process

    5. Update the weights

    6. Repeat the steps from step 2 until it attains a maximum number of iterations,
    or neural network performance does not improve.


    As we can see from the steps of training an artificial neural network presented
    above, we need a performance measure that describes how accurate the neural network
    is. This function is called the loss function or cost function. This function
    can be the same as the cost function we presented in the previous chapter:


    $$J = \frac{1}{N}\sum(y_{predicted} - y_{target})^2$$


    Where N is the number of outputs, $y_{predicted}$ is the output and $y_{target}$
    is the true value of the output. This function provides the error of the neural
    network. Small values of J reflect the high accuracy of the neural network. So
    far, we defined loss function and how the neural network works in general. Now,
    let’s go into the details for each step of the training process. Let’s consider
    a set of inputs X and outputs Y. We initialize W (i.e., weights) and B (i.e.,
    bias) as a null matrix. The next step is to apply the feed-forward propagation
    that consists of feeding each layer of the artificial neural network with the
    sum of the weights by the inputs and the bias. Let’s consider that we have two
    layers. We can calculate the first hidden layer’s output using the following equation:


    $$Z_1 = W_1X + b_1$$'
  merge: -1
  pgno: 85
- img_proc: true
  md: 'Where W1 and b1 are the parameters of the neural network as the weights and
    bias of the first layer, respectively.

    Next, we apply the activation function F1, that can be any activation from the
    function presented previously in this chapter:


    $$A_1 = F_1(Z_1)$$


    The result is the output of the first layer, which is then fed to the next layer
    as:

    $$Z_2 = W_2A_1 + b_2$$

    With W2 and b2 are the weights and bias of the second layer, respectively.

    To this result, we apply an activation function F2:


    $$A_2 = F_2(Z_2)$$


    Now A2 is supposed to be the output of the artificial neural network. The activation
    function F1 and F2 might be the same activation function or different activation
    function depending on the dataset and the expected output.

    After the feedforward propagation, we compare the neural network output against
    the target output with the loss function. It is highly likely the difference between
    the estimated output and the actual values at this stage is very high. Therefore,
    we have to adjust the weights through the backpropagation process. We calculate
    the gradient of each activation function concerning biases and weights. We start
    by evaluating the derivative of the last layer, then the layer before this layer
    on so on until the input layer. Then update the weights according to the gradient
    or the derivative of the activation function. Applying these steps to our example
    of two layers neural network it provides:


    $$W_2 = W_2 - \alpha \frac{d}{dW} F_2(W,b)$$

    $$b_2 = b_2 - \alpha \frac{d}{db} F_2(W,b)$$

    $$W_1 = W_1 - \alpha \frac{d}{dW} F_2(W,b)$$'
  merge: -1
  pgno: 86
- img_proc: true
  md: '$b_1 = b_1 - \alpha \frac{d}{db} F_2(W,b)$


    The parameter $\alpha$ is the learning rate parameter. This parameter determines
    the rate by which the weights are updated. The process that we just describe here
    is called the gradient descent algorithm. The process is repeated until it attains
    a pre-fixed maximum number of iterations. In chapter 4, we will develop an example
    to illustrate a perceptron and multi-layer neural network by following similar
    steps using Python. We will develop a classifier based on an artificial neural
    network. Now, let’s explore the pros of using an artificial neural network for
    Machine Learning applications.


    # Artificial neural network: pros and cons of use


    Nowadays, artificial neural networks are applied in almost every domain. Research
    in the domain of artificial neural networks is very active, and several neural
    networks immerged to take advantage of the full potential of this Artificial intelligence
    approach. Artificial neural networks have several advantages.


    Artificial neural networks are able to map structures and learn from the data
    faster. They are also able to map the complex structure and connections that relate
    the outputs to the input datasets, which is the case in many real-life applications.
    Once an artificial neural network is developed and trained, it can be generalized.
    In other words, it can be applied to map relationships between data that it has
    not been exposed to or to make predictions for new datasets. Moreover, the artificial
    neural network does not make any assumptions of the structure or the distribution
    of the input data. It does not impose specific conditions on the data or assumptions
    on the relationship in the data, unlike traditional statistical methods. The fact
    that artificial neural networks can handle a large amount of data makes them an
    appealing tool. Artificial neural networks are a non-parametric approach that
    allows developing a model with a reduced error that is caused by the estimation
    of the parameters. Although these appealing characteristics of artificial neural
    networks, they suffer from some drawbacks.


    The downside of artificial neural networks is that they often operate as a black
    box. This means that we cannot fully understand the relationship between the inputs
    and outputs and the interdependence between specific input variables and the output.
    In other words, we cannot detect how much'
  merge: -1
  pgno: 87
- img_proc: true
  md: each input variable impacts the output. The training process can be computationally
    inefficient. We can overcome this problem by using parallel computing and taking
    advantage of the computation power of computers by using proper coding.
  merge: -1

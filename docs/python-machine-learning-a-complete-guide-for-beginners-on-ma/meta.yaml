    The process of training for Machine Learning involves providing an algorithm with
    training data.


    The basic purpose of creating any ML model is to expose it to a lot of input,
    as well as the output applicable to it, allowing it to analyze these data and
    use it to determine the relationship between it and the results. For example,
    if a person wants to decide whether to carry an umbrella or not depending on the

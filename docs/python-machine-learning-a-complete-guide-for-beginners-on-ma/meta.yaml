  md: 'effectiveness of a model depends on its ability to predict unseen or new data;
    therefore, it is important to have separate training and test different sections
    of the dataset. The primary aim of using training sets is to fit and fine-tune
    one''s model. Test sets, on the other hand, are new datasets for the evaluation
    of one''s model.


    Before doing anything else, it is important to split data to get the best estimates
    of the model''s performance. After doing this, one should avoid touching the test
    sets until one is ready to choose the final model. Comparing training versus test
    performance allows developers to avoid over-fitting. If a model''s performance
    is adequate or exceptional on the training data, but inadequate on the test data,
    then the model has this problem.


    In the field of Machine Learning, over-fitting is one of the most important considerations.
    It describes how well the target function''s approximation correlates with the
    training data provided. It happens when the training data provided has a high
    signal to noise ratio, which will lead to poor predictions. Essentially, an ML
    model is over-fitting if it fits the training data exceptionally well while generalizing
    new data poorly. Developers overcome this problem by creating a penalty on the
    model''s parameters, thereby limiting the model''s freedom.


    When professionals talk about tuning models in Machine Learning, they usually
    mean working on hyper-parameters. In Machine Learning, there are two main types
    of parameters, i.e., model parameters and hyper-parameters. The first type defines
    individual models and is a learned attribute, such as decision tree locations

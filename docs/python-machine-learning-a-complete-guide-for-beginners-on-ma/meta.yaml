    # Conditional Tests in Python


    In the center of any if statement lies an expression, which must be evaluated
    to be either true or false. This is what is normally known as a conditional test
    because Python uses both values to determine if a particular code should be executed.
    If the particular statement is true, Python executes the code that follows it.
    However, if it is false, it ignores the code after it.


    # Checking Equality


    At times, we may test for the equality of a particular condition. In this situation,
    we test if the value of the variable is equal to the other variable we decide.
    For instance:


    ```

    >>>color = "green"

    >>> color == "green"

    True

    ```


    In this example, we first assign the variable color with the value “green by using
    the single equal sign. This is not something new, as we have been using it throughout
    this book. However, the second line checks if the value of color is green, which
    has a double equal sign. It will return true if the value on the left side and
    that on the right side are both true. If it doesn’t match, then the result will
    be false. When the value of the color is anything besides green, then this condition
    equates to false. The example below will clarify that.


    ```

    >>>color = "green"

    >>> color == "blue"

    False

    ```


    Note: When you test for equality, you should know that it is case sensitive. For
    instance, two values that have different capitalizations won’t be regarded as
    equal. For instance,


    ```

    >>>color = "Green"

    >>> color == "green"

    ```'

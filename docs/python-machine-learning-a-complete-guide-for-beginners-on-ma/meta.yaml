    how they affect outcomes in each scenario.


    In our studies of Machine Learning from the beginner books through an intermediary
    level to this point, one concept that stands out is that Machine Learning involves
    uncertainty. This is one of the differences between Machine Learning and programming.
    In programming, you write code that must be executed as it is written. The code
    derives a predetermined output based on the instructions given. However, in Machine
    Learning, this is not a luxury we enjoy.


    Once you build the model, you train and test it and eventually deploy the model.
    Since these models are built to interact with humans, you can expect variances
    in the type of interaction that you experience at every level. Some input parameters
    might be correct, while others might not. When you build'
  - '[PAGE 7]


    your model, you must consider these factors, or your model will cease to perform
    as expected.


    The math element of Machine Learning is another area of study that we have to
    look at. We didn’t touch on this so much in the earlier books in the series because
    it is an advanced level study. Many mathematical computations are involved in
    Machine Learning for the models to deliver the output we need. To support this
    cause, we must learn how to perform specific operations on data based on unique
    instructions.


    As you work with different sets of data, there is always the possibility that
    you will come across massive datasets. This is normal because as our Machine Learning
    models interact with different users, they keep learning and build their knowledge.
    The challenge of using massive datasets is that you must learn how to break down
    the data into small units that your system can handle and process without any
    challenges. In this case, you are trying to avoid overworking your learning model.


    Most basic computers will crash when they have to handle massive data. However,
    this should not be a problem when you learn how to fragment your datasets and
    perform computational operations on them.


    At the beginning of this book, we mentioned that we will introduce hands-on approaches
    to using Machine Learning in daily applications. In light of this assertion, we
    looked at some practical methods of using Machine Learning, such as building a
    spam filter and analyzing a movie database.


    We have taken a careful step-by-step approach to ensure that you can learn along
    the way, and more importantly, tried to explain each process to help you understand
    the operations you perform and why.


    Eventually, when you build a Machine Learning model, the aim is to integrate it
    into some of the applications that people use daily. With this in mind, you must
    learn how to build a simple solution that addresses this challenge. We used simple
    explanations to help you understand this, and hopefully, as you keep working on
    different Machine Learning models, you can learn by building more complex models
    as your needs permit.


    There are many concepts in Machine Learning that you will learn or come across
    over time. You must reckon the fact that this is a never-ending learning process
    as long as your model interacts with the data. Over time, you will encounter greater
    datasets than those you are used to working with. In such a scenario, learning
    how to handle them will help you achieve your'
  - '[PAGE 8]


    results faster, and without struggling.'
  - '[PAGE 9]


    # What Is Machine Learning?


    We live in a world where technology has become an inalienable part of our daily
    lives. In fact, with all the rapid changes in technology these days, machines
    enabled with artificial intelligence are now responsible for different tasks like
    prediction, recognition, diagnosis, and so on.


    Data is added or fed to the machines and these machines “learn” from these data.
    These data are referred to as training data because they are used to train the
    machines.


    Once the machines have the data, they start to analyze any patterns present within
    the data and then perform actions based on these patterns. Machines use various
    learning mechanisms for analyzing the data according to the actions that they
    need to perform. These mechanisms can be broadly classified into two categories-
    supervised learning and unsupervised learning.


    You might wonder why there aren’t any machines designed solely to perform those
    tasks that they are needed to carry out. There are different reasons why Machine
    Learning is important. As already mentioned, all research conducted about Machine
    Learning comes in handy since it helps us understand a couple of aspects of human
    learning. Also, Machine Learning is quintessential because it helps increase the
    accuracy, effectiveness, and efficiency of machines.


    Here is a real-life example that will help you understand this concept better.


    Let us assume that there are two random users A and B who love listening to music
    and we have access to their history of songs. If you were a music company, then
    you can use Machine Learning to understand the kind of songs each of these users
    prefers and thereby you can come up with different ways in which you can sell
    your products to them.


    For instance, you have access to noting down the different attributes of songs
    like their tempo, frequency, or the gender of the voice, and then use all these
    attributes and plot a graph. Once you plot a graph, over time, it will become
    evident that A tends to prefer to listen to songs that have a fast tempo and are
    sung by male artists, whereas B likes to listen to slow songs sung by female artists,
    or any other similar insight. Once you obtain these data, you can transfer them
    to your marketing and advertising teams to make better product decisions.'
- md: 'At present, we have free access to all the historical data that have been collected
    since the advent of technology. Not only do we have access to these data, but
    we can now store and process such large quantities of them. Technology has certainly
    evolved, and it has come a long way when you look at the way we can now handle
    such operations. The technology is so refined these days that it provides access
    to more data to mine from.


    Here are a couple of other reasons why Machine Learning is important.


    Even with all the progress that engineers keep making, there will always be some
    tasks that are incapable of being defined explicitly.


    Some tasks must be explained to the machines with the help of examples. The idea
    is to train the machine with the input of data and then teach it to process it
    to produce an output. In this manner, the machine will be aware of how it needs
    to deal with similar inputs of data in the future and process them accordingly
    to generate the appropriate outputs.


    The fields of Machine Learning and data mining are intertwined. Data mining refers
    to the process of going through tons of data to find any valuable correlations
    or relationships that exist within. This is another benefit of Machine Learning
    in the sense that it helps the machines find any vital information.


    There are numerous occasions where humans can’t design machines without having
    an accurate estimation of the conditions within which such machines will function.


    The external conditions tend to have a major effect on the performance of the
    machine. In such situations, Machine Learning helps to get the machine acclimatized
    to its environment to ensure optimum performance. It also helps the machine to
    easily adapt to any changes in the environment without affecting its performance.


    There is another problem if someone has to hardcode an extremely elaborate process
    into the machine, and then it is likely that the programmer will miss a couple
    of details. If there is any manual error, then it becomes quite tedious to encode
    all the details all over again. In such instances, it is better to allow the machine
    to learn the process instead.


    The world of technology is in a constant flux of change and changes take place
    in the languages used as well. It isn’t practical to keep redesigning the systems
    all over again to accommodate all the possible changes. Instead, Machine Learning
    helps the machine to automatically get acclimatized to all the changes.


    ## Applications of Machine Learning


    Machine Learning is drastically changing the way businesses are operated these
    days. It helps operate a large scale of data that’s available and enables the
    users to draw helpful predictions based on the given information.


    Certain manual tasks cannot be completed within a short time frame when large
    amounts of data are involved. Machine Learning is the answer to such problems.
    In the present times, we are overwrought with data and information and there is
    no physical way in which anyone can process all this information. Therefore, there
    is a dire need for an automated process and Machine Learning helps attain this
    objective.


    When the processes of analysis and discovery are fully automated, it becomes simpler
    to attain useful information. This helps make all the future processes fully automated.
    The words Big Data, Business Analytics, and Data Science require Machine Learning.
    Predictive analytics and business intelligence are no longer restricted to just
    the elite businesses and are now accessible to small businesses and companies
    too. This allows small businesses to be a part of the process of collection and
    effective utilization of information. Let us look at a couple of technical applications
    of Machine Learning and see how these apply to problems in the real world.


    ### Virtual Personal Assistants


    Popular examples of virtual assistants available today are Alexa, Siri, and Google
    Now. As is obvious from the name, they help the user find the necessary information
    via voice commands. You simply need to activate it and then ask the question you
    want like, “What is my schedule for the day?” “What are the flights available
    between London and Germany?” or any other question that you want.


    To answer your question, your personal assistant will look for information, recall
    the question you asked and then give you an answer. It can also be used to set
    reminders for certain tasks. Machine Learning is an important part of the process
    since it enables the system to gather and refine the information you need based
    on any of your previous involvements with it.


    ### Density Estimation


    Machine Learning allows the system to use the data that’s available to it to suggest
    similar products. For instance, if you were to pick up a copy of Pride and Prejudice
    from a bookstore and then run it through a machine, then Machine Learning will
    help it determine the density of the words and come up with other books that are
    similar to Pride and Prejudice.


    ### Latent Variables


    When you are working with latent variables, the machine will use clustering to
    determine whether any of the variables present in it are related to one another
    or not. This comes in handy when you aren’t certain of the reason that caused
    the change in variables and aren’t aware of the relationship between the variables.
    When a large quantity of data is involved, it is easier to look for latent variables
    because it helps with a better understanding of the data thus obtained.


    ### Reduction of Dimensionality


    Usually, the data that is obtained tends to have some variables and dimensions.
    If there are more than three dimensions involved, then the human mind can’t visualize
    that data. In such situations, Machine Learning helps to reduce these data into
    manageable proportions so that the user can easily understand the relationship
    between any variables.


    Models of Machine Learning train the machines to learn from all the available
    data and offer different services like prediction or classification that in turn
    have multiple real-life applications like self-driving cars, the ability of smartphones
    to recognize the user’s face or how Google Home or Alexa can recognize your accent
    and voice and how the accuracy of the machines improves if they have been learning
    for longer.


    ## Advantages and Disadvantages of Machine Learning


    ### Disadvantages


    In Machine Learning, we always train the model and then validate that model on
    a small data set. We then use that model to predict the output for some unseen
    or new data. You will find it difficult to identify if there was a bias in the
    model that you have created. If you cannot identify the bias, your inferences
    will be incorrect.


    Some social scientists will begin to rely only on Machine Learning. It is important
    to remember that improvements should be made to some unsupervised Machine Learning
    tasks.


    ### Some of the advantages


    Human beings cannot process large volumes of data, let alone analyze that data.
    There is a lot of real-time data that is being produced, and if there is no automatic
    system to understand and analyze that data, we cannot reach any conclusion.


    Machine Learning is getting better. With the advent of deep learning systems,
    the costs of data engineering and pre-processing of data are reducing.


    ## Machine Learning – Concepts & Terms


    Machine Learning is done by feeding the machine with relevant training data sets.
    Ordinary systems, that is, systems without any artificial intelligence, can always
    provide an output based on the input that is provided to the system. A system
    with artificial intelligence, however, can learn, predict, and improve the results
    it provides through training.


    Let us look at a simple example of how children learn to identify objects, or
    in other words, how a child will associate a word with an object. Let us assume
    that there is a bowl of apples and oranges on the table. You, as an adult or parent,
    will introduce the round and red object as an apple, and the other object as an
    orange. In this example, the words apple and orange are labels, and the shapes
    and colors are attributes. You can also train a machine using a set of labels
    and attributes. The machine will learn to identify the object based on the attributes
    that are provided to it as input.


    The models that are based on labeled training data sets are termed as supervised
    Machine Learning models. When children go to school, their teachers and professors
    give them some feedback about their progress. In the same way, a supervised Machine
    Learning model allows the engineer to provide some feedback to the machine.


    Let us take an example of an input [red, round]. Here, both the child and the
    machine will understand that any object which is round and red is an apple. Let
    us now place a cricket ball in front of either the machine or the child. You can
    feed the machine with the response negative 1 or 0 depending on whether the prediction
    is wrong or right. You can always add more attributes if necessary. This is the
    only way that a machine will learn. It is also for this reason that if you use
    a large-high-quality data set and spend more time training the machine, the machine
    will give you better and more accurate results.


    Before we proceed further, you must understand the difference between the concepts
    of Machine Learning, artificial intelligence, and deep learning. Most people use
    these concepts interchangeably, but it is important to know that they are not
    the same.


    *Machine Learning, Artificial Intelligence and Deep Learning:*

    *The diagram below will give you an idea of how these terms relate.*'
  mdcn: '目前，我们可以自由访问自技术诞生以来收集的所有历史数据。我们不仅能访问这些数据，现在还能存储和处理如此海量的数据。技术无疑已经进步，从我们现在处理此类操作的方式来看，它已经走了很长一段路。如今的技术如此精良，它提供了更多可供挖掘的数据。


    以下是机器学习重要的另外几个原因。


    尽管工程师们不断取得进展，但总有一些任务无法被明确定义。


    有些任务必须借助示例向机器解释。其理念是通过输入数据来训练机器，然后教它处理数据以产生输出。通过这种方式，机器将知道未来如何处理类似的输入数据，并相应地处理它们以生成适当的输出。


    机器学习和数据挖掘领域相互交织。数据挖掘指的是浏览海量数据以发现其中存在的任何有价值的相关性或关系的过程。这是机器学习的另一个好处，因为它帮助机器找到任何重要信息。


    在许多情况下，如果没有对机器运行条件的准确估计，人类就无法设计机器。


    外部条件往往对机器的性能有重大影响。在这种情况下，机器学习有助于使机器适应其环境，以确保最佳性能。它还帮助机器轻松适应环境中的任何变化，而不会影响其性能。


    如果有人必须将极其复杂的过程硬编码到机器中，那么程序员很可能会遗漏一些细节。如果存在任何人为错误，那么重新编码所有细节将变得非常繁琐。在这种情况下，最好让机器自己学习这个过程。


    技术世界处于不断变化之中，所使用的语言也在发生变化。为了适应所有可能的变化而不断重新设计系统是不切实际的。相反，机器学习帮助机器自动适应所有变化。


    ## 机器学习的应用


    机器学习正在极大地改变当今企业的运营方式。它有助于处理可用的大量数据，并使用户能够根据给定信息做出有用的预测。


    当涉及大量数据时，某些手动任务无法在短时间内完成。机器学习就是解决此类问题的答案。在当今时代，我们被数据和信息淹没，没有任何物理方式可以处理所有这些信息。因此，迫切需要一个自动化流程，而机器学习有助于实现这一目标。


    当分析和发现过程完全自动化时，获取有用信息就变得更加简单。这有助于使所有未来的过程完全自动化。大数据、商业分析和数据科学这些词汇都需要机器学习。预测分析和商业智能不再仅限于精英企业，现在小型企业和公司也可以使用。这使得小企业能够参与到信息收集和有效利用的过程中。让我们来看几个机器学习的技术应用，看看它们如何应用于现实世界的问题。


    ### 虚拟个人助理


    当今可用的虚拟助手的流行示例有 Alexa、Siri 和 Google Now。顾名思义，它们通过语音命令帮助用户查找必要的信息。你只需激活它，然后提出你想问的问题，比如“我今天的日程安排是什么？”“伦敦和德国有哪些航班可用？”或任何其他你想问的问题。


    为了回答你的问题，你的个人助理会查找信息，回忆你提出的问题，然后给你答案。它还可以用于设置某些任务的提醒。机器学习是该过程的重要组成部分，因为它使系统能够根据你之前的任何交互来收集和完善你需要的信息。


    ### 密度估计


    机器学习允许系统使用其可用的数据来推荐类似的产品。例如，如果你从书店拿起一本《傲慢与偏见》，然后将其输入机器，那么机器学习将帮助它确定单词的密度，并找出其他与《傲慢与偏见》相似的书籍。


    ### 潜在变量


    当你处理潜在变量时，机器将使用聚类来确定其中是否存在相互关联的变量。当你不确定导致变量变化的原因，并且不了解变量之间的关系时，这非常有用。当涉及大量数据时，寻找潜在变量更容易，因为它有助于更好地理解所获得的数据。


    ### 降维


    通常，获得的数据往往具有一些变量和维度。如果涉及三个以上的维度，那么人脑就无法可视化这些数据。在这种情况下，机器学习有助于将这些数据缩减到可管理的比例，以便用户可以轻松理解任何变量之间的关系。


    机器学习模型训练机器从所有可用数据中学习，并提供不同的服务，如预测或分类，这些服务反过来又有多种现实世界的应用，如自动驾驶汽车、智能手机识别人脸的能力，或者
    Google Home 或 Alexa 如何识别你的口音和声音，以及如果机器学习时间更长，其准确性如何提高。


    ## 机器学习的优缺点


    ### 缺点


    在机器学习中，我们总是先训练模型，然后在小数据集上验证该模型。然后我们使用该模型来预测一些未见过或新数据的输出。你会发现很难识别你创建的模型中是否存在偏差。如果你无法识别偏差，你的推断将是不正确的。


    一些社会科学家将开始仅依赖机器学习。重要的是要记住，应该改进一些无监督的机器学习任务。


    ### 一些优点


    人类无法处理大量数据，更不用说分析这些数据了。正在产生大量的实时数据，如果没有自动系统来理解和分析这些数据，我们就无法得出任何结论。


    机器学习正在变得更好。随着深度学习系统的出现，数据工程和数据预处理的成本正在降低。


    ## 机器学习 – 概念与术语


    机器学习是通过向机器提供相关的训练数据集来完成的。普通系统，即没有任何人工智能的系统，总是可以根据提供给系统的输入来提供输出。然而，具有人工智能的系统可以通过学习、预测和改进其通过训练提供的结果。


    让我们看一个简单的例子，了解孩子们如何学习识别物体，或者换句话说，孩子如何将一个词与一个物体联系起来。假设桌子上有一碗苹果和橙子。你作为成年人或父母，会将那个圆形的红色物体介绍为苹果，另一个物体介绍为橙子。在这个例子中，单词苹果和橙子是标签，形状和颜色是属性。你也可以使用一组标签和属性来训练机器。机器将学会根据作为输入提供的属性来识别物体。


    基于标记训练数据集的模型被称为监督机器学习模型。当孩子上学时，他们的老师和教授会给他们一些关于他们进步的反馈。同样，监督机器学习模型允许工程师向机器提供一些反馈。


    让我们以输入 [红色，圆形] 为例。在这里，孩子和机器都会理解任何圆形的红色物体都是苹果。现在让我们在机器或孩子面前放一个板球。你可以根据预测是错误还是正确，向机器提供响应负1或0。如果需要，你总是可以添加更多属性。这是机器学习的唯一方式。这也是为什么如果你使用大型高质量数据集并花更多时间训练机器，机器会给你更好、更准确的结果。


    在我们继续之前，你必须理解机器学习、人工智能和深度学习概念之间的区别。大多数人将这些概念互换使用，但重要的是要知道它们并不相同。


    *机器学习、人工智能和深度学习：*

    *下图将让你了解这些术语之间的关系。*'

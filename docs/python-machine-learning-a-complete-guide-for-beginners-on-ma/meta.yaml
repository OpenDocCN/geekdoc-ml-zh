    is applied in hidden layers. At each step, every node will save information from
    the previous step. It uses memory, while the computation is running. In short,
    the recurrent neural network uses forward propagation and backpropagation to self-learn
    from the previous time steps to improve the predictions. In other words, information
    is processed in two directions, unlike the feedforward neural networks.


    A multilayer perceptron, or multilayer neural network, is a neural network that
    has at least three or more layers. This category of networks is fully connected
    where every node is attached to all other nodes in the following layers.


    Convolutional neural networks are typically useful for image classification or

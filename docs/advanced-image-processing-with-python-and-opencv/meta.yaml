    **U-Net Architecture:** U-Net is a specialized architecture for biomedical image
    segmentation. It employs a U-shaped structure consisting of an encoder-decoder
    architecture, with skip connections that allow for the transfer of high-resolution
    features from the encoder to the decoder. This structure enhances localization
    accuracy while maintaining contextual information.


    ```

    python

    from keras.layers import Concatenate


    # Encoder

    enc1 = Conv2D(64, (3, 3), activation=''relu'', padding=''same'')(inputs)

    pool1 = MaxPooling2D((2, 2))(enc1)


    # Decoder

    dec1 = UpSampling2D((2, 2))(pool1)

    dec1 = Concatenate()([dec1, enc1]) # Skip connection

    output = Conv2D(num_classes, (1, 1), activation=''softmax'')(dec1)

    ```


    **Mask R-CNN:** Building upon Faster R-CNN, Mask R-CNN extends object detection
    capabilities by adding a branch for predicting segmentation masks for each detected
    object. This method is particularly useful for instance segmentation, where individual
    objects of the same class need to be distinguished.


    ```

    python

    from mrcnn import model as mrcnn

    ```'

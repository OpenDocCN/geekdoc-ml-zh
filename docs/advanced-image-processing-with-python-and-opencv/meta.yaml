    outputs = Conv2D(num_classes, (1, 1), activation='softmax')(x)\nmodel = Model(inputs,\
    \ outputs)\n```\n\n**U-Net架构：** U-Net是用于生物医学图像分割的专用架构。它采用U形结构，由编码器-解码器架构组成，并带有跳跃连接，允许将高分辨率特征从编码器传输到解码器。这种结构在保持上下文信息的同时增强了定位精度。\n\

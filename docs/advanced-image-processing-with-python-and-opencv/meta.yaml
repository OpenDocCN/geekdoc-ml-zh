    **仿射变换：** 仿射变换是保持点、直线和平面不变的线性映射。它们可以包括平移、旋转、缩放和剪切。


    **实现：** 要执行仿射变换，请使用 `cv2.getAffineTransform()` 函数定义一个 2x3 的变换矩阵。


    ```python

    # 仿射变换

    src_points = np.float32([[50, 50], [200, 50], [50, 200]])


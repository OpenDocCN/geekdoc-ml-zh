    **透视变换：** 透视变换改变图像的透视效果，使其看起来像是从不同角度观察的。这对于校正以一定角度拍摄的图像中的畸变特别有用。


    **实现：** 使用 `cv2.getPerspectiveTransform()` 函数创建一个透视变换矩阵。


    ```python

    # 透视变换


- img_proc: true
  md: '**Single-Stage Detectors:** These methods predict bounding boxes and class
    probabilities directly from the image in a single pass, making them fast and efficient.


    **YOLO (You Only Look Once):** YOLO treats object detection as a regression problem,
    predicting multiple bounding boxes and class probabilities from the entire image
    simultaneously. It uses a single neural network to process the image, making it
    exceptionally fast.


    **SSD (Single Shot MultiBox Detector):** SSD generates bounding box predictions
    at multiple scales using feature maps from different layers of a CNN, allowing
    for the detection of objects of various sizes.


    ```

    python

    import cv2

    import numpy as np


    # Load YOLO model and configuration


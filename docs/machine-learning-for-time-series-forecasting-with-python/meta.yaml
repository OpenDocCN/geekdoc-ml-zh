  - '[PAGE 109]


    is defined as a type of method in which data scientists need to provide both input
    and output data to their machine learning algorithms.


    In the next step, the supervised learning algorithm (for example, linear regression
    for regression problems, random forest for classification and regression problems,
    support vector machines for classification problems) examines the training data
    set and produces a mathematical function, which can be used for inferring new
    examples and predictions.


    In time series, data scientists have to construct the output of their model by
    identifying the variable that they need to predict at a future date (e.g., future
    number of sales next Monday) and then leverage historical data and feature engineering
    to create input variables that will be used to make predictions for that future
    date.


    Feature engineering efforts mainly have two goals:


    +   - *Creating the correct input data set to feed the machine learning algorithm*:
    In this case, the purpose of feature engineering in time series forecasting is
    to create input features from historical and row data and shape the data set as
    a supervised learning problem.

    - *Increasing the performance of machine learning models*: The second most important
    goal of feature engineering is about generating valid relationships between input
    features and the output feature or target variable to be predicted. In this way,
    the performance of machine learning models can be improved.


    We will cover four different categories of time features that are extremely helpful
    in time series scenarios:


    +   - Date time features

    - Lag features and window features

    - Rolling window statistics

    - Expanding window statistics


    In the next few sections, we will discuss each of these time features in more
    detail, and I will explain them with real-word examples in Python.


    # Date Time Features


    Date Time Features are features created from the time stamp value of each observation.
    A few examples of these features are the integer hour, month, day of week for
    each observation. Data scientists can perform these date time features transformations
    using pandas and adding new columns (hour, month, and day of week columns) to
    their original data set where hour, month, and day of week information is extracted
    from the time stamp value for each observation.'

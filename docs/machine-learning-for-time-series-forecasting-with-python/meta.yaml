    In the example above of predicting weekly gas prices, while the holiday travel
    schedule increases demand based on cyclical trends, the overall cost of gasoline
    could be affected by oil reserve prices, sociopolitical conflicts, or disasters
    such as oil tanker accidents.


    ■ *The structured or unstructured features of your forecasting model* – Structured
    data comprises clearly defined data types whose pattern makes them easily searchable,
    while unstructured data comprises data that is usually not as easily searchable,
    including formats like audio, video, and social media postings. Structured data
    usually resides in relational databases, whose fields store length delineated
    data such as phone numbers, Social Security numbers, or ZIP codes. Even text strings
    of variable length like names are contained in records, making it a simple matter
    to search (Taylor 2018).


    Unstructured data has internal structure but is not structured via predefined
    data models or schema. It may be textual or non-textual, and human or machine
    generated. Typical human-generated unstructured data includes spreadsheets, presentations,
    email, and logs. Typical machine-generated unstructured data includes satellite
    imagery, weather data, landforms, and military movements.


    In a time series context, unstructured data doesn’t present systematic time-dependent
    patterns, while structured data shows systematic time dependent patterns, such
    as trend and seasonality.


    ■ *The univariate or multivariate nature of your forecasting model* – A univariate
    data is characterized by a single variable. It does not deal with causes or relationships.
    Its descriptive properties can be identified in some estimates such as central
    tendency (mean, mode, median), dispersion (range, variance, maximum, minimum,
    quartile, and standard deviation), and the frequency distributions. The univariate
    data analysis is known for its limitation in the determination of relationship
    between two or more variables, correlations, comparisons, causes, explanations,
    and contingency between variables. Generally, it does not supply further information
    on the dependent and independent variables and, as such, is insufficient in any
    analysis involving more than one variable.


    To obtain results from such multiple indicator problems, data scientists usually
    use multivariate data analysis. This multivariate approach will not only help
    consider several characteristics in a model but will also bring to light the effect
    of the external variables.'

  - '[PAGE 61]


    - Lag feature – These are time-shifted values of the actual demand. For example,
    lag 1 features will hold the demand value in the previous hour (assuming hourly
    data) relative to the current time stamp. Similarly, we can add lag 2, lag 3,
    and so on. The actual combination of lag features that are used are determined
    during the modeling phase by evaluation of the model results.


    - Long-term trending – This feature represents the linear growth in demand between
    years.


    - *Dependent feature*: The dependent feature is the data column that we would
    like our model to predict. With supervised machine learning, we need to first
    train the model using the dependent features (which is also referred to as labels).
    This allows the model to learn the patterns in the data associated with the dependent
    feature. In energy demand forecast, we typically want to predict the actual demand
    and therefore we would use it as the dependent feature.


    As we discussed in this section, data pre-processing and feature engineering are
    important steps to prepare, clean your data, and create features that will make
    your machine learning algorithms work better and produce more accurate results.


    In the next section we will discuss how you can build forecasting models with
    your pre-processed data and features. We will take a closer look at different
    concepts and techniques that will help you generate multiple machine learning
    models for your time series data.


    # Modeling Building and Selection


    The modeling phase is where the conversion of the data into a model takes place.
    In the core of this process there are advanced algorithms that scan the historical
    data (training data), extract patterns, and build a model. That model can be later
    used to predict on new data that has not been used to build the model.


    Once we have a working reliable model, we can then use it to score new data that
    is structured to include the required features. The scoring process will make
    use of the persisted model (object from the training phase) and predict the target
    variable.


    At this point, it is also important to distinguish between train, validation,
    and test sets in machine learning, as illustrated in Figure 2.5.


    ![](img/fd006a6c056e5cf905b5150f958ed477_61_0.png)'
  - '[PAGE 62]


    # Chapter 2 ■ How to Design an End-to-End Time Series Forecasting Solution


    +   - *Train data set* – The train data set represents the amount of data that
    data scientists decide to use to fit machine learning models. Through the train
    data set, a machine learning algorithm can be trained to learn from historical
    data in order to predict future data points.

    - *Validation data set* – The validation data set is the amount of data used to
    offer an unbiased evaluation of a model fit on the train data set, while tuning
    model hyperparameters. Data scientists usually leverage validation data sets to
    fine-tune a machine learning model hyperparameters. Hyperparameters are additional
    factors in the model, whose values are used to control, and eventually improve,
    the learning process of the model itself. Data scientists observe the validation
    set results to update the levels of hyperparameters and, consequently, improve
    their models.

    - *Test data set* – The test data set is the amount of data used to determine
    whether a model is underfitting (the model is performing poorly on the train data
    set) or overfitting (the model is performing well on the train data set but not
    on the test data set) the train data by looking at the prediction error on the
    train and test data sets. The test data set is only used once a model is completely
    trained and validated through the train and validation data sets. Data scientists
    usually leverage the test data set to evaluate different machine learning models.


    Now that you understand better the difference between these data sets, it is also
    important to look for recommendations on how to split our data set into train,
    validation, and test sets. This decision mainly depends on two factors:


    +   - The total number of samples in our data

    - The actual model you are training.


    Some models need substantial data to train upon, so in this case we would need
    to optimize for the larger training sets. Models with very few hyperparameters
    will be easy to validate and tune, so we can probably reduce the size of our validation
    set, but if our model has many hyperparameters, we would want to have a large
    validation set as well. Also, if we have to deal with a model with no hyperparameters
    or ones that cannot be easily tuned, we probably won’t need a validation data
    set. All in all, like many other things in machine learning, the train-test-validation
    split ratio is also quite specific to your use case (Lazzeri 2019b).


    In the following sections, we will discuss some of the most popular classical
    time series techniques and deep learning methods and how they can be applied to
    your data to build, train, test, and validate your forecasting models. Some of
    these techniques will be discussed in more detail in Chapter 4 and Chapter 5.'
  - '[PAGE 63]


    # An Overview of Demand Forecasting Modeling Techniques


    The ability to accurately forecast a sequence into the future is critical in many
    industries: finance, supply chain, and manufacturing are just a few examples.
    Classical time series techniques have served this task for decades, but now deep
    learning methods—similar to those used in computer vision and automatic translation—have
    the potential to revolutionize time series forecasting as well (Lazzeri 2019b).


    In the case of demand forecasting, we make use of historical data, which is ordered
    by time. We generally refer to data that includes the time dimension as time series.
    The goal in time series modeling is to find time-related trends, seasonality,
    and autocorrelation (correlation over time) and formulate those into a model.


    In recent years advanced algorithms have been developed to accommodate time series
    forecasting and to improve forecasting accuracy. I briefly discuss a few of them
    here. This information is not intended to be used as a machine learning and forecasting
    overview but rather as a short survey of modeling techniques that are commonly
    used for demand forecasting.


    +   - *Moving average (MA)* – This is one of the first analytical techniques that
    has been used for time series forecasting, and it is still one of the most commonly
    used techniques as of today. It is also the foundation for more advanced forecasting
    techniques. With moving average, we are forecasting the next data point by averaging
    over the K most recent points, where K denotes the order of the moving average.
    The moving average technique has the effect of smoothing the forecast and therefore
    may not handle well large volatility in the data.

    - *Exponential smoothing* – This is a family of various methods that use weighted
    average of recent data points to predict the next data point. The idea is to assign
    higher weights to more recent values and gradually decrease this weight for older
    measured values. There are a number of different methods within this family, including
    handling of seasonality in the data such as the Holt-Winters Seasonal Method.
    Some of these methods also factor in the seasonality of the data.

    - *Autoregressive Integrated Moving Average (ARIMA)* – This is another family
    of methods that is commonly used for time series forecasting. It practically combines
    autoregression methods with moving average. Autoregression methods use regression
    models by taking previous time series values in order to compute the next date
    point. ARIMA methods also apply differencing methods that include calculating
    the difference between data points and using those instead of the original measured
    value. Finally,'
  - '[PAGE 64]


    ARIMA also makes use of the moving average techniques that are discussed above.
    The combination of all of these methods in various ways is what constructs the
    family of ARIMA methods. ETS and ARIMA are widely used today for demand forecasting
    and many other forecasting problems. In many cases, these are combined together
    to deliver very accurate results.


    +   - *General multiple regression* – This could be the most important modeling
    approach within the domain of machine learning and statistics. In the context
    of time series, we use regression to predict the future values (for example, of
    demand). In regression, we take a linear combination of the predictors and learn
    the weights (also referred to as coefficients) of those predictors during the
    training process. The goal is to produce a regression line that will forecast
    our predicted value. Regression methods are suitable when the target variable
    is numeric and therefore also fits time series forecasting. There is a wide range
    of regression methods, including very simple regression models such as linear
    regression and more advanced ones such as decision trees, random forests, neural
    networks, and boosted decision trees.


    Due to their applicability to many real-life problems, such as fraud detection,
    spam email filtering, finance, and medical diagnosis, and their ability to produce
    actionable results, deep learning neural networks have gained a lot of attention
    in recent years. Generally, deep learning methods have been developed and applied
    to univariate time series forecasting scenarios, where the time series consists
    of single observations recorded sequentially over equal time increments (Lazzeri
    2019a).


    For this reason, they have often performed worse than naïve and classical forecasting
    methods, such as exponential smoothing and ARIMA. This has led to a general misconception
    that deep learning models are inefficient in time series forecasting scenarios,
    and many data scientists wonder whether it’s really necessary to add another class
    of methods, like convolutional neural networks or recurrent neural networks, to
    their time series toolkit. Deep learning is a subset of machine learning algorithms
    that learn to extract these features by representing input data as vectors and
    transforming them with a series of clever linear algebra operations into a given
    output (Lazzeri 2019a).


    Data scientists then evaluate whether the output is what they expected using an
    equation called loss function. The goal of the process is to use the result of
    the loss function from each training input to guide the model to extract features
    that will result in a lower loss value on the next pass. This process has been
    used to cluster and classify large volumes of information, like millions of satellite
    images; thousands of video and audio recordings from YouTube, and historical,
    textual, and sentiment data from Twitter.'
- md: '## Chapter 2 ■ How to Design an End-to-End Time Series Forecasting Solution


    Deep learning neural networks have three main intrinsic capabilities:


    - They can learn from arbitrary mappings from inputs to outputs.

    - They support multiple inputs and outputs.

    - They can automatically extract patterns in input data that spans over long sequences.


    Thanks to these three characteristics, they can offer a lot of help when data
    scientists deal with more complex but still very common problems, such as time
    series forecasting. After having experimented with different time series forecasting
    models, you need to select the best model based on your data and specific time
    series scenario. Model selection is an integral part of the model development
    process, in the next section we will discuss how model evaluation can help you
    find the best model that represents your data and understand how well the chosen
    model will work in the future (Lazzeri 2019b).


    ## Model Evaluation


    Model evaluation has a critical role within the modeling step. At this step we
    look into validating the model and its performance with real-life data. During
    the modeling step, we use a part of the available data for training the model.
    During the evaluation phase, we take the remainder of the data to test the model.
    Practically it means that we are feeding the model new data that has been restructured
    and contains the same features as the training data set.


    However, during the validation process, we use the model to predict the target
    variable rather than provide the available target variable. We often refer to
    this process as model scoring. We would then use the true target values and compare
    them with the predicted ones. The goal here is to measure and minimize the prediction
    error, meaning the difference between the predictions and the true value.


    Quantifying the error measurement is key since we would like to fine-tune the
    model and validate whether the error is actually decreasing. Fine-tuning the model
    can be done by modifying model parameters that control the learning process or
    by adding or removing data features (referred to as parameters sweep). Practically
    that means that we may need to iterate between the feature engineering, modeling,
    and model evaluation phases multiple times until we are able to reduce the error
    to the required level.


    It is important to emphasize that the prediction error will never be zero as there
    is never a model that can perfectly predict every outcome. However, there is a
    certain magnitude of error that is acceptable by the business. During the validation
    process, we would like to ensure that our model prediction error is at or better
    than the business tolerance level. It is therefore important to set the level
    of the tolerable error at the beginning of the cycle during the problem formulation
    phase.


    There are various ways in which prediction error can be measured and quantified.
    Specifically, there is an evaluation technique relevant to time series and in
    specific for demand forecast: the MAPE. MAPE stands for mean absolute percentage
    error. With MAPE we are computing the difference between each forecasted point
    and the actual value of that point. We then quantify the error per point by calculating
    the proportion of the difference relative to the actual value. At the last step
    we average these values. The mathematical formula used for MAPE is as follows:


    $$MAPE = \left( \frac{1}{n} \sum \frac{|Actual\ Values - Forecasted\ Values|}{|Actual\
    Values|} \right) \times 100$$


    The MAPE is scale sensitive and should not be used when working with low-volume
    data. Notice that because *Actual Values* also represents the denominator of the
    equation, the MAPE is undefined when actual demand is zero. Furthermore, when
    the actual value is not zero, but quite small, the MAPE will often take on extreme
    values. This scale sensitivity renders the MAPE close to worthless as an error
    measure for low-volume data.


    There are a few other evaluation techniques that are important to mention here:


    - *The mean absolute deviation (MAD)* – This formula measures the size of the
    error in units. The MAD is a good statistic to use when analyzing the error for
    a single item. However, if you aggregate MADs over multiple items, you need to
    be careful about high-volume products dominating the results—more on this later.
    The MAPE and the MAD are by far the most commonly used error measurement statistics.
    There are a slew of alternative statistics in the forecasting literature, many
    of which are variations on the MAPE and the MAD (Stellwagen 2011).

    - *The mean absolute deviation (MAD)/mean ratio* – This is an alternative to the
    MAPE that is better suited to intermittent and low-volume data. As stated previously,
    percentage errors cannot be calculated when the actual equals zero, and they can
    take on extreme values when dealing with low-volume data. These issues become
    magnified when you start to average MAPEs over multiple time series. The MAD/mean
    ratio tries to overcome this problem by dividing the MAD by the mean—essentially
    rescaling the error to make it comparable across time series of varying scales.
    The statistic is calculated exactly as the name suggests—it is simply the MAD
    divided by the mean (Stellwagen 2011).

    - *The Geometric Mean Relative Absolute Error (GMRAE)* – This metric is used to
    measure out-of-sample forecast performance. It is calculated using the relative
    error between the naïve model (i.e., next period’s forecast is this period’s actual)
    and the currently selected model. A GMRAE of 0.54 indicates that the size of the
    current model’s error is only 54 percent of the size of the error generated using
    the naïve model for the same data set. Because the GMRAE is based on a relative
    error, it is less scale sensitive than the MAPE and the MAD (Stellwagen 2011).

    - *The symmetric mean absolute percentage error (SMAPE)* – This is a variation
    on the MAPE that is calculated using the average of the absolute value of the
    actual and the absolute value of the forecast in the denominator. This statistic
    is preferred to the MAPE by some and was used as an accuracy measure in several
    forecasting competitions (Stellwagen 2011).


    After selecting the best model for their forecasting solution, data scientists
    usually need to deploy it. In the next section we will take a closer look at the
    deployment process, that is, the method by which you integrate a machine learning
    model into an existing production environment in order to start using it to make
    practical business decisions based on data. It is one of the last stages in the
    machine learning life cycle.


    ## Model Deployment


    Model deployment is the method by which you integrate a machine learning model
    into an existing production environment in order to start using it to make practical
    business decisions based on data. It is one of the last stages in the machine
    learning life cycle and can be one of the most cumbersome. Often, an organization’s
    IT systems are incompatible with traditional model-building languages, forcing
    data scientists and programmers to spend valuable time and brainpower rewriting
    them (Lazzeri 2019c).


    Once we have nailed down the modeling phase and validated the model performance,
    we are ready to go into the deployment phase. In this context, deployment means
    enabling the customer to consume the model by running actual predictions on it
    at large scale.


    Machine learning model deployment is the process by which a machine learning algorithm
    is converted into a web service. We refer to this conversion process as operationalization:
    to operationalize a machine learning model means to transform it into a consumable
    service and embed it into an existing production environment (Lazzeri 2019c).


    Model deployment is a fundamental step of the machine learning model workflow
    (Figure 2.6) because, through machine learning model deployment, companies can
    begin to take full advantage of the predictive and intelligent models they build,
    develop business practices based on their model results, and therefore, transform
    themselves into actual data-driven businesses.'
  mdcn: '## 第2章 ■ 如何设计端到端时间序列预测解决方案


    深度学习神经网络具有三大核心内在能力：


    -   它们能够学习从输入到输出的任意映射关系。

    -   它们支持多输入和多输出。

    -   它们能够自动提取跨越长序列的输入数据中的模式。


    得益于这三个特性，当数据科学家处理更复杂但仍然非常普遍的问题（例如时间序列预测）时，它们能提供巨大帮助。在尝试了不同的时间序列预测模型后，你需要根据你的数据和具体的时间序列场景选择最佳模型。模型选择是模型开发过程中不可或缺的一部分，在下一节中，我们将讨论模型评估如何帮助你找到最能代表你数据的最佳模型，并理解所选模型在未来的表现如何（Lazzeri
    2019b）。


    ## 模型评估


    模型评估在建模步骤中扮演着关键角色。在此步骤中，我们使用真实数据来验证模型及其性能。在建模阶段，我们使用部分可用数据来训练模型。在评估阶段，我们使用剩余的数据来测试模型。实际上，这意味着我们向模型输入新的数据，这些数据经过重构，并包含与训练数据集相同的特征。


    然而，在验证过程中，我们使用模型来预测目标变量，而不是提供可用的目标变量。我们通常将此过程称为模型评分。然后，我们会使用真实的目标值并与预测值进行比较。这里的目标是衡量并最小化预测误差，即预测值与真实值之间的差异。


    量化误差度量至关重要，因为我们希望微调模型并验证误差是否确实在减小。微调模型可以通过修改控制学习过程的模型参数，或通过添加或删除数据特征（称为参数扫描）来实现。实际上，这意味着我们可能需要在特征工程、建模和模型评估阶段之间多次迭代，直到能够将误差降低到所需水平。


    需要强调的是，预测误差永远不会为零，因为没有任何模型能够完美预测每一个结果。然而，业务上存在一个可接受的误差范围。在验证过程中，我们希望确保模型的预测误差处于或优于业务容忍水平。因此，在问题制定阶段开始时设定可容忍误差的水平非常重要。


    有多种方法可以衡量和量化预测误差。具体来说，有一种与时间序列相关的评估技术，特别是针对需求预测：MAPE。MAPE 代表平均绝对百分比误差。通过 MAPE，我们计算每个预测点与该点实际值之间的差异。然后，我们通过计算差异相对于实际值的比例来量化每个点的误差。最后一步，我们对这些值取平均值。用于
    MAPE 的数学公式如下：


    $$MAPE = \left( \frac{1}{n} \sum \frac{|Actual\ Values - Forecasted\ Values|}{|Actual\
    Values|} \right) \times 100$$


    MAPE 对尺度敏感，在处理低销量数据时不应使用。请注意，由于 *Actual Values* 也代表公式的分母，当实际需求为零时，MAPE 是未定义的。此外，当实际值不为零但非常小时，MAPE
    通常会取极端值。这种尺度敏感性使得 MAPE 在作为低销量数据的误差度量时几乎毫无价值。


    这里还有其他几种重要的评估技术需要提及：


    -   *平均绝对偏差 (MAD)* – 该公式以单位衡量误差的大小。MAD 是分析单个项目误差时的良好统计量。但是，如果你对多个项目汇总 MAD，需要注意高销量产品可能会主导结果——稍后会详细讨论。MAPE
    和 MAD 是迄今为止最常用的误差度量统计量。预测文献中有大量替代统计量，其中许多是 MAPE 和 MAD 的变体（Stellwagen 2011）。

    -   *平均绝对偏差 (MAD)/均值比率* – 这是 MAPE 的一种替代方法，更适合间歇性和低销量数据。如前所述，当实际值等于零时无法计算百分比误差，并且在处理低销量数据时可能取极端值。当你开始对多个时间序列平均
    MAPE 时，这些问题会被放大。MAD/均值比率试图通过将 MAD 除以均值来克服这个问题——本质上是重新缩放误差，使其在不同尺度的时间序列之间具有可比性。该统计量的计算正如其名称所示——它就是
    MAD 除以均值（Stellwagen 2011）。

    -   *几何平均相对绝对误差 (GMRAE)* – 该指标用于衡量样本外预测性能。它使用朴素模型（即，下一期的预测是本期的实际值）与当前选定模型之间的相对误差来计算。GMRAE
    为 0.54 表示当前模型的误差大小仅为使用朴素模型对相同数据集生成的误差大小的 54%。由于 GMRAE 基于相对误差，它比 MAPE 和 MAD 对尺度的敏感性更低（Stellwagen
    2011）。

    -   *对称平均绝对百分比误差 (SMAPE)* – 这是 MAPE 的一种变体，其分母使用实际值的绝对值和预测值的绝对值的平均值来计算。一些人更喜欢使用此统计量而非
    MAPE，并且它在几次预测竞赛中被用作准确性度量（Stellwagen 2011）。


    在为预测解决方案选择最佳模型后，数据科学家通常需要部署它。在下一节中，我们将更仔细地研究部署过程，即你将机器学习模型集成到现有生产环境中以开始使用它基于数据做出实际业务决策的方法。这是机器学习生命周期的最后阶段之一。


    ## 模型部署


    模型部署是你将机器学习模型集成到现有生产环境中以开始使用它基于数据做出实际业务决策的方法。它是机器学习生命周期的最后阶段之一，也可能是最繁琐的阶段之一。通常，组织的
    IT 系统与传统的模型构建语言不兼容，迫使数据科学家和程序员花费宝贵的时间和精力重写它们（Lazzeri 2019c）。


    一旦我们确定了建模阶段并验证了模型性能，我们就准备好进入部署阶段。在此上下文中，部署意味着使客户能够通过大规模运行实际预测来使用该模型。


    机器学习模型部署是将机器学习算法转换为 Web 服务的过程。我们将此转换过程称为操作化：操作化机器学习模型意味着将其转换为可消费的服务并嵌入到现有生产环境中（Lazzeri
    2019c）。


    模型部署是机器学习模型工作流的基本步骤（图 2.6），因为通过机器学习模型部署，公司可以开始充分利用他们构建的预测和智能模型，基于模型结果发展业务实践，从而将自身转变为真正的数据驱动型企业。'

- md: "## Workspace\n\nThe `Workspace` is a Python-based function that you can use\
    \ to experiment, train, and deploy machine learning models. You can import the\
    \ class and create a new workspace by using the following code:\n\n```python\n\
    from azureml.core import Workspace\nws = Workspace.create(name='myworkspace',\n\
    \                     subscription_id='<your-azure-subscription-id>',\n      \
    \               resource_group='myresourcegroup',\n                     create_resource_group=True,\n\
    \                     location='eastus2'\n                     )\n```\n\nIt is\
    \ recommended that you set `create_resource_group` to False if you have a previously\
    \ existing Azure resource group that you want to use for the workspace. Some functions\
    \ might prompt for Azure authentication credentials. For more information on the\
    \ `Workspace` class in Azure ML SDK for Python, visit aka.ms/AzureMLSDK.\n\n##\
    \ Experiment\n\nThe `Experiment` is a cloud resource that embodies a collection\
    \ of trials (individual model runs). The following code fetches an experiment\
    \ object from within `Workspace` by name, or it creates a new experiment object\
    \ if the name does not exist (aka.ms/AzureMLSDK):\n\n```python\nfrom azureml.core.experiment\
    \ import Experiment\nexperiment = Experiment(workspace=ws, name='test-experiment')\n\
    ```\n\nYou can run the following code to get a list of all experiment objects\
    \ contained in `Workspace`, as shown in the code below:\n\n```python\nlist_experiments\
    \ = Experiment.list(ws)\n```\n\nFor more information on the `Experiment` class\
    \ in Azure ML SDK for Python, visit aka.ms/AzureMLSDK.\n\n## Run\n\nThe `Run`\
    \ class represents a single trial of an experiment. A `Run` is an object that\
    \ you use to monitor the asynchronous execution of a trial, store the output of\
    \ the trial, analyze results, and access generated artifacts. You can use a `Run`\
    \ inside your experimentation code to log metrics and artifacts to the `Run History`\
    \ service (aka.ms/AzureMLSDK).\n\nIn the following code, I show how to create\
    \ a run object by submitting an experiment object with a run configuration object:\n\
    \n```python\ntags = {\"prod\": \"phase-1-model-tests\"}\nrun = experiment.submit(config=your_config_object,\
    \ tags=tags)\n```\n\nAs you notice, you can use the `tags` parameter to attach\
    \ custom categories and labels to your runs. Moreover, you can use the static\
    \ list function to get a list of all run objects from an experiment. You need\
    \ to specify the `tags` parameter to filter by your previously created tag:\n\n\
    ```python\nfrom azureml.core.run import Run\nfiltered_list_runs = Run.list(experiment,\
    \ tags=tags)\n```\n\nFor more information on the `Run` class in Azure ML SDK for\
    \ Python, visit aka.ms/AzureMLSDK.\n\n## Model\n\nThe `Model` class is used for\
    \ working with cloud representations of different machine learning models. You\
    \ can use model registration to store and version your models in your workspace\
    \ in the Azure cloud. Registered models are identified by name and version. Each\
    \ time you register a model with the same name as an existing one, the registry\
    \ increments the version (aka.ms/AzureMLSDK).\n\nThe following example shows how\
    \ to build a simple local classification model with scikit-learn, register the\
    \ model in the workspace, and download the model from the cloud:\n\n```python\n\
    from sklearn import svm\nimport joblib\nimport numpy as np\n\n# customer ages\n\
    X_train = np.array([50, 17, 35, 23, 28, 40, 31, 29, 19, 62])\nX_train = X_train.reshape(-1,\
    \ 1)\n# churn y/n\ny_train = [\"yes\", \"no\", \"no\", \"no\", \"yes\", \"yes\"\
    , \"yes\", \"no\", \"no\", \"yes\"]\n\nclf = svm.SVC(gamma=0.001, C=100.)\nclf.fit(X_train,\
    \ y_train)\n\njoblib.dump(value=clf, filename=\"churn-model.pkl\")\n```\n\nMoreover,\
    \ you can use the `register` function to register the model in your workspace:\n\
    \n```python\nfrom azureml.core.model import Model\nmodel = Model.register(workspace=ws,\n\
    \    model_path=\"churn-model.pkl\",\n    model_name=\"churn-model-test\")\n```\n\
    \nAfter you have a registered model, deploying it as a web service is a simple\
    \ process:\n\n1. You need to create and register an image. This step configures\
    \ the Python environment and its dependencies.\n2. As the second step, you need\
    \ create an image.\n3. Finally, you need to attach your image.\n\nFor more information\
    \ on the `Run` class in Azure ML SDK for Python, visit aka.ms/AzureMLSDK.\n\n\
    ## Compute Target, RunConfiguration, and ScriptRunConfig\n\nThe `ComputeTarget`\
    \ class is a parent class for creating and managing compute targets. A compute\
    \ target represents a variety of resources where you can train your machine learning\
    \ models. A compute target can be either a local machine or a cloud resource,\
    \ such as Azure Machine Learning Compute, Azure HDInsight, or a remote virtual\
    \ machine (aka.ms/AzureMLSDK).\n\nFirst of all, you need to set up an `AmlCompute`\
    \ (child class of `ComputeTarget`) target. For the sample below, we can reuse\
    \ the simple scikit-learn churn model and build it into its own file, `train.py`,\
    \ in the current directory (aka.ms/AzureMLSDK). At the end of the file, we create\
    \ a new directory called `outputs` to store your trained model that `joblib.dump()`\
    \ serialized:\n\n```python\n# train.py\nfrom sklearn import svm\nimport numpy\
    \ as np\nimport joblib\nimport os\n\n# customer ages\nX_train = np.array([50,\
    \ 17, 35, 23, 28, 40, 31, 29, 19, 62])\nX_train = X_train.reshape(-1, 1)\n# churn\
    \ y/n\ny_train = [\"cat\", \"dog\", \"dog\", \"dog\", \"cat\", \"cat\", \"cat\"\
    , \"dog\",\n    \"dog\", \"cat\"]\nclf = svm.SVC(gamma=0.001, C=100.)\nclf.fit(X_train,\
    \ y_train)\n```\n\n```python\nos.makedirs(\"outputs\", exist_ok=True)\njoblib.dump(value=clf,\
    \ filename=\"outputs/churn-model.pkl\")\n```\n\nNext, you can create the compute\
    \ target by instantiating a RunConfiguration object and setting the type and size\
    \ (aka.ms/AzureMLSDK):\n\n```python\nfrom azureml.core.runconfig import RunConfiguration\n\
    from azureml.core.compute import AmlCompute\nlist_vms = AmlCompute.supported_vmsizes(workspace=ws)\n\
    compute_config = RunConfiguration()\ncompute_config.target = \"amlcompute\"\n\
    compute_config.amlcompute.vm_size = \"STANDARD_D1_V2\"\n```\n\nNow you are ready\
    \ to submit the experiment by using the ScriptRunConfig and specifying the config\
    \ parameter of the submit() function:\n\n```python\nfrom azureml.core.experiment\
    \ import Experiment\nfrom azureml.core import ScriptRunConfig\nscript_run_config\
    \ = ScriptRunConfig(source_directory=os.getcwd(),\nscript=\"train.py\", run_config=compute_config)\n\
    experiment = Experiment(workspace=ws, name=\"compute_target_test\")\nrun = experiment.submit(config=script_run_config)\n\
    ```\n\nFor more information on these classes in Azure ML SDK for Python, visit\
    \ aka.ms/AzureMLSDK.\n\n## Image and Webservice\n\nThe Image class is a parent\
    \ class for packaging models into container images that include the runtime environment\
    \ and dependencies. The Webservice class is another parent class for creating\
    \ and deploying web services for your models (aka.ms/AzureMLSDK).\n\nThe following\
    \ code shows a basic example of creating an image and using it to deploy a web\
    \ service. The ContainerImage class extends an image and creates a Docker image.\n\
    \n```python\nfrom azureml.core.image import ContainerImage\nimage_config = ContainerImage.image_configuration(execution_script=\"\
    score.py\",\nruntime=\"python\",\nconda_file=\"myenv.yml\",\ndescription=\"test-image-config\"\
    )\n```\n\nIn this example, score.py processes the request/response for the web\
    \ service. The script defines two methods: init() and run().\n\n```python\nimage\
    \ = ContainerImage.create(name=\"test-image\",\nmodels=[model],\nimage_config=image_config,\n\
    workspace=ws)\n```\n\nTo deploy the image as a web service, you first need to\
    \ build a deployment configuration, as shown in the following sample code:\n\n\
    ```python\nfrom azureml.core.webservice import AciWebservice\ndeploy_config =\
    \ AciWebservice.deploy_configuration(cpu_cores=1,\nmemory_gb=1)\n```\n\nAfter,\
    \ you can use the deployment configuration to create a web service, as shown in\
    \ the sample code below:\n\n```python\nfrom azureml.core.webservice import Webservice\n\
    service = Webservice.deploy_from_image(deployment_config=deploy_config,\nimage=image,\n\
    name=service_name,\nworkspace=ws\n)\nservice.wait_for_deployment(show_output=True)\n\
    ```\n\nIn this first part of this chapter, I introduced some of the most important\
    \ classes in the SDK (for more information, visit aka.ms/AzureMLSDK) and common\
    \ design patterns for using them. In the next section, we will look at the machine\
    \ learning deployment on Azure Machine Learning.\n\n## Machine Learning Model\
    \ Deployment\n\nModel deployment is the method of integrating a machine learning\
    \ model into an existing production environment in order to begin developing practical\
    \ business decisions based on data. It is only once models are deployed to production\
    \ that they start adding value, making deployment a crucial step (Lazzeri 2019c).\n\
    \nModel deployment is a fundamental step of the machine learning model workflow\
    \ (Figure 6.1). Through machine learning model deployment, companies can begin\
    \ to take full advantage of the predictive and intelligent models they build and,\
    \ therefore, transform themselves into actual data-driven businesses.\n\nWhen\
    \ we think about machine learning, we focus our attention on key components such\
    \ as data sources, data pipelines, how to test machine learning models at the\
    \ core of our machine learning application, how to engineer our features, and\
    \ which variables to use to make the models more accurate. All these steps are\
    \ important; however, thinking about how we are going to consume those models\
    \ and data over time is also a critical step in the machine learning pipeline.\
    \ We can only begin extracting real value and business benefits from a model’s\
    \ predictions when it has been deployed and operationalized."
  mdcn: "## 工作区\n\n`Workspace` 是一个基于 Python 的函数，可用于实验、训练和部署机器学习模型。你可以导入该类，并使用以下代码创建新的工作区：\n\
    \n```python\nfrom azureml.core import Workspace\nws = Workspace.create(name='myworkspace',\n\
    \                     subscription_id='<your-azure-subscription-id>',\n      \
    \               resource_group='myresourcegroup',\n                     create_resource_group=True,\n\
    \                     location='eastus2'\n                     )\n```\n\n建议在已有要用于工作区的\
    \ Azure 资源组时，将 `create_resource_group` 设置为 False。某些函数可能会提示进行 Azure 身份验证。有关 Azure\
    \ ML SDK for Python 中 `Workspace` 类的更多信息，请访问 aka.ms/AzureMLSDK。\n\n## 实验\n\n`Experiment`\
    \ 是一个云资源，代表一系列试验（单个模型运行）的集合。以下代码通过名称从 `Workspace` 中获取实验对象，如果该名称不存在，则创建一个新的实验对象\
    \ (aka.ms/AzureMLSDK)：\n\n```python\nfrom azureml.core.experiment import Experiment\n\
    experiment = Experiment(workspace=ws, name='test-experiment')\n```\n\n你可以运行以下代码来获取\
    \ `Workspace` 中包含的所有实验对象的列表，如下所示：\n\n```python\nlist_experiments = Experiment.list(ws)\n\
    ```\n\n有关 Azure ML SDK for Python 中 `Experiment` 类的更多信息，请访问 aka.ms/AzureMLSDK。\n\
    \n## 运行\n\n`Run` 类代表实验的一次试验。`Run` 是一个对象，用于监控试验的异步执行、存储试验输出、分析结果以及访问生成的工件。你可以在实验代码中使用\
    \ `Run` 将指标和工件记录到 `Run History` 服务 (aka.ms/AzureMLSDK)。\n\n在以下代码中，我展示了如何通过提交实验对象和运行配置对象来创建运行对象：\n\
    \n```python\ntags = {\"prod\": \"phase-1-model-tests\"}\nrun = experiment.submit(config=your_config_object,\
    \ tags=tags)\n```\n\n如你所见，你可以使用 `tags` 参数为运行附加自定义类别和标签。此外，你可以使用静态列表函数从实验中获取所有运行对象的列表。你需要指定\
    \ `tags` 参数以按之前创建的标签进行筛选：\n\n```python\nfrom azureml.core.run import Run\nfiltered_list_runs\
    \ = Run.list(experiment, tags=tags)\n```\n\n有关 Azure ML SDK for Python 中 `Run`\
    \ 类的更多信息，请访问 aka.ms/AzureMLSDK。\n\n## 模型\n\n`Model` 类用于处理不同机器学习模型的云表示。你可以使用模型注册在\
    \ Azure 云中的工作区存储和版本控制你的模型。注册的模型通过名称和版本进行标识。每次你注册一个与现有模型同名的模型时，注册表会递增版本号 (aka.ms/AzureMLSDK)。\n\
    \n以下示例展示了如何使用 scikit-learn 构建一个简单的本地分类模型，在工作区中注册该模型，并从云端下载该模型：\n\n```python\n\
    from sklearn import svm\nimport joblib\nimport numpy as np\n\n# customer ages\n\
    X_train = np.array([50, 17, 35, 23, 28, 40, 31, 29, 19, 62])\nX_train = X_train.reshape(-1,\
    \ 1)\n# churn y/n\ny_train = [\"yes\", \"no\", \"no\", \"no\", \"yes\", \"yes\"\
    , \"yes\", \"no\", \"no\", \"yes\"]\n\nclf = svm.SVC(gamma=0.001, C=100.)\nclf.fit(X_train,\
    \ y_train)\n\njoblib.dump(value=clf, filename=\"churn-model.pkl\")\n```\n\n此外，你可以使用\
    \ `register` 函数在工作区中注册模型：\n\n```python\nfrom azureml.core.model import Model\n\
    model = Model.register(workspace=ws,\n    model_path=\"churn-model.pkl\",\n  \
    \  model_name=\"churn-model-test\")\n```\n\n拥有注册模型后，将其部署为 Web 服务是一个简单的过程：\n\n\
    1.  你需要创建并注册一个镜像。此步骤配置 Python 环境及其依赖项。\n2.  第二步，你需要创建一个镜像。\n3.  最后，你需要附加你的镜像。\n\
    \n有关 Azure ML SDK for Python 中 `Run` 类的更多信息，请访问 aka.ms/AzureMLSDK。\n\n## 计算目标、运行配置和脚本运行配置\n\
    \n`ComputeTarget` 类是用于创建和管理计算目标的父类。计算目标代表可用于训练机器学习模型的各种资源。计算目标可以是本地机器，也可以是云资源，例如\
    \ Azure Machine Learning Compute、Azure HDInsight 或远程虚拟机 (aka.ms/AzureMLSDK)。\n\
    \n首先，你需要设置一个 `AmlCompute`（`ComputeTarget` 的子类）目标。对于下面的示例，我们可以重用简单的 scikit-learn\
    \ 流失模型，并将其构建到当前目录中的独立文件 `train.py` 中 (aka.ms/AzureMLSDK)。在文件末尾，我们创建一个名为 `outputs`\
    \ 的新目录，用于存储 `joblib.dump()` 序列化的已训练模型：\n\n```python\n# train.py\nfrom sklearn\
    \ import svm\nimport numpy as np\nimport joblib\nimport os\n\n# customer ages\n\
    X_train = np.array([50, 17, 35, 23, 28, 40, 31, 29, 19, 62])\nX_train = X_train.reshape(-1,\
    \ 1)\n# churn y/n\ny_train = [\"cat\", \"dog\", \"dog\", \"dog\", \"cat\", \"\
    cat\", \"cat\", \"dog\",\n    \"dog\", \"cat\"]\nclf = svm.SVC(gamma=0.001, C=100.)\n\
    clf.fit(X_train, y_train)\n```\n\n```python\nos.makedirs(\"outputs\", exist_ok=True)\n\
    joblib.dump(value=clf, filename=\"outputs/churn-model.pkl\")\n```\n\n接下来，你可以通过实例化\
    \ RunConfiguration 对象并设置类型和大小来创建计算目标 (aka.ms/AzureMLSDK)：\n\n```python\nfrom azureml.core.runconfig\
    \ import RunConfiguration\nfrom azureml.core.compute import AmlCompute\nlist_vms\
    \ = AmlCompute.supported_vmsizes(workspace=ws)\ncompute_config = RunConfiguration()\n\
    compute_config.target = \"amlcompute\"\ncompute_config.amlcompute.vm_size = \"\
    STANDARD_D1_V2\"\n```\n\n现在，你可以使用 ScriptRunConfig 并指定 submit() 函数的 config 参数来提交实验：\n\
    \n```python\nfrom azureml.core.experiment import Experiment\nfrom azureml.core\
    \ import ScriptRunConfig\nscript_run_config = ScriptRunConfig(source_directory=os.getcwd(),\n\
    script=\"train.py\", run_config=compute_config)\nexperiment = Experiment(workspace=ws,\
    \ name=\"compute_target_test\")\nrun = experiment.submit(config=script_run_config)\n\
    ```\n\n有关 Azure ML SDK for Python 中这些类的更多信息，请访问 aka.ms/AzureMLSDK。\n\n## 镜像和 Web\
    \ 服务\n\nImage 类是用于将模型打包到包含运行时环境和依赖项的容器镜像中的父类。Webservice 类是另一个父类，用于为你的模型创建和部署 Web\
    \ 服务 (aka.ms/AzureMLSDK)。\n\n以下代码展示了创建镜像并使用其部署 Web 服务的基本示例。ContainerImage 类扩展了镜像并创建了一个\
    \ Docker 镜像。\n\n```python\nfrom azureml.core.image import ContainerImage\nimage_config\
    \ = ContainerImage.image_configuration(execution_script=\"score.py\",\nruntime=\"\
    python\",\nconda_file=\"myenv.yml\",\ndescription=\"test-image-config\")\n```\n\
    \n在此示例中，score.py 处理 Web 服务的请求/响应。该脚本定义了两个方法：init() 和 run()。\n\n```python\nimage\
    \ = ContainerImage.create(name=\"test-image\",\nmodels=[model],\nimage_config=image_config,\n\
    workspace=ws)\n```\n\n要将镜像部署为 Web 服务，你首先需要构建部署配置，如以下示例代码所示：\n\n```python\nfrom\
    \ azureml.core.webservice import AciWebservice\ndeploy_config = AciWebservice.deploy_configuration(cpu_cores=1,\n\

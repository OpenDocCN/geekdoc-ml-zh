    \n我们可以将此时间序列数据集重构为窗口宽度为1的监督学习问题。这意味着我们将使用Value 1和Value 2的前一时间步长值。同时，我们也能获取Value\
    \ 1的下一时间步长值。随后，我们将预测Value 2的下一时间步长值。如图1.9所示，这将为每个训练模式提供三个输入特征和一个待预测的输出值。\n\n![](img/fd006a6c056e5cf905b5150f958ed477_39_0.png)\n\
    \n**图1.9：** 作为监督学习问题的多元时间序列\n\n在图1.9的示例中，我们预测了两个不同的输出变量（Value 1和Value 2），但数据科学家通常需要为单个输出变量预测多个未来时间步长。这被称为*多步预测*。在多步预测中，数据科学家需要指定要预测的未来时间步长数量，在时间序列中也称为*预测范围*。多步预测通常呈现两种不同格式：\n\
    \n- *单步预测：* 当数据科学家需要预测下一个时间步长（$t + 1$）时\n- *多步预测：* 当数据科学家需要预测两个或更多（$n$）未来时间步长（$t\
    \ + n$）时\n\n例如，需求预测模型会根据截至当前的销售数据，预测商品下周及未来两周的销售量。在股票市场中，根据截至今日的股价，可以预测未来24小时和48小时的股价。使用天气预报引擎，可以预测未来一天及整周的天气（Brownlee\
    \ 2017）。\n\n滑动窗口方法也可应用于多步预测解决方案，将其转化为监督学习问题。如图1.10所示，我们可以使用与图1.8相同的单变量时间序列数据集作为示例，并将其构建为窗口宽度为1的监督学习两步预测数据集（Brownlee\
    \ 2017）。\n\n![](img/fd006a6c056e5cf905b5150f958ed477_40_0.png)\n\n如图1.10所示，数据科学家无法使用此样本数据集的第一行（时间戳01/01/2020）和倒数第二行（时间戳01/04/2020）来训练其监督模型；因此我们建议将其移除。此外，这个新版本的监督数据集仅包含一个变量Value\
    \ x，数据科学家可利用它来预测最后一行（时间戳01/05/2020）的Value y和Value y²。\n\n在下一节中，你将了解用于时间序列数据的不同Python库，以及pandas、statsmodels和scikit-learn等库如何分别帮助你进行数据处理、时间序列建模和机器学习。\n\

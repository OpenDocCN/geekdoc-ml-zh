- md: '## Modeling Building and Selection


    The modeling phase is where the conversion of the data into a model takes place.
    In the core of this process there are advanced algorithms that scan the historical
    data (training data), extract patterns, and build a model. That model can be later
    used to predict on new data that has not been used to build the model.


    Once we have a working reliable model, we can then use it to score new data that
    is structured to include the required features. The scoring process will make
    use of the persisted model (object from the training phase) and predict the target
    variable.


    At this point, it is also important to distinguish between train, validation,
    and test sets in machine learning, as illustrated in Figure 2.5.


    ![](img/fd006a6c056e5cf905b5150f958ed477_61_0.png)


    - *Train data set* – The train data set represents the amount of data that data
    scientists decide to use to fit machine learning models. Through the train data
    set, a machine learning algorithm can be trained to learn from historical data
    in order to predict future data points.

    - *Validation data set* – The validation data set is the amount of data used to
    offer an unbiased evaluation of a model fit on the train data set, while tuning
    model hyperparameters. Data scientists usually leverage validation data sets to
    fine-tune a machine learning model hyperparameters. Hyperparameters are additional
    factors in the model, whose values are used to control, and eventually improve,
    the learning process of the model itself. Data scientists observe the validation
    set results to update the levels of hyperparameters and, consequently, improve
    their models.

    - *Test data set* – The test data set is the amount of data used to determine
    whether a model is underfitting (the model is performing poorly on the train data
    set) or overfitting (the model is performing well on the train data set but not
    on the test data set) the train data by looking at the prediction error on the
    train and test data sets. The test data set is only used once a model is completely
    trained and validated through the train and validation data sets. Data scientists
    usually leverage the test data set to evaluate different machine learning models.


    Now that you understand better the difference between these data sets, it is also
    important to look for recommendations on how to split our data set into train,
    validation, and test sets. This decision mainly depends on two factors:


    - The total number of samples in our data

    - The actual model you are training.


    Some models need substantial data to train upon, so in this case we would need
    to optimize for the larger training sets. Models with very few hyperparameters
    will be easy to validate and tune, so we can probably reduce the size of our validation
    set, but if our model has many hyperparameters, we would want to have a large
    validation set as well. Also, if we have to deal with a model with no hyperparameters
    or ones that cannot be easily tuned, we probably won’t need a validation data
    set. All in all, like many other things in machine learning, the train-test-validation
    split ratio is also quite specific to your use case (Lazzeri 2019b).


    In the following sections, we will discuss some of the most popular classical
    time series techniques and deep learning methods and how they can be applied to
    your data to build, train, test, and validate your forecasting models. Some of
    these techniques will be discussed in more detail in Chapter 4 and Chapter 5.


    ## An Overview of Demand Forecasting Modeling Techniques


    The ability to accurately forecast a sequence into the future is critical in many
    industries: finance, supply chain, and manufacturing are just a few examples.
    Classical time series techniques have served this task for decades, but now deep
    learning methods—similar to those used in computer vision and automatic translation—have
    the potential to revolutionize time series forecasting as well (Lazzeri 2019b).


    In the case of demand forecasting, we make use of historical data, which is ordered
    by time. We generally refer to data that includes the time dimension as time series.
    The goal in time series modeling is to find time-related trends, seasonality,
    and autocorrelation (correlation over time) and formulate those into a model.


    In recent years advanced algorithms have been developed to accommodate time series
    forecasting and to improve forecasting accuracy. I briefly discuss a few of them
    here. This information is not intended to be used as a machine learning and forecasting
    overview but rather as a short survey of modeling techniques that are commonly
    used for demand forecasting.


    - *Moving average (MA)* – This is one of the first analytical techniques that
    has been used for time series forecasting, and it is still one of the most commonly
    used techniques as of today. It is also the foundation for more advanced forecasting
    techniques. With moving average, we are forecasting the next data point by averaging
    over the K most recent points, where K denotes the order of the moving average.
    The moving average technique has the effect of smoothing the forecast and therefore
    may not handle well large volatility in the data.

    - *Exponential smoothing* – This is a family of various methods that use weighted
    average of recent data points to predict the next data point. The idea is to assign
    higher weights to more recent values and gradually decrease this weight for older
    measured values. There are a number of different methods within this family, including
    handling of seasonality in the data such as the Holt-Winters Seasonal Method.
    Some of these methods also factor in the seasonality of the data.

    - *Autoregressive Integrated Moving Average (ARIMA)* – This is another family
    of methods that is commonly used for time series forecasting. It practically combines
    autoregression methods with moving average. Autoregression methods use regression
    models by taking previous time series values in order to compute the next date
    point. ARIMA methods also apply differencing methods that include calculating
    the difference between data points and using those instead of the original measured
    value. Finally, ARIMA also makes use of the moving average techniques that are
    discussed above. The combination of all of these methods in various ways is what
    constructs the family of ARIMA methods. ETS and ARIMA are widely used today for
    demand forecasting and many other forecasting problems. In many cases, these are
    combined together to deliver very accurate results.

    - *General multiple regression* – This could be the most important modeling approach
    within the domain of machine learning and statistics. In the context of time series,
    we use regression to predict the future values (for example, of demand). In regression,
    we take a linear combination of the predictors and learn the weights (also referred
    to as coefficients) of those predictors during the training process. The goal
    is to produce a regression line that will forecast our predicted value. Regression
    methods are suitable when the target variable is numeric and therefore also fits
    time series forecasting. There is a wide range of regression methods, including
    very simple regression models such as linear regression and more advanced ones
    such as decision trees, random forests, neural networks, and boosted decision
    trees.


    Due to their applicability to many real-life problems, such as fraud detection,
    spam email filtering, finance, and medical diagnosis, and their ability to produce
    actionable results, deep learning neural networks have gained a lot of attention
    in recent years. Generally, deep learning methods have been developed and applied
    to univariate time series forecasting scenarios, where the time series consists
    of single observations recorded sequentially over equal time increments (Lazzeri
    2019a).


    For this reason, they have often performed worse than naïve and classical forecasting
    methods, such as exponential smoothing and ARIMA. This has led to a general misconception
    that deep learning models are inefficient in time series forecasting scenarios,
    and many data scientists wonder whether it’s really necessary to add another class
    of methods, like convolutional neural networks or recurrent neural networks, to
    their time series toolkit. Deep learning is a subset of machine learning algorithms
    that learn to extract these features by representing input data as vectors and
    transforming them with a series of clever linear algebra operations into a given
    output (Lazzeri 2019a).


    Data scientists then evaluate whether the output is what they expected using an
    equation called loss function. The goal of the process is to use the result of
    the loss function from each training input to guide the model to extract features
    that will result in a lower loss value on the next pass. This process has been
    used to cluster and classify large volumes of information, like millions of satellite
    images; thousands of video and audio recordings from YouTube, and historical,
    textual, and sentiment data from Twitter.'
  mdcn: '## 建模与选择


    建模阶段是将数据转换为模型的过程。该过程的核心是先进的算法，它们扫描历史数据（训练数据），提取模式，并构建模型。该模型随后可用于对未用于构建模型的新数据进行预测。


    一旦我们有了一个可靠的工作模型，我们就可以用它来对包含所需特征的新数据进行评分。评分过程将使用持久化的模型（来自训练阶段的对象）来预测目标变量。


    此时，区分机器学习中的训练集、验证集和测试集也很重要，如图2.5所示。


    ![](img/fd006a6c056e5cf905b5150f958ed477_61_0.png)


    - *训练数据集* – 训练数据集代表数据科学家决定用于拟合机器学习模型的数据量。通过训练数据集，可以训练机器学习算法从历史数据中学习，以预测未来的数据点。

    - *验证数据集* – 验证数据集是用于在调整模型超参数时，对在训练数据集上拟合的模型提供无偏评估的数据量。数据科学家通常利用验证数据集来微调机器学习模型的超参数。超参数是模型中的附加因素，其值用于控制并最终改进模型本身的学习过程。数据科学家观察验证集的结果来更新超参数的水平，从而改进他们的模型。

    - *测试数据集* – 测试数据集是用于通过查看训练和测试数据集上的预测误差，来确定模型是欠拟合（模型在训练数据集上表现不佳）还是过拟合（模型在训练数据集上表现良好，但在测试数据集上表现不佳）的数据量。测试数据集仅在模型通过训练和验证数据集完全训练和验证后才使用。数据科学家通常利用测试数据集来评估不同的机器学习模型。


    既然你更好地理解了这些数据集之间的区别，那么了解如何将数据集划分为训练集、验证集和测试集的建议也很重要。这个决定主要取决于两个因素：


    - 我们数据中的样本总数

    - 你正在训练的实际模型。


    一些模型需要大量数据进行训练，因此在这种情况下，我们需要为更大的训练集进行优化。超参数很少的模型将易于验证和调整，因此我们可能可以减少验证集的大小，但如果我们的模型有许多超参数，我们也会希望拥有一个大的验证集。此外，如果我们必须处理没有超参数或超参数不易调整的模型，我们可能就不需要验证数据集。总而言之，与机器学习中的许多其他事情一样，训练-测试-验证的划分比例也相当具体于你的用例（Lazzeri
    2019b）。


    在接下来的章节中，我们将讨论一些最流行的经典时间序列技术和深度学习方法，以及如何将它们应用于你的数据，以构建、训练、测试和验证你的预测模型。其中一些技术将在第4章和第5章中更详细地讨论。


    ## 需求预测建模技术概述


    准确预测未来序列的能力在许多行业至关重要：金融、供应链和制造业只是几个例子。经典的时间序列技术已经为这项任务服务了几十年，但现在深度学习方法——类似于计算机视觉和自动翻译中使用的方法——也有潜力彻底改变时间序列预测（Lazzeri
    2019b）。


    在需求预测的情况下，我们使用按时间排序的历史数据。我们通常将包含时间维度的数据称为时间序列。时间序列建模的目标是找到与时间相关的趋势、季节性和自相关性（随时间变化的相关性），并将这些形式化为一个模型。


    近年来，已经开发了先进的算法来适应时间序列预测并提高预测准确性。我在这里简要讨论其中一些。这些信息并非旨在作为机器学习和预测的概述，而是作为需求预测中常用建模技术的简要调查。


    - *移动平均（MA）* – 这是最早用于时间序列预测的分析技术之一，至今仍是最常用的技术之一。它也是更高级预测技术的基础。通过移动平均，我们通过平均最近的K个数据点来预测下一个数据点，其中K表示移动平均的阶数。移动平均技术具有平滑预测的效果，因此可能无法很好地处理数据中的大幅波动。

    - *指数平滑* – 这是一系列使用最近数据点的加权平均值来预测下一个数据点的方法。其思想是为较新的值分配更高的权重，并为较旧的测量值逐渐降低此权重。该系列中有多种不同的方法，包括处理数据中的季节性，如Holt-Winters季节性方法。其中一些方法也考虑了数据的季节性。

    - *自回归积分移动平均（ARIMA）* – 这是另一种常用于时间序列预测的方法系列。它实际上将自回归方法与移动平均相结合。自回归方法使用回归模型，通过取先前的时间序列值来计算下一个日期点。ARIMA方法还应用差分方法，包括计算数据点之间的差值并使用这些差值代替原始测量值。最后，ARIMA还使用了上面讨论的移动平均技术。所有这些方法以不同方式组合构成了ARIMA方法系列。ETS和ARIMA目前广泛用于需求预测和许多其他预测问题。在许多情况下，它们被组合在一起以提供非常准确的结果。

    - *广义多元回归* – 这可能是机器学习和统计学领域中最重要的建模方法。在时间序列的背景下，我们使用回归来预测未来的值（例如需求）。在回归中，我们取预测变量的线性组合，并在训练过程中学习这些预测变量的权重（也称为系数）。目标是产生一条回归线来预测我们的预测值。当目标变量是数值型时，回归方法是合适的，因此也适用于时间序列预测。回归方法范围广泛，包括非常简单的回归模型（如线性回归）和更高级的模型（如决策树、随机森林、神经网络和提升决策树）。


    由于其适用于许多现实问题，如欺诈检测、垃圾邮件过滤、金融和医学诊断，以及其产生可操作结果的能力，深度学习神经网络近年来受到了广泛关注。通常，深度学习方法已被开发并应用于单变量时间序列预测场景，其中时间序列由在相等时间增量上顺序记录的单个观测值组成（Lazzeri
    2019a）。


    因此，它们通常比朴素和经典预测方法（如指数平滑和ARIMA）表现更差。这导致了一种普遍的误解，即深度学习模型在时间序列预测场景中效率低下，许多数据科学家想知道是否真的有必要在他们的时间序列工具包中添加另一类方法，如卷积神经网络或循环神经网络。深度学习是机器学习算法的一个子集，它通过将输入数据表示为向量，并通过一系列巧妙的线性代数运算将其转换为给定输出来学习提取这些特征（Lazzeri
    2019a）。


    然后，数据科学家使用称为损失函数的方程来评估输出是否符合预期。该过程的目标是使用每次训练输入的损失函数结果来指导模型提取特征，以便在下一次传递中产生更低的损失值。这个过程已被用于聚类和分类大量信息，如数百万张卫星图像；来自YouTube的数千个视频和音频记录，以及来自Twitter的历史、文本和情感数据。'

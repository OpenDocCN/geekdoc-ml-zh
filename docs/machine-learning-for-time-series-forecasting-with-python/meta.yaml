  md: 'Time series analysis is used for many applications such as process and quality
    control, utility studies, and census analysis. It is usually considered the first
    step to analyze and prepare your time series data for the modeling step, which
    is properly called *time series forecasting*.


    Time series forecasting involves taking machine learning models, training them
    on historical time series data, and consuming them to forecast future predictions.
    As illustrated in Figure 1.3, in time series forecasting that future output is
    unknown, and it is based on how the machine learning model is trained on the historical
    input data.


    ![](img/fd006a6c056e5cf905b5150f958ed477_24_0.png)


    Different historical and current phenomena may affect the values of your data
    in a time series, and these events are diagnosed as components of a time series.
    It is very important to recognize these different influences or components and
    decompose them in order to separate them from the data levels.


    As illustrated in Figure 1.4, there are four main categories of components in
    time series analysis: *long-term movement or trend*, *seasonal short-term movements*,
    *cyclic short-term movements*, and *random or irregular fluctuations*.


    ![](img/fd006a6c056e5cf905b5150f958ed477_24_1.png)'
  merge: -1
  pgno: 24
- img_proc: true
  md: "# Chapter 1 ■ Overview of Time Series Forecasting\n\nLet’s have a closer look\
    \ at these four components:\n\n+   - *Long-term movement* or *trend* refers to\
    \ the overall movement of time series values to increase or decrease during a\
    \ prolonged time interval. It is common to observe trends changing direction throughout\
    \ the course of your time series data set: they may increase, decrease, or remain\
    \ stable at different moments. However, overall you will see one primary trend.\
    \ Population counts, agricultural production, and items manufactured are just\
    \ some examples of when trends may come into play.\n- There are two different\
    \ types of *short-term movements*:\n    - *Seasonal variations* are periodic temporal\
    \ fluctuations that show the same variation and usually recur over a period of\
    \ less than a year. Seasonality is always of a fixed and known period. Most of\
    \ the time, this variation will be present in a time series if the data is recorded\
    \ hourly, daily, weekly, quarterly, or monthly. Different social conventions (such\
    \ as holidays and festivities), weather seasons, and climatic conditions play\
    \ an important role in seasonal variations, like for example the sale of umbrellas\
    \ and raincoats in the rainy season and the sale of air conditioners in summer\
    \ seasons.\n    - *Cyclic variations*, on the other side, are recurrent patterns\
    \ that exist when data exhibits rises and falls that are not of a fixed period.\
    \ One complete period is a cycle, but a cycle will not have a specific predetermined\
    \ length of time, even if the duration of these temporal fluctuations is usually\
    \ longer than a year. A classic example of cyclic variation is a business cycle,\
    \ which is the downward and upward movement of gross domestic product around its\
    \ long-term growth trend: it usually can last several years, but the duration\
    \ of the current business cycle is unknown in advance.\n\nAs illustrated in Figure\
    \ 1.5, cyclic variations and seasonal variations are part of the same short-term\
    \ movements in time series forecasting, but they present differences that data\
    \ scientists need to identify and leverage in order to build accurate forecasting\
    \ models:\n\n![](img/fd006a6c056e5cf905b5150f958ed477_25_0.png)"

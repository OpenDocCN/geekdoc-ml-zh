  - '[PAGE 155]


    In this section of Chapter 4, you learned how to leverage Automated ML for your
    time series scenario. To learn more how to use Automated ML for classification,
    regression, and forecasting scenarios, you can visit aka.ms/AutomatedML.


    # Conclusion


    In this chapter, you learned how to train a time series forecasting regression
    model using autoregressive methods and Automated ML in Azure Machine Learning.

    Specifically, we looked at the following methods:


    +   - *Autoregression* – This time series technique assumes that future observations
    at next time stamp are related to the observations at prior time stamps through
    a linear relationship.

    - *Moving Average* – This time series technique leverages previous forecast errors
    in a regression approach to forecast future observations at next time stamps.
    Together with the autoregression technique, the moving average approach is a crucial
    element of the more general autoregressive moving average and autoregressive integrated
    moving average models, which present a more sophisticated stochastic configuration.

    - *Autoregressive Moving Average* – This time series technique assumes that future
    observations at next time stamp can be represented as a linear function of the
    observations and residual errors at prior time stamps.

    - *Autoregressive Integrated Moving Average* – This time series technique assumes
    that future observations at next time stamp can be represented as a linear function
    of the differenced observations and residual errors at prior time stamps.

    - *Automated ML* – This time series technique iterates through a portfolio of
    different machine learning algorithms for time series forecasting while performing
    best model selection, hyperparameters tuning, and feature engineering for your
    scenario.


    In the next chapter we will learn how to use and apply deep learning methods to
    time series scenarios.'
- md: "## CHAPTER 5\n\n## Introduction to Neural Networks for Time Series Forecasting\n\
    \nAs we discussed in the previous chapters, the ability to accurately forecast\
    \ a sequence into the future is critical in many industries: finance, supply chain,\
    \ and manufacturing are just a few examples. Classical time series techniques\
    \ have served this task for decades, but now deep learning methods—similar to\
    \ those used in computer vision and automatic translation—have the potential to\
    \ revolutionize time series forecasting as well.\n\nDue to their applicability\
    \ to many real-life problems, such as fraud detection, spam email filtering, finance,\
    \ and medical diagnosis, and their ability to produce actionable results, deep\
    \ learning neural networks have gained a lot of attention in recent years. Generally,\
    \ deep learning methods have been developed and applied to univariate time series\
    \ forecasting scenarios, where the time series consists of single observations\
    \ recorded sequentially over equal time increments (Lazzeri 2020).\n\nFor this\
    \ reason, they have often performed worse than naïve and classical forecasting\
    \ methods, such as autoregressive integrated moving average (ARIMA). This has\
    \ led to a general misconception that deep learning models are inefficient in\
    \ time series forecasting scenarios, and many data scientists wonder whether it’s\
    \ really necessary to add another class of methods, like convolutional neural\
    \ networks or recurrent neural networks, to their time-series toolkit (Lazzeri\
    \ 2020).\n\nIn this chapter, we discuss some of the practical reasons data scientists\
    \ may still think about deep learning when they build time series forecasting\
    \ solutions. Specifically, we will take a closer look at the following important\
    \ topics:\n\n- *Reasons to Add Deep Learning to Your Time Series Toolkit* – Deep\
    \ learning neural networks are able to automatically learn arbitrary complex mappings\
    \ from inputs to outputs and support multiple inputs and outputs. These are powerful\
    \ features that offer a lot of promise for time series forecasting, particularly\
    \ on problems with complex-nonlinear dependencies, multivalent inputs, and multi-step\
    \ forecasting. These features, along with the capabilities of more modern neural\
    \ networks, may offer great promise, such as the automatic feature learning provided\
    \ by convolutional neural networks and the native support for sequence data in\
    \ recurrent neural networks. In this section, you will discover the promised capabilities\
    \ of deep learning neural networks for time series forecasting. Specifically,\
    \ we will discuss the following deep learning methods’ capabilities:\n    - Deep\
    \ learning neural networks are capable of automatically learning and extracting\
    \ features from raw and imperfect data.\n    - Deep learning supports multiple\
    \ inputs and outputs.\n    - Recurrent neural networks—specifically long short-term\
    \ memory (LSTM) networks—are good at extracting patterns in input data that span\
    \ over relatively long sequences.\n- *Recurrent Neural Networks for Time Series\
    \ Forecasting* – In this section I will introduce a very popular type of artificial\
    \ neural networks: recurrent neural networks, also known as RNNs. Recurrent neural\
    \ networks are a class of neural networks that allow previous outputs to be used\
    \ as inputs while having hidden states.\n- *How to Develop GRUs and LSTMs for\
    \ Time Series Forecasting* – In this final section of Chapter 5, you will learn\
    \ how to prepare your data for deep learning models and develop GRU models for\
    \ a range of time series forecasting problems.\n\n## Reasons to Add Deep Learning\
    \ to Your Time Series Toolkit\n\nThe goal of machine learning is to find features\
    \ to train a model that transforms input data (such as pictures, time series,\
    \ or audio) to a given output (such as captions, price values, or transcriptions).\
    \ Deep learning is a subset of machine learning algorithms that learn to extract\
    \ these features by representing input data as vectors and transforming them with\
    \ a series of linear algebra operations into a given output. In order to clarify\
    \ further the difference between deep learning and machine learning, let's start\
    \ by defining each of these two fields of study separately:\n\n- *Machine learning*\
    \ is the practice of using an algorithm to break up data, learn from it, and then\
    \ use this data to make some predictions about a certain phenomenon. The learning\
    \ process is generally based on the following steps:\n    1. We feed our algorithm\
    \ with data.\n    2. We then use this data to teach our model how to learn from\
    \ previous observations.\n    3. We run a test to check if our model has learned\
    \ enough from previous observations and we evaluate its performance.\n    4. If\
    \ the model is performing well (based on our expectations and requirements), we\
    \ deploy and push it into production, making it available to other stakeholders\
    \ in the organization or outside the business.\n    5. Finally, we consume our\
    \ deployed model to perform a certain automated predictive task.\n\n- *Deep learning*\
    \ is a subset of machine learning. Deep learning algorithms are specific types\
    \ of machine learning algorithms that are based on artificial neural networks.\
    \ In this case, the learning process is based on the same steps as those for machine\
    \ learning, but it is called deep because the structure of algorithm is based\
    \ on artificial neural networks that consist of multiple input, output, and hidden\
    \ layers, containing units that transform the input data into an information that\
    \ the next layer can use to perform a certain automated predictive task once the\
    \ deep learning model is deployed.\n\nIt is important to compare the two techniques\
    \ and understand the main differences. The key differences between machine learning\
    \ and deep learning are summarized in Table 5.1.\n\n**Table 5.1:** Key differences\
    \ between machine learning and deep learning\n\n| CHARACTERISTIC CATEGORY | ALL\
    \ MACHINE LEARNING | ONLY DEEP LEARNING |\n| :--- | :--- | :--- |\n| **Number\
    \ of data points** | Can use small amounts of data to make predictions. | Needs\
    \ to use large amounts of training data to make predictions. |\n| **Hardware dependencies**\
    \ | Can work on low-end machines. It doesn't need a large amount of computational\
    \ power. | Depends on high-end machines. It inherently does a large number of\
    \ matrix multiplication operations. A GPU can efficiently optimize these operations.\
    \ |\n| **Featurization process** | Requires features to be accurately identified\
    \ and created by users. | Learns high-level features from data and creates new\
    \ features by itself. |\n| **Learning approach** | Divides the learning process\
    \ into smaller steps. It then combines the results from each step into one output.\
    \ | Moves through the learning process by resolving the problem on an end-to-end\
    \ basis. |\n| **Execution time** | Takes comparatively little time to train, ranging\
    \ from a few seconds to a few hours. | Usually takes a long time to train because\
    \ a deep learning algorithm involves many layers. |\n| **Output** | The output\
    \ is usually a numerical value, like a score or a classification. | The output\
    \ can have multiple formats, like a text, a score, or a sound. |\n\nSource: aka.ms/deeplearningvsmachinelearning\n\
    \nData scientists then evaluate whether the output is what they expected, using\
    \ an equation called loss function. The goal of the process is to use the result\
    \ of the loss function from each training input to guide the model to extract\
    \ features that will result in a lower loss value on the next pass (Lazzeri 2019a).\
    \ Deep learning neural networks have three main intrinsic capabilities:\n\n- Deep\
    \ learning neural networks are capable of automatically learning and extracting\
    \ features from raw and imperfect data.\n- Deep learning supports multiple inputs\
    \ and outputs.\n- Recurrent neural networks—specifically long short-term memory\
    \ (LSTM) networks and gated recurrent units (GRUs)—are good at extracting patterns\
    \ in input data that span over relatively long sequences.\n\nThanks to these three\
    \ characteristics, they can offer a lot of help when data scientists deal with\
    \ more complex but still very common problems, such as time series forecasting\
    \ (Lazzeri 2019a).\n\n## Deep Learning Neural Networks Are Capable of Automatically\
    \ Learning and Extracting Features from Raw and Imperfect Data\n\nTime series\
    \ is a type of data that measures how things change over time. In time series,\
    \ time isn’t just a metric, but a primary axis. This additional dimension represents\
    \ both an opportunity and a constraint for time series data because"
  mdcn: "## 第五章\n\n## 时间序列预测的神经网络导论\n\n正如我们在前几章所讨论的，准确预测未来序列的能力在许多行业中至关重要：金融、供应链和制造业只是其中几个例子。经典的时间序列技术已经为这项任务服务了几十年，但现在，深度学习方法——类似于计算机视觉和自动翻译中使用的方法——也有潜力彻底改变时间序列预测。\n\
    \n由于深度学习神经网络适用于许多现实问题，例如欺诈检测、垃圾邮件过滤、金融和医疗诊断，并且能够产生可操作的结果，近年来受到了广泛关注。通常，深度学习方法已被开发并应用于单变量时间序列预测场景，其中时间序列由在相等时间增量上顺序记录的单个观测值组成（Lazzeri\
    \ 2020）。\n\n因此，它们的表现往往不如朴素和经典的预测方法，例如自回归积分移动平均（ARIMA）。这导致了一种普遍的误解，即深度学习模型在时间序列预测场景中效率低下，许多数据科学家想知道是否真的有必要在他们的时间序列工具包中添加另一类方法，如卷积神经网络或循环神经网络（Lazzeri\
    \ 2020）。\n\n在本章中，我们将讨论数据科学家在构建时间序列预测解决方案时可能仍然考虑深度学习的一些实际原因。具体来说，我们将仔细研究以下重要主题：\n\
    \n- *将深度学习添加到时间序列工具包的理由* – 深度学习神经网络能够自动学习从输入到输出的任意复杂映射，并支持多个输入和输出。这些是强大的特性，为时间序列预测提供了巨大的前景，特别是在具有复杂非线性依赖关系、多值输入和多步预测的问题上。这些特性，加上更现代神经网络的能力，可能提供巨大的前景，例如卷积神经网络提供的自动特征学习，以及循环神经网络对序列数据的原生支持。在本节中，你将发现深度学习神经网络在时间序列预测方面的承诺能力。具体来说，我们将讨论以下深度学习方法的能力：\n\
    \    - 深度学习神经网络能够从原始和不完美的数据中自动学习和提取特征。\n    - 深度学习支持多个输入和输出。\n    - 循环神经网络——特别是长短期记忆（LSTM）网络——擅长提取输入数据中跨越相对较长序列的模式。\n\
    - *用于时间序列预测的循环神经网络* – 在本节中，我将介绍一种非常流行的人工神经网络类型：循环神经网络，也称为RNN。循环神经网络是一类允许先前输出用作输入同时具有隐藏状态的神经网络。\n\
    - *如何为时间序列预测开发GRU和LSTM* – 在第五章的最后这一节，你将学习如何为深度学习模型准备数据，并为一系列时间序列预测问题开发GRU模型。\n\
    \n## 将深度学习添加到时间序列工具包的理由\n\n机器学习的目标是找到特征来训练一个模型，将输入数据（如图像、时间序列或音频）转换为给定的输出（如标题、价格值或转录）。深度学习是机器学习算法的一个子集，它通过将输入数据表示为向量，并通过一系列线性代数运算将其转换为给定输出来学习提取这些特征。为了进一步阐明深度学习和机器学习之间的区别，让我们首先分别定义这两个研究领域：\n\
    \n- *机器学习*是使用算法分解数据、从中学习，然后利用这些数据对某种现象进行预测的实践。学习过程通常基于以下步骤：\n    1. 我们向算法输入数据。\n\
    \    2. 然后我们使用这些数据来教我们的模型如何从先前的观测中学习。\n    3. 我们运行测试以检查我们的模型是否从先前的观测中学到了足够的东西，并评估其性能。\n\
    \    4. 如果模型表现良好（基于我们的期望和要求），我们将其部署并投入生产，使其可供组织内或外部的其他利益相关者使用。\n    5. 最后，我们使用部署的模型来执行某个自动预测任务。\n\
    \n- *深度学习*是机器学习的一个子集。深度学习算法是基于人工神经网络的特定类型的机器学习算法。在这种情况下，学习过程基于与机器学习相同的步骤，但之所以称为“深度”，是因为算法的结构基于由多个输入层、输出层和隐藏层组成的人工神经网络，这些层包含将输入数据转换为下一层可以使用的信息的单元，以便在深度学习模型部署后执行某个自动预测任务。\n\
    \n比较这两种技术并理解主要区别非常重要。机器学习和深度学习之间的主要区别总结在表5.1中。\n\n**表5.1：** 机器学习与深度学习的关键区别\n\n\
    | 特征类别 | 所有机器学习 | 仅深度学习 |\n| :--- | :--- | :--- |\n| **数据点数量** | 可以使用少量数据进行预测。\

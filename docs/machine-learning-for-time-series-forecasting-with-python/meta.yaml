    \n# This example uses CPU VM. For using GPU VM, set SKU to STANDARD_NC6\nvm_size\
    \ = os.environ.get(\"AML_COMPUTE_CLUSTER_SKU\", \"STANDARD_D2_V2\")\n\nif compute_name\

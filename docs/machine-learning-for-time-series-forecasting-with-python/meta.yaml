    In the example of Figure 1.9, we were predicting two different output variables
    (Value 1 and Value 2), but very often data scientists need to predict multiple
    time steps ahead for one output variable. This is called *multi-step forecasting*.
    In multi-step forecasting, data scientists need to specify the number of time
    steps ahead to be forecasted, also called *forecast horizon* in time series. Multi-step
    forecasting usually presents two different formats:


    +   - *One-step forecast:* When data scientists need to predict the next time
    step ($t + 1$)

    - *Multi-step forecast:* When data scientists need to predict two or more ($n$)
    future time steps ($t + n$)


    For example, demand forecasting models predict the quantity of an item that will
    be sold the following week and the following two weeks given the sales up until
    the current week. In the stock market, given the stock prices up until today one

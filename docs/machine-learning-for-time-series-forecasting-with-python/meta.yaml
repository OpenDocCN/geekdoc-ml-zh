    to measure forecast accuracy. As the name denotes, it is the mean of the absolute
    error: the absolute error is the absolute value of the difference between the
    forecasted value and the actual value, and it is scale-dependent: The fact that
    this metric is not scaled to the average demand can represent a limitation for
    data scientists who need to compare accuracy across time series with different
    scales. For time series forecasting scenarios, data scientists can also use the
    mean absolute percentage error (MAPE) to compare the fits of different forecasting
    and smoothing methods. This metric expresses accuracy as a percentage of MAE and
    allows data scientists to compare forecasts of different series in different scales.

    - *Training time:* Training time is the amount of time needed to train a machine

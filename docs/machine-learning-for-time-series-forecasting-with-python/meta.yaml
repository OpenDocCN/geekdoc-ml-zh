    RNNs instead can leverage their hidden state property that ties one input to the
    next one and combines this input connection in a serial input.


    Despite their great potential, RNNs have a few limitations, as they suffer from
    short-term memory. For example, if an input sequence is long enough, they are
    not able to transfer information from earlier time steps to later ones, and they
    often leave out important information from the beginning of the sequence during
    the backpropagation process. We refer to this problem as the *vanishing gradient
    problem*, as illustrated in Figure 5.3.


    During backpropagation, recurrent neural networks suffer from this problem because
    the gradient decreases as it backpropagates through time. If a gradient value
    becomes extremely small, it is not able to contribute to the network learning
    process. LSTM solves this problem by introducing changes to RNN architecture on
    how they compute outputs and hidden state using the inputs: specifically, LSTMs
    introduce additional elements in the architecture, called *gates* and *cell state*.
    There are variants of LSTMs, and we will discuss them in more detail in the next
    section.


    ![](img/fd006a6c056e5cf905b5150f958ed477_166_0.png)


    # Long Short-Term Memory


    LSTMs are capable of learning long-term dependencies, which is a useful capability
    when you need to model time series data. As mentioned in the previous section,
    LSTMs help preserve the error that can be backpropagated through time and layers,
    without risk of losing important information: LSTMs have internal mechanisms called
    gates and cell state that can regulate the flow of information (Zhang et al. 2019).


    The cell makes decisions about what, how much, and when to store and release information:
    they learn when to allow information to enter, leave, or be deleted through the
    iterative process of making guesses, backpropagating error, and adjusting weights
    via gradient descent. Figure 5.4 illustrates how information flows through a cell
    and is controlled by different gates.'

  md: 'For forecasting tasks, Automated ML uses pre-processing and estimation steps
    that are specific to time series data (aka.ms/AutomatedML). It first detects time
    series sample frequency (for example, hourly, daily, weekly) and creates new records
    for absent time points to make the series continuous. Then it imputes missing
    values in the target (via forward-fill) and feature columns (using median column
    values) and creates grain-based features to enable fixed effects across different
    series. Finally, it creates time-based features to assist in learning seasonal
    patterns and encodes categorical variables to numeric quantities. To learn more
    about this process visit the page aka.ms/AutomatedML.


    The AutoMLConfig object defines the settings and data necessary for an Automated
    ML task: data scientists need to define standard training parameters like task
    type, number of iterations, training data, and number of cross-validations. For
    forecasting tasks, there are additional parameters that must be set that affect
    the experiment. Table 4.9 summarizes each parameter and its usage.


    Table 4.9: Automated ML parameters to be configured with the AutoML Config class


    | PROPERTY | DESCRIPTION |

    |---|---|

    | Task | forecasting |

    | primary_metric | This is the metric that you want to optimize. Forecasting supports
    the following primary metrics: spearman_correlation, normalized_root_mean_squared_error,
    r2_score, normalized_mean_absolute_error |

    | blocked_models | Models in blocked_models won''t be used by AutoML. |

    | experiment_timeout_hours | Maximum amount of time in hours that the experiment
    can take before it terminates. |

    | training_data | The training data to be used within the experiment. |

    | label_column_name | The name of the label column. |

    | compute_target | The remote compute for training. |

    | n_cross_validations | Number of cross-validation splits. Rolling Origin Validation
    is used to split time series in a temporally consistent way. |

    | enable_early_stopping | Flag to enable early termination if the score is not
    improving in the short term. |

    | time_column_name | The name of your time column. |

    | max_horizon | The number of periods out you would like to predict past your
    training data. Periods are inferred from your data. |'

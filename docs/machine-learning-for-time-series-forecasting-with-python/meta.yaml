    # Autoregressive Moving Average


    Autoregressive moving average (ARMA) models have always had a key role in the
    modeling of time series, as their linear structure contributes to a substantial
    simplification of linear prediction (Zhang et al. 2015).

    An ARMA method consists of two parts:


    +   - An autoregression

    - A moving average model


    Compared with the autoregressive and moving average models, ARMA models provide
    the most efficient linear model of stationary time series, since they are capable
    of modeling the unknown process with the minimum number of parameters (Zhang et
    al. 2015).

    In particular, ARMA models are used to describe weekly stationary stochastic time
    series in terms of two polynomials. The first of these polynomials'
  merge: -1
  pgno: 139
- img_proc: true
  md: 'is for autoregression, the second for the moving average. Often this method
    is referred to as the ARMA(p,q) model, in which:


    +   - p stands for the order of the autoregressive polynomial, and

    - q stands for the order of the moving average polynomial.


    Here we will see how to simulate time series from AR(p), MA(q), and ARMA(p,q)
    processes as well as fit time series models to data based on insights gathered
    from the ACF and PACF.



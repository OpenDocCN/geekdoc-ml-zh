    When deploying an energy demand forecasting solution, we are interested in deploying
    an end-to-end solution that goes beyond the prediction web service and facilitates
    the entire data flow. At the time we invoke a new forecast, we would need to make
    sure that the model is fed with the up-to-date data features. That implies that
    the newly collected raw data is constantly ingested, processed, and transformed
    into the required feature set on which the model was built.'

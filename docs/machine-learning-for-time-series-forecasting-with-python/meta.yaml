- md: '## Conclusion


    Deep learning neural networks are powerful engines capable of learning from arbitrary
    mappings from inputs to outputs, supporting multiple inputs and outputs, and automatically
    extracting patterns in input data that spans over long sequences of time. All
    these characteristics together make neural networks helpful tools when dealing
    with more complex time series forecasting problems that involve large amounts
    of data, multiple variables with complicated relationships, and even multi-step
    time series tasks.


    In this chapter we discussed some of the practical reasons data scientists may
    still want to think about deep learning when they build time series forecasting
    solutions.


    Specifically, we took a closer look at the following important topics:


    - *Reasons to Add Deep Learning to Your Time Series Toolkit* – You learned how
    deep learning neural networks are able to automatically learn arbitrary complex
    mappings from inputs to outputs and support multiple inputs and outputs.

    - *Recurrent Neural Networks for Time Series Forecasting* – In this section, I
    introduced a very popular type of artificial neural network: recurrent neural
    networks, also known as RNNs. We also discussed a variation of recurrent neural
    networks, the so-called long short-term memory units, and you learned how to prepare
    time series data for LSTMs and GRU models.

    - *How to Develop GRUs and LSTMs for Time Series Forecasting* – In this final
    section of Chapter 5, you learned how to develop long short-term memory models
    for time series forecasting. In particular, you learned how to develop GRU models
    for time series forecasting problems.


    In the next chapter, Chapter 6, “Model Deployment for Time Series Forecasting,”
    you will learn how to deploy your machine learning models as web services: the
    purpose of the next chapter is to provide a complete overview of tools and concepts
    that you need in order to operationalize and push into production your time series
    forecasting solutions.


    # CHAPTER 6

    Model Deployment for Time Series Forecasting


    Throughout the book, I introduced a few real-world data science scenarios that
    I used to showcase some of the key time series concepts, steps, and codes. In
    this final chapter, I will walk you through the process of building and deploying
    some of the time series forecasting solutions by employing some of these use cases
    and data sets.


    The purpose of this chapter is to provide a complete overview of tools to build
    and deploy your own time series forecasting solutions by discussing the following
    topics:


    - *Experimental Set Up and Introduction to Azure Machine Learning SDK for Python*
    – In this section, I will introduce Azure Machine Learning SDK for Python to build
    and run machine learning workflows. You will get an overview of some of the most
    important classes in the SDK and how you can use them to build, train, and deploy
    a machine learning model on Azure.


    Specifically, in this section you will discover the following concepts and assets:


    - `Workspace`, which is a foundational resource in the cloud that you use to experiment,
    train, and deploy machine learning models.

    - `Experiment`, which is another foundational cloud resource that represents a
    collection of trials (individual model runs).

    - `Run`, which represents a single trial of an experiment.

    - `Model`, which is used for working with cloud representations of the machine
    learning model.

    - `ComputeTarget`, `RunConfiguration`, `ScriptRunConfig`, which are abstract parent
    classes for creating and managing compute targets. A compute target represents
    a variety of resources you can use to train your machine learning models.

    - `Image`, which is an abstract parent class for packaging models into container
    images that include the runtime environment and dependencies.

    - `Webservice`, which is the abstract parent class for creating and deploying
    web services for your models.


    - *Machine Learning Model Deployment* – In this section, we will talk more about
    machine learning model deployment, that is, the method of integrating a machine
    learning model into an existing production environment in order to begin developing
    practical business decisions based on data. Through machine learning model deployment,
    companies can begin to take full advantage of the predictive and intelligent models
    they build and, therefore, transform themselves into actual AI-driven businesses.


    - *Solution Architecture for Time Series Forecasting with Deployment Examples*
    - In this final section of the chapter, we will build, train, and deploy a demand
    forecasting solution. I will demonstrate how to build an end-to-end data pipeline
    architecture and deployment code that can be generalized for different time series
    forecasting solutions.


    # Experimental Set Up and Introduction to Azure Machine Learning SDK for Python


    Azure Machine Learning provides SDKs and services for data scientists and developers
    to prepare data and train and deploy machine learning models. In this chapter,
    we will use Azure Machine Learning SDK for Python (`aka.ms/AzureMLSDK`) to build
    and run machine learning workflows.


    The following sections are a summary of some of the most important classes in
    the SDK that you can use to build your time series forecasting solution: you can
    find all information about the classes below on the official website of Azure
    Machine Learning SDK for Python.'

    # Machine Learning Model Deployment


    Model deployment is the method of integrating a machine learning model into an
    existing production environment in order to begin developing practical business
    decisions based on data. It is only once models are deployed to production that
    they start adding value, making deployment a crucial step (Lazzeri 2019c).

    Model deployment is a fundamental step of the machine learning model workflow
    (Figure 6.1). Through machine learning model deployment, companies can begin to
    take full advantage of the predictive and intelligent models they build and, therefore,
    transform themselves into actual data-driven businesses.

    When we think about machine learning, we focus our attention on key components
    such as data sources, data pipelines, how to test machine learning models at the
    core of our machine learning application, how to engineer our features, and which
    variables to use to make the models more accurate. All these steps are important;
    however, thinking about how we are going to consume those models and data over
    time is also a critical step in the machine learning pipeline. We can only begin
    extracting real value and business benefits from a model’s predictions when it
    has been deployed and operationalized.'
- md: '## Chapter 6 Model Deployment for Time Series Forecasting


    Successful model deployment is fundamental for data-driven enterprises for the
    following key reasons:


    - Deployment of machine learning models means making models available to external
    customers and/or other teams and stakeholders in your company.

    - When you deploy models, other teams in your company can use them, send data
    to them, and get their predictions, which are in turn populated back into the
    company systems to increase training data quality and quantity.

    - Once this process is initiated, companies will start building and deploying
    higher numbers of machine learning models in production and master robust and
    repeatable ways to move models from development environments into business operations
    systems (Lazzeri 2019c).


    From an organizational perspective, many companies see AI-enablement as a technical
    effort. However, it is more of a business-driven initiative that starts within
    the company; in order to become an AI-driven company, it is important that the
    people who successfully operate and understand the business today are also the
    ones who are responsible for building and driving the machine learning pipeline,
    from model training to model deployment and monitoring.


    Right from the first day of a machine learning process, machine learning teams
    should interact with business partners. It is essential to maintain constant interaction
    to understand the model experimentation process parallel to the model deployment
    and consumption steps. Most organizations struggle to unlock machine learning’s
    potential to optimize their operational processes and get data scientists, analysts,
    and business teams speaking the same language (Lazzeri 2019c).


    Moreover, machine learning models must be trained on historical data, which demands
    the creation of a prediction data pipeline, an activity requiring multiple tasks
    including data processing, feature engineering, and tuning. Each task, down to
    versions of libraries and handling of missing values, must be exactly duplicated
    from the development to the production environment. Sometimes, differences in
    technology used in development and in production contribute to difficulties in
    deploying machine learning models.


    Companies can use machine learning pipelines to create and manage workflows that
    stitch together machine learning phases. For example, a pipeline might include
    data preparation, model training, model deployment, and inference/scoring phases.
    Each phase can encompass multiple steps, each of which can run unattended in various
    compute targets.


    ## How to Select the Right Tools to Succeed with Model Deployment


    Current approaches of handcrafting machine learning models are too slow and unproductive
    for companies intent on transforming their operations with AI. Even after months
    of development, which delivers a model based on a single algorithm, the management
    team has little means of knowing whether their data scientists have created a
    great model and how to operationalize it (Lazzeri 2019c).


    Below, I share a few guidelines on how a company can select the right tools to
    succeed with model deployment. I will illustrate this workflow using Azure Machine
    Learning Service, but it can be also used with any machine learning product of
    your choice.


    The model deployment workflow should be based on the following three simple steps:


    - Register the model.

    - Prepare to deploy (specify assets, usage, compute target).

    - Deploy the model to the compute target.


    As we saw in the previous section, `Model` is the logical container for one or
    more files that make up your model. For example, if you have a model that is stored
    in multiple files, you can register them as a single model in the workspace. After
    registration, you can then download or deploy the registered model and receive
    all the files that were registered.


    Machine learning models are registered when you create an Azure Machine Learning
    workspace. The model can come from Azure Machine Learning or it can come from
    somewhere else.


    To deploy your model as a web service, you must create an inference configuration
    (`InferenceConfig`) and a deployment configuration. Inference, or model scoring,
    is the phase where the deployed model is used for prediction, most commonly on
    production data. In the `inferenceConfig`, you specify the scripts and dependencies
    needed to serve your model. In the deployment configuration you specify details
    of how to serve the model on the compute target (Lazzeri 2019c).


    The entry script receives data submitted to a deployed web service and passes
    it to the model. It then takes the response returned by the model and returns
    that to the client. The script is specific to your model; it must understand the
    data that the model expects and returns.


    The script contains two functions that load and run the model:


    - `init()` – Typically, this function loads the model into a global object. This
    function is run only once when the Docker container for your web service is started.

    - `run(input_data)` – This function uses the model to predict a value based on
    the input data. Inputs and outputs to the run typically use JSON for serialization
    and de-serialization. You can also work with raw binary data. You can transform
    the data before sending to the model or before returning to the client.


    When you register a model, you provide a model name used for managing the model
    in the registry. You use this name with the `Model.get_model_path()` to retrieve
    the path of the model file(s) on the local file system. If you register a folder
    or a collection of files, this API returns the path to the directory that contains
    those files.


    Finally, before deploying, you must define the deployment configuration. The deployment
    configuration is specific to the compute target that will host the web service.
    For example, when deploying locally, you must specify the port where the service
    accepts requests. The following compute targets, or compute resources, can be
    used to host your web service deployment:


    - *Local web service and notebook virtual machine (VM) web service* – Both compute
    targets are used for testing and debugging. They are considered good for limited
    testing and troubleshooting.

    - *Azure Kubernetes Service (AKS)* – This compute target is used for real-time
    inference. It is considered good for high-scale production deployments.

    - *Azure Container Instances (ACI)* – This compute target is used for testing.
    It is considered good for low-scale, CPU-based workloads requiring <48 GB RAM.

    - *Azure Machine Learning Compute* – This compute target is used for batch inference
    as it is able to run batch scoring on serverless compute targets.

    - *Azure IoT Edge* – This is an IoT module, able to deploy and serve machine learning
    models on IoT devices.

    - *Azure Stack Edge* – Developers and data scientists can use this compute target
    via IoT Edge.


    In this section, I introduced some common challenges of machine learning model
    deployment, and we discussed why successful model deployment is fundamental to
    unlock the full potential of AI, why companies struggle with model deployment,
    and how to select the right tools to succeed with model deployment.


    Next, we will apply what you learned in the first two sections of this chapter
    to a real demand forecasting use case.


    ## Solution Architecture for Time Series Forecasting with Deployment Examples


    In this final section of this chapter, we will build, train, and deploy an energy
    demand forecasting solution on Azure. For this specific use case, we will use
    data from the GEFCom2014 energy forecasting competition. For more information,
    please refer to “Probabilistic Energy Forecasting: Global Energy Forecasting Competition
    2014 and Beyond” (Tao Hong et al. 2016).


    The raw data consists of rows and columns. Each measurement is represented as
    a single row of data. Each row of data includes multiple columns (also referred
    to as features or fields). After identifying the required data sources, we would
    like to ensure that the raw data that has been collected includes the correct
    data features. To build a reliable demand forecast model, we would need to ensure
    that the data collected includes data elements that can help predict future demand.
    Here are some basic requirements concerning the data structure (schema) of the
    raw data:


    - *Time stamp* – The time stamp field represents the actual time the measurement
    was recorded. It should comply with one of the common date/time formats. Both
    date and time parts should be included. In most cases there is no need for the
    time to be recorded till the second level of granularity. It is important to specify
    the time zone in which the data is recorded.

    - *Load* – Hourly historical load data for the utility were provided. This is
    the actual consumption at a given date/time. The consumption can be measured in
    kWh (kilowatt-hour) or any other preferred unit. It is important to note that
    the measurement unit must stay consistent across all measurements in the data.
    In some cases, consumption can be supplied over three power phases. In that case
    we would need to collect all the independent consumption phases.'
  mdcn: '## 第6章 时间序列预测的模型部署


    成功的模型部署对于数据驱动型企业至关重要，原因如下：


    -   部署机器学习模型意味着将模型提供给外部客户和/或公司内部的其他团队及利益相关者使用。

    -   当你部署模型后，公司内部的其他团队就可以使用它们，向其发送数据并获取预测结果，这些结果反过来又会反馈到公司系统中，从而提升训练数据的质量和数量。

    -   一旦这个流程启动，公司就会开始在生产环境中构建和部署更多的机器学习模型，并掌握将模型从开发环境迁移到业务运营系统的稳健且可重复的方法（Lazzeri
    2019c）。


    从组织的角度来看，许多公司将AI赋能视为一项技术工作。然而，它更像是一项由业务驱动、始于公司内部的倡议；为了成为一家AI驱动的公司，至关重要的是，那些当前成功运营并理解业务的人员，也应负责构建和驱动从模型训练到模型部署和监控的整个机器学习流程。


    从机器学习流程的第一天起，机器学习团队就应该与业务合作伙伴进行互动。保持持续互动以理解模型实验过程，同时兼顾模型部署和使用步骤，这一点至关重要。大多数组织都在努力释放机器学习的潜力以优化其运营流程，并让数据科学家、分析师和业务团队使用同一种语言沟通（Lazzeri
    2019c）。


    此外，机器学习模型必须在历史数据上进行训练，这要求创建一个预测数据管道，这项活动涉及多项任务，包括数据处理、特征工程和调优。每一项任务，小到库的版本和缺失值的处理，都必须从开发环境精确复制到生产环境。有时，开发和生产中使用的技术差异会导致机器学习模型部署困难。


    公司可以使用机器学习管道来创建和管理工作流，将机器学习的各个阶段串联起来。例如，一个管道可能包括数据准备、模型训练、模型部署和推理/评分阶段。每个阶段可以包含多个步骤，每个步骤都可以在不同的计算目标上无人值守地运行。


    ## 如何选择合适的工具以实现成功的模型部署


    当前手工构建机器学习模型的方法对于那些希望通过AI转型运营的公司来说，速度太慢且效率低下。即使经过数月的开发，交付了一个基于单一算法的模型，管理团队也几乎没有手段知道他们的数据科学家是否创建了一个优秀的模型，以及如何将其投入运营（Lazzeri
    2019c）。


    下面，我将分享一些关于公司如何选择合适工具以实现成功模型部署的指导原则。我将使用Azure机器学习服务来说明这个工作流，但它也可以用于你选择的任何机器学习产品。


    模型部署工作流应基于以下三个简单步骤：


    -   注册模型。

    -   准备部署（指定资产、用途、计算目标）。

    -   将模型部署到计算目标。


    正如我们在上一节中看到的，`Model` 是构成你模型的一个或多个文件的逻辑容器。例如，如果你有一个存储在多个文件中的模型，你可以将它们作为一个模型注册到工作区中。注册后，你可以下载或部署已注册的模型，并接收所有已注册的文件。


    当你创建Azure机器学习工作区时，机器学习模型会被注册。该模型可以来自Azure机器学习，也可以来自其他地方。


    要将你的模型部署为Web服务，你必须创建一个推理配置（`InferenceConfig`）和一个部署配置。推理，或模型评分，是部署的模型用于预测的阶段，最常见的是在生产数据上进行。在
    `inferenceConfig` 中，你指定提供模型服务所需的脚本和依赖项。在部署配置中，你指定如何在计算目标上提供模型服务的详细信息（Lazzeri 2019c）。


    入口脚本接收提交给已部署Web服务的数据，并将其传递给模型。然后，它获取模型返回的响应并将其返回给客户端。该脚本特定于你的模型；它必须理解模型期望和返回的数据。


    该脚本包含两个用于加载和运行模型的函数：


    -   `init()` – 通常，此函数将模型加载到一个全局对象中。此函数仅在Web服务的Docker容器启动时运行一次。

    -   `run(input_data)` – 此函数使用模型根据输入数据预测一个值。`run` 的输入和输出通常使用JSON进行序列化和反序列化。你也可以处理原始二进制数据。你可以在将数据发送给模型之前或返回给客户端之前对其进行转换。


    当你注册一个模型时，你会提供一个模型名称，用于在注册表中管理该模型。你使用此名称与 `Model.get_model_path()` 一起检索模型文件在本地文件系统上的路径。如果你注册的是一个文件夹或一组文件，此API将返回包含这些文件的目录路径。



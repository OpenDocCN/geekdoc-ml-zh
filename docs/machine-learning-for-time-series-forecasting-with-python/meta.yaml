    \    )\n\n    # create the cluster\n    compute_target = ComputeTarget.create(ws,\
    \ compute_name, provisioning_config)\n\n    # can poll for a minimum number of\
    \ nodes and for a specific timeout.\n    compute_target.wait_for_completion(show_output=True,\
    \ min_node_count=None, timeout_in_minutes=20)\n\n    # For a more detailed view\
    \ of current\n    # AmlCompute status, use 'get_status()'\n    print(compute_target.get_status().serialize())\n\
    ```\n\n## Upload the Data to Azure\n\nNow you need to make the data accessible\
    \ remotely by uploading it from your local machine into Azure. Then it can be\
    \ accessed for remote training. The datastore is a convenient construct associated\
    \ with your workspace for you to upload or download data. You can also interact\
    \ with it from your remote compute targets. It's backed by an Azure Blob storage\
    \ account. The energy file is uploaded into a directory named `energy_data` at\
    \ the root of the datastore:\n\n- First, you can download the GEFCom2014 data\
    \ set and save the files into a data directory locally, which can be done by executing\
    \ the commented lines in the cell. The data in this example is taken from the\
    \ GEFCom2014 forecasting competition. It consists of three years of hourly electricity\
    \ load and temperature values between 2012 and 2014.\n- Then, the data is uploaded\
    \ to the default blob data storage attached to your workspace. The energy file\
    \ is uploaded into a directory named `energy_data` at the root of the datastore.\
    \ The upload of data must be run only the first time. If you run it again, it\
    \ will skip the uploading of files already present on the datastore.\n\n```python\n\
    # save the files into a data directory locally\ndata_folder = './data'\n\n#data_folder\
    \ = os.path.join(os.getcwd(), 'data')\nos.makedirs(data_folder, exist_ok=True)\n\
    \n# get the default datastore\nds = ws.get_default_datastore()\nprint(ds.name,\
    \ ds.datastore_type, ds.account_name, ds.container_name, sep='\\n')\n\n# upload\
    \ the data\nds.upload(src_dir=data_folder,\n          target_path='energy_data',\n\
    \          overwrite=True,\n          show_progress=True)\n\nds = ws.get_default_datastore()\n\
    print(ds.datastore_type, ds.account_name, ds.container_name)\n```\n\nNow we need\
    \ to create a training script:\n\n```python\n# ## Training script\n# This script\
    \ will be given to the estimator\n# which is configured in the AML training script.\n\
    # It is parameterized for training on `energy.csv` data.\n\n#%%\n# ### Import\
    \ packages.\n# utils.py needs to be in the same directory as this script,\n# i.e.,\
    \ in the source directory `energydemandforecasting`.\n\n#%%\nimport argparse\n\
    import os\nimport numpy as np\nimport pandas as pd\nimport azureml.data\nimport\
    \ pickle\n\nfrom statsmodels.tsa.statespace.sarimax import SARIMAX\nfrom sklearn.preprocessing\
    \ import MinMaxScaler\nfrom utils import load_data, mape\nfrom azureml.core import\
    \ Run\n```\n\n```python\n#%%\n# ### Parameters\n# * COLUMN_OF_INTEREST: The column\
    \ containing data that will be forecasted.\n# * NUMBER_OF_TRAINING_SAMPLES:\n\
    #   The number of training samples that will be trained on.\n# * ORDER:\n#   A\
    \ tuple of three non-negative integers\n#   specifying the parameters p, d, q\
    \ of an Arima(p,d,q) model,\n#   where:\n#     * p: number of time lags in autoregressive\
    \ model,\n#     * d: the degree of differencing,\n#     * q: order of the moving\
    \ average model.\n# * SEASONAL_ORDER:\n#   A tuple of four non-negative integers\n\
    #   where the first three numbers\n#   specify P, D, Q of the Arima terms\n# \
    \  of the seasonal component, as in ARIMA(p,d,q)(P,D,Q).\n#   The fourth integer\
    \ specifies m,\n#   i.e, the number of periods in each season.\n\n#%%\nCOLUMN_OF_INTEREST\
    \ = 'load'\nNUMBER_OF_TRAINING_SAMPLES = 2500\nORDER = (4, 1, 0)\nSEASONAL_ORDER\
    \ = (1, 1, 0, 24)\n```\n\n```python\n#%%\n# ### Import script arguments\n# Here,\
    \ Azure will read in the parameters, specified in the AML training.\n\n#%%\nparser\
    \ = argparse.ArgumentParser(description='Process input arguments')\nparser.add_argument('--data-folder',\
    \ default='./data/', type=str, dest='data_folder')\nparser.add_argument('--filename',\
    \ default='energy.csv', type=str, dest='filename')\nparser.add_argument('--output',\
    \ default='outputs', type=str, dest='output')\nargs = parser.parse_args()\ndata_folder\
    \ = args.data_folder\nfilename = args.filename\noutput = args.output\nprint('output',\
    \ output)\n```\n\n```python\n#%%\n# ### Prepare data for training\n# * Import\
    \ data as pandas dataframe\n# * Set index to datetime\n# * Specify the part of\
    \ the data that the model will be fitted on\n# * Scale the data to the interval\
    \ [0, 1]\n\n#%%\n# Import data\nenergy = load_data(os.path.join(data_folder, filename))\n\
    # As we are dealing with time series, the index can be set to datetime.\nenergy.index\
    \ = pd.to_datetime(energy.index, infer_datetime_format=True)\n\n# Specify the\
    \ part of the data that the model will be fitted on.\ntrain = energy.iloc[0:NUMBER_OF_TRAINING_SAMPLES,\
    \ :]\n\n# Scale the data to the interval [0, 1].\nscaler = MinMaxScaler()\ntrain[COLUMN_OF_INTEREST]\
    \ = scaler.fit_transform(\n    np.array(train.loc[:, COLUMN_OF_INTEREST].values).reshape(-1,\
    \ 1)\n)\n```\n\n```python\n#%%\n# ### Fit the model\n\n#%%\nmodel = SARIMAX(\n\
    \    endog=train[COLUMN_OF_INTEREST].tolist(),\n    order=ORDER,\n    seasonal_order=SEASONAL_ORDER\n\
    )\nmodel.fit()\n```\n\n```python\n#%%\n# ### Save the model\n# The model will\
    \ be saved on Azure in the specified directory as a pickle file.\n\n#%%\n# Create\
    \ a directory on Azure in which the model will be saved.\nos.makedirs(output,\
    \ exist_ok=True)\n```"

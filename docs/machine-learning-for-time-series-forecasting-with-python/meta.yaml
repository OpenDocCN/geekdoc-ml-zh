    \ 'temp']] = X_scaler.transform(ts_data_test)\ntest_inputs = TimeSeriesTensor(ts_data_test,\
    \ 'load', HORIZON, tensor)\n\nts_predictions = model.predict(test_inputs['X'])\n\
    \nev_ts_data = create_evaluation_df(ts_predictions, test_inputs, HORIZON,\ny_scaler)\n\
    ev_ts_data.head()\n```\n\nRunning the sample code above will generate the following\
    \ table with predictions and actual values:\n\n| | Timestamp | h | prediction\
    \ | actual |\n|---|---|---|---|---|\n| 0 | 2014-11-01 05:00:00 | t+1 | 2,737.52\
    \ | 2,714.00 |\n| 1 | 2014-11-01 06:00:00 | t+1 | 2,975.03 | 2,970.00 |\n| 2 |\
    \ 2014-11-01 07:00:00 | t+1 | 3,204.60 | 3,189.00 |\n| 3 | 2014-11-01 08:00:00\
    \ | t+1 | 3,326.30 | 3,356.00 |\n| 4 | 2014-11-01 09:00:00 | t+1 | 3,493.52 |\
    \ 3,436.00 |\n\nIn order to visualize the overall accuracy of our model, we can\
    \ estimate the MAPE, as demonstrated in the sample code below:\n\n```\nmape(ev_ts_data['prediction'],\
    \ ev_ts_data['actual'])\n```\n\nThe MAPE is 0.015, showing that our model is 99.985\
    \ percent accurate. It is important to note that, even if we decided to add a\
    \ variable to our model to make it multivariate, the model performance did not\
    \ improve.\n\n# Conclusion\n\nDeep learning neural networks are powerful engines\
    \ capable of learning from arbitrary mappings from inputs to outputs, supporting\
    \ multiple inputs and"

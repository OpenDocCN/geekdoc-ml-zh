    \ below:\n\n```python\n# Build and fit the SARIMAX model\nmodel = SARIMAX(endog=train,\
    \ order=order, seasonal_order=seasonal_order)\nresults = model.fit()\n\nprint(results.summary())\n\
    ```\n\nWe now perform the so-called walk forward validation. In practice, time\
    \ series models are re-trained each time a new data becomes available. This allows\
    \ the model to make the best forecast at each time step.\n\nStarting at the beginning\
    \ of the time series, we train the model on the train data set. Then we make a\
    \ prediction on the next time step. The prediction is then evaluated against the\
    \ known value. The training set is then expanded to include the known value, and\
    \ the process is repeated. (Note that we keep the training set window fixed, for\
    \ more efficient training, so every time we add a new observation to the training\
    \ set, we remove the observation from the beginning of the set.)\n\nThis process\
    \ provides a more robust estimation of how the model will perform in practice.\
    \ However, it comes at the computation cost of creating so many models. This is\
    \ acceptable if the data is small or if the model is simple but could be an issue\
    \ at scale.\n\nWalk-forward validation is the gold standard of time series model\
    \ evaluation and is recommended for your own projects:\n\n```python\n# Create\
    \ a test data point for each HORIZON step\ntest_shifted = test.copy()\n\nfor t\
    \ in range(1, HORIZON):\n    test_shifted['load'+str(t)] = test_shifted['load'].shift(-t,\
    \ freq='H')\n\ntest_shifted = test_shifted.dropna(how='any')\n```\n\nWe can make\

    machine learning and deep learning forecasting techniques have been developed
    in recent years. As we will discuss in Chapter 4, “Introduction to Some Classical
    Methods for Time Series Forecasting,” and Chapter 5, “Introduction to Neural Networks
    for Time Series Forecasting,” each of these forecasting techniques has its special
    application, and care must be taken to select the correct technique for a particular
    application. The better you understand the portfolio of algorithms that you can
    apply to your forecasting scenario, the more likely it is that your forecasting
    efforts will be successful.



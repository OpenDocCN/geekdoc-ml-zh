  md: '# Chapter 2 ■ How to Design an End-to-End Time Series Forecasting Solution


    Deep learning neural networks have three main intrinsic capabilities:


    +   - They can learn from arbitrary mappings from inputs to outputs.

    - They support multiple inputs and outputs.

    - They can automatically extract patterns in input data that spans over long sequences.


    Thanks to these three characteristics, they can offer a lot of help when data
    scientists deal with more complex but still very common problems, such as time
    series forecasting. After having experimented with different time series forecasting
    models, you need to select the best model based on your data and specific time
    series scenario. Model selection is an integral part of the model development
    process, in the next section we will discuss how model evaluation can help you
    find the best model that represents your data and understand how well the chosen
    model will work in the future (Lazzeri 2019b).


    # Model Evaluation


    Model evaluation has a critical role within the modeling step. At this step we
    look into validating the model and its performance with real-life data. During
    the modeling step, we use a part of the available data for training the model.
    During the evaluation phase, we take the remainder of the data to test the model.
    Practically it means that we are feeding the model new data that has been restructured
    and contains the same features as the training data set.


    However, during the validation process, we use the model to predict the target
    variable rather than provide the available target variable. We often refer to
    this process as model scoring. We would then use the true target values and compare
    them with the predicted ones. The goal here is to measure and minimize the prediction
    error, meaning the difference between the predictions and the true value.


    Quantifying the error measurement is key since we would like to fine-tune the
    model and validate whether the error is actually decreasing. Fine-tuning the model
    can be done by modifying model parameters that control the learning process or
    by adding or removing data features (referred to as parameters sweep). Practically
    that means that we may need to iterate between the feature engineering, modeling,
    and model evaluation phases multiple times until we are able to reduce the error
    to the required level.


    It is important to emphasize that the prediction error will never be zero as there
    is never a model that can perfectly predict every outcome. However, there is a
    certain magnitude of error that is acceptable by the business. During the validation
    process, we would like to ensure that our model prediction error is at or better
    than the business tolerance level. It is therefore important to set the level
    of the tolerable error at the beginning of the cycle during the problem formulation
    phase.'
  merge: -1
  pgno: 65
- img_proc: true
  md: 'There are various ways in which prediction error can be measured and quantified.
    Specifically, there is an evaluation technique relevant to time series and in
    specific for demand forecast: the MAPE. MAPE stands for mean absolute percentage
    error. With MAPE we are computing the difference between each forecasted point
    and the actual value of that point. We then quantify the error per point by calculating
    the proportion of the difference relative to the actual value. At the last step
    we average these values. The mathematical formula used for MAPE is as follows:


    $$MAPE = \left( \frac{1}{n} \sum \frac{|Actual\ Values - Forecasted\ Values|}{|Actual\
    Values|} \right) \times 100$$


    The MAPE is scale sensitive and should not be used when working with low-volume
    data. Notice that because *Actual Values* also represents the denominator of the
    equation, the MAPE is undefined when actual demand is zero. Furthermore, when
    the actual value is not zero, but quite small, the MAPE will often take on extreme
    values. This scale sensitivity renders the MAPE close to worthless as an error
    measure for low-volume data.

    There are a few other evaluation techniques that are important to mention here:


    +   - *The mean absolute deviation (MAD)* – This formula measures the size of
    the error in units. The MAD is a good statistic to use when analyzing the error
    for a single item. However, if you aggregate MADs over multiple items, you need
    to be careful about high-volume products dominating the results—more on this later.
    The MAPE and the MAD are by far the most commonly used error measurement statistics.
    There are a slew of alternative statistics in the forecasting literature, many
    of which are variations on the MAPE and the MAD (Stellwagen 2011).

    - *The mean absolute deviation (MAD)/mean ratio* – This is an alternative to the
    MAPE that is better suited to intermittent and low-volume data. As stated previously,
    percentage errors cannot be calculated when the actual equals zero, and they can
    take on extreme values when dealing with low-volume data. These issues become
    magnified when you start to average MAPEs over multiple time series. The MAD/mean
    ratio tries to overcome this problem by dividing the MAD by the mean—essentially
    rescaling the error to make it comparable across time series of varying scales.
    The statistic is calculated exactly as the name suggests—it is simply the MAD
    divided by the mean (Stellwagen 2011).

    - *The Geometric Mean Relative Absolute Error (GMRAE)* – This metric is used to
    measure out-of-sample forecast performance. It is calculated using the relative
    error between the naïve model (i.e., next period’s forecast is this'
  merge: -1

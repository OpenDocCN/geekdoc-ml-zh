    is unknown: this is the value that needs to be predicted by our machine learning
    model.


    How can we turn any time series data set into a supervised learning problem? Data
    scientists usually exploit the values of prior time steps to predict the subsequent
    time step value by using a statistical method, called the *sliding window method*.
    Once the sliding window method is applied and a time series data set is converted,
    data scientists can use can leverage standard linear and nonlinear machine learning
    methods to model their time series data.


    Previously and in Figure 1.8, I used examples of *univariate time series*: these
    are data sets where only a single variable is observed at each time, such as energy
    load at each hour. However, the sliding window method can be applied to a'

- md: "# Create an Estimator\n\nLet's see now how to create an estimator. In order\
    \ to start this process, we need to create some parameters. The following parameters\
    \ will be given to the estimator:\n\n- **source_directory**: the directory that\
    \ will be uploaded to Azure and contains the script `train.py`\n- **entry_script**:\
    \ the script that will be executed (`train.py`)\n- **script_params**: the parameters\
    \ that will be given to the entry script\n- **compute_target**: the compute cluster\
    \ that was created above\n- **conda_dependencies_file**: the packages in your\
    \ conda environment that the script needs.\n\n```python\nscript_params = {\n \
    \   \"--data-folder\": ds.path(\"energy_data\").as_mount(),\n    \"--filename\"\
    : \"energy.csv\",\n}\nscript_folder = os.path.join(os.getcwd(), \"energydemandforecasting\"\
    )\n\nest = Estimator(\n    source_directory=script_folder,\n    script_params=script_params,\n\
    \    compute_target=compute_target,\n    entry_script=\"train.py\",\n    conda_dependencies_file=\"\
    azureml-env.yml\",\n)\n```\n\n# Submit the Job to the Remote Cluster\n\nYou can\
    \ create and manage a compute target using the Azure Machine Learning SDK, Azure\
    \ portal, Azure CLI, or Azure Machine Learning VS Code extension. The following\
    \ sample code shows you how to submit your work to the remote cluster:\n\n```python\n\
    run = exp.submit(config=est)\n\n# specify show_output to True for a verbose log\n\
    run.wait_for_completion(show_output=False)\n```\n\n# Register the Model\n\nThe\
    \ last step in the training script wrote the file `outputs/arima_model.pkl` in\
    \ a directory named outputs in the VM of the cluster where the job is run. Outputs\
    \ is a special directory in that all content in this directory is automatically\
    \ uploaded to your workspace. This content appears in the run record in the experiment\
    \ under your workspace. So the model file is now also available in your workspace.\n\
    \nYou can also see files associated with that run. As a last step, we register\
    \ the model in the workspace, which saves it under Models on Azure, so that you\
    \ and other collaborators can later query, examine, and deploy this model. By\
    \ registering the model, it is now available on your workspace:\n\n```python\n\
    # see files associated with that run\nprint(run.get_file_names())\n\n# register\
    \ model\nmodel = run.register_model(model_name='arimamodel',\n    model_path='outputs/arimamodel.pkl')\n\
    ```\n\n# Deployment\n\nOnce we have nailed down the modeling phase and validated\
    \ the model performance, we are ready to go into the deployment phase. In this\
    \ context, *deployment* means enabling the customer to consume the model by running\
    \ actual predictions on it at large scale. The concept of deployment is key in\
    \ Azure ML since our main goal is to constantly invoke predictions as opposed\
    \ to just obtaining the insight from the data. The deployment phase is the part\
    \ where we enable the model to be consumed at large scale.\n\nWithin the context\
    \ of energy demand forecast, our aim is to invoke continuous and periodical forecasts\
    \ while ensuring that fresh data is available for the model and that the forecasted\
    \ data is sent back to the consuming client.\n\nThe main deployable building block\
    \ in Azure ML is the web service. This is the most effective way to enable consumption\
    \ of a predictive model in the cloud. The web service encapsulates the model and\
    \ wraps it up with a REST API (application programming interface). The API can\
    \ be used as part of any client code, as illustrated in Figure 6.6.\n\nThe web\
    \ service is deployed on the cloud and can be invoked over its exposed REST API\
    \ endpoint, which you can see in Figure 6.6. Different types of clients across\
    \ various domains can invoke the service through the Web API simultaneously. The\
    \ web service can also scale to support thousands of concurrent calls.\n\nDeploying\
    \ the model requires the following components:\n\n- An entry script. This script\
    \ accepts requests, scores the request using the model, and returns the results.\n\
    - Dependencies, such as helper scripts or Python/Conda packages required to run\
    \ the entry script or model.\n- The deployment configuration for the compute target\
    \ that hosts the deployed model. This configuration describes things like memory\
    \ and CPU requirements needed to run the model.\n\nThese entities are encapsulated\
    \ into an inference configuration and a deployment configuration. The inference\
    \ configuration references the entry script and other dependencies. These configurations\
    \ are defined programmatically when using the SDK and as JSON files when using\
    \ the CLI to perform the deployment.\n\n# Define Your Entry Script and Dependencies\n\
    \nThe entry script receives data submitted to a deployed web service and passes\
    \ it to the model. It then takes the response returned by the model and returns\
    \ that to the client. The script is specific to your model; it must understand\
    \ the data that the model expects and returns.\n\nThe script contains two functions\
    \ that load and run the model: the `init()` and `run(input_data)` functions. When\
    \ you register a model, you provide a model name used for managing the model in\
    \ the registry. You use this name with the `Model.get_model_path()` to retrieve\
    \ the path of the model file(s) on the local file system. If you register a folder\
    \ or a collection of files, this API returns the path to the directory that contains\
    \ those files.\n\nWhen you register a model, you give it a name which corresponds\
    \ to where the model is placed, either locally or during service deployment. The\
    \ following example will return a path to a single file called `sklearn_mnist_model.pkl`\
    \ (which was registered with the name `sklearn_mnist`):\n\n```python\nmodel_path\
    \ = Model.get_model_path('sklearn_mnist')\n```\n\n# Automatic Schema Generation\n\
    \nTo automatically generate a schema for your web service, you need to provide\
    \ a sample of the input and output in the constructor for one of the defined type\
    \ objects, and the type and sample are used to automatically create the schema\
    \ (aka.ms/ModelDeployment).\n\nTo use schema generation, include the inference-schema\
    \ package in your Conda environment file. After this, you need to define the input\
    \ and output sample formats in the `input_sample` and `output_sample` variables.\
    \ The following example demonstrates how to accept and return JSON data for our\
    \ energy demand forecasting solution. First, the workspace that was used for training\
    \ must be retrieved:\n\n```python\nws = Workspace.from_config()\nprint(ws.name,\
    \ ws.resource_group, ws.location, ws.subscription_id, sep = '\\n')\n```\n\nWe\
    \ already registered the model in the training script. But if the model you want\
    \ to use is only saved locally, you can uncomment and run the following cell that\
    \ will register your model in the workspace. Parameters may need adjustment:\n\
    \n```python\n# model = Model.register(model_path = \"path_of_your_model\",\n#\
    \                        model_name = \"name_of_your_model\",\n#             \
    \           tags = {'type': \"Time series ARIMA model\"},\n#                 \
    \       description = \"Time series ARIMA model\",\n#                        workspace\
    \ = ws)\n\n# get the already registered model\nmodel = Model.list(ws, name='arimamodel')[0]\n\
    print(model)\n```\n\nWe now need to get or register an environment for our model\
    \ deployment (aka.ms/ModelDeployment). Since, in our example, we already registered\
    \ the environment in the training script, we can just retrieve it:\n\n```python\n\
    my_azureml_env = Environment.get(workspace=ws, name=\"my_azureml_env\")\n\ninference_config\
    \ = InferenceConfig(\n    entry_script=\"energydemandforecasting/score.py\", environment=my_azureml_env\n\
    )\n```\n\nAfter this, the deployment configuration can be arranged, as illustrated\
    \ in the sample code below:\n\n```python\n# Set deployment configuration\ndeployment_config\
    \ = AciWebservice.deploy_configuration(cpu_cores=1, memory_gb=1)\n\naci_service_name\
    \ = \"aci-service-arima\"\n```"
  mdcn: "# 创建估算器\n\n现在让我们看看如何创建估算器。为了启动这个过程，我们需要创建一些参数。以下参数将被传递给估算器：\n\n- **source_directory**：将被上传到\
    \ Azure 的目录，其中包含脚本 `train.py`\n- **entry_script**：将被执行的脚本（`train.py`）\n- **script_params**：将传递给入口脚本的参数\n\
    - **compute_target**：上面创建的计算集群\n- **conda_dependencies_file**：脚本所需的 conda 环境中的包。\n\
    \n```python\nscript_params = {\n    \"--data-folder\": ds.path(\"energy_data\"\
    ).as_mount(),\n    \"--filename\": \"energy.csv\",\n}\nscript_folder = os.path.join(os.getcwd(),\
    \ \"energydemandforecasting\")\n\nest = Estimator(\n    source_directory=script_folder,\n\
    \    script_params=script_params,\n    compute_target=compute_target,\n    entry_script=\"\
    train.py\",\n    conda_dependencies_file=\"azureml-env.yml\",\n)\n```\n\n# 将作业提交到远程集群\n\
    \n你可以使用 Azure Machine Learning SDK、Azure 门户、Azure CLI 或 Azure Machine Learning\
    \ VS Code 扩展来创建和管理计算目标。以下示例代码向你展示如何将工作提交到远程集群：\n\n```python\nrun = exp.submit(config=est)\n\
    \n# 将 show_output 指定为 True 以获取详细日志\nrun.wait_for_completion(show_output=False)\n\
    ```\n\n# 注册模型\n\n训练脚本的最后一步将文件 `outputs/arima_model.pkl` 写入运行作业的集群虚拟机中名为 outputs\
    \ 的目录。Outputs 是一个特殊目录，因为该目录中的所有内容都会自动上传到你的工作区。此内容会出现在你工作区中实验的运行记录中。因此，模型文件现在也已在你的工作区中可用。\n\
    \n你也可以查看与该运行关联的文件。最后一步，我们在工作区中注册模型，将其保存在 Azure 的 Models 下，以便你和其他协作者稍后可以查询、检查和部署此模型。通过注册模型，它现在在你的工作区中可用：\n\
    \n```python\n# 查看与该运行关联的文件\nprint(run.get_file_names())\n\n# 注册模型\nmodel = run.register_model(model_name='arimamodel',\n\
    \    model_path='outputs/arimamodel.pkl')\n```\n\n# 部署\n\n一旦我们确定了建模阶段并验证了模型性能，我们就准备好进入部署阶段。在此上下文中，*部署*\
    \ 意味着使客户能够通过大规模运行实际预测来使用该模型。部署的概念在 Azure ML 中至关重要，因为我们的主要目标是持续调用预测，而不仅仅是从数据中获取洞察。部署阶段是我们使模型能够大规模被使用的部分。\n\
    \n在能源需求预测的背景下，我们的目标是调用连续和定期的预测，同时确保模型有可用的新鲜数据，并且预测数据被发送回消费客户端。\n\nAzure ML 中主要的可部署构建块是\
    \ Web 服务。这是在云中启用预测模型消费的最有效方式。Web 服务封装了模型，并用 REST API（应用程序编程接口）将其包装起来。该 API 可以作为任何客户端代码的一部分使用，如图\
    \ 6.6 所示。\n\nWeb 服务部署在云上，可以通过其公开的 REST API 端点调用，你可以在图 6.6 中看到。来自不同领域的不同类型的客户端可以同时通过\
    \ Web API 调用该服务。Web 服务还可以扩展以支持数千个并发调用。\n\n部署模型需要以下组件：\n\n- 一个入口脚本。此脚本接受请求，使用模型对请求进行评分，并返回结果。\n\
    - 依赖项，例如运行入口脚本或模型所需的辅助脚本或 Python/Conda 包。\n- 托管部署模型的计算目标的部署配置。此配置描述了运行模型所需的内存和\
    \ CPU 要求等。\n\n这些实体被封装到推理配置和部署配置中。推理配置引用入口脚本和其他依赖项。使用 SDK 时，这些配置以编程方式定义；使用 CLI\
    \ 执行部署时，则定义为 JSON 文件。\n\n# 定义你的入口脚本和依赖项\n\n入口脚本接收提交到已部署 Web 服务的数据，并将其传递给模型。然后，它获取模型返回的响应并将其返回给客户端。该脚本特定于你的模型；它必须理解模型期望和返回的数据。\n\
    \n该脚本包含两个加载和运行模型的函数：`init()` 和 `run(input_data)` 函数。当你注册模型时，你会提供一个用于在注册表中管理模型的模型名称。你使用此名称与\
    \ `Model.get_model_path()` 一起检索本地文件系统上模型文件的路径。如果你注册的是一个文件夹或一组文件，此 API 将返回包含这些文件的目录的路径。\n\
    \n当你注册模型时，你会给它一个名称，该名称对应于模型放置的位置，无论是在本地还是在服务部署期间。以下示例将返回一个名为 `sklearn_mnist_model.pkl`\
    \ 的单个文件的路径（该文件以名称 `sklearn_mnist` 注册）：\n\n```python\nmodel_path = Model.get_model_path('sklearn_mnist')\n\
    ```\n\n# 自动模式生成\n\n要为你的 Web 服务自动生成模式，你需要在其中一个已定义类型对象的构造函数中提供输入和输出的示例，类型和示例用于自动创建模式（aka.ms/ModelDeployment）。\n\
    \n要使用模式生成，请在你的 Conda 环境文件中包含 `inference-schema` 包。之后，你需要在 `input_sample` 和 `output_sample`\
    \ 变量中定义输入和输出示例格式。以下示例演示了如何为我们的能源需求预测解决方案接受和返回 JSON 数据。首先，必须检索用于训练的工作区：\n\n```python\n\
    ws = Workspace.from_config()\nprint(ws.name, ws.resource_group, ws.location, ws.subscription_id,\
    \ sep = '\\n')\n```\n\n我们已经在训练脚本中注册了模型。但如果你要使用的模型仅保存在本地，你可以取消注释并运行以下单元格，该单元格将在工作区中注册你的模型。可能需要调整参数：\n\
    \n```python\n# model = Model.register(model_path = \"path_of_your_model\",\n#\
    \                        model_name = \"name_of_your_model\",\n#             \
    \           tags = {'type': \"Time series ARIMA model\"},\n#                 \
    \       description = \"Time series ARIMA model\",\n#                        workspace\
    \ = ws)\n\n# 获取已注册的模型\nmodel = Model.list(ws, name='arimamodel')[0]\nprint(model)\n\
    ```\n\n我们现在需要为模型部署获取或注册一个环境（aka.ms/ModelDeployment）。由于在我们的示例中，我们已经在训练脚本中注册了环境，我们可以直接检索它：\n\

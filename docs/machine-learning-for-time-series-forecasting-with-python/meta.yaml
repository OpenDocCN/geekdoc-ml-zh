    **Figure 2.2:** Time series batch data processing architecture


    +   - *Real-time data processing* – Real-time processing deals with streams of
    data that are captured in real time and processed with minimal latency to generate
    real-time (or near-real-time) reports or automated responses. For example, a real-time
    traffic monitoring solution might use sensor data to detect high traffic volumes.
    This data could be used to dynamically update a map to show congestion or automatically
    initiate high-occupancy lanes or other traffic management systems. To learn more
    about technologies that are recommended choices for real-time processing solutions,
    you can read the article at aka.ms/RealTimeProcessing.

    - *Streaming data* – With streaming data, data is immediately processed off of
    incoming data flows (aka.ms/RealTimeProcessing). After capturing real-time messages,
    the solution must process them by filtering, aggregating, and otherwise preparing
    the data for analysis, as illustrated in Figure 2.3.


    ![](img/fd006a6c056e5cf905b5150f958ed477_56_1.png)



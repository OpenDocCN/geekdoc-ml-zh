  md: "# Conclusion\n\nIn this final chapter, we looked closely into the process of\
    \ building and deploying some of the time series forecasting solutions. Specifically,\
    \ this chapter provided a complete overview of tools to build and deploy your\
    \ own time series forecasting solutions:\n\n+   - *Experimental Set Up and Introduction\
    \ to Azure Machine Learning SDK for Python* – I introduced Azure Machine Learning\
    \ SDK for Python to build and run machine learning workflows, and you learned\
    \ the following concepts and assets:\n    - `Workspace`, which is foundational\
    \ resource in the cloud that you use to experiment, train, and deploy machine\
    \ learning models.\n    - `Experiment`, which is another foundational cloud resource\
    \ that represents a collection of trials (individual model runs).\n    - `Run`,\
    \ which represents a single trial of an experiment.\n    - `Model`, which is used\
    \ for working with cloud representations of the machine learning model.\n    -\
    \ `ComputeTarget`, `RunConfiguration`, `ScriptRunConfig`, which are abstract parent\
    \ classes for creating and managing compute targets. A compute target represents\
    \ a variety of resources where you can train your machine learning models.\n \
    \   - `Image`, which is abstract parent class for packaging models into container\
    \ images that include the runtime environment and dependencies.\n    - `Webservice`,\

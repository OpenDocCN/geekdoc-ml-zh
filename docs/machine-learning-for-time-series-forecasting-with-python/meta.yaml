    # plot the pacf function on the ts_data_load_subset

    plot_pacf(ts_data_load_subset, lags=30)

    pyplot.show()

    ```


    The x values (which in our example is ts_data_load) can be a series or an array.
    The argument lags shows how many lags of PACF will be plotted. Running these examples
    creates two 2D plots showing the partial autocorrelation for the first 20 lags
    and 30 lags respectively, as illustrated in Figure 4.8 and Figure 4.9.


    ![](img/fd006a6c056e5cf905b5150f958ed477_129_0.png)


    Figure 4.8: Autocorrelation plot results from ts_data set with plot_pacf() function
    from the statsmodels library


    The concepts and respective plots of ACF and PACF functions become particularly
    important when data scientists need to understand and determine the order of autoregressive
    and moving average time series methods. There are two methods that you can leverage
    to identify the order of an AR(p) model:


    - The ACF and PACF functions

    - The information criteria


    As illustrated in Figure 4.8, ACF is an autocorrelation function that provides
    you with the information of how much a series is autocorrelated with its lagged
    values. In simple terms, it describes how well the present value of the series
    is related with its past values. As we saw in Chapter 3, “Time Series Data Preparation,”
    a time series data set can have components like trend, seasonality, and cyclic
    patterns. ACF considers all these components while finding correlations.


    ![](img/fd006a6c056e5cf905b5150f958ed477_130_0.png)


    **Figure 4.9:** Autocorrelation plot results from ts_data_load_subset with plot_pacf()
    function from the statsmodels library


    On the other side, PACF is another important function that, instead of finding
    correlations of present values with lags like ACF, finds correlation of the residuals
    with the next lag. It is a function that measures the incremental benefit of adding
    another lag. So if through the PACF function we discover that there is hidden
    information in the residual that can be modeled by the next lag, we might get
    a good correlation, and we will keep that next lag as a feature while modeling.


    Now let''s see why these two functions are important when building an autoregression
    model. As mentioned at the beginning of this chapter, an autoregression is a model
    based on the assumption that present values of a time series can be obtained using
    previous values of the same time series: the present value is a weighted average
    of its past values.


    In order to avoid multicollinear features for time series models, it is necessary
    to find optimum features or order of the autoregression process using the PACF
    plot, as it removes variations explained by earlier lags, so we get only the relevant
    features (Figure 4.8). Notice that we have good positive correlation with the
    lags up to lag number 6; this is the point where the ACF plot cuts the upper confidence
    threshold. Although we have good correlation up to the sixth lag, we cannot use
    all of them as it will create a multicollinearity problem; that''s why we turn
    to the PACF plot to get only the most relevant lags.


    In Figure 4.9, we can see that lags up to 6 have good correlation before the plot
    first cuts the upper confidence interval. This is our p value, which is the order
    of our autoregression process. We can model the given autoregression process using
    linear combination of first 6 lags. In Figure 4.9, we can also see that lags up
    to 1 have good correlation before the plot first cuts the upper confidence interval.
    This is our p value, the order of our autoregression process. We can then model
    this autoregression process using the first lag.


    The more lag variables you include in your model, the better the model will fit
    the data; however, this can also represent a risk of overfitting your data. The
    information criteria adjust the goodness-of-fit of a model by imposing a penalty
    based on the number of parameters used. There are two popular adjusted goodness-of-fit
    measures:


    - AIC

    - BIC


    In order to get the information from these two measures, you can use the `summary()`
    function, the `params` attribute, or the `aic` and `bic` attributes in Python.
    These information criteria are used to fit several models, each with a different
    number of parameters, and choose the one with the lowest Bayesian information
    criterion. For example, if we have an AR(5) model, the lowest information criterion
    results will denote a value of 5.


    Beginning in version 0.11, statsmodels has introduced a new class dedicated to
    autoregressions (`statsmodels.org/stable/generated/statsmodels.tsa.ar_model.AutoReg.html`),
    as summarized in Table 4.3.


    **Table 4.3:** Autoregressive class in statsmodels


    | AUTOREGRESSIVE METHOD | DESCRIPTION AND PROPERTIES |

    | :--- | :--- |

    | `ar_model.AutoReg(endog, lags[, trend, ...])` | Autoregressive AR-X(p) model
    |

    | `ar_model.AutoRegResults(model, params, ...)` | Class to hold results from fitting
    an AutoReg model |

    | `ar_model.ar_select_order(endog, maxlag[, ...])` | Autoregressive AR-X(p) model
    order selection |


    The `ar_model.AutoReg` model estimates parameters by applying the following element:


    - *A conditional maximum likelihood (CML) estimator*, which is a method that involves
    the maximization of a conditional log-likelihood function, whereby the parameters
    treated as known are either fixed by theoretical assumption or, more commonly,
    replaced by estimates (Lewis-Beck, Bryman, and Liao 2004).


    and supporting the following elements:


    - *Exogenous regressors* (or independent variables, which are the ones that are
    having an effect on the values of the target variable) and, more specifically,'

    The operation of adding lag features is called the sliding window method or Window
    Features: the above example shows how to apply a sliding window method with a
    window width of eight. Window Features are a summary of values over a fixed window
    of prior timesteps.

    Depending on your time series scenario, you can expand the window width and include
    more lagged features. A common question that data scientists ask before performing
    the operation of adding lag features is how large to make the window. A good approach
    would be to build a series of different window widths and alternatively add and
    remove them from the data set to see which one has a more evident positive effect
    on your model performance.

    Understanding the sliding method is very helpful to building an additional feature
    method called Rolling Window Statistics, which we will discuss in the next section.


    # Rolling Window Statistics


    The main goal of building and using Rolling Window Statistics in a time series
    data set is to compute statistics on the values from a given data sample by defining
    a range that includes the sample itself as well as some specified number of samples
    before and after the sample used.

    A crucial step when data scientists need to compute rolling statistics is to define
    a rolling window of observations: at each time point, data scientists need'
  merge: -1
  pgno: 114
- img_proc: true
  md: 'to obtain the observations in the rolling window and use them to compute the
    statistic they have decided to use. In the second step, they need to move on to
    the next time point and repeat the same computation on the next window of observations.


    One of the more popular rolling statistics is the moving average. This takes a
    moving window of time and calculates the average or the mean of that time period
    as the current value. pandas provides a `rolling()` function that provides rolling
    window calculations, and it creates a new data structure with the window of values
    at each timestep. We can then perform statistical functions on the window of values
    collected for each timestep, such as calculating the mean.


    Data scientists can use the `concat()` function in pandas to construct a new data
    set with just our new columns. This function concatenates pandas objects along
    a particular axis with an optional set logic along the other axes. It can also
    add a layer of hierarchical indexing on the concatenation axis, which may be useful
    if the labels are the same (or overlapping) on the passed axis number.


    The example below demonstrates how to do this with pandas with a window size of
    6:


    ```

    # create a rolling mean feature

    from pandas import concat


    load_val = ts_data[[''load'']]

    shifted = load_val.shift(1)


    window = shifted.rolling(window=6)

    means = window.mean()

    new_dataframe = concat([means, load_val], axis=1)

    new_dataframe.columns = [''load_rol_mean'', ''load'']


    print(new_dataframe.head(10))

    ```



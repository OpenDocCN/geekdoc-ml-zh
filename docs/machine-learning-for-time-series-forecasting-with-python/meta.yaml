- md: '## Moving Average


    The moving average technique leverages previous forecast errors in a regression
    approach to forecast future observations at next time stamps: each future observation
    can be thought of as a weighted moving average of the previous forecast errors.


    Together with the autoregression technique, the moving average approach is an
    important element of the more general autoregressive moving average and autoregressive
    integrated moving average models, which present a more sophisticated stochastic
    configuration.


    Moving average models are very similar to autoregressive models: as mentioned
    in the previous paragraph, autoregressive models represent a linear combination
    of past observations, while moving average models represent a combination of past
    error terms. Data scientists usually apply moving average models to their time
    series data as they are very good at explaining hidden or irregular patterns in
    the error process directly by fitting a model to the error terms.


    Python supports the moving average approach through the `statsmodels.tsa.arima_model.ARMA`
    class (statsmodels.org/stable/generated/statsmodels.tsa.arima_model.ARMA.html)
    from statsmodels, by setting the order for the autoregressive model equal to 0
    and defining the order of the moving average model in the order argument:


    ```

    MovAvg_Model = ARMA(ts_data_load, order=(0, 1))

    ```


    The statsmodels library offers the definition and parameters for the `ARMA()`
    class shown in Table 4.5.


    **Table 4.5:** Autoregressive moving average in statsmodels


    | AUTOREGRESSIVE MOVING AVERAGE | DESCRIPTION AND PROPERTIES |

    | :--- | :--- |

    | `arima_model.ARMA(endog, order[, exog, ...])` | Autoregressive moving average,
    or ARMA(p,q), model |

    | `arima_model.ARMAResults(model, params[, ...])` | Class to hold results from
    fitting an ARMA model |


    In this section, you discovered how to build forecasts with moving average models
    using Python. In the next section, you will discover the best packages and classes
    to develop and implement autoregressive moving average models with Python.


    ## Autoregressive Moving Average


    Autoregressive moving average (ARMA) models have always had a key role in the
    modeling of time series, as their linear structure contributes to a substantial
    simplification of linear prediction (Zhang et al. 2015).

    An ARMA method consists of two parts:


    - An autoregression

    - A moving average model


    Compared with the autoregressive and moving average models, ARMA models provide
    the most efficient linear model of stationary time series, since they are capable
    of modeling the unknown process with the minimum number of parameters (Zhang et
    al. 2015).

    In particular, ARMA models are used to describe weekly stationary stochastic time
    series in terms of two polynomials. The first of these polynomials is for autoregression,
    the second for the moving average. Often this method is referred to as the ARMA(p,q)
    model, in which:


    - p stands for the order of the autoregressive polynomial, and

    - q stands for the order of the moving average polynomial.


    Here we will see how to simulate time series from AR(p), MA(q), and ARMA(p,q)
    processes as well as fit time series models to data based on insights gathered
    from the ACF and PACF.


    Python supports the implementation of the ARMA model with the `ARMA()` function
    (statsmodels.org/stable/generated/statsmodels.tsa.arima_model.ARMA.html) from
    statsmodels. The statsmodels library offers the definition and parameters for
    the `ARMA()` class shown in Table 4.6.


    **Table 4.6:** Definition and parameters of autoregressive moving average class
    in statsmodels


    | CLASS NAME | STATSMODELS.TSA.ARIMA_MODEL.ARMA |

    | :--- | :--- |

    | **Definition** | Class that estimates autoregressive moving average (p,q) model.
    |

    | **Parameter** | `array_like` |

    | **endog** | The endogenous (independent) variable. |

    | **Parameter** | `iterable` |

    | **Order** | The (p,q) order of the model for the number of AR parameters and
    MA parameters to use. |

    | **Parameter** | `array_like, optional` |

    | **exog** | An optional array of exogenous variables. This should not include
    a constant or trend. You can specify this in the fit method. |

    | **Parameter** | `array_like, optional` |

    | **dates** | An array-like object of datetime objects. If a pandas object is
    given for endog or exog, it is assumed to have a DateIndex. |

    | **Parameter** | `str, optional` |

    | **freq** | The frequency of the time series. A pandas offset or ''B'', ''D'',
    ''W'', ''M'', ''A'', or ''Q''. This is optional if dates are given. |


    Let''s now move to the next section and learn how to leverage autoregression and
    autoregressive moving average to build an autoregressive integrated moving average
    model with our `ts_data_load` set.


    ## Autoregressive Integrated Moving Average


    Autoregressive integrated moving average (ARIMA) models are considered a development
    of the simpler autoregressive moving average (ARMA) models and include the notion
    of integration.


    Indeed, autoregressive moving average (ARMA) and autoregressive integrated moving
    average (ARIMA) present many similar characteristics: their elements are identical,
    in the sense that both of them leverage a general autoregression AR(p) and general
    moving average model MA(q). As you previously learned, the AR(p) model makes predictions
    using previous values in the time series, while MA(q) makes predictions using
    the series mean and previous errors (Petris, Petrone, and Campagnoli 2009).


    The main differences between ARMA and ARIMA methods are the notions of integration
    and differencing. An ARMA model is a stationary model, and it works very well
    with stationary time series (whose statistical properties, such as mean, autocorrelation,
    and seasonality, do not depend on the time at which the series has been observed).


    It is possible to stationarize a time series through differencing techniques (for
    example, by subtracting a value observed at time t from a value observed at time
    t–1). The process of estimating how many nonseasonal differences are needed to
    make a time series stationarity is called integration (I) or integrated method.


    ARIMA models have three main components, denoted as p, d, q; in Python you can
    assign integer values to each of these components to indicate the specific ARIMA
    model you need to apply. These parameters are defined as follows:


    - $p$ stands for the number of lag variables included in the ARIMA model, also
    called the *lag order*.

    - $d$ stands for the number of times that the raw values in a time series data
    set are differenced, also called the *degree of differencing*.

    - $q$ denotes the magnitude of the moving average window, also called the *order
    of moving average*.


    In the case that one of the parameters above does not need to be used, a value
    of 0 can be assigned to that specific parameter, which indicates to not use that
    element of the model.


    Let’s now take a look at an extension of the ARIMA model in Python, called SARIMAX,
    which stands for seasonal autoregressive integrated moving average with exogenous
    factors. Data scientists usually apply SARIMAX when they have to deal with time
    series data sets that have seasonal cycles. Moreover, SARIMAX models support seasonality
    and exogenous factors and, as a consequence, they require not only the $p$, $d$,
    and $q$ arguments that ARIMA requires, but also another'
  mdcn: '## 移动平均


    移动平均技术利用回归方法中的先前预测误差来预测未来时间戳的观测值：每个未来观测值都可以被视为先前预测误差的加权移动平均。


    与自回归技术一起，移动平均方法是更通用的自回归移动平均和自回归积分移动平均模型的重要组成部分，这些模型呈现了更复杂的随机配置。


    移动平均模型与自回归模型非常相似：如上一段所述，自回归模型表示过去观测值的线性组合，而移动平均模型表示过去误差项的组合。数据科学家通常将移动平均模型应用于时间序列数据，因为它们非常擅长通过将模型拟合到误差项来直接解释误差过程中的隐藏或不规则模式。


    Python 通过 `statsmodels.tsa.arima_model.ARMA` 类（statsmodels.org/stable/generated/statsmodels.tsa.arima_model.ARMA.html）支持移动平均方法，该类来自
    statsmodels，通过将自回归模型的阶数设置为 0 并在 order 参数中定义移动平均模型的阶数：


    ```

    MovAvg_Model = ARMA(ts_data_load, order=(0, 1))

    ```


    statsmodels 库提供了 `ARMA()` 类的定义和参数，如表 4.5 所示。


    **表 4.5：** statsmodels 中的自回归移动平均


    | 自回归移动平均 | 描述和属性 |

    | :--- | :--- |

    | `arima_model.ARMA(endog, order[, exog, ...])` | 自回归移动平均，或 ARMA(p,q) 模型 |

    | `arima_model.ARMAResults(model, params[, ...])` | 用于保存 ARMA 模型拟合结果的类 |


    在本节中，你学习了如何使用 Python 和移动平均模型构建预测。在下一节中，你将了解使用 Python 开发和实现自回归移动平均模型的最佳包和类。


    ## 自回归移动平均


    自回归移动平均（ARMA）模型在时间序列建模中一直扮演着关键角色，因为它们的线性结构有助于显著简化线性预测（Zhang 等人，2015）。

    ARMA 方法由两部分组成：


    - 一个自回归

    - 一个移动平均模型


    与自回归和移动平均模型相比，ARMA 模型提供了平稳时间序列最有效的线性模型，因为它们能够用最少的参数对未知过程进行建模（Zhang 等人，2015）。

    特别是，ARMA 模型用于通过两个多项式来描述弱平稳随机时间序列。第一个多项式用于自回归，第二个用于移动平均。通常这种方法被称为 ARMA(p,q) 模型，其中：


    - p 代表自回归多项式的阶数，

    - q 代表移动平均多项式的阶数。


    在这里，我们将看到如何从 AR(p)、MA(q) 和 ARMA(p,q) 过程模拟时间序列，以及如何根据从 ACF 和 PACF 中收集的见解将时间序列模型拟合到数据。


    Python 通过 statsmodels 中的 `ARMA()` 函数（statsmodels.org/stable/generated/statsmodels.tsa.arima_model.ARMA.html）支持
    ARMA 模型的实现。statsmodels 库提供了 `ARMA()` 类的定义和参数，如表 4.6 所示。


    **表 4.6：** statsmodels 中自回归移动平均类的定义和参数


    | 类名 | STATSMODELS.TSA.ARIMA_MODEL.ARMA |

    | :--- | :--- |

    | **定义** | 估计自回归移动平均 (p,q) 模型的类。 |

    | **参数** | `array_like` |

    | **endog** | 内生（因）变量。 |

    | **参数** | `iterable` |

    | **Order** | 模型的 (p,q) 阶数，用于指定要使用的 AR 参数和 MA 参数的数量。 |

    | **参数** | `array_like, optional` |

    | **exog** | 一个可选的外生变量数组。这不应包括常数或趋势。你可以在 fit 方法中指定此项。 |

    | **参数** | `array_like, optional` |

    | **dates** | 一个由 datetime 对象组成的类数组对象。如果为 endog 或 exog 提供了 pandas 对象，则假定其具有 DateIndex。
    |

    | **参数** | `str, optional` |

    | **freq** | 时间序列的频率。pandas 偏移量或 ''B''、''D''、''W''、''M''、''A'' 或 ''Q''。如果提供了 dates，则此项可选。
    |


    现在让我们进入下一节，学习如何利用自回归和自回归移动平均，使用我们的 `ts_data_load` 数据集构建自回归积分移动平均模型。


    ## 自回归积分移动平均


    自回归积分移动平均（ARIMA）模型被认为是更简单的自回归移动平均（ARMA）模型的发展，并包含了积分的概念。


    事实上，自回归移动平均（ARMA）和自回归积分移动平均（ARIMA）具有许多相似的特征：它们的元素是相同的，因为它们都利用了通用的自回归 AR(p) 和通用的移动平均模型
    MA(q)。正如你之前所学，AR(p) 模型使用时间序列中的先前值进行预测，而 MA(q) 使用序列均值和先前误差进行预测（Petris, Petrone,
    and Campagnoli 2009）。


    ARMA 和 ARIMA 方法之间的主要区别在于积分和差分的概念。ARMA 模型是一个平稳模型，它在平稳时间序列（其统计特性，如均值、自相关和季节性，不依赖于序列被观测的时间）上表现非常好。


    可以通过差分技术使时间序列平稳化（例如，通过从时间 t 观测到的值中减去时间 t–1 观测到的值）。估计需要多少非季节性差分才能使时间序列平稳的过程称为积分（I）或积分方法。


    ARIMA 模型有三个主要组成部分，表示为 p、d、q；在 Python 中，你可以为每个组成部分分配整数值，以指示你需要应用的特定 ARIMA 模型。这些参数定义如下：


    - $p$ 代表 ARIMA 模型中包含的滞后变量数量，也称为*滞后阶数*。

    - $d$ 代表时间序列数据集中的原始值被差分的次数，也称为*差分阶数*。

    - $q$ 表示移动平均窗口的大小，也称为*移动平均阶数*。


    如果上述参数之一不需要使用，可以为该特定参数分配值 0，这表示不使用该模型元素。


    现在让我们看看 Python 中 ARIMA 模型的一个扩展，称为 SARIMAX，它代表带有外生因子的季节性自回归积分移动平均。数据科学家在处理具有季节性周期的时间序列数据集时通常应用
    SARIMAX。此外，SARIMAX 模型支持季节性和外生因子，因此它们不仅需要 ARIMA 所需的 $p$、$d$ 和 $q$ 参数，还需要另一个'

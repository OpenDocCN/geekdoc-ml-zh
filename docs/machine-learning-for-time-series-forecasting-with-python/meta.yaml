    # Model Deployment


    Model deployment is the method by which you integrate a machine learning model
    into an existing production environment in order to start using it to make practical
    business decisions based on data. It is one of the last stages in the machine
    learning life cycle and can be one of the most cumbersome. Often, an organization’s
    IT systems are incompatible with traditional model-building languages, forcing
    data scientists and programmers to spend valuable time and brainpower rewriting
    them (Lazzeri 2019c).


    Once we have nailed down the modeling phase and validated the model performance,
    we are ready to go into the deployment phase. In this context, deployment means
    enabling the customer to consume the model by running actual predictions on it
    at large scale.


    Machine learning model deployment is the process by which a machine learning algorithm
    is converted into a web service. We refer to this conversion process as operationalization:
    to operationalize a machine learning model means to transform it into a consumable
    service and embed it into an existing production environment (Lazzeri 2019c).


    Model deployment is a fundamental step of the machine learning model workflow
    (Figure 2.6) because, through machine learning model deployment, companies can
    begin to take full advantage of the predictive and intelligent models they build,
    develop business practices based on their model results, and therefore, transform
    themselves into actual data-driven businesses.'

    phase. That may include simple operations such as using the raw data column as
    is with its actual measured value, standardized values, and more complex operations
    such as time lagging. The newly created data columns are referred to as data features,
    and the process of generating these is referred to as feature engineering. By
    the end of this process, we would have a new data set that has been derived from
    the raw data and can be used for modeling.


    # Data Pre-processing and Feature Engineering


    Data pre-processing and feature engineering is the step where data scientists
    clean data sets from outliers and missing data and create additional features
    with the raw data to feed their machine learning models. Specifically, feature
    engineering is the process of transforming data into features to act as inputs
    for machine learning models such that good-quality features help in improving
    the overall model performance. Features are also very much dependent on the underlying
    problem we are trying to solve with a machine learning solution.


    In machine learning, a feature is a quantifiable variable of the phenomenon you
    are trying to analyze, typically depicted by a column in a data set. Considering
    a generic two-dimensional data set, each observation is depicted by a row and
    each feature by a column, which will have a specific value for an observation,
    as illustrated in Figure 2.4.



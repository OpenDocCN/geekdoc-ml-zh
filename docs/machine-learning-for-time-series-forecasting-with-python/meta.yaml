    \n# 第四章\n## 自回归和自动化时间序列预测方法简介\n\n构建预测是任何业务不可或缺的一部分，无论是关于收入、库存、在线销售还是客户需求预测。时间序列预测之所以如此基础，是因为现实世界中存在许多具有时间维度的问题和相关数据。\n\

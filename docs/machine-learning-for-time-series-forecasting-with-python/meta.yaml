    \n表 6.1 提供了为每个计算目标创建部署配置的示例：\n\n**表 6.1：为每个计算目标创建部署配置**\n\n| 计算目标 | 部署配置示例 |\n\
    | :--- | :--- |\n| 本地 | `deployment_config = LocalWebservice.deploy_configuration(port=8890)`\
    \ |\n| Azure 容器实例 | `deployment_config = AciWebservice.deploy_configuration(cpu_cores=1,\
    \ memory_gb=1)` |\n| Azure Kubernetes 服务 | `deployment_config = AksWebservice.deploy_configuration(cpu_cores=1,\
    \ memory_gb=1)` |\n\n对于这个特定示例，我们将创建一个 Azure 容器实例 (ACI)，当你需要快速部署和验证模型或正在测试一个开发中的模型时，通常会使用它。\n\
    \n首先，你必须使用 CPU 核心数、内存大小和其他参数（如描述）来配置服务。然后，你必须从镜像部署服务。\n\n你只能部署一次服务。如果你想再次部署，请更改服务名称或直接在\
    \ Azure 上删除现有服务：\n\n```python\n# load the data to use for testing and encode it\
    \ in json\nenergy_pd = load_data('./data/energy.csv')\nenergy = pd.DataFrame.to_json(energy_pd,\
    \ date_format='iso')\nenergy = json.loads(energy)\nenergy = json.dumps({\"energy\"\
    : energy})\n```\n\n```python\n# Call the service to get the prediction for this\
    \ time series\nprediction = aci_service.run(energy)\n```\n\n如果你愿意，在这最后一步，你可以绘制预测结果。以下示例将帮助你完成以下三项任务：\n\
    \n- 将预测转换为包含正确索引和列的 DataFrame。\n- 按照训练时的方式缩放原始数据。\n- 绘制原始数据和预测数据。\n\n```python\n\
    # prediction is a string, convert it to a dictionary\nprediction = ast.literal_eval(prediction)\n\
    \n# convert the dictionary to pandas dataframe\nprediction_df = pd.DataFrame.from_dict(prediction)\n\
    \nprediction_df.columns = ['load']\nprediction_df.index = energy_pd.iloc[2500:2510].index\n\
    \n# Scale the original data\nscaler = MinMaxScaler()\nenergy_pd['load'] = scaler.fit_transform(np.array(energy_pd.loc[:,\
    \ 'load'].values).reshape(-1, 1))\n\n# Visualize a part of the data before the\
    \ forecasting\noriginal_data = energy_pd.iloc[1500:2501]\n\n# Plot the forecasted\
    \ data points\nfig = plt.figure(figsize=(15, 8))\n\nplt.plot_date(x=original_data.index,\
    \ y=original_data, fmt='-', xdate=True, label=\"original load\", color='red')\n\
    plt.plot_date(x=prediction_df.index, y=prediction_df, fmt='-', xdate=True, label=\"\
    predicted load\", color='yellow')\n```\n\n在部署能源需求预测解决方案时，我们感兴趣的是部署一个端到端的解决方案，它超越了预测\
    \ Web 服务，并促进了整个数据流。当我们调用新的预测时，我们需要确保模型接收的是最新的数据特征。这意味着新收集的原始数据需要不断地被摄取、处理并转换为模型构建所依据的所需特征集。\n\
    \n同时，我们希望将预测数据提供给最终消费客户。图 6.7 展示了一个示例数据流循环（或数据管道）。\n\n![图 6.7：能源需求预测端到端数据流](img/fd006a6c056e5cf905b5150f958ed477_214_0.png)\n\
    \n**图 6.7：** 能源需求预测端到端数据流\n\n以下是作为能源需求预测循环一部分发生的步骤：\n\n1. 数百万个部署的数据仪表不断实时生成电力消耗数据。\n\
    2. 这些数据被收集并上传到云存储库（如 Azure 存储）。\n3. 在处理之前，原始数据按照业务定义聚合到变电站或区域级别。\n4. 然后进行特征处理，生成模型训练或评分所需的数据——特征集数据存储在数据库中（如\
    \ Azure SQL 数据库）。\n5. 调用重训练服务来重新训练预测模型。更新后的模型版本被持久化，以便评分 Web 服务可以使用它。\n6. 按照适合所需预测频率的时间表调用评分\
    \ Web 服务。\n7. 预测数据存储在最终消费客户可以访问的数据库中。\n8. 消费客户端检索预测结果，并将其应用回电网，并根据所需的用例进行消费。\n\
    \n需要注意的是，整个循环是完全自动化的，并按计划运行。\n\n## 结论\n\n在最后一章中，我们深入探讨了构建和部署一些时间序列预测解决方案的过程。具体而言，本章全面概述了构建和部署你自己的时间序列预测解决方案的工具：\n\
    \n- **实验设置与 Azure Machine Learning SDK for Python 简介** – 我介绍了 Azure Machine Learning\
    \ SDK for Python 以构建和运行机器学习工作流，你学习了以下概念和资产：\n    - `Workspace`，这是你在云中用于实验、训练和部署机器学习模型的基础资源。\n\
    \    - `Experiment`，这是另一个基础云资源，代表一系列试验（单个模型运行）的集合。\n    - `Run`，代表实验的一次单独试验。\n\
    \    - `Model`，用于处理机器学习模型的云表示。\n    - `ComputeTarget`、`RunConfiguration`、`ScriptRunConfig`，这些是用于创建和管理计算目标的抽象父类。计算目标代表你可以训练机器学习模型的各种资源。\n\
    \    - `Image`，这是将模型打包到包含运行时环境和依赖项的容器镜像中的抽象父类。\n    - `Webservice`，这是为你的模型创建和部署\
    \ Web 服务的抽象父类。\n- **机器学习模型部署** – 本节介绍了机器学习模型部署，即将机器学习模型集成到现有生产环境中，以便开始基于数据制定实际业务决策的方法。\n\
    - **时间序列预测解决方案架构与部署示例** – 在最后一节中，我们构建、训练并部署了一个端到端的数据管道架构，并逐步讲解了部署代码和示例。"

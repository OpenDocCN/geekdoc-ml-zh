    \ consists of count, mean, std, min, and max statistics as well as lower, 50,\
    \ and upper percentiles. By default, the lower percentile is 25 and the upper\
    \ percentile is 75. The 50 percentile is the same as the median.\n\nOn the other\
    \ hand, for object data (e.g., strings or time stamps), the result index presents\
    \ count, unique, top, and freq. Data scientists need to keep in mind that the\
    \ top value does not represent the most common value; the freq represents the\
    \ most common value. Additional important information are included time stamps,\
    \ such as the first and last items. If multiple object values have the highest\
    \ count, then the count and top results will be arbitrarily chosen from among\
    \ those with the highest count.\n\nFinally, for mixed data types presented in\
    \ a DataFrame, the default option is to return only an evaluation of numeric columns.\
    \ If the DataFrame contains only object and categorical data without any numeric\
    \ columns, the default option is to show an overview of both the object and categorical\

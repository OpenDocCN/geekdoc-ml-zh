    The learning process is based on the following steps:


    +   1. Feed data into an algorithm. (In this step you can provide additional information
    to the model, for example, by performing feature extraction.)

    2. Use this data to train a model.

    3. Test and deploy the model.

    4. Consume the deployed model to do an automated predictive task. In other words,
    call and use the deployed model to receive the predictions returned by the model
    (aka.ms/deeplearningVSmachinelearning).


    Machine learning is a way to achieve artificial intelligence. By using machine
    learning and deep learning techniques, data scientists can build computer systems
    and applications that do tasks that are commonly associated with human intelligence.
    These tasks include time series forecasting, image recognition, speech recognition,
    and language translation (aka.ms/deeplearningVSmachinelearning).


    There are three main classes of machine learning: *supervised learning*, *unsupervised
    learning*, and *reinforcement learning*. In the following few paragraphs, we will
    have a closer look at each of these machine learning classes:


    ■ *Supervised learning* is a type of machine learning system in which both input
    (which is the collection of values for the variables in your data set)'

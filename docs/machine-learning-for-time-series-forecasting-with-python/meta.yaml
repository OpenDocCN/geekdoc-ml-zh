    \n## 用于时间序列预测的Python\n\n在本节中，我们将探讨用于时间序列数据的不同Python库，以及pandas、statsmodels和scikit-learn等库如何分别帮助你进行数据处理、时间序列建模和机器学习。Python生态系统是应用机器学习的主导平台。\n\

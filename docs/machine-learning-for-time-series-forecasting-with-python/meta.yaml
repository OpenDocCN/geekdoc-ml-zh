  md: '# Chapter 5 ■ Introduction to Neural Networks for Time Series Forecasting


    ![](img/fd006a6c056e5cf905b5150f958ed477_165_0.png)


    Figure 5.2: Recurrent neural network architecture


    In Figure 5.2, an RNN architecture is represented. RNN has an internal hidden
    state, denoted as H, which can be fed back to the network. In this figure, the
    RNN processes input values X and produces output values Y. The hidden stat, denoted
    as H, allows the information to be forwarded from one node of the network to the
    next node, organized as sequences or a vector. That vector now has information
    on the current input and previous inputs. The vector goes through the tanh activation,
    and the output is the new hidden state. The tanh activation is used to regulate
    the values flowing through the network and always keeps the values between –1
    and 1. Because of this structure, RNNs can represent a good modeling choice to
    try to solve a variety of sequential problems, such as time series forecasting,
    speech recognition, or image captioning (Bianchi 2018).


    As you can notice, in Figure 5.2, there is an additional element denoted as W.
    W indicates that each unit has three sets of weights, one for the inputs (X),
    another for the outputs of the previous time step (H), and the other for the output
    of the current time step (Y). Those weight values are determined by the training
    process and can be identified by applying a popular optimization technique called
    gradient descent.


    In simple words, a gradient is the slope of a function that can be defined as
    the partial derivatives of a set of parameters with respect to its inputs. Gradients
    are values used to update a neural network''s weights: the function represents
    the problem that we want to solve using neural networks and selecting an appropriate
    choice of parameters to update those neural networks weights. In order to calculate
    a gradient descent, we then need to calculate the loss function and its derivative
    with respect to the weights. We start with a random point on the function and
    move in the negative direction of the gradient of the function to reach a point
    where the value of the function is minimum (Zhang et al. 2019).


    In Figure 5.2, we seem to be applying the same weights to different items in the
    input series. This means that we are sharing parameters across inputs. If we are
    not able share parameters across inputs, then an RNN becomes like an ordinary
    neural network where each input node requires weights of their own.'

    # TensorFlow


    TensorFlow is an open-source library for numerical computation using data flow
    graphs. It was created and is maintained by the Google Brain team, and it is released
    under the Apache 2.0 open-source license. One of the most beneficial capabilities
    of TensorFlow is that data scientists can build and train their models with TensorFlow
    using the high-level Keras API, which makes getting started with TensorFlow and
    machine learning easy (tensorflow.org).


    Nodes in the graph represent mathematical operations, while the graph edges represent
    the multidimensional data arrays (tensors) communicated between them. The distributed
    TensorFlow architecture contains distributed master and worker services with kernel
    implementations (Nguyen et al. 2019). TensorFlow was created for use in research,
    development, and production systems because of its capability of running on single
    CPU systems, GPUs, mobile devices, and large-scale distributed systems.


    Moreover, TensorFlow gives you the flexibility and control with features like
    the Keras Functional API for easy prototyping and fast debugging, and it supports
    an ecosystem of powerful add-on libraries and models to experiment with, including
    Ragged Tensors, TensorFlow Probability, Tensor2Tensor, and BERT (tensorflow.org).


    In this section, you discovered the Keras Python library for deep learning research
    and development. In the next section, you will learn how to implement a GRU model
    for a univariate time series forecasting scenario.



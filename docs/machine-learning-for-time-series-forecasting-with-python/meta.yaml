    supporting *ARX models* (autoregressions with exogenous variables). ARX models
    and related models can also be fitted with the `arima.ARIMA` class and the `SARIMAX`
    class.


    +   - *Seasonal effects*, which are defined as systematic and calendar related
    effects in time series.


    Python supports the autoregression modeling using the `AutoReg` model from the
    statsmodels library (statsmodels.org/stable/generated/statsmodels.tsa.ar_model.AutoReg.html),
    as summarized in Table 4.4.


    Table 4.4: Definition and parameters of autoregressive class in statsmodels


    | CLASS NAME | statsmodels.tsa.ar_model.autoreg |

    | :--- | :--- |

    | **Definition** | Class that estimates an ARX model using CML estimator. |

    | **Parameter** | array_like |

    | **endog** | A 1-d endogenous response variable. The independent variable. |

    | **Parameter** | {int, list[int]} |

    | **Lags** | The number of lags to include in the model if an integer or the list
    of lag indices to include. |

    | **Parameter** | The trend to include in the model: |

    | **trend** | ''n'' - No trend. |

    | : {''n'', ''c'', ''t'', ''ct''} | ''c'' - Constant only. |

    | | ''t'' - Time trend only. |

    | | ''ct'' - Constant and time trend. |

    | **Parameter** | bool |

    | **seasonal** | Flag indicating whether to include seasonal dummies in the model.
    If seasonal is True and trend includes ''c'', then the first period is excluded
    from the seasonal terms. |

    | **Parameter** | array_like, optional |

    | **exog** | Exogenous variables to include in the model. Must have the same number
    of observations as endog and should be aligned so that endog[i] is regressed on
    exog[i]. |

    | **Parameter** | {None, int} |

    | **hold_back** | Initial observations to exclude from the estimation sample.
    If None, then hold_back is equal to the maximum lag in the model. Set to a non-zero
    value to produce comparable models with different lag length. |


    Continues'

- md: "## Chapter 2 ■ How to Design an End-to-End Time Series Forecasting Solution\n\
    \nAn effective data ingestion process begins by prioritizing data sources, validating\
    \ individual files, and routing data items to the correct destination. Moreover,\
    \ a data ingestion pipeline moves streaming data and batched data from preexisting\
    \ databases and data warehouses to a data lake.\n\nIn the data collection phase,\
    \ data scientists and architects need to work together and usually evaluate two\
    \ different types of tools: time series data collection tools and storage tools.\n\
    \n- *Time series data collection tools* – Time series data collection tools are\
    \ the ones that help you in the extraction and organization of raw data. An example\
    \ is Stream Analytics, which is a real-time analytics and complex event-processing\
    \ engine that is designed to analyze and process high volumes of fast streaming\
    \ data from multiple sources simultaneously (aka.ms/AzureStreamAnalytics). Patterns\
    \ and relationships can be identified in information extracted from a number of\
    \ input sources including devices, sensors, clickstreams, social media feeds,\
    \ and applications. These patterns can be used to trigger actions and initiate\
    \ workflows such as creating alerts, feeding information to a reporting tool,\
    \ or storing transformed data for later use.\n\nAnother example of a data collection\
    \ tool is Data Factory, a managed cloud service that is built for complex hybrid\
    \ extract-transform-load (ETL), extract-load-transform (ELT), and data integration\
    \ projects. It allows you to create data-driven workflows for orchestrating data\
    \ movement and transforming data at scale (aka.ms/AzureStreamAnalytics).\n\n-\
    \ *Data storage tools* – Storage tools are databases that allow you to store your\
    \ data. These tools store data in either structured or unstructured form and can\
    \ aggregate information from several platforms in an integrated manner, such as\
    \ Cosmos DB: today’s applications are required to be highly responsive and always\
    \ online (aka.ms/MicrosoftCosmosDB). To achieve low latency and high availability,\
    \ instances of these applications need to be deployed in datacenters that are\
    \ close to their users. Cosmos DB is a globally distributed, multi-model database\
    \ service, that enables you to scale throughput and storage elastically and independently\
    \ across many regions worldwide (www.aka.ms/MicrosoftCosmosDB).\n\nIn the case\
    \ of demand forecasting, load data needs to be constantly and frequently predicted,\
    \ and we must ensure that the raw data is flowing by means of a solid and reliable\
    \ data ingestion process. The ingestion process must guarantee that the raw data\
    \ is available for the forecasting process at the required time. That implies\
    \ that the data ingestion frequency should be greater than the forecasting frequency.\n\
    \nIf our demand forecasting solution would generate a new forecast at 8:00 a.m.\
    \ on a daily basis, then we need to ensure that all the data that has been collected\
    \ during the last 24 hours has been fully ingested till that point and has to\
    \ include the last hour of data.\n\nNow that you have a better understanding of\
    \ data ingestion, we are ready for performing data exploration. In the next section,\
    \ we will take a closer look at different techniques to explore data in order\
    \ to bring important aspects of that data into focus for further time series analysis.\n\
    \n## Data Exploration and Understanding\n\nData exploration is the first step\
    \ in data analysis and typically involves summarizing the main characteristics\
    \ of a data set, including its size, accuracy, initial patterns in the data, and\
    \ other attributes. The raw data source that is required for performing reliable\
    \ and accurate forecasting must meet some basic data quality criteria. Although\
    \ advanced statistical methods can be used to compensate for some possible data\
    \ quality issue, we still need to ensure that we are crossing some base data quality\
    \ threshold when ingesting new data (Lazzeri 2019b).\n\nHere are a few considerations\
    \ concerning raw data quality:\n\n- *Missing value* – This refers to the situation\
    \ when specific measurement was not collected. The basic requirement here is that\
    \ the missing value rate should not be greater than 10 percent for any given time\
    \ period. In a case in which a single value is missing, it should be indicated\
    \ by using a predefined value (for example, ‘9999’) and not ‘0,’ which could be\
    \ a valid measurement.\n- *Measurement accuracy* – The actual value of consumption\
    \ or temperature should be accurately recorded. Inaccurate measurements will produce\
    \ inaccurate forecasts. Typically, the measurement error should be lower than\
    \ 1 percent relative to the true value.\n- *Time of measurement* – It is required\
    \ that the actual time stamp of the data collected will not deviate by more than\
    \ 10 seconds relative to the true time of the actual measurement.\n- *Synchronization*\
    \ – When multiple data sources are being used (for example, consumption and temperature),\
    \ we must ensure that there are no time synchronization issues between them. This\
    \ means that the time difference between the collected time stamp from any two\
    \ independent data sources should not exceed more than 10 seconds.\n- *Latency*\
    \ – As discussed earlier, in the section “Data Ingestion,” we are dependent on\
    \ a reliable data flow and ingestion process. To control that, we must ensure\
    \ that we control the data latency. This is specified as the time difference between\
    \ the time that the actual measurement was taken and the time at which it has\
    \ been loaded.\n\nEffectively leveraging data exploration can enhance the overall\
    \ understanding of the characteristics of the data domain, thereby allowing for\
    \ the creation of more accurate models.\n\nData exploration provides a set of\
    \ simple tools to obtain some basic understanding of the data. The results of\
    \ data exploration can be extremely powerful in grasping the structure of the\
    \ data, the distribution of the values, and the presence of extreme values and\
    \ interrelationships within the data set: this information provides guidance on\
    \ applying the right kind of further data pre-processing and feature engineering\
    \ (Lazzeri 2019b).\n\nOnce the raw data has been ingested and has been securely\
    \ stored and explored, it is ready to be processed. The data preparation phase\
    \ is basically taking the raw data and converting (transforming, reshaping) it\
    \ into a form for the modeling phase. That may include simple operations such\
    \ as using the raw data column as is with its actual measured value, standardized\
    \ values, and more complex operations such as time lagging. The newly created\
    \ data columns are referred to as data features, and the process of generating\
    \ these is referred to as feature engineering. By the end of this process, we\
    \ would have a new data set that has been derived from the raw data and can be\
    \ used for modeling.\n\n## Data Pre-processing and Feature Engineering\n\nData\
    \ pre-processing and feature engineering is the step where data scientists clean\
    \ data sets from outliers and missing data and create additional features with\
    \ the raw data to feed their machine learning models. Specifically, feature engineering\
    \ is the process of transforming data into features to act as inputs for machine\
    \ learning models such that good-quality features help in improving the overall\
    \ model performance. Features are also very much dependent on the underlying problem\
    \ we are trying to solve with a machine learning solution.\n\nIn machine learning,\
    \ a feature is a quantifiable variable of the phenomenon you are trying to analyze,\
    \ typically depicted by a column in a data set. Considering a generic two-dimensional\
    \ data set, each observation is depicted by a row and each feature by a column,\
    \ which will have a specific value for an observation, as illustrated in Figure\
    \ 2.4.\n\n![](img/fd006a6c056e5cf905b5150f958ed477_59_0.png)\n\nThus, like the\
    \ example in Figure 2.4, each row typically indicates a feature vector and the\
    \ entire set of features across all the observations forms a two-dimensional feature\
    \ matrix also known as a feature set. This is similar to data frames or spreadsheets\
    \ representing two-dimensional data. Typically, machine learning algorithms work\
    \ with these numeric matrices or tensors and hence most feature engineering techniques\
    \ deal with converting raw data into some numeric representations that can be\
    \ easily understood by these algorithms.\n\nFeatures can be of two major types\
    \ based on the data set:\n\n- *Inherent raw features* are usually already your\
    \ data set, with no need of extra data manipulation or feature engineering, as\
    \ they are usually originated and collected directly from the data source.\n-\
    \ *Derived features* are usually created through data manipulation or feature\
    \ engineering; in this stage, data scientists need to extract features from existing\
    \ data attributes.\n\nThe following list includes some of the common data derived\
    \ features that are included in the forecasting models:\n\n- *Time driven features*:\
    \ These features are derived from the date/time stamp data. They are extracted\
    \ and converted into categorical features like these:\n    - Time of day – This\
    \ is the hour of the day, which takes values from 0 to 23.\n    - Day of week\
    \ – This represents the day of the week and takes values from 1 (Sunday) to 7\
    \ (Saturday).\n    - Day of month – This represents the actual date and can take\
    \ values from 1 to 31.\n    - Month of year – This represents the month and takes\
    \ values from 1 (January) to 12 (December).\n    - Weekend – This is a binary\
    \ value feature that takes the values of 0 for weekdays or 1 for weekend.\n  \
    \  - Holiday – This is a binary value feature that takes the values of 0 for a\
    \ regular day or 1 for a holiday.\n    - Fourier terms – The Fourier terms are\
    \ weights that are derived from the time stamp and are used to capture the seasonality\
    \ (cycles) in the data. Since we may have multiple seasons in our data, we may\
    \ need multiple Fourier terms. For example, demand values may have yearly, weekly,\
    \ and daily seasons/cycles, which will result in three Fourier terms.\n- *Independent\
    \ measurement features*: The independent features include all the data elements\
    \ that we would like to use as predictors in our model. Here we exclude the dependent\
    \ feature that we would need to predict."
  mdcn: "## 第2章 ■ 如何设计端到端时间序列预测解决方案\n\n有效的数据摄取流程始于对数据源的优先级排序、对单个文件的验证，以及将数据项路由到正确的目的地。此外，数据摄取管道将流数据和批处理数据从现有数据库和数据仓库移动到数据湖。\n\
    \n在数据收集阶段，数据科学家和架构师需要协同工作，通常评估两种不同类型的工具：时间序列数据收集工具和存储工具。\n\n- *时间序列数据收集工具* – 时间序列数据收集工具是帮助你提取和组织原始数据的工具。例如\
    \ Stream Analytics，它是一个实时分析和复杂事件处理引擎，旨在同时分析和处理来自多个来源的大量快速流数据（aka.ms/AzureStreamAnalytics）。可以从包括设备、传感器、点击流、社交媒体源和应用程序在内的多个输入源中提取信息，并识别其中的模式和关系。这些模式可用于触发操作和启动工作流，例如创建警报、向报告工具提供信息，或存储转换后的数据以供后续使用。\n\
    \n另一个数据收集工具的例子是 Data Factory，这是一个为复杂的混合提取-转换-加载（ETL）、提取-加载-转换（ELT）和数据集成项目构建的托管云服务。它允许你创建数据驱动的工作流，以编排数据移动和大规模转换数据（aka.ms/AzureStreamAnalytics）。\n\
    \n- *数据存储工具* – 存储工具是允许你存储数据的数据库。这些工具以结构化或非结构化形式存储数据，并可以以集成的方式聚合来自多个平台的信息，例如 Cosmos\
    \ DB：当今的应用程序需要高度响应且始终在线（aka.ms/MicrosoftCosmosDB）。为了实现低延迟和高可用性，这些应用程序的实例需要部署在靠近其用户的数据中心。Cosmos\
    \ DB 是一个全球分布的多模型数据库服务，使你能够跨全球多个区域弹性且独立地扩展吞吐量和存储（www.aka.ms/MicrosoftCosmosDB）。\n\
    \n在需求预测的情况下，负荷数据需要持续且频繁地进行预测，我们必须确保原始数据通过一个坚实可靠的数据摄取流程流动。摄取过程必须保证原始数据在所需时间可用于预测过程。这意味着数据摄取频率应大于预测频率。\n\
    \n如果我们的需求解决方案每天早上8:00生成一次新的预测，那么我们需要确保过去24小时内收集的所有数据在那时已完全摄取，并且必须包括最后一小时的数据。\n\
    \n既然你对数据摄取有了更好的理解，我们就可以进行数据探索了。在下一节中，我们将更仔细地研究不同的数据探索技术，以便将数据的重要方面带入焦点，为后续的时间序列分析做准备。\n\
    \n## 数据探索与理解\n\n数据探索是数据分析的第一步，通常涉及总结数据集的主要特征，包括其大小、准确性、数据中的初始模式以及其他属性。执行可靠和准确预测所需的原始数据源必须满足一些基本的数据质量标准。尽管可以使用高级统计方法来补偿一些可能的数据质量问题，但我们仍然需要确保在摄取新数据时达到一些基本的数据质量阈值（Lazzeri\
    \ 2019b）。\n\n以下是关于原始数据质量的一些考虑因素：\n\n- *缺失值* – 这指的是特定测量未被收集的情况。这里的基本要求是，对于任何给定时间段，缺失值率不应大于10%。在单个值缺失的情况下，应使用预定义值（例如，‘9999’）来表示，而不是‘0’，因为‘0’可能是一个有效的测量值。\n\
    - *测量准确性* – 消耗量或温度的实际值应准确记录。不准确的测量将产生不准确的预测。通常，测量误差相对于真实值应低于1%。\n- *测量时间* – 要求收集的数据的实际时间戳相对于实际测量的真实时间偏差不超过10秒。\n\
    - *同步性* – 当使用多个数据源（例如，消耗量和温度）时，我们必须确保它们之间没有时间同步问题。这意味着任何两个独立数据源收集的时间戳之间的时间差不应超过10秒。\n\
    - *延迟* – 正如前面在“数据摄取”部分所讨论的，我们依赖于可靠的数据流和摄取过程。为了控制这一点，我们必须确保控制数据延迟。这被指定为实际测量发生的时间与数据被加载的时间之间的时间差。\n\
    \n有效利用数据探索可以增强对数据领域特征的整体理解，从而能够创建更准确的模型。\n\n数据探索提供了一组简单的工具来获得对数据的基本理解。数据探索的结果在把握数据结构、值的分布、极端值的存在以及数据集内的相互关系方面可能非常强大：这些信息为应用正确的进一步数据预处理和特征工程提供了指导（Lazzeri\
    \ 2019b）。\n\n一旦原始数据被摄取、安全存储并探索完毕，它就准备好被处理了。数据准备阶段基本上是获取原始数据并将其转换（转换、重塑）为适合建模阶段的形式。这可能包括简单的操作，例如直接使用原始数据列及其实际测量值、标准化值，以及更复杂的操作，例如时间滞后。新创建的数据列被称为数据特征，生成这些特征的过程被称为特征工程。在这个过程结束时，我们将得到一个从原始数据派生出来的新数据集，可用于建模。\n\
    \n## 数据预处理与特征工程\n\n数据预处理和特征工程是数据科学家从数据集中清理异常值和缺失数据，并使用原始数据创建额外特征以馈送其机器学习模型的步骤。具体来说，特征工程是将数据转换为特征以作为机器学习模型输入的过程，高质量的特征有助于提高整体模型性能。特征也非常依赖于我们试图用机器学习解决方案解决的底层问题。\n\
    \n在机器学习中，特征是你试图分析的现象的一个可量化变量，通常由数据集中的一个列表示。考虑一个通用的二维数据集，每个观测值由一行表示，每个特征由一列表示，该列对于一个观测值将有一个特定的值，如图2.4所示。\n\
    \n![](img/fd006a6c056e5cf905b5150f958ed477_59_0.png)\n\n因此，如图2.4中的示例所示，每一行通常表示一个特征向量，所有观测值的整个特征集形成一个二维特征矩阵，也称为特征集。这类似于表示二维数据的数据框或电子表格。通常，机器学习算法处理这些数值矩阵或张量，因此大多数特征工程技术涉及将原始数据转换为这些算法可以轻松理解的某种数值表示。\n\
    \n根据数据集，特征可以分为两种主要类型：\n\n- *固有原始特征* 通常已经是你的数据集的一部分，不需要额外的数据操作或特征工程，因为它们通常直接从数据源生成和收集。\n\
    - *派生特征* 通常通过数据操作或特征工程创建；在这个阶段，数据科学家需要从现有数据属性中提取特征。\n\n以下列表包括一些包含在预测模型中的常见数据派生特征：\n\
    \n- *时间驱动特征*：这些特征源自日期/时间戳数据。它们被提取并转换为分类特征，例如：\n    - 一天中的时间 – 这是一天中的小时，取值范围为0到23。\n\
    \    - 星期几 – 这代表星期几，取值范围为1（星期日）到7（星期六）。\n    - 月中的天 – 这代表实际日期，取值范围为1到31。\n   \
    \ - 一年中的月份 – 这代表月份，取值范围为1（一月）到12（十二月）。\n    - 周末 – 这是一个二值特征，工作日取值为0，周末取值为1。\n\
    \    - 假日 – 这是一个二值特征，普通日取值为0，假日取值为1。\n    - 傅里叶项 – 傅里叶项是从时间戳派生出的权重，用于捕获数据中的季节性（周期）。由于我们的数据中可能有多个季节，我们可能需要多个傅里叶项。例如，需求值可能具有年度、每周和每日的季节/周期，这将导致三个傅里叶项。\n\
    - *独立测量特征*：独立特征包括我们希望用作模型中预测变量的所有数据元素。这里我们排除了需要预测的因变量特征。"

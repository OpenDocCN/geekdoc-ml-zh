    # Data Exploration and Understanding


    Data exploration is the first step in data analysis and typically involves summarizing
    the main characteristics of a data set, including its size, accuracy, initial
    patterns in the data, and other attributes. The raw data source that is required
    for performing reliable and accurate forecasting must meet some basic data quality
    criteria. Although advanced statistical methods can be used to compensate for
    some possible data quality issue, we still need to ensure that we are crossing
    some base data quality threshold when ingesting new data (Lazzeri 2019b).


    Here are a few considerations concerning raw data quality:


    +   - *Missing value* – This refers to the situation when specific measurement
    was not collected. The basic requirement here is that the missing value rate should
    not be greater than 10 percent for any given time period. In a case in which a
    single value is missing, it should be indicated by using a predefined value (for
    example, ‘9999’) and not ‘0,’ which could be a valid measurement.

    - *Measurement accuracy* – The actual value of consumption or temperature should
    be accurately recorded. Inaccurate measurements will produce inaccurate forecasts.
    Typically, the measurement error should be lower than 1 percent relative to the
    true value.

    - *Time of measurement* – It is required that the actual time stamp of the data
    collected will not deviate by more than 10 seconds relative to the true time of
    the actual measurement.

    - *Synchronization* – When multiple data sources are being used (for example,
    consumption and temperature), we must ensure that there are no time synchronization
    issues between them. This means that the time difference between the collected
    time stamp from any two independent data sources should not exceed more than 10
    seconds.

    - *Latency* – As discussed earlier, in the section “Data Ingestion,” we are dependent
    on a reliable data flow and ingestion process. To control that, we must ensure
    that we control the data latency. This is specified as the time difference between
    the time that the actual measurement was taken and the time at which it has been
    loaded.'

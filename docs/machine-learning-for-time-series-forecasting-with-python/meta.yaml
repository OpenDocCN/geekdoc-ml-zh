    the path of the model file(s) on the local file system. If you register a folder
    or a collection of files, this API returns the path to the directory that contains
    those files.


    Finally, before deploying, you must define the deployment configuration. The deployment
    configuration is specific to the compute target that will host the web service.
    For example, when deploying locally, you must specify the port where the service
    accepts requests. The following compute targets, or compute resources, can be
    used to host your web service deployment:



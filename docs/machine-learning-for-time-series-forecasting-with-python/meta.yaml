- img_proc: true
  md: "learning and machine learning, let's start by defining each of these two fields\
    \ of study separately:\n\n+   - *Machine learning* is the practice of using an\
    \ algorithm to break up data, learn from it, and then use this data to make some\
    \ predictions about a certain phenomenon. The learning process is generally based\
    \ on the following steps:\n  1. We feed our algorithm with data.\n  2. We then\
    \ use this data to teach our model how to learn from previous observations.\n\
    \  3. We run a test to check if our model has learned enough from previous observations\
    \ and we evaluate its performance.\n  4. If the model is performing well (based\
    \ on our expectations and requirements), we deploy and push it into production,\
    \ making it available to other stakeholders in the organization or outside the\
    \ business.\n  5. Finally, we consume our deployed model to perform a certain\
    \ automated predictive task.\n\n+   - *Deep learning* is a subset of machine learning.\
    \ Deep learning algorithms are specific types of machine learning algorithms that\
    \ are based on artificial neural networks. In this case, the learning process\
    \ is based on the same steps as those for machine learning, but it is called deep\
    \ because the structure of algorithm is based on artificial neural networks that\
    \ consist of multiple input, output, and hidden layers, containing units that\
    \ transform the input data into an information that the next layer can use to\
    \ perform a certain automated predictive task once the deep learning model is\
    \ deployed.\n\nIt is important to compare the two techniques and understand the\
    \ main differences. The key differences between machine learning and deep learning\
    \ are summarized in Table 5.1.\n\n**Table 5.1:** Key differences between machine\
    \ learning and deep learning\n\n| CHARACTERISTIC CATEGORY | ALL MACHINE LEARNING\
    \ | ONLY DEEP LEARNING |\n| :--- | :--- | :--- |\n| **Number of data points**\
    \ | Can use small amounts of data to make predictions. | Needs to use large amounts\
    \ of training data to make predictions. |\n| **Hardware dependencies** | Can work\
    \ on low-end machines. It doesn't need a large amount of computational power.\
    \ | Depends on high-end machines. It inherently does a large number of matrix\
    \ multiplication operations. A GPU can efficiently optimize these operations.\
    \ |\n\n*Continues*"

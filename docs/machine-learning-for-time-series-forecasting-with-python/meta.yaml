  md: "# Chapter 4 Introduction to Autoregressive and Automated Methods\n\nAt this\
    \ point, we need to separate our data set into train and test sets. We train the\
    \ model on the train set. After the model has finished training, we evaluate the\
    \ model on the test set. We must ensure that the test set covers a later period\
    \ in time than the training set, to ensure that the model does not gain from information\
    \ from future time periods.\n\nWe will allocate the period 1st September to 31st\
    \ October 2014 to training set (two months) and the period 1st November 2014 to\
    \ 31st December 2014 to the test set (two months). Since this is daily consumption\
    \ of energy, there is a strong seasonal pattern, but the consumption is most similar\
    \ to the consumption in the recent days. Therefore, using a relatively small window\
    \ of time for training the data should be sufficient:\n\n```\n# Create train set\
    \ containing only the model features\ntrain = ts_data_load.copy()\n    [(ts_data_load.index\
    \ >= train_start_dt)\n    & (ts_data_load.index < test_start_dt)][['load']]\n\
    test = ts_data_load.copy()\n    [ts_data_load.index >= test_start_dt][['load']]\n\
    \nprint('Train data shape: ', train.shape)\nprint('Test data shape: ', test.shape)\n\
    ```\n\nOur data preparation for the train and test sets involves also scaling\
    \ the time series such that the values fall within the interval (0, 1):\n\n```\n\
    # Scale train data to be in range (0, 1)\nscaler = MinMaxScaler()\ntrain['load']\
    \ = scaler.fit_transform(train)\ntrain.head()\n\n# Scale test data to be in range\
    \ (0, 1)\ntest['load'] = scaler.transform(test)\ntest.head()\n```\n\nIt is important\
    \ to specify the number of steps to forecast ahead and the order and seasonal\
    \ order for our SARIMAX model:\n\n```\n# Specify the number of steps to forecast\
    \ ahead\nHORIZON = 3\nprint('Forecasting horizon:', HORIZON, 'hours')\n```\n\n\
    We then specify the order and seasonal order for the SARIMAX model, as shown in\
    \ the following example code:\n\n```\n# Define the order and seasonal order for\
    \ the SARIMAX model\norder = (4, 1, 0)\nseasonal_order = (1, 1, 0, 24)\n```"
  merge: -1
  pgno: 145
- img_proc: true
  md: "We are finally able to build and fit the model, as shown in the example code\
    \ below:\n\n```\n# Build and fit the SARIMAX model\nmodel = SARIMAX(endog=train,\
    \ order=order, seasonal_order=seasonal_order)\nresults = model.fit()\n\nprint(results.summary())\n\
    ```\n\nWe now perform the so-called walk forward validation. In practice, time\
    \ series models are re-trained each time a new data becomes available. This allows\
    \ the model to make the best forecast at each time step.\n\nStarting at the beginning\
    \ of the time series, we train the model on the train data set. Then we make a\
    \ prediction on the next time step. The prediction is then evaluated against the\
    \ known value. The training set is then expanded to include the known value, and\
    \ the process is repeated. (Note that we keep the training set window fixed, for\
    \ more efficient training, so every time we add a new observation to the training\
    \ set, we remove the observation from the beginning of the set.)\n\nThis process\
    \ provides a more robust estimation of how the model will perform in practice.\

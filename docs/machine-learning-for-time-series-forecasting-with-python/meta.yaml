  md: '+   - *Random or irregular fluctuations* are the last element to cause variations
    in our time series data. These fluctuations are uncontrollable, unpredictable,
    and erratic, such as earthquakes, wars, flood, and any other natural disasters.


    Data scientists often refer to the first three components (long-term movements,
    seasonal short-term movements, and cyclic short-term movements) as *signals* in
    time series data because they actually are deterministic indicators that can be
    derived from the data itself. On the other hand, the last component (random or
    irregular fluctuations) is an arbitrary variation of the values in your data that
    you cannot really predict, because each data point of these random fluctuations
    is independent of the other signals above, such as long-term and short-term movements.
    For this reason, data scientists often refer to it as *noise*, because it is triggered
    by latent variables difficult to observe, as illustrated in Figure 1.6.


    ![](img/fd006a6c056e5cf905b5150f958ed477_26_0.png)


    Data scientists need to carefully identify to what extent each component is present
    in the time series data to be able to build an accurate machine learning forecasting
    solution. In order to recognize and measure these four components, it is recommended
    to first perform a decomposition process to remove the component effects from
    the data. After these components are identified and measured, and eventually utilized
    to build additional features to improve the forecast accuracy, data scientists
    can leverage different methods to recompose and add back the components on forecasted
    results.


    Understanding these four time series components and how to identify and remove
    them represents a strategic first step for building any time series forecasting
    solution because they can help with another important concept in time series that
    may help increase the predictive power of your machine learning algorithms: stationarity.
    *Stationarity* means that statistical parameters of a time'

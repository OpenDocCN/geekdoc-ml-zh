    dependent upon what was in the last frame. Over a period of time, an LSTM network
    tries to learn what to keep and how much to keep from the past and how much information
    to keep from the present state, which makes it powerful compared to other types
    of neural networks (Lazzeri 2019a).


    This capability can be used in any time series forecasting context, where it can
    be extremely helpful to automatically learn the temporal dependence from the data.
    In the simplest case, the network is shown one observation at a time from a sequence
    and can learn which prior observations are important and how they are relevant
    to forecasting. The model both learns a mapping from inputs to outputs and learns
    what context from the input sequence is useful for the mapping and can dynamically
    change this context as needed.


    Not surprisingly, this approach has often been used in the finance industry to
    build models that forecast exchange rates, based on the idea that past behavior
    and price patterns may affect currency movements and can be used to predict future

  md: 'energy consumption for the next two hours, we would need to develop a one-step
    forecasting model. This model would then be used to predict next hour energy consumption,
    then this prediction would be used as input in order to predict the energy consumption
    in the second hour.


    +   - *Direct-recursive hybrid multi-step forecast*: The direct and recursive
    strategies can be combined to offer the benefits of both methods (Brownlee 2017).
    For example, a distinct model can be built for each future time stamp, however
    each model may leverage the forecasts made by models at prior time steps as input
    values. In the case of predicting energy consumption for the next two hours, two
    models can be built, and the output from the first model is used as an input for
    the second model.


    +   - *Multiple output forecast*: The multiple output strategy requires developing
    one model that is capable of predicting the entire forecast sequence. For example,
    in the case of predicting energy consumption for the next two hours, we would
    develop one model and apply it to predict the next two hours in one single computation
    (Brownlee 2017).


    +   - *Contiguous or noncontiguous time series values of your forecasting model*
    – A time series that present a consistent temporal interval (for example, every
    five minutes, every two hours, or every quarter) between each other are defined
    as contiguous (Zuo et al. 2019). On the other hand, time series that are not uniform
    over time may be defined as noncontiguous: very often the reason behind noncontiguous
    timeseries may be missing or corrupt values. Before jumping to the methods of
    data imputation, it is important to understand the reason data goes missing. There
    are three most common reasons for this:


    +       - *Missing at random*: Missing at random means that the propensity for
    a data point to be missing is not related to the missing data but it is related
    to some of the observed data.


    +       - *Missing completely at random*: The fact that a certain value is missing
    has nothing to do with its hypothetical value and with the values of other variables.


    +       - *Missing not at random*: Two possible reasons are that the missing value
    depends on the hypothetical value or the missing value is dependent on some other
    variable’s value.


    In the first two cases, it is safe to remove the data with missing values depending
    upon their occurrences, while in the third case removing observations with missing
    values can produce a bias in the model. There are different solutions for data
    imputation depending on the kind of problem you are trying to solve, and it is
    difficult to provide a general solution.'

    \ 2019b）。\n\n许多公司正在尝试预测性维护，并拥有来自各种传感器和系统的大量数据。但是，通常情况下，客户没有足够的故障历史数据，这使得预测性维护变得非常困难——毕竟，模型需要在这些故障历史数据上进行训练，以预测未来的故障事件。\n\

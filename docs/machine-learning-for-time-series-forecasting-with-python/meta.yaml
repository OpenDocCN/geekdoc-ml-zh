    features. In order to build these features, data scientists need to leverage and
    extract the values of a series in previous or future periods.'
- md: "## Lag Features and Window Features\n\nLag features are values at prior timesteps\
    \ that are considered useful because they are created on the assumption that what\
    \ happened in the past can influence or contain a sort of intrinsic information\
    \ about the future. For example, it can be beneficial to generate features for\
    \ sales that happened in previous days at 4:00 p.m. if you want to predict similar\
    \ sales at 4:00 p.m. the day after.\n\nAn interesting category of lag features\
    \ is called *nested* lag features: in order to create nested lag features, data\
    \ scientists need to identify a fixed time period in the past and group feature\
    \ values by that time period—for example, the number of items sold in the previous\
    \ two hours, previous three days, and previous week.\n\nThe pandas library provides\
    \ the `shift()` function to help create these shifted or lag features from a time\
    \ series data set: this function shifts an index by desired number of periods\
    \ with an optional time frequency. The `shift` method accepts a `freq` argument\
    \ which can accept a `DateOffset` class or a `timedelta`-like object or also an\
    \ `offset` alias. Offset alias is an important concept that data scientists can\
    \ leverage when they deal with time series data because it represents the number\
    \ of string aliases that are given to useful common time series frequencies, as\
    \ summarized in Table 3.4.\n\nTable 3.4: Offset aliases supported in Python\n\n\
    | OFFSET ALIAS | DESCRIPTION |\n|---|---|\n| B | Business day frequency |\n| C\
    \ | Custom business day frequency |\n| D | Calendar day frequency |\n| W | Weekly\
    \ frequency |\n| M | Month end frequency |\n| SM | Semi-month end frequency (15th\
    \ and end of month) |\n| BM | Business month end frequency |\n| CBM | Custom business\
    \ month end frequency |\n| MS | Month start frequency |\n| SMS | Semi-month start\
    \ frequency (1st and 15th) |\n| BMS | Business month start frequency |\n| CBMS\
    \ | Custom business month start frequency |\n| Q | Quarter end frequency |\n|\
    \ BQ | Business quarter end frequency |\n| QS | Quarter start frequency |\n| BQS\
    \ | Business quarter start frequency |\n| A, Y | Year-end frequency |\n| BA, BY\
    \ | Business year end frequency |\n| AS, YS | Year start frequency |\n| BAS, BYS\
    \ | Business years start frequency |\n| BH | Business hour frequency |\n| H |\
    \ Hourly frequency |\n| T, min | Minutely frequency |\n| S | Secondly frequency\
    \ |\n| L, ms | Milliseconds |\n| U, us | Microseconds |\n| N | Nanoseconds |\n\
    \nBelow is an example of how to use offset aliases on the ts_data set:\n\n```\n\
    ts_data_shift = ts_data.shift(4, freq=pd.offsets.BDay())\nts_data_shift.head(5)\n\
    ```\n\nRunning this example prints the first five rows of the transformed ts_data_shift\
    \ data set:\n\n```\n                load  temp\n2012-01-05 00:00:00  2,698.00\
    \  32.00\n2012-01-05 01:00:00  2,558.00  32.67\n2012-01-05 02:00:00  2,444.00\
    \  30.00\n2012-01-05 03:00:00  2,402.00  31.00\n2012-01-05 04:00:00  2,403.00\
    \  32.00\n```\n\nRather than changing the alignment of the data and the index,\
    \ DataFrame and Series objects also have a `tshift()` convenience method that\
    \ changes all the dates in the index by a specified number of offsets, using the\
    \ index’s frequency if available, as shown in the following example:\n\n```\n\
    ts_data_shift_2 = ts_data.tshift(6, freq='D')\nts_data_shift_2.head(5)\n```\n\n\
    Running this example prints the first five rows of the transformed ts_data_shift_2\
    \ data set:\n\n```\n                load  temp\n2012-01-07 00:00:00  2,698.00\
    \  32.00\n2012-01-07 01:00:00  2,558.00  32.67\n2012-01-07 02:00:00  2,444.00\
    \  30.00\n2012-01-07 03:00:00  2,402.00  31.00\n2012-01-07 04:00:00  2,403.00\
    \  32.00\n```\n\nNote that with `tshift`, the leading entry is a NaN value because\
    \ the data is not being realigned. When the value for the frequency is not passed,\
    \ then it shifts the index without realigning the data. If a frequency value is\
    \ passed (in this case, the index must be date or datetime or it will raise a\
    \ NotImplementedError), the index will be increased using the periods and the\
    \ frequency value.\n\nShifting the data set by 1 creates a new “t” column and\
    \ adds a NaN (unknown) value for the first row. The time series data set without\
    \ a shift represents the “t+1”. Let’s make this concrete with an example. We can\
    \ use our ts_data set to compute lagged load features, as follows:\n\n```\ndef\
    \ generated_lagged_features(ts_data, var, max_lag):\n    for t in range(1, max_lag+1):\n\
    \        ts_data[var+'_lag'+str(t)] = ts_data[var].shift(t, freq='1H')\n```\n\n\
    In the sample code above, we first create a function called `generated_lagged_features`\
    \ and then we generate eight additional lag features with one-hour frequency,\
    \ as follows:\n\n```\ngenerated_lagged_features(ts_data, 'load', 8)\ngenerated_lagged_features(ts_data,\
    \ 'temp', 8)\nprint(ts_data.head(5))\n```\n\nRunning this example prints the first\
    \ five rows of the transformed data set:\n\n| load | temp | hour | month | dayofweek\
    \ | load_lag1 | load_lag2 | load_lag3 | load_lag4 | load_lag5 | ... |\n|---|---|---|---|---|---|---|---|---|---|---|\n\
    | 2012-01-01 00:00:00 | 2,698.00 | 32.00 | 0 | 1 | 1 | nan | nan | nan | nan |\
    \ nan | ... |\n| 2012-01-01 01:00:00 | 2,558.00 | 32.67 | 1 | 1 | 1 | 2,698.00\
    \ | nan | nan | nan | nan | ... |\n| 2012-01-01 02:00:00 | 2,444.00 | 30.00 |\
    \ 2 | 1 | 1 | 2,558.00 | 2,698.00 | nan | nan | nan | ... |\n| 2012-01-01 03:00:00\
    \ | 2,402.00 | 31.00 | 3 | 1 | 1 | 2,444.00 | 2,558.00 | 2,698.00 | nan | nan\
    \ | ... |\n| 2012-01-01 04:00:00 | 2,403.00 | 32.00 | 4 | 1 | 1 | 2,402.00 | 2,444.00\
    \ | 2,558.00 | 2,698.00 | nan | ... |\n\n| temp_lag1 | temp_lag2 | temp_lag3 |\
    \ temp_lag4 | temp_lag5 | ... |\n|---|---|---|---|---|---|\n| 2012-01-01 00:00:00\
    \ | nan | nan | nan | nan | nan | ... |\n| 2012-01-01 01:00:00 | 32.00 | nan |\
    \ nan | nan | nan | ... |\n| 2012-01-01 02:00:00 | 32.67 | 32.00 | nan | nan |\
    \ nan | ... |\n| 2012-01-01 03:00:00 | 30.00 | 32.67 | 32.00 | nan | nan | ...\
    \ |\n| 2012-01-01 04:00:00 | 31.00 | 30.00 | 32.67 | 32.00 | nan | ... |\n\n|\
    \ temp_lag6 | load_lag7 | load_lag8 | temp_lag7 | temp_lag8 |\n|---|---|---|---|---|\n\
    | 2012-01-01 00:00:00 | nan | nan | nan | nan | nan |\n| 2012-01-01 01:00:00 |\
    \ nan | nan | nan | nan | nan |\n| 2012-01-01 02:00:00 | nan | nan | nan | nan\
    \ | nan |\n| 2012-01-01 03:00:00 | nan | nan | nan | nan | nan |\n| 2012-01-01\
    \ 04:00:00 | nan | nan | nan | nan | nan |\n\n[5 rows x 21 columns]\n\nThe operation\
    \ of adding lag features is called the sliding window method or Window Features:\
    \ the above example shows how to apply a sliding window method with a window width\
    \ of eight. Window Features are a summary of values over a fixed window of prior\
    \ timesteps.\n\nDepending on your time series scenario, you can expand the window\
    \ width and include more lagged features. A common question that data scientists\
    \ ask before performing the operation of adding lag features is how large to make\
    \ the window. A good approach would be to build a series of different window widths\
    \ and alternatively add and remove them from the data set to see which one has\
    \ a more evident positive effect on your model performance.\n\nUnderstanding the\
    \ sliding method is very helpful to building an additional feature method called\
    \ Rolling Window Statistics, which we will discuss in the next section.\n\n##\
    \ Rolling Window Statistics\n\nThe main goal of building and using Rolling Window\
    \ Statistics in a time series data set is to compute statistics on the values\
    \ from a given data sample by defining a range that includes the sample itself\
    \ as well as some specified number of samples before and after the sample used.\n\
    \nA crucial step when data scientists need to compute rolling statistics is to\
    \ define a rolling window of observations: at each time point, data scientists\
    \ need to obtain the observations in the rolling window and use them to compute\
    \ the statistic they have decided to use. In the second step, they need to move\
    \ on to the next time point and repeat the same computation on the next window\
    \ of observations.\n\nOne of the more popular rolling statistics is the moving\
    \ average. This takes a moving window of time and calculates the average or the\
    \ mean of that time period as the current value. pandas provides a `rolling()`\
    \ function that provides rolling window calculations, and it creates a new data\
    \ structure with the window of values at each timestep. We can then perform statistical\
    \ functions on the window of values collected for each timestep, such as calculating\
    \ the mean.\n\nData scientists can use the `concat()` function in pandas to construct\
    \ a new data set with just our new columns. This function concatenates pandas\
    \ objects along a particular axis with an optional set logic along the other axes.\
    \ It can also add a layer of hierarchical indexing on the concatenation axis,\
    \ which may be useful if the labels are the same (or overlapping) on the passed\
    \ axis number.\n\nThe example below demonstrates how to do this with pandas with\
    \ a window size of 6:\n\n```\n# create a rolling mean feature\nfrom pandas import\
    \ concat\n\nload_val = ts_data[['load']]\nshifted = load_val.shift(1)\n\nwindow\
    \ = shifted.rolling(window=6)\nmeans = window.mean()\nnew_dataframe = concat([means,\
    \ load_val], axis=1)\nnew_dataframe.columns = ['load_rol_mean', 'load']\n\nprint(new_dataframe.head(10))\n\
    ```\n\nRunning the example above prints the first 10 rows of our new data set:\n\
    \n| load_rol_mean | load |\n|---|---|\n| 2012-01-01 00:00:00 | nan | 2,698.00\
    \ |\n| 2012-01-01 01:00:00 | nan | 2,558.00 |\n| 2012-01-01 02:00:00 | nan | 2,444.00\
    \ |\n| 2012-01-01 03:00:00 | nan | 2,402.00 |\n| 2012-01-01 04:00:00 | nan | 2,403.00\
    \ |\n| 2012-01-01 05:00:00 | nan | 2,453.00 |\n| 2012-01-01 06:00:00 | 2,493.00\
    \ | 2,560.00 |\n| 2012-01-01 07:00:00 | 2,470.00 | 2,719.00 |\n| 2012-01-01 08:00:00\
    \ | 2,496.83 | 2,916.00 |\n| 2012-01-01 09:00:00 | 2,575.50 | 3,105.00 |"

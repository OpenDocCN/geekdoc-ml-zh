    ## 关于作者


    **Francesca Lazzeri**，博士，是一位经验丰富的科学家和机器学习从业者，拥有超过十年的学术和行业经验。她目前在微软领导一个由云AI倡导者和开发者组成的国际团队，管理大量客户组合，并在云端构建智能自动化解决方案。


    Francesca 是大数据技术创新和将基于机器学习的解决方案应用于现实世界问题的专家。她的工作统一于两个目标：更好地理解微观经济数据，并利用这些见解优化企业决策。她的研究涵盖机器学习、统计建模、时间序列计量经济学和预测等多个领域，以及能源、石油和天然气、零售、航空航天、医疗保健和专业服务等多个行业。


    在加入微软之前，她是哈佛大学技术与运营管理部的研究员。Francesca 定期在世界各地的大学和研究机构教授应用分析和机器学习课程。您可以在 Twitter
    上找到她：@frlazzeri。


    ## 关于技术编辑


    **James York-Winegar** 拥有数学和物理学学士学位以及信息与数据科学硕士学位。他曾在学术界、医疗保健和科技咨询领域工作。James 目前与公司合作，通过启用其数据基础设施、安全性和元数据管理来支持机器学习工作负载。他还在加州大学伯克利分校教授机器学习课程，专注于扩展大数据机器学习技术。


    在离开学术界之前，James 最初专注于实验物理与理论物理以及材料科学的交叉领域。他的研究重点是非氧化物玻璃或硫系玻璃的光结构转变。这使 James 接触到处理极大量数据和高性能计算，他的工作至今仍引领着他。


    James 通过咨询经验接触了许多行业，包括教育、娱乐、大宗商品、金融、电信、消费品包装、初创公司、生物技术和科技。凭借这些经验，他帮助公司了解其数据的可能性以及如何启用新功能或商业机会。您可以在
    linkedin.com/in/winegarj/ 找到他的 LinkedIn 个人资料。


    ## 致谢


    在过去的几年里，我有幸与来自微软和 Wiley 的许多数据科学家、云倡导者、开发者和专业人士合作：所有这些人都在本书的创作和写作过程中激励和支持着我。我特别感谢微软的云倡导团队，感谢他们的信任和鼓励，以及让我的工作变得如此轻松和愉快。


    感谢 John Wiley & Sons 的副出版商 Jim Minatel，他从出版过程开始就与我合作，并充当我的工作与编辑团队之间的桥梁。与内容赋能经理
    Pete Gaughan、项目编辑 David Clark（他管理了从大纲到完成手稿的过程）以及内容精炼专家 Saravanan Dakshinamurthy（他管理了本书开发的最后阶段并使其顺利进行）合作非常愉快。我感谢技术审稿人
    James Winegar 提供的支持和指导，并希望将来我们能一起参与其他项目。


    最后但同样重要的是，我将永远感激我的女儿 Nicole，她让我想起这个世界的美好，并激励我成为最好的自己；感谢我的丈夫 Laurent，他无条件且无尽的支持、灵感和鼓励；感谢我的父母
    Andrea 和 Anna Maria，以及我的兄弟 Marco，他们始终在我身边，在我人生的各个阶段都相信我。


    —Francesca Lazzeri



    \ '01-14-2012'], dayfirst=True)\n```\n\nThe output will be\n\n```\nDatetimeIndex(['2014-01-14',\
    \ '2012-01-14'], dtype='datetime64[ns]',\n              freq=None)\n```\n\n# Providing\
    \ a Format Argument\n\nIn addition to the required datetime string, a `format`\
    \ argument can be passed to ensure specific parsing and define the structure and\
    \ order of your time variable, as shown in the following example:\n\n```\npd.to_datetime('2018/11/12',\
    \ format='%Y/%m/%d')\n```\n\nThe output will be\n\n```\nTimestamp('2018-11-12\
    \ 00:00:00')\n```\n\nIf you need to also define hours and minutes in your dates,\
    \ you can format your time series data as follows:\n\n```\npd.to_datetime('11-11-2018\
    \ 00:00', format='%d-%m-%Y %H:%M')\n```\n\nThe output will be\n\n```\nTimestamp('2018-11-11\
    \ 00:00:00')\n```\n\nMoreover, `date`, `datetime`, and `time` objects all support\
    \ a `strftime(format)` method to create a string representing the time under the\
    \ control of an explicit format string. On the other hand, the `datetime.strptime()`\
    \ class method creates a `datetime` object from a string representing a date and\
    \ time and a corresponding format string.\n\nIn other words, `strptime()` and\
    \ `strftime()` are two popular methods for converting objects from strings to\
    \ datetime objects and the other way around. `strptime()` can read strings with\
    \ date and time information and convert them to datetime objects, and `strftime()`\
    \ converts datetime objects back into strings.\n\nTable 3.2 provides a high-level\
    \ comparison of `strftime()` versus `strptime()` methods."

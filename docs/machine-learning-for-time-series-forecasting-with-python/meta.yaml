  - "[PAGE 54]\n\nSo, while it’s important to lay out the vision, purpose, and scope\
    \ of any analytics projects, it is critical that you start off by gathering the\
    \ right data. Once you have a clear understanding of what you will measure, you\
    \ will need to decide how to measure it and what the best analytical technique\
    \ is in order to achieve this goal. Next we will discuss how you can make these\

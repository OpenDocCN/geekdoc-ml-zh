  - '[PAGE 111]


    # Lag Features and Window Features


    Lag features are values at prior timesteps that are considered useful because
    they are created on the assumption that what happened in the past can influence
    or contain a sort of intrinsic information about the future. For example, it can
    be beneficial to generate features for sales that happened in previous days at
    4:00 p.m. if you want to predict similar sales at 4:00 p.m. the day after.


    An interesting category of lag features is called *nested* lag features: in order
    to create nested lag features, data scientists need to identify a fixed time period
    in the past and group feature values by that time period—for example, the number
    of items sold in the previous two hours, previous three days, and previous week.


    The pandas library provides the `shift()` function to help create these shifted
    or lag features from a time series data set: this function shifts an index by
    desired number of periods with an optional time frequency. The `shift` method
    accepts a `freq` argument which can accept a `DateOffset` class or a `timedelta`-like
    object or also an `offset` alias. Offset alias is an important concept that data
    scientists can leverage when they deal with time series data because it represents
    the number of string aliases that are given to useful common time series frequencies,
    as summarized in Table 3.4.


    Table 3.4: Offset aliases supported in Python


    | OFFSET ALIAS | DESCRIPTION |

    |---|---|

    | B | Business day frequency |

    | C | Custom business day frequency |

    | D | Calendar day frequency |

    | W | Weekly frequency |

    | M | Month end frequency |

    | SM | Semi-month end frequency (15th and end of month) |

    | BM | Business month end frequency |

    | CBM | Custom business month end frequency |

    | MS | Month start frequency |

    | SMS | Semi-month start frequency (1st and 15th) |

    | BMS | Business month start frequency |

    | CBMS | Custom business month start frequency |

    | Q | Quarter end frequency |

    | BQ | Business quarter end frequency |'

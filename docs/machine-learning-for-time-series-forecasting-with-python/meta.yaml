  md: "Time series forecasting can either be univariate or multivariate. The term\
    \ *univariate time series* refers to one that consists of single observations\
    \ recorded sequentially over equal time increments. Unlike other areas of statistics,\
    \ the univariate time series model contains lag values of itself as independent\
    \ variables (itl.nist.gov/div898/handbook/pmc/section4/pmc44.htm). These lag variables\
    \ can play the role of independent variables as in multiple regression. The multivariate\
    \ time series model is an extension of the univariate case and involves two or\
    \ more input variables. It does not limit itself to its past information but also\
    \ incorporates the past of other variables. Multivariate processes arise when\
    \ several related time series are observed simultaneously over time instead of\
    \ a single series being observed as in univariate case. Examples of the univariate\
    \ time series are the ARIMA models that we will discuss in Chapter 4, “Introduction\
    \ to Some Classical Methods for Time Series Forecasting.” Considering this question\
    \ with regard to inputs and outputs may add a further distinction. The number\
    \ of variables may differ between the inputs and outputs; for example, the data\
    \ may not be symmetrical. You may have multiple variables as input to the model\
    \ and only be interested in predicting one of the variables as output. In this\
    \ case, there is an assumption in the model that the multiple input variables\
    \ aid and are required in predicting the single output variable.\n\n+   - *Single-step\
    \ or multi-step structure of your forecasting model* – Time series forecasting\
    \ describes predicting the observation at the next time step. This is called a\
    \ one-step forecast as only one time step is to be predicted. In contrast to the\
    \ one-step forecast are the multiple-step or multi-step time series forecasting\
    \ problems, where the goal is to predict a sequence of values in a time series.\
    \ Many time series problems involve the task of predicting a sequence of values\
    \ using only the values observed in the past (Cheng et al. 2006). Examples of\
    \ this task include predicting the time series for crop yield, stock prices, traffic\
    \ volume, and electrical power consumption. There are at least four commonly used\
    \ strategies for making multi-step forecasts (Brownlee 2017):\n    - *Direct multi-step\
    \ forecast:* The direct method requires creating a separate model for each forecast\
    \ time stamp. For example, in the case of predicting energy consumption for the\
    \ next two hours, we would need to develop a model for forecasting energy consumption\
    \ on the first hour and a separate model for forecasting energy consumption on\
    \ the second hour.\n    - *Recursive multi-step forecast:* Multi-step-ahead forecasting\
    \ can be handled recursively, where a single time series model is created to forecast\
    \ next time stamp, and the following forecasts are then computed using previous\
    \ forecasts. For example, in the case of forecasting"

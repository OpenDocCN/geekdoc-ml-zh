  md: '# Chapter 2 ■ How to Design an End-to-End Time Series Forecasting Solution


    +   - *Train data set* – The train data set represents the amount of data that
    data scientists decide to use to fit machine learning models. Through the train
    data set, a machine learning algorithm can be trained to learn from historical
    data in order to predict future data points.

    - *Validation data set* – The validation data set is the amount of data used to
    offer an unbiased evaluation of a model fit on the train data set, while tuning
    model hyperparameters. Data scientists usually leverage validation data sets to
    fine-tune a machine learning model hyperparameters. Hyperparameters are additional
    factors in the model, whose values are used to control, and eventually improve,
    the learning process of the model itself. Data scientists observe the validation
    set results to update the levels of hyperparameters and, consequently, improve
    their models.

    - *Test data set* – The test data set is the amount of data used to determine
    whether a model is underfitting (the model is performing poorly on the train data
    set) or overfitting (the model is performing well on the train data set but not
    on the test data set) the train data by looking at the prediction error on the
    train and test data sets. The test data set is only used once a model is completely
    trained and validated through the train and validation data sets. Data scientists
    usually leverage the test data set to evaluate different machine learning models.


    Now that you understand better the difference between these data sets, it is also
    important to look for recommendations on how to split our data set into train,
    validation, and test sets. This decision mainly depends on two factors:


    +   - The total number of samples in our data

    - The actual model you are training.


    Some models need substantial data to train upon, so in this case we would need
    to optimize for the larger training sets. Models with very few hyperparameters
    will be easy to validate and tune, so we can probably reduce the size of our validation
    set, but if our model has many hyperparameters, we would want to have a large
    validation set as well. Also, if we have to deal with a model with no hyperparameters
    or ones that cannot be easily tuned, we probably won’t need a validation data
    set. All in all, like many other things in machine learning, the train-test-validation
    split ratio is also quite specific to your use case (Lazzeri 2019b).



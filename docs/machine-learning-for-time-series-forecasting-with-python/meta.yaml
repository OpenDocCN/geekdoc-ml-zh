  md: '# Chapter 3 ■ Time Series Data Preparation


    By using the `statsmodels` Python module, which has a `tsa` (time series analysis)
    package as well as the `seasonal_decompose()` function, we can visualize these
    for components and gain additional insights from our time series data.


    The `statsmodels.tsa` package includes model classes and capabilities that are
    helpful to handle time series data. Some model examples are univariate autoregressive
    (AR) models, vector autoregressive (VAR) models, and univariate autoregressive
    moving average (ARMA) models. Some examples of non-linear models are Markov switching
    dynamic regression and autoregression.


    The `statsmodels.tsa` package also contains descriptive statistics for time series,
    such as, autocorrelation, partial autocorrelation function, and periodogram. It
    also offers techniques to work with autoregressive and moving average lag-polynomials
    (statsmodels.org/devel/tsa.html).


    Let''s use the `statsmodels` and `seasonal_decompose()` functions to extract and
    visualize our `ts_data` set components only for the load variable, which is our
    target variable. First, let''s import all necessary packages:


    ```

    # import necessary Python packages

    import statsmodels.api as sm

    import warnings

    import matplotlib

    import matplotlib.pyplot as plt

    import matplotlib.dates as mdates


    %matplotlib inline


    warnings.filterwarnings("ignore")

    ```


    For practical reasons, we will visualize only a subset of our load data set:


    ```

    ts_data_load = ts_data[''load'']

    decomposition = sm.tsa.seasonal_decompose

    (load[''2012-07-01'':''2012-12-31''], model = ''additive'')


    fig = decomposition.plot()

    matplotlib.rcParams[''figure.figsize''] = [10.0, 6.0]

    ```


    The output will be the plot illustrated in Figure 3.2.

    From Figure 3.2, we can observe a much clearer plot showing us that the seasonality
    is following a consistent pattern and the trend is following an irregular pattern.
    In order to investigate the trend in our time series a bit more, we can plot the
    trend alongside the observed time series.


    To do this, we will use Matplotlib''s `.YearLocator()`, which is a function that
    makes ticks on a given day of each year that is a multiple of base. For the plot,
    we set each year to begin from the month of January (month = 1) and month'

    \ sm.tsa.seasonal_decompose(\n    load['2012-07-01':'2012-12-31'], model='additive')\n\
    \nfig = decomposition.plot()\nmatplotlib.rcParams['figure.figsize'] = [10.0, 6.0]\n\
    ```\n\nThe output will be the plot illustrated in Figure 3.2.\n\nFrom Figure 3.2,\
    \ we can observe a much clearer plot showing us that the seasonality is following\
    \ a consistent pattern and the trend is following an irregular pattern. In order\
    \ to investigate the trend in our time series a bit more, we can plot the trend\

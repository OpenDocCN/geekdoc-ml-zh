    +   - The value of Sensor_1 at prior time step (for example, 01/01/2020) becomes
    the input (Value x) in a supervised learning problem.

    - The value of Sensor_1 at subsequent time step (for example, 01/02/2020) becomes
    the output (Value y) in a supervised learning problem.


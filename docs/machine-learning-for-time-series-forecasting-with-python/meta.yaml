    # Data Cleaning of Missing Values in the Time Series


    Handling time series data involves cleaning, scaling, and even deep pre-processing
    operations before you obtain any meaningful results. In the following few paragraphs,
    we discuss some of the most common techniques used to clean, rescale, and prepare
    your time series data.


    Missing values are represented in the time series by a sequence gap in the time
    stamp variable or in other values. Missing values may appear in time series for
    a number of different reasons, including recording failures or inaccurate recording
    due to a problem at the data source level or in the data pipeline.


    To identify these time stamp gaps, first we create an index of time periods that
    we would expect to be in the time series. If we look at our ts_data set again,
    we can fill missing values by interpolating between the two closest non-missing
    values. The `dataframe.interpolate()` function is used to fill NA values in the
    DataFrame or series: it is a very effective function to fill the missing values.
    However, only `method = ''linear''` is supported for DataFrames and series with
    a MultiIndex.


    In the example below, we use a quadratic function and set a limit of 8. This limit
    means that if more than 8 missing values occur consecutively, the missing values
    are not interpolated and they remain missing. This is to avoid spurious interpolation
    between very distant time periods. Moreover, we set `limit_`'
  - '[PAGE 104]



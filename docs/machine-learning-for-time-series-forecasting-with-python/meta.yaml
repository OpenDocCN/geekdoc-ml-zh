  - '[PAGE 97]


    # Frequency Conversion


    In the following examples, we use all the variables in the ts_data set (both load
    and temp variables) to understand how data scientists can apply a frequency conversion
    on their time series data.


    First of all, let''s load the ts_data set with and visualize the first 10 rows
    of both variables:


    ```

    ts_data = load_data(data_dir)

    ts_data.head(10)

    ```


    The output will be


    | | Load | temp |

    |---|---|---|

    | 2012-01-01 00:00:00 | 2,698.00 | 32.00 |

    | 2012-01-01 01:00:00 | 2,558.00 | 32.67 |

    | 2012-01-01 02:00:00 | 2,444.00 | 30.00 |

    | 2012-01-01 03:00:00 | 2,402.00 | 31.00 |

    | 2012-01-01 04:00:00 | 2,403.00 | 32.00 |

    | 2012-01-01 05:00:00 | 2,453.00 | 31.33 |

    | 2012-01-01 06:00:00 | 2,560.00 | 30.00 |

    | 2012-01-01 07:00:00 | 2,719.00 | 29.00 |

    | 2012-01-01 08:00:00 | 2,916.00 | 29.00 |

    | 2012-01-01 09:00:00 | 3,105.00 | 33.33 |


    The primary function for changing frequencies is the `asfreq()` method. This method
    converts a time series to specified frequency and optionally provides a filling
    method to pad/backfill missing values. For a `DatetimeIndex`, this is basically
    just a thin but convenient wrapper around `reindex()` that generates a `date_range`
    and calls `reindex`, as shown in the following example:


    ```

    daily_ts_data = ts_data.asfreq(pd.offsets.BDay())

    daily_ts_data.head(5)

    ```


    Running this example prints the first five rows of the transformed `ts_data_daily`
    set:


    | | load | temp |

    |---|---|---|

    | 2012-01-02 | 2,458.00 | 43.67 |

    | 2012-01-03 | 2,780.00 | 26.33 |

    | 2012-01-04 | 3,184.00 | 6.00 |

    | 2012-01-05 | 3,014.00 | 22.33 |

    | 2012-01-06 | 2,992.00 | 17.00 |


    The `asfreq` function optionally provides a filling method to pad/backfill missing
    values. It returns the original data conformed to a new index with the specified
    frequency, as shown below:


    ```

    daily_ts_data.asfreq(pd.offsets.BDay(), method=''pad'')

    daily_ts_data.head(5)

    ```'

    As a second step, it is important to get a summary of your time series data set
    in case there are rows with empty values. We can do this by using the `isna()`
    function in Python. This function takes a scalar or array-like objects and indicates
    whether values are missing, as the example below shows us:


    ```

    ts_data.isna().sum()

    ```


    The output will be


    ```

    load    0

    temp    0

    dtype: int64

    ```


    As we can see, we do not have empty values in our data set. The next step is to
    understand the format of our variables. pandas `.dtypes` method makes this possible,
    as it returns a series with the data type of each column:


    ```

    ts_data.dtypes

    ```


    The output will be


    ```

    load    float64

    temp    float64

    dtype: object

    ```


    We can see that both the load and temp columns are `float64`, which is a floating-point
    number that occupies 64 bits of storage. Floats represent real numbers and are
    written with a decimal point dividing the integer and fractional parts.


    As the next steps, we need to calculate and review some summary statistics for
    our time series data set: summary statistics summarize large amounts of data by
    describing key characteristics such as the average, distribution, potential correlation,
    or dependence. Calculating descriptive statistics on time series can help give
    you an idea of the distribution and spread of values. This may help with ideas
    of data scaling and even data cleaning that we can perform later as part of preparing
    our data set for modeling.


    In pandas, descriptive statistics include those useful indicators that summarize
    the central tendency, dispersion, and shape of a data set''s distribution, excluding
    NaN values. The `describe()` function creates a summary of the loaded time series
    including mean, standard deviation, median, minimum, and maximum:


    ```

    ts_data.describe()

    ```'

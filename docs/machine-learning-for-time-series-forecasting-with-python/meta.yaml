    +   - *Contiguous or noncontiguous time series values of your forecasting model*
    – A time series that present a consistent temporal interval (for example, every
    five minutes, every two hours, or every quarter) between each other are defined
    as contiguous (Zuo et al. 2019). On the other hand, time series that are not uniform
    over time may be defined as noncontiguous: very often the reason behind noncontiguous
    timeseries may be missing or corrupt values. Before jumping to the methods of
    data imputation, it is important to understand the reason data goes missing. There
    are three most common reasons for this:


    +       - *Missing at random*: Missing at random means that the propensity for
    a data point to be missing is not related to the missing data but it is related
    to some of the observed data.


    +       - *Missing completely at random*: The fact that a certain value is missing
    has nothing to do with its hypothetical value and with the values of other variables.


    +       - *Missing not at random*: Two possible reasons are that the missing value
    depends on the hypothetical value or the missing value is dependent on some other
    variable’s value.


    In the first two cases, it is safe to remove the data with missing values depending
    upon their occurrences, while in the third case removing observations with missing
    values can produce a bias in the model. There are different solutions for data
    imputation depending on the kind of problem you are trying to solve, and it is
    difficult to provide a general solution.'
  - '[PAGE 32]


    Moreover, since it has temporal property, only some of the statistical methodologies
    are appropriate for time series data.

    I have identified some of the most commonly used methods and listed them as a
    structural guide in Figure 1.7.


    ![](img/fd006a6c056e5cf905b5150f958ed477_32_0.png)


    As you can observe from the graph in Figure 1.7, listwise deletion removes all
    data for an observation that has one or more missing values. Particularly if the
    missing data is limited to a small number of observations, you may just opt to
    eliminate those cases from the analysis. However, in most cases it is disadvantageous
    to use listwise deletion. This is because the assumptions of the *missing completely
    at random* method are typically rare to support. As a result, listwise deletion
    methods produce biased parameters and estimates.


    *Pairwise deletion* analyses all cases in which the variables of interest are
    present and thus maximizes all data available by an analysis basis. A strength
    to this technique is that it increases power in your analysis, but it has many
    disadvantages. It assumes that the missing data is missing completely at random.
    If you delete pairwise, then you''ll end up with different numbers of observations
    contributing to different parts of your model, which can make interpretation difficult.


    *Deleting columns* is another option, but it is always better to keep data than
    to discard it. Sometimes you can drop variables if the data is missing for more
    than 60 percent of the observations but only if that variable is insignificant.
    Having said that, imputation is always a preferred choice over dropping variables.'

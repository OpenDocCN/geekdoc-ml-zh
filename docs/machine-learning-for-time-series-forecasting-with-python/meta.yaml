    \ c='white')\n```\n\nThe output will be the plot illustrated in Figure 3.3.\n\n\
    ![](img/fd006a6c056e5cf905b5150f958ed477_103_0.png)\n\nNow that we have a better\
    \ understanding of our data set, let's learn different techniques for data cleaning\
    \ and interpolation for missing values.\n\n## Data Cleaning of Missing Values\
    \ in the Time Series\n\nHandling time series data involves cleaning, scaling,\
    \ and even deep pre-processing operations before you obtain any meaningful results.\
    \ In the following few paragraphs, we discuss some of the most common techniques\
    \ used to clean, rescale, and prepare your time series data.\n\nMissing values\
    \ are represented in the time series by a sequence gap in the time stamp variable\
    \ or in other values. Missing values may appear in time series for a number of\
    \ different reasons, including recording failures or inaccurate recording due\
    \ to a problem at the data source level or in the data pipeline.\n\nTo identify\
    \ these time stamp gaps, first we create an index of time periods that we would\
    \ expect to be in the time series. If we look at our ts_data set again, we can\
    \ fill missing values by interpolating between the two closest non-missing values.\
    \ The `dataframe.interpolate()` function is used to fill NA values in the DataFrame\
    \ or series: it is a very effective function to fill the missing values. However,\

    # How to Prepare Time Series Data for LSTMs and GRUs


    Your time series data set needs to be transformed before it can be utilized to
    fit a supervised learning model. As you learned in Chapter 3, Time Series Data
    Preparation, you first need to load your time series data in a pandas DataFrame
    so that the following operations can be performed:


    +   1. Index the data on time stamp for time-based filtering

    2. Visualize your data in tables with named columns

    3. Identify missing periods and missing values

    4. Create leading, lagged, and additional variables


    Moreover, your time series data needs to be transformed in two tensors, as illustrated
    in Figure 5.5.


    ![](img/fd006a6c056e5cf905b5150f958ed477_169_0.png)


    As you can see from Figure 5.5, the number of samples, time steps, and features
    represents what is required to make a prediction (X), while sample and horizon
    represent what prediction is made (y). If we take the example of a univariate
    time series problem (for example, if we want to predict next energy load amount)
    where we are interested in one-step predictions (for example, next hour), the
    observations at prior time steps (for example, four energy load values during
    the four previous hours), so-called lag observations, are used as input and the
    output is the observation at the next time step (horizon), as illustrated Figure
    5.6.


    ![](img/fd006a6c056e5cf905b5150f958ed477_169_1.png)


    First of all, we need separate our dataset into train, validation, and test sets;
    in this way we can perform the following important steps:


    +   1. We train the model on the train set.

    2. The validation set is then used to evaluate the model after each training epoch
    and ensure that the model is not overfitting the training data.'

  md: 'The entry script receives data submitted to a deployed web service and passes
    it to the model. It then takes the response returned by the model and returns
    that to the client. The script is specific to your model; it must understand the
    data that the model expects and returns (Lazzeri 2019c). The script contains two
    functions that load and run the model:


    +   - `init()` – Typically, this function loads the model into a global object.
    This function is run only once when the Docker container for your web service
    is started.

    - `run(input_data)` – This function uses the model to predict a value based on
    the input data. Inputs and outputs to the run typically use JSON for serialization
    and de-serialization. You can also work with raw binary data. You can transform
    the data before sending it to the model or before returning it to the client.


    When you register a model, you provide a model name used for managing the model
    in the Azure Registry. You use this name with the `Model.get_model_path()` to
    retrieve the path of the model file(s) on the local file system. If you register
    a folder or a collection of files, this API returns the path to the directory
    that contains those files.


    +   - Deploy the model to the compute target – Finally, before deploying, you
    must define the deployment configuration. The deployment configuration is specific
    to the compute target that will host the web service. For example, when deploying
    locally, you must specify the port where the service accepts requests. Table 2.1
    lists the compute targets, or compute resources, that can be used to host your
    web service deployment.



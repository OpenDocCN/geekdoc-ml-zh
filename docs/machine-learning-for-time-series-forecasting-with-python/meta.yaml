  md: '# Chapter 4 ■ Introduction to Autoregressive and Automated Methods


    +   - *Moving Average* – This time series technique leverages previous forecast
    errors in a regression approach to forecast future observations at next time stamps.
    Together with the autoregression technique, the moving average approach is a crucial
    element of the more general autoregressive moving average and autoregressive integrated
    moving average models, which present a more sophisticated stochastic configuration.

    - *Autoregressive Moving Average* – This time series technique assumes that future
    observations at next time stamp can be represented as a linear function of the
    observations and residual errors at prior time stamps.

    - *Autoregressive Integrated Moving Average* – This time series technique assumes
    that future observations at next time stamp can be represented as a linear function
    of the differenced observations and residual errors at prior time stamps. We will
    also look at an extension of the autoregressive integrated moving average approach,
    called seasonal autoregressive integrated moving average with exogenous regressors.

    - *Automated Machine Learning (Automated ML)* – This time series technique iterates
    through a portfolio of different machine learning algorithms for time series forecasting,
    while performing best model selection, hyperparameters tuning, and feature engineering
    for your scenario.


    As you can see, classical time series forecasting methods are generally focused
    on the linear relationship between historical data and future results. Nevertheless,
    they perform well on a wide range of time series problems. Before exploring more
    sophisticated deep learning methods for time series (Chapter 5, “Introduction
    to Neural Networks for Time Series Forecasting”), it is a good idea to ensure
    you have exhausted classical linear time series forecasting methods.


    # Autoregression


    Autoregression is a time series forecasting approach that depends only on the
    previous outputs of a time series: this technique assumes that future observations
    at next time stamp are related to the observations at prior time stamps through
    a linear relationship. In other words, in an autoregression, a value from a time
    series is regressed on previous values from that same time series. In this chapter
    of the book, we will learn how to implement an autoregression for time series
    forecasting with Python.


    In an autoregression, the output value in the previous time stamp becomes the
    input value to predict the next time stamp value, and the errors follow the usual
    assumptions about errors in a simple linear regression model. In autoregressions,
    the number of preceding input values in the time series that are used to predict
    next time stamp value is called *order* (often we refer to the order with'
  merge: -1
  pgno: 121
- img_proc: true
  md: 'the letter $p$). This order value determines how many previous data points
    will be used: usually, data scientists estimate the p value by testing different
    values and observing which model resulted with the minimum Akaike information
    criterion (AIC). We will discuss both AIC and Bayesian information criterion (BIC)
    penalized-likelihood criteria later in this chapter.


    Data scientists refer to autoregressions in which the current predicted value
    (output) is based on the immediately preceding value (input) as first order autoregression,
    as illustrated in Figure 4.1.


    | Sensor ID | Time Stamp | Value X | Value y |

    | :--- | :--- | :--- | :--- |

    | Sensor_1 | 01/01/2020 | NaN | 236 |

    | Sensor_1 | 01/01/2020 | 236 | 133 |

    | Sensor_1 | 01/02/2020 | 133 | 148 |

    | Sensor_1 | 01/03/2020 | 148 | 152 |

    | Sensor_1 | 01/04/2020 | 152 | 241 |

    | Sensor_1 | 01/05/2020 | 241 | ? |


    ![](img/fd006a6c056e5cf905b5150f958ed477_122_0.png)


    If you need to predict the next time stamp value using the previous two values
    instead, then the approach is called a second order autoregression, as the next
    time stamp value will be predicted using as input two previous values, as illustrated
    in Figure 4.2.


    | Sensor ID | Time Stamp | Value X | Value y |

    | :--- | :--- | :--- | :--- |

    | Sensor_1 | 01/01/2020 | NaN | 236 |

    | Sensor_1 | 01/01/2020 | 236 | 133 |

    | Sensor_1 | 01/02/2020 | 133 | 148 |

    | Sensor_1 | 01/03/2020 | 148 | 152 |

    | Sensor_1 | 01/04/2020 | 152 | 241 |

    | Sensor_1 | 01/05/2020 | 241 | ? |


    ![](img/fd006a6c056e5cf905b5150f958ed477_122_1.png)'

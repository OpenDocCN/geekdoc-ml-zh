    Table 3.3: Date and time properties from `Timestamp` and `DatetimeIndex`


    | PROPERTY | DESCRIPTION |

    | :--- | :--- |

    | `year` | The year of the datetime |

    | `month` | The month of the datetime |

    | `day` | The days of the datetime |

    | `hour` | The hour of the datetime |

    | `minute` | The minutes of the datetime |

    | `second` | The seconds of the datetime |

    | `microsecond` | The microseconds of the datetime |

    | `nanosecond` | The nanoseconds of the datetime |

    | `date` | Returns `datetime.date` (does not contain timezone information) |

    | `time` | Returns `datetime.time` (does not contain timezone information) |

    | `timetz` | Returns `datetime.time` as local time with timezone information |

    | `dayofyear` | The ordinal day of year |

    | `weekofyear` | The week ordinal of the year |

    | `week` | The week ordinal of the year |

    | `dayofweek` | The number of the day of the week, with Monday = 0, Sunday = 6
    |

    | `weekday` | The number of the day of the week with Monday = 0, Sunday = 6 |

    | `quarter` | Quarter of the date: Jan–Mar = 1, Apr–Jun = 2, etc. |

    | `days_in_month` | The number of days in the month of the datetime |

    | `is_month_start` | Logical indicating if first day of month (defined by frequency)
    |

    | `is_month_end` | Logical indicating if last day of month (defined by frequency)
    |

    | `is_quarter_start` | Logical indicating if first day of quarter (defined by
    frequency) |

    | `is_quarter_end` | Logical indicating if last day of quarter (defined by frequency)
    |

    | `is_year_start` | Logical indicating if first day of year (defined by frequency)
    |

    | `is_year_end` | Logical indicating if last day of year (defined by frequency)
    |

    | `is_leap_year` | Logical indicating if the date belongs to a leap year |'
- md: "## Frequency Conversion\n\nIn the following examples, we use all the variables\
    \ in the ts_data set (both load and temp variables) to understand how data scientists\
    \ can apply a frequency conversion on their time series data.\n\nFirst of all,\
    \ let's load the ts_data set with and visualize the first 10 rows of both variables:\n\
    \n```\nts_data = load_data(data_dir)\nts_data.head(10)\n```\n\nThe output will\
    \ be\n\n| | Load | temp |\n|---|---|---|\n| 2012-01-01 00:00:00 | 2,698.00 | 32.00\
    \ |\n| 2012-01-01 01:00:00 | 2,558.00 | 32.67 |\n| 2012-01-01 02:00:00 | 2,444.00\
    \ | 30.00 |\n| 2012-01-01 03:00:00 | 2,402.00 | 31.00 |\n| 2012-01-01 04:00:00\
    \ | 2,403.00 | 32.00 |\n| 2012-01-01 05:00:00 | 2,453.00 | 31.33 |\n| 2012-01-01\
    \ 06:00:00 | 2,560.00 | 30.00 |\n| 2012-01-01 07:00:00 | 2,719.00 | 29.00 |\n\
    | 2012-01-01 08:00:00 | 2,916.00 | 29.00 |\n| 2012-01-01 09:00:00 | 3,105.00 |\
    \ 33.33 |\n\nThe primary function for changing frequencies is the `asfreq()` method.\
    \ This method converts a time series to specified frequency and optionally provides\
    \ a filling method to pad/backfill missing values. For a `DatetimeIndex`, this\
    \ is basically just a thin but convenient wrapper around `reindex()` that generates\
    \ a `date_range` and calls `reindex`, as shown in the following example:\n\n```\n\
    daily_ts_data = ts_data.asfreq(pd.offsets.BDay())\ndaily_ts_data.head(5)\n```\n\
    \nRunning this example prints the first five rows of the transformed `ts_data_daily`\
    \ set:\n\n| | load | temp |\n|---|---|---|\n| 2012-01-02 | 2,458.00 | 43.67 |\n\
    | 2012-01-03 | 2,780.00 | 26.33 |\n| 2012-01-04 | 3,184.00 | 6.00 |\n| 2012-01-05\
    \ | 3,014.00 | 22.33 |\n| 2012-01-06 | 2,992.00 | 17.00 |\n\nThe `asfreq` function\
    \ optionally provides a filling method to pad/backfill missing values. It returns\
    \ the original data conformed to a new index with the specified frequency, as\
    \ shown below:\n\n```\ndaily_ts_data.asfreq(pd.offsets.BDay(), method='pad')\n\
    daily_ts_data.head(5)\n```\n\nRunning this example prints the first five rows\
    \ of the transformed `daily_ts_data` set with the 'pad' method:\n\n```\n     \
    \      load  temp\n2012-01-02  2,458.00  43.67\n2012-01-03  2,780.00  26.33\n\
    2012-01-04  3,184.00   6.00\n2012-01-05  3,014.00  22.33\n2012-01-06  2,992.00\
    \  17.00\n```\n\nFor further information on pandas Support for Time Series, visit\
    \ the website pandas.pydata.org/docs/user_guide/timeseries.html.\n\nNext, I will\
    \ discuss how you can explore and analyze your time series data sets and how you\
    \ can pre-process and perform feature engineering to enrich your time series data\
    \ sets.\n\n## Time Series Exploration and Understanding\n\nIn the following sections,\
    \ you will learn the first steps to take to explore, analyze, and understand time\
    \ series data. We will focus on these topics:\n\n- How to get started with time\
    \ series data analysis\n- How to calculate and review summary statistics for time\
    \ series data\n- How to perform data cleaning of missing periods in time series\n\
    - How to perform time series data normalization and standardization\n\n## How\
    \ to Get Started with Time Series Data Analysis\n\nAs you saw in the first section\
    \ of this chapter, pandas has proven very effective as a tool for handling and\
    \ working with time series data: pandas has some in-built `datetime` functions\
    \ that make it simple to work with time series data, because in this type of data\
    \ set, time is the most important variable and dimension that data scientists\
    \ can leverage to gain useful insights.\n\nNow let's have a look at our `ts_data`\
    \ set to see what kind of data we have by using the `head()` function. This function\
    \ returns the first *n* rows for your time series data set, and it is useful for\
    \ quickly getting an overview of the type of data and its structure in your data\
    \ set:\n\n```\nts_data.head(10)\n```\n\nAs we see below, the data set has been\
    \ classified into three columns: the hourly time stamp column, the load column,\
    \ and the temperature column:\n\n```\n                     load  temp\n2012-01-01\
    \ 00:00:00  2,698.0  32.0\n2012-01-01 01:00:00  2,558.0  32.7\n2012-01-01 02:00:00\
    \  2,444.0  30.0\n2012-01-01 03:00:00  2,402.0  31.0\n2012-01-01 04:00:00  2,403.0\
    \  32.0\n2012-01-01 05:00:00  2,453.0  31.3\n2012-01-01 06:00:00  2,560.0  30.0\n\
    2012-01-01 07:00:00  2,719.0  29.0\n2012-01-01 08:00:00  2,916.0  29.0\n2012-01-01\
    \ 09:00:00  3,105.0  33.3\n```\n\nAs a second step, it is important to get a summary\
    \ of your time series data set in case there are rows with empty values. We can\
    \ do this by using the `isna()` function in Python. This function takes a scalar\
    \ or array-like objects and indicates whether values are missing, as the example\
    \ below shows us:\n\n```\nts_data.isna().sum()\n```\n\nThe output will be\n\n\
    ```\nload    0\ntemp    0\ndtype: int64\n```\n\nAs we can see, we do not have\
    \ empty values in our data set. The next step is to understand the format of our\
    \ variables. pandas `.dtypes` method makes this possible, as it returns a series\
    \ with the data type of each column:\n\n```\nts_data.dtypes\n```\n\nThe output\
    \ will be\n\n```\nload    float64\ntemp    float64\ndtype: object\n```\n\nWe can\
    \ see that both the load and temp columns are `float64`, which is a floating-point\
    \ number that occupies 64 bits of storage. Floats represent real numbers and are\
    \ written with a decimal point dividing the integer and fractional parts.\n\n\
    As the next steps, we need to calculate and review some summary statistics for\
    \ our time series data set: summary statistics summarize large amounts of data\
    \ by describing key characteristics such as the average, distribution, potential\
    \ correlation, or dependence. Calculating descriptive statistics on time series\
    \ can help give you an idea of the distribution and spread of values. This may\
    \ help with ideas of data scaling and even data cleaning that we can perform later\
    \ as part of preparing our data set for modeling.\n\nIn pandas, descriptive statistics\
    \ include those useful indicators that summarize the central tendency, dispersion,\
    \ and shape of a data set's distribution, excluding NaN values. The `describe()`\
    \ function creates a summary of the loaded time series including mean, standard\
    \ deviation, median, minimum, and maximum:\n\n```\nts_data.describe()\n```\n\n\
    The output will be\n\n```\n          load      temp\ncount 26,304.00 26,304.00\n\
    mean  3,303.77     47.77\nstd     564.58     19.34\nmin   1,979.00    -13.67\n\
    25%   2,867.00     32.67\n50%   3,364.00     48.33\n75%   3,690.00     63.67\n\
    max   5,224.00     95.00\n```\n\nFor numeric data, the result index consists of\
    \ count, mean, std, min, and max statistics as well as lower, 50, and upper percentiles.\
    \ By default, the lower percentile is 25 and the upper percentile is 75. The 50\
    \ percentile is the same as the median.\n\nOn the other hand, for object data\
    \ (e.g., strings or time stamps), the result index presents count, unique, top,\
    \ and freq. Data scientists need to keep in mind that the top value does not represent\
    \ the most common value; the freq represents the most common value. Additional\
    \ important information are included time stamps, such as the first and last items.\
    \ If multiple object values have the highest count, then the count and top results\
    \ will be arbitrarily chosen from among those with the highest count.\n\nFinally,\
    \ for mixed data types presented in a DataFrame, the default option is to return\
    \ only an evaluation of numeric columns. If the DataFrame contains only object\
    \ and categorical data without any numeric columns, the default option is to show\
    \ an overview of both the object and categorical columns. If `include=all` is\
    \ given as an option, the final result will contain an overview of attributes\
    \ of each type.\n\nAs you learned in Chapter 1, “Overview of Time Series Forecasting,”\
    \ generally time series often contain specific time-related information and features\
    \ such as the following:\n\n- **Trend:** This feature describes a visible change\
    \ of time series values with respect to higher or lower values over a prolonged\
    \ (but not seasonal or cyclical) period of time.\n- **Seasonality:** This feature\
    \ describes a recurring and persistent pattern in a time series within a fixed\
    \ time period.\n- **Cyclic:** This feature describes recurring and persistent\
    \ patterns of upward and downward changes in your time series data, but it does\
    \ not show a fixed pattern.\n- **Noise:** This feature describes irregular values\
    \ in your time series data, and it is also called noise, as it does not present\
    \ a recurring and persistent pattern."
  mdcn: "## 频率转换\n\n在以下示例中，我们将使用 `ts_data` 数据集中的所有变量（包括负荷和温度变量），来理解数据科学家如何对时间序列数据进行频率转换。\n\
    \n首先，让我们加载 `ts_data` 数据集，并可视化两个变量的前10行数据：\n\n```\nts_data = load_data(data_dir)\n\
    ts_data.head(10)\n```\n\n输出结果如下：\n\n| | Load | temp |\n|---|---|---|\n| 2012-01-01\
    \ 00:00:00 | 2,698.00 | 32.00 |\n| 2012-01-01 01:00:00 | 2,558.00 | 32.67 |\n\
    | 2012-01-01 02:00:00 | 2,444.00 | 30.00 |\n| 2012-01-01 03:00:00 | 2,402.00 |\
    \ 31.00 |\n| 2012-01-01 04:00:00 | 2,403.00 | 32.00 |\n| 2012-01-01 05:00:00 |\
    \ 2,453.00 | 31.33 |\n| 2012-01-01 06:00:00 | 2,560.00 | 30.00 |\n| 2012-01-01\
    \ 07:00:00 | 2,719.00 | 29.00 |\n| 2012-01-01 08:00:00 | 2,916.00 | 29.00 |\n\
    | 2012-01-01 09:00:00 | 3,105.00 | 33.33 |\n\n用于更改频率的主要函数是 `asfreq()` 方法。该方法将时间序列转换为指定的频率，并可选择提供填充方法来填充/回填缺失值。对于\
    \ `DatetimeIndex`，这基本上只是一个围绕 `reindex()` 的轻量但便捷的包装器，它会生成一个 `date_range` 并调用 `reindex`，如下例所示：\n\
    \n```\ndaily_ts_data = ts_data.asfreq(pd.offsets.BDay())\ndaily_ts_data.head(5)\n\
    ```\n\n运行此示例将打印转换后的 `ts_data_daily` 数据集的前五行：\n\n| | load | temp |\n|---|---|---|\n\
    | 2012-01-02 | 2,458.00 | 43.67 |\n| 2012-01-03 | 2,780.00 | 26.33 |\n| 2012-01-04\
    \ | 3,184.00 | 6.00 |\n| 2012-01-05 | 3,014.00 | 22.33 |\n| 2012-01-06 | 2,992.00\
    \ | 17.00 |\n\n`asfreq` 函数可选择提供填充方法来填充/回填缺失值。它返回符合指定频率的新索引的原始数据，如下所示：\n\n```\n\
    daily_ts_data.asfreq(pd.offsets.BDay(), method='pad')\ndaily_ts_data.head(5)\n\
    ```\n\n运行此示例将打印使用 'pad' 方法转换后的 `daily_ts_data` 数据集的前五行：\n\n```\n           load\
    \  temp\n2012-01-02  2,458.00  43.67\n2012-01-03  2,780.00  26.33\n2012-01-04\
    \  3,184.00   6.00\n2012-01-05  3,014.00  22.33\n2012-01-06  2,992.00  17.00\n\
    ```\n\n有关 pandas 对时间序列支持的更多信息，请访问网站 pandas.pydata.org/docs/user_guide/timeseries.html。\n\
    \n接下来，我将讨论如何探索和分析你的时间序列数据集，以及如何进行预处理和特征工程以丰富你的时间序列数据集。\n\n## 时间序列探索与理解\n\n在接下来的章节中，你将学习探索、分析和理解时间序列数据的第一步。我们将重点关注以下主题：\n\
    \n- 如何开始时间序列数据分析\n- 如何计算和审查时间序列数据的汇总统计量\n- 如何对时间序列中的缺失周期进行数据清洗\n- 如何进行时间序列数据的归一化和标准化\n\
    \n## 如何开始时间序列数据分析\n\n正如你在本章第一节所看到的，pandas 在处理和操作时间序列数据方面已被证明非常有效：pandas 有一些内置的\
    \ `datetime` 函数，使得处理时间序列数据变得简单，因为在这类数据集中，时间是数据科学家可以利用来获取有用见解的最重要变量和维度。\n\n现在，让我们使用\
    \ `head()` 函数查看我们的 `ts_data` 数据集，以了解我们拥有什么样的数据。此函数返回时间序列数据集的前 *n* 行，对于快速获取数据集中数据类型和结构的概览非常有用：\n\
    \n```\nts_data.head(10)\n```\n\n如下所示，数据集被分为三列：小时时间戳列、负荷列和温度列：\n\n```\n       \
    \              load  temp\n2012-01-01 00:00:00  2,698.0  32.0\n2012-01-01 01:00:00\
    \  2,558.0  32.7\n2012-01-01 02:00:00  2,444.0  30.0\n2012-01-01 03:00:00  2,402.0\
    \  31.0\n2012-01-01 04:00:00  2,403.0  32.0\n2012-01-01 05:00:00  2,453.0  31.3\n\
    2012-01-01 06:00:00  2,560.0  30.0\n2012-01-01 07:00:00  2,719.0  29.0\n2012-01-01\
    \ 08:00:00  2,916.0  29.0\n2012-01-01 09:00:00  3,105.0  33.3\n```\n\n作为第二步，获取时间序列数据集的摘要非常重要，以防存在空值行。我们可以通过使用\
    \ Python 中的 `isna()` 函数来实现。此函数接受标量或类数组对象，并指示值是否缺失，如下例所示：\n\n```\nts_data.isna().sum()\n\
    ```\n\n输出结果为：\n\n```\nload    0\ntemp    0\ndtype: int64\n```\n\n如我们所见，我们的数据集中没有空值。下一步是理解我们变量的格式。pandas\
    \ 的 `.dtypes` 方法使这成为可能，因为它返回一个包含每列数据类型的序列：\n\n```\nts_data.dtypes\n```\n\n输出结果为：\n\
    \n```\nload    float64\ntemp    float64\ndtype: object\n```\n\n我们可以看到负荷和温度列都是\
    \ `float64`，这是一种占用64位存储空间的浮点数。浮点数表示实数，书写时用小数点分隔整数部分和小数部分。\n\n作为后续步骤，我们需要计算和审查时间序列数据集的一些汇总统计量：汇总统计量通过描述关键特征（如平均值、分布、潜在相关性或依赖性）来总结大量数据。计算时间序列的描述性统计量可以帮助你了解值的分布和离散程度。这可能有助于我们稍后在为建模准备数据集时进行数据缩放甚至数据清洗的想法。\n\
    \n在 pandas 中，描述性统计量包括那些总结数据集分布的中心趋势、离散程度和形状的有用指标，不包括 NaN 值。`describe()` 函数创建加载的时间序列的摘要，包括均值、标准差、中位数、最小值和最大值：\n\
    \n```\nts_data.describe()\n```\n\n输出结果为：\n\n```\n          load      temp\ncount\
    \ 26,304.00 26,304.00\nmean  3,303.77     47.77\nstd     564.58     19.34\nmin\
    \   1,979.00    -13.67\n25%   2,867.00     32.67\n50%   3,364.00     48.33\n75%\
    \   3,690.00     63.67\nmax   5,224.00     95.00\n```\n\n对于数值数据，结果索引包含计数、均值、标准差、最小值和最大值统计量，以及下四分位数、中位数（50%）和上四分位数。默认情况下，下四分位数是25，上四分位数是75。50%分位数与中位数相同。\n\
    \n另一方面，对于对象数据（例如字符串或时间戳），结果索引呈现计数、唯一值、最常见值和频率。数据科学家需要记住，最常见值（top）并不代表最常见的值；频率（freq）代表最常见的值。其他重要信息包括时间戳，如第一个和最后一个条目。如果多个对象值具有最高计数，则计数和最常见值结果将从具有最高计数的值中任意选择。\n\
    \n最后，对于 DataFrame 中呈现的混合数据类型，默认选项是仅返回数值列的评估。如果 DataFrame 仅包含对象和分类数据而没有任何数值列，则默认选项是显示对象和分类列的概览。如果给定\
    \ `include=all` 作为选项，则最终结果将包含每种类型属性的概览。\n\n正如你在第1章“时间序列预测概述”中所学，通常时间序列包含特定的时间相关信息和特征，例如以下内容：\n\
    \n- **趋势：** 此特征描述了时间序列值在较长（但非季节性或周期性）时期内相对于较高或较低值的可见变化。\n- **季节性：** 此特征描述了时间序列在固定时间段内重复出现的持续模式。\n\
    - **周期性：** 此特征描述了时间序列数据中上升和下降变化的重复出现的持续模式，但它不显示固定模式。\n- **噪声：** 此特征描述了时间序列数据中的不规则值，也称为噪声，因为它不呈现重复出现的持续模式。"

    # Recurrent Neural Networks for Time Series Forecasting


    Recurrent neural network (RNN), also known as autoassociative or feedback network,
    belongs to a class of artificial neural networks where connections between units
    form a directed cycle. This creates an internal state of the network, which allows
    it to exhibit dynamic temporal behavior (Poznyak, Oria, and Poznyak 2018).


    RNN can leverage their internal memory to handle sequences of inputs and, instead
    of mapping inputs to outputs alone, it is capable of leveraging a mapping function
    for the inputs over *time* to an output. RNNs have shown to achieve the state-of-the-art
    results in many applications with time series or sequential data, including machine
    translation and speech recognition.


    In particular, LSTM is a type of RNN architecture that performs particularly well
    on different temporal processing tasks, and LSTM networks are able to address
    the issue of large time lags in input data successfully. LSTM networks have several
    nice properties such as strong prediction performance as well as'

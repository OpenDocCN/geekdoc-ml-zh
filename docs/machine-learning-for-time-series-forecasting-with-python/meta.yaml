    Nowadays, organizations create, acquire and store a combination of structured,
    semistructured, and unstructured data that can be mined for insights and used
    in machine learning applications to improve operations. Hence, it is crucial for
    companies to learn how to successfully manage the process of obtaining and importing
    data for immediate use or storage in a database.


    As discussed in the energy example above, companies today rely on data to make
    all kinds of decisions—predict trends, forecast the market, plan for future needs,
    and understand their customers. However, how do you get all your company’s data
    in one place so you can make the right decisions?


    In the next section we will discuss a few techniques and best practices for companies
    to support data ingestion processes and move their data from multiple different
    sources into one place.


    # Data Ingestion


    Businesses today gather large volumes of data, both structured and unstructured,
    in an effort to use that data to discover real-time or near real-time insights
    that inform decision making and support digital transformation. Data ingestion
    is the process of obtaining and importing data for immediate use or storage in
    a database.


    Data can be ingested using three different methods: batch, real-time, and streaming:


    +   - **Batch time series data processing** – A common big data scenario is batch
    processing of data at rest. In this scenario, the source data is loaded into data
    storage, either by the source application itself or by an orchestration workflow.
    The data is then processed in-place by a parallelized job, which can also be initiated
    by the orchestration workflow, as illustrated in Figure 2.2.


    The processing may include multiple iterative steps before the transformed results
    are loaded into an analytical data store, which can be queried by analytics and
    reporting components. To learn more about how to choose a batch processing technology,
    you can read the article on Azure Time Series Insights at aka.ms/TimeSeriesInsights.'

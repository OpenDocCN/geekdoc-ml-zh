    | Azure Kubernetes Service (AKS) | Real-time inference | Good for high-scale production
    deployments. Provides fast response time and autoscaling of the deployed service.
    Cluster autoscaling is not supported through the Azure Machine Learning SDK. To
    change the nodes in the AKS cluster, use the UI for your AKS cluster in the Azure
    portal. |

    | Azure Container Instances (ACI) | Testing or dev | Good for low-scale, CPU-based
    workloads requiring <48 GB RAM. |'

    ## Chapter 3 ■ Time Series Data Preparation


    ### Common Data Preparation Operations for Time Series


    pandas (pandas.pydata.org) offers a diverse portfolio of capabilities to support
    time series data. The following key features are important for time series forecasting
    in pandas:


    - Parsing time series information from various sources and formats

    - Generating sequences of fixed-frequency dates and time spans

    - Manipulating and converting date times with time zone information

    - Resampling or converting a time series to a particular frequency

    - Performing date and time arithmetic with absolute or relative time increments


    pandas captures four general time related concepts:


    - *Date time*: A specific date and time with time zone support, such as month,
    day, year, hour, second, microsecond.

    - *Time deltas*: An absolute time duration used for manipulating dates.

    - *Time spans*: A duration of time defined by a point in time and its associated
    frequency.

    - *Date offsets*: A relative time duration that respects calendar arithmetic.


    As illustrated in Table 3.1, the four general time-related concepts have different
    characteristics and primary creation methods.


    Table 3.1: Four general time-related concepts supported in pandas


    | CONCEPT | SCALAR CLASS | ARRAY CLASS | DATA TYPE | CREATION METHOD |

    | :--- | :--- | :--- | :--- | :--- |

    | Date times | Time stamp | DatetimeIndex | datetime64[ns] or datetime64[ns, tz]
    | to_datetime or date_range |

    | Time deltas | Timedelta | TimedeltaIndex | timedelta64[ns] | to_timedelta or
    timedelta_range |

    | Time spans | Period | PeriodIndex | period[freq] | Period or period_range |

    | Date offsets | DateOffset | None | None | DateOffset |


    In Table 3.1, there are a few additional concepts that are important to explain
    for those new to Python:


    - *Scalar class*: A scalar class is a numerical value alone and defines a vector
    space. A quantity described by multiple scalars, such as having both direction
    and magnitude, is called a vector.

    - *Array class*: An array class is a data structure that holds a fixed number
    of values of the same data type.

    - *Data type*: A data type is a labeling of different data objects. It represents
    the type of values in your data set used to understand how to store and manipulate
    data.

    - *Primary creation method*: A group of functions and operations that are typically
    written and used to perform a single or a set of actions on your data. Functions,
    if properly written, provide better efficiency, reproducibility, and modularity
    to your Python code.


    In the next few sections, we will discuss some of the most common operations that
    you can perform using pandas for time series data.


    ### Time stamps vs. Periods


    The pandas library in Python provides comprehensive and built-in support for time
    series data. The examples below and for the rest of the chapter focus on energy
    demand forecasting. In general, demand forecasting is the practice of predicting
    future demand (or quantity of specific products and services) by using historical
    demand data to make informed business decisions about future plans, such as planning
    a product inventory optimization strategy, allocating marketing investments, and
    estimating the cost of new products and services to meet customer demand and needs.


    Energy demand forecasting is a type of demand forecasting where the goal is to
    predict the future load (or energy demand) on an energy grid. It is a critical
    business operation for companies in the energy sector, as operators need to maintain
    the fine balance between the energy consumed on a grid and the energy supplied
    to it. Typically, grid operators can take short-term decisions to manage energy
    supply to the grid and keep the load in balance. An accurate short-term forecast
    of energy demand is therefore essential for the operator to make these decisions
    with confidence. This scenario details the construction of a machine learning
    energy demand forecasting solution.


    Let''s first look at the concept of *time stamped* data, which is the most essential
    type of time series data and helps you combine values with specific points in
    time. This means that each data point of your data set will have a temporal information
    that you can leverage, as shown in the sample code below:


    ```python

    # import necessary Python packages

    import pandas as pd

    import datetime as dt

    import numpy as np


    pd.Timestamp(dt.datetime(2014, 5, 1))


    # or we can use

    pd.Timestamp(''2014-06-01'')


    # or we can use

    pd.Timestamp(2014, 6, 1)

    ```


    The result of these examples will be as follows:


    ```

    Timestamp(''2014-06-01 00:00:00'')

    ```


    In many time series scenarios, it can be also useful to link data points in your
    data set to a time interval instead. The time interval represented by `Period`
    can be inferred from datetime string format, as shown in the following example:


    ```python

    pd.Period(''2014-06'')

    ```


    Output:


    ```

    Period(''2014-06'', ''M'')

    ```


    Where ''M'' stands for month. The time interval represented by `Period` can be
    also specified explicitly:


    ```python

    pd.Period(''2014-06'', freq=''D'')

    ```


    Output:


    ```

    Period(''2014-06-01'', ''D'')

    ```'

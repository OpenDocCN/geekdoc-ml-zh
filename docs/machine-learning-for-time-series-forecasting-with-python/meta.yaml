    # Deep Learning Supports Multiple Inputs and Outputs


    Real-world time series forecasting is challenging for several reasons, such as
    having multiple input variables, the requirement to predict multiple time steps,
    and the need to perform the same type of prediction for multiple physical sites.
    Deep learning algorithms can be applied to time series forecasting problems and
    offer benefits such as the ability to handle multiple input variables with noisy
    complex dependencies (Lazzeri 2019a).


    Specifically, neural networks can be configured to support an arbitrary but fixed
    number of inputs and outputs in the mapping function. This means that neural networks
    can directly support multivariate inputs, providing direct support for multivariate
    forecasting. A univariate time series, as the name suggests, is a series with
    a single time-dependent variable. For example, we want to predict next energy
    consumption in a specific location: in a univariate time series scenario, our
    dataset will be based on two variables, time values and historical energy consumption
    observations (Lazzeri 2019a).


    A multivariate time series has more than one time-dependent variable. Each variable
    not only depends on its past values but also has some dependency on other variables.
    This dependency is used for forecasting future values. Let''s consider the above
    example again.


    Now suppose our data set includes weather data, such as temperature values, dew
    point, wind speed, and cloud cover percentage along with the energy consumption
    value for the past four years. In this case, there are multiple variables to be
    considered to optimally predict energy consumption value. A series like this would
    fall under the category of multivariate time series.


    With neural networks, an arbitrary number of output values can be specified, offering
    direct support for more complex time series scenarios that require multivariate
    forecasting and even multi-step forecast methods. There are two main approaches
    that deep learning methods can be used to make multi-step forecasts:


    +   - *Direct*, where a separate model is developed to forecast each forecast
    lead time

    - *Recursive*, where a single model is developed to make one-step forecasts, and
    the model is used recursively where prior forecasts are used as input to forecast
    the subsequent lead time


    The recursive approach can make sense when forecasting a short contiguous block
    of lead times, whereas the direct approach may make more sense when forecasting
    discontinuous lead times. The direct approach may be more appropriate when we
    need to forecast a mixture of multiple contiguous and'

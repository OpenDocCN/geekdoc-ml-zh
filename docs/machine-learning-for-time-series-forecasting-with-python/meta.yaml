    # Chapter 4 ■ Introduction to Autoregressive and Automated Methods


    More generally, an *nth*-order autoregression is a multiple linear regression
    in which the value of the series at any time *t* is a linear function of the previous
    values in that same time series. Because of this serial dependence, another important
    aspect of autoregressions is *autocorrelation*: autocorrelation is a statistical
    property that occurs when a time series is linearly related to a previous or lagged
    version of itself.


    Autocorrelation is a crucial concept for autoregressions as the stronger the correlation
    between the output (that is, the target variable that we need to predict) and
    a specific lagged variable (that is, a group of values at a prior time stamp used
    as input), the more weight that autoregression can put on that specific variable.
    So that variable is considered to have a strong predictive power.


    Moreover, some regression methods, such as linear regression and ordinary least
    squares regression, rely on the implicit assumption that there is no presence
    of autocorrelation in the training data set used to feed the model. These methods,
    like linear regression and ordinary least squares regression, are defined as *parametric*
    methodologies, as the set of data used with them presents a normal distribution
    and their regression function is defined in terms of a finite number of unknown
    parameters that are estimated from the data.


    For all these reasons, autocorrelation can help data scientists select the most
    appropriate method for their time series forecasting solutions. Furthermore, autocorrelation
    can be very useful to gain additional insights from your data and between your
    variables, and identify hidden patterns, such as seasonality and trend in time
    series data.


    In order to check whether there is a presence of autocorrelation in your time
    series data, you can use two different built-in plots provided by pandas, called
    `lag_plot` (pandas.pydata.org/docs/reference/api/pandas.plotting.lag_plot.html)
    and `autocorrelation_plot` (pandas.pydata.org/docs/reference/api/pandas.plotting.autocorrelation_plot.html).


    These functions can be imported from `pandas.plotting` and take a Series or DataFrame
    as an argument. Both plots are visual checks that you can leverage to see if there
    is autocorrelation in your time series data set, as illustrated in Table 4.1.


    Table 4.1: pandas.plotting.lag_plot API reference and description


    | API REFERENCE | pandas.plotting.lag_plot |

    | :--- | :--- |

    | **Parameters** | series : time series |

    | | lag : lag of the scatter plot, default 1 |

    | | ax : matplotlib axis object, optional |

    | | kwds : matplotlib scatter method keyword arguments, optional |

    | **Returns** | class: matplotlib.axis.Axes |'

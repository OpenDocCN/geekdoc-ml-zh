    # Chapter 2 ■ How to Design an End-to-End Time Series Forecasting Solution


    Within the energy sector, there could be many ways in which demand forecasting
    can help solve critical business problems. In fact, demand forecasting can be
    considered the foundation for many core use cases in the industry. In general,
    we consider two types of energy demand forecasts: short term and long term. Each
    one may serve a different purpose and utilize a different approach. The main difference
    between the two is the forecasting horizon, meaning the range of time into the
    future for which we would forecast.


    Within the context of energy demand, short-term load forecasting (STLF) is defined
    as the aggregated load that is forecasted in the near future on various parts
    of the grid (or the grid as a whole). In this context, *short term* is defined
    to be a time horizon within the range of 1 hour to 24 hours. In some cases, a
    horizon of 48 hours is also possible. Therefore, STLF is very common in an operational
    use case of the grid.


    STLF models are mostly based on the near past (last day or week) consumption data
    and use forecasted temperature as an important predictor. Obtaining accurate temperature
    forecasts for the next hour and up to 24 hours is becoming less of a challenge
    nowadays. These models are less sensitive to seasonal patterns or long-term consumption
    trends.


    SLTF solutions are also likely to generate a high volume of prediction calls (service
    requests) since they are being invoked on an hourly basis and in some cases even
    with higher frequency. It is also very common to see implantation, where each
    individual substation or transformer is represented as a stand-alone model and
    therefore the volume of prediction requests is even greater.


    The goal of long-term load forecasting (LTLF) is to forecast power demand with
    a time horizon ranging from one week to multiple months (and in some cases for
    a number of years). This range of horizon is mostly applicable for planning and
    investment use cases.


    For long-term scenarios, it is important to have high-quality data that covers
    a span of multiple years (minimum three years). These models will typically extract
    seasonality patterns from the historical data and make use of external predictors
    such as weather and climate patterns.


    It is important to clarify that the longer the forecasting horizon is, the less
    accurate the forecast may be. It is therefore important to produce some confidence
    intervals along with the actual forecast that would allow humans to factor the
    possible variation into their planning process.


    Since the consumption scenario for LTLF is mostly planning, we can expect much
    lower prediction volumes (as compared to STLF). We would typically see these predictions
    embedded into visualization tools such as Excel or PowerBI and be invoked manually
    by the user.


    Table 2.2 compares STLF and LTLF in respect to the most important attributes.'

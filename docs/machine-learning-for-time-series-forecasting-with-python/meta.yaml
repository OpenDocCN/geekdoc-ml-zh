- md: "## Chapter 3 ■ Time Series Data Preparation\n\nBy using the `statsmodels` Python\
    \ module, which has a `tsa` (time series analysis) package as well as the `seasonal_decompose()`\
    \ function, we can visualize these four components and gain additional insights\
    \ from our time series data.\n\nThe `statsmodels.tsa` package includes model classes\
    \ and capabilities that are helpful to handle time series data. Some model examples\
    \ are univariate autoregressive (AR) models, vector autoregressive (VAR) models,\
    \ and univariate autoregressive moving average (ARMA) models. Some examples of\
    \ non-linear models are Markov switching dynamic regression and autoregression.\n\
    \nThe `statsmodels.tsa` package also contains descriptive statistics for time\
    \ series, such as autocorrelation, partial autocorrelation function, and periodogram.\
    \ It also offers techniques to work with autoregressive and moving average lag-polynomials\
    \ (statsmodels.org/devel/tsa.html).\n\nLet's use the `statsmodels` and `seasonal_decompose()`\
    \ functions to extract and visualize our `ts_data` set components only for the\
    \ load variable, which is our target variable. First, let's import all necessary\
    \ packages:\n\n```python\n# import necessary Python packages\nimport statsmodels.api\
    \ as sm\nimport warnings\nimport matplotlib\nimport matplotlib.pyplot as plt\n\
    import matplotlib.dates as mdates\n\n%matplotlib inline\n\nwarnings.filterwarnings(\"\
    ignore\")\n```\n\nFor practical reasons, we will visualize only a subset of our\

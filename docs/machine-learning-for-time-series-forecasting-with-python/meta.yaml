    # CHAPTER 3


    ## 3 Time Series Data Preparation


    In this chapter, I will walk you through the most important steps to prepare your
    time series data for forecasting models. *Data preparation* is the practice of
    transforming your raw data so that data scientists can run it through machine
    learning algorithms to discover insights and, eventually, make predictions.


    Each machine learning algorithm expects data as input that needs to be formatted
    in a very specific way, so time series data sets generally require some cleaning
    and feature engineering processes before they can generate useful insights. Time
    series data sets may have values that are missing or may contain outliers, hence
    the need for the data preparation and cleaning phase is essential. Since the time
    series data has temporal property, only some of the statistical methodologies
    are appropriate for time series data. Good time series data preparation produces
    clean and well-curated data, which leads to more practical, accurate predictions.


    Specifically, in this chapter we will discuss the following:


    - *Python for Time Series Data* – Python is a very powerful programming language
    to handle data, offering an assorted suite of libraries for time series data and
    excellent support for time series analysis. In this section of Chapter 3, you
    will see how libraries such as SciPy, NumPy, Matplotlib, pandas, statsmodels,
    and scikit-learn can help you prepare, explore, and analyze your time series data.

    - *Time Series Exploration and Understanding* – In this section of Chapter 3,
    you will learn the first steps to take to explore, analyze, and understand time
    series data. Specifically, this section will focus on how to get started with
    time series data analysis and how to calculate and review summary statistics for
    time series data; then you will learn how to perform data cleaning of missing
    periods in a time series; finally, you will see how to perform time series data
    normalization and standardization.

    - *Time Series Feature Engineering* – Feature engineering is the process of using
    raw data to create additional features or variables to augment your data set.
    In this section of Chapter 3, you will learn how to perform feature engineering
    on time series data with two goals in mind: preparing the proper input time series
    data set, compatible with the machine learning algorithm requirements; and improving
    the performance of machine learning models. If feature engineering is done correctly,
    it creates a stronger relationships between new input features and the output
    feature for the supervised learning algorithm to model.


    Let’s get started and learn how you can easily use Python and leverage multiple
    libraries to prepare and analyze your time series data.


    ## Python for Time Series Data


    Python is currently one of the most dominant platforms for time series data because
    of the excellent library support. There are a few Python libraries for time series,

    # CHAPTER 2

    How to Design an End-to-End Time Series Forecasting Solution on the Cloud


    As we discussed in Chapter 1, “Overview of Time Series Forecasting,” time series
    forecasting is a method for the prediction of events through a sequence of time,
    by studying the behavior and performance of past phenomena and assuming that future
    occurrences will hold similar to historical trends and behaviors.


    Nowadays time series forecasting is performed in a variety of applications, including
    weather forecasting, earthquake prediction, astronomy, finance, and control engineering.
    In many modern and real-world applications, time series forecasting uses computer
    technologies, including cloud, artificial intelligence, and machine learning,
    to build and deploy end-to-end forecasting solutions.


    To solve real business problems in the industry, it is essential to have a systematic
    and well-structured template that data scientists can use as a guideline and can
    apply it to solve real-world business scenarios. The purpose of this second chapter
    is to provide an end-to-end systematic guide for time series forecasting from
    a practical perspective by introducing the following concepts:


    +   - *Time Series Forecasting Template:* A time series forecast template is a
    set of tasks that leads from defining a business problem through to the outcome
    of having a time series forecast model deployed and ready to be consumed externally
    or across your company.'
- md: '## Chapter 2 ■ How to Design an End-to-End Time Series Forecasting Solution


    In the first section, I will introduce some key techniques for building machine
    learning forecasting solutions successfully. Specifically, we will take a closer
    look at the following steps:


    - *Business understanding and performance metrics definition*: The business understanding
    performance metrics definition step outlines the business aspect we need to understand
    and consider prior to making an investment decision. It explains how to qualify
    the business problem at hand to ensure that predictive analytics and machine learning
    are indeed effective and applicable.

    - *Data ingestion*: Data ingestion is the process of collecting and importing
    data to be cleaned and analyzed or stored in a database. Businesses today gather
    large volumes of data, both structured and unstructured, in an effort to use that
    data to discover real-time or near real-time insights.

    - *Data exploration and understanding*: Once the raw data has been ingested and
    securely stored, it is ready to be explored. The data exploration and understanding
    phase is about taking your raw data and converting it into a form that can be
    used for data cleaning and feature engineering.

    - *Data pre-processing and feature engineering*: Data pre-processing and feature
    engineering is the step where data scientists clean data sets from outliers and
    missing data and create additional features with the raw data to feed their machine
    learning models. In machine learning, a feature is a quantifiable variable of
    the phenomenon you are trying to analyze. For certain types of data, the number
    of features can be very large compared to the number of data points.

    - *Model building and selection*: The modeling phase is where the conversion of
    the data into a model takes place. In the core of this process there are advanced
    algorithms that scan the historical data (training data), extract patterns, and
    build a model. That model can be later used to predict on new data that has not
    been used to build the model.

    - *Model deployment*: Deployment is the method by which you integrate a machine
    learning model into an existing production environment in order to start using
    it to make practical business decisions based on data. It is one of the last stages
    in the machine learning life cycle.

    - *Forecasting solution acceptance*: In the last stage of the time series forecasting
    solution deployment, data scientists need to confirm and validate that the pipeline,
    the model, and their deployment in a production environment satisfy their success
    criteria.

    - *Use case: demand forecasting*: At the end of this chapter, I will introduce
    a real-world data science scenario that will be used throughout this book to showcase
    some of the time series concepts, steps, and techniques discussed. I believe everyone
    must learn to smartly work with huge amounts of data, hence large data sets are
    included, open and free to access.


    Let’s now get started and discover together how you can apply this time series
    forecasting template to your time series data and solutions.


    ## Time Series Forecasting Template


    This template is an agile and iterative framework to deliver a time series forecasting
    solution efficiently. It contains a distillation of the best practices and structures
    that facilitate the successful implementation of time series forecasting initiatives.
    The goal is to help companies fully realize the benefits of their data and build
    end-to-end forecasting solutions on the cloud.


    To handle the increasing variety and complexity of forecasting problems, many
    machine learning and deep learning forecasting techniques have been developed
    in recent years. As we will discuss in Chapter 4, “Introduction to Some Classical
    Methods for Time Series Forecasting,” and Chapter 5, “Introduction to Neural Networks
    for Time Series Forecasting,” each of these forecasting techniques has its special
    application, and care must be taken to select the correct technique for a particular
    application. The better you understand the portfolio of algorithms that you can
    apply to your forecasting scenario, the more likely it is that your forecasting
    efforts will be successful.


    The choice of a machine learning algorithm depends on many factors—the business
    question you are trying to answer, the relevance and availability of historical
    data, the accuracy and success metric you need to achieve, the horizon and how
    much time your team has to build the forecasting solution. These constraints must
    be weighed continuously, and on different levels (Lazzeri 2019b).


    Figure 2.1 illustrates a time series forecasting template: the purpose here is
    to present an overview of this field by discussing the way a data scientist or
    a company should approach a forecasting problem, introducing a few approaches,
    describing the methods available, and explaining how to match each step to different
    aspects of a forecasting problem.


    As you can observe in Figure 2.1, our template consists of different steps:


    1. Business understanding and performance metrics definition

    2. Data ingestion

    3. Data exploration and understanding

    4. Data pre-processing and feature engineering

    5. Model building and selection

    6. Model deployment

    7. Forecasting solution acceptance


    ![](img/fd006a6c056e5cf905b5150f958ed477_51_0.png)


    Figure 2.1: Time series forecasting template


    There are some necessary iterative loops (on steps 3 and 5) that you should keep
    in mind within this process:


    - *Data exploration and understanding* – Data exploration and understanding is
    the moment in which data scientists will use several different statistical techniques
    and visualizations to explore the data and get a better understanding of its nature.
    It is possible that at this stage, data scientists will have additional questions
    and will need to request and ingest additional or different data and reevaluate
    the performance metrics defined at the beginning of this process.

    - *Model building and selection* – During the model building and selection phase,
    it is possible that data scientists will have additional ideas in terms of new
    features to build and include in the models, new parameters to try, or even new
    algorithms to apply.


    In the next few sections of this chapter, we will take a closer look at these
    different steps and introduce you to the use cases that we will be using throughout
    the book.


    ## Business Understanding and Performance Metrics


    The business understanding and performance metrics definition step outlines the
    business aspect we need to understand and consider prior to making an investment
    decision. It explains how to qualify the business problem at hand to ensure that
    predictive analytics and machine learning are indeed effective and applicable.
    For most organizations, lack of data is not a problem. In fact, it is the opposite:
    there is often too much information available to make a clear decision on the
    future.


    With so much data to sort through, organizations need a well-defined strategy
    to clarify the following business aspects:


    - How can forecasting help organizations transform business, better manage costs,
    and drive greater operational excellence?

    - Do organizations have a well-defined and clearly articulated purpose and vision
    for what they are looking to accomplish in the future?

    - How can organizations get support of C-level executives and stakeholders to
    take that forecasting approach and data-driven vision and drive them through the
    different parts of a business?


    Companies need to have a clear understanding of their business and decision-making
    process to support the forecasting solution. The goal of this first step is to
    specify the key performance metrics, data, and features that will serve as the
    model targets and whose related metrics will be used to determine the success
    of the project, and also identify the relevant data sources that the business
    has access to or needs to obtain.


    With the right mindset, what was once an overwhelming volume of disparate information
    becomes a simple, clear decision point. Organizations must begin with the right
    questions. Questions should be measurable, clear and concise,'
  mdcn: '## 第2章 ■ 如何设计端到端时间序列预测解决方案


    在第一节中，我将介绍成功构建机器学习预测解决方案的一些关键技术。具体来说，我们将深入探讨以下步骤：


    - *业务理解与性能指标定义*：业务理解与性能指标定义步骤概述了在做出投资决策之前需要理解和考虑的业务方面。它解释了如何界定当前的业务问题，以确保预测分析和机器学习确实有效且适用。

    - *数据摄取*：数据摄取是收集和导入数据以进行清理、分析或存储到数据库的过程。当今企业收集大量结构化和非结构化数据，旨在利用这些数据发现实时或近实时的洞察。

    - *数据探索与理解*：一旦原始数据被摄取并安全存储，就可以进行探索了。数据探索与理解阶段是关于获取原始数据并将其转换为可用于数据清理和特征工程的形式。

    - *数据预处理与特征工程*：数据预处理与特征工程是数据科学家清理数据集中的异常值和缺失数据，并利用原始数据创建额外特征以供其机器学习模型使用的步骤。在机器学习中，特征是您试图分析的现象的一个可量化变量。对于某些类型的数据，特征的数量可能比数据点的数量大得多。

    - *模型构建与选择*：建模阶段是将数据转换为模型的过程。该过程的核心是先进的算法，它们扫描历史数据（训练数据），提取模式，并构建一个模型。该模型随后可用于对未用于构建模型的新数据进行预测。

    - *模型部署*：部署是将机器学习模型集成到现有生产环境中，以便开始使用它基于数据做出实际业务决策的方法。它是机器学习生命周期的最后阶段之一。

    - *预测解决方案验收*：在时间序列预测解决方案部署的最后阶段，数据科学家需要确认并验证管道、模型及其在生产环境中的部署是否满足其成功标准。

    - *用例：需求预测*：在本章末尾，我将介绍一个真实世界的数据科学场景，该场景将在本书中用于展示所讨论的一些时间序列概念、步骤和技术。我相信每个人都必须学会聪明地处理海量数据，因此本书包含了大型数据集，可公开免费访问。


    现在让我们开始，一起探索如何将此时间序列预测模板应用于您的时间序列数据和解决方案。


    ## 时间序列预测模板


    此模板是一个敏捷且迭代的框架，用于高效地交付时间序列预测解决方案。它包含了促进成功实施时间序列预测计划的最佳实践和结构的精华。目标是帮助企业充分利用其数据的优势，并在云端构建端到端的预测解决方案。


    为了处理日益增长的预测问题的多样性和复杂性，近年来已经开发了许多机器学习和深度学习预测技术。正如我们将在第4章“时间序列预测的一些经典方法介绍”和第5章“时间序列预测的神经网络介绍”中讨论的那样，每种预测技术都有其特殊的应用，必须谨慎选择正确的技术用于特定应用。您越了解可用于预测场景的算法组合，您的预测工作就越有可能成功。


    机器学习算法的选择取决于许多因素——您试图回答的业务问题、历史数据的相关性和可用性、您需要达到的准确性和成功指标、预测范围以及您的团队构建预测解决方案的时间。这些约束必须在不同层面上持续权衡（Lazzeri
    2019b）。


    图2.1展示了一个时间序列预测模板：这里的目的是通过讨论数据科学家或公司应如何处理预测问题、介绍几种方法、描述可用的方法以及解释如何将每个步骤与预测问题的不同方面相匹配，来概述这个领域。


    如图2.1所示，我们的模板包含不同的步骤：


    1. 业务理解与性能指标定义

    2. 数据摄取

    3. 数据探索与理解

    4. 数据预处理与特征工程

    5. 模型构建与选择

    6. 模型部署

    7. 预测解决方案验收


    ![](img/fd006a6c056e5cf905b5150f958ed477_51_0.png)


    图2.1：时间序列预测模板


    在此过程中，您需要记住一些必要的迭代循环（在步骤3和5上）：


    - *数据探索与理解* – 数据探索与理解是数据科学家将使用多种不同的统计技术和可视化方法来探索数据并更好地理解其本质的时刻。在这个阶段，数据科学家可能会有额外的问题，并需要请求和摄取额外或不同的数据，并重新评估在此过程开始时定义的性能指标。

    - *模型构建与选择* – 在模型构建与选择阶段，数据科学家可能会有新的想法，例如构建并包含在模型中的新特征、要尝试的新参数，甚至是新的算法。


    在本章接下来的几节中，我们将深入探讨这些不同的步骤，并向您介绍我们将在本书中使用的用例。


    ## 业务理解与性能指标


    业务理解与性能指标定义步骤概述了在做出投资决策之前需要理解和考虑的业务方面。它解释了如何界定当前的业务问题，以确保预测分析和机器学习确实有效且适用。对于大多数组织来说，缺乏数据不是问题。事实上，情况恰恰相反：通常有太多的信息可用，以至于难以对未来做出清晰的决策。


    面对如此多需要整理的数据，组织需要一个明确的策略来阐明以下业务方面：


    - 预测如何帮助组织转型业务、更好地管理成本并推动更高的卓越运营？

    - 组织是否对其未来希望实现的目标有明确且清晰阐述的目的和愿景？

    - 组织如何获得C级高管和利益相关者的支持，以采用这种预测方法和数据驱动的愿景，并将其贯穿到业务的不同部分？


    公司需要对其业务和决策过程有清晰的理解，以支持预测解决方案。这第一步的目标是确定关键性能指标、数据和特征，这些将作为模型目标，其相关指标将用于确定项目的成功，同时识别业务可以访问或需要获取的相关数据来源。


    拥有正确的心态后，曾经令人望而生畏的大量不同信息就变成了一个简单、清晰的决策点。组织必须从正确的问题开始。问题应该是可衡量的、清晰和简洁的，'

- md: "## Supervised Learning for Time Series Forecasting\n\nMachine learning is a\
    \ subset of artificial intelligence that uses techniques (such as deep learning)\
    \ that enable machines to use experience to improve at tasks (aka.ms/deeplearningVSmachinelearning).\
    \ The learning process is based on the following steps:\n\n1. Feed data into an\
    \ algorithm. (In this step you can provide additional information to the model,\
    \ for example, by performing feature extraction.)\n2. Use this data to train a\
    \ model.\n3. Test and deploy the model.\n4. Consume the deployed model to do an\
    \ automated predictive task. In other words, call and use the deployed model to\
    \ receive the predictions returned by the model (aka.ms/deeplearningVSmachinelearning).\n\
    \nMachine learning is a way to achieve artificial intelligence. By using machine\
    \ learning and deep learning techniques, data scientists can build computer systems\
    \ and applications that do tasks that are commonly associated with human intelligence.\
    \ These tasks include time series forecasting, image recognition, speech recognition,\
    \ and language translation (aka.ms/deeplearningVSmachinelearning).\n\nThere are\
    \ three main classes of machine learning: *supervised learning*, *unsupervised\
    \ learning*, and *reinforcement learning*. In the following few paragraphs, we\
    \ will have a closer look at each of these machine learning classes:\n\n### Supervised\
    \ Learning\n\n*Supervised learning* is a type of machine learning system in which\
    \ both input (which is the collection of values for the variables in your data\
    \ set) and desired output (the predicted values for the target variable) are provided.\
    \ Data is identified and labeled a priori to provide the algorithm a learning\
    \ memory for future data handling. An example of a numerical label is the sale\
    \ price associated with a used car (aka.ms/MLAlgorithmCS). The goal of supervised\
    \ learning is to study many labeled examples like these and then to be able to\
    \ make predictions about future data points, like, for example, assigning accurate\
    \ sale prices to other used cars that have similar characteristics to the one\
    \ used during the labeling process. It is called supervised learning because data\
    \ scientists supervise the process of an algorithm learning from the training\
    \ data set (www.aka.ms/MLAlgorithmCS): they know the correct answers and they\
    \ iteratively share them with the algorithm during the learning process. There\
    \ are several specific types of supervised learning. Two of the most common are\
    \ *classification* and *regression*:\n\n- *Classification*: Classification is\
    \ a type of supervised learning used to identify what category new information\
    \ belongs in. It can answer simple two-choice questions, like yes or no, true\
    \ or false, for example:\n    - Is this tweet positive?\n    - Will this customer\
    \ renew their service?\n    - Which of two coupons draws more customers?\n   \
    \ Classification can be used also to predict between several categories and in\
    \ this case is called multi-class classification. It answers complex questions\
    \ with multiple possible answers, for example:\n    - What is the mood of this\
    \ tweet?\n    - Which service will this customer choose?\n    - Which of several\
    \ promotions draws more customers?\n- *Regression*: Regression is a type of supervised\
    \ learning used to forecast the future by estimating the relationship between\
    \ variables. Data scientists use it to achieve the following goals:\n    - Estimate\
    \ product demand\n    - Predict sales figures\n    - Analyze marketing returns\n\
    \n### Unsupervised Learning\n\n*Unsupervised learning* is a type of machine learning\
    \ system in which data points for the input have no labels associated with them.\
    \ In this case, data is not labeled a priori so that the unsupervised learning\
    \ algorithm itself can organize the data in and describe its structure. This can\
    \ mean grouping it into clusters or finding different ways of looking at complex\
    \ data structures (aka.ms/MLAlgorithmCS).\n\n### Time Series Forecasting Strategies\n\
    \n- *Direct-recursive hybrid multi-step forecast*: The direct and recursive strategies\
    \ can be combined to offer the benefits of both methods (Brownlee 2017). For example,\
    \ a distinct model can be built for each future time stamp, however each model\
    \ may leverage the forecasts made by models at prior time steps as input values.\
    \ In the case of predicting energy consumption for the next two hours, two models\
    \ can be built, and the output from the first model is used as an input for the\
    \ second model.\n- *Multiple output forecast*: The multiple output strategy requires\
    \ developing one model that is capable of predicting the entire forecast sequence.\
    \ For example, in the case of predicting energy consumption for the next two hours,\
    \ we would develop one model and apply it to predict the next two hours in one\
    \ single computation (Brownlee 2017).\n\n### Contiguous or Noncontiguous Time\
    \ Series\n\nA time series that presents a consistent temporal interval (for example,\
    \ every five minutes, every two hours, or every quarter) between each other is\
    \ defined as contiguous (Zuo et al. 2019). On the other hand, time series that\
    \ are not uniform over time may be defined as noncontiguous: very often the reason\
    \ behind noncontiguous timeseries may be missing or corrupt values. Before jumping\
    \ to the methods of data imputation, it is important to understand the reason\
    \ data goes missing. There are three most common reasons for this:\n\n- *Missing\
    \ at random*: Missing at random means that the propensity for a data point to\
    \ be missing is not related to the missing data but it is related to some of the\
    \ observed data.\n- *Missing completely at random*: The fact that a certain value\
    \ is missing has nothing to do with its hypothetical value and with the values\
    \ of other variables.\n- *Missing not at random*: Two possible reasons are that\
    \ the missing value depends on the hypothetical value or the missing value is\
    \ dependent on some other variable’s value.\n\nIn the first two cases, it is safe\
    \ to remove the data with missing values depending upon their occurrences, while\
    \ in the third case removing observations with missing values can produce a bias\
    \ in the model. There are different solutions for data imputation depending on\
    \ the kind of problem you are trying to solve, and it is difficult to provide\
    \ a general solution.\n\nMoreover, since it has temporal property, only some of\
    \ the statistical methodologies are appropriate for time series data. I have identified\
    \ some of the most commonly used methods and listed them as a structural guide\
    \ in Figure 1.7.\n\n![](img/fd006a6c056e5cf905b5150f958ed477_32_0.png)\n\nAs you\
    \ can observe from the graph in Figure 1.7, listwise deletion removes all data\
    \ for an observation that has one or more missing values. Particularly if the\
    \ missing data is limited to a small number of observations, you may just opt\
    \ to eliminate those cases from the analysis. However, in most cases it is disadvantageous\
    \ to use listwise deletion. This is because the assumptions of the *missing completely\
    \ at random* method are typically rare to support. As a result, listwise deletion\
    \ methods produce biased parameters and estimates.\n\n*Pairwise deletion* analyses\
    \ all cases in which the variables of interest are present and thus maximizes\
    \ all data available by an analysis basis. A strength to this technique is that\
    \ it increases power in your analysis, but it has many disadvantages. It assumes\
    \ that the missing data is missing completely at random. If you delete pairwise,\
    \ then you'll end up with different numbers of observations contributing to different\
    \ parts of your model, which can make interpretation difficult.\n\n*Deleting columns*\
    \ is another option, but it is always better to keep data than to discard it.\
    \ Sometimes you can drop variables if the data is missing for more than 60 percent\
    \ of the observations but only if that variable is insignificant. Having said\
    \ that, imputation is always a preferred choice over dropping variables.\n\n###\
    \ Time Series Specific Imputation Methods\n\n- *Linear interpolation*: This method\
    \ works well for a time series with some trend but is not suitable for seasonal\
    \ data.\n- *Seasonal adjustment and linear interpolation*: This method works well\
    \ for data with both trend and seasonality.\n- *Mean, median, and mode*: Computing\
    \ the overall mean, median, or mode is a very basic imputation method; it is the\
    \ only tested function that takes no advantage of the time series characteristics\
    \ or relationship between the variables. It is very fast but has clear disadvantages.\
    \ One disadvantage is that mean imputation reduces variance in the data set.\n\
    \nIn the next section of this chapter, we will discuss how to shape time series\
    \ as a supervised learning problem and, as a consequence, get access to a large\
    \ portfolio of linear and nonlinear machine learning algorithms."
  mdcn: "## 用于时间序列预测的监督学习\n\n机器学习是人工智能的一个子集，它使用（例如深度学习等）技术，使机器能够利用经验来改进任务表现（aka.ms/deeplearningVSmachinelearning）。学习过程基于以下步骤：\n\
    \n1.  将数据输入算法。（在此步骤中，你可以向模型提供额外信息，例如通过执行特征提取。）\n2.  使用这些数据训练模型。\n3.  测试并部署模型。\n\
    4.  使用部署好的模型执行自动化预测任务。换句话说，调用并使用部署好的模型来接收模型返回的预测结果（aka.ms/deeplearningVSmachinelearning）。\n\
    \n机器学习是实现人工智能的一种方式。通过使用机器学习和深度学习技术，数据科学家可以构建能够执行通常与人类智能相关任务的计算机系统和应用程序。这些任务包括时间序列预测、图像识别、语音识别和语言翻译（aka.ms/deeplearningVSmachinelearning）。\n\
    \n机器学习主要有三类：*监督学习*、*无监督学习*和*强化学习*。在接下来的几段中，我们将更仔细地探讨这些机器学习类别中的每一类：\n\n### 监督学习\n\
    \n*监督学习*是一种机器学习系统，其中输入（即数据集中变量的值的集合）和期望输出（目标变量的预测值）都是提供的。数据被预先识别和标记，为算法提供一个用于未来数据处理的学习记忆。数值标签的一个例子是与二手车相关的销售价格（aka.ms/MLAlgorithmCS）。监督学习的目标是研究许多这样的标记示例，然后能够对未来数据点进行预测，例如，为与标记过程中使用的车辆具有相似特征的其他二手车分配准确的销售价格。它被称为监督学习，是因为数据科学家监督算法从训练数据集中学习的过程（www.aka.ms/MLAlgorithmCS）：他们知道正确答案，并在学习过程中迭代地与算法分享这些答案。监督学习有几种具体类型。其中最常见的两种是*分类*和*回归*：\n\
    \n- *分类*：分类是一种监督学习类型，用于识别新信息属于哪个类别。它可以回答简单的二选一问题，例如是或否、真或假，例如：\n    - 这条推文是积极的吗？\n\
    \    - 这位客户会续订服务吗？\n    - 两张优惠券中哪一张吸引更多客户？\n    分类也可以用于预测多个类别中的一个，在这种情况下称为多类别分类。它回答具有多个可能答案的复杂问题，例如：\n\
    \    - 这条推文的情绪是什么？\n    - 这位客户会选择哪项服务？\n    - 多项促销活动中哪一项吸引更多客户？\n- *回归*：回归是一种监督学习类型，用于通过估计变量之间的关系来预测未来。数据科学家使用它来实现以下目标：\n\
    \    - 估计产品需求\n    - 预测销售数字\n    - 分析营销回报\n\n### 无监督学习\n\n*无监督学习*是一种机器学习系统，其中输入的数据点没有与之关联的标签。在这种情况下，数据没有被预先标记，因此无监督学习算法本身可以组织数据并描述其结构。这可能意味着将其分组为簇，或者找到观察复杂数据结构的不同方式（aka.ms/MLAlgorithmCS）。\n\
    \n### 时间序列预测策略\n\n- *直接-递归混合多步预测*：直接策略和递归策略可以结合使用，以提供两种方法的优点（Brownlee 2017）。例如，可以为每个未来时间戳构建一个不同的模型，但是每个模型可以利用先前时间步的模型所做的预测作为输入值。在预测未来两小时能源消耗的情况下，可以构建两个模型，第一个模型的输出用作第二个模型的输入。\n\
    - *多输出预测*：多输出策略需要开发一个能够预测整个预测序列的模型。例如，在预测未来两小时能源消耗的情况下，我们将开发一个模型，并在一次计算中应用它来预测接下来的两个小时（Brownlee\
    \ 2017）。\n\n### 连续或非连续时间序列\n\n呈现一致时间间隔（例如，每五分钟、每两小时或每季度）的时间序列被定义为连续的（Zuo et al.\
    \ 2019）。另一方面，时间上不均匀的时间序列可以被定义为非连续的：非连续时间序列背后的原因通常是缺失或损坏的值。在跳到数据插补方法之前，了解数据缺失的原因很重要。最常见的三个原因是：\n\
    \n- *随机缺失*：随机缺失意味着数据点缺失的倾向与缺失数据无关，但与某些观测数据有关。\n- *完全随机缺失*：某个值缺失的事实与其假设值以及其他变量的值无关。\n\
    - *非随机缺失*：两个可能的原因是缺失值取决于假设值，或者缺失值取决于其他变量的值。\n\n在前两种情况下，根据缺失值的出现情况删除具有缺失值的数据是安全的，而在第三种情况下，删除具有缺失值的观测值可能会在模型中产生偏差。根据你要解决的问题类型，有不同的数据插补解决方案，很难提供通用的解决方案。\n\
    \n此外，由于其时间特性，只有一些统计方法适用于时间序列数据。我已确定了一些最常用的方法，并将其作为结构化指南列在图1.7中。\n\n![](img/fd006a6c056e5cf905b5150f958ed477_32_0.png)\n\
    \n从图1.7的图表中你可以观察到，列表删除法会删除具有一个或多个缺失值的观测值的所有数据。特别是如果缺失数据仅限于少数观测值，你可能只是选择将这些案例从分析中排除。然而，在大多数情况下，使用列表删除法是不利的。这是因为*完全随机缺失*方法的假设通常很少得到支持。因此，列表删除法会产生有偏差的参数和估计。\n\
    \n*成对删除法*分析所有存在感兴趣变量的案例，因此基于分析基础最大化所有可用数据。这种技术的一个优点是它增加了分析的效力，但它也有许多缺点。它假设缺失数据是完全随机缺失的。如果你进行成对删除，那么最终会导致不同数量的观测值贡献于模型的不同部分，这可能使解释变得困难。\n\
    \n*删除列*是另一种选择，但保留数据总是比丢弃数据更好。有时，如果数据在超过60%的观测值中缺失，你可以删除变量，但前提是该变量不显著。话虽如此，插补总是比删除变量更可取的选择。\n\
    \n### 时间序列特定的插补方法\n\n- *线性插值*：此方法适用于具有一定趋势的时间序列，但不适用于季节性数据。\n- *季节性调整和线性插值*：此方法适用于同时具有趋势和季节性的数据。\n\
    - *均值、中位数和众数*：计算整体均值、中位数或众数是一种非常基础的插补方法；它是唯一一个不利用时间序列特征或变量之间关系的经过测试的函数。它非常快，但有明显的缺点。一个缺点是均值插补会减少数据集中的方差。\n\
    \n在本章的下一节中，我们将讨论如何将时间序列塑造成监督学习问题，从而能够使用大量的线性和非线性机器学习算法。"

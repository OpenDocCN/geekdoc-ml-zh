    Historical data is structured where the independent feature is denoted as X and
    the dependent (target) variable is denoted as Y. Both X and Y are produced during
    the data preparation process. The training module consists of an algorithm that
    scans the data and learns its features and patterns. The actual algorithm is selected
    by the data scientist and should best match the type of the problem we attempt
    to solve.


    The training algorithms are usually categorized as regression (predict numeric
    outcomes), classification (predict categorical outcomes), clustering (identify
    groups), and forecasting. The training module generates the model as an object
    that can be stored for future use. During training, we can also quantify the prediction
    accuracy of the model by using validation data and measuring the prediction error.'

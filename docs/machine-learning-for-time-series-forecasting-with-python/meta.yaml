    concerning the data structure (schema) of the raw data.


    The raw data consists of rows and columns. Each measurement is represented as
    a single row of data. Each row of data includes multiple columns (also referred
    to as features or fields):


    - *Time stamp* – The time stamp field represents the actual time the measurement
    was recorded. It should comply with one of the common date/time formats. Both
    date and time parts should be included. In most cases, there is no need for the
    time to be recorded till the second level of granularity. It is important to specify
    the time zone in which the data is recorded.

    - *Load value* – This is the actual consumption at a given date/time. The consumption
    can be measured in kWh (kilowatt-hour) or any other preferred units. It is important
    to note that the measurement unit must stay consistent across all measurements
    in the data. In some cases, consumption can be supplied over three power phases.
    In that case we would need to collect all the independent consumption phases.

    - *Temperature* – The temperature is typically collected from an independent source.
    However, it should be compatible with the consumption data. It should include
    a time stamp as described above that will allow it to be synchronized with the
    actual consumption data. The temperature value can be specified in degrees Celsius
    or Fahrenheit but should stay consistent across all measurements.



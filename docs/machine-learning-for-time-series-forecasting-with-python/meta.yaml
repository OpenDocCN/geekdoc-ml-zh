  mdcn: "## 第三章 ■ 时间序列数据准备\n\n通过使用 `statsmodels` Python 模块，该模块包含一个 `tsa`（时间序列分析）包以及\
    \ `seasonal_decompose()` 函数，我们可以可视化这四个组成部分，并从时间序列数据中获得额外的洞察。\n\n`statsmodels.tsa`\
    \ 包包含有助于处理时间序列数据的模型类和功能。一些模型示例包括单变量自回归（AR）模型、向量自回归（VAR）模型和单变量自回归移动平均（ARMA）模型。非线性模型的一些示例包括马尔可夫转换动态回归和自回归。\n\
    \n`statsmodels.tsa` 包还包含时间序列的描述性统计，例如自相关、偏自相关函数和周期图。它还提供了处理自回归和移动平均滞后多项式的技术（statsmodels.org/devel/tsa.html）。\n\
    \n让我们使用 `statsmodels` 和 `seasonal_decompose()` 函数，仅针对我们的目标变量——负载变量，提取并可视化 `ts_data`\
    \ 集的组成部分。首先，让我们导入所有必要的包：\n\n```python\n# import necessary Python packages\nimport\
    \ statsmodels.api as sm\nimport warnings\nimport matplotlib\nimport matplotlib.pyplot\
    \ as plt\nimport matplotlib.dates as mdates\n\n%matplotlib inline\n\nwarnings.filterwarnings(\"\
    ignore\")\n```\n\n出于实际原因，我们将仅可视化负载数据集的一个子集：\n\n```python\nts_data_load = ts_data['load']\n\
    decomposition = sm.tsa.seasonal_decompose(\n    load['2012-07-01':'2012-12-31'],\
    \ model='additive')\n\nfig = decomposition.plot()\nmatplotlib.rcParams['figure.figsize']\
    \ = [10.0, 6.0]\n```\n\n输出将是图 3.2 所示的图表。\n\n从图 3.2 中，我们可以观察到一个更清晰的图表，它向我们展示了季节性遵循一个一致的模式，而趋势则遵循一个不规则的模式。为了进一步研究我们时间序列中的趋势，我们可以将趋势与观测到的时间序列一起绘制出来。\n\
    \n为此，我们将使用 Matplotlib 的 `.YearLocator()`，这是一个在每年指定日期（该日期是 base 的倍数）上设置刻度的函数。对于绘图，我们将每年设置为从一月（month\
    \ = 1）开始，并将月份设置为次要定位器，每三个月（intervals = 3）显示一次刻度。然后，我们使用 DataFrame 的索引作为 x 轴，负载变量作为\
    \ y 轴来绘制数据集。我们对趋势观测值执行了相同的步骤。\n\n![](img/fd006a6c056e5cf905b5150f958ed477_102_0.png)\n\

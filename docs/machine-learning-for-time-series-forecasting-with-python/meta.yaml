    Moreover, this temporal structure can carry additional information, like trends
    and seasonality, that data scientists need to deal with in order to make their
    time series easier to model with any type of classical forecasting methods. Neural
    networks can be useful for time series forecasting problems by eliminating the
    immediate need for massive feature engineering processes, data scaling procedures,
    and making the data stationary by differencing.


    In real-work time series scenarios—for example, weather forecasting, air quality
    and traffic flow forecasting, and forecasting scenarios based on streaming IoT
    devices like geo-sensors—irregular temporal structures, missing values, heavy
    noise, and complex interrelationships between multiple variables present limitations
    for classical forecasting methods.


    These techniques typically rely on clean, complete data sets in order to perform
    well; missing values, outliers, and other imperfect features are generally unsupported.
    Speaking of more artificial and perfect data sets, classical forecasting methods
    are based on the assumption that a linear relationship and a fixed temporal dependence
    exist among variables of a data set, and this assumption by default excludes the
    possibility of exploring more complex, and probably more interesting, relationships
    among variables.


    Data scientists must make subjective judgments when preparing the data for classical
    analysis—like the lag period used to remove trends—which is time consuming and
    introduces human biases to the process. On the contrary, neural networks are robust
    to noise in input data and in the mapping function and can even support learning
    and prediction in the presence of missing values. Convolutional neural networks
    (CNNs) are a category of neural networks that have proven very effective in areas
    such as image recognition and classification. CNNs have been successful in identifying
    faces, objects, and traffic signs, apart from powering vision in robots and self-driving
    cars. CNNs derive their name from the “convolution” operator (Lazzeri 2019a).


    The primary purpose of convolution in the case of CNNs is to extract features
    from the input image. Convolution preserves the spatial relationship between pixels
    by learning image features, using small squares of input data. In other words,
    the model learns how to automatically extract the features from the raw data that
    are directly useful for the problem being addressed. This is called representation
    learning, and the CNN achieves this in such a way that the features are extracted
    regardless of how they occur in the data, so-called transform or distortion invariance.
    The ability of CNNs to learn and automatically extract features from raw input
    data can be applied to time series forecasting problems.


    A sequence of observations can be treated like a one-dimensional image that a
    CNN model can read and refine into the most relevant elements. This capability
    of CNNs has been demonstrated to great effect on time series classification'

    When deploying a demand forecasting solution, we are interested in deploying an
    end-to-end solution that goes beyond the prediction web service and facilitates
    the entire data flow. At the time we invoke a new forecast, we would need to make
    sure that the model is fed with the up-to-date data features. That implies that
    the newly collected raw data is constantly ingested, processed, and transformed
    into the required feature set on which the model was built.


    At the same time, we would like to make the forecasted data available for the
    end consuming clients. These are the steps that take place as part of the energy
    demand forecast cycle:


    +   - Millions of deployed data meters are constantly generating power consumption
    data in real time.

    - This data is being collected and uploaded into a cloud repository.

    - Before being processed, the raw data is aggregated to a substation or regional
    level as defined by the business.

    - The feature processing then takes place and produces the data that is required
    for model training or scoring—the feature set data is stored in a database.

    - The retraining service is invoked to retrain the forecasting model—that updated
    version of the model is persisted so that it can be used by the scoring web service.

    - The scoring web service is invoked on a schedule that fits the required forecast
    frequency.

    - The forecasted data is stored in a database that can be accessed by the end
    consumption client.

    - The consumption client retrieves the forecasts, applies it back into the grid,
    and consumes it in accordance with the required use case.


    As illustrated in Figure 2.7, after we have built a set of models that perform
    well, we can operationalize them for other applications to consume.'
- md: '## Forecasting Solution Acceptance


    In the last stage of the time series forecasting solution development, data scientists
    need to confirm that the pipeline, the model, and their deployment in a production
    environment satisfy the customers’ and the final users’ objectives. Assuming that
    an organization has all the right ingredients, including the right employee culture,
    they still need to have the right technology platform in place to support data
    scientists’ productivity and helps them innovate and iterate rapidly. A modern
    cloud analytics environment will make it super easy to collect data, analyze,
    experiment, and quickly put things into production with a targeted set of customers.
    This sort of capability is becoming a must-have for data-driven organizations,
    large and small (Lazzeri 2019c).


    Without such a platform, data scientists will find it hard to rapidly iterate
    over many experiments, learn quickly from their failures and successes, and discover
    interesting actionable insights from data. Without the right culture, infrastructure,
    and tools, an organization will eventually find itself lagging behind nimbler
    competitors.


    There are two main tasks addressed in the customer acceptance stage:


    - *System validation* – Confirm that the deployed model and pipeline meet the
    customer’s needs.

    - *Project handoff* – Hand the project off to the entity that is going to run
    the system in production (Lazzeri 2019b).


    The customer should validate that the system meets their business needs and that
    it answers the questions with acceptable accuracy to deploy the system to production
    for use by their client’s application. All the documentation is finalized and
    reviewed. The project is handed off to the entity responsible for operations.
    This entity might be, for example, an IT or customer data-science team or an agent
    of the customer that’s responsible for running the system in production.


    The ability to successfully navigate through this documentation could very well
    determine the viability and longevity of a forecasting solution based on machine
    learning.


    To make these data science life cycles more concrete, I will now introduce a demand
    forecasting use case that will be used throughout this book for explanatory reasons
    and to showcase a few forecasting scenarios and sample codes.


    ## Use Case: Demand Forecasting


    In this final section, I introduce a real-world data science scenario that I will
    use throughout this book to showcase some of the concepts, steps, and techniques
    discussed so far: demand forecasting use case. I believe everyone must learn to
    smartly work with huge amounts of data, hence large data sets are included, open
    and free to access.


    In the past few years, Internet of Things (IoT), alternative energy sources, and
    big data have merged to create vast opportunities in the utility and energy domain.
    At the same time, the utility and the entire energy sector have seen consumption
    flattening out with consumers demanding better ways to control their use of energy.
    Hence, the utility and smart grid companies are in great need to innovate and
    renew themselves. Furthermore, many power and utility grids are becoming outdated
    and very costly to maintain and manage.


    Within the energy sector, there could be many ways in which demand forecasting
    can help solve critical business problems. In fact, demand forecasting can be
    considered the foundation for many core use cases in the industry. In general,
    we consider two types of energy demand forecasts: short term and long term. Each
    one may serve a different purpose and utilize a different approach. The main difference
    between the two is the forecasting horizon, meaning the range of time into the
    future for which we would forecast.


    Within the context of energy demand, short-term load forecasting (STLF) is defined
    as the aggregated load that is forecasted in the near future on various parts
    of the grid (or the grid as a whole). In this context, *short term* is defined
    to be a time horizon within the range of 1 hour to 24 hours. In some cases, a
    horizon of 48 hours is also possible. Therefore, STLF is very common in an operational
    use case of the grid.


    STLF models are mostly based on the near past (last day or week) consumption data
    and use forecasted temperature as an important predictor. Obtaining accurate temperature
    forecasts for the next hour and up to 24 hours is becoming less of a challenge
    nowadays. These models are less sensitive to seasonal patterns or long-term consumption
    trends.


    STLF solutions are also likely to generate a high volume of prediction calls (service
    requests) since they are being invoked on an hourly basis and in some cases even
    with higher frequency. It is also very common to see implementation, where each
    individual substation or transformer is represented as a stand-alone model and
    therefore the volume of prediction requests is even greater.


    The goal of long-term load forecasting (LTLF) is to forecast power demand with
    a time horizon ranging from one week to multiple months (and in some cases for
    a number of years). This range of horizon is mostly applicable for planning and
    investment use cases.


    For long-term scenarios, it is important to have high-quality data that covers
    a span of multiple years (minimum three years). These models will typically extract
    seasonality patterns from the historical data and make use of external predictors
    such as weather and climate patterns.


    It is important to clarify that the longer the forecasting horizon is, the less
    accurate the forecast may be. It is therefore important to produce some confidence
    intervals along with the actual forecast that would allow humans to factor the
    possible variation into their planning process.


    Since the consumption scenario for LTLF is mostly planning, we can expect much
    lower prediction volumes (as compared to STLF). We would typically see these predictions
    embedded into visualization tools such as Excel or PowerBI and be invoked manually
    by the user.


    Table 2.2 compares STLF and LTLF in respect to the most important attributes.


    ### Table 2.2: Short-term versus long-term predictions


    | ATTRIBUTE | SHORT-TERM LOAD FORECAST | LONG-TERM LOAD FORECAST |

    | :--- | :--- | :--- |

    | **Forecast horizon** | From 1 hour to 48 hours | From 1 to 6 months or more
    |

    | **Data granularity** | Hourly | Hourly or daily |

    | **Typical use cases** | Demand/supply balancing<br>Pick hour forecasting<br>Demand
    response | Long-term planning<br>Grid assets planning<br>Resource planning |

    | **Typical predictors** | Day or week<br>Hour of day<br>Hourly temperature |
    Month of year<br>Day of month<br>Long-term temperature and climate |

    | **Historical data range** | Two to three years’ worth of data | Five to 10 years’
    worth of data |

    | **Typical accuracy** | MAPE (mean absolute percentage error) of 5% or lower
    | MAPE (mean absolute percentage error) of 25% or lower |

    | **Forecast frequency** | Produced every hour or every 24 hours | Produced once
    monthly, quarterly, or yearly |


    As can be seen from Table 2.2, it is quite important to distinguish between the
    short- and the long-term forecasting scenarios as these represent different business
    needs and may have different deployment and consumption patterns.


    Any advanced analytics-based solution relies on data. Specifically, when it comes
    to predictive analytics and forecasting, we rely on ongoing, dynamic flow of data.
    In the case of energy demand forecasting, this data can be sourced directly from
    smart meters or be already aggregated on an on-premises database. We also rely
    on other external sources of data, such as weather and temperature. This ongoing
    flow of data must be orchestrated, scheduled, and stored.


    For this specific use case, we will be using the public data set “Load Forecasting
    Data” from the GEFCom2014 competition. The load forecasting track of GEFCom2014
    was about probabilistic load forecasting. The complete data was published as the
    appendix of our GEFCom2014 paper: (Hong et al. 2016).


    For the rest of this book, you can download the data set from aka.ms/EnergyDataSet.
    This data set consists of three years of hourly electricity load and'
  mdcn: '## 预测解决方案的验收


    在时间序列预测解决方案开发的最后阶段，数据科学家需要确认流程、模型及其在生产环境中的部署是否满足客户和最终用户的目标。假设一个组织具备所有正确的要素，包括合适的员工文化，他们仍然需要一个合适的技术平台来支持数据科学家的生产力，并帮助他们快速创新和迭代。一个现代化的云分析环境将使收集数据、分析、实验以及快速将成果部署给特定客户群体变得异常简单。这种能力正成为数据驱动型组织（无论规模大小）的必备条件（Lazzeri
    2019c）。


    如果没有这样的平台，数据科学家将难以快速进行大量实验的迭代，无法从失败和成功中迅速学习，也无法从数据中发现有趣且可操作的洞察。缺乏正确的文化、基础设施和工具，组织最终将发现自己落后于更灵活的竞争对手。


    在客户验收阶段，主要涉及两项任务：


    - *系统验证* – 确认已部署的模型和流程满足客户需求。

    - *项目交接* – 将项目移交给将在生产环境中运行该系统的实体（Lazzeri 2019b）。


    客户应验证系统是否满足其业务需求，以及系统是否能以可接受的准确度回答问题，以便将系统部署到生产环境中供其客户应用程序使用。所有文档都已定稿并经过审查。项目移交给负责运营的实体。该实体可能是，例如，IT部门、客户数据科学团队或负责在生产环境中运行系统的客户代理。


    成功驾驭这些文档的能力，很可能决定基于机器学习的预测解决方案的可行性和持久性。


    为了使这些数据科学生命周期更加具体，我现在将介绍一个需求预测用例，该用例将在本书中贯穿使用，用于解释说明并展示一些预测场景和示例代码。


    ## 用例：需求预测


    在本节最后，我将介绍一个真实世界的数据科学场景，我将在本书中贯穿使用它来展示目前讨论的一些概念、步骤和技术：需求预测用例。我相信每个人都必须学会如何巧妙地处理海量数据，因此本书包含了大型数据集，这些数据集是开放且可免费访问的。


    在过去的几年里，物联网、替代能源和大数据融合在一起，在公用事业和能源领域创造了巨大的机遇。与此同时，公用事业和整个能源行业看到消费趋于平稳，消费者要求更好的方式来控制其能源使用。因此，公用事业和智能电网公司迫切需要创新和自我更新。此外，许多电力和公用事业电网正在变得过时，维护和管理成本非常高昂。


    在能源领域，需求预测可以通过多种方式帮助解决关键的业务问题。事实上，需求预测可以被视为该行业许多核心用例的基础。通常，我们考虑两种类型的能源需求预测：短期和长期。每种预测可能服务于不同的目的并采用不同的方法。两者之间的主要区别在于预测的时间范围，即我们预测的未来时间跨度。


    在能源需求的背景下，短期负荷预测定义为对电网各部分（或整个电网）在不久的将来聚合负荷的预测。在此背景下，*短期*定义为1小时到24小时的时间范围。在某些情况下，48小时的时间范围也是可能的。因此，短期负荷预测在电网的运营用例中非常常见。


    短期负荷预测模型主要基于近期（过去一天或一周）的消费数据，并使用预测温度作为重要的预测因子。如今，获取未来一小时至24小时的准确温度预测已不那么具有挑战性。这些模型对季节性模式或长期消费趋势不太敏感。


    短期负荷预测解决方案也可能产生大量的预测调用（服务请求），因为它们是按小时调用的，在某些情况下甚至频率更高。同样常见的是，每个单独的变电站或变压器都表示为一个独立模型，因此预测请求的数量甚至更大。


    长期负荷预测的目标是预测时间范围从一周到数月（在某些情况下为数年）的电力需求。这个时间范围主要适用于规划和投资用例。


    对于长期场景，拥有覆盖多年（至少三年）的高质量数据非常重要。这些模型通常会从历史数据中提取季节性模式，并利用外部预测因子，如天气和气候模式。


    需要明确的是，预测时间范围越长，预测的准确性可能越低。因此，除了实际预测值外，生成一些置信区间非常重要，这将允许人们在规划过程中考虑可能的变异。



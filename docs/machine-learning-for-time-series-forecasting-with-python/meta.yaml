  md: '# Autoregressive Integrated Moving Average


    Autoregressive integrated moving average (ARIMA) models are considered a development
    of the simpler autoregressive moving average (ARMA) models and include the notion
    of integration.


    Indeed, autoregressive moving average (ARMA) and autoregressive integrated moving
    average (ARIMA) present many similar characteristics: their elements are identical,
    in the sense that both of them leverage a general autoregression AR(p) and general
    moving average model MA(q). As you previously learned, the AR(p) model makes predictions
    using previous values in the time series, while MA(q) makes predictions using
    the series mean and previous errors (Petris, Petrone, and Campagnoli 2009).


    The main differences between ARMA and ARIMA methods are the notions of integration
    and differencing. An ARMA model is a stationary model, and it works very well
    with stationary time series (whose statistical properties, such as mean, autocorrelation,
    and seasonality, do not depend on the time at which the series has been observed).


    It is possible to stationarize a time series through differencing techniques (for
    example, by subtracting a value observed at time t from a value observed at time
    t–1). The process of estimating how many nonseasonal differences are needed to
    make a time series stationarity is called integration (I) or integrated method.


    ARIMA models have three main components, denoted as p, d, q; in Python you can
    assign integer values to each of these components to indicate the specific ARIMA
    model you need to apply. These parameters are defined as follows:


    +   - $p$ stands for the number of lag variables included in the ARIMA model,
    also called the *lag order*.

    - $d$ stands for the number of times that the raw values in a time series data
    set are differenced, also called the *degree of differencing*.

    - $q$ denotes the magnitude of the moving average window, also called the *order
    of moving average*.


    In the case that one of the parameters above does not need to be used, a value
    of 0 can be assigned to that specific parameter, which indicates to not use that
    element of the model.


    Let’s now take a look at an extension of the ARIMA model in Python, called SARIMAX,
    which stands for seasonal autoregressive integrated moving average with exogenous
    factors. Data scientists usually apply SARIMAX when they have to deal with time
    series data sets that have seasonal cycles. Moreover, SARIMAX models support seasonality
    and exogenous factors and, as a consequence, they require not only the $p$, $d$,
    and $q$ arguments that ARIMA requires, but also another'
  merge: -1
  pgno: 141
- img_proc: true
  md: 'set of $p$, $d$, and $q$ arguments for the seasonality aspect as well as a
    parameter called $s$, which is the periodicity of the seasonal cycle in your time
    series data set.


    Python supports the `SARIMAX()` class with the statsmodels library (`statsmodels.org/dev/generated/statsmodels.tsa.statespace.sarimax.SARIMAX.html`),
    as summarized in Table 4.7.



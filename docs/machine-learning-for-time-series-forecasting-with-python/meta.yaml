    moving average class in statsmodels


    | CLASS NAME | `STATSMODELS.TSA.STATESPACE.SARIMAX.SARIMAX` |

    |---|---|

    | **Definition** | Class that estimates a seasonal autoregressive integrated moving
    average with exogenous regressors model. |

    | **Parameter** | `array_like` |

    | **endog** | The observed time series process $y_t$. |

    | **Parameter** | `array_like`, *optional* |

    | **exog** | Array of exogenous regressors, shaped $n\_obs \times k$. |

    | **Parameter** | `iterable` or `iterable of iterables`, *optional* |

    | **order** | The $(p,d,q)$ order of the model for the number of AR parameters,
    differences, and MA parameters. $d$ must be an integer indicating the integration
    order of the process, while $p$ and $q$ may either be integers indicating the
    AR and MA orders (so that all lags up to those orders are included) or else iterables
    giving specific AR and / or MA lags to include. Default is an AR(1) model: $(1,0,0)$.
    |



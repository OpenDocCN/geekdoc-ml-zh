    \ a closer look at these four components:\n\n+   - *Long-term movement* or *trend*\
    \ refers to the overall movement of time series values to increase or decrease\
    \ during a prolonged time interval. It is common to observe trends changing direction\
    \ throughout the course of your time series data set: they may increase, decrease,\
    \ or remain stable at different moments. However, overall you will see one primary\
    \ trend. Population counts, agricultural production, and items manufactured are\
    \ just some examples of when trends may come into play.\n- There are two different\
    \ types of *short-term movements*:\n    - *Seasonal variations* are periodic temporal\
    \ fluctuations that show the same variation and usually recur over a period of\
    \ less than a year. Seasonality is always of a fixed and known period. Most of\
    \ the time, this variation will be present in a time series if the data is recorded\
    \ hourly, daily, weekly, quarterly, or monthly. Different social conventions (such\
    \ as holidays and festivities), weather seasons, and climatic conditions play\
    \ an important role in seasonal variations, like for example the sale of umbrellas\
    \ and raincoats in the rainy season and the sale of air conditioners in summer\
    \ seasons.\n    - *Cyclic variations*, on the other side, are recurrent patterns\
    \ that exist when data exhibits rises and falls that are not of a fixed period.\
    \ One complete period is a cycle, but a cycle will not have a specific predetermined\
    \ length of time, even if the duration of these temporal fluctuations is usually\
    \ longer than a year. A classic example of cyclic variation is a business cycle,\
    \ which is the downward and upward movement of gross domestic product around its\
    \ long-term growth trend: it usually can last several years, but the duration\
    \ of the current business cycle is unknown in advance.\n\nAs illustrated in Figure\
    \ 1.5, cyclic variations and seasonal variations are part of the same short-term\
    \ movements in time series forecasting, but they present differences that data\
    \ scientists need to identify and leverage in order to build accurate forecasting\
    \ models:\n\n![](img/fd006a6c056e5cf905b5150f958ed477_25_0.png)"
  - '[PAGE 26]


    +   - *Random or irregular fluctuations* are the last element to cause variations
    in our time series data. These fluctuations are uncontrollable, unpredictable,
    and erratic, such as earthquakes, wars, flood, and any other natural disasters.


    Data scientists often refer to the first three components (long-term movements,
    seasonal short-term movements, and cyclic short-term movements) as *signals* in
    time series data because they actually are deterministic indicators that can be
    derived from the data itself. On the other hand, the last component (random or
    irregular fluctuations) is an arbitrary variation of the values in your data that
    you cannot really predict, because each data point of these random fluctuations
    is independent of the other signals above, such as long-term and short-term movements.
    For this reason, data scientists often refer to it as *noise*, because it is triggered
    by latent variables difficult to observe, as illustrated in Figure 1.6.


    ![](img/fd006a6c056e5cf905b5150f958ed477_26_0.png)


    Data scientists need to carefully identify to what extent each component is present
    in the time series data to be able to build an accurate machine learning forecasting
    solution. In order to recognize and measure these four components, it is recommended
    to first perform a decomposition process to remove the component effects from
    the data. After these components are identified and measured, and eventually utilized
    to build additional features to improve the forecast accuracy, data scientists
    can leverage different methods to recompose and add back the components on forecasted
    results.


    Understanding these four time series components and how to identify and remove
    them represents a strategic first step for building any time series forecasting
    solution because they can help with another important concept in time series that
    may help increase the predictive power of your machine learning algorithms: stationarity.
    *Stationarity* means that statistical parameters of a time'
  - '[PAGE 27]


    # Chapter 1 ■ Overview of Time Series Forecasting


    series do not change over time. In other words, basic properties of the time series
    data distribution, like the mean and variance, remain constant over time. Therefore,
    stationary time series processes are easier to analyze and model because the basic
    assumption is that their properties are not dependent on time and will be the
    same in the future as they have been in the previous historical period of time.
    Classically, you should make your time series stationary.


    There are two important forms of stationarity: *strong stationarity* and *weak
    stationarity*. A time series is defined as having a strong stationarity when all
    its statistical parameters do not change over time. A time series is defined as
    having a weak stationarity when its mean and auto-covariance functions do not
    change over time.


    Alternatively, time series that exhibit changes in the values of their data, such
    as a trend or seasonality, are clearly not stationary, and as a consequence, they
    are more difficult to predict and model. For accurate and consistent forecasted
    results to be received, the nonstationary data needs to be transformed into stationary
    data. Another important reason for trying to render a time series stationary is
    to be able to obtain meaningful sample statistics such as means, variances, and
    correlations with other variables that can be used to get more insights and better
    understand your data and can be included as additional features in your time series
    data set.


    However, there are cases where unknown nonlinear relationships cannot be determined
    by classical methods, such as autoregression, moving average, and autoregressive
    integrated moving average methods. This information can be very helpful when building
    machine learning models, and it can be used in feature engineering and feature
    selection processes. In reality, many economic time series are far from stationary
    when visualized in their original units of measurement, and even after seasonal
    adjustment they will typically still exhibit trends, cycles, and other nonstationary
    characteristics.


    Time series forecasting involves developing and using a predictive model on data
    where there is an ordered relationship between observations. Before data scientists
    get started with building their forecasting solution, it is highly recommended
    to define the following forecasting aspects:


    +   - *The inputs and outputs of your forecasting model* – For data scientists
    who are about to build a forecasting solution, it is critical to think about the
    data they have available to make the forecast and what they want to forecast about
    the future. Inputs are historical time series data provided to feed the model
    in order to make a forecast about future values. Outputs are the prediction results
    for a future time step. For example, the last seven days of energy consumption
    data collected by sensors in an electrical grid is considered input data, while
    the predicted values of energy consumption to forecast for the next day are defined
    as output data.'
- md: '## Chapter 1 ■ Overview of Time Series Forecasting


    **Granularity level of your forecasting model** – Granularity in time series forecasting
    represents the lowest detailed level of values captured for each time stamp. Granularity
    is related to the frequency at which time series values are collected: usually,
    in Internet of Things (IoT) scenarios, data scientists need to handle time series
    data that has been collected by sensors every few seconds. IoT is typically defined
    as a group of devices that are connected to the Internet, all collecting, sharing,
    and storing data. Examples of IoT devices are temperature sensors in an air-conditioning
    unit and pressure sensors installed on a remote oil pump. Sometimes aggregating
    your time series data can represent an important step in building and optimizing
    your time series model: time aggregation is the combination of all data points
    for a single resource over a specified period (for example, daily, weekly, or
    monthly). With aggregation, the data points collected during each granularity
    period are aggregated into a single statistical value, such as the average or
    the sum of all the collected data points.


    **Horizon of your forecasting model** – The horizon of your forecasting model
    is the length of time into the future for which forecasts are to be prepared.
    These generally vary from short-term forecasting horizons (less than three months)
    to long-term horizons (more than two years). Short-term forecasting is usually
    used in short-term objectives such as material requirement planning, scheduling,
    and budgeting; on the other hand, long-term forecasting is usually used to predict
    the long-term objectives covering more than five years, such as product diversification,
    sales, and advertising.


    **The endogenous and exogenous features of your forecasting model** – Endogenous
    and exogenous are economic terms to describe internal and external factors, respectively,
    affecting business production, efficiency, growth, and profitability. *Endogenous
    features* are input variables that have values that are determined by other variables
    in the system, and the output variable depends on them. For example, if data scientists
    need to build a forecasting model to predict weekly gas prices, they can consider
    including major travel holidays as endogenous variables, as prices may go up because
    the cyclical demand is up.


    On the other hand, *exogenous features* are input variables that are not influenced
    by other variables in the system and on which the output variable depends. Exogenous
    variables present some common characteristics (Glen 2014), such as these:


    - They are fixed when they enter the model.

    - They are taken as a given in the model.

    - They influence endogenous variables in the model.

    - They are not determined by the model.

    - They are not explained by the model.


    In the example above of predicting weekly gas prices, while the holiday travel
    schedule increases demand based on cyclical trends, the overall cost of gasoline
    could be affected by oil reserve prices, sociopolitical conflicts, or disasters
    such as oil tanker accidents.


    **The structured or unstructured features of your forecasting model** – Structured
    data comprises clearly defined data types whose pattern makes them easily searchable,
    while unstructured data comprises data that is usually not as easily searchable,
    including formats like audio, video, and social media postings. Structured data
    usually resides in relational databases, whose fields store length delineated
    data such as phone numbers, Social Security numbers, or ZIP codes. Even text strings
    of variable length like names are contained in records, making it a simple matter
    to search (Taylor 2018).


    Unstructured data has internal structure but is not structured via predefined
    data models or schema. It may be textual or non-textual, and human or machine
    generated. Typical human-generated unstructured data includes spreadsheets, presentations,
    email, and logs. Typical machine-generated unstructured data includes satellite
    imagery, weather data, landforms, and military movements.


    In a time series context, unstructured data doesn’t present systematic time-dependent
    patterns, while structured data shows systematic time dependent patterns, such
    as trend and seasonality.


    **The univariate or multivariate nature of your forecasting model** – A univariate
    data is characterized by a single variable. It does not deal with causes or relationships.
    Its descriptive properties can be identified in some estimates such as central
    tendency (mean, mode, median), dispersion (range, variance, maximum, minimum,
    quartile, and standard deviation), and the frequency distributions. The univariate
    data analysis is known for its limitation in the determination of relationship
    between two or more variables, correlations, comparisons, causes, explanations,
    and contingency between variables. Generally, it does not supply further information
    on the dependent and independent variables and, as such, is insufficient in any
    analysis involving more than one variable.


    To obtain results from such multiple indicator problems, data scientists usually
    use multivariate data analysis. This multivariate approach will not only help
    consider several characteristics in a model but will also bring to light the effect
    of the external variables.


    Time series forecasting can either be univariate or multivariate. The term *univariate
    time series* refers to one that consists of single observations recorded sequentially
    over equal time increments. Unlike other areas of statistics, the univariate time
    series model contains lag values of itself as independent variables (itl.nist.gov/div898/handbook/pmc/section4/pmc44.htm).
    These lag variables can play the role of independent variables as in multiple
    regression. The multivariate time series model is an extension of the univariate
    case and involves two or more input variables. It does not limit itself to its
    past information but also incorporates the past of other variables. Multivariate
    processes arise when several related time series are observed simultaneously over
    time instead of a single series being observed as in univariate case. Examples
    of the univariate time series are the ARIMA models that we will discuss in Chapter
    4, “Introduction to Some Classical Methods for Time Series Forecasting.” Considering
    this question with regard to inputs and outputs may add a further distinction.
    The number of variables may differ between the inputs and outputs; for example,
    the data may not be symmetrical. You may have multiple variables as input to the
    model and only be interested in predicting one of the variables as output. In
    this case, there is an assumption in the model that the multiple input variables
    aid and are required in predicting the single output variable.


    **Single-step or multi-step structure of your forecasting model** – Time series
    forecasting describes predicting the observation at the next time step. This is
    called a one-step forecast as only one time step is to be predicted. In contrast
    to the one-step forecast are the multiple-step or multi-step time series forecasting

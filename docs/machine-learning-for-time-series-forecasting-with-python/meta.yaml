  md: '■ Regarding time series specific methods, there are a few options:

    ■ *Linear interpolation*: This method works well for a time series with some trend
    but is not suitable for seasonal data.

    ■ *Seasonal adjustment and linear interpolation*: This method works well for data
    with both trend and seasonality.

    ■ *Mean, median, and mode*: Computing the overall mean, median, or mode is a very
    basic imputation method; it is the only tested function that takes no advantage
    of the time series characteristics or relationship between the variables. It is
    very fast but has clear disadvantages. One disadvantage is that mean imputation
    reduces variance in the data set.


    In the next section of this chapter, we will discuss how to shape time series
    as a supervised learning problem and, as a consequence, get access to a large

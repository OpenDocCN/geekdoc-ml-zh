    plt.plot_date(x=prediction_df.index, y=prediction_df, fmt='-', xdate=True, label=\"\
    predicted load\", color='yellow')\n```\n\nWhen deploying an energy demand forecasting\
    \ solution, we are interested in deploying an end-to-end solution that goes beyond\
    \ the prediction web service and facilitates the entire data flow. At the time\
    \ we invoke a new forecast, we would need to make sure that the model is fed with\
    \ the up-to-date data features. That implies that the newly collected raw data\
    \ is constantly ingested, processed, and transformed into the required feature\
    \ set on which the model was built.\n\nAt the same time, we would like to make\
    \ the forecasted data available for the end consuming clients. An example data\
    \ flow cycle (or data pipeline) is illustrated in Figure 6.7.\n\n![Figure 6.7:\
    \ Energy demand forecast end-to-end data flow](img/fd006a6c056e5cf905b5150f958ed477_214_0.png)\n\
    \n**Figure 6.7:** Energy demand forecast end-to-end data flow\n\nThese are the\
    \ steps that take place as part of the energy demand forecast cycle:\n\n1. Millions\
    \ of deployed data meters are constantly generating power consumption data in\
    \ real time.\n2. This data is being collected and uploaded onto a cloud repository\
    \ (such as Azure Storage).\n3. Before being processed, the raw data is aggregated\
    \ to a substation or regional level as defined by the business.\n4. The feature\
    \ processing then takes place and produces the data that is required for model\
    \ training or scoring—the feature set data is stored in a database (such as Azure\
    \ SQL Database).\n5. The retraining service is invoked to retrain the forecasting\
    \ model. That updated version of the model is persisted so that it can be used\
    \ by the scoring web service.\n6. The scoring web service is invoked on a schedule\
    \ that fits the required forecast frequency.\n7. The forecasted data is stored\
    \ in a database that can be accessed by the end consumption client.\n8. The consumption\
    \ client retrieves the forecasts and applies it back into the grid and consumes\
    \ it in accordance with the required use case.\n\nIt is important to note that\
    \ this entire cycle is fully automated and runs on a schedule.\n\n## Conclusion\n\
    \nIn this final chapter, we looked closely into the process of building and deploying\

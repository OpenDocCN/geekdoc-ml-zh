    Freq: H, Name: load, Length: 26304, dtype: float64

    ```


    In the next example, we fill missing temperature values with a common value of
    0 by leveraging the `scipy.stats` package. Many useful statistics functions are
    located in this sub-package `scipy.stats` (you can see a complete list of this
    functions using `info(stats)` and you can find additional information and tutorials
    at `docs.scipy.org/doc/scipy/reference/tutorial/stats.html`):


    ```

    from scipy import stats

    temp_mode = np.asscalar(stats.mode(ts_data[''temp'']).mode)

    ts_data[''temp''] = ts_data[''temp''].fillna(temp_mode)

    ts_data.isnull().sum()

    ```


    The output will be


    ```

    load    0

    temp    0

    dtype: int64

    ```


    As you can see from your results, the number of missing values has now been reduced,
    if not completely eliminated. If you still have records containing remaining missing
    values in your data set, you can remove them later after model features have been
    created. Now let''s see how we can normalize time series data in the next section.


    # Time Series Data Normalization and Standardization


    Normalization is the process of rescaling data from the original scale so that
    all values are within the range of 0 and 1, and it involves the estimation of
    the minimum and maximum available values in your data set. It can be useful, and'

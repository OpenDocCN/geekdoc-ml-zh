  - '[PAGE 39]


    time series data set that includes more than one historical variable observed
    at each time step and when the goal is to predict more than one variable in the
    future: this type of time series data set is called *multivariate time series*
    (I will discuss this concept in more detail later in this book).


    We can reframe this time series data set as a supervised learning problem with
    a window width of one. This means that we will use the prior time step values
    of Value 1 and Value 2. We will also have available the next time step value for
    Value 1. We will then predict the next time step value of Value 2. As illustrated
    in Figure 1.9, this will give us three input features and one output value to
    predict for each training pattern.


    ![](img/fd006a6c056e5cf905b5150f958ed477_39_0.png)


    **Figure 1.9:** Multivariate time series as supervised learning problem


    In the example of Figure 1.9, we were predicting two different output variables
    (Value 1 and Value 2), but very often data scientists need to predict multiple
    time steps ahead for one output variable. This is called *multi-step forecasting*.
    In multi-step forecasting, data scientists need to specify the number of time
    steps ahead to be forecasted, also called *forecast horizon* in time series. Multi-step
    forecasting usually presents two different formats:


    +   - *One-step forecast:* When data scientists need to predict the next time
    step ($t + 1$)

    - *Multi-step forecast:* When data scientists need to predict two or more ($n$)
    future time steps ($t + n$)


    For example, demand forecasting models predict the quantity of an item that will
    be sold the following week and the following two weeks given the sales up until
    the current week. In the stock market, given the stock prices up until today one
    can predict the stock prices for the next 24 hours and 48 hours. Using a weather
    forecasting engine, one can predict the weather for the next day and for the entire
    week (Brownlee 2017).'

    Another important concept to consider is partial correlation function (PACF),
    which is a conditional correlation. It is the correlation between two variables
    under the assumption that we consider the values of some other set of variables.
    In regression, this partial correlation could be found by correlating the residuals
    from two different regressions.


    In a time series data set, the autocorrelation for a value at a time stamp and
    another value at a prior time stamp consists of both the direct correlation between
    these two values and indirect correlations. These indirect correlations are a
    linear function of the correlation of the value under observation, with values
    at intervening time stamps.


    Python supports the PACF function with the plot_pacf() from the statsmodels library
    (statsmodels.org/stable/generated/statsmodels.graphics.tsaplots.plot_pacf.html).

    As you can see from your results, the number of missing values has now been reduced,
    if not completely eliminated. If you still have records containing remaining missing
    values in your data set, you can remove them later after model features have been
    created. Now let''s see how we can normalize time series data in the next section.


    # Time Series Data Normalization and Standardization


    Normalization is the process of rescaling data from the original scale so that
    all values are within the range of 0 and 1, and it involves the estimation of
    the minimum and maximum available values in your data set. It can be useful, and'
- md: "even required in some machine learning algorithms, when your time series data\
    \ has input values and features with differing measurements and dimensions.\n\n\
    For machine learning algorithms, such as k-nearest neighbors, which uses distance\
    \ estimates, linear regression and neural networks that process a weight calibration\
    \ on input values, normalization is necessary. However, it is important to keep\
    \ in mind that if your time series presents a visible trend, estimating these\
    \ expected values may be difficult and normalization may not be the best method\
    \ to use on your problem.\n\nYou can normalize your data set using the scikit-learn\
    \ object MinMaxScaler: `sklearn.preprocessing.MinMaxScaler`. This estimator transforms\
    \ each feature individually such that it is in the given range, like the range\
    \ of 0 and 1 (www.scikit-learn.org/stable/modules/generated/sklearn.preprocessing.MinMaxScaler.html).\n\
    \nThis transformation can be also inverted, as sometimes it can be useful for\
    \ data scientists to convert predictions back into their original scale for reporting\
    \ or plotting. This can be done by calling the `inverse_transform()` function.\
    \ Below is an example of normalizing the `ts_data` set: as the example shows,\
    \ the scaler requires data to be provided as a matrix of rows and columns. The\
    \ load data is loaded as a pandas DataFrame. It must then be reshaped into a matrix\
    \ of one column:\n\n```\nfrom pandas import Series\nfrom sklearn.preprocessing\
    \ import MinMaxScaler\n\n# prepare data for normalization\nvalues = load.values\n\
    values = values.reshape((len(values), 1))\n\n# train the normalization\nscaler\
    \ = MinMaxScaler(feature_range=(0, 1))\nscaler = scaler.fit(values)\nprint('Min:\
    \ %f, Max: %f' % (scaler.data_min_, scaler.data_max_))\n```\n\nThe output will\
    \ be\n\n```\nMin: 1979.000000, Max: 5224.000000\n```\n\nThe reshaped data set\
    \ is then used to fit the scaler, the data set is normalized, then the normalization\
    \ transform is inverted to show the original values again:\n\n```\n# normalize\
    \ the data set and print the first 5 rows\nnormalized = scaler.transform(values)\n\
    for i in range(5):\n    print(normalized[i])\n\n# inverse transform and print\
    \ the first 5 rows\ninversed = scaler.inverse_transform(normalized)\nfor i in\
    \ range(5):\n    print(inversed[i])\n```\n\nThe output will be\n\n```\n[0.22]\n\
    [0.18]\n[0.14]\n[0.13]\n[0.13]\n[2698.]\n[2558.]\n[2444.]\n[2402.]\n[2403.]\n\
    ```\n\nRunning the example prints the first five rows from the loaded data set,\
    \ shows the same five values in their normalized form, then the values back in\
    \ their original scale using the inverse transform capability. There is another\
    \ type of rescaling that is more robust to new values being outside the range\
    \ of expected values: standardization.\n\nStandardizing a data set involves rescaling\
    \ the distribution of values so that the mean of observed values is 0 and the\
    \ standard deviation is 1. This process implies subtracting the mean value or\
    \ centering the data. Like normalization, standardization can be useful, and even\
    \ required in some machine learning algorithms when your time series data has\
    \ input values with differing dimensions. Standardization assumes that your observations\
    \ fit a Gaussian distribution (bell curve) with a well-behaved mean and standard\
    \ deviation. This includes algorithms like support vector machines and linear\
    \ and logistic regression and other algorithms that assume or have improved performance\
    \ with Gaussian data.\n\nIn order to apply a standardization process to a data\
    \ set, data scientists need to accurately estimate the mean and standard deviation\
    \ of the values in their data. You can standardize your data set using the scikit-learn\
    \ object StandardScaler: `sklearn.preprocessing.StandardScaler`. This capability\
    \ standardizes features by removing the mean and scaling to unit variance. Centering\
    \ and scaling happen independently on each feature by computing the relevant statistics\
    \ on the samples in the training set. Mean and standard deviation are then stored\
    \ to be used on later data using `transform` (scikit-learn.org/stable/modules/generated/sklearn.preprocessing.StandardScaler.html).\n\
    \nBelow is an example of standardizing our load data set:\n\n```\n# Standardize\
    \ time series data\nfrom sklearn.preprocessing import StandardScaler\nfrom math\
    \ import sqrt\n\n# prepare data for standardization\nvalues = load.values\nvalues\
    \ = values.reshape((len(values), 1))\n\n# train the standardization\nscaler =\
    \ StandardScaler()\nscaler = scaler.fit(values)\nprint('Mean: %f, StandardDeviation:\
    \ %f' % (scaler.mean_, sqrt(scaler.var_)))\n```\n\nThe output will be\n\n```\n\
    Mean: 3303.769199, StandardDeviation: 564.568521\n```\n\n```\n# standardization\
    \ the data set and print the first 5 rows\nnormalized = scaler.transform(values)\n\
    for i in range(5):\n    print(normalized[i])\n\n# inverse transform and print\
    \ the first 5 rows\ninversed = scaler.inverse_transform(normalized)\nfor i in\
    \ range(5):\n    print(inversed[i])\n```\n\nThe output will be\n\n```\n[-1.07]\n\
    [-1.32]\n[-1.52]\n[-1.6]\n[-1.6]\n[2698.]\n[2558.]\n[2444.]\n[2402.]\n[2403.]\n\
    ```\n\nRunning the example prints the first five rows of the data set, prints\
    \ the same values standardized, then prints the values back in their original\
    \ scale.\nIn the next section, you will discover how to perform feature engineering\
    \ on time series data with Python to model your time series problem with machine\
    \ learning algorithms.\n\n## Time Series Feature Engineering\n\nAs mentioned in\
    \ Chapter 1, time series data needs to be remodeled as a supervised learning data\
    \ set before we can start using machine learning algorithms. In the field of artificial\
    \ intelligence and machine learning, supervised learning is defined as a type\
    \ of method in which data scientists need to provide both input and output data\
    \ to their machine learning algorithms.\n\nIn the next step, the supervised learning\
    \ algorithm (for example, linear regression for regression problems, random forest\
    \ for classification and regression problems, support vector machines for classification\
    \ problems) examines the training data set and produces a mathematical function,\
    \ which can be used for inferring new examples and predictions.\n\nIn time series,\
    \ data scientists have to construct the output of their model by identifying the\
    \ variable that they need to predict at a future date (e.g., future number of\
    \ sales next Monday) and then leverage historical data and feature engineering\
    \ to create input variables that will be used to make predictions for that future\
    \ date.\n\nFeature engineering efforts mainly have two goals:\n\n- *Creating the\
    \ correct input data set to feed the machine learning algorithm*: In this case,\
    \ the purpose of feature engineering in time series forecasting is to create input\
    \ features from historical and row data and shape the data set as a supervised\
    \ learning problem.\n- *Increasing the performance of machine learning models*:\
    \ The second most important goal of feature engineering is about generating valid\
    \ relationships between input features and the output feature or target variable\
    \ to be predicted. In this way, the performance of machine learning models can\
    \ be improved.\n\nWe will cover four different categories of time features that\
    \ are extremely helpful in time series scenarios:\n\n- Date time features\n- Lag\
    \ features and window features\n- Rolling window statistics\n- Expanding window\
    \ statistics\n\nIn the next few sections, we will discuss each of these time features\
    \ in more detail, and I will explain them with real-word examples in Python.\n\
    \n## Date Time Features\n\nDate Time Features are features created from the time\
    \ stamp value of each observation. A few examples of these features are the integer\
    \ hour, month, day of week for each observation. Data scientists can perform these\
    \ date time features transformations using pandas and adding new columns (hour,\
    \ month, and day of week columns) to their original data set where hour, month,\
    \ and day of week information is extracted from the time stamp value for each\
    \ observation.\n\nBelow is some sample Python code to perform this with our ts_data\
    \ set:\n\n```\nts_data['hour'] = [ts_data.index[i].hour for i in range(len(ts_data))]\n\
    ts_data['month'] = [ts_data.index[i].month for i in range(len(ts_data))]\nts_data['dayofweek']\
    \ = [ts_data.index[i].day for i in range(len(ts_data))]\nprint(ts_data.head(5))\n\
    ```\n\nRunning this example prints the first five rows of the transformed data\
    \ set:\n\n| | load | temp | hour | month | dayofweek |\n|---|---|---|---|---|---|\n\
    | 2012-01-01 00:00:00 | 2,698.00 | 32.00 | 0 | 1 | 1 |\n| 2012-01-01 01:00:00\
    \ | 2,558.00 | 32.67 | 1 | 1 | 1 |\n| 2012-01-01 02:00:00 | 2,444.00 | 30.00 |\
    \ 2 | 1 | 1 |\n| 2012-01-01 03:00:00 | 2,402.00 | 31.00 | 3 | 1 | 1 |\n| 2012-01-01\
    \ 04:00:00 | 2,403.00 | 32.00 | 4 | 1 | 1 |\n\nBy leveraging this additional knowledge,\
    \ such as hour, month, and day of week values, data scientists can gain additional\
    \ insights on their data and on the relationship between the input features and\
    \ the output feature and eventually build a better model for their time series\
    \ forecasting solutions. Here are some other examples of features that can be\
    \ built and generate additional and important information:\n\n- Weekend or not\n\
    - Minutes in a day\n- Daylight savings or not\n- Public holiday or not\n- Quarter\
    \ of the year\n- Hour of day\n- Before or after business hours\n- Season of the\
    \ year\n\nAs you can observe from the examples above, date time features are not\
    \ limited only to integer values. Data scientists can also build binary features,\
    \ such as a feature in which, if the time stamp information is before business\
    \ hours, its value equals 1; if the time stamp information is after business hours,\
    \ its value equals 0. Finally, when dealing with time series data, it is important\
    \ to remember all date and time properties that you can access from Timestamp\
    \ or DatetimeIndex. (Table 3.2 in this chapter summarizes all of them for you).\n\
    \nDate time features represent a very useful way for data scientists to start\
    \ their feature engineering work with time series data. In the next section, I\
    \ will introduce an additional approach to build input features for your data\
    \ set: lag and window features. In order to build these features, data scientists\
    \ need to leverage and extract the values of a series in previous or future periods."
  mdcn: "甚至在某些机器学习算法中也是必需的，特别是当你的时序数据具有不同度量和维度的输入值和特征时。\n\n对于使用距离估计的机器学习算法，如k近邻算法，以及对输入值进行权重校准的线性回归和神经网络，归一化是必要的。然而，重要的是要记住，如果你的时序数据呈现出明显的趋势，估计这些期望值可能会很困难，归一化可能不是解决你问题的最佳方法。\n\
    \n你可以使用scikit-learn对象MinMaxScaler来归一化你的数据集：`sklearn.preprocessing.MinMaxScaler`。这个估计器单独转换每个特征，使其处于给定的范围内，例如0和1的范围（www.scikit-learn.org/stable/modules/generated/sklearn.preprocessing.MinMaxScaler.html）。\n\
    \n这种转换也可以反转，因为有时数据科学家将预测值转换回原始尺度以进行报告或绘图是有用的。这可以通过调用`inverse_transform()`函数来完成。下面是一个归一化`ts_data`集的示例：如示例所示，缩放器要求数据以行和列的矩阵形式提供。加载的数据作为pandas\
    \ DataFrame加载。然后必须将其重塑为单列矩阵：\n\n```\nfrom pandas import Series\nfrom sklearn.preprocessing\
    \ import MinMaxScaler\n\n# prepare data for normalization\nvalues = load.values\n\
    values = values.reshape((len(values), 1))\n\n# train the normalization\nscaler\
    \ = MinMaxScaler(feature_range=(0, 1))\nscaler = scaler.fit(values)\nprint('Min:\
    \ %f, Max: %f' % (scaler.data_min_, scaler.data_max_))\n```\n\n输出将是\n\n```\nMin:\
    \ 1979.000000, Max: 5224.000000\n```\n\n然后使用重塑后的数据集来拟合缩放器，数据集被归一化，然后反转归一化转换以再次显示原始值：\n\
    \n```\n# normalize the data set and print the first 5 rows\nnormalized = scaler.transform(values)\n\
    for i in range(5):\n    print(normalized[i])\n\n# inverse transform and print\
    \ the first 5 rows\ninversed = scaler.inverse_transform(normalized)\nfor i in\
    \ range(5):\n    print(inversed[i])\n```\n\n输出将是\n\n```\n[0.22]\n[0.18]\n[0.14]\n\
    [0.13]\n[0.13]\n[2698.]\n[2558.]\n[2444.]\n[2402.]\n[2403.]\n```\n\n运行该示例会打印加载数据集的前五行，显示相同的五个值的归一化形式，然后使用反转转换功能将值恢复到原始尺度。还有另一种类型的重新缩放，它对超出预期值范围的新值更具鲁棒性：标准化。\n\
    \n标准化数据集涉及重新缩放值的分布，使得观测值的均值为0，标准差为1。这个过程意味着减去均值或使数据居中。与归一化一样，标准化在你的时序数据具有不同维度的输入值时，在某些机器学习算法中是有用的，甚至是必需的。标准化假设你的观测值符合具有良好均值和标准差的高斯分布（钟形曲线）。这包括支持向量机、线性和逻辑回归等算法，以及其他假设或在高斯数据下性能更好的算法。\n\
    \n为了对数据集应用标准化过程，数据科学家需要准确估计其数据中值的均值和标准差。你可以使用scikit-learn对象StandardScaler来标准化你的数据集：`sklearn.preprocessing.StandardScaler`。此功能通过移除均值并缩放到单位方差来标准化特征。通过计算训练集样本的相关统计信息，对每个特征独立进行居中和缩放。然后存储均值和标准差，以便使用`transform`在后续数据上使用（scikit-learn.org/stable/modules/generated/sklearn.preprocessing.StandardScaler.html）。\n\
    \n下面是一个标准化我们的负载数据集的示例：\n\n```\n# Standardize time series data\nfrom sklearn.preprocessing\
    \ import StandardScaler\nfrom math import sqrt\n\n# prepare data for standardization\n\
    values = load.values\nvalues = values.reshape((len(values), 1))\n\n# train the\
    \ standardization\nscaler = StandardScaler()\nscaler = scaler.fit(values)\nprint('Mean:\
    \ %f, StandardDeviation: %f' % (scaler.mean_, sqrt(scaler.var_)))\n```\n\n输出将是\n\
    \n```\nMean: 3303.769199, StandardDeviation: 564.568521\n```\n\n```\n# standardization\
    \ the data set and print the first 5 rows\nnormalized = scaler.transform(values)\n\
    for i in range(5):\n    print(normalized[i])\n\n# inverse transform and print\
    \ the first 5 rows\ninversed = scaler.inverse_transform(normalized)\nfor i in\
    \ range(5):\n    print(inversed[i])\n```\n\n输出将是\n\n```\n[-1.07]\n[-1.32]\n[-1.52]\n\
    [-1.6]\n[-1.6]\n[2698.]\n[2558.]\n[2444.]\n[2402.]\n[2403.]\n```\n\n运行该示例会打印数据集的前五行，打印相同值的标准化形式，然后打印恢复到原始尺度的值。\n\
    在下一节中，你将学习如何使用Python对时序数据进行特征工程，以使用机器学习算法建模你的时序问题。\n\n## 时序特征工程\n\n如第1章所述，在我们开始使用机器学习算法之前，时序数据需要重新建模为监督学习数据集。在人工智能和机器学习领域，监督学习被定义为一种方法，数据科学家需要向其机器学习算法提供输入和输出数据。\n\
    \n在下一步中，监督学习算法（例如，用于回归问题的线性回归，用于分类和回归问题的随机森林，用于分类问题的支持向量机）检查训练数据集并产生一个数学函数，该函数可用于推断新示例和预测。\n\
    \n在时序中，数据科学家必须通过识别他们需要在未来日期预测的变量（例如，下周一的未来销售数量）来构建模型的输出，然后利用历史数据和特征工程来创建输入变量，这些变量将用于对该未来日期进行预测。\n\
    \n特征工程工作主要有两个目标：\n\n- *创建正确的输入数据集以馈送机器学习算法*：在这种情况下，时序预测中特征工程的目的是从历史和原始数据中创建输入特征，并将数据集塑造成监督学习问题。\n\
    - *提高机器学习模型的性能*：特征工程的第二个最重要目标是生成输入特征与输出特征或要预测的目标变量之间的有效关系。通过这种方式，可以提高机器学习模型的性能。\n\
    \n我们将涵盖四类不同的时间特征，它们在时序场景中非常有用：\n\n- 日期时间特征\n- 滞后特征和窗口特征\n- 滚动窗口统计\n- 扩展窗口统计\n\n\
    在接下来的几节中，我们将更详细地讨论每一种时间特征，我将用Python中的实际例子来解释它们。\n\n## 日期时间特征\n\n日期时间特征是从每个观测值的时间戳值创建的特征。这些特征的一些例子是每个观测值的整数小时、月份、星期几。数据科学家可以使用pandas执行这些日期时间特征转换，并向其原始数据集添加新列（小时、月份和星期几列），其中小时、月份和星期几信息是从每个观测值的时间戳值中提取的。\n\
    \n下面是一些使用我们的ts_data集执行此操作的示例Python代码：\n\n```\nts_data['hour'] = [ts_data.index[i].hour\
    \ for i in range(len(ts_data))]\nts_data['month'] = [ts_data.index[i].month for\
    \ i in range(len(ts_data))]\nts_data['dayofweek'] = [ts_data.index[i].day for\
    \ i in range(len(ts_data))]\nprint(ts_data.head(5))\n```\n\n运行此示例会打印转换后数据集的前五行：\n\
    \n| | load | temp | hour | month | dayofweek |\n|---|---|---|---|---|---|\n| 2012-01-01\
    \ 00:00:00 | 2,698.00 | 32.00 | 0 | 1 | 1 |\n| 2012-01-01 01:00:00 | 2,558.00\
    \ | 32.67 | 1 | 1 | 1 |\n| 2012-01-01 02:00:00 | 2,444.00 | 30.00 | 2 | 1 | 1\
    \ |\n| 2012-01-01 03:00:00 | 2,402.00 | 31.00 | 3 | 1 | 1 |\n| 2012-01-01 04:00:00\
    \ | 2,403.00 | 32.00 | 4 | 1 | 1 |\n\n通过利用这些额外的知识，如小时、月份和星期几的值，数据科学家可以对他们的数据以及输入特征和输出特征之间的关系获得额外的见解，并最终为他们的时序预测解决方案构建更好的模型。以下是一些可以构建并生成额外重要信息的其他特征示例：\n\
    \n- 是否周末\n- 一天中的分钟数\n- 是否夏令时\n- 是否公共假期\n- 一年中的季度\n- 一天中的小时\n- 营业时间之前或之后\n- 一年中的季节\n\
    \n从上面的例子可以看出，日期时间特征不仅限于整数值。数据科学家还可以构建二进制特征，例如一个特征，如果时间戳信息在营业时间之前，其值等于1；如果时间戳信息在营业时间之后，其值等于0。最后，在处理时序数据时，重要的是要记住所有可以从Timestamp或DatetimeIndex访问的日期和时间属性。（本章中的表3.2为你总结了所有这些属性）。\n\
    \n日期时间特征是数据科学家开始使用时序数据进行特征工程工作的一种非常有用的方式。在下一节中，我将介绍另一种为你的数据集构建输入特征的方法：滞后和窗口特征。为了构建这些特征，数据科学家需要利用和提取序列在之前或未来时期的值。"

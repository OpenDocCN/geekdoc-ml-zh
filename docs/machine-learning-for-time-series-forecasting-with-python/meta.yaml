    在时间序列预测中，数据科学家的假设是，没有因果关系影响我们试图预测的变量。相反，他们分析时间序列数据集的历史值，以理解和预测其未来值。用于生成时间序列预测模型的方法可能涉及使用简单的确定性模型，例如线性外推，或使用更复杂的深度学习方法。



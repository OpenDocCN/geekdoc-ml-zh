  - '[PAGE 65]


    # Chapter 2 ■ How to Design an End-to-End Time Series Forecasting Solution


    Deep learning neural networks have three main intrinsic capabilities:


    +   - They can learn from arbitrary mappings from inputs to outputs.

    - They support multiple inputs and outputs.

    - They can automatically extract patterns in input data that spans over long sequences.


    Thanks to these three characteristics, they can offer a lot of help when data
    scientists deal with more complex but still very common problems, such as time
    series forecasting. After having experimented with different time series forecasting
    models, you need to select the best model based on your data and specific time
    series scenario. Model selection is an integral part of the model development
    process, in the next section we will discuss how model evaluation can help you
    find the best model that represents your data and understand how well the chosen
    model will work in the future (Lazzeri 2019b).


    # Model Evaluation


    Model evaluation has a critical role within the modeling step. At this step we
    look into validating the model and its performance with real-life data. During
    the modeling step, we use a part of the available data for training the model.
    During the evaluation phase, we take the remainder of the data to test the model.
    Practically it means that we are feeding the model new data that has been restructured
    and contains the same features as the training data set.


    However, during the validation process, we use the model to predict the target
    variable rather than provide the available target variable. We often refer to
    this process as model scoring. We would then use the true target values and compare
    them with the predicted ones. The goal here is to measure and minimize the prediction
    error, meaning the difference between the predictions and the true value.


    Quantifying the error measurement is key since we would like to fine-tune the
    model and validate whether the error is actually decreasing. Fine-tuning the model
    can be done by modifying model parameters that control the learning process or
    by adding or removing data features (referred to as parameters sweep). Practically
    that means that we may need to iterate between the feature engineering, modeling,
    and model evaluation phases multiple times until we are able to reduce the error
    to the required level.


    It is important to emphasize that the prediction error will never be zero as there
    is never a model that can perfectly predict every outcome. However, there is a
    certain magnitude of error that is acceptable by the business. During the validation
    process, we would like to ensure that our model prediction error is at or better
    than the business tolerance level. It is therefore important to set the level
    of the tolerable error at the beginning of the cycle during the problem formulation
    phase.'
  - '[PAGE 66]


    There are various ways in which prediction error can be measured and quantified.
    Specifically, there is an evaluation technique relevant to time series and in
    specific for demand forecast: the MAPE. MAPE stands for mean absolute percentage
    error. With MAPE we are computing the difference between each forecasted point
    and the actual value of that point. We then quantify the error per point by calculating
    the proportion of the difference relative to the actual value. At the last step
    we average these values. The mathematical formula used for MAPE is as follows:


    $$MAPE = \left( \frac{1}{n} \sum \frac{|Actual\ Values - Forecasted\ Values|}{|Actual\
    Values|} \right) \times 100$$


    The MAPE is scale sensitive and should not be used when working with low-volume
    data. Notice that because *Actual Values* also represents the denominator of the
    equation, the MAPE is undefined when actual demand is zero. Furthermore, when
    the actual value is not zero, but quite small, the MAPE will often take on extreme
    values. This scale sensitivity renders the MAPE close to worthless as an error
    measure for low-volume data.

    There are a few other evaluation techniques that are important to mention here:


    +   - *The mean absolute deviation (MAD)* – This formula measures the size of
    the error in units. The MAD is a good statistic to use when analyzing the error
    for a single item. However, if you aggregate MADs over multiple items, you need
    to be careful about high-volume products dominating the results—more on this later.
    The MAPE and the MAD are by far the most commonly used error measurement statistics.
    There are a slew of alternative statistics in the forecasting literature, many
    of which are variations on the MAPE and the MAD (Stellwagen 2011).

    - *The mean absolute deviation (MAD)/mean ratio* – This is an alternative to the
    MAPE that is better suited to intermittent and low-volume data. As stated previously,
    percentage errors cannot be calculated when the actual equals zero, and they can
    take on extreme values when dealing with low-volume data. These issues become
    magnified when you start to average MAPEs over multiple time series. The MAD/mean
    ratio tries to overcome this problem by dividing the MAD by the mean—essentially
    rescaling the error to make it comparable across time series of varying scales.
    The statistic is calculated exactly as the name suggests—it is simply the MAD
    divided by the mean (Stellwagen 2011).

    - *The Geometric Mean Relative Absolute Error (GMRAE)* – This metric is used to
    measure out-of-sample forecast performance. It is calculated using the relative
    error between the naïve model (i.e., next period’s forecast is this'
  - '[PAGE 67]


    period’s actual) and the currently selected model. A GMRAE of 0.54 indicates that
    the size of the current model’s error is only 54 percent of the size of the error
    generated using the naïve model for the same data set. Because the GMRAE is based
    on a relative error, it is less scale sensitive than the MAPE and the MAD (Stellwagen
    2011).


    +   - *The symmetric mean absolute percentage error (SMAPE)* – This is a variation
    on the MAPE that is calculated using the average of the absolute value of the
    actual and the absolute value of the forecast in the denominator. This statistic
    is preferred to the MAPE by some and was used as an accuracy measure in several
    forecasting competitions (Stellwagen 2011).


    After selecting the best model for their forecasting solution, data scientists
    usually need to deploy it. In the next section we will take a closer look at the
    deployment process, that is, the method by which you integrate a machine learning
    model into an existing production environment in order to start using it to make
    practical business decisions based on data. It is one of the last stages in the
    machine learning life cycle.


    # Model Deployment


    Model deployment is the method by which you integrate a machine learning model
    into an existing production environment in order to start using it to make practical
    business decisions based on data. It is one of the last stages in the machine
    learning life cycle and can be one of the most cumbersome. Often, an organization’s
    IT systems are incompatible with traditional model-building languages, forcing
    data scientists and programmers to spend valuable time and brainpower rewriting
    them (Lazzeri 2019c).


    Once we have nailed down the modeling phase and validated the model performance,
    we are ready to go into the deployment phase. In this context, deployment means
    enabling the customer to consume the model by running actual predictions on it
    at large scale.


    Machine learning model deployment is the process by which a machine learning algorithm
    is converted into a web service. We refer to this conversion process as operationalization:
    to operationalize a machine learning model means to transform it into a consumable
    service and embed it into an existing production environment (Lazzeri 2019c).


    Model deployment is a fundamental step of the machine learning model workflow
    (Figure 2.6) because, through machine learning model deployment, companies can
    begin to take full advantage of the predictive and intelligent models they build,
    develop business practices based on their model results, and therefore, transform
    themselves into actual data-driven businesses.'
- md: '## Chapter 2 ■ How to Design an End-to-End Time Series Forecasting Solution


    When we think about machine learning, we focus our attention on key components
    of the machine learning workflow, such as data sources and ingestion, data pipelines,
    machine learning model training and testing, how to engineer new features, and
    which variables to use to make the models more accurate. All these steps are important;
    however, thinking about how we are going to consume those models and data over
    time is also a critical step in every machine learning pipeline. We can only begin
    extracting real value and business benefits from a model’s predictions when it
    has been deployed and operationalized (Lazzeri 2019c).


    Successful model deployment is fundamental for data-driven enterprises for the
    following key reasons:


    - Deployment of machine learning models means making models available to external
    customers and/or other teams and stakeholders in your company.

    - By deploying models, other teams in your company can use them, send data to
    them, and get their predictions, which are in turn populated back into the company
    systems to increase training data quality and quantity.

    - Once this process is initiated, companies will start building and deploying
    higher numbers of machine learning models in production and master robust and
    repeatable ways to move models from development environments into business operations
    systems.


    Many companies see machine-enablement effort as a technical practice. However,
    it is more of a business-driven initiative that starts within the company; in
    order to become a data-driven company, it is important that the people, who today
    successfully operate and understand the business, collaborate closely with those
    teams that are responsible for the machine learning deployment workflow (Lazzeri
    2019c).


    Right from the first day of a machine learning solution creation, data science
    teams should interact with business counterparts. It is very essential to maintain
    constant interaction to understand the model *experimentation* process parallel
    to the model *deployment* and *consumption* steps. Most organizations struggle
    to unlock machine learning’s potential to optimize their operational processes
    and get data scientists, analysts, and business teams speaking the same language.


    Moreover, machine learning models must be trained on historical data, which demands
    the creation of a prediction data pipeline, an activity requiring multiple tasks
    including data processing, feature engineering, and tuning. Each task, down to
    versions of libraries and handling of missing values, must be exactly duplicated
    from the development to the production environment. Sometimes, differences in
    technology used in development and in production contribute to difficulties in
    deploying machine learning models.


    Companies can use machine learning pipelines to create and manage workflows that
    stitch together machine learning phases. For example, a pipeline might include
    data preparation, model training, model deployment, and inference/scoring phases.
    Each phase can encompass multiple steps, each of which can run unattended in various
    compute targets. Pipeline steps are reusable and can be run without rerunning
    subsequent steps if the output of that step has not changed. Pipelines also allow
    data scientists to collaborate while working on separate areas of a machine learning
    workflow (Lazzeri 2019c).


    Building, training, testing, and finally, deploying machine learning models is
    often a tedious and slow process for companies that are looking at transforming
    their operations with machine learning. Moreover, even after months of development,
    which delivers a machine learning model based on a single algorithm, the management
    team has little means of knowing whether their data scientists have created a
    great model and how to scale and operationalize it.


    Next, I share a few guidelines on how a company can select the right tools to
    succeed with model deployment. I will illustrate this workflow using the Azure
    Machine Learning service, but it can be also used with any machine learning product
    of your choice.


    The model deployment workflow should be based on the following three simple steps
    (Lazzeri 2019c):


    - Register the model – A registered model is a logical container for one or more
    files that make up your model. For example, if you have a model that is stored
    in multiple files, you can register them as a single model in the workspace. After
    registration, you can then download or deploy the registered model and receive
    all the files that were registered. Machine learning models are registered when
    you create an Azure Machine Learning workspace. The model can come from Azure
    Machine Learning or from somewhere else.

    - Prepare to deploy (specify assets, usage, compute target) – To deploy a model
    as a web service, you must create an inference configuration (`inference config`)
    and a deployment configuration. Inference, or model scoring, is the phase where
    the deployed model is used for prediction, most commonly on production data. In
    the inference config, you specify the scripts and dependencies needed to serve
    your model. In the deployment config, you specify details of how to serve the
    model on the compute target.


    The entry script receives data submitted to a deployed web service and passes
    it to the model. It then takes the response returned by the model and returns
    that to the client. The script is specific to your model; it must understand the
    data that the model expects and returns (Lazzeri 2019c). The script contains two
    functions that load and run the model:


    - `init()` – Typically, this function loads the model into a global object. This
    function is run only once when the Docker container for your web service is started.

    - `run(input_data)` – This function uses the model to predict a value based on
    the input data. Inputs and outputs to the run typically use JSON for serialization
    and de-serialization. You can also work with raw binary data. You can transform
    the data before sending it to the model or before returning it to the client.


    When you register a model, you provide a model name used for managing the model
    in the Azure Registry. You use this name with the `Model.get_model_path()` to
    retrieve the path of the model file(s) on the local file system. If you register
    a folder or a collection of files, this API returns the path to the directory
    that contains those files.


    - Deploy the model to the compute target – Finally, before deploying, you must
    define the deployment configuration. The deployment configuration is specific
    to the compute target that will host the web service. For example, when deploying
    locally, you must specify the port where the service accepts requests. Table 2.1
    lists the compute targets, or compute resources, that can be used to host your
    web service deployment.


    **Table 2.1:** Examples of compute targets that can be used to host your web service
    deployment


    | COMPUTE TARGET | USAGE | DESCRIPTION |

    | :--- | :--- | :--- |

    | Local web service | Testing/debug | Good for limited testing and troubleshooting.
    Hardware acceleration depends on using libraries in the local system. |

    | Notebook VM web service | Testing/debug | Good for limited testing and troubleshooting.
    |

    | Azure Kubernetes Service (AKS) | Real-time inference | Good for high-scale production
    deployments. Provides fast response time and autoscaling of the deployed service.
    Cluster autoscaling is not supported through the Azure Machine Learning SDK. To
    change the nodes in the AKS cluster, use the UI for your AKS cluster in the Azure
    portal. |

    | Azure Container Instances (ACI) | Testing or dev | Good for low-scale, CPU-based
    workloads requiring <48 GB RAM. |

    | Azure Machine Learning Compute | Batch inference | Run batch scoring on serverless
    compute. Supports normal- and low-priority VMs. |

    | Azure IoT Edge | IoT module | Deploy and serve ML models on IoT devices. |

    | Azure Data Box Edge | via IoT Edge | Deploy and serve ML models on IoT devices.
    |


    When deploying a demand forecasting solution, we are interested in deploying an
    end-to-end solution that goes beyond the prediction web service and facilitates
    the entire data flow. At the time we invoke a new forecast, we would need to make
    sure that the model is fed with the up-to-date data features. That implies that
    the newly collected raw data is constantly ingested, processed, and transformed
    into the required feature set on which the model was built.


    At the same time, we would like to make the forecasted data available for the
    end consuming clients. These are the steps that take place as part of the energy
    demand forecast cycle:


    - Millions of deployed data meters are constantly generating power consumption
    data in real time.

    - This data is being collected and uploaded into a cloud repository.

    - Before being processed, the raw data is aggregated to a substation or regional
    level as defined by the business.

    - The feature processing then takes place and produces the data that is required
    for model training or scoring—the feature set data is stored in a database.

    - The retraining service is invoked to retrain the forecasting model—that updated
    version of the model is persisted so that it can be used by the scoring web service.

    - The scoring web service is invoked on a schedule that fits the required forecast
    frequency.

    - The forecasted data is stored in a database that can be accessed by the end
    consumption client.

    - The consumption client retrieves the forecasts, applies it back into the grid,
    and consumes it in accordance with the required use case.


    As illustrated in Figure 2.7, after we have built a set of models that perform
    well, we can operationalize them for other applications to consume.'
  mdcn: '## 第2章 ■ 如何设计端到端时间序列预测解决方案


    当我们思考机器学习时，注意力会集中在机器学习工作流的关键组件上，例如数据源与摄取、数据管道、机器学习模型训练与测试、如何进行特征工程以及使用哪些变量来提高模型准确性。所有这些步骤都很重要；然而，思考如何随时间推移使用这些模型和数据，同样是每个机器学习管道中的关键步骤。只有当模型被部署并投入运营后，我们才能开始从模型的预测中提取真正的价值和业务效益（Lazzeri
    2019c）。


    成功的模型部署对于数据驱动型企业至关重要，原因如下：


    - 部署机器学习模型意味着将模型提供给外部客户和/或公司内部的其他团队和利益相关者使用。

    - 通过部署模型，公司内部的其他团队可以使用它们、向其发送数据并获取预测结果，这些结果反过来又被填充回公司系统，以提高训练数据的质量和数量。

    - 一旦这个过程启动，公司将在生产环境中构建和部署更多的机器学习模型，并掌握将模型从开发环境迁移到业务运营系统的稳健且可重复的方法。


    许多公司将机器赋能工作视为一种技术实践。然而，它更像是一项由业务驱动、始于公司内部的倡议；为了成为数据驱动型公司，至关重要的是，那些目前成功运营和理解业务的人员，需要与负责机器学习部署工作流的团队紧密合作（Lazzeri
    2019c）。


    从机器学习解决方案创建的第一天起，数据科学团队就应与业务对口人员进行互动。保持持续互动以理解模型*实验*过程，同时兼顾模型*部署*和*使用*步骤，这一点至关重要。大多数组织都在努力释放机器学习的潜力来优化其运营流程，并让数据科学家、分析师和业务团队使用同一种语言沟通。


    此外，机器学习模型必须在历史数据上进行训练，这要求创建一个预测数据管道，这项活动涉及多项任务，包括数据处理、特征工程和调优。每一项任务，甚至到库的版本和缺失值的处理，都必须从开发环境精确复制到生产环境。有时，开发和生产中使用的技术差异会导致机器学习模型部署困难。


    公司可以使用机器学习管道来创建和管理工作流，将机器学习各个阶段串联起来。例如，一个管道可能包括数据准备、模型训练、模型部署和推理/评分阶段。每个阶段可以包含多个步骤，每个步骤都可以在不同的计算目标上无人值守地运行。管道步骤是可重用的，如果该步骤的输出没有改变，则无需重新运行后续步骤即可再次运行。管道还允许数据科学家在机器学习工作流的不同领域协作（Lazzeri
    2019c）。


    对于希望通过机器学习转型运营的公司来说，构建、训练、测试并最终部署机器学习模型通常是一个繁琐而缓慢的过程。此外，即使经过数月的开发，交付了一个基于单一算法的机器学习模型，管理团队也几乎没有手段知道他们的数据科学家是否创建了一个优秀的模型，以及如何将其扩展和投入运营。


    接下来，我将分享一些关于公司如何选择正确工具以成功进行模型部署的指导原则。我将使用 Azure 机器学习服务来说明这个工作流，但它也可以用于您选择的任何机器学习产品。


    模型部署工作流应基于以下三个简单步骤（Lazzeri 2019c）：


    - 注册模型 – 注册的模型是构成您模型的一个或多个文件的逻辑容器。例如，如果您的模型存储在多个文件中，您可以将它们作为单个模型注册到工作区中。注册后，您可以下载或部署注册的模型，并接收所有已注册的文件。当您创建
    Azure 机器学习工作区时，机器学习模型会被注册。该模型可以来自 Azure 机器学习，也可以来自其他地方。

    - 准备部署（指定资产、用途、计算目标） – 要将模型部署为 Web 服务，您必须创建推理配置（`inference config`）和部署配置。推理或模型评分是部署的模型用于预测的阶段，最常见的是在生产数据上进行。在推理配置中，您指定提供模型服务所需的脚本和依赖项。在部署配置中，您指定如何在计算目标上提供模型服务的详细信息。


    入口脚本接收提交给已部署 Web 服务的数据并将其传递给模型。然后，它获取模型返回的响应并将其返回给客户端。该脚本特定于您的模型；它必须理解模型期望和返回的数据（Lazzeri
    2019c）。该脚本包含两个用于加载和运行模型的函数：


    - `init()` – 通常，此函数将模型加载到全局对象中。此函数仅在 Web 服务的 Docker 容器启动时运行一次。

    - `run(input_data)` – 此函数使用模型根据输入数据预测值。运行的输入和输出通常使用 JSON 进行序列化和反序列化。您也可以处理原始二进制数据。您可以在将数据发送给模型之前或返回给客户端之前对其进行转换。


    当您注册模型时，您提供一个模型名称，用于在 Azure 注册表中管理模型。您使用此名称与 `Model.get_model_path()` 一起检索本地文件系统上模型文件的路径。如果您注册的是一个文件夹或一组文件，此
    API 将返回包含这些文件的目录路径。


    - 将模型部署到计算目标 – 最后，在部署之前，您必须定义部署配置。部署配置特定于将托管 Web 服务的计算目标。例如，在本地部署时，您必须指定服务接受请求的端口。表
    2.1 列出了可用于托管 Web 服务部署的计算目标或计算资源。


    **表 2.1：** 可用于托管 Web 服务部署的计算目标示例


    | 计算目标 | 用途 | 描述 |

    | :--- | :--- | :--- |

    | 本地 Web 服务 | 测试/调试 | 适用于有限的测试和故障排除。硬件加速取决于使用本地系统中的库。 |

    | Notebook VM Web 服务 | 测试/调试 | 适用于有限的测试和故障排除。 |

    | Azure Kubernetes 服务 (AKS) | 实时推理 | 适用于大规模生产部署。提供快速响应时间和部署服务的自动缩放。Azure 机器学习
    SDK 不支持集群自动缩放。要更改 AKS 集群中的节点，请使用 Azure 门户中 AKS 集群的 UI。 |

    | Azure 容器实例 (ACI) | 测试或开发 | 适用于需要 <48 GB RAM 的低规模、基于 CPU 的工作负载。 |

    | Azure 机器学习计算 | 批量推理 | 在无服务器计算上运行批量评分。支持普通和低优先级虚拟机。 |

    | Azure IoT Edge | IoT 模块 | 在 IoT 设备上部署和服务 ML 模型。 |

    | Azure Data Box Edge | 通过 IoT Edge | 在 IoT 设备上部署和服务 ML 模块。 |


    在部署需求预测解决方案时，我们感兴趣的是部署一个超越预测 Web 服务、促进整个数据流的端到端解决方案。当我们调用新的预测时，我们需要确保模型接收最新的数据特征。这意味着新收集的原始数据需要不断被摄取、处理并转换为模型构建所依据的所需特征集。


    同时，我们希望将预测数据提供给最终消费客户。以下是能源需求预测周期中发生的步骤：


    - 数百万个部署的数据仪表不断实时生成功耗数据。

    - 这些数据被收集并上传到云存储库。

    - 在处理之前，原始数据按照业务定义聚合到变电站或区域级别。

    - 然后进行特征处理，生成模型训练或评分所需的数据——特征集数据存储在数据库中。

    - 调用重新训练服务来重新训练预测模型——更新后的模型版本被持久化，以便评分 Web 服务可以使用。

    - 按照适合所需预测频率的时间表调用评分 Web 服务。

    - 预测数据存储在数据库中，最终消费客户端可以访问。

    - 消费客户端检索预测结果，将其应用回电网，并根据所需的用例进行消费。


    如图 2.7 所示，在我们构建了一组性能良好的模型之后，我们可以将其投入运营，供其他应用程序使用。'

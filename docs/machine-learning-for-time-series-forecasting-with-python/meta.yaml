    AutoReg supports the same covariance estimators as Ordinary Least-Squares (OLS)
    models. In the example below, we use `cov_type="HC0"`, which is White''s covariance
    estimator. The White test is used to detect heteroskedastic errors in regression
    analysis: the null hypothesis for White''s test is that the variances for the
    errors are equal. While the parameter estimates are the same, all of the quantities
    that depend on the standard error change (White 1980).

    In the following example, I show how to apply covariance estimators `cov_type="HC0"`
    and output a summary of the results:


    ```

    # Apply covariance estimators cov_type="HC0" and output the summary

    res = model.fit(cov_type="HC0")

    res.summary()


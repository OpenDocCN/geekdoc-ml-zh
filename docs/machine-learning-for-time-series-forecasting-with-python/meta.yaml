  md: "In this chapter, we discuss some of the practical reasons data scientists may\
    \ still think about deep learning when they build time series forecasting solutions.\
    \ Specifically, we will take a closer look at the following important topics:\n\
    \n+   - *Reasons to Add Deep Learning to Your Time Series Toolkit* – Deep learning\
    \ neural networks are able to automatically learn arbitrary complex mappings from\
    \ inputs to outputs and support multiple inputs and outputs. These are powerful\
    \ features that offer a lot of promise for time series forecasting, particularly\
    \ on problems with complex-nonlinear dependencies, multivalent inputs, and multi-step\
    \ forecasting. These features, along with the capabilities of more modern neural\
    \ networks, may offer great promise, such as the automatic feature learning provided\
    \ by convolutional neural networks and the native support for sequence data in\
    \ recurrent neural networks. In this section, you will discover the promised capabilities\
    \ of deep learning neural networks for time series forecasting. Specifically,\
    \ we will discuss the following deep learning methods’ capabilities:\n    - Deep\
    \ learning neural networks are capable of automatically learning and extracting\
    \ features from raw and imperfect data.\n    - Deep learning supports multiple\
    \ inputs and outputs\n    - Recurrent neural networks—specifically long short-term\
    \ memory (LSTM) networks—are good at extracting patterns in input data that span\
    \ over relatively long sequences.\n- *Recurrent Neural Networks for Time Series\
    \ Forecasting* – In this section I will introduce a very popular type of artificial\
    \ neural networks: recurrent neural networks, also known as RNNs. Recurrent neural\
    \ networks are a class of neural networks that allow previous outputs to be used\
    \ as inputs while having hidden states.\n- *How to Develop GRUs and LSTMs for\
    \ Time Series Forecasting* – In this final section of Chapter 5, you will learn\
    \ how to prepare your data for deep learning models and develop GRU models for\
    \ a range of time series forecasting problems.\n\n# Reasons to Add Deep Learning\
    \ to Your Time Series Toolkit\n\nThe goal of machine learning is to find features\
    \ to train a model that transforms input data (such as pictures, time series,\
    \ or audio) to a given output (such as captions, price values, or transcriptions).\
    \ Deep learning is a subset of machine learning algorithms that learn to extract\
    \ these features by representing input data as vectors and transforming them with\
    \ a series of linear algebra operations into a given output. In order to clarify\
    \ further the difference between deep"

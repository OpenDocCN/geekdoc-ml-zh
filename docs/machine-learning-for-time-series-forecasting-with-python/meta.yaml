  md: '# Chapter 3 ■ Time Series Data Preparation


    +   - *Time Series Exploration and Understanding* – In this section of Chapter
    3, you will learn the first steps to take to explore, analyze, and understand
    time series data. Specifically, this section will focus on how to get started
    with time series data analysis and how to calculate and review summary statistics
    for time series data; then you will learn how to perform data cleaning of missing
    periods in a time series; finally, you will see how to perform time series data

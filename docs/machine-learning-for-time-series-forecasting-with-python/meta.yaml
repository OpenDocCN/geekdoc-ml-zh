  mdcn: "无监督学习有几种类型，例如聚类分析、异常检测和主成分分析：\n\n-   *聚类分析*：聚类分析是一种无监督学习，用于将相似的数据点分隔成直观的组别。数据科学家在需要发现数据中的结构时会使用它，例如以下示例：\n\
    \    - 执行客户细分\n    - 预测客户偏好\n    - 确定市场价格\n\n-   *异常检测*：异常检测是一种监督学习，用于识别和预测罕见或异常的数据点。数据科学家在需要发现异常情况时会使用它，例如以下示例：\n\

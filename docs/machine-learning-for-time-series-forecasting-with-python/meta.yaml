  md: 'period’s actual) and the currently selected model. A GMRAE of 0.54 indicates
    that the size of the current model’s error is only 54 percent of the size of the
    error generated using the naïve model for the same data set. Because the GMRAE
    is based on a relative error, it is less scale sensitive than the MAPE and the
    MAD (Stellwagen 2011).


    +   - *The symmetric mean absolute percentage error (SMAPE)* – This is a variation
    on the MAPE that is calculated using the average of the absolute value of the
    actual and the absolute value of the forecast in the denominator. This statistic
    is preferred to the MAPE by some and was used as an accuracy measure in several
    forecasting competitions (Stellwagen 2011).



    # Chapter 2 ■ How to Design an End-to-End Time Series Forecasting Solution


    An effective data ingestion process begins by prioritizing data sources, validating
    individual files, and routing data items to the correct destination. Moreover,
    a data ingestion pipeline moves streaming data and batched data from preexisting
    databases and data warehouses to a data lake.


    In the data collection phase, data scientists and architects need to work together
    and usually evaluate two different types of tools: time series data collection
    tools and storage tools.


    +   - *Time series data collection tools* – Time series data collection tools
    are the ones that help you in the extraction and organization of raw data. An
    example is Stream Analytics, which is a real-time analytics and complex event-processing
    engine that is designed to analyze and process high volumes of fast streaming
    data from multiple sources simultaneously (aka.ms/AzureStreamAnalytics). Patterns
    and relationships can be identified in information extracted from a number of
    input sources including devices, sensors, clickstreams, social media feeds, and
    applications. These patterns can be used to trigger actions and initiate workflows
    such as creating alerts, feeding information to a reporting tool, or storing transformed
    data for later use.


    Another example of a data collection tool is Data Factory, a managed cloud service
    that is built for complex hybrid extract-transform-load (ETL), extract-load-transform
    (ELT), and data integration projects. It allows you to create data-driven workflows
    for orchestrating data movement and transforming data at scale (aka.ms/AzureStreamAnalytics).


    +   - *Data storage tools* – Storage tools are databases that allow you to store
    your data. These tools store data in either structured or unstructured form and
    can aggregate information from several platforms in an integrated manner, such
    as Cosmos DB: today’s applications are required to be highly responsive and always
    online (aka.ms/MicrosoftCosmosDB). To achieve low latency and high availability,
    instances of these applications need to be deployed in datacenters that are close
    to their users. Cosmos DB is a globally distributed, multi-model database service,
    that enables you to scale throughput and storage elastically and independently
    across many regions worldwide (www.aka.ms/MicrosoftCosmosDB).


    In the case of demand forecasting, load data needs to be constantly and frequently
    predicted, and we must ensure that the raw data is flowing by means of a solid
    and reliable data ingestion process. The ingestion process must guarantee that
    the raw data is available for the forecasting process at the required time. That
    implies that the data ingestion frequency should be greater than the forecasting
    frequency.


    If our demand forecasting solution would generate a new forecast at 8:00 a.m.
    on a daily basis, then we need to ensure that all the data that has been collected'
  - '[PAGE 58]


    during the last 24 hours has been fully ingested till that point and has to include
    the last hour of data.


    Now that you have a better understanding of data ingestion, we are ready for performing
    data exploration. In the next section, we will take a closer look at different
    techniques to explore data in order to bring important aspects of that data into
    focus for further time series analysis.


    # Data Exploration and Understanding


    Data exploration is the first step in data analysis and typically involves summarizing
    the main characteristics of a data set, including its size, accuracy, initial
    patterns in the data, and other attributes. The raw data source that is required
    for performing reliable and accurate forecasting must meet some basic data quality
    criteria. Although advanced statistical methods can be used to compensate for
    some possible data quality issue, we still need to ensure that we are crossing
    some base data quality threshold when ingesting new data (Lazzeri 2019b).


    Here are a few considerations concerning raw data quality:


    +   - *Missing value* – This refers to the situation when specific measurement
    was not collected. The basic requirement here is that the missing value rate should
    not be greater than 10 percent for any given time period. In a case in which a
    single value is missing, it should be indicated by using a predefined value (for
    example, ‘9999’) and not ‘0,’ which could be a valid measurement.

    - *Measurement accuracy* – The actual value of consumption or temperature should
    be accurately recorded. Inaccurate measurements will produce inaccurate forecasts.
    Typically, the measurement error should be lower than 1 percent relative to the
    true value.

    - *Time of measurement* – It is required that the actual time stamp of the data
    collected will not deviate by more than 10 seconds relative to the true time of
    the actual measurement.

    - *Synchronization* – When multiple data sources are being used (for example,
    consumption and temperature), we must ensure that there are no time synchronization
    issues between them. This means that the time difference between the collected
    time stamp from any two independent data sources should not exceed more than 10
    seconds.

    - *Latency* – As discussed earlier, in the section “Data Ingestion,” we are dependent
    on a reliable data flow and ingestion process. To control that, we must ensure
    that we control the data latency. This is specified as the time difference between
    the time that the actual measurement was taken and the time at which it has been
    loaded.'
  - '[PAGE 59]


    Effectively leveraging data exploration can enhance the overall understanding
    of the characteristics of the data domain, thereby allowing for the creation of
    more accurate models.


    Data exploration provides a set of simple tools to obtain some basic understanding
    of the data. The results of data exploration can be extremely powerful in grasping
    the structure of the data, the distribution of the values, and the presence of
    extreme values and interrelationships within the data set: this information provides
    guidance on applying the right kind of further data pre-processing and feature
    engineering (Lazzeri 2019b).


    Once the raw data has been ingested and has been securely stored and explored,
    it is ready to be processed. The data preparation phase is basically taking the
    raw data and converting (transforming, reshaping) it into a form for the modeling
    phase. That may include simple operations such as using the raw data column as
    is with its actual measured value, standardized values, and more complex operations
    such as time lagging. The newly created data columns are referred to as data features,
    and the process of generating these is referred to as feature engineering. By
    the end of this process, we would have a new data set that has been derived from
    the raw data and can be used for modeling.


    # Data Pre-processing and Feature Engineering


    Data pre-processing and feature engineering is the step where data scientists
    clean data sets from outliers and missing data and create additional features
    with the raw data to feed their machine learning models. Specifically, feature
    engineering is the process of transforming data into features to act as inputs
    for machine learning models such that good-quality features help in improving
    the overall model performance. Features are also very much dependent on the underlying
    problem we are trying to solve with a machine learning solution.


    In machine learning, a feature is a quantifiable variable of the phenomenon you
    are trying to analyze, typically depicted by a column in a data set. Considering
    a generic two-dimensional data set, each observation is depicted by a row and
    each feature by a column, which will have a specific value for an observation,
    as illustrated in Figure 2.4.


    ![](img/fd006a6c056e5cf905b5150f958ed477_59_0.png)'

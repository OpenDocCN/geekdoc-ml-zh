  md: '# Chapter 2 ■ How to Design an End-to-End Time Series Forecasting Solution


    In the first section, I will introduce some key techniques for building machine
    learning forecasting solutions successfully. Specifically, we will take a closer
    look at the following steps:


    +   - *Business understanding and performance metrics definition*: The business
    understanding performance metrics definition step outlines the business aspect
    we need to understand and consider prior to making an investment decision. It
    explains how to qualify the business problem at hand to ensure that predictive
    analytics and machine learning are indeed effective and applicable.

    - *Data ingestion*: Data ingestion is the process of collecting and importing
    data to be cleaned and analyzed or stored in a database. Businesses today gather
    large volumes of data, both structured and unstructured, in an effort to use that
    data to discover real-time or near real-time insights.

    - *Data exploration and understanding*: Once the raw data has been ingested and
    securely stored, it is ready to be explored. The data exploration and understanding
    phase is about taking your raw data and converting it into a form that can be
    used for data cleaning and feature engineering.

    - *Data pre-processing and feature engineering*: Data pre-processing and feature
    engineering is the step where data scientists clean data sets from outliers and
    missing data and create additional features with the raw data to feed their machine
    learning models. In machine learning, a feature is a quantifiable variable of
    the phenomenon you are trying to analyze. For certain types of data, the number
    of features can be very large compared to the number of data points.

    - *Modeling building and selection*: The modeling phase is where the conversion
    of the data into a model takes place. In the core of this process there are advanced
    algorithms that scan the historical data (training data), extract patterns, and
    build a model. That model can be later used to predict on new data that has not
    been used to build the model.

    - *Model deployment*: Deployment is the method by which you integrate a machine
    learning model into an existing production environment in order to start using
    it to make practical business decisions based on data. It is one of the last stages
    in the machine learning life cycle.

    - *Forecasting solution acceptance*: In the last stage of the time series forecasting
    solution deployment, data scientists need to confirm and validate that the pipeline,
    the model, and their deployment in a production environment satisfy their success
    criteria.'

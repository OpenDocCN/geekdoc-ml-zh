- md: "scientists wonder whether it’s really necessary to add another class of methods,\
    \ such as convolutional neural networks (CNNs) or recurrent neural networks (RNNs),\
    \ to their time series toolkit (we will discuss this in more detail in Chapter\
    \ 5, “Introduction to Neural Networks for Time Series Forecasting”) (Lazzeri 2019a).\n\
    \nIn time series, the chronological arrangement of data is captured in a specific\
    \ column that is often denoted as *time stamp*, *date*, or simply *time*. As illustrated\
    \ in Figure 1.2, a machine learning data set is usually a list of data points\
    \ containing important information that are treated equally from a time perspective\
    \ and are used as input to generate an output, which represents our predictions.\
    \ On the contrary, a time structure is added to your time series data set, and\
    \ all data points assume a specific value that is articulated by that temporal\
    \ dimension.\n\n![](img/fd006a6c056e5cf905b5150f958ed477_23_0.png)\n\n**Figure\
    \ 1.2:** Machine learning data set versus time series data set\n\nNow that you\
    \ have a better understanding of time series data, it is also important to understand\
    \ the difference between time series analysis and time series forecasting. These\
    \ two domains are tightly related, but they serve different purposes: time series\
    \ analysis is about identifying the intrinsic structure and extrapolating the\
    \ hidden traits of your time series data in order to get helpful information from\
    \ it (like trend or seasonal variation—these are all concepts that we will discuss\
    \ later on in the chapter).\n\nData scientists usually leverage time series analysis\
    \ for the following reasons:\n\n- Acquire clear insights of the underlying structures\
    \ of historical time series data.\n- Increase the quality of the interpretation\
    \ of time series features to better inform the problem domain.\n- Preprocess and\
    \ perform high-quality feature engineering to get a richer and deeper historical\
    \ data set.\n\nTime series analysis is used for many applications such as process\
    \ and quality control, utility studies, and census analysis. It is usually considered\
    \ the first step to analyze and prepare your time series data for the modeling\
    \ step, which is properly called *time series forecasting*.\n\nTime series forecasting\
    \ involves taking machine learning models, training them on historical time series\
    \ data, and consuming them to forecast future predictions. As illustrated in Figure\
    \ 1.3, in time series forecasting that future output is unknown, and it is based\
    \ on how the machine learning model is trained on the historical input data.\n\
    \n![](img/fd006a6c056e5cf905b5150f958ed477_24_0.png)\n\nDifferent historical and\
    \ current phenomena may affect the values of your data in a time series, and these\
    \ events are diagnosed as components of a time series. It is very important to\
    \ recognize these different influences or components and decompose them in order\
    \ to separate them from the data levels.\n\nAs illustrated in Figure 1.4, there\
    \ are four main categories of components in time series analysis: *long-term movement\
    \ or trend*, *seasonal short-term movements*, *cyclic short-term movements*, and\
    \ *random or irregular fluctuations*.\n\n![](img/fd006a6c056e5cf905b5150f958ed477_24_1.png)\n\
    \n## Chapter 1 ■ Overview of Time Series Forecasting\n\nLet’s have a closer look\
    \ at these four components:\n\n- *Long-term movement* or *trend* refers to the\
    \ overall movement of time series values to increase or decrease during a prolonged\
    \ time interval. It is common to observe trends changing direction throughout\
    \ the course of your time series data set: they may increase, decrease, or remain\
    \ stable at different moments. However, overall you will see one primary trend.\
    \ Population counts, agricultural production, and items manufactured are just\
    \ some examples of when trends may come into play.\n- There are two different\
    \ types of *short-term movements*:\n    - *Seasonal variations* are periodic temporal\
    \ fluctuations that show the same variation and usually recur over a period of\
    \ less than a year. Seasonality is always of a fixed and known period. Most of\
    \ the time, this variation will be present in a time series if the data is recorded\
    \ hourly, daily, weekly, quarterly, or monthly. Different social conventions (such\
    \ as holidays and festivities), weather seasons, and climatic conditions play\
    \ an important role in seasonal variations, like for example the sale of umbrellas\
    \ and raincoats in the rainy season and the sale of air conditioners in summer\
    \ seasons.\n    - *Cyclic variations*, on the other side, are recurrent patterns\
    \ that exist when data exhibits rises and falls that are not of a fixed period.\
    \ One complete period is a cycle, but a cycle will not have a specific predetermined\
    \ length of time, even if the duration of these temporal fluctuations is usually\
    \ longer than a year. A classic example of cyclic variation is a business cycle,\
    \ which is the downward and upward movement of gross domestic product around its\
    \ long-term growth trend: it usually can last several years, but the duration\
    \ of the current business cycle is unknown in advance.\n\nAs illustrated in Figure\
    \ 1.5, cyclic variations and seasonal variations are part of the same short-term\
    \ movements in time series forecasting, but they present differences that data\
    \ scientists need to identify and leverage in order to build accurate forecasting\
    \ models:\n\n![](img/fd006a6c056e5cf905b5150f958ed477_25_0.png)\n\n- *Random or\
    \ irregular fluctuations* are the last element to cause variations in our time\
    \ series data. These fluctuations are uncontrollable, unpredictable, and erratic,\
    \ such as earthquakes, wars, flood, and any other natural disasters.\n\nData scientists\
    \ often refer to the first three components (long-term movements, seasonal short-term\
    \ movements, and cyclic short-term movements) as *signals* in time series data\
    \ because they actually are deterministic indicators that can be derived from\
    \ the data itself. On the other hand, the last component (random or irregular\
    \ fluctuations) is an arbitrary variation of the values in your data that you\
    \ cannot really predict, because each data point of these random fluctuations\
    \ is independent of the other signals above, such as long-term and short-term\
    \ movements. For this reason, data scientists often refer to it as *noise*, because\
    \ it is triggered by latent variables difficult to observe, as illustrated in\
    \ Figure 1.6.\n\n![](img/fd006a6c056e5cf905b5150f958ed477_26_0.png)\n\nData scientists\
    \ need to carefully identify to what extent each component is present in the time\
    \ series data to be able to build an accurate machine learning forecasting solution.\
    \ In order to recognize and measure these four components, it is recommended to\
    \ first perform a decomposition process to remove the component effects from the\
    \ data. After these components are identified and measured, and eventually utilized\
    \ to build additional features to improve the forecast accuracy, data scientists\
    \ can leverage different methods to recompose and add back the components on forecasted\
    \ results.\n\nUnderstanding these four time series components and how to identify\
    \ and remove them represents a strategic first step for building any time series\
    \ forecasting solution because they can help with another important concept in\
    \ time series that may help increase the predictive power of your machine learning\
    \ algorithms: stationarity. *Stationarity* means that statistical parameters of\
    \ a time series do not change over time. In other words, basic properties of the\
    \ time series data distribution, like the mean and variance, remain constant over\
    \ time. Therefore, stationary time series processes are easier to analyze and\
    \ model because the basic assumption is that their properties are not dependent\
    \ on time and will be the same in the future as they have been in the previous\
    \ historical period of time. Classically, you should make your time series stationary.\n\
    \nThere are two important forms of stationarity: *strong stationarity* and *weak\
    \ stationarity*. A time series is defined as having a strong stationarity when\
    \ all its statistical parameters do not change over time. A time series is defined\
    \ as having a weak stationarity when its mean and auto-covariance functions do\
    \ not change over time.\n\nAlternatively, time series that exhibit changes in\
    \ the values of their data, such as a trend or seasonality, are clearly not stationary,\
    \ and as a consequence, they are more difficult to predict and model. For accurate\
    \ and consistent forecasted results to be received, the nonstationary data needs\
    \ to be transformed into stationary data. Another important reason for trying\
    \ to render a time series stationary is to be able to obtain meaningful sample\
    \ statistics such as means, variances, and correlations with other variables that\
    \ can be used to get more insights and better understand your data and can be\
    \ included as additional features in your time series data set.\n\nHowever, there\
    \ are cases where unknown nonlinear relationships cannot be determined by classical\
    \ methods, such as autoregression, moving average, and autoregressive integrated\
    \ moving average methods. This information can be very helpful when building machine\
    \ learning models, and it can be used in feature engineering and feature selection\
    \ processes. In reality, many economic time series are far from stationary when\
    \ visualized in their original units of measurement, and even after seasonal adjustment\
    \ they will typically still exhibit trends, cycles, and other nonstationary characteristics.\n\
    \nTime series forecasting involves developing and using a predictive model on\
    \ data where there is an ordered relationship between observations. Before data\
    \ scientists get started with building their forecasting solution, it is highly\
    \ recommended to define the following forecasting aspects:\n\n- *The inputs and\
    \ outputs of your forecasting model* – For data scientists who are about to build\
    \ a forecasting solution, it is critical to think about the data they have available\
    \ to make the forecast and what they want to forecast about the future. Inputs\
    \ are historical time series data provided to feed the model in order to make\

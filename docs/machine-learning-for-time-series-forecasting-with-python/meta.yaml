    \ Learning. Specifically, we looked at the following methods:\n\n- *Autoregression*\
    \ – This time series technique assumes that future observations at next time stamp\
    \ are related to the observations at prior time stamps through a linear relationship.\n\
    - *Moving Average* – This time series technique leverages previous forecast errors\
    \ in a regression approach to forecast future observations at next time stamps.\
    \ Together with the autoregression technique, the moving average approach is a\
    \ crucial element of the more general autoregressive moving average and autoregressive\
    \ integrated moving average models, which present a more sophisticated stochastic\
    \ configuration.\n- *Autoregressive Moving Average* – This time series technique\
    \ assumes that future observations at next time stamp can be represented as a\
    \ linear function of the observations and residual errors at prior time stamps.\n\

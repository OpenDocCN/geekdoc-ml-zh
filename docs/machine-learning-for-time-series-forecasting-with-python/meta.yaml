    ## About the Author


    **Francesca Lazzeri**, PhD, is an experienced scientist and machine learning practitioner
    with over a decade of both academic and industry experience. She currently leads
    an international team of cloud AI advocates and developers at Microsoft, managing
    a large portfolio of customers and building intelligent automated solutions on
    the cloud.


    Francesca is an expert in big data technology innovations and the applications
    of machine learning–based solutions to real-world problems. Her work is unified
    by the twin goals of making better sense of microeconomic data and using those
    insights to optimize firm decision making. Her research has spanned the areas
    of machine learning, statistical modeling, and time series econometrics and forecasting
    as well as a range of industries—energy, oil and gas, retail, aerospace, healthcare,
    and professional services.


    Before joining Microsoft, she was a research fellow at Harvard University in the
    Technology and Operations Management Unit. Francesca periodically teaches applied
    analytics and machine learning classes at universities and research institutions
    around the world. You can find her on Twitter @frlazzeri.


    ## About the Technical Editor


    **James York-Winegar** holds a bachelor’s degree in mathematics and physics and
    a master’s degree in information and data science. He has worked in academia,
    healthcare, and technology consulting. James currently works with companies to
    enable machine learning workloads by enabling their data infrastructure, security,
    and metadata management. He also teaches machine learning courses at the University
    of California, Berkeley, focused on scaling up machine learning technology for
    big data.


    Prior to leaving academia, James originally was focused on the cross section between
    experimental and theoretical physics and materials science. His research was focused
    on photo-structural transformations of non-oxide glasses or chalcogenide glasses.
    This introduced James to processing extremely large amounts of data and high-performance
    computing, where his work still leads him today.


    James has had exposure to many industries through his consulting experience, including
    education, entertainment, commodities, finance, telecommunications, consumer packaged
    goods, startups, biotech, and technology. With this experience, he helps companies
    understand what is possible with their data and how to enable new capabilities
    or business opportunities. You can find his LinkedIn profile at linkedin.com/in/winegarj/.


    ## Acknowledgments


    In the past few years, I had the privilege to work with many data scientists,
    cloud advocates, developers, and professionals from Microsoft and Wiley: all these
    people inspired me and supported me through the creation and writing of this book.
    I am particularly grateful to the Cloud Advocacy team at Microsoft, for their
    trust and encouragement and for making my job so much easier and more enjoyable.


    Thanks to Jim Minatel, associate publisher at John Wiley & Sons, who worked with
    me since the beginning of the publishing process and acted as a bridge between
    my work and the editorial staff. It was a pleasure to work with Pete Gaughan,
    content enablement manager; with David Clark, project editor, who managed the
    process that got us from outline to a finished manuscript; and with Saravanan
    Dakshinamurthy, content refinement specialist, who managed the last stages of
    this book development and made them go as smoothly as they did. I appreciate the
    support and guidance provided by the technical reviewer, James Winegar, and I
    hope we will work on other projects together in the future.


    Last but not least, I will be forever grateful to my daughter, Nicole, who reminds
    me of the goodness in this world and inspires me to be the greatest version of
    myself; to my husband, Laurent, for his unconditional and endless support, inspiration,
    and encouragement; to my parents, Andrea and Anna Maria, and my brother, Marco,
    for always being there for me and believing in me through all walks of my life.


    —Francesca Lazzeri



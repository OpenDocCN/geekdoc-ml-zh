    # Modeling Building and Selection


    The modeling phase is where the conversion of the data into a model takes place.
    In the core of this process there are advanced algorithms that scan the historical
    data (training data), extract patterns, and build a model. That model can be later
    used to predict on new data that has not been used to build the model.


    Once we have a working reliable model, we can then use it to score new data that
    is structured to include the required features. The scoring process will make
    use of the persisted model (object from the training phase) and predict the target
    variable.


    At this point, it is also important to distinguish between train, validation,

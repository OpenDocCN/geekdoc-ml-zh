    \   -0.04\nFreq: M, dtype: float64\n```\n\nAs you can see from the preceding examples,\
    \ pandas allows you to capture both representations and convert between them.\
    \ pandas represents time stamps using instances of `Timestamp` and sequences of\
    \ time stamps using instances of `DatetimeIndex`.\n\n# Converting to Time stamps\n\
    \nTypically, data scientists represent the time component or the columns with\
    \ dates in their data sets as the index of a Series or DataFrame, so that data\
    \ preprocessing and cleaning manipulations can be performed with respect to the\
    \ time element. The example below shows that, when passed a Series, this returns\
    \ a Series (with the same index):\n\n```\npd.to_datetime(pd.Series(['Jul 31, 2012',\
    \ '2012-01-10', None]))\n```\n\nThe output will be\n\n```\n0   2012-07-31\n1 \
    \  2012-01-10\n2          NaT\ndtype: datetime64[ns]\n```\n\nOn the other hand,\
    \ the following example shows that, when passed a list-like, this is converted\
    \ to a `DatetimeIndex`:\n\n```\npd.to_datetime(['2012/11/23', '2012.12.31'])\n\
    ```\n\nThe output will be\n\n```\nDatetimeIndex(['2012-11-23', '2012-12-31'],\
    \ dtype='datetime64[ns]',\n              freq=None)\n```\n\nFinally, if you use\
    \ dates that start with the day first (i.e. European style), you can pass the\
    \ `dayfirst` flag:\n\n```\npd.to_datetime(['04-01-2014 10:00'], dayfirst=True)\n\
    ```"
  - "[PAGE 89]\n\nThe output will be\n\n```\nDatetimeIndex(['2014-01-04 10:00:00'],\
    \ dtype='datetime64[ns]',\n              freq=None)\n```\n\nThe `dayfirst` flag\
    \ works with multiple dates as well, as shown in the example below:\n\n```\npd.to_datetime(['14-01-2014',\
    \ '01-14-2012'], dayfirst=True)\n```\n\nThe output will be\n\n```\nDatetimeIndex(['2014-01-14',\
    \ '2012-01-14'], dtype='datetime64[ns]',\n              freq=None)\n```\n\n# Providing\
    \ a Format Argument\n\nIn addition to the required datetime string, a `format`\
    \ argument can be passed to ensure specific parsing and define the structure and\
    \ order of your time variable, as shown in the following example:\n\n```\npd.to_datetime('2018/11/12',\
    \ format='%Y/%m/%d')\n```\n\nThe output will be\n\n```\nTimestamp('2018-11-12\
    \ 00:00:00')\n```\n\nIf you need to also define hours and minutes in your dates,\
    \ you can format your time series data as follows:\n\n```\npd.to_datetime('11-11-2018\
    \ 00:00', format='%d-%m-%Y %H:%M')\n```\n\nThe output will be\n\n```\nTimestamp('2018-11-11\
    \ 00:00:00')\n```\n\nMoreover, `date`, `datetime`, and `time` objects all support\
    \ a `strftime(format)` method to create a string representing the time under the\
    \ control of an explicit format string. On the other hand, the `datetime.strptime()`\
    \ class method creates a `datetime` object from a string representing a date and\
    \ time and a corresponding format string.\n\nIn other words, `strptime()` and\
    \ `strftime()` are two popular methods for converting objects from strings to\
    \ datetime objects and the other way around. `strptime()` can read strings with\
    \ date and time information and convert them to datetime objects, and `strftime()`\
    \ converts datetime objects back into strings.\n\nTable 3.2 provides a high-level\
    \ comparison of `strftime()` versus `strptime()` methods."

  md: 'Energy demand forecasting is a type of demand forecasting where the goal is
    to predict the future load (or energy demand) on an energy grid. It is a critical
    business operation for companies in the energy sector, as operators need to maintain
    the fine balance between the energy consumed on a grid and the energy supplied
    to it. Typically, grid operators can take short-term decisions to manage energy
    supply to the grid and keep the load in balance. An accurate short-term forecast
    of energy demand is therefore essential for the operator to make these decisions
    with confidence. This scenario details the construction of a machine learning
    energy demand forecasting solution.


    Let''s first look at the concept of *time stamped* data, which is the most essential
    type of time series data and helps you combine values with specific points in
    time. This means that each data point of your data set will have a temporal information
    that you can leverage, as shown in the sample code below:


    ```

    # import necessary Python packages

    import pandas as pd

    import datetime as dt

    import numpy as np


    pd.Timestamp(dt.datetime(2014, 5, 1))


    # or we can use

    pd.Timestamp(''2014-06-01'')


    # or we can use

    pd.Timestamp(2014, 6, 1)

    ```


    The result of these examples will be as follows:


    ```

    Timestamp(''2014-06-01 00:00:00'')

    ```


    In many time series scenarios, it can be also useful to link data points in your
    data set to a time interval instead. The time interval represented by `Period`
    can be inferred from datetime string format, as shown in the following example:


    ```

    pd.Period(''2014-06'')

    ```


    Output:


    ```

    Period(''2014-06'', ''M'')

    ```


    Where ''M'' stands for month. The time interval represented by `Period` can be
    also specified explicitly:


    ```

    pd.Period(''2014-06'', freq=''D'')

    ```


    Output:


    ```

    Period(''2014-06-01'', ''D'')

    ```'

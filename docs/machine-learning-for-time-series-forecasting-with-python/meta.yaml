    # Conclusion


    In this chapter, you learned how to train a time series forecasting regression
    model using autoregressive methods and Automated ML in Azure Machine Learning.

    Specifically, we looked at the following methods:


    +   - *Autoregression* – This time series technique assumes that future observations
    at next time stamp are related to the observations at prior time stamps through
    a linear relationship.

    - *Moving Average* – This time series technique leverages previous forecast errors
    in a regression approach to forecast future observations at next time stamps.
    Together with the autoregression technique, the moving average approach is a crucial
    element of the more general autoregressive moving average and autoregressive integrated
    moving average models, which present a more sophisticated stochastic configuration.

    - *Autoregressive Moving Average* – This time series technique assumes that future
    observations at next time stamp can be represented as a linear function of the
    observations and residual errors at prior time stamps.

    - *Autoregressive Integrated Moving Average* – This time series technique assumes
    that future observations at next time stamp can be represented as a linear function
    of the differenced observations and residual errors at prior time stamps.

    - *Automated ML* – This time series technique iterates through a portfolio of
    different machine learning algorithms for time series forecasting while performing
    best model selection, hyperparameters tuning, and feature engineering for your
    scenario.


    In the next chapter we will learn how to use and apply deep learning methods to
    time series scenarios.'

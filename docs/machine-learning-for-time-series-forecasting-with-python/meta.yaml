- img_proc: true
  md: '![](img/fd006a6c056e5cf905b5150f958ed477_167_0.png)


    In Figure 5.4, it is important to note that LSTM memory cells leverage both *addition*
    and *multiplication* in the transformation of input and transfer of information.
    The addition step is essentially the secret of LSTMs: it preserves a constant
    error when it must be backpropagated at depth. Instead of influencing the next
    cell state by multiplying its current state with new input, they add the two,
    while the forget gate still relies on multiplication.


    To update the cell state, we have the *input gate*. The information from the previous
    hidden state and from the current input is passed through the *sigmoid function*,
    in order to obtain values between 0 and 1: the closer to 0 means to forget, and
    the closer to 1 means to remember. As you might have already noticed in Figure
    5.4, LSTMs also have a *forget gate*, even if their specialty is actually to maintain
    and transfer information from distant occurrences to a final output. The forget
    gate decides what information should be forgotten and what information should
    be remembered and transferred.


    Finally, we have the *output gate*, which decides what the next hidden state should
    be. First, the previous hidden state and the current input are passed into a sigmoid
    function. Then the newly modified cell state is passed through the tanh function.
    The tanh output is multiplied with the sigmoid output to decide what information
    the hidden state should keep (Zhang et al. 2019).


    In the next section, we are going discuss a specific type of LSTM network, called
    gated recurrent units: they aim to solve the vanishing gradient problem that comes
    with a standard recurrent neural network. The gated recurrent unit, introduced
    by KyungHyun Cho and his colleagues in 2014 (Cho et al. 2014), is a slightly more
    streamlined variant of LSTM networks that often offers comparable performance
    and is significantly faster to compute.


    # Gated Recurrent Unit


    In the previous section, we discussed how gradients are calculated in a recurrent
    neural network. In particular, you saw that long products of matrices can lead
    to vanishing or divergent gradients. GRU can also be considered as a variation'
  merge: -1
  pgno: 167
- img_proc: true
  md: 'on the LSTM because both are designed similarly and, in some cases, produce
    equally excellent results.


    GRU networks do not leverage the cell state and use the hidden state to transfer
    information. Unlike LSTM, GRU networks contain only three gates and do not maintain
    an internal cell state. The information that is stored in the internal cell state
    in an LSTM recurrent unit is incorporated into the hidden state of the GRU. This
    combined information is aggregated and transferred to the next GRU (Cho et al.
    2014).


    The first two gates, *reset gate* and *update gate*, help solve the vanishing
    gradient problem of a standard RNN: these gates are two vectors that decide what
    information should be passed to the output (Cho et al. 2014). The unique characteristics
    about them is that they can be trained to keep information from long ago, without
    removing it through time, or delete information that is irrelevant to the prediction.


    +   - *Update gate* – The update gate helps the model to determine how much of
    the past information (from previous time steps) needs to be passed along to the
    future. That is really powerful because the model can decide to copy all the information
    from the past and eliminate the risk of the vanishing gradient problem.

    - *Reset gate* – The reset gate is another gate used to decide how much past information
    to forget.


    Finally there is a third gate:


    +   - *Current memory gate* – This gate is incorporated into the reset gate and
    is used to initiate some nonlinearity into the input and develop the input zero-mean.
    Another motivation to incorporate it into the reset gate is to decrease the impact
    that previous information has on the current information that is being passed
    into the future (Cho et al. 2014).


    A GRU is a very useful mechanism for fixing the vanishing gradient problem in
    recurrent neural networks. The vanishing gradient dilemma occurs in machine learning
    when the gradient becomes small, which precludes the weight from adjusting its
    value.



    \n- *用于时间序列数据的Python* – Python是一种非常强大的数据处理编程语言，为时间序列数据提供了丰富的库套件，并对时间序列分析有出色的支持。在本节中，你学习了SciPy、NumPy、Matplotlib、pandas、statsmodels和scikit-learn等库如何帮助你准备、探索和分析时间序列数据。\n\

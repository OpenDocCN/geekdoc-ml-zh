    tasks such as indoor movement prediction, using wireless sensor strength data
    to predict the location and motion of subjects within a building (Lazzeri 2019a).


    # Deep Learning Supports Multiple Inputs and Outputs


    Real-world time series forecasting is challenging for several reasons, such as
    having multiple input variables, the requirement to predict multiple time steps,
    and the need to perform the same type of prediction for multiple physical sites.
    Deep learning algorithms can be applied to time series forecasting problems and
    offer benefits such as the ability to handle multiple input variables with noisy
    complex dependencies (Lazzeri 2019a).


    Specifically, neural networks can be configured to support an arbitrary but fixed
    number of inputs and outputs in the mapping function. This means that neural networks
    can directly support multivariate inputs, providing direct support for multivariate
    forecasting. A univariate time series, as the name suggests, is a series with
    a single time-dependent variable. For example, we want to predict next energy
    consumption in a specific location: in a univariate time series scenario, our
    dataset will be based on two variables, time values and historical energy consumption
    observations (Lazzeri 2019a).


    A multivariate time series has more than one time-dependent variable. Each variable
    not only depends on its past values but also has some dependency on other variables.
    This dependency is used for forecasting future values. Let''s consider the above
    example again.


    Now suppose our data set includes weather data, such as temperature values, dew
    point, wind speed, and cloud cover percentage along with the energy consumption
    value for the past four years. In this case, there are multiple variables to be
    considered to optimally predict energy consumption value. A series like this would
    fall under the category of multivariate time series.


    With neural networks, an arbitrary number of output values can be specified, offering
    direct support for more complex time series scenarios that require multivariate
    forecasting and even multi-step forecast methods. There are two main approaches
    that deep learning methods can be used to make multi-step forecasts:


    +   - *Direct*, where a separate model is developed to forecast each forecast
    lead time

    - *Recursive*, where a single model is developed to make one-step forecasts, and
    the model is used recursively where prior forecasts are used as input to forecast
    the subsequent lead time


    The recursive approach can make sense when forecasting a short contiguous block
    of lead times, whereas the direct approach may make more sense when forecasting
    discontinuous lead times. The direct approach may be more appropriate when we
    need to forecast a mixture of multiple contiguous and'
  - '[PAGE 162]


    discontiguous lead times over a period of a few days; such is the case, for example,
    with air pollution forecasting problems or for anticipatory shipping forecasting,
    used to predict what customers want and then ship the products automatically (Lazzeri
    2019a).


    Key to the use of deep learning algorithms for time series forecasting is the
    choice of multiple input data. We can think about three main sources of data that
    can be used as input and mapped to each forecast lead time for a target variable:


    +   - *Univariate data*, such as lag observations from the target variable that
    is being forecasted.

    - *Multivariate data*, such as lag observations from other variables (for example,
    weather and targets in case of air pollution forecasting problems).

    - *Metadata*, such as data about the date or time being forecast. This type of
    data can provide additional insight into historical patterns, helping create richer
    data sets and more accurate forecasts (Brownlee 2017).


    # Recurrent Neural Networks Are Good at Extracting Patterns from Input Data


    Recurrent neural networks (RNNs) were created in the 1980s but have just recently
    been gaining popularity due to increased computational power from graphic processing
    units. They are especially useful with sequential data because each neuron or
    unit can use its internal memory to maintain information about the previous input.
    An RNN has loops in it that allow information to be carried across neurons while
    reading in input.


    However, a simple recurrent network suffers from a fundamental problem of not
    being able to capture long-term dependencies in a sequence. This is a major reason
    RNNs faded out from practice until some great results were achieved with using
    a LSTM unit inside the neural network. Adding the LSTM to the network is like
    adding a memory unit that can remember context from the very beginning of the
    input (Lazzeri 2019a).


    LSTM neural networks are a particular type of RNN that have some internal contextual
    state cells that act as long-term or short-term memory cells. The output of the
    LSTM network is modulated by the state of these cells. This is a very important
    property when we need the prediction of the neural network to depend on the historical
    context of inputs rather than only on the very last input. They are a type of
    neural network that adds native support for input data comprising sequences of
    observations. The addition of sequence is a new dimension to the function being
    approximated. Instead of mapping inputs to outputs alone, the network can learn
    a mapping function for the inputs over time to an output.'
- md: '## Chapter 5 ■ Introduction to Neural Networks for Time Series Forecasting


    The example of video processing can be very effective when we need to understand
    how LSTM networks work: in a movie, what happens in the current frame is heavily
    dependent upon what was in the last frame. Over a period of time, an LSTM network
    tries to learn what to keep and how much to keep from the past and how much information
    to keep from the present state, which makes it powerful compared to other types
    of neural networks (Lazzeri 2019a).


    This capability can be used in any time series forecasting context, where it can
    be extremely helpful to automatically learn the temporal dependence from the data.
    In the simplest case, the network is shown one observation at a time from a sequence
    and can learn which prior observations are important and how they are relevant
    to forecasting. The model both learns a mapping from inputs to outputs and learns
    what context from the input sequence is useful for the mapping and can dynamically
    change this context as needed.


    Not surprisingly, this approach has often been used in the finance industry to
    build models that forecast exchange rates, based on the idea that past behavior
    and price patterns may affect currency movements and can be used to predict future
    price behavior and patterns. On the other hand, there are downsides that data
    scientists need to be careful about while implementing neural network architectures.
    Large volumes of data are required, and models require hyperparameter tuning and
    multiple optimization cycles.


    In this section, we discussed the three neural networks capabilities that can
    offer a lot of help when data scientists deal with more complex but still very
    common problems, like time series forecasting. In the next section, we will deep
    dive on some fundamental concepts to understand better how neural networks work
    for time series forecasting (Lazzeri 2019a).


    ## Recurrent Neural Networks for Time Series Forecasting


    Recurrent neural network (RNN), also known as autoassociative or feedback network,
    belongs to a class of artificial neural networks where connections between units
    form a directed cycle. This creates an internal state of the network, which allows
    it to exhibit dynamic temporal behavior (Poznyak, Oria, and Poznyak 2018).


    RNN can leverage their internal memory to handle sequences of inputs and, instead
    of mapping inputs to outputs alone, it is capable of leveraging a mapping function
    for the inputs over *time* to an output. RNNs have shown to achieve the state-of-the-art
    results in many applications with time series or sequential data, including machine
    translation and speech recognition.


    In particular, LSTM is a type of RNN architecture that performs particularly well
    on different temporal processing tasks, and LSTM networks are able to address
    the issue of large time lags in input data successfully. LSTM networks have several
    nice properties such as strong prediction performance as well as the ability to
    capture long-term temporal dependencies and variable-length observations (Che
    et al. 2018).


    Exploiting the power of customized RNN models along with LSTM models is a promising
    venue to effectively model time series data: in the next few sections of this
    chapter, you will see how RNNs, LSTMs, and Python can help data scientists build
    accurate models for their time series forecasting solutions.


    ## Recurrent Neural Networks


    RNNs are neural networks with hidden states and loops, allowing information to
    persist over time. In this section, I''ll first introduce the concept of *recurrent
    units* and how their memory works, and finally, I''ll explain how they can be
    used to handle sequence data such as time series.


    Different types of neural networks (such as feed forward networks) are based on
    the idea of learning during training from context and history to produce predictions:
    RNNs use the idea of hidden state (or memory) in order to be able to generate
    an outcome or prediction by updating each neuron into a new computational unit
    that is able to remember what it has seen before (Bianchi et al. 2018).


    This memory is preserved inside the unit, in an array or in a vector, so that
    when the unit reads an input, it also processes the content of the memory, combining
    the information. By using both (the knowledge from the input and the knowledge
    from the memory), the unit is now capable of making a prediction (Y) and updating
    the memory itself, as illustrated in Figure 5.1.


    ![](img/fd006a6c056e5cf905b5150f958ed477_164_0.png)


    **Figure 5.1:** Representation of a recurrent neural network unit


    RNN units are described as recurrent units because the type of dependence of the
    current value on the previous event is *recurrent* and can be thought of as multiple
    copies of the same node, each transmitting a recurrent message to a successor.
    Let''s visualize this recursive relationship in Figure 5.2.


    ![](img/fd006a6c056e5cf905b5150f958ed477_165_0.png)


    **Figure 5.2:** Recurrent neural network architecture


    In Figure 5.2, an RNN architecture is represented. RNN has an internal hidden
    state, denoted as H, which can be fed back to the network. In this figure, the
    RNN processes input values X and produces output values Y. The hidden state, denoted
    as H, allows the information to be forwarded from one node of the network to the
    next node, organized as sequences or a vector. That vector now has information
    on the current input and previous inputs. The vector goes through the tanh activation,
    and the output is the new hidden state. The tanh activation is used to regulate
    the values flowing through the network and always keeps the values between –1
    and 1. Because of this structure, RNNs can represent a good modeling choice to
    try to solve a variety of sequential problems, such as time series forecasting,
    speech recognition, or image captioning (Bianchi 2018).


    As you can notice, in Figure 5.2, there is an additional element denoted as W.
    W indicates that each unit has three sets of weights, one for the inputs (X),
    another for the outputs of the previous time step (H), and the other for the output
    of the current time step (Y). Those weight values are determined by the training
    process and can be identified by applying a popular optimization technique called
    gradient descent.


    In simple words, a gradient is the slope of a function that can be defined as
    the partial derivatives of a set of parameters with respect to its inputs. Gradients
    are values used to update a neural network''s weights: the function represents
    the problem that we want to solve using neural networks and selecting an appropriate
    choice of parameters to update those neural networks weights. In order to calculate
    a gradient descent, we then need to calculate the loss function and its derivative
    with respect to the weights. We start with a random point on the function and
    move in the negative direction of the gradient of the function to reach a point
    where the value of the function is minimum (Zhang et al. 2019).


    In Figure 5.2, we seem to be applying the same weights to different items in the
    input series. This means that we are sharing parameters across inputs. If we are
    not able to share parameters across inputs, then an RNN becomes like an ordinary
    neural network where each input node requires weights of their own.


    RNNs instead can leverage their hidden state property that ties one input to the
    next one and combines this input connection in a serial input.


    Despite their great potential, RNNs have a few limitations, as they suffer from
    short-term memory. For example, if an input sequence is long enough, they are
    not able to transfer information from earlier time steps to later ones, and they
    often leave out important information from the beginning of the sequence during
    the backpropagation process. We refer to this problem as the *vanishing gradient
    problem*, as illustrated in Figure 5.3.


    During backpropagation, recurrent neural networks suffer from this problem because
    the gradient decreases as it backpropagates through time. If a gradient value
    becomes extremely small, it is not able to contribute to the network learning
    process. LSTM solves this problem by introducing changes to RNN architecture on
    how they compute outputs and hidden state using the inputs: specifically, LSTMs
    introduce additional elements in the architecture, called *gates* and *cell state*.
    There are variants of LSTMs, and we will discuss them in more detail in the next
    section.


    ![](img/fd006a6c056e5cf905b5150f958ed477_166_0.png)


    ## Long Short-Term Memory


    LSTMs are capable of learning long-term dependencies, which is a useful capability
    when you need to model time series data. As mentioned in the previous section,
    LSTMs help preserve the error that can be backpropagated through time and layers,
    without risk of losing important information: LSTMs have internal mechanisms called
    gates and cell state that can regulate the flow of information (Zhang et al. 2019).


    The cell makes decisions about what, how much, and when to store and release information:
    they learn when to allow information to enter, leave, or be deleted through the
    iterative process of making guesses, backpropagating error, and adjusting weights
    via gradient descent. Figure 5.4 illustrates how information flows through a cell
    and is controlled by different gates.'
  mdcn: '## 第5章 ■ 时间序列预测神经网络简介


    在需要理解LSTM网络工作原理时，视频处理的例子非常有效：在一部电影中，当前帧发生的内容很大程度上取决于上一帧的内容。在一段时间内，LSTM网络试图学习从过去保留什么、保留多少，以及从当前状态保留多少信息，这使其相较于其他类型的神经网络更为强大（Lazzeri
    2019a）。


    这种能力可用于任何时间序列预测场景，其中自动从数据中学习时间依赖性可能非常有帮助。在最简单的情况下，网络一次从序列中接收一个观测值，并能够学习哪些先前的观测值是重要的，以及它们与预测的相关性。该模型既学习从输入到输出的映射，也学习输入序列中哪些上下文对该映射有用，并能根据需要动态改变此上下文。


    不足为奇，这种方法常被金融行业用于构建预测汇率的模型，其基于的理念是过去的行为和价格模式可能影响货币走势，并可用于预测未来的价格行为和模式。另一方面，数据科学家在实施神经网络架构时需要注意一些缺点。需要大量数据，模型需要超参数调优和多次优化循环。


    在本节中，我们讨论了三种神经网络能力，当数据科学家处理更复杂但仍非常常见的问题（如时间序列预测）时，这些能力可以提供很大帮助。在下一节中，我们将深入探讨一些基本概念，以更好地理解神经网络如何用于时间序列预测（Lazzeri
    2019a）。


    ## 用于时间序列预测的循环神经网络


    循环神经网络（RNN），也称为自联想或反馈网络，属于一类人工神经网络，其中单元之间的连接形成有向循环。这创造了网络的内部状态，使其能够表现出动态的时间行为（Poznyak,
    Oria, and Poznyak 2018）。


    RNN可以利用其内部记忆来处理输入序列，而不仅仅是将输入映射到输出，它能够利用一个映射函数将输入在*时间*上映射到输出。RNN已在许多涉及时间序列或序列数据的应用中展示了最先进的结果，包括机器翻译和语音识别。


    特别是，LSTM是一种RNN架构，在不同的时间处理任务上表现尤为出色，LSTM网络能够成功解决输入数据中的大时间滞后问题。LSTM网络具有几个优良特性，如强大的预测能力以及捕获长期时间依赖性和可变长度观测值的能力（Che
    et al. 2018）。


    利用定制RNN模型与LSTM模型的强大功能，是有效建模时间序列数据的一个有前景的途径：在本章接下来的几节中，你将看到RNN、LSTM和Python如何帮助数据科学家为其时间序列预测解决方案构建精确的模型。


    ## 循环神经网络


    RNN是具有隐藏状态和循环的神经网络，允许信息随时间持续存在。在本节中，我将首先介绍*循环单元*的概念及其记忆如何工作，最后解释它们如何用于处理序列数据（如时间序列）。


    不同类型的神经网络（如前馈网络）基于在训练期间从上下文和历史中学习以产生预测的理念：RNN使用隐藏状态（或记忆）的概念，以便能够通过将每个神经元更新为一个新的计算单元来生成结果或预测，该单元能够记住它之前看到的内容（Bianchi
    et al. 2018）。


    这种记忆保存在单元内部，以数组或向量的形式存在，因此当单元读取输入时，它也会处理记忆的内容，将信息结合起来。通过同时使用两者（来自输入的知识和来自记忆的知识），该单元现在能够进行预测（Y）并更新记忆本身，如图5.1所示。


    ![](img/fd006a6c056e5cf905b5150f958ed477_164_0.png)


    **图5.1：** 循环神经网络单元表示


    RNN单元被描述为循环单元，因为当前值对先前事件的依赖类型是*循环的*，可以看作是同一节点的多个副本，每个副本向后继节点传递循环消息。让我们在图5.2中可视化这种递归关系。


    ![](img/fd006a6c056e5cf905b5150f958ed477_165_0.png)


    **图5.2：** 循环神经网络架构


    在图5.2中，表示了一个RNN架构。RNN有一个内部隐藏状态，表示为H，可以反馈到网络中。在此图中，RNN处理输入值X并产生输出值Y。隐藏状态，表示为H，允许信息从网络的一个节点转发到下一个节点，组织成序列或向量。该向量现在包含有关当前输入和先前输入的信息。该向量经过tanh激活，输出是新的隐藏状态。tanh激活用于调节流经网络的值，并始终将值保持在-1和1之间。由于这种结构，RNN可以成为尝试解决各种序列问题的良好建模选择，例如时间序列预测、语音识别或图像描述（Bianchi
    2018）。


    如你所见，在图5.2中，有一个额外的元素表示为W。W表示每个单元有三组权重，一组用于输入（X），另一组用于前一时间步的输出（H），还有一组用于当前时间步的输出（Y）。这些权重值由训练过程确定，可以通过应用一种称为梯度下降的流行优化技术来识别。


    简单来说，梯度是函数的斜率，可以定义为一组参数对其输入的偏导数。梯度是用于更新神经网络权重的值：函数代表我们想要使用神经网络解决的问题，并选择适当的参数来更新这些神经网络权重。为了计算梯度下降，我们需要计算损失函数及其相对于权重的导数。我们从函数上的一个随机点开始，沿着函数梯度的负方向移动，以达到函数值最小的点（Zhang
    et al. 2019）。


    在图5.2中，我们似乎对输入序列中的不同项目应用了相同的权重。这意味着我们跨输入共享参数。如果我们不能跨输入共享参数，那么RNN就变成了一个普通的神经网络，其中每个输入节点都需要自己的权重。


    相反，RNN可以利用其隐藏状态属性，将一个输入与下一个输入联系起来，并在串行输入中组合此输入连接。


    尽管潜力巨大，RNN也有一些局限性，因为它们存在短期记忆问题。例如，如果输入序列足够长，它们无法将信息从早期时间步传递到后期时间步，并且在反向传播过程中经常忽略序列开头的重要信息。我们将此问题称为*梯度消失问题*，如图5.3所示。


    在反向传播期间，循环神经网络会遭受此问题，因为梯度在随时间反向传播时会减小。如果梯度值变得极小，它就无法对网络学习过程做出贡献。LSTM通过引入对RNN架构的更改来解决这个问题，这些更改涉及它们如何使用输入计算输出和隐藏状态：具体来说，LSTM在架构中引入了额外的元素，称为*门*和*单元状态*。LSTM有多种变体，我们将在下一节中更详细地讨论它们。


    ![](img/fd006a6c056e5cf905b5150f958ed477_166_0.png)


    ## 长短期记忆


    LSTM能够学习长期依赖性，这是在需要建模时间序列数据时的一项有用能力。如前一节所述，LSTM有助于保留可以通过时间和层反向传播的误差，而不会丢失重要信息的风险：LSTM具有称为门和单元状态的内部机制，可以调节信息流（Zhang
    et al. 2019）。


    单元决定存储和释放什么、多少以及何时存储和释放信息：它们通过迭代猜测、反向传播误差和通过梯度下降调整权重的过程来学习何时允许信息进入、离开或被删除。图5.4说明了信息如何流经单元并由不同的门控制。'

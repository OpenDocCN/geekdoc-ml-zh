    \ which is another foundational cloud resource that represents a collection of\
    \ trials (individual model runs).\n    - `Run`, which represents a single trial\
    \ of an experiment.\n    - `Model`, which is used for working with cloud representations\
    \ of the machine learning model.\n    - `ComputeTarget`, `RunConfiguration`, `ScriptRunConfig`,\
    \ which are abstract parent classes for creating and managing compute targets.\
    \ A compute target represents a variety of resources where you can train your\
    \ machine learning models.\n    - `Image`, which is abstract parent class for\
    \ packaging models into container images that include the runtime environment\
    \ and dependencies.\n    - `Webservice`, which is the abstract parent class for\

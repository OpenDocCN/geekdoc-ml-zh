    By leveraging this additional knowledge, such as hour, month, and day of week
    values, data scientists can gain additional insights on their data and on the
    relationship between the input features and the output feature and eventually
    build a better model for their time series forecasting solutions. Here are some
    other examples of features that can be built and generate additional and important
    information:


    +   - Weekend or not

    - Minutes in a day

    - Daylight savings or not

    - Public holiday or not

    - Quarter of the year

    - Hour of day

    - Before or after business hours

    - Season of the year


    As you can observe from the examples above, date time features are not limited
    only to integer values. Data scientists can also build binary features, such as
    a feature in which, if the time stamp information is before business hours, its
    value equals 1; if the time stamp information is after business hours, its value
    equals 0. Finally, when dealing with time series data, it is important to remember
    all date and time properties that you can access from Timestamp or DatetimeIndex.
    (Table 3.2 in this chapter summarizes all of them for you).


    Date time features represent a very useful way for data scientists to start their
    feature engineering work with time series data. In the next section, I will introduce
    an additional approach to build input features for your data set: lag and window
    features. In order to build these features, data scientists need to leverage and
    extract the values of a series in previous or future periods.'

    # Keras


    Keras is a Python wrapper library capable of running on top of different deep
    learning tools, such as TensorFlow. Most importantly, Keras is an API that supports
    both convolutional networks and recurrent networks and runs seamlessly on central
    processing units (CPUs) and graphics processing units (GPUs). Moreover, Keras
    is developed using four guiding philosophies (Nguyen et al. 2019):


    +   - *User friendliness and minimalism* – Keras is an API designed with user
    experience in mind and offers consistent and simple APIs to build and train deep
    learning models.

    - *Modularity* – While using Keras, data scientists need to look at their model
    development cycle as a modular process, in which independent components (such
    as neural layers, cost functions, optimizers, activation functions) can be easily
    leveraged and combined in different ways to create new models.

    - *Easy extensibility* – Related to the previous principle, the third Keras’s
    principle is about providing users with the capability of extending and adding
    new modules to existing ones, in order to improve the model development cycle.

    - *Work with Python* – As mentioned previously, Keras is a Python wrapper library
    and its models are defined in Python code (keras.io).


    ![](img/fd006a6c056e5cf905b5150f958ed477_174_0.png)


    As illustrated in Figure 5.9, the first step in the development process of deep
    learning models with Keras is the definition of a model. The main type of model
    is a sequence of layers called a *Sequential*, which is a linear stack of layers.

    Once the model is defined, the second step is about compiling the model, which
    leverages the underlying framework to optimize the computation to be performed
    by your model. Once compiled, the model must be fit to data (third step in the
    development process of deep learning models with Keras). Finally, once it’s trained,
    you can use your model to make predictions on new data.'

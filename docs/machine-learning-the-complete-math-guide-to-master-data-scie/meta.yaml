    # Variance and Bias


    Bias is the simplifying premises a designer creates for a smoother understanding
    of the goal task. Parametric models have a high bias, making them easy to know
    and more straightforward to understand but less versatile in general. Low-bias
    ML algorithms are Decision Trees, k-Nearest Neighbors, and Auxiliary Vector Machines.
    Linear Regression, Conditional Logistic Regression, and Discriminant Analysis
    are all methods in high-bias ML.


    Variance is the rate that the goal role prediction might alter if specific training
    data were used. There is a large variance of non-parametric equations that provide
    a lot of variabilities. Logistic and Linear Regression, Linear Discriminant Analysis
    are techniques for learning machines with small'

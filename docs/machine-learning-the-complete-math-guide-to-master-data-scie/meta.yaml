- md: '# PART I


    ## Introduction


    Machine learning is a computer program that will learn without being explicitly
    programmed.


    Example:


    You train a computer to recognise cats and dogs in images. You give examples of
    images of cats and dogs. You tell the computer that the cats are on the left side
    of the images and the dogs are on the right side.


    Once you''ve done that, the computer creates some rules that distinguish cats
    and dogs.


    Tests, where the computer can tell the difference between cats and dogs and can''t
    tell the difference in other images, will be run. These tests will show that the
    computer is learning and its new rules are better than the ones it had at the
    start.


    ## What Happens When you Try to Teach a Machine to Do Mathematics?


    After a few years of training the machine, the only things the computer can do
    reliably are some elementary things like creating the rules of the game of chess.
    The best methods that we can follow and focus our time on when it comes to Machine
    Learning include:


    ## Logistic Regression


    Uses a neural network to produce a complex logistic regression system.


    ## Decision Trees


    Uses a set of rules to identify a specific tree that classifies the data into
    a pre-defined set of classes, e.g. a tree that classifies X people into 2 groups,
    e.g. either black or white.


    ## Naive Bayes


    ## Artificial Neural Networks


    Run on a computer, they have a set of nodes and a list of weights for each node
    which is stored and fed into the system along with the data. The nodes are connected
    to each other in some way, which is held in the model, and it uses that to see
    if it falls into a certain category or perspective. This approach often produces
    more non-linear results than logistic regression systems.


    ## Co-Regression Models


    A set of predictive models that can be used to build generalizations of data sets.


    ## Clustering Algorithms


    Data can be categorized into groups, e.g. computers can be grouped into departments,
    each department having a group of students. An algorithm, such as k-means clustering,
    uses the data to create the groups that result in the best performance.


    ## Why Python and Data Science?


    Python is a very powerful and easy-to-use programming language that can be used
    for many things. It is easy to move on to other things if you get stuck.


    ## Is it Possible to Apply Machine Learning to Aspects of Mathematics?


    Yes. Mathematics involves the manipulation of symbols (like numbers and letters).
    Data sets can be manipulated. Computers can manipulate data.


    ## Can MATLAB in a Computer Do Machine Learning?


    No. MATLAB is a very limited programming language, and it is only suitable for
    very specific things. People use MATLAB because they want to do those things it
    is good at.


    ## Is it Possible to Use MATLAB in a Computer to Do Machine Learning?


    Yes. It is possible to install MATLAB on a computer, install some libraries and
    modules to use MATLAB to do Machine Learning tasks, or install a C++ compiler
    so that the MATLAB program can be modified to do Machine Learning tasks.


    ## How Do You Teach a Computer to Do Machine Learning?


    There are many ways to teach a computer to do Machine Learning, and the best way
    will largely depend on the problem that needs to be solved. As a rule, a computer
    will need lots of examples of something for it to learn from. In Machine Learning,
    a computer will need examples of the data it is trying to classify and to predict.
    The best data set is from a data set that is at least as large as the data set
    that the computer will be predicting from.


    ## Can You Automate Machine Learning?


    Yes. Once a computer is taught how to do a Machine Learning task, it is possible
    to automate that task. Many websites run competitions that run Python scripts
    that perform Machine Learning tasks. Python on websites is usually written like
    an entry to a competition. Competition can be run any time there is a problem
    where a machine is needed to learn a problem and produce an output.


    ## Do Computers Ever Make Mistakes?


    Machines are logical and follow the rules they are given. They do not use judgement
    or language to solve problems. The answers produced are subject to the rules that
    it has been given.


    ## Who Is to Blame When a Machine Makes a Mistake?


    No one can be to blame when a machine makes a mistake. A machine cannot be to
    blame. A machine can only follow the rules that are given to it.


    ## Relation Between Big Data and Machine Learning (ML)


    Big Data is the data too complex and scattered in such a way, that it needs special
    algorithms and methodologies to process them, so that they can be properly analyzed.
    The traditional processing system cannot analyze extremely large volumes of data.
    Machine learning is a refined type of class of algorithms that will process big
    data. The algorithms like predictive analytics, Text algorithms, Social network
    mining, etc., play an important role in the Machine Learning process. Machine
    learning algorithms are based on the algorithms which are capable of analyzing
    large volumes of data, structured or unstructured. The process to use ML is to
    prepare the data by cleaning the data to prepare it for the machine learning algorithms,
    and train the machine learning algorithms to perform the algorithm by making effective
    combinations of the machine learning algorithms, pre-processing the data to form
    the input for the machine learning algorithms, passing the output obtained to
    the Machine Learning algorithms, and training them to perform the function. The
    ultimate objective is to obtain the best result in the best time, and these are
    achieved by creating effective algorithms.


    ## Uses of Machine Learning


    The applications of Machine Learning include real-time decisions, clinical medicine,
    fraud detection, search engine results, and oil analysis to name just a few.


    Implementing Machine Learning is a very powerful way of making predictions using
    the algorithms that follow. The algorithms developed have constantly provided
    better predictions over time so that the performance of the machine learning algorithms
    is constantly improving.


    The predictive power of those algorithms also enables them to be useful in a wide
    range of areas. The machine learning algorithms will work in all data types including
    text, images, audio, social media, and financial market data.


    Put another way, machine learning techniques are applied to end up with a solution
    that can reveal meaningful distinctions in data that the naked eye can’t see.


    Many different kinds of dependencies (or interrelationships) occur within the
    data that machine learning algorithms need for their learning. In many examples,
    this data is made up of large volumes of unstructured textual data. Machine Learning
    is improved by having all the data that can be used for the learning of the Machine
    Learning algorithms.


    Going forward, Machine learning has been going from strength to strength and it
    is expected that it will execute tasks that were once only the domain of specialists.


    Shared Sensing is an emerging service offered by a mix of established cloud providers
    and emerging smart city service providers. It refers to the ability for multiple
    smart city stakeholders to share live information from their networks, resources,
    and devices for the benefit of the wider community. This will bring numerous benefits,
    including operational efficiency.


    Modern companies recognize the importance of big data for their success, not only
    to compete with others but also to strengthen their business relation, attract
    customers. It has already changed the way how the business works, and consumers
    use the service or buy the products.


    For example, Amazon collects data from its customers to provide the most relevant
    result. It uses the data about what people search for, what they buy, where they
    live, etc. Some customers may not want their personal information disclosed as
    they may look like a potential threat to others. However, most customers accept
    the terms and conditions and agree to the usage of their data by Amazon.


    On the other hand, ISPs use the data from customers to produce revenue. Different
    ISPs have different ways to produce revenue from customers. For example, your
    web browser is required to use Google ads. ISPs also use the data from customers
    to provide different services. For example, some ISPs sell your data to market
    research companies or insurance companies. These data can be used to verify the
    email address of customers. This increases the reliability of the email address.


    The customers also use data in different ways. But, some people use it in an unethical
    way by sharing the data with others without the knowledge of others. As the number
    of people using data grows every day, the methods of sharing the data are improved
    to make it easier to share the data instantly.


    ## Actual Machine Learning Algorithms


    We began the process of Machine Learning by creating an algorithm that had the
    capability of learning. This created the pattern of breaking the problem into
    a series of smaller problems to be solved on the data which had been obtained.


    There are many techniques that can be applied to Machine Learning, and experts
    use different techniques for different data sets. The process begins with an algorithm
    that has the capability of learning to a degree.


    This enables the system to learn what works and what does not work. With each
    tiny step taken, the algorithm can learn if it was possible to align these two
    groups in a way that the machine learning systems could learn from.'
  mdcn: '# 第一部分


    ## 引言


    机器学习是一种无需显式编程即可自主学习的计算机程序。


    示例：


    你训练计算机识别图像中的猫和狗。你提供猫和狗的图像示例。你告诉计算机，猫在图像的左侧，狗在右侧。


    完成这些后，计算机会创建一些区分猫和狗的规则。


    随后会进行测试，让计算机判断猫和狗的区别，并在其他图像中无法区分。这些测试将表明计算机正在学习，并且其新规则比初始规则更优。


    ## 当你尝试教机器做数学时会发生什么？


    经过数年训练，计算机唯一能可靠完成的只是一些基础任务，例如创建国际象棋的游戏规则。在机器学习领域，我们能够遵循并投入时间的最佳方法包括：


    ## 逻辑回归


    使用神经网络构建复杂的逻辑回归系统。


    ## 决策树


    使用一组规则来识别特定的树结构，将数据分类到预定义的类别中。例如，一棵将X个人分为两组（如黑或白）的树。


    ## 朴素贝叶斯


    ## 人工神经网络


    在计算机上运行，它们包含一组节点和每个节点的权重列表，这些信息与数据一起存储并输入系统。节点以某种方式相互连接，这种连接关系保存在模型中，模型利用这些信息判断数据是否属于特定类别或视角。这种方法通常比逻辑回归系统产生更多非线性结果。


    ## 协同回归模型


    一组可用于构建数据集泛化模型的预测模型。


    ## 聚类算法


    数据可以被分组，例如计算机可以按部门分组，每个部门有一组学生。像K均值聚类这样的算法使用数据来创建能产生最佳性能的分组。


    ## 为什么选择Python和数据科学？


    Python是一种功能强大且易于使用的编程语言，可用于多种任务。如果遇到困难，很容易转向其他方向。


    ## 能否将机器学习应用于数学领域？


    可以。数学涉及符号（如数字和字母）的操作。数据集可以被操作。计算机可以处理数据。


    ## 计算机中的MATLAB能进行机器学习吗？


    不能。MATLAB是一种功能非常有限的编程语言，仅适用于非常特定的任务。人们使用MATLAB是因为他们想完成它擅长的工作。


    ## 能否在计算机中使用MATLAB进行机器学习？


    可以。可以在计算机上安装MATLAB，安装一些库和模块来使用MATLAB执行机器学习任务，或者安装C++编译器以便修改MATLAB程序来执行机器学习任务。


    ## 如何教计算机进行机器学习？


    教计算机进行机器学习的方法有很多，最佳方法在很大程度上取决于需要解决的问题。通常，计算机需要大量示例来学习。在机器学习中，计算机需要它试图分类和预测的数据示例。最佳数据集应至少与计算机将要预测的数据集一样大。


    ## 能否实现机器学习自动化？


    可以。一旦计算机被教会如何执行机器学习任务，就有可能实现该任务的自动化。许多网站举办竞赛，运行执行机器学习任务的Python脚本。网站上的Python通常像竞赛参赛作品一样编写。只要存在需要机器学习问题并产生输出的问题，随时都可以举办竞赛。


    ## 计算机会犯错吗？


    机器是逻辑化的，遵循给定的规则。它们不使用判断力或语言来解决问题。产生的答案受其给定规则的约束。


    ## 当机器犯错时该怪谁？


    当机器犯错时，没有人应该受到责备。机器不能被责备。机器只能遵循给定的规则。


    ## 大数据与机器学习的关系


    大数据是指过于复杂且分散的数据，需要特殊算法和方法来处理，以便进行适当分析。传统处理系统无法分析极大量的数据。机器学习是一种精细的算法类别，用于处理大数据。预测分析、文本算法、社交网络挖掘等算法在机器学习过程中扮演重要角色。机器学习算法基于能够分析大量结构化或非结构化数据的算法。使用机器学习的过程包括：清理数据以准备输入机器学习算法，训练机器学习算法通过有效组合来执行算法，预处理数据形成机器学习算法的输入，将获得的输出传递给机器学习算法，并训练它们执行功能。最终目标是在最佳时间内获得最佳结果，这通过创建有效算法来实现。


    ## 机器学习的应用


    机器学习的应用包括实时决策、临床医学、欺诈检测、搜索引擎结果和石油分析等，仅举几例。


    实施机器学习是一种使用以下算法进行预测的强大方式。开发的算法随着时间的推移不断提供更好的预测，使得机器学习算法的性能持续提升。


    这些算法的预测能力也使其在广泛领域中有用。机器学习算法适用于所有数据类型，包括文本、图像、音频、社交媒体和金融市场数据。


    换句话说，机器学习技术被应用于最终得到一个解决方案，该方案能够揭示肉眼无法看到的数据中有意义的区别。


    数据中存在许多不同类型的依赖关系（或相互关系），机器学习算法需要这些数据进行学习。在许多例子中，这些数据由大量非结构化文本数据组成。通过使用所有可用于机器学习算法学习的数据，机器学习得以改进。


    展望未来，机器学习一直在不断增强，预计它将执行曾经仅限于专家领域的任务。


    共享感知是由成熟的云提供商和新兴的智慧城市服务提供商共同提供的一项新兴服务。它指的是多个智慧城市利益相关者能够共享来自其网络、资源和设备的实时信息，以造福更广泛的社区。这将带来诸多好处，包括运营效率。


    现代公司认识到大数据对其成功的重要性，不仅是为了与他人竞争，也是为了加强业务关系、吸引客户。它已经改变了商业运作方式以及消费者使用服务或购买产品的方式。


    例如，亚马逊从其客户那里收集数据以提供最相关的结果。它使用关于人们搜索内容、购买物品、居住地等数据。一些客户可能不希望其个人信息被披露，因为他们可能被视为对他人的潜在威胁。然而，大多数客户接受条款和条件，并同意亚马逊使用其数据。


    另一方面，互联网服务提供商使用客户数据来产生收入。不同的互联网服务提供商有不同的方式从客户那里产生收入。例如，你的网络浏览器需要使用谷歌广告。互联网服务提供商也使用客户数据提供不同的服务。例如，一些互联网服务提供商将你的数据出售给市场研究公司或保险公司。这些数据可用于验证客户的电子邮件地址。这增加了电子邮件地址的可靠性。


    客户也以不同方式使用数据。但是，有些人以不道德的方式使用它，在他人不知情的情况下与他人分享数据。随着使用数据的人数每天都在增长，数据共享的方法也在改进，以便更容易即时共享数据。


    ## 实际的机器学习算法


    我们通过创建一个具有学习能力的算法开始了机器学习的过程。这形成了将问题分解为一系列较小问题并在已获得的数据上解决的模式。


    有许多技术可以应用于机器学习，专家们对不同的数据集使用不同的技术。该过程始于一个具有一定程度学习能力的算法。


    这使得系统能够学习什么有效，什么无效。随着每一步的推进，算法可以学习是否可能以机器学习系统能够学习的方式对齐这两个组。'

    science is also related to the cloud. The information is also stored in the cloud.
    So, this lesson will enlighten you with some facts about the "data in the Cloud."
    So let us understand what cloud means and how the data is stored and how it works.


    # The Cloud


    The cloud can be described as a global server network, each having different unique
    functions. Understanding networks is required to study the cloud. Networks can
    be simple or complex clusters of information or data.


    # Network


    As specified earlier, networks can have a simple or small group of connected computers
    or large groups of computers. The largest network can be the Internet. The small
    groups can be home local networks like Wi-Fi and Local Area Network limited to
    certain computers or locality. There are shared networks such as media, web pages,
    app servers, data storage, printers, and scanners. Networks have nodes, where
    a computer is referred to as a node. The communication between these computers
    is established by using protocols. Protocols are the intermediary rules set for
    a computer. Protocols'

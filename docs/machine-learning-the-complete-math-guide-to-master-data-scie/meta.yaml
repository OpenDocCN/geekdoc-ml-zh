    # Chapter 11. Data Science and the Cloud


    Data science is a mixture of many concepts. It is important to have some programming
    skills to become a data scientist. Even though you might not know all the programming
    concepts related to infrastructure, basic computer science concepts are a must.
    You must install the two most common and most used programming languages, i.e.,

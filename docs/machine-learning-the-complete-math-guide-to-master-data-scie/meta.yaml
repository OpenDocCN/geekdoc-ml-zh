    Python 库一起，允许神经网络调试人员、机器学习开发人员和深度学习科学家实时运行和测试他们的部分代码。这是一个好消息，因为这意味着这些专业人士不再需要等待整个代码完成并执行后才能检查代码是否有效，或者是否需要修复某些部分。



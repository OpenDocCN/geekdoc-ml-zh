    supervision.


    The models get to learn themselves through constant exposure to the correct patterns.
    You want to promote brand awareness; you could apply supervised learning where
    the model learns by using the product example and mastering its advertisement
    art.


    ## 5. Unsupervised Learning


    This learning style is the opposite of supervised learning. In this case, your
    models learn through observations. There is no supervision involved, and the datasets
    are not labeled; hence, there is no correct base value as learned from the supervised
    method.


    Here, through constant observations, your models will get to determine their right
    truths. Unsupervised models most often learn through associations between different
    structures and fundamental characteristics common to the datasets. Since unsupervised
    learning deals with similar groups of related datasets, they are useful in clustering.


    ## 6. Reinforcement Learning


    Reinforcement learning teaches your model to strive for the best result always.
    In addition to only performing its assigned tasks correctly, the model gets rewarded
    with a treat. This learning technique is a form of encouragement to your model
    to always deliver the correct action and perform it well or to the best of its
    ability. After some time, your model will learn to expect a present or favor,
    and therefore, the model will always strive for the best outcome.


    This example is a form of positive reinforcement. It rewards good behavior. However,
    there is another type of support called negative reinforcement. Negative reinforcement
    aims to punish or discourage bad behavior. The model gets reprimanded in cases
    where the supervisor did not meet the expected standards. The model learns that
    lousy behavior attracts penalties, and it will always strive to do good continually.



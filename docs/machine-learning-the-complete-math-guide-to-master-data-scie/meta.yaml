  md: '# Chapter 10. Actual Machine Learning Algorithms


    Decision trees are built similarly to support vector machines, meaning they are
    a category of supervised machine learning algorithms capable of solving both regression
    and classification problems. They are powerful and used when working with a great
    deal of data.


    You need to learn beyond the barebones basics so that you can process large and
    complex datasets. Furthermore, decision trees are used in creating random forests,
    which is arguably the most powerful learning algorithm.


    # An Overview on Decision Trees


    Decision trees are essentially a tool that supports a decision that will influence
    all the other decisions that will be made. This means that everything from the
    predicted outcomes to consequences and resource usage will be influenced somehow.
    Take note that decision trees are usually represented in a graph, which can be
    described as some kind of chart where the training tests appear as a node. For
    instance, the node can be the toss of a coin, which can have two different results.
    Furthermore, branches sprout to represent the results individually, and they also
    have leaves, which are the class labels. Now you see why this algorithm is called
    a decision tree. The structure resembles an actual tree. As you probably guessed,
    random forests are exactly what they sound like. They are collections of decision
    trees, but enough about them.


    Decision trees are one of the most powerful supervised learning methods you can
    use, especially as a beginner. Unlike other more complex algorithms, they are
    fairly easy to implement, and they have a lot to offer. A decision tree can perform
    any common data science task, and the results you obtain at the end of the training
    process are highly accurate. With that in mind, let’s analyze a few other advantages,
    as well as disadvantages, to gain a better understanding of their use and implementation.'
  merge: -1
  pgno: 79
- img_proc: true
  md: '# Let’s begin with the positives:


    +   1. Decision trees are simple in design and, therefore, easy to implement even
    if you are a beginner without a formal education in data science or machine learning.
    The concept behind this algorithm can be summarized with a sort of a formula that
    follows a common type of programming statement: If this, then that, else that.
    Furthermore, the results you will obtain are very easy to interpret, especially
    due to the graphic representation.

    2. The second advantage is that a decision tree is one of the most efficient methods
    in exploring, determining the most important variables, and discovering the connection
    between them. Also, you can build new features easily to gain better measurements
    and predictions. Don’t forget that data exploration is one of the most important
    stages in working with data, especially when there are many variables involved.
    You need to detect the most valuable ones to avoid a time-consuming process, and
    decision trees excel at this.

    3. Another benefit of implementing decision trees is that they are excellent at
    clearing up some of your data''s outliers. Don’t forget that outliers are noise
    that reduces the accuracy of your predictions. Besides, decision trees aren’t
    that strongly affected by noise. In many cases, outliers have such a small impact
    on this algorithm that you can even choose to ignore them if you don’t need to
    maximize the accuracy scores.


    Finally, there’s the fact that decision trees can work with both numerical as
    well as categorical variables. Remember that some of the algorithms we already
    discussed can only be used with one data type or the other. On the other hand,
    decision trees are proven to be versatile and handle a much more varied set of
    tasks.


    As you can see, decision trees are powerful, versatile, and easy to implement,
    so why should we ever bother using anything else? As usual, nothing is perfect,
    so let’s discuss the negative side of working with this type of algorithm:


    +   1. One of the biggest issues encountered during a decision tree implementation
    is overfitting. Please note that this algorithm sometimes creates very complicated
    decision trees with issues generalizing data due to their complexity. This is
    known as overfitting, and it is encountered when implementing other learning algorithms
    as well, however, not to the same degree. Fortunately, this doesn’t mean you should
    stay away from using decision trees. All you need to do is invest some time to
    implement certain parameter limitations to reduce overfitting.

    2. Decision trees can have issues with continuous variables. When continuous numerical
    variables are involved, the decision trees lose a certain amount of information.
    This problem occurs when the variables are categorized. If you aren’t familiar
    with these variables, a continuous variable can be a value set within a range
    of numbers. For example, suppose people between ages 18 and 26 are considered
    of student age. In that case, this numerical range becomes a continuous variable
    because it can hold any value between the declared minimum and maximum.'

    ## Python Package


    Files in python hold modules, and directories are stored in packages. A single
    package in Python holds similar modules. Therefore, different modules should be
    placed in different Python packages.


    ## Chapter 10. Actual Machine Learning Algorithms


    Decision trees are built similarly to support vector machines, meaning they are
    a category of supervised machine learning algorithms capable of solving both regression
    and classification problems. They are powerful and used when working with a great
    deal of data.


    You need to learn beyond the barebones basics so that you can process large and
    complex datasets. Furthermore, decision trees are used in creating random forests,
    which is arguably the most powerful learning algorithm.


    ## An Overview on Decision Trees


    Decision trees are essentially a tool that supports a decision that will influence
    all the other decisions that will be made. This means that everything from the
    predicted outcomes to consequences and resource usage will be influenced somehow.
    Take note that decision trees are usually represented in a graph, which can be
    described as some kind of chart where the training tests appear as a node. For
    instance, the node can be the toss of a coin, which can have two different results.
    Furthermore, branches sprout to represent the results individually, and they also
    have leaves, which are the class labels. Now you see why this algorithm is called
    a decision tree. The structure resembles an actual tree. As you probably guessed,
    random forests are exactly what they sound like. They are collections of decision
    trees, but enough about them.


    Decision trees are one of the most powerful supervised learning methods you can
    use, especially as a beginner. Unlike other more complex algorithms, they are
    fairly easy to implement, and they have a lot to offer. A decision tree can perform
    any common data science task, and the results you obtain at the end of the training
    process are highly accurate. With that in mind, let’s analyze a few other advantages,
    as well as disadvantages, to gain a better understanding of their use and implementation.


    ### Let’s begin with the positives:


    - 1. Decision trees are simple in design and, therefore, easy to implement even
    if you are a beginner without a formal education in data science or machine learning.
    The concept behind this algorithm can be summarized with a sort of a formula that
    follows a common type of programming statement: If this, then that, else that.
    Furthermore, the results you will obtain are very easy to interpret, especially
    due to the graphic representation.

    - 2. The second advantage is that a decision tree is one of the most efficient
    methods in exploring, determining the most important variables, and discovering
    the connection between them. Also, you can build new features easily to gain better
    measurements and predictions. Don’t forget that data exploration is one of the
    most important stages in working with data, especially when there are many variables
    involved. You need to detect the most valuable ones to avoid a time-consuming
    process, and decision trees excel at this.

    - 3. Another benefit of implementing decision trees is that they are excellent
    at clearing up some of your data''s outliers. Don’t forget that outliers are noise
    that reduces the accuracy of your predictions. Besides, decision trees aren’t
    that strongly affected by noise. In many cases, outliers have such a small impact
    on this algorithm that you can even choose to ignore them if you don’t need to
    maximize the accuracy scores.


    Finally, there’s the fact that decision trees can work with both numerical as
    well as categorical variables. Remember that some of the algorithms we already
    discussed can only be used with one data type or the other. On the other hand,
    decision trees are proven to be versatile and handle a much more varied set of
    tasks.


    As you can see, decision trees are powerful, versatile, and easy to implement,
    so why should we ever bother using anything else? As usual, nothing is perfect,
    so let’s discuss the negative side of working with this type of algorithm:


    - 1. One of the biggest issues encountered during a decision tree implementation
    is overfitting. Please note that this algorithm sometimes creates very complicated
    decision trees with issues generalizing data due to their complexity. This is
    known as overfitting, and it is encountered when implementing other learning algorithms
    as well, however, not to the same degree. Fortunately, this doesn’t mean you should
    stay away from using decision trees. All you need to do is invest some time to
    implement certain parameter limitations to reduce overfitting.

    - 2. Decision trees can have issues with continuous variables. When continuous
    numerical variables are involved, the decision trees lose a certain amount of
    information. This problem occurs when the variables are categorized. If you aren’t
    familiar with these variables, a continuous variable can be a value set within
    a range of numbers. For example, suppose people between ages 18 and 26 are considered
    of student age. In that case, this numerical range becomes a continuous variable
    because it can hold any value between the declared minimum and maximum.

    - 3. While some disadvantages can add to additional work in decision trees, the
    advantages still outweigh them by far.


    ## Classification and Regression Trees


    We discussed earlier that decision trees are used for both regression tasks as
    well as classification tasks. However, this doesn’t mean you implement the same
    decision trees in both cases. Decision trees need to be divided into classification
    and regression trees. They handle different problems; however, they are similar
    since they are both decision trees.


    Take note that classification decision trees are implemented when there’s a categorical
    dependent variable. On the other side, a regression tree is only implemented in
    a continuous dependent variable. Furthermore, in the case of a classification
    tree, the training data result is the mode of the total relevant observations.
    This means that any observations that we cannot define will be predicted based
    on this value, representing the observation we identify most frequently.


    Regression trees, on the other hand, work slightly differently. The value that
    results from the training stage is not the mode value but the total observations''
    mean. This way, the unidentified observations are declared with the mean value,
    which results from the known observations.


    Both types of decision trees undergo a binary split, however, going from the top
    to bottom. This means that the observations in one area will spawn two branches
    divided inside the predictor space. This is also known as a greedy approach because
    the learning algorithm seeks the most relevant variable in the split while ignoring
    the future splits that could lead to an even more powerful and accurate decision
    tree.


    As you can see, there are some differences as well as similarities between the
    two. However, what you should note from all of this is that the splitting affects
    the accuracy scores of the decision tree implementation. Decision tree nodes are
    divided into subnodes, no matter the type of tree. This tree split is performed
    to lead to a more uniform set of nodes.


    Now that you understand the fundamentals behind decision trees, let’s dig a bit
    deeper into overfitting.


    ## The Overfitting Problem


    You learned earlier that overfitting is one of the main problems when working
    with decision trees, and sometimes it can have a severe impact on the results.
    Decision trees can lead to a 100% accuracy score for the training set if we do
    not impose any limits. However, the major downside here is that overfitting creeps
    when the algorithm seeks to eliminate the training errors, increasing the testing
    errors. This imbalance, despite the score, leads to terrible prediction accuracy
    in the result. Why does this happen? In this case, the decision trees grow many
    branches, and that’s the cause of overfitting. To solve this use, you need to
    impose limitations on how much the decision tree can develop and how many branches
    it can spawn. Furthermore, you can also prune the tree to keep it under control,
    much like how you would do with a real tree to make sure it produces plenty of
    fruit.


    To limit the decision tree''s size, you need to determine new parameters during
    the tree''s definition. Let’s analyze these parameters:


    - 1. min_samples_split: The first thing you can do is change this parameter to
    specify how many observations a node will require to perform the splitting. You
    can declare anything with a range of one sample to maximum samples. Just keep
    in mind that to limit the training model from determining the connections that
    are very common to a particular decision tree, you need to increase the value.
    In other words, you can limit the decision tree with higher values.

    - 2. min_samples_leaf: This is the parameter you need to tweak to determine how
    many observations are required by a node, or in other words, a leaf. The overfitting
    control mechanism works the same way as for the sample split parameter.

    - 3. max_features: Adjust this parameter to control the features that are selected
    randomly. These features are the ones that are used to perform the best split.
    To determine the most efficient value, you should calculate the square root of
    the total features. Just keep in mind that the higher value tends to lead to the
    overfitting problem we are trying to fix in this case. Therefore, you should experiment
    with the value you set. Furthermore, not all cases are the same. Sometimes a higher
    value will work without resulting in overfitting.

    - 4. max_depth: Finally, we have the depth parameter, which consists of the decision
    tree''s depth value. To limit the overfitting problem, however, we are only interested
    in the maximum depth value. Take note that a high value translates to many splits,
    therefore a high amount of information. By tweaking this value, you will control
    how the training model learns the sample''s connections.


    Modifying these parameters is only one aspect of gaining control of our decision
    trees to reduce overfitting, boost performance, and accuracy.'

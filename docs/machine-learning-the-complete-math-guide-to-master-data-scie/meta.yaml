  md: '# Chapter 3. The Steps of Data Analysis


    With some of the ideas of a Data Analysis defined above to show us why this is
    so important, it is time for us to look at some of the steps that are so important
    to this process. When we know a bit more about some of the steps of Data Analysis
    and what we can do with it, we are going to find why we should use this method
    of learning from Big Data and then ensuring that your business will be able to
    use this information to get further ahead of the competition.


    For most businesses, there isn’t going to be any problem with a lack of information.
    These businesses will suffer from having too much information to handle, and they
    are not sure what they are supposed to do with it. This over-amount of data will
    make it harder to come up with a clear decision based on the data, and that can
    be a problem as well. With so much data to go and sort through, we need to get
    something more from the data.


    This means that we need to know that the data we have is right for the questions
    we want to answer. We need to know how we can draw some accurate conclusions from
    the data we are working with. Besides, we need data that will be able to take
    on and inform our decision-making process.


    In all, we need to make sure that we have the best kind of Data Analysis set up
    and ready to go. With the right process and tools set up for our Data Analysis,
    something that may have seemed like too much initially and like an overwhelming
    amount of stuff to go through will become a simple process that is clear and easy
    as possible.


    To help us get all of this done, we need to go through some of the basic steps
    needed to use data to make better decisions overall. There are many ways to divide
    this all up and make it work better for our needs, but we are going to divide
    this up into five steps that we can use and rely on to see some of the best results
    overall. Some of the steps that we can use to help make our Data Analysis more
    productive for better decision making in the company include:


    +   - Defining your question'
  merge: -1
  pgno: 119

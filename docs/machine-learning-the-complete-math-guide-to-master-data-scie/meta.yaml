    ## 为什么在数据科学中选择 Python 而非其他工具？


    Python 一直是数据科学家在多种场景下处理常规任务时首选的编程语言，也是业界广泛使用的基础数据分析框架之一。Python 非常适合那些需要将数值编程集成到输出系统或将数据整合到电子应用中的数据科学家。它同样适用于应用系统开发，这也是计算机科学家需要做的事情。


    如果应用程序以自然且标准的方式编写，就被称为“Pythonic”。除此之外，Python 因其某些特性而持续受到数据科学设计者的青睐。


    ### 易于学习


    Python 最吸引人的特点是，任何想学习它的人，即使是初学者，也能快速轻松地掌握。这就是为什么初学者在数据科学领域更倾向于选择 Python 的原因之一。这也非常适合那些不愿花太多时间思考的活跃人群。——尤其是，R
    语言在理解语法结构方面提供了比其他语言更简短的学习过程。


    ### 数据科学庞大的库


    使用 Python 进行数据科学的最大优势在于，Python 提供了广泛的资源库，用于数据挖掘和计算机处理。大多数使用 Python 的数据科学家认为，这种通用编程语言通过提供创新方法来解决以前看似无法解决的问题，从而应对了广泛的挑战。


    ### 可扩展性


    与所有其他语言（包括 R）一样，在灵活性方面，Python 表现卓越。它比 Stata 和 MATLAB 语言简单得多。这种可扩展性为数据科学家提供了灵活性和多种途径来处理各种问题——这也是
    YouTube 转向使用该语言的原因之一。Python 可以在各个行业中找到，促进了各种用例的快速应用开发。


    ### Python 庞大的社区


    Python 如此广为人知的一个原因是其社区文化。随着数据科学团队开始接受它，越来越多的人自愿构建新的数据科学库。这进一步推动了当今最先进的编程和计算技术的发展，这也解释了为什么许多人使用
    Python 进行数据科学。


    这个社区非常活跃，找到困难问题的解决方案从未如此简单。你只需要一个有效的网络输出，就可以快速找到特定问题的答案或与可能提供帮助的人交流。在 Stack Overflow
    和 Code Mentor 上，开发者甚至可以与同行建立联系。


    ### 为什么 Python 与数据科学如此契合？


    数据科学涉及从大型记录、数据库和数据存储中提取有用信息。这些结果通常是无序的，难以用任何合理的精度进行评估。机器学习可以连接不同的数据集，但它需要在算法中具备重要的容错性和鲁棒性。Python
    通过作为一种通用编程语言来满足这一需求。它使你能够构建 CSV 性能的电子表格，以便快速读取结果。此外，还可以生成更复杂的文件输出，供机器学习集群进行处理。


    例如，气候预测基于一个世纪以来的天气报告历史测量数据。机器学习也可以基于历史天气模式使预测更加可靠。Python 能够做到这一点，因为代码执行高效且轻量级，同时功能多样。Python
    还支持结构化、函数式编程和面向对象模式，这意味着可以在任何地方找到实现。


    Python 包索引现在包含超过 100,000 个库，并且这个数字还在持续增长。如前所述，Python 提供了多个专注于数据科学的库。在 Google 上进行简单搜索，就能找到许多关于数据科学的“十大
    Python 库”列表。最常用的数据分析库可能是一个名为 pandas 的开源库。它是一套高度优化的应用程序，使 Python 的数据分析任务变得简单得多。


    无论专家希望用 Python 做什么，无论是规范性分析还是预测性因果分析，Python 都拥有执行各种强大功能的工具集。难怪数据科学家选择了 Python。


    ### 数据科学统计学习


    统计学习是一种基于统计的结果解释方法，分为无监督或有监督。


    解释统计学习的一种简单方法是评估预测变量（特征、自变量）与响应变量（因变量）之间的关系，并创建一个基于预测变量（X）预测响应变量（Y）的目标模型。


    ### 推断与预测


    在输入集 X 容易获取但输出 Y 未知的情况下，我们有时将 f 视为一个黑盒（不关心 f 的确切形式），只要它能为 Y 产生精确的预测。这就是预测。


    在某些情况下，我们想考虑当 X 变化时 Y 如何受到影响。在这种情况下，我们想估计 f，但我们的目标不是为 Y 生成预测。我们更感兴趣的是解释 X 和 Y
    之间的关系。但 f 不能被视为黑盒，因为我们需要知道其确切结构。这就是推断。在现实生活中，你会发现各种问题涉及假设环境、推断环境或两者的混合。


    ### 参数与非参数方法


    如果我们采用统计模型，并试图通过测量参数集合来近似 f，这种方法被称为参数方法。'

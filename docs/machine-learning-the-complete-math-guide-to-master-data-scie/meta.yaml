  md: '# The Overfitting Problem


    You learned earlier that overfitting is one of the main problems when working
    with decision trees, and sometimes it can have a severe impact on the results.
    Decision trees can lead to a 100% accuracy score for the training set if we do
    not impose any limits. However, the major downside here is that overfitting creeps
    when the algorithm seeks to eliminate the training errors, increasing the testing
    errors. This imbalance, despite the score, leads to terrible prediction accuracy
    in the result. Why does this happen? In this case, the decision trees grow many
    branches, and that’s the cause of overfitting. To solve this use, you need to
    impose limitations on how much the decision tree can develop and how many branches
    it can spawn. Furthermore, you can also prune the tree to keep it under control,
    much like how you would do with a real tree to make sure it produces plenty of
    fruit.


    To limit the decision tree''s size, you need to determine new parameters during
    the tree''s definition. Let’s analyze these parameters:


    +   1. min_samples_split: The first thing you can do is change this parameter
    to specify how many observations a node will require to perform the splitting.
    You can declare anything with a range of one sample to maximum samples. Just keep
    in mind that to limit the training model from determining the connections that
    are very common to a particular decision tree, you need to increase the value.
    In other words, you can limit the decision tree with higher values.

    2. min_samples_leaf: This is the parameter you need to tweak to determine how
    many observations are required by a node, or in other words, a leaf. The overfitting
    control mechanism works the same way as for the sample split parameter.

    3. max_features: Adjust this parameter to control the features that are selected
    randomly. These features are the ones that are used to perform the best split.
    To determine the most efficient value, you should calculate the square root of
    the total features. Just keep in mind that the higher value tends to lead to the
    overfitting problem we are trying to fix in this case. Therefore, you should experiment
    with the value you set. Furthermore, not all cases are the same. Sometimes a higher
    value will work without resulting in overfitting.

    4. max_depth: Finally, we have the depth parameter, which consists of the decision
    tree''s depth value. To limit the overfitting problem, however, we are only interested
    in the maximum depth value. Take note that a high value translates to many splits,
    therefore a high amount of information. By tweaking this value, you will control
    how the training model learns the sample''s connections.


    Modifying these parameters is only one aspect of gaining control of our decision
    trees to reduce overfitting, boost performance, and accuracy. The'

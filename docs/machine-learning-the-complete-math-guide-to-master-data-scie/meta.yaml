    ## 第 6 章：结合不同模型进行集成学习


    在做出重要决策时，我们通常倾向于综合多方意见，而不是只听一个人的声音或第一个发表意见的人。同样，考虑并尝试多种算法以找到最适合你数据的预测方法至关重要。在高级机器学习中，使用集成建模结合模型可能具有优势，它将输出合并以构建统一的预测模型。通过结合不同模型的输出（而不是依赖单一估计），集成建模有助于就数据的含义达成共识。聚合的估计通常也比任何单一技术更准确。然而，至关重要的是，集成模型要表现出差异性，以避免对相同的错误处理不当。


    在分类问题中，多个模型通过基于频率的投票系统合并为单一预测；在回归问题中，则通过数值平均来合并。集成模型也可以分为顺序或并行，以及同质或异质。


    让我们先看看顺序和并行模型。在顺序模型的情况下，通过给之前错误分类数据的分类器增加权重来减少模型的预测误差。梯度提升和 AdaBoost（专为分类问题设计）都是顺序模型的例子。相反，并行集成模型同时工作，并通过平均来减少误差。随机森林就是这种技术的一个例子。


    集成模型可以使用单一技术生成，具有多种变体，称为同质集成；也可以通过不同技术生成，称为异质集成。同质集成模型的一个例子是使用多个决策树形成单一预测（即 bagging）。同时，异质集成的一个例子是将
    k-means 聚类或神经网络与决策树算法结合使用。


    自然，选择互补的技术至关重要。例如，神经网络需要完整的数据进行分析，而决策树擅长处理缺失值。这两种技术结合在一起，比同质模型提供了额外的好处。神经网络准确预测了大多数提供了值的实例。决策树确保了使用神经网络时因缺失值而可能产生的“空”结果不会出现。


    虽然集成模型的性能在大多数情况下优于单一算法，但模型的复杂性和精密程度可能会带来潜在的缺点。集成模型触发了与单个决策树和一组树相同的权衡。例如，决策树的透明度和易于解释性被牺牲，以换取更复杂算法（如随机森林、bagging
    或 boosting）的准确性。在大多数情况下，模型的性能会胜出，但在为你的数据选择合适的算法时，可解释性是一个需要考虑的关键因素。


    在选择合适的集成建模技术方面，有四种主要方法：bagging、boosting、模型桶（a bucket of models）和 stacking。


    模型桶（A bucket of models）使用与异质集成技术相同的训练数据训练多个不同的算法模型。然后，它选择在测试数据上表现最准确的模型。


    Bagging，如我们所知，是使用同质集成的并行模型平均的一个例子，它利用随机抽取的数据并结合预测来设计统一的模型。


    Boosting 是一种流行的替代技术，它仍然是同质集成，但解决了前一次迭代的错误和错误分类的数据，从而产生顺序模型。梯度提升和 AdaBoost 都是 boosting
    算法的例子。


    Stacking 同时在数据上运行多个模型，并将这些结果结合起来产生最终模型。与 boosting 和 bagging 不同，stacking 通常结合来自不同算法（异质）的输出，而不是改变同一算法的超参数（同质）。此外，stacking
    不是使用平均或投票对每个模型赋予同等的信任，而是试图识别并强调表现良好的模型。这是通过在将输出推送到 level-1 模型之前，使用加权系统平滑基础层（称为
    level-0）模型的错误率来实现的。它们被合并并整合成最终预测。


    ![](img/23412eed8505cc23f9d39ecc95bd3976_61_0.png)


    虽然这种技术有时在工业界使用，但使用 stacking 技术的收益与复杂性水平相比是边际的，组织通常会选择 boosting 或 bagging 的简便性和效率。然而，stacking
    是像 Kaggle 挑战赛和 Netflix Prize 这样的机器学习竞赛的首选技术。Netflix 竞赛在 2006 年至 2009 年间举行，为能够显著改进
    Netflix 内容推荐系统的机器学习模型提供奖金。来自 BellKor''s Pragmatic Chaos 团队的获胜技术之一采用了线性 stacking，它使用不同的算法融合了数百个不同模型的预测。'

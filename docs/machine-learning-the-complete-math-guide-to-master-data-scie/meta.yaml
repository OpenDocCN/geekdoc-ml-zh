    库就是其中之一。这个库如此成功的一个关键原因是它完全符合 Python 风格，并且可以几乎毫不费力地构建你想要的神经网络模型。这是一个较新的深度学习库，但在该领域发展势头强劲。


    ## PyTorch 的起源



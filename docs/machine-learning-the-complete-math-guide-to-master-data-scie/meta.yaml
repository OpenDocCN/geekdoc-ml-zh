    \n（阿尔伯特·爱因斯坦）\n\n# 目录\n\n## 第一部分\n\n### 引言\n\n- 当你试图教机器做数学时会发生什么？\n- 逻辑回归\n- 决策树\n\
    - 朴素贝叶斯\n- 人工神经网络\n- 协回归模型\n- 聚类算法\n- 为什么选择Python和数据科学？\n- 机器学习能应用于数学的某些方面吗？\n\
    - 计算机中的MATLAB能进行机器学习吗？\n- 能否使用计算机中的MATLAB进行机器学习？\n- 如何教计算机进行机器学习？\n- 能实现机器学习自动化吗？\n\
    - 计算机会犯错吗？\n- 机器出错时谁该负责？\n- 大数据与机器学习的关系\n- 机器学习的应用\n- 实际的机器学习算法\n\n### 第1章 什么是机器学习？\n\
    \n1. 统计学研究\n2. 大数据分析\n3. 金融世界\n\n### 机器学习的好处\n\n1. 营销产品更轻松\n2. 机器学习有助于准确的医疗预测\n\
    3. 可以使数据录入更容易\n4. 有助于垃圾邮件检测\n5. 可以改善金融世界\n6. 可以使制造业更高效\n7. 它要求我们更好地理解客户\n\n- 监督式机器学习\n\
    - 无监督式机器学习\n- 强化机器学习\n\n### 第2章 赋予计算机从数据中学习的能力\n\n- 为什么选择Python进行机器学习？\n- 如何开始使用Python？\n\
    - Python语法\n- Python变量\n\n### 第3章 基本术语和符号\n\n- 机器学习的数学符号\n  - 代数\n  - 微积分\n  -\
    \ 线性代数\n  - 概率论\n  - 集合论\n  - 统计学\n- 机器学习使用的术语\n  1. 自然语言处理\n  2. 数据集\n  3. 计算机视觉\n\
    \  4. 监督学习\n  5. 无监督学习\n  6. 强化学习\n  7. 神经网络\n\n### 第4章 评估模型与预测未见数据实例\n\n- 为什么在数据科学中选择Python而非其他工具？\n\
    \  - 直接学习\n  - 数据科学庞大的库\n  - 可扩展性\n  - Python庞大的社区\n- 为什么Python和数据科学能很好地结合？\n\
    - 数据科学统计学习\n  - 推断与预测\n  - 参数与非参数函数\n- 模型可解释性与预测准确性\n- 模型准确性评估\n- 方差与偏差\n- 方差与偏差的关系\n\
    \n### 大数据与机器学习的关系\n\n### 第5章 构建良好的训练数据集\n\n- 导入数据集\n- 预览数据框\n- 查找行项\n- 形状\n- 列\n\
    - 描述\n- 散点图矩阵\n- 热力图\n\n### 第6章 结合不同模型进行集成学习\n\n### 第7章 将机器学习应用于情感分析\n\n1. 如何向外行解释自然语言处理？为什么难以实现？\n\
    2. 自然语言处理在机器学习中的用途是什么？\n3. 执行文本分类有哪些不同的步骤？\n4. 你对关键词归一化有什么理解？为什么需要它？\n5. 请谈谈词性标注。\n\
    6. 你听说过依存句法分析算法吗？\n7. 解释向量空间模型及其用途。\n8. 词频和逆文档频率是什么意思？\n9. 用简单的方式解释余弦相似度。\n10.\
    \ 解释N-Gram方法。\n11. 从句子“I Love New York Style Pizza”可以生成多少个3-Gram？\n12. 你听说过词袋模型吗？\n\
    \n### 第8章 条件或判断语句\n\n- If语句\n- If-Else语句\n- Elif语句\n- 控制流\n\n### 第9章 函数\n\n- 为什么用户定义的函数如此重要？\n\
    - 函数参数选项\n- 编写函数\n- Python模块\n- Python包\n\n### 第10章 实际的机器学习算法\n\n- 决策树概述\n- 分类与回归树\n\
    - 过拟合问题\n\n### 第11章 机器学习技术的应用\n\n- 虚拟个人助理\n- 驾驶时的预测\n- 视频监控\n- 社交媒体\n- 电子邮件垃圾邮件和恶意软件过滤\n\
    - 在线客户服务\n- 搜索引擎结果优化\n- 产品推荐\n- 在线欺诈检测\n- 预测分析\n  - 客户行为的预测分析\n  - 线索的能力和优先级排序\n\
    \  - 当前市场趋势的识别\n  - 客户细分与定位\n  - 营销策略的推进\n\n### 第12章 数据挖掘与应用\n\n- 数据挖掘如何工作？\n\
    - 不平衡数据集\n\n### 结论\n\n## 第二部分\n\n### 引言\n\n- Python编程的特点\n  - 简单的语言\n  - 可移植性\n\
    \  - 标准库\n  - 免费开源\n  - 下载和安装Python\n  - Python开发与应用\n  - Python变量\n  - Python中的变量命名\n\
    - 数据变量类型\n  - 整型\n  - 字符型\n  - 字节型\n  - 字符串\n  - Python调试\n\n### 第1章 关于数据分析\n\n\
    ### 第2章 为什么选择Python进行数据分析\n\n- Python如何帮助数据分析\n- Python如何融入数据分析\n\n### 第3章 数据分析的步骤\n\
    \n- 定义你的问题\n- 设置明确的度量标准\n- 收集数据\n\n### 第4章 库\n\n- Scikit – Learn\n- TensorFlow\n\
    - Theano\n- Pandas\n  - 图示解释\n    - 一维序列\n    - 二维数据框\n- Seaborn\n  - 图示说明\n-\
    \ NumPy\n- SciPy\n- Keras\n- PyTorch\n- Scrapy\n- Statsmodels\n\n### 第5章 预测分析\n\
    \n- 什么是预测分析\n\n### 第6章 结合库\n\n- PyTorch库\n- PyTorch的起源\n- 为什么在数据分析中使用PyTorch\n\
    - Pandas\n- 矩阵运算\n- 切片和索引\n\n### 第7章 机器学习与数据分析\n\n- 什么是机器学习\n- 决策树和随机森林\n- SciKit-Learn\n\
    - 线性回归\n- 支持向量机\n- K-means聚类\n\n### 第8章 应用\n\n- 安全\n- 交通\n- 危险和欺诈检测\n- 配送协调\n\
    - 客户互动\n- 城市规划\n- 医疗保健\n- 旅行\n- 计算机化广告\n\n### 第9章 使用Python进行数据可视化与分析\n\n- 海量数据\n\
    - 大数据的对立面\n- SAS\n- 大数据分析\n\n### 第10章 数据科学\n\n- 数据科学及其重要性\n- 信息技术的未来\n- 数据结构\n\
    - 数据结构的特点\n- 数据结构类型\n- 数据结构的使用\n- 使用Python对数据科学有多重要？\n- Python数据科学的用途\n\n### 第11章\
    \ 数据科学与云计算\n\n- 云计算\n- 网络\n- 云中的数据科学\n- 软件架构与质量属性\n- 在云中共享大数据\n- 云计算与大数据治理\n-\
    \ 数据云工具需要提供高价值数据\n\n### 结论"

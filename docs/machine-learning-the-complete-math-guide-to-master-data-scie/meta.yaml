    ## Chapter 11. Applications of the Machine Learning Technology


    ### Virtual Personal Assistants


    The most popular examples of virtual personal assistance are Siri and Alexa. These
    systems are capable of providing relevant information using simple voice commands.
    Machine learning is at the heart of these devices and systems. They collect and
    define the information generated with every user interaction and use it as training
    data to learn user preferences and provide an enhanced experience.


    ### Predictions While Driving


    Most of the vehicles today utilize GPS navigation services, which collects information
    such as our current location and driving speed on a centralized server that can
    generate a map of the current traffic. This helps in managing traffic and reducing
    congestion. With machine learning, the system can estimate the regions where and

  md: '+   - Setting up clear measurement

    - Collecting the data

    - Analyzing the data

    - Interpreting the results


    # Defining Your Question


    The first step that we need to undertake when working on Data Analysis is defining
    the main question that we would like to handle. You should not just randomly work
    with the data on hand and hope that it shows you something because it will get
    you lost and confused in the process. You need to have a clear picture of where
    you want to go and what you would like to learn from data, and then work from
    there.


    In your Data Analysis, you need to start with the right questions. Questions are
    important, but we need to make sure that they are concise, measurable, and clear.
    Design the questions to either qualify or disqualify some of the potential solutions
    you are looking for on a specific problem or opportunity.


    For example, you may want to start with a problem that you can clearly define.
    Maybe you are a government contractor, and you find that your costs are rising
    quite a bit. Because of this, you are no longer able to submit a competitive contract
    for some of the work that you are doing. You will want to go through with this
    and figure out how to deal with the business problem.


    # Setting up Clear Measurements


    The next thing that we need to be able to do here is to set up some clear priorities
    on your measurements; this is one that we will be able to break down into two
    subsets to help us out. The first part is that we need to decide what we want
    to measure, and then the second thing we need to decide is how to measure it.


    Then, we are going to get to the decision that we want to measure. When doing
    this, we need to make sure that we consider any of the objections, the reasonable
    ones, of stakeholders and others who are working with the company. They may be
    worried about what would happen if you reduced the staff, and then there was a
    big surge in demand shortly afterward, and you'
  merge: -1
  pgno: 120
- img_proc: true
  md: 'could not hire more people in the right amount of time.


    Once we are done with that first step, it is time for us to make some decisions
    on how to measure. Thinking about how we can measure the data that we have will
    be just as important here, especially before we go through the phase of collecting
    data because the measuring process will either back up our analysis or discredits
    it later on. There are frequently questions of different questions that you are
    going to ask in this stage, but some of the most important ones to consider will
    include:


    +   1. What is the time frame that we are looking at?

    2. What is the unit of measure that we are relying on?

    3. What factors are important to consider in all of this?


    # Collecting the Data


    After we have had some time to go through and define our big problem and then
    work on the measurements that we are going to use, it is time for us to move on
    to collecting the data. With the question defined and the measurement priorities
    set, it is now time for us to go through and collect the data. As we organize
    and collect the data, there are going to be many important points that we must
    keep in mind, which will include:


    +   1. Before you collect some new data, you need to determine what we need to
    work with. We can look through some of the existing databases and some of the
    existing sources that we have on hand. You need to go through and collect some
    data first because it is simple and easier and can save a lot of money. We can
    move out to some other sources later, as well, if we need more information.

    2. During this process, we also need to determine what naming system and file
    storing system we would like to use; this is going to make it easier for your
    team members to collaborate. This process will save some time and prevent members
    of your team from wasting time and money by collecting the same kind of information
    more than once.

    3. If you would like to gather up data through interviews and observations, you
    need to develop an interview template ahead of time. This will ensure that we
    can save some time and that some continuity goes on in this process.

    4. Finally, we need to keep the collected data that we have as organized as possible.
    We can work with a log with the collection dates and add in the notes about sources
    as you would like. This should also include some data normalization that you may
    have performed as well. This is going to be important because it will validate
    the conclusions that you make down the road.'
  merge: -1
  pgno: 121
- img_proc: true
  md: 'As you go through this process, we need to make sure that we are taking care
    of some of the data we are working with; this means that we need to get it all
    organized, the values handled, and the duplicates we took care of before you try
    to do some of the analysis we want to do.


    Since you are getting the data from different sources and working with data that
    may be incomplete and not perfect along the way, we need to be careful here. It
    is hard to know whether the data will be perfect or that you can use it the way
    you want. Besides, if the information is in the wrong format or brings some errors
    or missing values, it will be hard to get the algorithm to work.


    The first thing that we need to do with this is to ensure that the data is in
    the same format. Usually, the best way to handle this for us is to go through
    and put all of the information in a standardized database that we can look at.
    We can use this in our storage service and make sure that all of the data we bring
    is put through that database and ready to go.


    From there, we are tenable to focus on dealing with some of the errors found in
    that data. We want to make sure that the outliers, the missing values, and the
    duplicates are gone. For the most part, the outliers are things that you will
    need to ignore and get rid of. If there are a number of these, and they all end
    up in the same spot in the process, you should look at this to see what is going
    on and if this is new information that you should pay attention to. However, you
    will find that they are not worth your time, and most of these should just be
    ignored.


    From there, we are going to look at the missing values. When you get information
    from the real world, there will be times when there is a missing value in one
    of the parts you are working with. You can either delete these if there are just
    a few or go through and replace these missing values with the mean of the other
    values in this column or row. It is up to you what you would like to do with these
    missing values to ensure that your information is as accurate as possible.


    Finally, we need to deal with some of the duplicate values present in the data
    set. If any duplicate values show up in some of the data, we will find that this
    will skew a lot of the numbers that we have and the results that we will get.
    This is why we need to take care of them, so we can see the true values that'

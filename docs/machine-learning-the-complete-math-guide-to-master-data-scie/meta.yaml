    Pandas, we’ll now move on to generating visual summaries of the data using Seaborn
    and Matplotlib.


    ## Pairplots


    One of the most popular exploratory techniques for understanding patterns between
    two variables is the pairplot. A pairplot takes the form of a 2-D or 3-D grid
    of plots that plot variables against other variables taken from the dataframe,
    as shown in Figure 16.


    ```python

    sns.pairplot(df,vars=[''price'',''number_of_reviews'',''availability_365''])

    ```


    ```python

    import pandas as pd


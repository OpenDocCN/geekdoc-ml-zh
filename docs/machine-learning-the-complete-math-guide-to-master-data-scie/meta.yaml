- md: "# MACHINE LEARNING\n\n2 BOOKS IN 1\n\nThe complete Math Guide to\n**Master\
    \ Data Science with Python**\nand Developing Artificial Intelligence\n\nMatt Algore\n\
    \n# MACHINE LEARNING\n\nThe complete Math Guide to Master Data Science with Python\
    \ and Developing Artificial Intelligence\n\nMatt Algore\n\n# © COPYRIGHT 2021\
    \ – ALL RIGHTS RESERVED\n\nThe content contained within this book may not be reproduced,\
    \ duplicated or transmitted without direct written permission from the author\
    \ or the publisher.\nUnder no circumstances will any blame or legal responsibility\
    \ be held against the publisher, or author, for any damages, reparation, or monetary\
    \ loss due to information contained within this book. Either directly or indirectly.\n\
    \n# LEGAL NOTICE\n\nThis book is copyright protected. This book is only for personal\
    \ use. You cannot amend, distribute, sell, use, quote or paraphrase any part,\
    \ or the content within this book, without the consent of the author or publisher.\n\
    \n> Theory is when you know everything but nothing works. Practice is when everything\
    \ works but no one knows why. In our lab, theory and practice are combined: nothing\
    \ works and nobody knows why\n\n(Albert Einstein)\n\n# Table of Contents\n\n##\
    \ PART I\n\n### Introduction\n\n- What Happens When you Try to Teach a Machine\
    \ to Do Mathematics?\n- Logistic Regression\n- Decision Trees\n- Naive Bayes\n\
    - Artificial Neural Networks\n- Co-Regression Models\n- Clustering Algorithms\n\
    - Why Python and Data Science?\n- Is it Possible to Apply Machine Learning to\
    \ Aspects of Mathematics?\n- Can MATLAB in a Computer Do Machine Learning?\n-\
    \ Is it Possible to Use MATLAB in a Computer to Do Machine Learning?\n- How Do\
    \ You Teach a Computer to Do Machine Learning?\n- Can You Automate Machine Learning?\n\
    - Do Computers Ever Make Mistakes?\n- Who Is to Blame When a Machine Makes a Mistake?\n\
    - Relation Between Big Data and Machine Learning (ML)\n- Uses of Machine Learning\n\
    - Actual Machine Learning Algorithms\n\n### Chapter 1. What Is Machine Learning?\n\
    \n1. Research on Statistics\n2. An Analysis of Big Data\n3. The Financial World\n\
    \n### The Benefits of Machine Learning\n\n1. Marketing Products Are More Comfortable\n\
    2. Machine Learning Can Help with Accurate Medical Predictions\n3. Can Make Data\
    \ Entry Easier\n4. Helps with Spam Detection\n5. Can Improve the Financial World\n\
    6. Can Make Manufacturing More Efficient\n7. It Requires us with a Better Understanding\
    \ of the Customer\n\n- Supervised Machine Learning\n- Unsupervised Machine Learning\n\
    - Reinforcement Machine Learning\n\n### Chapter 2. Giving the Computers the Ability\
    \ to Learn From Data\n\n- Why Use Python for Machine Learning?\n- How to Get Started\
    \ with Python?\n- Python Syntax\n- Python Variables\n\n### Chapter 3. Basic Terminology\
    \ and Notations\n\n- Mathematical Notation for Machine Learning\n  - Algebra\n\
    \  - Calculus\n  - Linear Algebra\n  - Probability\n  - Set Theory\n  - Statistics\n\
    - Terminologies Used for Machine Learning\n  1. Natural Language Processing (NLP)\n\
    \  2. Dataset\n  3. Computer Vision\n  4. Supervised Learning\n  5. Unsupervised\
    \ Learning\n  6. Reinforcement Learning\n  7. Neural Networks\n\n### Chapter 4.\
    \ Evaluating Models and Predicting Unseen Data Instances\n\n- How Is Python Chosen\
    \ Over other Tools for Data Science?\n  - Direct Learning\n  - Data Science Vast\
    \ Libraries\n  - Expandable\n  - Colossal Community for Python\n- Why Python and\
    \ Data Science Mix Well?\n- Data Science Statistical Learning\n  - Inference and\
    \ Prediction\n  - Parametric and Non-Parametric Functions\n- Model Interpretability\
    \ and Prediction Accuracy\n- Model Accuracy Assessing\n- Variance and Bias\n-\
    \ Variance and Bias Relationship\n\n### Relation Between Big Data and Machine\
    \ Learning (ML)\n\n### Chapter 5. Building Good Training Datasets\n\n- Import\
    \ Dataset\n- Preview the Dataframe\n- Find Row Item\n- Shape\n- Columns\n- Describe\n\
    - Pairplots\n- Heatmaps\n\n### Chapter 6. Combining Different Models for Ensemble\
    \ Learning\n\n### Chapter 7. Applying Machine Learning to Sentiments Analysis\n\
    \n1. How Would you Explain NLP to a Layman? Why Is it Difficult to Implement?\n\
    2. What Is the Use of NLP in Machine Learning?\n3. What Are the Different Steps\
    \ in Performing Text Classification?\n4. What Do you Understand by Keyword Normalization?\
    \ Why Is it Needed?\n5. Tell me about Part-Of-Speech (POS) Tagging.\n6. Have you\
    \ Heard of the Dependency Parsing Algorithm?\n7. Explain the Vector Space Model\
    \ and its Use.\n8. What Do you Mean by Term Frequency and Inverse Document Frequency?\n\
    9. Explain Cosine Similarity in a Simple Way.\n10. Explain the N-Gram Method.\n\
    11. How Many 3-Grams Can Be Generated from this Sentence \"I Love New York Style\
    \ Pizza\"?\n12. Have you Heard of the Bag-Of-Words Model?\n\n### Chapter 8. Conditional\
    \ or Decisional Statements\n\n- The If Statement\n- The If-Else Statement\n- The\
    \ Elif Statements\n- Control Flow\n\n### Chapter 9. Functions\n\n- Why Are User-Defined\
    \ Functions so Important?\n- Options for Function Arguments\n- Writing a Function\n\
    - Python Modules\n- Python Package\n\n### Chapter 10. Actual Machine Learning\
    \ Algorithms\n\n- An Overview on Decision Trees\n- Classification and Regression\
    \ Trees\n- The Overfitting Problem\n\n### Chapter 11. Applications of the Machine\
    \ Learning Technology\n\n- Virtual Personal Assistants\n- Predictions While Driving\n\
    - Video Surveillance\n- Social Media\n- Email Spam and Malware Filtering\n- Online\
    \ Customer Service\n- Refinement of Search Engine Results\n- Product Recommendations\n\
    - Online Fraud Detection\n- Predictive Analytics\n  - Prescient Analysis for Customer\
    \ Behavior\n  - Capability and Prioritization of Leads\n  - Distinguishing Proof\
    \ of Current Market Trends\n  - Client Segmentation and Targeting\n  - Advancement\
    \ of Marketing Strategies\n\n### Chapter 12. Data Mining and Applications\n\n\
    - How Does Data Mining Work?\n- Unbalanced Data Set\n\n### Conclusion\n\n## PART\
    \ II\n\n### Introduction\n\n- Features of Python Programming\n  - Simple Language\n\
    \  - Portability\n  - Standard Libraries\n  - Free Open-Sources\n  - Downloading\
    \ and Installing Python\n  - Python Development and Application\n  - Python Variables\n\
    \  - Naming Variables in Python\n- Types of Data Variables\n  - Int\n  - Char\n\
    \  - Bytes\n  - Strings\n  - Python Debugging\n\n### Chapter 1. About Data Analysis\n\
    \n### Chapter 2. Why Python for Data Analysis\n\n- How Python Can Help With Data\
    \ Analysis\n- How Python Fits Into Data Analysis\n\n### Chapter 3. The Steps of\
    \ Data Analysis\n\n- Defining Your Question\n- Setting up Clear Measurements\n\
    - Collecting the Data\n\n### Chapter 4. Libraries\n\n- Scikit – Learn\n- TensorFlow\n\
    - Theano\n- Pandas\n  - Diagrammatic Explanations\n    - Series Dimensional\n\
    \    - Data Frames Dimensional\n- Seaborn\n  - Diagrammatic Illustrations\n- NumPy\n\
    - SciPy\n- Keras\n- PyTorch\n- Scrapy\n- Statsmodels\n\n### Chapter 5. Predictive\
    \ Analysis\n\n- What a Predictive Analysis Is\n\n### Chapter 6. Combining Libraries\n\
    \n- The PyTorch Library\n- The Beginnings of PyTorch\n- Reasons to Use PyTorch\
    \ With the Data Analysis\n- Pandas\n- Matrix Operations\n- Slicing and Indexing\n\
    \n### Chapter 7. Machine Learning and Data Analysis\n\n- What Machine Learning\
    \ Is\n- Decision Trees and Random Forests\n- SciKit-Learn\n- Linear Regression\n\
    - Support Vector Machines (SVM)\n- K-means Clustering\n\n### Chapter 8. Applications\n\
    \n- Security\n- Transportation\n- Danger and Fraud Detection\n- Coordination of\
    \ Deliveries\n- Client Interactions\n- City Planning\n- Medical Care\n- Travel\n\
    - Computerized Advertising\n\n### Chapter 9. Data Visualization and Analysis With\
    \ Python\n\n- Enormous Data\n- The Versus of Big information\n- SAS\n- Enormous\
    \ Data Analytics\n\n### Chapter 10. Data Science\n\n- Data Science and Its Significance\n\
    - Future of Information Technology\n- Information Structures\n- Highlights of\
    \ Information Structures\n- Information Structure Types\n- Usage of Information\
    \ Structures\n- How Critical Is the Use of Python for Data Science?\n- Python\
    \ Data Science Uses\n\n### Chapter 11. Data Science and the Cloud\n\n- The Cloud\n\
    - Network\n- Data Science in the Cloud\n- Software Architecture and Quality Attributes\n\
    - Sharing Big Data In The Cloud\n- Cloud And Big Data Governance\n- Need For Data\
    \ Cloud Tools To Deliver High Value Of Data\n\n### Conclusion"
  mdcn: "# 机器学习\n\n二合一\n**精通Python数据科学与人工智能开发**\n完整数学指南\n\n马特·阿尔戈尔\n\n# 机器学习\n\n精通Python数据科学与人工智能开发的完整数学指南\n\
    \n马特·阿尔戈尔\n\n# © 版权所有 2021 – 保留所有权利\n\n未经作者或出版商直接书面许可，不得复制、转载或传播本书所含内容。\n在任何情况下，出版商或作者均不对因本书所含信息直接或间接造成的任何损害、赔偿或金钱损失承担任何责任。\n\

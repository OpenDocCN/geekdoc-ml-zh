  mdcn: "## 第八章 条件或判断语句\n\n这些语句将是我们所编写代码的重要组成部分，因为它们将确保你的系统能够对用户提供的输入做出响应。很难预测用户将如何使用系统。然而，你可以设置一些你希望关注的条件，并在此基础上开发你的程序运行方式。\n\
    \n正如我们在这里可以想象的，程序员几乎不可能提前创建某些东西并猜测用户将向程序提供什么答案或输入。而且程序员也不可能在那里观察每个用户使用程序，这意味着他们需要使用条件语句。当这些语句正确设置时，它将确保程序正常运行并响应用户提供的任何信息。\n\
    \n有许多不同类型的程序能够很好地响应我们将在本指南中讨论的条件语句。这些语句使用起来相当简单，我们将看一些如何使用这些条件语句进行编码的示例。\n\n我们将探讨三种主要类型的条件语句：if\
    \ 语句、if-else 语句和 elif 语句。让我们看看每种语句是如何工作的，并使用这些条件语句。\n\n## If 语句\n\n正如我们提到的，有三种类型的条件语句我们可以探讨。我们需要首先研究的是\
    \ if 语句。在我们将花时间讨论的三种语句中，if 语句是最基本的。它们不会像其他选项那样被频繁使用，因为它们通常有些不尽如人意。然而，它们是学习这些条件语句是什么以及如何使用它们的良好跳板。\n\
    \n使用 if 语句时，程序仅设置为在用户提供符合我们预先设定条件的输入时才继续执行。如果我们从用户那里获得的输入不符合我们的条件，那么程序将直接停止，什么也不会发生。\n\
    \n正如我们已经看到的，这会带来一些问题，因为我们不希望程序在给出答案后就停止。它仍然应该提供我们需要的一些基础信息。\n\n使用此代码时会出现一些情况。如果用户进入程序并声明他们的年龄在\
    \ 18 岁以下，程序将显示列出的消息。用户可以阅读此消息并立即结束程序。\n\n但是，如果用户输入他们的年龄在 18 岁以上，事情可能会出错。这对用户来说是真实的，但由于它不符合你编码的条件。因此，程序会将其视为假。就像代码现在编写的那样，什么也不会发生，因为它没有设置来处理这种情况。每当用户输入超过\
    \ 18 岁的年龄时，他们只会看到一个空白屏幕。\n\n## If-Else 语句\n\n既然我们已经花了一些时间研究简单的 if 语句，现在是时候让我们转向\
    \ if-else 语句了。if 语句是练习编码的好方法，但在我们编程时需要使用这种语句的情况并不多。\n\n当你的用户使用程序时，无论他们使用什么输入，你都希望确保屏幕上显示一些内容。\n\
    \n如果你使用 if 语句，如上面的示例所示，用户输入一个答案（18 岁以上），使用我们之前的代码，屏幕将返回空白。这不是我们想看到的，所以我们需要转向 if-else\
    \ 语句，看看无论用户向程序输入什么信息，我们能做些什么。\n\nif-else 语句将为我们提供输出，并确保我们向用户提供这些输出，无论年龄或其他信息如何。使用上面的示例，如果用户进来说他们\
    \ 40 岁，那么代码仍然会响应它。\n\n有几个选项可以与此一起使用，但基于我们在 if 语句中讨论的投票选项的想法。\n\n使用此选项，你添加 else\
    \ 语句，它将涵盖所有不属于 18 岁以下的年龄。这样，如果用户确实将其列为他们的年龄，屏幕上仍然会为他们显示一些内容。这可以在你编写代码时为你提供更多自由，你甚至可以为此添加更多层次。如果你想将其划分为四到五个年龄组，每个组得到不同的响应，你只需添加更多\
    \ if 语句即可实现。else 语句在最后以捕获所有其他情况。\n\n例如，你可以采用上面的代码并询问用户他们最喜欢的颜色是什么。然后你可以使用 if 语句来涵盖一些主要颜色，如红色、蓝色、绿色、黄色、橙色、紫色和黑色。\n\
    \n如果用户输入其中一种颜色，那么相应的语句将显示在屏幕上。将添加 else 语句以帮助捕获用户可能尝试使用的任何其他颜色，例如粉色或白色。\n\n## Elif\
    \ 语句\n\n我们在此过程中可以使用的第三种条件语句被称为 elif 语句。这些将帮助我们在其他步骤的基础上增加另一个层次。然而，它们仍然将确保我们编写的代码尽可能简单。\n\
    \n我们可以在代码中创建尽可能多的 elif 语句，只要我们在最后添加 else 语句。else 语句确保我们可以处理用户输入的任何其他答案，即使是我们可能没有提前想到的那些。\n\
    \n使用 elif 语句时，它类似于给用户一个菜单供选择。你可以选择希望在菜单中包含多少个 elif 语句，类似于许多游戏中找到的那样。然后，用户可以选择他们想要使用的选项。然后你可以让特定的操作发生，或者在程序上显示一个自信的语句以满足你的需求。\n\
    \n使用 elif 语句需要注意的另一件事是，你可以根据代码的需要添加许多不同的选项。可以制作一个只有两三个项目的小菜单，也可以根据需要扩展到任意数量，以使代码正常工作。\n\
    \n你在此处使用的选项越少，你的代码编写就越容易，因此在确定需要多少选项时请记住这一点。\n\n现在我们对 elif 语句及其工作原理有了一些了解，让我们深入研究并查看一个你可以编写的好示例。打开你的编译器并输入以下代码：\n\
    \n```\nprint(\"Let's enjoy a Pizza! Ok, let's go inside Pizza hut!\")\nprint(\"\
    Waiter, Please select Pizza of your choice from the menu\")\npizzachoice = int(input(\"\
    Please enter your choice of Pizza:\"))\nif pizzachoice == 1:\n    print('I want\
    \ to enjoy a pizza Napoletana')\nelif pizzachoice == 2:\n    print('I want to\
    \ enjoy a pizza rustica')\nelif pizzachoice == 3:\n    print('I want to enjoy\
    \ a pizza capricciosa')\nelse:\n    print(\"Sorry, I do not want any of the listed\
    \ pizza's, please bring a Coca Cola for me.\")\n```\n\n使用此选项，用户可以选择他们想要享用的披萨类型，但你可以将相同的语法用于代码中需要的任何内容。如果用户在代码中输入数字\
    \ 2，他们将得到一份 pizza rustica。如果他们不喜欢任何选项，他们告诉程序他们想喝点东西，在这种情况下，是一杯可口可乐。\n\n## 控制流\n\
    \n程序中的控制流突出了程序执行的步骤顺序。在 Python 程序中，控制流通过函数调用、条件语句和循环来执行。在这里，我们将处理 if 语句、while\
    \ 循环和 for 循环。\n\n![](img/23412eed8505cc23f9d39ecc95bd3976_72_0.png)"

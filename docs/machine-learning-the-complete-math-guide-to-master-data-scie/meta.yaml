    Example of a pairplot grid based on three chosen variables


    Using a pairplot from Seaborn, we’ve plotted three chosen variables against each
    other, which helps us to understand relationships and variance between those variables.
    When plotted against other variables (multivariant), the visualization takes the
    form of a scatterplot, and when plotted against the same variable (univariant),
    a simple histogram is generated.


    ## Heatmaps


    Heatmaps are also useful for inspecting and understanding relationships between
    variables. The variables are structured as columns and rows on a matrix, with
    individual values represented as colors on a heat map.


    We can build a heatmap in Python using the corr (correlation) function from Pandas
    and visualize the results using a Seaborn heatmap.


    ```python

    df_corr = df.corr()


    sns.heatmap(df_corr,annot=True,cmap=''coolwarm'')

    ```



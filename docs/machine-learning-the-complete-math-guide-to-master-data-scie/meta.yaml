- md: "## Chapter 7. Applying Machine Learning to Sentiments Analysis\n\nNatural Language\
    \ Processing (NLP) is a widely used field within Artificial Intelligence, which\
    \ mainly involves the interactions between the human language and the computer.\
    \ You can find its applications in a large variety of areas such as Sentiment\
    \ analysis, Spam detecting, POS (Part-Of-Speech) Tagging, Text summarization,\
    \ Language translation, Chatbots, and so on.\n\n### 1. How Would you Explain NLP\
    \ to a Layman? Why Is it Difficult to Implement?\n\nNLP stands for Natural Language\
    \ Processing, the ability of a computer program to understand the human language.\
    \ It is an extremely challenging field for obvious reasons. NLP requires a computer\
    \ to understand what humans speak. But human speech is very often not precise.\
    \ Humans use slang, pronounce the words differently, and have the context in their\
    \ sentences, which is very hard for a computer to process correctly.\n\n### 2.\
    \ What Is the Use of NLP in Machine Learning?\n\nAt present, NLP is based on Deep\
    \ Learning. Deep Learning algorithms are a subset of Machine Learning, which needs\
    \ a large amount of data to learn high-level features from data independently.\
    \ NLP also works on the same approach, uses deep learning techniques to learn\
    \ human language, and improve upon itself.\n\n### 3. What Are the Different Steps\
    \ in Performing Text Classification?\n\nText classification is an NLP task used\
    \ to classify text documents into one or more categories. Classifying whether\
    \ an email is spam or not, analyzing a person’s sentiments from his post, etc.,\
    \ are text classification problems.\n\nA Text classification pipeline involves\
    \ the following steps in order:\n\n- A. Text cleaning\n- B. Text annotation to\
    \ create the features\n- C. Converting those features into actual predictors\n\
    - D. Using the predictors to train the model\n- E. Fine-tune the model to improve\
    \ its accuracy.\n\n### 4. What Do you Understand by Keyword Normalization? Why\
    \ Is it Needed?\n\nKeyword normalization, also known as text normalization, is\
    \ a crucial step in NLP. It is used to transform the keyword into its canonical\
    \ form, making it easier to process. It removes stop words such as punctuation\
    \ marks, words like \"a,\" \"an,\" \"the\" because these words generally do not\
    \ carry any weight. After that, it converts the keywords into their standard forms,\
    \ which improves text matching.\n\nFor instance, reducing all words to lower cases,\
    \ converting all tenses to simple present tense. So, if you have \"decoration\"\
    \ in one document and \"Decorated\" in the other, then both of them would be indexed\
    \ as \"decorate.\" Now, you can easily apply a text-matching algorithm on these\
    \ documents, and a query containing the keyword \"decorates\" would match with\
    \ both of the documents. Keyword normalization is an excellent means of reducing\
    \ dimensionality.\n\n### 5. Tell me about Part-Of-Speech (POS) Tagging.\n\nPart-of-speech\
    \ tagging is a process of marking the words in a given text as a part of speech,\
    \ such as nouns, prepositions, adjectives, verbs, etc. It is an extremely challenging\
    \ task because of its complexity and because the same word could represent a different\
    \ part of speech in different sentences.\n\nThere are generally two techniques\
    \ used to develop POS tagging algorithms. The first technique is stochastic, which\
    \ assumes that each word is known and can have a finite set of tags that are learned\
    \ during training. The second technique is rule-based tagging, which uses contextual\
    \ information to tag each word.\n\n### 6. Have you Heard of the Dependency Parsing\
    \ Algorithm?\n\nDependency Parsing algorithm is a grammar-based text parsing technique\
    \ used to detect noun phrases, noun phrases, subjects, and objects in the text.\
    \ \"Dependency\" implies the relations between the words in a sentence. There\
    \ are various methods to parse a sentence and analyze its grammatical structure.\
    \ Some of the standard methods include Shift-Reduce and Maximum Spanning Tree.\n\
    \n### 7. Explain the Vector Space Model and its Use.\n\nVector Space Model is\
    \ an algebraic model used to represent an object as a vector of identifiers. Each\
    \ object (such as a text document) is written as a vector of terms (words) present\
    \ in it with their weights.\n\nFor instance, you have a document \"d\" with the\
    \ text \"This is an amazing journal for the interview preparation.\"\n\nThe corresponding\
    \ vector for this document is:\n\nThere exist many ways to calculate these weights.\
    \ They can be as simple as just the frequency (count) of the words in a document.\
    \ Similarly, any query is also written in the same fashion. The vector operations\
    \ are used to compare the query with the documents to find the most relevant documents\
    \ that satisfy the query.\n\nVector Space Model is used extensively in the fields\
    \ of Information Retrieval and Indexing. It provides a structure to the unstructured\
    \ datasets, thereby making it easier to interpret and analyze them.\n\n### 8.\
    \ What Do you Mean by Term Frequency and Inverse Document Frequency?\n\nTerm Frequency\
    \ (tf) is the number of times a term occurs in a document divided by the total\
    \ number of terms in that document.\n\nInverse Document Frequency (idf) is a measure\
    \ of how relevant is the term across all the documents. Mathematically, it is\
    \ logarithmic (total number of documents divided by the number of documents containing\
    \ the term).\n\n### 9. Explain Cosine Similarity in a Simple Way.\n\nCosine similarity\
    \ captures the similarity between two vectors. As explained in the vector space\
    \ model, each document and the query is written as a vector of terms.\n\nThe cosine\
    \ is calculated for the query vector with each document, which is the average\
    \ cosine between two vectors. The resulting cosine value represents the similarity\
    \ of the document with the given query. If the cosine value is 0, then there is\
    \ no similarity at all, and if it is 1, then the document is the same as the query.\n\
    \n### 10. Explain the N-Gram Method.\n\nSimply put, an N-gram is a contiguous\
    \ sequence of n items in the given text. N-gram method is a probabilistic model\
    \ used to predict an item in a sequence based on the previous n-1 items. You can\
    \ choose the items to be either the words, phrases, etc. If n is 1, then it is\
    \ called 1-gram; for n = 2, it is 2-gram or bigram.\n\nN-grams can be used for\
    \ approximate matching. Since they convert the sequence of items into a set of\
    \ n-grams, you can compare one sequence with another by measuring the percentage\
    \ of common n-grams in both of them.\n\n### 11. How Many 3-Grams Can Be Generated\
    \ from this Sentence \"I Love New York Style Pizza\"?\n\nBreaking the given sentence\
    \ into 3-grams, you get:\n\n- A. I love New\n- B. love New York\n- C. New York\
    \ style\n- D. York-style pizza\n\n```python\n# We will use the CountVectorizer\
    \ package to demonstrate how to use N-Gram with Scikit-Learn.\n\n# CountVectorizer\
    \ converts a collection of text documents to a matrix of token counts.\n\n# In\
    \ our case, there is only one document.\n\nfrom sklearn.feature_extraction.text\
    \ import CountVectorizer\n\n# N-gram_range specifies the lower and upper boundary\
    \ on the range of N-gram tokens\n\n# to be extracted. For our example, the range\
    \ is from 3 to 3.\n\n# We have to specify the token pattern because, by default,\
    \ CountVectorizer treats single character words as stop words.\n\nvectorizer =\
    \ CountVectorizer(ngram_range=(3, 3),\n                            token_pattern\
    \ = r\"(?u)\\b\\w+\\b\",\n                            lowercase=False)\n\n# Now,\
    \ let's fit the model with our input text\n\nvectorizer.fit([\"I love New York\
    \ style pizza\"])\n\n# This will populate vectorizer's vocabulary_ dictionary\
    \ with the tokens.\n\n# Let's see the results of this vocabulary\n\nprint(vectorizer.vocabulary_.keys())\n\
    ```\n\n### 12. Have you Heard of the Bag-Of-Words Model?\n\nThe Bag-of-Words model\
    \ is a widespread technique used in Information Retrieval and Natural Language\
    \ Processing. It is also known as the Vector Space Model, described in detail\
    \ in question 6 above. It uses the frequency of occurrence of the words in a document\
    \ as the feature value.\n\nOne of the limitations of this method is that it does\
    \ not take into account the order of the words in a document, due to which you\
    \ cannot infer the context of the words. For instance, if you take these two sentences,\
    \ \"Apple has become a trillion-dollar company\" and \"You should eat an apple\
    \ every day,\" the Bag-of-Words model won’t be able to differentiate between Apple\
    \ as a company and Apple as a fruit. To address this limitation, you can use the\
    \ N-gram model, which stores the words' spatial information. Bag-of-Words is a\
    \ particular case of the N-gram method with n=1."
  mdcn: "## 第7章 将机器学习应用于情感分析\n\n自然语言处理（NLP）是人工智能中一个应用广泛的领域，主要涉及人类语言与计算机之间的交互。它的应用范围非常广泛，例如情感分析、垃圾邮件检测、词性标注、文本摘要、语言翻译、聊天机器人等等。\n\
    \n### 1. 你如何向一个外行解释NLP？为什么它难以实现？\n\nNLP代表自然语言处理，即计算机程序理解人类语言的能力。由于显而易见的原因，这是一个极具挑战性的领域。NLP要求计算机理解人类所说的话。但人类的言语往往并不精确。人们使用俚语，发音各异，并且句子中包含语境，这些都使得计算机很难正确处理。\n\
    \n### 2. NLP在机器学习中的用途是什么？\n\n目前，NLP基于深度学习。深度学习算法是机器学习的一个子集，它需要大量数据来独立地从数据中学习高级特征。NLP也采用同样的方法，使用深度学习技术来学习人类语言，并不断自我改进。\n\
    \n### 3. 执行文本分类有哪些不同的步骤？\n\n文本分类是一项NLP任务，用于将文本文档分类到一个或多个类别中。例如，判断一封电子邮件是否是垃圾邮件，分析一个人帖子中的情感等，都属于文本分类问题。\n\
    \n一个文本分类流程通常按以下顺序包含以下步骤：\n\n- A. 文本清洗\n- B. 文本标注以创建特征\n- C. 将这些特征转换为实际的预测变量\n\
    - D. 使用预测变量训练模型\n- E. 微调模型以提高其准确性。\n\n### 4. 你如何理解关键词规范化？为什么需要它？\n\n关键词规范化，也称为文本规范化，是NLP中的一个关键步骤。它用于将关键词转换为其规范形式，使其更易于处理。它会移除停用词，如标点符号，以及\"\
    a\"、\"an\"、\"the\"等词，因为这些词通常不携带任何重要信息。之后，它会将关键词转换为它们的标准形式，从而提高文本匹配度。\n\n例如，将所有单词转换为小写，将所有时态转换为一般现在时。因此，如果你在一个文档中有\"\
    decoration\"，在另一个文档中有\"Decorated\"，那么它们都会被索引为\"decorate\"。现在，你可以轻松地对这些文档应用文本匹配算法，包含关键词\"\
    decorates\"的查询将与这两个文档都匹配。关键词规范化是降低维度的一种极好方法。\n\n### 5. 请谈谈词性标注。\n\n词性标注是一个将给定文本中的单词标记为词性（如名词、介词、形容词、动词等）的过程。由于其复杂性，以及同一个词在不同的句子中可能代表不同的词性，这是一项极具挑战性的任务。\n\
    \n通常有两种技术用于开发词性标注算法。第一种是随机方法，它假设每个单词是已知的，并且可以有一组在训练期间学习到的有限标签。第二种是基于规则的标注，它使用上下文信息来为每个单词打标签。\n\
    \n### 6. 你听说过依存句法分析算法吗？\n\n依存句法分析算法是一种基于语法的文本解析技术，用于检测文本中的名词短语、主语和宾语。\"依存\"指的是句子中单词之间的关系。有多种方法可以解析句子并分析其语法结构。一些标准方法包括移位-归约和最大生成树。\n\
    \n### 7. 解释向量空间模型及其用途。\n\n向量空间模型是一种代数模型，用于将对象表示为标识符的向量。每个对象（如文本文档）被写成一个由其中存在的术语（单词）及其权重组成的向量。\n\
    \n例如，你有一个文档\"d\"，文本为\"This is an amazing journal for the interview preparation.\"\
    \n\n该文档对应的向量是：\n\n计算这些权重的方法有很多。它们可以简单到仅仅是文档中单词的频率（计数）。同样，任何查询也以相同的方式书写。向量运算用于将查询与文档进行比较，以找到满足查询的最相关文档。\n\
    \n向量空间模型在信息检索和索引领域被广泛使用。它为非结构化数据集提供了一种结构，从而使其更易于解释和分析。\n\n### 8. 什么是词频和逆文档频率？\n\
    \n词频（tf）是一个术语在文档中出现的次数除以该文档中的术语总数。\n\n逆文档频率（idf）是衡量一个术语在所有文档中相关性的指标。从数学上讲，它是对数形式（文档总数除以包含该术语的文档数量）。\n\
    \n### 9. 用简单的方式解释余弦相似度。\n\n余弦相似度捕捉两个向量之间的相似性。如向量空间模型中所述，每个文档和查询都被写成一个术语向量。\n\n\
    计算查询向量与每个文档的余弦值，即两个向量之间的平均余弦值。得到的余弦值表示文档与给定查询的相似度。如果余弦值为0，则表示完全没有相似性；如果为1，则表示文档与查询相同。\n\
    \n### 10. 解释N-Gram方法。\n\n简单来说，N-gram是给定文本中n个项目的连续序列。N-gram方法是一种概率模型，用于根据前n-1个项目来预测序列中的下一个项目。你可以选择项目是单词、短语等。如果n=1，则称为1-gram；对于n=2，则是2-gram或二元语法。\n\
    \nN-gram可用于近似匹配。由于它们将项目序列转换为一组N-gram，你可以通过测量两个序列中共同N-gram的百分比来比较一个序列与另一个序列。\n\n\
    ### 11. 从句子\"I Love New York Style Pizza\"中可以生成多少个3-Gram？\n\n将给定句子分解为3-gram，你会得到：\n\
    \n- A. I love New\n- B. love New York\n- C. New York style\n- D. York-style pizza\n\
    \n```python\n# 我们将使用CountVectorizer包来演示如何在Scikit-Learn中使用N-Gram。\n\n# CountVectorizer将文本文档集合转换为令牌计数矩阵。\n\
    \n# 在我们的例子中，只有一个文档。\n\nfrom sklearn.feature_extraction.text import CountVectorizer\n\
    \n# N-gram_range指定了要提取的N-gram令牌范围的下限和上限。\n\n# 对于我们的示例，范围是从3到3。\n\n# 我们必须指定令牌模式，因为默认情况下，CountVectorizer将单字符词视为停用词。\n\
    \nvectorizer = CountVectorizer(ngram_range=(3, 3),\n                         \
    \   token_pattern = r\"(?u)\\b\\w+\\b\",\n                            lowercase=False)\n\
    \n# 现在，让我们用输入文本来拟合模型\n\nvectorizer.fit([\"I love New York style pizza\"])\n\n\
    # 这将用令牌填充vectorizer的vocabulary_字典。\n\n# 让我们看看这个词汇表的结果\n\nprint(vectorizer.vocabulary_.keys())\n\
    ```\n\n### 12. 你听说过词袋模型吗？\n\n词袋模型是信息检索和自然语言处理中广泛使用的一种技术。它也被称为向量空间模型，在上面第6个问题中有详细描述。它使用文档中单词的出现频率作为特征值。\n\
    \n这种方法的一个局限性是它没有考虑文档中单词的顺序，因此你无法推断单词的语境。例如，如果你取这两个句子：\"Apple has become a trillion-dollar\
    \ company\"和\"You should eat an apple every day\"，词袋模型将无法区分作为公司的Apple和作为水果的Apple。为了解决这个局限性，你可以使用N-gram模型，它存储了单词的空间信息。词袋模型是N-gram方法在n=1时的特例。"

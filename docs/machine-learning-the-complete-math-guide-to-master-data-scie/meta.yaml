    NLP 使你的机器能够听到你的自然（人类）输入，理解它，执行它，然后给出数据输出。该设备可以识别人类并进行适当的交互，或尽可能接近适当的交互。


    NLP 有五个主要阶段：机器翻译、信息检索、情感分析、信息提取，最后是问答。它始于人类查询，直接导致机器翻译，然后经过所有其他四个过程，最终以问题解释本身结束。你现在可以将这五个阶段分解为前面建议的子类别：



  md: '# 11.1 ANN: An Introduction


    Artificial neural networks (ANNs) are nonlinear empirical models which can capture
    complex relationships between input-output variables via supervised learning or
    recognize data patterns via unsupervised learning. Architecturally, ANNs were
    inspired by human brain and are a complex network of interconnected neurons as
    shown in Figure 11.1. An ANN consists of an input layer, a series of hidden layers,
    and an output layer. The basic unit of the network, neuron, accepts a vector of
    inputs from the source input layer or the previous layer of the network, takes
    a weighted sum of the inputs, and then performs a nonlinear transformation to
    produce a single real-valued output. Each hidden layer can contain any number
    of neurons. Infact, an ANN with just 1 hidden layer has the universal approximation
    property, i.e., it can approximate any continuous function with any given accuracy.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_245_0.png)


    The network shown in Figure 11.1 is an example of fully-connected feed-forward
    neural networks (FFNN), the most common type of ANN. In FFNN, signals flow in
    only one direction, from the input layer to the output layer via hidden layers,
    as opposed to the RNNs which contain feedback loops. In fully-connected networks,
    neurons between consecutive layers are connected fully pairwise and neurons within
    a layer are not connected.


    While there are different types of ANN architectures (and ML researchers keep
    coming up with new ones!), FFNNs, RNNs, and CNNs are the most common architectures.
    While we will study RNNs in the next chapter, in this chapter we will focus on
    FFNNs. CNNs are primarily employed for image processing and are not covered in
    this book.'
  merge: -1
  pgno: 245
- img_proc: true
  md: '# Deep learning


    The recent popularity of ANNs can be attributed to the successes with deep learning.
    Deep learning simply refers to machine learning with deep neural networks (DNNs)
    which are ANNs with two or more hidden layers (see Figure 11.2). While shallow
    networks, with large number of neurons, can theoretically model any complex function,
    deep networks need much fewer model parameters and hence, are theoretically faster
    to train. Moreover, DNNs enable bypassing manual feature engineering; the first
    few hidden layers implicitly generate features that are utilized by downstream
    layers.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_246_0.png)


    Although DNNs seem superior to shallow networks, until recently, there weren’t
    many applications of DNNs. DNNs suffered from the issue of vanishing and exploding
    gradients during model training. However, in recent years, several technical innovations
    have produced better nonlinear transformers (activation functions), initialization
    and regularization schemes, and, learning/optimization algorithms. These innovations
    have largely overcome the model training issues for DNNs and combined with the
    availability of cheap computing power and large amount of data have resulted in
    the AI revolutions that we are witnessing today.


    > A few words of caution: The power of DNNs should not make you undermine the
    importance of feature engineering. Explicit feature engineering contextualizes
    process data by considering the specific characteristics of the underlying process
    system. For example, for a time-series vibration data, feature engineering via
    frequency-domain transformation and binning can greatly help subsequent network
    training; without this, a DNN would require substantially large amount of training
    data to implicitly learn the features.'

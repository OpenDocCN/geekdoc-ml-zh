  md: '# Value function


    RL algorithms often make use of value functions. State value function, $V_{\mu}(s)$,
    gives the return an agent expects to receive from being in the state $s$ and acting
    according to some policy $\mu$.


    $$V_{\mu}(s) = E[R_t | s_t = s, \text{policy } \mu]$$


    State-action value function, $Q_{\mu}(s, a)$, is another useful function that
    gives the expected return from taking an arbitrary action (not necessarily following
    policy $\mu$) from state $s$ and then following policy $\mu$.


    $$Q_{\mu}(s, a) = E[R_t | s_t = s, a_t = a, \text{policy } \mu]$$


    When the optimal policy, $\mu^*$, is followed, the value functions are denoted
    as $V^*(s)$ and $Q^*(s,a)$. In above definitions, we take expectations ($E[.]$)
    of the returns because real-life environments are uncertain and stochastic, i.e.,
    taking an action $\mathbf{a}_t$ at state $\mathbf{s}_t$ can result in slightly
    different $\mathbf{s}_{t+1}$ in different iterations. This transition uncertainty
    can be denoted as the probability $P(s_{t+1} = s'' | s_t = s, a_t = a)$. Above
    definitions incorporate this transition probability during return computation.


    # Bellman equation


    The value functions can also be represented in a recursive form. Consider the
    optimal state function,


    $$V^*(s) = E[R_t | s_t = s, \mu^*]$$

    $$= E[\mathbf{r}_{t+1} + \gamma \mathbf{r}_{t+2} + \gamma^2 \mathbf{r}_{t+3} +
    \cdots | s_t = s, \mu^*]$$

    $$= E[\mathbf{r}_{t+1} + \gamma R_{t+1} | s_t = s, \mu^*]$$

    $$= E[\mathbf{r}_{t+1} + \gamma V^*(s_{t+1}) | s_t = s, \mu^*]$$


    The optimal state-action value can also be similarly re-written as


    $$Q^*(s, a) = E[\mathbf{r}_{t+1} + \gamma Q^*(s_{t+1}, \mu^*(s_{t+1})) | s_t =
    s, a_t = a]$$

    $$\text{or}$$

    $$Q^*(s, a) = E[\mathbf{r}_{t+1} + \gamma \max_{a''} Q^*(s_{t+1}, a'') | s_t =
    s, a_t = a]$$


    Note again that $s_{t+1} \sim P(s_{t+1} = s'' | s_t = s, a_t = a)$ and is sampled
    following the environment''s transition probability. The above recursive equations,
    also called Bellman equations, are central to several RL algorithms. Bellman equation
    simply states that the value of the current state (or state-action) is the sum
    of immediate reward and the value of whatever state the environment lands next.'

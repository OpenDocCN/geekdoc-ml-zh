    \n上述示例的优势在于，我们最终只需进行简单的线性拟合，而不是在 $y$ 和 $x$ 之间进行非线性拟合。这就是特征工程的力量。可以说，如果你能工程化出非常相关且信息丰富的特征，那么你的任务就完成了一半，这并不夸张。不幸的是，目前还没有明确的通用方法来进行有效的特征工程。这项任务是特定于系统的，需要领域知识。尽管如此，让我们看看一些常用的特征工程技术。\n\
    \n### 数学变换\n\n这些变换利用对数、平方、平方根、乘积、时间聚合（使用最小值、最大值、标准差）、正切、双曲正切等函数来创建自定义特征。如前面的示例所示，这些变换允许使用简单模型，同时使原始变量之间的有效关系更加复杂。由于选择合适的数学函数是最关键且在很大程度上仍然是手动任务，自动化特征工程（AFE）目前是机器学习中一个活跃的研究领域。通常，AFE\
    \ 技术涉及从常用的数学函数生成详尽的特征列表，然后执行变量选择以选择潜在有用的特征。然而，目前尚不存在普遍接受、通用适用的 AFE 方法，这使得你的领域知识指导下的特征工程变得非常重要！\n\
    \n### 独热编码\n\n大多数 ML 建模算法需要数值数据。但有时你可能会发现自己正在处理分类数据：例如，模型的一个输入变量可能包含诸如“工厂类型 A”、“工厂类型\

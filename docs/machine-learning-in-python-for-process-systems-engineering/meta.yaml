  md: '# # Chapter 8


    # ## Finding Groups in Process Data: Clustering & Mixture Modeling


    When exploring a dataset, one of the things that you should always do is to check
    if data shows presence of distinct clusters. Most industrial datasets exhibit
    multiple operating modes due to variations in production levels, feedstock compositions,
    ambient temperature, product grades, etc. and data-points from different modes
    tend to group into different clusters. Whether you are building a soft sensor
    or a monitoring tool, judicious incorporation of the knowledge of these data clusters
    into process models will lead to better performance and, alternatively, failure
    to do so will often lead to unsatisfactory results.


    In absence of specific process knowledge or when the number of variables is large,
    it is not trivial to find the number of clusters or to characterize the clusters.
    Fortunately, several methodologies are available which you can choose from for
    your specific solution.


    In this chapter, we will learn some of the popular clustering algorithms and understand
    their strengths and weaknesses. We will conclude by building a monitoring tool
    for a multimode semiconductor process. Specifically, the following topics are
    covered


    +   - Introduction to clustering

    - Finding groups using classical k-means clustering

    - Grouping arbitrarily shaped clusters using DBSCAN

    - Probabilistic clustering via gaussian mixture modeling

    - Process monitoring of multimode processes'
  merge: -1
  pgno: 184
- img_proc: true
  md: '# 8.1 Clustering: An Introduction


    Clustering is an unsupervised task of grouping data into distinct clusters such
    that the data-points within a cluster are more similar to each-other than the
    data-points in other clusters. In process systems, clustering occurs naturally
    due to multiple reasons. For example, in a power generation plant, production
    level changes according to the demand leading to significantly different values
    of plant variables with potentially different inter-variable correlations at different
    production levels. The multimode nature of data distribution causes problems with
    traditional ML techniques. To understand this, consider the illustrations in Figure
    8.1. In subfigure (a), data indicates 2 distinct modes of operation. From process
    monitoring perspective, it would make sense to draw separate monitoring boundaries
    around the two clusters; doing so would clearly identify the red-colored data-point
    as an outlier or a fault. The Conventional PCA-based monitoring, on the other
    hand, would fail to identify the outlier. In subfigure (b), the correlation between
    the variables is different in the two clusters. From soft sensing perspective,
    it would make sense to build separate models for the two clusters. The Conventional
    PLS model would give inaccurate results.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_185_0.png)


    Once the clusters have been characterized in the training data and cluster-wise
    models have been built, prediction for a new sample can be obtained by either
    only considering the cluster-model most suitable for the new sample or combining
    the predictions from all the models as shown in Figure 8.2. The decision fusion
    module can also take various forms. For example, for a process monitoring application,
    a simple fusion strategy could be to consider a new sample as a normal sample
    if atleast one of the cluster-models predict so. A different strategy could be
    to combine the abnormality metrics from all the models and make prediction based
    on this fused metric. Similarly, for soft sensing application, response variable
    prediction from individual models can be weighted and combined to provide final
    prediction.'
  merge: -1
  pgno: 185
- img_proc: true
  md: '![](img/ae65e737df4a9f5732c91f7aea579fc8_186_0.png)


    There are different clustering algorithms which primarily differ in the way the
    ‘similarity’ between the data-points is defined. The popular algorithms can be
    divided into the following four categories.


    +   - *Centroid-based algorithms*: In these algorithms, the similarity between
    data-points is quantified by the distance of the data-points from the centroid
    of the clusters. K-Means, Fuzzy C-Means models belong to this category.

    - *Distribution-based algorithms*: Here, similarity between data-points is quantified
    by computing the probabilities of the data-points belonging to the same underlying
    distribution. Gaussian mixture models (GMMs) are popular in this category.

    - *Density-based algorithms*: Density models find areas of high density of data
    in the multivariable space and assign data-points to different clusters/regions.
    DBSCAN and OPTICS are popular examples of density models.

    - *Connectivity-based algorithms*: In these models, similarity is quantified by
    directly measuring the distance between the data-points. Hierarchical clustering
    models belong to this category.


    > With so many clustering algorithms at disposal, it is easy to get confused about

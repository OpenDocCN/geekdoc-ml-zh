- md: "## Fault detection for test data\n\nLee et al.28 and Yin et al.29 have published\
    \ detailed accounts of process monitoring performances of several ML techniques\
    \ for TEP and have shown superior fault detection capability of ICA. We will try\
    \ to corroborate their findings for some of the faults. But, let us first learn\
    \ a few terms that are commonly used to evaluate performance of any monitoring\
    \ tool. The terms are fault detection rate (FDR) and false alarm rate (FAR).\n\
    \n$$\\text{FDR} = \\frac{\\text{Number of samples correctly flagged as faulty}}{\\\
    text{Total number of faulty samples}} \\times 100$$\n\n$$\\text{FAR} = \\frac{\\\
    text{Number of samples incorrectly flagged as faulty}}{\\text{Total number of\
    \ non-faulty samples}} \\times 100$$\n\nA well-designed monitoring tool has high\
    \ FDR and low FAR values. Low FDR and high FAR values are both undesirable because\
    \ while low FDR value leads to safety issues and economic losses due to delayed/no\
    \ abnormality detection, high FAR value leads to loss of user's confidence in\
    \ the tool and eventually tool's demise.\n\nLet us now use these terms to compare\
    \ the performances of PCA and ICA for detecting Faults 10 and 5. Figures 6.6 and\
    \ 6.7 show the ICA/PCA monitoring charts for these faults. For Fault 10, ICA gives\
    \ significantly higher FDR. There are many samples between 400 to 600 where PCA\
    \ metrics are below their control limits despite the presence of process abnormalities.\
    \ The performance difference is even more prominent for Fault 5 test data. Sample\
    \ 400 onwards PCA charts incorrectly indicate a normal operation although it is\
    \ known that the faulty condition remains till the end of the sampling period.\
    \ Another point to note is that both PCA and ICA have low FAR values as not many\
    \ samples before sample 160 violate the control limits. Here again ICA has lower/better\
    \ FAR values. Similar FAR behavior is observed for the non-faulty test dataset.\
    \ We have not shown FAR values, but you should compute them and confirm that ICA\
    \ gives lower FAR values.\n\n```python\n# define function to compute FDR or FAR\n\
    def compute_alarmRate(monitoring_stats, CLs):\n    \"\"\" calculate alarm rate\n\
    \n    parameters\n    ----------\n    monitoring_stats: numpy array of shape =\
    \ [n_samples, 3]\n    CLs: List of control limits\n\n    Returns\n    -------\n\
    \    alarmRate: float\n    \"\"\"\n    violationFlag = monitoring_stats > CLs\n\
    \    alarm_overall = np.any(violationFlag, axis=1) # violation of any metric =>\
    \ alarm\n    alarmRate = 100*np.sum(alarm_overall)/monitoring_stats.shape[0]\n\
    \n    return alarmRate\n\n# fetch test data and select data as done during training\n\
    TEdata_Fault_test = np.loadtxt('d10_te.dat')\n\nxmeas = TEdata_Fault_test[:,0:22]\n\
    xmv = TEdata_Fault_test[:,41:52]\ndata_Fault_test = np.hstack((xmeas, xmv))\n\n\
    # scale data\ndata_test_scaled = scaler.transform(data_Fault_test)\n\n# compute\
    \ statistics and draw charts\nICA_statistics_test = compute_ICA_monitoring_metrics(ica,\
    \ n_comp, data_test_scaled)\ndraw_ICA_monitoring_charts(ICA_statistics_test, [I2_CL,\
    \ Ie2_CL, SPE_CL], 'test')\n\n# compute FAR or FDR\nalarmRate = compute_alarmRate(ICA_statistics_test[160:,:],\
    \ [I2_CL, Ie2_CL, SPE_CL])\n                                # fault starts sample\
    \ 160 onwards\n```\n\nAlthough PCA gave poor performance compared to ICA for the\
    \ 2 test datasets, there is no general criteria that we could have used to predict\
    \ this. The monitoring performance depends on the specific system under study\
    \ and trial-and-error method is frequently employed for selection of a monitoring\
    \ algorithm.\n\nLike PCA and PLS, nonlinear and dynamic variants of ICA have also\
    \ been developed. The reader is encouraged to see the works of Lee et al.28 for\
    \ dynamic ICA and Lee et al.30 for nonlinear ICA.\n\n## 6.3 FDA: An Introduction\n\
    \nFisher Discriminant Analysis (FDA), also called linear discriminant analysis\
    \ (LDA), is a multivariate dimensionality reduction technique which maximizes\
    \ the ‘separation’ in the lower dimensional space between data belonging to different\
    \ classes. For conceptual understanding, consider the simple illustration in Figure\
    \ 6.8 where a 2D dataset (with 2 classes of data) has been projected onto 1D spaces\
    \ by FDA and PCA. The respective 1-D scores show that while the two classes of\
    \ data are well segregated in LD space, the segregation is very poor in PC space.\
    \ This observation was expected because PCA, while determining the projection\
    \ directions, does not consider information about different data classes. Therefore,\
    \ if your intention is to reduce dimensionality for subsequent data classification\
    \ and training data is labeled into different classes, then FDA is more suitable.\n\
    \nFigure 6.8: Simple illustration of FDA vs PCA. The arrows in the x1 vs x2 plot\
    \ show the direction vectors of 1st components of the corresponding methods\n\n\
    Due to the powerful data discrimination ability of FDA, it is widely used in process\
    \ industry for operating mode classification and fault diagnosis. Large-scale\
    \ industrial processes often experience different kinds of process issues/faults\
    \ and it is imperative to accurately identify the specific issue quickly during\
    \ online operations to minimize economic losses. During model training, FDA learns\
    \ from data collected from historical process failures (data from a specific process\
    \ fault form a class) to find the optimal projection directions and classify abnormal\
    \ process data into specific faults in real-time. We will study one such application\
    \ in this chapter.\n\n## Mathematical background\n\nTo facilitate data classification,\
    \ FDA not only maximizes the separation between the classes but also minimizes\
    \ the variation/scatter within each class. To see how this is achieved, let us\
    \ first consider a dataset matrix $X \\in \\mathbb{R}^{N \\times m}$ consisting\
    \ of $N$ samples, $N_1$ of which belong to class 1 ($\\omega_1$) and $N_2$ belong\
    \ to class 2 ($\\omega_2$). FDA seeks to find a projection vector $w \\in \\mathbb{R}^m$\
    \ such that the projected scalars/samples ($z = w^T x$) are maximally separated.\
    \ Let $\\tilde{\\mu}_1$ and $\\tilde{\\mu}_2$ denote the means of projected values\
    \ of classes 1 and 2, respectively\n\n$$\\tilde{\\mu}_i = \\frac{1}{N_i} \\sum_{z\
    \ \\in \\omega_1} z$$\n\nClass separation could be quantified as distance between\
    \ the projected means $|\\tilde{\\mu}_1 - \\tilde{\\mu}_2|$; this, however, is\
    \ not a robust measure as shown by the illustration below.\n\nTo quantify the\
    \ variability within class $\\omega_i$ we define a term called scatter, $\\tilde{s}_i^2$\n\
    \n$$\\tilde{s}_i^2 = \\sum_{z \\in \\omega_1} (z - \\tilde{\\mu}_i)^2$$\n\nThe\
    \ separation criterion is now defined as the normalized distance between the projected\
    \ means. This formulation seeks to find a projection where the class means are\
    \ far apart and samples from the same class are close to each other.\n\n$$J(w)\
    \ = \\frac{|\\tilde{\\mu}_1 - \\tilde{\\mu}_2|^2}{\\tilde{s}_1^2 + \\tilde{s}_2^2}$$\n\
    \nUsing the base relation $y = w^T x$ and straightforward algebraic manipulations$^{31}$,\
    \ one can equivalently represent the objective $J(w)$ as follows which also holds\
    \ for any $(p)$ number of data classes\n\n$$J(w) = \\frac{w^T S_b w}{w^T S_w w}\
    \ \\quad \\text{eq. 9}$$\n\n$\\mathbf{S}_b$ (between-class-scatter matrix) and\
    \ $\\mathbf{S}_w$ (within-class-scatter matrix) are defined as\n\n$$\\mathbf{S}_b\
    \ = \\sum_{j=1}^{p} N_j (\\boldsymbol{\\mu}_j - \\boldsymbol{\\mu}) (\\boldsymbol{\\\
    mu}_j - \\boldsymbol{\\mu})^T$$\n\n$$\\mathbf{S}_w = \\sum_{j=1}^{p} \\mathbf{S}_j$$\n\
    \n$$\\mathbf{S}_j = \\sum_{\\mathbf{x}_i \\in \\omega_1} (\\mathbf{x}_i - \\boldsymbol{\\\
    mu}_j)(\\mathbf{x}_i - \\boldsymbol{\\mu}_j)^T$$\n\nwhere, $\\boldsymbol{\\mu}\
    \ \\in \\mathbb{R}^m$ and $\\boldsymbol{\\mu}_j \\in \\mathbb{R}^m$ denote the\
    \ mean vectors of all the N samples and $N_j$ samples from $j^{th}$ class, respectively,\
    \ in the measurement space. The first FDA vector, $w_1$, is found by maximizing\
    \ $J(w)$ and the subsequent vectors are found by solving the same problem with\
    \ the added constraints of orthogonality to previously computed vectors. Note\
    \ that there can be at most $p-1$ FDA vectors. Alternatively, like PCA, the vectors\
    \ can also be computed as solutions of a generalized eigenvalue problem\n\n$$\\\
    mathbf{S}_w^{-1} \\mathbf{S}_b w = \\lambda w \\quad \\text{eq. 10}$$\n\nwhere\
    \ $\\lambda = J(w)$. Therefore, the eigenvalues ($\\lambda_s$) indicate the degree\
    \ of separability among the data classes when projected onto the corresponding\
    \ eigenvectors. The first discriminant/FDA vector/eigenvector corresponds to the\
    \ largest eigenvalue, the $2^{nd}$ FDA vector is associated with the $2^{nd}$\
    \ largest eigenvalue, and so on. Once the FDA vectors are determined, data-points\
    \ can be projected, and classification models can be built in the reduced FDA\
    \ space. Overall, FDA transformation from m dimensional space to $p-1$ dimensional\
    \ FDA space can be represented as\n\n$$Z = W_p X$$\n\nwhere $W_p \\in \\mathbb{R}^{m\
    \ \\times (p-1)}$ contains the $p-1$ FDA vectors as columns and $Z \\in \\mathbb{R}^{N\
    \ \\times (p-1)}$ is the data-matrix in the transformed space where each row is\
    \ the transformed sample. The transformed samples are optimally separated in the\
    \ FDA space."
  mdcn: "## 测试数据的故障检测\n\nLee等人28和Yin等人29已详细发表了多种机器学习技术在田纳西-伊士曼过程（TEP）中的过程监控性能，并展示了独立成分分析（ICA）卓越的故障检测能力。我们将尝试验证他们对部分故障的研究结果。但首先，让我们了解一些常用于评估任何监控工具性能的术语。这些术语是故障检测率（FDR）和误报率（FAR）。\n\
    \n$$\\text{FDR} = \\frac{\\text{正确标记为故障的样本数}}{\\text{故障样本总数}} \\times 100$$\n\n\
    $$\\text{FAR} = \\frac{\\text{错误标记为故障的样本数}}{\\text{非故障样本总数}} \\times 100$$\n\n\
    一个设计良好的监控工具应具有高FDR和低FAR值。低FDR和高FAR值都是不可取的，因为低FAR值会导致因延迟/未检测到异常而引发安全问题和经济损失，而高FAR值则会导致用户对工具失去信心，并最终使工具被淘汰。\n\
    \n现在，让我们使用这些术语来比较PCA和ICA在检测故障10和故障5时的性能。图6.6和图6.7展示了这些故障的ICA/PCA监控图。对于故障10，ICA给出了显著更高的FDR。在400到600之间有许多样本，尽管存在过程异常，但PCA指标仍低于其控制限。对于故障5的测试数据，性能差异更为明显。从样本400开始，PCA图表错误地指示操作正常，尽管已知故障状态一直持续到采样期结束。另一点需要注意的是，PCA和ICA的FAR值都很低，因为在样本160之前没有多少样本违反控制限。这里ICA的FAR值同样更低/更好。对于非故障测试数据集也观察到类似的FAR行为。我们没有展示FAR值，但你应该计算它们并确认ICA给出了更低的FAR值。\n\
    \n```python\n# define function to compute FDR or FAR\ndef compute_alarmRate(monitoring_stats,\
    \ CLs):\n    \"\"\" calculate alarm rate\n\n    parameters\n    ----------\n \
    \   monitoring_stats: numpy array of shape = [n_samples, 3]\n    CLs: List of\
    \ control limits\n\n    Returns\n    -------\n    alarmRate: float\n    \"\"\"\
    \n    violationFlag = monitoring_stats > CLs\n    alarm_overall = np.any(violationFlag,\
    \ axis=1) # violation of any metric => alarm\n    alarmRate = 100*np.sum(alarm_overall)/monitoring_stats.shape[0]\n\
    \n    return alarmRate\n\n# fetch test data and select data as done during training\n\
    TEdata_Fault_test = np.loadtxt('d10_te.dat')\n\nxmeas = TEdata_Fault_test[:,0:22]\n\
    xmv = TEdata_Fault_test[:,41:52]\ndata_Fault_test = np.hstack((xmeas, xmv))\n\n\
    # scale data\ndata_test_scaled = scaler.transform(data_Fault_test)\n\n# compute\
    \ statistics and draw charts\nICA_statistics_test = compute_ICA_monitoring_metrics(ica,\
    \ n_comp, data_test_scaled)\ndraw_ICA_monitoring_charts(ICA_statistics_test, [I2_CL,\
    \ Ie2_CL, SPE_CL], 'test')\n\n# compute FAR or FDR\nalarmRate = compute_alarmRate(ICA_statistics_test[160:,:],\
    \ [I2_CL, Ie2_CL, SPE_CL])\n                                # fault starts sample\
    \ 160 onwards\n```\n\n尽管PCA在这两个测试数据集上的表现不如ICA，但我们没有通用的标准来预测这一点。监控性能取决于所研究的具体系统，并且经常采用试错法来选择监控算法。\n\
    \n与PCA和PLS类似，ICA的非线性和动态变体也已开发出来。鼓励读者参阅Lee等人28关于动态ICA以及Lee等人30关于非线性ICA的著作。\n\n\
    ## 6.3 FDA：简介\n\nFisher判别分析（FDA），也称为线性判别分析（LDA），是一种多元降维技术，它在低维空间中最大化不同类别数据之间的“分离度”。为了概念性理解，请考虑图6.8中的简单示例，其中FDA和PCA将一个二维数据集（包含两类数据）投影到一维空间。相应的一维得分显示，虽然两类数据在LD空间中分离良好，但在PC空间中分离度很差。这一观察结果是预期的，因为PCA在确定投影方向时，并未考虑不同数据类别的信息。因此，如果你的目的是为后续数据分类进行降维，并且训练数据已标记为不同类别，那么FDA更为合适。\n\
    \n图6.8：FDA与PCA的简单示例。x1与x2图中的箭头显示了相应方法第一主成分的方向向量。\n\n由于FDA强大的数据区分能力，它在过程工业中被广泛用于操作模式分类和故障诊断。大规模工业过程经常经历各种过程问题/故障，在在线操作期间快速准确地识别具体问题以最小化经济损失至关重要。在模型训练期间，FDA从历史过程故障收集的数据中学习（来自特定过程故障的数据形成一个类别），以找到最佳投影方向，并将异常过程数据实时分类为特定故障。我们将在本章研究这样一个应用。\n\
    \n## 数学背景\n\n为了便于数据分类，FDA不仅最大化类别之间的分离度，还最小化每个类别内部的变异/离散度。为了了解这是如何实现的，让我们首先考虑一个数据集矩阵\
    \ $X \\in \\mathbb{R}^{N \\times m}$，它由 $N$ 个样本组成，其中 $N_1$ 个属于类别1（$\\omega_1$），$N_2$\
    \ 个属于类别2（$\\omega_2$）。FDA寻求找到一个投影向量 $w \\in \\mathbb{R}^m$，使得投影后的标量/样本（$z = w^T\
    \ x$）最大程度地分离。令 $\\tilde{\\mu}_1$ 和 $\\tilde{\\mu}_2$ 分别表示类别1和类别2投影值的均值\n\n$$\\\
    tilde{\\mu}_i = \\frac{1}{N_i} \\sum_{z \\in \\omega_1} z$$\n\n类别分离度可以量化为投影均值之间的距离\
    \ $|\\tilde{\\mu}_1 - \\tilde{\\mu}_2|$；然而，如下图所示，这不是一个稳健的度量。\n\n为了量化类别 $\\omega_i$\
    \ 内部的变异性，我们定义一个称为离散度的项 $\\tilde{s}_i^2$\n\n$$\\tilde{s}_i^2 = \\sum_{z \\in \\\
    omega_1} (z - \\tilde{\\mu}_i)^2$$\n\n分离准则现在定义为投影均值之间的归一化距离。该公式旨在找到一个投影，使得类别均值相距较远，而同一类别的样本彼此接近。\n\
    \n$$J(w) = \\frac{|\\tilde{\\mu}_1 - \\tilde{\\mu}_2|^2}{\\tilde{s}_1^2 + \\tilde{s}_2^2}$$\n\
    \n使用基本关系 $y = w^T x$ 和直接的代数运算$^{31}$，可以将目标函数 $J(w)$ 等效地表示如下，这也适用于任意 $(p)$ 个数据类别\n\
    \n$$J(w) = \\frac{w^T S_b w}{w^T S_w w} \\quad \\text{eq. 9}$$\n\n$\\mathbf{S}_b$（类间离散度矩阵）和\
    \ $\\mathbf{S}_w$（类内离散度矩阵）定义为\n\n$$\\mathbf{S}_b = \\sum_{j=1}^{p} N_j (\\boldsymbol{\\\
    mu}_j - \\boldsymbol{\\mu}) (\\boldsymbol{\\mu}_j - \\boldsymbol{\\mu})^T$$\n\n\
    $$\\mathbf{S}_w = \\sum_{j=1}^{p} \\mathbf{S}_j$$\n\n$$\\mathbf{S}_j = \\sum_{\\\
    mathbf{x}_i \\in \\omega_1} (\\mathbf{x}_i - \\boldsymbol{\\mu}_j)(\\mathbf{x}_i\
    \ - \\boldsymbol{\\mu}_j)^T$$\n\n其中，$\\boldsymbol{\\mu} \\in \\mathbb{R}^m$ 和\
    \ $\\boldsymbol{\\mu}_j \\in \\mathbb{R}^m$ 分别表示测量空间中所有 $N$ 个样本和第 $j$ 类 $N_j$\
    \ 个样本的均值向量。第一个FDA向量 $w_1$ 通过最大化 $J(w)$ 找到，后续向量通过求解相同问题并附加与先前计算向量正交的约束来找到。注意，最多可以有\
    \ $p-1$ 个FDA向量。或者，与PCA类似，向量也可以作为广义特征值问题的解来计算\n\n$$\\mathbf{S}_w^{-1} \\mathbf{S}_b\
    \ w = \\lambda w \\quad \\text{eq. 10}$$\n\n其中 $\\lambda = J(w)$。因此，特征值（$\\lambda_s$）表示数据类别投影到相应特征向量上的可分离程度。第一个判别/FDA向量/特征向量对应于最大的特征值，第二个FDA向量与第二大的特征值相关，依此类推。一旦确定了FDA向量，就可以将数据点投影，并在降维的FDA空间中构建分类模型。总体而言，从m维空间到\
    \ $p-1$ 维FDA空间的FDA变换可以表示为\n\n$$Z = W_p X$$\n\n其中 $W_p \\in \\mathbb{R}^{m \\times\
    \ (p-1)}$ 包含 $p-1$ 个FDA向量作为列，$Z \\in \\mathbb{R}^{N \\times (p-1)}$ 是变换空间中的数据矩阵，其中每一行是变换后的样本。变换后的样本在FDA空间中得到了最优分离。"

    As expected, GridSearchCV also returns the optimal polynomial degree as 2. Note
    that we are using 3-fold cross validation here as specified via cv=3. By default,
    GridSearchCV refits the estimator on the complete supplied dataset using the best
    found hyperparameters. The best estimator can be obtained via gs.best_estimator_
    for subsequent predictions (predictions can also be done via gs.predict function).
    In the above code we explicitly supplied mean squared error as the scoring metric;
    the default behavior is to use the estimator''s default scorer which would be
    R squared for linear regression in sklearn.


    This concludes our quick look into the standard ML model tuning approaches and
    ML modeling workflow. You now know how raw data should be transformed before model
    fitting, how to evaluate and report model''s performance, and how to find optimal
    model hyperparameters during model tuning.


    # Summary


    In this chapter, we learnt the best practices of setting up a ML modeling workflow.
    During the course of learning the workflow, we saw several nice utilities (pipelines,
    kFold, grid-search, etc.) provided in Sklearn library which make ML scripting
    easier and manageable. The takeaway message from this chapter should be that ML
    modeling is a collaborative work between you and machine. This chapter exposed
    you to your side of the task!!'
- md: '## Chapter 4


    ## Data Pre-processing: Cleaning Process Data


    A universal statement about machine learning is that more data is always better!
    However, not all data-points and/or variables in your dataset are necessarily
    good for your model. You may wonder why? The reason is that industrial process
    data inevitably suffers from issues of outliers, measurement noise, missing data,
    and irrelevant variables. While irrelevant variables become part of modeling dataset
    often due to imprecise knowledge of the process system at hand (for complex processes,
    it may not be very straightforward to manually choose the right set of model variables
    right away), other data impurities creep in due to failures of sensors and data
    acquisition system, process disturbances, etc. These impurities negatively impact
    the quality of our ML models and can lead to incorrect conclusions.


    Decontaminating data of the aforementioned unfavorable attributes is called data
    cleaning and forms an important component of the data pre-processing task before
    model fitting. We cannot emphasize enough the importance of data cleaning. Irrespective
    of the how much ever advanced modeling algorithm you may deploy, you cannot escape
    the ‘garbage in, garbage out’ principle. ML models cannot ‘learn’ about our systems
    correctly when supplied with corrupted data.


    Fortunately, several methods exist which can be used for automated data cleaning.
    We will study these methods in this chapter. Specifically, the following topics
    are covered:


    - Removing measurement noise

    - Selection of relevant variables for improved model performance

    - Outlier removal in univariate and multivariate settings

    - Common techniques for handling missing data


    ### 4.1 Signal De-noising


    Process measurements are inevitably contaminated with high-frequency noise. If
    not dealt with appropriately, noise can sometimes result in errors in model parameter
    estimation or unfavorable characteristics in predicted variables. For example,
    in Figure 4.1, we can see the noisy fluctuations in a flow measurement signal.
    These kinds of fluctuations are generally not real process variations and are
    just an artifact of measurement sensors. If not removed, these may result in noisy
    fluctuations in predicted variables, let''s say product purity, which would be
    very undesirable.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_82_0.png)


    Two common ways to de-noise process signals is to smooth them using moving window
    averages and Savitzky-Golay (SG) filtering. Figure 4.1 shows the smoothed flow
    signals. We can see that crucial process variations have been preserved while
    noisy fluctuations have been removed! Let''s quickly study the two techniques
    and learn how to implement them.


    ### Moving window average filter


    In moving window average, the smoothed value of a variable $x$ at time $t$ is
    taken as a weighted combination of previous measurements of $x$ in a window of
    finite or infinite length. In the most common variant, simple moving average (SMA),
    the combination is a simple average as shown below


    $$x(t)_{smoothed} = \frac{\sum_{j=0}^{W-1} x(t-j)_{raw}}{W}$$


    Where W is the window size. To generate the SMA smoothed signal in Figure 4.1,
    Pandas was utilized as follows


    ```

    # read noisy flow data

    import numpy as np

    noisy_signal = np.loadtxt(''noisy_flow_signal.csv'', delimiter='','')


    # denoise using SMA filter

    import pandas as pd

    windowSize = 15

    smoothed_signal_MA = pd.DataFrame(noisy_signal).rolling(windowSize).mean().values
    # taking mean on a rolling window and converting back to numpy array

    ```


    Alternatives to SMA are LWMA (linearly weighted moving average) and EWMA (exponentially
    weighted moving average) where the past measurements are weighted in a finite
    and infinite length window, respectively. The value of W in finite window length
    variants depend on ‘how much’ smoothing is desired and is guided by the knowledge
    of the underlying process system (window size should ideally be smaller than the
    period over which systematic process variations occur) or through trial and error.
    As would be obvious, larger W achieves more smoothing.


    ### SG filter


    In SG filtering, the smoothed value at any point $t^*$ is realized by approximating
    the values of $x$ in an odd-sized window centered at $t^*$ with a polynomial of
    time (t) and then evaluating the polynomial at $t^*$. Specifically, at point $t^*$,
    a $m^{th}$ order polynomial of the following form is fitted and then evaluated
    as


    $$x(t^*)_{smoothed} = \sum_{k=1}^{m} b_k (t^*)^k$$


    where $b_k$ are the estimated polynomial coefficients. In Figure 4.1, SG filter
    was implemented using Scipy with $2^{nd}$ order polynomials as follows


    ```

    # import savgol_filter from scipy

    from scipy.signal import savgol_filter

    smoothed_signal_SG = savgol_filter(noisy_signal, window_length = 15, polyorder
    = 2)

    ```


    Note that, under the default setting, the (W-1)/2 values at the extreme edges
    are handled by fitting a polynomial to the W values at the edges and evaluating
    this polynomial to get smoothed values for the (W-1)/2 data-points nearest to
    the edges. You are encouraged to check the official documentation<sup>12</sup>
    for other available settings.


    SG filter enjoys the advantage of preserving the important features of the raw
    signals better than moving window average filters. SMA has another drawback which
    is apparent in Figure 4.1 - if we observe closely around sample 300 where a step
    change in flow occurs, the SMA smoothed signal shows a small time-delay/offset
    unlike SG smoothed signal which follows the original signal very closely during
    the step change. This time offset can become problematic for certain problems.
    SMA, however, enjoys computational advantage as it is faster to compute.


    > SMA and SG filters belong to the category of low-pass filters which block high
    frequency component of raw signals and allow low frequencies to pass through.
    This effectively removes spurious fast transitions, spikes, and noise while retaining
    the slowly evolving systematic variations. On the other hand, high-pass filters
    block low frequency components and allow high frequencies. These are often utilized
    to remove long-term slow drifts from process signals.


    There are other advanced methods as well like wavelet filters, LOWESS smoothing
    which can be explored if SMA or SG filters don''t provide satisfactory performance.
    Irrespective of the method deployed, you should pay due attention tuning the filters
    to ensure that the smoothed signal is acceptable around edges, transients, and
    step changes in the original signal.


    ### 4.2 Variable Selection / Feature Selection


    Imagine that you are tasked with building a regression (or a classifier) model
    for predicting product quality in a large petrochemical plant. For such complex
    and highly integrated processes, it would not be surprising if you don''t have
    enough process insights about which variables effect product quality and therefore,
    you end up with hundreds of variables as potential inputs to your model. The problem
    with inclusion of irrelevant inputs is that model training (and update) time increases,
    the model becomes prone to overfitting, and there is a greater requirement of
    training samples to adequately represent the model input space. Moreover, unnecessarily
    bulky input set makes physical interpretation of the model difficult.


    The task of selecting the most relevant subset of inputs/feature is called variable
    selection / feature selection. A trivially optimal way of variable selection is
    to explore all possible combinations of input variables and select the one that
    gives the best performance on the validation dataset. However, this can be computationally
    infeasible when dealing with large number of input candidates. To circumvent these
    issues, several variable selection methods have been devised which try to find
    a good subset of relevant model inputs. Figure 4.2 lists some of these methods
    that are commonly employed. In the next few subsections, we will learn these and
    try to understand their strengths and drawbacks.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_85_0.png)


    As you can see, the methods are divided into three categories depending on the
    employed search strategy for the relevant inputs. Filter methods use statistical
    measures such as correlation coefficients, mutual information to quantify the
    relevance of any input w.r.t. the target variable. Wrapper methods utilize the
    model to quantify the predictive power of different input subsets via metrics
    like MSE, BIC, etc. In the third category, the embedded methods perform variable
    selection during the process of model fitting itself. Before we delve deeper into
    these methods, let''s take a quick look at the dataset we will use in this section.


    ### Illustration dataset


    The dataset is provided in the file VSdata.csv and has been simulated using a
    mechanism (with slight modifications) devised by Chong & Jun<sup>13</sup>. The
    mechanism was designed to ensure that the dataset mimics a real manufacturing
    process with interconnected unit processes. There are 40 input variables out of
    which 10 (inputs 17 to 26) are known to be relevant while the rest are irrelevant
    to the target variable. Fitting and validation dataset contain 1000 and 250 samples,
    respectively. The target samples were generated using the relevant inputs as follows


    $$y_{sample} = \sum_{j=17}^{26} \beta_j x_{sample,j} + \varepsilon_{sample}$$'
  mdcn: '## 第四章


    ## 数据预处理：清洗过程数据


    关于机器学习的一个普遍说法是，数据越多越好！然而，数据集中的所有数据点和/或变量未必都对你的模型有益。你可能会问为什么？原因是工业过程数据不可避免地存在异常值、测量噪声、缺失数据和无关变量等问题。无关变量成为建模数据集的一部分，通常是由于对当前过程系统的了解不够精确（对于复杂过程，可能无法立即手动选择正确的模型变量集），而其他数据杂质则由于传感器和数据采集系统故障、过程扰动等原因悄然混入。这些杂质会对我们的机器学习模型质量产生负面影响，并可能导致错误的结论。


    清除上述不利属性的数据被称为数据清洗，它是模型拟合前数据预处理任务的重要组成部分。我们再怎么强调数据清洗的重要性也不为过。无论你采用多么先进的建模算法，都无法逃脱“垃圾进，垃圾出”的原则。当输入损坏的数据时，机器学习模型无法正确“学习”我们的系统。


    幸运的是，有几种方法可用于自动数据清洗。我们将在本章中学习这些方法。具体涵盖以下主题：


    -   去除测量噪声

    -   选择相关变量以提高模型性能

    -   单变量和多变量环境中的异常值去除

    -   处理缺失数据的常用技术


    ### 4.1 信号去噪


    过程测量不可避免地会受到高频噪声的污染。如果不加以适当处理，噪声有时会导致模型参数估计错误或预测变量出现不利特征。例如，在图4.1中，我们可以看到流量测量信号中的噪声波动。这类波动通常不是真实的过程变化，而只是测量传感器的产物。如果不加以去除，这些波动可能导致预测变量（比如产品纯度）出现噪声波动，这是非常不可取的。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_82_0.png)


    两种常见的过程信号去噪方法是使用移动窗口平均和Savitzky-Golay（SG）滤波进行平滑处理。图4.1显示了平滑后的流量信号。我们可以看到，关键的过程变化得以保留，而噪声波动已被去除！让我们快速研究这两种技术，并学习如何实现它们。


    ### 移动窗口平均滤波器


    在移动窗口平均中，变量 $x$ 在时间 $t$ 的平滑值被取为在有限或无限长度窗口内 $x$ 的先前测量值的加权组合。在最常见的变体——简单移动平均（SMA）中，组合是简单的平均值，如下所示


    $$x(t)_{smoothed} = \frac{\sum_{j=0}^{W-1} x(t-j)_{raw}}{W}$$


    其中 W 是窗口大小。为了生成图4.1中的SMA平滑信号，使用了Pandas，如下所示


    ```

    # read noisy flow data

    import numpy as np

    noisy_signal = np.loadtxt(''noisy_flow_signal.csv'', delimiter='','')


    # denoise using SMA filter

    import pandas as pd

    windowSize = 15

    smoothed_signal_MA = pd.DataFrame(noisy_signal).rolling(windowSize).mean().values
    # taking mean on a rolling window and converting back to numpy array

    ```


    SMA的替代方案是LWMA（线性加权移动平均）和EWMA（指数加权移动平均），它们分别在有限和无限长度窗口中对过去的测量值进行加权。有限窗口长度变体中的W值取决于期望的“平滑程度”，并由底层过程系统的知识（窗口大小理想情况下应小于系统过程变化发生的周期）或通过试错来指导。显而易见，较大的W实现更平滑的效果。


    ### SG滤波器


    在SG滤波中，任何点 $t^*$ 的平滑值是通过用时间（t）的多项式近似以 $t^*$ 为中心的奇数大小窗口内的 $x$ 值，然后在 $t^*$ 处评估该多项式来实现的。具体来说，在点
    $t^*$ 处，拟合以下形式的 $m^{th}$ 阶多项式，然后进行评估


    $$x(t^*)_{smoothed} = \sum_{k=1}^{m} b_k (t^*)^k$$


    其中 $b_k$ 是估计的多项式系数。在图4.1中，使用Scipy实现了SG滤波器，采用 $2^{nd}$ 阶多项式，如下所示


    ```

    # import savgol_filter from scipy

    from scipy.signal import savgol_filter

    smoothed_signal_SG = savgol_filter(noisy_signal, window_length = 15, polyorder
    = 2)

    ```


    请注意，在默认设置下，极端边缘的 (W-1)/2 个值是通过拟合边缘处的 W 个值的多项式并评估该多项式来获得最靠近边缘的 (W-1)/2 个数据点的平滑值来处理的。建议查阅官方文档<sup>12</sup>以了解其他可用设置。


    SG滤波器在保留原始信号重要特征方面比移动窗口平均滤波器具有优势。SMA还有另一个缺点，在图4.1中很明显——如果我们仔细观察样本300附近流量发生阶跃变化的地方，SMA平滑信号显示出微小的时间延迟/偏移，而SG平滑信号在阶跃变化期间非常紧密地跟随原始信号。这种时间偏移对于某些问题可能变得有问题。然而，SMA在计算上具有优势，因为它计算更快。


    > SMA和SG滤波器属于低通滤波器类别，它们阻挡原始信号的高频分量，允许低频通过。这有效地去除了虚假的快速过渡、尖峰和噪声，同时保留了缓慢演变的系统变化。另一方面，高通滤波器阻挡低频分量，允许高频通过。这些通常用于去除过程信号中的长期缓慢漂移。


    还有其他高级方法，如小波滤波器、LOWESS平滑，如果SMA或SG滤波器不能提供令人满意的性能，可以探索这些方法。无论采用哪种方法，你都应该适当注意调整滤波器，以确保平滑信号在原始信号的边缘、瞬态和阶跃变化附近是可接受的。


    ### 4.2 变量选择 / 特征选择


    假设你被要求为一个大型石化厂建立一个回归（或分类）模型来预测产品质量。对于这种复杂且高度集成的过程，如果你没有足够的过程洞察力来了解哪些变量影响产品质量，因此最终有数百个变量作为模型的潜在输入，这并不奇怪。包含无关输入的问题在于模型训练（和更新）时间增加，模型容易过拟合，并且需要更多的训练样本来充分表示模型输入空间。此外，不必要的庞大输入集使得模型的物理诠释变得困难。


    选择最相关的输入/特征子集的任务称为变量选择 / 特征选择。变量选择的一个平凡最优方法是探索所有可能的输入变量组合，并选择在验证数据集上给出最佳性能的组合。然而，当处理大量输入候选时，这在计算上可能不可行。为了规避这些问题，已经设计了几种变量选择方法，试图找到一组良好的相关模型输入。图4.2列出了一些常用的方法。在接下来的几个小节中，我们将学习这些方法，并尝试理解它们的优势和缺点。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_85_0.png)


    如你所见，这些方法根据所采用的相关输入搜索策略分为三类。过滤器方法使用统计度量（如相关系数、互信息）来量化任何输入相对于目标变量的相关性。包装器方法利用模型通过MSE、BIC等指标来量化不同输入子集的预测能力。在第三类中，嵌入式方法在模型拟合过程中执行变量选择。在我们深入探讨这些方法之前，让我们快速看一下本节将使用的数据集。


    ### 示例数据集


    数据集在文件VSdata.csv中提供，是使用Chong & Jun<sup>13</sup>设计的机制（稍作修改）模拟的。该机制旨在确保数据集模拟具有互连单元过程的真实制造过程。有40个输入变量，其中10个（输入17到26）已知与目标变量相关，其余则无关。拟合和验证数据集分别包含1000和250个样本。目标样本使用相关输入生成，如下所示


    $$y_{sample} = \sum_{j=17}^{26} \beta_j x_{sample,j} + \varepsilon_{sample}$$'

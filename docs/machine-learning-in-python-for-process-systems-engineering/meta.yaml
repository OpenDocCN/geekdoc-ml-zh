    # FFNN Modeling Guidelines


    ANN modeling is a very broad topic and with the plethora of tutorials on ANN modeling
    available out there, it is easy to get overwhelmed. However, we have seen in this
    chapter that ANNs are not as daunting as it may seem if we pay careful attention
    to a few key concepts. If you are looking for some quick guidelines on how to
    setup the ANN hyperparameters for process systems modeling, then the following
    suggestions will serve you well.


    +   - **Number of hidden layers**: 1 for simple systems, 2 or 3 for complex systems/tasks

    - **Activation function**: ReLU

    - **Initialization scheme**: He initialization

    - **Optimizer**: Adam

    - **Regularization**: L1 or L2 kernel regularization

    - **Learning rate schedule**: Not needed with Adam optimizer

    - **Number of epochs**: Use a reasonably large value with early stopping

    - **Mini-batch size**: 32


    You will be lucky if you end up finding a good ANN model with the default settings
    in the very first attempt. Often the following adjustments may need to be made.


    +   - If validation accuracy is much lower than training accuracy, then increase
    regularization penalty

    - If optimizer is getting stuck in local minima, then adjust Adam’s initial learning
    rate. If it does not help, then try adding more neurons or hidden layers

    - If loss vs epoch curve is very noisy, then increase mini-batch size


    # Summary


    Phew! that was a loaded chapter. We covered several techniques that are at our
    disposal to train ANN models efficiently. There are a lot more behind each of
    the several aspects that we touched upon, and we have only scratched the surface.
    However, you now are familiar with the core concepts of ANNs and have hands-on-experience
    with modeling the debutanizer column and combined cycle power plants. You are
    now well-aware of what it takes to develop a good ANN model for process systems.
    ANNs are going to be an important weapon in your arsenal which you will find yourself
    employing very often. In the next chapter we will learn how ANNs are deployed
    for dynamic or temporal data.'

  md: '# 10.5 Combining ML Techniques


    In this book, we have looked at several different ML techniques. We attempted
    to gain conceptual understanding of these methods and not just learn how to apply
    them via Sklearn modules. This enables us to tweak the standard algorithms of
    these techniques to suit our specific needs. An area where this can prove very
    useful is when you need to combine the different ML techniques together to leverage
    their respective strengths. A common combination scheme is to use PCA for feature
    extraction and any then apply other method on the extracted features. However,
    if you dig deeper into the ML for PSE literature, you can find several other interesting
    combinations. One such scheme (also called external analysis<sup>54 55</sup>)
    is illustrated below. In this scheme, the impact of normal plant operating condition
    changes (as indicated by process inputs) are removed from the output variables
    before the application of PCA or ICA-based fault detection. The corresponding
    authors have shown that fault detection performance increases significantly through
    this scheme.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_241_0.png)


    The secret behind the success of external analysis is that nonlinear or dynamic
    characteristics of process data can be handled by specialized modeling tools and
    then output residuals (difference between output measurements and predictions)
    can be handled efficiently by PCA. Another noteworthy scheme includes the integration
    of artificial neural networks (ANN) and PLS<sup>56</sup>. The powerful dimension
    reduction capabilities of PLS are combined with nonlinearity modeling capabilities
    of ANN to obtain a high-fidelity soft-sensor model.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_241_1.png)


    <sup>54</sup> Kano et al., Evolution of multivariate statistical process control:
    application of independent component analysis and external analysis, Computers
    & Chemical Engineering, 2004

    <sup>55</sup> Ge et al., Robust online monitoring for multimode processes based
    on nonlinear external analysis, Industrial Engineering & Chemistry Research, 2008

    <sup>56</sup> Qin & McAvoy, Nonlinear PLS modeling using neural networks, Computers
    & Chemical Engineering, 1992'
  merge: -1
  pgno: 241

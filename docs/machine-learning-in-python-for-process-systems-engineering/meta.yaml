    ![](img/ae65e737df4a9f5732c91f7aea579fc8_90_0.png)


    Figure 4.6: Wrapper method strategy for feature selection


    # Recursive feature elimination (RFE)


    In this method, a model is initially built using all the input variables. The
    importance of each input is quantified using any specific model attribute (such
    as model coefficients) or through some combination of model attributes. A few
    of the inputs with the least importances are discarded and the entire process
    is repeated until the desired number of relevant inputs are obtained or model
    performance begins to deteriorate.


    PLS is a very popular regression method for process systems which we will study
    in detail in Chapter 5. We are mentioning this here because PLS allows for computation
    of VIP (variable importance in projection) scores that quantify the importance
    of each input. PLS VIP<sup>14</sup>-based RFE algorithm can be used to iteratively
    exclude inputs that contribute the least to the prediction of the target variable.


    # Sequential feature selection (SFS)


    Sequential feature selection technique has 2 common variants. In forward SFS,
    the search begins with an empty subset. The input that leads to the best performance
    when the model is trained on this single input gets added to the subset. Next,
    the previously selected subset is combined with each of the remaining inputs one
    at a time. The combination of two inputs that gives the best performance becomes
    the selected subset. This procedure is repeated till *k* inputs are selected or
    predictions no longer improve by adding new variables.


    The other variant, backward SFS, works similarly as forward SFS, except that it
    starts with all the inputs. The input whose exclusion leads to the best model
    performance is excluded from the subset. This procedure is repeated to exclude
    inputs one by one.


    <sup>14</sup> PLSRegression class in sklearn does not have any built-in VIP computation.
    pyChemometrics package can be used which provides a ChemometricsPLS class with
    a VIP method'

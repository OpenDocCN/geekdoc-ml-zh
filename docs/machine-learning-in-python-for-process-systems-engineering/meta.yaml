    # 5.6 Process Monitoring via PLS for Polyethylene Manufacturing Process


    PLS framework renders itself useful for process monitoring as well. The overall
    methodology is similar to PCA-based monitoring: after PLS modeling, monitoring
    indices are computed, control limits are determined, and violation of the control
    limits are checked for fault detection. PLS-based monitoring is preferred when
    process data can be divided into input and output blocks. For illustration, we
    will use data collected from an LDPE (low-density polyethylene) manufacturing.
    The dataset consists of 54 samples of 14 process variables and 5 product quality
    variables. It is known that a process fault occurs sample 51 onwards.


    Our objective here is to build a fault detection tool that clearly indicates the
    onset of process fault. To appreciate the need for such a tool, let''s look at
    the alternative conventional monitoring approach. If a plant operator was manually
    monitoring the 5 quality variables continuously, he/she could notice a slight
    drop in values for the last 4 samples. However, given that the quality variables
    exhibit large variability during normal operations, it is difficult to make any
    decision without first examining other process variables because the quality variables
    may simply be responding to ''normal'' changes elsewhere in the process. Unfortunately,
    it would be very inconvenient to manually interpret all the process plots simultaneously.'

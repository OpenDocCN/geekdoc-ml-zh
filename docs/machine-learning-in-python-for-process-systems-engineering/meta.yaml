    R2 = pipe.score(x, y) # no need to import metrics module


    # Classification metrics


    While in regression problems we care about how close the predicted values are
    to the actual values, in classification problems we care about the perfect match
    between the actual and predicted labels. Before we look at different classification
    metrics, let''s first learn about a confusion matrix. The figure below shows a
    sample confusion matrix for a binary classification task; this matrix provides
    a comprehensive overview of how well a model has correctly (& incorrectly) classified
    samples belonging to the positive and negative classes. The shown matrix indicates
    that out of 25 (24 + 1) samples that actually belonged to negative class, the
    model correctly labeled 21 of those.'

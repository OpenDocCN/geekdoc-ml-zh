    # 1.5 The Future of Process Data Science


    It is not an exaggeration to say that this is a wonderful time to be a process
    data scientist. Process industry is witnessing higher and higher product demands
    due to increasing population and growing lifestyle globally, but there is also
    a push to run production facilities more efficiently and sustainably. Consequently,
    adoption of Industry 4.0, which mandates utilizing process data for process improvements
    all along the production chain, is on the rise. There is palpable interest among
    process industry executives to implement ML-based solutions and the responsibility
    to show that the ML hype is true has fallen on the shoulders of process data scientists.


    It’s a foregone conclusion that ML is a powerful tool for PSE. Process data hold
    tremendous power if they are put to use in the right way. However, blind application
    of ML often leads to discouraging results. As a process data scientist with expert
    process knowledge and ML skills, you are in a unique position to combine process
    systems knowledge and power of ML to unleash the true potentials of data science
    in process industry. Let’s cheer to your bright career prospects as a process
    data scientist and continue our journey to now learn the intricate details of
    ML algorithms.


    # Summary


    In this chapter we tried to get a conceptual understanding of where ML fits in
    the world of process industry. We looked at the different types of machine learning
    workflows and methodologies. We also explored some application areas in process
    industry where ML has proved useful. We hope that you got the chapter’s overarching
    message that process data science has already proven to be an indispensable tool
    in process operations to turn data into knowledge and support effective decision
    making. In the next chapter we will take the first step and learn about the environment
    you will use to execute your Python scripts containing ML code.'

    ## 7.5 SVR：简介


    支持向量回归（SVR）是用于线性和非线性回归的另一种 SVM 变体。SVR 试图找到一条尽可能接近训练观测值的回归曲线。从几何上看，如图 7.11 所示的核化
    SVR，一个预设宽度（ε）的管道被拟合到数据上，任何位于管道外的样本都会受到惩罚。您稍后会看到，SVR 的优化程序旨在获得模型泛化能力与拟合训练数据能力之间的良好平衡。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_175_0.png)


    SVR 生成一个线性超平面，该超平面最好地描述了输出作为输入的函数。对于核化 SVR，超平面在原始测量空间中转化为适当的非线性曲线。如图 7.11 所示，在特征空间中，大多数数据点位于距离最优超平面
    ε 距离内。松弛变量 ξ 允许一些样本落在 ε 管道之外；然而，这种违规会受到惩罚。位于管道边缘或外部的样本是支持向量，它们完全决定了给定 ε 的最优解。添加或移除任何非支持向量（或管道内的样本）不会影响解。


    已发现 SVR 在中小型高维数据集上提供优于人工神经网络（ANN）的性能。我们将在本章后面看到几个应用。



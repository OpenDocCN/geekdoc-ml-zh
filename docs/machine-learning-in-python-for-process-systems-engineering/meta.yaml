    \ = u_1q_1^T + F_1$$\n\n在等式13中，$E$和$F$称为残差矩阵，代表尚未被捕获的$X$和$Y$的部分。为了找到下一个成分得分，使用矩阵$E_1$和$F_1$替换$X$和$Y$，重复上述三个步骤。请注意，可能的最大成分数量等于$m$。对于每个成分，权重向量通过NIPALS或SIMPLS等迭代过程找到。目前，只需知道一旦计算出所需数量（$k$）的成分，以下关系成立\n\
    \n$$Y = X\\beta + F$$\n\n$$\\beta = X^TU(T^TXX^TU)^{-1}T^TY$$\n\n计算出系数矩阵$\\beta$后，我们可以为新的输入数据点$x$预测$y$。如果这些算法细节看起来令人生畏，请不要担心。Sklearn提供了PLSRegression类，使用起来非常方便，我们将在下一节中看到，届时我们将开发一个基于PLS的软传感器。\n\
    \n## 5.5 用于纸浆和造纸制造过程的PLS软测量\n\n软传感器在过程工业中用于使用所有其他可用的过程变量测量值来提供关键过程输出或产品质量的估计或预测。当物理传感器成本高昂或无法进行实时产品质量测量时，软测量尤其有用。为了说明，我们将研究来自纸浆和造纸制造过程的“Kamyr蒸煮器”数据集。在此过程中，木片被加工成纸浆，其质量由Kappa值量化。在数据集中，提供了301个每小时采样的Kappa值和21个其他过程变量。图2.14显示产品质量存在相当大的变异性，我们现在的目标是开发一个软传感器应用程序，使用其他过程数据预测Kappa值。\n\
    \n在构建PLS模型之前，需要进行一些预处理。快速浏览数据表明存在许多缺失值。为了保持分析简单，我们将删除具有大量缺失值的变量，然后删除任何具有缺失值的样本。"

    # Chapter 12

    ## Recurrent Neural Networks


    In previous chapter, we saw that feed-forward neural networks are powerful mechanism
    for capturing complex relationships among process variables. In FFNNs, there is
    an implicit assumption of static relationships between network inputs and outputs.
    There is no notion of process dynamics or temporal order. However, sometimes you
    will encounter situations where model output depends on not just the current input
    but on past inputs as well. Previously, we employed input augmentation technique
    (in dynamic PCA/PLS) to deal with dynamic systems. Unfortunately, in FFNNs, augmentation
    can lead to significant increase in the number of model parameters. Recurrent
    neural networks are specialized networks for efficiently dealing with sequential
    or temporal data. In essence, RNNs are FFNNs with ‘memory’.


    For process systems, RNNs have been successfully used for system identification,
    fault detection & classification, time series forecasting, and predictive maintenance
    of industrial equipment. Outside of process industry, RNNs are employed, among
    others, for natural language processing (speech recognition, text autofill, language
    translation, sentiment analysis, etc.), music composition, and stock market forecasting!


    In this chapter, we will learn how RNNs are able to remember things from past
    to make future predictions. Since we already covered several neural network concepts
    in the previous chapter, we will focus on varied applications of RNNs in this
    chapter. In the process, we will look at different network configurations commonly
    employed. Specifically, the following topics are covered


    - Introduction to RNNs

    - Different topological configurations of RNN networks

    - System identification via RNN

    - Using RNNs for fault classification

    - Employing RNNs for predictive maintenance


    ## 12.1 RNN: An Introduction


    Recurrent neural networks (RNNs) are ANNs for dealing with sequential data, where
    the order of occurrence of data holds significance. For example, in a production
    plant, consistently increasing temperature measurements may indicate one kind
    of process fault while consistently decreasing measurements may indicate another
    fault type. There is no efficient mechanism to specify this temporal order of
    data in a FFNN. RNNs accomplish this by processing elements of a sequence recurrently
    and storing a hidden state that summarizes the past information during the processing.
    The basic unit in a RNN is called a RNN cell which simply contains a layer of
    neurons. Figure 12.1 shows the architecture of a RNN consisting of a single cell
    and how it processes a data sequence with ten samples or x readings.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_271_0.png)


    We can see that the ten samples are processed in the same order of their occurrence
    and not at once. An output, y(i), is generated at the ith step and then fed to
    the next step for processing along with x(i+1). By way of this arrangement, y(i+1)
    is a function of x(i+1) and y(i). Since, y(i) itself is a function of x(i) and
    y(i-1), y(i+1) effectively becomes a function of x(i+1), x(i), and y(i-1). Continuing
    the logic further implies that the final sequence output, y(10), is a function
    of all ten inputs of the sequence, that is, x(10), x(9),..., x(1). We will see
    later how this ''recurrent'' mechanism leads to efficient capturing of temporal
    patterns in data.


    ## RNN outputs


    If the neural layer in the RNN cell in Figure 12.1 contains $n$ neurons ($n$ equals
    4 in the shown figure), then each $y_{(i)}$ or $h_{(i)}$ is a n-dimensional vector.
    For simple RNN cells, $y_{(i)}$ equals $h_{(i)}$. Let $x$ be a m-dimensional vector.
    At any $i^{th}$ step, we can write the following relationship


    $$y_{(i)} = g(W_x x_{(i)} + W_y y_{(i-1)} + b)$$


    where $W_x \in R^{n \times m}$ with each row containing the weight parameters
    of a neuron as applied to $x$ vector, $W_y \in R^{n \times n}$ with each row containing
    the weight parameters of a neuron as applied to $y$ vector, $b \in R^n$ contains
    the bias parameters, and $g$ denotes the activation function. The same neural
    parameters are used at each step.


    If all the outputs of the sequence are of interest, then it is called sequence-to-sequence
    or many-to-many network. However, very often only the last step output is needed,
    leading to sequence-to-vector or many-to-one network. We will see later how we
    can direct Keras to discard all outputs except the last one. Moreover, the last
    step output may need to be further processed and so a FC layer is often added.
    Figure 12.2 shows one such topology.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_272_0.png)


    Figure 12.3 shows two other popular architecture, namely, vector to sequence RNN
    and delayed sequence to sequence RNN. In the former scheme, a single input returns
    a sequence. A real-life example could be dynamic process response due to a step
    change in process inputs. The delayed sequence to sequence network (also called
    encoder-decoder network) is also a many-to-many network, however, here, the output
    sequence is delayed. This scheme is utilized if each step of output sequence depends
    on the entire input sequence. Encoder-decoder scheme is often utilized for language
    translation because initial words of the translation can be influenced by final
    words of the sentence being translated.'

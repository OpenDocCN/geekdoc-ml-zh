  md: '# PCA vs SVDD for process monitoring


    In the previous chapters, we studied dimensionality reduction-based methods (PCA,
    ICA) for process monitoring. We have now added SVDD to our toolkit. Although it
    is difficult to say beforehand which method will work best for given scenarios,
    some rough guidelines do exist. If variables in your dataset are linearly (or
    only slightly nonlinearly) related and measurements are noisy, PCA/ICA would work
    best. PCA, however, assumes unimodal distribution of data. SVDD makes no assumption
    on underlying data distribution and is very-well suited for very nonlinear dataset.
    However, relationships between different process variables are difficult to interpret
    in SVM/SVDD models compared to PCA/ICA models.


    # 7.4 Process Fault Detection via SVDD


    To illustrate a practical application of SVDD for process monitoring, we will
    use data from a semiconductor manufacturing process. This batch process dataset
    contains 19 process variables measured over the course of 108 normal batches and
    21 faulty batches. The batch durations range from 95 to 112 seconds (see appendix
    for more details). Figure 7.9 shows the training samples and the faulty test samples
    in the principal component space.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_173_0.png)


    For this illustration, the raw data has been processed using multiway PCA and
    the transformed 2D (score) data is provided in the *Metal_etch_2DPCA_trainingData.csv*
    file. Note that we could also implement SVDD in the original input space but pre-processing
    via PCA to remove variable correlation is generally a good practice. Moreover,
    we use the 2D PC space for our analysis just for the ease of illustrating the
    SVDD boundary. In actual deployment, you would work in higher dimensional PC space
    for better accuracy. Let''s see if our model can identify the faulty samples as
    outliers or not in the multi-clustered dataset.'

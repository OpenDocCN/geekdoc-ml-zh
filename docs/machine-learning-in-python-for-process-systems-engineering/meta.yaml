    \ the fit() method. They can be accessed as scaler.mean_ and scaler.var_. The\
    \ fitted object (scaler) was then used to scale X by calling the object's transform\
    \ method. This is the general pattern we will use with Sklearn's classes: objects\
    \ will be initialized, properties fitted, and methods called.\n\nAnother popular\
    \ technique is min-max scaling, also referred to as normalization. Here, each\
    \ variable is transformed to a common range of values (typically 0 to 1). For\

    $$\begin{aligned}

    \min_{w,b,\xi,\xi^*} \quad & \frac{1}{2}||w||^2 + C \sum_{i=1}^N (\xi_i + \xi_i^*)
    \\

    \text{s.t.} \quad & y_i - w^T\varphi(x_i) - b \le \varepsilon + \xi_i \\

    & w^T\varphi(x_i) + b - y_i \le \varepsilon + \xi_i^* \\

    & \xi_i, \xi_i^* \ge 0, \quad i = 1, \cdots N

    \end{aligned}$$


    目标函数的第一部分（$\frac{1}{2}||w||^2$）旨在使模型尽可能简单，或使模型输出尽可能平坦。例如，对于 $y=w^Tx+b$，当 w=0 时，得到最简单的模型
    y=b，其对输入的依赖性最小。第二部分则试图使位于 $\varepsilon$ 管道之外的样本数量尽可能少。超参数 $C$ 控制着两者之间的权衡。


    > 在 SVR 的公式中，对于位于 $\varepsilon$ 管道内的样本，没有与之相关的误差。在 SVM 文献中，这被称为实现了 $\varepsilon$-不敏感损失函数，如下所示。


    ![损失函数](image)


    将其与普通最小二乘回归进行比较，后者对每个样本与回归曲线的误差都进行惩罚。


    其对偶形式为


    $$\begin{aligned}

    \max_{\alpha,\alpha^*} \quad & \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N (\alpha_i
    - \alpha_i^*)(\alpha_j - \alpha_j^*)K(x_i, x_j) - \\

    & \varepsilon \sum_{i=1}^N (\alpha_i + \alpha_i^*) + \sum_{i=1}^N y_i(\alpha_i
    - \alpha_i^*) \\

    \text{s.t.} \quad & \sum_{i=1}^N (\alpha_i - \alpha_i^*) = 0 \\

    & 0 \le \alpha_i, \alpha_i^* \le C \quad i = 1, \cdots N

    \end{aligned}$$


    如果你仔细观察，这里我们为每个数据点分配了两个乘子（$\alpha, \alpha^*$）。对于非支持向量（位于 $\varepsilon$ 管道内的训练样本），这两个乘子最终都为
    0。一旦找到乘子，就可以通过以下公式进行预测：


    $$\hat{y}_t = \sum_{i \in \{SV\}} (\alpha_i - \alpha_i^*)K(x_i, x_t) + b$$


    核函数和超参数的指定使我们能够拟合模型（找到乘子）并进行预测。图 7.12 展示了对于一个 SISO 系统，使用 RBF 核时 SVR 超参数（C, $\gamma$,
    $\epsilon$）的影响。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_177_0.png)


    图 7.12 关于 gamma 和 C 的影响符合预期。让我们来理解 $\epsilon$ 的影响。较大的 $\epsilon$ 会使 $\varepsilon$
    管道变大，从而让 SVR 保持模型“平坦”，导致欠拟合。另一方面，非常小的 $\epsilon$ 会使管道非常小，这会导致支持向量数量增多，使得拟合容易过拟合。尽管如此，指定较小的
    $\epsilon$ 并通过 C 来控制过拟合的情况并不少见。要查看使用 Sklearn 的 SVR 实现，我们将在接下来的章节中探讨几个工业应用。


    ## SVR 与 ANN


    由于 SVR 强大的非线性建模能力，将其与人工神经网络（ANN）进行比较是很自然的。SVR 模型预测的方程可以用网络形式表示，如下图所示。这种表示方式使得两种回归方法之间的相似性显而易见。然而，与
    ANN 不同的是，SVR 中的隐藏单元是自动确定的，无需显式指定网络结构。这使得 SVR 更容易训练，因为超参数更少。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_178_0.png)


    [我们将在第 11 章详细学习 ANN。如果你不熟悉它们，可以稍后重新阅读本节。但我们认为，如果你已经了解，这个比较可能会为 SVR 算法提供更多见解。]


    在 ANN 中，拟合模型参数的数量（因此过拟合的倾向）随着输入向量维度的增加而增加。但在 SVR 中，参数数量取决于支持向量的数量，而不是输入维度。如果支持向量的数量不变，在
    SVR 模型中添加更多输入变量并不会增加模型复杂度。这极大地帮助 SVR 克服了由高输入维度引起的过拟合问题。此外，通过支持向量，SVR 模型提供了关于定义回归预测的重要训练数据点的显式知识；这通常有助于合理化模型预测。总的来说，SVR
    在非线性建模方面与 ANN 一样强大，并具有一些独特的优势特性。



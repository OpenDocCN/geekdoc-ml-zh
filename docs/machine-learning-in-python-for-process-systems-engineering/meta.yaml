    # K-fold cross-validation


    The 3-way holdout method is an elegant way of ensuring that model tuning and final
    assessment are based on unbiased estimates of model performance (i.e., using data
    not seen during model fitting and model training, respectively). However, there
    are several drawbacks as well with this method. If our original dataset is not
    large enough, we may not have the luxury of having 3 distinct subsets of data.
    Moreover, the performance estimates can be highly influenced by what data-points
    makeup the subsets and thus may lead to unfortunate selection of hyperparameters
    and final assessment.


    The popular alternate solution is k-fold cross validation. The idea is simple.
    Instead of having a single test (or validation) subset, multiple subsets are created,
    and overall performance estimate is computed as the average of performances on
    individual subsets. Figure 3.9 illustrates this idea where k-fold cross validation
    is used for both final performance assessment and model tuning.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_73_0.png)'
  merge: -1

    ## 11.3 数学背景


    让我们考虑来自 CCPP 数据集的一个样本输入 $x \in R^4$，并追踪它在网络各层中传递以生成输出的路径。在这个前向传播（也称为前馈传播）过程中，输入首先由第一隐藏层的神经元处理。在该层的第
    $j$ 个神经元中，输入的加权和通过激活函数 $g$ 进行非线性变换：


    $a_j = g(w_j^T x + b_j)$


    其中 $w_j \in R^4$ 是应用于输入的权重，$b_j$ 是加到和上的偏置。因此，每个神经元有 5 个参数（4 个权重和 1 个偏置），导致第一层所有
    8 个神经元需要估计 40 个参数。所有 8 个神经元的输出构成向量 $a^{(1)} \in R^8$：


    $a^{(1)} = g^{(1)}(W^{(1)}x + b^{(1)})$


    其中 $W^{(1)} \in R^{8 \times 4}$ 的每一行包含一个神经元的权重。同一层的所有神经元使用相同的激活函数。$a^{(1)}$ 成为第二隐藏层的输入。


    $a^{(2)} \in R^5 = g^{(2)}(W^{(2)}a^{(1)} + b^{(2)})$


    其中 $W^{(2)} \in R^{5 \times 8}$。第二层的每个神经元有 8 个权重和一个偏置参数，导致该层有 45 个参数。最终输出层有一个神经元，包含
    6 个参数且没有激活函数，网络输出如下：


    $a^{(3)} = \hat{y} = (w^{(3)})^T a^{(2)} + b^{(3)}$


    其中 $w^{(3)} \in R^5$。


    ### 激活函数


    激活函数是赋予神经网络非线性能力的关键。我们在 CCPP 建模中使用了 ReLU 激活函数。虽然 ReLU（修正线性单元）是当今首选的激活函数，但在深度学习时代之前，通常使用
    sigmoid 激活函数。下面的图示展示了 sigmoid 激活函数的形式，它将预激活值 $z$（输入的加权和加上偏置）转换为激活值 $a \in (0,
    1)$。sigmoid 函数在预激活值为大的正数（或负数）时在 1（或 0）处饱和，导致深度网络出现梯度消失/梯度为零的问题，这也是为什么 sigmoid
    激活函数不再被青睐用于隐藏层的原因。


    ![Sigmoid 激活函数](img/ae65e737df4a9f5732c91f7aea579fc8_252_0.png)


    下表列出了其他常用的激活函数。我们将在后续章节中学习这些函数如何为人工神经网络模型赋予非线性。


    | 函数 | 方程 | 图形 | 备注 |

    |---|---|---|---|

    | ReLU | $g(z) = \begin{cases} 0, & z < 0 \\ z, & z \ge 0 \end{cases}$ | ![ReLU
    图形](image_2.png) | - 效果非常好，是首选激活函数<br>- 计算成本低<br>- 当 z < 0 时神经元“死亡”（如果“学习率”设置得当，这不是大问题）
    |

    | Leaky ReLU | $g(z) = \begin{cases} \alpha z, & z < 0 \\ z, & z \ge 0 \end{cases}$
    | ![Leaky ReLU 图形](image_3.png) | - 如果“死亡”的 ReLU 神经元导致问题，可作为替代方案<br>- 性能可能不如 ReLU
    |

    | 双曲正切 (tanh) | $tanh(z) = \frac{e^z - e^{-z}}{e^z + e^{-z}}$ | ![Tanh 图形](image_4.png)
    | - 范围：(-1, 1)<br>- 容易出现梯度消失问题，且计算成本高 |


    ### 输出层的激活函数：


    输出层激活函数的选择取决于手头的任务。对于回归问题，不使用激活函数（等价于线性函数 $g(z) = z$）。对于类别互斥的分类任务，则使用 softmax
    函数。图 11.6 展示了一个用于 3 个互斥类别的网络，其输出层使用了 softmax 激活函数。


    ![图 11.6：使用 softmax 激活函数的前馈神经网络。（为清晰起见，未显示表示层的下标）](img/ae65e737df4a9f5732c91f7aea579fc8_252_1.png)


    Softmax 是一个指数函数，它生成归一化的激活值，使其总和为 1。在图 11.6 中，激活值 $a_j (j \in [1, 2, 3])$ 的生成如下：


    $$a_j = g_{softmax}(z_j) = \frac{e^{z_j}}{\sum_{k=1}^3 e^{z_k}}$$


    在人工神经网络领域，作为 softmax 函数输入的预激活值 ($z_j$) 也称为 logits。Softmax 激活值介于 0 和 1 之间，因此被解释为类别成员概率。预测的类别标签取为概率（或激活值）最大的类别：


    $$\hat{y} = argmax(a_j, j \in [1, 2, 3])$$


    正如你将在下一小节看到的，在模型训练期间直接使用的是预测的类别概率（而不是预测的类别标签）。对于类别不互斥的分类任务，输出层的神经元使用 sigmoid 函数。对于二元互斥分类问题，输出层使用单个神经元时也使用
    sigmoid 函数。


    ### 损失函数与代价函数


    人工神经网络通过最小化目标变量的测量值与预测值之间的不匹配来优化其模型参数。损失函数量化了单个样本的这种不匹配。在模型训练期间被最小化的、训练数据集样本上的损失函数的平均值称为代价函数。对于回归问题，常用的损失函数是
    mse（均方误差）：


    $$MSE \ Loss = (y_{sample} - \hat{y}_{sample})^2$$


    相应的代价函数变为：


    $$MSE \ Cost = \frac{1}{\# \ of \ samples} \times \sum_{samples} (y_{sample} -
    \hat{y}_{sample})^2$$


    注意，上述表达式适用于标量输出；对于多维输出，求和也需在不同维度上进行。回归的另一个流行损失指标是 mae（平均绝对误差），它衡量绝对差值 $|y_{sample}
    - \hat{y}_{sample}|$。与 MSE 相比，MAE 代价对异常值更稳健，因为大误差不会通过平方而受到严重惩罚。然而，由于其不连续性，MAE
    指标效率较低。可以通过 rmse（均方根误差）指标实现良好的折衷。


    对于二元/二分类问题，默认的损失函数是二元交叉熵。设 $y$（可取值 0 和 1）为数据样本的真实标签，$p$（或 $\hat{y}$）为从 sigmoid
    输出层获得的预测概率（$y = 1$ 的概率）。交叉熵损失由下式给出：


    $$Cross - entropy Loss = -y * log(p) - (1 - y) * log(1 - p) = \begin{cases} -log(1
    - p), & y = 0 \\ -log(p), & y = 1 \end{cases}$$


    上述表达式可推广到多分类情况，其中总损失是每个类别标签单独损失的总和：


    $$Multi - class cross - entropy Loss = - \sum_{c=1}^{\# \text{ of classes}} y_c
    log(p_c)$$


    其中，$y_c$ 和 $p_c$ 分别是样本属于类别 $c$ 的二元指示变量和预测概率。注意，对于多分类，目标变量将采用独热编码形式。


    ### 梯度下降优化


    一旦定义了代价/目标函数 ($J(\theta)$)，模型参数 ($\theta$) 就会被优化以最小化代价函数。深度学习库最常用的优化方法是梯度下降，其中模型参数通过多次迭代进行估计，在每次迭代中，参数沿着最陡下降方向（$J(\theta)$
    关于 $\theta$ 的梯度的负方向）更新。下面的表达式显示了第 $i$ 个模型参数的更新机制：


    $$\theta_{i, next} = \theta_{i, current} - \eta \frac{\partial}{\partial \theta_i}
    J(\theta)$$


    其中 $\eta$（学习率）是一个超参数，决定了每次迭代的更新幅度。为了说明，图 11.7 展示了简单系统（一个和两个模型参数）的代价函数通过多次迭代向其最小值演进的过程。


    ![图 11.7：代价函数向其最小值演进的过程](img/ae65e737df4a9f5732c91f7aea579fc8_254_0.png)'

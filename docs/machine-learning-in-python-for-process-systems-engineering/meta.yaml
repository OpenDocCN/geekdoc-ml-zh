    # Mathematical background


    Let there be $N$ training samples ($\mathbf{x}, y$) where $\mathbf{x}$ is an input
    vector in $m$-dimensional input space and $y$ is the class label ($\pm 1$). Let
    the optimal separating hyperplane (a line in 2D space) be represented as $\mathbf{w}^T\mathbf{x}
    + b = 0$ where the model parameters ($\mathbf{w}, b$) are found such that


    $$\mathbf{w}^T\mathbf{x}_i + b \geq 1 \quad \text{for positive samples } (y_i
    = 1)$$

    $$\mathbf{w}^T\mathbf{x}_i + b \leq -1 \quad \text{for negative samples } (y_i
    = -1)$$


    The supporting planes get represented as $\mathbf{w}^T\mathbf{x} + b = 1$ and
    $\mathbf{w}^T\mathbf{x} + b = -1$. The above equations are simply stating the
    requirements that the data points must lie on the correct side of their corresponding
    support planes. Using simple trigonometry, it can be shown that the margin is
    given by $\frac{2}{||\mathbf{w}||}$ where $||\mathbf{w}||$ is vector norm. Therefore,
    model parameters are found by maximizing $\frac{2}{||\mathbf{w}||}$ (or equivalently,
    minimizing $||\mathbf{w}||$) while meeting the above constraints. Specifically,
    the following optimization problem is solved


    $$\min_{\mathbf{w},b} \quad \frac{1}{2}||\mathbf{w}||^2$$

    $$\text{s.t.} \quad y_i(\mathbf{w}^T\mathbf{x}_i + b) \geq 1, \quad i = 1, \cdots
    N$$


    *eq. 1*


    Once the model has been fitted, class predictions for test sample, $\mathbf{x}_t$,
    are made as follows.


    $$\hat{y}_t = sign(\mathbf{w}^T\mathbf{x}_t + b)$$


    $\mathbf{x}_t$ belongs to positive class if it lies on positive side of separating
    hyperplane


    The expression inside the sign function is also called decision function and therefore,
    positive decision function results in positive class prediction and vice-versa.


    > The optimization formulation in Eq. 1 and all the others that we will see in
    this chapter share a very favorable property of possessing a unique global minimum.
    This is a huge advantage when compared to other powerful ML methods like neural
    networks where the issue of local minimums can be an inconvenience.'

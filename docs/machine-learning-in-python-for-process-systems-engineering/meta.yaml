  md: "Previously, we computed the TD targets as $\\tilde{y}_i = r_i + \\gamma Q_{w,target}(s'_i,\
    \ \\mu_{\\theta,target}(s'_i))$ for each $i^{th}$ transition tuple in a minibatch\
    \ from RM (see Algorithm 4). We will now make a small modification in this formula\
    \ as follows\n\n$\\tilde{y}_i = r_i + (1 - done_i) * \\gamma Q_{w,target}(s'_i,\
    \ \\mu_{\\theta,target}(s'_i))$ for each $i^{th}$ tuple in minibatch\n\nThe revised\
    \ formula states the obvious fact that the TD target is simply the reward ($r_i$)\
    \ if the episode or task terminates ($done_i$ equals 1 or True) from taking action\
    \ $a_i$ at state $s_i$. The function below implements this formula.\n\n```\ndef\
    \ get_TD_targets(rewards, target_Q_values, dones, gamma=0.95):\n    \"\"\"\n \
    \   Args:\n        rewards: A 1D numpy array\n        target_Q_values: A 2D numpy\
    \ array with 1 column\n        dones: A 1D numpy array\n\n    Returns:\n     \
    \   td_targets: A 2D numpy array with 1 column\n    \"\"\"\n    td_targets = np.zeros_like(target_Q_values)\n\
    \    for i in range(target_Q_values.shape[0]):\n        if dones[i]:\n       \
    \     td_targets[i] = rewards[i]\n        else:\n            td_targets[i] = rewards[i]\
    \ + gamma*target_Q_values[i]\n\n    return td_targets\n```\n\nAlright, we are\
    \ now at the last utility function that we will define. This function updates\
    \ the main actor and critic networks using data from the sampled minibatch. There\
    \ are several new concepts involved here that warrant some explanations. You will\
    \ notice the use of tf.function decorator$^{78}$ which converts a regular Python\
    \ function to a Tensorflow function resulting in faster computations. The input\
    \ signature specifies the shape and type of each Tensor argument to the function.\
    \ Within the function, GradientTape API$^{79}$ is utilized which implements automatic\
    \ differentiation for gradient computations. This API allows Tensorflow to keep\
    \ a ‘record’ of what operations are executed within the context of the tf.GradientTape.\
    \ When"
  merge: -1

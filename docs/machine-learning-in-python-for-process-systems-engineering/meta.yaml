    \ is that the interface refreshes itself automatically to display latest results\
    \ at regular interval. This is accomplished by including the following in the\
    \ head section which refreshes/re-loads the interface every 30 seconds.\n\n```\n\
    <meta http-equiv=\"refresh\" content=\"30\">\n```\n\nOur web app is now complete.\
    \ Go ahead and try it out. You should see the interface shown in Figure 14.1.\
    \ The top metric plots will first show only a single data-point and new data-points\
    \ will show up after every automatic refresh. The world of web development is\
    \ huge, and we covered only a small portion of it in this chapter to develop a\
    \ very basic user interface with limited functionalities. Technologies like Ajax,\
    \ jQuery, Angular, React, Bootstrap exist that can be used to make extremely complex\
    \ and functionality-rich websites.\n\n# Summary\n\nIn this chapter we studied\
    \ the very last phase of the end-to-end development of a machine learning project,\
    \ i.e., taking the results from ML models to the non-technical end-users via web\
    \ applications. Concepts learnt in this chapter can help you rapidly deploy your\
    \ tool and collect crucial user feedback. With this chapter, we have come to the\
    \ end of our process data science journey. We hope that you enjoyed reading this\
    \ book as much as we enjoyed writing it!"

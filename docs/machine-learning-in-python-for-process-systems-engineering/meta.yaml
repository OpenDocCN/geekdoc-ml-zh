    \left( \underbrace{r_{t+1} + \gamma \max_{a} \widehat{Q}^*_{old}(s_{t+1}, a'')
    - \widehat{Q}^*_{old}(s_t, a_t)}_{\text{Temporal difference (TD) error}} \right)
    \quad \text{eq. 2}$$


    where $0 \leq \alpha \leq 1$ is a learning-rate hyperparameter. Eq. 2 is a remarkably
    simple formula, and it has been shown that given sufficient iterations, the estimated
    Q values will converge to the


    $^{67}$ In RL literature, states are usually shown along the rows in a Q-table.

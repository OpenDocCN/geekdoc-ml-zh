    ## 7.3 SVDD：简介


    支持向量数据描述（SVDD）是 SVM 算法的无监督形式，用于处理训练样本仅属于单一类别的问题，其模型目标是确定任何测试/新样本是否属于同一类数据。考虑图
    7.7 中的启发性示例。这里，我们如何获得训练数据的模型，以便能够将样本 X 称为异常值/异常？此类问题在流程工业中相当常见。流程监控和设备健康监控就是一些例子领域，其中大多数/所有可用的流程数据可能仅属于正常工厂运行类别，而建模目标是识别任何异常数据点。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_168_0.png)


    图 7.7：仅包含一个类别的二维训练数据集。红色边界显示了数据集的潜在描述模型，可用于区分测试样本 X 和训练样本。


    SVDD 背后的思想是用一个超球体（二维中是圆，三维中是球体）包裹训练数据，该超球体在最小体积内包含最大数量的数据点。任何距离超球体中心超过超球体半径的新观测值都可被视为异常观测。但图
    7.7 中的数据看起来并不适合用一个圆来包裹？这是正确的，我们的解决方法是使用核函数将原始数据隐式地投影到一个更高维的空间，在那里数据可以被充分包裹在一个紧凑的超球体中。最优超平面在原始空间上的投影将显示为围绕数据集的紧密非线性边界！


    就像经典的二类 SVM 一样，只有一小部分训练样本能够完全定义超球体。这些数据点或支持向量位于超球体的圆周上或外部（或在原始空间中的非线性边界上）。


    ## 数学背景


    再次假设 $\varphi(x)$ 代表高维特征空间中的一个数据点。在这个空间中，最优超球体通过以下优化问题找到


    $$\min_{R, a, \xi} \quad R^2 + C \sum_{i=1}^N \xi_i$$

    $$\text{s.t.} \quad ||\varphi(x_i) - a||^2 \leq R^2 + \xi_i, \quad i = 1, \cdots
    N$$

    $$\xi_i \geq 0$$


    很明显，上述程序试图最小化以 ''a'' 为中心的超球体的半径（$R$），使得大多数数据点位于超球体内。松弛变量 $\xi$ 允许某些样本落在外部，而此类违规的数量通过超参数
    $C$ 进行调整。与之前一样，该问题以其对偶形式求解


    $$\min_{\alpha} \quad \sum_{i=1}^N \sum_{j=1}^N \alpha_i \alpha_j K(x_i, x_j)
    - \sum_{i=1}^N \alpha_i K(x_i, x_i)$$

    $$\text{s.t.} \quad \sum_{i=1}^N \alpha_i = 1$$

    $$0 \leq \alpha_i \leq C \quad i = 1, \cdots N$$


    与 SVM 类似，alpha 表示训练样本相对于最优边界的位置。以下关系成立


    -   边界内部：$||\varphi(x_i) - a|| < R \Rightarrow \alpha_i = 0$

    -   边界上：$||\varphi(x_i) - a|| = R \Rightarrow 0 < \alpha_i < C$

    -   边界外部：$||\varphi(x_t) - a|| > R \Rightarrow \alpha_i = C$


    最优解满足以下表达式


    $$R = \sqrt{K(x_s, x_s) - 2 \sum_{i \in \{SV\}} \alpha_i K(x_s, x_i) + \sum_{i
    \in \{SV\}} \sum_{j \in \{SV\}} \alpha_i \alpha_j K(x_i, x_j)}$$


    其中 $x_s$ 是位于边界上的任何支持向量。任何测试观测 $x_t$，如果其在映射空间中到中心 $a$ 的距离大于 $R$，则被视为异常，距离计算如下


    $$Dist(\varphi(x_t), a)^2 = ||\varphi(x_t) - a||^2$$

    $$= K(x_t, x_t) - 2 \sum_{i \in \{SV\}} \alpha_i K(x_t, x_i) + \sum_{i \in \{SV\}}
    \sum_{j \in \{SV\}} \alpha_i \alpha_j K(x_i, x_j)$$


    如你所见，只需要指定核函数和其他模型超参数；不需要了解映射 $\varphi$。


    ## OC-SVM 与 SVDD


    还有另一种与 SVDD 密切相关的技术，称为单类 SVM（OC-SVM）。事实上，OC-SVM 是目前 Sklearn 中可用的无监督 SVM 算法。OC-SVM
    寻找一个能将训练数据与原点最佳分离的超平面。其核化的对偶形式为


    $$\min_{\alpha} \quad \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N \alpha_i \alpha_j
    K(x_i, x_j)$$

    $$\text{s.t.} \quad \sum_{i=1}^N \alpha_i = 1$$

    $$0 \le \alpha_i \le C \quad i = 1, \cdots N$$


    你会注意到，对于高斯核，OC-SVM 的公式变得与 SVDD 等价，因为 $K(x_i, x_i) = 1$，并且我们最终得到相同的乘数值。决策边界也是相同的。对于其他满足
    $K(x_i, x_i) \ne 1$ 的核，结果会有所不同。


    ## 带宽参数与 SVDD 示例


    在本小节中，我们将尝试使用 Sklearn 的 OneClassSVM 为图 7.7 中的数据集构建边界。然而，在此之前，我们需要确定 SVDD 模型超参数
    $C$ 和 $\sigma$ 的策略。如果有足够的属于“正常”和“异常”两类的验证数据样本，则可以使用交叉验证来选择能给出最佳验证准确率的 $C$ 和 $\sigma$。然而，这通常是不可能的，并且与训练数据集一样，验证数据集也只包含“正常”类样本！为了能够有根据地选择超参数，让我们再看看它们。



    ![](img/ae65e737df4a9f5732c91f7aea579fc8_64_0.png)


    Confusion matrix can be used to compute several single-valued metrics, summarized
    in the metric formula table below. The most straightforward metric is ‘accuracy’
    which simply communicates the ratio of true predictions to the total number of
    predictions. Accuracy can, however, be a misleading metric for imbalanced datasets
    (where more samples belong to one particular class). For example, in our example,
    overall accuracy is ~95% (88 out of 93), but we can see that the accuracy in correctly

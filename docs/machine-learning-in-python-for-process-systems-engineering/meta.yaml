    # Fault detection indices


    For PLS, 3 monitoring indices are computed: one $T^2$ statistic from t-scores,
    and two SPE statistics from **X** and **Y** residuals. Like in PCA, $T^2$ statistic
    quantifies the systematic variations in predictor variables (**X**) that are related
    to the systematic variations in response (**Y**) variables. Large deviation in
    $T^2$ statistic implies significant changes in process operating conditions. Let
    $t_i$ denote the $i^{th}$ row of **T**. The $T^2$ index for this data-point is
    given by


    $$T^2 = \sum_{j=1}^{k} \frac{t_{ij}^2}{\sigma_j^2} = t_i^T \Lambda_k^{-1} t_i$$'

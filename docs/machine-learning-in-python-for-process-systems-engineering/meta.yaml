    # Fault detection for test data


    Lee et al.28 and Yin et al.29 have published detailed accounts of process monitoring
    performances of several ML techniques for TEP and have shown superior fault detection
    capability of ICA. We will try to corroborate their findings for some of the faults.
    But, let us first learn a few terms that are commonly used to evaluate performance
    of any monitoring tool. The terms are fault detection rate (FDR) and false alarm
    rate (FAR).


    $$\text{FDR} = \frac{\text{Number of samples correctly flagged as faulty}}{\text{Total
    number of faulty samples}} \times 100$$


    $$\text{FAR} = \frac{\text{Number of samples incorrectly flagged as faulty}}{\text{Total
    number of non-faulty samples}} \times 100$$


    A well-designed monitoring tool has high FDR and low FAR values. Low FDR and high
    FAR values are both undesirable because while low FDR value leads to safety issues
    and economic losses due to delayed/no abnormality detection, high FAR value leads
    to loss of user''s confidence in the tool and eventually tool''s demise.


    Let us now use these terms to compare the performances of PCA and ICA for detecting
    Faults 10 and 5. Figures 6.6 and 6.7 show the ICA/PCA monitoring charts for these
    faults. For Fault 10, ICA gives significantly higher FDR. There are many samples
    between 400 to 600 where PCA metrics are below their control limits despite the
    presence of process abnormalities. The performance difference is even more prominent
    for Fault 5 test data. Sample 400 onwards PCA charts incorrectly indicate a normal
    operation although it is known that the faulty condition remains till the end
    of the sampling period. Another point to note is that both PCA



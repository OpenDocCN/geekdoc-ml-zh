  md: '# # Chapter 5

    Dimension Reduction and Latent Variable Methods (Part 1)


    It is not uncommon to have hundreds of process relevant variables being measured
    at manufacturing facilities. If you are looking to build a machine learning model
    using these process variables, then the high dimensionality (number of model variables)
    will present you several unique challenges related to algorithmic issues (due
    to collinearity among variables), difficulty in visualizing data, large computational
    costs, and slow model training. However, this problem, referred to as the *curse
    of dimensionality*, should not dampen your spirits! Conservation laws such as
    mass balances, thermodynamics constraints, enforced product specifications, and
    other operational restrictions induce correlations among the process variables
    and make it appear as if the measured variables are all derived from a small number
    of hidden (un-measured) variables. Latent variable-based methods reduce process
    dimensionality by finding these hidden latent variables.


    PCA and PLS are among the most popular latent variable-based statistical tools
    and have been used successfully in several process monitoring and soft sensing
    applications. This chapter provides a comprehensive exposition of the PCA and
    PLS techniques and teaches you how to apply them on process data. Specifically,
    the following topics are covered


    +   - Introduction to PCA and PLS

    - Process modeling and monitoring via PCA and PLS

    - Fault diagnosis for root cause analysis

    - Nonlinear and dynamic variants of linear PCA and PLS'
  merge: -1

    ```\n\nIn this current example, we attempted to predict if an engine will fail\
    \ within the next 30 cycles. In the next subsection, we will try to predict the\
    \ numeric RUL of each engine directly. The code will largely remain the same except\
    \ for a few tweaks.\n\n## Remaining useful life (RUL) prediction using LSTM\n\n\
    To convert the binary classification model into a regression model for RUL estimation,\
    \ we will employ the following minor modifications in the previous code. Reader\
    \ should refer to the complete code provided online.\n\n- Binary labels are not\
    \ computed\n- RUL values are used as target outputs\n- Linear activation function\
    \ is used instead of sigmoid function in output layer\n\nFigure 12.14 compares\
    \ the actual versus predicted RUL values for the test engine dataset. It is apparent\
    \ that the model performs satisfactorily well. Such accurate estimation of remaining\
    \ useful life of process equipment can be a great assistance in maintenance planning\
    \ and avoidance of costs due to unexpected equipment failures.\n\nFigure 12.14:\
    \ Predicted vs observed engine RULs for test aircraft engine dataset\n\nIt won’t\
    \ be surprising if you are already thinking about all the different applications\
    \ where you can use the predictive capabilities of RNNs (or more specifically\
    \ LSTMs)! Such enthusiasm is not unwarranted, however, remember that a key requirement\
    \ for a successful predictive solution is the availability of historical database\
    \ on failure events. Moreover, the available sensor readings should show some\
    \ degradation pattern as indications of impending failure. As long as these two\
    \ data requirements are met, you can achieve your predictive objectives.\n\n##\
    \ Summary\n\nIn this chapter, we studied the application of ANNS for dynamic/temporal\
    \ systems. We learnt about the remarkable capabilities of LSTM in extracting patterns\
    \ from long sequences. We implemented RNNs for a few typical applications in PSEs,\
    \ viz, system identification, fault classification, and predictive failure prediction.\
    \ After working out these examples, you would have gained a very good understanding\
    \ on how to setup the RNN-based solution for your specific problems. In the next\
    \ chapter, we will study reinforcement learning, which is another powerful ANN-based\
    \ technique.\n\n# Chapter 13\n## Reinforcement Learning\n\nThe ML algorithms we\
    \ have learnt till now rely upon supply of all modeling-relevant input/output\
    \ data prior to model training. In contrast, reinforcement training (RL) takes\
    \ ML a step further and is designed to collect the required training data by itself\
    \ through interactions with the physical system that it is trying to learn about.\
    \ Through trial-and-error, an RL model learns what actions to take to accomplish\
    \ any given task. During training, actions that result in favorable results/rewards\
    \ get reinforced and after multiple interactions, the model eventually learns\
    \ an optimal action plan/policy! Sounds impressive, right?\n\nRL mimics how we,\
    \ humans, learn things (such as riding a cycle) through trial & error and environment\
    \ interactions. This concept opens up a plethora of potential RL applications.\
    \ You have probably already heard or seen some of the remarkable feats achieved\
    \ by RL models such as computers playing games better than the best human players\
    \ or humanoid robots learning how to run, etc. In this chapter, we will focus\
    \ on process industry-related applications of RL, specifically for process control.\n\
    \nRL is a very broad and constantly evolving field. There are a lot of RL-specific\
    \ terminology and concepts. We will declutter the world of RL in this chapter\
    \ and you will learn how to setup and solve an RL problem. Specifically, this\
    \ chapter covers the following topics\n\n- Introduction to RL and RL agents as\
    \ process controllers\n- Introduction to Q-learning, deep RL, and Actor-Critic\
    \ architecture\n- Introduction to DDPG algorithm for handling process industry-relevant\
    \ problems\n- Tank level control using an RL agent\n\n### 13.1 Reinforcement Learning:\
    \ An Introduction\n\nRL is the branch of ML wherein an agent repeatedly interacts\
    \ with its environment to learn the best way to accomplish a task or the optimal\
    \ action policy. Figure 13.1 shows the basic setup of reinforcement learning.\
    \ As shown, the RL agent receives information about the current state ($s_t$)\
    \ of the environment based on which an action ($a_t$) is decided (as per agent’s\
    \ action policy). As a result of the action, the environment moves to a new state\
    \ ($s_{t+1}$) and generates a scalar reward ($r_{t+1}$) indicating how good was\
    \ the taken action. Before the agent takes another action, the learning algorithm\
    \ uses the information ($s_t$, $a_t$, $r_{t+1}$, $s_{t+1}$) to improve its policy\
    \ and then the cycle continues. Eventually, an optimal policy is obtained that\
    \ maps environment states to optimal actions such that the total rewards earned\
    \ till task completion is maximized. Once trained, the learning process can be\
    \ stopped, and the policy function can be deployed.\n\nFigure 13.1: Reinforcement\
    \ learning setup depicting an agent’s interactions with its environment\n\nA simple\
    \ real-life analogy could be the task of finding the optimal driving route from\
    \ your office to home in a new town. Here, you are the agent and environment would\
    \ comprise of your car, city’s roads and highways network, traffic, weather, your\
    \ geospatial location, and basically everything excluding you. The total reward\
    \ to maximize could be the negative of the time taken to reach home (less driving\
    \ time is better). During driving, depending on the environment state, you would\
    \ take decisions on whether to take any highway exit or make any turn or not.\
    \ Assuming no internet (and google maps!), being new in town, you would not know\
    \ if taking those exits or turns will help you reach home faster and therefore\
    \ you will explore different possible routes. After several trials, you would\
    \ gain a good understanding of the town and eventually would be able to take the\
    \ most optimal action for any given environment state at any point during driving.\
    \ RL follows the same methodology to find the optimal mapping using some systematic\
    \ (and very smart) learning algorithms."

    # PCA


    Not all outliers are bad and warrant removal. For example, consider Figure 4.14.
    Here, two kinds of outliers are highlighted. While samples A tend to break away
    from the majority correlation, samples B follow the correlation but lie far away
    from the majority of data.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_98_1.png)


    Figure 4.14: Different types of outliers which can be distinguished via PCA


    Depending on the context of our problem, we may or may not want to remove samples
    B. The MD-based approach won''t distinguish between these two kinds of outliers
    and therefore, won''t work for us if we want to retain samples B. In that case,
    PCA (principal component analysis) can be employed. We will learn PCA in detail
    in Chapter 5. There you will understand how PCA distinguishes between these two
    different kinds of outlying observations. Classical PCA is based on sample covariance
    of data. Therefore, if the given dataset is highly contaminated with outliers,
    MCD-based covariance can be used in PCA for robust analysis.'

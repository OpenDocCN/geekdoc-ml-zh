  md: "# Determining the number of clusters\n\nOne of the limitations with EM algorithm\
    \ for GMM modeling is that the number of gaussian components is assumed to be\
    \ known beforehand. This may not always be true. To overcome this, we can use\
    \ a method similar to elbow method that we used for k-means. While in k-means,\
    \ we plotted SSEs for different number of clusters, in GMM we will utilize the\
    \ Bayesian Information Criterion (BIC) metric (introduced in Chapter 3). Unlike\
    \ SSEs, BICs increase after a while and optimal gaussian components is the value\
    \ that minimizes BIC.\n\n```\n# finding # of components via BIC method\nBICs =\
    \ []\nlowestBIC = np.inf\nfor n_cluster in range(1, 10):\n    gmm = GaussianMixture(n_components\

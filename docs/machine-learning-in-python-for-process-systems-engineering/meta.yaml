    Figure 9.6 also shows the validation error for different number of trees in the
    forest. What we see here is a general characteristic of RFs: as number of trees
    increase, the validation errors plateau out. Therefore, if computation time is
    not a concern, it is preferable to use as many trees as possible until the error
    levels out. As far as $M$ is concerned, a lower value leads to greater reduction
    in variance but increases the model bias. Do note that RF primarily brings down

    ## 11.3 Mathematical Background


    Let’s consider a sample input $x \in R^4$ from the CCPP dataset and trace its
    path as it moves through the layers of the network to generate the output. In
    this forward pass (also called forward propagation), the inputs are first processed
    by the neurons of the first hidden layer. In the $j^{th}$ neuron of this layer,
    the weighted sum of the inputs are non-linearly transformed via an activation
    function, $g$


    $a_j = g(w_j^T x + b_j)$


    $w_j \in R^4$ are the weights applied to the inputs and $b_j$ is the bias added
    to the sum. Thus, each neuron has 5 parameters (4 weights and a bias) leading
    to 40 parameters for all the 8 neurons of the $1^{st}$ layer that need to be estimated.
    Outputs of all the 8 neurons form vector $a^{(1)} \in R^8$


    $a^{(1)} = g^{(1)}(W^{(1)}x + b^{(1)})$


    where each row of $W^{(1)} \in R^{8 \times 4}$ contains the weights of a neuron.
    The same activation function is used by all the neurons of a layer. $a^{(1)}$
    becomes the input to the $2^{nd}$ hidden layer.


    $a^{(2)} \in R^5 = g^{(2)}(W^{(2)}a^{(1)} + b^{(2)})$


    where $W^{(2)} \in R^{5 \times 8}$. Each neuron in the $2^{nd}$ layer has 8 weights
    and a bias parameter, leading to 45 parameters in the layer. The final output
    layer had a single neuron with 6 parameters and no activation function, giving
    the network output as follows


    $a^{(3)} = \hat{y} = (w^{(3)})^T a^{(2)} + b^{(3)}$


    where $w^{(3)} \in R^5$.


    ### Activation functions


    Activation functions (AFs) are what impart non-linear capabilities to neural nets.
    We used ReLU activation function for CCPP modeling. While ReLU (rectified linear
    unit) is the preferred AF now-a-days, pre-deep learning era used to employ sigmoid
    activation function. Illustration below shows the form of sigmoid AF, which transforms
    pre-activation, $z$ (weighted sum of inputs plus bias), into activation $a \in
    (0, 1)$. The saturation of sigmoid functions at 1 (or 0) for large positive (or
    negative) value of pre-activation results in the issue of vanishing/zero gradients
    for deep networks and is the reason why sigmoid AFs are not favored anymore for
    hidden layers.


    ![Sigmoid Activation Function](img/ae65e737df4a9f5732c91f7aea579fc8_252_0.png)


    Table below lists other commonly employed activation functions. We will study
    in a later section how these functions impart non-linearity to ANN models.


    | Function | Equation | Graph | Remarks |

    |---|---|---|---|

    | ReLU | $g(z) = \begin{cases} 0, & z < 0 \\ z, & z \ge 0 \end{cases}$ | ![ReLU
    Graph](image_2.png) | - works very well and preferred AF<br>- computationally
    cheap<br>- "dead" neurons for z <0 (not a big issue if ''learning-rates'' are
    properly set) |

    | Leaky ReLU | $g(z) = \begin{cases} \alpha z, & z < 0 \\ z, & z \ge 0 \end{cases}$
    | ![Leaky ReLU Graph](image_3.png) | - alternative if ''dead'' ReLU neurons cause
    issues<br>- may not perform better than ReLU |

    | Hyperbolic tangent (tanh) | $tanh(z) = \frac{e^z - e^{-z}}{e^z + e^{-z}}$ |
    ![Tanh Graph](image_4.png) | - Range: (-1, 1)<br>- prone to vanishing gradient
    issue and computationally expensive |


    ### Activation functions for output layer:


    The choice of activation function in the output layer depends on the task at hand.
    For regression problems, no activation function (equivalently, $g(z) = z$ linear
    function) is used. For classification tasks where the classes are mutually exclusive,
    softmax function is employed. Figure 11.6 shows a network for 3 exclusive classes
    with softmax activation in the output layer.


    ![Figure 11.6: FFNN with softmax activation function. (Subscripts denoting layers
    are not shown for clarity)](img/ae65e737df4a9f5732c91f7aea579fc8_252_1.png)


    Softmax is an exponential function that generates normalized activations so that
    they sum up to 1. In Figure 11.6, activation $a_j (j \in [1, 2, 3])$ is generated
    as follows


    $$a_j = g_{softmax}(z_j) = \frac{e^{z_j}}{\sum_{k=1}^3 e^{z_k}}$$


    In ANN world, the pre-activations ($z_j$) that are fed as inputs to the softmax
    function as also called logits. The softmax activations lie between 0 and 1, and
    hence, they are interpreted as class-membership probabilities. The predicted class
    label is taken as the class with maximum probability (or activation)


    $$\hat{y} = argmax(a_j, j \in [1, 2, 3])$$


    As you will see in next subsection, the predicted class probabilities (and not
    the predicted class label) are directly used during model training. For classification
    tasks where the classes are not mutually exclusive, sigmoid function is employed
    in the neurons of the output layer. Sigmoid function is also used for binary mutually
    exclusive classification problems with a single neuron in the output layer.


    ### Loss functions & cost functions


    ANNs optimize their model parameters by minimizing the mismatch between measured
    and predicted values of the target variable(s). Loss function quantifies this
    mismatch for a single sample. The average of loss function over the samples of
    the training dataset that is minimized during model training is called cost function.
    For regression problems, the commonly employed loss function is mse (mean squared
    error)


    $$MSE \ Loss = (y_{sample} - \hat{y}_{sample})^2$$


    The corresponding cost function becomes


    $$MSE \ Cost = \frac{1}{\# \ of \ samples} \times \sum_{samples} (y_{sample} -
    \hat{y}_{sample})^2$$


    Note that the above expression is for a scalar output; for multi-dimensional output,
    summation is also carried over different dimensions. Other popular loss metric
    for regression is mae (mean absolute error) which measures the absolute difference
    $|y_{sample} - \hat{y}_{sample}|$. MAE cost is more robust to outliers compared
    to MSE as large errors are not heavily penalized through squaring. Mae metric,
    however, is less efficient due to the discontinuous nature. A good compromise
    can be achieved by rmse (root mean squared error) metric.


    For binary/2-class classification problems, binary cross-entropy is the default
    loss function. Let $y$ (can take value 0 and 1) be the true label for a data sample
    and $p$ (or $\hat{y}$) be the predicted probability (of $y = 1$) obtained from
    sigmoid output layer. The cross-entropy loss is given by


    $$Cross - entropy Loss = -y * log(p) - (1 - y) * log(1 - p) = \begin{cases} -log(1
    - p), & y = 0 \\ -log(p), & y = 1 \end{cases}$$


    The above expression is generalized as follows for a multiclass classification,
    where overall loss is sum of separate losses for each class label


    $$Multi - class cross - entropy Loss = - \sum_{c=1}^{\# \text{ of classes}} y_c
    log(p_c)$$


    where, $y_c$ and $p_c$ are binary indicator and predicted probability of a sample
    belonging to class $c$, respectively. Note that for multi-class classification,
    the target variable will be in one-hot encoded form.


    ### Gradient descent optimization


    Once the cost/objective function ($J(\theta)$) has been defined, the model parameters
    ($\theta$) are optimized to minimize the cost function. The most common optimization
    approach used by deep learning libraries is gradient descent where model parameters
    are estimated in multiple iterations, and in each iteration parameters are updated
    in the direction of steepest descent (negative of the gradient of $J(\theta)$
    with respect to $\theta$). The expression below shows the update mechanism for
    the $i^{th}$ model parameter


    $$\theta_{i, next} = \theta_{i, current} - \eta \frac{\partial}{\partial \theta_i}
    J(\theta)$$


    where $\eta$ (learning rate), a hyperparameter, determines the magnitude of update
    in each iteration. For illustration, Figure 11.7 shows the progression of cost
    function towards its minima through multiple iterations for simple systems (one
    and two model parameters).


    ![Figure 11.7: Progression of cost function towards its minima](img/ae65e737df4a9f5732c91f7aea579fc8_254_0.png)'

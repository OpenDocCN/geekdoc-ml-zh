    # Dynamic PCA (DPCA)


    In previous section, we studied static PCA where static correlations among process
    variables were extracted. However, variables could be auto-correlated as well,
    i.e., the samples may not be temporally independent of each other. Such observations
    arise when samples are collected sequentially in time with small sampling period,
    for example, taking process data every few minutes over the last 1 year. Static
    PCA does not extract out the dynamic relationships resulting in auto-correlated
    scores which lead to unsatisfactory results such as excessive false alarms for
    process monitoring applications.


    To tackle process dynamics, Ku et al.19 proposed a simple extension of static
    PCA where past data-points are treated as additional process variables as shown
    in the illustration below.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_117_0.png)


    Each sample (except the first *l* samples) in the original data matrix has been
    augmented with data-points from the past *l* samples. Static PCA can now be performed
    on this augmented matrix after mean-centering and scaling just like we did before.
    Ku et al. have shown that this approach is efficient at extracting out linear
    static and dynamic correlations. A simple example of dynamic correlation could
    be


    $$x_{t,1} = 0.8x_{t-1,1} + x_{t-1,2} \quad ; x \in \mathbb{R}^{2 \times 1}$$


    Augmenting just one previous sample would suffice for such a system. Augmented
    sample row is similarly generated for test data when using the fitted PCA model
    to derive the scores for a test data-point. DPCA approach has proven to be useful
    in several industrial applications. The code below shows how to generate the augmented
    matrix with lag period of 5. Note that the lag period is a hyperparameter and
    its value needs to be set judiciously. Cross-validation'

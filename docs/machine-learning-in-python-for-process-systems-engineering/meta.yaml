    # 11.5 Neural Net Hyperparameter Optimization


    We have seen that before executing the model.fit command, several hyperparameters
    have to be specified. These include, amongst others, network depth, network width,
    number of epochs, minibatch size, learning rates, regularization penalty, activation
    function type. While general recommendations exist for most of the hyperparameters,
    specifying the number of hidden layers and the number of neurons in every layer
    requires some work as these depend largely on the specific problem at hand.


    Common approaches for tuning the hyperparameters are based on manual trials and
    automated grid (or random) searches. In manual approach there are two strategies.
    You can choose a complex network structure (more layers and neurons than you ‘feel’
    necessary) and use regularization techniques and early stopping (these are discussed
    in next section) to avoid overfitting. Alternatively, you can start with a simple
    structure (one hidden layer and reasonable number of neurons) and gradually increase
    the network depth and number of neurons until the overfitting begins.



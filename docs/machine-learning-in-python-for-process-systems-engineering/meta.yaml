    # 5.3 Variants of Classical PCA


    Several implicit assumptions were made in the previously discussed PCA methodology.
    Latent variables were assumed to be a linear combination of measured variables,
    each sample was assumed to be statistically independent of past samples, and data
    were assumed to be gaussian distributed. It is common to find these assumptions
    violated in process data and therefore, in this section, we will relax these assumptions
    and learn how to implement PCA for nonlinear and dynamic data. The methodologies
    primarily involve transforming raw data appropriately such that standard PCA can
    be applied on them to get satisfactory results.'

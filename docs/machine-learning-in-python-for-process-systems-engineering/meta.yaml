    ## Embedded methods


    Embedded methods make use of algorithms where selection of variables is an inherent
    part of the model fitting process itself. We already saw one of the methods in
    the previous chapter, Lasso regression, where irrelevant inputs are eventually
    removed from model by assigning them zero coefficients. Decision trees and random
    forests are another set of algorithms which directly provide feature importances
    after model fitting. We will study them in Chapter 9.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_92_0.png)


    Embedded methods are computationally less expensive than wrapper methods and work
    best when the number of samples are much higher than the number of inputs. Below
    is a quick implementation of Lasso regression for our simulated dataset where
    we use the model coefficients to judge any input''s importance.


    ### Sklearn implementation


    We will employ LassoCV model which automatically selects a penalization strength
    using cross-validation. As shown, Lasso has recovered 8 out of 10 relevant inputs.


    ```

    # fit Lasso model

    from sklearn.linear_model import LassoCV

    Lasso_model = LassoCV(cv=5).fit(X_scaled, y_scaled)


    # find the relevant inputs using model coefficients

    top_k_inputs = np.argsort(abs(Lasso_model.coef_))[::-1][:10] + 1


    \ The first few code lines take care of importing the libraries that the script\
    \ will employ.\n\n```python\n# import libraries\nimport numpy as np\nfrom sklearn.preprocessing\
    \ import PolynomialFeatures\nfrom sklearn.preprocessing import StandardScaler\n\
    from sklearn.linear_model import LinearRegression\nfrom sklearn.metrics import\
    \ r2_score\nimport matplotlib.pyplot as plt\n```\n\nWe studied NumPy before; another\
    \ library⁸ that we see here is Sklearn which is currently the most popular library\
    \ for machine learning in Python. Sklearn provides several modules (like preprocessing,\
    \ linear_model, metrics that are used here) to handle different aspects of ML.\
    \ The last library is matplotlib⁹ which is used for creating visualization plots.\
    \ The next few lines of code fetch raw data.\n\n```python\n# read data\ndata =\
    \ np.loadtxt('quadratic_raw_data.csv', delimiter=',')\nx = data[:,0:1]; y = data[:,1:]\
    \ # equivalent to y = data[:,1,None] which returns 2D array\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_50_0.png)\n\
    \nHere NumPy’s loadtxt function is used to read comma-separated data in the file\

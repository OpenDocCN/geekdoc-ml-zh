  - '[PAGE 210]


    # Impurity metric


    The impurity measure used in Eq. 1 is called *Gini impurity*. Another commonly
    employed measure is *entropy* and is given as follows for a dataset with 2 classes


    $$I_H = -\sum_{q=1}^{2} p_q \log (p_q)$$


    $I_H$ becomes 0 when $p_1=1$ (or $p_2=0$) and 1 when $p_1=p_2=0.5$. Therefore,
    reduction of entropy leads to more data purity. In practice, both Gini impurity
    and entropy provide similar results.


    # Simple Sklearn implementation


    The code below illustrates implementation of a DT regression model to a quadratic
    dataset in Sklearn. Figure 9.2a plots the predicted vs actual output values. It
    is apparent that with no restriction on tree depth overfitting has occurred. Subplot
    9.2b shows the regularizing impact of restricting the depth of the tree to only
    3 levels.


    ```

    # generate data

    Import numpy as np

    x = np.linspace(-1, 1, 50)[:, None]

    y = x*x + 0.25 + np.random.normal(0, 0.15, (50,1))


    # fit regularized DT model and predict

    from sklearn import tree

    model = tree.DecisionTreeRegressor(max_depth=3).fit(x, y)

    y_pred = model.predict(x)

    ```


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_210_0.png)'

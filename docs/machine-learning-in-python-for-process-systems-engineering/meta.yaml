- img_proc: true
  md: 'where $N_s$ is number of support vectors and {SV} is the set of support vector
    indices. Any test data point can be classified as


    $$\hat{y}_t = sign(\sum_{i=1}^N \alpha_i y_i x_i^T x_t + b) \quad \text{eq. 4}$$


    In the dual formulation, it is found that $\alpha_s$ are non-zero for only the
    support vectors and zero for the rest of the training samples. This implies that
    Eq. 4 can be reduced to


    $$\hat{y}_t = sign(\sum_{i \in \{SV\}} \alpha_i y_i x_i^T x_t + b) \quad \text{eq.
    5}$$


    > Strictly speaking, support vectors need not lie on the separating hyperplane.
    For soft margin classification, data-points with non-zero slacks are also support
    vectors and their $\alpha_s$ are non-zero (defining characteristic of the support
    vectors). The presence/absence of the support vectors impacts the solution (the
    objective function and/or the model parameters).


    At this point, you may be wondering why have we made things more complicated;
    why not solve the problem in the original form (Eq. 2) which seemed more interpretable?
    The reason for doing this will become clear to you very soon. For now, imagine
    that you are solving the nonlinear problem where SVM finds a separating hyperplane
    in the higher dimension. Eq. 3 will look like the following


    $$\min_{\alpha} \quad \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N \alpha_i \alpha_j
    y_i y_j \varphi(x_i)^T \varphi(x_j) - \sum_{i=1}^N \alpha_i \quad \text{eq. 6}$$

    $$\text{s.t.} \quad \sum_{i=1}^N y_i \alpha_i = 0$$

    $$0 \le \alpha_i \le C \quad i = 1, \cdots N$$


    and Eq. 5 becomes


    $$\hat{y}_t = sign(\sum_{i \in \{SV\}} \alpha_i y_i \varphi(x_i)^T \varphi(x_j)
    + b) \quad \text{eq. 7}$$


    The most crucial observation here is that the transformed variables ($\varphi(x)$)
    appear only as inner (dot) products. Now, if somehow, we knew the values of these
    dot products then we would not need to know the exact form of $\varphi(x)$ or
    the mapping at all and we can fit our SVM model. This is made possible via kernel
    functions, $K(x_i, x_j)$, which provide the relationship'
  merge: -1
  pgno: 163
- img_proc: true
  md: '$K(x_i, x_j) = \varphi(x_i)^T \varphi(x_j)$


    As you can see, kernel functions allow us to compute dot products in the ‘unknown’
    transformed space as a function of vectors in the original space! There are several
    forms of kernel functions to choose from and thus this choice becomes a model
    hyperparameter. Once a kernel functions is chosen, Eq. 6 becomes


    $$\min_{\alpha} \quad \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N \alpha_i \alpha_j
    y_i y_j K(x_i, x_j) - \sum_{i=1}^N \alpha_i \quad \text{eq. 8}$$

    $$\text{s.t.} \quad \sum_{i=1}^N y_i \alpha_i = 0$$

    $$0 \le \alpha_i \le C \quad i = 1, \cdots N$$


    Above is the form in which a SVM model is fitted and predictions are made as follows


    $$\hat{y}_t = sign(\sum_{i \in \{sv\}} \alpha_i y_i K(x_i, x_t) + b) \quad \text{eq.
    9}$$


    These kernel functions allow us to obtain powerful nonlinear classifiers while
    retaining all the benefits of the original linear SVM method!


    # Types of kernel functions


    Table below lists some commonly used kernel functions. The first one is simply
    the familiar dot product of two vectors, while the 2nd one, RBF (radial basis
    function) or gaussian kernel is the most popular (and usually the default choice)
    kernel for nonlinear problems.


    | Function | Equation | Hyperparameter |

    | :--- | :--- | :--- |

    | Linear | $K(x, z) = x^T z$ | |

    | Gaussian | $K(x, z) = exp(-\frac{\|x - z\|^2}{2\sigma^2})$ | $\sigma$ |

    | Polynomial | $K(x, z) = (\gamma x^T z + r)^d$ | $\gamma, r, d$ |

    | Sigmoid | $K(x, z) = tanh(\gamma x^T z + r)$ | $\gamma, r$ |'
  merge: -1
  pgno: 164
- img_proc: true
  md: 'Let''s use the polynomial kernel to illustrate how using kernel functions amounts
    to higher dimensional mapping. Assume that we use the following kernel


    $$K(\boldsymbol{x}, \boldsymbol{z}) = (\boldsymbol{x}^T\boldsymbol{z} + 1)^2$$


    where $\boldsymbol{x} = [x_1, x_2]^T$ and $\boldsymbol{z} = [z_1, z_2]^T$ are
    two vectors in the original 2D space. We claim that the above kernel is equivalent
    to the following mapping


    $$\varphi(\boldsymbol{x}) = [x_1, x_2, \sqrt{2}x_1, \sqrt{2}x_2, \sqrt{2}x_1x_2,
    1]$$


    To see how, just compute $\varphi(\boldsymbol{x})^T\varphi(\boldsymbol{z})$


    $$\begin{aligned} \varphi(\boldsymbol{x})^T\varphi(\boldsymbol{z}) &= x_1^2z_1^2
    + x_2^2z_2^2 + 2x_1z_1 + 2x_2z_2 + 2x_1x_2z_1z_2 + 1 \ &= (x_1z_1 + x_2z_2 + 1)^2
    \ &= (\boldsymbol{x}^T\boldsymbol{z} + 1)^2 \ &= K(\boldsymbol{x}, \boldsymbol{z})
    \end{aligned}$$


    Therefore, if you use the above polynomial kernel, you are implicitly assuming
    that your dataset is linearly separable in the shown $6^{th}$ dimensional feature
    space! In general, you will have to experiment with the kernel hyperparameters
    to determine what exact form of polynomial kernel works best for your problem.


    If you were amazed by the previous illustration, you will find it more interesting
    to know that gaussian kernels map original space into an infinite dimensional
    feature space, making gaussian kernels very powerful mechanism. Luckily, we don''t
    need to know the form of this feature space.



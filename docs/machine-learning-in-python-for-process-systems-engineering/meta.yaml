    # Maintenance Strategies


    The maintenance strategies in process industry have been strongly influenced by
    the advances in ML and sensor technologies. It has evolved from time-based preventive
    maintenance to proactive monitoring-based condition-based maintenance (CBM), and
    to advance prediction-based preventive maintenance (PdM).


    | Preventive Maintenance | Condition-based Maintenance | Predictive Maintenance
    |

    | :--- | :--- | :--- |

    | • Equipment maintenance is done at pre-set schedule | • Equipment maintenance
    is done when signs of failure are detected | • Like CBM, utilizes continuous monitoring
    of equipment |

    | • Non-optimal strategy as maintenance may happen too early or too late | • Manual
    expert analysis is carried out to determine exact maintenance plan | • Utilizes
    temporal degradation pattern in sensor readings to detect impending failure at
    very early stage |

    | • E.g., a compressor may be scheduled to be replaced every 5 years | • E.g.,
    a compressor may be monitored using PCA to detect the need to repair | • E.g.,
    a compressor may be monitored using RNN to alarm about impending failure |


    # Aircraft engine dataset


    We will use data in the following three files from the repository dataset.


    +   - train_FD001.txt: Along with (3) operational settings, it contains timeseries
    data from 21 sensors (s1 to s21) from 100 different simulations or engines. The
    last cycle of each simulation is the point of failure of the corresponding engine.
    In Figure 12.13, sensor drift due to engine degradation is apparent.

    - test_FD001.txt: It also contains simulated timeseries data for 100 engines,
    however, here only partial timeseries is provided for each engine. Figure 12.13
    shows the provided timeseries for engine ID 90. The RUL of each engine needs to
    be estimated.

    - RUL_FD001.txt: It contains the actual RULs of the 100 engines in the test dataset
    measured in cycles. We will use this information to measure our model predictions’
    accuracy.



    ![](img/ae65e737df4a9f5732c91f7aea579fc8_119_0.png)


    In such scenarios, the frequently employed solution is to transform the data into
    a higher-dimensional space where different classes (normal and abnormal classes)
    of data become linearly separable. To understand this trick, consider Figure 2.12,
    where the two classes of data are not linearly separable in the original measurement
    space. However, when an artificial variable ($x1^2 + x2^2$) is added to the system,
    the classes become easy to separate. This high-dimensional space is called the
    feature space.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_119_1.png)


    Kernel PCA (KPCA) simply entails implementing PCA in the feature space. However,
    the task of finding the nonlinear mapping that maps raw data to feature space
    is not trivial. To overcome this, another trick, called the kernel trick, is employed.
    While we will defer the detailed study of kernel trick until Chapter 7, the reader
    is encouraged to see the work by Lee'

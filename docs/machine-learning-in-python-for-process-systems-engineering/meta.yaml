  mdcn: "如果基础模型表现出欠拟合/高偏差，则优先选择Boosting。与Bagging类似，Boosting并不局限于以决策树作为基础模型，但如果使用决策树，建议使用浅层树（深度较小的树），以避免高方差。此外，浅层树或其他复杂度较低的基础模型在Boosting过程中顺序训练时，计算上更易处理。Boosting可用于回归和分类，主要有两种流行的Boosting方法，即Adaboost和梯度提升。\n\
    \n## Adaboost（自适应提升）\n\n在Adaboost提升技术中，新的基础模型通过关注被错误预测的样本来纠正其前一个基础模型的错误。如图9.12所示，所有样本被赋予相等的权重$\\\
    frac{1}{N}$，并训练第一个（弱）基础模型。被错误预测样本的权重增加，正确预测样本的权重减少。然后训练第二个基础模型，此循环持续进行，直到获得指定数量的基础模型。本质上，每个后续基础模型都更关注那些难以（预测）的训练样本。训练后，集成模型的预测取为基础模型预测的加权组合。分配给每个基础模型的模型权重取决于其在加权训练样本上达到的准确度（准确度越高\
    \ $\\Rightarrow$ $\\alpha$ 越高）。\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_223_0.png)\n\
    \n## 梯度提升\n\n梯度提升采用与Adaboost不同的方法，它通过使用前一个基础模型产生的残差误差顺序训练基础模型来纠正其前一个基础模型的错误。图9.13展示了该算法的方案。\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_224_0.png)\n\n图9.13：梯度提升集成方案。这里，$\\\
    hat{y}_i$表示来自第$i^{th}$个基础模型对训练样本的预测。请注意，对于不同的基础模型，超参数$\\vartheta$不必是常数（如此处所用）。\n\
    \n在上述方案中，超参数$\\vartheta \\in (0, 1]$被称为收缩参数或学习率。它用于防止过拟合，建议设置为较小的值，如0.1。非常小的学习率将需要使用大量的基础模型。迭代次数或基础模型数量$K$是另一个需要仔细调整的重要超参数。$K$太小将无法实现足够的偏差减少，而$K$太大则会导致过拟合。它可以通过交叉验证或早停法（在集成模型训练的不同阶段/迭代中跟踪验证误差，并在误差停止下降或模型残差不再有可建模的模式时停止）进行优化。\n\
    \nScikit-learn提供了`GradientBoostingClassifier`和`GradientBoostingRegressor`类，分别用于回归和分类问题。虽然这些类使用决策树作为基础模型/弱学习器，但梯度提升方法并不限于决策树。当使用决策树时，它被称为梯度树提升或梯度提升决策树（GBDTs）。\n\
    \n## 9.5 通过XGBoost预测污水处理厂的出水水质\n\n如果你最近在机器学习领域很活跃，那么你一定听说过XGBoost这个术语。它代表*eXtreme\
    \ Gradient Boosting*（极端梯度提升），是一个流行的库，实现了多种技巧和启发式方法，使基于梯度提升的模型训练非常有效，尤其适用于大型数据集。XGBoost使用决策树作为基础模型。\n\
    \n让我们看看XGBoost在软测量问题中的一个应用。该数据集来自一个活性污泥过程，该过程处理来自生活和工业下水道的废水。提供了527天运行期间38个变量的数据。38个变量中有7个表征了过程输出或工厂的出水水质。在这个案例研究中，我们将为7个输出变量之一——输出流的输出电导率（COND-S）创建一个预测模型。过程不同阶段的前22个测量值用作模型输入（详细过程描述见附录）。我们的XGBoost模型将充当软传感器来预测输出。\n\
    \n让我们快速探索一下数据集。\n\n```python\n# read data\nimport pandas as pd\ndata_raw = pd.read_csv('water-treatment.data',\
    \ header=None, na_values=\"?\" )\nX_raw = data_raw.iloc[:,1:23]\ny_raw = data_raw.iloc[:,29]\n\
    data = pd.concat([X_raw, y_raw], axis=1)\n\n# check for presence of missing values\n\
    print(data.info())\n```\n\n```\nRangeIndex: 527 entries, 0 to 526\nData columns\
    \ (total 23 columns):\n #   Column            Non-Null Count  Dtype  \n---  ------\
    \            --------------  -----  \n 0   1                 509 non-null    float64\n\
    \ 1   2                 524 non-null    float64\n 2   3                 527 non-null\
    \    float64\n 3   4                 504 non-null    float64\n```\n\n我们注意到数据集的不同列中存在缺失值。我们将采用简单的方法，删除任何包含缺失数据的行。\n\
    \n```python\n# remove rows with missing data\ndata.dropna(axis=0, how='any', inplace=True)\n\
    \nprint('Number of samples remaining:', data.shape[0])\n>>> Number of samples\
    \ remaining: 412\n\n# separate inputs and output\nX = data.iloc[:,:-1]\ny = data.iloc[:,-1]\n\
    ```\n\n下图显示了几个输入和输出的数据。数据集中似乎有足够的变异性。为了模型训练和评估，我们将数据集划分为拟合集、验证集和测试集。\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_226_0.png)\n\
    \n```python\n# separate fitting, validation, and test data\nfrom sklearn.model_selection\
    \ import train_test_split\nX_train, X_test, y_train, y_test = train_test_split(X,\
    \ y, test_size = 0.2, random_state = 100)\nX_fit, X_val, y_fit, y_val = train_test_split(X_train,\
    \ y_train, test_size = 0.3, random_state = 100)\n\n# fit XGBoost model\nimport\
    \ xgboost\nmodel = xgboost.XGBRegressor(max_depth=3, learning_rate=0.1, random_state=100)\n\
    model.fit(X_fit, y_fit, eval_set=[(X_val, y_val)], early_stopping_rounds=2)\n\
    ```\n\n由于Boosting更倾向于使用浅层树，因此使用`max_depth`参数将树深度限制为3。如果需要，可以通过网格搜索调整此超参数。`early_stopping_rounds`参数用于指示XGBoost，如果在连续2轮迭代中验证准确度没有提高，则停止迭代（或添加更多基础模型）。在模型拟合期间，每次迭代的验证准确度都会报告，如下所示。这里，使用rmse作为评估指标；可以通过`fit`方法中的`eval_metric`参数指定任何其他指标。\n\
    \n```\n[0] validation_0-rmse:1374.03943\n[1] validation_0-rmse:1242.94312\n[2]\
    \ validation_0-rmse:1123.29248\n[3] validation_0-rmse:1017.00002\n...\n[45] validation_0-rmse:115.01207\n\
    [46] validation_0-rmse:115.25280\n[47] validation_0-rmse:115.51093\n[48] validation_0-rmse:115.25786\n\
    ```\n\nXGBoost还有其他几个设置可用于调整模型。你可以在官方文档<sup>46</sup>中查看它们。图9.14显示了XGBoost回归模型的预测结果。模型准确度表明模型性能良好，没有明显的过拟合。\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_227_0.png)\n\n本章是对集成学习的快速概览，集成学习是现代机器学习的重要支柱。本章介绍的每个主题都有更多我们无法在此涵盖的高级方面。然而，你现在已具备必要的基础知识和熟悉度，可以探索这些高级方面。\n\
    \n## 总结\n\n在本章中，我们学习了决策树建模方法。我们看到了随机森林如何帮助克服树的高方差问题。然后，我们研究了更广泛的集成学习概念，它可以用于克服弱模型的高偏差和/或高方差问题。概念性地介绍了两种流行的集成方法，即Bagging和Boosting。最后，我们使用XGBoost（一种流行的梯度提升树实现）来预测污水处理厂的出水水质。本章为你的机器学习工具库增添了几种强大的技术，你会发现你会经常使用它们。"

  - '[PAGE 301]


    # RL for process control


    The RL framework of observing an environment’s current state and deciding upon
    corresponding optimal actions fits quite naturally to the setup of process controllers
    in process industry. You might already know that these controllers are tasked
    with keeping process operations optimal by keeping critical process variables
    (product purity, fluid level, temperatures, etc.) at optimal values through adjustments
    in manipulated variables (stream flows, valve openings, etc.). Figure 13.2 shows
    the typical setup of a process controller and the division of this setup into
    agent/environment framework. Rewards are designed as some suitable combination
    of reference signal, environment state, and controller action.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_301_0.png)


    In process industry, although PID and MPC controllers are well-established, their
    shortcomings are well-known. While PID controllers perform unsatisfactorily for
    complex nonlinear systems, MPCs solve optimization problems using process models
    which makes online action computation infeasible for large-scale nonlinear systems.
    Moreover, both these controllers suffer performance degradation issues (due to
    changing process conditions, process drift) over time, necessitating regular maintenance.
    Controller maintenance entails re-identification of process models which can be
    time and resource intensive and may require interference to normal plant operations
    for training data collection.


    Given the aforementioned issues with the current state-of-the-art for the process
    controllers and the recent successes of RL, interest in leveraging RL technology
    for process control has been reignited. Several recent studies<sup>66</sup> have
    demonstrated how RL-based controllers can provide superior performance. Not requiring
    online optimization (because optimal action policy is pre-computed), easy adaptation
    of action policy under changing environment by


    > <sup>66</sup> Cassol et. Al., Reinforcement learning applied to process control:
    A Van der Vusse reactor case study, Computer Aided Chemical Engineering, 2018

    Rajesh Siraskar, Reinforcement learning for control of valves, Machine Learning
    with Applications, 2021

    Ma et. Al., Continuous control of a polymerization system with deep reinforcement
    learning, Journal of Process Control, 2019'
  - '[PAGE 302]


    continued learning with new process data are some characteristics that make RM-based
    controllers very promising.


    > You may be slightly concerned about training an RL agent in the real plant environment
    because the generated actions in early stages of training can be ‘very bad’ and
    even unsafe. Moreover, for complex system, thousands of interactions may be required
    to reach even a reasonably-good policy; plant managers will certainly never agree
    to this! These are valid concerns and therefore, the common practice is to use
    a sufficiently accurate model of the plant and train RL agent offline in a simulated
    environment. Once offline learning is complete, the learning process can be turned
    off and RL agent deployed in real plant. There are, however, a few good reasons
    to keep learning on (continually or sporadically) post-deployment. First, your
    plant model will probably not be 100% accurate. Therefore, the RL agent may use
    some online interactions to fine-tune its policy. Second, as alluded to before,
    the plant behavior may change over time and the agent will need to tweak its policy
    to re-adjust to changes in its environment.


    This discussion also brings us to the point of model-free vs model-based RL. Model-free
    RL doesn’t use any environment/plant model during training and learns its policy
    based solely on its interactions with real environment. Model-based RL, on the
    other hand, uses a model either for simulating the environment or assisting the
    learning algorithm.


    # 13.2 RL Terminology & Mathematical Concepts


    We have showered enough praises on RL. Let’s now get down to understanding how
    RL actually works. For this, we will first learn some RL terminology and concepts.
    A quick disclaimer here that some of these new concepts may seem ‘abstract’ and
    not immediately useful. But, as you read through this chapter, we promise that
    all dots will connect and their utility will become ‘obvious’.


    # Environment and Markov decision process


    While informally an environment is anything that an RL agent interacts with, in
    a formal setting, it is represented as a Markov decision process (MDP). A MDP
    is named such because it exhibits Markov property, i.e., the (probability of)
    transition from state **s**<sub>t</sub> to **s**<sub>t+1</sub> depend only'
  - '[PAGE 303]


    on the most recent state (sₜ) and action (aₜ). Such memoryless characteristic
    is important in RL because it allows the agent to only consider the current state
    when deciding the next optimal action and not worry about what actions were previously
    taken to reach sₜ.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_303_0.png)


    Figure 13.3: Transition in an MDP depend only on current state and action


    In an MDP, selection of features that completely characterize the state of the
    environment and enable the agent to act on its basis becomes crucial. For example,
    consider the following problem of controlling the liquid level in a tank


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_303_1.png)


    Here, l, lₛₚ, and the rate of change of l could be used to define the environment
    state. lₛₚ can also be substituted with l - lₛₚ as an alternative formulation.
    Depending on your problem formulation, data from the past may also be included
    in the state vector to facilitate the agent’s decision making.


    # Reward and return


    Upon execution of an action (aₜ), the RL agent receives a reward signal (rₜ₊₁)
    which quantifies and informs the agent the goodness of being in the new state
    (sₜ₊₁) and taking action aₜ. Consider the following sequence of an agent’s interactions
    with its environment from time t onwards during the execution of a task.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_303_2.png)'
  - '[PAGE 304]


    The agent''s job is to take actions that maximize the cumulative reward (also
    called return) over the course of the task. The return can be represented as $R_t
    = \sum_{k=1}^{T-t} r_{t+k}$. However, this direct summation can cause trouble
    for tasks which don''t have a definite end state. The level control task is one
    such example where $T=\infty$ (because the task is to control the level forever!).
    To keep $R_t$ bounded, the following formulation is used instead


    $$R_t = r_{t+1} + \gamma r_{t+2} + \gamma^2 r_{t+3} + \dots + \gamma^{T-t-1} r_T
    = \sum_{k=1}^{T-t} \gamma^{k-1} r_{t+k}$$


    *eq. 1*


    The return in Eq. (1) is called discounted return and $\gamma \in (0, 1)$. The
    farther the reward in the future, less importance is accorded to it. A $\gamma$
    close to 0 makes an agent consider only the immediate reward ($r_{t+1}$) for choosing
    $a_t$ while $\gamma$ close to 1 makes long-term rewards important.


    The concept of discounted reward maximization is an elegant (and mathematically
    tractable) way of making RL agent look at both immediate and future rewards. For
    level control problem, a natural reward function is squared tracking error


    $$r_t = -(l_t - l_{sp})^2$$


    Appropriate crafting of reward function is very important as it strongly influences
    the agent''s decisions and RL training convergence.


    # Policy


    A policy is a rule or mapping used by an RL agent to determine $a_t$ given $s_t$.
    A policy can be deterministic or stochastic. A deterministic policy provides a
    single action


    $$a_t = \mu(s_t)$$


    while a stochastic policy ($\pi$) provides a probability over the set of actions


    $$\pi(a|s_t) = \text{probability that action } a \text{ is taken in state } s_t$$


    The goal in RL is to learn a policy which provides maximum return. The optimal
    policy is often denoted as $\mu^*$ or $\pi^*$.'
  - '[PAGE 305]


    # Value function


    RL algorithms often make use of value functions. State value function, $V_{\mu}(s)$,
    gives the return an agent expects to receive from being in the state $s$ and acting
    according to some policy $\mu$.


    $$V_{\mu}(s) = E[R_t | s_t = s, \text{policy } \mu]$$


    State-action value function, $Q_{\mu}(s, a)$, is another useful function that
    gives the expected return from taking an arbitrary action (not necessarily following
    policy $\mu$) from state $s$ and then following policy $\mu$.


    $$Q_{\mu}(s, a) = E[R_t | s_t = s, a_t = a, \text{policy } \mu]$$


    When the optimal policy, $\mu^*$, is followed, the value functions are denoted
    as $V^*(s)$ and $Q^*(s,a)$. In above definitions, we take expectations ($E[.]$)
    of the returns because real-life environments are uncertain and stochastic, i.e.,
    taking an action $\mathbf{a}_t$ at state $\mathbf{s}_t$ can result in slightly
    different $\mathbf{s}_{t+1}$ in different iterations. This transition uncertainty
    can be denoted as the probability $P(s_{t+1} = s'' | s_t = s, a_t = a)$. Above
    definitions incorporate this transition probability during return computation.


    # Bellman equation


    The value functions can also be represented in a recursive form. Consider the
    optimal state function,


    $$V^*(s) = E[R_t | s_t = s, \mu^*]$$

    $$= E[\mathbf{r}_{t+1} + \gamma \mathbf{r}_{t+2} + \gamma^2 \mathbf{r}_{t+3} +
    \cdots | s_t = s, \mu^*]$$

    $$= E[\mathbf{r}_{t+1} + \gamma R_{t+1} | s_t = s, \mu^*]$$

    $$= E[\mathbf{r}_{t+1} + \gamma V^*(s_{t+1}) | s_t = s, \mu^*]$$


    The optimal state-action value can also be similarly re-written as


    $$Q^*(s, a) = E[\mathbf{r}_{t+1} + \gamma Q^*(s_{t+1}, \mu^*(s_{t+1})) | s_t =
    s, a_t = a]$$

    $$\text{or}$$

    $$Q^*(s, a) = E[\mathbf{r}_{t+1} + \gamma \max_{a''} Q^*(s_{t+1}, a'') | s_t =
    s, a_t = a]$$


    Note again that $s_{t+1} \sim P(s_{t+1} = s'' | s_t = s, a_t = a)$ and is sampled
    following the environment''s transition probability. The above recursive equations,
    also called Bellman equations, are central to several RL algorithms. Bellman equation
    simply states that the value of the current state (or state-action) is the sum
    of immediate reward and the value of whatever state the environment lands next.'
- md: 'Alright, we now have enough fundamentals in place to start taking a deeper
    look into RL algorithms for optimal policy learning. Let’s begin with one of the
    most popular technique, Q-learning.


    ## 13.3 Fundamentals of Q-learning


    Q-learning refers to the RL algorithms designed for estimating the $Q^*(s, a)$
    values. Once the optimal value function is available, an optimal policy can be
    framed as simply picking the action corresponding to the highest value for the
    current state as shown below


    $$a_t = \arg \max_{a''} Q^*(s_t, a)$$


    To see how $Q^*$ may be obtained, consider an MDP with discrete state and action
    space. We can represent the Q function as a Q-table$^{67}$


    $$Q^*(s, a) = \begin{array}{c|ccc} & s_1 & s_2 & s_3 & \dots \\ \hline a_1 & Q^*(s_1,
    a_1) & Q^*(s_2, a_1) & Q^*(s_3, a_1) \\ a_2 & Q^*(s_1, a_2) & Q^*(s_2, a_2) &
    Q^*(s_3, a_2) \\ a_3 & Q^*(s_1, a_3) & Q^*(s_2, a_3) & Q^*(s_3, a_3) \\ \vdots
    & & & \end{array}$$


    To find the optimal values for each state/action pair, all the values in Q-table
    are first initialized to 0, some initial state is arbitrarily chosen, agent-environment
    interactions starts, and then the bellman equation is used in the following iteration
    form


    $$\widehat{Q}^*_{new}(s_t, a_t) \leftarrow (1 - \alpha)\widehat{Q}^*_{old}(s_t,
    a_t) + \alpha \left( r_{t+1} + \gamma \max_{a} \widehat{Q}^*_{old}(s_{t+1}, a'')
    \right)$$


    or


    $$\widehat{Q}^*_{new}(s_t, a_t) \leftarrow \widehat{Q}^*_{old}(s_t, a_t) + \alpha
    \left( \underbrace{r_{t+1} + \gamma \max_{a} \widehat{Q}^*_{old}(s_{t+1}, a'')
    - \widehat{Q}^*_{old}(s_t, a_t)}_{\text{Temporal difference (TD) error}} \right)
    \quad \text{eq. 2}$$


    where $0 \leq \alpha \leq 1$ is a learning-rate hyperparameter. Eq. 2 is a remarkably
    simple formula, and it has been shown that given sufficient iterations, the estimated
    Q values will converge to the optimal values! In Eq. 2, selection of $a_t$ is
    an important consideration and $\varepsilon$-greedy scheme is usually adopted.
    In this scheme, at every iteration, the agent acts randomly with probability $\varepsilon$
    or greedily (chooses action corresponding to the highest value $\widehat{Q}^*$
    for a given $s_t$) with probability $1 - \varepsilon$. This scheme allows good
    combination of exploitation (taking optimal actions based on current estimates,
    allowing the estimates to get better over time) and exploration (visiting unknown
    but potentially rewarding parts of the environment). During initial iterations
    when $\widehat{Q}^*$ estimates are expectedly poor, $\varepsilon$ is given a high
    value (close to 1) and reduced gradually as training completes. The pseudo-code
    below summarizes the tabular Q-learning algorithm.


    ### Algorithm 1: Tabular Q-learning


    ```

    1. Set $\widehat{Q}^*(s, a) = 0$ for all state-action pairs

    2. for episode = 1 to $N_{episode}$ do:

    3.     initialize state $s$

    4.     for each step (t) of episode until $s$ is terminal do:

    5.         choose action ($a_t$) for $s_t$ using $\varepsilon$-greedy policy

    6.         take action $a_t$ and observe $r_{t+1}$ and next state $s_{t+1}$

    7.         compute $\delta$ (TD error) = $r_{t+1} + \gamma \max_{a''} \widehat{Q}^*_{old}(s_{t+1},
    a'') - \widehat{Q}^*_{old}(s_t, a_t)$

    8.         $\widehat{Q}^*_{new}(s_t, a_t) \leftarrow \widehat{Q}^*_{old}(s_t,
    a_t) + \alpha \delta$

    9.     end for

    10. end for

    ```


    In the pseudo-code above, there are two terms whose meaning may not be immediately
    clear to you, namely, ‘episode’ and ‘terminal state’. An episode simply refers
    to one complete simulation or experiment. For example, one instance of a drive
    from your office to home would be one episode. A terminal state marks the end
    of an episode. In the driving example, arrival at home or end of fuel could be
    the terminal states. For tasks that may not necessarily end in a terminal state
    (such as controlling the fluid level), a maximum number of steps are pre-specified
    for an episode during training.


    ### Off-policy vs on-policy algorithms


    Q-learning belongs to the category of off-policy RL algorithms. In such algorithms
    the target policy being learnt (optimal policy) is different from the policy being
    executed or used to select actions (such as $\varepsilon$-greedy policy) during
    training. The executed policy is also called behavior policy. For on-policy RL
    algorithms, behavior policy equals target policy.


    ### Simple illustration


    If you are not yet entirely convinced about how taking some random actions can
    help an agent arrive at an optimal Q-table and an optimal policy, then let’s consider
    a hypothetical control problem. We will take our level control problem and consider
    only the following 4 symbolic states


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_308_0.png)


    RL agent here has 2 action choices - close or open the valve by a fixed amount.
    Closing a valve takes the environment to the higher fluid level state; the agent
    of course does not know this to begin with. We will set α = 1 and γ = 0.9. A random
    action is taken if both actions have same value, otherwise greedy action is taken
    (ε = 0). Let’s now run some mock experiments.


    | Episode | t | s_t | Q_old | a_t | s_t | r_{t+1} | Q_new |

    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    | 1 | 1 | s_1 | s_0 s_1 s_2 s_3<br>Open 0 0 0 0<br>Close 0 0 0 0 | Close (randomly
    chosen) | s_2 | -5 | s_0 s_1 s_2 s_3<br>Open 0 0 0 0<br>Close 0 -5 0 0<br>TD update:
    0 + 1*[-5+0.9*0-0]=-5 |

    | 1 | 2 | s_2 | s_0 s_1 s_2 s_3<br>Open 0 0 0 0<br>Close 0 -5 0 0 | Close (randomly
    chosen) | s_3 | 10 | s_0 s_1 s_2 s_3<br>Open 0 0 0 0<br>Close 0 -5 10 0<br>TD
    update: 0 + 1*[10+0.9*0-0]=10 |


    Since the agent has reached a terminal state (s3), next episode will start. Initial
    state will be reset but the Q-table will remain intact.


    | Episode | t | $s_t$ | $Q^*_{old}$ | | | | $a_t$ | $s_t$ | $r_{t+1}$ | $Q^*_{new}$
    | | | |

    |---|---|---|---|---|---|---|---|---|---|---|---|---|---|

    | | | | $s_0$ | $s_1$ | $s_2$ | $s_3$ | | | | $s_0$ | $s_1$ | $s_2$ | $s_3$ |

    | 2 | 1 | $s_1$ | Open | 0 | 0 | 0 | 0 | open | $s_0$ | -20 | Open | 0 | -20 |
    0 | 0 |

    | | | | Close | 0 | -5 | 10 | 0 | (greedy action) | | | Close | 0 | -5 | 10 |
    0 |

    | 3 | 1 | $s_1$ | Open | 0 | -20 | 0 | 0 | Close | $s_2$ | -5 | Open | 0 | -20
    | 0 | 0 |

    | | | | Close | 0 | -5 | 10 | 0 | (greedy action) | | | Close | 0 | 4 | 10 | 0
    |


    Before we continue with any further iterations, let’s pause and observe what we
    have achieved in just 4 iterations. The current $Q^*$ is already good enough to
    give the desired optimal policy! In state $s_1$, RL agent will close the value
    because of higher expected return ($4 > 20$). In state $s_2$, agent will again
    close the value. With further iterations, the $Q^*$ values will get closer to
    more accurate estimates, but the optimal policy will remain the same.


    The above illustration should have made the Q-learning algorithm clear to you.
    It is simple to implement yet is quite powerful. A direct industrial application
    of Q-learning can be seen in the work of Syafiie et al. for automatic control
    of pH neutralization processes$^{68}$.


    ### RL Taxonomy


    Q-learning, although a breakthrough RL algorithm, is just one of the many RL algorithms
    currently out there. Because many of them borrow ideas from each-other, it is
    difficult to list and bucket all of them comprehensively into some reasonable
    categories. Nonetheless, the figure below presents a non-comprehensive picture
    of the current RL algorithm landscape.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_310_0.png)


    Figure 13.4 focusses on model-free algorithms as these are more popular due to
    their ease of implementation. Another broad categorization shown is in terms of
    whether an agent tries to learn an optimal policy directly or indirectly through
    estimation of $Q^*$ first. Extremely powerful algorithms have recently emerged
    by combining certain features of policy optimization and Q-learning algorithms.
    Among these DDPG has been used in several promising studies for RL-based process
    control and therefore is covered later in the chapter.


    ## 13.4 Deep RL & Actor-Critic Framework


    While tabular Q-learning is an elegant method, it is unfortunately not suitable
    for MDPs with high-dimensional continuous state and/or action spaces. Consider
    the fluid level control problem with fluid level as its state and valve adjustments
    as action. Here, fluid level and valve opening can attain any value from 0% to
    100%. For tabular Q-learning, we may discretize these variables crudely into 100
    intervals each. This already leads to a 100 X 100 sized Q-table. With finer discretization
    and more states/actions, the Q-table can become very large and unmanageable. Unfortunately,
    most process control problems would face these issues.'
  mdcn: '好的，我们现在已掌握了足够的基础知识，可以开始深入探讨用于最优策略学习的强化学习算法了。让我们从最流行的技术之一——Q-learning开始。


    ## 13.3 Q-learning 基础


    Q-learning 指的是用于估计 $Q^*(s, a)$ 值的强化学习算法。一旦获得了最优价值函数，最优策略就可以简单地表示为选择当前状态下对应最高价值的动作，如下所示：


    $$a_t = \arg \max_{a''} Q^*(s_t, a)$$


    为了理解如何获得 $Q^*$，考虑一个具有离散状态和动作空间的马尔可夫决策过程。我们可以将 Q 函数表示为一个 Q 表$^{67}$：


    $$Q^*(s, a) = \begin{array}{c|ccc} & s_1 & s_2 & s_3 & \dots \\ \hline a_1 & Q^*(s_1,
    a_1) & Q^*(s_2, a_1) & Q^*(s_3, a_1) \\ a_2 & Q^*(s_1, a_2) & Q^*(s_2, a_2) &
    Q^*(s_3, a_2) \\ a_3 & Q^*(s_1, a_3) & Q^*(s_2, a_3) & Q^*(s_3, a_3) \\ \vdots
    & & & \end{array}$$


    为了找到每个状态/动作对的最优值，首先将 Q 表中的所有值初始化为 0，任意选择一个初始状态，开始智能体-环境交互，然后使用贝尔曼方程进行如下迭代：


    $$\widehat{Q}^*_{new}(s_t, a_t) \leftarrow (1 - \alpha)\widehat{Q}^*_{old}(s_t,
    a_t) + \alpha \left( r_{t+1} + \gamma \max_{a} \widehat{Q}^*_{old}(s_{t+1}, a'')
    \right)$$


    或


    $$\widehat{Q}^*_{new}(s_t, a_t) \leftarrow \widehat{Q}^*_{old}(s_t, a_t) + \alpha
    \left( \underbrace{r_{t+1} + \gamma \max_{a} \widehat{Q}^*_{old}(s_{t+1}, a'')
    - \widehat{Q}^*_{old}(s_t, a_t)}_{\text{时序差分 (TD) 误差}} \right) \quad \text{公式
    2}$$


    其中 $0 \leq \alpha \leq 1$ 是学习率超参数。公式 2 是一个非常简单的公式，并且已经证明，在给定足够迭代次数的情况下，估计的 Q 值将收敛到最优值！在公式
    2 中，$a_t$ 的选择是一个重要的考量，通常采用 $\varepsilon$-贪心策略。在这种策略下，每次迭代时，智能体以概率 $\varepsilon$
    随机行动，或以概率 $1 - \varepsilon$ 贪心行动（选择对应于给定 $s_t$ 下最高值 $\widehat{Q}^*$ 的动作）。这种策略允许良好地结合利用（基于当前估计采取最优行动，使估计随时间改善）和探索（访问环境未知但可能有回报的部分）。在初始迭代期间，当
    $\widehat{Q}^*$ 估计预期较差时，$\varepsilon$ 被赋予一个较高的值（接近 1），并随着训练的完成而逐渐降低。下面的伪代码总结了表格
    Q-learning 算法。


    ### 算法 1：表格 Q-learning


    ```

    1. 对所有状态-动作对设置 $\widehat{Q}^*(s, a) = 0$

    2. 对于 episode = 1 到 $N_{episode}$ 执行：

    3.     初始化状态 $s$

    4.     对于 episode 的每个步骤 (t)，直到 $s$ 为终止状态执行：

    5.         使用 $\varepsilon$-贪心策略为 $s_t$ 选择动作 ($a_t$)

    6.         执行动作 $a_t$ 并观察 $r_{t+1}$ 和下一个状态 $s_{t+1}$

    7.         计算 $\delta$ (TD 误差) = $r_{t+1} + \gamma \max_{a''} \widehat{Q}^*_{old}(s_{t+1},
    a'') - \widehat{Q}^*_{old}(s_t, a_t)$

    8.         $\widehat{Q}^*_{new}(s_t, a_t) \leftarrow \widehat{Q}^*_{old}(s_t,
    a_t) + \alpha \delta$

    9.     结束 for

    10. 结束 for

    ```


    在上面的伪代码中，有两个术语的含义可能不会立即清楚，即“episode”和“终止状态”。一个 episode 简单地指一次完整的模拟或实验。例如，从办公室开车回家的一次行程就是一个
    episode。终止状态标志着一个 episode 的结束。在驾驶示例中，到达家中或燃料耗尽可能是终止状态。对于不一定以终止状态结束的任务（例如控制液位），在训练期间会为
    episode 预先指定最大步数。


    ### 离策略 vs 在策略算法


    Q-learning 属于离策略强化学习算法的范畴。在这类算法中，正在学习的目标策略（最优策略）与训练期间执行或用于选择动作的策略（例如 $\varepsilon$-贪心策略）不同。执行的策略也称为行为策略。对于在策略强化学习算法，行为策略等于目标策略。


    ### 简单示例


    如果你还不完全相信采取一些随机动作如何能帮助智能体获得最优 Q 表和最优策略，那么让我们考虑一个假设的控制问题。我们将采用我们的液位控制问题，并仅考虑以下
    4 个符号状态：


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_308_0.png)


    这里的强化学习智能体有 2 个动作选择——关闭或打开阀门一个固定量。关闭阀门会使环境进入更高的液位状态；智能体起初当然不知道这一点。我们将设置 α = 1
    和 γ = 0.9。如果两个动作具有相同的值，则采取随机动作，否则采取贪心动作（ε = 0）。现在让我们运行一些模拟实验。


    | Episode | t | s_t | Q_old | a_t | s_t | r_{t+1} | Q_new |

    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    | 1 | 1 | s_1 | s_0 s_1 s_2 s_3<br>Open 0 0 0 0<br>Close 0 0 0 0 | Close (随机选择)
    | s_2 | -5 | s_0 s_1 s_2 s_3<br>Open 0 0 0 0<br>Close 0 -5 0 0<br>TD 更新: 0 + 1*[-5+0.9*0-0]=-5
    |

    | 1 | 2 | s_2 | s_0 s_1 s_2 s_3<br>Open 0 0 0 0<br>Close 0 -5 0 0 | Close (随机选择)
    | s_3 | 10 | s_0 s_1 s_2 s_3<br>Open 0 0 0 0<br>Close 0 -5 10 0<br>TD 更新: 0 +
    1*[10+0.9*0-0]=10 |


    由于智能体已达到终止状态 (s3)，下一个 episode 将开始。初始状态将被重置，但 Q 表将保持不变。


    | Episode | t | $s_t$ | $Q^*_{old}$ | | | | $a_t$ | $s_t$ | $r_{t+1}$ | $Q^*_{new}$
    | | | |

    |---|---|---|---|---|---|---|---|---|---|---|---|---|---|

    | | | | $s_0$ | $s_1$ | $s_2$ | $s_3$ | | | | $s_0$ | $s_1$ | $s_2$ | $s_3$ |

    | 2 | 1 | $s_1$ | Open | 0 | 0 | 0 | 0 | open | $s_0$ | -20 | Open | 0 | -20 |
    0 | 0 |

    | | | | Close | 0 | -5 | 10 | 0 | (贪心动作) | | | Close | 0 | -5 | 10 | 0 |

    | 3 | 1 | $s_1$ | Open | 0 | -20 | 0 | 0 | Close | $s_2$ | -5 | Open | 0 | -20
    | 0 | 0 |

    | | | | Close | 0 | -5 | 10 | 0 | (贪心动作) | | | Close | 0 | 4 | 10 | 0 |


    在我们继续进行任何进一步的迭代之前，让我们暂停并观察一下我们仅在 4 次迭代中取得了什么成果。当前的 $Q^*$ 已经足够好，可以给出所需的最优策略！在状态
    $s_1$，强化学习智能体将关闭阀门，因为预期回报更高（$4 > 20$）。在状态 $s_2$，智能体将再次关闭阀门。随着进一步的迭代，$Q^*$ 值将更接近更准确的估计，但最优策略将保持不变。


    上述示例应该已经使 Q-learning 算法对你清晰明了。它实现简单，但功能相当强大。Q-learning 的一个直接工业应用可以在 Syafiie 等人的工作中看到，用于
    pH 中和过程的自动控制$^{68}$。


    ### 强化学习分类


    Q-learning 虽然是一个突破性的强化学习算法，但只是目前众多强化学习算法中的一种。由于它们中的许多相互借鉴思想，因此很难全面地将它们全部列出并归入一些合理的类别。尽管如此，下图展示了当前强化学习算法格局的一个非全面图景。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_310_0.png)


    图 13.4 侧重于无模型算法，因为它们由于易于实现而更受欢迎。另一个广泛的分类是根据智能体是尝试直接学习最优策略，还是首先通过估计 $Q^*$ 间接学习。最近通过结合策略优化和
    Q-learning 算法的某些特性，出现了极其强大的算法。其中，DDPG 已在几项有前景的研究中用于基于强化学习的过程控制，因此将在本章后面介绍。


    ## 13.4 深度强化学习与 Actor-Critic 框架


    虽然表格 Q-learning 是一种优雅的方法，但不幸的是，它不适用于具有高维连续状态和/或动作空间的马尔可夫决策过程。考虑以液位为状态、阀门调整为动作的液位控制问题。这里，液位和阀门开度可以取
    0% 到 100% 之间的任何值。对于表格 Q-learning，我们可能将这些变量粗略地离散化为各 100 个区间。这已经导致了一个 100 X 100
    大小的 Q 表。随着更精细的离散化和更多的状态/动作，Q 表可能变得非常大且难以管理。不幸的是，大多数过程控制问题都会面临这些问题。'

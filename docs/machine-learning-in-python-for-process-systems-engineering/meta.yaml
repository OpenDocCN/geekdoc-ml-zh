  md: '# 12.5 Fault Classification via LSTM for Tennessee Eastman Process


    The way process variables evolve in the presence of a process fault can give crucial
    clues about the nature/kind of process fault. Therefore, a sequence of process
    values (rather than just a single snapshot of current process values) is often
    used as inputs for fault classification. RNNs are best suited for classification
    using sequence data. To illustrate this, we will use data from Tennessee Eastman
    Process (TEP), a large-scale chemical manufacturing process.


    In chapter 6, we had used simulated TEP data for fault detection and classification
    using static data to introduce ICA and FDA methods. We will again use simulated
    data but from another source<sup>63</sup> where a much bigger dataset is available.
    The dataset still contains 21 different fault classes (along with no-fault operation);
    however, for each fault class, 500 separate simulations runs were conducted for
    both training and test dataset. Each training simulation run contains 500 time
    samples from 25 hours of operation and each test run contains 960 time samples
    from 48 hours of operation. Figure 12.10 shows temporal profiles for the first
    10 signals in the dataset for 4 complete simulation runs with no fault, with fault
    of class 1, and with fault of class 8.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_283_0.png)


    <sup>63</sup> Reith, C.A., B.D. Amsel, R. Tran., and B. Maia. Additional Tennessee
    Eastman process simulation data for anomaly detection evaluation. Harvard Dataverse,
    Version 1, 2017'

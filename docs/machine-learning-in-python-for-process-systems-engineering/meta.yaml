- img_proc: true
  md: 'To understand Figure 3.9, let’s consider the outer loop first


    +   - 5-fold cross validation is employed for final performance assessment

    - The original dataset is split into 5 folds and 5 separate models are trained

    - For each model, one of the folds is used as test data and the rest of the data
    are used for model training

    - The overall model performance is simply the average performance of the 5 models


    For model training in the inner loop


    +   - 4-fold cross validation is employed, i.e., the training data is split into
    4 folds

    - For each hyperparameter set, 4 separate models are fitted using the fitting
    datasets

    - The overall validation performance is simply the average performance of the
    4 models on their respective validation folds

    - The hyperparameter values that optimize the overall validation performance is
    selected and the model is re-trained using the complete training data before being
    sent to the outer loop.


    Very often, k-fold cross validation is only employed for model tuning and the
    final performance assessment is made using only a single test holdout set. This
    conventional cross-validation approach is illustrated in Figure 3.10.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_74_0.png)


    Let’s apply k-fold cross validation technique to find the optimal polynomial degree
    with our illustration dataset. We will use the KFold utility function provided
    by Sklearn which returns the indices of data-points that belong to the fitting
    & validation subsets in each of the k splits.'

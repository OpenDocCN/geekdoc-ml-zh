  md: '![](img/ae65e737df4a9f5732c91f7aea579fc8_23_0.png)


    Let’s now try to understand these categories a bit more clearly.


    # Supervised learning


    Supervised learning is used when training data includes sets of inputs and associated
    outputs. As illustrated in Figure 1.7, supervised learning models learn the input-output
    relationship and use this relationship to predict the unknown output for a new
    input. The outputs can be discrete values (for classification problems) or continuous
    values (for regression problems).


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_23_1.png)'
  merge: -1

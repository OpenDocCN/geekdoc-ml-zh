  md: '# Failure prediction using LSTM


    In this illustration we will build a LSTM network to predict whether an engine
    will fail within the next 30 cycles or not. This implies that we have a binary
    classification problem: will fail (output = 1) or not fail (output = 0). As done
    by others<sup>65</sup>, we will use a sequence of 50 past cycles to make the failure
    prediction. Let''s start with reading data from the provided text files. Note
    that, unlike previous illustrations, we will use pandas library more extensively
    here due to the ability to reference columns by descriptive names which makes
    the code easier to understand.



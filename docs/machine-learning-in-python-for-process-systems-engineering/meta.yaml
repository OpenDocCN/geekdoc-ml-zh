  md: "As we can see in Figure 7.5, in the 3D space, the data is easily linearly separable!\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_162_0.png)\n\nSVM can be trained on\
    \ the new feature space to obtain the optimal separating hyperplane. Any new test\
    \ data point can be transformed via the same mapping function, φ, for its class\
    \ determination via the fitted SVM model. While this solution looks great, there\
    \ remains a small issue. How do we find an appropriate mapping for a high-dimensional\
    \ input dataset? As it turns out, you don’t need to find this mapping explicitly\
    \ and this is made possible by a neat ‘kernel trick’. Let’s learn what is this\
    \ trick and how it is used. For this we will revisit the mathematical background\
    \ of SVMs.\n\n# Mathematical background (revisited)\n\nSVMs are not solved in\
    \ the form shown in Eq. 2. Instead, the following equivalent form is solved\n\n\
    ```\nmin_α  1/2 Σ_{i=1}^N Σ_{j=1}^N α_i α_j y_i y_j x_i^T x_j - Σ_{i=1}^N α_i\
    \   eq. 3\ns.t.   Σ_{i=1}^N y_i α_i = 0\n       0 ≤ α_i ≤ C   i = 1, ... N\n```\n\
    \nHere, the optimization parameters w, b have been replaced by α_s (also called\
    \ Lagrange multipliers). This equivalent form is called dual form (which you may\
    \ remember from your optimization classes; it’s perfectly fine if you have not\
    \ encountered this term before). Once α_s have been found, w and b can be computed\
    \ via the following\n\n```\nw = Σ_{i=1}^N α_i y_i x_i,   b = 1/N_s Σ_{i∈{SV}}\
    \ 1 - y_i w^T x_i\n```"

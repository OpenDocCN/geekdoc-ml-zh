  md: '# 11.2 Process Modeling via FFNN for Combined Cycle Power Plant (CCPP)


    We will use data from a CCPP to illustrate the ease with which deep learning models
    can be built using TF Keras. The dataset (see Appendix for details) was collected
    over a period of 6 years and contains hourly average values of ambient temperature
    (AT), ambient pressure (AP), relative humidity (RH), and exhaust vacuum (V). These
    variables influence the net hourly electrical energy output (also provided in
    the dataset) of the plant operating at full load and will be the target variable
    in our ANN model. Let us first explore the dataset.


    ```

    # import required packages and read data

    import numpy as np, pandas as pd

    import matplotlib.pyplot as plt


    data = pd.read_excel(''Folds5x2_pp.xlsx'', usecols = ''A:E'').values

    X y = data[:,0:4], data[:,4][:,np.newaxis]


    # plot input vs output for each input

    plt.plot(X[:,0], y, ''*''), plt.title(''AT vs EP'')

    plt.plot(X[:,1], y, ''*''), plt.title(''V vs EP'')

    plt.plot(X[:,2], y, ''*''), plt.title(''AP vs EP'')

    plt.plot(X[:,3], y, ''*''), plt.title(''RH vs EP'')

    ```


    Figure 11.3 clearly indicates the impact of input variables on the electrical
    power (EP).



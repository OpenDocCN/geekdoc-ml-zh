  md: '# 8.3 Density-based Clustering: DBSCAN


    DBSCAN, a Density-based algorithm, can easily handle irregularly shaped data distributions
    as shown in Figure 8.10 (don''t be alarmed by those disconnected dark-brown colored
    data-points! We will come back to these shortly). DBSCAN works by grouping together
    data-points that form regions of high data densities. Specifically, each data-point
    is classified into one of the following 3 categories:


    +   - A **core** point if there are more than a specified number (*minPts*) of
    data-points within a specified distance ($\varepsilon$)

    - A **border** point if less than *minPts* data-points lie within its $\varepsilon$
    neighborhood, but the data-point itself lies within the $\varepsilon$ neighborhood
    of another core point

    - A **noise** point if it isn''t classified as either core or border point


    After classification into core, border, and noise points, the clusters are defined
    by the sets of connected core and border data-points. Noise data-points are not
    assigned to any cluster. The disconnected dark-brown colored data-points that
    we saw in Figure 8.10 are the noise points. The ability to deal with arbitrarily
    shaped data, robustness to noise and outliers make DBSCAN well-suited for clustering
    process data.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_195_0.png)


    Figure 8.10: DBSCAN succeeds in handling elliptical data distribution


    The big shortcoming with the DBSCAN algorithm is the need to specify reasonable
    values of the two hyperparameters, *minPts* and $\varepsilon$, to ensure optimal
    clustering. If set improperly, we may end up with either one giant cluster or
    thousands of small clusters. Let''s study this aspect on the metal etch data.
    Figure 8.11 shows the clustering with properly (*minPts* = 3, $\varepsilon$ =
    5) and improperly (*minPts* = 5, $\varepsilon$ = 3) set hyperparameters; the improper
    setting results in several noise data-points and two extra clusters. Trial and
    error or domain specific knowledge can help to decide the hyperparameter values.'

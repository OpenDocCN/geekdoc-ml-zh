    \ number_comp, data):\n    \"\"\"\n    data: numpy array of shape = [n_samples,\
    \ n_features]\n\n    Returns\n    -------\n    monitoring_stats: numpy array of\
    \ shape = [n_samples, 3]\n    \"\"\"\n    n = data.shape[0]\n\n    # model parameters\n\
    \    W = ica.components_\n    L2_norm = np.linalg.norm(W, 2, axis=1)\n    sort_order\
    \ = np.flip(np.argsort(L2_norm))\n    W_sorted = W[sort_order,:]\n\n    # compute\
    \ I2\n    Wd = W_sorted[0:number_comp,:]\n    Sd = np.dot(Wd, data.T)\n    I2\

    \ $m = 2$ 和 $n = 25$；因此我们在LSTM层中最终得到 $4(50 + 625 + 25) = 2800$ 个模型参数。\n\n现在让我们来窥探一下LSTM单元的内部工作原理。LSTM单元可能看起来令人生畏，但实际上它们很容易理解。让我们看看每个神经层和门，理解它们扮演的具体角色。LSTM单元的核心组件是单元状态（$c_t\
    \ \\in R^n$），它几乎不受干扰地穿过单元，只经过几个逐元素操作来修改 $c_t$ 的各个元素/分量。这些修改决定了哪些分量对序列的进一步处理有用或不再有用。为了理解这些修改，考虑4个神经层中的第一个。\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_281_0.png)\n\n这里，输入（$x_t$）和上一步的隐藏状态（$h_{t-1}$）被处理以生成向量\
    \ $f$（$\\in R^n$），其值介于0和1之间。如果 $f$ 的第 $i$ 个分量为0，则意味着 $c_{t-1}$ 的第 $i$ 个分量在逐元素乘法后被擦除/遗忘（因此得名“遗忘门”）。第二和第三个神经层分别生成n维向量\
    \ $i$ 和 $g$。$i$（$\\in [0, 1]$）的分量值决定了 $g$（$\\in [-1, 1]$）的分量有多少通过输入门并被添加到单元状态。\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_281_1.png)\n\n这些都是在单元状态传递到下一个LSTM单元之前发生的所有修改。然而，LSTM单元内部还有一个主要任务。隐藏状态\

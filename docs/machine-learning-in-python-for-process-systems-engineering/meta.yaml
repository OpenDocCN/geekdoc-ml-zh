    # # Chapter 11

    ## Feedforward Neural Networks


    It won''t be an exaggeration to say that artificial neural networks (ANN) have
    (re)caught the fascination of data scientists and are currently the hottest topic
    among ML practitioners. Several recent technical breakthroughs and computational
    advancements have enabled (deep) ANNs to psrovide remarkable results for a wide
    range of problems. PSE is no exception to this trend and is increasingly witnessing
    more applications in areas like surrogate modeling, predictive equipment maintenance,
    etc.


    There is no doubt that ANNs have proven to be very powerful. However, with great
    power comes great responsibility! If you are not careful with ANN application,
    you will end up with disappointing results. To train an ANN model efficiently
    for a complex system, several hyperparameters need to be set carefully, which
    largely remains a trial-and-error exercise. Nonetheless, several techniques have
    been devised to overcome the challenges posed by ANN model training.


    In this chapter, we will demystify the world of ANNs and gain insights into how
    ANNs work. We will learn the underlying concepts, the tips & tricks of the trade,
    common problems encountered, and the techniques developed to handle these problems.
    Specifically, the following topics are covered


    +   - Introduction to ANNs

    - Exploration of nonlinearity in ANNs

    - Hyperparameter optimization for ANNs

    - Tips & tricks for improved ANN model training

    - Nonlinear soft sensing via ANN

    - General guidelines for ANN modeling for PSE'
- md: '## 11.1 ANN: An Introduction


    Artificial neural networks (ANNs) are nonlinear empirical models which can capture
    complex relationships between input-output variables via supervised learning or
    recognize data patterns via unsupervised learning. Architecturally, ANNs were
    inspired by human brain and are a complex network of interconnected neurons as
    shown in Figure 11.1. An ANN consists of an input layer, a series of hidden layers,
    and an output layer. The basic unit of the network, neuron, accepts a vector of
    inputs from the source input layer or the previous layer of the network, takes
    a weighted sum of the inputs, and then performs a nonlinear transformation to
    produce a single real-valued output. Each hidden layer can contain any number
    of neurons. In fact, an ANN with just 1 hidden layer has the universal approximation
    property, i.e., it can approximate any continuous function with any given accuracy.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_245_0.png)


    The network shown in Figure 11.1 is an example of fully-connected feed-forward
    neural networks (FFNN), the most common type of ANN. In FFNN, signals flow in
    only one direction, from the input layer to the output layer via hidden layers,
    as opposed to the RNNs which contain feedback loops. In fully-connected networks,
    neurons between consecutive layers are connected fully pairwise and neurons within
    a layer are not connected.


    While there are different types of ANN architectures (and ML researchers keep
    coming up with new ones!), FFNNs, RNNs, and CNNs are the most common architectures.
    While we will study RNNs in the next chapter, in this chapter we will focus on
    FFNNs. CNNs are primarily employed for image processing and are not covered in
    this book.


    ## Deep learning


    The recent popularity of ANNs can be attributed to the successes with deep learning.
    Deep learning simply refers to machine learning with deep neural networks (DNNs)
    which are ANNs with two or more hidden layers (see Figure 11.2). While shallow
    networks, with large number of neurons, can theoretically model any complex function,
    deep networks need much fewer model parameters and hence, are theoretically faster
    to train. Moreover, DNNs enable bypassing manual feature engineering; the first
    few hidden layers implicitly generate features that are utilized by downstream
    layers.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_246_0.png)


    Although DNNs seem superior to shallow networks, until recently, there weren’t
    many applications of DNNs. DNNs suffered from the issue of vanishing and exploding
    gradients during model training. However, in recent years, several technical innovations
    have produced better nonlinear transformers (activation functions), initialization
    and regularization schemes, and, learning/optimization algorithms. These innovations
    have largely overcome the model training issues for DNNs and combined with the
    availability of cheap computing power and large amount of data have resulted in
    the AI revolutions that we are witnessing today.


    > A few words of caution: The power of DNNs should not make you undermine the
    importance of feature engineering. Explicit feature engineering contextualizes
    process data by considering the specific characteristics of the underlying process
    system. For example, for a time-series vibration data, feature engineering via
    frequency-domain transformation and binning can greatly help subsequent network
    training; without this, a DNN would require substantially large amount of training
    data to implicitly learn the features.


    ## TensorFlow


    For classical ML implementations, we utilized the packages available in Scikit-learn.
    For ANNs, other specialized libraries are commonly used which make it very easy
    to build neural net models. TensorFlow (by Google) and PyTorch (by Facebook) are
    the two most popular deep learning frameworks. These frameworks provide specialized
    algorithms for efficient training of ANNs.


    Direct application of TensorFlow (TF) is not very straightforward and involves
    a steep learning curve. Modelers often utilized Keras, a high-level API built
    on top of TF, for ANN modeling. However, the latest version of TF released by
    Google in 2019 has integrated Keras directly into TF. This has made it possible
    to define, train, and evaluate ANN models in just a few lines of code. We will
    use TensorFlow Keras API in this book. The next section shows a quick application
    for modeling a combined cycle power plant to illustrate the ease of usage of these
    deep learning libraries.


    > Neural Nets for Process Systems: Brief History


    The deep learning revolution has been a shot in the arm of the ML researchers
    in PSE community who are now exploring ‘daring’ applications of ANNs such as replacing
    model predictive controllers (MPCs) with ANNs by ‘learning’ MPC’s optimal policies+.
    However, neural nets are not new for PSE community. Pre-deep learning era saw
    several interesting ANN applications for process systems as well. Venkatasubramanian++
    and Himmelblau+++ provide excellent accounts on the history of ANNs in PSE.


    The 90s was a relatively high-activity period which witnessed applications of
    ANNs for fault detection, soft-sensing, data reconciliation*, etc. This was followed
    by a decline in the interest in ANNs due to computational limitations and lack
    of big data. Today, these limitations having largely been overcome, ANNs are poised
    to make significant impact in PSE.


    +Kumar et. al., Industrial, large-scale model predictive control with structured
    neural networks, Computers and Chemical Engineering, 2021

    ++Venkat Venkatasubramanian, The promise of artificial intelligence in chemical
    engineering: is it here, finally?, AIChE Journal, 2018

    +++David Himmelblau, Accounts of experiences in the application of artificial
    neural networks in chemical engineering, Industrial Engineering & Chemistry Research,
    2008

    *Karjarla, Dynamic data rectification via recurrent neural networks, Ph.D. Thesis,
    The University of Texas at Austin, 1995


    ## 11.2 Process Modeling via FFNN for Combined Cycle Power Plant (CCPP)


    We will use data from a CCPP to illustrate the ease with which deep learning models
    can be built using TF Keras. The dataset (see Appendix for details) was collected
    over a period of 6 years and contains hourly average values of ambient temperature
    (AT), ambient pressure (AP), relative humidity (RH), and exhaust vacuum (V). These
    variables influence the net hourly electrical energy output (also provided in
    the dataset) of the plant operating at full load and will be the target variable
    in our ANN model. Let us first explore the dataset.


    ```python

    # import required packages and read data

    import numpy as np, pandas as pd

    import matplotlib.pyplot as plt


    data = pd.read_excel(''Folds5x2_pp.xlsx'', usecols = ''A:E'').values

    X, y = data[:,0:4], data[:,4][:,np.newaxis]


    # plot input vs output for each input

    plt.plot(X[:,0], y, ''*''), plt.title(''AT vs EP'')

    plt.plot(X[:,1], y, ''*''), plt.title(''V vs EP'')

    plt.plot(X[:,2], y, ''*''), plt.title(''AP vs EP'')

    plt.plot(X[:,3], y, ''*''), plt.title(''RH vs EP'')

    ```


    Figure 11.3 clearly indicates the impact of input variables on the electrical
    power (EP).


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_248_0.png)


    There is also a hint of nonlinear relationship between exhaust vacuum and power.
    While it may seem that AP and RH do not influence power strongly, it is a known
    fact that power increases with increasing AP and RH individually<sup>58</sup>.
    Let us now build a FFNN model with 2 hidden layers to predict power. We first
    split the dataset into training and test data, and then scale the variables.


    ```python

    # separate train and test data

    from sklearn.model_selection import train_test_split

    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size = 0.2, random_state
    = 100)


    # scale data

    from sklearn.preprocessing import StandardScaler

    X_scaler = StandardScaler()

    X_train_scaled = X_scaler.fit_transform(X_train)

    X_test_scaled = X_scaler.transform(X_test)


    y_scaler = StandardScaler()

    y_train_scaled = y_scaler.fit_transform(y_train)

    y_test_scaled = y_scaler.transform(y_test)

    ```


    To build FFNN model, we will import relevant Keras libraries and add different
    layers of the network sequentially. The Dense library is used to define a layer
    that is fully-connected to the previous layer.


    ```python

    # import Keras libraries

    from tensorflow.keras import Sequential

    from tensorflow.keras.layers import Dense


    # define model

    model = Sequential()

    model.add(Dense(8, activation=''relu'', kernel_initializer=''he_normal'', input_shape=(4,)))

    # 8 neurons in 1st hidden layer

    model.add(Dense(5, activation=''relu'', kernel_initializer=''he_normal''))

    # 5 neurons in 2nd layer

    model.add(Dense(1))

    # 1 neuron in output layer

    ```


    The above 4-line code completely define the structure of the FFNN. Do not worry
    about the activation and kernel_initializer parameters; we will study them in
    more detail in later sections.


    > <sup>58</sup> Pinar Tufekci, Prediction of full load electrical power output
    of a base load operated combined cycle power plant using machine learning methods,
    Electrical Power and Energy Systems, 2014'
  mdcn: '## 11.1 ANN：简介


    人工神经网络（ANN）是一种非线性经验模型，它可以通过监督学习捕捉输入-输出变量之间的复杂关系，或通过无监督学习识别数据模式。从结构上看，ANN的灵感来源于人脑，是一个由相互连接的神经元组成的复杂网络，如图11.1所示。一个ANN由一个输入层、一系列隐藏层和一个输出层组成。网络的基本单元——神经元，接受来自源输入层或网络前一层的输入向量，对输入进行加权求和，然后执行非线性变换以产生单个实数值输出。每个隐藏层可以包含任意数量的神经元。事实上，一个仅包含1个隐藏层的ANN就具有万能逼近特性，即它可以以任意精度逼近任何连续函数。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_245_0.png)


    图11.1所示的网络是全连接前馈神经网络（FFNN）的一个例子，这是最常见的ANN类型。在FFNN中，信号仅沿一个方向流动，从输入层通过隐藏层流向输出层，这与包含反馈循环的RNN不同。在全连接网络中，连续层之间的神经元是完全成对连接的，而同一层内的神经元则不相连。


    虽然存在不同类型的ANN架构（而且机器学习研究人员还在不断提出新的架构！），但FFNN、RNN和CNN是最常见的架构。我们将在下一章研究RNN，而本章将重点介绍FFNN。CNN主要用于图像处理，本书不作介绍。


    ## 深度学习


    ANN近年来的流行可归功于深度学习的成功。深度学习简单来说就是使用深度神经网络（DNN）进行机器学习，DNN是具有两个或更多隐藏层的ANN（见图11.2）。虽然具有大量神经元的浅层网络理论上可以建模任何复杂函数，但深层网络所需的模型参数要少得多，因此理论上训练速度更快。此外，DNN能够绕过手动特征工程；前几个隐藏层会隐式地生成供后续层使用的特征。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_246_0.png)


    尽管DNN似乎优于浅层网络，但直到最近，DNN的应用还不多。DNN在模型训练过程中存在梯度消失和梯度爆炸的问题。然而，近年来，几项技术创新产生了更好的非线性变换器（激活函数）、初始化和正则化方案，以及学习/优化算法。这些创新在很大程度上克服了DNN的模型训练问题，再加上廉价计算能力和大量数据的可用性，共同促成了我们今天所见证的AI革命。


    > 需要注意的是：DNN的强大能力不应让你低估特征工程的重要性。显式特征工程通过考虑底层过程系统的具体特性，为过程数据提供上下文。例如，对于时间序列振动数据，通过频域变换和分箱进行的特征工程可以极大地帮助后续的网络训练；如果没有这个，DNN将需要大量训练数据来隐式地学习这些特征。


    ## TensorFlow


    对于经典的机器学习实现，我们使用了Scikit-learn中可用的包。对于ANN，通常使用其他专用库，这些库使得构建神经网络模型变得非常容易。TensorFlow（由Google开发）和PyTorch（由Facebook开发）是两个最受欢迎的深度学习框架。这些框架提供了用于高效训练ANN的专用算法。


    直接应用TensorFlow（TF）并不十分直观，且学习曲线陡峭。建模者通常使用构建在TF之上的高级API——Keras来进行ANN建模。然而，Google在2019年发布的最新版本TF已将Keras直接集成到TF中。这使得仅用几行代码就能定义、训练和评估ANN模型成为可能。本书将使用TensorFlow
    Keras API。下一节将展示一个快速应用，用于建模联合循环电厂，以说明这些深度学习库的易用性。


    > 过程系统神经网络：简史


    深度学习革命为过程系统工程（PSE）领域的机器学习研究人员注入了一剂强心针，他们现在正在探索ANN的“大胆”应用，例如通过“学习”模型预测控制器（MPC）的最优策略，用ANN替代MPC。然而，神经网络对PSE领域来说并不新鲜。在深度学习时代之前，也出现了一些有趣的ANN在过程系统中的应用。Venkatasubramanian和Himmelblau对ANN在PSE中的历史提供了精彩的记述。


    90年代是一个相对活跃的时期，见证了ANN在故障检测、软测量、数据协调*等方面的应用。随后，由于计算限制和缺乏大数据，人们对ANN的兴趣有所下降。如今，这些限制在很大程度上已被克服，ANN有望在PSE领域产生重大影响。


    +Kumar et. al., Industrial, large-scale model predictive control with structured
    neural networks, Computers and Chemical Engineering, 2021

    ++Venkat Venkatasubramanian, The promise of artificial intelligence in chemical
    engineering: is it here, finally?, AIChE Journal, 2018

    +++David Himmelblau, Accounts of experiences in the application of artificial
    neural networks in chemical engineering, Industrial Engineering & Chemistry Research,
    2008

    *Karjarla, Dynamic data rectification via recurrent neural networks, Ph.D. Thesis,
    The University of Texas at Austin, 1995


    ## 11.2 通过FFNN对联合循环电厂（CCPP）进行过程建模


    我们将使用CCPP的数据来说明使用TF Keras构建深度学习模型的便捷性。该数据集（详见附录）是在6年期间收集的，包含环境温度（AT）、环境压力（AP）、相对湿度（RH）和排气真空度（V）的小时平均值。这些变量影响着电厂在满负荷运行时的每小时净电能输出（数据集中也提供了该值），并将成为我们ANN模型中的目标变量。让我们首先探索一下数据集。


    ```python

    # import required packages and read data

    import numpy as np, pandas as pd

    import matplotlib.pyplot as plt


    data = pd.read_excel(''Folds5x2_pp.xlsx'', usecols = ''A:E'').values

    X, y = data[:,0:4], data[:,4][:,np.newaxis]


    # plot input vs output for each input

    plt.plot(X[:,0], y, ''*''), plt.title(''AT vs EP'')

    plt.plot(X[:,1], y, ''*''), plt.title(''V vs EP'')

    plt.plot(X[:,2], y, ''*''), plt.title(''AP vs EP'')

    plt.plot(X[:,3], y, ''*''), plt.title(''RH vs EP'')

    ```


    图11.3清楚地表明了输入变量对电功率（EP）的影响。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_248_0.png)


    排气真空度和功率之间也存在非线性关系的迹象。虽然AP和RH似乎对功率影响不大，但已知的事实是，功率会随着AP和RH的单独增加而增加<sup>58</sup>。现在让我们构建一个具有2个隐藏层的FFNN模型来预测功率。我们首先将数据集分为训练数据和测试数据，然后对变量进行缩放。


    ```python

    # separate train and test data

    from sklearn.model_selection import train_test_split

    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size = 0.2, random_state
    = 100)


    # scale data

    from sklearn.preprocessing import StandardScaler

    X_scaler = StandardScaler()

    X_train_scaled = X_scaler.fit_transform(X_train)

    X_test_scaled = X_scaler.transform(X_test)


    y_scaler = StandardScaler()

    y_train_scaled = y_scaler.fit_transform(y_train)

    y_test_scaled = y_scaler.transform(y_test)

    ```


    为了构建FFNN模型，我们将导入相关的Keras库，并按顺序添加网络的不同层。Dense库用于定义一个与前一层全连接的层。


    ```python

    # import Keras libraries

    from tensorflow.keras import Sequential

    from tensorflow.keras.layers import Dense


    # define model

    model = Sequential()

    model.add(Dense(8, activation=''relu'', kernel_initializer=''he_normal'', input_shape=(4,)))

    # 8 neurons in 1st hidden layer

    model.add(Dense(5, activation=''relu'', kernel_initializer=''he_normal''))

    # 5 neurons in 2nd layer

    model.add(Dense(1))

    # 1 neuron in output layer

    ```


    以上4行代码完全定义了FFNN的结构。不用担心activation和kernel_initializer参数；我们将在后续章节中更详细地研究它们。


    > <sup>58</sup> Pinar Tufekci, Prediction of full load electrical power output
    of a base load operated combined cycle power plant using machine learning methods,
    Electrical Power and Energy Systems, 2014'

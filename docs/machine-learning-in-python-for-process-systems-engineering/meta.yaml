    ## 过滤法


    过滤法最常见的形式是，使用某种统计量来估计每个输入与目标之间的关系，然后根据估计的关系强度对输入进行排序。排序后，可以选择排名靠前的变量。图 4.4 展示了该策略的概览。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_87_0.png)


    让我们看看两种常用的统计量。


    ### 相关系数


    对于连续输入和目标，常用的统计量是皮尔逊相关系数，它衡量输入与目标之间的线性相关性，其计算公式为


    $$R_{xy} = \frac{\sum_i(x_i - \bar{x})(y_i - \bar{y})}{\sqrt{\sum_i(x_i - \bar{x})^2
    \sum_i(y_i - \bar{y})^2}}$$


    对于变量选择，可以选择相关性最高的前 $k$ 个变量（其中 $k$ 是预先已知的，或通过交叉验证确定），或者选择所有相关性显著不为零的变量。


    ### 互信息


    相关系数对于目标与输入之间的非线性依赖关系可能具有误导性，从而导致错误的变量选择。解决方案是使用“互信息（MI）”度量，它可以有效量化变量之间的任何类型的依赖关系。数学上，MI
    由下式给出


    $$MI(x, y) = \iint p(x, y) \log \frac{p(x, y)}{p(x)p(y)} dxdy$$


    其中 $p(x, y)$ 表示变量 x 和 y 的联合概率密度，$p(x)$ 表示 x 的边缘概率密度。对于过程数据，可以使用 k 近邻法（sklearn
    中使用）、核密度估计（KDE）或直方图来估计这些密度。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_88_0.png)


    图 4.5：目标与输入之间为零、线性和非线性依赖关系时的线性相关性和互信息度量


    考虑图 4.3 中的场景。皮尔逊相关系数未能识别目标与输入之间的非线性（正弦）依赖关系，但互信息能够正确确定依赖关系。通俗地说，MI 衡量的是通过一个变量（x）获得的关于另一个变量（y）的信息量。因此，如果目标与输入相互独立，那么从已知
    x 中无法获得关于 y 的信息，因此它们的 MI 为 0。另一方面，如果 y 依赖于 x，则 MI > 0，且值越高意味着依赖性越强。


    正如您可能注意到的，过滤法不需要构建任何预测模型，因此执行速度快。当输入候选数量非常大时，过滤法尤其受到青睐。然而，“相关”输入子集的质量可能较低。这是因为过滤法孤立地考虑输入，而不考虑输入之间的交互作用。一个排名较低的输入在与某些其他输入组合时，可能会显著提高预测精度。因此，这些方法通常用作变量选择的第一步，仅去除排名非常低的变量，而剩余的变量则通过其他更复杂的方法进一步筛选。


    ### Sklearn 实现


    Sklearn 提供了 `f_regression` 和 `mutual_info_regression` 方法来计算我们需要的统计量。`f_regression`
    计算每个输入变量与目标之间的线性相关性，然后将其转换为 F 分数。F 分数来自 F 检验（您可能在统计课上记得），它对两个线性模型（一个将目标与常数相关联，另一个将目标与输入和常数相关联）之间的建模误差差异是否显著或仅仅是偶然发生进行统计检验。如果这听起来不熟悉，别担心。只需知道通过
    F 分数获得的排序与使用相关系数获得的排序相同即可。


    `f_regression` 可以与 `SelectKBest` 转换器结合使用，方便地将原始输入数据矩阵转换为仅包含相关输入的矩阵，如下所示


    ```python

    # read data

    import numpy as np

    VSdata = np.loadtxt(''VSdata.csv'', delimiter='','')


    # separate X and y

    y = VSdata[:,0]

    X = VSdata[:,1:]


    # compute linear correlation-based scores

    from sklearn.feature_selection import SelectKBest

    from sklearn.feature_selection import f_regression


    VSmodel = SelectKBest(f_regression, k=10).fit(X, y)

    input_scores = VSmodel.scores_


    # find the top ranked inputs

    top_k_inputs = np.argsort(input_scores)[::-1][:10] + 1

    # [::-1] reverses the array returned by argsort() and [:n] gives that last n elements


    # reduce X to only top relevant inputs

    X_relevant = VSmodel.transform(X)

    ```


    对于我们的模拟数据集，输入 22、21、24、20、30、29、32、31、28、27 被选为前 10 个相关变量，即只有 4 个输入被正确选出。我们可以看到选择效果并不理想，这主要是由于我们的目标具有多变量依赖性。让我们看看包装法能否做得更好。


    ## 包装法


    图 4.6 概述了包装法进行特征选择的策略。这里，与过滤法不同，使用预测模型来寻找相关特征。该方法从特征子集的初始选择开始，并进入一个循环。在循环的每个周期中，使用当前选定的子集构建一个新模型，并根据模型的性能或某些模型属性来决定将某个特征包含在子集中还是排除在外。所采用的具体策略区分了不同的序列方法。一旦获得所需数量的相关特征或满足模型性能的某些标准，循环即告结束。请注意，模型性能可以使用验证数据集或使用
    BIC/AIC 指标拟合数据集本身来评估。让我们研究几种著名的包装法。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_90_0.png)


    图 4.6：包装法进行特征选择的策略


    ### 递归特征消除（RFE）


    在此方法中，最初使用所有输入变量构建一个模型。每个输入的重要性使用任何特定的模型属性（如模型系数）或通过某些模型属性的组合来量化。丢弃重要性最低的几个输入，并重复整个过程，直到获得所需数量的相关输入或模型性能开始下降。


    PLS 是一种非常流行的用于过程系统的回归方法，我们将在第 5 章详细研究。我们在这里提到它是因为 PLS 允许计算 VIP（投影中的变量重要性）分数，该分数量化了每个输入的重要性。基于
    PLS VIP<sup>14</sup> 的 RFE 算法可用于迭代地排除对目标变量预测贡献最小的输入。


    ### 序列特征选择（SFS）


    序列特征选择技术有两种常见变体。在前向 SFS 中，搜索从一个空子集开始。当模型仅使用这一个输入进行训练时，导致最佳性能的输入被添加到子集。接下来，将先前选定的子集与每个剩余输入逐一组合。给出最佳性能的两个输入的组合成为选定的子集。重复此过程，直到选择
    *k* 个输入或添加新变量不再改善预测。


    另一种变体，后向 SFS，工作方式与前向 SFS 类似，不同之处在于它从所有输入开始。排除后能带来最佳模型性能的输入被从子集中排除。重复此过程以逐一排除输入。


    <sup>14</sup> sklearn 中的 PLSRegression 类没有内置的 VIP 计算功能。可以使用 pyChemometrics 包，它提供了一个带有
    VIP 方法的 ChemometricsPLS 类'

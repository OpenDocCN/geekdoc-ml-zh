  md: '# # Chapter 14


    # ## Process Monitoring Web Application


    You have done all the hard work to obtain a ML model that meets performance criteria
    and now it''s time to deliver the solution / model to its end-users who will be
    using the model''s results on a regular basis. But how do you do it? If the end-users
    are non-technical (from data-science perspective) like plant operators, you cannot
    ask them to have their own Python installation to run the ML model. Under such
    circumstances, deployment over web is a good and frequently employed solution
    for delivering ML results.


    For web deployment, Python provides several frameworks (like Django, Flask, CherryPy)
    for developing simple to complex web application fast. Very often, all you may
    want is a quick prototype that allows you to collect user feedback. Keeping this
    in mind, we will show you how to build a light-weight web application from scratch
    and demonstrate how easy it is to do so. Specifically, we will build a process
    monitoring tool that provides 24 X 7 fault detection & diagnosis (FDD) results
    to plant operators over web. During the course of building this solution, we will
    learn the following topics


    +   - Deploying Python applications using CherryPy''s web server

    - Embedding ML models into a web application

    - Saving ML models for later reuse

    - Building front-end user interfaces using HTML, CSS, Javascript'

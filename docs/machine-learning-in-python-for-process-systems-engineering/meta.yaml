    # # Chapter 1

    Machine Learning for Process Systems Engineering


    Imagine yourself in the shoes of an operator or engineer responsible for uninterrupted
    and optimal operation of an oil refinery. Keeping an eye on each of the 1000s
    of process measurements being made every second to look for process abnormalities
    or opportunities for plant performance improvement is akin to finding a needle
    in a haystack. The task is undoubtedly overwhelming and is the primary reason
    why plant managers often complain about having *‘too much data but little knowledge
    and insight’*.


    However, unlike humans, computers can be programmed to parse through large amounts
    of data in real-time, extract patterns, trends, and assist plant personnel in
    making informed business and operational decisions. This practice of learning
    about systems from data or machine learning has become an indispensable tool in
    process operations in the age of increasing global competition and stricter product
    quality standards.


    This chapter provides an overview of how the power of machine learning is harnessed
    for process systems engineering. Specifically, the following topics are covered


    +   - Unique characteristics of process data

    - Types of ML systems and typical workflow to convert data into insights

    - Classical applications of ML techniques in process industry

    - Common ML solution deployment infrastructure employed in industry


    Let’s now tighten our seat-belts as we embark upon this exciting journey of de-mystifying
    machine learning for process systems engineering.'
  - '[PAGE 16]


    # 1.1 What are Process Systems


    Process systems refer to a collection of physical structures that convert raw
    materials (wood, natural gas, crude oil, coal, etc.) into final consumer products
    (paper, fertilizers, diesel, energy, etc.) or intermediate products which are
    then used to manufacture other commodity materials. These process systems can
    range from a simple water-heating system to complex oil refineries. Figure 1.1
    shows an example (petrochemical) plant comprising several processing units such
    as distillation columns, heat exchangers, pumps. Process industry is a broad category
    that encompasses, amongst others, chemical industry, bioprocess industry, power
    industry, pharmaceuticals industry, steel industry, semiconductor industry, and
    waste management industry.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_16_0.png)


    Figure 1.1: Petrochemical plant image (obtained from pixabay.com)


    In process industry, the task of optimizing production efficiency, controlling
    product quality, monitoring the process are categorized as process systems engineering
    (PSE) activities. These tasks often require a mathematical model of the plant.
    The traditional practice has been to use first principles mathematical description
    of physio-chemical phenomena occurring inside each process unit to mathematically
    characterize the whole plant. However, as you may already know, building such
    fundamental models are time-consuming and difficult for complex systems. Machine
    learning (ML)-based methods provide a convenient alternative where process data
    are used to build empirical plant model which can be used for optimization, control,
    and monitoring purposes. Availability of large amount of sensor data has further
    boosted the trend of incorporating ML techniques for PSE and demand for process
    data scientists.'
  - '[PAGE 17]


    Let’s take a look at the kind of data generated in process industry. Majority
    of the process data include process stream flowrate, temperature, pressure, level,
    power, and composition measurements as shown in figure 1.2. Additionally, obtaining
    vibration signals from rotating equipment (motors, compressors), infrared or visual
    images, and spectra data are also common now-a-days. These indirect data are frequently
    utilized for predictive equipment maintenance and product quality control.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_17_0.png)


    # Characteristics of process data


    Industrial process data often exhibit characteristics which pose challenges to
    a process data scientist. Choosing an ML technique appropriate to the data is
    a pre-requisite for a successful project implementation. These characteristics
    include the following:


    +   - *Dynamic*: Process plants rarely operate at a perfect steady-state i.e.,
    at fixed values of process inputs and outputs. Plants are often subject to random
    or systematic disturbances such as changing ambient conditions, process feed quality,
    and product demand which are handled by control system by manipulating process
    variables. This leads to fluctuations around a steady-state point or plants moving
    from one steady-state to another.'
  - '[PAGE 18]


    +   - *Time-varying*: Correlations between process variables change over time
    due to gradual changes in process parameters. For example, heat transfer coefficient
    in a heat-exchanger may change due to fouling or catalyst activity may degrade
    due to aging.

    - *Batch vs continuous*: While continuous processes are dominant in process industry,
    batch processes are also frequently employed, for example in semiconductor and
    drug manufacturing. Unlike continuous processes, batch processes are of finite
    durations and offer its own set of unique challenges such as batch-to-batch variations
    and inherent non-steady-state operation. Time itself becomes a crucial dimension
    for accurate modeling of temporal evolution of process variables within a batch.

    - *Multimode operations*: Multimode characteristics show up when a process plant
    operates primarily around a few distinct steady states. For example, a plant producing
    species a, b, and c may have different production recipes (set-points of process
    variables) for each of these recipes. Depending on the production schedule, the
    plant will switch from one recipe to another. Deploying a single global ML model
    for a multimode process often lead to lower accuracy compared to that obtained
    from building local models for each mode.

    - *Discrete/Discontinuous*: Depending upon the production load, certain equipment
    may be switched on or off causing step changes in process behavior. For example,
    switching on an extra turbine or compressor causes step increase in power consumption.

    - *Nonlinear*: The complex physio-chemical phenomena (chemical reactions, vapor-liquid
    equilibrium, etc.) occurring inside process units are most often nonlinear. While
    linear models often provide good approximations when processes operate around
    a single steady-state, non-linear models become necessary when processes experience
    large fluctuations in the operating conditions.

    - *High dimensionality*: Modern process plants make hundreds of process-critical
    measurements. Considering that process plants make process adjustments in real-time,
    high dimensionality becomes an issue when a computationally intensive methodology
    is adopted.

    - *Multirate sampling*: Not all process measurements are made at the same frequency.
    While temperature or pressure readings are sampled every second or minute, composition/analyzer
    measurements are often sampled at much lower frequency (once an hour or a day).


    In this book, we will study several ML methods in detail which have been designed
    to handle these different varieties of process systems. Let us first understand
    what we mean by machine learning.'
- md: '## 1.2 What is Machine Learning


    At its core, machine learning simply means using computer programs and data for
    finding relationship between different components of a system and discovering
    patterns that were not immediately evident. This characteristic of using data
    to learn about the system makes machine learning interesting and different. System
    specific knowledge is not explicitly embedded into a ML program; the program extracts
    the knowledge from data. Figure 1.3 compares ML approach with a non-ML approach
    for distillation column modeling: ML approach does not require system specific
    data such as number of stages or the type of packing.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_19_0.png)


    We often marvel at the accuracy of recommendations made by Netflix or Amazon for
    potential shows or products. These companies do not possess explicit information
    about our personal preferences or psychology (whether we like sci-fi movies or
    not). The data does all the trick! ML algorithms process past purchase data to
    discern the likes and dislikes of its customers and make recommendations. In process
    industry, manufacturers use ML methods to determine optimal equipment maintenance
    schedule using past maintenance and operating conditions data. Here again, data-based
    analysis provides considerable convenience over the alternative method of complex
    metallurgical analysis.


    The reliance on data alone to obtain reasonably good system approximation is one
    of the major reasons behind ML''s growing popularity. The barrier of requiring
    specific domain knowledge to be able to analyze a system has been circumvented
    by machine learning. ML algorithms are also universal in nature. For example,
    we can use the same data-clustering algorithm for analyzing demographics data,
    factory data, or economic data to obtain actionable knowledge. These properties
    combined with the surge in the amount of data collected and the dip in the cost
    of computational resources had led machine learning to revolutionize several industries.


    > The increasing popularity of machine learning does not mean domain knowledge
    is redundant. Domain expertise often helps to decide which ML algorithm to use
    and proper infusion of domain knowledge into ML methodology can sometimes increase
    model accuracy considerably.


    "Why don''t we just build a model using first-principles and get very accurate
    models? Why rely on data?" This is a valid question. There is no doubt that fundamental
    models have better accuracy and generalization capability, however, developing
    fundamental models are often time consuming and require expert resources. These
    models can sometimes be too complex to execute in real-time. Adopting ML methodology
    can help getting around these difficulties.


    ## Machine learning workflow


    Figure 1.4 shows the typical tasks involved in a machine learning project. The
    tasks are categorized into offline computations and online/real-time computations.
    In online computations, process data are parsed through the process model to provide
    real-time insights and results. Note that the models could be process input-output
    models, process monitoring models (process normal/abnormal classification), mode
    categorization models, or fault classification models.


    The models are built offline using historical process data. This offline exercise
    is performed once or repeated at regular intervals for model update. Brief description
    of the essential steps performed are provided below:


    - *Sample and variable selection*: One does not simply dump all the available
    historical data and sensor measurements into model training module. Only the portion
    of historical data that best represent the current process behavior or the behavior
    of interest is utilized. For process systems, it is common to use data over the
    past couple of years as training data. If steady-state models are being built,
    then data from steady-state operation periods are used.


    Input variable selection warrants judicious consideration as well. While including
    too many model inputs leads to overfitting and high computational complexity,
    leaving out important variables leads to underfitting. The basic principle is
    to include only those inputs that are known to influence the model outputs. Specific
    algorithms for variable selection are covered in Chapter 4.


    - *Data cleaning*: "Garbage in, garbage out" is an age-old principle in computer
    simulations. The same holds for ML model training. Your model will be practically
    useless if training data is not ''clean''. For example, process monitoring model
    won''t be able to detect process abnormalities accurately if it has been trained
    with outlier-infested training data. Data cleaning, amongst others, identification
    and removal of outliers, and removal of noise effects. Detailed algorithms are
    covered in Chapter 4.

    - *Model training and validation*: Model training imply estimating the parameters
    of the chosen ML model, for example, the coefficients in a linear regression model.
    Model validation is employed for finding optimal values of model hyperparameters,
    for example, regularization coefficient in ridge regression. At the end of this
    step, the coveted process model is obtained. Several best practices for model
    training and validation are covered in Chapter 3.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_21_0.png)


    Figure 1.4: Steps involved in a typical ML-based methodology


    Distinct from the offline-online paradigm, there is another approach employed
    in process industry, especially for nonlinear and multimode processes. It is called
    just-in-time learning or lazy learning. As shown in Figure 1.5, the model building
    exercise is carried out online as well. When new process data comes in, relevant
    data are fetched from the historical dataset that are similar to the incoming
    samples based on some nearest neighborhood criterion. A local model is built using
    the fetched relevant data. The obtained model processes the incoming samples and
    is then discarded. A new local model is built when the next samples come in.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_22_0.png)


    Figure 1.5: Steps involved in a just-in-time learning methodology


    ## Types of machine learning systems


    Although there is a plethora of ML models available, all of them can be organized
    into three broad categories, namely, supervised learning, unsupervised learning,
    and reinforcement learning. The categorization is based on the nature of model
    output associated with each sample in the training dataset. Note that there is
    another category, semi-supervised learning – this method, however, is used less
    often compared to the other mentioned methods. Figure 1.6 gives a sneak peek into
    some of the ML algorithms and application areas corresponding to supervised and
    unsupervised learnings that we will cover in this book.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_23_0.png)


    Let''s now try to understand these categories a bit more clearly.


    ## Supervised learning


    Supervised learning is used when training data includes sets of inputs and associated
    outputs. As illustrated in Figure 1.7, supervised learning models learn the input-output
    relationship and use this relationship to predict the unknown output for a new
    input. The outputs can be discrete values (for classification problems) or continuous
    values (for regression problems).


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_23_1.png)


    ## Unsupervised learning


    Unsupervised learning is used when training data is not divided into inputs and
    outputs. The primary purpose is to find hidden pattern, if any, in data. An example
    situation is illustrated in Figure 1.8, where an unsupervised learning model finds
    prevailing structure (distinct clusters) in historical data and buckets them into
    different groups. The model can now be used to assign any new incoming sample
    into either of the groups. Unsupervised learning is often used in conjunction
    with supervised learning. For example, in Figure 1.8, separate local models can
    be built via supervised learning for data in different clusters. As you would
    have guessed correctly, data would need to be separated into inputs and outputs
    before application of supervised learning.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_24_0.png)


    ## Reinforcement learning (RL)


    Unlike supervised and unsupervised learning where there is one-time interaction
    between the system (environment) and model (ML agent) during training, in reinforcement
    learning the agent continuously interacts with the environment to generate training
    data to ''learn'' an optimal strategy for accomplishing a task. The actions decided
    as per the learnt strategy are such that the long-term rewards are maximized.
    For example, consider a simple task of controlling water level in a container
    at a fixed height during rainy days.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_24_1.png)'
  mdcn: '## 1.2 什么是机器学习


    从本质上讲，机器学习就是利用计算机程序和数据来发现系统不同组件之间的关系，并揭示那些并非显而易见的模式。这种利用数据来学习系统特性的特点，使得机器学习既有趣又与众不同。系统特定的知识并未被显式地嵌入到机器学习程序中；程序是从数据中提取知识。图1.3比较了用于精馏塔建模的机器学习方法与非机器学习方法：机器学习方法不需要诸如塔板数或填料类型等系统特定数据。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_19_0.png)


    我们常常惊叹于Netflix或亚马逊为潜在节目或产品推荐的准确性。这些公司并不掌握关于我们个人偏好或心理（我们是否喜欢科幻电影）的明确信息。数据完成了一切！机器学习算法处理过去的购买数据，以识别客户的喜好和厌恶，并进行推荐。在流程工业中，制造商使用机器学习方法，利用过去的维护和运行条件数据来确定最佳的设备维护计划。同样，与复杂的冶金分析等替代方法相比，基于数据的分析提供了极大的便利。


    仅仅依赖数据就能获得相当好的系统近似，这是机器学习日益普及的主要原因之一。机器学习绕过了需要特定领域知识才能分析系统的障碍。机器学习算法本质上也是通用的。例如，我们可以使用相同的数据聚类算法来分析人口统计数据、工厂数据或经济数据，以获得可操作的知识。这些特性，加上收集的数据量激增和计算资源成本下降，使得机器学习彻底改变了多个行业。


    > 机器学习日益普及并不意味着领域知识是多余的。领域专业知识通常有助于决定使用哪种机器学习算法，并且将领域知识适当地融入机器学习方法，有时可以显著提高模型的准确性。


    “为什么我们不直接使用第一性原理建立模型，从而获得非常精确的模型呢？为什么要依赖数据？”这是一个合理的问题。毫无疑问，基础模型具有更好的准确性和泛化能力，然而，开发基础模型通常耗时且需要专家资源。这些模型有时过于复杂，无法实时执行。采用机器学习方法可以帮助克服这些困难。


    ## 机器学习工作流程


    图1.4展示了一个机器学习项目中涉及的典型任务。这些任务分为离线计算和在线/实时计算。在在线计算中，过程数据通过过程模型进行解析，以提供实时洞察和结果。请注意，这些模型可以是过程输入-输出模型、过程监控模型（过程正常/异常分类）、模式分类模型或故障分类模型。


    模型是使用历史过程数据离线构建的。这种离线工作执行一次或定期重复进行以更新模型。下面简要描述执行的基本步骤：


    - *样本和变量选择*：不能简单地将所有可用的历史数据和传感器测量值都丢进模型训练模块。只使用最能代表当前过程行为或感兴趣行为的那部分历史数据。对于过程系统，通常使用过去几年的数据作为训练数据。如果构建的是稳态模型，则使用稳态运行时期的数据。


    输入变量的选择也需要审慎考虑。包含过多的模型输入会导致过拟合和高计算复杂度，而遗漏重要变量则会导致欠拟合。基本原则是只包含那些已知会影响模型输出的输入。变量选择的具体算法在第4章中介绍。


    - *数据清洗*：“垃圾进，垃圾出”是计算机模拟中一个古老的原则。对于机器学习模型训练同样适用。如果训练数据不“干净”，你的模型实际上将毫无用处。例如，如果过程监控模型是用充满异常值的训练数据训练的，它将无法准确检测过程异常。数据清洗包括识别和移除异常值、消除噪声影响等。详细算法在第4章中介绍。

    - *模型训练和验证*：模型训练意味着估计所选机器学习模型的参数，例如线性回归模型中的系数。模型验证用于寻找模型超参数的最佳值，例如岭回归中的正则化系数。在此步骤结束时，就得到了梦寐以求的过程模型。模型训练和验证的若干最佳实践在第3章中介绍。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_21_0.png)


    图1.4：基于机器学习的典型方法所涉及的步骤


    与离线-在线范式不同，流程工业中还采用另一种方法，特别是对于非线性和多模式过程。它被称为即时学习或惰性学习。如图1.5所示，模型构建工作也在线进行。当新的过程数据到来时，根据某种最近邻准则，从历史数据集中检索与输入样本相似的相关数据。使用检索到的相关数据构建一个局部模型。获得的模型处理输入样本，然后被丢弃。当下一个样本到来时，会构建一个新的局部模型。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_22_0.png)


    图1.5：即时学习方法所涉及的步骤


    ## 机器学习系统的类型


    尽管有大量可用的机器学习模型，但它们都可以分为三大类，即监督学习、无监督学习和强化学习。这种分类基于训练数据集中每个样本相关的模型输出的性质。请注意，还有另一类——半监督学习——然而，与上述其他方法相比，这种方法使用较少。图1.6简要介绍了一些机器学习算法以及本书将涵盖的监督学习和无监督学习的应用领域。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_23_0.png)


    现在让我们更清晰地理解这些类别。


    ## 监督学习


    当训练数据包含输入集和相关输出集时，使用监督学习。如图1.7所示，监督学习模型学习输入-输出关系，并利用这种关系预测新输入的未知输出。输出可以是离散值（用于分类问题）或连续值（用于回归问题）。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_23_1.png)


    ## 无监督学习


    当训练数据未被划分为输入和输出时，使用无监督学习。主要目的是发现数据中隐藏的模式（如果有的话）。图1.8说明了一个示例情况，其中无监督学习模型在历史数据中发现主要结构（不同的簇），并将它们分组到不同的类别中。现在，该模型可用于将任何新输入样本分配到这些组中的任何一个。无监督学习通常与监督学习结合使用。例如，在图1.8中，可以通过监督学习为不同簇的数据构建单独的局部模型。正如您可能正确猜测的那样，在应用监督学习之前，数据需要被分离为输入和输出。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_24_0.png)


    ## 强化学习 (RL)


    与监督学习和无监督学习在训练期间系统（环境）与模型（机器学习智能体）之间只有一次性交互不同，在强化学习中，智能体与环境持续交互，以生成训练数据来“学习”完成任务的最优策略。根据所学策略决定的行动旨在最大化长期奖励。例如，考虑一个简单的任务：在雨天将容器中的水位控制在固定高度。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_24_1.png)'

    \n对于第$j$类的样本，$T^2_{sample,j}$由下式给出\n\n$T^2_{sample,j} = (z_{sample} - \\widetilde{\\\
    mu}_j)^T \\widetilde{S}_j (z_{sample} - \\widetilde{\\mu}_j)$\n\n其中，$\\widetilde{\\\
    mu}_j$和$\\widetilde{S}_j$分别表示训练数据集中属于第$j$个故障类别的投影样本的均值和协方差矩阵，$z_{sample}$表示FDA空间中的投影样本。$T^2_{CL,j}$可以使用我们在PCA中使用的相同表达式获得，即$\\\
    frac{k(N_j^2-1)}{N_j(N_j-k)} F_{k,N-k}(\\alpha)$，其中$k$表示在FDA空间中保留的维度数。为了说明，让我们看看故障5测试数据中有多少样本被正确识别。\n\
    \n```python\n# 计算控制限\nimport scipy.stats\nNj = n_rows_train\nk = 2\n\nalpha =\
    \ 0.01 # 99%控制限\nT2_CL = k*(Nj**2-1)*scipy.stats.f.ppf(1-alpha,k,Nj-k)/(Nj*(Nj-k))\n\
    \n# 故障5类别的均值和协方差\nscores_train_lda_Fault5 = scores_train_lda[0:n_rows_train,:]\n\
    cov_scores_train_Fault5 = np.cov(scores_train_lda_Fault5.T)\nmean_scores_train_Fault5\
    \ = np.mean(scores_train_lda_Fault5, axis = 0)\n\n# 获取故障5的TE测试数据\nTEdata_Fault5_test\
    \ = np.loadtxt('d05_te.dat')\nTEdata_Fault5_test = TEdata_Fault5_test[160:,:]\
    \ # 故障操作从样本160开始\n```\n\n```python\nn_rows_test = TEdata_Fault5_test.shape[0]\n\
    xmeas = TEdata_Fault5_test[:,0:22]\nxmv = TEdata_Fault5_test[:,41:52]\ndata_Faulty_test\
    \ = np.hstack((xmeas, xmv))\n```\n\n```python\n# 标准化测试数据并进行转换\nFaultydata_test_scaled\
    \ = scaler.transform(data_Faulty_test)\nscores_test_lda = lda.transform(Faultydata_test_scaled)\n\
    ```\n\n```python\n# 计算故障5类别的测试数据的T2统计量\nT2_test = np.zeros((n_rows_test,))\nfor\
    \ sample in range(n_rows_test):\n    score_sample = scores_test_lda[sample,:]\n\
    \    score_sample_centered = score_sample - mean_scores_train_Fault5\n    T2_test[sample]\
    \ = np.dot(np.dot(score_sample_centered[np.newaxis,:],np.linalg.inv(cov_scores_train_Fault5)),score_sample_centered[np.newaxis,:].T)\n\
    ```\n\n```python\n# 绘制测试预测结果\noutsideCL_flag = T2_test > T2_CL\ninsideCL_flag\
    \ = T2_test <= T2_CL\nplt.figure()\nplt.plot(scores_test_lda[outsideCL_flag,0],\
    \ scores_test_lda[outsideCL_flag,1], 'k.', label='在故障5边界内')\nplt.plot(scores_test_lda[insideCL_flag,0],\
    \ scores_test_lda[insideCL_flag,1], 'b.', label='在故障5边界外')\nplt.xlabel('FD1 (测试数据)')\n\
    plt.ylabel('FD2 (测试数据)')\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_154_0.png)\n\
    \n图6.10：TEP故障5测试样本的分类结果\n\n大约98%的样本被正确识别为属于故障5。如图6.10所示，一些远离均值的样本违反了$T^2_{CL,5}$，因此未被分类为故障5。\n\
    \n> **过程监控术语**\n\n在我们目前的过程监控应用中，我们使用了诸如故障检测、故障诊断和故障分类等术语。然而，您可能还会遇到其他术语，如故障识别、故障隔离。虽然这些术语可能被互换使用，但存在细微差别。故障检测是指确定是否发生异常过程条件的任务。故障识别和故障隔离都指识别表现出异常行为的过程变量的任务。识别这些变量有助于确定故障的根本原因。PCA章节中的“故障诊断”步骤本应称为“故障识别”！\n\

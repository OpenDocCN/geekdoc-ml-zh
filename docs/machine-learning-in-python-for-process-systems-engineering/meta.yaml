    ```\n\n图6.9展示了经过FDA和PCA转换后在2个维度上的样本。FDA能够清晰地分离故障5的样本；然而，它无法分离故障10和19的数据。事实上，第二个判别式（FD2）对判别贡献很小，因此只需要FD1即可分离故障5的样本。为了分离故障10和19，可以探索核FDA方法³²。另一方面，线性PCA无法分离任何类别。\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_152_0.png)\n\n> 虽然FDA是故障诊断的强大工具，但通过将“无故障”或正常工厂运行数据作为一个单独的类别包含进来，它也可以用于故障检测。\n\
    \n³² Hyun-Woo Cho, Nonlinear feature extraction and classification of multivariate\
    \ process data in kernel feature space, Expert Systems with Applications, 2007\n\
    \n## 6.4 基于FDA的田纳西-伊士曼过程故障分类\n\n将样本投影到FDA空间后，可以选择任何分类技术来分类或诊断特定故障。一种流行的基于$T^2$统计量的方法是使用训练数据为每个故障类别计算一个$T^2$控制限。第$j$个故障类别的$T^2$控制限（$T^2_{CL,j}$）代表了低维空间中来自第$j$个故障的投影样本周围的边界——任何落在该边界内的给定样本都属于第$j$个故障类别。数学上，这可以表示为\n\

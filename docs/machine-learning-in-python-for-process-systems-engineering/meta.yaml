    ![](img/ae65e737df4a9f5732c91f7aea579fc8_235_0.png)


    Data density estimation via KDE has other uses as well. Samples in low-density
    regions can be segregated from high density regions and discarded as outliers.
    You can use KDE for the scenario shown in Figure 4.15 for your data pre-processing.
    Additionally, a process monitoring tool can be built using KDE as well by employing
    the logic that a test sample falling in low density regions (as estimated from
    training data) would be an abnormal sample. For all these applications, the procedure
    for building KDE models remains the same.'

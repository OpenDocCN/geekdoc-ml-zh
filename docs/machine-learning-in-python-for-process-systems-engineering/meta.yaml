    \n### 数学背景\n\nPLS同时执行3项工作：\n\n- 捕获$\\boldsymbol{X}$中的最大变异性\n- 捕获$\\boldsymbol{Y}$中的最大变异性\n\
    - 最大化$\\boldsymbol{X}$和$\\boldsymbol{Y}$之间的相关性\n\n为了了解PLS如何实现其目标，再次考虑数据矩阵$\\boldsymbol{X}\
    \ \\in \\mathbb{R}^{N \\times m}$，它由$m$个输入变量的$N$个观测值组成，其中每行代表原始测量空间中的一个数据点。此外，我们还有一个包含$p$（$\\\
    ge 1$）个输出变量的输出数据矩阵$\\boldsymbol{Y} \\in \\mathbb{R}^{N \\times p}$。假设两个矩阵中的每列都归一化为零均值和单位方差。第一个潜在成分得分由下式给出：\n\
    \n$$\\boldsymbol{t}_1 = \\boldsymbol{X}\\boldsymbol{w}_1 \\quad \\text{and} \\\
    quad \\boldsymbol{u}_1 = \\boldsymbol{Y}\\boldsymbol{c}_1$$\n\n向量$\\boldsymbol{w}_1$和$\\\
    boldsymbol{c}_1$称为权重向量，其计算方式使得$\\boldsymbol{t}_1$和$\\boldsymbol{u}_1$之间的协方差最大化。参考协方差的定义，我们可以看到，通过最大化协方差，PLS试图同时满足所有三个目标。\n\
    \n$$Cov(\\boldsymbol{t}_1, \\boldsymbol{u}_1) = Correlation(\\boldsymbol{t}_1,\
    \ \\boldsymbol{u}_1) * \\sqrt{Var(\\boldsymbol{t}_1)} * \\sqrt{Var(\\boldsymbol{u}_1)}$$\n\

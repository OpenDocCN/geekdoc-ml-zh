    \ critic)\n            target_actor = update_target(target_actor, actor)\n\n \
    \       # 为下一步做准备\n        state = next_state\n        if done:\n            break\n\
    \n    rewards.append(episode_reward)\n\n# 保存训练好的模型\nactor.save('actor_saved')\n\
    \n上述脚本完成了通过DDPG算法训练强化学习智能体的实现。正如强化学习训练中常见的那样，即使对于我们的简单水箱系统，超参数调优也被证明是困难的。通常，训练会收敛到一个平凡的强化学习控制器，该控制器会完全打开和关闭阀门以控制液位。图13.8显示了在测试中使用收敛的合理解决方案时强化学习智能体的性能。下面的代码展示了如何设置强化学习测试/部署。\n\
    \n# 使用预设扰动曲线测试强化学习智能体\ndistFlow_fileName = 'disturbance_200.csv'\ndistFlow = np.loadtxt(distFlow_fileName,\
    \ delimiter=',')\nenv = tank_environment(pre_def_dist=True, pre_distFlow=distFlow)\n\
    state = env.reset()\n\nlevel_hist = []\nvalve_opening_hist = []\n\nactor = keras.models.load_model('actor_saved')\n\
    for step in range(n_steps):\n    # 采取行动\n    action = actor.predict(state.reshape(1,-1)).flatten()\n\
    \    next_state, reward, done = env.step_test(action[0], step) # step_test函数与step函数相同，不同之处在于系统对每个动作只模拟一个时间步长\n\
    \n    # 存储\n    valve_opening_hist.append(action[0])\n    level_hist.append(next_state[0]*env.height)\n\
    \n    # 检查终止条件\n    if done:\n        break\n    else:\n        state = next_state\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_329_0.png)\n\n图13.8：水箱液位控制的强化学习控制器评估\n\
    \n如图所示，强化学习智能体能够通过巧妙地调节阀门开度，将液位保持在最有利可图的区域。例如，在110秒左右，当扰动流量急剧增加时，强化学习控制器会进一步打开阀门以保持液位稳定。请记住，强化学习智能体并不知道扰动的大小。它经过训练，仅使用当前液位和液位变化率的信息来做出最优决策。\n\
    \n如前所述，强化学习训练可能会给你带来诸多挑战。然而，你确实有多种补救措施。重新表述你的问题可能是一件值得做的事情。例如，在水箱液位控制问题中，你可以使用$\\\
    Delta f$（阀门开度的变化）作为动作，并将当前的$f$作为另一个状态变量$^{80}$。你也可以以不同的方式设计奖励函数，并对控制器进行大幅度动作移动进行惩罚。可以尝试更新的算法，如TD3、PPO，这些算法试图解决训练稳定性问题。希望你现在对强化学习基础有了足够的理解，能够帮助你适当地判断你的情况并做出明智的决策。\n\
    \n这结束了我们对强化学习世界的快速之旅。正如之前所提到的，强化学习是一个广阔的领域，自DDPG以来已经提出了许多其他算法，并且这些算法正日益流行。本章的阐述将帮助你开始学习强化学习，并思考你可以利用这一强大工具的所有不同方式。与其他机器学习技术不同，强化学习尚未在过程工业中得到广泛应用（由于训练时间长、难以施加过程约束、需要足够的模拟器进行初始离线训练等）。然而，考虑到强化学习领域正在进行的大量研究以及廉价计算资源的日益普及，可以毫不夸张地说，强化学习将在不久的将来在工业过程控制中发挥重要作用。\n\
    \n## 总结\n\n在本章中，我们探讨了强化学习的理论和实践方面。我们详细研究了两种流行的算法，即Q-learning和DDPG。我们开发了一个基于强化学习的控制器来控制水箱中的液位。我们希望强化学习对你来说不再是一个谜。通过本章，我们也到达了机器学习之旅的终点。在这段旅程中，你掌握了几种强大的工具。作为临别赠言，我们只想提醒你“没有免费午餐”定理，该定理指出不存在一种方法能在所有情况下都获得最佳结果。希望你从本书中获得的知识将帮助你为你的问题做出正确（且有根据的）建模选择。祝一切顺利！\n\
    \n$^{80}$ 有时，为了确保状态向量包含所有需要的信息，你可能需要在状态向量中添加一些过去的观测值和动作。这类似于我们之前见过的数据增强。\n\n#\
    \ 第4部分\n\n# 在网络上部署机器学习解决方案\n\n# 第14章\n\n## 过程监控Web应用\n\n你已经完成了所有艰苦的工作，获得了一个满足性能标准的机器学习模型，现在是时候将解决方案/模型交付给最终用户了，这些用户将定期使用模型的结果。但你该如何做呢？如果最终用户是非技术性的（从数据科学角度来看），比如工厂操作员，你不能要求他们拥有自己的Python环境来运行机器学习模型。在这种情况下，通过网络部署是交付机器学习结果的一种良好且常用的解决方案。\n\
    \n对于网络部署，Python提供了多种框架（如Django、Flask、CherryPy）来快速开发从简单到复杂的Web应用。通常，你可能只需要一个快速原型来收集用户反馈。考虑到这一点，我们将向你展示如何从头开始构建一个轻量级的Web应用，并演示这样做是多么容易。具体来说，我们将构建一个过程监控工具，通过网络向工厂操作员提供24\
    \ X 7的故障检测与诊断（FDD）结果。在构建此解决方案的过程中，我们将学习以下主题\n\n- 使用CherryPy的Web服务器部署Python应用\n\
    - 将机器学习模型嵌入Web应用\n- 保存机器学习模型以供后续重用\n- 使用HTML、CSS、Javascript构建前端用户界面"

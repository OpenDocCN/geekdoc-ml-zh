    # Data-mining methods


    The multivariate methods we studied in previous section make an implicit assumption
    about gaussianity or unimodality of data distribution. In real life, it is not
    rare to encounter situations where these assumptions do not hold. One such data
    distribution is shown in Figure 4.15, where 3 distinct clusters of data is present
    with outliers in between them. MD or PCA-based approach will fail here!


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_99_0.png)


    Advanced data-mining methods are employed to handle these complicated situations.
    The methods can be categorized into density-based, clustering-based, and neighbor-based.
    Density-based methods (like KDE) rely on estimation of distribution density of
    the data; observations lying in low-density regions are flagged as outliers. Cluster-based
    methods (like GMM, Kmeans) find distinct clusters of data; samples belonging to
    small-sized or low-importance clusters are flagged as outliers. Neighbor-based
    methods (like KNN, LOF) rely on finding the neighbors of each data-point. Neighboring
    data-points are used to compute any sample''s distance from its k-nearest neighbor
    or the local density; samples with large distances or low densities are flagged
    as outliers.


    We will study most of these techniques in Part 2 of the book. Once you study their
    nuances, you will realize that these are very powerful and useful methods but
    do require careful selection of their intrinsic model parameters such as the number
    of clusters in Kmeans, number of neighbors in LOF, or the kernel function & its
    width in KDE.


    > Time-series or dynamic dataset require different approaches for outlier detection.
    A common practice is to first model the given dataset using an appropriate time-series
    modeling technique such as ARIMA or ARX and compute residuals between model prediction
    and given data. With properly chosen model, residuals will be approximately normally
    distributed and uncorrelated. Then, any traditional outlier detection method can
    be applied on the residuals. The outliers will tend to have large residuals and
    will get flagged.'

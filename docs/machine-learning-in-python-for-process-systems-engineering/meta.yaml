    # # Chapter 5

    Dimension Reduction and Latent Variable Methods (Part 1)


    It is not uncommon to have hundreds of process relevant variables being measured
    at manufacturing facilities. If you are looking to build a machine learning model
    using these process variables, then the high dimensionality (number of model variables)
    will present you several unique challenges related to algorithmic issues (due
    to collinearity among variables), difficulty in visualizing data, large computational
    costs, and slow model training. However, this problem, referred to as the *curse
    of dimensionality*, should not dampen your spirits! Conservation laws such as
    mass balances, thermodynamics constraints, enforced product specifications, and
    other operational restrictions induce correlations among the process variables
    and make it appear as if the measured variables are all derived from a small number
    of hidden (un-measured) variables. Latent variable-based methods reduce process
    dimensionality by finding these hidden latent variables.


    PCA and PLS are among the most popular latent variable-based statistical tools
    and have been used successfully in several process monitoring and soft sensing
    applications. This chapter provides a comprehensive exposition of the PCA and
    PLS techniques and teaches you how to apply them on process data. Specifically,
    the following topics are covered


    +   - Introduction to PCA and PLS

    - Process modeling and monitoring via PCA and PLS

    - Fault diagnosis for root cause analysis

    - Nonlinear and dynamic variants of linear PCA and PLS'
  - '[PAGE 105]


    # 5.1 PCA: An Introduction


    Principal component analysis (PCA) is a multivariate technique that transforms
    a high-dimensional set of correlated variables into a low-dimensional set of uncorrelated
    (latent) variables with minimum loss of information. Consider the 3-dimensional
    data in figure 2.1. It is apparent that although the data is three dimensional,
    the data-points mostly lie along a 2-D plane; and even in this plane, the spread
    is much higher along a particular direction. PCA converts the original (x,y,z)
    space into a 2-D principal component (PC) space where the 1st PC (PC1) corresponds
    to the direction of maximum spread/variance in data and the 2nd PC (PC2) corresponds
    to the direction with highest variance among all directions orthogonal to 1st
    PC. Depending upon modeling requirements, even the 2nd PC may be discarded, essentially
    obtaining a 1-D data while losing out some information. Also, as we will see soon,
    it is straightforward to recover original data from data in PC space.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_105_0.png)


    In ML world, it is common to find application of classification and clustering
    techniques in the PC space. In process industry, process modeling (via principal
    component regression (PCR)) and monitoring are common application of PCA¹⁶. In
    PCR, the process outputs are regressed onto the principal component values of
    the input data. By doing so, the problem of ill-conditioning frequently encountered
    in classical multiple linear regression (MLR) due to high input space dimensionality
    and high degree of correlation among input variables is circumvented. PCA is also
    frequently utilized for process visualization. For many applications, two or three
    PCs are adequate for capturing most of the variability in process data and therefore,
    the compressed process data can be visualized with a single plot. Plant operators
    and engineers use this single plot to find past and current patterns in process
    data.


    > ¹⁶ The popularity of latent-variable techniques for process control and monitoring
    arose from the pioneering work by John McGregor at McMaster University.'
  - '[PAGE 106]


    # Mathematical background


    Consider a data matrix $X \in \mathbb{R}^{N \times m}$ consisting of $N$ samples
    of $m$ input variables where each row represents a data-point in the original
    measurement space. It is assumed that each column is normalized to zero mean and
    unit variance. Let $v \in \mathbb{R}^m$ represent the ''loading'' vector that
    projects data-points along PC1 and can be found by solving the following optimization
    problem


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_106_0.png)


    $$\max_{v \neq 0} \frac{(Xv)^T Xv}{v^T v} \quad \text{eq. 1}$$


    It is apparent that eq. 1 is trying to maximize the variance of the projected
    data-points along PC1. Loading vectors for other PCs are found by solving the
    same problem with the added constraint of orthogonality to previously computed
    loading vectors. Alternatively, loading vectors can also be computed from eigenvalue
    decomposition of covariance matrix ($S$) of $X$


    $$\frac{1}{N-1} X^T X = S = V \Lambda V^T \quad \text{eq. 2}$$


    Above is the form you will find more commonly in PCA literature. The columns of
    eigenvector matrix $V \in \mathbb{R}^{m \times m}$ are the loading vectors that
    we need. The diagonal eigenvalue matrix $\Lambda$ equals $diag[\lambda_1, \lambda_2,
    \dots, \lambda_m]$, where $\lambda_1 \geq \lambda_2 \geq \dots \geq \lambda_m$
    are the eigenvalues. Infact, $\lambda_j$ is equal to the variance along the $j^{th}$
    PC. If there is significant correlation in original data, only the first few eigenvalues
    will be significant. Let''s assume that $k$ PCs are retained, then, the first
    $k$ columns of $V$ (which corresponds to the first $k$ $\lambda_s$) are taken
    to form the loading matrix $P \in \mathbb{R}^{m \times k}$. Transformed data in
    the PC space can now be obtained


    Projected values along $j^{th}$ PC $\longleftarrow$ $$t_j = Xp_j \text{ or } T
    = XP \quad \text{eq. 3}$$


    The m dimensional $i^{th}$ row of $X$ has been transformed into $k$ ($< m$) dimensional
    $i^{th}$ row of $T$. $T \in \mathbb{R}^{N \times k}$ is called score matrix and
    the $j^{th}$ column of $T$ ($t_j$) contains the (score) values along the $j^{th}$
    PC. The scores can be projected back to the original measurement space as follows


    $$\widehat{X} = TP^T \quad \text{eq. 4}$$


    Note that because we discarded the loading vectors corresponding to insignificant
    $\lambda_s$, $\widehat{X} \neq X$. The difference $E = X - \widehat{X}$ is referred
    to as residual matrix as each row is the residual or error vector for a data-point.
    Overall, the PC space captures the systematic trends in process data and the residual
    space primarily describe the noise in data.'
- md: "## Dimensionality reduction for Polymer Manufacturing Process\n\nLet us now\
    \ see the powerful dimensionality reduction capability of PCA in action. We will\
    \ use data from a polymer manufacturing facility. The dataset contains 33 variables\
    \ and 92 hourly samples (Figure 2.2).\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_107_0.png)\n\
    \nFigure 2.2: Process data from a polymer manufacturing plant. Each colored curve\
    \ corresponds to a process variable\n\nFor this dataset, it is reported that the\
    \ process started behaving abnormally around sample 70 and eventually had to be\
    \ shut down. Therefore, we use samples 1 to 69 for training the PCA model using\
    \ the code below. The rest of the data will be utilized for process monitoring\
    \ illustration later.\n\n```python\n# import requisite libraries\nimport numpy\
    \ as np\nimport pandas as pd\nfrom sklearn.preprocessing import StandardScaler\n\
    from sklearn.decomposition import PCA\n\n# fetch data and separate training data\n\
    data = pd.read_excel('proc1a.xls', skiprows = 1, usecols = 'C:AI')\ndata_train\
    \ = data.iloc[0:69,]\n\n# normalize data\nscaler = StandardScaler()\ndata_train_normal\
    \ = scaler.fit_transform(data_train)\n\n# PCA\npca = PCA()\nscore_train = pca.fit_transform(data_train_normal)\n\
    ```\n\nAfter training the PCA model, loading vectors/principal components can\
    \ be accessed from transpose of the components_ attribute of pca model. Note that\
    \ we have not accomplished any dimensionality reduction yet. PCA has simply provided\
    \ us an uncorrelated dataset in score_train. To confirm this, we can compute the\
    \ correlation coefficients among the columns of score_train. Only the diagonal\
    \ values are 1 while the rest of the coefficients are 0!\n\n```python\n# confirm\
    \ no correlation\ncorr_coef = np.corrcoef(score_train, rowvar = False)\n>>> print('Correlation\
    \ matrix: \\n', corr_coef[0:3,0:3]) # printing only a portion\n```\n\nCorrelation\
    \ matrix:\n[[ 1.00000000e+00  8.24652750e-16 -1.88830953e-16]\n [ 8.24652750e-16\
    \  1.00000000e+00  2.36966153e-16]\n [-1.88830953e-16  2.36966153e-16  1.00000000e+00]]\n\
    \nFor dimensionality reduction we will need to study the variance along each PC.\
    \ Note that the sum of variance along the m PCs equals the sum of variance along\
    \ the m original dimensions. Therefore, the variance along each PC is also called\
    \ explained variance. The attribute explained_variance_ratio gives the fraction\
    \ of variance explained by each PC and Figure 2.3 clearly shows that not all 33\
    \ components are needed to capture all the information in data. Most of the information\
    \ is captured in the first few PCs itself.\n\n```python\n# visualize explained\
    \ variance\nimport matplotlib.pyplot as plt\n\nexplained_variance = 100*pca.explained_variance_ratio_\
    \ # in percentage\ncum_explained_variance = np.cumsum(explained_variance) # cumulative\
    \ % variance explained\n\nplt.figure()\nplt.plot(cum_explained_variance, 'r+',\
    \ label = 'cumulative % variance explained')\nplt.plot(explained_variance, 'b+',\
    \ label = 'variance explained by each PC')\nplt.ylabel('Explained variance (in\
    \ %)'), plt.xlabel('Principal component number'), plt.legend()\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_108_0.png)\n\
    \nFigure 2.3: Variance explained by principal components\n\nA popular approach\
    \ for determining the number of PCs to retain is to select the number of PCs that\
    \ cumulatively capture at least 90% (or 95%) of the variance. The captured variance\
    \ threshold should be guided by the expected level of noise or non-systematic\
    \ variation that you do not expect to be captured. Alternative methods include\
    \ cross-validation, scree tests, AIC criterion, etc. However, none of these methods\
    \ are universally best in all the situations.\n\n```python\n# decide # of PCs\
    \ to retain and compute reduced data in PC space\nn_comp = np.argmax(cum_explained_variance\
    \ >= 90) + 1\nscore_train_reduced = score_train[:,0:n_comp]\n\n>>> print('Number\
    \ of PCs cumulatively explaining at least 90% variance: ', n_comp)\n\nNumber of\
    \ PCs cumulatively explaining at least 90% variance: 13\n```\n\nThus, we have\
    \ achieved ~60% reduction in dimensionality (from 33 to 13) by sacrificing just\
    \ 10% of the information. To confirm that only about 10% of the original information\
    \ has been lost, we will reconstruct the original normalized data from the scores.\
    \ Figure 2.4 provides a visual confirmation as well where it is apparent that\
    \ the systematic trends in variables have been reconstructed while noisy fluctuations\
    \ have been removed.\n\n```python\n# confirm that only about 10% of original information\
    \ is lost\nfrom sklearn.metrics import r2_score\n\nV_matrix = pca.components_.T\n\
    P_matrix = V_matrix[:,0:n_comp]\n\ndata_train_normal_reconstruct = np.dot(score_train_reduced,\
    \ P_matrix.T)\nR2_score = r2_score(data_train_normal, data_train_normal_reconstruct)\n\
    \n>>> print('% information lost = ', 100*(1-R2_score))\n\n% information lost =\
    \ 9.0469\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_109_0.png)\n\nThe 90%\
    \ threshold could also have been specified during model training itself through\
    \ the n_components parameter: pca = PCA(n_components = 0.9). In this case the\
    \ insignificant PCs are not computed and the score_train_reduced matrix can be\
    \ computed from the model using the inverse_transform method.\n\n```python\n#\
    \ alternative approach\npca = PCA(n_components = 0.9)\nscore_train_reduced = pca.fit_transform(data_train_normal)\n\
    \ndata_train_normal_reconstruct = pca.inverse_transform(score_train_reduced)\n\
    R2_score = r2_score(data_train_normal, data_train_normal_reconstruct)\n\n>>> print('%\
    \ information lost = ', 100*(1-R2_score))\n\n% information lost = 9.0469\n```\n\
    \n## 5.2 Process Monitoring via PCA for Polymer Manufacturing Process\n\nIn Figure\
    \ 2.2, we saw that it was not easy to infer process abnormality after 69th sample\
    \ by simply looking at the combined time-series plot of all the available variables.\
    \ Individual variable plot may provide better clues, but continuously monitoring\
    \ all the 33 plots of individual variables is not a convenient task.\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_110_0.png)\n\
    \nPCA makes the monitoring task easy by summarizing the state of any complex multivariate\
    \ process into two simple indicators or monitoring indices as shown in Figure\
    \ 2.4. During model training, statistical thresholds are determined for the indices\
    \ and for a new data-point, the new indices' values are compared against the thresholds.\
    \ If any of the two thresholds are violated, then presence of abnormal process\
    \ conditions is confirmed.\n\n### Process monitoring/fault detection indices\n\
    \nHotelling's $T^2$ and SPE (also called Q) statistics are the two monitoring\
    \ indices utilized for process monitoring. Beware the potential confusion between\
    \ the score matrix ($\\mathbf{T}$) and the scalar $T^2$ value. This is the standard\
    \ notation used by the PCA community. Both the statistics are computed for each\
    \ data-point. Let $\\mathbf{t}_i$ denote the $i^{th}$ row of $\\mathbf{T}$ which\
    \ represents the transformed $i^{th}$ data-point in the PC space. The $T^2$ index\
    \ for this data-point is calculated by\n\n$$T^2 = \\sum_{j=1}^k \\frac{t_{i,j}^2}{\\\
    lambda_j} = \\mathbf{t}_i^T \\mathbf{\\Lambda}_k^{-1} \\mathbf{t}_i$$\n\nNote\
    \ that $\\mathbf{\\Lambda}_k = diag\\{\\lambda_1, \\lambda_2, \\dots, \\lambda_k\\\
    }$. It is apparent that $T^2$ is squared Mahalanobis distance or the weighted\
    \ distance of a data-point from the origin in the PC space. If the data follow\
    \ a multivariate normal distribution, the threshold or control limit can be obtained\
    \ using an $F$ distribution\n\n$$T_{CL}^2 = \\frac{k(N^2-1)}{N(N-k)} F_{k,N-k}(\\\
    alpha)$$\n\n$F_{k,N-k}(\\alpha)$ is the $(1-\\alpha)$ percentile of the $F$ distribution\
    \ with $k$ and $n-k$ degrees of freedom. In essence, $T^2 \\leq T_{CL}^2$ represents\
    \ an ellipsoidal boundary around the training data-points in the PC space. The\
    \ second index, Q, represents the distance between the original and reconstructed\
    \ data-point. Let $\\mathbf{e}_i$ denote the $i^{th}$ row of $\\mathbf{E}$. Then\n\
    \n$$Q = \\sum_{j=1}^m e_{i,j}^2$$\n\nAgain, with normality assumption, the control\
    \ limit for Q is given by the following expression\n\n$$Q_{CL} = \\theta_1 \\\
    left( \\frac{z_\\alpha \\sqrt{2\\theta_2 h_0^2}}{\\theta_1} + 1 + \\frac{\\theta_2\
    \ h_0 (1-h_0)}{\\theta_1^2} \\right)^2$$\n\n$$h_0 = 1 - \\frac{2\\theta_1 \\theta_3}{3\\\
    theta_2^2} \\quad \\text{and} \\quad \\theta_r = \\sum_{j=k+1}^m \\lambda_j^r\
    \ \\quad ; r=1,2,3$$\n\n$z_\\alpha$ is the $(1-\\alpha)$ percentile of a standard\
    \ normal distribution. We now have all the information required to generate plots\
    \ of the monitoring indexes, also called the control charts, for training data."
  mdcn: "## 聚合物制造过程的降维\n\n现在，让我们看看PCA强大的降维能力在实际中的应用。我们将使用来自一家聚合物制造工厂的数据。该数据集包含33个变量和92个每小时采样点（图2.2）。\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_107_0.png)\n\n图2.2：来自聚合物制造厂的过程数据。每条彩色曲线对应一个过程变量\n\
    \n据报道，该数据集的过程在大约第70个采样点后开始表现异常，并最终不得不停机。因此，我们使用第1到69个采样点，通过下面的代码来训练PCA模型。剩余的数据将在后续用于过程监控的演示。\n\
    \n```python\n# import requisite libraries\nimport numpy as np\nimport pandas as\
    \ pd\nfrom sklearn.preprocessing import StandardScaler\nfrom sklearn.decomposition\
    \ import PCA\n\n# fetch data and separate training data\ndata = pd.read_excel('proc1a.xls',\
    \ skiprows = 1, usecols = 'C:AI')\ndata_train = data.iloc[0:69,]\n\n# normalize\
    \ data\nscaler = StandardScaler()\ndata_train_normal = scaler.fit_transform(data_train)\n\
    \n# PCA\npca = PCA()\nscore_train = pca.fit_transform(data_train_normal)\n```\n\
    \n训练完PCA模型后，可以从pca模型的components_属性的转置中获取载荷向量/主成分。请注意，我们尚未进行任何降维。PCA只是为我们提供了一个在score_train中的不相关数据集。为了确认这一点，我们可以计算score_train各列之间的相关系数。只有对角线上的值为1，而其余系数均为0！\n\
    \n```python\n# confirm no correlation\ncorr_coef = np.corrcoef(score_train, rowvar\
    \ = False)\n>>> print('Correlation matrix: \\n', corr_coef[0:3,0:3]) # printing\
    \ only a portion\n```\n\nCorrelation matrix:\n[[ 1.00000000e+00  8.24652750e-16\
    \ -1.88830953e-16]\n [ 8.24652750e-16  1.00000000e+00  2.36966153e-16]\n [-1.88830953e-16\
    \  2.36966153e-16  1.00000000e+00]]\n\n为了进行降维，我们需要研究每个主成分方向上的方差。请注意，m个主成分方向上的方差之和等于m个原始维度上的方差之和。因此，每个主成分方向上的方差也被称为解释方差。属性explained_variance_ratio给出了每个主成分解释的方差比例，图2.3清楚地表明，并不需要全部33个主成分来捕获数据中的所有信息。大部分信息在前几个主成分中就已经被捕获了。\n\
    \n```python\n# visualize explained variance\nimport matplotlib.pyplot as plt\n\
    \nexplained_variance = 100*pca.explained_variance_ratio_ # in percentage\ncum_explained_variance\
    \ = np.cumsum(explained_variance) # cumulative % variance explained\n\nplt.figure()\n\
    plt.plot(cum_explained_variance, 'r+', label = 'cumulative % variance explained')\n\
    plt.plot(explained_variance, 'b+', label = 'variance explained by each PC')\n\
    plt.ylabel('Explained variance (in %)'), plt.xlabel('Principal component number'),\
    \ plt.legend()\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_108_0.png)\n\n\
    图2.3：主成分解释的方差\n\n确定保留主成分数量的一个常用方法是选择能够累积捕获至少90%（或95%）方差的主成分数量。捕获的方差阈值应根据预期的噪声水平或你期望不被捕获的非系统性变化来指导。其他方法包括交叉验证、碎石检验、AIC准则等。然而，这些方法中没有一种在所有情况下都是普遍最佳的。\n\
    \n```python\n# decide # of PCs to retain and compute reduced data in PC space\n\

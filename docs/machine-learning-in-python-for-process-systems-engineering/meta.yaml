    ![](img/ae65e737df4a9f5732c91f7aea579fc8_128_0.png)


    # Fault detection indices


    For PLS, 3 monitoring indices are computed: one $T^2$ statistic from t-scores,
    and two SPE statistics from **X** and **Y** residuals. Like in PCA, $T^2$ statistic
    quantifies the systematic variations in predictor variables (**X**) that are related
    to the systematic variations in response (**Y**) variables. Large deviation in
    $T^2$ statistic implies significant changes in process operating conditions. Let
    $t_i$ denote the $i^{th}$ row of **T**. The $T^2$ index for this data-point is
    given by


    $$T^2 = \sum_{j=1}^{k} \frac{t_{ij}^2}{\sigma_j^2} = t_i^T \Lambda_k^{-1} t_i$$'
- md: "## 5.7 Variants of Classical PLS\n\nVariants of classical PLS have been devised\
    \ to deal with dynamic and non-linear systems. For dynamic systems, past values\
    \ of process inputs affect current values of outputs and therefore including past\
    \ measurements improve predictive accuracy<sup>24</sup>. For dynamic PLS, an augmented\
    \ input data matrix is built (using the same procedure as that for dynamic PCA)\
    \ using lagged values of only input variables or both input and output variables.\
    \ Using only lagged inputs leads to a FIR (finite impulse response) model while\
    \ using both lagged inputs and outputs leads to an ARX (autoregressive with exogenous\
    \ variables) model. The value of lag period can be determined using cross-validation\
    \ or time-constant of the process.\n\nFor nonlinear systems, kernel PLS is an\
    \ efficient method for soft sensing quality variables. Using kernel function,\
    \ the input variables are implicitly mapped onto a high-dimensional feature space\
    \ where data behaves more linearly. Linear PLS model is then built between the\
    \ feature variables and output variables. The reader is encouraged to see the\
    \ work of Zhang et al.<sup>25</sup> for details on kernel PLS-based soft sensing.\n\
    \n## Model maintenance for time-varying process\n\nModel fidelity degrades over\
    \ time due to changes in process correlations because of aging equipment or changing\
    \ process conditions. Therefore, it becomes crucial to regularly update PCA/PLS\
    \ models. There are two broad techniques of model adaptation: recursive update<sup>++</sup>\
    \ and moving window update<sup>**</sup>. In moving-window approach, existing model\
    \ is discarded, and a completely new process model is built by replacing oldest\
    \ data with new data. In recursive approach, the existing model is not discarded,\
    \ rather a new model is built by updating existing model with new data.\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_132_0.png)\n\
    \nFigure 2.21: Model-maintenance schemes\n\n<sup>24</sup> Kano et al., Inferential\
    \ control system of distillation compositions using dynamic partial least squares\
    \ regression, Journal of Process Control, 2000\n<sup>25</sup> Zhang et al., Nonlinear\
    \ multivariate quality estimation and prediction based on kernel partial least\
    \ squares, Industrial Engineering & Chemistry Research, 2008\n<sup>++</sup> Li\
    \ et al., Recursive PCA for adaptive process monitoring, Journal of Process Control,\
    \ 2000\n<sup>++</sup> S. Joe Qin, Recursive PLS algorithms for adaptive data modeling,\
    \ Computers & Chemical Engineering, 1998\n<sup>**</sup> Wang et al., Process monitoring\
    \ approach using fast moving window PCA\n\n## Summary\n\nWith this chapter we\
    \ have reached a significant milestone in our ML journey. You have seen how hidden\
    \ process knowledge can be conveniently extracted from process data and converted\
    \ into process insights. With PCA and PLS tools in your arsenal you are now well-equipped\
    \ to tackle most of the process modeling and monitoring related problems. However,\
    \ our journey does not end here. In the next chapter, we will study a few more\
    \ latent-variable-based techniques that are equally powerful.\n\n# Chapter 6\n\
    ## Dimension Reduction and Latent Variable Methods (Part 2)\n\nBy now you must\
    \ be very impressed with the powerful capabilities of PCA and PLS techniques.\
    \ These methods allowed us to extract uncorrelated latent variables which maximized\
    \ the captured variances. However, you may ask, “Are these the best dimensionality\
    \ reduction techniques to use for all problems?”. We are glad that you asked!\
    \ Other powerful methods do exist which may provide better performance. For example,\
    \ Independent component analysis (ICA) can provide latent variables with stricter\
    \ property of statistical independence rather than only uncorrelatedness. Independent\
    \ components may be able to characterize the process data better than principal\
    \ components and thus may result in better monitoring performance. If you are\
    \ reducing dimensionality with the end goal of classifying process faults into\
    \ different categories for fault diagnosis, then, maximal separation between data\
    \ from different classes of faults would be your primary concern rather than maximal\
    \ capture of data variance. Fisher discriminant analysis (FDA) would be better\
    \ suited for this task.\n\nIn this chapter, we will learn in detail the properties\
    \ of ICA and FDA. We will apply these methods for process monitoring and fault\
    \ classification for a large-scale chemical plant. Specifically, the following\
    \ topics are covered\n\n- Introduction to ICA\n- Process monitoring of non-gaussian\
    \ processes\n- Introduction to FDA\n- Fault classification for large scale processes\n\
    \n$\\boldsymbol{\\Lambda}_k$, a diagonal matrix, is the covariance matrix of $\\\
    boldsymbol{T}$ with $\\sigma_j$ (variance of $j^{th}$ component scores) as its\
    \ diagonal elements. $T_{CL}^2$ is again obtained by the following expression\n\
    \n$$T_{CL}^2 = \\frac{k(N^2-1)}{N(N-k)} F_{k,N-k}(\\alpha)$$\n\nThe second and\
    \ third indices, $SPE_x$ and $SPE_y$, represents the residuals or the unmodelled\
    \ part of $\\boldsymbol{X}$ and $\\boldsymbol{Y}$, respectively. Let $\\boldsymbol{e}_i$\
    \ and $\\boldsymbol{f}_i$ denote the $i^{th}$ row of $\\boldsymbol{E}$ and $\\\
    boldsymbol{F}$, respectively. Then\n\n$$SPE_x = \\sum_{j=1}^{m} e_{i,j}^2$$\n\
    $$SPE_y = \\sum_{j=1}^{p} f_{i,j}^2$$\n\nNote that if output measurements are\
    \ not available in real-time then $SPE_y$ is not calculated. With normality assumption\
    \ for the residuals, the control limit for SPE statistic is given by the following\
    \ expression\n\n$$SPE_{CL} = g\\chi_{\\alpha}^2(h)$$\n$$h = \\frac{2\\mu^2}{\\\
    sigma}, \\quad g = \\frac{\\sigma}{2\\mu}$$\n\n$\\chi_{\\alpha}^2$ is the $(1-\\\
    alpha)$ percentile of a chi-squared distribution$^{23}$ with $h$ degrees of freedom;\
    \ $\\mu$ denotes the mean value and $\\sigma$ denotes the variance of the SPE\
    \ statistic. Note that this expression could be used for PCA SPE statistic as\
    \ well.\n\n```python\n# monitoring indices for training data\n# T2\nT_cov = np.cov(Tscores.T)\n\
    T_cov_inv = np.linalg.inv(T_cov)\n\nT2_train = np.zeros((data_train_normal.shape[0],))\n\
    for i in range(data_train_normal.shape[0]):\n    T2_train[i] = np.dot(np.dot(Tscores[i,:],T_cov_inv),Tscores[i,:].T)\n\
    \n# SPEx\nx_error_train = X_train_normal - X_train_normal_reconstruct\nSPEx_train\
    \ = np.sum(x_error_train*x_error_train, axis = 1)\n\n# SPEy\ny_error_train = Y_train_normal\
    \ - pls.predict(X_train_normal)\nSPEy_train = np.sum(y_error_train*y_error_train,\
    \ axis = 1)\n\n# control limits\n#T2\nimport scipy.stats\nN = data_train_normal.shape[0]\n\
    k = 3\n\nalpha = 0.01 # 99% control limit\nT2_CL = k*(N**2-1)*scipy.stats.f.ppf(1-alpha,k,N-k)/(N*(N-k))\n\
    \n# SPEx\nmean_SPEx_train = np.mean(SPEx_train)\nvar_SPEx_train = np.var(SPEx_train)\n\
    \ng = var_SPEx_train/(2*mean_SPEx_train)\nh = 2*mean_SPEx_train**2/var_SPEx_train\n\
    SPEx_CL = g*scipy.stats.chi2.ppf(1-alpha, h)\n\n# SPEy\nmean_SPEy_train = np.mean(SPEy_train)\n\
    var_SPEy_train = np.var(SPEy_train)\n\ng = var_SPEy_train/(2*mean_SPEy_train)\n\
    h = 2*mean_SPEy_train**2/var_SPEy_train\nSPEy_CL = g*scipy.stats.chi2.ppf(1-alpha,\
    \ h)\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_130_0.png)\n\n## Fault detection\
    \ on test data\n\nLet's see now if our monitoring statistics can detect the presence\
    \ of process abnormality towards the end of the data samples. We will consider\
    \ the whole dataset as test data for ease of comparison. Monitoring charts clearly\
    \ indicates that the process has encountered severe abnormality at the end of\
    \ the sampling period. Significantly high SPE_x indicates that the abnormality\
    \ has significantly affected input variable correlations.\n\n```python\n# get\
    \ test data, normalize it\ndata_normal = scaler.transform(data)\nX_normal = data_normal[:,:-5]\n\
    Y_normal = data_normal[:,-5:]\n\n# get model predictions\nTscores_test = pls.transform(X_normal)\n\
    X_normal_reconstruct = np.dot(Tscores_test, pls.x_loadings_.T)\nY_normal_pred\
    \ = pls.predict(X_normal)\n\n# compute monitoring statistics\nT2_test = np.zeros((data_normal.shape[0],))\n\
    for i in range(data_normal.shape[0]):\n    T2_test[i] = np.dot(np.dot(Tscores_test[i,:],T_cov_inv),Tscores_test[i,:].T)\n\
    \nx_error_test = X_normal - X_normal_reconstruct\nSPEX_test = np.sum(x_error_test*x_error_test,\
    \ axis = 1)\n\ny_error_test = Y_normal - pls.predict(X_normal)\nSPEy_test = np.sum(y_error_test*y_error_test,\
    \ axis = 1)\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_131_0.png)"
  mdcn: "## 5.7 经典PLS的变体\n\n经典PLS的变体已被设计用于处理动态和非线性系统。对于动态系统，过程输入的历史值会影响输出的当前值，因此包含历史测量值可以提高预测精度<sup>24</sup>。对于动态PLS，会构建一个增广输入数据矩阵（使用与动态PCA相同的程序），该矩阵仅使用输入变量的滞后值，或同时使用输入和输出变量的滞后值。仅使用滞后输入会导致FIR（有限脉冲响应）模型，而同时使用滞后输入和输出则会导致ARX（带外生变量的自回归）模型。滞后周期的值可以通过交叉验证或过程的时间常数来确定。\n\
    \n对于非线性系统，核PLS是软测量质量变量的有效方法。使用核函数，输入变量被隐式映射到一个高维特征空间，在该空间中数据表现得更具线性。然后在特征变量和输出变量之间建立线性PLS模型。鼓励读者参阅Zhang等人的工作<sup>25</sup>以了解基于核PLS的软测量的详细信息。\n\
    \n## 时变过程的模型维护\n\n由于设备老化或过程条件变化导致过程相关性改变，模型保真度会随时间下降。因此，定期更新PCA/PLS模型变得至关重要。模型自适应有两种主要技术：递归更新<sup>++</sup>和滑动窗口更新<sup>**</sup>。在滑动窗口方法中，现有模型被丢弃，并通过用新数据替换最旧的数据来构建一个全新的过程模型。在递归方法中，现有模型不被丢弃，而是通过用新数据更新现有模型来构建新模型。\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_132_0.png)\n\n图2.21：模型维护方案\n\n<sup>24</sup>\
    \ Kano等人，使用动态偏最小二乘回归的蒸馏组成推断控制系统，过程控制杂志，2000年\n<sup>25</sup> Zhang等人，基于核偏最小二乘的非线性多元质量估计与预测，工业与工程化学研究，2008年\n\
    <sup>++</sup> Li等人，用于自适应过程监控的递归PCA，过程控制杂志，2000年\n<sup>++</sup> S. Joe Qin，用于自适应数据建模的递归PLS算法，计算机与化学工程，1998年\n\
    <sup>**</sup> Wang等人，使用快速滑动窗口PCA的过程监控方法\n\n## 总结\n\n通过本章，我们在机器学习之旅中达到了一个重要的里程碑。你已经了解了如何从过程数据中便捷地提取隐藏的过程知识，并将其转化为过程洞察。掌握了PCA和PLS工具，你现在已具备充分的能力来解决大多数与过程建模和监控相关的问题。然而，我们的旅程并未在此结束。在下一章中，我们将研究更多同样强大的基于潜变量的技术。\n\
    \n# 第6章\n## 降维与潜变量方法（第二部分）\n\n至此，你一定对PCA和PLS技术的强大能力印象深刻。这些方法使我们能够提取不相关的潜变量，从而最大化捕获的方差。然而，你可能会问，“这些是适用于所有问题的最佳降维技术吗？”。我们很高兴你提出这个问题！确实存在其他可能提供更好性能的强大方法。例如，独立成分分析（ICA）可以提供具有更严格统计独立性（而不仅仅是不相关性）的潜变量。独立成分可能比主成分更好地表征过程数据，从而可能带来更好的监控性能。如果你降维的最终目标是将过程故障分类到不同类别以进行故障诊断，那么，不同类别故障数据之间的最大分离将是你的主要关注点，而不是最大化数据方差的捕获。费舍尔判别分析（FDA）将更适合这项任务。\n\
    \n在本章中，我们将详细学习ICA和FDA的特性。我们将把这些方法应用于大规模化工厂的过程监控和故障分类。具体涵盖以下主题\n\n- ICA简介\n- 非高斯过程的过程监控\n\
    - FDA简介\n- 大规模过程的故障分类\n\n$\\boldsymbol{\\Lambda}_k$ 是一个对角矩阵，是 $\\boldsymbol{T}$\
    \ 的协方差矩阵，其对角线元素为 $\\sigma_j$（第 $j$ 个成分得分的方差）。$T_{CL}^2$ 再次通过以下表达式获得\n\n$$T_{CL}^2\
    \ = \\frac{k(N^2-1)}{N(N-k)} F_{k,N-k}(\\alpha)$$\n\n第二和第三个指标，$SPE_x$ 和 $SPE_y$，分别表示\
    \ $\\boldsymbol{X}$ 和 $\\boldsymbol{Y}$ 的残差或未建模部分。令 $\\boldsymbol{e}_i$ 和 $\\\
    boldsymbol{f}_i$ 分别表示 $\\boldsymbol{E}$ 和 $\\boldsymbol{F}$ 的第 $i$ 行。则\n\n$$SPE_x\
    \ = \\sum_{j=1}^{m} e_{i,j}^2$$\n$$SPE_y = \\sum_{j=1}^{p} f_{i,j}^2$$\n\n注意，如果输出测量值无法实时获得，则不计算\
    \ $SPE_y$。在残差服从正态分布的假设下，SPE统计量的控制限由以下表达式给出\n\n$$SPE_{CL} = g\\chi_{\\alpha}^2(h)$$\n\
    $$h = \\frac{2\\mu^2}{\\sigma}, \\quad g = \\frac{\\sigma}{2\\mu}$$\n\n$\\chi_{\\\
    alpha}^2$ 是自由度为 $h$ 的卡方分布$^{23}$的 $(1-\\alpha)$ 分位数；$\\mu$ 表示SPE统计量的均值，$\\sigma$\
    \ 表示其方差。注意，此表达式也可用于PCA的SPE统计量。\n\n```python\n# monitoring indices for training\
    \ data\n# T2\nT_cov = np.cov(Tscores.T)\nT_cov_inv = np.linalg.inv(T_cov)\n\n\
    T2_train = np.zeros((data_train_normal.shape[0],))\nfor i in range(data_train_normal.shape[0]):\n\
    \    T2_train[i] = np.dot(np.dot(Tscores[i,:],T_cov_inv),Tscores[i,:].T)\n\n#\
    \ SPEx\nx_error_train = X_train_normal - X_train_normal_reconstruct\nSPEx_train\
    \ = np.sum(x_error_train*x_error_train, axis = 1)\n\n# SPEy\ny_error_train = Y_train_normal\
    \ - pls.predict(X_train_normal)\nSPEy_train = np.sum(y_error_train*y_error_train,\
    \ axis = 1)\n\n# control limits\n#T2\nimport scipy.stats\nN = data_train_normal.shape[0]\n\
    k = 3\n\nalpha = 0.01 # 99% control limit\nT2_CL = k*(N**2-1)*scipy.stats.f.ppf(1-alpha,k,N-k)/(N*(N-k))\n\
    \n# SPEx\nmean_SPEx_train = np.mean(SPEx_train)\nvar_SPEx_train = np.var(SPEx_train)\n\
    \ng = var_SPEx_train/(2*mean_SPEx_train)\nh = 2*mean_SPEx_train**2/var_SPEx_train\n\
    SPEx_CL = g*scipy.stats.chi2.ppf(1-alpha, h)\n\n# SPEy\nmean_SPEy_train = np.mean(SPEy_train)\n\
    var_SPEy_train = np.var(SPEy_train)\n\ng = var_SPEy_train/(2*mean_SPEy_train)\n\
    h = 2*mean_SPEy_train**2/var_SPEy_train\nSPEy_CL = g*scipy.stats.chi2.ppf(1-alpha,\
    \ h)\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_130_0.png)\n\n## 测试数据上的故障检测\n\
    \n现在让我们看看我们的监控统计量是否能检测到数据样本末尾出现的过程异常。为了便于比较，我们将整个数据集视为测试数据。监控图清楚地表明，过程在采样期结束时遇到了严重的异常。显著偏高的\
    \ SPE_x 表明异常已显著影响了输入变量的相关性。\n\n```python\n# get test data, normalize it\ndata_normal\
    \ = scaler.transform(data)\nX_normal = data_normal[:,:-5]\nY_normal = data_normal[:,-5:]\n\
    \n# get model predictions\nTscores_test = pls.transform(X_normal)\nX_normal_reconstruct\
    \ = np.dot(Tscores_test, pls.x_loadings_.T)\nY_normal_pred = pls.predict(X_normal)\n\
    \n# compute monitoring statistics\nT2_test = np.zeros((data_normal.shape[0],))\n\
    for i in range(data_normal.shape[0]):\n    T2_test[i] = np.dot(np.dot(Tscores_test[i,:],T_cov_inv),Tscores_test[i,:].T)\n\
    \nx_error_test = X_normal - X_normal_reconstruct\nSPEX_test = np.sum(x_error_test*x_error_test,\
    \ axis = 1)\n\ny_error_test = Y_normal - pls.predict(X_normal)\nSPEy_test = np.sum(y_error_test*y_error_test,\
    \ axis = 1)\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_131_0.png)"

- img_proc: true
  md: '# Mathematical background


    Consider data matrix $X \in \mathbb{R}^{m \times N}$ consisting of $N$ observations
    of $m$ input variables where each column represents a data-point in the original
    measurement space. Note that in contrast to PCA, transposed form of data matrix
    is employed here. In ICA, it is assumed that measured variables are a linear combination
    of $d (\le m)$ independent components $s_1, s_2, \dots, s_d$.


    $$X = AS$$


    where $S \in \mathbb{R}^{d \times N}$ and $A \in \mathbb{R}^{m \times d}$ is called
    the mixing matrix. The objective of ICA is to estimate the unknown matrices $A$
    and $S$ from the measured data $X$. This is accomplished by finding a demixing
    matrix, $W$, such that the ICs or the rows of estimated matrix ($\widehat{S}$)
    become as independent as possible.


    $$\widehat{S} = WX$$


    Before estimating $W$, the initial step in ICA involves removing correlations
    between the variables in the data matrix $X$. The step, called as whitening or
    spherering, is accomplished via PCA.


    $$Z = QX$$


    where $Q \in R^{d \times d}$ is called whitening matrix. Whitening makes the rows
    of $Z$ uncorrelated. To see how it helps, let $B = QA$ and consider the following
    relationships ,


    $$Z = QX = QAS = BS$$


    Therefore, whitening converts the problem of finding matrix $A$ into that of finding
    matrix $B$. The advantage lies in the fact that $B$ is an orthogonal matrix -
    can be shown considering that whitened variables are uncorrelated and ICs are
    independent - and hence fewer parameters need to be estimated. Using orthogonality
    property, the following relationship results,


    $$S = B^T Z = B^T QX$$

    $$\Rightarrow W = B^T Q$$


    Therefore, once $B$ is found, $W$ can be generated. Matrix $B$ is estimated by
    maximizing the non-gaussianity of the estimated IC values, i.e., each row of $S$
    ($s_i$) should be maximally away from a gaussian distribution. Using Central Limit
    Theorem, it can be shown that maximizing non-gaussianity results in independent
    components$^{26}$ that we need.


    The above procedure summarizes the steps involved in ICA. Note that the sets $\{A/n,
    S/n\}$ and $\{A, S\}$ result in the same measured data matrix $X$ for any scalar
    $n$, and therefore the sign and magnitude of the original ICs cannot be uniquely
    estimated. This however does not affect'

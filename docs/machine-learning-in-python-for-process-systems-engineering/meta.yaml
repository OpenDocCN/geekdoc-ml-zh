  md: '# # Chapter 3

    Machine Learning Model Development:

    Workflow and Best Practices


    A model is the most crucial part of a machine learning-based solution as it encapsulates
    the relationships among process variables extracted from data. A universally accepted
    completely automated ML tool that can generate good models for all kinds of problems
    is not yet available. ML model development is still an art and it takes an artist
    to create a good model! While it is true that we don''t necessarily need to know
    the algorithmic implementation details of the models, there are several model
    development stages which require our active participation. You cannot obtain a
    good model by just dumping raw data into a model training module. You need to
    ensure that you are providing right data for model training, using correct performance
    assessment metric, properly assessing if model is overfitting or underfitting,
    and fine-tuning the model properly if needed


    There are several established best practices that have been devised to help simplify
    a modeler''s task. You can use these as guidance as you go about developing your
    ML model. In this chapter we will study these best practices and learn what it
    takes to obtain a good model (as well as how to quantify the ''goodness'' of a
    model!). This knowledge will help us when we start working with different models
    in the next parts of the book. Specifically, the following topics are covered


    +   - Transforming raw process data to obtain better model training dataset

    - Overview of performance metrics and best practices for reporting model performance

    - Diagnosis of overfitting and underfitting using validation curves

    - Tackling overfitting via regularization

    - Best practices for model fine-tuning and hyperparameter optimization'
  merge: -1
  pgno: 53
- img_proc: true
  md: '# 3.1 ML Model Development Workflow


    The prime objective of the ML modeling task is to obtain a model that generalizes
    well, which means that the model performs satisfactorily when supplied with data
    different from that used during model training. Achieving this takes more than
    just executing a ‘model = <some ML_model>.fit()’ command on the available data.
    In chapter 1, we had a brief introduction to ML modeling workflow. In this chapter,
    we will learn about the different components of that workflow in more details.
    Figure 3.1 lists the common tasks you can expect yourself to carry out while building
    a ML model. While separate books can be written on each of these tasks, we will
    cover enough details on each of these to get you started on your ML journey.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_54_0.png)


    As you can see, there are four main steps in the workflow. In the first step,
    the available raw data are pre-processed to ensure ‘correct’ dataset is supplied
    to the subsequent model fitting step. This step can involve data cleaning (discarding
    irrelevant variables or corrupted/incomplete data samples) and data transformation
    (generating new features or modifying existing ones). While we will study data-transformation
    techniques in this chapter, data selection techniques are treated extensively
    in the next chapter. The next step of the workflow involves selection of a suitable
    model and estimating its parameters. While parameter estimation is handled by
    off-the-shelf model libraries available in sklearn, model selection would require
    your judgement based on your expert knowledge of the specific process system.
    A practical guideline for model selection is Occam’s razor which advices selection
    of simplest model that generalizes well. After training, the model is evaluated
    to validate the modeling assumptions and assess model’s generalization power.
    Model evaluation step often provides good hint about which part of the model (or
    hyperparameters) to tweak, which leads to the last step of model tuning. Specialized
    techniques are available to assist model tuning. With this broad overview of the
    workflow, let’s now start learning about these techniques in detail.'
  merge: -1
  pgno: 54
- img_proc: true
  md: "# 3.2 Data Pre-processing: Data Transformation\n\nProcess data are seldom available\
    \ in ‘ready-to-model’ format. The raw dataset may contain highly correlated variables\
    \ or may have variables with very different value ranges. These data characteristics\
    \ tend to negatively influence model training, and therefore, warrant data transformation\
    \ to de-correlate or properly scale data. Sometimes, creating new features¹⁰ out\
    \ of provided variables can help to improve model accuracy. Overall, the aim of\
    \ this pre-processing step is to transform given variables such that model training\
    \ and model accuracy improves. Let’s look at some commonly employed transformation\
    \ techniques.\n\n# Data centering & scaling\n\nIn process dataset, it is common\
    \ to find variables with very different order and spread of values. For example,\
    \ you may have a temperature variable that varies between 1000°C to 1500°C, a\
    \ concentration variable varying between 0.01M to 0.1M, and another temperature\
    \ variable that goes from 300°C to 350°C. While the order and spread of these\
    \ three variables are quite different, they may exert similar influence on the\
    \ model output. However, unscaled dataset can result in one variable being given\
    \ more importance than the other or slow model training. Centering and scaling\
    \ transform variables to bring them on an equal basis! While some algorithms like\
    \ PCA necessarily require centered data, as a best practice, you should always\
    \ center and scale your dataset unless you have strong reason against it.\n\n\
    The most common technique is standard scaling or standardization, where each variable\
    \ (in training dataset) is transformed to 0 mean and standard deviation of 1.\
    \ Within an ML script, you will transform the test data using the computed mean\
    \ and standard deviation of the training dataset. The illustration below shows\
    \ how sklearn facilitates standardization\n\n```\n# import library, fit, and transform\n\
    import numpy as np\nfrom sklearn.preprocessing import StandardScaler\n\nX = np.array([[\
    \ 1000, 0.01, 300],\n              [ 1200, 0.06, 350],\n              [ 1500,\
    \ 0.1, 320]])\n\nscaler = StandardScaler().fit(X) # compute mean & std column-wise\n\
    X_scaled = scaler.transform(X) # transform using computed mean and std\n```\n\n\
    ![](img/ae65e737df4a9f5732c91f7aea579fc8_55_0.png)\n\n¹⁰ Feature and (independent)\
    \ variable mean the same thing. While in ML literature, ‘feature’ is used to denote\
    \ variables which go into predicting outputs, the term ‘independent variable’\
    \ is commonly used for this in statistics."
  merge: -1
  pgno: 55
- img_proc: true
  md: "# Using sklearn library classes\n\n> In (object-oriented) computer programming\
    \ parlance, in the above code, we created an object/instance (scaler) of StandardScaler\
    \ class¹¹ and set its attributes, mean_ and var_, by calling the fit() method.\
    \ They can be accessed as scaler.mean_ and scaler.var_. The fitted object (scaler)\
    \ was then used to scale X by calling the object's transform method. This is the\
    \ general pattern we will use with Sklearn's classes: objects will be initialized,\
    \ properties fitted, and methods called.\n\nAnother popular technique is min-max\
    \ scaling, also referred to as normalization. Here, each variable is transformed\
    \ to a common range of values (typically 0 to 1). For 0 to 1 normalization, each\
    \ variable is subtracted by its minimum value and then divided by its range. This\
    \ is accomplished in Sklearn as follows\n\n```\n# import library, fit, and transform\n\
    import numpy as np\nfrom sklearn.preprocessing import MinMaxScaler\n\nX = np.array([[\
    \ 1000, 0.01, 300],\n              [ 1200, 0.06, 350],\n              [ 1500,\
    \ 0.1, 320]])\nscaler = MinMaxScaler () # create object\nX_scaled = scaler.fit_transform(X)\
    \ # fit & transform\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_56_0.png)\n\
    \nAlthough standard scaling is often the default choice, there is no straight-forward\
    \ answer to which scaling method is better. Either of the methods will usually\
    \ work fine. Standard scaling is preferred if variables are gaussian distributed\
    \ or there are (a few) extreme outliers which can skew the ‘min’ and ‘range’ estimates\
    \ during normalization.\n\n# Robust centering & scaling\n\nIf your dataset has\
    \ a lot of outliers, then both the aforementioned methods will result in improper\
    \ scaling. For example, in Figure 3.2, we can see that standard scaling isn’t\
    \ able to center the ‘normal’ data around 0 due to the presence of outliers. In\
    \ such situations, robust MAD scaling should be employed, where, instead of mean\
    \ and standard deviation, their robust counterparts, median and MAD (median absolute\
    \ deviation from the median), are used. Mathematically, MAD scaling for any variable\
    \ x takes the following form"
  merge: -1
  pgno: 56
- img_proc: true
  md: '$$x_{MAD\ scaling} = \frac{x - median(x)}{MAD(x)}$$


    Figure 3.2 shows that under MAD scaling, normal data does get centered around
    zero!


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_57_0.png)


    Figure 3.2: Application of standard and robust MAD scaling on data contaminated
    with outliers. Solid red line denoted the preferred centered location of 0. Complete
    code for generating these plots is available in online code repository.


    Sklearn provides a RobustScaler class for robust scaling which is similar to MAD
    scaling, except that it uses interquartile range (IQR) instead of MAD as a robust
    estimator of data spread. Similar results can be expected with either of these
    robust scaling methods.


    # Feature extraction


    Process systems have a lot of measurements which leads to increased data analysis
    complexity. However, you will often find that the original variable set can be
    reduced in dimensionality by extracting features which are combination of original
    variables and contain the same amount of information as the original variable
    set. This is a consequence of strong correlation among process variables.


    Consider Figure 2 for example. Here, the three original variables (**x**, **y**,
    **z**) exhibit strong linear relationship to the extent that it is possible to
    transform (as shown) the 3D measurement space into a 2D (or even 1D) feature space
    while retaining most of the information about data variability. Accomplishing
    this in Sklearn is as simple as writing the following code


    ```

    features = PCA(1).fit_transform(X_scaled) # extracting only 1 feature from scaled
    measurements

    ```


    After feature extraction, rest of the analysis/model building is carried out using
    the extracted features. Specific techniques are available to decide optimal number
    of extractable features'

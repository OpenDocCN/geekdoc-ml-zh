    > The increasing popularity of machine learning does not mean domain knowledge
    is redundant. Domain expertise often helps to decide which ML algorithm to use
    and proper infusion of domain knowledge into ML methodology can sometimes increase
    model accuracy considerably.


    “Why don’t we just build a model using first-principles and get very accurate
    models? Why rely on data?” This is a valid question. There is no doubt that fundamental
    models have better accuracy and generalization capability, however, developing
    fundamental models are often time consuming and require expert resources. These
    models can sometimes be too complex to execute in real-time. Adopting ML methodology
    can help getting around these difficulties.


    # Machine learning workflow


    Figure 1.4 shows the typical tasks involved in a machine learning project. The
    tasks are categorized into offline computations and online/real-time computations.
    In online computations, process data are parsed through the process model to provide
    real-time insights and results. Note that the models could be process input-output
    models, process monitoring models (process normal/abnormal classification), mode
    categorization models, or fault classification models.


    The models are built offline using historical process data. This offline exercise
    is performed once or repeated at regular intervals for model update. Brief description
    of the essential steps performed are provided below:


    +   - *Sample and variable selection*: One does not simply dump all the available
    historical data and sensor measurements into model training module. Only the portion
    of historical data that best represent the current process behavior or the behavior
    of interest is utilized. For process systems, it is common to use data over the
    past couple of years as training data. If steady-state models are being build,
    then data from steady-state operation periods are used.


    Input variable selection warrants judicious consideration as well. While including
    too many model inputs leads to overfitting and high computational complexity,
    leaving out important variables leads to underfitting. The basic principle is
    to include only those inputs that are known to influence the model outputs. Specific
    algorithms for variable selection are covered in Chapter 4.'

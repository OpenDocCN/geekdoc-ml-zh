  md: 'The agent''s job is to take actions that maximize the cumulative reward (also
    called return) over the course of the task. The return can be represented as $R_t
    = \sum_{k=1}^{T-t} r_{t+k}$. However, this direct summation can cause trouble
    for tasks which don''t have a definite end state. The level control task is one
    such example where $T=\infty$ (because the task is to control the level forever!).
    To keep $R_t$ bounded, the following formulation is used instead


    $$R_t = r_{t+1} + \gamma r_{t+2} + \gamma^2 r_{t+3} + \dots + \gamma^{T-t-1} r_T
    = \sum_{k=1}^{T-t} \gamma^{k-1} r_{t+k}$$


    *eq. 1*


    The return in Eq. (1) is called discounted return and $\gamma \in (0, 1)$. The
    farther the reward in the future, less importance is accorded to it. A $\gamma$
    close to 0 makes an agent consider only the immediate reward ($r_{t+1}$) for choosing
    $a_t$ while $\gamma$ close to 1 makes long-term rewards important.


    The concept of discounted reward maximization is an elegant (and mathematically
    tractable) way of making RL agent look at both immediate and future rewards. For
    level control problem, a natural reward function is squared tracking error


    $$r_t = -(l_t - l_{sp})^2$$


    Appropriate crafting of reward function is very important as it strongly influences
    the agent''s decisions and RL training convergence.


    # Policy


    A policy is a rule or mapping used by an RL agent to determine $a_t$ given $s_t$.
    A policy can be deterministic or stochastic. A deterministic policy provides a
    single action


    $$a_t = \mu(s_t)$$


    while a stochastic policy ($\pi$) provides a probability over the set of actions


    $$\pi(a|s_t) = \text{probability that action } a \text{ is taken in state } s_t$$


    The goal in RL is to learn a policy which provides maximum return. The optimal
    policy is often denoted as $\mu^*$ or $\pi^*$.'

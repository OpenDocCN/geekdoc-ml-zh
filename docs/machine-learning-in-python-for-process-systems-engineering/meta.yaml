    \ (cluster_centers[i,0], cluster_centers[i,1]))\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_190_0.png)\n\
    \nFigure 8.5: Clustering via k-means\n\nAs expected, Figure 8.5 shows that k-means\

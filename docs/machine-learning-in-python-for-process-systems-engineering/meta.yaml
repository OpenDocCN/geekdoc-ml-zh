    # Dimensionality reduction for Polymer Manufacturing Process


    Let us now see the powerful dimensionality reduction capability of PCA in action.
    We will use data from a polymer manufacturing facility. The dataset contains 33
    variables and 92 hourly samples (Figure 2.2).


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_107_0.png)


    Figure 2.2: Process data from a polymer manufacturing plant. Each colored curve
    corresponds to a process variable


    For this dataset, it is reported that the process started behaving abnormally
    around sample 70 and eventually had to be shut down. Therefore, we use samples
    1 to 69 for training the PCA model using the code below. The rest of the data
    will be utilized for process monitoring illustration later.


    ```

    # import requisite libraries

    import numpy as np

    import pandas as pd

    from sklearn.preprocessing import StandardScaler

    from sklearn.decomposition import PCA


    # fetch data and separate training data

    data = pd.read_excel(''proc1a.xls'', skiprows = 1, usecols = ''C:AI'')

    data_train = data.iloc[0:69,]


    # normalize data

    scaler = StandardScaler()

    data_train_normal = scaler.fit_transform(data_train)


    # PCA

    pca = PCA()

    score_train = pca.fit_transform(data_train_normal)

    ```'

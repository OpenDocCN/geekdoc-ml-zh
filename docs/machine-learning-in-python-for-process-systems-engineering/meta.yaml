    Sklearn 提供了一个 `RobustScaler` 类用于稳健缩放，它与 MAD 缩放类似，不同之处在于它使用四分位距（IQR）而非 MAD 作为数据离散度的稳健估计量。使用这两种稳健缩放方法中的任何一种，都可以预期得到相似的结果。\n\
    \n## 特征提取\n\n过程系统拥有大量测量数据，这增加了数据分析的复杂性。然而，你经常会发现，通过提取原始变量的组合特征，可以降低原始变量集的维度，同时这些特征包含与原始变量集相同的信息量。这是过程变量之间强相关性的结果。\n\
    \n以图 2 为例。这里，三个原始变量（**x**、**y**、**z**）表现出强烈的线性关系，以至于可以将（如图所示）三维测量空间转换为二维（甚至一维）特征空间，同时保留关于数据变异性的大部分信息。在\
    \ Sklearn 中实现这一点就像编写以下代码一样简单：\n\n```\nfeatures = PCA(1).fit_transform(X_scaled)\
    \ # 从缩放后的测量值中仅提取1个特征\n```\n\n特征提取后，其余的分析/模型构建将使用提取的特征进行。有特定的技术可用于确定线性和非线性系统的最优可提取特征数量。关于这些技术、在不“丢失信息”情况下的降维概念、PCA\
    \ 方法以及其他特征提取方法（如 ICA、FDA）的详细信息，将在本书的第 2 部分中详细介绍。除了维度更低之外，特征空间还可能表现出其他优良特性，例如特征不相关或独立，因此，使用这些特征而不是原始变量可以生成更好的模型。\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_58_0.png)\n\n## 特征工程\n\n虽然特征提取是一种无监督的练习（我们不显式指定底层的相关结构；算法自动提取关系），但特征工程涉及对变量进行仔细和显式的转换，这可以帮助\
    \ ML 算法提供更好的模型。例如，如果我们检查图 3.3 中的原始（$x$ 对 $y$）数据，很明显可能需要一个二次模型。为了实现这一点，我们将从给定的\
    \ $x$ 数据中工程化一个额外的特征（$x^2$），然后在 $\\{x, x^2\\}$ 和 $y$ 之间拟合一个线性模型，如下方代码所示：\n\n```\n\
    # 读取原始数据\nimport numpy as np\ndata = np.loadtxt('quadratic_raw_data.csv', delimiter=',')\n\
    x = data[:,0,None]; y = data[:,1,None]\n\n# 生成二次特征\nfrom sklearn.preprocessing\
    \ import PolynomialFeatures\npoly = PolynomialFeatures(degree=2, include_bias=False)\n\
    X_poly = poly.fit_transform(x) # X_poly: 第1列是x，第2列是x^2\n\n# 缩放模型输入\nfrom sklearn.preprocessing\

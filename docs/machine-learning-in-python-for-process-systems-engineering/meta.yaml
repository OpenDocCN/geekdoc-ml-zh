    \ C”替换为 2，依此类推。然而，除非工厂类型类别之间存在自然顺序（也许工厂类型 A/B/C 代表小型/中型/大型工厂类别），否则这种方法是错误的。ML\
    \ 模型最终可能会因为类型 C 被赋予更高的值 2 而给予其相对于类型 A（和 B）更多的重视。首选的方法是使用独热编码，它执行以下转换：\n\n```\n\
    # 导入类，拟合和转换\nimport numpy as np\nfrom sklearn.preprocessing import OneHotEncoder\n\
    \nx = np.array([['type A'],\n              ['type C'],\n              ['type B'],\n\
    \              ['type C']])\n\nohe = OneHotEncoder(sparse=False) # sparse=False\
    \ 返回数组\nX_encoded = ohe.fit_transform(x) # x 的数值形式\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_60_0.png)\n\
    \n如你所推断的，为每个唯一的工厂类型类别（在上面的代码中由 OneHotEncoder 自动识别）生成了一列，并根据该类别在样本中是否出现分配了二进制值\
    \ 0/1。例如，第 3 个样本是“类型 B”，因此第 2 列中的第 3 个条目被分配了值 1。\n\n### 通过管道实现工作流自动化\n\n在前面关于使用二次特征进行线性建模的示例中，我们不得不多次调用\
    \ `fit` 和 `transform`（或 `predict`）方法来进行模型训练。对于测试数据集，这些调用将被重复。对于其他模型，你可能有更多数据转换器，以至于跟踪所有转换变得有点不方便。为了简化这个过程，Sklearn\
    \ 提供了一个很好的实用工具类 `Pipeline`，它允许我们将转换器和估计器（预测模型）按顺序链接在一起，这样我们只需要调用一次 `fit` 方法，如下方代码所示，用于我们的二次模型示例。\n\
    \n```\n# 创建通过线性模型进行二次拟合的管道\n# 导入相关类\nfrom sklearn.pipeline import Pipeline\nfrom\
    \ sklearn.preprocessing import PolynomialFeatures\nfrom sklearn.preprocessing\
    \ import StandardScaler\nfrom sklearn.linear_model import LinearRegression\n\n\
    # 按顺序添加转换器和估计器作为元组列表\n# 名称‘poly’、‘scaler’、‘model’可用于稍后访问管道的各个元素\npipe = Pipeline([('poly',\
    \ PolynomialFeatures(degree=2, include_bias=False)),\n                ('scaler',\
    \ StandardScaler()),\n                ('model', LinearRegression())])\n\n# 拟合管道并预测\n\
    pipe.fit(x, y)\ny_predicted = pipe.predict(x)\n```\n\n上述代码给出了与我们之前没有管道的代码相同的结果，并且更简洁（并且可能更容易管理）。图\
    \ 3.4 显示了当我们调用管道的 `fit` 和 `predict` 方法时，在幕后执行的步骤顺序。真的很方便，不是吗？请注意，管道不一定必须包含估计器作为其最后一个元素——你只能有转换器，并调用\
    \ `pipeline.transform()` 来通过所有包含的转换器转换你的数据。\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_61_0.png)\n\
    \n这完成了我们对数据转换技术的快速浏览。关键信息是，在将所有原始数据用于模型训练之前，你应该始终考虑可以对原始数据应用哪些转换，以帮助 ML 算法提供一个良好的模型。精心设计的转换可以减轻对大量"

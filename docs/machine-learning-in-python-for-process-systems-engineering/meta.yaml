- md: 'After an estimate of model performance has been made using test data, the model
    may be re-trained, if desired, using the complete dataset. Since an implicit assumption
    is always made that both the training and test datasets follow the same distribution,
    the model''s generalization performance will only get better when re-trained with
    more data.


    ## Residual analysis


    Residual analysis is another way to validate the adequacy of (regression) models.
    It involves checking the model errors / residuals to ensure there are no undesired
    patterns in them. Presence of any obvious trend in residuals indicates a need
    for further data pre-processing or change of model. A convenient way to study
    the residuals is to simply draw scatterplots. Ideally, residuals would be small,
    centered around zero, independent of model inputs and outputs (predicted and measured),
    and uncorrelated in time (for dynamic models). An ideal residual plot would look
    something like this


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_67_0.png)


    In the above plot, no systematic pattern is apparent. If systematic patterns are
    present in residual plot then it implies that the model has not been able to extract
    all systematic pattern in the dataset. The specific patterns observed also often
    provide clues on potential remedies. Figure 3.5 shows some examples of ‘bad’ residual
    plots.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_67_1.png)


    In the above subplot (a), residuals show a nonlinear pattern which immediately
    conveys that the model is not able to adequately capture nonlinearities in the
    data. Nonlinear features may need to be included or a different model that can
    capture complex nonlinearities is warranted. In subplot (b) heteroscedasticity
    is apparent as residuals get larger for higher value of predicted output. Fixing
    this issue often entails appropriate transformation of variables such as log transformation.
    Heteroscedasticity may also indicate that a variable is missing. In subplot (c),
    while most of the samples show small residuals, several samples have high positive
    residuals. The suggested remedy in this case is the same as that for heteroscedasticity.
    Finally, in subplot (d), a group of samples appear as outliers. These outliers
    may need to be removed or further analyzed to check if these are normal samples;
    if samples turn out to be normal then model may need to be changed to account
    for the presence of these distinct groups of data.


    For dynamic dataset, autocorrelation and cross-correlation (between residuals
    and past input/output data) function plots are used to check if the residuals
    are uncorrelated. Residual histograms or normal probability plots are also used
    to check if the residuals are normally distributed. If uncorrelatedness or normality
    assumptions are found violated, these plots, like scatter plots, give crucial
    hints on potential remedies.


    We can see that residual analysis is a powerful diagnostic tool. As a best practice,
    you should always check the residual plots to ensure no modeling assumptions have
    been violated or no obvious room for improvement exists.


    ## 3.4 Model Tuning


    Before we send our model for generalization assessment using test dataset, we
    need to ensure that the obtained model is the best model we can obtain. Or, if
    our model does not provide adequate generalization performance, some model adjustments
    are warranted. These tasks fall under the ‘model tuning’ step of the modeling
    workflow, and primarily involve optimizing values of model hyperparameters. *Model
    hyperparameters*, unlike *model parameters* (which are the unknowns that are estimated
    during model fitting), are model configuration variables which need to be specified
    before model fitting. For our quadratic fitting example, the weight coefficients
    of the linear model are the model parameters and the polynomial degree is the
    hyperparameter. For ANN models, number of neurons and layers are important hyperparameters,
    while weight coefficients are estimable model parameters. Finding optimal hyperparameter
    settings is also referred to as model selection in the ML literature.


    Figure 3.6 shows the resulting model curves when our pipeline is fitted with different
    polynomial degrees. We can see that the model with high degree fits the training
    data better, but the fitting is a bit ‘too much’! We would not be comfortable
    accepting this model although it has very low training error. How do we then select
    the optimal hyperparameter values before we make the final evaluation using test
    data? How can we diagnose if our model is fitting data too much or too less? What
    steps we can take to ensure that neither of these two undesirable situations occur?
    We will answer these important questions in the next few subsections.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_69_0.png)


    ### Overfitting & underfitting


    Underfitting occurs when our model is not able to capture the systematic relationships
    between predictors and response adequately (1<sup>st</sup> model in Figure 3.6)
    while overfitting occurs when the model captures even the non-systematic relationships
    such as noise (3<sup>rd</sup> model in Figure 3.6). As we increase model complexity
    by adjusting hyperparameter values, we move from underfitting end of the fitting
    spectrum to the overfitting end. A common way to visualize this is to plot validation
    curve using which we can also select our optimal hyperparameter value.


    > Overfitting is often the reason for poor performance of ML models. Overfitting
    is not necessarily only associated with ‘complex models’, and even simple linear
    regression models can overfit data (for example, if you have many irrelevant predictors
    or low number of training samples). Therefore, you should always pay careful attention
    that your model is not overfitting.


    To plot validation curve, we will use a dataset that is kept separate from the
    data used for model fitting. We will call it validation dataset and the data used
    to fit the model as fitting or estimation dataset (you may wonder, ‘what happened
    to the test dataset?’ Hold onto that question, we will explain that shortly).
    Now, validation curve is simply a plot of model error (or any performance metric)
    for fitting and validation dataset for different hyperparameter values as shown
    in Figure 3.7. When hyperparameters are set such that model does not have enough
    complexity or ‘handles’ to be able to describe the inherent structure in data,
    modeling errors will be large for both fitting and validation dataset leading
    to underfitting. As model complexity is increased, error on fitting dataset will
    decrease, however, the resulting model may not generalize well to the validation
    data leading to overfitting. Therefore, overfitting is characterized by small
    fitting errors and large validation errors. The sweet spot where the both fitting
    and validation errors are small, and validation errors just start increasing corresponds
    to the optimal hyperparameters.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_70_0.png)


    If your model is underfitting, your recourse should be to increase model complexity
    (for example by adding more depth in ANNs or using higher degree polynomials).
    You may explore adding more informative features. For overfitting, constrain model
    flexibility to prevent it from learning noise or random errors in fitting dataset.
    Removing irrelevant features or adding more fitting data can also help. If the
    optimal validation error is still very high, then a change of model may be needed
    (for example, using SVMs instead of decision trees).


    > The problems of underfitting and overfitting are also referred to as problems
    with high bias and high variance, respectively. High bias refers to the problem
    of model estimates being consistently far away from true values. On the other
    hand, if your model is overfitting, then your model estimates for the same validation
    dataset would vary considerably when different datasets are used for model fitting,
    leading to high variance in model estimates.


    To generate the validation curve, you can use Sklearn’s utility function validation_curve
    available in the model_selection module or write your own code as shown below.


    ```python

    # separate fitting and validation data

    from sklearn.model_selection import train_test_split

    ```'
  mdcn: '在使用测试数据对模型性能进行评估后，如果需要，可以使用完整数据集重新训练模型。由于我们总是隐含地假设训练集和测试集遵循相同的分布，因此使用更多数据重新训练后，模型的泛化性能通常会得到提升。


    ## 残差分析


    残差分析是验证（回归）模型充分性的另一种方法。它涉及检查模型误差/残差，以确保其中没有不期望的模式。残差中出现任何明显趋势都表明需要进一步的数据预处理或更换模型。研究残差的一种便捷方法是简单地绘制散点图。理想情况下，残差应较小，以零为中心，独立于模型输入和输出（预测值和测量值），并且在时间上不相关（对于动态模型）。理想的残差图应类似于这样


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_67_0.png)


    在上图中，没有明显的系统性模式。如果残差图中存在系统性模式，则意味着模型未能提取数据集中的所有系统性模式。观察到的具体模式通常也能为潜在的补救措施提供线索。图3.5展示了一些“不良”残差图的示例。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_67_1.png)


    在上图的子图(a)中，残差呈现非线性模式，这立即表明模型无法充分捕捉数据中的非线性关系。可能需要引入非线性特征，或者使用能够捕捉复杂非线性的不同模型。在子图(b)中，异方差性很明显，因为随着预测输出值的增大，残差也变大。解决这个问题通常需要对变量进行适当的变换，例如对数变换。异方差性也可能表明缺少某个变量。在子图(c)中，虽然大多数样本的残差较小，但有几个样本具有较高的正残差。这种情况下的建议补救措施与异方差性相同。最后，在子图(d)中，有一组样本表现为异常值。这些异常值可能需要被移除或进一步分析，以检查它们是否为正常样本；如果样本确实是正常的，那么可能需要更改模型以适应这些不同数据组的存在。


    对于动态数据集，使用自相关和互相关（残差与过去输入/输出数据之间）函数图来检查残差是否不相关。残差直方图或正态概率图也用于检查残差是否呈正态分布。如果发现不相关性或正态性假设被违反，这些图（如散点图）将为潜在的补救措施提供关键线索。


    我们可以看到，残差分析是一个强大的诊断工具。作为最佳实践，你应该始终检查残差图，以确保没有违反建模假设，或者没有明显的改进空间。


    ## 3.4 模型调优


    在将模型送交使用测试数据集进行泛化评估之前，我们需要确保所获得的模型是我们能得到的最佳模型。或者，如果我们的模型未能提供足够的泛化性能，则需要进行一些模型调整。这些任务属于建模工作流中的“模型调优”步骤，主要涉及优化模型超参数的值。*模型超参数*与*模型参数*（在模型拟合过程中估计的未知数）不同，它们是需要在模型拟合前指定的模型配置变量。对于我们的二次拟合示例，线性模型的权重系数是模型参数，而多项式次数是超参数。对于人工神经网络模型，神经元数量和层数是重要的超参数，而权重系数是可估计的模型参数。寻找最优超参数设置在机器学习文献中也被称为模型选择。


    图3.6展示了当我们的流程使用不同多项式次数进行拟合时得到的模型曲线。我们可以看到，高次数的模型能更好地拟合训练数据，但这种拟合有点“过头”了！尽管它的训练误差非常低，我们也不会愿意接受这个模型。那么，在使用测试数据进行最终评估之前，我们如何选择最优的超参数值呢？我们如何诊断模型是过度拟合还是拟合不足？我们可以采取哪些步骤来确保这两种不良情况都不会发生？我们将在接下来的几个小节中回答这些重要问题。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_69_0.png)


    ### 过拟合与欠拟合


    当我们的模型无法充分捕捉预测变量与响应变量之间的系统性关系时，就会发生欠拟合（图3.6中的第1个模型）；而当模型甚至捕捉了非系统性关系（如噪声）时，就会发生过拟合（图3.6中的第3个模型）。当我们通过调整超参数值来增加模型复杂度时，我们就从拟合谱的欠拟合端移向过拟合端。一种常见的可视化方法是绘制验证曲线，我们也可以通过它来选择最优的超参数值。


    > 过拟合通常是机器学习模型性能不佳的原因。过拟合不一定只与“复杂模型”相关，即使是简单的线性回归模型也可能过拟合数据（例如，如果你有许多无关的预测变量或训练样本数量很少）。因此，你应该始终密切关注你的模型是否过拟合。


    为了绘制验证曲线，我们将使用一个与用于模型拟合的数据分开的数据集。我们称之为验证集，而用于拟合模型的数据称为拟合集或估计集（你可能会想，“测试集呢？”请保留这个问题，我们稍后会解释）。现在，验证曲线简单来说就是针对不同的超参数值，绘制拟合集和验证集的模型误差（或任何性能指标）的图，如图3.7所示。当超参数设置使得模型没有足够的复杂度或“处理能力”来描述数据中的内在结构时，拟合集和验证集的建模误差都会很大，导致欠拟合。随着模型复杂度的增加，拟合集的误差会减小，然而，由此产生的模型可能无法很好地泛化到验证数据，导致过拟合。因此，过拟合的特点是拟合误差小而验证误差大。拟合误差和验证误差都很小，且验证误差刚开始增加的甜蜜点，对应着最优的超参数。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_70_0.png)


    如果你的模型欠拟合，你的对策应该是增加模型复杂度（例如，在人工神经网络中增加深度或使用更高次数的多项式）。你可以尝试添加更多有信息量的特征。对于过拟合，则需要限制模型的灵活性，以防止它学习拟合集中的噪声或随机误差。移除无关特征或添加更多拟合数据也有帮助。如果最优验证误差仍然很高，那么可能需要更换模型（例如，使用支持向量机代替决策树）。


    > 欠拟合和过拟合的问题也分别被称为高偏差和高方差问题。高偏差指的是模型估计值始终远离真实值的问题。另一方面，如果你的模型过拟合，那么当使用不同的数据集进行模型拟合时，你对同一验证集的模型估计值会有很大差异，导致模型估计的高方差。


    要生成验证曲线，你可以使用Sklearn的`model_selection`模块中的实用函数`validation_curve`，或者编写自己的代码，如下所示。


    ```python

    # separate fitting and validation data

    from sklearn.model_selection import train_test_split

    ```'

    > **Process Monitoring Terminology**


    In our process monitoring applications so far, we have used terms like fault detection,
    fault diagnosis, and fault classification. You may, however, also encounter other
    terms like fault identification, fault isolation. While these terms may get used
    interchangeably, there exist nuanced differences. Fault detection refers to the
    task of determining whether abnormal process conditions have occurred. Fault identification
    and fault isolation, both refer to the task of identifying the process variables
    that exhibit abnormal behavior. Identifying these variables can help in determining
    the root-cause of the fault. The step of ‘fault diagnosis’ in the PCA chapter
    should have been called ‘fault identification’!


    Fault diagnosis refers to the task of finding which specific fault has occurred
    or determining the root-cause of the fault. Fault classification falls in this
    category. While fault isolation is non-supervised, fault diagnosis is supervised.


    # Summary


    With this chapter, we have now covered all the popular classical dimensionality
    reduction techniques that are frequently utilized for analyzing process data.
    This chapter has also provided an important message: blind application of a single
    technique all the times may not yield best results. The techniques should be chosen
    according to the process system (gaussian vs non-gaussian) and objective (fault
    detection vs fault classification) at hand. ICA and FDA are powerful techniques
    and there lies much more to them that what we have touched in this chapter. While
    you are encouraged to explore more about these methods (now that you have conceptual
    understandings), we will move to study another powerful ML technique called Support
    Vector Machines in the next chapter.'

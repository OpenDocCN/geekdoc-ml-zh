    \n## 10.3 kNN：简介\n\nk近邻（kNN）是一种通用技术，基于一个简单直观的思想：新样本的标签/值可以从训练数据集中最近邻样本（在特征空间中）的标签/值获得。参数$k$表示算法使用的邻近样本数量。如图10.7所示，kNN可用于分类和回归。对于分类，kNN将测试样本分配给$k$个邻居中出现最多的类别。对于回归，预测输出是$k$个邻居值的平均值。由于其简单性，kNN被广泛用于模式分类，并被列入数据挖掘十大算法列表。$^{47}$\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_236_0.png)\n\n> kNN属于惰性学习器类别，其中模型在接收到测试样本之前不会显式构建。在光谱的另一端，急切学习器（如SVM、决策树、ANN）从训练样本中“学习”显式模型。毫不奇怪，急切学习器的训练较慢，但测试较快。kNN需要计算测试样本与所有训练样本的距离，因此，kNN也属于基于实例的学习类别。基于实例的学习器通过将测试样本与存储在内存中的训练实例进行比较来进行预测。另一方面，基于模型的学习器不需要存储训练实例即可进行预测。\n\
    \n### 概念背景\n\n除了整数$k$和输入-输出训练对之外，kNN算法还需要一个距离度量来量化测试样本与训练样本的接近程度。通常采用标准的欧几里得度量。一旦确定了最近邻，可以采用两种方法，即均匀加权和基于距离的加权，来决定分配给每个邻居的权重，这会影响邻居在预测中的贡献。在均匀加权中，所有$k$个邻居被平等对待，而在基于距离的加权中，每个$k$个邻居的权重与其到测试样本的距离的倒数成正比，因此更近的邻居将有更大的贡献。下图说明了两种加权方案在分类问题上的差异。\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_237_0.png)\n\n图10.8：加权方案对kNN输出影响的说明。虚线圆圈用于距离参考。\n\
    \n在图10.8中，使用均匀加权（对于分类问题也称为多数投票），当$k = 1$或3时，测试样本被分配到类别1，当$k = 6$时被分配到类别2。对于$k\
    \ = 8$，无法做出决策。使用距离加权时，对于k = 1、3、6或8，测试样本始终被分类为类别1。此说明表明，距离加权有助于减少预测对$k$选择的依赖性。\n\
    \n对于预测，kNN需要计算测试样本与所有训练样本的距离。对于大型训练集，此计算可能变得昂贵。然而，已经开发了专门的技术，如KDTree和BallTree，以在不影响预测准确性的情况下加速邻近点的提取。这些技术利用数据中的结构来避免计算与所有训练样本的距离。scikit-learn中的NearestNeighbors实现会自动选择最适合当前问题的算法。scikit-learn提供了KNeighborsRegressor和KNeighborsClassifier模块，分别用于回归和分类。\n\
    \n在kNN中需要特别注意的几点包括变量选择和变量缩放。对输出预测不重要的变量应被移除；否则，不重要的变量将对最近邻的确定产生不利影响。此外，所选变量应适当缩放，以确保在距离计算过程中，具有较大数值的变量不会掩盖其他变量的贡献。\n\
    \n### 决定kNN超参数\n\n超参数$k$的选择至关重要，是平衡欠拟合和过拟合的调节旋钮。较小的$k$可能导致过拟合，其中噪声测量会对预测产生不利影响。较大的$k$可以减少噪声的影响，但可能导致欠拟合，因为它过度平滑了回归的预测或使分类边界不那么清晰。不幸的是，关于$k$的选择没有标准指导。最佳值取决于数据，可以通过交叉验证来估计。\n\
    \n### kNN在过程系统中的应用\n\n如前所述，kNN方法常用于设备状态监测$^{48}$。对于过程级监控，如果有足够的历史故障样本，kNN分类可用于将过程异常分类为不同的故障类别。与kNN故障分类相反，He和Wang提出了一种有趣的kNN故障检测适应方法，该方法仅使用正常操作数据$^{49}$。我们将在下一节更详细地研究此应用。\n\
    \nkNN在过程系统中的其他一些值得注意的应用包括Facco等人关于软传感器自动维护的工作$^{50}$、Borghesan等人关于过程扰动预测的工作$^{51}$、Cecilio等人关于检测瞬态过程扰动的工作$^{52}$，以及Zhou等人关于工业过程故障识别的工作$^{53}$。这些应用可能不直接使用kNN方法进行分类或回归，而是使用最近邻相似性的基本概念。\n\
    \n<sup>48</sup> Dong Wang, K-nearest neighbors based methods for identification\
    \ of different gear crack levels under different motor speeds and loads: Revisited,\
    \ Mechanical Systems and Signal Processing, 2016\n<sup>49</sup> He and Wang, Fault\
    \ detection using k-nearest neighbor rule for semiconductor manufacturing processes,\
    \ IEEE Transactions on Semiconductor Manufacturing, 2007.\n<sup>50</sup> Facco\
    \ et al., Nearest-neighbor method for the automatic maintenance of multivariate\
    \ statistical soft sensors in batch processing, Industrial Engineering & Chemistry\
    \ Research, 2010.\n<sup>51</sup> Borghesan et al., Forecasting of process disturbances\
    \ using k-nearest neighbors, with an application in process control, Computers\
    \ and Chemical Engineering, 2019.\n<sup>52</sup> Cecilio et al., Nearest neighbors\
    \ methods for detecting transient disturbances in process and electromechanical\
    \ systems, Journal of Process Control, 2014.\n<sup>53</sup> Zhou et al., Fault\
    \ identification using fast k-nearest neighbor reconstruction, Processes, 2019"

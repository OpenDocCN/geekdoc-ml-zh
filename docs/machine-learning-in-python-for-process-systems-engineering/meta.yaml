    # 12.6 Predictive Maintenance using LSTM Networks


    The process-fault detection models that we have built till now have relied on
    using latest (and recent past) process data to detect process faults that have
    already occurred. The process reliability personnel get relatively short amount
    of time to prepare for the maintenance. Wouldn’t it be great if our models could
    predict well in advance (a week or may be a month) the impending failure of any
    equipment? Such models have been successfully deployed in process industry and
    are referred to as predictive maintenance (PdM) models.


    PdM models use historical past failure data to extract dynamic patterns as indicators
    of failures in the future. Infact, models can be built to predict the precise
    failure time in future. The time until failure of an equipment is also referred
    to as remaining useful life (RUL). RNNs are among the most useful technique available
    at our disposal to tackle RUL estimation or failure prediction problems.


    For illustration, we will use aircraft gas turbine engine dataset which consists
    of dynamic data from multiple sensors from several engine operation simulations.
    Each simulation starts with an engine (with different degrees of initial wear)
    operating within normal limits. Engine degradation starts at some point during
    the simulation and continues until engine failure. Training datasets contain complete
    data until engine failures, while the test dataset contains data until some point
    prior to failure. Actual RUL has been provided for the test dataset. Our objective
    is to develop a PdM model to predict engine failure using simulation data in the
    test dataset.'
- md: "## Maintenance Strategies\n\nThe maintenance strategies in process industry\
    \ have been strongly influenced by the advances in ML and sensor technologies.\
    \ It has evolved from time-based preventive maintenance to proactive monitoring-based\
    \ condition-based maintenance (CBM), and to advance prediction-based preventive\
    \ maintenance (PdM).\n\n| Preventive Maintenance | Condition-based Maintenance\
    \ | Predictive Maintenance |\n| :--- | :--- | :--- |\n| • Equipment maintenance\
    \ is done at pre-set schedule | • Equipment maintenance is done when signs of\
    \ failure are detected | • Like CBM, utilizes continuous monitoring of equipment\
    \ |\n| • Non-optimal strategy as maintenance may happen too early or too late\
    \ | • Manual expert analysis is carried out to determine exact maintenance plan\
    \ | • Utilizes temporal degradation pattern in sensor readings to detect impending\
    \ failure at very early stage |\n| • E.g., a compressor may be scheduled to be\
    \ replaced every 5 years | • E.g., a compressor may be monitored using PCA to\
    \ detect the need to repair | • E.g., a compressor may be monitored using RNN\
    \ to alarm about impending failure |\n\n## Aircraft engine dataset\n\nWe will\
    \ use data in the following three files from the repository dataset.\n\n- train_FD001.txt:\
    \ Along with (3) operational settings, it contains timeseries data from 21 sensors\
    \ (s1 to s21) from 100 different simulations or engines. The last cycle of each\
    \ simulation is the point of failure of the corresponding engine. In Figure 12.13,\
    \ sensor drift due to engine degradation is apparent.\n- test_FD001.txt: It also\
    \ contains simulated timeseries data for 100 engines, however, here only partial\
    \ timeseries is provided for each engine. Figure 12.13 shows the provided timeseries\
    \ for engine ID 90. The RUL of each engine needs to be estimated.\n- RUL_FD001.txt:\
    \ It contains the actual RULs of the 100 engines in the test dataset measured\
    \ in cycles. We will use this information to measure our model predictions’ accuracy.\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_291_0.png)\n\n## Failure prediction\
    \ using LSTM\n\nIn this illustration we will build a LSTM network to predict whether\
    \ an engine will fail within the next 30 cycles or not. This implies that we have\
    \ a binary classification problem: will fail (output = 1) or not fail (output\
    \ = 0). As done by others<sup>65</sup>, we will use a sequence of 50 past cycles\
    \ to make the failure prediction. Let's start with reading data from the provided\
    \ text files. Note that, unlike previous illustrations, we will use pandas library\
    \ more extensively here due to the ability to reference columns by descriptive\
    \ names which makes the code easier to understand.\n\n```\n# training data\ntrain_df\
    \ = pd.read_csv('PM_train.txt', sep=\" \", header=None)\ntrain_df.drop(train_df.columns[[26,\
    \ 27]], axis=1, inplace=True) # last two columns are blank\ntrain_df.columns \
    \ = ['EngineID', 'cycle', 'OPsetting1', 'OPsetting2', 'OPsetting3', 's1', 's2',\
    \ 's3',\n's4', 's5', 's6', 's7', 's8', 's9', 's10', 's11', 's12', 's13', 's14',\
    \ 's15', 's16', 's17', 's18', 's19', 's20', 's21']\n\n# test data\ntest_df = pd.read_csv('PM_test.txt',\
    \ sep=\" \", header=None)\ntest_df.drop(test_df.columns[[26, 27]], axis=1, inplace=True)\n\
    test_df.columns  = ['EngineID', 'cycle', 'OPsetting1', 'OPsetting2', 'OPsetting3',\
    \ 's1', 's2', 's3',\n's4', 's5', 's6', 's7', 's8', 's9', 's10', 's11', 's12',\
    \ 's13', 's14', 's15', 's16', 's17', 's18', 's19', 's20', 's21']\n\n# actual RUL\
    \ for each engine-id in the test data\ntruth_df = pd.read_csv('PM_truth.txt',\
    \ sep=\" \", header=None)\ntruth_df.drop(truth_df.columns[[1]], axis=1, inplace=True)\
    \ # 2nd column is blank\ntruth_df.columns = ['finalRUL'] # assigning column name\
    \ as finalRUL\ntruth_df['EngineID'] = truth_df.index + 1 # adding new column EngineID\n\
    ```\n\nWhile most of the code above is self-explanatory, the last part reads the\
    \ true RUL data, removes the redundant columns with 'nan' data, and adds an additional\
    \ column 'EngineID' as shown below\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_292_0.png)\n\
    \nNext, we will do some dataframe manipulations to compute RUL and failure label\
    \ at any given cycle for an engine. The code below basically adds the highlighted\
    \ columns shown in the snippet below to the training and test dataframes.\n\n\
    ![](img/ae65e737df4a9f5732c91f7aea579fc8_293_0.png)\n\n```\n# training dataset\n\
    maxCycle_df = pd.DataFrame(train_df.groupby('EngineID')['cycle'].max()).reset_index()\n\
    maxCycle_df.columns = ['EngineID', 'maxEngineCycle']\n\ntrain_df = train_df.merge(maxCycle_df,\
    \ on=['EngineID'], how='left')\ntrain_df['engineRUL'] = train_df['maxEngineCycle']\
    \ - train_df['cycle']\ntrain_df.drop('maxEngineCycle', axis=1, inplace=True) #\
    \ maxEngineCycle is not needed anymore\n\nw1 = 30\ntrain_df['binaryLabel'] = np.where(train_df['engineRUL']\
    \ <= w1, 1, 0 )\n\n# compute maxEngineCycle for test data using data from test_df\
    \ and truth_df\nmaxCycle_df  = pd.DataFrame(test_df.groupby('EngineID')['cycle'].max()).reset_index()\n\
    maxCycle_df.columns = ['EngineID', 'maxEngineCycle']\ntruth_df['maxEngineCycle']\
    \ = maxCycle_df ['maxEngineCycle'] + truth_df['finalRUL']\ntruth_df.drop('finalRUL',\
    \ axis=1, inplace=True)\n\n# generate engineRUL & binary label for test data\n\
    test_df = test_df.merge(truth_df, on=['EngineID'], how='left')\ntest_df['engineRUL']\
    \ = test_df['maxEngineCycle'] - test_df['cycle']\ntest_df.drop('maxEngineCycle',\
    \ axis=1, inplace=True)\n\ntest_df['binaryLabel'] = np.where(test_df['engineRUL']\
    \ <= w1, 1, 0 )\n```\n\nNext, we will scale the sensor readings.\n\n```\n# training\
    \ dataset: create temporary dataframe with columns to be scaled\nall_cols = train_df.columns\
    \ # get columns names\ncols_to_scale = train_df.columns.difference(['EngineID','cycle','engineRUL','binaryLabel'])\n\
    train_df_with_cols_to_scale = train_df[cols_to_scale]\n```\n\n```\n# scale and\
    \ rejoin with columns that were not scaled\nscaler = StandardScaler()\nscaled_train_df_with_cols_to_scale\
    \ =\npd.DataFrame(scaler.fit_transform(train_df_with_cols_to_scale), columns=cols_to_scale)\
    \ # scalar transform returns a numpy array\ntrain_df_scaled =\ntrain_df[['EngineID','cycle','engineRUL','binaryLabel']].join(scaled_train_df_with_cols_to_scale)\n\
    train_df_scaled = train_df_scaled.reindex(columns = all_cols) # same columns order\
    \ as before\n\n# test dataset: repeat above steps\nall_cols = test_df.columns\n\
    test_df_with_cols_to_scale = test_df[cols_to_scale]\nscaled_test_df_with_cols_to_scale\
    \ = pd.DataFrame(scaler.transform(test_df_with_cols_to_scale),\ncolumns=cols_to_scale)\n\
    test_df_scaled =\ntest_df[['EngineID','cycle','engineRUL','binaryLabel']].join(scaled_test_df_with_cols_to_scale)\n\
    test_df_scaled = test_df_scaled.reindex(columns = all_cols) # same columns order\
    \ as before\n```\n\nNext, we will create the sequence samples. For each engine,\
    \ any continuous block of 50 cycles forms a sequence; output label for the sequence\
    \ is decided based on whether the engine’s RUL at the end of sequence is more\
    \ than 30 or not. To accomplish this, we will define a utility function as shown\
    \ below\n\n```\nnSequenceSteps = 50 # number of cycles in a sequence\nX_train_sequence\
    \ = []\ny_train_sequence = []\n\n# define utility function\ndef generate_LSTM_samples(engine_df,\
    \ nSequenceSteps):\n    \"\"\"\n    This function generates list of LSTM samples\
    \ (numpy arrays of size (nSequenceSteps, 24)\n    each) for LSTM input and list\
    \ of output labels for LSTM\n    \"\"\"\n    engine_X_train_sequence = []\n  \
    \  engine_y_train_sequence = []\n    engine_data = engine_df.values # converting\
    \ to numpy\n\n    for sample in range(nSequenceSteps, engine_data.shape[0]):\n\
    \        engine_X_train_sequence.append(engine_data[sample-nSequenceSteps:sample,:-1])\n\
    \        engine_y_train_sequence.append(engine_data[sample,-1])\n\n    return\
    \ engine_X_train_sequence, engine_y_train_sequence\n```\n\n```\n# generate sequence\
    \ samples\nfor engineID in train_df_scaled['EngineID'].unique():\n    engine_df\
    \ = train_df_scaled[train_df_scaled['EngineID'] == engineID]\n    engine_df =\
    \ engine_df[['OPsetting1', 'OPsetting2', 'OPsetting3', 's1', 's2', 's3', 's4',\
    \ 's5', 's6', 's7', 's8', 's9', 's10', 's11', 's12', 's13', 's14', 's15', 's16',\
    \ 's17', 's18', 's19', 's20', 's21', 'binaryLabel']]\n    engine_X_train_sequence,\
    \ engine_y_train_sequence = generate_LSTM_samples(engine_df, nSequenceSteps)\n\
    \n    X_train_sequence = X_train_sequence + engine_X_train_sequence # adding samples\
    \ to the common list\n    y_train_sequence = y_train_sequence + engine_y_train_sequence\n\
    \nX_train_sequence, y_train_sequence = np.array(X_train_sequence), np.array(y_train_sequence)\n\
    ```\n\nWe are now ready to build and compile our RNN. The topology is similar\
    \ to the previous fault classification example except that here we use a single\
    \ neuron output layer with sigmoid activation function. Moreover, for regularization,\
    \ we utilize the dropout technique.\n\n```\n# import ANN packages\nfrom tensorflow.keras\
    \ import Sequential\nfrom tensorflow.keras.layers import Dense, LSTM, Dropout\n\
    \n# define model\nmodel = Sequential()\nmodel.add(LSTM(units=100, return_sequences=True,\
    \ input_shape=(nSequenceSteps, 24)))\nmodel.add(Dropout(0.2))\nmodel.add(LSTM(units=50))\n\
    model.add(Dropout(0.2))\nmodel.add(Dense(1, activation='sigmoid'))\n\n# compile\
    \ model\nmodel.compile(loss='binary_crossentropy', optimizer='Adam', metrics=['accuracy'])\n\
    ```\n\nBefore we fit our RNN, we need to set aside some sequences for validation.\
    \ If we look at the distribution of class labels in the training sequences, we\
    \ will notice class imbalance. As a best practice, validation dataset should be\
    \ chosen with the same class distribution. This is done easily in sklearn by using\
    \ the stratify parameter as shown below\n\n```\nfrom sklearn.model_selection import\
    \ train_test_split\nX_est_sequence, X_val_sequence, y_est_sequence, y_val_sequence\
    \ = \\\ntrain_test_split(X_train_sequence, y_train_sequence, stratify=y_train_sequence,\
    \ test_size = 0.3, random_state = 100)\n```"
  mdcn: "## 维护策略\n\n流程工业中的维护策略深受机器学习和传感器技术进步的影响。它已从基于时间的预防性维护，演进到基于主动监控的状态维护（CBM），并进一步发展为基于高级预测的预测性维护（PdM）。\n\
    \n| 预防性维护 | 状态维护 | 预测性维护 |\n| :--- | :--- | :--- |\n| • 设备维护按预设计划执行 | • 当检测到故障迹象时执行设备维护\
    \ | • 与CBM类似，利用设备的持续监控 |\n| • 非最优策略，因为维护可能过早或过晚发生 | • 进行人工专家分析以确定确切的维护计划 | • 利用传感器读数中的时间退化模式，在非常早期检测到即将发生的故障\
    \ |\n| • 例如，压缩机可能计划每5年更换一次 | • 例如，压缩机可能使用PCA进行监控以检测维修需求 | • 例如，压缩机可能使用RNN进行监控以对即将发生的故障发出警报\
    \ |\n\n## 飞机发动机数据集\n\n我们将使用仓库数据集中以下三个文件中的数据。\n\n- train_FD001.txt：除了（3）个操作设置外，它还包含来自100个不同模拟或发动机的21个传感器（s1到s21）的时间序列数据。每个模拟的最后一个周期是相应发动机的故障点。在图12.13中，由于发动机退化导致的传感器漂移是显而易见的。\n\

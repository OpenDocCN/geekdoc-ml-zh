    # 3.3 Model Evaluation


    After model parameters have been fitted, we need some means of assessing the model
    performance to see how well (or poorly) the model fits the training data. For
    this purpose, commonly computed metrics for regression and classification tasks
    are listed below.


    | Regression | Classification |

    | :--- | :--- |

    | • Mean Squared Error (MSE) | • Confusion Matrix |

    | • Mean Absolute Error (MAE) | • Accuracy |

    | • Root Mean Squared Error (RMSE) | • Precision, Recall, F1 Score |

    | • R Squared (R²) | • True positive rate (TPR), False positive rate (FPR) |


    Table 1: Common means of evaluating model performance


    While it is easy to write our own python code to compute these metrics, it is
    even easier to use the sklearn.metrics module where these metrics are all implemented.
    We can import the desired metric class from the module and use it as shown below
    our quadratic fitting example.


    ```

    # performance metric

    from sklearn.metrics import r2_score

    print(''Fitting metric (R2) = '', r2_score(y, y_predicted))


    >> Fitting metric (R2) = 0.91

    ```


    Let us now take a quick look into the different metrics listed in Table 1.


    # Regression metrics


    R-squared ($R^2$) is a good measure, technically for linear models, to determine
    how well the predicted output ($\hat{y}$) compares to the actual $y$. As seen
    in the metric formula table below, $R^2$ measures how much of variability in the
    output variable can be explained by the model. An $R^2$ of 1 indicates a perfect
    fit.'
  merge: -1

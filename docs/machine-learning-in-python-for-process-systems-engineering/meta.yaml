    Y_test_sequence = to_categorical(y_test_sequence, num_classes=21)

    ```


    Alright, we are now ready to define our RNN model. Model''s topology is shown
    below. Since the output fault classes are mutually exclusive, we will use softmax
    output layer. Also, we specify return_sequences=True parameter into LSTM to ensure
    that sequence output is passed from the 1st LSTM layer to the 2nd.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_287_0.png)



  md: '# Mathematical background


    Consider a data matrix $X \in \mathbb{R}^{N \times m}$ consisting of $N$ samples
    of $m$ input variables where each row represents a data-point in the original
    measurement space. It is assumed that each column is normalized to zero mean and
    unit variance. Let $v \in \mathbb{R}^m$ represent the ''loading'' vector that
    projects data-points along PC1 and can be found by solving the following optimization
    problem


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_106_0.png)


    $$\max_{v \neq 0} \frac{(Xv)^T Xv}{v^T v} \quad \text{eq. 1}$$


    It is apparent that eq. 1 is trying to maximize the variance of the projected
    data-points along PC1. Loading vectors for other PCs are found by solving the
    same problem with the added constraint of orthogonality to previously computed
    loading vectors. Alternatively, loading vectors can also be computed from eigenvalue
    decomposition of covariance matrix ($S$) of $X$


    $$\frac{1}{N-1} X^T X = S = V \Lambda V^T \quad \text{eq. 2}$$


    Above is the form you will find more commonly in PCA literature. The columns of
    eigenvector matrix $V \in \mathbb{R}^{m \times m}$ are the loading vectors that
    we need. The diagonal eigenvalue matrix $\Lambda$ equals $diag[\lambda_1, \lambda_2,
    \dots, \lambda_m]$, where $\lambda_1 \geq \lambda_2 \geq \dots \geq \lambda_m$
    are the eigenvalues. Infact, $\lambda_j$ is equal to the variance along the $j^{th}$
    PC. If there is significant correlation in original data, only the first few eigenvalues
    will be significant. Let''s assume that $k$ PCs are retained, then, the first
    $k$ columns of $V$ (which corresponds to the first $k$ $\lambda_s$) are taken
    to form the loading matrix $P \in \mathbb{R}^{m \times k}$. Transformed data in
    the PC space can now be obtained


    Projected values along $j^{th}$ PC $\longleftarrow$ $$t_j = Xp_j \text{ or } T
    = XP \quad \text{eq. 3}$$


    The m dimensional $i^{th}$ row of $X$ has been transformed into $k$ ($< m$) dimensional
    $i^{th}$ row of $T$. $T \in \mathbb{R}^{N \times k}$ is called score matrix and
    the $j^{th}$ column of $T$ ($t_j$) contains the (score) values along the $j^{th}$
    PC. The scores can be projected back to the original measurement space as follows


    $$\widehat{X} = TP^T \quad \text{eq. 4}$$


    Note that because we discarded the loading vectors corresponding to insignificant
    $\lambda_s$, $\widehat{X} \neq X$. The difference $E = X - \widehat{X}$ is referred
    to as residual matrix as each row is the residual or error vector for a data-point.
    Overall, the PC space captures the systematic trends in process data and the residual
    space primarily describe the noise in data.'
  merge: -1
  pgno: 106

    While DTs appear to be very flexible and useful modeling mechanism, they are seldom
    used as a standalone model. In Figure 9.2, we saw that DTs can easily overfit
    and give non-smooth or piece-wise constant approximations. Another disadvantage
    with DTs is instability, i.e., small variations in training dataset can result

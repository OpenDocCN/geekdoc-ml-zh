  md: '+   - *Data cleaning*: “Garbage in, garbage out” is an age-old principle in
    computer simulations. The same holds for ML model training. Your model will be
    practically useless if training data is not ‘clean’. For example, process monitoring
    model won’t be able to detect process abnormalities accurately if it has been
    trained with outlier-infested training data. Data cleaning, amongst others, identification
    and removal of outliers, and removal of noise effects. Detailed algorithms are

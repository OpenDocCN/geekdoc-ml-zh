    therefore including past measurements improve predictive accuracy<sup>24</sup>.
    For dynamic PLS, an augmented input data matrix is built (using the same procedure
    as that for dynamic PCA) using lagged values of only input variables or both input
    and output variables. Using only lagged inputs leads to a FIR (finite impulse
    response) model while using both lagged inputs and outputs leads to an ARX (autoregressive
    with exogenous variables) model. The value of lag period can be determined using
    cross-validation or time-constant of the process.


    For nonlinear systems, kernel PLS is an efficient method for soft sensing quality
    variables. Using kernel function, the input variables are implicitly mapped onto
    a high-dimensional feature space where data behaves more linearly. Linear PLS
    model is then built between the feature variables and output variables. The reader
    is encouraged to see the work of Zhang et al.<sup>25</sup> for details on kernel
    PLS-based soft sensing.


    # Model maintenance for time-varying process


    Model fidelity degrades over time due to changes in process correlations because
    of aging equipment or changing process conditions. Therefore, it becomes crucial
    to regularly update PCA/PLS models. There are two broad techniques of model adaptation:
    recursive update<sup>++</sup> and moving window update<sup>**</sup>. In moving-window
    approach, existing model is discarded, and a completely new process model is built
    by replacing oldest data with new data. In recursive approach, the existing model
    is not discarded, rather a new model is built by updating existing model with
    new data.



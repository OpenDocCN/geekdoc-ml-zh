- md: '## Book organization


    The book follows a holistic and hands-on approach to learning ML where readers
    first gain conceptual insight and develop intuitive understanding of a methodology,
    and then consolidate their learning by experimenting with code examples. Every
    methodology is demonstrated by using simple process system or numerical example
    to illustrate major characteristics of the method and then by implementing on
    industrial-scale processes.


    The book has been divided into four parts. **Part 1** provides a perspective on
    the importance of ML in process systems engineering and lays down the basic foundations
    of ML. **Part 2** provides in-detail presentation of classical ML techniques and
    has been written keeping in mind the various characteristics of industrial process
    systems such as high-dimensionality, non-linearity, multimode operations, etc.
    **Part 3** is focused on artificial neural networks and deep learning. While deep
    learning is the current buzzword in ML community, we would like to caution the
    reader against the temptation to deploy a deep learning model for every problem
    at hand. Often, simpler classical models can provide as good, if not better, results
    as those from neural net models. For example, partial least squares (PLS) are
    still the most popular models for soft sensor development in process industry
    due to its simplicity and powerful capabilities of handling noisy and correlated
    data. **Part 4** covers the important topic of deploying an ML solution over web.


    It was a deliberate decision to not divide the book in terms of supervised / unsupervised
    / reinforcement-learning categories or application areas (process modeling, monitoring,
    etc.). This is because several methods overlap these categories which make it
    difficult to put them under a specific category. For example, SVM and SVR methods
    fall under supervised category while the related SVDD method falls under unsupervised
    category. Similar situation holds for PCA/PCR/PLS methods. A reader who is interested
    in a specific application area may use the table of contents as a guide to relevant
    sections in Parts 2 and 3. Care has been taken to title the subsections in different
    chapters appropriately.


    ## Symbol notation


    The following notation has been adopted in the book for representing different
    types of variables:


    - lower-case, bold-face letters refer to vectors ($\boldsymbol{x} \in \mathbb{R}^{m
    \times 1}$) and upper-case, bold-face letters denote matrices ($\boldsymbol{X}
    \in \mathbb{R}^{n \times m}$)

    - individual element of a vector and a matrix are denoted as $x_j$ and $x_{ij}$,
    respectively.

    - any $i^{\text{th}}$ vector in a dataset gets represented as subscripted lower-case,
    bold-faced letter ($\boldsymbol{x}_i \in \mathbb{R}^{m \times 1}$)


    ## Part 1


    ## Introduction & Fundamentals


    ## Chapter 1

    Machine Learning for Process Systems Engineering


    Imagine yourself in the shoes of an operator or engineer responsible for uninterrupted
    and optimal operation of an oil refinery. Keeping an eye on each of the 1000s
    of process measurements being made every second to look for process abnormalities
    or opportunities for plant performance improvement is akin to finding a needle
    in a haystack. The task is undoubtedly overwhelming and is the primary reason
    why plant managers often complain about having *‘too much data but little knowledge
    and insight’*.


    However, unlike humans, computers can be programmed to parse through large amounts
    of data in real-time, extract patterns, trends, and assist plant personnel in
    making informed business and operational decisions. This practice of learning
    about systems from data or machine learning has become an indispensable tool in
    process operations in the age of increasing global competition and stricter product
    quality standards.


    This chapter provides an overview of how the power of machine learning is harnessed
    for process systems engineering. Specifically, the following topics are covered:


    - Unique characteristics of process data

    - Types of ML systems and typical workflow to convert data into insights

    - Classical applications of ML techniques in process industry

    - Common ML solution deployment infrastructure employed in industry


    Let’s now tighten our seat-belts as we embark upon this exciting journey of de-mystifying
    machine learning for process systems engineering.


    ### 1.1 What are Process Systems


    Process systems refer to a collection of physical structures that convert raw
    materials (wood, natural gas, crude oil, coal, etc.) into final consumer products
    (paper, fertilizers, diesel, energy, etc.) or intermediate products which are
    then used to manufacture other commodity materials. These process systems can
    range from a simple water-heating system to complex oil refineries. Figure 1.1
    shows an example (petrochemical) plant comprising several processing units such
    as distillation columns, heat exchangers, pumps. Process industry is a broad category
    that encompasses, amongst others, chemical industry, bioprocess industry, power
    industry, pharmaceuticals industry, steel industry, semiconductor industry, and
    waste management industry.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_16_0.png)


    Figure 1.1: Petrochemical plant image (obtained from pixabay.com)


    In process industry, the task of optimizing production efficiency, controlling
    product quality, monitoring the process are categorized as process systems engineering
    (PSE) activities. These tasks often require a mathematical model of the plant.
    The traditional practice has been to use first principles mathematical description
    of physio-chemical phenomena occurring inside each process unit to mathematically
    characterize the whole plant. However, as you may already know, building such
    fundamental models are time-consuming and difficult for complex systems. Machine
    learning (ML)-based methods provide a convenient alternative where process data
    are used to build empirical plant model which can be used for optimization, control,
    and monitoring purposes. Availability of large amount of sensor data has further
    boosted the trend of incorporating ML techniques for PSE and demand for process
    data scientists.


    Let’s take a look at the kind of data generated in process industry. Majority
    of the process data include process stream flowrate, temperature, pressure, level,
    power, and composition measurements as shown in figure 1.2. Additionally, obtaining
    vibration signals from rotating equipment (motors, compressors), infrared or visual
    images, and spectra data are also common now-a-days. These indirect data are frequently
    utilized for predictive equipment maintenance and product quality control.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_17_0.png)


    ### Characteristics of process data


    Industrial process data often exhibit characteristics which pose challenges to
    a process data scientist. Choosing an ML technique appropriate to the data is
    a pre-requisite for a successful project implementation. These characteristics
    include the following:


    - *Dynamic*: Process plants rarely operate at a perfect steady-state i.e., at
    fixed values of process inputs and outputs. Plants are often subject to random
    or systematic disturbances such as changing ambient conditions, process feed quality,
    and product demand which are handled by control system by manipulating process
    variables. This leads to fluctuations around a steady-state point or plants moving
    from one steady-state to another.

    - *Time-varying*: Correlations between process variables change over time due
    to gradual changes in process parameters. For example, heat transfer coefficient
    in a heat-exchanger may change due to fouling or catalyst activity may degrade
    due to aging.

    - *Batch vs continuous*: While continuous processes are dominant in process industry,
    batch processes are also frequently employed, for example in semiconductor and
    drug manufacturing. Unlike continuous processes, batch processes are of finite
    durations and offer its own set of unique challenges such as batch-to-batch variations
    and inherent non-steady-state operation. Time itself becomes a crucial dimension
    for accurate modeling of temporal evolution of process variables within a batch.

    - *Multimode operations*: Multimode characteristics show up when a process plant
    operates primarily around a few distinct steady states. For example, a plant producing
    species a, b, and c may have different production recipes (set-points of process
    variables) for each of these recipes. Depending on the production schedule, the
    plant will switch from one recipe to another. Deploying a single global ML model
    for a multimode process often lead to lower accuracy compared to that obtained
    from building local models for each mode.

    - *Discrete/Discontinuous*: Depending upon the production load, certain equipment
    may be switched on or off causing step changes in process behavior. For example,
    switching on an extra turbine or compressor causes step increase in power consumption.

    - *Nonlinear*: The complex physio-chemical phenomena (chemical reactions, vapor-liquid
    equilibrium, etc.) occurring inside process units are most often nonlinear. While
    linear models often provide good approximations when processes operate around
    a single steady-state, non-linear models become necessary when processes experience
    large fluctuations in the operating conditions.

    - *High dimensionality*: Modern process plants make hundreds of process-critical
    measurements. Considering that process plants make process adjustments in real-time,
    high dimensionality becomes an issue when a computationally intensive methodology
    is adopted.

    - *Multirate sampling*: Not all process measurements are made at the same frequency.
    While temperature or pressure readings are sampled every second or minute, composition/analyzer
    measurements are often sampled at much lower frequency (once an hour or a day).


    In this book, we will study several ML methods in detail which have been designed
    to handle these different varieties of process systems. Let us first understand
    what we mean by machine learning.'
  mdcn: '## 书籍结构


    本书采用一种整体性与实践性相结合的方法来学习机器学习，读者首先获得概念性见解，并对方法论形成直观理解，然后通过实验代码示例来巩固所学知识。每种方法都通过使用简单的工艺系统或数值示例来阐述其主要特点，随后在工业规模的工艺上进行实现。


    本书分为四个部分。**第一部分**阐述了机器学习在过程系统工程中的重要性，并奠定了机器学习的基础。**第二部分**详细介绍了经典的机器学习技术，编写时充分考虑了工业过程系统的各种特性，如高维性、非线性、多模式操作等。**第三部分**专注于人工神经网络和深度学习。虽然深度学习是当前机器学习领域的热门话题，但我们想提醒读者，不要被诱惑为手头的每个问题都部署深度学习模型。通常，更简单的经典模型可以提供与神经网络模型一样好、甚至更好的结果。例如，偏最小二乘法（PLS）由于其简单性以及处理噪声和相关数据的强大能力，仍然是过程工业中软测量开发最流行的模型。**第四部分**涵盖了在Web上部署机器学习解决方案这一重要主题。


    我们有意不按照监督学习/无监督学习/强化学习类别或应用领域（过程建模、监控等）来划分本书。这是因为许多方法跨越了这些类别，使得将它们归入特定类别变得困难。例如，支持向量机（SVM）和支持向量回归（SVR）属于监督学习类别，而相关的支持向量数据描述（SVDD）方法则属于无监督类别。主成分分析（PCA）/主成分回归（PCR）/偏最小二乘法（PLS）方法也存在类似情况。对特定应用领域感兴趣的读者可以使用目录作为指南，查找第二部分和第三部分中的相关章节。我们已注意为不同章节的小节设置恰当的标题。


    ## 符号表示


    本书采用以下符号表示不同类型的变量：


    - 小写粗体字母表示向量（$\boldsymbol{x} \in \mathbb{R}^{m \times 1}$），大写粗体字母表示矩阵（$\boldsymbol{X}
    \in \mathbb{R}^{n \times m}$）

    - 向量和矩阵的单个元素分别表示为 $x_j$ 和 $x_{ij}$。

    - 数据集中的任何第 $i$ 个向量表示为带下标的小写粗体字母（$\boldsymbol{x}_i \in \mathbb{R}^{m \times 1}$）


    ## 第一部分


    ## 引言与基础


    ## 第1章

    面向过程系统工程的机器学习


    想象一下，你是一名操作员或工程师，负责确保炼油厂不间断且最优地运行。每秒钟都有成千上万的过程测量值，要时刻关注它们以寻找过程异常或工厂性能改进的机会，这无异于大海捞针。这项任务无疑是艰巨的，这也是工厂经理经常抱怨*“数据太多，但知识和洞察太少”*的主要原因。


    然而，与人类不同，计算机可以被编程来实时解析大量数据，提取模式和趋势，并协助工厂人员做出明智的业务和运营决策。这种从数据中学习系统或机器学习的实践，在全球竞争日益激烈和产品质量标准日益严格的今天，已成为过程操作中不可或缺的工具。


    本章概述了如何利用机器学习的力量服务于过程系统工程。具体涵盖以下主题：


    - 过程数据的独特特征

    - 机器学习系统的类型以及将数据转化为洞察的典型工作流程

    - 机器学习技术在过程工业中的经典应用

    - 工业中常用的机器学习解决方案部署基础设施


    现在，让我们系好安全带，踏上这段揭开面向过程系统工程的机器学习神秘面纱的激动人心的旅程。


    ### 1.1 什么是过程系统


    过程系统是指将原材料（木材、天然气、原油、煤炭等）转化为最终消费品（纸张、化肥、柴油、能源等）或中间产品（用于制造其他商品材料）的物理结构集合。这些过程系统可以从简单的水加热系统到复杂的炼油厂不等。图1.1展示了一个包含多个处理单元（如蒸馏塔、换热器、泵）的（石化）工厂示例。过程工业是一个广泛的类别，涵盖化工、生物过程、电力、制药、钢铁、半导体和废物管理等行业。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_16_0.png)


    图1.1：石化厂图像（来自pixabay.com）


    在过程工业中，优化生产效率、控制产品质量、监控过程等任务被归类为过程系统工程（PSE）活动。这些任务通常需要工厂的数学模型。传统的做法是使用每个过程单元内部发生的物理化学现象的第一性原理数学描述来对整个工厂进行数学表征。然而，正如你可能已经知道的，为复杂系统构建这样的基础模型既耗时又困难。基于机器学习（ML）的方法提供了一种便捷的替代方案，即利用过程数据构建经验工厂模型，可用于优化、控制和监控目的。大量传感器数据的可用性进一步推动了将机器学习技术应用于过程系统工程以及对过程数据科学家需求的趋势。


    让我们看看过程工业中产生的数据类型。大多数过程数据包括过程流股流量、温度、压力、液位、功率和组成测量值，如图1.2所示。此外，从旋转设备（电机、压缩机）获取振动信号、红外或视觉图像以及光谱数据现在也很常见。这些间接数据经常用于预测性设备维护和产品质量控制。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_17_0.png)


    ### 过程数据的特征


    工业过程数据通常表现出对过程数据科学家构成挑战的特征。选择适合数据的机器学习技术是项目成功实施的前提。这些特征包括：


    - *动态性*：过程工厂很少在完美的稳态下运行，即过程输入和输出值固定。工厂经常受到随机或系统性干扰，如环境条件变化、过程进料质量和产品需求变化，这些干扰由控制系统通过操纵过程变量来处理。这导致在稳态点附近波动或工厂从一个稳态移动到另一个稳态。

    - *时变性*：由于过程参数的逐渐变化，过程变量之间的相关性随时间而变化。例如，换热器中的传热系数可能因结垢而改变，或者催化剂活性可能因老化而降低。

    - *间歇与连续*：虽然连续过程在过程工业中占主导地位，但间歇过程也经常被采用，例如在半导体和药物制造中。与连续过程不同，间歇过程具有有限的持续时间，并带来其自身的一系列独特挑战，如批次间差异和固有的非稳态操作。时间本身成为准确建模批次内过程变量时间演变的关键维度。

    - *多模式操作*：当过程工厂主要围绕几个不同的稳态运行时，就会出现多模式特征。例如，一个生产a、b、c三种物质的工厂可能对每种物质都有不同的生产配方（过程变量的设定值）。根据生产计划，工厂将从一个配方切换到另一个配方。为多模式过程部署单一的全局机器学习模型，其精度通常低于为每个模式构建局部模型所获得的精度。

    - *离散/不连续*：根据生产负荷，某些设备可能被开启或关闭，导致过程行为发生阶跃变化。例如，开启额外的涡轮机或压缩机会导致功耗阶跃增加。

    - *非线性*：过程单元内部发生的复杂物理化学现象（化学反应、气液平衡等）大多是非线性的。虽然当过程在单一稳态附近运行时，线性模型通常能提供良好的近似，但当过程经历操作条件的大幅波动时，非线性模型就变得必要。

    - *高维性*：现代过程工厂进行数百个过程关键测量。考虑到过程工厂实时进行过程调整，当采用计算密集型方法时，高维性就成为一个问题。

    - *多速率采样*：并非所有过程测量都以相同的频率进行。虽然温度或压力读数每秒或每分钟采样一次，但组成/分析仪测量通常以低得多的频率采样（每小时或每天一次）。


    在本书中，我们将详细研究几种为处理这些不同类型的过程系统而设计的机器学习方法。让我们首先理解机器学习的含义。'

    $P^{(s)}(C_i|x_j)$ denotes the posterior probability that the $j^{th}$ sample
    comes from the $i^{th}$ gaussian component.


    +   - M-step ($(s+1)^{th}$ iteration): Update GMM parameters


    $$\mu_i^{(s+1)} = \frac{\sum_{j=1}^N P^{(s)}(C_i|x_j)x_j}{\sum_{j=1}^N P^{(s)}(C_i|x_j)}$$


    $$\Sigma_i^{(s+1)} = \frac{\sum_{j=1}^N P^{(s)}(C_i|x_j)(x_j-\mu_i^{(s+1)})(x_j-\mu_i^{(s+1)})^T}{\sum_{j=1}^N
    P^{(s)}(C_i|x_j)}$$


    $$\omega_i^{(s+1)} = \frac{\sum_{j=1}^N P^{(s)}(C_i|x_j)}{N}$$


    > Update centroid and covariance of each cluster using recomputed memberships
    from E-step.


    The iteration continues until some convergence criterion on log-likelihood objective
    is met. Did you notice the conceptual similarity with the k-means algorithm for
    finding model parameters? Previously, we computed posterior probabilities for
    data point 1069 using predict_prob method. Let us now use eq. 5 to see if we get
    the same numbers.


    ```

    # posterior probability calculation

    x = X_transformed[1069,np.newaxis]


    import scipy.stats

    g1 = scipy.stats.multivariate_normal(gmm.means_[0,:], gmm.covariances_[0,:]).pdf(x)

    g2 = scipy.stats.multivariate_normal(gmm.means_[1,:], gmm.covariances_[1,:]).pdf(x)

    g3 = scipy.stats.multivariate_normal(gmm.means_[2,:], gmm.covariances_[2,:]).pdf(x)

    print(''Local component densities: '', g1, g2, g3)


    >>> Local component densities: 8.33e-56 2.72e-17 0.025


    den = gmm.weights_[0]*g1 + gmm.weights_[1]*g2 + gmm.weights_[2]*g3

    posterior_prob_cluster1 = gmm.weights_[0]*g1/den

    posterior_prob_cluster2 = gmm.weights_[1]*g2/den

    posterior_prob_cluster3 = gmm.weights_[2]*g3/den

    print(''Posterior probabilities: '', posterior_prob_cluster1, posterior_prob_cluster2,
    posterior_prob_cluster3)


    >>> Posterior probabilities: 3.36e-54 1.09e-15 1

    ```


    As expected, we obtain the same posterior probabilities. Although component-wise
    densities are low, component 3 has (relatively) much higher density value at spatial
    coordinates of point 1069 and hence, resulting in highest membership association!
    Hopefully, this quick calculation helped you gain more insights into the workings
    of GMM models.'

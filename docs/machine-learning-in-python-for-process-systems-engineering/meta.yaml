- md: '## Chapter 10

    ### Other Useful Classical ML Techniques


    In this last chapter on classical ML methods, we will study two popular non-parametric
    techniques, namely, KDE and kNN. These methods are conceptually and mathematically
    simple but have proven to be very useful in practice. While KDE allows us to compute
    probability density functions using process data, kNN facilitates characterizing
    new data sample using (geometrically) neighboring samples. You might recollect
    that KDE was often mentioned in the earlier chapters as the technique of choice
    to estimate monitoring metrics thresholds for complex process systems; we will
    see how to do that in this chapter. In multivariate settings, KDE is also employed
    for outlier detection. The most common usage of kNN is classification, but several
    other interesting adaptations of traditional kNN have also been reported and we
    will study one such application of kNN for fault detection.


    Most of the illustrations in this book till now have involved employment of a
    single ML technique to solve a given problem. However, it is not necessary to
    use different ML algorithms in silos. Combining different ML methods (such as
    PLS with PCA, or ANN with PLS) can sometimes provide better performance. Before
    we end this part of the book on classical ML techniques, we will look at several
    examples involving smart combinations of ML techniques.


    Specifically, we will cover the following topics in this chapter:


    - Introduction to KDE

    - Finding process monitoring control limits using KDE

    - Introduction to kNN

    - Fault detection using kNN

    - Combination of techniques as a useful strategy


    ### 10.1 KDE: An Introduction


    Kernel density estimation (KDE) is a technique to estimate (probability) density
    of a variable or joint probability density of a group of variables from data without
    any prior knowledge about the form of the underlying distribution. Figure 10.1
    shows a 1D example where the estimated KDE density curve is superimposed on the
    histogram built using observed data. As is evident, KDE is a robust way of estimating
    probability densities. Using the KDE curve, we can estimate the likelihood of
    new variable measurement falling in any specified range.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_229_0.png)


    To see one of the utilities of KDE, recollect the two ways we have employed to
    estimate the threshold of a process monitoring metric till now. We computed the
    percentile of either the samples (for ICA) or an assumed distribution (such as
    a F distribution for PCA T² metric). While the first approach is inappropriate
    when number of samples is low, the second approach is impractical for complex
    systems (or systems where process variables do not follow gaussian distribution)
    where the metric distribution is not known beforehand. In these scenarios, KDE
    can be employed for control limit estimation.


    One can use histogram as well for estimating probability densities. However, as
    seen in Figure 10.1, non-smooth values are obtained, i.e., densities of neighboring
    points have sharp jumps. These sharp jumps are not due to the underlying true
    distribution but are just an artifact of the choice of bin locations. The density
    estimates from histogram strongly depend on the choice of the number of bins and
    bin locations. These problems become more serious for high-dimensional datasets.
    Therefore, KDE is preferred over histograms for density estimation.


    > In the beginning of the chapter, we classified KDE and kNN as non-parametric
    methods. Parametric vs non-parametric is an important machine learning classification.
    Parametric methods assume a fixed form of the underlying model where only the
    model parameters are estimated using data; non-parametric methods do not make
    any such assumptions. A parametric approach for density estimation would be to
    assume a gaussian density function and then estimate mean and standard deviation
    from data. Other popular non-parametric methods that you have already studied
    are decision trees and SVMs.


    ### Mathematical background


    In Gaussian mixture modeling, the overall density was approximated as a sum of
    local gaussians centered at different clusters. KDE takes this idea to its extreme
    and puts a local density function (also called kernel) at each data point as shown
    below for a 1D case, where a popular choice for kernel, K, Gaussian kernel is
    used, and N is number of training samples.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_230_0.png)


    The parameter h in the above illustration is called bandwidth or smoothing parameter
    and helps determine the width of local bumps. The overall density at any point
    (p_KDE(x)) is obtained by simply summing up the local bumps as shown below.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_230_1.png)


    The kernels are chosen such that $\int_{-\infty}^{\infty} K(x) \, dx$, the total
    area under the KDE curve, is 1. For multidimensional case with $D$ dimensions,
    $p_{KDE}(x)$ is given by


    $$p_{KDE}(x) = \frac{1}{Nh^D} \sum_{k=1}^{N} K\left(\frac{x - x_k}{h}\right)$$


    The above multivariate KDE uses the same bandwidth for all axes; different bandwidths
    are used to deal with non-uniform spread along different axes. We will deal primarily
    with univariate problems in this chapter.


    ### Deciding KDE hyperparameters


    The kernel K and the bandwidth are the two hyperparameters needed by KDE algorithm.
    Figure 10.2 shows the kernels available with scikit-learn. The choice of kernel
    is typically not very crucial and Gaussian kernel is usually the default choice.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_231_0.png)


    The bandwidth, however, is a crucial parameter and should be chosen carefully.
    Too small bandwidth leads to spikes in density estimates due to overfitting; absence
    or presence of a single data-point can significantly impact the density estimate
    resulting in high variance. Too large bandwidth over-smooths the density curve
    potentially masking the critical structure in data; the discrepancy between the
    true and estimated density becomes large resulting in high bias. Figure 10.3 illustrates
    this bias-variance trade-off.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_232_0.png)


    Figure 10.3: Overfitted KDE (left) and underfitted KDE (right)


    An empirical approach to choosing $h$ is to assume some underlying standard distribution
    and then minimize the error between KDE estimate and the assumed distribution.
    With gaussian assumption, bandwidth is given by


    $$h = 1.06\sigma N^{-1/5}$$


    where $\sigma$ is sample standard deviation. A more robust modified version is
    given by


    $$h = 0.9AN^{-1/5} ; A = min(\sigma, \frac{IQR}{1.34})$$


    where IQR is the interquartile range. These empirical approaches, however, may
    not give good results. A more systematic approach is to use cross validation to
    choose the bandwidth value that maximizes the probability or likelihood of validation
    data. For this purpose, GridSearchCV can be used which automatically returns the
    optimal bandwidth among supplied bandwidth values. GridSearchCV uses score method
    of KernelDensity estimator which returns the log-likelihood (logarithm of density)
    at the validation data-points.



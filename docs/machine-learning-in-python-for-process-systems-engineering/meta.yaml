  - '[PAGE 72]


    A few more interesting things to note here. While validation MSEs are expected
    to be higher than fitting MSEs in general, here, we find them to be lower for
    the first 2 polynomial degrees. Also, if you extend this validation curve for
    even higher degrees, you will find validation MSEs decreasing instead of continuously
    increasing! So, does this mean that we can''t trust inferences made using validation
    curves? You can actually trust these curves. What is happening here is that due
    to small dataset size, the validation dataset just happened to have data-points
    which show these unexpected behaviors. Infact, for small datasets, specialized
    multi-fold validation techniques exist which we will learn shortly.


    # Train/validation/test split


    We used away the dataset that we had kept aside from the fitting dataset for model
    validation We can no longer use it as a test dataset for generalization assessment
    (since this dataset has already been ''seen'' by the model and thus is no longer
    an unseen dataset). The solution is to set aside another chunk of dataset as shown
    below. This approach is called 3-way holdout method.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_72_0.png)


    To implement 3-way holdout, we need to call train_test_split function twice as
    shown below


    ```

    # train-validate-test split

    x_train, x_test, y_train, y_test = train_test_split(x, y, test_size=0.2, random_state=1)

    x_fit, x_val, y_fit, y_val = train_test_split(x_train, y_train, test_size=0.3,
    random_state=1)


    print(''Number of samples in fitting set: '', x_fit.shape[0])

    print(''Number of samples in validation set: '', x_val.shape[0])

    print(''Number of samples in test set: '', x_test.shape[0])


    >>> Number of samples in fitting set: 14

    Number of samples in validation set: 6

    Number of samples in test set: 5

    ```'
  - '[PAGE 73]


    > After model selection is completed, you may, if desired, retrain your model
    with the selected optimal hyperparameter settings on the combined fitting and
    validation dataset. Moreover, as mentioned before, after model performance assessment
    has been made using test data, the final model may be obtained by retraining on
    the entire dataset.


    # K-fold cross-validation


    The 3-way holdout method is an elegant way of ensuring that model tuning and final
    assessment are based on unbiased estimates of model performance (i.e., using data
    not seen during model fitting and model training, respectively). However, there
    are several drawbacks as well with this method. If our original dataset is not
    large enough, we may not have the luxury of having 3 distinct subsets of data.
    Moreover, the performance estimates can be highly influenced by what data-points
    makeup the subsets and thus may lead to unfortunate selection of hyperparameters
    and final assessment.


    The popular alternate solution is k-fold cross validation. The idea is simple.
    Instead of having a single test (or validation) subset, multiple subsets are created,
    and overall performance estimate is computed as the average of performances on
    individual subsets. Figure 3.9 illustrates this idea where k-fold cross validation
    is used for both final performance assessment and model tuning.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_73_0.png)'
  - '[PAGE 74]


    To understand Figure 3.9, let’s consider the outer loop first


    +   - 5-fold cross validation is employed for final performance assessment

    - The original dataset is split into 5 folds and 5 separate models are trained

    - For each model, one of the folds is used as test data and the rest of the data
    are used for model training

    - The overall model performance is simply the average performance of the 5 models


    For model training in the inner loop


    +   - 4-fold cross validation is employed, i.e., the training data is split into
    4 folds

    - For each hyperparameter set, 4 separate models are fitted using the fitting
    datasets

    - The overall validation performance is simply the average performance of the
    4 models on their respective validation folds

    - The hyperparameter values that optimize the overall validation performance is
    selected and the model is re-trained using the complete training data before being
    sent to the outer loop.


    Very often, k-fold cross validation is only employed for model tuning and the
    final performance assessment is made using only a single test holdout set. This
    conventional cross-validation approach is illustrated in Figure 3.10.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_74_0.png)


    Let’s apply k-fold cross validation technique to find the optimal polynomial degree
    with our illustration dataset. We will use the KFold utility function provided
    by Sklearn which returns the indices of data-points that belong to the fitting
    & validation subsets in each of the k splits.'
  - "[PAGE 75]\n\n```\n# separate training and test data\nfrom sklearn.model_selection\
    \ import train_test_split\nx_train, x_test, y_train, y_test = train_test_split(x,\
    \ y, test_size=0.2, random_state=1)\n\n# generate k=3 folds on training data\n\
    from sklearn.model_selection import KFold\nkfold = KFold(n_splits = 3, shuffle\
    \ = True, random_state = 1)\n\n# compute validation performances using the K folds\n\
    from sklearn.metrics import mean_squared_error as mse\noverall_fit_MSEs = [] #\
    \ overall errors for different polynomial degrees\noverall_val_MSEs = []\n\nmax_polyDegree\
    \ = 5\nfor poly_degree in range(1,max_polyDegree+1): # loop over hyperparameters\n\
    \    pipe['poly'].degree = poly_degree\n\n    split_fit_MSEs = [] # errors for\
    \ different splits\n    split_val_MSEs = []\n\n    for fit_indices, val_indices\
    \ in kfold.split(x_train): # loop over splits\n        x_fit = x_train[fit_indices]\n\
    \        y_fit = y_train[fit_indices]\n        x_val = x_train[val_indices]\n\
    \        y_val = y_train[val_indices]\n\n        # fit & predict\n        pipe.fit(x_fit,\
    \ y_fit)\n        y_pred_fit = pipe.predict(x_fit)\n        y_pred_val = pipe.predict(x_val)\n\
    \n        # compute average error and append\n        split_fit_MSEs.append(mse(y_fit,\
    \ y_pred_fit))\n        split_val_MSEs.append(mse(y_val, y_pred_val))\n\n    overall_fit_MSEs.append(np.mean(split_fit_MSEs))\n\
    \    overall_val_MSEs.append(np.mean(split_val_MSEs))\n```\n\nFigure below shows\
    \ the resulting validation curve which is more along the expected lines. Note\
    \ that Sklearn provides a cross_val_score function which can be used to replace\

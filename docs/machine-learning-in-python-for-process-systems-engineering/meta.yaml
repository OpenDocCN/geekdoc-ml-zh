    # 7.5 SVR: An Introduction


    Support vector regression (SVR) is another variant of SVM used for linear and
    nonlinear regressions. SVR attempts to find a regression curve that is as close
    as possible to the training observations. Geometrically, as shown in Figure 7.11
    for kernelized-SVR, a tube of pre-specified width (ε) is fitted to the data and
    any sample lying outside the tube is penalized. You will see later that SVR''s
    optimization program is designed to obtain a good balance between model generalization
    capabilities and the ability to fit the training data.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_175_0.png)


    SVR generates a linear hyperplane that best describes the output as a function
    of the inputs. For kernelized SVR, the hyperplane translates into an appropriate
    nonlinear curve in the original measurement space. As shown in Figure 7.11, in
    feature space, most of the data-points lie within ε distance to the optimal hyperplane.
    Slack variables, ξ, allow some samples to fall outside the ε tube; however, such
    violations are penalized. Samples lying on the edge or outside the tube are the
    support vectors which completely determine the optimal solution for a given ε.
    Adding or removing any non-support vector (or samples inside the tube), does not
    affect the solution.


    SVR has been found to provide performance superior to ANNs for small and medium-sized
    high-dimensional datasets. We will see a couple of applications later in the chapter.


    # Mathematical Background


    SVR''s optimization program for parameter estimation takes the following form
    in the feature space'
- md: '## 7.5 Support Vector Regression (SVR)


    $$\begin{aligned}

    \min_{w,b,\xi,\xi^*} \quad & \frac{1}{2}||w||^2 + C \sum_{i=1}^N (\xi_i + \xi_i^*)
    \\

    \text{s.t.} \quad & y_i - w^T\varphi(x_i) - b \le \varepsilon + \xi_i \\

    & w^T\varphi(x_i) + b - y_i \le \varepsilon + \xi_i^* \\

    & \xi_i, \xi_i^* \ge 0, \quad i = 1, \cdots N

    \end{aligned}$$


    The first part of the objective ($\frac{1}{2}||w||^2$) attempts to keep the model
    as less complex as possible or the model output as flat as possible. For example,
    for $y=w^Tx+b$, w=0 gives the simplest model y=b with least dependency on inputs.
    The 2nd part tries to keep the number of samples outside of the $\varepsilon$
    tube as low as possible. The hyperparameter $C$ controls the trade-off between
    the two.


    > In the SVR formulations, there are no errors associated with samples that lie
    within the $\varepsilon$ tube. In SVM literature, this is referred to as implementing
    $\varepsilon$-insensitive loss function as shown below.


    ![Loss Function](image)


    Compare this to an ordinary least squares regression where error from the regression
    curve for every sample is penalized.


    The dual form is given by


    $$\begin{aligned}

    \max_{\alpha,\alpha^*} \quad & \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N (\alpha_i
    - \alpha_i^*)(\alpha_j - \alpha_j^*)K(x_i, x_j) - \\

    & \varepsilon \sum_{i=1}^N (\alpha_i + \alpha_i^*) + \sum_{i=1}^N y_i(\alpha_i
    - \alpha_i^*) \\

    \text{s.t.} \quad & \sum_{i=1}^N (\alpha_i - \alpha_i^*) = 0 \\

    & 0 \le \alpha_i, \alpha_i^* \le C \quad i = 1, \cdots N

    \end{aligned}$$


    If you notice carefully, here we assign two multipliers ($\alpha, \alpha^*$) for
    each data-point. Both the multipliers end up being 0 for non-support vectors (training
    samples lying within the $\varepsilon$ tube). Once multipliers have been found,
    predictions can be made by


    $$\hat{y}_t = \sum_{i \in \{SV\}} (\alpha_i - \alpha_i^*)K(x_i, x_t) + b$$


    The specification of the kernel function and hyperparameters allow us to fit the
    model (find multipliers) and make predictions. Figure 7.12 shows the impact of
    the SVR hyperparameters (C, $\gamma$, $\epsilon$) with RBF kernel for a SISO system.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_177_0.png)


    Figure 7.12 is along the expected lines w.r.t. gamma and C. Let''s understand
    the impact of $\epsilon$. Large $\epsilon$ makes the $\epsilon$ tube big allowing
    SVR to keep the model ''flat'' leading to underfitting. On the other hand, very
    small $\epsilon$ makes the tube very small which results in high number of support
    vectors making the fit prone to overfitting. Nonetheless, it is not uncommon to
    specify small $\epsilon$ and control overfitting via C. To see SVR implementations
    using Sklearn, let''s check out a couple of industrial applications in the next
    sections.


    ## SVR vs ANN


    Due to the powerful nonlinear modeling capabilities of SVR, it is natural to compare
    it to artificial neural networks (ANNs). The equation for SVR model prediction
    can be represented in a network form as shown in figure below. This representation
    makes the similarities between the two regression methods evident. However, unlike
    ANNs, the hidden units are automatically determined without any explicit specification
    of the network structure in SVR. This makes SVR easier to train as there are fewer
    hyperparameters.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_178_0.png)


    [We will learn about ANNs in detail in Chapter 11. If you are not familiar with
    them, you can re-visit this note later. But we figured that if you already know,
    this comparison could throw some more insights into SVR algorithm.]


    In ANNs, the number of fitted model parameters (and therefore the tendency to
    overfit) increases with increase in dimensionality of input vectors. But in SVR,
    number of parameters depend on the number of support vectors and not on input
    dimensionality. Adding more input variables in a SVR model doesn''t increase model
    complexity if the number of support vectors don''t change. This greatly helps
    SVRs overcome overfitting issue arising from high input dimensionality. Moreover,
    through support vectors, SVR models provide an explicit knowledge of training
    data-points which are important in defining the regression prediction; this can
    often help in rationalizing model predictions. Overall, SVRs are as powerful as
    ANNs for nonlinear modeling with some unique advantageous features.


    ## 7.6 Soft Sensing via SVR in a Polymer Processing Plant


    For our first illustration, we will apply SVR for soft sensing for predicting
    plant outputs in a polymer plant. The dataset obtained from Dupont consists of
    61 samples of 14 variables (10 predictors, 4 plant outputs). We chose this dataset
    to illustrate the utility of SVRs for small-sized datasets. Figure 7.13 provides
    a quick glimpse into the distribution of some of the process inputs and a process
    output. The sparse nature of data distribution is immediately evident.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_179_0.png)


    Sparse data modeling is known to be a difficult task in machine learning. Nonetheless,
    let''s see how well our SVR model can handle this challenge. The code below generates
    an SVR-based soft sensor model to predict each of the process output one at a
    time. Hyperparameters are determined via grid-search and k-fold CV.


    ```python

    # read data

    import numpy as np

    data = np.loadtxt(''polymer.dat'')


    X, Y = data[:, 0:10], data[:, 10:]

    y = Y[:, 0] # modeling the 1st output


    # fit SVR model using grid-search

    from sklearn.svm import SVR

    from sklearn.model_selection import GridSearchCV


    model = SVR(epsilon=0.01) # default epsilon = 0.1

    param_grid = [{''gamma'': np.linspace(0.1e-05,5,100), ''C'': np.linspace(0.01,5000,100)}]

    gs = GridSearchCV(model, param_grid, scoring=''neg_mean_squared_error'', cv=10)

    gs.fit(X, y)

    print(''Optimal hyperparameter:'', gs.best_params_)


    >>> Optimal hyperparameter: {''C'': 50.51, ''gamma'': 0.1}


    # predict using the best model

    y_predicted_SVR = gs.predict(X)


    # plots of raw and predicted data

    import matplotlib.pyplot as plt


    plt.figure()

    plt.plot(y, y_predicted_SVR, ''.'', markeredgecolor=''k'', markeredgewidth=0.5,
    ms=9)

    plt.plot(y, y, ''-r'', linewidth=0.5)

    plt.xlabel(''measured data''), plt.ylabel(''predicted data '')

    ```


    Note that all the variables in the raw dataset are already scaled between 0.1
    and 0.9 and therefore no further scaling is done before model fitting. Figure
    below shows the model predictions. Predictions from PLS models are provided for
    comparison. The first 2 outputs proved difficult for the linear PLS models, but
    SVR models could provide good fit. Outputs 3 and 4 seem to be more linearly related
    to the inputs with both PLS and SVR models providing similar fits.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_180_0.png)



    \ By definition, there would be only 1% probability that metric value for test\
    \ sample (which comes from the same distribution from which the training samples\
    \ were obtained) is higher than the 99% control limit. In process monitoring parlance,\
    \ this implies that there is a 1% probability that a fault alarm is a false alarm.\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_234_0.png)\n\nFigure 10.5: 100(1-α)\
    \ percentile or control limit of a monitoring metric. α = 0.01 for a 99% control\
    \ limit or 99th percentile.\n\nNumerical integration is needed to find the area\
    \ under KDE curve between any two metric values. Let us define a function that\
    \ takes in metric values and returns a control limit corresponding to a specified\
    \ percentile. As you can see, we divided the metric axis into a grid (metric_grid)\
    \ with 100 intervals and computed the area under the KDE curve to the left of\
    \ each of these grid points. The grid point with the required minimum area (as\
    \ specified by the percentile parameter) becomes our control limit.\n\n```python\n\
    def get_CL_via_KDE(metric_values, percentile, metricLabel):\n    \"\"\" calculate\
    \ control limit for a monitoring statistic via KDE\n\n    parameters\n    ----------\n\
    \    metric_values: numpy array of shape = [n_samples,]\n    \"\"\"\n\n    # find\
    \ optimal KDE bandwidth via CV\n    N = len(metric_values)\n    empirical_h =\
    \ 1.06*np.std(metric_values)*N**(1/5)\n    h_grid = np.linspace(0,5,50)*empirical_h\n\
    \n    CV_grid = GridSearchCV(KernelDensity(),{'bandwidth': h_grid}, cv=N) # leave-one-out\
    \ CV\n    CV_grid.fit(metric_values[:,None]) # 2D array is expected\n    optimal_h\
    \ = CV_grid.best_params_['bandwidth']\n\n    # compute density values via KDE\n\
    \    kde = CV_grid.best_estimator_\n    metric_grid = np.linspace(0, np.max(metric_values),\

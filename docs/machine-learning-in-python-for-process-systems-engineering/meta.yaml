    Figure 8.4: Score plot of PC1 and PC2 for calibration batches in metal etch dataset


    Figure 8.4 confirms existence of 3 operating modes. While visual inspection of
    score plots can help to decide the number of clusters, we will, nonetheless, learn
    ways to estimate this in a more automated way.


    # 8.2 Centroid-based Clustering: K-Means


    K-Means is one of the most popular clustering algorithm due to its simple concept,
    ease of implementation, and computational efficiency. Let $K$ denote the number
    of clusters and $\{x_i\}, i = 1, \dots, N$ be the set of N m-dimensional points.
    The cluster assignment of the data points is determined such that the following
    sum of squared errors, also called cluster inertia, is minimized


    $$SSE = \sum_{k=1}^{K} \sum_{x_i \in k^{th}cluster} ||x_i - \mu_k||_2^2$$


    Here, $\mu_k$ is the centroid of the $k^{th}$ cluster and $||x_i - \mu_k||_2^2$
    denotes the Euclidean distance of $x_i$ from $\mu_k$. To solve eq 1, k-means adopts
    the following intuitive iterative procedure.


    +   - Randomly pick K data-points as initial centroids or cluster centers

    - Assign each data-point to the closest cluster center

    - Recompute the centroids of each cluster using the current cluster assignment
    of the data-points

    - Repeat steps 2 and 3 until convergence


    Let us apply k-means to our metal etch dataset.'

- img_proc: true
  md: '# Filter methods


    In the most common form of filter methods, the relationship between each input
    and the target is estimated using some statistical measure and then the inputs
    are ranked according to the estimated relationship strengths. Once ranked, the
    top ranked variables can be picked. Figure 4.4 shows an overview of the strategy.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_87_0.png)


    Let''s look at the tow commonly used statistical measures.


    # Correlation coefficients


    For continuous inputs and target, the common statistical measure is Pearson correlation
    coefficient which measure the linear correlation between an input and the target
    and is given by


    ```

    $$R_{xy} = \frac{\sum_i(x_i - \bar{x})(y_i - \bar{y})}{\sqrt{\sum_i(x_i - \bar{x})^2
    \sum_i(y_i - \bar{y})^2}}$$

    ```


    For variable selection, the top $k$ variables with highest correlations, where
    $k$ is known beforehand or decided via cross-validation, or all variables with
    correlations significantly different from zero can be selected.


    # Mutual information


    Correlation coefficients can be deceptive for nonlinear dependencies between target
    and inputs and can lead to wrong variable selections. The solution is to use ''mutual
    information (MI)'' metric which can efficiently quantify any kind of dependency
    between variables. Mathematically, MI is given by


    ```

    $$MI(x, y) = \iint p(x, y) \log \frac{p(x, y)}{p(x)p(y)} dxdy$$

    ```


    where denotes $p(x, y)$ joint probability density of variables x and y and denotes
    the marginal probability density of x. From process data, these densities can
    be estimated using k-nearest neighbor method (used by sklearn), KDE, or histograms.'
  merge: -1
  pgno: 87
- img_proc: true
  md: '![](img/ae65e737df4a9f5732c91f7aea579fc8_88_0.png)


    Figure 4.5: Linear correlation and mutual information metrics for zero, linear,
    and nonlinear dependencies between target and input


    Consider the scenarios in Figure 4.3. Pearson correlation coefficient fails to
    identify the nonlinear (sinusoidal) dependency between target and input, but mutual
    information is able to determine the dependencies correctly. Colloquially speaking,
    MI measures the amount of information about a variable (y) that is provided by
    another variable (x). Therefore, if a target and an input are independent then
    no information about y can be obtained from knowing x and therefore, their MI
    would be 0. On the other hand, if y depends on x then MI > 0 and higher value
    implies higher dependency.


    As you would have noticed, filter methods do not entail building any predictive
    models and therefore are fast to execute. Filter methods are particularly favored
    when the number of input candidates are very large. However, the quality of ‘relevant’
    input subset may be low. This is because filter methods consider the inputs in
    isolation and don’t consider the interactions among the inputs. An input that
    is ranked low may provide significant boost in predictive accuracy when combined
    with some other input. Therefore, these methods are often used as a first step
    of variable selection to only remove very low ranked variables and the remaining
    variables are further screeded via other more sophisticated methods.


    # Sklearn implementation


    Sklearn provides `f_regression` and `mutual_info_regression` methods to compute
    the statistical metrics we need. `f_regression` computes linear correlation between
    each input variable and target which is then converted into an F score. F scores
    come from F-test (you may remember from your statistics classes) which does a
    statistical check on whether the difference in modeling errors between 2 linear
    models (one relating target to just a constant and the other to an input and a
    constant) are significant or just happened by chance. If this does not ring any
    bell, don’t worry. It suffices to know that the ranking obtained through F scores
    is the same as that obtained using correlation coefficients.'
  merge: -1
  pgno: 88
- img_proc: true
  md: 'f_regression can be combined with SelectKBest transformer to conveniently transform
    raw input data matrix into one containing relevant inputs only as shown below


    ```

    # read data

    import numpy as np

    VSdata = np.loadtxt(''VSdata.csv'', delimiter='','')


    # separate X and y

    y = VSdata[:,0]

    X = VSdata[:,1:]


    # compute linear correlation-based scores

    from sklearn.feature_selection import SelectKBest

    from sklearn.feature_selection import f_regression


    VSmodel = SelectKBest(f_regression, k=10).fit(X, y)

    input_scores = VSmodel.scores_


    # find the top ranked inputs

    top_k_inputs = np.argsort(input_scores)[::-1][:10] + 1

    # [::-1] reverses the array returned by argsort() and [:n] gives that last n elements


    # reduce X to only top relevant inputs

    X_relevant = VSmodel.transform(X)

    ```


    For our simulated dataset, inputs 22, 21, 24, 20, 30, 29, 32, 31, 28, 27 got selected
    as the top 10 relevant variables, i.e., only 4 inputs got correctly picked. We
    can see that the selection is not that good, primarily due to the multivariable
    dependence of our target. Let''s see if wrapper methods can do any better.


    # Wrapper methods


    Figure 4.6 gives an overview of wrapper approach to feature selection. Here, unlike
    filter methods, a predictive model is used to find the relevant features. The
    method begins with an initial selection of feature subset and enters a loop. In
    each cycle of the loop, a new model is built with the currently selected subset
    and the decision to include/exclude a feature from the subset is based on model''s
    performance or some model attributes. The specific strategy employed distinguishes
    the different sequential methods. The loop concludes once the desired number of
    relevant features are obtained or some criteria on model performance is met. Note
    that the model performance may be assessed using a validation dataset or fitting
    dataset itself using BIC/AIC metrics. Let''s study a couple of well-known wrapper
    methods.'
  merge: -1
  pgno: 89
- img_proc: true
  md: '![](img/ae65e737df4a9f5732c91f7aea579fc8_90_0.png)


    Figure 4.6: Wrapper method strategy for feature selection


    # Recursive feature elimination (RFE)


    In this method, a model is initially built using all the input variables. The
    importance of each input is quantified using any specific model attribute (such
    as model coefficients) or through some combination of model attributes. A few
    of the inputs with the least importances are discarded and the entire process
    is repeated until the desired number of relevant inputs are obtained or model
    performance begins to deteriorate.


    PLS is a very popular regression method for process systems which we will study
    in detail in Chapter 5. We are mentioning this here because PLS allows for computation
    of VIP (variable importance in projection) scores that quantify the importance
    of each input. PLS VIP<sup>14</sup>-based RFE algorithm can be used to iteratively
    exclude inputs that contribute the least to the prediction of the target variable.


    # Sequential feature selection (SFS)


    Sequential feature selection technique has 2 common variants. In forward SFS,
    the search begins with an empty subset. The input that leads to the best performance
    when the model is trained on this single input gets added to the subset. Next,
    the previously selected subset is combined with each of the remaining inputs one
    at a time. The combination of two inputs that gives the best performance becomes
    the selected subset. This procedure is repeated till *k* inputs are selected or
    predictions no longer improve by adding new variables.


    The other variant, backward SFS, works similarly as forward SFS, except that it
    starts with all the inputs. The input whose exclusion leads to the best model
    performance is excluded from the subset. This procedure is repeated to exclude
    inputs one by one.


    <sup>14</sup> PLSRegression class in sklearn does not have any built-in VIP computation.
    pyChemometrics package can be used which provides a ChemometricsPLS class with
    a VIP method'
  merge: -1
  pgno: 90
- img_proc: true
  md: 'Since wrapper methods use models, they outperform filter methods. However,
    because they execute multiple model fittings, they can become computationally
    infeasible for very large number of inputs and complex models (such as ANNs).
    Between forward and backward SFS, backward SFS takes into account the interactions
    effects of all the variables better than the forward SFS but can entail higher
    number of model fittings when $k$ is much lower than the number of input candidates.


    # Sklearn implementation


    Sklearn provides RFE and SequentialFeatureSelector classes that transform raw
    input data matrix into relevant subset using any specified estimator/model. Below
    is an implementation for backward SFS using linear regression model.


    ```

    # scale data

    from sklearn.preprocessing import StandardScaler

    xscaler = StandardScaler()

    X_scaled = xscaler.fit_transform(X)


    yscaler = StandardScaler()

    y_scaled = yscaler.fit_transform(y[:,None])


    # implement backward SFS

    from sklearn.feature_selection import SequentialFeatureSelector

    from sklearn.linear_model import LinearRegression


    BSFS = SequentialFeatureSelector(LinearRegression(), n_features_to_select=10,
    direction=''backward'', cv=5).fit(X_scaled, y_scaled)


    # check selected inputs

    print(''Inputs selected: '', BSFS.get_support(indices=True)+1)


    >>> Inputs selected: [18 19 20 21 22 23 24 25 31 33]


    # reduce X to only top relevant inputs

    X_relevant = BSFS.transform(X)

    ```


    We can see that wrapper method has performed much better than filter method and
    has recovered 8 out of 10 relevant inputs! Another impressive thing to highlight
    here is how SequentialFeatureSelector allows condensing all the complexities of
    SFS variable selection with cross-validation into just a couple of lines of code!!'
  merge: -1
  pgno: 91
- img_proc: true
  md: '# Embedded methods


    Embedded methods make use of algorithms where selection of variables is an inherent
    part of the model fitting process itself. We already saw one of the methods in
    the previous chapter, Lasso regression, where irrelevant inputs are eventually
    removed from model by assigning them zero coefficients. Decision trees and random
    forests are another set of algorithms which directly provide feature importances
    after model fitting. We will study them in Chapter 9.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_92_0.png)


    Embedded methods are computationally less expensive than wrapper methods and work
    best when the number of samples are much higher than the number of inputs. Below
    is a quick implementation of Lasso regression for our simulated dataset where
    we use the model coefficients to judge any input''s importance.


    # Sklearn implementation


    We will employ LassoCV model which automatically selects a penalization strength
    using cross-validation. As shown, Lasso has recovered 8 out of 10 relevant inputs.


    ```

    # fit Lasso model

    from sklearn.linear_model import LassoCV

    Lasso_model = LassoCV(cv=5).fit(X_scaled, y_scaled)


    # find the relevant inputs using model coefficients

    top_k_inputs = np.argsort(abs(Lasso_model.coef_))[::-1][:10] + 1

    print(''Relevant inputs: '', top_k_inputs)


    >>> Relevant inputs: [21 22 20 23 24 19 25 18 33 14]

    ```


    This concludes our look into the variable selection methods. The presence of nonlinearity,
    input interactions, computational resource availability, and the number of input
    candidates influence the eventual method selection. You are now familiar with
    the mechanism of these methods which should help you choose the method most suitable
    for your problem.'

  md: '# 10.4 Process Fault Detection via kNN for Semiconductor Manufacturing Process


    Fault detection by kNN<sup>28</sup> (FD-kNN) is based on a simple idea that distance
    of a faulty test sample from the nearest training samples (obtained from normal
    operating plant conditions) must be greater than a normal sample’s distance from
    the neighboring training samples. Incorporating this idea into the process monitoring
    framework, a monitoring metric (termed kNN squared distance) is defined for each
    training sample as follows


    $$D_i^2 = \sum_{j=1}^k d_{ij}^2$$


    where $d_{ij}^2$ is the distance of $i^{th}$ sample from its $j^{th}$ nearest
    neighbor. After computing kNN squared distances for all the training samples,
    a threshold corresponding to the desired confidence limit can be computed. A test
    sample would be considered faulty if its kNN squared distance is greater than
    the threshold.


    An advantage of FD-kNN is that it is applicable to process systems with complex
    characteristics, such as multimodality, non-gaussianity, and non-linearity. To
    illustrate a complete application of FD-kNN, we will use the metal-etch dataset
    that we used previously in Chapter 8 for GMM-based process monitoring. If you
    recall, the batch data was unfolded before scaling and PCA application. We will
    do the same pre-processing transformations here using Sklearn’s Pipeline feature.
    Following He & Wang’s work, $k$ was set to 5. To compute the monitoring metric
    threshold, we will use KDE.


    ```

    # scale data & fit PCA model via pipeline

    from sklearn.pipeline import Pipeline


    pipe = Pipeline([(''scaler'', StandardScaler()), (''pca'', PCA(n_components =
    3))])

    score_train = pipe.fit_transform(unfolded_dataMatrix)


    # k-nearest neighbors of each training sample in score space

    from sklearn.neighbors import NearestNeighbors


    nbrs = NearestNeighbors(n_neighbors=6).fit(score_train) # a data-point is its
    own neighbor

    d2_nbrs, indices = nbrs.kneighbors(score_train)

    d2_sqrd_nbrs = d2_nbrs**2

    D2 = np.sum(d2_sqrd_nbrs, axis = 1)

    D2_log = np.log(D2)

    ```'

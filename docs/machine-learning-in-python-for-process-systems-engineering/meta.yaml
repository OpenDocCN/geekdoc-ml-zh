    # Soft Sensing


    Soft sensors, also called virtual sensors or inferential sensors, are mathematical
    models used to estimate the values of unknown process variables using available
    measurements. Soft sensor models can be first principles-based or data-based and
    are employed when physical sensors are very costly or real-time measurements are
    not possible (in case of composition measurements).


    Usage of data-based soft sensors are popular where process systems are too complex
    to build mechanistic models, or the mechanistic models are too complex to provide
    required estimates in real-time. For example, for the furnace system, one can
    build a computational fluid dynamic (CFD) model to predict the species mole fractions
    in the processed gas stream as a function of process inputs – fuel, air, unprocessed
    gas. This estimate can be used by multivariable control layer to adjust input
    flows accordingly, for example, increase fuel if conversion is low. However, CFD
    models have large execution times. As an alternative, data-based models can utilize
    past process data to estimate an appropriate relationship and provide compositions
    in real-time.


    > As a process modeler, you should pay careful attention that the training data
    is sufficiently rich in information, otherwise, a poor/low-accuracy model will
    result. One way to ascertain data-richness is to check if process inputs show
    adequate variability.


    Partial least squares (PLS), principal component regression (PCR), support vector
    regression (SVR) are some of the popular ML method choices for estimating process
    quality variables. In recent times, artificial neural networks (ANNs) have also
    seen increased usage.



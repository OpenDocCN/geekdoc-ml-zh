  md: '# 6.2 Process Monitoring via ICA for Tennessee Eastman Process


    The illustration example in Figure 6.1 showed that if the latent variables are
    non-gaussian distributed then ICA can extract the latent signals better than PCA.
    For such systems, it can be expected that ICA-based monitoring will give better
    performance than PCA-based monitoring. Like PCA/PLS-based monitoring mechanism,
    monitoring metrics and their corresponding thresholds are computed using normal/fault-free
    operation data. The metric values for test data are compared against the thresholds
    to check for presence of faults.


    # Fault detection indices


    Three monitoring metrics ($I^2$, $SPE$, $I_e^2$) are computed using training data.
    Note that because the ICs are independent, it is technically a reasonable approach
    to directly monitor the ICs separately using univariate statistical process control
    (SPC) techniques. However, monitoring multiple ICs simultaneously can be inconvenient.
    The first statistic, $I^2$, is defined as the sum of the squared independent scores
    (in reduced dimension space) and is a measure of systematic process variations
    (like PCA $T^2$ statistic). Let $s_i$ denote the $i^{th}$ column of matrix $S_d$
    which represents the $i^{th}$ sample/data-point in the reduced IC space. The $I^2$
    index for this sample is calculated by


    $$I^2 = s_i^T s_i$$


    You may wonder why we have not included the covariance matrix as we did for $T^2$
    metric computation. This is because the variance of each IC score is same (remember,
    the $L_2$ norm is same) and thus inclusion of covariance matrix is redundant.


    The second index, SPE, represents the distance between the measured and reconstructed
    data-point in the measurement space. For its computation, let us construct a matrix
    $B_d$ by selecting the columns from matrix $B$ whose indices correspond to the
    indices of the rows selected from $W$ when we generated matrix $W_d$. Let $x_i$
    and $\hat{x}_i$ denote the $i^{th}$ measured and reconstructed sample. Then,


    $$\hat{x}_i = Q^{-1} B_d s_i = Q^{-1} B_d W_d x_i$$

    $$e_i = x_i - \hat{x}_i$$

    $$SPE = e_i^T e_i$$


    The third metric, $I_e^2$, is based on the excluded ICs. Let $W_e$ contain the
    excluded rows of matrix $W$. Then


    $$s_i^e = W_e x_i$$'

- md: "## Train/validation/test split\n\n我们使用了从拟合数据集中预留出来用于模型验证的数据集。我们不能再将其用作泛化评估的测试数据集（因为该数据集已经被模型“见过”，因此不再是未见过的数据集）。解决方案是如图所示，再预留出另一部分数据集。这种方法被称为三路保持法。\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_72_0.png)\n\n要实现三路保持法，我们需要如下面所示调用两次\
    \ `train_test_split` 函数。\n\n```python\n# 训练-验证-测试划分\nx_train, x_test, y_train,\
    \ y_test = train_test_split(x, y, test_size=0.2, random_state=1)\nx_fit, x_val,\
    \ y_fit, y_val = train_test_split(x_train, y_train, test_size=0.3, random_state=1)\n\
    \nprint('Number of samples in fitting set: ', x_fit.shape[0])\nprint('Number of\
    \ samples in validation set: ', x_val.shape[0])\nprint('Number of samples in test\
    \ set: ', x_test.shape[0])\n\n>>> Number of samples in fitting set: 14\nNumber\
    \ of samples in validation set: 6\nNumber of samples in test set: 5\n```\n\n>\
    \ 在模型选择完成后，如果需要，你可以使用选定的最优超参数设置，在组合的拟合和验证数据集上重新训练模型。此外，如前所述，在使用测试数据进行模型性能评估后，可以通过在整个数据集上重新训练来获得最终模型。\n\
    \n## K-fold cross-validation\n\n三路保持法是一种优雅的方法，可以确保模型调优和最终评估都基于模型性能的无偏估计（即，分别使用在模型拟合和模型训练期间未见过的数据）。然而，这种方法也有几个缺点。如果我们的原始数据集不够大，我们可能没有奢侈条件拥有三个不同的数据子集。此外，性能估计可能受到构成子集的数据点的严重影响，从而可能导致超参数的不幸选择和最终评估。\n\
    \n流行的替代解决方案是 k 折交叉验证。其思想很简单。不是只有一个测试（或验证）子集，而是创建多个子集，整体性能估计是各个子集性能的平均值。图 3.9 说明了这一思想，其中\
    \ k 折交叉验证同时用于最终性能评估和模型调优。\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_73_0.png)\n\
    \n要理解图 3.9，让我们先考虑外层循环：\n\n-   采用 5 折交叉验证进行最终性能评估。\n-   原始数据集被分成 5 折，并训练 5 个独立的模型。\n\
    -   对于每个模型，其中一折用作测试数据，其余数据用于模型训练。\n-   整体模型性能就是这 5 个模型性能的平均值。\n\n对于内层循环中的模型训练：\n\
    \n-   采用 4 折交叉验证，即训练数据被分成 4 折。\n-   对于每组超参数，使用拟合数据集拟合 4 个独立的模型。\n-   整体验证性能就是这\
    \ 4 个模型在其各自验证折上性能的平均值。\n-   选择优化整体验证性能的超参数值，并在将模型发送到外层循环之前，使用完整的训练数据重新训练模型。\n\n\
    通常，k 折交叉验证仅用于模型调优，而最终性能评估仅使用单个测试保持集进行。这种传统的交叉验证方法如图 3.10 所示。\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_74_0.png)\n\
    \n让我们将 k 折交叉验证技术应用于我们的示例数据集，以找到最优的多项式次数。我们将使用 Sklearn 提供的 `KFold` 工具函数，该函数返回在每个\
    \ k 折中属于拟合和验证子集的数据点索引。\n\n```python\n# 分离训练和测试数据\nfrom sklearn.model_selection\
    \ import train_test_split\nx_train, x_test, y_train, y_test = train_test_split(x,\
    \ y, test_size=0.2, random_state=1)\n\n# 在训练数据上生成 k=3 折\nfrom sklearn.model_selection\
    \ import KFold\nkfold = KFold(n_splits = 3, shuffle = True, random_state = 1)\n\
    \n# 使用 K 折计算验证性能\nfrom sklearn.metrics import mean_squared_error as mse\noverall_fit_MSEs\
    \ = [] # 不同多项式次数的整体误差\noverall_val_MSEs = []\n\nmax_polyDegree = 5\nfor poly_degree\
    \ in range(1, max_polyDegree+1): # 循环遍历超参数\n    pipe['poly'].degree = poly_degree\n\
    \n    split_fit_MSEs = [] # 不同折的误差\n    split_val_MSEs = []\n\n    for fit_indices,\
    \ val_indices in kfold.split(x_train): # 循环遍历各折\n        x_fit = x_train[fit_indices]\n\
    \        y_fit = y_train[fit_indices]\n        x_val = x_train[val_indices]\n\
    \        y_val = y_train[val_indices]\n\n        # 拟合与预测\n        pipe.fit(x_fit,\
    \ y_fit)\n        y_pred_fit = pipe.predict(x_fit)\n        y_pred_val = pipe.predict(x_val)\n\
    \n        # 计算平均误差并追加\n        split_fit_MSEs.append(mse(y_fit, y_pred_fit))\n\
    \        split_val_MSEs.append(mse(y_val, y_pred_val))\n\n    overall_fit_MSEs.append(np.mean(split_fit_MSEs))\n\
    \    overall_val_MSEs.append(np.mean(split_val_MSEs))\n```\n\n下图显示了得到的验证曲线，它更符合预期。请注意，Sklearn\
    \ 提供了一个 `cross_val_score` 函数，可以用来替代我们上面代码中对折的循环。\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_76_0.png)\n\
    \nK 折交叉验证是 Sklearn 多个函数（如 `validation_curve`）中内置的默认交叉验证技术。该技术的缺点是计算成本高，因为模型拟合需要执行多次。因此，对于基于深度学习的解决方案（其本身就需要使用大数据集），三路保持法通常是首选。\n\
    \n## Choosing number of folds\n\nk 折交叉验证中 *k* 的典型（且通常是默认）值是 10。对于大型数据集，可以使用较小的值（k\
    \ = 3 或 5）。当我们增加 *k* 时，放入验证集的样本更少；这会导致不同折之间验证分数的方差更高，这是不希望看到的。一个极端情况是折数等于训练样本数。这被称为留一法交叉验证，当训练样本数量非常有限时使用。\n\
    \n## Regularization\n\n如果你的模型过拟合，要做的事情之一是检查模型参数（线性模型的权重系数）的值。你可能会发现其中一些或全部具有非常大的值。这是有问题的，因为模型对具有高系数的输入变量变得非常敏感，即模型对于这些输入变量的微小变化就会预测出大的响应变化。这对于真实的流程系统来说不太可能成立。例如，以下是我们示例数据集使用\

  md: 'As the plots show, RL agent is able to keep the liquid level within the most
    profitable region by nicely modulating the valve opening. For example, around
    110 seconds, when the disturbance flow increases sharply, RL controller opens
    the valve further to keep the level stable. Remember that RL agent does not have
    knowledge of the disturbance’s magnitude. It has been trained to take an optimal
    decision only using information about the current liquid level and the rate of
    change of level.


    As previously mentioned, RL training may throw up several challenges at you. However,
    you do have several recourses. Reformulating your problem can be a worthwhile
    thing to do. For example, in the tank level control problem, you may use $\Delta
    f$ (change in valve opening) as the action and add the current $f$ as another
    state variable$^{80}$. You may also engineer the reward function differently and
    penalize the controller for making large action moves. More recent algorithms
    such as TD3, PPO may be tried that try to tackle the training stability issues.
    Hopefully, you have now gained adequate understanding of RL fundamentals to help
    you judge your situation appropriately and make wise decisions.


    This concludes our quick tour of the world of reinforcement learning. As remarked
    before, RL is a vast field and many more algorithms have been proposed since DDPG
    which are gaining popularity. The exposition in this chapter will help you get
    started with RL and think of all the different ways you can utilize this powerful
    tool. Unlike other ML technologies, RL has not yet seen widespread adoption in
    the process industry (due to long training times, difficulty in imposing process
    constraints, requirement of adequate simulator for initial offline training, etc.).
    However, considering the amount of research ongoing in RL and increasing ease
    of availability of cheap computational resources, it is not far-fetched to state
    that RL will play an important role in industrial process control in the near
    future.


    # Summary


    In this chapter, we looked at theoretical and practical aspects of RL. We studied
    two popular algorithms namely, Q-learning and DDPG, in detail. We developed a
    RL-based controller for controlling the fluid level in a tank. We hope that RL
    is no longer a mystery for you. With this chapter, we have also reached the end
    of our ML journey. During this journey, you picked up several powerful tools.
    As our parting message, we would just advise you the ‘No Free Lunch’ theorem that
    states that no single method exists that can obtain best results all the time.
    Hopefully, the knowledge you gained from the book will help you make the right
    (and educated) modeling choices for your problems. All the best!


    $^{80}$ Sometimes, to ensure that the state vector has all the needed information,
    you may need to add some past observations and actions in your state vector. This
    is analogous to data augmentation we have seen previously.'

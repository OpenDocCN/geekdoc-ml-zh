  md: '# TensorFlow


    For classical ML implementations, we utilized the packages available in Scikit-learn.
    For ANNs, other specialized libraries are commonly used which make it very easy
    to build neural net models. TensorFlow (by Google) and PyTorch (by Facebook) are
    the two most popular deep learning frameworks. These frameworks provide specialized
    algorithms for efficient training of ANNs.


    Direct application of TensorFlow (TF) is not very straightforward and involves
    a steep learning curve. Modelers often utilized Keras, a high-level API built
    on top of TF, for ANN modeling. However, the latest version of TF released by
    Google in 2019 has integrated Keras directly into TF. This has made it possible
    to define, train, and evaluate ANN models in just a few lines of code. We will
    use TensorFlow Keras API in this book. The next section shows a quick application
    for modeling a combined cycle power plant to illustrate the ease of usage of these
    deep learning libraries.


    > Neural Nets for Process Systems: Brief History


    The deep learning revolution has been a shot in the arm of the ML researchers
    in PSE community who are now exploring ‘daring’ applications of ANNs such as replacing
    model predictive controllers (MPCs) with ANNs by ‘learning’ MPC’s optimal policies+.
    However, neural nets are not new for PSE community. Pre-deep learning era saw
    several interesting ANN applications for process systems as well. Venkatasubramanian++
    and Himmelbalu+++ provide excellent accounts on the history of ANNs in PSE.


    The 90s was a relatively high-activity period which witnessed applications of
    ANNs for fault detection, soft-sensing, data reconciliation*, etc. This was followed
    by a decline in the interest in ANNs due to computational limitations and lack
    of big data. Today, these limitations having largely been overcome, ANNs are poised
    to make significant impact in PSE.


    +Kumar et. al., Industrial, large-scale model predictive control with structured
    neural networks, Computers and Chemical Engineering, 2021

    ++Venkat Venkatasubramanian, The promise of artificial intelligence in chemical

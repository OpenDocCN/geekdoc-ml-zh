    # 12.2 System Identification via LSTM RNN for SISO Heater System


    The task of building mathematical models of dynamical processes using input and
    output data is referred to as system identification (SI). RNNs are aptly suited
    for SI as they are designed to capture dynamic relationships. To illustrate this,
    we will use data from a single input single output (SISO) heater system where
    heater power output is manipulated to maintain desired system temperature. The
    dataset contains 4 hours of training data and 14 minutes of test data. Data is
    sampled at every second. Our modeling objective is to predict the next temperature
    value using the current and past data. Let us first quickly look at training data.


    ```


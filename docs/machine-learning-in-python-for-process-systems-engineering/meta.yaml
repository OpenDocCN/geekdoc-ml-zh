    \ Web 应用的快速部署，并且非常易于学习。CherryPy 提供了一个生产就绪的 Web 服务器，可以轻松处理中等规模的 Web 应用程序，因此适合我们的目的。\n\
    \n对于这个简单的应用，让我们在 Python 脚本<sup>82</sup> *helloWorld.py* 中输入以下代码，并在 Anaconda 命令终端中执行（要从\

    \n核PCA（KPCA）简单地涉及在特征空间中实现PCA。然而，找到将原始数据映射到特征空间的非线性映射的任务并非易事。为了克服这一点，采用了另一种称为核技巧的技巧。虽然我们将把核技巧的详细研究推迟到第7章，但鼓励读者参阅Lee等人的工作<sup>21</sup>，以了解基于KPCA的过程监控中监控指标的计算细节。下面的代码展示了如何使用KernelPCA库分析图2.11中的数据。\n\

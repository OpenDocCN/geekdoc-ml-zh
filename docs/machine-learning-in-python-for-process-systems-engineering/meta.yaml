    \n$$T_{CL}^2 = \\frac{k(N^2-1)}{N(N-k)} F_{k,N-k}(\\alpha)$$\n\nThe second and\
    \ third indices, $SPE_x$ and $SPE_y$, represents the residuals or the unmodelled\

    \n## 第四部分 在Web上部署机器学习解决方案\n\n### 第14章 过程监控Web应用\n\n- 14.1 过程监控Web应用简介\n- 14.2\
    \ 一个简单的‘Hello World’ Web应用\n- 14.3 将机器学习模型嵌入Web应用\n- 14.4 构建前端用户界面\n\n## 附录\n\n\
    - 数据集描述\n- 聚合物制造过程数据\n- 纸浆与造纸制造过程数据\n- 低密度聚乙烯（LDPE）过程数据\n- 田纳西-伊士曼过程数据\n- 半导体制造过程数据\n\
    - 聚合物中试装置数据\n- 炼油厂脱丁烷塔数据\n- 混凝土抗压强度数据\n- 污水处理厂数据\n- 联合循环电厂数据\n- SISO加热器系统数据\n\
    - 燃气轮机数据\n\n## 前言\n\n我们每天都能听到机器学习（ML）和人工智能（AI）研究人员取得新突破的故事，这些突破有可能彻底改变我们的世界。通过类人机器人、语音识别、计算机视觉、无人驾驶汽车、欺诈检测、个性化推荐和自动化健康诊断，机器学习已经成为我们日常生活中不可或缺的一部分。此外，远离这些‘可见’高科技产品的光环，机器学习在过程工业（化学工业、生物制药工业、钢铁工业等）中也一直在悄然进步，基于机器学习的解决方案正越来越多地用于预测性设备维护、产品质量保证、过程监控、故障诊断、过程控制和过程优化。随着全球竞争加剧和产品质量标准日益严格，工业工厂正依赖机器学习工具（例如基于强化学习的自适应过程控制器）来获得超越竞争对手的优势。\n\
    \n也许你阅读这本书，是因为你也受到了机器学习能力的启发，并希望用它来解决你的组织面临的问题。然而，你可能正在努力寻找一本明确的指南，帮助你在众多可用方法中决定选择哪种具体方法。你可能遇到过一篇很好的研究文章，展示了一种机器学习方法在过程系统中的有趣应用。但是，你可能在理解算法的复杂细节时遇到了困难。如果你曾努力寻找一本满足过程系统工程师需求、考虑工业过程系统独特特性并使用工业规模过程系统进行示例的数据科学书籍，我们不会感到惊讶。我们作者也曾经历过那个阶段。可以说，过程工程师通过完成一个过程监控应用（机器学习在过程工业中最流行的应用领域）来学习主成分分析（PCA），并学习如何计算监控指标，会发现这更相关、更有用。对于其他几种流行的机器学习方法，也可以提出类似的论点。现有的机器学习资源对于工业从业者来说存在空白，而本书试图填补这一空白。\n\
    \n从某种意义上说，我们是为我们年轻的自己写了这本书；一本我们希望在开始尝试机器学习技术时就已经存在的书。根据我们多年开发数据驱动工业解决方案的经验，本书的写作重点在于理清机器学习的世界，全面阐述在过程工业中已被证明有用的机器学习工具，逐步阐明实施细节，警示各种陷阱，并列出我们多年来遇到的各种技巧和窍门，同时使用来自工业规模过程系统的数据集进行示例。我们坚信‘边做边学’，因此我们鼓励读者在阅读文本的同时，完成章节内的示例。为方便读者，我们提供了包含完整代码实现的Jupyter笔记本供下载。我们选择Python作为本书的编程语言，因为它使用方便，拥有大量的机器学习库，并且是机器学习的事实标准语言。本书不要求具备Python的先验经验。本书旨在从零开始教授机器学习，完成后，读者将能够自如地使用机器学习技术。\n\
    \n机器学习将继续在释放过程工业下一波生产力提升方面发挥重要作用。我们希望这本书能激励读者开发新的机器学习解决方案，以应对工作中的挑战性问题。我们祝愿所有新兴的过程系统数据科学家一切顺利。\n\
    \n## 谁应该阅读这本书\n\n本书全面、逐步地阐述了几种在过程工业中已被证明有用的流行机器学习技术。书中包含了以‘边做边学’形式呈现的、与工业相关的示例。每章都提供了对特定主题高级内容的适当参考。因此，本书对工业过程技术人员、本科生和研究生、机器学习研究人员以及一般数据科学爱好者都将有所帮助。如果你属于以下任何一类，你将会喜欢阅读这本书。\n\

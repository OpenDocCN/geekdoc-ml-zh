    | Function | Equation | Graph | Remarks |

    |---|---|---|---|

    | ReLU | $g(z) = \begin{cases} 0, & z < 0 \ z, & z \ge 0 \end{cases}$ | ![ReLU
    Graph](image_2.png) | - works very well and preferred AF<br>- computationally
    cheap<br>- "dead" neurons for z <0 (not a big issue if ''learning-rates'' are
    properly set) |

    | Leaky ReLU | $g(z) = \begin{cases} \alpha z, & z < 0 \ z, & z \ge 0 \end{cases}$
    | ![Leaky ReLU Graph](image_3.png) | - alternative if ''dead'' ReLU neurons cause
    issues<br>- may not perform better than ReLU |

    | Hyperbolic tangent (tanh) | $tanh(z) = \frac{e^z - e^{-z}}{e^z + e^{-z}}$ |
    ![Tanh Graph](image_4.png) | - Range: (-1, 1)<br>- prone to vanishing gradient
    issue and computationally expensive |


    # Activation functions for output layer:


    The choice of activation function in the output layer depends on the task at hand.
    For regression problems, no activation function (equivalently, $g(z) = z$ linear
    function) is used. For classification tasks where the classes are mutually exclusive,
    softmax function is employed. Figure 11.6 shows a network for 3 exclusive classes
    with softmax activation in the output layer.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_252_1.png)


    Figure 11.6: FFNN with softmax activation function. (Subscripts denoting layers
    are not shown for clarity)'
  - '[PAGE 253]


    Softmax is an exponential function that generates normalized activations so that
    they sum up to 1. In Figure 11.6, activation $a_j (j \in [1, 2, 3])$ is generated
    as follows


    $$a_j = g_{softmax}(z_j) = \frac{e^{z_j}}{\sum_{k=1}^3 e^{z_k}}$$


    In ANN world, the pre-activations ($z_j$) that are fed as inputs to the softmax
    function as also called logits. The softmax activations lie between 0 and 1, and
    hence, they are interpreted as class-membership probabilities. The predicted class
    label is taken as the class with maximum probability (or activation)


    $$\hat{y} = argmax(a_j, j \in [1, 2, 3])$$


    As you will see in next subsection, the predicted class probabilities (and not
    the predicted class label) are directly used during model training. For classification
    tasks where the classes are not mutually exclusive, sigmoid function is employed
    in the neurons of the output layer. Sigmoid function is also used for binary mutually
    exclusive classification problems with a single neuron in the output layer.


    # Loss functions & cost functions


    ANNs optimize their model parameters by minimizing the mismatch between measured
    and predicted values of the target variable(s). Loss function quantifies this
    mismatch for a single sample. The average of loss function over the samples of
    the training dataset that is minimized during model training is called cost function.
    For regression problems, the commonly employed loss function is mse (mean squared
    error)


    $$MSE \ Loss = (y_{sample} - \hat{y}_{sample})^2$$


    The corresponding cost function becomes


    $$MSE \ Cost = \frac{1}{\# \ of \ samples} \times \sum_{samples} (y_{sample} -
    \hat{y}_{sample})^2$$


    Note that the above expression is for a scalar output; for multi-dimensional output,
    summation is also carried over different dimensions. Other popular loss metric
    for regression is mae (mean absolute error) which measures the absolute difference
    $|y_{sample} - \hat{y}_{sample}|$. MAE cost is more robust to outliers compared
    to MSE as large errors are not heavily penalized through squaring. Mae metric,
    however, is less efficient due to the discontinuous nature. A good compromise
    can be achieved by rmse (root mean squared error) metric.'
  - '[PAGE 254]


    For binary/2-class classification problems, binary cross-entropy is the default
    loss function. Let $y$ (can take value 0 and 1) be the true label for a data sample
    and $p$ (or $\hat{y}$) be the predicted probability (of $y = 1$) obtained from
    sigmoid output layer. The cross-entropy loss is given by


    $$Cross - entropy Loss = -y * log(p) - (1 - y) * log(1 - p) = \begin{cases} -log(1
    - p), & y = 0 \ -log(p), & y = 1 \end{cases}$$


    The above expression is generalized as follows for a multiclass classification,
    where overall loss is sum of separate losses for each class label


    $$Multi - class cross - entropy Loss = - \sum_{c=1}^{\# \text{ of classes}} y_c
    log(p_c)$$


    where, $y_c$ and $p_c$ are binary indicator and predicted probability of a sample
    belonging to class $c$, respectively. Note that for multi-class classification,
    the target variable will be in one-hot encoded form.


    # Gradient descent optimization


    Once the cost/objective function ($J(\theta)$) has been defined, the model parameters
    ($\theta$) are optimized to minimize the cost function. The most common optimization
    approach used by deep learning libraries is gradient descent where model parameters
    are estimated in multiple iterations, and in each iteration parameters are updated
    in the direction of steepest descent (negative of the gradient of $J(\theta)$
    with respect to $\theta$). The expression below shows the update mechanism for
    the $i^{th}$ model parameter


    $$\theta_{i, next} = \theta_{i, current} - \eta \frac{\partial}{\partial \theta_i}
    J(\theta)$$


    where $\eta$ (learning rate), a hyperparameter, determines the magnitude of update
    in each iteration. For illustration, Figure 11.7 shows the progression of cost
    function towards its minima through multiple iterations for simple systems (one
    and two model parameters).


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_254_0.png)'
- md: 'The learning rate influences the speed of optimization convergence. Large learning
    rates during initial iterations help to quickly reach close to the minima point;
    however, large values can also lead divergence instead of convergence. On the
    other hand, too small learning rates leads to very slow convergence. To deal with
    this trade-off, learning rate is often adjusted during training via learning rate
    schedule (reducing $\eta$ over iterations) or in-built mechanism in modern optimizers
    (more common approach now-a-days).


    A drawback of the classical (or vanilla) gradient descent is that the optimizer
    is slow and often gets stuck in local minima. As a remedy, several variations
    of the vanilla approach have been devised which have been shown to provide better
    performance. These variations include Momentum optimization, Nesterov Accelerated
    Gradient, AdaGrad, RMSProp, and Adam optimization. Among these, Adam (adaptive
    moment estimation) optimization, which combines the ideas of momentum optimization
    and RMSProp, is recommended as the default optimizer to use.


    > Like with everything, Adam may not give good performance for some cases; in
    those cases, other optimizers should be tried. With Adam optimization you don''t
    have to worry about learning rate scheduling as it''s an adaptive learning rate
    algorithm, although the initial learning rate may need adjustments for some problems.
    Adam does have a few hyperparameters of its own but usually the default values
    work fine.


    The superior performance of Adam optimization over gradient descent stems from
    several algorithmic innovations which includes, amongst others, using exponentially
    decaying average of past gradients to determine update direction. You are encouraged
    to check out this article$^{59}$ for an intuitive explanation of how these optimizers
    work.


    ## Epochs & batch-size


    In vanilla gradient descent, the entire training dataset is used for computing
    the gradient in each iteration. Due to this, for large datasets, each iteration
    can become very slow. This approach, aka batch gradient descent, is also not suitable
    for updating models online, i.e., updating models quickly with new data samples.
    Mini-batch gradient descent (MGD) and stochastic gradient descent (SGD) are two
    alternative approaches.


    In mini-batch variation, for each parameter update iteration, only a subset of
    the training dataset goes into gradient computation. The number of samples in
    a subset is called batch-size. Batch sizes commonly range between 32 and 256.
    MGD results in faster convergence and noisier/oscillating gradients (different
    mini-batches can generate very different update directions), as shown in Figure
    11.8. An advantage of noisier gradients is that it can help the optimizer to escape
    local minima. Stochastic gradient descent (not common now) is the extreme case
    of mini-batch variant where batch-size is just one! Although not technically correct,
    practitioners employ the term SGD also when mini-batches are used.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_256_0.png)


    Figure 11.8: Mini-batch & stochastic gradient descents have noisier gradients
    compared to batch gradient descent


    In MGD, several iterations (equal to $\frac{\text{\# of training samples}}{\text{batch
    size}}$) are needed for the optimizer to go through the entire training dataset,
    also referred to as completion of one epoch. At the start of every epoch, training
    dataset is usually shuffled (to prevent optimizer getting stuck in cycles), divided
    into mini-batches, and then update iterations continue. Number of epochs is another
    crucial hyperparameter. Training and validation accuracies are plotted against
    epochs rather than iterations to keep track of model fitting. More epochs will
    lead to better training accuracy but can result in worse validation accuracy.
    We will learn more about it later. A simple thumb-rule is to use more epochs for
    higher batch sizes.


    ## Backpropagation


    Backpropagation computes the gradients of the cost function with respect to the
    model parameters efficiently through smart usage of chain rule of derivative computation.
    For conceptual understanding of the mechanism, let''s focus on SGD (for ease of
    explanation) and assume that we are interested in computing the gradient with
    respect to $\omega_1$ as highlighted in Figure 11.9.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_257_0.png)


    Figure 11.9: Illustration of backpropagation mechanism


    Chain rule gives us the following expressions


    $$\frac{\partial J}{\partial \omega_1} = \frac{\partial J}{\partial a} \times
    \frac{\partial a}{\partial \omega_1} = \frac{\partial J}{\partial a} \times (\frac{\partial
    a}{\partial z} \times \frac{\partial z}{\partial \omega_1})$$


    While $\frac{\partial z}{\partial \omega_1}$ is simply $x_1$ and $\frac{\partial
    a}{\partial z}$ is derivative of the activation function, $\frac{\partial J}{\partial
    a}$ is the unknown element here. However, it is easy to show that this unknown
    part can be computed if partial derivatives of cost function with respect to the
    activations of the $2^{nd}$ hidden layer are known, which themselves need the
    derivative of cost with respect to output layer activation or $\hat{y}$. This
    final missing element is given by


    $$\frac{\partial J}{\partial \hat{y}} = \frac{\partial}{\partial \hat{y}} (y -
    \hat{y})^2 = \frac{1}{2}(y - \hat{y})$$


    The above discussion shows that once the activations, predicted output, and error
    are computed by forward propagation, backward propagation is employed to compute
    required gradients one layer at a time starting from the last layer. For MGD,
    through careful bookkeeping, a compact vector-matrix form of backpropagation can
    be obtained just like we did for forward pass. Note that technically backpropagation
    only refers to the mechanism for gradient computation, but the term is often used
    to refer to the entire model fitting algorithm.


    ## Vanishing/Exploding gradients


    In the past, the issue of vanishing or exploding gradients posed great difficulty
    in model fitting for deep networks. In backpropagation, we saw that gradients
    are propagated from the output layer towards the inner layers. Some of these gradients
    were derivatives of activation functions, which, for sigmoid and tanh functions,
    become very small for high pre-activations.


    In the case of vanishing gradient scenario, gradients of inner layer parameters
    become very small due to products of small gradients propagating from the outer
    layers. This causes virtual halt of inner parameter updates leading to slow convergence
    and poor model fitting. On the other hand, sometimes, the problem arises due to
    gradients becoming very large due to large weights. Due to backpropagation the
    problem gets compounded and causes training failure.


    The paper by Glorot and Bengio (titled ‘Understanding the difficulty of training
    deep feedforward neural networks’) provides excellent investigation on these issues.
    The usage of sigmoid activation function and poor initialization schemes were
    found to be some of the culprits. Today, these issues have mostly been curtailed
    through usage of ReLU functions, batch normalization, correct initialization schemes,
    etc.


    ## 11.4 Non-linearity in Neural Nets (width vs depth)


    While designing a neural network for complex nonlinear models, one of the most
    crucial decision that you will make is to decide between adding more neurons in
    a layer (increasing network width) and adding more hidden layers (increasing network
    depth). Both network width and depth influence network performance, albeit in
    different manners. Before we delve further into this ‘width vs depth’ question,
    let us analyze the role of ReLU activation functions in some more details – this
    will provide some clues to help us make the above decision.


    Consider an absolute function that takes a scalar input and outputs the absolute
    value. This nonlinear function can be perfectly modeled via a FFNN with 1 hidden
    layer containing 2 nodes with ReLU activation function as shown in Figure 11.10.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_258_0.png)


    We were able to model the nonlinear absolute function perfectly because the ReLU-based
    neurons effectively bifurcated the input space into 2 regions (x <=0 and x>=0)
    where linear relationships hold; essentially, the absolute function got modeled
    via two piecewise linear functions. Continuing this logic, now assume that the
    scalar input-output system follows a'
  mdcn: '学习率影响优化收敛的速度。在初始迭代中使用较大的学习率有助于快速接近最小值点；然而，过大的值也可能导致发散而非收敛。另一方面，过小的学习率会导致收敛非常缓慢。为处理这种权衡，学习率通常在训练过程中通过学习率调度（随迭代次数降低
    $\eta$）或现代优化器中的内置机制（目前更常见的方法）进行调整。


    经典（或普通）梯度下降的一个缺点是优化器速度慢且容易陷入局部最小值。为此，人们设计了多种普通方法的变体，这些变体已被证明能提供更好的性能。这些变体包括动量优化、Nesterov加速梯度、AdaGrad、RMSProp和Adam优化。其中，Adam（自适应矩估计）优化结合了动量优化和RMSProp的思想，被推荐作为默认使用的优化器。


    > 与所有事物一样，Adam在某些情况下可能表现不佳；在这些情况下，应尝试其他优化器。使用Adam优化时，你不必担心学习率调度，因为它是一种自适应学习率算法，尽管对于某些问题，初始学习率可能需要调整。Adam确实有一些自己的超参数，但通常默认值就能很好地工作。


    Adam优化相对于梯度下降的优越性能源于多项算法创新，其中包括使用过去梯度的指数衰减平均值来确定更新方向。我们鼓励你查阅这篇文章$^{59}$，以直观了解这些优化器的工作原理。


    ## Epochs与batch-size


    在普通梯度下降中，每次迭代都使用整个训练数据集来计算梯度。因此，对于大型数据集，每次迭代可能变得非常缓慢。这种方法，也称为批量梯度下降，也不适合在线更新模型，即使用新数据样本快速更新模型。小批量梯度下降（MGD）和随机梯度下降（SGD）是两种替代方法。


    在小批量变体中，每次参数更新迭代只使用训练数据集的一个子集进行梯度计算。子集中的样本数量称为batch-size。批量大小通常在32到256之间。MGD导致更快的收敛和更嘈杂/振荡的梯度（不同的小批量可能产生非常不同的更新方向），如图11.8所示。更嘈杂的梯度的一个优点是它可以帮助优化器逃离局部最小值。随机梯度下降（现在不常见）是小批量变体的极端情况，其中batch-size仅为1！虽然技术上不正确，但从业者在使用小批量时也使用SGD这个术语。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_256_0.png)


    图11.8：小批量和随机梯度下降的梯度比批量梯度下降更嘈杂


    在MGD中，优化器需要多次迭代（等于 $\frac{\text{训练样本数}}{\text{批量大小}}$）才能遍历整个训练数据集，这也称为完成一个epoch。在每个epoch开始时，训练数据集通常会被打乱（以防止优化器陷入循环），分成小批量，然后继续更新迭代。epoch数量是另一个关键超参数。训练和验证准确率是针对epoch而非迭代绘制的，以跟踪模型拟合情况。更多的epoch将导致更好的训练准确率，但可能导致更差的验证准确率。我们稍后将了解更多。一个简单的经验法则是，对于较大的批量大小，使用更多的epoch。


    ## 反向传播


    反向传播通过巧妙使用导数计算的链式法则，高效地计算代价函数相对于模型参数的梯度。为了从概念上理解该机制，让我们专注于SGD（为便于解释）并假设我们感兴趣的是计算相对于
    $\omega_1$ 的梯度，如图11.9所示。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_257_0.png)


    图11.9：反向传播机制示意图


    链式法则给出以下表达式


    $$\frac{\partial J}{\partial \omega_1} = \frac{\partial J}{\partial a} \times
    \frac{\partial a}{\partial \omega_1} = \frac{\partial J}{\partial a} \times (\frac{\partial
    a}{\partial z} \times \frac{\partial z}{\partial \omega_1})$$


    虽然 $\frac{\partial z}{\partial \omega_1}$ 就是 $x_1$，$\frac{\partial a}{\partial
    z}$ 是激活函数的导数，但 $\frac{\partial J}{\partial a}$ 是这里的未知元素。然而，很容易证明，如果已知代价函数相对于第二隐藏层激活的偏导数，就可以计算出这个未知部分，而这些偏导数本身又需要代价相对于输出层激活或
    $\hat{y}$ 的导数。这最后一个缺失的元素由下式给出


    $$\frac{\partial J}{\partial \hat{y}} = \frac{\partial}{\partial \hat{y}} (y -
    \hat{y})^2 = \frac{1}{2}(y - \hat{y})$$


    上述讨论表明，一旦通过前向传播计算出激活值、预测输出和误差，就会采用反向传播，从最后一层开始逐层计算所需的梯度。对于MGD，通过仔细的记录，可以获得反向传播的紧凑向量-矩阵形式，就像我们为前向传播所做的那样。请注意，技术上反向传播仅指梯度计算的机制，但该术语通常用于指代整个模型拟合算法。


    ## 梯度消失/爆炸


    过去，梯度消失或爆炸问题给深度网络的模型拟合带来了巨大困难。在反向传播中，我们看到梯度从输出层向内层传播。其中一些梯度是激活函数的导数，对于sigmoid和tanh函数，当预激活值较高时，这些导数会变得非常小。


    在梯度消失的情况下，由于从外层传播的小梯度的乘积，内层参数的梯度变得非常小。这导致内层参数更新实际上停止，从而导致收敛缓慢和模型拟合不佳。另一方面，有时问题源于由于权重过大而导致梯度变得非常大。由于反向传播，问题加剧并导致训练失败。


    Glorot和Bengio的论文（题为“理解训练深度前馈神经网络的困难”）对这些问题进行了出色的调查。研究发现，使用sigmoid激活函数和不良的初始化方案是罪魁祸首之一。如今，这些问题大多通过使用ReLU函数、批量归一化、正确的初始化方案等得到了遏制。


    ## 11.4 神经网络中的非线性（宽度与深度）



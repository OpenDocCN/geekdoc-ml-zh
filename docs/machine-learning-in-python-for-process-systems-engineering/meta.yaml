    # 9.1 Decision Trees: An Introduction


    Decision trees (DTs) are inductive learning methods which derive explicit rules
    from data to make predictions. They partition the feature space into several (hyper)
    rectangles and then fit a simple model (usually a constant) in each one. As shown
    in Figure 9.1 for a binary classification problem in 2D feature space, the partition
    is achieved via a series of if-else statements. As shown, the model is represented
    using branches and leaves which lead to a tree-like structure and hence the name
    decision tree model. The questions asked at each node make it very clear how the
    model predictions (class A or class B) are being generated. Consequently, DTs
    become the model of choice for applications where ease of rationalization of model
    results is very important.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_207_0.png)


    The trick in DT model fitting lies in deciding which questions to ask in the if-else
    statements at each node of the tree. During fitting, these questions split the
    feature space into smaller and smaller subregions such that the training observations
    falling in a subregion are similar to each-other. The splitting process stops
    when no further gains can be made or stopping criteria have been met. Improper
    choices of splits will generate a model that does not generalize well. In the
    next subsection, we will study a popular DT training algorithm called CART (classification
    and regression trees) which judiciously determines the splits.


    # Mathematical background


    CART algorithm creates a binary tree, i.e., at each node two branches are created
    that split the dataset in such a way that overall data ‘impurity’ reduces. To
    understand this, consider'
  - '[PAGE 208]


    the following node<sup>41</sup> of a tree. Also assume that we are dealing with
    binary classification problem with input vector $x \in R^m$.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_208_0.png)


    The algorithm needs to decide which one of the $m$ input variables, $x_k$, will
    be used to split the set of $n$ samples at this node and with what threshold $r$.
    CART makes this determination by minimizing the following objective


    $$J(k, r) = \frac{n_{left}}{n} I_{left} + \frac{n_{right}}{n} I_{right}$$


    where $I_{left/right}$ denote the data impurity of the left/right subsets of data
    and is given by


    $$I = 1 - \sum_{q=1}^{2} p_q^2$$


    where $p_q$ is the ratio of samples of the corresponding data subset belonging
    to class $q$. For example, if all the samples in a subset belong to class 1, then
    $p_1 = 1$ and $I = 0$. Therefore, if CART could find $k$ and $r$ such that the
    $n$ samples get perfectly divided class-wise into the left and right subsets,
    then the minimum value of $J = 0$ will be obtained. However, this is usually not
    possible, and CART tries to do the best it can. The reduction in impurity ($\Delta
    I_{node}$) achieved by CART at this node is given by $nI_{node} - \frac{n_{left}}{n}
    I_{left} - \frac{n_{right}}{n} I_{right}$.


    CART simply follows the aforementioned branching scheme recursively. It starts
    from the top node (root node) and keeps splitting the subsets. If a node cannot
    be split any further (because impurity cannot be reduced anymore or some hyperparameter
    settings such as min_samples_split, min_samples_leaf prevent any further split),
    the node becomes a leaf or terminal node. For prediction, the leaf node corresponding
    to the test sample is found and the majority class from the leaf''s training subset
    is assigned to the test sample. Note that a probabilistic prediction for class
    $q$ can also be made by simply looking at the ratio of the leaf''s training samples
    belonging to class $q$.'
  - '[PAGE 209]


    In classical DTs, as we have seen, the split decision rules (or split functions)
    at the nodes are based on a single variable. This results in axis-aligned hyperplanes
    that split the input space into several hyperrectangles. Complex split functions
    using multiple variables may also be used which may be more suitable for certain
    datasets – one such example is shown below


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_209_0.png)


    Fitting DTs with complex split functions, however, becomes computationally much
    more demanding. Therefore, a general recommendation is to transform your dataset
    using dimensionality reduction techniques like PCA, FDA before fitting tree using
    simple split functions.


    For regression problems, a tree is built in the same way with a different objective
    function, $J(k,r)$, which now is given by


    ```

    $$J(k,r) = \frac{n_{left}}{n} MSE_{left} + \frac{n_{right}}{n} MSE_{right}$$

    ```


    Where $MSE_{left/right}$ denote the mean-squared error at the left/right node


    ```

    $$MSE = \frac{\sum_{sample \in subset} (\hat{y} - y_{sample})^2}{\# \text{ of
    samples}}$$

    ```


    $\hat{y}$ is the average output of the samples belonging to a subset. Prediction
    for a test sample is also taken as the average output value of all training samples
    assigned to the test sample''s leaf node.


    You are not confined to using the constant predictive models at the leaves of
    a regression tree. Linear and polynomial predictive models may be more suitable
    for certain problems. Such DTs are called model trees. While Sklearn allows only
    the constant model, there exists a package$^{42}$ called ''linear-tree'' that
    allows building model trees with linear models at the leaves.'
- md: "## Impurity metric\n\nThe impurity measure used in Eq. 1 is called *Gini impurity*.\
    \ Another commonly employed measure is *entropy* and is given as follows for a\
    \ dataset with 2 classes\n\n$$I_H = -\\sum_{q=1}^{2} p_q \\log (p_q)$$\n\n$I_H$\
    \ becomes 0 when $p_1=1$ (or $p_2=0$) and 1 when $p_1=p_2=0.5$. Therefore, reduction\
    \ of entropy leads to more data purity. In practice, both Gini impurity and entropy\
    \ provide similar results.\n\n## Simple Sklearn implementation\n\nThe code below\
    \ illustrates implementation of a DT regression model to a quadratic dataset in\
    \ Sklearn. Figure 9.2a plots the predicted vs actual output values. It is apparent\
    \ that with no restriction on tree depth overfitting has occurred. Subplot 9.2b\
    \ shows the regularizing impact of restricting the depth of the tree to only 3\
    \ levels.\n\n```python\n# generate data\nimport numpy as np\nx = np.linspace(-1,\
    \ 1, 50)[:, None]\ny = x*x + 0.25 + np.random.normal(0, 0.15, (50,1))\n\n# fit\
    \ regularized DT model and predict\nfrom sklearn import tree\nmodel = tree.DecisionTreeRegressor(max_depth=3).fit(x,\
    \ y)\ny_pred = model.predict(x)\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_210_0.png)\n\
    \nYou can use the `plot_tree` function to plot the tree itself to understand how\
    \ the training dataset has been partitioned by the DT model.\n\n```python\n# plot\
    \ tree\nplt.figure(figsize=(20,8))\ntree.plot_tree(model, feature_names=['x'],\
    \ filled=True, rounded=True)\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_211_0.png)\n\
    \nWhile DTs appear to be very flexible and useful modeling mechanism, they are\
    \ seldom used as a standalone model. In Figure 9.2, we saw that DTs can easily\
    \ overfit and give non-smooth or piece-wise constant approximations. Another disadvantage\
    \ with DTs is instability, i.e., small variations in training dataset can result\
    \ in a very different tree. However, there is a reason why we invested time in\
    \ learning DTs. A single tree may not be useful, but when you combine multiple\
    \ trees, you get amazing results. We will learn how this is made possible in the\
    \ next section.\n\n## 9.2 Random Forests: An Introduction\n\nRandom forest (RF)\
    \ is a supervised nonlinear regression and classification modeling technique that\
    \ is made up of several decision trees. These DTs are fit independently to their\
    \ training datasets and RF's predictions are made by averaging the predictions\
    \ of the trees. Figure 9.3 illustrates this scheme. Combining outputs from trees\
    \ results in low variance or more robust model. The trick lies in how these constituent\
    \ trees are generated. The trees are generated in such a way that their prediction\
    \ errors are uncorrelated, resulting in RF being less prone to overfitting (we\
    \ will concretize this concept mathematically soon).\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_212_0.png)\n\
    \nIn random forest, the trees are grown to full extent, and therefore, hyperparameter\
    \ selection for the trees is not a concern. This makes RF's training and execution\
    \ simple and quick. Infact RFs have very small number of tunable hyperparameters.\
    \ RFs also lend themselves useful for computation of variable importances. All\
    \ these qualities have led to the popularity of random forests.\n\n### Mathematical\
    \ background\n\nFor RF training different trees need to be generated that are\
    \ as 'distinct from each-other' as possible but at the same time provide good\
    \ descriptions of the training dataset. This variety among the trees are achieved\
    \ via the following two means:\n\n1) **Using different training datasets for each\
    \ tree:** If each tree is trained on the same dataset, they will end up being\
    \ identical, make the same kind of errors, and therefore combining them will offer\
    \ little benefit. Since we only have a single training dataset to train the RF,\
    \ bootstrapping is employed. If original dataset has $N$ samples, bootstrapping\
    \ allows creation of multiple datasets, each with $N_b$ ($\\le N$) samples, such\
    \ that each new dataset is also a good representative of the underlying process\
    \ that generated the original dataset. Each bootstrap dataset is generated by\
    \ randomly selecting $N_b$ samples with replacement from the original dataset.\
    \ In RF, $N_b = N$ and the bootstrapping scheme is illustrated below for $N=10$.\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_213_0.png)\n\n2) **Using random subsets\
    \ of input variables to find the optimal split:** A very non-intuitive, somewhat\
    \ surprising, but incredibly effective aspect of RF training is that not all the\
    \ input variables are considered for determining the optimal split function at\
    \ any node of any tree in the forest. Instead, a random subset of variables is\
    \ chosen and then the node impurity is minimized with these chosen variables.\
    \ This random selection is preformed at every node. If input variable $x \\in\
    \ R^m$, then the number of random split variables ($M$) is recommended to be the\
    \ floored squared root of $m$.\n\nThe above two tricks during training result\
    \ in trees being minimally correlated to each-other. Figure below summarizes the\
    \ RF model fitting procedure. For illustration, it is assumed that $x \\in R^9$\
    \ and $M=3$.\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_214_0.png)\n\nFigure\
    \ 9.5: Illustration of RF training mechanism\n\nYou can see that there are only\
    \ two main hyperparameters to decide: number of trees and the size of variable\
    \ subset. Another advantage with RF is that the constituent trees can be trained\
    \ in parallel.\n\n### Simple Sklearn implementation\n\nLet's fit a RF model to\
    \ the quadratic dataset from Figure 9.2. Figure 9.6 shows the fit with 20 trees\
    \ in the forest. It is apparent that RF provides much smoother predictions compared\
    \ to those from a DT model as we saw before. Predictions from two different constituent\
    \ trees of the forest are also shown. We can see that RF smoothes out the wiggles\
    \ in constituent tree predictions and makes the combined model more stable.\n\n\
    ```python\n# fit RF model and predict\nfrom sklearn.ensemble import RandomForestRegressor\n\
    model = RandomForestRegressor(n_estimators=20).fit(x, y)\ny_pred = model.predict(x)\n\
    \n# get predictions from constituent trees and plot\ntree_list = model.estimators_\
    \ # list of DT models in the RF\ny_pred_tree1 = tree_list[5].predict(x)\ny_pred_tree2\
    \ = tree_list[15].predict(x)\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_215_0.png)\n\
    \nFigure 9.6: (Left) Random forest regression predictions, (middle) predictions\
    \ from a couple of constituent decision trees, (right) Impact of number of trees\
    \ in RF model on validation error\n\nFigure 9.6 also shows the validation error\
    \ for different number of trees in the forest. What we see here is a general characteristic\
    \ of RFs: as number of trees increase, the validation errors plateau out. Therefore,\
    \ if computation time is not a concern, it is preferable to use as many trees\
    \ as possible until the error levels out. As far as $M$ is concerned, a lower\
    \ value leads to greater reduction in variance but increases the model bias. Do\
    \ note that RF primarily brings down the variance (compared to using single DT\
    \ models) and not the bias. Therefore, if DT itself is underfitting the RF won't\
    \ be able to provide high accuracy (or low bias). This is why full-grown trees\
    \ are used in RF. You will find out the reason behind this later in this chapter.\n\

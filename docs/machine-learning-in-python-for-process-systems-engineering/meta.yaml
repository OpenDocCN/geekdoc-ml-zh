    # 6.4 Fault Classification via FDA for Tennessee Eastman Process


    After projecting the samples onto the FDA space, any classification technique
    can be chosen to classify or diagnose the specific fault. A popular $T^2$ statistic-based
    approach entails computing a $T^2$ control limit for each fault class using the
    training data. The $T^2$ control limit ($T^2_{CL,j}$) for the $j^{th}$ fault class
    represents a boundary around the projected samples from the $j^{th}$ fault in
    the lower-dimensional space – any given sample lying inside the boundary belongs
    to the $j^{th}$ fault class. Mathematically, this can be specified as


    $T^2_{sample,j} < T^2_{CL,j} \Rightarrow \text{sample belongs to the } j^{th}
    \text{ fault class}$


    $T^2_{sample,j}$ for a sample for the $j^{th}$ class is given by


    $T^2_{sample,j} = (z_{sample} - \widetilde{\mu}_j)^T \widetilde{S}_j (z_{sample}
    - \widetilde{\mu}_j)$


    where, $\widetilde{\mu}_j$ and $\widetilde{S}_j$ denote the mean and covariance
    matrix of the projected samples belonging to the $j^{th}$ fault class in training
    dataset, respectively, and $z_{sample}$ denotes the projected sample in the FDA
    space. $T^2_{CL,j}$ can be obtained using the same expression we used in PCA,
    $\frac{k(N_j^2-1)}{N_j(N_j-k)} F_{k,N-k}(\alpha)$, where $k$ denotes the number
    of dimensions retained in the FDA space. For illustration, let us see how many
    samples from the Fault 5 test data get correctly identified.


    ```

    # compute control limit

    import scipy.stats

    Nj = n_rows_train

    k = 2


    alpha = 0.01 # 99% control limit

    T2_CL = k*(Nj**2-1)*scipy.stats.f.ppf(1-alpha,k,Nj-k)/(Nj*(Nj-k))


    # mean and covariance for Fault 5 class

    scores_train_lda_Fault5 = scores_train_lda[0:n_rows_train,:]

    cov_scores_train_Fault5 = np.cov(scores_train_lda_Fault5.T)

    mean_scores_train_Fault5 = np.mean(scores_train_lda_Fault5, axis = 0)


    # fetch TE test data for fault 5

    TEdata_Fault5_test = np.loadtxt(''d05_te.dat'')

    TEdata_Fault5_test = TEdata_Fault5_test[160:,:] # faulty operation start sample
    160 onwards

    ```'

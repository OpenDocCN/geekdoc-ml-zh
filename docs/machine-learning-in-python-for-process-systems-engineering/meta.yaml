    \ Next, we will see what techniques can be used to evaluate how well our model\
    \ is performing.\n\n## 3.3 Model Evaluation\n\nAfter model parameters have been\
    \ fitted, we need some means of assessing the model performance to see how well\
    \ (or poorly) the model fits the training data. For this purpose, commonly computed\
    \ metrics for regression and classification tasks are listed below.\n\n| Regression\
    \ | Classification |\n| :--- | :--- |\n| • Mean Squared Error (MSE) | • Confusion\
    \ Matrix |\n| • Mean Absolute Error (MAE) | • Accuracy |\n| • Root Mean Squared\
    \ Error (RMSE) | • Precision, Recall, F1 Score |\n| • R Squared (R²) | • True\
    \ positive rate (TPR), False positive rate (FPR) |\n\nTable 1: Common means of\
    \ evaluating model performance\n\nWhile it is easy to write our own python code\
    \ to compute these metrics, it is even easier to use the sklearn.metrics module\
    \ where these metrics are all implemented. We can import the desired metric class\
    \ from the module and use it as shown below our quadratic fitting example.\n\n\
    ```python\n# performance metric\nfrom sklearn.metrics import r2_score\nprint('Fitting\
    \ metric (R2) = ', r2_score(y, y_predicted))\n\n>> Fitting metric (R2) = 0.91\n\
    ```\n\nLet us now take a quick look into the different metrics listed in Table\
    \ 1.\n\n### Regression metrics\n\nR-squared ($R^2$) is a good measure, technically\
    \ for linear models, to determine how well the predicted output ($\\hat{y}$) compares\
    \ to the actual $y$. As seen in the metric formula table below, $R^2$ measures\
    \ how much of variability in the output variable can be explained by the model.\
    \ An $R^2$ of 1 indicates a perfect fit.\n\n| Regression Metric | Formula |\n\
    | :--- | :--- |\n| MSE | $\\frac{\\Sigma(y - \\hat{y})^2}{N}$ |\n| MAE | $\\frac{\\\
    Sigma|y - \\hat{y}|}{N}$ |\n| RMSE | $\\sqrt{\\frac{\\Sigma(y - \\hat{y})^2}{N}}$\
    \ |\n| R squared | $1 - \\frac{\\Sigma(y - \\hat{y})^2}{\\Sigma(y - \\bar{y})^2}$\
    \ |\n\nTable 2: Formulae for common regression metrics. The summation is carried\
    \ out over the $N$ samples. $\\bar{y}$ is mean of $y$\n\n$R^2$ does not directly\
    \ convey the magnitude of prediction errors. For this, the other metrics can be\
    \ used. RMSE is the most popular metric for evaluating regression models and is\
    \ computed as the square-root of the average of prediction errors. A related metric\
    \ is the MSE which does not take the square-root. MAE is similar to MSE, except\
    \ that it considers the absolute value of errors. Any of these metrics can be\
    \ used to compare different models: smaller the values of these metrics (except\
    \ $R^2$), better is the model fit.\n\n> Several Sklearn models have their own\
    \ score methods which computes an evaluation metric suitable for the problem they\
    \ are designed to solve. For example, the score() method of LinearRegression object\
    \ returns the $R^2$ metric. Pipelines have a score method as well which simply\
    \ executes the score method of the final model. For our quadratic fitting example,\
    \ it can be used as follows\n\n```python\n# compute metric using score method\n\
    R2 = pipe.score(x, y) # no need to import metrics module\n```\n\n### Classification\
    \ metrics\n\nWhile in regression problems we care about how close the predicted\
    \ values are to the actual values, in classification problems we care about the\
    \ perfect match between the actual and predicted labels. Before we look at different\
    \ classification metrics, let's first learn about a confusion matrix. The figure\
    \ below shows a sample confusion matrix for a binary classification task; this\
    \ matrix provides a comprehensive overview of how well a model has correctly (&\
    \ incorrectly) classified samples belonging to the positive and negative classes.\
    \ The shown matrix indicates that out of 25 (24 + 1) samples that actually belonged\
    \ to negative class, the model correctly labeled 21 of those.\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_64_0.png)\n\
    \nConfusion matrix can be used to compute several single-valued metrics, summarized\
    \ in the metric formula table below. The most straightforward metric is ‘accuracy’\
    \ which simply communicates the ratio of true predictions to the total number\
    \ of predictions. Accuracy can, however, be a misleading metric for imbalanced\
    \ datasets (where more samples belong to one particular class). For example, in\
    \ our example, overall accuracy is ~95% (88 out of 93), but we can see that the\
    \ accuracy in correctly detecting negative class is only 84% (21 out of 25). Therefore,\
    \ several other metrics are frequently employed to convey different aspects of\
    \ model’s performance.\n\n| Classification Metric | Formula |\n|---|---|\n| Accuracy\
    \ | $\\frac{TP + TN}{FP + FN + TP + TN}$ |\n| Precision | $\\frac{TP}{TP + FP}$\
    \ |\n| F1 Score | $2 \\frac{Precision * Recall}{Precision + Recall}$ |\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_64_1.png)\n\
    \n| Classification Metric | Formula |\n|---|---|\n| Recall, TPR | $\\frac{TP}{TP\
    \ + FN}$ |\n| FPR | $\\frac{FP}{FP + TN}$ |\n\nPrecision metric returns the ratio\
    \ of number of correct positive predictions to the total number of positive predictions\
    \ by the model while recall returns the ratio of number of correct positive predictions\
    \ to the total number of positive samples in the data. For a process monitoring\
    \ tool (where positive label implies presence of a process fault), recall denotes\
    \ model’s ability to detect process fault, while precision denotes accuracy of\
    \ model’s prediction of process fault. A model can have high recall if it detects\
    \ process faults successfully, but occurrence of lots of false alarms will lower\
    \ its precision. In other scenario, if the model can detect only a specific type\
    \ of process fault and gives very few false alarms then it will have low recall\
    \ and high precision. A perfect model will have high values (close to 1) for both\
    \ precision and recall. However, we just saw that it is possible to have one of\
    \ these two metrics high and the other low. Therefore, both metrics need to be\
    \ reported. However, if only a single metric is desired then F1 score is utilized\
    \ which returns a high value if both precision and recall are high and a low value\
    \ if either precision or recall is low. FPR (false positive rate) looks at the\
    \ fraction of negative samples that get classified as positives. In our example,\
    \ a high FPR of 0.16 slightly spoils the very rosy picture being presented by\
    \ accuracy, precision, and recall numbers!!\n\nFor a multiclass problem, the confusion\
    \ matrix would look something like the plot below where there is a row and column\
    \ for each class type. Several important clues can be obtained from a multiclass\
    \ confusion matrix plot. For example, in the plot below, it seems that some samples\
    \ belonging to classes 1 & 2 tend to get classified as class 3 which suggest that\
    \ some additional features should be added to help the model better distinguish\
    \ between classes 1 & 2 and class 3. Metrics like precision can be computed by\
    \ one vs all approach where you would choose one particular class as a positive\
    \ class and the rest of the classes as a negative class.\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_65_0.png)\n\
    \n### Holdout method / Cross-validation\n\nWhile the performance metrics computed\
    \ using training data tell us how good our model fitting is, they are not true\
    \ indicators of how well the model would perform for unseen data. For an unbiased\
    \ generalization assessment, performance metrics should always be reported for\
    \ a ‘test’ dataset that is not used during model training. This approach is called\
    \ cross-validation. It’s great if you already have a separate test dataset, otherwise\
    \ the best practice is to split the available dataset into training and test sets\
    \ as shown below.\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_65_1.png)\n\nSetting\
    \ aside a portion of data for cross-validation is called holdout method. A good\
    \ thumb-rule is to keep 20% of data in test set. Holdout can be accomplished in\
    \ Sklearn using **train_test_split** utility function as shown below for our quadratic\
    \ fit example\n\n```python\n# separate test data\nfrom sklearn.model_selection\
    \ import train_test_split\nx_train, x_test, y_train, y_test = train_test_split(x,\
    \ y, test_size=0.2, random_state=1)\n\n# check dataset sizes\nprint('Number of\
    \ samples in training set: ', x_train.shape[0])\nprint('Number of samples in test\
    \ set: ', x_test.shape[0])\n\n>>> Number of samples in training set:  20\n   \
    \ Number of samples in test set:  5\n\n# fit pipeline and predict\npipe.fit(x_train,\
    \ y_train)\ny_predicted_train = pipe.predict(x_train)\ny_predicted_test = pipe.predict(x_test)\n\
    \n# performance metrics\nfrom sklearn.metrics import mean_squared_error as mse\n\
    \nprint('Training metric (mse) = ', mse(y_train, y_predicted_train))\nprint('Test\
    \ metric (mse) = ', mse(y_test, y_predicted_test))\n\n>>> Training metric (mse)\
    \ =  3.79\n    Test metric (mse) =  3.56\n```\n\nThe **random_state** parameter\
    \ in the **train_test_split** function is used to shuffle the dataset before applying\
    \ the split. Shuffling dataset is a good practice to ensure that there is no unintentional\
    \ data pattern between training and test datasets. For example, assume a dataset\
    \ comes from a manufacturing plant and is sorted by production rates: without\
    \ shuffling, we may end up with data only with low production rates in the training\
    \ set, which is undesirable.\n\nFor classification problems, there is another\
    \ important consideration to make. Ideally, we would like to ensure that the same\
    \ class proportion that exists in the original dataset is retained in the training\
    \ and test datasets. This approach is called stratified splitting and can be achieved\
    \ through the **stratify** parameter in the **train_test_split** function. For\
    \ example, we can pass a vector of fault / no-fault labels to this parameter and\
    \ **train_test_split** function will ensure that the ratio of faulty and non-faulty\
    \ samples is same in both training and test datasets."
  mdcn: "训练样本，允许使用简单模型，并减少模型训练时间。接下来，我们将了解哪些技术可用于评估模型的性能表现。\n\n## 3.3 模型评估\n\n模型参数拟合后，我们需要一些方法来评估模型性能，以查看模型对训练数据的拟合程度（好或差）。为此，下面列出了回归和分类任务中常用的评估指标。\n\
    \n| 回归 | 分类 |\n| :--- | :--- |\n| • 均方误差 (MSE) | • 混淆矩阵 |\n| • 平均绝对误差 (MAE) |\
    \ • 准确率 |\n| • 均方根误差 (RMSE) | • 精确率、召回率、F1 分数 |\n| • R 平方 (R²) | • 真正例率 (TPR)、假正例率\
    \ (FPR) |\n\n表 1：评估模型性能的常用方法\n\n虽然编写自己的 Python 代码来计算这些指标很容易，但使用 `sklearn.metrics`\
    \ 模块会更简单，因为这些指标都已实现。我们可以从该模块导入所需的指标类，并在下面的二次拟合示例中使用它。\n\n```python\n# 性能指标\nfrom\
    \ sklearn.metrics import r2_score\nprint('拟合指标 (R2) = ', r2_score(y, y_predicted))\n\
    \n>> 拟合指标 (R2) = 0.91\n```\n\n现在让我们快速浏览一下表 1 中列出的不同指标。\n\n### 回归指标\n\nR 平方 ($R^2$)\
    \ 是一个很好的度量指标，技术上适用于线性模型，用于确定预测输出 ($\\hat{y}$) 与实际 $y$ 的比较情况。如下方的指标公式表所示，$R^2$\
    \ 衡量的是输出变量的变异性中有多少可以被模型解释。$R^2$ 为 1 表示完美拟合。\n\n| 回归指标 | 公式 |\n| :--- | :--- |\n\
    | MSE | $\\frac{\\Sigma(y - \\hat{y})^2}{N}$ |\n| MAE | $\\frac{\\Sigma|y - \\\
    hat{y}|}{N}$ |\n| RMSE | $\\sqrt{\\frac{\\Sigma(y - \\hat{y})^2}{N}}$ |\n| R 平方\
    \ | $1 - \\frac{\\Sigma(y - \\hat{y})^2}{\\Sigma(y - \\bar{y})^2}$ |\n\n表 2：常见回归指标的公式。求和是在\
    \ $N$ 个样本上进行的。$\\bar{y}$ 是 $y$ 的均值。\n\n$R^2$ 并不能直接反映预测误差的大小。为此，可以使用其他指标。RMSE 是评估回归模型最流行的指标，计算为预测误差平均值的平方根。一个相关的指标是\
    \ MSE，它不取平方根。MAE 与 MSE 类似，只是它考虑的是误差的绝对值。这些指标中的任何一个都可以用来比较不同的模型：这些指标的值越小（$R^2$\
    \ 除外），模型拟合得越好。\n\n> 几个 Sklearn 模型有自己的 score 方法，该方法计算适合其设计解决的问题的评估指标。例如，LinearRegression\
    \ 对象的 score() 方法返回 $R^2$ 指标。Pipeline 也有一个 score 方法，它只是执行最终模型的 score 方法。对于我们的二次拟合示例，可以如下使用\n\
    \n```python\n# 使用 score 方法计算指标\nR2 = pipe.score(x, y) # 无需导入 metrics 模块\n```\n\
    \n### 分类指标\n\n在回归问题中，我们关心预测值与实际值的接近程度，而在分类问题中，我们关心实际标签与预测标签的完美匹配。在了解不同的分类指标之前，让我们先学习混淆矩阵。下图显示了一个二元分类任务的样本混淆矩阵；该矩阵全面概述了模型正确（和错误）分类属于正类和负类的样本的情况。所示矩阵表明，在实际属于负类的\
    \ 25 (24 + 1) 个样本中，模型正确标记了其中的 21 个。\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_64_0.png)\n\
    \n混淆矩阵可用于计算多个单值指标，总结在下方的指标公式表中。最直接的指标是“准确率”，它简单地传达了正确预测数与总预测数的比率。然而，对于不平衡数据集（其中更多样本属于某个特定类别），准确率可能是一个误导性指标。例如，在我们的示例中，总体准确率约为\
    \ 95%（93 个中的 88 个），但我们可以看到正确检测负类的准确率仅为 84%（25 个中的 21 个）。因此，经常使用其他几个指标来传达模型性能的不同方面。\n\
    \n| 分类指标 | 公式 |\n|---|---|\n| 准确率 | $\\frac{TP + TN}{FP + FN + TP + TN}$ |\n|\
    \ 精确率 | $\\frac{TP}{TP + FP}$ |\n| F1 分数 | $2 \\frac{Precision * Recall}{Precision\
    \ + Recall}$ |\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_64_1.png)\n\n| 分类指标\
    \ | 公式 |\n|---|---|\n| 召回率, TPR | $\\frac{TP}{TP + FN}$ |\n| FPR | $\\frac{FP}{FP\
    \ + TN}$ |\n\n精确率指标返回模型正确正预测数与模型总正预测数的比率，而召回率返回正确正预测数与数据中总正样本数的比率。对于过程监控工具（其中正标签表示存在过程故障），召回率表示模型检测过程故障的能力，而精确率表示模型预测过程故障的准确性。如果模型成功检测到过程故障，则可以具有高召回率，但大量误报会降低其精确率。在另一种情况下，如果模型只能检测特定类型的过程故障并且给出很少的误报，那么它将具有低召回率和高精确率。一个完美的模型在精确率和召回率上都具有高值（接近\
    \ 1）。然而，我们刚刚看到其中一个指标高而另一个指标低是可能的。因此，需要同时报告这两个指标。但是，如果只需要一个指标，则使用 F1 分数，如果精确率和召回率都高，则返回高值，如果精确率或召回率低，则返回低值。FPR（假正例率）考察被分类为正类的负样本的比例。在我们的示例中，0.16\
    \ 的高 FPR 稍微破坏了准确率、精确率和召回率数字所呈现的非常乐观的图景！！\n\n对于多类问题，混淆矩阵看起来会像下面的图表，其中每个类别类型都有一行和一列。从多类混淆矩阵图中可以获得几个重要线索。例如，在下面的图表中，似乎属于类别\
    \ 1 和 2 的一些样本倾向于被分类为类别 3，这表明应该添加一些额外的特征来帮助模型更好地区分类别 1 和 2 与类别 3。像精确率这样的指标可以通过一对多的方法计算，其中你会选择一个特定的类别作为正类，其余类别作为负类。\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_65_0.png)\n\n### 留出法 / 交叉验证\n\n虽然使用训练数据计算的性能指标告诉我们模型拟合得有多好，但它们并不是模型在未见数据上表现如何的真实指标。为了进行无偏的泛化评估，性能指标应始终针对模型训练期间未使用的“测试”数据集进行报告。这种方法称为交叉验证。如果你已经有一个单独的测试数据集，那就太好了，否则最佳实践是将可用数据集分为训练集和测试集，如下所示。\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_65_1.png)\n\n留出一部分数据用于交叉验证称为留出法。一个好的经验法则是将\
    \ 20% 的数据保留在测试集中。留出法可以在 Sklearn 中使用 **train_test_split** 实用函数完成，如下所示，用于我们的二次拟合示例\n\
    \n```python\n# 分离测试数据\nfrom sklearn.model_selection import train_test_split\n\
    x_train, x_test, y_train, y_test = train_test_split(x, y, test_size=0.2, random_state=1)\n\
    \n# 检查数据集大小\nprint('训练集中的样本数: ', x_train.shape[0])\nprint('测试集中的样本数: ', x_test.shape[0])\n\
    \n>>> 训练集中的样本数:  20\n    测试集中的样本数:  5\n\n# 拟合管道并预测\npipe.fit(x_train, y_train)\n\
    y_predicted_train = pipe.predict(x_train)\ny_predicted_test = pipe.predict(x_test)\n\

  md: 'Alright, we now have enough fundamentals in place to start taking a deeper
    look into RL algorithms for optimal policy learning. Let’s begin with one of the
    most popular technique, Q-learning.


    # 13.3 Fundamentals of Q-learning


    Q-learning refers to the RL algorithms designed for estimating the $Q^*(s, a)$
    values. Once the optimal value function is available, an optimal policy can be
    framed as simply picking the action corresponding to the highest value for the
    current state as shown below


    $$a_t = \arg \max_{a''} Q^*(s_t, a)$$


    To see how $Q^*$ may be obtained, consider an MDP with discrete state and action
    space. We can represent the Q function as a Q-table$^{67}$


    $$Q^*(s, a) = \begin{array}{c|ccc} & s_1 & s_2 & s_3 & \dots \ \hline a_1 & Q^*(s_1,
    a_1) & Q^*(s_2, a_1) & Q^*(s_3, a_1) \ a_2 & Q^*(s_1, a_2) & Q^*(s_2, a_2) & Q^*(s_3,
    a_2) \ a_3 & Q^*(s_1, a_3) & Q^*(s_2, a_3) & Q^*(s_3, a_3) \ \vdots & & & \end{array}$$


    To find the optimal values for each state/action pair, all the values in Q-table
    are first initialized to 0, some initial state is arbitrarily chosen, agent-environment
    interactions starts, and then the bellman equation is used in the following iteration
    form


    $$\widehat{Q}^*_{new}(s_t, a_t) \leftarrow (1 - \alpha)\widehat{Q}^*_{old}(s_t,
    a_t) + \alpha \left( r_{t+1} + \gamma \max_{a} \widehat{Q}^*_{old}(s_{t+1}, a'')
    \right)$$


    or


    $$\widehat{Q}^*_{new}(s_t, a_t) \leftarrow \widehat{Q}^*_{old}(s_t, a_t) + \alpha
    \left( \underbrace{r_{t+1} + \gamma \max_{a} \widehat{Q}^*_{old}(s_{t+1}, a'')
    - \widehat{Q}^*_{old}(s_t, a_t)}_{\text{Temporal difference (TD) error}} \right)
    \quad \text{eq. 2}$$


    where $0 \leq \alpha \leq 1$ is a learning-rate hyperparameter. Eq. 2 is a remarkably
    simple formula, and it has been shown that given sufficient iterations, the estimated
    Q values will converge to the


    $^{67}$ In RL literature, states are usually shown along the rows in a Q-table.
    We have placed states along the columns purely for convenience in the simple illustration
    later.'
  merge: -1
  pgno: 306
- img_proc: true
  md: 'optimal values! In Eq. 2, selection of $a_t$ is an important consideration
    and $\varepsilon$-greedy scheme is usually adopted. In this scheme, at every iteration,
    the agent acts randomly with probability $\varepsilon$ or greedily (chooses action
    corresponding to the highest value $\widehat{Q}^*$ for a given $s_t$) with probability
    $1 - \varepsilon$. This scheme allows good combination of exploitation (taking
    optimal actions based on current estimates, allowing the estimates to get better
    over time) and exploration (visiting unknown but potentially rewarding parts of
    the environment). During initial iterations when $\widehat{Q}^*$ estimates are
    expectedly poor, $\varepsilon$ is given a high value (close to 1) and reduced
    gradually as training completes. The pseudo-code below summarizes the tabular
    Q-learning algorithm.


    # Algorithm 1: Tabular Q-learning


    ```

    1. Set $\widehat{Q}^*(s, a) = 0$ for all state-action pairs

    2. for episode = 1 to $N_{episode}$ do:

    3.     initialize state $s$

    4.     for each step (t) of episode until $s$ is terminal do:

    5.         choose action ($a_t$) for $s_t$ using $\varepsilon$-greedy policy

    6.         take action $a_t$ and observe $r_{t+1}$ and next state $s_{t+1}$

    7.         compute $\delta$ (TD error) = $r_{t+1} + \gamma \max_{a''} \widehat{Q}^*_{old}(s_{t+1},
    a'') - \widehat{Q}^*_{old}(s_t, a_t)$

    8.         $\widehat{Q}^*_{new}(s_t, a_t) \leftarrow \widehat{Q}^*_{old}(s_t,
    a_t) + \alpha \delta$

    9.     end for

    10. end for

    ```


    In the pseudo-code above, there are two terms whose meaning may not be immediately
    clear to you, namely, ‘episode’ and ‘terminal state’. An episode simply refers
    to one complete simulation or experiment. For example, one instance of a drive
    from your office to home would be one episode. A terminal state marks the end
    of an episode. In the driving example, arrival at home or end of fuel could be
    the terminal states. For tasks that may not necessarily end in a terminal state
    (such as controlling the fluid level), a maximum number of steps are pre-specified
    for an episode during training.


    # Off-policy vs on-policy algorithms


    Q-learning belongs to the category of off-policy RL algorithms. In such algorithms
    the target policy being learnt (optimal policy) is different from the policy being
    executed or used to select actions (such as $\varepsilon$-greedy policy) during
    training. The executed policy is also called behavior policy. For on-policy RL
    algorithms, behavior policy equals target policy.'

  md: "$$J_{regularized}(\\theta) = MSE(\\theta) + \\alpha \\sum_{i} \\theta_i^2$$\n\
    \nThe additional term penalizes the algorithm for choosing high coefficient values.\
    \ Therefore, during model fitting, the algorithm will be forced to minimize fitting\
    \ error while keeping coefficients small. This version of regularization is called\
    \ L2 or ridge regularization. The '$\\alpha$' term is a hyperparameter which modulates\

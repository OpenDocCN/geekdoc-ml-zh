    # Regularization


    As we have learnt before, regularization is a way to constraint model''s weight
    parameters to avoid overfitting (large gap between training and validation accuracies).
    As one of the best practices, you should always employ regularization for your
    ANN model fitting. Accordingly, the regularization penalty becomes one of the
    important hyperparameter. Keras makes specifying regularization (L1, L2, or both)
    very easy as was shown in the hyperparameter optimization example where L1 regularization
    was used while defining the Dense layers. Keras allows three types of regularizers,
    namely, kernel_regularizer, bias_regularizer, activity_regularizer, to regularize
    the weight parameters, bias parameters, and neuron activations; of these kernel_regularizer
    is the recommended default choice.


    For deep networks, another form of regularization is very popular and is called
    ''dropout''. In this strategy, in every training iteration, some neurons are ''dropped
    out'', i.e., their activations are not computed in forward pass and weight updates
    are not performed. Note that dropped neurons in current iteration can become active
    in the next iteration. Dropout has been shown to provide superior generalization<sup>61</sup>
    as it forces the network to avoid relying too much on just a few neurons. In Keras,
    dropout is specified layer-wise. Two schemes are illustrated below. In scheme
    1, dropout layer is added between the input and first hidden layer and dropout
    rate (fraction of neurons to drop) is set to 0.2; therefore, one out of every
    5 input variables are randomly excluded in an iteration. In scheme 2, dropout
    layer is added between two hidden layers; here again, one out of every 5 neurons
    in the first hidden layer are randomly excluded in an iteration. Note that dropout
    is only done during model training.


    | Dropout on input layer | Dropout on hidden layer |

    | :--- | :--- |

    | model = Sequential()<br>model.add(Dropout(0.2, input_shape=(19,)))<br>model.add(Dense(20),...)<br>model.add(Dense(1))
    | model = Sequential()<br>model.add(Dense(20),...)<br>model.add(Dropout(0.2))<br>model.add(Dense(1))
    |


    # Initialization


    Before the first optimization iteration is performed, model parameters need to
    be initialized with some initial values. Not until long ago, a trivial approach
    would be to initialize all weights to zero or same value. It was however realized
    that this trivial approach resulted in poor training. Specialized initialization
    schemes have now been devised. If you are using ReLU activation functions, He
    initialization scheme should be the default preference; here the weights parameters
    for neurons in a layer are initialized by drawing samples from a normal


    <sup>61</sup> Srivastava et. al., Dropout: A simple way to prevent neural networks
    from overfitting, The journal of machine learning research, 2014'
  - '[PAGE 265]


    distribution centered at 0 with standard deviation = sqrt(2/n_inputs), where n_inputs
    is number of input connections (which equals number of neurons in previous layer
    for FFNN). For tanh activation functions, Xavier initialization scheme is found
    to be more suited.


    # Batch normalization


    Batch normalization is another neat trick that have been devised to overcome the
    vanishing/exploding gradient issue for deep networks. The initialization schemes
    ensure that the weights within a layer are distributed appropriately. However,
    as training progresses and model parameters are update, the weights may lose their
    ''nice'' distributions. This negatively impacts model training. With batch normalization
    strategy, at each training iteration with a mini-batch, the inputs to a layer
    are standardized. For deep networks, this strategy has been shown to provide significant
    training improvements. Implementing this in Keras is very straightforward wherein
    we add (model.add(BatchNormalization())) a batch normalization layer just before
    the layer whose inputs we wish to standardize.


    # Transfer Learning


    Imagine that you have trained a deep network which provides good performance for
    some complex tasks, such as fault detection. Now you would like to replicate this
    to another similar site within your organization. However, you don''t have a lot
    of training data at this second site – maybe the second site was commissioned
    recently and hasn''t experienced many process faults yet! In such situations,
    you may want to adopt the popular strategy of ''transfer learning'' wherein model
    parameters of inner layers of a pretrained model is transferred to a new model
    as shown in illustration below.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_265_0.png)


    As alluded to before, inner layers in a DNN ''learn'' the low-level features from
    process data and transfer learning simply transfers this learnt logic from one
    model to another for related tasks. This leads to faster convergence with limited
    data*.


    > *Li et. al., Transfer learning for process fault diagnosis: Knowledge transfer
    from simulation to physical processes, Computers & Chemical Engineering, 2020'

    # fit KPCA model\nfrom sklearn.decomposition import KernelPCA\nkpca = KernelPCA(kernel='rbf',\
    \ gamma = 1)\nscore = kpca.fit_transform(data)\n```\n\n## 5.4 PLS: An Introduction\n\
    \nPartial least squares (PLS) is a supervised multivariate regression technique\
    \ that estimates linear relationship between a set of input variables and a set\
    \ of output variables. Like PCA, PLS transforms raw data into latent components\
    \ - input ($X$) and output ($Y$) data matrices are transformed into score matrices\
    \ $T$ and $U$, respectively. Figure 2.13 provides a conceptual comparison of PLS\
    \ methodology with those of other popular linear regression techniques, principal\
    \ component regression (PCR) and multivariate linear regression (MLR).\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_120_0.png)\n\
    \nWhile MLR computes the least-squares fit between $\\boldsymbol{X}$ and $\\boldsymbol{Y}$\
    \ directly, PCR first performs PCA on input data and then computes least-squares\
    \ fit between the score matrix and $\\boldsymbol{Y}$. By doing so, PCR is able\
    \ to overcome the issues of collinearity, high correlation, noisy measurements,\
    \ and limited training dataset. However, the latent variables are computed independent\
    \ of the output data and therefore, the score matrix may capture those variations\
    \ in $\\boldsymbol{X}$ which are not relevant for predicting $\\boldsymbol{Y}$.\
    \ PLS overcomes this issue by estimating the score matrices, $\\boldsymbol{T}$\
    \ and $\\boldsymbol{U}$, simultaneously such that the variation in $\\boldsymbol{X}$\
    \ that is relevant for predicting $\\boldsymbol{Y}$ is maximally captured in the\
    \ latent variable space.\n\n> Note that if the number of latent components retained\
    \ in PLS or PCR model is equal to the original number of input variables ($m$),\
    \ then PLS and PCR models are equivalent to MLR model.\n\nThe unique favorable\
    \ properties of PLS along with low computational requirements has led to its widespread\
    \ usage in process monitoring for real-time process monitoring, soft-sensing,\
    \ fault classification, and so on.\n\n### Mathematical background\n\nPLS performs\
    \ 3 simultaneous jobs:\n\n- Capture maximum variability in $\\boldsymbol{X}$\n\
    - Capture maximum variability in $\\boldsymbol{Y}$\n- Maximize correlation between\
    \ $\\boldsymbol{X}$ and $\\boldsymbol{Y}$\n\nTo see how PLS achieves its objectives,\
    \ consider again the data matrix $\\boldsymbol{X} \\in \\mathbb{R}^{N \\times\
    \ m}$ consisting of $N$ observations of $m$ input variables where each row represents\
    \ a data-point in the original measurement space. In addition, we also have an\
    \ output data matrix with $p$ ($\\ge 1$) output variables, $\\boldsymbol{Y} \\\
    in \\mathbb{R}^{N \\times p}$. It is assumed that each column is normalized to\
    \ zero mean and unit variance in both the matrices. The first latent component\
    \ scores are given by:\n\n$$\\boldsymbol{t}_1 = \\boldsymbol{X}\\boldsymbol{w}_1\
    \ \\quad \\text{and} \\quad \\boldsymbol{u}_1 = \\boldsymbol{Y}\\boldsymbol{c}_1$$\n\
    \nThe vectors $\\boldsymbol{w}_1$ and $\\boldsymbol{c}_1$, termed weight vectors,\
    \ are computed such that the covariance between $\\boldsymbol{t}_1$ and $\\boldsymbol{u}_1$\
    \ are maximized. Referring to the definition of covariance, we can see that by\
    \ maximizing the covariance, PLS tries to meet all the three objectives simultaneously.\n\
    \n$$Cov(\\boldsymbol{t}_1, \\boldsymbol{u}_1) = Correlation(\\boldsymbol{t}_1,\
    \ \\boldsymbol{u}_1) * \\sqrt{Var(\\boldsymbol{t}_1)} * \\sqrt{Var(\\boldsymbol{u}_1)}$$\n\
    \nIn the next step, loading vectors, $p_1$ and $q_1$, are found\n\n$$X = t_1p_1^T\
    \ + E_1 \\quad \\text{and} \\quad Y = u_1q_1^T + F_1$$\n\nIn eq. 13, $E$ and $F$\
    \ are called residual matrices and represent the part of $X$ and $Y$ that have\
    \ not yet been captured. To find the next component scores, the above three steps\
    \ are repeated with matrices $E_1$ and $F_1$ replacing $X$ and $Y$. Note that\
    \ the maximum number of possible components equals $m$. For each component, the\
    \ weight vectors are found via iterative procedures like NIPALS or SIMPLS. For\
    \ now, it suffices to know that once the required number ($k$) of components have\
    \ been computed, the following relationships hold\n\n$$Y = X\\beta + F$$\n\n$$\\\
    beta = X^TU(T^TXX^TU)^{-1}T^TY$$\n\nWith coefficient matrix, $\\beta$, computed,\
    \ we can predict $y$ for a new input data-point $x$. If these algorithmic details\

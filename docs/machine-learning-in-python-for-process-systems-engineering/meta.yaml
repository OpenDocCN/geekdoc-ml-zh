- img_proc: true
  md: 'PCA makes the monitoring task easy by summarizing the state of any complex
    multivariate process into two simple indicators or monitoring indices as shown
    in Figure 2.4. During model training, statistical thresholds are determined for
    the indices and for a new data-point, the new indices'' values are compared against
    the thresholds. If any of the two thresholds are violated, then presence of abnormal
    process conditions is confirmed.


    # Process monitoring/fault detection indices


    Hotelling''s $T^2$ and SPE (also called Q) statistics are the two monitoring indices
    utilized for process monitoring. Beware the potential confusion between the score
    matrix ($\mathbf{T}$) and the scalar $T^2$ value. This is the standard notation
    used by the PCA community. Both the statistics are computed for each data-point.
    Let $\mathbf{t}_i$ denote the $i^{th}$ row of $\mathbf{T}$ which represents the
    transformed $i^{th}$ data-point in the PC space. The $T^2$ index for this data-point
    is calculated by


    $$T^2 = \sum_{j=1}^k \frac{t_{i,j}^2}{\lambda_j} = \mathbf{t}_i^T \mathbf{\Lambda}_k^{-1}
    \mathbf{t}_i$$


    Note that $\mathbf{\Lambda}_k = diag\{\lambda_1, \lambda_2, \dots, \lambda_k\}$.
    It is apparent that $T^2$ is squared Mahalanobis distance or the weighted distance
    of a data-point from the origin in the PC space. If the data follow a multivariate
    normal distribution, the threshold or control limit can be obtained using an $F$
    distribution


    $$T_{CL}^2 = \frac{k(N^2-1)}{N(N-k)} F_{k,N-k}(\alpha)$$


    $F_{k,N-k}(\alpha)$ is the $(1-\alpha)$ percentile of the $F$ distribution with
    $k$ and $n-k$ degrees of freedom. In essence, $T^2 \leq T_{CL}^2$ represents an
    ellipsoidal boundary around the training data-points in the PC space. The second
    index, Q, represents the distance between the original and reconstructed data-point.
    Let $\mathbf{e}_i$ denote the $i^{th}$ row of $\mathbf{E}$. Then


    $$Q = \sum_{j=1}^m e_{i,j}^2$$


    Again, with normality assumption, the control limit for Q is given by the following
    expression


    $$Q_{CL} = \theta_1 \left( \frac{z_\alpha \sqrt{2\theta_2 h_0^2}}{\theta_1} +
    1 + \frac{\theta_2 h_0 (1-h_0)}{\theta_1^2} \right)^2$$


    $$h_0 = 1 - \frac{2\theta_1 \theta_3}{3\theta_2^2} \quad \text{and} \quad \theta_r
    = \sum_{j=k+1}^m \lambda_j^r \quad ; r=1,2,3$$


    $z_\alpha$ is the $(1-\alpha)$ percentile of a standard normal distribution. We
    now have all the information required to generate plots of the monitoring indexes,
    also called the control charts, for training data.'

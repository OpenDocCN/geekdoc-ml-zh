  mdcn: "## 不纯度度量\n\n公式1中使用的不纯度度量称为*基尼不纯度*。另一种常用的度量是*熵*，对于一个包含2类的数据集，其计算公式如下：\n\n\
    $$I_H = -\\sum_{q=1}^{2} p_q \\log (p_q)$$\n\n当 $p_1=1$（或 $p_2=0$）时，$I_H$ 为0；当\
    \ $p_1=p_2=0.5$ 时，$I_H$ 为1。因此，熵的降低意味着数据纯度的提高。在实践中，基尼不纯度和熵提供相似的结果。\n\n## 简单的Sklearn实现\n\
    \n下面的代码展示了在Sklearn中将决策树回归模型应用于一个二次数据集的实现。图9.2a绘制了预测值与实际输出值的对比图。很明显，在不对树深度进行任何限制的情况下，发生了过拟合。子图9.2b显示了将树深度限制为仅3层所带来的正则化效果。\n\
    \n```python\n# generate data\nimport numpy as np\nx = np.linspace(-1, 1, 50)[:,\
    \ None]\ny = x*x + 0.25 + np.random.normal(0, 0.15, (50,1))\n\n# fit regularized\
    \ DT model and predict\nfrom sklearn import tree\nmodel = tree.DecisionTreeRegressor(max_depth=3).fit(x,\
    \ y)\ny_pred = model.predict(x)\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_210_0.png)\n\
    \n你可以使用 `plot_tree` 函数来绘制树本身，以理解训练数据集是如何被决策树模型划分的。\n\n```python\n# plot tree\n\
    plt.figure(figsize=(20,8))\ntree.plot_tree(model, feature_names=['x'], filled=True,\
    \ rounded=True)\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_211_0.png)\n\n\
    尽管决策树看起来是一种非常灵活且有用的建模机制，但它们很少被用作独立模型。在图9.2中，我们看到决策树很容易过拟合，并给出非平滑或分段常数的近似。决策树的另一个缺点是不稳定性，即训练数据集的微小变化可能导致一棵非常不同的树。然而，我们花时间学习决策树是有原因的。单棵树可能没什么用，但当你组合多棵树时，你会得到惊人的结果。我们将在下一节学习这是如何实现的。\n\
    \n## 9.2 随机森林：简介\n\n随机森林是一种监督式非线性回归和分类建模技术，由多棵决策树组成。这些决策树独立地在其训练数据集上进行拟合，随机森林的预测结果是通过对各棵树的预测结果取平均值得到的。图9.3说明了这一方案。组合多棵树的输出可以得到低方差或更稳健的模型。其诀窍在于这些组成树是如何生成的。这些树的生成方式使得它们的预测误差不相关，从而使得随机森林不易过拟合（我们很快会从数学上具体化这个概念）。\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_212_0.png)\n\n在随机森林中，树被完全生长，因此，树的超参数选择不是问题。这使得随机森林的训练和执行简单快捷。事实上，随机森林的可调超参数非常少。随机森林还便于计算变量重要性。所有这些特性使得随机森林广受欢迎。\n\
    \n### 数学背景\n\n为了训练随机森林，需要生成尽可能“彼此不同”但同时又能良好描述训练数据集的不同树。这种树之间的多样性通过以下两种方式实现：\n\n\
    1)  **为每棵树使用不同的训练数据集：** 如果每棵树都在相同的数据集上训练，它们最终会变得相同，犯同样类型的错误，因此组合它们将几乎没有什么好处。由于我们只有一个训练数据集来训练随机森林，因此采用了自助采样法。如果原始数据集有\
    \ $N$ 个样本，自助采样法允许创建多个数据集，每个数据集有 $N_b$（$\\le N$）个样本，使得每个新数据集也能很好地代表生成原始数据集的底层过程。每个自助采样数据集是通过从原始数据集中有放回地随机选择\
    \ $N_b$ 个样本生成的。在随机森林中，$N_b = N$，下图以 $N=10$ 为例说明了自助采样方案。\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_213_0.png)\n\
    \n2)  **使用输入变量的随机子集来寻找最优划分：** 随机森林训练中一个非常不直观、有些令人惊讶但极其有效的方面是，在确定森林中任何树的任何节点的最优划分函数时，并不考虑所有输入变量。相反，会随机选择一个变量子集，然后使用这些选定的变量来最小化节点不纯度。这种随机选择在每个节点上都会执行。如果输入变量\
    \ $x \\in R^m$，则建议随机划分变量的数量（$M$）为 $m$ 的向下取整平方根。\n\n训练过程中的上述两个技巧使得树之间的相关性最小化。下图总结了随机森林模型的拟合过程。为便于说明，假设\
    \ $x \\in R^9$ 且 $M=3$。\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_214_0.png)\n\
    \n图9.5：随机森林训练机制示意图\n\n你可以看到，只有两个主要的超参数需要决定：树的数量和变量子集的大小。随机森林的另一个优势是组成树可以并行训练。\n\
    \n### 简单的Sklearn实现\n\n让我们将随机森林模型拟合到图9.2中的二次数据集。图9.6显示了森林中包含20棵树时的拟合结果。很明显，与我们之前看到的决策树模型相比，随机森林提供了更平滑的预测。图中还显示了森林中两棵不同组成树的预测结果。我们可以看到，随机森林平滑了组成树预测中的波动，使组合模型更加稳定。\n\
    \n```python\n# fit RF model and predict\nfrom sklearn.ensemble import RandomForestRegressor\n\
    model = RandomForestRegressor(n_estimators=20).fit(x, y)\ny_pred = model.predict(x)\n\
    \n# get predictions from constituent trees and plot\ntree_list = model.estimators_\
    \ # list of DT models in the RF\ny_pred_tree1 = tree_list[5].predict(x)\ny_pred_tree2\
    \ = tree_list[15].predict(x)\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_215_0.png)\n\
    \n图9.6：（左）随机森林回归预测，（中）来自几棵组成决策树的预测，（右）随机森林模型中树的数量对验证误差的影响\n\n图9.6还显示了森林中不同树数量对应的验证误差。我们在这里看到的是随机森林的一个普遍特征：随着树的数量增加，验证误差趋于平稳。因此，如果计算时间不是问题，最好使用尽可能多的树，直到误差趋于平稳。至于\
    \ $M$，较低的值会导致方差的更大降低，但会增加模型偏差。请注意，随机森林主要降低的是方差（与使用单棵决策树模型相比），而不是偏差。因此，如果决策树本身欠拟合，随机森林将无法提供高精度（或低偏差）。这就是为什么在随机森林中使用完全生长的树。你将在本章后面了解到其背后的原因。\n\
    \n## 9.3 混凝土建筑行业中基于随机森林的软测量\n\n让我们看看随机森林的一个应用：预测混凝土的抗压强度，将其作为其组成成分和混凝土龄期的函数。该数据集包含1030个混凝土样本，并包含以下数据：\n\
    \n+   **输入**\n    - 水泥：kg/m³ 混合物\n    - 高炉矿渣：kg/m³ 混合物\n    - 粉煤灰：kg/m³ 混合物\n\
    \    - 水：kg/m³ 混合物\n    - 超塑化剂：kg/m³ 混合物\n    - 粗骨料：kg/m³ 混合物\n    - 细骨料：kg/m³\
    \ 混合物\n    - 龄期：天（1到365）\n\n+   **输出**\n    - 混凝土抗压强度：MPa\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_215_1.png)\n\
    \n我们将保留33%的数据用于测试，树的数量设置为较大的值200，$M$ 设置为3。\n\n```python\n# read data\nimport numpy\
    \ as np\ndata = np.loadtxt('cement_strength.txt', delimiter=',', skiprows=1)\n\
    X = data[:,0:-1]\ny = data[:,-1]\n\n# separate training and test data\nfrom sklearn.model_selection\
    \ import train_test_split\nX_train, X_test, y_train, y_test = train_test_split(X,\
    \ y, test_size = 0.33, random_state = 100)\n\n# fit RF model\nfrom sklearn.ensemble\
    \ import RandomForestRegressor\nmodel = RandomForestRegressor(n_estimators=200,\
    \ max_features=3, oob_score=True, random_state=1).fit(X_train, y_train)\n```\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_216_0.png)\n\n图9.7：针对混凝土抗压强度数据集的随机森林和PLS预测。红线表示理想的\
    \ $y_{prediction} = y_{measured}$ 参考线\n\n这里有两个值得注意的地方。首先，我们在拟合前没有对变量进行缩放。这不是错误！随机森林（和决策树）是少数几种解对数据缩放不变的机器学习方法之一。其次，随机森林优于PLS的性能展示了随机森林的非线性建模能力。"

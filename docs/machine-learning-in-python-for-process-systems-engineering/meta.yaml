    # OOB accuracy


    In previous illustration, we specified oob_score=True during RF training. This
    specification instructs RF to compute a generalization score using training data
    during model fitting. This almost sounds like an incorrect statement, but it makes
    sense when you realize that any single bootstrap dataset does not contain all
    the samples of the original dataset<sup>43</sup> (as seen in Figure 9.4). Samples
    that do not belong to the bootstrap dataset of a tree are called out-of-bag (OOB)
    samples for that tree. Any given sample would be part of OOB samples of several
    trees of the forest (let''s say DT1, DT5, DT7). A prediction can be made for this
    sample using the ensemble of DT1, DT5, DT7 and an OOB error can be computed. The
    OOB errors for all the samples are used to compute an overall oob_score.


    ```

    # print OOB score

    print(''OOB score: '', model.oob_score_)

    >>> OOB score: 0.903

    ```


    The oob_score for the concrete dataset is same (up to 3 decimal places) as the
    test score! An OOB score may not be the perfect generalization assessment, but
    it comes in handy for small-sized dataset where keeping aside a test dataset may
    not be a luxury.


    # Feature importances


    Let''s now look at another handy feature of RF that allows us to rank the model''s
    input/feature variables in terms of their importances for output predictions.
    Sklearn computes feature importances by computing the average reduction in node
    impurities (or MSE for regression) upon usage of a feature for node splitting.
    First, importance of a feature $j$ in a tree is calculated as follows


    $$FI_j^{tree} = \frac{\sum_{nodes; node \ splitting \ on \ feature \ j} \Delta
    I_{node}^{tree}}{\sum_{nodes} \Delta I_{node}^{tree}}$$


    The average of $FI_j^{tree}$ over all the trees in the forest gives the desired
    feature importances


    $$FI_j = \frac{\sum_{trees} FI_j^{tree}}{number \ of \ trees}$$


    For our concrete strength dataset, $FI_s$ can be obtained as follows


    <sup>43</sup> For large N, it can be shown that any bootstrap dataset in RF theoretically
    contains approximately 63% of the samples from the original dataset'

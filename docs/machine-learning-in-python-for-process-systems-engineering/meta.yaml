    \ be used to visualize and quantify cluster quality. Note that silhouette analysis\
    \ is not specific to k-means and can be applied to study any clustering result.\n\
    \nSilhouette coefficient or value of a data-point ranges from -1 to 1 and is a\
    \ measure of how far the data-point is from data-points in neighboring cluster\
    \ as compared to data-points in the same cluster. A value of 1 indicates that\
    \ the data-point is far away from the neighboring cluster and values close to\
    \ 0 indicate that the data-point is close to the boundary between the two clusters.\
    \ Negative values indicate wrong cluster assignment.\n\nFigure 8.7 shows the silhouette\
    \ plot for the cluster shown in Figure 8.5. Each of the colored bands is formed\
    \ by stacking the silhouette coefficient of all data-points in that cluster and\

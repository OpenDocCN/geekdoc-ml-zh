    $\min_{\alpha} \quad \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N \alpha_i \alpha_j K(x_i,
    x_j)$

    $\text{s.t.} \quad \sum_{i=1}^N \alpha_i = 1$

    $\quad \quad 0 \le \alpha_i \le C \quad i = 1, \cdots N$


    You will notice that for gaussian kernel, OC-SVM formulation becomes equivalent
    to that of SVDD because $K(x_i, x_i) = 1$ and we end up with the same values of
    the multipliers. The decision boundaries are the same as well. For other kernels
    with $K(x_i, x_i) \ne 1$, results would be different.


    # Bandwidth parameter & SVDD illustration


    In this sub-section, we will attempt to use Sklearn''s OneClassSVM to build the
    bounding boundary for the dataset in Figure 7.7. However, before we do that, we
    need to specify our strategy for determination of SVDD model hyperparameters,
    $C$ and $\sigma$. If sufficient validation data samples belonging to both ''normal''
    and ''abnormal'' classes are available, then cross-validation can be used to choose
    $C$ and $\sigma$ that give the best validation accuracy. However, very often this
    is not possible and like training dataset, validation dataset also only contains
    ''normal'' class samples! To enable educated hyperparameter selection, let''s
    take another look at them.


    Previously, we saw that $C$ controls the trade-off between volume of hypersphere
    and the number of misclassifications in the training dataset. $C$ can also be
    written as'
- md: '$$C = \frac{1}{Nf}$$


    Where $N$ is the number of samples and $f$ is the expected fraction of outliers
    in the training dataset. Smaller value of $f$ (correspondingly larger $C$) will
    lead to less samples being put outside the hypersphere. In fact if $C$ is set
    to 1 (or greater) the hypersphere will include all the samples (as $\sum \alpha_i
    = 1$ and $\alpha = C$ outside the hypersphere). Therefore, $C$ can be set with
    some educated presumptions on the outlier fractions. In absence of any advance
    knowledge, $f = 0.01$ is often specified to exclude away 1% of sample lying farthest
    from hypersphere center.


    As far as $\sigma$ is concerned, we previously saw that at low value of $\sigma$,
    data boundary becomes very wiggly with high number of support vectors, resulting
    in overfitting. Conversely, at high value of $\sigma$, boundary tends to become
    spherical in the original space itself resulting in underfitting (or non-compact
    bounding of data). One approach for bandwidth selection is to use empirical methods
    which are based on obtaining a kernel matrix (whose $i,j^{th}$ element is $K(x_i,
    x_j)$) with favorable properties. One such method, modified mean criterion$^{35}$,
    gives bandwidth as follows


    $$\sigma = \sqrt{\frac{\bar{D}^2}{\ln\left(\frac{N-1}{\delta^2}\right)}}$$


    $$\bar{D}^2 = \frac{\sum_{i<j} ||x_i - x_j||^2}{\frac{N(N-1)}{2}}$$


    $$\delta = -0.14818008\phi^4 + 0.2846623624\phi^3 - 0.252853808\phi^2 + 0.159059498\phi
    - 0.001381145$$


    $$\phi = \frac{1}{\ln(N-1)}$$


    Another approach for bandwidth selection is to choose largest value of $\sigma$
    that gives the desired confidence level on the validation dataset. For example,
    for a confidence level of 99%, $\sigma$ is increased until 99% of validation samples
    are correctly classified as inliers. Any higher value of $\sigma$ will include
    more validation samples within the hypersphere. The modified mean criterion can
    be used as the initial guess with subsequent search made around it. Let''s now
    find the nonlinear boundary for the dataset in Figure 7.7.


    ```python

    # read data

    import numpy as np

    X = np.loadtxt(''SVDD_toyDataset.csv'', delimiter='','')

    ```


    $^{35}$ Kalde & Sadek, The mean and median criterion for kernel bandwidth selection
    for support vector data description, IEEE 2017


    ```python

    # compute bandwidth via modified mean criteria

    import scipy


    N = X.shape[0]

    phi = 1/np.log(N-1)

    delta = -0.14818008*np.power(phi,4) + 0.2846623624*np.power(phi,3) - 0.252853808*np.power(phi,2)
    + 0.159059498*phi - 0.001381145

    D2 = np.sum(scipy.spatial.distance.pdist(X, ''sqeuclidean''))/(N*(N-1)/2)

    sigma = np.sqrt(D2/np.log((N-1)/delta*delta))

    gamma = 1/(2*sigma*sigma)


    # SVM fit

    from sklearn.svm import OneClassSVM

    model = OneClassSVM(nu=0.01, gamma=gamma).fit(X) # nu corresponds to f

    ```


    Figure 7.8 shows the bounding boundary for different values of gamma with $f$
    (or nu in Sklearn) kept at 0.01. A value of gamma (= 1) close to that given by
    modified mean criterion method (= 0.58) provided a satisfactory boundary.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_172_0.png)


    We hope that by now you are convinced of the powerful capabilities of SVM for
    discriminating between different classes of data and compact bounding of normal
    operational data. A big requirement for successful application of SVM is that
    the training dataset should be very representative of the ‘normal’ dataset and
    fully characterize all the expected variations. Next, we will look at a case study
    with real process data and then move onto another variant of SVM utilized for
    regression applications.


    ## PCA vs SVDD for process monitoring


    In the previous chapters, we studied dimensionality reduction-based methods (PCA,
    ICA) for process monitoring. We have now added SVDD to our toolkit. Although it
    is difficult to say beforehand which method will work best for given scenarios,
    some rough guidelines do exist. If variables in your dataset are linearly (or
    only slightly nonlinearly) related and measurements are noisy, PCA/ICA would work
    best. PCA, however, assumes unimodal distribution of data. SVDD makes no assumption
    on underlying data distribution and is very-well suited for very nonlinear dataset.
    However, relationships between different process variables are difficult to interpret
    in SVM/SVDD models compared to PCA/ICA models.


    ## 7.4 Process Fault Detection via SVDD


    To illustrate a practical application of SVDD for process monitoring, we will
    use data from a semiconductor manufacturing process. This batch process dataset
    contains 19 process variables measured over the course of 108 normal batches and
    21 faulty batches. The batch durations range from 95 to 112 seconds (see appendix
    for more details). Figure 7.9 shows the training samples and the faulty test samples
    in the principal component space.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_173_0.png)


    For this illustration, the raw data has been processed using multiway PCA and
    the transformed 2D (score) data is provided in the *Metal_etch_2DPCA_trainingData.csv*
    file. Note that we could also implement SVDD in the original input space but pre-processing
    via PCA to remove variable correlation is generally a good practice. Moreover,
    we use the 2D PC space for our analysis just for the ease of illustrating the
    SVDD boundary. In actual deployment, you would work in higher dimensional PC space
    for better accuracy. Let''s see if our model can identify the faulty samples as
    outliers or not in the multi-clustered dataset.


    ```python

    # read data

    import numpy as np

    X_train = np.loadtxt(''Metal_etch_2DPCA_trainingData.csv'', delimiter='','')


    # fit SVM

    from sklearn.svm import OneClassSVM

    model = OneClassSVM(nu=0.01, gamma=0.025).fit(X_train) # gamma from modified mean
    criterion = 0.0025


    # predict for test data

    X_test = np.loadtxt(''Metal_etch_2DPCA_testData.csv'', delimiter='','')

    y_test = model.predict(X_test) # y=-1 for outliers


    print(''Number of faults identified: '', np.sum(y_test == -1), '' out of '', len(y_test))


    >>> Number of faults identified: 17 out of 20

    ```


    Figure 7.10 shows the boundary around the training samples and the faulty samples
    labeled according to their correct or incorrect identification. Seventeen out
    of twenty faulty data samples have correctly been identified as outliers. This
    example illustrates the power of SVDD for compactly describing clustered datasets.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_174_0.png)


    We should get the same results if we use the distances from the hypersphere center
    for fault detection. The results from SVDD and OC-SVM will differ if RBFs are
    not used as kernel. Unfortunately, Sklearn currently does not provide SVDD implementation.
    Nonetheless, a SVDD package is available on GitHub<sup>36</sup>.


    ## 7.5 SVR: An Introduction


    Support vector regression (SVR) is another variant of SVM used for linear and
    nonlinear regressions. SVR attempts to find a regression curve that is as close
    as possible to the training observations. Geometrically, as shown in Figure 7.11
    for kernelized-SVR, a tube of pre-specified width (ε) is fitted to the data and
    any sample lying outside the tube is penalized. You will see later that SVR''s
    optimization program is designed to obtain a good balance between model generalization
    capabilities and the ability to fit the training data.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_175_0.png)


    SVR generates a linear hyperplane that best describes the output as a function
    of the inputs. For kernelized SVR, the hyperplane translates into an appropriate
    nonlinear curve in the original measurement space. As shown in Figure 7.11, in
    feature space, most of the data-points lie within ε distance to the optimal hyperplane.
    Slack variables, ξ, allow some samples to fall outside the ε tube; however, such
    violations are penalized. Samples lying on the edge or outside the tube are the
    support vectors which completely determine the optimal solution for a given ε.
    Adding or removing any non-support vector (or samples inside the tube), does not
    affect the solution.


    SVR has been found to provide performance superior to ANNs for small and medium-sized
    high-dimensional datasets. We will see a couple of applications later in the chapter.


    ### Mathematical Background


    SVR''s optimization program for parameter estimation takes the following form
    in the feature space'
  mdcn: '$$C = \frac{1}{Nf}$$


    其中，$N$ 是样本数量，$f$ 是训练数据集中预期的异常值比例。$f$ 值越小（对应 $C$ 值越大），将导致更少的样本被置于超球体之外。实际上，如果 $C$
    设置为 1（或更大），超球体将包含所有样本（因为 $\sum \alpha_i = 1$，且超球体外的 $\alpha = C$）。因此，可以根据对异常值比例的合理预估来设置
    $C$。在缺乏任何先验知识的情况下，通常指定 $f = 0.01$，以排除距离超球体中心最远的 1% 样本。


    关于 $\sigma$，我们之前看到，当 $\sigma$ 值较低时，数据边界会变得非常曲折，支持向量数量很多，导致过拟合。相反，当 $\sigma$ 值较高时，边界在原始空间中倾向于变成球形，导致欠拟合（或数据的非紧凑包围）。带宽选择的一种方法是使用经验方法，这些方法基于获取具有有利性质的核矩阵（其第
    $i,j$ 个元素是 $K(x_i, x_j)$）。其中一种方法，修正均值准则$^{35}$，给出的带宽如下


    $$\sigma = \sqrt{\frac{\bar{D}^2}{\ln\left(\frac{N-1}{\delta^2}\right)}}$$


    $$\bar{D}^2 = \frac{\sum_{i<j} ||x_i - x_j||^2}{\frac{N(N-1)}{2}}$$


    $$\delta = -0.14818008\phi^4 + 0.2846623624\phi^3 - 0.252853808\phi^2 + 0.159059498\phi
    - 0.001381145$$


    $$\phi = \frac{1}{\ln(N-1)}$$


    带宽选择的另一种方法是选择能给出验证数据集上所需置信水平的最大 $\sigma$ 值。例如，对于 99% 的置信水平，增加 $\sigma$ 直到 99%
    的验证样本被正确分类为内点。任何更高的 $\sigma$ 值都会将更多验证样本包含在超球体内部。修正均值准则可以用作初始猜测，然后在其周围进行搜索。现在让我们为图
    7.7 中的数据集找到非线性边界。


    ```python

    # read data

    import numpy as np

    X = np.loadtxt(''SVDD_toyDataset.csv'', delimiter='','')

    ```


    $^{35}$ Kalde & Sadek, The mean and median criterion for kernel bandwidth selection
    for support vector data description, IEEE 2017


    ```python

    # compute bandwidth via modified mean criteria

    import scipy


    N = X.shape[0]

    phi = 1/np.log(N-1)

    delta = -0.14818008*np.power(phi,4) + 0.2846623624*np.power(phi,3) - 0.252853808*np.power(phi,2)
    + 0.159059498*phi - 0.001381145

    D2 = np.sum(scipy.spatial.distance.pdist(X, ''sqeuclidean''))/(N*(N-1)/2)

    sigma = np.sqrt(D2/np.log((N-1)/delta*delta))

    gamma = 1/(2*sigma*sigma)


    # SVM fit

    from sklearn.svm import OneClassSVM

    model = OneClassSVM(nu=0.01, gamma=gamma).fit(X) # nu corresponds to f

    ```


    图 7.8 显示了在 $f$（或 Sklearn 中的 nu）保持为 0.01 的情况下，不同 gamma 值对应的包围边界。一个接近修正均值准则方法给出的值（=
    0.58）的 gamma 值（= 1）提供了令人满意的边界。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_172_0.png)


    我们希望到现在您已经确信 SVM 在区分不同类别数据和紧凑包围正常运行数据方面的强大能力。成功应用 SVM 的一个主要要求是训练数据集应非常具有“正常”数据集的代表性，并充分表征所有预期的变化。接下来，我们将看一个使用真实过程数据的案例研究，然后转向用于回归应用的另一种
    SVM 变体。


    ## PCA 与 SVDD 在过程监控中的比较


    在前面的章节中，我们研究了基于降维的方法（PCA、ICA）用于过程监控。我们现在已将 SVDD 添加到我们的工具箱中。虽然很难事先说哪种方法在给定场景下效果最好，但确实存在一些粗略的指导原则。如果数据集中的变量是线性（或仅轻微非线性）相关的，并且测量值有噪声，PCA/ICA
    将效果最佳。然而，PCA 假设数据呈单峰分布。SVDD 对底层数据分布不做任何假设，非常适合高度非线性的数据集。然而，与 PCA/ICA 模型相比，SVM/SVDD
    模型中不同过程变量之间的关系难以解释。



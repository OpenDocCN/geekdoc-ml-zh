  - '[PAGE 52]


    Sklearn library that helps to encapsulate complex ML algorithms into user-friendly
    fit/transform/predict constructs.


    > ### Virtual environments


    Imagine that you wrote a Python ML code two years ago that makes use of Sklearn
    packages which you now want to execute. However, the version of Sklearn packages
    that you have on your computer currently installed is most likely different from
    what you had 2 years ago. Therefore, your old script may show errors upon execution
    (due to changed syntaxes for example) and it can be frustrating to have to debug
    the old code due to package version mismatches. This is one of the many reasons
    why you may want to have separate Python environments for separate projects such
    that these projects have access to separate sets of libraries. Note that this
    does not mean that you need to install Python itself multiple times. The package
    venv can help create virtual Python environments where different versions of the
    same packages can reside ‘peacefully’. In our hypothetical scenario, if you had
    used a virtual environment two years ago, you could simply activate that virtual
    environment and run your old script without any package-version-related issues.


    Using virtual environments is one of the best practices we recommend you should
    adopt as you become a more experienced programmer. For more details you can check
    out the official documentation docs.python.org/3/tutorials/venv.html.


    # Summary


    In this chapter we made ourselves familiar with the scripting environment that
    we will use for writing and executing ML scripts. We looked at two popular IDEs
    for Python scripting, the basics of Python language, and learnt how to manipulate
    data using NumPy and Pandas. In the next chapter, you will be exposed to several
    crucial aspects of ML that you should keep in mind as you plan your ML strategy
    for any given problem.'
- md: "## Chapter 3\nMachine Learning Model Development: Workflow and Best Practices\n\
    \nA model is the most crucial part of a machine learning-based solution as it\
    \ encapsulates the relationships among process variables extracted from data.\
    \ A universally accepted completely automated ML tool that can generate good models\
    \ for all kinds of problems is not yet available. ML model development is still\
    \ an art and it takes an artist to create a good model! While it is true that\
    \ we don't necessarily need to know the algorithmic implementation details of\
    \ the models, there are several model development stages which require our active\
    \ participation. You cannot obtain a good model by just dumping raw data into\
    \ a model training module. You need to ensure that you are providing right data\
    \ for model training, using correct performance assessment metric, properly assessing\
    \ if model is overfitting or underfitting, and fine-tuning the model properly\
    \ if needed.\n\nThere are several established best practices that have been devised\
    \ to help simplify a modeler's task. You can use these as guidance as you go about\
    \ developing your ML model. In this chapter we will study these best practices\
    \ and learn what it takes to obtain a good model (as well as how to quantify the\
    \ 'goodness' of a model!). This knowledge will help us when we start working with\
    \ different models in the next parts of the book. Specifically, the following\
    \ topics are covered:\n\n- Transforming raw process data to obtain better model\
    \ training dataset\n- Overview of performance metrics and best practices for reporting\
    \ model performance\n- Diagnosis of overfitting and underfitting using validation\
    \ curves\n- Tackling overfitting via regularization\n- Best practices for model\
    \ fine-tuning and hyperparameter optimization\n\n## 3.1 ML Model Development Workflow\n\
    \nThe prime objective of the ML modeling task is to obtain a model that generalizes\
    \ well, which means that the model performs satisfactorily when supplied with\
    \ data different from that used during model training. Achieving this takes more\
    \ than just executing a ‘model = <some ML_model>.fit()’ command on the available\
    \ data. In chapter 1, we had a brief introduction to ML modeling workflow. In\
    \ this chapter, we will learn about the different components of that workflow\
    \ in more details. Figure 3.1 lists the common tasks you can expect yourself to\
    \ carry out while building a ML model. While separate books can be written on\
    \ each of these tasks, we will cover enough details on each of these to get you\
    \ started on your ML journey.\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_54_0.png)\n\
    \nAs you can see, there are four main steps in the workflow. In the first step,\
    \ the available raw data are pre-processed to ensure ‘correct’ dataset is supplied\
    \ to the subsequent model fitting step. This step can involve data cleaning (discarding\
    \ irrelevant variables or corrupted/incomplete data samples) and data transformation\
    \ (generating new features or modifying existing ones). While we will study data-transformation\
    \ techniques in this chapter, data selection techniques are treated extensively\
    \ in the next chapter. The next step of the workflow involves selection of a suitable\
    \ model and estimating its parameters. While parameter estimation is handled by\
    \ off-the-shelf model libraries available in sklearn, model selection would require\
    \ your judgement based on your expert knowledge of the specific process system.\
    \ A practical guideline for model selection is Occam’s razor which advices selection\
    \ of simplest model that generalizes well. After training, the model is evaluated\
    \ to validate the modeling assumptions and assess model’s generalization power.\
    \ Model evaluation step often provides good hint about which part of the model\
    \ (or hyperparameters) to tweak, which leads to the last step of model tuning.\
    \ Specialized techniques are available to assist model tuning. With this broad\
    \ overview of the workflow, let’s now start learning about these techniques in\
    \ detail.\n\n## 3.2 Data Pre-processing: Data Transformation\n\nProcess data are\
    \ seldom available in ‘ready-to-model’ format. The raw dataset may contain highly\
    \ correlated variables or may have variables with very different value ranges.\
    \ These data characteristics tend to negatively influence model training, and\
    \ therefore, warrant data transformation to de-correlate or properly scale data.\
    \ Sometimes, creating new features¹⁰ out of provided variables can help to improve\
    \ model accuracy. Overall, the aim of this pre-processing step is to transform\
    \ given variables such that model training and model accuracy improves. Let’s\
    \ look at some commonly employed transformation techniques.\n\n### Data centering\
    \ & scaling\n\nIn process dataset, it is common to find variables with very different\
    \ order and spread of values. For example, you may have a temperature variable\
    \ that varies between 1000°C to 1500°C, a concentration variable varying between\
    \ 0.01M to 0.1M, and another temperature variable that goes from 300°C to 350°C.\
    \ While the order and spread of these three variables are quite different, they\
    \ may exert similar influence on the model output. However, unscaled dataset can\
    \ result in one variable being given more importance than the other or slow model\
    \ training. Centering and scaling transform variables to bring them on an equal\
    \ basis! While some algorithms like PCA necessarily require centered data, as\
    \ a best practice, you should always center and scale your dataset unless you\
    \ have strong reason against it.\n\nThe most common technique is standard scaling\
    \ or standardization, where each variable (in training dataset) is transformed\
    \ to 0 mean and standard deviation of 1. Within an ML script, you will transform\
    \ the test data using the computed mean and standard deviation of the training\
    \ dataset. The illustration below shows how sklearn facilitates standardization:\n\
    \n```python\n# import library, fit, and transform\nimport numpy as np\nfrom sklearn.preprocessing\
    \ import StandardScaler\n\nX = np.array([[ 1000, 0.01, 300],\n              [\
    \ 1200, 0.06, 350],\n              [ 1500, 0.1, 320]])\n\nscaler = StandardScaler().fit(X)\
    \ # compute mean & std column-wise\nX_scaled = scaler.transform(X) # transform\
    \ using computed mean and std\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_55_0.png)\n\
    \n¹⁰ Feature and (independent) variable mean the same thing. While in ML literature,\
    \ ‘feature’ is used to denote variables which go into predicting outputs, the\
    \ term ‘independent variable’ is commonly used for this in statistics.\n\n###\
    \ Using sklearn library classes\n\n> In (object-oriented) computer programming\
    \ parlance, in the above code, we created an object/instance (scaler) of StandardScaler\
    \ class¹¹ and set its attributes, mean_ and var_, by calling the fit() method.\
    \ They can be accessed as scaler.mean_ and scaler.var_. The fitted object (scaler)\
    \ was then used to scale X by calling the object's transform method. This is the\
    \ general pattern we will use with Sklearn's classes: objects will be initialized,\
    \ properties fitted, and methods called.\n\nAnother popular technique is min-max\
    \ scaling, also referred to as normalization. Here, each variable is transformed\
    \ to a common range of values (typically 0 to 1). For 0 to 1 normalization, each\
    \ variable is subtracted by its minimum value and then divided by its range. This\
    \ is accomplished in Sklearn as follows:\n\n```python\n# import library, fit,\
    \ and transform\nimport numpy as np\nfrom sklearn.preprocessing import MinMaxScaler\n\
    \nX = np.array([[ 1000, 0.01, 300],\n              [ 1200, 0.06, 350],\n     \
    \         [ 1500, 0.1, 320]])\nscaler = MinMaxScaler () # create object\nX_scaled\
    \ = scaler.fit_transform(X) # fit & transform\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_56_0.png)\n\
    \nAlthough standard scaling is often the default choice, there is no straight-forward\
    \ answer to which scaling method is better. Either of the methods will usually\
    \ work fine. Standard scaling is preferred if variables are gaussian distributed\
    \ or there are (a few) extreme outliers which can skew the ‘min’ and ‘range’ estimates\
    \ during normalization.\n\n### Robust centering & scaling\n\nIf your dataset has\
    \ a lot of outliers, then both the aforementioned methods will result in improper\
    \ scaling. For example, in Figure 3.2, we can see that standard scaling isn’t\
    \ able to center the ‘normal’ data around 0 due to the presence of outliers. In\
    \ such situations, robust MAD scaling should be employed, where, instead of mean\
    \ and standard deviation, their robust counterparts, median and MAD (median absolute\
    \ deviation from the median), are used. Mathematically, MAD scaling for any variable\
    \ x takes the following form:"
  mdcn: "## 第三章\n机器学习模型开发：工作流程与最佳实践\n\n模型是基于机器学习的解决方案中最关键的部分，因为它封装了从数据中提取的过程变量之间的关系。目前，尚不存在一个被普遍接受的、能够为各类问题生成良好模型的完全自动化ML工具。ML模型开发仍然是一门艺术，需要艺术家来创造好模型！虽然我们确实不一定需要了解模型的算法实现细节，但有几个模型开发阶段需要我们积极参与。你不能仅仅将原始数据丢进模型训练模块就期望获得好模型。你需要确保为模型训练提供了正确的数据，使用了正确的性能评估指标，恰当地评估模型是过拟合还是欠拟合，并在需要时对模型进行适当的微调。\n\
    \n已经制定了一些既定的最佳实践来帮助简化建模者的任务。在开发ML模型时，你可以将这些作为指导。在本章中，我们将研究这些最佳实践，并了解获得好模型需要什么（以及如何量化模型的“好坏”！）。这些知识将在我们开始在本书后续部分使用不同模型时对我们有所帮助。具体涵盖以下主题：\n\
    \n-   转换原始过程数据以获得更好的模型训练数据集\n-   性能指标概述及报告模型性能的最佳实践\n-   使用验证曲线诊断过拟合和欠拟合\n-  \
    \ 通过正则化解决过拟合问题\n-   模型微调和超参数优化的最佳实践\n\n## 3.1 ML模型开发工作流程\n\nML建模任务的主要目标是获得一个泛化能力强的模型，这意味着当模型接收到与训练期间使用的数据不同的数据时，其表现令人满意。实现这一目标不仅仅是在可用数据上执行\
    \ `model = <some ML_model>.fit()` 命令。在第一章中，我们简要介绍了ML建模工作流程。在本章中，我们将更详细地了解该工作流程的不同组成部分。图3.1列出了在构建ML模型时你可以预期自己执行的常见任务。虽然可以为这些任务中的每一个单独著书，但我们将涵盖足够详细的介绍，以帮助你开启ML之旅。\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_54_0.png)\n\n如你所见，工作流程中有四个主要步骤。第一步，对可用的原始数据进行预处理，以确保为后续的模型拟合步骤提供“正确”的数据集。此步骤可能涉及数据清理（丢弃无关变量或损坏/不完整的数据样本）和数据转换（生成新特征或修改现有特征）。虽然我们将在本章研究数据转换技术，但数据选择技术将在下一章详细讨论。工作流程的下一步涉及选择合适的模型并估计其参数。虽然参数估计由sklearn中现成的模型库处理，但模型选择需要你基于对特定过程系统的专业知识进行判断。模型选择的一个实用准则是奥卡姆剃刀原理，它建议选择泛化能力强的最简单模型。训练后，需要对模型进行评估，以验证建模假设并评估模型的泛化能力。模型评估步骤通常能很好地提示需要调整模型的哪个部分（或超参数），从而引出模型调优的最后一步。有专门的技术可用于辅助模型调优。在对工作流程有了这个大致了解后，我们现在开始详细学习这些技术。\n\
    \n## 3.2 数据预处理：数据转换\n\n过程数据很少以“可直接建模”的格式提供。原始数据集可能包含高度相关的变量，或者变量的值范围差异很大。这些数据特征往往会对模型训练产生负面影响，因此需要进行数据转换以去相关或适当缩放数据。有时，从提供的变量中创建新特征¹⁰可以帮助提高模型准确性。总体而言，此预处理步骤的目标是转换给定变量，以改善模型训练和模型准确性。让我们看一些常用的转换技术。\n\
    \n### 数据中心化与缩放\n\n在过程数据集中，经常会发现变量的值阶和分布范围差异很大。例如，你可能有一个温度变量在1000°C到1500°C之间变化，一个浓度变量在0.01M到0.1M之间变化，以及另一个温度变量在300°C到350°C之间变化。虽然这三个变量的值阶和分布范围差异很大，但它们可能对模型输出产生相似的影响。然而，未缩放的数据集可能导致一个变量被赋予比另一个变量更重要的权重，或者减慢模型训练速度。数据中心化和缩放将变量转换到同等基础上！虽然像PCA这样的算法必然需要中心化数据，但作为最佳实践，除非有充分的理由反对，否则你应该始终对数据集进行中心化和缩放。\n\
    \n最常见的技术是标准缩放或标准化，其中每个变量（在训练数据集中）被转换为均值为0、标准差为1。在ML脚本中，你将使用训练数据集计算出的均值和标准差来转换测试数据。下面的示例展示了sklearn如何方便地进行标准化：\n\
    \n```python\n# import library, fit, and transform\nimport numpy as np\nfrom sklearn.preprocessing\
    \ import StandardScaler\n\nX = np.array([[ 1000, 0.01, 300],\n              [\
    \ 1200, 0.06, 350],\n              [ 1500, 0.1, 320]])\n\nscaler = StandardScaler().fit(X)\
    \ # compute mean & std column-wise\nX_scaled = scaler.transform(X) # transform\
    \ using computed mean and std\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_55_0.png)\n\
    \n¹⁰ 特征（Feature）和（独立）变量（variable）是同一回事。在ML文献中，“特征”用于表示用于预测输出的变量，而“独立变量”一词在统计学中通常用于此目的。\n\
    \n### 使用sklearn库类\n\n> 在（面向对象的）计算机编程术语中，在上面的代码中，我们创建了StandardScaler类¹¹的一个对象/实例（scaler），并通过调用fit()方法设置了其属性mean_和var_。它们可以作为scaler.mean_和scaler.var_访问。然后，通过调用对象的transform方法，使用拟合好的对象（scaler）来缩放X。这将是我们使用Sklearn类的通用模式：初始化对象、拟合属性并调用方法。\n\
    \n另一种流行的技术是最小-最大缩放，也称为归一化。这里，每个变量被转换到一个共同的值范围（通常是0到1）。对于0到1归一化，每个变量减去其最小值，然后除以其范围。在Sklearn中实现如下：\n\
    \n```python\n# import library, fit, and transform\nimport numpy as np\nfrom sklearn.preprocessing\
    \ import MinMaxScaler\n\nX = np.array([[ 1000, 0.01, 300],\n              [ 1200,\
    \ 0.06, 350],\n              [ 1500, 0.1, 320]])\nscaler = MinMaxScaler () # create\
    \ object\nX_scaled = scaler.fit_transform(X) # fit & transform\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_56_0.png)\n\
    \n尽管标准缩放通常是默认选择，但哪种缩放方法更好并没有一个直接的答案。两种方法通常都能很好地工作。如果变量是高斯分布的，或者存在（一些）可能扭曲归一化过程中“最小值”和“范围”估计的极端异常值，则首选标准缩放。\n\
    \n### 稳健中心化与缩放\n\n如果你的数据集有很多异常值，那么上述两种方法都会导致缩放不当。例如，在图3.2中，我们可以看到由于异常值的存在，标准缩放无法将“正常”数据中心化在0附近。在这种情况下，应采用稳健的MAD缩放，其中使用中位数和MAD（中位数绝对偏差）作为均值和标准差的稳健对应物。从数学上讲，对于任何变量x，MAD缩放采用以下形式："

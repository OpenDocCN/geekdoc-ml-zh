    # Decision hierarchy levels in a process plant


    Before we look at some specific examples of ML applications for process systems,
    let us first familiarize ourselves with the typical decision-making hierarchy
    in a process plant. Once you understand this, you will be able to easily identify
    the avenues where ML renders itself useful in the world of process operations
    and appreciate how data science has percolated all levels of process decision
    hierarchy.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_26_0.png)'

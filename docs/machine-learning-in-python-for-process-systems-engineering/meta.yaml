    # # Chapter 6

    Dimension Reduction and Latent Variable Methods (Part 2)


    By now you must be very impressed with the powerful capabilities of PCA and PLS
    techniques. These methods allowed us to extract uncorrelated latent variables
    which maximized the captured variances. However, you may ask, “Are these the best
    dimensionality reduction techniques to use for all problems?”. We are glad that
    you asked! Other powerful methods do exist which may provide better performance.
    For example, Independent component analysis (ICA) can provide latent variables
    with stricter property of statistical independence rather than only uncorrelatedness.
    Independent components may be able to characterize the process data better than
    principal components and thus may result in better monitoring performance. If
    you are reducing dimensionality with the end goal of classifying process faults
    into different categories for fault diagnosis, then, maximal separation between
    data from different classes of faults would be your primary concern rather than
    maximal capture of data variance. Fisher discriminant analysis (FDA) would be
    better suited for this task.


    In this chapter, we will learn in detail the properties of ICA and FDA. We will
    apply these methods for process monitoring and fault classification for a large-scale
    chemical plant. Specifically, the following topics are covered


    +   - Introduction to ICA

    - Process monitoring of non-gaussian processes

    - Introduction to FDA

    - Fault classification for large scale processes'
- md: '## 6.1 ICA: An Introduction


    Independent Component Analysis (ICA) is a multivariate technique for transforming
    measured variables into statistically independent latent variables in a lower-dimensional
    space. Statistical independence is a stricter condition than uncorrelatedness
    and in some situations, working with independent components (ICs) can give better
    results than working with uncorrelated PCs from PCA. While ICA and PCA are related
    (in the sense that latent variables are linear projections of measured variables),
    they differ in the way the latent variables are extracted. Figure 6.1 highlights
    the difference between them using a simple illustration where two independent
    signals are linearly combined to generate correlated signals and then PCA/ICA
    are used to extract latent signals. It is apparent that simply decorrelating the
    signals via PCA did not recover the original signals. On the other hand, ICA reconstructs
    the original signals accurately. If you observe closely, you will find that ICA
    latent signals (u1 and u2) do differ from s1 and s2 signals in terms of sign and
    magnitude; we will soon learn why this happens and why this is not a cause of
    worry.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_135_0.png)


    ICA uses higher-order statistics for latent variable extractions, instead of only
    second order statistics (mean, variance/covariance) as done by PCA. Therefore,
    for non-gaussian (multivariate gaussian distributions are completely defined by
    second-order statistics) industrial datasets, ICs can provide more useful information
    than PCs, resulting in potentially better modeling performance. In above illustration
    we saw how ICA provided more meaningful representation by aligning the IC direction
    vectors along the edges of the data-cluster, while PC vectors were compelled,
    by design, to point in the direction of maximal variance. Figure 6.2 summarizes
    the major differences between ICA and PCA. By the end of this chapter you will
    understand these subtle differences and their implications more clearly.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_136_0.png)


    ## Independence vs Uncorrelatedness


    Before jumping into the mathematics behind ICA, let us take a few seconds to ensure
    that we understand the concepts behind independence and uncorrelatedness. Two
    random variables y1 and y2, are said to be independent if the value of one signal
    does not impact the value of the other signal. Mathematically, this condition
    is stated as


    $p(y1, y2) = p(y1)p(y2)$


    Where $p(y1)$ is the probability density function of y1 alone, and $p(y1, y2)$
    is the joint probability density function. The variables y1 and y2 are said to
    be uncorrelated if their covariance is zero


    $C(y1, y2) = E\{(y1 - E(y1))(y2 - E(y2))\} = E(y1 * y2) - E(y1)E(y2) = 0$


    Where $E(.)$ denotes mathematical expectation. Using the independence condition,
    it can be easily shown that if the variables are independent, they are also uncorrelated
    but not vice versa. Therefore, uncorrelatedness is a weaker form of independence.


    ## Mathematical background


    Consider data matrix $X \in \mathbb{R}^{m \times N}$ consisting of $N$ observations
    of $m$ input variables where each column represents a data-point in the original
    measurement space. Note that in contrast to PCA, transposed form of data matrix
    is employed here. In ICA, it is assumed that measured variables are a linear combination
    of $d (\le m)$ independent components $s_1, s_2, \dots, s_d$.


    $$X = AS$$


    where $S \in \mathbb{R}^{d \times N}$ and $A \in \mathbb{R}^{m \times d}$ is called
    the mixing matrix. The objective of ICA is to estimate the unknown matrices $A$
    and $S$ from the measured data $X$. This is accomplished by finding a demixing
    matrix, $W$, such that the ICs or the rows of estimated matrix ($\widehat{S}$)
    become as independent as possible.


    $$\widehat{S} = WX$$


    Before estimating $W$, the initial step in ICA involves removing correlations
    between the variables in the data matrix $X$. The step, called as whitening or
    spherering, is accomplished via PCA.


    $$Z = QX$$


    where $Q \in R^{d \times d}$ is called whitening matrix. Whitening makes the rows
    of $Z$ uncorrelated. To see how it helps, let $B = QA$ and consider the following
    relationships,


    $$Z = QX = QAS = BS$$


    Therefore, whitening converts the problem of finding matrix $A$ into that of finding
    matrix $B$. The advantage lies in the fact that $B$ is an orthogonal matrix -
    can be shown considering that whitened variables are uncorrelated and ICs are
    independent - and hence fewer parameters need to be estimated. Using orthogonality
    property, the following relationship results,


    $$S = B^T Z = B^T QX$$

    $$\Rightarrow W = B^T Q$$


    Therefore, once $B$ is found, $W$ can be generated. Matrix $B$ is estimated by
    maximizing the non-gaussianity of the estimated IC values, i.e., each row of $S$
    ($s_i$) should be maximally away from a gaussian distribution. Using Central Limit
    Theorem, it can be shown that maximizing non-gaussianity results in independent
    components$^{26}$ that we need.


    The above procedure summarizes the steps involved in ICA. Note that the sets $\{A/n,
    S/n\}$ and $\{A, S\}$ result in the same measured data matrix $X$ for any scalar
    $n$, and therefore the sign and magnitude of the original ICs cannot be uniquely
    estimated. This however does not affect usage of ICA for process monitoring because
    the estimated ICs for both training and test data get scaled by the same scalar
    implicitly. FastICA (a popular algorithm for ICA) computes ICs such that the $L_2$
    norm of each IC score is 1. This is the reason why the reconstructed IC signals
    in Figure 6.1 seems to be scaled version of original IC signals. We will use this
    fact later, so do not forget it!


    ## Complex chemical process: Tennessee Eastman Process (TEP)


    In this chapter, we will use dataset from a large-scale industrial chemical plant
    to demonstrate the superior performance of ICA and FDA over PCA. Details on this
    TEP dataset can be found in Appendix. The process consists of several unit operations,
    and has 22 continuous process measurements, 19 composition measurements, and 11
    manipulated variables. The dataset contains training and test data from normal
    operation period and 21 faulty periods with distinct fault causes. For each fault
    class, training datasets contains 480 samples and test datasets contains 960 samples.
    For the faulty data, faulty operation starts from sample 160 onwards.


    Let’s quickly see the process impact of one of the fault conditions (fault 10)
    which include disturbances in one of the feed’s temperature. The impact of this
    fault can be seen in abnormal stripper temperature profile (Figure 6a). The plot
    in PC space (Figure 6b) shows more clearly how the faulty operation data are different
    from the normal operation data. We will use ICA and FDA for detecting and classifying
    these faults automatically.


    ```python

    # import required packages

    import numpy as np

    import matplotlib.pyplot as plt


    # fetch TE data

    TEdata_noFault_train = np.loadtxt(''d00.dat'').T

    TEdata_Fault_train = np.loadtxt(''d10.dat'')


    # quick visualize

    plt.figure()

    plt.plot(TEdata_noFault_train[:,17])

    plt.xlabel(''sample #''), plt.ylabel(''Striper Tempearture''), plt.title(''Normal
    operation'')


    plt.figure()

    plt.plot(TEdata_Fault_train[:,17])

    plt.xlabel(''sample #''), plt.ylabel(''Striper Tempearture''), plt.title(''Faulty
    operation'')

    ```


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_139_0.png)


    Figure 6.3 (a): Normal vs faulty process profile in Tennessee Eastman dataset


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_139_1.png)


    Figure 6.3 (b): Normal vs faulty (Fault 10) TE process data in PC space


    ## Deciding number of ICs


    The number of ICs returned by FastICA equals the dimension of the measured space.
    Previously, we saw in PCA that not all extracted latent variables are important;
    only a few dominant/important components contain majority of the information while
    the rest contain noise or trivial details. Moreover, the extracted PCs were ordered
    according to their variance. However, there is no standard criterion for quantifying
    the importance of ICs and selecting the optimal number of ICs automatically. One
    popular approach (described below) for quantifying component importances was suggested
    by Lee et. al<sup>27</sup>.'
  mdcn: '## 6.1 ICA：简介


    独立成分分析（ICA）是一种多变量技术，用于将测量变量转换为低维空间中统计独立的潜变量。统计独立性是比不相关性更严格的条件，在某些情况下，使用独立成分（ICs）比使用PCA中不相关的PCs能获得更好的结果。虽然ICA和PCA是相关的（即潜变量是测量变量的线性投影），但它们在提取潜变量的方式上有所不同。图6.1通过一个简单的示例突出了它们之间的差异，其中两个独立信号被线性组合以生成相关信号，然后使用PCA/ICA来提取潜信号。显然，仅通过PCA对信号进行去相关处理并未恢复原始信号。另一方面，ICA准确地重建了原始信号。如果你仔细观察，会发现ICA潜信号（u1和u2）在符号和幅度上确实与s1和s2信号不同；我们很快就会了解为什么会发生这种情况，以及为什么这不必担心。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_135_0.png)


    ICA使用高阶统计量进行潜变量提取，而不是像PCA那样仅使用二阶统计量（均值、方差/协方差）。因此，对于非高斯（多元高斯分布完全由二阶统计量定义）的工业数据集，ICs可以比PCs提供更有用的信息，从而可能带来更好的建模性能。在上面的示例中，我们看到ICA如何通过将IC方向向量与数据簇的边缘对齐来提供更有意义的表示，而PC向量则被设计强制指向最大方差的方向。图6.2总结了ICA和PCA之间的主要区别。在本章结束时，你将更清楚地理解这些微妙的差异及其含义。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_136_0.png)


    ## 独立性与不相关性


    在深入探讨ICA背后的数学原理之前，让我们花几秒钟确保我们理解独立性和不相关性背后的概念。如果两个随机变量y1和y2的值互不影响，则称它们是独立的。数学上，这个条件表示为


    $p(y1, y2) = p(y1)p(y2)$


    其中$p(y1)$是y1单独的概率密度函数，$p(y1, y2)$是联合概率密度函数。如果变量y1和y2的协方差为零，则称它们是不相关的


    $C(y1, y2) = E\{(y1 - E(y1))(y2 - E(y2))\} = E(y1 * y2) - E(y1)E(y2) = 0$


    其中$E(.)$表示数学期望。利用独立性条件，可以很容易地证明，如果变量是独立的，那么它们也是不相关的，但反之则不然。因此，不相关性是独立性的一种较弱形式。


    ## 数学背景


    考虑数据矩阵$X \in \mathbb{R}^{m \times N}$，它由$m$个输入变量的$N$个观测值组成，其中每一列代表原始测量空间中的一个数据点。注意，与PCA不同，这里使用的是数据矩阵的转置形式。在ICA中，假设测量变量是$d
    (\le m)$个独立成分$s_1, s_2, \dots, s_d$的线性组合。


    $$X = AS$$


    其中$S \in \mathbb{R}^{d \times N}$，$A \in \mathbb{R}^{m \times d}$称为混合矩阵。ICA的目标是从测量数据$X$中估计未知矩阵$A$和$S$。这是通过找到一个解混矩阵$W$来实现的，使得ICs或估计矩阵（$\widehat{S}$）的行尽可能独立。


    $$\widehat{S} = WX$$


    在估计$W$之前，ICA的初始步骤涉及去除数据矩阵$X$中变量之间的相关性。这一步称为白化或球化，通过PCA完成。


    $$Z = QX$$


    其中$Q \in R^{d \times d}$称为白化矩阵。白化使$Z$的行不相关。为了理解它如何帮助，令$B = QA$并考虑以下关系，


    $$Z = QX = QAS = BS$$


    因此，白化将寻找矩阵$A$的问题转化为寻找矩阵$B$的问题。其优势在于$B$是一个正交矩阵——考虑到白化变量是不相关的且ICs是独立的，可以证明这一点——因此需要估计的参数更少。利用正交性，得到以下关系，


    $$S = B^T Z = B^T QX$$

    $$\Rightarrow W = B^T Q$$


    因此，一旦找到$B$，就可以生成$W$。矩阵$B$通过最大化估计IC值的非高斯性来估计，即$S$的每一行（$s_i$）应尽可能远离高斯分布。利用中心极限定理，可以证明最大化非高斯性将产生我们需要的独立成分$^{26}$。


    上述过程总结了ICA中涉及的步骤。注意，对于任何标量$n$，集合$\{A/n, S/n\}$和$\{A, S\}$产生相同的测量数据矩阵$X$，因此原始ICs的符号和幅度无法唯一估计。然而，这并不影响ICA在过程监控中的使用，因为训练和测试数据的估计ICs隐式地被相同的标量缩放。FastICA（一种流行的ICA算法）计算ICs使得每个IC分数的$L_2$范数为1。这就是为什么图6.1中重建的IC信号看起来是原始IC信号的缩放版本的原因。我们稍后会用到这个事实，所以不要忘记它！


    ## 复杂化工过程：田纳西伊士曼过程（TEP）


    在本章中，我们将使用来自大型工业化工厂的数据集来证明ICA和FDA相对于PCA的优越性能。有关此TEP数据集的详细信息，请参见附录。该过程包括几个单元操作，有22个连续过程测量值、19个成分测量值和11个操纵变量。该数据集包含来自正常操作期和21个具有不同故障原因的故障期的训练和测试数据。对于每个故障类别，训练数据集包含480个样本，测试数据集包含960个样本。对于故障数据，故障操作从样本160开始。


    让我们快速查看一个故障条件（故障10）的过程影响，该故障包括进料温度之一的扰动。该故障的影响可以从异常的汽提塔温度曲线（图6a）中看出。PC空间中的图（图6b）更清楚地显示了故障操作数据与正常操作数据的不同之处。我们将使用ICA和FDA来自动检测和分类这些故障。


    ```python

    # import required packages

    import numpy as np

    import matplotlib.pyplot as plt


    # fetch TE data

    TEdata_noFault_train = np.loadtxt(''d00.dat'').T

    TEdata_Fault_train = np.loadtxt(''d10.dat'')


    # quick visualize

    plt.figure()

    plt.plot(TEdata_noFault_train[:,17])

    plt.xlabel(''sample #''), plt.ylabel(''Striper Tempearture''), plt.title(''Normal
    operation'')


    plt.figure()

    plt.plot(TEdata_Fault_train[:,17])

    plt.xlabel(''sample #''), plt.ylabel(''Striper Tempearture''), plt.title(''Faulty
    operation'')

    ```


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_139_0.png)


    图6.3 (a)：田纳西伊士曼数据集中正常与故障过程曲线


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_139_1.png)


    图6.3 (b)：PC空间中正常与故障（故障10）的TE过程数据


    ## 确定ICs的数量


    FastICA返回的ICs数量等于测量空间的维度。之前我们在PCA中看到，并非所有提取的潜变量都是重要的；只有少数主导/重要的成分包含大部分信息，而其余的包含噪声或琐碎的细节。此外，提取的PCs是根据其方差排序的。然而，目前没有标准标准来量化ICs的重要性并自动选择最佳数量的ICs。Lee等人<sup>27</sup>提出了一种量化成分重要性的流行方法（如下所述）。'

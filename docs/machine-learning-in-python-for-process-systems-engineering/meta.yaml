    \ import Dense\nfrom Tank_Environment import tank_environment\n```\n\n```\n# 定义实用函数\n\
    def ActorNetwork(n_states=3, n_action=1):\n    \"\"\"\n    描述：获取具有给定参数的演员网络\n\
    \    返回值：keras模型\n    \"\"\"\n    model = Sequential()\n    model.add(Dense(8,\
    \ activation='relu', input_shape=(n_states,)))\n    model.add(Dense(8, activation='relu'))\n\
    \    model.add(Dense(n_action, activation='sigmoid'))\n\n    return model\n```\n\
    \n```\ndef CriticNetwork(n_states=3, n_action=1):\n    \"\"\"\n    描述：获取具有给定参数的评论家网络\n\
    \    返回值：keras模型\n    \"\"\"\n    model = Sequential()\n    model.add(Dense(8,\
    \ activation='relu', input_shape=(n_states+n_action,)))\n    model.add(Dense(8,\
    \ activation='relu'))\n    model.add(Dense(1))\n\n    return model\n```\n\n上面两个函数将在后面用于创建我们的演员、评论家和目标网络。下一个函数执行目标网络的软更新。\n\
    \n```\ndef update_target(target_network, ref_network, tau=0.01):\n    \"\"\"\n\
    \    使用参考/主网络的权重更新目标网络权重\n    \"\"\"\n    target_network_weights = target_network.get_weights()\n\
    \    ref_network_weights = ref_network.get_weights()\n\n    for index in range(len(target_network_weights)):\n\
    \        target_network_weights[index] = tau*ref_network_weights[index] + \\\n\
    \                                        (1-tau)*target_network_weights[index]\n\
    \    target_network.set_weights(target_network_weights)\n\n    return target_network\n\
    ```\n\n下一个函数生成OU噪声，该噪声作为扰动添加到演员的动作中。随后的图显示了由该机制生成的噪声模式示例。很明显，OU过程表现出更大的惯性（与剧烈波动的高斯过程相比），因为OU噪声信号倾向于在长时间内朝同一方向演变；这促进了强化学习智能体训练期间的深度探索。\n\
    \n```\ndef OU_noise(noise_prev, theta=0.15, mu=0, sigma=0.025, n_action=1):\n\
    \    \"\"\"\n    描述：模拟OU过程以生成时间相关噪声\n    改编自 github.com/openai/baselines/blob/master/baselines/ddpg/noise.py\n\
    \    \"\"\"\n    noise = noise_prev + theta*(mu-noise_prev) + sigma*np.random.randn(n_action)\n\
    \    return noise\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_324_0.png)\n\
    \n使用OU_noise函数生成的一个回合内的噪声概况\n\n接下来，我们创建一个函数，从RM中采样一批存储的转换元组。你会注意到一个额外的变量‘done’是这里转换元组的一部分。这个变量的重要性将在下一个实用函数中变得清晰。\n\
    \n```\ndef sample_ReplayMemory():\n    \"\"\"\n    返回值：\n        states: 一个具有3列的2D\
    \ numpy数组\n        actions: 一个具有1列的2D numpy数组\n        rewards: 一个1D numpy数组\n\
    \        next_states: 一个具有3列的2D numpy数组\n        dones: 一个1D numpy数组\n\n    改编自\
    \ github.com/ageron/handson-ml2/blob/master/18_reinforcement_learning.ipynb\n\
    \    \"\"\"\n\n    # 从回放缓存中选择一批转换\n    indices = np.random.randint(len(replay_memory),\
    \ size=batchSize)\n    batch = [replay_memory[index] for index in indices]\n\n\
    \    # 从选定的转换中分离出状态、动作、奖励、下一状态、是否结束\n    states, actions, rewards, next_states,\
    \ dones = [np.array([transition[field_index] for transition in batch]) for field_index\
    \ in range(5)]\n\n    return states, actions, rewards, next_states, dones\n```\n\
    \n之前，我们计算了TD目标为 $\\tilde{y}_i = r_i + \\gamma Q_{w,target}(s'_i, \\mu_{\\theta,target}(s'_i))$，其中\
    \ $i^{th}$ 是RM中一个小批量的第 $i^{th}$ 个转换元组（参见算法4）。我们现在将对这个公式进行一个小的修改，如下所示\n\n$\\tilde{y}_i\
    \ = r_i + (1 - done_i) * \\gamma Q_{w,target}(s'_i, \\mu_{\\theta,target}(s'_i))$，其中\
    \ $i^{th}$ 是小批量中的第 $i^{th}$ 个元组\n\n修改后的公式陈述了一个明显的事实：如果回合或任务因在状态 $s_i$ 下采取动作 $a_i$\
    \ 而终止（$done_i$ 等于1或True），则TD目标就是奖励（$r_i$）。下面的函数实现了这个公式。\n\n```\ndef get_TD_targets(rewards,\
    \ target_Q_values, dones, gamma=0.95):\n    \"\"\"\n    参数：\n        rewards:\
    \ 一个1D numpy数组\n        target_Q_values: 一个具有1列的2D numpy数组\n        dones: 一个1D\
    \ numpy数组\n\n    返回值：\n        td_targets: 一个具有1列的2D numpy数组\n    \"\"\"\n   \
    \ td_targets = np.zeros_like(target_Q_values)\n    for i in range(target_Q_values.shape[0]):\n\
    \        if dones[i]:\n            td_targets[i] = rewards[i]\n        else:\n\
    \            td_targets[i] = rewards[i] + gamma*target_Q_values[i]\n\n    return\
    \ td_targets\n```\n\n好了，我们现在到了最后一个需要定义的实用函数。这个函数使用从采样的小批量中获取的数据来更新主演员和评论家网络。这里涉及几个新概念，需要一些解释。你会注意到使用了tf.function装饰器$^{78}$，它将常规Python函数转换为Tensorflow函数，从而实现更快的计算。输入签名指定了函数每个Tensor参数的形状和类型。在函数内部，使用了GradientTape\
    \ API$^{79}$，它实现了用于梯度计算的自动微分。该API允许Tensorflow在tf.GradientTape的上下文中“记录”执行了哪些操作。当调用tape.gradient函数时，Tensorflow会计算记录的操作相对于指定变量的梯度。\n\
    \n```\n@tf.function(input_signature=[tf.TensorSpec(shape=(None, 3), dtype=tf.float32),\n\
    \                            tf.TensorSpec(shape=(None, 1), dtype=tf.float32),\n\
    \                            tf.TensorSpec(shape=(None, 1), dtype=tf.float32)])\n\
    def ddpg_updateStep(s, a, td_targets):\n    \"\"\"\n    描述：使用梯度下降更新主网络\n\n   \
    \ 参数：\n        s: 一个具有3列的2D numpy数组\n        a: 一个具有1列的2D numpy数组\n        td_targets:\
    \ 一个具有1列的2D numpy数组\n    \"\"\"\n\n    # 通过算法4的步骤11更新评论家\n    # 网络、损失函数（均方误差）和优化器在脚本后面定义\n\
    \    with tf.GradientTape() as tape:\n        Q_predicted = critic(tf.concat([s,\
    \ a], 1))\n        critic_loss = tf.reduce_mean(loss_fn(td_targets, Q_predicted))\n\
    \    critic_gradients = tape.gradient(critic_loss, critic.trainable_variables)\n\
    \    critic_optimizer.apply_gradients(zip(critic_gradients, critic.trainable_variables))\n\
    \n    # 更新演员\n    with tf.GradientTape() as tape:\n        actor_loss = -tf.reduce_mean(critic(tf.concat([s,\
    \ actor(s)], 1)))\n    actor_gradients = tape.gradient(actor_loss, actor.trainable_variables)\n\
    \    actor_optimizer.apply_gradients(zip(actor_gradients, actor.trainable_variables))\n\
    ```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_326_0.png)\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_326_1.png)\n\
    \n好的，现在让我们训练智能体。\n\n```\n# 定义回放缓存\nfrom collections import deque\nreplay_memory\
    \ = deque(maxlen=100000)\n```"

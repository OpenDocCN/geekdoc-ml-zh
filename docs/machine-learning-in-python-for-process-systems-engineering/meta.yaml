    # Outlier-resistant robust techniques


    The outlier-handling method we studied till now relied on explicit identification
    of outliers. Once identified, these outliers are removed from model fitting dataset
    before model parameter estimation. There is another set of methods, called robust
    methods**+, which directly use outlier-contaminated data for model fitting. These
    algorithms are designed such that the effect of outliers is reduced by down-weighting
    them and only inliers primarily determine the model parameters.


    Figure 4.16 illustrates an application of robust linear regression using RANSAC
    algorithm in Sklearn. The robust method is able to successfully ignore the outliers
    to find the correct fit between target and predictor.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_100_0.png)


    IRPLS (iteratively re-weighted PLS) is another popular robust regression method
    using PLS. Most of the outlier-resistant robust methods employ iterative algorithm
    where model parameters are computed iteratively and samples with high residuals
    identified in each iteration are assigned lower weights.


    *Zhu et. al., Review and big data perspectives on robust data mining approaches
    for industrial process modeling with outliers and missing data, Annual Reviews
    in Control, 2018

    + Frosch + Bro, Robust methods for multivariate data analysis, Journal of Chemometrics,
    2005


    This concludes our study of methods for outlier detection. Our objective was to
    help you understand the pros and cons of different techniques because there is
    no universal method applicable to all problems. A good understanding of the underlying
    process and the nature of data can greatly help make the right choice of technique.'
- md: "## 4.4 Handling Missing Data\n\nMissing data issues arise when values of a\
    \ variable or multiple variables are missing in one or more observations of the\
    \ dataset. The samples with missing data can simply be discarded if their number\
    \ is much smaller than the total number of available samples. However, if this\
    \ is not the case or there are reasons to believe that discarding samples will\
    \ negatively impact model fitting, imputation techniques can be employed which\
    \ attempt to fill-in the missing values of a variable using available data from\
    \ the same variable or other variables.\n\nA simple imputation strategy is mean\
    \ imputation where the missing values of a variable are replaced with the mean\
    \ of all available data for the variable and is illustrated in the code snippet\
    \ below\n\n```python\n# Mean imputation\nimport numpy as np\nfrom sklearn.impute\
    \ import SimpleImputer\n\nsample_data = [[1, 2, np.nan], [3, 4, 3], [np.nan, 6,\
    \ 5], [8, 8, 7]]\nmean_imputeModel = SimpleImputer(missing_values=np.nan, strategy='mean')\n\
    \nprint(mean_imputeModel.fit_transform(sample_data))\n\n>>> [[1. 2. 5.]\n    \
    \ [3. 4. 3.]\n     [4. 6. 5.]\n     [8. 8. 7.]]\n```\n\nAnother widely used approach\
    \ is hot-deck imputation, where missing values of a sample are replaced from the\
    \ available values of 'similar' samples. Sklearn provides KNNImputer class which\
    \ imputes missing value with the weighted (or mean) combination from k-nearest\
    \ neighbors in the fitting dataset. The distance metric between 2 samples is computed\
    \ using features that neither samples are missing.\n\n```python\n# KNN imputation\n\
    from sklearn.impute import KNNImputer\n\nknn_imputeModel = KNNImputer(n_neighbors=2)\n\
    print(knn_imputeModel.fit_transform(sample_data))\n\n>>> [[1. 2. 4.]\n     [3.\
    \ 4. 3.]\n     [5.5 6. 5.]\n     [8. 8. 7.]]\n```\n\nAlthough not currently available\
    \ in Sklearn, more advanced techniques like regression imputation, likelihood-based\
    \ imputation also exist. The former method imputes the missing values in a variable\
    \ using a regression model with other correlated variables as predictors. The\
    \ latter method uses expectation-maximization (EM) algorithm for imputing missing\
    \ values in a probabilistic framework.\n\nAs with variable selection and outlier\
    \ handling methods, it cannot be said beforehand which missing data technique\
    \ will work best for your problem. A good recourse is to select a few methods\
    \ based on your process knowledge, build separate models with them, and select\
    \ the best performing one!\n\n## Summary\n\nIn this chapter, we studied the techniques\
    \ commonly employed to handle different types and degree of data contamination.\
    \ We looked into the issues of measurement noise, irrelevant features, outliers,\
    \ and missing data. A natural pre-processing workflow entails denoising the dataset\
    \ first, followed by variable selection and outlier removal. With this, we conclude\
    \ the first leg of our ML journey. With the fundamentals in place, let's start\
    \ the second phase of the journey where we will look into several classical and\
    \ very useful ML algorithms.\n\n# Part 2\n\n## Classical Machine Learning Methods\n\
    \n# Chapter 5\n## Dimension Reduction and Latent Variable Methods (Part 1)\n\n\
    It is not uncommon to have hundreds of process relevant variables being measured\
    \ at manufacturing facilities. If you are looking to build a machine learning\
    \ model using these process variables, then the high dimensionality (number of\
    \ model variables) will present you several unique challenges related to algorithmic\
    \ issues (due to collinearity among variables), difficulty in visualizing data,\
    \ large computational costs, and slow model training. However, this problem, referred\
    \ to as the *curse of dimensionality*, should not dampen your spirits! Conservation\
    \ laws such as mass balances, thermodynamics constraints, enforced product specifications,\
    \ and other operational restrictions induce correlations among the process variables\
    \ and make it appear as if the measured variables are all derived from a small\
    \ number of hidden (un-measured) variables. Latent variable-based methods reduce\
    \ process dimensionality by finding these hidden latent variables.\n\nPCA and\
    \ PLS are among the most popular latent variable-based statistical tools and have\
    \ been used successfully in several process monitoring and soft sensing applications.\
    \ This chapter provides a comprehensive exposition of the PCA and PLS techniques\
    \ and teaches you how to apply them on process data. Specifically, the following\
    \ topics are covered:\n\n- Introduction to PCA and PLS\n- Process modeling and\
    \ monitoring via PCA and PLS\n- Fault diagnosis for root cause analysis\n- Nonlinear\
    \ and dynamic variants of linear PCA and PLS\n\n## 5.1 PCA: An Introduction\n\n\
    Principal component analysis (PCA) is a multivariate technique that transforms\
    \ a high-dimensional set of correlated variables into a low-dimensional set of\
    \ uncorrelated (latent) variables with minimum loss of information. Consider the\
    \ 3-dimensional data in figure 2.1. It is apparent that although the data is three\
    \ dimensional, the data-points mostly lie along a 2-D plane; and even in this\
    \ plane, the spread is much higher along a particular direction. PCA converts\
    \ the original (x,y,z) space into a 2-D principal component (PC) space where the\
    \ 1st PC (PC1) corresponds to the direction of maximum spread/variance in data\
    \ and the 2nd PC (PC2) corresponds to the direction with highest variance among\
    \ all directions orthogonal to 1st PC. Depending upon modeling requirements, even\
    \ the 2nd PC may be discarded, essentially obtaining a 1-D data while losing out\
    \ some information. Also, as we will see soon, it is straightforward to recover\
    \ original data from data in PC space.\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_105_0.png)\n\
    \nIn ML world, it is common to find application of classification and clustering\
    \ techniques in the PC space. In process industry, process modeling (via principal\
    \ component regression (PCR)) and monitoring are common application of PCA¹⁶.\
    \ In PCR, the process outputs are regressed onto the principal component values\
    \ of the input data. By doing so, the problem of ill-conditioning frequently encountered\
    \ in classical multiple linear regression (MLR) due to high input space dimensionality\
    \ and high degree of correlation among input variables is circumvented. PCA is\
    \ also frequently utilized for process visualization. For many applications, two\
    \ or three PCs are adequate for capturing most of the variability in process data\
    \ and therefore, the compressed process data can be visualized with a single plot.\
    \ Plant operators and engineers use this single plot to find past and current\
    \ patterns in process data.\n\n> ¹⁶ The popularity of latent-variable techniques\
    \ for process control and monitoring arose from the pioneering work by John McGregor\
    \ at McMaster University.\n\n## Mathematical background\n\nConsider a data matrix\
    \ $X \\in \\mathbb{R}^{N \\times m}$ consisting of $N$ samples of $m$ input variables\
    \ where each row represents a data-point in the original measurement space. It\
    \ is assumed that each column is normalized to zero mean and unit variance. Let\
    \ $v \\in \\mathbb{R}^m$ represent the 'loading' vector that projects data-points\
    \ along PC1 and can be found by solving the following optimization problem\n\n\
    ![](img/ae65e737df4a9f5732c91f7aea579fc8_106_0.png)\n\n$$\\max_{v \\neq 0} \\\
    frac{(Xv)^T Xv}{v^T v} \\quad \\text{eq. 1}$$\n\nIt is apparent that eq. 1 is\
    \ trying to maximize the variance of the projected data-points along PC1. Loading\
    \ vectors for other PCs are found by solving the same problem with the added constraint\
    \ of orthogonality to previously computed loading vectors. Alternatively, loading\
    \ vectors can also be computed from eigenvalue decomposition of covariance matrix\
    \ ($S$) of $X$\n\n$$\\frac{1}{N-1} X^T X = S = V \\Lambda V^T \\quad \\text{eq.\
    \ 2}$$\n\nAbove is the form you will find more commonly in PCA literature. The\
    \ columns of eigenvector matrix $V \\in \\mathbb{R}^{m \\times m}$ are the loading\
    \ vectors that we need. The diagonal eigenvalue matrix $\\Lambda$ equals $diag[\\\
    lambda_1, \\lambda_2, \\dots, \\lambda_m]$, where $\\lambda_1 \\geq \\lambda_2\
    \ \\geq \\dots \\geq \\lambda_m$ are the eigenvalues. In fact, $\\lambda_j$ is\
    \ equal to the variance along the $j^{th}$ PC. If there is significant correlation\
    \ in original data, only the first few eigenvalues will be significant. Let's\
    \ assume that $k$ PCs are retained, then, the first $k$ columns of $V$ (which\
    \ corresponds to the first $k$ $\\lambda_s$) are taken to form the loading matrix\
    \ $P \\in \\mathbb{R}^{m \\times k}$. Transformed data in the PC space can now\
    \ be obtained\n\nProjected values along $j^{th}$ PC $\\longleftarrow$ $$t_j =\
    \ Xp_j \\text{ or } T = XP \\quad \\text{eq. 3}$$\n\nThe m dimensional $i^{th}$\
    \ row of $X$ has been transformed into $k$ ($< m$) dimensional $i^{th}$ row of\
    \ $T$. $T \\in \\mathbb{R}^{N \\times k}$ is called score matrix and the $j^{th}$\
    \ column of $T$ ($t_j$) contains the (score) values along the $j^{th}$ PC. The\
    \ scores can be projected back to the original measurement space as follows\n\n\
    $$\\widehat{X} = TP^T \\quad \\text{eq. 4}$$\n\nNote that because we discarded\
    \ the loading vectors corresponding to insignificant $\\lambda_s$, $\\widehat{X}\
    \ \\neq X$. The difference $E = X - \\widehat{X}$ is referred to as residual matrix\
    \ as each row is the residual or error vector for a data-point. Overall, the PC\
    \ space captures the systematic trends in process data and the residual space\
    \ primarily describe the noise in data."
  mdcn: "## 4.4 处理缺失数据\n\n当数据集的一个或多个观测值中，一个或多个变量的值缺失时，就会出现缺失数据问题。如果缺失数据的样本数量远小于可用样本总数，可以简单地丢弃这些样本。然而，如果情况并非如此，或者有理由认为丢弃样本会对模型拟合产生负面影响，则可以采用插补技术，尝试使用同一变量或其他变量的可用数据来填补变量的缺失值。\n\
    \n一种简单的插补策略是均值插补，即用该变量所有可用数据的均值替换其缺失值，如下方代码片段所示：\n\n```python\n# Mean imputation\n\
    import numpy as np\nfrom sklearn.impute import SimpleImputer\n\nsample_data =\
    \ [[1, 2, np.nan], [3, 4, 3], [np.nan, 6, 5], [8, 8, 7]]\nmean_imputeModel = SimpleImputer(missing_values=np.nan,\
    \ strategy='mean')\n\nprint(mean_imputeModel.fit_transform(sample_data))\n\n>>>\
    \ [[1. 2. 5.]\n     [3. 4. 3.]\n     [4. 6. 5.]\n     [8. 8. 7.]]\n```\n\n另一种广泛使用的方法是热卡插补，即用“相似”样本的可用值替换样本的缺失值。Sklearn\
    \ 提供了 `KNNImputer` 类，它使用拟合数据集中 k 个最近邻的加权（或均值）组合来插补缺失值。两个样本之间的距离度量是使用两个样本都没有缺失的特征来计算的。\n\
    \n```python\n# KNN imputation\nfrom sklearn.impute import KNNImputer\n\nknn_imputeModel\
    \ = KNNImputer(n_neighbors=2)\nprint(knn_imputeModel.fit_transform(sample_data))\n\
    \n>>> [[1. 2. 4.]\n     [3. 4. 3.]\n     [5.5 6. 5.]\n     [8. 8. 7.]]\n```\n\n\
    尽管 Sklearn 目前尚未提供，但更先进的技术，如回归插补、基于似然的插补也存在。前者使用以其他相关变量为预测变量的回归模型来插补变量中的缺失值。后者在概率框架中使用期望最大化（EM）算法来插补缺失值。\n\
    \n与变量选择和异常值处理方法一样，无法预先断言哪种缺失数据技术最适合你的问题。一个好的方法是根据你的过程知识选择几种方法，分别构建模型，然后选择表现最佳的一个！\n\
    \n## 总结\n\n在本章中，我们研究了处理不同类型和程度数据污染的常用技术。我们探讨了测量噪声、无关特征、异常值和缺失数据的问题。一个自然的预处理工作流程是首先对数据集进行去噪，然后进行变量选择和异常值剔除。至此，我们结束了机器学习之旅的第一阶段。在掌握了基础知识之后，让我们开始旅程的第二阶段，我们将探讨几种经典且非常有用的机器学习算法。\n\
    \n# 第二部分\n\n## 经典机器学习方法\n\n# 第5章\n## 降维与潜变量方法（第一部分）\n\n在制造设施中，测量数百个与过程相关的变量并不少见。如果你打算使用这些过程变量构建机器学习模型，那么高维度（模型变量的数量）将给你带来几个独特的挑战，这些问题涉及算法问题（由于变量间的共线性）、数据可视化困难、计算成本高以及模型训练缓慢。然而，这个被称为*维度灾难*的问题，不应让你气馁！守恒定律，如质量平衡、热力学约束、强制执行的产品规格以及其他操作限制，会在过程变量之间引入相关性，使得测量变量看起来都源自少数几个隐藏（未测量）的变量。基于潜变量的方法通过寻找这些隐藏的潜变量来降低过程维度。\n\
    \nPCA 和 PLS 是最流行的基于潜变量的统计工具之一，并已成功应用于多个过程监控和软测量应用中。本章全面阐述了 PCA 和 PLS 技术，并教你如何将其应用于过程数据。具体涵盖以下主题：\n\
    \n- PCA 和 PLS 简介\n- 通过 PCA 和 PLS 进行过程建模和监控\n- 用于根本原因分析的故障诊断\n- 线性 PCA 和 PLS 的非线性及动态变体\n\
    \n## 5.1 PCA 简介\n\n主成分分析（PCA）是一种多变量技术，它将一组高维的相关变量转换为一组低维的不相关（潜变量）变量，同时信息损失最小。考虑图\
    \ 2.1 中的三维数据。很明显，尽管数据是三维的，但数据点主要分布在一个二维平面上；即使在这个平面上，沿某个特定方向的分布也更广。PCA 将原始的 (x,y,z)\
    \ 空间转换为二维主成分（PC）空间，其中第一主成分（PC1）对应于数据中最大分布/方差的方向，第二主成分（PC2）对应于所有与 PC1 正交的方向中方差最大的方向。根据建模要求，甚至可以丢弃第二主成分，本质上得到一维数据，同时会损失一些信息。此外，正如我们很快将看到的，从\
    \ PC 空间的数据恢复原始数据是直接的。\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_105_0.png)\n\
    \n在机器学习领域，分类和聚类技术在 PC 空间中的应用很常见。在过程工业中，过程建模（通过主成分回归（PCR））和监控是 PCA 的常见应用¹⁶。在 PCR\
    \ 中，过程输出被回归到输入数据的主成分值上。这样做，就规避了经典多元线性回归（MLR）中由于输入空间维度高和输入变量间高度相关而经常遇到的病态问题。PCA\
    \ 也经常用于过程可视化。对于许多应用，两个或三个主成分就足以捕获过程数据中的大部分变异性，因此，压缩后的过程数据可以用单个图进行可视化。工厂操作员和工程师使用这个单一图表来发现过程数据中的过去和当前模式。\n\
    \n> ¹⁶ 潜变量技术在过程控制和监控中的流行源于麦克马斯特大学 John McGregor 的开创性工作。\n\n## 数学背景\n\n考虑一个数据矩阵\
    \ $X \\in \\mathbb{R}^{N \\times m}$，它由 $N$ 个样本的 $m$ 个输入变量组成，其中每一行代表原始测量空间中的一个数据点。假设每一列都已归一化为零均值和单位方差。令\
    \ $v \\in \\mathbb{R}^m$ 表示将数据点投影到 PC1 方向上的“载荷”向量，可以通过求解以下优化问题找到：\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_106_0.png)\n\
    \n$$\\max_{v \\neq 0} \\frac{(Xv)^T Xv}{v^T v} \\quad \\text{公式 1}$$\n\n显然，公式\
    \ 1 试图最大化投影数据点沿 PC1 的方差。其他主成分的载荷向量通过求解相同的问题并附加与先前计算的载荷向量正交的约束来找到。或者，载荷向量也可以从 $X$\
    \ 的协方差矩阵（$S$）的特征值分解中计算得出：\n\n$$\\frac{1}{N-1} X^T X = S = V \\Lambda V^T \\quad\
    \ \\text{公式 2}$$\n\n以上是你在 PCA 文献中更常见的形式。特征向量矩阵 $V \\in \\mathbb{R}^{m \\times\
    \ m}$ 的列就是我们需要的载荷向量。对角特征值矩阵 $\\Lambda$ 等于 $diag[\\lambda_1, \\lambda_2, \\dots,\
    \ \\lambda_m]$，其中 $\\lambda_1 \\geq \\lambda_2 \\geq \\dots \\geq \\lambda_m$\
    \ 是特征值。事实上，$\\lambda_j$ 等于沿第 $j$ 个 PC 的方差。如果原始数据中存在显著相关性，则只有前几个特征值是显著的。假设保留 $k$\
    \ 个主成分，则取 $V$ 的前 $k$ 列（对应于前 $k$ 个 $\\lambda$）构成载荷矩阵 $P \\in \\mathbb{R}^{m \\\
    times k}$。现在可以获得 PC 空间中的转换数据：\n\n沿第 $j$ 个 PC 的投影值 $\\longleftarrow$ $$t_j = Xp_j\
    \ \\text{ 或 } T = XP \\quad \\text{公式 3}$$\n\n$X$ 的 $m$ 维第 $i$ 行已被转换为 $T$ 的 $k$（$<\
    \ m$）维第 $i$ 行。$T \\in \\mathbb{R}^{N \\times k}$ 称为得分矩阵，$T$ 的第 $j$ 列（$t_j$）包含沿第\
    \ $j$ 个 PC 的（得分）值。得分可以按如下方式投影回原始测量空间：\n\n$$\\widehat{X} = TP^T \\quad \\text{公式\
    \ 4}$$\n\n请注意，由于我们丢弃了对应于不显著 $\\lambda$ 的载荷向量，因此 $\\widehat{X} \\neq X$。差值 $E =\
    \ X - \\widehat{X}$ 被称为残差矩阵，因为每一行都是数据点的残差或误差向量。总体而言，PC 空间捕获了过程数据中的系统性趋势，而残差空间主要描述数据中的噪声。"

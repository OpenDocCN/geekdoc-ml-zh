  md: '# White-box/grey-box/black-box models


    For soft sensing, terms like white-box, grey-box, black-box are often used. Figure
    1.13 clarifies the difference between the terms. White-box models utilize fundamental
    mass/energy/momentum conservation laws to relate model inputs and outputs. Black-box
    methods build estimation models using only process data. Grey-box methods combine
    the two approaches to generate a hybrid model.


    Consider our furnace system again. CFD model would be the white-box model. PLS
    model relating furnace inputs to product stream composition would fall in black-box
    model category. However, to balance the trade-off between model accuracy and computational
    expense, a hybrid model can be built. Mechanistic model of radiation energy transfer
    is the most complex part of the furnace model. One can build a black-box model
    to estimate the amount of radiation energy supplied to the tubes. This model can
    then be combined with the mechanistic model of tube to predict product composition.


    Hybrid models tend to have better extrapolation accuracies compared to black-box
    models and are preferred when the amount of training data is low.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_29_0.png)


    hundreds of tube temperature measurements. Unfavorable conditions like catalyst
    damage or tube leaks may induce abnormal increase in some of the temperatures.
    However, it is impractical to monitor all these temperatures manually all the
    time. Instead, process monitoring models could be built using historical data
    that provides early warning for temperature upsets so that timely corrective actions
    can be taken.'

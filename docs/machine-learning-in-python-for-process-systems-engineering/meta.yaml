  md: '# 1.2 What is Machine Learning


    At its core, machine learning simply means using computer programs and data for
    finding relationship between different components of a system and discovering
    patterns that were not immediately evident. This characteristic of using data
    to learn about the system makes machine learning interesting and different. System
    specific knowledge is not explicitly embedded into a ML program; the program extracts
    the knowledge from data. Figure 1.3 compares ML approach with a non-ML approach
    for distillation column modeling: ML approach does not require system specific
    data such as number of stages or the type of packing.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_19_0.png)


    We often marvel at the accuracy of recommendations made by Netflix or amazon for
    potential shows or products. These companies do not possess explicit information
    about our personal preferences or psychology (whether we like sci-fi movies or
    not). The data does all the trick! ML algorithms process past purchase data to
    discern the likes and dislikes of its customers and make recommendations. In process
    industry, manufacturers use ML methods to determine optimal equipment maintenance
    schedule using past maintenance and operating conditions data. Here again, data-based
    analysis provides considerable convenience over the alternative method of complex
    metallurgical analysis.


    The reliance on data alone to obtain reasonably good system approximation is one
    of the major reasons behind ML''s growing popularity. The barrier of requiring
    specific domain knowledge to be able to analyze a system has been circumvented
    by machine learning. ML algorithms are also universal in nature. For example,
    we can use the same data-clustering algorithm for analyzing demographics data,
    factory data, or economic data to obtain actionable knowledge. These properties
    combined with the surge in the amount of data'

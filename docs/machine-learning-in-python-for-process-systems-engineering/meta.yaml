    \ += list3[i]**2\n\nprint(sum_of_squares) # 显示 78\n```\n\n## 自定义函数\n\n之前我们使用了\
    \ Python 的内置函数（len(), append()）来执行为这些函数预定义的操作。Python 也允许定义我们自己的自定义函数。自定义函数的优势在于，我们可以定义一组指令，然后在脚本和项目中多次重用它们。\n\

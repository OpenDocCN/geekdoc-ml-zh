    > **Process Monitoring Terminology**


    In our process monitoring applications so far, we have used terms like fault detection,
    fault diagnosis, and fault classification. You may, however, also encounter other
    terms like fault identification, fault isolation. While these terms may get used
    interchangeably, there exist nuanced differences. Fault detection refers to the
    task of determining whether abnormal process conditions have occurred. Fault identification
    and fault isolation, both refer to the task of identifying the process variables
    that exhibit abnormal behavior. Identifying these variables can help in determining
    the root-cause of the fault. The step of ‘fault diagnosis’ in the PCA chapter
    should have been called ‘fault identification’!


    Fault diagnosis refers to the task of finding which specific fault has occurred
    or determining the root-cause of the fault. Fault classification falls in this
    category. While fault isolation is non-supervised, fault diagnosis is supervised.


    # Summary


    With this chapter, we have now covered all the popular classical dimensionality
    reduction techniques that are frequently utilized for analyzing process data.
    This chapter has also provided an important message: blind application of a single
    technique all the times may not yield best results. The techniques should be chosen
    according to the process system (gaussian vs non-gaussian) and objective (fault
    detection vs fault classification) at hand. ICA and FDA are powerful techniques
    and there lies much more to them that what we have touched in this chapter. While
    you are encouraged to explore more about these methods (now that you have conceptual
    understandings), we will move to study another powerful ML technique called Support
    Vector Machines in the next chapter.'
- md: '## Chapter 7

    ### Support Vector Machines & Kernel-based Learning


    In previous chapters, we saw methods that help us overcome the ‘curse of dimensionality’.
    Wouldn’t it be great to have ML methods that do not ‘mind’ dealing with high-dimensional
    systems? SVM (support vector machine) is one such algorithm which excels in dealing
    with high-dimensional, nonlinear, and small or medium-sized data. SVMs, by design,
    minimize overfitting to provide excellent generalization performance. Another
    major quality of SVMs is that they are extremely flexible and can be employed
    for classification and regression tasks in both supervised and unsupervised settings.
    You may already be thinking, “Wow! SVMs seem to pack a lot of good features.”
    In fact, before ANNs became the craze in ML community, SVMs were the toast of
    the town. Even today, SVM is a must-have tool in every ML practitioner’s toolkit.


    Above, we mentioned only some of the features of SVMs. You will find more as you
    work through this chapter. In terms of use in process industry, SVMs have been
    employed for fault classification, process monitoring, outlier detection, soft
    sensing, etc.


    To understand different aspects of SVMs, we will cover the following topics in
    this chapter:


    - Fundamentals of SVMs

    - The kernel trick for nonlinear modeling

    - SVDD (support vector data description) for unsupervised classification

    - Fault detection via SVDD for semiconductor manufacturing process

    - Fundamentals of SVR (support vector regression)

    - Soft sensing via SVR in a polymer plant and a petroleum refinery


    ### 7.1 SVMs: An Introduction


    The classical SVM is a supervised linear technique for solving binary classification
    problems. For illustration, consider Figure 7.1a. Here, in a 2D system, the training
    data-points belong to 2 distinct (positive and negative) classes. The task is
    to find a line/linear boundary that separates these 2 classes. Two sample candidate
    lines are also shown. While these lines clearly do the stated job, something seems
    amiss. Each of them passes very close to some of the training data-points. This
    can cause poor generalization: for example, the shown test observation ‘A’ lies
    closer to the positive samples but will get classified as negative class by boundary
    L2. This clearly is undesirable.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_157_0.png)


    The optimal separating line/decision boundary, line L3 in Figure 7.1b, lies as
    far away as possible from either class of data. L3, as shown, lies midway of the
    support planes (planes that pass-through training points closest to the separating
    boundary). During model fitting, SVM simply finds this optimal boundary that corresponds
    to the maximum margin (distance between the support planes). In Figure 7.1, any
    other orientation or position of L3 will reduce the margin and will make L3 closer
    to one class than to the other. Large margins make model predictions robust to
    small perturbations in the training samples.


    Points that lie on the support planes are called support vectors³³ and completely
    determine the optimal boundary, and hence the name, support vector machines. In
    Figure 7.1, if support vectors are moved, line L3 may change. However, if any
    non-support vectors are removed, L3 won’t get affected at all. We will see later
    how the sole dependency on the support vectors imparts computational advantage
    to the SVMs.


    ³³ Calling data-points as vectors may seem weird. While this terminology is commonly
    used in general SVM literature, support vectors refer to the vectors originating
    from origin with the data-points on support planes as their tips.


    ### Mathematical background


    Let there be $N$ training samples ($\mathbf{x}, y$) where $\mathbf{x}$ is an input
    vector in $m$-dimensional input space and $y$ is the class label ($\pm 1$). Let
    the optimal separating hyperplane (a line in 2D space) be represented as $\mathbf{w}^T\mathbf{x}
    + b = 0$ where the model parameters ($\mathbf{w}, b$) are found such that


    $$\mathbf{w}^T\mathbf{x}_i + b \geq 1 \quad \text{for positive samples } (y_i
    = 1)$$

    $$\mathbf{w}^T\mathbf{x}_i + b \leq -1 \quad \text{for negative samples } (y_i
    = -1)$$


    The supporting planes get represented as $\mathbf{w}^T\mathbf{x} + b = 1$ and
    $\mathbf{w}^T\mathbf{x} + b = -1$. The above equations are simply stating the
    requirements that the data points must lie on the correct side of their corresponding
    support planes. Using simple trigonometry, it can be shown that the margin is
    given by $\frac{2}{||\mathbf{w}||}$ where $||\mathbf{w}||$ is vector norm. Therefore,
    model parameters are found by maximizing $\frac{2}{||\mathbf{w}||}$ (or equivalently,
    minimizing $||\mathbf{w}||$) while meeting the above constraints. Specifically,
    the following optimization problem is solved


    $$\min_{\mathbf{w},b} \quad \frac{1}{2}||\mathbf{w}||^2$$

    $$\text{s.t.} \quad y_i(\mathbf{w}^T\mathbf{x}_i + b) \geq 1, \quad i = 1, \cdots
    N$$


    *eq. 1*


    Once the model has been fitted, class predictions for test sample, $\mathbf{x}_t$,
    are made as follows.


    $$\hat{y}_t = sign(\mathbf{w}^T\mathbf{x}_t + b)$$


    $\mathbf{x}_t$ belongs to positive class if it lies on positive side of separating
    hyperplane.


    The expression inside the sign function is also called decision function and therefore,
    positive decision function results in positive class prediction and vice-versa.


    > The optimization formulation in Eq. 1 and all the others that we will see in
    this chapter share a very favorable property of possessing a unique global minimum.
    This is a huge advantage when compared to other powerful ML methods like neural
    networks where the issue of local minimums can be an inconvenience.


    ### Simple linear classification illustration


    We will use the toy dataset in Figure 7.1 to illustrate SVM-based classifier modeling
    in Sklearn.


    ```python

    # read data

    import numpy as np

    data = np.loadtxt(''toyDataset.csv'', delimiter='','')

    X = data[:, [0, 1]]; y = data[:, 2]


    # scale model inputs

    from sklearn.preprocessing import StandardScaler

    scaler = StandardScaler()

    X_scaled = scaler.fit_transform(X)


    # fit SVM model

    from sklearn.svm import SVC # for large datasets LinearSVC class is preferable


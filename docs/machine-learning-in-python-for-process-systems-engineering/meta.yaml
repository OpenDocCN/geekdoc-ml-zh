    and closing the tap completely upon any level change can lead to high water level
    fluctuations. Therefore, during training the agent learns the best control policy
    automatically by just interacting with its environment.


    # 1.3 Machine Learning Applications in Process Industry


    Product quality control, safe work environment, optimal operations, and sustainable
    operations are the primary objectives in any industrial plant. Today, ML-based
    solutions are being utilized for all these purposes. Surrogate models are developed
    for online prediction of key quality variables and optimizing plant productivity,
    process monitoring and fault diagnosis models are developed for real-time tracking
    of process operating conditions, data mining is used for alarm management, data
    clustering is used for operation mode identification, and the list goes on.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_25_0.png)


    Several success stories on machine learning application in process industry are
    publicly available. Shell¹ used recurrent neural networks (RNNs) for early prediction
    of valve failures, Saudi Aramco used ML tools for alarm analytics and predictive
    maintenance of turbines², a polymer manufacturing company used ML-based feature
    extractions³ for troubleshooting



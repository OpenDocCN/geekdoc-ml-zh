- md: "## Chapter 9\n\n### Decision Trees & Ensemble Learning\n\nImagine that you\
    \ are in a situation where even after your best attempts your model could not\
    \ provide satisfactory performance (due to high bias or variance). What if we\
    \ tell you that there exists a class of algorithms where you can combine several\
    \ ‘versions’ of your ‘weak’ performing models and generate a ‘strong’ performer\
    \ that can provide more accurate and robust predictions compared to its constituent\
    \ ‘weak’ models? Sounds too good to be true? It’s true and these algorithms are\
    \ called ensemble methods.\n\nEnsemble methods are often a crucial component of\
    \ winning entries in online ML competitions such as those on Kaggle. Ensemble\
    \ learning is based on a simple philosophy that committee wisdom can be better\
    \ than an individual’s wisdom! In this chapter, we will look into how this works\
    \ and what makes ensembles so powerful. We will study popular ensemble methods\
    \ like random forests and XGBoost.\n\nThe base constituent models in forests and\
    \ XGBoost are decision trees which are simple yet versatile ML algorithms suitable\
    \ for both regression and classification tasks. Decision trees can fit complex\
    \ and nonlinear datasets yet enjoy the enviable quality of providing interpretable\
    \ results. We will look at all these features in detail. Specifically, we will\
    \ cover the following topics\n\n- Introduction to decision trees and random forests\n\
    - Soft sensing application of random forests in concrete construction industry\n\
    - Introduction to ensemble learning techniques (bagging, Adaboost, gradient boosting)\n\
    - Effluent quality prediction using XGBoost in wastewater treatment plant\n\n\
    ### 9.1 Decision Trees: An Introduction\n\nDecision trees (DTs) are inductive\
    \ learning methods which derive explicit rules from data to make predictions.\
    \ They partition the feature space into several (hyper) rectangles and then fit\
    \ a simple model (usually a constant) in each one. As shown in Figure 9.1 for\
    \ a binary classification problem in 2D feature space, the partition is achieved\
    \ via a series of if-else statements. As shown, the model is represented using\
    \ branches and leaves which lead to a tree-like structure and hence the name decision\
    \ tree model. The questions asked at each node make it very clear how the model\
    \ predictions (class A or class B) are being generated. Consequently, DTs become\
    \ the model of choice for applications where ease of rationalization of model\
    \ results is very important.\n\nThe trick in DT model fitting lies in deciding\
    \ which questions to ask in the if-else statements at each node of the tree. During\
    \ fitting, these questions split the feature space into smaller and smaller subregions\
    \ such that the training observations falling in a subregion are similar to each-other.\
    \ The splitting process stops when no further gains can be made or stopping criteria\
    \ have been met. Improper choices of splits will generate a model that does not\
    \ generalize well. In the next subsection, we will study a popular DT training\
    \ algorithm called CART (classification and regression trees) which judiciously\
    \ determines the splits.\n\n### Mathematical background\n\nCART algorithm creates\
    \ a binary tree, i.e., at each node two branches are created that split the dataset\
    \ in such a way that overall data ‘impurity’ reduces. To understand this, consider\
    \ the following node<sup>41</sup> of a tree. Also assume that we are dealing with\
    \ binary classification problem with input vector $x \\in R^m$.\n\nThe algorithm\
    \ needs to decide which one of the $m$ input variables, $x_k$, will be used to\
    \ split the set of $n$ samples at this node and with what threshold $r$. CART\
    \ makes this determination by minimizing the following objective\n\n$$J(k, r)\
    \ = \\frac{n_{left}}{n} I_{left} + \\frac{n_{right}}{n} I_{right}$$\n\nwhere $I_{left/right}$\
    \ denote the data impurity of the left/right subsets of data and is given by\n\
    \n$$I = 1 - \\sum_{q=1}^{2} p_q^2$$\n\nwhere $p_q$ is the ratio of samples of\
    \ the corresponding data subset belonging to class $q$. For example, if all the\
    \ samples in a subset belong to class 1, then $p_1 = 1$ and $I = 0$. Therefore,\
    \ if CART could find $k$ and $r$ such that the $n$ samples get perfectly divided\
    \ class-wise into the left and right subsets, then the minimum value of $J = 0$\
    \ will be obtained. However, this is usually not possible, and CART tries to do\
    \ the best it can. The reduction in impurity ($\\Delta I_{node}$) achieved by\
    \ CART at this node is given by $nI_{node} - \\frac{n_{left}}{n} I_{left} - \\\
    frac{n_{right}}{n} I_{right}$.\n\nCART simply follows the aforementioned branching\
    \ scheme recursively. It starts from the top node (root node) and keeps splitting\
    \ the subsets. If a node cannot be split any further (because impurity cannot\
    \ be reduced anymore or some hyperparameter settings such as min_samples_split,\
    \ min_samples_leaf prevent any further split), the node becomes a leaf or terminal\
    \ node. For prediction, the leaf node corresponding to the test sample is found\
    \ and the majority class from the leaf's training subset is assigned to the test\
    \ sample. Note that a probabilistic prediction for class $q$ can also be made\
    \ by simply looking at the ratio of the leaf's training samples belonging to class\
    \ $q$.\n\nIn classical DTs, as we have seen, the split decision rules (or split\
    \ functions) at the nodes are based on a single variable. This results in axis-aligned\
    \ hyperplanes that split the input space into several hyperrectangles. Complex\
    \ split functions using multiple variables may also be used which may be more\
    \ suitable for certain datasets – one such example is shown below.\n\nFitting\
    \ DTs with complex split functions, however, becomes computationally much more\
    \ demanding. Therefore, a general recommendation is to transform your dataset\
    \ using dimensionality reduction techniques like PCA, FDA before fitting tree\
    \ using simple split functions.\n\nFor regression problems, a tree is built in\
    \ the same way with a different objective function, $J(k,r)$, which now is given\
    \ by\n\n$$J(k,r) = \\frac{n_{left}}{n} MSE_{left} + \\frac{n_{right}}{n} MSE_{right}$$\n\
    \nWhere $MSE_{left/right}$ denote the mean-squared error at the left/right node\n\
    \n$$MSE = \\frac{\\sum_{sample \\in subset} (\\hat{y} - y_{sample})^2}{\\# \\\
    text{ of samples}}$$\n\n$\\hat{y}$ is the average output of the samples belonging\
    \ to a subset. Prediction for a test sample is also taken as the average output\
    \ value of all training samples assigned to the test sample's leaf node.\n\nYou\
    \ are not confined to using the constant predictive models at the leaves of a\
    \ regression tree. Linear and polynomial predictive models may be more suitable\
    \ for certain problems. Such DTs are called model trees. While Sklearn allows\
    \ only the constant model, there exists a package$^{42}$ called 'linear-tree'\
    \ that allows building model trees with linear models at the leaves.\n\nprobs\
    \ = gmm.predict_proba(x.T)\n\nfor component in range(3):\n    Dlocal = np.dot(np.dot((x-gmm.means_[component,:,np.newaxis]).T,\n\
    \    np.linalg.inv(gmm.covariances_[component,:,:])), (x-gmm.means_[component,:,np.newaxis]))\n\
    \n    Dglobal_test[i] = Dglobal_test[i] + probs[0,component]*Dlocal\n\nprint('Number\
    \ of faults identified: ', np.sum(Dglobal_test > Dglobal_CL), ' out of ', len(Dglobal_test))\n\
    \n>>> Number of faults identified: 18 out of 20\n\nThe $D_{global}$ and the SVDD\
    \ (in Chapter 7) models employed for the etching process dataset used an overall\
    \ single monitoring model for all the clusters. Nevertheless, it a completely\
    \ reasonable approach to build separate monitoring models for each cluster and\
    \ uses one of the two approaches from Figure 8.2 for final predictions.\n\n##\
    \ Summary\n\nWith this chapter we have conquered another milestone in our journey.\
    \ We started by understanding the need for multimode modeling of process systems\
    \ and then studied several popular clustering/mixture modeling algorithms. The\
    \ emphasis on the pros and cons of different methods was a deliberate choice to\
    \ enable you to make educated selection of algorithms for your problems. You are\
    \ going to encounter multimode processes frequently in your career and the tools\
    \ studied in this chapter will help you analyze these systems properly."
  mdcn: "## 第9章\n\n### 决策树与集成学习\n\n想象一下，你正处于这样一种情境：即使你已尽最大努力，模型仍无法提供令人满意的性能（由于高偏差或方差）。如果我们告诉你，存在一类算法，可以将多个“弱”性能模型的“版本”组合起来，生成一个“强”性能模型，从而提供比其组成的“弱”模型更准确、更稳健的预测，你会怎么想？听起来好得难以置信？这是真的，这类算法被称为集成方法。\n\
    \n集成方法通常是Kaggle等在线机器学习竞赛中获胜方案的关键组成部分。集成学习基于一个简单的理念：集体智慧可以胜过个人智慧！在本章中，我们将探讨其工作原理以及集成方法如此强大的原因。我们将研究流行的集成方法，如随机森林和XGBoost。\n\
    \n森林和XGBoost中的基础组成模型是决策树，这是一种简单而通用的机器学习算法，适用于回归和分类任务。决策树能够拟合复杂和非线性的数据集，同时具有提供可解释结果的令人羡慕的特性。我们将详细探讨所有这些特性。具体来说，我们将涵盖以下主题：\n\
    \n- 决策树和随机森林简介\n- 随机森林在混凝土建筑行业中的软测量应用\n- 集成学习技术简介（Bagging、Adaboost、梯度提升）\n- 使用XGBoost在污水处理厂进行出水水质预测\n\
    \n### 9.1 决策树简介\n\n决策树是一种归纳学习方法，它从数据中推导出明确的规则来进行预测。它们将特征空间划分为若干个（超）矩形，然后在每个矩形中拟合一个简单的模型（通常是一个常数）。如图9.1所示，对于二维特征空间中的二元分类问题，划分是通过一系列if-else语句实现的。如图所示，模型使用分支和叶子表示，从而形成树状结构，因此得名决策树模型。在每个节点提出的问题非常清楚地展示了模型预测（A类或B类）是如何生成的。因此，决策树成为那些需要轻松解释模型结果的应用的首选模型。\n\
    \n决策树模型拟合的关键在于决定在树的每个节点的if-else语句中提出什么问题。在拟合过程中，这些问题将特征空间划分为越来越小的子区域，使得落入某个子区域的训练观测彼此相似。当无法再获得增益或满足停止条件时，划分过程停止。不恰当的划分选择将导致泛化能力不佳的模型。在下一小节中，我们将研究一种流行的决策树训练算法，称为CART（分类与回归树），它能够明智地确定划分。\n\
    \n### 数学背景\n\nCART算法创建一个二叉树，即在每个节点创建两个分支，以使整体数据“不纯度”降低的方式分割数据集。为了理解这一点，请考虑树的以下节点<sup>41</sup>。同时假设我们处理的是一个二元分类问题，输入向量为\
    \ $x \\in R^m$。\n\n算法需要决定使用 $m$ 个输入变量 $x_k$ 中的哪一个来分割该节点处的 $n$ 个样本集合，以及使用什么阈值 $r$。CART通过最小化以下目标函数来做出此决定：\n\
    \n$$J(k, r) = \\frac{n_{left}}{n} I_{left} + \\frac{n_{right}}{n} I_{right}$$\n\
    \n其中 $I_{left/right}$ 表示左/右数据子集的数据不纯度，由下式给出：\n\n$$I = 1 - \\sum_{q=1}^{2} p_q^2$$\n\
    \n其中 $p_q$ 是相应数据子集中属于类别 $q$ 的样本比例。例如，如果子集中的所有样本都属于类别1，则 $p_1 = 1$ 且 $I = 0$。因此，如果CART能够找到\
    \ $k$ 和 $r$，使得 $n$ 个样本能够按类别完美地划分到左、右子集中，那么将获得最小值 $J = 0$。然而，这通常是不可能的，CART会尽力做到最好。CART在此节点实现的不纯度降低（$\\\
    Delta I_{node}$）由 $nI_{node} - \\frac{n_{left}}{n} I_{left} - \\frac{n_{right}}{n}\
    \ I_{right}$ 给出。\n\nCART简单地递归遵循上述分支方案。它从顶部节点（根节点）开始，不断分割子集。如果一个节点无法再分割（因为不纯度无法再降低，或者某些超参数设置如min_samples_split、min_samples_leaf阻止了进一步分割），该节点就成为叶子节点或终端节点。对于预测，找到与测试样本对应的叶子节点，并将叶子节点训练子集中的多数类别分配给测试样本。请注意，也可以通过简单地查看叶子节点训练样本中属于类别\
    \ $q$ 的比例来进行类别 $q$ 的概率预测。\n\n在经典的决策树中，正如我们所看到的，节点处的分割决策规则（或分割函数）基于单个变量。这导致了轴对齐的超平面，将输入空间划分为若干个超矩形。也可以使用使用多个变量的复杂分割函数，这可能更适合某些数据集——下面展示了一个这样的例子。\n\
    \n然而，使用复杂分割函数拟合决策树在计算上要求更高。因此，一般建议在使用简单分割函数拟合树之前，使用PCA、FDA等降维技术对数据集进行转换。\n\n对于回归问题，以相同的方式构建树，但使用不同的目标函数\
    \ $J(k,r)$，现在由下式给出：\n\n$$J(k,r) = \\frac{n_{left}}{n} MSE_{left} + \\frac{n_{right}}{n}\
    \ MSE_{right}$$\n\n其中 $MSE_{left/right}$ 表示左/右节点的均方误差：\n\n$$MSE = \\frac{\\sum_{sample\
    \ \\in subset} (\\hat{y} - y_{sample})^2}{\\# \\text{ of samples}}$$\n\n$\\hat{y}$\
    \ 是属于某个子集的样本的平均输出值。测试样本的预测也取为分配给测试样本叶子节点的所有训练样本的平均输出值。\n\n你并不局限于在回归树的叶子节点使用常数预测模型。线性和多项式预测模型可能更适合某些问题。这类决策树称为模型树。虽然Scikit-learn只允许常数模型，但存在一个名为'linear-tree'的包$^{42}$，允许构建叶子节点为线性模型的模型树。\n\
    \nprobs = gmm.predict_proba(x.T)\n\nfor component in range(3):\n    Dlocal = np.dot(np.dot((x-gmm.means_[component,:,np.newaxis]).T,\n\
    \    np.linalg.inv(gmm.covariances_[component,:,:])), (x-gmm.means_[component,:,np.newaxis]))\n\
    \n    Dglobal_test[i] = Dglobal_test[i] + probs[0,component]*Dlocal\n\nprint('Number\
    \ of faults identified: ', np.sum(Dglobal_test > Dglobal_CL), ' out of ', len(Dglobal_test))\n\
    \n>>> Number of faults identified: 18 out of 20\n\n用于刻蚀过程数据集的 $D_{global}$ 和SVDD（第7章）模型为所有簇使用了一个整体的单一监控模型。然而，为每个簇构建单独的监控模型，并使用图8.2中的两种方法之一进行最终预测，也是一个完全合理的方法。\n\
    \n## 总结\n\n通过本章，我们在学习旅程中又征服了一个里程碑。我们首先理解了过程系统多模态建模的必要性，然后研究了几种流行的聚类/混合建模算法。对不同方法优缺点的强调是刻意的选择，旨在帮助你为你的问题明智地选择算法。在你的职业生涯中，你将经常遇到多模态过程，本章学习的工具将帮助你正确分析这些系统。"

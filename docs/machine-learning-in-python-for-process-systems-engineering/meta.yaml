    # Pros and cons


    A big advantage of DBSCAN, in addition to those already alluded to, is that the
    number of clusters does not have to be specified beforehand. The algorithm determines
    the appropriate number of clusters automatically. A common disadvantage of both
    k-means and DBSCAN is that the data-points are ''hard-clustered'' (each data point
    assigned to exactly one cluster). For example, consider the data-points categorized
    as noise-points in Figure 8.10. Although these points are far away from cluster
    center, they may still correspond to normal operating conditions representing
    low-likelihood instances. Throwing away these noise points can lead to loss of
    crucial information and may result in improperly set monitoring thresholds. Additionally,
    in some cases, hard clustering may not be obvious if a data-point lies equidistant
    from different clusters. Soft-clustering algorithms can be used to solve these
    problems as these algorithms provide some measure of association of data-points
    with different clusters. We will study one such popular algorithm, gaussian mixture
    model, in the next section.'

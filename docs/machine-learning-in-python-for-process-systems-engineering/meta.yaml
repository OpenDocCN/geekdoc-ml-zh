- md: "Boosting is preferred if base model exhibit underfitting/high bias. Like bagging,\
    \ boosting is not restricted to DTs as base models, but if DTs are used, shallow\
    \ trees (trees with only a few depths) are recommended that don't exhibit high\
    \ variance. Moreover, shallow trees or any other less complex base model are computationally\
    \ tractable to train sequentially during boosting process. Boosting can be used\
    \ for both regression and classification, and there are primarily two popular\
    \ boosting methods, namely, Adaboost and Gradient Boosting.\n\n## Adaboost (Adaptive\
    \ Boosting)\n\nIn Adaboost boosting technique, a new base model corrects the errors\
    \ of its predecessor base model by focusing on the samples that were wrongly predicted.\
    \ As shown in Figure 9.12, all samples are assigned equal weights of $\\frac{1}{N}$\
    \ and the first (weak) base model is trained. Weights of wrongly predicted samples\
    \ are increased, and weights of correctly predicted samples are decreased. Second\
    \ base model is trained, and the cycle continues until the specified number of\
    \ base models are obtained. In essence, each successive base model focusses more\
    \ on the difficult (to predict) training samples. Post training, the ensemble\
    \ model's prediction is taken as the weighted combination of base models' predictions.\
    \ Model weight assigned to each base model depends on the accuracy achieved on\
    \ its weighted training samples (higher accuracy $\\Rightarrow$ higher $\\alpha$).\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_223_0.png)\n\n## Gradient Boosting\n\
    \nAdopting an approach different from Adaboost, Gradient boosting approach corrects\
    \ the errors of its predecessor by sequentially training a base model using the\
    \ residual error made by the previous base model. Figure 9.13 shows the algorithm’s\
    \ scheme.\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_224_0.png)\n\nFigure 9.13:\
    \ Gradient Boosting ensemble scheme. Here, $\\hat{y}_i$ denote prediction for\
    \ training samples from the $i^{th}$ base model. Note that the hyperparameter\
    \ $\\vartheta$ need not be constant (as used here) for the different base models.\n\
    \nIn the scheme above, the hyperparameter $\\vartheta \\in (0, 1]$ is called shrinkage\
    \ parameter or learning rate. It is used to prevent overfitting and is recommended\
    \ to be assigned a small value like 0.1. Very small learning rate will necessitate\
    \ usage of large number of base models. The number of iterations or base models,\
    \ $K$, is another important hyperparameter that needs to be tuned carefully. Too\
    \ small $K$ will not achieve sufficient bias reduction while too large $K$ will\
    \ cause overfitting. It can be optimized using cross-validation or early stopping\
    \ (keeping track of validation error at different stages/iterations of ensemble\
    \ model training and stopping when errors stop decreasing or model residuals do\
    \ not have any more pattern that can be modeled).\n\nSklearn provides GradientBoostingClassifier\
    \ and GradientBoostingRegressor classes for regression and classification problems,\
    \ respectively. While these classes use DTs as base models/weak learners, gradient\
    \ boosting methodology is not limited to DTs. When DTs are used, it is called\
    \ Gradient Tree Boosting or Gradient Boosted Decision Trees (GBDTs).\n\n## 9.5\
    \ Effluent Quality Prediction in Wastewater Treatment Plant via XGBoost\n\nIf\

  md: '# # Chapter 9


    # ## Decision Trees & Ensemble Learning


    Imagine that you are in a situation where even after your best attempts your model
    could not provide satisfactory performance (due to high bias or variance). What
    if we tell you that there exists a class of algorithms where you can combine several
    ‘versions’ of your ‘weak’ performing models and generate a ‘strong’ performer
    that can provide more accurate and robust predictions compared to its constituent
    ‘weak’ models? Sounds too good to be true? It’s true and these algorithms are
    called ensemble methods.


    Ensemble methods are often a crucial component of winning entries in online ML
    competitions such as those on Kaggle. Ensemble learning is based on a simple philosophy
    that committee wisdom can be better than an individual’s wisdom! In this chapter,
    we will look into how this works and what makes ensembles so powerful. We will
    study popular ensemble methods like random forests and XGBoost.


    The base constituent models in forests and XGBoost are decision trees which are
    simple yet versatile ML algorithms suitable for both regression and classification
    tasks. Decision trees can fit complex and nonlinear datasets yet enjoy the enviable
    quality of providing interpretable results. We will look at all these features
    in detail. Specifically, we will cover the following topics


    +   - Introduction to decision trees and random forests

    - Soft sensing application of random forests in concrete construction industry

    - Introduction to ensemble learning techniques (bagging, Adaboost, gradient boosting)

    - Effluent quality prediction using XGBoost in wastewater treatment plant'

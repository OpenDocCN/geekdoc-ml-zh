    \    SSEs.append(kmeans.inertia_)\n\nplt.figure()\nplt.plot(range(1,10), SSEs,\
    \ marker='o')\nplt.xlabel('Number of clusters')\nplt.ylabel('SSEs')\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_191_0.png)\n\
    \n> Determining the number of clusters or local models should not be taken lightly.\
    \ We saw in Figure 8.1 that less than optimal number of clusters leads to low\
    \ soft sensing accuracy and high frequency of missing alarms. On the other hand,\
    \ using too many clusters increases the number of estimated parameters and consequently,\
    \ the convergence time. Too many clusters also lead to overfitting, resulting\
    \ in high frequency of false alarms and low soft sensing accuracy."
  - "[PAGE 192]\n\n# Silhouette analysis for quantifying clusters quality\n\nFor high-dimensional\
    \ data, it may not always be possible to project most of the data variability\
    \ onto 2 or 3 PCs and thus it becomes difficult to judge the goodness of clustering\
    \ or visualize the clusters using 2D or 3D plots. In those situations, silhouette\
    \ plots can be used to visualize and quantify cluster quality. Note that silhouette\
    \ analysis is not specific to k-means and can be applied to study any clustering\
    \ result.\n\nSilhouette coefficient or value of a data-point ranges from -1 to\
    \ 1 and is a measure of how far the data-point is from data-points in neighboring\
    \ cluster as compared to data-points in the same cluster. A value of 1 indicates\
    \ that the data-point is far away from the neighboring cluster and values close\
    \ to 0 indicate that the data-point is close to the boundary between the two clusters.\
    \ Negative values indicate wrong cluster assignment.\n\nFigure 8.7 shows the silhouette\
    \ plot for the cluster shown in Figure 8.5. Each of the colored bands is formed\
    \ by stacking the silhouette coefficient of all data-points in that cluster and\
    \ therefore the thickness of the band is an indication of the cluster size. The\
    \ overall silhouette score is simply the average of silhouette coefficients of\
    \ all the data-points. As expected, average score is high and cluster 2 shows\
    \ highest coefficients as it is far away from the other two clusters.\n\n```\n\
    # average silhouette score\nfrom sklearn.metrics import silhouette_samples, silhouette_score\n\
    \nsilhouette_avgValue = silhouette_score(score_train, cluster_label)\nprint('Average\
    \ silhouette score is :', silhouette_avgValue)\n\n>>> Average silhouette score\
    \ is : 0.7444602567351603\n\n# silhouette plot\nfrom matplotlib import cm\n\n\
    plt.figure()\nsilhouette_values = silhouette_samples(score_train, cluster_label)\n\
    y_lower, y_upper = 0, 0\nyticks = []\nfor i in range(n_cluster):\n    cluster_silhouette_vals\
    \ = silhouette_values[cluster_label == i]\n    cluster_silhouette_vals.sort()\n\
    \n    y_upper += len(cluster_silhouette_vals)\n    color = cm.nipy_spectral(i\
    \ / n_cluster)\n    plt.barh(range(y_lower, y_upper),cluster_silhouette_vals,height=1.0,edgecolor='none',color=color)\n\
    ```"
- md: "## Pros and cons\n\nAs alluded to before, ease of application and simple concept\
    \ are advantage with k-means algorithm. However, a serious shortcoming in this\
    \ algorithm is the inability to deal with complicated geometries as shown in Figure\
    \ 8.9. The next set of algorithms that we will study are able to account for such\
    \ arbitrarily shaped clusters.\n\n```python\n# generate ellipsoidal shaped data\n\
    from sklearn.datasets import make_blobs\n\nn_samples = 1500\nX, y = make_blobs(n_samples=n_samples,\
    \ random_state=100)\n\nrotation_matrix = [[0.60, -0.70], [-0.5, 0.7]]\nX_transformed\
    \ = np.dot(X, rotation_matrix) # elongated blobs\n\nplt.figure()\nplt.scatter(X_transformed[:,\
    \ 0], X_transformed[:, 1])\n\n# fit k-means model\nn_cluster = 3\nkmeans = KMeans(n_clusters=n_cluster,\
    \ random_state=100).fit(X_transformed)\ncluster_label = kmeans.predict(X_transformed)\n\
    ```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_194_0.png)\n\n## 8.3 Density-based\
    \ Clustering: DBSCAN\n\nDBSCAN, a Density-based algorithm, can easily handle irregularly\
    \ shaped data distributions as shown in Figure 8.10 (don't be alarmed by those\
    \ disconnected dark-brown colored data-points! We will come back to these shortly).\
    \ DBSCAN works by grouping together data-points that form regions of high data\
    \ densities. Specifically, each data-point is classified into one of the following\
    \ 3 categories:\n\n- A **core** point if there are more than a specified number\
    \ (*minPts*) of data-points within a specified distance ($\\varepsilon$)\n- A\
    \ **border** point if less than *minPts* data-points lie within its $\\varepsilon$\
    \ neighborhood, but the data-point itself lies within the $\\varepsilon$ neighborhood\
    \ of another core point\n- A **noise** point if it isn't classified as either\
    \ core or border point\n\nAfter classification into core, border, and noise points,\
    \ the clusters are defined by the sets of connected core and border data-points.\
    \ Noise data-points are not assigned to any cluster. The disconnected dark-brown\
    \ colored data-points that we saw in Figure 8.10 are the noise points. The ability\
    \ to deal with arbitrarily shaped data, robustness to noise and outliers make\
    \ DBSCAN well-suited for clustering process data.\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_195_0.png)\n\
    \nFigure 8.10: DBSCAN succeeds in handling elliptical data distribution\n\nThe\
    \ big shortcoming with the DBSCAN algorithm is the need to specify reasonable\
    \ values of the two hyperparameters, *minPts* and $\\varepsilon$, to ensure optimal\
    \ clustering. If set improperly, we may end up with either one giant cluster or\
    \ thousands of small clusters. Let's study this aspect on the metal etch data.\
    \ Figure 8.11 shows the clustering with properly (*minPts* = 3, $\\varepsilon$\
    \ = 5) and improperly (*minPts* = 5, $\\varepsilon$ = 3) set hyperparameters;\
    \ the improper setting results in several noise data-points and two extra clusters.\
    \ Trial and error or domain specific knowledge can help to decide the hyperparameter\
    \ values.\n\n```python\n# fit DBSCAN model to metal-etch data\nfrom sklearn.cluster\
    \ import DBSCAN\n\ndb = DBSCAN(eps=5, min_samples=3).fit(score_train)\ncluster_label\
    \ = db.labels_\n\nplt.figure()\nplt.scatter(score_train[:, 0], score_train[:,\
    \ 1], c=cluster_label, s=20, cmap='viridis')\nplt.xlabel('PC1 scores')\nplt.ylabel('PC2\
    \ scores')\n\nprint('Cluster labels: ', np.unique(cluster_label))\n```\n\n>>>\
    \ Cluster labels: [-1 0 1 2 3 4] # noise points are given the label of -1\n\n\
    ![](img/ae65e737df4a9f5732c91f7aea579fc8_196_0.png)\n\nFigure 8.11: Clustering\
    \ via DBSCAN for metal etch data with (a) improper hyperparameters and (b) proper\
    \ hyperparameters\n\n## Pros and cons\n\nA big advantage of DBSCAN, in addition\
    \ to those already alluded to, is that the number of clusters does not have to\
    \ be specified beforehand. The algorithm determines the appropriate number of\
    \ clusters automatically. A common disadvantage of both k-means and DBSCAN is\
    \ that the data-points are 'hard-clustered' (each data point assigned to exactly\
    \ one cluster). For example, consider the data-points categorized as noise-points\
    \ in Figure 8.10. Although these points are far away from cluster center, they\
    \ may still correspond to normal operating conditions representing low-likelihood\
    \ instances. Throwing away these noise points can lead to loss of crucial information\
    \ and may result in improperly set monitoring thresholds. Additionally, in some\
    \ cases, hard clustering may not be obvious if a data-point lies equidistant from\
    \ different clusters. Soft-clustering algorithms can be used to solve these problems\
    \ as these algorithms provide some measure of association of data-points with\
    \ different clusters. We will study one such popular algorithm, gaussian mixture\
    \ model, in the next section.\n\n## 8.4 Probabilistic Clustering: Gaussian mixtures\n\
    \nWhile studying PCA and PLS methodologies, we made assumptions about gaussian\
    \ distribution of latent variables for control limits determinations. However,\
    \ as seen for metal etch data, this assumption fails for processes with multiple\
    \ operating modes. Nonetheless, it may still be appropriate to characterize data\
    \ from each individual operating mode/cluster through local gaussian distributions.\
    \ This is the underlying concept behind gaussian mixture models (GMMs) and as\
    \ can be seen in Figure 8.12, it works very well for non-hyperspherical data distributions.\n\
    \n```python\n# fit GMM model to ellipsoidal data\nfrom sklearn.mixture import\
    \ GaussianMixture\n\ngmm = GaussianMixture(n_components=3, random_state=100)\n\
    cluster_label = gmm.fit_predict(X_transformed)\n\nplt.figure()\nplt.scatter(X_transformed[:,\
    \ 0], X_transformed[:, 1], c=cluster_label, s=20, cmap='viridis')\n\ncluster_centers\
    \ = gmm.means_ # cluster centers\ncluster_plot_labels = ['Cluster ' + str(i+1)\
    \ for i in range(gmm.n_components)]\nfor i in range(gmm.n_components):\n    plt.scatter(cluster_centers[i,\
    \ 0], cluster_centers[i, 1], c='red', s=20, marker='*', alpha=0.5)\n    plt.annotate(cluster_plot_labels[i],\
    \ (cluster_centers[i, 0], cluster_centers[i, 1]))\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_197_0.png)\n\
    \nAnother big advantage with GMMs is that we can compute the (posterior) probability\
    \ of a data-point belonging to any cluster. This cluster membership measure is\
    \ provided by predict_proba method. Hard clustering is performed by assigning\
    \ the data-point to the cluster with highest probability. Let's compute the probabilities\
    \ for a data-point that lies between clusters 3 and 2 (encircled in Figure 8.12).\n\
    \n```python\n# membership probabilities\nprobs = gmm.predict_proba(X_transformed[1069,\
    \ np.newaxis]) # requires 2D array\nprint('Posterior probabilities of clusters\
    \ 1, 2, 3 for the data-point: ', probs[-1, :])\n```\n\n>>> Posterior probabilities\
    \ of clusters 1, 2, 3 for the data-point: [3.36e-54 1.09e-15 1]\n\nGMM thinks\
    \ that the data-point belongs to cluster 3 with 100% probability! It may seem\
    \ surprising given that the point seems to lie equidistant (in terms of Euclidean\
    \ distance) to clusters 3 and 2. We will study in the next subsection how these\
    \ probabilities were obtained.\n\n### Mathematical background\n\nLet $x \\in \\\
    mathbb{R}^m$ be a m-dimensional sample obtained from a multimode process with\
    \ $K$ operating modes. In GMM, the overall probability density is formulated as\
    \ a combination of local gaussian densities. Let $C_i$ denote the $i^{th}$ local\
    \ gaussian cluster with parameters $\\theta_i = \\{\\mu_i, \\Sigma_i\\}$ (mean\
    \ vector and covariance matrix) and density\n\n$$g(x|\\theta_i) = \\frac{1}{(2\\\
    pi)^{m/2} |\\Sigma_i|^{1/2}} exp\\left[-\\frac{1}{2}(x - \\mu_i)^T \\Sigma_i^{-1}\
    \ (x - \\mu_i)\\right]$$ eq. 2\n\nThe overall density at any spatial location\
    \ is given by\n\n$$p(x|\\theta) = \\sum_{i=1}^K \\omega_i g(x|\\theta_i)$$ eq.\
    \ 3\n\nwhere, $\\omega_i$ represents the prior probability that a new sample comes\
    \ from the $i^{th}$ gaussian component and $\\theta = \\{\\theta_1, ..., \\theta_k\\\
    }$. The GMM model is constructed by estimating the parameters $\\theta_i, \\omega_i$\
    \ for all the clusters using the training samples $X \\in \\mathbb{R}^{N \\times\
    \ m}$. The parameters are estimated by optimizing the log-likelihood of the training\
    \ dataset given as below\n\n$$\\sum_{j=1}^N log \\left(\\sum_{i=1}^K \\omega_i\
    \ g(x_j|\\theta_i)\\right)$$ eq. 4\n\nTo optimize the likelihood, expectation-maximization\
    \ (EM) algorithm is commonly employed. Assuming an initial estimate of the parameters\
    \ are given, EM algorithm involves iterating between 2 steps:\n\n- E-step ($s^{th}$\
    \ iteration): (Re-)compute membership association of samples to local clusters\n\
    \n$$P^{(s)}(C_i|x_j) = \\frac{\\omega_i^{(s)} g(x_j | \\mu_i^{(s)}, \\Sigma_i^{(s)})}{\\\
    sum_{k=1}^K \\omega_k^{(s)} g(x_j | \\mu_k^{(s)}, \\Sigma_k^{(s)})}$$ eq. 5"

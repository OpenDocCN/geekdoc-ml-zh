- md: '## OOB accuracy


    In previous illustration, we specified oob_score=True during RF training. This
    specification instructs RF to compute a generalization score using training data
    during model fitting. This almost sounds like an incorrect statement, but it makes
    sense when you realize that any single bootstrap dataset does not contain all
    the samples of the original dataset<sup>43</sup> (as seen in Figure 9.4). Samples
    that do not belong to the bootstrap dataset of a tree are called out-of-bag (OOB)
    samples for that tree. Any given sample would be part of OOB samples of several
    trees of the forest (let''s say DT1, DT5, DT7). A prediction can be made for this
    sample using the ensemble of DT1, DT5, DT7 and an OOB error can be computed. The
    OOB errors for all the samples are used to compute an overall oob_score.


    ```

    # print OOB score

    print(''OOB score: '', model.oob_score_)

    >>> OOB score: 0.903

    ```


    The oob_score for the concrete dataset is same (up to 3 decimal places) as the
    test score! An OOB score may not be the perfect generalization assessment, but
    it comes in handy for small-sized dataset where keeping aside a test dataset may
    not be a luxury.


    ## Feature importances


    Let''s now look at another handy feature of RF that allows us to rank the model''s
    input/feature variables in terms of their importances for output predictions.
    Sklearn computes feature importances by computing the average reduction in node
    impurities (or MSE for regression) upon usage of a feature for node splitting.
    First, importance of a feature $j$ in a tree is calculated as follows


    $$FI_j^{tree} = \frac{\sum_{nodes; node \ splitting \ on \ feature \ j} \Delta
    I_{node}^{tree}}{\sum_{nodes} \Delta I_{node}^{tree}}$$


    The average of $FI_j^{tree}$ over all the trees in the forest gives the desired
    feature importances


    $$FI_j = \frac{\sum_{trees} FI_j^{tree}}{number \ of \ trees}$$


    For our concrete strength dataset, $FI_s$ can be obtained as follows


    <sup>43</sup> For large N, it can be shown that any bootstrap dataset in RF theoretically
    contains approximately 63% of the samples from the original dataset


    ```

    # feature importances

    var_names = [''cement'',''slag'',''flyash'',''water'',''superplasticizer'',''coarseaggregate'',''fineaggregate'',''age'']

    importances = model.feature_importances_


    plt.barh(var_names, importances)

    plt.xlabel(''Feature importances'')

    ```


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_218_0.png)


    Above results show that cement content and age of concrete are the two most important
    variables for prediction of concrete strength. This result is along the expected
    lines and further highlights the usefulness of RFs for analyzing nonlinear dependencies
    in process data.


    This concludes our study of RFs. Hopefully, we have been able to convince you
    that RFs could be quite a powerful weapon in your ML arsenal. Let’s proceed to
    learn about ensemble learning to understand what is it that imparts power to RFs.


    ## 9.4 Introduction to Ensemble Learning


    The idea of combining multiple ‘not so good’/weak models to generate a strong
    model is not restricted to random forests. The idea is more generic and is called
    ensemble learning. Specific methods that implement the idea (like RFs) are called
    ensemble methods. Figure 9.8 below shows an ensemble modeling scheme employing
    a diverse set of base models. The shown model is heterogeneous ensemble model
    as individual models employ different learning methodologies. In contrast, in
    the homogeneous models, the base models use the same learning algorithm.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_219_0.png)


    Figure 9.8: Heterogeneous ensemble learning scheme<sup>44</sup>. RF, which itself
    is an ensemble method, is used as a based model here.


    There are several options at our disposal to aggregate the predictions from the
    base models. For classification, we can use majority voting and pick the class
    that is predicted by most of the base models. Alternatively, if base models return
    class probabilities then soft voting can also be used. For regression, we can
    use simple or weighted averaging.


    In the ensemble world, a weak model is any model that has poor performance due
    to either high bias or high variance. However, together, the weak models combine
    to achieve better, more accurate (lower bias) and/or robust (lower variance) predictions.
    Can we then combine any set of poor performing models and obtain a super accurate
    ensemble model? Both yes and no! There are certain criteria that must be met to
    be able to reap the benefits of ensemble learning. First, the base models must
    individually perform better than random guessing. Second, the base models must
    be diverse (i.e., the errors made on unseen data must be uncorrelated). Consider
    the following simple illustration to understand these requirements.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_220_0.png)


    In above illustration, the ensemble model will have an accuracy of 97.1% although
    each base model is only 60% accurate. While it is relatively easy to fulfill this
    first criterion of building base models with > 50% accuracies, it is tough to
    obtain diversification/independence among the base models. In Figure 9.8, if all
    the base models make identical mistakes all the time, combining them will offer
    no benefit. We already saw some diversification mechanisms in RF. There are other
    ways as well and the schematic below provides an overview of some popular ensemble
    diversification techniques.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_220_1.png)


    Figure 9.9: An overview of popular ensemble modeling techniques with homogeneous
    base models


    > The choice of ensemble technique should be based on the base model''s characteristics.
    If the problem with the base model is its high variance, then choose the ensemble
    method that tends to reduce variance (such as bagging). On the other hand, if
    the problem is high bias, then use methods like boosting and stacking that will
    produce an ensemble model with reduced bias.


    Let''s now become more familiar with these techniques.


    ## Bagging


    In bagging (bootstrap aggregating) technique, the diverse set of base models are
    generated by employing the same modeling algorithm with different bootstrap samples
    of the original training dataset. Unlike RF, the input variables are kept the
    same in each base model and the size of bootstrap dataset is usually kept less
    than the original number of training samples. Moreover, the base model is not
    restricted to be a DT model. As the figure below shows, the base models are trained
    independently (allowing parallel trainings) and ensemble prediction is obtained
    by combining base models'' predictions.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_221_0.png)


    The defining characteristic of bagging is that it helps in reducing variance but
    not bias. It can be shown that if $\bar{\rho}$ is the average correlation among
    base model predictions then variance of $y_{\text{ensemble}}$ equals $\bar{\sigma}^2
    \left( \bar{\rho} + \frac{1-\bar{\rho}}{K} \right)$ where $\bar{\sigma}^2$ is
    variance of an individual base model''s predictions and $K$ is number of base
    models. Therefore, $\bar{\rho} = 1$ implies no reduction in variance.


    Bagging can be used for both regression and classification. Sklearn provides BaggingClassifier
    and BaggingRegressor for them, respectively. A simple illustration below shows
    how bagging can help achieve smoother results (classification boundaries in this
    case).


    ```

    # generate training samples

    from sklearn import datasets

    noisy_moons = datasets.make_moons(n_samples=200, noise=0.3, random_state=10)

    X, y = noisy_moons


    # fit bagging model (Sklearn uses decision trees as base models by default)

    from sklearn.ensemble import BaggingClassifier

    Bagging_model = BaggingClassifier(n_estimators=500, max_samples=50, random_state=100).fit(X,
    y) # K=500 and each DT is trained on 50 training samples randomly drawn with replacement

    ```


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_222_0.png)


    ## Boosting


    In boosting ensemble technique, the base models are again obtained using the same
    learning algorithm but are fitted sequentially and not independently from each
    other. During training, each base model tries to ‘correct’ the errors made by
    the boosted model at the previous step. At the end of the process, we obtain an
    ensemble model that shows lower bias$^{45}$ than the base models.


    $^{45}$ Variance may or may not decrease. Boosting has been seen to cause overfitting
    sometimes.'
  mdcn: '## OOB 准确率


    在之前的示例中，我们在随机森林训练时指定了 `oob_score=True`。这一设置指示随机森林在模型拟合过程中使用训练数据计算泛化分数。这听起来几乎像是一个错误的陈述，但当你意识到任何单个自助数据集都不包含原始数据集的所有样本<sup>43</sup>（如图
    9.4 所示）时，它就变得合理了。不属于某个树的自助数据集的样本被称为该树的袋外样本。任何给定的样本都可能成为森林中若干棵树（假设为 DT1、DT5、DT7）的袋外样本的一部分。可以使用
    DT1、DT5、DT7 的集成对该样本进行预测，并计算袋外误差。所有样本的袋外误差用于计算整体的 `oob_score`。


    ```

    # 打印 OOB 分数

    print(''OOB score: '', model.oob_score_)

    >>> OOB score: 0.903

    ```


    对于这个具体数据集，`oob_score`（精确到小数点后 3 位）与测试分数相同！袋外分数可能不是完美的泛化评估，但在小型数据集中，当保留测试数据集并非易事时，它就派上用场了。


    ## 特征重要性


    现在让我们看看随机森林的另一个便捷特性，它允许我们根据输入/特征变量对输出预测的重要性对其进行排序。Sklearn 通过计算使用某个特征进行节点分裂时节点不纯度（或回归的
    MSE）的平均减少量来计算特征重要性。首先，特征 $j$ 在一棵树中的重要性计算如下


    $$FI_j^{tree} = \frac{\sum_{nodes; node \ splits \ on \ feature \ j} \Delta I_{node}^{tree}}{\sum_{nodes}
    \Delta I_{node}^{tree}}$$


    $FI_j^{tree}$ 在森林中所有树上的平均值即为所需的特征重要性


    $$FI_j = \frac{\sum_{trees} FI_j^{tree}}{number \ of \ trees}$$


    对于我们的混凝土强度数据集，$FI_s$ 可以如下获得


    <sup>43</sup> 对于大的 N，可以证明随机森林中的任何自助数据集理论上包含原始数据集中大约 63% 的样本


    ```

    # 特征重要性

    var_names = [''cement'',''slag'',''flyash'',''water'',''superplasticizer'',''coarseaggregate'',''fineaggregate'',''age'']

    importances = model.feature_importances_


    plt.barh(var_names, importances)

    plt.xlabel(''Feature importances'')

    ```


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_218_0.png)


    以上结果表明，水泥含量和混凝土龄期是预测混凝土强度的两个最重要的变量。这一结果符合预期，并进一步突出了随机森林在分析过程数据中非线性依赖关系方面的实用性。


    至此，我们对随机森林的研究告一段落。希望我们已经能够说服您，随机森林可能是您机器学习武器库中相当强大的武器。让我们继续学习集成学习，以了解是什么赋予了随机森林如此强大的能力。


    ## 9.4 集成学习简介


    将多个“不太好”的弱模型组合起来生成一个强模型的思想并不仅限于随机森林。这个思想更为通用，被称为集成学习。实现该思想的具体方法（如随机森林）被称为集成方法。下面的图
    9.8 展示了一个采用多样化基础模型的集成建模方案。所示模型是异构集成模型，因为各个模型采用了不同的学习方法。相比之下，在同构模型中，基础模型使用相同的学习算法。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_219_0.png)


    图 9.8：异构集成学习方案<sup>44</sup>。随机森林本身是一种集成方法，在这里被用作基础模型。


    我们有多种选择来聚合基础模型的预测结果。对于分类，我们可以使用多数投票，选择被大多数基础模型预测的类别。或者，如果基础模型返回类别概率，也可以使用软投票。对于回归，我们可以使用简单平均或加权平均。


    在集成的世界里，弱模型是指由于高偏差或高方差而导致性能不佳的任何模型。然而，这些弱模型组合在一起，可以实现更好、更准确（更低偏差）和/或更稳健（更低方差）的预测。那么，我们是否可以将任何一组表现不佳的模型组合起来，获得一个超级准确的集成模型呢？答案既是肯定的，也是否定的！要获得集成学习的益处，必须满足某些标准。首先，基础模型必须单独表现优于随机猜测。其次，基础模型必须具有多样性（即，在未见数据上产生的错误必须是不相关的）。考虑以下简单的说明来理解这些要求。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_220_0.png)


    在上面的示例中，集成模型的准确率将达到 97.1%，尽管每个基础模型只有 60% 的准确率。虽然满足第一个标准（构建准确率 > 50% 的基础模型）相对容易，但要在基础模型之间获得多样性/独立性却很困难。在图
    9.8 中，如果所有基础模型总是犯相同的错误，那么将它们组合起来将没有任何好处。我们已经在随机森林中看到了一些多样性机制。还有其他方法，下面的示意图概述了一些流行的集成多样性技术。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_220_1.png)


    图 9.9：具有同构基础模型的流行集成建模技术概述


    > 集成技术的选择应基于基础模型的特性。如果基础模型的问题是高方差，那么选择倾向于减少方差的集成方法（如 bagging）。另一方面，如果问题是高偏差，则使用像
    boosting 和 stacking 这样的方法，它们将产生一个偏差降低的集成模型。


    现在让我们更熟悉这些技术。


    ## Bagging


    在 bagging（自助聚合）技术中，通过使用相同的建模算法对原始训练数据集的不同自助样本进行训练，来生成多样化的基础模型。与随机森林不同，输入变量在每个基础模型中保持不变，并且自助数据集的大小通常小于原始训练样本的数量。此外，基础模型不限于决策树模型。如下图所示，基础模型是独立训练的（允许并行训练），集成预测是通过组合基础模型的预测得到的。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_221_0.png)


    Bagging 的定义特征是它有助于减少方差，但不能减少偏差。可以证明，如果 $\bar{\rho}$ 是基础模型预测之间的平均相关性，那么 $y_{\text{ensemble}}$
    的方差等于 $\bar{\sigma}^2 \left( \bar{\rho} + \frac{1-\bar{\rho}}{K} \right)$，其中 $\bar{\sigma}^2$
    是单个基础模型预测的方差，$K$ 是基础模型的数量。因此，$\bar{\rho} = 1$ 意味着方差没有减少。


    Bagging 可以用于回归和分类。Sklearn 分别提供了 `BaggingClassifier` 和 `BaggingRegressor`。下面的简单示例展示了
    bagging 如何帮助获得更平滑的结果（在这种情况下是分类边界）。


    ```

    # 生成训练样本

    from sklearn import datasets

    noisy_moons = datasets.make_moons(n_samples=200, noise=0.3, random_state=10)

    X, y = noisy_moons


    # 拟合 bagging 模型（Sklearn 默认使用决策树作为基础模型）

    from sklearn.ensemble import BaggingClassifier

    Bagging_model = BaggingClassifier(n_estimators=500, max_samples=50, random_state=100).fit(X,
    y) # K=500，每棵决策树在随机有放回抽取的 50 个训练样本上训练

    ```


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_222_0.png)


    ## Boosting


    在 boosting 集成技术中，基础模型再次使用相同的学习算法获得，但它们是顺序拟合的，而不是相互独立的。在训练过程中，每个基础模型都试图“纠正”提升模型在前一步中犯下的错误。在过程结束时，我们获得了一个比基础模型偏差更低$^{45}$的集成模型。


    $^{45}$ 方差可能降低也可能不降低。Boosting 有时会导致过拟合。'

    # # Chapter 14


    # ## Process Monitoring Web Application


    You have done all the hard work to obtain a ML model that meets performance criteria
    and now it''s time to deliver the solution / model to its end-users who will be
    using the model''s results on a regular basis. But how do you do it? If the end-users
    are non-technical (from data-science perspective) like plant operators, you cannot
    ask them to have their own Python installation to run the ML model. Under such
    circumstances, deployment over web is a good and frequently employed solution
    for delivering ML results.


    For web deployment, Python provides several frameworks (like Django, Flask, CherryPy)
    for developing simple to complex web application fast. Very often, all you may
    want is a quick prototype that allows you to collect user feedback. Keeping this
    in mind, we will show you how to build a light-weight web application from scratch
    and demonstrate how easy it is to do so. Specifically, we will build a process
    monitoring tool that provides 24 X 7 fault detection & diagnosis (FDD) results
    to plant operators over web. During the course of building this solution, we will
    learn the following topics


    +   - Deploying Python applications using CherryPy''s web server

    - Embedding ML models into a web application

    - Saving ML models for later reuse

    - Building front-end user interfaces using HTML, CSS, Javascript'
- md: "## 14.1 Process Monitoring Web App: Introduction\n\nFigure 14.1 shows the user\
    \ interface that we will build in this chapter to display the results in real-time\
    \ from a process monitoring ML model. The user interface is to be accessed via\
    \ a web browser and provides two crucial information to the plant operators. First,\
    \ the fault detection component communicates to the operators the state of the\
    \ process and alerts them if any process abnormality is detected. Second, the\
    \ fault diagnosis component identifies the faulty variables responsible for process\
    \ abnormality. The monitoring model will be built using PCA and the methodology\
    \ introduced in Chapter 5 will be employed for FDD. The process system is the\
    \ same as that in Chapter 5, i.e., the polymer processing plant with 33 variables.\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_333_0.png)\n\nA web application primarily\
    \ has 2 main parts: front-end and back-end. Front-end (or client-side) is the\
    \ part that end-users see and interact with directly through web browsers. The\
    \ back-end works behind the scenes to deliver information to the browsers. When\
    \ a user enters your website's URL in browser, a request is sent to the back-end\
    \ which parses this request, processes it, and sends back a response which is\
    \ displayed on the front-end. Illustration below shows the data transmission scheme\
    \ that we will employ\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_334_0.png)\n\
    \nAs you can see, the data analytics occurs on the back-end residing on a dedicated\
    \ computer and the results are seen on any machine via browsers. While the front-end\
    \ in our application will do only the basic job of displaying FDD results, front-ends\
    \ can do much more such as user-data entry validation, animations, etc., and these\
    \ complex functionalities are handled by any modern internet browser.\n\n## 14.2\
    \ A Simple ‘Hello World’ Web App\n\nBefore we build the full-fledged monitoring\
    \ tool, let’s build a simple ‘Hello World’ application to gain some familiarity\
    \ with the process of developing a web application using Python. We will use CherryPy<sup>81</sup>\
    \ package, a popular and simple web application framework, which is used for rapid\
    \ deployment of web apps and is very easy to learn. CherryPy provides a production-ready\
    \ web server which can easily handle medium-scale web applications and therefore,\
    \ is suitable for our purpose.\n\nFor the simple application, let’s type the following\
    \ code in a Python script<sup>82</sup> *helloWorld.py* and execute it in the Anaconda\
    \ command terminal (to execute from windows command terminal, you will need to\
    \ edit Windows Environment variables to add Anaconda to your System Path)\n\n\
    ```\n# import package\nimport cherrypy\n\n# Web application will be written as\
    \ a Python class.\n# Methods of the class will be used to respond to client requests\n\
    class HelloWorld(object):\n    @cherrypy.expose\n    def index(self):\n      \
    \  return \"Hello world!\"\n\n# execution settings\ncherrypy.config.update({'server.socket_host':\
    \ '0.0.0.0'})\nif __name__ == '__main__':\n    cherrypy.quickstart(HelloWorld())\
    \ # when this script is executed, host HelloWorld app\n```\n\n<sup>81</sup> You\
    \ can install CherryPy via `pip install cherrypy` command. The official CherryPy\
    \ doc has some excellent instructive tutorials (https://docs.cherrypy.org/en/latest/tutorials.html).\
    \ Do check them out if you want to learn more.\n<sup>82</sup> We will not cover\

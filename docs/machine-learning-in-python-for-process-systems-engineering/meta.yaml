    ![](img/ae65e737df4a9f5732c91f7aea579fc8_96_0.png)


    Figure 4.11: Multivariate outlier detection via Mahalanobis distance and Hampel
    identifier


    In this illustration, the shown bounds were obtained via Hampel identifier on
    the cubic roots of MDs (cubic root taken to make the MDs distribution approximately
    gaussian<sup>15</sup>) as shown in the code below


    ```

    # read data

    import numpy as np

    data_2Doutlier = np.loadtxt(''simple2D_outlier.csv'', delimiter='','')


    # compute Mahalanobis distances and transform into gaussian distribution using
    cubic-root

    from sklearn.covariance import EmpiricalCovariance


    In the furnace system, tube leak occurrences may be preceded by a specific pattern
    in temperatures of neighboring tubes. These patterns are identified during model
    training and then utilized for real-time failure predictions. Advance warning
    can help plant operators plan plant shutdown properly.


    # Forecasting


    Uncertainty in product demands and prices of raw materials lead to poor production
    scheduling. Advanced ML forecasting models are built to determine optimal production
    plan to maximize resource utilization and minimize production costs. In furnace
    system, frequent furnace temperature swings have detrimental effect on tube lifespan.
    If accurate monthly product demand is known in advance, then the furnace can be
    operated at a steady state throughout the month while using product storage to
    handle momentary spikes in demand.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_31_0.png)


    # Choosing the right ML algorithm


    One of the trickiest tasks in a machine learning project is selection of modeling
    algorithm. Even experienced ML practitioners often recommend trial-and-error approaches.
    However, with experience, understanding of underlying details of ML algorithms,
    and process knowledge you can narrow down the trial candidates.


    Let’s take a sneak peek into the model selection process for the task of process
    monitoring. For monitoring, if the system is linear, PCA or PLS models should
    be tried first. If variables are non-gaussian distributed, kernel density estimation
    (KDE) or SVDD can be used for control-limit determination. For nonlinear systems,
    kernelized PCA/PLS, ANN, SVMs may be explored. SVMs are preferred when training
    data are limited. If process exhibits multiple operation mode, then mixture modeling
    like gaussian mixture model (GMM) can provide better monitoring performance.


    # 1.4 ML Solution Deployment


    While working on any project, you are most likely to experiment with several ML
    algorithms on your personal laptop/computer. After having done all the hard work
    and having decided the final form of your ML workflow, you might find yourself
    asking the following questions:'

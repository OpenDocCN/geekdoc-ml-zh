  md: '# Simple linear classification illustration


    We will use the toy dataset in Figure 7.1 to illustrate SVM-based classifier modeling
    in Sklearn.


    ```

    # read data

    import numpy as np

    data = np.loadtxt(''toyDataset.csv'', delimiter='','')

    X = data[:, [0, 1]]; y = data[:, 2]


    # scale model inputs

    from sklearn.preprocessing import StandardScaler

    scaler = StandardScaler()

    X_scaled = scaler.fit_transform(X)


    # fit SVM model

    from sklearn.svm import SVC # for large datasets LinearSVC class is preferable

    model = SVC(kernel=''linear'', C=100)

    model.fit(X_scaled, y)


    # get details of support vectors

    print(''# of support vectors:'', len(model.support_))


    >> # of support vectors: 3

    ```


    The above code provides us the optimal separating boundary shown in Figure 7.1<sup>34</sup>.
    As with other Sklearn estimators, predict() method can be used to predict the
    class of any test observation. We will soon cover the hyperparameters (kernel
    and C) used in the above code.


    # Hard margin vs soft margin classification


    The toy dataset represents an ideal data where all the training samples can be
    correctly classified via a linear boundary. However, in real-life, some data impurities
    always creep in as shown in Figure 7.2. Our SVM formulation (in Eq. 1) will fail
    to find a solution in this case'
  merge: -1
  pgno: 159
- img_proc: true
  md: '![](img/ae65e737df4a9f5732c91f7aea579fc8_160_0.png)


    Figure 7.2: Presence of the shown bad sample makes perfect linear separation infeasible


    To deal with such scenarios, we add a little flexibility into our SVM optimization
    program by modifying the constraints as shown below


    $$w^T x_i + b \geq 1 - \xi_i \quad \text{for } y_i = 1$$

    $$w^T x_i + b \leq -1 + \xi_i \quad \text{for } y_i = -1$$


    Here, we use slack variables ($\xi_i$) to allow each sample the freedom to end
    up on the wrong side of the support plane and potentially be misclassified during
    model fitting. However, we would like to keep the number of such violations low
    as well which we can achieve by penalizing the violations. The revised SVM formulation
    looks like this


    $$\min_{w,b,\xi} \quad \frac{1}{2}||w||^2 + C \sum_{i=1}^N \xi_i$$

    $$\text{s.t.} \quad y_i(w^T x_i + b) \geq 1 - \xi_i, \quad i = 1, \cdots N$$

    $$\xi_i > 0$$


    The above formulation is called soft margin classification (as opposed to the
    previous hard margin classification). Sklearn implements soft margin formulation.
    The positive constant, C, is a hyperparameter (C=1 in Sklearn by default) and
    corresponds to the hyperparameter we saw in the previous code. For our toy dataset
    2 (in Figure 7.2), with the previously shown code, we end up with the same separating
    boundary as shown in Figure 7.1. Class prediction expression remains the same
    as $\hat{y}_t = sign(w^T x_t + b)$.


    # C as regularization hyperparameter


    The slack variables not only help find a solution in the presence of gross impurity,
    but they also help to avoid overfitting noisy data. For example, consider the
    scenario in Figure 7.3. If no misclassifications are allowed, we end up with a
    very small margin, while with a single'
  merge: -1
  pgno: 160
- img_proc: true
  md: 'misclassification we get a much better margin with potentially better generalization.
    Therefore, we see that there is a trade-off between margin maximization and training
    accuracy.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_161_0.png)


    The hyperparameter C is the knob to control the trade-off. A large value of C
    implies heavy penalization of the constraint violations which will prevent misclassifications,
    while small value of C allows more misclassifications during model fitting for
    better margin.


    # ## 7.2 The Kernel Trick for Nonlinear Data


    While soft margin classification formulation is quite flexible, it won''t work
    for nonlinear classification problems where curved boundaries are warranted. Consider
    the dataset in Figure 7.4. It is clear that a linear boundary is inappropriate
    here.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_161_1.png)


    However, all is not lost here. One idea to circumvent this issue is to map the
    original input variables/features into a higher dimensional space where they become
    linearly separable. For the data in Figure 7.4, the following transformation would
    work quite well


    $$\varphi(\boldsymbol{x}) = \varphi(x_1, x_2) = [z_1, z_2, z_3] = [x_1, x_2, x_1^2
    + x_2^2]$$'

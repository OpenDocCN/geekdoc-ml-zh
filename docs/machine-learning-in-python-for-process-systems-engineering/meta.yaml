- img_proc: true
  md: '| Regression Metric | Formula |

    | :--- | :--- |

    | MSE | $\frac{\Sigma(y - \hat{y})^2}{N}$ |

    | MAE | $\frac{\Sigma|y - \hat{y}|}{N}$ |

    | RMSE | $\sqrt{\frac{\Sigma(y - \hat{y})^2}{N}}$ |

    | R squared | $1 - \frac{\Sigma(y - \hat{y})^2}{\Sigma(y - \bar{y})^2}$ |


    Table 2: Formulae for common regression metrics. The summation is carried out
    over the $N$ samples. $\bar{y}$ is mean of $y$


    $R^2$ does not directly convey the magnitude of prediction errors. For this, the
    other metrics can be used. RMSE is the most popular metric for evaluating regression
    models and is computed as the square-root of the average of prediction errors.
    A related metric is the MSE which does not take the square-root. MAE is similar
    to MSE, except that it considers the absolute value of errors. Any of these metrics
    can be used to compare different models: smaller the values of these metrics (except
    $R^2$), better is the model fit.


    > Several Sklearn models have their own score methods which computes an evaluation
    metric suitable for the problem they are designed to solve. For example, the score()
    method of LinearRegression object returns the $R^2$ metric. Pipelines have a score
    method as well which simply executes the score method of the final model. For
    our quadratic fitting example, it can be used as follows


    python

    # compute metric using score method

    R2 = pipe.score(x, y) # no need to import metrics module


    # Classification metrics


    While in regression problems we care about how close the predicted values are
    to the actual values, in classification problems we care about the perfect match
    between the actual and predicted labels. Before we look at different classification
    metrics, let''s first learn about a confusion matrix. The figure below shows a
    sample confusion matrix for a binary classification task; this matrix provides
    a comprehensive overview of how well a model has correctly (& incorrectly) classified
    samples belonging to the positive and negative classes. The shown matrix indicates
    that out of 25 (24 + 1) samples that actually belonged to negative class, the
    model correctly labeled 21 of those.'

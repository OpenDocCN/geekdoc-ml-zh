    \ check them out in the online script file.\n\n```\n# runPCAmodel function\ndef\
    \ runPCAmodel():\n    # read saved PCA model data\n    with open('PCAmodelData.pickle',\
    \ 'rb') as f:\n        PCAmodelData = pickle.load(f)\n\n    # read latest process\
    \ data\n    processData = getLatestProcessData()\n\n    # compute monitoring metrics\
    \ and abnormality contributions\n```"
  merge: -1
  pgno: 337
- img_proc: true
  md: "```\n[currentQ, currentT2, Q_contri, T2_contri] = computeMetricsContributions(PCAmodelData,\
    \ processData)\n\n# detect fault\nif (currentQ > PCAmodelData[\"Q_CL\"]) or (currentT2\
    \ > PCAmodelData[\"T2_CL\"]):\n    processSate = 'Issue Detected'\nelse:\n   \
    \ processSate = 'All Good'\n\n# generate and save metric plot containing historical\
    \ metrics and current metrics\ngenerateMetricPlots(currentQ, currentT2, PCAmodelData[\"\
    Q_CL\"], PCAmodelData[\"T2_CL\"])\n# saves 'metricPlot.png' in the working folder\n\
    \n# generate and save contribution plots for latest data\ngenerateContributionPlots(Q_contri,\
    \ T2_contri) # saves 'contributionPlot.png'\n\nreturn processSate\n```\n\n> To\
    \ keep the illustration simple, the getLatestProcessData function fetches current\
    \ process data from a local CSV file. In real environment, process data may be\
    \ fetched from a database or from files residing on another machines. All these\
    \ varied scenarios can be easily handled in Python through appropriate libraries.\
    \ For example, for database connectivity, you can use pypyodbc.\n\nNow you know\
    \ how you can embed your ML code and model into a web application. But our web\
    \ app is not complete yet. We still need to instruct our web app to send those\
    \ generated metrics and contribution plots to the end users.\n\n# 14.4 Building\
    \ Front-end User Interface\n\nInteractive and nice-looking user interfaces cannot\
    \ be rendered with just plain text output returned from web servers. Along with\
    \ different media objects (like figures), explicit instructions need to be provided\
    \ to the browsers on how to structure the webpage. Those instructions are written\
    \ using HTML (specifies the basic structure of the page) and CSS (handles the\
    \ formatting/appearance aspects) languages that browsers understand. Let's begin\
    \ by modifying our web app so that we obtain the following user interface."
  merge: -1
  pgno: 338
- img_proc: true
  md: "# Smart Process Monitoring Tool\n\nIssue detected\n\nThe corresponding HTML\
    \ code would look like this:\n\n```\n<html>\n<style>\n    body\n    {\n      \
    \  font-family: Arial; text-align: center;\n    }\n\n    #topHeader\n    {\n \
    \       padding: 15px; background: #1abc9c; color: white; font-size: 30px;\n \
    \   }\n</style>\n\n<body>\n    <h1 id='topHeader'>Smart Process Monitoring Tool</h1>\n\
    \    <p style=\"color:red;\"> <b> Issue detected </b> </p>\n</body>\n</html>\n\
    ```\n\nYou can in fact go ahead and type the above code in a notepad, save it\
    \ as sample.html and open the file in a browser. You will see the above interface.\
    \ We can embed this code in our getResults function as per the pseudo-code shown\
    \ below\n\n```\n# getResults function returning HTML code\ndef getResults(self):\n\
    \    processState = runPCAmodel()\n\n    # generate front-end code\n    html_code\
    \ = \"\"\"\n                < put HTML code here >\n                \"\"\"\n \
    \   return html_code\n```"
  merge: -1
  pgno: 339
- img_proc: true
  md: "While the above code structure would technically be correct, it is not a best\
    \ practice to keep the front-end code and core back-end code in the same script.\
    \ The separation can be achieved as follows\n\n```\n# getResults function returning\
    \ HTML code using a template\nimport os\nfrom jinja2 import Environment, FileSystemLoader\n\
    \npath  = os.path.abspath(os.path.dirname(__file__))\nenv = Environment(loader=FileSystemLoader(path))\n\
    \ndef getResults(self):\n    processState = runPCAmodel() # returns numeric flag:\
    \ 0 => 'All good' or 1 => 'Issue detected'\n\n    # generate front-end code\n\
    \    frontEnd_template = env.get_template('frontEndTemplate.html') # loads a template\
    \ file\n    frontEndCode = frontEnd_template.render(state=processState) # generates\
    \ front-end code using the template\n\n    return frontEndCode\n```\n\nwhere the\
    \ contents of file *frontEndTemplate.html* look like this\n\n```\n<html>\n<head>\n\
    <style>\n    body {font-family: Arial; text-align: center;}\n    #topHeader {padding:\
    \ 15px; background: #1abc9c; color: white; font-size: 30px;}\n</style>\n</head>\n\
    <body>\n    <h1 id='topHeader'> Smart Process Monitoring Tool </h1>\n    {% if\
    \ state == 0 %}\n        <p style=\"color:green;\"> <b> All Good </b> </p> <br>\n\
    \    {% else %}\n        <p style=\"color:red;\"> <b> Issue Detected </b> </p>\
    \ <br>\n    {% endif %}\n</body>\n</html>\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_340_0.png)"
  merge: -1
  pgno: 340
- img_proc: true
  md: "You will notice some additional elements ({% ...%}, if statements) in the frontEndTemplate.html\
    \ file. These additional elements are not meant for browsers. This file is a template\
    \ that will be used by the Jinja templating engine (imported in our FDD.py script)\
    \ to generate the required HTML code. You can notice the logic that has been put\
    \ in place to modify the central dashboard message and its text color depending\
    \ upon the processState value. The templating framework is a beautiful solution\
    \ to keep the front-end and back-end code separate and encourage code-readability.\n\
    \nAlright, now you understand how front-end code can be put in a web app. Let's\
    \ move ahead and add our figures to the interface We will add the following code\
    \ into the body section of the template file for displaying figures.\n\n```\n\
    <body>\n    ...\n    <center> <img src=\"/metricPlot.png\" height=\"300\" width=\"\
    1450\"> </center> <br> <br>\n    <center> <img id='contri_img' src=\"/contributionPlot.png\"\
    \ style=\"display: none;\" height=\"300\" width=\"1350\"> </center>\n\n</body>\n\
    ```\n\nAll we did above was include image elements into the HTML code and provide\
    \ the correct path. A small code is also inserted into FDD.py script to let the\
    \ web app know where to find these image files.\n\n```\n# execution settings\n\
    cherrypy.config.update({'server.socket_host': '0.0.0.0'})\nconf = {'/': {'tools.staticdir.on':\
    \ True,'tools.staticdir.dir': path}}\n```\n\nIf you execute FDD.py and access\
    \ your website, you would see the figures on the user interface now. Let's now\
    \ come to the last and interesting part of adding some dynamics or interactivity\
    \ to our interface. What we desire is that the contribution plots be shown only\
    \ when the user clicks on 'Show Contribution Plot' button (these plots would not\
    \ be much useful when monitoring indices are below the thresholds). To enable\
    \ this interactivity, we will employ another cornerstone language of web development,\
    \ Javascript. As shown below, a Javascript function is put in the head section\
    \ of the template and a button is added to the user interface.\n\n```\n<head>\n\
    \    ...\n    <script>\n        function toggleDisp(imgID) {\n            var\
    \ x = document.getElementById(imgID);\n```"
  merge: -1
  pgno: 341
- img_proc: true
  md: "```\nif (x.style.display == \"none\")\n{\n    x.style.display = \"block\";\
    \ }\nelse {\n    x.style.display = \"none\"; }\n}\n</script>\n..\n</head>\n<body>\n\
    ...\n<button type=\"button\" onclick=\"toggleDisp('contri_img')\"> Show/Hide Contribution\
    \ Plot</button> <br> <br> <br>\n...\n</body>\n```\n\nWhen the button is clicked,\
    \ the Javascript function gets executed which toggles the display property of\
    \ the contribution plots images. There remains one last piece of the puzzle. Currently,\
    \ the latest monitoring results are displayed only when a user refreshes/reloads\
    \ the webpage. This clearly is undesirable. What we want is that the interface\
    \ refreshes itself automatically to display latest results at regular interval.\
    \ This is accomplished by including the following in the head section which refreshes/re-loads\
    \ the interface every 30 seconds.\n\n```\n<meta http-equiv=\"refresh\" content=\"\
    30\">\n```\n\nOur web app is now complete. Go ahead and try it out. You should\
    \ see the interface shown in Figure 14.1. The top metric plots will first show\
    \ only a single data-point and new data-points will show up after every automatic\
    \ refresh. The world of web development is huge, and we covered only a small portion\
    \ of it in this chapter to develop a very basic user interface with limited functionalities.\
    \ Technologies like Ajax, jQuery, Angular, React, Bootstrap exist that can be\
    \ used to make extremely complex and functionality-rich websites.\n\n# Summary\n\
    \nIn this chapter we studied the very last phase of the end-to-end development\
    \ of a machine learning project, i.e., taking the results from ML models to the\
    \ non-technical end-users via web applications. Concepts learnt in this chapter\
    \ can help you rapidly deploy your tool and collect crucial user feedback. With\
    \ this chapter, we have come to the end of our process data science journey. We\
    \ hope that you enjoyed reading this book as much as we enjoyed writing it!"
  merge: -1
  pgno: 342
- img_proc: true
  md: '# Appendix


    # Dataset Descriptions'
  merge: -1
  pgno: 343
- img_proc: true
  md: 'This appendix section provides a quick overview of the process datasets used
    in the book. The ML techniques implemented on the datasets are also mentioned.


    # 1) Polymer Manufacturing Process Data


    The dataset (named Proc1a) is from a polymer manufacturing facility and was obtained
    from https://landing.umetrics.com/downloads-other-downloads. The dataset contains
    33 variables and 92 hourly observations. In the available dataset, variables are
    scaled and coded for confidentiality reasons<sup>84</sup>.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_344_0.png)


    Figure A1: Polymer manufacturing data. Each curve corresponds to a process variable


    For this dataset, it was reported that the process started behaving abnormally
    around sample 70 and eventually had to be shut down. Dimensionality reduction
    and process monitoring/fault detection & diagnosis using PCA was illustrated using
    this data in Chapter 5.


    # 2) Pulp & Paper Manufacturing Process Data


    The dataset comes from a paper pulp mill and is available at https://openmv.net.
    The dataset contains 301 hourly samples of 21 process variables from a Kamyr digester
    which, as shown in Figure A2, is a tubular reactor where wood chips react with
    white liquor (solution of sodium hydroxide and sodium sulfide) to remove lignin
    from cellulose fibers. Kappa number is the critical quality variable (provided
    in the dataset) in this process, and it quantifies the lignin content in the pulp.
    It is desirable to have an accurate prediction model for Kappa number for process
    monitoring, analyzer calibration monitoring, or in cases where real-time analyzers
    may not be available. A PLS-based inferential model is built in Chapter 5.'
  merge: -1
  pgno: 344
- img_proc: true
  md: '![](img/ae65e737df4a9f5732c91f7aea579fc8_345_0.png)


    Figure A2: Kamyr digester for paper pulp production


    # 3) Low-Density Polyethylene (LDPE) Process Data


    The data comes from a LDPE production process using a simulated model that was
    tuned to match a typical industrial process<sup>85</sup>. This dataset can be
    obtained from https://openmv.net. As shown in figure below, the process consists
    of a multi-zonal tubular reactor. The dataset contains 54 samples of 14 process
    variables and 5 product quality variables. The process variables include the reactor
    operating conditions (temperatures, pressure), feed flowrates, and the coolant
    temperatures. The quality variables include several molecular properties such
    as the average molecular weight of the polymer product.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_345_1.png)


    Figure A3: LDPE reactor'
  merge: -1
  pgno: 345
- img_proc: true
  md: 'The feed and reactor operating conditions strongly influence the final product
    quality and therefore, an efficient FDD is highly desirable for such processes.
    For this dataset, a process fault occurs sample 51 onwards due to increase in
    feed impurity level. Figure A4 shows that fault detection using quality variables
    plot is not ‘obvious’. A couple of process variables do seem to show significant
    deviations, but it would be serendipitous if a plant operator was looking at these
    specific variables at the right time! An efficient and systematic fault detection
    mechanism using PLS is illustrated for this data in Chapter 5.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_346_0.png)


    # 4) Tennessee Eastman Process Data


    This data is from a large-scale industrial chemical plant and is available at
    https://github.com/camaramm/tennessee-eastman-profBraatz. The process is called
    Tennessee Eastman process (TEP) and Figure A5 shows the process flowsheet.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_346_1.png)'
  merge: -1
  pgno: 346
- img_proc: true
  md: 'This process consists of several unit operations: a reactor, a condenser, a
    separator, a stripper, and a recycle compressor. There are 22 continuous process
    measurements, 19 composition measurements, and 11 manipulated variables. The dataset
    contains training and test data from normal operation period and 21 faulty periods
    with distinct fault causes. For each fault class, training dataset contains 480
    samples collected over 24 operation hours and test dataset contains 960 samples
    collected over 48 operation hours. For the faulty data, faulty operation starts
    from sample 160 onwards. Detailed information about the process and the faults
    can be obtained from the original paper by Downs and Vogel titled ‘A plant-wide
    industrial process control problem’. This dataset has been used to build ICA and
    FDA-based fault detection tools in Chapter 6.


    A bigger dataset for TEP has also been provided by Reith et al.<sup>86</sup> The
    dataset still contains 21 different fault classes (along with no-fault operation);
    however, for each fault class, 500 separate simulations runs were conducted for
    both training and test dataset. Each training simulation run contains 500 time
    samples from 25 hours of operation and each testing run contains 960 time samples
    from 48 hours of operation. LSTM-based fault classification has been demonstrated
    with this data in Chapter 12.


    # 5) Semiconductor Manufacturing Process Data


    This dataset is from a semiconductor manufacturing process and can be downloaded
    from http://www.eigenvector.com/data/Etch. The dataset was obtained from multiple
    batches from a metal etch process and consists of 19 process variables measured
    over the course of 108 normal batches and 21 faulty batches. The batch durations
    range from 95 to 112 seconds. The dataset exhibits multimode operations and has
    been analyzed for fault detection in Chapter 7 using SVDD and Chapter 8 using
    GMM.


    # 6) Polymer Pilot Plant Data


    This dataset is from a Dupont polymer pilot plant and is available at ftp://ftp.cis.upenn.edu/pub/ungar/chemdata/.
    The dataset consists of 61 samples of 14 variables (10 predictors and 4 plant
    outputs). The predictors correspond to temperatures, feed rates, and so on. Although
    the specific details of these variables are not disclosed, the data contributors
    emphasize that this dataset is particularly good for testing the robustness of
    nonlinear modeling methods for irregularly sparse data. SVR-based soft sensor
    model is built for this data in Chapter 7.'
  merge: -1
  pgno: 347
- img_proc: true
  md: '# 7) Debutanizer Column Data from a Petroleum Refinery


    This dataset is from a debutanizer column in a petroleum refinery<sup>87</sup>
    and is provided as supplementary material at https://link.springer.com/book/10.1007/978-1-84628-480-9.
    Debutanizer columns are standard units in petroleum refineries and are used to
    convert raw naphtha feed into LPG (as top product) and gasoline (as bottom product).
    The butane (C4) content in gasoline product is desired to be kept low and is monitored
    regularly via gas chromatography. However, the location of the chromatograph sensor
    is downstream of the debutanizer column which introduces a delay in C4 content
    data availability. For better product quality control, real-time knowledge of
    C4 content is needed. For this, a soft sensor is desired that can predict C4 content
    using other process data (as shown in Figure A6) around the column which influence
    butane content in bottoms product.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_348_0.png)


    Figure A6: Debutanizer column with location of measured variables


    The dataset contains 2394 samples of input-output process values. Note that the
    dataset is provided in its normalized form and the output values have been translated
    by 8 samples to compensate for the effect of the time delay. SVR and ANN have
    been used for soft sensor development in Chapters 7 and 11, respectively.


    # 8) Concrete Compressive Strength Data


    This dataset is available at the UCI machine learning repository (https://archive.ics.uci.edu/ml/datasets/Concrete+Compressive+Strength)
    and includes information about 1030 concrete samples. The UCI page emphasizes
    that the concrete'
  merge: -1
  pgno: 348
- img_proc: true
  md: 'strength is a highly nonlinear function of concrete age and ingredients. In
    Chapter 9, a Random Forest regression model is built to capture this nonlinear
    relationship.


    # 9) Wastewater Treatment Plant Data


    The dataset (downloaded from UCI machine learning repository<sup>88</sup>) comes
    from a wastewater treatment plant that uses activated sludge process to remove
    organic matter and suspended solids from municipal wastewater. In this process
    (Figure A7), the suspended solids are first physically settled (primary treatment)
    and then biologically treated to oxidize the biodegradable organic matter (secondary
    treatment). Data from on-line sensors at different stages of the process for 38
    variables over 527 days of operation are provided. Seven out of the 38 variables
    characterize the effluent water quality. In Chapter 9, a XGBoost-based soft sensor
    model is built to predict output conductivity (COND-S) of the effluent stream.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_349_0.png)


    # 10) Combined Cycle Power Plant Data


    The dataset<sup>89</sup> comes from a combined cycle power plant composed of gas
    turbine (GT), steam turbine (ST) and heat recovery steam generator as shown in
    Figure A7. Here, energy from fuel combustion generates electricity in a gas turbine
    and residual energy in the hot exhaust/flue gas from GT is recovered to produce
    steam This steam is used to generate further electricity in a steam turbine. The
    combined electric power generated by both GT and ST over a period of 6 years (with
    hourly averages) is provided in the dataset. Measurements of ambient conditions
    (temperature, pressure, relative humidity) and ST exhaust steam pressure which
    influence the electrical output are also included. In Chapter 11, an ANN model
    is built to predict the electrical power as a function of the other signals.'
  merge: -1
  pgno: 349
- img_proc: true
  md: '![](img/ae65e737df4a9f5732c91f7aea579fc8_350_0.png)


    # 11) SISO Heater System Data


    This dataset is from a heater system where heater power output is manipulated
    to adjust the system temperature. The dataset contains 4 hours of training data
    and 14 minutes of test data (https://apmonitor.com/do/index.php/Main/LSTMNetwork).
    Data is sampled at every second. In Chapter 12, a LSTM model is built to predict
    the temperature using the current and past system data.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_350_1.png)'
  merge: -1
  pgno: 350
- img_proc: true
  md: '# 12) Gas Turbine Data


    This dataset is available at NASA prognostics data repository⁹⁰ and provides simulated
    data for aircraft gas turbine engines. The dataset consists of operational and
    dynamic data (such as temperature, pressure) from multiple sensors from several
    engine operation simulations. Each simulation starts with an engine (with different
    degrees of initial wear) operating within normal limits. Engine degradation starts
    at some point during the simulation and continues until engine failure (engine
    health margin, a function of efficiency and flow, falling below a threshold).
    Training datasets contain complete data until engine failures, while the test
    dataset contains data until some point prior to failure. Actual remaining useful
    lives for the engines have been provided for the test dataset. More details and
    step-by-step guide on building a predictive maintenance model is provided in Chapter
    12.


    End of the book'
  merge: -1
  pgno: 351

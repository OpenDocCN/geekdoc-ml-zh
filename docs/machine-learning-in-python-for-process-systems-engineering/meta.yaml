    # Feature engineering


    While feature extraction is an unsupervised exercise (we do not explicitly specify
    the underlying correlation structure; algorithms extract relationships automatically),
    feature engineering involves careful and explicit transformation of variables
    which can assist ML algorithms in delivering better models. For example, if we
    examine the raw ($x$ vs $y$) data in Figure 3.3, it is clear that a quadratic
    model may be needed. To accomplish this, we will engineer an additional feature
    ($x^2$) from the given $x$ data and then fit a linear model between $\{x, x^2\}$
    and $y$, as shown in the code below



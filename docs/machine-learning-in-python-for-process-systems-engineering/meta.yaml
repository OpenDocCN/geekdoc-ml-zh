    \    plt.scatter(cluster_centers[i,0], cluster_centers[i,1], c = 'red', s = 40,\
    \ marker = '*', alpha = 0.9)\n    plt.annotate(cluster_plot_labels[i], (cluster_centers[i,0],\
    \ cluster_centers[i,1]))\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_190_0.png)\n\
    \n图8.5：通过k-means进行聚类\n\n如预期，图8.5显示k-means在聚类分配方面做得很好。K-means聚类结果强烈依赖于聚类中心的初始选择；不好的选择可能导致不恰当的聚类。为了克服这一点，k-means算法允许一个参数n_init（默认值为10），它决定了使用不同初始质心分配执行独立k-means聚类的次数；选择具有最低SSE的聚类作为最终模型。初始质心的选择策略也可以通过init参数更改；默认的*k-means++*选项采用一种更智能（与*random*选项相比）的方式来加速收敛，通过确保初始质心彼此远离。\n\
    \n## 通过肘部法则确定聚类数量\n\nk-means方法的一个缺点是需要指定聚类数量，而对于大型过程数据集，聚类数量是先验未知的。然而，我们可以使用肘部法则来克服这个问题。对于k-means，该方法涉及计算不同聚类数量（$K$）的聚类惯性或SSE。可以预期，当$K$增加时，SSE减少，因为数据点更接近其分配的质心。当增加$K$时，SSE仅出现微小改进的$K$值可以被视为最优值。图8.6显示$K\
    \ = 3$是金属蚀刻数据集的一个好选择。\n\n```python\n# determining number of clusters via elbow\
    \ method\nSSEs = []\nfor n_cluster in range(1, 10):\n    kmeans = KMeans(n_clusters\
    \ = n_cluster, random_state = 100).fit(score_train)\n    SSEs.append(kmeans.inertia_)\n\
    \nplt.figure()\nplt.plot(range(1,10), SSEs, marker='o')\nplt.xlabel('Number of\
    \ clusters')\nplt.ylabel('SSEs')\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_191_0.png)\n\
    \n> 确定聚类或局部模型的数量不应掉以轻心。我们在图8.1中看到，少于最优数量的聚类会导致低软测量精度和高频率的漏报。另一方面，使用过多的聚类会增加估计参数的数量，从而增加收敛时间。过多的聚类也会导致过拟合，导致高频率的误报和低软测量精度。\n\
    \n## 用于量化聚类质量的轮廓分析\n\n对于高维数据，可能并不总是能够将大部分数据变异性投影到2或3个主成分上，因此难以使用2D或3D图判断聚类的好坏或可视化聚类。在这些情况下，可以使用轮廓图来可视化和量化聚类质量。请注意，轮廓分析并非特定于k-means，可以应用于研究任何聚类结果。\n\
    \n数据点的轮廓系数或值范围从-1到1，衡量该数据点与相邻聚类中的数据点相比，与同一聚类中的数据点的距离。值为1表示该数据点远离相邻聚类，接近0的值表示该数据点接近两个聚类之间的边界。负值表示错误的聚类分配。\n\
    \n图8.7显示了图8.5中所示聚类的轮廓图。每个彩色条带是通过堆叠该聚类中所有数据点的轮廓系数形成的，因此条带的厚度表示聚类的大小。整体轮廓分数就是所有数据点轮廓系数的平均值。如预期，平均分数很高，聚类2显示出最高的系数，因为它远离其他两个聚类。\n\
    \n```python\n# average silhouette score\nfrom sklearn.metrics import silhouette_samples,\
    \ silhouette_score\n\nsilhouette_avgValue = silhouette_score(score_train, cluster_label)\n\
    print('Average silhouette score is :', silhouette_avgValue)\n\n>>> Average silhouette\
    \ score is : 0.7444602567351603\n\n# silhouette plot\nfrom matplotlib import cm\n\
    \nplt.figure()\nsilhouette_values = silhouette_samples(score_train, cluster_label)\n\
    y_lower, y_upper = 0, 0\nyticks = []\nfor i in range(n_cluster):\n    cluster_silhouette_vals\
    \ = silhouette_values[cluster_label == i]\n    cluster_silhouette_vals.sort()\n\
    \n    y_upper += len(cluster_silhouette_vals)\n    color = cm.nipy_spectral(i\
    \ / n_cluster)\n    plt.barh(range(y_lower, y_upper),cluster_silhouette_vals,height=1.0,edgecolor='none',color=color)\n\
    ```"

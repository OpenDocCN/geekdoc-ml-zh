    ## Part 4 Deploying ML Solutions Over Web\n\n### Chapter 14 Process Monitoring\
    \ Web Application\n\n- 14.1 Process Monitoring Web App: Introduction\n- 14.2 A\
    \ Simple ‘Hello World’ Web App\n- 14.3 Embedding ML Models into Web Apps\n- 14.4\
    \ Building Front-end User Interface\n\n## Appendix\n\n- Dataset Descriptions\n\
    - Polymer Manufacturing Process Data\n- Pulp & Paper Manufacturing Process Data\n\
    - Low-Density Polyethylene (LDPE) Process Data\n- Tennessee Eastman Process Data\n\
    - Semiconductor Manufacturing Process Data\n- Polymer Pilot Plant Data\n- Debutanizer\
    \ Column Data from a Petroleum Refinery\n- Concrete Compressive Strength Data\n\
    - Wastewater Treatment Plant Data\n- Combined Cycle Power Plant data\n- SISO Heater\
    \ System Data\n- Gas Turbine Data\n\n## Preface\n\nEveryday we hear stories about\
    \ new feats being achieved by machine learning (ML) and artificial intelligence\
    \ (AI) researchers that have the potential to revolutionize our world. Through\
    \ humanoid robots, speech recognition, computer vision, driverless cars, fraud\
    \ detection, personalized recommendations, and automated health diagnosis, machine\
    \ learning has already become an integral part of our daily life. Moreover, away\
    \ from the glitz of these ‘visible’ high-tech products, machine learning has also\
    \ been making silent advances in process industries (chemical industry, biopharma\
    \ industry, steel industry, etc.) where ML-based solutions are being increasingly\
    \ used for predictive equipment maintenance, product quality assurance, process\
    \ monitoring, fault diagnosis, process control, and process optimization. With\
    \ increasing global competition and stricter product quality standards, industrial\
    \ plants are relying upon machine learning tools (such as reinforcement-learning-based\
    \ auto-adaptive process controller) to provide them the winning edge over competitors.\n\
    \nPerhaps you are reading this book because you too have been inspired by the\
    \ capabilities of machine learning and would like to use it to solve problems\
    \ being faced by your organization. However, you might be struggling to find a\
    \ definite guide that can help you decide which specific methodology to chose\
    \ among the myriad of available methodologies. You may have come across a nice\
    \ research article that showcases an interesting process systems application of\
    \ a ML method. However, you might be facing difficulties trying to understand\
    \ the intricate details of the algorithm. We won’t be surprised if you have struggled\
    \ to find a data-science book that caters to the needs of a process systems engineer,\
    \ considers unique characteristics of industrial process systems, and uses industrial-scale\
    \ process systems for illustrations. We, the authors, have been in that phase.\
    \ A process engineer will arguably find it more relevant and useful to learn principal\
    \ component analysis (PCA) by working through a process monitoring application\
    \ (the most popular application area of PCA in process industry) and learning\
    \ how to compute the monitoring metrics. Similar arguments could be made for several\
    \ other popular ML methods. There is a gap in available machine learning resources\
    \ for industrial practitioners and this book attempts to cover this gap.\n\nIn\
    \ one sense, we wrote this book for our younger selves; a book that we wish had\
    \ existed when we started experimenting with machine learning techniques. Drawing\
    \ from our years of experience in developing data-driven industrial solutions,\
    \ this book has been written with the focus on de-cluttering the world of machine\
    \ learning, giving a comprehensive exposition of ML tools that have proven useful\
    \ in process industry, providing step-by-step elucidation of implementation details,\
    \ cautioning against the pitfalls and listing various tips & tricks that we have\
    \ encountered over the years, and using dataset from industrial-scale process\
    \ systems for illustrations. We strongly believe in ‘learning by doing’ and therefore\
    \ we encourage the readers to work through in-chapter illustrations as they follow\
    \ along the text. For reader’s assistance, Jupyter notebooks with complete code\
    \ implementations are available for download. We have chosen Python as the coding\
    \ language for the book as it convenient to use, has large collection of ML libraries,\
    \ and is the de facto standard language for ML. No prior experience with Python\
    \ is assumed. The book has been designed to teach machine learning from scratch\
    \ and upon completion, the reader will feel comfortable at using ML techniques.\n\
    \nMachine learning will continue to play significant role in unleashing the next\
    \ wave of productivity improvements in process industry. We hope that this book\
    \ will inspire its readers to develop novel ML solutions to challenging problems\
    \ at work. We wish all the best to the budding process systems data scientist.\n\
    \n## Who should read this book\n\nThis book provides a comprehensive step-by-step\
    \ exposition of several popular machine learning techniques that have proven useful\
    \ in process industry. Industrially-relevant illustrations have been included\
    \ in a ‘learn-by-doing’ format. Appropriate references to advanced treatment of\
    \ specific topics are provided in each chapter. Therefore, the book will be useful\
    \ to process technologists from industry, undergraduate and graduate students,\
    \ ML researchers, as well as a general data-science enthusiast. If you belong\
    \ to any of the following categories, you will enjoy reading this book.\n\n1)\
    \ Process systems engineers or data scientists seeking to hone their ML skills\n\
    2) Process systems engineers looking for ML solutions to specific problems (such\
    \ as monitoring a high-dimensional multimode process)\n3) Budding process systems\
    \ data scientists taking their first step into the ML world\n4) Budding data scientists\
    \ (with no Python experience) looking to learn Python by working with real industrial\
    \ datasets\n5) Process systems engineers who frequently use commercial data-science\
    \ software (IBM SPSS, Aspen Mtell) and are interested in learning the technical\
    \ details for an improved understanding of the methodologies.\n\n## Pre-requisites\n\
    \nNo prior experience with machine learning or Python is needed. Undergraduate-level\
    \ knowledge of basic linear algebra and calculus is assumed."

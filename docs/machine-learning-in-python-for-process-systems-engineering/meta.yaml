- img_proc: true
  md: '# 5.1 PCA: An Introduction


    Principal component analysis (PCA) is a multivariate technique that transforms
    a high-dimensional set of correlated variables into a low-dimensional set of uncorrelated
    (latent) variables with minimum loss of information. Consider the 3-dimensional
    data in figure 2.1. It is apparent that although the data is three dimensional,
    the data-points mostly lie along a 2-D plane; and even in this plane, the spread
    is much higher along a particular direction. PCA converts the original (x,y,z)
    space into a 2-D principal component (PC) space where the 1st PC (PC1) corresponds
    to the direction of maximum spread/variance in data and the 2nd PC (PC2) corresponds
    to the direction with highest variance among all directions orthogonal to 1st
    PC. Depending upon modeling requirements, even the 2nd PC may be discarded, essentially
    obtaining a 1-D data while losing out some information. Also, as we will see soon,
    it is straightforward to recover original data from data in PC space.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_105_0.png)


    In ML world, it is common to find application of classification and clustering
    techniques in the PC space. In process industry, process modeling (via principal
    component regression (PCR)) and monitoring are common application of PCA¹⁶. In
    PCR, the process outputs are regressed onto the principal component values of
    the input data. By doing so, the problem of ill-conditioning frequently encountered
    in classical multiple linear regression (MLR) due to high input space dimensionality
    and high degree of correlation among input variables is circumvented. PCA is also
    frequently utilized for process visualization. For many applications, two or three
    PCs are adequate for capturing most of the variability in process data and therefore,
    the compressed process data can be visualized with a single plot. Plant operators
    and engineers use this single plot to find past and current patterns in process
    data.


    > ¹⁶ The popularity of latent-variable techniques for process control and monitoring
    arose from the pioneering work by John McGregor at McMaster University.'
  merge: -1
  pgno: 105

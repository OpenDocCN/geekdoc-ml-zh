    \n## 12.3 数学背景\n\n理解增加额外神经元对模型总参数数量的影响总是有益的；可以在模型复杂度增加时采取预防性措施来防止过拟合。在标准RNN单元中，我们看到\
    \ $W_x \\in R^{n \\times m}$，$W_h \\in R^{n \\times n}$ 和 $b \\in R^n$。这导致总参数数量等于\

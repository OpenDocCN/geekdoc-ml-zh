    \ default *k-means++* option adopts a smarter (compared to the *random* option)\
    \ way to speed up convergence by ensuring that the initial centroids are far away\
    \ from each-other.\n\n## Determining the number of clusters via elbow method\n\
    \nOne of the shortcomings in k-means methodology is the need to specify the number\
    \ of clusters which is not known a priori for large process datasets. However,\
    \ we can use the elbow method to overcome this issue. For k-means, the method\
    \ entails computing the cluster inertia or SSE for different number ($K$) of clusters.\
    \ Expectedly, when $K$ increases, SSE decreases as data-points get closer to their\
    \ assigned centroids. The value of $K$ where only minor improvement in SSE occurs\
    \ upon increasing $K$ can be regarded as an optimal value. Figure 8.6 shows than\
    \ $K = 3$ is a good choice for metal etch dataset.\n\n```python\n# determining\
    \ number of clusters via elbow method\nSSEs = []\nfor n_cluster in range(1, 10):\n\
    \    kmeans = KMeans(n_clusters = n_cluster, random_state = 100).fit(score_train)\n\
    \    SSEs.append(kmeans.inertia_)\n\nplt.figure()\nplt.plot(range(1,10), SSEs,\
    \ marker='o')\nplt.xlabel('Number of clusters')\nplt.ylabel('SSEs')\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_191_0.png)\n\

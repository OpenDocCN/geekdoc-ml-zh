    While both L1 and L2 regularizations ensure that model coefficients remain small,
    Lasso actually has pushed several coefficients to zero. This is representative
    of the general behavior of Lasso which is often used for variable selection as
    the coefficients of irrelevant variables get set to zero. The advantage of L2
    is that it is computationally favorable as the penalty term is differentiable
    unlike L1''s penalty term. The choice between L1 and L2 is problem dependent and
    requires trial-and-error.


    L1 and L2 regularizations can be combined into elastic-net regularization. Not
    all forms of regularizations involve putting penalty terms in objective function.
    You will study methods like dropout, batch normalization, early stopping in Chapter
    11, which help to ensure model coefficients remain ''stable'' to avoid overfitting.


    > You will have noticed that we have talked about regularizing only the weight
    coefficients and not the intercepts. This is true in general. Large intercepts
    (or biases in neural networks) will not cause large response changes upon small
    variations in inputs, and therefore, regularizing them is often not needed.


    # Choosing value of α


    The ''α'' term is an important hyperparameter which should be carefully specified
    before model fitting. Very small α will make regularization ineffective potentially
    leading to overfitting. Very high value will push the model coefficients to zero
    causing underfitting. The optimal value is difficult to know before-hand and need
    to found via cross-validation. However, a general recommendation is to keep α
    low rather than high.


    # Hyperparameter optimization via GridSearchCV


    Previously we used validation curves to find the optimal hyperparameters. Sklearn
    provides a GridSearchCV utility function that we can leverage to do this task
    more conveniently. GridSearchCV takes lists of potential hyperparameter values
    and does an exhaustive search to find the optimal combination of hyperparameter
    values. The code below shows the implementation.


    ```

    # separate training and test data

    from sklearn.model_selection import train_test_split

    x_train, x_test, y_train, y_test = train_test_split(x, y, test_size=0.2, random_state=1)

    ```'

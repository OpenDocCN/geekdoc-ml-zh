    # Types of machine learning systems


    Although there is a plethora of ML models available, all of them can be organized
    into three broad categories, namely, supervised learning, unsupervised learning,
    and reinforcement learning. The categorization is based on the nature of model
    output associated with each sample in the training dataset. Note that there is
    another category, semi-supervised learning – this method, however, is used less
    often compared to the other mentioned methods. Figure 1.6 gives a sneak peek into
    some of the ML algorithms and application areas corresponding to supervised and
    unsupervised learnings that we will cover in this book.'

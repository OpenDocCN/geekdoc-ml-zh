    using dynamic partial least squares regression, Journal of Process Control, 2000

    <sup>25</sup> Zhang et al., Nonlinear multivariate quality estimation and prediction
    based on kernel partial least squares, Industrial Engineering & Chemistry Research,
    2008

    <sup>++</sup> Li et al., Recursive PCA for adaptive process monitoring, Journal
    of Process Control, 2000

    <sup>++</sup> S. Joe Qin, Recursive PLS algorithms for adaptive data modeling,
    Computers & Chemical Engineering, 1998

    <sup>**</sup> Wang et al., Process monitoring approach using fast moving window
    PCA'

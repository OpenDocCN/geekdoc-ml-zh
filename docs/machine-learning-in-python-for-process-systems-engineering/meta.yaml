    \    BICs.append(BIC)\n\n    if BIC < lowestBIC:\n        optimal_n_cluster =\
    \ n_cluster\n        lowestBIC = BIC\n\nplt.figure(), plt.plot(range(1,10), BICs,\
    \ marker='o')\nplt.scatter(optimal_n_cluster, lowestBIC, c='red', marker='*',\

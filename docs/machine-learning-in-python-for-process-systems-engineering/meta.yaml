    # Fault diagnosis


    After detection of process faults, the next crucial task is to diagnose the issue
    and identify which specific process variables are showing abnormal behavior. The
    popular mechanism to accomplish this is based on contribution plots. As the name
    suggests, a contribution plot is a plot of the contribution of original process
    variables to the abnormality indexes. The variables with highest contributions
    are flagged as potentially faulty variables.


    For SPE (square prediction error) or $Q$, let''s reconsider eq. 7 as shown below
    where $SPE_j$ denotes the SPE contribution of the $j^{th}$ variable.


    $$SPE = \sum_{j=1}^{m} e_{i,j}^2 = \sum_{j=1}^{m} SPE_j$$


    Therefore, SPE contribution of a variable is simply squared error for that variable.
    If SPE index has violated its control limit, then the variables with large $SPE_j$
    values compared to other variables are considered the potentially faulty variables.
    For $T^2$ contributions, calculations are not as straight-forward. Several expressions
    have been postulated in literature$^{17}$. The commonly used expression below
    was proposed by wise et al$^{18}$.


    $$T^2 \text{ contribution of variable } j = j^{th} \text{ element of } (D^{1/2}x)^2$$

    $$D = P\Lambda^{-1}P^T$$


    Note that these contributions are computed for each data-point. Let''s find which
    variables need to be further investigated at $85^{th}$ sample.



    Figure 13.6 shows how and where DDPG incorporates these innovations into the AC
    framework of Figure 13.5. Don’t worry if this figure looks confusing. We will
    dissect these new concepts one-by-one.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_316_0.png)


    # Replay memory


    In Algorithm 3 we saw that the network parameter update is based on a single transition
    tuple ($\mathbf{s}_t$, $\mathbf{a}_t$, $r_{t+1}$, $\mathbf{s}_{t+1}$). The problem
    with this (apart from less computational efficiency compared to mini-batch updates)
    is that the sampled tuples at successive updates are correlated and therefore
    not completely independent. This has been found to cause convergence issues. Replay
    buffer or replay memory (RM) helps to overcome this issue.


    A replay memory is simply a large cache of transition tuples. At any training
    step, a transition tuple ($\mathbf{s}$, $\mathbf{a}$, $r$, $\mathbf{s}''$) is
    generated according to the agent’s behavior policy and stored in RM. If the RM
    is already full (number of tuples become equal to some prespecified size $K$),
    the oldest sampled tuple is removed. The actor and critic networks are updated
    using a random mini-batch of $M$ ($M < K$) tuples from the RM. Expressions below
    show the mini-batch update mechanism. Let $B = \{(s_i, a_i, r_i, s''_i)\}_{i=1}^K$
    be the mini-batch of transition tuples from RM. Then,


    $$w \leftarrow w + \frac{\alpha_c}{M} \sum_{i=1}^M (\tilde{y}_i - Q_w(s_i, a_i))
    \frac{\partial Q_w(s_i, a_i)}{\partial w}$$


    $$\text{where } \tilde{y}_i = r_i + \gamma Q_w(s''_i, \mu_\theta(s''_i))$$'
  - '[PAGE 317]


    $$\theta \leftarrow \theta + \frac{\alpha_{\theta}}{M} \sum_{i=1}^{M} \frac{\partial
    Q_w(s_i, a)}{\partial a} \bigg|_{a=\mu_{\theta}(s_i)} \frac{\partial \mu_{\theta}(s_i)}{\partial
    \theta}$$


    We had previously seen how mini-batch update is superior to stochastic update
    for ANN training in Chapter 11. Similar observations have been made for RL as
    well.


    # Target networks


    Critic networks are trained by minimizing the error between the predicted Q value
    and TD target. However, as we noted previously, the TD target itself depends on
    the critic network that we are trying to fit. This makes the AC algorithm prone
    to divergence. This is resolved by creating replicas of the actor and critic networks,
    called target networks, whose parameters evolve slowly but track the main networks
    being learnt. Let $Q_{w,target}$ and $\mu_{\theta,target}$ denote the target networks.
    The TD target for the $i^{th}$ transition tuple from RM at any training step is
    given by


    $$\tilde{y}_i = r_i + \gamma Q_{w,target} \left( s''_i, \mu_{\theta,target}(s''_i)
    \right)$$


    After the actor and critic networks have been updated (using Eq. 3), target networks
    are updated as follows


    $$w_{target} \leftarrow \tau w + (1 - \tau)w_{target}$$

    $$\theta_{target} \leftarrow \tau \theta + (1 - \tau)\theta_{target}$$


    Where $\tau$ is a hyperparameter between 0 and 1 (usually kept close to 0). DDPG
    algorithm, therefore, has 4 neural networks that are fitted simultaneously.


    # OU process as exploration noise


    In tabular Q-learning we had used $\epsilon$-greedy behavior policy. Unfortunately,
    $\epsilon$-greedy assumes discrete action space. To enable sufficient exploration
    in DDPG during RL agent training, Lillicrap et at. added noise to the actor''s
    actions


    $$\beta(s_t) = \mu_{\theta}(s_t) + \mathbb{N}$$


    The noise $\mathbb{N}$ was chosen to be given by an Ornstein-Uhlenbeck (OU) process.
    An OU process is a stochastic process (details provided later in the code) which
    provides temporally correlated signals favoring deep exploration.'

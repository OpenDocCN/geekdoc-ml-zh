- img_proc: true
  md: "tape.gradient function is called, Tensorflow computes the gradients of the\
    \ recorded operations w.r.t. the specified variables.\n\n```\n@tf.function(input_signature=[tf.TensorSpec(shape=(None,\
    \ 3), dtype=tf.float32),\n                            tf.TensorSpec(shape=(None,\
    \ 1), dtype=tf.float32),\n                            tf.TensorSpec(shape=(None,\
    \ 1), dtype=tf.float32)])\ndef ddpg_updateStep(s, a, td_targets):\n    \"\"\"\n\
    \    Description: Update the main networks using gradient descent\n\n    Args:\n\
    \        s: A 2D numpy array with 3 columns\n        a: A 2D numpy array with\
    \ 1 column\n        td_targets: A 2D numpy array with 1 column\n    \"\"\"\n\n\
    \    # update critic via step 11 in Algorithm 4\n    # networks, loss_fn (mean\
    \ squared error) and optimizers are defined later in the script\n    with tf.GradientTape()\
    \ as tape:\n        Q_predicted = critic(tf.concat([s, a], 1))\n        critic_loss\
    \ = tf.reduce_mean(loss_fn(td_targets, Q_predicted))\n    critic_gradients = tape.gradient(critic_loss,\
    \ critic.trainable_variables)\n    critic_optimizer.apply_gradients(zip(critic_gradients,\
    \ critic.trainable_variables))\n\n    # update actor\n    with tf.GradientTape()\
    \ as tape:\n        actor_loss = -tf.reduce_mean(critic(tf.concat([s, actor(s)],\
    \ 1)))\n    actor_gradients = tape.gradient(actor_loss, actor.trainable_variables)\n\
    \    actor_optimizer.apply_gradients(zip(actor_gradients, actor.trainable_variables))\n\
    ```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_326_0.png)\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_326_1.png)\n\
    \nOkay, let's train the agent now.\n\n```\n# define replay memory\nfrom collections\
    \ import deque\nreplay_memory = deque(maxlen=100000)\n```"

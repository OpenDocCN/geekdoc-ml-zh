  md: '# # Chapter 7

    ## Support Vector Machines & Kernel-based Learning


    In previous chapters, we saw methods that help us overcome the ‘curse of dimensionality’.
    Wouldn’t it be great to have ML methods that do not ‘mind’ dealing with high-dimensional
    systems? SVM (support vector machine) is one such algorithm which excels in dealing
    with high-dimensional, nonlinear, and small or medium-sized data. SVMs, by design,
    minimize overfitting to provide excellent generalization performance. Another
    major quality of SVMs is that they are extremely flexible and can be employed
    for classification and regression tasks in both supervised and unsupervised settings.
    You may already be thinking, “Wow! SVMs seem to pack a lot of good features.”
    Infact, before ANNs became the craze in ML community, SVMs were the toast of the
    town. Even today, SVM is a must-have tool in every ML practitioner’s toolkit.


    Above, we mentioned only some of the features of SVMs. You will find more as you
    work through this chapter. In terms of use in process industry, SVMs have been
    employed for fault classification, process monitoring, outlier detection, soft
    sensing, etc.


    To understand different aspects of SVMs, we will cover the following topics in
    this chapter


    +   - Fundamentals of SVMs

    - The kernel trick for nonlinear modeling

    - SVDD (support vector data description) for unsupervised classification

    - Fault detection via SVDD for semiconductor manufacturing process

    - Fundamentals of SVR (support vector regression)

    - Soft sensing via SVR in a polymer plant and a petroleum refinery'

  - "[PAGE 101]\n\n# 4.4 Handling Missing Data\n\nMissing data issues arise when values\
    \ of a variable or multiple variable are missing in one or more observations of\
    \ the dataset. The samples with missing data can simply be discarded if their\
    \ number is much smaller than the total number of available samples. However,\
    \ if this is not the case or there are reasons to believe that discarding samples\
    \ will negatively impact model fitting, imputation techniques can be employed\
    \ which attempt to fill-in the missing values of an variable using available data\
    \ from the same variable or other variables.\n\nA simple imputation strategy is\
    \ mean imputation where the missing values of a variable are replaced with the\
    \ mean of all available data for the variable and is illustrated in the code snippet\
    \ below\n\n```\n# Mean imputation\nimport numpy as np\nfrom sklearn.impute import\
    \ SimpleImputer\n\nsample_data = [[1, 2, np.nan], [3, 4, 3], [np.nan, 6, 5], [8,\
    \ 8, 7]]\nmean_imputeModel = SimpleImputer(missing_values=np.nan, strategy='mean')\n\
    \nprint(mean_imputeModel.fit_transform(sample_data))\n\n>>> [[1. 2. 5.]\n    \
    \ [3. 4. 3.]\n     [4. 6. 5.]\n     [8. 8. 7.]]\n```\n\nAnother widely used approach\
    \ is hot-deck imputation, where missing values of a sample are replaced from the\
    \ available values of 'similar' samples. Sklearn provides KNNImputer class which\
    \ imputes missing value with the weighted (or mean) combination from k-nearest\
    \ neighbors in the fitting dataset. The distance metric between 2 samples is computed\
    \ using features that neither samples are missing.\n\n```\n# KNN imputation\n\
    from sklearn.impute import KNNImputer\n\nknn_imputeModel = KNNImputer(n_neighbors=2)\n\
    print(knn_imputeModel.fit_transform(sample_data))\n```"
  - "[PAGE 102]\n\n```\n>>> [[1. 2. 4.]\n [3. 4. 3.]\n [5.5 6. 5.]\n [8. 8. 7.]]\n\
    ```\n\nAlthough not currently available in Sklearn, more advanced techniques like\
    \ regression imputation, likelihood-based imputation also exist. The former method\
    \ imputes the missing values in a variable using a regression model with other\
    \ correlated variables as predictors. The later method uses expectation-maximation\
    \ (EM) algorithm for imputing missing values in a probabilistic framework.\n\n\
    As with variable selection and outlier handling methods, it cannot be said beforehand\
    \ which missing data technique will work best for your problem. A good recourse\

    \n## 总结\n\n在本章中，我们研究了人工神经网络在动态/时序系统中的应用。我们了解了LSTM在从长序列中提取模式方面的卓越能力。我们为过程系统工程中的一些典型应用实现了RNN，即系统辨识、故障分类和预测性故障预测。在完成这些示例后，你将对如何为你的具体问题设置基于RNN的解决方案有了很好的理解。在下一章中，我们将研究强化学习，这是另一种强大的基于人工神经网络的技术。\n\
    \n# 第13章\n## 强化学习\n\n到目前为止，我们学习的机器学习算法都依赖于在模型训练前提供所有与建模相关的输入/输出数据。相比之下，强化学习将机器学习更进一步，它旨在通过与它试图学习的物理系统进行交互，自行收集所需的训练数据。通过试错，强化学习模型学会采取什么行动来完成任何给定的任务。在训练过程中，导致有利结果/奖励的行动会得到强化，经过多次交互后，模型最终学会一个最优的行动计划/策略！听起来很令人印象深刻，对吧？\n\
    \n强化学习模仿了我们人类通过试错和环境交互来学习事物（如骑自行车）的方式。这一概念开启了大量潜在的强化学习应用。你可能已经听说或看到过强化学习模型取得的一些非凡成就，例如计算机玩游戏比最好的人类玩家更好，或者人形机器人学会如何奔跑等。在本章中，我们将重点关注强化学习在过程工业中的应用，特别是过程控制。\n\
    \n强化学习是一个非常广泛且不断发展的领域。有很多强化学习特有的术语和概念。我们将在本章中梳理强化学习的世界，你将学习如何设置和解决一个强化学习问题。具体来说，本章涵盖以下主题\n\
    \n- 强化学习简介以及作为过程控制器的强化学习智能体\n- Q学习、深度强化学习和Actor-Critic架构简介\n- 用于处理过程工业相关问题的DDPG算法简介\n\
    - 使用强化学习智能体进行储罐液位控制\n\n### 13.1 强化学习简介\n\n强化学习是机器学习的一个分支，其中智能体反复与其环境交互，以学习完成任务的最佳方式或最优行动策略。图13.1展示了强化学习的基本设置。如图所示，强化学习智能体接收关于环境当前状态（$s_t$）的信息，并据此（根据智能体的行动策略）决定一个行动（$a_t$）。作为行动的结果，环境转移到一个新状态（$s_{t+1}$）并产生一个标量奖励（$r_{t+1}$），表示所采取行动的好坏。在智能体采取另一个行动之前，学习算法使用信息（$s_t$,\
    \ $a_t$, $r_{t+1}$, $s_{t+1}$）来改进其策略，然后循环继续。最终，获得一个最优策略，该策略将环境状态映射到最优行动，使得直到任务完成所获得的总奖励最大化。一旦训练完成，学习过程可以停止，策略函数可以部署。\n\
    \n图13.1：强化学习设置，描绘了智能体与其环境的交互\n\n一个简单的现实生活类比可能是，在一个新城镇中找到从办公室到家的最优驾驶路线的任务。在这里，你是智能体，环境将包括你的汽车、城市的道路和高速公路网络、交通、天气、你的地理空间位置，基本上是除你之外的一切。要最大化的总奖励可以是到达家所花费时间的负值（驾驶时间越短越好）。在驾驶过程中，根据环境状态，你将决定是否驶出任何高速公路出口或进行任何转弯。假设没有互联网（也没有谷歌地图！），作为新来者，你不知道驶出这些出口或转弯是否能帮助你更快到家，因此你会探索不同的可能路线。经过几次尝试，你将对城镇有一个很好的了解，并最终能够在驾驶过程中的任何时刻，为任何给定的环境状态采取最优行动。强化学习遵循相同的方法论，使用一些系统化（且非常智能）的学习算法来找到最优映射。"

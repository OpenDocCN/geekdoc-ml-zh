    # 12.1 RNN: An Introduction


    Recurrent neural networks (RNNs) are ANNs for dealing with sequential data, where
    the order of occurrence of data holds significance. For example, in a production
    plant, consistently increasing temperature measurements may indicate one kind
    of process fault while consistently decreasing measurements may indicate another
    fault type. There is no efficient mechanism to specify this temporal order of
    data in a FFNN. RNNs accomplish this by processing elements of a sequence recurrently
    and storing a hidden state that summarizes the past information during the processing.
    The basic unit in a RNN is called a RNN cell which simply contains a layer of
    neurons. Figure 12.1 shows the architecture of a RNN consisting of a single cell
    and how it processes a data sequence with ten samples or x readings.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_271_0.png)


    We can see that the ten samples are processed in the same order of their occurrence
    and not at once. An output, y(i), is generated at the ith step and then fed to
    the next step for processing along with x(i+1). By way of this arrangement, y(i+1)
    is a function of x(i+1) and y(i). Since, y(i) itself is a function of x(i) and
    y(i-1), y(i+1) effectively becomes a function of x(i+1), x(i), and y(i-1). Continuing
    the logic further implies that the final sequence output, y(10), is a function
    of all ten inputs of the sequence, that is, x(10), x(9),..., x(1). We will see
    later how this ''recurrent'' mechanism leads to efficient capturing of temporal
    patterns in data.'

    ![](img/ae65e737df4a9f5732c91f7aea579fc8_59_0.png)


    The advantage in the above example was that instead of doing a non-linear fit
    between $y$ and $x$, we ended up doing just a simple linear fit. This is the power
    of feature engineering. It won''t be an exaggeration to say that half of your
    task is done if you can engineer very relevant and informative features. Unfortunately,
    currently no well-defined generic approach exists for effective feature engineering.
    The task is system-specific and require domain knowledge. Nonetheless, let''s
    look at a couple of feature engineering techniques that are commonly employed.


    # Mathematical transformations


    These transformations make use of functions like log, square, square root, product,
    temporal aggregation (using min, max, standard deviation), sin, tanh, etc. to
    create custom features. As seen in the previous illustration, these transformations
    allow usage of simple models, while making the effective relationship between
    the original variables more complex. Since, the selection of proper mathematical
    function is the most crucial and still largely a manual task, automated feature
    engineering (AFE) is currently an active research area in machine learning. Quite
    often, AFE techniques involve generating an exhaustive list of features from commonly
    used mathematical functions and then performing variable selection to select potentially
    useful features. However, universally accepted, generically applicable AFE methods
    don''t exist yet and this makes your domain knowledge-guided feature engineering
    very important!'

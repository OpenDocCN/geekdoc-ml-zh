    # Who should read this book


    This book provides a comprehensive step-by-step exposition of several popular
    machine learning techniques that have proven useful in process industry. Industrially-relevant
    illustrations have been included in a ‘learn-by-doing’ format. Appropriate references
    to advanced treatment of specific topics are provided in each chapter. Therefore,
    the book will be useful to process technologists from industry, undergraduate

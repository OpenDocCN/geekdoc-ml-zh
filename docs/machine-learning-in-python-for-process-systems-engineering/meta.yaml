- md: "# Machine Learning in Python for Process Systems Engineering\n\nAchieving operational\
    \ excellence using process data\n\nAnkur Kumar\nJesus Flores-Cerrillo\n\nDedicated\
    \ to our spouses, family, friends, motherland, and all the data-science enthusiasts\n\
    \n# Machine Learning in Python for Process Systems Engineering\n\n[www.MLforPSE.com](http://www.MLforPSE.com)\n\
    \nCopyright © 2022 Ankur Kumar\n\nAll rights reserved. No part of this book may\
    \ be reproduced or transmitted in any form or in any manner without the prior\
    \ written permission of the authors.\n\nEvery effort has been made in the preparation\
    \ of this book to ensure the accuracy of the information presented and obtain\
    \ permissions for usage of copyrighted materials. However, the authors make no\
    \ warranties, expressed or implied, regarding errors or omissions and assume no\
    \ legal liability or responsibility for loss or damage resulting from the use\
    \ of information contained in this book.\n\nTo request permissions, contact the\
    \ authors at MLforPSE@gmail.com\n\nFirst published: February 2022\n\n# About the\
    \ Authors\n\n**Ankur Kumar** holds a PhD degree (2016) in Process Systems Engineering\
    \ from the University of Texas at Austin and a bachelor’s degree (2012) in Chemical\
    \ Engineering from the Indian Institute of Technology Bombay. He currently works\
    \ at Linde in the Advanced Digital Technologies & Systems Group in Linde’s Center\
    \ of Excellence, where he has developed several in-house machine learning-based\
    \ monitoring and process control solutions for Linde’s hydrogen and air-separation\
    \ plants. Ankur’s tools have won several awards both within and outside Linde.\
    \ Most recently, one of his tools, PlantWatch (a plantwide fault detection and\
    \ diagnosis tool), received the 2021 Industry 4.0 Award by the Confederation of\
    \ Industry of the Czech Republic. Ankur has authored or co-authored more than\
    \ 10 peer-reviewed journal papers (in the areas of data-driven process modeling\
    \ and optimization), is a frequent reviewer for many top-ranked journals, and\
    \ has served as Session Chair at several international conferences. Ankur also\
    \ served as an Associate Editor of the Journal of Process Control from 2019 to\
    \ 2021.\n\n**Jesus Flores-Cerrillo** is currently an Associate Director - R&D\
    \ at Linde and manages the Advanced Digital Technologies & Systems Group in Linde’s\
    \ Center of Excellence. He has over 20 years of experience in the development\
    \ and implementation of monitoring technologies and advanced process control &\
    \ optimization solutions. Jesus holds a PhD degree in Chemical Engineering from\
    \ McMaster University and has authored or co-authored more than 40 peer-reviewed\
    \ journal papers in the areas of multivariate statistics and advanced process\
    \ control among others. His team develops and implements novel plant monitoring,\
    \ machine learning, IIOT solutions to improve the efficiency and reliability of\
    \ Linde’s processes. Jesus’s team received the Artificial Intelligence and Advanced\
    \ Analytics Leadership 2020 award from the National Association of Manufacturers’\
    \ Manufacturing Leadership Council.\n\n# Note to the readers\n\nJupyter notebooks\
    \ and Spyder scripts with complete code implementations are available for download\
    \ at https://github.com/ML-PSE/Machine_Learning_for_PSE. Code updates when necessary,\
    \ will be made and updated on the GitHub repository. Updates to the book’s text\
    \ material will be available free of cost on Leanpub (www.leanpub.com). We would\
    \ greatly appreciate any information about any corrections and/or typos in the\
    \ book.\n\n*A minor pending issue*\n\nIn mathematical expressions, bold-face letters\
    \ refer to vectors and matrices and regular-faced letters refer to scalar variables.\
    \ However, this distinction does not appear correctly in some of the expressions.\
    \ These expressions will be corrected soon, and readers would be notified of the\
    \ updates accordingly. Nonetheless, this minor pending issue would not prevent\
    \ the readers from correctly understanding the material.\n\n# Table of Contents\n\
    \n- Preface\n- Part 1 Introduction and Fundamentals\n    - Chapter 1 Machine Learning\
    \ for Process Systems Engineering 1\n        - 1.1 What are Process Systems\n\
    \            - 1.1.1 Characteristics of process data\n        - 1.2 What is Machine\
    \ Learning\n            - 1.2.1 Machine learning workflow\n            - 1.2.2\
    \ Type of machine learning systems\n        - 1.3 Machine Learning Applications\
    \ in Process Industry\n            - 1.3.1 Decision hierarchy levels in a process\
    \ plant\n            - 1.3.2 Application areas\n        - 1.4 ML Solution Deployment\n\
    \        - 1.5 The Future of Process Data Science\n    - Chapter 2 The Scripting\
    \ Environment 20\n        - 2.1 Introduction to Python\n        - 2.2 Introduction\
    \ to Spyder and Jupyter\n        - 2.3 Python Language: Basics\n        - 2.4\
    \ Scientific Computing Packages: Basics\n            - 2.4.1 Numpy\n         \
    \   - 2.4.2 Pandas\n        - 2.5 Typical ML Script\n    - Chapter 3 Machine Learning\
    \ Model Development: Workflow and Best Practices 39\n        - 3.1 ML Model Development\
    \ Workflow\n        - 3.2 Data Pre-processing: Data Transformation\n         \
    \   - 3.2.1 (Robust) Data centering & scaling\n            - 3.2.2 Feature extraction\n\
    \            - 3.2.3 Feature engineering\n            - 3.2.4 Workflow automation\
    \ via pipelines\n        - 3.3 Model Evaluation\n            - 3.3.1 Regression\
    \ metrics\n            - 3.3.2 Classification metrics\n            - 3.3.3 Holdout\
    \ method / cross-validation\n            - 3.3.4 Residual analysis\n        -\
    \ 3.4 Model Tuning\n            - 3.4.1 Overfitting & underfitting\n         \
    \   - 3.4.2 Train/validation/test split\n            - 3.4.3 K-fold cross-validation\n\
    \            - 3.4.4 Regularization\n            - 3.4.5 Hyperparameter optimization\
    \ via GridSearchCV\n    - Chapter 4 Data Pre-processing: Cleaning Process Data\
    \ 67\n        - 4.1 Signal De-noising\n            - 4.1.1 Moving window average\
    \ filter\n            - 4.1.2 SG filter\n        - 4.2 Variable Selection/Feature\
    \ Selection\n            - 4.2.1 Filter methods\n            - 4.2.2 Wrapper methods\n\
    \            - 4.2.3 Embedded methods\n        - 4.3 Outlier Handling\n      \
    \      - 4.3.1 Univariate methods\n            - 4.3.2 Multivariate methods\n\
    \            - 4.3.3 Data-mining methods\n        - 4.4 Handling Missing Data\n\
    - Part 2 Classical Machine Learning Methods\n    - Chapter 5 Dimension Reduction\
    \ and Latent Variable Methods (Part 1)\n        - 5.1 PCA: An Introduction\n \
    \           - 5.1.1 Mathematical background\n            - 5.1.2 Dimensionality\
    \ reduction for polymer manufacturing process\n        - 5.2 Process Monitoring\
    \ via PCA for Polymer Manufacturing Process\n            - 5.2.1 Process monitoring/fault\
    \ detection indices\n            - 5.2.2 Fault detection\n            - 5.2.3\
    \ Fault diagnosis\n        - 5.3 Variants of Classical PCA\n            - 5.3.1\
    \ Dynamic PCA\n            - 5.3.2 Multiway PCA\n            - 5.3.3 Kernel PCA\n\
    \        - 5.4 PLS: An Introduction\n            - 5.4.1 Mathematical background\n\
    \        - 5.5 Soft Sensing via PLS for Pulp & Paper Manufacturing Process\n \
    \       - 5.6 Process monitoring via PLS for Polyethylene Manufacturing Process\n\
    \            - 5.6.1 Fault detection indices\n            - 5.6.2 Fault detection\n\
    \        - 5.7 Variants of Classical PLS\n    - Chapter 6 Dimension Reduction\
    \ and Latent Variable Methods (Part 2)\n        - 6.1 ICA: An Introduction\n \
    \           - 6.1.1 Mathematical background\n            - 6.1.2 Complex chemical\
    \ process: Tennessee Eastman Process\n            - 6.1.3 Deciding number of ICs\n\
    \        - 6.2 Process Monitoring via ICA for Tennessee Eastman Process\n    \
    \        - 6.2.1 Fault detection indices\n            - 6.2.2 Fault detection\n\
    \        - 6.3 FDA: An Introduction\n            - 6.3.1 Mathematical background\n\
    \            - 6.3.2 Dimensionality reduction for Tennessee Eastman Process\n\
    \        - 6.4 Fault Classification via FDA for Tennessee Eastman Process\n  \
    \  - Chapter 7 Support Vector Machines & Kernel-based Learning\n        - 7.1\
    \ SVMs: An Introduction\n            - 7.1.1 Mathematical background\n       \
    \     - 7.1.2 Hard margin vs soft margin classification\n        - 7.2 The Kernel\
    \ Trick for Nonlinear Data\n            - 7.2.1 Mathematical background\n    \
    \    - 7.3 SVDD: An Introduction"
  mdcn: "# 面向过程系统工程的Python机器学习\n\n利用过程数据实现卓越运营\n\nAnkur Kumar\nJesus Flores-Cerrillo\n\
    \n谨以此书献给我们的配偶、家人、朋友、祖国以及所有数据科学爱好者\n\n# 面向过程系统工程的Python机器学习\n\n[www.MLforPSE.com](http://www.MLforPSE.com)\n\
    \n版权所有 © 2022 Ankur Kumar\n\n保留所有权利。未经作者事先书面许可，不得以任何形式或任何方式复制或传播本书的任何部分。\n\n在编写本书时，我们已尽一切努力确保所呈现信息的准确性，并获得了使用受版权保护材料的许可。然而，对于错误或遗漏，作者不作任何明示或暗示的保证，并且对于因使用本书所含信息而导致的任何损失或损害，不承担任何法律责任或责任。\n\
    \n如需申请许可，请通过 MLforPSE@gmail.com 联系作者。\n\n首次出版：2022年2月\n\n# 关于作者\n\n**Ankur Kumar**\
    \ 拥有德克萨斯大学奥斯汀分校过程系统工程博士学位（2016年）和印度理工学院孟买分校化学工程学士学位（2012年）。他目前在林德集团卓越中心的先进数字技术与系统组工作，为林德的氢气和空气分离工厂开发了多个基于机器学习的内部监控和过程控制解决方案。Ankur的工具在林德内外赢得了多项奖项。最近，他的其中一个工具PlantWatch（一个全厂故障检测与诊断工具）获得了捷克共和国工业联合会颁发的2021年工业4.0奖。Ankur已撰写或合著了10多篇同行评审期刊论文（涉及数据驱动过程建模和优化领域），是许多顶级期刊的常任审稿人，并曾在多个国际会议上担任分会场主席。Ankur还在2019年至2021年期间担任《过程控制杂志》的副编辑。\n\
    \n**Jesus Flores-Cerrillo** 目前是林德集团的研发副主任，负责管理林德卓越中心的先进数字技术与系统组。他在监控技术以及先进过程控制与优化解决方案的开发和实施方面拥有超过20年的经验。Jesus拥有麦克马斯特大学化学工程博士学位，并在多元统计和先进过程控制等领域撰写或合著了40多篇同行评审期刊论文。他的团队开发和实施了新颖的工厂监控、机器学习和工业物联网解决方案，以提高林德流程的效率和可靠性。Jesus的团队获得了美国制造商协会制造领导力委员会颁发的2020年人工智能与高级分析领导力奖。\n\
    \n# 致读者\n\n完整的代码实现可在 https://github.com/ML-PSE/Machine_Learning_for_PSE 下载获取Jupyter笔记本和Spyder脚本。代码更新将在必要时进行，并在GitHub仓库上更新。本书文本材料的更新将在Leanpub\
    \ (www.leanpub.com) 上免费提供。我们将非常感谢任何关于书中任何更正和/或拼写错误的信息。\n\n*一个待解决的小问题*\n\n在数学表达式中，粗体字母表示向量和矩阵，常规字体字母表示标量变量。然而，这种区分在某些表达式中并未正确显示。这些表达式将很快得到更正，届时将通知读者相关更新。尽管如此，这个待解决的小问题不会妨碍读者正确理解材料。\n\
    \n# 目录\n\n- 前言\n- 第一部分 引言与基础\n    - 第1章 面向过程系统工程的机器学习 1\n        - 1.1 什么是过程系统\n\
    \            - 1.1.1 过程数据的特征\n        - 1.2 什么是机器学习\n            - 1.2.1 机器学习工作流程\n\
    \            - 1.2.2 机器学习系统的类型\n        - 1.3 机器学习在过程工业中的应用\n            - 1.3.1\
    \ 过程工厂中的决策层级\n            - 1.3.2 应用领域\n        - 1.4 机器学习解决方案部署\n        - 1.5\
    \ 过程数据科学的未来\n    - 第2章 脚本环境 20\n        - 2.1 Python简介\n        - 2.2 Spyder和Jupyter简介\n\
    \        - 2.3 Python语言：基础\n        - 2.4 科学计算包：基础\n            - 2.4.1 Numpy\n\
    \            - 2.4.2 Pandas\n        - 2.5 典型的机器学习脚本\n    - 第3章 机器学习模型开发：工作流程与最佳实践\
    \ 39\n        - 3.1 机器学习模型开发工作流程\n        - 3.2 数据预处理：数据转换\n            - 3.2.1\
    \ （鲁棒）数据中心化与缩放\n            - 3.2.2 特征提取\n            - 3.2.3 特征工程\n         \
    \   - 3.2.4 通过管道实现工作流程自动化\n        - 3.3 模型评估\n            - 3.3.1 回归指标\n    \
    \        - 3.3.2 分类指标\n            - 3.3.3 留出法/交叉验证\n            - 3.3.4 残差分析\n\
    \        - 3.4 模型调优\n            - 3.4.1 过拟合与欠拟合\n            - 3.4.2 训练/验证/测试集划分\n\
    \            - 3.4.3 K折交叉验证\n            - 3.4.4 正则化\n            - 3.4.5 通过GridSearchCV进行超参数优化\n\
    \    - 第4章 数据预处理：清洗过程数据 67\n        - 4.1 信号去噪\n            - 4.1.1 移动窗口平均滤波器\n\
    \            - 4.1.2 SG滤波器\n        - 4.2 变量选择/特征选择\n            - 4.2.1 过滤方法\n\
    \            - 4.2.2 包装方法\n            - 4.2.3 嵌入方法\n        - 4.3 异常值处理\n   \
    \         - 4.3.1 单变量方法\n            - 4.3.2 多变量方法\n            - 4.3.3 数据挖掘方法\n\
    \        - 4.4 缺失数据处理\n- 第二部分 经典机器学习方法\n    - 第5章 降维与潜变量方法（第一部分）\n        - 5.1\
    \ PCA：简介\n            - 5.1.1 数学背景\n            - 5.1.2 聚合物制造过程的降维\n        -\
    \ 5.2 聚合物制造过程的PCA过程监控\n            - 5.2.1 过程监控/故障检测指标\n            - 5.2.2 故障检测\n\
    \            - 5.2.3 故障诊断\n        - 5.3 经典PCA的变体\n            - 5.3.1 动态PCA\n\
    \            - 5.3.2 多向PCA\n            - 5.3.3 核PCA\n        - 5.4 PLS：简介\n \
    \           - 5.4.1 数学背景\n        - 5.5 制浆造纸制造过程的PLS软测量\n        - 5.6 聚乙烯制造过程的PLS过程监控\n\
    \            - 5.6.1 故障检测指标\n            - 5.6.2 故障检测\n        - 5.7 经典PLS的变体\n\
    \    - 第6章 降维与潜变量方法（第二部分）\n        - 6.1 ICA：简介\n            - 6.1.1 数学背景\n  \
    \          - 6.1.2 复杂化工过程：田纳西-伊士曼过程\n            - 6.1.3 确定IC数量\n        - 6.2\
    \ 田纳西-伊士曼过程的ICA过程监控\n            - 6.2.1 故障检测指标\n            - 6.2.2 故障检测\n  \
    \      - 6.3 FDA：简介\n            - 6.3.1 数学背景\n            - 6.3.2 田纳西-伊士曼过程的降维\n\
    \        - 6.4 田纳西-伊士曼过程的FDA故障分类\n    - 第7章 支持向量机与基于核的学习\n        - 7.1 SVM：简介\n\
    \            - 7.1.1 数学背景\n            - 7.1.2 硬间隔与软间隔分类\n        - 7.2 非线性数据的核技巧\n\
    \            - 7.2.1 数学背景\n        - 7.3 SVDD：简介"

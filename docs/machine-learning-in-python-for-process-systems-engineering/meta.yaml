    \nrotation_matrix = [[0.60, -0.70], [-0.5, 0.7]]\nX_transformed = np.dot(X, rotation_matrix)\
    \ # elongated blobs\n\nplt.figure()\nplt.scatter(X_transformed[:, 0], X_transformed[:,\
    \ 1])\n\n# fit k-means model\nn_cluster = 3\nkmeans = KMeans(n_clusters=n_cluster,\
    \ random_state=100).fit(X_transformed)\ncluster_label = kmeans.predict(X_transformed)\n\
    ```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_194_0.png)\n\n## 8.3 基于密度的聚类：DBSCAN\n\
    \nDBSCAN是一种基于密度的算法，可以轻松处理不规则形状的数据分布，如图8.10所示（不要被那些断开的深棕色数据点吓到！我们稍后会回到这些点）。DBSCAN通过将形成高密度区域的数据点分组在一起工作。具体来说，每个数据点被分类为以下三类之一：\n\
    \n- 如果在指定距离（$\\varepsilon$）内有超过指定数量（*minPts*）的数据点，则为**核心**点\n- 如果在其$\\varepsilon$邻域内少于*minPts*个数据点，但该数据点本身位于另一个核心点的$\\\
    varepsilon$邻域内，则为**边界**点\n- 如果未被分类为核心点或边界点，则为**噪声**点\n\n在分类为核心点、边界点和噪声点之后，簇由相连的核心点和边界点集合定义。噪声数据点不被分配到任何簇。我们在图8.10中看到的断开的深棕色数据点就是噪声点。处理任意形状数据的能力、对噪声和异常值的鲁棒性使得DBSCAN非常适合聚类过程数据。\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_195_0.png)\n\n图8.10：DBSCAN成功处理椭圆形数据分布\n\
    \nDBSCAN算法的一个主要缺点是需要为两个超参数*minPts*和$\\varepsilon$指定合理的值，以确保最佳聚类。如果设置不当，我们可能最终得到一个巨大的簇或成千上万个小簇。让我们在金属蚀刻数据上研究这个方面。图8.11显示了超参数设置正确（*minPts*\
    \ = 3，$\\varepsilon* = 5）和设置不正确（*minPts* = 5，$\\varepsilon* = 3）时的聚类结果；不正确的设置导致了几个噪声数据点和两个额外的簇。试错法或领域特定知识可以帮助决定超参数值。\n\
    \n```python\n# fit DBSCAN model to metal-etch data\nfrom sklearn.cluster import\
    \ DBSCAN\n\ndb = DBSCAN(eps=5, min_samples=3).fit(score_train)\ncluster_label\
    \ = db.labels_\n\nplt.figure()\nplt.scatter(score_train[:, 0], score_train[:,\
    \ 1], c=cluster_label, s=20, cmap='viridis')\nplt.xlabel('PC1 scores')\nplt.ylabel('PC2\
    \ scores')\n\nprint('Cluster labels: ', np.unique(cluster_label))\n```\n\n>>>\
    \ Cluster labels: [-1 0 1 2 3 4] # noise points are given the label of -1\n\n\
    ![](img/ae65e737df4a9f5732c91f7aea579fc8_196_0.png)\n\n图8.11：金属蚀刻数据通过DBSCAN聚类，使用(a)不正确的超参数和(b)正确的超参数\n\
    \n## 优缺点\n\n除了已经提到的优点外，DBSCAN的一个主要优点是不需要事先指定簇的数量。算法会自动确定合适的簇数。k-means和DBSCAN的一个共同缺点是数据点是“硬聚类”的（每个数据点被精确分配到一个簇）。例如，考虑图8.10中被归类为噪声点的数据点。尽管这些点远离簇中心，但它们可能仍然对应于代表低可能性实例的正常操作条件。丢弃这些噪声点可能导致关键信息的丢失，并可能导致监控阈值设置不当。此外，在某些情况下，如果一个数据点与不同簇的距离相等，硬聚类可能并不明显。软聚类算法可以用来解决这些问题，因为这些算法提供了数据点与不同簇的某种关联度量。我们将在下一节研究一种流行的算法——高斯混合模型。\n\
    \n## 8.4 概率聚类：高斯混合模型\n\n在研究PCA和PLS方法时，我们对潜在变量的高斯分布做了假设，以确定控制限。然而，正如在金属蚀刻数据中看到的，对于具有多种操作模式的过程，这个假设不成立。尽管如此，通过局部高斯分布来表征每个单独操作模式/簇的数据可能仍然是合适的。这是高斯混合模型背后的基本概念，如图8.12所示，它对于非超球形数据分布非常有效。\n\
    \n```python\n# fit GMM model to ellipsoidal data\nfrom sklearn.mixture import\
    \ GaussianMixture\n\ngmm = GaussianMixture(n_components=3, random_state=100)\n\
    cluster_label = gmm.fit_predict(X_transformed)\n\nplt.figure()\nplt.scatter(X_transformed[:,\
    \ 0], X_transformed[:, 1], c=cluster_label, s=20, cmap='viridis')\n\ncluster_centers\
    \ = gmm.means_ # cluster centers\ncluster_plot_labels = ['Cluster ' + str(i+1)\
    \ for i in range(gmm.n_components)]\nfor i in range(gmm.n_components):\n    plt.scatter(cluster_centers[i,\
    \ 0], cluster_centers[i, 1], c='red', s=20, marker='*', alpha=0.5)\n    plt.annotate(cluster_plot_labels[i],\
    \ (cluster_centers[i, 0], cluster_centers[i, 1]))\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_197_0.png)\n\
    \nGMM的另一个主要优点是，我们可以计算一个数据点属于任何簇的（后验）概率。这种簇隶属度量由predict_proba方法提供。通过将数据点分配给概率最高的簇来执行硬聚类。让我们计算一个位于簇3和簇2之间（在图8.12中圈出）的数据点的概率。\n\
    \n```python\n# membership probabilities\nprobs = gmm.predict_proba(X_transformed[1069,\
    \ np.newaxis]) # requires 2D array\nprint('Posterior probabilities of clusters\
    \ 1, 2, 3 for the data-point: ', probs[-1, :])\n```\n\n>>> Posterior probabilities\
    \ of clusters 1, 2, 3 for the data-point: [3.36e-54 1.09e-15 1]\n\nGMM认为该数据点以100%的概率属于簇3！考虑到该点似乎与簇3和簇2等距（以欧几里得距离衡量），这可能看起来令人惊讶。我们将在下一小节研究这些概率是如何获得的。\n\
    \n### 数学背景\n\n设$x \\in \\mathbb{R}^m$是从具有$K$个操作模式的多模态过程中获得的m维样本。在GMM中，整体概率密度被表述为局部高斯密度的组合。设$C_i$表示第$i^{th}$个局部高斯簇，其参数为$\\\
    theta_i = \\{\\mu_i, \\Sigma_i\\}$（均值向量和协方差矩阵），密度为\n\n$$g(x|\\theta_i) = \\frac{1}{(2\\\
    pi)^{m/2} |\\Sigma_i|^{1/2}} exp\\left[-\\frac{1}{2}(x - \\mu_i)^T \\Sigma_i^{-1}\
    \ (x - \\mu_i)\\right]$$ eq. 2\n\n任何空间位置的总体密度由下式给出\n\n$$p(x|\\theta) = \\sum_{i=1}^K\
    \ \\omega_i g(x|\\theta_i)$$ eq. 3\n\n其中，$\\omega_i$表示新样本来自第$i^{th}$个高斯分量的先验概率，$\\\
    theta = \\{\\theta_1, ..., \\theta_k\\}$。GMM模型是通过使用训练样本$X \\in \\mathbb{R}^{N\
    \ \\times m}$估计所有簇的参数$\\theta_i, \\omega_i$来构建的。参数通过优化训练数据集的对数似然来估计，如下所示\n\n$$\\\
    sum_{j=1}^N log \\left(\\sum_{i=1}^K \\omega_i g(x_j|\\theta_i)\\right)$$ eq.\
    \ 4\n\n为了优化似然，通常采用期望最大化算法。假设给出了参数的初始估计，EM算法涉及在两个步骤之间迭代：\n\n- E步（$s^{th}$次迭代）：（重新）计算样本对局部簇的隶属关系\n\
    \n$$P^{(s)}(C_i|x_j) = \\frac{\\omega_i^{(s)} g(x_j | \\mu_i^{(s)}, \\Sigma_i^{(s)})}{\\\
    sum_{k=1}^K \\omega_k^{(s)} g(x_j | \\mu_k^{(s)}, \\Sigma_k^{(s)})}$$ eq. 5"

    \ metric_grid[:i,:], axis=0)[0] for i in range(100)] # cdf = cumulative density\
    \ function\n    metric_CL = metric_grid[np.argmax(np.array(metric_cdf_values)\
    \ > percentile/100),0]\n\n    return metric_CL\n```\n\nWe can now utilize this\
    \ function to compute the 99% control limits for our ICA monitoring metrics. We\

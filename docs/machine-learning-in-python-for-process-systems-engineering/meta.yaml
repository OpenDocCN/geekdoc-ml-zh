    At the base level, in Figure 1.11, resides the basic regulatory control layer
    which primarily comprises of control valves; these valves are used to modulate
    the flow of process streams and indirectly the pressures and temperatures as per
    process requirements. These requirements are in turn determined by the multivariable
    control layer which usually consists of MPC and RTO (real-time optimization) modules.
    This layer determines the base layer requirements using multivariable relationships
    between plant variables to ensure optimal performance of the plant. This layer
    is also responsible for ensuring that plant operations remain safe by ensuring
    safety-critical variables remain within stipulated bounds. The process diagnostics
    layer, if present, ensures reliability of the process through timely fault detection
    and diagnosis. This layer may also perform the task of controller performance
    assessment.


    The production scheduling layer has models and methods to determine resource allocation
    and short-term production schedules considering external influences such as electricity
    prices or raw material price variations. Time-based or predictive equipment maintenance
    decisions may also be made in this layer. Results from this layer are communicated
    to the multivariable control layer. The top-most layer, planning and logistics,
    make enterprise-wide decisions. An enterprise operating multiple facilities use
    this layer to determine site-wise production targets based on the enterprise’s
    strategic goals.


    # Application areas


    After familiarization with the process operation decision hierarchy, we are now
    well-equipped to see the broad application areas of ML in a process plant. We
    have already seen some of the application areas in Figure 1.6. In this section
    we will use a furnace (Figure 1.12) as an example system to investigate these
    in more details.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_27_0.png)'

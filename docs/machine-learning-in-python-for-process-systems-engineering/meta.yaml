    give the desired optimal policy! In state $s_1$, RL agent will close the value
    because of higher expected return ($4 > 20$). In state $s_2$, agent will again
    close the value. With further iterations, the $Q^*$ values will get closer to
    more accurate estimates, but the optimal policy will remain the same.


    The above illustration should have made the Q-learning algorithm clear to you.
    It is simple to implement yet is quite powerful. A direct industrial application
    of Q-learning can be seen in the work of Syafiie et al. for automatic control
    of pH neutralization processes$^{68}$.'
  - '[PAGE 310]


    # RL Taxonomy


    Q-learning, although a breakthrough RL algorithm, is just one of the many RL algorithms
    currently out there. Because many of them borrow ideas from each-other, it is
    difficult to list and bucket all of them comprehensively into some reasonable
    categories. Nonetheless, the figure below presents a non-comprehensive picture
    of the current RL algorithm landscape.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_310_0.png)


    Figure 13.4 focusses on model-free algorithms as these are more popular due to
    their ease of implementation. Another broad categorization shown is in terms of
    whether an agent tries to learn an optimal policy directly or indirectly through
    estimation of $Q^*$ first. Extremely powerful algorithms have recently emerged
    by combining certain features of policy optimization and Q-learning algorithms.
    Among these DDPG has been used in several promising studies for RL-based process
    control and therefore is covered later in the chapter.


    # 13.4 Deep RL & Actor-Critic Framework


    While tabular Q-learning is an elegant method, it is unfortunately not suitable
    for MDPs with high-dimensional continuous state and/or action spaces. Consider
    the fluid level control problem with fluid level as its state and valve adjustments
    as action. Here, fluid level and valve opening can attain any value from 0% to
    100%. For tabular Q-learning, we may discretize these variables crudely into 100
    intervals each. This already leads to a 100 X 100 sized Q-table. With finer discretization
    and more states/actions, the Q-table can become very large and unmanageable. Unfortunately,
    most process control problems would face these issues.'
- md: '## Deep Q-learning


    One solution to continuous space problems is to use a function that approximates
    the Q-table and returns the Q-value for any state-action pair. When a deep neural
    network is used as the function (as shown below), the methodology is called deep
    Q-learning and the neural network is called deep Q-network (DQN).


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_311_0.png)


    Like tabular Q-learning, the parameters, **w**, of Q-network are updated iteratively
    such that the output $Q_w(s_t, a_t)$ gets closer to its target value. But what''s
    the target value when the optimal $Q^*(s_t, a_t)$ is unknown? The Bellman equation
    is used to provide what is called a TD target or bootstrap$^{69}$ target ($\tilde{y}_t$).
    Let ($s_t$, $a_t$, $r_{t+1}$, $s_{t+1}$) be a transition tuple obtained via environment
    interaction at time $t$, then


    $$\tilde{y}_t = r_{t+1} + \gamma \max_{a''} Q_w(s_{t+1}, a'')$$


    The above TD target is used to derive a network parameter update mechanism as
    shown below


    $$L_t(\mathbf{w}) = \frac{1}{2} \left( \tilde{y}_t - Q_w(s_t, a_t) \right)^2$$

    $$\frac{\partial L_t}{\partial \mathbf{w}} \approx - \left( \tilde{y}_t - Q_w(s_t,
    a_t) \right) \frac{\partial Q_w(s_t, a_t)}{\partial \mathbf{w}}$$

    $$\mathbf{w}_t \leftarrow \mathbf{w}_t - \alpha \frac{\partial L_t}{\partial \mathbf{w}}$$


    The shown loss function is also called mean squared Bellman error (MSBE) which
    quantifies the error in satisfying the Bellman equation. This update scheme should
    be familiar to you because we had seen this in Chapter 11 for ANNs. The pseudo-code
    below summarizes the basic form<sup>70</sup> of DQN algorithm


    ## Algorithm 2: Deep Q-learning


    ```

    1. Initialize network parameters, $\mathbf{w}$, with random values

    2. for episode = 1 to $N_{\text{episode}}$ do:

    3.     initialize state $\mathbf{s}$

    4.     for each step (t) of episode until s is terminal do:

    5.         choose action ($\mathbf{a}_t$) for $\mathbf{s}_t$ as per some behavior
    policy $\beta(.|\mathbf{s}_t)$

    6.         take action $\mathbf{a}_t$ and observe $r_{t+1}$ and next state $\mathbf{s}_{t+1}$

    7.         $\widetilde{y}_t = r_{t+1} + \gamma \max_{a''} Q_{\mathbf{w}}(\mathbf{s}_{t+1},
    \mathbf{a}'')$

    8.         $\mathbf{w} \leftarrow \mathbf{w} + \alpha(\widetilde{y}_t - Q_{\mathbf{w}}(\mathbf{s}_t,
    \mathbf{a}_t)) \frac{\partial Q_{\mathbf{w}}(\mathbf{s}_t, \mathbf{a}_t)}{\partial
    \mathbf{w}}$

    9.     end for

    10. end for

    ```


    While DQNs have given remarkable results<sup>71</sup>, their convergence is not
    guaranteed<sup>72</sup>. Moreover, DQNs are not well suited for process control
    problems which have continuous action spaces as the computation of $\max_{a''}
    Q_{\mathbf{w}}(\mathbf{s}_{t+1}, \mathbf{a}'')$ in each step for continuous variable
    $\mathbf{a}''$ is quite inconvenient, if not impractical. Note that the behavior
    policy may include solving an optimization for choosing $\mathbf{a}_t$ as well.


    > Although we will see a detailed RL-based process control case study using DDPG
    algorithm in the next section, it is still useful to conceptually understand DQNs
    and policy gradient methods. These are precursors to more modern techniques and
    understanding them will throw crucial insights into DDPG''s algorithm.


    ## Policy gradient methods


    Different from Q-learning, there are another class of algorithms that attempt
    to learn a function that can directly serve as an optimal policy (either deterministic
    or stochastic) function as shown below with neural networks-based functions.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_313_0.png)


    The algorithm behind learning of these policy functions is simple: during training,
    all the rewards obtained during an episode are collected and then the model parameters
    ($\theta$) are updated so as to increase returns in subsequent episodes. When
    the update mechanism makes use of the gradient of model''s performance w.r.t $\theta$,
    the algorithm is called policy-gradient algorithm. The issue with these algorithms
    is that model training is very slow due to slow convergence. This is partly due
    to the fact that update occurs at end of episodes (unlike in Q-learning where
    updates occur at each step) due to the requirement of cumulative reward or return.


    ## Actor-Critic framework


    The strength and weakness analysis of DQN and policy-gradient algorithms show
    that they are kind of complementary to each-other in the sense that weakness of
    one is strength of the other. Policy-gradient algorithms don''t have to solve
    any optimization problem at every iteration, while DQNs don''t wait for the end
    of an episode for an update. RL researchers saw this complementarity and proposed
    an actor-critic (AC) framework (Figure 13.5) that merges the two algorithms.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_313_1.png)


    Figure 13.5: RL agent training within AC framework. Note that actor and critic
    can take any functional form and not necessarily be neural networks.


    During any training step, the critic uses the actor to help evaluate $\max_{a''}
    Q_w(s_{t+1}, a'')$ approximately as $Q_w(s_{t+1}, \mu_\theta(s_{t+1}))$ and therefore
    avoids the difficult optimization; the actor uses the critic to help evaluate
    whether its predicted action $\mu_\theta(s_t)$ is good or bad via $Q_w(s_t, \mu_\theta(s_t))$
    and therefore updates itself immediately instead of waiting till episode''s end
    to know if its actions are leading to higher return or not. This is how actor
    and critic help each other. Let''s look at the update mechanism in more detail.


    ## AC update mechanism


    Let the actor and critic be neural networks with model parameters, $\omega$ and
    $\theta$, respectively. The critic update is same as that in deep Q-learning except
    the highlighted part below


    ```

    $\tilde{y}_t = r_{t+1} + \gamma Q_w(s_{t+1}, \mu_\theta(s_{t+1}))$

    $w \leftarrow w + \alpha_c (\tilde{y}_t - Q_w(s_t, a_t)) \frac{\partial Q_w(s_t,
    a_t)}{\partial w}$

    ```


    For actor network, we will use the rationale that when an action is predicted
    $a = \mu_\theta(s_t)$, the objective is to maximize the return


    ```

    $J(\theta) = E[R_t]$  $\longleftarrow$ Actor''s objective

    $J(\theta) \approx Q_w(s_t, a)|_{a=\mu_\theta(s_t)}$  $\longleftarrow$ Critic
    provides the performance objective

    $\Rightarrow \frac{\partial J}{\partial \theta} = \frac{\partial Q_w(s_t, a)}{\partial
    a}|_{a=\mu_\theta(s_t)} \frac{\partial \mu_\theta(s_t)}{\partial \theta}$  $\longleftarrow$
    Chain rule from calculus

    $\theta \leftarrow \theta + \alpha_\theta \frac{\partial J}{\partial \theta}$

    ```


    Note that since the actor''s objective is to maximize the return, it performs
    gradient ascent, unlike the critic which does a gradient descent to minimize its
    TD error. Pseudo code in Algorithm 3 summarizes the AC algorithm.


    ## Algorithm 3: Deterministic off-policy AC learning


    ```

    1. Initialize network parameters, $w$ and $\theta$, with random values

    2. for episode = 1 to $N_{episode}$ do:

    3.     initialize state $s$

    4.     for each step (t) of episode until s is terminal do:

    5.         choose action ($a_t$) for $s_t$ as per some behavior policy $\beta(.|s_t)$

    6.         take action $a_t$ and observe $r_{t+1}$ and next state $s_{t+1}$

    7.         $\tilde{y}_t = r_{t+1} + \gamma Q_w(s_{t+1}, \mu_\theta(s_{t+1}))$

    8.         $w \leftarrow w + \alpha_c(\tilde{y}_t - Q_w(s_t, a_t)) \frac{\partial
    Q_w(s_t, a_t)}{\partial w}$

    9.         $\theta \leftarrow \theta + \alpha_\theta \frac{\partial Q_w(s_t, a)}{\partial
    a} |_{a=\mu_\theta(s_t)} \frac{\partial \mu_\theta(s_t)}{\partial \theta}$

    10.    end for

    ```


    With the fundamentals of AC algorithm (and the underlying mathematics that powers
    it) in place, we are ready to learn about the DDPG algorithm which was among the
    first RL algorithm suitable for complex industrial process control problems.


    ## 13.5 Deep Deterministic Policy Gradient (DDPG)


    In 2016, Lillicrap et al.$^{73}$ published an actor-critic, model-free algorithm,
    DDPG, that could successfully handle MDPs with high dimensional continuous state
    and action spaces. Although it was based on the previously shown AC architecture
    (with both critic and actor as neural networks), it brought together several innovative
    ideas from other works (Silver et al.$^{74}$, Mnih et al.$^{75}$, etc.) which
    greatly improved the robustness and stability of RL agent training. These innovations
    include:


    - Replay buffer or replay memory

    - Target networks

    - Ornstein-Uhlenbeck process-based behavior policy

    - Batch normalization'
  mdcn: '## 深度 Q 学习


    解决连续空间问题的一种方法是使用一个函数来近似 Q 表，并返回任意状态-动作对的 Q 值。当使用深度神经网络作为该函数（如下图所示）时，该方法被称为深度 Q
    学习，而该神经网络则被称为深度 Q 网络（DQN）。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_311_0.png)


    与表格型 Q 学习类似，Q 网络的参数 **w** 通过迭代更新，使得输出 $Q_w(s_t, a_t)$ 逐渐接近其目标值。但是，当最优 $Q^*(s_t,
    a_t)$ 未知时，目标值是什么呢？贝尔曼方程被用来提供所谓的 TD 目标或自举$^{69}$目标（$\tilde{y}_t$）。令 ($s_t$, $a_t$,
    $r_{t+1}$, $s_{t+1}$) 为在时间 $t$ 通过环境交互获得的转移元组，则


    $$\tilde{y}_t = r_{t+1} + \gamma \max_{a''} Q_w(s_{t+1}, a'')$$


    上述 TD 目标用于推导如下所示的网络参数更新机制


    $$L_t(\mathbf{w}) = \frac{1}{2} \left( \tilde{y}_t - Q_w(s_t, a_t) \right)^2$$

    $$\frac{\partial L_t}{\partial \mathbf{w}} \approx - \left( \tilde{y}_t - Q_w(s_t,
    a_t) \right) \frac{\partial Q_w(s_t, a_t)}{\partial \mathbf{w}}$$

    $$\mathbf{w}_t \leftarrow \mathbf{w}_t - \alpha \frac{\partial L_t}{\partial \mathbf{w}}$$


    所示的损失函数也称为均方贝尔曼误差（MSBE），它量化了满足贝尔曼方程的误差。这个更新方案你应该很熟悉，因为我们在第 11 章关于人工神经网络（ANN）的内容中已经见过。下面的伪代码总结了
    DQN 算法的基本形式<sup>70</sup>


    ## 算法 2：深度 Q 学习


    ```

    1. 用随机值初始化网络参数 $\mathbf{w}$

    2. for episode = 1 to $N_{\text{episode}}$ do:

    3.     初始化状态 $\mathbf{s}$

    4.     for each step (t) of episode until s is terminal do:

    5.         根据某个行为策略 $\beta(.|\mathbf{s}_t)$ 为 $\mathbf{s}_t$ 选择动作 ($\mathbf{a}_t$)

    6.         执行动作 $\mathbf{a}_t$ 并观察 $r_{t+1}$ 和下一个状态 $\mathbf{s}_{t+1}$

    7.         $\widetilde{y}_t = r_{t+1} + \gamma \max_{a''} Q_{\mathbf{w}}(\mathbf{s}_{t+1},
    \mathbf{a}'')$

    8.         $\mathbf{w} \leftarrow \mathbf{w} + \alpha(\widetilde{y}_t - Q_{\mathbf{w}}(\mathbf{s}_t,
    \mathbf{a}_t)) \frac{\partial Q_{\mathbf{w}}(\mathbf{s}_t, \mathbf{a}_t)}{\partial
    \mathbf{w}}$

    9.     end for

    10. end for

    ```


    尽管 DQN 取得了显著的成果<sup>71</sup>，但其收敛性并不能得到保证<sup>72</sup>。此外，DQN 不太适合具有连续动作空间的过程控制问题，因为在每一步计算连续变量
    $\mathbf{a}''$ 的 $\max_{a''} Q_{\mathbf{w}}(\mathbf{s}_{t+1}, \mathbf{a}'')$ 非常不便，甚至不切实际。请注意，行为策略也可能包括为选择
    $\mathbf{a}_t$ 而求解一个优化问题。


    > 尽管我们将在下一节看到一个使用 DDPG 算法的详细基于强化学习的过程控制案例研究，但从概念上理解 DQN 和策略梯度方法仍然很有用。这些是更现代技术的前身，理解它们将为
    DDPG 算法提供关键见解。


    ## 策略梯度方法


    与 Q 学习不同，还有另一类算法试图学习一个可以直接作为最优策略（确定性或随机性）函数的函数，如下图所示，使用基于神经网络的函数。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_313_0.png)


    学习这些策略函数背后的算法很简单：在训练期间，收集一个回合中获得的所有奖励，然后更新模型参数（$\theta$）以增加后续回合的回报。当更新机制利用模型性能相对于
    $\theta$ 的梯度时，该算法被称为策略梯度算法。这些算法的问题在于，由于收敛缓慢，模型训练非常慢。这部分是由于需要累积奖励或回报，更新发生在回合结束时（不同于
    Q 学习中每一步都进行更新）。


    ## Actor-Critic 框架


    对 DQN 和策略梯度算法的优缺点分析表明，它们在某种程度上是互补的，即一方的弱点是另一方的优势。策略梯度算法不必在每次迭代时解决任何优化问题，而 DQN
    不必等到回合结束才进行更新。强化学习研究人员看到了这种互补性，并提出了一个 Actor-Critic（AC）框架（图 13.5），将这两种算法融合在一起。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_313_1.png)


    图 13.5：AC 框架内的强化学习智能体训练。请注意，Actor 和 Critic 可以采用任何形式的函数，不一定是神经网络。


    在任何训练步骤中，Critic 使用 Actor 来帮助近似评估 $\max_{a''} Q_w(s_{t+1}, a'')$ 为 $Q_w(s_{t+1},
    \mu_\theta(s_{t+1}))$，从而避免了困难的优化；Actor 使用 Critic 来帮助评估其预测动作 $\mu_\theta(s_t)$
    是好是坏，通过 $Q_w(s_t, \mu_\theta(s_t))$，从而立即更新自身，而不是等到回合结束才知道其动作是否导致更高的回报。这就是 Actor
    和 Critic 如何互相帮助的。让我们更详细地看看更新机制。


    ## AC 更新机制


    令 Actor 和 Critic 分别为具有模型参数 $\omega$ 和 $\theta$ 的神经网络。Critic 的更新与深度 Q 学习中的相同，除了下面突出显示的部分


    ```

    $\tilde{y}_t = r_{t+1} + \gamma Q_w(s_{t+1}, \mu_\theta(s_{t+1}))$

    $w \leftarrow w + \alpha_c (\tilde{y}_t - Q_w(s_t, a_t)) \frac{\partial Q_w(s_t,
    a_t)}{\partial w}$

    ```


    对于 Actor 网络，我们将使用以下原理：当预测动作为 $a = \mu_\theta(s_t)$ 时，目标是最大化回报


    ```

    $J(\theta) = E[R_t]$  $\longleftarrow$ Actor 的目标

    $J(\theta) \approx Q_w(s_t, a)|_{a=\mu_\theta(s_t)}$  $\longleftarrow$ Critic
    提供性能目标

    $\Rightarrow \frac{\partial J}{\partial \theta} = \frac{\partial Q_w(s_t, a)}{\partial
    a}|_{a=\mu_\theta(s_t)} \frac{\partial \mu_\theta(s_t)}{\partial \theta}$  $\longleftarrow$
    微积分中的链式法则

    $\theta \leftarrow \theta + \alpha_\theta \frac{\partial J}{\partial \theta}$

    ```


    请注意，由于 Actor 的目标是最大化回报，它执行梯度上升，而 Critic 则执行梯度下降以最小化其 TD 误差。算法 3 中的伪代码总结了 AC 算法。


    ## 算法 3：确定性离策略 AC 学习


    ```

    1. 用随机值初始化网络参数 $w$ 和 $\theta$

    2. for episode = 1 to $N_{episode}$ do:

    3.     初始化状态 $s$

    4.     for each step (t) of episode until s is terminal do:

    5.         根据某个行为策略 $\beta(.|s_t)$ 为 $s_t$ 选择动作 ($a_t$)

    6.         执行动作 $a_t$ 并观察 $r_{t+1}$ 和下一个状态 $s_{t+1}$

    7.         $\tilde{y}_t = r_{t+1} + \gamma Q_w(s_{t+1}, \mu_\theta(s_{t+1}))$

    8.         $w \leftarrow w + \alpha_c(\tilde{y}_t - Q_w(s_t, a_t)) \frac{\partial
    Q_w(s_t, a_t)}{\partial w}$

    9.         $\theta \leftarrow \theta + \alpha_\theta \frac{\partial Q_w(s_t, a)}{\partial
    a} |_{a=\mu_\theta(s_t)} \frac{\partial \mu_\theta(s_t)}{\partial \theta}$

    10.    end for

    ```


    有了 AC 算法（及其背后的数学原理）的基础，我们准备学习 DDPG 算法，这是首批适用于复杂工业过程控制问题的强化学习算法之一。


    ## 13.5 深度确定性策略梯度（DDPG）


    2016 年，Lillicrap 等人$^{73}$发表了一种 Actor-Critic、无模型算法 DDPG，它能够成功处理具有高维连续状态和动作空间的马尔可夫决策过程（MDP）。尽管它基于先前展示的
    AC 架构（Critic 和 Actor 都是神经网络），但它汇集了其他工作（Silver 等人$^{74}$、Mnih 等人$^{75}$等）的几个创新思想，极大地提高了强化学习智能体训练的鲁棒性和稳定性。这些创新包括：


    - 经验回放缓冲区或回放记忆

    - 目标网络

    - 基于 Ornstein-Uhlenbeck 过程的行为策略

    - 批量归一化'

    # 12.3 Mathematical Background


    It is always nice to have a good understanding of the impact of adding additional
    neurons on total number of model parameters; pre-emptive steps can be taken to
    prevent over-fitting as model complexity increases. In vanilla RNN cell, we saw
    that $W_x \in R^{n \times m}$, $W_h \in R^{n \times n}$ and, $b \in R^n$. This
    leads to total number of parameters equal to $mn + n^2 + n$. In an LSTM cell,
    each of the 4 neural layers have their own set of these parameters. Therefore
    an LSTM cell has $4(mn + n^2 + n)$ model parameters. In the previous heater example,
    we have $m = 2$ and $n = 25$; therefore we ended up with $4(50 + 625 + 25) = 2800$
    model parameters in the LSTM layer.


    Let us now take a sneak peak into the inner workings of a LSTM cell. An LSTM cell
    may seem intimidating, however, they are actually simple to understand. Let us
    look at each of the neural layer and the gates, and understand the specific roles
    they play. The core component of the LSTM cell is the cell state ($c_t \in R^n$)
    that almost cuts through the cell untouched, except for a couple of element-wise
    operations which modify the individual elements/components of $c_t$. These modificatons
    determine which components are useful or no longer useful for further processing
    of the sequence. To understand these modifications, consider the first of the
    4 neural layers.'
  merge: -1
  pgno: 280
- img_proc: true
  md: '![](img/ae65e737df4a9f5732c91f7aea579fc8_281_0.png)


    Here, the input ($x_t$) and the hidden state from previous step ($h_{t-1}$) are
    processed to generate vector $f$ ($\in R^n$) whose values lie between 0 and 1.
    If the $i^{th}$ component of $f$ is 0, it implies that the $i^{th}$ component
    of $c_{t-1}$ gets erased/forgotten after the element-wise multiplication (and
    hence, the name ‘forget gate’). The second and third neural layers generate n-dimensional
    vectors $i$ and $g$, respectively. The component values of $i$ ($\in [0, 1]$)
    determine how much the components of $g$ ($\in [-1, 1]$) are passed through the
    input gate and get added to the cell state.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_281_1.png)


    These are all the modification that occur to the cell state before it is passed
    on to the next LSTM cell. However, there is one more major task that occurs inside
    LSTM cell. The hidden state, $h_t \in R^n$, is generated from the cell state,
    which acts as the cell output at any sequence step. The fourth neural layer participates
    in this task as shown below.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_281_2.png)'
  merge: -1
  pgno: 281
- img_proc: true
  md: 'The vector output, $o$ ($\in R^n$), from the fourth neural layer determines
    which parts (and how much) of the cell state is output as the hidden state at
    this time step. The cell state is passed through a tanh function before the output
    gate to push its values to be between -1 and 1.


    We hope that the above description gave you a good conceptual overview of how
    memories are created and passed along the RNN chain during sequence processing
    to capture long-term patterns in any sequence. We will now continue to look at
    a few more interesting application of LSTMs.


    # 12.4 Stacked/Deep RNNs


    In FFNNs, we created deeper networks by adding more hidden layers between the
    input and output layers. Similarly, in RNNs, deep networks can be built by stacking
    RNN cells on top of each other, as shown in Figure 12.9. While both the cell state
    and hidden state are passed along the chain (horizontally), only the hidden state
    are passed from one layer to the next (vertically). The hidden states of the cells
    in the last layer become the network outputs.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_282_0.png)


    Figure 12.9: Representation of a deep RNN in rolled and unrolled format. The hidden
    state ($h$) is passed from one layer to the next.


    Like we did for shallow RNN, we can ignore all outputs except that from the last
    step to obtain a sequence-to-vector network in deep RNNs as well. We will see
    one such application for fault classification for a large-scale system in the
    next section.'

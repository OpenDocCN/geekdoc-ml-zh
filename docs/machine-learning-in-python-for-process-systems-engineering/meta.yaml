  md: '# 14.1 Process Monitoring Web App: Introduction


    Figure 14.1 shows the user interface that we will build in this chapter to display
    the results in real-time from a process monitoring ML model. The user interface
    is to be accessed via a web browser and provides two crucial information to the
    plant operators. First, the fault detection component communicates to the operators
    the state of the process and alerts them if any process abnormality is detected.
    Second, the fault diagnosis component identifies the faulty variables responsible
    for process abnormality. The monitoring model will be built using PCA and the
    methodology introduced in Chapter 5 will be employed for FDD. The process system
    is the same as that in Chapter 5, i.e., the polymer processing plant with 33 variables.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_333_0.png)


    A web application primarily has 2 main parts: front-end and back-end. Front-end
    (or client-side) is the part that end-users see and interact with directly through
    web browsers. The back-end works behind the scenes to deliver information to the
    browsers. When a user enters your website''s URL in browser, a request is sent
    to the back-end which parses this request, processes it, and sends back a response
    which is displayed on the front-end. Illustration below shows the data transmission
    scheme that we will employ'

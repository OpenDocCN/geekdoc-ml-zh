    toggleDisp('contri_img')\"> 显示/隐藏贡献图 </button> <br> <br> <br>\n...\n</body>\n\
    ```\n\n当按钮被点击时，Javascript 函数被执行，它切换贡献图图像的显示属性。还剩下最后一块拼图。目前，最新的监控结果只有在用户刷新/重新加载网页时才会显示。这显然是不可取的。我们希望界面能够自动刷新，以定期显示最新结果。这可以通过在\

    ```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_59_0.png)\n\nThe advantage in\
    \ the above example was that instead of doing a non-linear fit between $y$ and\
    \ $x$, we ended up doing just a simple linear fit. This is the power of feature\
    \ engineering. It won't be an exaggeration to say that half of your task is done\
    \ if you can engineer very relevant and informative features. Unfortunately, currently\
    \ no well-defined generic approach exists for effective feature engineering. The\
    \ task is system-specific and require domain knowledge. Nonetheless, let's look\
    \ at a couple of feature engineering techniques that are commonly employed.\n\n\
    ### Mathematical transformations\n\nThese transformations make use of functions\
    \ like log, square, square root, product, temporal aggregation (using min, max,\
    \ standard deviation), sin, tanh, etc. to create custom features. As seen in the\
    \ previous illustration, these transformations allow usage of simple models, while\
    \ making the effective relationship between the original variables more complex.\
    \ Since, the selection of proper mathematical function is the most crucial and\
    \ still largely a manual task, automated feature engineering (AFE) is currently\
    \ an active research area in machine learning. Quite often, AFE techniques involve\
    \ generating an exhaustive list of features from commonly used mathematical functions\
    \ and then performing variable selection to select potentially useful features.\
    \ However, universally accepted, generically applicable AFE methods don't exist\
    \ yet and this makes your domain knowledge-guided feature engineering very important!\n\
    \n### One-hot encoding\n\nMost ML modeling algorithms require numerical data.\
    \ But sometimes you may find yourself working with categorical data: for example,\
    \ one of the model input variable may have entries like ‘plant type A’, ‘plant\
    \ type B’, ‘plant type C’, etc. To handle such situations, you can convert the\
    \ categorical data into numerical values. A naive approach would be to simply\
    \ replace ‘type A’ with 0, ‘type B’ with 1, ‘type C’ with 2, and so on. However,\
    \ this approach is erroneous unless there is a natural order among the plant type\
    \ categories (maybe plant types A/B/C represent small/medium/large categories\
    \ of plants). ML models may end up giving more importance to plant type C relative\
    \ to types A (& B) due to type C’s higher designated value of 2. The preferred\
    \ approach is to use one-hot encoding, which does the following transformation\n\
    \n```\n# import class, fit, and transform\nimport numpy as np\nfrom sklearn.preprocessing\
    \ import OneHotEncoder\n\nx = np.array([['type A'],\n              ['type C'],\n\
    \              ['type B'],\n              ['type C']])\n\nohe = OneHotEncoder(sparse=False)\
    \ # sparse=False returns array\nX_encoded = ohe.fit_transform(x) # x in numerical\
    \ form\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_60_0.png)\n\nAs you can\
    \ infer, a column has been generated for each unique plant type category (automatically\
    \ identified by OneHotEncoder in the above code) and a binary value of 0/1 is\
    \ assigned depending on occurrence of that category in a sample. For example,\
    \ the 3rd sample is of ‘type B’ and therefore the 3rd entry in the 2nd column\
    \ is assigned a value of 1.\n\n### Workflow automation via pipelines\n\nIn the\
    \ previous example on linear modeling with quadratic features, we had to call\
    \ fit and transform (or predict) methods multiple times for model training. These\
    \ calls would be repeated for test dataset. For other models, you may have many\
    \ more data transformers, such that it becomes slightly inconvenient to keep track\
    \ of all transformations. To streamline this process, Sklearn provides a nice\
    \ utility class called Pipeline, which allows us to chain together the transformers\
    \ and estimators (predictive models) sequentially such that we need to call the\
    \ fit method only once as shown in the code below for our quadratic model example.\n\
    \n```\n# create pipeline for quadratic fit via linear model\n# import relevant\
    \ classes\nfrom sklearn.pipeline import Pipeline\nfrom sklearn.preprocessing import\
    \ PolynomialFeatures\nfrom sklearn.preprocessing import StandardScaler\nfrom sklearn.linear_model\
    \ import LinearRegression\n\n# add transformers and estimators sequentially as\
    \ list of tuples\n# the names ‘poly’, ‘scaler’, ‘model’ can be used to access\
    \ the individual elements of pipeline later\npipe = Pipeline([('poly', PolynomialFeatures(degree=2,\
    \ include_bias=False)),\n                ('scaler', StandardScaler()),\n     \
    \           ('model', LinearRegression())])\n\n# fit pipeline and predict\npipe.fit(x,\
    \ y)\ny_predicted = pipe.predict(x)\n```\n\nThe above code gives the same results\
    \ as our previous code without pipeline and is more concise (and potentially easy\
    \ to manage). Figure 3.4 shows the sequence of steps that got executed behind-the-scenes\
    \ when we called the fit and predict methods of the pipeline. Really convenient,\
    \ isn’t it? Note that a pipeline does not have to include an estimator as its\
    \ last element – you can only have transformers and call pipeline.transform()\
    \ to transform your data through all the included transformers.\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_61_0.png)\n\
    \nThis completes our quick look into data transformation techniques. The takeaway\
    \ message is that before dumping all the raw data for model training, you should\
    \ always give some thought on what transformation you can apply to the raw data\
    \ that can help the ML algorithm provide a good model. Carefully designed transformation\
    \ can alleviate the need for large number of"

    \ columns=cols_to_scale) # 标量转换返回一个numpy数组\ntrain_df_scaled =\ntrain_df[['EngineID','cycle','engineRUL','binaryLabel']].join(scaled_train_df_with_cols_to_scale)\n\
    train_df_scaled = train_df_scaled.reindex(columns = all_cols) # 与之前相同的列顺序\n\n\
    # 测试数据集：重复上述步骤\nall_cols = test_df.columns\ntest_df_with_cols_to_scale = test_df[cols_to_scale]\n\
    scaled_test_df_with_cols_to_scale = pd.DataFrame(scaler.transform(test_df_with_cols_to_scale),\n\
    columns=cols_to_scale)\ntest_df_scaled =\ntest_df[['EngineID','cycle','engineRUL','binaryLabel']].join(scaled_test_df_with_cols_to_scale)\n\
    test_df_scaled = test_df_scaled.reindex(columns = all_cols) # 与之前相同的列顺序\n```\n\
    \n接下来，我们将创建序列样本。对于每台发动机，任何连续的50个周期块构成一个序列；序列的输出标签取决于序列结束时发动机的RUL是否大于30。为了实现这一点，我们将定义一个实用函数，如下所示\n\
    \n```\nnSequenceSteps = 50 # 序列中的周期数\nX_train_sequence = []\ny_train_sequence\
    \ = []\n\n# 定义实用函数\ndef generate_LSTM_samples(engine_df, nSequenceSteps):\n  \
    \  \"\"\"\n    此函数为LSTM输入生成LSTM样本列表（每个是大小为(nSequenceSteps, 24)的numpy数组）\n    以及LSTM的输出标签列表\n\
    \    \"\"\"\n    engine_X_train_sequence = []\n    engine_y_train_sequence = []\n\
    \    engine_data = engine_df.values # 转换为numpy\n\n    for sample in range(nSequenceSteps,\
    \ engine_data.shape[0]):\n        engine_X_train_sequence.append(engine_data[sample-nSequenceSteps:sample,:-1])\n\
    \        engine_y_train_sequence.append(engine_data[sample,-1])\n\n    return\
    \ engine_X_train_sequence, engine_y_train_sequence\n```\n\n```\n# 生成序列样本\nfor\
    \ engineID in train_df_scaled['EngineID'].unique():\n    engine_df = train_df_scaled[train_df_scaled['EngineID']\
    \ == engineID]\n    engine_df = engine_df[['OPsetting1', 'OPsetting2', 'OPsetting3',\
    \ 's1', 's2', 's3', 's4', 's5', 's6', 's7', 's8', 's9', 's10', 's11', 's12', 's13',\
    \ 's14', 's15', 's16', 's17', 's18', 's19', 's20', 's21', 'binaryLabel']]\n  \
    \  engine_X_train_sequence, engine_y_train_sequence = generate_LSTM_samples(engine_df,\
    \ nSequenceSteps)\n\n    X_train_sequence = X_train_sequence + engine_X_train_sequence\
    \ # 将样本添加到公共列表\n    y_train_sequence = y_train_sequence + engine_y_train_sequence\n\
    \nX_train_sequence, y_train_sequence = np.array(X_train_sequence), np.array(y_train_sequence)\n\
    ```\n\n我们现在准备好构建和编译我们的RNN。拓扑结构与之前的故障分类示例类似，只是这里我们使用一个具有sigmoid激活函数的单神经元输出层。此外，为了正则化，我们使用了dropout技术。\n\
    \n```\n# 导入ANN包\nfrom tensorflow.keras import Sequential\nfrom tensorflow.keras.layers\

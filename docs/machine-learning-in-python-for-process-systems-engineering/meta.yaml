    # plot tree

    plt.figure(figsize=(20,8))

    tree.plot_tree(model, feature_names=[''x''], filled=True, rounded=True)

    ```


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_211_0.png)


    While DTs appear to be very flexible and useful modeling mechanism, they are seldom
    used as a standalone model. In Figure 9.2, we saw that DTs can easily overfit
    and give non-smooth or piece-wise constant approximations. Another disadvantage
    with DTs is instability, i.e., small variations in training dataset can result
    in a very different tree. However, there is a reason why we invested time in learning
    DTs. A single tree may not be useful, but when you combine multiple trees, you
    get amazing results. We will learn how this is made possible in the next section.'
  - '[PAGE 212]


    # 9.2 Random Forests: An Introduction


    Random forest (RF) is a supervised nonlinear regression and classification modeling
    technique that is made up of several decision trees. These DTs are fit independently
    to their training datasets and RF''s predictions are made by averaging the predictions
    of the trees. Figure 9.3 illustrates this scheme. Combining outputs from trees
    results in low variance or more robust model. The trick lies in how these constituent
    trees are generated. The trees are generated in such a way that their prediction
    errors are uncorrelated, resulting in RF being less prone to overfitting (we will
    concretize this concept mathematically soon).


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_212_0.png)


    In random forest, the trees are grown to full extent, and therefore, hyperparameter
    selection for the trees is not a concern. This makes RF''s training and execution
    simple and quick. Infact RFs have very small number of tunable hyperparameters.
    RFs also lend themselves useful for computation of variable importances. All these
    qualities have led to the popularity of random forests.


    # Mathematical background


    For RF training different trees need to be generated that are as ''distinct from
    each-other'' as possible but at the same time provide good descriptions of the
    training dataset. This variety among the trees are achieved via the following
    two means:'
  - '[PAGE 213]


    1) **Using different training datasets for each tree:** If each tree is trained
    on the same dataset, they will end up being identical, make the same kind of errors,
    and therefore combining them will offer little benefit. Since we only have a single
    training dataset to train the RF, bootstrapping is employed. If original dataset
    has $N$ samples, bootstrapping allows creation of multiple datasets, each with
    $N_b$ ($\le N$) samples, such that each new dataset is also a good representative
    of the underlying process that generated the original dataset. Each bootstrap
    dataset is generated by randomly selecting $N_b$ samples with replacement from
    the original dataset. In RF, $N_b = N$ and the bootstrapping scheme is illustrated
    below for $N=10$.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_213_0.png)


    2) **Using random subsets of input variables to find the optimal split:** A very
    non-intuitive, somewhat surprising, but incredibly effective aspect of RF training
    is that not all the input variables are considered for determining the optimal
    split function at any node of any tree in the forest. Instead, a random subset
    of variables is chosen and then the node impurity is minimized with these chosen
    variables. This random selection is preformed at every node. If input variable
    $x \in R^m$, then the number of random split variables ($M$) is recommended to
    be the floored squared root of $m$.


    The above two tricks during training result in trees being minimally correlated
    to each-other. Figure below summarizes the RF model fitting procedure. For illustration,
    it is assumed that $x \in R^9$ and $M=3$.'
  - '[PAGE 214]


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_214_0.png)


    Figure 9.5: Illustration of RF training mechanism


    You can see that there are only two main hyperparameters to decide: number of
    trees and the size of variable subset. Another advantage with RF is that the constituent
    trees can be trained in parallel.


    # Simple Sklearn implementation


    Let''s fit a RF model to the quadratic dataset from Figure 9.2. Figure 9.6 shows
    the fit with 20 trees in the forest. It is apparent that RF provides much smoother
    predictions compared to those from a DT model as we saw before. Predictions from
    two different constituent trees of the forest are also shown. We can see that
    RF smoothes out the wiggles in constituent tree predictions and makes the combined
    model more stable.


    ```

    # fit RF model and predict

    from sklearn.ensemble import RandomForestRegressor

    model = RandomForestRegressor(n_estimators=20).fit(x, y)

    y_pred = model.predict(x)


    # get predictions from constituent trees and plot

    tree_list = model.estimators_ # list of DT models in the RF

    y_pred_tree1 = tree_list[5].predict(x)

    y_pred_tree2 = tree_list[15].predict(x)

    ```'

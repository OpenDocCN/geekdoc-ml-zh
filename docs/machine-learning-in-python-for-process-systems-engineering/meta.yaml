    # Bayesian Information Criterion (BIC) for model selection


    If you want to utilize all your training data for model fitting or validation
    subset cannot be set aside for model selection (e.g., when using gaussian mixture
    models), BIC technique can be used which provides an optimal trade-off between
    model complexity (or number of model parameters) and model accuracy. We have seen
    that model accuracy on training data can be increased by adding more model parameters,
    but this can also lead to overfitting. BIC resolves this conundrum by minimizing
    a metric that includes a penalty term for the number of model parameters.


    Mathematically, $BIC = n_p ln(n) - 2ln(\hat{L})$, where

    $n_p$ equals number of estimated parameters

    $n$ equals number of data-points or observations

    $\hat{L}$ equals the optimal value of likelihood function (model accuracy)


    We can see that a model with high accuracy/likelihood and fewer parameters will
    result in low BIC value, and hence, optimal model corresponds to the minimum BIC
    value. BIC owes its popularity for its effectiveness and low computational cost:
    It has been shown theoretically that for sufficiently large training data, if
    the correct model is included among the set of candidate models, then BIC is guaranteed
    to select it as the best model. We will see an application in Chapter 8.


    Another popular model selection metric is AIC (Akaike information criterion).
    The penalty term is smaller in AIC. Consequently, AIC tends to select more complex
    models compared to those selected by BIC. Do remember that more complex models
    might overfit while simpler models might underfit. Therefore, selection between
    AIC and BIC methods is problem dependent.


    Therefore, to keep model parameters ‘simple’, modeling algorithms are tweaked
    to decrease the likelihood of overfitting. This modulation is called regularization
    and is a widely used approach to tackle overfitting. You should always employ
    some form of regularization in your model.


    # Common mechanisms of regularization


    In one of the forms of regularized model, the objective function (which is minimized
    during fitting) includes an additional term that is proportional to summation
    of square of model coefficients ($\theta$) as shown below'
  - "[PAGE 78]\n\n$$J_{regularized}(\\theta) = MSE(\\theta) + \\alpha \\sum_{i} \\\
    theta_i^2$$\n\nThe additional term penalizes the algorithm for choosing high coefficient\
    \ values. Therefore, during model fitting, the algorithm will be forced to minimize\
    \ fitting error while keeping coefficients small. This version of regularization\
    \ is called L2 or ridge regularization. The '$\\alpha$' term is a hyperparameter\
    \ which modulates the magnitude of the penalty term.\n\nIn another form of regularization,\
    \ the objective function is modified as follows\n\n$$J_{regularized}(\\theta)\
    \ = MSE(\\theta) + \\alpha \\sum_{i} |\\theta_i|$$\n\nHere, the penalty term is\
    \ simply proportional to the summation of absolute value of the coefficients.\
    \ This is called L1 or lasso regularization. Let's see how these mechanisms help\
    \ us with the overfitting problem with our 10th degree polynomial fitting. L1\
    \ / L2 can be implemented by just switching the linear model in the pipeline with\
    \ the regularized linear models as shown below\n\n# Ridge regression\n\n# Lasso\
    \ regression\n\n```\nfrom sklearn.linear_model import Ridge\n\npipe_L2 = Pipeline([('poly',\
    \ PolynomialFeatures(degree=10,include_bias=False)),\n                    ('scaler',\
    \ StandardScaler()),\n                    ('model', Ridge(alpha=0.1))])\n```\n\
    \n```\nfrom sklearn.linear_model import Lasso\n\npipe_L1 = Pipeline([('poly',\
    \ PolynomialFeatures(degree=10,include_bias=False)),\n                    ('scaler',\
    \ StandardScaler()),\n                    ('model', Lasso(alpha=0.1))])\n```\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_78_0.png)\n\nFigure 3.11 confirms that\
    \ regularization works!! To see what is happening under the hood, let's check\
    \ the model coefficients of the regularized models\n\n```\n# get model coefficients\n\
    print(pipe_L2['model'].coef_)\n\n>>> [ 0.27326  3.49270 -0.35861  0.59074 -1.20522\
    \  1.90652 -1.80640  0.86690  0.87244 -3.20685]\n```"
  - '[PAGE 79]


    ```

    print(pipe_L1[''model''].coef_)


    >>> [-0.438109181 -0.09273215 1.679048 -0. 0. -0. 0. 0. -0.]

    ```


    While both L1 and L2 regularizations ensure that model coefficients remain small,
    Lasso actually has pushed several coefficients to zero. This is representative
    of the general behavior of Lasso which is often used for variable selection as
    the coefficients of irrelevant variables get set to zero. The advantage of L2
    is that it is computationally favorable as the penalty term is differentiable
    unlike L1''s penalty term. The choice between L1 and L2 is problem dependent and
    requires trial-and-error.


    L1 and L2 regularizations can be combined into elastic-net regularization. Not
    all forms of regularizations involve putting penalty terms in objective function.
    You will study methods like dropout, batch normalization, early stopping in Chapter
    11, which help to ensure model coefficients remain ''stable'' to avoid overfitting.


    > You will have noticed that we have talked about regularizing only the weight
    coefficients and not the intercepts. This is true in general. Large intercepts
    (or biases in neural networks) will not cause large response changes upon small
    variations in inputs, and therefore, regularizing them is often not needed.


    # Choosing value of α


    The ''α'' term is an important hyperparameter which should be carefully specified
    before model fitting. Very small α will make regularization ineffective potentially
    leading to overfitting. Very high value will push the model coefficients to zero
    causing underfitting. The optimal value is difficult to know before-hand and need
    to found via cross-validation. However, a general recommendation is to keep α
    low rather than high.


    # Hyperparameter optimization via GridSearchCV


    Previously we used validation curves to find the optimal hyperparameters. Sklearn
    provides a GridSearchCV utility function that we can leverage to do this task
    more conveniently. GridSearchCV takes lists of potential hyperparameter values
    and does an exhaustive search to find the optimal combination of hyperparameter
    values. The code below shows the implementation.


    ```

    # separate training and test data

    from sklearn.model_selection import train_test_split

    x_train, x_test, y_train, y_test = train_test_split(x, y, test_size=0.2, random_state=1)

    ```'

    fluctuations. Therefore, during training the agent learns the best control policy
    automatically by just interacting with its environment.


    ## 1.3 Machine Learning Applications in Process Industry


    Product quality control, safe work environment, optimal operations, and sustainable
    operations are the primary objectives in any industrial plant. Today, ML-based
    solutions are being utilized for all these purposes. Surrogate models are developed
    for online prediction of key quality variables and optimizing plant productivity,
    process monitoring and fault diagnosis models are developed for real-time tracking
    of process operating conditions, data mining is used for alarm management, data
    clustering is used for operation mode identification, and the list goes on.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_25_0.png)


    Several success stories on machine learning application in process industry are
    publicly available. Shell¹ used recurrent neural networks (RNNs) for early prediction
    of valve failures, Saudi Aramco used ML tools for alarm analytics and predictive
    maintenance of turbines², a polymer manufacturing company used ML-based feature
    extractions³ for troubleshooting quality control issues. In recent times, there
    has been a proliferation in the number of commercial data-analytics software (Aspen
    Mtell, IBM SPSS) or services offerings for process industry. This is just a testament
    to the growing trend of ML-driven process control and operations.


    As process data scientists, we should be proud of the fact that process industry
    has always been a pioneer in utilizing process data for plant operations. Model
    predictive control (MPC) is a classic example which uses data-based model for
    process control. It has been used as a standard supervisory controller long before
    Big Data and ML became the buzzwords. Partial least squares (PLS), a popular dimensionality
    reduction-based soft sensing method, has long been used for online product quality
    predictions. The new craze about machine learning has only imparted a renewed
    push to explore non-traditional applications of ML in process industry.


    ## Decision hierarchy levels in a process plant


    Before we look at some specific examples of ML applications for process systems,
    let us first familiarize ourselves with the typical decision-making hierarchy
    in a process plant. Once you understand this, you will be able to easily identify
    the avenues where ML renders itself useful in the world of process operations
    and appreciate how data science has percolated all levels of process decision
    hierarchy.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_26_0.png)


    At the base level, in Figure 1.11, resides the basic regulatory control layer
    which primarily comprises of control valves; these valves are used to modulate
    the flow of process streams and indirectly the pressures and temperatures as per
    process requirements. These requirements are in turn determined by the multivariable
    control layer which usually consists of MPC and RTO (real-time optimization) modules.
    This layer determines the base layer requirements using multivariable relationships
    between plant variables to ensure optimal performance of the plant. This layer
    is also responsible for ensuring that plant operations remain safe by ensuring
    safety-critical variables remain within stipulated bounds. The process diagnostics
    layer, if present, ensures reliability of the process through timely fault detection
    and diagnosis. This layer may also perform the task of controller performance
    assessment.


    The production scheduling layer has models and methods to determine resource allocation
    and short-term production schedules considering external influences such as electricity
    prices or raw material price variations. Time-based or predictive equipment maintenance
    decisions may also be made in this layer. Results from this layer are communicated
    to the multivariable control layer. The top-most layer, planning and logistics,
    make enterprise-wide decisions. An enterprise operating multiple facilities use
    this layer to determine site-wise production targets based on the enterprise’s
    strategic goals.


    ## Application areas


    After familiarization with the process operation decision hierarchy, we are now
    well-equipped to see the broad application areas of ML in a process plant. We
    have already seen some of the application areas in Figure 1.6. In this section
    we will use a furnace (Figure 1.12) as an example system to investigate these
    in more details.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_27_0.png)


    The furnace system consists of several catalyst-filled tubes suspended vertically
    in a natural-gas fired furnace. Unreacted gas stream enters the tubes from the
    top, undergoes chemical reactions as they flow down the tubes and exit at the
    bottom. The heat from fuel combustion provides energy for the chemical reactions.


    ## Soft Sensing


    Soft sensors, also called virtual sensors or inferential sensors, are mathematical
    models used to estimate the values of unknown process variables using available
    measurements. Soft sensor models can be first principles-based or data-based and
    are employed when physical sensors are very costly or real-time measurements are
    not possible (in case of composition measurements).


    Usage of data-based soft sensors are popular where process systems are too complex
    to build mechanistic models, or the mechanistic models are too complex to provide
    required estimates in real-time. For example, for the furnace system, one can
    build a computational fluid dynamic (CFD) model to predict the species mole fractions
    in the processed gas stream as a function of process inputs – fuel, air, unprocessed
    gas. This estimate can be used by multivariable control layer to adjust input
    flows accordingly, for example, increase fuel if conversion is low. However, CFD
    models have large execution times. As an alternative, data-based models can utilize
    past process data to estimate an appropriate relationship and provide compositions
    in real-time.


    > As a process modeler, you should pay careful attention that the training data
    is sufficiently rich in information, otherwise, a poor/low-accuracy model will
    result. One way to ascertain data-richness is to check if process inputs show
    adequate variability.


    Partial least squares (PLS), principal component regression (PCR), support vector
    regression (SVR) are some of the popular ML method choices for estimating process
    quality variables. In recent times, artificial neural networks (ANNs) have also
    seen increased usage.


    ## Process Monitoring


    Process monitoring/fault detection/abnormality detection is among the most popular
    application of ML in process industry. The ML model flags an alarm when current
    process data shows inconsistency with historical behavior as estimated from historical
    data. These discrepancies could be indications of severe process faults. In the
    furnace system, there are hundreds of tube temperature measurements. Unfavorable
    conditions like catalyst damage or tube leaks may induce abnormal increase in
    some of the temperatures. However, it is impractical to monitor all these temperatures
    manually all the time. Instead, process monitoring models could be built using
    historical data that provides early warning for temperature upsets so that timely
    corrective actions can be taken.


    ## White-box/grey-box/black-box models


    For soft sensing, terms like white-box, grey-box, black-box are often used. Figure
    1.13 clarifies the difference between the terms. White-box models utilize fundamental
    mass/energy/momentum conservation laws to relate model inputs and outputs. Black-box
    methods build estimation models using only process data. Grey-box methods combine
    the two approaches to generate a hybrid model.


    Consider our furnace system again. CFD model would be the white-box model. PLS
    model relating furnace inputs to product stream composition would fall in black-box
    model category. However, to balance the trade-off between model accuracy and computational
    expense, a hybrid model can be built. Mechanistic model of radiation energy transfer
    is the most complex part of the furnace model. One can build a black-box model
    to estimate the amount of radiation energy supplied to the tubes. This model can
    then be combined with the mechanistic model of tube to predict product composition.


    Hybrid models tend to have better extrapolation accuracies compared to black-box
    models and are preferred when the amount of training data is low.



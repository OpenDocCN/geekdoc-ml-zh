    \ 开发的世界是巨大的，我们在本章中只涉及了其中的一小部分，以开发一个功能有限的非常基本的用户界面。像 Ajax、jQuery、Angular、React、Bootstrap\
    \ 这样的技术可以用来制作极其复杂和功能丰富的网站。\n\n## 总结\n\n在本章中，我们研究了机器学习项目端到端开发的最后一个阶段，即通过 Web 应用程序将机器学习模型的结果传递给非技术的最终用户。本章学到的概念可以帮助你快速部署你的工具并收集关键的用户反馈。随着本章的结束，我们的过程数据科学之旅也告一段落。我们希望你喜欢阅读这本书，就像我们喜欢写它一样！"

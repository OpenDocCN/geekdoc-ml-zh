    # # Chapter 13

    ## Reinforcement Learning


    The ML algorithms we have learnt till now rely upon supply of all modeling-relevant
    input/output data prior to model training. In contrast, reinforcement training
    (RL) takes ML a step further and is designed to collect the required training
    data by itself through interactions with the physical system that it is trying
    to learn about. Through trial-and-error, an RL model learns what actions to take
    to accomplish any given task. During training, actions that result in favorable
    results/rewards get reinforced and after multiple interactions, the model eventually
    learns an optimal action plan/policy! Sounds impressive, right?


    RL mimics how we, humans, learn things (such as riding a cycle) through trial
    & error and environment interactions. This concept opens up a plethora of potential
    RL applications. You have probably already heard or seen some of the remarkable
    feats achieved by RL models such as computers playing games better than the best
    human players or humanoid robots learning how to run, etc. In this chapter, we
    will focus on process industry-related applications of RL, specifically for process
    control.


    RL is a very broad and constantly evolving field. There are a lot of RL-specific
    terminology and concepts. We will declutter the world of RL in this chapter and
    you will learn how to setup and solve an RL problem. Specifically, this chapter
    covers the following topics


    +   - Introduction to RL and RL agents as process controllers

    - Introduction to Q-learning, deep RL, and Actor-Critic architecture

    - Introduction to DDPG algorithm for handling process industry-relevant problems

    - Tank level control using an RL agent'

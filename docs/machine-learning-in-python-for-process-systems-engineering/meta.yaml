    The parameter $k$ denotes the number of neighboring samples utilized by the algorithm.
    As shown in Figure 10.7, kNN can be used for both classification and regression.
    For classification, kNN assigns test sample to the class that appears the most
    amongst the $k$ neighbors. For regression, the predicted output is the average
    of the value of the $k$ neighbors. Due to its simplicity, kNN is widely used for
    pattern classification and was included in the list of top 10 algorithms in data
    mining.$^{47}$


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_236_0.png)


    > kNN belongs to the class of lazy learners where models are not built explicitly
    until test samples are received. At the other end of the spectrum, eager learners
    (like, SVM, decision trees, ANN) ''learn'' explicit models from training samples.
    Unsurprisingly, training is slower, and testing is faster for eager learners.
    kNN requires computing the distance of the test sample from all the training samples,
    therefore, kNN also falls under the classification of instance-based learning.
    Instance-based learners make predictions by comparing the test sample with training
    instances stored in memory. On the other hand, model-based learners do not need
    to store the training instances for making predictions.'
  - '[PAGE 237]


    # Conceptual background


    Apart from an integer $k$ and input-output training pairs, kNN algorithm needs
    a distance metric to quantify the closeness of a test sample with the training
    samples. The standard Euclidean metric is commonly employed. Once the nearest
    neighbors have been determined, two approaches, namely uniform and distance-based,
    can be employed to decide weights assigned to each neighbor which impacts the
    neighbor''s contribution in prediction. In uniform weighting, all $k$ neighbors
    are treated equally while, in distance-based weighting, each of the $k$ neighbors
    is weighted by the inverse of their distance from the test sample so that closer
    neighbors will have greater contributions. The figure below illustrates the difference
    between the two weight schemes for a classification problem


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_237_0.png)


    Figure 10.8: Illustration on impact of weight-scheme on kNN output. Dashed circles
    are for distance references.


    In Figure 10.8, with uniform weighting (also called majority voting for classification
    problems), the test sample is assigned to class 1 for $k = 1$ or 3 and class 2
    for $k = 6$. For $k = 8$, no decision can be made. With distance-weighting, test
    sample is always classified as class 1 for k = 1, 3, 6, or 8. This illustration
    shows that distance weighting can help reduce the prediction dependence on the
    choice of $k$.


    For predictions, kNN needs to compute the distance of test samples from all the
    training samples. For large training sets, this computation can become expensive.
    However, specialized techniques, such as KDTree and BallTree, have been developed
    to speed up the extraction of neighboring points without impacting prediction
    accuracies. These techniques utilize the structure in data to avoid computing
    distances from all training samples. The NearestNeighbors implementation in scikit-learn
    automatically selects the algorithm best suited to the problem at hand. The KNeighborsRegressor
    and KNeighborsClassifier modules are provided by scikit-learn for regression and
    classification, respectively.'
  - '[PAGE 238]


    A couple of things to pay careful attention in kNN include variable selection
    and variable scaling. Variables that are not important for output predictions
    should be removed; otherwise unimportant variables will undesirably impact the
    determination of nearest neighbors. Further, the selected variables should be
    properly scaled to ensure that variables with large magnitudes do not dwarf the
    contribution of other variables during distance computations.


    # Deciding kNN hyperparameters


    The choice of the hyperparameter, $k$, is critical and is the knob to balance
    underfitting and overfitting. Small $k$ can lead to overfitting where noisy measurements
    unfavorably impact the predictions. Large $k$ can reduce the effect of noise but
    can lead to underfitting as it over-smooths the predictions for regression or
    make classification boundaries less distinct. Unfortunately, there is no standard
    guidance on the choice of $k$. The optimal value depends on the data and can be
    estimated via cross-validation.


    # Applications of kNN for process systems


    As alluded to before, kNN method is often employed for equipment condition monitoring<sup>48</sup>.
    For process-level monitoring, kNN classification can be used to classify process
    abnormalities into distinct fault classes if sufficient historical faulty samples
    are available. As opposed to kNN fault classification, an interesting adaptation
    of kNN for fault detection was proposed by He & Wang that made use of only normal
    operation data<sup>49</sup>. We will study this application in more detail in
    the next section.


    A few other notable applications of kNN for process systems include the work of
    Facco et al. on automatic maintenance of soft sensors<sup>50</sup>, Borghesan
    et al. on forecasting of process disturbances<sup>51</sup>, Cecilio et al. on
    detecting transient process disturbances<sup>52</sup>, and Zhou et al. on fault
    identification in industrial processes<sup>53</sup>. These applications may not
    utilize the kNN method directly for classification or regression, but use the
    underlying concept of similarity of nearest neighbors.


    <sup>48</sup> Dong Wang, K-nearest neighbors based methods for identification
    of different gear crack levels under different motor speeds and loads: Revisited,
    Mechanical Systems and Signal Processing, 2016

    <sup>49</sup> He and Wang, Fault detection using k-nearest neighbor rule for semiconductor
    manufacturing processes, IEEE Transactions on Semiconductor Manufacturing, 2007.

    <sup>50</sup> Facco et al., Nearest-neighbor method for the automatic maintenance
    of multivariate statistical soft sensors in batch processing, Industrial Engineering
    & Chemistry Research, 2010.

    <sup>51</sup> Borghesan et al., Forecasting of process disturbances using k-nearest
    neighbors, with an application in process control, Computers and Chemical Engineering,
    2019.

    <sup>52</sup> Cecilio et al., Nearest neighbors methods for detecting transient
    disturbances in process and electromechanical systems, Journal of Process Control,
    2014.

    <sup>53</sup> Zhou et al., Fault identification using fast k-nearest neighbor
    reconstruction, Processes, 2019'
- md: '## 10.4 Process Fault Detection via kNN for Semiconductor Manufacturing Process


    Fault detection by kNN<sup>28</sup> (FD-kNN) is based on a simple idea that distance
    of a faulty test sample from the nearest training samples (obtained from normal
    operating plant conditions) must be greater than a normal sample’s distance from
    the neighboring training samples. Incorporating this idea into the process monitoring
    framework, a monitoring metric (termed kNN squared distance) is defined for each
    training sample as follows


    $$D_i^2 = \sum_{j=1}^k d_{ij}^2$$


    where $d_{ij}^2$ is the distance of $i^{th}$ sample from its $j^{th}$ nearest
    neighbor. After computing kNN squared distances for all the training samples,
    a threshold corresponding to the desired confidence limit can be computed. A test
    sample would be considered faulty if its kNN squared distance is greater than
    the threshold.


    An advantage of FD-kNN is that it is applicable to process systems with complex
    characteristics, such as multimodality, non-gaussianity, and non-linearity. To
    illustrate a complete application of FD-kNN, we will use the metal-etch dataset
    that we used previously in Chapter 8 for GMM-based process monitoring. If you
    recall, the batch data was unfolded before scaling and PCA application. We will
    do the same pre-processing transformations here using Sklearn’s Pipeline feature.
    Following He & Wang’s work, $k$ was set to 5. To compute the monitoring metric
    threshold, we will use KDE.


    ```python

    # scale data & fit PCA model via pipeline

    from sklearn.pipeline import Pipeline


    pipe = Pipeline([(''scaler'', StandardScaler()), (''pca'', PCA(n_components =
    3))])

    score_train = pipe.fit_transform(unfolded_dataMatrix)


    # k-nearest neighbors of each training sample in score space

    from sklearn.neighbors import NearestNeighbors


    nbrs = NearestNeighbors(n_neighbors=6).fit(score_train) # a data-point is its
    own neighbor

    d2_nbrs, indices = nbrs.kneighbors(score_train)

    d2_sqrd_nbrs = d2_nbrs**2

    D2 = np.sum(d2_sqrd_nbrs, axis = 1)

    D2_log = np.log(D2)

    D2_log_CL = get_CL_via_KDE(D2_log, 95, ''D2_log'')

    ```


    Figure 10.9 shows the output from fitting KDE to kNN squared distances distribution
    and the resulting monitoring chart for the training samples. Note that we log-transformed
    the kNN squared distances because application of KDE to D² resulted in non-zero
    densities for D² below 0. Figure 10.10 shows the monitoring chart for the faulty
    test samples. 15 out of 20 samples are correctly flagged as faulty while 5 samples
    are misdiagnosed as normal.


    ```python

    # scale and PCA on faulty test data

    score_test = pipe.transform(unfolded_TestdataMatrix)


    # D2_log_test

    d2_nbrs_test, indices = nbrs.kneighbors(score_test)

    d2_nbrs_test = d2_nbrs_test[:,0:5] # we want only 5 nearest neighbors

    d2_sqrd_nbrs_test = d2_nbrs_test**2

    D2_test = np.sum(d2_sqrd_nbrs_test, axis = 1)

    D2_log_test = np.log(D2_test)

    ```


    ## 10.5 Combining ML Techniques


    In this book, we have looked at several different ML techniques. We attempted
    to gain conceptual understanding of these methods and not just learn how to apply
    them via Sklearn modules. This enables us to tweak the standard algorithms of
    these techniques to suit our specific needs. An area where this can prove very
    useful is when you need to combine the different ML techniques together to leverage
    their respective strengths. A common combination scheme is to use PCA for feature
    extraction and any then apply other method on the extracted features. However,
    if you dig deeper into the ML for PSE literature, you can find several other interesting
    combinations. One such scheme (also called external analysis<sup>54 55</sup>)
    is illustrated below. In this scheme, the impact of normal plant operating condition
    changes (as indicated by process inputs) are removed from the output variables
    before the application of PCA or ICA-based fault detection. The corresponding
    authors have shown that fault detection performance increases significantly through
    this scheme.


    The secret behind the success of external analysis is that nonlinear or dynamic
    characteristics of process data can be handled by specialized modeling tools and
    then output residuals (difference between output measurements and predictions)
    can be handled efficiently by PCA. Another noteworthy scheme includes the integration
    of artificial neural networks (ANN) and PLS<sup>56</sup>. The powerful dimension
    reduction capabilities of PLS are combined with nonlinearity modeling capabilities
    of ANN to obtain a high-fidelity soft-sensor model.


    <sup>54</sup> Kano et al., Evolution of multivariate statistical process control:
    application of independent component analysis and external analysis, Computers
    & Chemical Engineering, 2004

    <sup>55</sup> Ge et al., Robust online monitoring for multimode processes based
    on nonlinear external analysis, Industrial Engineering & Chemistry Research, 2008

    <sup>56</sup> Qin & McAvoy, Nonlinear PLS modeling using neural networks, Computers
    & Chemical Engineering, 1992


    Jemwa & Aldrich<sup>57</sup> have proposed a scheme that combines SVM and decision
    trees. This scheme involves judicious use of support vectors to reduce the number
    of samples that goes into building decision trees model. The final result comprises
    of optimal operating strategies of the following type


    If $0.6 \leq \text{reactant mole fraction} \leq 0.9$

    Then keep reactant temperature within $270 - 290 \text{ K}$


    These were just a few examples to illustrate how very powerful models can be built
    by careful and conceptually sound combination of different ML techniques. Note
    that these combination strategies are more ad-hoc and situation-dependent compared
    to the more systematic ensemble learning techniques. The key takeaway is that
    as long as you are aware of the underlying mechanism and the combination makes
    theoretical sense, it does not hurt to try out various combinations if your problem
    cannot be satisfactorily handled by a standalone technique.


    # Summary


    With this chapter we have come to the end of our journey into the world of classical
    ML methods. We hope that you already feel empowered and your interest in machine
    learning has increased. The methods you have learnt so far should enable you to
    tackle majority of the problems you will face as process data scientists. With
    the classical techniques conquered, let us now get ready to step into the amazing
    world of artificial neural networks.


    # Part 3


    # Artificial Neural Networks & Deep Learning


    # Chapter 11


    ## Feedforward Neural Networks


    It won''t be an exaggeration to say that artificial neural networks (ANN) have
    (re)caught the fascination of data scientists and are currently the hottest topic
    among ML practitioners. Several recent technical breakthroughs and computational
    advancements have enabled (deep) ANNs to provide remarkable results for a wide
    range of problems. PSE is no exception to this trend and is increasingly witnessing
    more applications in areas like surrogate modeling, predictive equipment maintenance,
    etc.


    There is no doubt that ANNs have proven to be very powerful. However, with great
    power comes great responsibility! If you are not careful with ANN application,
    you will end up with disappointing results. To train an ANN model efficiently
    for a complex system, several hyperparameters need to be set carefully, which
    largely remains a trial-and-error exercise. Nonetheless, several techniques have
    been devised to overcome the challenges posed by ANN model training.


    In this chapter, we will demystify the world of ANNs and gain insights into how
    ANNs work. We will learn the underlying concepts, the tips & tricks of the trade,
    common problems encountered, and the techniques developed to handle these problems.
    Specifically, the following topics are covered


    - Introduction to ANNs

    - Exploration of nonlinearity in ANNs

    - Hyperparameter optimization for ANNs

    - Tips & tricks for improved ANN model training

    - Nonlinear soft sensing via ANN

    - General guidelines for ANN modeling for PSE'
  mdcn: '## 10.4 基于kNN的半导体制造过程故障检测


    kNN<sup>28</sup>故障检测（FD-kNN）基于一个简单的思想：故障测试样本与最近训练样本（从正常运行工况获得）的距离，必然大于正常样本与其邻近训练样本的距离。将这一思想融入过程监控框架，为每个训练样本定义一个监控指标（称为kNN平方距离），如下所示


    $$D_i^2 = \sum_{j=1}^k d_{ij}^2$$


    其中 $d_{ij}^2$ 是第 $i$ 个样本与其第 $j$ 个最近邻之间的距离。计算出所有训练样本的kNN平方距离后，可以计算出对应于所需置信限的阈值。如果测试样本的kNN平方距离大于该阈值，则被视为故障。


    FD-kNN的一个优势是它适用于具有复杂特性的过程系统，例如多模态、非高斯性和非线性。为了说明FD-kNN的完整应用，我们将使用第8章中用于基于GMM过程监控的金属蚀刻数据集。如果您还记得，批次数据在缩放和PCA应用之前进行了展开。我们将使用Sklearn的Pipeline功能进行相同的预处理变换。遵循He
    & Wang的工作，$k$ 设置为5。为了计算监控指标阈值，我们将使用KDE。


    ```python

    # scale data & fit PCA model via pipeline

    from sklearn.pipeline import Pipeline


    pipe = Pipeline([(''scaler'', StandardScaler()), (''pca'', PCA(n_components =
    3))])

    score_train = pipe.fit_transform(unfolded_dataMatrix)


    # k-nearest neighbors of each training sample in score space

    from sklearn.neighbors import NearestNeighbors


    nbrs = NearestNeighbors(n_neighbors=6).fit(score_train) # a data-point is its
    own neighbor

    d2_nbrs, indices = nbrs.kneighbors(score_train)

    d2_sqrd_nbrs = d2_nbrs**2

    D2 = np.sum(d2_sqrd_nbrs, axis = 1)

    D2_log = np.log(D2)

    D2_log_CL = get_CL_via_KDE(D2_log, 95, ''D2_log'')

    ```


    图10.9展示了将KDE拟合到kNN平方距离分布的结果，以及训练样本的最终监控图。请注意，我们对kNN平方距离进行了对数变换，因为将KDE应用于D²会导致D²低于0时出现非零密度。图10.10展示了故障测试样本的监控图。20个样本中有15个被正确标记为故障，而5个样本被误诊为正常。


    ```python

    # scale and PCA on faulty test data

    score_test = pipe.transform(unfolded_TestdataMatrix)


    # D2_log_test

    d2_nbrs_test, indices = nbrs.kneighbors(score_test)

    d2_nbrs_test = d2_nbrs_test[:,0:5] # we want only 5 nearest neighbors

    d2_sqrd_nbrs_test = d2_nbrs_test**2

    D2_test = np.sum(d2_sqrd_nbrs_test, axis = 1)

    D2_log_test = np.log(D2_test)

    ```


    ## 10.5 结合机器学习技术


    在本书中，我们已经探讨了几种不同的机器学习技术。我们试图获得对这些方法的概念性理解，而不仅仅是学习如何通过Sklearn模块应用它们。这使我们能够调整这些技术的标准算法以适应我们的特定需求。一个可以证明非常有用的领域是，当你需要将不同的机器学习技术结合起来以利用各自优势时。一种常见的组合方案是使用PCA进行特征提取，然后在提取的特征上应用其他方法。然而，如果您深入研究过程系统工程中的机器学习文献，可以发现其他几种有趣的组合。其中一种方案（也称为外部分析<sup>54
    55</sup>）如下图所示。在该方案中，在应用基于PCA或ICA的故障检测之前，从输出变量中移除正常工厂运行条件变化（由过程输入指示）的影响。相关作者已证明，通过此方案，故障检测性能显著提高。


    外部分析成功背后的秘密是，过程数据的非线性或动态特性可以通过专门的建模工具处理，然后输出残差（输出测量值与预测值之间的差异）可以由PCA高效处理。另一个值得注意的方案包括人工神经网络（ANN）和PLS<sup>56</sup>的集成。PLS强大的降维能力与ANN的非线性建模能力相结合，以获得高保真度的软测量模型。


    <sup>54</sup> Kano et al., Evolution of multivariate statistical process control:
    application of independent component analysis and external analysis, Computers
    & Chemical Engineering, 2004

    <sup>55</sup> Ge et al., Robust online monitoring for multimode processes based
    on nonlinear external analysis, Industrial Engineering & Chemistry Research, 2008

    <sup>56</sup> Qin & McAvoy, Nonlinear PLS modeling using neural networks, Computers
    & Chemical Engineering, 1992


    Jemwa & Aldrich<sup>57</sup> 提出了一种结合SVM和决策树的方案。该方案涉及明智地使用支持向量来减少用于构建决策树模型的样本数量。最终结果包括以下类型的最优操作策略


    如果 $0.6 \leq \text{反应物摩尔分数} \leq 0.9$

    则保持反应物温度在 $270 - 290 \text{ K}$ 范围内


    这些只是几个例子，说明了如何通过仔细且概念上合理的组合不同的机器学习技术来构建非常强大的模型。请注意，与更系统的集成学习技术相比，这些组合策略更具临时性和情境依赖性。关键要点是，只要您了解其底层机制并且组合在理论上合理，如果您的问题无法通过单一技术得到满意处理，尝试各种组合并无坏处。


    # 总结


    本章结束了我们对经典机器学习方法世界的探索。我们希望您已经感到充满力量，并且对机器学习的兴趣有所增加。到目前为止，您所学到的方法应该能够帮助您解决作为过程数据科学家将面临的大多数问题。在掌握了经典技术之后，现在让我们准备好步入神奇的人工神经网络世界。


    # 第三部分


    # 人工神经网络与深度学习


    # 第11章


    ## 前馈神经网络


    毫不夸张地说，人工神经网络（ANN）已经（重新）吸引了数据科学家的迷恋，目前是机器学习从业者中最热门的话题。最近的几项技术突破和计算进步使得（深度）ANN能够为广泛的问题提供显著的结果。过程系统工程也不例外，它在替代建模、预测性设备维护等领域正见证着越来越多的应用。


    毫无疑问，ANN已被证明非常强大。然而，能力越大，责任越大！如果您在应用ANN时不谨慎，最终会得到令人失望的结果。为了高效地为复杂系统训练ANN模型，需要仔细设置几个超参数，这在很大程度上仍然是一项试错练习。尽管如此，已经设计了几种技术来克服ANN模型训练带来的挑战。


    在本章中，我们将揭开ANN世界的神秘面纱，并深入了解ANN的工作原理。我们将学习基本概念、行业技巧、常见问题以及处理这些问题的技术。具体涵盖以下主题


    - 人工神经网络简介

    - 探索ANN中的非线性

    - ANN的超参数优化

    - 改进ANN模型训练的技巧

    - 基于ANN的非线性软测量

    - 过程系统工程中ANN建模的一般指南'

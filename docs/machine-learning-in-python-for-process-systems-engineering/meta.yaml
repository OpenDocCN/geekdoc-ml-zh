    给定带宽（$\sigma$），在训练过程中，SVM 试图找到凸起乘数（$\alpha_s$）的最优值，使得训练样本获得正确的标签，同时保持分类边界与训练样本之间的最大间隔。边界就是凸起和偏移量的净总和为零的点集。较小的

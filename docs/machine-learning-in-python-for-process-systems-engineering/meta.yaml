    \ above two functions will be used later to create our actor, critic, and the\
    \ targets networks. The next function performs a soft update of the target networks.\n\
    \n```\ndef update_target(target_network, ref_network, tau=0.01):\n    \"\"\"\n\
    \    update target network weights using the weights of the reference/main networks\n\
    \    \"\"\"\n    target_network_weights = target_network.get_weights()\n    ref_network_weights\
    \ = ref_network.get_weights()\n\n    for index in range(len(target_network_weights)):\n\
    \        target_network_weights[index] = tau*ref_network_weights[index] + \\n\
    \                                        (1-tau)*target_network_weights[index]\n\
    \    target_network.set_weights(target_network_weights)\n\n    return target_network\n\
    ```\n\nThe next function generates OU noise that is added as a disturbance to\
    \ the actor's action. The subsequent figure shows an example of the kind of noise\
    \ pattern generated by this mechanism. As is apparent, an OU process shows greater\
    \ inertia (compared to a wildly fluctuating gaussian process) as the OU noise\
    \ signals tend to evolve in the same direction for long durations; this promotes\
    \ deep exploration during RL agent's training."

  - "[PAGE 76]\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_76_0.png)\n\nK-fold cross-validation\
    \ is the default cross validation techniques inbuilt in several of Sklearn’s functions\
    \ such as validation_curve. The downside to this technique is high computational\
    \ cost as model fitting is carried out multiple times. Therefore, for deep learning-based\
    \ solutions, which anyway employs large datasets, 3-way holdout method is often\
    \ the preferred choice.\n\n# Choosing number of folds\n\nThe typical (and often\
    \ the default) value of *k* in k-fold cross-validation is 10. For large datasets,\
    \ smaller value (k = 3 or 5) can be used. When we increase *k*, less samples are\
    \ put in the validation set; this results in unpreferable higher variance in the\
    \ validation scores among the different splits. An extreme scenario is when number\
    \ of folds equals the number of training samples. This is referred to as leave-one-out\
    \ cross validation and is employed when number of training samples is very limited.\n\
    \n# Regularization\n\nIf your model is overfitting, one of the things to do is\
    \ to check the values of the model parameters (weight coefficients for linear\
    \ models). You may find some or all of them with very large values. This is problematic\
    \ because the model becomes very sensitive to input variables with high coefficients,\
    \ i.e., model predicts big response changes for even very small variations in\
    \ these input variables. This is unlikely to be true for real process systems.\
    \ For example, following are the model coefficients with 10 degree polynomial\
    \ features for our illustration dataset. Look at the higher degree coefficients\n\
    \n```\n# get model coefficients\nprint(pipe['model'].coef_) # does not include\
    \ intercept term\n\n>>> [-1.96123e+00 -1.70142e+01  1.61112e+02  5.53503e+02 \
    \ -1.47185e+03 -5.24500e+03\n 9.88824e+02  1.58830e+04  1.72273e+04  5.73349e+03]\n\
    ```"
- md: "## Bayesian Information Criterion (BIC) for model selection\n\nIf you want\
    \ to utilize all your training data for model fitting or validation subset cannot\
    \ be set aside for model selection (e.g., when using gaussian mixture models),\
    \ BIC technique can be used which provides an optimal trade-off between model\
    \ complexity (or number of model parameters) and model accuracy. We have seen\
    \ that model accuracy on training data can be increased by adding more model parameters,\
    \ but this can also lead to overfitting. BIC resolves this conundrum by minimizing\
    \ a metric that includes a penalty term for the number of model parameters.\n\n\
    Mathematically, $BIC = n_p \\ln(n) - 2\\ln(\\hat{L})$, where\n- $n_p$ equals number\
    \ of estimated parameters\n- $n$ equals number of data-points or observations\n\
    - $\\hat{L}$ equals the optimal value of likelihood function (model accuracy)\n\
    \nWe can see that a model with high accuracy/likelihood and fewer parameters will\
    \ result in low BIC value, and hence, optimal model corresponds to the minimum\
    \ BIC value. BIC owes its popularity for its effectiveness and low computational\
    \ cost: It has been shown theoretically that for sufficiently large training data,\
    \ if the correct model is included among the set of candidate models, then BIC\
    \ is guaranteed to select it as the best model. We will see an application in\
    \ Chapter 8.\n\nAnother popular model selection metric is AIC (Akaike information\
    \ criterion). The penalty term is smaller in AIC. Consequently, AIC tends to select\
    \ more complex models compared to those selected by BIC. Do remember that more\
    \ complex models might overfit while simpler models might underfit. Therefore,\
    \ selection between AIC and BIC methods is problem dependent.\n\nTherefore, to\
    \ keep model parameters ‘simple’, modeling algorithms are tweaked to decrease\
    \ the likelihood of overfitting. This modulation is called regularization and\
    \ is a widely used approach to tackle overfitting. You should always employ some\
    \ form of regularization in your model.\n\n## Common mechanisms of regularization\n\
    \nIn one of the forms of regularized model, the objective function (which is minimized\
    \ during fitting) includes an additional term that is proportional to summation\
    \ of square of model coefficients ($\\theta$) as shown below\n\n$$J_{regularized}(\\\
    theta) = MSE(\\theta) + \\alpha \\sum_{i} \\theta_i^2$$\n\nThe additional term\
    \ penalizes the algorithm for choosing high coefficient values. Therefore, during\
    \ model fitting, the algorithm will be forced to minimize fitting error while\
    \ keeping coefficients small. This version of regularization is called L2 or ridge\
    \ regularization. The '$\\alpha$' term is a hyperparameter which modulates the\
    \ magnitude of the penalty term.\n\nIn another form of regularization, the objective\
    \ function is modified as follows\n\n$$J_{regularized}(\\theta) = MSE(\\theta)\
    \ + \\alpha \\sum_{i} |\\theta_i|$$\n\nHere, the penalty term is simply proportional\
    \ to the summation of absolute value of the coefficients. This is called L1 or\
    \ lasso regularization. Let's see how these mechanisms help us with the overfitting\
    \ problem with our 10th degree polynomial fitting. L1 / L2 can be implemented\
    \ by just switching the linear model in the pipeline with the regularized linear\
    \ models as shown below\n\n### Ridge regression\n\n```python\nfrom sklearn.linear_model\
    \ import Ridge\n\npipe_L2 = Pipeline([('poly', PolynomialFeatures(degree=10,include_bias=False)),\n\
    \                    ('scaler', StandardScaler()),\n                    ('model',\
    \ Ridge(alpha=0.1))])\n```\n\n### Lasso regression\n\n```python\nfrom sklearn.linear_model\
    \ import Lasso\n\npipe_L1 = Pipeline([('poly', PolynomialFeatures(degree=10,include_bias=False)),\n\
    \                    ('scaler', StandardScaler()),\n                    ('model',\
    \ Lasso(alpha=0.1))])\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_78_0.png)\n\
    \nFigure 3.11 confirms that regularization works!! To see what is happening under\
    \ the hood, let's check the model coefficients of the regularized models\n\n```python\n\
    # get model coefficients\nprint(pipe_L2['model'].coef_)\n\n>>> [ 0.27326  3.49270\
    \ -0.35861  0.59074 -1.20522  1.90652 -1.80640  0.86690  0.87244 -3.20685]\n```\n\
    \n```python\nprint(pipe_L1['model'].coef_)\n\n>>> [-0.438109181 -0.09273215 1.679048\
    \ -0. 0. -0. 0. 0. -0.]\n```\n\nWhile both L1 and L2 regularizations ensure that\
    \ model coefficients remain small, Lasso actually has pushed several coefficients\
    \ to zero. This is representative of the general behavior of Lasso which is often\
    \ used for variable selection as the coefficients of irrelevant variables get\
    \ set to zero. The advantage of L2 is that it is computationally favorable as\
    \ the penalty term is differentiable unlike L1's penalty term. The choice between\
    \ L1 and L2 is problem dependent and requires trial-and-error.\n\nL1 and L2 regularizations\
    \ can be combined into elastic-net regularization. Not all forms of regularizations\
    \ involve putting penalty terms in objective function. You will study methods\
    \ like dropout, batch normalization, early stopping in Chapter 11, which help\
    \ to ensure model coefficients remain 'stable' to avoid overfitting.\n\n> You\
    \ will have noticed that we have talked about regularizing only the weight coefficients\
    \ and not the intercepts. This is true in general. Large intercepts (or biases\
    \ in neural networks) will not cause large response changes upon small variations\
    \ in inputs, and therefore, regularizing them is often not needed.\n\n## Choosing\
    \ value of α\n\nThe 'α' term is an important hyperparameter which should be carefully\
    \ specified before model fitting. Very small α will make regularization ineffective\
    \ potentially leading to overfitting. Very high value will push the model coefficients\
    \ to zero causing underfitting. The optimal value is difficult to know before-hand\
    \ and need to found via cross-validation. However, a general recommendation is\
    \ to keep α low rather than high.\n\n## Hyperparameter optimization via GridSearchCV\n\
    \nPreviously we used validation curves to find the optimal hyperparameters. Sklearn\
    \ provides a GridSearchCV utility function that we can leverage to do this task\
    \ more conveniently. GridSearchCV takes lists of potential hyperparameter values\
    \ and does an exhaustive search to find the optimal combination of hyperparameter\
    \ values. The code below shows the implementation.\n\n```python\n# separate training\
    \ and test data\nfrom sklearn.model_selection import train_test_split\nx_train,\
    \ x_test, y_train, y_test = train_test_split(x, y, test_size=0.2, random_state=1)\n\
    ```\n\n```python\n# find optimal hyperparameter via GridSearchCV\nfrom sklearn.model_selection\
    \ import GridSearchCV\n\nparam_grid = {'poly__degree': np.arange(1,6)}\ngs = GridSearchCV(pipe,\
    \ param_grid, scoring='neg_mean_squared_error', cv=3)\ngs.fit(x_train, y_train)\n\
    \nprint('Optimal hyperparameter:', gs.best_params_)\n\n>>> Optimal hyperparameter:\
    \ {'poly__degree': 2}\n```\n\nAs expected, GridSearchCV also returns the optimal\
    \ polynomial degree as 2. Note that we are using 3-fold cross validation here\
    \ as specified via cv=3. By default, GridSearchCV refits the estimator on the\
    \ complete supplied dataset using the best found hyperparameters. The best estimator\
    \ can be obtained via gs.best_estimator_ for subsequent predictions (predictions\
    \ can also be done via gs.predict function). In the above code we explicitly supplied\
    \ mean squared error as the scoring metric; the default behavior is to use the\
    \ estimator's default scorer which would be R squared for linear regression in\
    \ sklearn.\n\nThis concludes our quick look into the standard ML model tuning\
    \ approaches and ML modeling workflow. You now know how raw data should be transformed\
    \ before model fitting, how to evaluate and report model's performance, and how\
    \ to find optimal model hyperparameters during model tuning.\n\n## Summary\n\n\
    In this chapter, we learnt the best practices of setting up a ML modeling workflow.\
    \ During the course of learning the workflow, we saw several nice utilities (pipelines,\
    \ kFold, grid-search, etc.) provided in Sklearn library which make ML scripting\
    \ easier and manageable. The takeaway message from this chapter should be that\
    \ ML modeling is a collaborative work between you and machine. This chapter exposed\
    \ you to your side of the task!!"
  mdcn: "## 用于模型选择的贝叶斯信息准则 (BIC)\n\n如果你想利用所有训练数据进行模型拟合，或者无法留出验证子集用于模型选择（例如，使用高斯混合模型时），可以使用\
    \ BIC 技术。它能在模型复杂度（或模型参数数量）与模型精度之间提供一个最优的权衡。我们已经看到，通过增加更多模型参数可以提高训练数据上的模型精度，但这也会导致过拟合。BIC\
    \ 通过最小化一个包含模型参数数量惩罚项的指标来解决这个难题。\n\n从数学上讲，$BIC = n_p \\ln(n) - 2\\ln(\\hat{L})$，其中\n\
    - $n_p$ 等于估计参数的数量\n- $n$ 等于数据点或观测值的数量\n- $\\hat{L}$ 等于似然函数（模型精度）的最优值\n\n我们可以看到，一个具有高精度/似然值且参数较少的模型将导致较低的\
    \ BIC 值，因此，最优模型对应于最小的 BIC 值。BIC 因其有效性和低计算成本而广受欢迎：理论上已经证明，对于足够大的训练数据，如果正确的模型包含在候选模型集合中，那么\
    \ BIC 保证会选择它作为最佳模型。我们将在第 8 章看到一个应用。\n\n另一个流行的模型选择指标是 AIC（赤池信息准则）。AIC 中的惩罚项较小。因此，与\
    \ BIC 选择的模型相比，AIC 倾向于选择更复杂的模型。请记住，更复杂的模型可能过拟合，而更简单的模型可能欠拟合。因此，在 AIC 和 BIC 方法之间的选择取决于具体问题。\n\
    \n因此，为了保持模型参数的“简单性”，会对建模算法进行调整以降低过拟合的可能性。这种调节称为正则化，是解决过拟合问题的广泛使用的方法。你应该始终在模型中采用某种形式的正则化。\n\
    \n## 正则化的常见机制\n\n在正则化模型的一种形式中，目标函数（在拟合过程中被最小化）包含一个与模型系数（$\\theta$）平方和成正比的附加项，如下所示\n\
    \n$$J_{regularized}(\\theta) = MSE(\\theta) + \\alpha \\sum_{i} \\theta_i^2$$\n\
    \n这个附加项惩罚算法选择高系数值。因此，在模型拟合过程中，算法将被迫在保持系数较小的同时最小化拟合误差。这种正则化版本称为 L2 或岭正则化。'$\\alpha$'\
    \ 项是一个超参数，用于调节惩罚项的大小。\n\n在另一种正则化形式中，目标函数修改如下\n\n$$J_{regularized}(\\theta) = MSE(\\\
    theta) + \\alpha \\sum_{i} |\\theta_i|$$\n\n这里，惩罚项简单地与系数的绝对值之和成正比。这称为 L1 或 Lasso\
    \ 正则化。让我们看看这些机制如何帮助我们解决 10 次多项式拟合的过拟合问题。L1 / L2 可以通过在流水线中将线性模型切换为正则化线性模型来实现，如下所示\n\
    \n### 岭回归\n\n```python\nfrom sklearn.linear_model import Ridge\n\npipe_L2 = Pipeline([('poly',\
    \ PolynomialFeatures(degree=10,include_bias=False)),\n                    ('scaler',\
    \ StandardScaler()),\n                    ('model', Ridge(alpha=0.1))])\n```\n\
    \n### Lasso 回归\n\n```python\nfrom sklearn.linear_model import Lasso\n\npipe_L1\
    \ = Pipeline([('poly', PolynomialFeatures(degree=10,include_bias=False)),\n  \
    \                  ('scaler', StandardScaler()),\n                    ('model',\
    \ Lasso(alpha=0.1))])\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_78_0.png)\n\
    \n图 3.11 证实了正则化是有效的！！为了了解底层发生了什么，让我们检查正则化模型的模型系数\n\n```python\n# get model coefficients\n\
    print(pipe_L2['model'].coef_)\n\n>>> [ 0.27326  3.49270 -0.35861  0.59074 -1.20522\
    \  1.90652 -1.80640  0.86690  0.87244 -3.20685]\n```\n\n```python\nprint(pipe_L1['model'].coef_)\n\

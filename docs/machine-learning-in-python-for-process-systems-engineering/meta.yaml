    # Holdout method / Cross-validation


    While the performance metrics computed using training data tell us how good our
    model fitting is, they are not true indicators of how well the model would perform
    for unseen data. For an unbiased generalization assessment, performance metrics
    should always be reported for a ‘test’ dataset that is not used during model training.
    This approach is called cross-validation. It’s great if you already have a separate
    test dataset, otherwise the best practice is to split the available dataset into
    training and test sets as shown below.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_65_1.png)'

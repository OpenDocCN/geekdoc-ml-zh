    # 13.1 Reinforcement Learning: An Introduction


    RL is the branch of ML wherein an agent repeatedly interacts with its environment
    to learn the best way to accomplish a task or the optimal action policy. Figure
    13.1 shows the basic setup of reinforcement learning. As shown, the RL agent receives
    information about the current state ($s_t$) of the environment based on which
    an action ($a_t$) is decided (as per agent’s action policy). As a result of the
    action, the environment moves to a new state ($s_{t+1}$) and generates a scalar
    reward ($r_{t+1}$) indicating how good was the taken action. Before the agent
    takes another action, the learning algorithm uses the information ($s_t$, $a_t$,
    $r_{t+1}$, $s_{t+1}$) to improve its policy and then the cycle continues. Eventually,
    an optimal policy is obtained that maps environment states to optimal actions
    such that the total rewards earned till task completion is maximized. Once trained,
    the learning process can be stopped, and the policy function can be deployed.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_300_0.png)


    Figure 13.1: Reinforcement learning setup depicting an agent’s interactions with
    its environment


    A simple real-life analogy could be the task of finding the optimal driving route
    from your office to home in a new town. Here, you are the agent and environment
    would comprise of your car, city’s roads and highways network, traffic, weather,
    your geospatial location, and basically everything excluding you. The total reward
    to maximize could be the negative of the time taken to reach home (less driving
    time is better). During driving, depending on the environment state, you would
    take decisions on whether to take any highway exit or make any turn or not. Assuming
    no internet (and google maps!), being new in town, you would not know if taking
    those exits or turns will help you reach home faster and therefore you will explore
    different possible routes. After several trials, you would gain a good understanding
    of the town and eventually would be able to take the most optimal action for any
    given environment state at any point during driving. RL follows the same methodology
    to find the optimal mapping using some systematic (and very smart) learning algorithms.'
- md: '## RL for process control


    The RL framework of observing an environment’s current state and deciding upon
    corresponding optimal actions fits quite naturally to the setup of process controllers
    in process industry. You might already know that these controllers are tasked
    with keeping process operations optimal by keeping critical process variables
    (product purity, fluid level, temperatures, etc.) at optimal values through adjustments
    in manipulated variables (stream flows, valve openings, etc.). Figure 13.2 shows
    the typical setup of a process controller and the division of this setup into
    agent/environment framework. Rewards are designed as some suitable combination
    of reference signal, environment state, and controller action.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_301_0.png)


    In process industry, although PID and MPC controllers are well-established, their
    shortcomings are well-known. While PID controllers perform unsatisfactorily for
    complex nonlinear systems, MPCs solve optimization problems using process models
    which makes online action computation infeasible for large-scale nonlinear systems.
    Moreover, both these controllers suffer performance degradation issues (due to
    changing process conditions, process drift) over time, necessitating regular maintenance.
    Controller maintenance entails re-identification of process models which can be
    time and resource intensive and may require interference to normal plant operations
    for training data collection.


    Given the aforementioned issues with the current state-of-the-art for the process
    controllers and the recent successes of RL, interest in leveraging RL technology
    for process control has been reignited. Several recent studies<sup>66</sup> have
    demonstrated how RL-based controllers can provide superior performance. Not requiring
    online optimization (because optimal action policy is pre-computed), easy adaptation
    of action policy under changing environment by continued learning with new process
    data are some characteristics that make RL-based controllers very promising.


    > <sup>66</sup> Cassol et. al., Reinforcement learning applied to process control:
    A Van der Vusse reactor case study, Computer Aided Chemical Engineering, 2018

    > Rajesh Siraskar, Reinforcement learning for control of valves, Machine Learning
    with Applications, 2021

    > Ma et. al., Continuous control of a polymerization system with deep reinforcement
    learning, Journal of Process Control, 2019


    You may be slightly concerned about training an RL agent in the real plant environment
    because the generated actions in early stages of training can be ‘very bad’ and
    even unsafe. Moreover, for complex system, thousands of interactions may be required
    to reach even a reasonably-good policy; plant managers will certainly never agree
    to this! These are valid concerns and therefore, the common practice is to use
    a sufficiently accurate model of the plant and train RL agent offline in a simulated
    environment. Once offline learning is complete, the learning process can be turned
    off and RL agent deployed in real plant. There are, however, a few good reasons
    to keep learning on (continually or sporadically) post-deployment. First, your
    plant model will probably not be 100% accurate. Therefore, the RL agent may use
    some online interactions to fine-tune its policy. Second, as alluded to before,
    the plant behavior may change over time and the agent will need to tweak its policy
    to re-adjust to changes in its environment.


    This discussion also brings us to the point of model-free vs model-based RL. Model-free
    RL doesn’t use any environment/plant model during training and learns its policy
    based solely on its interactions with real environment. Model-based RL, on the
    other hand, uses a model either for simulating the environment or assisting the
    learning algorithm.


    ## 13.2 RL Terminology & Mathematical Concepts


    We have showered enough praises on RL. Let’s now get down to understanding how
    RL actually works. For this, we will first learn some RL terminology and concepts.
    A quick disclaimer here that some of these new concepts may seem ‘abstract’ and
    not immediately useful. But, as you read through this chapter, we promise that
    all dots will connect and their utility will become ‘obvious’.


    ## Environment and Markov decision process


    While informally an environment is anything that an RL agent interacts with, in
    a formal setting, it is represented as a Markov decision process (MDP). A MDP
    is named such because it exhibits Markov property, i.e., the (probability of)
    transition from state **s**<sub>t</sub> to **s**<sub>t+1</sub> depend only on
    the most recent state (sₜ) and action (aₜ). Such memoryless characteristic is
    important in RL because it allows the agent to only consider the current state
    when deciding the next optimal action and not worry about what actions were previously
    taken to reach sₜ.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_303_0.png)


    Figure 13.3: Transition in an MDP depend only on current state and action


    In an MDP, selection of features that completely characterize the state of the
    environment and enable the agent to act on its basis becomes crucial. For example,
    consider the following problem of controlling the liquid level in a tank


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_303_1.png)


    Here, l, lₛₚ, and the rate of change of l could be used to define the environment
    state. lₛₚ can also be substituted with l - lₛₚ as an alternative formulation.
    Depending on your problem formulation, data from the past may also be included
    in the state vector to facilitate the agent’s decision making.


    ## Reward and return


    Upon execution of an action (aₜ), the RL agent receives a reward signal (rₜ₊₁)
    which quantifies and informs the agent the goodness of being in the new state
    (sₜ₊₁) and taking action aₜ. Consider the following sequence of an agent’s interactions
    with its environment from time t onwards during the execution of a task.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_303_2.png)


    The agent''s job is to take actions that maximize the cumulative reward (also
    called return) over the course of the task. The return can be represented as $R_t
    = \sum_{k=1}^{T-t} r_{t+k}$. However, this direct summation can cause trouble
    for tasks which don''t have a definite end state. The level control task is one
    such example where $T=\infty$ (because the task is to control the level forever!).
    To keep $R_t$ bounded, the following formulation is used instead


    $$R_t = r_{t+1} + \gamma r_{t+2} + \gamma^2 r_{t+3} + \dots + \gamma^{T-t-1} r_T
    = \sum_{k=1}^{T-t} \gamma^{k-1} r_{t+k}$$


    *eq. 1*


    The return in Eq. (1) is called discounted return and $\gamma \in (0, 1)$. The
    farther the reward in the future, less importance is accorded to it. A $\gamma$
    close to 0 makes an agent consider only the immediate reward ($r_{t+1}$) for choosing
    $a_t$ while $\gamma$ close to 1 makes long-term rewards important.


    The concept of discounted reward maximization is an elegant (and mathematically
    tractable) way of making RL agent look at both immediate and future rewards. For
    level control problem, a natural reward function is squared tracking error


    $$r_t = -(l_t - l_{sp})^2$$


    Appropriate crafting of reward function is very important as it strongly influences
    the agent''s decisions and RL training convergence.


    ## Policy


    A policy is a rule or mapping used by an RL agent to determine $a_t$ given $s_t$.
    A policy can be deterministic or stochastic. A deterministic policy provides a
    single action


    $$a_t = \mu(s_t)$$


    while a stochastic policy ($\pi$) provides a probability over the set of actions


    $$\pi(a|s_t) = \text{probability that action } a \text{ is taken in state } s_t$$


    The goal in RL is to learn a policy which provides maximum return. The optimal
    policy is often denoted as $\mu^*$ or $\pi^*$.


    ## Value function


    RL algorithms often make use of value functions. State value function, $V_{\mu}(s)$,
    gives the return an agent expects to receive from being in the state $s$ and acting
    according to some policy $\mu$.


    $$V_{\mu}(s) = E[R_t | s_t = s, \text{policy } \mu]$$


    State-action value function, $Q_{\mu}(s, a)$, is another useful function that
    gives the expected return from taking an arbitrary action (not necessarily following
    policy $\mu$) from state $s$ and then following policy $\mu$.


    $$Q_{\mu}(s, a) = E[R_t | s_t = s, a_t = a, \text{policy } \mu]$$


    When the optimal policy, $\mu^*$, is followed, the value functions are denoted
    as $V^*(s)$ and $Q^*(s,a)$. In above definitions, we take expectations ($E[.]$)
    of the returns because real-life environments are uncertain and stochastic, i.e.,
    taking an action $\mathbf{a}_t$ at state $\mathbf{s}_t$ can result in slightly
    different $\mathbf{s}_{t+1}$ in different iterations. This transition uncertainty
    can be denoted as the probability $P(s_{t+1} = s'' | s_t = s, a_t = a)$. Above
    definitions incorporate this transition probability during return computation.


    ## Bellman equation


    The value functions can also be represented in a recursive form. Consider the
    optimal state function,


    $$V^*(s) = E[R_t | s_t = s, \mu^*]$$

    $$= E[\mathbf{r}_{t+1} + \gamma \mathbf{r}_{t+2} + \gamma^2 \mathbf{r}_{t+3} +
    \cdots | s_t = s, \mu^*]$$

    $$= E[\mathbf{r}_{t+1} + \gamma R_{t+1} | s_t = s, \mu^*]$$

    $$= E[\mathbf{r}_{t+1} + \gamma V^*(s_{t+1}) | s_t = s, \mu^*]$$


    The optimal state-action value can also be similarly re-written as


    $$Q^*(s, a) = E[\mathbf{r}_{t+1} + \gamma Q^*(s_{t+1}, \mu^*(s_{t+1})) | s_t =
    s, a_t = a]$$

    $$\text{or}$$

    $$Q^*(s, a) = E[\mathbf{r}_{t+1} + \gamma \max_{a''} Q^*(s_{t+1}, a'') | s_t =
    s, a_t = a]$$


    Note again that $s_{t+1} \sim P(s_{t+1} = s'' | s_t = s, a_t = a)$ and is sampled
    following the environment''s transition probability. The above recursive equations,
    also called Bellman equations, are central to several RL algorithms. Bellman equation
    simply states that the value of the current state (or state-action) is the sum
    of immediate reward and the value of whatever state the environment lands next.'
  mdcn: '## 过程控制中的强化学习


    强化学习框架——观察环境当前状态并决定相应的最优行动——与过程工业中过程控制器的设置非常契合。你可能已经知道，这些控制器的任务是通过调整操纵变量（如物流流量、阀门开度等），使关键过程变量（产品纯度、液位、温度等）保持在最优值，从而使过程操作保持最优。图13.2展示了过程控制器的典型设置，以及该设置如何划分为智能体/环境框架。奖励被设计为参考信号、环境状态和控制器动作的某种合适组合。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_301_0.png)


    在过程工业中，尽管PID和MPC控制器已经非常成熟，但它们的缺点也是众所周知的。PID控制器在处理复杂的非线性系统时表现不佳，而MPC使用过程模型来求解优化问题，这使得在线动作计算对于大规模非线性系统变得不可行。此外，这两种控制器都会随着时间的推移而出现性能下降的问题（由于过程条件变化、过程漂移），需要定期维护。控制器维护需要重新识别过程模型，这可能既耗时又耗费资源，并且可能需要干扰正常的工厂操作以收集训练数据。


    鉴于当前过程控制器技术的上述问题以及强化学习近期的成功，利用强化学习技术进行过程控制的兴趣被重新点燃。最近的几项研究<sup>66</sup>已经证明了基于强化学习的控制器如何能够提供优越的性能。无需在线优化（因为最优动作策略是预先计算的）、通过使用新的过程数据持续学习可以轻松适应变化环境下的动作策略，这些特点使得基于强化学习的控制器非常有前景。


    > <sup>66</sup> Cassol et. al., Reinforcement learning applied to process control:
    A Van der Vusse reactor case study, Computer Aided Chemical Engineering, 2018

    > Rajesh Siraskar, Reinforcement learning for control of valves, Machine Learning
    with Applications, 2021

    > Ma et. al., Continuous control of a polymerization system with deep reinforcement
    learning, Journal of Process Control, 2019


    你可能对在真实工厂环境中训练强化学习智能体略有顾虑，因为在训练的早期阶段生成的动作可能“非常糟糕”，甚至不安全。此外，对于复杂系统，可能需要数千次交互才能达到一个相当不错的策略；工厂经理肯定永远不会同意这样做！这些都是合理的担忧，因此，常见的做法是使用足够精确的工厂模型，并在模拟环境中离线训练强化学习智能体。一旦离线学习完成，学习过程就可以关闭，然后将强化学习智能体部署到真实工厂中。然而，有几个充分的理由可以在部署后保持学习开启（持续或间歇性地）。首先，你的工厂模型可能不是100%准确的。因此，强化学习智能体可能会利用一些在线交互来微调其策略。其次，如前所述，工厂行为可能会随时间变化，智能体需要调整其策略以重新适应其环境的变化。


    这一讨论也引出了无模型强化学习与基于模型的强化学习的对比。无模型强化学习在训练期间不使用任何环境/工厂模型，其策略完全基于与真实环境的交互来学习。而基于模型的强化学习则使用模型来模拟环境或辅助学习算法。


    ## 13.2 强化学习术语与数学概念


    我们已经对强化学习给予了足够的赞誉。现在让我们深入了解强化学习的实际工作原理。为此，我们将首先学习一些强化学习术语和概念。在此快速声明一下，其中一些新概念可能看起来“抽象”且不能立即有用。但是，随着你阅读本章，我们保证所有的点都会连接起来，它们的效用将变得“显而易见”。


    ## 环境与马尔可夫决策过程


    虽然非正式地说，环境是强化学习智能体交互的任何事物，但在正式场合，它被表示为马尔可夫决策过程。一个MDP之所以如此命名，是因为它表现出马尔可夫性质，即从状态
    **s**<sub>t</sub> 到 **s**<sub>t+1</sub> 的转移（概率）仅取决于最近的状态（sₜ）和动作（aₜ）。这种无记忆特性在强化学习中很重要，因为它允许智能体在决定下一个最优动作时只考虑当前状态，而无需担心之前采取了哪些动作才到达sₜ。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_303_0.png)


    图13.3：MDP中的转移仅取决于当前状态和动作


    在MDP中，选择能够完全表征环境状态并使智能体能够据此行动的特征变得至关重要。例如，考虑以下控制储罐液位的问题


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_303_1.png)


    这里，l、lₛₚ以及l的变化率可以用来定义环境状态。lₛₚ也可以用l - lₛₚ作为替代公式。根据你的问题表述，过去的数据也可能被包含在状态向量中，以辅助智能体的决策。


    ## 奖励与回报


    在执行一个动作（aₜ）后，强化学习智能体会收到一个奖励信号（rₜ₊₁），该信号量化并告知智能体处于新状态（sₜ₊₁）并采取动作aₜ的好坏程度。考虑以下智能体从时间t开始在执行任务期间与环境交互的序列。


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_303_2.png)


    智能体的任务是采取能够最大化任务过程中累积奖励（也称为回报）的动作。回报可以表示为 $R_t = \sum_{k=1}^{T-t} r_{t+k}$。然而，这种直接求和对于没有明确结束状态的任务可能会造成问题。液位控制任务就是一个这样的例子，其中
    $T=\infty$（因为任务是永远控制液位！）。为了保持 $R_t$ 有界，使用以下公式代替


    $$R_t = r_{t+1} + \gamma r_{t+2} + \gamma^2 r_{t+3} + \dots + \gamma^{T-t-1} r_T
    = \sum_{k=1}^{T-t} \gamma^{k-1} r_{t+k}$$


    *公式 1*


    公式（1）中的回报称为折扣回报，其中 $\gamma \in (0, 1)$。未来的奖励越远，其重要性就越低。$\gamma$ 接近0会使智能体在选择 $a_t$
    时只考虑即时奖励（$r_{t+1}$），而 $\gamma$ 接近1则使长期奖励变得重要。


    折扣奖励最大化的概念是一种优雅（且数学上易于处理）的方式，使强化学习智能体同时关注即时和未来奖励。对于液位控制问题，一个自然的奖励函数是跟踪误差的平方


    $$r_t = -(l_t - l_{sp})^2$$


    奖励函数的适当设计非常重要，因为它强烈影响智能体的决策和强化学习训练的收敛性。


    ## 策略


    策略是强化学习智能体用于在给定 $s_t$ 的情况下确定 $a_t$ 的规则或映射。策略可以是确定性的或随机的。确定性策略提供一个单一动作


    $$a_t = \mu(s_t)$$


    而随机策略（$\pi$）提供一个动作集上的概率分布


    $$\pi(a|s_t) = \text{在状态 } s_t \text{ 下采取动作 } a \text{ 的概率}$$


    强化学习的目标是学习一个能提供最大回报的策略。最优策略通常表示为 $\mu^*$ 或 $\pi^*$。


    ## 价值函数


    强化学习算法经常使用价值函数。状态价值函数 $V_{\mu}(s)$ 给出了智能体处于状态 $s$ 并根据某个策略 $\mu$ 行动所期望获得的回报。


    $$V_{\mu}(s) = E[R_t | s_t = s, \text{策略 } \mu]$$


    状态-动作价值函数 $Q_{\mu}(s, a)$ 是另一个有用的函数，它给出了从状态 $s$ 采取任意动作（不一定遵循策略 $\mu$）然后遵循策略 $\mu$
    所期望获得的回报。


    $$Q_{\mu}(s, a) = E[R_t | s_t = s, a_t = a, \text{策略 } \mu]$$


    当遵循最优策略 $\mu^*$ 时，价值函数表示为 $V^*(s)$ 和 $Q^*(s,a)$。在上述定义中，我们对回报取期望（$E[.]$），因为现实环境是不确定和随机的，即在状态
    $\mathbf{s}_t$ 下采取动作 $\mathbf{a}_t$ 可能在不同的迭代中导致略有不同的 $\mathbf{s}_{t+1}$。这种转移不确定性可以表示为概率
    $P(s_{t+1} = s'' | s_t = s, a_t = a)$。上述定义在计算回报时包含了这个转移概率。


    ## 贝尔曼方程


    价值函数也可以用递归形式表示。考虑最优状态函数，


    $$V^*(s) = E[R_t | s_t = s, \mu^*]$$

    $$= E[\mathbf{r}_{t+1} + \gamma \mathbf{r}_{t+2} + \gamma^2 \mathbf{r}_{t+3} +
    \cdots | s_t = s, \mu^*]$$

    $$= E[\mathbf{r}_{t+1} + \gamma R_{t+1} | s_t = s, \mu^*]$$

    $$= E[\mathbf{r}_{t+1} + \gamma V^*(s_{t+1}) | s_t = s, \mu^*]$$


    最优状态-动作价值也可以类似地重写为


    $$Q^*(s, a) = E[\mathbf{r}_{t+1} + \gamma Q^*(s_{t+1}, \mu^*(s_{t+1})) | s_t =
    s, a_t = a]$$

    $$\text{或}$$

    $$Q^*(s, a) = E[\mathbf{r}_{t+1} + \gamma \max_{a''} Q^*(s_{t+1}, a'') | s_t =
    s, a_t = a]$$


    再次注意，$s_{t+1} \sim P(s_{t+1} = s'' | s_t = s, a_t = a)$，并且是根据环境的转移概率进行采样的。上述递归方程，也称为贝尔曼方程，是许多强化学习算法的核心。贝尔曼方程简单地指出，当前状态（或状态-动作）的价值是即时奖励与环境接下来进入的任何状态的价值之和。'

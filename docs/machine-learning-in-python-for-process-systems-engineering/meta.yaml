    $$\Gamma_{ij} = 0.9^{|i-j|}, \quad (i, j = 1, 2, \cdots, 40)$$


    Figure 4.3 shows the target data in the training dataset and the input data. From
    these plots, it is not immediately clear whether an input is (more) relevant for
    prediction of the target or not. A multivariate linear regression with all the
    inputs gives a $R^2$ value of 0.614 on the validation dataset, while using only

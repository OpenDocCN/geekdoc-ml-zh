  md: '# 8.5 Multimode Process Monitoring via GMM for Semiconductor Manufacturing
    Process


    Due to probabilistic formulation, GMM is widely applied for monitoring process
    systems. In this section, we will study one such application for the metal etch
    process. Figure 8.16 shows the metal etch calibration and faulty batches in the
    PCA score space. It is apparent that the faulty batches tend to lie away from
    the calibration clusters. Our objective is to develop a GMM-based monitoring tool
    that can automatically detect these faulty batches.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_202_0.png)


    # Process monitoring/Fault detection index


    A straightforward approach to detect a faulty batch would be to build separate
    ellipsoidal boundary or $T^2$ control chart for each cluster/mode and check if
    the $T^2$ metric for the faulty batch falls outside the control limits for all
    the clusters. However, monitoring many control charts can become tedious when
    the number of gaussian components is high. For convenience, the local metrics/charts
    can be combined to generate a single global metric/chart. We will follow the approach
    of Xie & Shi$^{40}$ (an alternative approach is provided by Yu & Qin$^{39}$).
    For a test data point, $x_t$, local Mahalanobis distance is computed from each
    cluster


    $D_{local}^{(k)}(x_t) = (x_t - \mu_k)^T \Sigma_k^{-1} (x_t - \mu_k)$'
  merge: -1
  pgno: 202
- img_proc: true
  md: "The global metric is then computed using the posterior probabilities of the\
    \ test sample to each gaussian component\n\n$$D_{global}(\\boldsymbol{x}_t) =\
    \ \\sum_{k=1}^K P(C_k|\\boldsymbol{x}_t) D_{local}^{(k)}(\\boldsymbol{x}_t)$$\n\
    \nThe control limit for $D_{global}$ can be obtained using an $F$ distribution\n\
    \n$$D_{global,CL} = \\frac{r(N^2-1)}{N(N-r)} F_{r,N-r}(\\alpha)$$\n\n$F_{r,N-r}(\\\
    alpha)$ is the $(1-\\alpha)$ percentile of the $F$ distribution with $r$ and $n-r$\
    \ degrees of freedom, $r$ is variable dimension (we performed GMM in PCA score\
    \ space with 3 latent variables, therefore, $r = 3$). Test sample is considered\
    \ abnormal if $D_{global} > D_{global, CL}$.\n\n```\n# global Mahalanobis distance\
    \ metric\nDglobal_train = np.zeros((score_train.shape[0],))\n\nfor i in range(score_train.shape[0]):\n\
    \    x = score_train[i,:,np.newaxis]\n    probs = gmm.predict_proba(x.T)\n   \
    \ \n    for component in range(3):\n        Dlocal = np.dot(np.dot((x-gmm.means_[component,:,np.newaxis]).T,\n\
    \        np.linalg.inv(gmm.covariances_[component,:,:])), (x-gmm.means_[component,:,np.newaxis]))\n\
    \        \n        Dglobal_train[i] = Dglobal_train[i] + probs[0,component]*Dlocal\n\
    \n# Dglobal control limit\nN = score_train.shape[0]\nr = 3\nalpha = 0.05 # 95%\
    \ control limit\nDglobal_CL = r*(N**2-1)*scipy.stats.f.ppf(1-alpha, r, N-r)/(N*(N-r))\n\
    \n# Dglobal control chart\nplt.figure()\nplt.plot(Dglobal_train)\nplt.plot([1,\
    \ len(Dglobal_train)], [Dglobal_CL, Dglobal_CL], color='red')\nplt.xlabel('Sample\
    \ #'), plt.ylabel('D_global for training data')\n```\n\nFigure 8.17 shows the\
    \ control chart for the training data."

    \nData density estimation via KDE has other uses as well. Samples in low-density\
    \ regions can be segregated from high density regions and discarded as outliers.\
    \ You can use KDE for the scenario shown in Figure 4.15 for your data pre-processing.\
    \ Additionally, a process monitoring tool can be built using KDE as well by employing\
    \ the logic that a test sample falling in low density regions (as estimated from\
    \ training data) would be an abnormal sample. For all these applications, the\
    \ procedure for building KDE models remains the same.\n\n## 10.3 kNN: An Introduction\n\
    \nThe k-nearest neighbor (kNN) is a versatile technique based on a simple intuitive\
    \ idea that the label/value for a new sample can be obtained from the labels/values\
    \ of closest neighboring samples (in the feature space) from the training dataset.\
    \ The parameter $k$ denotes the number of neighboring samples utilized by the\
    \ algorithm. As shown in Figure 10.7, kNN can be used for both classification\
    \ and regression. For classification, kNN assigns test sample to the class that\
    \ appears the most amongst the $k$ neighbors. For regression, the predicted output\
    \ is the average of the value of the $k$ neighbors. Due to its simplicity, kNN\
    \ is widely used for pattern classification and was included in the list of top\
    \ 10 algorithms in data mining.$^{47}$\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_236_0.png)\n\
    \n> kNN belongs to the class of lazy learners where models are not built explicitly\
    \ until test samples are received. At the other end of the spectrum, eager learners\
    \ (like, SVM, decision trees, ANN) 'learn' explicit models from training samples.\
    \ Unsurprisingly, training is slower, and testing is faster for eager learners.\
    \ kNN requires computing the distance of the test sample from all the training\
    \ samples, therefore, kNN also falls under the classification of instance-based\
    \ learning. Instance-based learners make predictions by comparing the test sample\
    \ with training instances stored in memory. On the other hand, model-based learners\
    \ do not need to store the training instances for making predictions.\n\n### Conceptual\
    \ background\n\nApart from an integer $k$ and input-output training pairs, kNN\
    \ algorithm needs a distance metric to quantify the closeness of a test sample\
    \ with the training samples. The standard Euclidean metric is commonly employed.\
    \ Once the nearest neighbors have been determined, two approaches, namely uniform\
    \ and distance-based, can be employed to decide weights assigned to each neighbor\
    \ which impacts the neighbor's contribution in prediction. In uniform weighting,\
    \ all $k$ neighbors are treated equally while, in distance-based weighting, each\
    \ of the $k$ neighbors is weighted by the inverse of their distance from the test\
    \ sample so that closer neighbors will have greater contributions. The figure\
    \ below illustrates the difference between the two weight schemes for a classification\
    \ problem\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_237_0.png)\n\nFigure 10.8:\
    \ Illustration on impact of weight-scheme on kNN output. Dashed circles are for\
    \ distance references.\n\nIn Figure 10.8, with uniform weighting (also called\
    \ majority voting for classification problems), the test sample is assigned to\
    \ class 1 for $k = 1$ or 3 and class 2 for $k = 6$. For $k = 8$, no decision can\
    \ be made. With distance-weighting, test sample is always classified as class\
    \ 1 for k = 1, 3, 6, or 8. This illustration shows that distance weighting can\
    \ help reduce the prediction dependence on the choice of $k$.\n\nFor predictions,\
    \ kNN needs to compute the distance of test samples from all the training samples.\
    \ For large training sets, this computation can become expensive. However, specialized\
    \ techniques, such as KDTree and BallTree, have been developed to speed up the\
    \ extraction of neighboring points without impacting prediction accuracies. These\
    \ techniques utilize the structure in data to avoid computing distances from all\
    \ training samples. The NearestNeighbors implementation in scikit-learn automatically\
    \ selects the algorithm best suited to the problem at hand. The KNeighborsRegressor\
    \ and KNeighborsClassifier modules are provided by scikit-learn for regression\
    \ and classification, respectively.\n\nA couple of things to pay careful attention\
    \ in kNN include variable selection and variable scaling. Variables that are not\
    \ important for output predictions should be removed; otherwise unimportant variables\
    \ will undesirably impact the determination of nearest neighbors. Further, the\
    \ selected variables should be properly scaled to ensure that variables with large\
    \ magnitudes do not dwarf the contribution of other variables during distance\
    \ computations.\n\n### Deciding kNN hyperparameters\n\nThe choice of the hyperparameter,\
    \ $k$, is critical and is the knob to balance underfitting and overfitting. Small\
    \ $k$ can lead to overfitting where noisy measurements unfavorably impact the\
    \ predictions. Large $k$ can reduce the effect of noise but can lead to underfitting\
    \ as it over-smooths the predictions for regression or make classification boundaries\
    \ less distinct. Unfortunately, there is no standard guidance on the choice of\
    \ $k$. The optimal value depends on the data and can be estimated via cross-validation.\n\
    \n### Applications of kNN for process systems\n\nAs alluded to before, kNN method\
    \ is often employed for equipment condition monitoring<sup>48</sup>. For process-level\
    \ monitoring, kNN classification can be used to classify process abnormalities\
    \ into distinct fault classes if sufficient historical faulty samples are available.\
    \ As opposed to kNN fault classification, an interesting adaptation of kNN for\
    \ fault detection was proposed by He & Wang that made use of only normal operation\
    \ data<sup>49</sup>. We will study this application in more detail in the next\
    \ section.\n\nA few other notable applications of kNN for process systems include\
    \ the work of Facco et al. on automatic maintenance of soft sensors<sup>50</sup>,\
    \ Borghesan et al. on forecasting of process disturbances<sup>51</sup>, Cecilio\
    \ et al. on detecting transient process disturbances<sup>52</sup>, and Zhou et\
    \ al. on fault identification in industrial processes<sup>53</sup>. These applications\
    \ may not utilize the kNN method directly for classification or regression, but\
    \ use the underlying concept of similarity of nearest neighbors.\n\n<sup>48</sup>\
    \ Dong Wang, K-nearest neighbors based methods for identification of different\
    \ gear crack levels under different motor speeds and loads: Revisited, Mechanical\
    \ Systems and Signal Processing, 2016\n<sup>49</sup> He and Wang, Fault detection\
    \ using k-nearest neighbor rule for semiconductor manufacturing processes, IEEE\
    \ Transactions on Semiconductor Manufacturing, 2007.\n<sup>50</sup> Facco et al.,\
    \ Nearest-neighbor method for the automatic maintenance of multivariate statistical\
    \ soft sensors in batch processing, Industrial Engineering & Chemistry Research,\
    \ 2010.\n<sup>51</sup> Borghesan et al., Forecasting of process disturbances using\
    \ k-nearest neighbors, with an application in process control, Computers and Chemical\
    \ Engineering, 2019.\n<sup>52</sup> Cecilio et al., Nearest neighbors methods\
    \ for detecting transient disturbances in process and electromechanical systems,\
    \ Journal of Process Control, 2014.\n<sup>53</sup> Zhou et al., Fault identification\
    \ using fast k-nearest neighbor reconstruction, Processes, 2019"

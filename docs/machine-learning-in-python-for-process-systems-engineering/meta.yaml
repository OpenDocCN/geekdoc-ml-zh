    \n# PCA\nfrom sklearn.decomposition import PCA\npca = PCA(n_components = 3)\n\
    score_train = pca.fit_transform(data_train_normal)\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_189_0.png)\n\
    \n图8.4：金属蚀刻数据集中校准批次的PC1和PC2得分图\n\n图8.4证实了存在3种操作模式。虽然对得分图的目视检查可以帮助决定聚类数量，但我们仍将学习如何以更自动化的方式估计这一点。\n\
    \n## 8.2 基于质心的聚类：K-Means\n\nK-Means是最受欢迎的聚类算法之一，因其概念简单、易于实现和计算效率高。设$K$表示聚类数量，$\\\
    {x_i\\}, i = 1, \\dots, N$为N个m维点的集合。数据点的聚类分配被确定为使以下误差平方和（也称为聚类惯性）最小化\n\n$$SSE\
    \ = \\sum_{k=1}^{K} \\sum_{x_i \\in k^{th}cluster} ||x_i - \\mu_k||_2^2$$\n\n\
    这里，$\\mu_k$是第$k^{th}$个聚类的质心，$||x_i - \\mu_k||_2^2$表示$x_i$到$\\mu_k$的欧几里得距离。为了解决方程1，k-means采用以下直观的迭代过程。\n\
    \n- 随机选择K个数据点作为初始质心或聚类中心\n- 将每个数据点分配给最近的聚类中心\n- 使用数据点的当前聚类分配重新计算每个聚类的质心\n- 重复步骤2和3直到收敛\n\
    \n让我们将k-means应用于我们的金属蚀刻数据集。\n\n```python\n# fit k-means model\nn_cluster = 3\n\

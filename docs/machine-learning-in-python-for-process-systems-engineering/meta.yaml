    all the variables better than the forward SFS but can entail higher number of
    model fittings when $k$ is much lower than the number of input candidates.


    # Sklearn implementation


    Sklearn provides RFE and SequentialFeatureSelector classes that transform raw
    input data matrix into relevant subset using any specified estimator/model. Below
    is an implementation for backward SFS using linear regression model.


    ```

    # scale data

    from sklearn.preprocessing import StandardScaler

    xscaler = StandardScaler()

    X_scaled = xscaler.fit_transform(X)


    yscaler = StandardScaler()

    y_scaled = yscaler.fit_transform(y[:,None])


    # implement backward SFS

    from sklearn.feature_selection import SequentialFeatureSelector

    from sklearn.linear_model import LinearRegression


    BSFS = SequentialFeatureSelector(LinearRegression(), n_features_to_select=10,
    direction=''backward'', cv=5).fit(X_scaled, y_scaled)


    # check selected inputs

    print(''Inputs selected: '', BSFS.get_support(indices=True)+1)


    >>> Inputs selected: [18 19 20 21 22 23 24 25 31 33]


    # reduce X to only top relevant inputs

    X_relevant = BSFS.transform(X)

    ```


    We can see that wrapper method has performed much better than filter method and
    has recovered 8 out of 10 relevant inputs! Another impressive thing to highlight
    here is how SequentialFeatureSelector allows condensing all the complexities of
    SFS variable selection with cross-validation into just a couple of lines of code!!'
  - '[PAGE 92]


    # Embedded methods


    Embedded methods make use of algorithms where selection of variables is an inherent
    part of the model fitting process itself. We already saw one of the methods in
    the previous chapter, Lasso regression, where irrelevant inputs are eventually
    removed from model by assigning them zero coefficients. Decision trees and random
    forests are another set of algorithms which directly provide feature importances
    after model fitting. We will study them in Chapter 9.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_92_0.png)


    Embedded methods are computationally less expensive than wrapper methods and work
    best when the number of samples are much higher than the number of inputs. Below
    is a quick implementation of Lasso regression for our simulated dataset where
    we use the model coefficients to judge any input''s importance.


    # Sklearn implementation


    We will employ LassoCV model which automatically selects a penalization strength
    using cross-validation. As shown, Lasso has recovered 8 out of 10 relevant inputs.


    ```

    # fit Lasso model

    from sklearn.linear_model import LassoCV

    Lasso_model = LassoCV(cv=5).fit(X_scaled, y_scaled)


    # find the relevant inputs using model coefficients

    top_k_inputs = np.argsort(abs(Lasso_model.coef_))[::-1][:10] + 1

    print(''Relevant inputs: '', top_k_inputs)


    >>> Relevant inputs: [21 22 20 23 24 19 25 18 33 14]

    ```


    This concludes our look into the variable selection methods. The presence of nonlinearity,
    input interactions, computational resource availability, and the number of input
    candidates influence the eventual method selection. You are now familiar with
    the mechanism of these methods which should help you choose the method most suitable
    for your problem.'
  - '[PAGE 93]


    > Feature extraction and feature selection are similar in the sense that both
    achieve feature dimension reduction. Feature extraction creates new features by
    using all the original features and therefore does not help in simplification
    of original measurement space. The focus is more on dimensionality reduction and
    removal of correlation among the features. Feature selection, as we have seen,
    discards irrelevant features altogether. Here the focus is on improved model performance
    with simpler physical interpretation due to low number of model inputs.


    # 4.3 Outlier Handling


    Outliers are abnormal observations that are inconsistent with the majority of
    the data. Presence of outliers in the training dataset results in a model that
    does not adequately represent the true process and therefore negatively impacts
    its prediction accuracy. It is imperative to remove outliers before model fitting
    or use a modeling algorithm that is robust to outliers.


    Several methods are at our disposal - the choice depends on whether we are dealing
    with univariate or multivariate system, the degree of outlier contamination, gaussian
    or non-gaussian data distribution, etc. Figure 4.8 lists some of these methods
    that are commonly employed.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_93_0.png)


    # Univariate methods


    Univariate methods clean each variable separately. The 3-sigma rule and Hampel
    identifier are the popular methods available under this category.'
  - '[PAGE 94]


    # 3σ rule


    The 3-sigma rule works as follows: if **μ** and **σ** denote the mean and standard
    deviation of a variable, then any sample beyond the range **μ ± 3σ** are considered
    as outliers. This rule follows from the properties of a gaussian-distributed variable
    for which 99.87% of data lie within the **μ ± 3σ** range. However, by using a
    factor other than 3, this rule is often used for non-gaussian variables as well.


    # Hampel identifier


    You will agree than the **3σ** rule is quite simple and easy to implement. Expectedly,
    it has some limitations. If a variable is severely contaminated with outliers,
    then **μ** and **σ** can get impacted to such an extent that abnormal samples
    end up falling within the **μ ± 3σ** range and fail to be identified as outliers.
    The solution is to use Hampel identifier which replaces **μ** and **σ** with median
    and MAD, respectively. For any variable x, Hampel identifier tags an observation
    as an outlier if it lies outside the range **median(x) ± 3σ<sub>MAD</sub>** where
    **σ<sub>MAD</sub> = 1.4826 * median(|x - median(x)|)**.


    We worked with median and MAD in the previous chapter for robust scaling. Using
    the same dataset, Figure 4.9 now illustrates the effectiveness of Hampel identifier
    for univariate outlier detection. The ‘normal range’ computed using 3-sigma rule
    is inflated enough to include all the data within the normal range! Hampel identifier,
    however, provides a normal range which is more representative of the normal data
    and therefore can flag the abnormal samples as outliers. We can see that Hampel
    identifier provides quite a superior performance with very minimal additional
    complexity.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_94_0.png)'
  - '[PAGE 95]


    # Multivariate methods


    In process dataset where variables are highly correlated, outliers can escape
    detection when variables are ‘cleaned’ separately. For example, consider Figure
    4.10. The red samples are clearly outliers in the 2D space. However, if we look
    only along the x1 (or x2) axis alone, these abnormal samples lie close to the
    center of the data distribution, and therefore will not be considered outliers
    in univariate sense.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_95_0.png)


    Figure 4.10: Outliers in 2D space difficult to detect via univariate methods


    The solution is to use multivariate methods of outlier detection. These methods
    take into consideration the shape of multivariate data distribution and are often
    based on using some distance metrics to flag samples that are far away from the
    center of data distribution. Let’s study these methods in detail.


    # Mahalanobis distance


    Mahalanobis distance (MD) is a classical multivariate distance measure that takes
    into account the covariance/shape of data distribution for computing distances
    from the center of data. Specifically, MD of any observation $x_n$ is given by


    $MD(x_n) = \sqrt{(x_n - \bar{x})\Sigma^{-1}(x_n - \bar{x})^T}$


    where $\bar{x}$ and $\Sigma$ are mean and covariances of the sampled observations.
    The presence of $\Sigma$ differentiates MD from Euclidean distance. Computation
    of MD essentially converts a multivariate outlier detection problem into a univariate
    problem. For illustration, Figure 4.11 shows the MDs for the dataset from Figure
    4.10. We can see that the outlier samples are clearly very distinct from the normal
    samples and can be easily flagged via univariate techniques.'
- md: '## MCD estimator


    Consider the data distribution and its Mahalanobis distances in Figure 4.12. Here
    again a bunch of samples lie away from the normal data, but, as shown, the MD-based
    method fails miserably in detecting all the outliers. So, what happened here?


    What’s happening here is that the outliers are distorting the estimated shape/covariance
    structure of the data distribution. As shown in the middle subplot, the contours
    of MDs have been inflated to such an extent that MDs of several outliers are similar
    to those of inliers. This unwanted effect is called masking effect. Moreover,
    if inliers get classified as outliers due to the impact of outliers, it is called
    swamping effect.


    Previously, in univariate methods, we saw that a robust outlier detection solution
    can be obtained by utilizing robust estimates of data location and spread. Similar
    concept exists for multivariate methods. A popular estimator of location (centroid)
    and scatter (covariance matrix) is MCD (Minimum Covariance Determinant). MCD finds
    $h$ samples out of the whole dataset for which the covariance matrix has lowest
    determinant, or, simply speaking, the enveloping ellipsoid for a given confidence
    level has lowest volume among all possible subsets of size $h$. The centroid and
    covariance of $h$ samples are returned as robust estimates.


    The MinCovDet class in Sklearn implements a FAST-MCD algorithm which can efficiently
    analyze large datasets with high dimensionalities. The superior performance of
    this method is validated in Figure 4.13. The MD contours now fit the inlying samples
    much better and the outliers are well beyond the computed upper bound. Note that
    Sklearn provides a EllipticEnvelop class that uses FAST-MCD to directly detect
    an outlier but requires specification of data contamination level which may not
    be known beforehand. The code below shows the computation of MCD-based MDs; bound
    are computed as before.


    ```

    # read data

    import numpy as np

    data_2Doutlier = np.loadtxt(''complex2D_outlier.csv'', delimiter='','')


    # compute MCD-based Mahalanobis distances

    from sklearn.covariance import MinCovDet


    MCD_cov = MinCovDet().fit(data_2Doutlier)

    MD_MCD = MCD_cov.mahalanobis(data_2Doutlier)

    ```


    Figure 4.13: Multivariate outlier detection via MCD-based robust Mahalanobis distances


    ## PCA


    Not all outliers are bad and warrant removal. For example, consider Figure 4.14.
    Here, two kinds of outliers are highlighted. While samples A tend to break away
    from the majority correlation, samples B follow the correlation but lie far away
    from the majority of data.


    Figure 4.14: Different types of outliers which can be distinguished via PCA


    Depending on the context of our problem, we may or may not want to remove samples
    B. The MD-based approach won''t distinguish between these two kinds of outliers
    and therefore, won''t work for us if we want to retain samples B. In that case,
    PCA (principal component analysis) can be employed. We will learn PCA in detail
    in Chapter 5. There you will understand how PCA distinguishes between these two
    different kinds of outlying observations. Classical PCA is based on sample covariance
    of data. Therefore, if the given dataset is highly contaminated with outliers,
    MCD-based covariance can be used in PCA for robust analysis.


    ## Data-mining methods


    The multivariate methods we studied in previous section make an implicit assumption
    about gaussianity or unimodality of data distribution. In real life, it is not
    rare to encounter situations where these assumptions do not hold. One such data
    distribution is shown in Figure 4.15, where 3 distinct clusters of data is present
    with outliers in between them. MD or PCA-based approach will fail here!


    Advanced data-mining methods are employed to handle these complicated situations.
    The methods can be categorized into density-based, clustering-based, and neighbor-based.
    Density-based methods (like KDE) rely on estimation of distribution density of
    the data; observations lying in low-density regions are flagged as outliers. Cluster-based
    methods (like GMM, Kmeans) find distinct clusters of data; samples belonging to
    small-sized or low-importance clusters are flagged as outliers. Neighbor-based
    methods (like KNN, LOF) rely on finding the neighbors of each data-point. Neighboring
    data-points are used to compute any sample''s distance from its k-nearest neighbor
    or the local density; samples with large distances or low densities are flagged
    as outliers.


    We will study most of these techniques in Part 2 of the book. Once you study their
    nuances, you will realize that these are very powerful and useful methods but
    do require careful selection of their intrinsic model parameters such as the number
    of clusters in Kmeans, number of neighbors in LOF, or the kernel function & its
    width in KDE.


    > Time-series or dynamic dataset require different approaches for outlier detection.
    A common practice is to first model the given dataset using an appropriate time-series
    modeling technique such as ARIMA or ARX and compute residuals between model prediction
    and given data. With properly chosen model, residuals will be approximately normally
    distributed and uncorrelated. Then, any traditional outlier detection method can
    be applied on the residuals. The outliers will tend to have large residuals and
    will get flagged.


    ## Outlier-resistant robust techniques


    The outlier-handling method we studied till now relied on explicit identification
    of outliers. Once identified, these outliers are removed from model fitting dataset
    before model parameter estimation. There is another set of methods, called robust
    methods**+, which directly use outlier-contaminated data for model fitting. These
    algorithms are designed such that the effect of outliers is reduced by down-weighting
    them and only inliers primarily determine the model parameters.


    Figure 4.16 illustrates an application of robust linear regression using RANSAC
    algorithm in Sklearn. The robust method is able to successfully ignore the outliers
    to find the correct fit between target and predictor.


    IRPLS (iteratively re-weighted PLS) is another popular robust regression method
    using PLS. Most of the outlier-resistant robust methods employ iterative algorithm
    where model parameters are computed iteratively and samples with high residuals
    identified in each iteration are assigned lower weights.


    *Zhu et. al., Review and big data perspectives on robust data mining approaches
    for industrial process modeling with outliers and missing data, Annual Reviews
    in Control, 2018

    + Frosch + Bro, Robust methods for multivariate data analysis, Journal of Chemometrics,
    2005


    This concludes our study of methods for outlier detection. Our objective was to
    help you understand the pros and cons of different techniques because there is
    no universal method applicable to all problems. A good understanding of the underlying
    process and the nature of data can greatly help make the right choice of technique.'
  mdcn: '## MCD 估计器


    考虑图 4.12 中的数据分布及其马氏距离。这里同样有一批样本远离正常数据，但如图所示，基于 MD 的方法在检测所有异常值时彻底失败了。那么，这里发生了什么？


    这里发生的情况是，异常值扭曲了数据分布的估计形状/协方差结构。如中间子图所示，MD 的等高线已被膨胀到如此程度，以至于几个异常值的 MD 与内点的 MD 相似。这种不希望出现的效应被称为**遮蔽效应**。此外，如果内点由于异常值的影响而被归类为异常值，则称为**淹没效应**。


    先前，在单变量方法中，我们看到通过利用数据位置和离散度的稳健估计，可以获得稳健的异常值检测解决方案。类似的概念也存在于多变量方法中。一种流行的位置（质心）和离散度（协方差矩阵）估计器是
    MCD（最小协方差行列式）。MCD 从整个数据集中找到 $h$ 个样本，使得协方差矩阵的行列式最小，或者简单地说，对于给定的置信水平，其包络椭球体在所有大小为
    $h$ 的可能子集中体积最小。$h$ 个样本的质心和协方差作为稳健估计返回。


    Sklearn 中的 MinCovDet 类实现了一种 FAST-MCD 算法，可以高效地分析高维大型数据集。该方法的优越性能在图 4.13 中得到了验证。现在
    MD 等高线更好地拟合了内部样本，异常值则远超计算出的上界。请注意，Sklearn 提供了一个 EllipticEnvelop 类，它使用 FAST-MCD
    直接检测异常值，但需要指定数据污染水平，而这可能事先未知。下面的代码展示了基于 MCD 的 MD 计算；边界计算方式与之前相同。


    ```

    # read data

    import numpy as np

    data_2Doutlier = np.loadtxt(''complex2D_outlier.csv'', delimiter='','')


    # compute MCD-based Mahalanobis distances

    from sklearn.covariance import MinCovDet


    MCD_cov = MinCovDet().fit(data_2Doutlier)

    MD_MCD = MCD_cov.mahalanobis(data_2Doutlier)

    ```


    图 4.13：通过基于 MCD 的稳健马氏距离进行多变量异常值检测


    ## PCA


    并非所有异常值都是有害的并需要移除。例如，考虑图 4.14。这里突出了两种异常值。样本 A 倾向于脱离大多数相关性，而样本 B 遵循相关性但远离大多数数据。


    图 4.14：可以通过 PCA 区分的不同类型的异常值


    根据我们问题的背景，我们可能希望也可能不希望移除样本 B。基于 MD 的方法无法区分这两种异常值，因此，如果我们想保留样本 B，它将不适用。在这种情况下，可以采用
    PCA（主成分分析）。我们将在第 5 章详细学习 PCA。届时你将了解 PCA 如何区分这两种不同的异常观测。经典 PCA 基于数据的样本协方差。因此，如果给定数据集被异常值高度污染，可以在
    PCA 中使用基于 MCD 的协方差进行稳健分析。


    ## 数据挖掘方法


    我们在上一节研究的多变量方法对数据分布的高斯性或单峰性做出了隐含假设。在现实生活中，遇到这些假设不成立的情况并不少见。图 4.15 显示了这样一种数据分布，其中存在
    3 个不同的数据簇，异常值位于它们之间。基于 MD 或 PCA 的方法在这里会失败！


    采用高级数据挖掘方法来处理这些复杂情况。这些方法可分为基于密度的、基于聚类的和基于邻域的。基于密度的方法（如 KDE）依赖于估计数据的分布密度；位于低密度区域的观测被标记为异常值。基于聚类的方法（如
    GMM、Kmeans）寻找不同的数据簇；属于小型或低重要性簇的样本被标记为异常值。基于邻域的方法（如 KNN、LOF）依赖于寻找每个数据点的邻居。相邻数据点用于计算任何样本与其
    k 个最近邻的距离或局部密度；距离较大或密度较低的样本被标记为异常值。


    我们将在本书的第 2 部分研究其中的大部分技术。一旦你研究了它们的细微差别，你就会意识到这些是非常强大且有用的方法，但确实需要仔细选择其内在模型参数，例如
    Kmeans 中的聚类数、LOF 中的邻居数，或 KDE 中的核函数及其宽度。


    > 时间序列或动态数据集需要不同的异常值检测方法。常见的做法是首先使用适当的时间序列建模技术（如 ARIMA 或 ARX）对给定数据集进行建模，并计算模型预测与给定数据之间的残差。通过适当选择的模型，残差将近似正态分布且不相关。然后，可以对残差应用任何传统的异常值检测方法。异常值往往具有较大的残差，并会被标记出来。


    ## 抗异常值的稳健技术


    我们迄今为止研究的异常值处理方法依赖于显式识别异常值。一旦识别出来，这些异常值会在模型参数估计之前从模型拟合数据集中移除。还有另一类方法，称为稳健方法**+，它们直接使用受异常值污染的数据进行模型拟合。这些算法的设计使得通过降低异常值的权重来减少其影响，主要由内点决定模型参数。


    图 4.16 展示了在 Sklearn 中使用 RANSAC 算法进行稳健线性回归的应用。该稳健方法能够成功忽略异常值，找到目标与预测变量之间的正确拟合。


    IRPLS（迭代重加权 PLS）是另一种流行的使用 PLS 的稳健回归方法。大多数抗异常值的稳健方法采用迭代算法，其中模型参数被迭代计算，并且在每次迭代中识别出的具有高残差的样本被分配较低的权重。


    *Zhu et. al., Review and big data perspectives on robust data mining approaches
    for industrial process modeling with outliers and missing data, Annual Reviews
    in Control, 2018

    + Frosch + Bro, Robust methods for multivariate data analysis, Journal of Chemometrics,
    2005


    至此，我们完成了对异常值检测方法的研究。我们的目标是帮助你理解不同技术的优缺点，因为没有适用于所有问题的通用方法。对底层过程和数据性质的良好理解，可以极大地帮助做出正确的技术选择。'

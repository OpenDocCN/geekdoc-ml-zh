    # 6.3 FDA: An Introduction


    Fisher Discriminant Analysis (FDA), also called linear discriminant analysis (LDA),
    is a multivariate dimensionality reduction technique which maximizes the ‘separation’
    in the lower dimensional space between data belonging to different classes. For
    conceptual understanding, consider the simple illustration in Figure 6.8 where
    a 2D dataset (with 2 classes of data) has been projected onto 1D spaces by FDA
    and PCA. The respective 1-D scores show that while the two classes of data are
    well segregated in LD space, the segregation is very poor in PC space. This observation
    was expected because PCA, while determining the projection directions, does not
    consider information about different data classes. Therefore, if your intention
    is to reduce dimensionality for subsequent data classification and training data
    is labeled into different classes, then FDA is more suitable.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_148_0.png)


    Figure 6.8: Simple illustration of FDA vs PCA. The arrows in the x1 vs x2 plot
    show the direction vectors of 1st components of the corresponding methods


    Due to the powerful data discrimination ability of FDA, it is widely used in process
    industry for operating mode classification and fault diagnosis. Large-scale industrial
    processes often'
  - '[PAGE 149]


    experience different kinds of process issues/faults and it is imperative to accurately
    identify the specific issue quickly during online operations to minimize economic
    losses. During model training, FDA learns from data collected from historical
    process failures (data from a specific process fault form a class) to find the
    optimal projection directions and classify abnormal process data into specific
    faults in real-time. We will study one such application in this chapter.


    # Mathematical background


    To facilitate data classification, FDA not only maximizes the separation between
    the classes but also minimizes the variation/scatter within each class. To see
    how this is achieved, let us first consider a dataset matrix $X \in \mathbb{R}^{N
    \times m}$ consisting of $N$ samples, $N_1$ of which belong to class 1 ($\omega_1$)
    and $N_2$ belong to class 2 ($\omega_2$). FDA seeks to find a projection vector
    $w \in \mathbb{R}^m$ such that the projected scalars/samples ($z = w^T x$) are
    maximally separated. Let $\tilde{\mu}_1$ and $\tilde{\mu}_2$ denote the means
    of projected values of classes 1 and 2, respectively


    $$\tilde{\mu}_i = \frac{1}{N_i} \sum_{z \in \omega_1} z$$


    Class separation could be quantified as distance between the projected means $|\tilde{\mu}_1
    - \tilde{\mu}_2|$; this, however, is not a robust measure as shown by the illustration
    below.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_149_0.png)


    To quantify the variability within class $\omega_i$ we define a term called scatter,
    $\tilde{s}_i^2$


    $$\tilde{s}_i^2 = \sum_{z \in \omega_1} (z - \tilde{\mu}_i)^2$$


    The separation criterion is now defined as the normalized distance between the
    projected means. This formulation seeks to find a projection where the class means
    are far apart and samples from the same class are close to each other.


    $$J(w) = \frac{|\tilde{\mu}_1 - \tilde{\mu}_2|^2}{\tilde{s}_1^2 + \tilde{s}_2^2}$$'
  - '[PAGE 150]


    Using the base relation $y = w^T x$ and straightforward algebraic manipulations$^{31}$,
    one can equivalently represent the objective $J(w)$ as follows which also holds
    for any $(p)$ number of data classes


    $$J(w) = \frac{w^T S_b w}{w^T S_w w} \quad \text{eq. 9}$$


    $\mathbf{S}_b$ (between-class-scatter matrix) and $\mathbf{S}_w$ (within-class-scatter
    matrix) are defined as


    $$\mathbf{S}_b = \sum_{j=1}^{p} N_j (\boldsymbol{\mu}_j - \boldsymbol{\mu}) (\boldsymbol{\mu}_j
    - \boldsymbol{\mu})^T$$


    $$\mathbf{S}_w = \sum_{j=1}^{p} \mathbf{S}_j$$


    $$\mathbf{S}_j = \sum_{\mathbf{x}_i \in \omega_1} (\mathbf{x}_i - \boldsymbol{\mu}_j)(\mathbf{x}_i
    - \boldsymbol{\mu}_j)^T$$


    where, $\boldsymbol{\mu} \in \mathbb{R}^m$ and $\boldsymbol{\mu}_j \in \mathbb{R}^m$
    denote the mean vectors of all the N samples and $N_j$ samples from $j^{th}$ class,
    respectively, in the measurement space. The first FDA vector, $w_1$, is found
    by maximizing $J(w)$ and the subsequent vectors are found by solving the same
    problem with the added constraints of orthogonality to previously computed vectors.
    Note that there can be at most $p-1$ FDA vectors. Alternatively, like PCA, the
    vectors can also be computed as solutions of a generalized eigenvalue problem


    $$\mathbf{S}_w^{-1} \mathbf{S}_b w = \lambda w \quad \text{eq. 10}$$


    where $\lambda = J(w)$. Therefore, the eigenvalues ($\lambda_s$) indicate the
    degree of separability among the data classes when projected onto the corresponding
    eigenvectors. The first discriminant/FDA vector/eigenvector corresponds to the
    largest eigenvalue, the $2^{nd}$ FDA vector is associated with the $2^{nd}$ largest
    eigenvalue, and so on. Once the FDA vectors are determined, data-points can be
    projected, and classification models can be built in the reduced FDA space. Overall,
    FDA transformation from m dimensional space to $p-1$ dimensional FDA space can
    be represented as


    $$Z = W_p X$$


    where $W_p \in \mathbb{R}^{m \times (p-1)}$ contains the $p-1$ FDA vectors as
    columns and $Z \in \mathbb{R}^{N \times (p-1)}$ is the data-matrix in the transformed
    space where each row is the transformed sample. The transformed samples are optimally
    separated in the FDA space.'
- md: "## Dimensionality reduction for Tennessee Eastman Process\n\nTo demonstrate\
    \ the dimension reduction and class separability capabilities of FDA, let's use\
    \ data from 3 fault classes (fault 5, 10, and 19) in the TEP dataset. With 3 fault\
    \ classes, FDA will result in maximum 2 transformed dimensions. We will also perform\
    \ PCA for comparison.\n\n```python\n# fetch TEP data for faults 5,10,19\nTEdata_Fault5_train\
    \ = np.loadtxt('d05.dat')\nTEdata_Fault10_train = np.loadtxt('d10.dat')\nTEdata_Fault19_train\
    \ = np.loadtxt('d19.dat')\nTEdata_Faulty_train = np.vstack((TEdata_Fault5_train,\
    \ TEdata_Fault10_train,\nTEdata_Fault19_train))\n```\n\n```python\n# select variables\
    \ (discarding composition measurements for now)\nxmeas = TEdata_Faulty_train[:,0:22]\
    \ # 22 continuous process variables\nxmv = TEdata_Faulty_train[:,41:52] # 11 manipulated\
    \ variables\ndata_Faulty_train = np.hstack((xmeas, xmv))\n```\n\n```python\n#\
    \ generate sample labels\nn_rows_train = TEdata_Fault5_train.shape[0]\ny_train\
    \ = np.concatenate((5*np.ones(n_rows_train,), 10*np.ones(n_rows_train,),\n19*np.ones(n_rows_train,)))\n\
    ```\n\n```python\n# scale data\nfrom sklearn.preprocessing import StandardScaler\n\
    scaler = StandardScaler()\nFaultydata_train_scaled = scaler.fit_transform(data_Faulty_train)\n\
    ```\n\n```python\n# fit LDA model\nfrom sklearn.discriminant_analysis import LinearDiscriminantAnalysis\n\
    lda = LinearDiscriminantAnalysis()\nscores_train_lda = lda.fit_transform(Faultydata_train_scaled,\
    \ y_train)\n```\n\n```python\n# visualize LDA scores\nplt.figure()\nplt.plot(scores_train_lda[0:n_rows_train,0],\
    \ scores_train_lda[0:n_rows_train,1], 'b.',\nlabel='Fault 5')\nplt.plot(scores_train_lda[n_rows_train:2*n_rows_train,0],\n\
    scores_train_lda[n_rows_train:2*n_rows_train,1], 'r.', label='Fault 10')\nplt.plot(scores_train_lda[2*n_rows_train:3*n_rows_train,0],\n\
    scores_train_lda[2*n_rows_train:3*n_rows_train,1], 'm.', label='Fault 19')\nplt.legend()\n\
    ```\n\nFigure 6.9 shows the transformed samples in 2 dimensions after FDA and\
    \ PCA. FDA is able to provide a clear separation of Fault 5 samples; however,\
    \ it could not separate Fault 10 and 19 data. In fact, the 2nd discriminant (FD2)\
    \ contributes little to the discrimination and therefore, only FD1 is needed to\
    \ separate samples from Fault 5. To segregate Faults 10 and 19, kernel FDA can\
    \ be explored³². Linear PCA, on the other hand, fails to separate any of the classes.\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_152_0.png)\n\n> While FDA is a powerful\
    \ tool for fault diagnosis, it can also be used for fault detection by including\
    \ data from ‘no-fault’ or normal plant operation as a separate class.\n\n³² Hyun-Woo\
    \ Cho, Nonlinear feature extraction and classification of multivariate process\
    \ data in kernel feature space, Expert Systems with Applications, 2007\n\n## 6.4\
    \ Fault Classification via FDA for Tennessee Eastman Process\n\nAfter projecting\
    \ the samples onto the FDA space, any classification technique can be chosen to\
    \ classify or diagnose the specific fault. A popular $T^2$ statistic-based approach\
    \ entails computing a $T^2$ control limit for each fault class using the training\
    \ data. The $T^2$ control limit ($T^2_{CL,j}$) for the $j^{th}$ fault class represents\
    \ a boundary around the projected samples from the $j^{th}$ fault in the lower-dimensional\
    \ space – any given sample lying inside the boundary belongs to the $j^{th}$ fault\
    \ class. Mathematically, this can be specified as\n\n$T^2_{sample,j} < T^2_{CL,j}\
    \ \\Rightarrow \\text{sample belongs to the } j^{th} \\text{ fault class}$\n\n\
    $T^2_{sample,j}$ for a sample for the $j^{th}$ class is given by\n\n$T^2_{sample,j}\
    \ = (z_{sample} - \\widetilde{\\mu}_j)^T \\widetilde{S}_j (z_{sample} - \\widetilde{\\\
    mu}_j)$\n\nwhere, $\\widetilde{\\mu}_j$ and $\\widetilde{S}_j$ denote the mean\
    \ and covariance matrix of the projected samples belonging to the $j^{th}$ fault\
    \ class in training dataset, respectively, and $z_{sample}$ denotes the projected\
    \ sample in the FDA space. $T^2_{CL,j}$ can be obtained using the same expression\
    \ we used in PCA, $\\frac{k(N_j^2-1)}{N_j(N_j-k)} F_{k,N-k}(\\alpha)$, where $k$\
    \ denotes the number of dimensions retained in the FDA space. For illustration,\
    \ let us see how many samples from the Fault 5 test data get correctly identified.\n\
    \n```python\n# compute control limit\nimport scipy.stats\nNj = n_rows_train\n\
    k = 2\n\nalpha = 0.01 # 99% control limit\nT2_CL = k*(Nj**2-1)*scipy.stats.f.ppf(1-alpha,k,Nj-k)/(Nj*(Nj-k))\n\
    \n# mean and covariance for Fault 5 class\nscores_train_lda_Fault5 = scores_train_lda[0:n_rows_train,:]\n\
    cov_scores_train_Fault5 = np.cov(scores_train_lda_Fault5.T)\nmean_scores_train_Fault5\
    \ = np.mean(scores_train_lda_Fault5, axis = 0)\n\n# fetch TE test data for fault\
    \ 5\nTEdata_Fault5_test = np.loadtxt('d05_te.dat')\nTEdata_Fault5_test = TEdata_Fault5_test[160:,:]\
    \ # faulty operation start sample 160 onwards\n```\n\n```python\nn_rows_test =\
    \ TEdata_Fault5_test.shape[0]\nxmeas = TEdata_Fault5_test[:,0:22]\nxmv = TEdata_Fault5_test[:,41:52]\n\
    data_Faulty_test = np.hstack((xmeas, xmv))\n```\n\n```python\n# scale test data\
    \ and transform\nFaultydata_test_scaled = scaler.transform(data_Faulty_test)\n\
    scores_test_lda = lda.transform(Faultydata_test_scaled)\n```\n\n```python\n# compute\
    \ T2 statistic for test data for Fault 5 class\nT2_test = np.zeros((n_rows_test,))\n\
    for sample in range(n_rows_test):\n    score_sample = scores_test_lda[sample,:]\n\
    \    score_sample_centered = score_sample - mean_scores_train_Fault5\n    T2_test[sample]\
    \ = np.dot(np.dot(score_sample_centered[np.newaxis,:],np.linalg.inv(cov_scores_train_Fault5)),score_sample_centered[np.newaxis,:].T)\n\
    ```\n\n```python\n# plot test prediction\noutsideCL_flag = T2_test > T2_CL\ninsideCL_flag\
    \ = T2_test <= T2_CL\nplt.figure()\nplt.plot(scores_test_lda[outsideCL_flag,0],\
    \ scores_test_lda[outsideCL_flag,1], 'k.', label='within Fault 5 boundary')\n\
    plt.plot(scores_test_lda[insideCL_flag,0], scores_test_lda[insideCL_flag,1], 'b.',\
    \ label='outside Fault 5 boundary')\nplt.xlabel('FD1 (test data)')\nplt.ylabel('FD2\
    \ (test data)')\n```\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_154_0.png)\n\n\
    Figure 6.10: Classification result for TEP Fault 5 test samples\n\nAbout 98% of\
    \ the samples have been correctly identified as belonging to Fault 5. As shown\
    \ in Figure 6.10, some of the samples which fall far away from the mean violate\
    \ the $T^2_{CL,5}$ and therefore are not classified as Fault 5.\n\n> **Process\
    \ Monitoring Terminology**\n\nIn our process monitoring applications so far, we\
    \ have used terms like fault detection, fault diagnosis, and fault classification.\
    \ You may, however, also encounter other terms like fault identification, fault\
    \ isolation. While these terms may get used interchangeably, there exist nuanced\
    \ differences. Fault detection refers to the task of determining whether abnormal\
    \ process conditions have occurred. Fault identification and fault isolation,\
    \ both refer to the task of identifying the process variables that exhibit abnormal\
    \ behavior. Identifying these variables can help in determining the root-cause\
    \ of the fault. The step of ‘fault diagnosis’ in the PCA chapter should have been\
    \ called ‘fault identification’!\n\nFault diagnosis refers to the task of finding\
    \ which specific fault has occurred or determining the root-cause of the fault.\
    \ Fault classification falls in this category. While fault isolation is non-supervised,\
    \ fault diagnosis is supervised.\n\n## Summary\n\nWith this chapter, we have now\
    \ covered all the popular classical dimensionality reduction techniques that are\
    \ frequently utilized for analyzing process data. This chapter has also provided\
    \ an important message: blind application of a single technique all the times\
    \ may not yield best results. The techniques should be chosen according to the\
    \ process system (gaussian vs non-gaussian) and objective (fault detection vs\
    \ fault classification) at hand. ICA and FDA are powerful techniques and there\
    \ lies much more to them that what we have touched in this chapter. While you\
    \ are encouraged to explore more about these methods (now that you have conceptual\
    \ understandings), we will move to study another powerful ML technique called\
    \ Support Vector Machines in the next chapter."

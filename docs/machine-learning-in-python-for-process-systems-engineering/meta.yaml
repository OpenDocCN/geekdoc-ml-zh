  - '[PAGE 29]


    # White-box/grey-box/black-box models


    For soft sensing, terms like white-box, grey-box, black-box are often used. Figure
    1.13 clarifies the difference between the terms. White-box models utilize fundamental
    mass/energy/momentum conservation laws to relate model inputs and outputs. Black-box
    methods build estimation models using only process data. Grey-box methods combine
    the two approaches to generate a hybrid model.


    Consider our furnace system again. CFD model would be the white-box model. PLS
    model relating furnace inputs to product stream composition would fall in black-box
    model category. However, to balance the trade-off between model accuracy and computational
    expense, a hybrid model can be built. Mechanistic model of radiation energy transfer
    is the most complex part of the furnace model. One can build a black-box model
    to estimate the amount of radiation energy supplied to the tubes. This model can
    then be combined with the mechanistic model of tube to predict product composition.


    Hybrid models tend to have better extrapolation accuracies compared to black-box
    models and are preferred when the amount of training data is low.


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_29_0.png)


    hundreds of tube temperature measurements. Unfavorable conditions like catalyst
    damage or tube leaks may induce abnormal increase in some of the temperatures.
    However, it is impractical to monitor all these temperatures manually all the
    time. Instead, process monitoring models could be built using historical data
    that provides early warning for temperature upsets so that timely corrective actions
    can be taken.'
- md: '## Fault Classification


    Once a process fault has been detected, the next challenge lies in timely identification
    of root-cause of the issue or identification of the process variables that are
    responsible for the process upset. This exercise is called fault diagnosis. If
    historical data on past failures are available, a classification model could be
    built to determine the specific fault.


    For furnace system, refractory damage, tube leaks, burner malfunctions, catalyst
    damage can all cause temperature upsets. These different faults tend to impact
    tube temperatures differently; these differences are exploited by a fault classification
    model to identify the current fault. In this book, we will study how methods like
    ANNs, support vector machine (SVM) and linear discriminant analysis (LDA) can
    help in fault classifications.


    ## Process Optimization & Control


    Optimizing a complex system can be computationally expensive. It is not uncommon
    to find practitioners developing ML-based surrogate models from data to optimize
    the system offline or in RTO$^4$ layer. Surrogate models are also used in MPCs
    for highly non-linear systems. Reinforcement learning models are being tried in
    the regulatory control layer or for adaptively tuning regulatory controllers$^5$.


    ## Data Clustering & Mining


    Data clustering and mining methods are frequently used for activities like alarm
    management, operating mode characterization, pattern recognition, etc. For the
    furnace system, clustering models can be used to find the which set of tubes tend
    to show similar temperatures. Data mining models could be used to find the effect
    of process conditions on tube lifespan.


    ## Predictive Maintenance


    Predictive maintenance is another very popular usage of ML in process industry.
    Predictive maintenance models are built to determine the time to failure of any
    equipment or detect patterns in process data that could signal an impending process
    failure. Detailed planned maintenance can be carried out if failure times are
    known in advance. In the furnace system, tube leak occurrences may be preceded
    by a specific pattern in temperatures of neighboring tubes. These patterns are
    identified during model training and then utilized for real-time failure predictions.
    Advance warning can help plant operators plan plant shutdown properly.


    ## Forecasting


    Uncertainty in product demands and prices of raw materials lead to poor production
    scheduling. Advanced ML forecasting models are built to determine optimal production
    plan to maximize resource utilization and minimize production costs. In furnace
    system, frequent furnace temperature swings have detrimental effect on tube lifespan.
    If accurate monthly product demand is known in advance, then the furnace can be
    operated at a steady state throughout the month while using product storage to
    handle momentary spikes in demand.


    ## Choosing the right ML algorithm


    One of the trickiest tasks in a machine learning project is selection of modeling
    algorithm. Even experienced ML practitioners often recommend trial-and-error approaches.
    However, with experience, understanding of underlying details of ML algorithms,
    and process knowledge you can narrow down the trial candidates.


    Let’s take a sneak peek into the model selection process for the task of process
    monitoring. For monitoring, if the system is linear, PCA or PLS models should
    be tried first. If variables are non-gaussian distributed, kernel density estimation
    (KDE) or SVDD can be used for control-limit determination. For nonlinear systems,
    kernelized PCA/PLS, ANN, SVMs may be explored. SVMs are preferred when training
    data are limited. If process exhibits multiple operation mode, then mixture modeling
    like gaussian mixture model (GMM) can provide better monitoring performance.


    ## 1.4 ML Solution Deployment


    While working on any project, you are most likely to experiment with several ML
    algorithms on your personal laptop/computer. After having done all the hard work
    and having decided the final form of your ML workflow, you might find yourself
    asking the following questions:


    - Where does my ML tool reside where it can run uninterrupted?

    - How does an end-user access the results of my tool?


    The answer to the above questions is summarized in Figure 1.14 which shows a common
    architecture followed for deploying a Python machine learning solution from scratch
    within an enterprise network. You will install Python and transfer your tool (Python
    files) in a tool server machine (a virtual or physical machine where the ML tool
    would run). The tool server will be configured to execute the tool continuously
    (as a windows service) or on a schedule. During execution, your ML tool will fetch
    historical or real-time plant data and store the ML results in a database (MS
    SQL, MYSQL, etc.).


    Let’s tackle the second question now. The end-users such as plant operators can
    access tool’s results via a web browser. The user interface could be either built
    using third-party visualization software (Tableau, Sisense, Power BI) or completely
    custom-built using front-end web frameworks like bootstrap. If building custom
    website, then you will also need to setup a web server (using Python, .Net, etc.)
    which will serve the user-interface webpage when requested through web browser.
    The user interface communicates with the database to display appropriate data
    to the end-user. The web server may be configured to execute your tool on demand
    as well. The web server may be hosted on a separate machine or on the tool server
    machine itself.


    That is all it takes to deploy a ML solution in a production environment. If all
    this IT stuff has overwhelmed you, don’t worry! It is simpler than it seems and
    in chapter 14 we will build and deploy an end-to-end solution following this architecture.


    ## 1.5 The Future of Process Data Science


    It is not an exaggeration to say that this is a wonderful time to be a process
    data scientist. Process industry is witnessing higher and higher product demands
    due to increasing population and growing lifestyle globally, but there is also
    a push to run production facilities more efficiently and sustainably. Consequently,
    adoption of Industry 4.0, which mandates utilizing process data for process improvements
    all along the production chain, is on the rise. There is palpable interest among
    process industry executives to implement ML-based solutions and the responsibility
    to show that the ML hype is true has fallen on the shoulders of process data scientists.


    It’s a foregone conclusion that ML is a powerful tool for PSE. Process data hold
    tremendous power if they are put to use in the right way. However, blind application
    of ML often leads to discouraging results. As a process data scientist with expert
    process knowledge and ML skills, you are in a unique position to combine process
    systems knowledge and power of ML to unleash the true potentials of data science
    in process industry. Let’s cheer to your bright career prospects as a process
    data scientist and continue our journey to now learn the intricate details of
    ML algorithms.


    ## Summary


    In this chapter we tried to get a conceptual understanding of where ML fits in
    the world of process industry. We looked at the different types of machine learning
    workflows and methodologies. We also explored some application areas in process
    industry where ML has proved useful. We hope that you got the chapter’s overarching
    message that process data science has already proven to be an indispensable tool
    in process operations to turn data into knowledge and support effective decision
    making. In the next chapter we will take the first step and learn about the environment
    you will use to execute your Python scripts containing ML code.'
  mdcn: '## 故障分类


    一旦检测到过程故障，下一个挑战在于及时识别问题的根本原因，或找出导致过程扰动的过程变量。这一过程被称为故障诊断。如果拥有过去故障的历史数据，就可以构建一个分类模型来确定具体的故障类型。


    对于炉管系统，耐火材料损坏、管道泄漏、燃烧器故障、催化剂损坏都可能导致温度扰动。这些不同的故障往往对管道温度产生不同的影响；故障分类模型正是利用这些差异来识别当前故障。在本书中，我们将研究人工神经网络（ANN）、支持向量机（SVM）和线性判别分析（LDA）等方法如何帮助进行故障分类。


    ## 过程优化与控制


    优化一个复杂系统在计算上可能代价高昂。从业者从数据中开发基于机器学习的代理模型，用于离线优化系统或在实时优化（RTO）层进行优化，这并不少见。代理模型也用于处理高度非线性系统的模型预测控制（MPC）。强化学习模型正在调节控制层或用于自适应调节调节控制器方面进行尝试。


    ## 数据聚类与挖掘


    数据聚类和挖掘方法常用于报警管理、操作模式表征、模式识别等活动。对于炉管系统，聚类模型可用于找出哪些管道倾向于表现出相似的温度。数据挖掘模型可用于发现工艺条件对管道寿命的影响。


    ## 预测性维护


    预测性维护是机器学习在过程工业中另一个非常流行的应用。构建预测性维护模型是为了确定任何设备的故障时间，或检测过程数据中可能预示即将发生过程故障的模式。如果提前知道故障时间，就可以进行详细的计划性维护。在炉管系统中，管道泄漏发生前，相邻管道的温度可能会出现特定模式。这些模式在模型训练期间被识别出来，然后用于实时故障预测。提前预警可以帮助工厂操作员妥善计划工厂停工。


    ## 预测


    产品需求和原材料价格的不确定性会导致生产计划不佳。先进的机器学习预测模型被构建出来，以确定最优生产计划，从而最大化资源利用率并最小化生产成本。在炉管系统中，频繁的炉温波动对管道寿命有不利影响。如果提前知道准确的月度产品需求，那么炉子就可以在整个稳定状态下运行，同时利用产品存储来处理需求的瞬时峰值。


    ## 选择合适的机器学习算法


    机器学习项目中最棘手的任务之一是选择建模算法。即使是经验丰富的机器学习从业者也经常推荐试错法。然而，凭借经验、对机器学习算法底层细节的理解以及工艺知识，你可以缩小试错候选范围。


    让我们先窥探一下过程监控任务的模型选择过程。对于监控，如果系统是线性的，应首先尝试主成分分析（PCA）或偏最小二乘（PLS）模型。如果变量是非高斯分布的，可以使用核密度估计（KDE）或支持向量数据描述（SVDD）来确定控制限。对于非线性系统，可以探索核化PCA/PLS、人工神经网络（ANN）、支持向量机（SVM）。当训练数据有限时，SVM是首选。如果过程表现出多种操作模式，那么像高斯混合模型（GMM）这样的混合建模可以提供更好的监控性能。


    ## 1.4 机器学习解决方案部署


    在任何项目中，你很可能会在个人笔记本电脑/计算机上尝试多种机器学习算法。在完成了所有艰苦工作并确定了机器学习工作流的最终形式后，你可能会发现自己问以下问题：


    -   我的机器学习工具存放在哪里才能不间断运行？

    -   最终用户如何访问我的工具结果？


    上述问题的答案总结在图1.14中，该图展示了在企业网络中从头部署一个Python机器学习解决方案的常见架构。你将安装Python并将你的工具（Python文件）传输到工具服务器机器（一个虚拟或物理机器，机器学习工具将在此运行）。工具服务器将被配置为持续执行工具（作为Windows服务）或按计划执行。在执行期间，你的机器学习工具将获取历史或实时工厂数据，并将机器学习结果存储在数据库（MS
    SQL、MYSQL等）中。


    现在让我们来解决第二个问题。最终用户，如工厂操作员，可以通过网络浏览器访问工具的结果。用户界面可以使用第三方可视化软件（Tableau、Sisense、Power
    BI）构建，也可以使用前端网络框架（如bootstrap）完全自定义构建。如果构建自定义网站，你还需要设置一个网络服务器（使用Python、.Net等），当通过网络浏览器请求时，该服务器将提供用户界面网页。用户界面与数据库通信，向最终用户显示适当的数据。网络服务器也可以配置为按需执行你的工具。网络服务器可以托管在单独的机器上，也可以托管在工具服务器机器本身上。


    这就是在生产环境中部署机器学习解决方案所需的全部工作。如果所有这些IT内容让你不知所措，别担心！它比看起来更简单，在第14章中，我们将遵循此架构构建并部署一个端到端的解决方案。


    ## 1.5 过程数据科学的未来


    毫不夸张地说，现在是成为一名过程数据科学家的绝佳时机。由于全球人口增长和生活方式提升，过程工业正见证着越来越高的产品需求，但同时也面临着更高效、更可持续地运行生产设施的压力。因此，工业4.0的采用率正在上升，它要求利用过程数据在整个生产链中进行过程改进。过程工业高管对实施基于机器学习的解决方案表现出明显的兴趣，而证明机器学习热潮名副其实的责任则落在了过程数据科学家的肩上。


    机器学习是过程系统工程（PSE）的强大工具，这已是不争的事实。过程数据如果以正确的方式加以利用，蕴含着巨大的力量。然而，盲目应用机器学习往往会导致令人沮丧的结果。作为一名拥有专业知识和机器学习技能的过程数据科学家，你处于一个独特的位置，可以将过程系统知识与机器学习的力量相结合，释放数据科学在过程工业中的真正潜力。让我们为你作为过程数据科学家的光明职业前景干杯，并继续我们的旅程，现在来学习机器学习算法的复杂细节。


    ## 总结


    在本章中，我们试图从概念上理解机器学习在过程工业中的位置。我们探讨了不同类型的机器学习工作流和方法论。我们还探索了机器学习已被证明有用的一些过程工业应用领域。我们希望你已经理解了本章的核心信息：过程数据科学已被证明是过程运营中不可或缺的工具，它能将数据转化为知识并支持有效决策。在下一章中，我们将迈出第一步，了解你将用于执行包含机器学习代码的Python脚本的环境。'

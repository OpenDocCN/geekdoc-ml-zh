    # 12.6 Predictive Maintenance using LSTM Networks


    The process-fault detection models that we have built till now have relied on
    using latest (and recent past) process data to detect process faults that have
    already occurred. The process reliability personnel get relatively short amount
    of time to prepare for the maintenance. Wouldn’t it be great if our models could
    predict well in advance (a week or may be a month) the impending failure of any
    equipment? Such models have been successfully deployed in process industry and
    are referred to as predictive maintenance (PdM) models.


    PdM models use historical past failure data to extract dynamic patterns as indicators
    of failures in the future. Infact, models can be built to predict the precise
    failure time in future. The time until failure of an equipment is also referred
    to as remaining useful life (RUL). RNNs are among the most useful technique available
    at our disposal to tackle RUL estimation or failure prediction problems.


    For illustration, we will use aircraft gas turbine engine dataset which consists
    of dynamic data from multiple sensors from several engine operation simulations.
    Each simulation starts with an engine (with different degrees of initial wear)
    operating within normal limits. Engine degradation starts at some point during
    the simulation and continues until engine failure. Training datasets contain complete
    data until engine failures, while the test dataset contains data until some point
    prior to failure. Actual RUL has been provided for the test dataset. Our objective
    is to develop a PdM model to predict engine failure using simulation data in the
    test dataset.'

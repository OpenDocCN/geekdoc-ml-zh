    \ URL 时，会向后端发送一个请求，后端解析该请求、进行处理，并返回一个响应显示在前端。下图展示了我们将采用的数据传输方案。\n\n![](img/ae65e737df4a9f5732c91f7aea579fc8_334_0.png)\n\

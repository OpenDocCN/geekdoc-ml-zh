    # Wrapper methods


    Figure 4.6 gives an overview of wrapper approach to feature selection. Here, unlike
    filter methods, a predictive model is used to find the relevant features. The
    method begins with an initial selection of feature subset and enters a loop. In
    each cycle of the loop, a new model is built with the currently selected subset
    and the decision to include/exclude a feature from the subset is based on model''s
    performance or some model attributes. The specific strategy employed distinguishes
    the different sequential methods. The loop concludes once the desired number of
    relevant features are obtained or some criteria on model performance is met. Note
    that the model performance may be assessed using a validation dataset or fitting
    dataset itself using BIC/AIC metrics. Let''s study a couple of well-known wrapper
    methods.'

    # Vectorized operations


    ![](img/ae65e737df4a9f5732c91f7aea579fc8_46_0.png)


    Suppose you need to perform element-wise summation of two 1D arrays. One approach
    is to access items at each index at a time in a loop and sum them. Another approach
    is to sum up items at multiple indexes at once. The later approach is called vectorized
    operation and can lead to significant boost in computational time for large datasets
    and complex operations.


    ```

    # vectorized operations

    vec1 = np.array([1,2,3,4])

    vec2 = np.array([5,6,7,8])

    vec_sum = vec1 + vec2 # returns array([6,8,10,12]); no need to loop through index
    0 to 3


    # slightly more complex operation (computing distance between vectors)

    vec_distance = np.sqrt(np.sum((vec1 - vec2)**2)) # vec_distance = 8.0

    ```



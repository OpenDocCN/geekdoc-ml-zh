    # fit KPCA model\nfrom sklearn.decomposition import KernelPCA\nkpca = KernelPCA(kernel='rbf',\
    \ gamma = 1)\nscore = kpca.fit_transform(data)\n```\n\n## 5.4 PLS：简介\n\n偏最小二乘法（PLS）是一种有监督的多元回归技术，用于估计一组输入变量和一组输出变量之间的线性关系。与PCA类似，PLS将原始数据转换为潜在成分——输入（$X$）和输出（$Y$）数据矩阵分别转换为得分矩阵$T$和$U$。图2.13提供了PLS方法与其他流行线性回归技术——主成分回归（PCR）和多元线性回归（MLR）的概念比较。\n\
    \n![](img/ae65e737df4a9f5732c91f7aea579fc8_120_0.png)\n\n虽然MLR直接计算$\\boldsymbol{X}$和$\\\
    boldsymbol{Y}$之间的最小二乘拟合，但PCR首先对输入数据执行PCA，然后计算得分矩阵和$\\boldsymbol{Y}$之间的最小二乘拟合。通过这样做，PCR能够克服共线性、高相关性、噪声测量和有限训练数据集的问题。然而，潜在变量的计算独立于输出数据，因此，得分矩阵可能捕获$\\\
    boldsymbol{X}$中与预测$\\boldsymbol{Y}$无关的那些变异。PLS通过同时估计得分矩阵$\\boldsymbol{T}$和$\\\
    boldsymbol{U}$来克服这个问题，使得$\\boldsymbol{X}$中与预测$\\boldsymbol{Y}$相关的变异在潜在变量空间中被最大程度地捕获。\n\

  md: '# # Chapter 6

    Dimension Reduction and Latent Variable Methods (Part 2)


    By now you must be very impressed with the powerful capabilities of PCA and PLS
    techniques. These methods allowed us to extract uncorrelated latent variables
    which maximized the captured variances. However, you may ask, “Are these the best
    dimensionality reduction techniques to use for all problems?”. We are glad that
    you asked! Other powerful methods do exist which may provide better performance.
    For example, Independent component analysis (ICA) can provide latent variables
    with stricter property of statistical independence rather than only uncorrelatedness.
    Independent components may be able to characterize the process data better than
    principal components and thus may result in better monitoring performance. If
    you are reducing dimensionality with the end goal of classifying process faults
    into different categories for fault diagnosis, then, maximal separation between
    data from different classes of faults would be your primary concern rather than
    maximal capture of data variance. Fisher discriminant analysis (FDA) would be
    better suited for this task.


    In this chapter, we will learn in detail the properties of ICA and FDA. We will

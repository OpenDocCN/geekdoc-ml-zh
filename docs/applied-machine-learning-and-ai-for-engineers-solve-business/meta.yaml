    # Kernel Tricks


    Want to see an example of how kernel tricks are used to compute dot products in
    high-dimensional spaces without computing values for the new dimensions? The following
    explanation is completely optional. But if you, like me, learn better from concrete
    examples, then you might find this section helpful.


    Let’s start with the two-dimensional circular dataset presented earlier, but this
    time let’s project it into three-dimensional space with the following equations:


    $x\hat{a} = x^2$

    $y\hat{a} = y^2$

    $z = x \cdot y \cdot \sqrt{2}$


    In other words, we’ll compute $x$ and $y$ in three-dimensional space ($x''$ and
    $y''$) by squaring $x$ and $y$ in two-dimensional space, and we’ll add a $z$ that’s
    the product of the original $x$ and $y$ and the square root of 2. Projecting the
    data this way produces a clean separation between purples and reds, as shown in
    Figure 5-5.'

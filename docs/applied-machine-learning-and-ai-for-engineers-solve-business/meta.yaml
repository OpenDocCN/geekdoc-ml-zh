    # Multivariate Anomaly Detection\n\nCould we have predicted failure in the preceding\
    \ example by simply monitoring individual bearings? Perhaps. But what if impending\
    \ failure is indicated by marginally elevated vibrations in *two* bearings rather\
    \ than just one? Engineers frequently find that it isn’t individual sensors but\
    \ a combination of readings from several sensors that signal impending trouble.\
    \ These readings may come from sensors of different types: temperature sensors\
    \ and pressure gauges in automotive and [aerospace applications](https://example.com),\
    \ for example, or heart monitors and blood pressure monitors in [health-care applications](https://example.com).\
    \ Reducing the number of dimensions to one with PCA is an attempt to capture relationships\
    \ between data emanating from individual sensors and treat the readings systematically,\
    \ a technique known as *multivariate anomaly detection*.\n\nOne limitation of\
    \ using PCA to detect anomalies in multivariate systems is that because it uses\
    \ linear transforms, PCA is better at modeling linear relationships between variables\
    \ than nonlinear relationships. Neural networks, by contrast, excel at modeling\
    \ nonlinear data. That’s the primary reason why state-of-the-art multivariate\
    \ anomaly detection today commonly relies on deep learning.\n\nAs the number of\
    \ variables increases, so too does the challenge of modeling the interdependencies\
    \ between them. It is not uncommon for overall system health to be determined\

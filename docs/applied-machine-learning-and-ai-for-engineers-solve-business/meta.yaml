    UDFs written in Python present Excel users with a new whole new world of possibilities
    thanks to the rich ecosystem of Python libraries available for machine learning,
    statistical analysis, and other tasks. And they provide a valuable opportunity
    for Excel users to operationalize machine learning models written in Python.


    # Summary


    Writing a Python client that invokes a Python machine learning model requires
    little more than an extra line of code to deserialize the model from a .pkl file.
    One way for a non-Python client to invoke a Python model is to wrap the model
    in a Python web service and invoke the model using REST APIs. The web service
    can be hosted locally or in the cloud, and containerizing the web service (and
    the model) simplifies deployment and makes the software more portable.


    An alternative approach is to use ONNX to bridge the language gap. With ONNX,
    you can save a Scikit model to a .onnx file and load the model from a variety
    of programming languages, including C, C++, C#, Java, and JavaScript. Once loaded,
    the model can be invoked just as if it were called from Python.


    Another option for invoking machine learning models from non-Python clients is
    to write the model in the same language as the client. Microsoft’s ML.NET, which
    is free, cross-platform, and open source, is a great option for C# developers.
    Other libraries include [Java-ML](https://java-ml.sourceforge.net/) for Java developers
    and [Caret](https://topepo.github.io/caret/) and [Tidymodels](https://www.tidymodels.org/)
    for R developers. The APIs supported by these libraries are different from the
    APIs in Scikit, but the principles embodied in them are the same.'

    # Anomaly Detection


    Anomaly detection is a branch of machine learning that seeks to identify anomalies
    in datasets or data streams. Airbus uses it to predict failures in jet engines
    and detect anomalies in telemetry data beamed down from the International Space
    Station. Credit card companies use it to detect credit card fraud. The goal of
    anomaly detection is to identify outliers in data—samples that aren’t “normal”
    when compared to others. In the case of credit card fraud, the assumption is that
    if transactions are subjected to an anomaly detection algorithm, fraudulent transactions
    will show up as anomalous, while legitimate transactions will not.


    There are many ways to perform anomaly detection. They go by names such as isolation
    forests, one-class SVMs, and local outlier factor (LOF). Most rely on unsupervised
    learning methods and therefore do not require labeled data. They simply look at
    a collection of samples and determine which ones are anomalous. Unsupervised anomaly
    detection is particularly interesting because it doesn’t require a priori knowledge
    of what constitutes an anomaly, nor does it require an unlabeled dataset to be
    meticulously labeled.


    One of the most popular forms of anomaly detection relies on principal component
    analysis. You already know that PCA can be used to reduce data from m dimensions
    to n, and that a PCA transform can be inverted to restore the original m dimensions.
    You also know that inverting the transform doesn’t'
  - "[PAGE 139]\n\nrecover the data that was lost when the transform was applied.\
    \ The gist of PCA-based anomaly detection is that an anomalous sample should exhibit\
    \ more loss or *reconstruction error* (the difference between the original data\
    \ and the same data after a PCA transform is applied and inverted) than a normal\
    \ one. In other words, the loss incurred when an anomalous sample is PCAed and\
    \ un-PCAed should be higher than the loss incurred when the same operation is\
    \ applied to a normal sample. Let’s see if this assumption holds up in the real\
    \ world.\n\n# Using PCA to Detect Credit Card Fraud\n\nSupervised learning isn’t\
    \ the only option for detecting credit card fraud. Here’s an alternative approach\
    \ that uses PCA-based anomaly detection to identify fraudulent transactions. Begin\
    \ by loading the dataset, separating the samples by class into one dataset representing\
    \ legitimate transactions and another representing fraudulent transactions, and\
    \ dropping the Time and Class columns. If you didn’t download the dataset in Chapter\
    \ 3, you can get it now from the ZIP file.\n\n```\nimport pandas as pd\n\ndf =\
    \ pd.read_csv('Data/creditcard.csv')\ndf.head()\n\n# Separate the samples by class\n\
    legit = df[df['Class'] == 0]\nfraud = df[df['Class'] == 1]\n\n# Drop the \"Time\"\
    \ and \"Class\" columns\nlegit = legit.drop(['Time', 'Class'], axis=1)\nfraud\
    \ = fraud.drop(['Time', 'Class'], axis=1)\n```\n\nUse PCA to reduce the two datasets\
    \ from 29 to 26 dimensions, and then invert the transform to restore each dataset\
    \ to 29 dimensions. The transform is fitted to legitimate transactions only because\
    \ we need a baseline value for reconstruction error that allows us to discriminate\
    \ between legitimate and fraudulent transactions. It is applied, however, to both\
    \ datasets:\n\n```\nfrom sklearn.decomposition import PCA\n\npca = PCA(n_components=26,\
    \ random_state=0)\nlegit_pca = pd.DataFrame(pca.fit_transform(legit), index=legit.index)\n\
    fraud_pca = pd.DataFrame(pca.transform(fraud), index=fraud.index)\n\nlegit_restored\
    \ = pd.DataFrame(pca.inverse_transform(legit_pca),\n                         \
    \     index=legit_pca.index)\n\nfraud_restored = pd.DataFrame(pca.inverse_transform(fraud_pca),\n\
    \                              index=fraud_pca.index)\n```\n\nSome information\
    \ was lost in the transition. Hopefully, the fraudulent transactions incurred\
    \ more loss than the legitimate ones, and we can use that to differentiate between\
    \ them. The next step is to compute the loss for each row in the two datasets\
    \ by summing the squares of the differences between the values in the original\
    \ rows and the restored rows:"

    \ 1000 Class List](https://...) shows a complete list of classes it *was* trained\
    \ to recognize. A pretrained CNN is great when you need it to classify images\
    \ using the classes it was trained with, but it is powerless to handle domain-specific\
    \ tasks that it wasn’t trained for.\n\nBut all is not lost. A technique called\
    \ *transfer learning* enables pretrained CNNs to be repurposed to solve domain-specific\
    \ problems. The repurposing can be done on an ordinary CPU; no GPU required. Transfer\
    \ learning sometimes achieves 95% accuracy with just a few hundred training images.\
    \ Once you learn about it, you’ll have a completely different perspective on the\
    \ efficacy of using CNNs to solve business problems.\n\n# Transfer Learning\n\n\
    Earlier, you used a dataset with photos of Arctic foxes, polar bears, and walruses\
    \ to train a CNN to recognize Artic wildlife. Trained with 300 images—100 for\
    \ each of the three classes—the CNN achieved an accuracy of around 60%. That’s\
    \ not sufficient for most purposes.\n\nOne solution is to train the CNN with tens\
    \ of thousands of photos. A better solution—one that can deliver world-class accuracy\
    \ with the 300 photos you have and doesn’t require expensive hardware—is transfer\
    \ learning. In the hands of software developers and engineers, transfer learning\
    \ makes CNNs a practical solution for a variety of computer-vision problems. And\
    \ it requires orders of magnitude less time and compute power than CNNs trained\
    \ from scratch. Let’s take a moment to understand what transfer learning is and\
    \ how it works—and then put it to work identifying Arctic wildlife.\n\nPretrained\
    \ CNNs trained on the ImageNet dataset can identify Arctic foxes and polar bears,\
    \ but they can’t identify walruses because they weren’t trained with walrus images.\
    \ Transfer learning lets you repurpose pretrained CNNs to identify objects they\
    \ weren’t originally trained to identify. It leverages the intelligence baked\
    \ into pretrained CNNs, but it repurposes that intelligence to solve new problems.\n\
    \nRecall that a CNN has two groups of layers: bottleneck layers containing the\
    \ convolution and pooling layers that extract features from images at various\
    \ resolutions, and classification layers, which classify"

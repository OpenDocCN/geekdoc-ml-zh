  md: "```\nmodel.compile(loss='sparse_categorical_crossentropy', optimizer='adam',\n\
    \              metrics=['accuracy'])model.summary(line_length=100)\n```\n\nThe\
    \ first layer is an embedding layer that converts word tokens into vectors containing\
    \ 256 floating-point values. The `mask_zero=True` parameter indicates that zeros\
    \ in the input sequences denote padding so that the next layer can ignore them.\
    \ (There is no need to translate those tokens, after all.) Next is an LSTM layer\
    \ that encodes English phrases input to the model. A second LSTM layer decodes\
    \ the phrases into dense vectors representing the French equivalents. In between\
    \ lies a `RepeatVector` layer that reshapes the output from the first LSTM layer\
    \ for input to the second by repeating the output a specified number of times.\
    \ The final layer is a softmax classification layer that outputs probabilities\
    \ for each word in the French vocabulary. The `TimeDistributed` wrapper ensures\
    \ that the model outputs a set of probabilities for each token in the output rather\
    \ than just one set for the entire sequence.\n\nAfter 34 epochs of training, the\
    \ model translates 10 test phrases this way:\n\n```\nits fall now => cest maintenant\
    \ maintenant\nim losing => je suis en train\nit was quite funny => cetai fut amusant\

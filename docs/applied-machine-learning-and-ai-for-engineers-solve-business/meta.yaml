    \ 3 (0.707).\n\n## Building a Movie Recommendation System\n\nLet’s put cosine\
    \ similarity to work building a content-based recommender system for movies. Start\
    \ by [downloading the dataset](https://www.kaggle.com), which is one of several\
    \ movie datasets available from Kaggle.com. This one has information for about\
    \ 4,800 movies, including title, budget, genres, keywords, cast, and more. Place\
    \ the CSV file in your Jupyter notebooks’ *Data* subdirectory. Then load the dataset\
    \ and peruse its contents:\n\n```python\nimport pandas as pd\n\ndf = pd.read_csv('Data/movies.csv')\n\
    df.head()\n```\n\nThe dataset contains 24 columns, only a few of which are needed\
    \ to describe a movie. Use the following statements to extract key columns such\
    \ as `title` and `genres` and fill missing values with empty strings:\n\n```python\n\
    df = df[['title', 'genres', 'keywords', 'cast', 'director']]\ndf = df.fillna('')\
    \ # Fill missing values with empty strings\ndf.head()\n```\n\nNext, add a column\
    \ named `features` that combines all the words in the other columns:\n\n```python\n\
    df['features'] = df['title'] + ' ' + df['genres'] + ' ' + \\\n               \
    \   df['keywords'] + ' ' + df['cast'] + ' ' + \\\n                  df['director']\n\
    ```\n\nUse CountVectorizer to vectorize the text in the `features` column:\n\n\
    ```python\nfrom sklearn.feature_extraction.text import CountVectorizer\n\nvectorizer\
    \ = CountVectorizer(stop_words='english', min_df=20)\nword_matrix = vectorizer.fit_transform(df['features'])\n\
    word_matrix.shape\n```\n\nThe table of word counts contains 4,803 rows—one for\
    \ each movie—and 918 columns. The next task is to compute cosine similarities\
    \ for each row pair:\n\n```python\nfrom sklearn.metrics.pairwise import cosine_similarity\n\
    \nsim = cosine_similarity(word_matrix)\n```\n\nUltimately, the goal of this system\
    \ is to input a movie title and identify the $n$ movies that are most similar\
    \ to that movie. To that end, define a function named `get_recommendations` that\
    \ accepts a movie title, a DataFrame containing information about all the movies,\
    \ a similarity matrix, and the number of movie titles to return:\n\n```python\n\
    def get_recommendations(title, df, sim, count=10):\n    # Get the row index of\
    \ the specified title in the DataFrame\n    index = df.index[df['title'].str.lower()\
    \ == title.lower()]\n\n    # Return an empty list if there is no entry for the\
    \ specified title\n    if (len(index) == 0):\n        return []\n\n    # Get the\
    \ corresponding row in the similarity matrix\n    similarities = list(enumerate(sim[index[0]]))\n\
    \n    # Sort the similarity scores in that row in descending order\n    recommendations\
    \ = sorted(similarities, key=lambda x: x[1], reverse=True)\n\n    # Get the top\
    \ n recommendations, ignoring the first entry in the list since\n    # it corresponds\
    \ to the title itself (and thus has a similarity of 1.0)\n    top_recs = recommendations[1:count\
    \ + 1]\n\n    # Generate a list of titles from the indexes in top_recs\n    titles\
    \ = []\n\n    for i in range(len(top_recs)):\n        title = df.iloc[top_recs[i][0]]['title']\n\
    \        titles.append(title)\n\n    return titles\n```\n\nThis function sorts\
    \ the cosine similarities in descending order to identify the count movies most\
    \ like the one identified by the title parameter. Then it returns the titles of\
    \ those movies.\n\nNow use `get_recommendations` to search the database for similar\
    \ movies. First ask for the 10 movies that are most similar to the James Bond\
    \ thriller *Skyfall*:\n\n```python\nget_recommendations('Skyfall', df, sim)\n\
    ```\n\nHere is the output:\n\n```python\n['Spectre',\n 'Quantum of Solace',\n\
    \ 'Johnny English Reborn',\n 'Clash of the Titans',\n 'Die Another Day',\n 'Diamonds\
    \ Are Forever',\n 'Wrath of the Titans',\n 'I Spy',\n 'Sanctum',\n 'Blackthorn']\n\
    ```\n\nCall `get_recommendations` again to list movies that are like *Mulan*:\n\
    \n```python\nget_recommendations('Mulan', df, sim)\n```\n\nFeel free to try other\

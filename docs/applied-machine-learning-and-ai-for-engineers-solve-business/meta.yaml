    # Global Pooling


    The purpose of including a Flatten layer in a CNN is to reshape the 3D tensors
    containing the final feature maps into 1D tensors suitable for input to a Dense
    layer. But Flatten isn’t the only way to do it. Flattening sometimes leads to
    overfitting by providing too much information to the classification layers.


    One way to combat overfitting is to introduce a Dropout layer. Another strategy
    is to reduce the width of the Dense layer. A third option is to replace the Flatten
    layer with a GlobalMaxPooling2D layer or a GlobalAveragePooling2D layer. They,
    too, output 1D tensors, but they generate them in a different way. And that way
    is less prone to overfitting.


    To demonstrate, modify the MNIST dataset example earlier in this chapter to use
    a GlobalMaxPooling2D layer rather than a Flatten layer:


    ```

    python

    from tensorflow.keras.models import Sequential

    from tensorflow.keras.layers import Conv2D, MaxPooling2D, \n    GlobalMaxPooling2D,
    Dense


    model = Sequential()

    ```'

    \                y1 = y1 + ((h - w) // 2)\n                h = w\n\n        #\
    \ Extract the facial image and add it to the list\n        x2 = x1 + w\n     \
    \   y2 = y1 + h\n        results.append(Image.fromarray(image[y1:y2, x1:x2]))\n\
    \n    # Return all the facial images\n    return results\n```\n\n我将图 11-5 中的照片传递给该函数，它返回了下面的人脸。`extract_faces`\
    \ 返回的项目是 Python Imaging Library (PIL) 图像，因此你可以用一行代码调整它们的大小或保存到磁盘。下面是一个代码片段，它从一张照片中提取所有人脸，将它们调整为\

    When used for binary classification, `predict_proba` returns two probabilities:
    one for the negative class and one for the positive class. For multiclass classification,
    `predict_proba` returns probabilities for each possible class. This permits you
    to assess the model’s confidence in the prediction returned by `predict`. Not
    surprisingly, `predict` returns the class assigned the highest probability.


    # Summary


    Classification models are widely used in industry to predict categorical outcomes
    such as whether a credit card transaction should be accepted or declined. Binary
    classification models predict either of two outcomes, while multiclass classification
    models predict more than two outcomes. One of the most widely used learning algorithms
    for classification models is logistic regression, which fits an equation to training
    data and uses it to predict outcomes by computing the possibility that each is
    the correct one and selecting the outcome with the highest probability.


    There are many ways to score classification models. Which method is correct depends
    on how you intend to use the model. For example, when the cost of false positives
    is high, use precision to assess the model’s accuracy. Precision is computed by
    dividing the number of true positives by the sum of the true positives and false
    positives. On the other hand, if the cost of false negatives is high, use recall
    instead. Recall is computed by dividing the number of true positives by the sum
    of the true positives and false negatives. Closely related to precision and recall
    are sensitivity and specificity. Sensitivity is identical to recall, while specificity
    is recall for the negative class rather than the positive class. Confusion matrices
    offer a convenient way to visualize how a model performs on test data without
    reducing the accuracy to a single number.


    Some learning algorithms work only with binary classification, but Scikit works
    some magic under the hood to make sure *any* learning algorithm can be used for
    binary or multiclass classification. This isn’t true of all machine learning libraries.
    Some restrict their learning algorithms to specific scenarios or require you to
    write extra code to use a binary classification algorithm in a multiclass model.


    All the models in this chapter were trained with numerical data, even though some
    of the datasets contained categorical values—values that are strings rather than
    numbers—that had to be converted to numbers using one-hot encoding. You may wonder
    how to build a classification model that works *solely* on text—for example, a
    model that scores restaurant reviews for sentiment or classifies emails as spam
    or not spam. It’s a perfectly legitimate question to ask. And it happens to be
    the subject of [Chapter 4](Chapter 4).'

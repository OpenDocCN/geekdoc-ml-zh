    # Multiclass Classification


    Now it’s time to tackle multiclass classification, in which there are *n* possible
    outcomes rather than just two. A great example of multiclass classification is
    performing optical character recognition: examining a handwritten digit and predicting
    which digit 0 through 9 it corresponds to. Another example is looking at a facial
    photo and identifying the person in the photo by running it through a model trained
    to recognize hundreds of people.


    Virtually everything you learned about binary classification applies to multiclass
    classification too. In Scikit, any classifier that works with binary classification
    also works with multiclass classification models. The importance of this can’t
    be overstated. Some learning algorithms, such as logistic regression, work only
    in binary classification scenarios. Many machine learning libraries make you write
    explicit code to extend logistic regression to perform multiclass classification—or
    use a different form of logistic regression altogether. Scikit doesn’t. Instead,
    it makes sure classifiers such as `LogisticRegression` work in either scenario,
    and when necessary, it does extra work behind the scenes to make it happen.


    For logistic regression, Scikit uses one of two strategies to extend the algorithm
    to work in multiclass scenarios. (You can specify which strategy to use with the
    `LogisticRegression` class’s `multi_class` parameter, or accept the default of
    ''auto'' and allow Scikit to choose.) One is *multinomial logistic regression*,
    which replaces the logistic function with a [softmax function](https://en.wikipedia.org/wiki/Softmax_function)
    that yields multiple probabilities—one per class. The other is *one-vs-rest*,
    also known as *one-vs-all*, which trains *n* binary classification models, where
    *n* is the number of classes that the model can predict. Each of the *n* models'
  merge: -1
  pgno: 79
- img_proc: true
  md: 'pairs one class against all the other classes, and when the model is asked
    to make a prediction, it runs the input through all *n* models and uses the output
    from the one that yields the highest probability. This strategy is depicted in
    Figure 3-6.


    ![](img/628b9a382d0944bbfa786c66bc651b50_80_0.png)


    The one-vs-rest approach works well for logistic regression, but for some binary-only
    classification algorithms, Scikit uses a *one-vs-one* approach instead. When you
    use Scikit’s SVC class (a support vector machine classifier that you’ll learn
    about in Chapter 5) to perform multiclass classification, for example, Scikit
    builds one model for each pair of classes. If the model includes four possible
    classes, Scikit builds no fewer than seven models under the hood.


    You don’t have to know any of this to build a multiclass classification model.
    But it does explain why some multiclass classification models require more memory
    and train more slowly than others. Some classification algorithms, such as random
    forests and GBMs, support multiclass classification natively. For algorithms that
    don’t, Scikit has your back. It fills the gap and does so as transparently as
    possible.


    To reiterate: all Scikit classifiers are capable of performing binary classification
    and multiclass classification. This simplifies the code you write and lets you
    focus on building and training models rather than understanding the underlying
    mechanics of the algorithms.



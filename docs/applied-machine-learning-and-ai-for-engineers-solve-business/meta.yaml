    \ polar bear, or something else. Convolution layers use convolution kernels to\
    \ extract features, and the values in the convolution kernels are learned during\
    \ training. This learning accounts for the bulk of the training time. When sophisticated\
    \ CNNs are trained with millions of images, the convolution kernels become very\
    \ efficient at extracting features. But that efficiency comes at a cost.\n\nThe\
    \ premise behind transfer learning is shown in Figure 10-11. You load the bottleneck\
    \ layers of a pretrained CNN, but you *don't* load the classification layers.\
    \ Instead, you provide your own, which train orders of magnitude more quickly\
    \ than an entire CNN. Then you pass the training images through the bottleneck\
    \ layers for feature extraction and train the classification layers on the resulting\
    \ features. The pretrained CNN might have been trained to extract features from\
    \ pictures of apples and oranges, but those same layers are probably pretty good\
    \ at extracting features from photos of dogs and cats too. By using the pretrained\
    \ bottleneck layers to extract features and then using those features to train\
    \ your own classification layers, you can teach the model that a certain feature\
    \ extracted from an image might be indicative of a dog rather than an apple.\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_221_0.png)\n\nTransfer learning is\
    \ relatively simple to implement with Keras and TensorFlow. Recall that the following\
    \ statement loads ResNet50V2 and initializes it with the weights (including kernel\
    \ values) and biases that were arrived at when the network was trained on a subset\
    \ of the ImageNet dataset:\n\n```\nbase_model = ResNet50V2(weights='imagenet')\n\
    ```\n\nTo load ResNet50V2 (or any other pretrained CNN that Keras supports) without\
    \ the classification layers, you simply add an `include_top=False` attribute:\n\
    \n```\nbase_model = ResNet50V2(weights='imagenet', include_top=False)\n```\n\n\
    From that point, there are two ways to go about transfer learning. The first involves\
    \ appending classification layers to the base model's bottleneck layers and setting\
    \ each base layer's `trainable` attribute to `False` so that the weights, biases,\
    \ and convolution kernels won't be updated when the network is trained:\n\n```\n\
    for layer in base_model.layers:\n    layer.trainable = False\n\nmodel = Sequential()\n\
    model.add(base_model)\nmodel.add(Flatten())\nmodel.add(Dense(1024, activation='relu'))\n\
    model.add(Dense(3, activation='softmax'))\nmodel.compile(optimizer='adam', loss='sparse_categorical_crossentropy',\n\
    \              metrics=['accuracy'])\n\nmodel.fit(x, y, validation_split=0.2,\
    \ epochs=10, batch_size=10)\n```\n\nThe second technique is to run all the training\
    \ images through the base model for feature extraction, and then run the features\
    \ through a separate network containing your classification layers:\n\n```\nfeatures\
    \ = base_model.predict(x)\n\nmodel = Sequential()\nmodel.add(Flatten())\nmodel.add(Dense(128,\
    \ activation='relu'))\nmodel.add(Dense(3, activation='softmax'))\nmodel.compile(optimizer='adam',\
    \ loss='sparse_categorical_crossentropy',\n              metrics=['accuracy'])\n\
    \nmodel.fit(features, y, validation_split=0.2, epochs=10, batch_size=10)\n```\n\
    \nWhich technique is better? The second is faster because the training images\
    \ go through the bottleneck layers for feature extraction just one time rather\
    \ than once per epoch. It’s the technique you should use in the absence of a compelling\
    \ reason to do otherwise. The first technique is slightly slower, but it lends\

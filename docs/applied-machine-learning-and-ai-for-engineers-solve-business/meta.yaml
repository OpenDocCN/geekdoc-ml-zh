    # Saving and Loading ML.NET Models


    Earlier, you learned how to use Python’s pickle module to save and load trained
    models. You do the same in ML.NET by calling `ModelOperationsCatalog.Save` and
    `ModelOperationsCatalog.Load` through the MLContext object’s `Model` property:


    ```

    csharp

    // Save a trained model to a zip file

    context.Model.Save(model, data.Schema, "model.zip");


    // Load a trained model from a zip file

    var model = context.Model.Load("model.zip", out DataViewSchema schema);

    ```


    This enables clients to re-create a model in its trained state and use it to make
    predictions without having to train the model repeatedly.


    # Adding Machine Learning Capabilities to Excel



    \ = 'Excellent food and fantastic service!'\nmodel.predict([text])[0][0]\n```\n\
    \nNow do the same for a negative comment:\n\n```python\ntext = 'The long lines\
    \ and poor customer service really turned me off.'\nmodel.predict([text])[0][0]\n\
    ```\n\nObserve how much simpler the code is. Operationalizing the model is simpler\
    \ too, because you no longer need a Tokenizer fit to the training data to prepare\
    \ text submitted to the model for predictions. Be aware, however, that a model\
    \ with a TextVectorization layer can’t be saved in Keras’s H5 format. It *can*\
    \ be saved in TensorFlow’s SavedModel format. The following statement saves the\
    \ model in the *saved_model* subdirectory of the current directory:\n\n```python\n\
    model.save('saved_model')\n```\n\nOnce the model is reloaded, you can pass text\
    \ directly to it for making predictions.\n\n## Factoring Word Order into Predictions\n\
    \nBoth of the models you just built are *bag-of-words* models that ignore word\
    \ order. Such models are common and are often more accurate than other types of\
    \ models. But that’s not always the case. The relative position of the words in\
    \ a sentence sometimes has meaning. *Credit* and *card* should probably influence\
    \ a spam classifier one way if they appear far apart in a sentence and another\
    \ way if they appear together.\n\nOne way to improve—or at least *attempt* to\
    \ improve—on a simple bag-of-words model is to use *n*-grams as described in Chapter\
    \ 4. An *n*-gram is a collection of *n* words appearing in consecutive order.\
    \ Keras’s `TextVectorization` class features an `ngrams` parameter that makes\
    \ applying *n*-grams easy. The following statement creates a `TextVectorization`\
    \ layer that considers word pairs as well as individual words:\n\n```python\n\
    model.add(TextVectorization(max_tokens=max_words,\n                          \
    \ output_sequence_length=max_length,\n                           ngrams=2))\n\
    ```\n\nOne limitation of *n*-grams is that they only consider words that are directly\
    \ adjacent to each other. A slightly more robust way to factor word position into\
    \ a classification task is to replace dense layers with `Conv1D` and `MaxPooling1D`\
    \ layers, turning the network into a convolutional neural network. CNNs are most\
    \ often used to classify images, but one-dimensional convolution layers play well\
    \ with text sequences. Here’s the network presented in the previous example recast\
    \ as a CNN:\n\n```python\nfrom tensorflow.keras.models import Sequential\nfrom\
    \ tensorflow.keras.layers import Conv1D, MaxPooling1D, GlobalMaxPooling1D\nfrom\
    \ tensorflow.keras.layers import TextVectorization, InputLayer\nfrom tensorflow.keras.layers\
    \ import Dense, Embedding\nimport tensorflow as tf\n\nmodel = Sequential()\nmodel.add(InputLayer(input_shape=(1,),\
    \ dtype=tf.string))\nmodel.add(TextVectorization(max_tokens=max_words,\n     \
    \                      output_sequence_length=max_length))\nmodel.add(Embedding(max_words,\
    \ 32, input_length=max_length))\nmodel.add(Conv1D(32, 7, activation='relu'))\n\
    model.add(MaxPooling1D(5))\nmodel.add(Conv1D(32, 7, activation='relu'))\nmodel.add(GlobalMaxPooling1D())\n\
    model.add(Dense(1, activation='sigmoid'))\nmodel.compile(loss='binary_crossentropy',\
    \ optimizer='adam',\n              metrics=['accuracy'])\n```\n\nRather than process\
    \ individual words, the `Conv1D` layers in this example extract features from\
    \ groups of vectors representing words (seven in the first layer and seven more\
    \ in the second), just as `Conv2D` layers extract features from blocks of pixels.\
    \ The `MaxPooling1D` layer condenses the output from the first `Conv1D` layer\
    \ to reveal higher-level structure in input sequences, similar to the way reducing\
    \ the resolution of an image tends to draw out macro features such as the shape\
    \ of a person’s body while minimizing or filtering out altogether lesser features\
    \ such as the shape of a person’s eyes. A simple CNN like this one sometimes classifies\
    \ text more accurately than bag-of-words models, and sometimes does not. As is\
    \ so often the case in machine learning, the only way to know is to try.\n\n##\
    \ Recurrent Neural Networks (RNNs)\n\nYet another way to factor word position\
    \ into a classifier is to include recurrent layers in the network. Recurrent layers\
    \ were originally invented to process time-series data—for example, to look at\
    \ weather data for the past five days and predict what tomorrow’s high temperature\
    \ will be. If you simply took all the weather data for those five days and treated\
    \ each day independently, trends evident in the data would be lost. A recurrent\
    \ layer, however, might detect those trends and factor them into its output. A\
    \ sequence of vectors output by an embedding layer qualifies as a time series\
    \ because words in a phrase are ordered consecutively and words used early in\
    \ a phrase could inform how words that occur later are interpreted.\n\nFigure\
    \ 13-2 illustrates how a recurrent layer transforms word embeddings into a vector\
    \ that’s influenced by word order. In this example, sequences are input to an\
    \ embedding layer, which transforms each word (token) in the sequence into a vector\
    \ of floating-point numbers. These word embeddings are input to a recurrent layer,\
    \ yielding another output vector. To compute that vector, cells in the recurrent\
    \ layer loop over the embeddings comprising the sequence. The input to iteration\
    \ *n* + 1 of the loop is the current embedding vector *and* the output from iteration\
    \ *n*—the so-called *hidden state*. The output from the recurrent layer is the\
    \ output from the final iteration of the loop. The result is different than it\
    \ would have been had each embedding vector been processed independently because\
    \ each iteration uses information from the previous iteration to compute an output.\
    \ Context from a word early in a sequence can carry over to words that occur later\
    \ on.\n\nIt’s not difficult to build a very simple recurrent layer by hand that\
    \ works reasonably well with short sequences (say, four or five words), but longer\
    \ sequences will suffer from a vanishing-gradient effect that means words far\
    \ apart will exert little influence over one another. One solution is a recurrent\
    \ layer composed of *Long Short-Term Memory* (LSTM) cells, which were introduced\
    \ in a 1997 paper titled, appropriately enough, “Long Short-Term Memory”.\n\n\
    LSTM cells are miniature neural networks in their own right. As the cells loop\
    \ over the words in a sequence, they learn (just as the weights connecting neurons\
    \ in dense layers are learned) which words are important and lend that information\
    \ precedence in subsequent iterations through the loop. A dense layer doesn’t\
    \ recognize that there’s a connection between *blue* and *sky* in the phrase “I\
    \ like blue, for on a clear and sunny day, it is the color of the sky.” An LSTM\
    \ layer does and can factor that into its output. Its power diminishes, however,\
    \ as words grow farther apart.\n\nKeras provides a handy implementation of LSTM\
    \ layers in its `LSTM` class. It also provides a `GRU` class implementing gated\
    \ recurrent unit (GRU) layers, which are simplified LSTM layers that train faster\
    \ and often yield results that equal or exceed those of LSTM layers. Here’s how\
    \ our spam classifier would look if it were modified to use LSTM:\n\n```python\n\
    from tensorflow.keras.models import Sequential\nfrom tensorflow.keras.layers import\
    \ TextVectorization, InputLayer\nfrom tensorflow.keras.layers import Dense, Embedding,\
    \ LSTM\nimport tensorflow as tf\n\nmodel = Sequential()\nmodel.add(InputLayer(input_shape=(1,),\
    \ dtype=tf.string))\nmodel.add(TextVectorization(max_tokens=max_words,\n     \
    \                      output_sequence_length=max_length))\nmodel.add(Embedding(max_words,\
    \ 32, input_length=max_length))\nmodel.add(LSTM(32))\nmodel.add(Dense(1, activation='sigmoid'))\n\
    model.compile(loss='binary_crossentropy', optimizer='adam',\n              metrics=['accuracy'])\n\
    ```\n\nLSTMs are compute intensive, especially when dealing with long sequences.\

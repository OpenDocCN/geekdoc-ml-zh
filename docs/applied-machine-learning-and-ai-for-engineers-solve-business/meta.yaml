    of kernels, and you might get it to generalize slightly better by introducing
    a dropout layer. But you won’t reach 95% with this network and this dataset.


    One of the reasons modern CNNs can do image classification so accurately is that
    they’re trained with millions of images. You don’t need millions of samples of
    each class, but you probably need at *least* an order of magnitude more—if not
    *two* orders of magnitude more—than the 300 you trained with here. You could scour
    the internet for more images, but more images means more training time. If the
    goal is to achieve an accuracy of 95% or more, you’ll quickly get to the point
    where the CNN takes too long to train—or find yourself shopping for an NVIDIA
    GPU.


    That doesn’t mean CNNs aren’t practical for solving business problems. It just
    means that there’s more to learn. The next section is the first step in understanding
    how to attain high levels of accuracy without training a CNN from scratch.


    # Pretrained CNNs


    Microsoft, Google, and other tech companies use a [subset of the ImageNet dataset](https://www.image-net.org/)
    containing more than 1 million images to train state-of-the-art CNNs to recognize
    hundreds of objects, including Arctic foxes'

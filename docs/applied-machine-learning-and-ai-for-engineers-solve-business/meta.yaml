    \n## Face Detection with Convolutional Neural Networks\n\nWhile more computationally\
    \ expensive, deep-learning methods often do a better job of detecting faces in\
    \ images than Viola-Jones. In particular, *multitask cascaded convolutional neural\
    \ networks*, or MTCNNs, have proven adept at face detection in a variety of benchmarks.\
    \ They also identify facial landmarks such as the eyes, the nose, and the mouth.\n\
    \n[Figure 11-4](https://example.com/figure11-4) is adapted from a diagram in the\

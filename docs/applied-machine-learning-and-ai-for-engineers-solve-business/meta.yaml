    \ point reaches in computing decision boundaries. Lower values use more points\
    \ and produce smoother decision boundaries; higher values involve fewer points\
    \ and fit more tightly to the training data. This is illustrated in Figure 5-8,\
    \ where increasing `gamma` while holding C constant closes the decision boundary\
    \ more tightly around clusters of classes. `gamma` can be any nonzero positive\
    \ value, but values between 0 and 1 are the most common. Rather than hardcode\
    \ a default value for `gamma`, Scikit picks a default value algorithmically if\
    \ you don’t specify one.\n\nIn practice, data scientists experiment with different\
    \ kernels and different parameter values to find the combination that produces\
    \ the most accurate model, a process known as *hyperparameter tuning*. The usefulness\
    \ of hyperparameter tuning isn’t unique to SVMs, but you can almost always make\
    \ an SVM more accurate by finding the optimum combination of kernel type, C, and\
    \ `gamma` (and for polynomial kernels, degree).\n\n![](img/628b9a382d0944bbfa786c66bc651b50_111_0.png)\n\
    \nTo aid in the process of hyperparameter tuning, Scikit provides a family of\
    \ optimizers that includes GridSearchCV, which tries all combinations of a specified\
    \ set of parameter values with built-in cross-validation to determine which combination\
    \ produces the most accurate model. These optimizers prevent you from having to\
    \ write code to do a brute-force search using all the unique combinations of parameter\
    \ values. To be clear, they do brute-force searches themselves by training the\
    \ model multiple times, each time with a different combination of values. At the\

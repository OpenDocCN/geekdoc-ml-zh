  md: 'processing units (TPUs). Fine-tuning is accomplished by further training the
    pretrained model with task-specific samples and a reduced learning rate (Figure
    13-7). It’s a relatively simple matter, for example, to fine-tune BERT to perform
    sentiment analysis and outscore bag-of-words models for accuracy. BERT’s value
    lies in the fact that it possesses an innate understanding of the languages it
    was trained with and can be refined to perform domain-specific tasks.


    Aside from the fact that it was trained with a huge volume of samples, the key
    to BERT’s ability to understand human languages is an innovation known as *masked
    language modeling*, or MLM for short. The big idea behind MLM is that a model
    has a better chance of predicting what word should fill in the blank in the phrase
    “Every good ____ does fine” than it has at predicting the next word in the phrase
    “Every good ____.” The answer could be *boy*, as in “Every good boy does fine,”
    or it could be *turn*, as in “Every good turn deserves another.” Unidirectional
    models look at the text to the left or the text to the right and attempt to predict
    what the next word should be. MLM, on the other hand, uses text on the left *and*
    right to inform its decisions. That’s why BERT is a “bidirectional” transformer.


    When BERT models are pretrained, a specified percentage of the word tokens in
    each sequence—usually 15%—are randomly removed or “masked” so that the model can
    learn to predict them from the words around them. In addition, BERT models are
    usually pretrained to do next-sentence prediction, which makes them more adept
    at certain NLP tasks such as answering questions.


    BERT has been called the “Swiss Army knife” of NLP. Google uses it to [improve
    search results](https://example.com) and predict text as you type into a Gmail
    or Google Doc. Dozens of variations have been published, including [DistilBERT](https://example.com),
    which retains 97% of the accuracy of the original model while weighing in 40%
    smaller and running 60% faster. Also available are variations of BERT already
    fine-tuned for specific tasks such as question answering. Such models can be further
    refined using domain-specific datasets, or they can be used as is.'

    For example, one of the common applications for ML today is *sentiment analysis*:
    looking at a text sample such as a movie review or a comment left on a website
    and assigning it a 0 for negative sentiment (for example, “The food was bland
    and the service was terrible.”) or a 1 for positive sentiment (“Excellent food
    and service. Can’t wait to visit again!”). Some reviews might be mixed—for example,
    “The burger was great but the fries were soggy”—so we use the *probability* that
    the label is a 1 as a sentiment score. A very negative comment might score a 0.1,
    while a very positive comment might score a 0.9, as in there’s a 90% chance that
    it expresses positive sentiment.


    Sentiment analyzers and other models that work with text are frequently trained
    on datasets like the one in Figure 1-3, which contains one row for every text
    sample and one column for every word in the corpus of text (all the words in the
    dataset). A typical dataset like this one might contain millions of rows and 20,000
    or more columns. Each row contains a 0 for negative sentiment in the label column,
    or a 1 for positive sentiment. Within each row are word counts—the number of times
    a given word appears in an individual sample. The dataset is sparse, meaning it
    is mostly 0s with an occasional nonzero number sprinkled in. But machine learning
    doesn’t care about the makeup of the numbers. If there are patterns that can be
    exploited to determine whether the next sample expresses positive or negative
    sentiment, it will find them. Spam filters use datasets such as these with 1s
    and 0s in the label column denoting spam and nonspam messages. This allows modern
    spam filters to achieve an astonishing degree of accuracy. Moreover, these models
    grow smarter over time as they are trained with more and more emails.


    ![](img/628b9a382d0944bbfa786c66bc651b50_19_0.png)


    Sentiment analysis is an example of a *text classification* task: analyzing a
    text sample and classifying it as positive or negative. Machine learning has proven
    adept at *image classification* as well. A simple example of image classification
    is looking at photos of cats and dogs and classifying each one as a cat picture
    (0) or a dog picture (1). Real-world uses for image classification include flagging
    defective parts coming off an assembly line, identifying objects in view of a
    self-driving car, and recognizing faces in photos.


    Image classification models are trained with datasets like the one in Figure 1-4,
    in which each row represents an image and each column holds a pixel value. A dataset

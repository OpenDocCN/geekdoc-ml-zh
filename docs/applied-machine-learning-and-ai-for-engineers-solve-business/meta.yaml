    to caption it. The result is shown in [Figure 10-1](#figure-10-1). It’s somewhat
    remarkable given that no human intervention was required.


    ![](img/628b9a382d0944bbfa786c66bc651b50_205_0.png)


    *Figure 10-1. “A body of water with a dock and a building in the background”—Azure
    AI*


    The field of computer vision has advanced rapidly in recent years, mostly due
    to *convolutional neural networks*, also known as CNNs or *ConvNets*. In 2012,
    an eight-layer CNN called [AlexNet](https://en.wikipedia.org/wiki/AlexNet) outperformed
    traditional machine learning models entered in the annual [ImageNet Large Scale
    Visual Recognition Challenge (ILSVRC)](https://en.wikipedia.org/wiki/ImageNet#History_of_the_ImageNet_Large_Scale_Visual_Recognition_Challenge)
    by achieving an error rate of 15.3% when identifying objects in photos. In 2015,
    [ResNet-152](https://en.wikipedia.org/wiki/Residual_neural_network) featuring
    a whopping 152 layers won the challenge with an error rate of just 3.5%, which
    exceeds a human’s ability to classify images featured in the competition.


    CNNs are magical because they treat images as *images* rather than just arrays
    of pixel values. They use a decades-old technology called [convolution kernels](https://en.wikipedia.org/wiki/Kernel_(image_processing))
    to extract “features” from images, allowing them to recognize the shape of a cat’s
    head or the outline of a dog’s tail. Moreover, they are easy to build with Keras
    and TensorFlow.


    State-of-the-art CNNs such as ResNet-152 are trained at great expense with millions
    of images on GPUs, but there’s a lot you can do with an ordinary CPU. In this
    chapter, you’ll learn what CNNs are and how they work, and you’ll build and train
    a few CNNs of your own. You’ll also learn how to leverage advanced CNNs published
    for public consumption by companies such as Google and Microsoft, and how to use
    a technique called *transfer learning* to repurpose those CNNs to solve'

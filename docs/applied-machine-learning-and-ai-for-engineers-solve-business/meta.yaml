  - '[PAGE 270]


    > **NOTE**


    ROI pooling reduces any region of interest to a feature vector of a specified
    size, regardless of the region’s height and width. Imagine that you have an 8
    × 16 region of a feature map and you want to reduce it to 4 × 4. You can divide
    the 8 × 16 region into a 4 × 4 grid, with each cell in the grid measuring 2 ×
    4. You can then take the maximum of the eight values in each cell and plug them
    into the 4 × 4 grid. That’s ROI pooling. It’s simple, fast, and effective. And
    it works with regions of any size and aspect ratio.


    A 2016 paper titled “Faster R-CNN: Towards Real-Time Object Detection with Region
    Proposal Networks” further boosted performance by replacing selective search with
    a *region proposal network*, or RPN. The RPN is a shallow CNN that shares layers
    with the main CNN (Figure 12-5). To generate region proposals, it slides a window
    over the feature map generated by the last shared layer. At each stop in the window’s
    travel, the RPN evaluates *n* candidate regions called *anchors* or *anchor boxes*
    and computes an *objectness score* for each based on IoU scores with ground-truth
    boxes. Objectness scores and anchor boxes are input to fully connected layers
    for classification (does the anchor contain an object, and if so, what type?)
    and regression. The output from these layers ultimately determines the regions
    of interest projected onto the feature map generated by the main CNN and forwarded
    to the ROI pooling layer.


    ![](img/628b9a382d0944bbfa786c66bc651b50_270_0.png)


    Faster R-CNN can perform 10 times faster than Fast R-CNN and do object detection
    in near real time. It’s typically more accurate than Fast R-CNNs too, thanks to
    the RPN’s superior ability to identify candidate regions. Selective search is
    static, but an RPN gets smarter as the network is trained. RPNs also execute in
    parallel to the main CNN, which means region proposals have little impact on performance.


    # Mask R-CNN


    The next chapter in the R-CNN story came in 2017 in a paper titled “Mask R-CNN”.
    Mask R-CNNs extend Faster R-CNNs by adding *instance segmentation*, which identifies
    the shapes of objects detected in an image using *segmentation masks* like the
    ones in Figure 12-6. Performance impact is minimal because instance segmentation
    is performed in parallel with region evaluation. The benefit of Mask R-CNNs is
    that they provide more detail about the objects they detect. For example, you
    can tell whether a person’s arms are extended—something you can’t discern from
    a simple bounding box. They are also slightly more accurate than Faster R-CNNs
    because they replace ROI pooling with *ROI alignment*, which discards less information
    when generating feature vectors whose boundaries don’t perfectly align with the
    boundaries of the regions they represent.'

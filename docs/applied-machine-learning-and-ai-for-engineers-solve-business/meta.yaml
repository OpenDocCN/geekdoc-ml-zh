    \ the road => taillons la\ni love winning => jadore gagner\n```\n\nThe model isn’t\
    \ perfect, in part due to the limited size of the training set. Real NMT models\
    \ are trained with hundreds of millions or even billions of phrases. But is this\
    \ one truly representative of the models used for state-of-the-art text translation?\
    \ Figure 13-4 is adapted from an image in a 2016 paper written by Google engineers\
    \ documenting the architecture of Google Translate. The architecture maps closely\
    \ to that of the model just presented. It’s deeper, with eight LSTM layers in\
    \ the encoder and eight in the decoder. It also employs residual connections between\
    \ layers to support the network’s greater depth."

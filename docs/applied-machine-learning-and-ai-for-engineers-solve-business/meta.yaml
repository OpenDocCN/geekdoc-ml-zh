- md: "This example is a little more involved because `read_in_stream` returns before\
    \ the call has completed. We therefore loop until the call completes and then\
    \ retrieve the results. The call to `sleep` in each iteration of the `while` loop\
    \ allows the user interface to remain responsive while waiting for the call to\
    \ complete. The results are worth the wait:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_346_0.png)\n\
    \nPerhaps you'd prefer to extract *only* handwritten text from a document. You\
    \ can do that too, because for each line of text it detects, `read_in_stream`\
    \ includes a `style` attribute equal to “handwriting” for handwritten text. To\
    \ demonstrate, replace the final two lines in the previous example with these:\n\
    \n```python\nif (line.appearance.style.name == 'handwriting'):\n    draw_box(line.bounding_box)\n\
    \    print(line.text)\n```\n\nThis time, only handwritten text is highlighted:\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_346_1.png)\n\n`read_in_stream` does\
    \ a commendable job of converting the handwritten text into Python strings too:\n\
    \n- $ 100\n- Jeff\n- Prosise\n- 111-22-0000\n- 1313 Mockingbird Lane\n- Oak Ridge\n\
    - TN\n\nA final note regarding the Computer Vision service is that it doesn’t\
    \ accept images larger than 4 MB. Anything larger produces a `ComputerVisionErrorResponseException`.\
    \ You can catch these exceptions (or `AzureError` exceptions, which are higher\
    \ up the food chain) and recover gracefully, or you can check an image’s size\
    \ before submitting it and downsize it if necessary.\n\n## The Language Service\n\
    \nThe Computer Vision service employs deep-learning models similar to the ones\
    \ you learned about in Chapters 10, 11, and 12. The Language and Translator services\
    \ use models like the ones in Chapter 13. The latter two services embody NLP:\
    \ sentiment analysis, neural machine translation, question answering, and more.\
    \ The `TextAnalyticsClient` class in the Python text analytics SDK provides a\
    \ convenient interface to many of the Language service’s features. You’ve already\
    \ seen it used for sentiment analysis. Here’s another example that applies sentiment\
    \ analysis to multiple text samples with one round trip to the Language service:\n\
    \n```python\nfrom azure.core.credentials import AzureKeyCredential\nfrom azure.ai.textanalytics\
    \ import TextAnalyticsClient\n\nclient = TextAnalyticsClient(ENDPOINT, AzureKeyCredential(KEY))\n\
    \ninput = [\n    { 'id': '1000', 'text': 'Programming is fun, but the hours are\
    \ long' },\n    { 'id': '1001', 'text': 'Great food and excellent service' },\n\
    \    { 'id': '1002', 'text': 'The product worked as advertised but is ' \\n  \
    \                     'overpriced' },\n    { 'id': '1003', 'text': 'Moving to\
    \ the cloud was the best decision ' \\n                       'we ever made' },\n\
    \    { 'id': '1004', 'text': 'Programming is so fun I\\'d do it for free. ' \\\
    n                       'Don\\'t tell my boss!' }\n]\nresponse = client.analyze_sentiment(input)\n\
    \nfor result in response:\n    text = ''.join([x.text for x in result.sentences])\n\
    \    print(f'{text} => {result.confidence_scores.positive}')\n```\n\nHere’s the\
    \ output:\n\n```\nProgramming is fun, but the hours are long => 0.94\nGreat food\
    \ and excellent service => 1.0\nThe product worked as advertised but is overpriced\
    \ => 0.0\nMoving to the cloud was the best decision we ever made => 1.0\nProgramming\
    \ is so fun I'd do it for free. Don't tell my boss! => 1.0\n```\n\nLet’s say you’re\
    \ writing an app that collects tweets referencing your company and analyzes them\
    \ for sentiment. The idea is that if sentiment turns negative, you can give the\
    \ marketing department a heads-up. It’s faster and more efficient to place one\
    \ call to Azure Cognitive Services and analyze 100 tweets than to make 100 calls\
    \ analyzing one tweet at a time.\n\nSentiment analysis is one of several operations\
    \ supported by the TextAnalyticsClient class. Another is named-entity recognition.\
    \ Suppose you're building a system that sorts and prioritizes support tickets\
    \ received by your company's help desk. The `recognize_entities` method extracts\
    \ entities such as people, places, organizations, dates and times, and quantities\
    \ from input text. It reveals the entity types as well:\n\n```python\ndocuments\
    \ = [\n    'My printer isn\\'t working. Can someone from IT come to my office\
    \ ' \\n    'and have a look?'\n]\n\nresults = client.recognize_entities(documents)\n\
    \nfor result in results:\n    for entity in result.entities:\n        print(f'{entity.text}\
    \ ({entity.category})')\n```\n\nThe output from this example is as follows:\n\n\
    ```\nprinter (Product)\nIT (Skill)\noffice (Location)\n```\n\nA related method\
    \ named `recognize_pii_entities` extracts personally identifiable information\
    \ (PII) entities such as bank account info, Social Security numbers, and credit\
    \ card numbers from text input to it, while the `extract_key_phrases` method extracts\
    \ key phrases:\n\n```python\ndocuments = [\n    'Natural Language Processing,\
    \ or NLP, encompasses a variety of ' \\n    'activities including text classification,\
    \ keyword extraction,' \\n    'named-entity recognition, question answering, and\
    \ language ' \\n    'translation.'\n]\n\nresults = client.extract_key_phrases(documents)\n\
    \nfor result in results:\n    for phrase in result.key_phrases:\n        print(phrase)\n\
    ```\n\nHere's the output:\n\n```\nNatural Language Processing\nlanguage translation\n\
    text classification\nkeyword extraction\nquestion answering\nNLP\nvariety\nactivities\n\
    recognition\n```\n\nThis example is a simple one given that the text is so brief,\
    \ but you could pass in hundreds of large documents and use the results to get\
    \ a snapshot of each document’s content, or group documents that contain similar\
    \ keywords.\n\nTextAnalyticsClient provides a wrapper around text analytics APIs.\
    \ Other Python SDKs unlock additional features of the Language service. For example,\
    \ the question-answering SDK provides APIs for answering questions from manuals,\
    \ FAQs, blog posts, and other documents that you provide. For more information,\
    \ and to see this aspect of the Language service in action, refer to the article\
    \ titled “Azure Cognitive Language Services Question Answering Client Library\
    \ for Python”.\n\n## The Translator Service\n\nThe Translator service uses state-of-the-art\
    \ neural machine translation to translate text between dozens of languages. It\
    \ can also identify written languages. Suppose your objective is to translate\
    \ into English questions written in other languages and submitted through your\
    \ company’s website. First you need to determine whether the source language is\
    \ English. If it’s not, you want to translate it so that you can respond to the\
    \ customer’s request.\n\nThe following code analyzes a text sample and shows the\
    \ language it’s written in. Microsoft doesn’t currently offer a Python SDK for\
    \ the Translator service, but you can use Python’s Requests package to simplify\
    \ calls. To demonstrate, create a Translator resource in the Azure Portal and\
    \ grab the subscription key (the one labeled “Text Translation”), endpoint, and\
    \ region. Then run the following code, replacing KEY and ENDPOINT with the key\
    \ and endpoint and REGION with the Azure region you selected (for example, southcentralus):\n\
    \n```python\nimport requests\n\ninput = [{ 'text': 'Quand votre nouveau livre\
    \ sera-t-il disponible?' }]\n\nheaders = {\n    'Ocp-Apim-Subscription-Key': KEY,\n\
    \    'Ocp-Apim-Subscription-Region': REGION,\n    'Content-type': 'application/json'\n\
    }\n\nuri = ENDPOINT + 'detect?api-version=3.0&to=en'\nresponse = requests.post(uri,\
    \ headers=headers, json=input)\nresults = response.json()\n\nprint(results[0]['language'])\n\
    ```\n\nThe output is fr for French. Now that you’ve determined the source language\
    \ isn’t English, you can translate it this way:\n\n```python\nuri = ENDPOINT +\
    \ 'translate?api-version=3.0&from=fr&to=en'\nresponse = requests.post(uri, headers=headers,\
    \ json=input)\nresults = response.json()\n\nprint(results[0]['translations'][0]['text'])\n\
    ```\n\nThe translated text is:\n\nWhen will your new book be available?\n\nYou\
    \ can omit `from=fr` from the URL and allow the Translator service to detect the\
    \ language for you. You can also detect the language and translate the text with\
    \ one call. If you call the `translate` endpoint without a `from` parameter, the\
    \ return value includes a `detectedLanguage` item that identifies the language\
    \ in the source text:\n\n```json\n[{'detectedLanguage': {'language': 'fr', 'score':\
    \ 1.0}, 'translations': [{'text': 'When will your new book be available?', 'to':\
    \ 'en'}]}]\n```\n\nIf passed a list containing multiple text samples, the Translator\
    \ service will translate all of them in one call. It also supports *transliteration*:\
    \ translating text to other alphabets. To see for yourself, use Google Translate\
    \ to translate “When will your new book be available” to Thai or Hindi. Then paste\
    \ the Thai or Hindi text over the French text in the previous example and run\
    \ it again. Be sure to also change `from=fr` to `from=th` or `from=hi` or simply\
    \ remove the `from` parameter altogether.\n\n> **TIP**\n\nWhen you create a Translator\
    \ resource, you have a choice of creating a global resource or one tied to a specific\
    \ Azure region. The preceding examples assume that you created it as a regional\
    \ resource. If you created a global Translator resource instead, you can set the\
    \ `Ocp-Apim-Subscription-Region` header to `global` or omit the header altogether.\n\
    \nWhen you obtained an endpoint for the Translator service, did you notice that\
    \ the Azure Portal offered *two* endpoints—one for “Text Translation” and another\
    \ for “Document Translation?” That’s because the Translator service features a\
    \ second API for translating entire documents, including PDFs. There’s even a\
    \ [Python SDK](https://learn.microsoft.com/en-us/azure/ai-services/translator/document-translation/quickstart-sdk)\
    \ to help out. The only catch is that documents must first be uploaded to Azure\
    \ blob storage. For examples showing the document translation API in action, see\
    \ “[Azure Document Translation Client Library for Python](https://learn.microsoft.com/en-us/azure/ai-services/translator/document-translation/quickstart-sdk)”.\
    \ The API is asynchronous and can process batches of documents in one call, so\
    \ it’s ideal not just for translating individual documents, but for translating\
    \ large volumes of documents at scale.\n\n## The Speech Service\n\nOne of the\
    \ more challenging tasks for deep-learning models is processing human speech.\
    \ Azure Cognitive Services includes a [Speech service](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/overview)\
    \ that converts text to speech, speech to text, and more. It’s even capable of\
    \ [captioning recorded videos and live video streams](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/get-started-stt-diarization?tabs=terminal&pivots=programming-language-python)\
    \ and filtering out profanity as it does. A [Python SDK](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/quickstarts/setup-platform?pivots=programming-language-python&tabs=macos)\
    \ simplifies the code you write and makes it remarkably easy to incorporate speech\
    \ into your apps.\n\nTo demonstrate, install the package named [Azure-cognitiveservices-speech](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/quickstarts/setup-platform?pivots=programming-language-python&tabs=macos)\
    \ containing the Python Speech SDK. Use the Azure Portal to create a Cognitive\
    \ Services Speech resource and make note of the subscription key and service region.\
    \ Then create a Jupyter notebook and run the following code in the first cell\
    \ after replacing KEY with the subscription key and REGION with the region you\
    \ selected:"
  mdcn: "这个示例稍微复杂一些，因为 `read_in_stream` 在调用完成之前就返回了。因此，我们需要循环直到调用完成，然后检索结果。在 `while`\

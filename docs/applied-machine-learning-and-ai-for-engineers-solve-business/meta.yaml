- md: "## Pooling layers\n\nPooling layers downsample images to reduce their size.\
    \ The most common resizing technique is *max pooling*, which divides images into\
    \ 2 × 2 blocks of pixels and selects the highest of the four values in each block.\
    \ An alternative is *average pooling*, which averages the values in each block.\n\
    \nFigure 10-6 shows how an image contracts as it passes through successive pooling\
    \ layers. The first row came from the first pooling layer, the second row came\
    \ from the second pooling layer, and so on.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_208_0.png)\n\
    \nPooling isn’t the only way to downsize an image. While less common, reduction\
    \ can be accomplished without pooling layers by setting a convolution layer’s\
    \ stride to 2. *Stride* is the number of pixels a convolution kernel moves as\
    \ it passes over an image. It defaults to 1, but setting it to 2 halves the image\
    \ size by ignoring every other row and every other column of pixels.\n\nThe dense\
    \ layers at the end of the network classify features extracted from the bottleneck\
    \ layers and are referred to as the CNN’s *classification layers*. They are no\
    \ different than the multilayer perceptrons featured in Chapter 9. For binary\
    \ classification, the output layer contains one neuron and uses the `sigmoid`\
    \ activation function. For multiclass classification, the output layer contains\
    \ one neuron per class and uses the `softmax` activation function.\n\n> **NOTE**\n\
    \nThere’s no law that says bottleneck layers *have* to be paired with classification\
    \ layers. You could take the feature maps output from the bottleneck layers and\
    \ classify them with a support vector machine rather than a multilayer perceptron.\
    \ It’s not as far-fetched as it sounds. In Chapter 12, I’ll introduce one well-known\
    \ model that does just that.\n\n## Using Keras and TensorFlow to Build CNNs\n\n\
    To simplify building CNNs that classify images, Keras offers the `Conv2D` class,\
    \ which models convolution layers, and the `MaxPooling2D` class, which implements\
    \ max pooling layers. The following statements create a CNN with two pairs of\
    \ convolution and pooling layers, a flatten layer to reshape the output into a\
    \ 1D array for input to a dense layer, a dense layer to classify the features\
    \ extracted from the bottleneck layers, and a softmax output layer for classification:\n\
    \n```python\nfrom tensorflow.keras.models import Sequential\nfrom tensorflow.keras.layers\
    \ import Conv2D, MaxPooling2D, Flatten, Dense\n\nmodel = Sequential()\nmodel.add(Conv2D(32,\
    \ (3, 3), activation='relu', input_shape=(28, 28, 1)))\nmodel.add(MaxPooling2D((2,\
    \ 2)))\nmodel.add(Conv2D(64, (3, 3), activation='relu'))\nmodel.add(MaxPooling2D((2,\
    \ 2)))\nmodel.add(Flatten())\nmodel.add(Dense(128, activation='relu'))\nmodel.add(Dense(10,\
    \ activation='softmax'))\n```\n\nThe first parameter passed to the Conv2D function\
    \ is the number of convolution kernels to include in the layer. More kernels means\
    \ more fitting power, similar to the number of neurons in a dense layer. The second\
    \ parameter is the dimensions of each kernel. You sometimes get greater accuracy\
    \ from 5 × 5 kernels, but a kernel that size increases training time by requiring\
    \ 25 multiplication operations for each pixel as opposed to nine for a 3 × 3 kernel.\
    \ The input_shape parameter in the first layer specifies the size of the images\
    \ input to the CNN: in this case, one-channel (grayscale) 28 × 28 images. All\
    \ the images used to train a CNN must be the same size.\n\n> **NOTE**\nConv2D\
    \ processes images, which are two-dimensional. Keras also offers the Conv1D class\
    \ for processing 1D data and Conv3D for 3D data. The former finds use processing\
    \ text and time-series data. Canonical use cases for Conv3D include analyzing\
    \ video and 3D medical images.\n\nGiven a set of images with a relatively high\
    \ degree of separation between classes, it’s perfectly feasible to train a CNN\
    \ to classify those images on a typical laptop or PC. A great example is the MNIST\
    \ dataset, which contains 60,000 training images of scanned, handwritten digits,\
    \ each measuring 28 × 28 pixels, plus 10,000 test images. Figure 10-7 shows the\
    \ first 50 scans in the training set.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_209_0.png)\n\
    \nLet’s train a CNN to recognize digits in the MNIST dataset, which conveniently\
    \ is one of several sample datasets built into Keras. Begin by creating a new\
    \ Jupyter notebook and using the following statements to load the dataset, reshape\
    \ the 28 × 28 images into 28 × 28 × 1 arrays (28 × 28 images containing a single\
    \ color channel), and divide the pixel values by 255 as a simple form of normalization:\n\
    \n```python\nfrom tensorflow.keras.datasets import mnist\n\n(train_images, y_train),\
    \ (test_images, y_test) = mnist.load_data()\nx_train = train_images.reshape(60000,\
    \ 28, 28, 1) / 255\nx_test = test_images.reshape(10000, 28, 28, 1) / 255\n```\n\
    \nNext, define a CNN that accepts 28 × 28 × 1 arrays of pixel values as input,\
    \ contains two pairs of convolution and pooling layers, and has a softmax output\
    \ layer with 10 neurons since the dataset contains scans of 10 different digits:\n\
    \n```python\nfrom tensorflow.keras.layers import Conv2D, MaxPooling2D, Dense,\
    \ Flatten\nfrom tensorflow.keras.models import Sequential\n\nmodel = Sequential()\n\
    model.add(Conv2D(32, (3, 3), activation='relu', input_shape=(28, 28, 1)))\nmodel.add(MaxPooling2D(2,\
    \ 2))\nmodel.add(Conv2D(64, (3, 3), activation='relu'))\nmodel.add(MaxPooling2D(2,\
    \ 2))\nmodel.add(Flatten())\nmodel.add(Dense(128, activation='relu'))\nmodel.add(Dense(10,\
    \ activation='softmax'))\nmodel.compile(optimizer='adam', loss='sparse_categorical_crossentropy',\n\
    \              metrics=['accuracy'])\nmodel.summary(line_length=80)\n```\n\nFigure\
    \ 10-8 shows the output from the call to summary on the final line. The summary\
    \ reveals a lot about how this CNN processes images. Each pooling layer reduces\
    \ the image size by half, while each convolution layer reduces the image’s height\
    \ and width by two pixels. Why is that? By default, a convolution kernel doesn’t\
    \ start with its center cell over the pixel in the upper-left corner of the image;\
    \ rather, its upper-left corner is aligned with the image’s upper-left corner.\
    \ For a 3 × 3 kernel, there’s a 1-pixel-wide border around the edges that doesn’t\
    \ survive the convolution. (For a 5 × 5 kernel, the border that doesn’t survive\
    \ is 2 pixels wide.) The term for this is padding, and if you’d like, you can\
    \ override the default behavior to push the kernel’s center cell right up to the\

  md: "One way to improve—or at least *attempt* to improve—on a simple bag-of-words\
    \ model is to use *n*-grams as described in Chapter 4. An *n*-gram is a collection\
    \ of *n* words appearing in consecutive order. Keras’s `TextVectorization` class\
    \ features an `ngrams` parameter that makes applying *n*-grams easy. The following\
    \ statement creates a `TextVectorization` layer that considers word pairs as well\
    \ as individual words:\n\n```\nmodel.add(TextVectorization(max_tokens=max_words,\n\
    \                           output_sequence_length=max_length,\n             \
    \              ngrams=2))\n```\n\nOne limitation of *n*-grams is that they only\
    \ consider words that are directly adjacent to each other. A slightly more robust\
    \ way to factor word position into a classification task is to replace dense layers\
    \ with `Conv1D` and `MaxPooling1D` layers, turning the network into a convolutional\
    \ neural network. CNNs are most often used to classify images, but one-dimensional\
    \ convolution layers play well with text sequences. Here’s the network presented\
    \ in the previous example recast as a CNN:\n\n```\nfrom tensorflow.keras.models\
    \ import Sequential\nfrom tensorflow.keras.layers import Conv1D, MaxPooling1D,\
    \ GlobalMaxPooling1D\nfrom tensorflow.keras.layers import TextVectorization, InputLayer\n\
    from tensorflow.keras.layers import Dense, Embedding\nimport tensorflow as tf\n\
    \nmodel = Sequential()\nmodel.add(InputLayer(input_shape=(1,), dtype=tf.string))\n\
    model.add(TextVectorization(max_tokens=max_words,\n                          \
    \ output_sequence_length=max_length))\nmodel.add(Embedding(max_words, 32, input_length=max_length))\n\
    model.add(Conv1D(32, 7, activation='relu'))\nmodel.add(MaxPooling1D(5))\nmodel.add(Conv1D(32,\
    \ 7, activation='relu'))\nmodel.add(GlobalMaxPooling1D())\nmodel.add(Dense(1,\
    \ activation='sigmoid'))\nmodel.compile(loss='binary_crossentropy', optimizer='adam',\n\
    \              metrics=['accuracy'])\n```\n\nRather than process individual words,\
    \ the `Conv1D` layers in this example extract features from groups of vectors\
    \ representing words (seven in the first layer and seven more in the second),\
    \ just as `Conv2D` layers extract features from blocks of pixels. The `MaxPooling1D`\
    \ layer condenses the output from the first `Conv1D` layer to reveal higher-level\
    \ structure in input sequences, similar to the way reducing the resolution of\
    \ an image tends to draw out macro features such as the shape of a person’s body\
    \ while minimizing or filtering out altogether lesser features such as the shape\
    \ of a person’s eyes. A simple CNN like this one sometimes classifies text more\
    \ accurately than bag-of-words models, and sometimes does not. As is so often\
    \ the case in machine learning, the only way to know is to try.\n\n# Recurrent\
    \ Neural Networks (RNNs)\n\nYet another way to factor word position into a classifier\
    \ is to include recurrent layers in the network. Recurrent layers were originally\
    \ invented to process time-series data—for example, to look at weather data for\
    \ the past five days and predict what tomorrow’s high temperature will be. If\
    \ you simply took all"

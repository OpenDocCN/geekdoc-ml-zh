    data analysts, and professors, and they happen to be among the smartest people
    I know: Larry Clement, Manjeet Dahiya, Tom Marshall, Don Meyer, Goku Mohandas,
    Ken Muse, Lipi Deepaakshi Patnaik, Charles Petzold, Abby Prosise, Adam Prosise,

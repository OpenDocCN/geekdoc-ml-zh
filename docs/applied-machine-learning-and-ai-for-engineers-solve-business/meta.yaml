    \ wasn’t trained to recognize walruses, but your network was. That’s transfer\
    \ learning in a nutshell. It’s the deep-learning equivalent of having your cake\
    \ and eating it too. And it’s the secret sauce that makes CNNs a viable tool for\
    \ anyone with a laptop and a few hundred training images.\n\nThat’s not to say\
    \ that transfer learning will *always* get you 97% accuracy with 100 images per\
    \ class. It won’t. If a dataset lacks the information to achieve that level of\
    \ separation, neither scratch-built CNNs nor transfer learning will magically\
    \ make it happen. That’s always true in machine learning and AI. You can’t get\
    \ water from a rock. And you can’t build an accurate model from data that doesn’t\
    \ support it.\n\n## Data Augmentation\n\nThe previous example demonstrated how\
    \ to use transfer learning to build a model that, with just 300 training images,\
    \ can classify photos of three different types of Arctic wildlife with 97% accuracy.\
    \ One of the benefits of transfer learning is that it can do more with fewer images.\
    \ This feature is also a bug, however. With just 100 or so samples of each class,\
    \ there is little diversity among images. A model might be able to recognize a\
    \ polar bear if the bear’s head is perfectly aligned in the center of the photo.\
    \ But if the training images don’t include photos with the bear’s head aligned\
    \ differently or tilted at different angles, the model might have difficulty classifying\
    \ the photo.\n\nOne solution is *data augmentation*. Rather than scare up more\
    \ training images, you can rotate, translate, and scale the images you have. It\
    \ doesn't *always* increase a CNN's accuracy, but it frequently does, especially\
    \ with small datasets. Keras makes it easy to randomly transform training images\
    \ provided to a network. Images are transformed differently in each epoch, so\
    \ if you train for 10 epochs, the network sees 10 different variations of each\
    \ training image. This can increase a model's ability to generalize with little\
    \ impact on training time. Figure 10-12 shows the effect of applying random transforms\
    \ to a hot dog image. You can see why presenting the same image to a model in\
    \ different ways might make the model more adept at recognizing hot dogs, regardless\
    \ of how the hot dog is framed.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_227_0.png)\n\
    \nKeras has built-in support for data augmentation with images. Let's look at\
    \ a couple of ways to put image augmentation to work, and then apply it to the\
    \ Arctic wildlife model.\n\n## Image Augmentation with ImageDataGenerator\n\n\
    One way to apply image augmentation when training a model is to use Keras's `ImageDataGenerator`\
    \ class. `ImageDataGenerator` generates batches of training images on the fly,\
    \ either from images you've loaded (for example, with Keras's `load_img` function)\
    \ or from a specified location in the filesystem. The latter is especially useful\
    \ when training CNNs with millions of images because it loads images into memory\
    \ in batches rather than all at once. Regardless of where the images come from,\
    \ however, `ImageDataGenerator` is happy to apply transforms as it serves them\
    \ up.\n\nHere's a simple example that you can try yourself. Use the following\
    \ code to load an image from your filesystem, wrap an `ImageDataGenerator` around\
    \ it, and generate 24 versions of the image:\n\n```python\nimport numpy as np\n\
    from tensorflow.keras.preprocessing import image\nfrom tensorflow.keras.preprocessing.image\
    \ import ImageDataGenerator\nimport matplotlib.pyplot as plt\n%matplotlib inline\n\
    \n# Load an image\nx = image.load_img('Wildlife/train/polar_bear/polar_bear_010.jpeg')\n\
    x = image.img_to_array(x)\nx = np.expand_dims(x, axis=0)\n\n# Wrap an ImageDataGenerator\
    \ around it\nidg = ImageDataGenerator(rescale=1./255,\n                      \
    \  horizontal_flip=True,\n                        rotation_range=30,\n       \
    \                 width_shift_range=0.2,\n                        height_shift_range=0.2,\n\
    \                        zoom_range=0.2)\nidg.fit(x)\n\n# Generate 24 versions\
    \ of the image\ngenerator = idg.flow(x, [0], batch_size=1, seed=0)\nfig, axes\
    \ = plt.subplots(3, 8, figsize=(16, 6),\n                        subplot_kw={'xticks':\
    \ [], 'yticks': []})\nfor i, ax in enumerate(axes.flat):\n    img, label = generator.next()\n\
    \    ax.imshow(img[0])\n```\n\nHere's the result:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_228_0.png)\n\
    \nThe parameters passed to `ImageDataGenerator` tell it how to transform each\
    \ image it delivers:\n\n- `rescale=1./255`: Divides each pixel value by 255\n\
    - `horizontal_flip=True`: Randomly flips the image horizontally (around the vertical\
    \ axis)\n- `rotation_range=30`: Randomly rotates the image by -30 to 30 degrees\n\
    - `width_shift_range=0.2` and `height_shift_range=0.2`: Randomly translates the\
    \ image by -20% to 20%\n- `zoom_range=0.2`: Randomly scales the image by -20%\
    \ to 20%\n\nThere are other parameters that you can use, such as `vertical_flip`,\
    \ `shear_range`, and `brightness_range`, but you get the picture. The `flow` method\
    \ used in this example generates images from the images you pass to `fit`. The\
    \ related `flow_from_directory` method loads images from the filesystem and optionally\
    \ labels them based on the subdirectories they're in.\n\nThe generator returned\
    \ by `flow` can be passed directly to a model's `fit` method to provide randomly\
    \ transformed images to the model as it is trained. Assume that `x_train` and\
    \ `y_train` hold a collection of training images and labels. The following code\
    \ wraps an `ImageDataGenerator` around them and uses them to train a model:\n\n\
    ```python\nidg = ImageDataGenerator(rescale=1./255,\n                        horizontal_flip=True,\n\
    \                        rotation_range=30,\n                        width_shift_range=0.2,\n\
    \                        height_shift_range=0.2,\n                        zoom_range=0.2)\n\
    \nidg.fit(x_train)\nimage_batch_size = 10\ngenerator = idg.flow(x_train, y_train,\
    \ batch_size=image_batch_size, seed=0)\n\nmodel.fit(generator,\n          steps_per_epoch=len(x_train)\
    \ // image_batch_size,\n          validation_data=(x_test, y_test),\n        \
    \  batch_size=20,\n          epochs=10)\n```\n\nThe `steps_per_epoch` parameter\
    \ is key because an `ImageDataGenerator` can provide an infinite number of versions\
    \ of each image. In this example, the `batch_size` parameter passed to `flow`\
    \ tells the generator to create 10 images in each batch. Dividing the number of\
    \ images by the image batch size to calculate `steps_per_epoch` ensures that in\
    \ each training epoch, the model is provided with one transformed version of each\
    \ image in the dataset.\n\n> **NOTE**\n\nVersions of Keras prior to 2.1 didn't\
    \ allow a generator to be passed to the `fit` method. Instead, they provided a\
    \ separate method named `fit_generator`. That method is deprecated and will be\

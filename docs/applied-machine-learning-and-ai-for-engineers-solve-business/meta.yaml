- md: "With a little luck, validation accuracy topped out at around 93%—a few points\
    \ better than the equivalent bag-of-words model. Just imagine what you could do\
    \ if you trained the model with more than 25,000 reviews. One of Hugging Face’s\
    \ pretrained sentiment analysis models—the twitter-roberta-base model—was trained\
    \ with 58 million tweets. Not surprisingly, it does a wonderful job of scoring\
    \ text for sentiment.\n\nFinish up by defining an `analyze_text` function that\
    \ returns a sentiment score and using it to score a positive review for sentiment.\
    \ The model returns an object wrapping a tensor containing unnormalized sentiment\
    \ scores (one for negative and one for positive), but you can use TensorFlow’s\
    \ `softmax` function to normalize them to values from 0.0 to 1.0:\n\n```python\n\
    import tensorflow as tf\n\ndef analyze_text(text, tokenizer, model):\n    tokenized_text\
    \ = tokenizer(text, padding=True, truncation=True,\n                         \
    \      return_tensors='tf')\n    prediction = model(tokenized_text)\n    return\
    \ tf.nn.softmax(prediction[0]).numpy()[0][1]\n\nanalyze_text('Great food and excellent\
    \ service!', tokenizer, model)\n```\n\nTry it again with a negative review:\n\n\
    ```python\nanalyze_text('The long lines and poor customer service really turned\
    \ me off.',\n             tokenizer, model)\n```\n\nFine-tuning isn’t cheap, but\
    \ it isn’t nearly as expensive as training a sophisticated transformer from scratch.\
    \ The fact that you could train a sentiment analysis model to be this accurate\
    \ in about an hour of GPU time is a tribute to the power of pretrained BERT models,\
    \ and to the Google engineers who created them.\n\n## Summary\n\nNatural language\
    \ processing, or NLP, is an area of deep learning that encompasses text classification,\
    \ question answering, text translation, and other tasks that require computers\
    \ to process textual data. A key element of every NLP model is an embedding layer,\
    \ which represents words with arrays of floating-point numbers that model the\
    \ relationships between words. The vectors for *excellent* and *amazing* in embedding\
    \ space are close together, for example, while the vectors for *butterfly* and\
    \ *basketball* are far apart since the words have no semantic relationship. Word\
    \ embeddings are learned as a model is trained.\n\nText input to an embedding\
    \ layer must first be tokenized and turned into sequences of equal length. Keras’s\
    \ `Tokenizer` class does most of the work. Rather than tokenize and sequence text\
    \ separately, you can include a `TextVectorization` layer in a model to do the\
    \ tokenization and padding automatically.\n\nOne way to classify text is to use\
    \ a traditional dense layer to classify the vectors output from an embedding layer.\
    \ An alternative is to use convolution layers or recurrent layers to tease information\
    \ regarding word position from the embedding vectors and classify the output from\
    \ those layers.\n\nThe use of deep learning to translate text to other languages\
    \ is known as neural machine translation, or NMT. Until recently, state-of-the-art\
    \ NMT was performed using LSTM-based encoder-decoder models. Today those models\
    \ have largely given way to transformer models that use neural attention to focus\
    \ on the words in a phrase that are most meaningful and model word context. A\
    \ transformer knows that the word *train* has different meanings in “meet me at\
    \ the train station” and “it’s time to train a model,” and it factors word order\
    \ into its calculations.\n\nBERT is a sophisticated transformer model installed\
    \ with language understanding when engineers at Google trained it with billions\
    \ of words. It can be fine-tuned for specific tasks such as question answering\
    \ and sentiment analysis, and several fine-tuned versions have been published\
    \ for the public to use. These models can sometimes be used as is. Other times,\
    \ they can be further refined and adapted to domain-specific tasks. Because fine-tuning\
    \ requires orders of magnitude less data and compute power than training BERT\
    \ from scratch, pretrained (and pre–fine-tuned) BERT models have proven a boon\
    \ to NLP.\n\nSophisticated NLP models are trained with millions of words or phrases,\
    \ requiring a substantial investment in data collection and hardware for training.\
    \ Companies such as Hugging Face publish pretrained models that you can leverage\
    \ in your code. This is a growing trend in AI: publishing models that are already\
    \ trained to solve common problems. You’ll still build models to solve problems\
    \ that are domain specific, but many tasks—especially those involving NLP—are\
    \ not consigned to a particular domain.\n\nDownloading pretrained models isn’t\
    \ the only way to leverage sophisticated AI to solve business problems. Companies\
    \ such as Microsoft and Amazon train deep-learning models of their own and make\
    \ them publicly available using REST APIs. Microsoft calls its suite of APIs Azure\
    \ Cognitive Services. You’ll learn all about them in [Chapter 14](Chapter 14).\n\
    \n## Chapter 14. Azure Cognitive Services\n\nAs a child growing up in the 1960s,\
    \ I idolized the Apollo astronauts. Swaggering out to the launch pad and riding\
    \ flame-breathing rockets into space, they were my superheroes. But the group\
    \ I really wanted to emulate—the people I wanted to *be*—were the engineers in\
    \ Mission Control. Seated in front of their CRT screens in white shirts and black\
    \ ties, chatting with the astronauts and poised to spring into action at the first\
    \ sign of trouble, they were the epitome of cool. They used computers less powerful\
    \ than today’s smartphones to put men on the moon—a scientific achievement that\
    \ is unsurpassed to this day.\n\nThanks to deep learning, computers today can\
    \ perform feats of magic that the engineers in Mission Control could only have\
    \ dreamed of. They can recognize objects in images, translate text and speech\
    \ to other languages, identify people in video feeds, turn art into words and\
    \ words into art, and more. But state-of-the-art deep-learning models are too\
    \ complex—and too costly—for the average engineer or software developer to build.\
    \ Microsoft reportedly spent hundreds of thousands of dollars training the ResNet\
    \ model that won the 2015 ImageNet Large Scale Visual Recognition Challenge. Creating\
    \ that model required a great deal of expertise, massive amounts of GPU time,\
    \ and millions of images.\n\nA welcome trend in AI today is *AI as a service*.\
    \ Microsoft, Amazon, Google, and other tech giants employ professional data scientists\
    \ who build sophisticated deep-learning models. They train them at their own expense\
    \ and make them available to anyone who wishes to use them by means of [REST APIs](https://docs.microsoft.com/en-us/rest/api/).\
    \ If you can write code to send an HTTP request over the internet, you can leverage\
    \ these APIs to infuse AI into your apps without taking time off from your day\
    \ job to earn a PhD in deep learning.\n\nMicrosoft calls its suite of AI services\
    \ [Azure Cognitive Services](https://azure.microsoft.com/en-us/services/cognitive-services/).\
    \ Amazon uses the name [AWS AI Services](https://aws.amazon.com/machine-learning/).\
    \ Both offer a rich assortment of APIs served by deep-learning models on the backend—models\
    \ that are continually refined so that they become smarter over time. Need to\
    \ caption photos uploaded to a website? Microsoft’s [Computer Vision service](https://azure.microsoft.com/en-us/services/cognitive-services/computer-vision/)\
    \ can do that; so can Amazon’s [Rekognition service](https://aws.amazon.com/rekognition/).\
    \ How about building a screen reader featuring a lifelike human voice to help\
    \ the hearing impaired? [Amazon Polly](https://aws.amazon.com/polly/) can handle\
    \ that, as can Azure Cognitive Services’ [Speech service](https://azure.microsoft.com/en-us/services/cognitive-services/speech-services/)\
    \ and Google’s [text-to-speech API](https://cloud.google.com/text-to-speech).\
    \ These are just a few examples of the actions cognitive services can perform,\
    \ often with just a few lines of code.\n\nYou saw Azure Cognitive Services at\
    \ work in [Chapter 12](https://docs.microsoft.com/en-us/learn/) when you used\
    \ the [Custom Vision service](https://azure.microsoft.com/en-us/services/cognitive-services/custom-vision-service/)\
    \ to train a custom object detection model. It’s one of several services that\
    \ comprise the Cognitive Services family. This chapter introduces others and demonstrates\
    \ how to use them and how to build solutions with them. The focus on Azure Cognitive\
    \ Services isn’t meant to imply that they’re better than their counterparts from\
    \ Amazon and Google. I’m simply more familiar with them because I’ve worked closely\
    \ with Microsoft for more than two decades. Once you learn how to call Azure Cognitive\
    \ Services APIs, it’s a simple matter to apply that knowledge to cognitive services\
    \ from other vendors.\n\nReady to make some magic happen? Let’s get started.\n\
    \n### Introducing Azure Cognitive Services"

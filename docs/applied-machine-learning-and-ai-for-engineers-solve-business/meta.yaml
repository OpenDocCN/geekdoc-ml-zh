  md: 'Inside the compile method, Keras creates a TensorFlow object graph to speed
    execution. Once the network is compiled, you train it by calling `fit`:


    ```

    python

    hist = model.fit(x, y, epochs=100, batch_size=100, validation_split=0.2)

    ```


    The `fit` method accepts many parameters. Here are the ones used in this example:


    **x**


    The dataset’s feature columns.


    **y**


    The dataset’s label column—the one containing the values the network will attempt
    to predict.


    **epochs=100**


    Tells Keras to train the network for 100 iterations, or *epochs*. In each epoch,
    all of the training data passes through the network one time.


    **batch_size=100**


    Tells Keras to pass 100 training samples through the network before making a backpropagation
    pass to adjust the weights and biases. Training takes less time if the batch size
    is large, but accuracy could suffer. You typically experiment with different batch
    sizes to find the right balance between training time and accuracy. Do *not* assume
    that lowering the batch size will improve accuracy. It frequently does, but sometimes
    does not.


    **validation_split=0.2**


    Tells Keras that in each epoch, it should train with 80% of the rows in the dataset
    and validate the network’s accuracy with the remaining 20%. If you prefer, you
    can split the dataset yourself and use the `validation_data` parameter to pass
    the validation data to `fit`. Keras doesn’t offer an explicit function for splitting
    a dataset, but you can use Scikit’s `train_test_split` function to do it. One
    difference between `train_test_split` and `validation_split` is that the former
    splits the data randomly and includes an option for performing a stratified split.
    `validation_split`, by contrast, simply divides the dataset into two partitions
    and does not attempt to shuffle or stratify. Don’t use `validation_split` on ordered
    data without shuffling the data first.


    It might surprise you to learn that if you train the same network on the same
    dataset several times, the results will be different each time. By default, weights
    are initialized with random values, and different starting points produce different
    outcomes. Additional randomness baked into the training process means the network
    will train differently even if it’s initialized with the same random weights.
    Rather'
  merge: -1
  pgno: 178
- img_proc: true
  md: 'than fight it, data scientists learn to “embrace the randomness.” If you work
    the tutorial in the next section, your results will differ from mine. They shouldn’t
    differ by a lot, but they *will* differ.


    > **NOTE**


    The random weights assigned to the connections between neurons aren’t perfectly
    random. Keras includes about a dozen initializers, each of which initializes parameters
    in a different way. By default, Dense layers use the Zeroes initializer to initialize
    biases and the GlorotUniform initializer to initialize weights. The latter generates
    random numbers that fall within a uniform distribution whose limits are computed
    from the network topology.


    You judge the efficacy of training by examining information returned by the `fit`
    method. `fit` returns a history object containing the training and validation
    metrics specified in the `metrics` parameter passed to the `compile` method. For
    example, `metrics=[''mae'']` captures MAE at the end of each epoch. Charting these
    metrics lets you determine whether you trained for the right number of epochs.
    It also lets you know if the network is underfitting or overfitting. Figure 9-1
    plots MAE over the course of 30 training epochs.


    ![](img/628b9a382d0944bbfa786c66bc651b50_179_0.png)


    The blue curve in Figure 9-1 reveals how the network fit to the training data.
    The orange curve shows how it tested against the validation data. Most of the
    learning was done in the first 20 epochs, but MAE continued to drop as training
    progressed. The validation MAE nearly matched the training MAE at the end, which
    is an indication that the network isn’t overfitting. You typically don’t care
    how well the network fits to the training data. You care about the fit to the
    validation data because that indicates how the network performs with data it hasn’t
    seen before. The greater the gap between the training and validation accuracy,
    the greater the likelihood that the network is overfitting.'

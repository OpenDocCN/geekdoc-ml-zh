    # Summary


    Principal component analysis is a technique for reducing the number of dimensions
    in a dataset without incurring a commensurate loss of information. It enjoys a
    number of uses in machine learning, including visualizing high-dimensional data,
    anonymizing data, reducing noise, and increasing the ratio of rows to columns
    by reducing the number of dimensions. It can also be used to perform anomaly detection
    by measuring the loss incurred when a PCA transform is applied and then inverted.
    Anomalous samples tend to incur more loss.


    When I teach classes, I often introduce PCA as “the best-kept secret in machine
    learning.” It shouldn’t remain a secret, because it’s an indispensable tool in
    the hands of machine learning engineers. Now that you know about it, I can just
    about guarantee that you’ll find ways to put it to work.'

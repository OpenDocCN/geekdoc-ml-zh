    \ y, test_size=0.2,\n                                                    random_state=0)\n\
    \nmodel = LinearRegression()\nmodel.fit(x_train, y_train)\nmodel.score(x_test,\
    \ y_test)\n```\n\nIn this example, `score` returns 0.5863, which ostensibly indicates\
    \ that the model was about 59% accurate using the features in the test data to\
    \ make predictions. So far, so good.\n\nNow change the `random_state` value passed\
    \ to `train_test_split` from 0 to 1 and run the code again:\n\n```python\nx_train,\

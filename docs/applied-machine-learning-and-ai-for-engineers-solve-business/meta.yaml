    \ the results. Once training is complete, you retrieve the best model this way:\n\
    \n```\nbest_model = grid_search.best_estimator_\n```\n\nIt is not uncommon to\
    \ run a search regimen such as this one multiple times—the first time with course\
    \ parameter values, and each time thereafter with narrower ranges of values centered\
    \ on the values obtained from `best_params_`. More training time up front is the\
    \ price you pay for an accurate model. To reiterate, you can almost always make\
    \ an SVM more accurate by finding the optimum combination of parameters. And for\
    \ better or worse, brute force is the most effective way to identify the best\
    \ combination.\n\n> **NOTE**\n\nOne nuance to be aware of regarding the SVC class\
    \ is that it doesn’t compute probabilities by default. If you want to call `predict_proba`\
    \ on an SVC instance, you must set `probability` to True when creating the instance:\n\
    \npython\nmodel = SVC(probability=True)\n\n\nThe model will train more slowly,\
    \ but you’ll be able to retrieve probabilities as well as predictions. Furthermore,\
    \ the Scikit documentation warns that “`predict_proba` may be inconsistent with\
    \ `predict`.” For more information, see [Section 1.4.1.2 in the documentation](https://scikit-learn.org/stable/modules/svm.html#scores-and-probabilities).\n\
    \n# Data Normalization\n\nIn [Chapter 2](https://example.com), I noted that some\
    \ learning algorithms work better with normalized data. Unnormalized data contains\
    \ columns of numbers with vastly different ranges—for example, values from 0 to\
    \ 1 in one column and from 0 to 1,000,000 in another. SVM is a parametric learning\
    \ algorithm. Training with normalized data is important because SVMs use distances\
    \ to compute margins. If one dimension spans *much* larger distances than another,\
    \ the internal algorithm used to find the maximum margins might have trouble converging\
    \ on a solution.\n\nThe importance of training machine learning models with normalized\
    \ data isn’t limited to SVMs. Decision trees and learning algorithms such as random\
    \ forests and gradient-boosted decision trees that rely on decision trees are\
    \ nonparametric, so they work equally well with normalized and unnormalized data.\
    \ They are the exception, however. Most other learning algorithms benefit to one\
    \ degree or another from normalized data. That includes *k*-nearest neighbors,\
    \ which although nonparametric uses distance-"

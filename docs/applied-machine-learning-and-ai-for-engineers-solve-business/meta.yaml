- img_proc: true
  md: 'given a set of data points, you can predict a label for a new point by examining
    the points nearest it. For a simple regression problem in which each data point
    is characterized by $x$ and $y$ coordinates, this means that given an $x$, you
    can predict a $y$ by finding the $n$ points with the nearest $xs$ and averaging
    their $ys$. For a classification problem, you find the $n$ points closest to the
    point whose class you want to predict and choose the class with the highest occurrence
    count. If $n = 5$ and the five nearest neighbors include three triangles and two
    ellipses, then the answer is a triangle, as pictured in Figure 1-10.


    ![](img/628b9a382d0944bbfa786c66bc651b50_34_0.png)


    *Figure 1-10. Classification with k-nearest neighbors*



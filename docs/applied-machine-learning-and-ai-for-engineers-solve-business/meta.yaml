    # Summary


    Natural language processing, or NLP, is an area of deep learning that encompasses
    text classification, question answering, text translation, and other tasks that
    require computers to process textual data. A key element of every NLP model is
    an embedding layer, which represents words with arrays of floating-point numbers
    that model the relationships between words. The vectors for *excellent* and *amazing*
    in embedding space are close together, for example, while the vectors for *butterfly*
    and *basketball* are far apart since the words have no semantic relationship.
    Word embeddings are learned as a model is trained.


    Text input to an embedding layer must first be tokenized and turned into sequences
    of equal length. Keras’s `Tokenizer` class does most of the work. Rather than
    tokenize and sequence text separately, you can include a `TextVectorization` layer
    in a model to do the tokenization and padding automatically.


    One way to classify text is to use a traditional dense layer to classify the vectors
    output from an embedding layer. An alternative is to use convolution layers or
    recurrent layers to tease information regarding word position from the embedding
    vectors and classify the output from those layers.


    The use of deep learning to translate text to other languages is known as neural
    machine translation, or NMT. Until recently, state-of-the-art NMT was performed
    using LSTM-based encoder-decoder models. Today those models have largely given
    way to transformer models that use neural attention to focus on the words in a
    phrase that are most meaningful and model word context. A transformer knows that
    the word *train* has different meanings in “meet me at the train station” and
    “it’s time to train a model,” and it factors word order into its calculations.


    BERT is a sophisticated transformer model installed with language understanding
    when engineers at Google trained it with billions of words. It can be fine-tuned
    for specific tasks such as question answering and sentiment analysis, and several
    fine-tuned versions have been published for the public to use. These models can
    sometimes be used as is. Other times, they can be further refined and adapted
    to domain-specific tasks. Because fine-tuning requires orders of magnitude less
    data and compute power than training BERT from scratch, pretrained (and pre–fine-tuned)
    BERT models have proven a boon to NLP.


    Sophisticated NLP models are trained with millions of words or phrases, requiring
    a substantial investment in data collection and hardware for training. Companies
    such as Hugging Face publish pretrained models that you can leverage in your code.
    This is a growing trend in AI: publishing models that are already trained to solve
    common problems. You’ll still build models to solve problems that are domain specific,
    but many tasks—especially those involving NLP—are not consigned to a particular
    domain.


    Downloading pretrained models isn’t the only way to leverage sophisticated AI
    to solve business problems. Companies such as Microsoft and Amazon train deep-learning
    models of their own and make them publicly available using REST APIs. Microsoft
    calls its suite of APIs Azure Cognitive Services. You’ll learn all about them
    in [Chapter 14](Chapter 14).'

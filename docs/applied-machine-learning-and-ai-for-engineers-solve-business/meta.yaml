    \ between machine learning, deep learning, and AI\n\n## A BRIEF HISTORY OF AI\n\
    \nML and AI have surged in popularity in recent years. AI was a big deal in the\
    \ 1980s, when it was widely believed that computers would soon be able to mimic\
    \ the human mind. But excitement waned, and for decades—up until 2010 or so—AI\
    \ rarely made the news. Then a strange thing happened.\n\nThanks to the availability\
    \ of [graphics processing units (GPUs)](https://example.com) from companies such\
    \ as NVIDIA, researchers finally had the horsepower they needed to train advanced\
    \ neural networks. This led to advancements in the state of the art, which led\
    \ to renewed enthusiasm, which led to additional funding, which precipitated further\
    \ advancements, and suddenly AI was a thing again. Neural networks have been around\
    \ (at least in theory) since the 1950s, but researchers lacked the computational\
    \ power to train them on large datasets. Today anyone can buy a GPU or spin up\
    \ a GPU cluster in the cloud. AI is advancing more rapidly now than ever before,\
    \ and with that progress comes the ability to do things in software that engineers\
    \ could only have dreamed about as recently as a decade ago.\n\nOver time, data\
    \ scientists have devised special types of neural networks that excel at certain\
    \ tasks, including tasks involving computer vision—for example, distilling information\
    \ from images—and tasks that involve human languages such as translating English\
    \ to French. We’ll take a deep dive into neural networks beginning in [Chapter\
    \ 8](Chapter 8), and you’ll learn specifically how deep learning has elevated\
    \ machine learning to new heights.\n\n## Supervised Versus Unsupervised Learning\n\
    \nMost ML models fall into one of two broad categories: *supervised learning*\
    \ models and *unsupervised learning* models. The purpose of supervised learning\
    \ models is to make predictions. You train them with labeled data so that they\
    \ can take future inputs and predict what the labels will be. Most of the ML models\
    \ in use today are supervised learning models. A great example is the model that\
    \ the US Postal Service uses to turn handwritten zip codes into digits that a\
    \ computer can recognize to sort the mail. Another example is the model that your\
    \ credit card company uses to authorize purchases.\n\nUnsupervised learning models,\
    \ by contrast, don’t require labeled data. Their purpose is to provide insights\
    \ into existing data, or to group data into categories and categorize future inputs\
    \ accordingly. A classic example of unsupervised learning is inspecting records\
    \ regarding products purchased from your company and the customers who purchased\
    \ them to determine which customers might be most interested in a new product\
    \ you are launching and then building a marketing campaign that targets those\
    \ customers.\n\nA spam filter is a supervised learning model. It requires labeled\
    \ data. A model that segments customers based on incomes, credit scores, and purchasing\
    \ history is an unsupervised learning model, and the data that it consumes doesn’t\
    \ have to be labeled. To help drive home the difference, the remainder of this\
    \ chapter explores supervised and unsupervised learning in greater detail.\n\n\
    ## Unsupervised Learning with k-Means Clustering\n\nUnsupervised learning frequently\
    \ employs a technique called *clustering*. The purpose of clustering is to group\
    \ data by similarity. The most popular clustering algorithm is [k-means clustering](k-means\
    \ clustering), which takes *n* data samples and groups them into *m* clusters,\
    \ where *m* is a number you specify.\n\nGrouping is performed using an iterative\
    \ process that computes a centroid for each cluster and assigns samples to clusters\
    \ based on their proximity to the cluster centroids. If the distance from a particular\
    \ sample to the centroid of cluster 1 is 2.0 and the distance from the same sample\
    \ to the center of cluster 2 is 3.0, then the sample is assigned to cluster 1.\
    \ In [Figure 1-6](Figure 1-6), 200 samples are loosely arranged in three clusters.\
    \ The diagram on the left shows the raw, ungrouped samples. The diagram on the\
    \ right shows the cluster centroids (the red dots) with the samples colored by\
    \ cluster.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_23_0.png)\n\nHow do you\
    \ code up an unsupervised learning model that implements *k*-means clustering?\
    \ The easiest way to do it is to use the world’s most popular machine learning\
    \ library: [Scikit-Learn](https://scikit-learn.org/). It’s free, it’s open source,\
    \ and it’s written in Python. The documentation is great, and if you have a question,\
    \ chances are you’ll find an answer by Googling it. I’ll use Scikit for most of\
    \ the examples in the first half of this book. The book’s Preface describes how\
    \ to install Scikit and configure your computer to run my examples (or use a Docker\
    \ container to do the same), so if you haven’t done so already, now’s a great\
    \ time to set up your environment.\n\nTo get your feet wet with *k*-means clustering,\
    \ start by creating a new Jupyter notebook and pasting the following statements\
    \ into the first cell:\n\n```python\n%matplotlib inline\nimport matplotlib.pyplot\
    \ as plt\nimport seaborn as sns\nsns.set()\n```\n\nRun that cell, and then run\
    \ the following code in the next cell to generate a semirandom assortment of *x*\
    \ and *y* coordinate pairs. This code uses Scikit’s [`make_blobs` function](https://scikit-learn.org/stable/modules/generated/sklearn.datasets.make_blobs.html)\
    \ to generate the coordinate pairs, and Matplotlib’s [`scatter` function](https://matplotlib.org/stable/api/_as_gen/matplotlib.pyplot.scatter.html)\
    \ to plot them:\n\n```python\nfrom sklearn.datasets import make_blobs\n\npoints,\
    \ cluster_indexes = make_blobs(n_samples=300, centers=4,\n                   \
    \                 cluster_std=0.8, random_state=0)\n\nx = points[:, 0]\ny = points[:,\
    \ 1]\n\nplt.scatter(x, y, s=50, alpha=0.7)\n```\n\nYour output should be identical\
    \ to mine, thanks to the `random_state` parameter that seeds the random-number\
    \ generator used internally by `make_blobs`:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_24_0.png)\n\
    \nNext, use *k*-means clustering to divide the coordinate pairs into four groups.\
    \ Then render the cluster centroids in red and color-code the data points by cluster.\
    \ Scikit's `KMeans` class does the heavy lifting, and once it's fit to the coordinate\
    \ pairs, you can get the locations of the centroids from `KMeans`' `cluster_centers_`\
    \ attribute:\n\n```python\nfrom sklearn.cluster import KMeans\n\nkmeans = KMeans(n_clusters=4,\
    \ random_state=0)\nkmeans.fit(points)\npredicted_cluster_indexes = kmeans.predict(points)\n\
    \nplt.scatter(x, y, c=predicted_cluster_indexes, s=50, alpha=0.7, cmap='viridis')\n\
    \ncenters = kmeans.cluster_centers_\nplt.scatter(centers[:, 0], centers[:, 1],\
    \ c='red', s=100)\n```\n\nHere is the result:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_25_0.png)\n\
    \nTry setting `n_clusters` to other values, such as 3 and 5, to see how the points\
    \ are grouped with different cluster counts. Which begs the question: how do you\
    \ know what the *right* number of clusters is? The answer isn’t always obvious\
    \ from looking at a plot, and if the data has more than three dimensions, you\
    \ can’t plot it anyway.\n\nOne way to pick the right number is with the elbow\
    \ method, which plots *inertias* (the sum of the squared distances of the data\
    \ points to the closest cluster center) obtained from `KMeans.inertia_` as a function\
    \ of cluster counts. Plot inertias this way and look for the sharpest elbow in\
    \ the curve:\n\n```python\ninertias = []\n\nfor i in range(1, 10):\n    kmeans\
    \ = KMeans(n_clusters=i, random_state=0)\n    kmeans.fit(points)\n    inertias.append(kmeans.inertia_)\n\
    \nplt.plot(range(1, 10), inertias)\nplt.xlabel('Number of clusters')\nplt.ylabel('Inertia')\n\
    ```\n\nIn this example, it appears that 4 is the right number of clusters:\n\n\
    ![](img/628b9a382d0944bbfa786c66bc651b50_26_0.png)\n\nIn real life, the elbow\
    \ might not be so distinct. That’s OK, because by clustering the data in different\
    \ ways, you sometimes obtain insights that you wouldn’t obtain otherwise.\n\n\
    ## Applying k-Means Clustering to Customer Data\n\nLet’s use *k*-means clustering\
    \ to tackle a real problem: segmenting customers to identify ones to target with\
    \ a promotion to increase their purchasing activity. The dataset that you’ll use\
    \ is a sample customer segmentation dataset named *customers.csv*. Start by creating\
    \ a subdirectory named *Data* in the folder where your notebooks reside, downloading\
    \ *customers.csv*, and copying it into the *Data* subdirectory. Then use the following\
    \ code to load the dataset into a Pandas DataFrame and display the first five\
    \ rows:\n\n```python\nimport pandas as pd\n\ncustomers = pd.read_csv('Data/customers.csv')\n\
    customers.head()\n```\n\nFrom the output, you learn that the dataset contains\
    \ five columns, two of which describe the customer’s annual income and spending\
    \ score. The latter is a value from 0 to 100. The higher the number, the more\
    \ this customer has spent with your company in the past:\n\n| CustomerID | Gender\
    \ | Age | Annual Income (k$) | Spending Score (1-100) |\n| :--- | :--- | :---\
    \ | :--- | :--- |\n| 0 | 1 | Male | 19 | 15 | 39 |\n| 1 | 2 | Male | 21 | 15 |\
    \ 81 |\n| 2 | 3 | Female | 20 | 16 | 6 |\n| 3 | 4 | Female | 23 | 16 | 77 |\n\
    | 4 | 5 | Female | 31 | 17 | 40 |"
  mdcn: "![](img/628b9a382d0944bbfa786c66bc651b50_21_0.png)\n\n图 1-5. 机器学习、深度学习与人工智能的关系\n\
    \n## 人工智能简史\n\n近年来，机器学习和人工智能的热度急剧上升。人工智能在20世纪80年代曾备受瞩目，当时人们普遍相信计算机很快就能模仿人类思维。但这种热情逐渐消退，在长达数十年的时间里——直到2010年左右——人工智能很少成为新闻焦点。随后，一件奇特的事情发生了。\n\
    \n得益于NVIDIA等公司提供的[图形处理单元（GPU）](https://example.com)，研究人员终于获得了训练先进神经网络所需的计算能力。这推动了技术前沿的进步，进而引发了新的热情，吸引了更多资金投入，从而加速了进一步的发展，人工智能突然间再次成为焦点。神经网络自20世纪50年代就已存在（至少在理论上），但研究人员缺乏在大型数据集上训练它们的计算能力。如今，任何人都可以购买GPU或在云端启动GPU集群。人工智能的发展速度比以往任何时候都快，随着这一进步，工程师们得以实现仅在十年前还只能梦想的软件功能。\n\
    \n随着时间的推移，数据科学家们设计出了专门擅长特定任务的特殊类型神经网络，包括涉及计算机视觉的任务——例如从图像中提取信息——以及涉及人类语言的任务，如将英语翻译成法语。我们将从[第8章](Chapter\
    \ 8)开始深入探讨神经网络，你将具体了解深度学习如何将机器学习提升到新的高度。\n\n## 监督学习与无监督学习\n\n大多数机器学习模型属于两大类之一：*监督学习*模型和*无监督学习*模型。监督学习模型的目的是进行预测。你使用带标签的数据来训练它们，以便它们能够接收未来的输入并预测相应的标签。目前使用的大多数机器学习模型都是监督学习模型。一个很好的例子是美国邮政服务使用的模型，它将手写邮政编码转换为计算机可以识别的数字，以便对邮件进行分拣。另一个例子是你的信用卡公司用于授权交易的模型。\n\
    \n相比之下，无监督学习模型不需要带标签的数据。它们的目的是提供对现有数据的洞察，或将数据分组归类，并相应地对未来的输入进行分类。无监督学习的一个经典例子是检查有关客户购买产品及其购买者的记录，以确定哪些客户可能对你即将推出的新产品最感兴趣，然后针对这些客户制定营销活动。\n\
    \n垃圾邮件过滤器是一个监督学习模型。它需要带标签的数据。一个根据收入、信用评分和购买历史对客户进行细分的模型是一个无监督学习模型，它所使用的数据不必带标签。为了帮助阐明两者的区别，本章的剩余部分将更详细地探讨监督学习和无监督学习。\n\
    \n## 使用k-Means聚类进行无监督学习\n\n无监督学习经常使用一种称为*聚类*的技术。聚类的目的是根据相似性对数据进行分组。最流行的聚类算法是[k-means聚类](k-means聚类)，它接收*n*个数据样本并将它们分成*m*个簇，其中*m*是你指定的数字。\n\
    \n分组是通过一个迭代过程完成的，该过程为每个簇计算一个质心，并根据样本与簇质心的接近程度将样本分配给相应的簇。如果某个样本到簇1质心的距离是2.0，而到簇2质心的距离是3.0，那么该样本将被分配给簇1。在[图1-6](图1-6)中，200个样本大致排列成三个簇。左侧的图显示了原始的、未分组的样本。右侧的图显示了簇质心（红点），样本按簇着色。\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_23_0.png)\n\n如何编写一个实现*k*-means聚类的无监督学习模型？最简单的方法是使用世界上最流行的机器学习库：[Scikit-Learn](https://scikit-learn.org/)。它是免费的、开源的，并且用Python编写。文档非常完善，如果你有问题，很可能通过谷歌搜索找到答案。在本书的前半部分，我将使用Scikit来编写大部分示例。本书的前言描述了如何安装Scikit并配置你的计算机以运行我的示例（或使用Docker容器来完成同样的操作），所以如果你还没有这样做，现在正是设置环境的好时机。\n\
    \n要开始体验*k*-means聚类，首先创建一个新的Jupyter notebook，并将以下语句粘贴到第一个单元格中：\n\n```python\n%matplotlib\
    \ inline\nimport matplotlib.pyplot as plt\nimport seaborn as sns\nsns.set()\n\
    ```\n\n运行该单元格，然后在下一个单元格中运行以下代码，以生成一组半随机的*x*和*y*坐标对。此代码使用Scikit的[`make_blobs`函数](https://scikit-learn.org/stable/modules/generated/sklearn.datasets.make_blobs.html)生成坐标对，并使用Matplotlib的[`scatter`函数](https://matplotlib.org/stable/api/_as_gen/matplotlib.pyplot.scatter.html)绘制它们：\n\
    \n```python\nfrom sklearn.datasets import make_blobs\n\npoints, cluster_indexes\
    \ = make_blobs(n_samples=300, centers=4,\n                                   \
    \ cluster_std=0.8, random_state=0)\n\nx = points[:, 0]\ny = points[:, 1]\n\nplt.scatter(x,\
    \ y, s=50, alpha=0.7)\n```\n\n由于`random_state`参数为`make_blobs`内部使用的随机数生成器设置了种子，你的输出应该与我的完全相同：\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_24_0.png)\n\n接下来，使用*k*-means聚类将坐标对分成四组。然后将簇质心渲染为红色，并根据簇对数据点进行颜色编码。Scikit的`KMeans`类负责繁重的工作，一旦它拟合到坐标对，你就可以从`KMeans`的`cluster_centers_`属性获取质心的位置：\n\
    \n```python\nfrom sklearn.cluster import KMeans\n\nkmeans = KMeans(n_clusters=4,\
    \ random_state=0)\nkmeans.fit(points)\npredicted_cluster_indexes = kmeans.predict(points)\n\
    \nplt.scatter(x, y, c=predicted_cluster_indexes, s=50, alpha=0.7, cmap='viridis')\n\
    \ncenters = kmeans.cluster_centers_\nplt.scatter(centers[:, 0], centers[:, 1],\
    \ c='red', s=100)\n```\n\n结果如下：\n\n![](img/628b9a382d0944bbfa786c66bc651b50_25_0.png)\n\
    \n尝试将`n_clusters`设置为其他值，例如3和5，看看在不同的簇数量下点是如何分组的。这就引出了一个问题：如何知道*正确*的簇数量是多少？答案并不总是能从图中明显看出，而且如果数据有超过三个维度，你根本无法绘制它。\n\
    \n一种选择正确数量的方法是肘部法则，它绘制*惯性*（数据点到最近簇中心的距离平方和，通过`KMeans.inertia_`获得）作为簇数量的函数。以这种方式绘制惯性，并寻找曲线中最明显的拐点：\n\
    \n```python\ninertias = []\n\nfor i in range(1, 10):\n    kmeans = KMeans(n_clusters=i,\
    \ random_state=0)\n    kmeans.fit(points)\n    inertias.append(kmeans.inertia_)\n\
    \nplt.plot(range(1, 10), inertias)\nplt.xlabel('Number of clusters')\nplt.ylabel('Inertia')\n\
    ```\n\n在这个例子中，4似乎是正确的簇数量：\n\n![](img/628b9a382d0944bbfa786c66bc651b50_26_0.png)\n\
    \n在现实生活中，拐点可能不那么明显。这没关系，因为通过以不同的方式对数据进行聚类，你有时会获得其他方式无法获得的洞察。\n\n## 将k-Means聚类应用于客户数据\n\
    \n让我们使用*k*-means聚类来解决一个实际问题：细分客户，以确定哪些客户可以作为促销活动的目标，从而提高他们的购买活跃度。你将使用的数据集是一个名为*customers.csv*的示例客户细分数据集。首先，在你的notebook所在的文件夹中创建一个名为*Data*的子目录，下载*customers.csv*，并将其复制到*Data*子目录中。然后使用以下代码将数据集加载到Pandas\
    \ DataFrame中并显示前五行：\n\n```python\nimport pandas as pd\n\ncustomers = pd.read_csv('Data/customers.csv')\n\
    customers.head()\n```\n\n从输出中，你可以了解到该数据集包含五列，其中两列描述了客户的年收入和消费评分。后者是一个0到100之间的值。数字越高，表示该客户过去在你公司的消费越多：\n\
    \n| CustomerID | Gender | Age | Annual Income (k$) | Spending Score (1-100) |\n\

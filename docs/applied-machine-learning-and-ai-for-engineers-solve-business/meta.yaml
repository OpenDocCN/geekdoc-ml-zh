    > ### KNEIGHBORSCLASSIFIER INTERNALS


    *k*-nearest neighbors is sometimes referred to as a *lazy* learning algorithm
    because most of the work is done when you call `predict` rather than when you
    call `fit`. In fact, training technically doesn’t have to do anything except make
    a copy of the training data for when `predict` is called. So what happens inside
    `KNeighborsClassifier`’s `fit` method?


    In most cases, `fit` constructs a binary tree in memory that makes `predict` faster
    by preventing it from having to perform a brute-force search for neighboring samples.
    If it determines that a binary tree won’t help, `KNeighborsClassifier` resorts
    to brute force when making predictions. This typically happens when the training
    data is sparse—that is, mostly zeros with a few nonzero values sprinkled in.


    One of the wonderful things about Scikit-Learn is that it is open source. If you
    care to know more about how a particular class or method works, you can go straight
    to the source code on GitHub. You’ll find the source code for `KNeighborsClassifier`
    and `RadiusNeighborsClassifier` on [GitHub](https://github.com).


    The process employed here—load the data, split the data, create a classifier or
    regressor, call `fit` to fit it to the training data, call `score` to assess the
    model’s accuracy using test data, and finally, call `predict` to make predictions—is
    one that you will use over and over with Scikit. In the real world, data frequently
    requires cleaning before it’s used for training and testing. For example, you
    might have to remove rows with missing values or dedupe the data to eliminate
    redundant rows. You’ll see plenty of examples of this later, but in this example,
    the data was complete and well structured right out of the box, and therefore
    required no further preparation.



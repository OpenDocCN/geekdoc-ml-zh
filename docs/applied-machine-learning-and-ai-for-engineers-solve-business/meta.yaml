    plt.ylabel('Accuracy')\nplt.legend(loc='lower right')\nplt.plot()\n```\n\n希望你得到类似这样的结果：\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_262_0.png)\n\n现在是有趣的部分：使用MTCNN检测照片中的人脸，并使用训练好的模型来识别人脸。首先确保你的环境中安装了MTCNN包。然后定义一对辅助函数——一个从图像的指定位置获取人脸（`get_face`），另一个加载照片并在照片中用名字和置信度标注人脸（`label_faces`）：\n\

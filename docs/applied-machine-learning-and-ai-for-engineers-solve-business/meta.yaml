    +   - Flask and Requests for calling REST APIs and building web services

    - Sklearn-onnx and Onnxruntime for Open Neural Network Exchange (ONNX) models

    - Librosa for generating spectrogram images from audio files

    - MTCNN and Keras-vggface for building facial recognition systems

    - KerasNLP, Transformers, Datasets, and PyTorch for building natural language
    processing (NLP) models

    - Azure-cognitiveservices-vision-computervision, Azure-ai-textanalytics, and Azure-cognitiveservices-speech
    for calling Azure Cognitive Services


    You can install most of these packages with `pip install` commands. If you installed
    Anaconda, many of these packages are already there, and you can install the rest
    using `conda install` commands or an equivalent.


    Speaking of environments, it’s never a bad idea to use virtual Python environments
    to prevent package installs from conflicting with other package installs. If you’re
    not familiar with virtual environments, you can read about them at [Python.org](https://www.python.org).
    If you use Anaconda, virtual environments are baked right in.


    Most of my code samples were built for Jupyter notebooks, which provide an interactive
    platform for writing and executing Python code. Notebooks are incredibly popular
    in the data science community for exploring data and training machine learning
    models. You can run Jupyter notebooks locally by installing packages such as [Notebook](https://jupyter.org/install)
    or [JupyterLab](https://jupyter.org/install), or you can use cloud-hosted environments
    like [Google Colab](https://colab.research.google.com). One of the advantages
    of Colab is that you don’t have to install anything on your computer—not even
    Python. And in the rare cases in which my samples require a GPU, Colab provides
    it for you.


    Python development environments are notoriously finicky to set up and maintain,
    especially on Windows. If you’d prefer not to have to create such an environment,
    or if you tried but failed to get it working, help is only a download away. I
    packaged a complete development environment suitable for running every sample
    in this book in a [Docker container image](https://hub.docker.com/r/jeffpro/applied-machine-learning).
    Assuming you have the [Docker Engine](https://docs.docker.com/engine/install/)
    installed on your computer, you can launch the container with the following command:


    ```

    docker run -it -p 8888:8888 jeffpro/applied-machine-learning:latest

    ```


    Navigate in your browser to the URL that appears in the output. You’ll land in
    a full Jupyter environment with all my code samples and everything needed to run
    them. They’re in a folder named *Applied-Machine-Learning* cloned from the GitHub
    repo of the same name. The downside to using a container is that changes you make
    aren’t persisted by default. One way to remedy that is to use a `-v` switch in
    the `docker` command to bind to a local directory. For more information, refer
    to [“Use Bind Mounts”](https://docs.docker.com/storage/bind-mounts/) in the Docker
    documentation.



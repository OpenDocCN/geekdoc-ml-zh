- img_proc: true
  md: 'the weather data for those five days and treated each day independently, trends
    evident in the data would be lost. A recurrent layer, however, might detect those
    trends and factor them into its output. A sequence of vectors output by an embedding
    layer qualifies as a time series because words in a phrase are ordered consecutively
    and words used early in a phrase could inform how words that occur later are interpreted.


    Figure 13-2 illustrates how a recurrent layer transforms word embeddings into
    a vector that’s influenced by word order. In this example, sequences are input
    to an embedding layer, which transforms each word (token) in the sequence into
    a vector of floating-point numbers. These word embeddings are input to a recurrent
    layer, yielding another output vector. To compute that vector, cells in the recurrent
    layer loop over the embeddings comprising the sequence. The input to iteration
    *n* + 1 of the loop is the current embedding vector *and* the output from iteration
    *n*—the so-called *hidden state*. The output from the recurrent layer is the output
    from the final iteration of the loop. The result is different than it would have
    been had each embedding vector been processed independently because each iteration
    uses information from the previous iteration to compute an output. Context from
    a word early in a sequence can carry over to words that occur later on.


    ![](img/628b9a382d0944bbfa786c66bc651b50_306_0.png)


    It’s not difficult to build a very simple recurrent layer by hand that works reasonably
    well with short sequences (say, four or five words), but longer sequences will
    suffer from a vanishing-gradient effect that means words far apart will exert
    little influence over one another. One solution is a recurrent layer composed
    of *Long Short-Term Memory* (LSTM) cells, which were introduced in a 1997 paper
    titled, appropriately enough, “Long Short-Term Memory”.


    LSTM cells are miniature neural networks in their own right. As the cells loop
    over the words in a sequence, they learn (just as the weights connecting neurons
    in dense layers are learned) which words are important and lend that information
    precedence in subsequent iterations through the loop. A dense layer doesn’t recognize
    that there’s a connection between *blue* and *sky* in the phrase “I like blue,
    for on a clear and sunny day, it is the color of the sky.” An LSTM layer does
    and can factor that into its output. Its power diminishes, however, as words grow
    farther apart.


    Keras provides a handy implementation of LSTM layers in its `LSTM` class. It also
    provides a `GRU` class implementing gated recurrent unit (GRU) layers, which are
    simplified LSTM layers that train faster and often yield results that equal or
    exceed those of LSTM layers. Here’s how our spam classifier would look if it were
    modified to use LSTM:'

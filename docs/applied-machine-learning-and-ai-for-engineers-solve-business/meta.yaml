    \n在ImageNet数据集上训练的预训练CNN可以识别北极狐和北极熊，但它们无法识别海象，因为它们没有用海象图像进行训练。迁移学习让你能够重新利用预训练CNN来识别它们最初未被训练识别的对象。它利用了预训练CNN中内置的智能，但将其重新用于解决新问题。\n\
    \n回想一下，CNN有两组层：瓶颈层包含卷积层和池化层，用于从不同分辨率的图像中提取特征；以及分类层，用于分类"

    \ cv=5, verbose=2)\ngrid_search.fit(x, y)\ngrid_search.best_score_\n\nRBF核的表现不如线性核和多项式核。这里有一个教训。RBF核通常比其他核更好地拟合非线性数据，但并非总是如此。这就是为什么使用SVM的最佳策略是尝试不同的核和不同的参数值。最佳组合会因数据集而异。对于LFW数据集，线性核似乎是最佳选择。这很方便，因为线性核是Scikit提供的所有核中最快的。\n\
    \n> **注意**\n\n除了`SVC`类，Scikit-Learn还包括名为`LinearSVC`和`NuSVC`的SVM分类器。后者支持与`SVC`类相同的核组合，但它用一个名为`nu`的正则化参数替代了`C`，该参数以不同的方式控制拟合的紧密度。`NuSVC`在处理大型数据集时的扩展性不如`SVC`，根据我的经验，它很少被使用。`LinearSVC`仅实现线性核，但它使用不同的优化算法，训练速度更快。如果使用`SVC`训练速度较慢，并且你确定线性核能产生最佳模型，可以考虑将`SVC`替换为`LinearSVC`。即使对于中等规模的数据集，如果你使用`GridSearchCV`来训练模型数百次，更快的训练时间也会产生影响。关于这两个类之间功能差异的精彩总结，请参阅Angela\
    \ Shi的文章“SVM with Scikit-Learn: What You Should Know”。\n\n混淆矩阵是可视化模型准确率的好方法。让我们拆分数据集，用80%的图像训练一个优化的线性模型，用剩下的20%进行测试，并在混淆矩阵中显示结果。\n\
    \n第一步是拆分数据集。注意`stratify=y`参数，它确保训练数据集和测试数据集中每个类别的样本比例与原始数据集相同。在这个例子中，训练数据集将包含五个人中每个人的20个样本：\n\
    \nfrom sklearn.model_selection import train_test_split\n\nx_train, x_test, y_train,\
    \ y_test = train_test_split(x, y, train_size=0.8,\nstratify=y, random_state=0)\n\
    \n现在使用网格搜索揭示的最佳C值训练一个线性SVM：\n\nscaler = StandardScaler()\nsvc = SVC(kernel='linear',\
    \ C=0.1)\npipe = make_pipeline(scaler, svc)\npipe.fit(x_train, y_train)\n\n交叉验证模型以确认其准确率：\n\
    \nfrom sklearn.model_selection import cross_val_score\n\ncross_val_score(pipe,\

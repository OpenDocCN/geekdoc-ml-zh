    ```


    The first parameter passed to the Conv2D function is the number of convolution
    kernels to include in the layer. More kernels means more fitting power, similar
    to the number of neurons in a dense layer. The second parameter is the dimensions
    of each kernel. You sometimes get greater accuracy from 5 × 5 kernels, but a kernel
    that size increases training time by requiring 25 multiplication operations for
    each pixel as opposed to nine for a 3 × 3 kernel. The input_shape parameter in
    the first layer specifies the size of the images input to the CNN: in this case,
    one-channel (grayscale) 28 × 28 images. All the images used to train a CNN must
    be the same size.


    > **NOTE**

    Conv2D processes images, which are two-dimensional. Keras also offers the Conv1D
    class for processing 1D data and Conv3D for 3D data. The former finds use processing
    text and time-series data. Canonical use cases for Conv3D include analyzing video
    and 3D medical images.


    Given a set of images with a relatively high degree of separation between classes,
    it’s perfectly feasible to train a CNN to classify those images on a typical laptop
    or PC. A great example is the MNIST dataset, which contains 60,000 training images
    of scanned, handwritten digits, each measuring 28 × 28 pixels, plus 10,000 test
    images. Figure 10-7 shows the first 50 scans in the training set.


    ![](img/628b9a382d0944bbfa786c66bc651b50_209_0.png)


    Let’s train a CNN to recognize digits in the MNIST dataset, which conveniently
    is one of several sample datasets built into Keras. Begin by creating a new Jupyter
    notebook and using the following statements to load the dataset, reshape the 28
    × 28 images into 28 × 28 × 1 arrays (28 × 28 images containing a single color
    channel), and divide the pixel values by 255 as a simple form of normalization:'

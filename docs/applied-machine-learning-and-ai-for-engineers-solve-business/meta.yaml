  mdcn: "## 调整神经网络的规模\n\n神经网络的特征在于其层数（网络的*深度*）、每层神经元的数量（各层的*宽度*）、层的类型（在此示例中，是全连接神经元的`Dense`层）以及所使用的激活函数。还有[其他层类型](https://example.com)，我将在后续章节中介绍其中许多。例如，[Dropout层](https://example.com)可以通过在权重更新期间随机丢弃层间连接来提高网络的泛化能力，而[Conv2D层](https://example.com)则使我们能够构建擅长图像处理的卷积神经网络（CNN）。\n\
    \n在设计网络时，如何为每层选择合适的层数和神经元数量？简短的回答是，“合适”的宽度和深度取决于你要解决的问题、你用于训练的数据集以及你期望的准确度。作为一条规则，你需要*达到该准确度所需的最小宽度和深度*，并通过直觉和实验相结合来实现。话虽如此，这里有一些需要记住的指导原则：\n\
    \n- 更大的宽度和深度赋予网络更多的“学习”能力，使其能更紧密地拟合训练数据。但它们也增加了过拟合的可能性。重要的是验证结果，有时放宽对训练数据的拟合反而能让网络更好地泛化。放宽拟合最简单的方法是减少神经元数量。\n\
    - 一般来说，你更倾向于选择更大的宽度而非更大的深度，部分原因是为了避免[梯度消失问题](https://example.com)，该问题会削弱增加层的影响。ReLU激活函数提供了一些防止梯度消失的保护，但这种保护并非绝对。有关解释，请参阅“[如何使用ReLU修复梯度消失问题](https://example.com)”。此外，一个在某一层有100个神经元的网络，比一个有五层、每层20个神经元的网络训练得更快，因为前者的权重更少。想一想：同一层内的神经元之间没有连接，但五层各含20个神经元的网络之间却有1,600个连接（20²\
    \ × 4）。\n- 更少的神经元意味着更短的训练时间。使用大型数据集训练的最先进神经网络，有时在高端GPU上需要数天或数周才能完成训练，因此训练时间很重要。\n\
    \n在现实生活中，数据科学家会尝试不同的宽度和深度，以在训练时间、准确度和网络泛化能力之间找到合适的平衡。对于多层感知机，你很少需要超过两个隐藏层，通常一个就足够了。一个拥有一或两个隐藏层的网络，其能力足以解决即使是复杂的非线性问题。例如，两层各128个神经元，就给你提供了16,384（128²）个可调整的权重，外加256个偏置。这是相当大的拟合能力。我通常从一或最多两层、每层512个神经元开始，然后将宽度或深度减半，直到验证准确度降至可接受的阈值以下。\n\
    \n## 使用神经网络预测出租车费用\n\n让我们将这些知识付诸实践，构建并训练一个神经网络。我们将要解决的问题与第2章中提出的问题相同：使用纽约市出租车和豪华轿车委员会的数据来预测出租车费用。我们将使用神经网络作为回归模型来进行预测。\n\
    \n如果你在第2章中没有下载数据集，请下载包含该数据集的CSV文件，并将其复制到托管你的Jupyter笔记本的*Data*目录中。然后使用以下代码加载数据集并显示前五行。它包含约55,000行数据，是最近在Kaggle纽约市出租车费用预测竞赛中使用的更大数据集的一个子集：\n\
    \n```python\nimport pandas as pd\n\ndf = pd.read_csv('Data/taxi-fares.csv', parse_dates=['pickup_datetime'])\n\
    df.head()\n```\n\n数据在可用之前需要大量的准备工作——这在机器学习和深度学习中都很常见。使用以下语句将原始数据集转换为适合训练的数据集，并参考第2章中的出租车费用示例，了解所应用转换的逐步解释：\n\
    \n```python\nfrom math import sqrt\n\ndf = df[df['passenger_count'] == 1]\ndf\
    \ = df.drop(['key', 'passenger_count'], axis=1)\n\nfor i, row in df.iterrows():\n\
    \    dt = row['pickup_datetime']\n    df.at[i, 'day_of_week'] = dt.weekday()\n\
    \    df.at[i, 'pickup_time'] = dt.hour\n    x = (row['dropoff_longitude'] - row['pickup_longitude'])\
    \ * 54.6\n    y = (row['dropoff_latitude'] - row['pickup_latitude']) * 69.0\n\
    \    distance = sqrt(x**2 + y**2)\n    df.at[i, 'distance'] = distance\n\ndf.drop(['pickup_datetime',\
    \ 'pickup_longitude', 'pickup_latitude',\n         'dropoff_longitude', 'dropoff_latitude'],\
    \ axis=1, inplace=True)\n\ndf = df[(df['distance'] > 1.0) & (df['distance'] <\
    \ 10.0)]\ndf = df[(df['fare_amount'] > 0.0) & (df['fare_amount'] < 50.0)]\ndf.head()\n\
    ```\n\n生成的数据集包含星期几（0–6，其中0对应星期一）、一天中的小时（0–23）和行驶距离（英里）的列，并且已移除异常值：\n\n| fare_amount\
    \ | day_of_week | pickup_time | distance |\n|---|---|---|---|\n| 2 | 6.1 | 0.0\
    \ | 15.0 | 1.038136 |\n| 4 | 10.5 | 5.0 | 10.0 | 2.924341 |\n| 5 | 15.3 | 4.0\
    \ | 20.0 | 4.862893 |\n| 8 | 7.7 | 5.0 | 1.0 | 2.603493 |\n| 9 | 8.9 | 3.0 | 16.0\
    \ | 1.365739 |\n\n下一步是创建神经网络。使用以下语句创建一个网络，该网络有一个接受三个值（日期、时间和距离）的输入层，两个各有512个神经元的隐藏层，以及一个只有一个神经元（预测的费用金额）的输出层：\n\
    \n```python\nfrom tensorflow.keras.models import Sequential\nfrom tensorflow.keras.layers\
    \ import Dense\n\nmodel = Sequential()\nmodel.add(Dense(512, activation='relu',\
    \ input_dim=3))\nmodel.add(Dense(512, activation='relu'))\nmodel.add(Dense(1))\n\
    model.compile(optimizer='adam', loss='mae', metrics=['mae'])\nmodel.summary()\n\
    ```\n\n最后一条语句中对`summary`的调用生成了网络拓扑的简明摘要，包括*可训练参数*的数量——这些是权重和偏置，可以调整以使网络拟合数据集（图9-2）。对于给定层，参数数量是该层神经元数量与前一层神经元数量（连接两层神经元的权重数量）的乘积，再加上该层神经元的数量（与这些神经元相关的偏置）。这个网络相对简单，但它拥有超过四分之一百万个可以调整的旋钮和拨盘，以使其拟合数据集。\n\
    \n现在，将特征列与标签列分开，并使用它们来训练网络。将`validation_split`设置为0.2，以使用20%的训练数据来验证网络。训练100个周期，批量大小为100。鉴于数据集包含超过38,000个样本，这意味着每个周期将执行大约380次反向传播：\n\
    \n```python\nx = df.drop('fare_amount', axis=1)\ny = df['fare_amount']\n\nhist\
    \ = model.fit(x, y, validation_split=0.2, epochs=100, batch_size=100)\n```\n\n\
    与其对抗它，数据科学家学会了“拥抱随机性”。如果你完成下一节的教程，你的结果将与我的不同。它们不应该相差太多，但*会*有所不同。\n\n> **注意**\n\
    \n分配给神经元之间连接的随机权重并非完全随机。Keras包含大约十几个初始化器，每个都以不同的方式初始化参数。默认情况下，Dense层使用Zeroes初始化器初始化偏置，使用GlorotUniform初始化器初始化权重。后者生成的随机数落在均匀分布内，其界限根据网络拓扑计算得出。\n\
    \n你通过检查`fit`方法返回的信息来判断训练的有效性。`fit`返回一个历史对象，其中包含在传递给`compile`方法的`metrics`参数中指定的训练和验证指标。例如，`metrics=['mae']`在每个周期结束时捕获MAE。绘制这些指标可以让你确定是否训练了正确的周期数。它还能让你知道网络是欠拟合还是过拟合。图9-1绘制了30个训练周期内的MAE。\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_179_0.png)\n\n图9-1中的蓝色曲线揭示了网络如何拟合训练数据。橙色曲线显示了它在验证数据上的测试情况。大部分学习是在前20个周期内完成的，但随着训练的进行，MAE持续下降。验证MAE在结束时几乎与训练MAE持平，这表明网络没有过拟合。你通常不关心网络对训练数据的拟合程度。你关心的是对验证数据的拟合，因为这表明网络在处理未见过的数据时的表现。训练准确度和验证准确度之间的差距越大，网络过拟合的可能性就越大。\n\
    \n一旦神经网络训练完成，你调用其`predict`方法进行预测：\n\n```python\nprediction = model.predict(np.array([[2,\
    \ 2]]))\n```\n\n在这个例子中，网络接受两个浮点值作为输入，并返回一个浮点值作为输出。`predict`返回的值就是该输出。"

  md: 'Models training data by fitting it to the equation of a line


    # Decision trees


    Use binary trees to predict an outcome by answering a series of yes-and-no questions


    # Random forests


    Use multiple independent decision trees to model the data and are resistant to
    overfitting


    # Gradient-boosting machines


    Use multiple *dependent* decision trees, each modeling the error in the output
    from the last


    # Support vector machines


    Take an entirely different approach to modeling data by adding dimensionality
    under the supposition that data that isn’t linearly separable in the original
    problem space might be linearly separable in higher-dimensional space


    Scikit provides convenient implementations of these and other learning algorithms
    in classes such as `LinearRegression`, `RandomForestRegressor`, and `GradientBoostingRegressor`.


    A common metric for quantifying the accuracy of regression models is the $R^2$
    score, also known as the coefficient of determination. It’s typically a value
    from 0 to 1, with higher numbers indicating higher accuracy. Technically, it’s
    a measure of the variance in the output that can be explained by the values in
    the input. For small datasets, $k$-fold cross-validation gives you more confidence
    in the $R^2$ score than simply splitting the data once for training and testing.
    $k$-fold trains the model $k$ times, each time with the dataset split differently.


    Real-world datasets tend to be messy and often require further preparation to
    be useful for machine learning. As the taxi-fare example demonstrated, outliers
    in training data can affect a model’s accuracy or prevent the model from being
    useful at all. One solution is to identify the outliers and remove them before
    training the model. Another is to employ a learning algorithm such as ridge regression
    or lasso regression that supports regularization.


    Regression models are common in machine learning, but classification models are
    more common still. [Chapter 3](Chapter 3) tackles classification models head-on,
    introduces another leading learning algorithm called logistic regression, and
    builds on what you learned in this chapter.'

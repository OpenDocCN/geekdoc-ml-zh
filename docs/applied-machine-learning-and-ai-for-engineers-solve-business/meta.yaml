  - "[PAGE 235]\n\nsounds of logging operations and distinguish them from ambient\
    \ sounds such as wildlife and thunderstorms.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_235_0.png)\n\
    \n> NOTE\nThe tutorial in this section was inspired by the Rainforest Connection,\
    \ which uses recycled Android phones to monitor rainforests for sounds of illegal\
    \ activity. A TensorFlow CNN hosted in the cloud analyzes audio from the phones\
    \ and may one day run on the phones themselves with an assist from TensorFlow\
    \ Lite, a smaller version of TensorFlow designed for mobile, embedded, and edge\
    \ devices. For more information, see “The Fight Against Illegal Deforestation\
    \ with TensorFlow” in the Google AI blog. It’s just one example of how AI is making\
    \ the world a better place.\n\nBegin by downloading a ZIP file containing a dataset\
    \ of rainforest sounds. (Warning: it’s a 666 MB download.) Create a subdirectory\
    \ named *Sounds* in the directory where your notebooks are hosted, and copy the\
    \ contents of the ZIP file into the subdirectory. *Sounds* now contains subdirectories\
    \ named *background*, *chainsaw*, *engine*, and *storm*. Each subdirectory contains\
    \ 100 WAV files. The WAV files in the *background* directory contain rainforest\
    \ background noises only, while the files in the other subdirectories include\
    \ the sounds of chainsaws, engines, and thunderstorms overlaid on the background\
    \ noises. I generated these files by using a soundscape synthesis package named\
    \ Scaper to combine sounds in the public UrbanSound8K dataset with rainforest\
    \ sounds. Play a few of the WAV files on your computer to get a feel for the sounds\
    \ they contain.\n\nNow create a Jupyter notebook and paste the following code\
    \ into the first cell:\n\n```\nimport numpy as np\nimport librosa.display, os\n\
    import matplotlib.pyplot as plt\n%matplotlib inline\n\ndef create_spectrogram(audio_file,\

    As `detectMultiScale` analyzes an image, it typically detects a face multiple
    times, each defined by a bounding box that’s aligned slightly differently. The
    `minNeighbors` parameter specifies the minimum number of times a face must be
    detected to be reported as a face. Higher values deliver higher precision (fewer
    false positives), but at the cost of lower recall, which means some faces might
    not be detected.


    `CascadeClassifier` frequently requires tuning in this manner to strike the right
    balance between finding too many faces and finding too few. With that in mind,
    it is among the fastest face detection algorithms in existence. It can also be
    used to detect objects other than faces by loading XML files containing other
    pretrained classifiers. In [OpenCV’s GitHub repo](https://github.com/opencv/opencv),
    you’ll find XML files for detecting silverware and other objects using Haar-like
    features, and XML files that detect objects using a different type of discriminator
    called [local binary patterns](https://en.wikipedia.org/wiki/Local_binary_patterns).


    # Face Detection with Convolutional Neural Networks


    While more computationally expensive, deep-learning methods often do a better
    job of detecting faces in images than Viola-Jones. In particular, *multitask cascaded
    convolutional neural networks*, or MTCNNs, have proven adept at face detection
    in a variety of benchmarks. They also identify facial landmarks such as the eyes,
    the nose, and the mouth.


    [Figure 11-4](https://example.com/figure11-4) is adapted from a diagram in the
    2016 paper titled “[Joint Face Detection and Alignment Using Multitask Cascaded
    Convolutional Networks](https://arxiv.org/abs/1604.02878)” that proposed MTCNNs.
    An MTCNN uses three CNNs arranged in a series to detect faces. The first one,
    called the *Proposal Network*, or P-Net, is a shallow CNN that searches the image
    at various resolutions looking for features indicative of faces. Rectangles identified
    by P-Net are combined to form candidate face rectangles and are input to the Refine
    Network, or R-Net, which is a deeper CNN that examines each rectangle more closely
    and rejects those that lack faces. Finally, output from R-Net is input to the
    Output Network (O-Net), which'
  merge: -1
  pgno: 246
- img_proc: true
  md: "further filters candidate rectangles and identifies facial landmarks. MTCNNs\
    \ are multitask CNNs because they produce three outputs each—a classification\
    \ output indicating the confidence level that the rectangle contains a face, and\
    \ two regression outputs locating the face and facial landmarks—rather than just\
    \ one. And they’re cascaded like Viola-Jones classifiers to quickly rule out frames\
    \ that don’t contain faces.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_247_0.png)\n\
    \nA handy MTCNN implementation is available in the Python package named MTCNN.\

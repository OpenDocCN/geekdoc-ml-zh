    \ as cmd\n\nfig, ax = plt.subplots(figsize=(6, 6))\nax.grid(False)\ncmd.from_estimator(pipe,\
    \ x_test, y_test, display_labels=faces.target_names,\n                   cmap='Blues',\
    \ xticks_rotation='vertical', ax=ax)\n\n以下是输出：\n\n![](img/628b9a382d0944bbfa786c66bc651b50_123_0.png)\n\
    \n该模型在20次中正确识别了Colin Powell 19次，Donald Rumsfeld 20次，等等。这还不错。这是支持向量机工作的一个很好的例子。\n\
    \n## 总结\n\n支持向量机（SVM）通常比其他学习算法更好地拟合数据集。SVM是最大间隔分类器，使用核技巧来模拟向数据添加维度。其理论是，在$m$维中线性不可分的数据，如果$n$高于$m$，则在$n$维中可能是可分的。SVM最常用于分类，但也可以执行回归。作为实验，尝试在第2章的出租车费用示例中用`SVR`替换`GradientBoostingRegressor`，并使用`GridSearchCV`来优化模型的超参数。哪个模型产生了最高的交叉验证决定系数？\n\
    \nSVM通常在数据被标准化为单位方差时训练得更好。即使所有列中的值范围相似，情况也是如此，但如果它们*不*具有相似的范围，则尤其如此。Scikit的`StandardScaler`类对数据应用单位方差。单位方差是通过将列中的所有值除以该列所有值的平均值，再除以标准差来实现的。Scikit的`make_pipeline`函数使你能够将`StandardScaler`等转换器和`SVC`等分类器组合成一个逻辑单元，以确保传递给`fit`、`predict`和`predict_proba`的数据经历相同的转换。\n\
    \nSVM需要调优以达到最佳准确率。调优意味着为C、gamma和kernel等参数找到合适的值，这需要尝试不同的参数组合并评估结果。Scikit提供了`GridSearchCV`等类来提供帮助，但它们会为每个唯一的参数值组合训练一次模型，从而增加训练时间。\n\
    \nSVM在将数学模型拟合到复杂数据集方面的能力似乎很神奇。但在我看来，这种神奇性次于主成分分析（PCA）所执行的数值运算，PCA解决了机器学习中经常遇到的各种问题。我经常通过告诉听众PCA是机器学习中保守得最好的秘密来介绍它。在[第6章](https://example.com)之后，它将不再是秘密。\n\
    \n> 1 RBF是[径向基函数](https://example.com)的缩写。\n\n## 第6章 主成分分析\n\n主成分分析（PCA）是机器学习中的一个小奇迹。它是一种降维技术，可以在不牺牲相应信息量的情况下减少数据集中的维度数量。虽然这表面上看起来可能并不令人印象深刻，但它对致力于从数据构建预测模型的工程师和软件开发者具有深远的影响。\n\
    \n如果我告诉你，你可以取一个有1000列的数据集，使用PCA将其减少到100列，并保留原始数据集中90%或更多的信息，你会怎么想？信不信由你，这相对常见。它适用于各种实际用途，包括：\n\
    \n- 将高维数据减少到两维或三维，以便进行绘图和探索\n- 减少数据集中的维度数量，然后恢复原始维度数量，这在异常检测和噪声过滤中有应用\n- 匿名化数据集，以便可以与他人共享而不泄露数据的性质或含义\n\
    \n不仅如此。将PCA应用于数据集的一个副作用是，不太重要的特征——与预测模型结果相关性较低的数据列——被移除，同时列之间的依赖关系被消除。在样本（行）与特征（列）比例较低的数据集上，PCA可用于提高该比例。根据经验法则，用于机器学习的数据集通常需要*至少*有五倍于列数的行数。如果你不能增加行数，另一种选择是使用PCA来削减列数。\n\
    \n一旦你了解了PCA，你会想知道没有它你是如何生活的。让我们花点时间来理解它是什么以及它是如何工作的。然后我们将看一些例子，展示为什么它是一个如此不可或缺的工具。\n\
    \n### 理解主成分分析\n\n理解PCA的一种方法是看它如何将一个二维数据集减少到一维。图6-1描绘了一个由一些随机的*x*和*y*值集合组成的2D数据集。如果你通过简单地删除*x*列或*y*列将这个数据集减少到一维，你将得到一条与原始数据集几乎没有相似之处的水平或垂直线。"

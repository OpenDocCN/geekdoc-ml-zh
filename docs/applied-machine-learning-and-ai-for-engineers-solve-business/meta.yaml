    ## YOLO


    虽然 R-CNN 系列目标检测系统提供了无与伦比的准确性，但在实时目标检测方面（例如自动驾驶汽车所需的类型）仍有不足。2015 年发表的一篇题为“You Only
    Look Once: Unified, Real-Time Object Detection”的论文提出了一种替代 R-CNN 的方法，称为 YOLO（You
    Only Look Once），它彻底改变了工程师对目标检测的思考方式。论文引言中写道：


    > 人类瞥一眼图像，就能立即知道图像中有什么物体、它们在哪里以及它们如何互动。人类的视觉系统快速而准确，使我们能够在几乎无意识的情况下执行驾驶等复杂任务。快速、准确的目标检测算法将使计算机能够在没有专用传感器的情况下驾驶汽车，使辅助设备能够向人类用户传达实时场景信息，并释放通用、响应式机器人系统的潜力。


    当前的检测系统重新利用分类器来执行检测。为了检测一个对象，这些系统使用该对象的分类器，并在测试图像的各种位置和尺度上对其进行评估。像可变形部件模型（DPM）这样的系统使用滑动窗口方法，分类器在整个图像上均匀间隔的位置运行。


    像 R-CNN 这样更新近的方法使用区域提议方法首先在图像中生成潜在的边界框，然后在这些提议的框上运行分类器。分类后，使用后处理来优化边界框、消除重复检测，并根据场景中的其他对象重新评分边界框。这些复杂的流程很慢且难以优化，因为每个单独的组件都必须单独训练。


    我们将目标检测重新定义为一个单一的回归问题，直接从图像像素到边界框坐标和类别概率。使用我们的系统，您只需查看一次（YOLO）图像即可预测存在哪些对象以及它们的位置。


    YOLO 系统的特点是其性能：


    我们的基础网络在 Titan X GPU 上以每秒 45 帧的速度运行，没有批处理，快速版本以超过 150 fps 的速度运行。这意味着我们可以以低于 25
    毫秒的延迟实时处理流式视频。此外，YOLO 的平均精度均值是其他实时系统的两倍以上。


    从高层次来看，YOLO 通过将特征图划分为单元格网格并评估每个单元格是否存在对象来工作，如图 12-8 所示。使用从 Faster R-CNN 借用的锚框概念，YOLO
    分析每个单元格周围各种形状和大小的边界框，并为这些框分配类别和概率。一个 CNN 处理所有事情，包括特征提取、分类和指定边界框大小和位置的回归，图像只通过
    CNN 一次。最后，NMS 将边界框的数量减少到每个对象一个，每个边界框都归因于一个类别以及一个置信度水平——该框实际包含指定类别对象的概率。


    目前有七个版本的 YOLO，称为 YOLOv1 到 YOLOv7。每个新版本都在准确性和性能方面对前一版本进行了改进。还有像 PP-YOLO 和 YOLO9000
    这样的变体。YOLOv3 是 YOLO 创始人 Joseph Redmon 参与的最后一个版本，被认为是一种参考实现。通过从 CNN 的某些层提取特征图，YOLOv3
    使用 13 × 13 网格、26 × 26 网格和 52 × 52 网格分析图像，以检测各种大小的对象。它使用锚点为每个单元格预测九个边界框。YOLO 的主要弱点是它难以检测彼此靠近的非常小的对象，尽管
    YOLOv3 在这方面比 YOLOv1 和 YOLOv2 有所改进。有关 YOLO 的更多信息，请访问其[创建者的网站](https://www.example.com)。另一篇题为“Digging
    Deep into YOLO V3”的文章深入探讨了 YOLOv3 架构。


    ## YOLOv3 和 Keras


    YOLO 最初是使用名为 [Darknet](https://www.example.com) 的深度学习框架编写的，但它也可以用其他框架实现。GitHub
    上的 [keras-yolo3 项目](https://www.example.com) 包含 YOLOv3 的 Keras 实现，可以从头开始训练，也可以使用预定义的权重进行初始化并用于推理——即进行预测。此版本接受
    416 × 416 图像。为了简化使用，我创建了一个名为 *yolov3.py* 的文件，其中包含辅助类和辅助函数。它是 keras-yolo3 项目中可用的[文件](https://www.example.com)的修改版本。我删除了预测不需要的元素，重写了一些代码以提高实用性和性能，并添加了一些我自己的代码，但大部分功劳归功于
    Huynh Ngoc Anh，他的 GitHub ID 是 [experiencor](https://www.example.com)。借助 *yolov3.py*

    ```\n\nHere’s the same network created with the functional API:\n\n```\ninput\
    \ = Input(shape=(3,))\nhidden = Dense(128, activation='relu')(input)\noutput =\
    \ Dense(1, activation='sigmoid')(hidden)\nmodel = Model(inputs=input, outputs=output)\n\
    ```\n\nWhen you create the model, you specify the inputs and outputs, and since\
    \ the inputs and outputs parameters accept Python lists, it’s a simple matter\
    \ to create a model with multiple inputs and outputs. For a concise introduction\
    \ to the functional API and examples demonstrating advanced uses, including multiple\
    \ inputs and outputs and shared layers, see “How to Use the Keras Functional API\

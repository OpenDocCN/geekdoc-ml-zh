    \ kernels and five values each for C and gamma to see which combination produces\
    \ the best results. Rather than write a nested for loop, you could do this:\n\n\
    ```python\nmodel = SVC()\n\ngrid = {\n    'C': [0.01, 0.1, 1, 10, 100],\n    'gamma':\
    \ [0.01, 0.25, 0.5, 0.75, 1.0],\n    'kernel': ['rbf', 'poly']\n}\n\ngrid_search\
    \ = GridSearchCV(estimator=model, param_grid=grid, cv=5, verbose=2)\ngrid_search.fit(x,\
    \ y) # Train the model with different parameter combinations\n```\n\nThe call\
    \ to `fit` won’t return for a while. It trains the model *250 times* since there\
    \ are 50 different combinations of kernel, C, and gamma, and cv=5 says to use\
    \ fivefold cross-validation to assess the results. Once training is complete,\
    \ you retrieve the best model this way:\n\n```python\nbest_model = grid_search.best_estimator_\n\
    ```\n\nIt is not uncommon to run a search regimen such as this one multiple times—the\
    \ first time with course parameter values, and each time thereafter with narrower\
    \ ranges of values centered on the values obtained from `best_params_`. More training\
    \ time up front is the price you pay for an accurate model. To reiterate, you\
    \ can almost always make an SVM more accurate by finding the optimum combination\
    \ of parameters. And for better or worse, brute force is the most effective way\
    \ to identify the best combination.\n\n> **NOTE**\n\nOne nuance to be aware of\
    \ regarding the SVC class is that it doesn’t compute probabilities by default.\
    \ If you want to call `predict_proba` on an SVC instance, you must set `probability`\
    \ to True when creating the instance:\n\n```python\nmodel = SVC(probability=True)\n\
    ```\n\nThe model will train more slowly, but you’ll be able to retrieve probabilities\
    \ as well as predictions. Furthermore, the Scikit documentation warns that “`predict_proba`\
    \ may be inconsistent with `predict`.” For more information, see [Section 1.4.1.2\
    \ in the documentation](https://scikit-learn.org/stable/modules/svm.html#scores-and-probabilities).\n\
    \n## Data Normalization\n\nIn [Chapter 2](https://example.com), I noted that some\
    \ learning algorithms work better with normalized data. Unnormalized data contains\
    \ columns of numbers with vastly different ranges—for example, values from 0 to\
    \ 1 in one column and from 0 to 1,000,000 in another. SVM is a parametric learning\
    \ algorithm. Training with normalized data is important because SVMs use distances\
    \ to compute margins. If one dimension spans *much* larger distances than another,\
    \ the internal algorithm used to find the maximum margins might have trouble converging\
    \ on a solution.\n\nThe importance of training machine learning models with normalized\
    \ data isn’t limited to SVMs. Decision trees and learning algorithms such as random\
    \ forests and gradient-boosted decision trees that rely on decision trees are\
    \ nonparametric, so they work equally well with normalized and unnormalized data.\
    \ They are the exception, however. Most other learning algorithms benefit to one\
    \ degree or another from normalized data. That includes *k*-nearest neighbors,\
    \ which although nonparametric uses distance-based calculations internally to\
    \ discriminate between classes.\n\nScikit offers several classes for normalizing\
    \ data. The most commonly used are `MinMaxScaler` and `StandardScaler`. The former\
    \ normalizes data by proportionally reducing the values in each column to values\
    \ from 0.0 to 1.0. Mathematically, it’s simple. For each column in a dataset,\
    \ `MinMaxScaler` subtracts the minimum value in that column from all the column’s\
    \ values, then it divides each value by the difference between the minimum and\
    \ maximum values. In the resulting column, the minimum value is 0.0 and the maximum\
    \ is 1.0.\n\nTo demonstrate, I extracted subsets of two columns with vastly different\

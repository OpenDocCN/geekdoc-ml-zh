    \ from text files, databases, and other data sources. It returns a *data view*,\
    \ which is an object that implements the IDataView interface. Data views in ML.NET\
    \ are similar to DataFrames in Pandas, with one important difference: whereas\
    \ DataFrames have to fit in memory, data views do not. Internally, data views\
    \ use a SQL-like cursor to access data. This means they can wrap a theoretically\
    \ unlimited amount of data. That’s why ML.NET was able to process the entire 9\
    \ GB Amazon dataset, while Scikit and H2O were not.\n\nAfter loading the data\
    \ and splitting it for training and testing, the preceding code creates a pipeline\
    \ containing a TextFeaturizingEstimator object—created with the FeaturizeText\
    \ method—and an SdcaLogisticRegressionBinaryTrainer object—created with the SdcaLogisticRegression\
    \ method. This is analogous in Scikit to creating a pipeline containing a CountVectorizer\
    \ object for vectorizing input text and a LogisticRegression object for fitting\
    \ a model to the data. Calling Fit on the pipeline trains the model, just like\
    \ calling fit in Scikit. It’s no coincidence that ML.NET employs some of the same\
    \ patterns as Scikit. This was done intentionally to impart a sense of familiarity\
    \ to programmers who use Scikit.\n\nAfter evaluating the model’s accuracy by computing\
    \ the area under the precision-recall curve, a call to ModelOperationsCatalog.CreatePredictionEngine\
    \ creates a prediction engine whose Predict method makes predictions. Unlike Scikit,\
    \ which has you call predict on the estimator itself, ML.NET encapsulates prediction\
    \ capability in a separate object, in part so that multiple prediction engines\
    \ can be created to achieve scalability in high-traffic scenarios.\n\nIn this\
    \ example, Predict accepts an Input object as input and returns an Output object.\
    \ One of the benefits of building models with ML.NET is strong typing. LoadFromTextFile\
    \ is a generic method that accepts a class name as a type parameter—in this case,\
    \ Input. Similarly, CreatePredictionEngine uses type parameters to specify schemas\
    \ for input and output. The Input and Output classes are application specific\
    \ and in this instance are defined as follows:\n\n```\npublic class Input\n{\n\
    \    [LoadColumn(0)]\n    public string Text;\n\n    [LoadColumn(1), ColumnName(\"\
    Label\")]\n    public bool Sentiment;\n}\n\npublic class Output\n{\n    [ColumnName(\"\

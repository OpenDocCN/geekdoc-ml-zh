    \nmodel = LinearRegression()\nmodel.fit(x_train, y_train)\nmodel.score(x_test,\
    \ y_test)\n```\n\nThis time, `score` returns 0.6255. So which is it? Is the model\
    \ 59% accurate at making predictions or 63% accurate? Why did `score` return two\
    \ different values?\n\nWhen `train_test_split` splits a dataset, it randomly selects\
    \ rows for the training dataset and the test dataset. The `random_state` parameter\
    \ seeds the random-number generator used to make selections. By specifying two\
    \ different seed values, you train the model with two different datasets and test\
    \ it with two different datasets too. Sure, there is overlap between them. But\
    \ the fact remains that the number you seed `train_test_split`'s random-number\
    \ generator with affects the outcome. The smaller the dataset, the greater that\
    \ effect is likely to be.\n\nThe solution is *cross-validation*. To cross-validate\
    \ a model, you partition the dataset into *folds*, as pictured in Figure 2-11.\
    \ Using five folds is common, but you can use any number of folds you like. Then\
    \ you train the model five times—once for each fold—using a different 80% of the\
    \ dataset for training and a different 20% for testing each time, and average\
    \ the scores to generate a cross-validated score. That score is more reliable\
    \ than the score returned by `score` because it is less sensitive to how the data\
    \ is split. This process is known as *k-fold cross-validation*.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_53_0.png)\n\
    \nThe downside to cross-validation is that it takes longer. With 5-fold cross-validation,\
    \ you’re training the model five times. The good news is that cross-validation\
    \ is generally applied only to small datasets, and if the dataset is small, the\
    \ model probably trains quickly.\n\nYou could write the code to do cross-validation\
    \ yourself, but you don’t have to because Scikit does it for"

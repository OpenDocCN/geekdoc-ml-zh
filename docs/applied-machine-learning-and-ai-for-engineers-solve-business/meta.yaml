  md: 'between classes. Convolution layers use convolution kernels to extract features,
    and pooling layers reduce the size of the feature maps output from the convolution
    layers. Output from these layers is input to fully connected layers for classification.
    Keras provides implementations of convolution and pooling layers in classes such
    as Conv2D and MaxPooling2D.


    Training a CNN from scratch when there is a relatively high degree of separation
    between classes—for example, the MNIST dataset—is feasible on an ordinary laptop
    or PC. Training a CNN to solve a more perceptual problem requires more training
    images and commensurately more compute power. Transfer learning is a practical
    alternative to training CNNs from scratch. It uses the intelligence already present
    in the bottleneck layers of pretrained CNNs to extract features from images, and
    then uses its own classification layers to interpret the results.


    Data augmentation can increase the accuracy of a CNN trained with a relatively
    small number of images and is especially useful with transfer learning. Augmentation
    involves applying random transforms such as translations and rotations to the
    training images. You can transform images before inputting them to the network
    with Keras’s `ImageDataGenerator` class, or you can build the transforms into
    the network with layers such as `RandomRotation` and `RandomTranslation`. Layers
    that transform images are active at training time but inactive when the network
    makes predictions.


    CNNs are applicable to a wide variety of computer-vision problems and are almost
    single-handedly responsible for the rapid advancements made in that field in the
    past decade. They play an important role in modern facial recognition systems
    too. Want to know more? Detecting and identifying faces in photographs is the
    subject of the next chapter.'

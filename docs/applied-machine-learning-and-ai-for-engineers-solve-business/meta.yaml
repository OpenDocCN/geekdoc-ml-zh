    `change_background` submits the foreground image (the one passed in the function’s
    second parameter) to the model and copies all the pixels inside the segmentation
    masks to the background image. It works best when the foreground and background
    images are the same size, but it will resize the background image if needed to
    match the foreground image. The background will be distorted if its aspect ratio
    differs from that of the foreground image.


    The fact that segmentation masks produced by Mask R-CNN measure just 28 × 28 explains
    the “tearing” around the pixels copied from the foreground image: the resolution
    of the mask is lower than that of the person in the photo. You could modify Mask
    R-CNN to use higher-resolution masks, but you’d have to retrain the model from
    scratch. That’s a time-consuming endeavor with a model as complex as this one
    and a dataset as large as COCO, even if you do the training on GPUs.


    ## YOLO


    While the R-CNN family of object detection systems delivers unparalleled accuracy,
    it leaves something to be desired when it comes to real-time object detection
    of the type required by, say, self-driving cars. A paper titled “You Only Look
    Once: Unified, Real-Time Object Detection” published in 2015 proposed an alternative
    to R-CNNs known as YOLO (You Only Look Once) that revolutionized the way engineers
    think about object detection. From the paper’s introduction:


    > Humans glance at an image and instantly know what objects are in the image,
    where they are, and how they interact. The human visual system is fast and accurate,
    allowing us to perform complex tasks like driving with little conscious thought.
    Fast, accurate algorithms for object detection would allow computers to drive
    cars without specialized sensors, enable assistive devices to convey real-time
    scene information to human users, and unlock the potential for general purpose,
    responsive robotic systems.


    Current detection systems repurpose classifiers to perform detection. To detect
    an object, these systems take a classifier for that object and evaluate it at
    various locations and scales in a test image. Systems like deformable parts models
    (DPM) use a sliding window approach where the classifier is run at evenly spaced
    locations over the entire image.


    More recent approaches like R-CNN use region proposal methods to first generate
    potential bounding boxes in an image and then run a classifier on these proposed
    boxes. After classification, post-processing is used to refine the bounding boxes,
    eliminate duplicate detections, and rescore the boxes based on other objects in
    the scene. These complex pipelines are slow and hard to optimize because each
    individual component must be trained separately.


    We reframe object detection as a single regression problem, straight from image
    pixels to bounding box coordinates and class probabilities. Using our system,
    you only look once (YOLO) at an image to predict what objects are present and
    where they are.


    YOLO systems are characterized by their performance:


    Our base network runs at 45 frames per second with no batch processing on a Titan
    X GPU and a fast version runs at more than 150 fps. This means we can process
    streaming video in real-time with less than 25 milliseconds of latency. Furthermore,
    YOLO achieves more than twice the mean average precision of other real-time systems.


    At a high level, YOLO works by dividing feature maps into grids of cells and evaluating
    each cell for the presence of an object, as shown in Figure 12-8. Using the anchor-box
    concept borrowed from Faster R-CNN, YOLO analyzes bounding boxes of various shapes
    and sizes around each cell and assigns classes and probabilities to the boxes.
    One CNN handles everything, including feature extraction, classification, and
    regression designating the sizes and locations of the bounding boxes, and an image
    goes through the CNN just once. At the end, NMS reduces the number of bounding
    boxes to one per object, and each bounding box is attributed with a class as well
    as a confidence level—the probability that the box actually contains an object
    of the specified class.


    There are currently seven versions of YOLO referred to as YOLOv1 through YOLOv7.
    Each new version improves on the previous version in terms of accuracy and performance.
    There are also variations such as PP-YOLO and YOLO9000. YOLOv3 was the last version
    that YOLO creator Joseph Redmon contributed to and is considered a reference implementation
    of sorts. By extracting feature maps from certain layers of the CNN, YOLOv3 analyzes
    the image using a 13 × 13 grid, a 26 × 26 grid, and a 52 × 52 grid in an effort
    to detect objects of various sizes. It uses anchors to predict nine bounding boxes
    per cell. YOLO’s primary weakness is that it has difficulty detecting very small
    objects that are close together, although YOLOv3 improved on YOLOv1 and YOLOv2
    in this regard. More information about YOLO can be found on its [creator’s website](https://www.example.com).
    A separate article titled “Digging Deep into YOLO V3” offers a deep dive into
    the YOLOv3 architecture.


    ## YOLOv3 and Keras


    YOLO was originally written using a deep-learning framework called [Darknet](https://www.example.com),
    but it can be implemented with other frameworks as well. The [keras-yolo3 project](https://www.example.com)
    on GitHub contains a Keras implementation of YOLOv3 that can be trained from scratch
    or initialized with predefined weights and used for inference—that is, to make
    predictions. This version accepts 416 × 416 images. To simplify usage, I created
    a file named *yolov3.py* containing helper classes and helper functions. It is
    a modified version of a [file](https://www.example.com) that’s available in the
    keras-yolo3 project. I removed elements that weren’t needed for making predictions,
    rewrote some of the code for improved utility and performance, and added a little
    code of my own, but most of the credit goes to Huynh Ngoc Anh, whose GitHub ID
    is [experiencor](https://www.example.com). With *yolov3.py* and a set of weights
    to lend a hand, you can load YOLOv3 and make predictions with just a few lines
    of code.


    To see YOLOv3 in action, begin by [downloading a ZIP file](https://www.example.com)
    containing the files you need. Open the ZIP file and place *yolov3.py* in the

    for a setosa iris, 1 for versicolor, and 2 for virginica. Figure 1-14 shows an
    example of each species and illustrates the difference between petals and sepals.


    ![](img/628b9a382d0944bbfa786c66bc651b50_37_0.png)


    *Figure 1-14. Iris dataset (Middle panel: "Blue Flag Flower Close-Up [Iris Versicolor]"
    by Danielle Langlois is licensed under CC BY-SA 2.5, https://creativecommons.org/licenses/by-sa/2.5/deed.en;
    rightmost panel: "Image of Iris Virginica Shrevei BLUE FLAG" by Frank Mayfield

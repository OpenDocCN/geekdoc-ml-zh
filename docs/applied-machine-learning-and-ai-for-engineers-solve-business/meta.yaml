    \n> **注意**\n\n有时CountVectorizer内置的停用词列表会*降低*模型的准确性，因为该列表过于宽泛。作为实验，从CountVectorizer中移除`stop_words='english'`并再次运行代码。检查混淆矩阵。准确性是提高了还是降低了？也请随意调整其他参数，如`min_df`和`ngram_range`。在现实世界中，数据科学家经常尝试许多不同的参数组合，以确定哪种组合能产生最佳结果。\n\
    \n## 朴素贝叶斯\n\n逻辑回归是分类模型的首选算法，在文本分类方面通常非常有效。但在涉及文本分类的场景中，数据科学家经常转向另一种称为*朴素贝叶斯*的学习算法。这是一种基于*贝叶斯定理*的分类算法，它提供了一种计算条件概率的方法。从数学上讲，贝叶斯定理表述如下：\n\
    \n$$P(A|B) = \\frac{P(B|A) \\cdot P(A)}{P(B)}$$\n\n这表示在B为真的条件下A为真的概率，等于在A为真的条件下B为真的概率乘以A为真的概率，再除以B为真的概率。这说起来很拗口，虽然准确，但它没有解释为什么朴素贝叶斯在文本分类中如此有用——或者你如何将其应用于例如一组电子邮件以确定哪些是垃圾邮件。\n\
    \n让我们从一个简单的例子开始。假设你收到的所有邮件中有10%是垃圾邮件。这就是$P(A)$。分析显示，你收到的垃圾邮件中有5%包含*congratulations*这个词，但只有1%的*所有*邮件包含这个词。因此，$P(B|A)$是0.05，$P(B)$是0.01。如果一封邮件包含*congratulations*这个词，它是垃圾邮件的概率$P(A|B)$是(0.05\
    \ x 0.10) / 0.01，即0.50。\n\n当然，垃圾邮件过滤器必须考虑邮件中的所有单词，而不仅仅是一个。事实证明，如果你做一些简单（朴素）的假设——邮件中单词的顺序无关紧要，并且每个单词的权重相等——你可以这样编写垃圾邮件分类器的贝叶斯方程：\n\
    \n$$P(S|message) = P(S) \\cdot P(word_1|S) \\cdot P(word_2|S)...P(word_n|S)$$\n\
    \n用简单的英语来说，一条消息是垃圾邮件的概率与以下各项的乘积成正比：\n\n- 数据集中任何消息是垃圾邮件的概率，即$P(S)$\n- 消息中每个单词出现在垃圾邮件中的概率，即$P(word|S)$\n\
    \n$P(S)$可以很容易地计算出来：它就是数据集中垃圾邮件所占的比例。如果你用1,000条消息训练一个机器学习模型，其中500条是垃圾邮件，那么$P(S)\
    \ = 0.5$。对于给定的单词，$P(word|S)$就是该单词在垃圾邮件中出现的次数除以所有垃圾邮件中的单词总数。整个问题简化为单词计数。你可以进行类似的计算来计算消息*不是*垃圾邮件的概率，然后使用两个概率中较高的一个进行预测。\n\
    \n这里有一个涉及四个示例邮件的例子。邮件如下：\n\n| 文本 | 垃圾邮件 |\n|---|---|\n| Raise your credit score\
    \ in minutes | 1 |\n| Here are the minutes from yesterday’s meeting | 0 |\n| Meeting\
    \ tomorrow to review yesterday’s scores | 0 |\n| Score tomorrow’s meds at yesterday’s\
    \ prices | 1 |\n\n如果你移除停用词，将字符转换为小写，并对单词进行词干提取，使得*tomorrow's*变成*tomorrow*，你会得到：\n\
    \n| 文本 | 垃圾邮件 |\n|---|---|\n| raise credit score minute | 1 |\n| minute yesterday\
    \ meeting | 0 |\n| meeting tomorrow review yesterday score | 0 |\n| score tomorrow\
    \ med yesterday price | 1 |\n\n因为四条消息中有两条是垃圾邮件，两条不是，所以任何消息是垃圾邮件的概率（$P(S)$）是0.5。任何消息不是垃圾邮件的概率（$P(N)\
    \ = 0.5$）也是如此。此外，垃圾邮件包含九个唯一单词，而非垃圾邮件总共包含八个唯一单词。\n\n下一步是构建以下单词频率表。以单词*yesterday*为例。它在一条标记为垃圾邮件的消息中出现一次，所以$P(yesterday|S)$是1/9，即0.111。它在非垃圾邮件中出现两次，所以$P(yesterday|N)$是2/8，即0.250：\n\

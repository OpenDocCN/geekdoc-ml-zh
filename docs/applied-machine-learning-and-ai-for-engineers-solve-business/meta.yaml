    \ | 1.075472 | 1551.0 | 4.180593 | 32.58 | -117.05 | 1.369 |\n| 10101 | 5.7796\
    \ | 32.0 | 6.107226 | 0.927739 | 1296.0 | 3.020979 | 33.92 | -117.97 | 2.413 |\n\
    | 20566 | 4.3487 | 29.0 | 5.930712 | 1.026217 | 1554.0 | 2.910112 | 38.65 | -121.84\
    \ | 2.007 |\n| 2670 | 2.4511 | 37.0 | 4.992958 | 1.316901 | 390.0 | 2.746479 |\
    \ 33.20 | -115.60 | 0.725 |\n| 15709 | 5.0049 | 25.0 | 4.319261 | 1.039578 | 649.0\
    \ | 1.712401 | 37.79 | -122.43 | 4.600 |\n\nUse the following code to split the\
    \ data 80/20, train a linear regression model with 80% of the data to predict\

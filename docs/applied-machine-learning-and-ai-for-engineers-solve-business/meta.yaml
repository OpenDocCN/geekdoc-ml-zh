  md: 'Before an image is submitted to a pretrained CNN for classification, it must
    be sized to the dimensions the CNN expects—typically 224 × 224—and preprocessed.
    Different CNNs expect images to be preprocessed in different ways, so Keras provides
    a `preprocess_input` function for each pretrained CNN. It also includes utility
    functions for loading and resizing images. The following statements load an image
    from the filesystem and preprocess it for input to the MobileNetV2 network:


    ```

    python

    import numpy as np

    from tensorflow.keras.applications.mobilenet import preprocess_input

    from tensorflow.keras.preprocessing import image


    x = image.load_img(''arctic_fox.jpg'', target_size=(224, 224))

    x = image.img_to_array(x)

    x = np.expand_dims(x, axis=0)

    x = preprocess_input(x)

    ```


    In most cases, `preprocess_input` does all the work that’s needed, which often
    involves applying unit variance to pixel values and converting RGB images to BGR
    format. In some cases, however, you still need to divide the pixel values by 255.
    [ResNet50V2](https://keras.io/api/applications/resnet/#resnet50v2-function) is
    one example:


    ```

    python

    import numpy as np

    from tensorflow.keras.applications.resnet50 import preprocess_input

    from tensorflow.keras.preprocessing import image


    x = image.load_img(''arctic_fox.jpg'', target_size=(224, 224))

    x = image.img_to_array(x)

    x = np.expand_dims(x, axis=0)

    x = preprocess_input(x) / 255

    ```


    Once an image is preprocessed, making a prediction is as simple as calling the
    network’s `predict` method:


    ```

    python

    y = model.predict(x)

    ```


    To help you interpret the output, Keras also provides a network-specific `decode_predictions`
    method. Figure 10-10 shows what that method returned for a photo submitted to
    ResNet50V2.


    ![](img/628b9a382d0944bbfa786c66bc651b50_218_0.png)


    ResNet50V2 is 89% sure the photo contains an Arctic fox—which, it so happens,
    it does. MobileNetV2 predicted with 92% certainty that the photo contains an Arctic
    fox. Both networks were trained on the same dataset, but different pretrained
    CNNs classify images slightly differently.'

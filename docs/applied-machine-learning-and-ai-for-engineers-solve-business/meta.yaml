  md: 'SVMs require tuning in order to achieve optimum accuracy. Tuning means finding
    the right values for parameters such as C, gamma, and kernel, and it entails trying
    different parameter combinations and assessing the results. Scikit provides classes
    such as GridSearchCV to help, but they increase training time by training the
    model once for each unique combination of parameter values.


    SVMs can seem magical in their ability to fit mathematical models to complex datasets.
    But in my view, that magic takes a back seat to the numerical gymnastics performed
    by principal component analysis (PCA), which solves a variety of problems routinely
    encountered in machine learning. I often introduce PCA by telling audiences that
    it’s the best-kept secret in machine learning. After [Chapter 6](https://example.com),

    check it out [online](https://example.com).


    Accuracy score, precision, recall, and F1 score apply to binary classification
    *and* multiclass classification models. An additional metric—one that applies
    to binary classification only—is the *receiver operating characteristic (ROC)
    curve*, which plots the true-positive rate (TPR) against the false-positive rate
    (FPR) at various probability thresholds. A sample ROC curve is shown in Figure
    3-3. A straight line stretching from the lower left to the upper right would indicate
    that the model gets it right just 50% of the time, which is no better than guessing
    for a binary classifier. The more the curve arches toward the upper-left corner,
    the more accurate the model. Data scientists often use the area under the curve
    (AUC, or ROC AUC) as an overall measure of accuracy. Scikit provides a class named
    `RocCurveDisplay` for plotting ROC curves, and a function named `roc_auc_score`
    for retrieving ROC AUC scores. Scores returned by this function are values from
    0.0 to 1.0. The higher the score, the more accurate the model.


    Yet another way to assess the accuracy of a classification model is to plot a
    *confusion matrix* like the one in Figure 3-4. It works for binary and multiclass
    classification, and it shows for each class how the model performed during testing.
    In this example, the model was asked to differentiate between images containing
    masked faces and images containing unmasked faces. It got it right 78 out of 85
    times when presented with pictures of people wearing masks, and 41 out of 58 times
    when presented with pictures of people not wearing masks. Scikit offers a `confusion_matrix`
    function for computing a confusion matrix, and a `ConfusionMatrixDisplay` class
    with methods named `from_estimator` and `from_predictions` for plotting confusion
    matrices.'

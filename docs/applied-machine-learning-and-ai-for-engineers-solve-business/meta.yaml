    \ to predict failures in bearings. The dataset contains vibration data for four\
    \ bearings supporting a rotating shaft with a radial load of 6,000 pounds applied\
    \ to it. The bearings were run to failure, and vibration data was captured by\
    \ high-sensitivity quartz accelerometers at regular intervals until failure occurred.\n\
    \nFirst, [download the CSV file](https://github.com/benhamner/IEEE-CIS-Fraud-Detection/blob/master/data/transaction_data.csv)\
    \ containing the subset that I culled from the larger NASA dataset. Then create\
    \ a Jupyter notebook and load the data:\n\n```python\nimport pandas as pd\n\n\
    df = pd.read_csv('Data/bearings.csv', index_col=0, parse_dates=[0])\ndf.head()\n\

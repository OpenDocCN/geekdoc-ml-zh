- md: '# Part I. Machine Learning with Scikit-Learn


    ## Chapter 1. Machine Learning


    Machine learning expands the boundaries of what’s possible by allowing computers
    to solve problems that were intractable just a few short years ago. From fraud
    detection and medical diagnoses to product recommendations and cars that “see”
    what’s in front of them, machine learning impacts our lives every day. As you
    read this, scientists are using machine learning to unlock the secrets of the
    human genome. When we one day cure cancer, we will thank machine learning for
    making it possible.


    Machine learning is revolutionary because it provides an alternative to algorithmic
    problem-solving. Given a recipe, or *algorithm*, it’s not difficult to write an
    app that hashes a password or computes a monthly mortgage payment. You code up
    the algorithm, feed it input, and receive output in return. It’s another proposition
    altogether to write code that determines whether a photo contains a cat or a dog.
    You can try to do it algorithmically, but the minute you get it working, you’ll
    come across a cat or dog picture that breaks the algorithm.


    Machine learning takes a different approach to turning input into output. Rather
    than relying on you to implement an algorithm, it examines a dataset of inputs
    and outputs and learns how to generate output of its own in a process known as
    *training*. Under the hood, special algorithms called *learning algorithms* fit
    mathematical models to the data and codify the relationship between data going
    in and data coming out. Once trained, a model can accept new inputs and generate
    outputs consistent with the ones in the training data.


    To use machine learning to distinguish between cats and dogs, you don’t code a
    cat-versus-dog algorithm. Instead, you train a machine learning model with cat
    and dog photos. Success depends on the learning algorithm used and the quality
    and volume of the training data.


    Part of becoming a machine learning engineer is familiarizing yourself with the
    various learning algorithms and developing an intuition for when to use one versus
    another. That intuition comes from experience and from an understanding of how
    machine learning fits mathematical models to data. This chapter represents the
    first step on that journey. It begins with an overview of machine learning and
    the most common types of machine learning models, and it concludes by introducing
    two popular learning algorithms and using them to build simple yet fully functional
    models.


    ### What Is Machine Learning?


    At an existential level, machine learning (ML) is a means for finding patterns
    in numbers and exploiting those patterns to make predictions. ML makes it possible
    to train a model with rows or sequences of 1s and 0s, and to *learn* from the
    data so that, given a new sequence, the model can predict what the result will
    be. *Learning* is the process by which ML finds patterns that can be used to predict
    future outputs, and it’s where the “learning” in “machine learning” comes from.


    As an example, consider the table of 1s and 0s depicted in Figure 1-1. Each number
    in the fourth column is somehow based on the three numbers preceding it in the
    same row. What’s the missing number?


    ![](img/628b9a382d0944bbfa786c66bc651b50_18_0.png)


    One possible solution is that for a given row, if the first three columns contain
    more 0s than 1s, then the fourth contains a 0. If the first three columns contain
    more 1s than 0s, then the answer is 1. By this logic, the empty box should contain
    a 1. Data scientists refer to the column containing answers (the red column in
    the figure) as the *label column*. The remaining columns are *feature columns*.
    The goal of a predictive model is to find patterns in the rows in the feature
    columns that allow it to predict what the label will be.


    If all datasets were this simple, you wouldn’t need machine learning. But real-world
    datasets are larger and more complex. What if the dataset contained millions of
    rows and thousands of columns, which, as it happens, is common in machine learning?
    For that matter, what if the dataset resembled the one in Figure 1-2?


    ![](img/628b9a382d0944bbfa786c66bc651b50_18_1.png)


    It’s difficult for any human to examine this dataset and come up with a set of
    rules for predicting whether the red box should contain a 0 or a 1. (And no, it’s
    not as simple as counting 1s and 0s.) Just imagine how much more difficult it
    would be if the dataset really *did* have millions of rows and thousands of columns.


    That’s what machine learning is all about: finding patterns in massive datasets
    of numbers. It doesn’t matter whether there are 100 rows or 1,000,000 rows. In
    many cases, more is better, because 100 rows might not provide enough samples
    for patterns to be discerned.


    It isn’t an oversimplification to say that machine learning solves problems by
    mathematically modeling patterns in sets of numbers. Most any problem can be reduced
    to a set of numbers. For example, one of the common applications for ML today
    is *sentiment analysis*: looking at a text sample such as a movie review or a
    comment left on a website and assigning it a 0 for negative sentiment (for example,
    “The food was bland and the service was terrible.”) or a 1 for positive sentiment
    (“Excellent food and service. Can’t wait to visit again!”). Some reviews might
    be mixed—for example, “The burger was great but the fries were soggy”—so we use
    the *probability* that the label is a 1 as a sentiment score. A very negative
    comment might score a 0.1, while a very positive comment might score a 0.9, as
    in there’s a 90% chance that it expresses positive sentiment.


    Sentiment analyzers and other models that work with text are frequently trained
    on datasets like the one in Figure 1-3, which contains one row for every text
    sample and one column for every word in the corpus of text (all the words in the
    dataset). A typical dataset like this one might contain millions of rows and 20,000
    or more columns. Each row contains a 0 for negative sentiment in the label column,
    or a 1 for positive sentiment. Within each row are word counts—the number of times
    a given word appears in an individual sample. The dataset is sparse, meaning it
    is mostly 0s with an occasional nonzero number sprinkled in. But machine learning
    doesn’t care about the makeup of the numbers. If there are patterns that can be
    exploited to determine whether the next sample expresses positive or negative
    sentiment, it will find them. Spam filters use datasets such as these with 1s
    and 0s in the label column denoting spam and nonspam messages. This allows modern
    spam filters to achieve an astonishing degree of accuracy. Moreover, these models
    grow smarter over time as they are trained with more and more emails.


    ![](img/628b9a382d0944bbfa786c66bc651b50_19_0.png)


    Sentiment analysis is an example of a *text classification* task: analyzing a
    text sample and classifying it as positive or negative. Machine learning has proven
    adept at *image classification* as well. A simple example of image classification
    is looking at photos of cats and dogs and classifying each one as a cat picture
    (0) or a dog picture (1). Real-world uses for image classification include flagging
    defective parts coming off an assembly line, identifying objects in view of a
    self-driving car, and recognizing faces in photos.


    Image classification models are trained with datasets like the one in Figure 1-4,
    in which each row represents an image and each column holds a pixel value. A dataset
    with 1,000,000 images that are 200 pixels wide and 200 pixels high contains 1,000,000
    rows and 40,000 columns. That’s 40 billion numbers in all, or 120,000,000,000
    if the images are color rather than grayscale. (In color images, pixel values
    comprise three numbers rather than one.) The label column contains a number representing
    the class or category to which the corresponding image belongs—in this case, the
    person whose face appears in the picture: 0 for Gerhard Schroeder, 1 for George
    W. Bush, and so on.


    ![](img/628b9a382d0944bbfa786c66bc651b50_20_0.png)


    These facial images come from a famous public dataset called [Labeled Faces in
    the Wild](https://en.wikipedia.org/wiki/Labeled_Faces_in_the_Wild), or LFW for
    short. It is one of countless labeled datasets that are published in various places
    for public consumption. Machine learning isn’t hard when you have labeled datasets
    to work with—datasets that others (often grad students) have laboriously spent
    hours labeling with 1s and 0s. In the real world, engineers sometimes spend the
    bulk of their time generating these datasets. One of the more popular repositories
    for public datasets is [Kaggle.com](https://www.kaggle.com/), which makes lots
    of useful datasets available and holds competitions allowing budding ML practitioners
    to test their skills.


    ### Machine Learning Versus Artificial Intelligence


    The terms *machine learning* and *artificial intelligence* (AI) are used almost
    interchangeably today, but in fact, each term has a specific meaning, as shown
    in [Figure 1-5](https://example.com/figure1-5).


    Technically speaking, machine learning is a subset of AI, which encompasses not
    only machine learning models but also other types of models such as *expert systems*
    (systems that make decisions based on rules that you define) and *reinforcement
    learning systems*, which learn behaviors by rewarding positive outcomes while
    penalizing negative ones. An example of a reinforcement learning system is [AlphaGo](https://deepmind.com/research/case-studies/alphago),
    which was the first computer program to beat a professional human Go player. It
    trains on games that have already been played and learns strategies for winning
    on its own.


    As a practical matter, what most people refer to as AI today is in fact deep learning,
    which is a subset of machine learning. *Deep learning* is machine learning performed
    with neural networks. (There are forms of deep learning that don’t involve neural
    networks—deep Boltzmann machines are one example—but the vast majority of deep
    learning today involves neural networks.) Thus, ML models can be divided into
    conventional models that use learning algorithms to model patterns in data, and
    deep-learning models that use neural networks to do the same.'
  mdcn: '# 第一部分 使用Scikit-Learn进行机器学习


    ## 第1章 机器学习


    机器学习通过让计算机解决几年前还难以处理的问题，拓展了可能性的边界。从欺诈检测、医疗诊断到产品推荐和能够“看见”前方事物的汽车，机器学习每天都在影响着我们的生活。当你阅读本文时，科学家们正利用机器学习来解开人类基因组的秘密。当我们有朝一日治愈癌症时，我们将感谢机器学习使之成为可能。


    机器学习之所以具有革命性，是因为它为算法问题解决提供了一种替代方案。给定一个配方或*算法*，编写一个对密码进行哈希处理或计算每月抵押贷款还款额的应用程序并不困难。你编写算法代码，输入数据，然后获得输出。而编写代码来确定一张照片中包含的是猫还是狗，则完全是另一回事。你可以尝试用算法来实现，但一旦你成功了，你就会遇到一张打破算法的猫或狗的图片。


    机器学习采用不同的方法将输入转化为输出。它不是依赖你来实现一个算法，而是检查一个包含输入和输出的数据集，并在一个称为*训练*的过程中学习如何自行生成输出。在底层，称为*学习算法*的特殊算法将数学模型拟合到数据上，并将输入数据与输出数据之间的关系编码化。一旦训练完成，模型就可以接受新的输入，并生成与训练数据中的输出一致的输出。


    要使用机器学习来区分猫和狗，你不需要编写一个猫狗分类算法。相反，你使用猫和狗的照片来训练一个机器学习模型。成功与否取决于所使用的学习算法以及训练数据的质量和数量。


    成为机器学习工程师的一部分工作是熟悉各种学习算法，并培养在何时使用一种算法而非另一种的直觉。这种直觉来自于经验，也来自于对机器学习如何将数学模型拟合到数据的理解。本章代表了这段旅程的第一步。它首先概述了机器学习和最常见的机器学习模型类型，最后介绍了两种流行的学习算法，并使用它们构建简单但功能齐全的模型。


    ### 什么是机器学习？


    从存在层面讲，机器学习（ML）是一种在数字中寻找模式并利用这些模式进行预测的方法。ML使得用由1和0组成的行或序列来训练模型成为可能，并从数据中*学习*，以便在给定一个新序列时，模型可以预测结果是什么。*学习*是ML寻找可用于预测未来输出的模式的过程，这也是“机器学习”中“学习”一词的由来。


    例如，考虑图1-1中描绘的由1和0组成的表格。第四列中的每个数字都以某种方式基于同一行中前三个数字。缺失的数字是什么？


    ![](img/628b9a382d0944bbfa786c66bc651b50_18_0.png)


    一种可能的解决方案是：对于给定的行，如果前三列包含的0多于1，则第四列为0。如果前三列包含的1多于0，则答案为1。根据这个逻辑，空框应包含1。数据科学家将包含答案的列（图中的红色列）称为*标签列*。其余列是*特征列*。预测模型的目标是在特征列的行中找到模式，从而使其能够预测标签是什么。


    如果所有数据集都这么简单，你就不需要机器学习了。但现实世界的数据集更大、更复杂。如果数据集包含数百万行和数千列，这在机器学习中很常见，那该怎么办？更进一步，如果数据集类似于图1-2中的那个呢？


    ![](img/628b9a382d0944bbfa786c66bc651b50_18_1.png)


    任何人类都很难检查这个数据集并提出一套规则来预测红色框中应该包含0还是1。（而且，这并不像数1和0那么简单。）想象一下，如果数据集真的*有*数百万行和数千列，那会困难多少倍。


    这就是机器学习的全部意义所在：在海量数字数据集中寻找模式。无论有100行还是1,000,000行，这并不重要。在许多情况下，数据越多越好，因为100行可能无法提供足够的样本来辨别模式。


    说机器学习通过数学建模数字集合中的模式来解决问题，并非过度简化。几乎任何问题都可以简化为一组数字。例如，当今ML的常见应用之一是*情感分析*：查看文本样本（如电影评论或网站上的评论），并为其分配0表示负面情感（例如，“食物平淡无奇，服务糟糕透顶。”）或1表示正面情感（“食物和服务都棒极了。迫不及待想再次光临！”）。有些评论可能是混合的——例如，“汉堡很棒，但薯条软塌塌的”——因此我们使用标签为1的*概率*作为情感得分。一个非常负面的评论可能得分为0.1，而一个非常正面的评论可能得分为0.9，即有90%的概率表达正面情感。


    情感分析器和其他处理文本的模型通常在类似图1-3的数据集上进行训练，该数据集为每个文本样本包含一行，为文本语料库（数据集中的所有单词）中的每个单词包含一列。像这样的典型数据集可能包含数百万行和20,000或更多列。每一行在标签列中包含一个0表示负面情感，或一个1表示正面情感。每一行内是单词计数——给定单词在单个样本中出现的次数。该数据集是稀疏的，意味着它大部分是0，偶尔夹杂着非零数字。但机器学习并不关心数字的构成。如果存在可以利用的模式来确定下一个样本表达的是正面还是负面情感，它就会找到它们。垃圾邮件过滤器使用类似的数据集，其中标签列中的1和0分别表示垃圾邮件和非垃圾邮件消息。这使得现代垃圾邮件过滤器能够达到惊人的准确度。此外，随着用越来越多的电子邮件进行训练，这些模型会变得越来越智能。


    ![](img/628b9a382d0944bbfa786c66bc651b50_19_0.png)


    情感分析是*文本分类*任务的一个例子：分析文本样本并将其分类为正面或负面。机器学习在*图像分类*方面也已证明非常擅长。图像分类的一个简单例子是查看猫和狗的照片，并将每张照片分类为猫图片（0）或狗图片（1）。图像分类的实际用途包括标记从装配线上下来的有缺陷的零件、识别自动驾驶汽车视野中的物体以及识别照片中的人脸。


    图像分类模型使用类似图1-4的数据集进行训练，其中每一行代表一张图像，每一列包含一个像素值。一个包含1,000,000张200像素宽、200像素高的图像的数据集包含1,000,000行和40,000列。总共是400亿个数字，如果是彩色图像而非灰度图像，则是1200亿个数字。（在彩色图像中，像素值由三个数字而非一个组成。）标签列包含一个数字，代表相应图像所属的类别或类别——在本例中，是照片中出现的人脸：0代表格哈德·施罗德，1代表乔治·W·布什，依此类推。


    ![](img/628b9a382d0944bbfa786c66bc651b50_20_0.png)


    这些面部图像来自一个著名的公共数据集，称为[野外标记人脸](https://en.wikipedia.org/wiki/Labeled_Faces_in_the_Wild)，简称LFW。它是无数标记数据集之一，这些数据集在各种地方发布供公众使用。当你有标记数据集可供使用时——这些数据集是其他人（通常是研究生）辛苦花费数小时用1和0标记出来的——机器学习并不难。在现实世界中，工程师有时会花费大部分时间来生成这些数据集。一个更受欢迎的公共数据集存储库是[Kaggle.com](https://www.kaggle.com/)，它提供了许多有用的数据集，并举办竞赛，让新兴的ML从业者测试他们的技能。


    ### 机器学习与人工智能


    如今，*机器学习*和*人工智能*（AI）这两个术语几乎可以互换使用，但实际上，每个术语都有特定的含义，如[图1-5](https://example.com/figure1-5)所示。


    从技术上讲，机器学习是AI的一个子集，AI不仅包括机器学习模型，还包括其他类型的模型，如*专家系统*（基于你定义的规则做出决策的系统）和*强化学习系统*，后者通过奖励积极结果同时惩罚消极结果来学习行为。强化学习系统的一个例子是[AlphaGo](https://deepmind.com/research/case-studies/alphago)，它是第一个击败职业人类围棋选手的计算机程序。它在已经进行过的游戏中进行训练，并自行学习获胜策略。


    实际上，大多数人今天所说的AI实际上是深度学习，它是机器学习的一个子集。*深度学习*是使用神经网络进行的机器学习。（存在不涉及神经网络的深度学习形式——深度玻尔兹曼机就是一个例子——但当今绝大多数深度学习都涉及神经网络。）因此，ML模型可以分为使用学习算法对数据中的模式进行建模的传统模型，以及使用神经网络执行相同操作的深度学习模型。'

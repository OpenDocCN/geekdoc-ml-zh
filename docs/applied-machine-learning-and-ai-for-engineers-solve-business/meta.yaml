    \ you’ve selected a tentative loss threshold, you can use it to detect anomalous\
    \ behavior in the bearings. Begin by defining a function that takes a sample and\
    \ returns True or False indicating whether the sample is anomalous by applying\
    \ and inverting a PCA transform, measuring the loss for each bearing, and comparing\
    \ it to a specified loss threshold:\n\n```python\ndef is_anomaly(row, pca, threshold):\n\
    \    pca_row = pca.transform(row)\n    restored_row = pca.inverse_transform(pca_row)\n\

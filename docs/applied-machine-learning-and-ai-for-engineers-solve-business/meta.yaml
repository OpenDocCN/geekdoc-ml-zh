    \ separate key for it. So that you can avoid managing multiple keys for multiple\
    \ services, most Azure Cognitive Services support *multiservice keys* that work\
    \ with a range of services. To get a multiservice key, simply create a Cognitive\
    \ Services resource rather than a service-specific resource and use the key and\
    \ endpoint that the portal provides.\n\nSubscription keys aren’t the only way\
    \ to authenticate calls to Azure Cognitive Services. Most Cognitive Services support\
    \ Azure Active Directory (AAD) authentication, which enhances security by combining\
    \ AAD identities with role-based access control (RBAC). AAD authentication is\
    \ particularly compelling for apps that rely on Cognitive Services APIs and are\

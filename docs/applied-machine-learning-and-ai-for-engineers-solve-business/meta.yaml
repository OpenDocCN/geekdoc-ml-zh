    Kernel tricks are special. Each one is designed to simulate a specific projection
    into higher dimensions. Scikit gives you a handful of kernels to work with, but
    there are others that Scikit doesn’t build in. You can extend Scikit with kernels
    of your own, but the ones that it provides are sufficient for the vast majority
    of use cases.


    ![](img/628b9a382d0944bbfa786c66bc651b50_109_0.png)


    # Hyperparameter Tuning


    At the outset, it’s difficult to know which of the built-in kernels will produce
    the most accurate model. It’s also difficult to know what the right value of C
    is—that is, the value that provides the best balance between underfitting and
    overfitting the training data and yields the best results when the model is run
    with test data. For the RBF and polynomial kernels, there’s a third value called
    gamma that affects accuracy. And for polynomial kernels, the degree parameter
    impacts the model’s ability to learn from the training data.

    The C parameter controls how aggressively the model fits to the training data.
    The higher the value, the tighter the fit and the higher the risk of overfitting.
    Figure 5-7 shows how the RBF kernel fits a model to a set of training data containing
    three classes with different values of C. The default is C=1 in Scikit, but you
    can specify a different value to adjust the fit. You can see the danger of overfitting
    in the lower-'

  md: 'This works up to a point, but the zeros in the table are a problem. Let’s say
    you want to determine whether “Scores must be reviewed by tomorrow” is spam. Removing
    stop words leaves you with “score review tomorrow.” You can compute the probability
    that the message is spam this way:


    $P(S|score\ review\ tomorrow) = P(S) \cdot P(score|S) \cdot P(review|S) \cdot
    P(tomorrow|S)$

    $P(S|score\ review\ tomorrow) = 0.5 \cdot 0.222 \cdot 0.0 \cdot 0.111 = 0$

    $P(S|score\ review\ tomorrow) = 0$


    The result is 0 because *review* doesn’t appear in a spam message, and 0 times
    anything is 0. The algorithm simply can’t assign a spam probability to “Scores
    must be reviewed by tomorrow.”


    A common way to resolve this is to apply *Laplace smoothing*, also known as *additive
    smoothing*. Typically, this involves adding 1 to each numerator and the number
    of unique words in the dataset (in this case, 10) to each denominator. Now, $P(review|S)$
    evaluates to (0 + 1) / (9 + 10), which equals 0.053. It’s not much, but it’s better
    than nothing (literally). Here are the word frequencies again, this time revised
    with Laplace smoothing:


    | Word | $P(word|S)$ | $P(word|N)$ |

    | :--- | :--- | :--- |

    | raise | (1 + 1) / (9 + 10) = 0.105 | (0 + 1) / (8 + 10) = 0.056 |

    | credit | (1 + 1) / (9 + 10) = 0.105 | (0 + 1) / (8 + 10) = 0.056 |

    | score | (2 + 1) / (9 + 10) = 0.158 | (1 + 1) / (8 + 10) = 0.111 |

    | minute | (1 + 1) / (9 + 10) = 0.105 | (1 + 1) / (8 + 10) = 0.111 |

    | yesterday | (1 + 1) / (9 + 10) = 0.105 | (2 + 1) / (8 + 10) = 0.167 |

    | meeting | (0 + 1) / (9 + 10) = 0.053 | (2 + 1) / (8 + 10) = 0.167 |

    | tomorrow | (1 + 1) / (9 + 10) = 0.105 | (1 + 1) / (8 + 10) = 0.111 |

    | review | (0 + 1) / (9 + 10) = 0.053 | (1 + 1) / (8 + 10) = 0.111 |

    | med | (1 + 1) / (9 + 10) = 0.105 | (0 + 1) / (8 + 10) = 0.056 |

    | price | (1 + 1) / (9 + 10) = 0.105 | (0 + 1) / (8 + 10) = 0.056 |


    Now you can determine whether “Scores must be reviewed by tomorrow” is spam by
    performing two simple calculations:


    $P(S|score\ review\ tomorrow) = 0.5 \cdot 0.158 \cdot 0.053 \cdot 0.105 = 0.000440$

    $P(N|score\ review\ tomorrow) = 0.5 \cdot 0.111 \cdot 0.111 \cdot 0.111 = 0.000684$


    By this measure, “Scores must be reviewed by tomorrow” is likely not to be spam.
    The probabilities are relative, but you could normalize them and conclude there’s
    about a 40% chance the message is spam and a 60% chance it’s not based on the
    emails the model was trained with.


    Fortunately, you don’t have to do these computations by hand. Scikit-Learn provides
    several classes to help out, including the *MultinomialNB class*, which works
    great with tables of word counts produced by CountVectorizer.


    # Spam Filtering'

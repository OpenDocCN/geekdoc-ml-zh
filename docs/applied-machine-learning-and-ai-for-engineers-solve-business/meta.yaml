    analyze text for sentiment. The idea is that if sentiment toward the company turns
    negative on social media, the communications team can get out in front of it.


    You already know how to build, train, and save a sentiment analysis model in Python
    using Scikit. Excel supports [user-defined functions (UDFs)](https://support.microsoft.com/en-us/office/overview-of-user-defined-functions-udfs-in-excel-2f061dc4-581c-4b39-a052-8d6097d2485c),
    which enable users to write custom functions that are called just like SUM(),
    AVG(), and other functions built into Excel. But UDFs are written in [Visual Basic
    for Applications (VBA)](https://docs.microsoft.com/en-us/office/vba/api/overview/language-reference),
    not Python. To marry Scikit with Excel, you need to write UDFs in Python.


    Fortunately, there are libraries that let you do just that. One of them is [Xlwings](https://www.xlwings.org/),
    an open source library that combines the power of Excel with the versatility of
    Python. With it, you can write Python code that loads or creates Excel spreadsheets
    and manipulates their content, write Python macros triggered by button clicks
    in Excel, access Excel spreadsheets from Jupyter notebooks, and more. You can
    also use Xlwings to write Python UDFs for Excel for Windows.'

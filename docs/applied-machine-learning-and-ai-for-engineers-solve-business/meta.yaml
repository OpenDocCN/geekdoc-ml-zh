    # Keys and Endpoints


    Azure Cognitive Services expose REST APIs that are called by transmitting HTTPS
    requests over the internet. The APIs are language agnostic: they can be called
    from any programming language that can put a call on the wire. That includes Python,
    Java, C#, C, C++, JavaScript, Swift, Go, and virtually all other modern programming
    languages. Calls can also be placed with tools such as [Postman](https://www.postman.com/)
    and the Linux `curl` command.


    Most Azure Cognitive Services are free up to a point, but they’re not altogether
    free. For example, you can submit 5,000 text samples per month to the Language
    service for sentiment analysis without incurring any costs. More than that, however,
    and Azure has to know whose Azure subscription to charge. Consequently, before
    calling an Azure Cognitive Service, you need:


    +   - An endpoint for the service—the URL that’s the target of calls

    - A subscription key for the service, or some other means of authenticating calls


    You can acquire both from the [Azure Portal](https://portal.azure.com/). As an
    example, suppose you wish to perform sentiment'
  - '[PAGE 334]


    analysis on a collection of tweets. You first open the Azure Portal in your browser
    and log in with your Microsoft account. You then create a Cognitive Services Language
    resource and specify to whom the Azure subscription costs should be charged, the
    Azure region in which the service should be located, and a pricing tier, as shown
    in Figure 14-3. A free tier is generally available if it doesn’t already exist
    for the same service under the same subscription.


    ![](img/628b9a382d0944bbfa786c66bc651b50_334_0.png)


    Once the Language resource is created, you open it in the Azure Portal and click
    Keys and Endpoint in the menu on the left side of the page. From there, you can
    retrieve a subscription key and endpoint for the service (Figure 14-4). The key
    is a string of letters and numbers that uniquely identifies an Azure subscription.
    Treat it with care because it can cost you money if it gets out. It’s considered
    a best practice to rotate the key (replace it with a new one) periodically in
    case it falls into the wrong hands. That’s why the portal includes Regenerate
    Key buttons. Why does the portal provide two keys? So you have a valid key to
    use after regenerating the other one. With only one key, you’d have to regenerate
    it and then race to modify any apps that use it, and there would be a dead period
    in which calls placed by those apps would fail.'

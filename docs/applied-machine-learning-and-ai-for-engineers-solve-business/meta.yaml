    ```\n\n注意，*x* 包含 500 张面部图像，*y* 包含对应的标签：0 代表科林·鲍威尔，1 代表唐纳德·拉姆斯菲尔德，依此类推。现在让我们看看\
    \ SVM 能否理解这些数据。我们将训练三个不同的模型：一个使用线性核，一个使用多项式核，一个使用 RBF 核。在每种情况下，我们都将使用 GridSearchCV\
    \ 来优化超参数。从线性模型和四个不同的 C 值开始：\n\n```python\nfrom sklearn.svm import SVC\nfrom sklearn.model_selection\
    \ import GridSearchCV\n```"

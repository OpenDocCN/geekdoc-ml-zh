    \ presents a Python function that accepts a path to an image file and returns\
    \ a list of facial images. By default, it crops facial images so that they’re\
    \ square (perfect for passing them to a CNN), but you can disable cropping by\
    \ passing the function a `crop=False` parameter. You can also specify a minimum\
    \ confidence level with a `min_confidence` parameter, which defaults to 0.9.\n\
    \n# Example 11-1. Function for extracting facial images from a photo\n\n```\n\
    import numpy as np\nfrom PIL import Image, ImageOps\nfrom mtcnn.mtcnn import MTCNN\n\
    \ndef extract_faces(input_file, min_confidence=0.9, crop=True):\n    # Load the\
    \ image and orient it correctly\n    pil_image = Image.open(input_file)\n    exif\
    \ = pil_image.getexif()\n\n    for k in exif.keys():\n        if k != 0x0112:\n\
    \            exif[k] = None\n            del exif[k]\n\n    pil_image.info[\"\
    exif\"] = exif.tobytes()\n    pil_image = ImageOps.exif_transpose(pil_image)\n\
    \    image = np.array(pil_image)\n\n    # Find the faces in the image\n    detector\
    \ = MTCNN()\n    faces = detector.detect_faces(image)\n    faces = [face for face\
    \ in faces if face['confidence'] >= min_confidence]\n    results = []\n\n    for\
    \ face in faces:\n        x1, y1, w, h = face['box']\n\n        if (crop):\n \
    \           # Compute crop coordinates\n            if w > h:\n              \
    \  x1 = x1 + ((w - h) // 2)\n                w = h\n            elif h > w:\n\
    \                y1 = y1 + ((h - w) // 2)\n                h = w\n\n        #\
    \ Extract the facial image and add it to the list\n        x2 = x1 + w\n     \
    \   y2 = y1 + h\n        results.append(Image.fromarray(image[y1:y2, x1:x2]))\n\
    \n    # Return all the facial images\n    return results\n```\n\nI passed the\

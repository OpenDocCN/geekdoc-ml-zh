- img_proc: true
  md: "be converted to equal. Scikit lacks support for stemming and lemmatization,\
    \ but you can get it from other libraries such as NLTK.\n\nCountVectorizer removes\
    \ punctuation symbols, but it doesn't remove numbers. It ignored the 7 in line\
    \ 1 because it ignores single characters. But if you changed 7 to 777, the term\
    \ 777 would appear in the vocabulary. One way to fix that is to define a function\
    \ that removes numbers and pass it to CountVectorizer via the preprocessor parameter:\n\
    \n```\nimport re\n\ndef preprocess_text(text):\n    return re.sub(r'\\d+', '',\
    \ text).lower()\n\nvectorizer = CountVectorizer(stop_words='english', preprocessor=preprocess_text)\n\
    word_matrix = vectorizer.fit_transform(lines)\n```\n\nNote the call to lower to\
    \ convert the text to lowercase. CountVectorizer doesn't convert text to lowercase\
    \ if you provide a preprocessing function, so the preprocessing function must\
    \ convert it itself. It still removes punctuation characters, however.\n\nAnother\
    \ useful parameter to CountVectorizer is min_df, which ignores words that appear\
    \ fewer than the specified number of times. It can be an integer specifying a\
    \ minimum count (for example, ignore words that appear fewer than five times in\
    \ the training text, or min_df=5), or it can be a floating-point value from 0.0\
    \ to 1.0 specifying the minimum percentage of samples in which a word must appear—for\
    \ example, ignore words that appear in less than 10% of the samples (min_df=0.1).\
    \ It's great for filtering out words that probably aren't meaningful anyway, and\
    \ it reduces memory consumption and training time by decreasing the size of the\
    \ vocabulary. CountVectorizer also supports a max_df parameter for eliminating\
    \ words that appear too frequently.\n\nThe preceding examples use CountVectorizer,\
    \ which probably leaves you wondering when (and why) you would use HashingVectorizer\
    \ or TfidfVectorizer instead. HashingVectorizer is useful when dealing with large\
    \ datasets. Rather than store words in memory, it hashes each word and uses the\
    \ hash as an index into an array of word counts. It can therefore do more with\
    \ less memory and is very useful for reducing the size of vectorizers when serializing\
    \ them so that you can restore them later—a topic I'll say more about in Chapter\
    \ 7. The downside to HashingVectorizer is that it doesn't let you work backward\
    \ from vectorized text to the original text. CountVectorizer does, and it provides\
    \ an inverse_transform method for that purpose.\n\nTfidfVectorizer is frequently\
    \ used to perform keyword extraction: examining a document or set of documents\
    \ and extracting keywords that characterize their content. It assigns words numerical\
    \ weights reflecting their importance, and it uses two factors to determine the\
    \ weights: how often a word appears in individual documents, and how often it\
    \ appears in the overall document set. Words that appear more frequently in individual\
    \ documents but occur in fewer documents receive higher weights. I won't go further\
    \ into it here, but if you're curious to learn more, this book's GitHub repo contains\
    \ a notebook that uses TfidfVectorizer to extract keywords from the manuscript\
    \ of Chapter 1."

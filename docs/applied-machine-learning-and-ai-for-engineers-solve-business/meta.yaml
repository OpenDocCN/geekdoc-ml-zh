  md: '# # Chapter 8. Deep Learning


    Every model in Part I of this book employed classic machine learning algorithms
    that form the core of ML itself: logistic regression, random forests, and so on.
    Such models are often referred to as *traditional* machine learning models to
    differentiate them from deep-learning models. Recall from Chapter 1 that deep
    learning is a subset of machine learning that relies primarily on neural networks,
    and that most of what’s considered AI today is accomplished with deep learning.
    From recognizing objects in photos to real-time speech translation to using computers
    to generate art, music, poetry, and photorealistic faces, deep learning allows
    computers to perform feats that traditional machine learning does not.


    I frequently introduce deep learning to software developers by challenging them
    to devise an algorithmic means for determining whether a photo contains a dog.
    If they offer a solution, I’ll counter with a dog picture that foils the algorithm.
    Traditional ML models can partially solve the problem, but when it comes to recognizing
    objects in images, deep learning represents the state of the art. It’s not terribly
    difficult to train a neural network to recognize dog pictures, sometimes more
    accurately than humans. Once you learn how to do that, it’s a small step forward
    to recognizing defective parts coming off an assembly line or bicycles passing
    in front of a self-driving car.


    Neural networks have been around for decades, but it’s only in the past 10 years
    or so that sufficient compute power has been available to train sophisticated
    networks. Cutting-edge neural networks are trained on graphics processing units
    (GPUs) and tensor processing units (TPUs), often attached to high-performance
    computing clusters. GPUs are great for gaming because they deliver high-performance
    graphics. They are also efficient parallel processing machines that allow data
    scientists to train neural networks in a fraction of the time required on ordinary
    CPUs. Today, any researcher with a credit card can purchase an NVIDIA GPU or spin
    up GPUs in Azure or AWS and have access to compute power that researchers 20 years
    ago could only have dreamed of. This, more than anything else, has driven AI’s
    resurgence and precipitated continual advances in the state of the art.


    This chapter is the first of several focused on deep learning. In it, you’ll learn:


    +   - What a neural network is and where the “deep” in deep learning comes from

    - How a neural network transforms input into output using simple mathematical
    operations

    - What happens when a neural network is trained, as well as the challenges that
    training entails


    You won’t start building and training neural networks just yet; that begins in
    Chapter 9. Before you build a house, you need a foundation to build upon. That
    foundation begins right now.


    # ## Understanding Neural Networks


    Neural networks come in many varieties. Convolutional neural networks (CNNs),
    for example, excel at computer-vision tasks such as classifying images. Recurrent
    neural networks (RNNs) find application in handwriting recognition and natural
    language processing (NLP), while generative adversarial networks,'
  merge: -1
  pgno: 168
- img_proc: true
  md: 'or GANs, enable computers to create art, music, and other content. But the
    first step in wrapping your head around deep learning is to understand what a
    neural network is and how it works.


    The simplest type of neural network is the *multilayer perceptron*. It consists
    of nodes or *neurons* arranged in layers. The depth of the network is the number
    of layers; the width is the number of neurons in each layer, which can be different
    for every layer. State-of-the-art neural networks sometimes contain 100 or more
    layers and thousands of neurons in individual layers. A *deep neural network*
    is one that contains many layers, and it’s where the term *deep learning* is derived
    from.


    The multilayer perceptron in Figure 8-1 contains three layers: an input layer
    with two neurons, a middle layer (also known as a *hidden layer*) with three neurons,
    and an output layer with one neuron. Because the input layer is often ignored
    when counting layers, some would argue that this network contains *two* layers,
    not three. Regardless, the network’s job is to take two floating-point values
    as input and produce a single floating-point number as output. Neural networks
    work with floating-point numbers. They *only* work with floating-point numbers.
    As with traditional machine learning models, a neural network can only process
    non-numeric data—for example, text strings—if the data is first converted to numbers.


    ![](img/628b9a382d0944bbfa786c66bc651b50_169_0.png)


    *Figure 8-1. Multilayer perceptron*


    The orange arrows in Figure 8-1 represent connections between neurons. Each neuron
    in each layer is connected to each neuron in the next layer, giving rise to the
    term *fully connected layers*. Each connection is assigned a *weight*, which is
    typically a small floating-point number. In addition, each neuron outside the
    input layer is assigned a *bias*, which is also a small floating-point number.
    Figure 8-2 shows a set of weights and biases that enable the network to sum two
    inputs (for example, to add 2 and 2). The blocks labeled “ReLU” represent *activation
    functions*, which apply simple nonlinear transforms to values propagated through
    the network. The most commonly used activation function is the *rectified linear
    units (ReLU) function*, which passes positive numbers through unchanged while
    converting negative numbers to 0s. Without activation functions, neural networks
    would struggle to model nonlinear data. And it’s no secret that real-world data
    tends to be nonlinear.'

    # Recommender Systems


    Another branch of machine learning that has proven its mettle in recent years
    is *recommender systems*—systems that recommend products or services to customers.
    Amazon’s recommender system reportedly [drives 35% of its sales](https://www.mckinsey.com/industries/retail/our-insights/how-retailers-can-keep-up-with-consumers).
    The good news is that you don’t have to be Amazon to benefit from a recommender
    system, nor do you have to have Amazon’s resources to build one. They’re relatively
    simple to create once you learn a few basic principles.


    Recommender systems come in many forms. *Popularity-based systems* present options
    to customers based on what products and services are popular at the time—for example,
    “Here are this week’s bestsellers.” *Collaborative systems* make recommendations
    based on what others have selected, as in “People who bought this book also bought
    these books.” Neither of these systems requires machine learning.


    *Content-based systems*, by contrast, benefit greatly from machine learning. An
    example of a content-based system is one that says “if you bought this book, you
    might like these books also.” These systems require a means for quantifying similarity
    between items. If you liked the movie *Die Hard*, you might or might not like
    *Monty Python and the Holy Grail*. If you liked *Toy Story*, you’ll probably like
    *A Bug’s Life* too. But how do you make that determination algorithmically?


    Content-based recommenders require two ingredients: a way to *vectorize*—convert
    to numbers—the attributes that characterize a service or product, and a means
    for calculating similarity between the'

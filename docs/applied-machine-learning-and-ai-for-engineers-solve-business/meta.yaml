    \n`CascadeClassifier` 通常需要以这种方式进行调校，以在找到过多人脸和过少人脸之间取得平衡。考虑到这一点，它是目前最快的人脸检测算法之一。通过加载包含其他预训练分类器的XML文件，它也可用于检测人脸以外的物体。在\

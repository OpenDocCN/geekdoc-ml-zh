- md: "experience.\n\n## Example 2-1. Gradient-boosted decision tree implementation\n\
    \n```python\nlearning_rate = 0.1 # Learning rate\nn_trees = 100 # Number of decision\
    \ trees\ntrees = [] # Trees that comprise the model\n\n# Compute the mean of all\
    \ the target values\ny_pred = np.array([y.mean()] * len(y))\nbaseline = y_pred\n\
    \n# Create n_trees and train each with the error\n# in the output from the previous\
    \ tree\nfor i in range(n_trees):\n    error = y - y_pred\n    tree = DecisionTreeRegressor(max_depth=1,\
    \ random_state=0)\n    tree.fit(x, error)\n    predictions = tree.predict(x)\n\
    \    y_pred = y_pred + (learning_rate * predictions)\n    trees.append(tree)\n\
    \n# Predict a y for x=10\ny_pred = np.array([baseline[0]] * len(x))\n\nfor tree\
    \ in trees:\n    y_pred = y_pred + (learning_rate * tree.predict([[10.0]]))\n\n\
    y_pred[0]\n```\n\nThe diagram on the left in Figure 2-9 shows the output from\
    \ a single decision tree stump applied to the income-versus-experience dataset.\
    \ That model is such a weak learner that it can predict only two different income\
    \ levels. The diagram on the right shows the output from the model in Example\
    \ 2-1. The additive effect of the weak learners produces a strong learner that\
    \ predicts a programmer with 10 years of experience should earn $99,082 per year,\
    \ which is consistent with the predictions made by other models.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_50_0.png)\n\
    \nGBDTs can be used for regression and classification, and they are nonparametric.\
    \ Aside from neural networks and support vector machines, GBDTs are frequently\
    \ the ones that data scientists find most capable of modeling complex datasets.\n\
    \nUnlike linear regression models and random forests, GBDTs are susceptible to\
    \ overfitting. One way to mitigate overfitting when using GradientBoostingRegressor\
    \ and GradientBoostingClassifier is to use the `subsample` parameter to prevent\
    \ individual trees from seeing the entire dataset, analogous to what `max_samples`\
    \ does for random forests. Another way is to use the `learning_rate` parameter\
    \ to lower the learning rate, which defaults to 0.1.\n\n## Support Vector Machines\n\
    \nI will save a full treatment of support vector machines (SVMs) for [Chapter\
    \ 5](#), but along with GBMs, they represent the cutting edge of statistical machine\
    \ learning. They can often fit models to highly nonlinear datasets that other\
    \ learning algorithms cannot. They’re so important that they merit separate treatment\
    \ from all other algorithms. They work by employing a mathematical device called\
    \ *kernel tricks* to simulate the effect of adding dimensions to data. The idea\
    \ is that data that isn’t separable in *m* dimensions might be separable in *n*\
    \ dimensions. Here’s a quick example.\n\nThe classes in the two-dimensional dataset\
    \ on the left in [Figure 2-10](#) can’t be separated with a line. But if you add\
    \ a third dimension so that points closer to the center have higher *z* values\
    \ and points farther from the center have lower *z* values, as shown on the right,\
    \ you can slide a plane between the red points and the purple points and achieve\
    \ 100% separation of the classes. That is the principle by which SVMs work. It\
    \ is mathematically complex when generalized to work with arbitrary datasets,\
    \ but it is an extremely powerful technique that is vastly simplified by Scikit.\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_51_0.png)\n\nSVMs are primarily used\
    \ for classification, but they can be used for regression as well. Scikit includes\
    \ classes for doing both, including `SVC` for classification problems and `SVR`\
    \ for regression problems. You will learn all about these classes in [Chapter\
    \ 5](#). For now, drop the term *support vector machine* at the next machine learning\
    \ gathering you attend and you will instantly become the life of the party.\n\n\
    ## Accuracy Measures for Regression Models\n\nAs you learned in [Chapter 1](#),\
    \ you need one set of data for training a model and another set for testing it,\
    \ and you can score a model for accuracy by passing test data to the model’s `score`\
    \ method. Testing quantifies how accurate the model is at making predictions.\
    \ It is incredibly important to test a model with a dataset other than the one\
    \ it was trained with because it will probably learn the training data reasonably\
    \ well, but that doesn’t mean it will generalize well—that is, make accurate predictions.\
    \ And if you don’t test a model, you don’t know how accurate it is.\n\nEngineers\
    \ frequently use Scikit’s `train_test_split` function to split a dataset into\
    \ a training dataset and a test dataset. But when you split a small dataset this\
    \ way, you can’t necessarily trust the score returned by the model’s `score` method.\
    \ And what does the score mean, anyway? The answer is different for regression\
    \ models and classification models, and while there are a handful of ways to score\
    \ regression models, there are many ways to score classification models. Let’s\
    \ take a moment to understand the number that `score` returns for a regression\

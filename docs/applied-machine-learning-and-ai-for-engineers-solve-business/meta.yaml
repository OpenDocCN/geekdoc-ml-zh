  - '[PAGE 338]


    +   - Because Azure Cognitive Services run in the cloud, an app that uses them
    requires an internet connection.

    - Calls that travel over the internet incur higher latencies than calls performed
    locally.

    - Azure Cognitive Services APIs evolve over time and sometimes introduce breaking
    changes, which means code that worked just fine yesterday could behave differently
    or be inoperative tomorrow.

    - The deep-learning models on the backend are continually refined and improved,
    with the result that the sentiment score for “programming is fun, but the hours
    are long” could be 0.94 today and 0.85 tomorrow.


    Changes to the APIs are rarely abrupt. Microsoft usually warns its customers months
    in advance before making breaking changes to an API, and in many cases, you can
    specify the version of the service or API you wish to use and insulate yourself
    from future changes. These issues might not be a big deal to small firms, but
    for enterprises, which value stability and reliability above all else, they can
    be deal breakers.


    Microsoft has addressed these issues by making most Azure Cognitive Services available
    in Docker containers. A containerized service can run on premises or in the cloud,
    and it locks in API versions and the models that back them. No changes occur unless
    you update a container image or replace it with a newer version. You can learn
    more and view the latest list of services that are available in containerized
    form in “What Are Azure Cognitive Services Containers?”. Containerized services
    are also a solution to security and privacy policies that require data to stay
    on premises. Microsoft doesn’t store data passed to Cognitive Services, but the
    data does leave your company’s domain.


    Containerized services are *not* a way to do an end run around the billing department
    and use Azure Cognitive Services for free. From the documentation:


    > The Cognitive Services containers are required to submit metering information
    for billing purposes. Failure to allow-list various network channels that the
    Cognitive Services containers rely on will prevent the container from working.


    Containers send encrypted usage information back to Microsoft through port 443,
    and Microsoft uses that information to bill an Azure subscription. Consequently,
    containers have to be connected to the internet even if they’re hosted on premises.


    There is one exception. If you want to use Azure Cognitive Services in apps that
    can’t be connected to the internet for technical or compliance reasons, *disconnected
    containers* can run absent an internet connection, and they don’t transmit metering
    information to Microsoft. Not just anyone can use them, however. You have to submit
    an application to Microsoft for approval, and one of the requirements is that
    your organization have an Enterprise Agreement (EA) in place with Microsoft. See
    “Use Docker Containers in Disconnected Environments” for more information and
    for an up-to-date list of Azure Cognitive Services that are available for use
    in disconnected scenarios.



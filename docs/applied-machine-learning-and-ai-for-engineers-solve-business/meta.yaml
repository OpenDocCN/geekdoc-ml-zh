    Detection via Graph Attention Network” that proposed a novel architecture for
    multivariate anomaly detection. It combines two deep-learning models: one that
    relies on prediction error and another that relies on reconstruction error. Microsoft
    uses this architecture in its Azure Multivariate Anomaly Detector service, which
    can model dependencies between up to 300 independent data sources and is used

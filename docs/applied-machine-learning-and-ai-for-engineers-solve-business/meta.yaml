  pgno: 125
- img_proc: true
  md: '![](img/628b9a382d0944bbfa786c66bc651b50_126_0.png)


    Figure 6-2 adds arrows representing the dataset’s two principal components. Essentially,
    the coordinate system has been transformed so that one axis (the longer of the
    two arrows) captures most of the variance in the dataset. This is the dataset’s
    *primary principal component*. The other axis contains a narrower range of values
    and represents the secondary principal component. The number of principal components
    equals the number of dimensions in a dataset, so in this example, there are two
    principal components.


    ![](img/628b9a382d0944bbfa786c66bc651b50_126_1.png)


    To reduce a two-dimensional dataset to one dimension, PCA finds the two principal
    components and eliminates the one with less variance. This effectively projects
    the data points onto the primary principal component axis, as shown in Figure
    6-3. The red data points don’t retain all of the information in the'

  md: 'It’s no coincidence that modern spam filters are remarkably adept at identifying
    spam. Virtually all of them rely on machine learning. Such models are difficult
    to implement algorithmically because an algorithm that uses keywords such as *credit*
    and *score* to determine whether an email is spam is easily fooled. Machine learning,
    by contrast, looks at a body of emails and uses what it learns to classify the
    next email. Such models often achieve more than 99% accuracy. And they get smarter
    over time as they’re trained with more and more emails.


    The previous example used logistic regression to predict whether text input to
    it expresses positive or negative sentiment. It used the probability that the
    text expresses positive sentiment as a sentiment score, and you saw that expressions
    such as “The long lines and poor customer service really turned me off” score
    close to 0.0, while expressions such as “The food was great and the service was
    excellent” score close to 1.0. Now let’s build a binary classification model that
    classifies emails as spam or not spam and use Naive Bayes to fit the model to
    the training data.


    There are several spam classification datasets available in the public domain.
    Each contains a collection of emails with samples labeled with 1s for spam and
    0s for not spam. We’ll use a relatively small dataset containing 1,000 samples.
    Begin by [downloading the dataset](https://example.com) and copying it into your
    notebooks’ *Data* subdirectory. Then load the data and display the first five
    rows:


    ```

    python

    import pandas as pd


    df = pd.read_csv(''Data/ham-spam.csv'')

    df.head()

    ```


    Now check for duplicate rows in the dataset:


    ```

    python

    df.groupby(''IsSpam'').describe()

    ```


    The dataset contains one duplicate row. Let’s remove it and check for balance:


    ```

    python

    df = df.drop_duplicates()

    df.groupby(''IsSpam'').describe()

    ```


    The dataset now contains 499 samples that are not spam, and 500 that are. The
    next step is to use `CountVectorizer` to vectorize the emails. Once more, we’ll
    allow `CountVectorizer` to consider word pairs as well as individual words and
    remove stop words using Scikit’s built-in dictionary of English stop words:


    ```

    python

    from sklearn.feature_extraction.text import CountVectorizer


    vectorizer = CountVectorizer(ngram_range=(1, 2), stop_words=''english'')

    x = vectorizer.fit_transform(df[''Text''])

    y = df[''IsSpam'']

    ```


    Split the dataset so that 80% can be used for training and 20% for testing:


    ```

    python

    from sklearn.model_selection import train_test_split

    ```'

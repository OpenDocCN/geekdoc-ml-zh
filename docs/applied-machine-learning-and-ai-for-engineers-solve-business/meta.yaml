    \ = (12, 6))\n```\n\nHere is the output:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_143_0.png)\n\
    \nAbout four days into the test, vibrations in bearing 1 began increasing. They\
    \ spiked a day later, and about two days after that, bearing 1 suffered a catastrophic\
    \ failure. Our goal is to build a model that recognizes increased vibration in\
    \ any bearing as a sign of impending failure, and to do it *without* a labeled\

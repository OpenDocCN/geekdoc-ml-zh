  md: '# # Chapter 3. Classification Models


    The machine learning model featured in the previous chapter used various forms
    of regression to predict taxi fares based on distance to travel, the day of the
    week, and the time of day. Regression models predict numerical outcomes and are
    widely used in industry to forecast sales, prices, demand, and other numbers that
    drive business decisions. Equally important are classification models, which predict
    categorical outcomes such as whether a credit card transaction is fraudulent or
    which letter of the alphabet a handwritten character represents.


    Most classification models fall into two categories: *binary classification models*,
    in which there are just two possible outcomes, and *multiclass classification
    models*, in which there are more than two possible outcomes. In both instances,
    the model assigns a single class, or *class label*, to an input. Less common are
    *multilabel classification models*, which can classify a single input as belonging
    to several classes—for example, predicting that a document is both a paper on
    machine learning and a paper on genomics. Some can predict that an input belongs
    to none of the possible classes too.


    Much of what you know about regression models also applies to classification models.
    For example, many of the learning algorithms that power regression models work
    equally well with classification models. One substantive difference between regression
    and classification is how you measure a model’s accuracy. There’s no such thing
    as an $R^2$ score for a classification model. In its place are an abundance of
    measures, such as precision, recall, specificity, sensitivity, and F1 score, to
    name but a few. One of the keys to becoming proficient with classification models
    is getting comfortable with the various accuracy metrics and, more importantly,
    understanding which one (or ones) to use based on the model’s intended application.


    You’ve seen one example of multiclass classification in the iris tutorial in [Chapter
    1](#). It’s time to delve deeper into machine learning classifiers, starting with
    one of the most tried-and-true learning algorithms of all, one that works *only*
    for classification models: logistic regression.


    # ## Logistic Regression


    Many learning algorithms exist for classification problems. In [Chapter 2](#),
    you learned how decision trees, random forests, and gradient-boosting machines
    (GBMs) fit regression models to training data. These algorithms can be used for
    classification as well, and Scikit helps out by offering classes such as `DecisionTreeClassifier`,
    `RandomForestClassifier`, and `GradientBoostingClassifier`. In [Chapter 1](#),
    you used Scikit’s `KNeighborsClassifier` class to build a three-class classification
    model with *k*-nearest neighbors as the learning algorithm.


    These are important learning algorithms, and they see use in many contemporary
    machine learning models. But one of the most popular classification algorithms
    is *logistic regression*, which analyzes a distribution of data and fits an equation
    to it that defines the probability that a given sample belongs to each of two
    possible classes. It might determine, for example, that there’s a 10% chance the
    values in a sample correspond to class 0 and a 90% chance they correspond to class
    1. In this case, logistic'
  merge: -1
  pgno: 61
- img_proc: true
  md: 'regression will predict that the sample corresponds to class 1. Despite the
    name, logistic regression is a *classification* algorithm, not a regression algorithm.
    Its purpose is not to create regression models but to quantify probabilities for
    the purpose of classifying input samples.


    As an example, consider the data points in Figure 3-1, which belong to two classes:
    0 (blue) and 1 (red). Let’s assume that the x-axis specifies the number of hours
    a person studied for an exam and the y-axis indicates whether they passed (1)
    or failed (0). The blues fall in the range $x = 0$ to $x = 10$, while the reds
    fall in the range $x = 5$ to $x = 15$. You can’t pick a value for $x$ that separates
    the classes since both have values between $x = 5$ and $x = 10$. (Try drawing
    a vertical line that has only reds on one side and only blues on the other.) But
    you *can* draw a curve that, given an $x$, shows the probability that a point
    with that $x$ belongs to class 1. As $x$ increases, so too does the likelihood
    that the point represents class 1 (pass) rather than class 0 (fail). From the
    curve, you can see that if $x = 2$, there is less than a 5% chance that the point
    corresponds to class 1. But if $x = 10$, there is about a 76% chance that it’s
    class 1. If asked to classify that point as a red or a blue, you would conclude
    that it’s a red because it’s much more likely to be red than blue.


    ![](img/628b9a382d0944bbfa786c66bc651b50_62_0.png)


    The curve in Figure 3-1 is a *sigmoid curve*. It charts a function known as the
    *logistic function* (also known as the *logit function*) that has been used in
    statistics for decades. For logistic regression, the function is defined this
    way, where $x$ is the input value and $m$ and $b$ are parameters learned during
    training:


    ```

    $$y = \frac{1}{1+e^{-(mx+b)}}$$

    ```


    This equation reveals why logistic regression is called logistic *regression*,
    despite the fact that it’s a classification algorithm. The exponent of $e$ happens
    to be the equation for linear regression.


    The logistic regression learning algorithm fits the logistic function to a distribution
    of data and uses the resulting $y$ values as probabilities to classify data points.
    It works with any number of features (not just'
  merge: -1
  pgno: 62

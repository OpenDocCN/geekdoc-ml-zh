    # Summary


    Object detection represents the tip of the spear in the world of computer vision.
    It’s how self-driving cars “see” objects in front of them, and it’s the technology
    underlying numerous real-world applications. State-of-the-art object detection
    is accomplished with deep learning using specially crafted CNNs that do more than
    mere image classification. You can use pretrained models such as YOLO and Mask
    R-CNN to detect objects in images and video frames. With Mask R-CNN, you can even
    generate segmentation masks revealing additional information about those objects.


    Custom object detection requires you to train models like these with images of
    your own carefully labeled to denote objects and bounding boxes. Azure’s Custom
    Vision service simplifies the process of training custom object detection models,
    and allows the models you train to be hosted in the cloud and called using REST
    APIs or downloaded and consumed locally. It’s one of several services that comprise
    Azure Cognitive Services, and it’s the right tool for the job when the job calls
    for detecting objects that pretrained models weren’t trained to detect.'
  - '[PAGE 294]


    # # Chapter 13. Natural Language Processing


    It’s not difficult to use Scikit-Learn to build machine learning models that analyze
    text for sentiment, identify spam, and classify text in other ways. But today,
    state-of-the-art text classification is most often performed with neural networks.
    You already know how to build neural networks that accept numbers and images as
    input. Let’s build on that to learn how to construct deep-learning models that
    process text—a segment of deep learning known as *natural language processing*,
    or NLP for short.


    NLP encompasses a variety of activities including text classification, named-entity
    recognition, keyword extraction, question answering, and language translation.
    The accuracy of NLP models has improved in recent years for a variety of reasons,
    not the least of which are newer and better ways of converting words and sentences
    into dense vector representations that incorporate meaning, and a relatively new
    neural network architecture called the *transformer* that can zero in on the most
    meaningful words and even differentiate between different meanings of the same
    word.


    One element that virtually all neural networks that process text have in common
    is an *embedding layer*, which uses *word embeddings* to transform arrays, or
    *sequences*, of scalar values representing words into arrays of floating-point
    numbers called *word vectors*. These vectors encode information about the meanings
    of words and the relationships between them. Output from an embedding layer can
    be input to a classification layer, or it can be input to other types of neural
    network layers to tease more meaning from it before subjecting it to further processing.


    Transformers? Embedding layers? Word vectors? There’s a lot to unpack here, but
    once you wrap your head around a few basic concepts, neural networks that process
    language are pure magic. Let’s dive in. We’ll start by learning how to prepare
    text for processing by a deep-learning model and how to create word embeddings.
    Then we’ll put that knowledge to work building neural networks that classify text,
    translate text from one language to another, and more—all classic applications
    of NLP.


    # ## Text Preparation


    Chapter 4 introduced Scikit-Learn’s `CountVectorizer` class, which converts rows
    of text into rows of word counts that a machine learning model can consume. `CountVectorizer`
    also converts characters to lowercase, removes numbers and punctuation symbols,
    and optionally removes stop words—common words such as *and* and *the* that are
    likely to have little influence on the outcome.


    Text must be cleaned and vectorized before it’s used to train a neural network
    too, but vectorization is typically performed differently. Rather than create
    a table of word counts, you create a table of sequences containing *tokens* representing
    individual words. Tokens are often indices into a dictionary, or *vocabulary*,
    built from the corpus of words in the dataset. To help, Keras provides the `Tokenizer`
    class, which you can think of as the deep-learning equivalent of `CountVectorizer`.
    Here’s an example that uses `Tokenizer` to create sequences from four lines of
    text:


    ```

    python

    from tensorflow.keras.preprocessing.text import Tokenizer

    ```'
- md: '## Word Embeddings


    Once text is tokenized and converted into padded sequences, it is ready for training
    a neural network. But you probably won’t get very far training on the raw padded
    sequences.


    One of the crucial elements of a neural network that processes text is an `embedding
    layer` whose job is to convert padded sequences of word tokens into arrays of
    `word vectors`, which represent each word with an array (vector) of floating-point
    numbers rather than a single integer. Each word in the input text is represented
    by a vector in the embedding layer, and as the network is trained, vectors representing
    individual words are adjusted to reflect their relationship to one another. If
    you’re building a sentiment analysis model and words such as *excellent* and *amazing*
    have similar connotations, then the vectors representing those words in the embedding
    space should be relatively close together so that phrases such as “excellent service”
    and “amazing service” score similarly.


    Implementing an embedding layer by hand is a complex undertaking (especially the
    training aspect), so Keras offers the `Embedding` class. With Keras, creating
    a trainable embedding layer requires just one line of code:


    ```python

    Embedding(input_dim=10000, output_dim=32, input_length=100)

    ```


    In order, the three parameters passed to the `Embedding` function are:


    - The vocabulary size, or the number of words in the vocabulary built by `Tokenizer`

    - The number of dimensions *m* in the embedding space

    - The length *n* of each padded sequence


    You pick the number of dimensions *m*, and each word gets encoded in the embedding
    space as an *m*-dimensional vector. More dimensions provide more fitting power,
    but also increase training time. In practice, *m* is usually a number from 32
    to 512.


    The vectors that represent individual words in an embedding layer are learned
    during training, just as the weights connecting neurons in adjacent dense layers
    are learned. If the number of training samples is sufficiently high, training
    the network usually creates effective vector representations of all the words.
    However, if you have only a few hundred training samples, the embedding layer
    might not have enough information to properly vectorize the corpus of text.


    In that case, you can elect to initialize the embedding layer with *pretrained
    word embeddings* rather than rely on it to learn the word embeddings on its own.
    Several popular pretrained word embeddings exist in the public domain, including
    the [GloVe word vectors](https://nlp.stanford.edu/projects/glove/) developed by
    Stanford and Google’s own [Word2Vec](https://code.google.com/archive/p/word2vec/).
    Pretrained embeddings tend to model semantic relationships between words, recognizing,
    for example, that *king* and *queen* are related terms while *stairs* and *zebra*
    are not. While that can be beneficial, a network trained to classify text usually
    performs better when word embeddings are learned from the training data because
    such embeddings are task specific. For an example showing how to use pretrained
    embeddings, see “Using Pre-trained Word Embeddings” by the author of Keras.


    ## Text Classification


    Figure 13-1 shows the baseline architecture for a neural network that classifies
    text. Tokenized text sequences are input to the embedding layer. The output from
    the embedding layer is a 2D matrix of floating-point values measuring *m* by *n*,
    where *m* is the number of dimensions in the embedding space and *n* is the sequence
    length. The Flatten layer following the embedding layer “flattens” the 2D output
    into a 1D array suitable for input to a dense layer, and the dense layer classifies
    the values emitted from the flatten layer. You can experiment with different dimensions
    in the embedding layer and different widths of the dense layer to maximize accuracy.
    You can also add more dense layers if needed.


    ![](img/628b9a382d0944bbfa786c66bc651b50_298_0.png)


    A neural network like the one in Figure 13-1 can be implemented this way:


    ```python

    from tensorflow.keras.models import Sequential

    from tensorflow.keras.layers import Dense, Flatten, Embedding


    model = Sequential()

    model.add(Embedding(10000, 32, input_length=100))

    ```'
  mdcn: '## 词嵌入


    文本经过分词并转换为填充序列后，就为训练神经网络做好了准备。但仅在原始填充序列上训练，可能效果有限。


    处理文本的神经网络的一个关键要素是`嵌入层`，其作用是将填充的词元序列转换为`词向量`数组。词向量用浮点数数组（向量）而非单个整数来表示每个词。输入文本中的每个词在嵌入层中都由一个向量表示。随着网络的训练，代表各个词的向量会被调整，以反映它们之间的关系。如果你正在构建一个情感分析模型，而*优秀*和*惊人*这类词具有相似的含义，那么在嵌入空间中代表这些词的向量应该相对接近，这样“优质服务”和“惊人服务”这样的短语得分就会相似。


    手动实现嵌入层是一项复杂的任务（尤其是训练部分），因此Keras提供了`Embedding`类。使用Keras，创建一个可训练的嵌入层只需一行代码：


    ```python

    Embedding(input_dim=10000, output_dim=32, input_length=100)

    ```


    传递给`Embedding`函数的三个参数依次是：


    - 词汇表大小，即`Tokenizer`构建的词汇表中的词数

    - 嵌入空间的维度*m*

    - 每个填充序列的长度*n*


    你选择维度数*m*，每个词在嵌入空间中被编码为一个*m*维向量。更多的维度提供更强的拟合能力，但也增加了训练时间。实践中，*m*通常是32到512之间的数字。


    嵌入层中代表各个词的向量是在训练过程中学习到的，就像连接相邻密集层神经元的权重一样。如果训练样本数量足够多，训练网络通常能为所有词创建有效的向量表示。然而，如果你只有几百个训练样本，嵌入层可能没有足够的信息来正确地将文本语料库向量化。


    在这种情况下，你可以选择用*预训练词嵌入*来初始化嵌入层，而不是依赖它自己学习词嵌入。公共领域存在几种流行的预训练词嵌入，包括斯坦福大学开发的[GloVe词向量](https://nlp.stanford.edu/projects/glove/)和谷歌自己的[Word2Vec](https://code.google.com/archive/p/word2vec/)。预训练嵌入倾向于建模词之间的语义关系，例如，认识到*国王*和*女王*是相关术语，而*楼梯*和*斑马*则不是。虽然这可能有益，但当词嵌入是从训练数据中学习时，用于文本分类的网络通常表现更好，因为这样的嵌入是针对特定任务的。有关如何使用预训练嵌入的示例，请参阅Keras作者的“使用预训练词嵌入”。


    ## 文本分类


    图13-1展示了一个用于文本分类的神经网络的基线架构。分词后的文本序列被输入到嵌入层。嵌入层的输出是一个*m*乘*n*的浮点值二维矩阵，其中*m*是嵌入空间的维度，*n*是序列长度。嵌入层之后的展平层将二维输出“展平”为适合输入到密集层的一维数组，密集层对展平层输出的值进行分类。你可以尝试嵌入层的不同维度和密集层的不同宽度以最大化准确率。如果需要，也可以添加更多的密集层。


    ![](img/628b9a382d0944bbfa786c66bc651b50_298_0.png)


    像图13-1这样的神经网络可以这样实现：


    ```python

    from tensorflow.keras.models import Sequential

    from tensorflow.keras.layers import Dense, Flatten, Embedding


    model = Sequential()

    model.add(Embedding(10000, 32, input_length=100))

    ```'

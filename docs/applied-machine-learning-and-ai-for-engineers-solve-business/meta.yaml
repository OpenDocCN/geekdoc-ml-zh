    \n## 迁移学习\n\n之前，你使用了一个包含北极狐、北极熊和海象照片的数据集来训练一个CNN以识别北极野生动物。使用300张图像（每个类别100张）进行训练后，该CNN达到了约60%的准确率。这对于大多数目的来说是不够的。\n\

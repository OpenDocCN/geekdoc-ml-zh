    # Chapter 7. Operationalizing Machine Learning Models


    All of the machine learning models presented so far in this book are written in
    Python. Models don’t have to be written in Python, but many are, thanks in part
    to the numerous world-class Python libraries available, including [Pandas](https://pandas.pydata.org/)
    and [Scikit-Learn](https://scikit-learn.org/). ML models written in Python are
    easily consumed in Python apps. Calling them from other languages such as C++,
    Java, and C# requires a little more work. You can’t simply call a Python function
    from C++ as if it were a C++ function. So how do you invoke models written in
    Python from apps written in other languages? Put another way, how do you *operationalize*
    Python models such that they are usable in any app on any platform written in
    any programming language?


    The diagram on the left in [Figure 7-1](#figure-7-1) shows one strategy: wrap
    the model in a web service and expose its functionality through a [REST API](https://en.wikipedia.org/wiki/Representational_state_transfer).
    Then any client that can generate an HTTP(S) request can invoke the model. It’s
    relatively easy to do the wrapping with help from Python frameworks such as [Flask](https://flask.palletsprojects.com/).
    The web service can be hosted locally or in the cloud, and it can be containerized
    for easy deployment using tools such as [Docker](https://www.docker.com/).


    ![](img/628b9a382d0944bbfa786c66bc651b50_149_0.png)


    The diagram on the right shows another strategy—one that’s relatively new but
    rapidly growing in popularity. It involves exporting a Python model to a platform-agnostic
    format called ONNX, short for [Open Neural Network Exchange](https://onnx.ai/),
    and then using an ONNX runtime to load the model in Java, C++, C#, and other programming
    languages. Once loaded, the model can be called via the ONNX runtime.


    Of course, if the client app and the model are written in the same language, you
    need neither a web service nor ONNX. In this chapter, I’ll walk you through several
    scenarios:


    +   - How to save a trained Python model and invoke it from a Python client

    - How to invoke a Python model from a non-Python client using a web service

    - How to containerize a Python model (and web service) for easy deployment'

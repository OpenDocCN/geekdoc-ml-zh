    Quick training usually takes 5 to 10 minutes. When training is complete, you’ll
    see a summary like the one in Figure 12-15. You already know what precision and
    recall are. The third metric, *mean average precision (mAP)*, is a common metric
    for gauging the accuracy of object detection models. It reflects the model’s ability
    to classify objects *and* identify the objects’ bounding boxes. The higher the
    percentage, the better. If the number isn’t sufficiently high, then you have two
    choices: train with more images, or try advanced training rather than quick training
    (or both). State-of-the-art object detection models are usually trained with thousands
    of examples of each class.'

    # Training a Custom Object Detection Model with the Custom Vision Service


    The Custom Vision service is one of more than 20 services and APIs that make up
    Azure Cognitive Services. Cognitive Services enables you to build intelligence
    into apps without requiring deep expertise in machine learning and AI. The Custom
    Vision service lets you build image classification models and object detection
    models and train them in the cloud on GPUs. When training is complete, you can
    either deploy the models as web services and call them using REST APIs, or download
    them in various formats, including TensorFlow and Core ML, and consume them locally.
    Included in the download are sample source code files demonstrating how to consume
    the model.


    To use the Custom Vision service, you need a Microsoft account and an Azure subscription.
    If you don’t have a Microsoft account, you can create one for free. If you don’t
    have an Azure subscription, you can create a free trial subscription. You have
    to provide a credit card or debit card, but you get $200 in free credits to use
    for 30 days and access to many free service tiers. Even if you have a paid subscription
    or let your free trial roll over into a paid subscription, you won’t necessarily
    incur any charges for using the Custom Vision service—especially if you export
    the models you create.


    > NOTE

    If you’d prefer not to create an Azure subscription, you can skip the remainder
    of this section and pick up again with the next section, where we use the trained
    model to detect objects. All the files you need in order to utilize the model
    are present in the Chapter 12 folder of this book’s GitHub repo.


    Ready to build a custom object detection model? How about one that spots sea turtles
    in the wild? Start by downloading a dataset of sea turtle images. I used Bing
    image search to find these photos and limited the search to images that are free
    to be shared and used commercially. Copy the images from the ZIP file to a convenient
    location on your hard disk.


    Next, navigate to the Custom Vision portal in your browser and log in with your
    Microsoft account. Click “+ NEW PROJECT,” and in the “Create new project” dialog,
    click “create new” to create a new Azure resource for the project (Figure 12-9).'

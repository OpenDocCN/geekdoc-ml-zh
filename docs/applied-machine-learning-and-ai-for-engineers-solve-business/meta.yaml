    \ provides APIs for converting [text to speech](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/text-to-speech)\
    \ and [speech to text](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/speech-to-text).\
    \ KPMG uses the latter to [transcribe recorded calls](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/customer-stories/kpmg-speech-to-text)\
    \ and claims that doing so has saved its customers millions of dollars in compliance\

    of word counts and you can build a recommender system. And one of the simplest
    and most effective ways to do that is a technique called *cosine similarity*.


    # Cosine Similarity


    **Cosine similarity** is a mathematical means for computing the similarity between
    pairs of vectors (or rows of numbers treated as vectors). The basic idea is to
    take each value in a sample—for example, word counts in a row of vectorized text—and
    use them as endpoint coordinates for a vector, with the other endpoint at the
    origin of the coordinate system. Do that for two samples, and then compute the
    cosine between vectors in *m*-dimensional space, where *m* is the number of values
    in each sample. Because the cosine of 0 is 1, two identical vectors have a similarity
    of 1. The more dissimilar the vectors, the closer the cosine will be to 0.


    Here’s an example in two-dimensional space to illustrate. Suppose you have three
    rows containing two values each:


    | 1 | 2 |

    |---|---|

    | 2 | 3 |

    | 3 | 1 |


    You want to determine whether row 2 is more similar to row 1 or row 3. It’s hard
    to tell just by looking at the numbers, and in real life, there are *many* more
    numbers. If you simply added the numbers in each row and compared the sums, you
    would conclude that row 2 is more similar to row 3. But what if you treated each
    row as a vector, as shown in **Figure 4-2**?


    +   - Row 1: (0, 0) → (1, 2)

    - Row 2: (0, 0) → (2, 3)

    - Row 3: (0, 0) → (3, 1)'

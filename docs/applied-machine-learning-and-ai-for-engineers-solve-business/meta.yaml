    So which is faster? Calling a machine learning model wrapped in a web service,
    or calling the same model using ONNX? I wrote a simple test harness to answer
    that question. On my computer, calling the sentiment analysis model in a Flask
    web service running locally required slightly more than 2 seconds per round trip.
    Calling the same model through the Python ONNX runtime took 0.001 seconds on average.
    That’s a difference of more than three orders of magnitude. And you would incur
    additional latency if the web service was hosted on a remote server.


    Significantly, ONNX isn’t limited to C# and Python. ONNX runtimes are available
    for Python, C, C++, C#, Java, JavaScript, and Objective-C, and they run on Windows,
    Linux, macOS, Android, and iOS. When it comes to projecting machine learning models
    written in Python to other platforms and languages, ONNX is a game changer. For
    more information, check out the [ONNX runtime website](https://onnxruntime.ai/).


    # Building ML Models in C# with ML.NET


    Scikit-Learn is arguably the world’s most popular machine learning framework.
    The efficacy of the library, the documentation that accompanies it, and the mindshare
    that surrounds it are the primary reasons more ML models are written in Python
    than any other language. But Scikit isn’t the only machine learning framework.
    Others exist for other languages, and if you can code an ML model in the same
    programming language as the client that consumes it, you can avoid jumping through
    hoops to operationalize the model.


    [ML.NET](https://dotnet.microsoft.com/apps/machinelearning-ai/ml-dotnet) is Microsoft’s
    free, open source, cross-platform machine learning library for .NET developers.
    It does most of what Scikit does and a few things that Scikit doesn’t do. And
    when it comes to writing ML/AI solutions in C#, there is no better tool for the
    job.


    ML.NET derives from an internal library that was developed by Microsoft—and has
    been used in Microsoft products—for more than a decade. The ML algorithms that
    it implements have been tried and tested in the real world and tuned to optimize
    performance and accuracy. Because ML.NET is consumed from C#, you get all the
    benefits of a compiled programming language, including type safety and fast execution.


    A [paper published by the ML.NET team](https://arxiv.org/abs/1905.09272) at Microsoft
    in 2019 discusses the motivations and design goals behind ML.NET. It also compares
    ML.NET’s accuracy and performance to that of Scikit-Learn and another machine
    learning framework named [H2O](https://www.h2o.ai/). Using a 9 GB Amazon review
    dataset, ML.NET trained a sentiment analysis model to 95% accuracy. Neither Scikit
    nor H2O could process the dataset due to its size. When all three frameworks were
    trained on 10% of the dataset, ML.NET achieved the highest accuracy, and trained
    six times faster than Scikit and almost 10 times faster than H2O.


    ML.NET is compatible with Windows, Linux, and macOS. Thanks to an innovation called
    IDataView, it can handle datasets of virtually unlimited size. While it can’t

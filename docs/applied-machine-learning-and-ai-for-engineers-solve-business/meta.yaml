    # Sizing a Neural Network


    A neural network is characterized by the number of layers (the *depth* of the
    network), the number of neurons in each layer (the *widths* of the layers), the
    types of layers (in this example, `Dense` layers of fully connected neurons),
    and the activation functions used. There are [other layer types](https://example.com),
    many of which I will introduce in later chapters. [Dropout layers](https://example.com),
    for example, can increase a network’s ability to generalize by randomly dropping
    connections between layers during weight updates, while [Conv2D layers](https://example.com)
    enable us to build convolutional neural networks (CNNs) that excel at image processing.


    When designing a network, how do you pick the right number of layers and the right
    number of neurons for each layer? The short answer is that the “right” width and
    depth depends on the problem you’re trying to solve, the dataset you’re training
    with, and the accuracy you desire. As a rule, you want the *minimum width and
    depth required* to achieve that accuracy, and you get there using a combination
    of intuition and experimentation. That said, here are a few guidelines to keep
    in mind:


    +   - Greater widths and depths give the network more capacity to “learn” by fitting
    more tightly to the training data. They also increase the likelihood of overfitting.
    It’s the validation results that matter, and sometimes loosening the fit to the
    training data allows the network to generalize better. The simplest way to loosen
    the fit is to reduce the number of neurons.

    - Generally speaking, you prefer greater width to greater depth in part to avoid
    the [vanishing gradient problem](https://example.com), which diminishes the impact
    of added layers. The ReLU activation function provides some protection against
    vanishing gradients, but that protection isn’t absolute. For an explanation, see
    “[How to Fix the Vanishing Gradients Problem Using the ReLU](https://example.com)”.
    In addition, a network with, say, 100 neurons in one layer trains faster than
    a network with five layers of 20 neurons each because the former has fewer weights.
    Think about it: there are no connections between neurons in one layer, but there
    are 1,600 connections (20² × 4) between five layers containing 20 neurons each.

    - Fewer neurons means less training time. State-of-the-art neural networks trained
    with large datasets sometimes take days or weeks to train on high-end GPUs, so
    training time is important.


    In real life, data scientists experiment with various widths and depths to find
    the right balance between training time, accuracy, and the network’s ability to
    generalize. For a multilayer perceptron, you rarely ever need more than two hidden
    layers, and one is often sufficient. A network with one or two hidden layers has
    the capacity to solve even complex nonlinear problems. Two layers with 128 neurons
    each, for example, gives you 16,384 (128²) weights that can be adjusted, plus
    256 biases. That’s a lot of fitting power. I frequently start with one or, at
    most, two layers of 512 neurons each and halve the width or depth until the validation
    accuracy drops below an acceptable threshold.'

    ```\n\nWhat is the probability that the digit is a 4?\n\n```python\nmodel.predict_proba([digits.data[100]])[0][4]\n\
    ```\n\nWhen used for binary classification, `predict_proba` returns two probabilities:\
    \ one for the negative class and one for the positive class. For multiclass classification,\
    \ `predict_proba` returns probabilities for each possible class. This permits\
    \ you to assess the model’s confidence in the prediction returned by `predict`.\
    \ Not surprisingly, `predict` returns the class assigned the highest probability.\n\
    \n## Summary\n\nClassification models are widely used in industry to predict categorical\
    \ outcomes such as whether a credit card transaction should be accepted or declined.\
    \ Binary classification models predict either of two outcomes, while multiclass\
    \ classification models predict more than two outcomes. One of the most widely\
    \ used learning algorithms for classification models is logistic regression, which\
    \ fits an equation to training data and uses it to predict outcomes by computing\
    \ the possibility that each is the correct one and selecting the outcome with\
    \ the highest probability.\n\nThere are many ways to score classification models.\
    \ Which method is correct depends on how you intend to use the model. For example,\
    \ when the cost of false positives is high, use precision to assess the model’s\
    \ accuracy. Precision is computed by dividing the number of true positives by\
    \ the sum of the true positives and false positives. On the other hand, if the\
    \ cost of false negatives is high, use recall instead. Recall is computed by dividing\
    \ the number of true positives by the sum of the true positives and false negatives.\
    \ Closely related to precision and recall are sensitivity and specificity. Sensitivity\
    \ is identical to recall, while specificity is recall for the negative class rather\
    \ than the positive class. Confusion matrices offer a convenient way to visualize\
    \ how a model performs on test data without reducing the accuracy to a single\
    \ number.\n\nSome learning algorithms work only with binary classification, but\
    \ Scikit works some magic under the hood to make sure *any* learning algorithm\
    \ can be used for binary or multiclass classification. This isn’t true of all\
    \ machine learning libraries. Some restrict their learning algorithms to specific\
    \ scenarios or require you to write extra code to use a binary classification\
    \ algorithm in a multiclass model.\n\nAll the models in this chapter were trained\
    \ with numerical data, even though some of the datasets contained categorical\
    \ values—values that are strings rather than numbers—that had to be converted\
    \ to numbers using one-hot encoding. You may wonder how to build a classification\
    \ model that works *solely* on text—for example, a model that scores restaurant\
    \ reviews for sentiment or classifies emails as spam or not spam. It’s a perfectly\
    \ legitimate question to ask. And it happens to be the subject of Chapter 4.\n\
    \n## Chapter 4. Text Classification\n\nOne of the more novel uses for binary classification\
    \ is sentiment analysis, which examines a sample of text such as a product review,\
    \ a tweet, or a comment left on a website and scores it on a scale of 0.0 to 1.0,\
    \ where 0.0 represents negative sentiment and 1.0 represents positive sentiment.\
    \ A review such as “great product at a great price” might score 0.9, while “overpriced\
    \ product that barely works” might score 0.1. The score is the probability that\
    \ the text expresses positive sentiment. Sentiment analysis models are difficult\
    \ to build algorithmically but are relatively easy to craft with machine learning.\
    \ For examples of how sentiment analysis is used in business today, see the article\
    \ “8 Sentiment Analysis Real-World Use Cases” by Nicholas Bianchi.\n\nSentiment\
    \ analysis is one example of a task that involves classifying textual data rather\
    \ than numerical data. Because machine learning works with numbers, you must convert\
    \ text to numbers before training a sentiment analysis model, a model that identifies\
    \ spam emails, or any other model that classifies text. A common approach is to\
    \ build a table of word frequencies called a *bag of words*. Scikit-Learn provides\
    \ classes to help. It also includes support for normalizing text so that, for\
    \ example, “awesome” and “Awesome” don’t count as two different words.\n\nThis\
    \ chapter begins by describing how to prepare text for use in classification models.\
    \ After building a sentiment analysis model, you’ll learn about another popular\
    \ learning algorithm called Naive Bayes that works particularly well with text\
    \ and use it to build a model that distinguishes between legitimate emails and\
    \ spam emails. Finally, you’ll learn about a mathematical technique for measuring\
    \ the similarity of two text samples and use it to build an app that recommends\
    \ movies based on other movies you enjoy.\n\n### Preparing Text for Classification\n\
    \nBefore you train a model to classify text, you must convert the text into numbers,\
    \ a process known as *vectorization*. Chapter 1 presented the illustration reproduced\
    \ in Figure 4-1, which demonstrates a common technique for vectorizing text. Each\
    \ row represents a text sample such as a tweet or a movie review, and each column\
    \ represents a word in the training text. The numbers in the rows are word counts,\
    \ and the final number in each row is a label: 0 for negative and 1 for positive."

    \ disk, or to extract faces from a photo and submit them to a CNN for identification.\n\
    \n# Facial Recognition\n\nNow that you know how to detect faces in photos, the\
    \ next step is to learn how to identify them. Several algorithms for [recognizing\
    \ faces in photos](https://example.com) have been developed over the years. Some\
    \ rely on biometrics, such as the distance between the eyes or the texture of\
    \ the skin, while others take a more holistic approach by treating facial identification\
    \ as a pattern recognition problem. State-of-the-art models today frequently rely\
    \ on deep convolutional neural networks. One of the primary benchmarks for facial\
    \ recognition models is the [Labeled Faces in the Wild (LFW) dataset](https://example.com)\
    \ pictured in Figure 11-6, which contains more than 13,000 facial images of more\
    \ than 5,000 people collected from the web. Deep-learning models such as MobiFace\
    \ and FaceNet routinely achieve greater than 99% accuracy on the dataset. This\
    \ equals or exceeds a [human’s ability to identify faces](https://example.com)\
    \ in LFW photos."

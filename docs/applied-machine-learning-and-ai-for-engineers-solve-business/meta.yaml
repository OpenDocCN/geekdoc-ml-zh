    as can Azure Cognitive Services’ [Speech service](https://azure.microsoft.com/en-us/services/cognitive-services/speech-services/)
    and Google’s [text-to-speech API](https://cloud.google.com/text-to-speech). These
    are just a few examples of the actions cognitive services can perform, often with
    just a few lines of code.


    You saw Azure Cognitive Services at work in [Chapter 12](https://docs.microsoft.com/en-us/learn/)
    when you used the [Custom Vision service](https://azure.microsoft.com/en-us/services/cognitive-services/custom-vision-service/)

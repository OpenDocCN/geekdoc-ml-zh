    \ of the training regimen. The component responsible for making adjustments is\
    \ the optimizer; its ultimate goal is to find the optimum combination of weights\
    \ and biases with as few backpropagation passes as possible.\n\nNow that you understand\
    \ how neural networks work, the next step is to learn how to build and train them.\
    \ For that, data scientists rely on frameworks such as Keras and TensorFlow. [Chapter\

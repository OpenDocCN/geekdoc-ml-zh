  md: "```\nlayer.trainable = False\n\nmodel = Sequential()\nmodel.add(base_model)\n\
    model.add(Flatten())\nmodel.add(Dense(1024, activation='relu'))\nmodel.add(Dense(3,\
    \ activation='softmax'))\nmodel.compile(optimizer='adam', loss='sparse_categorical_crossentropy',\n\
    \              metrics=['accuracy'])\n\nmodel.fit(x, y, validation_split=0.2,\
    \ epochs=10, batch_size=10)\n```\n\nThe second technique is to run all the training\
    \ images through the base model for feature extraction, and then run the features\
    \ through a separate network containing your classification layers:\n\n```\nfeatures\
    \ = base_model.predict(x)\n\nmodel = Sequential()\nmodel.add(Flatten())\nmodel.add(Dense(128,\
    \ activation='relu'))\nmodel.add(Dense(3, activation='softmax'))\nmodel.compile(optimizer='adam',\
    \ loss='sparse_categorical_crossentropy',\n              metrics=['accuracy'])\n\
    \nmodel.fit(features, y, validation_split=0.2, epochs=10, batch_size=10)\n```\n\
    \nWhich technique is better? The second is faster because the training images\
    \ go through the bottleneck layers for feature extraction just one time rather\
    \ than once per epoch. It’s the technique you should use in the absence of a compelling\
    \ reason to do otherwise. The first technique is slightly slower, but it lends\
    \ itself to *fine-tuning*, in which you unfreeze one or more bottleneck layers\
    \ after training is complete and train for a few more epochs with a very low learning\
    \ rate. It also facilitates *data augmentation*, which I’ll introduce in the next\
    \ section.\n\n> **NOTE**\n\nFine-tuning is frequently applied to transfer-learning\
    \ models after training is complete in an effort to squeeze out an extra percentage\
    \ point or two of accuracy. We will use fine-tuning in Chapter 13 to increase\
    \ the accuracy of an NLP model that utilizes a pretrained neural network.\n\n\
    If you use the first technique to implement transfer learning, you make predictions\
    \ by preprocessing the images and passing them to the model’s `predict` method.\
    \ For the second technique, making predictions is a two-step process. After preprocessing\
    \ the images, you pass them to the base model’s `predict` method, and then you\
    \ pass the output from that method to your model’s `predict` method:\n\n```\n\
    x = image.img_to_array(x)\nx = np.expand_dims(x, axis=0)\nx = preprocess_input(x)\
    \ / 255\n\nfeatures = base_model.predict(x)\npredictions = model.predict(features)\n\
    ```"

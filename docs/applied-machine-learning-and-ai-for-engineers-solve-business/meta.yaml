    \ service => 1.0\nThe product worked as advertised but is overpriced => 0.0\n\
    Moving to the cloud was the best decision we ever made => 1.0\nProgramming is\
    \ so fun I'd do it for free. Don't tell my boss! => 1.0\n```\n\n假设你正在编写一个应用程序，收集提及你公司的推文并分析其情感。其理念是，如果情感变得负面，你可以给营销部门提个醒。向\
    \ Azure 认知服务发起一次调用并分析 100 条推文，比发起 100 次调用一次分析一条推文更快、更高效。\n\n情感分析是 `TextAnalyticsClient`\
    \ 类支持的几种操作之一。另一种是命名实体识别。假设你正在构建一个系统，用于对收到的支持工单进行分类和优先级排序。`recognize_entities`\
    \ 方法从输入文本中提取实体，例如人员、地点、组织、日期和时间以及数量。它还会揭示实体类型：\n\n```python\ndocuments = [\n \

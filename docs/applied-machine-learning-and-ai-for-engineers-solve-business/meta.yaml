    # Summary


    Azure Cognitive Services lower the bar for incorporating sophisticated deep-learning
    models into the apps you write by providing REST APIs that any app with an internet
    connection can call. Containerized versions of most services allow them to be
    hosted locally or on premises and also provide an option for running in disconnected
    scenarios. One of the benefits of containers is locking in a particular version
    of the models you’re using or the APIs that access them so that changes to Azure
    Cognitive Services won’t affect your apps.


    The range of services offered by Azure Cognitive Services includes vision services
    for extracting information from images and video streams, language services for
    translating text into other languages and performing other NLP tasks, and speech
    services for incorporating speech into your apps. Free SDKs are available for
    most services. They simplify the code you write, and they’re available for a variety
    of popular programming languages including Python, Java, and C#.


    Machine learning and deep learning are making the world a better place one model
    at a time. Soon both will be considered part of the essential skill set of every
    engineer and software developer. Are you up to the task? My hope is that this
    book gives you the confidence to say yes and the tools to make it happen. It’s
    too late to monitor Apollo missions in Mission Control, but countless other frontiers
    are waiting to be explored.'

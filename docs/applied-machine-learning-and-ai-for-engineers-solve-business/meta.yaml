    \n这并不是说迁移学习*总是*能让你用每类100张图像就达到97%的准确率。它做不到。如果数据集缺乏实现那种分离度的信息，无论是从头构建的CNN还是迁移学习都无法神奇地实现这一点。这在机器学习和人工智能领域始终是真理。你无法从石头里榨出水，也无法从不支持它的数据中构建出精确的模型。\n\
    \n## 数据增强\n\n前面的例子演示了如何使用迁移学习构建一个模型，仅用300张训练图像就能以97%的准确率对三种不同类型的北极野生动物照片进行分类。迁移学习的好处之一是它能用更少的图像做更多的事。然而，这个特性也是一个缺陷。每类只有大约100个样本，图像之间的多样性就很少。如果熊的头部在照片中完美居中，模型或许能识别出北极熊。但如果训练图像不包括头部位置不同或倾斜角度不同的照片，模型可能就难以对该照片进行分类。\n\
    \n一个解决方案是*数据增强*。与其费力寻找更多训练图像，不如对现有的图像进行旋转、平移和缩放。它并不*总是*能提高CNN的准确率，但经常可以，尤其是在数据集较小的情况下。Keras使得随机变换提供给网络的训练图像变得容易。图像在每个训练周期（epoch）中都会被不同地变换，因此如果你训练10个周期，网络就会看到每张训练图像的10种不同变体。这可以提高模型的泛化能力，而对训练时间影响很小。图10-12展示了对一张热狗图像应用随机变换的效果。你可以明白为什么以不同方式向模型呈现同一张图像，可能会使模型更擅长识别热狗，无论热狗是如何构图的。\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_227_0.png)\n\nKeras内置了对图像数据增强的支持。让我们看看几种应用图像增强的方法，然后将其应用于北极野生动物模型。\n\
    \n## 使用ImageDataGenerator进行图像增强\n\n在训练模型时应用图像增强的一种方法是使用Keras的`ImageDataGenerator`类。`ImageDataGenerator`可以动态生成训练图像批次，这些图像可以来自你加载的图像（例如，使用Keras的`load_img`函数），也可以来自文件系统中的指定位置。后者在使用数百万张图像训练CNN时特别有用，因为它将图像分批加载到内存中，而不是一次性全部加载。然而，无论图像来自哪里，`ImageDataGenerator`在提供图像时都乐意应用变换。\n\
    \n这里有一个你可以自己尝试的简单例子。使用以下代码从文件系统加载一张图像，用`ImageDataGenerator`包装它，并生成该图像的24个版本：\n\
    \n```python\nimport numpy as np\nfrom tensorflow.keras.preprocessing import image\n\
    from tensorflow.keras.preprocessing.image import ImageDataGenerator\nimport matplotlib.pyplot\

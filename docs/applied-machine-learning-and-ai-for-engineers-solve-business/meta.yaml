    # Using PCA to Detect Credit Card Fraud\n\nSupervised learning isn’t the only\
    \ option for detecting credit card fraud. Here’s an alternative approach that\
    \ uses PCA-based anomaly detection to identify fraudulent transactions. Begin\
    \ by loading the dataset, separating the samples by class into one dataset representing\
    \ legitimate transactions and another representing fraudulent transactions, and\

    Label encoding and one-hot encoding are used with regression problems and classification
    problems. The obvious question is, which one should you use? Generally speaking,
    data scientists prefer one-hot encoding to label encoding. The former gives every
    unique value an equal weight, whereas the latter implies that some values may
    be more important than others—for example, that "red" (2) is more important than
    "blue" (0). Label encoding, on the other hand, is more memory efficient. The number
    of columns is the same before and after encoding, whereas one-hot encoding adds
    one column per unique value. For very large datasets with thousands of unique
    values in a categorical column, label encoding requires substantially less memory.


    The accuracy of a machine learning model is rarely impacted by the encoding method
    you choose. If you’re in doubt, you’ll rarely go wrong with one-hot encoding.
    If you want to be certain, you can encode the data both ways and compare the results
    after training a machine learning model.


    # Binary Classification


    Binary classifiers are supervised learning models trained with labeled data: 0s
    for the negative class and 1s for the positive. The predictions they make are
    0s and 1s too. They also divulge a probability for each class that you can factor
    into your conclusions. For example, a credit card company might decide that a
    transaction will be declined only if the model predicts with at least 99% certainty
    that the transaction is fraudulent. In that case, the probability that the model
    computed is more important than the raw prediction that it made.


    To help bring home everything presented thus far regarding binary classification,
    let’s use Scikit to build a couple of models: first a simple one that demonstrates
    core principles, followed by a second one that solves a genuine business problem.'

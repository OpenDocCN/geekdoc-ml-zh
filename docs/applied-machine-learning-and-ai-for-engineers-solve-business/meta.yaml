    \ is overlap between them. But the fact remains that the number you seed `train_test_split`'s\
    \ random-number generator with affects the outcome. The smaller the dataset, the\
    \ greater that effect is likely to be.\n\nThe solution is *cross-validation*.\
    \ To cross-validate a model, you partition the dataset into *folds*, as pictured\
    \ in Figure 2-11. Using five folds is common, but you can use any number of folds\
    \ you like. Then you train the model five times—once for each fold—using a different\
    \ 80% of the dataset for training and a different 20% for testing each time, and\
    \ average the scores to generate a cross-validated score. That score is more reliable\
    \ than the score returned by `score` because it is less sensitive to how the data\
    \ is split. This process is known as *k-fold cross-validation*.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_53_0.png)\n\
    \nThe downside to cross-validation is that it takes longer. With 5-fold cross-validation,\
    \ you’re training the model five times. The good news is that cross-validation\
    \ is generally applied only to small datasets, and if the dataset is small, the\
    \ model probably trains quickly.\n\nYou could write the code to do cross-validation\
    \ yourself, but you don’t have to because Scikit does it for"

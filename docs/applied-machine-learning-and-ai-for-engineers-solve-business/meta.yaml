  md: '# Summary


    Object detection represents the tip of the spear in the world of computer vision.
    It’s how self-driving cars “see” objects in front of them, and it’s the technology
    underlying numerous real-world applications. State-of-the-art object detection
    is accomplished with deep learning using specially crafted CNNs that do more than
    mere image classification. You can use pretrained models such as YOLO and Mask
    R-CNN to detect objects in images and video frames. With Mask R-CNN, you can even
    generate segmentation masks revealing additional information about those objects.


    Custom object detection requires you to train models like these with images of
    your own carefully labeled to denote objects and bounding boxes. Azure’s Custom
    Vision service simplifies the process of training custom object detection models,
    and allows the models you train to be hosted in the cloud and called using REST
    APIs or downloaded and consumed locally. It’s one of several services that comprise
    Azure Cognitive Services, and it’s the right tool for the job when the job calls
    for detecting objects that pretrained models weren’t trained to detect.'

    test data to the model’s `score` method. Testing quantifies how accurate the model
    is at making predictions. It is incredibly important to test a model with a dataset
    other than the one it was trained with because it will probably learn the training
    data reasonably well, but that doesn’t mean it will generalize well—that is, make
    accurate predictions. And if'

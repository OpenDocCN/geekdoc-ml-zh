    ![](img/628b9a382d0944bbfa786c66bc651b50_312_0.png)


    The chief innovation introduced by the transformer model is the use of multi-head
    attention (MHA) layers in place of LSTM layers. MHA layers embody the concept
    of *self-attention*, which enables a model to analyze an input sequence and focus
    on the words that are most important as well as the context in which the words
    are used. In the sentence “We took a walk in the park,” for example, the word
    *park* has a different meaning than it does in “Where did you park the car?” An
    embedding layer stores one vector representation for *park*, but in a transformer
    model, the MHA layer modifies the vector output by the embedding layer so that
    *park* is represented by two different vectors in the two sentences. Not surprisingly,
    the values used to make embedding vectors context aware are learned during training.'
  - '[PAGE 313]


    > **NOTE**


    How does self-attention work? The gist is that an MHA layer uses dot products
    to compute similarity scores for every word pair in a sequence. After normalizing
    the scores, it uses them to compute weighted versions of each word embedding in
    the sequence. Then it modifies them again using weights learned during training.


    The “multi” in *multi-head attention* denotes the fact that an MHA layer learns
    several sets of weights rather than just one, not unlike a convolution layer in
    a CNN. This gives MHA the ability to discern context in long sequences where words
    might have multiple relationships to one another.


    MHA also provides additional context regarding words that refer to other words.
    An embedding layer represents the pronoun *it* with a single vector, but an MHA
    layer helps the model understand that in the sentence “I love my car because it
    is fast,” *it* refers to a car. It also adds weight to the word *fast* because
    it’s crucial to the meaning of the sentence. Without it, it’s not clear *why*
    you love your car.


    Unlike LSTM layers, MHA layers’ ability to model relationships among the words
    in an input sequence is independent of sequence length. MHA layers also support
    parallel workloads and therefore train faster on multiple GPUs. They do not, however,
    encode information regarding the positions of the words in a phrase. To compensate,
    a transformer uses simple vector addition to add information denoting a word’s
    position in a sequence to each vector output from the embedding layer. This is
    referred to as *positional encoding* or *positional embedding*. It’s denoted by
    the plus signs labeled “Positional encoding” in [Figure 13-5](Figure 13-5).


    Transformers aren’t limited to neural machine translation; they’re used in virtually
    all aspects of NLP today. The encoder half of a transformer outputs dense vector
    representations of the sequences input to it. Text classification can be performed
    by using a transformer rather than a standalone embedding layer to encode input
    sequences. Models architected this way frequently outperform bag-of-words models,
    particularly if the ratio of samples to sample length (the number of training
    samples divided by the average length of each sample) exceeds 1,500. This so-called
    “golden constant” was discovered by a team of researchers at Google and documented
    in a [tutorial on text classification](tutorial on text classification).


    # Building a Transformer-Based NMT Model


    Keras provides some, but not all, of the building blocks that comprise an end-to-end
    transformer. It provides a handy implementation of self-attention layers in its
    [MultiHeadAttention class](MultiHeadAttention class), for example, but it doesn’t
    implement positional embedding. However, a separate package named [KerasNLP](KerasNLP)
    does. Among others, it includes the following classes representing layers in a
    transformer-based network:


    +   *TransformerEncoder*


    Represents a transformer encoder


    *TransformerDecoder*


    Represents a transformer decoder


    *TokenAndPositionEmbedding*'

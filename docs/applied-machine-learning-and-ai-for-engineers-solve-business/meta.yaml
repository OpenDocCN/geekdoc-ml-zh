    \n```python\nfrom tensorflow.keras.models import Sequential\nfrom tensorflow.keras.layers\
    \ import TextVectorization, InputLayer\nfrom tensorflow.keras.layers import Dense,\
    \ Embedding, LSTM\nimport tensorflow as tf\n\nmodel = Sequential()\nmodel.add(InputLayer(input_shape=(1,),\
    \ dtype=tf.string))\nmodel.add(TextVectorization(max_tokens=max_words,\n     \
    \                      output_sequence_length=max_length))\nmodel.add(Embedding(max_words,\
    \ 32, input_length=max_length))\nmodel.add(LSTM(32))\nmodel.add(Dense(1, activation='sigmoid'))\n\
    model.compile(loss='binary_crossentropy', optimizer='adam',\n              metrics=['accuracy'])\n\
    ```\n\nLSTM计算密集，尤其是在处理长序列时。如果你尝试这段代码，你会发现模型训练时间*长得多*。你还会发现验证准确率即使有提高也微乎其微。这又回到了词袋模型虽然简单，但在文本分类方面往往有效的事实上。\n\

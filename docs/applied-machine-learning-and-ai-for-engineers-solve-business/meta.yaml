    another callback to log training metrics in a CSV file.


    ## Summary


    Keras and TensorFlow are widely used open source frameworks that facilitate building,
    training, saving, loading, and consuming (making predictions with) neural networks.
    You can build neural networks in a variety of programming languages using native
    TensorFlow APIs, but Keras abstracts those APIs and makes deep learning much more
    approachable. Keras apps are written in Python.


    Neural networks, like traditional machine learning models, can be used to solve
    regression problems and classification problems. A network that performs regression
    has one neuron in the output layer with no activation function; the output from
    the network is a floating-point number. A network that performs binary classification
    also has one neuron in the output layer, but the `sigmoid` activation function
    ensures that the output is a value from 0.0 to 1.0 representing the probability
    that the input represents the positive class. For multiclass classification, the
    number of neurons in the output layer equals the number of classes the network
    can predict. The `softmax` activation function transforms the raw values assigned
    to the output neurons into an array of probabilities for each class.


    When you find that a neural network is fitting too tightly to the training data,
    one way to combat overfitting and increase the network’s ability to generalize
    is to reduce the complexity of the network: reduce the number of layers, the number
    of neurons in individual layers, or both. Another approach is to add dropout to
    the network. Dropout purposely impedes a network’s ability to learn the training
    data by randomly ignoring a subset of the connections between layers when updating
    weights and biases.


    Keras’s callbacks API lets you customize the training process. By processing the
    callbacks that occur at the end of each training epoch, for example, you can check
    the model’s accuracy and halt training if it has reached an acceptable level.
    Keras also includes a simple and easy-to-use API for saving and loading trained
    models. This is essential for operationalizing the models that you train—deploying
    them to production and using the predictive powers developed during training.


    The facial recognition model in this chapter exceeded 80% in validation accuracy,
    but modern deep-learning models often achieve 99% accuracy on the same dataset.
    It won’t surprise you to learn that there is more to deep learning than multilayer
    perceptrons. We’ll take a deep dive into facial recognition in [Chapter 11](Chapter
    11), but first we’ll explore a different type of neural network—one that’s particularly
    adept at solving computer-vision problems. It’s called the *convolutional neural
    network*, and it is the subject of [Chapter 10](Chapter 10).


    ## Chapter 10. Image Classification with Convolutional Neural Networks


    [Computer vision](https://en.wikipedia.org/wiki/Computer_vision) is a branch of
    deep learning in which computers discern information from images. Real-world uses
    include identifying objects in photos, removing inappropriate images from social
    media sites, counting the cars in line at a tollbooth, and recognizing faces in
    photos. Computer-vision models can even be combined with natural language processing
    (NLP) models to caption photos. I snapped a photo while on vacation and asked
    Azure’s [Computer Vision service](https://azure.microsoft.com/en-us/services/cognitive-services/computer-vision/)
    to caption it. The result is shown in [Figure 10-1](#figure-10-1). It’s somewhat
    remarkable given that no human intervention was required.


    ![](img/628b9a382d0944bbfa786c66bc651b50_205_0.png)


    *Figure 10-1. “A body of water with a dock and a building in the background”—Azure
    AI*


    The field of computer vision has advanced rapidly in recent years, mostly due
    to *convolutional neural networks*, also known as CNNs or *ConvNets*. In 2012,
    an eight-layer CNN called [AlexNet](https://en.wikipedia.org/wiki/AlexNet) outperformed
    traditional machine learning models entered in the annual [ImageNet Large Scale
    Visual Recognition Challenge (ILSVRC)](https://en.wikipedia.org/wiki/ImageNet#History_of_the_ImageNet_Large_Scale_Visual_Recognition_Challenge)
    by achieving an error rate of 15.3% when identifying objects in photos. In 2015,
    [ResNet-152](https://en.wikipedia.org/wiki/Residual_neural_network) featuring
    a whopping 152 layers won the challenge with an error rate of just 3.5%, which
    exceeds a human’s ability to classify images featured in the competition.


    CNNs are magical because they treat images as *images* rather than just arrays
    of pixel values. They use a decades-old technology called [convolution kernels](https://en.wikipedia.org/wiki/Kernel_(image_processing))
    to extract “features” from images, allowing them to recognize the shape of a cat’s
    head or the outline of a dog’s tail. Moreover, they are easy to build with Keras
    and TensorFlow.


    State-of-the-art CNNs such as ResNet-152 are trained at great expense with millions
    of images on GPUs, but there’s a lot you can do with an ordinary CPU. In this
    chapter, you’ll learn what CNNs are and how they work, and you’ll build and train
    a few CNNs of your own. You’ll also learn how to leverage advanced CNNs published
    for public consumption by companies such as Google and Microsoft, and how to use
    a technique called *transfer learning* to repurpose those CNNs to solve domain-specific
    problems.


    ### Understanding CNNs


    Figure 10-2 shows the topology of a basic CNN. It begins with one or more sets
    of *convolution layers* and *pooling layers*. Convolution layers extract features
    from images, generating transformed images that are commonly referred to as *feature
    maps* because they highlight distinguishing features such as shapes and contours.
    Pooling layers reduce the feature maps’ size by half so that features can be extracted
    at various resolutions and are less sensitive to small changes in position. Output
    from the final pooling layer is flattened to one dimension and input to one or
    more dense layers for classification. The convolution and pooling layers are called
    *bottleneck layers* since they reduce the dimensionality of images input to them.
    They also account for the bulk of the computation time during training.


    Convolution layers extract features from images by passing convolution kernels
    over them—the same technique used by image editing tools to blur, sharpen, and
    emboss images. A kernel is simply a matrix of values. It usually measures 3 ×
    3, but it can be larger. To process an image, you place the kernel in the upper-left
    corner of the image, multiply the kernel values by the pixel values underneath,
    and compute a new value for the center pixel by summing the products, as shown
    in Figure 10-3. Then you move the kernel one pixel to the right and repeat the
    process, continuing row by row and column by column until the entire image has
    been processed.


    ![](img/628b9a382d0944bbfa786c66bc651b50_206_0.png)


    ![](img/628b9a382d0944bbfa786c66bc651b50_207_0.png)


    Figure 10-4 shows what happens when you apply a 3 × 3 kernel to a hot dog image.
    This particular kernel is called a *bottom Sobel kernel*, and it’s designed to
    do edge detection by highlighting edges as if a light were shined from the bottom.
    The convolution layers of a CNN use kernels like this one to extract features
    that help distinguish one class from another.


    ![](img/628b9a382d0944bbfa786c66bc651b50_207_1.png)


    A convolution layer doesn’t use just one kernel to process images. It uses many—sometimes
    100 or more. The kernel values aren’t determined ahead of time. They are initialized
    with random values and then learned (adjusted) as the CNN is trained, just as
    the weights connecting neurons in dense layers are learned. Each kernel also has
    a bias associated with it, just like a neuron in a dense layer. The images in
    Figure 10-5 were generated by the first convolution layer in a trained CNN. You
    can see how the various convolution kernels allow the network to view the same
    hot dog image in different ways, and how certain features such as the shape of
    the bun and the ribbon of mustard on top are highlighted.


    ![](img/628b9a382d0944bbfa786c66bc651b50_207_2.png)'

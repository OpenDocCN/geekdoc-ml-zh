    \ to `fit` with the following statement:\n\n```\npython\nhist = model.fit(x_train,\
    \ y_train, validation_data=(x_test, y_test), epochs=10,\n                batch_size=100,\
    \ class_weight={ 0: 1.0, 1: 0.01 })\n```"
  - "[PAGE 192]\n\nThen run the notebook again from start to finish. In all likelihood,\
    \ the resulting confusion matrix will show zero (or at most, one or two) misclassified\
    \ legitimate transactions, but the percentage of correctly identified fraudulent\
    \ transactions will decrease too. The `class_weight` parameter in this example\
    \ tells the model that you care a *lot* more about classifying legitimate samples\
    \ correctly than correctly identifying fraudulent samples. You can experiment\
    \ with different weights for the two classes and find the balance that best suits\
    \ the business requirements that prompted you to build the model in the first\
    \ place.\n\n# Multiclass Classification with Neural Networks\n\nHere again is\
    \ a simple binary classifier that accepts two inputs, has a hidden layer with\
    \ 128 neurons, and outputs a value from 0.0 to 1.0 representing the probability\
    \ that the input belongs to the positive class:\n\n```\nfrom tensorflow.keras.models\
    \ import Sequential\nfrom tensorflow.keras.layers import Dense\n\nmodel = Sequential()\n\
    model.add(Dense(128, activation='relu', input_dim=2))\nmodel.add(Dense(1, activation='sigmoid'))\n\
    model.compile(optimizer='adam', loss='binary_crossentropy',\n              metrics=['accuracy'])\n\
    ```\n\nKey elements include an output layer with one neuron assigned the `sigmoid`\
    \ activation function, and `binary_crossentropy` as the loss function. Three simple\
    \ modifications repurpose this network to do multiclass classification:\n\n```\n\
    from tensorflow.keras.models import Sequential\nfrom tensorflow.keras.layers import\
    \ Dense\n\nmodel = Sequential()\nmodel.add(Dense(128, activation='relu', input_dim=2))\n\
    model.add(Dense(4, activation='softmax'))\nmodel.compile(optimizer='adam', loss='sparse_categorical_crossentropy',\n\
    \              metrics=['accuracy'])\n```\n\nThe changes are as follows:\n\n+\
    \   - The output layer contains *one neuron per class* rather than just one neuron.\
    \ If the dataset contains four classes, then the output layer has four neurons.\
    \ If the dataset contains 10 classes, then the output layer has 10 neurons. Each\
    \ neuron corresponds to one class.\n- The output layer uses the `softmax activation\
    \ function` rather than the `sigmoid` activation function. Each neuron in the\
    \ output layer yields a probability for the corresponding class, and thanks to\
    \ the `softmax` function, the sum of all the probabilities is 1.0.\n- The loss\
    \ function is `sparse_categorical_crossentropy`. During training, this loss function\
    \ exponentially penalizes error in the probabilities predicted by a multiclass\
    \ classifier, just as `binary_crossentropy` does for binary classifiers."
  - "[PAGE 193]\n\nAfter defining the network, you call `fit` to train it and `predict`\
    \ to make predictions. Since an example is worth a thousand words, let's fit a\
    \ neural network to a two-dimensional dataset comprising four classes (Figure\
    \ 9-4).\n\n![](img/628b9a382d0944bbfa786c66bc651b50_193_0.png)\n\nThe following\
    \ code trains a neural network to predict a class based on a point's x and y coordinates:\n\
    \n```\npython\nfrom tensorflow.keras.models import Sequential\nfrom tensorflow.keras.layers\
    \ import Dense\n\nmodel = Sequential()\nmodel.add(Dense(128, activation='relu',\
    \ input_dim=2))\nmodel.add(Dense(4, activation='softmax'))\nmodel.compile(optimizer='adam',\
    \ loss='sparse_categorical_crossentropy',\n              metrics=['accuracy'])\n\
    \nhist = model.fit(x, y, epochs=40, batch_size=10, validation_split=0.2)\n```\n\
    \nA plot of the training and validation accuracy reveals that the network had\
    \ little trouble separating the classes:"
- md: "## Training and Validation Accuracy\n\nYou make predictions by calling the\
    \ classifier’s `predict` method. For each input, `predict` returns an array of\
    \ probabilities—one per class. The predicted class is the one assigned the highest\
    \ probability. In this example, purple data points represent class 0, light blue\
    \ represent class 1, taupe represent class 2, and red represent class 3. Here\
    \ the network is asked to classify a point that lies at (0.2, 0.8):\n\n```\nmodel.predict(np.array([[0.2,\
    \ 0.8]]))\n```\n\nThe answer is an array of four probabilities corresponding to\
    \ classes 0, 1, 2, and 3, in that order:\n\n```\n[2.1877741e-02, 5.3804164e-05,\
    \ 5.0240371e-02, 9.2782807e-01]\n```\n\nThe network predicted there’s a 2% chance\
    \ that (0.2, 0.8) corresponds to class 0, a 0% chance that it corresponds to class\
    \ 1, a 5% chance that it corresponds to class 2, and a 93% chance that it corresponds\
    \ to class 3. Looking at the plot, that seems like a reasonable answer.\n\nIf\
    \ you simply want to know which class the point belongs to, you can do it this\
    \ way:\n\n```\nnp.argmax(model.predict(np.array([[0.2, 0.8]])), axis=1)\n```\n\
    \nThe answer is 3, which corresponds to red. Older versions of Keras included\
    \ a `predict_classes` method that did the same without the call to `argmax`, but\
    \ that method has since been deprecated and removed.\n\n> **NOTE**\n\nKeras also\
    \ includes a loss function named `categorical_crossentropy` that is frequently\
    \ used for multiclass classification. It works like `sparse_categorical_crossentropy`,\
    \ but it requires labels to be one-hot-encoded. Rather than pass `fit` a label\
    \ column containing values from 0 to 3, for example, you pass it four columns\
    \ containing 0s and 1s. Keras provides a utility function named `to_categorical`\
    \ to do the encoding. If you use `sparse_categorical_crossentropy`, however, you\
    \ can use the label column as is.\n\n## Training a Neural Network to Recognize\
    \ Faces\n\nChapter 5 documented the steps for training a support vector machine\
    \ to recognize faces. Let’s train a neural network to do the same. We’ll use the\
    \ same dataset as before: the Labeled Faces in the Wild (LFW) dataset, which contains\
    \ more than 13,000 facial images of famous people and is built into Scikit as\
    \ a sample dataset. Recall that of the more than 5,000 people represented in the\
    \ dataset, 1,680 have two or more facial images, while only 5 have 100 or more.\
    \ We’ll set the minimum number of faces per person to 100, which means that five\
    \ sets of faces corresponding to five famous people will be imported.\n\nStart\
    \ by creating a new Jupyter notebook and using the following statements to load\
    \ the dataset:\n\n```\nimport pandas as pd\nfrom sklearn.datasets import fetch_lfw_people\n\
    \nfaces = fetch_lfw_people(min_faces_per_person=100)\nimage_count = faces.images.shape[0]\n\
    image_height = faces.images.shape[1]\nimage_width = faces.images.shape[2]\nclass_count\
    \ = len(faces.target_names)\n\nfaces = fetch_lfw_people(min_faces_per_person=100)\n\
    print(faces.target_names)\nprint(faces.images.shape)\n```\n\nIn total, 1,140 facial\
    \ images were loaded. Each measures 47 × 62 pixels. Use the following code to\
    \ show the first 24 images in the dataset and the people to whom the faces belong:\n\
    \n```\n%matplotlib inline\nimport matplotlib.pyplot as plt\n\nfig, ax = plt.subplots(3,\
    \ 8, figsize=(18, 10))\nfor i, axi in enumerate(ax.flat):\n    axi.imshow(faces.images[i],\
    \ cmap='gist_gray')\n    axi.set(xticks=[], yticks=[], xlabel=faces.target_names[faces.target[i]])\n\
    ```\n\nCheck the balance in the dataset by generating a histogram showing how\
    \ many facial images were imported for each person:\n\n```\nfrom collections import\
    \ Counter\nimport seaborn as sns\nsns.set()\n\ncounts = Counter(faces.target)\n\
    names = {}\n\nfor key in counts.keys():\n    names[faces.target_names[key]] =\
    \ counts[key]\n\ndf = pd.DataFrame.from_dict(names, orient='index')\ndf.plot(kind='bar')\n\
    ```\n\nThere are far more images of George W. Bush than of anyone else in the\
    \ dataset. Classification models are best trained with balanced datasets. Use\
    \ the following code to reduce the dataset to 100 images of each person:\n\n```\n\
    import numpy as np\n\nmask = np.zeros(faces.target.shape, dtype=bool)\n\nfor target\
    \ in np.unique(faces.target):\n    mask[np.where(faces.target == target)[0][:100]]\
    \ = 1\n\nx_faces = faces.data[mask]\ny_faces = faces.target[mask]\nx_faces.shape\n\
    ```\n\nx_faces contains 500 facial images, and y_faces contains the labels that\
    \ go with them: 0 for Colin Powell, 1 for Donald Rumsfeld, and so on.\n\nThe next\
    \ step is to divide the pixel values by 255. After that, split the data for training\
    \ and testing. We’ll set aside 20% of the data for testing, let Keras use it to\
    \ validate the model during training, and later use it to assess the results with\
    \ a confusion matrix:\n\n```\nfrom sklearn.model_selection import train_test_split\n\
    \nface_images = x_faces / 255\nx_train, x_test, y_train, y_test = train_test_split(face_images,\
    \ y_faces,\n                                                    train_size=0.8,\n\
    \                                                    stratify=y_faces,\n     \
    \                                               random_state=0)\n```\n\n> **NOTE**\n\
    \nWhy divide the pixel values by 255? Neural networks frequently train better\
    \ with normalized data, and dividing by 255 is a simple way to normalize pixel\
    \ values. It’s not uncommon to use Scikit’s `StandardScaler` class to apply unit\
    \ variance instead, and sometimes a network trains better that way. The only way\
    \ to find out is to try. In this example, I tried both and found that the results\
    \ were about the same either way.\n\nCreate a neural network containing one hidden\
    \ layer with 512 neurons. Use `sparse_categorical_crossentropy` as the loss function\
    \ and `softmax` as the activation function in the output layer since this is a\
    \ multiclass classification task:\n\n```\nfrom tensorflow.keras.layers import\
    \ Dense\nfrom tensorflow.keras.models import Sequential\n\nmodel = Sequential()\n\
    model.add(Dense(512, activation='relu',\n                input_shape=(image_width\
    \ * image_height,)))\nmodel.add(Dense(class_count, activation='softmax'))\nmodel.compile(optimizer='adam',\
    \ loss='sparse_categorical_crossentropy',\n              metrics=['accuracy'])\n\
    model.summary()\n```\n\nNow train the network:\n\n```\nhist = model.fit(x_train,\
    \ y_train, validation_data=(x_test, y_test),\n                  epochs=100, batch_size=20)\n\
    ```\n\nPlot the training and validation accuracy:\n\n```\nacc = hist.history['accuracy']\n\
    val_acc = hist.history['val_accuracy']\nepochs = range(1, len(acc) + 1)\n\nplt.plot(epochs,\
    \ acc, '-', label='Training Accuracy')\nplt.plot(epochs, val_acc, ':', label='Validation\
    \ Accuracy')\nplt.title('Training and Validation Accuracy')\nplt.xlabel('Epoch')\n\
    plt.ylabel('Accuracy')\nplt.legend(loc='lower right')\nplt.plot()\n```\n\nFinally,\
    \ use a confusion matrix to visualize how the network performs against test data:\n\
    \n```\nfrom sklearn.metrics import ConfusionMatrixDisplay as cmd\n\nsns.reset_orig()\n\
    y_pred = model.predict(x_test)\nfig, ax = plt.subplots(figsize=(5, 5))\nax.grid(False)\n\
    \ncmd.from_predictions(y_test, y_pred.argmax(axis=1),\n                      display_labels=faces.target_names,\
    \ colorbar=False,\n                      cmap='Blues', xticks_rotation='vertical',\
    \ ax=ax)\n```\n\nHow many times did the model correctly identify George W. Bush?\
    \ How many times did it identify him as someone else? Would the network be just\
    \ as accurate with 128 neurons in the hidden layer as it is with 512?\n\n## Dropout\n\
    \nThe goal of any machine learning model is to make accurate predictions. In a\
    \ perfect world, the gap between training accuracy and validation accuracy would\
    \ be close to 0 in the later stages of training a neural network. In the real\
    \ world, it rarely happens that way. Training accuracy for the model in the previous\
    \ section approached 100%, but validation accuracy probably peaked between 80%\
    \ and 85%. This means the model isn’t generalizing as well as you’d like. It learned\
    \ the training data very well, but when presented with data it hadn’t seen before\
    \ (the validation data), it underperformed. This may be a sign that the model\
    \ is overfitting. In the end, it’s not training accuracy that matters; it’s how\
    \ accurately the model responds to new data.\n\nOne way to combat overfitting\
    \ is to reduce the depth of the network, the width of individual layers, or both.\
    \ Fewer neurons means fewer trainable parameters, and fewer parameters makes it\
    \ harder for the network to fit too tightly to the training data.\n\nAnother way\
    \ to guard against overfitting is to introduce *dropout* to the network. Dropout\
    \ randomly drops connections between layers during training to prevent the network\
    \ from learning the training data too well. It’s like reading a book but skipping\
    \ every other page in hopes that you’ll learn high-level concepts without getting\
    \ bogged down in the details. Dropout was introduced in a 2014 paper titled “Dropout:\
    \ A Simple Way to Prevent Neural Networks from Overfitting”.\n\nKeras’s Dropout\
    \ class makes adding dropout to a network dead-simple. To demonstrate, go back\
    \ to the example in the previous section and redefine the network this way:\n\n\
    ```\nfrom tensorflow.keras.layers import Dense, Dropout\nfrom tensorflow.keras.models\
    \ import Sequential\n\nmodel = Sequential()\nmodel.add(Dense(512, activation='relu',\n\
    \                input_shape=(image_width * image_height,)))\nmodel.add(Dropout(0.2))\n\
    model.add(Dense(class_count, activation='softmax'))\nmodel.compile(optimizer='adam',\
    \ loss='sparse_categorical_crossentropy',\n              metrics=['accuracy'])\n\
    ```\n\nNow train the network again and plot the training and validation accuracy.\
    \ Here’s how it turned out for me:"
  mdcn: "## 训练与验证准确率\n\n通过调用分类器的 `predict` 方法来进行预测。对于每个输入，`predict` 会返回一个概率数组——每个类别对应一个概率。预测的类别是被赋予最高概率的那个。在此示例中，紫色数据点代表类别\
    \ 0，浅蓝色代表类别 1，灰褐色代表类别 2，红色代表类别 3。现在要求网络对位于 (0.2, 0.8) 的点进行分类：\n\n```\nmodel.predict(np.array([[0.2,\
    \ 0.8]]))\n```\n\n答案是一个包含四个概率的数组，按顺序对应类别 0、1、2 和 3：\n\n```\n[2.1877741e-02, 5.3804164e-05,\
    \ 5.0240371e-02, 9.2782807e-01]\n```\n\n网络预测 (0.2, 0.8) 对应类别 0 的概率为 2%，对应类别 1\
    \ 的概率为 0%，对应类别 2 的概率为 5%，对应类别 3 的概率为 93%。从图上看，这似乎是一个合理的答案。\n\n如果你只想知道该点属于哪个类别，可以这样做：\n\
    \n```\nnp.argmax(model.predict(np.array([[0.2, 0.8]])), axis=1)\n```\n\n答案是 3，对应红色。Keras\
    \ 的旧版本包含一个 `predict_classes` 方法，无需调用 `argmax` 即可完成相同操作，但该方法已被弃用并移除。\n\n> **注意**\n\
    \nKeras 还包含一个名为 `categorical_crossentropy` 的损失函数，常用于多类别分类。它的工作方式类似于 `sparse_categorical_crossentropy`，但要求标签是独热编码的。例如，你不是向\
    \ `fit` 传递一个包含 0 到 3 值的标签列，而是传递四个包含 0 和 1 的列。Keras 提供了一个名为 `to_categorical` 的实用函数来进行编码。但是，如果你使用\
    \ `sparse_categorical_crossentropy`，则可以直接使用标签列。\n\n## 训练神经网络识别人脸\n\n第 5 章记录了训练支持向量机识别人脸的步骤。现在让我们训练一个神经网络来完成同样的任务。我们将使用与之前相同的数据集：Labeled\
    \ Faces in the Wild (LFW) 数据集，它包含超过 13,000 张名人的面部图像，并作为示例数据集内置于 Scikit 中。回想一下，在数据集代表的\
    \ 5,000 多人中，有 1,680 人拥有两张或更多面部图像，而只有 5 人拥有 100 张或更多。我们将设置每人最少面部图像数为 100，这意味着将导入对应五位名人的五组面部图像。\n\
    \n首先创建一个新的 Jupyter notebook，并使用以下语句加载数据集：\n\n```\nimport pandas as pd\nfrom sklearn.datasets\
    \ import fetch_lfw_people\n\nfaces = fetch_lfw_people(min_faces_per_person=100)\n\
    image_count = faces.images.shape[0]\nimage_height = faces.images.shape[1]\nimage_width\
    \ = faces.images.shape[2]\nclass_count = len(faces.target_names)\n\nfaces = fetch_lfw_people(min_faces_per_person=100)\n\
    print(faces.target_names)\nprint(faces.images.shape)\n```\n\n总共加载了 1,140 张面部图像。每张图像尺寸为\
    \ 47 × 62 像素。使用以下代码显示数据集中的前 24 张图像以及这些面部所属的人物：\n\n```\n%matplotlib inline\nimport\
    \ matplotlib.pyplot as plt\n\nfig, ax = plt.subplots(3, 8, figsize=(18, 10))\n\
    for i, axi in enumerate(ax.flat):\n    axi.imshow(faces.images[i], cmap='gist_gray')\n\
    \    axi.set(xticks=[], yticks=[], xlabel=faces.target_names[faces.target[i]])\n\
    ```\n\n通过生成直方图检查数据集的平衡性，显示为每个人导入了多少张面部图像：\n\n```\nfrom collections import Counter\n\
    import seaborn as sns\nsns.set()\n\ncounts = Counter(faces.target)\nnames = {}\n\
    \nfor key in counts.keys():\n    names[faces.target_names[key]] = counts[key]\n\
    \ndf = pd.DataFrame.from_dict(names, orient='index')\ndf.plot(kind='bar')\n```\n\
    \n数据集中乔治·W·布什的图像数量远多于其他人。分类模型最好在平衡的数据集上进行训练。使用以下代码将数据集缩减为每人 100 张图像：\n\n```\n\
    import numpy as np\n\nmask = np.zeros(faces.target.shape, dtype=bool)\n\nfor target\
    \ in np.unique(faces.target):\n    mask[np.where(faces.target == target)[0][:100]]\
    \ = 1\n\nx_faces = faces.data[mask]\ny_faces = faces.target[mask]\nx_faces.shape\n\
    ```\n\nx_faces 包含 500 张面部图像，y_faces 包含对应的标签：0 代表科林·鲍威尔，1 代表唐纳德·拉姆斯菲尔德，依此类推。\n\n\
    下一步是将像素值除以 255。之后，将数据分为训练集和测试集。我们将留出 20% 的数据用于测试，让 Keras 在训练期间用它来验证模型，之后再用它通过混淆矩阵评估结果：\n\
    \n```\nfrom sklearn.model_selection import train_test_split\n\nface_images = x_faces\
    \ / 255\nx_train, x_test, y_train, y_test = train_test_split(face_images, y_faces,\n\
    \                                                    train_size=0.8,\n       \
    \                                             stratify=y_faces,\n            \
    \                                        random_state=0)\n```\n\n> **注意**\n\n\
    为什么要将像素值除以 255？神经网络通常在归一化数据上训练得更好，而除以 255 是一种简单的像素值归一化方法。使用 Scikit 的 `StandardScaler`\
    \ 类来应用单位方差也很常见，有时网络那样训练效果更好。唯一的办法就是尝试。在这个例子中，我两种方法都试过，发现结果大致相同。\n\n创建一个包含一个隐藏层（512\
    \ 个神经元）的神经网络。由于这是一个多类别分类任务，使用 `sparse_categorical_crossentropy` 作为损失函数，并在输出层使用\
    \ `softmax` 作为激活函数：\n\n```\nfrom tensorflow.keras.layers import Dense\nfrom tensorflow.keras.models\
    \ import Sequential\n\nmodel = Sequential()\nmodel.add(Dense(512, activation='relu',\n\
    \                input_shape=(image_width * image_height,)))\nmodel.add(Dense(class_count,\
    \ activation='softmax'))\nmodel.compile(optimizer='adam', loss='sparse_categorical_crossentropy',\n\
    \              metrics=['accuracy'])\nmodel.summary()\n```\n\n现在训练网络：\n\n```\n\
    hist = model.fit(x_train, y_train, validation_data=(x_test, y_test),\n       \
    \           epochs=100, batch_size=20)\n```\n\n绘制训练和验证准确率：\n\n```\nacc = hist.history['accuracy']\n\
    val_acc = hist.history['val_accuracy']\nepochs = range(1, len(acc) + 1)\n\nplt.plot(epochs,\
    \ acc, '-', label='Training Accuracy')\nplt.plot(epochs, val_acc, ':', label='Validation\
    \ Accuracy')\nplt.title('Training and Validation Accuracy')\nplt.xlabel('Epoch')\n\
    plt.ylabel('Accuracy')\nplt.legend(loc='lower right')\nplt.plot()\n```\n\n最后，使用混淆矩阵可视化网络在测试数据上的表现：\n\
    \n```\nfrom sklearn.metrics import ConfusionMatrixDisplay as cmd\n\nsns.reset_orig()\n\
    y_pred = model.predict(x_test)\nfig, ax = plt.subplots(figsize=(5, 5))\nax.grid(False)\n\
    \ncmd.from_predictions(y_test, y_pred.argmax(axis=1),\n                      display_labels=faces.target_names,\
    \ colorbar=False,\n                      cmap='Blues', xticks_rotation='vertical',\
    \ ax=ax)\n```\n\n模型正确识别乔治·W·布什多少次？有多少次将他识别为其他人？如果隐藏层使用 128 个神经元，网络的准确率会和使用 512\
    \ 个神经元时一样高吗？\n\n## Dropout\n\n任何机器学习模型的目标都是做出准确的预测。在理想情况下，训练神经网络后期，训练准确率和验证准确率之间的差距应接近\
    \ 0。但在现实中，这种情况很少发生。上一节中模型的训练准确率接近 100%，但验证准确率可能在 80% 到 85% 之间达到峰值。这意味着模型的泛化能力不如你期望的那样好。它很好地学习了训练数据，但当遇到未见过的数据（验证数据）时，表现不佳。这可能是模型过拟合的迹象。最终，重要的不是训练准确率，而是模型对新数据的响应准确度。\n\
    \n对抗过拟合的一种方法是减少网络的深度、单个层的宽度，或两者兼有。更少的神经元意味着更少的可训练参数，更少的参数使得网络更难过度拟合训练数据。\n\n另一种防止过拟合的方法是在网络中引入\
    \ *dropout*。Dropout 在训练过程中随机丢弃层之间的连接，以防止网络过度学习训练数据。这就像读一本书但跳过每隔一页，希望你能学到高级概念而不被细节困住。Dropout\
    \ 在 2014 年一篇题为“Dropout: A Simple Way to Prevent Neural Networks from Overfitting”的论文中被提出。\n\

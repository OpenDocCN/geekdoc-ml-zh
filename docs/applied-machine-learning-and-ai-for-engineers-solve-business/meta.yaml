    \ activation='softmax'))\nmodel.compile(optimizer='adam', loss='sparse_categorical_crossentropy',\n\
    \              metrics=['accuracy'])\nmodel.summary(line_length=80)\n```\n\nFigure\
    \ 10-8 shows the output from the call to summary on the final line. The summary\
    \ reveals a lot about how this CNN processes images. Each pooling layer reduces\
    \ the image size by half, while each convolution layer reduces the image’s height\
    \ and width by two pixels. Why is that? By default, a convolution kernel doesn’t\
    \ start with its center cell over the pixel in the upper-left corner of the image;\
    \ rather, its upper-left corner is aligned with the image’s upper-left corner.\
    \ For a 3 × 3 kernel, there’s a 1-pixel-wide border around the edges that doesn’t\
    \ survive the convolution. (For a 5 × 5 kernel, the border that doesn’t survive\
    \ is 2 pixels wide.) The term for this is padding, and if you’d like, you can\
    \ override the default behavior to push the kernel’s center cell right up to the\
    \ edges of the image. In Keras, this is accomplished by including a padding='same'\
    \ parameter in the call to Conv2D."

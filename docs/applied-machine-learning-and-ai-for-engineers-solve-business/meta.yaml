    \ Requests to Azure Cognitive Services”.\n\n# Calling Azure Cognitive Services\
    \ APIs\n\nOnce you have a subscription key and endpoint, you’re ready to roll.\
    \ Here’s a snippet of Python code that uses the Language service to evaluate “Programming\

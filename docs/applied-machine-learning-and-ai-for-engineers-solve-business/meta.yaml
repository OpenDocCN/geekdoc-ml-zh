- md: '## Decision Trees


    Decision trees are built by recursively splitting the training data. The fundamental
    decisions that the splitting algorithm makes when it adds a node to the tree are
    1) which column will this node split, and 2) what is the value that the split
    is based upon. In each iteration, the goal is to select a column and split value
    that does the most to reduce the “impurity” of the remaining data for classification
    problems or the variance of the remaining data for regression problems. A common
    impurity measure for classifiers is Gini, which roughly quantifies the percentage
    of samples that a split value would misclassify. For regressors, the sum of the
    squared error or absolute error, where “error” is the difference between the split
    value and the values on either side of the split, is typically used instead. The
    tree-building process starts at the root node and works its way recursively downward
    until the tree is fully leafed out or external constraints (such as a limit on
    maximum depth) prevent further growth.


    Scikit’s `DecisionTreeRegressor` class and `DecisionTreeClassifier` class make
    building decision trees easy. Each implements the well-known CART algorithm for
    building binary trees, and each lets you choose from a handful of criteria for
    measuring impurity or variance. Each also supports parameters such as `max_depth`,
    `min_samples_split`, and `min_samples_leaf` that let you constrain a decision
    tree’s growth. If you accept the default values, building a decision tree can
    be as simple as this:


    ```

    model = DecisionTreeRegressor()

    model.fit(x, y)

    ```


    Decision trees are nonparametric. Training a decision tree model involves building
    a binary tree, not fitting an equation to a dataset. This means data used to build
    a decision tree doesn’t have to be normalized.


    Decision trees have a big upside: they work as well with nonlinear data as they
    do with linear data. In fact, they largely don’t care how the data is shaped.
    But there’s a downside too. It’s a big one, and it’s one of the reasons standalone
    decision trees are rarely used in machine learning. That reason is overfitting.


    Decision trees are highly prone to overfitting. If allowed to grow large enough,
    a decision tree can essentially memorize the training data. It might *appear*
    to be accurate, but if it’s fit too tightly to the training data, it might not
    *generalize* well. That means it won’t be as accurate when it’s asked to make
    predictions with data it hasn’t seen before. Figure 2-5 shows a decision tree
    fit to the income-versus-experience dataset with no constraints on depth. The
    jagged path followed by the red line as it passes through all the points is a
    clear sign of overfitting. Overfitting is the bane of data scientists. The only
    thing worse than a model that’s inaccurate is one that appears to be accurate
    but in reality is not.


    One way to prevent overfitting when using decision trees is to constrain their
    growth so that they *can’t* memorize the training data. Another way is to use
    groups of decision trees called *random forests*.


    ## Random Forests


    A *random forest* is a collection of decision trees (often hundreds of them),
    each trained differently on the same data, as depicted in Figure 2-6. Typically,
    each tree is trained on randomly selected rows in the dataset, and branching is
    based on columns that are randomly selected at every split. The model can’t fit
    too tightly to the training data because every tree trains on a different subset
    of the data. The trees are built independently, and when the model makes a prediction,
    it runs the input through all the decision trees and averages the result. Because
    the trees are constructed independently, training can be parallelized on hardware
    that supports it.


    It’s a simple concept, and one that works well in practice. Random forests can
    be used for both regression and classification, and Scikit provides classes such
    as `RandomForestRegressor` and `RandomForestClassifier` to help out. They feature
    a number of tunable parameters, including `n_estimators`, which specifies the
    number of trees in the random forest (default = 100); `max_depth`, which limits
    the depth of each tree; and `max_samples`, which specifies the fraction of the
    rows in the training data used to build individual trees. Figure 2-7 shows how
    `RandomForestRegressor` fits to the income-versus-experience dataset with `max_depth=3`
    and `max_samples=0.5`, meaning no tree sees more than 50% of the rows in the dataset.


    Because decision trees are nonparametric, random forests are nonparametric also.
    And even though Figure 2-7 shows how a random forest fits a linear dataset, random
    forests are perfectly capable of modeling nonlinear datasets too.


    ## Gradient-Boosting Machines


    Random forests are proof of the supposition that you can take many *weak learners*—models
    that by themselves are not strong predictors—and combine them to form accurate
    models. No individual tree in a random forest can predict an outcome with a great
    deal of accuracy. But put all the trees together and average the results and they
    often outperform other models. Data scientists refer to this as *ensemble modeling*
    or *ensemble learning*.


    Another way to exploit ensemble modeling is **gradient boosting**. Models that
    use it are called *gradient-boosting machines*, or GBMs. Most GBMs use decision
    trees and are sometimes referred to as *gradient-boosted decision trees* (GBDTs).
    Like random forests, GBDTs comprise collections of decision trees. But rather
    than build independent decision trees from random subsets of the data, GBDTs build
    *dependent* decision trees, one after another, training each using output from
    the last. The first decision tree models the dataset. The second decision tree
    models the error in the output from the first, the third models the error in the
    output from the second, and so on. To make a prediction, a GBDT runs the input
    through each decision tree and sums all the outputs to arrive at a result. With
    each addition, the result becomes slightly more accurate, giving rise to the term
    *additive modeling*. It’s like driving a golf ball down the fairway and hitting
    successively shorter shots until you finally reach the hole.


    Each decision tree in a GBDT model is a weak learner. In fact, GBDTs typically
    use *decision tree stumps*, which are decision trees with depth 1 (a root node
    and two child nodes), as shown in **Figure 2-8**. During training, you start by
    taking the mean of all the target values in the training data to create a baseline
    for predictions. Then you subtract the mean from the target values to generate
    a new set of target values or *residuals* for the first tree to predict. After
    training the first tree, you run the input through it to generate a set of predictions.
    Then you add the predictions to the previous set of predictions, generate a new
    set of residuals by subtracting the sum from the original (actual) target values,
    and train a second tree to predict those residuals. Repeating this process for
    *n* trees, where *n* is typically 100 or more, produces an ensemble model. To
    help ensure that each decision tree is a weak learner, GBDT models multiply the
    output from each decision tree by a *learning rate* to reduce their influence
    on the outcome. The learning rate is usually a small number such as 0.1 and is
    a parameter that you can specify when using classes that implement GBMs.


    Scikit includes classes named `GradientBoostingRegressor` and `GradientBoostingClassifier`
    to help you build GBDTs. But if you really want to understand how GBDTs work,
    you can build one yourself with Scikit’s `DecisionTreeRegressor` class. The code
    in **Example 2-1** implements a GBDT with 100 decision tree stumps and predicts
    the annual income of a programmer with 10 years of'
  mdcn: '## 决策树


    决策树是通过递归地分割训练数据构建的。分割算法在向树中添加节点时做出的基本决策是：1) 该节点将分割哪一列，以及 2) 分割所依据的值是什么。在每次迭代中，目标是选择一个列和分割值，以最大程度地减少分类问题中剩余数据的“不纯度”，或回归问题中剩余数据的方差。分类器常用的不纯度度量是基尼系数，它大致量化了分割值会错误分类的样本百分比。对于回归器，通常使用平方误差或绝对误差的总和，其中“误差”是分割值与分割两侧值之间的差异。


    树构建过程从根节点开始，递归地向下进行，直到树完全长满叶子，或者外部约束（如最大深度限制）阻止其进一步增长。


    Scikit 的 `DecisionTreeRegressor` 类和 `DecisionTreeClassifier` 类使得构建决策树变得简单。每个类都实现了著名的
    CART 算法来构建二叉树，并且每个类都允许你从少数几个用于衡量不纯度或方差的标准中进行选择。每个类还支持诸如 `max_depth`、`min_samples_split`
    和 `min_samples_leaf` 等参数，这些参数允许你约束决策树的增长。如果你接受默认值，构建决策树可以像这样简单：


    ```

    model = DecisionTreeRegressor()

    model.fit(x, y)

    ```


    决策树是非参数的。训练决策树模型涉及构建一棵二叉树，而不是将方程拟合到数据集。这意味着用于构建决策树的数据不必进行归一化。


    决策树有一个很大的优点：它们处理非线性数据的效果与处理线性数据一样好。事实上，它们在很大程度上不关心数据的形状。但也有一个缺点。这是一个很大的缺点，也是独立决策树在机器学习中很少被使用的原因之一。这个原因就是过拟合。


    决策树非常容易过拟合。如果允许其生长得足够大，决策树本质上可以记住训练数据。它可能*看起来*很准确，但如果它与训练数据拟合得太紧密，它可能无法很好地*泛化*。这意味着当它被要求对未见过的数据进行预测时，其准确性会降低。图
    2-5 显示了一个对收入与经验数据集拟合的决策树，没有深度限制。红线穿过所有点时所遵循的锯齿状路径是过拟合的明显标志。过拟合是数据科学家的噩梦。唯一比模型不准确更糟糕的是，模型看起来准确但实际上并非如此。


    在使用决策树时，防止过拟合的一种方法是约束其增长，使其*无法*记住训练数据。另一种方法是使用称为*随机森林*的决策树集合。


    ## 随机森林


    *随机森林*是决策树的集合（通常有数百棵），每棵树都在相同的数据上以不同的方式进行训练，如图 2-6 所示。通常，每棵树都在数据集中随机选择的行上进行训练，并且分支基于在每次分割时随机选择的列。模型无法与训练数据拟合得太紧密，因为每棵树都在数据的不同子集上进行训练。这些树是独立构建的，当模型进行预测时，它会将输入通过所有决策树并平均结果。由于这些树是独立构建的，训练可以在支持并行化的硬件上进行。


    这是一个简单的概念，并且在实践中效果良好。随机森林可用于回归和分类，Scikit 提供了诸如 `RandomForestRegressor` 和 `RandomForestClassifier`
    等类来提供帮助。它们具有许多可调参数，包括 `n_estimators`（指定随机森林中树的数量，默认值 = 100）、`max_depth`（限制每棵树的深度）和
    `max_samples`（指定用于构建单个树的训练数据行的比例）。图 2-7 显示了 `RandomForestRegressor` 在 `max_depth=3`
    和 `max_samples=0.5` 的情况下如何拟合收入与经验数据集，这意味着没有一棵树看到超过数据集中 50% 的行。


    由于决策树是非参数的，随机森林也是非参数的。即使图 2-7 显示了随机森林如何拟合线性数据集，随机森林也完全能够建模非线性数据集。


    ## 梯度提升机


    随机森林证明了这样一个假设：你可以将许多*弱学习器*——本身不是强预测器的模型——组合起来形成准确的模型。随机森林中的任何单棵树都无法以很高的准确性预测结果。但是将所有树放在一起并平均结果，它们通常优于其他模型。数据科学家将此称为*集成建模*或*集成学习*。


    利用集成建模的另一种方式是**梯度提升**。使用它的模型称为*梯度提升机*，或 GBMs。大多数 GBMs 使用决策树，有时被称为*梯度提升决策树*（GBDTs）。与随机森林一样，GBDTs
    由决策树集合组成。但 GBDTs 不是从数据的随机子集构建独立的决策树，而是构建*依赖*的决策树，一棵接一棵地构建，每棵树都使用上一棵树的输出进行训练。第一棵决策树对数据集进行建模。第二棵决策树对第一棵树输出的误差进行建模，第三棵对第二棵树输出的误差进行建模，依此类推。为了进行预测，GBDT
    将输入通过每棵决策树，并将所有输出相加得到结果。随着每次添加，结果变得稍微更准确，从而产生了*加性建模*这个术语。这就像将高尔夫球击向球道，然后连续击打越来越短的击球，直到最终到达球洞。


    GBDT 模型中的每棵决策树都是一个弱学习器。事实上，GBDTs 通常使用*决策树桩*，即深度为 1（一个根节点和两个子节点）的决策树，如**图 2-8**
    所示。在训练过程中，你首先取训练数据中所有目标值的平均值，作为预测的基线。然后，你从目标值中减去平均值，生成一组新的目标值或*残差*，供第一棵树预测。训练完第一棵树后，你将输入通过它以生成一组预测。然后，你将预测添加到之前的预测集中，通过从原始（实际）目标值中减去总和来生成一组新的残差，并训练第二棵树来预测这些残差。对
    *n* 棵树重复此过程（其中 *n* 通常为 100 或更多）会产生一个集成模型。为了帮助确保每棵决策树都是一个弱学习器，GBDT 模型将每棵决策树的输出乘以一个*学习率*，以减少它们对结果的影响。学习率通常是一个小数字，例如
    0.1，这是在使用实现 GBMs 的类时可以指定的一个参数。


    Scikit 包含名为 `GradientBoostingRegressor` 和 `GradientBoostingClassifier` 的类，以帮助你构建
    GBDTs。但如果你真的想了解 GBDTs 的工作原理，你可以使用 Scikit 的 `DecisionTreeRegressor` 类自己构建一个。**示例
    2-1** 中的代码实现了一个包含 100 个决策树桩的 GBDT，并预测了一位拥有 10 年经验的程序员的年收入。'

    # # Chapter 14. Azure Cognitive Services


    As a child growing up in the 1960s, I idolized the Apollo astronauts. Swaggering
    out to the launch pad and riding flame-breathing rockets into space, they were
    my superheroes. But the group I really wanted to emulate—the people I wanted to
    *be*—were the engineers in Mission Control. Seated in front of their CRT screens
    in white shirts and black ties, chatting with the astronauts and poised to spring
    into action at the first sign of trouble, they were the epitome of cool. They
    used computers less powerful than today’s smartphones to put men on the moon—a
    scientific achievement that is unsurpassed to this day.


    Thanks to deep learning, computers today can perform feats of magic that the engineers
    in Mission Control could only have dreamed of. They can recognize objects in images,
    translate text and speech to other languages, identify people in video feeds,
    turn art into words and words into art, and more. But state-of-the-art deep-learning
    models are too complex—and too costly—for the average engineer or software developer
    to build. Microsoft reportedly spent hundreds of thousands of dollars training
    the ResNet model that won the 2015 ImageNet Large Scale Visual Recognition Challenge.
    Creating that model required a great deal of expertise, massive amounts of GPU
    time, and millions of images.


    A welcome trend in AI today is *AI as a service*. Microsoft, Amazon, Google, and
    other tech giants employ professional data scientists who build sophisticated
    deep-learning models. They train them at their own expense and make them available
    to anyone who wishes to use them by means of [REST APIs](https://docs.microsoft.com/en-us/rest/api/).
    If you can write code to send an HTTP request over the internet, you can leverage
    these APIs to infuse AI into your apps without taking time off from your day job
    to earn a PhD in deep learning.


    Microsoft calls its suite of AI services [Azure Cognitive Services](https://azure.microsoft.com/en-us/services/cognitive-services/).
    Amazon uses the name [AWS AI Services](https://aws.amazon.com/machine-learning/).
    Both offer a rich assortment of APIs served by deep-learning models on the backend—models
    that are continually refined so that they become smarter over time. Need to caption
    photos uploaded to a website? Microsoft’s [Computer Vision service](https://azure.microsoft.com/en-us/services/cognitive-services/computer-vision/)
    can do that; so can Amazon’s [Rekognition service](https://aws.amazon.com/rekognition/).
    How about building a screen reader featuring a lifelike human voice to help the
    hearing impaired? [Amazon Polly](https://aws.amazon.com/polly/) can handle that,
    as can Azure Cognitive Services’ [Speech service](https://azure.microsoft.com/en-us/services/cognitive-services/speech-services/)
    and Google’s [text-to-speech API](https://cloud.google.com/text-to-speech). These
    are just a few examples of the actions cognitive services can perform, often with
    just a few lines of code.


    You saw Azure Cognitive Services at work in [Chapter 12](https://docs.microsoft.com/en-us/learn/)
    when you used the [Custom Vision service](https://azure.microsoft.com/en-us/services/cognitive-services/custom-vision-service/)
    to train a custom object detection model. It’s one of several services that comprise
    the Cognitive Services family. This chapter introduces others and demonstrates
    how to use them and how to build solutions with them. The focus on Azure Cognitive
    Services isn’t meant to imply that they’re better than their counterparts from
    Amazon and Google. I’m simply more familiar with them because I’ve worked closely
    with Microsoft for more than two decades. Once you learn how to call Azure Cognitive
    Services APIs, it’s a simple matter to apply that knowledge to cognitive services
    from other vendors.


    Ready to make some magic happen? Let’s get started.


    # ## Introducing Azure Cognitive Services'

  md: '# # Chapter 4. Text Classification


    One of the more novel uses for binary classification is sentiment analysis, which
    examines a sample of text such as a product review, a tweet, or a comment left
    on a website and scores it on a scale of 0.0 to 1.0, where 0.0 represents negative
    sentiment and 1.0 represents positive sentiment. A review such as “great product
    at a great price” might score 0.9, while “overpriced product that barely works”
    might score 0.1. The score is the probability that the text expresses positive
    sentiment. Sentiment analysis models are difficult to build algorithmically but
    are relatively easy to craft with machine learning. For examples of how sentiment
    analysis is used in business today, see the article “8 Sentiment Analysis Real-World
    Use Cases” by Nicholas Bianchi.


    Sentiment analysis is one example of a task that involves classifying textual
    data rather than numerical data. Because machine learning works with numbers,
    you must convert text to numbers before training a sentiment analysis model, a
    model that identifies spam emails, or any other model that classifies text. A
    common approach is to build a table of word frequencies called a *bag of words*.
    Scikit-Learn provides classes to help. It also includes support for normalizing
    text so that, for example, “awesome” and “Awesome” don’t count as two different
    words.


    This chapter begins by describing how to prepare text for use in classification
    models. After building a sentiment analysis model, you’ll learn about another
    popular learning algorithm called Naive Bayes that works particularly well with
    text and use it to build a model that distinguishes between legitimate emails
    and spam emails. Finally, you’ll learn about a mathematical technique for measuring
    the similarity of two text samples and use it to build an app that recommends
    movies based on other movies you enjoy.


    # ## Preparing Text for Classification


    Before you train a model to classify text, you must convert the text into numbers,
    a process known as *vectorization*. Chapter 1 presented the illustration reproduced
    in Figure 4-1, which demonstrates a common technique for vectorizing text. Each
    row represents a text sample such as a tweet or a movie review, and each column
    represents a word in the training text. The numbers in the rows are word counts,
    and the final number in each row is a label: 0 for negative and 1 for positive.'
  merge: -1
  pgno: 85
- img_proc: true
  md: '![](img/628b9a382d0944bbfa786c66bc651b50_86_0.png)


    Text is typically *cleaned* before it’s vectorized. Examples of cleaning include
    converting characters to lowercase (so, for example, “Excellent” is equivalent
    to “excellent”), removing punctuation symbols, and optionally removing *stop words*—common
    words such as *the* and *and* that are likely to have little impact on the outcome.
    Once cleaned, sentences are divided into individual words (*tokenized*) and the
    words are used to produce datasets like the one in **Figure 4-1**.


    Scikit-Learn has three classes that handle the bulk of the work of cleaning and
    vectorizing text:


    *CountVectorizer*


    Creates a dictionary (*vocabulary*) from the corpus of words in the training text
    and generates a matrix of word counts like the one in **Figure 4-1**


    *HashingVectorizer*


    Uses word hashes rather than an in-memory vocabulary to produce word counts and
    is therefore more memory efficient


    *TfidfVectorizer*


    Creates a dictionary from words provided to it and generates a matrix similar
    to the one in **Figure 4-1**, but rather than containing integer word counts,
    the matrix contains **term frequency-inverse document frequency (TFIDF)** values
    between 0.0 and 1.0 reflecting the relative importance of individual words


    All three classes are capable of converting text to lowercase, removing punctuation
    symbols, removing stop words, splitting sentences into individual words, and more.
    They also support *n-grams*, which are combinations of two or more consecutive
    words (you specify the number *n*) that should be treated as a single word. The
    idea is that words such as *credit* and *score* might be more meaningful if they
    appear next to each other in a sentence than if they appear far apart. Without
    *n-grams*, the relative proximity of words is ignored. The downside to using *n-grams*
    is that it increases memory consumption and training time. Used judiciously, however,
    it can make text classification models more accurate.'

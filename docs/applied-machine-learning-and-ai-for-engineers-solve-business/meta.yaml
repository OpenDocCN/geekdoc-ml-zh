    \ output_dim=32, input_length=100)\n```\n\nIn order, the three parameters passed\
    \ to the `Embedding` function are:\n\n+   - The vocabulary size, or the number\
    \ of words in the vocabulary built by `Tokenizer`\n- The number of dimensions\

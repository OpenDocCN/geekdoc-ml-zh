  md: '# # Chapter 5. Support Vector Machines


    Support vector machines (SVMs) represent the cutting edge of machine learning.
    They are most often used to solve classification problems, but they can also be
    used for regression. Due to the unique way in which they fit mathematical models
    to data, SVMs often succeed at finding separation between classes when other models
    do not. They technically perform binary classification only, but Scikit-Learn
    enables them to do multiclass classification as well using techniques discussed
    in [Chapter 3](Chapter 3).


    Scikit-Learn makes building SVMs easy with classes such as **SVC (short for support
    vector classifier)** for classification models and **SVR (support vector regressor)**
    for regression models. You can use these classes without understanding how SVMs
    work, but you’ll get more out of them if you *do* understand how they work. It’s
    also important to know how to tune SVMs for individual datasets and how to prepare
    data before you train a model. Toward the end of this chapter, we’ll build an
    SVM that performs facial recognition. But first, let’s look behind the scenes
    and discover why SVMs are often the go-to mechanism for modeling real-world datasets.


    # ## How Support Vector Machines Work


    First, why are they called support vector machines? The purpose of an SVM classifier
    is the same as any other classifier: to find a decision boundary that cleanly
    separates the classes. SVMs do this by finding a line in 2D space, a plane in
    3D space, or a hyperplane in higher-dimensional space that allows them to distinguish
    between different classes with the greatest certainty possible. In the example
    in [Figure 5-1](Figure 5-1), there are an infinite number of lines you can draw
    to separate the two classes, but the best line is the one that produces the widest
    margin (the one shown on the right). The width of the margin is the distance between
    the points closest to the boundary in each class along a line perpendicular to
    the boundary. These points are called *support vectors* and are circled in red.


    ![](img/628b9a382d0944bbfa786c66bc651b50_104_0.png)


    Of course, real data rarely lends itself to such clean separation. Overlap between
    classes inevitably prevents a perfect fit. To accommodate this, SVMs support a
    regularization parameter usually referred to as C that can be adjusted to loosen
    or tighten the fit. Lower values of C produce a wider margin with'
  merge: -1
  pgno: 104
- img_proc: true
  md: 'more errors on either side of the decision boundary, as shown in Figure 5-2.
    Higher values yield a tighter fit to the training data with a correspondingly
    thinner margin and fewer errors. If C is *too* high, the model might not generalize
    well. The optimum value varies by dataset. Data scientists typically try different
    values of C to determine which one performs the best against test data.


    All of the aforementioned is true, but none of it explains why SVMs are so good
    at what they do. SVMs aren''t the only models that mathematically look for boundaries
    separating the classes. What makes SVMs special are *kernels*, some of which add
    dimensions to data to find boundaries that don''t exist at lower dimensions. Consider
    Figure 5-3. You can''t draw a line that completely separates the red dots from
    the purple dots. But if you add a third dimension as shown on the right—a z dimension
    whose value is based on a point''s distance from the center—then you can slide
    a plane between the purples and the reds and achieve 100% separation. In this
    example, data that isn''t linearly separable in two dimensions is linearly separable
    in three dimensions. The principle at work is Cover''s theorem, which states that
    data that isn''t linearly separable might be linearly separable if projected into
    higher-dimensional space using a nonlinear transform.


    ![](img/628b9a382d0944bbfa786c66bc651b50_105_0.png)'

    The lineup of services that comprise Azure Cognitive Services changes from time
    to time as new ones are added and old ones are deprecated or matriculated into
    other Microsoft product lines. Figure 14-1 shows the services that are currently
    offered and divides them into four categories: vision, language, speech, and decision.


    ![](img/628b9a382d0944bbfa786c66bc651b50_332_0.png)


    Vision services bring deep neural networks to bear on computer-vision problems.
    The Custom Vision service lets you build custom image classification and object
    detection models. The Face service, which Uber uses to verify the identities of
    its drivers, supports state-of-the-art facial recognition systems. The Computer
    Vision service exposes a rich API featuring a plethora of ways to analyze images
    and extract information from them. One application for it is captioning photos
    and generating keywords characterizing their content. Figure 14-2 shows a web
    app I built called Intellipix. Intellipix captions images uploaded by users and
    stores keywords describing them in a database so that users can easily pull up
    all images containing castles, for example, or photos with water in the foreground
    or background.


    ![](img/628b9a382d0944bbfa786c66bc651b50_332_1.png)


    The language category includes services backed by deep-learning models trained
    to perform natural language processing (NLP). The Language service provides APIs
    for sentiment analysis, named-entity recognition, question answering, key-phrase
    extraction, language understanding, and more. Among its'

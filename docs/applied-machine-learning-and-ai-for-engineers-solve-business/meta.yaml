    \ and the confidence levels assigned to them:\n\n- dune (99.5%)\n- sky (99.2%)\n\
    - outdoor (98.7%)\n- clothing (98.2%)\n- desert (98.1%)\n- sand (97.9%)\n- aeolian\
    \ landform (96.9%)\n- person (96.1%)\n- singing sand (95.8%)\n- erg (94.0%)\n\
    - sahara (93.6%)\n- nature (93.4%)\n- footwear (90.9%)\n- landscape (88.0%)\n\
    - sand dune (83.5%)\n- ground (77.5%)\n\nThe Computer Vision service can also\
    \ detect objects in images. The following statements load an image and show all\
    \ the objects that were detected along with bounding boxes and confidence scores:\n\
    \n```python\nfrom matplotlib.patches import Rectangle\n\ndef annotate_object(name,\
    \ confidence, bbox, min_confidence=0.5):\n    if (confidence > min_confidence):\n\
    \        x, y, w, h = bbox.x, bbox.y, bbox.w, bbox.h\n        rect = Rectangle((x,\
    \ y), w, h, color='red', fill=False, lw=2)\n        ax.add_patch(rect)\n     \
    \   text = f'{name} ({confidence:.1%})'\n        ax.text(x + (w / 2), y, text,\
    \ color='white', backgroundcolor='red',\n                ha='center', va='bottom',\
    \ fontweight='bold',\n                bbox=dict(color='red'))\n\nimage = plt.imread('Data/xian.jpg')\n\
    fig, ax = plt.subplots(figsize=(12, 8),\n                      subplot_kw={'xticks':\
    \ [], 'yticks': []})\nax.imshow(image)\n\nwith open('Data/xian.jpg', mode='rb')\
    \ as image:\n    result = client.detect_objects_in_stream(image)\n\n    for object\
    \ in result.objects:\n        annotate_object(object.object_property, object.confidence,\n\
    \                        object.rectangle)\n```\n\n`detect_objects_in_stream`\
    \ detected the people and the bicycles in the photo, as well as a few other items:\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_342_0.png)\n\nCan the Computer Vision\
    \ service detect faces in photos too? It certainly can. It can also provide information\
    \ about age and gender. The following example annotates the faces in a photo with\
    \ labels denoting age and gender. The `ComputerVisionClient` class lacks a dedicated\
    \ method for detecting faces, but you can call the general-purpose `analyze_image_in_stream`\
    \ method with a `visual_features` parameter requesting facial info:\n\n```python\n\
    from azure.cognitiveservices.vision.computervision.models import VisualFeatureTypes\n\
    \ndef annotate_face(face):\n    x, y = face.face_rectangle.left, face.face_rectangle.top\n\
    \    w, h = face.face_rectangle.width, face.face_rectangle.height\n    rect =\
    \ Rectangle((x, y), w, h, color='red', fill=False, lw=2)\n    ax.add_patch(rect)\n\
    \    text = f'{face.gender} ({face.age})'\n    ax.text(x + (w / 2), y, text, color='white',\
    \ backgroundcolor='red',\n            ha='center', va='bottom', fontweight='bold',\n\
    \            bbox=dict(color='red'))\n\nimage = plt.imread('Data/amsterdam.jpg')\n\
    fig, ax = plt.subplots(figsize=(12, 8), subplot_kw={'xticks': [], 'yticks': []})\n\
    ax.imshow(image)\n\nwith open('Data/amsterdam.jpg', mode='rb') as image:\n   \
    \ result = client.analyze_image_in_stream(\n        image, visual_features=[VisualFeatureTypes.faces])\n\
    \n    for face in result.faces:\n        annotate_face(face)\n```\n\nHere’s the\
    \ output:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_343_0.png)\n\n> **NOTE**\n\
    \nThe Face service can detect faces and identify ages, genders, emotions, facial\
    \ landmarks, and more. It also has methods for comparing facial images, identifying\
    \ faces, and building facial recognition systems. Its API is a superset of the\
    \ Computer Vision service's face API. As a result of Microsoft's [Responsible\
    \ AI initiative](https://learn.microsoft.com/en-us/azure/responsible-ai/), however,\
    \ the Face service is no longer available to the general public. For more information\
    \ about the Face service and how to apply for access to it, refer to \"[What Is\
    \ the Azure Face Service?](https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/face-api)\"\
    .\n\nSuppose you're the proprietor of a public website that accepts photo uploads\
    \ and you'd like to reject photos containing inappropriate content. Called as\
    \ follows, `analyze_image_in_stream` scores a photo for adultness (does the photo\
    \ contain nudity?), raciness (does it contain bare skin?), and goriness (does\
    \ it contain blood and gore?) on a scale of 0.0 to 1.0. Here's how it responds\
    \ to a photo of a young girl cliff-jumping in her bathing suit in Hawaii:\n\n\
    ```python\nimage = plt.imread('Data/maui.jpg')\nfig, ax = plt.subplots(figsize=(12,\
    \ 8), subplot_kw={'xticks': [], 'yticks': []})\nax.imshow(image)\n\nwith open('Data/maui.jpg',\
    \ mode='rb') as image:\n    result = client.analyze_image_in_stream(image,\n \
    \                                           visual_features=[VisualFeatureTypes.adult])\n\
    \nprint(f'Adultness: {result.adult.adult_score}')\nprint(f'Raciness: {result.adult.racy_score}')\n\
    print(f'Goriness: {result.adult.gore_score}')\n\nprint(f'Is adult: {result.adult.is_adult_content}')\n\
    print(f'Is racy: {result.adult.is_racy_content}')\nprint(f'Is gory: {result.adult.is_gory_content}')\n\
    ```\n\nHere’s the output:\n\n```\nAdultness: 0.02214685082435608\nRaciness: 0.4205135107040405\n\
    Goriness: 0.0016634463099762797\nIs adult: False\nIs racy: False\nIs gory: False\n\
    ```\n\n![](img/628b9a382d0944bbfa786c66bc651b50_344_0.png)\n\nThe bikini in the\
    \ photo yielded a moderate raciness score, but one that’s below the threshold\
    \ of 0.5 required for `is_racy_content` to be True. Based on the other scores\
    \ it returned, the Computer Vision service believes that the photo is neither\
    \ “adult” nor gory.\n\nYet another capability that the Computer Vision service\
    \ lends to application developers is using AI to extract text from photos. It’s\
    \ perfect for digitizing printed documents. Here’s an example:\n\n```python\n\
    def draw_box(bbox):\n    vals = bbox.split(',')\n    x = int(vals[0])\n    y =\
    \ int(vals[1])\n    w = int(vals[2])\n    h = int(vals[3])\n    rect = Rectangle((x,\
    \ y), w, h, color='red', fill=False, lw=2)\n    ax.add_patch(rect)\n\nimage =\
    \ plt.imread('Data/1040-es.jpg')\nfig, ax = plt.subplots(figsize=(12, 8), subplot_kw={'xticks':\
    \ [], 'yticks': []})\nax.imshow(image)\n\nwith open('Data/1040-es.jpg', mode='rb')\
    \ as image:\n    result = client.recognize_printed_text_in_stream(image)\n\n \
    \   for region in result.regions:\n        for line in region.lines:\n       \
    \     text = ' '.join([word.text for word in line.words])\n            draw_box(line.bounding_box)\n\
    \            print(text)\n```\n\nHere’s the output, minus all the lines of text\
    \ output by the print statement:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_345_0.png)\n\
    \nThe `recognize_printed_text_in_stream` method only recognizes printed text.\
    \ A related method named `read_in_stream` recognizes handwritten text too. Let’s\
    \ see how it performs on the same scanned document:\n\n```python\nimport time\n\
    from azure.cognitiveservices.vision.computervision.models import OperationStatusCodes\n\
    \ndef draw_box(bbox):\n    x, y  = bbox[0], bbox[1]\n    w = bbox[4] - x\n   \
    \ h = bbox[5] - y\n    rect = Rectangle((x, y), w, h, color='red', fill=False,\
    \ lw=2)\n    ax.add_patch(rect)\n\nimage = plt.imread('Data/1040-es.jpg')\nfig,\
    \ ax = plt.subplots(figsize=(12, 8), subplot_kw={'xticks': [], 'yticks': []})\n\
    ax.imshow(image)\n\nwith open('Data/1040-es.jpg', mode='rb') as image:\n    response\
    \ = client.read_in_stream(image, raw=True)\n\n    location = response.headers[\"\
    Operation-Location\"]\n    opid = location[len(location) - 36:]\n    results =\
    \ client.get_read_result(opid)\n\n    while results.status == OperationStatusCodes.running:\n\
    \        results = client.get_read_result(opid)\n        time.sleep(1)\n\n   \
    \ if results.status == OperationStatusCodes.succeeded:\n        for result in\
    \ results.analyze_result.read_results:\n            for line in result.lines:\n\
    \                draw_box(line.bounding_box)\n                print(line.text)\n\
    ```"

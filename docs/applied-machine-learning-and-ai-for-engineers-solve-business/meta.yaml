    # Support Vector Machines


    I will save a full treatment of support vector machines (SVMs) for [Chapter 5](#),
    but along with GBMs, they represent the cutting edge of statistical machine learning.
    They can often fit models to highly nonlinear datasets that other learning algorithms
    cannot. They’re so important that they merit separate treatment from all other
    algorithms. They work by employing a mathematical device called *kernel tricks*
    to simulate the effect of adding dimensions to data. The idea is that data that
    isn’t separable in *m* dimensions might be separable in *n* dimensions. Here’s
    a quick example.


    The classes in the two-dimensional dataset on the left in [Figure 2-10](#) can’t
    be separated with a line. But if you add a third dimension so that points closer
    to the center have higher *z* values and points farther from the center have lower
    *z* values, as shown on the right, you can slide a plane between the red points
    and the purple points and achieve 100% separation of the classes. That is the
    principle by which SVMs work. It is mathematically complex when generalized to
    work with arbitrary datasets, but it is an extremely powerful technique that is
    vastly simplified by Scikit.


    ![](img/628b9a382d0944bbfa786c66bc651b50_51_0.png)


    SVMs are primarily used for classification, but they can be used for regression
    as well. Scikit includes classes for doing both, including `SVC` for classification
    problems and `SVR` for regression problems. You will learn all about these classes
    in [Chapter 5](#). For now, drop the term *support vector machine* at the next
    machine learning gathering you attend and you will instantly become the life of
    the party.



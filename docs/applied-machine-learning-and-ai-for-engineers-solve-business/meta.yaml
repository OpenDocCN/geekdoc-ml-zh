  md: "And with that, transfer learning is complete. All that remains is to put it\
    \ in practice.\n\n# Using Transfer Learning to Identify Arctic Wildlife\n\nLet’s\
    \ use transfer learning to solve the same problem that we attempted to solve earlier\
    \ with a scratch-built CNN: building a model that determines whether a photo contains\
    \ an Arctic fox, a polar bear, or a walrus.\n\nCreate a Jupyter notebook and use\
    \ the same code you used earlier to load the training and test images and assign\
    \ labels to them: 0 for Arctic foxes, 1 for polar bears, and 2 for walruses. Once\
    \ that’s done, the next step is to preprocess the images. We’ll use ResNet50V2\
    \ as our pretrained CNN, so use the ResNet version of `preprocess_input` to preprocess\
    \ the pixels. Then divide the pixel values by 255:\n\n```\nimport numpy as np\n\
    from tensorflow.keras.applications.resnet50 import preprocess_input\n\nx_train\
    \ = preprocess_input(np.array(x_train)) / 255\nx_test = preprocess_input(np.array(x_test))\
    \ / 255\n\ny_train = np.array(y_train)\ny_test = np.array(y_test)\n```\n\nThe\
    \ next step is to load ResNet50V2, being careful to load the bottleneck layers\
    \ but *not* the classification layers, and use it to extract features from the\
    \ training and test images:\n\n```\nfrom tensorflow.keras.applications import\
    \ ResNet50V2\n\nbase_model = ResNet50V2(weights='imagenet', include_top=False)\n\
    \nx_train = base_model.predict(x_train)\nx_test = base_model.predict(x_test)\n\
    ```\n\nNow train a neural network to classify features extracted from the training\
    \ images:\n\n```\nfrom tensorflow.keras.models import Sequential\nfrom tensorflow.keras.layers\
    \ import Flatten, Dense\n\nmodel = Sequential()\nmodel.add(Flatten())\nmodel.add(Dense(1024,\
    \ activation='relu'))\nmodel.add(Dense(3, activation='softmax'))\nmodel.compile(optimizer='adam',\
    \ loss='sparse_categorical_crossentropy',\n              metrics=['accuracy'])\n\
    \nhist = model.fit(x_train, y_train,\n                 validation_data=(x_test,\
    \ y_test),\n                 batch_size=10, epochs=10)\n```\n\nHow well did the\
    \ network train? Plot the training accuracy and validation accuracy for each epoch:\n\
    \n```\nimport seaborn as sns\n```"

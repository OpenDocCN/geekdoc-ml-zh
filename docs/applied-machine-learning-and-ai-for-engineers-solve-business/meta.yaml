    # Understanding CNNs


    Figure 10-2 shows the topology of a basic CNN. It begins with one or more sets
    of *convolution layers* and *pooling layers*. Convolution layers extract features
    from images, generating transformed images that are commonly referred to as *feature
    maps* because they highlight distinguishing features such as shapes and contours.
    Pooling layers reduce the feature maps’ size by half so that features can be extracted
    at various resolutions and are less sensitive to small changes in position. Output
    from the final pooling layer is flattened to one dimension and input to one or
    more dense layers for classification. The convolution and pooling layers are called
    *bottleneck layers* since they reduce the dimensionality of images input to them.
    They also account for the bulk of the computation time during training.


    Convolution layers extract features from images by passing convolution kernels
    over them—the same technique used by image editing tools to blur, sharpen, and
    emboss images. A kernel is simply a matrix of values. It usually measures 3 ×
    3, but it can be larger. To process an image, you place the kernel in the upper-left
    corner of the image, multiply the kernel values by the pixel values underneath,
    and compute a new value for the center pixel by summing the products, as shown
    in Figure 10-3. Then you move the kernel one pixel to the right and repeat the
    process, continuing row by row and column by column until the entire image has
    been processed.


    ![](img/628b9a382d0944bbfa786c66bc651b50_206_0.png)'
  merge: -1
  pgno: 206
- img_proc: true
  md: '![](img/628b9a382d0944bbfa786c66bc651b50_207_0.png)


    Figure 10-4 shows what happens when you apply a 3 × 3 kernel to a hot dog image.
    This particular kernel is called a *bottom Sobel kernel*, and it’s designed to
    do edge detection by highlighting edges as if a light were shined from the bottom.
    The convolution layers of a CNN use kernels like this one to extract features
    that help distinguish one class from another.


    ![](img/628b9a382d0944bbfa786c66bc651b50_207_1.png)


    A convolution layer doesn’t use just one kernel to process images. It uses many—sometimes
    100 or more. The kernel values aren’t determined ahead of time. They are initialized
    with random values and then learned (adjusted) as the CNN is trained, just as
    the weights connecting neurons in dense layers are learned. Each kernel also has
    a bias associated with it, just like a neuron in a dense layer. The images in
    Figure 10-5 were generated by the first convolution layer in a trained CNN. You
    can see how the various convolution kernels allow the network to view the same
    hot dog image in different ways, and how certain features such as the shape of
    the bun and the ribbon of mustard on top are highlighted.


    ![](img/628b9a382d0944bbfa786c66bc651b50_207_2.png)'
  merge: -1
  pgno: 207
- img_proc: true
  md: '**Pooling layers** downsample images to reduce their size. The most common
    resizing technique is *max pooling*, which divides images into 2 × 2 blocks of
    pixels and selects the highest of the four values in each block. An alternative
    is *average pooling*, which averages the values in each block.


    Figure 10-6 shows how an image contracts as it passes through successive pooling
    layers. The first row came from the first pooling layer, the second row came from
    the second pooling layer, and so on.


    ![](img/628b9a382d0944bbfa786c66bc651b50_208_0.png)


    Pooling isn’t the only way to downsize an image. While less common, reduction
    can be accomplished without pooling layers by setting a convolution layer’s stride
    to 2. *Stride* is the number of pixels a convolution kernel moves as it passes
    over an image. It defaults to 1, but setting it to 2 halves the image size by
    ignoring every other row and every other column of pixels.


    The dense layers at the end of the network classify features extracted from the
    bottleneck layers and are referred to as the CNN’s *classification layers*. They
    are no different than the multilayer perceptrons featured in Chapter 9. For binary
    classification, the output layer contains one neuron and uses the `sigmoid` activation
    function. For multiclass classification, the output layer contains one neuron
    per class and uses the `softmax` activation function.


    > **NOTE**


    There’s no law that says bottleneck layers *have* to be paired with classification
    layers. You could take the feature maps output from the bottleneck layers and
    classify them with a support vector machine rather than a multilayer perceptron.
    It’s not as far-fetched as it sounds. In Chapter 12, I’ll introduce one well-known
    model that does just that.


    # ## Using Keras and TensorFlow to Build CNNs


    To simplify building CNNs that classify images, Keras offers the `Conv2D` class,
    which models convolution layers, and the `MaxPooling2D` class, which implements
    max pooling layers. The following statements create a CNN with two pairs of convolution
    and pooling layers, a flatten layer to reshape the output into a 1D array for
    input to a dense layer, a dense layer to classify the features extracted from
    the bottleneck layers, and a softmax output layer for classification:


    ```

    python

    from tensorflow.keras.models import Sequential

    from tensorflow.keras.layers import Conv2D, MaxPooling2D, Flatten, Dense


    model = Sequential()

    ```'

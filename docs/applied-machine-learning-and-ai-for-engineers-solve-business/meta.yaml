  - '[PAGE 62]


    regression will predict that the sample corresponds to class 1. Despite the name,
    logistic regression is a *classification* algorithm, not a regression algorithm.
    Its purpose is not to create regression models but to quantify probabilities for
    the purpose of classifying input samples.


    As an example, consider the data points in Figure 3-1, which belong to two classes:
    0 (blue) and 1 (red). Let’s assume that the x-axis specifies the number of hours
    a person studied for an exam and the y-axis indicates whether they passed (1)
    or failed (0). The blues fall in the range $x = 0$ to $x = 10$, while the reds
    fall in the range $x = 5$ to $x = 15$. You can’t pick a value for $x$ that separates
    the classes since both have values between $x = 5$ and $x = 10$. (Try drawing
    a vertical line that has only reds on one side and only blues on the other.) But
    you *can* draw a curve that, given an $x$, shows the probability that a point
    with that $x$ belongs to class 1. As $x$ increases, so too does the likelihood
    that the point represents class 1 (pass) rather than class 0 (fail). From the
    curve, you can see that if $x = 2$, there is less than a 5% chance that the point
    corresponds to class 1. But if $x = 10$, there is about a 76% chance that it’s
    class 1. If asked to classify that point as a red or a blue, you would conclude
    that it’s a red because it’s much more likely to be red than blue.


    ![](img/628b9a382d0944bbfa786c66bc651b50_62_0.png)


    The curve in Figure 3-1 is a *sigmoid curve*. It charts a function known as the
    *logistic function* (also known as the *logit function*) that has been used in
    statistics for decades. For logistic regression, the function is defined this
    way, where $x$ is the input value and $m$ and $b$ are parameters learned during
    training:


    ```

    $$y = \frac{1}{1+e^{-(mx+b)}}$$

    ```


    This equation reveals why logistic regression is called logistic *regression*,
    despite the fact that it’s a classification algorithm. The exponent of $e$ happens
    to be the equation for linear regression.


    The logistic regression learning algorithm fits the logistic function to a distribution
    of data and uses the resulting $y$ values as probabilities to classify data points.
    It works with any number of features (not just'
  - '[PAGE 63]


    x, but $x_1$, $x_2$, $x_3$, and so on), and it is a parametric learning algorithm
    since it uses training data to find optimum values for $m$ and $b$. *How* it finds
    the optimum values is an implementational detail that libraries such as Scikit-Learn
    handle for you. Scikit defaults to a numerical optimization algorithm known as
    *Limited-memory Broyden–Fletcher–Goldfarb–Shanno* (L-BFGS) but supports other
    optimization methods as well. This, incidentally, is one reason why Scikit is
    so popular in the machine learning community. It’s not difficult to calculate
    $m$ and $b$ from the training data for a linear regression model, but it’s harder
    to do it for a logistic regression model, not to mention more sophisticated parametric
    models such as support vector machines.


    Scikit’s `LogisticRegression` class is logistic regression in a box. With it,
    training a logistic regression model can be as simple as this:


    ```

    model = LogisticRegression()

    model.fit(x, y)

    ```


    Once the model is trained, you can call its `predict` method to predict which
    class the input belongs to, or its `predict_proba` method to get the computed
    probabilities for each class. If you fit a `LogisticRegression` model to the dataset
    in Figure 3-1, the following statement predicts whether $x = 10$ corresponds to
    class 0 or class 1:


    ```

    predicted_class = model.predict([[10.0]])[0]

    print(predicted_class) # Outputs 1

    ```


    And these statements show the probabilities computed for each class:


    ```

    predicted_probabilities = model.predict_proba([[10.0]])[0]

    print(f''Class 0: {predicted_probabilities[0]}'') # 0.23508543966167028

    print(f''Class 1: {predicted_probabilities[1]}'') # 0.7649145603383297

    ```


    Scikit also includes the `LogisticRegressionCV` class for training logistic regression
    models with built-in cross-validation. (If you need a refresher, cross-validation
    was introduced in Chapter 2.) At the expense of additional training time, the
    following statements train a logistic regression model using five folds:


    ```

    model = LogisticRegressionCV(cv=5)

    model.fit(x, y)

    ```


    Logistic regression is technically a binary classification algorithm, but it can
    be used for multiclass classification too. I’ll say more about this toward the
    end of the chapter. For now, think of logistic regression as a machine learning
    algorithm that uses the well-known logistic function to quantify the probability
    that an input corresponds to each of two classes, and you’ll have an accurate
    conceptual understanding of what logistic regression is.


    # Accuracy Measures for Classification Models


    You can quantify the accuracy of a classification model the same way you do for
    a regression model: by'
  - '[PAGE 64]


    calling the model’s score method. For a classifier, score returns the sum of the
    true positives and the true negatives divided by the total number of samples.
    If the test data includes 10 positives (samples of class 1) and 10 negatives (samples
    of class 0) and the model correctly identifies 8 of the positives and 7 of the
    negatives, then the score is (8 + 7) / 20, or 0.75. This is sometimes referred
    to as the model’s *accuracy score*.


    There are many other ways to score a classification model, and which one is “right”
    often depends on how the model will be used. Rather than compute an accuracy score,
    data scientists sometimes measure a classification model’s *precision and recall*
    instead:


    *Precision*


    Computed by dividing the number of true positives by the sum of the true positives
    and false positives


    *Recall*


    Computed by dividing the number of true positives by the sum of the true positives
    and false negatives


    In effect, precision imposes a penalty on false positives (instances in which
    the model incorrectly predicts a 1), while recall penalizes false negatives by
    lowering the score when a model incorrectly predicts a 0.


    Figure 3-2 illustrates the difference. Suppose you train a model to differentiate
    between polar bear images and walrus images, and to test it you submit three polar
    bear images and three walrus images. Furthermore, assume that the model correctly
    classifies two of the polar bear images, but incorrectly classifies two walrus
    images as polar bear images, as indicated by the red boxes. In this case, the
    model’s precision in identifying polar bears is 50% because only two of the four
    images the model classified as polar bears were in fact polar bears. But recall
    is 67% since the model correctly identified two of the three polar bear images.
    That’s precision and recall in a nutshell. The former quantifies how confident
    you can be that a positive prediction is accurate, while the latter quantifies
    the model’s ability to accurately identify positive samples. The two can be combined
    into one score called the *F1 score (also known as the F-score)* using a simple
    formula.


    ![](img/628b9a382d0944bbfa786c66bc651b50_64_0.png)


    Scikit provides helpful functions such as `precision_score`, `recall_score`, and
    `f1_score` for retrieving classification metrics. Whether you prefer precision
    or recall depends on which is higher: the'
  - '[PAGE 65]


    cost of false positives or the cost of false negatives. Use precision when the
    cost of false positives is high—for example, when “positive” means an email is
    spam. You would rather a spam filter send a few spam mails to your inbox than
    route a legitimate (and potentially important) email to your junk folder. By contrast,
    use recall if the cost of false negatives is high. A great example is when using
    machine learning to spot tumors in X-rays and MRI scans. You would much rather
    mistakenly send a patient to a doctor due to a false positive than tell that patient
    there are no tumors when there really are.


    > ### SPOTTING POLAR BEARS IN THE WILD


    The polar bear versus walrus example was taken from a tutorial I wrote for Microsoft
    that began with the following introduction:


    > *You’re the leader of a group of climate scientists who are concerned about
    the dwindling polar bear population in the Arctic. To address the problem, your
    team has placed hundreds of motion-activated cameras at strategic locations throughout
    the region. Instead of manually examining each photo that’s taken to determine
    whether it contains a polar bear, your challenge is to devise an automated system
    that processes data from these cameras in real time and displays an alert on a
    map when one of your cameras photographs a polar bear. You need a solution that
    uses artificial intelligence (AI) to determine with a high degree of accuracy
    whether a photo contains a polar bear. And you need it fast, because climate change
    won’t wait.*


    The tutorial combines several Azure services to form an end-to-end solution, and
    it uses Microsoft’s Power BI for visualizations. If you’re interested, you can
    check it out [online](https://example.com).


    Accuracy score, precision, recall, and F1 score apply to binary classification
    *and* multiclass classification models. An additional metric—one that applies
    to binary classification only—is the *receiver operating characteristic (ROC)
    curve*, which plots the true-positive rate (TPR) against the false-positive rate
    (FPR) at various probability thresholds. A sample ROC curve is shown in Figure
    3-3. A straight line stretching from the lower left to the upper right would indicate
    that the model gets it right just 50% of the time, which is no better than guessing
    for a binary classifier. The more the curve arches toward the upper-left corner,
    the more accurate the model. Data scientists often use the area under the curve
    (AUC, or ROC AUC) as an overall measure of accuracy. Scikit provides a class named
    `RocCurveDisplay` for plotting ROC curves, and a function named `roc_auc_score`
    for retrieving ROC AUC scores. Scores returned by this function are values from
    0.0 to 1.0. The higher the score, the more accurate the model.


    Yet another way to assess the accuracy of a classification model is to plot a
    *confusion matrix* like the one in Figure 3-4. It works for binary and multiclass
    classification, and it shows for each class how the model performed during testing.
    In this example, the model was asked to differentiate between images containing
    masked faces and images containing unmasked faces. It got it right 78 out of 85
    times when presented with pictures of people wearing masks, and 41 out of 58 times
    when presented with pictures of people not wearing masks. Scikit offers a `confusion_matrix`
    function for computing a confusion matrix, and a `ConfusionMatrixDisplay` class
    with methods named `from_estimator` and `from_predictions` for plotting confusion
    matrices.'
- md: '## Categorical Data


    Machine learning finds patterns in numbers. It works *only* with numbers. Yet
    many datasets have columns containing string values such as "male" and "female"
    or "red", "green", and "blue". Data scientists refer to these as *categorical
    values* and the columns that contain them as *categorical columns*. Machine learning
    can''t handle categorical values directly. To use them in a model, you must convert
    them into numbers.


    Two popular techniques exist for converting categorical values into numerical
    values. One is *label encoding*, which you briefly saw in the *k*-means clustering
    example in Chapter 1. Label encoding replaces categorical values with integers.
    If there are three unique values in a column, label encoding replaces them with
    0s, 1s, and 2s. To demonstrate, run the following code in a Jupyter notebook:


    ```python

    import pandas as pd

    from sklearn.preprocessing import LabelEncoder


    data = [[10, ''red''], [20, ''blue''], [12, ''red''], [16, ''green''], [22, ''blue'']]

    df = pd.DataFrame(data, columns=[''Length'', ''Color''])


    encoder = LabelEncoder()

    df[''Color''] = encoder.fit_transform(df[''Color''])

    df.head()

    ```


    This code creates a DataFrame containing a numeric column named Length and a categorical
    column named Color, which contains three different categorical values. Here’s
    what the dataset looks like before encoding:


    | Length | Color |

    |---|---|

    | 10 | red |

    | 20 | blue |

    | 12 | red |

    | 16 | green |

    | 22 | blue |


    And here’s how it looks after the values in the Color column are label-encoded
    using Scikit’s LabelEncoder class:


    | Length | Color |

    |---|---|

    | 10 | 2 |

    | 20 | 0 |

    | 12 | 2 |

    | 16 | 1 |

    | 22 | 0 |


    The encoded dataset can be used to train a machine learning model. The unencoded
    dataset cannot. You can get an ordered list of the classes that were encoded from
    the encoder’s `classes_` attribute.


    The other, more common means for converting categorical values into numeric values
    is *one-hot encoding*, which adds one column to the dataset for each unique value
    in a categorical column and fills the encoded columns with 1s and 0s. One-hot
    encoding can be performed with Scikit’s `OneHotEncoder` class or by calling `get_dummies`
    on a Pandas DataFrame. Here is how the latter is used to encode the dataset:


    ```python

    data = [[10, ''red''], [20, ''blue''], [12, ''red''], [16, ''green''], [22, ''blue'']]

    df = pd.DataFrame(data, columns=[''Length'', ''Color''])

    df = pd.get_dummies(df, columns=[''Color''])

    df.head()

    ```


    And here are the results:


    | | Length | Color_blue | Color_green | Color_red |

    |---|---|---|---|---|

    | 0 | 10 | 0 | 0 | 1 |

    | 1 | 20 | 1 | 0 | 0 |

    | 2 | 12 | 0 | 0 | 1 |

    | 3 | 16 | 0 | 1 | 0 |

    | 4 | 22 | 1 | 0 | 0 |


    Label encoding and one-hot encoding are used with regression problems and classification
    problems. The obvious question is, which one should you use? Generally speaking,
    data scientists prefer one-hot encoding to label encoding. The former gives every
    unique value an equal weight, whereas the latter implies that some values may
    be more important than others—for example, that "red" (2) is more important than
    "blue" (0). Label encoding, on the other hand, is more memory efficient. The number
    of columns is the same before and after encoding, whereas one-hot encoding adds
    one column per unique value. For very large datasets with thousands of unique
    values in a categorical column, label encoding requires substantially less memory.


    The accuracy of a machine learning model is rarely impacted by the encoding method
    you choose. If you’re in doubt, you’ll rarely go wrong with one-hot encoding.
    If you want to be certain, you can encode the data both ways and compare the results
    after training a machine learning model.


    ## Binary Classification


    Binary classifiers are supervised learning models trained with labeled data: 0s
    for the negative class and 1s for the positive. The predictions they make are
    0s and 1s too. They also divulge a probability for each class that you can factor
    into your conclusions. For example, a credit card company might decide that a
    transaction will be declined only if the model predicts with at least 99% certainty
    that the transaction is fraudulent. In that case, the probability that the model
    computed is more important than the raw prediction that it made.


    To help bring home everything presented thus far regarding binary classification,
    let’s use Scikit to build a couple of models: first a simple one that demonstrates
    core principles, followed by a second one that solves a genuine business problem.


    ### Classifying Passengers Who Sailed on the Titanic


    One of the more famous public datasets in machine learning is the [Titanic dataset](https://www.kaggle.com/c/titanic),
    which contains information regarding hundreds of passengers who sailed on the
    ill-fated voyage of the *RMS Titanic*, including which ones survived and which
    ones did not. Let’s use logistic regression to build a binary classification model
    from the dataset and see if we can predict the odds that a passenger will survive
    given that person’s gender, age, and fare class (whether they traveled in first,
    second, or third class).


    The first step is to [download the dataset](https://github.com/peterbraden/jeff-prog/blob/master/Data/titanic.csv)
    and copy it to the *Data* subdirectory of the directory that hosts your Jupyter
    notebooks. Then run the following code in a notebook to load the dataset and get
    a feel for its contents:


    ```python

    import pandas as pd


    df = pd.read_csv(''Data/titanic.csv'')

    df.head()

    ```


    Here is the output:


    ![](img/628b9a382d0944bbfa786c66bc651b50_70_0.png)


    The dataset contains 891 rows and 12 columns. Some of the columns, such as `PassengerId`
    and `Name`, aren’t relevant to a machine learning model. Others are very relevant.
    The ones we’ll focus on are:


    - **Survived**: Indicates whether the passenger survived the voyage (1) or did
    not (0)

    - **Pclass**: Indicates whether the passenger was traveling in first class (1),
    second class (2), or third class (3)

    - **Sex**: Indicates the passenger’s gender

    - **Age**: Indicates the passenger’s age


    The `Survived` column is the label column—the one we’ll try to predict. The other
    columns are relevant because first-class passengers were [more likely to survive
    the sinking](https://www.kaggle.com/c/titanic) because their cabins were closer
    to the top deck of the ship and nearer the lifeboats. Plus, women and children
    were more likely to be given space in lifeboats.


    Now use the following statement to see if the dataset is missing any values:'
  mdcn: '## 分类数据


    机器学习从数字中寻找规律。它*仅*处理数字。然而，许多数据集包含字符串值的列，例如“male”和“female”或“red”、“green”和“blue”。数据科学家将这些称为*分类值*，包含它们的列称为*分类列*。机器学习无法直接处理分类值。要在模型中使用它们，必须将其转换为数字。


    有两种常用技术可将分类值转换为数值。一种是*标签编码*，你在第1章的*k*-均值聚类示例中已简要见过。标签编码用整数替换分类值。如果一列中有三个唯一值，标签编码会将它们替换为0、1和2。为演示，请在Jupyter笔记本中运行以下代码：


    ```python

    import pandas as pd

    from sklearn.preprocessing import LabelEncoder


    data = [[10, ''red''], [20, ''blue''], [12, ''red''], [16, ''green''], [22, ''blue'']]

    df = pd.DataFrame(data, columns=[''Length'', ''Color''])


    encoder = LabelEncoder()

    df[''Color''] = encoder.fit_transform(df[''Color''])

    df.head()

    ```


    此代码创建一个DataFrame，包含一个名为Length的数值列和一个名为Color的分类列，后者包含三个不同的分类值。编码前的数据集如下所示：


    | Length | Color |


    # Naive Bayes


    Logistic regression is a go-to algorithm for classification models and is often
    very effective at classifying text. But in scenarios involving text classification,
    data scientists often turn to another learning algorithm called *Naive Bayes*.
    It’s a classification algorithm based on *Bayes’ theorem*, which provides a means
    for calculating conditional probabilities. Mathematically, Bayes’ theorem is stated
    this way:


    $$P(A|B) = \frac{P(B|A) \cdot P(A)}{P(B)}$$


    This says the probability that A is true given that B is true is equal to the
    probability that B is true given that A is true multiplied by the probability
    that A is true divided by the probability that B is true. That’s a mouthful, and
    while accurate, it doesn’t explain why Naive Bayes is so useful for classifying
    text—or how you apply it, for example, to a collection of emails to determine
    which ones are spam.


    Let’s start with a simple example. Suppose 10% of all the emails you receive are
    spam. That’s $P(A)$. Analysis reveals that 5% of the spam emails you receive contain
    the word *congratulations*, but just 1% of *all* your emails contain the same
    word. Therefore, $P(B|A)$ is 0.05 and $P(B)$ is 0.01. The probability of an email
    being spam if it contains the word *congratulations* is $P(A|B)$, which is (0.05
    x 0.10) / 0.01, or 0.50.


    Of course, a spam filter must consider all the words in an email, not just one.
    It turns out that if you make some simple (naive) assumptions—that the order of
    the words in an email doesn’t matter, and that every word has equal weight—you
    can write Bayes’ equation this way for a spam classifier:


    $$P(S|message) = P(S) \cdot P(word_1|S) \cdot P(word_2|S)...P(word_n|S)$$


    In plain English, the probability that a message is spam is proportional to the
    product of:


    +   - The probability that any message in the dataset is spam, or $P(S)$

    - The probability that each word in the message appears in a spam message, or
    $P(word|S)$


    $P(S)$ can be calculated easily enough: it’s simply the fraction of the messages
    in the dataset that are'
  merge: -1

    \ + 1次迭代的输入是当前的嵌入向量*以及*第*n*次迭代的输出——即所谓的*隐藏状态*。循环层的输出是循环最后一次迭代的输出。其结果与每个嵌入向量被独立处理时不同，因为每次迭代都使用前一次迭代的信息来计算输出。序列中早期词的上下文可以传递到后面出现的词。\n\

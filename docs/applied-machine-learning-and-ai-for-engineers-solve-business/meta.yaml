  md: '# Praise for **Applied Machine Learning and AI for Engineers**


    > This book is a fantastic guide to machine learning and AI algorithms. It’s succinct
    while being comprehensive, and the concrete examples with working code show how
    to take the theory into practice.


    —Mark Russinovich, Azure CTO and Technical Fellow, Microsoft


    > When Jeff Prosise is passionate about something (whether it be technology, his
    pet yellow-nape Amazon “Hawkeye,” or his hobby of building and flying radio-controlled
    jets), you definitely want to listen in. He combines that passion with a clarity
    of explanation that enables him to communicate and teach complex topics better
    than anyone I’ve ever known. He brings you along on a personal journey of learning
    and understanding. Now Jeff brings these skills to the current and ongoing “technological
    tsunami” (as he puts it) of machine learning and AI. In this new book, he builds
    your understanding from the foundations up, always emphasizing an intuitive approach
    and connecting concepts and solutions to the real world. If you want to understand
    how AI and ML really work under the hood, and how these technologies have evolved
    and come to be, READ THIS BOOK.


    —Todd Fine, Chief Strategy Officer, Atmosera


    > Jeff distills years of working AI/ML knowledge into a practical and understandable
    guide for practitioners of all levels.


    —Ken Muse, 4x Azure MVP and Senior DevOps Architect, GitHub


    > Applied Machine Learning and AI for Engineers is the book I wish I had when
    first introduced to machine learning. It’s a fantastic introduction for novice
    ML engineers and a great reference for those more experienced. It is now my go-to
    source when refreshing and enhancing my understanding of various ML techniques
    and their applicability. I love that Jeff uses real-world examples and datasets
    to demonstrate each tool set and approach. Just like a neural net, I have no idea
    how Jeff came up with this material, but it’s tremendously useful all the same.


    —Brent Rector, Principal Technical Program Manager, Amazon; Founder, Wise Owl
    Consulting, LLC, Wise Owl Aviation Services, LLC, and Rector Aviation Law PC


    > I’ve known Jeff for decades and he has always possessed the ability to plainly
    explain complicated concepts. He has done it again with Applied Machine Learning
    and AI for Engineers. The examples, analogies, and color figures make the material
    truly understandable for the beginner to the more advanced reader.


    —Jeffrey Richter, Software Architect, Microsoft


    > This book fills an extremely important gap for engineers and scientists that
    want to bring the power of AI to bear on their most challenging data analysis
    problems. It strikes just the right balance between technical depth and practical
    application, with tools and many hands-on examples, to empower the reader to become
    an effective AI practitioner in their own application domain (including business,
    science, and other data-rich fields).


    —Shaun S. Gleason, PhD, Director, Cyber Resilience and Intelligence, Oak Ridge
    National Laboratory'

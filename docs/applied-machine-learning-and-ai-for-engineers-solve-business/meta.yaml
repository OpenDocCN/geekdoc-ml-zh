    spam messages. If you train a machine learning model with 1,000 messages and 500
    of them are spam, then $P(S) = 0.5$. For a given word, $P(word|S)$ is simply the
    number of times the word appears in spam messages divided by the number of words
    in all the spam messages. The entire problem reduces to word counts. You can do
    a similar calculation to compute the probability that the message is *not* spam,
    and then use the higher of the two probabilities to make a prediction.


    Here’s an example involving four sample emails. The emails are:


    | Text | Spam |

    |---|---|

    | Raise your credit score in minutes | 1 |

    | Here are the minutes from yesterday’s meeting | 0 |

    | Meeting tomorrow to review yesterday’s scores | 0 |

    | Score tomorrow’s meds at yesterday’s prices | 1 |


    If you remove stop words, convert characters to lowercase, and stem the words
    such that *tomorrow’s* becomes *tomorrow*, you’re left with this:


    | Text | Spam |

    |---|---|

    | raise credit score minute | 1 |

    | minute yesterday meeting | 0 |

    | meeting tomorrow review yesterday score | 0 |

    | score tomorrow med yesterday price | 1 |


    Because two of the four messages are spam and two are not, the probability that
    any message is spam ($P(S)$) is 0.5. The same goes for the probability that any
    message is not spam ($P(N) = 0.5$). In addition, the spam messages contain nine
    unique words, while the nonspam messages contain a total of eight.


    The next step is to build the following table of word frequencies. Take the word
    *yesterday* as an example. It appears once in a message that’s labeled as spam,
    so $P(yesterday|S)$ is 1/9, or 0.111. It appears twice in nonspam messages, so
    $P(yesterday|N)$ is 2/8, or 0.250:


    | Word | $P(word|S)$ | $P(word|N)$ |

    |---|---|---|

    | raise | 1/9 = 0.111 | 0/8 = 0.000 |

    | credit | 1/9 = 0.111 | 0/8 = 0.000 |

    | score | 2/9 = 0.222 | 1/8 = 0.125 |

    | minute | 1/9 = 0.111 | 1/8 = 0.125 |

    | yesterday | 1/9 = 0.111 | 2/8 = 0.250 |


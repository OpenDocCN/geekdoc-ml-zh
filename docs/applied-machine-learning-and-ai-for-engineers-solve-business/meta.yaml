    including tasks involving computer vision—for example, distilling information
    from images—and tasks that involve human languages such as translating English
    to French. We’ll take a deep dive into neural networks beginning in [Chapter 8](Chapter
    8), and you’ll learn specifically how deep learning has elevated machine learning
    to new heights.


    # Supervised Versus Unsupervised Learning


    Most ML models fall into one of two broad categories: *supervised learning* models
    and *unsupervised learning* models. The purpose of supervised learning models
    is to make predictions. You train them with labeled data so that they can take
    future inputs and predict what the labels will be. Most of the ML models in use
    today are supervised learning models. A great example is the model that the US
    Postal Service uses to turn handwritten zip codes into digits that a computer
    can recognize to sort the mail. Another example is the model that your credit
    card company uses to authorize purchases.


    Unsupervised learning models, by contrast, don’t require labeled data. Their purpose
    is to provide insights into existing data, or to group data into categories and
    categorize future inputs accordingly. A classic example of unsupervised learning
    is inspecting records regarding products purchased from your company and the customers
    who purchased them to determine which customers might be most interested in a
    new product you are launching and then building a marketing campaign that targets
    those customers.


    A spam filter is a supervised learning model. It requires labeled data. A model
    that segments customers based on incomes, credit scores, and purchasing history
    is an unsupervised learning model, and the data that it consumes doesn’t have
    to be labeled. To help drive home the difference, the remainder of this chapter
    explores supervised and unsupervised learning in greater detail.


    # Unsupervised Learning with k-Means Clustering


    Unsupervised learning frequently employs a technique called *clustering*. The
    purpose of clustering is to group data by similarity. The most popular clustering
    algorithm is [k-means clustering](k-means clustering), which takes *n* data samples
    and groups them into *m* clusters, where *m* is a number you specify.


    Grouping is performed using an iterative process that computes a centroid for
    each cluster and assigns samples to clusters based on their proximity to the cluster
    centroids. If the distance from a particular sample to the centroid of cluster
    1 is 2.0 and the distance from the same sample to the center of cluster 2 is 3.0,
    then the sample is assigned to cluster 1. In [Figure 1-6](Figure 1-6), 200 samples
    are loosely arranged in three clusters. The diagram on the left shows the raw,
    ungrouped samples. The diagram on the right shows the cluster centroids (the red
    dots) with the samples colored by cluster.'

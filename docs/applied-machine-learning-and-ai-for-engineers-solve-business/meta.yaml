  - "[PAGE 135]\n\nThe dataset is unrecognizable after the PCA transform. Without\
    \ the transform, it’s impossible to work backward and reconstruct the original\
    \ data. Yet the sum of the `explained_variance_ratio_` values is 1.0, which means\
    \ no information was lost. You can prove it this way:\n\n```\nimport numpy as\
    \ np\n\nnp.sum(pca.explained_variance_ratio_)\n```\n\nThe PCAed dataset is just\
    \ as useful for machine learning as the original. Furthermore, if you want to\
    \ share the dataset with others so that they can train models of their own, there\
    \ is no risk of divulging sensitive or proprietary information.\n\n# Visualizing\
    \ High-Dimensional Data\n\nYet another use for PCA is to reduce a dataset to two\
    \ or three dimensions so that it can be plotted with libraries such as Matplotlib.\
    \ You can’t plot a dataset that has 1,000 columns. You *can* plot a dataset that\
    \ has two or three columns. The fact that PCA can reduce high-dimensional data\
    \ to two or three dimensions while retaining much of the original information\
    \ makes it a great tool for exploring data and visualizing relationships between\
    \ classes.\n\nSuppose you’re building a classification model and want to assess\
    \ up front whether there is sufficient separation between classes to support such\
    \ a model. Take the [Optical Recognition of Handwritten Digits dataset](https://scikit-learn.org/stable/modules/generated/sklearn.datasets.load_digits.html)\
    \ built into Scikit, for example. Each digit in the dataset is represented by\
    \ an 8 × 8 array of pixel values, meaning the dataset has 64 dimensions. If you\
    \ could plot a 64-dimensional diagram, you might be able to inspect the dataset\
    \ and look for separation between classes. But 64 dimensions is 61 too many for\
    \ most humans.\n\nEnter PCA. The following code loads the dataset, uses PCA to\
    \ reduce it to two dimensions, and plots the result, with different colors representing\
    \ different classes (digits):\n\n```\nfrom sklearn.decomposition import PCA\n\
    from sklearn.datasets import load_digits\nimport matplotlib.pyplot as plt\n%matplotlib\
    \ inline\n\ndigits = load_digits()\npca = PCA(n_components=2, random_state=0)\n\
    pca_digits = pca.fit_transform(digits.data)\n\nplt.figure(figsize=(12, 8))\nplt.scatter(pca_digits[:,\
    \ 0], pca_digits[:, 1], c=digits.target,\n            cmap=plt.cm.get_cmap('Paired',\
    \ 10))\nplt.colorbar(ticks=range(10))\nplt.clim(-0.5, 9.5)\n```\n\nThe resulting\
    \ plot provides an encouraging sign that you might be able to train a classifier\
    \ with the data. While there is clearly some overlap between classes, the different\
    \ classes form rather distinct clusters. There is significant overlap between\
    \ red (the digit 4) and light purple (the digit 6), indicating that a model might\
    \ have some difficulty distinguishing between 4s and 6s. However, 0s and 1s lie\
    \ at the top"
- md: "and bottom, while 3s and 4s fall on the far left and far right. A model would\
    \ presumably be proficient at telling these digits apart:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_136_0.png)\n\
    \nYou can better visualize relationships between classes with a 3D plot. The following\
    \ code uses PCA to reduce the dataset to three dimensions and Mplot3D to produce\
    \ an interactive plot. Note that if you run this code in Jupyter Lab, you’ll probably\
    \ have to change the first line to %matplotlib widget:\n\n```python\n%matplotlib\
    \ notebook\nfrom mpl_toolkits.mplot3d import Axes3D\n\ndigits = load_digits()\n\
    pca = PCA(n_components=3, random_state=0)\npca_digits = pca.fit_transform(digits.data)\n\
    \nax = plt.figure(figsize=(12, 8)).add_subplot(111, projection='3d')\nax.scatter(xs\
    \ = pca_digits[:, 0], ys = pca_digits[:, 1], zs = pca_digits[:, 2],\n        \
    \   c=digits.target, cmap=plt.cm.get_cmap('Paired', 10))\n```\n\nYou can rotate\
    \ the resulting plot in 3D and look at it from different angles. Here we can see\
    \ that there is more separation between 4s and 6s than was evident in two dimensions:\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_137_0.png)\n\nPCA isn’t the only way\
    \ to reduce a dataset to two or three dimensions for plotting. You can also use\
    \ Scikit’s Isomap class or its TSNE class. TSNE implements t-distributed stochastic\
    \ neighbor embedding, or t-SNE for short. t-SNE is a dimensionality reduction\
    \ algorithm that is used almost exclusively for visualizing high-dimensional data.\
    \ Whereas PCA uses a linear function to transform data, t-SNE uses a nonlinear\
    \ transform that tends to heighten the separation between classes by keeping similar\
    \ data points close together in low-dimensional space. (PCA, by contrast, focuses\
    \ on keeping dissimilar points far apart.) Here’s an example that plots the Digits\
    \ dataset in two dimensions after reducing it with t-SNE:\n\n```python\n%matplotlib\
    \ inline\nfrom sklearn.manifold import TSNE\n\ndigits = load_digits()\ntsne =\
    \ TSNE(n_components=2, init='pca', learning_rate='auto',\n            random_state=0)\n\
    tsne_digits = tsne.fit_transform(digits.data)\n\nplt.figure(figsize=(12, 8))\n\
    plt.scatter(tsne_digits[:, 0], tsne_digits[:, 1], c=digits.target,\n         \
    \   cmap=plt.cm.get_cmap('Paired', 10))\nplt.colorbar(ticks=range(10))\nplt.clim(-0.5,\
    \ 9.5)\n```\n\nAnd here is the output:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_138_0.png)\n\
    \nt-SNE does a better job of separating groups of digits into clusters, indicating\
    \ there are patterns in the data that machine learning can exploit. The chief\
    \ drawback is that t-SNE is compute intensive, which means it can take a prohibitively\
    \ long time to run on large datasets. One way to mitigate that is to run t-SNE\
    \ on a subset of rows rather than the entire dataset. Another strategy is to use\
    \ PCA to reduce the number of dimensions, and then subject the PCAed dataset to\
    \ t-SNE.\n\n## Anomaly Detection\n\nAnomaly detection is a branch of machine learning\
    \ that seeks to identify anomalies in datasets or data streams. Airbus uses it\
    \ to predict failures in jet engines and detect anomalies in telemetry data beamed\
    \ down from the International Space Station. Credit card companies use it to detect\
    \ credit card fraud. The goal of anomaly detection is to identify outliers in\
    \ data—samples that aren’t “normal” when compared to others. In the case of credit\
    \ card fraud, the assumption is that if transactions are subjected to an anomaly\
    \ detection algorithm, fraudulent transactions will show up as anomalous, while\
    \ legitimate transactions will not.\n\nThere are many ways to perform anomaly\
    \ detection. They go by names such as isolation forests, one-class SVMs, and local\
    \ outlier factor (LOF). Most rely on unsupervised learning methods and therefore\
    \ do not require labeled data. They simply look at a collection of samples and\
    \ determine which ones are anomalous. Unsupervised anomaly detection is particularly\
    \ interesting because it doesn’t require a priori knowledge of what constitutes\
    \ an anomaly, nor does it require an unlabeled dataset to be meticulously labeled.\n\
    \nOne of the most popular forms of anomaly detection relies on principal component\
    \ analysis. You already know that PCA can be used to reduce data from m dimensions\
    \ to n, and that a PCA transform can be inverted to restore the original m dimensions.\
    \ You also know that inverting the transform doesn’t recover the data that was\
    \ lost when the transform was applied. The gist of PCA-based anomaly detection\
    \ is that an anomalous sample should exhibit more loss or *reconstruction error*\
    \ (the difference between the original data and the same data after a PCA transform\
    \ is applied and inverted) than a normal one. In other words, the loss incurred\
    \ when an anomalous sample is PCAed and un-PCAed should be higher than the loss\
    \ incurred when the same operation is applied to a normal sample. Let’s see if\
    \ this assumption holds up in the real world.\n\n## Using PCA to Detect Credit\
    \ Card Fraud\n\nSupervised learning isn’t the only option for detecting credit\
    \ card fraud. Here’s an alternative approach that uses PCA-based anomaly detection\
    \ to identify fraudulent transactions. Begin by loading the dataset, separating\
    \ the samples by class into one dataset representing legitimate transactions and\
    \ another representing fraudulent transactions, and dropping the Time and Class\
    \ columns. If you didn’t download the dataset in Chapter 3, you can get it now\
    \ from the ZIP file.\n\n```python\nimport pandas as pd\n\ndf = pd.read_csv('Data/creditcard.csv')\n\
    df.head()\n\n# Separate the samples by class\nlegit = df[df['Class'] == 0]\nfraud\
    \ = df[df['Class'] == 1]\n\n# Drop the \"Time\" and \"Class\" columns\nlegit =\
    \ legit.drop(['Time', 'Class'], axis=1)\nfraud = fraud.drop(['Time', 'Class'],\
    \ axis=1)\n```\n\nUse PCA to reduce the two datasets from 29 to 26 dimensions,\
    \ and then invert the transform to restore each dataset to 29 dimensions. The\
    \ transform is fitted to legitimate transactions only because we need a baseline\
    \ value for reconstruction error that allows us to discriminate between legitimate\
    \ and fraudulent transactions. It is applied, however, to both datasets:\n\n```python\n\
    from sklearn.decomposition import PCA\n\npca = PCA(n_components=26, random_state=0)\n\
    legit_pca = pd.DataFrame(pca.fit_transform(legit), index=legit.index)\nfraud_pca\
    \ = pd.DataFrame(pca.transform(fraud), index=fraud.index)\n\nlegit_restored =\
    \ pd.DataFrame(pca.inverse_transform(legit_pca),\n                           \
    \   index=legit_pca.index)\n\nfraud_restored = pd.DataFrame(pca.inverse_transform(fraud_pca),\n\
    \                              index=fraud_pca.index)\n```\n\nSome information\
    \ was lost in the transition. Hopefully, the fraudulent transactions incurred\
    \ more loss than the legitimate ones, and we can use that to differentiate between\
    \ them. The next step is to compute the loss for each row in the two datasets\
    \ by summing the squares of the differences between the values in the original\
    \ rows and the restored rows:\n\n```python\nimport numpy as np\n\ndef get_anomaly_scores(df_original,\
    \ df_restored):\n    loss = np.sum((np.array(df_original) - np.array(df_restored))\
    \ ** 2, axis=1)\n    loss = pd.Series(data=loss, index=df_original.index)\n  \
    \  return loss\n\nlegit_scores = get_anomaly_scores(legit, legit_restored)\nfraud_scores\
    \ = get_anomaly_scores(fraud, fraud_restored)\n```\n\nNow plot the losses incurred\
    \ when the legitimate transactions were transformed and restored:\n\n```python\n\
    %matplotlib inline\nimport matplotlib.pyplot as plt\nimport seaborn as sns\nsns.set()\n\
    \nlegit_scores.plot(figsize = (12, 6))\n```\n\nHere is the result:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_140_0.png)\n\
    \nNext, plot the losses for the fraudulent transactions:\n\n```python\nfraud_scores.plot(figsize\
    \ = (12, 6))\n```\n\nHere is the result:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_141_0.png)\n\
    \nThe plots reveal that most of the rows in the dataset representing legitimate\
    \ transactions incurred a loss of less than 200, while many of the rows in the\
    \ dataset representing fraudulent transactions incurred a loss greater than 200.\
    \ Separate the rows on this basis—classifying transactions with a loss of less\
    \ than 200 as legitimate and transactions with a higher loss as fraudulent—and\
    \ use a confusion matrix to visualize the results:\n\n```python\nthreshold = 200\n\
    \ntrue_neg = legit_scores[legit_scores < threshold].count()\nfalse_pos = legit_scores[legit_scores\
    \ >= threshold].count()\ntrue_pos = fraud_scores[fraud_scores >= threshold].count()\n\
    false_neg = fraud_scores[fraud_scores < threshold].count()\n\nlabels = ['Legitimate',\
    \ 'Fraudulent']\nmat = [[true_neg, false_pos], [false_neg, true_pos]]\n\nsns.heatmap(mat,\
    \ square=True, annot=True, fmt='d', cbar=False, cmap='Blues',\n            xticklabels=labels,\
    \ yticklabels=labels)\n\nplt.xlabel('Predicted label')\nplt.ylabel('True label')\n\
    ```\n\nHere is the result:"

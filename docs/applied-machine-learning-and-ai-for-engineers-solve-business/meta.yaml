    # # Summary


    Support vector machines, or SVMs, frequently fit to datasets better than other
    learning algorithms. SVMs are maximum-margin classifiers that use kernel tricks
    to simulate adding dimensions to data. The theory is that data that isn’t linearly
    separable in $m$ dimensions might be separable in $n$ dimensions if $n$ is higher
    than $m$. SVMs are most often used for classification, but they can perform regression
    too. As an experiment, try replacing `GradientBoostingRegressor` in the taxi-fare
    example in Chapter 2 with SVR and using `GridSearchCV` to optimize the model’s
    hyperparameters. Which model produces the highest cross-validated coefficient
    of determination?


    SVMs usually train better with data that is normalized to unit variance. That’s
    true even if the values in all the columns have similar ranges, but it’s especially
    true if they *don’t* have similar ranges. Scikit’s `StandardScaler` class applies
    unit variance to data. Unit variance is achieved by dividing the values in a column
    by the mean of all the values in the column and dividing by the standard deviation.
    Scikit’s `make_pipeline` function enables you to combine transformers such as
    `StandardScaler` and classifiers such as `SVC` into one logical unit to ensure
    that data passed to `fit`, `predict`, and `predict_proba` undergoes the same transformations.'

    \ import preprocess_input\n\nface_images = preprocess_input(np.array(x_faces))\n\
    \nx_train, x_test, y_train, y_test = train_test_split(\n    face_images, y_faces,\
    \ train_size=0.8, stratify=y_faces,\n    random_state=0)\n```\n\n如果你愿意，你可以将预处理后的像素值除以\

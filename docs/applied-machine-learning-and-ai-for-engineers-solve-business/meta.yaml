  md: "![](img/628b9a382d0944bbfa786c66bc651b50_115_0.png)\n\nSVMs almost always train\
    \ better with normalized data, but the simple normalization performed by `MinMaxScaler`\
    \ sometimes isn’t enough. SVMs tend to respond better to data that is normalized\
    \ to *unit variance* using a technique called *standardization* or *Z-score normalization*.\
    \ Unit variance is achieved by doing the following to each column in a dataset:\n\
    \n+   - Computing the mean and standard deviations of all the values in the column\n\
    - Subtracting the mean from each value in the column\n- Dividing each value in\
    \ the column by the standard deviation\n\nThis is precisely the transform that\
    \ Scikit’s `StandardScaler` class performs on a dataset. Applying unit variance\
    \ to a dataset is as simple as this:\n\n```\npython\nfrom sklearn.preprocessing\
    \ import StandardScaler\n\nscaler = StandardScaler()\nnormalized_data = scaler.fit_transform(data)\n\
    ```\n\nThe values in the original dataset may vary wildly from one column to the\
    \ next, but the transformed dataset will contain columns of numbers anchored around\
    \ 0 with ranges that are proportional to each column’s standard deviation. Applying\
    \ `StandardScaler` to the dataset produces the following values in the first 10\
    \ rows:\n\n```\n\n[[ 0.93457642  2.36212718]\n [ 1.95483237 -0.35495682]\n [ 1.56870474\

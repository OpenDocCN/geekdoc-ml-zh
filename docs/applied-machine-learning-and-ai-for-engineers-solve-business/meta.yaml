    \ import Rectangle\nfrom mtcnn.mtcnn import MTCNN\n%matplotlib inline\n\nimage\
    \ = plt.imread('Data/Amsterdam.jpg')\nfig, ax = plt.subplots(figsize=(12, 8),\
    \ subplot_kw={'xticks': [], 'yticks': []})\nax.imshow(image)\n\ndetector = MTCNN()\n\
    faces = detector.detect_faces(image)\n\nfor face in faces:\n    x, y, w, h = face['box']\n\
    \    rect = Rectangle((x, y), w, h, color='red', fill=False, lw=2)\n    ax.add_patch(rect)\n\
    ```"

    model’s accuracy and introduces an important technique for measuring accuracy
    called cross-validation.


    # ## Linear Regression


    Next to *k*-nearest neighbors, linear regression is perhaps the simplest learning
    algorithm of all. It works best with data that is relatively linear—that is, data
    points that fall roughly along a line. Thinking back to high school math class,
    you’ll recall that the equation for a line in two dimensions is:


    $$y = mx + b$$


    where *m* is the slope of the line and *b* is where the line intersects the y-axis.
    The income-versus-years-of-experience dataset in [Figure 1-11](Figure 1-11) lends
    itself well to linear regression. [Figure 2-1](Figure 2-1) shows a regression
    line fit to the data points. Predicting the income for a programmer with 10 years
    of experience is as simple as finding the point on the line where *x* = 10. The
    equation of the line is *y* = 3,984*x* + 60,040. Plugging 10 into that equation
    for *x*, the predicted income is $99,880.'
- md: 'The goal when training a linear regression model is to find values for $m$
    and $b$ that produce the most accurate predictions. This is typically done using
    an iterative process that starts with assumed values for $m$ and $b$ and repeats
    until it converges on suitable values.


    The most common technique for fitting a line to a set of points is *ordinary least
    squares regression*, or OLS for short. It works by squaring the distance in the
    $y$ direction between each point and the regression line, summing the squares,
    and dividing by the number of points to compute the *mean squared error*, or MSE.
    (Squaring each distance prevents negative distances from offsetting positive distances.)
    Then it adjusts $m$ and $b$ to reduce the MSE the next time around and repeats
    until the MSE is sufficiently low. I won’t go into the details of how it determines
    in which direction to adjust $m$ and $b$ (it’s not hard, but it involves a smidgeon
    of calculus—specifically, using *partial derivatives* of the MSE function to determine
    whether to increase or decrease $m$ and $b$ in the next iteration), but OLS can
    often fit a line to a set of points with a dozen or fewer iterations.


    Scikit-Learn has a number of classes to help you build linear regression models,
    including the `LinearRegression` class, which embodies OLS, and the `PolynomialFeatures`
    class, which fits a polynomial curve rather than a straight line to the training
    data. Training a linear regression model can be as simple as this:


    ```python

    model = LinearRegression()

    model.fit(x, y)

    ```


    Scikit has other linear regression classes with names such as `Ridge` and `Lasso`.
    One scenario in which they’re useful is when the training data contains outliers.
    Recall from Chapter 1 that outliers are data points that don’t conform with the
    rest. Outliers can bias a model or make it less accurate. `Ridge` and `Lasso`
    add *regularization*, which mitigates the effect of outliers by lessening their
    influence on the outcome as coefficients are adjusted during training. An alternate
    approach to dealing with outliers is to remove them altogether, which is what
    you’ll do in the taxi-fare example at the end of this chapter.


    ## NOTE


    Lasso regression has a secondary benefit too. If the training data suffers from
    multicollinearity, a condition in which two or more input variables are linearly
    correlated so that one can be predicted from another with a reasonable degree
    of accuracy, Lasso effectively ignores the redundant data.


    A classic example of multicollinearity occurs when a dataset includes one column
    specifying the number of rooms in a house and another column specifying the square
    footage. More rooms generally means more area, so the two variables are correlated
    to some degree.


    Linear regression isn’t limited to two dimensions ($x$ and $y$ values); it works
    with any number of dimensions. Linear regression with one independent variable
    ($x$) is known as *simple linear regression*, while linear regression with two
    or more independent variables—for example, $x_1$, $x_2$, $x_3$, and so on—is called
    *multiple linear regression*. If a dataset is two dimensional, it’s simple enough
    to plot the data to determine its shape. You can plot three-dimensional data too,
    but plotting datasets with four or five dimensions is more challenging, and datasets
    with hundreds or thousands of dimensions are impossible to visualize.


    How do you determine whether a high-dimensional dataset might lend itself to linear
    regression? One way to do it is to reduce $n$ dimensions to two or three using
    techniques such as [principal component analysis (PCA)](https://en.wikipedia.org/wiki/Principal_component_analysis)
    and [$t$-distributed stochastic neighbor embedding ($t$-SNE)](https://en.wikipedia.org/wiki/T-distributed_stochastic_neighbor_embedding)
    so that you can plot them. These techniques are covered in [Chapter 6](#). Both
    reduce the dimensionality of a dataset without incurring a commensurate loss of
    information. With PCA, for example, it isn’t uncommon to reduce the number of
    dimensions by 90% while retaining 90% of the information in the original dataset.
    It might sound like magic, but it’s not. It’s math.


    If the number of dimensions is relatively small, a simpler technique for visualizing
    high-dimensional datasets is *pair plots*, which plot pairs of dimensions in conventional
    2D charts. [Figure 2-2](#) shows a pair plot charting sepal length versus petal
    length, sepal width versus petal width, and other parameter pairs for the [Iris
    dataset](https://en.wikipedia.org/wiki/Iris_flower_data_set) introduced in [Chapter
    1](#).


    Seaborn’s [`pairplot` function](https://seaborn.pydata.org/generated/seaborn.pairplot.html)
    makes it easy to create pair plots. The plot in [Figure 2-2](#) was generated
    with one line of code:


    ```python

    sns.pairplot(df)

    ```


    The pair plot not only helps you visualize relationships in the dataset, but in
    this example, the histogram in the lower-right corner reveals that the dataset
    is balanced too. There is an equal number of samples of all three classes, and
    for reasons you’ll learn in [Chapter 3](#), you always prefer to train classification
    models with balanced datasets.


    Linear regression is a *parametric* learning algorithm, which means that its purpose
    is to examine a dataset and find the optimum values for parameters in an equation—for
    example, $m$ and $b$. $k$-nearest neighbors, by contrast, is a *nonparametric*
    learning algorithm because it doesn’t fit data to an equation. Why does it matter
    whether a learning algorithm is parametric or nonparametric? Because datasets
    used to train parametric models frequently need to be *normalized*. At its simplest,
    normalizing data means making sure all the values in all the columns have consistent
    ranges. I’ll cover normalization in Chapter 5, but for now, realize that training
    parametric models with unnormalized data—for example, a dataset that contains
    values from 0 to 1 in one column and 0 to 1,000,000 in another—can make those
    models less accurate or prevent them from converging on a solution altogether.
    This is particularly true with support vector machines and neural networks, but
    it applies to other parametric models as well. Even *k*-nearest neighbors models
    work best with normalized data because while the learning algorithm isn’t parametric,
    it uses distance-based calculations internally.


    ## Decision Trees


    Even if you’ve never taken a computer science course, you probably know what a
    [binary tree](binary_tree) is. In machine learning, a *decision tree* is a tree
    structure that predicts an outcome by answering a series of questions. Most decision
    trees are binary trees, in which case the questions require simple yes-or-no answers.


    Figure 2-3 shows a decision tree built by Scikit from the income-versus-experience
    dataset introduced in Chapter 1. The tree is simple because the dataset contains
    just one feature column (years of experience) and I limited the tree’s depth to
    3, but the technique extends to trees of unlimited size and complexity. In this
    example, predicting a salary for a programmer with 10 years of experience requires
    just three yes/no decisions, as indicated by the red arrows. The answer is about
    $100K, which is pretty close to what *k*-nearest neighbors and linear regression
    predicted when applied to the same dataset.


    *Figure 2-3. Decision tree*


    Decision trees can be used for regression and classification. For a regressor,
    the leaf nodes (the nodes that lack children) represent regression values. For
    a classifier, they represent classes. The output from a decision tree regressor
    isn’t continuous. The output will always be one of the values assigned to a leaf
    node, and the number of leaf nodes is finite. The output from a linear regression
    model, by contrast, is continuous. It can assume any value along the line fit
    to the training data. In the previous example, you get the same answer if you
    ask the tree to predict a salary for someone with 10 years of experience and someone
    with 13 years of experience. Bump years of experience up to 14, however, and the
    predicted salary jumps to $125K (*Figure 2-4*). If you allow the tree to grow
    deeper, the answers become more refined. But allowing it to grow *too* deep can
    lead to big problems for reasons we’ll cover momentarily.


    Once a decision tree model is trained—that is, once the tree is built—predictions
    are made quickly. But how do you decide what decisions to make at each node? For
    example, why is the number of years represented by the root node in *Figure 2-3*
    equal to 13.634? Why not 10.000 or 8.742 or some other number? For that matter,
    if the dataset has multiple feature columns, how do you decide which column to
    break on at each decision node?'
  mdcn: '训练线性回归模型的目标是找到使预测最准确的 $m$ 和 $b$ 值。这通常通过一个迭代过程来完成：从假设的 $m$ 和 $b$ 值开始，不断重复直到收敛到合适的值。


    将直线拟合到一组点的最常用技术是*普通最小二乘回归*，简称 OLS。它的工作原理是：计算每个点与回归线在 $y$ 方向上的距离的平方，将这些平方值求和，然后除以点的数量，从而计算出*均方误差*，即
    MSE。（对每个距离进行平方处理，可以防止负距离抵消正距离。）接着，它会调整 $m$ 和 $b$，以便在下一次迭代中降低 MSE，并重复此过程，直到 MSE
    足够低。我不会详细说明它如何确定调整 $m$ 和 $b$ 的方向（这并不难，但涉及一点微积分——具体来说，是使用 MSE 函数的*偏导数*来确定在下一次迭代中是增加还是减少
    $m$ 和 $b$），但 OLS 通常只需十几次或更少的迭代，就能将一条直线拟合到一组点上。


    Scikit-Learn 提供了多个类来帮助你构建线性回归模型，包括体现 OLS 的 `LinearRegression` 类，以及将多项式曲线（而非直线）拟合到训练数据的
    `PolynomialFeatures` 类。训练一个线性回归模型可以像这样简单：


    ```python

    model = LinearRegression()

    model.fit(x, y)

    ```


    Scikit 还有其他线性回归类，例如 `Ridge` 和 `Lasso`。它们在一种情况下很有用，即训练数据包含异常值。回想一下第 1 章的内容，异常值是不符合其余数据的数据点。异常值会使模型产生偏差或降低其准确性。`Ridge`
    和 `Lasso` 添加了*正则化*，通过在训练过程中调整系数时减轻异常值对结果的影响，从而缓解其作用。处理异常值的另一种方法是完全移除它们，这正是本章末尾出租车费用示例中将要做的。


    ## 注意


    Lasso 回归还有一个次要好处。如果训练数据存在多重共线性——即两个或多个输入变量线性相关，以至于其中一个可以以相当高的精度从另一个预测出来——Lasso
    会有效地忽略冗余数据。


    多重共线性的一个经典例子是，当一个数据集包含一列指定房屋房间数，另一列指定房屋面积时。房间更多通常意味着面积更大，因此这两个变量在某种程度上是相关的。


    线性回归不限于二维（$x$ 和 $y$ 值）；它适用于任意维度。具有一个自变量（$x$）的线性回归称为*简单线性回归*，而具有两个或更多自变量（例如 $x_1$、$x_2$、$x_3$
    等）的线性回归称为*多元线性回归*。如果数据集是二维的，那么绘制数据以确定其形状就很简单。你也可以绘制三维数据，但绘制具有四维或五维的数据集更具挑战性，而具有数百或数千维的数据集则无法可视化。


    如何确定一个高维数据集是否适合线性回归？一种方法是使用[主成分分析 (PCA)](https://en.wikipedia.org/wiki/Principal_component_analysis)
    和 [$t$-分布随机邻域嵌入 ($t$-SNE)](https://en.wikipedia.org/wiki/T-distributed_stochastic_neighbor_embedding)
    等技术将 $n$ 维降至两维或三维，以便可以绘制它们。这些技术将在[第 6 章](#)中介绍。它们都能在不造成相应信息损失的情况下降低数据集的维度。例如，使用
    PCA，将维度减少 90% 同时保留原始数据集中 90% 的信息并不少见。这听起来可能像魔法，但并非如此。这是数学。


    如果维度数量相对较小，一种更简单的可视化高维数据集的技术是*成对图*，它在传统的二维图表中绘制维度对。[图 2-2](#) 展示了一个成对图，绘制了[第 1
    章](#)介绍的[鸢尾花数据集](https://en.wikipedia.org/wiki/Iris_flower_data_set)的花萼长度与花瓣长度、花萼宽度与花瓣宽度以及其他参数对。


    Seaborn 的 [`pairplot` 函数](https://seaborn.pydata.org/generated/seaborn.pairplot.html)
    使得创建成对图变得容易。[图 2-2](#) 中的图表是用一行代码生成的：


    ```python

    sns.pairplot(df)

    ```


    成对图不仅帮助你可视化数据集中的关系，而且在这个例子中，右下角的直方图还显示了数据集是平衡的。所有三个类别的样本数量相等，并且出于你将在[第 3 章](#)学到的原因，你总是倾向于使用平衡的数据集来训练分类模型。


    线性回归是一种*参数化*学习算法，这意味着它的目的是检查数据集并找到方程中参数的最佳值——例如 $m$ 和 $b$。相比之下，$k$-近邻是一种*非参数化*学习算法，因为它不将数据拟合到方程。学习算法是参数化还是非参数化，这有什么关系？因为用于训练参数化模型的数据集通常需要*归一化*。最简单的归一化意味着确保所有列中的所有值具有一致的范围。我将在第
    5 章介绍归一化，但现在要认识到，使用未归一化的数据（例如，一个数据集在一列中包含 0 到 1 的值，在另一列中包含 0 到 1,000,000 的值）来训练参数化模型，可能会使这些模型的准确性降低，或者完全阻止它们收敛到解决方案。这在支持向量机和神经网络中尤其如此，但也适用于其他参数化模型。即使是
    *k*-近邻模型，在使用归一化数据时效果也最好，因为虽然学习算法是非参数化的，但它内部使用基于距离的计算。


    ## 决策树


    即使你从未上过计算机科学课程，你可能也知道[二叉树](binary_tree)是什么。在机器学习中，*决策树*是一种通过回答一系列问题来预测结果的树结构。大多数决策树都是二叉树，在这种情况下，问题需要简单的“是”或“否”答案。


    图 2-3 展示了 Scikit 从第 1 章介绍的收入与经验数据集构建的决策树。这棵树很简单，因为数据集只有一个特征列（经验年限），并且我将树的深度限制为
    3，但该技术可以扩展到任意大小和复杂度的树。在这个例子中，预测一个有 10 年经验的程序员的薪水只需要三个是/否决策，如红色箭头所示。答案约为 $100K，这与
    *k*-近邻和线性回归应用于同一数据集时的预测结果非常接近。


    *图 2-3. 决策树*


    决策树可用于回归和分类。对于回归器，叶节点（没有子节点的节点）代表回归值。对于分类器，它们代表类别。决策树回归器的输出不是连续的。输出始终是分配给叶节点的值之一，并且叶节点的数量是有限的。相比之下，线性回归模型的输出是连续的。它可以取拟合到训练数据的直线上的任何值。在前面的例子中，如果你要求树预测一个有
    10 年经验的人和一个有 13 年经验的人的薪水，你会得到相同的答案。然而，如果将经验年限增加到 14，预测的薪水会跳升至 $125K（*图 2-4*）。如果你允许树生长得更深，答案会变得更精细。但允许它生长得*太*深可能会导致大问题，原因我们稍后会讨论。


    一旦决策树模型训练完成——即树构建完成——预测就会很快做出。但你如何决定在每个节点做出什么决策？例如，为什么 *图 2-3* 中根节点代表的年数是 13.634？为什么不是
    10.000 或 8.742 或其他数字？同样，如果数据集有多个特征列，你如何决定在每个决策节点上按哪一列进行拆分？'

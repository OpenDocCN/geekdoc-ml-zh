    \ 0.5, 0.75, 1.0],\n    'kernel': ['rbf', 'poly']\n}\n```\n\n```\ngrid_search\
    \ = GridSearchCV(estimator=model, param_grid=grid, cv=5, verbose=2)\ngrid_search.fit(x,\
    \ y) # Train the model with different parameter combinations\n```\n\nThe call\
    \ to `fit` won’t return for a while. It trains the model *250 times* since there\
    \ are 50 different combinations of kernel, C, and gamma, and cv=5 says to use\
    \ fivefold cross-validation to assess the results. Once training is complete,\
    \ you retrieve the best model this way:\n\n```\nbest_model = grid_search.best_estimator_\n\
    ```\n\nIt is not uncommon to run a search regimen such as this one multiple times—the\
    \ first time with course parameter values, and each time thereafter with narrower\
    \ ranges of values centered on the values obtained from `best_params_`. More training\
    \ time up front is the price you pay for an accurate model. To reiterate, you\
    \ can almost always make an SVM more accurate by finding the optimum combination\
    \ of parameters. And for better or worse, brute force is the most effective way\
    \ to identify the best combination.\n\n> **NOTE**\n\nOne nuance to be aware of\
    \ regarding the SVC class is that it doesn’t compute probabilities by default.\
    \ If you want to call `predict_proba` on an SVC instance, you must set `probability`\
    \ to True when creating the instance:\n\npython\nmodel = SVC(probability=True)\n\
    \n\nThe model will train more slowly, but you’ll be able to retrieve probabilities\
    \ as well as predictions. Furthermore, the Scikit documentation warns that “`predict_proba`\
    \ may be inconsistent with `predict`.” For more information, see [Section 1.4.1.2\
    \ in the documentation](https://scikit-learn.org/stable/modules/svm.html#scores-and-probabilities).\n\
    \n# Data Normalization\n\nIn [Chapter 2](https://example.com), I noted that some\
    \ learning algorithms work better with normalized data. Unnormalized data contains\
    \ columns of numbers with vastly different ranges—for example, values from 0 to\
    \ 1 in one column and from 0 to 1,000,000 in another. SVM is a parametric learning\
    \ algorithm. Training with normalized data is important because SVMs use distances\
    \ to compute margins. If one dimension spans *much* larger distances than another,\
    \ the internal algorithm used to find the maximum margins might have trouble converging\
    \ on a solution.\n\nThe importance of training machine learning models with normalized\
    \ data isn’t limited to SVMs. Decision trees and learning algorithms such as random\
    \ forests and gradient-boosted decision trees that rely on decision trees are\
    \ nonparametric, so they work equally well with normalized and unnormalized data.\
    \ They are the exception, however. Most other learning algorithms benefit to one\
    \ degree or another from normalized data. That includes *k*-nearest neighbors,\
    \ which although nonparametric uses distance-"
  - "[PAGE 113]\n\nbased calculations internally to discriminate between classes.\n\
    \nScikit offers several classes for normalizing data. The most commonly used are\
    \ `MinMaxScaler` and `StandardScaler`. The former normalizes data by proportionally\
    \ reducing the values in each column to values from 0.0 to 1.0. Mathematically,\
    \ it’s simple. For each column in a dataset, `MinMaxScaler` subtracts the minimum\
    \ value in that column from all the column’s values, then it divides each value\
    \ by the difference between the minimum and maximum values. In the resulting column,\
    \ the minimum value is 0.0 and the maximum is 1.0.\n\nTo demonstrate, I extracted\
    \ subsets of two columns with vastly different ranges from the breast cancer dataset\
    \ built into Scikit. Each column contains 100 values. Here are the first 10 rows:\n\
    \n```\n[[1.001e+03 3.001e-01]\n [1.326e+03 8.690e-02]\n [1.203e+03 1.974e-01]\n\
    \ [3.861e+02 2.414e-01]\n [1.297e+03 1.980e-01]\n [4.771e+02 1.578e-01]\n [1.040e+03\
    \ 1.127e-01]\n [5.779e+02 9.366e-02]\n [5.198e+02 1.859e-01]\n [4.759e+02 2.273e-01]]\n\
    ```\n\nThe values in the first column range from 201.9 to 1,878.0; the values\
    \ in the second column range from 0.000692 to 0.3754. Figure 5-9 shows how the\
    \ data looks if plotted with the x- and y-axis equally scaled. Because the values\
    \ in the first column are much larger than the values in the second, the data\
    \ points appear to form a line. If you adjust the scale of the axes to match the\
    \ ranges of values in each column, you get a completely different picture (Figure\
    \ 5-10).\n\n![](img/628b9a382d0944bbfa786c66bc651b50_113_0.png)"
- md: "## Pipelining\n\nIf you normalize or standardize the values used to train a\
    \ machine learning model, you must apply the same transform to values input to\
    \ the model’s `predict` method. In other words, if you train a model this way:\n\
    \n```python\nmodel = SVC()\nscaler = StandardScaler()\nx = scaler.fit_transform(x)\n\
    model.fit(x, y)\n```\n\nyou make predictions with it this way:\n\n```python\n\
    input = [0, 1, 2, 3, 4]\nmodel.predict([scaler.transform([input])])\n```\n\nOtherwise,\
    \ you’ll get nonsensical predictions.\nTo simplify your code and make it harder\
    \ to forget to transform training data and prediction data the same way, Scikit\
    \ offers the `make_pipeline` function. `make_pipeline` lets you combine predictive\
    \ models—what Scikit calls *estimators*, or instances of classes such as SVC—with\
    \ transforms applied to data input to those models. Here’s how you use `make_pipeline`\
    \ to ensure that any data input to the model is transformed with `StandardScaler`:\n\
    \n```python\n# Train the model\npipe = make_pipeline(StandardScaler(), SVC())\n\
    pipe.fit(x, y)\n\n# Make a prediction with the model\ninput = [0, 1, 2, 3, 4]\n\
    pipe.predict([input])\n```\n\nNow data used to train the model has `StandardScaler`\
    \ applied to it, and data input to make predictions is transformed the same way.\n\
    What if you wanted to use `GridSearchCV` to find the optimum set of parameters\
    \ for a pipeline that combines a data transform and estimator? It’s not hard,\
    \ but there’s a trick you need to know about. It involves using class names prefaced\
    \ with double underscores in the `param_grid` dictionary passed to `GridSearchCV`.\
    \ Here’s an example:\n\n```python\npipe = make_pipeline(StandardScaler(), SVC())\n\
    \ngrid = {\n    'svc__C': [0.01, 0.1, 1, 10, 100],\n    'svc__gamma': [0.01, 0.25,\
    \ 0.5, 0.75, 1.0],\n    'svc__kernel': ['rbf', 'poly']\n}\n\ngrid_search = GridSearchCV(estimator=pipe,\
    \ param_grid=grid, cv=5, verbose=2)\ngrid_search.fit(x, y) # Train the model with\
    \ different parameter combinations\n```\n\nThis example trains the model 250 times\
    \ to find the best combination of `kernel`, `C`, and `gamma` for the SVC instance\
    \ in the pipeline. Note the “svc__” nomenclature, which maps to the SVC instance\
    \ passed to the `make_pipeline` function.\n\n## Using SVMs for Facial Recognition\n\
    \nModern facial recognition is often accomplished with neural networks, but support\
    \ vector machines can do a credible job too. Let’s demonstrate by building a model\
    \ that recognizes faces. The dataset we’ll use is the [Labeled Faces in the Wild\
    \ (LFW) dataset](https://scikit-learn.org/stable/modules/generated/sklearn.datasets.fetch_lfw_people.html),\
    \ which contains more than 13,000 facial images of famous people collected from\
    \ around the web and is built into Scikit as a sample dataset. Of the more than\
    \ 5,000 people represented in the dataset, 1,680 have two or more facial images,\
    \ while only five have 100 or more. We’ll set the minimum number of faces per\
    \ person to 100, which means that five sets of faces corresponding to five famous\
    \ people will be imported. Each facial image is labeled with the name of the person\
    \ the face belongs to.\n\nStart by creating a new Jupyter notebook and using the\
    \ following statements to load the dataset:\n\n```python\nimport numpy as np\n\
    import pandas as pd\nfrom sklearn.datasets import fetch_lfw_people\n\nfaces =\
    \ fetch_lfw_people(min_faces_per_person=100)\nprint(faces.target_names)\nprint(faces.images.shape)\n\
    ```\n\nIn total, 1,140 facial images were loaded. Each image measures 47 × 62\
    \ pixels for a total of 2,914 pixels per image. That means the dataset contains\
    \ 2,914 features. Use the following code to show the first 24 images in the dataset\
    \ and the people to whom the faces belong:\n\n```python\n%matplotlib inline\n\
    import matplotlib.pyplot as plt\n\nfig, ax = plt.subplots(3, 8, figsize=(18, 10))\n\
    for i, axi in enumerate(ax.flat):\n    axi.imshow(faces.images[i], cmap='gist_gray')\n\
    \    axi.set(xticks=[], yticks=[], xlabel=faces.target_names[faces.target[i]])\n\
    ```\n\nHere is the output:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_118_0.png)\n\
    \nCheck the balance in the dataset by generating a histogram showing how many\
    \ facial images were imported for each person:\n\n```python\nimport seaborn as\
    \ sns\nsns.set()\n\nfrom collections import Counter\ncounts = Counter(faces.target)\n\
    names = {}\n\nfor key in counts.keys():\n    names[faces.target_names[key]] =\
    \ counts[key]\n```\n\n```python\ndf = pd.DataFrame.from_dict(names, orient='index')\n\
    df.plot(kind='bar')\n```\n\nThe output reveals that there are far more images\
    \ of George W. Bush than of anyone else in the dataset:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_119_0.png)\n\
    \nClassification models are best trained with balanced datasets. Use the following\
    \ code to reduce the dataset to 100 images of each person:\n\n```python\nmask\
    \ = np.zeros(faces.target.shape, dtype=bool)\n\nfor target in np.unique(faces.target):\n\
    \    mask[np.where(faces.target == target)[0][:100]] = 1\n\nx = faces.data[mask]\n\
    y = faces.target[mask]\nx.shape\n```\n\nNote that *x* contains 500 facial images\
    \ and *y* contains the labels that go with them: 0 for Colin Powell, 1 for Donald\
    \ Rumsfeld, and so on. Now let’s see if an SVM can make sense of the data. We’ll\
    \ train three different models: one that uses a linear kernel, one that uses a\
    \ polynomial kernel, and one that uses an RBF kernel. In each case, we’ll use\
    \ GridSearchCV to optimize hyperparameters. Start with a linear model and four\
    \ different values of C:\n\n```python\nfrom sklearn.svm import SVC\nfrom sklearn.model_selection\
    \ import GridSearchCV\n```"
  mdcn: "## 流水线处理\n\n如果你在训练机器学习模型时对数值进行了归一化或标准化处理，那么在将数值输入模型的`predict`方法时，必须应用相同的转换。换句话说，如果你这样训练模型：\n\
    \n```python\nmodel = SVC()\nscaler = StandardScaler()\nx = scaler.fit_transform(x)\n\
    model.fit(x, y)\n```\n\n那么你也必须这样进行预测：\n\n```python\ninput = [0, 1, 2, 3, 4]\n\
    model.predict([scaler.transform([input])])\n```\n\n否则，你将得到无意义的预测结果。\n为了简化代码，并避免忘记对训练数据和预测数据应用相同的转换，Scikit\
    \ 提供了`make_pipeline`函数。`make_pipeline`允许你将预测模型（Scikit 称之为*估计器*，即 SVC 等类的实例）与应用于这些模型输入数据的转换结合起来。以下是如何使用`make_pipeline`确保输入模型的任何数据都经过`StandardScaler`转换：\n\
    \n```python\n# 训练模型\npipe = make_pipeline(StandardScaler(), SVC())\npipe.fit(x,\
    \ y)\n\n# 使用模型进行预测\ninput = [0, 1, 2, 3, 4]\npipe.predict([input])\n```\n\n现在，用于训练模型的数据已经应用了`StandardScaler`，而用于预测的数据也以相同的方式进行了转换。\n\
    如果你想使用`GridSearchCV`来寻找结合了数据转换和估计器的流水线的最佳参数集，该怎么办？这并不难，但有一个技巧你需要知道。它涉及在传递给`GridSearchCV`的`param_grid`字典中使用以双下划线为前缀的类名。以下是一个示例：\n\
    \n```python\npipe = make_pipeline(StandardScaler(), SVC())\n\ngrid = {\n    'svc__C':\
    \ [0.01, 0.1, 1, 10, 100],\n    'svc__gamma': [0.01, 0.25, 0.5, 0.75, 1.0],\n\
    \    'svc__kernel': ['rbf', 'poly']\n}\n\ngrid_search = GridSearchCV(estimator=pipe,\
    \ param_grid=grid, cv=5, verbose=2)\ngrid_search.fit(x, y) # 使用不同的参数组合训练模型\n```\n\
    \n这个示例训练了模型 250 次，以找到流水线中 SVC 实例的最佳`kernel`、`C`和`gamma`组合。注意“svc__”命名法，它对应于传递给`make_pipeline`函数的\
    \ SVC 实例。\n\n## 使用 SVM 进行人脸识别\n\n现代人脸识别通常通过神经网络实现，但支持向量机也能完成得相当出色。让我们通过构建一个识别人脸的模型来演示。我们将使用的数据集是[野外标记人脸（LFW）数据集](https://scikit-learn.org/stable/modules/generated/sklearn.datasets.fetch_lfw_people.html)，它包含从网络上收集的超过\
    \ 13,000 张名人面部图像，并作为示例数据集内置于 Scikit 中。在数据集代表的 5,000 多人中，有 1,680 人拥有两张或更多面部图像，而只有五人拥有\
    \ 100 张或更多。我们将设置每人最少面部图像数为 100，这意味着将导入对应五位名人的五组面部图像。每张面部图像都标有其所属人的姓名。\n\n首先，创建一个新的\
    \ Jupyter notebook，并使用以下语句加载数据集：\n\n```python\nimport numpy as np\nimport pandas\
    \ as pd\nfrom sklearn.datasets import fetch_lfw_people\n\nfaces = fetch_lfw_people(min_faces_per_person=100)\n\
    print(faces.target_names)\nprint(faces.images.shape)\n```\n\n总共加载了 1,140 张面部图像。每张图像尺寸为\
    \ 47 × 62 像素，每张图像共有 2,914 个像素。这意味着数据集包含 2,914 个特征。使用以下代码显示数据集中的前 24 张图像及其所属人：\n\
    \n```python\n%matplotlib inline\nimport matplotlib.pyplot as plt\n\nfig, ax =\
    \ plt.subplots(3, 8, figsize=(18, 10))\nfor i, axi in enumerate(ax.flat):\n  \
    \  axi.imshow(faces.images[i], cmap='gist_gray')\n    axi.set(xticks=[], yticks=[],\
    \ xlabel=faces.target_names[faces.target[i]])\n```\n\n输出如下：\n\n![](img/628b9a382d0944bbfa786c66bc651b50_118_0.png)\n\
    \n通过生成直方图检查数据集的平衡性，显示为每个人导入了多少张面部图像：\n\n```python\nimport seaborn as sns\nsns.set()\n\
    \nfrom collections import Counter\ncounts = Counter(faces.target)\nnames = {}\n\
    \nfor key in counts.keys():\n    names[faces.target_names[key]] = counts[key]\n\
    ```\n\n```python\ndf = pd.DataFrame.from_dict(names, orient='index')\ndf.plot(kind='bar')\n\
    ```\n\n输出显示，数据集中乔治·W·布什的图像数量远多于其他人：\n\n![](img/628b9a382d0944bbfa786c66bc651b50_119_0.png)\n\
    \n分类模型最好在平衡的数据集上训练。使用以下代码将数据集减少到每人 100 张图像：\n\n```python\nmask = np.zeros(faces.target.shape,\
    \ dtype=bool)\n\nfor target in np.unique(faces.target):\n    mask[np.where(faces.target\

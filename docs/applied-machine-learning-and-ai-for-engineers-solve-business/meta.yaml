  md: 'x, but $x_1$, $x_2$, $x_3$, and so on), and it is a parametric learning algorithm
    since it uses training data to find optimum values for $m$ and $b$. *How* it finds
    the optimum values is an implementational detail that libraries such as Scikit-Learn
    handle for you. Scikit defaults to a numerical optimization algorithm known as
    *Limited-memory Broyden–Fletcher–Goldfarb–Shanno* (L-BFGS) but supports other
    optimization methods as well. This, incidentally, is one reason why Scikit is
    so popular in the machine learning community. It’s not difficult to calculate
    $m$ and $b$ from the training data for a linear regression model, but it’s harder
    to do it for a logistic regression model, not to mention more sophisticated parametric
    models such as support vector machines.


    Scikit’s `LogisticRegression` class is logistic regression in a box. With it,
    training a logistic regression model can be as simple as this:


    ```

    model = LogisticRegression()

    model.fit(x, y)

    ```


    Once the model is trained, you can call its `predict` method to predict which
    class the input belongs to, or its `predict_proba` method to get the computed
    probabilities for each class. If you fit a `LogisticRegression` model to the dataset
    in Figure 3-1, the following statement predicts whether $x = 10$ corresponds to
    class 0 or class 1:


    ```

    predicted_class = model.predict([[10.0]])[0]

    print(predicted_class) # Outputs 1

    ```


    And these statements show the probabilities computed for each class:


    ```

    predicted_probabilities = model.predict_proba([[10.0]])[0]

    print(f''Class 0: {predicted_probabilities[0]}'') # 0.23508543966167028

    print(f''Class 1: {predicted_probabilities[1]}'') # 0.7649145603383297

    ```


    Scikit also includes the `LogisticRegressionCV` class for training logistic regression
    models with built-in cross-validation. (If you need a refresher, cross-validation
    was introduced in Chapter 2.) At the expense of additional training time, the
    following statements train a logistic regression model using five folds:


    ```

    model = LogisticRegressionCV(cv=5)

    model.fit(x, y)

    ```


    Logistic regression is technically a binary classification algorithm, but it can
    be used for multiclass classification too. I’ll say more about this toward the
    end of the chapter. For now, think of logistic regression as a machine learning
    algorithm that uses the well-known logistic function to quantify the probability
    that an input corresponds to each of two classes, and you’ll have an accurate
    conceptual understanding of what logistic regression is.


    # Accuracy Measures for Classification Models


    You can quantify the accuracy of a classification model the same way you do for
    a regression model: by'

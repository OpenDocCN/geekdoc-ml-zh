    \ label):\n    images, labels = [], []\n\n    for file in os.listdir(path):\n\
    \        images.append(image.img_to_array(image.load_img(os.path.join(path, file),\n\
    \                                target_size=(224, 224, 3))))\n        labels.append((label))\n\
    \n    return images, labels\n\ndef show_images(images):\n    fig, axes = plt.subplots(1,\
    \ 8, figsize=(20, 20),\n                             subplot_kw={'xticks': [],\
    \ 'yticks': []})\n\n    for i, ax in enumerate(axes.flat):\n        ax.imshow(images[i]\
    \ / 255)\n\nx, y = [], []\n```\n\n接下来，加载Jeff的图像并将其标签设为0：\n\n```python\nimages,\
    \ labels = load_images_from_path('Faces/Jeff', 0)\nshow_images(images)\n\nx +=\
    \ images\ny += labels\n```\n\n加载Lori的图像并将其标签设为1：\n\n```python\nimages, labels\
    \ = load_images_from_path('Faces/Lori', 1)\nshow_images(images)\n\nx += images\n\
    y += labels\n```\n\n加载Abby的图像并将其标签设为2：\n\n```python\nimages, labels = load_images_from_path('Faces/Abby',\
    \ 2)\nshow_images(images)\n\nx += images\ny += labels\n```\n\n最后，为VGGFace的ResNet50版本预处理像素，并将数据五五分，以便网络用每个人随机选择的四张图像进行训练，并用相同数量的图像进行验证：\n\
    \n```python\nimport numpy as np\nfrom sklearn.model_selection import train_test_split\n\
    from tensorflow.keras.applications.resnet50 import preprocess_input\n\nfaces =\
    \ preprocess_input(np.array(x))\nlabels = np.array(y)\n\nx_train, x_test, y_train,\
    \ y_test = train_test_split(\n    faces, labels, train_size=0.5, stratify=labels,\n\

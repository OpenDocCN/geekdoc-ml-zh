    \n## 总结\n\n回归模型是监督学习模型，用于预测数值结果，例如出租车费用。用于回归的著名学习算法包括以下几种：\n\n- **线性回归**：通过将训练数据拟合到直线方程来建模。\n\
    - **决策树**：使用二叉树，通过回答一系列“是/否”问题来预测结果。\n- **随机森林**：使用多个独立的决策树对数据进行建模，并且能抵抗过拟合。\n\
    - **梯度提升机**：使用多个*相互依赖*的决策树，每棵树都对上一棵树输出的误差进行建模。\n- **支持向量机**：采用完全不同的方法对数据进行建模，它通过增加维度来假设在原始问题空间中线性不可分的数据在更高维度空间中可能是线性可分的。\n\
    \nScikit在诸如`LinearRegression`、`RandomForestRegressor`和`GradientBoostingRegressor`等类中提供了这些及其他学习算法的便捷实现。\n\
    \n量化回归模型准确性的常用指标是$R^2$分数，也称为决定系数。它通常是一个0到1之间的值，数值越高表示准确性越高。从技术上讲，它是输出方差中可由输入值解释的度量。对于小型数据集，$k$折交叉验证比简单地将数据拆分为一次训练和测试能让你对$R^2$分数更有信心。$k$折交叉验证会训练模型$k$次，每次使用不同的数据集划分。\n\
    \n现实世界的数据集往往比较杂乱，通常需要进一步处理才能用于机器学习。正如出租车费用示例所展示的，训练数据中的异常值会影响模型的准确性，甚至使模型完全无法使用。一种解决方案是在训练模型之前识别并移除异常值。另一种是采用支持正则化的学习算法，如岭回归或lasso回归。\n\
    \n回归模型在机器学习中很常见，但分类模型更为普遍。[第3章](Chapter 3)将直接探讨分类模型，介绍另一种名为逻辑回归的主要学习算法，并在本章所学内容的基础上进行拓展。\n\
    \n## 第3章 分类模型\n\n上一章介绍的机器学习模型使用了各种形式的回归，根据行驶距离、星期几和一天中的时间来预测出租车费用。回归模型预测数值结果，在工业界被广泛用于预测销售额、价格、需求以及其他驱动商业决策的数字。同样重要的是分类模型，它预测分类结果，例如一笔信用卡交易是否欺诈，或者一个手写字符代表字母表中的哪个字母。\n\
    \n大多数分类模型分为两类：*二元分类模型*，只有两种可能的结果；以及*多类分类模型*，有超过两种可能的结果。在这两种情况下，模型都会为输入分配一个单一的类别或*类别标签*。较少见的是*多标签分类模型*，它可以将单个输入分类为属于多个类别——例如，预测一份文档既是机器学习论文又是基因组学论文。有些模型甚至可以预测输入不属于任何可能的类别。\n\
    \n你对回归模型的大部分了解也适用于分类模型。例如，许多驱动回归模型的学习算法同样适用于分类模型。回归和分类之间的一个实质性区别在于如何衡量模型的准确性。分类模型没有$R^2$分数这样的指标。取而代之的是大量的度量标准，例如精确率、召回率、特异性、敏感性和F1分数，仅举几例。掌握分类模型的关键之一是熟悉各种准确性指标，更重要的是，根据模型的预期应用理解应该使用哪一个（或哪几个）指标。\n\

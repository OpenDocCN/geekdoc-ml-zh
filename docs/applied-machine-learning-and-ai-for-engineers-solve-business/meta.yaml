    \ tables of word counts. All you need is a way to measure similarity between rows\
    \ of word counts and you can build a recommender system. And one of the simplest\
    \ and most effective ways to do that is a technique called *cosine similarity*.\n\
    \n## Cosine Similarity\n\n**Cosine similarity** is a mathematical means for computing\
    \ the similarity between pairs of vectors (or rows of numbers treated as vectors).\
    \ The basic idea is to take each value in a sample—for example, word counts in\
    \ a row of vectorized text—and use them as endpoint coordinates for a vector,\
    \ with the other endpoint at the origin of the coordinate system. Do that for\
    \ two samples, and then compute the cosine between vectors in *m*-dimensional\
    \ space, where *m* is the number of values in each sample. Because the cosine\
    \ of 0 is 1, two identical vectors have a similarity of 1. The more dissimilar\
    \ the vectors, the closer the cosine will be to 0.\n\nHere’s an example in two-dimensional\
    \ space to illustrate. Suppose you have three rows containing two values each:\n\
    \n| 1 | 2 |\n|---|---|\n| 2 | 3 |\n| 3 | 1 |\n\nYou want to determine whether\
    \ row 2 is more similar to row 1 or row 3. It’s hard to tell just by looking at\
    \ the numbers, and in real life, there are *many* more numbers. If you simply\
    \ added the numbers in each row and compared the sums, you would conclude that\
    \ row 2 is more similar to row 3. But what if you treated each row as a vector,\
    \ as shown in **Figure 4-2**?\n\n- Row 1: (0, 0) → (1, 2)\n- Row 2: (0, 0) → (2,\
    \ 3)\n- Row 3: (0, 0) → (3, 1)\n\n![](img/628b9a382d0944bbfa786c66bc651b50_100_0.png)\n\
    \nNow you can plot each row as a vector, compute the cosines of the angles formed\
    \ by 1 and 2 and 2 and 3, and determine that row 2 is more like row 1 than row\
    \ 3. That’s cosine similarity in a nutshell.\n\nCosine similarity isn’t limited\
    \ to two dimensions; it works in higher-dimensional space as well. To help compute\
    \ cosine similarities regardless of the number of dimensions, Scikit offers the\
    \ `cosine_similarity` function. The following code computes the cosine similarities\
    \ of the three samples in the preceding example:\n\n```python\ndata = [[1, 2],\
    \ [2, 3], [3, 1]]\ncosine_similarity(data)\n```\n\nThe return value is a *similarity\
    \ matrix* containing the cosines of every vector pair. The width and height of\
    \ the matrix equals the number of samples:\n\n```python\narray([[1.        , 0.99227788,\
    \ 0.70710678],\n       [0.99227788, 1.        , 0.78935222],\n       [0.70710678,\
    \ 0.78935222, 1.        ]])\n```\n\nFrom this, you can see that the similarity\

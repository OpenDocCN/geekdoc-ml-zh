    You can compute distances in $n$-dimensional space easily enough, but there are
    several ways to measure distances to identify a point’s nearest neighbors, including
    Euclidean distance, Manhattan distance, and Minkowski distance. You can even use
    weights so that nearby points contribute more to the outcome than faraway points.
    And rather than find the $n$ nearest neighbors, you can select all the neighbors
    within a given radius, a technique known as *radius neighbors*. Still, the principle
    is the same regardless of the number of dimensions in the dataset, the method
    used to measure distance, or whether you choose $n$ nearest neighbors or all the
    neighbors within a specified radius: find data points that are similar to the
    target point and use them to regress or classify the target.



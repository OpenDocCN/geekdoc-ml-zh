  md: '# Chapter 6. Principal Component Analysis


    Principal component analysis, or PCA, is one of the minor miracles of machine
    learning. It’s a dimensionality reduction technique that reduces the number of
    dimensions in a dataset without sacrificing a commensurate amount of information.
    While that might seem underwhelming on the face of it, it has profound implications
    for engineers and software developers working to build predictive models from
    their data.


    What if I told you that you could take a dataset with 1,000 columns, use PCA to
    reduce it to 100 columns, and retain 90% or more of the information in the original
    dataset? That’s relatively common, believe it or not. And it lends itself to a
    variety of practical uses, including:


    +   - Reducing high-dimensional data to two or three dimensions so that it can
    be plotted and explored

    - Reducing the number of dimensions in a dataset and then restoring the original
    number of dimensions, which finds application in anomaly detection and noise filtering

    - Anonymizing datasets so that they can be shared with others without revealing
    the nature or meaning of the data


    And that’s not all. A side effect of applying PCA to a dataset is that less important
    features—columns of data that have less relevance to the outcome of a predictive
    model—are removed, while dependencies between columns is eliminated. And in datasets
    with a low ratio of samples (rows) to features (columns), PCA can be used to increase
    that ratio. As a rule of thumb, you typically want a dataset used for machine
    learning to have *at least* five times as many rows as it has columns. If you
    can’t add rows, an alternative is to use PCA to shave columns.


    Once you learn about PCA, you’ll wonder how you lived without it. Let’s take a
    few moments to understand what it is and how it works. Then we’ll look at some
    examples demonstrating why it’s such an indispensable tool.


    # Understanding Principal Component Analysis


    One way to wrap your head around PCA is to see how it reduces a two-dimensional
    dataset to one dimension. Figure 6-1 depicts a 2D dataset comprising a somewhat
    random collection of *x* and *y* values. If you reduced this dataset to a single
    dimension by simply dropping the *x* column or the *y* column, you’d be left with
    a horizontal or vertical line that bears little resemblance to the original dataset.'

- md: "The validation accuracy is better than that of an SVM or a conventional neural\
    \ network, but it’s nowhere near what modern CNNs achieve on the LFW dataset.\
    \ So clearly there is a better way.\n\nThat better way, of course, is transfer\
    \ learning, which we covered in Chapter 10. ResNet50 was trained with more than\
    \ 1 million images from the ImageNet dataset, so it should be adept at extracting\
    \ features from photos—more so than a handcrafted CNN trained with 400 images.\
    \ Let’s see if that’s the case. Use the following statements to load ResNet50’s\
    \ feature extraction layers, initialize them with the ImageNet weights, and freeze\
    \ them so that the weights aren’t adjusted during training:\n\n```python\nfrom\
    \ tensorflow.keras.applications import ResNet50\n\nbase_model = ResNet50(weights='imagenet',\
    \ include_top=False)\nbase_model.trainable = False\n```\n\nNow add classification\
    \ layers to the base model and include a Resizing layer to resize images input\
    \ to the network to the size that ResNet50 expects:\n\n```python\nfrom tensorflow.keras.models\
    \ import Sequential\nfrom tensorflow.keras.layers import Flatten, Dense, Resizing\n\
    \nmodel = Sequential()\nmodel.add(Resizing(224, 224))\nmodel.add(base_model)\n\
    model.add(Flatten())\nmodel.add(Dense(1024, activation='relu'))\nmodel.add(Dense(class_count,\
    \ activation='softmax'))\nmodel.compile(optimizer='adam', loss='sparse_categorical_crossentropy',\n\
    \              metrics=['accuracy'])\n```\n\nTrain the model and plot the training\
    \ and validation accuracy:\n\n```python\nimport seaborn as sns\nsns.set()\n\n\
    hist = model.fit(x_train, y_train, validation_data=(x_test, y_test),\n       \
    \          batch_size=10, epochs=10)\n\nacc = hist.history['accuracy']\nval_acc\
    \ = hist.history['val_accuracy']\nepochs = range(1, len(acc) + 1)\n\nplt.plot(epochs,\
    \ acc, '-', label='Training Accuracy')\nplt.plot(epochs, val_acc, ':', label='Validation\
    \ Accuracy')\nplt.title('Training and Validation Accuracy')\nplt.xlabel('Epoch')\n\
    plt.ylabel('Accuracy')\nplt.legend(loc='lower right')\nplt.plot()\n```\n\nResults\
    \ will vary, but my run produced a validation accuracy around 94%:\n\nThis is\
    \ an improvement over a CNN trained from scratch, and it’s an indication that\
    \ ResNet50 does a better job of extracting features from facial images. But it’s\
    \ still not state of the art. Is it possible to do even better?\n\n## Boosting\
    \ Transfer Learning with Task-Specific Weights\n\nInitialized with ImageNet weights,\
    \ ResNet50 does a credible job of feature extraction. Those weights were arrived\
    \ at when ResNet50 was trained on more than 1 million photos of objects ranging\
    \ from basketballs to butterflies. It was not, however, trained with facial images.\
    \ Would it be better at extracting features from facial images if it were *trained*\
    \ with facial images?\n\nIn 2017, a group of researchers at the University of\
    \ Oxford’s Visual Geometry Group published a paper titled “VGGFace2: A Dataset\
    \ for Recognising Faces Across Pose and Age”. After assembling a dataset comprising\
    \ several million facial images, they trained two variations of ResNet50 with\
    \ it and published the results. They also published the weights, which are wrapped\
    \ in a handy Python library named Keras-vggface. That library includes a class\
    \ named VGGFace that encapsulates ResNet50 with TensorFlow-compatible weights.\
    \ Out of the box, the VGGFace model is capable of recognizing the faces of thousands\
    \ of celebrities ranging from Brie Larson to Jennifer Aniston. But its real value\
    \ lies in using transfer learning to repurpose it to recognize faces it wasn’t\
    \ trained to recognize before.\n\nTo simplify matters, I installed Keras-vggface,\
    \ created an instance of VGGFace without the classification layers, initialized\
    \ the weights, and saved the model to an H5 file named vggface.h5. [Download that\
    \ file](https://example.com) and drop it into your notebooks’ *Data* subdirectory.\
    \ Then use the following code to create an instance of VGGFace built on top of\
    \ ResNet50, and add custom classification layers:\n\n```python\nfrom tensorflow.keras.models\
    \ import load_model\n\nbase_model = load_model('Data/vggface.h5')\nbase_model.trainable\
    \ = False\n\nmodel = Sequential()\nmodel.add(Resizing(224, 224))\nmodel.add(base_model)\n\
    model.add(Flatten())\nmodel.add(Dense(1024, activation='relu'))\nmodel.add(Dense(class_count,\
    \ activation='softmax'))\nmodel.compile(optimizer='adam', loss='sparse_categorical_crossentropy',\n\
    \              metrics=['accuracy'])\n```\n\nNext, train the model and plot the\
    \ training and validation accuracy:\n\n```python\nhist = model.fit(x_train, y_train,\
    \ validation_data=(x_test, y_test),\n                 batch_size=10, epochs=10)\n\
    \nacc = hist.history['accuracy']\nval_acc = hist.history['val_accuracy']\nepochs\
    \ = range(1, len(acc) + 1)\n\nplt.plot(epochs, acc, '-', label='Training Accuracy')\n\
    plt.plot(epochs, val_acc, ':', label='Validation Accuracy')\nplt.title('Training\
    \ and Validation Accuracy')\nplt.xlabel('Epoch')\nplt.ylabel('Accuracy')\nplt.legend(loc='lower\
    \ right')\nplt.plot()\n```\n\nThe results are spectacular:\n\nTo be sure, run\
    \ the test data through the network and use a confusion matrix to assess the results:\n\
    \n```python\nfrom sklearn.metrics import ConfusionMatrixDisplay as cmd\n\nsns.reset_orig()\n\
    y_pred = model.predict(x_test)\nfig, ax = plt.subplots(figsize=(5, 5))\nax.grid(False)\n\
    \ncmd.from_predictions(y_test, y_pred.argmax(axis=1),\n                     display_labels=faces.target_names,\
    \ colorbar=False,\n                     cmap='Blues', xticks_rotation='vertical',\
    \ ax=ax)\n```\n\nBecause VGGFace was tuned to extract features from facial images,\
    \ it achieves a perfect score on the 100 test images. That’s not to say that it\
    \ will never fail to recognize a face. It does indicate that, on the dataset you\
    \ trained it with, it is remarkably adept at extracting features from facial images:\n\
    \nAnd therein lies an important lesson. CNNs that are trained in task-specific\
    \ ways frequently provide a better base for transfer learning than CNNs trained\
    \ in a more generic fashion. If the goal is to perform facial recognition, you’ll\
    \ almost always do better with a CNN trained with facial images than a CNN trained\

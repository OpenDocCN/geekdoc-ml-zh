    # Containerizing a Machine Learning Model


    One downside to wrapping a machine learning model in a web service and running
    it locally is that the client computer must have Python installed, as well as
    all the packages that the model and web service require. An alternative is to
    host the web service in the cloud where it can be called via the internet. It’s
    not hard to go out to Azure or AWS, spin up a virtual machine (VM), and install
    the software there. But there’s a better way. That better way is containers.


    Containers have revolutionized the way software is built and deployed. A container
    includes an app and everything the app needs to run, including a runtime (for
    example, Python), the packages the app relies on, and even a virtual filesystem.
    If you’re not familiar with containers, think of them as lightweight VMs that
    start quickly and consume far less memory. Docker is the world’s most popular
    container platform, although it is rapidly being supplanted by Kubernetes.


    Containers are created from *container images*, which serve as blueprints for
    containers in the same way that classes in object-oriented programming languages
    constitute blueprints for objects. The first step in creating a Docker container
    image containing the sentiment analysis model and web service is to create a file
    named *Dockerfile* (no filename extension) in the same directory as *app.py* and
    *sentiment.pkl* and then paste the following statements into it:


    ```

    FROM python:3.8

    RUN pip install flask numpy scipy scikit-learn && \n    mkdir /app

    COPY app.py /app

    COPY sentiment.pkl /app

    WORKDIR /app

    EXPOSE 5000

    ENTRYPOINT ["python"]

    CMD ["app.py"]

    ```


    A *Dockerfile* contains instructions for building a container image. This one
    creates a container image that includes a Python runtime, several Python packages
    such as Flask and Scikit-Learn, and *app.py* and *sentiment.pkl*. It also instructs
    the Docker runtime that hosts the container to open port 5000 for HTTP requests
    and to execute *app.py* when the container starts.


    There are several ways to build a container image from a *Dockerfile*. If Docker
    is installed on your computer, you can use a `docker build` command:


    ```

    docker build -t sentiment-server .

    ```


    Alternatively, you can upload the *Dockerfile* to a cloud platform such as Microsoft
    Azure and build it there. This prevents you from having to have Docker installed
    on the local machine, and it makes it easy to store the resulting container image
    in the cloud. Container images are stored in *container registries*,'
  - "[PAGE 157]\n\nand modern cloud platforms host container registries as well as\
    \ containers. If you launch a container instance in Azure, the web service in\
    \ the container can be invoked with a URL similar to this one:\n\n```\nhttp://wintellect.northcentralus.azurecontainer.io:5000/analyze?text=Great\
    \ food and excellent service!\n```\n\nOne of the benefits of hosting the container\
    \ instance in the cloud is that it can be reached from any client app running\
    \ on any machine and any operating system, and the computer that hosts the app\
    \ needs nothing special installed. Containers can be beneficial even if you host\
    \ the web service locally rather than in the cloud. As long as you deploy a container\
    \ stack such as the Docker runtime to the local machine, you don’t have to install\
    \ Python and all the packages that the web service requires. You just launch a\
    \ container instance and direct HTTP requests to it via localhost.\n\n# Using\
    \ ONNX to Bridge the Language Gap\n\nIs it possible to bridge the gap between\
    \ a C# client and a Python ML model without using a web service as a middleman?\
    \ In a word, yes! The solution lies in a four-letter acronym: *ONNX*. As mentioned\
    \ earlier, ONNX stands for Open Neural Network Exchange, and it was originally\
    \ devised to allow deep-learning models written with one framework—for example,\
    \ TensorFlow—to be used with other frameworks such as PyTorch. But today it can\
    \ be used with Scikit models too. I’ll say more about ONNX in [Chapter 12](#),\
    \ but for now, let’s use it to call a Python model *directly* from an app written\
    \ in C#—no web service required.\n\nThe first step in using ONNX to bridge the\
    \ language gap is to install [Skl2onnx](#) in your Python environment. Then use\
    \ that package’s `convert_sklearn` method to save a trained Scikit model to a\
    \ `.onnx` file. Here’s a short code snippet that saves the sentiment analysis\
    \ model in [Example 7-1](#) to a file named *sentiment.onnx*. The `initial_types`\
    \ parameter specifies that the model expects one input value: a string containing\
    \ the text to score for sentiment:\n\n```\nfrom skl2onnx import convert_sklearn\n\
    from skl2onnx.common.data_types import StringTensorType\n\ninitial_type = [('string_input',\
    \ StringTensorType([None, 1]))]\nonnx = convert_sklearn(pipe, initial_types=initial_type)\n\
    \nwith open('sentiment.onnx', 'wb') as f:\n    f.write(onnx.SerializeToString())\n\
    ```\n\nIf you wish to consume the model from Python, you first install a Python\
    \ package named [Onnxruntime](#) containing the ONNX runtime, also known as the\
    \ ORT. This provides support for loading and running ONNX models. Then you call\
    \ the runtime’s `InferenceSession` method with a path to a `.onnx` file to deserialize\
    \ the model, and call `run` on the returned session object to call the model’s\
    \ `predict` or `predict_proba` method. Here’s how it looks in code:\n\n```\nimport\
    \ numpy as np\nimport onnxruntime as rt\n\nsession = rt.InferenceSession('sentiment.onnx')\n\
    ```"
- md: "## Building ML Models in C# with ML.NET\n\nScikit-Learn is arguably the world’s\
    \ most popular machine learning framework. The efficacy of the library, the documentation\
    \ that accompanies it, and the mindshare that surrounds it are the primary reasons\
    \ more ML models are written in Python than any other language. But Scikit isn’t\
    \ the only machine learning framework. Others exist for other languages, and if\
    \ you can code an ML model in the same programming language as the client that\
    \ consumes it, you can avoid jumping through hoops to operationalize the model.\n\
    \n[ML.NET](https://dotnet.microsoft.com/apps/machinelearning-ai/ml-dotnet) is\
    \ Microsoft’s free, open source, cross-platform machine learning library for .NET\
    \ developers. It does most of what Scikit does and a few things that Scikit doesn’t\
    \ do. And when it comes to writing ML/AI solutions in C#, there is no better tool\
    \ for the job.\n\nML.NET derives from an internal library that was developed by\
    \ Microsoft—and has been used in Microsoft products—for more than a decade. The\
    \ ML algorithms that it implements have been tried and tested in the real world\
    \ and tuned to optimize performance and accuracy. Because ML.NET is consumed from\
    \ C#, you get all the benefits of a compiled programming language, including type\
    \ safety and fast execution.\n\nA [paper published by the ML.NET team](https://arxiv.org/abs/1905.09272)\
    \ at Microsoft in 2019 discusses the motivations and design goals behind ML.NET.\
    \ It also compares ML.NET’s accuracy and performance to that of Scikit-Learn and\
    \ another machine learning framework named [H2O](https://www.h2o.ai/). Using a\
    \ 9 GB Amazon review dataset, ML.NET trained a sentiment analysis model to 95%\
    \ accuracy. Neither Scikit nor H2O could process the dataset due to its size.\
    \ When all three frameworks were trained on 10% of the dataset, ML.NET achieved\
    \ the highest accuracy, and trained six times faster than Scikit and almost 10\
    \ times faster than H2O.\n\nML.NET is compatible with Windows, Linux, and macOS.\
    \ Thanks to an innovation called IDataView, it can handle datasets of virtually\
    \ unlimited size. While it can’t be used to build neural networks from scratch,\
    \ it does have the ability to load existing neural networks and use a technique\
    \ called *transfer learning* to repurpose those networks to solve domain-specific\
    \ problems. (Transfer learning will be covered in Chapter 10.) It also builds\
    \ in ONNX support that allows it to load sophisticated models, including deep-learning\
    \ models, stored in ONNX format. Finally, it can be consumed in Python and even\
    \ combined with Scikit-Learn using a set of Python bindings called NimbusML.\n\
    \nIf you’re a .NET developer who is interested in machine learning, there has\
    \ never been a better time to get acquainted with ML.NET. This section isn’t meant\
    \ to provide an exhaustive treatment of ML.NET but to introduce it, show the basics\
    \ of building ML models with it, and hopefully whet your appetite enough to motivate\
    \ you to learn more. There are plenty of great resources available online, including\
    \ the official ML.NET documentation, a GitHub repo containing ML.NET samples,\
    \ and the ML.NET cookbook.\n\n## Sentiment Analysis with ML.NET\n\nThe following\
    \ C# code uses ML.NET to build and train a sentiment analysis model. It’s equivalent\
    \ to the Python implementation in Example 7-1:\n\n```csharp\nvar context = new\
    \ MLContext(seed: 0);\n\n// Load the data\nvar data = context.Data.LoadFromTextFile<Input>(\"\
    reviews.csv\",\n    hasHeader: true, separatorChar: ',', allowQuoting: true);\n\
    \n// Split the data into a training set and a test set\nvar trainTestData = context.Data.TrainTestSplit(data,\n\
    \    testFraction: 0.2, seed: 0);\nvar trainData = trainTestData.TrainSet;\nvar\
    \ testData = trainTestData.TestSet;\n\n// Build and train the model\nvar pipeline\
    \ = context.Transforms.Text.FeaturizeText\n    (outputColumnName: \"Features\"\
    , inputColumnName: \"Text\")\n    .Append(context.BinaryClassification.Trainers.SdcaLogisticRegression());\n\
    \nvar model = pipeline.Fit(trainData);\n\n// Evaluate the model\nvar predictions\
    \ = model.Transform(testData);\nvar metrics = context.BinaryClassification.Evaluate(predictions);\n\
    Console.WriteLine($\"AUC: {metrics.AreaUnderPrecisionRecallCurve:P2}\");\n\n//\
    \ Score a line of text for sentiment\nvar predictor = context.Model.CreatePredictionEngine<Input,\
    \ Output>(model);\nvar input = new Input { Text = \"Among the best movies I have\
    \ ever seen\"};\nvar prediction = predictor.Predict(input);\n\n// Show the score\n\
    Console.WriteLine($\"Sentiment score: {prediction.Probability}\");\n```\n\nEvery\
    \ ML.NET app begins by creating an instance of the MLContext class. The optional\
    \ seed parameter initializes the random-number generator used by ML.NET so that\
    \ you get repeatable results from one run to the next. MLContext exposes a number\
    \ of properties through which large parts of the ML.NET API are accessed. One\
    \ example of this is the call to LoadFromTextFile, which is a DataOperationsCatalog\
    \ method accessed through MLContext’s Data property.\n\nOf course, the whole point\
    \ of this discussion is to call the model from C# instead of Python. That’s not\
    \ difficult either, thanks to a NuGet package from Microsoft called Microsoft.ML.OnnxRuntime.\
    \ You can install it from the command line or using an integrated development\
    \ environment such as Visual Studio. Then it’s a relatively simple matter to write\
    \ a C# console app that re-creates the trained sentiment analysis model from the\
    \ .onnx file and calls it to score a text string:\n\n```csharp\nusing System;\n\
    using Microsoft.ML.OnnxRuntime;\nusing Microsoft.ML.OnnxRuntime.Tensors;\nusing\
    \ System.Collections.Generic;\nusing System.Linq;\n\nclass Program\n{\n    static\
    \ void Main(string[] args)\n    {\n        string text;\n\n        // Get the\
    \ text to analyze\n        if (args.Length > 0)\n        {\n            text =\
    \ args[0];\n        }\n        else\n        {\n            Console.Write(\"Text\
    \ to analyze: \");\n            text = Console.ReadLine();\n        }\n\n    \
    \    // Create the model and pass the text to it\n        var tensor = new DenseTensor<string>(new\
    \ string[]\n            { text }, new int[] { 1, 1 });\n\n        var input =\
    \ new List<NamedOnnxValue>\n        {\n            NamedOnnxValue.CreateFromTensor<string>(\"\
    string_input\", tensor)\n        };\n\n        var session = new InferenceSession(\"\
    sentiment.onnx\");\n        var output = session.Run(input)\n            .ToList().Last().AsEnumerable<NamedOnnxValue>();\n\
    \n        var score = output.First().AsDictionary<Int64, float>()[1];\n\n    \
    \    // Show the sentiment score\n        Console.WriteLine(score);\n    }\n}\n\
    ```\n\nThis code assumes that *sentiment.onnx* is present in the current directory.\
    \ Instantiating the InferenceSession object creates the model, and calling Run\
    \ on the object invokes the model. Under the hood, Run calls the model's `predict`\
    \ and `predict_proba` methods and makes the results of both available. There's\
    \ a little work required to convert C# types into ONNX types and vice versa, but\
    \ once you get the hang of it, it's pretty remarkable that you can call a machine\
    \ learning model written in Python directly from C#.\n\nHere's another example.\
    \ Suppose you wanted to consume Chapter 2's taxi-fare regression model in C#.\
    \ Recall that the model accepts three floating-point values as input—the day of\
    \ the week (0–6), the hour of day (0–23), and the distance to travel in miles—and\
    \ returns a predicted taxi fare. The following Python code saves the trained model\
    \ in an ONNX file:\n\n```python\nfrom skl2onnx import convert_sklearn\nfrom skl2onnx.common.data_types\
    \ import FloatTensorType\n\ninitial_type = [('float_input', FloatTensorType([None,\
    \ 3]))]\nonnx = convert_sklearn(model, initial_types=initial_type)\n\nwith open('taxi.onnx',\
    \ 'wb') as f:\n    f.write(onnx.SerializeToString())\n```\n\nThe following C#\
    \ code loads the model and makes a prediction. The big difference between this\
    \ and the previous example is that you pass the model an array of three floating-point\
    \ values rather than a string:\n\n```csharp\n// Package the input\nvar input =\
    \ new float[] {\n    4.0f,  // Day of week\n    17.0f, // Pickup time (hour of\
    \ day)\n    2.0f   // Distance to travel\n};\n\nvar tensor = new DenseTensor<float>(input,\
    \ new int[] { 1, 3 });\n\n// Create the model and pass the input to it\nvar session\
    \ = new InferenceSession(\"taxi.onnx\");\n\nvar output = session.Run(new List<NamedOnnxValue>\n\
    {\n    NamedOnnxValue.CreateFromTensor(\"float_input\", tensor)\n});\n\nvar score\
    \ = output.First().AsTensor<float>().First();\n\n// Show the predicted fare\n\
    Console.WriteLine($\"{score:#.00}\");\n```\n\nSo which is faster? Calling a machine\
    \ learning model wrapped in a web service, or calling the same model using ONNX?\
    \ I wrote a simple test harness to answer that question. On my computer, calling\
    \ the sentiment analysis model in a Flask web service running locally required\
    \ slightly more than 2 seconds per round trip. Calling the same model through\
    \ the Python ONNX runtime took 0.001 seconds on average. That’s a difference of\
    \ more than three orders of magnitude. And you would incur additional latency\
    \ if the web service was hosted on a remote server.\n\nSignificantly, ONNX isn’t\
    \ limited to C# and Python. ONNX runtimes are available for Python, C, C++, C#,\
    \ Java, JavaScript, and Objective-C, and they run on Windows, Linux, macOS, Android,\
    \ and iOS. When it comes to projecting machine learning models written in Python\
    \ to other platforms and languages, ONNX is a game changer. For more information,\
    \ check out the [ONNX runtime website](https://onnxruntime.ai/)."
  mdcn: "## 使用 ML.NET 在 C# 中构建机器学习模型\n\nScikit-Learn 可以说是世界上最流行的机器学习框架。该库的有效性、配套文档以及围绕它的广泛认知度，是大多数机器学习模型使用\
    \ Python 编写而非其他语言的主要原因。但 Scikit 并非唯一的机器学习框架。其他语言也有各自的框架，如果你能用与消费模型的客户端相同的编程语言来编写机器学习模型，就可以避免在模型部署过程中大费周章。\n\
    \n[ML.NET](https://dotnet.microsoft.com/apps/machinelearning-ai/ml-dotnet) 是微软为\
    \ .NET 开发者提供的免费、开源、跨平台的机器学习库。它具备 Scikit 的大部分功能，并且还有一些 Scikit 没有的功能。当涉及到用 C# 编写机器学习/人工智能解决方案时，没有比它更合适的工具了。\n\
    \nML.NET 源自微软内部开发的一个库——该库已在微软产品中使用了十多年。它实现的机器学习算法经过了现实世界的反复检验和调试，以优化性能和准确性。由于\
    \ ML.NET 是从 C# 调用的，因此你可以获得编译型编程语言的所有好处，包括类型安全和快速执行。\n\n微软 ML.NET 团队在 2019 年发表的一篇[论文](https://arxiv.org/abs/1905.09272)讨论了\
    \ ML.NET 背后的动机和设计目标。它还将 ML.NET 的准确性和性能与 Scikit-Learn 以及另一个名为 [H2O](https://www.h2o.ai/)\
    \ 的机器学习框架进行了比较。使用一个 9 GB 的亚马逊评论数据集，ML.NET 训练出一个准确率达到 95% 的情感分析模型。由于数据集规模过大，Scikit\
    \ 和 H2O 都无法处理。当三个框架都在该数据集的 10% 上进行训练时，ML.NET 达到了最高的准确率，并且训练速度比 Scikit 快六倍，比 H2O\
    \ 快近十倍。\n\nML.NET 兼容 Windows、Linux 和 macOS。得益于一种名为 IDataView 的创新技术，它几乎可以处理任意大小的数据集。虽然它不能用于从头构建神经网络，但它确实能够加载现有的神经网络，并使用一种称为*迁移学习*的技术来重新利用这些网络解决特定领域的问题。（迁移学习将在第\
    \ 10 章介绍。）它还内置了 ONNX 支持，允许加载以 ONNX 格式存储的复杂模型，包括深度学习模型。最后，它可以在 Python 中使用，甚至可以通过一组名为\
    \ NimbusML 的 Python 绑定与 Scikit-Learn 结合使用。\n\n如果你是一位对机器学习感兴趣的 .NET 开发者，现在正是熟悉\
    \ ML.NET 的最佳时机。本节并非旨在全面介绍 ML.NET，而是对其进行引入，展示使用它构建机器学习模型的基础知识，并希望激发你的兴趣，促使你进一步学习。网上有大量优秀的资源，包括官方的\
    \ ML.NET 文档、包含 ML.NET 示例的 GitHub 仓库以及 ML.NET 食谱。\n\n## 使用 ML.NET 进行情感分析\n\n以下\
    \ C# 代码使用 ML.NET 构建并训练一个情感分析模型。它等同于示例 7-1 中的 Python 实现：\n\n```csharp\nvar context\
    \ = new MLContext(seed: 0);\n\n// Load the data\nvar data = context.Data.LoadFromTextFile<Input>(\"\
    reviews.csv\",\n    hasHeader: true, separatorChar: ',', allowQuoting: true);\n\
    \n// Split the data into a training set and a test set\nvar trainTestData = context.Data.TrainTestSplit(data,\n\
    \    testFraction: 0.2, seed: 0);\nvar trainData = trainTestData.TrainSet;\nvar\
    \ testData = trainTestData.TestSet;\n\n// Build and train the model\nvar pipeline\
    \ = context.Transforms.Text.FeaturizeText\n    (outputColumnName: \"Features\"\
    , inputColumnName: \"Text\")\n    .Append(context.BinaryClassification.Trainers.SdcaLogisticRegression());\n\
    \nvar model = pipeline.Fit(trainData);\n\n// Evaluate the model\nvar predictions\
    \ = model.Transform(testData);\nvar metrics = context.BinaryClassification.Evaluate(predictions);\n\
    Console.WriteLine($\"AUC: {metrics.AreaUnderPrecisionRecallCurve:P2}\");\n\n//\
    \ Score a line of text for sentiment\nvar predictor = context.Model.CreatePredictionEngine<Input,\
    \ Output>(model);\nvar input = new Input { Text = \"Among the best movies I have\
    \ ever seen\"};\nvar prediction = predictor.Predict(input);\n\n// Show the score\n\
    Console.WriteLine($\"Sentiment score: {prediction.Probability}\");\n```\n\n每个\
    \ ML.NET 应用程序都始于创建 MLContext 类的一个实例。可选的 seed 参数初始化 ML.NET 使用的随机数生成器，以便在不同运行之间获得可重复的结果。MLContext\
    \ 通过多个属性暴露了 ML.NET API 的大部分功能。例如，调用 LoadFromTextFile 就是通过 MLContext 的 Data 属性访问的\
    \ DataOperationsCatalog 方法。\n\n当然，整个讨论的重点是从 C# 而不是 Python 调用模型。这也不难，这要归功于微软的一个名为\
    \ Microsoft.ML.OnnxRuntime 的 NuGet 包。你可以从命令行或使用 Visual Studio 等集成开发环境安装它。然后，编写一个\
    \ C# 控制台应用程序，从 .onnx 文件重新创建训练好的情感分析模型并调用它来对文本字符串进行评分，就相对简单了：\n\n```csharp\nusing\
    \ System;\nusing Microsoft.ML.OnnxRuntime;\nusing Microsoft.ML.OnnxRuntime.Tensors;\n\
    using System.Collections.Generic;\nusing System.Linq;\n\nclass Program\n{\n  \
    \  static void Main(string[] args)\n    {\n        string text;\n\n        //\
    \ Get the text to analyze\n        if (args.Length > 0)\n        {\n         \
    \   text = args[0];\n        }\n        else\n        {\n            Console.Write(\"\
    Text to analyze: \");\n            text = Console.ReadLine();\n        }\n\n \
    \       // Create the model and pass the text to it\n        var tensor = new\
    \ DenseTensor<string>(new string[]\n            { text }, new int[] { 1, 1 });\n\
    \n        var input = new List<NamedOnnxValue>\n        {\n            NamedOnnxValue.CreateFromTensor<string>(\"\
    string_input\", tensor)\n        };\n\n        var session = new InferenceSession(\"\
    sentiment.onnx\");\n        var output = session.Run(input)\n            .ToList().Last().AsEnumerable<NamedOnnxValue>();\n\
    \n        var score = output.First().AsDictionary<Int64, float>()[1];\n\n    \
    \    // Show the sentiment score\n        Console.WriteLine(score);\n    }\n}\n\
    ```\n\n这段代码假设 *sentiment.onnx* 文件存在于当前目录中。实例化 InferenceSession 对象会创建模型，而调用该对象的\
    \ Run 方法则会调用模型。在底层，Run 调用模型的 `predict` 和 `predict_proba` 方法，并使两者的结果都可用。将 C# 类型转换为\
    \ ONNX 类型以及反向转换需要一些工作，但一旦你掌握了窍门，能够直接从 C# 调用用 Python 编写的机器学习模型，这确实非常了不起。\n\n这里是另一个例子。假设你想在\
    \ C# 中使用第 2 章的出租车费用回归模型。回想一下，该模型接受三个浮点值作为输入——星期几（0-6）、一天中的小时（0-23）和行驶距离（英里）——并返回预测的出租车费用。以下\
    \ Python 代码将训练好的模型保存为 ONNX 文件：\n\n```python\nfrom skl2onnx import convert_sklearn\n\
    from skl2onnx.common.data_types import FloatTensorType\n\ninitial_type = [('float_input',\
    \ FloatTensorType([None, 3]))]\nonnx = convert_sklearn(model, initial_types=initial_type)\n\
    \nwith open('taxi.onnx', 'wb') as f:\n    f.write(onnx.SerializeToString())\n\
    ```\n\n以下 C# 代码加载模型并进行预测。这与前一个示例的主要区别在于，你传递给模型的是一个包含三个浮点值的数组，而不是一个字符串：\n\n```csharp\n\
    // Package the input\nvar input = new float[] {\n    4.0f,  // Day of week\n \
    \   17.0f, // Pickup time (hour of day)\n    2.0f   // Distance to travel\n};\n\
    \nvar tensor = new DenseTensor<float>(input, new int[] { 1, 3 });\n\n// Create\
    \ the model and pass the input to it\nvar session = new InferenceSession(\"taxi.onnx\"\
    );\n\nvar output = session.Run(new List<NamedOnnxValue>\n{\n    NamedOnnxValue.CreateFromTensor(\"\
    float_input\", tensor)\n});\n\nvar score = output.First().AsTensor<float>().First();\n\
    \n// Show the predicted fare\nConsole.WriteLine($\"{score:#.00}\");\n```\n\n那么，哪种方式更快？是调用包装在\
    \ Web 服务中的机器学习模型，还是使用 ONNX 调用同一个模型？我编写了一个简单的测试工具来回答这个问题。在我的计算机上，调用在本地运行的 Flask\
    \ Web 服务中的情感分析模型，每次往返需要略多于 2 秒。通过 Python ONNX 运行时调用同一个模型，平均只需 0.001 秒。这是超过三个数量级的差异。如果\
    \ Web 服务托管在远程服务器上，你还会遇到额外的延迟。\n\n值得注意的是，ONNX 不仅限于 C# 和 Python。ONNX 运行时可用于 Python、C、C++、C#、Java、JavaScript\
    \ 和 Objective-C，并且可以在 Windows、Linux、macOS、Android 和 iOS 上运行。当涉及到将用 Python 编写的机器学习模型投影到其他平台和语言时，ONNX\
    \ 是一个改变游戏规则的技术。欲了解更多信息，请查看 [ONNX 运行时网站](https://onnxruntime.ai/)。"

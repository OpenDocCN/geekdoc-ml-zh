    ```\n\n该数据集不平衡，其中乔治·W·布什的照片数量几乎与其他所有人加起来一样多。使用以下代码将数据集减少到每人 100 张图像，总共 500 张人脸图像：\n\
    \n```python\nimport numpy as np\n\nmask = np.zeros(faces.target.shape, dtype=bool)\n\
    \nfor target in np.unique(faces.target):\n    mask[np.where(faces.target == target)[0][:100]]\
    \ = 1\n\nx_faces = faces.data[mask]\ny_faces = faces.target[mask]\nx_faces = np.reshape(x_faces,\
    \ (x_faces.shape[0], faces.images.shape[1],\n                               faces.images.shape[2],\
    \ faces.images.shape[3]))\n\nx_faces.shape\n```\n\n现在，为输入预训练的 ResNet50 CNN 预处理像素值，并使用\

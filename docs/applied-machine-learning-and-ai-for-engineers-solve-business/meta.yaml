    图 9-5. TensorBoard 显示神经网络训练结果


    其他 Keras 回调类包括 [LearningRateScheduler](LearningRateScheduler)，用于在每个训练周期开始时调整学习率；以及
    [CSVLogger](CSVLogger)，用于将每个训练周期的结果记录到 CSV 文件中。完整的回调列表请参阅 [callbacks API 文档](callbacks
    API documentation)。此外，请注意 `fit` 方法的 `callbacks` 参数是一个 Python 列表，这意味着在训练模型时可以指定多个回调。例如，你可以使用一个回调在满足特定条件时停止训练，再使用另一个回调将训练指标记录到
    CSV 文件中。


    ## 总结


    Keras 和 TensorFlow 是广泛使用的开源框架，它们简化了神经网络的构建、训练、保存、加载和使用（进行预测）过程。你可以使用原生 TensorFlow
    API 通过多种编程语言构建神经网络，但 Keras 对这些 API 进行了抽象，使深度学习变得更加易于上手。Keras 应用程序使用 Python 编写。


    神经网络与传统机器学习模型一样，可用于解决回归问题和分类问题。执行回归任务的网络在输出层有一个神经元，且不使用激活函数；网络的输出是一个浮点数。执行二元分类的网络在输出层也有一个神经元，但
    `sigmoid` 激活函数确保输出值在 0.0 到 1.0 之间，表示输入属于正类的概率。对于多分类任务，输出层的神经元数量等于网络可以预测的类别数量。`softmax`
    激活函数将分配给输出神经元的原始值转换为每个类别的概率数组。


    当你发现神经网络对训练数据拟合过于紧密时，一种对抗过拟合并提高网络泛化能力的方法是降低网络的复杂度：减少层数、减少单个层中的神经元数量，或两者都减少。另一种方法是向网络中添加
    dropout。Dropout 通过在更新权重和偏置时随机忽略层之间的部分连接，故意阻碍网络学习训练数据的能力。


    Keras 的回调 API 允许你自定义训练过程。例如，通过处理每个训练周期结束时发生的回调，你可以检查模型的准确率，并在达到可接受水平时停止训练。Keras
    还包含一个简单易用的 API，用于保存和加载训练好的模型。这对于将训练好的模型投入实际应用至关重要——将它们部署到生产环境中，并利用训练过程中获得的预测能力。


    本章中的面部识别模型在验证集上的准确率超过了 80%，但现代深度学习模型在相同数据集上通常能达到 99% 的准确率。了解到深度学习远不止多层感知机，你不会感到惊讶。我们将在[第
    11 章](Chapter 11)深入探讨面部识别，但首先我们将探索另一种类型的神经网络——一种特别擅长解决计算机视觉问题的网络。它被称为*卷积神经网络*，是[第
    10 章](Chapter 10)的主题。


    ## 第 10 章. 使用卷积神经网络进行图像分类


    [计算机视觉](https://en.wikipedia.org/wiki/Computer_vision)是深度学习的一个分支，计算机从图像中提取信息。实际应用包括识别照片中的物体、从社交媒体网站中移除不当图像、统计收费站排队的车辆以及识别照片中的人脸。计算机视觉模型甚至可以与自然语言处理模型结合，为照片添加说明文字。我在度假时拍了一张照片，并让
    Azure 的[计算机视觉服务](https://azure.microsoft.com/en-us/services/cognitive-services/computer-vision/)为其添加说明文字。结果如[图
    10-1](#figure-10-1)所示。考虑到无需人工干预，这相当了不起。


    ![](img/628b9a382d0944bbfa786c66bc651b50_205_0.png)


    *图 10-1. “一片水域，背景中有一个码头和一栋建筑”——Azure AI*


    近年来，计算机视觉领域发展迅速，这主要归功于*卷积神经网络*，也称为 CNN 或 *ConvNets*。2012 年，一个名为 [AlexNet](https://en.wikipedia.org/wiki/AlexNet)
    的八层 CNN 在年度 [ImageNet 大规模视觉识别挑战赛 (ILSVRC)](https://en.wikipedia.org/wiki/ImageNet#History_of_the_ImageNet_Large_Scale_Visual_Recognition_Challenge)
    中，以 15.3% 的物体识别错误率超越了参赛的传统机器学习模型。2015 年，拥有惊人 152 层的 [ResNet-152](https://en.wikipedia.org/wiki/Residual_neural_network)
    以仅 3.5% 的错误率赢得了挑战，这一成绩超越了人类在比赛中对图像进行分类的能力。


    CNN 之所以神奇，是因为它们将图像视为*图像*，而不仅仅是像素值的数组。它们使用一种已有数十年历史的技术——[卷积核](https://en.wikipedia.org/wiki/Kernel_(image_processing))——从图像中提取“特征”，使它们能够识别猫头的形状或狗尾巴的轮廓。此外，使用
    Keras 和 TensorFlow 构建 CNN 非常容易。


    像 ResNet-152 这样的最先进 CNN 需要使用数百万张图像在 GPU 上进行昂贵的训练，但使用普通 CPU 也能完成很多工作。在本章中，你将了解
    CNN 是什么以及它们如何工作，并将构建和训练几个自己的 CNN。你还将学习如何利用 Google 和 Microsoft 等公司发布的公开高级 CNN，以及如何使用一种称为*迁移学习*的技术，将这些
    CNN 重新用于解决特定领域的问题。


    ### 理解 CNN


    图 10-2 展示了一个基本 CNN 的拓扑结构。它以一组或多组*卷积层*和*池化层*开始。卷积层从图像中提取特征，生成通常称为*特征图*的变换图像，因为它们突出了形状和轮廓等区分性特征。池化层将特征图的大小减半，以便可以在不同分辨率下提取特征，并且对位置的微小变化不那么敏感。最后一个池化层的输出被展平为一维，并输入到一个或多个全连接层进行分类。卷积层和池化层被称为*瓶颈层*，因为它们降低了输入图像的维度。它们也占据了训练过程中大部分的计算时间。


    卷积层通过将卷积核在图像上滑动来提取特征——这与图像编辑工具用于模糊、锐化和浮雕图像的技术相同。卷积核只是一个值矩阵。它通常是 3 × 3，但也可以更大。要处理图像，你将卷积核放在图像的左上角，将卷积核的值与下方的像素值相乘，并通过求和乘积来计算中心像素的新值，如图
    10-3 所示。然后你将卷积核向右移动一个像素并重复该过程，逐行逐列继续，直到处理完整个图像。


    ![](img/628b9a382d0944bbfa786c66bc651b50_206_0.png)


    ![](img/628b9a382d0944bbfa786c66bc651b50_207_0.png)


    图 10-4 展示了将 3 × 3 卷积核应用于热狗图像时发生的情况。这个特定的卷积核称为*底部 Sobel 卷积核*，它旨在通过突出显示边缘（就像从底部照射光线一样）来进行边缘检测。CNN
    的卷积层使用像这样的卷积核来提取有助于区分不同类别的特征。


    ![](img/628b9a382d0944bbfa786c66bc651b50_207_1.png)


    一个卷积层不只使用一个卷积核来处理图像。它使用很多——有时是 100 个或更多。卷积核的值不是预先确定的。它们用随机值初始化，然后在 CNN 训练过程中学习（调整），就像全连接层中连接神经元的权重一样。每个卷积核也有一个与之关联的偏置，就像全连接层中的神经元一样。图
    10-5 中的图像是由训练好的 CNN 中的第一个卷积层生成的。你可以看到不同的卷积核如何让网络以不同的方式查看同一张热狗图像，以及某些特征（如面包的形状和顶部的芥末条）是如何被突出显示的。


    ![](img/628b9a382d0944bbfa786c66bc651b50_207_2.png)'

    # Summary


    Machine learning models that classify text are common and see a variety of uses
    in industry and in everyday life. What rational human being doesn’t wish for a
    magic wand that eradicates all spam mails, for example?


    Text used to train a text classification model must be prepared and vectorized
    prior to training. Preparation includes converting characters to lowercase and
    removing punctuation characters, and may include removing stop words, removing
    numbers, and stemming or lemmatizing. Once prepared, text is vectorized by converting
    it into a table of word frequencies. Scikit’s `CountVectorizer` class makes short
    work of the vectorization process and handles some of the preparation duties too.


    Logistic regression and other popular classification algorithms can be used to
    classify text once it’s converted to numerical form. For text classification tasks,
    however, the Naive Bayes learning algorithm frequently outperforms other algorithms.
    By making a few “naive” assumptions such as that the order in which words appear
    in a text sample doesn’t matter, Naive Bayes reduces to a process of word counting.
    Scikit’s `MultinomialNB` class provides a handy Naive Bayes implementation.


    Cosine similarity is a mathematical means for computing the similarity between
    two rows of numbers. One use for it is building systems that recommend products
    or services based on other products or services that a customer has purchased.
    Word frequency tables produced from textual descriptions by `CountVectorizer`
    can be combined with cosine similarity to create intelligent recommender systems
    intended to supplement a company’s bottom line.


    Feel free to use this chapter’s examples as a starting point for experiments of
    your own. For instance, see if you can tweak the parameters passed to `CountVectorizer`
    in any of the examples and increase the accuracy of the resulting model. Data
    scientists call the search for the optimum parameter combination *hyperparameter
    tuning*, and it’s a subject you’ll learn about in the next chapter.'
- md: '## Chapter 5. Support Vector Machines


    Support vector machines (SVMs) represent the cutting edge of machine learning.
    They are most often used to solve classification problems, but they can also be
    used for regression. Due to the unique way in which they fit mathematical models
    to data, SVMs often succeed at finding separation between classes when other models
    do not. They technically perform binary classification only, but Scikit-Learn
    enables them to do multiclass classification as well using techniques discussed
    in [Chapter 3](Chapter 3).


    Scikit-Learn makes building SVMs easy with classes such as **SVC (short for support
    vector classifier)** for classification models and **SVR (support vector regressor)**
    for regression models. You can use these classes without understanding how SVMs
    work, but you’ll get more out of them if you *do* understand how they work. It’s
    also important to know how to tune SVMs for individual datasets and how to prepare
    data before you train a model. Toward the end of this chapter, we’ll build an
    SVM that performs facial recognition. But first, let’s look behind the scenes
    and discover why SVMs are often the go-to mechanism for modeling real-world datasets.


    ### How Support Vector Machines Work


    First, why are they called support vector machines? The purpose of an SVM classifier
    is the same as any other classifier: to find a decision boundary that cleanly
    separates the classes. SVMs do this by finding a line in 2D space, a plane in
    3D space, or a hyperplane in higher-dimensional space that allows them to distinguish
    between different classes with the greatest certainty possible. In the example
    in [Figure 5-1](Figure 5-1), there are an infinite number of lines you can draw
    to separate the two classes, but the best line is the one that produces the widest
    margin (the one shown on the right). The width of the margin is the distance between
    the points closest to the boundary in each class along a line perpendicular to
    the boundary. These points are called *support vectors* and are circled in red.


    ![](img/628b9a382d0944bbfa786c66bc651b50_104_0.png)


    Of course, real data rarely lends itself to such clean separation. Overlap between
    classes inevitably prevents a perfect fit. To accommodate this, SVMs support a
    regularization parameter usually referred to as C that can be adjusted to loosen
    or tighten the fit. Lower values of C produce a wider margin with more errors
    on either side of the decision boundary, as shown in Figure 5-2. Higher values
    yield a tighter fit to the training data with a correspondingly thinner margin
    and fewer errors. If C is *too* high, the model might not generalize well. The
    optimum value varies by dataset. Data scientists typically try different values
    of C to determine which one performs the best against test data.


    All of the aforementioned is true, but none of it explains why SVMs are so good
    at what they do. SVMs aren''t the only models that mathematically look for boundaries
    separating the classes. What makes SVMs special are *kernels*, some of which add
    dimensions to data to find boundaries that don''t exist at lower dimensions. Consider
    Figure 5-3. You can''t draw a line that completely separates the red dots from
    the purple dots. But if you add a third dimension as shown on the right—a z dimension
    whose value is based on a point''s distance from the center—then you can slide
    a plane between the purples and the reds and achieve 100% separation. In this
    example, data that isn''t linearly separable in two dimensions is linearly separable
    in three dimensions. The principle at work is Cover''s theorem, which states that
    data that isn''t linearly separable might be linearly separable if projected into
    higher-dimensional space using a nonlinear transform.


    ![](img/628b9a382d0944bbfa786c66bc651b50_105_0.png)


    ![](img/628b9a382d0944bbfa786c66bc651b50_106_0.png)


    Figure 5-3. Adding dimensions to achieve linear separability


    The kernel transformation used in this example, which projects two-dimensional
    data to three dimensions by adding a z to every x and y, works well with this
    particular dataset. But for SVMs to be broadly useful, you need a kernel that
    isn’t tied to the shape of a specific dataset.


    ### Kernels


    Scikit-Learn has several general-purpose kernels built in, including the linear
    kernel, the RBF kernel,¹ the polynomial kernel, and the sigmoid kernel. The linear
    kernel doesn’t add dimensions. It works well with data that is linearly separable
    out of the box, but it doesn’t perform very well with data that isn’t. Applying
    it to the problem in Figure 5-3 produces the decision boundary on the left in
    Figure 5-4. Applying the RBF kernel to the same data produces the decision boundary
    on the right. The RBF kernel projects the x and y values into a higher-dimensional
    space and finds a hyperplane that cleanly separates the purples from the reds.
    When projected back to two dimensions, the decision boundary roughly forms a circle.
    Similar results can be achieved on this dataset with a properly tuned polynomial
    kernel, but generally speaking, the RBF kernel can find decision boundaries in
    nonlinear data that the polynomial kernel cannot. That’s why RBF is the default
    kernel type in Scikit if you don’t specify otherwise.


    A logical question to ask is, did the RBF kernel add a z to every x and y? The
    short answer is no. It effectively projected the data points into a space with
    an *infinite* number of dimensions. The key word is *effectively*. Kernels use
    mathematical shortcuts called *kernel tricks* to measure the effect of adding
    new dimensions without actually computing values for them. This is where the math
    for SVMs gets hairy. Kernels are carefully designed to compute the dot product
    between two n-dimensional vectors in m-dimensional space (where m is greater than
    n and can even be infinite) without generating all those new dimensions, and ultimately,
    the dot products are all an SVM needs to compute a decision boundary. It’s the
    mathematical equivalent of having your cake and eating it too, and it’s the secret
    sauce that makes SVMs awesome. SVMs can take a long time to train on large datasets,
    but one of the benefits of an SVM is that it tends to do better on smaller datasets
    with fewer rows or samples than other learning algorithms.


    ![](img/628b9a382d0944bbfa786c66bc651b50_107_0.png)


    Figure 5-4. Linear kernel versus RBF kernel


    ### Kernel Tricks


    Want to see an example of how kernel tricks are used to compute dot products in
    high-dimensional spaces without computing values for the new dimensions? The following
    explanation is completely optional. But if you, like me, learn better from concrete
    examples, then you might find this section helpful.


    Let’s start with the two-dimensional circular dataset presented earlier, but this
    time let’s project it into three-dimensional space with the following equations:


    $x\hat{a} = x^2$

    $y\hat{a} = y^2$

    $z = x \cdot y \cdot \sqrt{2}$


    In other words, we’ll compute $x$ and $y$ in three-dimensional space ($x''$ and
    $y''$) by squaring $x$ and $y$ in two-dimensional space, and we’ll add a $z$ that’s
    the product of the original $x$ and $y$ and the square root of 2. Projecting the
    data this way produces a clean separation between purples and reds, as shown in
    Figure 5-5.


    ![](img/628b9a382d0944bbfa786c66bc651b50_108_0.png)


    Figure 5-5. Projecting 2D points to 3D to separate two classes


    The efficacy of SVMs depends on their ability to compute the dot product of two
    vectors (or points, which can be treated as vectors) in higher-dimensional space
    without projecting them into that space—that is, using only the values in the
    original space. Let’s manufacture a couple of points to work with:


    $a = (3, 7)$

    $b = (2, 4)$


    We can compute the dot product of these two points this way:

    $(3 \cdot 2) + (7 \cdot 4) = 34$


    Of course, the dot product in two dimensions isn’t very helpful. An SVM needs
    the dot product of these points in 3D space. Let’s use the preceding equations
    to project $a$ and $b$ to 3D, and then compute the dot product of the result:


    $a = (3^2, 7^2, 3 \cdot 7 \cdot \sqrt{2}) = (9, 49, 29.6984)$

    $b = (2^2, 4^2, 2 \cdot 4 \cdot \sqrt{2}) = (4, 16, 11.3137)$

    $(9 \cdot 4) + (49 \cdot 16) + (29.6984 \cdot 11.3137) = 1,156$


    We now have the dot product of a pair of 2D points in 3D space, but we had to
    generate coordinates in 3D space to get it. Here’s where it gets interesting.
    The following function, or *kernel trick*, produces the same result using *only
    the values in the original 2D space*:


    $K(a, b) = \langle a, b \rangle^2$


    $\langle a, b \rangle$ is simply the dot product of $a$ and $b$, so $\langle a,
    b \rangle^2$ is the square of the dot product of $a$ and $b$. We already know
    how to compute the dot product of $a$ and $b$. Therefore:


    $K((3, 7), (2, 4)) = ((3 \cdot 2) + (7 \cdot 4))^2 = 34^2 = 1,156$


    This agrees with the result computed by explicitly projecting the points, but
    with *no projection required*. That’s the kernel trick in a nutshell. It saves
    time and memory when going from two dimensions to three. Just imagine the savings
    when projecting to an infinite number of dimensions—which, you’ll'
  mdcn: '## 第五章 支持向量机


    支持向量机（SVM）代表了机器学习的前沿技术。它们最常用于解决分类问题，但也可用于回归。由于其将数学模型拟合到数据的独特方式，SVM 往往能在其他模型失败时成功找到类别间的分隔。从技术上讲，SVM
    仅执行二分类，但 Scikit-Learn 使其能够使用[第3章](Chapter 3)讨论的技术进行多分类。


    Scikit-Learn 通过诸如用于分类模型的 **SVC（支持向量分类器的缩写）** 和用于回归模型的 **SVR（支持向量回归器）** 等类，使得构建
    SVM 变得简单。你可以使用这些类而无需理解 SVM 的工作原理，但如果你*确实*理解了它们的工作原理，你将能更好地利用它们。了解如何为特定数据集调整 SVM
    以及如何在训练模型前准备数据也很重要。在本章末尾，我们将构建一个执行人脸识别的 SVM。但首先，让我们深入幕后，探究为什么 SVM 常常是建模现实世界数据集的首选机制。


    ### 支持向量机的工作原理


    首先，为什么它们被称为支持向量机？SVM 分类器的目的与其他任何分类器相同：找到一个能清晰分隔类别的决策边界。SVM 通过在二维空间中找到一条线、在三维空间中找到一个平面，或在更高维空间中找到一个超平面来实现这一点，从而以尽可能大的确定性区分不同类别。在[图5-1](Figure
    5-1)的示例中，你可以画出无数条线来分隔这两个类别，但最佳的线是产生最宽间隔的那条（即右侧所示的那条）。间隔的宽度是沿垂直于边界的线，每个类别中离边界最近的点之间的距离。这些点被称为*支持向量*，并用红色圆圈标出。


    ![](img/628b9a382d0944bbfa786c66bc651b50_104_0.png)


    当然，现实数据很少能如此清晰地分离。类别间的重叠不可避免地阻碍了完美拟合。为了适应这种情况，SVM 支持一个通常称为 C 的正则化参数，可以调整以放松或收紧拟合。较低的
    C 值会产生更宽的间隔，决策边界两侧的错误更多，如图5-2所示。较高的 C 值则对训练数据拟合更紧密，间隔相应更薄，错误更少。如果 C 值*过高*，模型可能泛化能力不佳。最佳值因数据集而异。数据科学家通常会尝试不同的
    C 值，以确定哪个在测试数据上表现最佳。


    以上所述都是正确的，但都没有解释为什么 SVM 在其擅长的领域如此出色。SVM 并非唯一在数学上寻找分隔类别边界的模型。使 SVM 特别之处在于*核函数*，其中一些核函数通过增加数据维度来找到在低维度中不存在的边界。考虑图5-3。你无法画出一条线将红点与紫点完全分开。但如果你添加第三维度，如右侧所示——一个
    z 维度，其值基于点到中心的距离——那么你就可以在紫色和红色之间插入一个平面，实现100%的分离。在这个例子中，在二维中线性不可分的数据在三维中变得线性可分。其工作原理是
    Cover 定理，该定理指出，如果使用非线性变换将数据投影到更高维空间，那么线性不可分的数据可能变得线性可分。


    ![](img/628b9a382d0944bbfa786c66bc651b50_105_0.png)


    ![](img/628b9a382d0944bbfa786c66bc651b50_106_0.png)


    图5-3. 添加维度以实现线性可分性


    此示例中使用的核变换，通过为每个 x 和 y 添加一个 z 将二维数据投影到三维，对于这个特定数据集效果很好。但要使 SVM 广泛有用，你需要一个不依赖于特定数据集形状的核函数。


    ### 核函数


    Scikit-Learn 内置了几个通用核函数，包括线性核、RBF 核¹、多项式核和 Sigmoid 核。线性核不添加维度。它对于开箱即用的线性可分数据效果很好，但对于非线性可分数据表现不佳。将其应用于图5-3的问题会产生图5-4左侧的决策边界。将
    RBF 核应用于相同数据会产生右侧的决策边界。RBF 核将 x 和 y 值投影到更高维空间，并找到一个能清晰分隔紫色和红色的超平面。当投影回二维时，决策边界大致形成一个圆形。通过适当调整多项式核也可以在这个数据集上获得类似结果，但一般来说，RBF
    核可以在非线性数据中找到多项式核无法找到的决策边界。这就是为什么如果你不指定其他类型，RBF 是 Scikit 中的默认核类型。


    一个合乎逻辑的问题是，RBF 核是否为每个 x 和 y 添加了一个 z？简短的回答是：没有。它实际上将数据点投影到一个具有*无限*个维度的空间中。关键词是*实际上*。核函数使用称为*核技巧*的数学捷径来衡量添加新维度的效果，而无需实际计算它们的值。这就是
    SVM 数学变得复杂的地方。核函数经过精心设计，可以计算 m 维空间中两个 n 维向量的点积（其中 m 大于 n，甚至可以是无限），而无需生成所有这些新维度，最终，点积是
    SVM 计算决策边界所需的全部。这在数学上等同于鱼与熊掌兼得，也是使 SVM 如此出色的秘密武器。SVM 在大型数据集上训练可能需要很长时间，但 SVM 的一个好处是，它在行数或样本较少的较小数据集上往往比其他学习算法表现更好。


    ![](img/628b9a382d0944bbfa786c66bc651b50_107_0.png)


    图5-4. 线性核与 RBF 核


    ### 核技巧


    想看看如何使用核技巧在高维空间中计算点积而无需计算新维度值的例子吗？以下解释完全是可选的。但如果你像我一样，从具体例子中学习效果更好，那么你可能会发现本节很有帮助。


    让我们从前面介绍的二维圆形数据集开始，但这次让我们用以下方程将其投影到三维空间：


    $x\hat{a} = x^2$

    $y\hat{a} = y^2$

    $z = x \cdot y \cdot \sqrt{2}$


    换句话说，我们将通过平方二维空间中的 $x$ 和 $y$ 来计算三维空间中的 $x$ 和 $y$（$x''$ 和 $y''$），并添加一个 $z$，它是原始
    $x$ 和 $y$ 与 2 的平方根的乘积。以这种方式投影数据会产生紫色和红色之间的清晰分离，如图5-5所示。


    ![](img/628b9a382d0944bbfa786c66bc651b50_108_0.png)


    图5-5. 将二维点投影到三维以分离两个类别


    SVM 的有效性取决于它们在更高维空间中计算两个向量（或点，可视为向量）的点积的能力，而无需将它们投影到该空间——即仅使用原始空间中的值。让我们构造几个点来处理：


    $a = (3, 7)$

    $b = (2, 4)$


    我们可以这样计算这两个点的点积：

    $(3 \cdot 2) + (7 \cdot 4) = 34$


    当然，二维中的点积用处不大。SVM 需要这些点在三维空间中的点积。让我们使用前面的方程将 $a$ 和 $b$ 投影到三维，然后计算结果的点积：


    $a = (3^2, 7^2, 3 \cdot 7 \cdot \sqrt{2}) = (9, 49, 29.6984)$

    $b = (2^2, 4^2, 2 \cdot 4 \cdot \sqrt{2}) = (4, 16, 11.3137)$

    $(9 \cdot 4) + (49 \cdot 16) + (29.6984 \cdot 11.3137) = 1,156$


    我们现在得到了一对二维点在三维空间中的点积，但我们必须生成三维空间中的坐标才能得到它。有趣的地方来了。以下函数，或*核技巧*，使用*仅原始二维空间中的值*产生了相同的结果：


    $K(a, b) = \langle a, b \rangle^2$


    $\langle a, b \rangle$ 只是 $a$ 和 $b$ 的点积，所以 $\langle a, b \rangle^2$ 是 $a$ 和 $b$
    点积的平方。我们已经知道如何计算 $a$ 和 $b$ 的点积。因此：


    $K((3, 7), (2, 4)) = ((3 \cdot 2) + (7 \cdot 4))^2 = 34^2 = 1,156$


    这与通过显式投影点计算的结果一致，但*无需投影*。这就是核技巧的精髓。它在从二维到三维时节省了时间和内存。想象一下投影到无限维度时节省的资源——你将会'

  md: "loaded, it can persist for the lifetime of the client and be called upon for\
    \ predictions whenever needed.\n\nChapter 5 introduced Scikit’s `make_pipeline`\
    \ function, which allows estimators (objects that make predictions) and transformers\
    \ (objects that transform data input to a model) to be combined into a single\
    \ unit, or *pipeline*. The pickle module can be used to serialize and deserialize\
    \ pipelines too. Example 7-1 recasts the sentiment analysis model featured in\
    \ Chapter 4 to use `make_pipeline` to combine a `CountVectorizer` for vectorizing\
    \ text with a `LogisticRegression` object for classifying text. The call to `pickle.dump`\
    \ saves the model, CountVectorizer and all.\n\n# Example 7-1. Training and saving\
    \ a sentiment analysis pipeline\n\n```\nimport pickle\nimport pandas as pd\nfrom\
    \ sklearn.feature_extraction.text import CountVectorizer\nfrom sklearn.linear_model\
    \ import LogisticRegression\nfrom sklearn.pipeline import make_pipeline\ndf =\
    \ pd.read_csv('Data/reviews.csv', encoding=\"ISO-8859-1\")\ndf = df.drop_duplicates()\n\
    x = df['Text']\ny = df['Sentiment']\nvectorizer = CountVectorizer(ngram_range=(1,\
    \ 2), stop_words='english',\n                            min_df=20)\nmodel = LogisticRegression(max_iter=1000,\
    \ random_state=0)\npipe = make_pipeline(vectorizer, model)\npipe.fit(x, y)\npickle.dump(pipe,\
    \ open('sentiment.pkl', 'wb'))\n```\n\nA Python client can deserialize the pipeline\
    \ and call `predict_proba` to score a line of text for sentiment with a few simple\
    \ lines of code:\n\n```\nimport pickle\npipe = pickle.load(open('sentiment.pkl',\
    \ 'rb'))\nscore = pipe.predict_proba(['Great food and excellent service!'])[0][1]\n\
    print(score)\n```\n\nPickling in this manner works not just with CountVectorizer\
    \ but with other transformers as well, such as StandardScaler."

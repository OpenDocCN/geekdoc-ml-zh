  md: 'you. Cross-validating a model requires just one line of code:


    ```

    cross_val_score(model, x, y, cv=5).mean()

    ```


    The cross-validated score in this example should come out to about 0.61, which
    lies between the two values generated by the model’s `score` method. It is a more
    accurate measure of the model’s accuracy than either of the other scores.


    You don’t have to train a model before cross-validating it since `cross_val_score`
    trains it for you. However, `cross_val_score` trains a *copy* of the model, not
    the model itself, so once you’ve used cross-validation to gauge the model’s accuracy,
    you still need to call `fit` before making predictions:


    ```

    model.fit(x, y)

    ```


    Note that you pass the entire dataset to `fit` rather than a subset split off
    for training. That’s another benefit of cross-validation: you train your model
    with *all* of the data, which is a big deal if the dataset is small to begin with.
    There’s no longer a hard requirement to hold some of it out for testing. However,
    even with cross-validation, it’s still useful to score the model with data reserved
    exclusively for testing if such data is available. Remember: *you don’t truly
    know how accurate a model is until you know how it responds to data it wasn’t
    trained with*.


    > **TIP**


    As a rule of thumb, you should reserve cross-validation for small datasets and
    use train/test splits for large datasets. The larger the dataset, the less sensitive
    it is to how the data is split.


    Which begs the question: precisely what does the value returned when you score
    or cross-validate a model represent? For a regression model, it’s the *coefficient
    of determination*, also known as the *R-squared* score or simply *R²*. The coefficient
    of determination is usually a value from 0 to 1 (“usually” because it can, in
    certain circumstances, go negative) which quantifies the variance in the output
    that can be explained by the variables in the input. A simple way to think of
    it is that an *R²* score of 0.8 means that the model should, on average, be about
    80% accurate in making predictions, or get the answer right within 20%. The higher
    the *R²* score, the more accurate the model. There are other ways to measure the
    accuracy of a regression model, including mean squared error (MSE) and mean absolute
    error (MAE). Those numbers are meaningful only in the context of the range of
    output values, whereas *R²* gives you one simple number that is independent of
    range. You can read more about regression metrics and methods for retrieving them
    in the [Scikit documentation](https://scikit-learn.org/stable/modules/model_evaluation.html).


    The value returned by a model’s `score` method is completely different for a classification
    model. I will address the various ways to quantify the accuracy of classification
    models in [Chapter 3](https://github.com/ageron/handson-ml2/blob/master/03_classification.ipynb).



    gamma that affects accuracy. And for polynomial kernels, the degree parameter
    impacts the model’s ability to learn from the training data.

    The C parameter controls how aggressively the model fits to the training data.
    The higher the value, the tighter the fit and the higher the risk of overfitting.
    Figure 5-7 shows how the RBF kernel fits a model to a set of training data containing
    three classes with different values of C. The default is C=1 in Scikit, but you
    can specify a different value to adjust the fit. You can see the danger of overfitting
    in the lower-'
  - '[PAGE 110]


    right diagram. A point that lies to the extreme right would be classified as a
    blue, even though it probably belongs to the yellow or brown class. Underfitting
    is a problem too. In the upper-left example, virtually any data point that isn’t
    a brown will be classified as a blue.


    ![](img/628b9a382d0944bbfa786c66bc651b50_110_0.png)


    An SVM that uses the RBF kernel isn’t properly tuned until you have the right
    value for `gamma` too. `gamma` controls how far the influence of a single data
    point reaches in computing decision boundaries. Lower values use more points and
    produce smoother decision boundaries; higher values involve fewer points and fit
    more tightly to the training data. This is illustrated in Figure 5-8, where increasing
    `gamma` while holding C constant closes the decision boundary more tightly around
    clusters of classes. `gamma` can be any nonzero positive value, but values between
    0 and 1 are the most common. Rather than hardcode a default value for `gamma`,
    Scikit picks a default value algorithmically if you don’t specify one.


    In practice, data scientists experiment with different kernels and different parameter
    values to find the combination that produces the most accurate model, a process
    known as *hyperparameter tuning*. The usefulness of hyperparameter tuning isn’t
    unique to SVMs, but you can almost always make an SVM more accurate by finding
    the optimum combination of kernel type, C, and `gamma` (and for polynomial kernels,
    degree).'
  - '[PAGE 111]


    ![](img/628b9a382d0944bbfa786c66bc651b50_111_0.png)


    To aid in the process of hyperparameter tuning, Scikit provides a family of optimizers
    that includes GridSearchCV, which tries all combinations of a specified set of
    parameter values with built-in cross-validation to determine which combination
    produces the most accurate model. These optimizers prevent you from having to
    write code to do a brute-force search using all the unique combinations of parameter
    values. To be clear, they do brute-force searches themselves by training the model
    multiple times, each time with a different combination of values. At the end,
    you can retrieve the most accurate model from the best_estimator_ attribute, the
    parameter values that produced the most accurate model from the best_params_ attribute,
    and the best score from the best_score_ attribute.


    Here’s an example that uses Scikit’s SVC class to implement an SVM classifier.
    For starters, you can create an SVM classifier that uses default parameter values
    and fit it to a dataset with two lines of code:


    ```

    model = SVC()

    model.fit(x, y)

    ```


    This uses the RBF kernel with C=1. You can specify the kernel type and values
    for C and gamma this way:


    ```

    model = SVC(kernel=''poly'', C=10, gamma=0.1)

    model.fit(x, y)

    ```


    Suppose you wanted to try two different kernels and five values each for C and
    gamma to see which combination produces the best results. Rather than write a
    nested for loop, you could do this:


    ```

    model = SVC()


    grid = {

    ```'

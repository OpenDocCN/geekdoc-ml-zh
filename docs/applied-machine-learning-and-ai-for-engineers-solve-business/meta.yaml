    \n## 总结\n\n自然语言处理（NLP）是深度学习的一个领域，涵盖文本分类、问答、文本翻译以及其他需要计算机处理文本数据的任务。每个NLP模型的一个关键元素是嵌入层，它用浮点数数组表示单词，这些数组模拟了单词之间的关系。例如，在嵌入空间中，*excellent*和*amazing*的向量彼此接近，而*butterfly*和*basketball*的向量则相距甚远，因为这两个词没有语义关系。词嵌入是在模型训练过程中学习到的。\n\
    \n输入到嵌入层的文本必须首先被分词并转换为等长的序列。Keras的`Tokenizer`类完成了大部分工作。你不必单独进行分词和序列化，而是可以在模型中包含一个`TextVectorization`层来自动完成分词和填充。\n\
    \n一种分类文本的方法是使用传统的全连接层对嵌入层输出的向量进行分类。另一种方法是使用卷积层或循环层从嵌入向量中提取有关单词位置的信息，并对这些层的输出进行分类。\n\
    \n使用深度学习将文本翻译成其他语言被称为神经机器翻译（NMT）。直到最近，最先进的NMT还是使用基于LSTM的编码器-解码器模型。如今，这些模型已基本让位于使用神经注意力机制的Transformer模型，这些模型专注于短语中最有意义的单词并建模单词上下文。Transformer知道*train*这个词在“meet\
    \ me at the train station”和“it’s time to train a model”中具有不同的含义，并且它在计算中考虑了词序。\n\
    \nBERT是一个复杂的Transformer模型，Google工程师在用数十亿个单词训练它时赋予了它语言理解能力。它可以针对特定任务（如问答和情感分析）进行微调，并且已经发布了几个微调版本供公众使用。这些模型有时可以直接使用。其他时候，它们可以进一步优化并适应特定领域的任务。由于微调所需的数据和计算能力比从头训练BERT少几个数量级，因此预训练（和预微调）的BERT模型已被证明是NLP的一大福音。\n\
    \n复杂的NLP模型需要用数百万个单词或短语进行训练，这需要在数据收集和训练硬件上进行大量投资。Hugging Face等公司发布的预训练模型可以在你的代码中使用。这是人工智能领域的一个增长趋势：发布已经训练好以解决常见问题的模型。你仍然需要构建模型来解决特定领域的问题，但许多任务——尤其是涉及NLP的任务——并不局限于特定领域。\n\
    \n下载预训练模型并不是利用复杂人工智能解决业务问题的唯一途径。微软和亚马逊等公司训练自己的深度学习模型，并通过REST API公开提供。微软将其API套件称为Azure\
    \ Cognitive Services。你将在[第14章](Chapter 14)中全面了解它们。\n\n## 第14章 Azure Cognitive\
    \ Services\n\n在20世纪60年代长大的我，曾将阿波罗宇航员视为偶像。他们大摇大摆地走向发射台，乘坐喷火的火箭进入太空，是我的超级英雄。但我真正想效仿的群体——我想*成为*的人——是任务控制中心的工程师们。他们穿着白衬衫、打着黑领带，坐在CRT屏幕前，与宇航员交谈，并在出现第一个麻烦迹象时随时准备采取行动，他们是酷的化身。他们使用比当今智能手机功能弱得多的计算机将人类送上了月球——这是一项至今无与伦比的科学成就。\n\
    \n得益于深度学习，今天的计算机可以完成任务控制中心的工程师们只能梦想的壮举。它们可以识别图像中的物体，将文本和语音翻译成其他语言，在视频流中识别人，将艺术转化为文字，将文字转化为艺术，等等。但是，最先进的深度学习模型对于普通工程师或软件开发人员来说过于复杂——也过于昂贵。据报道，微软在训练赢得2015年ImageNet大规模视觉识别挑战赛的ResNet模型上花费了数十万美元。创建该模型需要大量的专业知识、大量的GPU时间和数百万张图像。\n\
    \n当今人工智能领域一个可喜的趋势是*人工智能即服务*。微软、亚马逊、谷歌和其他科技巨头雇佣专业的数据科学家来构建复杂的深度学习模型。他们自费训练这些模型，并通过[REST\
    \ API](https://docs.microsoft.com/en-us/rest/api/)将其提供给任何希望使用它们的人。如果你能编写代码通过互联网发送HTTP请求，你就可以利用这些API将人工智能融入你的应用程序，而无需放下日常工作去攻读深度学习博士学位。\n\
    \n微软将其AI服务套件称为[Azure Cognitive Services](https://azure.microsoft.com/en-us/services/cognitive-services/)。亚马逊使用[AWS\
    \ AI Services](https://aws.amazon.com/machine-learning/)这个名称。两者都提供丰富的API，后端由深度学习模型提供支持——这些模型不断优化，因此会随着时间的推移变得更智能。需要为上传到网站的照片添加说明吗？微软的[计算机视觉服务](https://azure.microsoft.com/en-us/services/cognitive-services/computer-vision/)可以做到；亚马逊的[Rekognition服务](https://aws.amazon.com/rekognition/)也可以。如何构建一个具有逼真人声的屏幕阅读器来帮助听障人士？[Amazon\
    \ Polly](https://aws.amazon.com/polly/)可以处理，Azure Cognitive Services的[语音服务](https://azure.microsoft.com/en-us/services/cognitive-services/speech-services/)和谷歌的[文本转语音API](https://cloud.google.com/text-to-speech)也可以。这些只是认知服务可以执行的操作的几个例子，通常只需几行代码。\n\
    \n你在[第12章](https://docs.microsoft.com/en-us/learn/)中已经见识了Azure Cognitive Services的实际应用，当时你使用了[自定义视觉服务](https://azure.microsoft.com/en-us/services/cognitive-services/custom-vision-service/)来训练自定义对象检测模型。它是构成认知服务家族的几项服务之一。本章将介绍其他服务，并演示如何使用它们以及如何用它们构建解决方案。重点介绍Azure\
    \ Cognitive Services并不意味着它们比亚马逊和谷歌的同类产品更好。我只是更熟悉它们，因为二十多年来我一直与微软密切合作。一旦你学会了如何调用Azure\
    \ Cognitive Services API，将这些知识应用到其他供应商的认知服务上就很简单了。\n\n准备好施展一些魔法了吗？让我们开始吧。\n\n\
    ### 介绍Azure Cognitive Services"

- md: "independent variables. In September 2020, a team of researchers at Microsoft\
    \ and Peking University published a paper titled “Multivariate Time-series Anomaly\
    \ Detection via Graph Attention Network” that proposed a novel architecture for\
    \ multivariate anomaly detection. It combines two deep-learning models: one that\
    \ relies on prediction error and another that relies on reconstruction error.\
    \ Microsoft uses this architecture in its Azure Multivariate Anomaly Detector\
    \ service, which can model dependencies between up to 300 independent data sources\
    \ and is used by companies such as Airbus and Siemens to detect irregularities\
    \ in space-station telemetry and to test medical devices before they’re sent to\
    \ market. The Azure Multivariate Anomaly Detector service is part of Azure Cognitive\
    \ Services, which is covered in Chapter 14.\n\n## Summary\n\nPrincipal component\
    \ analysis is a technique for reducing the number of dimensions in a dataset without\
    \ incurring a commensurate loss of information. It enjoys a number of uses in\
    \ machine learning, including visualizing high-dimensional data, anonymizing data,\
    \ reducing noise, and increasing the ratio of rows to columns by reducing the\
    \ number of dimensions. It can also be used to perform anomaly detection by measuring\
    \ the loss incurred when a PCA transform is applied and then inverted. Anomalous\
    \ samples tend to incur more loss.\n\nWhen I teach classes, I often introduce\
    \ PCA as “the best-kept secret in machine learning.” It shouldn’t remain a secret,\
    \ because it’s an indispensable tool in the hands of machine learning engineers.\
    \ Now that you know about it, I can just about guarantee that you’ll find ways\
    \ to put it to work.\n\n## Chapter 7. Operationalizing Machine Learning Models\n\
    \nAll of the machine learning models presented so far in this book are written\
    \ in Python. Models don’t have to be written in Python, but many are, thanks in\
    \ part to the numerous world-class Python libraries available, including [Pandas](https://pandas.pydata.org/)\
    \ and [Scikit-Learn](https://scikit-learn.org/). ML models written in Python are\
    \ easily consumed in Python apps. Calling them from other languages such as C++,\
    \ Java, and C# requires a little more work. You can’t simply call a Python function\
    \ from C++ as if it were a C++ function. So how do you invoke models written in\
    \ Python from apps written in other languages? Put another way, how do you *operationalize*\
    \ Python models such that they are usable in any app on any platform written in\
    \ any programming language?\n\nThe diagram on the left in [Figure 7-1](#figure-7-1)\
    \ shows one strategy: wrap the model in a web service and expose its functionality\
    \ through a [REST API](https://en.wikipedia.org/wiki/Representational_state_transfer).\
    \ Then any client that can generate an HTTP(S) request can invoke the model. It’s\
    \ relatively easy to do the wrapping with help from Python frameworks such as\
    \ [Flask](https://flask.palletsprojects.com/). The web service can be hosted locally\
    \ or in the cloud, and it can be containerized for easy deployment using tools\
    \ such as [Docker](https://www.docker.com/).\n\n![](img/628b9a382d0944bbfa786c66bc651b50_149_0.png)\n\
    \nThe diagram on the right shows another strategy—one that’s relatively new but\
    \ rapidly growing in popularity. It involves exporting a Python model to a platform-agnostic\
    \ format called ONNX, short for [Open Neural Network Exchange](https://onnx.ai/),\
    \ and then using an ONNX runtime to load the model in Java, C++, C#, and other\
    \ programming languages. Once loaded, the model can be called via the ONNX runtime.\n\
    \nOf course, if the client app and the model are written in the same language,\
    \ you need neither a web service nor ONNX. In this chapter, I’ll walk you through\
    \ several scenarios:\n\n- How to save a trained Python model and invoke it from\
    \ a Python client\n- How to invoke a Python model from a non-Python client using\
    \ a web service\n- How to containerize a Python model (and web service) for easy\
    \ deployment\n- How to use ONNX to invoke a Python model from other programming\
    \ languages\n- How to write machine learning models in C# rather than Python\n\
    \nI'll finish up by demonstrating a novel way to operationalize a machine learning\
    \ model by exposing its functionality through Microsoft Excel. There's a lot to\
    \ cover, so let's get started.\n\n## Consuming a Python Model from a Python Client\n\
    \nOstensibly, invoking a Python model from a Python client is simple: just call\
    \ `predict` (or, for a classifier, `predict_proba`) on the model. Of course, you\
    \ don't want to have to retrain the model every time you use it. You want to train\
    \ it once, and then empower a client app to re-create the model in its trained\
    \ state. For that, Python programmers use the Python `pickle` module.\n\nTo demonstrate,\
    \ the following code builds and trains the Titanic model featured in Chapter 3.\
    \ Rather than use the model to make predictions, however, it saves the model to\
    \ a .pkl file (it \"pickles\" the model) with a call to `pickle.dump` on the final\
    \ line:\n\n```python\nimport pickle\nimport pandas as pd\nfrom sklearn.linear_model\
    \ import LogisticRegression\n\ndf = pd.read_csv('Data/titanic.csv')\ndf = df[['Survived',\
    \ 'Age', 'Sex', 'Pclass']]\ndf = pd.get_dummies(df, columns=['Sex', 'Pclass'])\n\
    df.dropna(inplace=True)\n\nx = df.drop('Survived', axis=1)\ny = df['Survived']\n\
    \nmodel = LogisticRegression(random_state=0)\nmodel.fit(x, y)\n\npickle.dump(model,\
    \ open('titanic.pkl', 'wb'))\n```\n\nTo invoke the model, a Python client uses\
    \ `pickle.load` to deserialize the model from the .pkl file, *re-creating the\
    \ model in its trained state*, and calls `predict_proba` to compute the odds of\
    \ a passenger's survival:\n\n```python\nimport pickle\nimport pandas as pd\n\n\
    model = pickle.load(open('titanic.pkl', 'rb'))\n\nfemale = pd.DataFrame({ 'Age':\
    \ [30], 'Sex_female': [1], 'Sex_male': [0],\n                        'Pclass_1':\
    \ [1], 'Pclass_2': [0], 'Pclass_3': [0] })\n\nprobability = model.predict_proba(female)[0][1]\n\
    print(f'Probability of survival: {probability:.1%}')\n```\n\nNow the client can\
    \ use the model to make a prediction without retraining it. And once the model\
    \ is loaded, it can persist for the lifetime of the client and be called upon\
    \ for predictions whenever needed.\n\nChapter 5 introduced Scikit’s `make_pipeline`\
    \ function, which allows estimators (objects that make predictions) and transformers\
    \ (objects that transform data input to a model) to be combined into a single\
    \ unit, or *pipeline*. The pickle module can be used to serialize and deserialize\
    \ pipelines too. Example 7-1 recasts the sentiment analysis model featured in\
    \ Chapter 4 to use `make_pipeline` to combine a `CountVectorizer` for vectorizing\
    \ text with a `LogisticRegression` object for classifying text. The call to `pickle.dump`\
    \ saves the model, CountVectorizer and all.\n\n### Example 7-1. Training and saving\
    \ a sentiment analysis pipeline\n\n```python\nimport pickle\nimport pandas as\
    \ pd\nfrom sklearn.feature_extraction.text import CountVectorizer\nfrom sklearn.linear_model\
    \ import LogisticRegression\nfrom sklearn.pipeline import make_pipeline\ndf =\
    \ pd.read_csv('Data/reviews.csv', encoding=\"ISO-8859-1\")\ndf = df.drop_duplicates()\n\
    x = df['Text']\ny = df['Sentiment']\nvectorizer = CountVectorizer(ngram_range=(1,\
    \ 2), stop_words='english',\n                            min_df=20)\nmodel = LogisticRegression(max_iter=1000,\
    \ random_state=0)\npipe = make_pipeline(vectorizer, model)\npipe.fit(x, y)\npickle.dump(pipe,\
    \ open('sentiment.pkl', 'wb'))\n```\n\nA Python client can deserialize the pipeline\
    \ and call `predict_proba` to score a line of text for sentiment with a few simple\
    \ lines of code:\n\n```python\nimport pickle\npipe = pickle.load(open('sentiment.pkl',\
    \ 'rb'))\nscore = pipe.predict_proba(['Great food and excellent service!'])[0][1]\n\
    print(score)\n```\n\nPickling in this manner works not just with CountVectorizer\
    \ but with other transformers as well, such as StandardScaler.\n\n> **NOTE**\n\
    \nPickling a pipeline containing a CountVectorizer can produce a large .pkl file.\
    \ In this example, sentiment.pkl is 50 MB in length because it contains the entire\
    \ vocabulary built by CountVectorizer from the training text. Remove the min_df=20\
    \ parameter and the file swells to nearly 90 MB.\n\nThe solution is to replace\
    \ CountVectorizer with HashingVectorizer, which doesn't create a vocabulary but\
    \ instead uses word hashes to index a table of word frequencies. That reduces\
    \ sentiment.pkl to 8 MB—without the min_df parameter, which HashingVectorizer\
    \ doesn't support anyway.\n\nIf you'd like to write a standalone Python client\
    \ that performs sentiment analysis, run the code in Example 7-1 in a Jupyter notebook\
    \ to generate sentiment.pkl. Optionally, you can change CountVectorizer to HashingVectorizer\
    \ and remove the min_df parameter to reduce the size of the .pkl file. Then create\
    \ a Python script named sentiment.py containing the following code:\n\n```python\n\
    import pickle, sys\n\n# Get the text to analyze\nif len(sys.argv) > 1:\n    text\
    \ = sys.argv[1]\nelse:\n    text = input('Text to analyze: ')\n\n# Load the pipeline\
    \ containing the model and the vectorizer\npipe = pickle.load(open('sentiment.pkl',\
    \ 'rb'))\n\n# Pass the input text to the pipeline and print the result\nscore\
    \ = pipe.predict_proba([text])[0][1]\nprint(score)\n```\n\nCopy sentiment.pkl\
    \ into the same directory as sentiment.py, and then pop out to the command line\
    \ and run the script:\n\n```\npython sentiment.py \"Great food and excellent service!\"\
    \n```\n\nThe output should look something like this, which is proof that you succeeded\
    \ in re-creating the model in its trained state and invoking it to analyze the\
    \ input text for sentiment:"
  mdcn: "自变量。2020年9月，微软和北京大学的一个研究团队发表了一篇题为“基于图注意力网络的多元时间序列异常检测”的论文，提出了一种新颖的多元异常检测架构。该架构结合了两种深度学习模型：一种依赖于预测误差，另一种依赖于重建误差。微软在其Azure多元异常检测器服务中使用了这一架构，该服务可以对多达300个独立数据源之间的依赖关系进行建模，并被空客和西门子等公司用于检测空间站遥测数据中的异常，以及在医疗设备上市前对其进行测试。Azure多元异常检测器服务是Azure认知服务的一部分，该服务将在第14章中介绍。\n\
    \n## 总结\n\n主成分分析是一种在不造成相应信息损失的情况下减少数据集维度的技术。它在机器学习中有多种用途，包括可视化高维数据、数据匿名化、降低噪声以及通过减少维度来增加行与列的比例。它还可用于执行异常检测，方法是测量应用PCA变换然后反转时所造成的损失。异常样本往往会造成更大的损失。\n\
    \n当我授课时，我经常将PCA介绍为“机器学习中保守得最好的秘密”。它不应该继续成为一个秘密，因为它是机器学习工程师手中不可或缺的工具。既然你已经了解了它，我几乎可以保证你会找到方法来应用它。\n\
    \n## 第7章 机器学习模型的部署\n\n本书到目前为止介绍的所有机器学习模型都是用Python编写的。模型不一定非要用Python编写，但许多模型是，这部分归功于众多世界级的Python库，包括[Pandas](https://pandas.pydata.org/)和[Scikit-Learn](https://scikit-learn.org/)。用Python编写的ML模型很容易在Python应用程序中使用。从C++、Java和C#等其他语言调用它们需要多做一些工作。你不能像调用C++函数那样简单地从C++调用Python函数。那么，如何从用其他语言编写的应用程序中调用用Python编写的模型呢？换句话说，如何*部署*Python模型，使其可以在任何平台上用任何编程语言编写的任何应用程序中使用？\n\
    \n[图7-1](#figure-7-1)左侧的图表展示了一种策略：将模型包装在Web服务中，并通过[REST API](https://en.wikipedia.org/wiki/Representational_state_transfer)暴露其功能。然后，任何能生成HTTP(S)请求的客户端都可以调用该模型。借助[Flask](https://flask.palletsprojects.com/)等Python框架，进行包装相对容易。Web服务可以托管在本地或云端，并且可以使用[Docker](https://www.docker.com/)等工具进行容器化，以便于部署。\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_149_0.png)\n\n右侧的图表展示了另一种策略——一种相对较新但迅速普及的策略。它涉及将Python模型导出为一种与平台无关的格式，称为ONNX，即[开放神经网络交换](https://onnx.ai/)的缩写，然后使用ONNX运行时在Java、C++、C#和其他编程语言中加载模型。一旦加载，模型就可以通过ONNX运行时进行调用。\n\
    \n当然，如果客户端应用程序和模型是用同一种语言编写的，你既不需要Web服务也不需要ONNX。在本章中，我将引导你了解几种场景：\n\n- 如何保存训练好的Python模型并从Python客户端调用它\n\
    - 如何使用Web服务从非Python客户端调用Python模型\n- 如何将Python模型（和Web服务）容器化以便于部署\n- 如何使用ONNX从其他编程语言调用Python模型\n\
    - 如何用C#而不是Python编写机器学习模型\n\n最后，我将演示一种新颖的方法，通过Microsoft Excel暴露其功能来部署机器学习模型。内容很多，让我们开始吧。\n\
    \n## 从Python客户端使用Python模型\n\n表面上看，从Python客户端调用Python模型很简单：只需在模型上调用`predict`（或者对于分类器，调用`predict_proba`）。当然，你不想每次使用模型时都重新训练它。你希望训练一次，然后让客户端应用程序能够在训练好的状态下重新创建模型。为此，Python程序员使用Python的`pickle`模块。\n\
    \n为了演示，以下代码构建并训练了第3章中介绍的泰坦尼克号模型。然而，它没有使用模型进行预测，而是在最后一行调用`pickle.dump`将模型保存到.pkl文件中（它“腌制”了模型）：\n\
    \n```python\nimport pickle\nimport pandas as pd\nfrom sklearn.linear_model import\
    \ LogisticRegression\n\ndf = pd.read_csv('Data/titanic.csv')\ndf = df[['Survived',\
    \ 'Age', 'Sex', 'Pclass']]\ndf = pd.get_dummies(df, columns=['Sex', 'Pclass'])\n\
    df.dropna(inplace=True)\n\nx = df.drop('Survived', axis=1)\ny = df['Survived']\n\
    \nmodel = LogisticRegression(random_state=0)\nmodel.fit(x, y)\n\npickle.dump(model,\
    \ open('titanic.pkl', 'wb'))\n```\n\n要调用模型，Python客户端使用`pickle.load`从.pkl文件中反序列化模型，*在训练好的状态下重新创建模型*，并调用`predict_proba`来计算乘客的生存几率：\n\
    \n```python\nimport pickle\nimport pandas as pd\n\nmodel = pickle.load(open('titanic.pkl',\
    \ 'rb'))\n\nfemale = pd.DataFrame({ 'Age': [30], 'Sex_female': [1], 'Sex_male':\
    \ [0],\n                        'Pclass_1': [1], 'Pclass_2': [0], 'Pclass_3':\
    \ [0] })\n\nprobability = model.predict_proba(female)[0][1]\nprint(f'Probability\
    \ of survival: {probability:.1%}')\n```\n\n现在客户端可以使用模型进行预测，而无需重新训练它。一旦模型加载，它可以在客户端的整个生命周期内持续存在，并在需要时随时调用进行预测。\n\
    \n第5章介绍了Scikit的`make_pipeline`函数，它允许估计器（进行预测的对象）和转换器（将数据输入转换为模型的对象）组合成一个单元，或称为*管道*。pickle模块也可以用于序列化和反序列化管道。示例7-1将第4章中介绍的情感分析模型重新设计，使用`make_pipeline`将用于文本向量化的`CountVectorizer`与用于文本分类的`LogisticRegression`对象组合在一起。调用`pickle.dump`保存模型，包括CountVectorizer和所有内容。\n\
    \n### 示例7-1. 训练和保存情感分析管道\n\n```python\nimport pickle\nimport pandas as pd\nfrom\
    \ sklearn.feature_extraction.text import CountVectorizer\nfrom sklearn.linear_model\
    \ import LogisticRegression\nfrom sklearn.pipeline import make_pipeline\ndf =\
    \ pd.read_csv('Data/reviews.csv', encoding=\"ISO-8859-1\")\ndf = df.drop_duplicates()\n\
    x = df['Text']\ny = df['Sentiment']\nvectorizer = CountVectorizer(ngram_range=(1,\
    \ 2), stop_words='english',\n                            min_df=20)\nmodel = LogisticRegression(max_iter=1000,\
    \ random_state=0)\npipe = make_pipeline(vectorizer, model)\npipe.fit(x, y)\npickle.dump(pipe,\
    \ open('sentiment.pkl', 'wb'))\n```\n\nPython客户端可以用几行简单的代码反序列化管道并调用`predict_proba`来为一行文本的情感打分：\n\
    \n```python\nimport pickle\npipe = pickle.load(open('sentiment.pkl', 'rb'))\n\
    score = pipe.predict_proba(['Great food and excellent service!'])[0][1]\nprint(score)\n\
    ```\n\n以这种方式腌制不仅适用于CountVectorizer，也适用于其他转换器，如StandardScaler。\n\n> **注意**\n\n\
    腌制包含CountVectorizer的管道可能会产生一个很大的.pkl文件。在本例中，sentiment.pkl的大小为50 MB，因为它包含了CountVectorizer从训练文本中构建的整个词汇表。移除min_df=20参数后，文件大小膨胀到近90\
    \ MB。\n\n解决方案是用HashingVectorizer替换CountVectorizer，后者不创建词汇表，而是使用词哈希来索引词频表。这将sentiment.pkl的大小减少到8\
    \ MB——即使没有min_df参数（HashingVectorizer本身也不支持该参数）。\n\n如果你想编写一个执行情感分析的独立Python客户端，请在Jupyter\
    \ notebook中运行示例7-1中的代码以生成sentiment.pkl。你可以选择将CountVectorizer更改为HashingVectorizer并移除min_df参数以减小.pkl文件的大小。然后创建一个名为sentiment.py的Python脚本，包含以下代码：\n\
    \n```python\nimport pickle, sys\n\n# Get the text to analyze\nif len(sys.argv)\
    \ > 1:\n    text = sys.argv[1]\nelse:\n    text = input('Text to analyze: ')\n\
    \n# Load the pipeline containing the model and the vectorizer\npipe = pickle.load(open('sentiment.pkl',\
    \ 'rb'))\n\n# Pass the input text to the pipeline and print the result\nscore\
    \ = pipe.predict_proba([text])[0][1]\nprint(score)\n```\n\n将sentiment.pkl复制到与sentiment.py相同的目录中，然后切换到命令行并运行脚本：\n\
    \n```\npython sentiment.py \"Great food and excellent service!\"\n```\n\n输出应该类似于这样，这证明你成功地在训练好的状态下重新创建了模型，并调用它来分析输入文本的情感："

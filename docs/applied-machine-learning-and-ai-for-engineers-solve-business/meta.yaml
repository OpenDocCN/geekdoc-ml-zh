- img_proc: true
  md: 'The gist of text classification is that you transform an input sequence into
    a vector characterizing the sequence, and then you input the vector to a classifier.
    There are several ways to generate that vector. You can reshape the 2D output
    from an embedding layer into a 1D vector, or you can feed that output into a recurrent
    layer or convolution layer in hopes of generating a vector that is more context
    aware. Whichever route you choose, the goal is simple: convert a string of text
    into an array of floating-point numbers that uniquely describes it and use a sigmoid
    or softmax output layer to classify it.


    NMT is basically an extension of text classification. You start by converting
    a text sequence into a vector. But rather than classify the vector, you use it
    to generate a new sequence. One way to do that is with an LSTM encoder-decoder.


    # LSTM Encoder-Decoders


    Until a few years ago, most NMT models, including the one underlying Google Translate,
    were LSTM-based sequence-to-sequence models similar to the one in Figure 13-3.
    In such models, one or more LSTM layers encode a tokenized input sequence representing
    the phrase to be translated into a vector. A second set of recurrent layers uses
    that vector as input and decodes it into a tokenized phrase in another language.
    The model accepts sequences as input and returns sequences as output, hence the
    term sequence-to-sequence model. A softmax output layer at the end outputs a set
    of probabilities for each token in the output sequence. If the maximum output
    phrase length that’s supported is 20 tokens, for example, and the vocabulary of
    the output language contains 20,000 words, then the output is 20 sets (one per
    token) of 20,000 probabilities. The word selected for each output token is the
    word assigned the highest probability.


    ![](img/628b9a382d0944bbfa786c66bc651b50_309_0.png)


    LSTM-based sequence-to-sequence models are relatively easy to build with Keras
    and TensorFlow. This book’s GitHub repo contains a notebook that uses 50,000 samples
    to train an LSTM model to translate English to French. The model is defined this
    way:


    ```

    model = Sequential()

    model.add(Embedding(en_vocab_size, 256, input_length=en_max_len, mask_zero=True))

    model.add(LSTM(256))

    model.add(RepeatVector(fr_max_len))

    model.add(LSTM(256, return_sequences=True))

    model.add(Dropout(0.4))

    model.add(TimeDistributed(Dense(fr_vocab_size, activation=''softmax'')))

    ```'

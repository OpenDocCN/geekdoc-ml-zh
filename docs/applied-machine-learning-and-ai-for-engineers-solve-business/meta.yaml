- md: "## Sizing a Neural Network\n\nA neural network is characterized by the number\
    \ of layers (the *depth* of the network), the number of neurons in each layer\
    \ (the *widths* of the layers), the types of layers (in this example, `Dense`\
    \ layers of fully connected neurons), and the activation functions used. There\
    \ are [other layer types](https://example.com), many of which I will introduce\
    \ in later chapters. [Dropout layers](https://example.com), for example, can increase\
    \ a network’s ability to generalize by randomly dropping connections between layers\
    \ during weight updates, while [Conv2D layers](https://example.com) enable us\
    \ to build convolutional neural networks (CNNs) that excel at image processing.\n\
    \nWhen designing a network, how do you pick the right number of layers and the\
    \ right number of neurons for each layer? The short answer is that the “right”\
    \ width and depth depends on the problem you’re trying to solve, the dataset you’re\
    \ training with, and the accuracy you desire. As a rule, you want the *minimum\
    \ width and depth required* to achieve that accuracy, and you get there using\
    \ a combination of intuition and experimentation. That said, here are a few guidelines\
    \ to keep in mind:\n\n- Greater widths and depths give the network more capacity\
    \ to “learn” by fitting more tightly to the training data. They also increase\
    \ the likelihood of overfitting. It’s the validation results that matter, and\
    \ sometimes loosening the fit to the training data allows the network to generalize\
    \ better. The simplest way to loosen the fit is to reduce the number of neurons.\n\
    - Generally speaking, you prefer greater width to greater depth in part to avoid\
    \ the [vanishing gradient problem](https://example.com), which diminishes the\
    \ impact of added layers. The ReLU activation function provides some protection\
    \ against vanishing gradients, but that protection isn’t absolute. For an explanation,\
    \ see “[How to Fix the Vanishing Gradients Problem Using the ReLU](https://example.com)”.\
    \ In addition, a network with, say, 100 neurons in one layer trains faster than\
    \ a network with five layers of 20 neurons each because the former has fewer weights.\
    \ Think about it: there are no connections between neurons in one layer, but there\
    \ are 1,600 connections (20² × 4) between five layers containing 20 neurons each.\n\
    - Fewer neurons means less training time. State-of-the-art neural networks trained\
    \ with large datasets sometimes take days or weeks to train on high-end GPUs,\
    \ so training time is important.\n\nIn real life, data scientists experiment with\
    \ various widths and depths to find the right balance between training time, accuracy,\
    \ and the network’s ability to generalize. For a multilayer perceptron, you rarely\
    \ ever need more than two hidden layers, and one is often sufficient. A network\
    \ with one or two hidden layers has the capacity to solve even complex nonlinear\
    \ problems. Two layers with 128 neurons each, for example, gives you 16,384 (128²)\
    \ weights that can be adjusted, plus 256 biases. That’s a lot of fitting power.\
    \ I frequently start with one or, at most, two layers of 512 neurons each and\
    \ halve the width or depth until the validation accuracy drops below an acceptable\
    \ threshold.\n\n## Using a Neural Network to Predict Taxi Fares\n\nLet’s put this\
    \ knowledge to work building and training a neural network. The problem that we’ll\
    \ solve is the same one presented in Chapter 2: using data from the New York City\
    \ Taxi and Limousine Commission to predict taxi fares. We’ll use a neural network\
    \ as a regression model to make the predictions.\n\nDownload the CSV file containing\
    \ the dataset if you didn’t download it in Chapter 2 and copy it into the *Data*\
    \ directory where your Jupyter notebooks are hosted. Then use the following code\
    \ to load the dataset and show the first five rows. It contains about 55,000 rows\
    \ and is a subset of a much larger dataset that was recently used in Kaggle’s\
    \ New York City Taxi Fare Prediction competition:\n\n```python\nimport pandas\
    \ as pd\n\ndf = pd.read_csv('Data/taxi-fares.csv', parse_dates=['pickup_datetime'])\n\
    df.head()\n```\n\nThe data requires a fair amount of prep work before it’s useful—something\
    \ that’s quite common in machine learning and in deep learning too. Use the following\
    \ statements to transform the raw dataset into one suitable for training, and\
    \ refer to the taxi-fare example in Chapter 2 for a step-by-step explanation of\
    \ the transformations applied:\n\n```python\nfrom math import sqrt\n\ndf = df[df['passenger_count']\
    \ == 1]\ndf = df.drop(['key', 'passenger_count'], axis=1)\n\nfor i, row in df.iterrows():\n\
    \    dt = row['pickup_datetime']\n    df.at[i, 'day_of_week'] = dt.weekday()\n\
    \    df.at[i, 'pickup_time'] = dt.hour\n    x = (row['dropoff_longitude'] - row['pickup_longitude'])\
    \ * 54.6\n    y = (row['dropoff_latitude'] - row['pickup_latitude']) * 69.0\n\
    \    distance = sqrt(x**2 + y**2)\n    df.at[i, 'distance'] = distance\n\ndf.drop(['pickup_datetime',\
    \ 'pickup_longitude', 'pickup_latitude',\n         'dropoff_longitude', 'dropoff_latitude'],\
    \ axis=1, inplace=True)\n\ndf = df[(df['distance'] > 1.0) & (df['distance'] <\
    \ 10.0)]\ndf = df[(df['fare_amount'] > 0.0) & (df['fare_amount'] < 50.0)]\ndf.head()\n\
    ```\n\nThe resulting dataset contains columns for the day of the week (0–6, where\
    \ 0 corresponds to Monday), the hour of the day (0–23), and the distance traveled\
    \ in miles, and from which outliers have been removed:\n\n| fare_amount | day_of_week\
    \ | pickup_time | distance |\n|---|---|---|---|\n| 2 | 6.1 | 0.0 | 15.0 | 1.038136\
    \ |\n| 4 | 10.5 | 5.0 | 10.0 | 2.924341 |\n| 5 | 15.3 | 4.0 | 20.0 | 4.862893\
    \ |\n| 8 | 7.7 | 5.0 | 1.0 | 2.603493 |\n| 9 | 8.9 | 3.0 | 16.0 | 1.365739 |\n\
    \nThe next step is to create the neural network. Use the following statements\
    \ to create a network with an input layer that accepts three values (day, time,\
    \ and distance), two hidden layers with 512 neurons each, and an output layer\
    \ with a single neuron (the predicted fare amount):\n\n```python\nfrom tensorflow.keras.models\
    \ import Sequential\nfrom tensorflow.keras.layers import Dense\n\nmodel = Sequential()\n\
    model.add(Dense(512, activation='relu', input_dim=3))\nmodel.add(Dense(512, activation='relu'))\n\
    model.add(Dense(1))\nmodel.compile(optimizer='adam', loss='mae', metrics=['mae'])\n\
    model.summary()\n```\n\nThe call to `summary` in the last statement produces a\
    \ concise summary of the network topology, including the number of *trainable\
    \ parameters*—weights and biases that can be adjusted to fit the network to a\
    \ dataset (Figure 9-2). For a given layer, the parameter count is the product\
    \ of the number of neurons in that layer and the previous layer (the number of\
    \ weights connecting the neurons in the two layers) plus the number of neurons\
    \ in the layer (the biases associated with those neurons). This network is a relatively\
    \ simple one, and yet it features more than a quarter million knobs and dials\
    \ that can be adjusted to fit it to a dataset.\n\nNow separate the feature columns\
    \ from the label column and use them to train the network. Set `validation_split`\
    \ to 0.2 to validate the network using 20% of the training data. Train for 100\
    \ epochs and use a batch size of 100. Given that the dataset contains more than\
    \ 38,000 samples, this means that about 380 backpropagation passes will be performed\
    \ in each epoch:\n\n```python\nx = df.drop('fare_amount', axis=1)\ny = df['fare_amount']\n\
    \nhist = model.fit(x, y, validation_split=0.2, epochs=100, batch_size=100)\n```\n\
    \nthan fight it, data scientists learn to “embrace the randomness.” If you work\
    \ the tutorial in the next section, your results will differ from mine. They shouldn’t\
    \ differ by a lot, but they *will* differ.\n\n> **NOTE**\n\nThe random weights\
    \ assigned to the connections between neurons aren’t perfectly random. Keras includes\
    \ about a dozen initializers, each of which initializes parameters in a different\
    \ way. By default, Dense layers use the Zeroes initializer to initialize biases\
    \ and the GlorotUniform initializer to initialize weights. The latter generates\
    \ random numbers that fall within a uniform distribution whose limits are computed\
    \ from the network topology.\n\nYou judge the efficacy of training by examining\
    \ information returned by the `fit` method. `fit` returns a history object containing\
    \ the training and validation metrics specified in the `metrics` parameter passed\
    \ to the `compile` method. For example, `metrics=['mae']` captures MAE at the\

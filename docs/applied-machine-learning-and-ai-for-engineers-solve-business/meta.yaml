    \ that can identify a person’s voice, and a [speech translation API](https://learn.microsoft.com/en-us/azure/ai-services/speech-service/speech-translation)\
    \ that can translate speech to dozens of other languages in real time.\n\nDecision\
    \ services include [Anomaly Detector](https://learn.microsoft.com/en-us/azure/ai-services/anomaly-detector/),\
    \ which identifies anomalies in live or recorded data streams and can aggregate\
    \ inputs from hundreds of disparate sources, such as temperature sensors and pressure\
    \ gauges, and model relationships between them. (See [Chapter 6](https://learn.microsoft.com/en-us/azure/ai-services/anomaly-detector/)\
    \ for an introduction to anomaly detection.) Airbus uses Anomaly Detector to [analyze\
    \ stresses and strains](https://learn.microsoft.com/en-us/azure/ai-services/anomaly-detector/customer-stories/airbus-anomaly-detector)\
    \ in aircraft; Siemens uses it to [test medical devices](https://learn.microsoft.com/en-us/azure/ai-services/anomaly-detector/customer-stories/siemens-anomaly-detector)\
    \ for flaws as the final step in production. The [Content Moderator service](https://learn.microsoft.com/en-us/azure/ai-services/content-moderator/)\
    \ uses AI optionally supplemented by human intervention to flag offensive content\
    \ in images and videos, profane text, and other inappropriate (and potentially\
    \ libelous) content. Last but not least is the [Personalizer service](https://learn.microsoft.com/en-us/azure/ai-services/personalizer/),\
    \ which is perhaps best described as a recommender system on steroids that provides\
    \ personalized content and experiences to end users.\n\n## Keys and Endpoints\n\
    \nAzure Cognitive Services expose REST APIs that are called by transmitting HTTPS\
    \ requests over the internet. The APIs are language agnostic: they can be called\
    \ from any programming language that can put a call on the wire. That includes\
    \ Python, Java, C#, C, C++, JavaScript, Swift, Go, and virtually all other modern\
    \ programming languages. Calls can also be placed with tools such as [Postman](https://www.postman.com/)\
    \ and the Linux `curl` command.\n\nMost Azure Cognitive Services are free up to\
    \ a point, but they’re not altogether free. For example, you can submit 5,000\
    \ text samples per month to the Language service for sentiment analysis without\
    \ incurring any costs. More than that, however, and Azure has to know whose Azure\
    \ subscription to charge. Consequently, before calling an Azure Cognitive Service,\
    \ you need:\n\n- An endpoint for the service—the URL that’s the target of calls\n\
    - A subscription key for the service, or some other means of authenticating calls\n\
    \nYou can acquire both from the [Azure Portal](https://portal.azure.com/). As\
    \ an example, suppose you wish to perform sentiment analysis on a collection of\
    \ tweets. You first open the Azure Portal in your browser and log in with your\
    \ Microsoft account. You then create a Cognitive Services Language resource and\
    \ specify to whom the Azure subscription costs should be charged, the Azure region\
    \ in which the service should be located, and a pricing tier, as shown in Figure\
    \ 14-3. A free tier is generally available if it doesn’t already exist for the\
    \ same service under the same subscription.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_334_0.png)\n\
    \nOnce the Language resource is created, you open it in the Azure Portal and click\
    \ Keys and Endpoint in the menu on the left side of the page. From there, you\
    \ can retrieve a subscription key and endpoint for the service (Figure 14-4).\
    \ The key is a string of letters and numbers that uniquely identifies an Azure\
    \ subscription. Treat it with care because it can cost you money if it gets out.\
    \ It’s considered a best practice to rotate the key (replace it with a new one)\
    \ periodically in case it falls into the wrong hands. That’s why the portal includes\
    \ Regenerate Key buttons. Why does the portal provide two keys? So you have a\
    \ valid key to use after regenerating the other one. With only one key, you’d\
    \ have to regenerate it and then race to modify any apps that use it, and there\
    \ would be a dead period in which calls placed by those apps would fail.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_335_0.png)\n\
    \nFigure 14-4. Retrieving a key and an endpoint for an Azure Cognitive Services\
    \ resource\n\nThe subscription key in this example is a *single-service* subscription\
    \ key because it works only with the Language resource that you created. If you\
    \ create another Cognitive Services resource—for example, one for the Computer\
    \ Vision service—you get a separate key for it. So that you can avoid managing\
    \ multiple keys for multiple services, most Azure Cognitive Services support *multiservice\
    \ keys* that work with a range of services. To get a multiservice key, simply\
    \ create a Cognitive Services resource rather than a service-specific resource\
    \ and use the key and endpoint that the portal provides.\n\nSubscription keys\
    \ aren’t the only way to authenticate calls to Azure Cognitive Services. Most\
    \ Cognitive Services support Azure Active Directory (AAD) authentication, which\
    \ enhances security by combining AAD identities with role-based access control\
    \ (RBAC). AAD authentication is particularly compelling for apps that rely on\
    \ Cognitive Services APIs and are themselves hosted in Azure. For more information,\
    \ refer to the article “Authenticate Requests to Azure Cognitive Services”.\n\n\
    ## Calling Azure Cognitive Services APIs\n\nOnce you have a subscription key and\
    \ endpoint, you’re ready to roll. Here’s a snippet of Python code that uses the\
    \ Language service to evaluate “Programming is fun, but the hours are long” for\
    \ sentiment. KEY is a placeholder for the Language resource’s subscription key,\
    \ while ENDPOINT is a placeholder for the corresponding endpoint. The `import`\
    \ statement imports the Python [Requests package](https://pypi.org/project/requests/),\
    \ which simplifies the HTTP request-response protocol:\n\n```python\nimport requests\n\
    \ninput = { 'documents': [\n    { 'id': '1000', 'text': 'Programming is fun, but\
    \ the hours are long' }]\n}\n\nheaders = {\n    'Ocp-Apim-Subscription-Key': KEY,\n\
    \    'Content-type': 'application/json'\n}\n```"

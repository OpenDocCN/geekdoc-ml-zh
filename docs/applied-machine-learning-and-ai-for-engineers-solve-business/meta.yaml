    predictions, regression modeling is the right tool for the job.


    When building a regression model, the first and most important decision you make
    is what learning algorithm to use. [Chapter 1](Chapter 1) presented a simple three-class
    classification model that used the *k*-nearest neighbors learning algorithm to

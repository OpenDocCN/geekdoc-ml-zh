    \n本章首先介绍两种流行的人脸检测方法。然后转向人脸识别，并介绍迁移学习作为识别人脸的一种手段。最后通过一个教程，你将把这些部分组合起来，构建自己的人脸识别系统。听起来很有趣？那么让我们开始吧。\n\
    \n### 人脸检测\n\n接下来的章节将介绍两种广泛使用的人脸检测算法——一种依赖于机器学习，另一种使用深度学习——以及实现它们的库。目标是能够找到像 [图\
    \ 11-1](https://example.com) 中那样的照片或视频帧中的所有人脸。之后，我将提供一个易于使用的函数，你可以调用它来从照片中提取所有人脸图像，并将其保存到磁盘或提交给人脸识别模型。\n\
    \n![图 11-1. 人脸检测](img/628b9a382d0944bbfa786c66bc651b50_243_0.png)\n\n### 使用 Viola-Jones\
    \ 进行人脸检测\n\n用于检测照片中人脸的最快、最流行的算法之一源于 2001 年发表的一篇题为“使用简单特征的增强级联进行快速目标检测”的论文。该算法有时被称为\

    The gap didn’t close much (if at all), but sometimes adding dropout in this manner
    *will* increase the validation accuracy. The key statement in this example is
    `model.add(Dropout(0.2))`, which adds a Dropout layer that randomly drops (ignores)
    20% of the connections between the neurons in the hidden layer and the neurons
    in the output layer in each backpropagation pass. You can be more aggressive by
    dropping more connections—increasing 0.2 to 0.4, for example—but you can also
    reach a point of diminishing returns. Note that if you’re super-aggressive with
    the dropout rate (for example, 0.5), you’ll probably need to train the model for
    more epochs. Making it harder to learn means taking longer to learn too.


    In practice, the only way to know whether dropout will improve a model’s ability
    to generalize is to try it. In addition to trying different dropout percentages,
    you can try introducing dropout between two or more layers in hopes of finding
    a combination that works.


    # Saving and Loading Models


    In Chapter 7, you learned how to serialize (save) a trained Scikit model and load
    it in a client app. The same requirement applies to neural networks: you need
    a way to save a trained network and load it later in order to operationalize it.


    You can get the weights and biases from a model with Keras’s `get_weights` method,
    and you can restore them with `set_weights`. But saving a trained model so that
    you can re-create it later requires an additional step. Specifically, you must
    save the network architecture: the number of and types of layers, the number of
    neurons in each layer, the activation functions used in each layer, and so on.
    Fortunately, all that requires just one line of code. That line of code differs
    depending on which of two formats you want the model saved in:'
  merge: -1
  pgno: 199
- img_proc: true
  md: '```

    model.save(''my_model.h5'') # Save the model in Keras''s H5 format

    model.save(''my_model'')     # Save the model in TensorFlow''s native format

    ```


    Loading a saved model is equally simple:


    ```

    from tensorflow.keras.models import load_model


    model = load_model(''my_model.h5'') # Load model saved in H5 format

    model = load_model(''my_model'')     # Load model saved in TensorFlow format

    ```


    Saving the model in H5 format produces a single .h5 file that encapsulates the
    entire model. Saving it in TensorFlow’s native format, also known as the *SavedModel
    format*, produces a series of files and subdirectories containing the serialized
    model. Google recommends using the latter, although it’s still common to see Keras’s
    H5 format used. There is no functional difference between the two, but .h5 files
    can only be read by Keras apps written in Python, while models saved in SavedModel
    format can be loaded by other frameworks. Apps written in C# with Microsoft’s
    ML.NET, for example, can load models saved in SavedModel format regardless of
    the programming language in which the model was crafted.


    > **NOTE**


    The H5 format was originally devised so that Keras models could be saved in a
    manner independent of the deep-learning framework used as the backend. Keras is
    still available in a standalone version that supports backends other than TensorFlow
    (specifically, CNTK and Theano), but those frameworks have been deprecated—they
    are no longer being developed—and are rarely used today other than in legacy models.
    The version of Keras built into TensorFlow supports *only* TensorFlow backends.


    Once a saved model is loaded, it acts identically to the original. The predictions
    that it makes, for example, are identical to the predictions made by the original
    model. You can even further train the model by running additional training samples
    through it. This highlights one of the major differences between neural networks
    and traditional machine learning models built with Scikit. Since the state of
    a network is defined by its weights and biases and loading a model restores the
    weights and biases, neural networks inherently support incremental training, also
    known as *continual learning*, so that they can become smarter over time. Most
    Scikit models do not because serializing the models doesn’t save the internal
    state accumulated as training takes place.


    To recap: you can run a million training samples through a neural network, save
    it, load it, and run another million training samples through it and the network
    picks up right where it left off. The results are identical to running 2 million
    training samples through the network to begin with save for minor differences
    that result from the randomness that is always inherent to training.


    # Keras Callbacks


    As you train a neural network and it achieves peak validation accuracy, the peak
    is hard to capture. Rather than nicely level out in later epochs, the validation
    accuracy may go down or oscillate between'
  merge: -1
  pgno: 200
- img_proc: true
  md: "peaks and valleys. Given the stochastic (random) nature of neural networks,\
    \ if you mark the epoch that achieved maximum validation accuracy and train again\
    \ for exactly that number of epochs, you won’t get the same results the second\
    \ time. How do you train for *exactly* the right number of epochs to produce the\
    \ best (most accurate) network possible?\n\nAn elegant solution is Keras’s *callbacks\
    \ API*, which lets you write callback functions that are called at various points\
    \ during training—for example, at the end of each epoch—and that have the ability\
    \ to alter and even stop the training process. Here’s an example that creates\
    \ a child class named StopCallback that inherits from Keras’s Callback class.\
    \ The child class implements the on_epoch_end function that’s called at the end\
    \ of each training epoch and stops training if the validation accuracy reaches\
    \ 95%:\n\n```\nfrom tensorflow.keras.callbacks import Callback\n\nclass StopCallback(Callback):\n\
    \    accuracy_threshold = None\n\n    def __init__(self, threshold):\n       \
    \ self.accuracy_threshold = threshold\n\n    def on_epoch_end(self, epoch, logs=None):\n\
    \        if (logs.get('val_accuracy') >= self.accuracy_threshold):\n         \
    \   self.model.stop_training = True\n\ncallback = StopCallback(0.95)\nmodel.fit(x,\
    \ y, validation_split=0.2, epochs=100, batch_size=20,\n          callbacks=[callback])\n\
    model.save('best_model.h5')\n```\n\nNote the validation accuracy threshold (0.95)\
    \ passed to StopCallback’s constructor. The call to *fit* ostensibly trains the\
    \ network for 100 epochs, but if the validation accuracy reaches 0.95 before that,\
    \ training stops in its tracks. The final statement saves the model that achieved\
    \ that accuracy.\n\non_epoch_end is one of several functions you can implement\
    \ in classes that inherit from Callback to receive a callback when a predetermined\
    \ checkpoint is reached in the training process. Others include on_epoch_begin,\
    \ on_train_begin, on_train_end, on_train_batch_begin, and on_train_batch_end.\
    \ You’ll find a complete list, along with examples, in “Writing Your Own Callbacks”\
    \ in the Keras documentation.\n\nIn addition to providing a base Callback class\
    \ from which you can create your own callback classes, Keras provides several\
    \ callback classes of its own. One of them is the EarlyStopping class, which lets\
    \ you stop training based on a specified criterion such as decreasing validation\
    \ accuracy or increasing training loss without writing a lot of code. In the following\
    \ example, training stops early if the validation accuracy fails to improve for\
    \ five consecutive epochs (patience=5). When training is halted, the network’s\
    \ weights and biases are automatically restored to what they were when validation\
    \ accuracy peaked in the final five epochs (restore_best_weights=True):\n\n```\n\
    from tensorflow.keras.callbacks import EarlyStopping\n\ncallback = EarlyStopping(monitor='val_accuracy',\
    \ patience=5,\n                         restore_best_weights=True)\nmodel.fit(x,\
    \ y, validation_split=0.2, epochs=100, batch_size=20,\n```"
  merge: -1
  pgno: 201
- img_proc: true
  md: "Stopping the training process based on rising training loss rather than decreasing\
    \ validation accuracy at the end of each epoch requires a minor code change:\n\
    \n```\nfrom tensorflow.keras.callbacks import EarlyStopping\n\ncallback = EarlyStopping(monitor='loss',\
    \ patience=5, restore_best_weights=True)\nmodel.fit(x, y, validation_split=0.2,\
    \ epochs=100, batch_size=20,\n          callbacks=[callback])\n```\n\nThe callback\
    \ that is used perhaps more than any other is `ModelCheckpoint`, which saves a\
    \ model at specified intervals during training or, if you set `save_best_only`\
    \ to True, saves the most accurate model. The next example trains a model for\
    \ 100 epochs and saves the one that exhibits the highest validation accuracy in\
    \ *best_model.h5*:\n\n```\nfrom tensorflow.keras.callbacks import ModelCheckpoint\n\
    \ncallback = ModelCheckpoint(filepath='best_model.h5', monitor='val_accuracy',\n\
    \                           save_best_only=True)\nmodel.fit(x, y, validation_split=0.2,\
    \ epochs=100, batch_size=20,\n          callbacks=[callback])\n```\n\nAnother\
    \ frequently used callback is `TensorBoard`, which logs a variety of information\
    \ to a specified location in the filesystem as a model is trained. The following\
    \ example logs to the *logs* subdirectory of the current directory:\n\n```\nfrom\
    \ tensorflow.keras.callbacks import TensorBoard\n\ncallback = TensorBoard(log_dir='logs',\
    \ histogram_freq=1)\nmodel.fit(x_train, y_train, validation_split=0.2, epochs=100,\
    \ batch_size=20,\n          callbacks=[callback])\n```\n\nYou can use a tool called\
    \ TensorBoard to monitor accuracy and loss, changes in the model’s weights and\
    \ biases, and more while training takes place or after it has completed. You can\
    \ launch TensorBoard from a Jupyter notebook and point it to the *logs* subdirectory\
    \ with a command like this one:\n\n```\n%tensorboard --logdir logs\n```\n\nOr\
    \ you can launch it from a command prompt by executing the same command without\
    \ the percent sign. Then point your browser to http://localhost:6006 to open the\
    \ TensorBoard console (Figure 9-5). “Get Started with TensorBoard” in the TensorFlow\
    \ documentation contains a helpful tutorial on the basics of TensorBoard. It’s\
    \ an indispensable tool in the hands of professionals, especially when training\
    \ complex models that require hours, days, or even weeks to fully train."

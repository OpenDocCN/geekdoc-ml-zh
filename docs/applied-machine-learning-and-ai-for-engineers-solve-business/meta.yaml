  md: "The ComputerVisionClient class implements several methods that you can call\
    \ to invoke Computer Vision APIs. Most of those methods come in two versions:\
    \ one that accepts an image URL and one that accepts an actual image. The describe_image\
    \ method, for example, accepts an image URL, while the describe_image_in_stream\
    \ method accepts a stream containing the image. My examples use the in_stream\
    \ methods, but you can easily modify them to pass image URLs rather than images.\n\
    \nNow load one of the sample images you copied from the ZIP file and use describe_image_in_stream\
    \ to caption it:\n\n```\n%matplotlib inline\nimport matplotlib.pyplot as plt\n\
    \nimage = plt.imread('Data/dubai.jpg')\nfig, ax = plt.subplots(figsize=(12, 8),\
    \ subplot_kw={'xticks': [], 'yticks': []})\nax.imshow(image)\n\nwith open('Data/dubai.jpg',\
    \ mode='rb') as image:\n    result = client.describe_image_in_stream(image)\n\n\
    \    for caption in result.captions:\n        print(f'{caption.text} ({caption.confidence:.1%})')\n\
    ```\n\nConfirm that the output is as follows:\n\nA man riding a sand dune (53.8%)\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_340_0.png)\n\ndescribe_image_in_stream\
    \ returns zero or more captions, each with a score reflecting the Computer Vision\
    \ service's confidence that the caption is accurate. In this example, it returned\
    \ just one caption with a confidence of 53.8%."

    ```\n\n该数字是4的概率是多少？\n\n```python\nmodel.predict_proba([digits.data[100]])[0][4]\n\
    ```\n\n当用于二元分类时，`predict_proba`返回两个概率：一个用于负类，一个用于正类。对于多类分类，`predict_proba`返回每个可能类别的概率。这允许你评估模型对`predict`返回的预测的置信度。毫不奇怪，`predict`返回被分配最高概率的类别。\n\
    \n## 总结\n\n分类模型在工业中被广泛用于预测分类结果，例如信用卡交易应该被接受还是拒绝。二元分类模型预测两种结果之一，而多类分类模型预测两种以上结果。分类模型最广泛使用的学习算法之一是逻辑回归，它将一个方程拟合到训练数据，并通过计算每个结果是正确结果的可能性并选择概率最高的结果来预测结果。\n\
    \n评估分类模型的方法有很多。哪种方法正确取决于你打算如何使用模型。例如，当假阳性的成本很高时，使用精确率来评估模型的准确性。精确率是通过将真阳性的数量除以真阳性和假阳性的总和来计算的。另一方面，如果假阴性的成本很高，则使用召回率。召回率是通过将真阳性的数量除以真阳性和假阴性的总和来计算的。与精确率和召回率密切相关的是敏感性和特异性。敏感性与召回率相同，而特异性是负类的召回率，而不是正类的召回率。混淆矩阵提供了一种便捷的方式来可视化模型在测试数据上的表现，而无需将准确性简化为一个数字。\n\
    \n一些学习算法仅适用于二元分类，但Scikit在底层进行了一些魔法处理，以确保*任何*学习算法都可以用于二元或多类分类。并非所有机器学习库都是如此。有些将其学习算法限制在特定场景，或者要求你编写额外的代码才能在多类模型中使用二元分类算法。\n\
    \n本章中的所有模型都是用数值数据训练的，即使一些数据集包含分类值——这些值是字符串而不是数字——必须使用独热编码转换为数字。你可能想知道如何构建一个*仅*处理文本的分类模型——例如，一个为餐厅评论打分情感或对电子邮件进行垃圾邮件分类的模型。这是一个完全合理的问题。而这恰好是第4章的主题。\n\
    \n## 第4章 文本分类\n\n二元分类的一个更新颖的用途是情感分析，它检查一段文本样本，如产品评论、推文或网站上的评论，并在0.0到1.0的范围内为其打分，其中0.0代表负面情绪，1.0代表正面情绪。像“物美价廉”这样的评论可能得分为0.9，而“价格过高且几乎无法使用的产品”可能得分为0.1。该分数是文本表达正面情绪的概率。情感分析模型在算法上很难构建，但使用机器学习相对容易制作。有关当今商业中情感分析应用示例，请参阅Nicholas\
    \ Bianchi的文章“8 Sentiment Analysis Real-World Use Cases”。\n\n情感分析是涉及对文本数据而非数值数据进行分类的任务的一个例子。因为机器学习处理的是数字，所以在训练情感分析模型、识别垃圾邮件的模型或任何其他对文本进行分类的模型之前，你必须将文本转换为数字。一种常见的方法是构建一个称为*词袋*的词频表。Scikit-Learn提供了类来帮助。它还包括对文本进行规范化支持，例如，这样“awesome”和“Awesome”就不会被计为两个不同的词。\n\
    \n本章首先描述如何为分类模型准备文本。在构建情感分析模型之后，你将了解另一种流行的学习算法，称为朴素贝叶斯，它特别适用于文本，并使用它构建一个区分合法电子邮件和垃圾邮件的模型。最后，你将了解一种用于测量两个文本样本相似性的数学技术，并使用它构建一个基于你喜欢的其他电影推荐电影的应用程序。\n\
    \n### 为分类准备文本\n\n在训练模型对文本进行分类之前，你必须将文本转换为数字，这个过程称为*向量化*。第1章介绍了图4-1中复制的插图，它演示了一种常见的文本向量化技术。每一行代表一个文本样本，如推文或电影评论，每一列代表训练文本中的一个单词。行中的数字是词数，每行的最后一个数字是标签：0表示负面，1表示正面。"

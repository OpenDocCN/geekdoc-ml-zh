    ```


    The network predicted there’s a 2% chance that (0.2, 0.8) corresponds to class
    0, a 0% chance that it corresponds to class 1, a 5% chance that it corresponds
    to class 2, and a 93% chance that it corresponds to class 3. Looking at the plot,
    that seems like a reasonable answer.


    If you simply want to know which class the point belongs to, you can do it this
    way:


    ```

    np.argmax(model.predict(np.array([[0.2, 0.8]])), axis=1)

    ```



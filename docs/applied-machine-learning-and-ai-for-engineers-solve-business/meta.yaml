    - How to write machine learning models in C# rather than Python\n\nI'll finish\
    \ up by demonstrating a novel way to operationalize a machine learning model by\
    \ exposing its functionality through Microsoft Excel. There's a lot to cover,\
    \ so let's get started.\n\n# Consuming a Python Model from a Python Client\n\n\
    Ostensibly, invoking a Python model from a Python client is simple: just call\
    \ `predict` (or, for a classifier, `predict_proba`) on the model. Of course, you\
    \ don't want to have to retrain the model every time you use it. You want to train\
    \ it once, and then empower a client app to re-create the model in its trained\
    \ state. For that, Python programmers use the Python `pickle` module.\n\nTo demonstrate,\
    \ the following code builds and trains the Titanic model featured in Chapter 3.\
    \ Rather than use the model to make predictions, however, it saves the model to\
    \ a .pkl file (it \"pickles\" the model) with a call to `pickle.dump` on the final\
    \ line:\n\n```\nimport pickle\nimport pandas as pd\nfrom sklearn.linear_model\
    \ import LogisticRegression\n\ndf = pd.read_csv('Data/titanic.csv')\ndf = df[['Survived',\
    \ 'Age', 'Sex', 'Pclass']]\ndf = pd.get_dummies(df, columns=['Sex', 'Pclass'])\n\
    df.dropna(inplace=True)\n\nx = df.drop('Survived', axis=1)\ny = df['Survived']\n\
    \nmodel = LogisticRegression(random_state=0)\nmodel.fit(x, y)\n\npickle.dump(model,\
    \ open('titanic.pkl', 'wb'))\n```\n\nTo invoke the model, a Python client uses\
    \ `pickle.load` to deserialize the model from the .pkl file, *re-creating the\
    \ model in its trained state*, and calls `predict_proba` to compute the odds of\
    \ a passenger's survival:\n\n```\nimport pickle\nimport pandas as pd\n\nmodel\
    \ = pickle.load(open('titanic.pkl', 'rb'))\n\nfemale = pd.DataFrame({ 'Age': [30],\
    \ 'Sex_female': [1], 'Sex_male': [0],\n                        'Pclass_1': [1],\
    \ 'Pclass_2': [0], 'Pclass_3': [0] })\n\nprobability = model.predict_proba(female)[0][1]\n\
    print(f'Probability of survival: {probability:.1%}')\n```\n\nNow the client can\
    \ use the model to make a prediction without retraining it. And once the model\
    \ is"

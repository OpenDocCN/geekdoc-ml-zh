    # Summary


    Keras and TensorFlow are widely used open source frameworks that facilitate building,
    training, saving, loading, and consuming (making predictions with) neural networks.
    You can build neural networks in a variety of programming languages using native
    TensorFlow APIs, but Keras abstracts those APIs and makes deep learning much more
    approachable. Keras apps are written in Python.


    Neural networks, like traditional machine learning models, can be used to solve
    regression problems and classification problems. A network that performs regression
    has one neuron in the output layer with no activation function; the output from
    the network is a floating-point number. A network that performs binary classification
    also has one neuron in the output layer, but the `sigmoid` activation function
    ensures that the output is a value from 0.0 to 1.0 representing the probability
    that the input represents the positive class. For multiclass classification, the
    number of neurons in the output layer equals the number of classes the network
    can predict. The `softmax` activation function transforms the raw values assigned
    to the output neurons into an array of probabilities for each class.


    When you find that a neural network is fitting too tightly to the training data,
    one way to combat overfitting and increase the network’s ability to generalize
    is to reduce the complexity of the network: reduce the number of layers, the number
    of neurons in individual layers, or both. Another approach is to'

  md: '# # Chapter 12. Object Detection


    The previous chapter introduced two popular algorithms for detecting faces in
    photographs: Viola-Jones, which relies on machine learning, and MTCNNs, which
    rely on deep learning. Face detection is a special case of *object detection*,
    in which computers detect and identify objects in images. Identifying an object
    is an image classification problem, something at which CNNs excel. But finding
    objects to identify poses a different challenge.


    Object detection is challenging because objects aren’t assumed to be perfectly
    cropped and aligned as they are for image classification tasks. Nor are they limited
    to one per image. Figure 12-1 shows what a self-driving car might see as it scans
    video frames from a forward-pointing camera. A CNN trained to do conventional
    image classification using carefully prepared training images is powerless to
    help. It might be able to classify the image as one of a city street, but it can’t
    determine that the image contains cars, people, and traffic lights, much less
    pinpoint their locations.


    Object detection has grown in speed and accuracy in recent years, and state-of-the-art
    methods rely on deep learning. In particular, they employ CNNs, which were introduced
    in Chapter 10. Let’s discuss how CNNs do object detection and identification and
    try our hand at it using cutting-edge object detection models.


    ![](img/628b9a382d0944bbfa786c66bc651b50_267_0.png)


    *Figure 12-1. Detecting and identifying objects in a scene*


    # ## R-CNNs


    One way to apply deep learning to the task of object detection is to use *region-based
    CNNs*, also known as *region* CNNs or simply *R-CNNs*. The first R-CNN was introduced
    in a 2014 paper titled “Rich Feature Hierarchies for Accurate Object Detection
    and Semantic Segmentation”. The model described in the paper comprises three stages.
    The first stage scans the image and identifies up to 2,000 bounding boxes representing
    regions of interest—regions that *might* contain objects. The second stage is
    a deep CNN that extracts features from regions of interest. The third is a support
    vector machine that classifies'
  merge: -1
  pgno: 267
- img_proc: true
  md: 'the features. The output is a collection of bounding boxes with class labels
    and confidence scores. An algorithm called *non-maximum suppression* (NMS) filters
    the output and selects the best bounding box for each object.


    NMS is a crucial element of virtually all modern object detection systems. A detector
    invariably emits several bounding boxes for each object. If a photo contains one
    instance of a given class—for example, one zebra—NMS selects the bounding box
    with the highest confidence score. If the photo contains two zebras (Figure 12-2),
    NMS divides the bounding boxes into two groups and selects the box with the highest
    confidence score in each group. It groups boxes based on the amount of overlap
    between them. Overlap is computed by dividing the area of intersection between
    two boxes by the area formed by the union of the boxes. If the resulting *intersection-over-union*
    (IoU) score is greater than a predetermined threshold (typically 0.5), NMS assigns
    the boxes to the same group. Otherwise, it assigns them to separate groups.


    When two objects of the same class have little or no overlap, NMS easily separates
    the two. When two instances of the same class overlap significantly (picture one
    zebra standing behind the other), the IoU threshold might have to be adjusted
    to achieve separation. IoU threshold is a hyperparameter that can be tuned to
    strike the right balance between being overly aggressive at separating overlapping
    objects and not aggressive enough.


    ![](img/628b9a382d0944bbfa786c66bc651b50_268_0.png)


    The first stage of most R-CNN implementations uses an algorithm called *selective
    search* to identify regions of interest by keying on similarities in color, texture,
    shape, and size. Figure 12-3 shows the first 500 bounding boxes generated when
    OpenCV’s implementation of selective search examines an image. Submitting a targeted
    list of regions to the CNN is faster than a brute-force sliding-window approach
    that inputs the contents of the window to the CNN at every stop.'

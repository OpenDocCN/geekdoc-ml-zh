- md: "The gap didn’t close much (if at all), but sometimes adding dropout in this\
    \ manner *will* increase the validation accuracy. The key statement in this example\
    \ is `model.add(Dropout(0.2))`, which adds a Dropout layer that randomly drops\
    \ (ignores) 20% of the connections between the neurons in the hidden layer and\
    \ the neurons in the output layer in each backpropagation pass. You can be more\
    \ aggressive by dropping more connections—increasing 0.2 to 0.4, for example—but\
    \ you can also reach a point of diminishing returns. Note that if you’re super-aggressive\
    \ with the dropout rate (for example, 0.5), you’ll probably need to train the\
    \ model for more epochs. Making it harder to learn means taking longer to learn\
    \ too.\n\nIn practice, the only way to know whether dropout will improve a model’s\
    \ ability to generalize is to try it. In addition to trying different dropout\
    \ percentages, you can try introducing dropout between two or more layers in hopes\
    \ of finding a combination that works.\n\n## Saving and Loading Models\n\nIn Chapter\
    \ 7, you learned how to serialize (save) a trained Scikit model and load it in\
    \ a client app. The same requirement applies to neural networks: you need a way\
    \ to save a trained network and load it later in order to operationalize it.\n\
    \nYou can get the weights and biases from a model with Keras’s `get_weights` method,\
    \ and you can restore them with `set_weights`. But saving a trained model so that\
    \ you can re-create it later requires an additional step. Specifically, you must\
    \ save the network architecture: the number of and types of layers, the number\
    \ of neurons in each layer, the activation functions used in each layer, and so\
    \ on. Fortunately, all that requires just one line of code. That line of code\
    \ differs depending on which of two formats you want the model saved in:\n\n```\n\
    model.save('my_model.h5') # Save the model in Keras's H5 format\nmodel.save('my_model')\
    \     # Save the model in TensorFlow's native format\n```\n\nLoading a saved model\
    \ is equally simple:\n\n```\nfrom tensorflow.keras.models import load_model\n\n\
    model = load_model('my_model.h5') # Load model saved in H5 format\nmodel = load_model('my_model')\
    \     # Load model saved in TensorFlow format\n```\n\nSaving the model in H5 format\
    \ produces a single .h5 file that encapsulates the entire model. Saving it in\
    \ TensorFlow’s native format, also known as the *SavedModel format*, produces\
    \ a series of files and subdirectories containing the serialized model. Google\
    \ recommends using the latter, although it’s still common to see Keras’s H5 format\
    \ used. There is no functional difference between the two, but .h5 files can only\
    \ be read by Keras apps written in Python, while models saved in SavedModel format\
    \ can be loaded by other frameworks. Apps written in C# with Microsoft’s ML.NET,\
    \ for example, can load models saved in SavedModel format regardless of the programming\
    \ language in which the model was crafted.\n\n> **NOTE**\n\nThe H5 format was\
    \ originally devised so that Keras models could be saved in a manner independent\
    \ of the deep-learning framework used as the backend. Keras is still available\
    \ in a standalone version that supports backends other than TensorFlow (specifically,\
    \ CNTK and Theano), but those frameworks have been deprecated—they are no longer\
    \ being developed—and are rarely used today other than in legacy models. The version\
    \ of Keras built into TensorFlow supports *only* TensorFlow backends.\n\nOnce\
    \ a saved model is loaded, it acts identically to the original. The predictions\
    \ that it makes, for example, are identical to the predictions made by the original\
    \ model. You can even further train the model by running additional training samples\
    \ through it. This highlights one of the major differences between neural networks\
    \ and traditional machine learning models built with Scikit. Since the state of\
    \ a network is defined by its weights and biases and loading a model restores\
    \ the weights and biases, neural networks inherently support incremental training,\
    \ also known as *continual learning*, so that they can become smarter over time.\
    \ Most Scikit models do not because serializing the models doesn’t save the internal\
    \ state accumulated as training takes place.\n\nTo recap: you can run a million\
    \ training samples through a neural network, save it, load it, and run another\
    \ million training samples through it and the network picks up right where it\
    \ left off. The results are identical to running 2 million training samples through\
    \ the network to begin with save for minor differences that result from the randomness\
    \ that is always inherent to training.\n\n## Keras Callbacks\n\nAs you train a\
    \ neural network and it achieves peak validation accuracy, the peak is hard to\
    \ capture. Rather than nicely level out in later epochs, the validation accuracy\
    \ may go down or oscillate between peaks and valleys. Given the stochastic (random)\
    \ nature of neural networks, if you mark the epoch that achieved maximum validation\
    \ accuracy and train again for exactly that number of epochs, you won’t get the\
    \ same results the second time. How do you train for *exactly* the right number\
    \ of epochs to produce the best (most accurate) network possible?\n\nAn elegant\
    \ solution is Keras’s *callbacks API*, which lets you write callback functions\
    \ that are called at various points during training—for example, at the end of\
    \ each epoch—and that have the ability to alter and even stop the training process.\
    \ Here’s an example that creates a child class named StopCallback that inherits\
    \ from Keras’s Callback class. The child class implements the on_epoch_end function\
    \ that’s called at the end of each training epoch and stops training if the validation\
    \ accuracy reaches 95%:\n\n```\nfrom tensorflow.keras.callbacks import Callback\n\
    \nclass StopCallback(Callback):\n    accuracy_threshold = None\n\n    def __init__(self,\
    \ threshold):\n        self.accuracy_threshold = threshold\n\n    def on_epoch_end(self,\
    \ epoch, logs=None):\n        if (logs.get('val_accuracy') >= self.accuracy_threshold):\n\
    \            self.model.stop_training = True\n\ncallback = StopCallback(0.95)\n\
    model.fit(x, y, validation_split=0.2, epochs=100, batch_size=20,\n          callbacks=[callback])\n\
    model.save('best_model.h5')\n```\n\nNote the validation accuracy threshold (0.95)\
    \ passed to StopCallback’s constructor. The call to *fit* ostensibly trains the\
    \ network for 100 epochs, but if the validation accuracy reaches 0.95 before that,\
    \ training stops in its tracks. The final statement saves the model that achieved\
    \ that accuracy.\n\non_epoch_end is one of several functions you can implement\
    \ in classes that inherit from Callback to receive a callback when a predetermined\
    \ checkpoint is reached in the training process. Others include on_epoch_begin,\
    \ on_train_begin, on_train_end, on_train_batch_begin, and on_train_batch_end.\
    \ You’ll find a complete list, along with examples, in “Writing Your Own Callbacks”\
    \ in the Keras documentation.\n\nIn addition to providing a base Callback class\
    \ from which you can create your own callback classes, Keras provides several\
    \ callback classes of its own. One of them is the EarlyStopping class, which lets\
    \ you stop training based on a specified criterion such as decreasing validation\
    \ accuracy or increasing training loss without writing a lot of code. In the following\
    \ example, training stops early if the validation accuracy fails to improve for\
    \ five consecutive epochs (patience=5). When training is halted, the network’s\
    \ weights and biases are automatically restored to what they were when validation\
    \ accuracy peaked in the final five epochs (restore_best_weights=True):\n\n```\n\
    from tensorflow.keras.callbacks import EarlyStopping\n\ncallback = EarlyStopping(monitor='val_accuracy',\
    \ patience=5,\n                         restore_best_weights=True)\nmodel.fit(x,\
    \ y, validation_split=0.2, epochs=100, batch_size=20,\n          callbacks=[callback])\n\
    ```\n\nStopping the training process based on rising training loss rather than\
    \ decreasing validation accuracy at the end of each epoch requires a minor code\
    \ change:\n\n```\nfrom tensorflow.keras.callbacks import EarlyStopping\n\ncallback\
    \ = EarlyStopping(monitor='loss', patience=5, restore_best_weights=True)\nmodel.fit(x,\
    \ y, validation_split=0.2, epochs=100, batch_size=20,\n          callbacks=[callback])\n\
    ```\n\nThe callback that is used perhaps more than any other is `ModelCheckpoint`,\
    \ which saves a model at specified intervals during training or, if you set `save_best_only`\
    \ to True, saves the most accurate model. The next example trains a model for\
    \ 100 epochs and saves the one that exhibits the highest validation accuracy in\
    \ *best_model.h5*:\n\n```\nfrom tensorflow.keras.callbacks import ModelCheckpoint\n\
    \ncallback = ModelCheckpoint(filepath='best_model.h5', monitor='val_accuracy',\n\
    \                           save_best_only=True)\nmodel.fit(x, y, validation_split=0.2,\
    \ epochs=100, batch_size=20,\n          callbacks=[callback])\n```\n\nAnother\
    \ frequently used callback is `TensorBoard`, which logs a variety of information\
    \ to a specified location in the filesystem as a model is trained. The following\
    \ example logs to the *logs* subdirectory of the current directory:\n\n```\nfrom\
    \ tensorflow.keras.callbacks import TensorBoard\n\ncallback = TensorBoard(log_dir='logs',\
    \ histogram_freq=1)\nmodel.fit(x_train, y_train, validation_split=0.2, epochs=100,\
    \ batch_size=20,\n          callbacks=[callback])\n```\n\nYou can use a tool called\
    \ TensorBoard to monitor accuracy and loss, changes in the model’s weights and\
    \ biases, and more while training takes place or after it has completed. You can\
    \ launch TensorBoard from a Jupyter notebook and point it to the *logs* subdirectory\
    \ with a command like this one:\n\n```\n%tensorboard --logdir logs\n```\n\nOr\
    \ you can launch it from a command prompt by executing the same command without\
    \ the percent sign. Then point your browser to http://localhost:6006 to open the\
    \ TensorBoard console (Figure 9-5). “Get Started with TensorBoard” in the TensorFlow\
    \ documentation contains a helpful tutorial on the basics of TensorBoard. It’s\
    \ an indispensable tool in the hands of professionals, especially when training\
    \ complex models that require hours, days, or even weeks to fully train."
  mdcn: "差距并没有缩小多少（如果有的话），但有时以这种方式添加dropout *确实*会提高验证准确率。本例中的关键语句是 `model.add(Dropout(0.2))`，它添加了一个Dropout层，该层在每次反向传播过程中随机丢弃（忽略）隐藏层神经元与输出层神经元之间20%的连接。你可以更激进地丢弃更多连接——例如将0.2增加到0.4——但你也可能达到收益递减的临界点。请注意，如果你对dropout率设置得过于激进（例如0.5），你可能需要训练更多的轮次。让学习变得更困难也意味着学习需要更长的时间。\n\
    \n实际上，要知道dropout是否会提高模型的泛化能力，唯一的办法就是尝试它。除了尝试不同的dropout百分比，你还可以尝试在两个或更多层之间引入dropout，希望能找到一个有效的组合。\n\
    \n## 保存和加载模型\n\n在第7章中，你学习了如何序列化（保存）一个训练好的Scikit模型，并在客户端应用中加载它。同样的需求也适用于神经网络：你需要一种方法来保存训练好的网络，并在之后加载它以使其投入实用。\n\
    \n你可以使用Keras的 `get_weights` 方法从模型中获取权重和偏置，并使用 `set_weights` 来恢复它们。但要保存一个训练好的模型以便稍后重新创建它，还需要一个额外的步骤。具体来说，你必须保存网络架构：层数和类型、每层的神经元数量、每层使用的激活函数等等。幸运的是，所有这些只需要一行代码。这行代码根据你希望模型保存的两种格式之一而有所不同：\n\
    \n```\nmodel.save('my_model.h5') # 将模型保存为Keras的H5格式\nmodel.save('my_model')  \
    \   # 将模型保存为TensorFlow的原生格式\n```\n\n加载保存的模型同样简单：\n\n```\nfrom tensorflow.keras.models\
    \ import load_model\n\nmodel = load_model('my_model.h5') # 加载以H5格式保存的模型\nmodel\
    \ = load_model('my_model')     # 加载以TensorFlow格式保存的模型\n```\n\n将模型保存为H5格式会生成一个单独的.h5文件，其中封装了整个模型。将其保存为TensorFlow的原生格式，也称为\
    \ *SavedModel格式*，则会生成一系列包含序列化模型的文件和子目录。Google推荐使用后者，尽管Keras的H5格式仍然很常见。两者在功能上没有区别，但.h5文件只能由用Python编写的Keras应用读取，而以SavedModel格式保存的模型可以被其他框架加载。例如，用C#和Microsoft的ML.NET编写的应用程序可以加载以SavedModel格式保存的模型，无论模型是用哪种编程语言创建的。\n\
    \n> **注意**\n\nH5格式最初是为了让Keras模型能够以独立于所用后端深度学习框架的方式保存而设计的。Keras仍然有一个独立版本，支持除TensorFlow以外的后端（具体来说是CNTK和Theano），但这些框架已被弃用——它们不再被开发——并且除了在遗留模型中，现在很少使用。内置于TensorFlow的Keras版本*仅*支持TensorFlow后端。\n\
    \n一旦加载了保存的模型，它的行为与原始模型完全相同。例如，它所做的预测与原始模型所做的预测完全相同。你甚至可以通过向其输入额外的训练样本来进一步训练模型。这突显了神经网络与用Scikit构建的传统机器学习模型之间的一个主要区别。由于网络的状态由其权重和偏置定义，而加载模型会恢复权重和偏置，因此神经网络本质上支持增量训练，也称为\
    \ *持续学习*，从而可以随着时间的推移变得更聪明。大多数Scikit模型不支持这一点，因为序列化模型不会保存训练过程中积累的内部状态。\n\n总结一下：你可以向神经网络输入一百万个训练样本，保存它，加载它，然后再输入一百万个训练样本，网络会从上次中断的地方继续。结果与一开始就向网络输入200万个训练样本基本相同，除了由于训练中固有的随机性导致的微小差异。\n\
    \n## Keras回调\n\n当你训练一个神经网络并达到峰值验证准确率时，这个峰值很难捕捉。验证准确率在后续轮次中可能不会平稳地趋于稳定，而是可能下降或在峰值和谷值之间振荡。考虑到神经网络的随机（随机）特性，如果你标记达到最大验证准确率的轮次，并恰好训练那么多轮次，第二次你不会得到相同的结果。如何训练\
    \ *恰好* 正确的轮次以产生最佳（最准确）的网络呢？\n\n一个优雅的解决方案是Keras的 *回调API*，它允许你编写在训练过程中的不同点（例如，在每个轮次结束时）被调用的回调函数，并且这些函数有能力改变甚至停止训练过程。下面是一个例子，创建了一个名为StopCallback的子类，它继承自Keras的Callback类。该子类实现了on_epoch_end函数，该函数在每个训练轮次结束时被调用，如果验证准确率达到95%，则停止训练：\n\
    \n```\nfrom tensorflow.keras.callbacks import Callback\n\nclass StopCallback(Callback):\n\
    \    accuracy_threshold = None\n\n    def __init__(self, threshold):\n       \
    \ self.accuracy_threshold = threshold\n\n    def on_epoch_end(self, epoch, logs=None):\n\
    \        if (logs.get('val_accuracy') >= self.accuracy_threshold):\n         \
    \   self.model.stop_training = True\n\ncallback = StopCallback(0.95)\nmodel.fit(x,\
    \ y, validation_split=0.2, epochs=100, batch_size=20,\n          callbacks=[callback])\n\
    model.save('best_model.h5')\n```\n\n注意传递给StopCallback构造函数的验证准确率阈值（0.95）。对 *fit*\
    \ 的调用表面上训练网络100个轮次，但如果验证准确率在那之前达到0.95，训练就会立即停止。最后一条语句保存了达到该准确率的模型。\n\non_epoch_end是你可以在继承自Callback的类中实现的几个函数之一，以便在训练过程中达到预定检查点时接收回调。其他函数包括on_epoch_begin、on_train_begin、on_train_end、on_train_batch_begin和on_train_batch_end。你可以在Keras文档的“编写你自己的回调”中找到完整的列表和示例。\n\
    \n除了提供一个你可以用来创建自己的回调类的基类Callback之外，Keras还提供了几个自己的回调类。其中之一是EarlyStopping类，它允许你根据指定的标准（如验证准确率下降或训练损失增加）停止训练，而无需编写大量代码。在下面的例子中，如果验证准确率连续五个轮次没有提高（patience=5），训练就会提前停止。当训练停止时，网络的权重和偏置会自动恢复到验证准确率在最后五个轮次中达到峰值时的状态（restore_best_weights=True）：\n\
    \n```\nfrom tensorflow.keras.callbacks import EarlyStopping\n\ncallback = EarlyStopping(monitor='val_accuracy',\
    \ patience=5,\n                         restore_best_weights=True)\nmodel.fit(x,\
    \ y, validation_split=0.2, epochs=100, batch_size=20,\n          callbacks=[callback])\n\
    ```\n\n基于训练损失上升而非每个轮次结束时验证准确率下降来停止训练过程，只需要对代码进行微小的更改：\n\n```\nfrom tensorflow.keras.callbacks\
    \ import EarlyStopping\n\ncallback = EarlyStopping(monitor='loss', patience=5,\
    \ restore_best_weights=True)\nmodel.fit(x, y, validation_split=0.2, epochs=100,\
    \ batch_size=20,\n          callbacks=[callback])\n```\n\n使用频率可能超过任何其他回调的是 `ModelCheckpoint`，它在训练期间按指定间隔保存模型，或者如果你将\
    \ `save_best_only` 设置为True，则保存最准确的模型。下一个例子训练一个模型100个轮次，并将显示最高验证准确率的模型保存在 *best_model.h5*\
    \ 中：\n\n```\nfrom tensorflow.keras.callbacks import ModelCheckpoint\n\ncallback\
    \ = ModelCheckpoint(filepath='best_model.h5', monitor='val_accuracy',\n      \
    \                     save_best_only=True)\nmodel.fit(x, y, validation_split=0.2,\
    \ epochs=100, batch_size=20,\n          callbacks=[callback])\n```\n\n另一个常用的回调是\
    \ `TensorBoard`，它在模型训练时将各种信息记录到文件系统的指定位置。以下示例记录到当前目录的 *logs* 子目录：\n\n```\nfrom\
    \ tensorflow.keras.callbacks import TensorBoard\n\ncallback = TensorBoard(log_dir='logs',\
    \ histogram_freq=1)\nmodel.fit(x_train, y_train, validation_split=0.2, epochs=100,\
    \ batch_size=20,\n          callbacks=[callback])\n```\n\n你可以使用一个名为TensorBoard的工具来监控准确率和损失、模型权重和偏置的变化等，无论是在训练进行时还是训练完成后。你可以从Jupyter\
    \ notebook启动TensorBoard，并使用如下命令将其指向 *logs* 子目录：\n\n```\n%tensorboard --logdir\
    \ logs\n```\n\n或者你可以从命令提示符执行相同的命令（不带百分号）来启动它。然后将你的浏览器指向 http://localhost:6006\
    \ 以打开TensorBoard控制台（图9-5）。TensorFlow文档中的“TensorBoard入门”包含一个关于TensorBoard基础知识的有用教程。它是专业人士手中不可或缺的工具，尤其是在训练需要数小时、数天甚至数周才能完全训练好的复杂模型时。"

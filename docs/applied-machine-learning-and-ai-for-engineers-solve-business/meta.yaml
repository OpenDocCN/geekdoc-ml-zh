    # # YOLO


    While the R-CNN family of object detection systems delivers unparalleled accuracy,
    it leaves something to be desired when it comes to real-time object detection
    of the type required by, say, self-driving cars. A paper titled “You Only Look
    Once: Unified, Real-Time Object Detection” published in 2015 proposed an alternative
    to R-CNNs known as YOLO (You Only Look Once) that revolutionized the way engineers
    think about object detection. From the paper’s introduction:


    > > Humans glance at an image and instantly know what objects are in the image,
    where they are, and how they interact. The human visual system is fast and accurate,
    allowing us to perform complex tasks like driving with little conscious thought.
    Fast, accurate algorithms for object detection would allow computers to drive
    cars without specialized sensors, enable assistive devices to convey real-time
    scene information to human users, and unlock the potential for general purpose,
    responsive robotic systems.'

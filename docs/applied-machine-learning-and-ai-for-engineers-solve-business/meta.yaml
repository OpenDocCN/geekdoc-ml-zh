    \n假设你想构建一个系统来识别照片或视频帧中的人。也许它是 [限制大学宿舍进入权限](https://example.com) 的安全系统的一部分，只允许授权的学生和工作人员进入。或者你正在编写一个应用程序，在你的硬盘上搜索你认识的人的照片。（“给我看所有我和我女儿的照片。”）构建这样的系统需要能够执行以下操作的算法或模型：\n\

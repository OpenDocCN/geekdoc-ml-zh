    \ | 40.759662 | -73.987607 | 40.751247 | 1 |\n| 2011-03-14 22:43:00.000000995\
    \ | 4.9 | 2011-03-14 22:43:00+00:00 | -73.993552 | 40.731110 | -73.998497 | 40.737200\
    \ | 5 |\n| 2011-02-14 15:14:00.00000067 | 6.1 | 2011-02-14 15:14:00+00:00 | -73.972380\
    \ | 40.749527 | -73.990638 | 40.745328 | 1 |\n| 2009-10-29 11:29:00.00000040 |\
    \ 6.9 | 2009-10-29 11:29:00+00:00 | -73.973703 | 40.763542 | -73.984253 | 40.758603\
    \ | 5 |\n| 2011-07-02 10:38:00.00000028 | 10.5 | 2011-07-02 10:38:00+00:00 | -73.921262\
    \ | 40.743615 | -73.967383 | 40.765162 | 1 |\n\nEach row represents a taxi ride\
    \ and contains information such as the fare amount, the pickup and drop-off locations\
    \ (expressed as latitudes and longitudes), and the passenger count. It's the fare\
    \ amount that we want to predict. Use the following code to draw a histogram showing\
    \ how many rows contain a passenger count of 1, how many contain a passenger count\
    \ of 2, and so on:\n\n```python\n%matplotlib inline\nimport matplotlib.pyplot\
    \ as plt\nimport seaborn as sns\nsns.set()\n\nsns.countplot(x=df['passenger_count'])\n\
    ```\n\nHere is the output:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_56_0.png)\n\
    \nMost of the rows in the dataset have a passenger count of 1. Since we’re interested\
    \ in predicting the fare amount only for single passengers, use the following\
    \ code to remove all rows with multiple passengers and remove the key column from\
    \ the dataset since that column isn’t needed—in other words, it’s not one of the\
    \ features that we will try to predict on:\n\n```python\ndf = df[df['passenger_count']\
    \ == 1]\ndf = df.drop(['key', 'passenger_count'], axis=1)\ndf.head()\n```\n\n\
    That leaves 38,233 rows in the dataset, which you can see for yourself with the\
    \ following statement:\n\n```python\ndf.shape\n```\n\nNow use Pandas’ `corr` method\
    \ to find out how much influence input variables such as latitude and longitude\
    \ have on the values in the `fare_amount` column:\n\n```python\ncorr_matrix =\
    \ df.corr()\ncorr_matrix['fare_amount'].sort_values(ascending=False)\n```\n\n\
    The output looks like this:\n\n```\nfare_amount         1.000000\ndropoff_longitude\
    \   0.020438\npickup_longitude    0.015742\npickup_latitude    -0.015915\ndropoff_latitude\
    \   -0.021711\nName: fare_amount, dtype: float64\n```\n\nThe numbers don’t look\
    \ very encouraging. Latitudes and longitudes have little to do with fare amounts,\
    \ at least in their present form. And yet, intuitively, they should have *a lot*\
    \ to do with fare amounts since they specify starting and ending points, and longer\
    \ rides incur higher fares.\n\nNow comes the fun part: creating whole new columns\
    \ of data that have more impact on the outcome—columns whose values are computed\
    \ from values in other columns. Add columns specifying the day of the week (0=Monday,\
    \ 1=Sunday, and so on), the hour of the day that the passenger was picked up (0–23),\
    \ and the distance (by air, not on the street) in miles that the ride covered.\
    \ To compute distances, this code assumes that most rides are short and that it\
    \ is therefore safe to ignore the curvature of the Earth:\n\n```python\nfrom math\
    \ import sqrt\n\nfor i, row in df.iterrows():\n    dt = row['pickup_datetime']\n\
    \    df.at[i, 'day_of_week'] = dt.weekday()\n    df.at[i, 'pickup_time'] = dt.hour\n\
    \    x = (row['dropoff_longitude'] - row['pickup_longitude']) * 54.6\n    y =\
    \ (row['dropoff_latitude'] - row['pickup_latitude']) * 69.0\n    distance = sqrt(x**2\
    \ + y**2)\n    df.at[i, 'distance'] = distance\n\ndf.head()\n```\n\nYou no longer\
    \ need all the columns, so use these statements to remove the ones that won’t\
    \ be used:\n\n```python\ndf.drop(columns=['pickup_datetime', 'pickup_longitude',\
    \ 'pickup_latitude',\n                 'dropoff_longitude', 'dropoff_latitude'],\
    \ inplace=True)\ndf.head()\n```\n\nLet’s check the correlation again:\n\n```python\n\
    corr_matrix = df.corr()\ncorr_matrix['fare_amount'].sort_values(ascending=False)\n\
    ```\n\nThere still isn’t a strong correlation between distance traveled and fare\
    \ amount. Perhaps this will explain why:\n\n```python\ndf.describe()\n```\n\n\
    Here is the output:\n\n---\n\nyou. Cross-validating a model requires just one\
    \ line of code:\n\n```python\ncross_val_score(model, x, y, cv=5).mean()\n```\n\
    \nThe cross-validated score in this example should come out to about 0.61, which\
    \ lies between the two values generated by the model’s `score` method. It is a\
    \ more accurate measure of the model’s accuracy than either of the other scores.\n\
    \nYou don’t have to train a model before cross-validating it since `cross_val_score`\
    \ trains it for you. However, `cross_val_score` trains a *copy* of the model,\
    \ not the model itself, so once you’ve used cross-validation to gauge the model’s\
    \ accuracy, you still need to call `fit` before making predictions:\n\n```python\n\
    model.fit(x, y)\n```\n\nNote that you pass the entire dataset to `fit` rather\
    \ than a subset split off for training. That’s another benefit of cross-validation:\
    \ you train your model with *all* of the data, which is a big deal if the dataset\
    \ is small to begin with. There’s no longer a hard requirement to hold some of\
    \ it out for testing. However, even with cross-validation, it’s still useful to\
    \ score the model with data reserved exclusively for testing if such data is available.\
    \ Remember: *you don’t truly know how accurate a model is until you know how it\
    \ responds to data it wasn’t trained with*.\n\n> **TIP**\n\nAs a rule of thumb,\
    \ you should reserve cross-validation for small datasets and use train/test splits\
    \ for large datasets. The larger the dataset, the less sensitive it is to how\
    \ the data is split.\n\nWhich begs the question: precisely what does the value\
    \ returned when you score or cross-validate a model represent? For a regression\
    \ model, it’s the *coefficient of determination*, also known as the *R-squared*\
    \ score or simply *R²*. The coefficient of determination is usually a value from\
    \ 0 to 1 (“usually” because it can, in certain circumstances, go negative) which\
    \ quantifies the variance in the output that can be explained by the variables\
    \ in the input. A simple way to think of it is that an *R²* score of 0.8 means\
    \ that the model should, on average, be about 80% accurate in making predictions,\
    \ or get the answer right within 20%. The higher the *R²* score, the more accurate\
    \ the model. There are other ways to measure the accuracy of a regression model,\
    \ including mean squared error (MSE) and mean absolute error (MAE). Those numbers\
    \ are meaningful only in the context of the range of output values, whereas *R²*\
    \ gives you one simple number that is independent of range. You can read more\
    \ about regression metrics and methods for retrieving them in the [Scikit documentation](https://scikit-learn.org/stable/modules/model_evaluation.html).\n\
    \nThe value returned by a model’s `score` method is completely different for a\
    \ classification model. I will address the various ways to quantify the accuracy\
    \ of classification models in [Chapter 3](https://github.com/ageron/handson-ml2/blob/master/03_classification.ipynb)."

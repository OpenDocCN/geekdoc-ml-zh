    t-SNE does a better job of separating groups of digits into clusters, indicating
    there are patterns in the data that machine learning can exploit. The chief drawback
    is that t-SNE is compute intensive, which means it can take a prohibitively long
    time to run on large datasets. One way to mitigate that is to run t-SNE on a subset
    of rows rather than the entire dataset. Another strategy is to use PCA to reduce
    the number of dimensions, and then subject the PCAed dataset to t-SNE.


    # Anomaly Detection


    Anomaly detection is a branch of machine learning that seeks to identify anomalies
    in datasets or data streams. Airbus uses it to predict failures in jet engines
    and detect anomalies in telemetry data beamed down from the International Space
    Station. Credit card companies use it to detect credit card fraud. The goal of
    anomaly detection is to identify outliers in data—samples that aren’t “normal”
    when compared to others. In the case of credit card fraud, the assumption is that
    if transactions are subjected to an anomaly detection algorithm, fraudulent transactions
    will show up as anomalous, while legitimate transactions will not.


    There are many ways to perform anomaly detection. They go by names such as isolation
    forests, one-class SVMs, and local outlier factor (LOF). Most rely on unsupervised
    learning methods and therefore do not require labeled data. They simply look at
    a collection of samples and determine which ones are anomalous. Unsupervised anomaly
    detection is particularly interesting because it doesn’t require a priori knowledge
    of what constitutes an anomaly, nor does it require an unlabeled dataset to be
    meticulously labeled.


    One of the most popular forms of anomaly detection relies on principal component

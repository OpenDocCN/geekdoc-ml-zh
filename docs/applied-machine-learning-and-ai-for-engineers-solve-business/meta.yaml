    \    top_recs = recommendations[1:count + 1]\n\n    # 从 top_recs 中的索引生成标题列表\n\
    \    titles = []\n\n    for i in range(len(top_recs)):\n        title = df.iloc[top_recs[i][0]]['title']\n\
    \        titles.append(title)\n\n    return titles\n```\n\n此函数按降序对余弦相似度进行排序，以找出与标题参数指定的电影最相似的\
    \ count 部电影。然后返回这些电影的标题。\n\n现在使用 `get_recommendations` 在数据库中搜索相似的电影。首先请求与詹姆斯·邦德惊悚片《天幕坠落》最相似的10部电影：\n\
    \n```python\nget_recommendations('Skyfall', df, sim)\n```\n\n输出如下：\n\n```python\n\
    ['Spectre',\n 'Quantum of Solace',\n 'Johnny English Reborn',\n 'Clash of the\
    \ Titans',\n 'Die Another Day',\n 'Diamonds Are Forever',\n 'Wrath of the Titans',\n\

- img_proc: true
  md: 'do little more than generate random outputs. Once training is complete, the
    weights and biases enable the network to distinguish dogs from cats, translate
    a book review to another language, or do whatever else it was designed to do.


    What happens when a neural network is trained? At a high level, training samples
    are fed through the network, the error (the difference between the computed output
    and the correct output) is computed using a *loss function*, and a *backpropagation
    algorithm* goes backward through the network adjusting the weights and biases
    (Figure 8-6). This is done repeatedly until the error is sufficiently small. With
    each iteration, the weights and biases become incrementally more refined and the
    error commensurately smaller.


    ![](img/628b9a382d0944bbfa786c66bc651b50_173_0.png)


    The most critical component of the backpropagation regimen is the *optimizer*,
    which on each backward pass decides how much and in which direction, positive
    or negative, to adjust the weights and biases. Data scientists work constantly
    to find better and more efficient optimizers to train networks more accurately
    and in less time.


    Do a search on “neural networks” and you’ll turn up lots of articles with lots
    of complex math. Most of the math is related to optimization. An optimizer can’t
    just *guess* how to adjust the weights and biases due to their sheer numbers.
    A neural network containing two hidden layers with 1,000 neurons each has 1,000,000
    connections between layers, and therefore 1,000,000 weights to adjust. Training
    would take forever if the optimization strategy were simply randomly guessing.
    An optimizer must be intelligent enough to make adjustments that reduce the error
    in each successive iteration.


    Data scientists use plots like the one in Figure 8-7 to visualize what optimizers
    do. The plot is called a *loss landscape*. It has been reduced to three dimensions
    for visualization purposes, but in reality, it contains *many* dimensions—sometimes
    millions of them. The multicolored contour charts the error for different combinations
    of weights and biases. The optimizer’s goal is to navigate the contour and find
    the combination that produces the least error, which corresponds to the lowest
    point, or *global minimum*, in the loss landscape.'
  merge: -1
  pgno: 173
- img_proc: true
  md: '![](img/628b9a382d0944bbfa786c66bc651b50_174_0.png)


    Figure 8-7. Loss landscape (Source: Alexander Amini, Ava Soleimany, Sertac Karaman,
    and Daniela Rus, “Spatial Uncertainty Sampling for End-to-End Control,” NeurIPS
    Bayesian Deep Learning [2017], https://arxiv.org/pdf/1805.04829)


    The optimizer’s job isn’t an easy one. It involves partial derivatives (calculating
    the slope of the contour with respect to each weight and bias), gradient descent
    (adjusting the weights and biases to go *down* the slope rather than up it or
    sideways), and *learning rates*, which drive the fractional adjustments made to
    the weights and biases in each backpropagation pass. If the learning rate is too
    great, the optimizer might miss the global minimum. If it’s too small, the network
    will take a long time to train. Modern optimizers use *adaptive learning rates*
    that take smaller steps as they approach a minimum, where the slope of the contour
    is 0. To complicate matters, the optimizer must avoid getting trapped in local
    minima so that it can continue traversing the contour toward the global minimum
    where the error is the smallest. It also has to be wary of “saddle points” where
    the slope increases in one direction but falls off in a perpendicular direction.


    > **NOTE**


    If you research gradient descent, you’ll encounter terms such as *stochastic gradient
    descent (SGD)* and *mini-batch gradient descent (MBGD)*. Optimization via gradient
    descent is an iterative process in which samples are fed forward through the network,
    gradients are computed, and the gradients are combined with the learning rate
    to update weights and biases. Updating the weights and biases after every sample
    is fed forward through the network is computationally expensive, so training typically
    involves running batches of perhaps 30 to 40 samples through the network, averaging
    the error, and *then* performing a backpropagation pass. That’s MBGD. It speeds
    training and helps the optimizer bypass local minima. For more information, and
    for a very readable introduction to the challenges inherent to training neural
    networks, see the article “How Neural Networks Are Trained”.


    Neural networks are fundamentally simple. Training them is mathematically complex.
    Fortunately, you'

  mdcn: '# 面向工程师的应用机器学习与人工智能


    解决无法通过算法解决的商业问题


    杰夫·普罗西斯


    亚当·普罗西斯 作序


    # **《面向工程师的应用机器学习与人工智能》** 一书广受赞誉


    > 这本书是机器学习和AI算法的绝佳指南。它既简洁又全面，具体的示例和可运行的代码展示了如何将理论付诸实践。


    —马克·鲁西诺维奇，微软Azure首席技术官兼技术院士


    > 当杰夫·普罗西斯对某件事充满热情时（无论是技术、他心爱的黄颈亚马逊鹦鹉“鹰眼”，还是他组装和驾驶遥控喷气式飞机的爱好），你绝对值得倾听。他将这种热情与清晰的解释能力相结合，使他能够比任何我认识的人都更好地沟通和教授复杂主题。他带领你踏上个人学习和理解的旅程。现在，杰夫将这些技能带入当前持续不断的“技术海啸”（正如他所说）——机器学习和AI领域。在这本新书中，他从基础开始构建你的理解，始终强调直觉方法，并将概念和解决方案与现实世界联系起来。如果你想了解AI和ML在底层是如何真正工作的，以及这些技术是如何演变和发展的，请阅读这本书。


    —托德·芬，Atmosera首席战略官


    > 杰夫将多年从事AI/ML工作的知识提炼成一本实用且易于理解的指南，适合所有水平的从业者。


    —肯·穆斯，4次Azure MVP，GitHub高级DevOps架构师


    > 《面向工程师的应用机器学习与人工智能》正是我初次接触机器学习时希望拥有的那本书。对于ML新手工程师来说，它是一本极好的入门书；对于更有经验的人来说，它也是一本很棒的参考书。现在，它已成为我刷新和增强对各种ML技术及其适用性理解的首选资料。我喜欢杰夫使用真实世界的示例和数据集来演示每种工具集和方法。就像神经网络一样，我不知道杰夫是如何构思出这些材料的，但它同样非常有用。


    —布伦特·雷克特，亚马逊首席技术项目经理；Wise Owl Consulting, LLC、Wise Owl Aviation Services, LLC
    和 Rector Aviation Law PC 创始人


    > 我认识杰夫几十年了，他一直拥有清晰解释复杂概念的能力。在《面向工程师的应用机器学习与人工智能》中，他再次做到了这一点。示例、类比和彩色图表使得这些材料对于从初学者到更高级的读者来说都真正易于理解。


    —杰弗里·里克特，微软软件架构师


    > 这本书填补了工程师和科学家们的一个极其重要的空白，他们希望将AI的力量应用于最具挑战性的数据分析问题。它在技术深度和实际应用之间取得了恰到好处的平衡，提供了工具和许多实践示例，使读者能够在自己的应用领域（包括商业、科学和其他数据密集型领域）成为有效的AI实践者。


    —肖恩·S·格里森博士，橡树岭国家实验室网络弹性与情报主任


    > 《面向工程师的应用机器学习与人工智能》有望成为ML和AI爱好者的首选。这本书与众不同之处在于，在当今科技界快速采用机器学习的背景下，其问题陈述具有高度的相关性。无论是新手还是专业人士，都值得一读！


    —利皮·迪帕克希·帕特奈克，Zeta Suite软件开发工程师


    > 杰夫总是能够围绕深刻的技术概念编织精彩的故事，使学习变得显著更容易。这可能是他迄今为止最好的一本书，也可能是他最相关的主题。阅读这本书会让你想要去构建一些东西。


    —道格·特纳，微软Azure专家


    > 《面向工程师的应用机器学习与人工智能》是一本构建实用机器学习系统的实用手册。它提供了关于如何应用尖端AI算法解决当代商业问题的易懂指导。


    —布莱恩·斯皮尔林，Metis数据科学讲师


    > 这本书是工程师和软件开发人员进入机器学习领域的完美起点。它涵盖了ML的良好基础，并能让你快速上手解决各种由数据而非算法驱动的问题。


    —曼吉特·达希亚博士，Ecom Express副总裁兼AI与机器学习负责人


    > 无论你是应用ML的新手，还是寻求参考的资深开发者，这本书都是必备的、最新的、全面的指南，涵盖了所有主要类别的机器学习算法（并附有清晰的代码实现，以真正巩固你的理解）。


    —Goku Mohandas，Made With ML创始人


    > 《面向工程师的应用机器学习与人工智能》是AI/ML领域从初级到中级读者的绝佳入门读物。这本书从传统ML到深度学习构建了一个舒适的流程，并附带了在云端实现AI的宝贵补充，使其成为任何热心读者或专业从业者的完整端到端指南。


    —萨蒂亚斯·普拉文，劳伦斯伯克利国家实验室计算科学工程师


    > 杰夫·普罗西斯是我遇到过的最好的老师之一，无论平台如何（课堂、博客、杂志文章、网络研讨会、书籍等），他都有一种特殊的才能，能够将复杂主题变得易于我们其他人理解。在这本书中，杰夫不仅提供了对支撑机器学习的基本概念的清晰理解，还提供了易于遵循的示例，在当前环境中演示这些概念。他对机器学习领域的各种主题进行了出色的介绍/概述，并清晰地指导了如何（以及应该）使用每一个主题。杰夫是极少数能够将这个复杂主题转化为易于吸收和应用的形式的人之一。对于希望利用机器学习增强技能集的工程师和其他问题解决者来说，这本书是必读之作。


    —拉里·克莱门特，加州浸会大学计算、软件与数据科学助理教授，前系主任。曾任波音公司C-17项目高级工程师-科学家。


    > 《面向工程师的应用机器学习与人工智能》融入了作者杰夫·普罗西斯标志性的教学风格，这种风格多年来帮助了数千名开发者，它围绕复杂主题构建了上下文，并提供了易于理解的示例和教程。强烈推荐给希望将机器学习概念和技能纳入其技能库的工程师。


    —瓦尼·曼达瓦，华盛顿大学eScience研究所科学软件工程中心工程主管


    # 面向工程师的应用机器学习与人工智能


    解决无法通过算法解决的商业问题


    杰夫·普罗西斯


    亚当·普罗西斯 作序



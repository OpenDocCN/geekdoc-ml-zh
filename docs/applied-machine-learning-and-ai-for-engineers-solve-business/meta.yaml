    \ the values in the second, the data points appear to form a line. If you adjust\
    \ the scale of the axes to match the ranges of values in each column, you get\
    \ a completely different picture (Figure 5-10).\n\n![](img/628b9a382d0944bbfa786c66bc651b50_113_0.png)"

    # # Chapter 9. Neural Networks


    Machine learning isn’t hard when you have a properly engineered dataset to work
    with. The *reason* it’s not hard is libraries such as Scikit-Learn and ML.NET,
    which reduce complex learning algorithms to a few lines of code. Deep learning
    isn’t difficult either, thanks to libraries such as the [Microsoft Cognitive Toolkit
    (CNTK)](https://docs.microsoft.com/en-us/cognitive-toolkit/), [Theano](https://github.com/Theano/Theano),
    and [PyTorch](https://pytorch.org/). But the library that most of the world has
    settled on for building neural networks is [TensorFlow](https://www.tensorflow.org/),
    an open source framework created by Google that was released under the Apache
    License 2.0 in 2015.


    TensorFlow isn’t limited to building neural networks. It is a framework for performing
    fast mathematical operations at scale using *tensors*, which are generalized arrays.
    Tensors can represent scalar values (0-dimensional tensors), vectors (1D tensors),
    matrices (2D tensors), and so on. A neural network is basically a workflow for
    transforming tensors. The three-layer perceptron featured in [Chapter 8](https://github.com/dotnet/docs/blob/main/docs/machine-learning/tutorials/mlnet-cli.md)
    takes a 1D tensor containing two values as input, transforms it into a 1D tensor
    containing three values, and produces a 0D tensor as output. TensorFlow lets you
    define directed graphs that in turn define how tensors are computed. And unlike
    Scikit, it supports GPUs.


    The learning curve for TensorFlow is rather steep. Another library, named [Keras](https://keras.io/),
    provides a simplified Python interface to TensorFlow and has emerged as the Scikit
    of deep learning. Keras is all about neural networks. It began life as a standalone
    project in 2015 but was integrated into TensorFlow in 2019. Any code that you
    write using TensorFlow’s built-in Keras module ultimately executes in (and is
    optimized for) TensorFlow. Even Google recommends using the Keras API.


    Keras offers two APIs for building neural networks: a [sequential API](https://keras.io/guides/sequential_model/)
    and a [functional API](https://keras.io/guides/functional_api/). The former is
    simpler and is sufficient for most neural networks. The latter is useful in more
    advanced scenarios such as networks with multiple inputs or outputs—for example,
    a classification output and a regression output, which is common in neural networks
    that perform object detection—or shared layers. Most of the examples in this book
    use the sequential API. If curiosity compels you to learn more about the functional
    API, see [“How to Use the Keras Functional API for Deep Learning”](https://machinelearningmastery.com/keras-functional-api-deep-learning/)
    by Jason Brownlee for a very readable introduction.


    # ## Building Neural Networks with Keras and TensorFlow


    Creating a neural network using Keras’s sequential API is simple. You first create
    an instance of the [Sequential class](https://www.tensorflow.org/api_docs/python/tf/keras/Sequential).
    Then you call `add` on the `Sequential` object to add layers. The layers are instances
    of classes such as [Dense](https://www.tensorflow.org/api_docs/python/tf/keras/layers/Dense),
    which represents a fully connected layer with a specified number of neurons. The
    following statements create the three-layer network featured in [Chapter 8](https://github.com/dotnet/docs/blob/main/docs/machine-learning/tutorials/mlnet-cli.md):


    ```

    python

    from tensorflow.keras.models import Sequential

    from tensorflow.keras.layers import Dense


    model = Sequential()

    model.add(Dense(3, activation=''relu'', input_dim=2))

    model.add(Dense(1))

    ```'
  - '[PAGE 177]


    This network contains an input layer with two neurons, a hidden layer with three
    neurons, and an output layer with one neuron. Values passed from the hidden layer
    to the output layer are transformed by the rectified linear units (ReLU) activation
    function, which, you’ll recall, turns negative numbers into 0s and helps the model
    fit to nonlinear datasets. Observe that you don’t have to add the input layer
    explicitly. The `input_dim=2` parameter in the first hidden layer implicitly creates
    an input layer with two neurons.


    > **NOTE**


    `relu` is one of several activation functions included in Keras. Others include
    `tanh`, `sigmoid`, and `softmax`. You will rarely if ever use anything other than
    `relu` in the hidden layers. Later in this chapter, you’ll see why functions such
    as `sigmoid` and `softmax` are useful in the output layers of networks that perform
    classification rather than regression.


    Once all the layers are added, the next step is to call `compile` and specify
    important attributes such as which optimizer and loss function to use during training.
    Here’s an example:


    ```

    model.compile(optimizer=''adam'', loss=''mae'', metrics=[''mae''])

    ```


    Let’s walk through the parameters one at a time:


    `optimizer=''adam''`


    Tells Keras to use the Adam optimizer to adjust weights and biases in each backpropagation
    pass during training. Adam is one of eight optimizers built into Keras, and it
    is among the most advanced. It employs an adaptive learning rate and is always
    the one I start with in the absence of a compelling reason to do otherwise.


    `loss=''mae''`


    Tells Keras to use mean absolute error (MAE) to measure loss. This is common for
    neural networks intended to solve regression problems. Another frequently used
    option for regression models is `loss=''mse''` for mean squared error (MSE).


    `metrics=[''mae'']`


    Tells Keras to capture MAE values as the network is trained. This information
    is used after training is complete to judge the efficacy of the training.


    String values such as ''adam'' and ''mae'' are shortcuts for functions built into
    Keras. For example, `optimizer=''adam''` is equivalent to `optimizer=Adam()`.
    The longhand form is useful for calling the function with nondefault parameter
    values—for example, `optimizer=Adam(learning_rate=2e-5)` to create an Adam optimizer
    with a custom learning rate. You’ll see an example of this in Chapter 13 when
    we fine-tune a model by training it with a low learning rate.'
  - '[PAGE 178]


    Inside the compile method, Keras creates a TensorFlow object graph to speed execution.
    Once the network is compiled, you train it by calling `fit`:


    ```

    python

    hist = model.fit(x, y, epochs=100, batch_size=100, validation_split=0.2)

    ```


    The `fit` method accepts many parameters. Here are the ones used in this example:


    **x**


    The dataset’s feature columns.


    **y**


    The dataset’s label column—the one containing the values the network will attempt
    to predict.


    **epochs=100**


    Tells Keras to train the network for 100 iterations, or *epochs*. In each epoch,
    all of the training data passes through the network one time.


    **batch_size=100**


    Tells Keras to pass 100 training samples through the network before making a backpropagation
    pass to adjust the weights and biases. Training takes less time if the batch size
    is large, but accuracy could suffer. You typically experiment with different batch
    sizes to find the right balance between training time and accuracy. Do *not* assume
    that lowering the batch size will improve accuracy. It frequently does, but sometimes
    does not.


    **validation_split=0.2**


    Tells Keras that in each epoch, it should train with 80% of the rows in the dataset
    and validate the network’s accuracy with the remaining 20%. If you prefer, you
    can split the dataset yourself and use the `validation_data` parameter to pass
    the validation data to `fit`. Keras doesn’t offer an explicit function for splitting
    a dataset, but you can use Scikit’s `train_test_split` function to do it. One
    difference between `train_test_split` and `validation_split` is that the former
    splits the data randomly and includes an option for performing a stratified split.
    `validation_split`, by contrast, simply divides the dataset into two partitions
    and does not attempt to shuffle or stratify. Don’t use `validation_split` on ordered
    data without shuffling the data first.


    It might surprise you to learn that if you train the same network on the same
    dataset several times, the results will be different each time. By default, weights
    are initialized with random values, and different starting points produce different
    outcomes. Additional randomness baked into the training process means the network
    will train differently even if it’s initialized with the same random weights.

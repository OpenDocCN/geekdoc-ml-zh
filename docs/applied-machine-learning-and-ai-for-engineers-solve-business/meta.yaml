    # Handling Unknown Faces: Closed-Set Versus Open-Set Classification


    Now for some bad news. A VGGFace facial recognition model is adept at identifying
    faces it was trained with, but it doesn’t know what to do when it encounters a
    face it *wasn’t* trained with. Try it: pass in a photo of yourself. The model
    will probably identify you as Jeff, Lori, or Abby, and it might do so with a high
    level of confidence. It literally doesn’t know what it doesn’t know. This is especially
    true when the dataset is small and the network is given room to overfit.


    The reason why has nothing to do with VGGFace. It has everything to do with the
    fact that a neural network with a softmax output layer is a *closed-set classifier*,
    meaning it classifies any sample presented to it for predictions as one of the
    classes it was trained with. (Remember that softmax ensures that the sum of the
    probabilities for all classes is 1.0.) The alternative is an *open-set classifier*
    (Figure 11-8), which has the ability to say “this sample doesn’t belong to any
    of the classes I was trained with.”


    ![](img/628b9a382d0944bbfa786c66bc651b50_265_0.png)


    There is not a one-size-fits-all solution for building open-set classifiers in
    the deep-learning community today. A 2016 paper titled “Towards Open Set Deep
    Networks” proposed one solution in the form of *openmax* output layers, which
    replace softmax output layers and “estimate the probability of an input being
    from an unknown class.” Essentially, if the network is trained with 10 classes,
    the openmax output layer adds an 11th output representing the unknown class. It
    works by taking the activations from the final classification layer and adjusting
    them using a Weibull distribution rather than normalizing the probabilities as
    softmax does.


    Another potential solution was put forth in a 2018 paper titled “Reducing Network
    Agnostophobia” from researchers at the University of Colorado. It proposed replacing
    cross-entropy loss with a new loss function called *entropic open-set loss* that
    drives softmax scores for unknown classes toward a uniform probability distribution.
    Using this technique, you could more reliably detect samples belonging to an unknown
    class using probability thresholds paired with conventional softmax output layers.
    For a great summary of the problems posed by open-set classification in deep learning
    and an overview of openmax and entropic open-set loss, see “Does a Neural Network
    Know When It Doesn’t Know?” by Tivadar Danka.'
- md: 'Yet another solution is to use ArcFace to verify each face the model identifies
    by comparing an embedding generated from that face to a reference embedding for
    the same person. You could reject the model’s conclusion if cosine similarity
    falls below a predetermined threshold.


    A more naive approach is to prevent the network from learning the training data
    too well in hopes that unknown classes will yield lower softmax probabilities.
    That’s why I included just eight neurons in the classification layer in the previous
    example. (You could go even further by introducing a dropout layer.) It works
    up to a point, but it isn’t perfect. The `label_faces` function has a default
    prediction threshold of 0.9, meaning it labels a face only if the model classifies
    it with at least 90% confidence. You could set `prediction_threshold` to 0.99
    to rule out more unknown faces, but at the cost of failing to identify more known
    faces. Tuning in this manner to strike the right balance between recognizing known
    faces while ignoring unknowns is an inevitable part of readying a facial recognition
    model for production.


    ## Summary


    Building an end-to-end facial recognition system requires a means for detecting
    faces in photos as well as a means for classifying (identifying) those faces.
    One way to detect faces is the Viola-Jones algorithm, for which the OpenCV library
    provides a convenient implementation. An alternative that relies on deep learning
    is a multitask cascaded convolutional neural network, or MTCNN. The Python package
    named MTCNN contains a ready-to-use MTCNN implementation. Viola-Jones is faster
    and more suitable for real-time applications (for example, identifying faces in
    a live webcam feed), but MTCNNs are generally more accurate and incur fewer false
    positives.


    Deep learning can be applied to the task of facial recognition by employing convolutional
    neural networks. Transfer learning with a pretrained CNN such as ResNet50 can
    identify faces with a relatively high degree of accuracy, but transfer learning
    with a CNN that was trained with millions of facial images delivers unparalleled
    accuracy. The primary reason is that the CNN’s bottleneck layers are optimized
    for extracting features from facial images.


    With a highly optimized set of weights, a neural network can do almost anything.
    Generic weights will suffice when nothing better is available, but given a task-specific
    set of weights to start with, facial recognition via transfer learning can achieve
    human-like accuracy.


    ## Chapter 12. Object Detection


    The previous chapter introduced two popular algorithms for detecting faces in
    photographs: Viola-Jones, which relies on machine learning, and MTCNNs, which
    rely on deep learning. Face detection is a special case of *object detection*,
    in which computers detect and identify objects in images. Identifying an object
    is an image classification problem, something at which CNNs excel. But finding
    objects to identify poses a different challenge.


    Object detection is challenging because objects aren’t assumed to be perfectly
    cropped and aligned as they are for image classification tasks. Nor are they limited
    to one per image. Figure 12-1 shows what a self-driving car might see as it scans
    video frames from a forward-pointing camera. A CNN trained to do conventional
    image classification using carefully prepared training images is powerless to
    help. It might be able to classify the image as one of a city street, but it can’t
    determine that the image contains cars, people, and traffic lights, much less
    pinpoint their locations.


    Object detection has grown in speed and accuracy in recent years, and state-of-the-art
    methods rely on deep learning. In particular, they employ CNNs, which were introduced
    in Chapter 10. Let’s discuss how CNNs do object detection and identification and
    try our hand at it using cutting-edge object detection models.


    ![](img/628b9a382d0944bbfa786c66bc651b50_267_0.png)


    *Figure 12-1. Detecting and identifying objects in a scene*


    ### R-CNNs


    One way to apply deep learning to the task of object detection is to use *region-based
    CNNs*, also known as *region* CNNs or simply *R-CNNs*. The first R-CNN was introduced
    in a 2014 paper titled “Rich Feature Hierarchies for Accurate Object Detection
    and Semantic Segmentation”. The model described in the paper comprises three stages.
    The first stage scans the image and identifies up to 2,000 bounding boxes representing
    regions of interest—regions that *might* contain objects. The second stage is
    a deep CNN that extracts features from regions of interest. The third is a support
    vector machine that classifies the features. The output is a collection of bounding
    boxes with class labels and confidence scores. An algorithm called *non-maximum
    suppression* (NMS) filters the output and selects the best bounding box for each
    object.


    NMS is a crucial element of virtually all modern object detection systems. A detector
    invariably emits several bounding boxes for each object. If a photo contains one
    instance of a given class—for example, one zebra—NMS selects the bounding box
    with the highest confidence score. If the photo contains two zebras (Figure 12-2),
    NMS divides the bounding boxes into two groups and selects the box with the highest
    confidence score in each group. It groups boxes based on the amount of overlap
    between them. Overlap is computed by dividing the area of intersection between
    two boxes by the area formed by the union of the boxes. If the resulting *intersection-over-union*
    (IoU) score is greater than a predetermined threshold (typically 0.5), NMS assigns
    the boxes to the same group. Otherwise, it assigns them to separate groups.


    When two objects of the same class have little or no overlap, NMS easily separates
    the two. When two instances of the same class overlap significantly (picture one
    zebra standing behind the other), the IoU threshold might have to be adjusted
    to achieve separation. IoU threshold is a hyperparameter that can be tuned to
    strike the right balance between being overly aggressive at separating overlapping
    objects and not aggressive enough.


    ![](img/628b9a382d0944bbfa786c66bc651b50_268_0.png)


    The first stage of most R-CNN implementations uses an algorithm called *selective
    search* to identify regions of interest by keying on similarities in color, texture,
    shape, and size. Figure 12-3 shows the first 500 bounding boxes generated when
    OpenCV’s implementation of selective search examines an image. Submitting a targeted
    list of regions to the CNN is faster than a brute-force sliding-window approach
    that inputs the contents of the window to the CNN at every stop.


    ![](img/628b9a382d0944bbfa786c66bc651b50_269_0.png)


    Even with selective search narrowing the list of candidate regions input to stage
    2, an R-CNN can’t do object detection in real time. Why? Because the CNN individually
    processes the 2,000 or so regions of interest identified in stage 1. These regions
    invariably overlap, so the CNN processes the same pixels multiple times.


    A 2015 paper titled “Fast R-CNN” addressed this by proposing a modified architecture
    in which the entire image passes through the CNN one time (Figure 12-4). Selective
    search or a similar algorithm identifies regions of interest in the image, and
    those regions are projected onto the feature map generated by the CNN. A *region
    of interest (ROI) pooling layer* then uses a form of max pooling to reduce the
    features in each region of interest to a fixed-length vector, independent of the
    region’s size and shape. (By contrast, R-CNN scales each region to an image of
    predetermined size before submitting it to the CNN, which is substantially more
    expensive than ROI pooling.) Classification of the feature vectors is performed
    by fully connected layers rather than SVMs, and the output is split to include
    both a softmax classifier and a bounding-box regressor. NMS filters the bounding
    boxes down to the ones that matter. The result is a system that trains an order
    of magnitude faster than R-CNN, makes predictions two orders of magnitude faster,
    and is slightly more accurate than R-CNN.


    ![](img/628b9a382d0944bbfa786c66bc651b50_269_1.png)'
  mdcn: '另一种解决方案是使用ArcFace来验证模型识别的每张人脸，方法是将从该人脸生成的嵌入向量与同一人的参考嵌入向量进行比较。如果余弦相似度低于预定阈值，你可以拒绝模型的结论。


    一种更简单的方法是防止网络过度学习训练数据，希望未知类别会产生较低的softmax概率。这就是为什么我在前面的例子中只在分类层包含了八个神经元。（你可以更进一步，引入一个dropout层。）这种方法在一定程度上有效，但并不完美。`label_faces`函数有一个默认的预测阈值0.9，这意味着只有当模型以至少90%的置信度对人脸进行分类时，它才会标记该人脸。你可以将`prediction_threshold`设置为0.99以排除更多未知人脸，但代价是无法识别更多已知人脸。通过这种调整来在识别已知人脸和忽略未知人脸之间找到恰当的平衡，是为人脸识别模型投入生产所不可避免的一部分。


    ## 总结


    构建一个端到端的人脸识别系统，既需要检测照片中人脸的方法，也需要对这些人脸进行分类（识别）的方法。一种检测人脸的方法是Viola-Jones算法，OpenCV库为其提供了便捷的实现。另一种依赖深度学习的方法是多任务级联卷积神经网络，即MTCNN。名为MTCNN的Python包包含了一个现成的MTCNN实现。Viola-Jones更快，更适合实时应用（例如，在实时网络摄像头流中识别人脸），但MTCNN通常更准确，且产生的误报更少。


    深度学习可以通过使用卷积神经网络应用于人脸识别任务。使用预训练的CNN（如ResNet50）进行迁移学习可以以相对较高的准确度识别人脸，但使用在数百万张人脸图像上训练的CNN进行迁移学习则能提供无与伦比的准确度。主要原因是CNN的瓶颈层经过优化，专门用于从人脸图像中提取特征。


    拥有一组高度优化的权重，神经网络几乎可以做任何事情。当没有更好的选择时，通用权重就足够了，但如果有一组针对特定任务的权重作为起点，通过迁移学习进行人脸识别可以达到类似人类的准确度。


    ## 第12章 目标检测


    上一章介绍了两种流行的人脸检测算法：依赖机器学习的Viola-Jones和依赖深度学习的MTCNN。人脸检测是*目标检测*的一个特例，即计算机在图像中检测并识别物体。识别物体是一个图像分类问题，这是CNN擅长的领域。但找到需要识别的物体则带来了不同的挑战。


    目标检测具有挑战性，因为物体并不像图像分类任务中那样被假定为完美裁剪和对齐的。它们也不限于每张图像一个。图12-1展示了一辆自动驾驶汽车在扫描来自前向摄像头的视频帧时可能看到的内容。一个使用精心准备的训练图像进行传统图像分类训练的CNN对此无能为力。它或许能将图像分类为城市街道之一，但它无法确定图像中包含汽车、行人和交通信号灯，更不用说精确定位它们的位置了。


    近年来，目标检测在速度和准确度上都有所提升，最先进的方法依赖于深度学习。特别是，它们采用了第10章介绍的CNN。让我们讨论一下CNN如何进行目标检测和识别，并尝试使用前沿的目标检测模型来实践。


    ![](img/628b9a382d0944bbfa786c66bc651b50_267_0.png)


    *图12-1. 检测并识别场景中的物体*


    ### R-CNNs


    将深度学习应用于目标检测任务的一种方法是使用*基于区域的CNN*，也称为*区域*CNN或简称*R-CNN*。第一个R-CNN在2014年一篇题为“Rich
    Feature Hierarchies for Accurate Object Detection and Semantic Segmentation”的论文中提出。论文中描述的模型包含三个阶段。第一阶段扫描图像并识别多达2000个边界框，这些框代表感兴趣的区域——*可能*包含物体的区域。第二阶段是一个深度CNN，用于从感兴趣的区域提取特征。第三阶段是一个支持向量机，用于对特征进行分类。输出是一组带有类别标签和置信度分数的边界框。一种称为*非极大值抑制*（NMS）的算法对输出进行过滤，并为每个物体选择最佳的边界框。


    NMS是几乎所有现代目标检测系统的关键要素。检测器不可避免地会为每个物体输出多个边界框。如果一张照片包含一个给定类别的实例——例如一匹斑马——NMS会选择置信度分数最高的边界框。如果照片包含两匹斑马（图12-2），NMS会将边界框分成两组，并在每组中选择置信度分数最高的框。它根据框之间的重叠程度进行分组。重叠度通过将两个框的交集面积除以两个框的并集面积来计算。如果得到的*交并比*（IoU）分数大于预定阈值（通常为0.5），NMS会将这些框分配到同一组。否则，它会将它们分配到不同的组。


    当两个同类别的物体重叠很少或没有重叠时，NMS可以轻松地将它们分开。当两个同类别的实例显著重叠时（想象一匹斑马站在另一匹后面），可能需要调整IoU阈值以实现分离。IoU阈值是一个超参数，可以调整以在过度分离重叠物体和分离不足之间找到恰当的平衡。


    ![](img/628b9a382d0944bbfa786c66bc651b50_268_0.png)


    大多数R-CNN实现的第一阶段使用一种称为*选择性搜索*的算法，通过关注颜色、纹理、形状和大小的相似性来识别感兴趣的区域。图12-3显示了当OpenCV的选择性搜索实现检查一张图像时生成的前500个边界框。将目标区域列表提交给CNN比暴力滑动窗口方法更快，后者在每个位置都将窗口内容输入CNN。


    ![](img/628b9a382d0944bbfa786c66bc651b50_269_0.png)


    即使选择性搜索缩小了输入到第二阶段的候选区域列表，R-CNN也无法实时进行目标检测。为什么？因为CNN会单独处理第一阶段识别出的约2000个感兴趣的区域。这些区域不可避免地会重叠，因此CNN会多次处理相同的像素。


    2015年一篇题为“Fast R-CNN”的论文通过提出一种改进的架构解决了这个问题，其中整个图像只通过CNN一次（图12-4）。选择性搜索或类似算法在图像中识别感兴趣的区域，这些区域被投影到CNN生成的特征图上。然后，一个*感兴趣区域（ROI）池化层*使用一种最大池化形式，将每个感兴趣区域中的特征缩减为固定长度的向量，与区域的大小和形状无关。（相比之下，R-CNN在将每个区域提交给CNN之前，会将其缩放到预定大小的图像，这比ROI池化成本高得多。）特征向量的分类由全连接层而非SVM执行，输出被拆分为包含softmax分类器和边界框回归器。NMS过滤边界框，只保留重要的那些。结果是一个训练速度比R-CNN快一个数量级、预测速度快两个数量级，并且比R-CNN略准确的系统。


    ![](img/628b9a382d0944bbfa786c66bc651b50_269_1.png)'

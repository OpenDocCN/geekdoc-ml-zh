    # # Chapter 11. Face Detection and Recognition


    Not long ago, I boarded a flight to Europe and was surprised that I didn’t have
    to show my passport. I passed in front of a camera and was promptly welcomed aboard
    the flight. It was part of an early pilot for Delta Air Lines’ effort to [push
    forward with facial recognition](https://example.com) and offer a touchless curb-to-gate
    travel experience.


    Facial recognition is everywhere. It’s one of the most common, and sometimes controversial,
    applications for AI. Meta, formerly known as Facebook, uses it to tag friends
    in photos—at least it did until it [killed the feature due to privacy concerns](https://example.com).
    Apple uses it to [allow users to unlock their iPhones](https://example.com), while
    Microsoft uses it to unlock Windows PCs. Uber uses it to [confirm the identity
    of its drivers](https://example.com). Used properly, facial recognition has vast
    potential to make the world a better, safer, and more secure place.


    Suppose you want to build a system that identifies people in photos or video frames.
    Perhaps it’s part of a security system that [restricts access to college dorms](https://example.com)
    to students and staff who are authorized to enter. Or perhaps you’re writing an
    app that searches your hard disk for photos of people you know. (“Show me all
    the photos of me and my daughter.”) Building systems such as these requires algorithms
    or models capable of:


    +   - Finding faces in photos or video frames, a process known as *face detection*

    - Identifying the faces detected, a process known as *facial recognition* or *face
    identification*


    Numerous well-known algorithms exist for finding and identifying faces in photos.
    Some rely on deep learning—in particular, convolutional neural networks—while
    some do not. Facial recognition, after all, predated the explosion of deep learning
    by decades. But deep learning has supercharged the science of facial recognition
    and made it more practical than ever before.


    This chapter begins by introducing two popular face detection methods. Then it
    moves on to facial recognition and introduces transfer learning as a means for
    recognizing faces. It concludes with a tutorial in which you put the pieces together
    and build a facial recognition system of your own. Sound like fun? Then let’s
    get started.


    # ## Face Detection


    The sections that follow introduce two widely used algorithms for face detection—one
    that relies on machine learning and another that uses deep learning—as well as
    libraries that implement them. The goal is to be able to find all the faces in
    a photo or video frame like the one in [Figure 11-1](https://example.com). Afterward,
    I’ll present an easy-to-use function that you can call to extract all the facial
    images from a photo and save them to disk or submit them to a facial recognition
    model.'

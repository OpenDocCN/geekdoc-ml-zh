  - "[PAGE 158]\n\n```\ninput_name = session.get_inputs()[0].name\nlabel_name = session.get_outputs()[1].name\
    \ # 0 = predict, 1 = predict_proba\n\ninput = np.array('Great food and excellent\
    \ service!').reshape(1, -1)\nscore = session.run([label_name], { input_name: input\
    \ })[0][0][1]\nprint(score)\n```\n\nNote that the string input to the model is\
    \ passed as a NumPy array. The value returned from the run method reveals the\
    \ sentiment score returned by predict_proba. If you’d rather call predict to predict\
    \ a class, change session.get_outputs()[1].name to session.get_outputs()[0].name.\n\
    \n> **NOTE**\n\nIn real life, you wouldn’t load the model every time you call\
    \ it. You’d load it once, allow it to persist for the lifetime of the client,\
    \ and call it whenever you want to make a prediction.\n\nOf course, the whole\
    \ point of this discussion is to call the model from C# instead of Python. That’s\
    \ not difficult either, thanks to a NuGet package from Microsoft called Microsoft.ML.OnnxRuntime.\
    \ You can install it from the command line or using an integrated development\

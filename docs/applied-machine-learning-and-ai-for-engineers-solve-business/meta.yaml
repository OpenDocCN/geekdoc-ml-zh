  md: 'dimensional vector. More dimensions provide more fitting power, but also increase
    training time. In practice, $m$ is usually a number from 32 to 512.


    The vectors that represent individual words in an embedding layer are learned
    during training, just as the weights connecting neurons in adjacent dense layers
    are learned. If the number of training samples is sufficiently high, training
    the network usually creates effective vector representations of all the words.
    However, if you have only a few hundred training samples, the embedding layer
    might not have enough information to properly vectorize the corpus of text.


    In that case, you can elect to initialize the embedding layer with *pretrained
    word embeddings* rather than rely on it to learn the word embeddings on its own.
    Several popular pretrained word embeddings exist in the public domain, including
    the [GloVe word vectors](https://nlp.stanford.edu/projects/glove/) developed by
    Stanford and Google’s own [Word2Vec](https://code.google.com/archive/p/word2vec/).
    Pretrained embeddings tend to model semantic relationships between words, recognizing,
    for example, that *king* and *queen* are related terms while *stairs* and *zebra*
    are not. While that can be beneficial, a network trained to classify text usually
    performs better when word embeddings are learned from the training data because
    such embeddings are task specific. For an example showing how to use pretrained
    embeddings, see “Using Pre-trained Word Embeddings” by the author of Keras.


    # Text Classification


    Figure 13-1 shows the baseline architecture for a neural network that classifies
    text. Tokenized text sequences are input to the embedding layer. The output from
    the embedding layer is a 2D matrix of floating-point values measuring $m$ by $n$,
    where $m$ is the number of dimensions in the embedding space and $n$ is the sequence
    length. The Flatten layer following the embedding layer “flattens” the 2D output
    into a 1D array suitable for input to a dense layer, and the dense layer classifies
    the values emitted from the flatten layer. You can experiment with different dimensions
    in the embedding layer and different widths of the dense layer to maximize accuracy.
    You can also add more dense layers if needed.


    ![](img/628b9a382d0944bbfa786c66bc651b50_298_0.png)


    A neural network like the one in Figure 13-1 can be implemented this way:


    ```

    python

    from tensorflow.keras.models import Sequential

    from tensorflow.keras.layers import Dense, Flatten, Embedding


    model = Sequential()

    model.add(Embedding(10000, 32, input_length=100))

    ```'

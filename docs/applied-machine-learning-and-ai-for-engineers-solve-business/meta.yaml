    \ took a walk in the park”中，单词*park*的含义与“Where did you park the car?”中的不同。嵌入层为*park*存储一个向量表示，但在Transformer模型中，MHA层会修改嵌入层的向量输出，使得*park*在两个句子中由两个不同的向量表示。毫不奇怪，用于使嵌入向量感知上下文的值是在训练过程中学习到的。\n\
    \n> **注意**\n\n自注意力是如何工作的？其要点是MHA层使用点积来计算序列中每对词语的相似度得分。在对得分进行归一化后，它使用这些得分来计算序列中每个词语嵌入的加权版本。然后，它再次使用训练过程中学习到的权重对其进行修改。\n\
    \n*多头注意力*中的“多”表示MHA层学习的是多组权重，而不仅仅是一组，这与CNN中的卷积层类似。这使得MHA能够辨别长序列中的上下文，在这些序列中，词语之间可能存在多种关系。\n\
    \nMHA还提供了关于指代其他词语的词语的额外上下文。嵌入层用单个向量表示代词*it*，但MHA层帮助模型理解，在句子“I love my car because\
    \ it is fast”中，*it*指代的是汽车。它还为单词*fast*增加了权重，因为它对句子的含义至关重要。没有它，就不清楚你*为什么*喜欢你的车。\n\
    \n与LSTM层不同，MHA层对输入序列中词语之间关系建模的能力与序列长度无关。MHA层还支持并行工作负载，因此在多个GPU上训练速度更快。然而，它们不编码关于短语中词语位置的信息。为了补偿这一点，Transformer使用简单的向量加法，将表示词语在序列中位置的信息添加到嵌入层的每个向量输出中。这被称为*位置编码*或*位置嵌入*。它在[图13-5](Figure\

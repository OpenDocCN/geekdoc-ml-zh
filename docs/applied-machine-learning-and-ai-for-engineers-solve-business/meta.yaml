    \n## 余弦相似度\n\n**余弦相似度**是一种计算向量对（或被视为向量的数字行）之间相似度的数学方法。其基本思想是：取样本中的每个值——例如，向量化文本中一行的词频——并将其用作向量的端点坐标，另一个端点位于坐标系的原点。对两个样本都这样做，然后计算*m*维空间中向量之间的余弦值，其中*m*是每个样本中的值的数量。因为0度的余弦值是1，所以两个完全相同的向量的相似度为1。向量越不相似，余弦值就越接近0。\n\
    \n这里有一个二维空间的例子来说明。假设你有三行，每行包含两个值：\n\n| 1 | 2 |\n|---|---|\n| 2 | 3 |\n| 3 | 1\
    \ |\n\n你想确定第2行与第1行还是第3行更相似。仅凭数字很难判断，而在现实生活中，数字要*多得多*。如果你简单地将每行的数字相加并比较总和，你会得出第2行与第3行更相似的结论。但如果你将每行视为一个向量，如**图4-2**所示呢？\n\
    \n- 第1行：(0, 0) → (1, 2)\n- 第2行：(0, 0) → (2, 3)\n- 第3行：(0, 0) → (3, 1)\n\n![](img/628b9a382d0944bbfa786c66bc651b50_100_0.png)\n\
    \n现在你可以将每一行绘制为一个向量，计算1和2之间以及2和3之间形成的角度的余弦值，并确定第2行更像第1行而不是第3行。这就是余弦相似度的精髓。\n\n\
    余弦相似度不限于二维；它在高维空间中同样适用。为了帮助计算任意维度的余弦相似度，Scikit 提供了 `cosine_similarity` 函数。以下代码计算了前面示例中三个样本的余弦相似度：\n\
    \n```python\ndata = [[1, 2], [2, 3], [3, 1]]\ncosine_similarity(data)\n```\n\n\
    返回值是一个*相似度矩阵*，包含每对向量的余弦值。矩阵的宽度和高度等于样本数量：\n\n```python\narray([[1.        , 0.99227788,\
    \ 0.70710678],\n       [0.99227788, 1.        , 0.78935222],\n       [0.70710678,\
    \ 0.78935222, 1.        ]])\n```\n\n由此可以看出，第1行和第2行的相似度是0.992，而第2行和第3行的相似度是0.789。换句话说，第2行与第1行比与第3行更相似。第2行和第3行之间的相似度（0.789）也高于第1行和第3行之间的相似度（0.707）。\n\
    \n## 构建电影推荐系统\n\n让我们将余弦相似度付诸实践，为电影构建一个基于内容的推荐系统。首先[下载数据集](https://www.kaggle.com)，这是\
    \ Kaggle.com 上提供的几个电影数据集之一。这个数据集包含约4,800部电影的信息，包括标题、预算、类型、关键词、演员阵容等。将 CSV 文件放入你的\
    \ Jupyter notebooks 的 *Data* 子目录中。然后加载数据集并浏览其内容：\n\n```python\nimport pandas as\
    \ pd\n\ndf = pd.read_csv('Data/movies.csv')\ndf.head()\n```\n\n该数据集包含24列，其中只有少数几列用于描述电影。使用以下语句提取关键列，如\
    \ `title` 和 `genres`，并用空字符串填充缺失值：\n\n```python\ndf = df[['title', 'genres', 'keywords',\
    \ 'cast', 'director']]\ndf = df.fillna('') # 用空字符串填充缺失值\ndf.head()\n```\n\n接下来，添加一个名为\
    \ `features` 的列，该列组合了其他列中的所有单词：\n\n```python\ndf['features'] = df['title'] + '\
    \ ' + df['genres'] + ' ' + \\\n                  df['keywords'] + ' ' + df['cast']\
    \ + ' ' + \\\n                  df['director']\n```\n\n使用 CountVectorizer 对 `features`\
    \ 列中的文本进行向量化：\n\n```python\nfrom sklearn.feature_extraction.text import CountVectorizer\n\
    \nvectorizer = CountVectorizer(stop_words='english', min_df=20)\nword_matrix =\
    \ vectorizer.fit_transform(df['features'])\nword_matrix.shape\n```\n\n词频表包含4,803行——每部电影一行——和918列。下一个任务是计算每对行之间的余弦相似度：\n\
    \n```python\nfrom sklearn.metrics.pairwise import cosine_similarity\n\nsim = cosine_similarity(word_matrix)\n\
    ```\n\n最终，这个系统的目标是输入一个电影标题，并找出与该电影最相似的$n$部电影。为此，定义一个名为 `get_recommendations` 的函数，它接受一个电影标题、一个包含所有电影信息的\
    \ DataFrame、一个相似度矩阵以及要返回的电影标题数量：\n\n```python\ndef get_recommendations(title,\
    \ df, sim, count=10):\n    # 在 DataFrame 中获取指定标题的行索引\n    index = df.index[df['title'].str.lower()\

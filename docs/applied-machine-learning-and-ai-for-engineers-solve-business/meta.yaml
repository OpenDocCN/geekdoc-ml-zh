    \n```python\nmodel = SVC(kernel='poly', degree=2)\nmodel.fit(x, y)\n```\n\n如果你将此应用于前面的圆形数据集并绘制决策边界（图5-6，右），结果与RBF核函数生成的结果几乎相同。有趣的是，1次多项式核函数（图5-6，左）产生的决策边界与线性核函数相同，因为直线本身就是一次多项式。\n\
    核技巧是特殊的。每一种核技巧都旨在模拟特定的向高维空间的投影。Scikit为你提供了几种可用的核函数，但也有一些Scikit未内置的核函数。你可以用自定义的核函数扩展Scikit，但它提供的核函数对于绝大多数用例来说已经足够。\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_109_0.png)\n\n## 超参数调优\n\n一开始，很难知道哪种内置核函数能产生最精确的模型。同样也很难知道C的合适值是多少——即那个能在训练数据的欠拟合和过拟合之间提供最佳平衡，并在模型使用测试数据运行时产生最佳结果的值。对于RBF和多项式核函数，还有第三个影响准确性的值，称为gamma。而对于多项式核函数，degree参数会影响模型从训练数据中学习的能力。\n\
    C参数控制模型拟合训练数据的激进程度。值越高，拟合越紧密，过拟合的风险也越高。图5-7展示了RBF核函数在不同C值下如何将模型拟合到包含三个类别的训练数据集。Scikit中的默认值是C=1，但你可以指定不同的值来调整拟合。你可以在右下角的图中看到过拟合的危险。一个位于最右侧的点会被分类为蓝色，即使它可能属于黄色或棕色类别。欠拟合也是一个问题。在左上角的示例中，几乎任何非棕色的数据点都会被分类为蓝色。\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_110_0.png)\n\n使用RBF核函数的SVM只有在`gamma`值也正确时才算得到了适当的调优。`gamma`控制单个数据点的影响范围在计算决策边界时能延伸多远。较低的值使用更多的点，产生更平滑的决策边界；较高的值涉及更少的点，并且更紧密地拟合训练数据。图5-8说明了这一点，其中在保持C不变的情况下增加`gamma`，会使决策边界更紧密地围绕类别簇。`gamma`可以是任何非零正值，但0到1之间的值最为常见。Scikit不会硬编码`gamma`的默认值，如果你没有指定，它会通过算法选择一个默认值。\n\
    \n在实践中，数据科学家会尝试不同的核函数和不同的参数值，以找到能产生最精确模型的组合，这个过程被称为*超参数调优*。超参数调优的效用并非SVM独有，但你几乎总是可以通过找到核类型、C和`gamma`（对于多项式核函数，还包括degree）的最佳组合来使SVM更精确。\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_111_0.png)\n\n为了辅助超参数调优过程，Scikit提供了一系列优化器，其中包括GridSearchCV，它尝试指定参数值的所有组合，并使用内置的交叉验证来确定哪种组合能产生最精确的模型。这些优化器使你不必编写代码来使用所有唯一的参数值组合进行暴力搜索。需要明确的是，它们本身通过多次训练模型来进行暴力搜索，每次使用不同的值组合。最后，你可以从`best_estimator_`属性中检索最精确的模型，从`best_params_`属性中获取产生最精确模型的参数值，以及从`best_score_`属性中获取最佳分数。\n\
    \n这是一个使用Scikit的SVC类实现SVM分类器的示例。首先，你可以用两行代码创建一个使用默认参数值的SVM分类器并将其拟合到数据集：\n\n```python\n\
    model = SVC()\nmodel.fit(x, y)\n```\n\n这使用了RBF核函数，C=1。你可以这样指定核类型以及C和gamma的值：\n\
    \n```python\nmodel = SVC(kernel='poly', C=10, gamma=0.1)\nmodel.fit(x, y)\n```\n\
    \n假设你想尝试两种不同的核函数，以及C和gamma各五个值，看看哪种组合能产生最佳结果。与其编写嵌套的for循环，你可以这样做：\n\n```python\n\
    model = SVC()\n\ngrid = {\n    'C': [0.01, 0.1, 1, 10, 100],\n    'gamma': [0.01,\
    \ 0.25, 0.5, 0.75, 1.0],\n    'kernel': ['rbf', 'poly']\n}\n\ngrid_search = GridSearchCV(estimator=model,\
    \ param_grid=grid, cv=5, verbose=2)\ngrid_search.fit(x, y) # 使用不同的参数组合训练模型\n```\n\
    \n调用`fit`后不会立即返回结果。它会训练模型*250次*，因为有50种不同的核、C和gamma组合，而cv=5表示使用五折交叉验证来评估结果。训练完成后，你可以这样检索最佳模型：\n\
    \n```python\nbest_model = grid_search.best_estimator_\n```\n\n多次运行这样的搜索过程并不罕见——第一次使用较粗的参数值，之后每次使用以`best_params_`获得的值为中心的更窄的值范围。前期更多的训练时间是获得精确模型所付出的代价。重申一下，你几乎总是可以通过找到参数的最佳组合来使SVM更精确。无论好坏，暴力搜索是识别最佳组合最有效的方法。\n\
    \n> **注意**\n\n关于SVC类，需要注意的一个细微之处是它默认不计算概率。如果你想在SVC实例上调用`predict_proba`，必须在创建实例时将`probability`设置为True：\n\
    \n```python\nmodel = SVC(probability=True)\n```\n\n模型训练会变慢，但你将能够获取概率以及预测结果。此外，Scikit文档警告说“`predict_proba`可能与`predict`不一致”。更多信息，请参阅[文档中的第1.4.1.2节](https://scikit-learn.org/stable/modules/svm.html#scores-and-probabilities)。\n\
    \n## 数据归一化\n\n在[第2章](https://example.com)中，我提到过一些学习算法在归一化数据上表现更好。未归一化的数据包含范围差异巨大的数字列——例如，一列的值从0到1，另一列从0到1,000,000。SVM是一种参数学习算法。使用归一化数据进行训练很重要，因为SVM使用距离来计算间隔。如果一个维度的跨度*远大于*另一个维度，用于寻找最大间隔的内部算法可能难以收敛到一个解。\n\
    \n使用归一化数据训练机器学习模型的重要性不仅限于SVM。决策树以及依赖于决策树的学习算法，如随机森林和梯度提升决策树，是非参数的，因此它们在归一化和未归一化数据上同样有效。然而，它们是例外。大多数其他学习算法在不同程度上受益于归一化数据。这包括*k*近邻算法，尽管它是非参数的，但内部使用基于距离的计算来区分不同类别。\n\
    \nScikit提供了几个用于数据归一化的类。最常用的是`MinMaxScaler`和`StandardScaler`。前者通过按比例将每列的值缩减到0.0到1.0之间的值来归一化数据。从数学上讲，这很简单。对于数据集中的每一列，`MinMaxScaler`从该列的所有值中减去该列的最小值，然后将每个值除以最小值和最大值之间的差值。在结果列中，最小值为0.0，最大值为1.0。\n\
    \n为了演示，我从Scikit内置的乳腺癌数据集中提取了两个范围差异巨大的列的子集。每列包含100个值。以下是前10行：\n\n```\n[[1.001e+03\
    \ 3.001e-01]\n [1.326e+03 8.690e-02]\n [1.203e+03 1.974e-01]\n [3.861e+02 2.414e-01]\n\
    \ [1.297e+03 1.980e-01]\n [4.771e+02 1.578e-01]\n [1.040e+03 1.127e-01]\n [5.779e+02\
    \ 9.366e-02]\n [5.198e+02 1.859e-01]\n [4.759e+02 2.273e-01]]\n```\n\n第一列的值范围从201.9到1,878.0；第二列的值范围从0.000692到0.3754。图5-9显示了当x轴和y轴等比例缩放时数据的外观。由于第一列的值远大于第二列的值，数据点似乎形成了一条直线。如果你调整坐标轴的比例以匹配每列的值范围，你会得到一个完全不同的图像（图5-10）。\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_113_0.png)"

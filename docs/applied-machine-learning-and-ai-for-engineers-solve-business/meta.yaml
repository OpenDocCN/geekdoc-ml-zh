    Figure 1-5. Relationship between machine learning, deep learning, and AI


    # A BRIEF HISTORY OF AI


    ML and AI have surged in popularity in recent years. AI was a big deal in the
    1980s, when it was widely believed that computers would soon be able to mimic
    the human mind. But excitement waned, and for decades—up until 2010 or so—AI rarely
    made the news. Then a strange thing happened.


    Thanks to the availability of [graphics processing units (GPUs)](https://example.com)
    from companies such as NVIDIA, researchers finally had the horsepower they needed
    to train advanced neural networks. This led to advancements in the state of the
    art, which led to renewed enthusiasm, which led to additional funding, which precipitated
    further advancements, and suddenly AI was a thing again. Neural networks have
    been around (at least in theory) since the 1950s, but researchers lacked the computational
    power to train them on large datasets. Today anyone can buy a GPU or spin up a
    GPU cluster in the cloud. AI is advancing more rapidly now than ever before, and
    with that progress comes the ability to do things in software that engineers could
    only have dreamed about as recently as a decade ago.


    Over time, data scientists have devised special types of neural networks that
    excel at certain tasks,'

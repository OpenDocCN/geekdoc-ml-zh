    # Filtering Noise


    One very practical use for PCA is to filter noise from data. *Noise* is data that
    is random, corrupt, or otherwise meaningless, and it’s particularly likely to
    occur when the data comes from physical devices such as pressure sensors or accelerometers.
    The basic approach to using PCA for noise reduction is to PCA-transform the data
    and then invert the transform, reducing the dataset from *m* dimensions to *n*
    and then restoring it to *m*. Because PCA discards the least important information
    when reducing dimensions and noise tends to have little or no informational value,
    this ideally eliminates much of the noise while retaining most of the meaningful
    data.


    You can test this supposition with the LFW dataset. Use the following statements
    to add noise to the facial images using a random-number generator and plot the
    first 24 images:


    ```

    %matplotlib inline

    import matplotlib.pyplot as plt

    ```'

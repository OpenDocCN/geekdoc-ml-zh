    \nPCA并非将数据集降至二维或三维进行绘图的唯一方法。你也可以使用Scikit的Isomap类或TSNE类。TSNE实现了t-分布随机邻域嵌入，简称t-SNE。t-SNE是一种降维算法，几乎专门用于可视化高维数据。PCA使用线性函数转换数据，而t-SNE使用非线性转换，通过在低维空间中保持相似数据点靠近来增强类别间的分离度。（相比之下，PCA侧重于保持不相似的点远离。）以下是使用t-SNE将数据集降至二维后绘制数字数据集的示例：\n\
    \n```python\n%matplotlib inline\nfrom sklearn.manifold import TSNE\n\ndigits =\
    \ load_digits()\ntsne = TSNE(n_components=2, init='pca', learning_rate='auto',\n\
    \            random_state=0)\ntsne_digits = tsne.fit_transform(digits.data)\n\n\
    plt.figure(figsize=(12, 8))\nplt.scatter(tsne_digits[:, 0], tsne_digits[:, 1],\
    \ c=digits.target,\n            cmap=plt.cm.get_cmap('Paired', 10))\nplt.colorbar(ticks=range(10))\n\
    plt.clim(-0.5, 9.5)\n```\n\n输出结果如下：\n\n![](img/628b9a382d0944bbfa786c66bc651b50_138_0.png)\n\
    \nt-SNE在将数字分组为簇方面做得更好，表明数据中存在机器学习可以利用的模式。主要缺点是t-SNE计算密集，这意味着在大型数据集上运行可能耗时过长。一种缓解方法是在数据行的子集上运行t-SNE，而不是整个数据集。另一种策略是先使用PCA降低维度，然后对PCA处理后的数据集应用t-SNE。\n\
    \n## 异常检测\n\n异常检测是机器学习的一个分支，旨在识别数据集或数据流中的异常。空客公司用它来预测喷气发动机故障，并检测从国际空间站传回的遥测数据中的异常。信用卡公司用它来检测信用卡欺诈。异常检测的目标是识别数据中的异常值——与其他样本相比“不正常”的样本。在信用卡欺诈的情况下，假设是如果交易经过异常检测算法处理，欺诈性交易将显示为异常，而合法交易则不会。\n\
    \n执行异常检测的方法有很多。它们被称为隔离森林、单类SVM和局部异常因子等。大多数依赖于无监督学习方法，因此不需要标记数据。它们只需查看一组样本，并确定哪些是异常的。无监督异常检测特别有趣，因为它不需要事先知道什么构成异常，也不需要对未标记的数据集进行细致标记。\n\
    \n最流行的异常检测形式之一依赖于主成分分析。你已经知道PCA可以用于将数据从m维降至n维，并且PCA转换可以反转以恢复原始的m维。你还知道反转转换并不能恢复应用转换时丢失的数据。基于PCA的异常检测的要点是，异常样本应该比正常样本表现出更多的损失或*重建误差*（原始数据与应用PCA转换并反转后的相同数据之间的差异）。换句话说，异常样本经过PCA处理和反转后产生的损失应高于对正常样本应用相同操作产生的损失。让我们看看这个假设在现实世界中是否成立。\n\
    \n## 使用PCA检测信用卡欺诈\n\n监督学习并非检测信用卡欺诈的唯一选择。以下是使用基于PCA的异常检测来识别欺诈交易的替代方法。首先加载数据集，按类别将样本分为代表合法交易的数据集和代表欺诈交易的数据集，并删除Time和Class列。如果你在第3章没有下载数据集，现在可以从ZIP文件中获取。\n\
    \n```python\nimport pandas as pd\n\ndf = pd.read_csv('Data/creditcard.csv')\n\
    df.head()\n\n# 按类别分离样本\nlegit = df[df['Class'] == 0]\nfraud = df[df['Class'] ==\
    \ 1]\n\n# 删除\"Time\"和\"Class\"列\nlegit = legit.drop(['Time', 'Class'], axis=1)\n\
    fraud = fraud.drop(['Time', 'Class'], axis=1)\n```\n\n使用PCA将两个数据集从29维降至26维，然后反转转换以将每个数据集恢复到29维。转换仅针对合法交易进行拟合，因为我们需要一个重建误差的基线值，以便区分合法和欺诈交易。然而，它被应用于两个数据集：\n\
    \n```python\nfrom sklearn.decomposition import PCA\n\npca = PCA(n_components=26,\
    \ random_state=0)\nlegit_pca = pd.DataFrame(pca.fit_transform(legit), index=legit.index)\n\
    fraud_pca = pd.DataFrame(pca.transform(fraud), index=fraud.index)\n\nlegit_restored\
    \ = pd.DataFrame(pca.inverse_transform(legit_pca),\n                         \
    \     index=legit_pca.index)\n\nfraud_restored = pd.DataFrame(pca.inverse_transform(fraud_pca),\n\
    \                              index=fraud_pca.index)\n```\n\n在过渡过程中丢失了一些信息。希望欺诈交易比合法交易产生了更多的损失，我们可以利用这一点来区分它们。下一步是通过计算原始行和恢复行中值之间差的平方和，来计算两个数据集中每一行的损失：\n\
    \n```python\nimport numpy as np\n\ndef get_anomaly_scores(df_original, df_restored):\n\
    \    loss = np.sum((np.array(df_original) - np.array(df_restored)) ** 2, axis=1)\n\
    \    loss = pd.Series(data=loss, index=df_original.index)\n    return loss\n\n\
    legit_scores = get_anomaly_scores(legit, legit_restored)\nfraud_scores = get_anomaly_scores(fraud,\
    \ fraud_restored)\n```\n\n现在绘制合法交易转换和恢复时产生的损失：\n\n```python\n%matplotlib inline\n\
    import matplotlib.pyplot as plt\nimport seaborn as sns\nsns.set()\n\nlegit_scores.plot(figsize\
    \ = (12, 6))\n```\n\n结果如下：\n\n![](img/628b9a382d0944bbfa786c66bc651b50_140_0.png)\n\
    \n接下来，绘制欺诈交易的损失：\n\n```python\nfraud_scores.plot(figsize = (12, 6))\n```\n\n结果如下：\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_141_0.png)\n\n图表显示，代表合法交易的数据集中，大多数行的损失小于200，而代表欺诈交易的数据集中，许多行的损失大于200。根据这一点分离行——将损失小于200的交易分类为合法，损失更高的交易分类为欺诈——并使用混淆矩阵可视化结果：\n\
    \n```python\nthreshold = 200\n\ntrue_neg = legit_scores[legit_scores < threshold].count()\n\
    false_pos = legit_scores[legit_scores >= threshold].count()\ntrue_pos = fraud_scores[fraud_scores\
    \ >= threshold].count()\nfalse_neg = fraud_scores[fraud_scores < threshold].count()\n\
    \nlabels = ['Legitimate', 'Fraudulent']\nmat = [[true_neg, false_pos], [false_neg,\
    \ true_pos]]\n\nsns.heatmap(mat, square=True, annot=True, fmt='d', cbar=False,\
    \ cmap='Blues',\n            xticklabels=labels, yticklabels=labels)\n\nplt.xlabel('Predicted\
    \ label')\nplt.ylabel('True label')\n```\n\n结果如下："

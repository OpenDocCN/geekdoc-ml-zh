    \ is transformed with `StandardScaler`:\n\n```\n# Train the model\npipe = make_pipeline(StandardScaler(),\
    \ SVC())\npipe.fit(x, y)\n\n# Make a prediction with the model\ninput = [0, 1,\
    \ 2, 3, 4]\npipe.predict([input])\n```\n\nNow data used to train the model has\
    \ `StandardScaler` applied to it, and data input to make predictions is transformed\

    \ only those that the classifier requires. Furthermore, how many features the\
    \ classifier requires depends on the content of the frame. The classifier is actually\
    \ several binary classifiers arranged in stages. The first stage might require\
    \ just one feature. The second stage might require 10, the third might require\
    \ 20, and so on. Features are extracted and passed to stage *n* only if stage\
    \ *n* – 1 returns positive, giving rise to the term *cascade classifier*.\n\n\
    Figure 11-3 depicts a three-stage cascade classifier. Each stage is carefully\
    \ tuned to achieve a 100% detection rate using a limited number of features even\
    \ if the false-positive rate is high. In the first stage, one feature determines\
    \ whether the frame contains a face. A positive response means the frame *might*\
    \ contain a face; a negative response means that it most certainly doesn’t, in\
    \ which case no further checks are performed. If stage 1 returns positive, however,\
    \ 10 other features are extracted and passed to stage 2. A frame is judged to\
    \ contain a face only if *all* stages return positive, yielding a cumulative false-positive\
    \ rate near zero. In machine learning, this is a design pattern known as *high\
    \ recall then precision* because while individual stages are tuned for high recall,\
    \ the cumulative effect is one of high precision.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_244_0.png)\n\

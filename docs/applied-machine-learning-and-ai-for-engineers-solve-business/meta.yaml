    \ agree that the system does a pretty credible job of picking similar movies.\
    \ Not bad for about 20 lines of code!\n\n## Summary\n\nMachine learning models\
    \ that classify text are common and see a variety of uses in industry and in everyday\
    \ life. What rational human being doesn’t wish for a magic wand that eradicates\
    \ all spam mails, for example?\n\nText used to train a text classification model\
    \ must be prepared and vectorized prior to training. Preparation includes converting\
    \ characters to lowercase and removing punctuation characters, and may include\
    \ removing stop words, removing numbers, and stemming or lemmatizing. Once prepared,\
    \ text is vectorized by converting it into a table of word frequencies. Scikit’s\
    \ `CountVectorizer` class makes short work of the vectorization process and handles\
    \ some of the preparation duties too.\n\nLogistic regression and other popular\
    \ classification algorithms can be used to classify text once it’s converted to\

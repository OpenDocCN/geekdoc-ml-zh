    # # Chapter 12. Object Detection


    The previous chapter introduced two popular algorithms for detecting faces in
    photographs: Viola-Jones, which relies on machine learning, and MTCNNs, which
    rely on deep learning. Face detection is a special case of *object detection*,
    in which computers detect and identify objects in images. Identifying an object
    is an image classification problem, something at which CNNs excel. But finding
    objects to identify poses a different challenge.


    Object detection is challenging because objects aren’t assumed to be perfectly
    cropped and aligned as they are for image classification tasks. Nor are they limited
    to one per image. Figure 12-1 shows what a self-driving car might see as it scans
    video frames from a forward-pointing camera. A CNN trained to do conventional
    image classification using carefully prepared training images is powerless to
    help. It might be able to classify the image as one of a city street, but it can’t
    determine that the image contains cars, people, and traffic lights, much less
    pinpoint their locations.


    Object detection has grown in speed and accuracy in recent years, and state-of-the-art
    methods rely on deep learning. In particular, they employ CNNs, which were introduced
    in Chapter 10. Let’s discuss how CNNs do object detection and identification and
    try our hand at it using cutting-edge object detection models.


    ![](img/628b9a382d0944bbfa786c66bc651b50_267_0.png)


    *Figure 12-1. Detecting and identifying objects in a scene*


    # ## R-CNNs


    One way to apply deep learning to the task of object detection is to use *region-based
    CNNs*, also known as *region* CNNs or simply *R-CNNs*. The first R-CNN was introduced
    in a 2014 paper titled “Rich Feature Hierarchies for Accurate Object Detection
    and Semantic Segmentation”. The model described in the paper comprises three stages.
    The first stage scans the image and identifies up to 2,000 bounding boxes representing
    regions of interest—regions that *might* contain objects. The second stage is
    a deep CNN that extracts features from regions of interest. The third is a support
    vector machine that classifies'
  - '[PAGE 268]


    the features. The output is a collection of bounding boxes with class labels and
    confidence scores. An algorithm called *non-maximum suppression* (NMS) filters
    the output and selects the best bounding box for each object.


    NMS is a crucial element of virtually all modern object detection systems. A detector
    invariably emits several bounding boxes for each object. If a photo contains one
    instance of a given class—for example, one zebra—NMS selects the bounding box
    with the highest confidence score. If the photo contains two zebras (Figure 12-2),
    NMS divides the bounding boxes into two groups and selects the box with the highest
    confidence score in each group. It groups boxes based on the amount of overlap
    between them. Overlap is computed by dividing the area of intersection between
    two boxes by the area formed by the union of the boxes. If the resulting *intersection-over-union*
    (IoU) score is greater than a predetermined threshold (typically 0.5), NMS assigns
    the boxes to the same group. Otherwise, it assigns them to separate groups.


    When two objects of the same class have little or no overlap, NMS easily separates
    the two. When two instances of the same class overlap significantly (picture one
    zebra standing behind the other), the IoU threshold might have to be adjusted
    to achieve separation. IoU threshold is a hyperparameter that can be tuned to
    strike the right balance between being overly aggressive at separating overlapping
    objects and not aggressive enough.


    ![](img/628b9a382d0944bbfa786c66bc651b50_268_0.png)


    The first stage of most R-CNN implementations uses an algorithm called *selective
    search* to identify regions of interest by keying on similarities in color, texture,
    shape, and size. Figure 12-3 shows the first 500 bounding boxes generated when
    OpenCV’s implementation of selective search examines an image. Submitting a targeted
    list of regions to the CNN is faster than a brute-force sliding-window approach
    that inputs the contents of the window to the CNN at every stop.'
  - '[PAGE 269]


    ![](img/628b9a382d0944bbfa786c66bc651b50_269_0.png)


    Even with selective search narrowing the list of candidate regions input to stage
    2, an R-CNN can’t do object detection in real time. Why? Because the CNN individually
    processes the 2,000 or so regions of interest identified in stage 1. These regions
    invariably overlap, so the CNN processes the same pixels multiple times.


    A 2015 paper titled “Fast R-CNN” addressed this by proposing a modified architecture
    in which the entire image passes through the CNN one time (Figure 12-4). Selective
    search or a similar algorithm identifies regions of interest in the image, and
    those regions are projected onto the feature map generated by the CNN. A *region
    of interest (ROI) pooling layer* then uses a form of max pooling to reduce the
    features in each region of interest to a fixed-length vector, independent of the
    region’s size and shape. (By contrast, R-CNN scales each region to an image of
    predetermined size before submitting it to the CNN, which is substantially more
    expensive than ROI pooling.) Classification of the feature vectors is performed
    by fully connected layers rather than SVMs, and the output is split to include
    both a softmax classifier and a bounding-box regressor. NMS filters the bounding
    boxes down to the ones that matter. The result is a system that trains an order
    of magnitude faster than R-CNN, makes predictions two orders of magnitude faster,
    and is slightly more accurate than R-CNN.


    ![](img/628b9a382d0944bbfa786c66bc651b50_269_1.png)'
- md: "## ROI Pooling\n\nROI pooling reduces any region of interest to a feature vector\
    \ of a specified size, regardless of the region’s height and width. Imagine that\
    \ you have an 8 × 16 region of a feature map and you want to reduce it to 4 ×\
    \ 4. You can divide the 8 × 16 region into a 4 × 4 grid, with each cell in the\
    \ grid measuring 2 × 4. You can then take the maximum of the eight values in each\
    \ cell and plug them into the 4 × 4 grid. That’s ROI pooling. It’s simple, fast,\
    \ and effective. And it works with regions of any size and aspect ratio.\n\nA\
    \ 2016 paper titled “Faster R-CNN: Towards Real-Time Object Detection with Region\
    \ Proposal Networks” further boosted performance by replacing selective search\
    \ with a *region proposal network*, or RPN. The RPN is a shallow CNN that shares\
    \ layers with the main CNN (Figure 12-5). To generate region proposals, it slides\
    \ a window over the feature map generated by the last shared layer. At each stop\
    \ in the window’s travel, the RPN evaluates *n* candidate regions called *anchors*\
    \ or *anchor boxes* and computes an *objectness score* for each based on IoU scores\
    \ with ground-truth boxes. Objectness scores and anchor boxes are input to fully\
    \ connected layers for classification (does the anchor contain an object, and\
    \ if so, what type?) and regression. The output from these layers ultimately determines\
    \ the regions of interest projected onto the feature map generated by the main\
    \ CNN and forwarded to the ROI pooling layer.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_270_0.png)\n\
    \nFaster R-CNN can perform 10 times faster than Fast R-CNN and do object detection\
    \ in near real time. It’s typically more accurate than Fast R-CNNs too, thanks\
    \ to the RPN’s superior ability to identify candidate regions. Selective search\
    \ is static, but an RPN gets smarter as the network is trained. RPNs also execute\
    \ in parallel to the main CNN, which means region proposals have little impact\
    \ on performance.\n\n## Mask R-CNN\n\nThe next chapter in the R-CNN story came\
    \ in 2017 in a paper titled “Mask R-CNN”. Mask R-CNNs extend Faster R-CNNs by\
    \ adding *instance segmentation*, which identifies the shapes of objects detected\
    \ in an image using *segmentation masks* like the ones in Figure 12-6. Performance\
    \ impact is minimal because instance segmentation is performed in parallel with\
    \ region evaluation. The benefit of Mask R-CNNs is that they provide more detail\
    \ about the objects they detect. For example, you can tell whether a person’s\
    \ arms are extended—something you can’t discern from a simple bounding box. They\
    \ are also slightly more accurate than Faster R-CNNs because they replace ROI\
    \ pooling with *ROI alignment*, which discards less information when generating\
    \ feature vectors whose boundaries don’t perfectly align with the boundaries of\
    \ the regions they represent.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_271_0.png)\n\
    \nZoom uses instance segmentation to display custom backgrounds behind you in\
    \ video feeds. Instance segmentation also powers AI-based image editing tools\
    \ that crop figures from the foreground and place them on different backgrounds.\
    \ Let’s demonstrate using a pretrained Mask R-CNN.\n\nStart by [downloading a\
    \ ZIP file](https://example.com) containing the files needed for this exercise.\
    \ The files are:\n\n- *adam.jpg*\n    A photo of a young man wearing a backpack\n\
    - *maui.jpg*\n    A photo taken poolside in Hawaii\n- *mask.py*\n    Contains\
    \ helper functions for preprocessing images before they’re input to a Mask R-CNN\
    \ and postprocessing functions for interpreting the results\n- *MaskRCNN-12-int8.onnx*\n\
    \    Contains a pretrained Mask R-CNN saved in ONNX format\n\nPlace *mask.py*\
    \ in the directory where your Jupyter notebooks are hosted, and the remaining\
    \ files in your notebooks’ *Data* subdirectory.\n\nThe critical file in this ensemble\
    \ is *MaskRCNN-12-int8.onnx*. [Chapter 7](https://example.com) introduced [Open\
    \ Neural Network Exchange (ONNX)](https://example.com) as a means for loading\
    \ Scikit-Learn models written in Python and consuming them in other languages.\
    \ But ONNX does more than bridge the language gap to Scikit. It’s a neutral format\
    \ that enables neural networks written with one deep-learning framework to be\
    \ exported to others. For example, you can save a PyTorch model to a .onnx file,\
    \ and then convert the .onnx file to a TensorFlow model and use it as if it had\
    \ been written with TensorFlow from the outset. Or you can install an ONNX runtime\
    \ and load and call the model without converting it to TensorFlow. Chapter 7 demonstrated\
    \ how to save a Scikit model in ONNX format and use the Python ONNX runtime to\
    \ load the model and call it from Python. It also used the .NET ONNX runtime to\
    \ load the model and call it from C#. As noted in Chapter 7, ONNX runtimes are\
    \ available for a variety of platforms and programming languages.\n\nMaskRCNN-12-int8.onnx\
    \ contains a sophisticated Mask R-CNN implementation from Facebook Research. It\
    \ uses a ResNet50 backbone to extract features from the images input to it, and\
    \ it includes a branch that computes instance segmentation masks in parallel with\
    \ bounding box computations. It was trained with more than 200,000 images from\
    \ the COCO dataset. Those images contain more than 1.5 million objects that fall\
    \ into 80 categories ranging from cats and dogs to people, bicycles, and cars.\
    \ And because the trained model was published in the ONNX model zoo on GitHub,\
    \ you can load it and pass images to it with just a few lines of code.\n\nThe\
    \ first step in using the model in Python is to make sure the Python ONNX runtime\
    \ is installed in your environment. For this exercise, make sure OpenCV is installed\
    \ too. Then create a Jupyter notebook and run the following code in the first\
    \ cell to load and display adam.jpg:\n\n```python\nimport matplotlib.pyplot as\
    \ plt\nfrom PIL import Image\n%matplotlib inline\n\nimage = Image.open('Data/adam.jpg')\n\
    fig, ax = plt.subplots(figsize=(12, 8), subplot_kw={'xticks': [], 'yticks': []})\n\
    ax.imshow(image)\n```\n\nHere’s the output:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_273_0.png)\n\
    \nThe goal is to run this image through Mask R-CNN, detect the objects in it,\
    \ and annotate the image accordingly. To that end, use the following code to preprocess\
    \ the image pixels the way the model expects, load Mask R-CNN from the ONNX file,\
    \ and submit the preprocessed image to it:\n\n```python\nfrom mask import *\n\
    import onnxruntime as rt\n\nimage_data = preprocess(image)\nsession = rt.InferenceSession('Data/MaskRCNN-12-int8.onnx')\n\
    input_name = session.get_inputs()[0].name\nresult = session.run(None, { input_name:\
    \ image_data })\n```\n\nThe value returned by the run method is an array of four\
    \ arrays. The first array contains bounding boxes for the objects detected in\

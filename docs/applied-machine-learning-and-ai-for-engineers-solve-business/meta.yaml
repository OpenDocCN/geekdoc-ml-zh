    \ and concluded that this was a reasonable combination. Picking a lower threshold\
    \ improves the model’s ability to identify fraudulent transactions, but at the\
    \ cost of misclassifying more legitimate transactions. In the end, you have to\
    \ decide what error rate you’re willing to live with, keeping in mind that declining\
    \ a legitimate credit card purchase is likely to anger a customer.\n\n## Using\
    \ PCA to Predict Bearing Failure\n\nOne of the classic uses for anomaly detection\
    \ is to predict failures in rotating machinery. Let’s apply PCA-based anomaly\

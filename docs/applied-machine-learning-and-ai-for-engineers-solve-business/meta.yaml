    The next step is to create the neural network. Use the following statements to
    create a network with an input layer that accepts three values (day, time, and
    distance), two hidden layers with 512 neurons each, and an output layer with a
    single neuron (the predicted fare amount):


    ```

    from tensorflow.keras.models import Sequential

    from tensorflow.keras.layers import Dense


    model = Sequential()

    model.add(Dense(512, activation=''relu'', input_dim=3))

    model.add(Dense(512, activation=''relu''))


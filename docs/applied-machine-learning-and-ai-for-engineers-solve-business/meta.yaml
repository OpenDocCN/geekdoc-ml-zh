    \ remove apostrophes by default, but you can remove them by adding an apostrophe\
    \ to the `filters` list.\n\nIt’s important that text input to a neural network\
    \ for predictions be tokenized and padded in the same way as text input to the\
    \ model for training. If you’re thinking it sure would be nice not to have to\
    \ do the tokenization and sequencing manually, there is a way around it. Rather\
    \ than write a lot of code, you can include a `TextVectorization` layer in the\
    \ model. I’ll demonstrate how momentarily. But first, you need to learn about\
    \ embedding layers.\n\n# Word Embeddings\n\nOnce text is tokenized and converted\
    \ into padded sequences, it is ready for training a neural network. But you probably\
    \ won’t get very far training on the raw padded sequences.\n\nOne of the crucial\
    \ elements of a neural network that processes text is an `embedding layer` whose\
    \ job is to convert padded sequences of word tokens into arrays of `word vectors`,\
    \ which represent each word with an array (vector) of floating-point numbers rather\
    \ than a single integer. Each word in the input text is represented by a vector\
    \ in the embedding layer, and as the network is trained, vectors representing\
    \ individual words are adjusted to reflect their relationship to one another.\
    \ If you’re building a sentiment analysis model and words such as *excellent*\
    \ and *amazing* have similar connotations, then the vectors representing those\
    \ words in the embedding space should be relatively close together so that phrases\
    \ such as “excellent service” and “amazing service” score similarly.\n\nImplementing\
    \ an embedding layer by hand is a complex undertaking (especially the training\
    \ aspect), so Keras offers the `Embedding` class. With Keras, creating a trainable\
    \ embedding layer requires just one line of code:\n\n```\nEmbedding(input_dim=10000,\
    \ output_dim=32, input_length=100)\n```\n\nIn order, the three parameters passed\
    \ to the `Embedding` function are:\n\n+   - The vocabulary size, or the number\
    \ of words in the vocabulary built by `Tokenizer`\n- The number of dimensions\
    \ *m* in the embedding space\n- The length *n* of each padded sequence\n\nYou\
    \ pick the number of dimensions *m*, and each word gets encoded in the embedding\
    \ space as an *m*-"

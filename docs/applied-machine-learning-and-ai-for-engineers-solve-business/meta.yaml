    \ before it's of any use—something that's not uncommon in machine learning. Data\
    \ scientists often find that collecting and preparing data accounts for 90% or\
    \ more of their time:\n\n```python\nimport pandas as pd\n\ndf = pd.read_csv('Data/taxi-fares.csv',\
    \ parse_dates=['pickup_datetime'])\ndf.head()\n```\n\nNote the use of the `read_csv`\
    \ function's `parse_dates` parameter to parse the strings in the `pickup_datetime`\

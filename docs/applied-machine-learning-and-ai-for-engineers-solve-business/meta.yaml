    # # Custom Object Detection


    An object detection model trained on the COCO dataset can readily detect and identify
    80 different types of objects. But what if you need an object detection model
    that identifies other objects? What if, for example, you need a model that detects
    license plates on cars, packages left on your front porch, or cancer cells in
    tissue samples? All of these are ways in which object detection is employed in
    industry today. And none of them rely on models trained solely with COCO images.


    Training an object detection model from scratch is a heavy lift even for researchers
    at Microsoft, Facebook, and Google. You can short-circuit the process a bit by
    starting with the COCO weights and incrementally training the network with new
    classes, but even that is compute and time intensive.


    There is an easier way. The premise underlying this entire book is that you’re
    a software developer or engineer, not a PhD data scientist. You want to use machine
    learning (or deep learning) to add value to your business. You want results, not
    equations on a blackboard. You may or may not own a GPU, but you have a job to
    do, and in this case, that job involves custom object detection.


    The “easier way” is [Azure Cognitive Services](https://azure.microsoft.com/en-us/services/cognitive-services/)—specifically,
    a member of the Cognitive Services family called the [Custom Vision service](https://customvision.ai/).
    I will formally introduce Azure Cognitive Services in [Chapter 14](#chapter-14),
    but if your goal is to build a custom object detector, now’s the right time for
    your first foray into the world of AI as a service. In my opinion, nothing makes
    crafting custom object detection models easier than the Custom Vision service.
    Little expertise is required, and at the end, you’re left with a trained model
    that'

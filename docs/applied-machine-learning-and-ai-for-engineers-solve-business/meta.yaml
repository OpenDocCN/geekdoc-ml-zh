    # Versioning Pickle Files


    Generally speaking, a model pickled (saved) with one version of Scikit can’t be
    unpickled with another version. Sometimes the result is warning messages; other
    times, it doesn’t work at all. Be sure to save models with the same version of
    Scikit that you use to consume them. This requires a bit of planning from an engineering
    perspective, because if you store serialized models in a centralized repository
    and update the version of Scikit used in your apps, you’ll need to update the
    saved models too.


    Which prompts some interesting questions: How do you set up a repository for machine
    learning models? How do you deploy models from the repository to the devices that
    host them? For that matter, how do you *version* those models as well as the datasets
    you train them with?


    The answers come from a nascent field known as *MLOps*, which is short for *ML
    operations*. I don’t cover MLOps in this book because it’s a rich subject that
    is a book unto itself. If you want to learn more, I recommend reading *Practical
    MLOps: Operationalizing Machine Learning Models* by Noah Gift and Alfredo Deza
    (O’Reilly).



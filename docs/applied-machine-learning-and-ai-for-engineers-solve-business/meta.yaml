    \ time:\n\n```\narctic fox: 0.0\npolar bear: 0.0\nwalrus: 1.0\n```\n\nResNet50V2\
    \ wasn’t trained to recognize walruses, but your network was. That’s transfer\
    \ learning in a nutshell. It’s the deep-learning equivalent of having your cake\
    \ and eating it too. And it’s the secret sauce that makes CNNs a viable tool for\
    \ anyone with a laptop and a few hundred training images.\n\nThat’s not to say\
    \ that transfer learning will *always* get you 97% accuracy with 100 images per\
    \ class. It won’t. If a dataset lacks the information to achieve that level of\
    \ separation, neither scratch-built CNNs nor transfer learning will magically\
    \ make it happen. That’s always true in machine learning and AI. You can’t get\
    \ water from a rock. And you can’t build an accurate model from data that doesn’t\
    \ support it.\n\n# Data Augmentation\n\nThe previous example demonstrated how\
    \ to use transfer learning to build a model that, with just 300 training images,\
    \ can classify photos of three different types of Arctic wildlife with 97% accuracy.\
    \ One of the benefits of transfer learning is that it can do more with fewer images.\
    \ This feature is also a bug, however. With just 100 or so samples of each class,\
    \ there is little diversity among images. A model might be able to recognize a\
    \ polar bear if the bear’s head is perfectly aligned in the center of the photo.\
    \ But if the training images don’t include photos with the bear’s head aligned\
    \ differently or tilted at different angles, the model might have difficulty classifying\
    \ the photo.\n\nOne solution is *data augmentation*. Rather than scare up more\
    \ training images, you can rotate, translate,"
  merge: -1
  pgno: 226
- img_proc: true
  md: "and scale the images you have. It doesn't *always* increase a CNN's accuracy,\
    \ but it frequently does, especially with small datasets. Keras makes it easy\
    \ to randomly transform training images provided to a network. Images are transformed\
    \ differently in each epoch, so if you train for 10 epochs, the network sees 10\
    \ different variations of each training image. This can increase a model's ability\
    \ to generalize with little impact on training time. Figure 10-12 shows the effect\
    \ of applying random transforms to a hot dog image. You can see why presenting\
    \ the same image to a model in different ways might make the model more adept\
    \ at recognizing hot dogs, regardless of how the hot dog is framed.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_227_0.png)\n\
    \nKeras has built-in support for data augmentation with images. Let's look at\
    \ a couple of ways to put image augmentation to work, and then apply it to the\
    \ Arctic wildlife model.\n\n# Image Augmentation with ImageDataGenerator\n\nOne\
    \ way to apply image augmentation when training a model is to use Keras's `ImageDataGenerator`\
    \ class. `ImageDataGenerator` generates batches of training images on the fly,\
    \ either from images you've loaded (for example, with Keras's `load_img` function)\
    \ or from a specified location in the filesystem. The latter is especially useful\
    \ when training CNNs with millions of images because it loads images into memory\
    \ in batches rather than all at once. Regardless of where the images come from,\
    \ however, `ImageDataGenerator` is happy to apply transforms as it serves them\
    \ up.\n\nHere's a simple example that you can try yourself. Use the following\
    \ code to load an image from your filesystem, wrap an `ImageDataGenerator` around\
    \ it, and generate 24 versions of the image:\n\n```\npython\nimport numpy as np\n\
    from tensorflow.keras.preprocessing import image\nfrom tensorflow.keras.preprocessing.image\
    \ import ImageDataGenerator\nimport matplotlib.pyplot as plt\n%matplotlib inline\n\

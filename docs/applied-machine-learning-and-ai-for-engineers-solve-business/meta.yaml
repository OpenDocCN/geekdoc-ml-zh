    # Face Detection with Viola-Jones


    One of the fastest and most popular algorithms for detecting faces in photos stems
    from a paper published in 2001 titled “Rapid Object Detection Using a Boosted
    Cascade of Simple Features”. Sometimes known as Viola-Jones (the authors of the
    paper), the algorithm keys on the relative intensities of adjacent blocks of pixels.
    For example, the average pixel intensity in a rectangle around the eyes is typically
    darker than the average pixel intensity in a rectangle immediately below that
    area. Similarly, the bridge of the nose is usually lighter than the region around
    the eyes, so two dark rectangles with a bright rectangle in the middle might represent
    two eyes and a nose. The presence of many such Haar-like features in a frame at
    the right locations is an indicator that the frame contains a face (Figure 11-2).


    ![](img/628b9a382d0944bbfa786c66bc651b50_243_1.png)


    Figure 11-2. Face detection using Haar-like features


    Viola-Jones works by sliding windows of various sizes over an image looking for
    frames with Haar-like features in the right places. At each stop, the pixels in
    the window are scaled to a specified size (typically 24 × 24), and features are
    extracted and fed into a binary classifier that returns positive indicating the
    frame contains a face or negative indicating it does not. Then the window slides
    to the next location and the detection regimen begins again.


    The key to Viola-Jones’s performance is the binary classifier. A frame that is
    24 pixels wide and 24 pixels high contains more than 160,000 combinations of rectangles
    representing potential Haar-like'

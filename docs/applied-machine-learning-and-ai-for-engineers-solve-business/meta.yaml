- img_proc: true
  md: 'and polar bears. Then they make them available for public consumption. Called
    *pretrained CNNs*, they are more sophisticated than anything you’re likely to
    train yourself. And if that’s not awesome enough, Keras reduces the process of
    loading a pretrained CNN to one line of code.


    Keras provides classes that wrap more than two dozen popular pretrained CNNs.
    The full list is documented on the [Keras website](https://keras.io/). Most of
    these CNNs are documented in scholarly papers such as “Deep Residual Learning
    for Image Recognition” and “EfficientNet: Rethinking Model Scaling for Convolutional
    Neural Networks”. Some have won prestigious competitions such as the ImageNet
    Large Scale Visual Recognition Challenge and the [COCO Detection Challenge](https://cocodataset.org/).
    Among the most notable are the ResNet family of networks from Microsoft and the
    Inception networks from Google. Also noteworthy is [MobileNet](https://ai.googleblog.com/2017/06/mobilenets-open-source-models-for.html),
    which trades size for accuracy and is ideal for mobile devices due to its small
    memory footprint. You can learn more about it in the [Google AI blog](https://ai.googleblog.com/2017/06/mobilenets-open-source-models-for.html).


    > ### PRETRAINED CNN ARCHITECTURES


    Pretrained CNNs achieve impressive levels of accuracy not just because they’re
    trained with millions of images but also because they are deeper and architecturally
    more advanced than the CNNs presented thus far. For example, they use consecutive
    convolution layers to further refine the features extracted from each image, and
    many use *batch normalization* to normalize (standardize to unit variance) values
    propagated between layers during training.


    But pretrained CNNs are more sophisticated for other reasons as well. ResNets,
    for example, pioneered a concept called *residual layers*, which add their input
    to their output. This simple innovation helped mitigate the vanishing-gradient
    problem that causes updates to become increasingly smaller as the optimizer goes
    backward through the network updating weights and biases, and it made much deeper
    networks possible.


    And then there is the Inception family of CNNs, whose chief innovation was the
    use of 1 × 1 convolution kernels to minimize the computational overhead of larger
    convolution kernels by reducing the depth of the feature maps input to them. Recent
    versions of Inception have incorporated features of ResNets as well, and a derivative
    architecture known as Xception improved on Inception by introducing *depthwise
    separable convolutions*. If you’d like to learn more, check out “A Simple Guide
    to the Versions of the Inception Network” and “Xception: Deep Learning with Depthwise
    Separable Convolutions”.


    The following statement instantiates Keras’s `MobileNetV2` class and initializes
    it with the weights, biases, and kernel values arrived at when the network was
    trained on the ImageNet dataset:


    ```

    python

    from tensorflow.keras.applications import MobileNetV2


    model = MobileNetV2(weights=''imagenet'')

    ```


    The `weights=''imagenet''` parameter tells Keras what parameters to load to re-create
    the network in its trained state. You can also pass a path to a file containing
    custom weights, but `imagenet` is the only set of predefined weights that are
    currently supported.'

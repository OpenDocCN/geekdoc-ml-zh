    x = image.img_to_array(x)\nx = np.expand_dims(x, axis=0)\n\n# Wrap an ImageDataGenerator\
    \ around it\nidg = ImageDataGenerator(rescale=1./255,\n                      \
    \  horizontal_flip=True,\n                        rotation_range=30,\n       \
    \                 width_shift_range=0.2,\n                        height_shift_range=0.2,\n\
    \                        zoom_range=0.2)\nidg.fit(x)\n\n# Generate 24 versions\
    \ of the image\ngenerator = idg.flow(x, [0], batch_size=1, seed=0)\nfig, axes\
    \ = plt.subplots(3, 8, figsize=(16, 6),\n                        subplot_kw={'xticks':\
    \ [], 'yticks': []})\nfor i, ax in enumerate(axes.flat):\n    img, label = generator.next()\n\
    \    ax.imshow(img[0])\n```\n\n结果如下：\n\n![](img/628b9a382d0944bbfa786c66bc651b50_228_0.png)\n\
    \n传递给`ImageDataGenerator`的参数告诉它如何变换它提供的每张图像：\n\n- `rescale=1./255`：将每个像素值除以255\n\
    - `horizontal_flip=True`：随机水平翻转图像（绕垂直轴）\n- `rotation_range=30`：随机将图像旋转-30到30度\n\
    - `width_shift_range=0.2`和`height_shift_range=0.2`：随机将图像平移-20%到20%\n- `zoom_range=0.2`：随机将图像缩放-20%到20%\n\
    \n还有其他参数可以使用，例如`vertical_flip`、`shear_range`和`brightness_range`，但你已经明白了。本例中使用的`flow`方法从你传递给`fit`的图像生成图像。相关的`flow_from_directory`方法从文件系统加载图像，并可选地根据它们所在的子目录进行标记。\n\
    \n`flow`返回的生成器可以直接传递给模型的`fit`方法，在训练过程中为模型提供随机变换的图像。假设`x_train`和`y_train`保存了一组训练图像和标签。以下代码用`ImageDataGenerator`包装它们，并使用它们来训练模型：\n\
    \n```python\nidg = ImageDataGenerator(rescale=1./255,\n                      \
    \  horizontal_flip=True,\n                        rotation_range=30,\n       \
    \                 width_shift_range=0.2,\n                        height_shift_range=0.2,\n\
    \                        zoom_range=0.2)\n\nidg.fit(x_train)\nimage_batch_size\
    \ = 10\ngenerator = idg.flow(x_train, y_train, batch_size=image_batch_size, seed=0)\n\
    \nmodel.fit(generator,\n          steps_per_epoch=len(x_train) // image_batch_size,\n\
    \          validation_data=(x_test, y_test),\n          batch_size=20,\n     \
    \     epochs=10)\n```\n\n`steps_per_epoch`参数是关键，因为`ImageDataGenerator`可以为每张图像提供无限数量的版本。在这个例子中，传递给`flow`的`batch_size`参数告诉生成器在每个批次中创建10张图像。将图像数量除以图像批次大小来计算`steps_per_epoch`，可以确保在每个训练周期中，模型都能获得数据集中每张图像的一个变换版本。\n\
    \n> **注意**\n\nKeras 2.1之前的版本不允许将生成器传递给`fit`方法。相反，它们提供了一个名为`fit_generator`的单独方法。该方法已弃用，并将在未来版本中移除。\n\
    \n请注意，对`fit`的调用包含一个`validation_data`参数，指定了用于在训练期间验证网络的单独图像和标签集。通常，你*不*希望对验证图像进行增强，因此在将生成器传递给`fit`时，应避免使用`validation_split`。\n\
    \n## 使用增强层进行图像增强\n\n你可以使用`ImageDataGenerator`为模型提供变换后的图像，但最近版本的Keras提供了另一种选择，即[图像预处理层](https://keras.io/api/layers/preprocessing_layers/)和[图像增强层](https://keras.io/api/layers/preprocessing_layers/image_augmentation/)。你不必单独变换训练图像，而是可以将变换直接集成到模型中。以下是一个例子：\n\
    \n```python\nfrom tensorflow.keras.models import Sequential\nfrom tensorflow.keras.layers\
    \ import Conv2D, MaxPooling2D, Flatten, Dense\nfrom tensorflow.keras.layers import\
    \ Rescaling, RandomFlip, RandomRotation\nfrom tensorflow.keras.layers import RandomTranslation,\
    \ RandomZoom\n\nmodel = Sequential()\nmodel.add(Rescaling(1./255))\nmodel.add(RandomFlip(mode='horizontal'))\n\
    model.add(RandomTranslation(0.2, 0.2))\nmodel.add(RandomRotation(0.2))\nmodel.add(RandomZoom(0.2))\n\
    model.add(Conv2D(32, (3, 3), activation='relu', input_shape=(224, 224, 3)))\n\
    ```"

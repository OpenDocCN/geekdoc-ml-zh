    \n## 第13章 自然语言处理\n\n使用Scikit-Learn构建分析文本情感、识别垃圾邮件以及以其他方式分类文本的机器学习模型并不困难。但如今，最先进的文本分类通常由神经网络执行。你已经知道如何构建接受数字和图像作为输入的神经网络。让我们在此基础上学习如何构建处理文本的深度学习模型——深度学习的一个分支，称为*自然语言处理*，简称NLP。\n\
    \nNLP涵盖多种活动，包括文本分类、命名实体识别、关键词提取、问答和语言翻译。近年来，NLP模型的准确性有所提高，原因多种多样，其中不乏将单词和句子转换为包含语义的密集向量表示的更新更好的方法，以及一种相对较新的神经网络架构——*Transformer*，它可以聚焦于最有意义的单词，甚至区分同一单词的不同含义。\n\
    \n几乎所有处理文本的神经网络都有一个共同元素：*嵌入层*，它使用*词嵌入*将表示单词的标量值数组（或*序列*）转换为称为*词向量*的浮点数数组。这些向量编码了关于单词含义及其之间关系的信息。嵌入层的输出可以输入到分类层，也可以输入到其他类型的神经网络层，以在进一步处理之前从中提取更多含义。\n\
    \nTransformer？嵌入层？词向量？这里有很多内容需要理解，但一旦你掌握了几个基本概念，处理语言的神经网络就是纯粹的魔法。让我们深入探讨。我们将从学习如何为深度学习模型处理文本做准备以及如何创建词嵌入开始。然后，我们将运用这些知识构建神经网络来分类文本、将文本从一种语言翻译成另一种语言等等——这些都是NLP的经典应用。\n\
    \n### 文本准备\n\n第4章介绍了Scikit-Learn的`CountVectorizer`类，它将文本行转换为机器学习模型可以处理的单词计数行。`CountVectorizer`还将字符转换为小写，移除数字和标点符号，并可选地移除停用词——像*and*和*the*这样可能对结果影响很小的常见词。\n\
    \n在使用文本训练神经网络之前，文本也必须经过清理和向量化，但向量化通常以不同的方式进行。你不是创建一个单词计数表，而是创建一个包含表示单个单词的*标记*的序列表。标记通常是基于数据集中单词语料库构建的字典或*词汇表*的索引。为了帮助实现这一点，Keras提供了`Tokenizer`类，你可以将其视为`CountVectorizer`的深度学习等价物。以下是一个使用`Tokenizer`从四行文本创建序列的示例：\n\
    \n```python\nfrom tensorflow.keras.preprocessing.text import Tokenizer\n```"

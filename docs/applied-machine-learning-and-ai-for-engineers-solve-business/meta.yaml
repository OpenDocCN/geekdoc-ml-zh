    encoding can be performed with Scikit’s `OneHotEncoder` class or by calling `get_dummies`
    on a Pandas DataFrame. Here is how the latter is used to encode the dataset:


    ```

    data = [[10, ''red''], [20, ''blue''], [12, ''red''], [16, ''green''], [22, ''blue'']]


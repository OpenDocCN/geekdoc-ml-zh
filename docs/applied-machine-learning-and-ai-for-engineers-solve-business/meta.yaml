    \ *所有* 阶段都返回正结果时，才会判定该帧包含人脸，从而使累积误报率接近于零。在机器学习中，这是一种被称为 *高召回率优先，再追求精确率* 的设计模式，因为虽然单个阶段被调校为高召回率，但累积效果却实现了高精确率。\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_244_0.png)\n\n这种架构的一个好处是，不包含人脸的图像帧往往会很快被排除，因为它们在级联的早期阶段就会引发负响应。由于大多数帧\

    ## Supervised Learning


    Unsupervised learning is an important branch of machine learning, but when most
    people hear the term *machine learning* they think about supervised learning.
    Recall that supervised learning models make predictions. For example, they predict
    whether a credit card transaction is fraudulent or a flight will arrive on time.
    They''re also trained with labeled data.


    Supervised learning models come in two varieties: *regression models* and *classification
    models*. The purpose of a regression model is to predict a numeric outcome such
    as the price that a home will sell for or the age of a person in a photo. Classification
    models, by contrast, predict a *class* or category from a finite set of classes
    defined in the training data. Examples include whether a credit card transaction
    is legitimate or fraudulent and what number a handwritten digit represents. The
    former is a *binary classification* model because there are just two possible
    outcomes: the transaction is legitimate or it''s not. The latter is an example
    of *multiclass classification*. Because there are 10 digits (0–9) in the Western
    Arabic numeral system, there are 10 possible classes that a handwritten digit
    could represent.


    The two types of supervised learning models are pictured in Figure 1-7. On the
    left, the goal is to input an *x* and predict what *y* will be. On the right,
    the goal is to input an *x* and a *y* and predict what class the point corresponds
    to: a triangle or an ellipse. In both cases, the purpose of applying machine learning
    to the problem is to build a model for making predictions. Rather than build that
    model yourself, you train a machine learning model with labeled data and allow
    it to devise a mathematical model for you.


    ![](img/628b9a382d0944bbfa786c66bc651b50_32_0.png)


    For these datasets, you could easily build mathematical models without resorting
    to machine learning. For a regression model, you could draw a line through the
    data points and use the equation of that line to predict a *y* given an *x* (Figure
    1-8). For a classification model, you could draw a line that cleanly separates
    triangles from ellipses—what data scientists call a *classification boundary*—and
    predict which class a new point represents by determining whether the point falls
    above or below the line. A point just above the line would be a triangle, while
    a point just below it would classify as an ellipse.


    ![](img/628b9a382d0944bbfa786c66bc651b50_33_0.png)


    In the real world, datasets are rarely this orderly. They typically look more
    like the ones in Figure 1-9, in which there is no single line you can draw to
    correlate the x and y values on the left or cleanly separate the classes on the
    right. The goal, therefore, is to build the best model you can. That means picking
    the learning algorithm that produces the most accurate model.


    ![](img/628b9a382d0944bbfa786c66bc651b50_33_1.png)


    There are many supervised learning algorithms. They go by names such as linear
    regression, random forests, gradient-boosting machines (GBMs), and support vector
    machines (SVMs). Many, but not all, can be used for regression *and* classification.
    Even seasoned data scientists frequently experiment to determine which learning
    algorithm produces the most accurate model. These and other learning algorithms
    will be covered in subsequent chapters.


    ## k-Nearest Neighbors


    One of the simplest supervised learning algorithms is *k-nearest neighbors*. The
    premise behind it is that given a set of data points, you can predict a label
    for a new point by examining the points nearest it. For a simple regression problem
    in which each data point is characterized by $x$ and $y$ coordinates, this means
    that given an $x$, you can predict a $y$ by finding the $n$ points with the nearest
    $xs$ and averaging their $ys$. For a classification problem, you find the $n$
    points closest to the point whose class you want to predict and choose the class
    with the highest occurrence count. If $n = 5$ and the five nearest neighbors include
    three triangles and two ellipses, then the answer is a triangle, as pictured in
    Figure 1-10.


    ![](img/628b9a382d0944bbfa786c66bc651b50_34_0.png)


    *Figure 1-10. Classification with k-nearest neighbors*


    Here''s an example involving regression. Suppose you have 20 data points describing
    how much programmers earn per year based on years of experience. Figure 1-11 plots
    years of experience on the x-axis and annual income on the y-axis. Your goal is
    to predict what someone with 10 years of experience should earn. In this example,
    $x = 10$, and you want to predict what $y$ should be.


    ![](img/628b9a382d0944bbfa786c66bc651b50_35_0.png)


    Applying *k*-nearest neighbors with *n* = 10 identifies the points highlighted
    in orange in Figure 1-12 as the nearest neighbors—the 10 whose *x* coordinates
    are closest to *x* = 10. The average of these points'' *y* coordinates is 94,838.
    Therefore, *k*-nearest neighbors with *n* = 10 predicts that a programmer with
    10 years of experience will earn $94,838, as indicated by the red dot.


    ![](img/628b9a382d0944bbfa786c66bc651b50_35_1.png)


    The value of *n* that you use with *k*-nearest neighbors frequently influences
    the outcome. Figure 1-13 shows the same solution with *n* = 5. The answer is slightly
    different this time because the average *y* for the five nearest neighbors is
    98,713.


    In real life, it''s a little more nuanced because while the dataset has just one
    label column, it probably has several *feature columns*—not just $x$, but $x_1$,
    $x_2$, $x_3$, and so on. You can compute distances in $n$-dimensional space easily
    enough, but there are several ways to measure distances to identify a point''s
    nearest neighbors, including Euclidean distance, Manhattan distance, and Minkowski
    distance. You can even use weights so that nearby points contribute more to the
    outcome than faraway points. And rather than find the $n$ nearest neighbors, you
    can select all the neighbors within a given radius, a technique known as *radius
    neighbors*. Still, the principle is the same regardless of the number of dimensions
    in the dataset, the method used to measure distance, or whether you choose $n$
    nearest neighbors or all the neighbors within a specified radius: find data points
    that are similar to the target point and use them to regress or classify the target.


    ![](img/628b9a382d0944bbfa786c66bc651b50_36_0.png)


    *Figure 1-13. Regression with k-nearest neighbors and n = 5*


    ## Using k-Nearest Neighbors to Classify Flowers


    Scikit-Learn includes classes named `KNeighborsRegressor` and `KNeighborsClassifier`
    to help you train regression and classification models using the $k$-nearest neighbors
    learning algorithm. It also includes classes named `RadiusNeighborsRegressor`
    and `RadiusNeighborsClassifier` that accept a radius rather than a number of neighbors.
    Let''s look at an example that uses `KNeighborsClassifier` to classify flowers

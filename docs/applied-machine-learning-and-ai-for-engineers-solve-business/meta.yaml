  md: "Otherwise, you’ll get nonsensical predictions.\nTo simplify your code and make\
    \ it harder to forget to transform training data and prediction data the same\
    \ way, Scikit offers the `make_pipeline` function. `make_pipeline` lets you combine\
    \ predictive models—what Scikit calls *estimators*, or instances of classes such\
    \ as SVC—with transforms applied to data input to those models. Here’s how you\
    \ use `make_pipeline` to ensure that any data input to the model is transformed\
    \ with `StandardScaler`:\n\n```\n# Train the model\npipe = make_pipeline(StandardScaler(),\
    \ SVC())\npipe.fit(x, y)\n\n# Make a prediction with the model\ninput = [0, 1,\
    \ 2, 3, 4]\npipe.predict([input])\n```\n\nNow data used to train the model has\
    \ `StandardScaler` applied to it, and data input to make predictions is transformed\
    \ the same way.\nWhat if you wanted to use `GridSearchCV` to find the optimum\
    \ set of parameters for a pipeline that combines a data transform and estimator?\
    \ It’s not hard, but there’s a trick you need to know about. It involves using\
    \ class names prefaced with double underscores in the `param_grid` dictionary\
    \ passed to `GridSearchCV`. Here’s an example:\n\n```\npipe = make_pipeline(StandardScaler(),\
    \ SVC())\n\ngrid = {\n    'svc__C': [0.01, 0.1, 1, 10, 100],\n    'svc__gamma':\
    \ [0.01, 0.25, 0.5, 0.75, 1.0],\n    'svc__kernel': ['rbf', 'poly']\n}\n\ngrid_search\
    \ = GridSearchCV(estimator=pipe, param_grid=grid, cv=5, verbose=2)\ngrid_search.fit(x,\
    \ y) # Train the model with different parameter combinations\n```\n\nThis example\
    \ trains the model 250 times to find the best combination of `kernel`, `C`, and\
    \ `gamma` for the SVC instance in the pipeline. Note the “svc__” nomenclature,\

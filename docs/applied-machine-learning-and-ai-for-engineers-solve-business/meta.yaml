    # Summary


    Deep learning is a subset of machine learning that relies on deep neural networks,
    and it is the root of modern AI. It’s how computers identify objects in images,
    translate text and speech into other languages, generate artwork and music, and
    perform other tasks that were virtually impossible a few years ago.


    The multilayer perceptron is a simple neural network comprising layers of neurons.
    Each neuron turns input into output using a simple mathematical formula. Activation
    functions further transform the data as it passes between layers by introducing
    nonlinearities, enabling neural networks to fit to a variety of datasets. Hidden
    layers between the input layer and the output layer perform the bulk of the computational
    work, and a multilayer perceptron with many hidden layers is referred to as a
    deep neural network.


    Training a neural network fits it to a dataset by iteratively adjusting weights
    and biases—the weights connecting neurons in adjacent layers and the biases assigned
    to the neurons themselves—to produce the desired outcome. The backpropagation
    passes that adjust the weights and biases are the heart of the training regimen.
    The component responsible for making adjustments is the optimizer; its ultimate
    goal is to find the optimum combination of weights and biases with as few backpropagation
    passes as possible.


    Now that you understand how neural networks work, the next step is to learn how
    to build and train them. For that, data scientists rely on frameworks such as
    Keras and TensorFlow. [Chapter 9](https://example.com/chapter9) begins a deep
    dive into both.'

    \ City cabs? Consider that rush-hour traffic is likely to be heavier on Friday\
    \ afternoon than on Saturday afternoon.\n\n## Summary\n\nRegression models are\
    \ supervised learning models that predict numeric outcomes such as the cost of\
    \ a taxi ride. Prominent learning algorithms used for regression include the following:\n\
    \n- **Linear regression**: Models training data by fitting it to the equation\
    \ of a line.\n- **Decision trees**: Use binary trees to predict an outcome by\
    \ answering a series of yes-and-no questions.\n- **Random forests**: Use multiple\
    \ independent decision trees to model the data and are resistant to overfitting.\n\
    - **Gradient-boosting machines**: Use multiple *dependent* decision trees, each\
    \ modeling the error in the output from the last.\n- **Support vector machines**:\
    \ Take an entirely different approach to modeling data by adding dimensionality\
    \ under the supposition that data that isn’t linearly separable in the original\
    \ problem space might be linearly separable in higher-dimensional space.\n\nScikit\
    \ provides convenient implementations of these and other learning algorithms in\
    \ classes such as `LinearRegression`, `RandomForestRegressor`, and `GradientBoostingRegressor`.\n\
    \nA common metric for quantifying the accuracy of regression models is the $R^2$\
    \ score, also known as the coefficient of determination. It’s typically a value\
    \ from 0 to 1, with higher numbers indicating higher accuracy. Technically, it’s\
    \ a measure of the variance in the output that can be explained by the values\
    \ in the input. For small datasets, $k$-fold cross-validation gives you more confidence\
    \ in the $R^2$ score than simply splitting the data once for training and testing.\
    \ $k$-fold trains the model $k$ times, each time with the dataset split differently.\n\
    \nReal-world datasets tend to be messy and often require further preparation to\
    \ be useful for machine learning. As the taxi-fare example demonstrated, outliers\
    \ in training data can affect a model’s accuracy or prevent the model from being\
    \ useful at all. One solution is to identify the outliers and remove them before\
    \ training the model. Another is to employ a learning algorithm such as ridge\
    \ regression or lasso regression that supports regularization.\n\nRegression models\
    \ are common in machine learning, but classification models are more common still.\
    \ [Chapter 3](Chapter 3) tackles classification models head-on, introduces another\
    \ leading learning algorithm called logistic regression, and builds on what you\
    \ learned in this chapter.\n\n## Chapter 3. Classification Models\n\nThe machine\
    \ learning model featured in the previous chapter used various forms of regression\
    \ to predict taxi fares based on distance to travel, the day of the week, and\
    \ the time of day. Regression models predict numerical outcomes and are widely\
    \ used in industry to forecast sales, prices, demand, and other numbers that drive\
    \ business decisions. Equally important are classification models, which predict\
    \ categorical outcomes such as whether a credit card transaction is fraudulent\
    \ or which letter of the alphabet a handwritten character represents.\n\nMost\
    \ classification models fall into two categories: *binary classification models*,\
    \ in which there are just two possible outcomes, and *multiclass classification\
    \ models*, in which there are more than two possible outcomes. In both instances,\
    \ the model assigns a single class, or *class label*, to an input. Less common\
    \ are *multilabel classification models*, which can classify a single input as\
    \ belonging to several classes—for example, predicting that a document is both\
    \ a paper on machine learning and a paper on genomics. Some can predict that an\
    \ input belongs to none of the possible classes too.\n\nMuch of what you know\
    \ about regression models also applies to classification models. For example,\
    \ many of the learning algorithms that power regression models work equally well\
    \ with classification models. One substantive difference between regression and\
    \ classification is how you measure a model’s accuracy. There’s no such thing\
    \ as an $R^2$ score for a classification model. In its place are an abundance\
    \ of measures, such as precision, recall, specificity, sensitivity, and F1 score,\
    \ to name but a few. One of the keys to becoming proficient with classification\
    \ models is getting comfortable with the various accuracy metrics and, more importantly,\

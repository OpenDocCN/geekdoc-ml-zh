    Other terms you might come across when discussing the accuracy of classification
    models include *sensitivity* and *specificity*. Sensitivity is identical to recall,
    so Scikit doesn''t include a separate method for computing it. Specificity is
    recall for the negative class rather than the positive class and is calculated
    by dividing the number of true negatives by the sum of the true negatives and
    false positives. Scikit doesn''t provide a dedicated function for calculating
    specificity, either, but you can do it easily enough by calling `recall_score`
    with a `pos_label` parameter indicating that 0 (rather than 1) is the positive
    label:


    ```

    recall_score(y_test, y_predicted, pos_label=0)

    ```


    Sensitivity and specificity are frequently used in drug testing and cancer screening.
    Suppose you''re traveling abroad and require a negative COVID test before returning
    home. If you don''t have COVID, what are the chances that a test will incorrectly
    say you do? (I have asked myself that question many times recently while traveling
    overseas.) The answer is the test''s specificity—a measure of how accurate the
    test is at identifying negative samples. Sensitivity, on the other hand, reveals
    how likely the test is to be correct if it says you *do* have COVID. It''s a subtle
    distinction, but an important one if you''re concerned that a faulty test might
    keep you from going home (specificity) or if you want to be certain you don''t
    have COVID before visiting an elderly relative (sensitivity).


    # Categorical Data


    Machine learning finds patterns in numbers. It works *only* with numbers. Yet
    many datasets have columns containing string values such as "male" and "female"
    or "red", "green", and "blue". Data scientists refer to these as *categorical
    values* and the columns that contain them as *categorical columns*. Machine learning
    can''t handle categorical values directly. To use them in a model, you must convert
    them into numbers.


    Two popular techniques exist for converting categorical values into numerical
    values. One is *label encoding*, which you briefly saw in the *k*-means clustering
    example in Chapter 1. Label encoding replaces categorical values with integers.
    If there are three unique values in a column, label encoding replaces them with
    0s, 1s, and 2s. To demonstrate, run the following code in a Jupyter notebook:


    ```

    import pandas as pd

    from sklearn.preprocessing import LabelEncoder


    data = [[10, ''red''], [20, ''blue''], [12, ''red''], [16, ''green''], [22, ''blue'']]

    df = pd.DataFrame(data, columns=[''Length'', ''Color''])


    encoder = LabelEncoder()

    df[''Color''] = encoder.fit_transform(df[''Color''])

    ```'

- md: '## Training a Neural Network to Detect Credit Card Fraud


    Let’s train a neural network to detect credit card fraud. Begin by [downloading
    a ZIP file](http://example.com) containing the dataset if you haven’t already
    and copying `creditcard.csv` from the ZIP file into your notebooks’ `Data` subdirectory.
    It’s the same one used in Chapters 3 and 6. It contains information about 284,808
    credit card transactions, including the amount of each transaction and a label:
    0 for legitimate transactions and 1 for fraudulent transactions. It also contains
    28 columns named V1 through V28 whose meaning has been obfuscated with principal
    component analysis. The dataset is highly imbalanced, containing fewer than 500
    examples of fraudulent transactions.


    Use the history object returned by `fit` to plot the training and validation accuracy
    for each epoch:


    ```python

    %matplotlib inline

    import matplotlib.pyplot as plt

    import seaborn as sns

    sns.set()


    err = hist.history[''mae'']

    val_err = hist.history[''val_mae'']

    epochs = range(1, len(err) + 1)


    plt.plot(epochs, err, ''-'', label=''Training MAE'')

    plt.plot(epochs, val_err, '':'', label=''Validation MAE'')

    plt.title(''Training and Validation Accuracy'')

    plt.xlabel(''Epoch'')

    plt.ylabel(''Mean Absolute Error'')

    plt.legend(loc=''upper right'')

    plt.plot()

    ```


    Your results will be slightly different from mine, but they should look something
    like this:


    The final validation MAE was about 2.25, which means that on average, a taxi fare
    predicted by this network should be accurate to within about $2.25.


    Recall from Chapter 2 that a common accuracy measure for regression models is
    the coefficient of determination, or $R^2$ score. Keras doesn''t have a function
    for computing $R^2$ scores, but Scikit does. To that end, use the following statements
    to compute $R^2$ for the network:


    ```python

    from sklearn.metrics import r2_score


    r2_score(y, model.predict(x))

    ```


    Again, your results will differ from mine but will probably land at around 0.75.


    Finish up by using the model to predict what it will cost to hire a taxi for a
    2-mile trip at 5:00 p.m. on Friday:


    ```python

    import numpy as np


    model.predict(np.array([[4, 17, 2.0]]))

    ```


    Now predict the fare amount for a 2-mile trip taken at 5:00 p.m. one day later
    (on Saturday):


    ```python

    model.predict(np.array([[5, 17, 2.0]]))

    ```


    Does the model predict a higher or lower fare amount for the same trip on Saturday
    afternoon? Do the results make sense given that the data comes from New York City
    cabs?


    Before you close out this notebook, use it as a basis for further experimentation.
    Here are a few things you can try in order to gain further insights into neural
    networks:


    - Run the notebook from start to finish a few times and note the differences in
    $R^2$ scores as well as the MAE curves. Remember that neural networks are initialized
    with random weights each time they’re created, and additional randomness during
    the training process further ensures that the results will vary from run to run.

    - Vary the width of the hidden layers. I used 512 neurons in each layer and found
    that doing so produced acceptable results. Would 128, 256, or 1,024 neurons per
    layer improve the accuracy? Try it and find out. Since the results will vary slightly
    from one run to the next, it might be useful to train the network several times
    in each configuration and average the results.

    - Vary the batch size. What effect does that have on training time, and why? How
    about the effect on accuracy?


    Finally, try reducing the network to *one hidden layer* containing just 16 neurons.
    Train it again and check the $R^2$ score. Does the result surprise you? How many
    trainable parameters does this network contain?


    # Binary Classification with Neural Networks


    One of the common uses for machine learning is binary classification, which looks
    at an input and predicts which of two possible classes it belongs to. Practical
    uses include sentiment analysis, spam filtering, and fraud detection. Such models
    are trained with datasets labeled with 1s and 0s representing the two classes,
    employ popular learning algorithms such as logistic regression and Naive Bayes,
    and are frequently built with libraries such as Scikit-Learn.


    Deep learning can be used for binary classification too. In fact, building a neural
    network that acts as a binary classifier is not much different than building one
    that acts as a regressor. In the previous section, you built a neural network
    that solved a regression problem. That network had an input layer that accepted
    three values—distance to travel, hour of the day, and day of the week—and output
    a predicted taxi fare. Building a neural network that performs binary classification
    involves making two simple changes:


    - Add an activation function—specifically, the `sigmoid` activation function—to
    the output layer. `sigmoid` produces a value from 0.0 to 1.0 representing the
    probability that the input belongs to the positive class. For a reminder of what
    a sigmoid function does, refer to the discussion of logistic regression in Chapter
    3.

    - Change the loss function to `binary_crossentropy`, which is purpose-built for
    binary classifiers. Accordingly, change `metrics` to ''[accuracy]'' so that accuracies
    computed by the loss function are captured in the history object returned by `fit`.


    Here’s a network designed to perform binary classification rather than regression:


    ```python

    from tensorflow.keras.models import Sequential

    from tensorflow.keras.layers import Dense


    model = Sequential()

    model.add(Dense(512, activation=''relu'', input_dim=3))

    model.add(Dense(512, activation=''relu''))

    model.add(Dense(1, activation=''sigmoid''))

    model.compile(optimizer=''adam'', loss=''binary_crossentropy'', metrics=[''accuracy''])

    ```


    That’s it. That’s all it takes to create a neural network that serves as a binary
    classifier. You still call `fit` to train the network, and you use the returned
    history object to plot the training and validation accuracy to determine whether
    you trained for a sufficient number of epochs and see how well the network fit
    to the data.


    > **NOTE**


    What is binary cross-entropy, and what does it do to help a binary classifier
    converge on a solution? During training, the cross-entropy loss function exponentially
    increases the penalty for wrong outputs to drive the weights and biases more aggressively
    in the right direction.


    Let’s say a sample belongs to the positive class (its label is 1), and the network
    predicts that the probability it’s a 1 is 0.9. The cross-entropy loss, also known
    as *log loss*, is -log(0.9), which is 0.04. But if the network outputs a probability
    of 0.1 for the same sample, the error is -log(0.1), which equals 1. What’s significant
    is that if the predicted probability is *really* wrong, the penalty is much higher.
    If the sample is a 1 and the network says the probability it’s a 1 is a mere 0.0001,
    the cross-entropy loss is -log(0.0001), or 4. Cross-entropy loss basically pats
    the optimizer on the back when it’s close to the right answer and slaps it on
    the hand when it’s not. The worse the prediction, the harder the slap.


    To sum up, you build a neural network that performs binary classification by including
    a single neuron with `sigmoid` activation in the output layer and specifying `binary_crossentropy`
    as the loss function. The output from the network is a probability from 0.0 to
    1.0 that the input belongs to the positive class. Doesn’t get much simpler than
    that!


    # Making Predictions


    One of the benefits of a neural network is that it can easily fit nonlinear datasets.
    You don’t have to worry about trying different learning algorithms as you do with
    conventional machine learning models; the network *is* the learning algorithm.
    As an example, consider the dataset in Figure 9-3, in which each data point consists
    of an *x*–*y* coordinate pair and belongs to one of two classes.


    The following code trains a neural network to predict a class based on a point’s
    x and y coordinates:


    ```python

    from tensorflow.keras.models import Sequential

    from tensorflow.keras.layers import Dense


    model = Sequential()

    model.add(Dense(128, activation=''relu'', input_dim=2))

    model.add(Dense(1, activation=''sigmoid''))

    model.compile(optimizer=''adam'', loss=''binary_crossentropy'', metrics=[''accuracy''])

    hist = model.fit(x, y, epochs=40, batch_size=10, validation_split=0.2)

    ```


    This network contains just one hidden layer with 128 neurons, and yet a plot of
    the training and validation accuracy reveals that it is remarkably successful
    in separating the classes:


    Once a binary classifier is trained, you make predictions by calling its `predict`
    method. Thanks to the `sigmoid` activation function, `predict` returns a number
    from 0.0 to 1.0 representing the probability that the input belongs to the positive
    class. In this example, purple data points represent the negative class (0), while
    red data points represent the positive class (1). Here the network is asked to
    predict the probability that a data point at (−0.5, 0.0) belongs to the red class:


    ```python

    model.predict(np.array([[-0.5, 0.0]]))

    ```


    The answer is 0.57, which indicates that (−0.5, 0.0) is more likely to be red
    than purple. If you simply want to know which class the point belongs to, do it
    this way:


    ```python

    (model.predict(np.array([[-0.5, 0.0]])) > 0.5).astype(''int32'')

    ```


    The answer is 1, which corresponds to red. Older versions of Keras included a
    `predict_classes` method that did the same without the `astype` cast, but that
    method was recently deprecated and removed.'
  mdcn: '## 训练神经网络检测信用卡欺诈


    让我们训练一个神经网络来检测信用卡欺诈。首先，如果你还没有下载数据集，请[下载一个ZIP文件](http://example.com)，并将`creditcard.csv`从ZIP文件复制到你的笔记本的`Data`子目录中。这与第3章和第6章中使用的数据集相同。它包含284,808笔信用卡交易的信息，包括每笔交易的金额和一个标签：0代表合法交易，1代表欺诈交易。它还包含28个名为V1到V28的列，其含义已通过主成分分析进行了混淆。该数据集高度不平衡，欺诈交易的样本少于500个。


    使用`fit`返回的history对象来绘制每个epoch的训练和验证准确率：


    ```python

    %matplotlib inline

    import matplotlib.pyplot as plt

    import seaborn as sns

    sns.set()


    err = hist.history[''mae'']

    val_err = hist.history[''val_mae'']

    epochs = range(1, len(err) + 1)


    plt.plot(epochs, err, ''-'', label=''Training MAE'')

    plt.plot(epochs, val_err, '':'', label=''Validation MAE'')

    plt.title(''Training and Validation Accuracy'')

    plt.xlabel(''Epoch'')

    plt.ylabel(''Mean Absolute Error'')

    plt.legend(loc=''upper right'')

    plt.plot()

    ```


    你的结果会与我的略有不同，但应该看起来像这样：


    最终的验证MAE约为2.25，这意味着平均而言，该网络预测的出租车费用应准确到约2.25美元以内。


    回顾第2章，回归模型的一个常用准确度度量是决定系数，或$R^2$分数。Keras没有计算$R^2$分数的函数，但Scikit有。为此，使用以下语句计算网络的$R^2$：


    ```python

    from sklearn.metrics import r2_score


    r2_score(y, model.predict(x))

    ```


    同样，你的结果会与我的不同，但可能在0.75左右。


    最后，使用该模型预测在周五下午5点雇佣一辆出租车行驶2英里的费用：


    ```python

    import numpy as np


    model.predict(np.array([[4, 17, 2.0]]))

    ```


    现在预测一天后（周六）下午5点行驶2英里的费用：


    ```python

    model.predict(np.array([[5, 17, 2.0]]))

    ```


    模型预测周六下午相同行程的费用是更高还是更低？考虑到数据来自纽约市出租车，结果是否合理？


    在关闭此笔记本之前，将其作为进一步实验的基础。以下是一些你可以尝试的事情，以进一步了解神经网络：


    - 从头到尾运行笔记本几次，并注意$R^2$分数以及MAE曲线的差异。请记住，神经网络每次创建时都以随机权重初始化，训练过程中的额外随机性进一步确保了每次运行的结果会有所不同。

    - 改变隐藏层的宽度。我在每层使用了512个神经元，并发现这样做产生了可接受的结果。每层使用128、256或1,024个神经元会提高准确率吗？试一试就知道了。由于每次运行的结果会略有不同，因此在每种配置下训练网络几次并平均结果可能很有用。

    - 改变批处理大小。这对训练时间有什么影响，为什么？对准确率有什么影响？


    最后，尝试将网络简化为*一个隐藏层*，仅包含16个神经元。再次训练它并检查$R^2$分数。结果是否让你惊讶？这个网络包含多少个可训练参数？


    # 使用神经网络进行二元分类


    机器学习的常见用途之一是二元分类，它查看输入并预测它属于两个可能类别中的哪一个。实际应用包括情感分析、垃圾邮件过滤和欺诈检测。此类模型使用标记为1和0的数据集进行训练，代表两个类别，采用流行的学习算法，如逻辑回归和朴素贝叶斯，并且通常使用Scikit-Learn等库构建。


    深度学习也可用于二元分类。事实上，构建一个充当二元分类器的神经网络与构建一个充当回归器的神经网络没有太大区别。在上一节中，你构建了一个解决回归问题的神经网络。该网络有一个输入层，接受三个值——行驶距离、一天中的小时和星期几——并输出预测的出租车费用。构建执行二元分类的神经网络涉及两个简单的更改：


    - 在输出层添加一个激活函数——具体来说，是`sigmoid`激活函数。`sigmoid`产生一个从0.0到1.0的值，表示输入属于正类的概率。要回顾sigmoid函数的作用，请参阅第3章中关于逻辑回归的讨论。

    - 将损失函数更改为`binary_crossentropy`，这是专门为二元分类器设计的。相应地，将`metrics`更改为''[accuracy]''，以便损失函数计算的准确率被捕获在`fit`返回的history对象中。


    这是一个设计用于执行二元分类而非回归的网络：


    ```python

    from tensorflow.keras.models import Sequential

    from tensorflow.keras.layers import Dense


    model = Sequential()

    model.add(Dense(512, activation=''relu'', input_dim=3))

    model.add(Dense(512, activation=''relu''))

    model.add(Dense(1, activation=''sigmoid''))

    model.compile(optimizer=''adam'', loss=''binary_crossentropy'', metrics=[''accuracy''])

    ```


    就是这样。这就是创建一个充当二元分类器的神经网络所需的全部。你仍然调用`fit`来训练网络，并使用返回的history对象来绘制训练和验证准确率，以确定你是否训练了足够的epoch，并查看网络对数据的拟合程度。


    > **注意**


    什么是二元交叉熵，它如何帮助二元分类器收敛到一个解决方案？在训练期间，交叉熵损失函数指数级地增加对错误输出的惩罚，以更积极地将权重和偏差推向正确的方向。


    假设一个样本属于正类（其标签为1），并且网络预测其为1的概率为0.9。交叉熵损失，也称为*对数损失*，是-log(0.9)，即0.04。但如果网络对同一样本输出的概率为0.1，则误差为-log(0.1)，等于1。重要的是，如果预测概率*真的*错了，惩罚会高得多。如果样本是1，而网络说它是1的概率仅为0.0001，则交叉熵损失为-log(0.0001)，即4。交叉熵损失基本上在优化器接近正确答案时拍拍它的背，在它不接近时打它的手。预测越差，打得越重。


    总而言之，你通过在输出层包含一个具有`sigmoid`激活的单个神经元并指定`binary_crossentropy`作为损失函数来构建执行二元分类的神经网络。网络的输出是一个从0.0到1.0的概率，表示输入属于正类。没有比这更简单的了！


    # 进行预测


    神经网络的好处之一是它可以轻松拟合非线性数据集。你不必像使用传统机器学习模型那样尝试不同的学习算法；网络*就是*学习算法。例如，考虑图9-3中的数据集，其中每个数据点由一个*x*–*y*坐标对组成，并属于两个类别之一。


    以下代码训练一个神经网络，根据点的x和y坐标预测类别：


    ```python

    from tensorflow.keras.models import Sequential

    from tensorflow.keras.layers import Dense


    model = Sequential()

    model.add(Dense(128, activation=''relu'', input_dim=2))

    model.add(Dense(1, activation=''sigmoid''))

    model.compile(optimizer=''adam'', loss=''binary_crossentropy'', metrics=[''accuracy''])

    hist = model.fit(x, y, epochs=40, batch_size=10, validation_split=0.2)

    ```


    这个网络只有一个包含128个神经元的隐藏层，但训练和验证准确率的图表显示它在分离类别方面非常成功：


    一旦二元分类器训练完成，你通过调用其`predict`方法进行预测。由于`sigmoid`激活函数，`predict`返回一个从0.0到1.0的数字，表示输入属于正类的概率。在这个例子中，紫色数据点代表负类（0），而红色数据点代表正类（1）。这里要求网络预测位于(-0.5,
    0.0)的数据点属于红色类的概率：


    ```python

    model.predict(np.array([[-0.5, 0.0]]))

    ```


    答案是0.57，这表明(-0.5, 0.0)更可能是红色而不是紫色。如果你只想知道该点属于哪个类别，可以这样做：


    ```python

    (model.predict(np.array([[-0.5, 0.0]])) > 0.5).astype(''int32'')

    ```


    答案是1，对应于红色。旧版本的Keras包含一个`predict_classes`方法，无需`astype`转换即可执行相同操作，但该方法最近已被弃用并移除。'

- md: "## 识别雨林中的非法伐木声音\n\n本节教程的灵感来源于雨林连接项目，该项目使用回收的Android手机来监测雨林中的非法活动声音。一个托管在云端的TensorFlow卷积神经网络分析来自这些手机的音频，未来可能借助TensorFlow\
    \ Lite（一个专为移动、嵌入式和边缘设备设计的TensorFlow精简版）直接在手机上运行。更多信息，请参阅Google AI博客中的“用TensorFlow对抗非法砍伐森林”。这只是AI让世界变得更美好的一个例子。\n\
    \n首先，下载一个包含雨林声音数据集的ZIP文件。（警告：文件大小为666 MB。）在你的笔记本电脑所在的目录下创建一个名为 *Sounds* 的子目录，并将ZIP文件的内容复制到该子目录中。*Sounds*\
    \ 现在包含名为 *background*、*chainsaw*、*engine* 和 *storm* 的子目录。每个子目录包含100个WAV文件。*background*\
    \ 目录中的WAV文件仅包含雨林背景噪音，而其他子目录中的文件则包含叠加在背景噪音上的电锯声、发动机声和雷暴声。我使用名为Scaper的声音景观合成包，将公共UrbanSound8K数据集中的声音与雨林声音结合，生成了这些文件。在你的电脑上播放几个WAV文件，感受一下它们包含的声音。\n\
    \n现在创建一个Jupyter笔记本，并将以下代码粘贴到第一个单元格中：\n\n```python\nimport numpy as np\nimport\
    \ librosa.display, os\nimport matplotlib.pyplot as plt\n%matplotlib inline\n\n\
    def create_spectrogram(audio_file, image_file):\n    fig = plt.figure()\n    ax\
    \ = fig.add_subplot(1, 1, 1)\n    fig.subplots_adjust(left=0, right=1, bottom=0,\
    \ top=1)\n\n    y, sr = librosa.load(audio_file)\n    ms = librosa.feature.melspectrogram(y=y,\
    \ sr=sr)\n    log_ms = librosa.power_to_db(ms, ref=np.max)\n    librosa.display.specshow(log_ms,\
    \ sr=sr)\n\n    fig.savefig(image_file)\n    plt.close(fig)\n\ndef create_pngs_from_wavs(input_path,\
    \ output_path):\n    if not os.path.exists(output_path):\n        os.makedirs(output_path)\n\
    \n    dir = os.listdir(input_path)\n    for i, file in enumerate(dir):\n     \
    \   input_file = os.path.join(input_path, file)\n        output_file = os.path.join(output_path,\
    \ file.replace('.wav', '.png'))\n        create_spectrogram(input_file, output_file)\n\
    ```\n\n这段代码定义了一对函数，用于将WAV文件转换为频谱图图像。`create_spectrogram` 使用名为Librosa的Python包从WAV文件创建频谱图图像。`create_pngs_from_wavs`\
    \ 将指定目录中的所有WAV文件转换为频谱图图像。如果尚未安装Librosa，你需要安装它。\n\n使用以下语句从 *Sounds* 目录的子目录中的所有WAV文件创建包含频谱图的PNG文件：\n\
    \n```python\ncreate_pngs_from_wavs('Sounds/background', 'Spectrograms/background')\n\
    create_pngs_from_wavs('Sounds/chainsaw', 'Spectrograms/chainsaw')\ncreate_pngs_from_wavs('Sounds/engine',\
    \ 'Spectrograms/engine')\ncreate_pngs_from_wavs('Sounds/storm', 'Spectrograms/storm')\n\
    ```\n\n检查 *Spectrograms* 目录，确认其中包含频谱图的子目录，并且每个子目录包含100个PNG文件。然后使用以下代码定义两个新的辅助函数，用于加载和显示频谱图，并声明两个Python列表——一个用于存储频谱图图像，另一个用于存储类别标签：\n\
    \n```python\nfrom tensorflow.keras.preprocessing import image\n\ndef load_images_from_path(path,\
    \ label):\n    images, labels = [], []\n\n    for file in os.listdir(path):\n\
    \        images.append(image.img_to_array(image.load_img(os.path.join(path, file),\n\
    \                                                       target_size=(224, 224,\
    \ 3))))\n        labels.append((label))\n\n    return images, labels\n\ndef show_images(images):\n\
    \    fig, axes = plt.subplots(1, 8, figsize=(20, 20),\n                      \
    \      subplot_kw={'xticks': [], 'yticks': []})\n\n    for i, ax in enumerate(axes.flat):\n\
    \        ax.imshow(images[i] / 255)\n\nx, y = [], []\n```\n\n使用以下语句加载背景频谱图图像，将它们添加到名为x的列表中，并用0标记它们：\n\
    \n```python\nimages, labels = load_images_from_path('Spectrograms/background',\
    \ 0)\nshow_images(images)\n\nx += images\ny += labels\n```\n\n重复此过程，从 *Spectrograms/chainsaw*\
    \ 目录加载电锯频谱图，从 *Spectrograms/engine* 目录加载发动机频谱图，从 *Spectrograms/storm* 目录加载雷暴频谱图。用电锯频谱图标记为1，发动机频谱图标记为2，雷暴频谱图标记为3。以下是四类图像的标签：\n\
    \n| 频谱图类型 | 标签 |\n|---|---|\n| 背景 | 0 |\n| 电锯 | 1 |\n| 发动机 | 2 |\n| 雷暴 | 3 |\n\
    \n由于这个模型未来可能在手机上运行，我们将使用MobileNetV2作为基础网络。使用以下代码预处理像素，并将图像和标签分成两个数据集——一个用于训练，一个用于测试：\n\
    \n```python\nfrom sklearn.model_selection import train_test_split\nfrom tensorflow.keras.applications.mobilenet\
    \ import preprocess_input\n\nx = preprocess_input(np.array(x))\ny = np.array(y)\n\
    \nx_train, x_test, y_train, y_test = train_test_split(x, y, stratify=y,\n    \
    \                                                test_size=0.3,\n            \
    \                                        random_state=0)\n```\n\n调用Keras的 `MobileNetV2`\
    \ 函数实例化不包含分类层的MobileNetV2。然后将训练数据和测试数据通过MobileNetV2，从频谱图图像中提取特征：\n\n```python\n\
    from tensorflow.keras.applications import MobileNetV2\n\nbase_model = MobileNetV2(weights='imagenet',\
    \ include_top=False,\n                        input_shape=(224, 224, 3))\n\ntrain_features\
    \ = base_model.predict(x_train)\ntest_features = base_model.predict(x_test)\n\
    ```\n\n定义一个神经网络来对MobileNetV2提取的特征进行分类：\n\n```python\nfrom tensorflow.keras.models\
    \ import Sequential\nfrom tensorflow.keras.layers import Dense, Flatten\n\nmodel\
    \ = Sequential()\nmodel.add(Flatten())\nmodel.add(Dense(512, activation='relu'))\n\
    model.add(Dense(4, activation='softmax'))\nmodel.compile(optimizer='adam', loss='sparse_categorical_crossentropy',\n\
    \              metrics=['accuracy'])\n```\n\n> **注意**\n\n作为一个实验，我将Flatten层替换为GlobalAveragePooling2D层。验证准确率略有提高，但当使用从纪录片视频中提取的音频进行测试时，模型的泛化能力变差了。这强调了第9章的一个重要观点：只有当模型用它从未见过的数据进行测试时——最好是来自不同来源的数据——你才能完全信任和确信该模型。\n\
    \n使用特征训练网络：\n\n```python\nhist = model.fit(train_features, y_train,\n        \
    \         validation_data=(test_features, y_test),\n                 batch_size=10,\
    \ epochs=10)\n```\n\n绘制训练和验证准确率：\n\n```python\nimport seaborn as sns\nsns.set()\n\
    \nacc = hist.history['accuracy']\nval_acc = hist.history['val_accuracy']\nepochs\
    \ = range(1, len(acc) + 1)\n\nplt.plot(epochs, acc, '-', label='Training Accuracy')\n\
    plt.plot(epochs, val_acc, ':', label='Validation Accuracy')\nplt.title('Training\
    \ and Validation Accuracy')\nplt.xlabel('Epoch')\nplt.ylabel('Accuracy')\nplt.legend(loc='lower\
    \ right')\nplt.plot()\n```\n\n验证准确率应达到95%或更高：\n\n![](img/628b9a382d0944bbfa786c66bc651b50_238_0.png)\n\
    \n将测试图像输入网络，并使用混淆矩阵评估结果：\n\n```python\nfrom sklearn.metrics import ConfusionMatrixDisplay\
    \ as cmd\n\nsns.reset_orig()\nfig, ax = plt.subplots(figsize=(4, 4))\nax.grid(False)\n\
    \ny_pred = model.predict(test_features)\nclass_labels = ['background', 'chainsaw',\
    \ 'engine', 'storm']\n\ncmd.from_predictions(y_test, y_pred.argmax(axis=1),\n\
    \                     display_labels=class_labels, colorbar=False,\n         \
    \            cmap='Blues', xticks_rotation='vertical', ax=ax)\n```\n\n该网络在识别不包含电锯或发动机声音的片段方面相当擅长。它有时会混淆电锯声和发动机声。这没关系，因为这两种声音中的任何一种都可能表明雨林中存在非法活动：\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_239_0.png)\n\n*Sounds* 目录中有一个名为 *samples*\
    \ 的子目录，其中包含CNN既未训练也未验证过的WAV文件。这些WAV文件与用于训练和测试的样本无关；它们来自一个记录巴西打击非法砍伐森林努力的YouTube视频。让我们使用你刚刚训练的模型来分析这些文件中的伐木活动声音。\n\
    \n首先，从第一个样本WAV文件创建一个频谱图，该文件包含伐木者在亚马逊砍伐树木的音频："

    ## About the Author


    **Jeff Prosise** is an engineer whose passion is to introduce other engineers
    and software developers to the wonders of AI and machine learning. Cofounder of
    Wintellect, he has written nine books and hundreds of magazine articles, trained
    thousands of developers at Microsoft, and spoken at some of the world’s largest
    software conferences. In another life, Jeff worked on high-powered laser systems
    and fusion-energy research at Oak Ridge National Laboratory and Lawrence Livermore
    National Laboratory. In his spare time, he builds and flies large radio-control
    jets and goes out of his way to get wet in the world’s best dive spots. Following
    the acquisition of his company in 2021, Jeff serves as chief learning officer
    at Atmosera, where he helps customers infuse AI into their products.


    ## Colophon


    The animal on the cover of *Applied Machine Learning and AI for Engineers* is
    a festive parrot (*Amazona festiva*), also known as a festive amazon. Festive
    parrots live in the tropical forests, woodlands, and coastal mangroves of several
    South American countries, including Brazil, Colombia, Ecuador, Peru, and Bolivia.
    They are rarely found far from water.


    Festive parrots are brightly—you might even say *festively*—colored, medium-sized
    birds. Their plumage is predominantly a striking green, turning slightly yellow
    toward the edges of their wings. A motley assortment of colors—including red,
    blue, and sometimes yellow or orange—adorns their faces.


    Festive parrots are a highly social species, usually spotted in pairs or small
    flocks. Large groups of the birds often gather at night for communal roosts or
    around a localized food source and are known for being incredibly noisy. They
    enjoy eating fruits such as mangoes and peach palm, with berries, nuts, seeds,
    flowers, and leaf buds supplementing their diet.


    While still relatively common where their forest habitat remains largely intact,
    festive parrots have been categorized by IUCN as *near threatened* due to continued
    deforestation and predicted declines in habitat. Many of the animals on O’Reilly
    covers are endangered; all of them are important to the world.


    The cover illustration is by Karen Montgomery, based on an antique line engraving
    from Wood’s *Illustrated Natural History*. The cover fonts are Gilroy Semibold
    and Guardian Sans. The text font is Adobe Minion Pro; the heading font is Adobe
    Myriad Condensed; and the code font is Dalton Maag’s Ubuntu Mono.'

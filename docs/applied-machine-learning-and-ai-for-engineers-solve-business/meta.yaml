  md: '# Foreword


    When your dad is insatiably curious about what you are studying, home is not a
    safe harbor.


    I received my master’s in analytics in 2018. Through the course of my graduate
    school program, my cohort learned how to leverage machine learning, AI, and analytics
    to add value to businesses and develop solutions for real-world challenges. I
    have a passion for these things—a passion that I share with my dad, Jeff Prosise.
    In fact, I can’t tell you the number of times he asked if he could join me in
    class (I’m not kidding) or launched a salvo of questions about what we were studying
    in the kitchen when I escaped the grind at my parents’ house.


    If you have ever been on an airplane experiencing turbulence and the person next
    to you coped by striking up a conversation about what a marvel of engineering
    modern jetliners are because they do not have a single point of failure, you know
    exactly how I felt.


    Our love of data and analytics grew into a shared love of the value it provides.
    Using the tools and techniques outlined in this book, one can draw certitude in
    the face of uncertainty. Data science allows you to find underlying truth—to discover
    what is really happening and how it drives behaviors and outcomes. The ability
    to peek behind the curtain using analytics, rather than intuition, is an appreciating
    skill set in our information economy and is vital for people and institutions
    navigating modern uncertainty.


    Equally important is effectively communicating these findings to a nontechnical
    audience while having a deep technical understanding of just what is going on
    under the hood. This level of communication can’t be faked (I’ve tried a time
    or two during those kitchen discussions with my dad).


    Analytics, AI, and machine learning do not have insurmountable technical or deployment

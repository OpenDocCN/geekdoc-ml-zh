    Another takeaway is that each 28 × 28 image exits the first convolution layer
    as a 3D array or *tensor* measuring 26 × 26 × 32: one 26 × 26 feature map for
    each of the 32 kernels. After max pooling, the tensor is reduced to 13 × 13 ×
    32 and input to the second convolution layer, where 64 more kernels filter features
    from the thirty-two 13 × 13 feature maps and combine them to produce 64 new feature
    maps (a tensor measuring 11 × 11 × 64). A final pooling layer reduces that to
    5 × 5 × 64. These values are flattened into a 1D tensor containing 1,600 values
    and fed into a dense layer for classification.


    > **NOTE**


    The big picture here is that the CNN transforms each 28 × 28 image comprising
    784 pixel values into an array of 1,600 floating-point numbers that (hopefully)
    distinguishes the contents of the image more clearly than ordinary pixel values
    do. That''s what bottleneck layers do: they transform *matrices of integer pixel
    values* into *tensors of floating-point numbers* that better characterize the
    images input to them. As you''ll see in Chapter 13, NLP networks use *word embeddings*
    to create dense vector representations of the words in a document. *Dense vector
    representation* is a term you''ll encounter a lot in deep learning. It''s nothing
    more than arrays of floating-point numbers that do more to characterize the input
    than the input data itself.


    The output from summary would look exactly the same if the images input to the
    network were three-channel color images rather than one-channel grayscale images.
    Applying a convolution layer with *n* kernels to an image produces *n* feature
    maps regardless of image depth, just as applying a convolution layer featuring
    *n* kernels to the feature maps output by preceding layers produces *n* new feature
    maps regardless of input depth. Internally, CNNs use *tensor dot products* to
    produce 2D feature maps from 3D feature maps. Python''s NumPy library includes
    a function named tensordot for computing tensor dot products quickly.



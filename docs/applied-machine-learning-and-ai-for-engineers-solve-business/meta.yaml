    model.compile(optimizer=''adam'', loss=''mae'', metrics=[''mae''])

    model.summary()

    ```


    The call to `summary` in the last statement produces a concise summary of the
    network topology, including the number of *trainable parameters*—weights and biases
    that can be adjusted to fit the network to a dataset (Figure 9-2). For a given
    layer, the parameter count is the product of the number of neurons in that layer
    and the previous layer (the number of weights connecting the neurons in the two
    layers) plus the number of neurons in the layer (the biases associated with those
    neurons). This network is a relatively simple one, and yet it features more than
    a quarter million knobs and dials that can be adjusted to fit it to a dataset.



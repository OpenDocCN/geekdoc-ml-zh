    \n对于给定的问题，存在*无限多种权重和偏置的组合*可以产生期望的结果。**图8-5**展示了使用完全不同的一组权重和偏置的相同网络。然而，如果你将这些值代入前面的代码（或手动通过网络传播值），你会发现该网络同样能够计算2加2——或者其他小数值的加法。\n\
    \n给定一组权重和偏置，使用神经网络进行预测非常简单。它不过是乘法和加法。但要找出一组初始的权重和偏置却是一个挑战。这就是为什么神经网络必须被*训练*。\n\
    \n## 训练神经网络\n\n训练传统的机器学习模型是将其拟合到数据集。神经网络也需要训练，正是在训练过程中计算出权重和偏置。权重通常用小的随机数初始化。偏置通常用0初始化。在未训练状态下，神经网络除了生成随机输出外几乎做不了什么。一旦训练完成，权重和偏置使网络能够区分狗和猫、将书评翻译成另一种语言，或执行其设计的任何其他任务。\n\
    \n当神经网络被训练时会发生什么？从高层次来看，训练样本被输入网络，使用*损失函数*计算误差（计算输出与正确输出之间的差异），然后*反向传播算法*反向遍历网络，调整权重和偏置（图8-6）。这个过程会重复进行，直到误差足够小。每次迭代，权重和偏置都会逐步变得更加精确，误差也相应地减小。\n\
    \n反向传播方案中最关键的组件是*优化器*，它在每次反向传播时决定调整权重和偏置的幅度和方向（正向或负向）。数据科学家不断努力寻找更好、更高效的优化器，以更准确、更快速地训练网络。\n\
    \n搜索“神经网络”，你会发现很多包含复杂数学的文章。大部分数学与优化有关。由于权重和偏置数量庞大，优化器不能仅仅*猜测*如何调整它们。一个包含两个隐藏层、每层1000个神经元的神经网络，层之间有1,000,000个连接，因此有1,000,000个权重需要调整。如果优化策略只是随机猜测，训练将永远无法完成。优化器必须足够智能，才能做出在每次连续迭代中减少误差的调整。\n\
    \n数据科学家使用类似图8-7中的图表来可视化优化器的工作。该图称为*损失景观*。为了可视化，它被简化为三维，但实际上它包含*许多*维度——有时是数百万个维度。彩色的等高线图绘制了不同权重和偏置组合的误差。优化器的目标是遍历等高线，找到产生最小误差的组合，这对应于损失景观中的最低点，或*全局最小值*。\n\
    \n图8-7. 损失景观（来源：Alexander Amini, Ava Soleimany, Sertac Karaman, and Daniela Rus,\
    \ “Spatial Uncertainty Sampling for End-to-End Control,” NeurIPS Bayesian Deep\
    \ Learning [2017], https://arxiv.org/pdf/1805.04829）\n\n优化器的工作并不轻松。它涉及偏导数（计算等高线相对于每个权重和偏置的斜率）、梯度下降（调整权重和偏置以*向下*斜坡移动，而不是向上或横向移动）以及*学习率*，它驱动每次反向传播中对权重和偏置进行的微小调整。如果学习率太大，优化器可能会错过全局最小值。如果太小，网络训练将花费很长时间。现代优化器使用*自适应学习率*，当接近最小值（斜率为0）时采取更小的步长。更复杂的是，优化器必须避免陷入局部最小值，以便继续遍历等高线，朝向误差最小的全局最小值前进。它还必须警惕“鞍点”，即在一个方向上斜率增加，但在垂直方向上斜率下降的点。\n\
    \n> **注意**\n>\n> 如果你研究梯度下降，会遇到诸如*随机梯度下降（SGD）*和*小批量梯度下降（MBGD）*等术语。通过梯度下降进行优化是一个迭代过程，其中样本被前向输入网络，计算梯度，然后梯度与学习率结合以更新权重和偏置。在每个样本前向输入网络后更新权重和偏置计算成本很高，因此训练通常涉及运行一批（可能是30到40个样本）通过网络，平均误差，*然后*执行一次反向传播。这就是MBGD。它加速了训练，并帮助优化器绕过局部最小值。更多信息，以及关于训练神经网络固有挑战的非常易读的介绍，请参阅文章“神经网络是如何训练的”。\n\
    \n神经网络本质上很简单。训练它们在数学上很复杂。幸运的是，你不必理解训练过程中发生的一切就能构建它们。像[Keras](https://keras.io/)和[TensorFlow](https://www.tensorflow.org/)这样的深度学习库将你与数学隔离开来，并提供最先进的优化器来完成繁重的工作。但现在，当你使用这些库之一并被要求选择损失函数和优化器时，你会理解它要求的是什么以及为什么。\n\
    \n## 总结\n\n深度学习是机器学习的一个子集，依赖于深度神经网络，它是现代人工智能的根基。这就是计算机识别图像中的物体、将文本和语音翻译成其他语言、生成艺术作品和音乐，以及执行几年前几乎不可能完成的任务的方式。\n\
    \n多层感知器是一种简单的神经网络，由神经元层组成。每个神经元使用简单的数学公式将输入转换为输出。激活函数通过在数据层间传递时引入非线性，进一步转换数据，使神经网络能够拟合各种数据集。输入层和输出层之间的隐藏层执行大部分计算工作，具有许多隐藏层的多层感知器被称为深度神经网络。\n\
    \n训练神经网络通过迭代调整权重和偏置——连接相邻层神经元的权重和分配给神经元本身的偏置——来将其拟合到数据集，以产生期望的结果。调整权重和偏置的反向传播过程是训练方案的核心。负责进行调整的组件是优化器；其最终目标是以尽可能少的反向传播次数找到权重和偏置的最佳组合。\n\
    \n既然你理解了神经网络的工作原理，下一步就是学习如何构建和训练它们。为此，数据科学家依赖于像Keras和TensorFlow这样的框架。[第9章](https://example.com/chapter9)将开始深入探讨这两者。"

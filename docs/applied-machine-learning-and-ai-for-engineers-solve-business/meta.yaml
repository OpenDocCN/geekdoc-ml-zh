  - "[PAGE 115]\n\n![](img/628b9a382d0944bbfa786c66bc651b50_115_0.png)\n\nSVMs almost\
    \ always train better with normalized data, but the simple normalization performed\
    \ by `MinMaxScaler` sometimes isn’t enough. SVMs tend to respond better to data\
    \ that is normalized to *unit variance* using a technique called *standardization*\
    \ or *Z-score normalization*. Unit variance is achieved by doing the following\
    \ to each column in a dataset:\n\n+   - Computing the mean and standard deviations\
    \ of all the values in the column\n- Subtracting the mean from each value in the\
    \ column\n- Dividing each value in the column by the standard deviation\n\nThis\
    \ is precisely the transform that Scikit’s `StandardScaler` class performs on\
    \ a dataset. Applying unit variance to a dataset is as simple as this:\n\n```\n\
    python\nfrom sklearn.preprocessing import StandardScaler\n\nscaler = StandardScaler()\n\
    normalized_data = scaler.fit_transform(data)\n```\n\nThe values in the original\
    \ dataset may vary wildly from one column to the next, but the transformed dataset\
    \ will contain columns of numbers anchored around 0 with ranges that are proportional\
    \ to each column’s standard deviation. Applying `StandardScaler` to the dataset\
    \ produces the following values in the first 10 rows:\n\n```\n\n[[ 0.93457642\
    \  2.36212718]\n [ 1.95483237 -0.35495682]\n [ 1.56870474  1.05328794]\n [-0.99574783\
    \  1.61403698]\n [ 1.86379415  1.06093451]\n [-0.71007617  0.5486138 ]\n [ 1.05700714\
    \ -0.02615397]]\n```"
  - "[PAGE 116]\n\n```\n[[-0.39363986 -0.26880538]\n [-0.57603023  0.90672853]\n [-0.71384326\
    \  1.4343424 ]]\n```\n\nAnd it produces the distribution shown in Figure 5-12.\
    \ Once more, the shape of the data didn’t change, but the values that *define*\
    \ that shape changed substantially.\n\nSVMs typically perform best when trained\
    \ with standardized data, even if all the columns have similar ranges. (The same\
    \ is true of neural networks, by the way.) The classic case in which columns have\
    \ similar ranges but benefit from normalization anyway is image data, where each\
    \ column holds pixel values from 0 to 255. There are exceptions, but it is usually\
    \ a mistake to throw a bunch of data at an SVM without understanding the distribution\
    \ of the data—specifically, whether it has unit variance.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_116_0.png)\n\
    \n# Pipelining\n\nIf you normalize or standardize the values used to train a machine\
    \ learning model, you must apply the same transform to values input to the model’s\
    \ `predict` method. In other words, if you train a model this way:\n\n```\nmodel\
    \ = SVC()\nscaler = StandardScaler()\nx = scaler.fit_transform(x)\nmodel.fit(x,\

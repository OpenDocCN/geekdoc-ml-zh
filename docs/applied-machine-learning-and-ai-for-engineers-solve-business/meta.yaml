    \ Essentially, the coordinate system has been transformed so that one axis (the\
    \ longer of the two arrows) captures most of the variance in the dataset. This\
    \ is the dataset’s *primary principal component*. The other axis contains a narrower\
    \ range of values and represents the secondary principal component. The number\
    \ of principal components equals the number of dimensions in a dataset, so in\
    \ this example, there are two principal components.\n\nTo reduce a two-dimensional\
    \ dataset to one dimension, PCA finds the two principal components and eliminates\
    \ the one with less variance. This effectively projects the data points onto the\
    \ primary principal component axis, as shown in Figure 6-3. The red data points\
    \ don’t retain all of the information in the original dataset, but they contain\
    \ most of it. In this example, the PCAed dataset retains more than 95% of the\
    \ information in the original. PCA reduced the number of dimensions by 50%, but\
    \ it sacrificed less than 5% of the meaningful information in the dataset. That’s\
    \ the gist of PCA: reducing the number of dimensions without incurring a commensurate\
    \ loss of information.\n\nUnder the hood, PCA works its magic by building a covariance\
    \ matrix that quantifies the variance of each dimension with respect to the others,\
    \ and from the matrix computing eigenvectors and eigenvalues that identify the\
    \ dataset’s principal components. If you’d like to dig deeper, I suggest reading\
    \ “A Step-by-Step Explanation of Principal Component Analysis (PCA)” by Zakaria\
    \ Jaadi. The good news is that you don’t have to understand the math to make PCA\
    \ work, because Scikit-Learn’s PCA class does the math for you. The following\
    \ statements reduce the dataset $x$ to five dimensions, regardless of the number\
    \ of dimensions it originally contains:\n\n```\npca = PCA(n_components=5)\nx =\
    \ pca.fit_transform(x)\n```\n\nYou can also invert a PCA transform to restore\
    \ the original number of dimensions:\n\n```\nx = pca.inverse_transform(x)\n```\n\
    \nThe `inverse_transform` method restores the dataset to its original number of\
    \ dimensions, but it doesn’t restore the original dataset. The information that\
    \ was discarded when the PCA transform was applied will be missing from the restored\
    \ dataset.\n\nYou can visualize the loss of information when a PCA transform is\

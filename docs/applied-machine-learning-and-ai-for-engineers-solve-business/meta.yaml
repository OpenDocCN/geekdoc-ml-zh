  md: 'original dataset, but they contain most of it. In this example, the PCAed dataset
    retains more than 95% of the information in the original. PCA reduced the number
    of dimensions by 50%, but it sacrificed less than 5% of the meaningful information
    in the dataset. That’s the gist of PCA: reducing the number of dimensions without
    incurring a commensurate loss of information.


    Under the hood, PCA works its magic by building a covariance matrix that quantifies
    the variance of each dimension with respect to the others, and from the matrix
    computing eigenvectors and eigenvalues that identify the dataset’s principal components.
    If you’d like to dig deeper, I suggest reading “A Step-by-Step Explanation of
    Principal Component Analysis (PCA)” by Zakaria Jaadi. The good news is that you
    don’t have to understand the math to make PCA work, because Scikit-Learn’s PCA
    class does the math for you. The following statements reduce the dataset $x$ to
    five dimensions, regardless of the number of dimensions it originally contains:


    ```

    pca = PCA(n_components=5)

    x = pca.fit_transform(x)

    ```


    ![](img/628b9a382d0944bbfa786c66bc651b50_127_0.png)


    You can also invert a PCA transform to restore the original number of dimensions:


    ```

    x = pca.inverse_transform(x)

    ```


    The `inverse_transform` method restores the dataset to its original number of
    dimensions, but it doesn’t restore the original dataset. The information that
    was discarded when the PCA transform was applied will be missing from the restored
    dataset.


    You can visualize the loss of information when a PCA transform is applied and
    then inverted using the Labeled Faces in the Wild (LFW) dataset introduced in
    Chapter 5. To demonstrate, fire up a Jupyter notebook and run the following code:'

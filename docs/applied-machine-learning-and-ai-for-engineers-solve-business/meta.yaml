  md: '![](img/628b9a382d0944bbfa786c66bc651b50_243_0.png)


    Figure 11-1. Face detection


    # Face Detection with Viola-Jones


    One of the fastest and most popular algorithms for detecting faces in photos stems
    from a paper published in 2001 titled “Rapid Object Detection Using a Boosted
    Cascade of Simple Features”. Sometimes known as Viola-Jones (the authors of the
    paper), the algorithm keys on the relative intensities of adjacent blocks of pixels.
    For example, the average pixel intensity in a rectangle around the eyes is typically
    darker than the average pixel intensity in a rectangle immediately below that
    area. Similarly, the bridge of the nose is usually lighter than the region around
    the eyes, so two dark rectangles with a bright rectangle in the middle might represent
    two eyes and a nose. The presence of many such Haar-like features in a frame at
    the right locations is an indicator that the frame contains a face (Figure 11-2).


    ![](img/628b9a382d0944bbfa786c66bc651b50_243_1.png)


    Figure 11-2. Face detection using Haar-like features


    Viola-Jones works by sliding windows of various sizes over an image looking for
    frames with Haar-like features in the right places. At each stop, the pixels in
    the window are scaled to a specified size (typically 24 × 24), and features are
    extracted and fed into a binary classifier that returns positive indicating the
    frame contains a face or negative indicating it does not. Then the window slides
    to the next location and the detection regimen begins again.


    The key to Viola-Jones’s performance is the binary classifier. A frame that is
    24 pixels wide and 24 pixels high contains more than 160,000 combinations of rectangles
    representing potential Haar-like'
  merge: -1
  pgno: 243
- img_proc: true
  md: 'features. Rather than compute values for every combination, Viola-Jones computes
    only those that the classifier requires. Furthermore, how many features the classifier
    requires depends on the content of the frame. The classifier is actually several
    binary classifiers arranged in stages. The first stage might require just one
    feature. The second stage might require 10, the third might require 20, and so
    on. Features are extracted and passed to stage *n* only if stage *n* – 1 returns
    positive, giving rise to the term *cascade classifier*.


    Figure 11-3 depicts a three-stage cascade classifier. Each stage is carefully
    tuned to achieve a 100% detection rate using a limited number of features even
    if the false-positive rate is high. In the first stage, one feature determines
    whether the frame contains a face. A positive response means the frame *might*
    contain a face; a negative response means that it most certainly doesn’t, in which
    case no further checks are performed. If stage 1 returns positive, however, 10
    other features are extracted and passed to stage 2. A frame is judged to contain
    a face only if *all* stages return positive, yielding a cumulative false-positive
    rate near zero. In machine learning, this is a design pattern known as *high recall
    then precision* because while individual stages are tuned for high recall, the
    cumulative effect is one of high precision.


    ![](img/628b9a382d0944bbfa786c66bc651b50_244_0.png)


    One benefit of this architecture is that frames lacking faces tend to fall out
    fast because they evoke a negative response early in the cascade. Because most
    frames *don’t* contain faces, the algorithm runs very quickly until it encounters
    a frame that does. In testing with a 38-stage classifier trained on 6,061 features
    from 4,916 facial images, Viola and Jones found that, on average, just 10 features
    were extracted from each frame.


    The efficacy of Viola-Jones depends on the cascade classifier, which is essentially
    a machine learning model trained with facial and nonfacial images. Training is
    slow, but predictions are fast. In some respects, Viola-Jones acts like a CNN
    handcrafted to extract the minimum number of features needed to determine whether
    a frame contains a face. To speed feature extraction, Viola-Jones uses a clever
    mathematical trick called *integral images* to rapidly compute the difference
    in intensity between two blocks of pixels. The result is a system that can identify
    bounding boxes surrounding faces in an image with a relatively high degree of
    accuracy, and it can do so quickly enough to detect faces in live video frames.


    # Using the OpenCV Implementation of Viola-Jones


    OpenCV is a popular open source computer-vision library that’s free for commercial
    use. It provides an implementation of Viola-Jones in its `CascadeClassifier` class,
    along with an XML file containing a cascade classifier trained to detect faces.
    The following statements use `CascadeClassifier` in a Jupyter notebook to detect
    faces in an image and draw rectangles around the faces. You can use an'
  merge: -1
  pgno: 244

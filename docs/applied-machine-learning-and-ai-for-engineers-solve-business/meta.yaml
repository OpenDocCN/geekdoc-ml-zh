    \ shuffle the rows, and extract the first 1,000 rows:\n\n```python\nfrom sklearn.utils\
    \ import shuffle\nfrom sklearn.datasets import fetch_california_housing\n\ndf\
    \ = fetch_california_housing(as_frame=True).frame\ndf = shuffle(df, random_state=0)\n\
    df = df.head(1000)\ndf.head()\n```\n\nThe dataset contains columns with names\
    \ such as `MedInc` (median income) and `MedHouseVal` (median home value), as shown\

- md: "## Handling Unknown Faces: Closed-Set Versus Open-Set Classification\n\nNow\
    \ for some bad news. A VGGFace facial recognition model is adept at identifying\
    \ faces it was trained with, but it doesn’t know what to do when it encounters\
    \ a face it *wasn’t* trained with. Try it: pass in a photo of yourself. The model\
    \ will probably identify you as Jeff, Lori, or Abby, and it might do so with a\
    \ high level of confidence. It literally doesn’t know what it doesn’t know. This\
    \ is especially true when the dataset is small and the network is given room to\
    \ overfit.\n\nThe reason why has nothing to do with VGGFace. It has everything\
    \ to do with the fact that a neural network with a softmax output layer is a *closed-set\
    \ classifier*, meaning it classifies any sample presented to it for predictions\
    \ as one of the classes it was trained with. (Remember that softmax ensures that\
    \ the sum of the probabilities for all classes is 1.0.) The alternative is an\
    \ *open-set classifier* (Figure 11-8), which has the ability to say “this sample\
    \ doesn’t belong to any of the classes I was trained with.”\n\n![](img/628b9a382d0944bbfa786c66bc651b50_265_0.png)\n\
    \nThere is not a one-size-fits-all solution for building open-set classifiers\
    \ in the deep-learning community today. A 2016 paper titled “Towards Open Set\
    \ Deep Networks” proposed one solution in the form of *openmax* output layers,\
    \ which replace softmax output layers and “estimate the probability of an input\
    \ being from an unknown class.” Essentially, if the network is trained with 10\
    \ classes, the openmax output layer adds an 11th output representing the unknown\
    \ class. It works by taking the activations from the final classification layer\
    \ and adjusting them using a Weibull distribution rather than normalizing the\
    \ probabilities as softmax does.\n\nAnother potential solution was put forth in\
    \ a 2018 paper titled “Reducing Network Agnostophobia” from researchers at the\
    \ University of Colorado. It proposed replacing cross-entropy loss with a new\
    \ loss function called *entropic open-set loss* that drives softmax scores for\
    \ unknown classes toward a uniform probability distribution. Using this technique,\
    \ you could more reliably detect samples belonging to an unknown class using probability\
    \ thresholds paired with conventional softmax output layers. For a great summary\
    \ of the problems posed by open-set classification in deep learning and an overview\
    \ of openmax and entropic open-set loss, see “Does a Neural Network Know When\
    \ It Doesn’t Know?” by Tivadar Danka.\n\nloading and displaying facial images\
    \ from the subdirectories you copied them to, and declare a pair of Python lists\
    \ to hold the images and labels:\n\n```python\nimport os\nfrom tensorflow.keras.preprocessing\
    \ import image\nimport matplotlib.pyplot as plt\n%matplotlib inline\n\ndef load_images_from_path(path,\
    \ label):\n    images, labels = [], []\n\n    for file in os.listdir(path):\n\
    \        images.append(image.img_to_array(image.load_img(os.path.join(path, file),\n\
    \                                target_size=(224, 224, 3))))\n        labels.append((label))\n\
    \n    return images, labels\n\ndef show_images(images):\n    fig, axes = plt.subplots(1,\
    \ 8, figsize=(20, 20),\n                             subplot_kw={'xticks': [],\
    \ 'yticks': []})\n\n    for i, ax in enumerate(axes.flat):\n        ax.imshow(images[i]\
    \ / 255)\n\nx, y = [], []\n```\n\nNext, load the images of Jeff and label them\
    \ with 0s:\n\n```python\nimages, labels = load_images_from_path('Faces/Jeff',\
    \ 0)\nshow_images(images)\n\nx += images\ny += labels\n```\n\nLoad the images\
    \ of Lori and label them with 1s:\n\n```python\nimages, labels = load_images_from_path('Faces/Lori',\
    \ 1)\nshow_images(images)\n\nx += images\ny += labels\n```\n\nLoad the images\
    \ of Abby and label them with 2s:\n\n```python\nimages, labels = load_images_from_path('Faces/Abby',\
    \ 2)\nshow_images(images)\n\nx += images\ny += labels\n```\n\nFinally, preprocess\
    \ the pixels for the ResNet50 version of VGGFace and split the data fifty-fifty\
    \ so that the network will be trained with four randomly selected images of each\
    \ person and validated with the same number of images:\n\n```python\nimport numpy\
    \ as np\nfrom sklearn.model_selection import train_test_split\nfrom tensorflow.keras.applications.resnet50\
    \ import preprocess_input\n\nfaces = preprocess_input(np.array(x))\nlabels = np.array(y)\n\
    \nx_train, x_test, y_train, y_test = train_test_split(\n    faces, labels, train_size=0.5,\
    \ stratify=labels,\n    random_state=0)\n```\n\nThe next step is to load the saved\
    \ VGGFace model and freeze the bottleneck layers. If you didn’t download vggface.h5\
    \ earlier, download it now and drop it into your notebooks’ Data subdirectory.\
    \ Then execute the following code:\n\n```python\nfrom tensorflow.keras.models\
    \ import load_model\n\nbase_model = load_model('Data/vggface.h5')\nbase_model.trainable\
    \ = False\n```\n\nNow define a network that uses transfer learning with VGGFace\
    \ to identify faces. The Resizing layer ensures that each image measures exactly\
    \ 224 × 224 pixels. The Dense layer contains just eight neurons because the training\
    \ dataset is small and we don’t want the network to fit too tightly to it:\n\n\
    ```python\nfrom tensorflow.keras.models import Sequential\nfrom tensorflow.keras.layers\
    \ import Flatten, Dense, Resizing\n\nmodel = Sequential()\nmodel.add(Resizing(224,\
    \ 224))\nmodel.add(base_model)\nmodel.add(Flatten())\nmodel.add(Dense(8, activation='relu'))\n\
    model.add(Dense(3, activation='softmax'))\nmodel.compile(optimizer='adam', loss='sparse_categorical_crossentropy',\n\
    \              metrics=['accuracy'])\n```\n\nTrain the model:\n\n```python\nhist\
    \ = model.fit(x_train, y_train, validation_data=(x_test, y_test),\n          \
    \       batch_size=2, epochs=10)\n```\n\nPlot the training and validation accuracy:\n\
    \n```python\nimport seaborn as sns\nsns.set()\n\nacc = hist.history['accuracy']\n\
    val_acc = hist.history['val_accuracy']\nepochs = range(1, len(acc) + 1)\n\nplt.plot(epochs,\
    \ acc, '-', label='Training Accuracy')\nplt.plot(epochs, val_acc, ':', label='Validation\
    \ Accuracy')\nplt.title('Training and Validation Accuracy')\nplt.xlabel('Epoch')\n\
    plt.ylabel('Accuracy')\nplt.legend(loc='lower right')\nplt.plot()\n```\n\nHopefully\
    \ you got something like this:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_262_0.png)\n\
    \nNow comes the fun part: using an MTCNN to detect the faces in a photo and the\
    \ trained model to identify those faces. First make sure the MTCNN package is\
    \ installed in your environment. Then define a pair of helper functions—one that\
    \ retrieves a face from a specified location in an image (`get_face`), and another\
    \ that loads a photo and annotates faces in the photo with names and confidence\
    \ levels (`label_faces`):\n\n```python\nfrom mtcnn.mtcnn import MTCNN\nfrom PIL\
    \ import Image, ImageOps\nfrom tensorflow.keras.preprocessing import image\nfrom\
    \ matplotlib.patches import Rectangle\n\ndef get_face(image, face):\n    x1, y1,\
    \ w, h = face['box']\n\n    if w > h:\n        x1 = x1 + ((w - h) // 2)\n    \
    \    w = h\n    elif h > w:\n        y1 = y1 + ((h - w) // 2)\n        h = w\n\
    \n    x2 = x1 + h\n    y2 = y1 + w\n\n    return image[y1:y2, x1:x2]\n\ndef label_faces(path,\
    \ model, names, face_threshold=0.9, prediction_threshold=0.9,\n              \
    \  show_outline=True, size=(12, 8)):\n    # Load the image and orient it correctly\n\
    \    pil_image = Image.open(path)\n    exif = pil_image.getexif()\n\n    for k\
    \ in exif.keys():\n        if k != 0x0112:\n            exif[k] = None\n     \
    \       del exif[k]\n\n    pil_image.info[\"exif\"] = exif.tobytes()\n    pil_image\
    \ = ImageOps.exif_transpose(pil_image)\n    np_image = np.array(pil_image)\n\n\
    \    fig, ax = plt.subplots(figsize=size, subplot_kw={'xticks': [], 'yticks':\
    \ []})\n    ax.imshow(np_image)\n\n    detector = MTCNN()\n    faces = detector.detect_faces(np_image)\n\
    \    faces = [face for face in faces if face['confidence'] > face_threshold]\n\
    \n    for face in faces:\n        x, y, w, h = face['box']\n\n        # Use the\
    \ model to identify the face\n        face_image = get_face(np_image, face)\n\
    \        face_image = image.array_to_img(face_image)\n        face_image = preprocess_input(np.array(face_image))\n\
    \        predictions = model.predict(np.expand_dims(face_image, axis=0))\n   \
    \     confidence = np.max(predictions)\n\n        if (confidence > prediction_threshold):\n\
    \            # Optionally draw a box around the face\n            if show_outline:\n\
    \                rect = Rectangle((x, y), w, h, color='red', fill=False, lw=2)\n\
    \                ax.add_patch(rect)\n\n            # Label the face\n        \
    \    index = int(np.argmax(predictions))\n            text = f'{names[index]}\
    \ ({confidence:.1%})'\n            ax.text(x + (w / 2), y, text, color='white',\
    \ backgroundcolor='red',\n                    ha='center', va='bottom', fontweight='bold',\n\
    \                    bbox=dict(color='red'))\n```\n\nNow pass the first sample\
    \ image in the *Samples* folder to `label_faces`:\n\n```python\nlabels = ['Jeff',\
    \ 'Lori', 'Abby']\nlabel_faces('Faces/Samples/Sample-1.jpg', model, labels)\n\
    ```\n\nThe output should look like this, although your percentages might be different:\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_264_0.png)\n\nTry it again, but this\
    \ time with a different photo:\n\n```python\nlabel_faces('Faces/Samples/Sample-2.jpg',\
    \ model, labels)\n```\n\nHere’s the output:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_264_1.png)\n\
    \nFinally, submit a photo containing all three individuals that the model was\
    \ trained with:\n\n```python\nlabel_faces('Faces/Samples/Sample-3.jpg', model,\
    \ labels)\n```\n\nTrained with just 12 facial images—four of each person—the model\
    \ does a credible job of identifying faces in photos. Of course, you could generate\
    \ a dataset of your own by passing photos of friends and family members through\
    \ the function in Example 11-1 and training the model with the resulting images."
  mdcn: "## 处理未知人脸：闭集分类与开集分类\n\n现在说点坏消息。VGGFace人脸识别模型擅长识别它训练过的人脸，但当遇到它*未*训练过的人脸时，它就不知道该怎么办了。试试看：输入一张你自己的照片。模型很可能会将你识别为Jeff、Lori或Abby，并且可能以很高的置信度这样做。它真的不知道自己不知道什么。当数据集较小且网络存在过拟合空间时，尤其如此。\n\
    \n原因与VGGFace无关，而完全在于一个事实：具有softmax输出层的神经网络是一个*闭集分类器*，这意味着它将呈现给它的任何用于预测的样本都分类为它训练过的类别之一。（请记住，softmax确保所有类别的概率之和为1.0。）另一种选择是*开集分类器*（图11-8），它能够说“这个样本不属于我训练过的任何类别”。\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_265_0.png)\n\n在当今的深度学习领域，构建开集分类器没有一个放之四海而皆准的解决方案。2016年一篇题为“Towards\
    \ Open Set Deep Networks”的论文提出了一种解决方案，即*openmax*输出层，它取代softmax输出层并“估计输入来自未知类别的概率”。本质上，如果网络用10个类别进行训练，openmax输出层会添加第11个输出，代表未知类别。它的工作原理是获取最终分类层的激活值，并使用韦布尔分布进行调整，而不是像softmax那样对概率进行归一化。\n\
    \n科罗拉多大学的研究人员在2018年一篇题为“Reducing Network Agnostophobia”的论文中提出了另一个潜在解决方案。它提出用一种称为*熵开集损失*的新损失函数取代交叉熵损失，该损失函数将未知类别的softmax分数推向均匀概率分布。使用这种技术，你可以更可靠地使用概率阈值结合传统的softmax输出层来检测属于未知类别的样本。关于深度学习中开集分类带来的问题以及openmax和熵开集损失的概述，请参阅Tivadar\
    \ Danka的“Does a Neural Network Know When It Doesn’t Know?”。\n\n从你复制到的子目录加载并显示人脸图像，并声明一对Python列表来保存图像和标签：\n\
    \n```python\nimport os\nfrom tensorflow.keras.preprocessing import image\nimport\

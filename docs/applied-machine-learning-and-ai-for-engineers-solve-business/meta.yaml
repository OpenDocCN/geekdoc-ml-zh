  md: "based calculations internally to discriminate between classes.\n\nScikit offers\
    \ several classes for normalizing data. The most commonly used are `MinMaxScaler`\
    \ and `StandardScaler`. The former normalizes data by proportionally reducing\
    \ the values in each column to values from 0.0 to 1.0. Mathematically, it’s simple.\
    \ For each column in a dataset, `MinMaxScaler` subtracts the minimum value in\
    \ that column from all the column’s values, then it divides each value by the\
    \ difference between the minimum and maximum values. In the resulting column,\

- md: "## Neural Machine Translation\n\nIn the universe of natural language processing,\
    \ text classification is a relatively simple task. At the opposite end of the\
    \ spectrum lies *neural machine translation* (NMT), which uses deep learning to\
    \ translate text from one language to another. NMT has proven superior to the\
    \ [rules-based machine translation (RBMT)](https://en.wikipedia.org/wiki/Rule-based_machine_translation)\
    \ and [statistical machine translation (SMT)](https://en.wikipedia.org/wiki/Statistical_machine_translation)\
    \ systems that predated the explosion of deep learning and today is the basis\
    \ for virtually all state-of-the-art text translation services.\n\nThe gist of\
    \ text classification is that you transform an input sequence into a vector characterizing\
    \ the sequence, and then you input the vector to a classifier. There are several\
    \ ways to generate that vector. You can reshape the 2D output from an embedding\
    \ layer into a 1D vector, or you can feed that output into a recurrent layer or\
    \ convolution layer in hopes of generating a vector that is more context aware.\
    \ Whichever route you choose, the goal is simple: convert a string of text into\
    \ an array of floating-point numbers that uniquely describes it and use a sigmoid\
    \ or softmax output layer to classify it.\n\nNMT is basically an extension of\
    \ text classification. You start by converting a text sequence into a vector.\
    \ But rather than classify the vector, you use it to generate a new sequence.\
    \ One way to do that is with an LSTM encoder-decoder.\n\n## LSTM Encoder-Decoders\n\
    \nUntil a few years ago, most NMT models, including the one underlying Google\
    \ Translate, were LSTM-based sequence-to-sequence models similar to the one in\
    \ Figure 13-3. In such models, one or more LSTM layers encode a tokenized input\
    \ sequence representing the phrase to be translated into a vector. A second set\
    \ of recurrent layers uses that vector as input and decodes it into a tokenized\
    \ phrase in another language. The model accepts sequences as input and returns\
    \ sequences as output, hence the term sequence-to-sequence model. A softmax output\
    \ layer at the end outputs a set of probabilities for each token in the output\
    \ sequence. If the maximum output phrase length that’s supported is 20 tokens,\
    \ for example, and the vocabulary of the output language contains 20,000 words,\
    \ then the output is 20 sets (one per token) of 20,000 probabilities. The word\
    \ selected for each output token is the word assigned the highest probability.\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_309_0.png)\n\nLSTM-based sequence-to-sequence\
    \ models are relatively easy to build with Keras and TensorFlow. This book’s GitHub\
    \ repo contains a notebook that uses 50,000 samples to train an LSTM model to\
    \ translate English to French. The model is defined this way:\n\n```python\nmodel\
    \ = Sequential()\nmodel.add(Embedding(en_vocab_size, 256, input_length=en_max_len,\
    \ mask_zero=True))\nmodel.add(LSTM(256))\nmodel.add(RepeatVector(fr_max_len))\n\
    model.add(LSTM(256, return_sequences=True))\nmodel.add(Dropout(0.4))\nmodel.add(TimeDistributed(Dense(fr_vocab_size,\
    \ activation='softmax')))\nmodel.compile(loss='sparse_categorical_crossentropy',\
    \ optimizer='adam',\n              metrics=['accuracy'])\nmodel.summary(line_length=100)\n\
    ```\n\nThe first layer is an embedding layer that converts word tokens into vectors\
    \ containing 256 floating-point values. The `mask_zero=True` parameter indicates\
    \ that zeros in the input sequences denote padding so that the next layer can\
    \ ignore them. (There is no need to translate those tokens, after all.) Next is\
    \ an LSTM layer that encodes English phrases input to the model. A second LSTM\
    \ layer decodes the phrases into dense vectors representing the French equivalents.\
    \ In between lies a `RepeatVector` layer that reshapes the output from the first\
    \ LSTM layer for input to the second by repeating the output a specified number\
    \ of times. The final layer is a softmax classification layer that outputs probabilities\
    \ for each word in the French vocabulary. The `TimeDistributed` wrapper ensures\
    \ that the model outputs a set of probabilities for each token in the output rather\
    \ than just one set for the entire sequence.\n\nAfter 34 epochs of training, the\
    \ model translates 10 test phrases this way:\n\n```\nits fall now => cest maintenant\
    \ maintenant\nim losing => je suis en train\nit was quite funny => cetai fut amusant\
    \ amusant\nthats not unusual => ce nest pas inhabituel\ni think ill do that =>\
    \ je pense que je le\ntom looks different => tom a lair different\nits worth a\
    \ try => ca vaut le coup\nfortune smiled on him => la la lui a souri\nlets hit\
    \ the road => taillons la\ni love winning => jadore gagner\n```\n\nThe model isn’t\
    \ perfect, in part due to the limited size of the training set. Real NMT models\
    \ are trained with hundreds of millions or even billions of phrases. But is this\
    \ one truly representative of the models used for state-of-the-art text translation?\
    \ Figure 13-4 is adapted from an image in a 2016 paper written by Google engineers\
    \ documenting the architecture of Google Translate. The architecture maps closely\
    \ to that of the model just presented. It’s deeper, with eight LSTM layers in\
    \ the encoder and eight in the decoder. It also employs residual connections between\
    \ layers to support the network’s greater depth.\n\n![](img/628b9a382d0944bbfa786c66bc651b50_311_0.png)\n\
    \nOne difference between our model and the model described in the paper is the\
    \ block labeled “Attention” between the encoder and decoder. In deep learning,\
    \ *attention* is a mechanism for focusing a model’s attention on the parts of\
    \ a phrase that are most important, recognizing that one word can have different\
    \ meanings in different contexts and that the meaning of a word sometimes depends\
    \ on what’s around it.\n\nAttention was introduced to deep learning in a seminal\
    \ 2014 paper titled “Neural Machine Translation by Jointly Learning to Align and\
    \ Translate”, but it wasn’t until a few years later that attention took center\
    \ stage as a way to *replace* LSTM layers rather than supplement them. Enter perhaps\
    \ the most significant contribution to the field of NMT, and to NLP overall, to\
    \ date: the transformer model.\n\n## Transformer Encoder-Decoders\n\nA landmark\
    \ 2017 paper titled “Attention Is All You Need” changed the way data scientists\
    \ approach NMT and other neural text processing tasks. It proposed a better way\
    \ to perform sequence-to-sequence processing based on *transformer models* that\
    \ eschew recurrent layers and use attention mechanisms to model the context in\
    \ which words are used. Today transformer models have almost entirely replaced\
    \ LSTM-based models.\n\nFigure 13-5 is adapted from an image in the aforementioned\
    \ paper. On the left is the encoder, which takes text sequences as input and generates\
    \ dense vector representations of those sequences. On the right is the decoder,\
    \ which transforms dense vector representations of input sequences into output\
    \ sequences. At a high level, a transformer model uses the same encoder-decoder\
    \ architecture as an LSTM-based model. The difference lies in how it does the\
    \ encoding and decoding."
  mdcn: "## 神经机器翻译\n\n在自然语言处理的领域中，文本分类是一项相对简单的任务。而与之相对的另一端是*神经机器翻译*（NMT），它利用深度学习将文本从一种语言翻译成另一种语言。NMT已被证明优于在深度学习爆发之前出现的[基于规则的机器翻译（RBMT）](https://en.wikipedia.org/wiki/Rule-based_machine_translation)和[统计机器翻译（SMT）](https://en.wikipedia.org/wiki/Statistical_machine_translation)系统，如今它几乎是所有最先进文本翻译服务的基础。\n\
    \n文本分类的要点在于，你将输入序列转换为一个表征该序列的向量，然后将该向量输入到分类器中。生成该向量有多种方法。你可以将嵌入层的二维输出重塑为一维向量，或者你可以将该输出馈送到循环层或卷积层，以期生成一个更具上下文感知能力的向量。无论你选择哪条路径，目标都很简单：将一串文本转换为一个唯一描述它的浮点数数组，并使用sigmoid或softmax输出层对其进行分类。\n\
    \nNMT基本上是文本分类的扩展。你首先将文本序列转换为向量。但与其对向量进行分类，你使用它来生成一个新的序列。一种方法是使用LSTM编码器-解码器。\n\n\
    ## LSTM编码器-解码器\n\n直到几年前，大多数NMT模型，包括支撑谷歌翻译的那个模型，都是基于LSTM的序列到序列模型，类似于图13-3中的模型。在这样的模型中，一个或多个LSTM层将代表待翻译短语的、经过分词的输入序列编码为一个向量。第二组循环层使用该向量作为输入，并将其解码为另一种语言中的分词短语。该模型接受序列作为输入并返回序列作为输出，因此得名序列到序列模型。末端的softmax输出层为输出序列中的每个词元输出一组概率。例如，如果支持的最大输出短语长度是20个词元，而输出语言的词汇表包含20,000个单词，那么输出就是20组（每组对应一个词元）20,000个概率。为每个输出词元选择的单词是被分配了最高概率的那个单词。\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_309_0.png)\n\n基于LSTM的序列到序列模型相对容易使用Keras和TensorFlow构建。本书的GitHub仓库包含一个notebook，它使用50,000个样本来训练一个LSTM模型，将英语翻译成法语。该模型定义如下：\n\
    \n```python\nmodel = Sequential()\nmodel.add(Embedding(en_vocab_size, 256, input_length=en_max_len,\
    \ mask_zero=True))\nmodel.add(LSTM(256))\nmodel.add(RepeatVector(fr_max_len))\n\
    model.add(LSTM(256, return_sequences=True))\nmodel.add(Dropout(0.4))\nmodel.add(TimeDistributed(Dense(fr_vocab_size,\
    \ activation='softmax')))\nmodel.compile(loss='sparse_categorical_crossentropy',\
    \ optimizer='adam',\n              metrics=['accuracy'])\nmodel.summary(line_length=100)\n\
    ```\n\n第一层是嵌入层，它将单词词元转换为包含256个浮点值的向量。`mask_zero=True`参数表示输入序列中的零表示填充，以便下一层可以忽略它们。（毕竟，这些词元不需要翻译。）接下来是一个LSTM层，它将输入到模型的英语短语进行编码。第二个LSTM层将这些短语解码为代表法语对应词的稠密向量。中间是一个`RepeatVector`层，它通过将第一个LSTM层的输出重复指定次数来重塑其输出，以便输入到第二个LSTM层。最后一层是softmax分类层，它为法语词汇表中的每个单词输出概率。`TimeDistributed`包装器确保模型为输出序列中的每个词元输出一组概率，而不是仅为整个序列输出一组。\n\
    \n经过34个epoch的训练后，该模型以如下方式翻译了10个测试短语：\n\n```\nits fall now => cest maintenant maintenant\n\
    im losing => je suis en train\nit was quite funny => cetai fut amusant amusant\n\
    thats not unusual => ce nest pas inhabituel\ni think ill do that => je pense que\
    \ je le\ntom looks different => tom a lair different\nits worth a try => ca vaut\
    \ le coup\nfortune smiled on him => la la lui a souri\nlets hit the road => taillons\
    \ la\ni love winning => jadore gagner\n```\n\n该模型并不完美，部分原因是训练集的规模有限。真正的NMT模型是用数亿甚至数十亿个短语进行训练的。但这个模型是否真正代表了用于最先进文本翻译的模型呢？图13-4改编自谷歌工程师在2016年撰写的一篇论文中的图片，该论文记录了谷歌翻译的架构。该架构与刚刚介绍的模型非常相似。它更深，在编码器中有八个LSTM层，在解码器中也有八个。它还在层之间采用了残差连接，以支持网络更深的结构。\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_311_0.png)\n\n我们的模型与论文中描述的模型之间的一个区别是编码器和解码器之间标有“注意力”的模块。在深度学习中，*注意力*是一种让模型关注短语中最重要的部分的机制，它认识到一个词在不同的上下文中可能有不同的含义，并且一个词的含义有时取决于其周围的词。\n\
    \n注意力机制是在2014年一篇题为“通过联合学习对齐和翻译的神经机器翻译”的开创性论文中引入深度学习的，但直到几年后，注意力才作为*替代*LSTM层（而非补充它们）的方式成为焦点。这或许是迄今为止对NMT领域乃至整个NLP领域最重要的贡献：Transformer模型。\n\
    \n## Transformer编码器-解码器\n\n2017年一篇题为“Attention Is All You Need”的里程碑式论文改变了数据科学家处理NMT和其他神经文本处理任务的方式。它提出了一种更好的执行序列到序列处理的方法，该方法基于*Transformer模型*，摒弃了循环层，并使用注意力机制来建模单词使用的上下文。如今，Transformer模型几乎完全取代了基于LSTM的模型。\n\
    \n图13-5改编自上述论文中的一张图片。左侧是编码器，它接受文本序列作为输入，并生成这些序列的稠密向量表示。右侧是解码器，它将输入序列的稠密向量表示转换为输出序列。从高层次来看，Transformer模型使用与基于LSTM的模型相同的编码器-解码器架构。区别在于它如何进行编码和解码。"

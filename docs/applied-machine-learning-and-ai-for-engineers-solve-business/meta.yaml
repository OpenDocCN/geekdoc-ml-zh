    \ 人脸识别\n\n既然你知道了如何在照片中检测人脸，下一步就是学习如何识别它们。多年来，已经开发了几种[在照片中识别人脸](https://example.com)的算法。一些算法依赖于生物特征，例如眼睛之间的距离或皮肤纹理，而另一些则采取更整体的方法，将人脸识别视为一个模式识别问题。当今最先进的模型通常依赖于深度卷积神经网络。人脸识别模型的主要基准之一是[野外标记人脸\
    \ (LFW) 数据集](https://example.com)，如图 11-6 所示，该数据集包含从网络收集的 5,000 多人的 13,000 多张人脸图像。像\

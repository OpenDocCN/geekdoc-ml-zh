    That is what this book seeks to change: it removes the shroud and jargon, making
    these tools and resources accessible.


    And, to be completely honest, my dad is very good at writing and teaching intimidating
    technical topics in a manner that makes learning them almost effortless, and he
    has been for all my life. He has made subjects all the way back to DOS understandable
    for the movers and shakers in today’s business world. He has made subjects that
    I frankly can’t wrap my head around accessible for generations of programmers
    over the last few decades. To put it simply, he’s the best.


    The secret is this: his ethos of how he approaches teaching a topic centers around
    “how would I want this explained to me if I had never heard of it but was interested?”
    Given the unique challenges data science poses and the myriad perspectives professionals
    in this space come from, his approach provides a level of accessibility not found
    in many other places.


    Take it from me: you couldn’t have a better guide through the complexities of
    ML and AI. If you’re already familiar, then this book will hone your understanding,
    as it did for me. (Looking at you, [Chapter 13](https://example.com/chapter13).)
    If you’re interested in machine learning, AI, analytics, and the value they add
    to humanity,'
  - '[PAGE 9]


    you’re in the right place.


    Regardless of which camp you fall in, you’ll come away with deeper knowledge of
    the subjects he outlines, empowering you to use these tools and then tell the
    story of what you found.


    Usually I would end something like this by saying, “I hope you enjoy the book
    and learn something,” but in this case, that would not be the truth. I don’t *hope*—I
    *know*. I know you will learn from and alongside my dad, as I have.


    There’s no person I’ve tried to be more like in my life than Jeff Prosise, and
    I couldn’t be more excited to share this aspect of him with you. And maybe—just
    maybe—it will ignite a passion for this stuff, as it did with me.


    I’ll leave you with this. I’ll say to you what he apocryphally told me as he held
    me on the day I was born: “Welcome to the show, kid.”


    **Adam Prosise**

    *Process and Innovation Specialist, Delta Air Lines*'
  - '[PAGE 10]


    # # Preface


    I have witnessed three great technical revolutions in my lifetime: first the personal
    computer, then the internet, and lastly the smartphone. Machine learning (ML)
    and AI are just as fundamentally important as all three and will have an equally
    profound impact on our lives.


    I first became interested in machine learning the day my credit card company called
    to confirm that I was trying to purchase a $700 necklace. I was not, but I was
    curious: how did they know it wasn’t me? I use my card all over the world, and
    for the record, I *do* buy my wife nice things from time to time. Not once had
    the credit card company declined a legitimate purchase, but several times they
    had correctly flagged fraudulent purchases, the one prior to this being an attempt
    by someone in Brazil to use my card to buy an airline ticket. This time was different:
    the jewelry store was 2 miles from my house. I tried to imagine an algorithm that
    could so reliably detect credit card fraud at the point of sale. It didn’t take
    long to realize that something more powerful than a mere algorithm was at work.


    It turned out that the credit card company runs every transaction through a sophisticated
    machine learning model that is incredibly adept at detecting fraud. That moment
    changed my life. It’s a splendid example of how ML and AI are making the world
    a better place. Moreover, understanding how ML could analyze credit card transactions
    in real time and pick out the bad ones while allowing legitimate charges to go
    through became a mountain that I had to climb.


    # ## Who Should Read This Book


    Recently, I received a call from the head of engineering at a manufacturing company.
    He started the conversation like this: “Until last week, I didn’t know what ML
    and AI stood for. Now my CEO has tasked me with figuring out how they can improve
    our business, and to do it before our competitors get ahead of us. I am starting
    at square one. Can you help?”


    The next call came from a government contracting firm interested in using machine
    learning to detect tax fraud and money laundering. The team there was reasonably
    well versed in machine learning theory but wondered how best to go about building
    the models they needed.


    Professionals everywhere are realizing that ML and AI represent a technological
    tsunami, and they’re trying to get on top of the wave before it crashes over them.
    This book is for them: engineers, software developers, IT managers, and others
    whose goal is to build a practical understanding of ML and AI and put that knowledge
    to work solving problems that were difficult or even intractable before. It seeks
    to impart an *intuitive* understanding and resorts to equations only when necessary.
    Despite what you may have heard, you don’t have to be an expert in calculus or
    linear algebra to build systems that recognize objects in photos, translate English
    to French, or expose drug traffickers and tax cheats.


    # ## Why I Wrote This Book'
  - '[PAGE 11]


    Inside every author is a tiny gremlin that says they can tell the story in a way
    that no one else has. I wrote my first computer book more than 30 years ago and
    my last one more than 20 years ago, and I didn’t intend to write another one.
    But now I have a story to tell. It’s an important story—one that every engineer
    and software developer should hear. I’m not entirely satisfied with the way others
    have told it, so I wrote the book that I wish I had had when I was learning the
    craft. It starts with the basics and leads you on a journey to the heights of
    ML and AI. By the end, you’ll understand how credit card companies detect fraud,
    how aircraft companies use machine learning to perform predictive maintenance
    on jet engines, how self-driving cars see the world around them, how Google Translate
    translates text between languages, and how facial recognition systems work. Moreover,
    you’ll be able to build systems like them yourself, or use existing systems to
    infuse AI into the apps that you write.


    Today’s most advanced machine learning models are trained on computers equipped
    with graphics processing units (GPUs) or tensor processing units (TPUs), often
    at great time and expense. A point of emphasis in this book is presenting examples
    that can be built on a typical PC or laptop without a GPU. When we tackle computer-vision
    models that recognize objects in photos, I’ll describe how such models work and
    how they’re trained with millions of images on GPU clusters. But then I’ll show
    you how to use a technique called *transfer learning* to repurpose existing models
    to solve domain-specific problems and train them on an ordinary laptop.


    This book draws heavily from the classes and workshops that I teach at companies
    and research institutions around the world. I love teaching because I love seeing
    the light bulbs come on. I often kick off classes on ML and AI by saying I’m not
    here to teach; I’m here to change your life. Here’s hoping that your life will
    be a little bit different, and a little bit better, than it was before you read
    this book.


    # Running the Book’s Code Samples


    Engineers learn best by *doing*, not merely by reading. This book contains numerous
    code samples that you can run to reinforce the concepts presented in each chapter.
    Most are written in Python and use popular open source libraries such as Scikit-Learn,
    Keras, and TensorFlow. All are available in a [public GitHub repo](https://github.com).
    It’s the single source of truth for the code samples because I can update it at
    any time.


    There are machine learning platforms that allow you to build and train models
    with no code. But the best way to understand what these platforms do and how they
    do it is to write code. Python is a simple programming language. It’s easy to
    learn. Engineers today have to be comfortable writing code. You can learn Python
    as you go by working the examples in this book, and if you’re already comfortable
    with Python (and with programming in general), then you’re ahead of the game.


    To run my samples on your PC or laptop, you need a 64-bit version of Python 3.7
    or higher. You can download a Python runtime from [Python.org](https://www.python.org),
    or you can install a Python distribution such as [Anaconda](https://www.anaconda.com).
    You also need to make sure the following packages and their dependencies are installed:


    +   - Scikit-Learn and TensorFlow for building machine learning models

    - Pandas, Matplotlib, and Seaborn for data wrangling and visualization

    - OpenCV and Pillow for handling images'

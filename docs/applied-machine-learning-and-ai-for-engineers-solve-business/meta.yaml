- md: "Note that the sentiment score will differ slightly if you replaced `CountVectorizer`\
    \ with `HashingVectorizer`, in part due to the omission of the `min_df` parameter.\n\
    \n## Versioning Pickle Files\n\nGenerally speaking, a model pickled (saved) with\
    \ one version of Scikit can’t be unpickled with another version. Sometimes the\
    \ result is warning messages; other times, it doesn’t work at all. Be sure to\
    \ save models with the same version of Scikit that you use to consume them. This\
    \ requires a bit of planning from an engineering perspective, because if you store\
    \ serialized models in a centralized repository and update the version of Scikit\
    \ used in your apps, you’ll need to update the saved models too.\n\nWhich prompts\
    \ some interesting questions: How do you set up a repository for machine learning\
    \ models? How do you deploy models from the repository to the devices that host\
    \ them? For that matter, how do you *version* those models as well as the datasets\
    \ you train them with?\n\nThe answers come from a nascent field known as *MLOps*,\
    \ which is short for *ML operations*. I don’t cover MLOps in this book because\
    \ it’s a rich subject that is a book unto itself. If you want to learn more, I\
    \ recommend reading *Practical MLOps: Operationalizing Machine Learning Models*\
    \ by Noah Gift and Alfredo Deza (O’Reilly).\n\n## Consuming a Python Model from\
    \ a C# Client\n\nSuppose you wanted to invoke the sentiment analysis model in\
    \ the previous section from an app written in another language—say, C#. You can’t\
    \ directly call a Python function from C#, but you *can* wrap a Python model in\
    \ a web service and expose its `predict` (or `predict_proba`) method using a REST\
    \ API. One way to code the web service is to use Flask, a popular framework for\
    \ building websites and web services in Python.\n\nTo see for yourself, make sure\
    \ Flask is installed on your computer. Then create a file named `app.py` and paste\
    \ in the following code. This code uses Flask to implement a Python web service\
    \ that listens on port 5000:\n\n```python\nimport pickle\nfrom flask import Flask,\
    \ request\n\napp = Flask(__name__)\npipe = pickle.load(open('sentiment.pkl', 'rb'))\n\
    \n@app.route('/analyze', methods=['GET'])\ndef analyze():\n    if 'text' in request.args:\n\
    \        text = request.args.get('text')\n    else:\n        return 'No string\
    \ to analyze'\n\n    score = pipe.predict_proba([text])[0][1]\n    return str(score)\n\
    \nif __name__ == '__main__':\n    app.run(debug=True, port=5000, host='0.0.0.0')\n\
    ```\n\nAt startup, the service deserializes the pipeline comprising the sentiment\
    \ analysis model in *sentiment.pkl*. The `@app.route` statement decorating the\
    \ `analyze` function tells Flask to call the function when the service's `analyze`\
    \ method is called. If the service is hosted locally, the following request invokes\
    \ `analyze` and returns a string containing a sentiment score for the text in\
    \ the query string:\n\n```\nhttp://localhost:5000/analyze?text=Great food and\
    \ excellent service!\n```\n\nTo demonstrate, go to the directory where *app.py*\
    \ is located (make sure *sentiment.pkl* is there too) and start Flask by typing:\n\
    \n```\nflask run\n```\n\nThen go to a separate command prompt and use a `curl`\
    \ command to fire off a request to the URL:\n\n```\ncurl -G -w \"\\n\" http://localhost:5000/analyze\
    \ --data-urlencode \"text=Great food and excellent service!\"\n```\n\nHere's the\
    \ output:\n\nIf you have Visual Studio or Visual Studio Code installed on your\
    \ computer and are set up to compile and run C# apps, you can use the following\
    \ code in a C# console app to invoke the web service and score a text string for\
    \ sentiment. Of course, you’re not limited to invoking the web service (and by\
    \ extension, the model) from C#. Any language will do, because virtually all modern\
    \ programming languages provide a means for sending HTTP requests.\n\n```csharp\n\
    using System;\nusing System.Net.Http;\nusing System.Threading.Tasks;\n\nclass\
    \ Program\n{\n    static async Task Main(string[] args)\n    {\n        string\
    \ text;\n\n        // Get the text to analyze\n        if (args.Length > 0)\n\
    \        {\n            text = args[0];\n        }\n        else\n        {\n\
    \            Console.Write(\"Text to analyze: \");\n            text = Console.ReadLine();\n\
    \        }\n\n        // Pass the text to the web service\n        var client\
    \ = new HttpClient();\n        var url = $\"http://localhost:5000/analyze?text={text}\"\
    ;\n        var response = await client.GetAsync(url);\n        var score = await\
    \ response.Content.ReadAsStringAsync();\n\n        // Show the sentiment score\n\
    \        Console.WriteLine(score);\n    }\n}\n```\n\nThis web service is a simple\
    \ one that reads input from a query string and returns a string. For more complex\
    \ input and output, you can serialize the input into JSON and transmit it in the\
    \ body of an HTTP POST, and you can return a JSON payload in the response. For\
    \ a tutorial demonstrating how to do it in Python, see the article “Python Post\
    \ JSON Using Requests Library”.\n\n## Containerizing a Machine Learning Model\n\
    \nOne downside to wrapping a machine learning model in a web service and running\
    \ it locally is that the client computer must have Python installed, as well as\
    \ all the packages that the model and web service require. An alternative is to\
    \ host the web service in the cloud where it can be called via the internet. It’s\
    \ not hard to go out to Azure or AWS, spin up a virtual machine (VM), and install\
    \ the software there. But there’s a better way. That better way is containers.\n\
    \nContainers have revolutionized the way software is built and deployed. A container\
    \ includes an app and everything the app needs to run, including a runtime (for\
    \ example, Python), the packages the app relies on, and even a virtual filesystem.\
    \ If you’re not familiar with containers, think of them as lightweight VMs that\
    \ start quickly and consume far less memory. Docker is the world’s most popular\
    \ container platform, although it is rapidly being supplanted by Kubernetes.\n\
    \nContainers are created from *container images*, which serve as blueprints for\
    \ containers in the same way that classes in object-oriented programming languages\
    \ constitute blueprints for objects. The first step in creating a Docker container\
    \ image containing the sentiment analysis model and web service is to create a\
    \ file named *Dockerfile* (no filename extension) in the same directory as *app.py*\
    \ and *sentiment.pkl* and then paste the following statements into it:\n\n```\n\
    FROM python:3.8\nRUN pip install flask numpy scipy scikit-learn && \\\n    mkdir\
    \ /app\nCOPY app.py /app\nCOPY sentiment.pkl /app\nWORKDIR /app\nEXPOSE 5000\n\
    ENTRYPOINT [\"python\"]\nCMD [\"app.py\"]\n```\n\nA *Dockerfile* contains instructions\
    \ for building a container image. This one creates a container image that includes\
    \ a Python runtime, several Python packages such as Flask and Scikit-Learn, and\
    \ *app.py* and *sentiment.pkl*. It also instructs the Docker runtime that hosts\
    \ the container to open port 5000 for HTTP requests and to execute *app.py* when\
    \ the container starts.\n\nThere are several ways to build a container image from\
    \ a *Dockerfile*. If Docker is installed on your computer, you can use a `docker\
    \ build` command:\n\n```\ndocker build -t sentiment-server .\n```\n\nAlternatively,\
    \ you can upload the *Dockerfile* to a cloud platform such as Microsoft Azure\
    \ and build it there. This prevents you from having to have Docker installed on\
    \ the local machine, and it makes it easy to store the resulting container image\
    \ in the cloud. Container images are stored in *container registries*, and modern\
    \ cloud platforms host container registries as well as containers. If you launch\
    \ a container instance in Azure, the web service in the container can be invoked\
    \ with a URL similar to this one:\n\n```\nhttp://wintellect.northcentralus.azurecontainer.io:5000/analyze?text=Great\
    \ food and excellent service!\n```\n\nOne of the benefits of hosting the container\
    \ instance in the cloud is that it can be reached from any client app running\
    \ on any machine and any operating system, and the computer that hosts the app\
    \ needs nothing special installed. Containers can be beneficial even if you host\
    \ the web service locally rather than in the cloud. As long as you deploy a container\
    \ stack such as the Docker runtime to the local machine, you don’t have to install\
    \ Python and all the packages that the web service requires. You just launch a\
    \ container instance and direct HTTP requests to it via localhost.\n\n## Using\
    \ ONNX to Bridge the Language Gap\n\nIs it possible to bridge the gap between\
    \ a C# client and a Python ML model without using a web service as a middleman?\
    \ In a word, yes! The solution lies in a four-letter acronym: *ONNX*. As mentioned\
    \ earlier, ONNX stands for Open Neural Network Exchange, and it was originally\
    \ devised to allow deep-learning models written with one framework—for example,\
    \ TensorFlow—to be used with other frameworks such as PyTorch. But today it can\
    \ be used with Scikit models too. I’ll say more about ONNX in [Chapter 12](#),\
    \ but for now, let’s use it to call a Python model *directly* from an app written\
    \ in C#—no web service required.\n\nThe first step in using ONNX to bridge the\
    \ language gap is to install [Skl2onnx](#) in your Python environment. Then use\
    \ that package’s `convert_sklearn` method to save a trained Scikit model to a\
    \ `.onnx` file. Here’s a short code snippet that saves the sentiment analysis\
    \ model in [Example 7-1](#) to a file named *sentiment.onnx*. The `initial_types`\
    \ parameter specifies that the model expects one input value: a string containing\
    \ the text to score for sentiment:\n\n```python\nfrom skl2onnx import convert_sklearn\n\
    from skl2onnx.common.data_types import StringTensorType\n\ninitial_type = [('string_input',\
    \ StringTensorType([None, 1]))]\nonnx = convert_sklearn(pipe, initial_types=initial_type)\n\
    \nwith open('sentiment.onnx', 'wb') as f:\n    f.write(onnx.SerializeToString())\n\
    ```\n\nIf you wish to consume the model from Python, you first install a Python\
    \ package named [Onnxruntime](#) containing the ONNX runtime, also known as the\

    a brown will be classified as a blue.


    ![](img/628b9a382d0944bbfa786c66bc651b50_110_0.png)


    An SVM that uses the RBF kernel isn’t properly tuned until you have the right
    value for `gamma` too. `gamma` controls how far the influence of a single data
    point reaches in computing decision boundaries. Lower values use more points and
    produce smoother decision boundaries; higher values involve fewer points and fit
    more tightly to the training data. This is illustrated in Figure 5-8, where increasing
    `gamma` while holding C constant closes the decision boundary more tightly around
    clusters of classes. `gamma` can be any nonzero positive value, but values between
    0 and 1 are the most common. Rather than hardcode a default value for `gamma`,
    Scikit picks a default value algorithmically if you don’t specify one.


    In practice, data scientists experiment with different kernels and different parameter
    values to find the combination that produces the most accurate model, a process
    known as *hyperparameter tuning*. The usefulness of hyperparameter tuning isn’t
    unique to SVMs, but you can almost always make an SVM more accurate by finding
    the optimum combination of kernel type, C, and `gamma` (and for polynomial kernels,
    degree).'

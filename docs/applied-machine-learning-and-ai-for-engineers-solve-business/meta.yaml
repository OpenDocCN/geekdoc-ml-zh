- md: "what the model detected. The SeaTurtleDetector class is a child of the ObjectDetection\
    \ class implemented in *object_detection.py*. It has a `predict` method that you\
    \ can call to detect objects in an image:\n\n```python\nimport sys\nimport tensorflow\
    \ as tf\nimport matplotlib.pyplot as plt\nfrom matplotlib.patches import Rectangle\n\
    from object_detection import ObjectDetection\nfrom PIL import Image\nimport numpy\
    \ as np\n\nclass SeaTurtleDetector(ObjectDetection):\n    def __init__(self, graph_def,\
    \ labels):\n        super(SeaTurtleDetector, self).__init__(labels)\n        self.graph\
    \ = tf.compat.v1.Graph()\n        with self.graph.as_default():\n            input_data\
    \ = tf.compat.v1.placeholder(\n                tf.float32, [1, None, None, 3],\
    \ name='Placeholder')\n            tf.import_graph_def(graph_def,\n          \
    \                      input_map={'Placeholder:0': input_data},\n            \
    \                    name='')\n\n    def predict(self, preprocessed_image):\n\
    \        inputs = np.array(preprocessed_image, dtype=float)[:, :, (2, 1, 0)]\n\
    \n        with tf.compat.v1.Session(graph=self.graph) as sess:\n            output_tensor\
    \ = sess.graph.get_tensor_by_name('model_outputs:0')\n            outputs = sess.run(output_tensor,\n\
    \                               {'Placeholder:0': inputs[np.newaxis, ...]})\n\
    \            return outputs[0]\n\ndef annotate_image(image, predictions, min_score=0.7,\
    \ figsize=(12, 8)):\n    fig, ax = plt.subplots(figsize=figsize,\n           \
    \                subplot_kw={'xticks': [], 'yticks': []})\n    img_width, img_height\
    \ = image.size\n    ax.imshow(image)\n\n    for p in predictions:\n        score\
    \ = p['probability']\n\n        if score >= min_score:\n            x1 = p['boundingBox']['left']\
    \ * img_width\n            y1 = p['boundingBox']['top'] * img_height\n       \
    \     width = p['boundingBox']['width'] * img_width\n            height = p['boundingBox']['height']\
    \ * img_height\n            label = p['tagName']\n\n            rect = Rectangle((x1,\
    \ y1), width, height, fill=False,\n                              color='red',\
    \ lw=2)\n            ax.add_patch(rect)\n            label = f'{label} ({score:.0%})'\n\
    \            ax.text(x1 + (width / 2), y1, label, color='white',\n           \
    \         backgroundcolor='red', ha='center', va='bottom',\n                 \
    \   fontweight='bold', bbox=dict(color='red'))\n```\n\nNext, use the following\
    \ statements to load the serialized model in *model.pb* and the label in *labels.txt*\
    \ and initialize an object detection model:\n\n```python\n# Load the serialized\
    \ model graph\ngraph_def = tf.compat.v1.GraphDef()\nwith tf.io.gfile.GFile('model.pb',\
    \ 'rb') as f:\n    graph_def.ParseFromString(f.read())\n\n# Load the labels\n\
    with open('labels.txt', 'r') as f:\n    labels = [l.strip() for l in f.readlines()]\n\
    \n# Create the model\nmodel = SeaTurtleDetector(graph_def, labels)\n```\n\nFinally,\
    \ go out to the internet and download a sea turtle photo. Then load the photo\
    \ into your notebook and see if the model detects the sea turtle in it:\n\n```python\n\
    %matplotlib inline\n\nimage = Image.open('PATH_TO_IMAGE_FILE')\npredictions =\
    \ model.predict_image(image)\nannotate_image(image, predictions)\n```\n\nDid the\
    \ model get it right? It did for me:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_292_0.png)\n\
    \nKeep in mind that state-of-the-art accuracy in object detection is a product\
    \ of training with *lots* of labeled images. The 50 you trained with here are\
    \ a good start, but to train a model to a sufficient level of accuracy for real-world\
    \ use, you’ll probably need a minimum of 10 times more. The good news is that\
    \ once you’ve collected the images, the Custom Vision service makes the process\
    \ of labeling the images and training the model relatively easy.\n\n## Summary\n\
    \nObject detection represents the tip of the spear in the world of computer vision.\
    \ It’s how self-driving cars “see” objects in front of them, and it’s the technology\
    \ underlying numerous real-world applications. State-of-the-art object detection\
    \ is accomplished with deep learning using specially crafted CNNs that do more\
    \ than mere image classification. You can use pretrained models such as YOLO and\
    \ Mask R-CNN to detect objects in images and video frames. With Mask R-CNN, you\
    \ can even generate segmentation masks revealing additional information about\
    \ those objects.\n\nCustom object detection requires you to train models like\
    \ these with images of your own carefully labeled to denote objects and bounding\
    \ boxes. Azure’s Custom Vision service simplifies the process of training custom\
    \ object detection models, and allows the models you train to be hosted in the\
    \ cloud and called using REST APIs or downloaded and consumed locally. It’s one\
    \ of several services that comprise Azure Cognitive Services, and it’s the right\
    \ tool for the job when the job calls for detecting objects that pretrained models\
    \ weren’t trained to detect.\n\n## Chapter 13. Natural Language Processing\n\n\
    It’s not difficult to use Scikit-Learn to build machine learning models that analyze\
    \ text for sentiment, identify spam, and classify text in other ways. But today,\
    \ state-of-the-art text classification is most often performed with neural networks.\
    \ You already know how to build neural networks that accept numbers and images\
    \ as input. Let’s build on that to learn how to construct deep-learning models\
    \ that process text—a segment of deep learning known as *natural language processing*,\
    \ or NLP for short.\n\nNLP encompasses a variety of activities including text\
    \ classification, named-entity recognition, keyword extraction, question answering,\
    \ and language translation. The accuracy of NLP models has improved in recent\
    \ years for a variety of reasons, not the least of which are newer and better\
    \ ways of converting words and sentences into dense vector representations that\
    \ incorporate meaning, and a relatively new neural network architecture called\
    \ the *transformer* that can zero in on the most meaningful words and even differentiate\
    \ between different meanings of the same word.\n\nOne element that virtually all\
    \ neural networks that process text have in common is an *embedding layer*, which\
    \ uses *word embeddings* to transform arrays, or *sequences*, of scalar values\
    \ representing words into arrays of floating-point numbers called *word vectors*.\
    \ These vectors encode information about the meanings of words and the relationships\
    \ between them. Output from an embedding layer can be input to a classification\

    model.add(Dense(512, activation=''relu'', input_dim=3))

    model.add(Dense(512, activation=''relu''))

    model.add(Dense(1, activation=''sigmoid''))

    model.compile(optimizer=''adam'', loss=''binary_crossentropy'', metrics=[''accuracy''])

    ```


    That’s it. That’s all it takes to create a neural network that serves as a binary
    classifier. You still call `fit` to train the network, and you use the returned
    history object to plot the training and validation accuracy to determine whether
    you trained for a sufficient number of epochs and see how well the network fit
    to the data.


    > **NOTE**


    What is binary cross-entropy, and what does it do to help a binary classifier
    converge on a solution? During training, the cross-entropy loss function exponentially
    increases the penalty for wrong outputs to drive the weights and biases more aggressively
    in the right direction.


    Let’s say a sample belongs to the positive class (its label is 1), and the network
    predicts that the probability it’s a 1 is 0.9. The cross-entropy loss, also known
    as *log loss*, is -log(0.9), which is 0.04. But if the network outputs a probability
    of 0.1 for the same sample, the error is -log(0.1), which equals 1. What’s significant
    is that if the predicted probability is *really* wrong, the penalty is much higher.
    If the sample is a 1 and the network says the probability it’s a 1 is a mere 0.0001,
    the cross-entropy loss is -log(0.0001), or 4. Cross-entropy loss basically pats
    the optimizer on the back when it’s close to the right answer and slaps it on
    the hand when it’s not. The worse the prediction, the harder the slap.


    To sum up, you build a neural network that performs binary classification by including
    a single neuron with `sigmoid` activation in the output layer and specifying `binary_crossentropy`
    as the loss function. The output from the network is a probability from 0.0 to
    1.0 that the input belongs to the positive class. Doesn’t get much simpler than
    that!



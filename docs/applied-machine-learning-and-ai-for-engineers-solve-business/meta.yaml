    \ 10、11 和 12 章学到的模型类似。语言和翻译服务使用的模型类似于第 13 章中的模型。后两项服务体现了自然语言处理：情感分析、神经机器翻译、问答等。Python\
    \ 文本分析 SDK 中的 `TextAnalyticsClient` 类为语言服务的许多功能提供了便捷的接口。你已经看到它用于情感分析。这是另一个示例，它通过一次往返语言服务对多个文本样本应用情感分析：\n\
    \n```python\nfrom azure.core.credentials import AzureKeyCredential\nfrom azure.ai.textanalytics\
    \ import TextAnalyticsClient\n\nclient = TextAnalyticsClient(ENDPOINT, AzureKeyCredential(KEY))\n\
    \ninput = [\n    { 'id': '1000', 'text': 'Programming is fun, but the hours are\
    \ long' },\n    { 'id': '1001', 'text': 'Great food and excellent service' },\n\
    \    { 'id': '1002', 'text': 'The product worked as advertised but is ' \\n  \

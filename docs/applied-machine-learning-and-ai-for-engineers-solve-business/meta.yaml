  md: "> **NOTE**\n\nNeural networks have other, more powerful ways of taking word\
    \ order into account that don’t require related words to occur next to each other.\
    \ A conventional machine learning model can’t connect the words *blue* and *sky*\
    \ in the sentence “I like blue, for it is the color of the sky,” but a neural\
    \ network can. I will shed more light on this in [Chapter 13](#).\n\nHere’s an\
    \ example demonstrating what `CountVectorizer` does and how it’s used:\n\n```\n\
    python\nimport pandas as pd\nfrom sklearn.feature_extraction.text import CountVectorizer\n\
    \nlines = [\n    'Four score and 7 years ago our fathers brought forth,',\n  \
    \  '... a new NATION, conceived in liberty $$$,',\n    'and dedicated to the PrOpOsItIoN\
    \ that all men are created equal',\n    'One nation\\'s freedom equals #freedom\
    \ for another $nation!'\n]\n\n# Vectorize the lines\nvectorizer = CountVectorizer(stop_words='english')\n\
    word_matrix = vectorizer.fit_transform(lines)\n\n# Show the resulting word matrix\n\
    feature_names = vectorizer.get_feature_names_out()\nline_names = [f'Line {(i +\
    \ 1):d}' for i, _ in enumerate(word_matrix)]\n\ndf = pd.DataFrame(data=word_matrix.toarray(),\
    \ index=line_names,\n                  columns=feature_names)\n\ndf.head()\n```\n\
    \nHere’s the output:\n\n![](img/628b9a382d0944bbfa786c66bc651b50_87_0.png)\n\n\
    The corpus of text in this case is four strings in a Python list. `CountVectorizer`\
    \ broke the strings into words, removed stop words and symbols, and converted\
    \ all remaining words to lowercase. Those words comprise the columns in the dataset,\
    \ and the numbers in the rows show how many times a given word appears in each\
    \ string. The `stop_words='english'` parameter tells `CountVectorizer` to remove\
    \ stop words using a built-in dictionary of more than 300 English-language stop\
    \ words. If you prefer, you can provide your own list of stop words in a Python\
    \ list. (Or you can leave the stop words in there; it often doesn’t matter.) And\
    \ if you’re training with text written in another language, you can get lists\
    \ of multilanguage stop words from other Python libraries such as the [Natural\
    \ Language Toolkit (NLTK)](#) and [Stop-words](#).\n\nObserve from the output\
    \ that `equal` and `equals` count as separate words, even though they have similar\
    \ meaning. Data scientists sometimes go a step further when preparing text for\
    \ machine learning by *stemming* or *lemmatizing* words. If the preceding text\
    \ were stemmed, all occurrences of `equals` would"

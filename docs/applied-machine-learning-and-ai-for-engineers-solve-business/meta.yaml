  mdcn: "## ROI 池化\n\nROI 池化将任何感兴趣区域缩减为指定大小的特征向量，无论该区域的高度和宽度如何。假设你有一个 8 × 16 的特征图区域，并希望将其缩减为\
    \ 4 × 4。你可以将 8 × 16 的区域划分为一个 4 × 4 的网格，网格中每个单元格的大小为 2 × 4。然后，你可以取每个单元格中八个值的最大值，并将它们填入\
    \ 4 × 4 的网格中。这就是 ROI 池化。它简单、快速且有效，并且适用于任何大小和宽高比的区域。\n\n2016 年一篇题为“Faster R-CNN：通过区域提议网络实现实时目标检测”的论文通过用*区域提议网络*（RPN）取代选择性搜索，进一步提升了性能。RPN\
    \ 是一个浅层 CNN，它与主 CNN 共享层（图 12-5）。为了生成区域提议，它在最后一个共享层生成的特征图上滑动一个窗口。在窗口移动的每个位置，RPN\
    \ 评估 *n* 个称为*锚框*或*锚点*的候选区域，并根据与真实框的 IoU 分数计算每个候选区域的*目标性分数*。目标性分数和锚框被输入全连接层进行分类（锚框是否包含目标？如果包含，是什么类型？）以及回归。这些层的输出最终确定了投影到主\
    \ CNN 生成的特征图上并转发到 ROI 池化层的感兴趣区域。\n\n![](img/628b9a382d0944bbfa786c66bc651b50_270_0.png)\n\
    \nFaster R-CNN 的速度可以比 Fast R-CNN 快 10 倍，并且能够近乎实时地进行目标检测。由于 RPN 在识别候选区域方面具有优越的能力，它通常也比\
    \ Fast R-CNN 更准确。选择性搜索是静态的，但 RPN 会随着网络的训练而变得更智能。RPN 还与主 CNN 并行执行，这意味着区域提议对性能的影响很小。\n\
    \n## Mask R-CNN\n\nR-CNN 故事的下一章出现在 2017 年一篇题为“Mask R-CNN”的论文中。Mask R-CNN 通过添加*实例分割*扩展了\
    \ Faster R-CNN，实例分割使用如图 12-6 所示的*分割掩码*来识别图像中检测到的目标的形状。性能影响很小，因为实例分割与区域评估并行执行。Mask\
    \ R-CNN 的好处在于它们提供了关于检测到的目标的更多细节。例如，你可以判断一个人的手臂是否伸展——这是从简单的边界框中无法分辨的。它们也比 Faster\
    \ R-CNN 稍微准确一些，因为它们用 *ROI 对齐*取代了 ROI 池化，ROI 对齐在生成边界与其所代表区域的边界不完全对齐的特征向量时，丢弃的信息更少。\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_271_0.png)\n\nZoom 使用实例分割在视频流中为你显示自定义背景。实例分割还为基于\
    \ AI 的图像编辑工具提供支持，这些工具可以从前景中裁剪人物并将其放置在不同的背景上。让我们使用一个预训练的 Mask R-CNN 来演示。\n\n首先，[下载一个\
    \ ZIP 文件](https://example.com)，其中包含本练习所需的文件。这些文件是：\n\n- *adam.jpg*\n    一个背着背包的年轻人的照片\n\
    - *maui.jpg*\n    在夏威夷泳池边拍摄的照片\n- *mask.py*\n    包含在将图像输入 Mask R-CNN 之前进行预处理的辅助函数，以及用于解释结果的后处理函数\n\

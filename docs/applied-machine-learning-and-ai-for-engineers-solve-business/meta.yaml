    # Summary


    Machine learning offers engineers and software developers an alternative approach
    to problem-solving. Rather than use traditional computer algorithms to transform
    input into output, machine learning relies on learning algorithms to build mathematical
    models from training data. Then it uses those models to turn future inputs into
    outputs.


    Most machine learning models fall into either of two categories. Unsupervised
    learning models are widely used to analyze datasets by highlighting similarities
    and differences. They don’t require labeled data. Supervised learning models learn
    from labeled data in order to make predictions—for example, to predict whether
    a credit card transaction is legitimate. Supervised learning can be used to solve
    regression problems or classification problems. Regression models predict numeric
    outcomes, while classification models predict classes (categories).


    *k*-means clustering is a popular unsupervised learning algorithm, while *k*-nearest
    neighbors is a simple'

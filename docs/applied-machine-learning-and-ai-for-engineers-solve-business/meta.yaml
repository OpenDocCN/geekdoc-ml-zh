    \ correctly identified Colin Powell 19 times out of 20, Donald Rumsfeld 20 times\
    \ out of 20, and so on. That’s not bad. And it’s a great example of support vector\
    \ machines at work.\n\n## Summary\n\nSupport vector machines, or SVMs, frequently\
    \ fit to datasets better than other learning algorithms. SVMs are maximum-margin\
    \ classifiers that use kernel tricks to simulate adding dimensions to data. The\
    \ theory is that data that isn’t linearly separable in $m$ dimensions might be\
    \ separable in $n$ dimensions if $n$ is higher than $m$. SVMs are most often used\
    \ for classification, but they can perform regression too. As an experiment, try\
    \ replacing `GradientBoostingRegressor` in the taxi-fare example in Chapter 2\
    \ with SVR and using `GridSearchCV` to optimize the model’s hyperparameters. Which\
    \ model produces the highest cross-validated coefficient of determination?\n\n\
    SVMs usually train better with data that is normalized to unit variance. That’s\
    \ true even if the values in all the columns have similar ranges, but it’s especially\
    \ true if they *don’t* have similar ranges. Scikit’s `StandardScaler` class applies\
    \ unit variance to data. Unit variance is achieved by dividing the values in a\
    \ column by the mean of all the values in the column and dividing by the standard\
    \ deviation. Scikit’s `make_pipeline` function enables you to combine transformers\
    \ such as `StandardScaler` and classifiers such as `SVC` into one logical unit\
    \ to ensure that data passed to `fit`, `predict`, and `predict_proba` undergoes\
    \ the same transformations.\n\nSVMs require tuning in order to achieve optimum\
    \ accuracy. Tuning means finding the right values for parameters such as C, gamma,\
    \ and kernel, and it entails trying different parameter combinations and assessing\
    \ the results. Scikit provides classes such as GridSearchCV to help, but they\
    \ increase training time by training the model once for each unique combination\
    \ of parameter values.\n\nSVMs can seem magical in their ability to fit mathematical\
    \ models to complex datasets. But in my view, that magic takes a back seat to\
    \ the numerical gymnastics performed by principal component analysis (PCA), which\
    \ solves a variety of problems routinely encountered in machine learning. I often\
    \ introduce PCA by telling audiences that it’s the best-kept secret in machine\
    \ learning. After [Chapter 6](https://example.com), it will be a secret no longer.\n\
    \n> 1 RBF is short for [radial basis function](https://example.com).\n\n## Chapter\
    \ 6. Principal Component Analysis\n\nPrincipal component analysis, or PCA, is\
    \ one of the minor miracles of machine learning. It’s a dimensionality reduction\
    \ technique that reduces the number of dimensions in a dataset without sacrificing\
    \ a commensurate amount of information. While that might seem underwhelming on\
    \ the face of it, it has profound implications for engineers and software developers\
    \ working to build predictive models from their data.\n\nWhat if I told you that\
    \ you could take a dataset with 1,000 columns, use PCA to reduce it to 100 columns,\
    \ and retain 90% or more of the information in the original dataset? That’s relatively\
    \ common, believe it or not. And it lends itself to a variety of practical uses,\
    \ including:\n\n- Reducing high-dimensional data to two or three dimensions so\
    \ that it can be plotted and explored\n- Reducing the number of dimensions in\
    \ a dataset and then restoring the original number of dimensions, which finds\
    \ application in anomaly detection and noise filtering\n- Anonymizing datasets\
    \ so that they can be shared with others without revealing the nature or meaning\
    \ of the data\n\nAnd that’s not all. A side effect of applying PCA to a dataset\
    \ is that less important features—columns of data that have less relevance to\
    \ the outcome of a predictive model—are removed, while dependencies between columns\
    \ is eliminated. And in datasets with a low ratio of samples (rows) to features\
    \ (columns), PCA can be used to increase that ratio. As a rule of thumb, you typically\
    \ want a dataset used for machine learning to have *at least* five times as many\
    \ rows as it has columns. If you can’t add rows, an alternative is to use PCA\
    \ to shave columns.\n\nOnce you learn about PCA, you’ll wonder how you lived without\
    \ it. Let’s take a few moments to understand what it is and how it works. Then\
    \ we’ll look at some examples demonstrating why it’s such an indispensable tool.\n\
    \n### Understanding Principal Component Analysis\n\nOne way to wrap your head\
    \ around PCA is to see how it reduces a two-dimensional dataset to one dimension.\

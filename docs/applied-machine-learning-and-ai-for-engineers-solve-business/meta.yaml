    \ class identifiers corresponding to classes in the COCO dataset: 1 for a person,\
    \ 2 for a bicycle, and so on. These identify the objects in the image:\n\n```python\n\
    array([ 1, 25, 27, 25, 25, 27, 25, 27, 27, 25, 1, 1, 1, 25, 75],\n      dtype=int64)\n\
    ```\n\nThe third array contains confidence scores for the 13 objects. They range\
    \ from a high of 99.9% for the person in the image to a low of 5.5% for the logo\
    \ on his cap, which the model thinks might be a clock. Observe that only two objects\

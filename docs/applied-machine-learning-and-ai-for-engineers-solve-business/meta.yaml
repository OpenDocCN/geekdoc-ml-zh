    is the one assigned the highest probability. In this example, purple data points
    represent class 0, light blue represent class 1, taupe represent class 2, and
    red represent class 3. Here the network is asked to classify a point that lies
    at (0.2, 0.8):


    ```

    model.predict(np.array([[0.2, 0.8]]))

    ```


    The answer is an array of four probabilities corresponding to classes 0, 1, 2,
    and 3, in that order:


    ```


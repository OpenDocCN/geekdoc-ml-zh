    \ CNN 和迁移学习应用于相同的 LFW 子集，看看它们在识别人脸方面是否能做得更好。在此过程中，你将学到关于预训练 CNN 以及这些 CNN 训练时生成的权重特异性的重要一课。\n\
    \n## 将迁移学习应用于人脸识别\n\n探索基于 CNN 的人脸识别的第一步是加载 LFW 数据集。这一次，我们将加载全尺寸彩色图像并将其裁剪为 128\
    \ × 128 像素。代码如下：\n\n```python\nimport pandas as pd\nfrom sklearn.datasets import\
    \ fetch_lfw_people\n\nfaces = fetch_lfw_people(min_faces_per_person=100, resize=1.0,\n\

    # ## Factoring Word Order into Predictions


    Both of the models you just built are *bag-of-words* models that ignore word order.
    Such models are common and are often more accurate than other types of models.
    But that’s not always the case. The relative position of the words in a sentence
    sometimes has meaning. *Credit* and *card* should probably influence a spam classifier
    one way if they appear far apart in a sentence and another way if they appear
    together.'

    \n## 双向编码器表示来自Transformer (BERT)\n\n2017年Transformer的引入为NLP领域的另一项里程碑式创新奠定了基础：双向编码器表示来自Transformer，简称BERT。谷歌研究人员在2018年的一篇题为“BERT：用于语言理解的深度双向Transformer预训练”的论文中介绍了BERT，它通过提供可以针对各种NLP任务进行微调的预训练Transformer，推进了最先进的技术水平。\n\
    \nBERT通过使用来自维基百科文章的超过25亿个单词和来自Google Books的8亿个单词进行训练，从而获得了语言理解能力。训练需要在64个张量处理单元（TPU）上运行四天。微调是通过使用特定任务的样本和降低的学习率对预训练模型进行进一步训练来完成的（图13-7）。例如，微调BERT以执行情感分析并在准确性上超越词袋模型相对简单。BERT的价值在于它对其训练所用的语言具有天生的理解力，并且可以被优化以执行特定领域的任务。\n\
    \n除了使用大量样本进行训练外，BERT理解人类语言的关键是一项称为*掩码语言建模*（简称MLM）的创新。MLM背后的大思想是，模型在预测短语“Every\
    \ good ____ does fine”中空白处应填入哪个单词时，比预测短语“Every good ____”中的下一个单词有更好的机会。答案可能是*boy*，如“Every\
    \ good boy does fine”，也可能是*turn*，如“Every good turn deserves another”。单向模型查看左侧或右侧的文本，并尝试预测下一个单词应该是什么。另一方面，MLM使用左侧*和*右侧的文本为其决策提供信息。这就是为什么BERT是一个“双向”Transformer。\n\
    \n当BERT模型进行预训练时，每个序列中指定百分比的单词标记（通常为15%）被随机移除或“掩码”，以便模型可以从周围的单词中学习预测它们。此外，BERT模型通常被预训练以进行下一句预测，这使它们更擅长某些NLP任务，如问答。\n\
    \nBERT被称为NLP的“瑞士军刀”。谷歌使用它来[改进搜索结果](https://example.com)，并在你输入Gmail或Google文档时预测文本。已经发布了数十种变体，包括[DistilBERT](https://example.com)，它保留了原始模型97%的准确性，同时重量减轻了40%，运行速度提高了60%。还有已经针对特定任务（如问答）进行微调的BERT变体。这些模型可以使用特定领域的数据集进一步优化，也可以直接使用。\n\
    \n![图13-7. 双向编码器表示来自Transformer (BERT)](img/628b9a382d0944bbfa786c66bc651b50_323_0.png)\n\
    \n## 构建基于BERT的问答系统\n\nHugging Face的transformers包包含几个已经针对特定任务进行微调的预训练BERT模型。一个例子是[minilm-uncased-squad2模型](minilm-uncased-squad2\
    \ model)，它使用斯坦福的[SQuAD 2.0数据集](SQuAD 2.0 dataset)进行训练，通过从文档中提取文本来回答问题。为了了解这类模型能完成什么，让我们用它来构建一个简单的问答系统。\n\
    \n首先，一些背景。当你向谷歌提出如[图13-8](Figure 13-8)所示的问题时，它会查询一个包含数十亿网页的数据库，以识别可能包含答案的网页。然后，它使用基于BERT的NLP模型从它识别的页面中提取答案，并根据置信度对它们进行排名。\n\
    \n![图13-8](img/628b9a382d0944bbfa786c66bc651b50_324_0.png)\n\n让我们加载一个已经针对问答进行微调的预训练BERT模型，并使用它从本书的文本段落中提取答案。我们将使用的模型是MiniLM模型的一个版本，该模型在2020年的一篇题为“MiniLM：用于预训练Transformer任务无关压缩的深度自注意力蒸馏”的论文中介绍。这个版本在SQuAD\
    \ 2.0上进行了微调，该数据集包含超过10万个由人类生成的问题，这些问题与从维基百科文章中提取的答案配对，外加5万个没有答案的问题。MiniLM架构使得从一个数据集获得的阅读理解能力可以应用于其他数据集，而几乎不需要重新训练。\n\

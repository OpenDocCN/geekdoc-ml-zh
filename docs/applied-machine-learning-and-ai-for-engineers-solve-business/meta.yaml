    \            return True;\n\n    return False\n```\n\n将该函数应用于时间序列早期代表正常行为的一行，并确认其返回False：\n\
    \n```python\nx = df.loc[['2004-02-16 22:52:39']]\nis_anomaly(x, pca, 0.002)\n\
    ```\n\n将该函数应用于时间序列后期代表异常行为的一行，并确认其返回True：\n\n```python\nx = df.loc[['2004-02-18\
    \ 22:52:39']]\nis_anomaly(x, pca, 0.002)\n```\n\n现在将该函数应用于数据集中的所有样本，并将异常样本标记为红色，以便可视化异常行为被检测到的时间：\n\
    \n```python\ndf.plot(figsize = (12, 6))\n\nfor index, row in df.iterrows():\n\
    \    if is_anomaly(pd.DataFrame([row]), pca, 0.002):\n        plt.axvline(row.name,\
    \ color='r', alpha=0.2)\n```\n\n输出如下：\n\n![](img/628b9a382d0944bbfa786c66bc651b50_146_0.png)\n\
    \n重复此过程，但这次使用0.0002而不是0.002作为损失阈值：\n\n```python\ndf.plot(figsize = (12, 6))\n\n\
    for index, row in df.iterrows():\n    if is_anomaly(pd.DataFrame([row]), pca,\
    \ 0.0002):\n        plt.axvline(row.name, color='r', alpha=0.2)\n```\n\n输出如下：\n\
    \n![](img/628b9a382d0944bbfa786c66bc651b50_147_0.png)\n\n你可以通过调整用于检测异常的阈值值来调整模型的灵敏度。使用0.002的损失阈值可以在轴承故障发生前约两天预测到，而使用0.0002的损失阈值则可以提前约三天预测到。通常，你需要选择一个尽可能早地预测故障而不引起误报的损失阈值。\n\
    \n## 多变量异常检测\n\n在前面的例子中，我们能否通过简单地监控单个轴承来预测故障？也许可以。但是，如果即将发生的故障是由*两个*轴承的振动略微升高而不是仅仅一个轴承来指示的呢？工程师们经常发现，预示即将发生问题的不是单个传感器的读数，而是多个传感器读数的组合。这些读数可能来自不同类型的传感器：例如，在汽车和[航空航天应用](https://example.com)中的温度传感器和压力表，或者在[医疗保健应用](https://example.com)中的心脏监护仪和血压监护仪。使用PCA将维度降至一维，是为了捕捉来自单个传感器的数据之间的关系并系统地处理读数，这种技术被称为*多变量异常检测*。\n\
    \n使用PCA检测多变量系统异常的一个局限性在于，由于它使用线性变换，PCA在建模变量之间的线性关系方面比非线性关系更好。相比之下，神经网络擅长建模非线性数据。这就是当今最先进的多变量异常检测通常依赖深度学习的主要原因。\n\
    \n随着变量数量的增加，建模它们之间相互依赖关系的挑战也随之增加。整体系统健康状况由数十个其他方面决定的情况并不少见"

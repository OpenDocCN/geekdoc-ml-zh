    \ 2 | Bearing 3 | Bearing 4 |\n|---|---|---|---|---|\n| 2004-02-12 10:32:39 |\
    \ 0.058333 | 0.071832 | 0.083242 | 0.043067 |\n| 2004-02-12 10:42:39 | 0.058995\
    \ | 0.074006 | 0.084435 | 0.044541 |\n| 2004-02-12 10:52:39 | 0.060236 | 0.074227\
    \ | 0.083926 | 0.044443 |\n| 2004-02-12 11:02:39 | 0.061455 | 0.073844 | 0.084457\
    \ | 0.045081 |\n| 2004-02-12 11:12:39 | 0.061361 | 0.075609 | 0.082837 | 0.045118\
    \ |\n\nThe dataset contains 984 samples. Each sample contains vibration data for\

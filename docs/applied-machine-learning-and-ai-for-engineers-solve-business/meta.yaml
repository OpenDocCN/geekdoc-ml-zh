    \   })\n    test: Dataset({\n        features: ['text', 'label'],\n        num_rows:\
    \ 25000\n    })\n    unsupervised: Dataset({\n        features: ['text', 'label'],\n\
    \        num_rows: 50000\n    })\n})\n```\n\nimdb['train'] 包含 25,000 个训练样本，而 imdb['test']\

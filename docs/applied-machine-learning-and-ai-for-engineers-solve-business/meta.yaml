    other words, you reduced the number of dimensions by almost 95%, and yet you retained
    almost 95% of the information in the dataset. If that’s not awesome, I don’t know
    what is.


    A logical question to ask is, what is the “right” number of components? In other
    words, what number of components strikes the best balance between reducing the
    number of dimensions in the dataset and retaining most of the information? One
    way to find that number is with a *scree plot*, which charts the proportion of
    explained variance for each dimension. The following code produces a scree plot

  - '[PAGE 287]


    CIFAR-10 dataset will be used in this section as the example, it’s a collection
    of images that are widely used for machine learning or computer vision purposes.
    It contains 60,000 color images in ten different clusters, each has 32 × 32 pixels.
    And each cluster has 6,000 random images.


    Although this dataset is not real-world pictures and is in very low resolution
    (32 × 32), it’s ideal for learning purposes, because it does not cost high computation
    resources, users can quickly try different algorithms without a long time (many
    hours) of training process.


    The dataset comes with keras library and is divided randomly into a training set
    of 50,000 and a testing set of 10,000. The ten clusters are evenly and randomly
    divided into both training and testing sets, meaning each cluster has 5,000 in
    training set and 1,000 in test set. The ten clusters are airplane, automobile,
    bird, cat, deer, dog, frog, horse, ship and truck.


    See details of CIFAR-10 dataset at: [https://www.cs.toronto.edu/~kriz/cifar.html](https://www.cs.toronto.edu/~kriz/cifar.html)


    Now load the CIFAR-10 dataset,


    ```

    1  import keras

    2  from keras.datasets import cifar10

    3  (X_train, y_train), (X_test, y_test) =

    4                              cifar10.load_data()

    5  print("X_train", X_train.shape)

    6  print("y_train", y_train.shape)

    7  print("X_test", X_test.shape)

    8  print("y_test", y_test.shape)

    ```


    The size of the training and testing sets:

    X_train (50000, 32, 32, 3)

    y_train (50000, 1)

    X_test (10000, 32, 32, 3)

    y_test (10000, 1)


    The cluster labels are in y_train and y_test, they look something like:

    [6, 9, 2, 3, 4, 5, 0, 3 ... ]


    Each cluster is represented by a number from 0 to 9.


    The source codes at *CNNOnCIFAR10.py* show 100 random sample images with their
    labels from the dataset, reference it to see what the images look like.'
  - "[PAGE 288]\n\n# Build a CNN Model\n\nkeras defines models in a sequence of layers.\
    \ First, create a Sequential model, which will make the output of a layer as the\
    \ input to the next layer:\n\n```\ncnn_model = Sequential()\n```\n\nAdd the first\
    \ convolution and max pooling layers to the cnn_model:\n\n```\ninput_shape = X_train.shape[1:]\n\
    cnn_model.add(Conv2D(128, kernel_size=(3, 3),\n                   input_shape\
    \ = input_shape,\n                   strides = (1, 1),\n                   padding\
    \ = \"same\",\n                   activation = \"relu\"))\ncnn_model.add(MaxPooling2D(pool_size\
    \ = (2, 2)))\n```\n\nThe convolution layer is added by `conv2D()` function to\
    \ the model, the first parameter is the number of features, it's a best practice\
    \ that the number should be the power of 2, like 4, 8, 16, 32, 64, 128, etc.,\
    \ although this is not required. The second parameter is the size of the features,\
    \ it's common to use odd numbers, like 1×1, 3×3, 5×5 or 7×7, and so on. As mentioned\
    \ earlier, only the number and size of the features need to be specified, the\
    \ contents will be learned by themselves during the training process.\n\nThe third\
    \ parameter is the size of the input image, the fourth and fifth parameters are\
    \ the stride and padding, which are optional. As explained earlier, `strides =\
    \ (1,1)` specifies strides for horizontal and vertical are 1 and 1, meaning the\
    \ kernel moves one by one in both directions. `padding=\"same\"` specifies the\
    \ paddings will be added accordingly to make the output the same size as the input.\
    \ The padding can also be specified as \"valid\", meaning no padding. Therefore,\
    \ in this case `strides = (1,1)` and `padding= \"same\"` will make the output\
    \ the same size as the input.\n\nThe last parameter of `conv2D()` is the activation\
    \ function, ReLU function is specified here, see section 7.4.2.4, it will convert\
    \ all negative values to 0, and linear for positive values.\n\nThe input data\
    \ is color images, so each image has RGB three color channels, as explained earlier,\
    \ the convolution will be performed on each color channel, and then the result\
    \ values of the three channels will be summed up to generate the convolution results."
  - '[PAGE 289]


    The pooling layer is added to `cnn_model` by `MaxPooling2D()` function in line
    16, it performs the max pooling operation on the convolution outputs, and the
    pool size is specified as 2×2 here.


    Then add two more convolution/pooling layers following the first one:


    ```

    17  cnn_model.add(Conv2D(64,

    18                      kernel_size=(3, 3),

    19                      strides = (1, 1),

    20                      padding = "same",

    21                      activation = ''relu''))

    22  cnn_model.add(MaxPooling2D(pool_size = (2, 2)))

    23  cnn_model.add(Dropout(0.25))

    24

    25  cnn_model.add(Conv2D(32,

    26                      kernel_size=(3, 3),

    27                      strides = (1, 1),

    28                      padding = "same",

    29                      activation = ''relu''))

    30  cnn_model.add(MaxPooling2D(pool_size = (2, 2)))

    31  cnn_model.add(Dropout(0.25))

    ```


    The second layer has 64 features, and the third has 32. The feature size, activation
    function and pool size are the same as the previous one.


    In line 23 and 31, `Dropout()` is added to the model, dropout is a technique used
    in deep neural networks to prevent overfitting. *Overfitting* occurs when a model
    is too complex, and it starts to fit to noise in the training data rather than
    the underlying pattern. Dropout helps prevent this by randomly dropping out some
    of the neurons in a layer during training, which forces the remaining neurons
    to learn more robust features that generalize better to new data. Please see materials
    #18 and #19 in References section at the end of this book for more details about
    overfitting.


    The parameter of `Dropout()` is the percentage of neuron nodes to drop temporarily.
    Here 0.25 is specified, meaning 25% of nodes will be dropped during the training
    process.


    Now there are three layers of convolution/pooling in `cnn_model`, the first layer
    has 128 features, the second has 64 and the third has 32. Next is to flatten the
    output into a 1D array in order to feed into the fully connected neural network.


    ```

    32  cnn_model.add(Flatten())

    ```'
  - '[PAGE 290]


    The last one is the fully connected layer, it’s basically an artificial neural
    network, its input is the output of the flattened data.


    ```

    33  cnn_model.add(Dense(units=256, activation=''relu''))

    34  cnn_model.add(Dropout(0.5))

    35  cnn_model.add(Dense(units=128, activation=''relu''))

    36  cnn_model.add(Dropout(0.5))

    37  cnn_model.add(Dense(units=10, activation=''softmax''))

    ```


    Dense() function is to specify the fully connected layer. As introduced earlier,
    an artificial neural network has an input layer, an output layer, and the hidden
    layer(s). In this case the input layer is the output from the Flatten() in line
    32, then line 33 and 35 specify two hidden layers with nodes of 256 and 128 respectively,
    the activation function is ReLU. The output layer has 10 nodes corresponding to
    the ten clusters of the dataset, the activation function is softmax, which is
    commonly used in the output layer of neural networks for multi-cluster classification
    problems, where the goal is to predict the probability of each cluster.


    Two Dropout() layers are added in between to prevent overfitting, in line 34 and
    36.


    Finally compile the model,


    ```

    38  cnn_model.compile(optimizer=''adam'',

    39                    loss=''categorical_crossentropy'',

    40                    metrics=[''accuracy''])

    ```


    When compiling a keras model, we need to specify three key components: the optimizer,
    the loss function, and the evaluation metrics, these components are specified
    in the compile method in line 38 to 40.


    The *optimizer* determines the algorithm used for optimizing the weights of the
    neural network during training.


    The *loss function* measures how well the model performs during training. The
    loss function calculates the differences between the predicted output and the
    actual output for a given input.


    The *metrics* evaluate the performance of the model after training. They are similar
    to the loss function, but they are used for monitoring specific metrics during
    training, such as accuracy or precision.


    keras provides a variety of predefined optimizers, loss functions and metrics,
    the choice of them depends on the specific problems and the characteristics of
    the data.'

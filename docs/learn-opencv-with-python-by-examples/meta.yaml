    # 6.8.2. Remove Background by Contour


    Source: RemoveBackgroundByContour.py

    Library: common/ImageProcessing.py


    Contour was introduced in previous sections when detecting shapes from images.
    To recap, a contour is a curve that represents the boundary of an object in an
    image, it’s a sequence of connected pixels that form a continuous line around
    the object. The background of the images can also be identified and removed based
    on the contours, if an image has a significant contour, it’s worthwhile to try
    this method. Take a look at Figure 6.29, we want to remove the background:


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_177_0.png)


    Figure 6.29 Remove Background by Contour


    As introduced in section 6.1, the Canny edge detection will be used to find out
    the edges of the object in the image (in our case, the bird), and use dilation
    and erosion to modify the edges. Then we find contours as introduced in section
    6.3, and draw the contours as the mask. Remember in last section, the final mask
    has some noises, and we did not handle them. Now in this example we will use dilation,
    erosion and Gaussian blur to minimize the noises in the mask. Add the following
    function to the ImageProcessing class,


    ```

    1 def remove_background_by_contour(self,

    2                     gs_blur=3,

    3                     canny_lower=10,

    4                     canny_upper=200,

    5                     dilate_iter=1,


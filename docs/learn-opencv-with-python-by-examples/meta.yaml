    ```\n\n## Convolution for a Picture\n\nThen how the convolution works on a picture?\
    \ Consider a picture of a dog, when human look at the picture we look at the features\
    \ or objects in the picture instead of pixel by pixel, like eyes, nose, mouth,\
    \ ears, head, body and tails, then based on the experiences we know it’s a dog.\n\
    \nFirst, we want to identify, for example, the eyes of the dog. Create a feature\
    \ or kernel matrix for the eye, the convolution operation is performed by sweeping\
    \ the feature over the whole image, in the convolution results there will be two\
    \ eyes identified in the corresponding location. If the two eyes of the dog appear\
    \ at the left part of the image, there will also be the two largest values at\
    \ the left part of the convolution results.\n\nThe convolution results are called\
    \ *feature maps* in the terminology of convolutional neural network (CNN), because\
    \ they contain the features identified from the image. Then we will detect other\
    \ features from the image in the same way, like nose, mouth, ears, head, body,\
    \ tails and so on. As the results, there are multiple *feature maps* generated\
    \ in this convolution layer.\n\nA color picture has three color channels for blue,\
    \ green and red. The convolution is performed on each color channel, and then\
    \ the results are summed up by channels, and become the output of the convolution.\n\
    \nAlternatively, the color picture can be converted to a grayscale one in the\
    \ pre-processing step, as described in earlier sections. Then do the convolution\
    \ on the grayscale image.\n\nIn conclusion, the convolution layer will output\
    \ $n$ channels of feature maps in 2D matrices. Each feature map might have the\
    \ same size as the original image or might reduce the size to some extent depending\
    \ on the stride as introduced earlier. The important thing is that the convolution\
    \ layer is not to reduce the size but identify the features.\n\nThe features are\
    \ part of the learning process of the convolutional neural network (CNN), meaning\
    \ the model will learn by itself during the training, in other words, we don’t\
    \ have to specify the contents of the features, like eyes, nose, ears etc., they\
    \ will be learned by the CNN model.\n\n## 7.5.3. Pooling Layer\n\nThe purpose\
    \ of the pooling layer is to down-sample, or reduce the size while keeping the\
    \ identified features. It is normally applied after the convolution layer. There\
    \ are different types of pooling methods, the most widely used are *max pooling*\
    \ and *average pooling*.\n\nSimilar to the convolution operation, pooling also\
    \ uses a kernel matrix to sweep over the feature maps, instead of doing a dot\
    \ product, the pooling takes the maximum value of the covered area in the feature\
    \ maps, which is the *max pooling*. In the case of *average pooling*, take the\
    \ average value of the covered area.\n\nAs Figure 7.43, this is a $3 \\times 3$\
    \ kernel for max pooling, take the maximum value from the $3 \\times 3$ area covered\
    \ by the kernel in the upper-left, which is 23, this is the first value in the\
    \ max pooling result.\n\n![Figure 7.43 Max Pooling](img/b99f6edaf6f730ad313ce66bc5a26be2_282_0.png)\n\
    \nFigure 7.43 Max Pooling\n\nIn the case of *average pooling*, take the average\
    \ value of the area covered by the kernel as the first value of the result, which\
    \ is 11.\n\nThen slide the kernel to the next position, and find the maximum,\
    \ or average of the covered area. Different from convolution, it will not overlap\
    \ the already covered elements.\n\n![Figure 7.44 Max Pooling, Continue](img/b99f6edaf6f730ad313ce66bc5a26be2_283_0.png)\n\
    \nFigure 7.44 Max Pooling, Continue\n\nFinally, the kernel will traverse the entire\
    \ matrix of the feature map and get the result in Figure 7.45.\nThe result of\
    \ the pooling layer significantly reduces the size of the input while keeping\
    \ the features. In Figure 7.45 of the max pooling result, the value in the middle\
    \ is 61, which is the same as that identified by the convolution layer. Say this\
    \ is identified as the nose of the dog, it is kept in the max pooling result.\n\
    Same as convolution, the *Padding* and *Stride* still apply to the pooling layer\
    \ in the same way.\n\n![Figure 7.45 Max Pooling Result](img/b99f6edaf6f730ad313ce66bc5a26be2_283_1.png)\n\
    \nFigure 7.45 Max Pooling Result\n\nHere is the python implementation of max pooling:\n\
    \n```python\nimport numpy as np\ndef maxpooling2d(image, kernel=[3,3],\n     \
    \            stride=[0,0], padding=[0,0]):\n    p_h, p_w = padding\n    s_h, s_w\
    \ = stride\n    k_h, k_w = kernel\n    image = np.pad(image,\n               \
    \    [(p_h, p_h), (p_w, p_w)],\n                   mode='constant',\n        \
    \           constant_values=0)\n    i_h, i_w = image.shape\n    output_h = -(-i_h\
    \ // (k_h + s_h))\n    output_w = -(-i_w // (k_w + s_w))\n    output = np.zeros((output_h,\
    \ output_w))\n    for y in range(0, output_h):\n        for x in range(0, output_w):\n\
    \            y_, x_ = y*(s_h+k_h), x*(s_w+k_w)\n            c = image[y_: y_+k_h,\
    \ x_ : x_+k_w]\n            output[y][x] = np.amax(c)\n    return output\n```\n\
    \nThen run `maxpooling2d()` after `convolution2d()`,\n\n```python\nconv2d = convolution2d(image,\
    \ kernel,\n                       padding=[1,1])\nmaxp2d = maxpooling2d(conv2d,\
    \ kernel=[3,3])\nprint(maxp2d)\n```\n\nThe max pooling result is:\n\n```\n[[23.\
    \ 39.  5.]\n [31. 61.  7.]\n [10.  9.  6.]]\n```\n\nIn conclusion, the purpose\
    \ of this layer is to reduce the size of data, or down-sampling. It takes the\
    \ $n$ channels of feature maps from the convolution layer, and performs pooling\
    \ operations on every channel, then outputs $n$ channels of pooling results, each\
    \ as 2D matrix.\nThe above codes are available at *ConvolutionalNeuralNetwork.py*\
    \ in the Github repository.\n\n## 7.5.4. Fully Connected Layer\n\nThe fully connected\
    \ layer is basically an artificial neural network (ANN) introduced in section\
    \ 7.4.\nThe output of the pooling layer consists of $n$ channels of 2D matrices,\
    \ they are flattened into a 1D array and then connected to the input of a fully\
    \ connected layer in Figure 7.46:\n\n![Figure 7.46 Fully Connected Layer of CNN](img/b99f6edaf6f730ad313ce66bc5a26be2_285_0.png)\n\
    \nFigure 7.46 Fully Connected Layer of CNN\n\nAlthough there are several hidden\
    \ layers shown in Figure 7.46, it depends on the needs, it could be only one hidden\
    \ layer, or even no hidden layers. Some adjustments and fine-tunes are normally\
    \ needed at this layer for the best results.\n\n## 7.5.5. CNN Architecture\n\n\
    A CNN is made of the convolution layers, the pooling layers and a fully connected\
    \ layer. Now put them together, the architecture of the CNN is shown as Figure\
    \ 7.47.\n\nThe original pictures are the input of the CNN model. A number of features\
    \ are applied to the pictures in the first convolution layer, it generates $n_1$\
    \ feature maps. And then goes to the pooling layer, max pooling is performed on\
    \ the feature maps and generates $n_1$ channels of pooling output.\n\n![Figure\
    \ 7.47 CNN Architecture](img/b99f6edaf6f730ad313ce66bc5a26be2_285_1.png)\n\nFigure\
    \ 7.47 CNN Architecture\n\nThere are two layers of convolution/pooling in the\
    \ above architecture, depending on the needs it could be one or multiple layers\
    \ of convolution/pooling.\nConsider the first convolution/pooling layer to identify\
    \ some features in the first level like edges, eyes, nose, mouth, ears, paws etc.\
    \ The output of this layer becomes the input of the second convolution/pooling\
    \ layer.\nIn the second convolution layer, again, a number of features are applied,\
    \ and this layer generates $n_2$ channels of feature maps, the pooling operations\
    \ will be performed on these feature maps.\n\nConsider the second convolution/pooling\
    \ layer to identify the next level of features like the head, body and legs of\
    \ the dog, this is a higher level of features because the head includes the eyes,\
    \ nose, mouth and ears, and the legs include paws, and so on.\nIn CNN models,\
    \ we do not need to provide the contents of the features, the model will learn\
    \ by itself from the input pictures during the training process, where thousands\
    \ or even tens of thousands of pictures are used for training. The back-propagation\
    \ process will be able to update the contents of the features in the convolution\
    \ layer and make them best fit to the dataset during the training process. The\
    \ only thing we need to provide is the size and number of features in each layer.\n\
    Depending on the needs, more layers of convolution/pooling might be added. After\
    \ the convolution/pooling layers, the amount of data is significantly reduced,\
    \ and the features are extracted in the output.\nThe next operation is flattening,\
    \ because the output of the pooling layer consists of $n_2$ channels of 2D matrix,\
    \ they will be flattened to a 1D array in order to feed into the fully connected\
    \ layer.\nFinally, the data goes to the fully connected neural network for classification\
    \ calculation, which is exactly the same as the ANN in the previous section.\n\
    \n## 7.5.6. Build a CNN Model with Tensorflow/Keras\n\n```\nSource: CNNonCIFAR10.py\n\

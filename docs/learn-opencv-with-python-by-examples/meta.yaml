    \ with 6,000 images per class. The classes include airplane, automobile, bird,\
    \ cat and so on. It’s also available from `keras.datasets` package.\n- IRIS Flower\
    \ dataset: a small but multivariate dataset with labels. This dataset comes with\
    \ the `sklearn.datasets` package.\n- In addition to the pre-built datasets, we\
    \ will also learn how to generate sample data using the functions provided by\
    \ `sklearn.datasets`.\n\nThere are several Python packages needed for this chapter,\
    \ they must be installed before running the example codes, reference section 1.4\
    \ for the versions of these packages that are used in this book.\n\n- `sklearn`,\
    \ or `scikit-learn`: an open source library for machine learning, it supports\
    \ supervised and unsupervised learning. It also provides various tools and utilities\
    \ for data preprocessing, model selection and evaluation.\n- `keras`: an open\
    \ source library for machine learning, it’s very powerful to support machine learning\
    \ and deep learning.\n- `tensorflow`: an open source library for machine learning,\
    \ it’s usually installed together with `keras`.\n- `matplotlib`: an open source\
    \ library for data visualizations in Python, it has been used in previous chapters.\n\
    \nIf these libraries are not installed on your environments, it’s strongly suggested\
    \ installing them following the instructions in section 2.3, then you will be\
    \ able to execute the source codes for this chapter.\n\nEnjoy the Machine Learning!\n\
    \n## 7.1. K-Means Clustering\n\n### 7.1.1. What is K-Means Clustering\n\nSource:\
    \ K-Means.py\n\nK-means clustering is a popular unsupervised machine learning\
    \ algorithm used to partition a given dataset into $k$ clusters based on their\
    \ similarities, where $k$ is a predefined number.\n\nIt is an unsupervised algorithm\
    \ because it does not require labeled data to train the model, the model will\
    \ learn from the data by itself. In other words, it does not rely on any predetermined\
    \ target variables or output values to guide its learning process.\n\nThe goal\
    \ of the K-means algorithm is to group similar data points together into clusters\
    \ based on their similarity or distance from each other. It does this by finding\
    \ a number of *centroids* to represent the center of clusters and iteratively\
    \ assigning each data point to the nearest cluster centroid, and then updating\
    \ the centroids based on the new members of the clusters. The *centroids* are\
    \ arithmetic mean position, or average position, of the clusters of the data.\
    \ The process is repeated until the centroids no longer move or a maximum number\
    \ of iterations is reached.\n\nIn a real-world use case, for example, a T-shirt\
    \ maker wants to make products fit for a wide range of people with different heights\
    \ and weights. The maker is planning to make three sizes: L, M and S for different\
    \ groups of people. The three sizes are called *centroids* in the terminology\
    \ of K-means algorithm, each *centroid* represents a group of people, or a cluster\
    \ of people.\n\nK-Means is an effective algorithm to resolve this type of problem,\
    \ it will find the three centroids (L, M and S) from the dataset. It is an unsupervised\
    \ learning method because it will find the results from the data itself by calculation,\
    \ we don't need to mark each data with a label.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_199_0.png)\n\
    \nFigure 7.1 T-shirt Example\n\nAs shown in Figure 7.1, the horizontal axis represents\
    \ the height of people, and the vertical axis represents their weight. Each data\
    \ point represents a person, the data points can be grouped in three clusters:\
    \ S, M and L.\n\nThe arithmetic mean (average) position of each group is the *centroid*\
    \ and located near the center of each group, shown as red • in Figure 7.1. Each\
    \ centroid has its corresponding height and weight, the T-shirt maker will make\
    \ three sizes of T-shirts based on the three centroids, they will most likely\
    \ fit all people in different groups.\n\nLet’s take a look at how K-Means works\
    \ in the simplest case, generate random 2D data in 2 clusters and plot the data\
    \ as Figure 7.2,\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_199_1.png)\n\nFigure\
    \ 7.2 K-means Sample Data\n\nWe use two centroids to explain how K-Means works.\
    \ Here are the codes to produce the sample data in Figure 7.2, the `make_blobs()`\
    \ in line 6 is a function from sklearn package to generate sample data. matplotlib\
    \ in line 3 is a package to visualize the data.\n\n```\n1  import numpy as np\n\
    2  import cv2 as cv\n3  from matplotlib import pyplot as plt\n4  from sklearn.datasets\
    \ import make_blobs\n5  def sample_cluster():\n6      X, y = make_blobs(n_samples=600,\
    \ centers=2,\n7          cluster_std=2.8, random_state=1)\n8      X = np.float32(X)\n\
    9      plt.figure(figsize=(6, 4))\n10     plt.scatter(X[:,0],X[:,1],s=10,cmap='spring')\n\
    11     plt.xlabel('X')\n12     plt.ylabel('Y')\n13     plt.show()\n14     return\
    \ X, y\n```\n\nK-Means will perform the following steps,\n\n**Step 1:** Randomly\
    \ initialize $k$ centroids, in our case $k=2$, so two centroids: $\\mu_1$ and\
    \ $\\mu_2$ are initialized.\n\n**Step 2:** calculate the distance from each data\
    \ point to both centroids and label the data. If a data is closer to $\\mu_1$,\
    \ then the data is labeled with 0; if it is closer to $\\mu_2$ then labeled with\
    \ 1. If there are more centroids, then labeled with 2, 3, ..., etc.\n\nRun the\
    \ codes below for one iteration of K-Means, get the results of Step 2, as in Figure\
    \ 7.3:\n\n```\n15 criteria = (cv.TERM_CRITERIA_MAX_ITER, 1, 1.0)\n16 ret,label,center=cv2.kmeans(X,\
    \ 2, None , criteria, 1,\n17                             cv2.KMEANS_RANDOM_CENTERS)\n\
    ```"
  mdcn: "*数据*的质量对于机器学习项目至关重要。在实际项目中，准备数据集需要付出大量努力，例如清理数据、确保数据准确性、移除空白记录等。例如，日期字段应统一格式，如果大多数日期为“2021/06/21”，但部分为“Jun\
    \ 21, 2021”，处理数据集时就会出错。\n\n在大多数情况下，这些工作还需与领域专家协作完成。例如，医疗数据需与医疗专家共同审核以确保准确性；房地产数据则需与地产专家核对，依此类推。\n\
    \n然而，本书中几乎所有数据集均来自Python包（如`scikit-learn`和`tensorflow`），它们已预先处理好，可直接使用，无需进行数据清理等额外工作。\n\
    \n*模型*是机器学习的另一关键要素。优秀的模型配合高效算法，能帮助其更好地从数据中学习。本章将介绍计算机视觉与图像处理中广泛使用的几种算法，它们各具特色，适用于不同场景。\n\
    \n机器学习算法主要分为两类：*监督学习*和*无监督学习*。前者从带标签的数据中学习，即算法知晓数据内容。例如，算法接收一张图片并被告知这是狗，随后尝试将图片与狗关联。后者则从无标签数据中学习，例如算法接收图片但不知其内容，它会自主探索数据信息，发现模式并进行分类等。\n\
    \nOpenCV提供了多种预定义的机器学习算法模型。我们无需深究算法的数学原理（尽管理解它更好），而是将重点介绍如何使用这些预定义模型解决问题。本章将涵盖以下模型：\n\
    \n- 无监督学习\n    - K均值聚类（第7.1节）\n- 监督学习\n    - K近邻算法（第7.2节）\n    - 支持向量机（第7.3节）\n\
    \    - 人工神经网络（第7.4节）\n    - 卷积神经网络（第7.5节）\n\n数据对机器学习至关重要，它是模型学习的实际对象。没有数据，模型便无法运作。存在许多为机器学习预构建的数据集。本章将介绍以下常用数据集：\n\
    \n- MNIST（修改版国家标准与技术研究院）数据集：包含大量0到9的手写数字。它是事实上的“Hello World”数据集，广泛用于机器学习。可通过`keras.datasets`包获取。本章每节都将使用此数据集，并通过比较不同模型来评估结果。\n\
    - CIFAR-10数据集：包含60,000张32x32的彩色图像，分为10类，每类6,000张。类别包括飞机、汽车、鸟、猫等。同样可通过`keras.datasets`包获取。\n\
    - IRIS花卉数据集：一个小型但多变量的带标签数据集。该数据集随`sklearn.datasets`包提供。\n- 除预构建数据集外，我们还将学习如何使用`sklearn.datasets`提供的函数生成样本数据。\n\
    \n本章需要几个Python包，运行示例代码前必须安装它们。关于本书使用的版本，请参考第1.4节。\n\n- `sklearn`（或`scikit-learn`）：开源机器学习库，支持监督与无监督学习，并提供数据预处理、模型选择与评估的各种工具。\n\
    - `keras`：开源机器学习库，功能强大，支持机器学习与深度学习。\n- `tensorflow`：开源机器学习库，通常与`keras`一同安装。\n\
    - `matplotlib`：Python数据可视化开源库，已在前面章节使用过。\n\n如果您的环境中未安装这些库，强烈建议按照第2.3节的说明进行安装，以便执行本章的源代码。\n\
    \n享受机器学习之旅吧！\n\n## 7.1. K均值聚类\n\n### 7.1.1. 什么是K均值聚类\n\n来源：K-Means.py\n\nK均值聚类是一种流行的无监督机器学习算法，用于根据相似性将给定数据集划分为$k$个簇，其中$k$是预定义的簇数。\n\
    \n它是一种无监督算法，因为训练模型时不需要带标签的数据，模型将自主从数据中学习。换言之，它不依赖任何预定的目标变量或输出值来指导学习过程。\n\nK均值算法的目标是根据数据点之间的相似性或距离，将相似的数据点分组到簇中。它通过寻找若干*质心*来代表簇的中心，迭代地将每个数据点分配给最近的簇质心，然后根据簇的新成员更新质心。*质心*是数据簇的算术平均位置或平均位置。该过程重复进行，直到质心不再移动或达到最大迭代次数。\n\
    \n在实际用例中，例如，T恤制造商希望生产适合不同身高体重人群的产品。制造商计划生产L、M、S三种尺码以适应不同人群。在K均值算法术语中，这三种尺码称为*质心*，每个*质心*代表一组人群或一个簇。\n\
    \nK均值是解决此类问题的有效算法，它将从数据集中找到三个质心（L、M和S）。它是一种无监督学习方法，因为它将通过计算从数据本身发现结果，我们无需为每个数据标记标签。\n\
    \n![](img/b99f6edaf6f730ad313ce66bc5a26be2_199_0.png)\n\n图7.1 T恤示例\n\n如图7.1所示，横轴代表身高，纵轴代表体重。每个数据点代表一个人，数据点可分为三个簇：S、M和L。\n\
    \n每组的算术平均（平均）位置是*质心*，位于每组中心附近，如图7.1中的红色•所示。每个质心有其对应的身高和体重，T恤制造商将根据三个质心生产三种尺码的T恤，它们很可能适合不同组的所有人。\n\
    \n让我们看看K均值在最简单情况下如何工作：生成两个簇的随机二维数据，并绘制为图7.2，\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_199_1.png)\n\
    \n图7.2 K均值样本数据\n\n我们使用两个质心来解释K均值的工作原理。以下是生成图7.2样本数据的代码，第6行的`make_blobs()`是sklearn包中用于生成样本数据的函数。第3行的matplotlib是用于数据可视化的包。\n\
    \n```\n1  import numpy as np\n2  import cv2 as cv\n3  from matplotlib import pyplot\
    \ as plt\n4  from sklearn.datasets import make_blobs\n5  def sample_cluster():\n\
    6      X, y = make_blobs(n_samples=600, centers=2,\n7          cluster_std=2.8,\
    \ random_state=1)\n8      X = np.float32(X)\n9      plt.figure(figsize=(6, 4))\n\
    10     plt.scatter(X[:,0],X[:,1],s=10,cmap='spring')\n11     plt.xlabel('X')\n\
    12     plt.ylabel('Y')\n13     plt.show()\n14     return X, y\n```\n\nK均值将执行以下步骤，\n\
    \n**步骤1：** 随机初始化$k$个质心。在我们的例子中$k=2$，因此初始化两个质心：$\\mu_1$和$\\mu_2$。\n\n**步骤2：** 计算每个数据点到两个质心的距离并标记数据。如果数据更接近$\\\
    mu_1$，则标记为0；如果更接近$\\mu_2$，则标记为1。如果有更多质心，则标记为2、3等。\n\n运行以下代码进行一次K均值迭代，得到步骤2的结果，如图7.3所示：\n\
    \n```\n15 criteria = (cv.TERM_CRITERIA_MAX_ITER, 1, 1.0)\n16 ret,label,center=cv2.kmeans(X,\
    \ 2, None , criteria, 1,\n17                             cv2.KMEANS_RANDOM_CENTERS)\n\
    ```"

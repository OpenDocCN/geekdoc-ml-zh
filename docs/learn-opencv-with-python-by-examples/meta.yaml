    # 5.8.3. Median Blur


    Same as Gaussian Blur, the Median Blur is also widely used in image processing,
    it is often used for noise reduction purposes.

    Similar to the Gaussian Blur filter, instead of applying Gaussian formula, the
    Median Blur calculates the median of all the pixels inside the kernel filter and

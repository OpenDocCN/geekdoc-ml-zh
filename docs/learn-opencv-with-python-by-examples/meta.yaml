    from top towards down until the bottom-right corner, in another word the filter
    swept over the whole image, this is the image blurring process.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_118_0.png)


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_118_1.png)


    Figure 5.22 Gaussian Blur in Detailed Pixels'' Level


    Now, let’s look at how the Gaussian function works, in other words how the filter
    is calculated and applied to the area.


    Gaussian filter does not simply calculate the average value of the area, in this
    case the 9 × 9 area. Instead, it calculates a weighted average of the value for
    this area, the pixels near the center get more weights, and the pixels far away
    from the center get less weights. And the calculation is done on a channel-by-channel
    basis, which means it calculates the blue, green and red channels respectively.


    Let’s dig a little deeper and see how the Gaussian function works, this is the
    formula in one dimension:


    ```

    $$p(x) = \frac{1}{\sigma\sqrt{2\pi}} e^{-\frac{x^2}{2\sigma^2}}$$

    ```


    However, a pixel is determined by $x$ and $y$ coordinates in an image, so the
    two-dimensional Gaussian formula should be used for image processing, it’s shown
    as Figure 5.23.'
  - '[PAGE 119]


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_119_0.png)


    Figure 5.23 Two-Dimensional Gaussian Function

    *This is generated by the source codes at common/gaussian.py*


    The two-dimensional Gaussian formula is:


    $$p(x, y) = \frac{1}{\sigma\sqrt{2\pi}} e^{-\frac{x^2+y^2}{2\sigma^2}}$$


    Now imagine the Gaussian filter mentioned above, in our case an area of 9 x 9
    pixels, is overlaying on the vertex of the above plot, the height is the weight
    for calculation. The pixels near the center are more important and then get more
    weights, the pixels near the edge are less important and then get less weights.

    This is a basic idea of how Gaussian blur works in general, although the algorithm
    is not as simple as described above. Fortunately, OpenCV provides a function for
    this purpose, `cv2.GaussianBlur()`, and all the complexities are hidden behind
    the scenes. All we need to do is to call this function and specify the kernel
    size in width and height, which doesn’t have to be the same, but must be odd numbers.'

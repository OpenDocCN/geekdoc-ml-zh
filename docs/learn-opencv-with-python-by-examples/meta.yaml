    contrast, and overall intensity of an image. It is plotted in a x-y chart, the
    x-axis of a histogram represents the pixel values ranging from 0 to 255, while
    the y-axis represents the number of pixels in the image that have a given value.
    A histogram can show whether an image is predominantly dark or light, and whether
    it has high or low contrast. It can also be used to identify any outliers or unusual
    pixel values.


    To better understand the histogram, plot an image and draw some squares and rectangles
    and fill them with the color value of 0, 50, 100, 150, 175, 200 and 255, as shown

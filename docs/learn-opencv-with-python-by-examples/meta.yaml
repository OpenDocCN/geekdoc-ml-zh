  md: "The below function is to create a mask and remove the background by color,\
    \ it is added to the ImageProcessing class that defined in chapter 5.\n\n```\n\
    def remove_background_by_color(\n    self,\n    hsv_lower=(10,10,10),\n    hsv_upper=(179,255,255),\n\
    \    image=None ):\n    if image is None:\n        image = self.image\n    imgHSV\
    \ = cv2.cvtColor(image, cv2.COLOR_BGR2HSV)\n    mask = cv2.inRange(imgHSV, hsv_lower,\
    \ hsv_upper)\n    mask = 255 - mask\n    mask = cv2.cvtColor(mask, cv2.COLOR_GRAY2BGR)\n\
    \    bg_removed = cv2.bitwise_and(image, mask)\n    return bg_removed, mask\n\
    ```\n\nExplanations:\n\n| Line | Description |\n| :--- | :--- |\n| Line 1 | Define\
    \ remove_background_by_color() function, the parameters are the lower and upper\
    \ thresholds of HSV values. |\n| Line 5 - 6 | The ImageProcessing class already\
    \ has a default image at initialization, if there is no image passed from the\
    \ parameter then use the default image. |\n| Line 7 | Convert the image into HSV\
    \ color space. |\n| Line 8 | Obtain the mask using cv2.inRange() function based\
    \ on the upper and lower thresholds of HSV values. |\n| Line 9 | In this example\
    \ the mask selected is the background only, now perform 255 – mask to get the\
    \ mask of foreground. |\n| Line 10 | The mask created by cv2.inRange() function\
    \ is grayscale, now convert it to BGR color space to make it in the same space\
    \ as the original image. |\n| Line 11 | Apply the mask to the original image with\
    \ bitwise AND operation to remove the background from original image. |\n| Line\
    \ 12 | Return the background removed image as well as the mask. |"

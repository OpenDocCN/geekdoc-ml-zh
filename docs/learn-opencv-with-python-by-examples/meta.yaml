- md: "An artificial neuron is a basic unit of computation in an Artificial Neural\
    \ Network (ANN). Inspired by the biological neuron, an artificial neuron takes\
    \ in one or more input values and produces a single output value. The inputs are\
    \ multiplied by corresponding weights, which determine the importance of each\
    \ input in the output calculation. The weighted inputs are then summed up, and\
    \ an activation function is applied to the sum to produce the output value. The\
    \ activation function determines whether the neuron should \"fire\" and produce\
    \ an output signal. Figure 7.27 shows an artificial neuron.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_253_0.png)\n\
    \nFigure 7.27 An Artificial Neuron\n\n$x_0$, $x_1$ and $x_2$ are inputs of the\
    \ artificial neuron, $\\theta_0$, $\\theta_1$ and $\\theta_2$ are the weights\
    \ on the inputs, the inputs are multiplied by corresponding weights, then sum\
    \ them up and send to the activation function for mathematical computations, and\
    \ the result becomes the output $y$. The output of one artificial neuron can be\
    \ connected to the input of another, forming a network of interconnected neurons.\
    \ By adjusting the weights and activation functions of the artificial neurons\
    \ through the training process, an artificial neural network can learn to perform\
    \ complex tasks such as image recognition, natural language processing, and more.\n\
    \nCommon activation functions include linear, sigmoid, relu (rectified linear\
    \ unit), and tanh (hyperbolic tangent), which will be introduced in 7.4.2.\n\n\
    Many artificial neurons are put together to form an *Artificial Neural Network*\
    \ (ANN). Figure 7.28 shows a very simple artificial neural network, each artificial\
    \ neuron is called a node in the network.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_254_0.png)\n\
    \nFigure 7.28 A Simple Artificial Neural Network\n\nThe left side is the *Input\
    \ Layer*, it corresponds to the input data, there should be *n* nodes in the input\
    \ layer if there are *n* features in the input data. There is a *Hidden Layer*\
    \ in the middle, which takes the output of the input layer as input data. Then\
    \ the *Output Layer* is at the right, there is only one node for the output in\
    \ Figure 7.28, it could have multiple nodes depending on the needs.\n\nAn *Artificial\
    \ Neural Network (ANN)* always has an *Input Layer* and an *Output Layer*, there\
    \ could be multiple *Hidden Layers* depending on the needs, there could also be\
    \ no *Hidden Layer* in which case the *Input Layer* directly connects to the *Output\
    \ Layer*. The *Input Layer* should take the raw input data, so the number of nodes\
    \ in the *Input Layer* should be the same as the dimension of the input data;\
    \ the *Output Layer* is the one that makes the final prediction, so the number\
    \ of nodes in the *Output Layer* should be same as the dimension of output data.\n\
    \nThe number of layers and nodes of *Hidden Layers* depends on the needs, it doesn't\
    \ mean the more the better, normally it is decided based on the evaluation of\
    \ the accuracy, a trial and error process is often needed to determine how many\
    \ hidden layers and how many nodes in each hidden layer. More hidden layers require\
    \ more computation costs. See material #13 in the References section at the end\
    \ of this book for artificial neural networks.\n\nOpenCV supports the Multi-Layer\
    \ Perceptron (MLP) of the *Artificial Neural Network*, which means it could have\
    \ three or more layers in total. In other words, there could be one or more *Hidden\
    \ Layers* apart from *Input* and *Output Layers*.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_255_0.png)\n\
    \nFigure 7.29 Multi-Layer Perceptron\n\nHere are the code snippets to create an\
    \ ANN model with OpenCV, train it and make predictions:\n\n```\n1 ann = cv2.ml.ANN_MLP_create()\n\
    2 ann.setLayerSizes(np.array([784, 64, 10]))\n3 ann.setTrainMethod(cv2.ml.ANN_MLP_BACKPROP)\n\
    4 ann.setActivationFunction(\n        cv2.ml.ANN_MLP_SIGMOID_SYM )\n5 ann.setTermCriteria((cv2.TermCriteria_EPS\
    \ |\n        cv2.TermCriteria_COUNT,\n        100, 0.0001))\n6 ann.train(X_train,\
    \ cv2.ml.ROW_SAMPLE, y_train)\n7 result = ann.predict(X_test)\n```\n\nExplanations:\n\
    \n| Line | Description |\n| --- | --- |\n| 1 | Initialize ANN_MLP and return an\
    \ empty model. |\n| 2 | Set layers of the ANN. The parameter of [784, 64, 10]\
    \ means a three-layer ANN that has 784 nodes in the input layer, 64 in hidden\
    \ and 10 in output layers. |\n| 3 | Set the training methods. The BACKPROP is\
    \ the most often used one. cv2.ml.ANN_MLP_BACKPROP: The back-propagation algorithm.\
    \ cv2.ml.ANN_MLP_RPROP: The RPROP algorithm. cv2.ml.ANN_MLP_ANNEAL: The simulated\
    \ annealing algorithm. |\n| 4 | Set the activation function. See the next section\
    \ for details. |\n| 5 | Set the termination criteria, the iteration stops when\
    \ the criteria are satisfied. |\n| 6 | Train the ANN model with the training set,\
    \ X_train is the dataset and y_train is the label. |\n| 7 | Make a prediction\
    \ after the ANN model is trained, X_test is the testing set. |\n\nIf you want\
    \ to create an ANN with more layers, simply pass the parameter in above line 2\
    \ to specify the layers and nodes in each layer. For example, [784, 128, 64, 32,\
    \ 10] will build an ANN with 784 nodes in the input layer, and three hidden layers\
    \ with 128, 64 and 32 nodes respectively, then the output layer of 10 nodes.\n\
    \nIn conclusion, with OpenCV we can create an artificial neural network model\
    \ by specifying the number of layers and the number of neurons in each layer,\
    \ and also customize the activation function used by the neurons.\nOnce we have\
    \ defined the neural network model, we can train it using a variety of supervised\
    \ learning techniques, such as backpropagation, finally we also use the trained\
    \ network to make predictions on new data. OpenCV provides a powerful and flexible\
    \ toolset for building and training artificial neural networks for a wide range\
    \ of applications.\n\n## 7.4.2. Activation Functions\n\nSource: common/ann_activation_functions.py\n\
    \nAn activation function is a key component of artificial neural networks (ANNs)\
    \ and is used to introduce non-linearity into the output of a neuron. In ANNs,\
    \ activation functions are applied to the weighted sum of inputs to the neuron\
    \ in order to produce an output.\nAn activation function must be defined for each\
    \ node, it is responsible for transforming the input data into the output for\
    \ the node.\nAs Figure 7.27, the inputs are multiplied by corresponding weights\

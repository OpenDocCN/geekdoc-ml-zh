    # 6.9. Blur Background


    | Source: | BlurBackground.py |

    | Library: | common/ImageProcessing.py |


    Sometimes we want to achieve an effect that makes the foreground stand out. In
    the previous sections we can separate the foreground from the image, now we will
    blur the background in order to make the foreground stand out.

    As an example, when using remote video conferencing tools like Microsoft Teams
    or Google Meet, the “Background Effects” can blur the background and make the
    person distinguished during the video call.


    Here are several examples to blur the background, Figure 6.41 uses Gaussian blur
    on the background with kernel size of (41, 41), and sigma of (52, 52):


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_187_0.png)'
  - '[PAGE 188]


    In addition to Gaussian blur, other blur methods can also be used, and kernel
    size can be adjusted to achieve the desired results. The color of background can
    also be adjusted, for example use grayscale, or change the bright, contrast, saturation
    etc. Similar to previous examples, we create four trackbars in the Parameters
    window. These trackbars are used to control the background processing.

    The first trackbar is the kernel size of Gaussian or Median blur. The second is
    the sigma for Gaussian blur, it doesn’t apply to Median blur. The third one is
    a switch of the two blurring methods, 0 is for Gaussian and 1 for Median. The
    last one is a switch of color or grayscale. As shown in Figure 6.42:


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_188_0.png)


    Figure 6.42 Trackbars to Control the Blurring


    Optionally, if you want to adjust the brightness, contrast, hue, saturation and
    value, you can add more trackbars here, and add codes accordingly to process them.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_188_1.png)


    Figure 6.43 The Process to Blur the Background


    The above Figure 6.43 is the process to blur the background. The original image
    is used to create the *mask*, and at the same time create *(1-mask)*. The mask
    is applied to the original image with bitwise AND operation to get the foreground;
    while *(1-mask)* is applied to the original image to get the background, then
    apply the blur as well as color adjustments on the background. Finally merge the
    foreground and background with bitwise OR operation to get the final image.

    Below are the code snippets to generate foreground and background,


    ```

    1 image = cv2.imread(image)

    2 mask = cv2.imread(mask)

    3 foreground = cv2.bitwise_and(image, mask)

    ```


    Line 1 and 2 are to load the original image and mask, the mask can be created
    based on one of the several methods introduced in section 6.8, here we use the
    third-party image-editing software to create the mask and save it to a file. Line
    2 is to load the'

    Each layer is shown in one line in the summary above. The first line is the convolution
    layer with the name of `conv2d` and the type of `Conv2D`, where the name is unique
    in the model. The output size of this layer is (32, 32, 128), because the number
    of kernels is specified as 128, and each image size is 32×32.


    The next is the max pooling layer, the kernel size was specified as (2, 2), so
    the output of this layer becomes (16, 16, 128), which is reduced from the previous
    layer.


    And the same things happen in the next two convolution and max-pooling layers.
    The dropout layers do not change the size from inputs to outputs.


    The flatten layer converts the previous output of (4, 4, 32) into 1D array of
    size (512), and it becomes the input to the fully connected neural network layer.'
  - '[PAGE 292]


    The fully connected neural network has two hidden layers of 256 and 128, then
    the final output is 10, which corresponds to the ten clusters of the dataset.


    Before starting the training process, it''s necessary to normalize the input data,
    we use the StandardScaler() from sklearn library for this purpose:


    ```

    42  from sklearn import preprocessing

    43  scaler = preprocessing.StandardScaler()

    44  X_train = scaler.fit_transform(

    45          X_train.reshape(-1, X_train.shape[-1]))

    46          .reshape(X_train.shape)

    47  X_test = scaler.transform(

    48          X_test.reshape(-1, X_test.shape[-1]))

    49          .reshape(X_test.shape)

    ```


    The standard scaler is a data preprocessing technique commonly used to normalize
    the data before training so that it has a mean of 0 and a standard deviation of
    1. By scaling the data to have a common scale, the algorithm can converge faster
    and perform better, it helps to prevent data with larger scales from dominating
    the model and allows for easier comparison of data between different features.


    Then the training process:


    ```

    50  history = cnn_model.fit(

    51          X_train,

    52          to_categorical(y_train),

    53          batch_size = 128,

    54          epochs = 100,

    55          verbose = 1,

    56          validation_data=(X_test,

    57                          to_categorical(y_test)))

    ```


    The one-hot encoding is performed by to_categorical() function on y_train and
    y_test at line 52 and 57.


    This training process could take some time due to the amount of data and the complexity
    of the model. Depending on the hardware resources, e.g. CPUs vs GUPs, it could
    take from minutes to hours. Sometimes, if the hardware is not powerful enough,
    you might get errors in fit() process, in this case try to use a subset of the
    input data, say X_train[0:5000] and y_train[0:5000]. However, it might eliminate
    the errors but not do a good job for the training. A powerful machine is needed
    to perform the training of deep learning projects.'

    \ |\n\nMake sure a webcam is attached to the laptop/desktop computer and enabled,\
    \ execute the code you will see a window displaying whatever the webcam captures.\
    \ Press ESC key to terminate.\n\n## 3.4. Image Fundamentals\n\nSource: ImageFundamental.py\n\
    \n### 3.4.1. Pixels\n\nPixels (short for \"picture elements\") are the smallest\
    \ units of a digital image. Each pixel represents a tiny point of color that,\
    \ when combined with other pixels, forms the complete image.\nPixels are typically\
    \ arranged in a grid within a rectangle or square, with each pixel having a specific\
    \ location within the image. The color of each pixel is represented by a combination\
    \ of numerical values that represent the intensity of the three primary colors\
    \ of blue, green, and red (BGR).\n\nThe resolution refers to the number of pixels\
    \ in the image, usually expressed in terms of the width and height of the image\
    \ in pixels. The higher the resolution, the more detail the image can contain,\
    \ as there are more pixels available to represent the image. However, higher resolution\
    \ images also require more storage space and processing power.\n\nTypically, a\
    \ digital image is made of thousands or millions of pixels, which are organized\
    \ in rows and columns. For example, for an image of 640 x 480, there are a total\
    \ of 307,200 pixels, and they are located in 480 rows and 640 columns. The coordinates\
    \ of a pixel specify the location of the pixel, say a pixel with coordinates of\
    \ (100, 100) means it is in column number of 100 and row number of 100.\n\nUnlike\
    \ a mathematics coordinate system, the digital image’s coordinate of the origin\
    \ (0,0) is located at the top left corner of the image. *x*-axis represents the\
    \ columns and *y*-axis represents the rows.\n\nAs a color image shown in Figure\
    \ 3.4, *x*-axis is the horizontal arrow at the top facing right, and *y*-axis\
    \ is the vertical arrow at the very left and facing down. A pixel can be identified\
    \ by a pair of integers specifying a *x* value (in column number) and a *y* value\
    \ (in row number). In below Figure 3.4, the pixel at (100, 100) is identified\
    \ and highlighted.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_43_0.png)\n\nFigure\
    \ 3.4 Pixels in a Color Image\n\nFor a 24-bit image, each pixel has 24 bits, it\
    \ is made of blue, green and red values, each has 8 bits, which value is from\
    \ 0 to 255. For example, the pixel at (100, 100) in above Figure 3.4 has blue\
    \ value of 151, green of 82 and red of 234. The color of this pixel, shown as\
    \ pink, is determined by these three values.\n\n### 3.4.2. BGR Color Space and\
    \ Channels\n\nA digital image is represented in different color spaces, the color\
    \ space refers to a specific way of representing colors in an image. It is a three-dimensional\
    \ model that describes the range of colors that can be displayed or printed. There\
    \ are several color spaces used in digital imaging, and each has a different range\
    \ of colors and is used for specific purposes. Here we will introduce the BGR\
    \ and HSV color spaces in this section and the next, both are commonly and widely\
    \ used in image processing.\n\nBGR stands for Blue, Green, and Red. It is a color\
    \ space used to represent colors on electronic screens, like computer monitors,\
    \ TVs, and smartphones. In this space, colors are represented by three primary\
    \ colors: Red, Green, and Blue. Each primary color has a range of 0 to 255, meaning\
    \ each color can have 256 possible values, which makes a total of 16.7 million\
    \ ( = 256 × 256 × 256 ) possible colors.\n\nEach primary color is called a channel,\
    \ a channel has the same size as the original image. Therefore, an image in BGR\
    \ color space has three channels, blue, green and red. Figure 3.5 shows the idea\
    \ of how the three channels compose a color image.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_44_0.png)"
  mdcn: "## 3.3. 显示网络摄像头\n\n来源：ShowWebcam.py\n\n与显示视频类似，显示网络摄像头也使用了相似的技术。将上面的第6行替换为\
    \ `cap = cv2.VideoCapture(0)`，它将加载笔记本电脑/台式机的默认摄像头并进行显示。\n在上一节中，`cv2.VideoCapture()`\
    \ 函数的参数是视频文件的路径，现在传递的是网络摄像头设备的索引作为参数，这里使用0作为默认摄像头，它将连接到默认摄像头。\n这里也可以设置一些视频属性，如下所示，\n\
    \n```\n1  import cv2\n2\n3  cap = cv2.VideoCapture(0)\n   # 从默认摄像头读取\n4\n5  #\
    \ 设置视频属性\n6  cap.set(cv2.CAP_PROP_FRAME_WIDTH, 640)\n   # 设置宽度\n7  cap.set(cv2.CAP_PROP_FRAME_HEIGHT,\
    \ 480)\n   # 设置高度\n8  cap.set(cv2.CAP_PROP_BRIGHTNESS, 180)\n   # 设置亮度\n9  cap.set(cv2.CAP_PROP_CONTRAST,\
    \ 50)\n   # 设置对比度\n10\n11 success, img = cap.read()\n```\n\n```\n12  while success:\n\
    13      cv2.imshow(\"Webcam\", img)\n14\n15      # 按ESC键退出循环\n16      if cv2.waitKey(10)\
    \ & 0xFF == 27:\n17          break\n18      success, img = cap.read()\n19\n20\
    \  cap.release()\n21  cv2.destroyWindow(\"Webcam\")\n```\n\n解释\n\n| 行号 | 描述 |\n\
    | --- | --- |\n| 第3行 | 从默认摄像头加载视频。 |\n| 第6行 | 设置摄像头视频的宽度。 |\n| 第7行 | 设置摄像头视频的高度。\
    \ |\n| 第8行 | 设置摄像头视频的亮度。 |\n| 第9行 | 设置摄像头视频的对比度。 |\n\n供参考，以下是可用作 `cap.set()` 参数的列表：\n\
    \n| 索引 | 属性 | 描述 |\n| --- | --- | --- |\n| 0 | CAP_PROP_POS_MSEC | 视频文件的当前位置（以毫秒为单位）。\

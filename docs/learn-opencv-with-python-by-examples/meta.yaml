    https://docs.opencv.org/4.7.0/da/d54/group__imgproc__transform.html\n\n透视变换广泛应用于计算机视觉和图像处理应用中，例如图像校正。在许多情况下，图像可能因相机角度而产生畸变，通过应用透视变换，图像可以得到校正并正确对齐。另一个例子是图像拼接，将多张图像组合成更大的全景图，变换可用于正确对齐图像，使其无缝衔接。\n\

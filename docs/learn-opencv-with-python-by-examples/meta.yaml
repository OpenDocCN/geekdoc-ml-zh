    3    return counts.size\n```\n\n图 7.6 展示了颜色量化的工作原理，左侧的原始图像是一个色轮，右侧是聚类数 = 8 进行颜色量化后的图像。\n\
    \n左侧色轮中的相似颜色被分组为一个聚类，并在右侧图像中用单一颜色表示，例如，靠近蓝色的颜色，如深蓝、蓝色、浅蓝等，被分组为右侧图像中的一种蓝色。红色、黄色、紫色、绿色等同理。原始图像中的所有颜色被分为\
    \ 8 个聚类，即 K-Means 找到的 8 个质心。\n\n请注意，白色背景被计为一个聚类，因此右侧色轮上有 7 种颜色，加上白色背景，总共 8 种颜色。\n\
    \n以下是上述两张图像中不同颜色数量的统计结果：\n原始图像中的不同颜色数量：239\n颜色量化后的不同颜色数量：8\n\n类似地，对 k=6 和 k=3\
    \ 进行颜色量化，我们可以得到具有更少不同颜色的色轮，如图 7.7 所示。"

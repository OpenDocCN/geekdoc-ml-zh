    通常色调值从0到359，代表圆的角度，但在OpenCV中色调值不同，因为值存储在8位数据类型中，范围为[0, 255]，无法存储完整的色调值[0, 359]。OpenCV使用了一个技巧来解决这个问题，色调值除以2后存储在8位数据类型中。因此，OpenCV中的色调范围是[0,

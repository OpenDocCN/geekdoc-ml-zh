    # 7.5.7. Popular CNN Architectures


    Instead of building them from scratch, there are some popular CNN architectures
    that can provide a good starting point for developing an effective model for image
    recognition tasks, and can offer several benefits in terms of accuracy, efficiency,
    and community support.


    The popular CNN architectures have been developed and refined over many years
    and have shown to be effective in achieving high accuracy. This is especially
    true for large datasets such as ImageNet, where the top-performing models are
    typically based on popular CNN architectures. They normally have a large community
    of users, developers, and researchers who are constantly improving and optimizing
    the architectures, developing new variants, and sharing best practices. This can
    provide valuable resources for troubleshooting, optimizing performance, and staying
    up-to-date with the latest developments.


    However, it''s important to note that while the popular CNN architectures can
    be a good starting point, they may not always be the best fit for every application.
    Depending on the specific task and data, it may be necessary to customize or develop
    a new architecture to achieve optimal performance.


    Here are some of the popular CNN architectures:


    +   - **LeNet-5**: Developed in the 1990s by Yann LeCun, it’s one of the earliest
    CNN architectures and designed for handwritten digit recognition. It consists
    of seven layers, including three convolutional layers and two fully connected
    layers.

    - **AlexNet**: Developed by Alex Krizhevsky, Ilya Sutskever, and Geoffrey Hinton,
    this architecture won the 2012 ImageNet competition by a large margin. It has
    eight layers, including five convolutional layers and three fully connected layers.

    - **VGGNet**: Developed by the Visual Geometry Group at the University of Oxford,
    VGGNet has multiple variants (VGG16, VGG19, etc.) that differ in the number of
    layers. VGGNet has a very simple architecture, with many small filters in each
    convolutional layer.

    - **Inception**: Developed by Google researchers, this architecture won the 2014
    ImageNet competition. It has a unique "Inception" module that allows for parallel
    processing at different scales.

    - **ResNet**: Also developed by Microsoft researchers, ResNet (short for Residual
    Network) has a very deep architecture, with up to 152 layers. It uses'
  - '[PAGE 296]


    residual connections to address the vanishing gradient problem that can occur
    in very deep networks.


    +   - **MobileNet**: Developed by Google researchers, MobileNet is designed to
    be lightweight and efficient, making it well-suited for mobile devices. It uses
    depth wise separable convolutions to reduce the number of parameters in the network.


    In this section we are not going to introduce them one by one, instead, we include
    a code example for LeNet-5 with MNIST dataset in the Github repository, the source
    code is in *CNN_LeNet_5.py*.


    LeNet was introduced in 1990’s by Yann LeCun, it starts the era of Convolutional
    Neural Networks (CNN), see the original paper called “Gradient-Based Learning
    Applied to Document Recognition” at material #20 in References section.


    The architecture is straightforward and simple, it consists of seven layers which
    can be summarized as follows:


    +   1. Input layer: The input is designed as grayscale image of size 32×32 pixels,
    however we use 28×28 from MNIST dataset.

    2. Convolutional layer 1: The first convolutional layer has 6 filters of size
    3×3 and stride of 1. Each filter produces a 26×26 output feature map.

    3. Average pooling layer 1: The output feature maps from the first convolutional
    layer are fed into an average pooling layer of size 2×2, which reduces the size
    of the feature maps to 13×13.

    4. Convolutional layer 2: The second convolutional layer has 16 filters of size
    3×3 and stride of 1. Each filter produces a 11×11 feature map as the output.

    5. Average pooling layer 2: The output feature maps from the second convolutional
    layer are fed into another average pooling layer of size 2×2, which reduces the
    size of the feature maps to 5×5.

    6. Fully connected layer 1: The output feature maps from the second pooling layer
    are flattened into a vector of size 400 and fed into a fully connected layer with
    120 neurons.

    7. Fully connected layer 2: The output from the first fully connected layer is
    fed into another fully connected layer with 84 neurons.

    8. Output layer: The output from the second fully connected layer is fed into
    the final output layer, which has 10 nodes corresponding to the 10 clusters of
    digits in the MNIST dataset.'
  - '[PAGE 297]


    LeNet-5 is a reliable and efficient CNN architecture that can be used as a baseline
    for many image recognition tasks, especially those involving small datasets. If
    interested, please reference the related resources for other popular CNN architectures.'

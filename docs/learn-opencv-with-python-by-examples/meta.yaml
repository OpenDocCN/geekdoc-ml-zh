    This section will apply the concept of semantic segmentation to separate the foreground
    from the background of an image and remove the background. The specific area or
    pixels of the image will be identified as the foreground, and another area as
    the background. There are different ways to do so, depending on the image itself
    maybe one way is more efficient than the others.

    Four methods will be introduced in this section to remove background:


    +   - Remove Background by Color

    - Remove Background by Contour

    - Remove Background by Machine Learning

    - Remove Background by Mask


    # 6.8.1. Remove Background by Color


    | Source: | RemoveBackgroundByColor.py |

    | :--- | :--- |

    | Library: | common/ImageProcessing.py |


    The background of the image can be identified and removed based on the colors,
    if the color of the foreground of an image is significantly different from that
    of the background, it’s worthwhile to try this method.

    Let’s take a look at the image shown in Figure 6.26, the color of the flower looks
    significantly different from the background.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_173_0.png)


    Figure 6.26 Remove Background by Color


    Section 6.4 has introduced the method to detect colors by adjusting the hue, saturation
    and value. We can use the same technique to create a mask and apply it to the
    original image to remove the background.

    The first step is to convert the image into HSV color space, then find the lower
    and upper thresholds of the hue, saturation and value. Then the mask is created
    using cv2.inRage() function.'
  - "[PAGE 174]\n\nThe below function is to create a mask and remove the background\
    \ by color, it is added to the ImageProcessing class that defined in chapter 5.\n\
    \n```\ndef remove_background_by_color(\n    self,\n    hsv_lower=(10,10,10),\n\
    \    hsv_upper=(179,255,255),\n    image=None ):\n    if image is None:\n    \
    \    image = self.image\n    imgHSV = cv2.cvtColor(image, cv2.COLOR_BGR2HSV)\n\
    \    mask = cv2.inRange(imgHSV, hsv_lower, hsv_upper)\n    mask = 255 - mask\n\
    \    mask = cv2.cvtColor(mask, cv2.COLOR_GRAY2BGR)\n    bg_removed = cv2.bitwise_and(image,\

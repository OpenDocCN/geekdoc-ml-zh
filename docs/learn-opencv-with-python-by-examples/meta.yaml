    \ is trained, and load it later to save the time of training.\n\n```\n23  def\
    \ save_model(model, filename):\n24      model.save(filename)\n25  def load_model(filename):\n\
    26      ann=cv2.ml.ANN_MLP_load(filename)\n27      return ann\n28  save_model(\
    \ ann, '../res/mnist_ann_784_64_10.xml')\n29  ann = load_model('../res/mnist_ann_784_64_10.xml')\n\
    ```\n\nIf you load a trained model, then no need to build and train it again,\

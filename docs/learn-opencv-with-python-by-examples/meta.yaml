- md: "CIFAR-10 dataset will be used in this section as the example, it’s a collection\
    \ of images that are widely used for machine learning or computer vision purposes.\
    \ It contains 60,000 color images in ten different clusters, each has 32 × 32\
    \ pixels. And each cluster has 6,000 random images.\n\nAlthough this dataset is\
    \ not real-world pictures and is in very low resolution (32 × 32), it’s ideal\
    \ for learning purposes, because it does not cost high computation resources,\
    \ users can quickly try different algorithms without a long time (many hours)\
    \ of training process.\n\nThe dataset comes with keras library and is divided\
    \ randomly into a training set of 50,000 and a testing set of 10,000. The ten\
    \ clusters are evenly and randomly divided into both training and testing sets,\
    \ meaning each cluster has 5,000 in training set and 1,000 in test set. The ten\
    \ clusters are airplane, automobile, bird, cat, deer, dog, frog, horse, ship and\
    \ truck.\n\nSee details of CIFAR-10 dataset at: [https://www.cs.toronto.edu/~kriz/cifar.html](https://www.cs.toronto.edu/~kriz/cifar.html)\n\
    \nNow load the CIFAR-10 dataset,\n\n```python\nimport keras\nfrom keras.datasets\
    \ import cifar10\n(X_train, y_train), (X_test, y_test) = cifar10.load_data()\n\
    print(\"X_train\", X_train.shape)\nprint(\"y_train\", y_train.shape)\nprint(\"\
    X_test\", X_test.shape)\nprint(\"y_test\", y_test.shape)\n```\n\nThe size of the\
    \ training and testing sets:\nX_train (50000, 32, 32, 3)\ny_train (50000, 1)\n\
    X_test (10000, 32, 32, 3)\ny_test (10000, 1)\n\nThe cluster labels are in y_train\
    \ and y_test, they look something like:\n[6, 9, 2, 3, 4, 5, 0, 3 ... ]\n\nEach\
    \ cluster is represented by a number from 0 to 9.\n\nThe source codes at *CNNOnCIFAR10.py*\
    \ show 100 random sample images with their labels from the dataset, reference\
    \ it to see what the images look like.\n\n## Build a CNN Model\n\nkeras defines\
    \ models in a sequence of layers. First, create a Sequential model, which will\
    \ make the output of a layer as the input to the next layer:\n\n```python\ncnn_model\
    \ = Sequential()\n```\n\nAdd the first convolution and max pooling layers to the\
    \ cnn_model:\n\n```python\ninput_shape = X_train.shape[1:]\ncnn_model.add(Conv2D(128,\
    \ kernel_size=(3, 3),\n                   input_shape = input_shape,\n       \
    \            strides = (1, 1),\n                   padding = \"same\",\n     \
    \              activation = \"relu\"))\ncnn_model.add(MaxPooling2D(pool_size =\
    \ (2, 2)))\n```\n\nThe convolution layer is added by `conv2D()` function to the\
    \ model, the first parameter is the number of features, it's a best practice that\
    \ the number should be the power of 2, like 4, 8, 16, 32, 64, 128, etc., although\
    \ this is not required. The second parameter is the size of the features, it's\
    \ common to use odd numbers, like 1×1, 3×3, 5×5 or 7×7, and so on. As mentioned\
    \ earlier, only the number and size of the features need to be specified, the\
    \ contents will be learned by themselves during the training process.\n\nThe third\
    \ parameter is the size of the input image, the fourth and fifth parameters are\
    \ the stride and padding, which are optional. As explained earlier, `strides =\
    \ (1,1)` specifies strides for horizontal and vertical are 1 and 1, meaning the\
    \ kernel moves one by one in both directions. `padding=\"same\"` specifies the\
    \ paddings will be added accordingly to make the output the same size as the input.\
    \ The padding can also be specified as \"valid\", meaning no padding. Therefore,\
    \ in this case `strides = (1,1)` and `padding= \"same\"` will make the output\
    \ the same size as the input.\n\nThe last parameter of `conv2D()` is the activation\
    \ function, ReLU function is specified here, see section 7.4.2.4, it will convert\
    \ all negative values to 0, and linear for positive values.\n\nThe input data\
    \ is color images, so each image has RGB three color channels, as explained earlier,\
    \ the convolution will be performed on each color channel, and then the result\
    \ values of the three channels will be summed up to generate the convolution results.\n\
    \nThe pooling layer is added to `cnn_model` by `MaxPooling2D()` function in line\
    \ 16, it performs the max pooling operation on the convolution outputs, and the\
    \ pool size is specified as 2×2 here.\n\nThen add two more convolution/pooling\
    \ layers following the first one:\n\n```python\ncnn_model.add(Conv2D(64,\n   \
    \                 kernel_size=(3, 3),\n                    strides = (1, 1),\n\
    \                    padding = \"same\",\n                    activation = 'relu'))\n\
    cnn_model.add(MaxPooling2D(pool_size = (2, 2)))\ncnn_model.add(Dropout(0.25))\n\
    \ncnn_model.add(Conv2D(32,\n                    kernel_size=(3, 3),\n        \
    \            strides = (1, 1),\n                    padding = \"same\",\n    \
    \                activation = 'relu'))\ncnn_model.add(MaxPooling2D(pool_size =\
    \ (2, 2)))\ncnn_model.add(Dropout(0.25))\n```\n\nThe second layer has 64 features,\
    \ and the third has 32. The feature size, activation function and pool size are\
    \ the same as the previous one.\n\nIn line 23 and 31, `Dropout()` is added to\
    \ the model, dropout is a technique used in deep neural networks to prevent overfitting.\
    \ *Overfitting* occurs when a model is too complex, and it starts to fit to noise\
    \ in the training data rather than the underlying pattern. Dropout helps prevent\
    \ this by randomly dropping out some of the neurons in a layer during training,\
    \ which forces the remaining neurons to learn more robust features that generalize\
    \ better to new data. Please see materials #18 and #19 in References section at\
    \ the end of this book for more details about overfitting.\n\nThe parameter of\
    \ `Dropout()` is the percentage of neuron nodes to drop temporarily. Here 0.25\
    \ is specified, meaning 25% of nodes will be dropped during the training process.\n\
    \nNow there are three layers of convolution/pooling in `cnn_model`, the first\
    \ layer has 128 features, the second has 64 and the third has 32. Next is to flatten\
    \ the output into a 1D array in order to feed into the fully connected neural\
    \ network.\n\n```python\ncnn_model.add(Flatten())\n```\n\nThe last one is the\
    \ fully connected layer, it’s basically an artificial neural network, its input\
    \ is the output of the flattened data.\n\n```python\ncnn_model.add(Dense(units=256,\
    \ activation='relu'))\ncnn_model.add(Dropout(0.5))\ncnn_model.add(Dense(units=128,\
    \ activation='relu'))\ncnn_model.add(Dropout(0.5))\ncnn_model.add(Dense(units=10,\
    \ activation='softmax'))\n```\n\nDense() function is to specify the fully connected\
    \ layer. As introduced earlier, an artificial neural network has an input layer,\
    \ an output layer, and the hidden layer(s). In this case the input layer is the\
    \ output from the Flatten() in line 32, then line 33 and 35 specify two hidden\
    \ layers with nodes of 256 and 128 respectively, the activation function is ReLU.\
    \ The output layer has 10 nodes corresponding to the ten clusters of the dataset,\
    \ the activation function is softmax, which is commonly used in the output layer\
    \ of neural networks for multi-cluster classification problems, where the goal\
    \ is to predict the probability of each cluster.\n\nTwo Dropout() layers are added\
    \ in between to prevent overfitting, in line 34 and 36.\n\nFinally compile the\
    \ model,\n\n```python\ncnn_model.compile(optimizer='adam',\n                 \
    \ loss='categorical_crossentropy',\n                  metrics=['accuracy'])\n\
    ```\n\nWhen compiling a keras model, we need to specify three key components:\
    \ the optimizer, the loss function, and the evaluation metrics, these components\
    \ are specified in the compile method in line 38 to 40.\n\nThe *optimizer* determines\
    \ the algorithm used for optimizing the weights of the neural network during training.\n\
    \nThe *loss function* measures how well the model performs during training. The\
    \ loss function calculates the differences between the predicted output and the\
    \ actual output for a given input.\n\nThe *metrics* evaluate the performance of\
    \ the model after training. They are similar to the loss function, but they are\
    \ used for monitoring specific metrics during training, such as accuracy or precision.\n\
    \nkeras provides a variety of predefined optimizers, loss functions and metrics,\
    \ the choice of them depends on the specific problems and the characteristics\
    \ of the data."

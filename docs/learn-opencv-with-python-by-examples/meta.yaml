  md: '# 6.6. Human Detection


    Source: HumanDetection.py


    OpenCV provides the algorithm called *HOG (Histograms of Oriented Gradients)*
    which is a very fast human detection method. It is pre-trained to detect human
    mostly standing up and fully visible, such as pedestrians, it doesn’t work well
    in other cases.


    We don’t focus on the theory and algorithm of *HOG*, instead we want to show how
    it is used in Python with OpenCV. There are several papers and articles in the
    References section to help better understand it.


    To perform human detection using OpenCV with HOG, there are several basic steps:


    +   1. Load the image or video frame.

    2. Convert the image or video frame to grayscale.

    3. Create a HOG descriptor using `cv2.HOGDescriptor()` function.

    4. Use the `hog.setSVMDetector()` function to compute the HOG features for the
    image, it sets the support vector machine (SVM) detector for object detection.
    It is trained on a large dataset of human images and is optimized for detecting
    standing or walking human in typical environments.

    5. Use the `hog.detectMultiScale()` function to detect objects in the image. This
    function takes the HOG features as input and returns the bounding rectangles of
    the detected objects.

    6. Draw the bounding rectangle on the original image using the `cv2.rectangle()`
    function.



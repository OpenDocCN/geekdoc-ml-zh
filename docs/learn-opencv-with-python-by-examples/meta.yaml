- md: '## 6.5.2. Text Recognition


    It''s important to note that the accuracy of text recognition can vary depending
    on the quality of the input image and the complexity of the text being recognized.

    Preprocessing techniques such as image enhancement and noise reduction can be
    used to improve OCR accuracy. Additionally, training Tesseract on specific fonts
    and languages can also improve its recognition capabilities.


    In this example, there is an image like Figure 6.20, the image looks inclined.

    Performing OCR on an inclined or rotated image can be challenging as the texts
    are not aligned with the horizontal axis, which can affect the accuracy of the
    OCR.


    In section 5.7 we have introduced the technique of perspective warping, it can
    be used here to de-skew the image in order to align the texts with the horizontal
    axis.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_156_0.png)


    Below codes apply the perspective warping introduced in section 5.7:


    ```

    1 def perspective_warp(points, width, height, image):

    2     pts_source = np.float32([points[0], points[1],

    3                             points[3], points[2]])

    4     pts_target = np.float32([[0, 0],[width, 0],[0,

    5                             height],[width, height]])

    6     matrix = cv2.getPerspectiveTransform(pts_source,

    7                             pts_target)

    8     result = cv2.warpPerspective(image, matrix,

    9                             (width, height))

    10    return result

    ```


    Then we get a better aligned image as Figure 6.21. This will be used for text
    recognition. This pre-processing technique can also be used for distorted images
    taken by cameras, for details please reference the previous section 5.7 for image
    warping.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_156_1.png)


    Tesseract provides several functions for text recognition, `image_to_string()`,
    `image_to_boxes()` and `image_to_data()`. Let''s look at them one by one.

    In order to use Tesseract in Python codes, it''s necessary to import pytesseract
    library and specify the location of Tesseract executable, like following,


    ```

    1 import pytesseract

    2 pytesseract.pytesseract.tesseract_cmd = "C:/Program Files/Tesseract-OCR/tesseract.exe"

    ```


    ### 6.5.2.1. Recognize Texts from Image to String


    The function image_to_string() takes an image as a parameter and returns a string
    of all recognized texts.


    ```

    1 def recognize_to_string(image):

    2     text = pytesseract.image_to_string(image)

    3     return text

    ```


    The results are displayed as below:


    OpenCV (Open Source Computer Vision Library) is an open source computer vision
    and machine learning software library. OpenCV was built to provide a common infrastructure
    for computer vision applications and to accelerate the use of machine perception
    in the commercial products. Being a BSD-licensed product, OpenCV makes it easy
    for businesses to utilize and modify the code.


    ### 6.5.2.2. Recognize Texts by Word


    The image_to_data() function takes the image as an input parameter, recognizes
    the text word by word and returns a dictionary that includes the information of
    each word in the image.


    ```

    1 def recognize_by_word(image):

    2     words = pytesseract.image_to_data(image)

    3     for i, word in enumerate(words.splitlines()):

    4         if i != 0:

    5             word = word.split()

    6             print(word)

    7         if len(word) == 12:

    8             t,x,y,w,h = word[11], int(word[6]),


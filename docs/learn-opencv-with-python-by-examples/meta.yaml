    # 7.2.2.2. True Positive, False Positive, True Negative and False Negative


    In order to evaluate the results of machine learning for classification problems,
    there are four important concepts, True Positive (TP), False Positive (FP), True
    Negative (TN) and False Negative (FN). They are explained in below table:


    | True Positives (TP) | Data is labeled as 1, and it’s predicted as 1. (Correct).
    E.g., the color is predicted to be red, and it is actually red. |

    | True Negatives (TN) | Data is labeled as 0, and it’s predicted as 0. (Correct).
    E.g., the color is predicted not red, and it’s actually not red. |

    | False Positives (FP) | Data is labeled as 0, but it’s predicted as 1. (Error).
    E.g. the color is predicted to be red, but it’s actually not red. |

    | False Negatives (FN) | Data is labeled as 1, but it is predicted as 0. (Error).
    E.g. the color is predicted not red, but it’s actually red. |


    # 7.2.2.3. Precision, Recall and F1 Score


    Precision and Recall are two important metrics used to evaluate the performance
    of a classification model.


    *Precision* is the proportion of true positive predictions out of all the positive
    predictions made by the model. It measures how accurate the model is when it predicts
    a positive outcome.


    *Recall*, on the other hand, measures the proportion of true positive predictions
    out of all the actual positive cases in the data. It measures how well the model
    is able to detect positive cases in the data.


    In other words, precision is about the accuracy of the positive predictions, while
    recall is about the completeness of the positive predictions. See Figure 7.14.'

    \ kernel)\n            output[y][x] = np.sum(c)\n    return output\n```\n\n上面无填充的例子可以计算：\n\
    \n```python\nimage = np.array([[1, 3, 1, 0, 2, 1 ,0],\n                  [1, 1,\

  - '[PAGE 239]


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_239_0.png)


    Figure 7.20 Sample Data for SVM


    The idea behind using kernels in SVM is that in a higher-dimensional space, it
    may be possible to find a linear hyperplane that separates the clusters.


    There are different types of kernels, the most commonly used are:


    +   - Linear kernel is used when the data is linearly separable, as in the above
    example.

    - Gaussian (Radial Basis Function) kernel is used when the data is not linearly
    separable, as in this example, and it transforms the data with the Gaussian function.

    - Polynomial kernel is used when the data is not linearly separable, and it transforms
    the data with a polynomial function.

    - And so on.


    Then how the data is transformed by the kernel functions to a higher dimensional
    space? Let’s look at the 2-dimensional Gaussian function as shown in Figure 7.21:'
  - '[PAGE 240]


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_240_0.png)


    Figure 7.21 2-D Gaussian Function

    generated by the code at common/gaussian.py


    When the data is transformed by the Gaussian function from a 2-D space to 3-D,
    the data points near the center will be transformed to a higher position, while
    the data far from the center will be transformed to a lower position in the 3D
    space.


    After applying the Gaussian function to the above data, it can be transformed
    into a 3D dimensional space as shown in Figure 7.22.


    The × data were near the center area in the original 2-D space, now they are transformed
    to the top part in the 3-D space in Figure 7.22, the • data points were far from
    the center, and now in the lower part in the 3-D space.


    Now image a 2-D plane is inserted between the × and • data points in the 3-D space,
    then we can successfully separate them. Same as the linear case, there could be
    many arbitrary 2-D planes to separate the data. The one with the maximum margin,
    meaning the maximum distance between data points of both clusters, is the *Decision
    Boundary*, and the data points that are closest to the decision boundary are *Support
    Vectors*.'
  - '[PAGE 241]


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_241_0.png)


    Figure 7.22 Data Transformed by Gaussian Function


    Now, we have found the decision boundary and support vectors in the higher dimensional
    space, then transform them back to the original 2-D space, as shown in Figure
    7.23. This time the decision boundary is a circle, instead of a line, because
    the data is distributed in a non-linear way. The circle in the solid line in the
    middle is the decision boundary, or hyperplane, the two dashed circles are the
    separating planes, and the data points on the separating planes, which are marked
    with circles, are support vectors.


    Same as the previous linear case, the support vectors have the smallest distance
    to the decision boundary, and they have the most influence on the position of
    the decision boundary.


    Any new data falling on either side of the decision boundary will be predicted
    as the corresponding classes, i.e. new data falling on the inner side of the decision
    boundary will be predicted as ×; and if on the outer side will be •.'

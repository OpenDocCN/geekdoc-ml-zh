    $g(i, j) = \alpha f_0(i, j) + (1 - \alpha) f_1(i, j)$


    > from OpenCV official document at https://docs.opencv.org/4.7.0/d5/dc4/tutorial_adding_images.html


    $f_0(i, j)$ and $f_1(i, j)$ are the two original images, and $g(i, j)$ is the
    output image. $\alpha$ is the weight (value from 0 to 1) on the first image, $(1
    - \alpha)$ is the weight on the second image.



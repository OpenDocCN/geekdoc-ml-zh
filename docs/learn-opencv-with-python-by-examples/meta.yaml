    \ the right-side image is the dilation of it. The kernel size is 3 x 3.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_136_0.png)\n\
    \n![](img/b99f6edaf6f730ad313ce66bc5a26be2_136_1.png)\n\nFigure 6.2 Dilation from\

    Now we only focus on the cropping image part of the source code. As mentioned
    earlier, when the left mouse button is down the first point is captured and recorded,
    and when it is released the second point is recorded.

    To crop an image, an array operation will simply do the job.


    ```

    cropped_image = image[y_start:y_end, x_start:x_end]

    ```


    The image data is in `image` array, its first dimension is y coordinate and the
    second is x. `y_start:y_end` will select only rows between `y_start` and `y_end`,
    similarly `x_start:x_end` will select only columns between the two.

    Depending on which direction the mouse is moving the first point might not always
    be the top-left, and the second point might not always be the bottom-right. We
    resolve this in the `crop_image()` function by comparing the x and y values of
    the first and second points, the smaller x and y will be the top-left point, the
    bigger ones will be the bottom right. The code snippets are show as below:


    ```

    1 def crop_image(img, pt_first, pt_second):

    2     # top-left point

    3     x_tl, y_tl = pt_first

    4     # bottom-right point

    5     x_br, y_br = pt_second

    6     # swap x value if opposite

    7     if x_br < x_tl:

    8         x_br, x_tl = x_tl, x_br

    9     # swap y value if opposite

    ```'

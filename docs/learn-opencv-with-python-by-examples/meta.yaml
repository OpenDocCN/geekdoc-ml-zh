- md: "## 1.1. About OpenCV\n\nOpenCV is a popular open-source computer vision library\
    \ that provides a vast range of tools and algorithms for image and video processing.\
    \ It is originally written in C++, but has interfaces for various programming\
    \ languages, including Python, Java and so on. It’s a cross-platform library,\
    \ although this book will focus only on Python. OpenCV is designed to be fast\
    \ and efficient, making it an ideal choice for real-time computer vision applications,\
    \ and it has become a standard tool for many computer vision projects.\n\nOpenCV\
    \ is used for image and video processing, object detection, as well as machine\
    \ learning. The library comes with many built-in mathematical algorithms and is\
    \ fast enough for real-time video processing. Today it’s widely used for resolving\
    \ the related problems. Reference the official document for more information at\
    \ the below link:\n\n[https://docs.opencv.org/4.7.0/d1/dfb/intro.html](https://docs.opencv.org/4.7.0/d1/dfb/intro.html)\n\
    \nOpenCV's versatility and powerful set of tools make it a popular choice for\
    \ a wide range of computer vision applications in various industries, including\
    \ healthcare, automotive, security, entertainment, and more. It has a wide range\
    \ of applications in today’s world, which include but are not limited to:\n\n\
    - Object detection and recognition: OpenCV can be used to detect and recognize\
    \ objects in images and videos, allowing for applications such as security and\
    \ surveillance systems.\n- Facial recognition: OpenCV has powerful facial recognition\
    \ capabilities, which can be used in applications such as biometric authentication\
    \ and identity verification.\n- Optical character recognition (OCR): OpenCV can\
    \ be used to recognize text in images, making it a useful tool for applications\
    \ such as document scanning and image-to-text conversion.\n- Video processing:\
    \ OpenCV can be used for real-time video processing applications, such as video\
    \ stabilization and object tracking.\n- Medical imaging: OpenCV can be used to\
    \ process and analyze medical images, allowing for applications such as diagnosis\
    \ and treatment planning.\n- Robotics: OpenCV can be used in robotics applications\
    \ for tasks such as object detection and tracking, as well as navigation and mapping.\n\
    - Augmented reality: OpenCV can be used to create augmented reality applications,\
    \ such as virtual try-on applications for fashion and beauty products.\n\nPython\
    \ is a high-level programming language that has gained immense popularity in recent\
    \ years, particularly in the data science and machine learning communities. It\
    \ has a simple and easy-to-learn syntax, making it an ideal language for beginners,\
    \ while also being a powerful tool for experienced developers. Python's popularity\
    \ has led to the development of a vast range of libraries and frameworks, making\
    \ it an excellent choice for a wide range of applications.\n\nPython and OpenCV\
    \ together form a powerful combination for computer vision projects. Python provides\
    \ an easy-to-learn language that is great for prototyping and experimenting with\
    \ ideas, while OpenCV provides a comprehensive set of tools for image and video\
    \ processing. Python's integration with OpenCV makes it easy to write computer\
    \ vision applications in a high-level language, allowing developers to quickly\
    \ build and test their ideas.\n\nPython and OpenCV are two essential tools for\
    \ anyone interested in computer vision. Python's ease-of-use and flexibility,\
    \ combined with OpenCV's powerful set of tools and algorithms, make it a go-to\
    \ choice for many computer vision projects.\n\nThen what you will learn from this\
    \ book with OpenCV combined with Python?\n\n- Read, show and save images.\n- Read\
    \ and show videos or webcam videos with the specific libraries.\n- User interaction\
    \ such as keyboard or mouse operations.\n- Draw texts and shapes such as circles,\
    \ rectangles, triangles, etc.\n- Detection of colors and shapes from images, such\
    \ as circles, rectangles, triangles, etc.\n- Detection of faces, eyes and human\
    \ from images or videos.\n- Text recognition in images.\n- Modify image quality\
    \ or colors, e.g. blur, warp transform, blend, resize, adjust colors, etc.\n-\
    \ Machine learning methods, including K-Means, K-Nearest Neighbors, Support Vector\
    \ Machines, Artificial Neural Networks and Convolutional Neural Networks.\n\n\
    The benefits of using OpenCV:\n\n- Open source and free, easy and simple to learn.\n\
    - Fast for processing, especially used for video processing, for example detect\
    \ objects from videos.\n- Offers over 2,500 mathematical algorithms, they are\
    \ efficient enough not only for image but also for video and real-time processing.\n\
    - The algorithms and functions are designed to take advantage of hardware acceleration\
    \ and multi-core systems.\n\n## 1.2. Target Audiences of This Book\n\nThis book\
    \ is written for anyone interested in learning computer vision using the Python\
    \ programming language. The book is suitable for readers with any level of programming\
    \ skills, from those with very limited knowledge of computer vision to the experienced\
    \ ones, as it covers the basics of both Python programming and OpenCV from the\
    \ ground up.\n\nFor beginners, the book begins with the step-by-step instructions\
    \ for installation and setup of OpenCV, so readers can get started quickly and\
    \ easily. It introduces Python from simplest statements to object-oriented classes,\
    \ and begins with a hello world example. It also covers the fundamentals of computer\
    \ vision, including basic image processing techniques such as pixels, color spaces\
    \ with BGR and HSV, and conversion between them. It’s a plus if the readers have\
    \ some basic level of programming skills with any languages, but don’t need to\
    \ have previous experiences of Python and/or OpenCV.\n\nFor more experienced readers,\
    \ the book covers more advanced topics such as object detection, facial recognition,\
    \ as well as machine learning and deep learning with neural networks. The book\
    \ includes numerous examples with practical and hands-on projects to help readers\
    \ understand the concepts and techniques of OpenCV.\n\nThe book is also suitable\
    \ for researchers, students, and professionals who want to expand their knowledge\
    \ and skills in computer vision using OpenCV with Python. It provides a comprehensive\
    \ guide for those who want to master the OpenCV library and use it for real-world\
    \ applications.\n\nIn summary, this book is a valuable resource for anyone interested\
    \ in computer vision and OpenCV, regardless of their programming skill level.\
    \ The book covers a wide range of topics, from basic image processing techniques\
    \ to advanced deep learning applications, making it an excellent choice for anyone\
    \ looking to learn and apply OpenCV with Python.\n\n## 1.3. Source Codes for This\
    \ Book\n\nAll source codes used in this book are tested and working as of the\
    \ release of this edition. The source codes are available from Github at the below\
    \ link: [https://github.com/jchen8000/OpenCV](https://github.com/jchen8000/OpenCV)\n\
    \nIt’s suggested to use *git* to clone the source code, alternatively, you can\
    \ also simply download the zip file from the above URL, and then extract the zip\
    \ file to your local machine.\n\nIf you are not familiar with *git*, here is the\
    \ quick get-started guide. Feel free to skip and go to the next section if you\
    \ are familiar with it.\n\n- Download *Git for Windows* at [https://git-scm.com/downloads](https://git-scm.com/downloads)\n\
    - It has download links for Windows, macOS and Linux/Unix, simply click the one\
    \ for your machine, and then download the latest version.\n- Launch the downloaded\
    \ installer and follow the on-screen instructions to install it.\n- *Git* is a\
    \ command line tool, open a cmd window, create a folder/directory say `opencv`,\
    \ and clone the Github repository to the local machine by running the following\
    \ command,\n\n    mkdir opencv\n    cd opencv\n    git clone https://github.com/jchen8000/OpenCV.git\n\
    \n- The source code will be downloaded to the folder/directory.\n\nNow the source\
    \ codes are downloaded to the local machine, after the installations of Python\
    \ and OpenCV are completed as described in Chapter 2, you will be able to use\
    \ the PyCharm (an integrated development environment for Python) to open the source\
    \ codes from this folder.\n\n## 1.4. Hardware Requirements and Software Versions\n\
    \nBelow table shows the versions of OpenCV and Python as well as the libraries\
    \ used in this book:\n\n| Software or Libraries | Version |\n| :--- | :--- |\n\
    | Python | 3.10 |"
  mdcn: "## 1.1. 关于 OpenCV\n\nOpenCV 是一个流行的开源计算机视觉库，为图像和视频处理提供了大量工具和算法。它最初用 C++ 编写，但提供了多种编程语言的接口，包括\
    \ Python、Java 等。它是一个跨平台库，尽管本书将只关注 Python。OpenCV 被设计为快速且高效，使其成为实时计算机视觉应用的理想选择，并已成为许多计算机视觉项目的标准工具。\n\
    \nOpenCV 用于图像和视频处理、目标检测以及机器学习。该库包含许多内置的数学算法，并且速度足够快，可以进行实时视频处理。如今，它被广泛用于解决相关问题。更多信息请参考以下链接的官方文档：\n\
    \n[https://docs.opencv.org/4.7.0/d1/dfb/intro.html](https://docs.opencv.org/4.7.0/d1/dfb/intro.html)\n\
    \nOpenCV 的多功能性和强大的工具集使其成为医疗保健、汽车、安防、娱乐等众多行业各种计算机视觉应用的热门选择。它在当今世界有着广泛的应用，包括但不限于：\n\
    \n- 目标检测与识别：OpenCV 可用于检测和识别图像和视频中的目标，从而实现安防监控系统等应用。\n- 人脸识别：OpenCV 具有强大的人脸识别能力，可用于生物识别认证和身份验证等应用。\n\
    - 光学字符识别（OCR）：OpenCV 可用于识别图像中的文本，使其成为文档扫描和图像转文本转换等应用的有用工具。\n- 视频处理：OpenCV 可用于实时视频处理应用，如视频稳定和目标跟踪。\n\
    - 医学成像：OpenCV 可用于处理和分析医学图像，从而实现诊断和治疗规划等应用。\n- 机器人技术：OpenCV 可用于机器人应用中的目标检测与跟踪，以及导航和建图等任务。\n\
    - 增强现实：OpenCV 可用于创建增强现实应用，例如时尚和美容产品的虚拟试穿应用。\n\nPython 是一种高级编程语言，近年来获得了巨大的普及，尤其是在数据科学和机器学习领域。它语法简单易学，使其成为初学者的理想语言，同时也是经验丰富的开发者的强大工具。Python\
    \ 的普及催生了大量库和框架的开发，使其成为各种应用的绝佳选择。\n\nPython 和 OpenCV 共同构成了计算机视觉项目的强大组合。Python 提供了一种易于学习的语言，非常适合原型设计和想法实验，而\
    \ OpenCV 则提供了一套全面的图像和视频处理工具。Python 与 OpenCV 的集成使得用高级语言编写计算机视觉应用变得容易，让开发者能够快速构建和测试他们的想法。\n\
    \nPython 和 OpenCV 是任何对计算机视觉感兴趣的人必备的两个工具。Python 的易用性和灵活性，结合 OpenCV 强大的工具和算法，使其成为许多计算机视觉项目的首选。\n\
    \n那么，通过本书结合 OpenCV 和 Python，你将学到什么？\n\n- 读取、显示和保存图像。\n- 使用特定库读取和显示视频或网络摄像头视频。\n\
    - 用户交互，如键盘或鼠标操作。\n- 绘制文本和形状，如圆形、矩形、三角形等。\n- 从图像中检测颜色和形状，如圆形、矩形、三角形等。\n- 从图像或视频中检测人脸、眼睛和人体。\n\
    - 图像中的文本识别。\n- 修改图像质量或颜色，例如模糊、扭曲变换、混合、调整大小、调整颜色等。\n- 机器学习方法，包括 K-Means、K-近邻、支持向量机、人工神经网络和卷积神经网络。\n\
    \n使用 OpenCV 的好处：\n\n- 开源且免费，易于学习。\n- 处理速度快，特别适用于视频处理，例如从视频中检测目标。\n- 提供超过 2,500\
    \ 种数学算法，它们不仅对图像，而且对视频和实时处理都足够高效。\n- 算法和函数的设计旨在利用硬件加速和多核系统。\n\n## 1.2. 本书的目标读者\n\
    \n本书面向任何有兴趣使用 Python 编程语言学习计算机视觉的人。本书适合任何编程技能水平的读者，从对计算机视觉知识非常有限的人到有经验的人，因为它从零开始涵盖了\
    \ Python 编程和 OpenCV 的基础知识。\n\n对于初学者，本书从 OpenCV 的安装和设置的分步说明开始，以便读者可以快速轻松地开始。它从最简单的语句到面向对象类介绍\
    \ Python，并从一个 \"hello world\" 示例开始。它还涵盖了计算机视觉的基础知识，包括基本的图像处理技术，如像素、BGR 和 HSV 颜色空间及其之间的转换。如果读者具有任何语言的一定编程基础水平，那将是一个加分项，但不需要有\
    \ Python 和/或 OpenCV 的先前经验。\n\n对于更有经验的读者，本书涵盖了更高级的主题，如目标检测、人脸识别，以及使用神经网络的机器学习和深度学习。本书包含许多带有实践和动手项目的示例，以帮助读者理解\
    \ OpenCV 的概念和技术。\n\n本书也适合研究人员、学生和专业人士，他们希望扩展使用 OpenCV 和 Python 在计算机视觉方面的知识和技能。它为那些想要掌握\
    \ OpenCV 库并将其用于实际应用的人提供了全面的指南。\n\n总之，本书是任何对计算机视觉和 OpenCV 感兴趣的人的宝贵资源，无论他们的编程技能水平如何。本书涵盖了广泛的主题，从基本的图像处理技术到高级的深度学习应用，使其成为任何想要学习和应用\
    \ OpenCV 与 Python 的人的绝佳选择。\n\n## 1.3. 本书的源代码\n\n本书中使用的所有源代码在本版发布时都经过测试并可正常工作。源代码可从以下链接的\
    \ Github 获取：[https://github.com/jchen8000/OpenCV](https://github.com/jchen8000/OpenCV)\n\
    \n建议使用 *git* 克隆源代码，或者，你也可以直接从上述 URL 下载 zip 文件，然后将 zip 文件解压到你的本地机器。\n\n如果你不熟悉 *git*，这里有一个快速入门指南。如果你熟悉它，请随意跳过并转到下一节。\n\
    \n- 在 [https://git-scm.com/downloads](https://git-scm.com/downloads) 下载 *Git for\
    \ Windows*\n- 它提供了 Windows、macOS 和 Linux/Unix 的下载链接，只需点击适合你机器的链接，然后下载最新版本。\n-\
    \ 启动下载的安装程序并按照屏幕上的说明进行安装。\n- *Git* 是一个命令行工具，打开一个 cmd 窗口，创建一个文件夹/目录，例如 `opencv`，然后通过运行以下命令将\
    \ Github 仓库克隆到本地机器：\n\n    mkdir opencv\n    cd opencv\n    git clone https://github.com/jchen8000/OpenCV.git\n\
    \n- 源代码将被下载到该文件夹/目录中。\n\n现在源代码已下载到本地机器，在按照第 2 章所述完成 Python 和 OpenCV 的安装后，你将能够使用\
    \ PyCharm（一个 Python 集成开发环境）从该文件夹打开源代码。\n\n## 1.4. 硬件要求和软件版本\n\n下表显示了本书中使用的 OpenCV\
    \ 和 Python 以及库的版本：\n\n| 软件或库 | 版本 |\n| :--- | :--- |\n| Python | 3.10 |"

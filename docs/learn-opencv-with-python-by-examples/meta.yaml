- md: '## 1.5. How This Book Is Organized


    In order for beginners to get started, this book begins with some basics such
    as step-by-step installation and setup, if you have experiences and already known
    how to do it, please feel free to skip the chapters or sections.


    Chapter 2 is to go through the installation process for Python and OpenCV, it
    also has instructions on how to install Python libraries. PyCharm, an integrated
    development environment, is used throughout this book. In the later chapters,
    we will need to install some other libraries to perform actions such as machine
    learning and neural networks.


    Chapter 3 is to introduce OpenCV basics such as loading and displaying images,
    videos and webcams, drawing text and shapes like lines, circles and rectangles,
    etc. The image fundamentals will also be introduced in this chapter, like pixels
    and color spaces of BGR and HSV.


    Chapter 4 is to explain the user interactions like keyboard and mouse operations.


    Chapter 5 is to introduce some common methods for image processing, such as color
    modification, blur, blend and warp images. The concept of the histogram is also
    introduced in this chapter, and how to use the histograms in image processing.


    Chapter 6 is to introduce object detection, shape (circle, rectangle, etc.) detection,
    color detection, text recognition, human detection, face and eye detection etc.
    We also explain two common image processing practices by examples, removing and
    blurring the backgrounds.


    Chapter 7 is to introduce the machine learning features provided by OpenCV, including
    several widely used machine learning methods like K-Means Clustering, K-Nearest
    Neighbors, Support Vector Machines, Artificial Neural Networks as well as Convolutional
    Neural Networks.


    There are mathematical algorithms behind the scenes for image processing and machine
    learning, this book will not focus on those mathematical stuffs, instead we will
    focus on how to use them via OpenCV with Python, although sometimes we explain
    some algorithms in very simple terms, but not deep-dive into details.


    It’s highly recommended to set up an environment on your PC to practice and execute
    the example source codes. There are many images throughout this book, which are
    the results of the execution of the codes. However, the images in this book are
    for reference only. You will be able to see the color images from the execution
    of the source codes on the environments of your PC.


    All right, enjoy the wonderful world of Computer Vision!


    ## 2. Installation


    This chapter will prepare for using OpenCV and Python. The first thing is to install
    Python and an Integrated Development Environment (IDE) if you do not have them
    already. After the installation is completed, need to install the OpenCV and other
    required packages on the IDE environment, and then we will create our first projects.


    Python version 3.10 is used throughout this book, and PyCharm community edition
    is used as the Integrated Development Environment (IDE). Section 2.1 explains
    the details of installing Python and PyCharm.


    For users who prefer Linux operating systems, the details of installation on Ubuntu
    will be explained in section 2.2.


    Section 2.3 explains the installation of OpenCV and configuration of PyCharm,
    and a Hello OpenCV code to verify that the installation is successful.


    Enjoy the installation of OpenCV and Python.


    ### 2.1. Install on Windows


    #### 2.1.1. Install Python on Windows 10


    This section explains the installation of Python on Windows. Go to the Python
    website at [https://www.python.org/downloads/](https://www.python.org/downloads/),
    there is a list of available Python versions for download, look something like
    Figure 2.1, this is the available Python versions as of this writing, it could
    be different in the future when more are released.


    | Release Version | Release date | Download | Click for more |

    |---|---|---|---|

    | Python 3.10.10 | Feb. 8, 2023 | Download | Release Notes |

    | Python 3.11.2 | Feb. 8, 2023 | Download | Release Notes |

    | Python 3.11.1 | Dec. 6, 2022 | Download | Release Notes |

    | Python 3.10.9 | Dec. 6, 2022 | Download | Release Notes |

    | Python 3.9.16 | Dec. 6, 2022 | Download | Release Notes |

    | Python 3.8.16 | Dec. 6, 2022 | Download | Release Notes |

    | Python 3.7.16 | Dec. 6, 2022 | Download | Release Notes |

    | Python 3.11.0 | Oct. 24, 2022 | Download | Release Notes |

    | Python 3.9.15 | Oct. 11, 2022 | Download | Release Notes |

    | Python 3.8.15 | Oct. 11, 2022 | Download | Release Notes |

    | ... | ... | ... | ... |


    Figure 2.1 List of Python Versions for Download


    It’s not recommended to install the latest version, because a number of Python
    packages are used in this book, each package supports up to a specific Python
    version, some of them are not yet available to support the latest Python version.
    Here we use Python 3.10.x for this book.


    Click *Download* from the webpage above and go to the next page, there is a list
    of available download files for different Operation Systems, which looks something
    similar to Figure 2.2:


    | Version | Operating System | Description | MD5 Sum | File Size |

    |---|---|---|---|---|

    | Gzipped source tarball | Source release | | 25eb3686... | 26044345 |

    | XZ compressed source tarball | Source release | | dc8c0f27... | 19612112 |

    | macOS 64-bit universal2 installer | macOS | macOS 10.9 and later | 616554b1...
    | 40930111 |

    | Windows embeddable package (32-bit) | Windows | | 8afb62c3... | 7629980 |

    | Windows embeddable package (64-bit) | Windows | | c02aded2... | 8601296 |

    | Windows help file | Windows | | e3edf06b... | 9384836 |

    | Windows installer (32-bit) | Windows | | 1a9f5825... | 27827240 |

    | Windows installer (64-bit) | Windows | Recommended | dce578fe... | 28980224
    |


    Figure 2.2 List of Operation Systems for Python Installer


    Download the one for your operation system, save and run the file. If you are
    using Windows and Mac OS, the installer files can be downloaded from here. If
    you are using Linux, we will explain how to install it on Ubuntu in the next section.


    Run the downloaded installer file, it’s pretty much straightforward although it
    will take several minutes. After installation is completed successfully, verify
    the Python on your system. Start a cmd command by clicking on Start icon of Windows
    and type “cmd” and hit return.


    Type the following command in the cmd window:


    ```

    python --version

    ```


    The result should be shown something as below,


    ```

    C:\>python --version

    Python 3.10.5

    ```


    The displayed is the version just installed, this indicates that the Python is
    correctly installed. Please note, as long as the version is 3.10.x, it should
    be OK, it doesn’t have to match the last number after the second dot.


    #### 2.1.2. PyCharm, the Integrated Development Environment


    The next is to install PyCharm -- the Integrated Development Environment (IDE)
    for Python, which is used to write, edit, run and debug the Python codes. PyCharm
    is a very popular cross-platform Python IDE, it comes with rich features like
    integrated unit testing and Python debugger, error highlighting, code analysis
    and so on.


    PyCharm has two versions: Community and Professional, the former is open-source
    and free for Python developers; the latter is paid edition and comes with more
    features. The free community version is good for this book.


    Go to [https://www.jetbrains.com/pycharm/download](https://www.jetbrains.com/pycharm/download)
    and click the *Download* button under Community. After the installer file is downloaded,
    run it and follow the on-screen instructions to install it.


    It’s straightforward to execute the installation process until completion. After
    the installation is completed, the PyCharm is available on your Windows system.


    ### 2.2. Install Python on Ubuntu


    #### 2.2.1. Install Python on Ubuntu


    This section explains the installation of Python on Linux system, specifically
    Ubuntu 22.04. As a prerequisite to installing Python, a root user or a user with
    sudo access is required.'
  mdcn: '## 1.5. 本书结构


    为了让初学者能够入门，本书从一些基础知识开始，例如分步安装和设置。如果您已有经验并知道如何操作，可以随意跳过相关章节或部分。


    第2章将介绍Python和OpenCV的安装过程，其中也包含如何安装Python库的说明。本书全程使用集成开发环境PyCharm。在后续章节中，我们将需要安装一些其他库来执行诸如机器学习和神经网络等操作。


    第3章将介绍OpenCV的基础知识，例如加载和显示图像、视频和网络摄像头，绘制文本和形状（如线条、圆形和矩形）等。本章还将介绍图像基础，例如像素以及BGR和HSV颜色空间。


    第4章将解释用户交互，如键盘和鼠标操作。


    第5章将介绍一些常见的图像处理方法，例如颜色修改、模糊、混合和扭曲图像。本章还将介绍直方图的概念，以及如何在图像处理中使用直方图。


    第6章将介绍目标检测、形状（圆形、矩形等）检测、颜色检测、文本识别、人体检测、人脸和眼睛检测等。我们还将通过示例解释两种常见的图像处理实践：去除和模糊背景。


    第7章将介绍OpenCV提供的机器学习功能，包括几种广泛使用的机器学习方法，如K-均值聚类、K-近邻、支持向量机、人工神经网络以及卷积神经网络。


    图像处理和机器学习背后都有数学算法，本书不会专注于这些数学内容，而是专注于如何通过Python使用OpenCV来应用它们。尽管有时我们会用非常简单的术语解释一些算法，但不会深入探讨细节。


    强烈建议您在个人电脑上设置一个环境来练习和执行示例源代码。本书中包含许多图片，它们是代码执行的结果。然而，本书中的图片仅供参考。您将能够在个人电脑的环境中通过执行源代码看到彩色图像。


    好了，享受计算机视觉的精彩世界吧！


    ## 2. 安装


    本章将为使用OpenCV和Python做准备。首先，如果您还没有安装Python和集成开发环境（IDE），需要先安装它们。安装完成后，需要在IDE环境中安装OpenCV和其他所需的包，然后我们将创建我们的第一个项目。


    本书全程使用Python 3.10版本，并使用PyCharm社区版作为集成开发环境（IDE）。第2.1节详细介绍了Python和PyCharm的安装。


    对于偏好Linux操作系统的用户，第2.2节将详细说明在Ubuntu上的安装。


    第2.3节解释了OpenCV的安装和PyCharm的配置，以及一个用于验证安装是否成功的Hello OpenCV代码。


    享受OpenCV和Python的安装过程吧。


    ### 2.1. 在Windows上安装


    #### 2.1.1. 在Windows 10上安装Python


    本节介绍在Windows上安装Python。访问Python网站 [https://www.python.org/downloads/](https://www.python.org/downloads/)，那里有一个可供下载的Python版本列表，看起来类似于图2.1，这是撰写本文时可用的Python版本，未来发布更多版本后可能会有所不同。


    | 发布版本 | 发布日期 | 下载 | 点击查看更多 |

    |---|---|---|---|

    | Python 3.10.10 | 2023年2月8日 | 下载 | 发布说明 |

    | Python 3.11.2 | 2023年2月8日 | 下载 | 发布说明 |

    | Python 3.11.1 | 2022年12月6日 | 下载 | 发布说明 |

    | Python 3.10.9 | 2022年12月6日 | 下载 | 发布说明 |

    | Python 3.9.16 | 2022年12月6日 | 下载 | 发布说明 |

    | Python 3.8.16 | 2022年12月6日 | 下载 | 发布说明 |

    | Python 3.7.16 | 2022年12月6日 | 下载 | 发布说明 |

    | Python 3.11.0 | 2022年10月24日 | 下载 | 发布说明 |

    | Python 3.9.15 | 2022年10月11日 | 下载 | 发布说明 |

    | Python 3.8.15 | 2022年10月11日 | 下载 | 发布说明 |

    | ... | ... | ... | ... |


    图2.1 可供下载的Python版本列表


    不建议安装最新版本，因为本书使用了许多Python包，每个包支持到特定的Python版本，其中一些尚未支持最新的Python版本。这里我们使用Python
    3.10.x作为本书的版本。


    点击上面网页中的 *下载*，进入下一页，那里有一个适用于不同操作系统的可用下载文件列表，看起来类似于图2.2：


    | 版本 | 操作系统 | 描述 | MD5校验和 | 文件大小 |

    |---|---|---|---|---|

    | Gzipped source tarball | 源代码发布 | | 25eb3686... | 26044345 |

    | XZ compressed source tarball | 源代码发布 | | dc8c0f27... | 19612112 |

    | macOS 64-bit universal2 installer | macOS | macOS 10.9及更高版本 | 616554b1... |
    40930111 |

    | Windows embeddable package (32-bit) | Windows | | 8afb62c3... | 7629980 |

    | Windows embeddable package (64-bit) | Windows | | c02aded2... | 8601296 |

    | Windows help file | Windows | | e3edf06b... | 9384836 |

    | Windows installer (32-bit) | Windows | | 1a9f5825... | 27827240 |

    | Windows installer (64-bit) | Windows | 推荐 | dce578fe... | 28980224 |


    图2.2 Python安装程序的操作系统列表


    下载适用于您操作系统的版本，保存并运行该文件。如果您使用的是Windows和Mac OS，可以从这里下载安装程序文件。如果您使用的是Linux，我们将在下一节中解释如何在Ubuntu上安装。


    运行下载的安装程序文件，过程非常直接，尽管需要几分钟时间。安装成功完成后，请验证您系统上的Python。通过点击Windows的开始图标启动cmd命令，输入“cmd”并按回车。


    在cmd窗口中输入以下命令：


    ```

    python --version

    ```


    结果应显示如下，


    ```

    C:\>python --version

    Python 3.10.5

    ```


    显示的是刚刚安装的版本，这表明Python已正确安装。请注意，只要版本是3.10.x，就应该没问题，不必完全匹配第二个点后的最后一个数字。


    #### 2.1.2. PyCharm，集成开发环境


    接下来是安装PyCharm——Python的集成开发环境（IDE），用于编写、编辑、运行和调试Python代码。PyCharm是一个非常流行的跨平台Python
    IDE，它具有丰富的功能，如集成单元测试和Python调试器、错误高亮、代码分析等。


    PyCharm有两个版本：社区版和专业版，前者是开源的，对Python开发者免费；后者是付费版本，具有更多功能。免费的社区版对于本书来说已经足够。


    访问 [https://www.jetbrains.com/pycharm/download](https://www.jetbrains.com/pycharm/download)
    并点击社区版下的 *下载* 按钮。下载安装程序文件后，运行它并按照屏幕上的说明进行安装。


    执行安装过程直到完成非常直接。安装完成后，PyCharm即可在您的Windows系统上使用。


    ### 2.2. 在Ubuntu上安装Python


    #### 2.2.1. 在Ubuntu上安装Python


    本节介绍在Linux系统上安装Python，具体是Ubuntu 22.04。作为安装Python的前提，需要root用户或具有sudo权限的用户。'

    As shown in Figure 7.1, the horizontal axis represents the height of people, and
    the vertical axis represents their weight. Each data point represents a person,
    the data points can be grouped in three clusters: S, M and L.


    The arithmetic mean (average) position of each group is the *centroid* and located
    near the center of each group, shown as red • in Figure 7.1. Each centroid has
    its corresponding height and weight, the T-shirt maker will make three sizes of
    T-shirts based on the three centroids, they will most likely fit all people in
    different groups.


    Let’s take a look at how K-Means works in the simplest case, generate random 2D
    data in 2 clusters and plot the data as Figure 7.2,


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_199_1.png)



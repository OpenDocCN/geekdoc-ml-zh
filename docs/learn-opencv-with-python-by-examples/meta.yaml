  md: 'There are a number of articles online to explain how the cascade classifier
    works, which is out of the scope of this book, please reference those materials
    if you want to understand the theories and algorithms. There are several articles
    listed in the References section as well, this book however only focuses on the
    implementation.


    OpenCV comes with some pre-trained classifiers which can be used to detect different
    objects from images. There are two ways to get those cascade classifiers,


    +   1. They come with OpenCV installation, located at the folder specified by
    cv2.data.haarcascades.

    2. Download the latest version from the below link, https://github.com/opencv/opencv/tree/master/data/haarcascades


    The cascade classifiers only work on grayscale images, make sure the images are
    converted to grayscale before calling the cascade functions.

    In this example we will detect faces and eyes from the images, there are two cascade
    classifiers for this purpose, one for faces (haarcascade_frontalface_default.xml)
    and another for eyes (haarcascade_eye.xml).

    We use the ones that come with OpenCV installation, as below line 25 – 29.


    ```

    1  import cv2


    # 3.4.2. BGR Color Space and Channels


    A digital image is represented in different color spaces, the color space refers
    to a specific way of representing colors in an image. It is a three-dimensional
    model that describes the range of colors that can be displayed or printed. There
    are several color spaces used in digital imaging, and each has a different range
    of colors and is used for specific purposes. Here we will introduce the BGR and
    HSV color spaces in this section and the next, both are commonly and widely used
    in image processing.


    BGR stands for Blue, Green, and Red. It is a color space used to represent colors
    on electronic screens, like computer monitors, TVs, and smartphones. In this space,
    colors are represented by three primary colors: Red, Green, and Blue. Each primary
    color has a range of 0 to 255, meaning each color can have 256 possible values,
    which makes a total of 16.7 million ( = 256 × 256 × 256 ) possible colors.


    Each primary color is called a channel, a channel has the same size as the original
    image. Therefore, an image in BGR color space has three channels, blue, green
    and red. Figure 3.5 shows the idea of how the three channels compose a color image.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_44_0.png)'
  merge: -1
  pgno: 44
- img_proc: true
  md: 'A single channel does not have any colors, it’s a grayscale image. Because
    the three primary colors can build up a color, a single channel only has one value,
    which can only represent a grayscale, not a color.

    Therefore, the above Figure 3.5 explains the concept, but not quite correct, because
    the blue, green and red channels are all in grayscale without colors. The above
    red channel is shown in red, looks like it is red, but that is not the case, it
    should be in grayscale. Similarly, the green and blue channels should be also
    in grayscale.

    Figure 3.6 is the correct one, the blue, green and red channels are all in grayscale,
    they are mixed together to produce the color image.

    Each channel is represented by an 8-bit value ranging from 0 to 255, the combination
    of the three primary colors at their maximum intensity (255, 255, 255) results
    in white, while (0, 0, 0) results in black, anything in between results in different
    colors. The same value in three channels, such as (125, 125, 125), represents
    a gray color.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_45_0.png)


    Figure 3.6 Blue, Green and Red Channels to Produce an Image


    # 3.4.3. HSV Color Space and Channels


    In addition to the BGR color space, an image can also be represented by HSV (Hue,
    Saturation, Value) color space, also known as HSB (Hue, Saturation, Brightness),
    which is a cylindrical color space that describes colors based on three attributes:
    hue, saturation, and value/brightness, as shown in Figure 3.7. The three attributes
    are also represented in channels.

    In the HSV color space, colors are represented as a point in a cylindrical coordinate
    system. The *hue* is represented by the angle on the horizontal axis, the *saturation*
    is'
  merge: -1
  pgno: 45
- img_proc: true
  md: 'represented by the radius or distance from the center, and the *value/brightness*
    is represented by the vertical axis.

    The HSV is often used in graphics software for color selection and manipulation
    because it allows users to easily adjust the hue, saturation, and value/brightness
    of color separately. For example, changing the hue will change the color family,
    while changing the saturation or brightness will alter the intensity or lightness/darkness
    of the color.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_46_0.png)


    Figure 3.7 HSV Color Space


    SharkD, CC BY-SA 3.0 via Wikimedia Commons https://en.wikipedia.org/wiki/HSL_and_HSV#/media/File:HSV_color_solid_cylinder_saturation_gray.png


    **Hue** represents the color portion of the image, which is described as an angle
    on a color wheel ranging from 0 to 359 degrees. Figure 3.8 shows the color wheel,
    different colors are distributed around a circle with red at 0 degree, green at
    120 degrees, and blue at 240 degrees. Hue value at different angles represent
    different colors.

    Normally the hue value is from 0 to 359 representing an angle of the circle, however
    in OpenCV the values of hue are different, since the values are stored in an 8-bit
    datatype with the range of [0, 255], which can not store the entire hue value
    of [0, 359]. OpenCV is using a trick to resolve it, the hue value is divided by
    2 and stored in the 8-bit datatype. Therefore, the hue in OpenCV is [0, 179].'

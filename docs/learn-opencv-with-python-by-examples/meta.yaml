    In most cases the model of this complexity will not get a good result on the first
    try, it’s usually necessary to fine-tune and adjust parameters and try back and
    forth until reaching a better result, this is a trial-and-error process.


    The factors to adjust in the fine-tune process include number of layers, number
    of features in conv2d layer, feature sizes, number of hidden layers in fully connected
    layer, number of nodes of each layer, etc.



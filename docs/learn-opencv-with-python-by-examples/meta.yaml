    \  [0, 2, 9, 1, 9, 0 ,1],\n                  [1, 0, 9, 0, 8, 2 ,1],\n        \
    \          [3, 1, 1, 2, 0, 2 ,2],\n                  [1, 3, 1, 3, 3, 2 ,0]])\n\
    kernel = np.array([[1, 1, 1],\n                  [1, 0, 1],\n                \

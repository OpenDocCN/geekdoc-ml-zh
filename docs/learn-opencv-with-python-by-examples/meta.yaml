    # 6.7. Face and Eye Detection


    Source: FaceEyeDetection.py


    OpenCV provides another method for object detection using Haar feature-based cascade
    classifiers, it is an effective object detection method proposed by Paul Viola
    and Michael Jones in their paper, “Rapid Object Detection using a Boosted Cascade
    of Simple Features” in 2001. It is a machine learning based approach where a cascade
    function is pre-trained with the input data.


    The Haar cascade classifier is trained using thousands of positive and negative
    images as the input data. The positive images are those that contain the object
    to be detected, while the negative images are those that do not contain the object.
    The classifier is trained using a machine learning algorithm called AdaBoost,
    which selects a small set of important features (called Haar features) from the
    training set and trains a classifier using these features. The Haar features are
    calculated by subtracting the sum of pixel intensities in one rectangular region
    of an image from the sum of pixel intensities in another rectangular region adjacent
    to it.


    The Haar classifier works by sliding a window of a fixed size over an image and
    computing the Haar features for each position of the window. The classifier then
    applies the trained model to determine if the object is present in that window.
    If the object is present, the window is classified as positive, and if not, it
    is classified as negative. By sliding the window over the entire image, the classifier
    can detect the object in different locations and scales.'

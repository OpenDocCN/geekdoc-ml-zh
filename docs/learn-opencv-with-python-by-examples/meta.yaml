    # 7.4.2. Activation Functions


    Source: common/ann_activation_functions.py


    An activation function is a key component of artificial neural networks (ANNs)
    and is used to introduce non-linearity into the output of a neuron. In ANNs, activation
    functions are applied to the weighted sum of inputs to the neuron in order to
    produce an output.

    An activation function must be defined for each node, it is responsible for transforming
    the input data into the output for the node.

    As Figure 7.27, the inputs are multiplied by corresponding weights and sum them
    up:'
  - '[PAGE 257]


    $$z = x_0\theta_0 + x_1\theta_1 + x_2\theta_2 + \cdots = \sum_{i=0}^{m} x_i\theta_i$$


    then z is sent to the activation function for calculations, the activation function
    is represented as:


    $$g(z) = g(x_0\theta_0 + x_1\theta_1 + x_2\theta_2 + \cdots) = g(\sum_{i=0}^{m}
    x_i\theta_i)$$


    There are numerous activation functions that can be divided into the following
    two categories:


    +   1. Linear activation functions

    2. Nonlinear activation functions


    OpenCV supports the following activation functions:


    | cv2.ml.ANN_MLP_IDENTITY | Identity, or Linear function |

    | cv2.ml.ANN_MLP_SIGMOID_SYM | Symmetrical sigmoid function |

    | cv2.ml.ANN_MLP_GAUSSIAN | Gaussian function |

    | cv2.ml.ANN_MLP_RELU | ReLU, or Rectified Linear Unit, function |

    | cv2.ml.ANN_MLP_LEAKYRELU | Leaky ReLU function |


    # What are Derivatives


    *Derivatives* are used extensively in machine learning to train models that can
    make accurate predictions or decisions. In particular, derivatives are used in
    the optimization of model parameters through the process of *gradient descent*.

    In calculus, the derivative of a function is a measure of how that function changes
    as its input changes. Geometrically, the derivative corresponds to the slope of
    the tangent line to the function at a particular point on its graph.

    If a function is denoted as'
  - '[PAGE 258]


    $g(z)$


    Then its derivative is denoted as:


    $g''(z)$


    In this book we do not deep dive into the mathematical details of these topics,
    although we will introduce both the functions and derivatives of the most widely
    used active functions of artificial neural networks.


    # 7.4.2.1. Identity (or Linear) Function


    The identity function, also called the linear function, is a simple function that
    returns the same value of input as the output value, which means that it does
    not modify the input in any way.


    The Identity function is defined as:


    $g(z) = z$


    Its derivative function is defined as:


    $g''(z) = 1$


    As shown in Figure 7.30, left side is the Identity function, right side is the
    derivative of it.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_258_0.png)


    Figure 7.30 Identify or Linear Function


    Generated by source code at common/ann_activation_functions.py


    One advantage of using the identity function is that it does not introduce non-linearity
    into the network, which can be useful when the problem being solved does not require
    complex non-linear transformations. Another advantage is that it'
- md: 'preserves the gradient of the output with respect to the input, which can make
    the training process more stable.


    However, in many cases, it is limited in its capacity to learn complex functional
    mappings and solve complex problems. The reason is that no matter how many layers
    a neural network has, it behaves just like a single layer because summing up all
    the layers will give another linear function, which is exactly the same as a single
    layer.


    Another problem of the identity function is its derivative is a constant, it has
    no relation to the input data z. The training will use its derivative to perform
    a process called *back-propagation*, the constant value loses the information
    of the input data, and then not able to provide a better prediction.


    In most cases, the non-linear activation functions which are introduced in the
    following sections are used to learn and solve complex data and provide accurate
    predictions.


    ## 7.4.2.2. Sigmoid or Logistic Activation Function


    The Sigmoid, or Logistic, is a non-linear function that maps any input value to
    a value between 0 and 1, which can be interpreted as a probability. It’s defined
    as:


    $$g(z) = \frac{1}{(1 + e^{-z})}$$


    The derivative is defined as:


    $$g''(z) = g(z)(1 - g(z)) = \frac{e^{-z}}{(1 + e^{-z})^2}$$


    As shown in Figure 7.31, left side is the Sigmoid function, right side is its
    derivative.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_260_0.png)


    Figure 7.31 Sigmoid Function and Derivative

    *Generated by source code at common/ann_activation_functions.py*


    The Sigmoid function gives an “S” shaped curve between 0 and 1. It’s one of the
    most widely used non-linear activation functions. It transforms the input values
    into the range between 0 and 1. As the input value z increases, the output of
    the function approaches 1, while as z decreases, the output approaches 0.


    In ANNs, the sigmoid function is often used as the activation function in the
    hidden layers. This is because it introduces non-linearity into the network, allowing
    it to learn more complex patterns and relationships in the data. The derivative
    of the sigmoid function can also be easily calculated, which is important for
    back-propagation and the optimization of the network parameters.


    However, the sigmoid function can suffer from the vanishing gradient problem,
    meaning the gradients of the function become very small as the input values become
    very large or very small. This can make the training process of deep networks
    slower and more difficult. Therefore, other activation functions, such as the
    ReLU function, have become more popular in recent years.


    ## 7.4.2.3. Tanh Function


    The tanh function, short for hyperbolic tangent function, is also a non-linear
    function that maps any input value to a value between -1 and 1. Like the sigmoid
    function, the tanh function also has an S-shaped curve, but its output ranges
    between -1 and 1 instead of 0 and 1. As z increases, the output of the function
    approaches 1, while as z decreases, the output approaches -1.


    It’s defined as:


    $$g(z) = \frac{e^z - e^{-z}}{e^z + e^{-z}}$$


    The derivative function is defined as:


    $$g''(z) = 1 - g(z)^2$$


    It is often used as the activation function in the hidden layers of ANNs. It introduces
    non-linearity into the network, allowing it to learn more complex patterns and
    relationships in the data. The derivative of the tanh function can also be easily
    calculated, which is important for backpropagation and the optimization of the
    network parameters.


    As shown in Figure 7.32, left side is the Tanh function, right side is the derivative
    of it.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_261_0.png)


    Figure 7.32 Tanh Function and Derivative

    *Generated by source code at common/ann_activation_functions.py*


    Compared to the sigmoid, the tanh function has a steeper derivative around the
    origin, which means it can be more effective in capturing the nuances of data.
    Sometimes Tanh works better than the sigmoid function when negative output values
    are needed.


    However, like the sigmoid, the tanh function can also suffer from the vanishing
    gradient problem, where the gradients of the function become very small as the
    input values become very large or very small.


    ## 7.4.2.4. ReLU (Rectified Linear Unit) Function


    ReLU, or Rectified Linear Unit, is a partial linear function, it’s the same as
    the identity function when input is positive, otherwise it will output zero. ReLU
    function is simple and computationally efficient, it’s very quick to converge.
    However, it’s not good for negative input data because it always returns 0 when
    input data is negative.


    It is defined as:


    $$g(z) = \max(0, z)$$


    The derivative function is defined as:


    $$g''(z) = \begin{cases} 1 & : z > 0 \\ 0 & : z < 0 \end{cases}$$


    The ReLU function and derivative are shown in Figure 7.33:


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_262_0.png)


    Figure 7.33 ReLU Function and Derivative

    *Generated by source code at common/ann_activation_functions.py*


    The advantage of the ReLU function over other activation functions, such as the
    sigmoid and tanh functions, is that it avoids the vanishing gradient problem,
    which occurs when the gradients of the activation function become very small for
    very large or very small input values, making the training process of the neural
    networks slower and more difficult.


    However, it’s not appropriate for all types of data, as it can suffer from the
    "dying ReLU" problem, where some neurons may become permanently inactive due to
    the large negative input values, resulting in a dead neuron that does not contribute
    to the output of the network, because it always output 0 when input is negative,
    and its derivative is also 0 for negative inputs. To address this issue, various
    modifications to the ReLU function have been proposed, such as the leaky ReLU.


    ## 7.4.2.5. Leaky ReLU Function


    Leaky ReLU function is a modified version of the ReLU function, which is another
    popular activation function used in ANNs and other machine learning models. It
    is a non-linear function that maps any negative input value to a small negative
    output, and any positive input value to the same input value.


    It is defined as:

    $$g(z) = \max(\epsilon z, z)$$


    The derivative function is defined as:

    $$g''(z) = \begin{cases} 1 & : z > 0 \\ \epsilon & : z < 0 \end{cases}$$


    Normally $\epsilon$ is a small value something like 0.1, or 0.01 and so on.

    Leaky ReLU function and derivative are shown in Figure 7.34.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_263_0.png)


    Figure 7.34 Leaky ReLU Function and Derivative

    *Generated by source code at common/ann_activation_functions.py*


    The Leaky ReLU function is similar to the ReLU function, but it addresses the
    "dying ReLU" problem. By introducing a small negative slope for negative input
    values, the Leaky ReLU function can prevent neurons from dying, and improve the
    performance of the network.


    It has been shown to outperform the ReLU function in some cases, particularly
    in neural networks. However, the choice of activation function depends on the
    specific task and data at hand, and it is often a matter of trial and error to
    determine the optimal activation function for a particular problem.


    ## 7.4.2.6. Gaussian Function


    Gaussian functions are widely used in many areas, as we have introduced in Gaussian
    blur in section 5.8.2 and the kernel function of support vector machine in section
    7.3.1.

    Gaussian function is defined as:

    $$g(z) = e^{-z^2}$$

    The derivative function is defined as:

    $$g''(z) = -2ze^{-z^2}$$

    It is also a non-linear function, as shown in Figure 7.35,


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_264_0.png)


    Figure 7.35 Gaussian Function and Derivative

    *Generated by source code at common/ann_activation_functions.py*


    This is a one-dimensional Gaussian function, Figure 7.21 in section 7.3.1 shows
    a two-dimensional Gaussian function.

    OpenCV support Gaussian function as an activation function for ANNs, it is also
    widely used in many fields, including physics, chemistry, engineering, and finance,
    because it accurately models many natural phenomena and processes that exhibit
    a bell-shaped distribution.'
  mdcn: '保留了输出相对于输入的梯度，这可以使训练过程更加稳定。


    然而，在许多情况下，其学习复杂函数映射和解决复杂问题的能力是有限的。原因是，无论神经网络有多少层，其行为都像单层网络，因为将所有层相加会得到另一个线性函数，这与单层网络完全相同。


    恒等函数的另一个问题是其导数是常数，与输入数据 z 无关。训练过程会使用其导数来执行称为*反向传播*的过程，常数值丢失了输入数据的信息，因此无法提供更好的预测。


    在大多数情况下，会使用以下章节介绍的非线性激活函数来学习和解决复杂数据并提供准确的预测。


    ## 7.4.2.2. Sigmoid 或 Logistic 激活函数


    Sigmoid 或 Logistic 是一个非线性函数，它将任何输入值映射到 0 到 1 之间的值，这可以解释为概率。其定义为：


    $$g(z) = \frac{1}{(1 + e^{-z})}$$


    其导数定义为：


    $$g''(z) = g(z)(1 - g(z)) = \frac{e^{-z}}{(1 + e^{-z})^2}$$


    如图 7.31 所示，左侧是 Sigmoid 函数，右侧是其导数。


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_260_0.png)


    图 7.31 Sigmoid 函数及其导数

    *由 common/ann_activation_functions.py 中的源代码生成*


    Sigmoid 函数在 0 和 1 之间给出一条“S”形曲线。它是最广泛使用的非线性激活函数之一。它将输入值转换到 0 到 1 之间的范围。随着输入值 z
    的增加，函数的输出趋近于 1，而随着 z 的减小，输出趋近于 0。


    在人工神经网络中，sigmoid 函数通常用作隐藏层的激活函数。这是因为它为网络引入了非线性，使其能够学习数据中更复杂的模式和关系。sigmoid 函数的导数也很容易计算，这对于反向传播和网络参数的优化很重要。


    然而，sigmoid 函数可能会遇到梯度消失问题，这意味着当输入值变得非常大或非常小时，函数的梯度会变得非常小。这会使深度网络的训练过程变慢且更加困难。因此，近年来其他激活函数，如
    ReLU 函数，变得更加流行。


    ## 7.4.2.3. Tanh 函数


    tanh 函数，即双曲正切函数的缩写，也是一个非线性函数，它将任何输入值映射到 -1 到 1 之间的值。与 sigmoid 函数类似，tanh 函数也具有
    S 形曲线，但其输出范围在 -1 到 1 之间，而不是 0 到 1。随着 z 的增加，函数的输出趋近于 1，而随着 z 的减小，输出趋近于 -1。


    其定义为：


    $$g(z) = \frac{e^z - e^{-z}}{e^z + e^{-z}}$$


    其导数函数定义为：


    $$g''(z) = 1 - g(z)^2$$


    它通常用作人工神经网络隐藏层的激活函数。它为网络引入了非线性，使其能够学习数据中更复杂的模式和关系。tanh 函数的导数也很容易计算，这对于反向传播和网络参数的优化很重要。


    如图 7.32 所示，左侧是 Tanh 函数，右侧是其导数。


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_261_0.png)


    图 7.32 Tanh 函数及其导数

    *由 common/ann_activation_functions.py 中的源代码生成*


    与 sigmoid 相比，tanh 函数在原点附近的导数更陡峭，这意味着它在捕捉数据细微差别方面可能更有效。有时，当需要负输出值时，Tanh 比 sigmoid
    函数效果更好。


    然而，与 sigmoid 一样，tanh 函数也可能遇到梯度消失问题，即当输入值变得非常大或非常小时，函数的梯度会变得非常小。


    ## 7.4.2.4. ReLU（修正线性单元）函数


    ReLU，或称修正线性单元，是一个分段线性函数，当输入为正时，它与恒等函数相同，否则输出为零。ReLU 函数简单且计算效率高，收敛速度非常快。然而，它对负输入数据效果不佳，因为当输入数据为负时，它总是返回
    0。


    其定义为：


    $$g(z) = \max(0, z)$$


    其导数函数定义为：


    $$g''(z) = \begin{cases} 1 & : z > 0 \\ 0 & : z < 0 \end{cases}$$


    ReLU 函数及其导数如图 7.33 所示：


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_262_0.png)


    图 7.33 ReLU 函数及其导数

    *由 common/ann_activation_functions.py 中的源代码生成*


    ReLU 函数相对于其他激活函数（如 sigmoid 和 tanh 函数）的优势在于它避免了梯度消失问题，该问题发生在激活函数的梯度对于非常大或非常小的输入值变得非常小时，使得神经网络的训练过程变慢且更加困难。


    然而，它并不适合所有类型的数据，因为它可能会遇到“死亡 ReLU”问题，即一些神经元可能由于大的负输入值而永久失活，导致神经元死亡，不对网络的输出做出贡献，因为当输入为负时它总是输出
    0，并且其导数对于负输入也为 0。为了解决这个问题，已经提出了对 ReLU 函数的各种修改，例如 Leaky ReLU。


    ## 7.4.2.5. Leaky ReLU 函数


    Leaky ReLU 函数是 ReLU 函数的修改版本，是人工神经网络和其他机器学习模型中使用的另一种流行激活函数。它是一个非线性函数，将任何负输入值映射到一个小的负输出，将任何正输入值映射到相同的输入值。


    其定义为：

    $$g(z) = \max(\epsilon z, z)$$


    其导数函数定义为：

    $$g''(z) = \begin{cases} 1 & : z > 0 \\ \epsilon & : z < 0 \end{cases}$$


    通常 $\epsilon$ 是一个很小的值，比如 0.1 或 0.01 等。

    Leaky ReLU 函数及其导数如图 7.34 所示。


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_263_0.png)


    图 7.34 Leaky ReLU 函数及其导数

    *由 common/ann_activation_functions.py 中的源代码生成*


    Leaky ReLU 函数与 ReLU 函数类似，但它解决了“死亡 ReLU”问题。通过为负输入值引入一个小的负斜率，Leaky ReLU 函数可以防止神经元死亡，并提高网络的性能。


    在某些情况下，特别是在神经网络中，它已被证明优于 ReLU 函数。然而，激活函数的选择取决于具体的任务和手头的数据，确定特定问题的最佳激活函数通常需要通过试验和错误来确定。


    ## 7.4.2.6. 高斯函数


    高斯函数在许多领域被广泛使用，正如我们在第 5.8.2 节的高斯模糊和第 7.3.1 节的支持向量机核函数中所介绍的那样。

    高斯函数定义为：

    $$g(z) = e^{-z^2}$$

    其导数函数定义为：

    $$g''(z) = -2ze^{-z^2}$$

    它也是一个非线性函数，如图 7.35 所示，


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_264_0.png)


    图 7.35 高斯函数及其导数

    *由 common/ann_activation_functions.py 中的源代码生成*


    这是一个一维高斯函数，第 7.3.1 节中的图 7.21 展示了一个二维高斯函数。

    OpenCV 支持高斯函数作为人工神经网络的激活函数，它也被广泛用于许多领域，包括物理学、化学、工程学和金融学，因为它准确地模拟了许多呈现钟形分布的自然现象和过程。'

    In conclusion, compared with traditional machine learning algorithms like K-means,
    KNN and SVM, ANNs have a number of advantages, including the ability to learn
    non-linear relationships between input and output variables, and the ability to
    handle large and complex datasets. ANNs also allow parallel processing, meaning
    many pieces of information can be processed at the same time, making them highly
    efficient for tasks such as image processing and object detection.


    ANNs have a wide range of applications in various fields, including image recognition
    such as object detection, facial recognition, and autonomous driving. As well
    as many other fields like financial, energy, marketing forecasts, and so on.


    However, ANNs are computationally intensive that need significant computational
    resources, and require significant amounts of data to train which can be costly
    and time-consuming to collect.


    Due to their complex nature, ANNs are lack of transparency and often considered
    as a "black box" because it can be difficult to understand how they arrive at
    their decisions. This can make it challenging to explain their results, which
    can limit their usefulness in certain fields, such as healthcare, where transparency
    and interpretability are crucial.


    # 7.5. Convolutional Neural Network (CNN)


    # 7.5.1. What is a Convolutional Neural Network


    A Convolutional Neural Network (CNN) is a type of deep learning neural network
    that is commonly used for analyzing images and pictures. CNN is designed to automatically
    detect patterns and features in images, making them well-suited for tasks such
    as image recognition, object detection such as faces and eyes, and image segmentation
    such as separating the foregrounds from the backgrounds.


    In the previous section of an artificial neural network (ANN), the handwritten
    digits dataset has images of 28 × 28 pixels, which means there are 784 pixels
    for each image, in order to feed the data into an ANN, the input layer has 784
    nodes to take the input data.


    Now consider a high-resolution 4K color picture that has 3840 × 2160 pixels, meaning
    8 million pixels, and each pixel has three color channels, it’s not realistic'
  - '[PAGE 274]


    to build a neural network to correspond so many input data for each picture, let
    alone tens of thousands of pictures are needed to process.


    When human look at a picture we do not scan the pixels one by one from top-left
    towards bottom-right, instead we look at the features or objects in the picture.
    For example, in a picture of a dog, we look at things like eyes, nose, mouth,
    ears, head, body and tails, then we know it’s a dog. And in most cases, we ignore
    the background or colors to identify the dog. CNNs do it in a similar way to find
    “features” from the images, the features are things like eyes, nose, mouth etc.
    Then send these features to a neural network to learn.


    The basic building block of a CNN is the convolutional layer, which performs a
    mathematical operation called *convolution* on the input image. This operation
    involves sliding a small filter, also called a *kernel* or a *feature detector*,
    across the image and computing the dot product between the filter weights and
    the corresponding pixel values in the image. The output of this operation is a
    *feature map* that highlights the areas of the image that match the filter''s
    pattern.


    CNN typically also includes other types of layers known as pooling layers, and
    fully connected layers. Pooling layers down-sample the feature maps by reducing
    their size, and fully connected layers connect the output to an ANN, allowing
    the CNN to learn complex relationships between features.


    See materials #15 and #16 in References at the end of this book for some detailed
    descriptions of CNN.


    # 7.5.2. Convolution Layer


    Source: ConvolutionalNeuralNetwork.py


    Convolution is a mathematical operation that is commonly used in signal and image
    processing. In CNNs, convolution is used in the convolutional layers to extract
    features from input images.


    In mathematics convolution is an operation on two functions, *f* and *g*, to produce
    a third function (*f* ∗ *g*), that represents how the shape of one is modified
    by the other. It’s defined as:


    $(f * g)(t) = \int_{-\infty}^{\infty} f(\tau)g(t - \tau)d\tau$'
  - '[PAGE 275]


    We are not going to deep-dive into the mathematical details here, the basic idea
    is to consider one function as the original image, and the other function as a
    feature, the convolution operation is to identify or extract the features from
    the original image.


    For example, there is a 1D array:


    $f = [1, 2, 1]$


    And there is another 1D array:


    $g = [3, 0, 2, 4, 2, 1]$


    The convolution of $f * g$ is defined as the integral of one array sweeping over
    the second and multiplied at each position of overlapping. Say, we want to detect
    a pattern of $[2, 4, 2]$ from $g$, then choose a feature $f = [1, 2, 1]$, and
    do a convolution operation.


    The convolution is to use $f$ to sweep over $g$ from left to right, and perform
    the dot product on the covered items, the dot product means the sum of the products
    of the corresponding items under the covered items. So the first item of the result
    is calculated as:


    $1 \times 3 + 2 \times 0 + 1 \times 2 = 5$


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_275_0.png)


    Then $f$ is shifted towards right by one item and calculate the sum of products
    for the second item:


    $1 \times 0 + 2 \times 2 + 1 \times 4 = 8$


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_275_1.png)


    And then $f$ is shifted again towards right one item by one item, and calculate
    the rest items,


    $1 \times 2 + 2 \times 4 + 1 \times 2 = 12$'
- md: "## Padding and Stride\n\nIn the above example, suppose the original image size\
    \ is $i_h \\times i_w$, and the feature/kernel size is $k_h \\times k_w$, then\
    \ the size of convolution output is $( i_h - k_h + 1 ) \\times ( i_w - k_w + 1\
    \ )$. In the above example, the image size is $7 \\times 7$, the kernel size is\
    \ $3 \\times 3$, and the size of the output is:\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_278_0.png)\n\
    \nPadding and stride are techniques of convolution to control the size of the\
    \ outputs. The convolution might lose some information if the features appear\
    \ at the boundary or corners of the image, although it depends on the kernel size,\
    \ a larger kernel might lose more information.\n\n**Padding** is used to resolve\
    \ this kind of problem by adding some rows to the top and bottom of the image,\
    \ and adding some columns to the left and right as well. In general, add $p_h$\
    \ rows to the image, half on the top and half on the bottom; and add $p_w$ columns\
    \ half on left and half on right, all padding rows and columns have value of 0.\
    \ As shown in Figure 7.41:\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_278_1.png)\n\
    \nFigure 7.41 Padding for Convolution\n\nThen the convolution is performed on\
    \ the padded matrix, and the size of the output will be:\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_278_2.png)\n\
    \nIn most cases, choose $p_h = k_h - 1$ and $p_w = k_w - 1$, and the kernel size\
    \ is an odd number, like 3, 5, 7, 9 and so on. Then the same number of paddings\
    \ will be added to the top and bottom, and same for left and right. In the above\
    \ example, kernel size is $3 \\times 3$, the padding size is $2 \\times 2$ meaning\
    \ one on top, one on bottom, one on left and one on right.\n\nAs a result, the\
    \ convolution output is in the size of $7 \\times 7$, which is the same as the\
    \ original image size.\n\n**Stride** is another technique of convolution. When\
    \ the feature/kernel slides over the input image in the above example, it starts\
    \ from the upper-left corner and moves to the right by one element at a time by\
    \ default, and after it reaches the very right, it moves down by one element by\
    \ default. The stride is the number of elements the feature/kernel traverses on\
    \ each move, in this case the stride is 1 by default.\n\nSometimes the feature/kernel\
    \ will traverse more than one element, for example, two or three elements on each\
    \ move, then the stride is 2 or 3.\nFigure 7.42 shows the convolution with stride=2.\n\
    \n![](img/b99f6edaf6f730ad313ce66bc5a26be2_279_0.png)\n\nIn general, if the stride\
    \ is $s_w$ in the horizontal direction, and $s_h$ in the vertical direction, then\
    \ the convolution output size is:\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_279_1.png)\n\
    \nIn most cases, the padding is selected as $p_h = k_h - 1$ and $p_w = k_w - 1$,\
    \ then the output size is:\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_279_2.png)\n\
    \nThe purpose of stride is to reduce the size of the original image for computational\
    \ efficiency while keeping the features of the original image. In Figure 7.42\
    \ the Π shape can also be captured in the convolution result, the value of 61\
    \ is still in the middle of the result, which is significantly larger than other\
    \ values. Most often it is used when the feature/kernel is large because it captures\
    \ a large area of the original image.\n\n## Python Implementation of the Convolution\n\
    \nIn Python, the convolution is implemented by below code snippets:\n\n```python\n\
    import numpy as np\ndef convolution2d(image, kernel,\n                stride=[1,1],\
    \ padding=[0,0]):\n    p_h, p_w = padding\n    s_h, s_w = stride\n    image =\
    \ np.pad(image,\n                   [(p_h, p_h), (p_w, p_w)],\n              \
    \     mode='constant',\n                   constant_values=0)\n    k_h, k_w =\
    \ kernel.shape\n    i_h, i_w = image.shape\n    output_h = (i_h - k_h) // s_h\
    \ + 1\n    output_w = (i_w - k_w) // s_w + 1\n    output = np.zeros((output_h,\
    \ output_w))\n    for y in range(0, output_h):\n        for x in range(0, output_w):\n\
    \            c = image[y*s_h : y*s_h+k_h,\n                     x*s_w : x*s_w+k_w]\n\
    \            c = np.multiply(c, kernel)\n            output[y][x] = np.sum(c)\n\
    \    return output\n```\n\nThe above example of no padding can be calculated:\n\
    \n```python\nimage = np.array([[1, 3, 1, 0, 2, 1 ,0],\n                  [1, 1,\
    \ 1, 2, 1, 2 ,1],\n                  [2, 1, 9, 9, 8, 2 ,0],\n                \
    \  [0, 2, 9, 1, 9, 0 ,1],\n                  [1, 0, 9, 0, 8, 2 ,1],\n        \
    \          [3, 1, 1, 2, 0, 2 ,2],\n                  [1, 3, 1, 3, 3, 2 ,0]])\n\
    kernel = np.array([[1, 1, 1],\n                  [1, 0, 1],\n                \
    \  [1, 0, 1]])\nconv2d = convolution2d(image, kernel)\nprint(conv2d)\n```\n\n\
    The convolution results are:\n\n```\n[[18. 17. 22. 18. 13.]\n [23. 17. 39. 17.\
    \ 22.]\n [31. 22. 61. 22. 29.]\n [25. 15. 37. 16. 21.]\n [16. 18. 22. 19. 16.]]\n\
    ```\n\nThe above example of padding=2 can be calculated:\n\n```python\nconv2d\
    \ = convolution2d(image, kernel,\n                      padding=[1,1])\nprint(conv2d)\n\
    ```\n\nThe results are:\n\n```\n[[ 4.  4.  6.  5.  5.  4.  3.]\n```"
  mdcn: "## 填充与步幅\n\n在上面的例子中，假设原始图像尺寸为 $i_h \\times i_w$，特征/卷积核尺寸为 $k_h \\times k_w$，那么卷积输出的尺寸为\
    \ $( i_h - k_h + 1 ) \\times ( i_w - k_w + 1 )$。在上面的例子中，图像尺寸为 $7 \\times 7$，卷积核尺寸为\
    \ $3 \\times 3$，输出尺寸为：\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_278_0.png)\n\
    \n填充和步幅是卷积中用于控制输出尺寸的技术。如果特征出现在图像的边界或角落，卷积可能会丢失一些信息，尽管这取决于卷积核的大小，较大的卷积核可能会丢失更多信息。\n\
    \n**填充**用于解决这类问题，方法是在图像的顶部和底部添加一些行，并在左侧和右侧添加一些列。通常，在图像上添加 $p_h$ 行，一半在顶部，一半在底部；并添加\
    \ $p_w$ 列，一半在左侧，一半在右侧，所有填充的行和列的值均为 0。如图 7.41 所示：\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_278_1.png)\n\
    \n图 7.41 卷积填充\n\n然后在填充后的矩阵上执行卷积，输出尺寸将为：\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_278_2.png)\n\
    \n在大多数情况下，选择 $p_h = k_h - 1$ 和 $p_w = k_w - 1$，并且卷积核尺寸为奇数，如 3、5、7、9 等。这样，顶部和底部将添加相同数量的填充，左侧和右侧也是如此。在上面的例子中，卷积核尺寸为\
    \ $3 \\times 3$，填充尺寸为 $2 \\times 2$，意味着顶部一个，底部一个，左侧一个，右侧一个。\n\n因此，卷积输出的尺寸为 $7\
    \ \\times 7$，与原始图像尺寸相同。\n\n**步幅**是卷积的另一种技术。当特征/卷积核在上面的例子中滑过输入图像时，它默认从左上角开始，每次向右移动一个元素，到达最右侧后，默认向下移动一个元素。步幅是特征/卷积核每次移动时遍历的元素数量，在这种情况下，默认步幅为\
    \ 1。\n\n有时特征/卷积核每次移动会遍历多个元素，例如两个或三个元素，那么步幅就是 2 或 3。\n图 7.42 展示了步幅为 2 的卷积。\n\n\
    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_279_0.png)\n\n通常，如果水平方向的步幅为 $s_w$，垂直方向的步幅为\
    \ $s_h$，那么卷积输出尺寸为：\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_279_1.png)\n\n\
    在大多数情况下，填充选择为 $p_h = k_h - 1$ 和 $p_w = k_w - 1$，那么输出尺寸为：\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_279_2.png)\n\
    \n步幅的目的是在保持原始图像特征的同时，减小原始图像的尺寸以提高计算效率。在图 7.42 中，Π 形状也可以在卷积结果中被捕获，值 61 仍然位于结果的中间，明显大于其他值。最常在特征/卷积核较大时使用，因为它捕获了原始图像的大片区域。\n\
    \n## 卷积的 Python 实现\n\n在 Python 中，卷积通过以下代码片段实现：\n\n```python\nimport numpy as np\n\
    def convolution2d(image, kernel,\n                stride=[1,1], padding=[0,0]):\n\
    \    p_h, p_w = padding\n    s_h, s_w = stride\n    image = np.pad(image,\n  \
    \                 [(p_h, p_h), (p_w, p_w)],\n                   mode='constant',\n\
    \                   constant_values=0)\n    k_h, k_w = kernel.shape\n    i_h,\
    \ i_w = image.shape\n    output_h = (i_h - k_h) // s_h + 1\n    output_w = (i_w\

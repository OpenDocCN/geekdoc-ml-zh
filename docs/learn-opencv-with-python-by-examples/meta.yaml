  md: 'include the functions and write codes to instantiate the classes and invoke
    those functions.


    Section 5.3 will explain how to adjust the Brightness and Contrast, and section
    5.4 to adjust Hue, Saturation and Value of the images. By adjusting these values,
    the color and brightness of the images can be changed accordingly, this is a very
    important part of image processing.


    Section 5.5 will introduce image blending which is to mix two images based on
    an algorithm. And Section 5.6 will introduce the bitwise operation and blending
    or mixing two images based on the bitwise operation, which can achieve a different
    effect.


    Section 5.7 will describe image warping, a method to transform a skewed and distorted
    image into a straightened one.


    Section 5.8 will introduce image blurring, it’s a technique to make the image
    smooth by removing the noises from the image. There are many different ways to
    do it, this section will focus on two types of image blurring methods, Gaussian
    Blur and Median Blur.


    Lastly, section 5.9 will introduce the histogram which gives us important information
    about the color distributions of the images.


    Enjoy the Image Processing with OpenCV and Python.



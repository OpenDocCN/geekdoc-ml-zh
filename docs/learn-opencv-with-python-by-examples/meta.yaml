    Blurring an image is a common image processing technique used to reduce noises,
    smooth out edges, and simplify the image. This section will introduce two types
    of image blurring techniques, Gaussian Blur and Median Blur.


    # 5.8.1. What is Gaussian Blur


    Gaussian Blur is a widely used effect for image processing and is available in
    many image-editing software. Basically it reduces noises and hides details of
    the image, and makes the image smoothing.

    Figure 5.21 shows what it looks like, the left one is the original image, and
    the right one is a Gaussian blurred image. By changing the Kernel size, the level
    of blurring will be changed.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_117_0.png)


    Let’s take a close look at how the Gaussian blur works, notice the small area
    highlighted by a white square pointed by a white arrow in Figure 5.21 above. Now
    zoom in this area and show the details in pixel level, as shown in Figure 5.22,
    this square is 9 by 9 pixels. Apply a Gaussian blur on this 9 × 9 area, we get
    the right-side image in Figure 5.22, the edge of the flower becomes blurred. The
    size of this area is called *kernel size*, in this example the area is a square
    of 9 × 9 pixels, then its kernel size is 9. It doesn’t have to be a square, it
    could be a rectangle, say 5 × 9 pixels. However, the kernel size must be odd numbers.

    This small area is called *filter*, the Gaussian filter will be applied throughout
    the entire image starting from the top-left corner, moving from left towards right
    and'
  merge: -1
  pgno: 117
- img_proc: true
  md: 'from top towards down until the bottom-right corner, in another word the filter
    swept over the whole image, this is the image blurring process.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_118_0.png)


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_118_1.png)


    Figure 5.22 Gaussian Blur in Detailed Pixels'' Level


    Now, let’s look at how the Gaussian function works, in other words how the filter
    is calculated and applied to the area.


    Gaussian filter does not simply calculate the average value of the area, in this
    case the 9 × 9 area. Instead, it calculates a weighted average of the value for
    this area, the pixels near the center get more weights, and the pixels far away
    from the center get less weights. And the calculation is done on a channel-by-channel
    basis, which means it calculates the blue, green and red channels respectively.


    Let’s dig a little deeper and see how the Gaussian function works, this is the
    formula in one dimension:


    ```

    $$p(x) = \frac{1}{\sigma\sqrt{2\pi}} e^{-\frac{x^2}{2\sigma^2}}$$

    ```


    However, a pixel is determined by $x$ and $y$ coordinates in an image, so the
    two-dimensional Gaussian formula should be used for image processing, it’s shown
    as Figure 5.23.'

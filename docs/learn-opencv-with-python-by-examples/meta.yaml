    # 6.8.1. Remove Background by Color


    | Source: | RemoveBackgroundByColor.py |

    | :--- | :--- |

    | Library: | common/ImageProcessing.py |


    The background of the image can be identified and removed based on the colors,
    if the color of the foreground of an image is significantly different from that
    of the background, it’s worthwhile to try this method.

    Let’s take a look at the image shown in Figure 6.26, the color of the flower looks
    significantly different from the background.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_173_0.png)


    Figure 6.26 Remove Background by Color


    Section 6.4 has introduced the method to detect colors by adjusting the hue, saturation
    and value. We can use the same technique to create a mask and apply it to the
    original image to remove the background.

    The first step is to convert the image into HSV color space, then find the lower
    and upper thresholds of the hue, saturation and value. Then the mask is created
    using cv2.inRage() function.'

- md: "## 7.3.2.4. (Optional) Show the Results\n\nThe random results and erroneously\
    \ predicted results can be displayed optionally, the same as in section 7.2.3.6.\
    \ Please execute the source codes at *SVMHandWrittenDigits.py* to observe the\
    \ results.\n\n## 7.3.3. IRIS Dataset Classification\n\nSource: SVMIrisClassification.py\n\
    \n### 7.3.3.1. About IRIS Dataset\n\nIRIS dataset is another well-known and widely\
    \ used multivariate dataset in machine learning and statistics, it’s a collection\
    \ of 150 samples of iris flowers, with each sample containing four features: sepal\
    \ length, sepal width, petal length, and petal width. It includes three species\
    \ of iris flower -- Versicolour, Setosa and Virginica, 50 sample data for each\
    \ species.\n\nThe Iris dataset has become a popular benchmark dataset in machine\
    \ learning and statistics due to its simplicity, small size, and well-defined\
    \ classification problem.\n\nIt’s quite simple to load the IRIS dataset,\n\n```\n\
    1 from sklearn import datasets\n2 iris = datasets.load_iris()\n3 print (\"Data\
    \ Structure:\", dir(iris))\n4 print (\"Description:\\n\", iris.DESCR)\n5 print\
    \ (\"Data (first 10):\\n\",iris.data[0:10])\n6 print (\"Label:\\n\", iris.target)\n\
    7 print (\"Label Name:\", iris.target_names)\n8 print (\"Unique Label:\", np.unique(iris.target))\n\
    9 print (\"Feature:\", iris.feature_names)\n```\n\nLine 1 is to import sklearn\
    \ library and line 2 is to load the IRIS dataset. There are several attributes\
    \ that come with the dataset which include detailed information about the dataset.\
    \ You can optionally print them out as line 3 to 9 in the above codes. The description\
    \ of this dataset is in `iris.DESCR` attribute. The data itself is in `iris.data`;\
    \ the label is encoded in `iris.target` with values of 0, 1 and 2, which corresponds\
    \ to the three iris species. The names of the three species are in the `iris.target_names`.\
    \ And the names of the features of this dataset are in `iris.feature_names`.\n\
    \nThe IRIS dataset isn't a big dataset, it includes the following four features\
    \ and one label:\n\n- 1. sepal length in cm (feature)\n- 2. sepal width in cm\
    \ (feature)\n- 3. petal length in cm (feature)\n- 4. petal width in cm (feature)\n\
    - 5. species (label)\n\nThis dataset is about the measurements in centimeters\
    \ of the sepal length, sepal width, petal length and petal width of the three\
    \ iris species, 50 sample data for each, total 150 data items. It looks something\
    \ like the below table,\n\n| Sepal.Length | Sepal.Width | Petal.Length | Petal.Width\
    \ | Species |\n| :--- | :--- | :--- | :--- | :--- |\n| 5.1 | 3.5 | 1.4 | 0.2 |\
    \ *setosa* |\n| 4.9 | 3 | 1.4 | 0.2 | *setosa* |\n| 4.7 | 3.2 | 1.3 | 0.2 | *setosa*\
    \ |\n| ... | ... | ... | ... | *setosa* |\n| 7 | 3.2 | 4.7 | 1.4 | *versicolor*\
    \ |\n| 6.4 | 3.2 | 4.5 | 1.5 | *versicolor* |\n| 6.9 | 3.1 | 4.9 | 1.5 | *versicolor*\
    \ |\n| ... | ... | ... | ... | *versicolor* |\n| 6.3 | 3.3 | 6 | 2.5 | *virginica*\
    \ |\n| 5.8 | 2.7 | 5.1 | 1.9 | *virginica* |\n| 7.1 | 3 | 5.9 | 2.1 | *virginica*\
    \ |\n| ... | ... | ... | ... | *virginica* |\n\nThe dataset is often used for\
    \ classification tasks, where the goal is to predict the species of the iris flower\
    \ based on the four features.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_248_0.png)\n\
    \nFigure 7.24 IRIS Dataset Sepal Length vs Width\n\nAfter the IRIS dataset is\
    \ loaded, it can be visualized as Figure 7.24 and Figure 7.25:\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_248_1.png)\n\
    \nFigure 7.25 IRIS Dataset Petal Length vs Width\n\n### 7.3.3.2. Pre-processing\n\
    \nAfter the data is loaded, it should be split into training and testing sets.\
    \ The datatype must also be converted to `float32` as required by the OpenCV SVM\
    \ model.\n\n```\n11  data = iris.data.astype(np.float32)\n12  label = iris.target.astype(np.int32)\n\
    13  X_train, X_test, y_train, y_test =\n14      model_selection.train_test_split(\n\
    15          data, label,\n16          test_size=0.2,\n17          random_state=2)\n\
    18  print('X_train: ' + str(X_train.shape))\n19  print('y_train: ' + str(y_train.shape))\n\
    20  print('X_test:  ' + str(X_test.shape))\n21  print('y_test:  ' + str(y_test.shape))\n\
    ```\n\nExplanations:\n\n| Line | Description |\n| :--- | :--- |\n| Line 11 | Get\
    \ the data from `iris.data` attribute and convert it into `float32` datatype.\
    \ |\n| Line 12 | Get the label from `iris.target` attribute, and convert it into\
    \ `int32`. |\n| Line 13 – 16 | Split the data and label into training and testing\
    \ sets. Specify `test_size=0.2` meaning 80% training set and 20% testing set,\
    \ and specify `random_state` as an integer to ensure the same splitting results\
    \ for every execution. |\n| Line 17 - 20 | (Optional) print out the size of each\
    \ data set. |\n\nThe dataset is split as:\nX_train: (120, 4)\ny_train: (120,)\n\
    X_test: (30, 4)\ny_test: (30,)\n\n### 7.3.3.3. Build, Train and Predict the model\n\
    \nSame as previous section 7.3.2, a new SVM model is created, and trained with\
    \ training set. The IRIS dataset is small, it will not take much time for the\
    \ training. After it is trained, the testing set is used to make predictions.\n\
    \n```\n21  svm = cv2.ml.SVM_create()\n\n22  svm.setKernel(cv2.ml.SVM_LINEAR)\n\
    \n23  svm.setTermCriteria(\n        (cv2.TERM_CRITERIA_MAX_ITER, 100, 1e-6))\n\
    \n24  svm.train(X_train, cv2.ml.ROW_SAMPLE, y_train)\n\n25  predict = svm.predict(X_test)\n\
    ```\n\n### 7.3.3.4. Post-processing and Evaluation\n\nSame as previous sections\
    \ 7.3.2.3 and 7.3.2.4, the predict returned from svm.predict() function has the\
    \ result data in a “vertical” array, it has to be converted to a “horizontal”\
    \ one using np.hstack() function. And then print out the evaluation metrics:\n\
    \n```\n26  results = np.uint(predict[1])\n\n27  results = np.hstack(results)\n\
    \n28  print(\"Accuracy Score:\",\n        accuracy_score(y_test, results))\n\n\
    29  print(\"\\nConfusion Matrix:\\n\",\n        confusion_matrix(y_test, results))\n\
    \n30  print(\"\\nClassification Report:\\n\",\n\n31        classification_report(y_test,\
    \ results))\n```\n\nThe results are shown as below, we get an accuracy of 100%:\n\
    \n```\nAccuracy Score: 1.0\n\nConfusion Matrix:\n[[14  0  0]\n [ 0 18  0]\n [\
    \ 0  0 13]]\n\nClassification Report:\n            precision    recall  f1-score\
    \   support\n\n           0       1.00      1.00      1.00        14\n       \
    \    1       1.00      1.00      1.00        18\n           2       1.00     \
    \ 1.00      1.00        13\n\n    accuracy                           1.00    \
    \    45\n   macro avg       1.00      1.00      1.00        45\nweighted avg \
    \      1.00      1.00      1.00        45\n```\n\nIn conclusion, SVMs have several\
    \ advantages over other machine learning algorithms. They are computationally\
    \ efficient, particularly in high-dimensional feature spaces, and can handle large\
    \ datasets. They are also robust to noisy data and outliers and have a strong\
    \ theoretical foundation, which guarantees good generalization performance.\n\n\
    However, SVMs also have some limitations. They can be sensitive to the choice\
    \ of kernel function and its parameters, which can affect the performance of the\
    \ algorithm. Additionally, SVMs can be difficult to interpret and understand,\
    \ particularly when using non-linear kernel functions.\n\n## 7.4. Artificial Neural\
    \ Network (ANN)\n\n### 7.4.1. What is an Artificial Neural Network (ANN)?\n\n\
    Artificial Neural Network (ANN) is one of the algorithms for machine learning,\
    \ which tries to learn things in the same or similar way as human. ANN is designed\
    \ to mimic the structure and function of the human biological brain, specifically\
    \ the way that neurons process and transmit information.\n\nNeurons are the basic\
    \ building blocks of the human brain and nervous system. They are specialized\
    \ cells that are responsible for processing and transmitting information. The\
    \ basic structure of a neuron consists of three parts: the *cell body*, *dendrites*,\
    \ and an *axon*, as shown in Figure 7.26:\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_252_0.png)\n\
    \nFigure 7.26 Neurons of Human Brain\nImage by OpenClipart-Vectors from Pixabay,\
    \ at https://pixabay.com/vectors/brain-neuron-nerves-cell-science-2022398/\n\n\
    The transmission of information between neurons is accomplished through electrical\
    \ and chemical signals. The dendrites receive input signals from other neurons\
    \ or sensory receptors, the cell body processes the signals, and then the axon\
    \ transmits output to other neurons or to muscles or glands via the axon terminals.\
    \ There are billions of neurons in the human brain becoming neural networks to\
    \ perform the functions.\n\nArtificial Neural Networks (ANNs) are designed to\
    \ mimic the biological structure and function of the human brain. Just like the\
    \ human brain, ANNs consist of interconnected artificial neurons that process\
    \ and transmit information with simplified mathematical models.\n\nOne of the\
    \ key features of the biological brain is its ability to learn and adapt through\
    \ experiences. ANNs also have the ability to learn from data and improve their\
    \ performance over time. This is achieved through the training process, in which\
    \ the network is presented with a set of input data and corresponding output data,\
    \ and adjusts its parameters to minimize the difference between its predicted\
    \ output and the actual output.\n\nThe human brain is composed of multiple layers\
    \ of interconnected neurons, and ANNs also consist of layers of interconnected\
    \ *artificial neurons*. These layers can be designed to perform specific functions,\
    \ such as processing visual information or processing sequential data.\n\nEach\
    \ artificial neuron receives input from other neurons and performs a set of mathematical\
    \ calculations on the input. The output of the neuron is then transmitted to other\
    \ neurons in the network."
  mdcn: "## 7.3.2.4. （可选）显示结果\n\n可以像第 7.2.3.6 节一样，选择性地显示随机结果和错误预测的结果。请执行 *SVMHandWrittenDigits.py*\
    \ 中的源代码以观察结果。\n\n## 7.3.3. IRIS 数据集分类\n\n源代码：SVMIrisClassification.py\n\n### 7.3.3.1.\
    \ 关于 IRIS 数据集\n\nIRIS 数据集是机器学习和统计学中另一个著名且广泛使用的多变量数据集，它收集了 150 个鸢尾花样本，每个样本包含四个特征：花萼长度、花萼宽度、花瓣长度和花瓣宽度。它包括三种鸢尾花品种——变色鸢尾、山鸢尾和维吉尼亚鸢尾，每个品种有\
    \ 50 个样本数据。\n\n由于其简单性、小规模和明确的分类问题，Iris 数据集已成为机器学习和统计学中流行的基准数据集。\n\n加载 IRIS 数据集非常简单，\n\
    \n```\n1 from sklearn import datasets\n2 iris = datasets.load_iris()\n3 print\
    \ (\"Data Structure:\", dir(iris))\n4 print (\"Description:\\n\", iris.DESCR)\n\
    5 print (\"Data (first 10):\\n\",iris.data[0:10])\n6 print (\"Label:\\n\", iris.target)\n\
    7 print (\"Label Name:\", iris.target_names)\n8 print (\"Unique Label:\", np.unique(iris.target))\n\
    9 print (\"Feature:\", iris.feature_names)\n```\n\n第 1 行是导入 sklearn 库，第 2 行是加载\
    \ IRIS 数据集。该数据集附带几个属性，包含有关数据集的详细信息。你可以选择性地打印它们，如上面代码中的第 3 到 9 行。该数据集的描述在 `iris.DESCR`\
    \ 属性中。数据本身在 `iris.data` 中；标签编码在 `iris.target` 中，值为 0、1 和 2，对应三种鸢尾花品种。三种品种的名称在\
    \ `iris.target_names` 中。该数据集特征的名称在 `iris.feature_names` 中。\n\nIRIS 数据集不是一个大数据集，它包含以下四个特征和一个标签：\n\
    \n- 1. 花萼长度，单位：厘米（特征）\n- 2. 花萼宽度，单位：厘米（特征）\n- 3. 花瓣长度，单位：厘米（特征）\n- 4. 花瓣宽度，单位：厘米（特征）\n\
    - 5. 品种（标签）\n\n该数据集是关于三种鸢尾花品种的花萼长度、花萼宽度、花瓣长度和花瓣宽度的厘米测量值，每个品种 50 个样本数据，总共 150 个数据项。它看起来类似于下表，\n\
    \n| Sepal.Length | Sepal.Width | Petal.Length | Petal.Width | Species |\n| :---\
    \ | :--- | :--- | :--- | :--- |\n| 5.1 | 3.5 | 1.4 | 0.2 | *setosa* |\n| 4.9 |\
    \ 3 | 1.4 | 0.2 | *setosa* |\n| 4.7 | 3.2 | 1.3 | 0.2 | *setosa* |\n| ... | ...\
    \ | ... | ... | *setosa* |\n| 7 | 3.2 | 4.7 | 1.4 | *versicolor* |\n| 6.4 | 3.2\
    \ | 4.5 | 1.5 | *versicolor* |\n| 6.9 | 3.1 | 4.9 | 1.5 | *versicolor* |\n| ...\
    \ | ... | ... | ... | *versicolor* |\n| 6.3 | 3.3 | 6 | 2.5 | *virginica* |\n\
    | 5.8 | 2.7 | 5.1 | 1.9 | *virginica* |\n| 7.1 | 3 | 5.9 | 2.1 | *virginica* |\n\
    | ... | ... | ... | ... | *virginica* |\n\n该数据集通常用于分类任务，目标是根据四个特征预测鸢尾花的品种。\n\n\
    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_248_0.png)\n\n图 7.24 IRIS 数据集花萼长度与宽度\n\
    \n加载 IRIS 数据集后，可以可视化为图 7.24 和图 7.25：\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_248_1.png)\n\
    \n图 7.25 IRIS 数据集花瓣长度与宽度\n\n### 7.3.3.2. 预处理\n\n数据加载后，应将其拆分为训练集和测试集。数据类型也必须按照\
    \ OpenCV SVM 模型的要求转换为 `float32`。\n\n```\n11  data = iris.data.astype(np.float32)\n\
    12  label = iris.target.astype(np.int32)\n13  X_train, X_test, y_train, y_test\
    \ =\n14      model_selection.train_test_split(\n15          data, label,\n16 \
    \         test_size=0.2,\n17          random_state=2)\n18  print('X_train: ' +\
    \ str(X_train.shape))\n19  print('y_train: ' + str(y_train.shape))\n20  print('X_test:\
    \  ' + str(X_test.shape))\n21  print('y_test:  ' + str(y_test.shape))\n```\n\n\
    说明：\n\n| 行 | 描述 |\n| :--- | :--- |\n| 第 11 行 | 从 `iris.data` 属性获取数据并将其转换为 `float32`\
    \ 数据类型。 |\n| 第 12 行 | 从 `iris.target` 属性获取标签，并将其转换为 `int32`。 |\n| 第 13 – 16 行\
    \ | 将数据和标签拆分为训练集和测试集。指定 `test_size=0.2` 表示 80% 训练集和 20% 测试集，并指定 `random_state`\
    \ 为一个整数以确保每次执行的拆分结果相同。 |\n| 第 17 - 20 行 | （可选）打印每个数据集的大小。 |\n\n数据集拆分如下：\nX_train:\
    \ (120, 4)\ny_train: (120,)\nX_test: (30, 4)\ny_test: (30,)\n\n### 7.3.3.3. 构建、训练和预测模型\n\
    \n与上一节 7.3.2 相同，创建一个新的 SVM 模型，并使用训练集进行训练。IRIS 数据集很小，训练不会花费太多时间。训练完成后，使用测试集进行预测。\n\
    \n```\n21  svm = cv2.ml.SVM_create()\n\n22  svm.setKernel(cv2.ml.SVM_LINEAR)\n\
    \n23  svm.setTermCriteria(\n        (cv2.TERM_CRITERIA_MAX_ITER, 100, 1e-6))\n\
    \n24  svm.train(X_train, cv2.ml.ROW_SAMPLE, y_train)\n\n25  predict = svm.predict(X_test)\n\
    ```\n\n### 7.3.3.4. 后处理和评估\n\n与之前的第 7.3.2.3 和 7.3.2.4 节相同，svm.predict() 函数返回的预测结果数据在一个“垂直”数组中，必须使用\
    \ np.hstack() 函数将其转换为“水平”数组。然后打印评估指标：\n\n```\n26  results = np.uint(predict[1])\n\
    \n27  results = np.hstack(results)\n\n28  print(\"Accuracy Score:\",\n       \
    \ accuracy_score(y_test, results))\n\n29  print(\"\\nConfusion Matrix:\\n\",\n\
    \        confusion_matrix(y_test, results))\n\n30  print(\"\\nClassification Report:\\\
    n\",\n\n31        classification_report(y_test, results))\n```\n\n结果显示如下，我们获得了\
    \ 100% 的准确率：\n\n```\nAccuracy Score: 1.0\n\nConfusion Matrix:\n[[14  0  0]\n [\
    \ 0 18  0]\n [ 0  0 13]]\n\nClassification Report:\n            precision    recall\
    \  f1-score   support\n\n           0       1.00      1.00      1.00        14\n\
    \           1       1.00      1.00      1.00        18\n           2       1.00\
    \      1.00      1.00        13\n\n    accuracy                           1.00\
    \        45\n   macro avg       1.00      1.00      1.00        45\nweighted avg\
    \       1.00      1.00      1.00        45\n```\n\n总之，SVM 相对于其他机器学习算法有几个优点。它们计算效率高，特别是在高维特征空间中，并且可以处理大型数据集。它们对噪声数据和异常值也具有鲁棒性，并且具有坚实的理论基础，这保证了良好的泛化性能。\n\
    \n然而，SVM 也有一些局限性。它们可能对核函数及其参数的选择敏感，这会影响算法的性能。此外，SVM 可能难以解释和理解，特别是在使用非线性核函数时。\n\
    \n## 7.4. 人工神经网络 (ANN)\n\n### 7.4.1. 什么是人工神经网络 (ANN)？\n\n人工神经网络 (ANN) 是机器学习的算法之一，它试图以与人类相同或相似的方式学习事物。ANN\
    \ 旨在模拟人类生物大脑的结构和功能，特别是神经元处理和传递信息的方式。\n\n神经元是人类大脑和神经系统的基本构建块。它们是负责处理和传递信息的特化细胞。神经元的基本结构由三部分组成：*细胞体*、*树突*和*轴突*，如图\
    \ 7.26 所示：\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_252_0.png)\n\n图 7.26 人脑神经元\n\
    图片由 OpenClipart-Vectors 提供，来自 Pixabay，网址为 https://pixabay.com/vectors/brain-neuron-nerves-cell-science-2022398/\n\
    \n神经元之间的信息传递是通过电信号和化学信号完成的。树突接收来自其他神经元或感觉受体的输入信号，细胞体处理信号，然后轴突通过轴突末梢将输出传递给其他神经元或肌肉或腺体。人脑中有数十亿个神经元形成神经网络来执行功能。\n\
    \n人工神经网络 (ANN) 旨在模拟人脑的生物结构和功能。就像人脑一样，ANN 由相互连接的人工神经元组成，这些神经元使用简化的数学模型来处理和传递信息。\n\
    \n生物大脑的一个关键特征是其通过经验学习和适应的能力。ANN 也具有从数据中学习并随时间提高其性能的能力。这是通过训练过程实现的，在该过程中，网络接收一组输入数据和相应的输出数据，并调整其参数以最小化其预测输出与实际输出之间的差异。\n\
    \n人脑由多层相互连接的神经元组成，ANN 也由相互连接的*人工神经元*层组成。这些层可以设计用于执行特定功能，例如处理视觉信息或处理序列数据。\n\n每个人工神经元接收来自其他神经元的输入，并对输入执行一组数学计算。然后，神经元的输出被传递到网络中的其他神经元。"

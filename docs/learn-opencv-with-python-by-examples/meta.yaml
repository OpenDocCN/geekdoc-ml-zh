- img_proc: true
  md: '![](img/b99f6edaf6f730ad313ce66bc5a26be2_119_0.png)


    Figure 5.23 Two-Dimensional Gaussian Function

    *This is generated by the source codes at common/gaussian.py*


    The two-dimensional Gaussian formula is:


    $$p(x, y) = \frac{1}{\sigma\sqrt{2\pi}} e^{-\frac{x^2+y^2}{2\sigma^2}}$$


    Now imagine the Gaussian filter mentioned above, in our case an area of 9 x 9
    pixels, is overlaying on the vertex of the above plot, the height is the weight
    for calculation. The pixels near the center are more important and then get more
    weights, the pixels near the edge are less important and then get less weights.

    This is a basic idea of how Gaussian blur works in general, although the algorithm
    is not as simple as described above. Fortunately, OpenCV provides a function for
    this purpose, `cv2.GaussianBlur()`, and all the complexities are hidden behind
    the scenes. All we need to do is to call this function and specify the kernel
    size in width and height, which doesn’t have to be the same, but must be odd numbers.'

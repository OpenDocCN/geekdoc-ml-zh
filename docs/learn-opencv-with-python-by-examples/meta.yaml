    | EVENT_MOUSEWHEEL | When a vertical scroll is executed with the mouse wheel.
    |

    | EVENT_RBUTTONDBLCLK | When the right button is double-clicked. |

    | EVENT_RBUTTONDOWN | When the right button is clicked. |

    | EVENT_RBUTTONUP | When the right button is released. |



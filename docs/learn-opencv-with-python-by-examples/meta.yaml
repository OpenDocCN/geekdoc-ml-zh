    size but identify the features.


    The features are part of the learning process of the convolutional neural network
    (CNN), meaning the model will learn by itself during the training, in other words,
    we don’t have to specify the contents of the features, like eyes, nose, ears etc.,
    they will be learned by the CNN model.


    # 7.5.3. Pooling Layer


    The purpose of the pooling layer is to down-sample, or reduce the size while keeping
    the identified features. It is normally applied after the convolution layer. There
    are different types of pooling methods, the most widely used are *max pooling*
    and *average pooling*.


    Similar to the convolution operation, pooling also uses a kernel matrix to sweep
    over the feature maps, instead of doing a dot product, the pooling takes the maximum
    value of the covered area in the feature maps, which is the *max pooling*. In
    the case of *average pooling*, take the average value of the covered area.


    As Figure 7.43, this is a $3 \times 3$ kernel for max pooling, take the maximum
    value from the $3 \times 3$ area covered by the kernel in the upper-left, which
    is 23, this is the first value in the max pooling result.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_282_0.png)


    Figure 7.43 Max Pooling


    In the case of *average pooling*, take the average value of the area covered by
    the kernel as the first value of the result, which is 11.'
  - '[PAGE 283]


    Then slide the kernel to the next position, and find the maximum, or average of
    the covered area. Different from convolution, it will not overlap the already
    covered elements.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_283_0.png)


    Figure 7.44 Max Pooling, Continue


    Finally, the kernel will traverse the entire matrix of the feature map and get
    the result in Figure 7.45.

    The result of the pooling layer significantly reduces the size of the input while
    keeping the features. In Figure 7.45 of the max pooling result, the value in the
    middle is 61, which is the same as that identified by the convolution layer. Say
    this is identified as the nose of the dog, it is kept in the max pooling result.

    Same as convolution, the *Padding* and *Stride* still apply to the pooling layer
    in the same way.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_283_1.png)


    Figure 7.45 Max Pooling Result


    Here is the python implementation of max pooling:


    ```

    41  import numpy as np

    42  def maxpooling2d(image, kernel=[3,3],

    43                  stride=[0,0], padding=[0,0]):

    44      p_h, p_w = padding

    45      s_h, s_w = stride

    46      k_h, k_w = kernel

    47      image = np.pad(image,

    48                     [(p_h, p_h), (p_w, p_w)],

    49                     mode=''constant'',

    50                     constant_values=0)

    51      i_h, i_w = image.shape

    52      output_h = -(-i_h // (k_h + s_h))

    53      output_w = -(-i_w // (k_w + s_w))

    54      output = np.zeros((output_h, output_w))

    55      for y in range(0, output_h):

    56          for x in range(0, output_w):

    ```'

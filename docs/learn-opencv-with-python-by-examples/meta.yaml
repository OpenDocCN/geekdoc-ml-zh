bsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&"
- md: "As shown in Figure 5.1 above, the color image (left) is converted to a grayscale\
    \ one (right).\n\nAs discussed earlier, in OpenCV the default color space for\
    \ an image is BGR, so a color image can be split into three channels of blue,\
    \ green and red, each channel is in grayscale, as shown in Figure 5.2.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_82_0.png)\n\
    \nThe `cv2.split()` function can be used to split a color image into the three\
    \ channels:\n\n```\ndef split_image(image):\n    ch1, ch2, ch3 = cv2.split(image)\n\
    \    return ch1, ch2, ch3\n```\n\nAnd each channel is in grayscale.\n\n## 5.1.2.\
    \ Convert Grayscale to BGR\n\nA grayscale image can also be converted to BGR color\
    \ space, in this case the source is a grayscale image which only has one channel\
    \ and does not have any color information, therefore the result BGR image looks\
    \ the same as the original grayscale one. But the difference is the BGR image\
    \ has three channels although looks the same as the grayscale one, while the original\
    \ gray image only has one channel.\n\nTo convert a grayscale image to BGR, use\
    \ `cv2.cvtColor()` function with `cv2.COLOR_GRAY2BGR` as the second parameter,\n\
    \n```\ndef convert_gray2bgr(image):\n    bgr = cv2.cvtColor(image, cv2.COLOR_GRAY2BGR)\n\
    \    return bgr\n```\n\nFigure 5.3 below shows the idea:\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_83_0.png)\n\
    \nFigure 5.3 Convert Grayscale to BGR\n\nThe left image is the original grayscale\
    \ image, which has only one channel. The right image, however, is in BGR color\
    \ space although looks same as the grayscale one, it can be split into three channels.\n\
    \nSince the right image looks same as the left one, why we should convert it?\
    \ There are several reasons to do it, sometimes in the image processing, some\
    \ operations need to be performed on two or more images, it's important that all\
    \ the images are in the same color space. For example, if we want to blend, or\
    \ mix, two images together, but one is color image and another is grayscale, the\
    \ grayscale one must be converted into BGR before blending them.\n\nSometimes\
    \ when you want to colorize a grayscale image, it must be converted to BGR first,\
    \ then paint colors on different channels, because you are not able to paint colors\
    \ on a single-channel grayscale image.\n\n## 5.1.3. Convert BGR to HSV\n\nAs explained\
    \ in section 3.4, an image can be represented not only in BGR but also in HSV\
    \ color spaces, OpenCV can easily convert the image between BGR and HSV. Like\
    \ converting it to grayscale, the same function `cv2.cvtColor()` is used but the\
    \ second parameter is different, `cv2.COLOR_BGR2HSV` in this case.\n\nThe HSV\
    \ image can also be split into three channels, hue, saturation and value. Then\
    \ each channel can be adjusted to achieve some different effects, later we will\
    \ explain how to adjust each channel to change the image.\n\nBelow code snippets\
    \ are to convert an image to HSV color space:\n\n```\ndef convert_bgr2hsv(image):\n\
    \    hsv = cv2.cvtColor(image, cv2.COLOR_BGR2HSV)\n    return hsv\n```\n\nAs shown\
    \ in Figure 5.4, the color image is converted to HSV color space, and then it\
    \ can be further split into three channels in hue, saturation and value by using\
    \ `cv2.split()` function.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_84_0.png)\n\
    \n## 5.1.4. Convert HSV to BGR\n\nWhen OpenCV displays an image, the function\
    \ `cv2.imshow()` is used and by default in BGR color space. If an image is converted\
    \ to HSV and followed by some image processing operations, it can not be directly\
    \ sent to `cv2.imshow()` for displaying, instead it must be converted back to\
    \ BGR, then sent to `cv2.imshow()` for displaying, otherwise the image will not\
    \ be displayed correctly.\n\nIn last section an image is converted to HSV, and\
    \ here we will convert it back to BGR with the same function `cv2.cvtColor()`\
    \ but different parameter `cv2.COLOR_HSV2BGR`.\n\n```\ndef convert_hsv2bgr(image):\n\
    \    bgr = cv2.cvtColor(image, cv2.COLOR_HSV2BGR)\n    return bgr\n```\n\nThe\
    \ example in section 5.4 later will show how to convert a BGR image to HSV, and\
    \ make some adjustments to hue, saturation and value to achieve some effects,\
    \ and then convert it back to BGR for displaying.\n\n## 5.2. Resize, Crop and\
    \ Rotate an Image\n\nSource: ResizeCropRotate.py\nLibrary: common/ImageProcessing.py\n\
    \nPython is an excellent language to support object-oriented programming, this\
    \ chapter will start to use object-oriented techniques to write the codes. We\
    \ will create classes to include properties and functions, then instantiate the\
    \ classes and invoke their functions.\n\nNow create a class called ImageProcessing,\
    \ and define three functions inside, resize(), rotate() and crop(). When a class\
    \ is created it always has a built-in __init__() function, which is always executed\
    \ when the class is instantiated. It’s used to assign initial values to the properties\
    \ or other operations that are necessary when the object is created. Here we set\
    \ the window_name and image_name properties inside __init__() function.\n\nThe\
    \ full source code is in the ImageProcessing.py in the common folder of the Github\
    \ repository.\n\n```\nimport cv2\n\nclass ImageProcessing(object):\n    def __init__(self,\
    \ window_name, image_name):\n        self.window_name = window_name\n        self.image_name\
    \ = image_name\n        self.image = cv2.imread(self.image_name)\n\n    def show(self,\
    \ title=None, image=None):\n        if image is None:\n            image = self.image\n\
    \        if title is None:\n            title = self.window_name\n        cv2.imshow(title,\
    \ image)\n```\n\nExplanations:\n\n| Line | Description |\n| --- | --- |\n| 3 |\
    \ Define the ImageProcessing class |\n| 4 | The built-in __init__() function,\
    \ it's always executed when the class is instantiated. The parameters should be\
    \ passed when instantiating the class. |\n| 5 - 7 | Set the class properties,\
    \ window_name and image_name, then load the image using cv2.imread(). |\n| 9 -\
    \ 14 | Define show() function, which will show the image using cv2.imshow(). When\
    \ the parameters specify the image or window name then show that image with window\
    \ name, otherwise use the image and window name specified at __init__() function\
    \ when the class is initialized. |\n\nTo continue, add three functions, resize(),\
    \ crop() and rotate(), to the class:\n\n```\n    def resize(self, percent, image=None):\n\
    \        if image is None:\n            image = self.image\n        width = int(image.shape[1]*percent/100)\n\
    \        height = int(image.shape[0]*percent/100)\n        resized_image = cv2.resize(image,\n\
    \                                    (width, height) )\n        return resized_image\n\
    \n    def crop(self,pt_first,pt_second,image=None):\n        if image is None:\n\
    \            image = self.image\n        # top-left point\n        x_tl, y_tl\
    \ = pt_first\n        # bottom-right point\n        x_br, y_br = pt_second\n \
    \       # swap x value if opposite\n        if x_br < x_tl:\n            x_br,\
    \ x_tl = x_tl, x_br\n        # swap y value if opposite\n        if y_br < y_tl:\n\
    \            y_br, y_tl = y_tl, y_br\n        cropped_image=image[y_tl:y_br,x_tl:x_br]\n\
    \        return cropped_image\n\n    def rotate(self,angle,image=None,scale=1.0):\n\
    \        if image is None:\n            image = self.image\n        (h, w) = image.shape[:2]\n\
    \        center = (w / 2, h / 2)\n        rot_mat = cv2.getRotationMatrix2D(center,\n\
    \                                          angle, scale)\n        rotated_image\
    \ = cv2.warpAffine(image,\n                                       rot_mat, (w,\
    \ h))\n        return rotated_image\n```\n\nExplanations:\n\n| Line | Description\
    \ |\n| --- | --- |\n| 16 | Define resize() function, specify percentage as parameter,\
    \ and optionally the image as parameter. |\n| 17 - 18 | If image is not specified\
    \ in the parameters, then use the class property `self.image`. |\n| 19 - 22 |\
    \ Calculate the resized width and height based on the percentage. Then call `cv2.resize()`\
    \ function to resize the image. |\n| 24 - 34 | Define `crop()` function, similar\
    \ to what we did in Section 4.4. |\n| 36 - 44 | Define `rotate()` function, pass\
    \ `angle` as a parameter and optionally `image` and `scale`. Use `cv2.getRotationMatrix2D()`\
    \ and `cv2.warpAffine()` functions to perform the rotation. |\n\nReference the\
    \ OpenCV documents for `getRotationMatrix2D()` and `warpAffine()` functions at\
    \ the below link:\nhttps://docs.opencv.org/4.7.0/da/d54/group__imgproc__transform.html\n\
    \nThe class definition for `ImageProcessing` is done for now, more functions will\
    \ be added later.\n\nNow the class can perform the resize, crop and rotate operations.\n\
    \nIn the source codes of `ResizeCropRotate.py` in the Github repository, the class\
    \ is imported in Line 2, this is a typical way to include another Python file\
    \ for reference.\n\n```\nimport cv2\nimport common.ImageProcessing as ip\n\nif\
    \ __name__ == \"__main__\":\n    # Create an ImageProcessing object\n    ip =\
    \ ip.ImageProcessing(\"Resize,Crop and Rotate\",\n                           \
    \ \"../res/flower005.jpg\")\n\n    # Show original image\n    ip.show()\n\n  \
    \  # Resize the original image and show it\n    resized_image = ip.resize(50)\n\
    ```"
  mdcn: "如上图5.1所示，彩色图像（左）被转换为灰度图像（右）。\n\n如前所述，在OpenCV中，图像的默认颜色空间是BGR，因此彩色图像可以被分割为蓝色、绿色和红色三个通道，每个通道都是灰度图像，如图5.2所示。\n\
    \n![](img/b99f6edaf6f730ad313ce66bc5a26be2_82_0.png)\n\n可以使用`cv2.split()`函数将彩色图像分割为三个通道：\n\
    \n```\ndef split_image(image):\n    ch1, ch2, ch3 = cv2.split(image)\n    return\
    \ ch1, ch2, ch3\n```\n\n每个通道都是灰度图像。\n\n## 5.1.2. 将灰度图像转换为BGR\n\n灰度图像也可以转换为BGR颜色空间。在这种情况下，源图像是只有一个通道且不包含任何颜色信息的灰度图像，因此转换后的BGR图像看起来与原始灰度图像相同。但区别在于，BGR图像虽然看起来与灰度图像相同，但它有三个通道，而原始的灰度图像只有一个通道。\n\
    \n要将灰度图像转换为BGR，请使用`cv2.cvtColor()`函数，并将`cv2.COLOR_GRAY2BGR`作为第二个参数：\n\n```\ndef\
    \ convert_gray2bgr(image):\n    bgr = cv2.cvtColor(image, cv2.COLOR_GRAY2BGR)\n\
    \    return bgr\n```\n\n下图5.3展示了这一概念：\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_83_0.png)\n\
    \n图5.3 将灰度图像转换为BGR\n\n左侧图像是原始的灰度图像，只有一个通道。而右侧图像虽然看起来与灰度图像相同，但它处于BGR颜色空间，可以被分割为三个通道。\n\
    \n既然右侧图像看起来与左侧图像相同，为什么还要进行转换呢？这样做有几个原因。有时在图像处理中，需要对两个或多个图像执行操作，确保所有图像处于相同的颜色空间非常重要。例如，如果我们想将两张图像混合或融合，但一张是彩色图像，另一张是灰度图像，那么在混合之前，必须将灰度图像转换为BGR。\n\
    \n有时，当你想为灰度图像着色时，必须先将其转换为BGR，然后才能在不同的通道上绘制颜色，因为你无法在单通道的灰度图像上绘制颜色。\n\n## 5.1.3.\
    \ 将BGR转换为HSV\n\n如第3.4节所述，图像不仅可以表示为BGR颜色空间，也可以表示为HSV颜色空间。OpenCV可以轻松地在BGR和HSV之间转换图像。与转换为灰度图像类似，使用相同的函数`cv2.cvtColor()`，但第二个参数不同，这里是`cv2.COLOR_BGR2HSV`。\n\
    \nHSV图像也可以被分割为三个通道：色调、饱和度和明度。然后可以调整每个通道以实现不同的效果，我们稍后将解释如何调整每个通道来改变图像。\n\n以下代码片段用于将图像转换为HSV颜色空间：\n\
    \n```\ndef convert_bgr2hsv(image):\n    hsv = cv2.cvtColor(image, cv2.COLOR_BGR2HSV)\n\
    \    return hsv\n```\n\n如图5.4所示，彩色图像被转换为HSV颜色空间，然后可以使用`cv2.split()`函数进一步分割为色调、饱和度和明度三个通道。\n\
    \n![](img/b99f6edaf6f730ad313ce66bc5a26be2_84_0.png)\n\n## 5.1.4. 将HSV转换为BGR\n\
    \n当OpenCV显示图像时，使用`cv2.imshow()`函数，默认使用BGR颜色空间。如果一个图像被转换为HSV并进行了一些图像处理操作，它不能直接发送到`cv2.imshow()`进行显示，而是必须先转换回BGR，然后再发送到`cv2.imshow()`进行显示，否则图像将无法正确显示。\n\
    \n在上一节中，我们将一个图像转换为HSV，这里我们将使用相同的函数`cv2.cvtColor()`但不同的参数`cv2.COLOR_HSV2BGR`将其转换回BGR。\n\
    \n```\ndef convert_hsv2bgr(image):\n    bgr = cv2.cvtColor(image, cv2.COLOR_HSV2BGR)\n\
    \    return bgr\n```\n\n稍后在第5.4节的示例中，将展示如何将BGR图像转换为HSV，对色调、饱和度和明度进行一些调整以实现某些效果，然后再将其转换回BGR进行显示。\n\
    \n## 5.2. 调整、裁剪和旋转图像\n\n源文件：ResizeCropRotate.py\n库文件：common/ImageProcessing.py\n\
    \nPython是一门优秀的支持面向对象编程的语言，本章将开始使用面向对象技术编写代码。我们将创建类来包含属性和函数，然后实例化这些类并调用它们的函数。\n\
    \n现在创建一个名为`ImageProcessing`的类，并在其中定义三个函数：`resize()`、`rotate()`和`crop()`。当一个类被创建时，它总是有一个内置的`__init__()`函数，该函数在类被实例化时总是会被执行。它用于为属性赋初始值或在创建对象时执行其他必要的操作。这里我们在`__init__()`函数中设置`window_name`和`image_name`属性。\n\
    \n完整源代码位于Github仓库的common文件夹中的`ImageProcessing.py`文件。\n\n```\nimport cv2\n\nclass\
    \ ImageProcessing(object):\n    def __init__(self, window_name, image_name):\n\
    \        self.window_name = window_name\n        self.image_name = image_name\n\
    \        self.image = cv2.imread(self.image_name)\n\n    def show(self, title=None,\
    \ image=None):\n        if image is None:\n            image = self.image\n  \
    \      if title is None:\n            title = self.window_name\n        cv2.imshow(title,\
    \ image)\n```\n\n解释：\n\n| 行号 | 描述 |\n| --- | --- |\n| 3 | 定义`ImageProcessing`类\
    \ |\n| 4 | 内置的`__init__()`函数，在类被实例化时总是会被执行。参数应在实例化类时传递。 |\n| 5 - 7 | 设置类属性`window_name`和`image_name`，然后使用`cv2.imread()`加载图像。\

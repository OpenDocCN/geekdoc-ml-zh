    \n![](img/b99f6edaf6f730ad313ce66bc5a26be2_136_3.png)\n\nFigure 6.3 Erosion from\
    \ Dilated Image\n\nBelow are the codes to generate above results:\n\n```python\n\
    1  import cv2\n2  import numpy as np\n3  \n4  def dilation(image, ksize=(1,1)):\n\

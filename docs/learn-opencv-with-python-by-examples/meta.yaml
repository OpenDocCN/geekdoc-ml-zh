    # 3.4. Image Fundamentals


    Source: ImageFundamental.py


    # 3.4.1. Pixels


    Pixels (short for "picture elements") are the smallest units of a digital image.
    Each pixel represents a tiny point of color that, when combined with other pixels,
    forms the complete image.

    Pixels are typically arranged in a grid within a rectangle or square, with each
    pixel having a specific location within the image. The color of each pixel is
    represented by a combination of numerical values that represent the intensity
    of the three primary colors of blue, green, and red (BGR).'
  merge: -1
  pgno: 42
- img_proc: true
  md: 'The resolution refers to the number of pixels in the image, usually expressed
    in terms of the width and height of the image in pixels. The higher the resolution,
    the more detail the image can contain, as there are more pixels available to represent
    the image. However, higher resolution images also require more storage space and
    processing power.


    Typically, a digital image is made of thousands or millions of pixels, which are
    organized in rows and columns. For example, for an image of 640 x 480, there are
    a total of 307,200 pixels, and they are located in 480 rows and 640 columns. The
    coordinates of a pixel specify the location of the pixel, say a pixel with coordinates
    of (100, 100) means it is in column number of 100 and row number of 100.


    Unlike a mathematics coordinate system, the digital image’s coordinate of the
    origin (0,0) is located at the top left corner of the image. *x*-axis represents
    the columns and *y*-axis represents the rows.


    As a color image shown in Figure 3.4, *x*-axis is the horizontal arrow at the
    top facing right, and *y*-axis is the vertical arrow at the very left and facing
    down. A pixel can be identified by a pair of integers specifying a *x* value (in
    column number) and a *y* value (in row number). In below Figure 3.4, the pixel
    at (100, 100) is identified and highlighted.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_43_0.png)'

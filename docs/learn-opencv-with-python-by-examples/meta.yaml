    \ very useful when we want to extract something partially from an image and put\
    \ it in another image. These bitwise operations can be used here to achieve the\
    \ effects we want.\n\n| cv2.bitwise_and(img1, img2) | Perform bitwise AND for\
    \ img1 and img2 |\n| cv2.bitwise_or(img1, img2) | Perform bitwise OR for img1\
    \ and img2 |\n| cv2.bitwise_not(img1) | Perform bitwise NOT for img1 |\n| cv2.bitwise_xor(img1,\
    \ img2) | Perform bitwise XOR for img1 and img2 |\n\nThe algorithm is as following:\n\
    \n$g(i, j) = mask \\& f_0(i, j) + (1 - mask) \\& f_1(i, j)$\n\n$f_0(i, j)$ and\
    \ $f_1(i, j)$ are the original images to blend, and $g(i, j)$ is the result image;\
    \ & is the bitwise AND operation.\n\nThe bitwise blending process is shown in\

    ```

    1  def convert_hsv2bgr(image):

    2      bgr = cv2.cvtColor(image, cv2.COLOR_HSV2BGR)

    3      return bgr

    ```


    The example in section 5.4 later will show how to convert a BGR image to HSV,
    and make some adjustments to hue, saturation and value to achieve some effects,
    and then convert it back to BGR for displaying.


    # 5.2. Resize, Crop and Rotate an Image


    Source: ResizeCropRotate.py

    Library: common/ImageProcessing.py


    Python is an excellent language to support object-oriented programming, this chapter
    will start to use object-oriented techniques to write the codes. We will create
    classes to include properties and functions, then instantiate the classes and
    invoke their functions.



    First load the image into `img`, and convert it to HSV in `imgHSV`. Then create
    two masks, `mask1` and `mask2`, the hue ranges are [0, 10] and [161, 179] respectively.
    Then merge the two masks by bitwise OR operation:


    ```

    1  img = cv2.imread("../res/flower002.jpg")

    2  imgHSV = cv2.cvtColor(img, cv2.COLOR_BGR2HSV)

    3  mask1 = cv2.inRange(imgHSV, (161, 90, 100),

    4                      (179, 255, 255) )

    5  mask2 = cv2.inRange(imgHSV, (  0, 90, 100),

    6                      ( 10, 255, 255) )

    7  mask = cv2.bitwise_or(mask1, mask2)

    ```



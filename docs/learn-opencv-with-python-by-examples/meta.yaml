    from the original image.


    For example, there is a 1D array:


    $f = [1, 2, 1]$


    And there is another 1D array:


    $g = [3, 0, 2, 4, 2, 1]$


    The convolution of $f * g$ is defined as the integral of one array sweeping over
    the second and multiplied at each position of overlapping. Say, we want to detect
    a pattern of $[2, 4, 2]$ from $g$, then choose a feature $f = [1, 2, 1]$, and
    do a convolution operation.


    The convolution is to use $f$ to sweep over $g$ from left to right, and perform
    the dot product on the covered items, the dot product means the sum of the products
    of the corresponding items under the covered items. So the first item of the result
    is calculated as:


    $1 \times 3 + 2 \times 0 + 1 \times 2 = 5$



    \n## 7.2. K-近邻算法\n\n### 7.2.1. 什么是K-近邻算法\n\n来源：K-NearestNeighbors.py\n\nK-近邻（KNN）是一种机器学习算法，它通过在训练集中找到与新输入数据点最接近的$k$个数据点，并使用这$k$个邻居的多数类别来对输入数据点进行预测。\n\
    它是一种监督机器学习算法，与上一节的K-means不同。它是监督的，因为它依赖于带标签的输入数据来学习，并在给定新的未标记数据时预测合适的输出。KNN简单易用，可以像K-means一样用于解决分类问题。\n\

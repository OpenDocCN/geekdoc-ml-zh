    - the label must be transformed into categorical data using One-hot Encoding


    # What is One-hot Encoding


    One-hot encoding is a technique used to represent categorical data in a numerical
    format. Each category is converted into a binary vector with a length equal to
    the total number of categories. The vector contains 0s for all categories except
    for the one corresponding to the category being encoded, which is assigned a value
    of 1.'

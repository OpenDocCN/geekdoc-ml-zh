  md: '**Stride** is another technique of convolution. When the feature/kernel slides
    over the input image in the above example, it starts from the upper-left corner
    and moves to the right by one element at a time by default, and after it reaches
    the very right, it moves down by one element by default. The stride is the number
    of elements the feature/kernel traverses on each move, in this case the stride
    is 1 by default.


    Sometimes the feature/kernel will traverse more than one element, for example,
    two or three elements on each move, then the stride is 2 or 3.

    Figure 7.42 shows the convolution with stride=2.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_279_0.png)


    In general, if the stride is $s_w$ in the horizontal direction, and $s_h$ in the
    vertical direction, then the convolution output size is:


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_279_1.png)


    In most cases, the padding is selected as $p_h = k_h - 1$ and $p_w = k_w - 1$,
    then the output size is:


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_279_2.png)


    The purpose of stride is to reduce the size of the original image for computational
    efficiency while keeping the features of the original image. In Figure 7.42 the
    Π shape can also be captured in the convolution result, the value of 61 is still
    in the middle of the result, which is significantly larger than other values.
    Most often it is used when the feature/kernel is large because it captures a large
    area of the original image.



    \ contours from the edges, see section 6.3.2 for details. |\n| 18 | Draw the contours\
    \ on the mask. Optionally, add `cv2.imshow()` after this line to see its result.\
    \ |\n| 19 - 20 | Apply dilation and erosion to remove noises from the mask. It's\

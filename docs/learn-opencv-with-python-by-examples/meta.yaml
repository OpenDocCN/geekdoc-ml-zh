  - '[PAGE 124]


    A histogram is a graphical representation of the distribution of pixel values
    in an image. In image processing, a histogram can be used to analyze the brightness,
    contrast, and overall intensity of an image. It is plotted in a x-y chart, the
    x-axis of a histogram represents the pixel values ranging from 0 to 255, while
    the y-axis represents the number of pixels in the image that have a given value.
    A histogram can show whether an image is predominantly dark or light, and whether
    it has high or low contrast. It can also be used to identify any outliers or unusual
    pixel values.


    To better understand the histogram, plot an image and draw some squares and rectangles
    and fill them with the color value of 0, 50, 100, 150, 175, 200 and 255, as shown
    in the left-side of Figure 5.26. The coordinates of each square/rectangle are
    also displayed in the image, so we can easily calculate how many pixels for each
    color.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_124_0.png)


    In the histogram plot in the right-side, x-axis is the color value from 0 to 255,
    and y-axis is the number of pixels. The y value is 20,000 at x=0, meaning there
    are 20,000 pixels that have a color value of 0, from the left-side image we can
    see the black rectangle (color: 0) is from (0, 0) to (200, 100), the total number
    of black pixels is 200 x 100 = 20,000. The histogram plot also shows the color
    value 0 has 20,000 pixels. The white square (color: 255) has 40,000 pixels. In
    the same way, calculate the number of pixels for other colors, there are 20,000
    pixels for color values of 50, 100, 150, 175 and 200.


    This is how the histogram works, the number of pixels and the color values are
    shown in the histogram.


    Below is the code to create the above image and histogram plot.'

  md: '# 6.4. Color Detection


    Color detection is the process of identifying and extracting specific colors from
    the images. This technique is often used in image processing and computer vision
    applications to extract information from images or videos.


    There are several approaches for color detection, and the choice of method depends
    on the specific task and the nature of the images being processed. One common
    approach of color detection is to use color segmentation, which involves dividing
    the image into regions based on color. This can be done using techniques such
    as thresholding and clustering. Thresholding is to select a threshold value for
    a particular color channel and assigning all pixels with values above that threshold
    to the corresponding color region. Clustering is to group similar colors together
    based on some distance metric, this will be introduced in the chapter of machine
    learning in section 7.1.


    Another approach to color detection is to use a histogram, which is a graphical
    representation of the distribution of colors in an image, see section 5.9. It
    can be used to identify specific colors or color ranges by comparing the histogram
    of the image to a reference histogram.


    Color detection can also be combined with other image processing techniques such
    as edge detection, object detection, or extracting information from images or
    videos. For example, in object detection, color can be used as a feature to identify
    objects through a video sequence.


    This section will introduce the color segmentation with thresholds in HSV color
    space. A minimum threshold and a maximum threshold are defined for a particular
    color, any pixels between the two thresholds are identified as the color region.


    # 6.4.1. Find Color from an Image


    Source: FindColor.py

    Library: common/color_wheel.py


    As explained in section 3.4.3 earlier, a color image can be represented in HSV
    space where a pixel has hue, saturation and value. Hue is for color, saturation
    for the purity of the color, and value for the brightness. Each color has a range
    of these values, let’s look at how to find out the range of each color.'

    \nFigure 4.6 Trackbars\n\n## 5. Image Processing\n\nTo recap the previous discussions,\
    \ a digital image is represented as an array of pixel values. Each pixel in the\
    \ array represents a tiny element of the image, and its value determines the color\
    \ or intensity of that element. The pixel values are represented as integers in\
    \ the range of 0 to 255 for grayscale images, where 0 represents black and 255\
    \ represents white. For color images, pixel values are represented as a combination\
    \ of blue, green, and red (BGR) channels, where each channel is in grayscale with\
    \ a value between 0 and 255.\n\nDigital images are represented by multi-dimensional\
    \ arrays in OpenCV, a grayscale image is represented by a 2D array, and a color\
    \ one is by a 3D array.\n\nImage processing is a technique to apply some mathematical\
    \ algorithms and use various functions and techniques to manipulate digital images\
    \ in order to get the desired outcomes with enhanced effects, such as improving\
    \ their quality or extracting useful information from them.\n\nOpenCV provides\
    \ a number of methods for image processing, this chapter will introduce some commonly\
    \ and widely used methods for image processing.\n\nThis chapter begins with the\
    \ color space conversion in section 5.1 which is the basics of image processing,\
    \ we will introduce the conversion between grayscale, BGR and HSV color spaces.\n\
    \nSection 5.2 will explain how to resize, crop and rotate the images. This chapter\
    \ will also introduce the object-oriented features of Python, we will create classes\
    \ to include the functions and write codes to instantiate the classes and invoke\
    \ those functions.\n\nSection 5.3 will explain how to adjust the Brightness and\
    \ Contrast, and section 5.4 to adjust Hue, Saturation and Value of the images.\
    \ By adjusting these values, the color and brightness of the images can be changed\
    \ accordingly, this is a very important part of image processing.\n\nSection 5.5\
    \ will introduce image blending which is to mix two images based on an algorithm.\
    \ And Section 5.6 will introduce the bitwise operation and blending or mixing\
    \ two images based on the bitwise operation, which can achieve a different effect.\n\
    \nSection 5.7 will describe image warping, a method to transform a skewed and\
    \ distorted image into a straightened one.\n\nSection 5.8 will introduce image\
    \ blurring, it’s a technique to make the image smooth by removing the noises from\
    \ the image. There are many different ways to do it, this section will focus on\
    \ two types of image blurring methods, Gaussian Blur and Median Blur.\n\nLastly,\
    \ section 5.9 will introduce the histogram which gives us important information\
    \ about the color distributions of the images.\n\nEnjoy the Image Processing with\
    \ OpenCV and Python.\n\n### 5.1. Conversion of Color Spaces\n\nSource: ColorSpace.py\n\
    \nSection 3.4 has explained that the color image can be represented using either\
    \ BGR or HSV color spaces, and a color image can also be converted to a grayscale\
    \ image. OpenCV provides many methods for the conversion of color spaces, here\
    \ we introduce two of them: BGR to and from Grayscale, and BGR to and from HSV.\n\
    \n#### 5.1.1. Convert BGR to Gray\n\nThere are two ways to obtain a grayscale\
    \ image from the color one, 1) use cv2.cvtColor() function with cv2.COLOR_BGR2GRAY\
    \ as its second parameter, and 2) load the image with grayscale mode by using\
    \ `cv2.imread()` function with `cv2.IMREAD_GRAYSCALE` as the second parameter.\n\
    \nThe first method loads the color image and then converts it to grayscale, then\
    \ we have both the color and grayscale images available in the memory.\n\nHowever,\
    \ if the color image is not needed, the second method loads the image in grayscale\
    \ only, the color one is not available in this case and could save some memory.\
    \ Below code snippets show the two methods:\n\n```python\ndef convert_bgr2gray(image):\n\
    \    gray = cv2.cvtColor(image, cv2.COLOR_BGR2GRAY)\n    return gray\n\ndef load_image_gray(file_name):\n\
    \    gray = cv2.imread(file_name,\n                      cv2.IMREAD_GRAYSCALE)\n\
    \    return gray\n```\n\nLine 1 to 3 is the first method, the color image in `image`\
    \ is passed as a parameter, `cv2.cvtColor()` function will convert it to grayscale\
    \ one.\n\nLine 5 to 7 is the second method, it loads the image in grayscale mode\
    \ directly from the file.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_81_0.png)\n\

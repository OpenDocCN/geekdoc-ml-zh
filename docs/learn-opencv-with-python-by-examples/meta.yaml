    The details of cv2.findContours() function can be found in OpenCV documents, it
    is used as below,


    ```

    1 contours, hierarchy = cv2.findContours(image,

    2                     cv2.RETR_EXTERNAL,

    3                     cv2.CHAIN_APPROX_NONE)

    ```


    This function takes an input image, finds the contours from it, and returns a
    list of contours. The contours returned are represented as a list of points, where
    each point is a coordinate of the contour.


    cv2.RETR_EXTERNAL specifies the contour retrieval algorithm, specifically it retrieves
    only the extreme outer contours.


    cv2.CHAIN_APPROX_NONE specifies the contour approximation algorithm, specifically
    it stores absolutely all the contour points.


    This function returns the contours and hierarchy, the former is the array that
    contains all the contours detected from the image, the latter contains the image
    topology information, which is optional for this example.



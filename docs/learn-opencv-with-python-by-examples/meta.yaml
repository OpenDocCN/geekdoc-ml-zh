    # Padding and Stride


    In the above example, suppose the original image size is $i_h \times i_w$, and
    the feature/kernel size is $k_h \times k_w$, then the size of convolution output
    is $( i_h - k_h + 1 ) \times ( i_w - k_w + 1 )$. In the above example, the image
    size is $7 \times 7$, the kernel size is $3 \times 3$, and the size of the output
    is:


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_278_0.png)


    Padding and stride are techniques of convolution to control the size of the outputs.
    The convolution might lose some information if the features appear at the boundary
    or corners of the image, although it depends on the kernel size, a larger kernel
    might lose more information.


    **Padding** is used to resolve this kind of problem by adding some rows to the
    top and bottom of the image, and adding some columns to the left and right as
    well. In general, add $p_h$ rows to the image, half on the top and half on the
    bottom; and add $p_w$ columns half on left and half on right, all padding rows
    and columns have value of 0. As shown in Figure 7.41:


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_278_1.png)


    Figure 7.41 Padding for Convolution


    Then the convolution is performed on the padded matrix, and the size of the output
    will be:


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_278_2.png)


    In most cases, choose $p_h = k_h - 1$ and $p_w = k_w - 1$, and the kernel size
    is an odd number, like 3, 5, 7, 9 and so on. Then the same number of paddings
    will be added to the top and bottom, and same for left and right. In the above
    example, kernel size is $3 \times 3$, the padding size is $2 \times 2$ meaning
    one on top, one on bottom, one on left and one on right.


    As a result, the convolution output is in the size of $7 \times 7$, which is the
    same as the original image size.'

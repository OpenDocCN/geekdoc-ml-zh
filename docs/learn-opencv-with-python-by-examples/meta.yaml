    \n## 7.4.2. 激活函数\n\n来源：common/ann_activation_functions.py\n\n激活函数是人工神经网络（ANN）的关键组成部分，用于在神经元的输出中引入非线性。在ANN中，激活函数应用于神经元输入的加权和，以产生输出。\n\

    The OpenCV documents describe the algorithm to blend them together,


    $g(i, j) = \alpha f_0(i, j) + (1 - \alpha) f_1(i, j)$


    > from OpenCV official document at https://docs.opencv.org/4.7.0/d5/dc4/tutorial_adding_images.html


    $f_0(i, j)$ and $f_1(i, j)$ are the two original images, and $g(i, j)$ is the
    output image. $\alpha$ is the weight (value from 0 to 1) on the first image, $(1
    - \alpha)$ is the weight on the second image.


    By adjusting the value of $\alpha$, we can achieve different blending effects.
    Same as the previous sections, `cv2.addWeighted()` function is used to blend the
    two images.


    The `blend()` function is to be added to the `ImageProcessing` class:


    ```

    python

    1    def blend(self, blend, alpha, image=None):

    2        if image is None:

    3            image = self.image

    4        blend = cv2.resize(blend,

    5            (image.shape[1], image.shape[0]))

    6        result = cv2.addWeighted(image, alpha,

    7            blend, (1.0 - alpha), 0)

    8        return result

    ```



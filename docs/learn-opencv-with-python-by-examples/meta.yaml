    **Saturation** represents the intensity or purity of the color, the value is defined
    from 0 to 100 percent, where 0 is gray and 100 percent is the pure color. As the
    saturation increases the color appears to be purer, a highly saturated image is
    more vivid and colorful. As the saturation decreases the color appears to be faded
    out, a less saturated image appears towards a grayscale one.


    In OpenCV, however, its value range is extended to [0, 255] instead of [0, 100].


    **Value/Brightness** represents the overall brightness of the color, the value
    is defined from 0 to 100 percent, where 0 is black and 100 is the brightest level
    of the color. Similar to saturation, in OpenCV the range for Value/Brightness
    is [0, 255], instead of [0, 100].


    Same as BGR channels, the HSV is also separated into three channels as well, each
    in grayscale. Figure 3.9 illustrates how the Hue, Saturation and Value/Brightness
    channels can compose a color image.



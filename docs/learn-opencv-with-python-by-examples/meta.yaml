    centroids based on the new members of the clusters. The *centroids* are arithmetic
    mean position, or average position, of the clusters of the data. The process is
    repeated until the centroids no longer move or a maximum number of iterations
    is reached.


    In a real-world use case, for example, a T-shirt maker wants to make products
    fit for a wide range of people with different heights and weights. The maker is
    planning to make three sizes: L, M and S for different groups of people. The three
    sizes are called *centroids* in the terminology of K-means algorithm, each *centroid*
    represents a group of people, or a cluster of people.


    K-Means is an effective algorithm to resolve this type of problem, it will find
    the three centroids (L, M and S) from the dataset. It is an unsupervised learning
    method because it will find the results from the data itself by calculation, we
    don''t need to mark each data with a label.'

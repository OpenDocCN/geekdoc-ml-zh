    # # 4. User Interaction


    OpenCV provides functions that allow users to interact with images and videos
    in various ways. In previous sections `cv2.waitKey()` function has been used to
    accept user input from the keyboard and the ESC key can be detected by checking
    the key code returned by the function. And `cv2.destroyAllWindows()` function
    closes all the windows that were created using the `cv2.imshow()`. These are very
    simple user interaction functions.


    In addition, OpenCV provides several other functions for user interaction, this
    chapter will introduce some commonly used ones.


    Section 4.1 introduces the mouse operations, and how to use the callback function
    to capture the mouse events.


    Section 4.2 uses the mouse to draw circles, and section 4.3 to draw polygons.


    Section 4.4 uses the mouse to specify a rectangle to crop the image.


    Section 4.5 introduces the trackbars, or sliders, for users to input values.


    The important thing for user interaction is the *callback* functions, they are
    used by almost all user operation events. This chapter explains how the callback
    functions are defined and used with Python.


    Enjoy the User Interaction with OpenCV and Python.'
- md: "## 4.1. Mouse Operations\n\nSource: Mouse.py\nLibrary: common/Draw.py\n\nOpenCV\
    \ provides a facility to control and manage a variety of mouse events, and it\
    \ provides the flexibility for programmers to manipulate user interactions. It\
    \ can capture the events generated by mouse operations, such as left-button-down,\
    \ right-button-down, mouse-move and double-click etc. The callback functions can\
    \ be used to capture these mouse events.\n\nBelow code snippets will print out\
    \ the list of all mouse events that OpenCV supports:\n\n```python\nimport cv2\n\
    \nfor event in dir(cv2):\n    if \"EVENT\" in event:\n        print(event)\n```\n\
    \nIt displays a list of mouse events which is outlined in below table:\n\n| EVENT_FLAG_ALTKEY\
    \ | When the ALT key is pressed. |\n| EVENT_FLAG_CTRLKEY | When the CTRL key is\
    \ pressed. |\n| EVENT_FLAG_LBUTTON | When the left mouse button is down. |\n|\
    \ EVENT_FLAG_MBUTTON | When the middle mouse button is down. |\n| EVENT_FLAG_RBUTTON\
    \ | When the right mouse button is down. |\n| EVENT_FLAG_SHIFTKEY | When the SHIFT\
    \ key is pressed. |\n| EVENT_LBUTTONDBLCLK | When the left button is double-clicked.\
    \ |\n| EVENT_LBUTTONDOWN | When the left button is clicked. |\n| EVENT_LBUTTONUP\
    \ | When the left button is released. |\n| EVENT_MBUTTONDBLCLK | When the middle\
    \ button is double-clicked. |\n| EVENT_MBUTTONDOWN | When the middle button is\
    \ clicked. |\n| EVENT_MBUTTONUP | When the middle button is released. |\n| EVENT_MOUSEHWHEEL\
    \ | When a horizontal scroll is executed with the mouse wheel. |\n| EVENT_MOUSEMOVE\
    \ | When the mouse is moving. |\n| EVENT_MOUSEWHEEL | When a vertical scroll is\
    \ executed with the mouse wheel. |\n| EVENT_RBUTTONDBLCLK | When the right button\
    \ is double-clicked. |\n| EVENT_RBUTTONDOWN | When the right button is clicked.\
    \ |\n| EVENT_RBUTTONUP | When the right button is released. |\n\nThis example\
    \ will show how to use the callback function to capture the mouse events. Load\
    \ and show an image, when a mouse click happens on the image, the x, y coordinates\
    \ of the pixel and the blue, green and red values will be printed on a separate\
    \ window.\n\n```python\ndef mouse_event(event, x, y, flags, param):\n    if event\
    \ == cv2.EVENT_LBUTTONDOWN:\n        blue = img[y, x, 0]\n        green = img[y,\
    \ x, 1]\n        red = img[y, x, 2]\n        mycolorImage = np.zeros((100, 280,\
    \ 3),\n                                np.uint8)\n        mycolorImage[:] = [blue,\
    \ green, red]\n        strBGR = \"(B,G,R) = (\" + str(blue) + \", \"+str(green)+\"\
    ,\n        \" + str(red) + \")\"\n        strXY = \"(X,Y) = (\"+str(x)+\", \"\
    +str(y)+\")\"\n        txtFont = cv2.FONT_HERSHEY_COMPLEX\n        txtColor =\
    \ (255, 255, 255)\n        cv2.putText(mycolorImage,strXY, (10,30),\n        \
    \            txtFont, .6, txtColor,1)\n        cv2.putText(mycolorImage,strBGR,(10,50),\n\
    \                    txtFont,.6, txtColor,1)\n        cv2.imshow(\"color\", mycolorImage)\n\
    \nif __name__ == '__main__':\n    img = cv2.imread(\"../res/flower003.jpg\")\n\
    \    cv2.imshow(\"image\", img)\n    cv2.setMouseCallback(\"image\", mouse_event)\n\
    \    cv2.waitKey(0)\n    cv2.destroyAllWindows()\n```\n\nExplanations:\n\n| Line\
    \ 1 | Define the mouse callback function. The event type and coordinates (x, y)\
    \ are in the parameter of the callback function. |\n| Line 2 | Check if the event\
    \ is left mouse button down. |\n| Line 3 - 5 | Retrieve the BGR color values at\
    \ the coordinates of x, y. |\n| Line 6 | Create a canvas that is used to display\
    \ the coordinates and color values. |\n| Line 7 | Paint the canvas with the color\
    \ at the point of the mouse click. |\n| Line 8 - 9 | Create the texts that will\
    \ be displayed – the coordinates and color value. |\n| Line 10, 11 | Specify the\
    \ font and color of the texts to be displayed. |\n| Line 12, 13 | Display the\
    \ texts using cv2.putText() function. |\n| Line 14 | Show the canvas in a separate\
    \ window. |\n| Line 16 | The main entrance for code execution. |\n| Line 17, 18\
    \ | Load and show an image. |\n| Line 19 | Set a callback function for capturing\
    \ mouse events. |\n\nExecute the code, the image is loaded and displayed, whenever\
    \ a mouse click happens on the image, the pixel’s coordinates (x, y) and color\
    \ values (B, G, R) are displayed in a separate window, and the background color\
    \ is filled with the color of the pixel, as shown in Figure 4.1.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_65_0.png)\n\
    \nPixel Color\n(X,Y) = (243, 109)\n(B,G,R) = (218, 129, 255)\n\nFigure 4.1 Mouse\
    \ Click on an Image\n\n## 4.2. Draw Circles with Mouse\n\nSource: DrawCircleWithMouse.py\n\
    Library: common/Draw.py\n\nThis example will use mouse to draw circles with cv2.circle()\
    \ function provided by OpenCV. Here's the basic syntax of the function:\n\n```python\n\
    cv2.circle(img, center, radius, color, thickness)\n```\n\nThe parameters:\n\n\
    | img | The image on which you want to draw the circle. |\n| center | The center\
    \ of the circle, specified as a tuple of (x, y) coordinates. |\n| radius | The\
    \ radius of the circle in pixels. |\n| color | The color of the circle, specified\
    \ as a tuple of (B, G, R) values. |\n| thickness | The thickness of the circle\
    \ outline. Use a negative value to fill the circle. |\n\nThis example works in\
    \ this way, when the left key of the mouse is pressed the center of the circle\
    \ is decided, then hold the left key and move the mouse, the radius of the circle\
    \ is continuously calculated while the mouse is moving. When the mouse left key\
    \ is released the radius is finalized and the final circle is drawn on the canvas,\
    \ the center coordinates and the radius are also shown on the canvas. While the\
    \ mouse is moving with the left key down, a thin circle is drawn alone with the\
    \ mouse moving in order to indicate how the circle looks like.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_66_0.png)\n\
    \nFigure 4.2 Draw Circles with Mouse\n\nHere are the codes:\n\n```python\nimport\

    # 4.1. Mouse Operations


    Source: Mouse.py

    Library: common/Draw.py


    OpenCV provides a facility to control and manage a variety of mouse events, and
    it provides the flexibility for programmers to manipulate user interactions. It
    can capture the events generated by mouse operations, such as left-button-down,
    right-button-down, mouse-move and double-click etc. The callback functions can
    be used to capture these mouse events.

    Below code snippets will print out the list of all mouse events that OpenCV supports:


    ```

    1 import cv2

    2

    3 for event in dir(cv2):

    4     if "EVENT" in event:

    5         print(event)

    ```


    It displays a list of mouse events which is outlined in below table:


    | EVENT_FLAG_ALTKEY | When the ALT key is pressed. |

    | EVENT_FLAG_CTRLKEY | When the CTRL key is pressed. |

    | EVENT_FLAG_LBUTTON | When the left mouse button is down. |

    | EVENT_FLAG_MBUTTON | When the middle mouse button is down. |

    | EVENT_FLAG_RBUTTON | When the right mouse button is down. |

    | EVENT_FLAG_SHIFTKEY | When the SHIFT key is pressed. |

    | EVENT_LBUTTONDBLCLK | When the left button is double-clicked. |

    | EVENT_LBUTTONDOWN | When the left button is clicked. |

    | EVENT_LBUTTONUP | When the left button is released. |

    | EVENT_MBUTTONDBLCLK | When the middle button is double-clicked. |

    | EVENT_MBUTTONDOWN | When the middle button is clicked. |'

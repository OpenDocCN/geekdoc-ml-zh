    It contains 60,000 color images in ten different clusters, each has 32 × 32 pixels.
    And each cluster has 6,000 random images.


    Although this dataset is not real-world pictures and is in very low resolution
    (32 × 32), it’s ideal for learning purposes, because it does not cost high computation
    resources, users can quickly try different algorithms without a long time (many
    hours) of training process.


    The dataset comes with keras library and is divided randomly into a training set
    of 50,000 and a testing set of 10,000. The ten clusters are evenly and randomly
    divided into both training and testing sets, meaning each cluster has 5,000 in
    training set and 1,000 in test set. The ten clusters are airplane, automobile,
    bird, cat, deer, dog, frog, horse, ship and truck.


    See details of CIFAR-10 dataset at: [https://www.cs.toronto.edu/~kriz/cifar.html](https://www.cs.toronto.edu/~kriz/cifar.html)



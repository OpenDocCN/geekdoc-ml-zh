    | ... | ... | ... | ... |


    Figure 2.1 List of Python Versions for Download


    It’s not recommended to install the latest version, because a number of Python
    packages are used in this book, each package supports up to a specific Python
    version, some of them are not yet available to support the latest Python version.
    Here we use Python 3.10.x for this book.


    Click *Download* from the webpage above and go to the next page, there is a list
    of available download files for different Operation Systems, which looks something
    similar to Figure 2.2:'
  - '[PAGE 21]


    | Version | Operating System | Description | MD5 Sum | File Size |

    |---|---|---|---|---|

    | Gzipped source tarball | Source release | | 25eb3686... | 26044345 |

    | XZ compressed source tarball | Source release | | dc8c0f27... | 19612112 |

    | macOS 64-bit universal2 installer | macOS | macOS 10.9 and later | 616554b1...
    | 40930111 |

    | Windows embeddable package (32-bit) | Windows | | 8afb62c3... | 7629980 |

    | Windows embeddable package (64-bit) | Windows | | c02aded2... | 8601296 |

    | Windows help file | Windows | | e3edf06b... | 9384836 |

    | Windows installer (32-bit) | Windows | | 1a9f5825... | 27827240 |

    | Windows installer (64-bit) | Windows | Recommended | dce578fe... | 28980224
    |


    Figure 2.2 List of Operation Systems for Python Installer


    Download the one for your operation system, save and run the file. If you are
    using Windows and Mac OS, the installer files can be downloaded from here. If
    you are using Linux, we will explain how to install it on Ubuntu in the next section.


    Run the downloaded installer file, it’s pretty much straightforward although it
    will take several minutes. After installation is completed successfully, verify
    the Python on your system. Start a cmd command by clicking on Start icon of Windows
    and type “cmd” and hit return.


    Type the following command in the cmd window:


    ```

    python —version

    ```


    The result should be shown something as below,


    ```

    C:\>python --version

    Python 3.10.5

    ```'
  - '[PAGE 22]


    The displayed is the version just installed, this indicates that the Python is
    correctly installed.

    Please note, as long as the version is 3.10.x, it should be OK, it doesn’t have
    to match the last number after the second dot.


    # 2.1.2. PyCharm, the Integrated Development Environment


    The next is to install PyCharm -- the Integrated Development Environment (IDE)
    for Python, which is used to write, edit, run and debug the Python codes. PyCharm
    is a very popular cross-platform Python IDE, it comes with rich features like
    integrated unit testing and Python debugger, error highlighting, code analysis
    and so on.

    PyCharm has two versions: Community and Professional, the former is open-source
    and free for Python developers; the latter is paid edition and comes with more
    features. The free community version is good for this book.

    Go to [https://www.jetbrains.com/pycharm/download](https://www.jetbrains.com/pycharm/download)
    and click the *Download* button under Community. After the installer file is downloaded,
    run it and follow the on-screen instructions to install it.

    It’s straightforward to execute the installation process until completion. After
    the installation is completed, the PyCharm is available on your Windows system.


    # 2.2. Install Python on Ubuntu


    # 2.2.1. Install Python on Ubuntu


    This section explains the installation of Python on Linux system, specifically
    Ubuntu 22.04. As a prerequisite to installing Python, a root user or a user with
    sudo access is required.'
- md: "Installing Python on Ubuntu with the *apt* tool is a simple and straightforward\
    \ process. *apt* (Advanced Packaging Tool) is a command-line tool used in Ubuntu\
    \ and other Debian-based Linux to manage packages, which are pre-compiled software\
    \ packages that can be easily installed, updated, and removed on a Linux system.\
    \ It provides a simple and easy-to-use interface for searching, installing, and\
    \ removing packages. It also allows users to update the package list, upgrade\
    \ the system to the latest, and manage software repositories.\n\nHere is the step-by-step\
    \ guide:\n\n1.  Start Ubuntu 22.04, login as a root user or a user with sudo privilege,\
    \ and open a new Terminal window, run the following command to update and upgrade\
    \ the system to ensure it’s up-to-date:\n\n    ```bash\n    $ sudo apt update\
    \ && sudo apt upgrade\n    ```\n\n2.  Install the prerequisites for Python by\
    \ executing the following command:\n\n    ```bash\n    $ sudo apt install software-properties-common\n\
    \    ```\n\n3.  Next, it’s recommended to install the *deadsnakes PPA* to the\
    \ sources list, which makes it possible to install multiple Python versions side\
    \ by side on the Ubuntu system. So instead of only having Python 3.10 on the system,\
    \ Python 3.9, 3.8, or 3.7 can also be installed on the same system simultaneously.\
    \ See more details about *deadsnakes PPA* at [https://tooling.bennuttall.com/deadsnakes/](https://tooling.bennuttall.com/deadsnakes/).\
    \ Execute the following command to install it:\n\n    ```bash\n    $ sudo add-apt-repository\
    \ ppa:deadsnakes/ppa\n    ```\n\n    When prompted press Enter to continue:\n\n\
    \    ```\n    Press [ENTER] to continue or Ctrl-c to cancel adding it.\n    ```\n\
    \n4.  When completed, run the following command to update again to refresh the\
    \ newly installed PPA, and then install Python 3.10:\n\n    ```bash\n    $ sudo\
    \ apt update\n    $ sudo apt install python3.10\n    ```\n\n5.  After the above\
    \ execution is completed successfully, Python 3.10 should be installed on the\
    \ Ubuntu system and ready to use. Now verify it by typing the following command\
    \ to show the version of installed Python:\n\n    ```\n    $ python3.10 --version\n\
    \    ```\n\n    The output is displayed below,\n    ```\n    Python 3.10.5\n \
    \   ```\n\n    It indicates the Python is successfully installed on the system.\n\
    \n## 2.2.2. Install PyCharm on Ubuntu\n\nPyCharm is a cross-platform tool and\
    \ is also available on Linux. This section describes how to install it on the\
    \ Ubuntu system.\nIt’s very simple and straightforward to install it by Ubuntu\
    \ command line:\n\n```\n$ sudo snap install pycharm-community -classic\n```\n\n\
    All done. After the installation process is completed, the PyCharm can be launched\
    \ by the following command:\n\n```\n$ pycharm-community\n```\n\n## 2.3. Configure\
    \ PyCharm and Install OpenCV\n\n### 2.3.1. Create a New Python Project\n\nStart\
    \ PyCharm and Create a New Project.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_25_0.png)\n\
    \nFigure 2.3 PyCharm -- Create a New Project\n\nExplanations:\n\n| Location |\
    \ Specify a local folder for the new project. All the project files will be stored\
    \ in this folder. |\n| :--- | :--- |\n| New environment using | Leave it as default\
    \ -- Virtualenv |\n| Location | This will be automatically changed based on the\
    \ Location above, it specifies the location for Python environment settings. |\n\
    | Base interpreter | Make sure it is using Python 3.10 which is installed in previous\
    \ sections. This version will be used throughout this book. |\n| Create a main.py\
    \ welcome script | It doesn't matter if it's selected or not. If it's selected\
    \ a main.py file will be automatically created together with the creation of the\
    \ project. |\n\nAfter the parameters are set correctly, click *Create* button\
    \ at the bottom to create the project.\n\n### 2.3.2. Install and Upgrade OpenCV\
    \ and Libraries\n\nAll libraries including OpenCV can be installed from within\
    \ PyCharm after a project is created.\nSelect File -> Settings, the Settings screen\
    \ is displayed,\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_26_0.png)\n\nThe project\
    \ name *OpenCV* is the one we just created in the last step, so in the left-side\
    \ navigation panel it shows *Project: OpenCV* as Figure 2.4. If you name the project\
    \ differently, it will show “*Project: [your project name]*”. Then select “*Python\
    \ Interpreter*” under it.\nIn the right-side panel, the *Python Interpreter* should\
    \ show the Python version we have installed in the previous section. If there\
    \ are multiple Python versions on the system, they will appear in the dropdown\
    \ list.\nIn the middle of the right-side panel in Figure 2.4, all packages are\
    \ listed and available to this environment. If select different interpreters,\
    \ if any, from dropdown list, a different set of available packages will appear\
    \ in the package list area. The required packages can be installed from here.\n\
    \nThere are +, – and triangle icons are shown at the top of the package list,\
    \ as highlighted in Figure 2.4, + icon is to install new packages, – icon is to\
    \ remove packages from the list, triangle icon is to upgrade existing packages.\n\
    \nIn the package list in Figure 2.4, *pip* is an existing package, it’s current\
    \ version is 22.3.1, but the latest version is 23.0.1, so there is a triangle\
    \ in front of the latest version number meaning a upgrade is available. To upgrade\
    \ it, simply select the *pip* row and click the triangle icons at the top, it\
    \ will upgrade it.\n\nIn order to install OpenCV, click the + icon at the top,\
    \ the *Available Packages* screen is displayed as Figure 2.5 below, in the search\
    \ bar enter “opencv-python” as keyword, a list of packages that included the keyword\
    \ is displayed at the left-side. Select “opencv-python” from the list, its description\
    \ is displayed on the right-side of the screen, including its version. Then click\
    \ *Install Package* button at the bottom to install it.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_27_0.png)\n\
    \nFigure 2.5 PyCharm -- Available Packages\n\nWaiting for the message showing\
    \ “*Package ‘opencv-python’ installed successfully*”. Then go back to the Settings\
    \ window, *opencv-python* is shown in the list which indicates that it is installed,\
    \ at the same time another package called *numpy* is also installed, as shown\
    \ in Figure 2.6 below.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_28_0.png)\n\
    \nFigure 2.6 Pycharm -- Packages Installed and Upgraded\n\nIn the highlighted\
    \ area in Figure 2.6 both *numpy* and *opencv-python* are installed. And *pip*\
    \ is also upgraded to the latest version.\nIf for some reason *numpy* is not installed,\
    \ you will need to do the same as above to install it, because it will be used\
    \ in this book.\nThen, close the Settings window by clicking OK button. An empty\
    \ project is successfully created and required packages are installed.\n\n###\
    \ 2.3.3. Load the Project Files\n\nAlternatively, instead of creating a brand-new\
    \ project with PyCharm, you can download or clone the Git repository as described\
    \ in section 1.3. After the source codes are available in the local machine, use\
    \ PyCharm to open the project.\nLaunch PyCharm, in the “*Welcome to PyCharm*”\
    \ screen, click “*Open*” button, select the folder of the source codes you have\
    \ downloaded or cloned, then click “*OK*” to open the project files, as shown\
    \ in Figure 2.7.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_29_0.png)\n\nFigure\
    \ 2.7 Pycharm -- Open a Project\n\nThen, all the files are loaded into the PyCharm\
    \ environment, as shown in Figure 2.8 below. The left side is the navigation panel,\
    \ all files in this project can be found from there. The right side is the code\
    \ panel, files can be opened, viewed, edited, and run from here. The bottom part\
    \ is the execution output or status area.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_29_1.png)\n\
    \nFigure 2.8 Pycharm IDE Screen\n\nBefore running the codes, make sure the correct\
    \ *Python Interpreter* is selected and the required packages are available and\
    \ upgraded to the latest versions, as described in the previous section 2.3.2.\n\
    \nPlease reference the Pycharm Get-Started Guide at [https://www.jetbrains.com/help/pycharm/quick-start-guide.html](https://www.jetbrains.com/help/pycharm/quick-start-guide.html)\
    \ if you want to be more familiar with the IDE.\n\nThe source codes are organized\
    \ in a way that corresponds to the chapters of this book; all the files are grouped\
    \ by chapters. For example, all the source codes for chapter 3 are under the folder\
    \ called “3. *OpenCV Basics*”; the source codes for chapter 4 are in the folder\
    \ called “4. *User Interaction*”, and so on.\n\nAll resource files like image\
    \ or video files are in the *res* folder, and all common files are in the *common*\
    \ folder.\n\n### 2.3.4. Hello OpenCV\n\nSource: HelloOpenCV.py\n\nNow let’s try\
    \ a very simple program to make sure the installation is appropriately completed.\
    \ The source code file is called *HelloOpenCV.py* in “2. Installation” folder.\
    \ From the left navigation panel, browse the files for this project, navigate\
    \ to “2. *Installation*” and find “*HelloOpenCV.py*”, double click it. It is opened\
    \ in the right-side panel."
  mdcn: "使用 *apt* 工具在 Ubuntu 上安装 Python 是一个简单直接的过程。*apt*（高级包工具）是 Ubuntu 和其他基于 Debian\
    \ 的 Linux 系统中用于管理软件包的命令行工具。软件包是预编译的软件集合，可以轻松地在 Linux 系统上安装、更新和卸载。它提供了一个简单易用的界面来搜索、安装和卸载软件包。它还允许用户更新软件包列表、将系统升级到最新版本以及管理软件源。\n\
    \n以下是分步指南：\n\n1.  启动 Ubuntu 22.04，以 root 用户或具有 sudo 权限的用户身份登录，并打开一个新的终端窗口，运行以下命令来更新和升级系统，确保其是最新的：\n\
    \n    ```bash\n    $ sudo apt update && sudo apt upgrade\n    ```\n\n2.  通过执行以下命令安装\
    \ Python 的先决条件：\n\n    ```bash\n    $ sudo apt install software-properties-common\n\
    \    ```\n\n3.  接下来，建议将 *deadsnakes PPA* 添加到源列表中，这使得在 Ubuntu 系统上并行安装多个 Python\
    \ 版本成为可能。因此，系统上不仅可以有 Python 3.10，还可以同时安装 Python 3.9、3.8 或 3.7。有关 *deadsnakes PPA*\
    \ 的更多详细信息，请参阅 [https://tooling.bennuttall.com/deadsnakes/](https://tooling.bennuttall.com/deadsnakes/)。执行以下命令进行安装：\n\
    \n    ```bash\n    $ sudo add-apt-repository ppa:deadsnakes/ppa\n    ```\n\n \
    \   当提示时，按 Enter 键继续：\n\n    ```\n    Press [ENTER] to continue or Ctrl-c to cancel\
    \ adding it.\n    ```\n\n4.  完成后，再次运行以下命令进行更新，以刷新新安装的 PPA，然后安装 Python 3.10：\n\n\
    \    ```bash\n    $ sudo apt update\n    $ sudo apt install python3.10\n    ```\n\
    \n5.  上述执行成功完成后，Python 3.10 应该已安装在 Ubuntu 系统上并可以使用。现在通过输入以下命令来验证，显示已安装 Python\
    \ 的版本：\n\n    ```\n    $ python3.10 --version\n    ```\n\n    输出如下所示，\n    ```\n\
    \    Python 3.10.5\n    ```\n\n    这表明 Python 已成功安装在系统上。\n\n## 2.2.2. 在 Ubuntu\
    \ 上安装 PyCharm\n\nPyCharm 是一个跨平台工具，也可在 Linux 上使用。本节介绍如何在 Ubuntu 系统上安装它。\n通过 Ubuntu\
    \ 命令行安装非常简单直接：\n\n```\n$ sudo snap install pycharm-community -classic\n```\n\n\
    全部完成。安装过程完成后，可以通过以下命令启动 PyCharm：\n\n```\n$ pycharm-community\n```\n\n## 2.3. 配置\
    \ PyCharm 并安装 OpenCV\n\n### 2.3.1. 创建新的 Python 项目\n\n启动 PyCharm 并创建一个新项目。\n\n\
    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_25_0.png)\n\n图 2.3 PyCharm -- 创建新项目\n\
    \n说明：\n\n| 位置 | 指定新项目的本地文件夹。所有项目文件将存储在此文件夹中。 |\n| :--- | :--- |\n| 使用新环境 | 保持默认\
    \ -- Virtualenv |\n| 位置 | 此位置将根据上面的“位置”自动更改，它指定 Python 环境设置的位置。 |\n| 基础解释器 | 确保使用的是前面章节中安装的\
    \ Python 3.10。本书将全程使用此版本。 |\n| 创建 main.py 欢迎脚本 | 是否选中无关紧要。如果选中，在创建项目时会自动创建一个 main.py\
    \ 文件。 |\n\n正确设置参数后，点击底部的 *Create* 按钮创建项目。\n\n### 2.3.2. 安装和升级 OpenCV 及库\n\n创建项目后，所有库（包括\
    \ OpenCV）都可以在 PyCharm 内部安装。\n选择 File -> Settings，将显示设置屏幕，\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_26_0.png)\n\
    \n项目名称 *OpenCV* 是我们上一步刚刚创建的，因此在左侧导航面板中显示为 *Project: OpenCV*，如图 2.4 所示。如果你将项目命名为其他名称，它将显示“*Project:\
    \ [你的项目名称]*”。然后选择其下的“*Python Interpreter*”。\n在右侧面板中，*Python Interpreter* 应显示我们在前面章节中安装的\
    \ Python 版本。如果系统上有多个 Python 版本，它们将出现在下拉列表中。\n在图 2.4 右侧面板的中间，列出了所有可用于此环境的软件包。如果从下拉列表中选择不同的解释器（如果有的话），软件包列表区域将显示一组不同的可用软件包。可以从这里安装所需的软件包。\n\
    \n软件包列表顶部显示有 +、– 和三角形图标，如图 2.4 中高亮所示，+ 图标用于安装新软件包，– 图标用于从列表中移除软件包，三角形图标用于升级现有软件包。\n\
    在图 2.4 的软件包列表中，*pip* 是一个现有软件包，其当前版本是 22.3.1，但最新版本是 23.0.1，因此在最新版本号前有一个三角形，表示有可用的升级。要升级它，只需选择\
    \ *pip* 行并点击顶部的三角形图标，它就会进行升级。\n\n为了安装 OpenCV，点击顶部的 + 图标，将显示如图 2.5 所示的 *Available\
    \ Packages* 屏幕，在搜索栏中输入“opencv-python”作为关键词，左侧会显示包含该关键词的软件包列表。从列表中选择“opencv-python”，其描述将显示在屏幕右侧，包括其版本。然后点击底部的\
    \ *Install Package* 按钮进行安装。\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_27_0.png)\n\
    \n图 2.5 PyCharm -- 可用软件包\n\n等待显示消息“*Package ‘opencv-python’ installed successfully*”。然后返回设置窗口，*opencv-python*\
    \ 显示在列表中，表明它已安装，同时另一个名为 *numpy* 的软件包也已安装，如下图 2.6 所示。\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_28_0.png)\n\
    \n图 2.6 Pycharm -- 已安装和升级的软件包\n\n在图 2.6 的高亮区域中，*numpy* 和 *opencv-python* 都已安装。并且\
    \ *pip* 也已升级到最新版本。\n如果由于某种原因 *numpy* 未安装，你需要像上面一样安装它，因为它将在本书中使用。\n然后，点击 OK 按钮关闭设置窗口。一个空项目已成功创建，并且所需的软件包已安装。\n\
    \n### 2.3.3. 加载项目文件\n\n或者，你也可以不使用 PyCharm 创建全新的项目，而是按照第 1.3 节所述下载或克隆 Git 仓库。源代码在本地机器上可用后，使用\
    \ PyCharm 打开项目。\n启动 PyCharm，在“*Welcome to PyCharm*”屏幕中，点击“*Open*”按钮，选择你下载或克隆的源代码文件夹，然后点击“*OK*”打开项目文件，如图\
    \ 2.7 所示。\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_29_0.png)\n\n图 2.7 Pycharm\
    \ -- 打开项目\n\n然后，所有文件都加载到 PyCharm 环境中，如下图 2.8 所示。左侧是导航面板，可以在此找到项目中的所有文件。右侧是代码面板，可以在此打开、查看、编辑和运行文件。底部是执行输出或状态区域。\n\
    \n![](img/b99f6edaf6f730ad313ce66bc5a26be2_29_1.png)\n\n图 2.8 Pycharm IDE 屏幕\n\
    \n在运行代码之前，请确保选择了正确的 *Python Interpreter*，并且所需的软件包可用并已升级到最新版本，如前面的 2.3.2 节所述。\n\
    \n如果你想更熟悉该 IDE，请参考 Pycharm 入门指南 [https://www.jetbrains.com/help/pycharm/quick-start-guide.html](https://www.jetbrains.com/help/pycharm/quick-start-guide.html)。\n\
    \n源代码的组织方式与本书的章节相对应；所有文件按章节分组。例如，第 3 章的所有源代码都在名为“3. *OpenCV Basics*”的文件夹下；第 4\
    \ 章的源代码在名为“4. *User Interaction*”的文件夹中，依此类推。\n\n所有资源文件（如图像或视频文件）都在 *res* 文件夹中，所有公共文件都在\
    \ *common* 文件夹中。\n\n### 2.3.4. Hello OpenCV\n\n源文件：HelloOpenCV.py\n\n现在让我们尝试一个非常简单的程序，以确保安装已正确完成。源代码文件名为\
    \ *HelloOpenCV.py*，位于“2. Installation”文件夹中。从左侧导航面板浏览此项目的文件，导航到“2. *Installation*”并找到“*HelloOpenCV.py*”，双击它。它将在右侧面板中打开。"

- md: "## 6.4.2. Find Color Labels\n\nSource: ColorDetection.py\nLibrary: common/Detector.py\n\
    \nIn the last section we have obtained the range of hue, saturation and value\
    \ for different colors, based on these values we can find out the color labels.\n\
    Define a class called `ColorDetector` and define a dictionary with the color label\
    \ and the lower and upper HSV values for that color. Then look up the dictionary\
    \ with an HSV value, if the values are within the range of a color, its color\
    \ label can be obtained.\nFor example, say a HSV value is (50, 120, 234), by looking\
    \ up the dictionary it’s found that this value is within the range of green, then\
    \ the color label is green.\n\nHere are the codes:\n\n```python\nclass ColorDetector:\n\
    \    def __init__(self):\n        self.colors = {\n            \"Red_1\":  ([[0,90,100],\
    \  [10,255,255]]),\n            \"Yellow\": ([[11,90,100], [35,255,255]]),\n \
    \           \"Green\":  ([[36,90,100], [70,255,255]]),\n            \"Cyan\":\
    \   ([[71,90,100], [100,255,255]]),\n            \"Blue\":   ([[101,90,100],[120,255,255]]),\n\
    \            \"Violet\": ([[121,90,100],[130,255,255]]),\n            \"Magenta\"\
    :([[131,90,100],[159,255,255]]),\n            \"Pink\":   ([[161,90,100],[166,255,255]]),\n\
    \            \"Red_2\":  ([[167,90,100],[190,255,255]]),\n        }\n\n    def\
    \ get_color_label(self, hsv, mask):\n        color_label = \"Unknown\"\n     \
    \   masked_hsv = cv2.bitwise_and(hsv, hsv, mask=mask)\n        mean = cv2.mean(masked_hsv,\
    \ mask=mask)[:3]\n        for (i, (label, (lower, upper))) in enumerate(self.colors.items()):\n\
    \            if np.all(np.greater_equal(mean, lower)) and np.all(np.less_equal(mean,\
    \ upper)):\n                color_label = label\n        return color_label, mean\n\
    ```\n\nExplanations:\n\n| Line | Description |\n|------|-------------|\n| 4 -\
    \ 12 | Create a dictionary with the color labels and the lower/upper HSV values.\
    \ |\n| 15 | Define a function to look up the color label dictionary, the HSV image\
    \ and a mask is passed in as a parameter. |\n| 17 | Apply the mask to the HSV\
    \ image. |\n| 18 | Get the mean value of the masked area. E.g. if a masked area\
    \ is the red portion of the image, the mean value of this area will be in red\
    \ range. |\n| 19 - 22 | Look up the dictionary to check the mean value within\
    \ which color range. |\n| 23 | Return the color label and the mean value. |\n\n\
    Now look at this example, the image is the same as what we did in shape detection,\
    \ as Figure 6.17. There are different shapes with different colors in this image,\
    \ previously we detected the shapes, but now we want to find the color labels\
    \ for each shape.\n\nSimilar to the shape detection in section 6.3, first find\
    \ out all the contours of the shapes in this image, then create a mask for each\
    \ contour, cv2.drawContours() function is used to create the mask, the parameter\
    \ cv2.FILLED is to draw the closed contour with inside filled, as below code snippet:\n\
    \n```python\ncontours, hierarchy = cv2.findContours(image,\n    cv2.RETR_EXTERNAL,\n\
    \    cv2.CHAIN_APPROX_NONE)\n\nfor contour in contours:\n    mask = np.zeros(image.shape[:2],\
    \ np.uint8)\n    cv2.drawContours(mask, [contour], -1, (255),\n              \
    \       cv2.FILLED)\n```\n\nA mask is created and looks like Figure 6.18, the\
    \ triangle at the upper left of the image:\n\nThen apply it to the HSV image,\
    \ which was converted from the original image. And the mean values can be retrieved\
    \ by calling cv2.mean() function.\n\n```python\nmasked_hsv = cv2.bitwise_and(hsv,hsv,mask=mask)\n\
    mean = cv2.mean(masked_hsv, mask=mask)[:3]\n```\n\nThe mean HSV values will be\
    \ used to look up the color label dictionary that was defined in the ColorDetector\
    \ class earlier. The below code snippets are to look up the dictionary for the\
    \ color label, it checks whether the mean value is between the lower and upper\
    \ value for a color.\n\n```python\nfor (i, (label, (lower, upper))) in enumerate(self.colors.items()):\n\
    \    if np.all(np.greater_equal(mean, lower)) and np.all(np.less_equal(mean, upper)):\n\
    \        color_label = label\n```\n\nThe color label for the upper-left triangle\
    \ is detected as:\nViolet [129. 128. 170.]\n\nThe above steps will be repeated\
    \ for every shape in the image, the results are shown as Figure 6.19 below, the\
    \ color label as well as the HSV values are displayed along with each shape.\n\
    \nThe results are also printed out as:\n\n```\nPink [165. 133. 167.]\nBlue [104.\
    \ 124. 221.]\nGreen [ 51. 186. 121.]\nViolet [129. 128. 170.]\n```\n\nIn this\
    \ example we defined the color label in a broader range, e.g. both yellow and\
    \ orange are identified as Yellow; the green, dark green and light green are all\
    \ identified as Green. If you want, you can define it on a more granular level\
    \ in the dictionary in `ColorDetector` class.\n\nFor example, instead of only\
    \ one entry for the yellow,\n\n```python\n\"Yellow\":   ([[11, 90, 100],  [35,\
    \ 255, 255]]),\n```\n\nYou might think to break it down into more entries for\
    \ the yellows, like gold, orange, honey and canary, as below code snippets. The\
    \ lower and upper values need to be figured out one by one though.\n\n```python\n\
    \"Gold\":     ([[11, 90, 100], [xxx, xxx, xxx]]),\n\"Orange\":   ([[xxx, xxx,\
    \ xxx], [xxx, xxx, xxx]]),\n\"Yellow\":   ([[xxx, xxx, xxx], [xxx, xxx, xxx]]),\n\
    \"Honey\":    ([[xxx, xxx, xxx], [xxx, xxx, xxx]]),\n\"Canary\":   ([[xxx, xxx,\
    \ xxx], [35, 255, 255]]),\n```\n\n## 6.5. Text Recognition with Tesseract\n\n\
    Source: TextRecognition.py\n\nText recognition, or Optical Character Recognition\
    \ (OCR) is a process to detect texts from an image which could be a scanned document\
    \ or handwritten texts, and convert them into machine readable texts that can\
    \ be used for various purposes, such as editing, searching, and storing.\n\nThis\
    \ process involves several steps, including image preprocessing, text detection,\
    \ character segmentation, and character recognition. In the first step, the image\
    \ is preprocessed to improve the quality of the scanned or handwritten texts.\
    \ This may involve removing noises, enhancing contrast, and sharpening the image.\n\
    \nNext, text detection algorithms are used to locate the areas of the image that\
    \ contain text. This is done by analyzing the image for patterns that resemble\
    \ text, such as lines and curves, and then extracting those regions for further\
    \ processing.\n\nOnce the text has been detected, the image is segmented into\
    \ individual characters or words. This involves separating the text into its constituent\
    \ parts, which are then recognized using character recognition algorithms.\n\n\
    OCR technology has a wide range of applications, including document digitization,\
    \ text translation, and automated data entry. It is commonly used in industries\
    \ such as finance, healthcare, and government, where the ability to quickly and\
    \ accurately process large amounts of text data can be critical to decision-making\
    \ and operations.\n\nTesseract is an open-source text recognition library developed\

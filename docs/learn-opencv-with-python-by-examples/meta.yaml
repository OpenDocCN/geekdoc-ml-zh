    Figure 3.6 is the correct one, the blue, green and red channels are all in grayscale,
    they are mixed together to produce the color image.

    Each channel is represented by an 8-bit value ranging from 0 to 255, the combination
    of the three primary colors at their maximum intensity (255, 255, 255) results
    in white, while (0, 0, 0) results in black, anything in between results in different
    colors. The same value in three channels, such as (125, 125, 125), represents
    a gray color.



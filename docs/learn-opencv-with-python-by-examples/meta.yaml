    # 7.2. K-Nearest Neighbors


    # 7.2.1. What is K-Nearest Neighbors


    Source: K-NearestNeighbors.py


    K-Nearest Neighbors (KNN) is a machine learning algorithm that works by finding
    the $k$ closest data points in the training set to a new input data point and
    using the majority class of those $k$ neighbors to make a prediction for the input
    data point.

    It’s a supervised machine learning algorithm, which is different from K-means
    in the previous section. It’s supervised because it relies on labeled input data
    to learn and predict an appropriate output when given new unlabeled data. KNN
    is easy and simple, and can be used to solve classification problems as K-means
    does.

    KNN is a *lazy* and *non-parametric* algorithm. Lazy means the dataset is not
    needed when fitting or training the models, instead it’s used in the prediction
    phase. It only stores the dataset in the fitting or training phase, it does almost
    nothing until last minute when making predictions, that''s why it''s called *lazy*
    algorithm. This, however, makes predictions slower than fitting or training.

    The opposite of lazy is *eager* algorithm, like the previous K-means algorithm,
    the training data is used to fit or train the model.

    KNN is a *non-parametric* algorithm means it does not make any assumptions on
    the distribution of the dataset. In the case of parametric algorithm, like Support
    Vector Machine in the next section, it has to select appropriate kernel functions
    based on'
  merge: -1
  pgno: 214
- img_proc: true
  md: 'the distribution of the dataset, but it’s not the case for KNN. This is sometimes

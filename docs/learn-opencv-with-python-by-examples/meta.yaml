    It comes with pre-trained models to support background editing of images and videos
    using a few lines of codes. The website of PixelLib is located at: [https://github.com/ayoolaolafenwa/PixelLib](https://github.com/ayoolaolafenwa/PixelLib)


    With a few lines of codes, we can simply implement the following operations:


    +   - Remove background – remove the background.

    - Gray background – make the background grayscale while keeping the color of foreground
    object.

    - Blur background – make the background blurred while keeping the foreground object
    clear.

    - Change background – change a different image as background while keeping the
    foreground object.


    The PixelLib can also work on videos, please reference its official website for
    details and tutorials. This section focuses only on the above four operations
    on the images.



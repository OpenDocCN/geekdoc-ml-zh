    # 7.1.2. Color Quantization


    Source: K-MeansColorQuantization.py

    Library: common/color_wheel.py


    One of the applications of K-Means is Color Quantization, which is the process
    of reducing the number of distinct colors in an image while preserving its overall
    appearance. It is a commonly used technique in image processing, computer graphics,
    and computer vision.


    The purpose of color quantization is 1) to reduce the memory and the size to store
    the image; and 2) to display the images on some devices that have limitations
    on the number of distinct colors. Sometimes it can also be used to create artistic
    effects in images, such as posterization or stylization.


    By reducing the number of colors in an image, color quantization can help reduce
    the size of image files, increase image compression, and improve the efficiency
    of image processing operations. It is commonly used in image compression algorithms,
    digital art, and computer graphics.


    The basic idea behind color quantization is to replace the original colors in
    the image with a smaller set of colors. This is usually done by clustering similar
    colors together and replacing them with their average color value.


    How many distinct colors can an image have? In theory, an image has three channels
    of blue, green and red, each can have 256 values, therefore totally 256 * 256
    * 256 = 16,777,216 possible distinct colors, although in most cases there are
    not so many colors in an image. The following code snippets will count the distinct
    colors in an image,


    ```

    1 def get_distinct_colours(image):


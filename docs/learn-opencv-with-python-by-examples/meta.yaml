  md: 'We use two centroids to explain how K-Means works. Here are the codes to produce
    the sample data in Figure 7.2, the `make_blobs()` in line 6 is a function from
    sklearn package to generate sample data. matplotlib in line 3 is a package to
    visualize the data.


    ```

    1  import numpy as np

    2  import cv2 as cv

    3  from matplotlib import pyplot as plt

    4  from sklearn.datasets import make_blobs

    5  def sample_cluster():

    6      X, y = make_blobs(n_samples=600, centers=2,

    7          cluster_std=2.8, random_state=1)

    8      X = np.float32(X)

    9      plt.figure(figsize=(6, 4))

    10     plt.scatter(X[:,0],X[:,1],s=10,cmap=''spring'')

    11     plt.xlabel(''X'')

    12     plt.ylabel(''Y'')

    13     plt.show()

    14     return X, y

    ```


    K-Means will perform the following steps,


    **Step 1:** Randomly initialize $k$ centroids, in our case $k=2$, so two centroids:
    $\mu_1$ and $\mu_2$ are initialized.


    **Step 2:** calculate the distance from each data point to both centroids and
    label the data. If a data is closer to $\mu_1$, then the data is labeled with
    0; if it is closer to $\mu_2$ then labeled with 1. If there are more centroids,
    then labeled with 2, 3, ..., etc.


    Run the codes below for one iteration of K-Means, get the results of Step 2, as
    in Figure 7.3:


    ```

    15 criteria = (cv.TERM_CRITERIA_MAX_ITER, 1, 1.0)

    16 ret,label,center=cv2.kmeans(X, 2, None , criteria, 1,

    17                             cv2.KMEANS_RANDOM_CENTERS)

    ```'

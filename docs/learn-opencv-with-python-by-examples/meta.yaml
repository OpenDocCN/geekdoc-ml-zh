    ## 7.5. Convolutional Neural Network (CNN)\n\n### 7.5.1. What is a Convolutional\
    \ Neural Network\n\nA Convolutional Neural Network (CNN) is a type of deep learning\
    \ neural network that is commonly used for analyzing images and pictures. CNN\
    \ is designed to automatically detect patterns and features in images, making\
    \ them well-suited for tasks such as image recognition, object detection such\
    \ as faces and eyes, and image segmentation such as separating the foregrounds\
    \ from the backgrounds.\n\nIn the previous section of an artificial neural network\
    \ (ANN), the handwritten digits dataset has images of 28 × 28 pixels, which means\
    \ there are 784 pixels for each image, in order to feed the data into an ANN,\
    \ the input layer has 784 nodes to take the input data.\n\nNow consider a high-resolution\
    \ 4K color picture that has 3840 × 2160 pixels, meaning 8 million pixels, and\
    \ each pixel has three color channels, it’s not realistic to build a neural network\
    \ to correspond so many input data for each picture, let alone tens of thousands\
    \ of pictures are needed to process.\n\nWhen human look at a picture we do not\
    \ scan the pixels one by one from top-left towards bottom-right, instead we look\
    \ at the features or objects in the picture. For example, in a picture of a dog,\
    \ we look at things like eyes, nose, mouth, ears, head, body and tails, then we\
    \ know it’s a dog. And in most cases, we ignore the background or colors to identify\
    \ the dog. CNNs do it in a similar way to find “features” from the images, the\
    \ features are things like eyes, nose, mouth etc. Then send these features to\
    \ a neural network to learn.\n\nThe basic building block of a CNN is the convolutional\
    \ layer, which performs a mathematical operation called *convolution* on the input\
    \ image. This operation involves sliding a small filter, also called a *kernel*\
    \ or a *feature detector*, across the image and computing the dot product between\
    \ the filter weights and the corresponding pixel values in the image. The output\
    \ of this operation is a *feature map* that highlights the areas of the image\
    \ that match the filter's pattern.\n\nCNN typically also includes other types\
    \ of layers known as pooling layers, and fully connected layers. Pooling layers\
    \ down-sample the feature maps by reducing their size, and fully connected layers\
    \ connect the output to an ANN, allowing the CNN to learn complex relationships\
    \ between features.\n\nSee materials #15 and #16 in References at the end of this\
    \ book for some detailed descriptions of CNN.\n\n### 7.5.2. Convolution Layer\n\
    \nSource: ConvolutionalNeuralNetwork.py\n\nConvolution is a mathematical operation\
    \ that is commonly used in signal and image processing. In CNNs, convolution is\
    \ used in the convolutional layers to extract features from input images.\n\n\
    In mathematics convolution is an operation on two functions, *f* and *g*, to produce\
    \ a third function (*f* ∗ *g*), that represents how the shape of one is modified\
    \ by the other. It’s defined as:\n\n$(f * g)(t) = \\int_{-\\infty}^{\\infty} f(\\\
    tau)g(t - \\tau)d\\tau$\n\nWe are not going to deep-dive into the mathematical\
    \ details here, the basic idea is to consider one function as the original image,\
    \ and the other function as a feature, the convolution operation is to identify\
    \ or extract the features from the original image.\n\nFor example, there is a\
    \ 1D array:\n\n$f = [1, 2, 1]$\n\nAnd there is another 1D array:\n\n$g = [3, 0,\
    \ 2, 4, 2, 1]$\n\nThe convolution of $f * g$ is defined as the integral of one\
    \ array sweeping over the second and multiplied at each position of overlapping.\
    \ Say, we want to detect a pattern of $[2, 4, 2]$ from $g$, then choose a feature\
    \ $f = [1, 2, 1]$, and do a convolution operation.\n\nThe convolution is to use\
    \ $f$ to sweep over $g$ from left to right, and perform the dot product on the\
    \ covered items, the dot product means the sum of the products of the corresponding\
    \ items under the covered items. So the first item of the result is calculated\
    \ as:\n\n$1 \\times 3 + 2 \\times 0 + 1 \\times 2 = 5$\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_275_0.png)\n\
    \nThen $f$ is shifted towards right by one item and calculate the sum of products\
    \ for the second item:\n\n$1 \\times 0 + 2 \\times 2 + 1 \\times 4 = 8$\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_275_1.png)\n\
    \nAnd then $f$ is shifted again towards right one item by one item, and calculate\
    \ the rest items,\n\n$1 \\times 2 + 2 \\times 4 + 1 \\times 2 = 12$"

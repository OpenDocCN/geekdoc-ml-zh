- md: "# Learn OpenCV with Python by Examples\n\nImplement Computer Vision Algorithms\
    \ Provided by OpenCV with Python for Image Processing, Object Detection and Machine\
    \ Learning\n\nJames Chen\n\nCopyright © 2023 by James Chen, All Rights Reserved.\n\
    Published by James Chen\nISBN: 978-1-7389084-5-5\nSecond Edition 2023\nFirst Edition\
    \ 2022\n\n# Preface\n\nIn recent years, the field of Computer Vision has experienced\
    \ a rapid growth and has become an essential part of many industries. The ability\
    \ to extract meaningful information from images and videos has led to the development\
    \ of innovative applications in various fields, including robotics, autonomous\
    \ vehicles, medical imaging, security, and many others.\n\nComputer Vision is\
    \ a field of study that aims to enable machines to interpret and understand the\
    \ visual world around us. It has become increasingly relevant in recent years,\
    \ as we continue to develop more intelligent systems that can analyze and make\
    \ sense of the vast amounts of visual data that we generate every day.\n\nOpenCV\
    \ is one of the most popular open-source libraries for Computer Vision and Image\
    \ Processing, providing a wide range of algorithms for tasks such as image and\
    \ video processing, object detection and recognition, feature extraction, and\
    \ more.\n\nPython, on the other hand, is a high-level programming language that\
    \ has become one of the most popular languages for data science and machine learning\
    \ communities, making it a perfect match for OpenCV.\n\nThis book is a practical\
    \ guide that will help you learn the basics of computer vision using OpenCV and\
    \ Python. The book is designed for anyone who wants to learn computer vision from\
    \ scratch or for those who have some experience with OpenCV and want to expand\
    \ their knowledge further. The book covers the fundamental concepts of image processing\
    \ and computer vision and introduces the key algorithms and techniques provided\
    \ by OpenCV to implement them.\n\nThrough step-by-step tutorials and hands-on\
    \ examples, you will learn how to use OpenCV to perform tasks such as image filtering,\
    \ feature detection, segmentation, object detection, and more. In addition, the\
    \ book also covers the basics of Machine Learning algorithms, such as SVM, KNN,\
    \ K-means, ANN, and CNN, and demonstrates how they can be applied in image processing\
    \ tasks.\n\nThe book consists of seven chapters, each of which focuses on a specific\
    \ computer vision task. The chapters are organized in a logical order, starting\
    \ with the basics of image processing and working up to more advanced topics such\
    \ as object detection, recognition, machine learning algorithms as well as deep\
    \ learning neural networks. Each chapter contains multiple examples, each of which\
    \ demonstrates a particular computer vision algorithm in a step-by-step manner.\
    \ The examples are written in Python, and the code is explained in detail, so\
    \ even beginners can follow along easily. All codes in this book are available\
    \ at Github.\n\nBy the end of this book, you will have a solid foundation in computer\
    \ vision and OpenCV, and you will be able to apply these skills to a wide range\
    \ of real-world problems. Whether you want to develop your own computer vision\
    \ applications, work with existing computer vision systems, or simply understand\
    \ how these systems work, this book is an excellent resource.\n\nWhether you are\
    \ a student, a hobbyist, or a professional in the field, this book will help you\
    \ gain a comprehensive understanding of OpenCV with Python and provide you with\
    \ the necessary skills to implement advanced computer vision applications. I hope\
    \ that this book will be a useful resource for you and that you will enjoy learning\
    \ OpenCV with Python through practical examples.\n\n# Table of Contents\n\n##\
    \ 1 INTRODUCTION\n\n- 1.1 About OpenCV\n- 1.2 Target Audiences of This Book\n\
    - 1.3 Source Codes for This Book\n- 1.4 Hardware Requirements and Software Versions\n\
    - 1.5 How This Book Is Organized\n\n## 2 INSTALLATION\n\n- 2.1 Install on Windows\n\
    \  - 2.1.1 Install Python on Windows 10\n  - 2.1.2 PyCharm, the Integrated Development\
    \ Environment\n- 2.2 Install Python on Ubuntu\n  - 2.2.1 Install Python on Ubuntu\n\
    \  - 2.2.2 Install PyCharm on Ubuntu\n- 2.3 Configure PyCharm and Install OpenCV\n\
    \  - 2.3.1 Create a New Python Project\n  - 2.3.2 Install and Upgrade OpenCV and\
    \ Libraries\n  - 2.3.3 Load the Project Files\n  - 2.3.4 Hello OpenCV\n\n## 3\
    \ OpenCV BASICS\n\n- 3.1 Load and Display Images\n  - 3.1.1 Load Color Images\n\
    \  - 3.1.2 Load Grayscale Images\n  - 3.1.3 Convert Color Image to Grayscale\n\
    - 3.2 Load and Display Videos\n- 3.3 Display Webcam\n- 3.4 Image Fundamentals\n\
    \  - 3.4.1 Pixels\n  - 3.4.2 BGR Color Space and Channels\n  - 3.4.3 HSV Color\
    \ Space and Channels\n- 3.5 Draw Shapes\n  - 3.5.1 Create an Empty Canvas\n  -\
    \ 3.5.2 Draw a Line\n  - 3.5.3 Draw Rectangles, Circles, Ellipses and Polylines\n\
    - 3.6 Draw Texts\n- 3.7 Draw an OpenCV-like Icon\n\n## 4 User Interaction\n\n\
    - 4.1 Mouse Operations\n- 4.2 Draw Circles with Mouse\n- 4.3 Draw Polygon with\
    \ Mouse\n- 4.4 Crop an Image with Mouse\n- 4.5 Input Values with Trackbars\n\n\
    ## 5 Image Processing\n\n- 5.1 Conversion of Color Spaces\n  - 5.1.1 Convert BGR\
    \ to Gray\n  - 5.1.2 Convert Grayscale to BGR\n  - 5.1.3 Convert BGR to HSV\n\
    \  - 5.1.4 Convert HSV to BGR\n- 5.2 Resize, Crop and Rotate an Image\n- 5.3 Adjust\
    \ Contrast and Brightness of an Image\n- 5.4 Adjust Hue, Saturation and Value\n\
    - 5.5 Blend Image\n- 5.6 Bitwise Operation\n- 5.7 Warp Image\n- 5.8 Blur Image\n\
    \  - 5.8.1 What is Gaussian Blur\n  - 5.8.2 Gaussian Blur\n  - 5.8.3 Median Blur\n\
    - 5.9 Histogram\n  - 5.9.1 About Histogram\n  - 5.9.2 Histogram for Grayscale\
    \ Images\n  - 5.9.3 Histogram for Color Images\n\n## 6 OBJECT DETECTION\n\n- 6.1\
    \ Canny Edge Detection\n- 6.2 Dilation and Erosion\n- 6.3 Shape Detection\n  -\
    \ 6.3.1 Pre-processing for Shape Detection\n  - 6.3.2 Find Contours\n  - 6.3.3\
    \ Detect the Type, Area and Perimeter of the Shapes\n  - 6.3.4 Other Contour Features\n\
    - 6.4 Color Detection\n  - 6.4.1 Find Color from an Image\n  - 6.4.2 Find Color\
    \ Labels\n- 6.5 Text Recognition with Tesseract\n  - 6.5.1 Install and configure\
    \ Tesseract\n  - 6.5.2 Text Recognition\n- 6.6 Human Detection\n  - 6.6.1 Human\
    \ Detection from Pictures\n  - 6.6.2 Human Detection from Videos\n- 6.7 Face and\
    \ Eye Detection\n- 6.8 Remove Background\n  - 6.8.1 Remove Background by Color\n\
    \  - 6.8.2 Remove Background by Contour\n  - 6.8.3 Remove Background by Machine\
    \ Learning\n  - 6.8.4 Remove Background by Mask\n- 6.9 Blur Background\n\n## 7\
    \ MACHINE LEARNING\n\n- 7.1 K-Means Clustering\n  - 7.1.1 What is K-Means Clustering\n\
    \  - 7.1.2 Color Quantization\n  - 7.1.3 Handwritten Digits Grouping\n- 7.2 K-Nearest\
    \ Neighbors\n  - 7.2.1 What is K-Nearest Neighbors\n  - 7.2.2 KNN Evaluation\n\
    \  - 7.2.3 Recognize Handwritten Digits with KNN\n- 7.3 Support Vector Machine\n\
    \  - 7.3.1 What is Support Vector Machine\n  - 7.3.2 Recognize Handwritten Digits\
    \ with SVM\n  - 7.3.3 IRIS Dataset Classification\n- 7.4 Artificial Neural Network\
    \ (ANN)\n  - 7.4.1 What is an Artificial Neural Network (ANN)?\n  - 7.4.2 Activation\
    \ Functions\n  - 7.4.3 Recognize Handwritten Digits with ANN\n- 7.5 Convolutional\
    \ Neural Network (CNN)\n  - 7.5.1 What is a Convolutional Neural Network\n  -\
    \ 7.5.2 Convolution Layer\n  - 7.5.3 Pooling Layer\n  - 7.5.4 Fully Connected\
    \ Layer\n  - 7.5.5 CNN Architecture\n  - 7.5.6 Build a CNN Model with Tensorflow/Keras\n\
    \  - 7.5.7 Popular CNN Architectures\n\n## REFERENCES\n\n## ABOUT THE AUTHOR\n\
    \n# 1. Introduction\n\nComputer vision is an interdisciplinary field that focuses\
    \ on enabling machines to interpret and understand visual data from the world\
    \ around us. It involves the development of algorithms, techniques, and technologies\
    \ that can analyze images and videos, recognize patterns, and extract useful information\
    \ from visual data.\n\nComputer vision has a wide range of applications, including\
    \ autonomous vehicles, robotics, medical imaging, security and surveillance, and\
    \ even entertainment. For example, computer vision algorithms can be used to detect\
    \ objects in real-time video streams, recognize faces in images, and even help\
    \ doctors diagnose medical conditions from medical imaging data.\n\nTo achieve\
    \ these tasks, computer vision algorithms use a combination of techniques from\
    \ various fields, such as image processing, machine learning, deep learning and\
    \ artificial intelligence. Image processing techniques involve operations such\
    \ as filtering, edge detection, and segmentation and so on, which help to preprocess\
    \ and enhance visual data. Machine learning techniques, on the other hand, allow\
    \ computer vision systems to learn patterns from large datasets and make predictions\
    \ based on those patterns.\n\nComputer vision is a rapidly evolving field that\
    \ holds great promise for the development of intelligent systems that can perceive\
    \ and understand the"
  mdcn: "# 通过实例学习Python版OpenCV\n\n使用Python实现OpenCV提供的计算机视觉算法，用于图像处理、目标检测和机器学习\n\n\
    James Chen\n\n版权所有 © 2023 James Chen，保留所有权利。\n由James Chen出版\nISBN: 978-1-7389084-5-5\n\
    第二版 2023\n第一版 2022\n\n# 前言\n\n近年来，计算机视觉领域经历了飞速发展，已成为众多行业不可或缺的一部分。从图像和视频中提取有意义信息的能力，推动了机器人、自动驾驶汽车、医学成像、安防等多个领域的创新应用开发。\n\
    \n计算机视觉是一门旨在使机器能够解释和理解我们周围视觉世界的学科。随着我们不断开发更智能的系统来分析和理解每天产生的海量视觉数据，它在近年来变得越来越重要。\n\
    \nOpenCV是最受欢迎的计算机视觉和图像处理开源库之一，提供了广泛的算法，用于图像和视频处理、目标检测与识别、特征提取等任务。\n\n另一方面，Python是一种高级编程语言，已成为数据科学和机器学习社区最受欢迎的语言之一，使其与OpenCV成为完美搭配。\n\
    \n本书是一本实用指南，将帮助您使用OpenCV和Python学习计算机视觉的基础知识。本书面向任何想从零开始学习计算机视觉的人，或对OpenCV有一定经验并希望进一步扩展知识的人。本书涵盖了图像处理和计算机视觉的基本概念，并介绍了OpenCV提供的用于实现这些概念的关键算法和技术。\n\
    \n通过循序渐进的教程和实践示例，您将学习如何使用OpenCV执行图像滤波、特征检测、分割、目标检测等任务。此外，本书还涵盖了机器学习算法的基础知识，如SVM、KNN、K-means、ANN和CNN，并展示了它们如何应用于图像处理任务。\n\
    \n本书共分为七章，每章专注于一个特定的计算机视觉任务。章节按照逻辑顺序组织，从图像处理的基础知识开始，逐步深入到目标检测、识别、机器学习算法以及深度学习神经网络等更高级的主题。每章包含多个示例，每个示例都以分步方式演示特定的计算机视觉算法。示例使用Python编写，代码有详细解释，即使是初学者也能轻松跟上。本书所有代码均可在Github上获取。\n\
    \n读完本书，您将打下坚实的计算机视觉和OpenCV基础，并能够将这些技能应用于广泛的现实世界问题。无论您是想开发自己的计算机视觉应用、使用现有的计算机视觉系统，还是仅仅想了解这些系统的工作原理，本书都是极佳的资源。\n\
    \n无论您是学生、爱好者还是该领域的专业人士，本书都将帮助您全面理解Python版OpenCV，并为您提供实现高级计算机视觉应用所需的技能。希望本书能成为您有用的资源，并希望您通过实践示例享受学习Python版OpenCV的过程。\n\
    \n# 目录\n\n## 1 引言\n\n- 1.1 关于OpenCV\n- 1.2 本书目标读者\n- 1.3 本书源代码\n- 1.4 硬件要求和软件版本\n\
    - 1.5 本书组织结构\n\n## 2 安装\n\n- 2.1 在Windows上安装\n  - 2.1.1 在Windows 10上安装Python\n\
    \  - 2.1.2 集成开发环境PyCharm\n- 2.2 在Ubuntu上安装Python\n  - 2.2.1 在Ubuntu上安装Python\n\
    \  - 2.2.2 在Ubuntu上安装PyCharm\n- 2.3 配置PyCharm并安装OpenCV\n  - 2.3.1 创建新的Python项目\n\
    \  - 2.3.2 安装和升级OpenCV及库\n  - 2.3.3 加载项目文件\n  - 2.3.4 Hello OpenCV\n\n## 3 OpenCV基础\n\
    \n- 3.1 加载和显示图像\n  - 3.1.1 加载彩色图像\n  - 3.1.2 加载灰度图像\n  - 3.1.3 将彩色图像转换为灰度图像\n\
    - 3.2 加载和显示视频\n- 3.3 显示摄像头画面\n- 3.4 图像基础\n  - 3.4.1 像素\n  - 3.4.2 BGR颜色空间和通道\n\
    \  - 3.4.3 HSV颜色空间和通道\n- 3.5 绘制形状\n  - 3.5.1 创建空白画布\n  - 3.5.2 绘制直线\n  - 3.5.3\
    \ 绘制矩形、圆形、椭圆和多段线\n- 3.6 绘制文本\n- 3.7 绘制类似OpenCV的图标\n\n## 4 用户交互\n\n- 4.1 鼠标操作\n\
    - 4.2 用鼠标绘制圆形\n- 4.3 用鼠标绘制多边形\n- 4.4 用鼠标裁剪图像\n- 4.5 使用滑动条输入值\n\n## 5 图像处理\n\n\
    - 5.1 颜色空间转换\n  - 5.1.1 将BGR转换为灰度\n  - 5.1.2 将灰度转换为BGR\n  - 5.1.3 将BGR转换为HSV\n\
    \  - 5.1.4 将HSV转换为BGR\n- 5.2 调整图像大小、裁剪和旋转\n- 5.3 调整图像对比度和亮度\n- 5.4 调整色调、饱和度和明度\n\
    - 5.5 图像混合\n- 5.6 按位操作\n- 5.7 图像扭曲\n- 5.8 图像模糊\n  - 5.8.1 什么是高斯模糊\n  - 5.8.2 高斯模糊\n\
    \  - 5.8.3 中值模糊\n- 5.9 直方图\n  - 5.9.1 关于直方图\n  - 5.9.2 灰度图像的直方图\n  - 5.9.3 彩色图像的直方图\n\
    \n## 6 目标检测\n\n- 6.1 Canny边缘检测\n- 6.2 膨胀和腐蚀\n- 6.3 形状检测\n  - 6.3.1 形状检测的预处理\n\
    \  - 6.3.2 查找轮廓\n  - 6.3.3 检测形状的类型、面积和周长\n  - 6.3.4 其他轮廓特征\n- 6.4 颜色检测\n  - 6.4.1\
    \ 从图像中查找颜色\n  - 6.4.2 查找颜色标签\n- 6.5 使用Tesseract进行文本识别\n  - 6.5.1 安装和配置Tesseract\n\
    \  - 6.5.2 文本识别\n- 6.6 人体检测\n  - 6.6.1 从图片中检测人体\n  - 6.6.2 从视频中检测人体\n- 6.7 人脸和眼睛检测\n\
    - 6.8 移除背景\n  - 6.8.1 按颜色移除背景\n  - 6.8.2 按轮廓移除背景\n  - 6.8.3 按机器学习移除背景\n  - 6.8.4\
    \ 按蒙版移除背景\n- 6.9 模糊背景\n\n## 7 机器学习\n\n- 7.1 K-Means聚类\n  - 7.1.1 什么是K-Means聚类\n\
    \  - 7.1.2 颜色量化\n  - 7.1.3 手写数字分组\n- 7.2 K-近邻算法\n  - 7.2.1 什么是K-近邻算法\n  - 7.2.2\
    \ KNN评估\n  - 7.2.3 使用KNN识别手写数字\n- 7.3 支持向量机\n  - 7.3.1 什么是支持向量机\n  - 7.3.2 使用SVM识别手写数字\n\
    \  - 7.3.3 IRIS数据集分类\n- 7.4 人工神经网络\n  - 7.4.1 什么是人工神经网络？\n  - 7.4.2 激活函数\n  -\
    \ 7.4.3 使用ANN识别手写数字\n- 7.5 卷积神经网络\n  - 7.5.1 什么是卷积神经网络\n  - 7.5.2 卷积层\n  - 7.5.3\
    \ 池化层\n  - 7.5.4 全连接层\n  - 7.5.5 CNN架构\n  - 7.5.6 使用Tensorflow/Keras构建CNN模型\n\
    \  - 7.5.7 流行的CNN架构\n\n## 参考文献\n\n## 关于作者\n\n# 1. 引言\n\n计算机视觉是一个跨学科领域，专注于使机器能够解释和理解来自我们周围世界的视觉数据。它涉及开发能够分析图像和视频、识别模式并从视觉数据中提取有用信息的算法、技术和技术。\n\
    \n计算机视觉具有广泛的应用，包括自动驾驶汽车、机器人、医学成像、安防监控，甚至娱乐。例如，计算机视觉算法可用于实时视频流中的目标检测、图像中的人脸识别，甚至帮助医生从医学成像数据中诊断医疗状况。\n\
    \n为了实现这些任务，计算机视觉算法结合了来自多个领域的技术，如图像处理、机器学习、深度学习和人工智能。图像处理技术涉及滤波、边缘检测和分割等操作，有助于预处理和增强视觉数据。另一方面，机器学习技术允许计算机视觉系统从大型数据集中学习模式，并基于这些模式进行预测。\n\
    \n计算机视觉是一个快速发展的领域，对于开发能够感知和理解"

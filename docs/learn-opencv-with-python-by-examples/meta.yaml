  md: "Figure 4.5 A Sample Trackbar\n\nIn OpenCV, cv2.createTrackbar() function is\
    \ used to create a trackbar. The function takes several arguments, including the\
    \ name of the trackbar, the name of the window in which it will appear, the initial\
    \ value of the trackbar, the maximum value, and a callback function that will\
    \ be called when the trackbar is moved. When a user moves the knob the callback\
    \ function will be invoked, and the actions defined in the callback function will\
    \ be performed.\nHere are the code snippets to create a sample trackbar,\n\n```\n\
    1  import cv2\n2  import numpy as np\n3  def on_trackbar(val):\n4      print(\"\
    Trackbar value:\", val)\n5  \n6  cv2.namedWindow(\"Trackbar Window\")\n7  cv2.createTrackbar(\"\
    Trackbar\", \"Trackbar Window\",\n8                      0, 100, on_trackbar)\n\
    9  canvas = np.zeros((100, 800, 3), np.uint8)\n10 canvas[:] = 235,235,235\n11\
    \ \n12 while True:\n13     cv2.imshow(\"Trackbar Window\", canvas)\n14     if\
    \ cv2.waitKey(1) & 0xFF == 27:\n15         break\n16 cv2.destroyAllWindows()\n\
    ```\n\nThe range of the trackbar is from 0 to a maximum value of 100, a callback\
    \ function on_trackbar()is called whenever the knob is moved by the mouse, and\
    \ it simply prints the current value of the trackbar to the console.\nThe trackbar\
    \ is displayed in a window named \"Trackbar Window\", which is created using the\
    \ cv2.namedWindow() function, the content of the window is a light gray canvas\
    \ as we did previously. Inside the main loop, cv2.imshow() is called to display\
    \ the trackbar window and cv2.waitKey() to wait for a key press. When the user\
    \ presses the ESC key, it breaks out of the loop and destroys the window using\
    \ cv2.destroyAllWindows().\nWhen the user interacts with the trackbar by moving\
    \ the knob, the on_trackbar() function is called with the current value of the\
    \ trackbar as its parameter. This value"

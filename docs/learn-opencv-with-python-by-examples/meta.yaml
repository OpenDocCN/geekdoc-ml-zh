    a neural network has, it behaves just like a single layer because summing up all
    the layers will give another linear function, which is exactly the same as a single
    layer.


    Another problem of the identity function is its derivative is a constant, it has
    no relation to the input data z. The training will use its derivative to perform
    a process called *back-propagation*, the constant value loses the information
    of the input data, and then not able to provide a better prediction.


    In most cases, the non-linear activation functions which are introduced in the
    following sections are used to learn and solve complex data and provide accurate
    predictions.



  md: '![](img/b99f6edaf6f730ad313ce66bc5a26be2_254_0.png)


    Figure 7.28 A Simple Artificial Neural Network


    The left side is the *Input Layer*, it corresponds to the input data, there should
    be *n* nodes in the input layer if there are *n* features in the input data. There
    is a *Hidden Layer* in the middle, which takes the output of the input layer as
    input data. Then the *Output Layer* is at the right, there is only one node for
    the output in Figure 7.28, it could have multiple nodes depending on the needs.


    An *Artificial Neural Network (ANN)* always has an *Input Layer* and an *Output
    Layer*, there could be multiple *Hidden Layers* depending on the needs, there
    could also be no *Hidden Layer* in which case the *Input Layer* directly connects
    to the *Output Layer*. The *Input Layer* should take the raw input data, so the
    number of nodes in the *Input Layer* should be the same as the dimension of the
    input data; the *Output Layer* is the one that makes the final prediction, so
    the number of nodes in the *Output Layer* should be same as the dimension of output
    data.


    The number of layers and nodes of *Hidden Layers* depends on the needs, it doesn''t
    mean the more the better, normally it is decided based on the evaluation of the
    accuracy, a trial and error process is often needed to determine how many hidden
    layers and how many nodes in each hidden layer. More hidden layers require more
    computation costs. See material #13 in the References section at the end of this
    book for artificial neural networks.


    OpenCV supports the Multi-Layer Perceptron (MLP) of the *Artificial Neural Network*,
    which means it could have three or more layers in total. In other words, there
    could be one or more *Hidden Layers* apart from *Input* and *Output Layers*.'

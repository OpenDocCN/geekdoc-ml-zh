    # 6.1. Canny Edge Detection


    Source: Canny.py


    Canny Edge Detection is a widely used algorithm in image processing and computer
    vision to detect the edges in images. It was proposed by John F. Canny in 1986,
    the algorithm and theory are beyond the scope of this book, if interested please
    reference the paper of *Canny, J., A Computational Approach To Edge Detection,
    IEEE Transactions on Pattern Analysis and Machine Intelligence, 8(6):679–698,
    1986*, at: [https://scirp.org/reference/referencespapers.aspx?referenceid=1834431](https://scirp.org/reference/referencespapers.aspx?referenceid=1834431)'
  - '[PAGE 132]


    The goal of edge detection is to identify the boundaries of objects within an
    image. The Canny Edge Detection algorithm achieves this by detecting sharp changes
    in intensity or color within an image.


    There are multiple steps involving the detection of the edges using Canny Edge
    Detection, OpenCV documents describe the algorithm and steps, see the below link
    for details: [https://docs.opencv.org/4.7.0/d7/de1/tutorial_js_canny.html](https://docs.opencv.org/4.7.0/d7/de1/tutorial_js_canny.html)


    OpenCV provides `cv2.canny()` function for this purpose, in order to implement
    it, the image should be converted to grayscale before using the function. This
    function needs to specify two thresholds – lower and upper thresholds. They are
    used to determine which edges in the image are real edges, which are false edges.
    The pixel gradient is compared with the upper and lower thresholds, if higher
    than the upper one then the pixel is determined as an edge; if below the lower
    one then it is a false edge and is discarded; if between the upper and lower and
    if it is connected with a real edge then accepted as an edge, otherwise discarded.


    In this example we use two trackbars to change upper and lower thresholds, and
    see the edges are changing accordingly.


    Notice in line 4 of the source codes, the trackbar callback function is doing
    nothing with a statement of `pass`, in previous examples the call-back function
    is used to retrieve the values though. Now, alternatively, we use `cv2.getTrackbarPos()`
    function within the while loop, in line 19 and 20, to retrieve the trackbar value.


    ```

    1  import cv2

    2

    3  def nothing(x):

    4      pass

    5

    6  def canny_edge_detection():

    7      lower, upper = 100, 200

    8      image = cv2.imread("../res/flower001.jpg")

    9      gray = cv2.cvtColor(image, cv2.COLOR_BGR2GRAY)

    10

    11     cv2.namedWindow("Canny")

    12     cv2.createTrackbar("Lower", "Canny", lower, 500, nothing)

    ```'

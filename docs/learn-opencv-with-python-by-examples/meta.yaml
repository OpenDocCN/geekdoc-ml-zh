    While the *recall* is defined as the percentage of true positives against all
    actual positives. Simply put, recall is how many positives are predicted out of
    all real positives. Recall demonstrates the ability to recognize the positives
    in the dataset, a high recall value means it can correctly recognize most of the
    positives.



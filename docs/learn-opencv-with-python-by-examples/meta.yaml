    \ complete transparency. The blending mask is usually a grayscale image, but it\
    \ can also be a color image in some cases. However, in this section we use a binary\
    \ mask, the values are either 0 or 255, with no values in between.\n\nIn this\
    \ section we will create a mask from the image of Figure 5.12, the bird image,\
    \ and apply it to both images as a bitwise operation to achieve a different blending\

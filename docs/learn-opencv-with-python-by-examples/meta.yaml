  md: 'As shown in Figure 5.1 above, the color image (left) is converted to a grayscale
    one (right).


    As discussed earlier, in OpenCV the default color space for an image is BGR, so
    a color image can be split into three channels of blue, green and red, each channel
    is in grayscale, as shown in Figure 5.2.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_82_0.png)


    The `cv2.split()` function can be used to split a color image into the three channels:


    ```

    1 def split_image(image):

    2     ch1, ch2, ch3 = cv2.split(image)

    3     return ch1, ch2, ch3

    ```


    And each channel is in grayscale.


    # 5.1.2. Convert Grayscale to BGR


    A grayscale image can also be converted to BGR color space, in this case the source
    is a grayscale image which only has one channel and does not have any color information,
    therefore the result BGR image looks the same as the original grayscale one. But
    the difference is the BGR image has three channels although looks the same as
    the grayscale one, while the original gray image only has one channel.


    To convert a grayscale image to BGR, use `cv2.cvtColor()` function with `cv2.COLOR_GRAY2BGR`
    as the second parameter,'
  merge: -1
  pgno: 82
- img_proc: true
  md: '```

    1 def convert_gray2bgr(image):

    2     bgr = cv2.cvtColor(image, cv2.COLOR_GRAY2BGR)

    3     return bgr

    ```


    Figure 5.3 below shows the idea:


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_83_0.png)


    Figure 5.3 Convert Grayscale to BGR


    The left image is the original grayscale image, which has only one channel. The
    right image, however, is in BGR color space although looks same as the grayscale
    one, it can be split into three channels.

    Since the right image looks same as the left one, why we should convert it? There
    are several reasons to do it, sometimes in the image processing, some operations
    need to be performed on two or more images, it''s important that all the images
    are in the same color space. For example, if we want to blend, or mix, two images
    together, but one is color image and another is grayscale, the grayscale one must
    be converted into BGR before blending them.

    Sometimes when you want to colorize a grayscale image, it must be converted to
    BGR first, then paint colors on different channels, because you are not able to
    paint colors on a single-channel grayscale image.


    # 5.1.3. Convert BGR to HSV


    As explained in section 3.4, an image can be represented not only in BGR but also
    in HSV color spaces, OpenCV can easily convert the image between BGR and'
  merge: -1
  pgno: 83
- img_proc: true
  md: 'HSV. Like converting it to grayscale, the same function `cv2.cvtColor()` is
    used but the second parameter is different, `cv2.COLOR_BGR2HSV` in this case.

    The HSV image can also be split into three channels, hue, saturation and value.

    Then each channel can be adjusted to achieve some different effects, later we
    will explain how to adjust each channel to change the image.


    Below code snippets are to convert an image to HSV color space:


    ```

    1  def convert_bgr2hsv(image):

    2      hsv = cv2.cvtColor(image, cv2.COLOR_BGR2HSV)

    3      return hsv

    ```


    As shown in Figure 5.4, the color image is converted to HSV color space, and then
    it can be further split into three channels in hue, saturation and value by using
    `cv2.split()` function.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_84_0.png)


    # 5.1.4. Convert HSV to BGR


    When OpenCV displays an image, the function `cv2.imshow()` is used and by default
    in BGR color space. If an image is converted to HSV and followed by some image
    processing operations, it can not be directly sent to `cv2.imshow()` for displaying,
    instead it must be converted back to BGR, then sent to `cv2.imshow()` for displaying,
    otherwise the image will not be displayed correctly.

    In last section an image is converted to HSV, and here we will convert it back
    to BGR with the same function `cv2.cvtColor()` but different parameter'
  merge: -1

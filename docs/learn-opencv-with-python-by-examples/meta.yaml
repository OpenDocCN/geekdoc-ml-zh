    Python''s ease-of-use and flexibility, combined with OpenCV''s powerful set of
    tools and algorithms, make it a go-to choice for many computer vision projects.'
  - '[PAGE 13]


    Then what you will learn from this book with OpenCV combined with Python?


    +   - Read, show and save images.

    - Read and show videos or webcam videos with the specific libraries.

    - User interaction such as keyboard or mouse operations.

    - Draw texts and shapes such as circles, rectangles, triangles, etc.

    - Detection of colors and shapes from images, such as circles, rectangles, triangles,
    etc.

    - Detection of faces, eyes and human from images or videos.

    - Text recognition in images.

    - Modify image quality or colors, e.g. blur, warp transform, blend, resize, adjust
    colors, etc.

    - Machine learning methods, including K-Means, K-Nearest Neighbors, Support Vector
    Machines, Artificial Neural Networks and Convolutional Neural Networks.


    The benefits of using OpenCV,


    +   - Open source and free, easy and simple to learn.

    - Fast for processing, especially used for video processing, for example detect
    objects from videos.

    - Offers over 2,500 mathematical algorithms, they are efficient enough not only
    for image but also for video and real-time processing.

    - The algorithms and functions are designed to take advantage of hardware acceleration
    and multi-core systems.


    # 1.2. Target Audients of This Book


    This book is written for anyone interested in learning computer vision using the
    Python programming language. The book is suitable for readers with'
  - '[PAGE 14]


    any level of programming skills, from those with very limited knowledge of computer
    vision to the experienced ones, as it covers the basics of both Python programming
    and OpenCV from the ground up.

    For beginners, the book begins with the step-by-step instructions for installation
    and setup of OpenCV, so readers can get started quickly and easily. It introduces
    Python from simplest statements to object-oriented classes, and begins with a
    hello world example. It also covers the fundamentals of computer vision, including
    basic image processing techniques such as pixels, color spaces with BGR and HSV,
    and conversion between them. It’s a plus if the readers have some basic level
    of programming skills with any languages, but don’t need to have previous experiences
    of Python and/or OpenCV.

    For more experienced readers, the book covers more advanced topics such as object
    detection, facial recognition, as well as machine learning and deep learning with
    neural networks. The book includes numerous examples with practical and hands-on
    projects to help readers understand the concepts and techniques of OpenCV.

    The book is also suitable for researchers, students, and professionals who want
    to expand their knowledge and skills in computer vision using OpenCV with Python.
    It provides a comprehensive guide for those who want to master the OpenCV library
    and use it for real-world applications.

    In summary, this book is a valuable resource for anyone interested in computer
    vision and OpenCV, regardless of their programming skill level. The book covers
    a wide range of topics, from basic image processing techniques to advanced deep
    learning applications, making it an excellent choice for anyone looking to learn
    and apply OpenCV with Python.



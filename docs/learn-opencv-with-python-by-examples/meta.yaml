    hidden layers. This is because it introduces non-linearity into the network, allowing
    it to learn more complex patterns and relationships in the data. The derivative
    of the sigmoid function can also be easily calculated, which is important for
    back-propagation and the optimization of the network parameters.


    However, the sigmoid function can suffer from the vanishing gradient problem,
    meaning the gradients of the function become very small as the input values become
    very large or very small. This can make the training process of deep networks
    slower and more difficult. Therefore, other activation functions, such as the
    ReLU function, have become more popular in recent years.



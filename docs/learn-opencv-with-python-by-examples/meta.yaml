  - '[PAGE 243]


    | Line 5 | Make a prediction using the trained SVM model. *X_test* is the input
    data for prediction, the datatype is *float32*.


    The output is a tuple, the first item of the tuple is the result for a single
    prediction when the *X_test* is a single data. The second is the array of the
    results for multiple prediction when the *X_test* is an array of multiple data.


    E.g. when *X_test* is an array of multiple data, the results are in *predict[1]*.
    It is formatted in a “vertical” matrix of shape *(m, 1)*. It can be convert to
    a “horizontal” one by *np.hstack(predict[1])*. |


    OpenCV supports a number of SVM kernels, as shown in below table:


    | cv2.ml.SVM_LINEAR | Linear kernel, used when the data is linearly separable.
    |

    | cv2.ml.SVM_POLY | Polynomial kernel, used when the data has a polynomial structure,
    and it maps the input data to a higher-dimensional space using a polynomial function.
    |

    | cv2.ml.SVM_RBF | Radial basis function (RBF), or Gaussian kernel, used when
    the data has a non-linear structure, maps the input data to a higher-dimensional
    space using a Gaussian function. This kernel is particularly useful when the data
    has complex, non-linear relationships between features. |

    | cv2.ml.SVM_SIGMOID | Sigmoid kernel, used when the data has a sigmoid structure,
    and it maps the input data to a higher-dimensional space using a sigmoid function.
    |

    | cv2.ml.SVM_CHI2 | Exponential Chi2 kernel, similar to the RBF kernel. |

    | cv2.ml.SVM_INTER | Histogram intersection kernel, used for measuring the similarity
    between two histograms to compute the intersection between the histograms of the
    two input samples. |


    Please reference the OpenCV document for details at:

    https://docs.opencv.org/4.7.0/d1/d2d/classcv_1_1ml_1_1SVM.html#aad7f1aaccced3c33bb256640910a0e56



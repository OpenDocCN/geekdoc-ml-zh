    # 5. Image Processing


    To recap the previous discussions, a digital image is represented as an array
    of pixel values. Each pixel in the array represents a tiny element of the image,
    and its value determines the color or intensity of that element. The pixel values
    are represented as integers in the range of 0 to 255 for grayscale images, where
    0 represents black and 255 represents white. For color images, pixel values are
    represented as a combination of blue, green, and red (BGR) channels, where each
    channel is in grayscale with a value between 0 and 255.

    Digital images are represented by multi-dimensional arrays in OpenCV, a grayscale
    image is represented by a 2D array, and a color one is by a 3D array.

    Image processing is a technique to apply some mathematical algorithms and use
    various functions and techniques to manipulate digital images in order to get
    the desired outcomes with enhanced effects, such as improving their quality or
    extracting useful information from them.

    OpenCV provides a number of methods for image processing, this chapter will introduce
    some commonly and widely used methods for image processing.

    This chapter begins with the color space conversion in section 5.1 which is the
    basics of image processing, we will introduce the conversion between grayscale,
    BGR and HSV color spaces.

    Section 5.2 will explain how to resize, crop and rotate the images. This chapter
    will also introduce the object-oriented features of Python, we will create classes
    to'
  - '[PAGE 80]


    include the functions and write codes to instantiate the classes and invoke those
    functions.


    Section 5.3 will explain how to adjust the Brightness and Contrast, and section
    5.4 to adjust Hue, Saturation and Value of the images. By adjusting these values,
    the color and brightness of the images can be changed accordingly, this is a very
    important part of image processing.


    Section 5.5 will introduce image blending which is to mix two images based on
    an algorithm. And Section 5.6 will introduce the bitwise operation and blending
    or mixing two images based on the bitwise operation, which can achieve a different
    effect.


    Section 5.7 will describe image warping, a method to transform a skewed and distorted
    image into a straightened one.


    Section 5.8 will introduce image blurring, it’s a technique to make the image
    smooth by removing the noises from the image. There are many different ways to
    do it, this section will focus on two types of image blurring methods, Gaussian
    Blur and Median Blur.


    Lastly, section 5.9 will introduce the histogram which gives us important information
    about the color distributions of the images.


    Enjoy the Image Processing with OpenCV and Python.


    # 5.1. Conversion of Color Spaces


    Source: ColorSpace.py


    Section 3.4 has explained that the color image can be represented using either
    BGR or HSV color spaces, and a color image can also be converted to a grayscale
    image. OpenCV provides many methods for the conversion of color spaces, here we
    introduce two of them: BGR to and from Grayscale, and BGR to and from HSV.



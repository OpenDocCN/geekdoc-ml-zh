- img_proc: true
  md: 'specifies the contribution of each pixel in the input images to the output
    image. It is also referred to as an alpha mask or alpha matte.


    The blending mask is used as a weighting function to compute the weighted average
    of the pixel values from the input images. The values of the blending mask typically
    range from 0 to 255, where 0 represents complete opacity and 255 represents complete
    transparency. The blending mask is usually a grayscale image, but it can also
    be a color image in some cases. However, in this section we use a binary mask,
    the values are either 0 or 255, with no values in between.


    In this section we will create a mask from the image of Figure 5.12, the bird
    image, and apply it to both images as a bitwise operation to achieve a different
    blending effect.


    OpenCV provides bitwise operations – AND, OR, NOT and XOR. It is very useful when
    we want to extract something partially from an image and put it in another image.
    These bitwise operations can be used here to achieve the effects we want.


    | cv2.bitwise_and(img1, img2) | Perform bitwise AND for img1 and img2 |

    | cv2.bitwise_or(img1, img2) | Perform bitwise OR for img1 and img2 |

    | cv2.bitwise_not(img1) | Perform bitwise NOT for img1 |

    | cv2.bitwise_xor(img1, img2) | Perform bitwise XOR for img1 and img2 |


    The algorithm is as following:


    $g(i, j) = mask \& f_0(i, j) + (1 - mask) \& f_1(i, j)$



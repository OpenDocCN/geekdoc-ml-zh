  md: '# 1.5. How This Book Is Organized


    In order for beginners to get started, this book begins with some basics such
    as step-by-step installation and setup, if you have experiences and already known
    how to do it, please feel free to skip the chapters or sections.


    Chapter 2 is to go through the installation process for Python and OpenCV, it
    also has instructions on how to install Python libraries. PyCharm, an integrated
    development environment, is used throughout this book. In the later chapters,
    we will need to install some other libraries to perform actions such as machine
    learning and neural networks.


    Chapter 3 is to introduce OpenCV basics such as loading and displaying images,
    videos and webcams, drawing text and shapes like lines, circles and rectangles,
    etc. The image fundamentals will also be introduced in this chapter, like pixels
    and color spaces of BGR and HSV.


    Chapter 4 is to explain the user interactions like keyboard and mouse operations.


    Chapter 5 is to introduce some common methods for image processing, such as color
    modification, blur, blend and warp images. The concept of the histogram is also
    introduced in this chapter, and how to use the histograms in image processing.


    Chapter 6 is to introduce object detection, shape (circle, rectangle, etc.) detection,
    color detection, text recognition, human detection, face and eye detection etc.
    We also explain two common image processing practices by examples, removing and
    blurring the backgrounds.


    Chapter 7 is to introduce the machine learning features provided by OpenCV, including
    several widely used machine learning methods like K-Means Clustering, K-Nearest
    Neighbors, Support Vector Machines, Artificial Neural Networks as well as Convolutional
    Neural Networks.


    There are mathematical algorithms behind the scenes for image processing and machine
    learning, this book will not focus on those mathematical stuffs,'
  merge: -1
  pgno: 17
- img_proc: true
  md: 'instead we will focus on how to use them via OpenCV with Python, although sometimes
    we explain some algorithms in very simple terms, but not deep-dive into details.


    It’s highly recommended to set up an environment on your PC to practice and execute
    the example source codes. There are many images throughout this book, which are
    the results of the execution of the codes. However, the images in this book are
    for reference only. You will be able to see the color images from the execution
    of the source codes on the environments of your PC.


    All right, enjoy the wonderful world of Computer Vision!'

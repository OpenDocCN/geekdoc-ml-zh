- md: "## 3. OpenCV Basics\n\nThis chapter will introduce some basic operations supported\
    \ by OpenCV, such as opening image or video files and displaying them, converting\
    \ color images to grayscale, or black-white images, connecting to a webcam of\
    \ a laptop and showing the videos captured by it. This chapter will also introduce\
    \ the fundamentals of digital images, like pixels, and color spaces.\n\nSection\
    \ 3.1 is to load and display a color image and a grayscale image.\nSection 3.2\
    \ is to load and display videos. Section 3.3 to connect a webcam of the laptop\
    \ and show it.\nSection 3.4 is to explain the fundamentals of images including\
    \ the pixels and color spaces.\nSection 3.5 is to draw shapes including lines,\
    \ rectangles, circles, ellipses and polylines. And section 3.6 to draw texts.\n\
    In section 3.7, we will apply the knowledge learned in this chapter to draw a\
    \ graph that is similar to the OpenCV icon.\n\nEnjoy the OpenCV basics.\n\n##\
    \ 3.1. Load and Display Images\n\nSource: ShowImage.py\n\nAfter the PyCharm IDE\
    \ is successfully installed and configured to use Python with OpenCV, now we are\
    \ going to load an image and display it.\n\n### 3.1.1. Load Color Images\n\nIn\
    \ PyCharm, if you have the Github project loaded, then click on the *ShowImage.py*\
    \ file, the image file is located in the *res* folder called *flower004.jpg*.\n\
    \nAlternatively, if you do not use the source files in the Github repository,\
    \ create a new Python file called *ShowImage.py*, or whatever you like, copy and\
    \ paste the following codes, and make sure you have your image file in your PyCharm\
    \ project folder and correctly point to it.\n\n```python\nimport cv2\nimg = cv2.imread(\"\
    ../res/flower004.jpg\")\ncv2.imshow(\"Image\", img)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n\
    ```\n\nExplanations:\n\n| Line | Explanation |\n| :--- | :--- |\n| 1 | `import\
    \ cv2` tells the Python to include the cv2 (OpenCV) library. Every time when using\
    \ OpenCV, must import the cv2 package. This is typically always the first statement\
    \ in the code file. |\n| 2 | `cv2.imread()` is the function to load an image,\
    \ the image file path is specified in the argument. |\n| 3 | `cv2.imshow()` is\
    \ the function to show the image. The first argument is the title of the window\
    \ that displays the image, the second argument is the image that returned from\
    \ `cv2.imread()` function. |\n| 4 | Wait for a keystroke. If do not wait for a\
    \ keystroke, the `cv2.imshow()` will display the window and go to the next immediately,\
    \ the execution will complete and the window will disappear; this happens very\
    \ quickly so you can hardly see the result. So `cv2.waitKey()` is typically added\
    \ here to wait for a user to press a key. |\n| 5 | Destroy all windows before\
    \ the execution completes. |\n\nRun the code, the loaded image is displayed, as\
    \ shown in Figure 3.1:\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_35_0.png)\n\
    \nFigure 3.1 Show Color Image\n\nPlease note, all images included in this book\
    \ are for reference only, they might not be the same as the results of executing\
    \ the codes, it’s highly recommended to set up the working environment on your\
    \ PC. You will be able to see the actual images on the screen by executing the\
    \ codes.\n\n`cv2.imread()` is an OpenCV function used to load the image from a\
    \ file, here is its syntax:\n\n| Syntax | `cv2.imread(path, flag)` |\n| :--- |\
    \ :--- |\n| Parameters | **path**: *The path of the image to be read.*<br>**flag**:\
    \ *Specifies how to read the image, the default value is `cv2.IMREAD_COLOR`.*<br><br>*`cv2.IMREAD_COLOR`:\
    \ Load a color image. Any transparency of the image will be neglected. It is the\
    \ default flag. You can also use 1 for this flag.*<br><br>*`cv2.IMREAD_GRAYSCALE`:\
    \ Load an image in grayscale mode. You can also use 0 for this flag.*<br><br>*`cv2.IMREAD_UNCHANGED`:\
    \ Load an image as such including alpha channel. You can use -1 for this flag.*\
    \ |\n| Return Value | *The image that is loaded from the image file specified\
    \ in the path parameter* |\n\n### 3.1.2. Load Grayscale Images\n\nNow let’s load\
    \ this image file in grayscale mode and display it.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_36_0.png)\n\
    \nFigure 3.2 Show Grayscale Image\n\nJust simply replace the line 2 in above codes\
    \ with the following, it tells the `cv2.imread()` to load image in grayscale mode.\n\
    \n```python\nimg = cv2.imread(\"../res/flower004.jpg\",\n    cv2.IMREAD_GRAYSCALE)\n\
    ```\n\nExecute the code and the grayscale image is shown as Figure 3.2.\n\n###\
    \ 3.1.3. Convert Color Image to Grayscale\n\nAn alternative way to have a grayscale\
    \ image is to load the original image first, then use `cv2.cvtColor()` function\
    \ to convert it to a grayscale image, this way we will have both original and\
    \ grayscale images available for further processing. This is useful because in\
    \ the future when we do the image processing, we want to process the image in\
    \ grayscale mode while displaying the original color image.\n\nNow replace the\
    \ code line 2 and 3 in section 3.1.1 with the following:\n\n```python\nimg = cv2.imread(\"\
    ../res/flower004.jpg\")\ngray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\ncv2.imshow(\"\
    Image\", img)\ncv2.imshow(\"Image Gray\", gray)\n```\n\n`cv2.cvtColor()` is an\
    \ OpenCV function used to convert an image from one color space to another, here\
    \ is its syntax:\n\n| Syntax | `cv2.cvtColor(src, code[, dst[, dstCn]])` |\n|\
    \ :--- | :--- |\n| Parameters | **src**: source image to be converted.<br>**code**:\
    \ color space conversion code.<br>**dst**: optional, the output image of the same\
    \ size and depth as *src* image.<br>**dstCn**: optional, the number of channels\
    \ in the destination image. If the parameter is 0 then the number of the channels\
    \ is derived automatically from *src* image.<br>**`cv2.COLOR_BGR2HSV`/`COLOR_HSV2BGR`**:\
    \ Convert between BGR color image and HSV space.<br>**`cv2.COLOR_BGR2GRAY`/`COLOR_GRAY2RGB`**:\
    \ Convert between BGR color image and grayscale image<br>*Other conversion codes\
    \ are not listed here, please reference OpenCV documents.* |\n| Return Value |\
    \ *The image that is converted from the source image* |\n\nExecute the codes,\
    \ the color image and grayscale image are displayed side by side, as shown below.\n\
    \n![](img/b99f6edaf6f730ad313ce66bc5a26be2_37_0.png)\n\nColor Image Grayscale\
    \ Image\n\nFigure 3.3 Convert a Color Image to Grayscale Image\n\n## 3.2. Load\
    \ and Display Videos\n\nSource: ShowVideo.py\n\nWe were able to load and display\
    \ an image, now we are going to work with videos, and see how OpenCV can process\
    \ videos.\n\nOpen the *ShowVideo.py* file in PyCharm. If you are not using the\
    \ Github project, then create a new Python file, and make sure you have a video\
    \ file available. There is an mp4 video file called “*Sample Videos from Windows.mp4*”\
    \ in the Github project, it will be loaded and displayed in this example. Below\
    \ is the code,\n\n```python\n#\n# Show a video from local file\n#\nimport cv2\n\
    \ncap = cv2.VideoCapture(\"../res/Sample Videos from Windows.mp4\")\n\nsuccess,\
    \ img = cap.read()\nwhile success:\n    cv2.imshow(\"Video\", img)\n    # Press\
    \ ESC key to break the loop\n    if cv2.waitKey(15) & 0xFF == 27:\n        break\n\
    \    success, img = cap.read()\ncap.release()\ncv2.destroyWindow(\"Video\")\n\
    ```\n\nExplanations:"
  mdcn: "## 3. OpenCV 基础\n\n本章将介绍 OpenCV 支持的一些基本操作，例如打开图像或视频文件并显示它们、将彩色图像转换为灰度或黑白图像、连接笔记本电脑的摄像头并显示其捕获的视频。本章还将介绍数字图像的基础知识，如像素和色彩空间。\n\
    \n第 3.1 节将加载并显示彩色图像和灰度图像。\n第 3.2 节将加载并显示视频。第 3.3 节将连接笔记本电脑的摄像头并显示画面。\n第 3.4 节将解释图像的基础知识，包括像素和色彩空间。\n\
    第 3.5 节将绘制形状，包括直线、矩形、圆形、椭圆和折线。第 3.6 节将绘制文本。\n在第 3.7 节中，我们将运用本章所学的知识，绘制一个类似于 OpenCV\
    \ 图标的图形。\n\n享受 OpenCV 基础之旅。\n\n## 3.1. 加载并显示图像\n\n源文件：ShowImage.py\n\n在 PyCharm\
    \ IDE 成功安装并配置为使用 Python 和 OpenCV 后，现在我们将加载一个图像并显示它。\n\n### 3.1.1. 加载彩色图像\n\n在\
    \ PyCharm 中，如果你已经加载了 Github 项目，那么点击 *ShowImage.py* 文件，图像文件位于 *res* 文件夹中，名为 *flower004.jpg*。\n\
    \n或者，如果你不使用 Github 仓库中的源文件，请创建一个新的 Python 文件，命名为 *ShowImage.py* 或你喜欢的任何名字，复制并粘贴以下代码，并确保你的图像文件位于\
    \ PyCharm 项目文件夹中并正确指向它。\n\n```python\nimport cv2\nimg = cv2.imread(\"../res/flower004.jpg\"\
    )\ncv2.imshow(\"Image\", img)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n\
    解释：\n\n| 行号 | 解释 |\n| :--- | :--- |\n| 1 | `import cv2` 告诉 Python 包含 cv2 (OpenCV)\
    \ 库。每次使用 OpenCV 时，都必须导入 cv2 包。这通常是代码文件中的第一条语句。 |\n| 2 | `cv2.imread()` 是加载图像的函数，图像文件路径在参数中指定。\
    \ |\n| 3 | `cv2.imshow()` 是显示图像的函数。第一个参数是显示图像的窗口标题，第二个参数是从 `cv2.imread()` 函数返回的图像。\
    \ |\n| 4 | 等待按键。如果不等待按键，`cv2.imshow()` 将显示窗口并立即进入下一步，执行将完成并且窗口将消失；这发生得非常快，你几乎看不到结果。因此，通常在这里添加\
    \ `cv2.waitKey()` 以等待用户按键。 |\n| 5 | 在执行完成前销毁所有窗口。 |\n\n运行代码，加载的图像将被显示，如图 3.1 所示：\n\
    \n![](img/b99f6edaf6f730ad313ce66bc5a26be2_35_0.png)\n\n图 3.1 显示彩色图像\n\n请注意，本书中包含的所有图像仅供参考，它们可能与执行代码的结果不完全相同，强烈建议你在自己的\
    \ PC 上设置工作环境。通过执行代码，你将能够在屏幕上看到实际的图像。\n\n`cv2.imread()` 是一个 OpenCV 函数，用于从文件加载图像，其语法如下：\n\
    \n| 语法 | `cv2.imread(path, flag)` |\n| :--- | :--- |\n| 参数 | **path**: *要读取的图像的路径。*<br>**flag**:\
    \ *指定如何读取图像，默认值为 `cv2.IMREAD_COLOR`。*<br><br>*`cv2.IMREAD_COLOR`：加载彩色图像。图像的任何透明度将被忽略。这是默认标志。你也可以使用\
    \ 1 作为此标志。*<br><br>*`cv2.IMREAD_GRAYSCALE`：以灰度模式加载图像。你也可以使用 0 作为此标志。*<br><br>*`cv2.IMREAD_UNCHANGED`：按原样加载图像，包括\
    \ alpha 通道。你可以使用 -1 作为此标志。* |\n| 返回值 | *从 path 参数指定的图像文件加载的图像* |\n\n### 3.1.2.\
    \ 加载灰度图像\n\n现在让我们以灰度模式加载此图像文件并显示它。\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_36_0.png)\n\
    \n图 3.2 显示灰度图像\n\n只需将上面代码中的第 2 行替换为以下内容，它告诉 `cv2.imread()` 以灰度模式加载图像。\n\n```python\n\
    img = cv2.imread(\"../res/flower004.jpg\",\n    cv2.IMREAD_GRAYSCALE)\n```\n\n\
    执行代码，灰度图像将如图 3.2 所示。\n\n### 3.1.3. 将彩色图像转换为灰度图像\n\n获得灰度图像的另一种方法是先加载原始图像，然后使用 `cv2.cvtColor()`\
    \ 函数将其转换为灰度图像，这样我们就可以同时拥有原始图像和灰度图像以供进一步处理。这很有用，因为在未来的图像处理中，我们希望以灰度模式处理图像，同时显示原始彩色图像。\n\
    \n现在将第 3.1.1 节中的代码第 2 行和第 3 行替换为以下内容：\n\n```python\nimg = cv2.imread(\"../res/flower004.jpg\"\
    )\ngray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\ncv2.imshow(\"Image\", img)\n\
    cv2.imshow(\"Image Gray\", gray)\n```\n\n`cv2.cvtColor()` 是一个 OpenCV 函数，用于将图像从一种色彩空间转换为另一种色彩空间，其语法如下：\n\
    \n| 语法 | `cv2.cvtColor(src, code[, dst[, dstCn]])` |\n| :--- | :--- |\n| 参数 |\
    \ **src**：要转换的源图像。<br>**code**：色彩空间转换代码。<br>**dst**：可选，与 *src* 图像大小和深度相同的输出图像。<br>**dstCn**：可选，目标图像中的通道数。如果参数为\
    \ 0，则通道数将从 *src* 图像自动推导。<br>**`cv2.COLOR_BGR2HSV`/`COLOR_HSV2BGR`**：在 BGR 彩色图像和\
    \ HSV 空间之间转换。<br>**`cv2.COLOR_BGR2GRAY`/`COLOR_GRAY2RGB`**：在 BGR 彩色图像和灰度图像之间转换。<br>*其他转换代码未在此列出，请参考\
    \ OpenCV 文档。* |\n| 返回值 | *从源图像转换而来的图像* |\n\n执行代码，彩色图像和灰度图像将并排显示，如下所示。\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_37_0.png)\n\
    \n彩色图像 灰度图像\n\n图 3.3 将彩色图像转换为灰度图像\n\n## 3.2. 加载并显示视频\n\n源文件：ShowVideo.py\n\n我们已经能够加载并显示图像，现在我们将处理视频，看看\
    \ OpenCV 如何处理视频。\n\n在 PyCharm 中打开 *ShowVideo.py* 文件。如果你不使用 Github 项目，请创建一个新的 Python\
    \ 文件，并确保你有一个可用的视频文件。Github 项目中有一个名为“*Sample Videos from Windows.mp4*”的 mp4 视频文件，本示例将加载并显示它。以下是代码：\n\
    \n```python\n#\n# 显示本地文件中的视频\n#\nimport cv2\n\ncap = cv2.VideoCapture(\"../res/Sample\
    \ Videos from Windows.mp4\")\n\nsuccess, img = cap.read()\nwhile success:\n  \
    \  cv2.imshow(\"Video\", img)\n    # 按 ESC 键退出循环\n    if cv2.waitKey(15) & 0xFF\
    \ == 27:\n        break\n    success, img = cap.read()\ncap.release()\ncv2.destroyWindow(\"\
    Video\")\n```\n\n解释："

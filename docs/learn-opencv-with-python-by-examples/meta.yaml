- md: "## 6.8.2. Remove Background by Contour\n\nSource: RemoveBackgroundByContour.py\n\
    Library: common/ImageProcessing.py\n\nContour was introduced in previous sections\
    \ when detecting shapes from images. To recap, a contour is a curve that represents\
    \ the boundary of an object in an image, it’s a sequence of connected pixels that\
    \ form a continuous line around the object. The background of the images can also\
    \ be identified and removed based on the contours, if an image has a significant\
    \ contour, it’s worthwhile to try this method. Take a look at Figure 6.29, we\
    \ want to remove the background:\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_177_0.png)\n\
    \nFigure 6.29 Remove Background by Contour\n\nAs introduced in section 6.1, the\
    \ Canny edge detection will be used to find out the edges of the object in the\
    \ image (in our case, the bird), and use dilation and erosion to modify the edges.\
    \ Then we find contours as introduced in section 6.3, and draw the contours as\
    \ the mask. Remember in last section, the final mask has some noises, and we did\
    \ not handle them. Now in this example we will use dilation, erosion and Gaussian\
    \ blur to minimize the noises in the mask. Add the following function to the ImageProcessing\
    \ class,\n\n```python\ndef remove_background_by_contour(self,\n              \
    \      gs_blur=3,\n                    canny_lower=10,\n                    canny_upper=200,\n\
    \                    dilate_iter=1,\n                    erode_iter=1,\n     \
    \               image = None):\n    if image is None:\n        image = self.image\n\
    \    gray = cv2.cvtColor(image, cv2.COLOR_BGR2GRAY)\n    edges = cv2.Canny(gray,\
    \ canny_lower, canny_upper)\n    edges = cv2.dilate(edges, None)\n    edges =\
    \ cv2.erode(edges, None)\n    mask = np.zeros_like(edges)\n    contours, _ = cv2.findContours(edges,\
    \ cv2.RETR_LIST,\n                                    cv2.CHAIN_APPROX_NONE)\n\
    \    for contour in contours:\n        cv2.fillConvexPoly(mask, contour, (255))\n\
    \        mask = cv2.dilate(mask, None, iterations=dilate_iter)\n        mask =\
    \ cv2.erode(mask, None, iterations=erode_iter)\n        if gs_blur % 2 == 0:\n\
    \            gs_blur = gs_blur + 1\n        elif gs_blur <= 0:\n            gs_blur\
    \ = 1\n        mask = cv2.GaussianBlur(mask, (gs_blur, gs_blur), 0)\n        mask\
    \ = cv2.cvtColor(mask, cv2.COLOR_GRAY2BGR)\n        bg_removed = cv2.bitwise_and(image,\
    \ mask)\n    return bg_removed, mask\n```\n\nExplanations:\n\n| Line | Description\
    \ |\n|------|-------------|\n| 1 - 7 | Define remove_background_by_contour() function,\
    \ the parameters are lower and upper thresholds of Canny, kernel size for Gaussian\

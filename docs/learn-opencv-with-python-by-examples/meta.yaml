    \ |\n\nIn summary, the shape of the histogram can provide information about the\
    \ overall color distributions, as well as valuable insights into the overall brightness\
    \ and contrast of an image. If the histogram is skewed towards the higher intensity\
    \ levels, the image will be brighter, while a skew towards lower intensity levels\
    \ indicates a darker image. A bell-shaped histogram indicates a well-balanced\
    \ contrast.\nHistogram equalization is a common technique used to enhance the\
    \ contrast of an image by redistributing the pixel intensities across a wider\
    \ range. This technique can be used to improve the visual quality of images for\
    \ various applications, such as medical imaging, satellite imaging, and digital\
    \ photography.\n\n# 6. Object Detection\n\nObject detection is a technique used\
    \ in image processing to identify and locate objects within an image or video.\
    \ The goal of object detection is to accurately identify the presence, location,\
    \ and extent of objects within an image or video frame. It’s an important application\
    \ for computer vision, it applies algorithms to identify the objects in the images,\
    \ such as shapes of triangles, circles, rectangles, as well as human, faces and\
    \ eyes, or texts.\nOpenCV provides lots of methods for detecting different types\
    \ of objects. Here is a high-level overview of the steps involved in object detection:\n\
    \n- 1. The first step is to load the image or video file that you want to analyze\
    \ using OpenCV.\n- 2. Before running the object detection algorithm, it’s usually\
    \ necessary to preprocess the images by resizing, adjusting the contrast, adjusting\
    \ HSV or converting to grayscale, etc. Some commonly used techniques like canny,\
    \ dilation and erosion might also be used for preprocessing.\n- 3. Depending on\
    \ the specific object detection task, we may choose to use one of the built-in\
    \ object detection algorithms provided by OpenCV or implement some third-party\
    \ algorithms.\n- 4. Finally, visualize the results of the object detection algorithm\
    \ by drawing bounding boxes around the detected objects and displaying the annotated\
    \ image or video.\n\nThis chapter begins with the basics of detection by introducing\
    \ the Canny Edge Detection in section 6.1, as well as Dilation and Erosion in\
    \ section 6.2, these techniques are necessary for image detection.\nSection 6.3\
    \ will introduce shape detection, OpenCV provides methods to identify the shapes\
    \ like triangles, circles or squares, and calculate their boundaries, areas and\
    \ perimeters.\nSection 6.4 will detect the colors of images by detecting the hue,\
    \ saturation and value in HSV color space.\nSection 6.5 will introduce Optical\
    \ Character Recognition (OCR), which is to recognize texts in the images. A third-party\
    \ tool, Tesseract, will be used together with OpenCV to achieve text recognition.\n\
    Section 6.6 and section 6.7 will introduce machine learning based approaches,\
    \ *Haar Cascade classifiers* for face and eye detection and *Histograms of Oriented\
    \ Gradients (HOG)* for human detection. They are very fast algorithms and can\
    \ be used in real-time detection in videos. We will focus only on the implementation\
    \ of these methods, instead of the theory or mathematics details of the algorithms.\n\
    Section 6.8 introduces several ways to detect the foreground from images and remove\
    \ the background. It’s a common practice in image processing to detect and remove\
    \ background from an image, which is called Semantic Segmentation.\nAt last, in\
    \ section 6.9, since we are able to detect the foreground separated from the background,\
    \ we will introduce how to blur the background to make the foreground stand out.\n\
    Enjoy the Object Detection with OpenCV and Python.\n\n## 6.1. Canny Edge Detection\n\
    \nSource: Canny.py\n\nCanny Edge Detection is a widely used algorithm in image\
    \ processing and computer vision to detect the edges in images. It was proposed\
    \ by John F. Canny in 1986, the algorithm and theory are beyond the scope of this\
    \ book, if interested please reference the paper of *Canny, J., A Computational\
    \ Approach To Edge Detection, IEEE Transactions on Pattern Analysis and Machine\
    \ Intelligence, 8(6):679–698, 1986*, at: [https://scirp.org/reference/referencespapers.aspx?referenceid=1834431](https://scirp.org/reference/referencespapers.aspx?referenceid=1834431)\n\
    \nThe goal of edge detection is to identify the boundaries of objects within an\
    \ image. The Canny Edge Detection algorithm achieves this by detecting sharp changes\
    \ in intensity or color within an image.\n\nThere are multiple steps involving\
    \ the detection of the edges using Canny Edge Detection, OpenCV documents describe\
    \ the algorithm and steps, see the below link for details: [https://docs.opencv.org/4.7.0/d7/de1/tutorial_js_canny.html](https://docs.opencv.org/4.7.0/d7/de1/tutorial_js_canny.html)\n\
    \nOpenCV provides `cv2.canny()` function for this purpose, in order to implement\
    \ it, the image should be converted to grayscale before using the function. This\
    \ function needs to specify two thresholds – lower and upper thresholds. They\
    \ are used to determine which edges in the image are real edges, which are false\
    \ edges. The pixel gradient is compared with the upper and lower thresholds, if\
    \ higher than the upper one then the pixel is determined as an edge; if below\
    \ the lower one then it is a false edge and is discarded; if between the upper\
    \ and lower and if it is connected with a real edge then accepted as an edge,\
    \ otherwise discarded.\n\nIn this example we use two trackbars to change upper\
    \ and lower thresholds, and see the edges are changing accordingly.\n\nNotice\

    # 6.8.4. Remove Background by Mask


    Source: RemoveBackgroundByMask.py


    If you cannot achieve the desired background removal effect by all of the above
    methods, you can always use third-party image-editing software to generate a mask
    and apply that mask to the original image to remove the background. The third-party
    software can be Adobe PhotoShop or [GIMP](https://www.gimp.org/), or any other
    image-editing tool. GIMP (GNU Image Manipulation Program) is a free and open-source
    image editing software that can be used for a wide range of tasks such as photo
    retouching, image composition, and image authoring. It has many features that
    are similar to those found in commercial software like Adobe Photoshop, but is
    available for free and runs on multiple platforms, including Windows, macOS, and
    Linux.


    This is a manual approach, some efforts are needed to remove the background in
    the third-party software to achieve the desired results.


    In this example the original image looks like Figure 6.38 below:


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_185_1.png)


    It’s not significant to separate the foreground by color, nor by contour, therefore
    the methods introduced in previous sections might not work well, and even the
    machine learning approach might not work.


    Load this image into GIMP software, or Adobe PhotoShop or any other image editors,
    manually create the mask, as shown below. Some efforts are needed since it’s a
    manual work, Figure 6.39 is the mask.'

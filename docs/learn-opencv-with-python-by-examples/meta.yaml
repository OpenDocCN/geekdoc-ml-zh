    8      X = np.float32(X)

    9      plt.figure(figsize=(6, 4))

    10     plt.scatter(X[:,0],X[:,1],s=10,cmap=''spring'')

    11     plt.xlabel(''X'')

    12     plt.ylabel(''Y'')

    13     plt.show()

    14     return X, y

    ```


    K-Means will perform the following steps,


    **Step 1:** Randomly initialize $k$ centroids, in our case $k=2$, so two centroids:
    $\mu_1$ and $\mu_2$ are initialized.


    **Step 2:** calculate the distance from each data point to both centroids and
    label the data. If a data is closer to $\mu_1$, then the data is labeled with
    0; if it is closer to $\mu_2$ then labeled with 1. If there are more centroids,
    then labeled with 2, 3, ..., etc.



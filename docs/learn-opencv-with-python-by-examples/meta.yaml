    )\n    gray = cv2.cvtColor(image, cv2.COLOR_BGR2GRAY)\n\n    cv2.namedWindow(\"\
    Canny\")\n    cv2.createTrackbar(\"Lower\", \"Canny\", lower, 500, nothing)\n\
    ```"

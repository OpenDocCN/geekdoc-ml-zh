    # 7.3. Support Vector Machine


    # 7.3.1. What is Support Vector Machine


    ```

    Source: SupportVectorMachine.py

    common/gaussian.py

    ```


    A Support Vector Machine (SVM) is one of the supervised machine learning algorithms,
    which means the learning or training is based on both the data and the labels.
    It is mostly used in resolving classification problems.

    The basic idea behind SVM is to find the best possible decision boundary that
    separates the data into different classes. The decision boundary is chosen in
    such a way that it maximizes the margin, i.e., the distance between the decision
    boundary and the nearest data points from each class.

    SVM has been widely used in various applications such as image classification,
    text classification, bioinformatics, and many more. It is a powerful algorithm
    that is'
  - '[PAGE 236]


    known for its ability to handle complex and high-dimensional data. However, it
    can be sensitive to the choice of parameters and can be computationally expensive
    for large datasets.


    Let’s take a look at a sample 2-dimensional dataset as Figure 7.18, there are
    two clusters of data, • data points labeled as 0, and × as 1. They are distributed
    in a way that can be easily separated by a line; we can arbitrarily draw lines
    to separate the two clusters. There are more than one line for this purpose, like
    the two lines in Figure 7.18, and you can draw many lines like that. However,
    these arbitrary lines are not the best, the SVM is to find the best one.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_236_0.png)


    Figure 7.18 Sample 2-D Data for SVM


    The objective of a Support Vector Machine is to find a line between the two clusters
    of the data that distinctly classifies the data points, and at the same time ensures
    the maximum margin, the margin is the distance between the line and the closest
    data points of each class. In other words, SVM seeks to find the line that is
    most robust to noise and other variations in the data.


    As shown in Figure 7.19, the solid line in the middle is the best one that meets
    the requirements of SVM, it can separate the two clusters of the data, and it
    has the maximum margin between the two classes of data.'
  - '[PAGE 237]


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_237_0.png)


    Figure 7.19 Decision Boundary and Support Vectors of SVM


    # What are Hyperplanes


    Hyperplanes are also called *decision boundaries* that are used to classify the
    data points. Data points falling on one side of the hyperplane belong to one class;
    falling on the other side of the hyperplane belong to another class.

    The solid line in the middle of Figure 7.19 is the *Hyperplane*, also called *Decision
    Boundary*. Any new data falling on either side of the decision boundary will be
    predicted as the corresponding cluster.

    The two dashed lines parallel to the hyperplane are the separating lines which
    used to separate the two classes of data points, the hyperplane has the maximum
    margin to the two separating lines.

    The dimension of the hyperplane depends on the dimension of the data (or the number
    of features of the data). If the number of features is 2 (or 2-dimensional data),
    then the *hyperplane* is just a line. If the number of features is 3 (or 3-dimensional
    data), then the *hyperplane* becomes a 2-dimensional plane. If the number of features
    is *n* (or *n*-dimensional data), then the hyperplane is a *n*-1 dimensional hyperplane.


    # What are Support Vectors'
  - '[PAGE 238]


    *Support Vectors* are data points that are closest to the *Decision Boundary*
    and influence the position and orientation of the *Decision Boundary*. The Support
    Vector Machine algorithm calculates these support vectors and the decision boundary.
    These are the data points that define the margin of the hyperplane, and they play
    a crucial role in the SVM algorithm.


    The support vectors are the data points that are on the margin, which means that
    they have the smallest distance to the hyperplane, as the data points with circles
    in Figure 7.19. They are the most difficult data points to classify, and they
    have the most influence on the position of the hyperplane.


    The SVM algorithm only considers the support vectors when constructing the hyperplane,
    which makes it computationally efficient and allows it to handle large datasets
    with many features. The other data points that are not support vectors are not
    used in the decision-making process of the SMV algorithm.


    # What are Kernels


    The data might not be always as easy as the above example, sometimes the data
    is distributed in a way that is not able to separate by a line, as Figure 7.20.
    There are also two clusters of data, however it’s not straightforward to find
    a line to separate them.


    SVM algorithm applies a technique called *kernel* methods, kernels are mathematical
    functions used to transform the input data into a higher-dimensional space where
    it may be easier to separate the clusters. Kernels are used to handle non-linearly
    separable data, where the clusters cannot be separated by a linear hyperplane.
    The purpose of using a *kernel* is to enable SVM algorithm to find a non-linear
    decision boundary that can separate the data points into their respective classes.'

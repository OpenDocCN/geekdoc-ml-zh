    \ |\n\n## 7.2.2. KNN评估\n\n来源：K-NNEvaluation.py\n\n在上一节中，我们了解到不同的$k$值可能导致不同的预测结果。在本节中，我们将评估KNN的结果，并找出如何选择最佳的$k$值。\n\

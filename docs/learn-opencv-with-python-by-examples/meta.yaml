    \ line_type)\n```\n\n结果如图 3.12 所示：\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_55_0.png)\n\
    \n图 3.12 在画布上绘制形状\n\n从 Github 仓库打开 *DrawShapes.py* 文件，它包含了绘制所有形状的代码，执行它，结果如上图\
    \ 3.12 所示。\n\n我们不会逐一解释上述代码中的函数；它们很直接，与上面的 `cv2.line()` 函数类似。\n\n详情请参考 OpenCV 绘制函数的文档：[https://docs.opencv.org/4.7.0/d6/d6e/group__imgproc__draw.html](https://docs.opencv.org/4.7.0/d6/d6e/group__imgproc__draw.html)\n\
    \n## 3.6. 绘制文本\n\n来源：DrawTexts.py\n库：common/Draw.py\n\nOpenCV 不仅提供了绘制形状的函数，还提供了绘制文本的函数。`cv2.putText()`\
    \ 函数用于绘制文本。\n\n类似地，定义一个封装函数 `draw_text()`：\n\n```python\ndef draw_text(image,\
    \ text, org,\n    font_face=cv2.FONT_HERSHEY_COMPLEX,\n    font_scale=1,\n   \
    \ color=(255,255,255),\n    thickness=1,\n    line_type=cv2.LINE_AA):\n    cv2.putText(image,\
    \ text, org, font_face,\n    font_scale, color, thickness,\n    line_type )\n\
    ```\n\n然后创建一个画布，将其填充为浅灰色，然后调用 `draw_text()` 函数来绘制文本。\n\n```python\ncanvas = np.zeros((380,\
    \ 480, 3), np.uint8)\ncanvas[:] = 235,235,235\n# 绘制文本\ndraw_text(canvas, \"Hello\
    \ OpenCV\", (50, 100),\ncolor=(125, 0, 0),\nfont_scale=1.5,\nthickness=2)\ncv2.imshow(\"\
    Hello OpenCV\", canvas)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n结果如图\
    \ 3.13 所示：\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_56_0.png)\n\n图 3.13 在画布上绘制文本\n\
    \n此版本的 OpenCV 支持有限的字体集，下表显示了支持的字体。\n\n| 字体代码 | 描述 |\n| :--- | :--- |\n| FONT_HERSHEY_SIMPLEX\
    \ | 正常大小的无衬线字体 |\n| FONT_HERSHEY_PLAIN | 小号无衬线字体 |\n| FONT_HERSHEY_DUPLEX | 正常大小的无衬线字体（比\
    \ FONT_HERSHEY_SIMPLEX 更复杂） |\n| FONT_HERSHEY_COMPLEX | 正常大小的衬线字体 |\n| FONT_HERSHEY_TRIPLEX\
    \ | 正常大小的衬线字体（比 FONT_HERSHEY_COMPLEX 更复杂） |\n| FONT_HERSHEY_COMPLEX_SMALL | FONT_HERSHEY_COMPLEX\
    \ 的较小版本 |\n| FONT_HERSHEY_SCRIPT_SIMPLEX | 手写风格字体 |\n| FONT_HERSHEY_SCRIPT_COMPLEX\
    \ | FONT_HERSHEY_SCRIPT_SIMPLEX 的更复杂变体 |\n| FONT_ITALIC | 斜体字体标志 |\n\n详情请参考 OpenCV\

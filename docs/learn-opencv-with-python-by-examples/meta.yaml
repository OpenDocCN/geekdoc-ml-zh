- img_proc: true
  md: 'convert them into machine readable texts that can be used for various purposes,
    such as editing, searching, and storing.


    This process involves several steps, including image preprocessing, text detection,
    character segmentation, and character recognition. In the first step, the image
    is preprocessed to improve the quality of the scanned or handwritten texts. This
    may involve removing noises, enhancing contrast, and sharpening the image.


    Next, text detection algorithms are used to locate the areas of the image that
    contain text. This is done by analyzing the image for patterns that resemble text,
    such as lines and curves, and then extracting those regions for further processing.


    Once the text has been detected, the image is segmented into individual characters
    or words. This involves separating the text into its constituent parts, which
    are then recognized using character recognition algorithms.


    OCR technology has a wide range of applications, including document digitization,
    text translation, and automated data entry. It is commonly used in industries
    such as finance, healthcare, and government, where the ability to quickly and
    accurately process large amounts of text data can be critical to decision-making
    and operations.


    Tesseract is an open-source text recognition library developed by Google, it is
    considered as one of the most accurate open-source OCR engines. It’s designed
    to recognize text in a variety of languages and formats, including scanned documents,
    PDFs, and images. It can be used from the command line or as a library in other
    programming languages, such as Python.


    Python has a wrapper library called `pytesseract`, which can be used to access
    the Tesseract features for recognizing texts from images. The details can be found

    \n## 3.7. 绘制一个类似 OpenCV 的图标\n\n来源：DrawTexts.py\n库：common/Draw.py\n\n现在让我们使用我们的封装函数来绘制一个复杂的图像，虽然不完全相同，但类似于\
    \ OpenCV 图标，如图 3.14 所示。\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_58_0.png)\n\
    \n图 3.14 类似 OpenCV 的图标\n\n创建一个大小为 360 x 320 的浅灰色空画布，与上面相同。\n将使用 `cv2.ellipse()`\
    \ 函数来绘制三个未闭合的圆，可以为椭圆指定起始角度和结束角度。\n将使用 `cv2.putText()` 函数在底部绘制文本。\n以下是代码片段，椭圆的轴定义为\
    \ (50, 50)，因此它看起来像一个圆而不是椭圆。三个圆的中心以及每个圆的起始和结束角度是根据类似 OpenCV 图标的位置定义的。\n\n```python\n\
    def draw_opencv_icon(image):\n    axes = (50, 50)\n    center_top_circle = (160,\
    \ 70)\n    center_lowerleft_circle = (\n        center_top_circle[0]-80,\n   \
    \     center_top_circle[1]+120 )\n    center_lowerright_circle = (\n        center_top_circle[0]+80,\n\
    \        center_top_circle[1]+120 )\n    angle_top_circle = 90\n    angle_lowerleft_circle\
    \ = -45\n    angle_lowerright_circle = -90\n    start_angle = 40\n    end_angle\
    \ = 320\n    draw_ellipse(image,center_top_circle,\n                 axes,\n \
    \                angle_top_circle,\n                 start_angle, end_angle,\n\
    \                 color=(0, 0, 255),\n                 thickness=40)\n\n    draw_ellipse(image,\n\
    \                 center_lowerleft_circle,\n                 axes,\n         \
    \        angle_lowerleft_circle,\n                 start_angle, end_angle,\n \
    \                color=(0, 255, 0),\n                 thickness=40)\n\n    draw_ellipse(image,\n\
    \                 center_lowerright_circle,\n                 axes,\n        \
    \         angle_lowerright_circle,\n                 start_angle, end_angle,\n\
    \                 color=(255, 0, 0),\n                 thickness=40)\n\n    draw_text(image,\
    \ \"OpenCV\", (10,330),\n             color=(0,0,0),\n             font_scale=2.4,\
    \ thickness=5)\n\n\nif __name__ == '__main__':\n    canvas = np.zeros((360,320,3),\
    \ np.uint8)\n    canvas[:] = 235,235,235\n    draw_opencv_icon(canvas)\n    cv2.imshow(\"\
    Canvas\", canvas)\n    cv2.waitKey(0)\n    cv2.destroyAllWindows()\n```\n\n执行代码，结果如图\
    \ 3.14 所示。\n\n# 4. 用户交互\n\nOpenCV 提供了允许用户以各种方式与图像和视频交互的函数。在前面的章节中，`cv2.waitKey()`\
    \ 函数已被用于接受来自键盘的用户输入，并且可以通过检查函数返回的按键代码来检测 ESC 键。而 `cv2.destroyAllWindows()` 函数会关闭所有使用\
    \ `cv2.imshow()` 创建的窗口。这些是非常简单的用户交互函数。\n\n此外，OpenCV 还提供了其他几个用于用户交互的函数，本章将介绍一些常用的函数。\n\
    \n第 4.1 节介绍鼠标操作，以及如何使用回调函数来捕获鼠标事件。\n第 4.2 节使用鼠标绘制圆形，第 4.3 节绘制多边形。\n第 4.4 节使用鼠标指定一个矩形来裁剪图像。\n\
    第 4.5 节介绍滑动条（或滑块），供用户输入数值。\n\n用户交互的重要部分是*回调*函数，它们几乎被所有的用户操作事件所使用。本章将解释如何在 Python\
    \ 中定义和使用回调函数。\n\n享受使用 OpenCV 和 Python 进行用户交互的乐趣。"

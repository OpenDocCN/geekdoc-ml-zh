    Source: DilationErosion.py\n\nDilation and erosion are two fundamental operations\
    \ in image processing that are used to manipulate the shape and size of objects\
    \ in an image. They are the most basic operations of Morphological Image Processing,\
    \ which is a collection of operations related to the shape or morphology in an\
    \ image.\n\nDilation is a morphological operation that is used to enlarge the\
    \ boundaries of an object in an image. It works by adding pixels to the boundaries\
    \ of the object based on the defined structuring element. The structuring element\
    \ is a small matrix or shape that is used to determine which pixels are added\
    \ to the boundaries of the object. The dilation operation is useful for filling\
    \ in small gaps, connecting broken parts of an object, and thickening the boundaries\
    \ of an object.\n\nErosion is also a morphological operation that is used to shrink\
    \ the boundaries of an object in an image. It works by removing pixels from the\
    \ boundaries of the object based on the defined structuring element. The erosion\
    \ operation is useful for removing small objects, smoothing the boundaries of\
    \ an object, and separating objects that are close together.\n\nSimply put, dilation\
    \ will expand the shape or boundaries to make it thicker. Erosion is in opposite\
    \ of dilation, it erodes away the shape or boundaries and makes it thinner.\n\n\
    Both dilation and erosion are typically used as pre-processing steps in image\
    \ analysis tasks, such as segmentation and feature extraction. They are often\
    \ used in combination to achieve specific effects, such as removing small objects\
    \ while preserving the overall shape of larger objects.\n\nA *structuring element*,\
    \ also known as *kernel*, is a 2-dimensional matrix that dilation and erosion\
    \ will use to slide through the entire image to detect pixels. In both operations,\
    \ the structuring element is swept over the image, and the output image is determined\
    \ by the interaction between the structuring element and the image pixels. In\
    \ the case of dilation, a pixel in a binary image (either 1 or 0) will be converted\
    \ to 1 if any pixels under the kernel are 1, and will be 0 if all pixels under\
    \ the kernel are 0. In case of erosion, a pixel will be converted to 1 only if\
    \ all the pixels under the kernel are 1, otherwise 0.\n\nThese operations are\
    \ often used in combination with other image processing techniques to perform\
    \ tasks such as edge detection, noise removal, and object recognition. For example,\
    \ erosion can be used for noise removal, the small not connected pixels will be\
    \ removed after image erosion. But sometimes the real boundaries are also eroded,\
    \ normally first apply dilation then erosion, and adjust the kernel size, therefore\
    \ the noises can be removed effectively.\n\nCanny Edge Detection is introduced\
    \ in the last section, with Canny we can obtain the edge of the boundary of the\
    \ image. Now apply dilation to make the boundaries thicker. The left-side image\

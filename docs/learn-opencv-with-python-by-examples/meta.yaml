    \ models to solve problems. This chapter will introduce the following models:\n\
    \n- Unsupervised learning\n    - K-Means (Section 7.1)\n- Supervised learning\n\
    \    - K-Nearest Neighbors (Section 7.2)\n    - Support Vector Machine (Section\
    \ 7.3)\n    - Artificial Neural Network (Section 7.4)\n    - Convolutional Neural\
    \ Network (Section 7.5)\n\nThe data is very important for machine learning, it\

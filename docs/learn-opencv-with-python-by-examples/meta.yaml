  md: 'In conclusion, compared with traditional machine learning algorithms like K-means,
    KNN and SVM, ANNs have a number of advantages, including the ability to learn
    non-linear relationships between input and output variables, and the ability to
    handle large and complex datasets. ANNs also allow parallel processing, meaning
    many pieces of information can be processed at the same time, making them highly
    efficient for tasks such as image processing and object detection.


    ANNs have a wide range of applications in various fields, including image recognition
    such as object detection, facial recognition, and autonomous driving. As well
    as many other fields like financial, energy, marketing forecasts, and so on.


    However, ANNs are computationally intensive that need significant computational
    resources, and require significant amounts of data to train which can be costly
    and time-consuming to collect.


    Due to their complex nature, ANNs are lack of transparency and often considered
    as a "black box" because it can be difficult to understand how they arrive at
    their decisions. This can make it challenging to explain their results, which
    can limit their usefulness in certain fields, such as healthcare, where transparency
    and interpretability are crucial.


    # 7.5. Convolutional Neural Network (CNN)


    # 7.5.1. What is a Convolutional Neural Network


    A Convolutional Neural Network (CNN) is a type of deep learning neural network
    that is commonly used for analyzing images and pictures. CNN is designed to automatically
    detect patterns and features in images, making them well-suited for tasks such
    as image recognition, object detection such as faces and eyes, and image segmentation
    such as separating the foregrounds from the backgrounds.


    In the previous section of an artificial neural network (ANN), the handwritten
    digits dataset has images of 28 × 28 pixels, which means there are 784 pixels
    for each image, in order to feed the data into an ANN, the input layer has 784
    nodes to take the input data.


    Now consider a high-resolution 4K color picture that has 3840 × 2160 pixels, meaning
    8 million pixels, and each pixel has three color channels, it’s not realistic'
  merge: -1
  pgno: 273
- img_proc: true
  md: 'to build a neural network to correspond so many input data for each picture,
    let alone tens of thousands of pictures are needed to process.


    When human look at a picture we do not scan the pixels one by one from top-left
    towards bottom-right, instead we look at the features or objects in the picture.
    For example, in a picture of a dog, we look at things like eyes, nose, mouth,
    ears, head, body and tails, then we know it’s a dog. And in most cases, we ignore
    the background or colors to identify the dog. CNNs do it in a similar way to find
    “features” from the images, the features are things like eyes, nose, mouth etc.
    Then send these features to a neural network to learn.


    The basic building block of a CNN is the convolutional layer, which performs a
    mathematical operation called *convolution* on the input image. This operation
    involves sliding a small filter, also called a *kernel* or a *feature detector*,
    across the image and computing the dot product between the filter weights and
    the corresponding pixel values in the image. The output of this operation is a
    *feature map* that highlights the areas of the image that match the filter''s
    pattern.


    CNN typically also includes other types of layers known as pooling layers, and
    fully connected layers. Pooling layers down-sample the feature maps by reducing
    their size, and fully connected layers connect the output to an ANN, allowing
    the CNN to learn complex relationships between features.


    See materials #15 and #16 in References at the end of this book for some detailed
    descriptions of CNN.


    # 7.5.2. Convolution Layer


    Source: ConvolutionalNeuralNetwork.py


    Convolution is a mathematical operation that is commonly used in signal and image
    processing. In CNNs, convolution is used in the convolutional layers to extract
    features from input images.


    In mathematics convolution is an operation on two functions, *f* and *g*, to produce
    a third function (*f* ∗ *g*), that represents how the shape of one is modified
    by the other. It’s defined as:


    $(f * g)(t) = \int_{-\infty}^{\infty} f(\tau)g(t - \tau)d\tau$'

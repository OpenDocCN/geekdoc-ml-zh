  md: "Installing Python on Ubuntu with the *apt* tool is a simple and straightforward\
    \ process, *apt* (Advanced Packaging Tool) is a command-line tool used in Ubuntu\
    \ and other Debian-based Linux to manage packages, which are pre-compiled software\
    \ packages that can be easily installed, updated, and removed on a Linux system.\
    \ It provides a simple and easy-to-use interface for searching, installing, and\
    \ removing packages. It also allows users to update the package list, upgrade\
    \ the system to the latest, and manage software repositories.\nHere is the step-by-step\
    \ guide:\n\n+   1. Start Ubuntu 22.04, login as a root user or a user with sudo\
    \ privilege, and open a new Terminal window, run the following command to update\
    \ and upgrade the system to ensure it’s up-to-date:\n\n    bash\n    $ sudo apt\
    \ update && sudo apt upgrade\n    \n\n2. Install the prerequisites for Python\
    \ by executing the following command:\n\n    bash\n    $ sudo apt install software-properties-common\n\
    \    \n\n3. Next, it’s recommended to install the *deadsnakes PPA* to the sources\
    \ list, which makes it possible to install multiple Python versions side by side\
    \ on the Ubuntu system. So instead of only having Python 3.10 on the system, Python\
    \ 3.9, 3.8, or 3.7 can also be installed on the same system simultaneously. See\
    \ more details about *deadsnakes PPA* at [https://tooling.bennuttall.com/ deadsnakes/](https://tooling.bennuttall.com/\
    \ deadsnakes/). Execute the following command to install it,\n\n    bash\n   \
    \ $ sudo add-apt-repository ppa:deadsnakes/ppa\n    \n\n    When prompted press\
    \ Enter to continue:\n\n    text\n    Press [ENTER] to continue or Ctrl-c to cancel\
    \ adding it.\n    \n\n4. When completed, run the following command to update again\
    \ to refresh the newly installed PPA, and then install Python 3.10:\n\n    bash\n\
    \    $ sudo apt update"

- img_proc: true
  md: 'An artificial neuron is a basic unit of computation in an Artificial Neural
    Network (ANN). Inspired by the biological neuron, an artificial neuron takes in
    one or more input values and produces a single output value. The inputs are multiplied
    by corresponding weights, which determine the importance of each input in the
    output calculation. The weighted inputs are then summed up, and an activation
    function is applied to the sum to produce the output value. The activation function
    determines whether the neuron should "fire" and produce an output signal. Figure
    7.27 shows an artificial neuron.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_253_0.png)


    Figure 7.27 An Artificial Neuron


    $x_0$, $x_1$ and $x_2$ are inputs of the artificial neuron, $\theta_0$, $\theta_1$
    and $\theta_2$ are the weights on the inputs, the inputs are multiplied by corresponding
    weights, then sum them up and send to the activation function for mathematical
    computations, and the result becomes the output $y$. The output of one artificial
    neuron can be connected to the input of another, forming a network of interconnected
    neurons. By adjusting the weights and activation functions of the artificial neurons
    through the training process, an artificial neural network can learn to perform
    complex tasks such as image recognition, natural language processing, and more.


    Common activation functions include linear, sigmoid, relu (rectified linear unit),
    and tanh (hyperbolic tangent), which will be introduced in 7.4.2.


    Many artificial neurons are put together to form an *Artificial Neural Network*
    (ANN). Figure 7.28 shows a very simple artificial neural network, each artificial
    neuron is called a node in the network.'

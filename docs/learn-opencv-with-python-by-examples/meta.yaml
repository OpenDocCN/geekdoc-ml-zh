    ```\n30  result = ann.predict(X_test)\n31  predict = result[1]\n```\n\nThe ann.predict()\
    \ function returns a tuple that has a single value and an array. If the prediction\
    \ is for a single data the result is in the first item of the tuple result[0];\
    \ if the prediction is for a dataset with multiple data items then the result\
    \ is in the second item of the tuple result[1]. In our case we pass the testing\

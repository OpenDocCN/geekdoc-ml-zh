    # 7.2.2.2. True Positive, False Positive, True Negative and False Negative


    In order to evaluate the results of machine learning for classification problems,
    there are four important concepts, True Positive (TP), False Positive (FP), True
    Negative (TN) and False Negative (FN). They are explained in below table:


    | True Positives (TP) | Data is labeled as 1, and it’s predicted as 1. (Correct).
    E.g., the color is predicted to be red, and it is actually red. |

    | True Negatives (TN) | Data is labeled as 0, and it’s predicted as 0. (Correct).
    E.g., the color is predicted not red, and it’s actually not red. |

    | False Positives (FP) | Data is labeled as 0, but it’s predicted as 1. (Error).
    E.g. the color is predicted to be red, but it’s actually not red. |

    | False Negatives (FN) | Data is labeled as 1, but it is predicted as 0. (Error).
    E.g. the color is predicted not red, but it’s actually red. |


    # 7.2.2.3. Precision, Recall and F1 Score


    Precision and Recall are two important metrics used to evaluate the performance
    of a classification model.


    *Precision* is the proportion of true positive predictions out of all the positive
    predictions made by the model. It measures how accurate the model is when it predicts
    a positive outcome.


    *Recall*, on the other hand, measures the proportion of true positive predictions
    out of all the actual positive cases in the data. It measures how well the model
    is able to detect positive cases in the data.


    In other words, precision is about the accuracy of the positive predictions, while
    recall is about the completeness of the positive predictions. See Figure 7.14.'
  merge: -1
  pgno: 222
- img_proc: true
  md: '![](img/b99f6edaf6f730ad313ce66bc5a26be2_223_0.png)


    Figure 7.14 Precision and Recall


    In Figure 7.14, the true positives (green half circle in the left) plus false
    negatives (green part in the left rectangle) are true labels in the dataset. The
    false positives (red half circle in right) plus true negatives (red part in right
    rectangle) are false labels in the dataset.


    As shown in the right-side of Figure 7.14, the *precision* is defined as the percentage
    of true positives against all predicted positives. Simply put, precision is how
    many positives are real out of all predicted positives. Precision demonstrates
    the ability to distinguish the negatives, a high value of precision means it can
    effectively distinguish the positives from the negatives.


    While the *recall* is defined as the percentage of true positives against all
    actual positives. Simply put, recall is how many positives are predicted out of
    all real positives. Recall demonstrates the ability to recognize the positives
    in the dataset, a high recall value means it can correctly recognize most of the
    positives.


    For example, when diagnosing a disease, a high precision score means a smaller
    number of mistakes in the positive results, most positive results are real positives,
    only a small number of positive results are errors. A high recall score means
    most of the actual positives are diagnosed as positive, only a small number of
    actual positives are not correctly diagnosed.


    As summary, the precision and recall are calculated by True Positives (TP), True
    Negatives (TN), False Negatives (FN), as per below formula:'
  merge: -1

    Figure 6.14 Detect Red Color


    First load the image into `img`, and convert it to HSV in `imgHSV`. Then create
    two masks, `mask1` and `mask2`, the hue ranges are [0, 10] and [161, 179] respectively.
    Then merge the two masks by bitwise OR operation:


    ```

    1  img = cv2.imread("../res/flower002.jpg")

    2  imgHSV = cv2.cvtColor(img, cv2.COLOR_BGR2HSV)

    3  mask1 = cv2.inRange(imgHSV, (161, 90, 100),

    4                      (179, 255, 255) )

    5  mask2 = cv2.inRange(imgHSV, (  0, 90, 100),

    6                      ( 10, 255, 255) )

    7  mask = cv2.bitwise_or(mask1, mask2)

    ```


    The mask looks like Figure 6.15, it''s the combination of `mask1` and `mask2`,
    it should cover all red pixels in the image


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_149_1.png)


    Figure 6.15 Mask for Red Color


    Finally, apply `mask` to `img` by bitwise AND operation.


    ```

    8  result = cv2.bitwise_and(img, img, mask=mask)

    9  cv2.imshow("Mask", mask)

    10 cv2.imshow("Result", result)

    ```


    The result looks like Figure 6.16,


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_149_2.png)


    Figure 6.16 Red Color Detected


    In summary, because the red color wraps around 359 and 0 in the hue color wheel,
    in order to detect red, we have to create two masks and merge them together. It
    should be easier for detecting other colors, only one mask is needed.'

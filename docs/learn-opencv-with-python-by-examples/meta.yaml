- md: "Different data sets will have different accuracy curves, basically they all\
    \ look similar to Figure 7.13. A best $k$ value can be found from this kind of\
    \ analysis. In this case selecting $k=20$ will make both training and testing\
    \ sets achieve the accuracy near 0.75.\n\n## 7.2.2.2. True Positive, False Positive,\
    \ True Negative and False Negative\n\nIn order to evaluate the results of machine\
    \ learning for classification problems, there are four important concepts, True\
    \ Positive (TP), False Positive (FP), True Negative (TN) and False Negative (FN).\
    \ They are explained in below table:\n\n| True Positives (TP) | Data is labeled\
    \ as 1, and it’s predicted as 1. (Correct). E.g., the color is predicted to be\
    \ red, and it is actually red. |\n| True Negatives (TN) | Data is labeled as 0,\
    \ and it’s predicted as 0. (Correct). E.g., the color is predicted not red, and\
    \ it’s actually not red. |\n| False Positives (FP) | Data is labeled as 0, but\
    \ it’s predicted as 1. (Error). E.g. the color is predicted to be red, but it’s\
    \ actually not red. |\n| False Negatives (FN) | Data is labeled as 1, but it is\
    \ predicted as 0. (Error). E.g. the color is predicted not red, but it’s actually\
    \ red. |\n\n## 7.2.2.3. Precision, Recall and F1 Score\n\nPrecision and Recall\
    \ are two important metrics used to evaluate the performance of a classification\
    \ model.\n\n*Precision* is the proportion of true positive predictions out of\
    \ all the positive predictions made by the model. It measures how accurate the\
    \ model is when it predicts a positive outcome.\n\n*Recall*, on the other hand,\
    \ measures the proportion of true positive predictions out of all the actual positive\
    \ cases in the data. It measures how well the model is able to detect positive\
    \ cases in the data.\n\nIn other words, precision is about the accuracy of the\
    \ positive predictions, while recall is about the completeness of the positive\
    \ predictions. See Figure 7.14.\n\n![](img/b99f6edaf6f730ad313ce66bc5a26be2_223_0.png)\n\
    \nFigure 7.14 Precision and Recall\n\nIn Figure 7.14, the true positives (green\
    \ half circle in the left) plus false negatives (green part in the left rectangle)\
    \ are true labels in the dataset. The false positives (red half circle in right)\
    \ plus true negatives (red part in right rectangle) are false labels in the dataset.\n\
    \nAs shown in the right-side of Figure 7.14, the *precision* is defined as the\
    \ percentage of true positives against all predicted positives. Simply put, precision\
    \ is how many positives are real out of all predicted positives. Precision demonstrates\
    \ the ability to distinguish the negatives, a high value of precision means it\
    \ can effectively distinguish the positives from the negatives.\n\nWhile the *recall*\
    \ is defined as the percentage of true positives against all actual positives.\
    \ Simply put, recall is how many positives are predicted out of all real positives.\
    \ Recall demonstrates the ability to recognize the positives in the dataset, a\
    \ high recall value means it can correctly recognize most of the positives.\n\n\
    For example, when diagnosing a disease, a high precision score means a smaller\
    \ number of mistakes in the positive results, most positive results are real positives,\
    \ only a small number of positive results are errors. A high recall score means\
    \ most of the actual positives are diagnosed as positive, only a small number\
    \ of actual positives are not correctly diagnosed.\n\nAs summary, the precision\
    \ and recall are calculated by True Positives (TP), True Negatives (TN), False\
    \ Negatives (FN), as per below formula:\n\n$$precision = \\frac{TP}{TP + FP}$$\n\
    $$recall = \\frac{TP}{TP + FN}$$\n\n## What is F1 Score\n\nF1 score is a measure\
    \ of accuracy, it’s a balance of precision and recall, it’s defined as:\n\n$$F_1\
    \ = \\frac{2 \\cdot precision \\cdot recall}{precision + recall} = \\frac{TP}{TP\
    \ + \\frac{1}{2}(FP + FN)}$$\n\nThe highest F1 score is 1.0, indicating perfect\
    \ precision and recall. While the lowest possible value is 0, when either the\
    \ precision or recall is zero.\nDon’t worry about the formula and calculations,\
    \ sklearn provides functions to take care of all the calculations. The only thing\
    \ we need to do is to pass the original label and predicted results to the functions,\
    \ they do all the calculations and give us the results.\n\n## 7.2.2.4. KNN Evaluation\n\
    \nNow let’s go back to the above example, there are several metrics to measure\
    \ the result of classification problems in sklearn. Line 1 to 3 below import three\
    \ metrics,\n\n```\n1 from sklearn.metrics import confusion_matrix\n2 from sklearn.metrics\
    \ import accuracy_score\n3 from sklearn.metrics import classification_report\n\
    4 print(\"Accuracy Score:\",\n        accuracy_score(y_test, res_test))\n5 print(\"\
    Confusion Matrix:\",\n        confusion_matrix(y_test, res_test))\n6 print(\"\
    Classification Report:\",\n        classification_report(y_test, res_test))\n\
    ```\n\n## Accuracy Score\n\naccuracy_score() reports the accuracy of the predictions,\
    \ it simply calculates the percentage of correct predictions over the whole samples.\
    \ The parameters are the true labels and predicted results.\n\nSay there are totally\
    \ $n$ data samples, $y'$ is the predicted result, and $y_i$ is the label of the\
    \ sample data, then the accuracy is calculated as per the below formula:\n\n$$accuracy(y,\
    \ y') = \\sum_{i=0}^{n-1} 1(y' = y_i)$$\n\nRun the above codes with $k = 20$,\
    \ the *Accuracy Score* is 75.6%, which means there are 75.6% of predicted values\
    \ are correct compared with the true label.\n\n```\nAccuracy Score: 0.75625\n\
    ```\n\n## Confusion Matrix\n\nA confusion matrix is a table that summarizes the\
    \ performance of a classification model on a dataset. It is a matrix that shows\
    \ the number of true positive, true negative, false positive, and false negative\
    \ predictions made by the model.\n\nThe confusion matrix provides a more detailed\
    \ view of the performance of a classification model than the accuracy score. It\
    \ can be used to calculate various metrics such as precision, recall, F1 score,\
    \ and accuracy.\n\nAn example of a confusion matrix is shown as below table,\n\
    \n| | Predicted Positive | Predicted Negative |\n|---|---|---|\n| **Actual Positive**\
    \ | True Positive (TP) | False Negative (FN) |\n| **Actual Negative** | False\
    \ Positive (FP) | True Negative (TN) |\n\nRun the above codes with $k = 20$, the\
    \ confusion matrix looks like:\n\n```\nConfusion Matrix:\n[[62 19]\n [20 59]]\n\
    ```\n\nThe upper left value is the true positive which is 62, the lower right\
    \ value is the true negative which is 59, they are the correct predictions. The\
    \ upper right value is the false negative of 19, and the lower left value is the\
    \ false positive of 20.\n\nIn summary, a good classification model will have a\
    \ high number of true positives and true negatives, and a low number of false\
    \ positives and false negatives. The confusion matrix provides a useful way to\
    \ visualize the performance of the model and identify areas for improvement.\n\
    \n## Classification Report\n\nA classification report is a table that summarizes\
    \ the performance of a classification model. It provides a comprehensive overview\
    \ of the precision, recall, and F1-score for each class in the dataset. It is\
    \ typically generated using the metrics calculated from the confusion matrix.\
    \ And it is a commonly used tool in machine learning and data science to evaluate\
    \ the performance of a model.\nThe classification report usually contains the\
    \ following metrics for each class in the classification model:\n\n- Precision:\
    \ as described above, the proportion of true positives out of all positive predictions.\n\
    - Recall: as described above, the proportion of true positives out of all actual\
    \ positive cases in the data.\n- F1-score: as described above, a balance between\
    \ the above two metrics.\n- Support: the number of data points for each class.\n\
    \nRun the above codes with $k = 20$, the classification report looks like:\n\n\
    ```\nClassification Report:\n              precision    recall  f1-score   support\n\
    \n           0       0.76      0.77      0.76        81\n           1       0.76\
    \      0.75      0.75        79\n\n    accuracy                           0.76\
    \       160\n   macro avg       0.76      0.76      0.76       160\nweighted avg\
    \       0.76      0.76      0.76       160\n```\n\nThe classification report shows\
    \ each class in one row, in this case there are two classes, 0 and 1, the classification\
    \ report shows them in the first two rows. If there are 10 classes, there will\
    \ be 10 rows displayed in the report. The accuracy is the same as the accuracy\
    \ score discussed above. The macro avg is the mean or average of the metrics with\
    \ equal weight on each class. The weighted avg is the average of the metrics in\
    \ which the score of each class is weighted by its presence in the data sample."
  mdcn: "不同的数据集会有不同的准确率曲线，但它们基本上都与图7.13相似。通过这种分析可以找到一个最佳的$k$值。在这种情况下，选择$k=20$可以使训练集和测试集的准确率都接近0.75。\n\
    \n## 7.2.2.2. 真阳性、假阳性、真阴性和假阴性\n\n为了评估机器学习在分类问题上的结果，有四个重要概念：真阳性（TP）、假阳性（FP）、真阴性（TN）和假阴性（FN）。它们在下表中进行了解释：\n\
    \n| 真阳性（TP） | 数据被标记为1，并且被预测为1。（正确）。例如，颜色被预测为红色，而它确实是红色。 |\n| 真阴性（TN） | 数据被标记为0，并且被预测为0。（正确）。例如，颜色被预测为非红色，而它确实不是红色。\
    \ |\n| 假阳性（FP） | 数据被标记为0，但被预测为1。（错误）。例如，颜色被预测为红色，但它实际上不是红色。 |\n| 假阴性（FN） | 数据被标记为1，但被预测为0。（错误）。例如，颜色被预测为非红色，但它实际上是红色。\
    \ |\n\n## 7.2.2.3. 精确率、召回率和F1分数\n\n精确率和召回率是用于评估分类模型性能的两个重要指标。\n\n*精确率*是模型做出的所有正向预测中，真阳性预测所占的比例。它衡量模型在预测正向结果时的准确性。\n\
    \n*召回率*则衡量在所有实际正向案例中，真阳性预测所占的比例。它衡量模型在数据中检测正向案例的能力。\n\n换句话说，精确率关注的是正向预测的准确性，而召回率关注的是正向预测的完整性。参见图7.14。\n\
    \n![](img/b99f6edaf6f730ad313ce66bc5a26be2_223_0.png)\n\n图7.14 精确率和召回率\n\n在图7.14中，真阳性（左侧绿色半圆）加上假阴性（左侧矩形中的绿色部分）是数据集中的真实标签。假阳性（右侧红色半圆）加上真阴性（右侧矩形中的红色部分）是数据集中的错误标签。\n\
    \n如图7.14右侧所示，*精确率*定义为真阳性占所有预测阳性的百分比。简单来说，精确率就是所有预测阳性中有多少是真正的阳性。精确率展示了区分阴性的能力，高精确率意味着能有效区分阳性和阴性。\n\
    \n而*召回率*定义为真阳性占所有实际阳性的百分比。简单来说，召回率就是所有真实阳性中有多少被预测为阳性。召回率展示了识别数据集中阳性的能力，高召回率意味着能正确识别大部分阳性。\n\
    \n例如，在诊断疾病时，高精确率分数意味着阳性结果中的错误较少，大部分阳性结果是真正的阳性，只有少数阳性结果是错误的。高召回率分数意味着大部分实际阳性被诊断为阳性，只有少数实际阳性未被正确诊断。\n\
    \n总结来说，精确率和召回率是通过真阳性（TP）、真阴性（TN）、假阴性（FN）计算得出的，公式如下：\n\n$$precision = \\frac{TP}{TP\
    \ + FP}$$\n$$recall = \\frac{TP}{TP + FN}$$\n\n## 什么是F1分数\n\nF1分数是一种准确率的度量，它是精确率和召回率的平衡，定义如下：\n\
    \n$$F_1 = \\frac{2 \\cdot precision \\cdot recall}{precision + recall} = \\frac{TP}{TP\
    \ + \\frac{1}{2}(FP + FN)}$$\n\nF1分数的最高值是1.0，表示精确率和召回率都完美。而最低可能值是0，当精确率或召回率为零时。\n\
    不用担心公式和计算，sklearn提供了函数来处理所有计算。我们唯一需要做的就是将原始标签和预测结果传递给这些函数，它们会完成所有计算并给出结果。\n\n\
    ## 7.2.2.4. KNN评估\n\n现在让我们回到上面的例子，sklearn中有几个指标可以衡量分类问题的结果。下面第1到3行导入了三个指标，\n\n\
    ```\n1 from sklearn.metrics import confusion_matrix\n2 from sklearn.metrics import\
    \ accuracy_score\n3 from sklearn.metrics import classification_report\n4 print(\"\
    Accuracy Score:\",\n        accuracy_score(y_test, res_test))\n5 print(\"Confusion\
    \ Matrix:\",\n        confusion_matrix(y_test, res_test))\n6 print(\"Classification\
    \ Report:\",\n        classification_report(y_test, res_test))\n```\n\n## 准确率分数\n\
    \naccuracy_score()报告预测的准确率，它简单地计算正确预测占整个样本的百分比。参数是真实标签和预测结果。\n\n假设总共有$n$个数据样本，$y'$是预测结果，$y_i$是样本数据的标签，那么准确率按以下公式计算：\n\
    \n$$accuracy(y, y') = \\sum_{i=0}^{n-1} 1(y' = y_i)$$\n\n使用$k = 20$运行上述代码，*准确率分数*为75.6%，这意味着与真实标签相比，有75.6%的预测值是正确的。\n\
    \n```\nAccuracy Score: 0.75625\n```\n\n## 混淆矩阵\n\n混淆矩阵是一个表格，总结了分类模型在数据集上的性能。它是一个矩阵，显示了模型做出的真阳性、真阴性、假阳性和假阴性预测的数量。\n\
    \n混淆矩阵比准确率分数提供了更详细的分类模型性能视图。它可用于计算各种指标，如精确率、召回率、F1分数和准确率。\n\n混淆矩阵的一个示例如下表所示，\n\
    \n| | 预测阳性 | 预测阴性 |\n|---|---|---|\n| **实际阳性** | 真阳性（TP） | 假阴性（FN） |\n| **实际阴性**\
    \ | 假阳性（FP） | 真阴性（TN） |\n\n使用$k = 20$运行上述代码，混淆矩阵如下：\n\n```\nConfusion Matrix:\n\
    [[62 19]\n [20 59]]\n```\n\n左上角的值是真阳性，为62，右下角的值是真阴性，为59，它们是正确的预测。右上角的值是假阴性，为19，左下角的值是假阳性，为20。\n\
    \n总结来说，一个好的分类模型会有大量的真阳性和真阴性，以及少量的假阳性和假阴性。混淆矩阵提供了一种可视化模型性能并识别改进领域的有用方法。\n\n## 分类报告\n\
    \n分类报告是一个表格，总结了分类模型的性能。它提供了数据集中每个类别的精确率、召回率和F1分数的全面概述。它通常使用从混淆矩阵计算出的指标生成。它是机器学习和数据科学中评估模型性能的常用工具。\n\
    分类报告通常包含分类模型中每个类别的以下指标：\n\n- 精确率：如上所述，真阳性占所有阳性预测的比例。\n- 召回率：如上所述，真阳性占所有实际阳性案例的比例。\n\
    - F1分数：如上所述，上述两个指标的平衡。\n- 支持度：每个类别的数据点数量。\n\n使用$k = 20$运行上述代码，分类报告如下：\n\n```\n\

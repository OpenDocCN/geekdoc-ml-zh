    # 7.5.5. CNN Architecture


    A CNN is made of the convolution layers, the pooling layers and a fully connected
    layer. Now put them together, the architecture of the CNN is shown as Figure 7.47.


    The original pictures are the input of the CNN model. A number of features are
    applied to the pictures in the first convolution layer, it generates $n_1$ feature
    maps. And then goes to the pooling layer, max pooling is performed on the feature
    maps and generates $n_1$ channels of pooling output.


    ![](img/b99f6edaf6f730ad313ce66bc5a26be2_285_1.png)


    Figure 7.47 CNN Architecture


    There are two layers of convolution/pooling in the above architecture, depending
    on the needs it could be one or multiple layers of convolution/pooling.

    Consider the first convolution/pooling layer to identify some features in the
    first level like edges, eyes, nose, mouth, ears, paws etc. The output of this
    layer becomes the input of the second convolution/pooling layer.

    In the second convolution layer, again, a number of features are applied, and
    this layer generates $n_2$ channels of feature maps, the pooling operations will
    be performed on these feature maps.'
  merge: -1
  pgno: 285
- img_proc: true
  md: 'Consider the second convolution/pooling layer to identify the next level of
    features like the head, body and legs of the dog, this is a higher level of features
    because the head includes the eyes, nose, mouth and ears, and the legs include
    paws, and so on.

    In CNN models, we do not need to provide the contents of the features, the model
    will learn by itself from the input pictures during the training process, where
    thousands or even tens of thousands of pictures are used for training. The back-propagation
    process will be able to update the contents of the features in the convolution
    layer and make them best fit to the dataset during the training process. The only
    thing we need to provide is the size and number of features in each layer.

    Depending on the needs, more layers of convolution/pooling might be added. After
    the convolution/pooling layers, the amount of data is significantly reduced, and
    the features are extracted in the output.

    The next operation is flattening, because the output of the pooling layer consists
    of $n_2$ channels of 2D matrix, they will be flattened to a 1D array in order
    to feed into the fully connected layer.

    Finally, the data goes to the fully connected neural network for classification
    calculation, which is exactly the same as the ANN in the previous section.



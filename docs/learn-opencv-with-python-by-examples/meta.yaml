  md: "$$precision = \\frac{TP}{TP + FP}$$\n$$recall = \\frac{TP}{TP + FN}$$\n\n#\
    \ What is F1 Score\n\nF1 score is a measure of accuracy, it’s a balance of precision\
    \ and recall, it’s defined as:\n\n$$F_1 = \\frac{2 \\cdot precision \\cdot recall}{precision\
    \ + recall} = \\frac{TP}{TP + \\frac{1}{2}(FP + FN)}$$\n\nThe highest F1 score\
    \ is 1.0, indicating perfect precision and recall. While the lowest possible value\
    \ is 0, when either the precision or recall is zero.\nDon’t worry about the formula\
    \ and calculations, sklearn provides functions to take care of all the calculations.\

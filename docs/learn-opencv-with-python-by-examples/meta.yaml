    visualize the data.


    ```

    1  import numpy as np

    2  import cv2 as cv

    3  from matplotlib import pyplot as plt

    4  from sklearn.datasets import make_blobs

    5  def sample_cluster():

    6      X, y = make_blobs(n_samples=600, centers=2,


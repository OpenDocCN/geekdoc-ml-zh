    | Key    | B | B | B | B | B | A | A | B | B | B  | D  |\n\n# **Chapter 11: Adaptive\
    \ Signal Processing**\n\n# *Answers to PreLab Questions*\n\n+   1. In optimal\
    \ filtering, the input and the desired signals are available for a given time\
    \ window, and the optimal parameters of the filter are computed only once. In\
    \ adaptive filtering, the input and the desired signal are provided to the algorithm,\
    \ and the algorithm computes the parameters of the filter and is updated; hence,\
    \ it is iterative in nature. Adaptive filter does not require previous knowledge\
    \ of the signal statistics.\n2. An adaptive filter is a filter with filter coefficients\
    \ that are non-constants. The filter coefficients are adjusted based on some specific\
    \ criterion defined to optimize the filter's performance. In an ordinary filter,\
    \ the filter coefficients are constant and do not vary with respect to specific\
    \ criteria.\n3. Some examples of the adaptive filter include Wiener filter, least\
    \ mean square filter, RLS filter, etc.\n4. The adaptive filters are generally\
    \ preferred in the following contexts:\n   (a) The filter characteristics are\
    \ necessary to be changed or adapted to specific conditions.\n   (b) Spectral\
    \ overlap between the signal and noise\n   (c) If the noise present in the signal\
    \ is unknown or varies with time.\n5. The performance measures of the adaptive\
    \ filter are rate of convergence, misadjustment, tracking, robustness, computational\
    \ complexity, filter structure, numerical stability and accuracy.\n6. The least\
    \ mean square (LMS) algorithm is an adaptive filter method that uses a gradient-based\
    \ method of steepest descent to obtain the least mean square error between the\
    \ output and the reference data. It is an iterative procedure that corrects the\
    \ weight vector (filter coefficient) in the direction of the negative of the gradient\
    \ vector, which eventually leads to the minimum mean square error.\n7. The cost\
    \ function of least square estimation is defined as the sum of weighted error\
    \ squares. The least square estimation is to minimize the error of the filter\
    \ output to the reference signal. In this process, statistical modelling is not\
    \ involved directly.\n8. The variants of LMS algorithm include (a) normalized\
    \ LMS, (b) leaky LMS, (c) block LMS and (d) sign LMS."
  - '[PAGE 529]


    +   9. The step size parameter plays a vital role in the LMS algorithm. The larger
    the step size value, the faster the adaption, increasing residual MSE. Also, it
    affects the stability of the algorithm. Therefore, the step size selection cannot
    be arbitrarily large.


    +   10. The recursive least squares is an adaptive filter algorithm, which recursively
    obtains the filter coefficients that minimize a least squares cost function relating
    to the input. In this algorithm, input signals are considered deterministic, whereas
    input signals are considered stochastic in the LMS. As a result, the RLS algorithm
    converges faster than the LMS algorithm.



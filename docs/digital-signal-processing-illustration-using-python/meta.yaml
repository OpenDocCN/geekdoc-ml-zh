    # ## 3.4 Correlation


    Correlation is a tool to find the relative similarity between two signals. Correlation
    has two variants, namely: autocorrelation and cross-correlation. Autocorrelation
    involves the correlation of a signal with itself. Cross-correlation is performed
    when two different signals are correlated with one another.


    The expression for autocorrelation of the sequence $x[n]$ is given by'
  merge: -1
  pgno: 125
- img_proc: true
  md: '$$r_{xx}(l) = x[l] * x[-l] \qquad (3.33)$$


    Equation (3.33) gives the relationship between correlation and convolution. Convolving
    the folded version of the sequence $x[n]$ with the signal $x[n]$ results in autocorrelation.
    Equation (3.33) can be expressed as


    $$r_{xx}(l) = \sum_{n=-\infty}^{\infty} x[n]x[n+l] \qquad (3.34)$$


    Some of the properties of the autocorrelation function are summarized below:


    +   1. Autocorrelation function is an even function. It is expressed as $r_{xx}(-l)
    = r_{xx}(l)$.

    2. Autocorrelation attains its maximum value at zero lag. It is expressed as $r_{xx}(0)
    \geq |r_{xx}(k)|$ for all ''$k$''.


    The cross-correlation between two signals $x[n]$ and $y[n]$ is expressed as


    $$r_{xy}(l) = x[l] * y[-l] \qquad (3.35)$$


    The above equation can be expressed as


    $$r_{xy}(l) = \sum_{k=-\infty}^{\infty} x[k]y[l+k] \qquad (3.36)$$



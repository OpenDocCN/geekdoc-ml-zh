    not. Let us consider four discrete-time systems with the impulse responses: $h_1[n]
    = \delta[n+1] + \delta[n] + \delta[n-1]$, $h_2[n] = \delta[n] + \delta[n-1] +
    \delta[n-2]$, $h_3[n] = u[n] - u[n-1]$ and $h_4[n] = \delta[n+2] + \delta[n+1]
    + \delta[n]$ for $-10 \leq n \leq 10$. The python code, which plots the impulse
    responses of the above-mentioned discrete-time systems, is shown in Fig. 4.32,
    and the corresponding output is shown in Fig. 4.33.


    # **Inferences**


    For the discrete-time system to be causal, the impulse response should be equal
    to zero for $n < 0$.


    +   1. The impulse response of system-1 is non-zero for $n < 0$; hence, discrete-time
    system-1 is a non-causal system.

    2. The impulse response of system-2 is zero for $n < 0$; hence, discrete-time
    system-2 is a causal system.


    ```

    python

    #Impulse response of DT systems

    import numpy as np

    import matplotlib.pyplot as plt

    N = 10

    n= np.arange(-N, N + 1,1, dtype = float)

    #Defining the impulse response of the four systems

    h1=np.zeros(2*N+1,dtype=''float'')

    h2=np.zeros(2*N+1,dtype=''float'')

    h3=np.zeros(2*N+1,dtype=''float'')

    h4=np.zeros(2*N+1,dtype=''float'')

    h1=[1 if (i==-1) | (i==0)|(i==1) else 0 for i in n]

    h2=[1 if (i==0) | (i==1)|(i==2) else 0 for i in n]

    h3=[1 if (i==0) else 0 for i in n]

    h4=[1 if (i==-2) | (i==-1)|(i==0) else 0 for i in n]

    #Plotting the impulse response

    plt.subplot(2,2,1),plt.stem(n,h1),plt.xlabel(''n-->''),plt.ylabel(''Amplitude''),

    plt.title(''$h_1[n]$''),plt.subplot(2,2,2),plt.stem(n,h2),plt.xlabel(''n-->''),


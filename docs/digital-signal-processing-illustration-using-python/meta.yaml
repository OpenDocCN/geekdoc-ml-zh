    # 9.3 Coefficient Quantization


    The filter coefficients can be obtained using filter design approaches based on
    the given set of filter specifications. These filter coefficients are represented
    as a system function of the filter $H(z)$, and they can be used in signal processing
    applications. These filter coefficients may be integer or non-integer numbers.
    If the filter coefficient is an integer, then the finite precision format is enough
    to represent it in digital computation. Otherwise, the coefficient is non-integer,
    then infinite precision format is necessary to represent it for the accurate result
    of the applications. However, in real-time scenario the hardware setup in the
    application may not be able to store the value of filter coefficients as it is
    due to the limited register size or finite precision processor. The representation
    of the filter coefficients from infinite precision to finite number precision
    may give coefficients quantization. This coefficient quantization can change the
    location of the filter poles and zeros. As a result, after implementing a filter,
    it may observe that the frequency response of the filter is quite different from
    that of the original design. The coefficients obtained by design methods are real
    or complex. These coefficients are often stored in a finite length register for
    real-world digital signal processing. The coefficients are often rounded to accommodate
    it in the finite length register. This causes a rounding error, which will influence
    the filter characteristics. The frequency response of the quantized filter coefficients
    will differ from the desired frequency response. Sensitivity of the filter response
    to coefficient quantization is dependent on the type of filter structures. Detail
    about this will be discussed later in this chapter.



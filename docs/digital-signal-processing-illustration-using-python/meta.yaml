    # ## 6.2 Moving Average filter


    The relationship between the input and output of *M*-point moving average filter
    is given by


    $$y[n] = \frac{1}{M} \sum_{k=0}^{M-1} x[n-k]$$ (6.9)


    For a three-point moving average filter, $M = 3$, substituting $M = 3$ in Eq.
    (6.9), we get the input-output relationship as


    $$y[n] = \frac{1}{3}\{x[n] + x[n-1] + x[n-2]\}$$ (6.10)


    From Eq. (6.10), it is possible to interpret that equal weightage is given to
    $x[n]$, $x[n-1]$ and $x[n-2]$. This type of system is termed as ''*moving average
    system*''. This system performs the weighted average of three input samples $x[n]$,
    $x[n-1]$ and $x[n-2]$; hence, it is termed as ''*moving average filter*''.



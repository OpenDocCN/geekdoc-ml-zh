  md: '# ### 12.1.3 *Mel-Frequency Cepstral Coefficient (MFCC) Feature*


    The step-by-step procedure to compute the MFCC feature is discussed in this section.
    This procedure contains six major steps involved in the computation of MFCC; they
    are (1) pre-emphasis, (2) sampling and windowing, (3) fast Fourier transform (FFT),
    (4) mel filter bank, (5) logarithmic function and (6) discrete cosine transform.
    The block diagram of MFCC computation is depicted in Fig. 12.4.


    # #### 12.1.3.1 Pre-emphasis


    The voice samples are passed through a highpass filter, which is mathematically
    expressed as


    $$y[n] = x[n] - ax[n-1]$$ (12.1)


    where $x[n]$ is the input voice samples, ''$a$'' is the filter constant and it
    takes the value between 0.9 to 1.0 and $y[n]$ denotes the filtered voice samples.
    In this pre-emphasis process, the input voice samples are passed through a highpass
    filter, and the filtered output will emphasize the high-frequency component present
    in the input voice samples.


    The python code to read, normalize and display audio files is shown in Fig. 12.5,
    and its simulation results are shown in Fig. 12.6.


    From Fig. 12.6, it is possible to observe that the amplitude of the original audio
    signal is [$-20{,}000$, $20{,}000$], whereas in the normalized audio, the amplitude
    varies from $-1$ to $1$.


    # #### 12.1.3.2 Sampling and Windowing


    The speech signal is divided into small segments with a duration of 20–30 ms,
    which are called ''frames''. While splitting the input voice samples may be allowed
    to overlap between the successive segments. Windowing can be used to avoid discontinuity
    between consecutive segments. Also, the windowing technique smooths the extreme
    samples in both starting and ending of the segments. The commonly used windowing
    function is Hamming or Hanning. The process of windowing the input sequence is
    mathematically written as



    # 6.1 First-Order IIR Filter


    This section begins with the design of a first-order IIR filter. The transfer
    function of a first-order IIR filter is given by


    ```

    $$H(z) = \frac{1}{1 - p_1 z^{-1}} \qquad (6.1)$$

    ```


    If the pole lies on the unit circle ($p_1 = 1$), the transfer function of the
    filter is given by'

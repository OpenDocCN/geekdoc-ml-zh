    the desired signal and the difference between the desired signal and the output
    of the filter is the error signal *e*[*n*]. Forgetting factor is used in RLS algorithm
    to remove or minimize the influence of old measurements. A small forgetting factor
    reduces the influence of old samples and increases the weight of new samples;
    as a result, a better tracking can be realized at the cost of a higher variance
    of the filter coefficients. A large forgetting factor'

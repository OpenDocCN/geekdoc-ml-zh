    5. Applying discrete Fourier transform is equivalent to applying discrete Fourier
    series on a periodically extended finite aperiodic signal. Discrete Fourier series
    is applied when the signal under analysis is periodic, and discrete Fourier transform
    is applied when the signal under analysis is aperiodic.

    6. DTFT is Z-transform evaluated on a unit circle. The expression for Z-transform
    is given by


    ```

    $$X(z) = \sum_{n=-\infty}^{\infty} x[n]z^{-n}$$

    ```


    Substituting $z = re^{j\omega}$ in the above expression, we get


    ```

    $$X(e^{j\omega}) = \sum_{n=-\infty}^{\infty} x[n](re^{j\omega})^{-n}$$

    ```


    For a unit circle, $r = 1$; hence, the above expression can be written as'
  - '[PAGE 518]


    Thus, DTFT is Z-transform evaluated on a unit circle.


    +   7. Double-sided spectrum of a signal composed of sinusoid is expressed as


    The set of pairs $\left\{(0, X_0)\left(f_1, \frac{1}{2}X_1\right), \left(-f_1,
    \frac{1}{2}X_1^*\right), \ldots, \left(f_k, \frac{1}{2}X_k\right), \left(-f_k,
    \frac{1}{2}X_k^*\right)\right\}$ indicates the size and relative phase of sinusoidal
    component contributing at frequency $f_k$. This is termed as frequency-domain
    representation of the signal.


    +   8. Transform is a tool to analyse the signals and systems. Signals are converted
    from time or spatial domain to frequency domain using transform. Frequency domain
    is used to describe the signal with respect to frequency. Each frequency has its
    own amplitude and phase. From the spectrum, it is possible to interpret the frequencies
    are present in the signal. Thus, the time-domain and the frequency-domain representation
    of the signal are equivalent. It is possible to transform the signal from time
    domain to frequency domain and vice versa without any loss of information. Mathematically,
    transform is taking the inner product of the signal with the basis function. The
    inner product is one way of quantifying the similarity or the dissimilarity of
    two signals.


    +   9. The signal $x[n]$ must be conjugate symmetric. This is expressed as $x[n]
    = x^*[-n]$.


    +   10. The basis function of Fourier transform is complex exponential, which
    oscillates for all the time. Fourier transform describes the frequency components
    in the signal averaged over all the time. It is difficult for the Fourier transform
    to represent signals that are localized in time. Fourier transform is not an effective
    tool to analyse non-stationary signals.


    Time localization in Fourier transform can be achieved by windowing the signal
    over which the signal is nearly stationary, which leads to the development of
    short-time Fourier transform (STFT). It can be represented to non-stationary signal
    and gives both time and frequency resolutions. However, the time and frequency
    resolutions are fixed based on the windowing signal.


    +   11. The DCT provides a decomposition of any discrete time signal as a weighted
    sum of basis functions and these basis functions are cosines. If $x[n]$ is a real
    for all ''$n$'', then the DCT output $X[k]$ is real for all ''$k$''. The DCT has
    excellent energy compaction for many real-world signals (i.e. signals with high
    correlation among neighbouring samples).


    +   12. Wavelet transform has the ability to perform multi-resolution analysis
    of the signal, whereas STFT cannot perform multi-resolution analysis. STFT provides
    time-frequency representation of the signal, whereas wavelet transform provides
    time-scale representation of the signal.'

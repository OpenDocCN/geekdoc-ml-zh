    # ## 12.3.3 *Time-Frequency Representation of Power Quality Disturbance*


    Time-frequency representation is a good tool to analyse non-stationary signal.
    Spectrogram is a square magnitude of short-time Fourier transform (STFT). STFT
    gives two-dimensional representation of a one-dimensional signal. In this section,
    the built-in function ''*plt.specgram*'' is used here to obtain the time-frequency
    representation of different types of power quality disturbance. The choice of
    the window function and the width of the window function is important in obtaining
    good time-frequency representation so that one obtains good time and frequency
    resolution. The python code to obtain the time-frequency plot of normal sinusoidal
    waveform and sinusoidal waveform with sag is shown in Fig. 12.32, and the corresponding
    output is shown in Fig. 12.33.



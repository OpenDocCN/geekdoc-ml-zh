    # ## 7.5 Design of Optimal FIR filter


    The optimal equiripple FIR filter design is due to Parks and McClellan. The optimal
    method provides an FIR filter coefficient representing the best approximation
    to the desired frequency response in a Chebyshev sense. The term optimal can be
    defined in various ways. The Parks-McClellan package uses the Remez exchange algorithm
    to optimize the filter design by selecting the impulse response, which minimizes
    the peak ripple in the passband and stopband. The filter designed by this approach
    is termed as ''*equiripple*'' filter. It is also termed as ''*minimax filter*''
    because the maximum ripple deviation is minimized in the optimization procedure.


    # ### Experiment 7.17 Design of Optimal FIR Filter


    The built-in functions available in ''*scipy*'' library like, ''*remez*'' and
    ''*firls*'' can be used to obtain the coefficients of optimal filter using Remez
    exchange algorithm and the least square approach, respectively.


    The aim of this experiment is to design the lowpass, highpass, bandpass and band
    reject filters using the built-in function ''remez'' available in ''*scipy*''
    library. The python code, which generates the filter coefficients and plots the
    magnitude responses of these four filters, is shown in Fig. 7.34, and the corresponding
    output is shown in Fig. 7.35.


    # ### Inferences


    From Fig. 7.34, the following observations can be made:


    +   1. The sampling frequency of the four filters is kept at 1000 Hz, the number
    of taps of the filter of all four filters is kept as 125 and the transition width
    of the four filters is kept as 25 Hz.

    2. The lowpass filter cut-off frequency is kept at 100 Hz. This means that the
    filter should pass all frequencies till 100 Hz and block frequency components
    greater than 100 Hz.

    3. The cut-off frequency of a highpass filter is fixed as 200 Hz.

    4. For the bandpass and band reject filters, the lower and upper cut-off frequencies
    are fixed as 100 Hz and 200 Hz, respectively.'

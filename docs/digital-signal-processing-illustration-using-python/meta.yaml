    +   6. Discrete-time signal $x[n]$ is periodic if it obeys the condition $\frac{\omega}{2\pi}
    = \frac{k}{N}$. Here, ''$\omega$'' represents the angular frequency, and ''$N$''
    represents the fundamental period.

    7. The energy and power signal descriptions are summarized in Table A.1.

    8. Various mathematical operations that can be performed on DT signal include
    (a) folding or time reversal; (b) shifting operation, which include delay and
    advance operation; and (c) scaling operation, which could be time scaling operation,
    like downsampling and upsampling, and amplitude scaling operation.

    9. A DT signal is even if it obeys the condition $x[-n] = x[n]$. A DT signal is
    odd if $x[-n] = -x[n]$. Example of even signal is cosine signal, whereas example

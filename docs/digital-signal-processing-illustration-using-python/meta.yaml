    coefficients, but it takes a longer time to converge.


    Let us define the a priori error as $\widehat{e}[n]=d[n]-w^{T}[n-1]x[n]$ and the
    weight updation formula for the RLS algorithm is given by


    ```

    $$w[n]=w[n-1]+\frac{P[n-1]x[n]\widehat{e}[n]}{\lambda+x^{T}[n]P[n-1]x[n]} \qquad
    (11.10)$$

    ```


    If $k[n]=\frac{P[n-1]x[n]}{\lambda+x^{T}[n]P[n-1]x[n]}$ represents the gain, then
    the above expression can be written as


    ```

    $$w[n]=w[n-1]+k[n]\widehat{e}[n] \qquad (11.11)$$

    ```


    The flow chart of the sequence of steps followed in RLS algorithm is shown in
    Fig. 11.25. From the flow chart, it is possible to observe that the algorithm
    is iterative. Proper initialization of filter coefficients is necessary for convergence.'

  md: '# ## PreLab Questions


    +   1. What is the difference equation relating the input and output of a finite
    impulse response filter? What are the inferences that could be made from the difference
    equation?

    2. On what basis are FIR filters classified as Type-I, Type-II, Type-III and Type-IV
    FIR filters?

    3. When is a FIR filter coefficient said to exhibit (a) even symmetry and (b)
    odd symmetry?

    4. What is the condition for the digital filter to exhibit linear phase characteristics?

    5. What is the advantage of ''linear phase'' characteristics of digital filter?

    6. What is the relationship between the group delay and the phase response of
    the FIR filter?

    7. What is the relationship between the order (*M*) and the number of coefficients
    (*N*) of FIR filters?

    8. Why FIR filter is considered as an ''inherently stable'' filter?

    9. List four advantages of FIR filter.

    10. Mention different methods of design of FIR filter.


    # ## 7.1 FIR Filter


    FIR stands for finite impulse response. The coefficients of FIR filter are either
    symmetric or anti-symmetric. Due to the symmetric nature of FIR filter coefficients,
    it exhibits linear phase characteristics. Because of linear phase characteristics,
    the FIR filter has no phase distortion. Also, FIR filter exhibits constant group
    delay. In FIR filter, the current output is a function of the current and previous
    inputs. This implies that FIR filters are non-recursive filters; hence, they are
    inherently stable. FIR filter is an all-zero filter, and the zeros occur in conjugate
    reciprocal pair.


    # ## 7.2 Classification of FIR Filter


    Based on nature of symmetry and the number of coefficients, FIR filter can be
    classified as Type-I, Type-II, Type-III and Type-IV. The classification is given
    in Table 7.1.


    | S. No. | Nature of symmetry | Number of coefficients | Type of FIR filter |

    |--------|-------------------|----------------------|-------------------|

    | 1 | Even symmetry | Odd | Type-I |

    | 2 | Even symmetry | Even | Type-II |

    | 3 | Odd symmetry | Odd | Type-III |

    | 4 | Odd symmetry | Even | Type-IV |'

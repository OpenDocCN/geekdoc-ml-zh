  md: '# ## 10.1 Multirate Operators


    Multirate operators are used to change the sampling rate of the signal digitally
    by either by removing (deletion) of samples or inserting zeros between successive
    samples. Two basic multirate operators are (1) downsampling operator and (2) upsampling
    operator. The downsampling operation is used to decrease the sampling rate of
    the signal, whereas upsampling operator is used to increase the sampling rate
    of the signal.


    # ### 10.1.1 Downsampling Operation


    Downsampling operation reduces the sampling rate by a factor of ''*M*''. The downsampling
    operation by a factor of ''*M*'' is shown in Fig. 10.1.


    The time-domain expression for downsampling by a factor of ''*M*'' is given by


    ```

    $$y[n] = x[nM]$$

    (10.1)

    ```


    From Eq. (10.1), it is possible to interpret that the output signal consists of
    every *M*th element of the input signal. The transform domain expression for downsampling
    by a factor of ''*M*'' is given by


    ```

    $$Y(z) = \frac{1}{M} \sum_{k=0}^{M-1} X\left(z^{\frac{1}{M}}W_M^k\right)$$

    (10.2)

    ```


    Downsampling produces expansion in the frequency-domain giving rise to ''aliasing''.
    Aliasing will occur in the output signal if the input signal $x[n]$ is not bandlimited,
    which will lead to loss of information. In order to overcome the aliasing problem,
    a filter is employed before downsampling operation, which is termed as ''anti-aliasing
    filter''. The combination of downsampler with anti-aliasing filter is termed as
    ''decimator''. This concept is illustrated in Fig. 10.2. To maintain the bandwidth
    of the input signal, the cut-off frequency of the filter (anti-aliasing) $H(z)$
    is chosen as $(\pi/M)$ always, which is basically a low pass filter.


    ![](img/d441da6e35a3ccc1cab16d20ab65dda6_417_0.png)


    ![](img/d441da6e35a3ccc1cab16d20ab65dda6_417_1.png)'

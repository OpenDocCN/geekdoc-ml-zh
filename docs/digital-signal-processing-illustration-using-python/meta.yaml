    ## Inferences


    From Figs. 1.13 and 1.14, the following inferences can be made:


    - 1. Two complex exponential signals $x_1(t) = e^{j2\pi ft}$ $x_2(t) = e^{-j2\pi
    ft}$ with the frequency value $f = 5$ Hz are generated. The signals $x_1(t)$ and
    $x_2(t)$ look alike.


    - 2. The magnitude and phase responses of the two signals are plotted. The magnitude
    of the signal $x_1(t) = e^{j\Omega t}$ is given by $|x_1(t)| = \sqrt{\cos^2(\Omega
    t) + \sin^2(\Omega t)} = 1$. Similarly, the magnitude of the signal $x_2(t) =
    e^{-j\Omega t}$ is given by $|x_2(t)| = \sqrt{\cos^2(\Omega t) + \sin^2(\Omega
    t)} = 1$. Thus, the magnitudes of the two signals are alike.


    - 3. The phase of the signal $x_1(t) = e^{j\Omega t}$ is expressed as $\phi(x_1(t))
    = \tan^{-1}\left(\frac{\sin(\Omega t)}{\cos(\Omega t)}\right)$. Upon simplifying
    the expression, we get $\phi(x_1(t)) = \tan^{-1}(\tan(\Omega t))$, which results
    in $\phi(x_1(t)) = \Omega t$. The phase of the signal $x_2(t) = e^{-j\Omega t}$
    is expressed as $\phi(x_1(t)) = \tan^{-1}\left(-\frac{\sin(\Omega t)}{\cos(\Omega
    t)}\right)$. Upon simplifying the expression, we get $\phi(x_1(t)) = \tan^{-1}(-\tan(\Omega
    t))$, which results in $\phi(x_1(t)) = -\Omega t$. The phases of the two signals
    are different. This implies that the signal $e^{j2\pi ft}$ and $e^{-j2\pi ft}$
    represents two phasors, rotating in the opposite direction.



    # ## 4.1 Discrete-Time System


    Discrete-time (DT) system accepts a discrete-time signal as input and generates
    a discrete-time signal as the output. The input to the discrete-time system is
    termed as ''excitation'' and the output of the system is termed as ''response''.
    The block diagram of DT system is shown in Fig. 4.1.


    # ## 4.2 Representation of DT Systems


    Different forms of representation of DT systems include (1) block diagram, (2)
    difference equation, (3) transfer function, (4) pole-zero plot, (5) state-space,
    etc. Python illustration with respect to different forms of representation of
    discrete-time system and python examples to obtain different DT system responses,
    including impulse, step, magnitude and phase responses, are discussed in this
    chapter.


    # ### 4.2.1 *Difference Equation Representation of Discrete-Time Linear Time-Invariant
    System*


    The relationship between the input and output of a discrete-time linear time-invariant
    (LTI) system is expressed in terms of linear constant coefficient difference equation
    (LCCDE) as


    ```

    $$\sum_{k=0}^{N-1} a_k y[n-k] = \sum_{k=0}^{M-1} b_k x[n-k] \qquad (4.1)$$

    ```


    where {$a_k$} and {$b_k$} are the output and input coefficients respectively.
    The above equation represents the fact that weighted sum of input is equal to
    the weighted sum of output. Equation (4.1) can be expanded as



- img_proc: true
  md: '# # Organization of the Book


    The book comprises of 12 chapters. Chapter 1 deals with the generation and visualization
    of continuous-time signals which include periodic signals, non-stationary signals,
    pulse signals, and standard test signals. Chapter 2 focuses on sampling, quantization,
    and reconstruction of signals. Both the time domain and frequency domain view
    of sampling, the effect of undersampling, uniform and non-uniform quantization,
    and different types of reconstruction like zero-order hold, first-order hold,
    and sinc interpolation are discussed in this chapter. Chapter 3 is dedicated to
    the generation of discrete-time signals and mathematical operations that are performed
    on the discrete-time signals. In this chapter, standard discrete-time signals
    like unit sample, unit step, unit ramp, exponential, and sinusoidal signals are
    generated, and mathematical operations like folding, shifting, and scaling are
    performed on the generated signals. This chapter also discusses two important
    signal processing operations: convolution and correlation. Different forms of
    representation of discrete-time system, properties of discrete-time systems, and
    responses of discrete-time systems are explained with examples in Chap. 4. One
    of the important topics is signal processing which is analysis of signals and
    systems using transform. Chapter 5 is devoted to transform domain analysis of
    signals and systems. Different transforms discussed in this chapter include Z-transform,
    Fourier transform, Short-Time Fourier transform, and Wavelet transform. Chapter
    6 deals with the design of a simple filter using pole-zero placement technique.
    Different filters discussed in this chapter include moving average filter, digital
    resonator, notch filter, comb filter, and all-pass filter. Chapter 7 covers the
    types of FIR filters and the design of FIR filters. Three design approaches covered
    in this chapter include window-based FIR filter design, frequency sampling-based
    FIR filter design, and optimal FIR filter design. Chapter 8 deals with the design
    of IIR filter, mapping from the analog domain to the digital domain. The types
    of IIR filters discussed in this chapter include Butterworth filter, Chebyshev
    filter, and Elliptic filter. The mapping techniques discussed in this chapter
    include the backward difference, impulse invariant, and matched Z-transform techniques.
    The impact of the finite word length effect in the FIR and IIR filters is discussed
    in Chap. 9. Concepts like limit cycle'
  merge: -1
  pgno: 6
- img_proc: true
  md: oscillation, impact of coefficient quantization, and the nature of coefficient
    error are discussed in this chapter. Chapter 10 is devoted to multi-rate signal
    processing. Concepts like multi-rate operators, noble identities, polyphase decomposition,
    filter bank, and transmultiplexer are covered with detailed examples in this chapter.
    Design of optimal and adaptive filters and their applications are discussed in
    Chap. 11. This chapter discusses Wiener filter, LMS algorithm and its variants,
    RLS algorithm and its applications with necessary examples. Chapter 12 is devoted
    to case study which discusses the application of signal processing algorithms
    in analyzing speech signal, ECG signal, and power line signal.

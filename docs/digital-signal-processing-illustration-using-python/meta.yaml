    # 12.1.3.4 Mel-Frequency Bandpass Filter


    The mel-frequency bandpass filter is a triangular-shaped multiple bandpass filter.
    DFT obtains the magnitude spectrum of the speech signal, and this spectrum is
    multiplied with the set of triangular bandpass filters to smoothen the magnitude
    spectrum of speech signal, which is expressed as


    $$Y[k] = X[k] \times H[k]$$ (12.3)


    where $H[k]$ is the magnitude spectrum of the triangular bandpass filter. The
    sample triangular bandpass filter frequency responses are shown in Fig. 12.11.
    This figure shows a set of triangular filters that are used to compute weighted
    sum of filter spectral components so that the output of process approximates to
    a mel scale. Each filter''s magnitude response is triangular in shape, and the
    magnitude is unity at the centre frequency and decreases linearly to zero at the
    centre frequency of two adjacent filters. The final output is the sum of its filtered
    spectral components.'

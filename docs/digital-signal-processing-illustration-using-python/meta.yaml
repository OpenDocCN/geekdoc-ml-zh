    # ### 7.3.1 *Steps in Window-Based FIR Filter Design*


    The steps followed in FIR filter design using Windows are summarized below:


    +   1. The filter design starts with the specification of the filter in terms
    of desired frequency response.

    2. The desired impulse response ($h_d[n]$) is obtained from the desired frequency
    response using inverse discrete-time Fourier transform.

    3. Multiply the desired impulse response with the selected window function.

    4. Delay the windowed impulse response by a factor of ''$\tau$'' to get the causal
    FIR filter coefficients.

    5. The process is complete if the frequency response is satisfied as per the specification.
    If the frequency specifications are not satisfied, increase the filter order and
    repeat the steps.'

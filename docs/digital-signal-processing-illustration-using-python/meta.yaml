    # ### 8.3 Analog Frequency Transformation


    A normalized lowpass filter can be transformed into a desired lowpass, highpass,
    bandpass or bandstop filter by frequency transformation technique. Table 8.1 summarizes
    different analogue frequency transformations.


    # **Experiment 8.12 Analogue Frequency Transformation**


    The objective of this experiment is to convert a normalized first-order lowpass
    Butterworth filter into an equivalent bandpass and band reject filter with the
    lower and upper cut-off frequencies of 3 and 5 rad/s, respectively, using the
    frequency transformation method. A normalized first-order lowpass Butterworth
    filter transfer function is given by $H(s) = \frac{1}{(s+1)}$. Convert this filter
    into an equivalent (1) bandpass filter and (2) band reject filter with the lower
    and upper cut-off frequencies of 3 and 5 rad/s, respectively, using the frequency
    transformation method.


    **Step 1**: Converting the prototype filter into its equivalent bandpass filter


    The prototype filter can be converted into its equivalent band pass filter by
    using the frequency transformation $s \rightarrow \frac{s^2 + \Omega_u \Omega_l}{s(\Omega_u
    - \Omega_l)}$. In this experiment, the value of $\Omega_u = 5$ rad/s and $\Omega_l
    = 3$ rad/s. Hence, the $s$ can be computed as


    $$s \rightarrow \frac{s^2 + 15}{s(2)} = \frac{s^2 + 15}{2s}$$


    Now replacing $s$ in the normalized lowpass filter transfer function by $s \rightarrow
    \frac{s^2+15}{2s}$, we get


    $$H_1(s) = \frac{1}{\left(\frac{s^2+15}{2s} + 1\right)}$$


    Simplifying the above expression, we get


    $$H_1(s) = \frac{2s}{s^2 + 2s + 15}$$


    **Step 2**: Obtaining the transfer function of the band reject filter


    | S. No. | Type of transformations | Transformation |

    |:---:|:---|:---|

    | 1 | Lowpass to lowpass | $s \rightarrow \frac{s}{\Omega_c}$ |

    | 2 | Lowpass to highpass | $s \rightarrow \frac{\Omega_c}{s}$ |

    | 3 | Lowpass to bandpass | $s \rightarrow \frac{s^2 + \Omega_u \Omega_l}{s(\Omega_u
    - \Omega_l)}$ |

    | 4 | Lowpass to bandstop | $s \rightarrow \frac{s(\Omega_u - \Omega_l)}{s^2 +
    \Omega_u \Omega_l}$ |'

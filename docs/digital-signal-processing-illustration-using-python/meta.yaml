    # Chapter 9: Quantization Effect of Digital Filter Coefficients


    # *Answers to PreLab Questions*


    +   1. The finite word length introduces an error that can affect the performance
    of the DSP system. The finite word length has limited precision, and it is not
    sufficient to represent the filter coefficients accurately. This causes errors
    between the original filter coefficients and finite word length coefficients.
    The finite number of bits is used in the arithmetic operations in DSP, which is
    insufficient to give the proper result.


    2. In fixed point arithmetic representation, the numbers are represented in a
    fixed range with a finite number of bits of precision. The numbers beyond the
    fixed range are either saturated or wrapped around. It is preferred for high speed
    and low cost.


    In floating-point arithmetic representation, every number is represented in two
    parts (a) mantissa and (b) exponent. Floating-point representation has a higher
    dynamic range and no need for scaling. It can be used to perform more complex
    algorithms in it.


    3. The numbers can be represented in binary format, which contains ''0s'' and
    ''1s''. In sign-magnitude representation, most significant bit (MSB) is used to
    denote the number as positive or negative. It is called as sign bit, and the remaining
    bits are used to represent the number, which is called as magnitude bits.


    4. Quantization is a process in which a quantity *X* is approximated into a quantity
    *Q(X)*. The approximated value will have a distortion between *X* and *Q(X)*,
    called quantization error.


    5. Rounding is a method to perform quantization operation. It selects the quantized
    value nearest to the original value. The error between the quantized and original
    value will not exceed ±(Δ/2). Here ''Δ'' denotes step size, which is obtained
    by Δ = 2^{−B}, and *B* is the number of binary bits.'
  - "[PAGE 525]\n\n+   6. The two's complement truncation is another method to perform\
    \ the quantization operation. This method always gives a resultant quantized value\
    \ less than or equal to the original value. The truncation error will to ($-\\\
    Delta$ to 0).\n\n7. The magnitude truncation is another approach to perform the\
    \ quantization operation. The result of the quantized value is always less than\
    \ the original value for $X > 0$, and the quantized result is always greater than\
    \ the original value for $X < 0$. The advantage of magnitude truncation is that\
    \ it can inherently suppress the limit cycle oscillation.\n\n8. If the dynamic\
    \ range of the signals crosses the word length limit, then the overflow exists.\
    \ The different types of overflows are (a) saturation, (b) zeroing and (c) two's\
    \ complement.\n    - Saturation: If the input value crosses the maximum/minimum\
    \ limit ($X$/$-X$), the output will be $X$/$-X$.\n    - Zeroing: The output will\
    \ be zero if the input value exceeds the maximum limit.\n    - Two's complement:\
    \ It is a periodic continuation of the 45° straight line. The advantage of this\
    \ method has the capability of correcting the intermediate overflows automatically.\n\
    \n9. A limit cycle oscillation is a low-level oscillation that can exist in a\
    \ stable filter due to the non-linearity associated with the quantization operation,\
    \ like rounding or truncation of the arithmetic calculations in the filtering\
    \ operation. This limit cycle oscillation is also termed a multiplier round-off\
    \ limit cycle. These limit cycle oscillations do not occur in non-recursive FIR\
    \ filters.\n\n10. Infinite precision is needed to represent the filter coefficients.\
    \ However, the finite number of bits represents the filter coefficients in the\
    \ real world. Therefore, the representation of the filter coefficients from infinite\
    \ precision to finite number precision may introduce coefficient quantization.\
    \ Due to the finite precision representation of filter coefficients, the response\
    \ of the quantized filter may deviate from the response of the original filter.\n\

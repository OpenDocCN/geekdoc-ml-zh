    # 9.4 Limit Cycle Oscillations


    A digital filter is a non-linear system affected by the quantization of the arithmetic
    operations. This non-linearity of the digital filter may give stable output under
    infinite precision arithmetic for specific input. Also, it may give unstable output
    under finite precision arithmetic for specific input signals. This type of instability
    usually results in an oscillatory periodic output called ''limit cycle oscillation''.
    These limit cycle oscillations do not have FIR filters because they do not have
    a feedback path. But it will exist in IIR filters because it has a feedback path.
    The limit cycle oscillation is broadly classified into (1) granular and (2) overflow.'

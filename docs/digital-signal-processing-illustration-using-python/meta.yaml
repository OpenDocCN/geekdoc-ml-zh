    # ### 4.2.3 Impulse Response and Step Response of Discrete-Time System


    Impulse response is the reaction of the discrete-time system to unit sample input
    signal, whereas step response is the reaction of the system to unit step input
    signal. The discrete-time system is completely characterised by its impulse response.
    The meaning is, if one knows the impulse response of the system, it is possible
    to infer whether the system is causal and stable from it.


    Figure 4.9 depicts the input-output relationship of a discrete-time system in
    which $x[n]$ represents the input signal, $h[n]$ represents the impulse response
    and $y[n]$ represents the output of the system. If the system is a LTI system,
    then the output of the system is expressed as


    ```

    $$y[n] = x[n] * h[n] \qquad (4.15)$$

    ```


    In the above expression, ''*'' indicates the convolution operation. If the input
    to the system is unit sample signal, then the output of the system is given by


    ```

    $$y[n] = \delta[n] * h[n] \qquad (4.16)$$

    ```


    Convolution of any signal with unit sample signal results in the same signal;
    hence, the above equation can be expressed as


    ```

    $$y[n] = h[n] \qquad (4.17)$$

    ```


    Thus, the impulse response of the system is the reaction of an LTI system to unit
    sample input signal.


    The reaction of LTI system to unit step input signal is termed as step response
    of the system. It is denoted as $s[n]$. The relationship between step response
    ($s[n]$) and impulse response ($h[n]$) is given by


    ```

    $$s[n] = \sum_{k=-\infty}^{n} h[k] \qquad (4.18)$$

    ```


    # **Experiment 4.5 Impulse and Step Responses of the System**



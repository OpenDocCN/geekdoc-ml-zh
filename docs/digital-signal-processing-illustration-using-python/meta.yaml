    # 8.2.2 *Impulse Invariant Technique*


    In impulse invariant technique, the digital filter is designed by sampling the
    impulse response of the analogue filter. The pole at $s = s_p$ is mapped to a
    pole at $z = e^{s_p T}$ in the digital filter. Impulse invariant technique performs
    many-to-one mapping; hence, it suffers from an aliasing problem. Thus, impulse
    invariant technique is useful if the analogue filter is band-limited. The step
    followed in impulse invariant technique is given in Fig. 8.7.


    The impulse response of the analogue filter is represented by $h(t)$. It is sampled
    to get $h[nT]$. Upon taking $Z$-transform of the sampled impulse response, the
    transfer function of the digital filter is obtained, which is represented as $H(z)$.



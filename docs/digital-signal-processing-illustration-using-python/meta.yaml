    # **Experiment 8.21 Design of Type I Chebyshev Filter**


    This experiment discusses the design of a Type I Chebyshev filter using bilinear
    transformation technique (BLT) that has a passband of 0 to −2 dB cut-off frequency
    of 3 kHz and attenuation of at least 20 dB for frequencies greater than 5 kHz.
    Assume the sampling frequency to be 15 kHz. Assume $T = 1$ s.


    Given data


    +   1. Sampling frequency $f_{\text{samp}} = 15$ kHz.

    2. Gain in pass band $A_{\text{p}} = -2$ dB.

    3. Stop band attenuation $A_{\text{s}} = -20$ dB.

    4. Pass band cut off frequency $f_{\text{p}} = 3$ kHz.

    5. Stop band cut off frequency $f_{\text{s}} = 5$ kHz.


    # **Step 1:** Prewarping


    First, it is necessary to compute the $\omega_{\text{p}}$ and $\omega_{\text{s}}$
    from the frequency $f_{\text{p}}$ and $f_{\text{s}}$, which are given below


    ```

    $$\omega_{\text{p}} = 2\pi \left(\frac{f_{\text{p}}}{f_{\text{samp}}}\right)$$

    ```


    Substituting the values of $f_{\text{p}}$ and $f_{\text{samp}}$ in the above expression,
    we get'
  - '[PAGE 359]


    $\omega_p = 2\pi\left(\frac{3}{15}\right) = 0.4\pi$


    Now the expression for $\omega_s$ is given by


    $\omega_s = 2\pi\left(\frac{f_s}{f_{\text{samp}}}\right)$


    Substituting the values of $f_s$ and $f_{\text{samp}}$ in the above expression,
    we get


    $\omega_s = 2\pi\left(\frac{5}{15}\right) = 0.667\pi$


    The corresponding analogue frequencies $\Omega_p$ and $\Omega_s$ are obtained
    using prewarping by using BLT relation as


    $\Omega_p = \frac{2}{T}\tan\left(\frac{\omega_p}{2}\right)$


    Substituting the value of $\omega_p = 0.4\pi$ and $T = 1$ in the above expression,
    we get


    $\Omega_p = \frac{2}{1}\tan\left(\frac{0.4\pi}{2}\right) = 1.4531$


    Similarly, the value of $\Omega_s$ is computed as


    $\Omega_s = \frac{2}{1}\tan\left(\frac{0.667\pi}{2}\right) = 3.4633$


    # **Step 2**: To determine the passband ripple factor ($\varepsilon$)


    The passband ripple factor is calculated as


    $\varepsilon = \sqrt{10^{\left(\frac{A_p}{10}\right)} - 1}$


    $\varepsilon = \sqrt{10^{\left(\frac{2}{10}\right)} - 1} = \sqrt{10^{(0.2)} -
    1}$


    $\varepsilon = \sqrt{1.5849 - 1} = \sqrt{0.5849} = 0.7648$


    # **Step 3**: To determine the order of the filter


    The expression for the order of Chebyshev filter is given by'

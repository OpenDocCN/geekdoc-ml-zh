    ### 1.1 Continuous-Time Signal


    A signal corresponds to a physical quantity that varies with time, space, etc.
    Signals are represented mathematically as a function of one or more independent
    variables. The continuous-time signals are defined for a continuum of values of
    the independent variable. The continuous-time signal is generally represented
    as *x(t)*. Speech signal as a function of time is an example of continuous-time
    signal. The signal can be either deterministic or random. Deterministic signals
    can be described by mathematical functions or expressions. In this chapter, the
    objective is to generate different types of continuous-time periodic signals,
    like sinusoidal signal, complex exponential signal, square wave, etc.; non-stationary
    signals, like chirp signal; standard test signals, like Dirac delta; unit step
    signal, etc.


    #### 1.1.1 Continuous-Time Periodic Signal


    A periodic signal is one which repeats itself in an identical manner. Examples
    of continuous-time periodic signals include sinusoidal signal, complex exponential
    signal, square wave and sawtooth wave. In this section, python codes are developed
    to generate a sinusoidal signal, three-phase sinusoidal signal, complex exponential
    signal, etc. Also, sinusoids are Eigen functions of linear system. Continuous-time
    sinusoids are described by an amplitude, frequency and phase. Continuous-time
    sinusoids with distinct frequencies are always distinct.


    **Experiment 1.1 Generation of Sinusoidal Signal**


    The aim of this experiment is to generate sinusoidal signal. Sinusoidal signals
    are periodic functions, which are based on the sine or cosine function. The expression
    for the sinusoidal signal is given by


    $$x(t) = A \sin(2\pi f t + \phi)$$ (1.1)


    In the above equation, ''A'' represents the amplitude of the signal, ''f'' denotes
    the frequency of the signal and ''$\phi$'' indicates the phase of the signal.
    To generate sinusoidal signal, one should define three parameters: amplitude,
    frequency and phase. The independent-variable is ''time (t)''. In amplitude modulation,
    the amplitude of the carrier is changed in accordance with the message, while
    the frequency and phase are kept constant. In frequency modulation, the frequency
    of the carrier is changed in accordance with the signal, while the amplitude and
    phase are kept constant. In phase modulation, the phase of the carrier is changed
    in accordance with the signal, while the amplitude and frequency are kept constant.


    The steps involved in the generation of sinusoidal signal are summarized below:


    - **Step 1**: Defining the independent variable


    The built-in function ''*np.linspace()*'' is used to generate the independent
    variable, which is the time axis.


    - **Step 2**: Defining the parameters of the sine wave


    In this step, the three parameters of sine wave, namely, amplitude, frequency
    and phase are defined.


    - **Step 3**: Generation of sinusoidal signal


    In this step, the mathematical expression to generate a sine wave is given by


    | S. No. | Built-in function used | Purpose |

    |--------|------------------------|---------|

    | 1 | np.sin() | To generate sinusoidal function |

    | 2 | np.linspace() | To generate equally interval data points in an interval
    |

    | 3 | plt.subplot() | To plot more than one figure in the same plot |


    ```

    python

    #Experiment 1: Generation of sinusoidal signal

    import numpy as np

    import matplotlib.pyplot as plt

    #Step 1: Defining the independent variable

    t=np.linspace(0,1,1000)

    #Step 2: Defining the parameters of sine wave

    A=5 #Amplitude of sine wave

    f=5 #Frequency of sine wave

    ph=0 #Phase of sine wave

    #Step 3: Expression of sine wave

    x=A*np.sin(2*np.pi*f*t+ph)

    #Step 4: Plotting the sine wave

    plt.plot(t,x),plt.xlabel(''Time''),plt.ylabel(''Amplitude'')

    plt.title(''A={}V,F={} Hz,$\phi={}^\circ$''.format(A,f,ph))

    ```



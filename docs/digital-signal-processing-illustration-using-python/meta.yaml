    # ## 5.7 Continuous Wavelet Transform (CWT)


    Wavelets are oscillatory functions of finite duration. Wavelet transform provides
    timescale relationship of the signal. The continuous wavelet transform of the
    signal *f(t)* is expressed as'
  - '[PAGE 233]


    $$W_f(a,b) = \frac{1}{\sqrt{a}} \int_{-\infty}^{\infty} f(t)\psi^*\left(\frac{t-b}{a}\right)dt
    \quad (5.71)$$


    In the above equation, $f(t)$ represents signal of interest, $\psi(t)$ denotes
    ''mother wavelet'', $b$ is the shifting parameter and $a$ is the scaling parameter.
    The above equation can be written as


    $$W_f(a,b) = \langle f(t), \psi_{a,b}(t) \rangle \quad (5.72)$$


    The above equation indicates that wavelet transform is basically taking inner
    product of the function $f(t)$ with the ''daughter wavelet'' $\psi_{a,\ b}(t)$.
    The daughter wavelets are derived from the mother wavelet $\psi(t)$ using the
    relation


    $$\psi_{a,b}(t) = \frac{1}{\sqrt{a}}\psi\left(\frac{t-b}{a}\right) \quad (5.73)$$


    # ### 5.7.1 *Continuous Wavelets Family*


    A variety of continuous wavelets filter are currently in use. They are (1) Haar,
    (2) Mexican Hat, (3) Morlet, (4) Complex Morlet, (5) Gaussian, (6) Shannon and
    (7) Daubechies. The wavelet family and its mathematical expression are given in
    Table 5.3.



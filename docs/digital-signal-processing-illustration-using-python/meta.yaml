    y=x[::M]

    t1=np.linspace(0,N*T/M,len(y))

    #Step 3: Obtaining the spectrum of the input signal and downsampled signal

    X=fft(x,N)

    Y=fft(y,N)

    f_axis=fftfreq(N,T)[0:N//M]


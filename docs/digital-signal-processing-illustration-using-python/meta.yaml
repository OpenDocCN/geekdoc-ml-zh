    Substituting $z_1 = e^{j\omega}$ and $z_2 = e^{-j\omega}$ in the above expression,
    we get


    $$H(z) = \left(1 - e^{j\omega} z^{-1}\right)\left(1 - e^{-j\omega} z^{-1}\right)$$



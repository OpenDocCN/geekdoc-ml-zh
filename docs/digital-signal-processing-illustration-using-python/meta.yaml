    | Type-II | Zero at $\omega = \pi$ | Type-II FIR filter cannot be used as a highpass
    filter |

    | Type-III | Zero at $\omega = 0$ and $\omega = \pi$ | Type-III FIR filter cannot
    be used as lowpass and highpass filters |

    | Type-IV | Zero at $\omega = 0$ | Type-IV FIR filter cannot be used as lowpass
    filter |



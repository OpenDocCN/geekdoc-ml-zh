    the desired and observed signal is represented by $S_{dx}(e^{j\omega})$. The Wiener
    filter is obtained in the frequency domain using the relation $H(e^{j\omega})
    = \frac{S_{dx}(e^{j\omega})}{S_{xx}(e^{j\omega})}$. Here the desired signal is
    the clean signal $s[n]$. Upon taking inverse Fourier transform of $H(e^{j\omega})$,

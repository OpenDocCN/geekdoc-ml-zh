    # ### 5.4.5 Discrete Fourier Transform


    Discrete Fourier transform (DFT) represents a signal in terms of sinusoids. For
    a discrete-time signal of length *N*, the basis functions are sinusoids of length
    *N*. Discrete Fourier transform is used when the signal is discrete-time and periodic
    only. In practice, it calculates the frequency domain representation of aperiodic
    signals in a given time interval, by assuming their periodic extension. The discrete
    Fourier transform (DFT) of the signal *x*[*n*] of length *N* is given by


    $$X[k] = \sum_{n=0}^{N-1} x[n]e^{-j\frac{2\pi}{N}kn}, \quad k = 0, 1, 2, \ldots,
    N-1 \tag{5.56}$$


    The above expression can be written in the form of


    $$X[k] = \sum_{n=0}^{N-1} x[n]W_N^{kn} \tag{5.57}$$


    where


    $$W_N = e^{-j\frac{2\pi}{N}} \tag{5.58}$$


    The signal is reconstructed by using the inverse discrete Fourier transform, which
    is defined as


    $$x[n] = \frac{1}{N} \sum_{k=0}^{N-1} X[k]e^{j\frac{2\pi}{N}kn} \tag{5.59}$$


    The forward transform is generally known as ''analysis'', and the inverse transform
    is called as ''synthesis''.



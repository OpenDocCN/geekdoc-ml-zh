    +   8. Transform is a tool to analyse the signals and systems. Signals are converted
    from time or spatial domain to frequency domain using transform. Frequency domain
    is used to describe the signal with respect to frequency. Each frequency has its
    own amplitude and phase. From the spectrum, it is possible to interpret the frequencies
    are present in the signal. Thus, the time-domain and the frequency-domain representation
    of the signal are equivalent. It is possible to transform the signal from time
    domain to frequency domain and vice versa without any loss of information. Mathematically,
    transform is taking the inner product of the signal with the basis function. The
    inner product is one way of quantifying the similarity or the dissimilarity of
    two signals.



    # **Step 5:** Converting normalized lowpass filter to the desired lowpass filter
    using frequency transformation


    $$H(s) = H_{\text{lp}}(s)\big|_{s=\frac{s}{\Omega_c}}$$


    $$H(s) = \frac{1}{(s+1)(s^2+s+1)}\bigg|_{s=\frac{s}{\Omega_c}}$$


    Substituting the value of $\Omega_c = 0.650$ (from Step 3), the above expression
    is given by


    $$H(s) = \frac{1}{\left(\frac{s}{0.650}+1\right)\left(\left(\frac{s}{0.650}\right)^2+\frac{s}{0.650}+1\right)}$$


    Simplifying the above expression, we get


    $$H(s) = \frac{0.2751}{s^3+1.301s^2+0.8459s+0.2751}$$


    # **Step 6:** Converting the analogue filter into an equivalent digital filter


    The digital equivalent of the analogue filter using BLT Technique is given by


    $$H(z) = H(s)\big|_{s=\frac{2z-1}{Tz+1}}$$



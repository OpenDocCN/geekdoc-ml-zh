    # **Experiment 1.1 Generation of Sinusoidal Signal**


    The aim of this experiment is to generate sinusoidal signal. Sinusoidal signals
    are periodic functions, which are based on the sine or cosine function. The expression
    for the sinusoidal signal is given by


    $$x(t) = A \sin(2\pi f t + \phi)$$ (1.1)


    In the above equation, ''A'' represents the amplitude of the signal, ''f'' denotes
    the frequency of the signal and ''$\phi$'' indicates the phase of the signal.
    To generate sinusoidal signal, one should define three parameters: amplitude,
    frequency and phase. The independent-variable is ''time (t)''. In amplitude modulation,
    the amplitude of the carrier is changed in accordance with the message, while
    the frequency and phase are kept constant. In frequency modulation, the frequency
    of the carrier is changed in accordance with the signal, while the amplitude and
    phase are kept constant. In phase modulation, the phase of the carrier is changed
    in accordance with the signal, while the amplitude and frequency are kept constant.


    The steps involved in the generation of sinusoidal signal are summarized below:


    +   **Step 1**: Defining the independent variable


    The built-in function ''*np.linspace()*'' is used to generate the independent
    variable, which is the time axis.


    +   **Step 2**: Defining the parameters of the sine wave


    In this step, the three parameters of sine wave, namely, amplitude, frequency
    and phase are defined.


    +   **Step 3**: Generation of sinusoidal signal


    In this step, the mathematical expression to generate a sine wave is given by'

    # ### 9.2.1 Fixed-Point Quantization by Rounding


    If $X$ is an original value to be quantized using the rounding method, and the
    quantized output is denoted as $Q_r(X)$. If the quantized value has $N$ bits to
    the right of the binary point, then the quantization step size is $\Delta = 2^{-N}$.
    In general, rounding selects the quantized integer nearest to the original value.
    But the error between the quantized and original value is not more than $\pm \frac{\Delta}{2}$.
    Hence, the rounding error is denoted as $\varepsilon_r = Q_r(X) - X$. Then, the
    rounding error is ranging from $-\frac{\Delta}{2} \leq \varepsilon_r \leq \frac{\Delta}{2}$.
    The error resulting from quantization can be modelled as a random variable uniformly
    distributed over the appropriate error range. Hence, the round off error can be
    considered error-free calculations that have been corrupted by additive white
    noise. The mean value of the rounding error is zero and variance of the rounding
    error is $\sigma_{\varepsilon_r}^2 = \frac{\Delta^2}{12}$.


    # **Experiment 9.1 Perform the Fixed-Point Quantization Using the Rounding Method**


    This experiment deals with quantizing value using a rounding approach. The first
    and foremost method of quantization is rounding, which is mathematically written
    as


    $$X_r = \Delta \times \text{round}(x/\Delta) \qquad (9.1)$$


    where $x$ denotes the value to be quantized, $\Delta$ represents the step size
    and is computed as $\Delta = 2^{-N}$, $N$ denotes the number of bits and $X_r$
    represents the quantized output using rounding. The python code for computing
    quantization using the rounding approach is given in Fig. 9.1, and its corresponding
    simulation result is shown in Fig. 9.2.


    ```

    python

    # This program performs quantization using rounding

    import numpy as np

    h=float(input(''Enter the value to be Quantized: ''));

    B=int(input(''Enter the Number of Bits (N): ''));

    Q = 1/(2**(B))

    Qhr=Q*np.round(h/Q)#Rounding

    print(''The input unquantized value : '',h)

    print(''The Quantized result using Rounding: '', Qhr)

    ```


    **Fig. 9.1** Python code for quantization using rounding'

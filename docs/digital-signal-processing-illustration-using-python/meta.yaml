    # 2.2 Non-uniform Quantization


    One way to construct non-uniform quantizer is to perform companding.


    **Companding = Compression + Expanding**


    The three steps involved in companding are (1) compression, (2) uniform quantization
    and (3) expanding. In the first step, the input signal is applied to a logarithmic
    function, and the output of this function is given to a uniform quantizer. Finally,
    the inverse of the logarithmic function is applied to the output of the quantizer.
    There are two standards for non-uniform quantizer companding. They are (1) μ-law
    companding for North America and (2) A-law companding for Europe.


    The μ-law compression expression in terms of the input signal x(t) is expressed
    as


    ```

    $$x_1(t) = \text{sgn}(x) \ln \frac{(1 + \mu|x|)}{\ln(1 + \mu)}$$ (2.9)

    ```'

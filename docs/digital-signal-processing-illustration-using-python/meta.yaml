    Using Euler''s formula $e^{-j\omega} = \cos(\omega) - j\sin(\omega)$, the above
    expression can be written as


    $$H(e^{j\omega}) = \frac{\cos(\omega) - j\sin(\omega) - a}{1 - a[\cos(\omega)
    - j\sin(\omega)]}$$ (6.25)


    Now the expression for squared magnitude response is given by


    $$|H(e^{j\omega})|^2 = \frac{(\cos(\omega) - a)^2 + \sin^2(\omega)}{(1 - a\cos(\omega))^2
    + a^2\sin^2(\omega)}$$


    The above equation can be simplified as


    $$|H(e^{j\omega})|^2 = \frac{\cos^2(\omega) + a^2 - 2a\cos(\omega) + \sin^2(\omega)}{1
    + a^2\cos^2(\omega) - 2a\cos(\omega) + a^2\sin^2(\omega)}$$


    Using the fact that $\sin^2(\omega) + \cos^2(\omega) = 1$, the above equation
    can be simplified as'

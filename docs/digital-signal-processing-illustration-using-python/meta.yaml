    # 2.1.1 Violation of Sampling Theorem


    The sampling theorem gives the guideline regarding the choice of the sampling
    rate. According to the sampling theorem, a continuous-time signal with frequencies
    no higher than $f_{\max}$ (Hz) can be reconstructed exactly from its samples if
    the samples are taken at a rate greater than $2f_{\max}$. That is, $f_s \geq 2f_{\max}$.
    Violation of the sampling theorem results in an aliasing, which can be visualized
    in both the time and frequency domains.



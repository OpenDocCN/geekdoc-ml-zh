  md: '# ## 12.2.2 *Moving Window Integration*


    Moving window integration helps to obtain the waveform feature information in
    addition to the slope of the R wave. The mathematical equation to perform moving
    window integration is given by


    $$y[n] = \frac{1}{N}\{x[n-(N-1)] + x[n-(N-2)] + \cdots + x[n]\}$$ (12.7)


    where *N* is the number of samples in the width of the integration window. In
    this case study, the length of the integration window is chosen as 15. The length
    of the moving window integration (*N*) is important for QRS wave detection. Generally,
    the value of *N* should be approximately the same as the widest possible QRS complex.
    If the window length (*N*) is large, the integration waveform will merge the QRS
    complex and T wave together. If the window length (*N*) is small, some QRS complexes
    will produce several peaks in the integration waveform. This may cause difficulty
    in the subsequent QRS detection. The python code for the derivative process, squaring
    and moving window integration is shown in Fig. 12.22, and its corresponding output
    is displayed in Fig. 12.23.



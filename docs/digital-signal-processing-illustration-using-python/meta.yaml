    # Chapter 7: FIR Filter Design


    # *Answers to PreLab Questions*


    +   1. The difference equation relating the input and output of an FIR filter
    is given by


    ```

    $$y[n] = \sum_{k=0}^{M} b_k x[n-k]$$

    ```


    From the difference equation, the following inferences can be drawn:


    +   (a) The current output of FIR filter depends on current input and previous
    inputs.


    +   (b) The number of previous outputs necessary to compute the current output
    is termed as the order of FIR filter.


    +   (c) Since the current output is not a function of previous output, FIR filter
    is considered as a ''non-recursive filter''. It can also be termed as ''all-zero''
    filter with the poles at the origin.


    +   (d) The filter coefficients are denoted as ''*bₖ*''. The nature of filtering
    depends on ''*bₖ*''.'
  - "[PAGE 521]\n\n+   2. Based on symmetry and number of coefficients, the FIR filters\
    \ are classified as Type I, Type II, Type III and Type IV FIR filters\n    (a)\
    \ Type I FIR filter: Even symmetry with odd number of coefficients\n    (b) Type\
    \ II FIR filter: Even symmetry with even number of coefficients\n    (c) Type\
    \ III FIR filter: Odd symmetry with odd number of coefficients\n    (d) Type IV\
    \ FIR filter: Odd symmetry with even number of coefficients\n\n+   3. An FIR filter\
    \ with impulse response '$h[n]$' is said to exhibit even symmetry if $h[n] = h[N-1-n]$,\
    \ where '$N$' is the number of coefficients of FIR filter. An FIR filter is said\
    \ to exhibit odd symmetry if $h[n] = -h[N-1-n]$.\n\n+   4. A digital filter exhibits\
    \ linear phase characteristics if its impulse response is either symmetric or\
    \ anti-symmetric.\n\n+   5. If a digital filter exhibits linear phase characteristics,\
    \ then it will not introduce phase distortion. All the frequency components of\
    \ the input signal will pass through the filter with constant delay so that there\
    \ will not be any phase distortion.\n\n+   6. The relationship between group delay\
    \ ($\\tau_g$) and the phase response ($\\phi(e^{j\\omega})$) of the filter is\
    \ given by $\\tau_g = -\\frac{d}{d\\omega}(\\phi(e^{j\\omega}))$.\n\n+   7. Order\
    \ of FIR filter ($M$) is the number of previous input samples necessary to compute\
    \ the current output. If '$M$' denotes the order of the FIR filter and '$N$' denotes\
    \ the number of coefficients of FIR filter, then the relationship between '$M$'\
    \ and '$N$' is given by $N = M + 1$.\n\n+   8. FIR filter is an 'all-zero' filter\
    \ with the poles occurring at the origin. For a digital system to be stable, the\
    \ pole should lie within the unit circle. Since the pole of FIR filter occurs\
    \ at the origin, the FIR filter is an inherently stable filter.\n\n+   9. The\
    \ advantages of FIR filter are:\n    (a) FIR filter exhibits linear phase characteristics;\
    \ hence, there will not be phase distortion\n    (b) The group delay of FIR filter\
    \ is constant; hence, all the frequency component of the input signal passes through\
    \ FIR filter with equal delay.\n    (c) The poles of FIR filter lie at the origin;\
    \ hence, FIR filter is inherently stable filter\n    (d) The coefficients of FIR\
    \ filter are either symmetric or anti-symmetric in nature. Symmetricity of filter\
    \ coefficient leads to linear phaseresponse of the filter.\n\n+   10. FIR filters\
    \ can be designed using (a) windowing method, (b) frequency sampling method and\
    \ (c) optimal method."

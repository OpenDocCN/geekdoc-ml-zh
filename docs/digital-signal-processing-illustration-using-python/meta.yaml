    # ### 2.3.3 *Ideal or Sinc Interpolation*


    The expression for continuous-time signal obtained using sinc interpolation is
    expressed as


    $$x(t) = \sum_{n=-\infty}^{\infty} x[n] \sin c\left(\frac{t-nT_s}{T_s}\right)$$
    (2.12)


    The sinc function is a symmetric function which is square integrable. The decay
    of the sinc function is slow. The sinc function has infinite support; hence, it
    is termed as ideal interpolation. The sinc interpolation produces the smoothest
    possible interpolation of the samples.



    The impulse response of the IIR filter can be obtained upon taking inverse Z-transform
    of the transfer function. As the name suggests, the impulse response is not of
    finite duration. The impulse response is not guaranteed to be either symmetric
    or anti-symmetric; hence, it is not possible to obtain linear phase characteristics
    in the IIR filter. The group delay is not constant in IIR filter. If the pole
    of the IIR filter lies outside the unit circle, the filter is unstable. This implies
    that stability is not guaranteed in IIR filter. The main advantage of IIR filter
    is that it is possible to meet the filter specification with the minimum number
    of coefficients.



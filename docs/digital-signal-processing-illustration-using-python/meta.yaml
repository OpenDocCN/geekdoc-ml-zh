    # 4.5.4 Stability of Discrete-Time System


    A discrete-time system is stable if the following criterion are met.


    +   (a) **BIBO stability criterion**: A discrete-time system is stable if bounded
    input results in bounded output.

    (b) **Stability criterion with respect to impulse response**: A discrete-time
    system is stable if the impulse response of the system is absolutely summable.

    (c) **Stability with respect to position of pole**: A discrete-time system is
    stable if the pole of the discrete-time system lies within the unit circle.'

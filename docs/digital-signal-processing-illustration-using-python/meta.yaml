    # 8.5 Chebyshev Filter


    The squared magnitude response of Chebyshev filter is given by


    $$\left|H\left(e^{j\Omega}\right)\right|^2 = \frac{1}{1 + \varepsilon^2 T_N^2(\Omega)}
    \qquad (8.14)$$


    The parameter $\varepsilon$ sets the ripple amplitude. Chebyshev filters can be
    classified into two types, namely, Type I Chebyshev filters and Type II Chebyshev
    filters. Type I Chebyshev filter exhibits ripple in passband, whereas Type II
    Chebyshev filter exhibits ripple in stopband. Chebyshev polynomial $T_N(x)$ for
    different order is given in Table 8.3.



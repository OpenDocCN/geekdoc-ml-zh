    # **Step 1:** Prewarping


    The prewarping process must be done for the bilinear transformation technique
    to preserve one-to-one mapping in the frequency transformation from digital to
    analogue.


    The corresponding analogue frequencies $\Omega_p$ and $\Omega_s$ are obtained

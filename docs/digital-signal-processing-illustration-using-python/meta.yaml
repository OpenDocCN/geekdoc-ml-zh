    # 2.1.2 *Quantization of Signal*


    Quantization is mapping a large set of values to a smaller set of values. It can
    be broadly classified into (1) uniform and (2) non-uniform quantization. A uniform
    quantizer splits the mapped input signal into quantization steps of equal size.
    The uniform scalar quantization can be broadly classified into (1) mid-tread and
    (2) mid-rise quantizer.


    If ''$N$'' bits are used to represent the value of the signal $x[n]$, then there
    are $2^N$ distinct values that $x[n]$ can assume. If the $x_{\min}$ and $x_{\max}$
    are the minimum and'
  - '[PAGE 60]


    maximum values taken by the signal $x[n]$, then the dynamic range of the signal
    is calculated by


    $$\text{Dynamic range} = x_{\max} - x_{\min}$$ (2.4)


    # ### 2.1.2.1 Mid-Tread Quantizer


    The relationship between the input and output of a mid-tread uniform quantizer
    is given by


    $$y[n] = Q \times \left\lfloor \frac{x[n]}{Q} + \frac{1}{2} \right\rfloor$$ (2.5)


    In the above equation, $x[n]$ represents the input signal to be quantized and
    $y[n]$ represents the quantized signal, ''$Q$'' denotes the quantization step
    size and the symbol $\lfloor \rfloor$ denotes flooring operation. The expression
    for quantization step size can be computed by


    $$Q = \frac{\text{Dynamic range}}{L}$$ (2.6)


    where ''dynamic range'' represents the difference between the maximum and minimum
    value of the signal and ''$L$'' denotes the number of reconstruction levels.


    The expression for the number of reconstruction levels is given by


    $$L = 2^b$$ (2.7)


    In the above expression, ''$b$'' is the number of bits used to represent the signal.



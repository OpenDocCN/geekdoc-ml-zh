    \n# **Chapter 3: Generation and Operation on Discrete-Time Sequence**\n\n# *Answers\
    \ to PreLab Questions*\n\n+   1. Two important steps involved in converting continuous-time\
    \ signal into a discrete-time signal are (a) sampling and (b) quantization.\n\
    2. Different forms of representation of discrete-time signals are (a) graphical\
    \ form, (b) functional form, (c) sequential form and (d) tabular form.\n3. Some\
    \ standard discrete-time sequences are (a) unit sample sequence ($\\delta[n]$),\
    \ (b) unit step sequence ($u[n]$), (c) unit ramp sequence ($r[n]$) and (d) exponential\
    \ sequence, which can be broadly classified as real exponential sequence and complex\
    \ exponential sequence.\n4. Some of the salient features of unit sample sequence\
    \ are:\n   (a) Any arbitrary signal $x[n]$ can be expressed in terms of scaled\
    \ and shifted versions of unit sample sequences. This is expressed as $x[n] =\
    \ \\sum_{k=-\\infty}^{\\infty} x[k]\\delta[n-k]$.\n   (b) Convolution of signal\
    \ $x[n]$ with unit sample signal will result in the signal $x[n]$. This is expressed\
    \ as $x[n] * \\delta[n] = x[n]$.\n   (c) If unit sample sequence is applied to\
    \ linear time-invariant discrete-time system, then the output of the system is\
    \ termed as the impulse response of the system. This is illustrated in Fig. A.1.\
    \ From Fig. A.1, it is possible to observe that the input to LTI discrete-time\
    \ system is unit sample signal; then, the output of the system is termed as the\
    \ impulse response of the system.\n5. It is to be noted that linear time-invariant\
    \ discrete-time system is characterized by its impulse response. That is, by knowing\
    \ the impulse response of the system, it is possible to know the properties of\
    \ the system like causality and stability.\n\n![](img/d441da6e35a3ccc1cab16d20ab65dda6_512_0.png)"

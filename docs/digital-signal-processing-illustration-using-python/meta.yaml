    $$\alpha(k) = \begin{cases} \sqrt{\dfrac{1}{N}}, & \text{for } k = 0 \ \sqrt{\dfrac{2}{N}},
    & \text{Otherwise} \end{cases} \tag{5.67}$$


    The formula to compute inverse discrete cosine transform is given by


    $$x[n] = \alpha(k) \sum_{k=0}^{N-1} X[k] \cos \frac{(2n+1)\pi k}{2N} \tag{5.68}$$


    where


    $$\alpha(k) = \begin{cases} \sqrt{\dfrac{1}{N}}, & \text{for } k = 0 \ \sqrt{\dfrac{2}{N}},

    # ## 5.5 Discrete Cosine Transform (DCT)


    Discrete cosine transform was developed by Ahmed, Rao and Natarajan in the year
    1974. DCT is a unitary transform, and it is not a discrete version of the cosine
    functions. The DCT has better energy compaction than DFT; hence, it is widely
    used in signal compression. DCT is employed in JPEG compression standard. DCT
    is based on the DFT with imposed even symmetry through reflection; hence, DCT
    is a real-valued transform.


    The formula to compute forward discrete cosine transform is given by


    $$X[k]=\alpha(k)\sum_{n=0}^{N-1}x[n]\cos\frac{(2n+1)\pi k}{2N}$$ (5.66)



    # Experiment 1.16 Generation of Rectangular and Triangular Pulse Signal


    The expression for rectangular pulse is given by $x(t) = \begin{cases} 1, & |t|
    < 1 \ 0, \text{otherwise} \end{cases}$. It can be considered as a positive going
    edge followed by negative going one. Rectangular pulse represents a drastic variation
    from level 0 to 1 and from 1 to 0. The expression for the triangular pulse is
    $x(t) = \begin{cases} 1 - \dfrac{|t|}{T}, & \text{for } |t| < T \ 0, & \text{otherwise}
    \end{cases}$. The triangular pulse represents a gradual variation from level 0
    to 1 and from 1 to 0.


    The python code, which generates the rectangular and triangular pulse signal,
    is shown in Fig. 1.31, and the corresponding output is shown in Fig. 1.32.


    # Inference


    Figure 1.32 shows that rectangular pulse exhibits a drastic change in amplitude
    from 0 to 1 V, whereas triangular pulse exhibits a gradual variation in amplitude
    from 0 to 1 V. In later section, it will be proved that the convolution of two
    rectangular pulses will result in a triangular pulse.


    ```

    python

    #Generation of rectangular and triangular pulse signal

    import numpy as np

    import matplotlib.pyplot as plt

    #Step 1: Generation of signals

    t=np.linspace(-2,2,100)

    rect_pulse=abs(t)<1 #Rectangular pulse

    tri_pulse=(1 - abs(t)) * (abs(t) < 1) #Triangular pulse

    #Step 2: Plotting of the pulse signals

    plt.subplot(2,1,1),plt.plot(t,rect_pulse)

    plt.xlabel(''Time (t)''),plt.ylabel(''Amplitude (V)''),plt.title(''Rectangular
    pulse'')

    plt.subplot(2,1,2),plt.plot(t,tri_pulse)

    plt.xlabel(''Time (t)''),plt.ylabel(''Amplitude (V)''),plt.title(''Triangular
    pulse'')

    plt.tight_layout()

    ```



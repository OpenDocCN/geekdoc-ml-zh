    # **Step 2**: Transfer function $H(z)$


    The digital transfer function $H(z)$ using impulse invariant technique is given
    by


    $$H(z) = \sum_{i=1}^{N} \frac{A_i}{1 - e^{s_i T} z^{-1}}$$


    In this case, $N = 2$, the expression for $H(z)$ is given by


    $$H(z) = \sum_{i=1}^{2} \frac{A_i}{1 - e^{s_i T} z^{-1}} = \frac{A_1}{1 - e^{s_1
    T} z^{-1}} + \frac{A_2}{1 - e^{s_2 T} z^{-1}}$$



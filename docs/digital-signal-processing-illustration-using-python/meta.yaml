    ### 本章路线图


    本节讨论本章内容的流程。本章的目标是生成不同类型的连续时间信号、脉冲波形。本章生成的各种信号的表示形式以流程图给出，如下所示：


    ### 课前问题


    1. 举几个自然界中连续信号的实际例子。

    2. 说明 *numpy* 库中可用的内置函数，用于生成特定长度的数据点以定义时间等自变量。


    # ### 8.2.3 Bilinear Transformation Technique (BLT)


    In bilinear transformation technique, the mapping from *S*-plane to Z-plane is
    done using the relation


    ```

    $$s = \frac{2}{T} \frac{1 - z^{-1}}{1 + z^{-1}} \qquad (8.7)$$

    ```


    Unlike impulse invariant technique (IIT), there is no aliasing problem in bilinear
    transformation technique. The relationship between the analogue frequency (Ω)
    and digital frequency (ω) in BLT is given in Eq. (8.5)


    ```

    $$\Omega = \frac{2}{T} \tan\left(\frac{\omega}{2}\right) \qquad (8.8)$$

    ```


    The above equation can also be expressed as


    ```

    $$\omega = 2 \tan^{-1}\left(\frac{\Omega T}{2}\right) \qquad (8.9)$$

    ```


    From Eqs. (8.8) and (8.9), it is possible to infer that there exists a non-linear
    relationship between analogue and digital frequency in bilinear transformation
    technique, which is termed as *warping*.'

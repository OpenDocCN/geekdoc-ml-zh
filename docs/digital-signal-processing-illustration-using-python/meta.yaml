    The above equation can be simplified as


    $$|H(e^{j\omega})|^2 = \frac{\cos^2(\omega) + a^2 - 2a\cos(\omega) + \sin^2(\omega)}{1
    + a^2\cos^2(\omega) - 2a\cos(\omega) + a^2\sin^2(\omega)}$$



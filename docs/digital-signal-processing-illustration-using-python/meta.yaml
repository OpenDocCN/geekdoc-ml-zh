    # ## Experiment 11.6 Inverse System Modelling Using LMS Algorithm


    This experiment discusses the inverse system modelling using LMS algorithm. The
    general block diagram of inverse system modelling using adaptive filter is shown
    in Fig. 11.14. From this figure, it is possible to understand that the unknown
    system and the adaptive filter are connected in a cascade form, and the delayed
    version of the input signal act as a reference signal. The aim of adaptive filtering
    in this experiment is to obtain the inverse system of the unknown system so that
    y[n] and d[n] will be similar. If y[n] and d[n] are similar, then the adaptive
    filter is equal to the inverse of the unknown system.


    In communication systems, inverse system modelling is used as channel equalization.
    In such scenario, the adaptive filter is termed as ''equalizer''. Adaptive equalizer
    can combat intersymbol interference. Intersymbol interference arises because of
    the spreading of a transmitted pulse due to the dispersive nature of the channel.'

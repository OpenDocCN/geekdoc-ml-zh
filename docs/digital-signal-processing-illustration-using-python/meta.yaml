    The squared magnitude response of *N*th order Butterworth lowpass filter is given
    by


    $$\left|H_N\left(e^{j\Omega}\right)\right|^2 = \frac{1}{1+\left(\frac{\Omega}{\Omega_c}\right)^{2N}}$$

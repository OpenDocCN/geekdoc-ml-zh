    # ## 11.1 Wiener Filter


    Wiener filter is the mean square error (MSE) optimal stationary linear filter
    for signal corrupted by additive noise. The Wiener filter computation requires
    the assumption that the signal and noise are in the random process. The general
    block diagram of the Wiener filter is shown in Fig. 11.1. The main objective of
    the Wiener filter is to obtain the filter coefficient of the LTI filter, which
    can provide the final output ($y[n]$) as much as the minimum MSE between the output
    and the desired signal or target ($d[n]$). In Fig. 11.1, $s[n]$ denotes the original
    signal, which is a clean signal, and it is corrupted by additive noise $\eta[n]$
    to give the signal $x[n]$. The parameters of the filter have to be designated
    has to be designed in such a way that the output of the filter $y[n]$ should resemble
    the desired signal $d[n]$ such that the error ''$e[n]$'' is minimum.


    The expression for the optimal Wiener filter is given by


    ```

    $$h_{\text{opt}} = R^{-1}p$$

    ```


    (11.1)


    The above expression is termed as ''Wiener-Hopf'' expression, which is named after
    American-born Norbert Wiener and Austrian-born Eberhard Hopf. The expression for
    optimal filter depends on the autocorrelation matrix ($R$) of the observed signal
    ($x[n]$) and the cross-correlation vector ($p$) between the observed signal ($x[n]$)
    and the desired signal ($d[n]$). $h_{\text{opt}}$ denotes the optimal filter coefficients.



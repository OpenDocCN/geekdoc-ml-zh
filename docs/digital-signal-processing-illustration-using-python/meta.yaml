    # ### 4.2.2 State-Space Model of a Discrete-Time System


    The state-space model describes the system''s dynamics through two equations,
    namely: ''state equation'' and ''output equation''. The state equation describes
    how the input influences the state, and the output equation describes how the
    state and the input directly influence the output. It is to be noted that the
    state-space representations of a particular system''s dynamics are not unique.
    The two equations are given below


    $$x[k+1] = Ax[k] + Bu[k] \qquad (4.10)$$


    $$y[k] = Cx[k] + Du[k] \qquad (4.11)$$


    where $u[k] \in \Re^m$ is the input, $y[k] \in \Re^p$ is the output and $x[k]
    \in \Re^n$ is the state vector. ''A'' is the system matrix, ''B'' and ''C'' are
    the input and output matrices, and ''D'' is the feed forward matrix.


    # #### 4.2.2.1 State-Space to Transfer Function


    Taking Z-transform on both sides of Eq. (4.10), we get


    $$zX(z) - zx_0 = AX(z) + BU(z)$$


    Assuming an zero initial condition ($x_0$), the above equation can be expressed
    as


    $$zX(z) = AX(z) + BU(z)$$


    The above equation can be expressed as


    $$(zI - A)X(z) = BU(z)$$


    The expression for $X(z)$ is given by


    $$X(z) = B(zI - A)^{-1}U(z) \qquad (4.12)$$


    Taking Z-transform on both sides of the Eq. (4.11), we get


    $$Y(z) = CX(z) + DU(z) \qquad (4.13)$$


    Substituting the expression for $X(z)$ from Eq. (4.12) in Eq. (4.13), we get'
  - '[PAGE 145]


    $$Y(z) = CB(zI - A)^{-1}U(z) + DU(z)$$


    The expression for the transfer function is given by


    $$H(z) = \frac{Y(z)}{U(z)} = C(zI - A)^{-1}B + D \qquad (4.14)$$


    Thus, the transfer function of the system is represented in terms of state-space
    model.



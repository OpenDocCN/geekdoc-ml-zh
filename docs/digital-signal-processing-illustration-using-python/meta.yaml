  md: 'In the limit $-\tau$ to $\tau$, the value taken by the signal $x(t)$ is one;
    hence, the above equation can be expressed as


    ```

    $$X(\Omega) = \int_{-\tau}^{\tau} x(t)e^{-j\Omega t}dt$$ (5.20)

    ```


    ```

    $$X(\Omega) = \int_{-\tau}^{\tau} 1 \times e^{-j\Omega t}dt$$ (5.21)

    ```


    Upon performing the integration, we get


    ```

    $$X(\Omega) = \left(\frac{e^{-j\Omega t}}{-j\Omega}\right)_{-\tau}^{\tau}$$ (5.22)

    ```


    Substituting the upper and lower limits in the above expression, we get


    ```

    $$X(\Omega) = \frac{e^{-j\Omega\tau} - e^{j\Omega\tau}}{-j\Omega}$$ (5.23)

    ```


    The above equation can be written as


    ```

    $$X(\Omega) = \frac{e^{j\Omega\tau} - e^{-j\Omega\tau}}{j\Omega}$$

    ```


    The above equation can be simplified as


    ```

    $$X(\Omega) = 2\frac{\sin(\Omega\tau)}{\Omega}$$

    ```


    Multiplying and dividing the above equation by ''$\tau$'', we get


    ```

    $$X(\Omega) = 2\tau\frac{\sin(\Omega\tau)}{\Omega\tau} = 2\tau \sin c(\Omega\tau)$$
    (5.24)

    ```


    From the above expression, it is possible to conclude that Fourier transform of
    a rectangular function will result in a $sinc$ function.



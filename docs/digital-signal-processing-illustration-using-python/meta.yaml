    Equation (5.53) is obtained using the fact that convolution in time domain is
    equivalent to multiplication in the Fourier domain.


    The frequency response of the system from Eq. (5.53) can be expressed as


    $$H\left(e^{j\omega}\right) = \frac{Y\left(e^{j\omega}\right)}{X\left(e^{j\omega}\right)}
    \tag{5.54}$$


    The frequency response of the system is a combination of magnitude and phase responses.
    This is expressed as


    $$H\left(e^{j\omega}\right) = \left|H\left(e^{j\omega}\right)\right|e^{j\phi\left(e^{j\omega}\right)}
    \tag{5.55}$$


    The frequency response defines how a complex exponential is changed in amplitude
    and phase by a system.



    # ## 6.5 Notch Filter


    Notch filter has two complex conjugate zeros placed on the unit circle to create
    a null at a desired frequency. A notch filter has the ability to reject one particular
    frequency. A pair of complex conjugate zeros on the unit circle produces a null
    in the frequency response, which results in the rejection of one particular frequency.
    Let the conjugate zeros be represented as $z_1 = re^{j\omega}$ and $z_2 = re^{-j\omega}$.

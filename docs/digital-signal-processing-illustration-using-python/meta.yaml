    where $\Omega_c$ is cut-off frequency and N denotes the order of the filter. Butterworth
    filter exhibits maximally flat response in both passband and stopband. Therefore,
    these filters are called maximally flat filters or flat-to-flat filters. The salient
    features of lowpass Butterworth filter are:


    +   1. The magnitude response is a monotonically decreasing function of frequency.

    2. The maximum gain occurs at $\Omega = 0$.'

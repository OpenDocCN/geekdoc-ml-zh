    +   1. The zeros are uniformly spaced $\frac{2\pi}{L}$ radians apart around the
    unit circle.

    2. For odd values of ''$L$'', there is a zero at $\omega = \pi$.

    3. The poles lie at the origin, which implies that the filters are inherently
    stable.'

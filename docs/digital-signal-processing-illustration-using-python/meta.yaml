    **S. Esakkirajan** is a Professor in Instrumentation and Control Engineering Department
    at PSG College of Technology, where he has been a faculty member since 2004. He
    did B.Sc. Physics from Sadakathullah Appa College, Palayamkottai, B. Tech. in
    Instrumentation Engineering from Cochin University of Science and Technology,
    M.E. in Applied Electronics from PSG College of Technology, and Ph.D. in the area
    of Image Processing from Anna University. He has successfully guided four research
    scholars towards their Ph.D. in the area of signal processing. He has published

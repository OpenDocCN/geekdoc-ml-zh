    # ## Roadmap of the Chapter


    Digital filters can be considered as a linear time-invariant system that accepts
    input and gives modified input as the output. Based on the input-output relation,
    discrete-time systems can be classified as autoregressive system (AR), moving
    average system (MA) and autoregressive moving average (ARMA) system. If the current
    output is a function of the current input and past outputs, then the system is
    autoregressive. If the current output of the system is a function of current input
    and past inputs, the system is a moving average system. If the current output
    is a function of both past input and past output, the system is autoregressive
    moving average system. An example of autoregressive system is the IIR filter and
    notch filter. Digital resonator and M-point moving average systems are examples
    of MA system. All-pass filter is an example of an ARMA system. This is depicted
    below.'

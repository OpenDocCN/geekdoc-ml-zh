    $$\left|H\left(e^{j\omega}\right)\right|^2 = \frac{1 + a^2 - 2a\cos(\omega)}{1
    + a^2\left[\cos^2(\omega) + \sin^2(\omega)\right] - 2a\cos(\omega)}$$


    Upon simplifying the above expression, we get


    $$\left|H\left(e^{j\omega}\right)\right|^2 = \frac{1 + a^2 - 2a\cos(\omega)}{1
    + a^2 - 2a\cos(\omega)} = 1 \qquad (6.26)$$



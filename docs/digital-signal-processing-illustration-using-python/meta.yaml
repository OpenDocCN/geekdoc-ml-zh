    # ### 7.3.7 *Window Functions*


    In this section, the window function is visualized in both time domain and frequency
    domain. Different types of window functions include rectangular, triangular, Hamming,
    Hanning, Kaiser, etc. The main lobe width of the window function controls the
    transition bandwidth, whereas the height of the side lobe controls the passband
    and stopband ripples. A rectangular window has the narrowest main lobe; hence,
    it gives sharpest transition. Compared to rectangular window, the Hamming and
    Hanning windows are smoother. By tapering the window smoothly to zero, the sidelobes
    can be reduced in amplitude, which will reduce the ripple, but the trade-off is
    a larger main lobe. A linear phase response can be achieved if the window function
    is symmetric. Some windows allow controlled trade-offs between sidelobe amplitude
    and main lobe width. One such window is the Kaiser window.'

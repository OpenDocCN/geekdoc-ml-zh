    # ## 7.4 Frequency Sampling-Based FIR Filter Design


    The steps followed in frequency sampling method of FIR filter design are summarized
    below:


    +   1. The design step starts with a prescribed magnitude response.

    2. The prescribed magnitude response is sampled at enough points.

    3. Take the inverse Fourier transform of the samples obtained in step (2). This
    will result in the filter''s impulse response.


    # ### Experiment 7.16 Frequency Sampling-Based FIR Filter Design


    The built-in function ''*firwin2*'' available in ''*scipy*'' library is used here
    to generate FIR filter coefficients. The following python code helps one to obtain
    the coefficients of Type-I, Type-II, Type-III and Type-IV FIR filters. It is known
    that Type-I and Type-II FIR filter exhibits even symmetry with odd and even number
    of coefficients, respectively. Type-III, and Type-IV FIR filter exhibits odd symmetry
    with odd and even number of coefficients, respectively. The python code, which
    obtains the response of four types of FIR filter, is shown in Fig. 7.32, and the
    corresponding output is shown in Fig. 7.33.


    # ### Inferences


    From Fig. 7.32, the following observations can be made:


    +   1. The built-in function ''*firwin2*'' is used here to generate the FIR filter
    coefficients. In the program, the variables ''*f1* to *f4*'' represent the desired
    normalized frequency in the range 0 to 1. The variables ''*m1* to *m4*'' represent
    the desired magnitude response. ''1'' represents passband, and ''0'' represents
    the stopband. In the program, ''*N1* to *N4*'' represents the number of coefficients
    of the filter. For Type-I and Type-III, the number of coefficients has to be odd.
    For Type-II and Type-IV, the number of coefficients has to be even.

    2. The keyword ''*asymmetric = false*'' implies even symmetry, and ''*asymmetric
    = true*'' represents odd symmetry. Type-I and Type-II FIR filters exhibit even
    symmetry, whereas Type-III and Type-IV FIR filters exhibit odd symmetry.


    From Fig. 7.33, the following interpretations can be made:


    +   1. Type-I and Type-II FIR filters act as lowpass filter; Type-III FIR filter
    act as bandpass filter. Type-IV FIR filter act as a highpass filter.

    2. All four types of FIR filters exhibit linear phase characteristics in the passband.

    3. It is to be noted that Type-II FIR filter cannot be used as a highpass filter.
    Type-III FIR filter cannot be used as a lowpass and highpass filters. Type-IV
    FIR filter cannot be used as a lowpass filter.'

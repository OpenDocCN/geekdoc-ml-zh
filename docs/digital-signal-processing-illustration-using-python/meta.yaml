    # ### 12.2.4 Decision Rule Approach


    The decision rule consists of adaptive threshold selection. The thresholds are
    adjusted automatically based on the noise in the ECG signal. The adaptive two
    thresholds (Th1 and Th2) are calculated using the equation given below.


    $$\text{Th1} = \text{NPK} + 0.25(\text{SPK} - \text{NPK})$$

    $$\text{Th2} = 0.5\text{Th1}$$


    (12.8)


    where NPK represents the running estimate of noise peak and SPK denotes the running
    estimate of the signal peak, which are computed as


    $$\text{SPK} = 0.125\text{Pk} + 0.875\text{SPK} \quad \text{if Pk is signal peak}$$

    $$\text{NPK} = 0.125\text{Pk} + 0.875\text{NPK} \quad \text{if Pk is noise peak}$$


    where Pk denotes peak. A peak is a local maximum determined by observing when
    the signal changes direction within a predefined time interval. The SPK is a peak
    the algorithm has already established to be a QRS complex. The NPK is any peak
    that is not related to the QRS. Here, the thresholds Th1 and Th2 are based on
    running estimates of SPK and NPK. When a new peak is detected, it must first be
    classified as a signal peak or noise peak. The peak is a signal peak if the peak
    exceeds Th1, and the QRS is obtained using Th2. The python code for threshold
    selection and the final QRS detection is given in Fig. 12.25.


    The simulation result of the python code given in Fig. 12.25 is shown in Fig.
    12.26. From this figure, it is possible to observe that the R peak of the integrated
    ECG signal is detected, and the R peak of the filtered ECG is also shown.


    # #### Inferences


    The following inferences can be made from Figs. 12.21, 12.23 and 12.26.


    +   1. The raw ECG signal is affected by the baseline wander (i.e. the base *x*-axis
    of a signal moves up and down rather than straight).

    2. The bandpass filtered signal shows that the baseline wander is removed and
    the *x*-axis of the signal is in a straight line.

    3. The derivated ECG signal output highlights the positive and negative peaks
    of the ECG signal very clearly. The squared ECG signal displays that all the negative
    peaks are brought up into the positive peak. These results can be found in Fig.
    12.23.

    4. The QRS peak marked moving window integrated ECG signal and the final R peak
    marked filtered ECG signal are displayed, which can be found in Fig. 12.26.'

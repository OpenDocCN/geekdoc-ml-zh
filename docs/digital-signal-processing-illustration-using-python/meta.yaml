    # ## 5.1 Introduction to Transform


    Transform is a tool to analyse signals and systems. Signals are converted from
    time or spatial domain to frequency domain using transform. Frequency domain is
    used to describe the signal in terms of frequency components. Each frequency has
    its own amplitude and phase. From the spectrum, it is possible to interpret the
    frequencies present in the signal. Thus, the time domain and the frequency domain
    representation of the signal are equivalent. It is possible to transform the signal
    from time domain to frequency domain and vice versa without any loss of information.
    Mathematically, transform takes the inner product of the signal with the basis
    function. The inner product is one way of quantifying the similarity or the dissimilarity
    of two signals.


    # ## 5.2 Z-Transform


    The Z-transform is a powerful tool to analyse linear, time-invariant discrete-time
    systems. The Z-transform for discrete-time signals is the counterpart of the Laplace
    transform for continuous-time signals. It simplifies the solution of discrete-time
    problems by converting LTI difference equations to algebraic equations and convolution
    to multiplication. The Z-transform of a discrete-time signal $x[n]$ is defined
    as


    ```

    $$X(z) = \sum_{n=-\infty}^{\infty} x[n]z^{-n}$$ (5.1)

    ```


    The above expression is often termed as two-sided Z-transform. Here, $z$ is a
    complex variable. The Z-transform of right-sided sequence is expressed as


    ```

    $$X(z) = \sum_{n=0}^{\infty} x[n]z^{-n}$$ (5.2)

    ```


    The Z-transform of left-sided sequence is expressed as


    ```

    $$X(z) = \sum_{n=-\infty}^{-1} x[n]z^{-n}$$ (5.3)

    ```


    **Region of Convergence** The region of convergence of the Z-transform is the
    value of $z$ for which $X(z)$ is finite. The region of convergence allows the
    unique inversion of the Z-transform. The ROC depends on the signal $x[n]$ being
    transformed. The ROC helps to characterize the system as causal or stable.'

    Figure 4.36 shows that the input signal ($x[n]$) is a unit step signal, a bounded
    input signal. By observing the output signal ($y[n]$) is not a bounded signal.
    The output signal is a ramp signal, which is not bounded. This shows that bounded
    input signal to the system does not result in bounded output signal. Hence, the
    system is not BIBO stable.



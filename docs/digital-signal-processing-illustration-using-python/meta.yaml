    **Fig. 4.24** Block diagram representation of unit delay system


    $$h[n] = Z^{-1}\{H(z)\}$$ (4.26)


    Substituting the expression of $H(z)$ from Eq. (4.25) in Eq. (4.26), we get


    $$h[n] = Z^{-1}\{z^{-1}\}$$


    Upon taking inverse $Z$-transform, the expression for impulse response is obtained
    as


    $$h[n] = \delta[n-1]$$ (4.27)


    # (d) Step response of the system


    The step response of the system is the response of the system to unit step input
    signal. For a linear time-invariant system, the relationship between the input
    and output signal is given by


    $$y[n] = x[n] * h[n]$$ (4.28)


    In the above equation, ''*'' represents the convolution. To obtain the step response
    of the system, $x[n] = u[n]$ and $h[n] = \delta[n-1]$, which is obtained from
    the previous result.


    $$s[n] = u[n] * \delta[n-1]$$


    The above equation can be simplified by using the property of delta function as


    $$s[n] = u[n-1]$$



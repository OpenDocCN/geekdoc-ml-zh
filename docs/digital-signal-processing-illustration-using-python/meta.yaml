  md: '# Chapter 2: Sampling and Quantization of Signals


    # *Answers to PreLab Questions*


    +   1. The steps involved in converting the analogue signal into a digital signal
    are (a) sampling, (b) quantization and (c) encoding. Before sampling, it is necessary
    to ensure that the signal to be sampled is bandlimited. Sampling converts a continuous-time
    signal into a discrete-time signal. Quantization is basically mapping a large
    set of values to a smaller set of values. In quantization, the discrete-time signal
    is converted to a quantized signal. In encoding, the quantized signal is converted
    to a digital code.


    +   2. The sampling theorem specifies the minimum sampling rate so that the sampled
    signal can be reconstructed from its samples without aliasing problem. In order
    to reconstruct the signal from the samples without an aliasing problem, the sampling
    frequency must be greater than twice the maximum frequency content of the signal.
    This is expressed as $f_s \geq 2f_{max}$, where $f_s$ represents the sampling
    frequency and $f_{max}$ represents the maximum frequency content of the signal.


    +   3. Suppose the signal is a periodic and ideal interpolation is employed. In
    that case, all spectral components less than $f_s/2$ (where $f_s$ represents the
    sampling frequency) are reconstructed perfectly, but all higher-frequency spectral
    components are aliased to a frequency less than $f_s/2$.


    +   4. The square wave is not a bandlimited signal. It is not possible to reconstruct
    the square wave from its samples.


    +   5. Two prominent reasons for aliasing while performing sampling are (a) undersampling
    and (b) signal which is not a bandlimited signal. Here undersampling implies that
    the sampling rate $f_s < 2f_{max}$, where $f_{max}$ is the maximum signal frequency.


    +   6. Sampling is basically taking specific instants of the signal. The sampling
    rate ($f_s$) is the number of samples per second. Sampling interval ($T_s$) is
    the time-interval between two consecutive samples.


    +   7. Nyquist rate = $2B = 2 \times 5$ kHz = 10 kHz.


    +   8. Quantization is mapping a large set of values to a smaller set of values.
    It will not obey the superposition principle; hence, it is considered as non-linear
    phenomenon.


    +   9. Quantization maps a large set of values to a smaller set of values. It
    is not a one-to-one mapping; hence, error is inevitable, and it is considered
    as irreversible phenomenon. The meaning is that it is difficult to get the original
    signal exactly after quantization.


    +   10. The process of converting sampled data sequences to a continuous-time
    signal is termed as signal reconstruction. Different strategies include (a) zero-order
    hold, (b) first-order hold or linear interpolation and (c) ideal or sinc interpolation.'

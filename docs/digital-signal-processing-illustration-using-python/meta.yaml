  md: '$$H(z) = \frac{Y(z)}{X(z)} = 1 + z^{-L}$$ (6.29)


    The frequency response of the system is obtained by substituting $z = e^{j\omega}$
    in the above expression, we get


    $$H\left(e^{j\omega}\right) = 1 + e^{-j\omega L}$$ (6.30)


    # ### 6.7.1 *Location of Poles and Zeros of Comb Filter*


    From the expression of the transfer function given in Eq. (6.30), it is possible
    to interpret; there is a pole of multiplicity ''$L$'' at the origin. The location
    of zeros is obtained by equating the numerator of the transfer function to zero,
    which results in


    $$z^{-L} = -1$$


    The above equation can be expressed as


    $$e^{-j\omega L} = e^{j(2k+1)\pi}$$


    From the above expression


    $$\omega_k = \frac{(2k+1)\pi}{L}$$ (6.31)


    The zeros of the FIR filter are uniformly spaced $\frac{2\pi}{L}$ radians apart
    around the unit circle starting at $\omega = \frac{\pi}{L}$. For odd ''$L$'',
    there is a zero at $\omega = \pi$.



  md: "the filter coefficients are updated based on the error, $e[n]$ between the\
    \ output of the filter $y[n]$ and reference data $d[n]$. Examples of adaptive\
    \ filters are LMS filter and RLS filter.\n\n# ### 11.2.1 LMS Adaptive Filter\n\
    \nThe LMS is a least mean square algorithm that works based on the stochastic\
    \ gradient descent approach to adapt the estimate based on the current error.\
    \ The estimate is called the weight or filter coefficient. The weight or filter\
    \ coefficient update equation of the LMS algorithm is given by.\n\n$$w[n+1] =\
    \ w[n] + \\mu x[n]e[n] \\qquad (11.6)$$\n\nwhere $w[n+1]$ represents the new weight\
    \ or updated weight, $w[n]$ denotes the old weight, $\\mu$ indicates the step\
    \ size or learning rate, $x[n]$ is the input signal or data and the error signal\
    \ $e[n] = d[n] - y[n]$. $d[n]$ is the reference data or target data, and $y[n]$\
    \ is the actual output of the adaptive filter of the system.\n\n# #### Experiment\
    \ 11.4 Implementation of LMS Algorithm\n\nThis experiment discusses the implementation\
    \ of LMS algorithm for adaptive filtering using python. The python code to define\
    \ the LMS algorithm as a function is shown in Fig. 11.10. This code can be called\
    \ a function in the different applications of the LMS algorithm, which will be\
    \ discussed in the subsequent experiments. From Fig. 11.10, it is possible to\
    \ see that the weight updation formula of the LMS algorithm given in Eq. (11.6)\
    \ exists in it.\n\n# #### Inference\n\n+   1. From Fig. 11.10, it is possible\
    \ to observe that the LMS algorithm is written as a function, and it can be called\
    \ a signal processing application whenever needed.\n\n```\npython\n# This python\
    \ code for LMS algorithm\ndef LMS_algorithmm(x,mu,N,t):\n    # x = input data,\
    \ mu = step size, t = reference data, N = Filter length\n    N1=len(x)\n    w\
    \ = np.zeros(N) # Initial filter\n    e = np.zeros(N1-N)\n    for n in range(0,\
    \ N-F):\n        xn = x[n+N:n:-1]\n        en = t[n+N] - np.dot(xn,w) # Error\n\
    \        w = w + mu * en * xn # Update filter (LMS algorithm)\n        e[n] =\
    \ en # Record error\n    return w,e\n```\n\n**Fig. 11.10** Python code for LMS\
    \ algorithm"

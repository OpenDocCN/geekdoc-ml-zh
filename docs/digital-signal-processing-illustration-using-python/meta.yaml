    # Chapter 10: Multirate Signal Processing


    # *Answers to PreLab Questions*


    +   1. When two devices operating at different sampling rate are to be interconnected,
    it is necessary to change the sampling rate of the signal. Often there is a mismatch
    between the sampling rates of the recording and playback system. The sampling
    rate of audio signals in compact disc is 44.1 kHz, whereas the sampling rate of
    audio signals in digital audio tape is 48 kHz. Sampling rate conversion is required
    for the interconnection of compact disc with digital audio tape.


    +   2. A sampling rate converter is a device or software that accepts digital
    input signals at one sampling rate and outputs a digital signal at a different
    sampling rate. This is shown below.


    ![](img/d441da6e35a3ccc1cab16d20ab65dda6_526_0.png)


    Block diagram of sample rate converter


    +   3. The two basic operations in multirate signal processing are (a) downsampling
    and (b) upsampling. Downsampling reduces the sampling rate of the input signal,
    whereas upsampling increases the sampling rate of the input signal.


    +   4. Downsampling in time domain may lead to spectral overlap in the frequency
    domain, which is termed as ''aliasing''. To overcome aliasing, a lowpass filter
    is used before downsampling. This filter is termed as ''anti-aliasing filter''.
    This is depicted below.


    ![](img/d441da6e35a3ccc1cab16d20ab65dda6_526_1.png)


    Decimation operation


    To overcome the problem of aliasing, the cut-off frequency of the anti-aliasing
    filter is chosen as $f_s/M$.


    +   5. Upsampling by a factor of ''$L$'' is the process of inserting ''$L-1$''
    zeros between successive samples. Upsampling in time domain results in the creation
    of multiple copies of the original spectrum in the frequency domain. The anti-aliasing
    filter is a lowpass filter that retains only the original spectrum and removes
    multiple copies of the original spectrum. The block diagram of anti-imaging filter
    with upsampling operation is shown below. The sampling frequency of the anti-imaging
    filter is chosen as $f_s/L$.


    ![](img/d441da6e35a3ccc1cab16d20ab65dda6_526_2.png)


    Interpolation operation'
  - "[PAGE 527]\n\n+   6. The time-domain expression for downsampling by a factor\
    \ of '*M*' is given by $y[n] = x[nM]$. The frequency-domain expression for downsampling\
    \ by a factor of '*M*' is given by $Y(z) = \\frac{1}{M}\\sum_{k=0}^{M-1}X\\left(z^{\\\
    frac{1}{M}}e^{-j\\frac{2\\pi}{M}k}\\right)$.\n\n+   7. The time-domain expression\
    \ for upsampling by a factor of '*L*' is given by $y[n] = x[n/L]$. The frequency-domain\
    \ expression is given by $Y(z) = X(z^L)$.\n\n+   8. The three significant properties\
    \ of downsampling operation are\n    (a) Downsampling is a linear operation.\n\
    \    (b) Downsampling is a time-variant operation.\n    (c) Downsampling is an\
    \ irreversible operation.\n\n+   9. (a) Upsampling is a linear operation, because\
    \ it obeys additivity and homogeneity properties. Thus, upsampling obeys the superposition\
    \ principle; hence, it is a linear operation.\n    (b) Upsampling has varying\
    \ responses to the same input at different instants of time; hence, it is considered\
    \ as time-variant operation.\n\n+   10. Downsampling by a factor '*M*' and upsampling\
    \ by a factor of '*L*' are interchangeable if '*L*' and '*M*' are relatively prime.\n\
    \n+   11. Idempotent operations are operations, which can be applied multiple\
    \ times without changing the result. Downsampling by a factor of '*M*' followed\
    \ by upsampling by the same factor gives the same result if the operation is repeated\
    \ many times; hence, it is considered as idempotent operation.\n\n+   12. Polyphase\
    \ decomposition ensures that filtering operations are performed at the lowest\
    \ possible sampling rate in the system, which reduces the computational complexity\
    \ and the overall system's cost. Polyphase decomposition can be classified as\
    \ (a) Type I polyphase decomposition and (b) Type II polyphase decomposition.\n\
    \n+   13. Filter bank is a group of filters arranged in a specific fashion. Filter\
    \ bank is used for subband decomposition of the signal. It is useful for signal\
    \ denoising and signal compression.\n\n+   14. The main threats for perfect reconstruction\
    \ in a two-channel filter bank are (a) aliasing problem, (b) amplitude distortion\
    \ and (c) phase distortion. Perfect reconstruction can be achieved by proper choice\
    \ of analysis and synthesis filters.\n\n+   15. Transmultiplexer is a multiple\
    \ input-multiple output system (MIMO). It uses multirate operators and filters\
    \ to combine '*M*' signals for transmission across a channel and then recovers\
    \ the '*M*' input signals at the receiver end. The separation of signals should\
    \ be perfect, and the recovery of each signal should be performed without leakage\
    \ of signal from one channel to another, which is generally termed as crosstalk.\
    \ The proper choice of filters can avoid the crosstalk problem."

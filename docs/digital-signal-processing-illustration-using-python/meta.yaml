    # Chapter 7: FIR Filter Design


    # *Answers to PreLab Questions*


    +   1. The difference equation relating the input and output of an FIR filter
    is given by


    ```

    $$y[n] = \sum_{k=0}^{M} b_k x[n-k]$$

    ```


    From the difference equation, the following inferences can be drawn:


    +   (a) The current output of FIR filter depends on current input and previous
    inputs.


    +   (b) The number of previous outputs necessary to compute the current output
    is termed as the order of FIR filter.


    +   (c) Since the current output is not a function of previous output, FIR filter
    is considered as a ''non-recursive filter''. It can also be termed as ''all-zero''
    filter with the poles at the origin.


    +   (d) The filter coefficients are denoted as ''*bₖ*''. The nature of filtering
    depends on ''*bₖ*''.'

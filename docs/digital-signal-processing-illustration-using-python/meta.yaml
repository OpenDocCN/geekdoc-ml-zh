  md: '# Experiment 8.11 Conversion of Analogue Filter to Equivalent Digital Filter
    Using Matched Z-Transform Method


    This experiment discusses the conversion of an analogue filter into its equivalent
    digital filter using matched Z transform. Let us consider a second-order analogue
    filter transfer function is $H(s)=\frac{(s+3)}{(s+1)(s+4)}$ to be converted into
    digital filter using matched Z-transform. Assume $T = 0.1$ s. The matched Z transform
    (MZT) method directly maps the poles and zeros of an analogue filter into the
    poles and zeros of the digital filter. The transfer function of the analogue filter
    is given as


    $$H(s) = \frac{\prod_{k=1}^{M}(s-z_k)}{\prod_{k=1}^{N}(s-p_k)} \qquad (8.10)$$


    The transfer function of the equivalent digital filter is computed by replacing
    the term $(s-z_k)$ with $(1-\mathrm{e}^{z_k T}z^{-1})$. The transfer function
    of the equivalent digital filter can be written as


    $$H(z) = \frac{\prod_{k=1}^{M}(1-\mathrm{e}^{z_k T}z^{-1})}{\prod_{k=1}^{N}(1-\mathrm{e}^{p_k
    T}z^{-1})} \qquad (8.11)$$


    where $T$ is the sampling period. The transfer function of the analogue filter
    considered in this example is given by


    $$H(s) = \frac{(s+3)}{(s+1)(s+4)}$$


    From the above equation, the zeros and poles are computed as $z_1 = -3$, and $p_1
    = -1$, $p_2 = -4$, respectively.


    Substituting the values of zeros, poles and $T = 0.1$ in Eq. (8.11), we get


    $$H(z) = \frac{(1-\mathrm{e}^{-0.3}z^{-1})}{(1-\mathrm{e}^{-0.1}z^{-1})(1-\mathrm{e}^{-0.4}z^{-1})}$$


    Simplifying the above equation, we get


    $$H(z) = \frac{(1-0.7408z^{-1})}{(1-0.9048z^{-1})(1-0.6703z^{-1})}$$


    Further simplifying the above equation, we get


    $$H(z) = \frac{z(z-0.7408)}{(z^2-1.5751z+0.6065)}$$'

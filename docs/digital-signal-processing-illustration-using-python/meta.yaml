    filter.

    3. Type-III FIR filter has zero at $\omega = 0$ and $\omega = \pi$. It cannot
    be used as both lowpass and highpass filters.

    4. Type-IV FIR filter has zero at $\omega = 0$. It cannot be used as lowpass filter.

    5. In general, zeros of FIR filter occur in conjugate, reciprocal pairs.



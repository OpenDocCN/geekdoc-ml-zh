    # 7.6 Applications of FIR Filter


    The coefficients of FIR filters are either symmetric or anti-symmetric. FIR filter
    exhibits linear phase characteristics, because of which, there is no phase distortion.
    The group delay of FIR filter is constant. Since the poles of FIR filter occur
    at the origin, FIR filters are inherently stable. Because of these characteristics,
    FIR filters are used in many areas of signal processing like multirate signal
    processing, adaptive signal processing, etc. In multirate signal processing, FIR
    filters are preferred to design perfect reconstruction filter bank. In adaptive
    signal processing, FIR filters are preferred in system identification, adaptive
    notch filter, inverse system modelling, echo cancellation and variety of such
    applications. In this section, two simple'

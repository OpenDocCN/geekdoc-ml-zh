    # Experiment 9.9 Limit Cycle Oscillation in IIR Filter


    This experiment tries to verify that the limit cycle oscillation can be occurred
    in IIR filter due to coefficient quantization.


    Let us consider a second-order recursive system which is given by


    $$y[n] - \frac{7}{8}y[n-1] + \frac{5}{8}y[n-2] = \delta[n]$$


    The input and output coefficients of the recursive system are quantized using
    the rounding fixed-point 3-bit quantization approach. The quantized result of
    the recursive system is written as


    $$y_q[n] = Q_r\left\{\delta[n] + \frac{7}{8}y[n-1] - \frac{5}{8}y[n-2]\right\}$$


    The python code for this above equation is given in Fig. 9.17. From this figure,
    it is possible to confirm that the number of bits used in the quantization is
    3, and the rounding quantization approach is implemented. After executing the
    python code given in Fig. 9.17, the obtained result is shown in Fig. 9.18. From
    this figure, it is possible to infer that the output is oscillated and confirms
    that the limit cycle oscillation exists in this filter.


    # Inferences


    From this experiment, the following inferences can be made:


    +   1. The finite arithmetic operation in the digital implementation of a recursive
    system may introduce limit cycle oscillations in the final output. This causes
    due to the feedback that exists in the recursive system.'

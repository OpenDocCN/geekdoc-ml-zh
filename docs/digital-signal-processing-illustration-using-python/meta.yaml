    # ### 5.4.1 Continuous-Time Fourier Transform (CTFT)


    The continuous-time Fourier transform (CTFT) of the signal $x(t)$ is represented
    as


    ```

    $$X(\Omega) = \int_{-\infty}^{\infty} x(t)e^{-j\Omega t}dt$$ (5.4)

    ```


    It can be interpreted as taking the inner product of the signal $x(t)$ with the
    basis function $e^{-j\Omega t}$. This is represented as


    ```

    $$X(\Omega) = \langle x(t), e^{-j\Omega t} \rangle$$ (5.5)

    ```


    Equations (5.4) and (5.5) are termed as ''analysis equation''. The result of continuous-time
    Fourier transform is termed as ''spectrum'', which is illustrated in Fig. 5.8.
    The equations reveal that how an arbitrary signal $x(t)$ can be expanded as a
    sum of elementary harmonic functions. The elementary harmonic functions are termed
    as the basis function. The Fourier transform uses complex exponentials of various
    frequencies as its basis function.


    CTFT is a complex function of ''$\Omega$'' in the range $-\infty < \Omega < \infty$.
    CTFT exists if the signal $x(t)$ satisfies Dirichlet conditions, which are given
    below:


    +   1. The signal $x(t)$ has a finite number of discontinuities and a finite number
    of maxima and minima in any finite interval.

    2. The signal $x(t)$ must be absolutely integrable, which is represented as'
  - '[PAGE 189]


    # Fig. 5.9 Forward and inverse CTFT


    ![](img/d441da6e35a3ccc1cab16d20ab65dda6_189_0.png)


    $\int_{-\infty}^{\infty}|x(t)|dt < \infty$.


    Inverse CTFT refers to obtaining the signal from the spectrum, which is also called
    as ''synthesis equation''. The inverse CTFT is given by


    $$x(t) = \frac{1}{2\pi}\int_{-\infty}^{\infty}X(\Omega)e^{j\Omega t}d\Omega \qquad
    (5.6)$$


    From Eq. (5.6), it is possible to interpret that Fourier synthesis formula reconstructs
    a signal using a set of scaled complex exponentials.


    Analysis refers to the decomposition of the signal into its constituent components
    specifying the weights of the basis functions in the expansion. Synthesis refers
    to the reconstruction of the signal from the basis functions chosen to represent
    the signal. The analysis and synthesis function of CTFT of the signal $x(t)$ is
    illustrated in Fig. 5.9.


    # (a) Forward Fourier Transform


    The continuous-time Fourier transform of unit impulse signal is given by


    $$\delta(\Omega) = \int_{-\infty}^{\infty}\delta(t)e^{-j\Omega t}dt \qquad (5.7)$$


    Upon simplifying the above equation, we get


    $$\delta(\Omega) = 1 \qquad (5.8)$$'
  - '[PAGE 190]


    From Eq. (5.8), it is possible to interpret that unit impulse contains a component
    at every frequency. Another way to interpret the result is to make up $\delta(t)$;
    one needs infinite number of equal frequency components.


    # (b) Inverse Fourier transform of $\delta(\Omega)$


    The inverse CTFT of $\delta(\Omega)$ is given by


    $$x(t) = \frac{1}{2\pi} \int_{-\infty}^{\infty} X(\Omega)e^{j\Omega t} d\Omega
    \qquad (5.9)$$


    Substituting $X(\Omega) = \delta(\Omega)$ in the above expression, we get


    $$F^{-1}\{\delta(\Omega)\} = \frac{1}{2\pi} \int_{-\infty}^{\infty} \delta(\Omega)e^{j\Omega
    t} d\Omega \qquad (5.10)$$


    Using the sampling property of the impulse signal, the above expression can be
    simplified as


    $$F^{-1}\{\delta(\Omega)\} = \frac{1}{2\pi} \qquad (5.11)$$


    From the above expression, it is possible to interpret that Fourier transform
    of a constant signal is


    $$1 \leftrightarrow 2\pi\delta(\Omega)$$


    Thus, Fourier transform of a DC signal results in an impulse signal in the frequency
    domain.


    # Experiment 5.7 Computation of Forward CTFT of the Impulse Signal and Inverse
    CTFT of the Resultant Forward CTFT


    This experiment discusses the computation of forward CTFT of the impulse signal
    and inverse CTFT of the resultant forward CTFT. The python code that obtains the
    unit impulse signal spectrum is shown in Fig. 5.10, and the corresponding output
    is in Fig. 5.11.


    # Inferences


    From Fig. 5.11, it is possible to observe that Fourier transform of an impulse
    function is a constant function in the frequency domain. The impulse function
    is a compact function in time domain, whereas its spectrum exists in all frequencies.
    Thus compression in time domain is equivalent to expansion in frequency domain
    and vice versa.'

    # 9.2.2 Fixed-Point Quantization Using Two''s Complement Truncation


    The two''s complement truncation always gives the quantized value less than or
    equal to the original value. Hence, the truncation error is denoted as $\varepsilon_t
    = Q_t(X) - X$. Then, the truncation error is ranging from $-\Delta \leq \varepsilon_t
    \leq 0$. The error resulting from quantization can be modelled as a random variable
    uniformly distributed over the appropriate error range. Hence, the two''s complement
    truncation error can be considered error-free calculations corrupted by additive
    white noise. The mean value of the two''s complement truncation error can be obtained
    as $\mu_{\varepsilon_t} = -\frac{\Delta}{2}$. The variance of the two''s complement
    truncation error is calculated as $\sigma^2_{\varepsilon_t} = \frac{\Delta^2}{12}$.



    # 8.7 Elliptic Filter


    The elliptic filter has an equiripple in both the passband and stopband. It is
    also called as ''Cauer filter''. The elliptic filter gives minimal error between
    the desired and ideal filter response for a given set of error tolerances. The
    elliptical filter maximizes the rate of transition between the frequency response
    passband and stopband, at the expense of equiripple in both bands. Also, it increases
    ringing in the step response.


    The square magnitude response of ''*n*th'' order elliptic filter is given by


    $$|H(j\Omega)|^2 = \frac{1}{1 + \varepsilon^2 R_n^2\left(\xi, \Omega/\Omega_c\right)}
    \quad (8.19)$$


    In the above expression, $R_n$ is the *n*th order elliptic rational function,
    ''$\varepsilon$'' is the ripple factor and ''$\xi$'' is the selectivity factor.
    The ripple factor specifies the passband ripple, and a combination of the ripple
    factor and the selectivity factor specifies the stopband ripple. As the ripple
    in the stopband approaches zero, the filter tends to become Chebyshev Type I filter.
    As the ripple in the passband approaches zero, the filter tends to become Chebyshev
    Type II filter. If both passband and stopband ripples approach zero, then the
    filter tends to become a Butterworth filter. Elliptic filter meets a standard
    magnitude specification with lower filter order than other filter approximations.


    # Experiment 8.25 Design of an Elliptic Lowpass Filter


    This experiment tries to design an elliptic lowpass filter with a passband frequency
    of 5 Hz. Assume the order of the filter is 3, passband ripple is 2 dB and stopband
    attenuation is 30 dB. The python code to design an elliptic lowpass filter is
    shown in Fig. 8.59, and its corresponding simulation result is shown in Fig. 8.60.
    From Fig. 8.59, it is possible to infer that the *signal.ellip* built-in command
    is used here to obtain the numerator and denominator coefficients. After executing
    the python code given in Fig. 8.59, the transfer function of elliptic lowpass
    filter is shown in Fig. 8.60a. This figure confirms that the elliptic filter has
    zeros, and those zeros occur on the imaginary axis. The magnitude response of
    the elliptic lowpass filter is shown in Fig. 8.60b. From this figure, it is possible
    to observe the equiripples in both the passband and stopband.'

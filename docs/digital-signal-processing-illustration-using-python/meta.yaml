    = x^*[-n]$.


    +   10. The basis function of Fourier transform is complex exponential, which
    oscillates for all the time. Fourier transform describes the frequency components
    in the signal averaged over all the time. It is difficult for the Fourier transform
    to represent signals that are localized in time. Fourier transform is not an effective
    tool to analyse non-stationary signals.


    Time localization in Fourier transform can be achieved by windowing the signal
    over which the signal is nearly stationary, which leads to the development of
    short-time Fourier transform (STFT). It can be represented to non-stationary signal
    and gives both time and frequency resolutions. However, the time and frequency
    resolutions are fixed based on the windowing signal.



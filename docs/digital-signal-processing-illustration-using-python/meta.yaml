    # ### 4.5.2 *Time-Invariant and Time-Variant System*


    A DT system is said to be time-invariant or shift-invariant if its input-output
    characteristics do not change with time. This implies time shift of the input
    causes a corresponding shift in the output. This implies that the system response
    is independent of time.


    | Property | Representation | Meaning |

    |----------|---------------|---------|

    | Time shift property | x[n] → [Time-invariant system] → y[n] ⟹ x[n-k] → [Time-invariant
    system] → y[n-k] | Shift in the input signal x[n] by a factor of ''k'' should
    result in shift in the output signal y[n] by the same factor ''k'' |



    # ### 12.1.3 *Mel-Frequency Cepstral Coefficient (MFCC) Feature*


    The step-by-step procedure to compute the MFCC feature is discussed in this section.
    This procedure contains six major steps involved in the computation of MFCC; they
    are (1) pre-emphasis, (2) sampling and windowing, (3) fast Fourier transform (FFT),
    (4) mel filter bank, (5) logarithmic function and (6) discrete cosine transform.
    The block diagram of MFCC computation is depicted in Fig. 12.4.


    # #### 12.1.3.1 Pre-emphasis


    The voice samples are passed through a highpass filter, which is mathematically
    expressed as


    $$y[n] = x[n] - ax[n-1]$$ (12.1)


    where $x[n]$ is the input voice samples, ''$a$'' is the filter constant and it
    takes the value between 0.9 to 1.0 and $y[n]$ denotes the filtered voice samples.
    In this pre-emphasis process, the input voice samples are passed through a highpass
    filter, and the filtered output will emphasize the high-frequency component present
    in the input voice samples.



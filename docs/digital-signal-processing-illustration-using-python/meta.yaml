    The relationship between the input and output of mid-rise uniform quantizer is
    given by


    $$y[n] = Q \times \left(\left\lfloor\frac{x[n]}{Q}\right\rfloor + \frac{1}{2}\right)$$
    (2.8)


    In the above equation, $x[n]$ represents the input signal to be quantized and
    $y[n]$ represents the quantized signal, ''$Q$'' denotes the quantization step
    size and the symbol $\lfloor \rfloor$ denotes flooring operation.



    # Experiment 4.16 BIBO Stability Criterion


    The aim of this experiment is to obtain the given DT system is stable or not.
    The relationship between the input and output of a linear time-invariant discrete-time
    system is given by $y[n] = x[n] + y[n-1]$. The relationship between the input
    and output of the system is given by


    $$y[n] = x[n] + y[n-1]$$


    Taking Z-transform on both sides of the above equation, we get


    $$Y(z) = X(z) + z^{-1}Y(z)$$


    The transfer function of the system is obtained as


    $$H(z) = \frac{Y(z)}{X(z)} = \frac{1}{1-z^{-1}}$$


    The python code, which applies the unit step input signal to the above-mentioned
    system, is given in Fig. 4.34, and the corresponding output is shown in Fig. 4.35.


    # Inference


    The following inferences can be made from this experiment:


    Figure 4.36 shows that the input signal ($x[n]$) is a unit step signal, a bounded
    input signal. By observing the output signal ($y[n]$) is not a bounded signal.
    The output signal is a ramp signal, which is not bounded. This shows that bounded
    input signal to the system does not result in bounded output signal. Hence, the
    system is not BIBO stable.



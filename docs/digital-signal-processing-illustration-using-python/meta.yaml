    $$H(z) = \frac{1}{1 - z^{-1}} \tag{6.2}$$


    # **Step 1:** Magnitude response of the filter


    From the magnitude response of the filter, it is possible to observe the filter
    behaviour at low and high frequencies. The frequency response of the system is
    obtained by substituting $z = e^{j\omega}$ in Eq. (6.2), we get


    $$H(e^{j\omega}) = \frac{1}{1 - e^{-j\omega}} \tag{6.3}$$


    The above equation can be expressed as


    $$H(e^{j\omega}) = \frac{1}{1 - \cos(\omega) + j\sin(\omega)} \tag{6.4}$$


    The magnitude response is obtained as


    $$|H(e^{j\omega})| = \frac{1}{\sqrt{(1 - \cos(\omega))^2 + \sin^2(\omega)}} \tag{6.5}$$


    Upon simplifying the above equation


    $$|H(e^{j\omega})| = \frac{1}{\sqrt{2 - 2\cos(\omega)}} \tag{6.6}$$


    When $\omega = 0$, the magnitude response tends to infinity, and when $\omega
    = \pi$, the magnitude response is given by $|H(e^{j\omega})| = \frac{1}{2}$. The
    filter passes low-frequency components and attenuates high-frequency components.
    The filter behaves like a lowpass filter.


    # **Step 2:** Impulse response of the filter


    The impulse response of the filter is obtained by taking inverse $Z$-transform
    of the transfer function. The impulse response of the filter is given by


    $$h[n] = Z^{-1}\{H(z)\} \tag{6.7}$$


    Upon substituting Eq. (6.2) in Eq. (6.7), we get


    $$h[n] = Z^{-1}\left\{\frac{1}{1 - z^{-1}}\right\} = u[n] \tag{6.8}$$


    The impulse response of the filter is the unit step function. The unit step function
    is not absolutely summable; hence, the filter is not stable.'

    plt.xlabel(''n-->''),plt.ylabel(''Amplitude''),plt.title(''$h_3[n]$''),plt.subplot(2,2,4),

    plt.stem(n,h4),plt.xlabel(''n-->''),plt.ylabel(''Amplitude''),plt.title(''$h_4[n]$'')


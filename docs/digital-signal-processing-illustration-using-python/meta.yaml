  md: '# ## 1.2 Non-stationary Signal


    A stationary signal is one whose statistical characteristics do not change with
    respect to time. If the signal characteristics change with respect to time, then
    it is a non-stationary signal. Example of non-stationary signal is a chirp signal
    whose frequency varies with respect to time. Most of the real-world signals, like
    the alarm sound from the clock or the sound of an ambulance, are non-stationary.
    In this section, few stationary and non-stationary signals are generated.


    # ### Experiment 1.10 Generation of Stationary and Non-stationary Signal


    This experiment deals with the generation of stationary and non-stationary signal.
    The expression for stationary signal is given by


    $$x_1(t) = \sin(2\pi ft)$$ (1.7)


    The above expression generates a sinusoidal signal of specific frequency. The
    expression for non-stationary signal is given by


    $$x_2(t) = \sin\left(2\pi ft^2\right)$$ (1.8)


    The frequency of the signal changes with respect to time; hence, it is considered
    as non-stationary. The python code, which generates the two signals and the corresponding
    output, is shown in Fig. 1.19, and Fig. 1.20.


    ```

    python

    #Stationary and non-stationary signal

    import numpy as np

    import matplotlib.pyplot as plt

    #Step 1: Generation of signals

    t=np.linspace(0,1,1000)

    f=5

    x1=np.sin(2*np.pi*f*t)

    x2=np.sin(2*np.pi*f*t**2)

    #Step 2: Plotting of signals

    plt.subplot(2,1,1),plt.plot(t,x1),plt.xlabel(''Time (t)''),

    plt.ylabel(''Amplitude''),plt.title(''Stationary signal'')

    plt.subplot(2,1,2),plt.plot(t,x2,''r''),plt.xlabel(''Time (t)''),

    plt.ylabel(''Amplitude''),plt.title(''Non-stationary signal'')

    plt.tight_layout()

    ```


    **Fig. 1.19** Python code to generate stationary and non-stationary signal'

    # 4.5 Properties of Discrete-Time System


    The properties of discrete-time system discussed in this section include (1) linearity
    property, (2) time shift property, (3) causality and (4) stability.


    # 4.5.1 Linearity Property


    A discrete-time system is linear if it obeys superposition principle. According
    to the superposition principle, the system should obey both the homogeneity and
    additivity properties. According to the homogeneity property, scaling of the input
    should result in scaling of the output. Both these properties are expressed in
    Table 4.1.


    For a discrete-time system to be linear, the system should be a relaxed system,
    and it should obey superposition principle. For a relaxed system, zero input should
    result in zero output.


    # Experiment 4.13 Testing the Linearity Property of Discrete-Time System


    This experiment tries to check whether the given discrete-time system is a linear
    or nonlinear. The relationship between the input and output of the system is given
    by $y[n] = nx[n]$. For the system to be linear, the response of the system to
    the weighted sum of input is equal to the sum of the weighted responses. The python
    code, which examines whether the given system is linear or not, is given in Fig.
    4.28, and the corresponding output is shown in Fig. 4.29.


    # Inferences


    The following inferences can be made from this experiment:


    From Fig. 4.29, it is possible to observe that the response of the system to the
    weighted sum of input is equal to the sum of the weighted responses. The system
    obeys superposition principle; hence, it is a linear system.



    we get


    $\omega_s = 2\pi\left(\frac{5}{15}\right) = 0.667\pi$


    The corresponding analogue frequencies $\Omega_p$ and $\Omega_s$ are obtained
    using prewarping by using BLT relation as


    $\Omega_p = \frac{2}{T}\tan\left(\frac{\omega_p}{2}\right)$


    Substituting the value of $\omega_p = 0.4\pi$ and $T = 1$ in the above expression,

    # ### 9.2.3 *Fixed-Point Quantization Using Magnitude Truncation*


    Magnitude truncation gives the quantized value less than the original value for
    $X > 0$, and the quantized result is greater than original for $X < 0$. Hence,
    the magnitude truncation error is denoted as $\varepsilon_{\text{mt}} = Q_{\text{mt}}(X)
    - X$.


    Then, the magnitude truncation error is ranging from $-\Delta \leq \varepsilon_{\text{mt}}
    \leq 0$ for $X > 0$ and $0 \leq \varepsilon_{\text{mt}} \leq \Delta$ for $X <
    0$. The mean value of the magnitude truncation error is obtained as 0, and variance
    of the magnitude truncation error is calculated as $\sigma^2_{\varepsilon_{\text{mt}}}
    = \Delta^2/3$. The specific advantage of magnitude truncation lies in its inherent
    capability of limit cycle suppression.'

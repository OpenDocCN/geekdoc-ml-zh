    # ### *Answers to PreLab Questions*


    +   1. Different forms of representation of discrete-time systems are (a) block
    diagram, (b) difference equation, (c) transfer function, (d) impulse response,
    (e) pole-zero plot and (f) state-space.

    2. A discrete-time system is said to be a relaxed system if zero input results
    in zero output. If $x[n] = 0$, then the corresponding output $y[n]$ should be
    zero.

    3. A discrete-time system is linear if it obeys superposition theorem. Superposition
    theorem implies (a) homogeneity property and (b) additivity property. According
    to homogeneity property, scaling of the input results in scaling of the output.
    According to additivity property, the response of the system to sum of inputs
    must be equal to sum of the individual responses. Examples of linear'
  - '[PAGE 515]


    system are as follows: (a) $y[n] = x[-n]$, (b) $y[n] = nx[n]$, (c) $y[n] = Ax[n]$,
    (d) $y[n] = x[Mn]$ and (e) $y[n] = x[n/L]$.


    4. Cascade of two non-linear systems may result in a linear system. For example,
    consider the cascade of two systems as shown below:


    ![](img/d441da6e35a3ccc1cab16d20ab65dda6_515_0.png)


    For system 1: The relationship between the input and output is given by $v[n]
    = \log\{x[n]\}$.


    For system 2: The relationship between the input and output is given by $y[n]
    = \exp\{v[n]\}$.


    It can be observed that both System-1 and System-2 are non-linear system, whereas
    the cascaded system is a linear system. This implies that cascading of two non-linear
    systems need not be always non-linear.


    5. A discrete-time system is causal, if its current output should not depend on
    the future value of the input. A real-world system cannot react to future input;
    hence, they are considered as causal systems.


    6. A system is memory-less if the current output of the system depends on the
    current input. All the memoryless systems are causal. A causal system is non-anticipatory.
    For a causal system, the current output will not depend on the future value of
    the input. For a causal system, the current output depends on the past input.
    If the system output depends on the past input, it is a memoryless system. Hence,
    all memoryless systems are causal, whereas all causal systems are not memoryless.
    For example, $y[n] = Ax[n]$ is a memory less system, which is also causal. Consider
    the system $y[n] = Ax[n] + Bx[n-1]$; the system is causal, whereas it is not memory
    less.


    7. Consider the cascade of two discrete-time time varying system, which is depicted

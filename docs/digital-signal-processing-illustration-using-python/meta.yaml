    # 5.4.3 Discrete-Time Fourier Transform (DTFT)


    Discrete-time Fourier transform is a transformation that maps the discrete-time
    signal into a complex valued function, which is given by


    $$X(e^{j\omega}) = \sum_{n=-\infty}^{\infty} x[n]e^{-j\omega n}$$ (5.48)


    DTFT is a way to represent the frequency content of discrete-time signal. The
    magnitude and phase form of DTFT representation is given by


    $$X(e^{j\omega}) = |X(e^{j\omega})|e^{j\Phi(e^{j\omega})}$$ (5.49)


    In the above expression, |X(e^{jω})| represents the magnitude of DTFT, and Φ(e^{jω})
    represents the phase of DTFT. The magnitude spectrum determines the relative presence
    of a sinusoid in the signal x[n], whereas the phase spectrum determines how the
    sinusoids line up relative to one another to form the signal x[n]. The condition
    for the existence of DTFT is that the signal x[n] should be absolutely summable.
    The signal x[n] is absolutely summable if it obeys the following condition:


    $$\sum_{n=-\infty}^{\infty} |x[n]| < \infty$$ (5.50)


    The expression inverse discrete-time Fourier transform (IDTFT) expression is given
    by


    $$x[n] = \frac{1}{2\pi} \int_{-\pi}^{\pi} X(e^{j\omega})e^{j\omega n} d\omega$$
    (5.51)



  md: '# ### 3.1 Generation of Discrete-Time Signals


    This section deals with the generation of different types of discrete-time signals
    like unit sample signal, unit step signal, unit ramp signal, real and complex
    exponential signals. The following section discusses about different mathematical
    operations that could be performed on discrete-time signals.


    # #### Experiment 3.1 Generation of the Unit Sample Sequence


    The mathematical expression of the unit sample sequence ($\delta[n]$) is given
    by


    $$\delta[n] = \begin{cases} 1, & \text{if } n = 0 \ 0, & \text{Otherwise} \end{cases}$$
    (3.1)


    This experiment discusses the generation of unit sample sequence using ''*if*''
    and ''*else*'' conditions in python platform. The python code to generate unit
    sample sequence using ''*if*'' and ''*else*'' conditions is shown in Fig. 3.1,
    and the corresponding output is shown in Fig. 3.2. The built-in functions used
    in the program are given in Table 3.1.


    # #### Inference


    It is possible to observe that unit sample sequence takes a value of ''1'' at
    ''*n*'' equal to zero and zero at other instances of ''*n*''.


    # #### Experiment 3.2 Generation of Unit Sample Sequence Using the Logical Operation


    This experiment deals with the logical operation used to generate unit sample
    sequence, and the python code for this experiment is shown in Fig. 3.3, and the
    corresponding output is shown in Fig. 3.4.


    # #### Inference


    The statement ($x = (n == 0)$) given in Fig. 3.3 implies that the variable ''*x*''
    takes a value of ''1'' if $n = 0$, and it takes a value of ''0'' for all the other
    values of ''*n*''.


    **Fig. 3.1** Python code to generate unit sample sequence


    ```

    python

    #Python code to generate unit sample sequence

    import numpy as np

    import matplotlib.pyplot as plt

    #Step 1: Generating the sequence

    n=np.arange(-10,11) #Define the x-axis

    x=[1 if i==0 else 0 for i in n] #Unit sample sequence

    #Step 2: Plotting the sequence

    plt.stem(n,x),plt.xlabel(''n-->''),plt.ylabel(''Amplitude''),

    plt.title(''$\delta[n]$'')

    plt.xticks(n)

    ```'

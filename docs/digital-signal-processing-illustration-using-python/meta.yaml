    # 12.2.1.1 Bandpass filter


    The bandpass filter is used to reduce the effect of muscle noise, powerline interference,
    baseline wander and T wave interference. The desirable passband frequency to maximize
    the QRS energy is approximately 5–15 Hz. In this case study, the Butterworth filter
    is used with order 3, and passband frequency [0.5, 15] Hz. Instead of bandpass
    filter, cascaded lowpass and highpass filters may be preferred. Filtering the
    ECG signal, ''butter'' and ''lfilter'' python commands are used here. The python
    code to read the ECG data and noise removal is given in Fig. 12.20, and its corresponding
    output is shown in Fig. 12.21.


    From Fig. 12.21, it is possible to observe that the raw ECG signal has shifted
    the amplitude to 1 mV, whereas the filtered ECG signal amplitude is between −1
    and +1.


    ```


  md: 'From Eq. (5.8), it is possible to interpret that unit impulse contains a component
    at every frequency. Another way to interpret the result is to make up $\delta(t)$;
    one needs infinite number of equal frequency components.


    # (b) Inverse Fourier transform of $\delta(\Omega)$


    The inverse CTFT of $\delta(\Omega)$ is given by


    $$x(t) = \frac{1}{2\pi} \int_{-\infty}^{\infty} X(\Omega)e^{j\Omega t} d\Omega
    \qquad (5.9)$$


    Substituting $X(\Omega) = \delta(\Omega)$ in the above expression, we get


    $$F^{-1}\{\delta(\Omega)\} = \frac{1}{2\pi} \int_{-\infty}^{\infty} \delta(\Omega)e^{j\Omega
    t} d\Omega \qquad (5.10)$$


    Using the sampling property of the impulse signal, the above expression can be
    simplified as


    $$F^{-1}\{\delta(\Omega)\} = \frac{1}{2\pi} \qquad (5.11)$$


    From the above expression, it is possible to interpret that Fourier transform
    of a constant signal is


    $$1 \leftrightarrow 2\pi\delta(\Omega)$$


    Thus, Fourier transform of a DC signal results in an impulse signal in the frequency
    domain.



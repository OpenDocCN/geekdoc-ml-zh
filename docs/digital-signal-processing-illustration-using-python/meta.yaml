    ```

    $$h_{\text{opt}} = R^{-1}p$$ (11.2)

    ```


    The above equation can be expressed as


    ```

    $$h_{\text{opt}} = \frac{p}{R}$$ (11.3)

    ```


    In the above expression, ''$p$'' represents the cross-correlation between desired
    signal and the observed signal, and ''$R$'' represents the autocorrelation of
    the observed signal. Taking Fourier transform on both sides of Eq. (11.3), we
    get


    ```

    $$\text{FT}\{h_{\text{opt}}\} = \frac{\text{FT}\{p\}}{\text{FT}\{R\}}$$ (11.4)

    ```


    According to the Wiener-Khinchin theorem, Fourier transform of autocorrelation
    function gives power spectral density. Using this theorem, Eq. (11.4) is expressed
    as


    ```

    $$H\left(e^{j\omega}\right) = \frac{S_{dx}\left(e^{j\omega}\right)}{S_{xx}\left(e^{j\omega}\right)}$$
    (11.5)

    ```


    In Eq. (11.5), $H(e^{j\omega})$ represents the frequency response of the Wiener
    filter, $S_{dx}(e^{j\omega})$ represents the cross-power spectral density estimation
    between desired and observed signal and $S_{xx}(e^{j\omega})$ represents the power
    spectral density of the observed signal.'

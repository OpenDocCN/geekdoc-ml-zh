    the filter, whereas *E₀(z)* and *E₁(z)* represent the polyphase components of
    *H(z)*. The objective is to prove *y₁[n]* is equal to *y₂[n]*. The filter chosen
    in this illustration is a finite impulse response filter designed using the windowing
    technique.



    # ## 11.2.2 Normalized LMS Algorithm


    The weight updation formula for the normalized LMS algorithm is given by


    $$w[n+1] = w^T[n] + \frac{\beta}{\|x\|^2 + c} e[n] x[n]$$ (11.8)


    where ''$\beta$'' is a positive constant, which controls the convergence speed
    of the algorithm. ''$c$'' is a small regularization parameter; it is added with
    the norm of the signal $x[n]$ to avoid the divide by zero error.'

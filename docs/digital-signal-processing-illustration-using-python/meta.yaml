    # 9.5 Cascade Form of a Higher Order Filters


    The sensitivity reduction to coefficient quantization can be reduced by splitting
    high-order filters into lower-order filters. This cascade form can split the higher-order
    filters into multiple lower-order filters.


    # Experiment 9.10 Verify the Cascade Structure of FIR Filter May Reduce the Quantization
    Effect of FIR Filter


    This experiment explains the concept of the reduction of the quantization effect
    of FIR filter using cascade structure implementation. The higher-order FIR filter
    is decomposed into multiple second-order FIR filters, and those filter''s coefficients
    are quantized with finite precision. The result of the multiple second-order filters
    are combined to get a final output. The final output is always similar to the
    infinite precision result of the higher-order FIR filter. The python code to verify
    this experiment is given in Fig. 9.19, and the corresponding simulation result
    is displayed in Fig. 9.20. From Fig. 9.19, the ''*signal.tf2sos*'' python command
    is used here to decompose the higher-order filter into multiple second-order filters.


    The command ''*signal.sos2tf*'' is used here to convert the multiple second-order
    filters into higher-order ones.


    # Inferences


    The following inferences can be made from Fig. 9.20:


    +   1. The frequency response of the infinite precision FIR filter coefficients
    and finite precision (*N* = 8 bits) FIR filter coefficients are not the same.


    +   2. However, the frequency response of the cascade realization filter with
    finite precision looks similar to the original one.


    +   3. From this experiment, it is possible to confirm that the effect of quantization
    of the FIR filter can be reduced with the help of cascade realization. In the
    cascade realization, the higher-order filter is decomposed into multiple second-order
    filters, and these lower-order filters are quantized with finite precision. Finally,
    all these quantized filter coefficients are combined to get a higher-order filter.


    +   4. Note that the number of bits (*N* = 8) used to represent the higher-order
    filter is the same as for the lower-order filters.


    +   5. This realization will help when the hardware is limited in the length of
    the registers. For example, the hardware is an 8-bit register length, and to represent
    the filter coefficients, it needs more than 8 bits. Then, the cascade realization
    will help to represent all the filter coefficients with 8-bit precision.'

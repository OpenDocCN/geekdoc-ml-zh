    ![](img/d441da6e35a3ccc1cab16d20ab65dda6_515_1.png)


    System 1: The system performs upsampling of the input signal by a factor of 2.
    The relationship between the input and output of the system is given by $v[n]
    = x[n/2]$. Upsampling by a factor of 2 is a time-varying system.


    System 2: System 2 performs downsampling of the input signal by a factor of 2.
    The relationship between the input and output of the system is given by $y[n]
    = v[2n]$. Downsampling by a factor of 2 is a time-varying system.


    Cascaded system: Cascading of upsampling by a factor of 2 followed by downsampling
    of two is an identity system. Thus, the cascaded system is a time-invariant system.'

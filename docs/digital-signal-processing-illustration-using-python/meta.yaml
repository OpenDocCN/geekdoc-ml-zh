    \ Narrower | Lower |\n| 4 | Elliptic filter | YES | YES | Narrowest | Lowest |\n\
    \n+   9. The drawbacks of impulse invariant technique are listed below:\n   (a)\
    \ It is more suitable for all pole filters and does not consider the system's\
    \ zeros.\n   (b) The mapping of analogue frequency 'Ω' to digital frequency 'ω'\
    \ is 'many-to-one'; hence, aliasing problem exists.\n   (c) Due to the presence\
    \ of aliasing, the impulse invariant method is appropriate for the design of lowpass\
    \ and bandpass filters only. It is not a suitable technique for the design of\
    \ highpass and band reject filters.\n\n10. The bilinear transformation is a conformal\
    \ mapping that maps the 'jΩ' axis of the S-plane into the unit circle of the Z-plane\
    \ only once. Therefore, it can avoid aliasing problems.\n\n11. The bilinear transformation\
    \ technique maps the analogue frequency and digital frequency in a non-linear\
    \ fashion. The relationship between the analogue and digital frequency is given\
    \ by $\\omega = 2\\tan^{-1}\\left(\\frac{\\Omega T}{2}\\right)$. The non-linear\
    \ relationship between analogue and digital frequency is termed as 'frequency\
    \ warping'. To overcome the frequency warping problem, 'prewarping' technique\
    \ is used. Prewarping will preserve the edge frequencies but not the exact shape\
    \ of the magnitude response.\n\n12. Comparison of different types of IIR filter\
    \ is given in Table A.2\n\n+   13. The following steps are involved in the IIR\
    \ filter design:\n    **Step 1**: Convert the digital filter specifications into\
    \ an equivalent analogue filter specification.\n    **Step 2**: Convert the analogue\
    \ filter specifications to normalized lowpass prototype specifications.\n    **Step\

    sub1.set_xlabel(''Frequency [Hz]'', fontsize=15),sub1.set_ylabel(''Magnitude [dB]'',
    fontsize=15)

    sub1.grid()

    # Plot phase angle

    sub2 = plt.subplot(2, 1, 2)

    Phase = np.unwrap(np.angle(hz))*180/np.pi # Calculate phase angle in degree from

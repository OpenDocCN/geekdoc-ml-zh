    # ### 10.4.1 Two-Channel Filter Bank


    Two-channel filter bank has two sections, namely, (1) analysis section and (2)
    synthesis section, which is depicted in Fig. [10.28](image). The input signal
    fed into the two-channel filter bank is $x[n]$, and the output signal received
    from the two-channel filter bank is $y[n]$. The channel represents the medium
    through which the data is transmitted. In Fig. [10.28](image), the filters in
    the analysis section are represented as $H_0(z)$ and $H_1(z)$. If $H_0(z)$ represents
    the lowpass filter, then $H_1(z)$ represents the highpass filter. The corresponding
    filters in the synthesis section are $G_0(z)$ and $G_1(z)$, respectively.'

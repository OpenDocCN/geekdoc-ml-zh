    on the voice samples. Also, sometimes it reflects the state of mind of the speaker.
    The voice recognition method uses some of the information in the voice and identifies
    the speaker. Voice recognition is a technique that detects a voice sample from
    unique properties that may be acoustic or phonetic.


    The general block diagram of speech recognition system contains feature extraction,
    speaker modelling and pattern matching method to identify the speaker, which is
    illustrated in Fig. 12.1. In the first stage, a speech sample is considered an
    input to the system. Here the speech sample would be noise-free; to remove the
    noise components in the speech signal, preprocessing method can be used. The preprocessed
    speech signal is the input to the feature extraction process in the second stage
    of the system. Using the feature extraction approaches, some properties of speech,

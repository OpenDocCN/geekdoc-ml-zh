    # 4.4 Different Representations and Response of Unit Delay Discrete-Time System


    Consider a discrete-time system, which introduces unit delay between the input
    and output signal. The different representations of unit delay system are discussed
    first.


    (a) **Block diagram representation**


    The block diagram, which represents unit delay system, is given in Fig. [4.24](link).


    (b) **Transfer function representation**


    The transfer function representation of unit delay system is given by


    $$H(z) = z^{-1}$$ (4.25)


    (c) **Impulse response of unit delay system**


    The impulse response of discrete-time system is obtained by taking inverse Z-transform
    of the transfer function. It is given by'

    ### 1.1 连续时间信号


    信号是对应于随时间、空间等变化的物理量。信号在数学上表示为一个或多个自变量的函数。连续时间信号定义在自变量的连续取值范围内。连续时间信号通常表示为 *x(t)*。作为时间函数的语音信号就是连续时间信号的一个例子。信号可以是确定性的或随机的。确定性信号可以用数学函数或表达式描述。在本章中，目标是生成不同类型的连续时间周期信号，如正弦信号、复指数信号、方波等；非平稳信号，如
    chirp 信号；标准测试信号，如 Dirac delta、单位阶跃信号等。


    #### 1.1.1 连续时间周期信号


    周期信号是指以相同方式重复自身的信号。连续时间周期信号的例子包括正弦信号、复指数信号、方波和锯齿波。在本节中，开发了 Python 代码来生成正弦信号、三相正弦信号、复指数信号等。此外，正弦函数是线性系统的特征函数。连续时间正弦信号由幅度、频率和相位描述。不同频率的连续时间正弦信号总是互不相同的。


    **实验 1.1 正弦信号的生成**


    本实验的目标是生成正弦信号。正弦信号是基于正弦或余弦函数的周期函数。正弦信号的表达式为


    $$x(t) = A \sin(2\pi f t + \phi)$$ (1.1)


    在上述方程中，''A'' 表示信号的幅度，''f'' 表示信号的频率，''$\phi$'' 表示信号的相位。要生成正弦信号，需要定义三个参数：幅度、频率和相位。自变量是"时间（t）"。在幅度调制中，载波的幅度随消息信号变化，而频率和相位保持不变。在频率调制中，载波的频率随信号变化，而幅度和相位保持不变。在相位调制中，载波的相位随信号变化，而幅度和频率保持不变。


    生成正弦信号的步骤总结如下：


    - **步骤 1**：定义自变量


    使用内置函数 ''*np.linspace()*'' 生成自变量，即时间轴。


    - **步骤 2**：定义正弦波的参数


    在此步骤中，定义正弦波的三个参数，即幅度、频率和相位。


    - **步骤 3**：生成正弦信号


    在此步骤中，生成正弦波的数学表达式为


    | 序号 | 使用的内置函数 | 用途 |

    |--------|------------------------|---------|

    | 1 | np.sin() | 生成正弦函数 |

    | 2 | np.linspace() | 在区间内生成等间隔数据点 |

    | 3 | plt.subplot() | 在同一图中绘制多个图形 |


    ```

    python

    #实验 1：正弦信号的生成

    import numpy as np

    import matplotlib.pyplot as plt

    #步骤 1：定义自变量

    t=np.linspace(0,1,1000)

    #步骤 2：定义正弦波的参数

    A=5 #正弦波的幅度

    f=5 #正弦波的频率

    ph=0 #正弦波的相位

    #步骤 3：正弦波的表达式

    x=A*np.sin(2*np.pi*f*t+ph)

    #步骤 4：绘制正弦波

    plt.plot(t,x),plt.xlabel(''Time''),plt.ylabel(''Amplitude'')

    plt.title(''A={}V,F={} Hz,$\phi={}^\circ$''.format(A,f,ph))

    ```


    图 1.1 生成正弦信号的 Python 代码


    $$x(t) = A \sin(2\pi f t + \phi)$$


    **步骤 4：绘制正弦信号**


    使用内置函数 *plt.plot()* 绘制生成的信号。绘制波形时，重要的是使用 *plt.xlabel()* 和 *plt.ylabel()* 命令标注
    *x* 轴和 *y* 轴的标签。使用 *plt.title()* 命令显示图的标题。


    **内置库**


    程序中使用的内置库有（1）Numpy 和（2）Matplotlib。*''numpy''* 是一个通用数组处理包。在本程序中，numpy 库用于创建数组（*np.linspace*），并用于执行数学函数（*np.sin*）。Matplotlib
    是一个数据可视化库，用于可视化生成的正弦信号。程序中使用的内置函数见表 1.1。



    sub2.set_xlabel(r''Frequency (Hz)'', fontsize=15),sub2.set_title(r''Phase response'',
    fontsize=15)

    sub2.grid(),plt.subplots_adjust(hspace=0.5),fig.tight_layout(),plt.show()


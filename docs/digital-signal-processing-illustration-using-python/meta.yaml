  md: '# ## 12.3 Case Study 3: Power Quality Disturbance Detection


    Power quality refers to maintaining a sinusoidal power distribution bus voltage
    at rated magnitude and frequency. The significant increase in non-linear load
    and the increased usage of semiconductor devices, lighting controls, solid-state
    switching devices, inverters and relaying equipment are causing non-linear loads,
    which lead to power quality disturbances. The basic power quality disturbances
    (PQD) are voltage sag, voltage swell, voltage interruption, harmonics, flickers,
    etc. A combination of these disturbances can occur simultaneously. Table 12.1
    summarizes the causes and impact of power quality disturbances.


    Effective detection and recognition of power quality disturbances are necessary
    to ensure the reliability of electric power quality. This section focuses on the
    simulation of the power quality disturbance and analysis of power quality disturbance
    signals, which is depicted in Fig. 12.27.


    The first step in this direction is to generate different types of power quality
    disturbances. Mathematical models can be developed for different types of power


    | S. No. | Power quality disturbance | Causes | Effects |

    |--------|---------------------------|--------|---------|

    | 1 | Voltage sag | 1. Inductive load<br>2. Switching on and off of large loads
    | 1. Tripping of sensitive equipment<br>2. Tripping of motors |

    | 2 | Voltage swell | 1. Capacitor switching<br>2. Switch off large loads | 1.
    Damage to insulation and windings<br>2. Damage to power supplies |

    | 3 | Harmonics | 1. Non-linear loads<br>2. Rectifier type equipment | 1. Malfunctioning
    of relays and equipment<br>2. Capacitor failure |

    | 4 | Momentary interruption | 1. Equipment failure<br>2. Control malfunction
    | 1. Loss of supply voltage to consumer equipment<br>2. Shutdown of computers
    |

    | 5 | Flicker | 1. Machinery with rapid fluctuations in load current or voltage<br>2.
    Loads that cause voltage fluctuation include arc welding machines, arc furnaces,
    etc. | 1. Misoperation of relays and contactors<br>2. Neurological problems in
    humans |


    ![](img/d441da6e35a3ccc1cab16d20ab65dda6_499_0.png)



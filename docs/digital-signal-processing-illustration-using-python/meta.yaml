    # ## 6.7 Comb Filter


    A comb filter is a notch filter with a number of equally spaced nulls. The block
    diagram representing the comb filter is shown in Fig. 6.23.


    The relationship between the input and output of the comb filter is expressed
    as


    ```

    $$y[n] = x[n] + x[n - L] \tag{6.27}$$

    ```


    Taking Z-transform on both sides of the above equation, we get


    ```

    $$Y(z) = X(z) + z^{-L}X(z) \tag{6.28}$$

    ```


    The above equation can be expressed as


    ```

    $$Y(z) = X(z)\left[1 + z^{-L}\right]$$

    ```


    The transfer function can be expressed as'

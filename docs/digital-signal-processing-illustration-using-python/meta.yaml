    training and testing of the speech recognition model is developed, which will
    give the final decision of the system (i.e.,) which speech belongs to whom.


    # ### 12.1.1 *Speaker Identification*


    The process of identifying a speaker''s voice from a group of speakers is called
    speaker identification. In this process, the voice of the input speaker is verified

    # ### 6.4 Digital Resonator


    A resonator is designed to have its strongest response to match certain input
    signal. Resonators find application in communication receivers, AM/FM demodulators,
    etc. A digital resonator is a two-pole bandpass filter with a pair of complex-conjugate
    poles near the unit circle to create a resonant peak at the desired frequency.
    The digital resonator has a large magnitude response in the vicinity of the pole
    location. If one pole is located at $p_1 = re^{j\omega}$, then the other pole
    will be at $p_2 = re^{-j\omega}$, where $0 < r < 1$. The expression for the transfer
    function of the system is given by


    $$H(z) = \frac{1}{(1-p_1z^{-1})(1-p_2z^{-1})}$$ (6.19)


    Substituting $p_1 = re^{j\omega}$ and $p_2 = re^{-j\omega}$ in the above expression,
    we get


    $$H(z) = \frac{1}{(1-re^{j\omega}z^{-1})(1-re^{-j\omega}z^{-1})}$$


    Simplifying the above expression, we get


    $$H(z) = \frac{1}{1-re^{-j\omega}z^{-1}-re^{j\omega}z^{-1}+r^2z^{-2}}$$


    The above equation can be expressed as


    $$H(z) = \frac{1}{1-rz^{-1}[e^{-j\omega}+e^{j\omega}]+r^2z^{-2}}$$


    Simplifying the above equation, we get


    $$H(z) = \frac{1}{1-2rz^{-1}\cos(\omega)+r^2z^{-2}}$$ (6.20)


    # **Experiment 6.7 Digital Resonator**



    \n# **Chapter 8: Infinite Impulse Response Filter**\n\n# *Answers to PreLab Questions*\n\
    \n+   1. In a recursive filter, the present output depends on both the inputs\
    \ and previously calculated outputs.\n2. The IIR filter is a recursive filter.\
    \ The present output of the IIR filter depends on input and past output. Hence,\
    \ the IIR filter is a recursive filter.\n3. Ripple is the fluctuations in the\
    \ passband or stopband of the filter's frequency response. It is expressed in\
    \ decibels.\n4. Based on the ripples in the frequency response of the IIR filter,\
    \ the filters are classified as (a) Butterworth filter, (b) Chebyshev filter (Type\
    \ I), (c) inverse Chebyshev filter (Type II) and (d) elliptic filter.\n5. The\
    \ Butterworth filter's magnitude response is monotonically decreased at all frequencies,\
    \ and also, there are no local maxima or minima in both the passband and stopband.\
    \ Hence, it is also called as flat-flat filters.\n6. Mapping is a technique used\
    \ in IIR filter design for converting analogue filter into digital filter. The\
    \ different types of mapping techniques are (a) backward difference method, (b)\
    \ impulse invariant technique (IIT), (c) bilinear transformation technique (BLT)\
    \ and (d) matched Z-transformtechnique.\n7. While converting an analogue filter\
    \ into an equivalent digital filter, it is necessary that stable analogue filter\
    \ should be mapped to a stable digital filter. The points of the analogue filter\
    \ in the left half *S*-plane must be mapped into inside the unit circle in the\
    \ *Z*-plane to preserve the stability of the filter. Therefore, all the mapping\
    \ techniques must preserve the stability of the filter.\n8. The steps involved\
    \ in obtaining the transfer function of a digital filter using the impulse invariant\
    \ technique are summarized below:\n    (a) Obtain the transfer function of an\
    \ analogue filter (*H(s)*), which has to be converted into an equivalent digital\
    \ filter (*H(z)*).\n    (b) From the analogue transfer function*H(s)*, get the\
    \ impulse response *h(t)* using the inverse Laplace transform.\n    (c) Apply\
    \ the sampling process on impulse response *h(t)* to get *h[nT]*.\n    (d) Take\
    \ Z-transform of the sampled impulse response *h[nT]* to get the equivalent transfer\
    \ function*H(z)*."
  - "[PAGE 523]\n\n| S. no. | Type of IIR filter | Ripple in passband | Ripple in\
    \ stopband | Transition width | Order of the filter to meet the given specification\
    \ |\n|--------|-------------------|-------------------|-------------------|-----------------|---------------------------------------------------|\n\
    | 1 | Butterworth filter | NO | NO | Widest | Highest |\n| 2 | Chebyshev filter\

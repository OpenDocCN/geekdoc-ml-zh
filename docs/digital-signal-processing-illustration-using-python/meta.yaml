    # ## 8.6 Chebyshev Type II IIR Filter


    The Chebyshev Type II IIR filter has an equiripple in stopband and monotonic response
    in passband, which is inverse of Chebyshev Type I IIR filter; hence, it is also
    called as ''inverse Chebyshev filter''. Two-step procedures can obtain the frequency
    response of this filter. In the first step, subtract the frequency response of
    Chebyshev Type I filter ($H(\omega)$) from 1, which is illustrated in Fig. 8.52.
    In the second step, convert the $\omega$ by $\frac{1}{\omega}$. This result will
    give the frequency response of Chebyshev Type II IIR filter, which is shown in
    Fig. 8.53.


    From Fig. 8.53, it is possible to observe that the frequency response has monotonic
    in the passband and an equiripple in the stop band.


    Using the two step procedures, the mathematical expression for the frequency response
    of the Chebyshev Type II filter can be written as


    $$H(\Omega) = 1 - \frac{1}{1 + \varepsilon^2 T_N^2(1/\Omega)} \qquad (8.17)$$


    Simplifying the above expression, we get


    $$H(\Omega) = \varepsilon^2 T_N^2\left(\frac{1/\Omega}{1 + \varepsilon^2 T_N^2(1/\Omega)}\right)
    \qquad (8.18)$$


    From the above expression, it is possible to understand that the Chebyshev Type
    II filter has zeros as the numerator, and all the zeros lie on the imaginary axis.'

    # Experiment 7.7 Comparison of Ideal and Practical Lowpass Filter


    The impulse response of an ideal filter is non-causal; hence, it is not physically
    realizable. To design a practical filter, the impulse response of the ideal filter
    has to be delayed to make it causal. Delay in the time-domain is accomplished
    by multiplying the spectrum with a complex exponential. The magnitude response
    is multiplied by $e^{-j\omega\tau}$, which results in the time shift of the impulse
    response.



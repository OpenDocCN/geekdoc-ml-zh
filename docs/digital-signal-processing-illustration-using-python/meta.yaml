    print(''Input Sequence x[n]: '', x)

    y=np.sum((np.abs(x)**2))

    print(''\u03A3|x[n]|^2: '', y)

    Y1=np.dot(D,x) # DFT Computation

    print(''DFT output X[k]: '', Y1)

    Y=np.sum((np.abs(Y1)**2))/N

    print(''\u03A3|X[k]|^2: '', Y)

    ```



  md: '# Vibration signal acquisition


    The most commonly employed sensor is accelerometer which measures vibration acceleration
    (usually measured in *g*). The other sensor options are proximity sensors and
    velocity transducers which record vibration displacement and velocity, respectively.
    The output from the vibration sensor is a continuous analog signal which is digitized
    for digital storage in a computer. Therefore, a pertinent aspect during vibration
    signal acquisition relates to the sampling frequency (*f_s*) which is the frequency
    at which the vibration signal is sampled. For example, let *f_s* = 100 samples/s
    or 100 Hz; this implies that data is collected at equal intervals of 0.01 seconds.
    Judicious selection of *f_s* is very critical. To see why, consider the illustration
    below.


    ![](img/cfcc9569b5e92ea115855752abddd75a_308_0.png)


    In the above illustration, the sampled signal does not resemble the original signal!
    There is a theorem called Nyquist sampling theorem which states that for a sampling
    frequency *f_s*, original signals will be collected correctly only up to frequency
    *f_s*/2. Correspondingly, the frequency *f_s*/2 is known as Nyquist frequency
    (*f_q*). For the above illustration, to be able to correctly capture 1 Hz vibration,
    *f_s* must be 2 Hz (2 samples per second) which as shown below does work nicely.


    ![](img/cfcc9569b5e92ea115855752abddd75a_308_1.png)


    The phenomenon of an original high frequency signal appearing as a low frequency
    signal due to undersampling is called aliasing. This is undesirable and therefore,
    during vibration signal acquisition, anti-aliasing filters are frequently employed
    to filter out components with frequencies higher than *f_q*.'
  merge: -1
  pgno: 308

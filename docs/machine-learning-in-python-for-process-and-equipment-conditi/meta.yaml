  md: 'A popular approach for determining the number of PCs to retain is to select
    the number of PCs that cumulatively capture atleast 90% (or 95%) of the variance.
    The captured variance threshold should be guided by the expected level of noise
    or non-systematic variation that you do not expect to be captured. Alternative
    methods include cross-validation, scree tests, AIC criterion, etc. However, none
    of these methods are universally best in all the situations.


    ```

    # decide # of PCs to retain and compute reduced data in PC space

    n_comp = np.argmax(cum_explained_variance >= 90) + 1

    score_train_reduced = score_train[:,0:n_comp]


    >>> print(''Number of PCs cumulatively explaining atleast 90% variance: '', n_comp)


    Number of PCs cumulatively explaining atleast 90% variance: 13

    ```


    Thus, we have achieved ~60% reduction in dimensionality (from 33 to 13) by sacrificing
    just 10% of the information. To confirm that only about 10% of the original information
    has been lost, we will reconstruct the original normalized data from the scores.
    Figure 7.4 provides a visual confirmation as well where it is apparent that the
    systematic trends in variables have been reconstructed while noisy fluctuations
    have been removed.


    ```

    # confirm that only about 10% of original information is lost

    from sklearn.metrics import r2_score


    V_matrix = pca.components_.T

    P_matrix = V_matrix[:,0:n_comp]


    data_train_normal_reconstruct = np.dot(score_train_reduced, P_matrix.T)

    R2_score = r2_score(data_train_normal, data_train_normal_reconstruct)


    >>> print(''% information lost = '', 100*(1-R2_score))


    % information lost = 9.0469

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_114_0.png)'

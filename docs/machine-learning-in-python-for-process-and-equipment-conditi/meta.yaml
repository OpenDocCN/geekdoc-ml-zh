  md: '# Simple linear classification illustration


    We will use the toy dataset in Figure 12.1 to illustrate SVM-based classifier
    modeling in Sklearn.


    ```

    # read data

    import numpy as np

    data = np.loadtxt(''toyDataset.csv'', delimiter='','')

    X = data[:, [0, 1]]; y = data[:, 2]


    # scale model inputs

    from sklearn.preprocessing import StandardScaler

    scaler = StandardScaler()

    X_scaled = scaler.fit_transform(X)


    # fit SVM model

    from sklearn.svm import SVC # for large datasets LinearSVC class is preferable

    model = SVC(kernel=''linear'', C=100)

    model.fit(X_scaled, y)


    # get details of support vectors

    print(''# of support vectors:'', len(model.support_))


    >> # of support vectors: 3

    ```


    The above code provides us the optimal separating boundary shown in Figure 12.1<sup>81</sup>.
    As with other Sklearn estimators, predict() method can be used to predict the
    class of any test observation. We will soon cover the hyperparameters (kernel
    and C) used in the above code.


    # Hard margin vs soft margin classification


    The toy dataset represents an ideal data where all the training samples can be
    correctly classified via a linear boundary. However, in real-life, some data impurities
    always creep in as shown in Figure 12.2. Our SVM formulation (in Eq. 1) will fail
    to find a solution in this case.'
  merge: -1
  pgno: 218
- img_proc: true
  md: '![](img/cfcc9569b5e92ea115855752abddd75a_219_0.png)


    Figure 12.2: Presence of the shown bad sample makes perfect linear separation
    infeasible


    To deal with such scenarios, we add a little flexibility into our SVM optimization
    program by modifying the constraints as shown below


    $$w^T x_i + b \geq 1 - \xi_i \quad \text{for } y_i = 1$$

    $$w^T x_i + b \leq -1 + \xi_i \quad \text{for } y_i = -1$$


    Here, we use slack variables ($\xi_i$) to allow each sample the freedom to end
    up on the wrong side of the support plane and potentially be misclassified during
    model fitting. However, we would like to keep the number of such violations low
    as well which we can achieve by penalizing the violations. The revised SVM formulation
    looks like this


    $$\min_{w,b,\xi} \quad \frac{1}{2}||w||^2 + C \sum_{i=1}^N \xi_i$$

    $$\text{s.t.} \quad y_i(w^T x_i + b) \geq 1 - \xi_i, \quad i = 1, \cdots N$$

    $$\xi_i \geq 0$$


    *eq. 2*


    The above formulation is called soft margin classification (as opposed to the
    previous hard margin classification). Sklearn implements soft margin formulation.
    The positive constant, $C$, is a hyperparameter (C=1 in Sklearn by default) and
    corresponds to the hyperparameter we saw in the previous code. For our toy dataset
    2 (in Figure 12.2), with the previously shown code, we end up with the same separating
    boundary as shown in Figure 12.1. Class prediction expression remains the same
    as $\hat{y}_t = sign(w^T x_t + b)$.


    # C as regularization hyperparameter


    The slack variables not only help find a solution in the presence of gross impurity,
    but they also help to avoid overfitting noisy data. For example, consider the
    scenario in Figure 12.3. If no misclassifications are allowed, we end up with
    a very small margin, while with a single'
  merge: -1
  pgno: 219
- img_proc: true
  md: 'misclassification we get a much better margin with potentially better generalization.
    Therefore, we see that there is a trade-off between margin maximization and training
    accuracy.


    ![](img/cfcc9569b5e92ea115855752abddd75a_220_0.png)


    The hyperparameter C is the knob to control the trade-off. A large value of C
    implies heavy penalization of the constraint violations which will prevent misclassifications,
    while small value of C allows more misclassifications during model fitting for
    better margin.


    # 12.2 The Kernel Trick for Nonlinear Data


    While soft margin classification formulation is quite flexible, it won’t work
    for nonlinear classification problems where curved boundaries are warranted. Consider
    the dataset in Figure 12.4. It is clear that a linear boundary is inappropriate
    here.


    ![](img/cfcc9569b5e92ea115855752abddd75a_220_1.png)


    However, all is not lost here. One idea to circumvent this issue is to map the
    original input variables/features into a higher dimensional space where they become
    linearly separable. For the data in Figure 12.4, the following transformation
    would work quite well'
  merge: -1
  pgno: 220
- img_proc: true
  md: '$\varphi(x) = \varphi(x_1, x_2) = [z_1, z_2, z_3] = [x_1, x_2, x_1^2 + x_2^2]$


    As we can see in Figure 12.5, the data is easily linearly separable in the 3D
    space!


    ![](img/cfcc9569b5e92ea115855752abddd75a_221_0.png)


    SVM can be trained on the new feature space to obtain the optimal separating hyperplane.
    Any new test data point can be transformed via the same mapping function, $\varphi$,
    for its class determination via the fitted SVM model. While this solution looks
    great, there remains a small issue. How do we find an appropriate mapping for
    a high-dimensional input dataset? As it turns out, you don''t need to find this
    mapping explicitly and this is made possible by a neat ''kernel trick''. Yes,
    the same kernel trick that we saw in Chapter 10! To see how kernels show up in
    SVM formulation, we will revisit the mathematical background of SVMs.


    # Mathematical background (revisited)


    SVMs are not solved in the form shown in Eq. 2. Instead, the following equivalent
    form is solved


    $$\min_{\alpha} \quad \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N \alpha_i \alpha_j
    y_i y_j x_i^T x_j - \sum_{i=1}^N \alpha_i \quad \text{eq. 3}$$

    $$\text{s.t.} \quad \sum_{i=1}^N y_i \alpha_i = 0$$

    $$0 \le \alpha_i \le C \quad i = 1, \cdots N$$


    Here, the optimization parameters $w, b$ have been replaced by $\alpha_s$ (also
    called Lagrange multipliers). This equivalent form is called dual form (which
    you may remember from your optimization classes; it''s perfectly fine if you have
    not encountered this term before). Once $\alpha_s$ have been found, $w$ and $b$
    can be computed via the following'
  merge: -1
  pgno: 221
- img_proc: true
  md: '$$w = \sum_{i=1}^{N} \alpha_i y_i x_i, \quad b = \frac{1}{N_s} \sum_{i \in
    \{SV\}} 1 - y_i w^T x_i$$


    where $N_s$ is number of support vectors and $\{SV\}$ is the set of support vector
    indices. Any test data point can be classified as


    $$\hat{y}_t = sign(\sum_{i=1}^{N} \alpha_i y_i x_i^T x_t + b) \quad \text{eq.
    4}$$


    In the dual formulation, it is found that $\alpha_s$ are non-zero for only the
    support vectors and zero for the rest of the training samples. This implies that
    Eq. 4 can be reduced to


    $$\hat{y}_t = sign(\sum_{i \in \{SV\}} \alpha_i y_i x_i^T x_t + b) \quad \text{eq.
    5}$$


    > Strictly speaking, support vectors need not lie on the separating hyperplane.
    For soft margin classification, data-points with non-zero slacks are also support
    vectors and their $\alpha_s$ are non-zero (defining characteristic of the support
    vectors). The presence/absence of the support vectors impacts the solution (the
    objective function and/or the model parameters).


    At this point, you may be wondering why have we made things more complicated;
    why not solve the problem in the original form (Eq. 2) which seemed more interpretable?
    The reason for doing this will become clear to you very soon. For now, imagine
    that you are solving the nonlinear problem where SVM finds a separating hyperplane
    in the higher dimension. Eq. 3 will look like the following


    $$\min_{\alpha} \quad \frac{1}{2} \sum_{i=1}^{N} \sum_{j=1}^{N} \alpha_i \alpha_j
    y_i y_j \varphi(x_i)^T \varphi(x_j) - \sum_{i=1}^{N} \alpha_i \quad \text{eq.
    6}$$

    $$\text{s.t.} \quad \sum_{i=1}^{N} y_i \alpha_i = 0$$

    $$0 \leq \alpha_i \leq C \quad i = 1, \cdots N$$


    and Eq. 5 becomes


    $$\hat{y}_t = sign(\sum_{i \in \{SV\}} \alpha_i y_i \varphi(x_i)^T \varphi(x_j)
    + b) \quad \text{eq. 7}$$


    The most crucial observation here is that the transformed variables ($\varphi(x)$)
    appear only as inner (dot) products. This allows us to use the kernel trick. Once
    a kernel function is chosen, Eq. 6 becomes'
  merge: -1
  pgno: 222
- img_proc: true
  md: '$$\min_{\alpha} \quad \frac{1}{2} \sum_{i=1}^{N} \sum_{j=1}^{N} \alpha_i \alpha_j
    y_i y_j k(x_i, x_j) - \sum_{i=1}^{N} \alpha_i$$

    $$\text{s.t.} \quad \sum_{i=1}^{N} y_i \alpha_i = 0$$

    $$0 \le \alpha_i \le C \quad i = 1, \cdots N$$


    $$\text{eq. 8}$$


    Above is the form in which a SVM model is fitted and predictions are made as follows


    $$\hat{y}_t = sign(\sum_{i \in \{SV\}} \alpha_i y_i k(x_i, x_t) + b)$$


    $$\text{eq. 9}$$


    Like in KPCA and KPLS, usage of kernel functions allows us to obtain powerful
    nonlinear classifiers while retaining all the benefits of the original linear
    SVM method!


    # Sklearn implementation of support vector classifier


    Let''s try to find the nonlinear classifier boundary for the toy dataset in Figure
    12.4 using gaussian kernel. We will also find optimal values of $C$ and $\sigma$
    via grid-search and cross-validation.


    ```

    # generate data

    from sklearn.datasets import make_circles

    X, y = make_circles(500, factor=.08, noise=.1, random_state=1)

    # note that y = 0,1 here and need not be ±1; SVM does internal transformation
    accordingly

    ```


    ```


    \    \"\"\"\n    This function generates list of LSTM samples (numpy arrays of\
    \ size (nSequenceSteps, 24)\n    each) for LSTM input and list of output labels\
    \ for LSTM\n    \"\"\"\n    engine_X_train_sequence = []\n    engine_y_train_sequence\
    \ = []\n    engine_data = engine_df.values # converting to numpy\n\n    for sample\
    \ in range(nSequenceSteps, engine_data.shape[0]):\n        engine_X_train_sequence.append(engine_data[sample-nSequenceSteps:sample,\
    \ :-1]) # last column is output label\n        engine_y_train_sequence.append(engine_data[sample,-1])\n\
    \n    return engine_X_train_sequence, engine_y_train_sequence\n\n# generate sequence\
    \ samples\nfor engineID in train_df_scaled['EngineID'].unique():\n    engine_df\
    \ = train_df_scaled[train_df_scaled['EngineID'] == engineID]\n    engine_df =\
    \ engine_df[['OPsetting1', 'OPsetting2', 'OPsetting3', 's1', 's2', 's3', 's4',\
    \ 's5', 's6', 's7',\n                          's8', 's9', 's10', 's11', 's12',\
    \ 's13', 's14', 's15', 's16', 's17', 's18', 's19', 's20',\n                  \
    \        's21', 'engineRUL']]\n    engine_X_train_sequence, engine_y_train_sequence\
    \ = generate_LSTM_samples(engine_df,\n                                       \
    \                                     nSequenceSteps)\n    X_train_sequence =\
    \ X_train_sequence + engine_X_train_sequence # adding samples to the\n       \
    \                                                             common list\n  \
    \  y_train_sequence = y_train_sequence + engine_y_train_sequence\n\nX_train_sequence,\
    \ y_train_sequence = np.array(X_train_sequence), np.array(y_train_sequence)\n\
    ```\n\nWe are now ready to build and compile our RNN. The topology includes a\
    \ single neuron output layer with linear activation function. For regularization,\
    \ we utilize the dropout technique.\n\n```python\n# import ANN packages\nfrom\
    \ tensorflow.keras import Sequential\nfrom tensorflow.keras.layers import Dense,\
    \ LSTM, Dropout\n\n# custom metric\nimport tensorflow.keras.backend as K\ndef\
    \ r2_custom(y_true, y_pred):\n    \"\"\"Coefficient of determination\n    \"\"\
    \"\n    SS_res =  K.sum(K.square(y_true - y_pred))\n    SS_tot = K.sum(K.square(y_true\

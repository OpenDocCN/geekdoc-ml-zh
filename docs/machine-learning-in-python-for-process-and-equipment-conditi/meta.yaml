  md: '# 8.1 ICA: An Introduction


    Independent Component Analysis (ICA) is a multivariate technique for transforming
    measured variables into statistically independent latent variables in a lower-dimensional
    space. Statistical independence is a stricter condition than uncorrelatedness
    and in some situations, working with independent components (ICs) can give better
    results than working with uncorrelated PCs from PCA. While ICA and PCA are related
    (in the sense that latent variables are linear projections of measured variables),
    they differ in the way the latent variables are extracted. Figure 8.1 highlights
    the difference between them using a simple illustration where two independent
    signals are linearly combined to generate correlated signals and then PCA/ICA
    are used to extract latent signals. It is apparent that simply decorrelating the
    signals via PCA did not recover the original signals. On the other hand, ICA reconstructs
    the original signals accurately⁴⁶.


    ![](img/cfcc9569b5e92ea115855752abddd75a_136_0.png)


    ICA uses higher-order statistics for latent variable extractions, instead of only
    second order statistics (mean, variance/covariance) as done by PCA. Therefore,
    for non-Gaussian


    > ⁴⁶ If you observe closely, you will find that ICA latent signals (u1 and u2)
    do differ from s1 and s2 signals in terms of sign and magnitude; we will soon
    learn why this happens and why this is not a cause of worry.'
  merge: -1

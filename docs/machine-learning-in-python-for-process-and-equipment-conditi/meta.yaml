    # # Chapter 11


    # ## Process Monitoring of Multi-Mode Processes


    In the previous chapters, we witnessed the benefits of customizing the conventional
    MSPM techniques for non-Gaussian, dynamic, and nonlinear processes. In this chapter,
    we will remove the last remaining restriction of unimodal operation. In your career,
    you will frequently encounter industrial datasets that exhibit multiple operating
    modes due to variations in production levels, feedstock compositions, ambient
    temperature, product grades, etc., and data-points from different modes tend to
    group into different clusters. The mean and covariance of process variables may
    be different under different operation models and therefore, when you are building
    a monitoring tool, judicious incorporation of the knowledge of these data clusters
    into process models will lead to better performance and, alternatively, failure
    to do so will often lead to unsatisfactory monitoring performance.


    In absence of specific process knowledge or when the number of variables is large,
    it is not trivial to find the number of clusters or to characterize the clusters.
    Fortunately, several methodologies are available which you can choose from for
    your specific solution. In this chapter, we will learn different ways of working
    with multimodal data, some of the popular clustering algorithms, and understand
    their strengths and weaknesses. We will conclude by building a monitoring tool
    for a multimode semiconductor process. Specifically, the following topics are
    covered


    +   - Different methodologies for modeling multimodal process data

    - Introduction to clustering

    - Finding groups using classical k-means clustering

    - Probabilistic clustering via Gaussian mixture modeling

    - Process monitoring of multimode semiconductor manufacturing operation'

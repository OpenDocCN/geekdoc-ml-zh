    \n## 确定聚类数量\n\n使用EM算法进行GMM建模的一个局限性是，高斯分量的数量被假定为事先已知。这可能并不总是成立。为了克服这一点，我们可以使用一种类似于我们用于k-means聚类的肘部法则的方法。在k-means聚类中，我们绘制了不同聚类数量的SSE，而在GMM中，我们将利用贝叶斯信息准则（BIC）指标。与SSE不同，BIC在一段时间后会增加，最优的高斯分量数量是使BIC最小化的值。\n\
    \n```python\n# 通过BIC方法寻找分量数量\nBICs = []\nlowestBIC = np.inf\nfor n_cluster in\
    \ range(1, 10):\n    gmm = GaussianMixture(n_components = n_cluster, random_state\
    \ = 100)\n    gmm.fit(X_transformed)\n    BIC = gmm.bic(X_transformed)\n    BICs.append(BIC)\n\
    \n    if BIC < lowestBIC:\n        optimal_n_cluster = n_cluster\n        lowestBIC\
    \ = BIC\n\nplt.figure(), plt.plot(range(1,10), BICs, marker='o')\nplt.scatter(optimal_n_cluster,\
    \ lowestBIC, c='red', marker='*')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_208_0.png)\n\
    \n还有另一种方法，称为F-J算法<sup>77</sup>，可用于以集成方式寻找最优的GMM分量数量<sup>78</sup>和模型参数。此外，在F-J方法中，分量数量不需要事先指定。在内部，该方法以大量分量初始化，并通过消除权重不显著的高斯分量来自适应地调整此数量。F-J方法也利用EM算法进行参数估计，但在M步中的权重更新机制略有不同。鼓励读者参阅引用的参考文献以获取更多细节。F-J方法的一个缺点可能是计算时间较长。\n\
    \n<sup>77</sup> Figueiredo & Jain, Unsupervised learning of finite mixture models,\
    \ *IEEE Trans Pattern Anal Mach Intell*, 2002\n<sup>78</sup> Yu & Qin, Multimode\
    \ process monitoring with Bayesian inference-based finite Gaussian mixture models,\

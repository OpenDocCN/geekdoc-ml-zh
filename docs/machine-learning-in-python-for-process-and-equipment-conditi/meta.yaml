- md: '## 5.6 Pitfalls of Univariate Control Charts and Alternative Solutions


    The obvious shortcoming of the techniques learnt in this chapter is their inability
    to effectively detect faults in multivariate systems as illustrated below. The
    faulty sample is an obvious outlier in the 2D space; however, if the variables
    x1 and x2 are analyzed individually, the faulty sample appears within the NOC
    ranges.


    ![](img/cfcc9569b5e92ea115855752abddd75a_98_0.png)


    Multivariate Shewhart chart (Hotelling $T^2$ chart), multivariate CUSUM (MCUSUM),
    and multivariate EWMA (MEWMA) schemes have been devised, but they do not enjoy
    the wide acceptance that their univariate counterparts enjoy. This is due to the
    difficulty encountered while handling correlated high dimensional data. Popular
    alternatives for handling multivariate data include PCA, kernel PCA, PLS, etc.
    which you will study in the next part of the book.


    Another shortcoming of the vanilla control charts that we have studied is the
    assumption of independence among the data samples. If you are dealing with a signal
    that shows autocorrelation then a better strategy as illustrated below is to build
    a model (e.g., a time-series model$^{30}$) and compute residuals (between observed
    and predicted values). For NOC data and carefully built model, the residuals will
    be uncorrelated and have Gaussian distribution, and therefore, the vanilla control
    charts can be built for the residuals to indirectly monitor the original signal.


    ![](img/cfcc9569b5e92ea115855752abddd75a_99_0.png)


    Another popular strategy to deal with autocorrelated signals is to update the
    model using the latest observations and monitor the model parameters.


    ## Summary


    In this chapter, we familiarized ourselves with statistical process control charts
    for monitoring univariate signals. We looked at the three popular techniques,
    viz, Shewhart charts, CUSUM charts, and EWMA charts. We learnt how to build these
    charts and understood the pros and cons of these different methods. In the next
    chapter, we will continue our study of univariate signal monitoring and look at
    pattern matching-based methodologies.


    # Chapter 6

    ## Process Fault Detection via Time Series Pattern Matching


    Imagine you are a plant operator newly put in charge of running a plant and you
    observe an interesting pattern in one of the process variable: occasional spikey
    fluctuations without the signal violating the DCS alarm limits. A natural line
    of investigation would be to find if such patterns have occurred in the past and
    are a leading indicators of underlying process faults. However, how do you quickly
    sift through years of historical data to find similar patterns? Consider another
    scenario where you are responsible for quality control of a batch process. To
    check if the latest batch went smoothly, you may want to compare it with known
    reference/golden batch. However, batches may show normal variations due to different
    batch durations or abnormal deviations due to process fault. How do you train
    an algorithm to smartly call out a faulty batch? One thing common in both these
    scenarios is that we are not looking at abnormality of a single measurement; instead,
    abnormality of a sequence of successive values (also called collective anomalies)
    is of interest.


    Time series pattern matching is a mature field in the area of time series classification
    and recent algorithmic advances now allow very fast sequence comparisons to find
    similar or abnormal patterns in historical data. Unsurprisingly, pattern matching
    is being offered as prime feature in commercial process data analytic software
    (such as Aspen’s Process Explorer, SEEQ, etc.). In this chapter, we will work
    through some use-cases of pattern-matching-based process monitoring. Specifically,
    the following topics are covered:


    - Introduction to time series anomalies

    - Pattern matching-based fault detection: use-cases in process industry

    - Fault detection via historical pattern search for steam generator process

    - Fault detection via discord discovery


    ## 6.1 Time Series Anomalies and Pattern Matching


    In anomaly detection literature, anomalies in univariate time series or dynamic
    signals are categorized into three categories: point anomalies, contextual anomalies,
    and collective anomalies. Figure 6.1 illustrates these anomalies for a valve (%)
    opening signal. As depicted in Figure 6.1b, if a single measurement deviates significantly
    from the rest of the sensor readings, then a point anomaly is said to have occurred.
    Contextual anomaly occurs when a measurement is not anomalous in an ‘overall sense’
    but only in a specific context. For example, in Figure 6.1c, point ‘B’ is abnormal
    when taken in the context of operation mode 1 only; valve opening goes close to
    80% under normal operation but not when the process is in mode 1. The last category
    of collective anomaly occurs when a group/sequence of successive measurements
    jointly show abnormal behavior, although the individual measurements may not violate
    NOC range. While control charts can be built to detect point and contextual anomalies,
    more specialized approaches are needed to detect collective anomalies. Therefore,
    this chapter is devoted to study of approaches for collective anomaly detection.


    ![](img/cfcc9569b5e92ea115855752abddd75a_101_0.png)


    The need for (sub) sequence-based pattern matching for FDD show up in different
    forms in process industry; Figure 6.2 illustrates some of the use-case scenarios.
    Let’s work through some of these use-cases to understand the underlying techniques
    and available resources.


    ![](img/cfcc9569b5e92ea115855752abddd75a_102_0.png)


    We will work through the case scenarios (a) and (c). Both of these use-cases involve
    finding similarity of a ‘query’ subsequence with several other subsequences taken
    from the same time series or another time series. In order to accomplish this
    in a time-efficient manner, a library called STUMPY³¹ will be utilized. Let’s
    learn how to utilize STUMPY for our time series data mining tasks.


    ## 6.2 Fault Detection via Historical Pattern Search


    To answer the question posed in Figure 6.2a, the following task can be performed:
    using the real-time data in the last 30 mins, the most similar subsequence can
    be found in the historical data; thereafter, one can simply check if a process
    upset had followed the found subsequence in the history. We will use steam flow
    data$^{32}$ obtained from a model of a Steam Generator at Abbott Power Plant in
    Champaign IL. The provided dataset contains 9600 samples (sampling time 3 seconds)
    of several process variables including steam flow. We created two separate datafiles,
    *historical_steamFlow.txt* and *current_steamFlow.txt*, to contain the historical
    data and the real time data that will be used in this case study. Let''s start
    with loading the data.


    ```python

    # import requisite libraries

    import stumpy

    numpy as np, matplotlib.pyplot as plt


    # fetch data

    historical_steamFlow = np.loadtxt(''historical_steamFlow.txt'')

    current_steamFlow = np.loadtxt(''current_steamFlow.txt'')


    plt.figure(), plt.plot(historical_steamFlow)

    plt.ylabel(''Historical steam flow''), plt.xlabel(''Sample #'')


    plt.figure(), plt.plot(current_steamFlow, color=''green''),

    plt.ylabel(''Current steamFlow''), plt.xlabel(''Sample #'')

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_103_0.png)


    ![](img/cfcc9569b5e92ea115855752abddd75a_103_1.png)


    $^{32}$ De Moor B.L.R. (ed.), DaISy: Database for the Identification of Systems,
    Department of Electrical Engineering, ESAT/STADIUS, KU Leuven, Belgium, URL: http://homes.esat.kuleuven.be/~smc/daisy/


    ```python

    # use stumpy library

    distance_profile = stumpy.mass(current_steamFlow, historical_steamFlow)


    plt.figure(), plt.plot(distance_profile, ''*'', color=''black'',)

    plt.ylabel(''Subsequence distance''), plt.xlabel(''Subsequence starting position'')

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_104_0.png)


    distance_profile contains pairwise distances between current_steamFlow and every
    subsequence (of the same length as current_steamFlow) within historical_steamFlow.
    For example, distance_profile[0] gives the Euclidean distance between current_steamFlow
    and a subsequence of length len(current_steamFlow) starting at position 0 in the
    historical_steamFlow time series. We can notice in the above plot that a subsequence
    (with start position between 0 and 1000) exists that is at a much less distance
    from current_steamFlow than any other subsequence in historical_steamFlow. This
    most similar subsequence from historical_steamFlow can be obtained by finding
    the smallest distance in distance_profile and extracting its positional index
    as shown below.


    ```python

    # find the most similar historical subsequence

    position = np.argmin(distance_profile)

    print(''The subsequence most similar to current_steamFlow is located at position
    :'', position)


    >>> The subsequence most similar to current_steamFlow is located at position :
    643

    ```


    Let''s see how the query and target subsequence compare to each other.


    ```python

    # compare the found pattern to current_steamFlow

    historicalPattern = historical_steamFlow[position:position+len(current_steamFlow)]


    plt.figure()

    plt.plot(current_steamFlow, color="green", label="current_steamFlow")

    plt.plot(historicalPattern, color="maroon", label="Most similar subsequence")

    plt.xlabel(''Sample #''), plt.ylabel(''Steam Flow''), plt.legend()

    ```'
  mdcn: '## 5.6 单变量控制图的局限性与替代方案


    本章所学技术的一个明显缺点是，它们无法有效检测多变量系统中的故障，如下图所示。故障样本在二维空间中是一个明显的离群点；然而，如果分别分析变量 x1 和 x2，该故障样本却出现在正常操作控制范围内。


    ![](img/cfcc9569b5e92ea115855752abddd75a_98_0.png)


    人们已经设计了多元休哈特图（Hotelling $T^2$ 图）、多元累积和（MCUSUM）和多元指数加权移动平均（MEWMA）方案，但它们并未像其单变量对应方案那样被广泛接受。这是由于在处理相关的高维数据时遇到了困难。处理多元数据的常用替代方法包括主成分分析（PCA）、核主成分分析（KPCA）、偏最小二乘法（PLS）等，你将在本书的下一部分学习这些内容。


    我们所研究的传统控制图的另一个缺点是假设数据样本之间相互独立。如果你处理的是显示自相关的信号，那么更好的策略（如下图所示）是建立一个模型（例如，时间序列模型$^{30}$）并计算残差（观测值与预测值之间）。对于正常操作数据和精心构建的模型，残差将是不相关的且服从高斯分布，因此，可以为残差构建传统控制图，以间接监控原始信号。


    ![](img/cfcc9569b5e92ea115855752abddd75a_99_0.png)


    处理自相关信号的另一个流行策略是使用最新观测值更新模型，并监控模型参数。


    ## 总结


    在本章中，我们熟悉了用于监控单变量信号的统计过程控制图。我们研究了三种流行技术，即休哈特图、累积和图和指数加权移动平均图。我们学习了如何构建这些图表，并理解了这些不同方法的优缺点。在下一章中，我们将继续研究单变量信号监控，并探讨基于模式匹配的方法。


    # 第6章

    ## 基于时间序列模式匹配的过程故障检测


    假设你是一名新上任的工厂操作员，负责运行一个工厂，你观察到一个过程变量中出现了一个有趣的模式：偶尔出现尖峰波动，但信号并未超出DCS报警限值。一个自然的调查思路是，查找过去是否发生过此类模式，以及它们是否是潜在过程故障的前兆指标。然而，如何快速筛选多年的历史数据以找到类似的模式呢？考虑另一个场景：你负责一个间歇过程的质量控制。为了检查最近一批次是否顺利，你可能希望将其与已知的参考/黄金批次进行比较。然而，由于批次持续时间不同，批次可能表现出正常变化，或者由于过程故障而出现异常偏差。如何训练一个算法来智能地识别出故障批次？这两个场景的共同点在于，我们关注的不是单个测量值的异常性；相反，我们感兴趣的是连续值序列（也称为集体异常）的异常性。


    时间序列模式匹配是时间序列分类领域的一个成熟领域，最近的算法进步使得在历史数据中快速进行序列比较以找到相似或异常模式成为可能。毫不奇怪，模式匹配正作为商业过程数据分析软件（如Aspen的Process
    Explorer、SEEQ等）的主要功能提供。在本章中，我们将通过一些基于模式匹配的过程监控用例进行讲解。具体涵盖以下主题：


    - 时间序列异常简介

    - 基于模式匹配的故障检测：过程工业中的用例

    - 通过历史模式搜索进行蒸汽发生器过程的故障检测

    - 通过不一致性发现进行故障检测


    ## 6.1 时间序列异常与模式匹配


    在异常检测文献中，单变量时间序列或动态信号中的异常被分为三类：点异常、上下文异常和集体异常。图6.1说明了阀门（%）开度信号的这些异常。如图6.1b所示，如果单个测量值显著偏离其余传感器读数，则认为发生了点异常。当一个测量值在“整体意义上”不异常，仅在特定上下文中异常时，就发生了上下文异常。例如，在图6.1c中，点‘B’仅在操作模式1的上下文中才是异常的；在正常操作下，阀门开度接近80%，但在过程处于模式1时则不然。最后一类集体异常发生在一组/序列的连续测量值共同表现出异常行为时，尽管单个测量值可能未超出正常操作控制范围。虽然可以构建控制图来检测点异常和上下文异常，但检测集体异常需要更专门的方法。因此，本章致力于研究集体异常检测的方法。


    ![](img/cfcc9569b5e92ea115855752abddd75a_101_0.png)


    基于（子）序列的模式匹配在故障检测与诊断（FDD）中的需求在过程工业中以不同形式出现；图6.2说明了一些用例场景。让我们通过其中一些用例来理解底层技术和可用资源。


    ![](img/cfcc9569b5e92ea115855752abddd75a_102_0.png)


    我们将讲解用例场景（a）和（c）。这两个用例都涉及查找一个“查询”子序列与从同一时间序列或另一个时间序列中提取的多个其他子序列的相似性。为了以时间高效的方式完成此任务，将使用一个名为STUMPY³¹的库。让我们学习如何利用STUMPY进行时间序列数据挖掘任务。


    ## 6.2 通过历史模式搜索进行故障检测


    为了回答图6.2a中提出的问题，可以执行以下任务：使用过去30分钟的实时数据，在历史数据中找到最相似的子序列；然后，只需检查在历史上该找到的子序列之后是否发生了过程扰动。我们将使用从伊利诺伊州香槟市阿博特电厂蒸汽发生器模型获得的蒸汽流量数据$^{32}$。提供的数据集包含9600个样本（采样时间3秒），涉及多个过程变量，包括蒸汽流量。我们创建了两个独立的数据文件，*historical_steamFlow.txt*
    和 *current_steamFlow.txt*，分别包含本案例研究中将使用的历史数据和实时数据。让我们从加载数据开始。


    ```python

    # import requisite libraries

    import stumpy

    numpy as np, matplotlib.pyplot as plt


    # fetch data

    historical_steamFlow = np.loadtxt(''historical_steamFlow.txt'')

    current_steamFlow = np.loadtxt(''current_steamFlow.txt'')


    plt.figure(), plt.plot(historical_steamFlow)

    plt.ylabel(''Historical steam flow''), plt.xlabel(''Sample #'')


    plt.figure(), plt.plot(current_steamFlow, color=''green''),

    plt.ylabel(''Current steamFlow''), plt.xlabel(''Sample #'')

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_103_0.png)


    ![](img/cfcc9569b5e92ea115855752abddd75a_103_1.png)


    $^{32}$ De Moor B.L.R. (ed.), DaISy: Database for the Identification of Systems,
    Department of Electrical Engineering, ESAT/STADIUS, KU Leuven, Belgium, URL: http://homes.esat.kuleuven.be/~smc/daisy/


    ```python


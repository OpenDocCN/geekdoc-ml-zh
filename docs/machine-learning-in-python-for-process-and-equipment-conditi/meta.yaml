  md: '# # Chapter 12

    ## Support Vector Machines for Fault Detection


    In the previous chapters, we focused on multivariate statistical process monitoring
    methods that modelled process data through extraction of latent variables. In
    this part of the book, we will cover several classical ML techniques that come
    in handy in building process monitoring applications. These techniques do not
    attempt to build any statistical model of the underlying data distribution. Rather,
    the measurement space itself may be segregated into favorable/unfavorable regions,
    high-density/low-density regions, or pair-wise distances maybe computed to generate
    monitoring metrics, etc. SVM (support vector machine) is one such algorithm which
    excels in dealing with high-dimensional, nonlinear, and small or medium-sized
    data.


    SVMs are extremely versatile and can be employed for classification and regression
    tasks in both supervised and unsupervised settings. SVMs, by design, minimize
    overfitting to provide excellent generalization performance. Infact, before ANNs
    became the craze in ML community, SVMs were the toast of the town. Even today,
    SVM is a must-have tool in every ML practitioner''s toolkit. You will find more
    about SVMs as you work through this chapter. In terms of uses in process industry,
    SVMs have been employed for fault classification, fault detection, outlier detection,
    soft sensing, etc. We will focus on process monitoring-related usage in this chapter.


    To understand different aspects of SVMs, we will cover the following topics


    +   - Fundamentals of SVMs

    - Kernel SVMs

    - SVDD (support vector data description) for unsupervised classification

    - Fault detection via SVDD for semiconductor manufacturing process'

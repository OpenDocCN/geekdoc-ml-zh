    this approach has obvious economic benefits (compared to time-based/preventive
    maintenance) and, to nobody’s surprise, has caught fascination of process industry
    executives!


    ![](img/cfcc9569b5e92ea115855752abddd75a_26_0.png)


    Figure 1.5: Plant health management workflow


    > ### Prognostic and Health Management


    In industrial community, the PM/PdM workflow shown in Figure 1.5 is commonly called

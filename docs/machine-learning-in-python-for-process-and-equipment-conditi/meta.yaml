  md: '# Chapter 19


    # Fault Prognosis: Concepts & Methodologies


    All machines eventually break and plant operators have traditionally relied upon
    regular time-based (preventive) maintenance to avoid costly downtimes due to machinery
    failures. Although economically inefficient, preventive maintenance remained the
    default approach in process industry for a long time. Only in recent times, condition-based
    maintenance approach has gained widespread acceptance wherein a machine’s real-time
    data is used to assess the machine’s health, detect failures, and trigger (on-demand)
    maintenance. However, the recent advancement in data mining has brought another
    step change in the mindset of plant reliability personnel: mere detection of machine
    faults is no longer good enough; accurate forecast of the fault’s progression
    leading to predictive maintenance (PdM) is the new vogue. The lure of PdM is obvious
    – it facilitates advance planning of maintenance, better management of spare part’s
    inventory, etc. Correspondingly, PdM is the holy grail that industrial executives
    are striving for to remain competitive.


    PdM, in essence, involves fault prognosis or the prediction of a machine’s health
    degradation over time after detection of incipient faults. Different PdM methodologies
    are employed depending on the availability of fundamental knowledge of fault’s
    mechanism, historical run-to-failure data, etc. The dominant PdM approach involves
    computation of a health indicator (HI) that summarizes the state of a machine
    health and shows a clear degradation trend as an incipient fault progresses from
    incipience to high severity. HI allows computation of RUL (remaining useful life)
    which is the remaining time until fault severity crosses failure threshold necessitating
    the machine being taken out of service.


    Several different strategies have been devised for computation of HIs and the
    subsequent RUL estimation. While the RUL estimation strategies are covered in
    detail in the next chapter, this chapter focusses on the data-driven methods for
    HI computations. Specifically, the following topics are covered


    +   - Concepts and methodologies for PdM

    - Fault prognosis: introduction and workflow

    - Approaches for health indictor computation

    - Fault prognosis case study for wind turbines'

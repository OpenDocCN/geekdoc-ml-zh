    # 3.6 Data Characteristics Investigation of Tennessee Eastman Process Dataset


    In this case study, we will bring together the concepts learnt to analyze a celebrated
    dataset, the Tennessee Eastman Process (TEP) dataset. If you work in the area
    of process monitoring, then you are very likely to encounter research papers using
    TEP dataset to demonstrate efficacy of their FDD techniques. Therefore, let’s
    use this to put the concepts learnt into practice. Melo et al. have analyzed the

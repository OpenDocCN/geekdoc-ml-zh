  md: '# 17.2 Vibration-based Condition Monitoring: Workflow


    We have so far talked about the different aspects of VCM in only bits and pieces.
    Figure 17.2 summarizes the commonly employed steps involved in VCM which are briefly
    described below.


    ![](img/cfcc9569b5e92ea115855752abddd75a_309_0.png)'
  merge: -1

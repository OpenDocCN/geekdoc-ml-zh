    # 15.5 Fault Classification using ANNs


    If historical faulty samples are available, then one can use FFNN or RNN models
    to directly predict the fault classes of test samples. The figure below shows
    a sample architecture that can help achieve this.


    ![](img/cfcc9569b5e92ea115855752abddd75a_282_1.png)


    Figure 15.10: FFNN architecture for mutually exclusive output classes


    # Softmax activation function in output layer


    Softmax is an exponential function that generates normalized activations so that
    they sum up to 1. In Figure 15.10, activation $a_j$ ($j \in [1,2,3]$) is generated
    as follows


    ```

    $$a_j = g_{softmax}(z_j) = \frac{e^{z_j}}{\sum_{k=1}^{3} e^{z_k}}$$

    ```'
  - '[PAGE 283]


    In ANN world, the pre-activations ($z_j$) that are fed as inputs to the softmax
    function as also called logits. The softmax activations lie between 0 and 1, and
    hence, they are interpreted as class-membership probabilities. The predicted class
    label is taken as the class with maximum probability (or activation)


    $\hat{y} = argmax(a_j, j \in [1,2,3])$


    The predicted class probabilities (and not the predicted class label) are directly
    used during model training.


    # Loss functions


    For binary-class classification problems, binary cross-entropy is the default
    loss function. Let $y$ (can take value 0 and 1) be the true label for a data sample
    and $p$ (or $\hat{y}$) be the predicted probability (of $y = 1$) obtained from
    sigmoid output layer. The cross-entropy loss is given by


    $Cross - entropy Loss = -y * log(p) - (1 - y) * log(1 - p) = \begin{cases} -log(1
    - p), & y = 0 \ -log(p), & y = 1 \end{cases}$


    The above expression is generalized as follows for a multiclass classification,
    where overall loss is sum of separate losses for each class label


    $Multi - class cross - entropy Loss = - \sum_{c=1}^{\# \text{ of classes}} y_c
    log(p_c)$


    where, $y_c$ and $p_c$ are binary indicator and predicted probability of a sample
    belonging to class c, respectively. Note that for multi-class classification,
    the target variable will be in one-hot encoded form.


    # Summary


    In this chapter, we familiarized ourselves with the basic ANN architectures that
    are employed to handle static and dynamic processes. We looked at ways to deploy
    ANN models for process fault detection; specifically, we worked through an implementation
    of FFNN-based process monitoring solution wherein the residuals between actual
    measurements and model predictions are used to ascertain the presence of process
    faults. In the following chapter, we will see how process monitoring solutions
    can be built using unsupervised neural network models.'

    \ 50<sup>th</sup> day. Figure 19.6 shows the combined vibration signal for the\
    \ 50 days. An increasing level of vibration is clearly evident. We will use this\
    \ dataset to demonstrate how a HI can be constructed from extracted time domain\
    \ features that exhibits a clear health degradation trend over time<sup>122</sup>.\n\
    \nLet’s begin by importing required packages and defining a utility function that\
    \ extracts time domain features from a vibration waveform.\n\n```python\n# import\
    \ packages\nimport numpy as np, matplotlib.pyplot as plt, pandas as pd\nimport\
    \ scipy.io\nimport glob\nfrom scipy.stats import kurtosis, skew, spearmanr\n```\n\
    \n<sup>121</sup> Available at https://github.com/mathworks/WindTurbineHighSpeedBearingPrognosis-Data.\
    \ Data has been shared by MathWorks under Attribution-NonCommercial-ShareAlike\
    \ 4.0 International (CC BY-NC-SA 4.0) license (https://creativecommons.org/licenses/by-nc-sa/4.0/).\
    \ Permission was granted by the original author of the dataset, Eric Bechhoefer,\
    \ to use the data in this book.\n<sup>122</sup> MathWorks has provided a case\
    \ study (https://www.mathworks.com/help/predmaint/ug/wind-turbine-high-speed-bearing-prognosis.html)\
    \ using this dataset wherein they demonstrate how to predict RUL using fusion-based\
    \ HI. We adopt a similar approach in our case study.\n\n```python\n# function\
    \ to compute time domain features\ndef timeDomainFeatures(VibData):\n    N = len(VibData)\n\
    \    vibMean = np.mean(VibData)\n    vibStd = np.std(VibData, ddof=1, axis=0)\n\
    \    vibRMS = np.sqrt(np.sum(VibData ** 2)/N)\n    vibPeak = np.max(np.abs(VibData))\n\
    \    vibPeak2Peak = np.max(VibData) - np.min(VibData)\n    vibSkewness = skew(VibData,\
    \ axis=0)\n    vibKurtosis = kurtosis(VibData, fisher=False)\n    vibShapeFactor\
    \ = vibRMS / (np.mean(np.abs(VibData)))\n    vibCrestFactor = np.max(np.abs(VibData))\
    \ / vibRMS\n    vibImpulseFactor = np.max(np.abs(VibData)) / (np.mean(np.abs(VibData)))\n\
    \    vibMarginFactor = np.max(np.abs(VibData)) / (np.mean(np.sqrt(abs(VibData)))\
    \ ** 2)\n\n    features = np.array([vibMean, vibStd, vibRMS, vibPeak, vibPeak2Peak,\
    \ vibSkewness,\n                         vibKurtosis, vibShapeFactor, vibCrestFactor,\
    \ vibImpulseFactor, vibMarginFactor])\n    return features\n```\n\nLet's now read\
    \ data from all the 50 files and extract features.\n\n```python\n# collect feature\
    \ values for each day\nFilenames = glob.glob('data-2013*.mat') # fetches names\
    \ of all relevant files\n\nNfeatures = 11\nfeatures50days = np.zeros((50, Nfeatures))\n\
    for i in range(len(FilenamesList)):\n    matlab_data = scipy.io.loadmat(Filenames[i],\
    \ struct_as_record = False) # reads data from file\n    vib_data = matlab_data['vibration'][:,0]\n\
    \    features = timeDomainFeatures(vib_data)\n    features50days[i,:] = features\n\
    \nplt.figure(), plt.plot(features50days[:,6], '-o'), plt.xlabel('day'), plt.ylabel('feature\
    \ value') # kurtosis\n```\n\n> 123 Files are in '.mat' format\n\nAs we had alluded\
    \ to in the text, the extracted features are noisy. We will smooth them using\
    \ moving average.\n\n```python\n# smooth features using moving average\nwindowSize\
    \ = 5\nfeatures50days_smoothed = pd.DataFrame(features50days).rolling(windowSize).mean().values\n\
    features50days_smoothed[:windowSize-1,:] = features50days[:windowSize-1,:] # replace\
    \ nan in first 4 rows with original values\n\nplt.figure(), plt.plot(features50days[:,\
    \ 6], label='raw feature') # kurtosis\nplt.plot(features50days_smoothed[:, 6],\
    \ label='smoothed feature')\nplt.xlabel('day'), plt.ylabel('feature value'), plt.legend()\n\
    ```\n\nThe plots above show that not all features show clear degradation trend.\
    \ We will use monotonicity to select HI-relevant features for further processing;\
    \ specifically, we will use only features with monotonicity greater than 0.7.\
    \ Note that our purpose of computing HI is to eventually predict RUL. For this,\
    \ we will assume that 32 days of data are available to guide the construction\
    \ of HI and make a prediction for RUL. The specific strategy used to predict the\
    \ RUL is shown in the next chapter.\n\n```python\n# separate training data\nNdays_train\
    \ = 32 # ~ 2/3rd\nfeatures_train = features50days_smoothed[:Ndays_train, :]\n\
    features_all = features50days_smoothed\n\n# monotonicity of features\nfeature_monotonicity\
    \ = np.zeros((Nfeatures,))\nfor feature in range(Nfeatures):\n    result = spearmanr(range(Ndays_train),\
    \ features_train[:,feature])\n    feature_monotonicity[feature] = result.statistic\n\
    \n# bar plot\nfeatureNames = ['Mean', 'Std', 'RMS', 'Peak', 'Peak2Peak', 'Skewness',\
    \ 'Kurtosis', 'ShapeFactor',\n                'CrestFactor', 'ImpulseFactor',\
    \ 'MarginFactor']\n\nplt.figure(figsize=(15,5))\nplt.bar(range(Nfeatures), feature_monotonicity,\
    \ tick_label=featureNames)\nplt.xticks(rotation=45), plt.ylabel('Monotonicity'),\
    \ plt.grid(axis='y')\n```\n\n```python\n# pick features with monotonicity >= 0.7\n\
    featuresSelected = np.where(np.abs(feature_monotonicity) >= 0.7)[0]\nselectFeatures_train\
    \ = features_train[:,featuresSelected]\nselectFeatures_all = features_all[:,featuresSelected]\n\
    ```\n\nLet’s now fuse the selected features into a single metric. For this purpose,\
    \ we will utilize the PCA technique as shown below. Notice that we again use only\
    \ the training data to generate the PCA model.\n\n```python\n# perform PCA and\
    \ extract scores along the first principal component\nfrom sklearn.decomposition\
    \ import PCA\nfrom sklearn.preprocessing import StandardScaler\n\nscaler = StandardScaler().fit(selectFeatures_train)\n\
    selectFeatures_train_normal = scaler.transform(selectFeatures_train)\nselectFeatures_all_normal\
    \ = scaler.transform(selectFeatures_all)\n\npca = PCA().fit(selectFeatures_train_normal)\n\
    PCA_all_scores = pca.transform(selectFeatures_all_normal)\n\nplt.figure(), plt.plot(PCA_all_scores[:,1],'-o',\
    \ color='darkorange')\nplt.xlabel('day'), plt.ylabel('PC1 Score as HI')\n```\n\
    \nThe first component explains almost 95% of the data variance and the plot below\
    \ shows that the first principal component exhibits a nice monotonic trend as\
    \ bearing fault progresses; therefore it is a good metric to be used as a health\
    \ indicator.\n\n## P-F Curve\n\nIn the machinery reliability world, the P-F (potential\
    \ failure) curve is a frequently used concept. The curve represents the progression\
    \ of an equipment's health condition over time from a healthy state to initiation\
    \ of defect to failure. The changes in machine's characteristics or failure symptoms\
    \ such as high temperature, high vibration, high acoustic noise, etc., are specified\
    \ on the curve which indicates the technique that may be effective in fault detection\
    \ at any given stage of fault.\n\nHopefully, now you have a better understanding\
    \ of what fault prognosis entails and the different methodologies available to\
    \ implement predictive maintenance solutions.\n\n## Summary\n\nIn this chapter,\
    \ we acquainted ourselves with the methodologies employed for predictive maintenance\
    \ and undertook a detailed conceptual study of health indicators (HIs). Generation\
    \ of HIs is one of the primary means for the estimation of RUL and therefore,\
    \ we looked at the methods commonly used to compute health indicators. We consolidated\
    \ the concepts covered by working through a real case study of HI generation for\
    \ a wind turbine."

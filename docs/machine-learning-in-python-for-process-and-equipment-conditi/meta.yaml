    # 13.1 Decision Trees: An Introduction


    Decision trees (DTs) are inductive learning methods which derive explicit rules
    from data to make predictions. They partition the feature space into several (hyper)
    rectangles and then fit a simple model (usually a constant) in each one. As shown
    in Figure 13.1 for a binary classification problem in 2D feature space, the partition
    is achieved via a series of if-else statements. As shown, the model is represented
    using branches and leaves which lead to a tree-like structure and hence the name
    decision tree model. The questions asked at each node make it very clear how the
    model predictions (class A or class B) are being generated. Consequently, DTs
    become the model of choice for applications where ease of rationalization of model
    results is very important.


    ![](img/cfcc9569b5e92ea115855752abddd75a_234_0.png)


    The trick in DT model fitting lies in deciding which questions to ask in the if-else
    statements at each node of the tree. During fitting, these questions split the
    feature space into smaller and smaller subregions such that the training observations
    falling in a subregion are similar to each-other. The splitting process stops
    when no further gains can be made or stopping criteria have been met. Improper
    choices of splits will generate a model that does not generalize well. In the
    next subsection, we will study a popular DT training algorithm called CART (classification
    and regression trees) which judiciously determines the splits.


    # Mathematical background


    CART algorithm creates a binary tree, i.e., at each node two branches are created
    that split the dataset in such a way that overall data ‘impurity’ reduces. To
    understand this, consider'
- md: 'the following node<sup>84</sup> of a tree. Also assume that we are dealing
    with binary classification problem with input vector $x \in R^m$.


    ![](img/cfcc9569b5e92ea115855752abddd75a_235_0.png)


    The algorithm needs to decide which one of the $m$ input variables, $x_k$, will
    be used to split the set of $n$ samples at this node and with what threshold $r$.
    CART makes this determination by minimizing the following objective


    $$J(k, r) = \frac{n_{left}}{n} I_{left} + \frac{n_{right}}{n} I_{right}$$


    where $I_{left/right}$ denote the data impurity of the left/right subsets of data
    and is given by


    $$I = 1 - \sum_{q=1}^{2} p_q^2$$


    where $p_q$ is the ratio of samples of the corresponding data subset belonging
    to class $q$. For example, if all the samples in a subset belong to class 1, then
    $p_1 = 1$ and $I = 0$. Therefore, if CART could find $k$ and $r$ such that the
    $n$ samples get perfectly divided class-wise into the left and right subsets,
    then the minimum value of $J = 0$ will be obtained. However, this is usually not
    possible, and CART tries to do the best it can. The reduction in impurity ($\Delta
    I_{node}$) achieved by CART at this node is given by $nI_{node} - \frac{n_{left}}{n}
    I_{left} - \frac{n_{right}}{n} I_{right}$.


    CART simply follows the aforementioned branching scheme recursively. It starts
    from the top node (root node) and keeps splitting the subsets. If a node cannot
    be split any further (because impurity cannot be reduced anymore or some hyperparameter
    settings such as min_samples_split, min_samples_leaf prevent any further split),
    the node becomes a leaf or terminal node. For prediction, the leaf node corresponding
    to the test sample is found and the majority class from the leaf''s training subset
    is assigned to the test sample. Note that a probabilistic prediction for class
    $q$ can also be made by simply looking at the ratio of the leaf''s training samples
    belonging to class $q$.


    In classical DTs, as we have seen, the split decision rules (or split functions)
    at the nodes are based on a single variable. This results in axis-aligned hyperplanes
    that split the input space into several hyperrectangles. Complex split functions
    using multiple variables may also be used which may be more suitable for certain
    datasets – one such example is shown below


    ![](img/cfcc9569b5e92ea115855752abddd75a_236_0.png)


    Fitting DTs with complex split functions, however, becomes computationally much
    more demanding. Therefore, a general recommendation is to transform your dataset
    using dimensionality reduction techniques like PCA, FDA before fitting tree using
    simple split functions.


    For regression problems, a tree is built in the same way with a different objective
    function, $J(k,r)$, which now is given by


    $$J(k,r) = \frac{n_{left}}{n} MSE_{left} + \frac{n_{right}}{n} MSE_{right}$$


    Where $MSE_{left/right}$ denote the mean-squared error at the left/right node


    $$MSE = \frac{\sum_{sample \in subset} (\hat{y} - y_{sample})^2}{\# \text{ of
    samples}}$$


    $\hat{y}$ is the average output of the samples belonging to a subset. Prediction
    for a test sample is also taken as the average output value of all training samples
    assigned to the test sample''s leaf node.


    You are not confined to using the constant predictive models at the leaves of
    a regression tree. Linear and polynomial predictive models may be more suitable
    for certain problems. Such DTs are called model trees. While Sklearn allows only
    the constant model, there exists a package$^{85}$ called ''linear-tree'' that
    allows building model trees with linear models at the leaves.


    ## Impurity metric


    The impurity measure used in Eq. 1 is called *Gini impurity*. Another commonly
    employed measure is *entropy* and is given as follows for a dataset with 2 classes


    $$I_H = -\sum_{q=1}^{2} p_q \log(p_q)$$


    $I_H$ becomes 0 when $p_1=1$ (or $p_2=0$) and 1 when $p_1=p_2=0.5$. Therefore,
    reduction of entropy leads to more data purity. In practice, both Gini impurity
    and entropy provide similar results.


    ## Simple Sklearn implementation


    The code below illustrates implementation of a DT regression model to a quadratic
    dataset in Sklearn. Figure 13.2a plots the predicted vs actual output values.
    It is apparent that with no restriction on tree depth overfitting has occurred.
    Subplot 13.2b shows the regularizing impact of restricting the depth of the tree
    to only 3 levels.


    ```python

    # generate data

    import numpy as np

    x = np.linspace(-1, 1, 50)[:, None]

    y = x*x + 0.25 + np.random.normal(0, 0.15, (50,1))


    # fit regularized DT model and predict

    from sklearn import tree

    model = tree.DecisionTreeRegressor(max_depth=3).fit(x, y)

    y_pred = model.predict(x)

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_237_0.png)


    You can use the `plot_tree` function to plot the tree itself to understand how
    the training dataset has been partitioned by the DT model.


    ```python

    # plot tree

    plt.figure(figsize=(20,8))

    tree.plot_tree(model, feature_names=[''x''], filled=True, rounded=True)

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_238_0.png)


    While DTs appear to be very flexible and useful modeling mechanism, they are seldom
    used as a standalone model. In Figure 13.2, we saw that DTs can easily overfit
    and give non-smooth or piece-wise constant approximations. Another disadvantage
    with DTs is instability, i.e., small variations in training dataset can result
    in a very different tree. However, there is a reason why we invested time in learning
    DTs. A single tree may not be useful, but when you combine multiple trees, you
    get amazing results. We will learn how this is made possible in the next section.


    ## 13.2 Random Forests: An Introduction


    Random forest (RF) is a supervised nonlinear regression and classification modeling
    technique that is made up of several decision trees. These DTs are fit independently
    to their training datasets and RF’s predictions are made by averaging the predictions
    of the trees. Figure 13.3 illustrates this scheme. Combining outputs from trees
    results in low variance or more robust model. The trick lies in how these constituent
    trees are generated. The trees are generated in such a way that their prediction
    errors are uncorrelated, resulting in RF being less prone to overfitting (we will
    concretize this concept mathematically soon).


    ![](img/cfcc9569b5e92ea115855752abddd75a_239_0.png)


    In random forest, the trees are grown to full extent, and therefore, hyperparameter
    selection for the trees is not a concern. This makes RF’s training and execution
    simple and quick. Infact RFs have very small number of tunable hyperparameters.
    RFs also lend themselves useful for computation of variable importances. All these
    qualities have led to the popularity of random forests.


    ### Mathematical background


    For training random forests, different trees need to be generated that are as
    ‘distinct from each-other’ as possible but at the same time provide good descriptions
    of the training dataset. This variety among the trees are achieved via the following
    two means:


    1) **Using different training datasets for each tree**: If each tree is trained
    on the same dataset, they will end up being identical, make the same kind of errors,
    and therefore combining them will offer little benefit. Since we only have a single
    training dataset to train the RF, bootstrapping is employed. If original dataset
    has $N$ samples, bootstrapping allows creation of multiple datasets, each with
    $N_b$ ($\le N$) samples, such that each new dataset is also a good representative
    of the underlying process that generated the original dataset. Each bootstrap
    dataset is generated by randomly selecting $N_b$ samples with replacement from
    the original dataset. In RF, $N_b = N$ and the bootstrapping scheme is illustrated
    below for $N=10$.


    ![](img/cfcc9569b5e92ea115855752abddd75a_240_0.png)


    2) **Using random subsets of input variables to find the optimal split**: A very
    non-intuitive, somewhat surprising, but incredibly effective aspect of RF training
    is that not all the input variables are considered for determining the optimal
    split function at any node of any tree in the forest. Instead, a random subset
    of variables is chosen and then the node impurity is minimized with these chosen
    variables. This random selection is performed at every node. If input variable
    $x \in R^m$, then the number of random split variables ($M$) is recommended to
    be the floored squared root of $m$.


    The above two tricks during training result in trees being minimally correlated
    to each-other. Figure below summarizes the RF model fitting procedure. For illustration,
    it is assumed that $x \in R^9$ and $M=3$.'
  mdcn: '树的第<sup>84</sup>个节点。同时假设我们处理的是一个二分类问题，输入向量为 $x \in R^m$。


    ![](img/cfcc9569b5e92ea115855752abddd75a_235_0.png)


    算法需要决定在当前节点使用 $m$ 个输入变量 $x_k$ 中的哪一个来分割 $n$ 个样本的集合，以及使用什么阈值 $r$。CART 通过最小化以下目标函数来做出此决定：


    $$J(k, r) = \frac{n_{left}}{n} I_{left} + \frac{n_{right}}{n} I_{right}$$


    其中 $I_{left/right}$ 表示左/右子数据集的数据不纯度，其计算公式为：


    $$I = 1 - \sum_{q=1}^{2} p_q^2$$


    这里 $p_q$ 是对应数据子集中属于类别 $q$ 的样本比例。例如，如果一个子集中的所有样本都属于类别 1，那么 $p_1 = 1$ 且 $I = 0$。因此，如果
    CART 能找到 $k$ 和 $r$，使得 $n$ 个样本能够按类别完美地划分到左右子集中，那么就能得到最小值 $J = 0$。然而，这通常是不可能的，CART
    会尽力做到最好。CART 在此节点实现的不纯度降低（$\Delta I_{node}$）由 $nI_{node} - \frac{n_{left}}{n}
    I_{left} - \frac{n_{right}}{n} I_{right}$ 给出。


    CART 简单地递归遵循上述分支方案。它从顶层节点（根节点）开始，不断分割子集。如果一个节点无法再被分割（因为不纯度无法再降低，或者某些超参数设置如 min_samples_split,
    min_samples_leaf 阻止了进一步分割），该节点就成为叶节点或终端节点。对于预测，找到与测试样本对应的叶节点，并将该叶节点训练子集中的多数类别分配给测试样本。请注意，也可以通过简单地查看叶节点训练样本中属于类别
    $q$ 的比例来进行概率预测。


    在经典的决策树中，正如我们所看到的，节点上的分割决策规则（或分割函数）基于单个变量。这导致了轴对齐的超平面将输入空间分割成几个超矩形。也可以使用基于多个变量的复杂分割函数，这可能更适合某些数据集——下面展示了一个这样的例子。


    ![](img/cfcc9569b5e92ea115855752abddd75a_236_0.png)


    然而，使用复杂分割函数拟合决策树在计算上要求更高。因此，一个通用的建议是在使用简单分割函数拟合树之前，先使用 PCA、FDA 等降维技术对数据集进行变换。


    对于回归问题，以相同的方式构建树，但使用不同的目标函数 $J(k,r)$，现在其定义为：


    $$J(k,r) = \frac{n_{left}}{n} MSE_{left} + \frac{n_{right}}{n} MSE_{right}$$


    其中 $MSE_{left/right}$ 表示左/右节点的均方误差：


    $$MSE = \frac{\sum_{sample \in subset} (\hat{y} - y_{sample})^2}{\# \text{ of
    samples}}$$


    $\hat{y}$ 是属于某个子集的样本的平均输出值。对测试样本的预测也取为分配给测试样本叶节点的所有训练样本的平均输出值。


    你并不局限于在回归树的叶节点使用常数预测模型。线性和多项式预测模型可能更适合某些问题。这类决策树被称为模型树。虽然 Sklearn 只允许常数模型，但存在一个名为
    ''linear-tree''$^{85}$ 的包，它允许构建叶节点为线性模型的模型树。


    ## 不纯度度量


    公式 1 中使用的不纯度度量称为 *基尼不纯度*。另一个常用的度量是 *熵*，对于具有 2 个类别的数据集，其定义如下：


    $$I_H = -\sum_{q=1}^{2} p_q \log(p_q)$$


    当 $p_1=1$（或 $p_2=0$）时，$I_H$ 变为 0；当 $p_1=p_2=0.5$ 时，$I_H$ 变为 1。因此，熵的降低会导致数据纯度的提高。在实践中，基尼不纯度和熵提供相似的结果。


    ## 简单的 Sklearn 实现


    下面的代码演示了在 Sklearn 中对二次数据集实现决策树回归模型。图 13.2a 绘制了预测值与实际输出值的对比图。很明显，在不限制树深度的情况下发生了过拟合。子图
    13.2b 显示了将树深度限制为仅 3 层的正则化效果。


    ```python

    # generate data

    import numpy as np

    x = np.linspace(-1, 1, 50)[:, None]

    y = x*x + 0.25 + np.random.normal(0, 0.15, (50,1))


    # fit regularized DT model and predict

    from sklearn import tree

    model = tree.DecisionTreeRegressor(max_depth=3).fit(x, y)

    y_pred = model.predict(x)

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_237_0.png)


    你可以使用 `plot_tree` 函数来绘制树本身，以理解训练数据集是如何被决策树模型划分的。


    ```python

    # plot tree

    plt.figure(figsize=(20,8))

    tree.plot_tree(model, feature_names=[''x''], filled=True, rounded=True)

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_238_0.png)


    虽然决策树看起来是非常灵活和有用的建模机制，但它们很少作为独立模型使用。在图 13.2 中，我们看到决策树很容易过拟合，并给出非平滑或分段常数的近似。决策树的另一个缺点是不稳定性，即训练数据集的微小变化可能导致一棵非常不同的树。然而，我们花时间学习决策树是有原因的。单棵树可能没有用，但当你组合多棵树时，你会得到惊人的结果。我们将在下一节学习这是如何实现的。


    ## 13.2 随机森林：简介


    随机森林是一种监督式非线性回归和分类建模技术，由多棵决策树组成。这些决策树独立地拟合到它们的训练数据集，随机森林的预测是通过对这些树的预测结果取平均值得出的。图
    13.3 说明了这一方案。组合树的输出可以得到低方差或更稳健的模型。诀窍在于这些组成树是如何生成的。这些树的生成方式使得它们的预测误差不相关，从而导致随机森林不易过拟合（我们很快将从数学上具体化这个概念）。


    ![](img/cfcc9569b5e92ea115855752abddd75a_239_0.png)


    在随机森林中，树被完全生长，因此，树的超参数选择不是问题。这使得随机森林的训练和执行简单快捷。事实上，随机森林具有非常少的可调超参数。随机森林还便于计算变量重要性。所有这些品质使得随机森林广受欢迎。


    ### 数学背景


    为了训练随机森林，需要生成尽可能“彼此不同”但同时又能良好描述训练数据集的不同树。这种树之间的多样性通过以下两种方式实现：


    1) **为每棵树使用不同的训练数据集**：如果每棵树都在相同的数据集上训练，它们最终会变得相同，犯同样类型的错误，因此组合它们将提供很少的好处。由于我们只有一个训练数据集来训练随机森林，因此采用了自助采样法。如果原始数据集有
    $N$ 个样本，自助采样法允许创建多个数据集，每个数据集有 $N_b$（$\le N$）个样本，使得每个新数据集也能很好地代表生成原始数据集的底层过程。每个自助采样数据集是通过从原始数据集中有放回地随机选择
    $N_b$ 个样本生成的。在随机森林中，$N_b = N$，下图说明了 $N=10$ 时的自助采样方案。


    ![](img/cfcc9569b5e92ea115855752abddd75a_240_0.png)


    2) **使用输入变量的随机子集来寻找最优分割**：随机森林训练中一个非常不直观、有些令人惊讶但极其有效的方面是，在森林中任何树的任何节点上确定最优分割函数时，并不考虑所有输入变量。相反，选择一个变量的随机子集，然后使用这些选定的变量来最小化节点不纯度。这种随机选择在每个节点上都进行。如果输入变量
    $x \in R^m$，则建议随机分割变量的数量（$M$）为 $m$ 的向下取整平方根。


    训练过程中的上述两个技巧使得树之间的相关性最小化。下图总结了随机森林模型的拟合过程。为便于说明，假设 $x \in R^9$ 且 $M=3$。'

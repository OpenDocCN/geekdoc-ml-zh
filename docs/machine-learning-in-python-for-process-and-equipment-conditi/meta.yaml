    # 6.1 Time Series Anomalies and Pattern Matching


    In anomaly detection literature, anomalies in univariate time series or dynamic
    signals are categorized into three categories: point anomalies, contextual anomalies,
    and collective anomalies. Figure 6.1 illustrates these anomalies for a valve (%)
    opening signal. As depicted in Figure 6.1b, if a single measurement deviates significantly
    from the rest of the sensor readings, then a point anomaly is said to have occurred.
    Contextual anomaly occurs when a measurement is not anomalous in an ‘overall sense’
    but only in a specific context. For example, in Figure 6.1c, point ‘B’ is abnormal
    when taken in the context of operation mode 1 only; valve opening goes close to
    80% under normal operation but not when the process is in mode 1. The last category
    of collective anomaly occurs when a group/sequence of successive measurements
    jointly show abnormal behavior, although the individual measurements may not violate
    NOC range. While control charts can be built to detect point and contextual anomalies,
    more specialized approaches are needed to detect collective anomalies. Therefore,
    this chapter is devoted to study of approaches for collective anomaly detection.



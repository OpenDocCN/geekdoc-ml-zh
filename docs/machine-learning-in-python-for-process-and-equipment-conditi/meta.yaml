    In this chapter, we acquainted ourselves with the methodologies employed for predictive
    maintenance and undertook a detailed conceptual study of health indicators (HIs).
    Generation of HIs is one of the primary means for the estimation of RUL and therefore,
    we looked at the methods commonly used to compute health indicators. We consolidated
    the concepts covered by working through a real case study of HI generation for
    a wind turbine.'

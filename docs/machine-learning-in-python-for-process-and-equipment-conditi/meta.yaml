- md: "The choice of ensemble technique should be based on the base model's characteristics.\
    \ If the problem with the base model is its high variance, then choose the ensemble\
    \ method that tends to reduce variance (such as bagging). On the other hand, if\
    \ the problem is high bias, then use methods like boosting and stacking that will\
    \ produce an ensemble model with reduced bias.\n\nLet's now become more familiar\
    \ with these techniques.\n\n## Bagging\n\nIn bagging (bootstrap aggregating) technique,\
    \ the diverse set of base models are generated by employing the same modeling\
    \ algorithm with different bootstrap samples of the original training dataset.\
    \ Unlike RF, the input variables are kept the same in each base model and the\
    \ size of bootstrap dataset is usually kept less than the original number of training\
    \ samples. Moreover, the base model is not restricted to be a DT model. As the\
    \ figure below shows, the base models are trained independently (allowing parallel\
    \ trainings) and ensemble prediction is obtained by combining base models' predictions.\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_247_0.png)\n\nThe defining characteristic\
    \ of bagging is that it helps in reducing variance but not bias. It can be shown\
    \ that if $\\bar{\\rho}$ is the average correlation among base model predictions\
    \ then variance of $y_{\\text{ensemble}}$ equals $\\bar{\\sigma}^2 \\left( \\\
    bar{\\rho} + \\frac{1-\\bar{\\rho}}{K} \\right)$ where $\\bar{\\sigma}^2$ is variance\
    \ of an individual base model's predictions and $K$ is number of base models.\
    \ Therefore, $\\bar{\\rho} = 1$ implies no reduction in variance.\n\nBagging can\
    \ be used for both regression and classification. Sklearn provides BaggingClassifier\
    \ and BaggingRegressor for them, respectively. A simple illustration below shows\
    \ how bagging can help achieve smoother results (classification boundaries in\
    \ this case).\n\n```python\n# generate training samples\nfrom sklearn import datasets\n\
    noisy_moons = datasets.make_moons(n_samples=200, noise=0.3, random_state=10)\n\
    X, y = noisy_moons\n\n# fit bagging model (Sklearn uses decision trees as base\
    \ models by default)\nfrom sklearn.ensemble import BaggingClassifier\nBagging_model\
    \ = BaggingClassifier(n_estimators=500, max_samples=50, random_state=100).fit(X,\
    \ y) # K=500 and each DT is trained on 50 training samples randomly drawn with\
    \ replacement\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_248_0.png)\n\n\
    ## Boosting\n\nIn boosting ensemble technique, the base models are again obtained\
    \ using the same learning algorithm but are fitted sequentially and not independently\
    \ from each other. During training, each base model tries to ‘correct’ the errors\
    \ made by the boosted model at the previous step. At the end of the process, we\
    \ obtain an ensemble model that shows lower bias$^{88}$ than the base models.\n\
    \n$^{88}$ Variance may or may not decrease. Boosting has been seen to cause overfitting\
    \ sometimes.\n\nBoosting is preferred if base model exhibit underfitting/high\
    \ bias. Like bagging, boosting is not restricted to DTs as base models, but if\
    \ DTs are used, shallow trees (trees with only a few depths) are recommended that\
    \ don’t exhibit high variance. Moreover, shallow trees or any other less complex\
    \ base model are computationally tractable to train sequentially during boosting\
    \ process. Boosting can be used for both regression and classification, and there\
    \ are primarily two popular boosting methods, namely, Adaboost and Gradient Boosting.\n\
    \n### Adaboost (Adaptive Boosting)\n\nIn Adaboost boosting technique, a new base\
    \ model corrects the errors of its predecessor base model by focusing on the samples\
    \ that were wrongly predicted. As shown in Figure 13.11, all samples are assigned\
    \ equal weights of $\\frac{1}{N}$ and the first (weak) base model is trained.\
    \ Weights of wrongly predicted samples are increased, and weights of correctly\
    \ predicted samples are decreased. Second base model is trained, and the cycle\
    \ continues until the specified number of base models are obtained. In essence,\
    \ each successive base model focusses more on the difficult (to predict) training\
    \ samples. Post training, the ensemble model’s prediction is taken as the weighted\
    \ combination of base models’ predictions. Model weight assigned to each base\
    \ model depends on the accuracy achieved on its weighted training samples (higher\
    \ accuracy $\\Rightarrow$ higher $\\alpha$).\n\n![](img/cfcc9569b5e92ea115855752abddd75a_249_0.png)\n\
    \n### Gradient Boosting\n\nAdopting an approach different from Adaboost, Gradient\
    \ boosting approach corrects the errors of its predecessor by sequentially training\
    \ a base model using the residual error made by the previous base model. Figure\
    \ 13.12 shows the algorithm’s scheme.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_250_0.png)\n\
    \nIn the scheme above, the hyperparameter $\\vartheta \\in (0,1]$ is called shrinkage\
    \ parameter or learning rate. It is used to prevent overfitting and is recommended\
    \ to be assigned a small value like 0.1. Very small learning rate will necessitate\
    \ usage of large number of base models. The number of iterations or base models,\
    \ $K$, is another important hyperparameter that needs to be tuned carefully. Too\
    \ small $K$ will not achieve sufficient bias reduction while too large $K$ will\
    \ cause overfitting. It can be optimized using cross-validation or early stopping\
    \ (keeping track of validation error at different stages/iterations of ensemble\
    \ model training and stopping when errors stop decreasing or model residuals do\
    \ not have any more pattern that can be modeled).\n\nSklearn provides GradientBoostingClassifier\
    \ and GradientBoostingRegressor classes for regression and classification purposes,\
    \ respectively. While these classes use DTs as base models/weak learners, gradient\
    \ boosting methodology is not limited to DTs. When DTs are used, it is called\
    \ Gradient Tree Boosting or Gradient Boosted Decision Trees (GBDTs).\n\n## 13.5\
    \ Fault Classification Using XGBoost: Gas Boiler Case Study\n\nIf you have been\
    \ active in the ML world in the recent times, then you must have heard the term\
    \ XGBoost. It stands for *eXtreme Gradient Boosting* and is a popular library\
    \ that implements several tricks and heuristics to make gradient boosting-based\
    \ model training very effective, especially for large datasets. XGBoost uses DTs\
    \ as base models. Let's apply XGBoost for the gas-boiler fault classification\
    \ problem and see if we can better RF model's performance.\n\n```python\n# fit\
    \ xgboost model\nimport xgboost as xgb\nclf = xgb.XGBClassifier(use_label_encoder=False)\n\
    clf.fit(X_train_scaled, y_train)\ny_train_pred = clf.predict(X_train_scaled)\n\
    y_test_pred = clf.predict(X_test_scaled)\n```\n\n```python\n# generate and plot\
    \ confusion matrix\nfrom sklearn.metrics import confusion_matrix\nimport seaborn\
    \ as sn\nconf_mat = confusion_matrix(y_test, y_test_pred)\n\nplt.figure(figsize=(12,8)),\
    \ sn.set(font_scale=2)\nsn.heatmap(conf_mat, fmt='.0f', annot=True, cmap='Blues',\
    \ xticklabels=le.classes_,\n           yticklabels=le.classes_)\n\nplt.ylabel('True\
    \ Fault Class', fontsize=30, color='maroon')\nplt.xlabel('Predicted Fault Class',\
    \ fontsize=30, color='green')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_251_0.png)\n\
    \nA quick cursory glance of the confusion matrix suggests similar performance\
    \ as that from RF model. Perhaps, a systematic hyperparameter optimization may\
    \ provide even better performance. Our aim was to demonstrate the ease with which\
    \ reasonably good classifier models can be built with default settings of XGBoost.\n\
    \nThis chapter was a whirlwind tour of ensemble learning which is an important\
    \ pillar of modern machine learning. Each topic introduced in the chapter has\
    \ several more advanced aspects that we could not cover here. However, you now\
    \ have the requisite fundamentals and familiarization in place to explore these\
    \ advanced aspects.\n\n## Summary\n\nIn this chapter, we learnt the decision tree\
    \ modeling methodology. We saw how random forests can help overcome the high variance\
    \ issues with trees. Then, we studied the broader concept of ensemble learning\
    \ which can be used to overcome the high bias and/or high variance issues with\
    \ weak models. Two popular ensemble methods, viz, bagging and boosting, were conceptually\
    \ introduced. Finally, we used the gas boiler dataset to illustrate the ease with\
    \ which fault classification models can be built using random forests and XGBoost\
    \ (a popular implementation of gradient boosting trees). This chapter has added\
    \ several powerful techniques to your ML arsenal and you will find yourself using\
    \ these quite often."
  mdcn: "集成技术的选择应基于基础模型的特性。如果基础模型的问题在于高方差，则应选择倾向于降低方差的集成方法（例如 bagging）。另一方面，如果问题在于高偏差，则应使用\
    \ boosting 和 stacking 等方法，这些方法能产生偏差更低的集成模型。\n\n现在让我们更深入地了解这些技术。\n\n## Bagging\n\
    \n在 bagging（自助聚合）技术中，通过对原始训练数据集使用不同的自助样本，采用相同的建模算法生成多样化的基础模型集合。与随机森林不同，每个基础模型中的输入变量保持不变，且自助数据集的大小通常小于原始训练样本的数量。此外，基础模型不限于决策树模型。如下图所示，基础模型是独立训练的（允许并行训练），集成预测是通过组合基础模型的预测得到的。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_247_0.png)\n\nBagging 的定义特征是它有助于降低方差而非偏差。可以证明，如果\
    \ $\\bar{\\rho}$ 是基础模型预测之间的平均相关性，那么 $y_{\\text{ensemble}}$ 的方差等于 $\\bar{\\sigma}^2\
    \ \\left( \\bar{\\rho} + \\frac{1-\\bar{\\rho}}{K} \\right)$，其中 $\\bar{\\sigma}^2$\
    \ 是单个基础模型预测的方差，$K$ 是基础模型的数量。因此，$\\bar{\\rho} = 1$ 意味着方差没有降低。\n\nBagging 可用于回归和分类。Sklearn\
    \ 分别提供了 BaggingClassifier 和 BaggingRegressor。下面的简单示例展示了 bagging 如何帮助实现更平滑的结果（在此例中是分类边界）。\n\
    \n```python\n# generate training samples\nfrom sklearn import datasets\nnoisy_moons\
    \ = datasets.make_moons(n_samples=200, noise=0.3, random_state=10)\nX, y = noisy_moons\n\
    \n# fit bagging model (Sklearn uses decision trees as base models by default)\n\
    from sklearn.ensemble import BaggingClassifier\nBagging_model = BaggingClassifier(n_estimators=500,\
    \ max_samples=50, random_state=100).fit(X, y) # K=500 and each DT is trained on\
    \ 50 training samples randomly drawn with replacement\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_248_0.png)\n\
    \n## Boosting\n\n在 boosting 集成技术中，基础模型同样使用相同的学习算法获得，但它们是顺序拟合的，而非相互独立。在训练过程中，每个基础模型都试图“纠正”前一步提升模型所犯的错误。在过程结束时，我们得到一个集成模型，其偏差$^{88}$低于基础模型。\n\
    \n$^{88}$ 方差可能降低也可能不降低。Boosting 有时会导致过拟合。\n\n如果基础模型表现出欠拟合/高偏差，则优先选择 boosting。与\
    \ bagging 类似，boosting 不限于以决策树作为基础模型，但如果使用决策树，建议使用浅层树（深度较小的树），这些树不会表现出高方差。此外，浅层树或任何其他不太复杂的基础模型在\
    \ boosting 过程中顺序训练时计算上是易于处理的。Boosting 可用于回归和分类，主要有两种流行的 boosting 方法，即 Adaboost\
    \ 和梯度提升。\n\n### Adaboost（自适应提升）\n\n在 Adaboost 提升技术中，新的基础模型通过关注被错误预测的样本来纠正其前驱基础模型的错误。如图\
    \ 13.11 所示，所有样本被赋予相等的权重 $\\frac{1}{N}$，并训练第一个（弱）基础模型。错误预测样本的权重增加，正确预测样本的权重减少。训练第二个基础模型，循环继续，直到获得指定数量的基础模型。本质上，每个后续基础模型都更关注困难（难以预测）的训练样本。训练后，集成模型的预测取为基础模型预测的加权组合。分配给每个基础模型的模型权重取决于其在加权训练样本上达到的准确度（准确度越高\
    \ $\\Rightarrow$ $\\alpha$ 越高）。\n\n![](img/cfcc9569b5e92ea115855752abddd75a_249_0.png)\n\
    \n### 梯度提升\n\n梯度提升采用与 Adaboost 不同的方法，它通过使用前一个基础模型产生的残差误差顺序训练基础模型来纠正其前驱的错误。图 13.12\
    \ 展示了该算法的方案。\n\n![](img/cfcc9569b5e92ea115855752abddd75a_250_0.png)\n\n在上述方案中，超参数\
    \ $\\vartheta \\in (0,1]$ 称为收缩参数或学习率。它用于防止过拟合，建议赋予一个小值，如 0.1。非常小的学习率将需要使用大量的基础模型。迭代次数或基础模型数量\
    \ $K$ 是另一个需要仔细调整的重要超参数。$K$ 太小将无法实现足够的偏差降低，而 $K$ 太大则会导致过拟合。可以使用交叉验证或早停法（跟踪集成模型训练不同阶段/迭代的验证误差，并在误差停止下降或模型残差不再有可建模的模式时停止）进行优化。\n\
    \nSklearn 分别提供了用于回归和分类目的的 GradientBoostingClassifier 和 GradientBoostingRegressor\
    \ 类。虽然这些类使用决策树作为基础模型/弱学习器，但梯度提升方法不限于决策树。当使用决策树时，它被称为梯度树提升或梯度提升决策树（GBDTs）。\n\n\
    ## 13.5 使用 XGBoost 进行故障分类：燃气锅炉案例研究\n\n如果你最近在机器学习领域很活跃，那么你一定听说过 XGBoost 这个术语。它代表\
    \ *eXtreme Gradient Boosting*，是一个流行的库，实现了多种技巧和启发式方法，使基于梯度提升的模型训练非常有效，尤其适用于大型数据集。XGBoost\
    \ 使用决策树作为基础模型。让我们将 XGBoost 应用于燃气锅炉故障分类问题，看看我们是否能超越随机森林模型的性能。\n\n```python\n# fit\
    \ xgboost model\nimport xgboost as xgb\nclf = xgb.XGBClassifier(use_label_encoder=False)\n\
    clf.fit(X_train_scaled, y_train)\ny_train_pred = clf.predict(X_train_scaled)\n\
    y_test_pred = clf.predict(X_test_scaled)\n```\n\n```python\n# generate and plot\
    \ confusion matrix\nfrom sklearn.metrics import confusion_matrix\nimport seaborn\
    \ as sn\nconf_mat = confusion_matrix(y_test, y_test_pred)\n\nplt.figure(figsize=(12,8)),\
    \ sn.set(font_scale=2)\nsn.heatmap(conf_mat, fmt='.0f', annot=True, cmap='Blues',\
    \ xticklabels=le.classes_,\n           yticklabels=le.classes_)\n\nplt.ylabel('True\
    \ Fault Class', fontsize=30, color='maroon')\nplt.xlabel('Predicted Fault Class',\
    \ fontsize=30, color='green')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_251_0.png)\n\
    \n快速浏览混淆矩阵表明其性能与随机森林模型相似。也许，系统的超参数优化可能会提供更好的性能。我们的目标是展示使用 XGBoost 的默认设置可以轻松构建相当好的分类器模型。\n\
    \n本章是对集成学习的快速概览，集成学习是现代机器学习的重要支柱。本章介绍的每个主题都有更多我们无法在此涵盖的高级方面。然而，你现在已具备必要的基础知识和熟悉度，可以探索这些高级方面。\n\
    \n## 总结\n\n在本章中，我们学习了决策树建模方法。我们看到了随机森林如何帮助克服树的高方差问题。然后，我们研究了集成学习的更广泛概念，它可以用于克服弱模型的高偏差和/或高方差问题。概念性地介绍了两种流行的集成方法，即\
    \ bagging 和 boosting。最后，我们使用燃气锅炉数据集说明了使用随机森林和 XGBoost（梯度提升树的一种流行实现）可以轻松构建故障分类模型。本章为你的机器学习工具库增添了几种强大的技术，你会发现你会经常使用它们。"

  md: '# Chapter 4


    # Machine Learning for Plant Health Management: Workflow and Best Practices


    Whether you are building a ML solution for fault detection, fault classification,
    or fault prognosis, model development is the most critical task. Inarguably, obtaining
    a good ML model is not a trivial task. You cannot obtain a good model by just
    dumping all the available raw data in an off-the-shelf machine learning module.
    Incorrectly specify one hyperparameter and your model will return garbage results;
    provide insufficiently ‘rich’ training dataset and even the most carefully chosen
    ML model will prove incapable of providing meaningful insights. Unfortunately,
    an automated procedure for ML model development that works for all types of problems
    does not exist. Nonetheless, there is no cause for despair. The trick to successful
    model development lies in being actively involved in the several model development
    stages and making use of several useful guidelines that the ML community has come
    up with over the years. We already saw in the previous chapter the importance
    of acquiring a good understanding of data for correct model selection. In this
    chapter, we will learn several other guidelines and the best practices.


    We will not cover the best practices associated with generic machine learning
    workflow. Concepts like feature extraction, feature engineering, cross-validation,
    regularization, etc., have already been covered in detail in our first book of
    the series. Albeit we will touch upon topics that are specific to plant health
    management applications. In this chapter, our focus will be on aspects that you
    should not ignore to ensure that you are not unknowingly setting your model up
    for failure. Specifically, we will cover these topics


    +   - ML model development workflow

    - Data selection and pre-processing to obtain good training dataset

    - Assessment of monitoring performance

    - Best practices for model selection and tuning'
  merge: -1
  pgno: 72
- img_proc: true
  md: '# 4.1 ML Model Development Workflow


    The prime objective of the ML modeling task for building process modeling solutions
    is to obtain a model that provide high fault sensitivity (i.e., the model is able
    to detect process faults in incipient stages) and low false alarm rate (i.e.,
    the model does not report a process fault when process is operating normally).
    Balancing the trade-off between these two requirements is not easy and requires
    careful attention to varied aspects during model development. It definitely takes
    more than just executing a ‘model = <some ML_model>.fit()’ command on the available
    data. In Chapter 1, we saw an overview of the typical steps involved in a ML model
    development exercise. In this chapter, we will look at the different components
    of the workflow in more details. Figure 4.1 lists the subtasks that we will touch
    upon. While separate books can be written on each of these subtasks, we will focus
    on the aspects that may get overlooked by an inexperienced process data scientist.


    ![](img/cfcc9569b5e92ea115855752abddd75a_73_0.png)'
  merge: -1
  pgno: 73
- img_proc: true
  md: 'The workflow starts with data collection. Although most often you won’t have
    much control over the data (process data collected in historical database) that
    is available for model building, you can take a few steps to ensure that the ‘right’
    data get passed down the workflow. For example, you can ensure that only the NOC
    samples that are representative of the process conditions that will be monitored
    are selected for further processing; this ensures that the model learns the correct
    fault-free process behavior. Thereafter, you move onto the exploratory data analysis
    step wherein you get a ‘feel’ of the data. In the previous chapter, we saw in
    great detail how EDA can help us select the right class of model. In the next
    step, data are pre-processed to increase the information content in the data.
    This step can involve data cleaning (e.g., removing outliers and noise), data
    transformation (generating new features and/or modifying existing ones), etc.
    After this step, we are ready to fit out chosen model.


    A practical guideline for model selection is Occam’s razor which advices selection
    of simplest model that meets the modeling objectives. In Chapter 1, we saw several
    factors that influence model selection. These factors along with inferences from
    the EDA step will help you shortlist your candidate models. After model fitting,
    an evaluation of the model’s fault detection and fault diagnosis performance is
    conducted. Diverse set of metrics has been devised to quantify different aspects
    of FDD performance. We will look at these metrics in this chapter. The last step
    before you obtain your coveted model is model tuning where you play with your
    model’s hyperparameters. We will study how you can use cross-validation for this
    step. With this broad overview of the workflow, let’s take a closer look into
    some of the aspects.


    # 4.2 Data Selection


    At the ‘data selection’ step of the ML model development workflow, as a process
    modeler, you need to take care that you are not accidentally providing a dataset
    that ‘confuses’ the ML model! To understand this further, let’s take a look at
    a couple of example scenarios.


    *Training data representative of normal operating conditions*


    Most of the ML models used for process monitoring applications work by ‘learning’
    the normal process behavior. Now consider the illustration below. The furnace
    underwent significant design changes a year ago due to which the normal values
    of temperatures inside the furnace has changed. Now imagine if historical data
    over the last four years are utilized for model training.'
  merge: -1
  pgno: 74
- img_proc: true
  md: '![](img/cfcc9569b5e92ea115855752abddd75a_75_0.png)


    Any model will struggle to adequately describe the furnace temperatures during
    the last 1 year. The model-plant mismatch will add significantly to the ‘noise’
    in the dataset which will severely impact the fault sensitivity of the final model.
    The model performance is bound to be disappointing. A sensible approach would
    be to use only the last 1 year of data as the training data.


    # Avoiding inclusion of unnecessary variables


    A general tendency among inexperienced process data scientists is to dump all
    the available process variables into model training module. They rely upon feature
    selection to weed out irrelevant variables. However, feature selection may not
    always do a decent job; for example, if you are building a PCA model and enough
    historical faulty samples are not available then inferences regarding variable
    relevancy are difficult to make algorithmically. It is always wiser to pay careful
    attention upfront and make educated selection of variables.


    > The takeaway message is that if you are not an ‘insider’ to the plant operations
    then it would serve you well to sit down with the plant manager (and plant engineer)
    to obtain as much information about the process as possible; use the information
    gained to curate the training dataset.'
  merge: -1
  pgno: 75
- img_proc: true
  md: '# 4.3 Data Pre-processing


    As alluded to in Chapter 1, the overall objective of this step is to increase
    the ‘information content’ of training dataset so that the model’s ability to distinguish
    between normal and faulty operations is bolstered. For example, model’s performance
    will suffer if training dataset is corrupted with outliers or does not have adequate
    number of faulty samples. During pre-processing step, training dataset is treated
    to remove these deficiencies. Let’s look at a couple of deficiencies that are
    easy to get overlooked (/not handled properly) in pursuit of ‘quick’ results resulting
    in misleading inferences.


    # Handling outliers


    In simple words, outliers are corrupted training samples that are not consistent
    with the normal training samples. As should be obvious, outliers can ‘confuse’
    models during extraction of the true normal behavior of the process from training
    data. The illustration below shows how unhandled outliers can lead to failures
    going undetected.


    ![](img/cfcc9569b5e92ea115855752abddd75a_76_0.png)


    In Chapter 4 of Book 1 of this series, we covered in detail several techniques
    for removal of outliers; interested readers are referred to it for more details.
    For the dataset in the above illustration, the correct modeling approach would
    be to either explicitly remove the outliers prior to model fitting or implement
    robust PCA that is less susceptible to outliers and choose control limits with
    correct significance level (such as 90% control limit instead of 95%).


    In high-dimensional dataset, it is not trivial to detect the presence of outliers
    from just a ‘quick glance’ and therefore, you may be tempted to skip outlier handling.
    However, as a best practice, your default assumption must always be that the training
    dataset is potentially infested with outliers and appropriate measures, as deemed
    suitable for the system at hand, must be put in place to handle outliers.'
  merge: -1
  pgno: 76
- img_proc: true
  md: '# Handling data imbalance


    If you are building a fault classification model, then you will invariably encounter
    the problem of data imbalance, wherein the number of data samples corresponding
    to faulty operations is much fewer compared to the number of NOC samples. Data
    imbalance is undesirable because it leads to the ML model training being dominated
    by NOC samples, resulting in the model not able to learn sufficiently about the
    faulty samples and eventually failing in correctly detecting (/classifying) process
    faults.


    ![](img/cfcc9569b5e92ea115855752abddd75a_77_0.png)


    How can data imbalance be rectified? One trivial strategy could be to discard
    most of the NOC samples (also termed undersampling) but this obviously leads to
    loss of crucial process information. The other approach would be to add more faulty
    samples to training dataset, but plant managers will not let you inject faults
    in their processes just so that your model can be trained. A popular mechanism
    to handle data imbalance is SMOTE (synthetic minority oversampling technique)
    wherein synthetic faulty samples are generated. The basic idea is illustrated
    below. Here, a random faulty sample (A) is selected and a synthetic data point
    is generated as illustrated. This procedure is repeated to create as many synthetic
    faulty samples as desired.


    ![](img/cfcc9569b5e92ea115855752abddd75a_77_1.png)


    > **Example 4.1:** We will generate an imbalanced dataset of NOC and faulty samples.
    Then we will learn how to use the imbalanced-learn package to balance the dataset.


    ```

    # import required packages

    import numpy as np, matplotlib.pyplot as plt

    from imblearn.over_sampling import SMOTE

    ```'
  merge: -1

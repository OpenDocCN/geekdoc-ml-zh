    ## 5.1 控制图：简单且久经考验的过程监控工具


    控制图是统计过程控制的七大<sup>24</sup>支柱之一，传统上用于监控关键生产或产品质量指标，以检测意外偏差。当过程处于“受控”状态时，监控变量预计仅围绕某个目标值或均值表现出自然原因引起的波动。如图5.1所示，控制图只是将单个过程变量的测量值相对于时间或样本编号进行绘制的显示。此外，这些图表包括一条中心线或预期均值，以及两条称为UCL（上控制限）和LCL（下控制限）的限线。大多数工业过程变量由于影响过程的随机扰动而表现出自然波动。控制限在统计上设计成在自然原因引起的波动下，监控变量以特定的期望概率保持在控制限内。控制限的突破表明潜在的过程故障或“失控”状态。因此，正确指定控制限对于确保最小的误报和快速检测故障至关重要。


    传统的控制图有三种不同的形式，即休哈特控制图、CUSUM控制图和EWMA控制图。休哈特控制图仅在控制图上绘制当前测量值，而另外两种则绘制当前和过去测量值的某种组合。你很快就会了解到，使用过去测量值如何能够检测到休哈特控制图可能无法检测到的早期或低幅度故障。控制图不仅限于跟踪过程测量值；任何预期仅围绕某个均值或目标表现出随机波动的指标都可以通过控制图进行监控。相应地，控制图也用于监控模型残差、潜变量（例如，在PCA中）等。让我们首先从休哈特控制图开始。


    ## 5.2 休哈特控制图简介


    休哈特控制图是最简单且广泛使用的控制图，其中每个采样时刻的过程测量值相对于样本编号绘制，控制限通常设置为$\mu \pm 3\sigma$，其中$\mu$和$\sigma$是受控过程变量的均值和标准差。中心线显然设置为$\mu$。休哈特控制图假设高斯分布，因此，$3\sigma$控制图相当于0.27%的误报率，如图5.2所示。


    统计量$\mu$和$\sigma$通常不是精确已知的，而是从历史受控数据中估计。设$x_1, x_2, \cdots, x_N$为历史良好运行期的观测值，则样本统计量可估计为$^{25}$


    $$\hat{\mu} = \bar{x} = \frac{1}{N} \sum_{i=1}^{N} x_i \quad ; \quad \hat{\sigma}
    = \frac{s}{c_4}$$


    其中s是样本标准差（$\sqrt{\frac{\sum(x_i-\bar{x})^2}{N-1}}$），$c_4$是一个校正因子$^{26}$（对于大$N$趋近于1），用于考虑有限样本。这导致以下控制限


    $$LCL = \bar{x} - 3\frac{s}{c_4} \quad ; \quad UCL = \bar{x} + 3\frac{s}{c_4}$$


    ### 每个样本的测量子组


    标准休哈特控制图假设在每个采样时刻有一个子组，例如$m$个测量值可用，如下图所示。


    在标准休哈特控制图上跟踪的是子组的均值。实际上，$m=1$的休哈特控制图被称为单值休哈特控制图。设$x_{ij}$表示第$i$个子组中的第$j^{th}$个测量值。可以使用历史IC（受控）数据获得子组均值的样本统计量，如下所示。


    对于连续过程，单值和标准休哈特控制图都有用。例如，假设工厂效率测量值每分钟可用一次。如果需要，工厂操作员可以使用单值控制图跟踪分钟级效率。或者，效率测量值可以按小时平均（$\Rightarrow
    m=60$），并跟踪小时平均效率值。


    虽然休哈特控制图易于解释和实施，但当用于检测过程变量均值的小偏差（$< 1.5\sigma$偏移）时，其性能较差。以下说明阐明了这一点。


    - 最后50个样本在均值上产生了0.5σ偏移

    - 休哈特控制图未能检测到故障

    - 即使从视觉上看，故障也几乎难以察觉


    图5.3：休哈特控制图未能检测到小的均值偏移


    为了理解如何生成休哈特图，让我们通过用于生成图5.3中图表的代码来讲解。


    ```python

    # import required packages

    import numpy as np, matplotlib.pyplot as plt


    # generate data

    x0 = np.random.normal(loc=10, scale=2, size=250) # NOC samples

    x1 = np.random.normal(loc=11, scale=2, size=50) # faulty samples

    x = np.hstack((x0,x1)) # combined data

    ```'

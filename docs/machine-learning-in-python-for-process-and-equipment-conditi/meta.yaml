    # Chapter 9


    # Multivariate Statistical Process Monitoring for Linear and Dynamic Processes


    In the previous chapters, we saw how beautifully latent variable-based MSPM techniques
    can extract hidden steady-state relationships from data. However, we imposed a
    major restriction of absence of dynamics in the dataset. Unfortunately, it is
    common to have to deal with industrial datasets that exhibit significant dynamics
    and the standard MSPM techniques fail in extracting dynamic relationships among
    process variables. Nonetheless, the MSPM research community came up with a simple
    but ingenious modification to the standard MSPM techniques that made working with
    dynamic dataset very easy. The trick entails including the past measurements as
    additional process variables. That’s it! The standard techniques can then be employed
    on the augmented dataset. The dynamic variants of the standard MSPM techniques
    are dynamic PCA (DPCA), dynamic PLS (DPLS), dynamic ICA (DICA), etc.


    Dynamic PCA and dynamic PLS are among the most popular techniques for monitoring
    linear and dynamic processes; accordingly, these are covered in detail in this
    chapter. Additionally, this chapter also introduces another very popular and powerful
    technique that is specially designed to extract dynamic relationships from process
    data – canonical variate analysis (CVA). Using numerical and industrial-scale
    case studies, we will see how to use these three techniques to build fault detection
    tools. Specifically, the following topics are covered


    +   - Introduction to dynamic PCA

    - Fault detection using DPCA

    - Introduction to dynamic PLS

    - Introduction to CVA

    - Fault detection using CVA for Tennessee Eastman process'
  - '[PAGE 157]


    # 9.1 Dynamic PCA: An Introduction


    Dynamic PCA is the dynamic extension of conventional PCA designed to handle process
    data that exhibit significant dynamics. DPCA simply entails application of conventional
    PCA to augmented data matrix which, as shown in Figure 9.1, is generated by using
    past measurements as additional process variables. Note that each ‘variable’ of
    the augmented matrix is normalized to zero mean and unit variance as is done in
    conventional PCA. It may seem surprising, but such a simple approach has achieved
    great success in process industry and has been readily adopted due to ease of
    implementation.


    ![](img/cfcc9569b5e92ea115855752abddd75a_157_0.png)


    All the mathematical expressions for the computations of the score matrix<sup>55</sup>,
    residual matrix, Hotelling’s $T^2$, and SPE remain the same (Eq. 1 to Eq. 8) as
    that shown in Chapter 7, except that now you will be using scaled $X_{aug}$ instead
    of $X$, i.e., $T = X_{aug}P$; $E = X_{aug} - \hat{X}_{aug}$. The procedure for
    determination of number of retained latent variables also remains the same. You
    may, amongst other approaches, look for a ‘knee’ in the scree plot of the explained
    variance or use the cumulative percent variance approach. If you choose ‘l’ correctly,
    then both the static and dynamic relationships among process variables are captured
    and correspondingly, the residuals and the Q statistic will not exhibit autocorrelations<sup>56</sup>.
    For test dataset, you would again simply perform augmentation with time-lagged
    measurements. Before we get into the nitty-gritties, let’s see a quick motivating
    example on why DPCA is superior to PCA in the presence of dynamics.


    <sup>55</sup> The number of retained principal components in DPCA could be greater
    than $m$.

    <sup>56</sup> The DPCA scores can show autocorrelations.'
- md: "## Example 9.1:\n\nTo illustrate how DPCA can extract dynamic relationships,\
    \ let's consider the following noise-free dynamic system.\n\n$x_1(k) = 0.8x_1(k-1)\
    \ + x_2(k-1); \\quad k \\text{ is sampling instant}$\n\nThe number of zero singular\
    \ (eigen) values extracted during PCA indicates the number of linear relationships\
    \ that exist among the process variables. Let's see if we can extract out the\
    \ above dynamic relationship using only data (1000 samples of $x_1$ and $x_2$).\n\
    \n```python\n# import required packages\nimport numpy as np, matplotlib.pyplot\
    \ as plt\nfrom sklearn.decomposition import PCA\n\n# generate data for the system:\
    \ x1(k) = 0.8*x1(k-1) + x2(k-1)\nx2 = np.random.normal(loc=0, scale=1, size=(1000,1))\n\
    x1 = np.zeros((1000,1))\nfor k in range(1,1000):\n    x1[k] = 0.8*x1[k-1] + x2[k-1]\n\
    X = np.hstack((x1, x2))\n\n# function to generate augmented matrix\ndef augment(X,\
    \ n_lags):\n    N, m = X.shape\n    X_aug = np.zeros((N-n_lags, (n_lags+1)*m))\n\
    \    for sample in range(n_lags, N):\n        XBlock = X[sample-n_lags:sample+1,:]\n\
    \        X_aug[sample-n_lags,:] = np.reshape(XBlock, (1,-1), order = 'F')\n  \
    \  return X_aug\n\n# fit DPCA model\nX_aug = augment(X, 1) # augment data\nX_aug_centered\
    \ = X_aug - np.mean(X_aug, axis=0) # center data\ndpca = PCA().fit(X_aug_centered)\
    \ # fit PCA model\nprint('DPCA singular values:', dpca.singular_values_) # get\
    \ singular values\n```\n\n>>> DPCA singular values: [6.664e+01 3.731e+01 3.094e+01\
    \ 1.1661e-14]\n\nAs expected, only one singular value is very close to zero. All\
    \ we now need to do is fetch the singular vector corresponding to this singular\
    \ value and check if it represents our dynamic system.\n\n```python\n# get 4th\
    \ singular vector\nprint('4th singular vector: ', dpca.components_[3,:])\n\n>>>\
    \ 4th singular vector: [ 4.923e-01 -6.154e-01  6.154e-01  1.7348e-17]\n\nThe 4th\
    \ singular vector represents the following relation\n$$0.4923x_1(k-1) - 0.6154\
    \ x_1(k) + 0.6154x_2(k) = 0$$\n$$\\Rightarrow x_1(k) = 0.8x_1(k-1) + x_2(k-1)$$\n\
    \nVoila! DPCA has successfully extracted the underlying process dynamics. PCA\
    \ on the other hand does not reveal any relationship between the variables.\n\
    ```\n\n## Time lag ($l$) determination\n\nThe time lag ($l$) is decided by the\
    \ dynamic order of the process. Unfortunately, the dynamic order is usually unknown.\
    \ An algorithm for time lag determination was first proposed by Ku et al.$^{57}$\
    \ in 1995. Another commonly used strategy was given by Rato and Reis$^{58}$, and\
    \ is reproduced below.\n\n## Algorithm: Time lag determination for DPCA\n\n1.\
    \  Initialize $l = 0$ and specify some maximum value of lag $l_{max}$\n2.  Generate\
    \ the augmented data matrix $X_{aug}$\n3.  Perform singular value decomposition\
    \ of covariance matrix ($\\Sigma_{X_{aug}}$) of $X_{aug}$. Let $s_{ml+1}$ be the\
    \ ($ml + 1$)$^{th}$ singular value of $\\Sigma_{X_{aug}}$. Define $KSV(l) = s_{ml+1}$.\n\
    4.  Define $KSVR(l) = KSV(l) / KSV(l-1)$ for $l > 0$\n5.  If $l < l_{max}$, set\
    \ $l = l + 1$ and go to step 2, else go to step 6\n6.  Normalize KSV and KSVR\n\
    \    $$KSV_{normal}(l) = \\frac{KSV(l) - \\min(KSV)}{\\max(KSV) - \\min(KSV)}$$\n\
    \    $$KSVR_{normal}(l) = \\frac{KSVR(l) - \\min(KSVR)}{\\max(KSVR) - \\min(KSVR)}$$\n\
    7.  Find $l^*$ as the first $l$ such that $KSVR(l) < KSVR(l-1)$\n8.  Determine\
    \ the optimal $l_{opt} \\in [1, l_{max}]$ as\n    $$l_{opt} = argmin \\sqrt{KSV_{normal}(l)^2\
    \ KSVR_{normal}(l)^2} , \\quad s.t. \\ l \\geq l^*$$\n\n$^{57}$ Ku et al., Disturbance\
    \ detection and isolation by dynamic principal component analysis. *Chemometrics\
    \ and intelligent laboratory systems*, 1995.\n$^{58}$ Rato and Reis, Defining\
    \ the structure of DPCA models and its impact on process monitoring and prediction\
    \ activities. *Chemometrics and intelligent laboratory systems*, 2013\n\n## 9.2\
    \ Fault Detection via DPCA: Numerical Illustration\n\nTo illustrate each step\
    \ of DPCA-based fault detection, we will use a simple synthetic 2 input, 2 output\
    \ process<sup>59</sup> as shown below\n\n$$z(k) = \\begin{bmatrix} 0.118 & -0.191\
    \ \\\\ 0.847 & 0.264 \\end{bmatrix} z(k-1) + \\begin{bmatrix} 1 & 2 \\\\ 3 & -4\
    \ \\end{bmatrix} u(k-1)$$\n$$u(k) = \\begin{bmatrix} 0.811 & -0.226 \\\\ 0.477\
    \ & 0.415 \\end{bmatrix} u(k-1) + \\begin{bmatrix} 0.193 & 0.689 \\\\ -0.320 &\
    \ -0.749 \\end{bmatrix} w(k-1)$$\n$$y(k) = z(k) + v(k)$$\n\nHere, the outputs\
    \ ($y(k)$) and inputs ($u(k)$) measurements are available for analysis. $w(k)$\
    \ and $v(k)$ are zero-mean random noise signals with variances 1 and 0.1, respectively.\
    \ Simulated data from the process are available in files *multivariate_NOC_data.txt*\
    \ and *multivariate_test_data.txt*. In test data, A disturbance with unit step\
    \ change of $w_2$ was introduced at sample 50 to simulate a faulty condition.\n\
    \nWe will now go through each step of building a DPCA-based fault detection solution.\
    \ Let's begin by reading the datasets, generating the augmented data matrices,\
    \ and then training the DPCA model.\n\n```python\n# fetch data\nX_NOC = np.loadtxt('multivariate_NOC_data.txt')\n\
    X_test = np.loadtxt('multivariate_test_data.txt')\n\n#%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    #           DPCA model training\n#%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n# augment\
    \ and scale data\nX_NOC_aug = augment(X_NOC, 1)\nscaler = StandardScaler()\nX_NOC_aug_scaled\
    \ = scaler.fit_transform(X_NOC_aug)\n\n# fit PCA model on augmented data\ndpca\
    \ = PCA().fit(X_NOC_aug_scaled)\n\n# find n_component\nexplained_variance = 100*dpca.explained_variance_ratio_\
    \ # in percentage\ncum_explained_variance = np.cumsum(explained_variance) # cumulative\
    \ % variance explained\nn_comp = np.argmax(cum_explained_variance >= 95) + 1\n\
    \n# refit with n_comp\ndpca = PCA(n_components=n_comp)\ndpca.fit(X_NOC_aug_scaled)\n\
    \n# compute scores and error for training data\nscores_NOC = dpca.transform(X_NOC_aug_scaled)\n\
    X_NOC_aug_scaled_reconstruct = dpca.inverse_transform(scores_NOC)\nerror_NOC =\
    \ X_NOC_aug_scaled - X_NOC_aug_scaled_reconstruct\n\n# calculate Q for training\
    \ data\nQ_NOC = np.sum(error_NOC*error_NOC, axis = 1)\n\n# calculate T2 for training\
    \ data\nN = X_NOC_aug_scaled.shape[0]\nlambda_k = np.diag(dpca.explained_variance_)\
    \ # eigenvalue = explained variance\nlambda_k_inv = np.linalg.inv(lambda_k)\n\n\
    T2_NOC = np.zeros((N,))\nfor i in range(N):\n    T2_NOC[i] = np.dot(np.dot(scores_NOC[i,:],\
    \ lambda_k_inv), scores_NOC[i,:].T)\n\n# control limits\nQ_CL = np.percentile(Q_NOC,\
    \ 99)\nT2_CL = np.percentile(T2_NOC, 99)\n```\n\nLet's now deploy the DPCA model\
    \ on the test data and see if the monitoring statistics violate the control limits.\n\
    \n```python\n# augment and scale test data\nX_test_aug = augment(X_test, 1)\n\
    X_aug_test_scaled = scaler.transform(X_test_aug)\n\n# compute scores and error\
    \ for test data\nscores_test = dpca.transform(X_aug_test_scaled)\nX_aug_test_scaled_reconstruct\
    \ = dpca.inverse_transform(scores_test)\nerror_test = X_aug_test_scaled - X_aug_test_scaled_reconstruct\n\
    \n# calculate Q and T2 for test data\nQ_test = np.sum(error_test*error_test, axis\
    \ = 1)\nN_test = X_aug_test_scaled.shape[0]\nT2_test = np.zeros((N_test,))\nfor\
    \ i in range(N_test):\n    T2_test[i] = np.dot(np.dot(scores_test[i,:], lambda_k_inv),\
    \ scores_test[i,:].T)\n\n# monitoring charts for test data\nplt.figure(), plt.plot(Q_test),\
    \ plt.plot([1,len(Q_test)],[Q_CL,Q_CL], color='red')\nplt.xlabel('Sample #'),\
    \ plt.ylabel('Q for test data')\n\nplt.figure(), plt.plot(T2_test), plt.plot([1,len(T2_test)],[T2_CL,T2_CL],\
    \ color='red')\nplt.xlabel('Sample #'), plt.ylabel('T$^2$ for test data')\n```\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_162_0.png)\n\nYou can see that DPC-based\
    \ fault detection procedure is the same as that for PCA-based fault detection,\
    \ except for the augmentation of data. In general, DPCA has been found to perform\
    \ better than PCA when temporal correlation is present in data.\n\n## Contribution\
    \ plots for fault diagnosis\n\nThe $T^2$ and $Q$ contributions for each variable\
    \ of the augmented matrix are computed in the same way as done for PCA. The overall\
    \ contribution for an original variable is obtained by summing up the contributions\
    \ for the variable and each of its $l$ time lagged variables.\n\n## 9.3 Dynamic\
    \ PLS: An Introduction\n\nDynamic PLS is the dynamic extension of conventional\
    \ PLS. As shown in Figure 9.2, DPLS entails employment of lagged measurements\
    \ as additional predictor variables. As shown, there are two ways of generating\
    \ a DPLS model: by including lagged values of only input variables or both input\
    \ and output variables. While the first approach leads to FIR type of model, the\
    \ later approach leads to ARX type of model. Like DPCA, once the augmented matrix\

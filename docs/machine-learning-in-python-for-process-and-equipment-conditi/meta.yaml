    \ CUSUM control charts. We will also see the impact of $k$ on chart performance.\n\
    \n```\n# CUSUM chart\nmu, sigma = np.mean(x0), np.std(x0)\nk, H = 0.25*sigma,\
    \ 5*sigma\n\nS_positive, S_negative = np.zeros((len(x),)), np.zeros((len(x),))\n\

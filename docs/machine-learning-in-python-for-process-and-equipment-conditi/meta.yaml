    $^{62}$ The number of lead values used to define $f(k)$ is commonly taken equal
    to the number of lags used in $p(k)$


    $^{63}$ Alternatively, $\hat{x}(k) = U_n^T \Sigma_{pp}^{-1/2} p(k)$ where $U_n$
    contains the first $n$ columns of $U$.'
  - '[PAGE 168]


    criterion. An alternative approach was suggested by Odiowei and Cao<sup>64</sup>
    who suggest checking the autocorrelation function of the summed squares of the
    process variables and choosing the maximum value of lag for which the autocorrelation
    is significant as the lag order. Another convenient approach was given by Zhang
    et al.<sup>65</sup> who suggest choosing lag order as the minimum $s$ that that
    satisfies the following equation


    $$A_{s+1} = \frac{\sqrt{\sum_{j=1}^{M}\left(autocorr(x_j, s+1)\right)^2}}{\sqrt{\sum_{i=1}^{s}
    \sum_{j=1}^{M}\left(autocorr(x_j, i)\right)^2 / s}} \leq \vartheta$$


    Where $autocorr(x_j, i)$ is the autocorrelation coefficient of the $j^{th}$ variable
    at time lag $i$. The threshold is chosen between 0 and 0.5.


    # Model order ($n$)


    Correct selection of the value for $n$ is important: while too large a value leads
    to model overfitting, too small value for $n$ leads to underfitting. One approach
    for model order selection is based on Hankel singular values. If the plot of the
    singular values vs model order has a prominent ‘elbow’, then the model order corresponding
    to the elbow can be chosen as shown below


    ![](img/cfcc9569b5e92ea115855752abddd75a_168_0.png)


    Another practice is to choose $n$ such that the normalized values of the $(n+1)^{th}$
    onwards singular values are below some threshold. However, very often there is
    no elbow or the singular values decrease slowly. Therefore, the more extensively
    used criteria for model order selection is AIC<sup>66</sup>.'
  - '[PAGE 169]


    # Process monitoring/fault detection indices


    In CVA-based fault detection strategy, 3 indices - $T_s^2, T_e^2, Q$ - are computed.
    The computation of these metrics and their corresponding threshold are shown below.
    Note that the threshold expressions are based on the assumption that process variables
    are Gaussian distributed; if this assumption is invalid then empirical techniques
    such as KDE or percentile may be employed.


    | Metric 1: $T_s^2$ | Metric 2: $T_e^2$ | Metric 3: $Q$ |

    | :--- | :--- | :--- |

    | $T_s^2(k) = x^T(k)x(k)$<br>$= p^T(k) J_n^T J_n p(k)$ | $T_e^2(k) = p^T(k) J_e^T
    J_e p(k)$ | $Q(k) = r^T(k)r(k)$<br>$r(k) = p(k) - J_n^T J_n p(k)$ |

    | Threshold @ significance level $\alpha$ | Threshold @ significance level $\alpha$
    | Threshold @ significance level $\alpha$ |

    | $T_{s,CL}^2 = \frac{n(N^2-1)}{N(N-n)} F_{\alpha}(n, N-n)$ | $T_{e,CL}^2 = \frac{z(N^2-1)}{N(N-z)}
    F_{\alpha}(z, N-z)$ | $Q_{CL} = \frac{\sigma}{2\mu} \chi_{\alpha}^2 \left( \frac{2\mu^2}{\sigma}
    \right)$ |


    +   - $J_e$ contains all except the first $n$ rows of $J$ i.e., the last $\ell(m+r)-n$
    rows of $J$

    - $z = \ell(m+r)-n$

    - $F_{\alpha}(n, N-n)$ is the 1-$\alpha$ percentile of a $F$ distribution with
    $n$ and $N-n$ degrees of freedom

    - $\chi_{\alpha}^2(h)$ is the (1-$\alpha$) percentile of a chi-squared distribution
    with $h$ degrees of freedom; $\mu$ denotes the mean value and $\sigma$ denotes
    the variance of the Q metric

    - Significance level of $\alpha = 0.05$ would mean that there is a 5% chance that
    an alert is false


    # (Unsupervised) CVA modeling with only output variables


    CVA can also be used to capture dynamic correlations in datasets where the variables
    are not divided into input and outputs. The state-space model that results is
    the following


    ```

    $x(k+1) = Ax(k) + w(k)$

    $y(k) = Cx(k) + v(k)$

    ```


    Such an approach can be used to monitor a process operating around a stable point.
    The overall approach remains the same (as shown in Figure 9.4) except for the
    definition of past and future vectors which are now defined as follows


    ```

    $p(k) = [y^T(k-1) \ y^T(k-2) \ \cdots \ y^T(k-\ell)]^T$

    $f(k) = [y^T(k) \ y^T(k+1) \ \cdots \ y^T(k+\ell)]^T$

    ```'

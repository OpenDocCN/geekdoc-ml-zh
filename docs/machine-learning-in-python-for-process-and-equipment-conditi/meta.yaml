    \n![](img/cfcc9569b5e92ea115855752abddd75a_47_0.png)\n\nSuppose you need to perform\
    \ element-wise summation of two 1D arrays. One approach is to access items at\
    \ each index at a time in a loop and sum them. Another approach is to sum up items\
    \ at multiple indexes at once. The later approach is called vectorized operation\
    \ and can lead to significant boost in computational time for large datasets and\
    \ complex operations.\n\n```python\n# vectorized operations\nvec1 = np.array([1,2,3,4])\n\
    vec2 = np.array([5,6,7,8])\nvec_sum = vec1 + vec2 # returns array([6,8,10,12]);\
    \ no need to loop through index 0 to 3\n```\n\n```python\n# slightly more complex\
    \ operation (computing distance between vectors)\nvec_distance = np.sqrt(np.sum((vec1\

  md: '# 11.1 Need and Methods for Specialized Handling of Multimode Processes


    In process systems, multimode operations occur naturally due to varied reasons.
    For example, in a power generation plant, production level changes according to
    the demand leading to significantly different values of plant variables with potentially
    different inter-variable correlations at different production levels. The multimode
    nature of data distribution causes problems with traditional ML techniques. To
    understand this, consider the illustrations in Figure 11.1. In subfigure (a),
    data indicates 2 distinct modes of operation. From process monitoring perspective,
    it would make sense to draw separate monitoring boundaries around the two clusters;
    doing so would clearly identify the red-colored data-point as an outlier or a
    fault. The Conventional PCA-based monitoring, on the other hand, would fail to
    identify the outlier. In subfigure (b), the correlation between the variables
    is different in the two clusters. It would make sense to build separate models
    for the two clusters to capture the different correlation structure. The Conventional
    PLS model would give inaccurate results.


    ![](img/cfcc9569b5e92ea115855752abddd75a_194_0.png)


    A few different methodologies have been adopted by the PSE community to monitor
    multimode process operations. Let’s familiarize ourselves quickly with these.


    # Multiple model approach


    Here, separate models are built for each of the clusters corresponding to the
    different operation modes as shown in the figure below. Once the clusters have
    been characterized in the training data and cluster-wise models have been built,
    prediction for a new sample can be obtained by either only considering the cluster-model
    most suitable for the new sample or combining the predictions from all the models
    as shown in Figure 11.2. The decision fusion module can also take various forms.
    For example, for a process monitoring application, a simple fusion strategy could
    be to consider a new sample as a normal sample if atleast one of the cluster-models
    predict so. A different strategy could be to combine the abnormality metrics from
    all the models and make prediction based on this fused metric. Similarly, for
    soft sensing application, response variable prediction from individual models
    can be weighted and combined to provide final prediction.'
  merge: -1
  pgno: 194
- img_proc: true
  md: '![](img/cfcc9569b5e92ea115855752abddd75a_195_0.png)


    # Lazy or just-in-time learning


    In this approach, the model building exercise is carried out online. When new
    process data come in, relevant data are fetched from the historical dataset that
    are similar to the incoming samples based on some nearest neighborhood criterion.
    A local model is built using the fetched relevant data. The obtained model processes
    the incoming samples and is then discarded. A new local model is built when the
    next samples come in.


    ![](img/cfcc9569b5e92ea115855752abddd75a_195_1.png)'
  merge: -1
  pgno: 195
- img_proc: true
  md: '# External analysis


    In this strategy, the influence of process variables (called external variables)
    such as product grade, feed flow, etc., that lead to multimode operation is removed
    from the other ‘main’ process variables and then the conventional MSPM techniques
    are employed on the ensuing residuals as shown in the figure below.


    ![](img/cfcc9569b5e92ea115855752abddd75a_196_0.png)


    # Single model approach


    In this approach a single model is built with the hope that it captures the presence
    of different modes of operation. Several ML techniques fall in this category such
    as neural networks, SVDD, etc. You will learn about them in the next parts of
    the book.


    # Proximity-based approach


    In this approach the presence of multiple NOC clusters is taken into account by
    making inference for a test sample based on the sample’s proximity to the NOC
    samples. Proximity measures such as distance from neighbors or local density is
    commonly employed. We will cover these techniques in Chapter 14.


    In this chapter, we will focus upon on the multi-modal approach which involves
    finding the different clusters in the dataset. Therefore, let’s now acquaint ourselves
    with some popular clustering techniques. However, before we do that, let’s take
    a quick look at the dataset that we will work with.'

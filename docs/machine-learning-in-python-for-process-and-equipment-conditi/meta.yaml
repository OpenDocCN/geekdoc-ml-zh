- md: '## 1.3 ML Modeling Landscape for Plant Health Management


    As process data scientists, we have to live with the harsh truth that there is
    no single universally good model for all occasions. One reason for this is that
    process data can show different characteristics (such as nonlinearity, non-Gaussianity,
    dynamics, multi-modality, etc.) which necessitates selection of different modeling
    methodologies. Additionally, the availability of historical faulty data, the user''s
    end goal, and the type of installed sensors can also influence the model selection
    as shown in Figure 1.6. This makes the task of correct selection of ML model daunting
    (and potentially overwhelming for beginner PDSs). Fortunately, the recourse is
    open-secret and is as simple as having a good understanding of your data and system,
    and conceptually sound knowledge of pros and cons of the available methods.


    ![](img/cfcc9569b5e92ea115855752abddd75a_27_0.png)


    Before you embark upon modeling your process system, you would already have knowledge
    of the various factors listed in the above figure, except possibly for the data
    characteristics. We will study the techniques used to ascertain data characteristics
    in Chapter 3. Now that we understand the factors that influence model selection,
    we are ready to see what models are available at our disposal.


    > Traditional process measurements such as flow, temperature, pressure, composition,
    etc., and vibration measurements dominate the signals recorded in process industry.
    Therefore, case studies presented in this book use only these signals. Computer
    vision-based ML solutions are not covered.


    Figure 1.7 below shows the modeling methodologies for process monitoring that
    we will cover in this book. Fault detection and diagnosis are precursors to fault
    prognosis and therefore the same methodologies are employed for building predictive
    maintenance solutions as well. As the category topics show, these methods cater
    to process data with different characteristics. The methods range from ‘simple’
    traditional control charts to modern deep learning.


    ![](img/cfcc9569b5e92ea115855752abddd75a_28_0.png)


    The category of MSPM (multivariate statistical process monitoring) methods (PCA,
    PLS, GMM, etc.) deserves special attention as it has been the bedrock of health
    monitoring of complex process plants. A large section of the book will therefore
    cater to these methods. However, irrespective of their popularity, MSPM methods
    have shortcomings. Therefore, machine learning and deep learning models like Autoencoders,
    LSTMs, LOFs are covered as well.


    In Figure 1.7, the modeling methodologies have been broadly divided into four
    categories, viz, univariate statistical models, multivariate statistical models,
    classical machine learning models, and artificial neural networks (ANN) models.
    Each of these categories are dealt with in separate parts of the book. The statistical⁴
    PM models extract a statistical model of the system using past data. Within this
    category lies simple control-chart models that are used for single variable monitoring.
    Though useful, these univariate models are understandably too restrictive to handle
    plantwide monitoring of complex industrial plants. On the other end of the model
    spectrum lies complex deep learning models that can theoretically handle any type
    of process systems; the downside is cumbersome model training procedure and hyperparameter
    optimization. In between these two extremes, lie the MSPM methods whose ease of
    implementation and interpretable results have led to wide popularity. However,
    MSPM methods tend to falter for highly nonlinear processes with complex data distributions.
    Therefore, classical ML and deep learning methods have been receiving considerable
    attention for process monitoring solution development for complex industrial processes.


    The models in Figure 1.7 cater to the different scenarios that you may encounter
    in practice. If you have abundant past faulty samples then classification models
    such as FDA, SVM, ANN, etc. can be employed. However, in process industry, most
    of the time you will not have the luxury of having past faulty data and therefore,
    many of the fault detection techniques covered in this book cater to this scenario.
    The figure below illustrates the different principles employed to detect the presence
    of process faults using only NOC data during model training.


    ⁴ In legacy process monitoring terminology, statistical process monitoring is
    also called statistical process control (SPC). Although SPC methods do not involve
    any feedback to the process controllers, the word ‘control’ signifies the objective
    of keeping the process ‘in-control’ through continuous monitoring.


    ### Projection-based


    ![](img/cfcc9569b5e92ea115855752abddd75a_30_0.png)


    - High-dimensional NOC data are assumed to lie along a lower-dimensional latent
    space.

    - Projection-based methods (such as PCA, ICA, KPCA, etc.) project original test
    sample in the latent space.

    - The position of test sample in latent space and its reconstruction error are
    used to detect process fault.


    ### Boundary around NOC samples


    ![](img/cfcc9569b5e92ea115855752abddd75a_30_1.png)


    - Training data is assumed to provide adequate representation of the region in
    the measurement space that NOC data are expected to lie in.

    - Methods like Hotelling''s T² and SVDD can generate an implicit boundary around
    the NOC samples and provide a measure of how far a test sample lie from the NOC.


    ### Distance from neighbors or local density-based


    ![](img/cfcc9569b5e92ea115855752abddd75a_30_2.png)


    - Distance of a test sample from the neighboring NOC samples is used to infer
    its abnormality. KNN method can be used for this.

    - Alternatively, local density in the region where the test sample falls in can
    be used to classify the test sample as faulty or normal. LOF method can be used
    for this.


    ### Input-output regression-based


    ![](img/cfcc9569b5e92ea115855752abddd75a_30_3.png)


    - Variables are categorized into predictor and response variables.

    - A regression model (ANN, PLS, SVR, Random Forest, etc.) is fitted to capture
    NOC behavior and prediction errors (or residuals) are generated.

    - The residuals are monitored (using control charts, PCA, etc.) to detect the
    presence of faults.


    Figure 1.8: Popular fault detection methodologies using only NOC data


    Note that the models in Figure 1.7 are applicable to both equipment level monitoring
    and plantwide monitoring. Let us now move to an overview of how these models are
    actually developed.


    ## 1.4 ML Model Development Workflow


    In Figure 1.7, we saw different types of ML models for PM applications. Fortunately,
    the workflow for model development and deployment remains similar, and is shown
    in Figure 1.9. As is typical for a ML project, the tasks can be categorized into
    offline computations and online/real-time computations. In online computations,
    process data are parsed through the model to provide real-time insights and results.
    The models are built offline using historical process data. This offline exercise
    is performed once or repeated at regular intervals for model update. Brief description
    of the essential steps performed are provided below:


    - *Exploratory data analysis*: Exploratory data analysis (EDA) involves preliminary
    investigation of data to get a ‘feel’ of the process dataset characteristics.
    The activities may include assessment of the presence of nonlinear relationships
    among process variables, non-Gaussian distribution, etc. Inferences made during
    EDA help make the right model selection. EDA is covered in detail in Chapter 3.


    ![](img/cfcc9569b5e92ea115855752abddd75a_31_0.png)


    - *Sample and variable selection*: One does not simply dump all the available
    historical data and sensor measurements into a model training module. If a model
    is being built to identify the normal process behavior, then care must be taken
    to include only samples from fault-free operations in the model training dataset.
    Furthermore, if your model does not handle dynamics then data from periods of
    process transitions should be excluded.


    Variable selection warrants judicious consideration as well. Inclusion of unnecessary
    variables makes data noisier and reduces effectiveness of fault detection model.
    A generic guidance is to include only those variables that can assist in early
    fault detection; a variable that does not show any change in behavior under the
    influence of process faults of interest should be excluded.


    - *Data pre-processing*: “Garbage in, garbage out” is an age-old principle in
    computer simulations. The same holds for ML model training for PHM. Your model
    will be practically useless if training data is not ‘clean’. Your process monitoring
    model won’t be able to detect process abnormalities accurately if it has been
    trained with outlier-infested training data. Data pre-processing includes, amongst
    others, identification and removal of outliers, noise reduction, transformation
    of variables, and extraction of features. The overall objective of this step is
    to increase the ‘information content’ of your training dataset so that the PM
    model’s ability to distinguish between normal and faulty operations is bolstered.
    Several aspects of data pre-processing are dealt with in Chapter 4.


    - *Model training and validation*: Model training imply estimating the parameters
    of the chosen ML model, for example, the neuron weights in an ANN model. Model
    validation is employed for finding optimal values of model hyperparameters, for
    example, the number of neurons in the ANN model. At the end of this step, the
    coveted process model is obtained.


    Additional activities related to computation of health indicator and subsequent
    RUL estimation involved in fault prognosis are covered in Part 7 of the book which
    deals specifically with prognostic techniques for predictive maintenance applications.'
  mdcn: '## 1.3 用于植物健康管理的机器学习建模全景


    作为过程数据科学家，我们必须接受一个严酷的现实：不存在一个在所有场合都普遍适用的单一模型。原因之一在于过程数据可能表现出不同的特性（如非线性、非高斯性、动态性、多模态性等），这要求我们选择不同的建模方法。此外，如图1.6所示，历史故障数据的可用性、用户的最终目标以及已安装传感器的类型也会影响模型选择。这使得正确选择机器学习模型的任务变得艰巨（对于初学者过程数据科学家来说可能尤其令人望而生畏）。幸运的是，解决之道是公开的秘密，且非常简单：充分理解你的数据和系统，并对可用方法的优缺点有概念上清晰的认识。


    ![](img/cfcc9569b5e92ea115855752abddd75a_27_0.png)


    在你着手对过程系统建模之前，你可能已经了解了上图列出的各种因素，除了数据特性。我们将在第3章研究用于确定数据特性的技术。既然我们理解了影响模型选择的因素，我们就可以看看有哪些模型可供我们使用。


    > 传统的过程测量，如流量、温度、压力、组分等，以及振动测量，主导着过程工业中记录的信号。因此，本书中的案例研究仅使用这些信号。不涵盖基于计算机视觉的机器学习解决方案。


    下图1.7展示了本书将涵盖的过程监控建模方法。故障检测和诊断是故障预测的先兆，因此，构建预测性维护解决方案也采用相同的方法。正如类别主题所示，这些方法适用于具有不同特性的过程数据。这些方法范围从“简单”的传统控制图到现代深度学习。


    ![](img/cfcc9569b5e92ea115855752abddd75a_28_0.png)


    多元统计过程监控方法（MSPM）（如PCA、PLS、GMM等）这一类别值得特别关注，因为它一直是复杂过程工厂健康监控的基石。因此，本书的很大一部分将专门介绍这些方法。然而，无论其流行程度如何，MSPM方法都有其局限性。因此，本书也涵盖了机器学习和深度学习模型，如自编码器、LSTM、LOF等。


    在图1.7中，建模方法被大致分为四类，即：单变量统计模型、多元统计模型、经典机器学习模型和人工神经网络模型。本书的各个部分将分别讨论这些类别。统计⁴预测性维护模型利用历史数据提取系统的统计模型。在这一类别中，包括用于单变量监控的简单控制图模型。虽然有用，但这些单变量模型对于复杂工业工厂的全厂监控来说，其局限性是显而易见的。在模型谱系的另一端是复杂的深度学习模型，理论上可以处理任何类型的过程系统；其缺点是模型训练过程繁琐且需要超参数优化。介于这两个极端之间的是MSPM方法，其易于实现和结果可解释的特点使其广受欢迎。然而，对于具有复杂数据分布的高度非线性过程，MSPM方法往往表现不佳。因此，对于复杂工业过程的过程监控解决方案开发，经典机器学习和深度学习方法正受到相当多的关注。


    图1.7中的模型适用于你在实践中可能遇到的不同场景。如果你有大量历史故障样本，那么可以使用分类模型，如FDA、SVM、ANN等。然而，在过程工业中，大多数时候你不会有拥有历史故障数据的奢侈条件，因此，本书涵盖的许多故障检测技术都适用于这种场景。下图说明了在模型训练期间仅使用正常工况数据检测过程故障存在所采用的不同原理。


    ⁴ 在传统的过程监控术语中，统计过程监控也称为统计过程控制。尽管SPC方法不涉及对过程控制器的任何反馈，但“控制”一词意味着通过持续监控使过程保持“受控”状态的目标。


    ### 基于投影的方法


    ![](img/cfcc9569b5e92ea115855752abddd75a_30_0.png)


    -   假设高维正常工况数据位于一个低维潜在空间中。

    -   基于投影的方法（如PCA、ICA、KPCA等）将原始测试样本投影到潜在空间中。

    -   测试样本在潜在空间中的位置及其重构误差用于检测过程故障。


    ### 围绕正常工况样本的边界


    ![](img/cfcc9569b5e92ea115855752abddd75a_30_1.png)


    -   假设训练数据充分代表了正常工况数据预期所在的测量空间区域。

    -   像Hotelling''s T²和SVDD这样的方法可以在正常工况样本周围生成一个隐式边界，并提供测试样本偏离正常工况的程度度量。


    ### 基于邻居距离或局部密度的方法


    ![](img/cfcc9569b5e92ea115855752abddd75a_30_2.png)


    -   测试样本与邻近正常工况样本的距离用于推断其异常性。KNN方法可用于此目的。

    -   或者，测试样本所在区域的局部密度可用于将测试样本分类为故障或正常。LOF方法可用于此目的。


    ### 基于输入-输出回归的方法


    ![](img/cfcc9569b5e92ea115855752abddd75a_30_3.png)


    -   变量被分为预测变量和响应变量。

    -   拟合一个回归模型（ANN、PLS、SVR、随机森林等）以捕捉正常工况行为，并生成预测误差（或残差）。

    -   监控残差（使用控制图、PCA等）以检测故障的存在。


    图1.8：仅使用正常工况数据的流行故障检测方法


    请注意，图1.7中的模型既适用于设备级监控，也适用于全厂监控。现在让我们概述一下这些模型实际上是如何开发的。


    ## 1.4 机器学习模型开发工作流


    在图1.7中，我们看到了用于预测性维护应用的不同类型的机器学习模型。幸运的是，模型开发和部署的工作流程是相似的，如图1.9所示。正如机器学习项目的典型情况一样，任务可以分为离线计算和在线/实时计算。在在线计算中，过程数据通过模型进行解析，以提供实时洞察和结果。模型是使用历史过程数据离线构建的。这项离线工作执行一次或定期重复以进行模型更新。下面简要描述执行的基本步骤：


    -   *探索性数据分析*：探索性数据分析涉及对数据的初步调查，以“感受”过程数据集的特性。活动可能包括评估过程变量之间是否存在非线性关系、非高斯分布等。在EDA期间做出的推断有助于做出正确的模型选择。第3章详细介绍了EDA。


    ![](img/cfcc9569b5e92ea115855752abddd75a_31_0.png)


    -   *样本和变量选择*：不能简单地将所有可用的历史数据和传感器测量值都丢进模型训练模块。如果构建模型是为了识别正常过程行为，则必须注意仅在模型训练数据集中包含来自无故障操作的样本。此外，如果你的模型不处理动态性，则应排除来自过程过渡期的数据。


    变量选择也需要审慎考虑。包含不必要的变量会使数据噪声增加，并降低故障检测模型的有效性。一个通用的指导原则是只包含那些有助于早期故障检测的变量；在相关过程故障影响下行为没有任何变化的变量应予以排除。


    -   *数据预处理*：“垃圾进，垃圾出”是计算机模拟中一个古老的原则。对于预测性维护的机器学习模型训练同样适用。如果训练数据不“干净”，你的模型实际上将毫无用处。如果你的过程监控模型是用充满异常值的训练数据训练的，它将无法准确检测过程异常。数据预处理包括（但不限于）异常值的识别和去除、噪声降低、变量变换和特征提取。此步骤的总体目标是增加训练数据集的“信息含量”，从而增强预测性维护模型区分正常操作和故障操作的能力。第4章讨论了数据预处理的多个方面。


    -   *模型训练和验证*：模型训练意味着估计所选机器学习模型的参数，例如，人工神经网络模型中的神经元权重。模型验证用于寻找模型超参数的最佳值，例如，人工神经网络模型中的神经元数量。在此步骤结束时，将获得梦寐以求的过程模型。


    与健康指标计算以及随后的剩余使用寿命估计相关的额外活动，涉及故障预测，将在本书第7部分中介绍，该部分专门讨论预测性维护应用的预测技术。'

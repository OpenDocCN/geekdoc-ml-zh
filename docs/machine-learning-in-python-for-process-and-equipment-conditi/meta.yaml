    # Chapter 8


    # Multivariate Statistical Process Monitoring for Linear and Steady-State Processes:
    Part 2


    By now you must be very impressed with the powerful capabilities of PCA and PLS
    techniques. These methods allowed us to extract latent variables and monitor systematic
    variations in latent space and process noise separately. However, you may ask,
    “Are these the best latent variable-based techniques to use for all problems?”.
    We are glad that you asked! Other powerful methods do exist which may be better
    suited in certain scenarios. For example, independent component analysis (ICA)
    is preferable over PCA when process data is not Gaussian distributed. It can provide
    latent variables with stricter property of statistical independence rather than
    only uncorrelatedness. Independent components may be able to characterize the
    process data better than principal components and thus may result in better monitoring
    performance.


    In another scenario, if your end goal is to classify process faults into different
    categories for fault diagnosis, then, maximal separation between data from different
    classes of faults would be your primary concern rather than maximal capture of
    data variance. Fisher discriminant analysis (FDA) is preferred for such tasks.


    In this chapter, we will learn in detail the properties of ICA and FDA. We will
    apply these methods for process monitoring and fault classification for a large-scale
    chemical plant. Specifically, the following topics are covered


    +   - Introduction to ICA

    - Process monitoring of non-Gaussian processes

    - Introduction to FDA

    - Fault classification for large scale processes.'

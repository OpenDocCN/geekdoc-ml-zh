    \nAE-based Fault diagnosis is commonly performed via contribution analysis<sup>104</sup>\
    \ for *Q* statistic using the same methodology that we saw in Chapter 7.\n\n```\n\
    # Q contribution\nsample = 250\nerror_test_sample = error_test[sample-1,]\nQcontri\
    \ = error_test_sample*error_test_sample # vector of contributions\n\nplt.figure(figsize=[15,4]),\
    \ plt.bar(['variable ' + str((i+1)) for i in range(len(Qcontri))], Qcontri)\n\
    plt.xticks(rotation = 80), plt.ylabel('Q contribution')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_294_0.png)\n\
    \n```\n# plot top diagnosed variables\nplt.figure(figsize=[6,4]), plt.plot(X_test[:,7],'cornflowerblue')\n\
    plt.xlabel('time (mins)'), plt.ylabel('T3')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_294_1.png)\n\
    \nThe contribution plot has correctly flagged the furnace firebox temperature\
    \ as the faulty variable most responsible to the deviation of the test sample\
    \ from the NOC behavior.\n\n<sup>104</sup> Due to nonlinear transformation involved\
    \ in generating AE-based latent variables, the contribution analysis for *T*<sup>2</sup>\
    \ statistic is not as convenient as it was for PCA.\n\n## 16.3 Self-Organizing\
    \ Maps: An Introduction\n\nSelf-organizing maps (SOMs)<sup>105</sup> are unsupervised\
    \ neural networks that aim to map a high-dimensional dataset onto a 2D grid of\
    \ neurons as shown in Figure 16.3. The mapping is done in such a way that the\
    \ topology of data is preserved, i.e., data samples close to each other in the\
    \ original input space are mapped to nearby neurons on the SOM grid. Accordingly,\
    \ SOMs render themselves very useful for visualization and clustering of complex\
    \ high-dimensional datasets. SOMs are named as such as no supervision/guidance\
    \ is needed to determine the mapping; this makes SOM an excellent EDA tool. Additionally,\
    \ like autoencoders, no restriction is imposed on the input dataset regarding\
    \ the data distribution, linearity, and independence among variables, etc.\n\n\
    ![](img/cfcc9569b5e92ea115855752abddd75a_295_0.png)\n\nThe neuron that a data\
    \ sample gets mapped to is called the sample’s BMU (best matching unit). During\
    \ training, multiple data samples may get assigned the same BMU. In a way, the\
    \ BMUs discretize the input space during model training into several local sub-regions\
    \ and the samples lying in a sub-region are mapped to the same BMU. For a test\
    \ data sample, if there is an unusually large distance between the sample and\
    \ the sub-region represented by the BMU, then an anomaly alert may be raised.\
    \ Seems interesting, right? To understand how exactly this is achieved, let’s\
    \ delve into the mathematical details of SOM training.\n\n<sup>105</sup> SOM is\
    \ also called as Kohonen map in honor of Prof. Teuvo Kohonen who introduced SOM.\n\
    \n## Mathematical background\n\nA SOM is not fitted in the same manner as a traditional\
    \ ANN fitting, i.e., the back-propagation algorithm is not employed. To understand\
    \ the model fitting procedure, first consider the end result of fitting. Let the\
    \ fitting dataset consists of $N$ samples, where each sample is a $n$-dimensional\
    \ vector. After model fitting, each SOM node (or neuron) is assigned a $n$-dimensional\
    \ reference vector (or weight vector), say $m_j \\in \\mathbb{R}^n$ for the $j^{th}$\
    \ node, as shown in the illustration below. In a way, the $j^{th}$ node represents\
    \ the local region around the vector $m_j$ in the input space. Once the reference\
    \ vectors have been generated, a sample’s BMU can be found readily. To see how\
    \ this is done, let’s go through each step of SOM model fitting.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_296_0.png)\n\
    \n-   > **Normalize input dataset and initialize reference vectors**\n    >\n\
    \    > Let there be $J$ neurons in the SOM grid. Each reference vector, $m_j \\\
    forall j \\in [1,J]$, is assigned randomly or alternatively, assigned a random\
    \ vector from the dataset. The iteration index is set to $t = 1$.\n    >\n   \
    \ > **Sample and assign BMU**\n    >\n    > A sample $x_i$ is randomly selected\
    \ from the fitting dataset. The neuron whose reference vector has the smallest\
    \ (Euclidean<sup>106</sup>) distance from $x_i$ is defined as $x_i$’s BMU, i.e.,\n\
    \    >\n    > $$b_i = \\arg \\min_j \\|x_i(t) - m_j(t)\\| \\quad \\forall j \\\
    in [1,J]$$\n    >\n    > $x_i$’s BMU\n\n<sup>106</sup> Other metrics of distance\
    \ can also be used\n\n## Update reference vectors\n\nThe following formula is\
    \ used to update $m_j$ $\\forall j$\n\n$$m_j(t+1) = m_j(t) + \\alpha(t) h_{b_i\
    \ j} \\|x_i(t) - m_j(t)\\| \\quad \\forall j \\in [1, J]$$\n\nThe term $h_{b_i\
    \ j}$ is the neighborhood function centered on BMU $b_i$ and ensures that only\
    \ the BMU $b_i$ and its neighboring neurons on the SOM grid are moved closer to\
    \ the sample $x_i$. It is defined as follows\n\n$$h_{b_i j} = \\exp\\left(-\\\
    frac{\\|r_{b_i} - r_j\\|^2}{2\\sigma^2(t)}\\right) \\quad \\forall j \\in [1,\
    \ J]$$\n\n$\\alpha(t)$ is the learning rate which controls the rate at which the\
    \ weight vectors get updated\n\n$\\alpha(t)$ and $\\sigma(t)$ are assigned large\
    \ values initially and are deceased monotonically with iterations.\n\nIncrement\
    \ iteration ($t \\rightarrow t+1$) and go to step 2 if training has not converged\
    \ and maximum value of $t$ has not been reached.\n\n## Evaluating SOM fit\n\n\
    The final map quality depends heavily on the initialization of weight vectors,\
    \ size of grid, the learning rate, etc. Unfortunately, for high-dimensional datasets,\
    \ it is difficult to determine exactly if SOM has managed to generate a good map.\
    \ A metric called quantization error is commonly used which, for a sample $x_i$,\
    \ is defined as\n\n$$E_{Q,i} = \\|x_i - m_{b_i}\\|$$\n\n$E_{Q,i}$ high $\\Rightarrow\
    \ x_i$ has large difference from its mapped BMU $b_i$\n\nThe average quantization\
    \ error over all the fitting samples can provide a measure of goodness of fit\
    \ but it can be misleading as illustrated below\n\n![](img/cfcc9569b5e92ea115855752abddd75a_298_0.png)\n\
    \n-   - Number of neurons are same as number of fitting samples\n- $m_{b_i} =\
    \ x_i$, i.e., reference vector of BMU of $x_i$ is $x_i$ itself\n- The quantization\
    \ error is 0 here, but it’s obvious that the topology has not been preserved\n\
    \nTherefore, different metrics are used to judge the fitted map quality. A couple\
    \ of commonly used metrics are described below.\n\n## Quantization error\n\nAs\
    \ described before, the overall quantization error ($E_Q$) for fitting samples\
    \ is given as\n\n$$E_Q = \\frac{\\sum_i \\|x_i - m_{b_i}\\|^2}{N}$$\n\nAlthough\
    \ $E_Q$ does not give a good measure of topological preservation, it can indicate\
    \ how good the map fits to data. $E_Q$ can also be used to infer overfitting and\
    \ underfitting. Adding more neurons lead to lower $E_Q$ and therefore very low\
    \ $E_Q$ may imply overfitted model. High values of $E_Q$ can indicate insufficient\
    \ number of neurons or unconverged network learning.\n\n## Topographic error\n\
    \nThis metric measures how well the original shape of data has been preserved\
    \ on SOM grid. It is computed by simply counting the number of samples for which\
    \ the first and second BMUs are not adjacent neurons on the SOM grid.\n\n$$E_T\
    \ = \\frac{1}{N} \\sum_{i=1}^N u(x_i)$$\n\n$$u(x_i) = \\begin{cases} 1, & \\text{if\
    \ } 1^{st} \\text{ and } 2^{nd} \\text{ BMUs are non-adjacent} \\\\ 0, & \\text{otherwise}\
    \ \\end{cases}$$"

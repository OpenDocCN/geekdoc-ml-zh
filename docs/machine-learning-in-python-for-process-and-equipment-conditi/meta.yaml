  md: '# Mathematical background


    Let there be $N$ training samples $(x, y)$ where $x$ is an input vector in $m$-dimensional
    input space and $y$ is the class label ($\pm 1$). Let the optimal separating hyperplane
    (a line in 2D space) be represented as $w^T x + b = 0$ where the model parameters
    $(w, b)$ are found such that


    $$w^T x_i + b \geq 1 \quad \text{for positive samples } (y_i = 1)$$

    $$w^T x_i + b \leq -1 \quad \text{for negative samples } (y_i = -1)$$


    The supporting planes get represented as $w^T x + b = 1$ and $w^T x + b = -1$.
    The above equations are simply stating the requirements that the data points must
    lie on the correct side of their corresponding support planes. Using simple trigonometry,
    it can be shown that the margin is given by $\frac{2}{||w||}$ where $||w||$ is
    vector norm. Therefore, model parameters are found by maximizing $\frac{2}{||w||}$
    (or equivalently, minimizing $||w||$) while meeting the above constraints. Specifically,
    the following optimization problem is solved


    $$\min_{w,b} \quad \frac{1}{2} ||w||^2$$

    $$\text{s.t.} \quad y_i(w^T x_i + b) \geq 1, \quad i = 1, \cdots N$$

    \hfill eq. 1


    Once the model has been fitted, class predictions for test sample, $x_t$, are
    made as follows.


    $$\hat{y}_t = sign(w^T x_t + b)$$

    $x_t$ belongs to positive class if it lies on positive side of separating hyperplane


    The expression inside the sign function is also called decision function and therefore,
    positive decision function results in positive class prediction and vice-versa.


    > The optimization formulation in Eq. 1 and all the others that we will see in
    this chapter share a very favorable property of possessing a unique global minimum.
    This is a huge advantage when compared to other powerful ML methods like neural
    networks where the issue of local minimums can be an inconvenience.'

  - "[PAGE 198]\n\nFigure 11.5 does indicate multimode operations with mean and covariance\
    \ changes. It is however difficult to estimate the number of operation modes by\
    \ examining high-dimensional dataset directly. A popular practice is to reduce\
    \ process dimensionality via PCA and then apply clustering to facilitate visualization.\
    \ Performing PCA serves other purposes as well. We will see later that expectation-maximization\
    \ (EM) algorithm is employed to estimate cluster parameters in K-Means and GMM\
    \ models. High dimensionality implies high number of parameters to be estimated\
    \ which increases possibility of EM converging to locally optimum results and\
    \ correlated variables cause EM convergence issues. PCA helps to overcome these\
    \ two problems simultaneously.\n\nWe will employ multiway PCA for this batch process\
    \ dataset. We will follow the approach of He et al.<sup>76</sup> where for each\
    \ batch 85 sample points are retained to deal with batch length variability, first\
    \ 5 samples are ignored to eliminate initial fluctuations in sensor measurements,\
    \ and 3 PCs are retained.\n\n```\n# generate unfolded data matrix\nn_vars = variable_names.size\
    \ - 2 # first 2 columns are not process variables\nn_samples = 85\n\nunfolded_dataMatrix\
    \ = np.empty((1, n_vars*n_samples)) # just a placeholder\nfor expt in range(calibration_dataAll.size):\n\
    \    calibration_expt = calibration_dataAll[expt,0][5:90,2:]\n\n    if calibration_expt.shape[0]\
    \ < 85:\n        continue\n\n    unfolded_row = np.ravel(calibration_expt, order='F')[np.newaxis,:]\
    \ # a row for each batch data\n    unfolded_dataMatrix = np.vstack((unfolded_dataMatrix,\
    \ unfolded_row))\n\nunfolded_dataMatrix = unfolded_dataMatrix[1:,:] # remove the\
    \ empty placeholder\n\n# scale data\nfrom sklearn.preprocessing import StandardScaler\n\
    scaler = StandardScaler()\ndata_train_normal = scaler.fit_transform(unfolded_dataMatrix)\n\
    \n# PCA\nfrom sklearn.decomposition import PCA\npca = PCA(n_components = 3)\n\
    score_train = pca.fit_transform(data_train_normal)\n```\n\n<sup>76</sup> He and\
    \ Wang, Fault detection using the k-nearest neighbor rule for semiconductor manufacturing\
    \ processes, *IEEE Transaction on Semiconductor Manufacturing*, 2007"

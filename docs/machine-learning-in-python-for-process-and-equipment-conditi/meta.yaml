    # Hyperparameter specification


    Assuming that Gaussian kernel is chosen, you will need to specify the kernel width
    $\sigma$ and the number of retained latents ($a$).


    # Selection of kernel width ($\sigma$)


    The selection of $\sigma$ strongly impacts the accuracy of the KPCA model. The
    illustration below shows the impact of kernel width on the abnormality detection
    contour.


    ![](img/cfcc9569b5e92ea115855752abddd75a_181_0.png)


    [Diagram shared under Creative Commons Attribution 4.0 license (creativecommons.org/licenses/by/4.0/)
    by Tan et al. in paper titled ''Monitoring Statistics and Tuning of Kernel Principal
    Component Analysis With Radial Basis Function Kernels'']'

    ## Machine Learning in Python for Process and Equipment Condition Monitoring,
    and Predictive Maintenance


    ![](img/cfcc9569b5e92ea115855752abddd75a_0_0.png)


    From Data to Process Insights


    ![](img/cfcc9569b5e92ea115855752abddd75a_0_1.png)


    2024


    First Edition


    Ankur Kumar, Jesus Flores-Cerrillo


    ## Machine Learning in Python for Process and Equipment Condition Monitoring,
    and Predictive Maintenance


    From Data to Process Insights


    Ankur Kumar

    Jesus Flores-Cerrillo


    Dedicated to our spouses, families, friends, motherlands, and all the data-science
    enthusiasts


    > आचार्यात्पादमादत्ते पादं शिष्यः स्वमेधया ।

    पादं सब्रह्मचारिभ्यः पादं कालक्रमेण च ॥


    A student receives a quarter (of his/her learning) from the teacher,

    a quarter by way of his/her intelligence,

    a quarter from fellow students,

    and a quarter through the course of time.


    - A popular Sanskrit shloka


    ## Machine Learning in Python for Process and Equipment Condition Monitoring,
    and Predictive Maintenance


    [www.MLforPSE.com](http://www.MLforPSE.com)


    ![](img/cfcc9569b5e92ea115855752abddd75a_4_0.png)



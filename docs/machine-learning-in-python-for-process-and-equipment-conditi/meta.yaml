  md: '# 9.4 Canonical Variate Analysis: An Introduction


    Canonical variate analysis (CVA) is a classical MSPM technique suited for modeling
    dynamic process systems. While PCA and PLS lead to input-output models, CVA is
    designed to provide state-space models as shown in Figure 9.3. States are like
    latent variables which act as a conduit between process inputs and outputs. For
    example, in the distillation column system, it is clear that $Q_B$ doesn''t affect
    $x_D$ directly. There are internal dynamics or states (e.g., arising from the
    liquid holdup at each column tray) that changes in $Q_B$ have to pass through
    before impacting $x_D$. Similar argument could be made for $Q_B$ vs $D$ relationship.
    The outputs share the same internal dynamics and this leads to better parameter
    efficiency of CVA model (compared to DPCA and DPLS model)


    ![](img/cfcc9569b5e92ea115855752abddd75a_164_0.png)


    For CVA-based process monitoring applications, we do not need the system matrices;
    only the computation of states for training and test datasets suffices. Tracking
    the systematic variations of states and state noise allow us to build monitoring
    metrics. As it turns out, the state vector at any time can be approximated as
    a linear combination of past inputs and outputs. The specific combination is found
    as the one that gives the best prediction of future outputs. Let''s now familiarize
    ourselves on how this is achieved.'
  merge: -1

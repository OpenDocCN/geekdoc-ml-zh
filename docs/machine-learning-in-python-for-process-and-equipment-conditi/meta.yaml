    # 17.1 Vibration: A Gentle Introduction


    Vibrations are simply back and forth motion of machines around their position
    of rest. All rotating machines (motors, blowers, chillers, compressors, turbines,
    etc.) exhibit vibratory motion under normal and faulty conditions. Figure 17.1
    shows a representative setup for vibration sensing of an industrial machine. The
    sensors (transducers) convert vibratory motion (of displacement, velocity, or
    acceleration) into analogue electrical signals which are digitized and stored.
    The figure below shows how the recorded signal looks like on a time-axis for a
    machine with gradually degrading condition. The increasing vibration levels indicate
    underlying machine issues.


    ![](img/cfcc9569b5e92ea115855752abddd75a_306_0.png)


    The components of rotating machines (rotors, bearings, gears) undergo different
    types of failures due to well-studies causes such as mechanical looseness, misalignment,
    cracks, etc. These faults produce characteristic vibration patterns. However,
    it is difficult to ‘see’ or extract


    109 Romanssini et al., A Review on Vibration Monitoring Techniques for Predictive
    Maintenance of Rotating Machinery. Eng, 2023. This article is an open access article
    distributed under the terms and conditions of the Creative Commons Attribution
    (CC BY) license (https://creativecommons.org/licenses/by/4.0/).'
- md: 'these specific signatures in the raw time domain vibration signal. Therefore,
    the standard approach is to convert time domain signal into frequency domain to
    extract features that provide early signs of failures and aid diagnosis of underlying
    faults.


    > In general, while vibration levels indicate the severity of faults, the dominant
    frequency components of the vibration signal can indicate the source of faults.


    The sequence of steps that are undertaken to convert raw vibration signal into
    useful features and to deploy ML models is presented in the next section. The
    focus of this chapter is to understand how to extract these features that can
    eventually be used as inputs to ML models.


    ## Basic vibration terminology


    The time domain plot of vibration data is called waveform. Let''s look at a simple
    sinusoidal waveform to understand some terms that are used to characterize vibration.


    ![](img/cfcc9569b5e92ea115855752abddd75a_307_0.png)


    Frequency (f), measured in cycles/s or Hz (Hertz), denotes the number of cycles
    completed per unit time. The time taken to complete one cycle is referred to as
    time-period (T). T and f are inversely related


    $$f = \frac{1}{T}$$


    The height of the crest above the zero/reference line is called amplitude. Waveforms
    from real equipment are more complex than a simple sinusoid. However, you will
    see later that waveforms can be broken down into several sinusoidal components.


    ## Vibration signal acquisition


    The most commonly employed sensor is accelerometer which measures vibration acceleration
    (usually measured in *g*). The other sensor options are proximity sensors and
    velocity transducers which record vibration displacement and velocity, respectively.
    The output from the vibration sensor is a continuous analog signal which is digitized
    for digital storage in a computer. Therefore, a pertinent aspect during vibration
    signal acquisition relates to the sampling frequency (*f_s*) which is the frequency
    at which the vibration signal is sampled. For example, let *f_s* = 100 samples/s
    or 100 Hz; this implies that data is collected at equal intervals of 0.01 seconds.
    Judicious selection of *f_s* is very critical. To see why, consider the illustration
    below.


    ![](img/cfcc9569b5e92ea115855752abddd75a_308_0.png)


    In the above illustration, the sampled signal does not resemble the original signal!
    There is a theorem called Nyquist sampling theorem which states that for a sampling
    frequency *f_s*, original signals will be collected correctly only up to frequency
    *f_s*/2. Correspondingly, the frequency *f_s*/2 is known as Nyquist frequency
    (*f_q*). For the above illustration, to be able to correctly capture 1 Hz vibration,
    *f_s* must be 2 Hz (2 samples per second) which as shown below does work nicely.


    ![](img/cfcc9569b5e92ea115855752abddd75a_308_1.png)


    The phenomenon of an original high frequency signal appearing as a low frequency
    signal due to undersampling is called aliasing. This is undesirable and therefore,
    during vibration signal acquisition, anti-aliasing filters are frequently employed
    to filter out components with frequencies higher than *f_q*.


    ## 17.2 Vibration-based Condition Monitoring: Workflow


    We have so far talked about the different aspects of VCM in only bits and pieces.
    Figure 17.2 summarizes the commonly employed steps involved in VCM which are briefly
    described below.


    ![](img/cfcc9569b5e92ea115855752abddd75a_309_0.png)


    ### Data acquisition:


    As a common practice, the vibration data is analyzed in batches of equal length
    acquired at regular time intervals as shown in the illustration below. Here, at
    every minute, 1 second of vibration data is acquired and sent for pre-processing
    and vibration monitoring. If the sampling frequency is 1024 Hz, then each collected
    waveform contains 1024 data points.


    ![](img/cfcc9569b5e92ea115855752abddd75a_310_0.png)


    ### Signal pre-processing:


    Tasks involved in this step attempt to improve the signal-to-noise ratio (SNR)
    of the acquired vibration signal to prepare it for the subsequent tasks. Unwanted
    frequency components of the signal due to noise and measurement system errors
    are removed. During the early stages of failure, the impact on the vibration signal
    is weak and can be difficult to detect in the absence of adequate signal pre-processing.
    As an example, the illustration below shows the benefits of trend removal.


    ![](img/cfcc9569b5e92ea115855752abddd75a_310_1.png)


    ### Signal processing:


    A quick glimpse of waveform can tell you if a machine is vibrating at abnormally
    high levels. However, waveforms are notoriously difficult to use to detect failures
    at incipient stages of faults when fault characteristics are weak. Moreover, increased
    amplitude levels in vibration waveform does not tell much about the underlying
    source of failure. To derive more actionable information, spectrum analysis via
    fast Fourier transform (FFT) is commonly performed to find the frequency components
    of the waveform. Presence of significant components at unexpected frequencies
    indicates faulty conditions and provides clues for fault sources.


    A downside of Fourier transform is that it is restricted to stationary signals.
    It cannot indicate the change of component frequencies over time in a waveform,
    i.e., a frequency component is assumed to be present throughout the entire duration
    of a waveform at the same energy level. However, this is not always true, especially
    in the case of a degrading machine. Therefore, analysis in time-frequency domain
    is performed to decompose a waveform into its frequency components at different
    time-instants. The most popular tool for this analysis is short-time Fourier transform
    (STFT) and a spectrogram is the output from this analysis. We will go into more
    details on these techniques in the next section.


    ![](img/cfcc9569b5e92ea115855752abddd75a_311_0.png)


    ### Feature extraction:


    One can directly compare the current waveform, spectrum, and spectrogram with
    those from NOC periods to detect abnormalities. Alternatively, one can pass the
    entire waveform and/or spectrum as input to a ML model. However, a more convenient
    approach is to extract meaningful features that summarize the vibration signals
    adequately and provide crucial clues regarding the operational state of a machine.
    Usage of features increases the chances of obtaining effective ML models. The
    commonly used features include, amongst others, RMS and kurtosis of waveform,
    frequency center and peak frequency of spectrum, and mean frequency from spectrogram.
    Once the features have been extracted, they can be used for fault detection and
    classification. While we will deal with this last step of VCM workflow in the
    next chapter, let’s obtain better familiarization with the vibration signal processing
    and feature extraction tasks.


    ## 17.3 Vibration Signal Processing


    As alluded to in the previous section, analyzing the time-domain waveform manually
    can be very inconvenient and may not provide sufficient leading indicators of
    incipient faults. A more useful representation of vibration data can be obtained
    in frequency domain and time-frequency domain.


    ### Frequency domain analysis


    Consider the following time domain and frequency domain vibration data of a machine.


    ![](img/cfcc9569b5e92ea115855752abddd75a_312_0.png)


    For an untrained eye, the waveform does not provide much useful information about
    ‘how’ the machine is vibrating. However, in the frequency domain, one can clearly
    see two distinct frequency components potentially arising from different rotating
    components of the machine. Comparison of peak amplitudes and peak frequencies
    with NOC values can indicate the severity and type of fault, if any exists. This
    extremely useful plot of frequency versus amplitude is called a spectrum and is
    commonly obtained via FFT.


    ### Fourier transformation


    Frequency domain analysis entails decomposition of a waveform into a sum of several
    sinusoids of different frequencies. This decomposition is called Fourier transformation.
    To see how it is calculated, let us define a few terms first. Let the sampling
    frequency be $f_s$, the waveform contain $N$ data points, and the frequency resolution,
    $df$, be defined as $\frac{f_s}{N}$.


    ![](img/cfcc9569b5e92ea115855752abddd75a_312_1.png)'
  mdcn: '原始时域振动信号中的这些特定特征。因此，标准方法是将时域信号转换为频域，以提取能提供故障早期迹象并有助于诊断潜在故障的特征。


    > 一般来说，振动水平指示故障的严重程度，而振动信号的主要频率分量则可以指示故障的来源。


    下一节将介绍将原始振动信号转换为有用特征并部署机器学习模型的步骤序列。本章的重点是理解如何提取这些最终可用作机器学习模型输入的特征。


    ## 基本振动术语


    振动数据的时域图称为波形。让我们看一个简单的正弦波形，以理解一些用于表征振动的术语。


    ![](img/cfcc9569b5e92ea115855752abddd75a_307_0.png)


    频率（f），以周期/秒或赫兹（Hz）为单位，表示单位时间内完成的周期数。完成一个周期所需的时间称为周期（T）。T和f成反比关系


    $$f = \frac{1}{T}$$


    波峰高于零线/参考线的高度称为振幅。来自实际设备的波形比简单的正弦波更复杂。然而，你稍后会看到，波形可以分解为多个正弦分量。


    ## 振动信号采集


    最常用的传感器是加速度计，它测量振动加速度（通常以*g*为单位）。其他传感器选项包括接近传感器和速度传感器，分别记录振动位移和速度。振动传感器的输出是连续的模拟信号，该信号被数字化以便在计算机中进行数字存储。因此，振动信号采集中的一个关键方面涉及采样频率（*f_s*），即振动信号被采样的频率。例如，设*f_s*
    = 100 样本/秒或100 Hz；这意味着数据以0.01秒的等间隔收集。明智地选择*f_s*至关重要。要理解原因，请看下面的说明。


    ![](img/cfcc9569b5e92ea115855752abddd75a_308_0.png)


    在上面的说明中，采样信号与原始信号不相似！有一个定理称为奈奎斯特采样定理，它指出对于采样频率*f_s*，只有频率低于*f_s*/2的原始信号才能被正确采集。相应地，频率*f_s*/2被称为奈奎斯特频率（*f_q*）。对于上面的说明，要能够正确捕获1
    Hz的振动，*f_s*必须为2 Hz（每秒2个样本），如下所示，这确实效果很好。


    ![](img/cfcc9569b5e92ea115855752abddd75a_308_1.png)


    由于欠采样导致原始高频信号表现为低频信号的现象称为混叠。这是不希望出现的，因此，在振动信号采集过程中，经常使用抗混叠滤波器来滤除频率高于*f_q*的分量。


    ## 17.2 基于振动的状态监测：工作流程


    到目前为止，我们只是零散地讨论了VCM的不同方面。图17.2总结了VCM中常用步骤，下面将简要描述。


    ![](img/cfcc9569b5e92ea115855752abddd75a_309_0.png)


    ### 数据采集：


    作为常见做法，振动数据以等长批次进行分析，这些批次在固定时间间隔内采集，如下图所示。这里，每分钟采集1秒的振动数据，并发送进行预处理和振动监测。如果采样频率为1024
    Hz，则每个采集的波形包含1024个数据点。


    ![](img/cfcc9569b5e92ea115855752abddd75a_310_0.png)


    ### 信号预处理：


    此步骤中涉及的任务旨在提高采集振动信号的信噪比（SNR），为后续任务做好准备。去除由于噪声和测量系统误差引起的信号中不需要的频率分量。在故障早期阶段，对振动信号的影响很弱，在没有足够信号预处理的情况下可能难以检测。例如，下面的说明显示了去除趋势的好处。


    ![](img/cfcc9569b5e92ea115855752abddd75a_310_1.png)


    ### 信号处理：


    快速浏览波形可以告诉你机器是否在异常高的水平上振动。然而，众所周知，波形很难用于检测故障初期阶段的故障，因为此时故障特征很弱。此外，振动波形中振幅水平的增加并不能说明太多关于潜在故障来源的信息。为了获得更具可操作性的信息，通常通过快速傅里叶变换（FFT）进行频谱分析，以找到波形的频率分量。在意外频率处存在显著分量表明存在故障状况，并为故障来源提供线索。


    傅里叶变换的一个缺点是它仅限于平稳信号。它无法指示波形中分量频率随时间的变化，即假设一个频率分量在整个波形持续时间内以相同的能量水平存在。然而，这并不总是正确的，尤其是在机器退化的情况下。因此，进行时频域分析，将波形分解为不同时间点的频率分量。此分析最流行的工具是短时傅里叶变换（STFT），其输出是频谱图。我们将在下一节中更详细地介绍这些技术。


    ![](img/cfcc9569b5e92ea115855752abddd75a_311_0.png)


    ### 特征提取：


    可以直接将当前波形、频谱和频谱图与NOC（正常运行条件）时期的进行比较以检测异常。或者，可以将整个波形和/或频谱作为输入传递给机器学习模型。然而，更方便的方法是提取有意义的特征，这些特征能充分总结振动信号，并提供有关机器运行状态的关键线索。使用特征增加了获得有效机器学习模型的机会。常用特征包括但不限于波形的均方根（RMS）和峰度、频谱的频率中心和峰值频率，以及频谱图的平均频率。一旦提取了特征，它们就可以用于故障检测和分类。虽然我们将在下一章讨论VCM工作流程的这最后一步，但让我们先更好地熟悉振动信号处理和特征提取任务。


    ## 17.3 振动信号处理


    正如上一节所暗示的，手动分析时域波形可能非常不方便，并且可能无法提供足够的早期故障前兆指标。在频域和时频域中可以获得更有用的振动数据表示。


    ### 频域分析


    考虑以下机器的时域和频域振动数据。


    ![](img/cfcc9569b5e92ea115855752abddd75a_312_0.png)


    对于未经训练的眼睛，波形并没有提供太多关于机器“如何”振动的有用信息。然而，在频域中，可以清楚地看到两个不同的频率分量，可能来自机器的不同旋转部件。将峰值振幅和峰值频率与NOC值进行比较，可以指示故障（如果存在）的严重程度和类型。这种极其有用的频率与振幅关系图称为频谱，通常通过FFT获得。


    ### 傅里叶变换


    频域分析涉及将波形分解为多个不同频率正弦波的和。这种分解称为傅里叶变换。要了解它是如何计算的，让我们先定义几个术语。设采样频率为$f_s$，波形包含$N$个数据点，频率分辨率$df$定义为$\frac{f_s}{N}$。



    The ''stump'' function does the following: for every subsequence (of length sequenceLength)
    within the steamFlow time series, it automatically identifies its corresponding
    nearest-neighbor subsequence of the same length³³. The first column of matrix_profile
    array contains the distance values and the nearest neighbor subsequence''s indices
    are in the 2nd and 3rd columns. Let''s see how the distances vary.


    ```

    # plot matrix profile distances

    fig, axs = plt.subplots(2, sharex=True, gridspec_kw={''hspace'': 0})

    plt.suptitle(''Discord (Anomaly/Novelty) Discovery'')

    axs[0].plot(steamFlow), axs[0].set_ylabel(''Steam Flow'')

    axs[1].plot(matrix_profile[:, 0], ''*'', color=''black'')

    axs[1].set_xlabel(''Sample #''), axs[1].set_ylabel(''Distance'')

    ```



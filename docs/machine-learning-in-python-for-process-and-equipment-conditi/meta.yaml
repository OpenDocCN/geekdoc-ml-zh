    # ## Fault Detection & Diagnosis via Supervised Artificial Neural Networks Modeling


    It won’t be an exaggeration to say that artificial neural networks (ANNs) are
    currently the most powerful modeling construct for describing generic nonlinear
    processes. ANNs can capture any kind of complex nonlinearities, don’t impose any
    specific process characteristics, and don’t demand specification of process insights
    prior to model fitting. Furthermore, several recent technical breakthroughs and
    computational advancements have enabled (deep) ANNs to provide remarkable results
    for a wide range of problems. Correspondingly, ANNs have re(caught) the fascination
    of data scientists and the process industry is witnessing a surge in successful
    applications of ML-based process control, predictive maintenance, inferential
    modeling, and process monitoring.


    ANNs can be used in both supervised and unsupervised learning settings. While
    we will cover the supervised learning-based FDD applications of ANNs in this chapter,
    unsupervised learning is covered in the next chapter. Supervised fitting of ANN
    models are applicable if you have adequate number of historical faulty samples
    (so that you can fit a fault classification model) or your signals are categorizable
    into predictors and response variables (so that you can fit a regression model
    and monitor residuals). Different forms of ANN architectures have been devised
    (such as FFNNs, RNNs, CNNs) to deal with datasets with different characteristics.
    CNNS are mostly used with image data and therefore, we will study FFNN and RNN
    in this chapter.


    There is no doubt that ANNs have proven to be monstrously powerful. However, it
    is not easy to tame this monster. If the model hyperparameters are not set judiciously,
    it is very easy to end up with disappointing results. The reader is referred to
    Part 3 of Book 1 of this series for a detailed exposition on ANN training strategies
    and different facets of ANN models. In this chapter, the focus is on exposing
    the user to how ANNs can be used to build process monitoring applications. Specifically,
    the following topics are covered


    +   - Introduction to ANNs

    - Introduction to RNNs

    - Process monitoring using ANNs via external analysis'

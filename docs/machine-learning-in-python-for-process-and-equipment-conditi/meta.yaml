  md: '# T² contributions


    For T² contributions, calculations are not as straightforward. Several expressions
    have been postulated in literature³⁷. The commonly used expression below was proposed
    by wise et al.³⁸


    $$T^2 \text{ contribution of variable } j = \left(j^{th} \text{ element of } \left(D^{1/2}x\right)\right)^2$$

    $$D = P\Lambda_k^{-1}P^T$$

    *eq. 10*


    Note that these contributions³⁹ are computed for each data-point. Let''s find
    which variables need to be further investigated at 85th sample.


    ```

    # T² contribution

    sample = 85 - 69

    data_point = np.transpose(data_test_normal[sample-1,])


    D = np.dot(np.dot(P_matrix,lambda_k_inv),P_matrix.T)

    T2contri = np.dot(scipy.linalg.sqrtm(D),data_point)**2 # vector of contributions


    plt.figure(), plt.bar([''var '' + str((i+1)) for i in range(len(T2contri))], T2contri)


    # SPE contribution

    error_test_sample = error_test[sample-1,]

    SPE_contri = error_test_sample*error_test_sample # vector of contributions


    plt.figure(), plt.bar([''var '' + str((i+1)) for i in range(len(SPE_contri))],
    SPE_contri)

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_121_0.png)


    ³⁷ S. Joe Qin, Statistical process monitoring: basics and beyond, Journal of Chemometrics,
    2003

    ³⁸ Wise et. al., PLS toolbox user manual, 2006

    ³⁹ A quick derivation (Alcala & Qin, Analysis and generalization of fault diagnosis
    methods for process monitoring. *Journal of Process Control*, 2011) is as follows
    ($T^2 = x^TP\Lambda_k^{-1}P^Tx = \|P\Lambda_k^{-1/2}P^Tx\|^2 \equiv \|D^{1/2}x\|^2
    = \sum_{j=1}^m \left(\xi_j^T D^{1/2}x\right)^2 = \sum_{j=1}^m T_j^2$). Here, $\xi_j$
    is $j^{th}$ column ($\xi_j = [0 \cdots 1 \cdots 0]^T$) of the identity matrix
    of size $m \times m$ and $T_j^2$ is $j^{th}$ variable contribution.'

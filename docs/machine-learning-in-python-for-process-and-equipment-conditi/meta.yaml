  md: "# Example 9.1:\n\nTo illustrate how DPCA can extract dynamic relationships,\
    \ let's consider the following noise-free dynamic system.\n\n$x_1(k) = 0.8x_1(k-1)\
    \ + x_2(k-1); \\quad k \\text{ is sampling instant}$\n\nThe number of zero singular\
    \ (eigen) values extracted during PCA indicates the number of linear relationships\
    \ that exist among the process variables. Let's see if we can extract out the\
    \ above dynamic relationship using only data (1000 samples of $x_1$ and $x_2$).\n\
    \n```\n# import required packages\nimport numpy as np, matplotlib.pyplot as plt\n\
    from sklearn.decomposition import PCA\n\n# generate data for the system: x1(k)\
    \ = 0.8*x1(k-1) + x2(k-1)\nx2 = np.random.normal(loc=0, scale=1, size=(1000,1))\n\
    x1 = np.zeros((1000,1))\nfor k in range(1,1000):\n    x1[k] = 0.8*x1[k-1] + x2[k-1]\n\
    X = np.hstack((x1, x2))\n\n# function to generate augmented matrix\ndef augment(X,\
    \ n_lags):\n    N, m = X.shape\n    X_aug = np.zeros((N-n_lags, (n_lags+1)*m))\n\
    \    for sample in range(n_lags, N):\n        XBlock = X[sample-n_lags:sample+1,:]\n\
    \        X_aug[sample-n_lags,:] = np.reshape(XBlock, (1,-1), order = 'F')\n  \
    \  return X_aug\n\n# fit DPCA model\nX_aug = augment(X, 1) # augment data\nX_aug_centered\
    \ = X_aug - np.mean(X_aug, axis=0) # center data\ndpca = PCA().fit(X_aug_centered)\
    \ # fit PCA model\nprint('DPCA singular values:', dpca.singular_values_) # get\
    \ singular values\n```\n\n>>> DPCA singular values: [6.664e+01 3.731e+01 3.094e+01\
    \ 1.1661e-14]\n\nAs expected, only one singular value is very close to zero. All\
    \ we now need to do is fetch the singular vector corresponding to this singular\
    \ value and check if it represents our dynamic system."

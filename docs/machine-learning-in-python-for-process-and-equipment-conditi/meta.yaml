    ## 15.5 Fault Classification using ANNs


    If historical faulty samples are available, then one can use FFNN or RNN models
    to directly predict the fault classes of test samples. The figure below shows
    a sample architecture that can help achieve this.


    ![](img/cfcc9569b5e92ea115855752abddd75a_282_1.png)


    Figure 15.10: FFNN architecture for mutually exclusive output classes


    ## Softmax activation function in output layer


    Softmax is an exponential function that generates normalized activations so that
    they sum up to 1. In Figure 15.10, activation $a_j$ ($j \in [1,2,3]$) is generated
    as follows


    $$a_j = g_{softmax}(z_j) = \frac{e^{z_j}}{\sum_{k=1}^{3} e^{z_k}}$$


    In ANN world, the pre-activations ($z_j$) that are fed as inputs to the softmax
    function as also called logits. The softmax activations lie between 0 and 1, and
    hence, they are interpreted as class-membership probabilities. The predicted class
    label is taken as the class with maximum probability (or activation)


    $\hat{y} = argmax(a_j, j \in [1,2,3])$


    The predicted class probabilities (and not the predicted class label) are directly
    used during model training.


    ## Loss functions


    For binary-class classification problems, binary cross-entropy is the default
    loss function. Let $y$ (can take value 0 and 1) be the true label for a data sample
    and $p$ (or $\hat{y}$) be the predicted probability (of $y = 1$) obtained from
    sigmoid output layer. The cross-entropy loss is given by


    $Cross - entropy Loss = -y * log(p) - (1 - y) * log(1 - p) = \begin{cases} -log(1
    - p), & y = 0 \\ -log(p), & y = 1 \end{cases}$


    The above expression is generalized as follows for a multiclass classification,
    where overall loss is sum of separate losses for each class label


    $Multi - class cross - entropy Loss = - \sum_{c=1}^{\# \text{ of classes}} y_c
    log(p_c)$


    where, $y_c$ and $p_c$ are binary indicator and predicted probability of a sample
    belonging to class c, respectively. Note that for multi-class classification,
    the target variable will be in one-hot encoded form.


    ## Summary


    In this chapter, we familiarized ourselves with the basic ANN architectures that
    are employed to handle static and dynamic processes. We looked at ways to deploy
    ANN models for process fault detection; specifically, we worked through an implementation
    of FFNN-based process monitoring solution wherein the residuals between actual
    measurements and model predictions are used to ascertain the presence of process
    faults. In the following chapter, we will see how process monitoring solutions
    can be built using unsupervised neural network models.


    # Chapter 16


    ## Fault Detection & Diagnosis via Unsupervised Artificial Neural Networks Modeling


    In the previous chapter, we looked at supervised fitting of artificial neural
    networks where either the faults labels were available for historical samples
    or the process variables were divided into predictors and response variable sets.
    However, you are very likely to encounter situations where you only have NOC samples
    in your training dataset without any predictor/response division. In Part 3 of
    this book, we studied a powerful technique suitable for such datasets, called
    PCA; PCA, however, is limited to linear processes. Nonetheless, the underlying
    mechanism of extracting the most representative features of training dataset and
    compressing it into a feature space with reduced dimensionality need not be limited
    to linear systems. ANNs excel at handling nonlinear systems and extracting hidden
    patterns in high-dimensional datasets. Unsurprisingly, clever neural network-based
    architectures have been devised to enable unsupervised fitting of nonlinear datasets.
    Two popular models in this category are autoencoders (AEs) and self-organizing
    maps (SOMs)


    Autoencoders are ANN-based counterparts of PCA for nonlinear processes. Here,
    low-dimensional latent feature space is derived via nonlinear transformation and,
    just like we did for PCA, the systematic variations in the feature space and the
    reconstruction errors are handled separately to provide the monitoring statistics.
    Autoencoders are very popular for building FDD solutions for nonlinear processes.
    They are also commonly used to provide intermediate low-dimensional features which
    are then used for subsequent modeling (clustering, fault classification, etc.).
    SOM is another variant of neural network-based architecture that project a high-dimensional
    dataset onto a 2D grid (yes, you read that right!). Here, latent variables are
    not derived, albeit the focus is on ensuring that the topology of the projected
    data is similar to that in the original measurement space. This feature renders
    SOMs very useful for data visualization, clustering, and fault detection applications.


    We will undertake in depth study of both these powerful techniques in this chapter.
    Specifically, the following topics are covered


    - Introduction to autoencoders and self-organizing maps

    - Fault detection and diagnosis using autoencoders: application to FCCU process

    - Fault detection and diagnosis using SOMs: application to semiconductor dataset


    ## 16.1 Autoencoders: An Introduction


    An autoencoder (AE) in its basic form is a 3-layered ANN consisting of an input
    layer, a hidden layer, and an output layer as shown in Figure 16.1. An AE takes
    an input $x \in \mathbb{R}^n$ and predicts a reconstructed $\hat{x} \in \mathbb{R}^n$
    as an output. To prevent the network from trivially copying $x$ to $\hat{x}$,
    the hidden layer is constrained to be much smaller than $n$ (the number of neurons
    in the hidden layer, say $m$, gives the dimension of the latent/feature space).
    This forces the network to capture only the systematic variations in input data
    and learn only the most representative features as the latent variables. The nonlinear
    activation function of the neurons in the hidden layer enables the latent variables
    to be nonlinearly related to the input variables. During model fitting, the gap
    between $x$ and $\hat{x}$ (termed reconstruction error) is minimized to find network
    parameters. The basic AE network can be made deeper by adding more hidden layers
    resulting in deep (or stacked) autoencoders.


    ![](img/cfcc9569b5e92ea115855752abddd75a_285_0.png)


    The symmetrical and sandwich nature of the deep AE architecture should be apparent
    wherein the sizes of the layers first decrease and then increase. Care must be
    taken though to not use too many hidden layers; otherwise, the network will overfit
    and may simply learn the identity mapping from $x$ to $\hat{x}$! Moreover, in
    the previous figure, you will notice that AE architecture is divide into an encoder
    part and a decoder part. An encoder projects or codify an input sample $x$ to
    lower dimensional feature $h$. The decoder maps the feature vector back to the
    input space. The encoder-decoder form makes the AR architecture very flexible.
    Once an AE has been trained, one can use the encoder as a standalone network to
    obtain the latent variables. Moreover, you are not limited to using only FFNN
    in the encoders and decoders. RNNs and CNNs are also frequently employed. RNN-based
    AE is used as a nonlinear counterpart of dynamic PCA.


    ![](img/cfcc9569b5e92ea115855752abddd75a_286_0.png)


    ### Vanilla AE vs Denoising AE


    The form of autoencoder we saw in Figure 16.1 is the conventional or vanilla form
    wherein the network is forced to find patterns in data by constraining the size
    of coding/latent variable ($m$) to be less than the size of input variable ($n$).
    This is also called an undercomplete autoencoder. An alternative way of forcing
    an autoencoder to learn only the systematic variation in data is by corrupting
    input data by adding synthetic noise and then training the network to reconstruct
    the uncorrupted input. Such autoencoders are called denoising autoencoders and
    its representative architecture is shown below. Note that we did not explicitly
    represent encoder having number of neurons in hidden layer less than the number
    of input variables. Denoising AE allow having $m \geq n$.


    ![](img/cfcc9569b5e92ea115855752abddd75a_286_1.png)'

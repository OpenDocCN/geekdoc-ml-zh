  md: '# Fault diagnosis via contribution plot


    Upon the detection of a fault, the culprit variable(s) can be identified by finding
    the variable(s) contributing the most to the quantization error. $E_Q$ can be
    broken down component-wise as follows (in the same way as we did for PCA''s Q
    metric)


    $$E_{Q,i} = \sum_{j=1}^{m} \|x_{ij} - m_{b_{ij}}\|^2$$


    where $x_{ij}$ is the value of the $j^{th}$ variable for the $i^{th}$ test sample
    and $m_{b_{ij}}$ is the value of the $j^{th}$ variable in the weight vector of
    the corresponding BMU.



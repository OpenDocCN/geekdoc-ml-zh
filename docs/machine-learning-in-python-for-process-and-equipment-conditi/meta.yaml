- md: '## 14.3 Isolation Forest: An Introduction


    Isolation forest (IF) is an ensemble of binary decision trees, also called isolation
    trees. IF is an unsupervised variant of random forests and are popularly employed
    for outlier detection and novelty/abnormality detection. Model training involves
    construction of several isolation trees, and each tree is generated in such a
    way that every training sample ends up in its own separate leaf (i.e., gets ''isolated'').
    Figure 14.8 provides a simple ''illustration''. Here, a cluster of four NOC data
    points and two sample isolation trees are shown. It is apparent that each tree
    splits the measurement space through several binary decision rules to ''isolate''
    every training sample. Post model-training, a test sample is run through all the
    trained trees and its abnormality is judged based on the average depth the sample
    reaches in the trees. In general, an anomaly tends to lie close to the root node
    and therefore has shorter path length compared to the NOC points that travel deep
    into the trees. This is the guiding principle of isolation forests.


    ![](img/cfcc9569b5e92ea115855752abddd75a_263_0.png)


    In Chapter 13, we had seen that random forests acquire strong predictive capabilities
    through diversification of the constituent decision trees. In IFs, diversification
    is achieved by using a random subset of training samples (sampled without replacement)
    for training each tree. Furthermore, at every node of a tree, a feature/variable
    and the split value<sup>97</sup> is randomly chosen to form a decision rule.


    <sup>97</sup> The split value is chosen within the maximum and minimum values
    of the chosen variable.


    ## Application of isolation forest for fault detection


    Below we show how a monitoring chart could be generated using IF model.


    ```python

    # IF score of each training sample

    from sklearn.ensemble import IsolationForest

    IF_model = IsolationForest(contamination=0.05)

    IF_model.fit(score_train)


    IFscore_train = -IF_model.score_samples(score_train) # score_samples returns the
    anomaly

    # score of the input samples; the lower, the more abnormal.

    IF_CL = np.percentile(IFscore_train, 95)

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_264_0.png)


    Figure 14.9 shows the monitoring chart for the training samples. Note that 95th
    percentile of the training scores is used as the control limit which results in
    6 training samples being flagged as abnormal. Figure 14.10 shows the monitoring
    chart for the faulty test samples. Only 7 out of 20 samples are correctly flagged
    as faulty, suggesting that the IF model is inappropriate for this dataset.


    ```python

    # scale and perform PCA on faulty test data; then find IF score values

    score_test = pipe.transform(unfolded_TestdataMatrix)

    IFscore_test = -IF_model.score_samples(score_test)


    print(''Number of flagged faults (using control chart): '', np.sum(IFscore_test
    > IF_CL))

    # can also use predict() function of IF class to flag faulty samples

    print(''Number of flagged faults (using predict): '', np.sum(IF_model.predict(score_test)
    == -1))

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_265_0.png)


    Figure 14.10: FD-IF monitoring chart for metal-etch test samples


    ## Extended Isolation Forests


    Consider the following NOC samples with sinusoidal distribution* and the corresponding
    score map. The score map* indicates poor performance of IF algorithm. The score
    map would make one believe that the NOC data is present in a rectangular blob
    and not in a sinusoidal pattern.


    ![](img/cfcc9569b5e92ea115855752abddd75a_265_1.png)


    The IF failed in the above illustration due to the restriction of using horizontal
    and vertical splits only. An alternative algorithm, called Extended Isolation
    Forest (https://github.com/sahandha/eif), has been provided by Hariri et al. that
    uses random slopes for the splits and therefore achieves better performance (albeit
    at a higher computational cost).


    *Diagrams made available under Creative Commons Attribution 4.0 License (creativecommons.org/licenses/by/4.0)
    by Hariri et al. (ieeexplore.ieee.org/document/8888179)


    ## Summary


    In this chapter, we studied anomaly detection methods that rely on different notions
    of proximity. Specifically, we covered *k*-NN, local outlier factor, and isolation
    forests. Although, isolation forests are technically not included in the class
    of proximity-based techniques, we clubbed them with other proximity-based methods
    in this chapter due to their treatment of anomalies as samples that are ‘far and
    between’. With this, we have covered the major classical ML techniques that are
    widely employed for fault detection in process systems. We will next move onto
    artificial neural networks-based techniques for process monitoring.


    # Part 5


    ## Artificial Neural Networks for Process Monitoring


    # Chapter 15


    ## Fault Detection & Diagnosis via Supervised Artificial Neural Networks Modeling


    It won’t be an exaggeration to say that artificial neural networks (ANNs) are
    currently the most powerful modeling construct for describing generic nonlinear
    processes. ANNs can capture any kind of complex nonlinearities, don’t impose any
    specific process characteristics, and don’t demand specification of process insights
    prior to model fitting. Furthermore, several recent technical breakthroughs and
    computational advancements have enabled (deep) ANNs to provide remarkable results
    for a wide range of problems. Correspondingly, ANNs have re(caught) the fascination
    of data scientists and the process industry is witnessing a surge in successful
    applications of ML-based process control, predictive maintenance, inferential
    modeling, and process monitoring.


    ANNs can be used in both supervised and unsupervised learning settings. While
    we will cover the supervised learning-based FDD applications of ANNs in this chapter,
    unsupervised learning is covered in the next chapter. Supervised fitting of ANN
    models are applicable if you have adequate number of historical faulty samples
    (so that you can fit a fault classification model) or your signals are categorizable
    into predictors and response variables (so that you can fit a regression model
    and monitor residuals). Different forms of ANN architectures have been devised
    (such as FFNNs, RNNs, CNNs) to deal with datasets with different characteristics.
    CNNS are mostly used with image data and therefore, we will study FFNN and RNN
    in this chapter.


    There is no doubt that ANNs have proven to be monstrously powerful. However, it
    is not easy to tame this monster. If the model hyperparameters are not set judiciously,
    it is very easy to end up with disappointing results. The reader is referred to
    Part 3 of Book 1 of this series for a detailed exposition on ANN training strategies
    and different facets of ANN models. In this chapter, the focus is on exposing
    the user to how ANNs can be used to build process monitoring applications. Specifically,
    the following topics are covered:


    - Introduction to ANNs

    - Introduction to RNNs

    - Process monitoring using ANNs via external analysis


    ## 15.1 ANN: An Introduction


    Artificial neural networks (ANNs) are nonlinear empirical models which can capture
    complex relationships between input-output variables via supervised learning or
    recognize data patterns via unsupervised learning. Architecturally, ANNs were
    inspired by human brain and are a complex network of interconnected neurons as
    shown in Figure 15.1. An ANN consists of an input layer, a series of hidden layers,
    and an output layer. The basic unit of the network, neuron, accepts a vector of
    inputs from the source input layer or the previous layer of the network, takes
    a weighted sum of the inputs, and then performs a nonlinear transformation to
    produce a single real-valued output. Each hidden layer can contain any number
    of neurons.


    ![](img/cfcc9569b5e92ea115855752abddd75a_269_0.png)


    The network shown in Figure 15.1 is an example of a fully-connected feed-forward
    neural network (FFNN), the most common type of ANN. In FFNN, signals flow in only
    one direction, from the input layer to the output layer via hidden layers. Neurons
    between consecutive layers are connected fully pairwise and neurons within a layer
    are not connected.


    > **What is deep learning**


    In a nutshell, using an ANN with a large number of hidden layers to find relationship/pattern
    in data is deep learning (technically, ≥ 2 hidden layers implies a deep neural
    network (DNN)). Several recent algorithmic innovations have overcome the model
    training issues for DNNs which have resulted in the DNN-led AI revolution we are
    witnessing today.'
  mdcn: '## 14.3 孤立森林简介


    孤立森林（IF）是一种由二元决策树组成的集成模型，也称为孤立树。IF是随机森林的无监督变体，广泛应用于异常点检测和新颖性/异常性检测。模型训练涉及构建多棵孤立树，每棵树的生成方式都确保每个训练样本最终落入其独立的叶子节点（即被“隔离”）。图14.8提供了一个简单的“示意图”。图中展示了一个包含四个NOC数据点的簇和两棵示例孤立树。显然，每棵树通过若干二元决策规则对测量空间进行划分，以“隔离”每个训练样本。模型训练完成后，测试样本会通过所有训练好的树，其异常性根据样本在各树中达到的平均深度来判断。通常，异常点倾向于靠近根节点，因此与深入树中的NOC点相比，其路径长度更短。这就是孤立森林的指导原则。


    ![](img/cfcc9569b5e92ea115855752abddd75a_263_0.png)


    在第13章中，我们了解到随机森林通过多样化其组成的决策树来获得强大的预测能力。在IF中，多样化是通过为每棵树使用随机子集的训练样本（无放回抽样）来实现的。此外，在树的每个节点，会随机选择一个特征/变量和分割值<sup>97</sup>来形成决策规则。


    <sup>97</sup> 分割值在所选变量的最大值和最小值之间选择。


    ## 孤立森林在故障检测中的应用


    下面我们展示如何使用IF模型生成监控图。


    ```python

    # IF score of each training sample

    from sklearn.ensemble import IsolationForest

    IF_model = IsolationForest(contamination=0.05)

    IF_model.fit(score_train)


    IFscore_train = -IF_model.score_samples(score_train) # score_samples returns the
    anomaly

    # score of the input samples; the lower, the more abnormal.

    IF_CL = np.percentile(IFscore_train, 95)

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_264_0.png)


    图14.9显示了训练样本的监控图。注意，训练分数的第95百分位数被用作控制限，导致6个训练样本被标记为异常。图14.10显示了故障测试样本的监控图。20个样本中只有7个被正确标记为故障，这表明IF模型不适合此数据集。


    ```python

    # scale and perform PCA on faulty test data; then find IF score values

    score_test = pipe.transform(unfolded_TestdataMatrix)

    IFscore_test = -IF_model.score_samples(score_test)


    print(''Number of flagged faults (using control chart): '', np.sum(IFscore_test
    > IF_CL))

    # can also use predict() function of IF class to flag faulty samples

    print(''Number of flagged faults (using predict): '', np.sum(IF_model.predict(score_test)
    == -1))

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_265_0.png)


    图14.10：金属刻蚀测试样本的FD-IF监控图


    ## 扩展孤立森林


    考虑以下具有正弦分布*的NOC样本及其相应的分数图。分数图*表明IF算法性能不佳。该分数图会让人误以为NOC数据存在于一个矩形块中，而非正弦模式。


    ![](img/cfcc9569b5e92ea115855752abddd75a_265_1.png)


    上述示例中IF失败的原因在于其仅限于使用水平和垂直分割。Hariri等人提出了一种替代算法，称为扩展孤立森林（https://github.com/sahandha/eif），该算法使用随机斜率进行分割，从而实现了更好的性能（尽管计算成本更高）。


    *图表由Hariri等人根据知识共享署名4.0许可协议（creativecommons.org/licenses/by/4.0）提供（ieeexplore.ieee.org/document/8888179）


    ## 总结


    在本章中，我们研究了基于不同邻近性概念的异常检测方法。具体来说，我们涵盖了*k*-NN、局部离群因子和孤立森林。尽管孤立森林在技术上不属于基于邻近性的技术类别，但由于其将异常视为“遥远且分散”的样本，我们在本章中将其与其他基于邻近性的方法归为一类。至此，我们已经涵盖了广泛应用于过程系统故障检测的主要经典机器学习技术。接下来，我们将转向基于人工神经网络的过程监控技术。


    # 第五部分


    ## 用于过程监控的人工神经网络


    # 第15章


    ## 通过监督人工神经网络建模进行故障检测与诊断


    毫不夸张地说，人工神经网络（ANN）是目前描述通用非线性过程最强大的建模工具。ANN可以捕捉任何类型的复杂非线性关系，不施加任何特定的过程特征，并且在模型拟合前不需要指定过程洞察。此外，最近的一些技术突破和计算进步使得（深度）ANN能够为广泛的问题提供显著的结果。相应地，ANN重新（引起）了数据科学家的兴趣，过程行业见证了基于机器学习的过程控制、预测性维护、推断建模和过程监控的成功应用激增。


    ANN可以用于监督学习和无监督学习环境。虽然我们将在本章介绍基于监督学习的ANN故障检测与诊断应用，但无监督学习将在下一章介绍。如果你有足够数量的历史故障样本（以便拟合故障分类模型），或者你的信号可以分为预测变量和响应变量（以便拟合回归模型并监控残差），那么ANN模型的监督拟合是适用的。已经设计了不同形式的ANN架构（如FFNN、RNN、CNN）来处理具有不同特征的数据集。CNN主要用于图像数据，因此我们将在本章研究FFNN和RNN。


    毫无疑问，ANN已被证明是极其强大的。然而，驯服这个“怪物”并不容易。如果模型超参数设置不当，很容易得到令人失望的结果。读者可以参考本系列丛书第1册的第3部分，了解ANN训练策略和ANN模型不同方面的详细阐述。本章的重点是向用户展示如何使用ANN构建过程监控应用。具体涵盖以下主题：


    - ANN简介

    - RNN简介

    - 通过外部分析使用ANN进行过程监控


    ## 15.1 ANN简介


    人工神经网络（ANN）是非线性经验模型，可以通过监督学习捕捉输入-输出变量之间的复杂关系，或通过无监督学习识别数据模式。在结构上，ANN受到人脑的启发，是一个由相互连接的神经元组成的复杂网络，如图15.1所示。ANN由一个输入层、一系列隐藏层和一个输出层组成。网络的基本单元——神经元，接受来自源输入层或网络前一层的输入向量，对输入进行加权求和，然后执行非线性变换以产生单个实数值输出。每个隐藏层可以包含任意数量的神经元。


    ![](img/cfcc9569b5e92ea115855752abddd75a_269_0.png)


    图15.1所示的网络是全连接前馈神经网络（FFNN）的一个例子，这是最常见的ANN类型。在FFNN中，信号仅沿一个方向流动，从输入层通过隐藏层流向输出层。连续层之间的神经元完全成对连接，而同一层内的神经元不连接。


    > **什么是深度学习**


    简而言之，使用具有大量隐藏层的ANN来发现数据中的关系/模式就是深度学习（技术上，≥ 2个隐藏层意味着深度神经网络（DNN））。最近的一些算法创新克服了DNN的模型训练问题，从而导致了我们今天所见证的DNN引领的AI革命。'

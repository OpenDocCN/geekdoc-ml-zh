    \n![](img/cfcc9569b5e92ea115855752abddd75a_48_0.png)\n\n## Pandas\n\nPandas是另一个非常强大的科学计算包。它构建在NumPy之上，提供了多种数据结构和功能，使得（表格）数据分析和预处理变得非常方便。一些值得注意的特性包括基于标签的切片/索引、（类似SQL的）数据分组/聚合、数据合并/连接以及时间序列功能。Series和DataFrame分别是Pandas提供的类一维和类二维数组结构\n\

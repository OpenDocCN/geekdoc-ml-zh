  md: '# 19.1 Fault Prognosis: Introduction & Workflow


    Fault prognosis simply refers to the task of estimating the progression of health
    degradation of a machine<sup>119</sup>. Fault prognosis kick in after a fault
    has been detected. The end objective of fault prognosis is to estimate the time
    remaining until fault severity hits failure threshold. A machine or an operation
    unit may be kept in operation (even with faults) until it reaches failure conditions.
    Therefore, estimation of the time remaining or RUL can help plant operators maximize
    an equipment lifetime and plan maintenance judiciously. Figure 19.1 presents the
    different prognostic methodologies that can be employed depending on the level
    of available information about fault mechanism and past fault data.


    ![](img/cfcc9569b5e92ea115855752abddd75a_334_0.png)


    Among the shown approaches, HI-based approach is very popular. A shown in Figure
    19.2, a curve showing the current trend of fault severity or health condition
    is computed. Thereafter, the future progression of the curve is predicted to estimate
    the RUL. In this chapter, we will look at how such curves can be generated in
    a data-driven way. The strategy for HI forecast is covered in detail in the next
    chapter.'
  merge: -1
  pgno: 334
- img_proc: true
  md: '![](img/cfcc9569b5e92ea115855752abddd75a_335_0.png)


    Figure 19.3 shows the typical workflow for data-driven fault prognosis. Although
    fault prognosis is preceded by fault detection, technically the models used for
    the two tasks can be different; therefore, fault prognosis has been presented
    as a standalone modeling exercise. It is not uncommon to have the same HI used
    first for fault detection and then subsequently for fault prognosis. Figure 19.3
    also shows two non-HI-based approaches where RULs are estimated directly, i.e.,
    pre-processed raw data or features are used as model inputs and RUL is the predicted
    output. The requirement of abundant historical run-to-failure data (which are
    rarely available in abundance) for training the DL and ML models make these regression-based
    approaches less common.


    ![](img/cfcc9569b5e92ea115855752abddd75a_335_1.png)


    Let’s now move on and learn how HIs are actually computed.'

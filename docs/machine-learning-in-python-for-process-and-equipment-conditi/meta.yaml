  - '[PAGE 123]


    # 7.4 PLS: An Introduction


    Partial least squares (PLS) is a supervised multivariate regression technique
    that estimates linear relationship between a set of input variables and a set
    of output variables. Like PCA, PLS transforms raw data into latent components
    - input ($X$) and output ($Y$) data matrices are transformed into score matrices
    $T$ and $U$, respectively. Figure 7.11 provides a conceptual comparison of PLS
    methodology with those of other popular linear regression techniques, principal
    component regression (PCR) and multivariate linear regression (MLR).


    ![](img/cfcc9569b5e92ea115855752abddd75a_123_0.png)


    While MLR computes the least-squares fit between $X$ and $Y$ directly, PCR first
    performs PCA on input data and then computes least-squares fit between the score
    matrix and $Y$. By doing so, PCR is able to overcome the issues of collinearity,
    high correlation, noisy measurements, and limited training dataset. However, the
    latent variables are computed independent of the output data and therefore, the
    score matrix may capture those variations in $X$ which are not relevant for predicting
    $Y$. PLS overcomes this issue by estimating the score matrices, $T$ and $U$, simultaneously
    such that the variation in $X$ that is relevant for predicting $Y$ is maximally
    captured in the latent variable space.


    > Note that if the number of latent components retained in PLS or PCR model is
    equal to the original number of input variables (m), then PLS and PCR models are
    equivalent to MLR model.


    The unique favorable properties of PLS along with low computational requirements
    has led to its widespread usage in process monitoring for real-time process monitoring,
    soft-sensing, fault classification, and so on.'
  - '[PAGE 124]


    # Mathematical background


    PLS performs 3 simultaneous jobs:


    +   - Capture maximum variability in $X$

    - Capture maximum variability in $Y$

    - Maximize correlation between $X$ and $Y$


    To see how PLS achieves its objectives, consider again the data matrix $X \in
    \mathbb{R}^{N \times m}$ consisting of $N$ observations of $m$ input variables
    where each row represents a data-point in the original measurement space. In addition,
    we also have an output data matrix with $p$ ($\ge 1$) output variables, $Y \in
    \mathbb{R}^{N \times p}$. It is assumed that each column is normalized to zero
    mean and unit variance in both the matrices. The first latent component scores
    are given by:


    $t_1 = Xw_1$ and $u_1 = Yc_1$


    The vectors $w_1$ and $c_1$, termed weight vectors, are computed such that the
    covariance between $t_1$ and $u_1$ are maximized. Referring to the definition
    of covariance, we can see that by maximizing the covariance, PLS tries to meet
    all the three objectives simultaneously.


    $Cov(t_1, u_1) = Correlation(t_1, u_1) * \sqrt{Var(t_1)} * \sqrt{Var(u_1)}$


    In the next step, with the computed pairs $\{X, t_1\}$ and $\{Y, u_1\}$, loading
    vectors ($p_1$ and $q_1$), are found via least squares regression


    $X = t_1p_1^T + E_1$ and $Y = u_1q_1^T + F_1$


    In Eq. 12, $E$ and $F$ are called residual matrices and represent the part of
    $X$ and $Y$ that have not yet been captured. To find the next component scores,
    the above three steps are repeated with matrices $E_1$ and $F_1$ replacing $X$
    and $Y$. Note that the maximum number of possible components equals $m$. For each
    component, the weight vectors are found via iterative procedures like NIPALS (algorithm
    shown later) or SIMPLS. The final PLS decomposition looks like the following


    $X = TP^T + E = \sum_{i=1}^k t_ip_i^T + E$


    $Y = UQ^T + F = \sum_{i=1}^k u_iq_i^T + F$


    where $k$ is the number of latent components computed. The expressions in Eq.
    (11) are referred to as the outer relations for the X and Y blocks, respectively.
    An inner relation is also estimated for each pair $\{t_i, u_i\}$ via linear regression'
  - '[PAGE 125]


    $u_i \approx b_i t_i$


    or $U = [u_1, u_2, \cdots, u_k] \approx [b_1 t_1, b_2 t_2, \cdots, b_k t_k] =
    TB$


    where $B = diag([b_1, b_2, \cdots, b_k])$ is a diagonal matrix of regression coefficients
    and connects the two blocks together; it is used to estimate an unknown $Y$ for
    a given $X$ through the latent variables as follows


    $\hat{Y} = \hat{U}Q^T = TBQ^T$


    If these algorithmic details appear intimidating, do not worry$^{40}$. Sklearn
    provides the class PLSRegression which is very convenient to use as we will see
    in the next section where we will develop a PLS-based fault detection tool.


    # Algorithm: PLS model fitting via NIPALS


    +   1) Initialize $i = 1$, $X_1 = X, Y_1 = Y$

    2) Set score vector $u_i (\in \mathbb{R}^{Nx1})$ to any column of $Y_i$

    3) Calculate weight vector $w_i = X^T u_i$

    4) Compute score vector $t_i (\in \mathbb{R}^{Nx1}) = X_i w_i$

    5) Scale $t_i$ to unit length: $t_i = t_i / \|t_i\|$

    6) Calculate weight vector $c_i = Y_i^T t_i$

    7) Update score vector $u_i = Y_i c_i$

    8) Scale $u_i$ to unit length: $u_i = u_i / \|u_i\|$

    9) Repeat steps 3 to 8 until convergence

    10) Deflate matrices:

    $X_{i+1} = X_i - t_i t_i^T X_i$

    $Y_{i+1} = Y_i - t_i t_i^T Y_i$

    11) Set $i = i + 1$ and return to step 2. Stop when $i > k$ [number of latents
    to be retained]

    12) Form the matrices $T = [t_1, t_2, \cdots, t_k]$

    $U = [u_1, u_2, \cdots, u_k]$'
  - '[PAGE 126]


    # Computing score matrix $T$ directly from $X$


    In PCA, we could directly obtain the score matrix T via the relation $T = XP$
    (Eq. (3)). Therefore, it is natural to wonder if we can extend Eq. (11) to write
    $T = XW$? Unfortunately, this wouldn''t be correct as the weight vectors ($w$)
    operate on the deflated matrices (see NIPALS algorithm). Nonetheless, there exist
    another set of vectors called the $r$ vectors$^{41}$ or the $R$ matrix which can
    provide us the scores directly from the original predictor matrix $X$.


    $t_i = Xr_i$ and $T = XR$


    where, $R = W(P^TW)^{-1}$ whose $j^{th}$ column equals the vector $r_i$. An obvious
    relationship is that $r_1 = w_1$.


    # 7.5 Fault Detection via PLS: Polyethylene Manufacturing Case Study


    Although soft sensing is the predominant use of PLS in process industry, the PLS
    framework renders itself useful for process monitoring as well. The overall methodology
    is similar to PCA-based monitoring: after PLS modeling, monitoring indices are
    computed, control limits are determined, and violation of the control limits are
    checked for fault detection. PLS-based monitoring is preferred when process data
    can be divided into input and output blocks. For illustration, we will use data
    collected from an LDPE (low-density polyethylene) production process using a simulated
    model that was tuned to match a typical industrial process$^{42}$. As shown in
    the figure below, the process consists of a multi-zonal tubular reactor. The dataset
    consists of 54 samples of 14 process variables and 5 product quality variables.
    It is known that a process fault occurs sample 51 onwards (Figure 7.13).


    ![](img/cfcc9569b5e92ea115855752abddd75a_126_0.png)'
  - '[PAGE 127]


    Our objective here is to build a fault detection tool that clearly indicates the
    onset of process fault. To appreciate the need for such a tool, let''s look at
    the alternative conventional monitoring approach. If a plant operator was manually
    monitoring the 5 quality variables continuously, he/she could notice a slight
    drop in values for the last 4 samples. However, given that the quality variables
    exhibit large variability during normal operations, it is difficult to make any
    decision without first examining other process variables because the quality variables
    may simply be responding to ''normal'' changes elsewhere in the process. Unfortunately,
    it would be very inconvenient to manually interpret all the process plots simultaneously.


    ![](img/cfcc9569b5e92ea115855752abddd75a_127_0.png)


    We begin by building a PLS model using 3 latent components<sup>43</sup>.


    ```

    # fetch data

    data = pd.read_csv(''LDPE.csv'', usecols = range(1,20)).values

    data_train = data[:-4,:] # exclude last 4 faulty samples


    # scale data

    from sklearn.preprocessing import StandardScaler

    scaler = StandardScaler()

    data_train_normal = scaler.fit_transform(data_train)

    ```


    > <sup>43</sup> Kourt & MacGregor, Process analysis, monitoring and diagnosis,
    using multivariate projection methods, Chemometrics and Intelligent Laboratory
    Systems, 1995'
- md: "## build PLS model\n\n```python\nfrom sklearn.cross_decomposition import PLSRegression\n\
    X_train_normal = data_train_normal[:,:-5]\nY_train_normal = data_train_normal[:,-5:]\n\
    \npls = PLSRegression(n_components = 3)\npls.fit(X_train_normal, Y_train_normal)\n\
    ```\n\nComputation of captured variances reveal that just 56% of the information\
    \ in $X$ can explain almost 90% of the variation in $Y$; this implies that there\
    \ are variations in $X$ which have only minor impact on quality variables.\n\n\
    ```python\n# X and Y variance captured\nfrom sklearn.metrics import r2_score\n\
    print('Y variance captured: ', 100*pls.score(X_train_normal, Y_train_normal),\
    \ '%')\n\nTscores = pls.x_scores_\nX_train_normal_reconstruct = np.dot(Tscores,\
    \ pls.x_loadings_.T)\n# can also use pls.inverse_transform(Tscores)\n\nprint('X\
    \ variance captured: ', 100*r2_score(X_train_normal, X_train_normal_reconstruct),\
    \ '%')\n\n>>> Y variance captured: 89.91 %\n>>> X variance captured: 56.03 %\n\
    ```\n\nA look at $t$ vs $u$ score plots further confirms that linear correlation\
    \ was a good assumption for this dataset. We can also see how the correlation\
    \ becomes poor for higher components.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_128_0.png)\n\
    \n## Fault detection indices\n\nFor PLS, three monitoring indices are computed:\
    \ one $T^2$ statistic from t-scores, and two SPE statistics from $X$ and $Y$ residuals.\n\
    \n### $T^2$ statistic\n\nLike in PCA, $T^2$ statistic quantifies the systematic\
    \ variations in predictor variables ($X$) that are related to the systematic variations\
    \ in response ($Y$) variables. Large deviation in $T^2$ statistic implies significant\
    \ changes in process operating conditions. Let $t_i$ denote the $i^{th}$ row of\
    \ $T$. The $T^2$ index for this data-point is given by\n\n$$T^2 = \\sum_{j=1}^{k}\
    \ \\frac{t_{i,j}^2}{\\sigma_j} = t_i \\Lambda_k^{-1} t_i^T$$\n\n$\\Lambda_k$,\
    \ a diagonal matrix, is the covariance matrix of $T$ with $\\sigma_j$ (variance\
    \ of $j^{th}$ component scores) as its diagonal elements. $T_{CL}^2$ for a false\
    \ rate of $\\alpha$ is obtained by the following expression\n\n$$T_{CL}^2 = \\\
    frac{k(N^2 - 1)}{N(N - k)} F_{k, N-k}(\\alpha)$$\n\n### SPE$_x$ and SPE$_y$ statistics\n\
    \nThe second and third indices, SPE$_x$ and SPE$_y$, represents the residuals\
    \ or the unmodelled part of $X$ and $Y$, respectively. Let $e_i$ and $f_i$ denote\
    \ the $i^{th}$ row of $E$ and $F$, respectively. Then\n\n$$SPE_x = \\sum_{j=1}^{m}\
    \ e_{i,j}^2$$\n$$SPE_y = \\sum_{j=1}^{p} f_{i,j}^2$$\n\nNote that if output measurements\
    \ are not available in real-time then SPE$_y$ is not calculated. With normality\
    \ assumption for the residuals and large number of training samples, the control\
    \ limit for SPE statistic is given by the following expression\n\n$$SPE_{CL} =\
    \ g \\chi_{\\alpha}^2(h)$$\n$$h = \\frac{2\\mu^2}{\\sigma}, \\quad g = \\frac{\\\
    sigma}{2\\mu}$$\n\n$\\chi^2_{\\alpha}$ is the $(1-\\alpha)$ percentile of a chi-squared\
    \ distribution$^{44}$ with h degrees of freedom; $\\mu$ denotes the mean value\
    \ and $\\sigma$ denotes the variance of the SPE statistic. Let's now generate\
    \ the control charts for the fault detection indices.\n\n```python\n# monitoring\
    \ indices for training data\n# T$^2$\nN = data_train_normal.shape[0]\nk = 3\n\n\
    T_cov = np.cov(Tscores.T)\nT_cov_inv = np.linalg.inv(T_cov)\nT2_train = np.zeros((N,))\n\
    for i in range(N):\n    T2_train[i] = np.dot(np.dot(Tscores[i,:],T_cov_inv),Tscores[i,:].T)\n\
    \n# SPEx\nx_error_train = X_train_normal - X_train_normal_reconstruct\nSPEx_train\
    \ = np.sum(x_error_train*x_error_train, axis = 1)\n\n# SPEy\ny_error_train = Y_train_normal\
    \ - pls.predict(X_train_normal)\nSPEy_train = np.sum(y_error_train*y_error_train,\
    \ axis = 1)\n\n# control limits\n#T$^2$\nimport scipy.stats\nalpha = 0.01 # 99%\
    \ control limit\nT2_CL = k*(N**2-1)*scipy.stats.f.ppf(1-alpha,k,N-k)/(N*(N-k))\n\
    \n# SPEx\nmean_SPEx_train = np.mean(SPEx_train)\nvar_SPEx_train = np.var(SPEx_train)\n\
    \ng = var_SPEx_train/(2*mean_SPEx_train)\nh = 2*mean_SPEx_train**2/var_SPEx_train\n\
    SPEx_CL = g*scipy.stats.chi2.ppf(1-alpha, h)\n\n# SPEy\nmean_SPEy_train = np.mean(SPEy_train)\n\
    var_SPEy_train = np.var(SPEy_train)\n\ng = var_SPEy_train/(2*mean_SPEy_train)\n\
    h = 2*mean_SPEy_train**2/var_SPEy_train\nSPEy_CL = g*scipy.stats.chi2.ppf(1-alpha,\
    \ h)\n```\n\n> $^{44}$ Yin et al., A review of basic data-driven approaches for\
    \ industrial process monitoring, IEEE Transactions on Industrial Electronics,\
    \ 2014\n\n![](img/cfcc9569b5e92ea115855752abddd75a_131_0.png)\n\n## Fault detection\
    \ on test data\n\nLet's see now if our monitoring statistics can detect the presence\
    \ of process abnormality towards the end of the data samples. We will consider\
    \ the whole dataset as test data for ease of comparison. Monitoring charts clearly\
    \ indicates that the process has encountered severe abnormality at the end of\
    \ the sampling period. Significantly high SPE_x indicates that the abnormality\
    \ has significantly affected input variable correlations. Which specific input\
    \ variable is the culprit? The fault isolation exercise in the next section answers\
    \ this question.\n\n```python\n# get test data, normalize it\ndata_normal = scaler.transform(data)\n\
    X_normal = data_normal[:,:-5]\nY_normal = data_normal[:,-5:]\n\n# get model predictions\n\
    Tscores_test = pls.transform(X_normal)\nX_normal_reconstruct = np.dot(Tscores_test,\
    \ pls.x_loadings_.T)\nY_normal_pred = pls.predict(X_normal)\n\n# compute monitoring\
    \ statistics\nT2_test = np.zeros((data_normal.shape[0],))\nfor i in range(data_normal.shape[0]):\n\
    \    T2_test[i] = np.dot(np.dot(Tscores_test[i,:],T_cov_inv),Tscores_test[i,:].T)\n\
    \nx_error_test = X_normal - X_normal_reconstruct\nSPEX_test = np.sum(x_error_test*x_error_test,\
    \ axis = 1)\n\ny_error_test = Y_normal - pls.predict(X_normal)\nSPEy_test = np.sum(y_error_test*y_error_test,\
    \ axis = 1)\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_132_0.png)\n\n##\
    \ 7.6 Fault Isolation via Contribution Analysis for PLS\n\nContribution analysis-based\
    \ fault isolation for PLS model proceed along the similar lines as that for PCA.\
    \ Each monitoring statistic is broken down into contributions from individual\
    \ variables and the variables with highest contributions are flagged as potentially\

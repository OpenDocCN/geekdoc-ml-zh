    The $T^2$ and Q indices quantify different kinds of variations in data. While
    $T^2$ is a measure of distance from origin in PC space, Q is a measure of the
    portion of data that is not explained by the PCA model. It is possible that an
    abnormal situation violates control limit of one index, but not the other. Therefore,
    it is crucial to monitor both the indices.


    ![](img/cfcc9569b5e92ea115855752abddd75a_119_0.png)



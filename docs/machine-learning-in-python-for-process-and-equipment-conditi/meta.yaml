  mdcn: "## 通过自编码器进行降维\n\n为了展示自编码器的实际应用，我们将它应用于图16.2所示的流化催化裂化装置（FCCU<sup>103</sup>）模拟数据集的降维。FCCU是现代炼油厂的关键装置，它将重质烃类转化为更轻、更有价值的产品，如液化石油气、汽油等。如图所示，FCCU操作涉及催化反应、催化剂再生和蒸馏。共有46个信号作为输出（每分钟记录一次）。数据以7个CSV文件的形式提供。每个文件包含一次模拟的数据。其中一个CSV文件包含在进料流量变化条件下，为期7天的正常操作工况（NOC）数据。在5个独立的模拟中，一次模拟一个故障。我们将使用这7天的NOC数据。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_287_0.png)\n\n我们知道数据中的大部分变异性是由进料流量的变化驱动的，因此，我们将尝试生成一个一维潜在空间（$m=1$）。\n\
    \n```python\n# import required packages\nimport numpy as np, pandas as pd, matplotlib.pyplot\
    \ as plt\nimport tensorflow\nfrom sklearn.model_selection import train_test_split\n\
    from sklearn.preprocessing import StandardScaler\n```\n\n```python\nfrom tensorflow.keras.layers\
    \ import Input, Dense\nfrom tensorflow.keras import regularizers\nfrom tensorflow.keras.models\
    \ import Model\n```\n\n```python\n# read data, split into fitting and validation\
    \ datasets, and scale\nX_train = pd.read_csv('NOC_varyingFeedFlow_outputs.csv',\
    \ header=None).values\nX_train = X_train[:,1:] # first column contains timestamps\n\
    X_fit, X_val, _, _ = train_test_split(X_train, X_train, test_size=0.2, random_state=10)\n\
    ```\n\n```python\nscaler = StandardScaler()\nX_fit_scaled, X_val_scaled = scaler.fit_transform(X_fit),\
    \ scaler.transform(X_val)\nX_train_scaled = scaler.transform(X_train)\n```\n\n\
    ```python\n# define and compile model\ninput_layer = Input(shape=(X_fit_scaled.shape[1],))\
    \ # input layer\nencoded = Dense(1, activation='relu')(input_layer) # encoder\
    \ layer\ndecoded = Dense(X_fit_scaled.shape[1], activation='linear')(encoded)\
    \ # decoder layer\n```\n\n```python\nautoencoder = Model(inputs=input_layer, outputs=decoded)\n\
    encoder = Model(inputs=input_layer, outputs=encoded)\nautoencoder.compile(optimizer='adam',\
    \ loss='mse')\n```\n\n你可能注意到，我们定义人工神经网络模型的方式与前几章略有不同。这样做是为了让我们以后可以单独使用训练好的编码器。现在让我们来训练我们的自编码器。\n\
    \n```python\n# fit model\nfrom tensorflow.keras.callbacks import EarlyStopping\n\
    es = EarlyStopping(monitor='val_loss', patience=10)\nhistory = autoencoder.fit(X_fit_scaled,\
    \ X_fit_scaled, epochs=300, batch_size=256,\n                          validation_data=(X_val_scaled,\
    \ X_val_scaled), callbacks=es)\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_288_0.png)\n\
    \n验证曲线表明模型已经收敛。让我们检查一下一维潜在空间是否足以重构原始数据。\n\n```python\n# predict for overall training\
    \ dataset\nX_train_scaled_pred = autoencoder.predict(X_train_scaled)\nX_train_pred\
    \ = scaler.inverse_transform(X_train_scaled_pred)\n\nvar = 7\nplt.figure(), plt.plot(X_train[:,var],\
    \ 'seagreen', linewidth=1), plt.plot(X_train_pred[:,var],'red')\nplt.xlabel('time\
    \ (mins)'), plt.ylabel('Furnace firebox temperature (T3) ')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_289_0.png)\n\
    \n重构的数据很好地遵循了原始数据的系统性变化。查看潜在信号有助于解释这些结果。下图显示，潜在变量主要是进料流量的编码。然后，编码后的进料流量被解码器用于重构其余变量。\n\
    \n```python\n# predict latents\nh_train = encoder.predict(X_train_scaled)\n\n\
    plt.figure(figsize=[15,5]), plt.plot(X_train_scaled[:,0],'seagreen', label='Scaled\
    \ actual feed flow')\nplt.plot(h_train, 'purple', label='latent signal')\nplt.xlabel('time\
    \ (mins)'), plt.ylabel('h'), plt.legend()\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_289_1.png)\n\
    \n> 在上面的例子中，特征空间的维度是预先已知的。然而，通常情况下，这会成为一个需要与其他超参数（如隐藏层数量、学习率、批量大小等）一起优化的超参数。一个通用的指导原则是，连续层之间（在编码器中）的神经元压缩不应过于陡峭。压缩比为0.5通常是一个良好的起始值。\n\
    \n## 16.2 使用自编码器进行过程监控：FCCU案例研究\n\n通过自编码器进行故障检测和诊断的过程与主成分分析（PCA）类似。为每个训练样本计算重构误差和潜在变量，并生成监控指标。让我们看看计算是如何进行的。我们将重新使用FCCU数据集。我们将使用7天的NOC数据构建一个自编码器模型，并将换热器结垢模拟数据（UAf_decrease_outputs.csv）用作测试数据集。让我们快速了解一下换热器结垢故障。传热减少导致控制器TC1更多地打开阀门V1以增加燃料流量，从而将T2维持在设定值。此外，进入预热进料的热量减少意味着炉子中的烟气温度（T3）升高。下图总结了该情景。这里显示了变量F5和T3，它们的值漂移是明显的；然而，“故障值”与在进料流量变化的无故障操作下获得的正常值相差不远。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_290_0.png)\n\n我们的目标是使用自编码器模型，仅使用NOC样本进行模型训练，来标记故障样本。\n\
    \n## 故障检测指标\n\n对于数据样本 $x$，以熟悉的方式计算统计量 $Q$ 和 $T^2$。\n\n$$Q = e^Te = (x - \\hat{x})^T(x\
    \ - \\hat{x})$$\n\n$$T = h^T \\Lambda^{-1} h$$\n\n潜在变量的协方差矩阵\n\n让我们为训练样本生成监控图表。使用堆叠自编码器模型构建故障检测解决方案。\n\
    \n```python\n# define and compile model\ninput_layer = Input(shape=(X_fit_scaled.shape[1],))\n\
    encoded = Dense(23, kernel_regularizer=regularizers.L1(0.0001), activation='relu',\n\
    \                kernel_initializer='he_normal')(input_layer)\nencoded = Dense(6,\
    \ kernel_regularizer=regularizers.L1(0.0001), activation='relu',\n           \
    \     kernel_initializer='he_normal')(encoded)\ndecoded = Dense(23, kernel_regularizer=regularizers.L1(0.0001),\
    \ activation='relu',\n                kernel_initializer='he_normal')(encoded)\n\
    decoded = Dense(X_fit_scaled.shape[1], kernel_regularizer=regularizers.L1(0.0001),\n\
    \                activation='linear')(decoded)\n\nautoencoder = Model(inputs=input_layer,\
    \ outputs=decoded)\nencoder = Model(inputs=input_layer, outputs=encoded)\nautoencoder.compile(optimizer='adam',\
    \ loss='mse')\n```\n\n```python\n# fit model\nfrom tensorflow.keras.callbacks\
    \ import EarlyStopping\nes = EarlyStopping(monitor='val_loss', patience=10)\n\
    history = autoencoder.fit(X_fit_scaled, X_fit_scaled, epochs=300, batch_size=256,\n\
    \                          validation_data=(X_val_scaled, X_val_scaled), callbacks=es)\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_291_0.png)\n\n```python\n##################################################\n\
    Monitoring statistics for training samples\n##################################################\n\
    \nh_train = encoder.predict(X_train_scaled)\n\n# Q metric for training samples\n\
    error_train = X_train_scaled - X_train_scaled_pred\nQ_train = np.sum(error_train*error_train,\
    \ axis = 1)\nQ_CL = np.percentile(Q_train, 99)\n\n# T2 metric for training samples\n\
    h_cov = np.cov(h_train, rowvar=False)\nh_cov_inv = np.linalg.inv(h_cov)\nT2_train\
    \ = np.zeros((X_train.shape[0],))\nfor i in range(X_train.shape[0]):\n    T2_train[i]\
    \ = np.dot(np.dot(h_train[i,:], h_cov_inv), h_train[i,:].T)\nT2_CL = np.percentile(T2_train,\
    \ 99)\n\n# Q_train control chart\nplt.figure(), plt.plot(Q_train, color='black')\n\
    plt.plot([1,len(Q_train)],[Q_CL,Q_CL], linestyle='--',color='red')\nplt.xlabel('Sample\
    \ #'), plt.ylabel('Q metric: training data')\n\n# T2_train control chart\nplt.figure(),\
    \ plt.plot(T2_train, color='black')\nplt.plot([1,len(T2_train)],[T2_CL,T2_CL],\
    \ linestyle='--',color='red')\nplt.xlabel('Sample #'), plt.ylabel('T2 metric:\
    \ training data')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_292_0.png)\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_292_1.png)\n\n## 测试数据的故障检测\n\n现在让我们为换热器结垢数据集生成监控图表。"

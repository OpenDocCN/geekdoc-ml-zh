    # 16.1 Autoencoders: An Introduction


    An autoencoder (AE) in its basic form is a 3-layered ANN consisting of an input
    layer, a hidden layer, and an output layer as shown in Figure 16.1. An AE takes
    an input $x \in \mathbb{R}^n$ and predicts a reconstructed $\hat{x} \in \mathbb{R}^n$
    as an output. To prevent the network from trivially copying $x$ to $\hat{x}$,
    the hidden layer is constrained to be much smaller than $n$ (the number of neurons
    in the hidden layer, say $m$, gives the dimension of the latent/feature space).
    This forces the network to capture only the systematic variations in input data
    and learn only the most representative features as the latent variables. The nonlinear
    activation function of the neurons in the hidden layer enables the latent variables
    to be nonlinearly related to the input variables. During model fitting, the gap
    between $x$ and $\hat{x}$ (termed reconstruction error) is minimized to find network
    parameters. The basic AE network can be made deeper by adding more hidden layers
    resulting in deep (or stacked) autoencoders.


    ![](img/cfcc9569b5e92ea115855752abddd75a_285_0.png)'
  - '[PAGE 286]


    The symmetrical and sandwich nature of the deep AE architecture should be apparent
    wherein the sizes of the layers first decrease and then increase. Care must be
    taken though to not use too many hidden layers; otherwise, the network will overfit
    and may simply learn the identity mapping from $x$ to $\hat{x}$! Moreover, in
    the previous figure, you will notice that AE architecture is divide into an encoder
    part and a decoder part. An encoder projects or codify an input sample $x$ to
    lower dimensional feature $h$. The decoder maps the feature vector back to the
    input space. The encoder-decoder form makes the AR architecture very flexible.
    Once an AE has been trained, one can use the encoder as a standalone network to
    obtain the latent variables. Moreover, you are not limited to using only FFNN
    in the encoders and decoders. RNNs and CNNs are also frequently employed. RNN-based
    AE is used as a nonlinear counterpart of dynamic PCA.


    ![](img/cfcc9569b5e92ea115855752abddd75a_286_0.png)


    # Vanilla AE vs Denoising AE


    The form of autoencoder we saw in Figure 16.1 is the conventional or vanilla form
    wherein the network is forced to find patterns in data by constraining the size
    of coding/latent variable ($m$) to be less than the size of input variable ($n$).
    This is also called an undercomplete autoencoder. An alternative way of forcing
    an autoencoder to learn only the systematic variation in data is by corrupting
    input data by adding synthetic noise and then training the network to reconstruct
    the uncorrupted input. Such autoencoders are called denoising autoencoders and
    its representative architecture is shown below. Note that we did not explicitly
    represent encoder having number of neurons in hidden layer less than the number
    of input variables. Denoising AE allow having $m \geq n$.


    ![](img/cfcc9569b5e92ea115855752abddd75a_286_1.png)'

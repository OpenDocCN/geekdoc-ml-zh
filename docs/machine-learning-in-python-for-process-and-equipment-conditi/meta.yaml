    differ from s1 and s2 signals in terms of sign and magnitude; we will soon learn
    why this happens and why this is not a cause of worry.


    $^{47}$ www.sci.utah.edu/~shireen/pdfs/tutorials/Elhabian_ICA09.pdf is an excellent
    quick read for more details on this.'

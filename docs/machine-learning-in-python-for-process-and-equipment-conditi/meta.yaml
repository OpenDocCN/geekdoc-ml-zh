  md: '# # Chapter 20


    # ## Fault Prognosis: RUL Estimation


    In the previous chapter, we introduced the concept of remaining useful life which
    is simply the time remaining until failure of an equipment. Three broad data-based
    techniques were mentioned that are: 1) reliability data-based approach wherein
    lifespan distribution of similar equipment is utilized to find the expected RUL
    2) direct computation of RUL via regression-based ML modeling 3) computation of
    health indicator as an intermediate step. The first two approaches require information
    about the past lifespan of equipment and complete run-to-failure histories. However,
    it is difficult to get these data in process industry as very often machines get
    repaired before they reach failure stages (remember preventive maintenance!).
    This makes HI-based approach more suitable and, unsurprisingly, more popular.
    In the previous chapter, we saw how to compute HI for a wind turbine. We will
    take this case study to completion and show how to estimate the RUL.


    Within the HI-based approach, two strategies are widely adopted. If decent amount
    of past run-to-failure data are available, then one can simply pick up the historical
    HI trend that matches the most with the current equipment''s HI trajectory and
    use the historical lifespan to compute the required RUL. This is called similarity-based
    approach. A popular alternative is to simply use the existing HI values of current
    equipment and fit a curve to it to extrapolate it in the future and find when
    the failure threshold is breached. This is called degradation-based approach.
    We will go into more details into these two strategies in this chapter. Overall,
    the following topics are covered


    +   - Introduction to RUL

    - Health indicator-based RUL estimation strategies

    - Health indicator degradation modeling for RUL estimation of a wind turbine

    - Deep learning-based direct RUL estimation for a gas turbine'

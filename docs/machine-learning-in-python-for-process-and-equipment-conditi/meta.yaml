    # Chapter 16


    # Fault Detection & Diagnosis via Unsupervised Artificial Neural Networks Modeling


    In the previous chapter, we looked at supervised fitting of artificial neural
    networks where either the faults labels were available for historical samples
    or the process variables were divided into predictors and response variable sets.
    However, you are very likely to encounter situations where you only have NOC samples
    in your training dataset without any predictor/response division. In Part 3 of
    this book, we studied a powerful technique suitable for such datasets, called
    PCA; PCA, however, is limited to linear processes. Nonetheless, the underlying
    mechanism of extracting the most representative features of training dataset and
    compressing it into a feature space with reduced dimensionality need not be limited
    to linear systems. ANNs excel at handling nonlinear systems and extracting hidden
    patterns in high-dimensional datasets. Unsurprisingly, clever neural network-based
    architectures have been devised to enable unsupervised fitting of nonlinear datasets.
    Two popular models in this category are autoencoders (AEs) and self-organizing
    maps (SOMs)


    Autoencoders are ANN-based counterparts of PCA for nonlinear processes. Here,
    low-dimensional latent feature space is derived via nonlinear transformation and,
    just like we did for PCA, the systematic variations in the feature space and the
    reconstruction errors are handled separately to provide the monitoring statistics.
    Autoencoders are very popular for building FDD solutions for nonlinear processes.
    They are also commonly used to provide intermediate low-dimensional features which
    are then used for subsequent modeling (clustering, fault classification, etc.).
    SOM is another variant of neural network-based architecture that project a high-dimensional
    dataset onto a 2D grid (yes, you read that right!). Here, latent variables are
    not derived, albeit the focus is on ensuring that the topology of the projected
    data is similar to that in the original measurement space. This feature renders
    SOMs very useful for data visualization, clustering, and fault detection applications.


    We will undertake in depth study of both these powerful techniques in this chapter.
    Specifically, the following topics are covered


    +   - Introduction to autoencoders and self-organizing maps

    - Fault detection and diagnosis using autoencoders: application to FCCU process

    - Fault detection and diagnosis using SOMs: application to semiconductor dataset'

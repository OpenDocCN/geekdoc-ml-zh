    # 19.1 Fault Prognosis: Introduction & Workflow


    Fault prognosis simply refers to the task of estimating the progression of health
    degradation of a machine<sup>119</sup>. Fault prognosis kick in after a fault
    has been detected. The end objective of fault prognosis is to estimate the time
    remaining until fault severity hits failure threshold. A machine or an operation
    unit may be kept in operation (even with faults) until it reaches failure conditions.
    Therefore, estimation of the time remaining or RUL can help plant operators maximize
    an equipment lifetime and plan maintenance judiciously. Figure 19.1 presents the
    different prognostic methodologies that can be employed depending on the level
    of available information about fault mechanism and past fault data.


    ![](img/cfcc9569b5e92ea115855752abddd75a_334_0.png)


    Among the shown approaches, HI-based approach is very popular. A shown in Figure
    19.2, a curve showing the current trend of fault severity or health condition
    is computed. Thereafter, the future progression of the curve is predicted to estimate
    the RUL. In this chapter, we will look at how such curves can be generated in
    a data-driven way. The strategy for HI forecast is covered in detail in the next
    chapter.'
  - '[PAGE 335]


    ![](img/cfcc9569b5e92ea115855752abddd75a_335_0.png)


    Figure 19.3 shows the typical workflow for data-driven fault prognosis. Although
    fault prognosis is preceded by fault detection, technically the models used for
    the two tasks can be different; therefore, fault prognosis has been presented
    as a standalone modeling exercise. It is not uncommon to have the same HI used
    first for fault detection and then subsequently for fault prognosis. Figure 19.3
    also shows two non-HI-based approaches where RULs are estimated directly, i.e.,
    pre-processed raw data or features are used as model inputs and RUL is the predicted
    output. The requirement of abundant historical run-to-failure data (which are
    rarely available in abundance) for training the DL and ML models make these regression-based
    approaches less common.


    ![](img/cfcc9569b5e92ea115855752abddd75a_335_1.png)


    Let’s now move on and learn how HIs are actually computed.'
  - '[PAGE 336]


    # Maintenance Strategies


    The maintenance strategies in process industry have been strongly influenced by
    the advances in ML and sensor technologies. It has evolved from time-based preventive
    maintenance to proactive monitoring-based condition-based maintenance (CBM), and
    to advanced prediction-based predictive maintenance (PdM).


    | Preventive Maintenance | Condition-based Maintenance | Predictive Maintenance
    |

    |---|---|---|

    | • Equipment maintenance is done at pre-set schedule<br>• Non-optimal strategy
    as maintenance may happen too early or too late<br>• E.g., a compressor may be
    scheduled to be replaced every 5 years | • Equipment maintenance is done when
    signs of faults are detected<br>• Manual expert analysis is carried out to determine
    exact maintenance plan<br>• E.g., a compressor may be monitored using PCA to detect
    the need to repair | • Degradation of machine’s health over time is estimated
    and the time remaining until failure is computed<br>• E.g., a compressor may be
    monitored using RNN to estimate when vibration RMS will go above failure level
    |


    # 19.2 Machinery Health Indicators: Introduction and Approaches


    By now you understand that a health indicator is simply a metric that (directly
    or indirectly) quantifies the fault status of an equipment or process. For example,
    consider a catalyst-filled reformer tube in a steam-methane reformer that develops
    a crack on its outer surface. Specialized tools exist that can measure the depth
    of crack and thus directly tell us the fault severity. Alternatively, one can
    measure the surface and furnace gas temperature around the crack which will show
    abnormal values due to the crack. The value of abnormal deviation (difference
    between observed and expected value) would indirectly give us the level of fault
    severity.


    ![](img/cfcc9569b5e92ea115855752abddd75a_336_0.png)


    HI can simply be one of the measured signals or a combination of them. It may
    also be derived from a model. Many ML techniques that we worked with in the previous
    chapters already provide metrics that can be used a health indicator. For example,
    in SVDD, the distance from the center in the feature space can be used as a HI
    as it indicates how far a test system has moved away from the NOC behavior. Figure
    19.4 below summarizes the different approaches for HI construction. Let’s take
    a brief look at them.'
  - '[PAGE 337]


    # HI Construction Methods


    Statistical parameters


    ![](img/cfcc9569b5e92ea115855752abddd75a_337_0.png)


    Example: For rotating machines, RMS, crest factor, kurtosis, etc., are used as
    HIs.


    Signal processing


    ![](img/cfcc9569b5e92ea115855752abddd75a_337_1.png)


    Example: For rotating machines, features from spectrum (such as peak amplitude)
    are used as HIs.


    Fusion-based


    ![](img/cfcc9569b5e92ea115855752abddd75a_337_2.png)


    Example: Statistical parameters and features from processed signals are fused
    using PCA and the 1st principal component score is used as HI.


    Distance from NOC data


    ![](img/cfcc9569b5e92ea115855752abddd75a_337_3.png)


    Example: Mahalanobis/Euclidean/ KNN distance from NOC samples is used as HI.


    ML model-based


    ![](img/cfcc9569b5e92ea115855752abddd75a_337_4.png)


    Example: Reconstruction error (autoencoder model), quantization error (SOM model),
    T² or Q metric (PCA), etc., are used as HIs.


    Prediction error-based


    ![](img/cfcc9569b5e92ea115855752abddd75a_337_5.png)


    Example: MSE value from ANN regression is used as HI.


    Direct HI modeling


    ![](img/cfcc9569b5e92ea115855752abddd75a_337_6.png)


    Example: Using historical run-to-failure data, an ANN model is built to predict
    HI as a function of process data or extracted features.


    Figure 19.4: Approaches for health indicator construction'
  - '[PAGE 338]


    While Figure 19.4 is self-explanatory, a few aspects are worth mentioning.


    # Dimensional vs dimensionless features


    Statistical parameters are commonly used for fault prognosis in rotating machinery.
    However, as we alluded in Chapter 17, dimensional parameters like RMS depend on
    operating condition such as machine rotating speed and therefore are not suitable
    for use as a HI. Dimensionless parameters such as skewness, kurtosis, crest factor,
    and impulse factor are more suitable.


    # Feature selection


    Another aspect is the selection of features for creating fusion-based HI or intermediate
    model. A common practice is to include only those features that show clear monotonic
    trend as health condition deteriorates.


    ![](img/cfcc9569b5e92ea115855752abddd75a_338_0.png)


    Monotonicity is usually computed as the Spearman correlation between the feature
    values and time which indicates whether the feature continuously increases (or
    decreases) with time or not. Monotonicity ranges from 1- to 1 where a large absolute
    value is favorable for prognosis.


    # Feature smoothing


    Extracted features are almost always noisy as shown in the illustration below.
    Noise can impact the accuracy of RUL estimation and monotonicity valve (and therefore
    feature selection result). Therefore, a common practice is to smooth out the noise
    in features. Smoothing is commonly conducted via (causal) moving averaging, wherein,
    the smoothed value at any time is given by the average of the recent past data.'
  - '[PAGE 339]


    ![](img/cfcc9569b5e92ea115855752abddd75a_339_0.png)


    ![](img/cfcc9569b5e92ea115855752abddd75a_339_1.png)


    # Spearman Correlation


    Spearman correlation between two variables $x$ and $y$ is simply the Pearson correlation
    between the rank of the variables and is often used to quantify nonlinear relationship
    between a pair of variables.


    $$\rho_{spearman} = cov(r_x, r_y) / \sigma_{r_x} \sigma_{r_y}$$


    $$\sigma_{r_x} = \text{rank of variable } x; \quad \sigma_{r_y} = \text{rank of
    variable } y$$


    ![](img/cfcc9569b5e92ea115855752abddd75a_339_2.png)


    The plots above make it apparent that $\rho_{spearman}$ can capture the monotonic
    relationship between two variables very well.


    # Historical run-to-failure data


    The last approach in Figure 9.4 differs from the rest in that it is a supervised
    learning of HI. Here, historical run-to-failure$^{120}$ data is used to create
    a map between machine/process data to HI. For any single run-to-failure data sequence,
    the HI labels are estimated using the heuristics that HI is 1 for healthy machine
    and 0 for a failed machine. HI values are interpolated for intermediate states.
    Illustration below shows the procedure.'
- md: "Let us bring all the covered concepts together and see an application of approach\
    \ three from Figure 19.4 for HI construction for a (wind) turbine using vibration\
    \ signals.\n\n## 19.3 Health Indicator Construction Using Vibration Signals for\
    \ a Wind Turbine\n\nAs alluded to before in Chapter 17, the wind turbine dataset<sup>121</sup>\
    \ consists of vibration acceleration recorded from a wind turbine for a period\
    \ of 50 days. Six seconds of vibration data was recorded each day. A total of\
    \ 50 files have been provided with each file containing data for a day. A fault\

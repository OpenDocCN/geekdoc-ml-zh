    # 3.5 Multimode/Multi-clustered Distribution Assessment Techniques


    The most common approach for determining the presence of multimodality in data
    is to divide the dataset into distinct clusters and look for the optimal number
    of clusters. Techniques such as k-means clustering and Gaussian mixture modeling
    exist for data clustering. We will defer a detailed discussion on these techniques
    to Chapter 11. Nonetheless, we show in the example below how the dataset shown
    in Figure 3.1 can be assessed for multimodality. In Chapter 16, you will see a
    neural network-based visualization technique called Self Organizing Maps that
    can provide a 2D view of high-dimensional dataset and, therefore, help to check
    for the presence of clusters.'

  - '[PAGE 287]


    # Dimensionality reduction via autoencoders


    To see autoencoders in action, let’s apply it for the dimensionality reduction
    of a simulated dataset from a fluid catalytic cracking unit (FCCU<sup>103</sup>)
    shown in Figure 16.2. FCCUs are critical units in modern oil refineries and convert
    heavy hydrocarbons into lighter and valuable products such as LPG, gasoline, etc.
    As shown, the FCCU operation involves catalytic reaction, catalyst regeneration,
    and distillation. A total of 46 signals are made available as outputs (recorded
    every minute). Data has been provided in 7 CSV files. Each file contains data
    from one simulation. One of the CSV files contain NOC data over a period of 7
    days with varying feed flow. Five faults have been simulated one at a time in
    5 separate simulations. We will work with the 7 days of NOC data.


    ![](img/cfcc9569b5e92ea115855752abddd75a_287_0.png)


    We know that most of the variability in the data is driven from the variations
    in the feed flow and therefore, we will attempt to generate a 1D latent space
    ($m=1$).


    ```

    # import required packages

    import numpy as np, pandas as pd, matplotlib.pyplot as plt

    import tensorflow

    from sklearn.model_selection import train_test_split

    from sklearn.preprocessing import StandardScaler

    ```'

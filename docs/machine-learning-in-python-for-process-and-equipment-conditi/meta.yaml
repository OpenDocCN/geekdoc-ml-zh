- img_proc: true
  md: '# Update reference vectors


    The following formula is used to update $m_j$ $\forall j$


    $$m_j(t+1) = m_j(t) + \alpha(t) h_{b_i j} \|x_i(t) - m_j(t)\| \quad \forall j
    \in [1, J]$$


    The term $h_{b_i j}$ is the neighborhood function centered on BMU $b_i$ and ensures
    that only the BMU $b_i$ and its neighboring neurons on the SOM grid are moved
    closer to the sample $x_i$. It is defined as follows


    $$h_{b_i j} = \exp\left(-\frac{\|r_{b_i} - r_j\|^2}{2\sigma^2(t)}\right) \quad
    \forall j \in [1, J]$$


    $\alpha(t)$ is the learning rate which controls the rate at which the weight vectors
    get updated


    $\alpha(t)$ and $\sigma(t)$ are assigned large values initially and are deceased
    monotonically with iterations.


    Increment iteration ($t \rightarrow t+1$) and go to step 2 if training has not
    converged and maximum value of $t$ has not been reached.


    # Evaluating SOM fit


    The final map quality depends heavily on the initialization of weight vectors,
    size of grid, the learning rate, etc. Unfortunately, for high-dimensional datasets,
    it is difficult to determine exactly if SOM has managed to generate a good map.
    A metric called quantization error is commonly used which, for a sample $x_i$,
    is defined as


    $$E_{Q,i} = \|x_i - m_{b_i}\|$$


    $E_{Q,i}$ high $\Rightarrow x_i$ has large difference from its mapped BMU $b_i$


    The average quantization error over all the fitting samples can provide a measure
    of goodness of fit but it can be misleading as illustrated below'
  merge: -1
  pgno: 297
- img_proc: true
  md: '![](img/cfcc9569b5e92ea115855752abddd75a_298_0.png)


    +   - Number of neurons are same as number of fitting samples

    - $m_{b_i} = x_i$, i.e., reference vector of BMU of $x_i$ is $x_i$ itself

    - The quantization error is 0 here, but it’s obvious that the topology has not
    been preserved


    Therefore, different metrics are used to judge the fitted map quality. A couple
    of commonly used metrics are described below.


    # Quantization error


    As described before, the overall quantization error ($E_Q$) for fitting samples
    is given as


    $$E_Q = \frac{\sum_i \|x_i - m_{b_i}\|^2}{N}$$


    Although $E_Q$ does not give a good measure of topological preservation, it can
    indicate how good the map fits to data. $E_Q$ can also be used to infer overfitting
    and underfitting. Adding more neurons lead to lower $E_Q$ and therefore very low
    $E_Q$ may imply overfitted model. High values of $E_Q$ can indicate insufficient
    number of neurons or unconverged network learning.


    # Topographic error


    This metric measures how well the original shape of data has been preserved on
    SOM grid. It is computed by simply counting the number of samples for which the
    first and second BMUs are not adjacent neurons on the SOM grid.


    $$E_T = \frac{1}{N} \sum_{i=1}^N u(x_i)$$


    $$u(x_i) = \begin{cases} 1, & \text{if } 1^{st} \text{ and } 2^{nd} \text{ BMUs
    are non-adjacent} \ 0, & \text{otherwise} \end{cases}$$'

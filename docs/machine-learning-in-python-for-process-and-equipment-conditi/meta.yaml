  mdcn: "由于线性方法能够为线性和弱非线性数据集提供令人满意的监控性能，Zhang等人建议在0.3到0.5之间设定一个阈值，以决定是否使用非线性模型。\n\n\
    > 工业过程通常在某个最优条件附近运行。即使实际过程可能非常复杂且非线性，数据可能仅表现出变量之间的线性关系。因此，不要急于选择非线性模型；应先进行非线性检查，然后为你的系统明智地选择一种机器学习模型。\n\
    \n## 3.3 高斯性评估技术\n\n我们在第1节中看到，关于过程数据高斯性的错误假设可能导致对正常操作范围包络的错误确定。对于多元高斯性评估，这里将介绍Zhang等人提出的一种易于实现的方法。该方法基于以下事实：如果数据服从多元高斯分布，那么样本到中心的马氏距离平方（D）服从F分布¹⁷，如下所示¹⁸。\n\
    \n$D(x) = (x - \\bar{u})^T S_{cov}^{-1} (x - \\bar{u}) \\sim \\frac{n(N^2-1)}{N(N-m)}\
    \ F(m, N-m)$\n\n$x \\in \\mathbb{R}^m$\n\n$\\bar{u}$ 和 $S_{cov}$ 分别是样本均值和协方差\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_59_0.png)\n\n¹⁷ $F(m, N-m)$ 表示自由度为\
    \ $m$ 和 $N-m$ 的F分布\n¹⁸ 注意，如果 $S$ 是奇异的，那么公式(4)中的 $m$ 应替换为 $S$ 的秩，$S^{-1}$ 应替换为\
    \ $S$ 的伪逆\n\n## 为何高斯性如此重要\n\n下图展示了在1维和2维测量空间中的高斯分布。我们大多数人都熟悉这样的直方图/分布。但这些高斯分布的数据有什么特别之处呢？\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_60_0.png)\n\n如上式所示，高斯信号完全由两个参数——均值（$\\\
    mu$）和协方差（$\\sigma^2/\\Sigma$）——所表征，因此易于描述和处理。幸运的是，大多数工业过程在某个最优状态附近运行，并在随机过程扰动的影响下表现出自然原因引起的高斯变化。因此，许多传统的多变量统计过程监控和统计过程控制技术都假设高斯性，相应地，其文献中建立的许多结果严格适用于高斯过程。\n\
    \n一旦获得马氏距离，就可以将经验累积分布函数（CDF）与期望的$F$分布的CDF进行比较。下面的算法总结了该方法。\n\n## 算法：基于马氏距离的多元高斯性检验\n\
    \n- 生成统计量$D$的经验分布与期望$F$分布的分位数-分位数图\n  - 将D值排序，使得 $D_t: D_{(1)} \\leq D_{(2)} \\\
    leq \\cdots \\leq D_{(N)}$\n  - $D_t$ 的经验CDF可描述为 $CDF(D_{(t)}) \\approx \\frac{t-0.5}{N}\
    \ = r_t \\quad (t = 1, 2, \\cdots, N)$\n    这里，$D_{(t)}$ 是对应于概率 $r_t$ 的分位数\n \
    \ - 对应于概率 $r_t$ 的期望$F$分布的分位数计算如下\n    $F_t \\approx \\frac{m(N^2-1)}{N(N-m)} F_{r_t}(m,\
    \ N-m)$\n\n![](img/cfcc9569b5e92ea115855752abddd75a_61_0.png)\n\n- 对于 $t = 1,\
    \ 2, \\cdots, N$，绘制 $D_{(t)}$ 对 $F_t$ 的图并拟合一条直线。如果数据服从多元高斯分布，则拟合线应通过原点且斜率等于1\n\
    \n- 执行统计检验：\n  - 进行显著性检验，以检查 $D_{(t)}$ 与 $F_t$ 之间的线性关系在统计上是否显著。施加以下条件\n    $\\\
    frac{S}{\\bar{F}} < 0.15 \\Rightarrow \\text{线性拟合不被拒绝}$\n    $\\bar{F} = \\frac{1}{N}\
    \ \\sum F_t$\n    $S = \\sqrt{\\frac{SSE}{N-2}}$\n  - 如果满足上述条件，则通过以下条件将截距和斜率分别与0和1进行比较\n\
    \    $|intercept| < 0.05 * \\bar{F}$\n    $|slope - 1| < 0.2$\n\n![](img/cfcc9569b5e92ea115855752abddd75a_61_1.png)\n\
    \n- 如果满足以上所有三个条件，则假设数据服从多元高斯分布\n\n下面的示例展示了上述算法的实施步骤¹⁹。\n\n## 示例 3.2：考虑以下三变量系统\n\
    \n$x_3 = x_1 + x_2 + e$\n\n$x_1$ 和 $x_2 \\in [0,1]$ 均匀采样。让我们评估该系统的非高斯性。\n\n![](img/cfcc9569b5e92ea115855752abddd75a_62_0.png)\n\
    \n```python\n# import required packages\nimport numpy as np, matplotlib.pyplot\
    \ as plt\nimport scipy.spatial, scipy.stats\n```\n\n```python\n# find data statistics\n\
    data = np.vstack((x1,x2,x3)).T # check online code to see how x1, x2, x3 vectors\
    \ are generated\nN, m = data.shape[0], data.shape[1]\nmu, Scov = np.mean(data,\
    \ axis=0), np.cov(data, rowvar=False, ddof=1)\nScov_inv = np.linalg.pinv(Scov)\n\
    ```\n\n```python\n# calculate D statistic and the fractiles\nD = np.array([scipy.spatial.distance.mahalanobis(data[i,:],\
    \ mu, Scov_inv)**2 for i in range(N)])\nDt, rt = np.sort(D), [(t-0.5)/N for t\
    \ in range(1,N+1)]\nFt = (m*(N**2-1)/(N*(N-m)))*np.array([scipy.stats.f.ppf(p,\
    \ m, N-m) for p in rt])\n```\n\n```python\n# fit a straight line\nlinearFit =\
    \ scipy.stats.linregress(Dt, Ft)\nintercept, slope = linearFit[1], linearFit[0]\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_62_1.png)\n\n```python\n# perform\
    \ significance tests\nFbar = np.mean(Ft)\nSfit = np.sqrt(((Ft-(intercept+slope*Dt))**2).sum()/(N-2))\n\
    Sfit_by_Fbar = Sfit/Fbar\nif Sfit_by_Fbar > 0.15:\n    gaussianity = False\nelse:\n\
    \    if np.abs(slope-1) < 0.2 and np.abs(intercept) < Fbar*0.05:\n        gaussianity\
    \ = True\n    else:\n        gaussianity = False\n```\n\n> 此条件不满足 ⇒ 高斯性= False\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_63_0.png)\n\n## 3.4 动态性评估技术\n\n在动态数据集中，记录的样本是序列相关的，即当前测量值与过去的测量值不独立。我们在第1节中看到，为处理稳态数据而设计的模型可能无法捕捉时间关系，从而导致故障检测性能不佳。未建模的序列相关性会出现在模型残差中，如图3.4所示。模型残差中序列相关性的存在通过自相关函数（ACF）来评估，该函数计算残差时间序列在不同滞后下的线性相关系数。如果不存在显著的动态性，那么对于滞后\
    \ > 0，ACF值应接近0。Sun和Braatz在SPA包中利用这一原理来自动决定是否需要动态模型。\n\n![](img/cfcc9569b5e92ea115855752abddd75a_63_1.png)\n\
    \n前面的方法需要创建一个静态模型来生成残差。Melo等人在KydLIB包中采用的另一种方法是直接对原始测量值（而非残差）使用ACF。他们绘制了所有变量达到自相关系数值0.5所需的“时间”，以评估数据集的动态行为。达到0.5自相关所需的平均时间或中位时间较低，表明数据中的动态性水平较低。\n\
    \n## 示例 3.3：考虑我们在第1节中看到的以下2D系统\n\n$x_1(t) = 0.7x_1(t-1) + e_1(t)$\n$x_2(t) = 0.5x_1(t)\
    \ + e_2(t)$\n\n![](img/cfcc9569b5e92ea115855752abddd75a_64_0.png)\n\n$e_1$ 和 $e_2$\
    \ 是高斯噪声。让我们评估该系统的动态性。\n\n```python\n# import required packages\nimport numpy as\
    \ np, matplotlib.pyplot as plt\n\n# check for dynamics via ACF plot\nfrom statsmodels.graphics.tsaplots\
    \ import plot_acf\nconf_int = 2/np.sqrt(len(x1)) # check online code to see how\

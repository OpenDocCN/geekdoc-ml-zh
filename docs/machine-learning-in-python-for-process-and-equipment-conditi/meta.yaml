    # Summary


    With this chapter, we have now covered the vanilla version of four major MSPM
    techniques that are frequently utilized for analyzing process data. This chapter
    has also provided an important message: blind application of a single technique
    all the time may not yield best results. The techniques should be chosen according
    to the process system (Gaussian vs non-Gaussian) and objective (fault detection
    vs fault classification) at hand. ICA and FDA are powerful techniques and there
    lies much more to them that what we have touched in this chapter. While you are
    encouraged to explore more about these methods (now that you have conceptual understandings),
    we will move to study variants of PCA and PLS suitable for dynamic data in the
    next chapter.'

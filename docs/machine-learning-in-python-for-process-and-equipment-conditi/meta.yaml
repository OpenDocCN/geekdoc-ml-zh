    \ $\\sigma$ 则会导致欠拟合模型，因为异常轮廓无法准确捕捉数据分布。核宽度可以通过经验选择或交叉验证来确定。经验上，$\\sigma$ 通常设置为\
    \ $5m$，其中 $m$ 是过程变量的数量$^{70}$。在交叉验证方法中，$\\sigma$ 被设置为在验证数据集上产生可接受误报水平的最小值。Tan\

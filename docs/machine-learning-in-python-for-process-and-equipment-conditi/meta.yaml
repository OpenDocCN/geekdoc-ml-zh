    \ $T^2$统计量\n\n与PCA类似，$T^2$统计量量化了预测变量（$X$）中与响应变量（$Y$）系统性变异相关的系统性变异。$T^2$统计量的大幅偏离意味着过程操作条件发生了显著变化。设$t_i$表示$T$的第$i^{th}$行。该数据点的$T^2$指标由下式给出\n\
    \n$$T^2 = \\sum_{j=1}^{k} \\frac{t_{i,j}^2}{\\sigma_j} = t_i \\Lambda_k^{-1} t_i^T$$\n\
    \n$\\Lambda_k$是一个对角矩阵，是$T$的协方差矩阵，其对角线元素为$\\sigma_j$（第$j^{th}$个成分得分的方差）。对于误报率$\\\

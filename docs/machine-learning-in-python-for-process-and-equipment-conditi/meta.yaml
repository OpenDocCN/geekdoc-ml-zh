- img_proc: true
  md: '> While HI-based strategies are popular, a few points of caution need to be
    mentioned. For degradation-based modeling, you should ensure that either the impact
    of future operating conditions is taken into account or the operating conditions
    do not change much. For similarity-based approach, care should be taken that the
    historical HI trajectories are selected for the same faulty conditions as the
    fault that the current equipment is experiencing. Therefore, correct fault classification
    is crucial prior to deployment of fault prognosis.


    # RUL estimation performance assessment


    Consider the figure below. At time $t_k$, degradation curve is extrapolated to
    predict RUL$_{pred}$ while the actual RUL is RUL$_{actual}$. A trivial way to
    quantify error is to use mean squared error (MSE). However, the impact of positive
    and negative RUL errors on plant operations can be quite different. Underprediction
    (RUL$_{pred}$ < RUL$_{actual}$) ⇒ maintenance takes place earlier than it should
    have been. While this is bad, the cost of overprediction (RUL$_{pred}$ > RUL$_{actual}$)
    is worse as it can lead to delayed maintenance and, therefore, catastrophic equipment
    failure.


    ![](img/cfcc9569b5e92ea115855752abddd75a_348_0.png)


    The preference for negative $\varepsilon$ over positive $\varepsilon$ is often
    specified by putting greater penalty for $\varepsilon$>0 when computing the overall
    performance (for example, during model fitting).'

    be the result of a leak in valve. This results in abnormally high $Q_a$ value;
    $T_a^2$ however is not abnormally high because the projected score, $t_a$, is
    similar to those of normal data-points. For sample ‘b’, the correlation remains
    intact resulting in low (zero) $Q_b$ value. The score, $t_b$, however, is abnormally
    far away from the origin resulting in abnormally high $T_b^2$ value.



    ## 测试数据上的故障检测\n\nLee等人51和Yin等人52已详细发表了多种机器学习技术在田纳西-伊士曼过程（TEP）上的故障检测性能，并展示了ICA优越的故障检测能力。我们将尝试针对一些故障来证实他们的发现。\n\
    \n图8.7和图8.8展示了故障10和故障5的ICA/PCA监控图。对于故障10，ICA给出了显著更高的故障检测率（FDR）。在400到600之间的许多样本中，尽管存在过程异常，PCA指标仍低于其控制限。对于故障5的测试数据，性能差异更为显著。从样本400开始，PCA图错误地指示正常运行，尽管已知故障状态一直持续到采样期结束。另一点需要注意的是，PCA和ICA的误报率（FAR）都较低，因为在样本160之前没有多少样本违反控制限。这里ICA的误报率也更低/更好。在非故障测试数据集上观察到类似的误报率行为。我们没有展示误报率值，但你应该计算它们并确认ICA给出了更低的误报率值。\n\
    \n```python\n# define function to compute FDR or FAR\ndef compute_alarmRate(monitoring_stats,\
    \ CLs):\n    \"\"\" calculate alarm rate\n\n    parameters\n    ----------\n \
    \   monitoring_stats: numpy array of shape = [n_samples, 3]\n    CLs: List of\
    \ control limits\n\n    Returns\n    -------\n    alarmRate: float\n    \"\"\"\
    \n    violationFlag = monitoring_stats > CLs\n    alarm_overall = np.any(violationFlag,\
    \ axis=1) # violation of any metric => alarm\n    alarmRate = 100*np.sum(alarm_overall)/monitoring_stats.shape[0]\n\
    \n    return alarmRate\n\n# fetch test data and select data as done during training\n\
    TEdata_Fault_test = np.loadtxt('d10_te.dat')\n\nxmeas = TEdata_Fault_test[:,0:22]\n\
    xmv = TEdata_Fault_test[:,41:52]\ndata_Fault_test = np.hstack((xmeas, xmv))\n\n\
    # scale data\ndata_test_scaled = scaler.transform(data_Fault_test)\n\n# compute\
    \ statistics and draw charts\nICA_statistics_test = compute_ICA_monitoring_metrics(ica,\
    \ n_comp, data_test_scaled)\ndraw_ICA_monitoring_charts(ICA_statistics_test, [I2_CL,\
    \ Ie2_CL, SPE_CL], 'test')\n\n# compute FAR or FDR\nalarmRate = compute_alarmRate(ICA_statistics_test[160:,:],\
    \ [I2_CL, Ie2_CL, SPE_CL]) # fault starts sample 160 onwards\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_147_0.png)\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_148_0.png)\n\n## 8.3 判别分析简介\n\n费舍尔判别分析（FDA），也称为线性判别分析（LDA），是一种多元降维技术，它最大化不同类别数据在低维空间中的“分离度”。为了概念性理解，请考虑图8.9中的简单示例，其中FDA和PCA将一个二维数据集（包含2类数据）投影到一维空间。相应的一维得分显示，虽然两类数据在LD空间中分离良好，但在PC空间中分离度很差。这一观察结果是预期的，因为PCA在确定投影方向时，并未考虑不同数据类别的信息。因此，如果你的目的是为后续数据分类进行降维，并且训练数据已标记为不同类别，那么FDA更为合适。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_149_0.png)\n\n由于FDA强大的数据区分能力，它在过程工业中被广泛用于操作模式分类和故障诊断。大规模工业过程经常经历各种过程问题/故障，在在线操作期间快速准确地识别具体问题以最小化经济损失至关重要。在模型训练期间，FDA从历史过程故障收集的数据中学习（来自特定过程故障的数据形成一个类别），以找到最佳投影方向，并将异常过程数据实时分类为特定故障。我们将在本章研究这样一个应用。\n\
    \n### 数学背景\n\n为了便于数据分类，FDA不仅最大化类别之间的分离度，还最小化每个类别内部的变异/离散度。为了了解这是如何实现的，让我们首先考虑一个数据集矩阵\
    \ $X \\in \\mathbb{R}^{N \\times m}$，它包含 $N$ 个样本，其中 $N_1$ 个属于类别1（$\\omega_1$），$N_2$\
    \ 个属于类别2（$\\omega_2$）。FDA寻求找到一个投影向量 $w \\in \\mathbb{R}^m$，使得投影后的标量/样本（$z = w^T\
    \ x$）最大程度地分离。令 $\\tilde{\\mu}_1$ 和 $\\tilde{\\mu}_2$ 分别表示类别1和类别2投影值的均值\n\n$$\\\
    tilde{\\mu}_i = \\frac{1}{N_i} \\sum_{z \\in \\omega_1} z$$\n\n类别分离度可以量化为投影均值之间的距离\
    \ $|\\tilde{\\mu}_1 - \\tilde{\\mu}_2|$；然而，如下图所示，这不是一个稳健的度量。"

    determination of nearest neighbors. Further, the selected variables should be
    properly scaled to ensure that variables with large magnitudes do not dwarf the
    contribution of other variables during distance computations.


    # Deciding k-NN hyperparameters


    The choice of the hyperparameter, $k$, is critical and is the knob to balance
    underfitting and overfitting. Small $k$ can lead to overfitting where noisy measurements
    unfavorably impact the predictions. Large $k$ can reduce the effect of noise but
    can lead to underfitting as it over-smooths the predictions for regression or
    make classification boundaries less distinct. Unfortunately, there is no standard
    guidance on the choice of $k$. The optimal value depends on the data and can be
    estimated via cross-validation.


    # Applications of k-NN for process systems


    As alluded to before, k-NN method is often employed for equipment condition monitoring$^{90}$.
    For process-level monitoring, k-NN classification can be used to classify process
    abnormalities into distinct fault classes if sufficient historical faulty samples
    are available. As opposed to k-NN fault classification, an interesting adaptation
    of k-NN for fault detection was proposed by He & Wang that made use of only normal
    operation data$^{91}$. We will study this application in more detail in the next
    section.


    A few other notable applications of k-NN for process systems include the work
    of Facco et al. on automatic maintenance of soft sensors$^{92}$, Borghesan et
    al. on forecasting of process disturbances$^{93}$, Cecilio et al. on detecting
    transient process disturbances$^{94}$, and Zhou et al. on fault identification
    in industrial processes$^{95}$. These applications may not utilize the k-NN method
    directly for classification or regression but use the underlying concept of similarity
    of nearest neighbors.


    $^{90}$ Dong Wang, K-nearest neighbors-based methods for identification of different
    gear crack levels under different motor speeds and loads: Revisited, Mechanical
    Systems and Signal Processing, 2016

    $^{91}$ He and Wang, Fault detection using k-nearest neighbor rule for semiconductor
    manufacturing processes, IEEE Transactions on Semiconductor Manufacturing, 2007.

    $^{92}$ Facco et al., Nearest-neighbor method for the automatic maintenance of
    multivariate statistical soft sensors in batch processing, Industrial Engineering
    & Chemistry Research, 2010.

    $^{93}$ Borghesan et al., Forecasting of process disturbances using k-nearest
    neighbors, with an application in process control, Computers and Chemical Engineering,
    2019.

    $^{94}$ Cecilio et al., Nearest neighbors methods for detecting transient disturbances
    in process and electromechanical systems, Journal of Process Control, 2014.

    $^{95}$ Zhou et al., Fault identification using fast k-nearest neighbor reconstruction,
    Processes, 2019'
- md: "## Application of k-NN for fault detection\n\nFault detection by k-NN<sup>28</sup>\
    \ (FD-KNN) is based on a simple idea that distance of a faulty test sample from\
    \ the nearest training samples (obtained from normal operating plant conditions)\
    \ must be greater than a normal sample’s distance from the neighboring training\
    \ samples. Incorporating this idea into the process monitoring framework, a monitoring\
    \ metric (termed k-NN squared distance) is defined for each training sample as\
    \ follows\n\n$$D_i^2 = \\sum_{j=1}^k d_{ij}^2$$\n\nwhere $d_{ij}^2$ is the distance\
    \ of $i^{\\text{th}}$ sample from its $j^{\\text{th}}$ nearest neighbor. After\
    \ computing k-NN squared distances for all the training samples, a threshold corresponding\
    \ to the desired confidence limit can be computed. A test sample would be considered\
    \ faulty if its k-NN squared distance is greater than the threshold.\n\nAn advantage\
    \ of FD-KNN is that it is applicable to process systems with complex characteristics,\
    \ such as multimodality, non-Gaussianity, and non-linearity. To illustrate a complete\
    \ application of FD-KNN, we will use the metal-etch dataset that we used previously\
    \ in Chapter 11 for GMM-based process monitoring. If you recall, the batch data\
    \ was unfolded before scaling and PCA application. We will do the same pre-processing\
    \ transformations here using Sklearn’s Pipeline feature<sup>96</sup>. Following\
    \ He & Wang’s work, $k$ was set to 5.\n\n```python\n# scale data & fit PCA model\
    \ via pipeline\nfrom sklearn.pipeline import Pipeline\n\npipe = Pipeline([('scaler',\
    \ StandardScaler()), ('pca', PCA(n_components = 3))])\nscore_train = pipe.fit_transform(unfolded_dataMatrix)\n\
    \n# k-nearest neighbors of each training sample in score space\nfrom sklearn.neighbors\
    \ import NearestNeighbors\n\nnbrs = NearestNeighbors(n_neighbors=6).fit(score_train)\
    \ # a data-point is its own neighbor\nd2_nbrs, indices = nbrs.kneighbors(score_train)\n\
    d2_sqrd_nbrs = d2_nbrs**2\nD2 = np.sum(d2_sqrd_nbrs, axis = 1)\nD2_log = np.log(D2)\
    \ # logarithm used just for scaling purposes\n```\n\n```python\nD2_log_CL = np.percentile(D2_log,95)\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_258_0.png)\n\nFigure 14.3 shows\
    \ the resulting monitoring chart for the training samples. Figure 14.4 shows the\
    \ monitoring chart for the faulty test samples. 15 out of 20 samples are correctly\
    \ flagged as faulty while 5 samples are misdiagnosed as normal.\n\n```python\n\
    # scale and PCA on faulty test data\nscore_test = pipe.transform(unfolded_TestdataMatrix)\n\
    \n# D2_log_test\nd2_nbrs_test, indices = nbrs.kneighbors(score_test)\nd2_nbrs_test\
    \ = d2_nbrs_test[:,0:5] # we want only 5 nearest neighbors\nd2_sqrd_nbrs_test\
    \ = d2_nbrs_test**2\nD2_test = np.sum(d2_sqrd_nbrs_test, axis = 1)\nD2_log_test\
    \ = np.log(D2_test)\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_258_1.png)\n\
    \n## 14.2 LOF: An Introduction\n\nThe simple nature and powerful capabilities\
    \ of k-NN has put it amongst the top data-mining algorithms. However, it is not\
    \ rare to encounter scenarios where k-NN-based abnormality detection gives poor\
    \ performance. One such scenario involves NOC training samples distributed among\
    \ different clusters with varying densities as shown in Figure 14.5. A few test\
    \ samples are also shown in the figure. K-NN-based FD will correctly identify\
    \ $X2$, $X3$, and $X4$ as anomalies, but will fail to detect $X1$ as an abnormal\
    \ sample. This will happen because the NOC samples in cluster $A$ are sparsely\
    \ distributed which will make the threshold for fault detection large enough that\
    \ the average k-NN-distance of $X1$ will lie below the threshold. For our naked\
    \ eye, $X1$ is an obvious outlier because it is located ‘far’ away from its ‘local’\
    \ neighbors which are densely distributed. But how do we modify the k-NN algorithm\
    \ to embed this logic? Well, one thing that can be done is to compare the local\
    \ density of a test sample with the local densities of its neighbors. If the test\
    \ sample has substantially lower density than its neighbors, then it is potentially\
    \ an anomaly. This is the guiding principle behind the local outlier factor (LOF)\
    \ algorithm.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_259_0.png)\n\n### Computing\
    \ LOF for a sample\n\nLet $x_t \\in \\mathbb{R}^m$ be a sample. To find its LOF,\
    \ we need to find the local density at the location of $x_t$. Alternatively, we\
    \ need to find how easy is it to reach $x_t$ from $x_t$’s neighbors. Let’s look\
    \ at all the steps involved one-by-one.\n\n-   $k$-distance of $x_t$\n\n    For\
    \ a specified hyperparameter $k$, $k$-distance of $x_t$ is simply the distance\
    \ between $x_t$ and the $k^{th}$ nearest neighbor of $x_t$, i.e.,\n    $$\\text{k-distance}(x_t)\
    \ = d_k(x_t, x^*) = \\sqrt{\\sum_{i=1}^{m} (x_{ti} - x_i^*)^2}$$\n    $x^*$ is\
    \ $k^{th}$ nearest neighbor\n\n![](img/cfcc9569b5e92ea115855752abddd75a_260_0.png)\n\
    \n-   $k$-distance neighborhood of $x_t$\n\n    $k$-distance neighborhood of $x_t$,\
    \ denoted as $N_k(x_t)$, is the set of points whose distances from $x_t$ is not\
    \ greater than $k$-distance of $x_t$. It usually would contain $k$ data points\
    \ (the $k$-nearest neighbors) but can be more than $k$ in case of a tie.\n\n-\
    \   Reachability distance of $x_t$ from its neighbors\n\n    Let $x^o$ belong\
    \ to $N_k(x_t)$. The reachability distance of $x_t$ from $x^o$ is defined as follows\n\
    \    $$\\text{reach-dist}(x_t, x^o) = \\max\\{\\text{k-distance}(x^o), d_k(x_t,\
    \ x^*)\\}$$\n    If $x_t$ is far away from $x^o$ compared to $x^o$'s neighbors,\
    \ then reachability distance of $x_t$ from $x^o$ is the actual distance else reach-dist($x_t,\
    \ x^o$) equals k-distance($x^o$)\n\n![](img/cfcc9569b5e92ea115855752abddd75a_260_1.png)\n\
    \n-   Local reachability density of $x_t$\n\n    The local (reachability) density\
    \ of $x_t$ is simply the inverse of average reachability distance of $x_t$ from\
    \ its neighbors.\n\n    $$lrd_k(x_t) = 1 / \\left( \\frac{\\sum_{x^o \\in N_k(x_t)}\
    \ reach\\text{-}dist(x_t, x^o)}{|N_k(x_t)|} \\right)$$\n    number of points in\
    \ $N_k(x_t)$\n\n-   **LOF of $x_t$**\n\n    The local reachability density of\
    \ $x_t$ is compared with those of the neighbors to compute the LOF. Specifically,\
    \ the local outlier factor is the average of the ratio of local reachability density\
    \ of the neighbors to that of $x_t$.\n\n    $$LOF_k(x_t) = \\frac{\\sum_{x^o \\\
    in N_k(x_t)} lrd_k(x^o)}{|N_k(x_t)| \\cdot lrd_k(x_t)}$$\n\n    $LOF \\sim 1 \\\
    Rightarrow x_t$'s density is similar to that of neighbors.\n\n    $LOF < 1 \\\
    Rightarrow x_t$'s density is higher than neighbors' densities.\n\n    $LOF > 1\
    \ \\Rightarrow x_t$'s density is lower than neighbors' densities and may be an\
    \ outlier.\n\n    A threshold for LOF is computed during training based on a 'contamination\
    \ parameter' that specifies the proportion of anomalies in training data (or the\
    \ acceptable false alarm rate if training dataset contains only NOC samples).\n\
    \n    The hyperparameter $k$ influences the performance of anomaly detection and\
    \ its optimal value is application dependent. A small value for $k$ will lead\
    \ to inaccurate determination of local densities while a large value will diminish\
    \ the differences between NOC samples and anomalies. Values between 20 to 30 work\
    \ well in general.\n\n### Application of LOF for fault detection\n\nBelow we show\
    \ how a monitoring chart could be generated using LOF model.\n\n```python\n# LOF\
    \ of each training sample\nfrom sklearn.neighbors import LocalOutlierFactor\n\
    lof_model = LocalOutlierFactor(n_neighbors=5, novelty=True, contamination=0.05)\n\
    lof_model.fit(score_train)\n```\n\n```python\nlof_train = -lof_model.negative_outlier_factor_\
    \ # negative_outlier_factor_ gives the opposite LOF of the training samples\n\
    lof_CL = -lof_model.offset_\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_262_0.png)\n\
    \nFigure 14.6 shows the monitoring chart for the training samples. Note that a\
    \ specification of contamination of 5% results in 5 training samples being flagged\
    \ as abnormal. Figure 14.7 shows the monitoring chart for the faulty test samples.\
    \ 16 out of 20 samples are correctly flagged as faulty.\n\n```python\n# scale\
    \ and perform PCA on faulty test data; then find LOF values\nscore_test = pipe.transform(unfolded_TestdataMatrix)\n\
    Lof_test = -lof_model.score_samples(score_test)\n\nprint('Number of flagged faults\
    \ (using control chart): ', np.sum(lof_test > lof_CL))\n# can also use predict()\
    \ function of LOF class to flag faulty samples\nprint('Number of flagged faults\
    \ (using predict): ', np.sum(lof_model.predict(score_test) == -1))\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_262_1.png)"
  mdcn: "## k-NN在故障检测中的应用\n\n基于k-NN<sup>28</sup>的故障检测（FD-KNN）基于一个简单的思想：故障测试样本与最近训练样本（从正常运行工况中获得）的距离，必须大于正常样本与其邻近训练样本的距离。将这一思想融入过程监控框架，为每个训练样本定义一个监控指标（称为k-NN平方距离），如下所示\n\
    \n$$D_i^2 = \\sum_{j=1}^k d_{ij}^2$$\n\n其中 $d_{ij}^2$ 是第 $i^{\\text{th}}$ 个样本与其第\
    \ $j^{\\text{th}}$ 个最近邻之间的距离。计算出所有训练样本的k-NN平方距离后，可以计算出对应于所需置信限的阈值。如果一个测试样本的k-NN平方距离大于该阈值，则被视为故障。\n\
    \nFD-KNN的一个优点是它适用于具有复杂特性的过程系统，例如多模态、非高斯性和非线性。为了说明FD-KNN的完整应用，我们将使用之前在第11章中用于基于GMM的过程监控的金属蚀刻数据集。如果你还记得，批次数据在缩放和PCA应用之前进行了展开。我们将在这里使用Sklearn的Pipeline功能<sup>96</sup>进行相同的预处理转换。遵循He\
    \ & Wang的工作，$k$ 被设置为5。\n\n```python\n# scale data & fit PCA model via pipeline\n\
    from sklearn.pipeline import Pipeline\n\npipe = Pipeline([('scaler', StandardScaler()),\
    \ ('pca', PCA(n_components = 3))])\nscore_train = pipe.fit_transform(unfolded_dataMatrix)\n\
    \n# k-nearest neighbors of each training sample in score space\nfrom sklearn.neighbors\
    \ import NearestNeighbors\n\nnbrs = NearestNeighbors(n_neighbors=6).fit(score_train)\
    \ # a data-point is its own neighbor\nd2_nbrs, indices = nbrs.kneighbors(score_train)\n\
    d2_sqrd_nbrs = d2_nbrs**2\nD2 = np.sum(d2_sqrd_nbrs, axis = 1)\nD2_log = np.log(D2)\
    \ # logarithm used just for scaling purposes\n```\n\n```python\nD2_log_CL = np.percentile(D2_log,95)\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_258_0.png)\n\n图14.3显示了训练样本的监控图。图14.4显示了故障测试样本的监控图。20个样本中有15个被正确标记为故障，而5个样本被误诊为正常。\n\
    \n```python\n# scale and PCA on faulty test data\nscore_test = pipe.transform(unfolded_TestdataMatrix)\n\
    \n# D2_log_test\nd2_nbrs_test, indices = nbrs.kneighbors(score_test)\nd2_nbrs_test\
    \ = d2_nbrs_test[:,0:5] # we want only 5 nearest neighbors\nd2_sqrd_nbrs_test\
    \ = d2_nbrs_test**2\nD2_test = np.sum(d2_sqrd_nbrs_test, axis = 1)\nD2_log_test\
    \ = np.log(D2_test)\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_258_1.png)\n\
    \n## 14.2 LOF：简介\n\nk-NN的简单性和强大功能使其跻身顶级数据挖掘算法之列。然而，遇到基于k-NN的异常检测性能不佳的情况并不少见。其中一种情况涉及NOC训练样本分布在具有不同密度的不同簇中，如图14.5所示。图中还显示了一些测试样本。基于k-NN的FD将正确识别\
    \ $X2$、$X3$ 和 $X4$ 为异常，但将无法检测到 $X1$ 为异常样本。这将发生是因为簇 $A$ 中的NOC样本分布稀疏，这将使故障检测的阈值足够大，以至于\
    \ $X1$ 的平均k-NN距离将低于该阈值。在我们肉眼看来，$X1$ 是一个明显的离群点，因为它位于其密集分布的“局部”邻居“远处”。但是我们如何修改k-NN算法来嵌入这种逻辑呢？嗯，可以做的一件事是将测试样本的局部密度与其邻居的局部密度进行比较。如果测试样本的密度明显低于其邻居，则它可能是异常的。这就是局部离群因子（LOF）算法背后的指导原则。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_259_0.png)\n\n### 计算样本的LOF\n\n设 $x_t\
    \ \\in \\mathbb{R}^m$ 为一个样本。要找到它的LOF，我们需要找到 $x_t$ 位置的局部密度。或者，我们需要找到从 $x_t$ 的邻居到达\
    \ $x_t$ 的难易程度。让我们逐一查看所有涉及的步骤。\n\n-   $x_t$ 的 $k$-距离\n\n    对于指定的超参数 $k$，$x_t$\
    \ 的 $k$-距离就是 $x_t$ 与其第 $k^{th}$ 个最近邻之间的距离，即，\n    $$\\text{k-distance}(x_t) =\
    \ d_k(x_t, x^*) = \\sqrt{\\sum_{i=1}^{m} (x_{ti} - x_i^*)^2}$$\n    $x^*$ 是第 $k^{th}$\
    \ 个最近邻\n\n![](img/cfcc9569b5e92ea115855752abddd75a_260_0.png)\n\n-   $x_t$ 的 $k$-距离邻域\n\
    \n    $x_t$ 的 $k$-距离邻域，记为 $N_k(x_t)$，是距离 $x_t$ 不大于 $x_t$ 的 $k$-距离的点集。它通常包含 $k$\
    \ 个数据点（$k$-最近邻），但在存在平局的情况下可能多于 $k$ 个。\n\n-   $x_t$ 从其邻居的可达距离\n\n    设 $x^o$ 属于\
    \ $N_k(x_t)$。$x_t$ 从 $x^o$ 的可达距离定义如下\n    $$\\text{reach-dist}(x_t, x^o) = \\\
    max\\{\\text{k-distance}(x^o), d_k(x_t, x^*)\\}$$\n    如果 $x_t$ 相对于 $x^o$ 的邻居来说远离\
    \ $x^o$，那么 $x_t$ 从 $x^o$ 的可达距离就是实际距离，否则 reach-dist($x_t, x^o$) 等于 k-distance($x^o$)\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_260_1.png)\n\n-   $x_t$ 的局部可达密度\n\n\
    \    $x_t$ 的局部（可达）密度就是 $x_t$ 从其邻居的平均可达距离的倒数。\n\n    $$lrd_k(x_t) = 1 / \\left(\
    \ \\frac{\\sum_{x^o \\in N_k(x_t)} reach\\text{-}dist(x_t, x^o)}{|N_k(x_t)|} \\\
    right)$$\n    $N_k(x_t)$ 中的点数\n\n-   **$x_t$ 的LOF**\n\n    将 $x_t$ 的局部可达密度与其邻居的局部可达密度进行比较以计算LOF。具体来说，局部离群因子是邻居的局部可达密度与\
    \ $x_t$ 的局部可达密度之比的平均值。\n\n    $$LOF_k(x_t) = \\frac{\\sum_{x^o \\in N_k(x_t)}\
    \ lrd_k(x^o)}{|N_k(x_t)| \\cdot lrd_k(x_t)}$$\n\n    $LOF \\sim 1 \\Rightarrow\
    \ x_t$ 的密度与邻居的密度相似。\n\n    $LOF < 1 \\Rightarrow x_t$ 的密度高于邻居的密度。\n\n    $LOF\
    \ > 1 \\Rightarrow x_t$ 的密度低于邻居的密度，可能是离群点。\n\n    LOF的阈值在训练期间基于“污染参数”计算，该参数指定了训练数据中异常的比例（或者如果训练数据集仅包含NOC样本，则指可接受的误报率）。\n\
    \n    超参数 $k$ 影响异常检测的性能，其最佳值取决于应用。较小的 $k$ 值将导致局部密度确定不准确，而较大的 $k$ 值将削弱NOC样本和异常之间的差异。通常20到30之间的值效果良好。\n\
    \n### LOF在故障检测中的应用\n\n下面我们展示如何使用LOF模型生成监控图。\n\n```python\n# LOF of each training\
    \ sample\nfrom sklearn.neighbors import LocalOutlierFactor\nlof_model = LocalOutlierFactor(n_neighbors=5,\
    \ novelty=True, contamination=0.05)\nlof_model.fit(score_train)\n```\n\n```python\n\
    lof_train = -lof_model.negative_outlier_factor_ # negative_outlier_factor_ gives\
    \ the opposite LOF of the training samples\nlof_CL = -lof_model.offset_\n```\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_262_0.png)\n\n图14.6显示了训练样本的监控图。请注意，指定5%的污染导致5个训练样本被标记为异常。图14.7显示了故障测试样本的监控图。20个样本中有16个被正确标记为故障。\n\
    \n```python\n# scale and perform PCA on faulty test data; then find LOF values\n\
    score_test = pipe.transform(unfolded_TestdataMatrix)\nLof_test = -lof_model.score_samples(score_test)\n\
    \nprint('Number of flagged faults (using control chart): ', np.sum(lof_test >\
    \ lof_CL))\n# can also use predict() function of LOF class to flag faulty samples\n\
    print('Number of flagged faults (using predict): ', np.sum(lof_model.predict(score_test)\
    \ == -1))\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_262_1.png)"

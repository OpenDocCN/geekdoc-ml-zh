    A popular approach for determining the number of PCs to retain is to select the
    number of PCs that cumulatively capture atleast 90% (or 95%) of the variance.
    The captured variance threshold should be guided by the expected level of noise
    or non-systematic variation that you do not expect to be captured. Alternative
    methods include cross-validation, scree tests, AIC criterion, etc. However, none
    of these methods are universally best in all the situations.


    ```

    # decide # of PCs to retain and compute reduced data in PC space

    n_comp = np.argmax(cum_explained_variance >= 90) + 1

    score_train_reduced = score_train[:,0:n_comp]



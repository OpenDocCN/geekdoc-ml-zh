    \ Bechhoefer的许可，允许在本书中使用该数据。\n<sup>122</sup> MathWorks使用此数据集提供了一个案例研究 (https://www.mathworks.com/help/predmaint/ug/wind-turbine-high-speed-bearing-prognosis.html)，其中演示了如何使用基于融合的健康指标预测剩余使用寿命。我们在案例研究中采用了类似的方法。\n\
    \n```python\n# function to compute time domain features\ndef timeDomainFeatures(VibData):\n\
    \    N = len(VibData)\n    vibMean = np.mean(VibData)\n    vibStd = np.std(VibData,\
    \ ddof=1, axis=0)\n    vibRMS = np.sqrt(np.sum(VibData ** 2)/N)\n    vibPeak =\
    \ np.max(np.abs(VibData))\n    vibPeak2Peak = np.max(VibData) - np.min(VibData)\n\
    \    vibSkewness = skew(VibData, axis=0)\n    vibKurtosis = kurtosis(VibData,\
    \ fisher=False)\n    vibShapeFactor = vibRMS / (np.mean(np.abs(VibData)))\n  \
    \  vibCrestFactor = np.max(np.abs(VibData)) / vibRMS\n    vibImpulseFactor = np.max(np.abs(VibData))\
    \ / (np.mean(np.abs(VibData)))\n    vibMarginFactor = np.max(np.abs(VibData))\
    \ / (np.mean(np.sqrt(abs(VibData))) ** 2)\n\n    features = np.array([vibMean,\
    \ vibStd, vibRMS, vibPeak, vibPeak2Peak, vibSkewness,\n                      \
    \   vibKurtosis, vibShapeFactor, vibCrestFactor, vibImpulseFactor, vibMarginFactor])\n\
    \    return features\n```\n\n现在，让我们读取所有50个文件的数据并提取特征。\n\n```python\n# collect\
    \ feature values for each day\nFilenames = glob.glob('data-2013*.mat') # fetches\
    \ names of all relevant files\n\nNfeatures = 11\nfeatures50days = np.zeros((50,\
    \ Nfeatures))\nfor i in range(len(FilenamesList)):\n    matlab_data = scipy.io.loadmat(Filenames[i],\
    \ struct_as_record = False) # reads data from file\n    vib_data = matlab_data['vibration'][:,0]\n\
    \    features = timeDomainFeatures(vib_data)\n    features50days[i,:] = features\n\
    \nplt.figure(), plt.plot(features50days[:,6], '-o'), plt.xlabel('day'), plt.ylabel('feature\
    \ value') # kurtosis\n```\n\n> 123 文件为 '.mat' 格式\n\n正如我们在文中所指出的，提取的特征是带噪声的。我们将使用移动平均法对其进行平滑处理。\n\
    \n```python\n# smooth features using moving average\nwindowSize = 5\nfeatures50days_smoothed\
    \ = pd.DataFrame(features50days).rolling(windowSize).mean().values\nfeatures50days_smoothed[:windowSize-1,:]\
    \ = features50days[:windowSize-1,:] # replace nan in first 4 rows with original\
    \ values\n\nplt.figure(), plt.plot(features50days[:, 6], label='raw feature')\
    \ # kurtosis\nplt.plot(features50days_smoothed[:, 6], label='smoothed feature')\n\
    plt.xlabel('day'), plt.ylabel('feature value'), plt.legend()\n```\n\n上面的图表显示，并非所有特征都表现出清晰的退化趋势。我们将使用单调性来选择与健康指标相关的特征进行进一步处理；具体来说，我们只使用单调性大于0.7的特征。请注意，我们计算健康指标的最终目的是预测剩余使用寿命。为此，我们假设拥有32天的数据来指导健康指标的构建并进行剩余使用寿命预测。用于预测剩余使用寿命的具体策略将在下一章展示。\n\
    \n```python\n# separate training data\nNdays_train = 32 # ~ 2/3rd\nfeatures_train\
    \ = features50days_smoothed[:Ndays_train, :]\nfeatures_all = features50days_smoothed\n\
    \n# monotonicity of features\nfeature_monotonicity = np.zeros((Nfeatures,))\n\
    for feature in range(Nfeatures):\n    result = spearmanr(range(Ndays_train), features_train[:,feature])\n\
    \    feature_monotonicity[feature] = result.statistic\n\n# bar plot\nfeatureNames\
    \ = ['Mean', 'Std', 'RMS', 'Peak', 'Peak2Peak', 'Skewness', 'Kurtosis', 'ShapeFactor',\n\
    \                'CrestFactor', 'ImpulseFactor', 'MarginFactor']\n\nplt.figure(figsize=(15,5))\n\
    plt.bar(range(Nfeatures), feature_monotonicity, tick_label=featureNames)\nplt.xticks(rotation=45),\
    \ plt.ylabel('Monotonicity'), plt.grid(axis='y')\n```\n\n```python\n# pick features\
    \ with monotonicity >= 0.7\nfeaturesSelected = np.where(np.abs(feature_monotonicity)\
    \ >= 0.7)[0]\nselectFeatures_train = features_train[:,featuresSelected]\nselectFeatures_all\
    \ = features_all[:,featuresSelected]\n```\n\n现在，让我们将选定的特征融合成一个单一的度量指标。为此，我们将使用如下所示的PCA技术。请注意，我们再次仅使用训练数据来生成PCA模型。\n\
    \n```python\n# perform PCA and extract scores along the first principal component\n\
    from sklearn.decomposition import PCA\nfrom sklearn.preprocessing import StandardScaler\n\
    \nscaler = StandardScaler().fit(selectFeatures_train)\nselectFeatures_train_normal\
    \ = scaler.transform(selectFeatures_train)\nselectFeatures_all_normal = scaler.transform(selectFeatures_all)\n\
    \npca = PCA().fit(selectFeatures_train_normal)\nPCA_all_scores = pca.transform(selectFeatures_all_normal)\n\
    \nplt.figure(), plt.plot(PCA_all_scores[:,1],'-o', color='darkorange')\nplt.xlabel('day'),\
    \ plt.ylabel('PC1 Score as HI')\n```\n\n第一个主成分解释了近95%的数据方差，下图显示，随着轴承故障的发展，第一主成分呈现出良好的单调趋势；因此，它是一个适合作为健康指标的良好度量。\n\
    \n## P-F曲线\n\n在机械可靠性领域，P-F（潜在故障）曲线是一个常用的概念。该曲线表示设备健康状况随时间从健康状态到缺陷萌生再到失效的演变过程。曲线中指定了机器特性或故障症状的变化，如高温、高振动、高噪声等，这些变化指示了在故障的任何给定阶段可能有效的故障检测技术。\n\
    \n希望现在您对故障预测所涉及的内容以及可用于实施预测性维护解决方案的不同方法有了更好的理解。\n\n## 总结\n\n在本章中，我们熟悉了用于预测性维护的方法，并对健康指标进行了详细的概念性研究。健康指标的生成是估计剩余使用寿命的主要手段之一，因此，我们探讨了常用于计算健康指标的方法。我们通过一个风力涡轮机健康指标生成的实际案例研究，巩固了所涵盖的概念。"

    \n## 12.1 SVM简介\n\n经典SVM是一种用于解决二元分类问题的监督线性技术。为了说明，考虑图12.1a。这里，在一个二维系统中，训练数据点属于两个不同的类别（正类和负类）。任务是找到一条直线/线性边界来分隔这两个类别。图中也显示了两条候选样本线。虽然这些线显然完成了所述任务，但似乎有些不对劲。每条线都非常接近某些训练数据点。这可能导致泛化能力差：例如，图中显示的测试观测点'A'更靠近正样本，但会被边界L2分类为负类。这显然是不可取的。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_216_0.png)\n\n最优分离线/决策边界，即图12.1b中的直线L3，尽可能远离任一类数据。如图所示，L3位于支持平面（通过最靠近分离边界的训练点的平面）的中间。在模型拟合过程中，SVM只是找到这个对应于最大间隔（支持平面之间的距离）的最优边界。在图12.1中，L3的任何其他方向或位置都会减小间隔，并使L3更靠近某一类而非另一类。大的间隔使得模型预测对训练样本中的小扰动具有鲁棒性。\n\
    \n位于支持平面上的点称为支持向量<sup>80</sup>，它们完全决定了最优边界，因此得名支持向量机。在图12.1中，如果移动支持向量，直线L3可能会改变。但是，如果移除任何非支持向量，L3将完全不受影响。我们稍后将看到，对支持向量的唯一依赖如何赋予SVM计算优势。\n\
    \n> <sup>80</sup> 将数据点称为向量可能看起来很奇怪。虽然这个术语在通用SVM文献中常用，但支持向量指的是从原点出发，以支持平面上的数据点为端点的向量。\n\
    \n## 数学背景\n\n假设有$N$个训练样本$(x, y)$，其中$x$是$m$维输入空间中的输入向量，$y$是类别标签（$\\pm 1$）。设最优分离超平面（二维空间中的一条直线）表示为$w^T\

  md: '# 18.3 Machine Learning-based VCM: Motor Fault Classification via SVM


    To demonstrate ML-based VCM, we will use a popular dataset called CWRU bearing
    dataset<sup>116</sup>. The dataset includes vibrations collected from an electric
    motor under NOC and different faulty conditions, under varying loads, and at 48
    kHz and 12 kHz. For the purpose of our implementation, we will consider data collected
    at 48 kHz from the drive end of the motor with 1 hp load. In total, vibrations
    are recorded under the following 10 different conditions:


    +   - C1 : Ball defect (0.007 inch)

    - C2 : Ball defect (0.014 inch)

    - C3 : Ball defect (0.021 inch)

    - C4 : Inner race fault (0.007 inch)

    - C5 : Inner race fault (0.014 inch)

    - C6 : Inner race fault (0.021 inch)

    - C7 : Normal operation

    - C8 : Outer race fault (0.007 inch, data collected from 6 O''clock position)

    - C9 : Outer race fault (0.014 inch, data collected from 6 O''clock)

    - C10 : Outer race fault (0.021 inch, data collected from 6 O''clock)


    The data from each condition is provided in a separate file (such as *110.mat*)
    on the CWRU website<sup>117</sup>. Data from each file is divided into smaller
    segments of 2048 data points and 230 segments are obtained from each of the 10
    files corresponding to *C1* to *C10*. In total 2300 waveforms are available to
    us. For each segment, nine time domain features (peak, peak-to-peak, mean, standard
    deviation, RMS, skewness, kurtosis, crest factor, and shape factor) are extracted.
    This results in a feature matrix of size 2300 X 9. A column indicating the condition
    class is also added to the end and the final data matrix is provided in the file
    *feature_time_48k_2048_load_1.csv*<sup>118</sup>. Our objective is to develop
    a ML model that can predict the operating condition of the motor using the time
    domain features. For this, we will build a kernel SVM-based classifier as shown
    below.



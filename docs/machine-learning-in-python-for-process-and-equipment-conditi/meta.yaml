    # 15.1 ANN: An Introduction


    Artificial neural networks (ANNs) are nonlinear empirical models which can capture
    complex relationships between input-output variables via supervised learning or
    recognize data patterns via unsupervised learning. Architecturally, ANNs were
    inspired by human brain and are a complex network of interconnected neurons as
    shown in Figure 15.1. An ANN consists of an input layer, a series of hidden layers,
    and an output layer. The basic unit of the network, neuron, accepts a vector of
    inputs from the source input layer or the previous layer of the network, takes
    a weighted sum of the inputs, and then performs a nonlinear transformation to
    produce a single real-valued output. Each hidden layer can contain any number
    of neurons.


    ![](img/cfcc9569b5e92ea115855752abddd75a_269_0.png)


    The network shown in Figure 15.1 is an example of a fully-connected feed-forward
    neural network (FFNN), the most common type of ANN. In FFNN, signals flow in only
    one direction, from the input layer to the output layer via hidden layers. Neurons
    between consecutive layers are connected fully pairwise and neurons within a layer
    are not connected.


    > **What is deep learning**


    In a nutshell, using an ANN with a large number of hidden layers to find relationship/pattern
    in data is deep learning (technically, ≥ 2 hidden layers implies a deep neural
    network (DNN)). Several recent algorithmic innovations have overcome the model
    training issues for DNNs which have resulted in the DNN-led AI revolution we are
    witnessing today.'
- md: '## 15.2 Process Modeling via FFNN: Combined Cycle Power Plant (CCPP) Case Study


    We will use data from a CCPP to illustrate the ease with which neural network
    models can be built in Python. The dataset⁹⁸ comes from a combined cycle power
    plant composed of gas turbine (GT), steam turbine (ST) and heat recovery steam
    generator as shown in Figure 15.2. Here, energy from fuel combustion generates
    electricity in a gas turbine and residual energy in the hot exhaust/flue gas from
    GT is recovered to produce steam. This steam is used to generate further electricity
    in a steam turbine. The combined electric power generated by both GT and ST over
    a period of 6 years (with hourly averages) is provided in the dataset. Hourly
    average values of ambient temperature (AT), ambient pressure (AP), relative humidity
    (RH), and exhaust vacuum (V) are also provided. These variables influence the
    net hourly electrical energy output (also provided in the dataset) of the plant
    operating at full load and will be the target variable in our ANN model.


    ![](img/cfcc9569b5e92ea115855752abddd75a_270_0.png)


    Let us first explore the dataset.


    ```python

    # import required packages and read data

    import numpy as np, pandas as pd

    import matplotlib.pyplot as plt


    data = pd.read_excel(''Folds5x2_pp.xlsx'', usecols = ''A:E'').values

    X, y = data[:,0:4], data[:,4][:,np.newaxis]


    # plot input vs output for each input

    plt.figure(), plt.plot(X[:,0], y, ''*''), plt.title(''AT vs EP'')

    plt.figure(), plt.plot(X[:,1], y, ''*''), plt.title(''V vs EP'')

    plt.figure(), plt.plot(X[:,2], y, ''*''), plt.title(''AP vs EP'')

    plt.figure(), plt.plot(X[:,3], y, ''*''), plt.title(''RH vs EP'')

    ```


    Figure 15.3 clearly indicates the impact of input variables on the electrical
    power (EP).


    ![](img/cfcc9569b5e92ea115855752abddd75a_271_0.png)


    There is also a hint of nonlinear relationship between exhaust vacuum and power.
    While it may seem that AP and RH do not influence power strongly, it is a known
    fact that power increases with increasing AP and RH individually<sup>99</sup>.
    Let us now build a FFNN model with 2 hidden layers to predict power. We first
    split the dataset into training and test data, and then scale the variables.


    > <sup>99</sup> Pinar Tufekci, Prediction of full load electrical power output
    of a base load operated combined cycle power plant using machine learning methods,
    Electrical Power and Energy Systems, 2014


    ```python

    # separate train and test data

    from sklearn.model_selection import train_test_split

    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size = 0.2, random_state
    = 100)


    # scale data

    from sklearn.preprocessing import StandardScaler

    X_scaler = StandardScaler()

    X_train_scaled = X_scaler.fit_transform(X_train)

    X_test_scaled = X_scaler.transform(X_test)


    y_scaler = StandardScaler()

    y_train_scaled = y_scaler.fit_transform(y_train)

    y_test_scaled = y_scaler.transform(y_test)

    ```


    To build FFNN model, we will import relevant Keras libraries and add different
    layers of the network sequentially. The Dense library is used to define a layer
    that is fully-connected to the previous layer.


    ```python

    # import Keras libraries

    from tensorflow.keras import Sequential

    from tensorflow.keras.layers import Dense


    # define model

    model = Sequential()

    model.add(Dense(8, activation=''relu'', kernel_initializer=''he_normal'', input_shape=(4,)))

    # 8 neurons in 1st hidden layer

    model.add(Dense(5, activation=''relu'', kernel_initializer=''he_normal''))

    # 5 neurons in 2nd layer

    model.add(Dense(1))

    # 1 neuron in output layer

    ```


    The above 4-line code completely define the structure of the FFNN. Next, we will
    compile and fit the model.


    ```python

    # compile model

    model.compile(loss=''mse'', optimizer=''Adam'') # mean-squared error is to be
    minimized


    # fit model

    model.fit(X_train_scaled, y_train_scaled, epochs=25, batch_size=50)


    # predict y_test

    y_test_scaled_pred = model.predict(X_test_scaled)

    y_test_pred = y_scaler.inverse_transform(y_test_scaled_pred)

    ```


    The above lines are all it takes to a build FFNN and make predictions. Quite convenient,
    isn''t it? Figure 15.4 compares actual vs predicted power for the test data.


    ![](img/cfcc9569b5e92ea115855752abddd75a_273_0.png)


    Figure 15.4: Actual vs predicted target for CCPP dataset (obtained R² = 0.93)


    For the relatively simple CCPP dataset, we can obtain a reasonable model with
    just 1 hidden layer with 2 neurons. Nonetheless, this example has now familiarized
    us with the process of creating a DNN.


    ## Understanding flow of data in a FFNN


    If you execute the command `model.summary()` for the model developed in the previous
    section, you will be presented with the following information which details the
    number of parameters to be estimated in each layer of the network. Let’s understand
    how these numbers are obtained which will help clarify the flow of information
    in FFNN.


    | Layer (type) | Output Shape | Param # |

    | :--- | :--- | :--- |

    | dense (Dense) | (None, 8) | 40 |

    | dense_1 (Dense) | (None, 5) | 45 |

    | dense_2 (Dense) | (None, 1) | 6 |

    | Total params: 91 | | |

    | Trainable params: 91 | | |

    | Non-trainable params: 0 | | |


    We know that each input sample is 4-dimensional ($x \in R^4$). In the forward
    pass (also called forward propagation), the augmented input is first processed
    by the neurons of the first hidden layer. In the $j^{th}$ neuron of this layer,
    the weighted sum of the inputs are non-linearly transformed via an activation
    function, $g$


    $$a_j = g(w_j^T x + b_j)$$


    $w_j \in R^4$ are the weights applied to the inputs and $b_j$ is the bias added
    to the sum. Thus, each neuron has 5 parameters (4 weights and a bias) leading
    to 40 parameters for all the 8 neurons of the $1^{st}$ layer that need to be estimated.
    Outputs of all the 8 neurons form vector $a^{(1)} \in R^8$


    $$a^{(1)} = g^{(1)}(W^{(1)}x + b^{(1)})$$


    where each row of $W^{(1)} \in R^{8 \times 4}$ contains the weights of a neuron.
    The same activation function is used by all the neurons of a layer. $a^{(1)}$
    becomes the input to the $2^{nd}$ hidden layer.


    $$a^{(2)} \in R^5 = g^{(2)}(W^{(2)}a^{(1)} + b^{(2)})$$


    where $W^{(2)} \in R^{5 \times 8}$. Each neuron in the $2^{nd}$ layer has 8 weights
    and a bias parameter, leading to 45 parameters in the layer. The final output
    layer had a single neuron with 6 parameters and no activation function, giving
    the network output as follows


    $$a^{(3)} = \hat{y} = (w^{(3)})^T a^{(2)} + b^{(3)}$$


    where $w^{(3)} \in R^5$.


    ## 15.3 RNN: An Introduction


    Recurrent neural networks (RNNs) are ANNs for dealing with sequential data, where
    the order of occurrence of data holds significance. In the FFNN-based NARX model
    that we studied in the previous section, there is no provision for implicit or
    explicit specification of temporal/sequential nature of data, i.e., $x(k-2)$ comes
    before $x(k-1)$ for example. There is no efficient mechanism to specify this temporal
    order of data in a FFNN. RNNs accomplish this by processing elements of a sequence
    recurrently and storing a hidden state that summarizes the past information during
    the processing. The basic unit in a RNN is called a RNN cell which simply contains
    a layer of neurons. Figure 15.5 shows the architecture of a RNN consisting of
    a single cell and how it processes a data sequence with ten samples.


    ![](img/cfcc9569b5e92ea115855752abddd75a_275_0.png)


    We can see that the ten samples are processed in the same order of their occurrence
    and not at once. An output, $y_{(i)}$, is generated at the $i^{th}$ step and then
    fed to the next step for processing along with $x_{(i+1)}$. By way of this arrangement,
    $y_{(i+1)}$ is a function of $x_{(i+1)}$ and $y_{(i)}$. Since, $y_{(i)}$ itself
    is a function of $x_{(i)}$ and $y_{(i-1)}$, $y_{(i+1)}$ effectively becomes a
    function of $x_{(i+1)}$, $x_{(i)}$, and $y_{(i-1)}$. Continuing the logic further
    implies that the final sequence output, $y_{(10)}$, is a function of all ten inputs
    of the sequence, that is, $x_{(10)}$, $x_{(9)}$,..., $x_{(1)}$. This ‘recurrent’
    mechanism leads to efficient capturing of temporal patterns in data.'
  mdcn: '## 15.2 通过FFNN进行过程建模：联合循环发电厂（CCPP）案例研究


    我们将使用来自CCPP的数据来说明在Python中构建神经网络模型的便捷性。该数据集⁹⁸来自一个由燃气轮机（GT）、蒸汽轮机（ST）和余热蒸汽发生器组成的联合循环发电厂，如图15.2所示。在此，燃料燃烧产生的能量在燃气轮机中发电，而GT排出的热废气/烟气中的剩余能量被回收以产生蒸汽。该蒸汽用于在蒸汽轮机中进一步发电。数据集提供了GT和ST在6年期间（按小时平均）产生的总电功率。同时还提供了环境温度（AT）、环境压力（AP）、相对湿度（RH）和排气真空度（V）的小时平均值。这些变量会影响工厂在满负荷运行时的净小时电能输出（也包含在数据集中），并将成为我们ANN模型中的目标变量。


    ![](img/cfcc9569b5e92ea115855752abddd75a_270_0.png)


    让我们首先探索该数据集。


    ```python

    # import required packages and read data

    import numpy as np, pandas as pd

    import matplotlib.pyplot as plt


    data = pd.read_excel(''Folds5x2_pp.xlsx'', usecols = ''A:E'').values

    X, y = data[:,0:4], data[:,4][:,np.newaxis]


    # plot input vs output for each input

    plt.figure(), plt.plot(X[:,0], y, ''*''), plt.title(''AT vs EP'')

    plt.figure(), plt.plot(X[:,1], y, ''*''), plt.title(''V vs EP'')

    plt.figure(), plt.plot(X[:,2], y, ''*''), plt.title(''AP vs EP'')

    plt.figure(), plt.plot(X[:,3], y, ''*''), plt.title(''RH vs EP'')

    ```


    图15.3清楚地表明了输入变量对电功率（EP）的影响。


    ![](img/cfcc9569b5e92ea115855752abddd75a_271_0.png)


    排气真空度与功率之间也存在非线性关系的迹象。虽然AP和RH似乎对功率影响不大，但已知的事实是，功率会随着AP和RH的单独增加而增加<sup>99</sup>。现在让我们构建一个具有2个隐藏层的FFNN模型来预测功率。我们首先将数据集分为训练数据和测试数据，然后对变量进行缩放。


    > <sup>99</sup> Pinar Tufekci, 使用机器学习方法预测基荷运行联合循环发电厂的满负荷电功率输出, Electrical Power
    and Energy Systems, 2014


    ```python

    # separate train and test data

    from sklearn.model_selection import train_test_split

    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size = 0.2, random_state
    = 100)


    # scale data

    from sklearn.preprocessing import StandardScaler

    X_scaler = StandardScaler()

    X_train_scaled = X_scaler.fit_transform(X_train)

    X_test_scaled = X_scaler.transform(X_test)


    y_scaler = StandardScaler()

    y_train_scaled = y_scaler.fit_transform(y_train)

    y_test_scaled = y_scaler.transform(y_test)

    ```


    为了构建FFNN模型，我们将导入相关的Keras库并按顺序添加网络的不同层。Dense库用于定义一个与前一层全连接的层。


    ```python

    # import Keras libraries

    from tensorflow.keras import Sequential

    from tensorflow.keras.layers import Dense


    # define model

    model = Sequential()

    model.add(Dense(8, activation=''relu'', kernel_initializer=''he_normal'', input_shape=(4,)))

    # 8 neurons in 1st hidden layer

    model.add(Dense(5, activation=''relu'', kernel_initializer=''he_normal''))

    # 5 neurons in 2nd layer

    model.add(Dense(1))

    # 1 neuron in output layer

    ```


    以上4行代码完全定义了FFNN的结构。接下来，我们将编译并拟合模型。


    ```python

    # compile model

    model.compile(loss=''mse'', optimizer=''Adam'') # mean-squared error is to be
    minimized


    # fit model

    model.fit(X_train_scaled, y_train_scaled, epochs=25, batch_size=50)


    # predict y_test

    y_test_scaled_pred = model.predict(X_test_scaled)

    y_test_pred = y_scaler.inverse_transform(y_test_scaled_pred)

    ```


    以上几行代码就是构建FFNN并进行预测所需的全部内容。非常方便，不是吗？图15.4比较了测试数据的实际功率与预测功率。


    ![](img/cfcc9569b5e92ea115855752abddd75a_273_0.png)


    图15.4：CCPP数据集的实际目标值与预测目标值对比（获得的R² = 0.93）


    对于相对简单的CCPP数据集，我们仅用一个具有2个神经元的隐藏层就能获得一个合理的模型。尽管如此，这个例子已经让我们熟悉了创建DNN的过程。


    ## 理解FFNN中的数据流


    如果你对上一节开发的模型执行命令`model.summary()`，你将看到以下信息，其中详细说明了网络每一层需要估计的参数数量。让我们理解这些数字是如何获得的，这将有助于阐明FFNN中的信息流。


    | 层（类型） | 输出形状 | 参数数量 |

    | :--- | :--- | :--- |

    | dense (Dense) | (None, 8) | 40 |

    | dense_1 (Dense) | (None, 5) | 45 |

    | dense_2 (Dense) | (None, 1) | 6 |

    | 总参数：91 | | |

    | 可训练参数：91 | | |

    | 不可训练参数：0 | | |


    我们知道每个输入样本是4维的（$x \in R^4$）。在前向传播（也称为前向传播）中，增强的输入首先由第一隐藏层的神经元处理。在该层的第$j^{th}$个神经元中，输入的加权和通过激活函数$g$进行非线性变换，


    $$a_j = g(w_j^T x + b_j)$$


    $w_j \in R^4$是应用于输入的权重，$b_j$是添加到和中的偏置。因此，每个神经元有5个参数（4个权重和1个偏置），导致第一层所有8个神经元需要估计40个参数。所有8个神经元的输出形成向量$a^{(1)}
    \in R^8$


    $$a^{(1)} = g^{(1)}(W^{(1)}x + b^{(1)})$$


    其中$W^{(1)} \in R^{8 \times 4}$的每一行包含一个神经元的权重。同一层的所有神经元使用相同的激活函数。$a^{(1)}$成为第二隐藏层的输入。


    $$a^{(2)} \in R^5 = g^{(2)}(W^{(2)}a^{(1)} + b^{(2)})$$


    其中$W^{(2)} \in R^{5 \times 8}$。第二层中的每个神经元有8个权重和一个偏置参数，导致该层有45个参数。最终的输出层有一个神经元，有6个参数且没有激活函数，给出网络输出如下


    $$a^{(3)} = \hat{y} = (w^{(3)})^T a^{(2)} + b^{(3)}$$


    其中$w^{(3)} \in R^5$。


    ## 15.3 RNN：简介


    循环神经网络（RNN）是用于处理序列数据的ANN，其中数据的出现顺序具有重要意义。在我们上一节研究的基于FFNN的NARX模型中，没有提供隐式或显式指定数据时间/序列性质的机制，例如，$x(k-2)$在$x(k-1)$之前。在FFNN中没有有效的机制来指定这种数据的时间顺序。RNN通过循环处理序列元素并在处理过程中存储一个总结过去信息的隐藏状态来实现这一点。RNN中的基本单元称为RNN单元，它简单地包含一层神经元。图15.5显示了由单个单元组成的RNN架构，以及它如何处理包含十个样本的数据序列。


    ![](img/cfcc9569b5e92ea115855752abddd75a_275_0.png)


    我们可以看到，十个样本是按照它们出现的顺序处理的，而不是一次性处理。在第$i^{th}$步生成一个输出$y_{(i)}$，然后与$x_{(i+1)}$一起馈送到下一步进行处理。通过这种安排，$y_{(i+1)}$是$x_{(i+1)}$和$y_{(i)}$的函数。由于$y_{(i)}$本身是$x_{(i)}$和$y_{(i-1)}$的函数，$y_{(i+1)}$实际上成为$x_{(i+1)}$、$x_{(i)}$和$y_{(i-1)}$的函数。进一步推导逻辑意味着最终的序列输出$y_{(10)}$是序列所有十个输入的函数，即$x_{(10)}$、$x_{(9)}$、...、$x_{(1)}$。这种“循环”机制能够有效地捕捉数据中的时间模式。'

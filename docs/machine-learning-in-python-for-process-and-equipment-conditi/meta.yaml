    \n# 第四部分\n\n# 用于过程监控的经典机器学习方法\n\n# 第12章\n\n## 用于故障检测的支持向量机\n\n在前面的章节中，我们专注于通过提取潜变量来建模过程数据的多元统计过程监控方法。在本书的这一部分，我们将介绍几种在构建过程监控应用时非常有用的经典机器学习技术。这些技术并不试图构建底层数据分布的任何统计模型。相反，测量空间本身可以被划分为有利/不利区域、高密度/低密度区域，或者可以计算成对距离以生成监控指标等。SVM（支持向量机）就是这样一种算法，它擅长处理高维、非线性和中小型数据。\n\

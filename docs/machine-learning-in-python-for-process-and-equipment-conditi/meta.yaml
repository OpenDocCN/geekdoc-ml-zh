    \n通过本章，我们已经介绍了四种主要MSPM技术的基础版本，这些技术常用于分析过程数据。本章还传达了一个重要信息：盲目地始终应用单一技术可能无法获得最佳结果。应根据手头的过程系统（高斯\
    \ vs 非高斯）和目标（故障检测 vs 故障分类）来选择技术。ICA和FDA是强大的技术，它们的内容远不止我们在本章所触及的。虽然鼓励你进一步探索这些方法（既然你已经有了概念上的理解），但我们将在下一章研究适用于动态数据的PCA和PLS变体。\n\
    \n# 第9章\n\n## 线性与动态过程的多元统计过程监控\n\n在前面的章节中，我们看到了基于潜变量的MSPM技术如何巧妙地从数据中提取隐藏的稳态关系。然而，我们施加了一个主要限制，即数据集中不存在动态性。不幸的是，处理表现出显著动态性的工业数据集是常见的，而标准MSPM技术无法提取过程变量之间的动态关系。尽管如此，MSPM研究界对标准MSPM技术提出了一个简单但巧妙的修改，使得处理动态数据集变得非常容易。这个技巧包括将过去的测量值作为额外的过程变量纳入。就是这样！然后可以将标准技术应用于增强后的数据集。标准MSPM技术的动态变体包括动态PCA（DPCA）、动态PLS（DPLS）、动态ICA（DICA）等。\n\
    \n动态PCA和动态PLS是监控线性与动态过程最受欢迎的技术之一；因此，本章将详细介绍它们。此外，本章还介绍了另一种非常流行且强大的技术，专门设计用于从过程数据中提取动态关系——典型变量分析（CVA）。通过数值和工业规模的案例研究，我们将看到如何使用这三种技术构建故障检测工具。具体涵盖以下主题\n\
    \n- 动态PCA简介\n- 使用DPCA进行故障检测\n- 动态PLS简介\n- CVA简介\n- 使用CVA对田纳西-伊士曼过程进行故障检测\n\n##\
    \ 9.1 动态PCA简介\n\n动态PCA是传统PCA的动态扩展，旨在处理表现出显著动态性的过程数据。DPCA简单地涉及将传统PCA应用于增强数据矩阵，如图9.1所示，该矩阵是通过使用过去的测量值作为额外的过程变量生成的。请注意，增强矩阵的每个“变量”都像传统PCA中那样被归一化为零均值和单位方差。这可能看起来令人惊讶，但如此简单的方法在过程工业中取得了巨大成功，并因其易于实现而被广泛采用。\n\

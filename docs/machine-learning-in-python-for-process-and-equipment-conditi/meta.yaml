    \ } (y_i = 1)$$\n$$w^T x_i + b \\leq -1 \\quad \\text{对于负样本 } (y_i = -1)$$\n\n\
    支持平面表示为$w^T x + b = 1$和$w^T x + b = -1$。上述方程简单地陈述了数据点必须位于其对应支持平面的正确一侧的要求。使用简单的三角学可以证明，间隔由$\\\
    frac{2}{||w||}$给出，其中$||w||$是向量范数。因此，模型参数通过在满足上述约束的同时最大化$\\frac{2}{||w||}$（或等效地，最小化$||w||$）来确定。具体来说，求解以下优化问题\n\
    \n$$\\min_{w,b} \\quad \\frac{1}{2} ||w||^2$$\n$$\\text{s.t.} \\quad y_i(w^T x_i\
    \ + b) \\geq 1, \\quad i = 1, \\cdots N$$\n\\hfill 公式 1\n\n一旦模型拟合完成，对测试样本$x_t$的类别预测如下进行。\n\
    \n$$\\hat{y}_t = sign(w^T x_t + b)$$\n如果$x_t$位于分离超平面的正侧，则属于正类\n\nsign函数内的表达式也称为决策函数，因此，正的决策函数导致正类预测，反之亦然。\n\
    \n> 公式1中的优化公式以及我们将在本章中看到的所有其他公式都具有一个非常有利的性质，即拥有唯一的全局最小值。与神经网络等其他强大的机器学习方法相比，这是一个巨大的优势，因为局部最小值问题可能会带来不便。\n\

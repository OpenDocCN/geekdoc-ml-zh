    ‘normal’ class samples! To enable educated hyperparameter selection, let’s take
    another look at them.


    Previously, we saw that $C$ controls the trade-off between volume of hypersphere
    and the number of misclassifications in the training dataset. $C$ can also be
    written as


    $$C = \frac{1}{Nf}$$


    Where $N$ is the number of samples and $f$ is the expected fraction of outliers
    in the training dataset. Smaller value of $f$ (correspondingly larger $C$) will
    lead to less samples being put outside the hypersphere. Infact if $C$ is set to
    1 (or greater) the hypersphere will include all the samples (as $\sum \alpha_i
    = 1$ and $\alpha = C$ outside the hypersphere). Therefore, $C$ can be set with
    some educated presumptions on the outlier fractions. In absence of any advance
    knowledge, $f = 0.01$ is often specified to exclude away 1% of sample lying farthest
    from hypersphere center.


    As far as $\sigma$ is concerned, we previously saw that at low value of $\sigma$,
    data boundary becomes very wiggly with high number of support vectors, resulting
    in overfitting. Conversely, at high value of $\sigma$, boundary tends to become
    spherical in the original space itself resulting in underfitting (or non-compact
    bounding of data). One approach for bandwidth selection is to use empirical methods
    which are based on obtaining a kernel matrix (whose $i,j^{th}$ element is $k(x_i,
    x_j)$) with favorable properties. One such method, modified mean criterion$^{82}$,
    gives bandwidth as follows


    $$\sigma = \sqrt{\frac{\bar{D}^2}{\ln\left(\frac{N-1}{\delta^2}\right)}}$$


    $$\bar{D}^2 = \frac{\sum_{i<j} ||x_i - x_j||^2}{\frac{N(N-1)}{2}}$$


    $$\delta = -0.14818008\emptyset^4 + 0.2846623624\emptyset^3 - 0.252853808\emptyset^2
    + 0.159059498\emptyset - 0.001381145$$


    > $^{82}$ Kalde & Sadek, The mean and median criterion for kernel bandwidth selection
    for support vector data description, IEEE 2017'
- md: '$$\emptyset = \frac{1}{\ln(N-1)}$$


    Another approach for bandwidth selection is to choose largest value of $\sigma$
    that gives the desired confidence level on the validation dataset. For example,
    for a confidence level of 99%, $\sigma$ is increased until 99% of validation samples
    are correctly classified as inliers. Any higher value of $\sigma$ will include
    more validation samples within the hypersphere. The modified mean criterion can
    be used as the initial guess with subsequent search made around it. Let''s now
    find the nonlinear boundary for the dataset in Figure 12.7.


    ```python

    # read data

    import numpy as np

    X = np.loadtxt(''SVDD_toyDataset.csv'', delimiter='','')

    # compute bandwidth via modified mean criteria

    import scipy


    N = X.shape[0]

    phi = 1/np.log(N-1)

    delta = -0.14818008*np.power(phi,4) + 0.2846623624*np.power(phi,3) - 0.252853808*np.power(phi,2)
    + 0.159059498*phi - 0.001381145

    D2 = np.sum(scipy.spatial.distance.pdist(X, ''sqeuclidean''))/(N*(N-1)/2)

    sigma = np.sqrt(D2/np.log((N-1)/delta*delta))

    gamma = 1/(2*sigma*sigma)


    # SVM fit

    from sklearn.svm import OneClassSVM

    model = OneClassSVM(nu=0.01, gamma=gamma).fit(X) # nu corresponds to f

    ```


    Figure 12.8 shows the bounding boundary for different values of gamma with $f$
    (or nu in Sklearn) kept at 0.01. A value of gamma (= 1) close to that given by
    modified mean criterion method (= 0.58) provided a satisfactory boundary.


    ![](img/cfcc9569b5e92ea115855752abddd75a_230_0.png)


    We hope that by now you are convinced of the powerful capabilities of SVM for
    discriminating between different classes of data and compact bounding of normal
    operational data. A big requirement for successful application of SVM is that
    the training dataset should be very representative of the ‘normal’ dataset and
    fully characterize all the expected variations. Next, we will look at a case study
    with real process data.


    ## 12.4 Fault detection via SVDD: Semiconductor Manufacturing Case Study


    To illustrate a practical application of SVDD for process monitoring, we will
    re-use the semiconductor manufacturing process data from Chapter 11. This batch
    process dataset contains 19 process variables measured over the course of 108
    normal batches and 21 faulty batches. The batch durations range from 95 to 112
    seconds. Figure 12.9 shows the training samples and the faulty test samples in
    the principal component space.


    ![](img/cfcc9569b5e92ea115855752abddd75a_230_1.png)


    For this illustration, the raw data has been processed using multiway PCA and
    the transformed 2D (score) data is provided in the *Metal_etch_2DPCA_trainingData.csv*
    file. Note that we could also implement SVDD in the original input space but pre-processing
    via PCA to remove variable correlation is generally a good practice. Moreover,
    we use the 2D PC space for our analysis just for the ease of illustrating the
    SVDD boundary. In actual deployment, you would work in higher dimensional PC space
    for better accuracy. Let’s see if our model can identify the faulty samples as
    outliers or not in the multi-clustered dataset.


    ```python

    # read data

    import numpy as np

    X_train = np.loadtxt(''Metal_etch_2DPCA_trainingData.csv'', delimiter='','')


    # fit SVM

    from sklearn.svm import OneClassSVM

    model = OneClassSVM(nu=0.01, gamma=0.025).fit(X_train) # gamma from modified mean
    criterion = 0.0025


    # predict for test data

    X_test = np.loadtxt(''Metal_etch_2DPCA_testData.csv'', delimiter='','')

    y_test = model.predict(X_test) # y=-1 for outliers


    print(''Number of faults identified: '', np.sum(y_test == -1), '' out of '', len(y_test))


    >>> Number of faults identified: 17 out of 20

    ```


    Figure 12.10 shows the boundary around the training samples and the faulty samples
    labeled according to their correct or incorrect identification. Seventeen out
    of twenty faulty data samples have correctly been identified as outliers. This
    example illustrates the power of SVDD for compactly describing clustered datasets.


    ![](img/cfcc9569b5e92ea115855752abddd75a_231_0.png)


    We should get the same results if we use the distances from the hypersphere center
    for fault detection. The results from SVDD and OC-SVM will differ if RBFs are
    not used as kernel. Unfortunately, Sklearn currently does not provide SVDD implementation.
    Nonetheless, a SVDD package is available on GitHub<sup>83</sup>.


    This concludes our look into support vector machines. SVMs are in a league of
    their own and are well-suited for industrial processes with difficult to estimate
    process parameters. With elegant mathematical background, just a few hyperparameters,
    excellent generalization capabilities, and guaranteed unique global optimum, SVMs
    are among the best ML algorithms.



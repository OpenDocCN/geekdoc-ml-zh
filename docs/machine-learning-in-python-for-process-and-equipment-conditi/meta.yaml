    # 7.2 Fault Detection via PCA: Polymer Manufacturing Case Study


    In Figure 7.2, we saw that it was not easy to infer process abnormality after
    69th sample by simply looking at the combined time-series plot of all the available
    variables. Individual variable plot may provide better clues, but continuously
    monitoring all the 33 plots of individual variables is not a convenient task.


    ![](img/cfcc9569b5e92ea115855752abddd75a_115_0.png)'
  - '[PAGE 116]


    PCA makes the monitoring task easy by summarizing the state of any complex multivariate
    process into two simple indicators or monitoring indices as shown in Figure 7.5.
    During model training, statistical thresholds are determined for the indices and
    for a new data-point, the new indices’ values are compared against the thresholds.
    If any of the two thresholds are violated, then presence of abnormal process condition
    is confirmed.


    # Fault detection indices


    Hotelling’s $T^2$ and SPE (also called Q) statistics are the two monitoring indices
    utilized for fault detection. Both the statistics are computed for each data-point.
    [Beware the potential confusion between the score matrix ($T$) and the scalar
    $T^2$ value. This is the standard notation used by the PCA community.]


    # Hotelling’s $T^2$


    Let $t_i$ denote the $i^{th}$ row of $T$ which represents the transformed $i^{th}$
    data-point in the PC space. The $T^2$ index for this data-point is calculated
    as follows


    $$T^2 = \sum_{j=1}^k \frac{t_{i,j}^2}{\lambda_j} = t_i \Lambda_k^{-1} t_i^T$$


    Note that $\Lambda_k = diag\{\lambda_1, \lambda_2, \dots, \lambda_k\}$. It is
    apparent that $T^2$ is squared Mahalanobis distance or the weighted distance of
    a data-point from the origin in the PC space. If the data follow a multivariate
    normal distribution, the control limit for a specified false alarm rate of $\alpha^{36}$
    (often set at 0.05 or 0.01) is given as follows


    $$T_{CL}^2 = \frac{k(N^2-1)}{N(N-k)} F_{k,N-k}(\alpha)$$


    $F_{k,N-k}(\alpha)$ is the $(1-\alpha)$ percentile of a $F$-distribution with
    $k$ and $n-k$ degrees of freedom. In essence, $T^2 \le T_{CL}^2$ represents an
    ellipsoidal boundary around the training data-points in the PC space.


    # SPE/Q


    The second index, Q, represents the distance between the original and reconstructed
    data-point. Let $e_i$ denote the $i^{th}$ row of $E$. Then


    $$Q = \sum_{j=1}^m e_{i,j}^2$$'
  - "[PAGE 117]\n\nAgain, under normality assumption, the control limit for Q is given\
    \ by the following expression\n\n$$Q_{CL} = \\theta_1 \\left( \\frac{z_{\\alpha}\
    \ \\sqrt{2 \\theta_2 h_0^2}}{\\theta_1} + 1 + \\frac{\\theta_2 h_0 (1 - h_0)}{\\\
    theta_1^2} \\right)^2$$\n\n$$h_0 = 1 - \\frac{2 \\theta_1 \\theta_3}{3 \\theta_2^2}\
    \ \\quad \\text{and} \\quad \\theta_r = \\sum_{j=k+1}^{m} \\lambda_j^r \\quad\
    \ ; r=1,2,3$$\n\n$z_{\\alpha}$ is the $(1-\\alpha)$ percentile of a standard Gaussian\
    \ distribution.\n\n# Other expressions for control limits\n\n![](img/cfcc9569b5e92ea115855752abddd75a_117_0.png)\n\
    \nIf the number of NOC samples are large (which implies that the mean and covariance\
    \ of NOC data can be estimated accurately), then the $T^2$ statistic follows a\
    \ $\\chi^2$ distribution with k degrees of freedom and the control limit is obtained\
    \ as\n\n$$T_{CL}^2 = \\chi_{\\alpha}^2(k)$$\n\nThe statistical expressions for\
    \ the control limits presented so far assume that the NOC data follow a multivariate\
    \ Gaussian distribution. If this assumption is not true, then the control limits\
    \ can be estimated via kernel density estimation (demonstrated in Book 1 of the\
    \ series) or the percentile method (see Chapter 8).\n\nWe now have all the information\
    \ required to generate control charts for the fault indices for training data.\
    \ We will continue our case study on the polymer manufacturing dataset.\n\n```\n\
    # calculate T2 for training data\nN, m, k = data_train_normal.shape[0], data_train_normal.shape[1],\
    \ n_comp\n\nlambda_k = np.diag(pca.explained_variance_[0:k]) # eigenvalue = explained\
    \ variance\nlambda_k_inv = np.linalg.inv(lambda_k)\nT2_train = np.zeros((N,))\n\
    \nfor i in range(N):\n    T2_train[i] = np.dot(np.dot(score_train_reduced[i,:],lambda_k_inv),score_train_reduced[i,:].T)\n\
    \n# calculate Q for training data\nerror_train = data_train_normal - data_train_normal_reconstruct\n\
    Q_train = np.sum(error_train*error_train, axis = 1)\n\n# T2 control limit\nimport\
    \ scipy.stats\n```"
- md: "## Importance of both $T^2$ and Q statistic\n\nThe $T^2$ and Q indices quantify\
    \ different kinds of variations in data. While $T^2$ is a measure of distance\
    \ from origin in PC space, Q is a measure of the portion of data that is not explained\
    \ by the PCA model. It is possible that an abnormal situation violates control\
    \ limit of one index, but not the other. Therefore, it is crucial to monitor both\
    \ the indices.\n\nFor example, consider the scenario in Figure 7.7. The two flow\
    \ measurements are expectedly correlated. Normal data-points lie along the 45°\
    \ line (PC1 direction), except, instances ‘a’ and ‘b’ which exhibit different\
    \ type of abnormalities. For sample ‘a’, the correlation between the two flow\
    \ variables is broken which may be the result of a leak in valve. This results\
    \ in abnormally high $Q_a$ value; $T_a^2$ however is not abnormally high because\
    \ the projected score, $t_a$, is similar to those of normal data-points. For sample\
    \ ‘b’, the correlation remains intact resulting in low (zero) $Q_b$ value. The\
    \ score, $t_b$, however, is abnormally far away from the origin resulting in abnormally\
    \ high $T_b^2$ value.\n\n## Fault detection on test data\n\nIt’s time now to check\
    \ whether our $T^2$ and $Q$ charts can help us detect the presence of process\
    \ abnormalities in test data (samples 70 onwards). For this, we will compute the\
    \ monitoring statistics for the test data.\n\n```python\n# get test data, normalize\
    \ it\ndata_test = data.iloc[69:]\ndata_test_normal = scaler.transform(data_test)\
    \ # using scaling parameters from training data\n\n# compute scores and reconstruct\n\
    score_test = pca.transform(data_test_normal)\nscore_test_reduced = score_test[:,0:k]\n\
    data_test_normal_reconstruct = np.dot(score_test_reduced, P_matrix.T)\n\n# calculate\

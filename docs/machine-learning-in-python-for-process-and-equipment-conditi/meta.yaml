  md: '# 5.6 Pitfalls of Univariate Control Charts and Alternative Solutions


    The obvious shortcoming of the techniques learnt in this chapter is their inability
    to effectively detect faults in multivariate systems as illustrated below. The
    faulty sample is an obvious outlier in the 2D space; however, if the variables
    x1 and x2 are analyzed individually, the faulty sample appears within the NOC
    ranges.


    ![](img/cfcc9569b5e92ea115855752abddd75a_98_0.png)


    Multivariate Shewhart chart (Hotelling $T^2$ chart), multivariate CUSUM (MCUSUM),
    and multivariate EWMA (MEWMA) schemes have been devised, but they do not enjoy
    the wide acceptance that their univariate counterparts enjoy. This is due to the
    difficulty encountered while handling correlated high dimensional data. Popular
    alternatives for handling multivariate data include PCA, kernel PCA, PLS, etc.
    which you will study in the next part of the book.


    Another shortcoming of the vanilla control charts that we have studied is the
    assumption of independence among the data samples. If you are dealing with a signal
    that shows autocorrelation then a better strategy as illustrated below is to build
    a model (e.g., a time-series model$^{30}$) and compute residuals (between observed
    and predicted values). For NOC data and carefully built model, the residuals will
    be uncorrelated and have Gaussian distribution, and therefore, the vanilla control
    charts can be built for the residuals to indirectly monitor the original signal.'
  merge: -1
  pgno: 98
- img_proc: true
  md: '![](img/cfcc9569b5e92ea115855752abddd75a_99_0.png)


    Another popular strategy to deal with autocorrelated signals is to update the
    model using the latest observations and monitor the model parameters.


    # Summary


    In this chapter, we familiarized ourselves with statistical process control charts
    for monitoring univariate signals. We looked at the three popular techniques,
    viz, Shewhart charts, CUSUM charts, and EWMA charts. We learnt how to build these
    charts and understood the pros and cons of these different methods. In the next
    chapter, we will continue our study of univariate signal monitoring and look at
    pattern matching-based methodologies.'

    # 10.3 Kernel PLS: An Introduction


    Kernel PLS is the nonlinear extension of conventional PLS to handle nonlinear
    process data that exhibit significant nonlinearity. As shown in Figure 10.2 below,
    the input vectors are mapped to an ‘unknown’ feature space such that the variables
    become linearly related. We know from Chapter 7 that the NIPALS algorithm used
    to fit PLS model involves the term $XX^T$ and therefore, like PCA, kernel functions
    are used to implicitly define $\varphi\varphi^T$ in the feature space, obtain
    the score vectors, and thereafter, generate the predicted outputs. The overall
    procedure relies on classic linear algebra and retains most of the favorable properties
    of standard PLS.


    ![](img/cfcc9569b5e92ea115855752abddd75a_187_0.png)


    Sklearn, unfortunately, does not provide any off-the-shelf module for KPLS. Nonetheless,
    it is not tough to code the steps of KPLS. The mathematical exposition in the
    following subsection will provide all the information you need to work on your
    own KPCA module.


    > Alternative nonlinear PLS models


    Kernelized PLS is not the only methodology commonly employed for nonlinear regression
    modeling. An alternative methodology involves working in the original measurement
    space, projecting input and output data linearly to obtain the scores, and building
    a nonlinear inner relation between the t and u scores.


    $u \approx f(t)$


    - if $f(.)$ is polynomial $\Rightarrow$ polynomial PLS

    - if $f(.)$ is neural network $\Rightarrow$ neural net PLS'

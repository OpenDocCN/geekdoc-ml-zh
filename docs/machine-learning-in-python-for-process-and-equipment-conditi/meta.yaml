    # 2.4 Scientific Computing Packages: Basics


    While the core Python data-structures are quite handy, they are not very convenient
    for the advanced data manipulations we require for machine learning tasks. Fortunately,
    specialized packages like NumPy, SciPy, Pandas exist which provide convenient
    multidimensional tabular data structures suited for scientific computing. Let’s
    quickly make ourselves familiar with these packages.


    # NumPy


    In NumPy, ndarrays are the basic data structures which put data in a grid of values.
    Illustrations below shows how 1D and 2D arrays can be created and their items
    accessed


    ```

    # import numpy package & create a 2D array

    import numpy as np

    arr2D = np.array([[1,4,6],[2,5,7]])


    # getting information about arr2D

    print(arr2D.size) # returns 6, the no. of items

    print(arr2D.ndim) # returns 2, the no. of dimensions

    print(arr2D.shape) # returns tuple(2,3) corresponding to 2 rows & 3 columns

    ```



  - '[PAGE 290]


    > In the above example, the dimension of the feature space was known beforehand.
    However, in general, this becomes a hyperparameter that needs to be optimized
    along with other hyperparameters such as the number of hidden layers, the learning
    rate, batch-size, etc. A generic guidance is that the compression of neurons between
    successive layers (in encoder) should not be very steep. A compression ratio of
    0.5 is often a good starting value.


    # 16.2 Process Monitoring using Autoencoders: FCCU Case Study


    Fault detection and diagnosis via AE proceed along the same way as done for PCA.
    The reconstruction error and latent variables are computed for each training sample,
    and monitoring metrics are generated. Let’s see how the computations are performed.
    We will re-utilize the FCCU dataset. We will build an autoencoder model using
    the 7 days of NOC data and the heat exchanger fouling simulation data (UAf_decrease_outputs.csv)
    is used as a test dataset. Let’s take a quick look at the heat exchanger fouling
    fault. Reduced heat transfer to the feed leads the controller TC1 to open valve
    V1 more to increase the fuel flow so as to maintain T2 at the setpoint. Moreover,
    less heat going into preheating the feed implies that the flue gas temperature
    (T3) in the furnace increases. The diagram below summarizes the scenario. Variables
    F5 and T3 have been shown here and drifts in their values are evident; however,
    the ‘faulty values’ are not very far away from the normal values obtained under
    fault-free operations with varying feed flow.


    ![](img/cfcc9569b5e92ea115855752abddd75a_290_0.png)


    Our objective is to use AE model to flag faulty samples by using only NOC samples
    for model training.'

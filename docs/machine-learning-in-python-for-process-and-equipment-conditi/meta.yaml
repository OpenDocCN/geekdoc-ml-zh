    ## 前言


    想象一下，你是一名过程工程师/分析师，被分配了第一个基于机器学习的项目，目标是构建一个全厂范围的监控工具。尽管这是一项令人兴奋的任务，但由于难以找到适用于当前过程系统的正确方法，它很容易变成一项令人沮丧的工作。构建一个成功的过程监控工具颇具挑战性，因为过程数据集可能具有不同的特性，这排除了单一方法适用于所有场景的可能性。因此，在过去的几十年里，人们设计了许多强大的技术。虽然选择众多是件好事，但新手很容易在过程监控（PM）和预测性维护（PdM）浩瀚（且仍在增长）的文献中“迷失”。关于PM和PdM的资源有很多是零散的。然而，遗憾的是，目前还没有一本教科书专注于实际实施方面，并全面涵盖在过程工业中已被证明有用的常用PM/PdM技术。在针对工业从业者的PM/PdM机器学习资源方面存在空白，本书试图填补这一空白。具体来说，我们希望创建一本读者友好且易于理解的书籍，通过正确的指导，帮助读者“快速”（免责声明：没有灵丹妙药；仍需努力！）成为基于机器学习的PM/PdM“专家”。


    在本书中，我们涵盖了过程监控和预测性维护的所有三个主要方面，即故障/异常检测、故障诊断/识别以及故障预测/剩余使用寿命估计（RUL）。我们的目的不是对所有现有的PM/PdM技术进行全面论述；尽管我们的重点是帮助新兴的过程数据科学家（PDSs）鸟瞰PM/PdM的全貌，获得主流技术的实用知识，并掌握做出正确模型选择的实践技能。在涵盖的方法论范围方面，我们同等重视现代深度学习方法和经典统计方法。虽然深度学习近年来取得了显著成果，但经典的统计（以及机器学习/数据挖掘）方法尚未过时。事实上，多元统计过程监控（MSPM）技术仍广泛用于过程监控。因此，本书涵盖了从基于单变量Shewhart-/CUSUM-/EWMA的控制图到基于深度学习的RUL估计的完整方法论谱系。


    基于我们过去几年为各种工业应用构建监控模型的经验，本书涵盖了一组经过筛选的、已被证明对PM/PdM有用的机器学习技术。本书的广泛目标可总结如下：


    -   降低PM/PdM领域新进入者的入门门槛

    -   为读者提供PM/PdM技术的实用知识

    -   使读者能够通过直观理解不同技术的优缺点，为其问题明智地选择PM/PdM技术

    -   为开发工业级PM/PdM解决方案提供分步指导

    -   提供关于如何明智地选择模型超参数的实用指导


    本书采用教程式风格。重点在于指南和实际例证，在理论和概念见解之间取得微妙平衡。强调动手学习，因此提供了详细的代码示例和工业规模数据集，以具体化实施细节。我们刻意避免用数学细节压垮读者，而是将其作为更好概念理解的工具。完整的代码实现已提供在GitHub仓库中。


    我们非常有信心，本书将使读者能够自信地为具有挑战性的问题构建过程监控和预测模型。我们祝愿他们在职业生涯中一切顺利。


    ## 谁应该阅读本书


    本书以应用为导向的方法旨在以连贯、读者友好且易于理解的方式，快速全面地介绍主流PM/PdM方法论。以下类别的读者会发现本书有用：


    1.  刚进入过程监控、设备状态监控和预测性维护领域的数据科学家

    2.  希望更深入理解底层概念的商业异常检测软件（如Aspen Mtell）的常规用户

    3.  寻求开发过程监控和预测性维护解决方案指导的实践过程数据科学家

    4.  刚进入数据科学领域的过程工程师或过程工程专业学生

    5.  希望利用振动数据为旋转机械构建故障检测和诊断解决方案的工业从业者


    ### 前提条件


    无需机器学习或Python的先前经验。假定具备本科水平的基础线性代数和微积分知识。


    ## 本书结构


    本书采用整体性和实践性的机器学习学习方法，读者首先获得概念见解并发展对方法论的直观理解，然后通过实验代码示例来巩固所学知识。在过程系统工程的机器学习这一广泛主题下，本书是本系列前两本书（涉及机器学习基础、机器学习在过程工业中的各种应用以及动态系统建模的机器学习方法）的延伸；然而，它也可以作为独立的文本使用。工业过程数据可能表现出不同的特性，如多维性、非高斯性、多模态性、非线性、动态性等。因此，为了妥善处理针对具有不同数据特性的系统设计的不同建模方法论，本书分为七个部分。


    **第1部分**奠定了机器学习辅助的过程和设备状态监控以及预测性维护的基本基础。**第2部分**详细介绍了用于单变量信号监控的经典机器学习技术。讨论了不同类型的控制图和时间序列模式匹配方法论。**第3部分**专注于广泛流行的多元统计过程监控（MSPM）技术。重点放在故障检测和故障隔离/诊断两个方面。**第4部分**涵盖了经典机器学习技术（如k-NN、孤立森林、支持向量机等）的过程监控应用。这些技术对于无法通过MSPM技术满意处理的过程非常有用。**第5部分**探索了人工神经网络（ANN）的世界，并研究了过程工业中常用于故障检测和诊断的不同ANN结构。**第6部分**专注于基于振动的旋转机械监控，**第7部分**涉及预测性维护应用的预测技术。


    本书试图涵盖大量概念。因此，为了避免本书过于臃肿，我们没有包含与PM/PdM不直接相关且已在本系列前两本书中详细涵盖的内容。例如，与交叉验证、正则化、噪声去除等相关的机器学习基础在本系列的第1本书中有详细说明，而不在本书中。


    ## 符号表示


    本书采用以下符号表示不同类型的变量：


    -   小写字母表示向量（$x \in \mathbb{R}^{m \times 1}$），大写字母表示矩阵（$X \in \mathbb{R}^{n \times
    m}$）

    -   向量和矩阵的单个元素分别表示为 $x_j$ 和 $x_{ij}$。

    -   数据集中的任何第 $i^{\text{th}}$ 个向量表示为带下标的小写字母（$x_i \in \mathbb{R}^{m \times 1}$）'

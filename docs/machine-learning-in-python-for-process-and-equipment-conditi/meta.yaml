  md: '# 13.1 Decision Trees: An Introduction


    Decision trees (DTs) are inductive learning methods which derive explicit rules
    from data to make predictions. They partition the feature space into several (hyper)
    rectangles and then fit a simple model (usually a constant) in each one. As shown
    in Figure 13.1 for a binary classification problem in 2D feature space, the partition
    is achieved via a series of if-else statements. As shown, the model is represented
    using branches and leaves which lead to a tree-like structure and hence the name
    decision tree model. The questions asked at each node make it very clear how the
    model predictions (class A or class B) are being generated. Consequently, DTs
    become the model of choice for applications where ease of rationalization of model
    results is very important.


    ![](img/cfcc9569b5e92ea115855752abddd75a_234_0.png)


    The trick in DT model fitting lies in deciding which questions to ask in the if-else
    statements at each node of the tree. During fitting, these questions split the
    feature space into smaller and smaller subregions such that the training observations
    falling in a subregion are similar to each-other. The splitting process stops
    when no further gains can be made or stopping criteria have been met. Improper
    choices of splits will generate a model that does not generalize well. In the
    next subsection, we will study a popular DT training algorithm called CART (classification
    and regression trees) which judiciously determines the splits.


    # Mathematical background


    CART algorithm creates a binary tree, i.e., at each node two branches are created
    that split the dataset in such a way that overall data ‘impurity’ reduces. To
    understand this, consider'
  merge: -1
  pgno: 234
- img_proc: true
  md: 'the following node<sup>84</sup> of a tree. Also assume that we are dealing
    with binary classification problem with input vector $x \in R^m$.


    ![](img/cfcc9569b5e92ea115855752abddd75a_235_0.png)


    The algorithm needs to decide which one of the $m$ input variables, $x_k$, will
    be used to split the set of $n$ samples at this node and with what threshold $r$.
    CART makes this determination by minimizing the following objective


    $$J(k, r) = \frac{n_{left}}{n} I_{left} + \frac{n_{right}}{n} I_{right}$$


    where $I_{left/right}$ denote the data impurity of the left/right subsets of data
    and is given by


    $$I = 1 - \sum_{q=1}^{2} p_q^2$$


    where $p_q$ is the ratio of samples of the corresponding data subset belonging
    to class $q$. For example, if all the samples in a subset belong to class 1, then
    $p_1 = 1$ and $I = 0$. Therefore, if CART could find $k$ and $r$ such that the
    $n$ samples get perfectly divided class-wise into the left and right subsets,
    then the minimum value of $J = 0$ will be obtained. However, this is usually not
    possible, and CART tries to do the best it can. The reduction in impurity ($\Delta
    I_{node}$) achieved by CART at this node is given by $nI_{node} - \frac{n_{left}}{n}
    I_{left} - \frac{n_{right}}{n} I_{right}$.


    CART simply follows the aforementioned branching scheme recursively. It starts
    from the top node (root node) and keeps splitting the subsets. If a node cannot
    be split any further (because impurity cannot be reduced anymore or some hyperparameter
    settings such as min_samples_split, min_samples_leaf prevent any further split),
    the node becomes a leaf or terminal node. For prediction, the leaf node corresponding
    to the test sample is found and the majority class from the leaf''s training subset
    is assigned to the test sample. Note that a probabilistic prediction for class
    $q$ can also be made by simply looking at the ratio of the leaf''s training samples
    belonging to class $q$.'
  merge: -1
  pgno: 235
- img_proc: true
  md: 'In classical DTs, as we have seen, the split decision rules (or split functions)
    at the nodes are based on a single variable. This results in axis-aligned hyperplanes
    that split the input space into several hyperrectangles. Complex split functions
    using multiple variables may also be used which may be more suitable for certain
    datasets – one such example is shown below


    ![](img/cfcc9569b5e92ea115855752abddd75a_236_0.png)


    Fitting DTs with complex split functions, however, becomes computationally much
    more demanding. Therefore, a general recommendation is to transform your dataset
    using dimensionality reduction techniques like PCA, FDA before fitting tree using
    simple split functions.


    For regression problems, a tree is built in the same way with a different objective
    function, $J(k,r)$, which now is given by


    ```

    $$J(k,r) = \frac{n_{left}}{n} MSE_{left} + \frac{n_{right}}{n} MSE_{right}$$

    ```


    Where $MSE_{left/right}$ denote the mean-squared error at the left/right node


    ```

    $$MSE = \frac{\sum_{sample \in subset} (\hat{y} - y_{sample})^2}{\# \text{ of
    samples}}$$

    ```


    $\hat{y}$ is the average output of the samples belonging to a subset. Prediction
    for a test sample is also taken as the average output value of all training samples
    assigned to the test sample''s leaf node.


    You are not confined to using the constant predictive models at the leaves of
    a regression tree. Linear and polynomial predictive models may be more suitable
    for certain problems. Such DTs are called model trees. While Sklearn allows only
    the constant model, there exists a package$^{85}$ called ''linear-tree'' that
    allows building model trees with linear models at the leaves.'
  merge: -1
  pgno: 236

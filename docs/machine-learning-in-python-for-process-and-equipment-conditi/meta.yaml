  md: '# 5.2 Shewhart Charts: An Introduction


    Shewhart chart is the simplest and widely used control chart wherein the process
    measurement at each sampling instant is plotted against the sample number and
    the control limits are often set at $\mu \pm 3\sigma$, where $\mu$ and $\sigma$
    are the in-control process variable mean and standard deviation. The centerline
    is obviously set at $\mu$. Shewhart charts assume Gaussian distribution and therefore,
    the $3\sigma$ control chart amounts to a false alarm rate of 0.27% as shown in
    Figure 5.2


    ![](img/cfcc9569b5e92ea115855752abddd75a_88_0.png)


    The statistics $\mu$ and $\sigma$ are often not known exactly and are estimated
    from historical in-control data. Let $x_1, x_2, \cdots, x_N$ be the observations
    from historical good operation period, then the sample statistics can be estimated
    as$^{25}$


    ```

    $$\hat{\mu} = \bar{x} = \frac{1}{N} \sum_{i=1}^{N} x_i \quad ; \quad \hat{\sigma}
    = \frac{s}{c_4}$$

    ```


    where s is sample standard deviation ($\sqrt{\frac{\sum(x_i-\bar{x})^2}{N-1}}$)
    and $c_4$ is a correction factor$^{26}$ (which tends to 1 for large $N$) to account
    for finite samples. This leads to the following control limits


    ```

    $$LCL = \bar{x} - 3\frac{s}{c_4} \quad ; \quad UCL = \bar{x} + 3\frac{s}{c_4}$$

    ```'
  merge: -1
  pgno: 88
- img_proc: true
  md: '# Subgroup of measurements at each sample


    The standard Shewhart chart assumes that a subgroup of, say, $m$ measurements)
    is available at each sampling instant as illustrated below.


    ![](img/cfcc9569b5e92ea115855752abddd75a_89_0.png)


    It is the mean of the subgroup that is tracked on the standard Shewhart chart.
    Infact, the Shewhart chart with $m=1$ is referred to as an individual Shewhart
    chart. Let $x_{ij}$ denote the $j^{th}$ measurement in the $i^{th}$ subgroup.
    The sample statistics for the subgroup mean can be obtained as follows using historical
    IC (in-control) data.


    ![](img/cfcc9569b5e92ea115855752abddd75a_89_1.png)


    For continuous processes, both individual and standard Shewhart charts find utility.
    For example, suppose that plant efficiency measurements are available every minute.
    Plant operators, if desired, can track the minute-level efficiencies using individual
    control chart. Alternatively, efficiency measurements may be averaged over an
    hour ($\Rightarrow m=60$) and the hourly-averaged efficiency values may be tracked


    While Shewhart charts are easy to interpret and implement, their performance is
    poor when used to detect small deviations ($< 1.5\sigma$ shifts) in process variable
    mean. The following illustration clarifies this aspect.'

    \ = np.transpose(data_test_normal[sample-1,])\n\nD = np.dot(np.dot(P_matrix,lambda_k_inv),P_matrix.T)\n\
    T2contri = np.dot(scipy.linalg.sqrtm(D),data_point)**2 # vector of contributions\n\
    \nplt.figure(), plt.bar(['var ' + str((i+1)) for i in range(len(T2contri))], T2contri)\n\
    \n# SPE contribution\nerror_test_sample = error_test[sample-1,]\nSPE_contri =\
    \ error_test_sample*error_test_sample # vector of contributions\n\nplt.figure(),\
    \ plt.bar(['var ' + str((i+1)) for i in range(len(SPE_contri))], SPE_contri)\n\
    ```\n\nVariable # 24 makes large contributions to both the indices and in Figure\
    \ 7.10 we can see a sharp decline in its value towards the end of the sampling\
    \ period. A plant operator can use his/her judgement to further troubleshoot the\
    \ abnormality to isolate the root-cause.\n\nNote that contribution plots do not\
    \ explicitly identify the underlying cause of the fault; rather, they only isolate\
    \ the variables that have been most affected by the fault or are most inconsistent\
    \ with the NOC behavior.\n\n## Smearing effect\n\n> While contribution analysis\
    \ is a widely employed method for fault isolation, it is prone to errors – variables\
    \ that are not impacted by fault can end up having significant contributions.\
    \ For example, in the simple illustration below, assume that an actual process\

    X_test_scaled = X_scaler.transform(X_test)\nscores_test = kPCA.transform(X_test_scaled)\n\
    ```\n\n```python\n# 计算测试数据的 Q 统计量\nN_test = X_test.shape[0]\nQ_test = np.zeros((N_test,1))\n\
    for i in range(N_test):\n    Q_test[i] = np.dot(scores_test[i,:], scores_test[i,:])\
    \ - np.dot(scores_test[i,:n_comp],\n                                         \
    \                     scores_test[i,:n_comp])\n```\n\n```python\n# 测试数据的监控图表\n\
    plt.figure(), plt.plot(Q_test), plt.plot([1,len(Q_test)],[Q_CL,Q_CL], color='red')\n\
    plt.xlabel('样本编号'), plt.ylabel('Q (测试数据))\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_186_0.png)\n\
    \n希望你现在对能够为非线性系统部署基于 KPCA 的故障检测系统充满信心。\n\n## 10.3 核 PLS：简介\n\n核 PLS 是传统 PLS 的非线性扩展，用于处理表现出显著非线性的非线性过程数据。如下图\

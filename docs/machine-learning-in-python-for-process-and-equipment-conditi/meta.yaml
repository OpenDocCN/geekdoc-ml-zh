    more accurate (lower bias), and/or robust (lower variance) predictions. Can we
    then combine any set of poor performing models and obtain a super accurate ensemble
    model? Both yes and no! There are certain criteria that must be met to be able
    to reap the benefits of ensemble learning. First, the base models must individually
    perform better than random guessing. Second, the base models must be diverse (i.e.,
    the errors made on unseen data must be uncorrelated). Consider the following simple
    illustration to understand these requirements.


    ![](img/cfcc9569b5e92ea115855752abddd75a_246_0.png)



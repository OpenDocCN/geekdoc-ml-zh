  mdcn: '## 10.1 核主成分分析：简介


    核主成分分析是传统主成分分析的非线性扩展，适用于处理表现出显著非线性的过程。为了理解核主成分分析背后的动机，让我们考虑图10.1所示的简单场景。在图10.1a中，我们可以看到数据沿一条直线分布，这条直线可以通过线性主成分分析的第一个特征向量获得。在图10.1b中，数据沿一条曲线分布；传统的主成分分析无法帮助找到这条非线性曲线。相应地，主成分分析未能检测到明显的异常值。然而，对于后一种情况，并非无计可施。如果我们不在（$x_1$,
    $x_2$）测量空间中工作，而是在（$z_1$, $z_2$）=（$x_1^4$, $x_2$）特征空间中工作，那么我们将得到线性相关的特征，并且可以将异常数据点标记出来。不幸的是，找到这种将原始数据映射到特征变量的（非线性）映射任务并非易事。值得庆幸的是，有一种叫做“核技巧”的方法，它允许你在特征空间中工作，而无需定义非线性映射。我们将在下一节学习如何实现这一点。


    ![](img/cfcc9569b5e92ea115855752abddd75a_176_0.png)


    核主成分分析可以处理任意的数据分布。就过程监控应用而言，核主成分分析可以帮助你在你的正常运行工况数据周围创建一个异常边界，如下所示。


    ![](img/cfcc9569b5e92ea115855752abddd75a_176_1.png)


    为了理解核主成分分析的工作原理，让我们重新审视主成分分析的数学基础。


    ## 核函数与核技巧


    核技巧的使用不仅限于核主成分分析和核偏最小二乘法。其他机器学习技术，如支持向量机、典型变量分析等，也使用核函数来建模非线性过程。那么，这些核函数是什么？让我们试着理解它们。


    我们之前提到过，处理非线性的一种流行方法是将观测样本 $x$ 映射到特征空间中的 $x_F$，在那里可以应用传统的线性机器学习技术。


    $\varphi(x): x \rightarrow x_F$


    然而，映射 $\varphi(.)$ 是未知的。值得庆幸的是，在许多机器学习算法的数学公式中，特征向量的内积（或点积）$\varphi(x)^T\varphi(x)$
    经常出现。这个内积表示为


    $k(x_i, x_j) = <\varphi(x_i), \varphi(x_j)> = \varphi(x_i)^T\varphi(x_j)$


    其中 $k(.,.)$ 称为核函数。$k(.,.)$ 有多种形式，最常见的形式是高斯核或径向基函数，定义为


    $k(x_i, x_j) = exp\left[-\frac{(x_i-x_j)^T(x_i-x_j)}{\sigma^2}\right]$


    其中，$\sigma$（一个超参数）称为核宽度。核函数的使用允许在特征空间中应用线性机器学习技术，而无需显式地知道特征向量，这种技巧称为“核技巧”。你在核化算法中遇到的另一个术语是核矩阵（通常表示为
    $K$）。$K$ 的 $(i, j)^{th}$ 元素就是 $k(x_i, x_j)$。下表列出了常用的核函数


    | 函数 | 方程 | 超参数 |

    | :--- | :--- | :--- |

    | 线性核 | $k(x, z) = x^Tz$ | |

    | 高斯核 | $k(x, z) = exp(-\frac{\|x-z\|^2}{\sigma^2})$ | $\sigma$ |

    | 多项式核 | $k(x, z) = (\gamma x^Tz + r)^d$ | $\gamma, r, d$ |

    | Sigmoid核 | $k(x, z) = tanh(\gamma x^Tz + r)$ | $\gamma, r$ |


    让我们用多项式核来说明使用核函数如何等价于高维映射。假设我们使用以下核函数


    $$k(x, z) = (x^T z + 1)^2$$


    其中 $x = [x_1, x_2]^T$ 和 $z = [z_1, z_2]^T$ 是原始二维空间中的两个向量。我们声称上述核函数等价于以下映射


    $$\varphi(x) = [x_1, x_2, \sqrt{2}x_1, \sqrt{2}x_2, \sqrt{2}x_1x_2, 1]$$


    为了理解这一点，只需计算 $\varphi(x)^T \varphi(z)$


    $$\begin{aligned} \varphi(x)^T \varphi(z) &= x_1^2 z_1^2 + x_2^2 z_2^2 + 2x_1
    z_1 + 2x_2 z_2 + 2x_1 x_2 z_1 z_2 + 1 \\ &= (x_1 z_1 + x_2 z_2 + 1)^2 \\ &= (x^T
    z + 1)^2 \\ &= k(x, z) \end{aligned}$$


    因此，如果你使用上述多项式核，你实际上是将数据隐式地投影到了一个6维的特征空间！如果你对这个例子感到惊讶，那么知道高斯核将原始空间映射到无限维特征空间，你会觉得更有趣！幸运的是，我们不需要知道这个特征空间的形式。


    ## 数学背景


    核主成分分析的主要目标是在特征空间中获得得分向量。为了了解如何获得得分向量，令 $x \in \mathbb{R}^m$ 和 $\varphi(x)$ 分别表示原始测量空间中的样本和高维特征空间中的投影特征向量。我们知道传统的主成分分析涉及求解以下特征值问题


    ![](img/cfcc9569b5e92ea115855752abddd75a_178_0.png)


    令 $X_F = [\varphi(x_1), \varphi(x_2), \cdots, \varphi(x_N)]^T$ 表示特征数据矩阵。我们暂时假设
    $X_F$ 已经中心化。因此，特征空间中的主成分分析涉及以下特征分解问题


    $$\frac{1}{N-1} X_F^T X_F v = \lambda_F v \quad \text{公式 1}$$


    $X_F$ 是未知的，因此无法直接求解上述方程。让我们在公式1的两边左乘 $X_F$，得到


    $$\frac{1}{N-1} X_F X_F^T X_F v = \lambda_F X_F v \quad \text{公式 2}$$


    线性代数表明，特征向量$^{68}$可以写成样本的线性组合，即


    $$v = \sum_{i=1}^N \alpha_i \varphi(x_i) = X_F^T \alpha \quad \text{公式 3}$$


    我们还定义核矩阵 $K = X_F X_F^T$。现在将核矩阵和公式3中的 $v$ 代入公式2，得到


    $$K \alpha = (N-1) \lambda_F \alpha \quad \text{公式 4}$$


    公式4是一个特征分解问题，可以求解得到核特征向量 $\alpha^{(1)}, \alpha^{(2)}, \cdots, \alpha^{(N)}$ 和核特征值$^{69}$
    $\lambda_1 \ge \lambda_2 \ge \cdots \ge \lambda_N$。第 $l$ 个特征向量 $\alpha^{(l)} \equiv
    [\alpha_1^{(l)}, \alpha_2^{(l)}, \cdots, \alpha_N^{(l)}] \in \mathbb{R}^N$。为了在特征空间中进行降维，可以只保留前
    $a$ 个特征向量。特征空间中对应的特征向量变为 $v^{(l)} = X_F^T \alpha^{(l)}$。为了确保特征向量 $v^{(l)}$ 是单位长度，需要对
    $\alpha^{(l)}$ 施加以下条件，


    $$\|v^{(l)}\|_2 = v^{(l)T} v^{(l)} = \alpha^{(l)T} X_F X_F^T \alpha^{(l)} = 1$$

    $$\Rightarrow (N-1) \lambda_{Fl} \|\alpha^{(l)}\|_2 = 1$$

    $$\Rightarrow \|\alpha^{(l)}\|_2 = 1 / (N-1) \lambda_{Fl} \quad \text{公式 5}$$


    $^{68}$ 注意，对于高斯核，$\varphi(x)$ 和 $v$ 具有无限维。

    $^{69}$ 核特征值 $\lambda_l$ 可以除以 $N-1$ 得到特征值 $\lambda_{Fl}$。


    上述表达式意味着，从公式4获得的对应于非零特征值的计算出的核特征向量 $\alpha^{(l)}$ 需要进行缩放以满足公式5。请注意，特征向量 $v^{(l)}$
    仍然无法获得，因为 $X_F$ 是未知的。然而，我们主要关心的变量是对应于样本 $x_j$ 的得分向量 $t_j \in \mathbb{R}^a$。在我们了解如何获得
    $t_j$ 之前，我们需要坦诚地面对一个关于特征空间中数据 $\varphi(x_1), \varphi(x_2), \cdots, \varphi(x_N)$
    已经中心化的重大假设。为了确保中心化，核矩阵 $K$ 需要按如下方式修正


    $$\bar{K} = K - 1_N K - K 1_N + 1_N K 1_N \quad \text{公式 6}$$


    $$\text{其中 } 1_N = \frac{1}{N} \begin{bmatrix} 1 & \cdots & 1 \\ \vdots & \ddots
    & \vdots \\ 1 & \cdots & 1 \end{bmatrix}_{N \times N}$$


    $$\rightarrow \text{可以证明 } \bar{K} \text{ 等于 } \bar{X}_F^T \bar{X}_F$$


    $$\bar{X}_F = [\bar{\varphi}(x_1), \bar{\varphi}(x_2), \cdots, \bar{\varphi}(x_N)]^T$$


    $$\rightarrow \text{等价地，} \bar{K}_{ij} = \bar{k}(x_i, x_j) = \bar{\varphi}(x_i)^T
    \bar{\varphi}(x_j)$$


    ## 训练样本和测试样本的得分向量


    为了找到训练样本 $x_j$ 的得分向量（$t_j \in \mathbb{R}^{a \times 1} = [t_{j1}, t_{j2}, \cdots,
    t_{ja}]^T$），我们需要计算 $\varphi(x_i)$ 沿每个特征向量 $v^{(l)}$（$l = 1, 2, \cdots, a$）的得分或投影，这可以通过以下方式获得


    $$t_{jl} = < v_l, \bar{\varphi}(x_j) > = \sum_{i=1}^N \alpha_i^{(l)} \bar{k}(x_i,
    x_j) = \sum_{i=1}^N \alpha_i^{(l)} \bar{K}_{ji} = \alpha^{(l)T} \bar{k}_j \quad
    \text{公式 7}$$


    缩放后的特征向量 [公式 5] 中心化的核向量 $\in \mathbb{R}^{N \times 1}$，其中 $\bar{k}_{ji} = \bar{k}(x_j,
    x_i) = \bar{K}_{ij}$，$x_i$ 属于训练数据集，$i = 1, 2, \cdots, N$。


    对于测试样本 $x_t$，上述表达式变为'

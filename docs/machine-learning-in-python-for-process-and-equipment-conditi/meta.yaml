- md: "## 2.3 Python Language: Basics\n\nIn the current and next sections, we will\
    \ see several simple examples of manipulating data using Python and scientific\
    \ packages. While these simple operations may seem unremarkable (and boring) in\
    \ the absence of any larger context, they form the building blocks of more complex\
    \ scripts presented later in the book. Therefore, it will be worthwhile to give\
    \ these at least a quick glance.\n\nNote that you will find '#' used a lot in\
    \ these examples; these hash marks are used to insert explanatory comments in\
    \ code. Python ignores (does not execute) anything written after # on a line.\n\
    \n## Basic data types\n\nIn Python, you work with 4 types of data types\n\n```\n\
    # 4 data types: int, float, str, bool\ni = 2 # integer; type(i) = int\nf = 1.2\
    \ # floating-point number; type(f) = float\ns = 'two' # string; type(s) = str\n\
    b = True # boolean; type(b) = bool\n```\n\nWith the variables defined, you can\
    \ perform basic operations\n\n```\n# print function prints/displays the specified\
    \ message\nprint(i+2) # displays 4\nprint(f*2) # displays 2.4\n```\n\n## Lists,\
    \ tuples as ordered sequences\n\nRelated data (not necessarily of the same data\
    \ type) can be arranged together as a sequence in a list as shown below\n\n```\n\
    # different ways of creating lists\nlist1 = [2,4,6]\nlist2 = ['air',3,1,5]\nlist3\
    \ = list(range(4)) # equals [0,1,2,3]; range function returns a sequence of numbers\
    \ starting\n                        # from 0 (default) with increments of 1 (default)\n\
    list3.append(8) # returns [0,1,2,3,8]; append function adds new items to existing\
    \ list\nlist4 = list1 + list2 # equals [2,4,6,'air',3,1,5]\nlist5 = [list2, list3]\
    \ # nested list [['air', 3, 1, 5], [0, 1, 2, 3,8]]\n```\n\nTuples are another\
    \ sequence construct like lists, with a difference that their items and sizes\
    \ cannot be changed. Since tuples are immutable/unchangeable, they are more memory\
    \ efficient.\n\n```\n# creating tuples\ntuple1 = (0,1,'two')\ntuple2 = (list1,\
    \ list2) # equals ([2, 4, 6, 8], ['air', 3, 1, 5])\n```\n\nA couple of examples\
    \ below illustrate list comprehension which is a very useful way of creating new\
    \ lists from other sequences\n\n```\n# generate powers of individual items in\
    \ list3\nnewList1 = [item**2 for item in list3] # equals [0,1,4,9,64]\n\n# nested\
    \ list comprehension\nnewList2 = [item2**2 for item2 in [item**2 for item in list3]]\
    \ # equals [0,1,16,81,4096]\n```\n\n## Indexing and slicing sequences\n\nIndividual\
    \ elements in a list can be accessed and modified as follows\n\n```\n# working\
    \ with single item using positive or negative indexes\nprint(list1[0]) # displays\
    \ 2, the 1st item in list1\nlist2[1] = 1 # list2 becomes ['air',1,1,5]\nprint(list2[-2])\
    \ # displays 1, the 2nd last element in list2\n```\n\nNote that Python indexing\
    \ starts from zero. Very often, we need to work with multiple items of the list.\
    \ This can be accomplished easily as shown below.\n\n```\n# accessing multiple\
    \ items through slicing\n# Syntax: givenList[start,stop,step]; if unspecified,\
    \ start=0, stop=list length, step=1\nprint(list4[0:3]) # displays [2,4,6], the\
    \ 1st, 2nd, 3rd items; note that index 3 item is excluded\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_41_0.png)\n\
    \n```\nprint(list4[:3]) # same as above\nprint(list4[4:len(list4)]) # displays\
    \ [3,1,5]; len() function returns the number of items in list\n```\n\n```\nprint(list4[4:])\
    \ # same as above\nprint(list4[::3]) # displays [2, 'air', 5]\nprint(list4[::-1])\
    \ # displays list 4 backwards [5, 1, 3, 'air', 6, 4, 2]\nlist4[2:4] = [0,0,0]\
    \ # list 4 becomes [2, 4, 0, 0, 0, 3, 1, 5]\n```\n\n## Execution control statements\n\
    \nThese statements allow you to control the execution sequence of code. You can\
    \ choose to execute any specific parts of the script selectively or multiple times.\
    \ Let's see how you can accomplish these\n\n```\n# selectively execute code based\
    \ on condition\nif list1[0] > 0:\n    list1[0] = 'positive'\nelse:\n    list1[0]\
    \ = 'negative'\n\n# list1 becomes ['positive', 4, 6]\n```\n\n```\n# compute sum\
    \ of squares of numbers in list3\nsum_of_squares = 0\nfor i in range(len(list3)):\n\
    \    sum_of_squares += list3[i]**2\n\nprint(sum_of_squares) # displays 78\n```\n\
    \n## Custom functions\n\nPreviously we used Python's built-in functions (len(),\
    \ append()) to carry out operations pre-defined for these functions. Python allows\
    \ defining our own custom functions as well. The advantage of custom functions\
    \ is that we can define a set of instructions once and then re-use them multiple\
    \ times in our script and project.\n\nFor illustration, let's define a function\
    \ to compute the sum of squares of items in a list.\n\n```\n# define function\
    \ instructions\ndef sumSquares(givenList):\n    sum_of_squares = 0\n    for i\
    \ in range(len(givenList)):\n        sum_of_squares += givenList[i]**2\n\n   \
    \ return sum_of_squares\n\n# call/re-use the custom function multiple times\n\
    print(sumSquares(list3)) # displays 78\n```\n\n> You might have noticed in our\
    \ custom function code above that we used different indentations (number of whitespaces\
    \ at beginning of code lines) to separate the ‘for loop’ code from the rest of\
    \ the function code. This practice is actually enforced by Python and will result\
    \ in errors or bugs if not followed. While other popular languages like C++, C#\
    \ use braces ({}) to demarcate a code block (body of a function, loop, if statement,\
    \ etc.), Python uses indentation. You can choose the amount of indentation, but\
    \ it must be consistent within a code block.\n\nThis concludes our extremely selective\
    \ coverage of Python basics. However, this should be sufficient to enable you\
    \ to understand the codes in the subsequent chapters. Let’s continue now to learn\
    \ about some specialized scientific packages.\n\n## 2.4 Scientific Computing Packages:\
    \ Basics\n\nWhile the core Python data-structures are quite handy, they are not\
    \ very convenient for the advanced data manipulations we require for machine learning\
    \ tasks. Fortunately, specialized packages like NumPy, SciPy, Pandas exist which\
    \ provide convenient multidimensional tabular data structures suited for scientific\
    \ computing. Let’s quickly make ourselves familiar with these packages.\n\n##\
    \ NumPy\n\nIn NumPy, ndarrays are the basic data structures which put data in\
    \ a grid of values. Illustrations below shows how 1D and 2D arrays can be created\
    \ and their items accessed\n\n```\n# import numpy package & create a 2D array\n\
    import numpy as np\narr2D = np.array([[1,4,6],[2,5,7]])\n\n# getting information\
    \ about arr2D\nprint(arr2D.size) # returns 6, the no. of items\nprint(arr2D.ndim)\
    \ # returns 2, the no. of dimensions\nprint(arr2D.shape) # returns tuple(2,3)\
    \ corresponding to 2 rows & 3 columns\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_43_0.png)\n\
    \n```\n# create a 1D array\narr1D = np.array([1,4,6])\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_44_0.png)\n\
    \n```\n# getting information about arr1D\nprint(arr1D.size) # returns 3, the no.\
    \ of items\nprint(arr1D.ndim) # returns 1, the no. of dimensions\nprint(arr1D.shape)\
    \ # returns tuple (3,) corresponding to 3 items\n```\n\nNote that the concept\
    \ of rows and columns do not apply to a 1D array. Also, you would have noticed\
    \ that we imported the NumPy package before using it in our script (‘np’ is just\
    \ a short alias). Importing a package makes available all its functions and sub-packages\
    \ for use in our script.\n\n## Creating NumPy arrays\n\nPreviously, we saw how\
    \ to convert a list to a NumPy array. There are other ways to create NumPy arrays\
    \ as well. Some examples are shown below\n\n```\n# creating sequence of numbers\n\
    arr1 = np.arange(3, 6) # same as Python range function; results in array([3,4,5])\n\
    arr2 = np.arange(3, 9, 2) # the 3rd argument defines the step size; results in\
    \ array([3,5,7])\narr3 = np.linspace(1,7,3) # creates evenly spaced 3 values from\
    \ 1 to 7; results in array([1,4,7])\n```\n\n```\n# creating special arrays\narr4\
    \ = np.ones((2,1)) # array of shape (2,1) with all items as 1\narr5 = np.zeros((2,2))\
    \ # all items as zero; often used as placeholder array at beginning of script\n\
    arr6 = np.eye(2) # diagonal items as 1\n```\n\n```\n# adding axis to existing\
    \ arrays (e.g., converting 1D array to 2D array)\nprint(arr1[:, np.newaxis])\n\
    >>>[[3]\n    [4]\n    [5]]\n```\n\n```\narr7 = arr1[:, None] # same as above\n\
    ```"
  mdcn: "## 2.3 Python语言：基础\n\n在当前和下一节中，我们将看到几个使用Python和科学包操作数据的简单示例。虽然这些简单的操作在没有更大背景的情况下可能显得平淡无奇（且枯燥），但它们构成了本书后面介绍的更复杂脚本的基础。因此，至少快速浏览一下这些内容是值得的。\n\
    \n请注意，你会在这些示例中频繁看到'#'；这些井号用于在代码中插入解释性注释。Python会忽略（不执行）一行中#之后写的所有内容。\n\n## 基本数据类型\n\
    \n在Python中，你使用4种数据类型\n\n```\n# 4 data types: int, float, str, bool\ni = 2 # integer;\

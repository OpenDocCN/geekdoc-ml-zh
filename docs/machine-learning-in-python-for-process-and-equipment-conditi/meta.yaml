    \ (GMM) is a clustering technique that works under the assumption that even when\
    \ the overall process data does not follow a (unimodal) Gaussian distribution,\
    \ it may still be appropriate to characterize data from each individual operating\
    \ mode/cluster through local Gaussian distributions. GMM find the centroids and\

    ## 第1章


    ## 机器学习、过程与设备状态监测及预测性维护：导论


    问问工厂经理什么让他们夜不能寐，答案中总会包括工厂设备故障和导致停机的过程异常。这种对工厂可靠性的担忧并非空穴来风。早期的异常如果未被发现，可能导致连锁损害，造成经济损失、工厂停机甚至人员伤亡。流程工业中的几次重大灾难（2019年费城炼油厂爆炸、1984年博帕尔毒气泄漏等）都是未能及时检测和纠正过程故障的结果。虽然此类灾难不幸地很少发生，但导致工厂效率非最优和产品质量下降的“无害”过程异常却时常发生。毫不夸张地说，全天候监控过程性能和工厂设备健康状况，并预测即将发生的故障，已不再是“锦上添花”，而是绝对的必需品！


    流程工业通过安装更多传感器和收集更多实时数据来应对上述挑战。不幸的是，这导致了数据泛滥，操作员被“信息过载但洞察不足”所淹没。值得庆幸的是，机器学习凭借其解析海量数据并实时发现隐藏模式的能力，成为了救星。机器学习允许智能过程监测（PM），其目标不仅是检测过程异常，更要在早期阶段发现问题。此外，机器学习通过提前预测设备故障时间，促进了预测性维护（PdM）。


    在本章中，我们将鸟瞰用于PM/PdM的机器学习全景，并理解实现上述目标所需具备的条件。具体涵盖以下主题：


    - 过程/设备异常与故障简介

    - 基于机器学习的过程监测和预测性维护的典型工作流程

    - 过程监测和预测性维护的机器学习全景

    - 工业中常用的PM/PdM解决方案部署基础设施


    机器学习是一个强大的工具，但它并非魔法；要正确运用它，仍需要大量的“机器学习艺术”。现在，让我们迈出掌握这门艺术的第一步。'

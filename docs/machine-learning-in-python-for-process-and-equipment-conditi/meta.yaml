    fault can be seen in abnormal stripper temperature profile (Figure 8.4a). The
    plot in PC space (Figure 8.4b) shows more clearly how the faulty operation data
    are different from the normal operation data. We will use ICA and FDA for detecting
    and classifying these faults automatically.


    <sup>48</sup> Detailed information about the process and the faults can be obtained
    from the original paper by Downs and Vogel titled ‘A plant-wide industrial process
    control problem’.

    <sup>49</sup> Adapted from the original flowsheet by Gilberto Xavier (https://github.com/gmxavier/TEP-meets-LSTM)

    After the ordering of the ICs, 2 approaches could be utilized to determine the
    optimal number of ICs. Approach 1 uses the sorted $L_2$ norm plot to determine
    a cut-off IC number beyond which the norms are relatively insignificant. For our
    dataset, as seen in Figure 8.5, no clear cut-off number is apparent. Another approach
    entail choosing the number of ICs equal to the number of PCs. This approach also
    ensures fair comparison between ICA and PCA. We will use this 2nd approach in
    this chapter.


    ```

    # decide # of ICs to retain via PCA variance method and compute ICs

    from sklearn.decomposition import PCA

    pca = PCA().fit(data_train_normal)


    explained_variance = 100*pca.explained_variance_ratio_ # in percentage

    cum_explained_variance = np.cumsum(explained_variance) # cumulative % variance
    explained


    n_comp = np.argmax(cum_explained_variance >= 90) + 1

    print(''Number of PCs cumulatively explaining atleast 90% variance: '', n_comp)


    >>> Number of PCs cumulatively explaining atleast 90% variance:  17


    # compute ICs with reduced dimension

    Wd = W_sorted[0:n_comp,:]

    Sd = np.dot(Wd, data_train_normal.T) # row 1 contains scores of the most important
    IC


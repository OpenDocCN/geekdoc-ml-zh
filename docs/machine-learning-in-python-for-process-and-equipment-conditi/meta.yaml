  md: "# $I_e^2$ statistic\n\nThe third metric, $I_e^2$, is based on the excluded\
    \ ICs. Let $W_e$ contain the excluded rows of matrix $W$. Then\n\n$$s_i^e = W_e\
    \ x_i$$\n$$I_e^2 = (s_i^e)^T s_i^e$$\n\nDue to the non-Gaussian nature of the\
    \ ICs, we do not have convenient closed-form equations for computing the thresholds/control\
    \ limits of the above computed indices. A standard practice is to use Kernel density\
    \ Estimation (KDE) for threshold determination of ICA metrics. Since we will learn\
    \ KDE in a later chapter, we will employ the percentile method here.\n\nBelow\
    \ we define a function that takes an ICA model and data matrix as inputs and returns\
    \ the monitoring metrics. Figure 8.6 shows the monitoring charts along with 99%\
    \ control limits.\n\n```\n# Define function to compute ICA monitoring metrics\
    \ for training or test samples\ndef compute_ICA_monitoring_metrics(ica_model,\
    \ number_comp, data):\n    \"\"\"\n    data: numpy array of shape = [n_samples,\
    \ n_features]\n\n    Returns\n    -------\n    monitoring_stats: numpy array of\

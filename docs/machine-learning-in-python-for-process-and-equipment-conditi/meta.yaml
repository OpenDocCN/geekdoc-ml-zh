    0   1     10\n1   1      8\n2   1      6\n```\n\n```python\n# dataframe from series\n\
    s2 = pd.Series([1,1,1])\ndf = pd.DataFrame({'id':s2, 'value':s}) # same as above\n\
    ```\n\nNote that s.values and df.values convert the series and dataframe into\
    \ corresponding NumPy arrays.\n\n## Data access\n\nPandas allows accessing rows\
    \ and columns of a dataframe using labels as well as integer locations. You will\
    \ find this feature pretty convenient.\n\n```python\n# column(s) selection\nprint(df['id'])\

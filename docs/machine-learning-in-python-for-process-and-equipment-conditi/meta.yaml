- md: "## Determining the number of clusters via elbow method\n\nOne of the shortcomings\
    \ in k-means methodology is the need to specify the number of clusters which is\
    \ not known a priori for large process datasets. However, we can use the elbow\
    \ method to overcome this issue. For k-means, the method entails computing the\
    \ cluster inertia or SSE for different number ($K$) of clusters. Expectedly, when\
    \ $K$ increases, SSE decreases as data-points get closer to their assigned centroids.\
    \ The value of $K$ where only minor improvement in SSE occurs upon increasing\
    \ $K$ can be regarded as an optimal value. Figure 11.8 shows than $K = 3$ is a\
    \ good choice for metal etch dataset.\n\n```python\n# determining number of clusters\
    \ via elbow method\nSSEs = []\nfor n_cluster in range(1, 10):\n    kmeans = KMeans(n_clusters\
    \ = n_cluster, random_state = 100).fit(score_train)\n    SSEs.append(kmeans.inertia_)\n\
    \nplt.figure()\nplt.plot(range(1,10), SSEs, marker='o')\nplt.xlabel('Number of\
    \ clusters')\nplt.ylabel('SSEs')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_201_0.png)\n\
    \nFigure 11.8: Cluster inertias for different number of clusters for metal-etch\
    \ dataset\n\n> Determining the number of clusters or local models should not be\
    \ taken lightly. We saw in Figure 11.1 that less than optimal number of clusters\
    \ leads to low soft sensing accuracy and high frequency of missing alarms. On\
    \ the other hand, using too many clusters increases the number of estimated parameters\
    \ and consequently, the convergence time. Too many clusters also lead to overfitting,\
    \ resulting in high frequency of false alarms and low soft sensing accuracy.\n\
    \n## Silhouette analysis for quantifying clusters quality\n\nFor high-dimensional\
    \ data, it may not always be possible to project most of the data variability\
    \ onto 2 or 3 PCs and thus it becomes difficult to judge the goodness of clustering\
    \ or visualize the clusters using 2D or 3D plots. In those situations, silhouette\
    \ plots can be used to visualize and quantify cluster quality. Note that silhouette\
    \ analysis is not specific to k-means and can be applied to study any clustering\
    \ result.\n\nSilhouette coefficient or value of a data-point ranges from -1 to\
    \ 1 and is a measure of how far the data-point is from data-points in neighboring\
    \ cluster as compared to data-points in the same cluster. A value of 1 indicates\
    \ that the data-point is far away from the neighboring cluster and values close\
    \ to 0 indicate that the data-point is close to the boundary between the two clusters.\
    \ Negative values indicate wrong cluster assignment.\n\nFigure 11.9 shows the\
    \ silhouette plot for the cluster shown in Figure 11.7. Each of the colored bands\
    \ is formed by stacking the silhouette coefficient of all data-points in that\
    \ cluster and therefore the thickness of the band is an indication of the cluster\
    \ size. The overall silhouette score is simply the average of silhouette coefficients\
    \ of all the data-points. As expected, average score is high and cluster 2 shows\
    \ highest coefficients as it is far away from the other two clusters.\n\n```python\n\
    # average silhouette score\nfrom sklearn.metrics import silhouette_samples, silhouette_score\n\
    \nsilhouette_avgValue = silhouette_score(score_train, cluster_label)\nprint('Average\
    \ silhouette score is :', silhouette_avgValue)\n\n>>> Average silhouette score\
    \ is : 0.7444602567351603\n\n# silhouette plot\nfrom matplotlib import cm\n\n\
    plt.figure()\nsilhouette_values = silhouette_samples(score_train, cluster_label)\n\
    y_lower, y_upper = 0, 0\nyticks = []\nfor i in range(n_cluster):\n    cluster_silhouette_vals\
    \ = silhouette_values[cluster_label == i]\n    cluster_silhouette_vals.sort()\n\
    \n    y_upper += len(cluster_silhouette_vals)\n    color = cm.nipy_spectral(i\
    \ / n_cluster)\n    plt.barh(range(y_lower, y_upper),cluster_silhouette_vals,height=1.0,edgecolor='none',color=color)\n\
    \    yticks.append((y_lower + y_upper) / 2)\n    y_lower += len(cluster_silhouette_vals)\n\
    \nplt.axvline(silhouette_avgValue, color = \"red\", linestyle = \"--\")\nplt.yticks(yticks,\
    \ np.arange(n_cluster) + 1)\nplt.xlabel('Silhouette coefficient values'), plt.ylabel('Cluster')\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_203_0.png)\n\nFigure 11.9: Silhouette\
    \ plot for metal-etch data with 3 clusters determined via k-means. Red dashed\
    \ line denotes the average silhouette value.\n\nFor comparison, let's look at\
    \ a silhouette plot for a sub-optimal clustering in Figure 11.10. Lower sample-wise\
    \ coefficients and lower overall score clearly indicate worse clustering.\n\n\
    ![](img/cfcc9569b5e92ea115855752abddd75a_203_1.png)\n\nFigure 11.10: Silhouette\
    \ plot for a sub-optimal clustering example\n\n## Pros and cons\n\nAs alluded\
    \ to before, ease of application and simple concept are advantages with k-means\
    \ algorithm. However, a serious shortcoming in this algorithm is the inability\
    \ to deal with complicated geometries as shown in Figure 11.11. The next clustering\
    \ algorithm that we will study is able to handle such clusters.\n\n```python\n\
    # generate ellipsoidal shaped data\nfrom sklearn.datasets import make_blobs\n\n\
    n_samples = 1500\nX, y = make_blobs(n_samples=n_samples, random_state=100)\n\n\
    rotation_matrix = [[0.60, -0.70], [-0.5, 0.7]]\nX_transformed = np.dot(X, rotation_matrix)\
    \ # elongated blobs\n\nplt.figure()\nplt.scatter(X_transformed [:,0], X_transformed\
    \ [:,1])\n\n# fit k-means model\nn_cluster = 3\nkmeans = KMeans(n_clusters = n_cluster,\
    \ random_state = 100).fit(X_transformed)\ncluster_label = kmeans.predict(X_transformed)\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_204_0.png)\n\nWith the clusters\
    \ determined, we can go ahead and build separate models for each cluster and then\
    \ monitor an incoming test sample using the cluster whose centroid is closest.\
    \ However, let us move quickly to the next clustering algorithm that naturally\
    \ lends itself to creation of fused decision metrics for fault detection.\n\n\
    ## 11.4 Gaussian Mixture Modeling: An Introduction\n\nGaussian mixture model (GMM)\
    \ is a clustering technique that works under the assumption that even when the\
    \ overall process data does not follow a (unimodal) Gaussian distribution, it\
    \ may still be appropriate to characterize data from each individual operating\
    \ mode/cluster through local Gaussian distributions. GMM find the centroids and\
    \ covariances of the local clusters automatically once the number of clusters\
    \ have been specified. As shown in Figure 11.12, it works very well for multimodal\
    \ data distributions.\n\n```python\n# fit GMM model to ellipsoidal data\nfrom\
    \ sklearn.mixture import GaussianMixture\n\ngmm = GaussianMixture(n_components\
    \ = 3, random_state = 100)\ncluster_label = gmm.fit_predict(X_transformed)\n\n\
    plt.figure()\nplt.scatter(X_transformed[:, 0], X_transformed[:, 1], c = cluster_label,\
    \ s=20, cmap='viridis')\n\ncluster_centers = gmm.means_ # cluster centers\ncluster_plot_labels\
    \ = ['Cluster ' + str(i+1) for i in range(gmm.n_components)]\nfor i in range(gmm.n_components):\n\
    \    plt.scatter(cluster_centers[i, 0], cluster_centers[i, 1], c='red', marker\
    \ = '*')\n    plt.annotate(cluster_plot_labels[i], (cluster_centers[i,0], cluster_centers[i,1]))\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_205_0.png)\n\nAnother big advantage\
    \ with GMMs is that we can compute the (posterior) probability of a data-point\
    \ belonging to any cluster. This cluster membership measure is provided by predict_proba\
    \ method. Hard clustering is performed by assigning the data-point to the cluster\
    \ with highest probability. Let's compute the probabilities for a data-point that\
    \ lies between clusters 3 and 2 (encircled in Figure 11.12).\n\n```python\n# membership\
    \ probabilities\nprobs = gmm.predict_proba(X_transformed[1069, np.newaxis]) #\
    \ requires 2D array\nprint('Posterior probabilities of clusters 1, 2, 3 for the\
    \ data-point: ', probs[-1,:])\n```\n\n>>> Posterior probabilities of clusters\
    \ 1, 2, 3 for the data-point: [3.36e-54 1.09e-15 1]\n\nGMM thinks that the data-point\
    \ belongs to cluster 3 with 100% probability! It may seem surprising given that\
    \ the point seems to lie equidistant (in terms of Euclidean distance) to clusters\
    \ 3 and 2. We will study in the next subsection how these probabilities were obtained.\n\
    \n### Mathematical background\n\nLet $x \\in \\mathbb{R}^m$ be a m-dimensional\
    \ sample obtained from a multimode process with $K$ operating modes. In GMM, the\
    \ overall probability density is formulated as a combination of local Gaussian\
    \ densities. Let $C_i$ denote the $i^{th}$ local Gaussian cluster with parameters\
    \ $\\theta_i = \\{\\mu_i, \\Sigma_i\\}$ (mean vector and covariance matrix) and\
    \ density\n\n$$g(x|\\theta_i) = \\frac{1}{(2\\pi)^{m/2} |\\Sigma_i|^{1/2}} exp\\\
    left[-\\frac{1}{2}(x - \\mu_i)^T \\Sigma_i^{-1}(x - \\mu_i)\\right]$$ eq. 2\n\n\
    The overall density at any spatial location is given by\n\n$$p(x|\\theta) = \\\
    sum_{i=1}^K \\omega_i g(x|\\theta_i)$$ eq. 3\n\nwhere, $\\omega_i$ represents\
    \ the prior probability that a new sample comes from the $i^{th}$ Gaussian component\
    \ and $\\theta = \\{\\theta_1, ..., \\theta_k\\}$. The GMM model is constructed\
    \ by estimating the parameters $\\theta_i, \\omega_i$ for all the clusters using\
    \ the training samples $X \\in \\mathbb{R}^{N \\times m}$. The parameters are\
    \ estimated by optimizing the log-likelihood of the training dataset given as\
    \ below\n\n$$\\sum_{j=1}^N log \\left(\\sum_{i=1}^K \\omega_i g(x_j|\\theta_i)\\\
    right)$$ eq. 4\n\nTo optimize the likelihood, expectation-maximization (EM) algorithm\
    \ is commonly employed. Assuming an initial estimate of the parameters are given,\
    \ EM algorithm involves iterating between 2 steps:\n\n- E-step ($s^{th}$ iteration):\
    \ (Re-)compute membership association of samples to local clusters\n\n$$P^{(s)}(C_i|x_j)\
    \ = \\frac{\\omega_i^{(s)} g(x_j | \\mu_i^{(s)}, \\Sigma_i^{(s)})}{\\sum_{k=1}^K\
    \ \\omega_k^{(s)} g(x_j | \\mu_k^{(s)}, \\Sigma_k^{(s)})}$$ eq. 5\n\n$P^{(s)}(C_i|x_j)$\
    \ denotes the posterior probability that the $j^{th}$ sample comes from the $i^{th}$\
    \ Gaussian component."
  mdcn: "## 通过肘部法则确定聚类数量\n\nk-means 方法的一个缺点是需要预先指定聚类数量，而对于大型过程数据集，这个数量通常是未知的。然而，我们可以使用肘部法则来解决这个问题。对于\
    \ k-means，该方法需要计算不同聚类数量（$K$）下的聚类惯性或 SSE。可以预期，随着 $K$ 的增加，SSE 会减小，因为数据点会更接近其被分配的质心。当增加\
    \ $K$ 只带来 SSE 的微小改善时，对应的 $K$ 值可被视为最优值。图 11.8 显示，对于金属蚀刻数据集，$K = 3$ 是一个不错的选择。\n\n\
    ```python\n# determining number of clusters via elbow method\nSSEs = []\nfor n_cluster\
    \ in range(1, 10):\n    kmeans = KMeans(n_clusters = n_cluster, random_state =\
    \ 100).fit(score_train)\n    SSEs.append(kmeans.inertia_)\n\nplt.figure()\nplt.plot(range(1,10),\
    \ SSEs, marker='o')\nplt.xlabel('Number of clusters')\nplt.ylabel('SSEs')\n```\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_201_0.png)\n\n图 11.8：金属蚀刻数据集在不同聚类数量下的聚类惯性\n\
    \n> 确定聚类数量或局部模型数量不应掉以轻心。我们在图 11.1 中看到，低于最优数量的聚类会导致软测量精度低和漏报频率高。另一方面，使用过多的聚类会增加估计参数的数量，从而增加收敛时间。过多的聚类还会导致过拟合，造成误报频率高和软测量精度低。\n\
    \n## 用于量化聚类质量的轮廓分析\n\n对于高维数据，可能无法总是将大部分数据变异性投影到 2 或 3 个主成分上，因此难以通过 2D 或 3D 图来判断聚类的好坏或可视化聚类。在这些情况下，可以使用轮廓图来可视化和量化聚类质量。请注意，轮廓分析并非\
    \ k-means 特有，可以应用于研究任何聚类结果。\n\n数据点的轮廓系数或值范围从 -1 到 1，它衡量的是该数据点与相邻簇中数据点的距离，相比于与同一簇中数据点的距离。值为\
    \ 1 表示该数据点远离相邻簇，接近 0 的值表示该数据点靠近两个簇之间的边界。负值表示错误的簇分配。\n\n图 11.9 显示了图 11.7 所示聚类的轮廓图。每个彩色带是通过堆叠该簇中所有数据点的轮廓系数形成的，因此带的厚度表示簇的大小。整体轮廓分数就是所有数据点轮廓系数的平均值。正如预期，平均分数很高，并且簇\
    \ 2 显示出最高的系数，因为它远离其他两个簇。\n\n```python\n# average silhouette score\nfrom sklearn.metrics\
    \ import silhouette_samples, silhouette_score\n\nsilhouette_avgValue = silhouette_score(score_train,\
    \ cluster_label)\nprint('Average silhouette score is :', silhouette_avgValue)\n\
    \n>>> Average silhouette score is : 0.7444602567351603\n\n# silhouette plot\n\
    from matplotlib import cm\n\nplt.figure()\nsilhouette_values = silhouette_samples(score_train,\
    \ cluster_label)\ny_lower, y_upper = 0, 0\nyticks = []\nfor i in range(n_cluster):\n\
    \    cluster_silhouette_vals = silhouette_values[cluster_label == i]\n    cluster_silhouette_vals.sort()\n\
    \n    y_upper += len(cluster_silhouette_vals)\n    color = cm.nipy_spectral(i\
    \ / n_cluster)\n    plt.barh(range(y_lower, y_upper),cluster_silhouette_vals,height=1.0,edgecolor='none',color=color)\n\
    \    yticks.append((y_lower + y_upper) / 2)\n    y_lower += len(cluster_silhouette_vals)\n\
    \nplt.axvline(silhouette_avgValue, color = \"red\", linestyle = \"--\")\nplt.yticks(yticks,\
    \ np.arange(n_cluster) + 1)\nplt.xlabel('Silhouette coefficient values'), plt.ylabel('Cluster')\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_203_0.png)\n\n图 11.9：通过 k-means\
    \ 确定的 3 个簇的金属蚀刻数据轮廓图。红色虚线表示平均轮廓值。\n\n作为比较，让我们看看图 11.10 中一个次优聚类的轮廓图。较低的逐样本系数和较低的整体分数清楚地表明聚类效果更差。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_203_1.png)\n\n图 11.10：一个次优聚类示例的轮廓图\n\
    \n## 优缺点\n\n如前所述，易于应用和概念简单是 k-means 算法的优点。然而，该算法的一个严重缺点是无法处理复杂的几何形状，如图 11.11 所示。我们将要学习的下一个聚类算法能够处理此类簇。\n\
    \n```python\n# generate ellipsoidal shaped data\nfrom sklearn.datasets import\
    \ make_blobs\n\nn_samples = 1500\nX, y = make_blobs(n_samples=n_samples, random_state=100)\n\
    \nrotation_matrix = [[0.60, -0.70], [-0.5, 0.7]]\nX_transformed = np.dot(X, rotation_matrix)\
    \ # elongated blobs\n\nplt.figure()\nplt.scatter(X_transformed [:,0], X_transformed\
    \ [:,1])\n\n# fit k-means model\nn_cluster = 3\nkmeans = KMeans(n_clusters = n_cluster,\
    \ random_state = 100).fit(X_transformed)\ncluster_label = kmeans.predict(X_transformed)\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_204_0.png)\n\n确定聚类后，我们可以继续为每个簇构建单独的模型，然后使用质心最近的簇来监控传入的测试样本。然而，让我们快速转向下一个聚类算法，该算法天然适合为故障检测创建融合决策指标。\n\
    \n## 11.4 高斯混合模型：简介\n\n高斯混合模型（GMM）是一种聚类技术，其工作假设是：即使整体过程数据不遵循（单峰）高斯分布，仍然可以通过局部高斯分布来表征每个单独操作模式/簇的数据。一旦指定了聚类数量，GMM\
    \ 会自动找到局部簇的质心和协方差。如图 11.12 所示，它对于多模态数据分布非常有效。\n\n```python\n# fit GMM model to\
    \ ellipsoidal data\nfrom sklearn.mixture import GaussianMixture\n\ngmm = GaussianMixture(n_components\
    \ = 3, random_state = 100)\ncluster_label = gmm.fit_predict(X_transformed)\n\n\
    plt.figure()\nplt.scatter(X_transformed[:, 0], X_transformed[:, 1], c = cluster_label,\
    \ s=20, cmap='viridis')\n\ncluster_centers = gmm.means_ # cluster centers\ncluster_plot_labels\
    \ = ['Cluster ' + str(i+1) for i in range(gmm.n_components)]\nfor i in range(gmm.n_components):\n\
    \    plt.scatter(cluster_centers[i, 0], cluster_centers[i, 1], c='red', marker\
    \ = '*')\n    plt.annotate(cluster_plot_labels[i], (cluster_centers[i,0], cluster_centers[i,1]))\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_205_0.png)\n\nGMM 的另一个巨大优势是，我们可以计算数据点属于任何簇的（后验）概率。这种簇隶属度度量由\

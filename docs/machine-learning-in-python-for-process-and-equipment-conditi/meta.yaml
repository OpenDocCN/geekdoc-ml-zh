    \ an ML model for your system.\n\n## 3.3 Gaussianity Assessment Techniques\n\n\
    We saw in Section 1 that wrong assumptions about Gaussianity of process data can\
    \ lead to incorrect determination of NOC envelope. For multivariate Gaussianity\
    \ assessment, an easy to implement method proposed by Zhang et al. will be presented\
    \ here. The method uses the fact that if data is multivariate Gaussian distributed\
    \ then the squared Mahalanobis distance (D) of samples from the center follow\
    \ an F distribution¹⁷ as shown below¹⁸.\n\n$D(x) = (x - \\bar{u})^T S_{cov}^{-1}\
    \ (x - \\bar{u}) \\sim \\frac{n(N^2-1)}{N(N-m)} F(m, N-m)$\n\n$x \\in \\mathbb{R}^m$\n\
    \n$\\bar{u}$ and $S_{cov}$ are sample mean and covariance\n\n![](img/cfcc9569b5e92ea115855752abddd75a_59_0.png)\n\
    \n¹⁷ $F(m, N-m)$ imply an F distribution with $m$ and $N-m$ degrees of freedom\n\
    ¹⁸ Note that if $S$ is singular then $m$ is replaced by rank of $S$ and $S^{-1}$\
    \ by pseudo-inverse of $S$ in Eq. (4)\n\n## Why Gaussianity is accorded so much\
    \ importance\n\nIllustration below shows the Gaussian distributions in 1D and\
    \ 2D measurement space. Most of us are familiar with such histograms/distribution.\
    \ But what is so special about these Gaussian distributed data?\n\n![](img/cfcc9569b5e92ea115855752abddd75a_60_0.png)\n\
    \nAs shown in the expressions above, Gaussian signals are completely characterized\
    \ by only two parameters, mean ($\\mu$) and covariance ($\\sigma^2/\\Sigma$),\
    \ and therefore, are easy to describe and work with. Fortunately, most industrial\
    \ processes operate around some optimal state and exhibit natural-cause Gaussian\
    \ variations under the influence of random process disturbances. Therefore, many\
    \ traditional MSPM and SPC techniques assume Gaussianity and correspondingly,\
    \ many results established in their literature are valid strictly for Gaussian\
    \ processes.\n\nOnce the Mahalanobis distances are available, the empirical cumulative\
    \ distribution function (CDF) is compared against the CDF of the expected $F$\
    \ distribution. The algorithm below summarizes the approach.\n\n## Algorithm:\
    \ Multivariate Gaussianity test based on Mahalanobis distances\n\n- Generate fractile-fractile\
    \ plot of statistic $D$'s empirical distribution and expected $F$ distribution\n\
    \  - Values of D are sorted such that $D_t: D_{(1)} \\leq D_{(2)} \\leq \\cdots\
    \ \\leq D_{(N)}$\n  - Empirical CDF of $D_t$ can be described as $CDF(D_{(t)})\
    \ \\approx \\frac{t-0.5}{N} = r_t \\quad (t = 1, 2, \\cdots, N)$\n    Here, $D_{(t)}$\
    \ is the fractile corresponding to probability $r_t$\n  - The fractile of expected\
    \ $F$ distribution corresponding to probability $r_t$ is obtained as follows\n\
    \    $F_t \\approx \\frac{m(N^2-1)}{N(N-m)} F_{r_t}(m, N-m)$\n\n![](img/cfcc9569b5e92ea115855752abddd75a_61_0.png)\n\
    \n- Plot $D_{(t)}$ vs $F_t$ for $t = 1, 2, \\cdots, N$ and fit a straight line.\
    \ If data follows multivariate Gaussianity then the fitted line should pass through\
    \ origin with slope equal to 1\n\n- Perform statistical tests:\n  - A significance\
    \ test is performed to check if linear relationship between $D_{(t)}$ vs $F_t$\
    \ is statistically significant. The following condition is imposed\n    $\\frac{S}{\\\
    bar{F}} < 0.15 \\Rightarrow \\text{linear fit is not rejected}$\n    $\\bar{F}\
    \ = \\frac{1}{N} \\sum F_t$\n    $S = \\sqrt{\\frac{SSE}{N-2}}$\n  - If the above\
    \ condition is met, then the intercept and slope are compared against 0 and 1,\
    \ respectively, via the following conditions\n    $|intercept| < 0.05 * \\bar{F}$\n\
    \    $|slope - 1| < 0.2$\n\n![](img/cfcc9569b5e92ea115855752abddd75a_61_1.png)\n\
    \n- If all the above three conditions are met, then multivariate Gaussian distribution\
    \ is assumed\n\nThe example below shows the implementation steps¹⁹ of the above\
    \ algorithm.\n\n## Example 3.2: Consider the following three-variable system\n\
    \n$x_3 = x_1 + x_2 + e$\n\n$x_1$ and $x_2 \\in [0,1]$ are sampled uniformly. Let's\
    \ assess the system's non-Gaussianity.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_62_0.png)\n\
    \n```python\n# import required packages\nimport numpy as np, matplotlib.pyplot\
    \ as plt\nimport scipy.spatial, scipy.stats\n```\n\n```python\n# find data statistics\n\
    data = np.vstack((x1,x2,x3)).T # check online code to see how x1, x2, x3 vectors\
    \ are generated\nN, m = data.shape[0], data.shape[1]\nmu, Scov = np.mean(data,\
    \ axis=0), np.cov(data, rowvar=False, ddof=1)\nScov_inv = np.linalg.pinv(Scov)\n\
    ```\n\n```python\n# calculate D statistic and the fractiles\nD = np.array([scipy.spatial.distance.mahalanobis(data[i,:],\
    \ mu, Scov_inv)**2 for i in range(N)])\nDt, rt = np.sort(D), [(t-0.5)/N for t\
    \ in range(1,N+1)]\nFt = (m*(N**2-1)/(N*(N-m)))*np.array([scipy.stats.f.ppf(p,\
    \ m, N-m) for p in rt])\n```\n\n```python\n# fit a straight line\nlinearFit =\
    \ scipy.stats.linregress(Dt, Ft)\nintercept, slope = linearFit[1], linearFit[0]\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_62_1.png)\n\n```python\n# perform\
    \ significance tests\nFbar = np.mean(Ft)\nSfit = np.sqrt(((Ft-(intercept+slope*Dt))**2).sum()/(N-2))\n\
    Sfit_by_Fbar = Sfit/Fbar\nif Sfit_by_Fbar > 0.15:\n    gaussianity = False\nelse:\n\
    \    if np.abs(slope-1) < 0.2 and np.abs(intercept) < Fbar*0.05:\n        gaussianity\
    \ = True\n    else:\n        gaussianity = False\n```\n\n> This condition fails\
    \ ⇒ Gaussianity= False\n\n![](img/cfcc9569b5e92ea115855752abddd75a_63_0.png)\n\
    \n## 3.4 Dynamics Assessment Techniques\n\nIn a dynamic dataset, the recorded\
    \ samples are serially correlated, i.e., the current measurements are not independent\
    \ of the past measurements. We saw in Section 1 that models designed to work with\
    \ steady state data can fail to capture the temporal relationships which lead\
    \ to poor fault detection performance. The unmodeled serial correlations show\
    \ up in model residuals as illustrated in Figure 3.4. The presence of serial correlations\
    \ in model residuals is assessed through autocorrelation function (ACF) which\
    \ computes the linear correlation coefficients for the residual time series for\
    \ different lags. If no significant dynamics are present, then the ACF values\
    \ should lie close to 0 for lags > 0. This rationale is used by Sun & Braatz in\
    \ the SPA package to automatically decide the need for a dynamic model.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_63_1.png)\n\
    \nThe previous approach entails creation of a static model to generate residuals.\
    \ An alternative approach followed by Melo et al. in KydLIB package uses ACF over\
    \ the raw measurement itself and not the residuals. The ‘time necessary’ to reach\
    \ an autocorrelation coefficient value of 0.5 was plotted for all the variables\
    \ to assess the dynamic behavior of the dataset. A low mean or median time required\
    \ to achieve 0.5 autocorrelation signifies low level of dynamics in the data.\n\
    \n## Example 3.3: Consider the following 2D system that we saw in Section 1\n\n\
    $x_1(t) = 0.7x_1(t-1) + e_1(t)$\n$x_2(t) = 0.5x_1(t) + e_2(t)$\n\n![](img/cfcc9569b5e92ea115855752abddd75a_64_0.png)\n\
    \n$e_1$ and $e_2$ are Gaussian noise. Let’s assess the system’s dynamics.\n\n\
    ```python\n# import required packages\nimport numpy as np, matplotlib.pyplot as\
    \ plt\n\n# check for dynamics via ACF plot\nfrom statsmodels.graphics.tsaplots\
    \ import plot_acf\nconf_int = 2/np.sqrt(len(x1)) # check online code to see how\
    \ x1 and x2 vectors are generated\n\nplot_acf(x1, lags= 20, alpha=None)\nplt.gca().axhspan(-conf_int,\
    \ conf_int) # shaded confidence interval\nplt.xlabel('lag')\n\nplot_acf(x2, lags=\
    \ 20, alpha=None)\nplt.gca().axhspan(-conf_int, conf_int) # shaded confidence\
    \ interval\nplt.xlabel('lag')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_64_1.png)\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_65_0.png)\n\n## 3.5 Multimode/Multi-clustered\
    \ Distribution Assessment Techniques\n\nThe most common approach for determining\
    \ the presence of multimodality in data is to divide the dataset into distinct\
    \ clusters and look for the optimal number of clusters. Techniques such as k-means\

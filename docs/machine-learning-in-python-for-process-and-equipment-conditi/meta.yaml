  md: 'While Figure 19.4 is self-explanatory, a few aspects are worth mentioning.


    # Dimensional vs dimensionless features


    Statistical parameters are commonly used for fault prognosis in rotating machinery.
    However, as we alluded in Chapter 17, dimensional parameters like RMS depend on
    operating condition such as machine rotating speed and therefore are not suitable
    for use as a HI. Dimensionless parameters such as skewness, kurtosis, crest factor,
    and impulse factor are more suitable.


    # Feature selection


    Another aspect is the selection of features for creating fusion-based HI or intermediate
    model. A common practice is to include only those features that show clear monotonic
    trend as health condition deteriorates.


    ![](img/cfcc9569b5e92ea115855752abddd75a_338_0.png)


    Monotonicity is usually computed as the Spearman correlation between the feature
    values and time which indicates whether the feature continuously increases (or
    decreases) with time or not. Monotonicity ranges from 1- to 1 where a large absolute
    value is favorable for prognosis.


    # Feature smoothing


    Extracted features are almost always noisy as shown in the illustration below.
    Noise can impact the accuracy of RUL estimation and monotonicity valve (and therefore
    feature selection result). Therefore, a common practice is to smooth out the noise
    in features. Smoothing is commonly conducted via (causal) moving averaging, wherein,
    the smoothed value at any time is given by the average of the recent past data.'
  merge: -1
  pgno: 338
- img_proc: true
  md: '![](img/cfcc9569b5e92ea115855752abddd75a_339_0.png)


    ![](img/cfcc9569b5e92ea115855752abddd75a_339_1.png)


    # Spearman Correlation


    Spearman correlation between two variables $x$ and $y$ is simply the Pearson correlation
    between the rank of the variables and is often used to quantify nonlinear relationship
    between a pair of variables.


    $$\rho_{spearman} = cov(r_x, r_y) / \sigma_{r_x} \sigma_{r_y}$$


    $$\sigma_{r_x} = \text{rank of variable } x; \quad \sigma_{r_y} = \text{rank of
    variable } y$$


    ![](img/cfcc9569b5e92ea115855752abddd75a_339_2.png)


    The plots above make it apparent that $\rho_{spearman}$ can capture the monotonic
    relationship between two variables very well.


    # Historical run-to-failure data


    The last approach in Figure 9.4 differs from the rest in that it is a supervised
    learning of HI. Here, historical run-to-failure$^{120}$ data is used to create
    a map between machine/process data to HI. For any single run-to-failure data sequence,
    the HI labels are estimated using the heuristics that HI is 1 for healthy machine
    and 0 for a failed machine. HI values are interpolated for intermediate states.
    Illustration below shows the procedure.'
  merge: -1

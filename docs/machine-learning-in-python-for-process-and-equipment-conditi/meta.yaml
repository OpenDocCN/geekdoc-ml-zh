  md: '# 1.2 Plant Health Management (PHM) Workflow


    In the previous section we discussed in some detail the fault detection aspect
    of plant health management. However, it is only a part of the journey towards
    reliable plant operation. Figure 1.5 shows the different milestones of the journey.
    As shown, fault detection is followed by fault isolation or fault diagnosis wherein
    the objective is to identify the process variables that have been affected by
    the fault or determine the underlying cause of the fault, respectively. For example,
    for the valve malfunction problem illustrated in Figure 1.3, fault isolation pinpoints
    the flow from the separator to the stripper as the faulty variable and fault diagnosis
    pinpoints the valve stiction as the root cause of faulty behavior.


    > FDI vs FDD


    In the process monitoring literature, you will find the acronyms FDI and FDD very
    often. FDI stands for fault detection and isolation, and FDD stands for fault
    detection and diagnosis. As alluded to before, although fault diagnosis is different
    from fault isolation, it is often used (incorrectly) to refer to the task of finding
    variables showing abnormal behavior.


    Other terms that you may encounter are fault identification and fault classification.
    While fault identification is same as fault isolation, fault classification refers
    to categorizing/classifying a fault into one of several pre-defined fault types.


    Following FDI/FDD, lies the task of fault prognosis which entails forecasting
    the progression of the identified fault. Fault prognosis helps to determine the
    amount of time left before the equipment affected by the fault needs to be taken
    out of service for maintenance or the whole plant needs to be shutdown for fault
    repair. For equipment-level monitoring, fault prognosis provides what is popularly
    known as remaining useful life (RUL). For example, for the compressor bearing
    damage problem illustrated in Figure 1.3, the vibrations will only be slightly
    higher than normal during the initial stages of crack development. However, with
    time the crack grows leading to greater and greater vibrations, and ultimately
    the compressor fails or becomes too dangerous to operate. A good fault prognostic
    model can accurately estimate the time left until the failure point of compressor
    is reached.


    The advancement in fault prognosis algorithms have popularized the concept of
    predictive maintenance, wherein the plant management can plan well-in-advance
    the maintenance'
  merge: -1

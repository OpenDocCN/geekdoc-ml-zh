    \ = X_aug - np.mean(X_aug, axis=0) # center data\ndpca = PCA().fit(X_aug_centered)\
    \ # fit PCA model\nprint('DPCA singular values:', dpca.singular_values_) # get\
    \ singular values\n```\n\n>>> DPCA singular values: [6.664e+01 3.731e+01 3.094e+01\
    \ 1.1661e-14]\n\n正如预期，只有一个奇异值非常接近零。我们现在需要做的就是获取与该奇异值对应的奇异向量，并检查它是否代表了我们的动态系统。\n\
    \n```python\n# get 4th singular vector\nprint('4th singular vector: ', dpca.components_[3,:])\n\
    \n>>> 4th singular vector: [ 4.923e-01 -6.154e-01  6.154e-01  1.7348e-17]\n\n\
    第4个奇异向量代表以下关系\n$$0.4923x_1(k-1) - 0.6154 x_1(k) + 0.6154x_2(k) = 0$$\n$$\\Rightarrow\
    \ x_1(k) = 0.8x_1(k-1) + x_2(k-1)$$\n\n瞧！DPCA 成功地提取了潜在的过程动态。而另一方面，PCA 并未揭示变量之间的任何关系。\n\
    ```\n\n## 时间滞后 ($l$) 的确定\n\n时间滞后 ($l$) 由过程的动态阶数决定。不幸的是，动态阶数通常是未知的。Ku 等人$^{57}$\
    \ 在 1995 年首次提出了一种确定时间滞后的算法。另一种常用的策略由 Rato 和 Reis$^{58}$ 给出，现复述如下。\n\n## 算法：DPCA\
    \ 的时间滞后确定\n\n1.  初始化 $l = 0$ 并指定某个最大滞后值 $l_{max}$\n2.  生成增广数据矩阵 $X_{aug}$\n3.\
    \  对 $X_{aug}$ 的协方差矩阵 ($\\Sigma_{X_{aug}}$) 进行奇异值分解。令 $s_{ml+1}$ 为 $\\Sigma_{X_{aug}}$\
    \ 的第 ($ml + 1$)$^{th}$ 个奇异值。定义 $KSV(l) = s_{ml+1}$。\n4.  对于 $l > 0$，定义 $KSVR(l)\
    \ = KSV(l) / KSV(l-1)$\n5.  如果 $l < l_{max}$，则设置 $l = l + 1$ 并转到步骤 2，否则转到步骤 6\n\
    6.  归一化 KSV 和 KSVR\n    $$KSV_{normal}(l) = \\frac{KSV(l) - \\min(KSV)}{\\max(KSV)\
    \ - \\min(KSV)}$$\n    $$KSVR_{normal}(l) = \\frac{KSVR(l) - \\min(KSVR)}{\\max(KSVR)\
    \ - \\min(KSVR)}$$\n7.  找到 $l^*$ 作为第一个满足 $KSVR(l) < KSVR(l-1)$ 的 $l$\n8.  确定最优\
    \ $l_{opt} \\in [1, l_{max}}]$ 为\n    $$l_{opt} = argmin \\sqrt{KSV_{normal}(l)^2\
    \ KSVR_{normal}(l)^2} , \\quad s.t. \\ l \\geq l^*$$\n\n$^{57}$ Ku 等人，通过动态主成分分析进行扰动检测与隔离。*化学计量学与智能实验室系统*，1995年。\n\
    $^{58}$ Rato 和 Reis，定义 DPCA 模型的结构及其对过程监控和预测活动的影响。*化学计量学与智能实验室系统*，2013年\n\n## 9.2\
    \ 基于 DPCA 的故障检测：数值示例\n\n为了说明基于 DPCA 的故障检测的每个步骤，我们将使用一个简单的合成 2 输入、2 输出过程<sup>59</sup>，如下所示\n\
    \n$$z(k) = \\begin{bmatrix} 0.118 & -0.191 \\\\ 0.847 & 0.264 \\end{bmatrix} z(k-1)\
    \ + \\begin{bmatrix} 1 & 2 \\\\ 3 & -4 \\end{bmatrix} u(k-1)$$\n$$u(k) = \\begin{bmatrix}\
    \ 0.811 & -0.226 \\\\ 0.477 & 0.415 \\end{bmatrix} u(k-1) + \\begin{bmatrix} 0.193\
    \ & 0.689 \\\\ -0.320 & -0.749 \\end{bmatrix} w(k-1)$$\n$$y(k) = z(k) + v(k)$$\n\
    \n这里，输出 ($y(k)$) 和输入 ($u(k)$) 的测量值可用于分析。$w(k)$ 和 $v(k)$ 是零均值随机噪声信号，方差分别为 1 和 0.1。该过程的模拟数据可在文件\
    \ *multivariate_NOC_data.txt* 和 *multivariate_test_data.txt* 中找到。在测试数据中，在样本 50\
    \ 处引入了 $w_2$ 的单位阶跃变化扰动，以模拟故障条件。\n\n我们现在将逐步介绍构建基于 DPCA 的故障检测解决方案的每个步骤。让我们从读取数据集、生成增广数据矩阵开始，然后训练\
    \ DPCA 模型。\n\n```python\n# fetch data\nX_NOC = np.loadtxt('multivariate_NOC_data.txt')\n\
    X_test = np.loadtxt('multivariate_test_data.txt')\n\n#%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\
    #           DPCA model training\n#%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%\n# augment\
    \ and scale data\nX_NOC_aug = augment(X_NOC, 1)\nscaler = StandardScaler()\nX_NOC_aug_scaled\
    \ = scaler.fit_transform(X_NOC_aug)\n\n# fit PCA model on augmented data\ndpca\
    \ = PCA().fit(X_NOC_aug_scaled)\n\n# find n_component\nexplained_variance = 100*dpca.explained_variance_ratio_\
    \ # in percentage\ncum_explained_variance = np.cumsum(explained_variance) # cumulative\
    \ % variance explained\nn_comp = np.argmax(cum_explained_variance >= 95) + 1\n\
    \n# refit with n_comp\ndpca = PCA(n_components=n_comp)\ndpca.fit(X_NOC_aug_scaled)\n\
    \n# compute scores and error for training data\nscores_NOC = dpca.transform(X_NOC_aug_scaled)\n\
    X_NOC_aug_scaled_reconstruct = dpca.inverse_transform(scores_NOC)\nerror_NOC =\
    \ X_NOC_aug_scaled - X_NOC_aug_scaled_reconstruct\n\n# calculate Q for training\
    \ data\nQ_NOC = np.sum(error_NOC*error_NOC, axis = 1)\n\n# calculate T2 for training\
    \ data\nN = X_NOC_aug_scaled.shape[0]\nlambda_k = np.diag(dpca.explained_variance_)\
    \ # eigenvalue = explained variance\nlambda_k_inv = np.linalg.inv(lambda_k)\n\n\
    T2_NOC = np.zeros((N,))\nfor i in range(N):\n    T2_NOC[i] = np.dot(np.dot(scores_NOC[i,:],\
    \ lambda_k_inv), scores_NOC[i,:].T)\n\n# control limits\nQ_CL = np.percentile(Q_NOC,\
    \ 99)\nT2_CL = np.percentile(T2_NOC, 99)\n```\n\n现在让我们将 DPCA 模型部署到测试数据上，看看监控统计量是否违反控制限。\n\
    \n```python\n# augment and scale test data\nX_test_aug = augment(X_test, 1)\n\
    X_aug_test_scaled = scaler.transform(X_test_aug)\n\n# compute scores and error\
    \ for test data\nscores_test = dpca.transform(X_aug_test_scaled)\nX_aug_test_scaled_reconstruct\
    \ = dpca.inverse_transform(scores_test)\nerror_test = X_aug_test_scaled - X_aug_test_scaled_reconstruct\n\
    \n# calculate Q and T2 for test data\nQ_test = np.sum(error_test*error_test, axis\
    \ = 1)\nN_test = X_aug_test_scaled.shape[0]\nT2_test = np.zeros((N_test,))\nfor\
    \ i in range(N_test):\n    T2_test[i] = np.dot(np.dot(scores_test[i,:], lambda_k_inv),\
    \ scores_test[i,:].T)\n\n# monitoring charts for test data\nplt.figure(), plt.plot(Q_test),\
    \ plt.plot([1,len(Q_test)],[Q_CL,Q_CL], color='red')\nplt.xlabel('Sample #'),\
    \ plt.ylabel('Q for test data')\n\nplt.figure(), plt.plot(T2_test), plt.plot([1,len(T2_test)],[T2_CL,T2_CL],\
    \ color='red')\nplt.xlabel('Sample #'), plt.ylabel('T$^2$ for test data')\n```\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_162_0.png)\n\n你可以看到，基于 DPC 的故障检测过程与基于\
    \ PCA 的故障检测过程相同，只是增加了数据的增广。通常，当数据中存在时间相关性时，DPCA 的性能优于 PCA。\n\n## 用于故障诊断的贡献图\n\n\
    增广矩阵中每个变量的 $T^2$ 和 $Q$ 贡献的计算方式与 PCA 相同。原始变量的总体贡献是通过将该变量及其每个 $l$ 个时间滞后变量的贡献相加得到的。\n\
    \n## 9.3 动态 PLS：简介\n\n动态 PLS 是传统 PLS 的动态扩展。如图 9.2 所示，DPLS 需要使用滞后测量值作为额外的预测变量。如图所示，生成\
    \ DPLS 模型有两种方式：仅包含输入变量的滞后值，或同时包含输入和输出变量的滞后值。虽然第一种方法导致 FIR 类型的模型，但后一种方法导致 ARX 类型的模型。与\
    \ DPCA 类似，一旦增广矩阵准备就绪，就进行缩放并应用传统 PLS。所有用于计算得分矩阵、残差矩阵、监控指标等的数学表达式与第 7 章中传统 PLS 所见的相同。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_163_0.png)\n\n有两个超参数需要指定：时间滞后$^{60}$\
    \ 和保留的潜变量数量。这两个超参数通常通过交叉验证来确定。我们已经看到了如何修改传统的 FDI 工作流程以处理 DPCA 中的增广数据矩阵，因此，我们将跳过展示基于\
    \ DPLS 的 FDI 的实现代码。相反，我们将继续研究一种略有不同的技术（状态空间建模）来构建动态模型。\n\n$^{60}$ 时间滞后通常对所有输入（以及如果构建\
    \ ARX 类型模型则包括输出）变量选择相同的值"

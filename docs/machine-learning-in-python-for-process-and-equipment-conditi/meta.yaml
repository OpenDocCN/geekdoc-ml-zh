  md: '# 15.1 ANN: An Introduction


    Artificial neural networks (ANNs) are nonlinear empirical models which can capture
    complex relationships between input-output variables via supervised learning or
    recognize data patterns via unsupervised learning. Architecturally, ANNs were
    inspired by human brain and are a complex network of interconnected neurons as
    shown in Figure 15.1. An ANN consists of an input layer, a series of hidden layers,
    and an output layer. The basic unit of the network, neuron, accepts a vector of
    inputs from the source input layer or the previous layer of the network, takes
    a weighted sum of the inputs, and then performs a nonlinear transformation to
    produce a single real-valued output. Each hidden layer can contain any number
    of neurons.


    ![](img/cfcc9569b5e92ea115855752abddd75a_269_0.png)


    The network shown in Figure 15.1 is an example of a fully-connected feed-forward
    neural network (FFNN), the most common type of ANN. In FFNN, signals flow in only
    one direction, from the input layer to the output layer via hidden layers. Neurons
    between consecutive layers are connected fully pairwise and neurons within a layer
    are not connected.


    > **What is deep learning**


    In a nutshell, using an ANN with a large number of hidden layers to find relationship/pattern
    in data is deep learning (technically, ≥ 2 hidden layers implies a deep neural
    network (DNN)). Several recent algorithmic innovations have overcome the model
    training issues for DNNs which have resulted in the DNN-led AI revolution we are
    witnessing today.'
  merge: -1
  pgno: 269

- md: '## 6.3 Fault Detection via Discord Discovery


    The question posed in Figure 6.2c can be solved by finding a subsequence which
    is at a large distance from any other subsequence in a given time series. For
    this case-study, we will use the steam flow time series provided in the original
    steam generator dataset. Let''s start with loading the data.


    ```python

    # import requisite libraries

    import stumpy, numpy as np, matplotlib.pyplot as plt


    # fetch data

    data = np.loadtxt(''steamgen.dat'')

    steamFlow = data[:,8]

    plt.figure(), plt.plot(steamFlow)

    plt.ylabel(''Steam flow''), plt.xlabel(''Sample #'')

    ```


    ```python

    # use stumpy library

    sequenceLength = 600 # 30 mins

    matrix_profile = stumpy.stump(steamFlow, sequenceLength)

    ```


    The ''stump'' function does the following: for every subsequence (of length sequenceLength)
    within the steamFlow time series, it automatically identifies its corresponding
    nearest-neighbor subsequence of the same length³³. The first column of matrix_profile
    array contains the distance values and the nearest neighbor subsequence''s indices
    are in the 2nd and 3rd columns. Let''s see how the distances vary.


    ```python

    # plot matrix profile distances

    fig, axs = plt.subplots(2, sharex=True, gridspec_kw={''hspace'': 0})

    plt.suptitle(''Discord (Anomaly/Novelty) Discovery'')

    axs[0].plot(steamFlow), axs[0].set_ylabel(''Steam Flow'')

    axs[1].plot(matrix_profile[:, 0], ''*'', color=''black'')

    axs[1].set_xlabel(''Sample #''), axs[1].set_ylabel(''Distance'')

    ```


    To find the most unusual subsequence which can be a potential anomaly, we just
    need to find the subsequence position in the steamFlow time series that has the
    largest value from its nearest neighbor subsequence.


    > ³³ Check out the nice visualization at https://stumpy.readthedocs.io/en/latest/index.html.


    ```python

    # find discord

    discord_position = np.argsort(matrix_profile[:, 0])[-1]

    print(''The discord is located at position: '', discord_position)



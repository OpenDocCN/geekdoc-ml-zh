  md: '![](img/cfcc9569b5e92ea115855752abddd75a_360_0.png)


    # Machine Learning in Python for Process and Equipment Condition Monitoring, and
    Predictive Maintenance


    This book is designed to help readers quickly gain a working-level knowledge of
    machine learning-based techniques that are widely employed for building equipment
    condition monitoring, plantwide monitoring, and predictive maintenance solutions
    in process industry. The book covers a broad spectrum of techniques ranging from
    univariate control charts to deep-learning-based prediction of remaining useful
    life. Consequently, the readers can leverage the concepts learned to build advanced
    solutions for fault detection, fault diagnosis, and fault prognostics. The application-focused
    approach of the book is reader friendly and easily digestible to the practicing
    and aspiring process engineers, and data scientists. Upon completion, readers
    will be able to confidently navigate the Prognostics and Health Management literature
    and make judicious selection of modeling approaches suitable for their problems.


    The following topics are broadly covered:


    +   - Exploratory analysis of process data

    - Best practices for process monitoring and predictive maintenance solutions

    - Univariate monitoring via control charts and time-series data mining

    - Multivariate statistical process monitoring techniques (PCA, PLS, FDA, etc.)

    - Machine learning and deep learning techniques to handle dynamic, nonlinear,
    and multimodal processes

    - Fault detection and diagnosis of rotating machinery using vibration data

    - Remaining useful life predictions for predictive maintenance'
  merge: -1
  pgno: 360

    \ import Adam\nfrom sklearn.metrics import r2_score\n\ndata = np.loadtxt('debutanizer_data_withFault.txt')\
    \ # drift starts from last 200 sample onwards\n```\n\n<sup>101</sup> Fortuna et.\

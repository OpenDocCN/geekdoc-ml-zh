  md: '# Fault detection indices


    For PLS, three monitoring indices are computed: one $T^2$ statistic from t-scores,
    and two SPE statistics from $X$ and $Y$ residuals.


    # $T^2$ statistic


    Like in PCA, $T^2$ statistic quantifies the systematic variations in predictor
    variables ($X$) that are related to the systematic variations in response ($Y$)
    variables. Large deviation in $T^2$ statistic implies significant changes in process
    operating conditions. Let $t_i$ denote the $i^{th}$ row of $T$. The $T^2$ index
    for this data-point is given by


    $$T^2 = \sum_{j=1}^{k} \frac{t_{i,j}^2}{\sigma_j} = t_i \Lambda_k^{-1} t_i^T$$


    $\Lambda_k$, a diagonal matrix, is the covariance matrix of $T$ with $\sigma_j$
    (variance of $j^{th}$ component scores) as its diagonal elements. $T_{CL}^2$ for
    a false rate of $\alpha$ is obtained by the following expression


    $$T_{CL}^2 = \frac{k(N^2 - 1)}{N(N - k)} F_{k, N-k}(\alpha)$$


    # SPE$_x$ and SPE$_y$ statistics


    The second and third indices, SPE$_x$ and SPE$_y$, represents the residuals or
    the unmodelled part of $X$ and $Y$, respectively. Let $e_i$ and $f_i$ denote the
    $i^{th}$ row of $E$ and $F$, respectively. Then


    $$SPE_x = \sum_{j=1}^{m} e_{i,j}^2$$

    $$SPE_y = \sum_{j=1}^{p} f_{i,j}^2$$


    Note that if output measurements are not available in real-time then SPE$_y$ is
    not calculated. With normality assumption for the residuals and large number of
    training samples, the control limit for SPE statistic is given by the following
    expression


    $$SPE_{CL} = g \chi_{\alpha}^2(h)$$

    $$h = \frac{2\mu^2}{\sigma}, \quad g = \frac{\sigma}{2\mu}$$'

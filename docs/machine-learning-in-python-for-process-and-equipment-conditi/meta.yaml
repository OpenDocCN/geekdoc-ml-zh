    如需申请许可，请通过 MLforPSE@gmail.com 联系作者。


    首次出版：2024年1月


    ## 关于作者


    ![](img/cfcc9569b5e92ea115855752abddd75a_5_0.png)


    **Ankur Kumar** 拥有德克萨斯大学奥斯汀分校过程系统工程博士学位（2016年）和印度理工学院孟买分校化学工程学士学位（2012年）。他目前就职于林德集团卓越中心的先进数字技术与系统组，为林德的氢气和空气分离工厂开发了多个基于机器学习的内部监控和过程控制解决方案。Ankur的工具在林德内外屡获殊荣。他的其中一个工具PlantWatch（一个全厂范围的故障检测与诊断工具）获得了捷克共和国工业联合会颁发的2021年工业4.0奖。Ankur撰写或合著了多篇经同行评审的期刊论文（领域涵盖数据驱动的过程建模与监控），是许多顶级期刊的常任审稿人，并曾在多个国际会议上担任分会场主席。Ankur在2019年至2021年间担任《过程控制杂志》的副编辑，目前担任《工业与工程化学研究》期刊的编辑顾问委员会成员。最近，他入选了《Plant
    Engineering》杂志评选的“40岁以下工程领袖，2023届”。


    ![](img/cfcc9569b5e92ea115855752abddd75a_5_1.png)


    **Jesus Flores-Cerrillo** 目前是林德集团的研发副总监，负责管理林德卓越中心的先进数字技术与系统组。他在监控技术以及先进过程控制与优化解决方案的开发和实施方面拥有超过20年的经验。Jesus拥有麦克马斯特大学化学工程博士学位，并在多元统计和先进过程控制等领域撰写或合著了40多篇经同行评审的期刊论文。他的团队开发并实施了新颖的工厂监控、机器学习和工业物联网解决方案，以提高林德流程的效率和可靠性。Jesus的团队获得了美国制造商协会制造业领导力委员会颁发的2020年人工智能与高级分析领导力奖。


    ## 致读者


    包含完整代码实现的Jupyter笔记本和Spyder脚本可在 [https://github.com/ML-PSE/Machine_Learning_for_PM_and_PdM](https://github.com/ML-PSE/Machine_Learning_for_PM_and_PdM)
    下载。如有必要，代码更新将在GitHub仓库中进行。本书文本材料的更新将在Leanpub ([www.leanpub.com](http://www.leanpub.com))
    和Google Play ([https://play.google.com/store/books](https://play.google.com/store/books))
    上提供。我们非常感谢您提供关于本书中任何更正和/或印刷错误的信息。


    ## 系列简介


    在21世纪，数据科学已成为每个制造业工作文化中不可或缺的一部分，流程工业也不例外。从预测性维护到过程监控，从故障诊断到先进过程控制，基于机器学习的解决方案正被用于实现更高的流程可靠性和效率。然而，能够充分满足新兴流程数据科学家需求的书籍却寥寥无几。现有的少量资源包括：1）通用的数据科学书籍，未能考虑流程工厂的特定特征和需求；2）流程领域特定的书籍，对基础数学细节进行了严谨而冗长的论述，对工业从业者来说过于理论化。可以理解，这留下了很大的改进空间。人们寻求的是以流程系统为背景、强调应用方面、并提供在流程工业中已被证明有用的机器学习技术指导性介绍的书籍。本系列“面向流程工业的机器学习”旨在填补这一空白，降低流程数据科学新手的入门门槛。


    该系列的第一本书《面向流程系统的Python机器学习》涵盖了机器学习的基础知识，并概述了主要适用于静态系统的广泛机器学习方法。使用真实流程数据集，提供了构建用于过程监控、软测量、预测性维护等机器学习解决方案的分步指导。涵盖了与流程系统相关的方面，例如通过PCA/PLS对相关变量建模、处理噪声多维数据集中的异常值、使用强化学习控制流程等。该系列的第二本书《面向动态流程系统的Python机器学习》侧重于动态系统，并沿着广泛的动态建模选择提供了指导性介绍。重点介绍了经典方法（ARX、CVA、ARMAX、OE等）和现代神经网络方法。通过示例说明了在时间序列分析、噪声建模、系统辨识和过程故障检测方面的应用。该系列的第三本书深入探讨了机器学习的一个重要应用领域，即预测与健康管理。详细介绍了广泛应用于工厂健康管理不同方面的机器学习方法，即故障检测、故障隔离、故障诊断和故障预测。重点放在概念理解和实际实施上。该系列的未来书籍将继续关注流程工业的其他方面和需求。希望这些书能帮助流程数据科学家找到创新的机器学习解决方案，以应对流程工业面临的现实世界问题。


    随着机器学习在流程工业中使用趋势的增长，对具备数据科学/机器学习技能的流程领域专家/流程工程师的需求也在增长。编写这些书是为了填补此类流程数据科学家在机器学习资源方面的现有空白。具体而言，本系列的书籍将对新兴的流程数据科学家、希望“学习”机器学习的在职流程工程师以及希望了解流程系统需求和特征的数据科学家有所帮助。通过关注实践指南和工业规模的案例研究，我们希望这些书能促进数据科学在流程工业中的更广泛传播。'

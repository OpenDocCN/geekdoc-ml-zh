    # Part 3


    ## Multivariate Statistical Process Monitoring


    # Chapter 7


    ## Multivariate Statistical Process Monitoring for Linear and Steady-State Processes:
    Part 1


    It is not uncommon to have hundreds of process relevant variables being measured
    at manufacturing facilities. However, conservation laws such as mass balances,
    thermodynamics constraints, enforced product specifications, and other operational
    restrictions induce correlations among the process variables and make it appear
    as if the measured variables are all derived from a small number of hidden (un-measured)
    variables. Several smart techniques have been derived to find these hidden latent
    variables. Latent variable-based techniques allow characterization of ‘normal’
    process noise affecting the process during NOC. Process monitoring methods based
    on latent space monitor the values of latent variables and process noise in real-time
    to infer the presence of process faults. Sounds complicated? Don’t worry! This
    chapter will show you how this is accomplished while retaining focus on conceptual
    understanding and practical implementation.


    PCA and PLS are among the most popular latent variable-based process monitoring
    tools and have been reported in several successful industrial process monitoring
    applications. This chapter provides a comprehensive exposition of the PCA and
    PLS techniques and teaches you how to apply them for fault detection. Furthermore,
    we will learn how to identify the faulty process variable using the popular contribution
    analysis methodology. Specifically, the following topics are covered:


    - Introduction to PCA and PLS

    - Process fault detection via PCA and PLS

    - Fault isolation in PCA- and PLS-based process monitoring applications

    - Process monitoring of polymer manufacturing process via PCA

    - Process monitoring of polyethylene manufacturing process via PLS


    ## 7.1 PCA: An Introduction


    Principal component analysis (PCA), in essence, is a multivariate technique that
    transforms a high-dimensional set of correlated variables into a low-dimensional
    set of uncorrelated (latent) variables with minimum loss of information. Consider
    the 3-dimensional data in Figure 7.1. It is apparent that although the data is
    three dimensional, the data-points mostly lie along a 2-D plane; and even in this
    plane, the spread is much higher along a particular direction. PCA converts the
    original (x,y,z) space into a 2-D principal component (PC) space where the 1st
    PC (PC1) corresponds to the direction of maximum spread/variance in data and the
    2nd PC (PC2) corresponds to the direction with highest variance among all directions
    orthogonal to 1st PC. Depending upon modeling requirements, even the 2nd PC may
    be discarded, essentially obtaining a 1-D data while losing out some information.
    Also, as we will see soon, it is straightforward to recover original data from
    data in PC space.


    In ML world, it is common to find applications of classification and clustering
    techniques in the PC space. In process industry, process modeling (via principal
    component regression (PCR)) and monitoring are common application of PCA³⁴. PCA
    is also frequently utilized for process visualization. For many applications,
    two or three PCs are adequate for capturing most of the variability in process
    data and therefore, the compressed process data can be visualized within a single
    plot. Plant operators and engineers use this single plot to find past and current
    patterns in process data. PCA-based fault detection goes further and compresses
    all the information in the PC space and the process noise into a couple of control
    charts. You will soon learn how to generate and use these control charts.


    > ³⁴ The popularity of latent-variable techniques for process control and monitoring
    arose from the pioneering work by John McGregor at McMaster University.


    ### Mathematical background


    Consider a data matrix $X \in \mathbb{R}^{N \times m}$ consisting of $N$ samples
    of $m$ process variables where each row represents a data-point in the original
    measurement space. It is assumed that each column is normalized to zero mean and
    unit variance. Let $v \in \mathbb{R}^m$ represent the ‘loading’ vector that projects
    data-points along PC1; it can be found by solving the following optimization problem


    $$\max_{v \neq 0} \frac{(Xv)^T Xv}{v^T v} \quad \text{eq. 1}$$


    It is apparent that Eq. 1 is trying to maximize the variance of the projected
    data-points along PC1. Loading vectors for other PCs are found by solving the
    same problem with the added constraint of orthogonality to previously computed
    loading vectors. Alternatively, loading vectors can also be computed from eigenvalue
    decomposition of covariance matrix ($S$) of $X$


    $$\frac{1}{N-1} X^T X = S = V \Lambda V^T \quad \text{eq. 2}$$


    Above is the form you will find commonly in PCA literature. The columns of eigenvector
    matrix $V \in \mathbb{R}^{m \times m}$ are the loading vectors that we need. The
    diagonal eigenvalue matrix $\Lambda$ equals $diag\{\lambda_1, \lambda_2, \dots,
    \lambda_m\}$, where $\lambda_1 \geq \lambda_2 \geq \dots \geq \lambda_m$ are the
    eigenvalues. In fact, $\lambda_j$ is equal to the variance along the $j^{th}$
    PC. If there is significant correlation among process variables in original data,
    only the first few eigenvalues will be significant. Let’s assume that $k$ PCs
    are retained, then the first $k$ columns of $V$ (which corresponds to the first
    $k$ $\lambda_s$) are taken to form the loading matrix $P \in \mathbb{R}^{m \times
    k}$. Transformed data in the PC space can now be obtained


    $$t_j = Xp_j \text{ or } T = XP \quad \text{eq. 3}$$


    The m dimensional $i^{th}$ row of $X$ has been transformed into $k$ ($< m$) dimensional
    $i^{th}$ row of $T$. $T \in \mathbb{R}^{N \times k}$ is called score matrix and
    the $j^{th}$ column of $T$ ($t_j$) contains the (score) values along the $j^{th}$
    PC. The scores can be projected back to the original measurement space as follows


    $$\hat{X} = TP^T \quad \text{eq. 4}$$


    Note that because we discarded the loading vectors corresponding to insignificant
    $\lambda_s$, $\hat{X} \neq X$. The difference $E = X - \hat{X}$ is referred to
    as residual matrix as each row is the residual or error vector for a data-point.
    Overall, the PC space captures the systematic trends in process data and the residual
    space primarily describes the noise in data.'

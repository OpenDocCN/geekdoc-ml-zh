    \ use kmeans.labels_\n\nplt.figure()\nplt.scatter(score_train[:, 0], score_train[:,\
    \ 1], c = cluster_label, s = 20, cmap = 'viridis')\n\ncluster_centers = kmeans.cluster_centers_\n\
    cluster_plot_labels = ['Cluster ' + str(i+1) for i in range(n_cluster)]\nfor i\
    \ in range(n_cluster):\n    plt.scatter(cluster_centers[i,0], cluster_centers[i,1],\
    \ c = 'red', marker = '*')\n    plt.annotate(cluster_plot_labels[i], (cluster_centers[i,0],\
    \ cluster_centers[i,1]))\n```\n\nFigure 11.7: Clustering metal-etch training dataset\
    \ via k-means\n\nAs expected, Figure 11.7 shows that k-means does a good job at\
    \ cluster assignment. K-means clustering results are strongly influenced by initial\
    \ selection of cluster centers; a bad selection can result in improper clustering.\
    \ To overcome this, k-means algorithm allows a parameter, n_init (default value\
    \ is 10), which determines the number of times independent k-means clustering\
    \ is performed with different initial centroids assignment; the clustering with\
    \ the lowest SSE is selected as the final model. The strategy for selection of\
    \ initial centroids can also be changed via init parameter; the default *k-means++*\
    \ option adopts a smarter (compared to the *random* option) way to speed up convergence\
    \ by ensuring that the initial centroids are far away from each-other."

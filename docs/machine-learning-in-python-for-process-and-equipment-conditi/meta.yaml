    \ and multivariateKPLS_test_data.txt, respectively). In test data, a single fault\
    \ of unit magnitude is introduced between samples 75 and 125 in $x_1$. Let’s begin\
    \ by reading the data files.\n\n```python\n# determine thresholds as 99th percentile\
    \ of respective metrics\nimport numpy as np, matplotlib.pyplot as plt\nfrom sklearn.preprocessing\
    \ import StandardScaler\nfrom sklearn.decomposition import KernelPCA\n\n# read\
    \ data\nX_train = np.loadtxt('KPCA_NOC_data.txt')\nX_test = np.loadtxt('KPCA_test_data.txt')\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_183_0.png)\n\nWe will now go through\
    \ each step of generating monitoring chart for the test data. Therefore, let’s\
    \ first understand how the monitoring statistic is computed.\n\n## Monitoring\
    \ statistic\n\nThe primary statistic to monitor is $Q$, which for a sample $x_t$\
    \ is defined as\n\n$$Q = \\|\\bar{\\varphi}(x_t) - \\widehat{\\bar{\\varphi}}_a(x_t)\\\
    |^2$$\n*reconstructed feature vector using $a$ latents*\n\nThe above expression\
    \ can be expressed in terms of the score vector $t_t$ as follows<sup>72</sup>\n\
    \n$$Q = \\sum_{i=1}^{n} t_{ti}^2 - \\sum_{i=1}^{a} t_{ti}^2$$\n* $n$ is the number\
    \ of non-zero eigenvalues in Eq. 4\n\nNote that Tan et al. have shown that the\
    \ KPCA $Q$ metric can help detect fault cases where variables go out of healthy\
    \ operating range as well as cases where test samples do not follow model of the\
    \ training data.\n\n> In KPCA literature, you may encounter usage of Hotelling's\
    \ $T^2$ as a monitoring statistic. However, Tan et al. have shown that Hotelling's\
    \ $T^2$ is non-monotonic w.r.t. the severity of fault, i.e., Hotelling's $T^2$\
    \ may decrease when faults become more severe! For example, if a sample $x_{test}$\
    \ lies far away from the NOC samples, then score value along every principal component\
    \ will be small because the Gaussian kernel function values will be small. Therefore,\
    \ $T^2$ will be small and will only become smaller as $x_{test}$ goes farther\
    \ away from the healthy data.\n\nLet us now implement the KPCA model and generate\
    \ monitoring charts.\n\n```python\n# scale data\nX_scaler = StandardScaler()\n\
    X_train_scaled = X_scaler.fit_transform(X_train)\n\n# fit kpca model\ngamma =\
    \ 1/((5*3)**2) # gamma = 1/σ²\nkpca = KernelPCA(kernel='rbf', gamma=gamma)\n```\n\
    \n```python\nkPCA.fit(X_train_scaled)\n```\n\n```python\n# find number of components\
    \ to retain\neigVals = kPCA.eigenvalues_ # 38 non-zero eigen values have been\
    \ found\neigVals_normalized = eigVals / np.sum(eigVals)\ncum_eigVals = 100*np.cumsum(eigVals_normalized)\n\
    n_comp = np.argmax(cum_eigVals >= 95) + 1\nprint('Number of components cumulatively\
    \ explaining atleast 95% variance: ', n_comp)\n```\n\n```\n>>> Number of components\
    \ cumulatively explaining atleast 95% variance: 2\n```\n\n```python\n# compute\
    \ scores for training data\nscores_train = kPCA.transform(X_train_scaled) # one\
    \ column for each of the 38 columns\n```\n\n```python\n# compute Q statistics\
    \ for training data\nN = X_train.shape[0]\nQ_train = np.zeros((N,1))\nfor i in\
    \ range(N):\n    Q_train[i] = np.dot(scores_train[i,:], scores_train[i,:]) - np.dot(scores_train[i,:n_comp],\n\
    \                                                                  scores_train[i,:n_comp])\n\
    Q_CL = np.percentile(Q_train, 95)\n```\n\n```python\n# monitoring chart for training\
    \ data\nplt.figure(), plt.plot(Q_train), plt.plot([1,len(Q_train)],[Q_CL,Q_CL],\
    \ color='red')\nplt.xlabel('Sample #'), plt.ylabel('Q (training data)')\n```\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_185_0.png)\n\n```python\n#%%%%%%%%%%%%%%%%%%%%%%%%%%%\n\

    > While FDA is a powerful tool for fault diagnosis, it can also be used for fault
    detection by including NOC data as a separate class.


    # 8.4 Fault Classification via FDA: Tennessee Eastman Process Case Study


    After projecting the samples onto the FDA space, any classification technique
    can be chosen to classify or diagnose the specific fault. A popular T² statistic-based
    approach entails computing a T² control limit for each fault class using the training
    data. The T² control limit ($T^2_{CL,j}$) for the $j^{th}$ fault class represents
    a boundary around the projected samples from the $j^{th}$ fault in the lower-dimensional
    space – any given sample lying inside the boundary belongs to the $j^{th}$ fault
    class. Mathematically, this can be specified as


    $T^2_{sample,j} < T^2_{CL,j} \Rightarrow sample \ belongs \ to \ the \ j^{th}
    \ fault \ class$


    $T^2_{sample,j}$ for a sample for the $j^{th}$ class is given by


    $T^2_{sample,j} = (z_{sample} - \tilde{\mu}_j)^T \tilde{S}_j (z_{sample} - \tilde{\mu}_j)$


    where, $\tilde{\mu}_j$ and $\tilde{S}_j$ denote the mean and covariance matrix
    of the projected samples belonging to the $j^{th}$ fault class in training dataset,
    respectively, and $z_{sample}$ denotes the projected sample in the FDA space.
    $T^2_{CL,j}$ can be obtained using the same expression we used in PCA, $k(N_j^2
    - 1)/N_j(N_j - k) F_{k,N-k}(\alpha)$, where $k$ denotes the number of dimensions
    retained in the FDA space. For illustration, let us see how many samples from
    the Fault 5 test data get correctly identified.


    54 Hyun-Woo Cho, Nonlinear feature extraction and classification of multivariate
    process data in kernel feature space, Expert Systems with Applications, 2007'

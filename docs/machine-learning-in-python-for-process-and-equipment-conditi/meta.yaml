    \n## 16.3 自组织映射：简介\n\n自组织映射（SOMs）<sup>105</sup>是一种无监督神经网络，旨在将高维数据集映射到如图16.3所示的2D神经元网格上。映射方式旨在保留数据的拓扑结构，即在原始输入空间中彼此接近的数据样本被映射到SOM网格上相邻的神经元。因此，SOMs对于复杂高维数据集的可视化和聚类非常有用。SOMs之所以得名，是因为确定映射不需要监督/指导；这使得SOM成为一个优秀的探索性数据分析（EDA）工具。此外，与自编码器类似，对输入数据集在数据分布、线性以及变量间独立性等方面没有施加任何限制。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_295_0.png)\n\n数据样本被映射到的神经元称为该样本的BMU（最佳匹配单元）。在训练过程中，多个数据样本可能被分配到同一个BMU。在某种程度上，BMU在模型训练期间将输入空间离散化为若干个局部子区域，位于某个子区域内的样本被映射到同一个BMU。对于测试数据样本，如果该样本与其BMU所代表的子区域之间的距离异常大，则可能发出异常警报。看起来很有趣，对吧？为了理解这究竟是如何实现的，让我们深入探讨SOM训练的数学细节。\n\
    \n<sup>105</sup> SOM也被称为Kohonen映射，以纪念引入SOM的Teuvo Kohonen教授。\n\n## 数学背景\n\nSOM的拟合方式与传统人工神经网络（ANN）的拟合方式不同，即不采用反向传播算法。为了理解模型拟合过程，首先考虑拟合的最终结果。假设拟合数据集包含$N$个样本，每个样本是一个$n$维向量。模型拟合后，每个SOM节点（或神经元）被分配一个$n$维参考向量（或权重向量），例如第$j$个节点的向量为$m_j\
    \ \\in \\mathbb{R}^n$，如下图所示。在某种程度上，第$j$个节点代表了输入空间中向量$m_j$周围的局部区域。一旦生成了参考向量，就可以很容易地找到样本的BMU。为了了解这是如何完成的，让我们逐步了解SOM模型拟合的每个步骤。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_296_0.png)\n\n-   > **归一化输入数据集并初始化参考向量**\n\
    \    >\n    > 假设SOM网格中有$J$个神经元。每个参考向量$m_j \\forall j \\in [1,J]$被随机分配，或者从数据集中随机选择一个向量进行分配。迭代索引设置为$t\
    \ = 1$。\n    >\n    > **采样并分配BMU**\n    >\n    > 从拟合数据集中随机选择一个样本$x_i$。其参考向量与$x_i$具有最小（欧几里得<sup>106</sup>）距离的神经元被定义为$x_i$的BMU，即：\n\
    \    >\n    > $$b_i = \\arg \\min_j \\|x_i(t) - m_j(t)\\| \\quad \\forall j \\\
    in [1,J]$$\n    >\n    > $x_i$的BMU\n\n<sup>106</sup> 也可以使用其他距离度量\n\n## 更新参考向量\n\
    \n使用以下公式更新$m_j$ $\\forall j$\n\n$$m_j(t+1) = m_j(t) + \\alpha(t) h_{b_i j} \\\
    |x_i(t) - m_j(t)\\| \\quad \\forall j \\in [1, J]$$\n\n项$h_{b_i j}$是以BMU $b_i$为中心的邻域函数，确保只有BMU\
    \ $b_i$及其在SOM网格上的相邻神经元向样本$x_i$移动。其定义如下\n\n$$h_{b_i j} = \\exp\\left(-\\frac{\\\
    |r_{b_i} - r_j\\|^2}{2\\sigma^2(t)}\\right) \\quad \\forall j \\in [1, J]$$\n\n\
    $\\alpha(t)$是学习率，控制权重向量更新的速率。\n\n$\\alpha(t)$和$\\sigma(t)$初始值较大，并随迭代单调递减。\n\n\
    增加迭代次数（$t \\rightarrow t+1$），如果训练未收敛且$t$未达到最大值，则返回步骤2。\n\n## 评估SOM拟合\n\n最终的映射质量在很大程度上取决于权重向量的初始化、网格大小、学习率等。不幸的是，对于高维数据集，很难确切判断SOM是否生成了良好的映射。通常使用一种称为量化误差的度量，对于样本$x_i$，其定义为\n\
    \n$$E_{Q,i} = \\|x_i - m_{b_i}\\|$$\n\n$E_{Q,i}$高 $\\Rightarrow x_i$与其映射的BMU $b_i$差异较大\n\
    \n所有拟合样本的平均量化误差可以提供拟合优度的度量，但如下图所示，它可能会产生误导。\n\n![](img/cfcc9569b5e92ea115855752abddd75a_298_0.png)\n\
    \n-   - 神经元数量与拟合样本数量相同\n- $m_{b_i} = x_i$，即$x_i$的BMU的参考向量就是$x_i$本身\n- 这里的量化误差为0，但显然拓扑结构没有被保留。\n\
    \n因此，使用不同的度量来判断拟合映射的质量。下面描述几个常用的度量。\n\n## 量化误差\n\n如前所述，拟合样本的总体量化误差（$E_Q$）由下式给出\n\
    \n$$E_Q = \\frac{\\sum_i \\|x_i - m_{b_i}\\|^2}{N}$$\n\n尽管$E_Q$不能很好地衡量拓扑保持性，但它可以指示映射对数据的拟合程度。$E_Q$也可用于推断过拟合和欠拟合。增加更多神经元会导致更低的$E_Q$，因此非常低的$E_Q$可能意味着模型过拟合。$E_Q$值高可能表明神经元数量不足或网络学习未收敛。\n\
    \n## 拓扑误差\n\n该度量衡量数据原始形状在SOM网格上的保持程度。它通过简单地计算第一和第二BMU在SOM网格上不是相邻神经元的样本来计算。\n\n\
    $$E_T = \\frac{1}{N} \\sum_{i=1}^N u(x_i)$$\n\n$$u(x_i) = \\begin{cases} 1, &\
    \ \\text{如果 } 1^{st} \\text{ 和 } 2^{nd} \\text{ BMU 不相邻} \\\\ 0, & \\text{否则}\
    \ \\end{cases}$$"

    ```\n\n## 向量化操作\n\n![](img/cfcc9569b5e92ea115855752abddd75a_47_0.png)\n\n假设你需要对两个一维数组进行逐元素求和。一种方法是在循环中逐个访问每个索引处的元素并求和。另一种方法是同时对多个索引处的元素求和。后一种方法称为向量化操作，对于大型数据集和复杂操作，它可以显著提升计算速度。\n\

  md: '# 15.2 Process Modeling via FFNN: Combined Cycle Power Plant (CCPP) Case Study


    We will use data from a CCPP to illustrate the ease with which neural network
    models can be built in Python. The dataset⁹⁸ comes from a combined cycle power
    plant composed of gas turbine (GT), steam turbine (ST) and heat recovery steam
    generator as shown in Figure 15.2. Here, energy from fuel combustion generates
    electricity in a gas turbine and residual energy in the hot exhaust/flue gas from
    GT is recovered to produce steam This steam is used to generate further electricity
    in a steam turbine. The combined electric power generated by both GT and ST over
    a period of 6 years (with hourly averages) is provided in the dataset. Hourly
    average values of ambient temperature (AT), ambient pressure (AP), relative humidity
    (RH), and exhaust vacuum (V) are also provided. These variables influence the
    net hourly electrical energy output (also provided in the dataset) of the plant
    operating at full load and will be the target variable in our ANN model.


    ![](img/cfcc9569b5e92ea115855752abddd75a_270_0.png)'
  merge: -1

    from sklearn.svm import SVC

    from sklearn.model_selection import GridSearchCV


    param_grid = {''C'':[0.1, 1, 10, 100, 1000], ''gamma'':[0.01, 0.1, 1, 10, 100]}

    gs = GridSearchCV(SVC(), param_grid, cv=5).fit(X, y) # no scaling as inputs are
    already scaled


    print(''Optimal hyperparameter:'', gs.best_params_)


    >>> Optimal hyperparameter: {''C'': 0.1, ''gamma'': 1}

    ```


    You will notice that Sklearn uses the hyperparameter gamma which is simply $1/\sigma^2$.
    Optimal $C$ and gamma come out to be 0.1 and 1, respectively, with the classifier
    solution shown in Figure 12.6. The figure also shows the boundary regions for
    low and high values of the hyperparameters. As we saw before, large C leads to
    overfitting (boundary impacted by the noise). As far as gamma is concerned, large
    value (or small $\sigma$) also leads to overfitting.'

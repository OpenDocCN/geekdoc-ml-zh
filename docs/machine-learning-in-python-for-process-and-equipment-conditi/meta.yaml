    # 7.6 Fault Isolation via Contribution Analysis for PLS


    Contribution analysis-based fault isolation for PLS model proceed along the similar
    lines as that for PCA. Each monitoring statistic is broken down into contributions
    from individual variables and the variables with highest contributions are flagged
    as potentially faulty variables.


    # SPEX and SPEy contributions


    For SPE statistics, the following decompositions take place.


    $$SPE_x = \sum_{j=1}^{m} e_j^2 = \sum_{j=1}^{m} SPE_{x,j}$$

    $$SPE_y = \sum_{j=1}^{p} f_j^2 = \sum_{j=1}^{p} SPE_{y,j}$$


    # $T^2$ contributions


    To find $T^2$ contributions, the following approach is adopted$^{45}$. Let $x^{sample}
    \in \mathbb{R}^{mX1}$ and $t^{sample} \in \mathbb{R}^{kX1}$ denote the input vector
    and the score vector, respectively, for a candidate sample. Then,


    $$T^2 = (t^{sample})^T \Lambda_k^{-1} t^{sample} = \| \Lambda_k^{-0.5} t^{sample}
    \|^2$$

    $$= \| \Lambda_k^{-0.5} R^T x^{sample} \|^2 = \| \Gamma x^{sample} \|^2$$


    $^{45}$ Choi & Lee, Multiblock PLS-based localized process diagnosis. *Journal
    of Process Control*, 2005.'

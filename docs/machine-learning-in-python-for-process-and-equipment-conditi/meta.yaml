  md: '# 1.1 Process Industry and ML-based Plant Health Management


    Process industry is a parent term used to refer to industries like petrochemical,
    oil & gas, chemical, power, paper, cement, pharmaceutical, etc. These industries
    use processing plants to manufacture intermediate or final consumer products.
    As emphasized in Figure 1.1, the prime concerns of the management of these plants
    include, amongst others, optimal and safe operations, quality control, and high
    reliability through proactive process monitoring and predictive maintenance. All
    these tasks fall under the ambit of process systems engineering (PSE). While ML
    is being slowly incorporated in the PSE tasks (for example, deep learning-based
    process controller¹), ML has had the biggest influence on the tasks related to
    plant health management, viz, fault detection, fault diagnosis, and predictive
    maintenance.


    ![](img/cfcc9569b5e92ea115855752abddd75a_21_0.png)


    Figure 1.2 shows a sample process flowsheet with traditional measurements of flow,
    temperature, pressure, level, composition, power, and vibration. Such complex
    and highly integrated operations, tight product specifications, and the economic
    compulsion to push processes to their limits are making industrial operations
    more prone to failures. Nonetheless, there is an increasing trend to have unmanned
    or lean-staffed plants with less human eyes to monitor the process. This is where
    automated plant health management comes into play to resolve this dichotomy. Process
    models combined with sensor data are used for continuous monitoring of processes
    to detect, isolate, and diagnose faults, and for predicting fault


    > ¹ https://www.aspentech.com/en/products/msc/aspen-dmc3'

  md: "# Example 3.4: Consider the following 2D multi-clustered data distribution\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_66_0.png)\n\nLet's see how we can automatically\
    \ find the number of operation modes/clusters.\n\n```\n# import required packages\n\
    import numpy as np, matplotlib.pyplot as plt\n\n# check for clusters via Gaussian\
    \ Mixture Modeling using Bayesian Information Criterion\nfrom sklearn.mixture\
    \ import GaussianMixture\n\nBICs = []\nlowestBIC = np.inf\nfor n_cluster in range(1,\
    \ 5):\n    gmm = GaussianMixture(n_components = n_cluster, random_state = 100).fit(data)\n\
    \    BIC = gmm.bic(data) # check online code to see how x1 and x2 vectors are\
    \ generated\n    BICs.append(BIC)\n\n    if BIC < lowestBIC:\n        optimal_n_cluster\
    \ = n_cluster\n        lowestBIC = BIC\n\nprint (optimal_n_cluster)\n\n>>> 2\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_66_1.png)"

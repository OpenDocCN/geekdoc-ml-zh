    # Importance of both $T^2$ and Q statistic


    The $T^2$ and Q indices quantify different kinds of variations in data. While
    $T^2$ is a measure of distance from origin in PC space, Q is a measure of the
    portion of data that is not explained by the PCA model. It is possible that an
    abnormal situation violates control limit of one index, but not the other. Therefore,
    it is crucial to monitor both the indices.


    ![](img/cfcc9569b5e92ea115855752abddd75a_119_0.png)


    For example, consider the scenario in Figure 7.7. The two flow measurements are
    expectedly correlated. Normal data-points lie along the 45° line (PC1 direction),
    except, instances ‘a’ and ‘b’ which exhibit different type of abnormalities. For
    sample ‘a’, the correlation between the two flow variables is broken which may
    be the result of a leak in valve. This results in abnormally high $Q_a$ value;
    $T_a^2$ however is not abnormally high because the projected score, $t_a$, is
    similar to those of normal data-points. For sample ‘b’, the correlation remains
    intact resulting in low (zero) $Q_b$ value. The score, $t_b$, however, is abnormally
    far away from the origin resulting in abnormally high $T_b^2$ value.


    # Fault detection on test data


    It’s time now to check whether our $T^2$ and $Q$ charts can help us detect the
    presence of process abnormalities in test data (samples 70 onwards). For this,
    we will compute the monitoring statistics for the test data.


    ```

    # get test data, normalize it


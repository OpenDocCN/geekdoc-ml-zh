  md: '# 12.1 SVMs: An Introduction


    The classical SVM is a supervised linear technique for solving binary classification
    problems. For illustration, consider Figure 12.1a. Here, in a 2D system, the training
    data-points belong to two distinct (positive and negative) classes. The task is
    to find a line/linear boundary that separates these 2 classes. Two sample candidate
    lines are also shown. While these lines clearly do the stated job, something seems
    amiss. Each of them passes very close to some of the training data-points. This
    can cause poor generalization: for example, the shown test observation ''A'' lies
    closer to the positive samples but will get classified as negative class by boundary
    L2. This clearly is undesirable.


    ![](img/cfcc9569b5e92ea115855752abddd75a_216_0.png)


    The optimal separating line/decision boundary, line L3 in Figure 12.1b, lies as
    far away as possible from either class of data. L3, as shown, lies midway of the
    support planes (planes that pass-through training points closest to the separating
    boundary). During model fitting, SVM simply finds this optimal boundary that corresponds
    to the maximum margin (distance between the support planes). In Figure 12.1, any
    other orientation or position of L3 will reduce the margin and will make L3 closer
    to one class than to the other. Large margins make model predictions robust to
    small perturbations in the training samples.


    Points that lie on the support planes are called support vectors<sup>80</sup>
    and completely determine the optimal boundary, and hence the name, support vector
    machines. In Figure 12.1, if support vectors are moved, line L3 may change. However,
    if any non-support vectors are removed, L3 won''t get affected at all. We will
    see later how the sole dependency on the support vectors imparts computational
    advantage to the SVMs.


    > <sup>80</sup> Calling data-points as vectors may seem weird. While this terminology
    is commonly used in general SVM literature, support vectors refer to the vectors
    originating from origin with the data-points on support planes as their tips.'

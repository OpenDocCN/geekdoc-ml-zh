    \n![](img/cfcc9569b5e92ea115855752abddd75a_331_1.png)\n\n混淆矩阵表明 SVM 分类器性能良好。至此，我们结束了对基于振动的旋转设备监测的快速探讨。振动状态监测本身就是一个庞大的研究领域，不可能在本书的单一部分中涵盖如此广阔的领域。尽管如此，我们希望当前和前面的章节已经让您掌握了部署机器学习进行振动状态监测的工作级知识。\n\
    \n### 总结\n\n在本章中，我们重点关注了振动状态监测工作流中的故障检测与诊断阶段。我们探讨了从处理后的振动信号进行推断的经典方法和基于机器学习的方法。最后，我们使用流行的\
    \ CWRU 数据集实现了一个基于 SVM 的电机故障分类器。\n\n## 第 7 部分\n\n## 预测性维护\n\n## 第 19 章\n\n## 故障预测：概念与方法论\n\
    \n所有机器最终都会发生故障，工厂操作员传统上依赖于定期的基于时间的（预防性）维护，以避免因机械故障而导致的高昂停机时间。尽管经济效率低下，但预防性维护长期以来一直是流程工业的默认方法。直到最近，基于状态的维护方法才获得广泛接受，该方法利用机器的实时数据来评估机器健康状况、检测故障并触发（按需）维护。然而，数据挖掘的最新进展使工厂可靠性人员的思维方式发生了另一次重大转变：仅仅检测机器故障已不再足够；准确预测故障进展以实现预测性维护（PdM）已成为新的潮流。预测性维护的吸引力显而易见——它有助于提前规划维护、更好地管理备件库存等。相应地，预测性维护是工业高管为保持竞争力而努力追求的圣杯。\n\
    \n预测性维护本质上涉及故障预测，即在检测到早期故障后，预测机器健康状况随时间的退化情况。根据故障机制的基础知识、历史运行至失效数据等的可用性，采用不同的预测性维护方法。主流的预测性维护方法涉及计算健康指标（HI），该指标总结了机器健康状态，并在早期故障从初期发展到严重程度时显示出清晰的退化趋势。健康指标允许计算剩余使用寿命（RUL），即故障严重程度超过失效阈值、需要将机器停机之前的剩余时间。\n\
    \n已经设计了几种不同的策略来计算健康指标以及随后的剩余使用寿命估计。虽然剩余使用寿命估计策略将在下一章详细介绍，但本章重点介绍用于健康指标计算的数据驱动方法。具体涵盖以下主题：\n\
    \n- 预测性维护的概念和方法论\n- 故障预测：介绍与工作流程\n- 健康指标计算方法\n- 风力涡轮机故障预测案例研究"

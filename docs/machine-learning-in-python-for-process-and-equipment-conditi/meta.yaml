- img_proc: true
  md: 'is an unusually large distance between the sample and the sub-region represented
    by the BMU, then an anomaly alert may be raised. Seems interesting, right? To
    understand how exactly this is achieved, let’s delve into the mathematical details
    of SOM training.


    # Mathematical background


    A SOM is not fitted in the same manner as a traditional ANN fitting, i.e., the
    back-propagation algorithm is not employed. To understand the model fitting procedure,
    first consider the end result of fitting. Let the fitting dataset consists of
    $N$ samples, where each sample is a $n$-dimensional vector. After model fitting,
    each SOM node (or neuron) is assigned a $n$-dimensional reference vector (or weight
    vector), say $m_j \in \mathbb{R}^n$ for the $j^{th}$ node, as shown in the illustration
    below. In a way, the $j^{th}$ node represents the local region around the vector
    $m_j$ in the input space. Once the reference vectors have been generated, a sample’s
    BMU can be found readily. To see how this is done, let’s go through each step
    of SOM model fitting.


    ![](img/cfcc9569b5e92ea115855752abddd75a_296_0.png)


    +   > **Normalize input dataset and initialize reference vectors**

    >

    > Let there be $J$ neurons in the SOM grid. Each reference vector, $m_j \forall
    j \in [1,J]$, is assigned randomly or alternatively, assigned a random vector
    from the dataset. The iteration index is set to $t = 1$.

    >

    > **Sample and assign BMU**

    >

    > A sample $x_i$ is randomly selected from the fitting dataset. The neuron whose
    reference vector has the smallest (Euclidean$^{106}$) distance from $x_i$ is defined
    as $x_i$’s BMU, i.e.,

    >

    > $$b_i = \arg \min_j \|x_i(t) - m_j(t)\| \quad \forall j \in [1,J]$$

    >

    > $x_i$’s BMU


    $^{106}$ Other metrics of distance can also be used'

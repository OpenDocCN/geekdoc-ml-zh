    ANN models for process fault detection; specifically, we worked through an implementation
    of FFNN-based process monitoring solution wherein the residuals between actual
    measurements and model predictions are used to ascertain the presence of process
    faults. In the following chapter, we will see how process monitoring solutions
    can be built using unsupervised neural network models.'

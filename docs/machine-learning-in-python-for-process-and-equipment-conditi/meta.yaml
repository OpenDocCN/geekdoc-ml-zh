    # 3.4 Dynamics Assessment Techniques


    In a dynamic dataset, the recorded samples are serially correlated, i.e., the
    current measurements are not independent of the past measurements. We saw in Section
    1 that models designed to work with steady state data can fail to capture the
    temporal relationships which lead to poor fault detection performance. The unmodeled
    serial correlations show up in model residuals as illustrated in Figure 3.4. The
    presence of serial correlations in model residuals is assessed through autocorrelation
    function (ACF) which computes the linear correlation coefficients for the residual
    time series for different lags. If no significant dynamics are present, then the
    ACF values should lie close to 0 for lags > 0. This rationale is used by Sun &
    Braatz in the SPA package to automatically decide the need for a dynamic model.


    ![](img/cfcc9569b5e92ea115855752abddd75a_63_1.png)'
  merge: -1
  pgno: 63
- img_proc: true
  md: 'The previous approach entails creation of a static model to generate residuals.
    An alternative approach followed by Melo et al. in KydLIB package uses ACF over
    the raw measurement itself and not the residuals. The ‘time necessary’ to reach
    an autocorrelation coefficient value of 0.5 was plotted for all the variables
    to assess the dynamic behavior of the dataset. A low mean or median time required
    to achieve 0.5 autocorrelation signifies low level of dynamics in the data.


    # Example 3.3: Consider the following 2D system that we saw in Section 1


    $x_1(t) = 0.7x_1(t-1) + e_1(t)$

    $x_2(t) = 0.5x_1(t) + e_2(t)$



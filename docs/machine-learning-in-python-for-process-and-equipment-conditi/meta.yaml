    # 15.3 RNN: An Introduction


    Recurrent neural networks (RNNs) are ANNs for dealing with sequential data, where
    the order of occurrence of data holds significance. In the FFNN-based NARX model
    that we studied in the previous section, there is no provision for implicit or
    explicit specification of temporal/sequential nature of data, i.e., $x(k-2)$ comes
    before $x(k-1)$ for example. There is no efficient mechanism to specify this temporal
    order of data in a FFNN. RNNs accomplish this by processing elements of a sequence
    recurrently and storing a hidden state that summarizes the past information during
    the processing. The basic unit in a RNN is called a RNN cell which simply contains
    a layer of neurons. Figure 15.5 shows the architecture of a RNN consisting of
    a single cell and how it processes a data sequence with ten samples.


    ![](img/cfcc9569b5e92ea115855752abddd75a_275_0.png)


    We can see that the ten samples are processed in the same order of their occurrence
    and not at once. An output, $y_{(i)}$, is generated at the $i^{th}$ step and then
    fed to the next step for processing along with $x_{(i+1)}$. By way of this arrangement,
    $y_{(i+1)}$ is a function of $x_{(i+1)}$ and $y_{(i)}$. Since, $y_{(i)}$ itself
    is a function of $x_{(i)}$ and $y_{(i-1)}$, $y_{(i+1)}$ effectively becomes a
    function of $x_{(i+1)}$, $x_{(i)}$, and $y_{(i-1)}$. Continuing the logic further
    implies that the final sequence output, $y_{(10)}$, is a function of all ten inputs
    of the sequence, that is, $x_{(10)}$, $x_{(9)}$,..., $x_{(1)}$. This ‘recurrent’
    mechanism leads to efficient capturing of temporal patterns in data.'
- md: "## RNN outputs\n\nIf the neural layer in the RNN cell in Figure 15.5 contains\
    \ $n$ neurons ($n$ equals 4 in the shown figure), then each $y_{(i)}$ or $h_{(i)}$\
    \ is a $n$-dimensional vector. For simple RNN cells, $y_{(i)}$ equals $h_{(i)}$.\
    \ Let $x$ be a $m$-dimensional vector. At any $i^{th}$ step, we can write the\
    \ following relationship\n\n$$y_{(i)} = g(W_x x_{(i)} + W_y y_{(i-1)} + b)$$\n\
    \nwhere $W_x \\in R^{n \\times m}$ with each row containing the weight parameters\
    \ of a neuron as applied to $x$ vector, $W_y \\in R^{n \\times n}$ with each row\
    \ containing the weight parameters of a neuron as applied to $y$ vector, $b \\\
    in R^n$ contains the bias parameters, and $g$ denotes the activation function.\
    \ The same neural parameters are used at each step.\n\nIf all the outputs of the\
    \ sequence are of interest, then it is called sequence-to-sequence or many-to-many\
    \ network. However, very often only the last step output is needed, leading to\
    \ sequence-to-vector or many-to-one network. Moreover, the last step output may\
    \ need to be further processed and so a FC layer is often added. Figure 15.6 shows\
    \ one such topology.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_276_0.png)\n\n\
    ## LSTM networks\n\nRNNs are powerful dynamic models, however, the vanilla RNN\
    \ (with a single neural layer in a cell) introduced before faces difficulty learning\
    \ long-term dependencies, i.e., when number of steps in a sequence is large (~\
    \ $\\geq$ 10). This happens due to the vanishing gradient problem during gradient\
    \ backpropagation. To overcome this issue, LSTM (Long Short-Term Memory) cells\
    \ have been devised which are able to learn very long-term dependencies (even\
    \ greater than 1000) with ease. Unlike vanilla RNN cells, LSTM cells have 4 separate\
    \ neural layers as shown in Figure 15.7. Moreover, in a LSTM cell, the internal\
    \ state is stored in two separate vectors, $h_{(t)}$ or hidden state and $c_{(t)}$\
    \ or cell state. Both these states are passed from one LSTM cell to the next during\
    \ sequence processing. $h_{(t)}$ can be thought of as the short-term state/memory\
    \ and $c_{(t)}$ as the long-term state/memory and hence the name LSTM.\n\nThe\
    \ vector outputs of the FC layers interact with each-other and the long-term state\
    \ via three ‘gates’ where element-wise multiplications occur. These gates control\
    \ what information go into the long-term and short-term states at any sequence\
    \ processing step. A quick description of each gate’s purpose is the following:\n\
    \n- **Forget gate:** determines what parts of long-term state, $c_{(t)}$, are\
    \ retained and erased\n- **Input gate:** determines what parts of new information\
    \ (obtained from processing of $x_{(t)}$ and $h_{(t-1)}$) are stored in long-term\
    \ state\n- **Output gate:** determines what parts of long-term state are passed\
    \ on as short-term state\n\n![](img/cfcc9569b5e92ea115855752abddd75a_277_0.png)\n\
    \nFigure 15.7: Architecture of a LSTM cell. Three FC layers use sigmoid activation\
    \ functions and one FC layer uses $tanh$ activation function. Each of these neural\
    \ layers have its own parameters $W_x$, $W_h$, and $b$\n\nThis flexibility in\
    \ being able to manipulate what information are passed down the chain during sequence\
    \ processing is what makes LSTM networks so successful at capturing long-term\
    \ patterns in sequential datasets. Consequently, LSTM network is the default RNN\
    \ architecture employed now-a-days. In Chapter 20, we will employ an LSTM model\
    \ to predict remaining useful life of gas turbines. Let’s next learn how to use\
    \ supervised ANN models for process fault detection.\n\n## Vanilla RNN cell vs\
    \ GRU cell vs LSTM cell\n\nThere is another popular variant of RNN cell, called\
    \ GRU cell. As shown in the illustration below, GRU cell is simpler than LSTM\
    \ cell. GRU cell has 3 neural layers and its internal state is represented using\
    \ a single vector, $h_{(t)}$. For several common tasks, GRU cell-based RNN seems\
    \ to provide similar performance as LSTM cell-based RNN and therefore, it is slowly\
    \ gaining more popularity.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_278_0.png)\n\
    \n## 15.4 ANN-based External Analysis for Fault Detection in a Debutanizer Column\n\
    \nConsider Figure 15.8 below that illustrates the ANN-based external analysis$^{100}$\
    \ strategy for process monitoring. The idea is simple: predict response variables\
    \ using predictor variables via ANN, compute the residuals, and then monitor the\
    \ residuals using classical statistical techniques.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_278_1.png)\n\
    \n> $^{100}$ Yamamoto et al., Applications of statistical process monitoring with\
    \ external analysis to an industrial monomer plant. *IFAC Advanced Control of\
    \ Chemical Processes*, 2003.\n\nLet’s apply this strategy to detect faults in\
    \ a debutanizer column from a petroleum refinery. Debutanizer columns are standard\
    \ units in petroleum refineries and are used to convert raw naphtha feed into\
    \ LPG (as top product) and gasoline (as bottom product). The butane (C4) content\
    \ in gasoline product is desired to be kept low and is monitored regularly via\
    \ gas chromatography. To add another layer of supervision, a model is desired\
    \ that can provide ‘soft’ measurements of the C4 content and therefore, any deviation\
    \ in actual C4 content from the expected value can be used to raise an alert to\
    \ the plant operators. For this purpose, we will build a fault detection model\
    \ using FFNN-based externally analysis. The dataset<sup>101</sup> is provided\
    \ as supplementary material at https://link.springer.com/book/10.1007/978-1-84628-480-9.\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_279_0.png)\n\nFigure 15.9: Debutanizer\
    \ column with location of measured variables\n\nThe base dataset contains 2394\
    \ samples of (normalized) input-output process values. An artificial sensor drift\
    \ is introduced in the last 200 samples to simulate faulty sensor conditions.\
    \ Let’s see if we can detect this fault at the earliest. We start with loading\
    \ the data.\n\n```\n# import required packages and read data\nimport numpy as\
    \ np, pandas as pd\nimport matplotlib.pyplot as plt\nfrom tensorflow.keras import\
    \ Sequential\nfrom tensorflow.keras.layers import Dense\nfrom tensorflow.keras\
    \ import regularizers\nfrom tensorflow.keras.callbacks import EarlyStopping\n\
    from tensorflow.keras.optimizers import Adam\nfrom sklearn.metrics import r2_score\n\
    \ndata = np.loadtxt('debutanizer_data_withFault.txt') # drift starts from last\
    \ 200 sample onwards\n```\n\n<sup>101</sup> Fortuna et. al., Soft sensors for\
    \ monitoring and control of industrial processes, Springer, 2007\n\n![](img/cfcc9569b5e92ea115855752abddd75a_280_0.png)\n\
    \n```\n# separate training and test data\ndata_train = data[:-300,:]\ndata_test\
    \ = data[-300:,:] # last 300 samples used as test data\n\nX_train, y_train = data_train[:,0:-1],\
    \ data_train[:,-1][:,np.newaxis]\nX_test, y_test = data_test[:,0:-1], data_test[:,-1][:,np.newaxis]\n\
    \n# separate estimation and validation data\nX_est, X_val, y_est, y_val = train_test_split(X_train,\
    \ y_train, test_size = 0.2, random_state = 100)\n```\n\nWe are now ready to fit\
    \ our ANN model.\n\n```\n# define, compile, and fit model\nmodel = Sequential()\n\
    model.add(Dense(40, kernel_regularizer=regularizers.L1(0.000001), activation='relu',\n\
    \                kernel_initializer='he_normal', input_shape=(7,)))\nmodel.add(Dense(20,\
    \ kernel_regularizer=regularizers.L1(0.000001), activation='relu',\n         \
    \       kernel_initializer='he_normal'))\nmodel.add(Dense(1, kernel_regularizer=regularizers.L1(0.000001)))\n\
    \nmodel.compile(loss='mse', optimizer=Adam(learning_rate=0.005))\nes = EarlyStopping(monitor='val_loss',\
    \ patience=50)\nhistory = model.fit(X_est, y_est, epochs=2000, batch_size=64,\
    \ validation_data=(X_val, y_val),\n                    callbacks=es)\n```\n\n\
    The plot<sup>102</sup> below shows the evolution of mean squared prediction error\
    \ over the fitting and validation datasets. As can be expected, mse is higher\
    \ for validation data and the flattening of the curves indicate model fitting\

    \nK-Means是最流行的聚类算法之一，因其概念简单、易于实现和计算效率高。设$K$表示簇的数量，$\\{x_i\\}, i = 1, \\dots, N$表示$N$个$m$维点的集合。数据点的簇分配被确定为使以下误差平方和（也称为簇惯性）最小化\n\
    \n$$SSE = \\sum_{k=1}^{K} \\sum_{x_i \\in k^{th}cluster} ||x_i - \\mu_k||_2^2$$\n\
    \n这里，$\\mu_k$是第$k^{th}$个簇的质心，$||x_i - \\mu_k||_2^2$表示$x_i$到$\\mu_k$的欧几里得距离。为了解决公式1，k-means采用以下直观的迭代过程。\n\
    \n- 随机选择K个数据点作为初始质心或簇中心\n- 将每个数据点分配给最近的簇中心\n- 使用数据点的当前簇分配重新计算每个簇的质心\n- 重复步骤2和3直到收敛\n\
    \n让我们将k-means应用于我们的金属蚀刻数据集。\n\n```python\n# fit k-means model\nfrom sklearn.cluster\
    \ import KMeans\n\nn_cluster = 3\nkmeans = KMeans(n_clusters = n_cluster, random_state\
    \ = 100).fit(score_train)\ncluster_label = kmeans.predict(score_train) # can also\
    \ use kmeans.labels_\n\nplt.figure()\nplt.scatter(score_train[:, 0], score_train[:,\
    \ 1], c = cluster_label, s = 20, cmap = 'viridis')\n\ncluster_centers = kmeans.cluster_centers_\n\
    cluster_plot_labels = ['Cluster ' + str(i+1) for i in range(n_cluster)]\nfor i\
    \ in range(n_cluster):\n    plt.scatter(cluster_centers[i,0], cluster_centers[i,1],\
    \ c = 'red', marker = '*')\n    plt.annotate(cluster_plot_labels[i], (cluster_centers[i,0],\
    \ cluster_centers[i,1]))\n```\n\n图11.7：通过k-means对金属蚀刻训练数据集进行聚类\n\n正如预期的那样，图11.7显示k-means在簇分配方面做得很好。K-means聚类结果强烈依赖于簇中心的初始选择；不好的选择可能导致不恰当的聚类。为了克服这一点，k-means算法允许一个参数n_init（默认值为10），该参数决定了使用不同的初始质心分配执行独立k-means聚类的次数；选择具有最低SSE的聚类作为最终模型。初始质心的选择策略也可以通过init参数更改；默认的*k-means++*选项采用一种更智能（与*random*选项相比）的方式来加速收敛，通过确保初始质心彼此远离。"

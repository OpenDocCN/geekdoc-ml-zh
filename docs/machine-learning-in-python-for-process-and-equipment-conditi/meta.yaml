    ## 8.2 基于ICA的故障检测：田纳西伊士曼过程案例研究


    图8.1中的示例表明，如果潜在变量是非高斯分布的，那么ICA可以比PCA更好地提取潜在信号。对于此类系统，可以预期基于ICA的监控将比基于PCA的监控提供更好的性能。与基于PCA/PLS的监控机制类似，监控指标及其相应的阈值是使用正常操作条件（NOC）数据计算的。测试数据的指标值与阈值进行比较以检查是否存在故障。


    ### 故障检测指标


    三个监控指标（$I^2$、$SPE$、$I_e^2$）使用训练数据计算。请注意，由于ICs是独立的，从技术上讲，使用单变量统计过程控制（SPC）技术直接分别监控ICs是合理的方法。然而，同时监控多个ICs可能不方便。


    ### $T^2$ 统计量


    第一个统计量$I^2$定义为独立得分（在降维空间中）的平方和，是系统过程变化的度量（类似于PCA $T^2$统计量）。设$s_i$表示矩阵$S_d$的第$i$列，它代表降维IC空间中的第$i$个样本/数据点。该样本的$I^2$指标计算如下：


    $I^2 = s_i^T s_i$


    你可能想知道为什么我们没有像计算$T^2$指标时那样包含协方差矩阵。这是因为每个IC得分的方差是相同的（记住，$L_2$范数相同），因此包含协方差矩阵是多余的。


    ### SPE 统计量


    第二个指标SPE表示测量数据点与重构数据点在测量空间中的距离。为了计算它，让我们构建一个矩阵$B_d$，其列选自矩阵$B$，其索引对应于我们生成矩阵$W_d$时从$W$中选择的行的索引。设$x_i$和$\hat{x}_i$分别表示第$i$个测量样本和重构样本。那么，


    $\hat{x}_i = Q^{-1} B_d s_i = Q^{-1} B_d W_d x_i$

    $e_i = x_i - \hat{x}_i$

    $SPE = e_i^T e_i$'

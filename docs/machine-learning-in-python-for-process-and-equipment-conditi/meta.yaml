- img_proc: true
  md: '# 17.3 Vibration Signal Processing


    As alluded to in the previous section, analyzing the time-domain waveform manually
    can be very inconvenient and may not provide sufficient leading indicators of
    incipient faults. A more useful representation of vibration data can be obtained
    in frequency domain and time-frequency domain.


    # Frequency domain analysis


    Consider the following time domain and frequency domain vibration data of a machine.


    ![](img/cfcc9569b5e92ea115855752abddd75a_312_0.png)


    For an untrained eye, the waveform does not provide much useful information about
    ‘how’ the machine is vibrating. However, in the frequency domain, one can clearly
    see two distinct frequency components potentially arising from different rotating
    components of the machine. Comparison of peak amplitudes and peak frequencies
    with NOC values can indicate the severity and type of fault, if any exists. This
    extremely useful plot of frequency versus amplitude is called a spectrum and is
    commonly obtained via FFT.


    # Fourier transformation


    Frequency domain analysis entails decomposition of a waveform into a sum of several
    sinusoids of different frequencies. This decomposition is called Fourier transformation.
    To see how it is calculated, let us define a few terms first. Let the sampling
    frequency be $f_s$, the waveform contain $N$ data points, and the frequency resolution,
    $df$, be defined as $\frac{f_s}{N}$.


    ![](img/cfcc9569b5e92ea115855752abddd75a_312_1.png)'
  merge: -1
  pgno: 312
- img_proc: true
  md: "The Fourier transform (FT) is calculated as follows,\n\n$$Y(kdf) = \\frac{2}{N}\
    \ \\sum_{i=0}^{N-1} y(t_i) e^{-j\\frac{2\\pi ik}{N}} \\quad k = 0, 1, 2, ...,\
    \ \\frac{N}{2} - 1$$\n\nFT value at frequency $f_k = kdf$ \n\n$y(t_i) = y(t)$\
    \ at time $t_i = idt$\n\n$Y(f_k)$ is a complex number and the amplitude corresponding\
    \ to $f_k$ that is shown on a spectrum plot is given as the amplitude of $Y(f_k)$,\
    \ i.e., $|Y(f_k)|$. A spectrum can be very easily generated in Python. Let us\
    \ do it for our above waveform.\n\n```\n# simulate signal\nimport numpy as np,\
    \ matplotlib.pyplot as plt\nfs = 1000 # 1000 Hz\ndt = 1.0/fs\nt = np.arange(0,0.5,dt)\
    \ # sampling instants\n\ny1 = np.sin(2*np.pi*50*t ) # 50Hz component\ny2 = 2.5*np.sin(2*np.pi*20*t)\
    \ # 20Hz component\ny = y1+y2 # sampled signal\n\n# generate spectrum\nfrom scipy.fft\
    \ import rfft, rfftfreq\nN = len(t)\nY_spectrum = rfft(y)\nfreq_spectrum = rfftfreq(N,\
    \ dt)\n\nplt.plot(freq_spectrum, 2.0/N *np.abs(Y_spectrum), 'black')\nplt.ylabel('Amplitude\
    \ (g)'), plt.xlabel('frequency (Hz)')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_313_0.png)"
  merge: -1
  pgno: 313
- img_proc: true
  md: '# Sources of error during Fourier transformation


    There are several sources of error during Fourier transformation which can result
    in spurious frequencies showing up in your spectrum plot, amplitudes being incorrect,
    and frequencies incorrectly missing from the spectrum. The errors can arise due
    to noisy measurements, inadequate frequency resolution, etc. Let’s consider a
    well-known error called ‘leakage’. To understand this, assume that a machine is
    vibrating sinusoidally at 1 Hz. A sequence of length 9.4 seconds is taken for
    analysis at $f_s = 20$ Hz.


    ![](img/cfcc9569b5e92ea115855752abddd75a_314_0.png)


    ![](img/cfcc9569b5e92ea115855752abddd75a_314_1.png)


    Instead of a sharp spectral line at 1 Hz, we have obtained a range of dominant
    frequencies. These spurious components result from the non-periodic waveform taken
    for analysis and the resulting smearing of energy in the frequency domain is called
    *leakage*. To prevent leakage, the waveform is multiplied with a window of data
    to force the sampled waveform to be zero at the beginning and the end as shown
    below. We can see that windowing has significantly reduced the smearing of frequencies.
    The window shown in the below illustration is called Hann window and is commonly
    employed for leakage reduction.


    ![](img/cfcc9569b5e92ea115855752abddd75a_314_2.png)


    ![](img/cfcc9569b5e92ea115855752abddd75a_314_3.png)'
  merge: -1
  pgno: 314
- img_proc: true
  md: '# Time-frequency domain analysis


    Consider the two scenarios below.


    ![](img/cfcc9569b5e92ea115855752abddd75a_315_0.png)


    ![](img/cfcc9569b5e92ea115855752abddd75a_315_1.png)


    It is obvious that the two waveforms are different - two frequency components
    are present throughout the time in scenario 1 and in scenario 2, the two components
    are present at different points in time. However, the spectrum for both the scenarios
    are similar (ignoring the little ripples in the 2nd spectrum and the amplitude
    differences of peak frequencies). Understandably, the spectrum for scenario 2
    can lead to wrong inferences. The solution to handle scenario 2 is to analyze
    the waveform in both time and frequency domains together and the most popular
    tool to do this is short-time Fourier transform (STFT) whose procedure is in Figure
    17.3<sup>110</sup>.


    Here, you can see that the waveform is divided into overlapped segments, and Fourier
    transformation is performed, resulting in a 2D matrix, $S_y(f, \tau)$. The STFT
    is visualized using spectrogram and waterfall plots. A waterfall simply plots
    each FT spectrum one after the other giving an impression of a waterfall in a
    3D plot. A spectrogram is a 2D plot on time-frequency axis with amplitude variations
    shown using colors. These diagrams help to see how constituent frequencies change
    within a waveform over time. The code below shows how to obtain time-frequency
    decomposition of our waveform in scenario 2.


    > <sup>110</sup> The figure is adapted from the open-access article by Kim et
    al. title ‘Diagnostics 101: A Tutorial for Fault Diagnostics of Rolling Element
    Bearing Using Envelope Analysis in MATLAB’ and published in *Applied Sciences*
    (2020). The article is distributed under the terms and conditions of the Creative
    Commons Attribution (CC BY) license (http://creativecommons.org/licenses/by/4.0/).'
  merge: -1
  pgno: 315
- img_proc: true
  md: '![](img/cfcc9569b5e92ea115855752abddd75a_316_0.png)


    Figure 17.3: STFT procedure


    ```

    # simulate signal

    import numpy as np, matplotlib.pyplot as plt

    fs = 1000 # 1000 Hz

    dt = 1.0/fs

    t = np.arange(0,1,dt)


    y1 = np.sin(2*np.pi*20*t ) # 20Hz component

    y2 = np.sin(2*np.pi*80*t) # 80Hz component

    y = np.hstack((y1,y2)) # sampled signal

    t = np.hstack((t, t[-1]+t))


    # generate spectrogram

    from scipy import signal

    f, t, Sxx = signal.stft(y, fs)


    plt.pcolormesh(t, f, np.abs(Sxx), shading=''gouraud'')

    plt.colorbar(), plt.ylabel(''Frequency [Hz]''), plt.xlabel(''Time [sec]'')

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_316_1.png)'
  merge: -1

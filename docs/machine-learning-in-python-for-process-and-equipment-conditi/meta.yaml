    \ = 100*np.cumsum(eigVals_normalized)\nn_comp = np.argmax(cum_eigVals >= 95) +\
    \ 1\nprint('累积解释至少 95% 方差的成分数量: ', n_comp)\n```\n\n```\n>>> 累积解释至少 95% 方差的成分数量:\
    \ 2\n```\n\n```python\n# 计算训练数据的得分\nscores_train = kPCA.transform(X_train_scaled)\
    \ # 38 列中的每一列对应一个\n```\n\n```python\n# 计算训练数据的 Q 统计量\nN = X_train.shape[0]\nQ_train\
    \ = np.zeros((N,1))\nfor i in range(N):\n    Q_train[i] = np.dot(scores_train[i,:],\
    \ scores_train[i,:]) - np.dot(scores_train[i,:n_comp],\n                     \

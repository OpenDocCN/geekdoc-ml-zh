  md: '# 20.2 Health Indicator-based RUL Estimation Strategies


    In Figure 20.2, we saw that by the time instance $t_k$, HI already shows a degradation
    trend. For RUL estimation, the trick lies in figuring out how the HI evolves further
    until it reaches the failure threshold. Let’s look at two popular ways of approaching
    this problem.


    # Health degradation modeling


    In the degradation model approach, a HI model is fitted, as shown in the figure
    below, using the available HI data for the equipment under study. As shown, the
    model can take different forms. At time $t_k$, the model is used to predict $t_F$
    when the fitted HI curve breaches the failure threshold; this gives RUL prediction
    at time $t_k$ as $t_F - t_k$. The model training and RUL estimation is redone
    at time $t_{k+1}$, when becomes $h_{k+1}$ available. We will apply this strategy
    to the wind turbine case-study introduced in the previous chapter.


    ![](img/cfcc9569b5e92ea115855752abddd75a_349_0.png)


    The selection of failure threshold is non-trivial. The threshold may be easy to
    specify if HI is based out of a single measurement or feature such as RMS of vibration
    signal or temperature of equipment. However, for a generic case, domain specific
    knowledge or historical failure records would be needed.'
  merge: -1
  pgno: 349

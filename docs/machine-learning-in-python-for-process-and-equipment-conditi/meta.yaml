    \ facilitates quick analysis of data. Check out one quick example below for group-based\
    \ mean aggregation\n\n```python\n# create another dataframe using df\ndf2 = df.copy()\n\
    df2.id = 2 # make all items in column 'id' as 2\ndf2.value *= 4 # multiply all\

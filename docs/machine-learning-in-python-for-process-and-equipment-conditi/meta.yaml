    Since, linear methods can provide satisfactory monitoring performance for linear
    and weakly nonlinear dataset, Zhang et al. suggest a threshold between 0.3 and
    0.5 for making the decision of using nonlinear models.


    > Industrial processes often operate around some optimal condition. Even though
    the actual process may be very complex and nonlinear, the data may exhibit only
    linear relationships among the variables. Therefore, do not jump the gun on choosing
    a nonlinear model; perform the nonlinearity check and then make an educated selection
    of an ML model for your system.


    # 3.3 Gaussianity Assessment Techniques


    We saw in Section 1 that wrong assumptions about Gaussianity of process data can
    lead to incorrect determination of NOC envelope. For multivariate Gaussianity
    assessment, an easy to implement method proposed by Zhang et at. will be presented
    here. The method uses the fact that if data is multivariate Gaussian distributed
    then the squared Mahalanobis distance (D) of samples from the center follow an
    F distribution¹⁷ as shown below¹⁸.


    $D(x) = (x - \bar{u})^T S_{cov}^{-1} (x - \bar{u}) \sim \frac{n(N^2-1)}{N(N-m)}
    F(m, N-m)$


    $x \in \mathbb{R}^m$


    $\bar{u}$ and $S_{cov}$ are sample mean and covariance


    ![](img/cfcc9569b5e92ea115855752abddd75a_59_0.png)


    ¹⁷ $F(m, N-m)$ imply an F distribution with $m$ and $N-m$ degrees of freedom

    ¹⁸ Note that if $S$ is singular then $m$ is replaced by rank of $S$ and $S^{-1}$
    by pseudo-inverse of $S$ in Eq. (4)'
  - '[PAGE 60]


    # Why Gaussianity is accorded so much importance


    Illustration below shows the Gaussian distributions in 1D and 2D measurement space.
    Most of us are familiar with such histograms/distribution. But what is so special
    about these Gaussian distributed data?


    ![](img/cfcc9569b5e92ea115855752abddd75a_60_0.png)


    As shown in the expressions above, Gaussian signals are completely characterized
    by only two parameters, mean ($\mu$) and covariance ($\sigma^2/\Sigma$), and therefore,
    are easy to describe and work with. Fortunately, most industrial processes operate
    around some optimal state and exhibit natural-cause Gaussian variations under
    the influence of random process disturbances. Therefore, many traditional MSPM
    and SPC techniques assume Gaussianity and correspondingly, many results established
    in their literature are valid strictly for Gaussian processes.


    Once the Mahalanobis distances are available, the empirical cumulative distribution
    function (CDF) is compared against the CDF of the expected $F$ distribution. The
    algorithm below summarizes the approach.'
  - "[PAGE 61]\n\n# Algorithm: Multivariate Gaussianity test based on Mahalanobis\
    \ distances\n\n+   Generate fractile-fractile plot of statistic $D$'s empirical\
    \ distribution and expected $F$ distribution\n- Values of D are sorted such that\
    \ $D_t: D_{(1)} \\leq D_{(2)} \\leq \\cdots \\leq D_{(N)}$\n- Empirical CDF of\
    \ $D_t$ can be described as $CDF(D_{(t)}) \\approx \\frac{t-0.5}{N} = r_t \\quad\
    \ (t = 1, 2, \\cdots, N)$\n  Here, $D_{(t)}$ is the fractile corresponding to\
    \ probability $r_t$\n- The fractile of expected $F$ distribution corresponding\
    \ to probability $r_t$ is obtained as follows\n  $F_t \\approx \\frac{m(N^2-1)}{N(N-m)}\
    \ F_{r_t}(m, N-m)$\n\n![](img/cfcc9569b5e92ea115855752abddd75a_61_0.png)\n\n+\
    \   Plot $D_{(t)}$ vs $F_t$ for $t = 1, 2, \\cdots, N$ and fit a straight line.\
    \ If data follows multivariate Gaussianity then the fitted line should pass through\
    \ origin with slope equal to 1\n\n+   Perform statistical tests:\n- A significance\
    \ test is performed to check if linear relationship between $D_{(t)}$ vs $F_t$\
    \ is statistically significant. The following condition is imposed\n  $\\frac{S}{\\\
    bar{F}} < 0.15 \\Rightarrow \\text{linear fit is not rejected}$\n  $\\bar{F} =\
    \ \\frac{1}{N} \\sum F_t$\n  $S = \\sqrt{\\frac{SSE}{N-2}}$\n- If the above condition\
    \ is met, then the intercept and slope are compared against 0 and 1, respectively,\
    \ via the following conditions\n  $|intercept| < 0.05 * \\bar{F}$\n  $|slope -\
    \ 1| < 0.2$\n\n![](img/cfcc9569b5e92ea115855752abddd75a_61_1.png)\n\n+   If all\
    \ the above three conditions are met, then multivariate Gaussian distribution\
    \ is assumed"

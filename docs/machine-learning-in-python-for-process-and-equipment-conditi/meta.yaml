    train_df.drop(train_df.columns[[26, 27]], axis=1, inplace=True) # last two columns\
    \ are blank\ntrain_df.columns  =  ['EngineID',  'cycle',  'OPsetting1',  'OPsetting2',\
    \  'OPsetting3',  's1',  's2',  's3',\n's4', 's5', 's6', 's7', 's8', 's9', 's10',\
    \ 's11', 's12', 's13', 's14', 's15', 's16', 's17', 's18', 's19', 's20', 's21']\n\
    \n# test data\ntest_df = pd.read_csv('PM_test.txt', sep=\" \", header=None)\n\

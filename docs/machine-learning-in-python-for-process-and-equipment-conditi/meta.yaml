    model.add(Dropout(0.2))\nmodel.add(Dense(1))\n\n# compile model\nmodel.compile(loss='mse',\
    \ optimizer='Adam', metrics= r2_custom)\n```\n\nWe can now fit the model. Validation\
    \ curves indicate that we can obtain pretty good predictions on training dataset."

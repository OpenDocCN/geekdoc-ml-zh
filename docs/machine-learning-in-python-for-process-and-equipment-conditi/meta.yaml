- md: '## 12.3 SVDD: An Introduction


    Support vector data description (SVDD) is the unsupervised form of SVM algorithm
    used for dealing with problems where training samples belong to only one class
    and the model objective is to determine if any test/new sample belongs to the
    same class of data or not. Consider the motivating example in Figure 12.7. Here,
    how do we obtain a model of the training data to be able to call sample $A$ an
    outlier/abnormal? Such problems are quite common in process industry. Process
    monitoring and equipment health monitoring are some example areas where most/all
    the available process data may belong to only normal plant operations class and
    the modeling objective is to identify any abnormal data-point.


    Figure 12.7: 2D training dataset with only one class. Boundary in red shows a
    potential description model of the dataset that can be used to distinguish the
    test sample $A$ from training samples.


    ## Gaussian kernels and classification


    A better intuition behind the kernels can help us understand the impact of kernel
    hyperparameters on the classification boundaries. Kernels provide an indirect
    measure of similarity between any two points in the high-dimensional space. Consider
    again the Gaussian kernel


    $$k(x, z) = \exp\left(-\frac{||x - z||^2}{2\sigma^2}\right)$$


    Here, if two points $(x, z)$ are close to each-other in the original space, then
    their similarity (or kernel value) in the mapped space will be higher, compared
    to when $x$ and $z$ are far away from each-other. Now, let''s look at the classifier
    prediction formula for a sample $z$


    $$f(z) = \sum_{i \in \{SV\}} \alpha_i y_i k(x_i, z) + b$$


    Therefore, the classifier is nothing but a sum of Gaussian bumps from the support
    vectors (plus an offset $b$)!


    Given bandwidth $(\sigma)$, during training, SVM tries to find the optimal values
    of the bump multipliers $(\alpha_s)$ such that the training samples get correct
    labels while keeping maximum separation between classification boundary and training
    samples. The boundary is simply the set of points where the net summations of
    bumps and offset become zero. Small values of $\sigma$ lead to very localized
    bumps near any support vector, resulting in higher number of support vectors with
    too much ''wiggles'' in the separating boundary which often indicates overfitting.


    The idea behind SVDD is to envelop training data by a hypersphere (circle in 2D,
    sphere in 3D) containing maximum number of data-points within a smallest volume.
    Any new observation that lies farther than the hypersphere radius from hypersphere
    center can be regarded as abnormal observation. But the data in Figure 12.7 don''t
    look like it can be suitably enveloped with a circle? That is correct and our
    recourse is to use kernel functions to implicitly project original data onto a
    higher dimensional space where data can be adequately enveloped within a compact
    hypersphere. The projection of the optimal hyperplane onto the original space
    will show up as a tight nonlinear boundary around the dataset!


    Just like classical 2-class SVM, only a small set of training samples get to completely
    define the hypersphere. These data-points or support vectors lie on the circumference
    or outside of the hypersphere (or the nonlinear boundary in the original space).


    ## Mathematical background


    Assume again that $\varphi(x)$ represents a data-point in the higher dimensional
    feature space. In this space, the optimal hypersphere is found via the following
    optimization problem


    $$\min_{R,a,\xi} \quad R^2 + C \sum_{i=1}^N \xi_i$$

    $$\text{s.t.} \quad ||\varphi(x_i) - a||^2 \leq R^2 + \xi_i, \quad i = 1, \cdots
    N$$

    $$\xi_i \geq 0$$


    As is evident, the above program is trying to minimize the radius ($R$) of the
    hypersphere centered at ''a'' such that most of the data-points lie within the
    hypersphere. Slack variables, $\xi$, allow certain samples to fall outside and
    the number of such violations is tuned via the hyperparameter $C$. As before,
    the problem is solved in its dual form


    $$\min_{\alpha} \quad \sum_{i=1}^N \sum_{j=1}^N \alpha_i \alpha_j K(x_i, x_j)
    - \sum_{i=1}^N \alpha_i K(x_i, x_i)$$

    $$\text{s.t.} \quad \sum_{i=1}^N \alpha_i = 1$$

    $$0 \leq \alpha_i \leq C \quad i = 1, \cdots N$$


    Like SVM, the alphas indicate the position of training samples w.r.t. the optimal
    boundary. The following relationships hold true


    Inside the boundary: $||\varphi(x_i) - a|| < R \Rightarrow \alpha_i = 0$

    On the boundary: $||\varphi(x_i) - a|| = R \Rightarrow 0 < \alpha_i < C$

    Outside the boundary: $||\varphi(x_t) - a|| > R \Rightarrow \alpha_i = C$


    The optimal solution satisfies the following expression


    $$R = \sqrt{k(x_s, x_s) - 2 \sum_{i \in \{SV\}} \alpha_i k(x_s, x_i) + \sum_{i
    \in \{SV\}} \sum_{j \in \{SV\}} \alpha_i \alpha_j k(x_i, x_j)}$$


    where $x_s$ is any support vector lying on the boundary. Any test observation
    $x_t$ is abnormal if its distance from center $a$ in the mapped space is greater
    than $R$ where the distance is given as follows


    $$Dist(\varphi(x_t), a)^2 = ||\varphi(x_t) - a||^2 = k(x_t, x_t) - 2 \sum_{i \in
    \{SV\}} \alpha_i k(x_t, x_i) + \sum_{i \in \{SV\}} \sum_{j \in \{SV\}} \alpha_i
    \alpha_j k(x_i, x_j)$$


    As you can see, specifications of kernel functions and other model hyperparameters
    is all that is needed; no knowledge of mapping $\varphi$ is required.


    ## OC-SVM vs SVDD


    There is another technique closely related to SVDD, called one class SVM (OC-SVM).
    Infact, OC-SVM is the unsupervised SVM algorithm currently available in Sklearn.
    OC-SVM finds a separating hyperplane that best separates the training data from
    the origin. Its kernelized dual form is given by


    $$\min_{\alpha} \quad \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N \alpha_i \alpha_j
    k(x_i, x_j)$$

    $$\text{s.t.} \quad \sum_{i=1}^N \alpha_i = 1$$

    $$\quad \quad \quad 0 \leq \alpha_i \leq C \quad i = 1, \cdots N$$


    You will notice that for Gaussian kernel, OC-SVM formulation becomes equivalent
    to that of SVDD because $k(x_i, x_i) = 1$ and we end up with the same values of
    the multipliers. The decision boundaries are the same as well. For other kernels
    with $k(x_i, x_i) \neq 1$, results would be different.


    ## Bandwidth parameter & SVDD illustration


    In this sub-section, we will attempt to use Sklearn’s OneClassSVM to build the
    bounding boundary for the dataset in Figure 12.7. However, before we do that,
    we need to specify our strategy for determination of SVDD model hyperparameters,
    $C$ and $\sigma$. If sufficient validation data samples belonging to both ‘normal’
    and ‘abnormal’ classes are available, then cross-validation can be used to choose
    C and $\sigma$ that give the best validation accuracy. However, very often this
    is not possible and like training dataset, validation dataset also only contains
    ‘normal’ class samples! To enable educated hyperparameter selection, let’s take
    another look at them.


    Previously, we saw that $C$ controls the trade-off between volume of hypersphere
    and the number of misclassifications in the training dataset. $C$ can also be
    written as


    $$C = \frac{1}{Nf}$$


    Where $N$ is the number of samples and $f$ is the expected fraction of outliers
    in the training dataset. Smaller value of $f$ (correspondingly larger $C$) will
    lead to less samples being put outside the hypersphere. Infact if $C$ is set to
    1 (or greater) the hypersphere will include all the samples (as $\sum \alpha_i
    = 1$ and $\alpha = C$ outside the hypersphere). Therefore, $C$ can be set with
    some educated presumptions on the outlier fractions. In absence of any advance
    knowledge, $f = 0.01$ is often specified to exclude away 1% of sample lying farthest
    from hypersphere center.


    As far as $\sigma$ is concerned, we previously saw that at low value of $\sigma$,
    data boundary becomes very wiggly with high number of support vectors, resulting
    in overfitting. Conversely, at high value of $\sigma$, boundary tends to become
    spherical in the original space itself resulting in underfitting (or non-compact
    bounding of data). One approach for bandwidth selection is to use empirical methods
    which are based on obtaining a kernel matrix (whose $i,j^{th}$ element is $k(x_i,
    x_j)$) with favorable properties. One such method, modified mean criterion$^{82}$,
    gives bandwidth as follows


    $$\sigma = \sqrt{\frac{\bar{D}^2}{\ln\left(\frac{N-1}{\delta^2}\right)}}$$


    $$\bar{D}^2 = \frac{\sum_{i<j} ||x_i - x_j||^2}{\frac{N(N-1)}{2}}$$


    $$\delta = -0.14818008\emptyset^4 + 0.2846623624\emptyset^3 - 0.252853808\emptyset^2
    + 0.159059498\emptyset - 0.001381145$$


    > $^{82}$ Kalde & Sadek, The mean and median criterion for kernel bandwidth selection
    for support vector data description, IEEE 2017'
  mdcn: '## 12.3 SVDD：简介


    支持向量数据描述（SVDD）是SVM算法的无监督形式，用于处理训练样本仅属于单一类别，且模型目标是判断任何测试/新样本是否属于同一类数据的问题。考虑图12.7中的启发性示例。这里，我们如何获得训练数据的模型，从而能够将样本$A$称为异常值/异常点？此类问题在流程工业中相当常见。过程监控和设备健康监控就是一些示例领域，其中大多数/所有可用的过程数据可能仅属于正常工厂运行类别，而建模目标是识别任何异常数据点。


    图12.7：仅包含单一类别的二维训练数据集。红色边界显示了数据集的潜在描述模型，可用于区分测试样本$A$与训练样本。


    ## 高斯核与分类


    对核函数背后更好的直觉可以帮助我们理解核超参数对分类边界的影响。核函数提供了高维空间中任意两点之间相似性的间接度量。再次考虑高斯核


    $$k(x, z) = \exp\left(-\frac{||x - z||^2}{2\sigma^2}\right)$$


    这里，如果两个点$(x, z)$在原始空间中彼此接近，那么它们在映射空间中的相似性（或核值）将比$x$和$z$相距较远时更高。现在，让我们看看样本$z$的分类器预测公式


    $$f(z) = \sum_{i \in \{SV\}} \alpha_i y_i k(x_i, z) + b$$


    因此，分类器不过是来自支持向量的高斯凸起之和（加上一个偏移量$b$）！


    给定带宽$(\sigma)$，在训练过程中，SVM试图找到凸起乘数$(\alpha_s)$的最优值，使得训练样本获得正确的标签，同时保持分类边界与训练样本之间的最大间隔。边界仅仅是凸起和偏移量的净总和为零的点集。$\sigma$的小值会导致任何支持向量附近出现非常局部化的凸起，导致支持向量数量增多，并且分离边界出现过多“摆动”，这通常表示过拟合。


    SVDD背后的思想是用一个超球体（二维中是圆，三维中是球体）来包围训练数据，该超球体在最小体积内包含最大数量的数据点。任何距离超球体中心超过超球体半径的新观测值都可被视为异常观测。但图12.7中的数据看起来并不适合用一个圆来包围？这是正确的，我们的解决方法是使用核函数将原始数据隐式投影到一个更高维的空间，在那里数据可以被充分包围在一个紧凑的超球体中。最优超平面在原始空间上的投影将显示为围绕数据集的紧密非线性边界！


    就像经典的二类SVM一样，只有一小部分训练样本能够完全定义超球体。这些数据点或支持向量位于超球体的圆周上或外部（或在原始空间中的非线性边界上）。


    ## 数学背景


    再次假设$\varphi(x)$表示高维特征空间中的一个数据点。在这个空间中，通过以下优化问题找到最优超球体


    $$\min_{R,a,\xi} \quad R^2 + C \sum_{i=1}^N \xi_i$$

    $$\text{s.t.} \quad ||\varphi(x_i) - a||^2 \leq R^2 + \xi_i, \quad i = 1, \cdots
    N$$

    $$\xi_i \geq 0$$


    很明显，上述程序试图最小化以''a''为中心的超球体的半径（$R$），使得大多数数据点位于超球体内。松弛变量$\xi$允许某些样本落在外部，而此类违规的数量通过超参数$C$进行调节。与之前一样，问题以其对偶形式求解


    $$\min_{\alpha} \quad \sum_{i=1}^N \sum_{j=1}^N \alpha_i \alpha_j K(x_i, x_j)
    - \sum_{i=1}^N \alpha_i K(x_i, x_i)$$

    $$\text{s.t.} \quad \sum_{i=1}^N \alpha_i = 1$$

    $$0 \leq \alpha_i \leq C \quad i = 1, \cdots N$$


    与SVM类似，alpha值表示训练样本相对于最优边界的位置。以下关系成立


    边界内部：$||\varphi(x_i) - a|| < R \Rightarrow \alpha_i = 0$

    边界上：$||\varphi(x_i) - a|| = R \Rightarrow 0 < \alpha_i < C$

    边界外部：$||\varphi(x_t) - a|| > R \Rightarrow \alpha_i = C$


    最优解满足以下表达式


    $$R = \sqrt{k(x_s, x_s) - 2 \sum_{i \in \{SV\}} \alpha_i k(x_s, x_i) + \sum_{i
    \in \{SV\}} \sum_{j \in \{SV\}} \alpha_i \alpha_j k(x_i, x_j)}$$


    其中$x_s$是位于边界上的任何支持向量。任何测试观测值$x_t$，如果其在映射空间中距离中心$a$的距离大于$R$，则被视为异常，距离计算如下


    $$Dist(\varphi(x_t), a)^2 = ||\varphi(x_t) - a||^2 = k(x_t, x_t) - 2 \sum_{i \in
    \{SV\}} \alpha_i k(x_t, x_i) + \sum_{i \in \{SV\}} \sum_{j \in \{SV\}} \alpha_i
    \alpha_j k(x_i, x_j)$$


    如您所见，只需要指定核函数和其他模型超参数；不需要关于映射$\varphi$的知识。


    ## OC-SVM 与 SVDD


    还有另一种与SVDD密切相关的技术，称为单类SVM（OC-SVM）。事实上，OC-SVM是目前Sklearn中可用的无监督SVM算法。OC-SVM找到一个分离超平面，将训练数据与原点最佳分离。其核化的对偶形式如下


    $$\min_{\alpha} \quad \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N \alpha_i \alpha_j
    k(x_i, x_j)$$

    $$\text{s.t.} \quad \sum_{i=1}^N \alpha_i = 1$$

    $$\quad \quad \quad 0 \leq \alpha_i \leq C \quad i = 1, \cdots N$$


    您会注意到，对于高斯核，OC-SVM公式变得与SVDD等价，因为$k(x_i, x_i) = 1$，并且我们最终得到相同的乘数值。决策边界也是相同的。对于其他满足$k(x_i,
    x_i) \neq 1$的核，结果会有所不同。


    ## 带宽参数与SVDD图示


    在本小节中，我们将尝试使用Sklearn的OneClassSVM为图12.7中的数据集构建边界。然而，在此之前，我们需要确定SVDD模型超参数$C$和$\sigma$的策略。如果有足够的属于“正常”和“异常”类别的验证数据样本可用，则可以使用交叉验证来选择给出最佳验证准确率的C和$\sigma$。然而，这通常是不可能的，并且与训练数据集一样，验证数据集也只包含“正常”类样本！为了能够有根据地选择超参数，让我们再看看它们。


    之前我们看到$C$控制超球体体积与训练数据集中误分类数量之间的权衡。$C$也可以写成


    $$C = \frac{1}{Nf}$$


    其中$N$是样本数量，$f$是训练数据集中预期的异常值比例。较小的$f$值（相应较大的$C$）将导致较少的样本被置于超球体外部。实际上，如果$C$设置为1（或更大），超球体将包含所有样本（因为$\sum
    \alpha_i = 1$且在超球体外部$\alpha = C$）。因此，可以根据对异常值比例的有根据的假设来设置$C$。在没有任何先验知识的情况下，通常指定$f
    = 0.01$以排除距离超球体中心最远的1%样本。


    至于$\sigma$，我们之前看到在$\sigma$值较低时，数据边界变得非常摆动，支持向量数量多，导致过拟合。相反，在$\sigma$值较高时，边界倾向于在原始空间本身变成球形，导致欠拟合（或数据的非紧凑包围）。带宽选择的一种方法是使用基于获得具有有利性质的核矩阵（其$i,j^{th}$元素是$k(x_i,
    x_j)$）的经验方法。其中一种方法，修正均值准则$^{82}$，给出带宽如下


    $$\sigma = \sqrt{\frac{\bar{D}^2}{\ln\left(\frac{N-1}{\delta^2}\right)}}$$


    $$\bar{D}^2 = \frac{\sum_{i<j} ||x_i - x_j||^2}{\frac{N(N-1)}{2}}$$


    $$\delta = -0.14818008\emptyset^4 + 0.2846623624\emptyset^3 - 0.252853808\emptyset^2
    + 0.159059498\emptyset - 0.001381145$$


    > $^{82}$ Kalde & Sadek, The mean and median criterion for kernel bandwidth selection
    for support vector data description, IEEE 2017'

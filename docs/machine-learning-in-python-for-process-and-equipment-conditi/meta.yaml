  md: '# 9.5 Process Monitoring of Tennessee Eastman Process via CVA


    In this section, we will learn the details of CVA-based monitoring tool development
    through step-by-step application for our now familiar TEP process. The CVA monitoring
    procedures provided in this book mirror the description in the work<sup>67</sup>
    **Error! Bookmark not defined.** of Russell et al., and we will therefore attempt
    to replicate the CVA-based fault detection results from their journal paper titled
    ‘*Fault detection in industrial processes using canonical variate analysis and
    dynamic principal component analysis*’. Specifically, we will use the *Fault 5*
    dataset (file *d05_te.dat*) as our test data and normal operation dataset (file
    *d00.dat*) as our training data. We will use the manipulated variables as our
    inputs and the process measurements as our outputs. Our objective is to build
    a monitoring tool that can accurately flag the presence of a process fault with
    low frequency of false alerts. Let’s begin with a quick exploration of the dataset.


    ```

    # import packages

    import matplotlib.pyplot as plt, numpy as np


    \ we define a function that takes an ICA model and data matrix as inputs and returns\
    \ the monitoring metrics. Figure 8.6 shows the monitoring charts along with 99%\
    \ control limits.\n\n```python\n# Define function to compute ICA monitoring metrics\
    \ for training or test samples\ndef compute_ICA_monitoring_metrics(ica_model,\
    \ number_comp, data):\n    \"\"\"\n    data: numpy array of shape = [n_samples,\
    \ n_features]\n\n    Returns\n    -------\n    monitoring_stats: numpy array of\
    \ shape = [n_samples, 3]\n    \"\"\"\n    N = data.shape[0]\n\n    # model parameters\n\
    \    W = ica.components_\n    L2_norm = np.linalg.norm(W, 2, axis=1)\n    sort_order\
    \ = np.flip(np.argsort(L2_norm))\n    W_sorted = W[sort_order,:]\n\n    # compute\
    \ I2\n    Wd = W_sorted[0:number_comp,:]\n    Sd = np.dot(Wd, data.T)\n    I2\
    \ = np.array([np.dot(Sd[:,i], Sd[:,i]) for i in range(N)])\n\n    # compute Ie2\n\
    \    We = W_sorted[n_comp:,:]\n    Se = np.dot(We, data.T)\n    Ie2 = np.array([np.dot(Se[:,i],\
    \ Se[:,i]) for i in range(N)])\n\n    # compute SPE\n    Q = ica.whitening_\n\
    \    Q_inv = np.linalg.inv(Q)\n\n    A = ica.mixing_\n    B = np.dot(Q, A)\n \
    \   B_sorted = B[:,sort_order]\n    Bd = B_sorted[:,0:n_comp]\n\n    data_reconstruct\
    \ = np.dot(np.dot(np.dot(Q_inv, Bd), Wd), data.T)\n    e = data.T - data_reconstruct\n\
    \    SPE = np.array([np.dot(e[:,i], e[:,i]) for i in range(N)])\n\n    monitoring_stats\
    \ = np.column_stack((I2, Ie2, SPE))\n    return monitoring_stats\n```\n\n```python\n\
    # Define a couple of helper functions\ndef draw_monitoring_chart(values, CL, yLabel):\n\
    \    plt.figure(),  plt.plot(values)\n    plt.axhline(CL, color = \"red\", linestyle\
    \ = \"--\"), plt.xlabel('Sample #'), plt.ylabel(yLabel)\n\ndef draw_ICA_monitoring_charts(ICA_statistics,\
    \ CLs, trainORtest):\n    \"\"\" draw monitoring charts for given data\n\n   \
    \ parameters\n    ----------\n    ICA_statistics: numpy array of shape = [n_samples,\
    \ 3]\n    CLs: List of control limits\n    trainORtest: 'training' or 'test'\n\
    \    \"\"\"\n\n    # I2 chart, Ie2 chart, SPE chart\n    draw_monitoring_chart(ICA_statistics[:,0],\
    \ CLs[0], 'I2 for ' + trainORtest + ' data')\n    draw_monitoring_chart(ICA_statistics[:,1],\
    \ CLs[1], 'Ie2 for ' + trainORtest + ' data')\n    draw_monitoring_chart(ICA_statistics[:,2],\
    \ CLs[2], 'SPE for ' + trainORtest + ' data')\n```\n\n```python\n# Draw monitoring\
    \ charts for training data\nICA_statistics_train = compute_ICA_monitoring_metrics(ica,\
    \ n_comp, data_train_normal)\nI2_CL = np.percentile(ICA_statistics_train[:,0],\
    \ 99)\nIe2_CL = np.percentile(ICA_statistics_train[:,1], 99)\nSPE_CL = np.percentile(ICA_statistics_train[:,2],\
    \ 99)\n\ndraw_ICA_monitoring_charts(ICA_statistics_train, [I2_CL, Ie2_CL, SPE_CL],\
    \ 'training')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_146_0.png)\n\n\
    ## Fault detection on test data\n\nLee et al.51 and Yin et al.52 have published\
    \ detailed accounts of fault detection performances of several ML techniques for\
    \ TEP and have shown superior fault detection capability of ICA. We will try to\

    # 19.3 Health Indicator Construction Using Vibration Signals for a Wind Turbine


    As alluded to before in Chapter 17, the wind turbine dataset<sup>121</sup> consists
    of vibration acceleration recorded from a wind turbine for a period of 50 days.
    Six seconds of vibration data was recorded each day A total of 50 files have been
    provided with each file containing data for a day. A fault in bearing leads to
    increasing vibration levels with failure occurring on the 50<sup>th</sup> day.
    Figure 19.6 shows the combined vibration signal for the 50 days. An increasing
    level of vibration is clearly evident. We will use this dataset to demonstrate
    how a HI can be constructed from extracted time domain features that exhibits
    a clear health degradation trend over time<sup>122</sup>.


    ![](img/cfcc9569b5e92ea115855752abddd75a_341_0.png)


    Let’s begin by importing required packages and defining a utility function that
    extracts time domain features from a vibration waveform.



- md: '## Cross-validation with semi-supervised learning


    If you had the luxury of having adequate number of faulty samples in your validation
    dataset, then you could directly use metrics such as *FDR* or *MDR* to assess
    *how well* your model does on validation dataset. However, as would often be the
    case, you will work only with *NOC* samples. In such cases, a common practice
    is to select hyperparameters such that it gives a certain level of *FAR* on validation
    dataset. For example, in Figure 4.2, an *SVDD* was fitted and *FAR* computed on
    validation dataset. The bandwidth value is selected such that it gives an *FAR*
    of 5% (and no lower) during cross-validation. A lower validation *FAR* would indicate
    potential underfit and higher than 5% *FAR* would imply overfit.


    ## Summary


    In this chapter, we covered some basic but crucial aspects of building a fault
    detection model that you should pay careful attention to ensure satisfactory model
    performance. We touched upon the tasks of data selection, data pre-processing,
    model evaluation, and model tuning. Starting from the next chapter, we will start
    the deep-dive into the world of developing process monitoring models.


    # Part 2


    # Univariate Signal Monitoring


    # Chapter 5


    ## Control Charts for Statistical Process Control


    Before machine learning engulfed the process industry, simple plotting of key
    plant variables with statistically chosen upper and lower thresholds used to be
    the norm for detecting process abnormalities. These plots, called control charts,
    formed the major component of statistical process control or statistical quality
    control. Although control charts have lost some of their shine due to the advent
    of advanced multivariate process monitoring tools, they are still widely employed
    by plant management to monitor crucial KPIs, for example, product quality, process
    efficiency, etc. Simple concept, easy interpretation, and quick implementation
    are some of the reasons for their continued popularity.


    Shewhart charts (which includes the popular 3-sigma charts) are the earliest,
    simplest, and most commonly used control charts. These, however, show poor performance
    for detection of faults that cause small deviations. Therefore, alternatives such
    as CUSUM charts and EWMA charts have been devised. In this chapter, we will learn
    these techniques and become familiar with how to implement them in practice. We
    will conclude with some discussion on the ways to overcome the shortcomings of
    univariate control charts. Specifically, the following topics are covered.


    - Introduction to Shewhart control charts

    - Introduction to CUSUM control charts

    - Introduction to EWMA control charts

    - Statistical process control of aeration tank via CUSUM chart

    - Strategies for overcoming limitations of univariate statistical process control


    ## 5.1 Control Charts: Simple and Time-tested Process Monitoring Tools


    Control charts are one of the seven<sup>24</sup> pillars of statistical process
    control that are traditionally used to monitor key production or product quality
    metrics in order to detect unexpected deviations. When the process is ‘in-control’,
    the monitored variables are expected to exhibit only natural cause variations
    around some target or mean values. As shown in Figure 5.1, a control chart is
    simply a display of measurements of a single process variable plotted against
    time or sample number. Additionally, these charts include a centerline or the
    expected mean value, and a couple of limit lines called UCL (upper control limit)
    and LCL (lower control limit). Most industrial process variables show natural
    variations due to random disturbances affecting the process. The control limits
    are statistically designed in such a way that under natural cause variations,
    the monitored variable remains within the control limits with certain desired
    probability. The breach of the control limits indicates potential process fault
    or an ‘out-of-control’ situation. Proper specification of the limits is therefore
    essential to ensure minimal false alarms and rapid detection of faults.


    The traditional control charts take three different forms, viz, Shewhart charts,
    CUSUM charts, and EWMA charts. While a Shewhart chart plots only the current measurements
    on the control chart, the other two plot some combination of current and past
    measurements. You will soon learn how usage of past measurements allow detection
    of incipient or low magnitude faults which may not get detected by Shewhart charts.
    Control charts are not limited to tracking process measurements only; any metric
    that is expected to exhibit only random fluctuations around some mean or target
    can be monitored via control charts. Correspondingly, control charts are also
    employed for monitoring model residuals, latent variables (for example, in PCA),
    etc. Let’s first get started with Shewhart charts.


    ## 5.2 Shewhart Charts: An Introduction


    Shewhart chart is the simplest and widely used control chart wherein the process
    measurement at each sampling instant is plotted against the sample number and
    the control limits are often set at $\mu \pm 3\sigma$, where $\mu$ and $\sigma$
    are the in-control process variable mean and standard deviation. The centerline
    is obviously set at $\mu$. Shewhart charts assume Gaussian distribution and therefore,
    the $3\sigma$ control chart amounts to a false alarm rate of 0.27% as shown in
    Figure 5.2.


    The statistics $\mu$ and $\sigma$ are often not known exactly and are estimated
    from historical in-control data. Let $x_1, x_2, \cdots, x_N$ be the observations
    from historical good operation period, then the sample statistics can be estimated
    as$^{25}$


    $$\hat{\mu} = \bar{x} = \frac{1}{N} \sum_{i=1}^{N} x_i \quad ; \quad \hat{\sigma}
    = \frac{s}{c_4}$$


    where s is sample standard deviation ($\sqrt{\frac{\sum(x_i-\bar{x})^2}{N-1}}$)
    and $c_4$ is a correction factor$^{26}$ (which tends to 1 for large $N$) to account
    for finite samples. This leads to the following control limits


    $$LCL = \bar{x} - 3\frac{s}{c_4} \quad ; \quad UCL = \bar{x} + 3\frac{s}{c_4}$$


    ### Subgroup of measurements at each sample


    The standard Shewhart chart assumes that a subgroup of, say, $m$ measurements)
    is available at each sampling instant as illustrated below.


    It is the mean of the subgroup that is tracked on the standard Shewhart chart.
    Infact, the Shewhart chart with $m=1$ is referred to as an individual Shewhart
    chart. Let $x_{ij}$ denote the $j^{th}$ measurement in the $i^{th}$ subgroup.
    The sample statistics for the subgroup mean can be obtained as follows using historical
    IC (in-control) data.


    For continuous processes, both individual and standard Shewhart charts find utility.
    For example, suppose that plant efficiency measurements are available every minute.
    Plant operators, if desired, can track the minute-level efficiencies using individual
    control chart. Alternatively, efficiency measurements may be averaged over an
    hour ($\Rightarrow m=60$) and the hourly-averaged efficiency values may be tracked.


    While Shewhart charts are easy to interpret and implement, their performance is
    poor when used to detect small deviations ($< 1.5\sigma$ shifts) in process variable
    mean. The following illustration clarifies this aspect.


    - Last 50 samples generated with 0.5σ shift in mean

    - Fault could not get detected by Shewhart chart

    - Even visually, the fault is barely perceptible


    Figure 5.3: Shewhart chart’s failure to detect small mean shifts


    To understand how Shewhart plots can be generated, let us work through the code
    used to generate the plots in Figure 5.3.


    ```python

    # import required packages

    import numpy as np, matplotlib.pyplot as plt


    # generate data

    x0 = np.random.normal(loc=10, scale=2, size=250) # NOC samples

    x1 = np.random.normal(loc=11, scale=2, size=50) # faulty samples

    x = np.hstack((x0,x1)) # combined data

    ```'

    \ the following decompositions take place.\n\n$$SPE_x = \\sum_{j=1}^{m} e_j^2\
    \ = \\sum_{j=1}^{m} SPE_{x,j}$$\n$$SPE_y = \\sum_{j=1}^{p} f_j^2 = \\sum_{j=1}^{p}\
    \ SPE_{y,j}$$\n\n### $T^2$ contributions\n\nTo find $T^2$ contributions, the following\
    \ approach is adopted$^{45}$. Let $x^{sample} \\in \\mathbb{R}^{mX1}$ and $t^{sample}\
    \ \\in \\mathbb{R}^{kX1}$ denote the input vector and the score vector, respectively,\
    \ for a candidate sample. Then,\n\n$$T^2 = (t^{sample})^T \\Lambda_k^{-1} t^{sample}\
    \ = \\| \\Lambda_k^{-0.5} t^{sample} \\|^2$$\n$$= \\| \\Lambda_k^{-0.5} R^T x^{sample}\
    \ \\|^2 = \\| \\Gamma x^{sample} \\|^2$$\n\n$^{45}$ Choi & Lee, Multiblock PLS-based\
    \ localized process diagnosis. *Journal of Process Control*, 2005.\n\n$$\\Rightarrow\
    \ T^2 = \\left\\| \\sum_{j=1}^{m} \\Gamma(:, j) x^{sample}(j) \\right\\|^2$$\n\
    \nwhere, $\\Gamma = \\Lambda_k^{-0.5} R^T$, $\\Gamma(:, j)$ is the $j^{th}$ column\
    \ of $\\Gamma$, and $x^{sample}(j)$ is the value of the $j^{th}$ input variable\

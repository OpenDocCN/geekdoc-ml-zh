    Figure 20.6: Predicted vs observed engine RULs for test aircraft engine dataset


    This completes our brief coverage of predictive maintenance methodologies. You
    now have all the modern tools in your arsenal to tackle plant health management
    problems in your data production plants. We bid adieu to you and wish you all
    the best in your process data science career.


    # Summary


    In this chapter, we built upon the fault prognosis foundations laid in the previous
    chapter. We looked at techniques for RUL prediction using health indicator trajectory
    and direct regression. We consolidated our conceptual understanding through a
    couple of case studies on RUL predictions for wind turbine and gas turbine.'

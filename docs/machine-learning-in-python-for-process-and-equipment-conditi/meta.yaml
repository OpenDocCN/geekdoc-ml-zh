    \ the quality of map. The hexagonal grid is very commonly employed and a generic\
    \ guidance is to use $5\\sqrt{N}$ neurons in the grid.\n\n## 16.4 Visualization\
    \ of Semiconductor Dataset via SOM\n\nTo see SOM in action, let’s apply it to\
    \ our semiconductor metal-etch dataset. We will again work with the first three\
    \ PC scores of the original unfolded data as done in Chapters 11 and 14 for better\
    \ visualization of SOM’s input dataset. Let’s see if SOM can indicate presence\
    \ of 3 clusters. We will employ *MiniSom*<sup>107</sup> package for building our\
    \ SOM model.\n\n```python\n# fit SOM model\nfrom minisom import MiniSom\n\nN =\
    \ score_train.shape[0]\nN_neurons = 5*np.sqrt(N)\n\nsom = MiniSom(np.floor(np.sqrt(N_neurons)).astype(int),\
    \ np.floor(np.sqrt(N_neurons)).astype(int),\n              score_train.shape[1],\
    \ sigma=1.5, learning_rate=.7, activation_distance='euclidean',\n            \
    \  topology='hexagonal', neighborhood_function='gaussian', random_seed=10)\nsom.train(score_train,\
    \ num_iteration=10000, verbose=True)\n```\n\nThe plots of the evolution of quantization\
    \ and topographic errors during training are shown below. It is apparent that\
    \ both the errors show sharp decrease in the first few iterations. Overall 10000\
    \ seem to be a good value for the number of iterations.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_299_0.png)\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_299_1.png)\n\n<sup>107</sup> https://github.com/JustGlowing/minisom\n\
    \nThe most common approach to visualize a SOM and look for clusters is to generate\
    \ a U-matrix<sup>108</sup> (unified distance matrix) as shown below for our fitted\
    \ SOM model. Here, each neuron is colored based on the average distance between\
    \ the weight vectors of the neuron and its neighbors. A lighter color imply that\
    \ the neuron and its neighbors are mapped to the same region of the input space.\
    \ From the shown U-matrix, three clusters are clearly evident.\n\n```python\n\
    # plot U-matrix\nplt.figure(figsize=(9, 9))\nplt.pcolor(som.distance_map().T,\
    \ cmap='bone_r') # plotting the distance map as background\nplt.colorbar()\n```\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_300_0.png)\n\n## SOM for supervised\
    \ learning\n\nIf training dataset contains fault samples from different classes\
    \ of faults (including fault-free samples), then one can use class representation\
    \ map to see where different classes lie on the SOM grid. An example is shown\
    \ below. Here, the color of a neuron is based on the most frequently occurring\
    \ class of the samples mapped to the neuron. Such a map also allows SOM model\
    \ to be used for fault diagnosis wherein the fault status of a test sample can\
    \ be determined based on the fault label of its BMU in the class representation\
    \ map.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_301_0.png)\n\nClass representation\
    \ map. Each color corresponds to a fault class.\n[Map shared under Creative Commons\
    \ Attribution (CC BY) license ( creativecommons.org/licenses/by/4.0/) by Concetti\
    \ et al. in paper titled ‘An Unsupervised Anomaly Detection Based on Self-Organizing\
    \ Map for the Oil and Gas Sector’]\n\n## 16.5 Process Monitoring using SOM: Semiconductor\
    \ Case Study\n\nIn SOM-based process monitoring, the statistic that is monitored\
    \ is the quantization error defined in Eq. 1. Large value of this metric indicates\
    \ that the test sample is away from the normal operation data and is faulty. Let's\
    \ generate the control chart for the training samples of the metal-etch dataset.\n\
    \n```python\n# QEs for training samples\nQEs_train = np.linalg.norm(som.quantization(score_train)\
    \ - score_train, axis=1)\nQE_CL = np.percentile(QEs_train, 95)\n\nplt.figure(),\
    \ plt.plot(QEs_train, '--', marker='o', color='black')\nplt.plot([1,len(QEs_train)],[QE_CL,QE_CL],\
    \ color='red')\nplt.xlabel('sample #'), plt.ylabel('QEs for training samples')\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_302_0.png)\n\n## Fault detection\
    \ for test data\n\nLet's now see if the SOM model can detect the faults in the\
    \ test samples.\n\n```python\n# QEs for test samples\nscore_test = pipe.transform(unfolded_TestdataMatrix)\n\
    QEs_test = np.linalg.norm(som.quantization(score_test) - score_test, axis=1)\n\
    \nprint('Number of flagged faults (using control chart): ', np.sum(QEs_test >\
    \ QE_CL))\n\n>>> Number of flagged faults (using control chart): 19\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_302_1.png)\n\
    \n## Fault diagnosis via contribution plot\n\nUpon the detection of a fault, the\
    \ culprit variable(s) can be identified by finding the variable(s) contributing\
    \ the most to the quantization error. $E_Q$ can be broken down component-wise\
    \ as follows (in the same way as we did for PCA's Q metric)\n\n$$E_{Q,i} = \\\
    sum_{j=1}^{m} \\|x_{ij} - m_{b_{ij}}\\|^2$$\n\nwhere $x_{ij}$ is the value of\
    \ the $j^{th}$ variable for the $i^{th}$ test sample and $m_{b_{ij}}$ is the value\
    \ of the $j^{th}$ variable in the weight vector of the corresponding BMU.\n\n\
    ## Summary\n\nIn this chapter, we looked at two popular unsupervised neural network\
    \ models, viz, autoencoders and self-organizing maps. We studied how to employ\
    \ these models for building process monitoring solutions. Case-studies using industrial-scale\
    \ systems (fluid catalytic cracking unit from oil refineries and metal-etch semiconductor\
    \ process) were shown to illustrate the step-by-step procedures.\n\n# Part 6\n\
    \n## Vibration-based Condition Monitoring\n\n# Chapter 17\n\n## Vibration-based\
    \ Condition Monitoring: Signal Processing and Feature Extraction\n\nRotating machinery,\
    \ which includes motors, compressors, pumps, turbines, fans, etc., form the backbone\
    \ of industrial operations. Unsurprisingly, a large fraction of operation downtime\
    \ can be attributed to the failures of these machines. Over the last decade, the\
    \ process industry has adopted predictive maintenance as the means to proactively\
    \ handle these failures and the technique that has largely become synonymous with\
    \ predictive maintenance is vibration-based condition monitoring (VCM). All rotating\
    \ machines exhibit vibratory motions and different kind of faults produce characteristic\
    \ vibratory signatures. This makes VCM a reliable and effective tool for health\
    \ management of rotating equipment. Considering the importance of VCM in process\
    \ industry, its different aspects are covered in this part of the book.\n\nVibrations\
    \ are usually measured at very high frequency and the large volume of data makes\
    \ analysis of raw data difficult. Correspondingly, processing vibration data and\
    \ extracting meaningful features that can provide early signs of failures become\
    \ very crucial. Traditionally, these features have been analyzed by vibration\
    \ experts. However, in recent times, several successful applications of ML-based\
    \ VCM have been reported. All the techniques that we have studied in the previous\
    \ parts of the book can be used for VCM. While we will look at ML-based VCM in\
    \ the next chapter, this chapter sets the foundations for VCM and covers vibration\
    \ data processing and feature extraction.\n\nOver the years, VCM practitioners\
    \ and researchers have fine-tuned the art of vibration monitoring and have come\
    \ up with several specialized and advanced techniques. Arguably, it is easy for\
    \ a beginner to feel ‘lost’ in the world of VCM. The current and the following\
    \ chapters will help provide some order to this seemingly chaotic world. Specifically,\
    \ the following topics are covered\n\n- Basics of vibrations\n- VCM workflow\n\
    - Spectral analysis of vibration signal\n- Time domain, frequency domain, and\
    \ time-frequency domain feature extraction\n\n## 17.1 Vibration: A Gentle Introduction\n\
    \nVibrations are simply back and forth motion of machines around their position\
    \ of rest. All rotating machines (motors, blowers, chillers, compressors, turbines,\
    \ etc.) exhibit vibratory motion under normal and faulty conditions. Figure 17.1\
    \ shows a representative setup for vibration sensing of an industrial machine.\
    \ The sensors (transducers) convert vibratory motion (of displacement, velocity,\
    \ or acceleration) into analogue electrical signals which are digitized and stored.\
    \ The figure below shows how the recorded signal looks like on a time-axis for\
    \ a machine with gradually degrading condition. The increasing vibration levels\
    \ indicate underlying machine issues.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_306_0.png)\n\
    \nThe components of rotating machines (rotors, bearings, gears) undergo different\
    \ types of failures due to well-studies causes such as mechanical looseness, misalignment,\
    \ cracks, etc. These faults produce characteristic vibration patterns. However,\
    \ it is difficult to ‘see’ or extract\n\n<sup>109</sup> Romanssini et al., A Review\
    \ on Vibration Monitoring Techniques for Predictive Maintenance of Rotating Machinery.\
    \ Eng, 2023. This article is an open access article distributed under the terms\
    \ and conditions of the Creative Commons Attribution (CC BY) license (https://creativecommons.org/licenses/by/4.0/)."
  mdcn: "## SOM 网格的尺寸\n\nSOM 网格的形状和尺寸会显著影响映射的质量。六边形网格非常常用，一个通用的指导原则是在网格中使用 $5\\sqrt{N}$\
    \ 个神经元。\n\n## 16.4 通过 SOM 可视化半导体数据集\n\n为了观察 SOM 的实际应用，让我们将其应用于我们的半导体金属蚀刻数据集。我们将再次使用原始展开数据的前三个主成分得分，正如第\
    \ 11 章和第 14 章所做的那样，以便更好地可视化 SOM 的输入数据集。让我们看看 SOM 是否能指示存在 3 个聚类。我们将使用 *MiniSom*<sup>107</sup>\
    \ 包来构建我们的 SOM 模型。\n\n```python\n# fit SOM model\nfrom minisom import MiniSom\n\
    \nN = score_train.shape[0]\nN_neurons = 5*np.sqrt(N)\n\nsom = MiniSom(np.floor(np.sqrt(N_neurons)).astype(int),\
    \ np.floor(np.sqrt(N_neurons)).astype(int),\n              score_train.shape[1],\
    \ sigma=1.5, learning_rate=.7, activation_distance='euclidean',\n            \
    \  topology='hexagonal', neighborhood_function='gaussian', random_seed=10)\nsom.train(score_train,\
    \ num_iteration=10000, verbose=True)\n```\n\n训练过程中量化误差和拓扑误差演变的图如下所示。很明显，这两个误差在最初的几次迭代中都急剧下降。总体而言，10000\
    \ 次迭代似乎是一个不错的迭代次数值。\n\n![](img/cfcc9569b5e92ea115855752abddd75a_299_0.png)\n\n\
    ![](img/cfcc9569b5e92ea115855752abddd75a_299_1.png)\n\n<sup>107</sup> https://github.com/JustGlowing/minisom\n\
    \n可视化 SOM 并寻找聚类的最常见方法是生成 U-矩阵<sup>108</sup>（统一距离矩阵），如下图所示，针对我们拟合好的 SOM 模型。这里，每个神经元根据其权重向量与其邻居的平均距离进行着色。较浅的颜色意味着该神经元及其邻居被映射到输入空间的同一区域。从所示的\
    \ U-矩阵中，可以清楚地看到三个聚类。\n\n```python\n# plot U-matrix\nplt.figure(figsize=(9, 9))\n\
    plt.pcolor(som.distance_map().T, cmap='bone_r') # plotting the distance map as\
    \ background\nplt.colorbar()\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_300_0.png)\n\
    \n## 用于监督学习的 SOM\n\n如果训练数据集包含来自不同故障类别的故障样本（包括无故障样本），那么可以使用类别表示图来查看不同类别在 SOM 网格上的位置。下图显示了一个示例。这里，神经元的颜色基于映射到该神经元的样本中最常出现的类别。这样的图也允许\
    \ SOM 模型用于故障诊断，其中测试样本的故障状态可以根据其在类别表示图中的最佳匹配单元的故障标签来确定。\n\n![](img/cfcc9569b5e92ea115855752abddd75a_301_0.png)\n\
    \n类别表示图。每种颜色对应一个故障类别。\n[地图由 Concetti 等人在题为‘An Unsupervised Anomaly Detection Based\
    \ on Self-Organizing Map for the Oil and Gas Sector’的论文中共享，遵循 Creative Commons\
    \ Attribution (CC BY) 许可 ( creativecommons.org/licenses/by/4.0/)]\n\n## 16.5 使用\
    \ SOM 进行过程监控：半导体案例研究\n\n在基于 SOM 的过程监控中，监控的统计量是公式 1 中定义的量化误差。该指标的较大值表明测试样本远离正常操作数据，是故障样本。让我们为金属蚀刻数据集的训练样本生成控制图。\n\
    \n```python\n# QEs for training samples\nQEs_train = np.linalg.norm(som.quantization(score_train)\
    \ - score_train, axis=1)\nQE_CL = np.percentile(QEs_train, 95)\n\nplt.figure(),\
    \ plt.plot(QEs_train, '--', marker='o', color='black')\nplt.plot([1,len(QEs_train)],[QE_CL,QE_CL],\
    \ color='red')\nplt.xlabel('sample #'), plt.ylabel('QEs for training samples')\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_302_0.png)\n\n## 测试数据的故障检测\n\n\
    现在让我们看看 SOM 模型能否检测测试样本中的故障。\n\n```python\n# QEs for test samples\nscore_test =\
    \ pipe.transform(unfolded_TestdataMatrix)\nQEs_test = np.linalg.norm(som.quantization(score_test)\
    \ - score_test, axis=1)\n\nprint('Number of flagged faults (using control chart):\
    \ ', np.sum(QEs_test > QE_CL))\n\n>>> Number of flagged faults (using control\
    \ chart): 19\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_302_1.png)\n\n##\
    \ 通过贡献图进行故障诊断\n\n在检测到故障后，可以通过找到对量化误差贡献最大的变量来识别罪魁祸首变量。$E_Q$ 可以按如下方式按分量分解（与我们对 PCA\
    \ 的 Q 统计量所做的方式相同）\n\n$$E_{Q,i} = \\sum_{j=1}^{m} \\|x_{ij} - m_{b_{ij}}\\|^2$$\n\
    \n其中 $x_{ij}$ 是第 $i$ 个测试样本的第 $j$ 个变量的值，$m_{b_{ij}}$ 是相应最佳匹配单元权重向量中第 $j$ 个变量的值。\n\
    \n## 总结\n\n在本章中，我们探讨了两种流行的无监督神经网络模型，即自编码器和自组织映射。我们研究了如何运用这些模型来构建过程监控解决方案。使用工业规模系统（来自炼油厂的流化催化裂化装置和金属蚀刻半导体工艺）的案例研究展示了逐步操作流程。\n\
    \n# 第 6 部分\n\n## 基于振动的状态监控\n\n# 第 17 章\n\n## 基于振动的状态监控：信号处理与特征提取\n\n旋转机械，包括电机、压缩机、泵、涡轮机、风扇等，构成了工业运营的支柱。毫不奇怪，很大一部分运行停机时间可归因于这些机器的故障。在过去十年中，流程工业采用了预测性维护作为主动处理这些故障的手段，而与预测性维护几乎同义的技术就是基于振动的状态监控。所有旋转机器都表现出振动运动，不同类型的故障会产生特征性的振动信号。这使得\
    \ VCM 成为旋转设备健康管理的可靠有效工具。考虑到 VCM 在流程工业中的重要性，本书的这一部分涵盖了其不同方面。\n\n振动通常以非常高的频率测量，大量的数据使得原始数据分析变得困难。相应地，处理振动数据并提取能够提供故障早期迹象的有意义特征变得至关重要。传统上，这些特征由振动专家进行分析。然而，近年来，已经报道了多个基于机器学习的\
    \ VCM 成功应用。我们在本书前面部分研究的所有技术都可以用于 VCM。虽然我们将在下一章探讨基于机器学习的 VCM，但本章为 VCM 奠定基础，并涵盖振动数据处理和特征提取。\n\
    \n多年来，VCM 从业者和研究人员不断完善振动监测技术，并提出了几种专门和先进的技术。可以说，初学者很容易在 VCM 的世界中感到“迷失”。当前和后续的章节将有助于为这个看似混乱的世界提供一些秩序。具体涵盖以下主题\n\
    \n- 振动基础\n- VCM 工作流程\n- 振动信号的频谱分析\n- 时域、频域和时频域特征提取\n\n## 17.1 振动：入门介绍\n\n振动仅仅是机器围绕其静止位置的往复运动。所有旋转机器（电机、鼓风机、冷却器、压缩机、涡轮机等）在正常和故障条件下都表现出振动运动。图\
    \ 17.1 显示了工业机器振动传感的代表性设置。传感器（换能器）将振动运动（位移、速度或加速度）转换为模拟电信号，这些信号被数字化并存储。下图显示了对于状态逐渐恶化的机器，记录的信号在时间轴上的样子。不断增加的振动水平表明存在潜在的机器问题。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_306_0.png)\n\n旋转机器的部件（转子、轴承、齿轮）由于众所周知的原因（如机械松动、不对中、裂纹等）会经历不同类型的故障。这些故障会产生特征性的振动模式。然而，很难“看到”或提取\n\
    \n<sup>109</sup> Romanssini et al., A Review on Vibration Monitoring Techniques\
    \ for Predictive Maintenance of Rotating Machinery. Eng, 2023. This article is\
    \ an open access article distributed under the terms and conditions of the Creative\
    \ Commons Attribution (CC BY) license (https://creativecommons.org/licenses/by/4.0/)."

    ## Book 1


    ## Book 2


    ![](img/cfcc9569b5e92ea115855752abddd75a_9_0.png)


    ![](img/cfcc9569b5e92ea115855752abddd75a_9_1.png)


    ## Preface


    Imagine yourself in the shoes of a process engineer/analyst who has been assigned
    his/her first machine learning-based project with the objective of building a
    plantwide monitoring tool. Although an exciting task, it may easily turn into
    a frustrating effort due to the difficulty in finding the right methodology that
    works for the process system at hand. Building a successful process monitoring
    tool is challenging due to the different characteristics a process dataset may
    possess which precludes the possibility of a single methodology that works for
    all scenarios. Consequently, a number of powerful techniques have been devised
    over the past several decades. While it is good to be spoilt with choices, it
    is easy for a newcomer to get ‘drowned’ in the huge (and still burgeoning) literature
    on process monitoring (PM) and predictive maintenance (PdM). There are a lot of
    scattered resources on PM and PdM. However, unfortunately, no textbook exists
    that focusses on practical implementation aspects and provides comprehensive coverage
    of commonly used PM/PdM techniques that have proven useful in process industry.
    There is a gap in available machine learning resources for PM/PdM catering to
    industrial practitioners and this book attempts to cover this gap. Specifically,
    we wished to create a reader-friendly and easy-to-understand book that can help
    its readers become ‘experts’ on ML-based PM/PdM ‘quickly’ (disclaimer: there is
    no magic potion; hard work is still required!) with the right guidance.


    In this book, we cover all three main aspects of process monitoring and predictive
    maintenance, namely, fault/anomaly detection, fault diagnosis/identification,
    and fault prognostics/remaining useful life estimation (RUL). Our intent is not
    to give a full treatise on all the PM/PdM techniques that exist out there; albeit
    our focus is to help budding process data scientists (PDSs) gain a bird’s-eye
    view of the PM/PdM landscape, obtain working-level knowledge of the mainstream
    techniques, and have the practical know-how to make the right choice of models.
    In terms of the spectrum of methodologies covered, we place equal emphasis on
    modern deep-learning methods and classical statistical methods. While deep-learning
    has provided remarkable results in recent times, the classical statistical (and
    ML/data mining) methods are not yet obsolete. In fact MSPM (multivariate statistical
    process monitoring) techniques are still widely used for process monitoring. Accordingly,
    this book covers the complete spectrum of methodologies with univariate Shewhart-/CUSUM-/EWMA-based
    control charts on one end and deep-learning-based RUL estimations on the other.


    Guided by our own experiences from building monitoring models for varied industrial
    applications over the past several years, this book covers a curated set of ML
    techniques that have proven useful for PM/PdM. The broad objectives of the book
    can be summarized as follows:


    - reduce barrier-to-entry for those new to the field of PM/PdM

    - provide working-level knowledge of PM/PdM techniques to the readers

    - enable readers to make judicious selection of PM/PdM techniques appropriate
    for their problems through intuitive understanding of the advantages and drawbacks
    of different techniques

    - provide step-by-step guidance for developing industrial level solutions for
    PM/PdM

    - provide practical guidance on how to choose model hyperparameters judiciously


    This book adopts a tutorial-style approach. The focus is on guidelines and practical
    illustrations with a delicate balance between theory and conceptual insights.
    Hands-on-learning is emphasized and therefore detailed code examples with industrial-scale
    datasets are provided to concretize the implementation details. A deliberate attempt
    is made to not weigh readers down with mathematical details, but rather use it
    as a vehicle for better conceptual understanding. Complete code implementations
    have been provided in the GitHub repository.


    We are quite confident that this text will enable its readers to build process
    monitoring and prognostics models for challenging problems with confidence. We
    wish them the best of luck in their career.


    ## Who should read this book


    The application-oriented approach in this book is meant to give a quick and comprehensive
    coverage of mainstream PM/PdM methodologies in a coherent, reader-friendly, and
    easy-to-understand manner. The following categories of readers will find the book
    useful:


    1. Data scientists new to the field of process monitoring, equipment condition
    monitoring, and predictive maintenance

    2. Regular users of commercial anomaly detection software (such as Aspen Mtell)
    looking to obtain a deeper understanding of the underlying concepts

    3. Practicing process data scientists looking for guidance for developing process
    monitoring and predictive maintenance solutions

    4. Process engineers or process engineering students making their entry into the
    world of data science

    5. Industrial practitioners looking to build fault detection and diagnosis solutions
    for rotating machinery using vibration data


    ### Pre-requisites


    No prior experience with machine learning or Python is needed. Undergraduate-level
    knowledge of basic linear algebra and calculus is assumed.


    ## Book organization


    The book follows a holistic and hands-on approach to learning ML where readers
    first gain conceptual insight and develop intuitive understanding of a methodology,
    and then consolidate their learning by experimenting with code examples. Under
    the broad theme of ML for process systems engineering, this book is an extension
    of the first two book of the series (which dealt with fundamentals of ML, varied
    applications of ML in process industry, and ML methods for dynamic system modeling);
    however, it can also be used as a standalone text. Industrial process data could
    show varied characteristics such as multidimensionality, non-Gaussianity, multimodality,
    nonlinearity, dynamics, etc. Therefore, to give due treatment to the different
    modeling methodologies designed for dealing with systems with different data characteristics,
    this book has been divided into seven parts.


    **Part 1** lays down the basic foundations of ML-assisted process and equipment
    condition monitoring, and predictive maintenance. **Part 2** provides in-detail
    presentation of classical ML techniques for univariate signal monitoring. Different
    types of control charts and time-series pattern matching methodologies are discussed.
    **Part 3** is focused on the widely popular multivariate statistical process monitoring
    (MSPM) techniques. Emphasis is paid to both the fault detection and fault isolation/diagnosis
    aspects. **Part 4** covers the process monitoring applications of classical machine
    learning techniques such as k-NN, isolation forests, support vector machines,
    etc. These techniques come in handy for processes that cannot be satisfactorily
    handled via MSPM techniques. **Part 5** navigates the world of artificial neural
    networks (ANN) and studies the different ANN structures that are commonly employed
    for fault detection and diagnosis in process industry. **Part 6** focusses on
    vibration-based monitoring of rotating machinery and **Part 7** deals with prognostic
    techniques for predictive maintenance applications.


    This book attempts to cover a lot of concepts. Therefore, to avoid the book from
    getting bulky, we have not included contents that are not directly relevant to
    PM/PdM and have already been covered in detail in the first two books of the series.
    For example, ML fundamentals related to cross-validation, regularization, noise
    removal, etc., are illustrated in great detail in Book 1 of the series and not
    in this book.


    ## Symbol notation


    The following notation has been adopted in the book for representing different
    types of variables:


    - lower-case letters refer to vectors ($x \in \mathbb{R}^{m \times 1}$) and upper-case
    letters denote matrices ($X \in \mathbb{R}^{n \times m}$)

    - individual element of a vector and a matrix are denoted as $x_j$ and $x_{ij}$,
    respectively.

    - any $i^{\text{th}}$ vector in a dataset gets represented as subscripted lower-case
    letter ($x_i \in \mathbb{R}^{m \times 1}$)'

    # 5.1 Control Charts: Simple and Time-tested Process Monitoring Tools


    Control charts are one of the seven<sup>24</sup> pillars of statistical process
    control that are traditionally used to monitor key production or product quality
    metrics in order to detect unexpected deviations. When the process is ‘in-control’,
    the monitored variables are expected to exhibit only natural cause variations
    around some target or mean values. As shown in Figure 5.1, a control chart is
    simply a display of measurements of a single process variable plotted against
    time or sample number. Additionally, these charts include a centerline or the
    expected mean value, and a couple of limit lines called UCL (upper control limit)
    and LCL (lower control limit). Most industrial process variables show natural
    variations due to random disturbances affecting the process. The control limits
    are statistically designed in such a way that under natural cause variations,
    the monitored variable remains within the control limits with certain desired
    probability. The breach of the control limits indicates potential process fault
    or an ‘out-of-control’ situation. Proper specification of the limits is therefore
    essential to ensure minimal false alarms and rapid detection of faults.


    ![](img/cfcc9569b5e92ea115855752abddd75a_87_0.png)


    The traditional control charts take three different forms, viz, Shewhart charts,
    CUSUM charts, and EWMA charts. While a Shewhart chart plots only the current measurements
    on the control chart, the other two plot some combination of current and past
    measurements. You will soon learn how usage of past measurements allow detection
    of incipient or low magnitude faults which may not get detected by Shewhart charts.
    Control charts are not limited to tracking process measurements only; any metric
    that is expected to exhibit only random fluctuations around some mean or target
    can be monitored via control charts. Correspondingly, control charts are also
    employed for monitoring model residuals, latent variables (for example, in PCA),
    etc. Let’s first get started with Shewhart charts.'

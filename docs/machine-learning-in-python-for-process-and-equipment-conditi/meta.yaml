    \ string; type(s) = str\nb = True # boolean; type(b) = bool\n```\n\n定义了变量后，你可以执行基本操作\n\
    \n```\n# print function prints/displays the specified message\nprint(i+2) # displays\
    \ 4\nprint(f*2) # displays 2.4\n```\n\n## 列表、元组作为有序序列\n\n相关数据（不一定是相同数据类型）可以作为序列排列在列表中，如下所示\n\
    \n```\n# different ways of creating lists\nlist1 = [2,4,6]\nlist2 = ['air',3,1,5]\n\
    list3 = list(range(4)) # equals [0,1,2,3]; range function returns a sequence of\
    \ numbers starting\n                        # from 0 (default) with increments\
    \ of 1 (default)\nlist3.append(8) # returns [0,1,2,3,8]; append function adds\
    \ new items to existing list\nlist4 = list1 + list2 # equals [2,4,6,'air',3,1,5]\n\
    list5 = [list2, list3] # nested list [['air', 3, 1, 5], [0, 1, 2, 3,8]]\n```\n\
    \n元组是另一种像列表一样的序列结构，不同之处在于它们的元素和大小不能更改。由于元组是不可变的/不可更改的，它们更节省内存。\n\n```\n# creating\
    \ tuples\ntuple1 = (0,1,'two')\ntuple2 = (list1, list2) # equals ([2, 4, 6, 8],\
    \ ['air', 3, 1, 5])\n```\n\n下面的几个例子说明了列表推导式，这是一种从其他序列创建新列表的非常有用的方法\n\n```\n# generate\
    \ powers of individual items in list3\nnewList1 = [item**2 for item in list3]\
    \ # equals [0,1,4,9,64]\n\n# nested list comprehension\nnewList2 = [item2**2 for\
    \ item2 in [item**2 for item in list3]] # equals [0,1,16,81,4096]\n```\n\n## 序列的索引和切片\n\
    \n列表中的单个元素可以如下访问和修改\n\n```\n# working with single item using positive or negative\
    \ indexes\nprint(list1[0]) # displays 2, the 1st item in list1\nlist2[1] = 1 #\
    \ list2 becomes ['air',1,1,5]\nprint(list2[-2]) # displays 1, the 2nd last element\
    \ in list2\n```\n\n请注意，Python索引从零开始。很多时候，我们需要处理列表中的多个元素。这可以很容易地完成，如下所示。\n\n```\n\
    # accessing multiple items through slicing\n# Syntax: givenList[start,stop,step];\
    \ if unspecified, start=0, stop=list length, step=1\nprint(list4[0:3]) # displays\
    \ [2,4,6], the 1st, 2nd, 3rd items; note that index 3 item is excluded\n```\n\n\
    ![](img/cfcc9569b5e92ea115855752abddd75a_41_0.png)\n\n```\nprint(list4[:3]) #\
    \ same as above\nprint(list4[4:len(list4)]) # displays [3,1,5]; len() function\
    \ returns the number of items in list\n```\n\n```\nprint(list4[4:]) # same as\
    \ above\nprint(list4[::3]) # displays [2, 'air', 5]\nprint(list4[::-1]) # displays\
    \ list 4 backwards [5, 1, 3, 'air', 6, 4, 2]\nlist4[2:4] = [0,0,0] # list 4 becomes\
    \ [2, 4, 0, 0, 0, 3, 1, 5]\n```\n\n## 执行控制语句\n\n这些语句允许你控制代码的执行顺序。你可以选择性地或多次执行脚本的任何特定部分。让我们看看如何实现这些\n\
    \n```\n# selectively execute code based on condition\nif list1[0] > 0:\n    list1[0]\
    \ = 'positive'\nelse:\n    list1[0] = 'negative'\n\n# list1 becomes ['positive',\
    \ 4, 6]\n```\n\n```\n# compute sum of squares of numbers in list3\nsum_of_squares\
    \ = 0\nfor i in range(len(list3)):\n    sum_of_squares += list3[i]**2\n\nprint(sum_of_squares)\
    \ # displays 78\n```\n\n## 自定义函数\n\n之前我们使用了Python的内置函数（len(), append()）来执行为这些函数预定义的操作。Python也允许定义我们自己的自定义函数。自定义函数的优点是，我们可以定义一组指令，然后在我们的脚本和项目中多次重用它们。\n\
    \n为了说明，让我们定义一个函数来计算列表中元素的平方和。\n\n```\n# define function instructions\ndef sumSquares(givenList):\n\
    \    sum_of_squares = 0\n    for i in range(len(givenList)):\n        sum_of_squares\
    \ += givenList[i]**2\n\n    return sum_of_squares\n\n# call/re-use the custom\
    \ function multiple times\nprint(sumSquares(list3)) # displays 78\n```\n\n> 你可能已经注意到，在我们上面的自定义函数代码中，我们使用了不同的缩进（代码行开头的空格数）来将‘for循环’代码与函数的其余代码分开。这种做法实际上是Python强制要求的，如果不遵守，将导致错误或bug。虽然其他流行的语言如C++、C#使用花括号（{}）来界定代码块（函数体、循环、if语句等），但Python使用缩进。你可以选择缩进的量，但必须在代码块内保持一致。\n\
    \n至此，我们对Python基础的极其选择性的介绍就结束了。然而，这应该足以让你理解后续章节中的代码。现在让我们继续学习一些专门的科学计算包。\n\n##\
    \ 2.4 科学计算包：基础\n\n虽然核心Python数据结构非常方便，但它们对于机器学习任务所需的高级数据操作来说并不十分方便。幸运的是，存在像NumPy、SciPy、Pandas这样的专门包，它们提供了适合科学计算的便捷多维表格数据结构。让我们快速熟悉一下这些包。\n\
    \n## NumPy\n\n在NumPy中，ndarray是基本的数据结构，它将数据放在一个值的网格中。下面的图示展示了如何创建一维和二维数组以及如何访问它们的元素\n\
    \n```\n# import numpy package & create a 2D array\nimport numpy as np\narr2D =\
    \ np.array([[1,4,6],[2,5,7]])\n\n# getting information about arr2D\nprint(arr2D.size)\
    \ # returns 6, the no. of items\nprint(arr2D.ndim) # returns 2, the no. of dimensions\n\
    print(arr2D.shape) # returns tuple(2,3) corresponding to 2 rows & 3 columns\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_43_0.png)\n\n```\n# create a 1D\
    \ array\narr1D = np.array([1,4,6])\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_44_0.png)\n\
    \n```\n# getting information about arr1D\nprint(arr1D.size) # returns 3, the no.\
    \ of items\nprint(arr1D.ndim) # returns 1, the no. of dimensions\nprint(arr1D.shape)\
    \ # returns tuple (3,) corresponding to 3 items\n```\n\n请注意，行和列的概念不适用于一维数组。另外，你可能已经注意到，我们在脚本中使用NumPy包之前导入了它（‘np’只是一个短别名）。导入一个包会使其所有函数和子包在我们的脚本中可用。\n\
    \n## 创建NumPy数组\n\n之前，我们看到了如何将列表转换为NumPy数组。还有其他方法可以创建NumPy数组。下面展示了一些示例\n\n```\n\
    # creating sequence of numbers\narr1 = np.arange(3, 6) # same as Python range\
    \ function; results in array([3,4,5])\narr2 = np.arange(3, 9, 2) # the 3rd argument\
    \ defines the step size; results in array([3,5,7])\narr3 = np.linspace(1,7,3)\
    \ # creates evenly spaced 3 values from 1 to 7; results in array([1,4,7])\n```\n\
    \n```\n# creating special arrays\narr4 = np.ones((2,1)) # array of shape (2,1)\
    \ with all items as 1\narr5 = np.zeros((2,2)) # all items as zero; often used\
    \ as placeholder array at beginning of script\narr6 = np.eye(2) # diagonal items\
    \ as 1\n```\n\n```\n# adding axis to existing arrays (e.g., converting 1D array\
    \ to 2D array)\nprint(arr1[:, np.newaxis])\n>>>[[3]\n    [4]\n    [5]]\n```\n\n\
    ```\narr7 = arr1[:, None] # same as above\n```"

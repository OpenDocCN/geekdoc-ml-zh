    One can directly compare the current waveform, spectrum, and spectrogram with
    those from NOC periods to detect abnormalities. Alternatively, one can pass the
    entire waveform and/or spectrum as input to a ML model. However, a more convenient
    approach is to extract meaningful features that summarize the vibration signals
    adequately and provide crucial clues regarding the operational state of a machine.
    Usage of features increases the chances of obtaining effective ML models. The
    commonly used features include, amongst others, RMS and kurtosis of waveform,
    frequency center and peak frequency of spectrum, and mean frequency from spectrogram.
    Once the features have been extracted, they can be used for fault detection and
    classification. While we will deal with this last step of VCM workflow in the
    next chapter, let’s obtain better familiarization with the vibration signal processing

  md: '# Mathematical background


    Let $X \in \mathbb{R}^{Nxm}$ and $Y \in \mathbb{R}^{Nxp}$ be the centered input
    and output data matrices of the training samples. Let $\bar{\varphi}(x_t)$ denote
    the mapped and centered feature vector of the $i^{th}$ sample or row of $X$, $X_F
    \in \mathbb{R}^{Nx\infty}$ denote the input data matrix in feature space. The
    kernel matrix is computed and centered as done in KPCA algorithm. The algorithm
    below summarizes the KPLS model training via NIPALS that can provide us the input
    and output score matrices $T$ and $U$.


    # Algorithm: KPLS training via NIPALS


    +   1) Initialize $i = 1$, $\bar{K}_1 = \bar{K}$, $Y_1 = Y$

    2) Set score vector $u_i (\in \mathbb{R}^{Nx1})$ to any column of $Y_i$

    3) Compute score vector $t_i (\in \mathbb{R}^{Nx1}) = \bar{X}_{Fi}w_i = \bar{X}_{Fi}\bar{X}_{Fi}^T
    w_i = \bar{K}_i u_i$

    4) Scale $t_i$ to unit length: $t_i = t_i / \|t_i\|$

    5) Calculate weight vector $c_i = Y_i^T t_i$

    6) Update score vector $u_i = Y_i c_i$

    7) Scale $u_i$ to unit length: $u_i = u_i / \|u_i\|$

    8) Repeat steps 3 to 7 until $t_i$ converges

    9) Deflate matrices:

    $\bar{K}_{i+1} = \bar{K}_i - t_i t_i^T \bar{K}_i - \bar{K}_i t_i t_i^T + t_i t_i^T
    \bar{K}_i t_i t_i^T$

    $Y_{i+1} = Y_i - t_i t_i^T Y_i$

    10) Set $i = i + 1$ and return to step 2. Stop when $i > a$ [number of latents
    to be retained]

    11) Form the matrices $T = [t_1, t_2, \cdots, t_a]$

    $U = [u_1, u_2, \cdots, u_a]$


    The training score matrix can also be represented as


    ```

    $T = \bar{X}_F R$    where $R = \bar{X}_F^T U(T^T \bar{K} U)^{-1} \in \mathbb{R}^{\infty
    xa}$

    $\Rightarrow T = \bar{K} U(T^T \bar{K} U)^{-1}$

    ```'
  merge: -1
  pgno: 188
- img_proc: true
  md: 'The $R$ matrix will help us compute the score values for a test sample as we
    will see shortly. The last missing piece of information is the regression coefficient
    matrix which can be used to generate the output predictions


    $$\hat{Y} = \bar{X}_F B \quad \text{where } B = \bar{X}_F^T U(T^T \bar{K} U)^{-1}
    T^T Y$$

    $$\Rightarrow \hat{Y} = \bar{K} U(T^T \bar{K} U)^{-1} T^T Y$$


    # Score vector and predictions for a test sample


    The score vector $t_t (\in \mathbb{R}^{a \times 1})$ for a test sample $x_t$ can
    be obtained as


    $$t_t = R^T \bar{\varphi}(x_t)$$

    $$= (U^T \bar{K} T)^{-1} U^T \bar{X}_F \bar{\varphi}(x_t)$$

    $$= (U^T \bar{K} T)^{-1} U^T \bar{k}_t$$


    Centered kernel vector $\in \mathbb{R}^{N \times 1}$ with $k_{ti} = k(x_t, x_i)$
    where $x_i$ belongs to training dataset and $i = 1, 2, \cdots, N$. Given as in
    Eq. 8.


    The predictions $\hat{y} (\in \mathbb{R}^{p \times 1})$ can obtained using the
    matrix $B$


    $$\hat{y} = B^T \bar{\varphi}(x_t)$$

    $$= Y^T T(U^T \bar{K} T)^{-1} U^T \bar{X}_F \bar{\varphi}(x_t)$$

    $$= Y^T T(U^T \bar{K} T)^{-1} U^T \bar{X}_F \bar{k}_t$$


    # Hyperparameter specification


    Like KPCA, KPLS involve selection of two critical hyperparameters: the Gaussian
    kernel ($\sigma$) and the number of latents retained ($a$). The number of latents
    retained is commonly determined via cross-validation, where we choose $a$ that
    minimizes the error in predicted outputs for validation dataset. For $\sigma$,
    Jose et al. showed$^{73}$ that setting $\sigma = 2m$ provides robust fault detection
    performance. Alternatively, $\sigma$ can be chosen such that we obtain an acceptable
    level of false alerts on a validation dataset of NOC samples.


    $^{73}$ Jose et al., New contributions to non-linear process monitoring through
    kernel partial least squares. *Chemometrics and Intelligent Laboratory Systems*,
    2014.'
  merge: -1
  pgno: 189

    ```\n\n<sup>76</sup> He and Wang, Fault detection using the k-nearest neighbor\
    \ rule for semiconductor manufacturing processes, *IEEE Transaction on Semiconductor\
    \ Manufacturing*, 2007\n\nFigure 11.6: Score plot of PC1 and PC2 for calibration\
    \ batches in metal etch dataset\n\nFigure 11.6 confirms existence of 3 operating\
    \ modes. While visual inspection of score plots can help to decide the number\
    \ of clusters, we will, nonetheless, learn ways to estimate this in a more automated\
    \ way.\n\n## 11.3 K-Means Clustering: An Introduction\n\nK-Means is one of the\
    \ most popular clustering algorithms due to its simple concept, ease of implementation,\
    \ and computational efficiency. Let $K$ denote the number of clusters and $\\\
    {x_i\\}, i = 1, \\dots, N$ be the set of $N$ $m$-dimensional points. The cluster\
    \ assignment of the data points is determined such that the following sum of squared\
    \ errors, also called cluster inertia, is minimized\n\n$$SSE = \\sum_{k=1}^{K}\
    \ \\sum_{x_i \\in k^{th}cluster} ||x_i - \\mu_k||_2^2$$\n\nHere, $\\mu_k$ is the\
    \ centroid of the $k^{th}$ cluster and $||x_i - \\mu_k||_2^2$ denotes the Euclidean\
    \ distance of $x_i$ from $\\mu_k$. To solve Eq. 1, k-means adopts the following\
    \ intuitive iterative procedure.\n\n- Randomly pick K data-points as initial centroids\
    \ or cluster centers\n- Assign each data-point to the closest cluster center\n\
    - Recompute the centroids of each cluster using the current cluster assignment\
    \ of the data-points\n- Repeat steps 2 and 3 until convergence\n\nLet us apply\
    \ k-means to our metal etch dataset.\n\n```python\n# fit k-means model\nfrom sklearn.cluster\
    \ import KMeans\n\nn_cluster = 3\nkmeans = KMeans(n_clusters = n_cluster, random_state\

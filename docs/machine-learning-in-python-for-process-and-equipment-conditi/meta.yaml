    # # Chapter 17


    # ## Vibration-based Condition Monitoring: Signal Processing and Feature Extraction


    Rotating machinery, which includes motors, compressors, pumps, turbines, fans,
    etc., form the backbone of industrial operations. Unsurprisingly, a large fraction
    of operation downtime can be attributed to the failures of these machines. Over
    the last decade, the process industry has adopted predictive maintenance as the
    means to proactively handle these failures and the technique that has largely
    become synonymous with predictive maintenance is vibration-based condition monitoring
    (VCM). All rotating machines exhibit vibratory motions and different kind of faults
    produce characteristic vibratory signatures. This makes VCM a reliable and effective
    tool for health management of rotating equipment. Considering the importance of
    VCM in process industry, its different aspects are covered in this part of the
    book.


    Vibrations are usually measured at very high frequency and the large volume of
    data makes analysis of raw data difficult. Correspondingly, processing vibration
    data and extracting meaningful features that can provide early signs of failures
    become very crucial. Traditionally, these features have been analyzed by vibration
    experts. However, in recent times, several successful applications of ML-based
    VCM have been reported. All the techniques that we have studied in the previous
    parts of the book can be used for VCM. While we will look at ML-based VCM in the
    next chapter, this chapter sets the foundations for VCM and covers vibration data
    processing and feature extraction.


    Over the years, VCM practitioners and researchers have fine-tuned the art of vibration
    monitoring and have come up with several specialized and advanced techniques.
    Arguably, it is easy for a beginner to feel ‘lost’ in the world of VCM. The current
    and the following chapters will help provide some order to this seemingly chaotic
    world. Specifically, the following topics are covered


    +   - Basics of vibrations

    - VCM workflow

    - Spectral analysis of vibration signal

    - Time domain, frequency domain, and time-frequency domain feature extraction'

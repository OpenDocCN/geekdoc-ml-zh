    \ Xe_test[:,i]) for i in range(pMatrix_test_centered.shape[0])]\n\nr_test = pMatrix_test_centered.T\
    \ - np.dot(Jn.T, Xn_test)\nQ_test = [np.dot(r_test[:,i], r_test[:,i]) for i in\
    \ range(pMatrix_test_centered.shape[0])]\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_174_0.png)\n\
    \nThe control charts for the test data shows successful detection of process fault.\
    \ The $T_e^2$ metric is known to be overly sensitive with high incidence of false\
    \ alerts which can explain why it seems to often breach the threshold before the\
    \ onset of the actual fault.\n\n## Summary\n\nIn this chapter, we added more ML\
    \ tools to our arsenal to handle process systems that show significant dynamics.\
    \ We looked at two different popular approaches: the first approach entailed a\
    \ simple extension of conventional MSPM tools through inclusion of lagged measurements\
    \ and the second approach entailed usage of state-space (CVA) models. While dynamic\
    \ MSPM methods are easier to understand and implement, the CVA model-based fault\
    \ detection have been found to provide superior results. Next, we will move on\
    \ to learn how to deal with nonlinear processes.\n\n# Chapter 10\n## Multivariate\
    \ Statistical Process Monitoring for Nonlinear Processes\n\nIn the previous chapters,\
    \ we saw how a simple trick of using time-lagged variables enabled application\
    \ of conventional MSPM techniques to dynamic processes. You may wonder if anything\
    \ similar exists for nonlinear processes. Fortunately, it does! The underlying\
    \ principle is to project the original variables onto a high-dimensional feature\
    \ space where features are linearly related. The challenging part is the determination\
    \ of the nonlinear mapping from the original measurement space to the feature\
    \ space This is where a ‘kernel’ trick comes into picture wherein data gets projected\
    \ without the need to explicitly define the nonlinear mapping. Conventional MSPM\
    \ is then employed in the feature space. Sounds complicated? Once you are done\
    \ with this chapter, you will realize that it’s much easier than it may seem to\
    \ you right now.\n\nThe main advantage of kernel-based MSPM techniques (KPCA,\
    \ KPLS, KICA, KFDA, etc.) is that they do not require nonlinear optimization and\
    \ only linear algebra is involved. Unsurprisingly, kernelized methods have become\
    \ very attractive for dealing with nonlinear datasets while retaining the simplicity\
    \ of their linear counterparts. Among the kernel MSPM techniques, kernel PCA and\
    \ kernel PLS are the most widely adopted, have found considerable successes in\
    \ process monitoring applications, and therefore will be the focus of our study\
    \ in this chapter. Specifically, the following topics are covered:\n\n- Introduction\
    \ to kernel PCA\n- Fault detection using kernel PCA\n- Introduction to kernel\
    \ PLS\n- Fault detection using kernel PLS"

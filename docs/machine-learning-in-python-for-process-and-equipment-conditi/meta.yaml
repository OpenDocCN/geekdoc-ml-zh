    \ between arrays of different dimensions, thanks to ‘broadcasting’ where smaller\
    \ array is implicitly extended to be compatible with the larger array, as shown\
    \ in the illustration below. As you can imagine, this is a very convenient feature\
    \ and for more details on broadcasting rules along with different example scenarios,\

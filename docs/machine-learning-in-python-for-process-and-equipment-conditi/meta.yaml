    \ $XX^T$ 项，因此，与 PCA 类似，核函数被用于隐式定义特征空间中的 $\\varphi\\varphi^T$，获得得分向量，然后生成预测输出。整个过程依赖于经典的线性代数，并保留了标准\
    \ PLS 的大部分优良特性。\n\n![](img/cfcc9569b5e92ea115855752abddd75a_187_0.png)\n\n不幸的是，Sklearn\
    \ 没有提供任何现成的 KPLS 模块。尽管如此，编写 KPLS 的步骤并不困难。以下小节中的数学阐述将提供你需要开发自己的 KPCA 模块的所有信息。\n\
    \n> 替代的非线性 PLS 模型\n\n核化 PLS 并不是用于非线性回归建模的唯一常用方法。另一种方法涉及在原始测量空间中工作，将输入和输出数据线性投影以获得得分，并在\

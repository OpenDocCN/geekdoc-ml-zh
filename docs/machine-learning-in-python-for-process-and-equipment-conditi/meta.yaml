  md: 'Figure 8.10 shows the transformed samples in 2 dimensions after FDA and PCA.
    FDA is able to provide a clear separation of Fault 5 samples; however, it could
    not separate Faults 10 and 19 data. Infact, the 2nd discriminant (FD2) contributes

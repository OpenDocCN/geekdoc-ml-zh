    ```


    # Time lag ($l$) determination


    The time lag ($l$) is decided by the dynamic order of the process. Unfortunately,
    the dynamic order is usually unknown. An algorithm for time lag determination
    was first proposed by Ku et at.$^{57}$ in 1995. Another commonly used strategy
    was given by Rato and Reis$^{58}$, and is reproduced below.


    # Algorithm: Time lag determination for DPCA


    +   1) Initialize $l = 0$ and specify some maximum value of lag $l_{max}$

    2) Generate the augmented data matrix $X_{aug}$

    3) Perform singular value decomposition of covariance matrix ($\Sigma_{X_{aug}}$)
    of $X_{aug}$. Let $s_{ml+1}$ be the ($ml + 1$)$^{th}$ singular value of $\Sigma_{X_{aug}}$.
    Define $KSV(l) = s_{ml+1}$.

    4) Define $KSVR(l) = KSV(l) / KSV(l-1)$ for $l > 0$

    5) If $l < l_{max}$, set $l = l + 1$ and go to step 2, else go to step 6

    6) Normalize KSV and KSVR

    $$KSV_{normal}(l) = \frac{KSV(l) - \min(KSV)}{\max(KSV) - \min(KSV)}$$

    $$KSVR_{normal}(l) = \frac{KSVR(l) - \min(KSVR)}{\max(KSVR) - \min(KSVR)}$$

    7) Find $l^*$ as the first $l$ such that $KSVR(l) < KSVR(l-1)$

    8) Determine the optimal $l_{opt} \in [1, l_{max}]$ as

    $$l_{opt} = argmin \sqrt{KSV_{normal}(l)^2 KSVR_{normal}(l)^2} , \quad s.t. \
    l \geq l^*$$


    $^{57}$ Ku et al., Disturbance detection and isolation by dynamic principal component
    analysis. *Chemometrics and intelligent laboratory systems*, 1995.

    $^{58}$ Rato and Reis, Defining the structure of DPCA models and its impact on
    process monitoring and prediction activities. *Chemometrics and intelligent laboratory
    systems*, 2013'

  md: 'The number of ICs returned by FastICA equals the dimension of the measured
    space. Previously, we saw in PCA that not all extracted latent variables are important;
    only a few dominant/important components contain majority of the information while
    the rest contain noise or trivial details. Moreover, the extracted PCs were ordered
    according to their variance. However, there is no standard criterion for quantifying
    the importance of ICs and selecting the optimal number of ICs automatically. One
    popular approach (described below) for quantifying component importances was suggested
    by Lee et. al<sup>50</sup>.


    Equation 2 shows that the *i*<sup>th</sup> row (*w*<sub>*i*</sub>) of demixing
    matrix *W* corresponds to the *i*<sup>th</sup> IC. Therefore Lee et al. suggested
    using the Euclidean norm (*L*<sub>2</sub>) of *w*<sub>*i*</sub> to quantify the
    importance of *i*<sup>th</sup> IC and subsequently order the ICs in decreasing
    order of importance. Using this rationale, Figure 8.5 shows that not all ICs are
    equally important as the *L*<sub>2</sub> norm of several ICs are much smaller
    than the rest.


    ```

    # fetch TE data and select variables (discarding composition measurements)

    TEdata_noFault_train = np.loadtxt(''d00.dat'').T

    xmeas = TEdata_noFault_train[:,0:22] # 22 continuous process variables

    xmv = TEdata_noFault_train[:,41:52] # 11 manipulated variables

    data_noFault_train = np.hstack((xmeas, xmv))


    # scale data

    from sklearn.preprocessing import StandardScaler

    scaler = StandardScaler()

    data_train_normal = scaler.fit_transform(data_noFault_train)


    # fit ICA model

    from sklearn.decomposition import FastICA

    ica = FastICA(max_iter=1000, tol=0.005).fit(data_train_normal)

    W = ica.components_


    # sort the ICs in importance order using L2 norm of each row

    L2_norm = np.linalg.norm(W, 2, axis=1)

    sort_order = np.flip(np.argsort(L2_norm)) # descending order

    L2_norm_sorted_pct = 100*L2_norm[sort_order]/np.sum(L2_norm)


    plt.figure()

    plt.plot(L2_norm, ''b''), plt.xlabel(''IC number (unsorted)''), plt.ylabel(''L2
    norm'')

    plt.figure()

    plt.plot(L2_norm_sorted_pct, ''b+''), plt.xlabel(''IC number (sorted)''), plt.ylabel(''%
    L2 norm'')


    # re-arrange rows of W matrix

    W_sorted = W[sort_order,:] # row 1 now corresponds to the most important IC and
    so on

    ```'

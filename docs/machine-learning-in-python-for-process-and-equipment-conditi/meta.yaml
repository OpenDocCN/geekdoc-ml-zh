  md: '# Process monitoring/fault detection indices


    In CVA-based fault detection strategy, 3 indices - $T_s^2, T_e^2, Q$ - are computed.
    The computation of these metrics and their corresponding threshold are shown below.
    Note that the threshold expressions are based on the assumption that process variables
    are Gaussian distributed; if this assumption is invalid then empirical techniques
    such as KDE or percentile may be employed.


    | Metric 1: $T_s^2$ | Metric 2: $T_e^2$ | Metric 3: $Q$ |

    | :--- | :--- | :--- |

    | $T_s^2(k) = x^T(k)x(k)$<br>$= p^T(k) J_n^T J_n p(k)$ | $T_e^2(k) = p^T(k) J_e^T
    J_e p(k)$ | $Q(k) = r^T(k)r(k)$<br>$r(k) = p(k) - J_n^T J_n p(k)$ |

    | Threshold @ significance level $\alpha$ | Threshold @ significance level $\alpha$
    | Threshold @ significance level $\alpha$ |

    | $T_{s,CL}^2 = \frac{n(N^2-1)}{N(N-n)} F_{\alpha}(n, N-n)$ | $T_{e,CL}^2 = \frac{z(N^2-1)}{N(N-z)}
    F_{\alpha}(z, N-z)$ | $Q_{CL} = \frac{\sigma}{2\mu} \chi_{\alpha}^2 \left( \frac{2\mu^2}{\sigma}
    \right)$ |


    +   - $J_e$ contains all except the first $n$ rows of $J$ i.e., the last $\ell(m+r)-n$
    rows of $J$

    - $z = \ell(m+r)-n$

    - $F_{\alpha}(n, N-n)$ is the 1-$\alpha$ percentile of a $F$ distribution with
    $n$ and $N-n$ degrees of freedom

    - $\chi_{\alpha}^2(h)$ is the (1-$\alpha$) percentile of a chi-squared distribution
    with $h$ degrees of freedom; $\mu$ denotes the mean value and $\sigma$ denotes
    the variance of the Q metric

    - Significance level of $\alpha = 0.05$ would mean that there is a 5% chance that
    an alert is false


    # (Unsupervised) CVA modeling with only output variables


    CVA can also be used to capture dynamic correlations in datasets where the variables
    are not divided into input and outputs. The state-space model that results is
    the following


    ```

    $x(k+1) = Ax(k) + w(k)$

    $y(k) = Cx(k) + v(k)$

    ```


    Such an approach can be used to monitor a process operating around a stable point.
    The overall approach remains the same (as shown in Figure 9.4) except for the
    definition of past and future vectors which are now defined as follows


    ```

    $p(k) = [y^T(k-1) \ y^T(k-2) \ \cdots \ y^T(k-\ell)]^T$

    $f(k) = [y^T(k) \ y^T(k+1) \ \cdots \ y^T(k+\ell)]^T$

    ```'

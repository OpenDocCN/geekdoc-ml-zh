    > *Model training and validation*: Model training imply estimating the parameters
    of the chosen ML model, for example, the neuron weights in an ANN model. Model
    validation is employed for finding optimal values of model hyperparameters, for
    example, the number of neurons in the ANN model. At the end of this step, the
    coveted process model is obtained.


    Additional activities related to computation of health indicator and subsequent
    RUL estimation involved in fault prognosis are covered in Part 7 of the book which
    deals specifically with prognostic techniques for predictive maintenance applications.'
- md: '## 1.5 ML-based Plant Health Management Solution Deployment


    After you have developed a satisfactory PHM model, the real test of your solution
    lies in how well it is received by the end-users. The end-users could be reliability
    personnel/engineers at the local plant sites or the central team of experts remotely
    supervising the plants. Figure 1.10 below shows a (simplified) common architecture
    for bringing your tool''s results to these end-users. As shown, the ML model could
    be setup to run on local PCs at every site or a central server machine/cloud resource⁵.
    Plant operators may access the tool''s results on the local control-room screens
    or via web browsers in case of centralized deployment. The web user interface
    could be either built using third-party visualization software (Tableau, Sisense,
    Power BI, etc.) or completely custom-built using front-end web frameworks like
    bootstrap.


    ![](img/cfcc9569b5e92ea115855752abddd75a_33_0.png)


    That is all it takes to deploy a ML-based PHM solution in a production environment.
    This concludes our quick attempt to impress upon you the importance of process
    monitoring and predictive maintenance in process industry. Hopefully, you also
    now have a good idea of what resources you have to achieve your PM/PdM goals and
    what it takes to build a PM/PdM solution.


    > ⁵ There exists a specialized branch of machine learning engineering, called
    MLOps (short for machine learning operations) that deals with reliable and scalable
    deployment of ML models in production.


    ## Summary


    In this chapter, we looked at the importance of plant health management for increasing
    process safety, reducing downtime costs, and increasing equipment life. We understood
    the meaning of process faults and abnormalities. We looked at the different stages
    of plant health management, familiarized ourselves with the factors that influence
    model selection, and looked at the different models available at our disposal
    to achieve the PHM goals. We also briefly looked at the generic workflow for process
    monitoring model development and understood how PM/PdM solutions are deployed
    in modern industrial settings. In the next chapter, we will take the first step
    and learn about the environment we will use to execute our Python scripts containing
    ML code for PHM.


    # Chapter 2

    ## The Scripting Environment


    In the previous chapter, we studied the various aspects of machine learning-based
    process monitoring and predictive maintenance. In this chapter, we will quickly
    familiarize ourselves with the Python language and the scripting environment that
    we will use to write ML codes, execute them, and see results. This chapter won’t
    make you an expert in Python but will give you enough understanding of the language
    to get you started and help understand the several in-chapter code implementations
    in the upcoming chapters. If you already know the basics of Python, have a preferred
    code editor, and know the general structure of a typical ML script, then you can
    skip to Chapter 3.


    The ease of using and learning Python, along with the availability of a plethora
    of open-access useful packages developed by the user-community over the years,
    has led to immense popularity of Python. In recent years, development of specialized
    libraries for machine and deep learning has made Python the default language of
    choice among ML community. These advancements have greatly lowered the entry barrier
    into the world of machine learning for new users.


    With this chapter, you are putting your first foot into the ML world. Specifically,
    the following topics are covered:


    - Introduction to Python language

    - Introduction to Spyder and Jupyter, two popular code editors

    - Overview of Python data structures and scientific computing libraries


    ## 2.1 Introduction to Python


    In simple terms, Python is a high-level general-purpose computer programming language
    that can be used, amongst others, for application development and scientific computing.
    If you have used other computer languages like Visual Basic, C#, C++, Java, Javascript,
    then you would understand the fact that Python is an interpreted and dynamic language.
    If not, then think of Python as just another name in the list of computer programming
    languages. What is more important is that Python offers several features that
    sets it apart from the rest of the pack making it the most preferred language
    for machine learning. Figure 2.1 lists some of these features. Python provides
    all the tools to conveniently carry out all steps of an ML-based PM/PdM project,
    namely, data collection, data pre-processing, data exploration, ML modeling, visualization,
    and solution deployment to end-users. In addition, several freely available tools
    make writing Python code very easy⁶.


    ![](img/cfcc9569b5e92ea115855752abddd75a_36_0.png)


    ### Installing Python


    One can download official and the latest version of Python from the *python.com*
    website. However, the most convenient way to install and use Python is to install
    Anaconda (*www.anaconda.com*) which is an open-source distribution of Python.
    Along with the core Python, Anaconda installs a lot of other useful packages.
    Anaconda comes with a GUI called Anaconda Navigator (Figure 2.2) from where you
    can launch several other tools.


    ⁶ Most of the content of this chapter is like that of Chapter 2 of the book ‘Machine
    Learning in Python for Process Systems Engineering’ and have been re-produced
    with appropriate changes to maintain standalone nature of this book.


    ![](img/cfcc9569b5e92ea115855752abddd75a_37_0.png)


    Figure 2.2: Anaconda Navigator GUI


    ### Running/Executing Python code


    Once Anaconda is installed, you can write your code in any text editor (like Notepad),
    save it in .py format, and then run via Anaconda command terminal. However, a
    convenient alternative is to use IDEs (integrated development environments). IDEs
    not just allow creating .py scripts, but also execute them on the fly, i.e., we
    can make code edits and see the results immediately, all within an integrated
    environment. Among the several available Python IDEs (PyCharm, VS Code, Spyder,
    etc.), we found Spyder to be the most convenient and functionality-rich, and therefore
    is discussed in the next section.


    Jupyter Notebooks are another very popular way of writing and executing Python
    code. These notebooks allow combining code, execution results, explanatory text,
    multimedia resources in a single document. As you can imagine, this makes saving
    and sharing complete data analysis very easy.


    In the next section, we will provide you with enough familiarity on Spyder and
    Jupyter so that you can start using them.


    ## 2.2 Introduction to Spyder and Jupyter


    Figure 2.3 shows the interface⁷ (and its different components) that comes up when
    you launch Spyder. These are the 3 main components:


    - *Editor:* You can type and save your code here. Clicking ▶ button executes the
    code in the active editor tab.

    - *Console:* Script execution results are shown here. It can also be used for
    executing Python commands and interact with variables in the workspace.

    - *Variable explorer:* All the variables generated by running editor scripts or
    console are shown here and can be interactively browsed.


    ![](img/cfcc9569b5e92ea115855752abddd75a_38_0.png)


    Like any IDE, Spyder offers several features. You can divide your script into
    cells and execute only any selected cell if you choose to (by pressing Ctrl +
    Enter buttons). Intellisense allows you to autocomplete your code by pressing
    Tab key. Extensive debugging functionalities make troubleshooting easier. These
    are only some of the features available in Spyder. You are encouraged to explore
    the different options (such as pausing and canceling script execution, clearing
    out variable workspace, etc.) on the Spyder GUI.


    > ⁷ If you have used MATLAB, you will find the interface very familiar.


    With Spyder, you have to run your script again to see execution results if you
    close and reopen your script. In contrast to this, consider the Jupyter interface
    in Figure 2.4. Note that the Jupyter interface opens in a browser. We can save
    the shown code, the execution outputs, and explanatory text/figures as a (.ipnb)
    file and have them remain intact when we reopen the file in Jupyter Notebook.


    ![](img/cfcc9569b5e92ea115855752abddd75a_39_0.png)


    You can designate any input cell as a code or markdown (formatted explanatory
    text). You can press Shift + Enter keys to execute any active cell. All the input
    cells can be executed via the *Cell* menu.


    This completes our quick overview of Spyder and Jupyter interface. You can choose
    either of them for working through the codes in the rest of the book.'
  mdcn: '## 1.5 基于机器学习的工厂健康管理解决方案部署


    在开发出令人满意的PHM模型后，您解决方案的真正考验在于最终用户的接受程度。最终用户可能是本地工厂现场的可靠性人员/工程师，或是远程监控工厂的中央专家团队。下图1.10展示了将您工具的结果呈现给这些最终用户的（简化）通用架构。如图所示，机器学习模型可以设置为在每个站点的本地PC上运行，或在中央服务器机器/云资源⁵上运行。工厂操作员可以在本地控制室屏幕上访问工具结果，或在集中式部署的情况下通过网络浏览器访问。网络用户界面可以使用第三方可视化软件（Tableau、Sisense、Power
    BI等）构建，也可以使用bootstrap等前端网络框架完全定制构建。


    ![](img/cfcc9569b5e92ea115855752abddd75a_33_0.png)


    这就是在生产环境中部署基于机器学习的PHM解决方案所需的全部工作。至此，我们快速尝试向您强调了过程监控和预测性维护在过程工业中的重要性。希望您现在也对实现PM/PdM目标所需的资源以及构建PM/PdM解决方案的要求有了清晰的认识。


    > ⁵ 存在一个专门的机器学习工程分支，称为MLOps（机器学习运维的缩写），它处理机器学习模型在生产中的可靠且可扩展的部署。


    ## 总结


    在本章中，我们探讨了工厂健康管理对于提高过程安全性、减少停机成本和延长设备寿命的重要性。我们理解了过程故障和异常的含义。我们了解了工厂健康管理的不同阶段，熟悉了影响模型选择的因素，并审视了可用于实现PHM目标的不同模型。我们还简要介绍了过程监控模型开发的通用工作流程，并理解了PM/PdM解决方案在现代工业环境中的部署方式。在下一章中，我们将迈出第一步，了解用于执行包含PHM机器学习代码的Python脚本的环境。


    # 第2章

    ## 脚本环境


    在上一章中，我们研究了基于机器学习的过程监控和预测性维护的各个方面。在本章中，我们将快速熟悉Python语言以及我们将用于编写机器学习代码、执行代码并查看结果的脚本环境。本章不会让您成为Python专家，但会让您对这门语言有足够的理解，以便入门并帮助理解后续章节中的多个代码实现。如果您已经了解Python基础知识，有首选的代码编辑器，并且知道典型机器学习脚本的一般结构，那么您可以直接跳到第3章。


    Python易于使用和学习，加上多年来用户社区开发的大量开放访问的有用包，使其获得了巨大的普及。近年来，用于机器学习和深度学习的专用库的开发，使Python成为机器学习社区的默认首选语言。这些进步大大降低了新用户进入机器学习世界的门槛。


    通过本章，您将迈出进入机器学习世界的第一步。具体涵盖以下主题：


    - Python语言简介

    - Spyder和Jupyter简介，这两款流行的代码编辑器

    - Python数据结构和科学计算库概述


    ## 2.1 Python简介


    简单来说，Python是一种高级通用计算机编程语言，可用于应用开发和科学计算等。如果您使用过其他计算机语言，如Visual Basic、C#、C++、Java、Javascript，那么您会理解Python是一种解释型和动态语言。如果没有，那么可以将Python视为计算机编程语言列表中的另一个名称。更重要的是，Python提供了多项特性，使其在众多语言中脱颖而出，成为机器学习的首选语言。图2.1列出了一些这样的特性。Python提供了所有工具，可以方便地执行基于机器学习的PM/PdM项目的所有步骤，即数据收集、数据预处理、数据探索、机器学习建模、可视化以及向最终用户部署解决方案。此外，一些免费可用的工具使编写Python代码变得非常容易⁶。


    ![](img/cfcc9569b5e92ea115855752abddd75a_36_0.png)


    ### 安装Python


    可以从 *python.com* 网站下载官方最新版本的Python。然而，安装和使用Python最方便的方法是安装Anaconda (*www.anaconda.com*)，这是一个开源的Python发行版。除了核心Python，Anaconda还安装了许多其他有用的包。Anaconda附带一个名为Anaconda
    Navigator的图形用户界面（图2.2），您可以从那里启动多个其他工具。


    ⁶ 本章大部分内容与《过程系统工程中的Python机器学习》一书第2章内容相似，并已进行适当修改以保持本书的独立性。


    ![](img/cfcc9569b5e92ea115855752abddd75a_37_0.png)


    图2.2：Anaconda Navigator图形用户界面


    ### 运行/执行Python代码


    安装Anaconda后，您可以在任何文本编辑器（如记事本）中编写代码，将其保存为.py格式，然后通过Anaconda命令终端运行。然而，一个方便的替代方法是使用IDE（集成开发环境）。IDE不仅允许创建.py脚本，还可以即时执行它们，即我们可以在集成环境中进行代码编辑并立即查看结果。在众多可用的Python
    IDE（PyCharm、VS Code、Spyder等）中，我们发现Spyder最方便且功能丰富，因此将在下一节中讨论。


    Jupyter Notebooks是编写和执行Python代码的另一种非常流行的方式。这些笔记本允许将代码、执行结果、解释性文本和多媒体资源组合在一个文档中。可以想象，这使得保存和共享完整的数据分析变得非常容易。


    在下一节中，我们将为您提供足够的Spyder和Jupyter知识，以便您开始使用它们。


    ## 2.2 Spyder和Jupyter简介


    图2.3显示了启动Spyder时出现的界面⁷（及其不同组件）。主要有3个组件：


    - *编辑器：* 您可以在此输入和保存代码。单击▶按钮可执行活动编辑器选项卡中的代码。

    - *控制台：* 脚本执行结果显示在此处。它也可用于执行Python命令并与工作区中的变量进行交互。

    - *变量资源管理器：* 运行编辑器脚本或控制台生成的所有变量都显示在此处，并且可以交互式浏览。


    ![](img/cfcc9569b5e92ea115855752abddd75a_38_0.png)


    与任何IDE一样，Spyder提供了多项功能。您可以将脚本分成单元格，并仅执行任何选定的单元格（通过按Ctrl + Enter键）。Intellisense允许您通过按Tab键自动完成代码。广泛的调试功能使故障排除更容易。这些只是Spyder中可用的部分功能。鼓励您探索Spyder图形用户界面的不同选项（例如暂停和取消脚本执行、清除变量工作区等）。


    > ⁷ 如果您使用过MATLAB，您会发现界面非常熟悉。


    使用Spyder时，如果您关闭并重新打开脚本，则必须再次运行脚本才能看到执行结果。与此相反，考虑图2.4中的Jupyter界面。请注意，Jupyter界面在浏览器中打开。我们可以将显示的代码、执行输出和解释性文本/图形保存为(.ipnb)文件，并在Jupyter
    Notebook中重新打开文件时保持它们不变。


    ![](img/cfcc9569b5e92ea115855752abddd75a_39_0.png)


    您可以将任何输入单元格指定为代码或markdown（格式化的解释性文本）。您可以按Shift + Enter键执行任何活动单元格。所有输入单元格都可以通过*Cell*菜单执行。


    至此，我们快速概述了Spyder和Jupyter界面。您可以选择其中任何一个来完成本书其余部分的代码实践。'

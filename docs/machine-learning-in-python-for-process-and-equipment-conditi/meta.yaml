    \  value\n  100  1    10\n  101  1     8\n  102  1     6\n\nprint(df.loc[101])\
    \ # returns 2nd row as a series; can provide a list for multiple rows selection\n\
    print(df.iloc[1]) # integer location-based selection; same result as above\n\n\
    # individual item selection\nprint(df.loc[101, 'value']) # returns 8\nprint(df.iloc[1,\

- md: '## Chapter 3


    ### Exploratory Data Analysis: Getting to Know Your Data Better


    Getting to know your enemy is a time-tested strategy for emerging victorious in
    any battle. For developing a satisfactory process monitoring model, this strategy
    translates to ‘knowing your process data well’. This task is formally termed as
    exploratory data analysis (EDA). Most of the machine learning models make some
    assumptions regarding the distribution (e.g., Gaussian vs uniform distribution)
    and characteristics (e.g., dynamic vs steady state nature) of the data they operate
    upon. Therefore, it only serves us well investing some time in EDA so that the
    consistency between our chosen model’s assumptions and the characteristics of
    process data at hand can be ascertained. Failure to do so will lead to high rate
    of false alerts and/or missed/delayed fault detection which will most likely lead
    to ‘death’ of your monitoring tool due to loss of user confidence!


    In this chapter, we will learn how to assess the presence of four important properties
    in a dataset, viz, nonlinearity, non-Gaussianity, dynamics, and multimodality.
    We will motivate the study of these properties by understanding their impact on
    process monitoring performance. We will especially focus on techniques that render
    themselves convenient for implementation in an automated setting. As is obvious,
    the concepts learnt in this chapter will help you get better at correct model
    selection. Specifically, the following topics are covered:


    - Impact of non-ideal data properties on fault detection performance

    - Techniques for assessing nonlinearity, non-Gaussianity, dynamic, and multimodality

    - EDA of Tennessee Eastman Process dataset


    ### 3.1 Why Exploratory Data Analysis Matters?


    Ask any expert process data scientist about some advice to get better at ML model
    selection and you will very likely get the suggestions to understand your data
    better. It’s true, you cannot over-exaggerate the importance of gathering as many
    insights about the data as possible before getting your hands dirty. Most of the
    process monitoring methodologies make assumptions about the data characteristics
    and therefore, it is imperative to ascertain these characteristics in our process
    data to ensure selection of appropriate monitoring model. Let’s consider the classical
    PCA model (inarguably the most popular model for monitoring multivariate industrial
    processes): the ideal dataset is linear, Gaussian distributed, single-clustered,
    and with no dynamics; Figure 3.1 uses simple datasets to illustrate what the deviations
    from these ideal characteristics look like.


    ![](img/cfcc9569b5e92ea115855752abddd75a_53_0.png)


    To further motivate the discussions in the rest of the chapter, let’s take a quick
    look at the impacts the non-ideal data characteristics can have on PCA performance.


    #### Effect of nonlinearity


    In an ideal PCA-compatible dataset, the variables are linearly related which allows
    the standard PCA method to find the lower-dimensional manifold along which the
    data is distributed. However, as can be seen below, PCA fails to transform the
    original 2D dataset to a 1D feature space even though it is apparent that the
    original data points lie along a curved manifold. This severely limits the ability
    of standard PCA to detect faulty samples.


    ![](img/cfcc9569b5e92ea115855752abddd75a_54_0.png)


    #### Effect of non-Gaussianity


    Not many process modelers pay attention to the Gaussianity of process dataset.
    The presence of non-Gaussianity can severely impact the performance of many ML
    models. Illustration below shows why standard PCA-based fault detection⁹ may fail
    for non-Gaussian data.


    ![](img/cfcc9569b5e92ea115855752abddd75a_54_1.png)


    #### Effect of dynamics


    While PCA excels at extracting out static relationships among process variables,
    it fails to capture any dynamic relationship. For example, consider the following
    process and the corresponding data distribution in the 2D measurement space.


    ![](img/cfcc9569b5e92ea115855752abddd75a_54_2.png)


    ⁹ Do not worry if you do not understand the PCA jargon. You will become familiar
    with these terms in Chapter 7.


    #### Effect of multi-clustered distribution


    Standard PCA-based fault detection assumes that the data is distributed within
    a single cluster which enables imposition of a single elliptical boundary around
    the data in the PC space. However, as the illustration below shows, this assumption
    can lead to missed alerts if data is multi-clustered.


    ![](img/cfcc9569b5e92ea115855752abddd75a_55_0.png)


    Don’t worry, if the PCA-specific jargon in the above illustrations were not immediately
    clear to you. You may re-visit this section after we finish the study of PCA technique
    in Chapter 7. Next, we will take each of the four non-ideal characteristics and
    learn how to quickly assess its presence in a multivariable dataset.


    > It is worthwhile to mention two open-source Python libraries that provide modules
    for EDA of process data. KydLIB¹⁰ (‘know your data’ library) developed by Melo
    et al. in 2022¹¹ provides several routines which, in the authors’ words, are ‘specially
    designed to work with time series data typically obtained from process system
    engineering applications’. SPA¹² (smart process analytics) software developed
    by Sun and Braatz¹³ in 2021 is designed for automated model selection for predictive
    modeling of manufacturing data.


    ### 3.2 Nonlinearity Assessment Techniques


    If any two variables in a multivariable dataset are nonlinearly related, then
    the dataset is said to possess nonlinear characteristics. Therefore, one may look
    at scatter plots between each pair of variables to assess nonlinearity, but this,
    expectedly, becomes cumbersome for high-dimensional dataset. One common recourse
    is to use Pearson correlation coefficient ($\rho$) which quantifies the linear
    dependency between two variables. As is commonly known, $\rho \in [-1, 1]$ where
    values of -1 and 1 signify perfect linear correlation. A drawback, however, is
    that $\rho = 0$ only indicates no linear relationship and the variables could
    still be nonlinearly related. Figure 3.2 shows some illustrative scenarios.


    ![](img/cfcc9569b5e92ea115855752abddd75a_56_0.png)


    A popular metric to quantify generic dependency (both linear and nonlinear) is
    mutual information (MI), which is defined as


    $I(x, y) = H(x) + H(y) - H(x, y)$


    Where $H(x)$ is information entropy of variable $x$ and $H(x, y)$ is the joint
    information entropy between $x$ and $y$. The *ennemi*$^{14}$ Python package allows
    convenient computation of MI; the package provides a normalized index termed as
    MI correlation coefficient which varies between 0 (no relationship) and 1, and
    is defined as


    $\rho_{I(x,y)} = \sqrt{1 - e^{-2I(x,y)}}$


    $^{14}$ https://pypi.org/project/ennemi/


    ![](img/cfcc9569b5e92ea115855752abddd75a_57_0.png)


    The MI correlation coefficient still does not tell us if two variables are strictly
    nonlinearly related. Towards this end, Zhang et al.¹⁵ provided a useful approach
    combining $\rho$ and $\rho_I$ to generate a nonlinearity coefficient¹⁶, $r_{x,y}$,
    defined as


    $r_{x,y} = \rho_{I(x,y)} (1 - |\rho_{x,y}|)$


    $\in [0,1]$

    $= 1 \Rightarrow x \text{ and } y \text{ have strong nonlinear relationship}$

    $= 0 \Rightarrow x \text{ and } y \text{ have no nonlinear relationship}$


    Let us concretize our understanding through a synthetic example.


    > ¹⁵ Zhang et al., A Novel Strategy of the Data Characteristics Test for Selecting
    a Process Monitoring Method Automatically. *Industrial & Engineering Chemistry
    Research*, 2016

    ¹⁶ $\rho_{I(x,y)}$ (and, therefore, $r_{x,y}$) may show near-zero negative values
    (https://polsys.github.io/ennemi/potential-issues.html) which can be interpreted
    as zero.


    #### Example 3.1: Consider the following three-variable system


    $x_1 = t + e_1$

    $x_2 = t^3 - 3t + e_2$

    $x_3 = -t^4 + 3t^2 + e_3$


    ![](img/cfcc9569b5e92ea115855752abddd75a_58_0.png)


    $t \in (0,2]$ is sampled uniformly. Let''s assess the system''s nonlinearity.
    We will start with importing the required packages.


    ```python

    # import required packages

    import numpy as np, matplotlib.pyplot as plt

    from ennemi import pairwise_corr

    ```


    ```python

    # compute linear and Nonlinear correlation coefficients

    data = np.hstack((x1,x2,x3)) # check online code to see how x1, x2, x3 vectors
    are generated

    rho_xy = np.corrcoef(data, rowvar=False) # pair-wise linear correlation coefficients

    rho_l_xy = pairwise_corr(data) # pair-wise normalized MI

    rxy = rho_l_xy*(1-np.abs(rho_xy)) # pair-wise nonlinear correlation coefficients

    ```


    $r_{x,y}$

    $x_1 \begin{bmatrix} nan & 0.61 & 0.78 \\ 0.61 & nan & 0.06 \\ 0.78 & 0.06 & nan
    \end{bmatrix}$

    $x_1 \quad x_2 \quad x_3$


    $\rho_{x,y}$

    $x_1 \begin{bmatrix} 1 & 0.37 & -0.2 \\ 0.37 & 1 & -0.94 \\ -0.2 & -0.94 & 1 \end{bmatrix}$

    $x_1 \quad x_2 \quad x_3$


    As expected, the nonlinearity matrix indicates significant nonlinearity in the
    system (due to high nonlinearity coefficient values for the $x_1$-$x_2$ and $x_1$-$x_3$
    pairs). The scatter plots below clearly corroborate this and also clarify why
    $x_2$-$x_3$ pair appears as ''linearly'' related.


    ![](img/cfcc9569b5e92ea115855752abddd75a_58_1.png)


    For the entire dataset, Zhang et al. also proposed an overall nonlinear correlation
    coefficient defined as


    $r = \sqrt{\frac{\sum_{i,j=1}^m r_{i,j}^2}{m^2-m}}$ ; m is number of variables


    if no variable pair has nonlinear relationship, then $r = 0$

    if all variable pairs have strong nonlinear relationship, then $r \rightarrow
    1$'
  mdcn: '## 第三章


    ### 探索性数据分析：更好地了解你的数据


    知己知彼，百战不殆。要开发一个令人满意的流程监控模型，这一策略就转化为“充分了解你的流程数据”。这项任务在形式上被称为探索性数据分析（EDA）。大多数机器学习模型对其处理的数据的分布（例如，高斯分布与均匀分布）和特性（例如，动态特性与稳态特性）都做出了一些假设。因此，投入一些时间进行EDA是明智的，这样我们才能确定所选模型的假设与手头流程数据的特性之间的一致性。如果做不到这一点，将导致高误报率和/或漏检/延迟的故障检测，这很可能因为用户信心丧失而导致你的监控工具“消亡”！


    在本章中，我们将学习如何评估数据集中四个重要特性的存在情况，即非线性、非高斯性、动态性和多模态性。我们将通过理解这些特性对流程监控性能的影响来激发对这些特性的研究。我们将特别关注那些便于在自动化环境中实施的技术。显而易见，本章学到的概念将帮助你更好地进行正确的模型选择。具体涵盖以下主题：


    - 非理想数据特性对故障检测性能的影响

    - 评估非线性、非高斯性、动态性和多模态性的技术

    - 田纳西-伊士曼过程数据集的EDA


    ### 3.1 为什么探索性数据分析很重要？


    向任何专业的流程数据科学家请教如何更好地进行机器学习模型选择，你很可能会得到“更好地了解你的数据”的建议。确实，在动手之前，尽可能多地收集关于数据的见解，其重要性怎么强调都不为过。大多数流程监控方法都对数据特性做出假设，因此，必须确定我们流程数据的这些特性，以确保选择合适的监控模型。让我们考虑经典的PCA模型（无可争议地是监控多变量工业过程最流行的模型）：理想的数据集是线性的、高斯分布的、单簇的且没有动态性；图3.1使用简单的数据集说明了偏离这些理想特性的样子。


    ![](img/cfcc9569b5e92ea115855752abddd75a_53_0.png)


    为了进一步激发本章其余部分的讨论，让我们快速看看非理想数据特性可能对PCA性能产生的影响。


    #### 非线性的影响


    在理想的PCA兼容数据集中，变量之间是线性相关的，这使得标准PCA方法能够找到数据分布的低维流形。然而，如下所示，即使原始数据点明显沿着一个弯曲的流形分布，PCA也无法将原始2D数据集转换为1D特征空间。这严重限制了标准PCA检测故障样本的能力。


    ![](img/cfcc9569b5e92ea115855752abddd75a_54_0.png)


    #### 非高斯性的影响


    许多过程建模者并不关注过程数据集的高斯性。非高斯性的存在会严重影响许多机器学习模型的性能。下面的图示说明了为什么基于标准PCA的故障检测⁹可能对非高斯数据失效。


    ![](img/cfcc9569b5e92ea115855752abddd75a_54_1.png)


    #### 动态性的影响


    虽然PCA擅长提取过程变量之间的静态关系，但它无法捕捉任何动态关系。例如，考虑以下过程及其在2D测量空间中的相应数据分布。


    ![](img/cfcc9569b5e92ea115855752abddd75a_54_2.png)


    ⁹ 如果你不理解PCA术语，请不要担心。你将在第7章中熟悉这些术语。


    #### 多簇分布的影响


    基于标准PCA的故障检测假设数据分布在单个簇内，这使得可以在PC空间中围绕数据施加单个椭圆边界。然而，如下图所示，如果数据是多簇的，这个假设可能导致漏报。


    ![](img/cfcc9569b5e92ea115855752abddd75a_55_0.png)


    如果上述图示中的PCA特定术语对你来说不立即清楚，请不要担心。在我们完成第7章的PCA技术学习后，你可以重新阅读本节。接下来，我们将逐一探讨这四种非理想特性，并学习如何快速评估它们在多变量数据集中的存在情况。


    > 值得一提的是两个提供流程数据EDA模块的开源Python库。由Melo等人于2022年开发的KydLIB¹⁰（“了解你的数据”库）提供了几个例程，用作者的话说，这些例程“专门设计用于处理通常从过程系统工程应用中获得的时间序列数据”。由Sun和Braatz于2021年开发的SPA¹²（智能过程分析）软件旨在为制造数据的预测建模进行自动化模型选择。


    ### 3.2 非线性评估技术


    如果多变量数据集中的任何两个变量之间存在非线性关系，则称该数据集具有非线性特性。因此，可以通过查看每对变量之间的散点图来评估非线性，但正如预期的那样，这对于高维数据集来说变得繁琐。一种常见的解决方法是使用皮尔逊相关系数（$\rho$），它量化了两个变量之间的线性依赖性。众所周知，$\rho
    \in [-1, 1]$，其中-1和1的值表示完全线性相关。然而，一个缺点是$\rho = 0$仅表示没有线性关系，变量之间仍然可能存在非线性关系。图3.2展示了一些说明性场景。


    ![](img/cfcc9569b5e92ea115855752abddd75a_56_0.png)


    一个量化通用依赖性（包括线性和非线性）的流行指标是互信息（MI），其定义为


    $I(x, y) = H(x) + H(y) - H(x, y)$


    其中$H(x)$是变量$x$的信息熵，$H(x, y)$是$x$和$y$之间的联合信息熵。*ennemi*$^{14}$ Python包允许方便地计算MI；该包提供了一个称为MI相关系数的归一化指数，其值在0（无关系）和1之间变化，定义为


    $\rho_{I(x,y)} = \sqrt{1 - e^{-2I(x,y)}}$


    $^{14}$ https://pypi.org/project/ennemi/


    ![](img/cfcc9569b5e92ea115855752abddd75a_57_0.png)


    MI相关系数仍然不能告诉我们两个变量是否严格非线性相关。为此，Zhang等人¹⁵提供了一种结合$\rho$和$\rho_I$的有用方法来生成非线性系数¹⁶，$r_{x,y}$，定义为


    $r_{x,y} = \rho_{I(x,y)} (1 - |\rho_{x,y}|)$


    $\in [0,1]$

    $= 1 \Rightarrow x \text{ 和 } y \text{ 具有强非线性关系}$

    $= 0 \Rightarrow x \text{ 和 } y \text{ 没有非线性关系}$


    让我们通过一个合成示例来具体化我们的理解。


    > ¹⁵ Zhang等人，A Novel Strategy of the Data Characteristics Test for Selecting a
    Process Monitoring Method Automatically. *Industrial & Engineering Chemistry Research*,
    2016

    ¹⁶ $\rho_{I(x,y)}$（因此，$r_{x,y}$）可能显示接近零的负值（https://polsys.github.io/ennemi/potential-issues.html），这可以解释为零。


    #### 示例 3.1：考虑以下三变量系统


    $x_1 = t + e_1$

    $x_2 = t^3 - 3t + e_2$

    $x_3 = -t^4 + 3t^2 + e_3$


    ![](img/cfcc9569b5e92ea115855752abddd75a_58_0.png)


    $t \in (0,2]$ 是均匀采样的。让我们评估系统的非线性。我们将从导入所需的包开始。


    ```python

    # import required packages

    import numpy as np, matplotlib.pyplot as plt

    from ennemi import pairwise_corr

    ```


    ```python

    # compute linear and Nonlinear correlation coefficients

    data = np.hstack((x1,x2,x3)) # check online code to see how x1, x2, x3 vectors
    are generated

    rho_xy = np.corrcoef(data, rowvar=False) # pair-wise linear correlation coefficients

    rho_l_xy = pairwise_corr(data) # pair-wise normalized MI

    rxy = rho_l_xy*(1-np.abs(rho_xy)) # pair-wise nonlinear correlation coefficients

    ```


    $r_{x,y}$

    $x_1 \begin{bmatrix} nan & 0.61 & 0.78 \\ 0.61 & nan & 0.06 \\ 0.78 & 0.06 & nan
    \end{bmatrix}$

    $x_1 \quad x_2 \quad x_3$


    $\rho_{x,y}$

    $x_1 \begin{bmatrix} 1 & 0.37 & -0.2 \\ 0.37 & 1 & -0.94 \\ -0.2 & -0.94 & 1 \end{bmatrix}$

    $x_1 \quad x_2 \quad x_3$


    正如预期的那样，非线性矩阵表明系统中存在显著的非线性（由于$x_1$-$x_2$和$x_1$-$x_3$对的非线性系数值很高）。下面的散点图清楚地证实了这一点，并且也阐明了为什么$x_2$-$x_3$对呈现“线性”相关。


    ![](img/cfcc9569b5e92ea115855752abddd75a_58_1.png)


    对于整个数据集，Zhang等人还提出了一个整体非线性相关系数，定义为


    $r = \sqrt{\frac{\sum_{i,j=1}^m r_{i,j}^2}{m^2-m}}$ ; m 是变量数量


    如果没有变量对具有非线性关系，则 $r = 0$

    如果所有变量对都具有强非线性关系，则 $r \rightarrow 1$'

  md: "# Determining the number of clusters via elbow method\n\nOne of the shortcomings\
    \ in k-means methodology is the need to specify the number of clusters which is\
    \ not known a priori for large process datasets. However, we can use the elbow\
    \ method to overcome this issue. For k-means, the method entails computing the\
    \ cluster inertia or SSE for different number ($K$) of clusters. Expectedly, when\
    \ $K$ increases, SSE decreases as data-points get closer to their assigned centroids.\
    \ The value of $K$ where only minor improvement in SSE occurs upon increasing\
    \ $K$ can be regarded as an optimal value. Figure 11.8 shows than $K = 3$ is a\
    \ good choice for metal etch dataset.\n\n```\n# determining number of clusters\
    \ via elbow method\nSSEs = []\nfor n_cluster in range(1, 10):\n    kmeans = KMeans(n_clusters\
    \ = n_cluster, random_state = 100).fit(score_train)\n    SSEs.append(kmeans.inertia_)\n\
    \nplt.figure()\nplt.plot(range(1,10), SSEs, marker='o')\nplt.xlabel('Number of\
    \ clusters')\nplt.ylabel('SSEs')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_201_0.png)\n\
    \nFigure 11.8: Cluster inertias for different number of clusters for metal-etch\
    \ dataset\n\n> Determining the number of clusters or local models should not be\
    \ taken lightly. We saw in Figure 11.1 that less than optimal number of clusters\
    \ leads to low soft sensing accuracy and high frequency of missing alarms. On\
    \ the other hand, using too many clusters increases the number of estimated parameters\
    \ and consequently, the convergence time. Too many clusters also lead to overfitting,\
    \ resulting in high frequency of false alarms and low soft sensing accuracy."

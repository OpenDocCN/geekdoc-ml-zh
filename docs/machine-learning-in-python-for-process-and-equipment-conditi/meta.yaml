  md: '# Why Gaussianity is accorded so much importance


    Illustration below shows the Gaussian distributions in 1D and 2D measurement space.
    Most of us are familiar with such histograms/distribution. But what is so special
    about these Gaussian distributed data?


    ![](img/cfcc9569b5e92ea115855752abddd75a_60_0.png)


    As shown in the expressions above, Gaussian signals are completely characterized
    by only two parameters, mean ($\mu$) and covariance ($\sigma^2/\Sigma$), and therefore,
    are easy to describe and work with. Fortunately, most industrial processes operate
    around some optimal state and exhibit natural-cause Gaussian variations under
    the influence of random process disturbances. Therefore, many traditional MSPM
    and SPC techniques assume Gaussianity and correspondingly, many results established
    in their literature are valid strictly for Gaussian processes.


    Once the Mahalanobis distances are available, the empirical cumulative distribution
    function (CDF) is compared against the CDF of the expected $F$ distribution. The
    algorithm below summarizes the approach.'
  merge: -1
  pgno: 60
- img_proc: true
  md: "# Algorithm: Multivariate Gaussianity test based on Mahalanobis distances\n\
    \n+   Generate fractile-fractile plot of statistic $D$'s empirical distribution\
    \ and expected $F$ distribution\n- Values of D are sorted such that $D_t: D_{(1)}\
    \ \\leq D_{(2)} \\leq \\cdots \\leq D_{(N)}$\n- Empirical CDF of $D_t$ can be\
    \ described as $CDF(D_{(t)}) \\approx \\frac{t-0.5}{N} = r_t \\quad (t = 1, 2,\
    \ \\cdots, N)$\n  Here, $D_{(t)}$ is the fractile corresponding to probability\
    \ $r_t$\n- The fractile of expected $F$ distribution corresponding to probability\
    \ $r_t$ is obtained as follows\n  $F_t \\approx \\frac{m(N^2-1)}{N(N-m)} F_{r_t}(m,\
    \ N-m)$\n\n![](img/cfcc9569b5e92ea115855752abddd75a_61_0.png)\n\n+   Plot $D_{(t)}$\
    \ vs $F_t$ for $t = 1, 2, \\cdots, N$ and fit a straight line. If data follows\
    \ multivariate Gaussianity then the fitted line should pass through origin with\
    \ slope equal to 1\n\n+   Perform statistical tests:\n- A significance test is\
    \ performed to check if linear relationship between $D_{(t)}$ vs $F_t$ is statistically\
    \ significant. The following condition is imposed\n  $\\frac{S}{\\bar{F}} < 0.15\
    \ \\Rightarrow \\text{linear fit is not rejected}$\n  $\\bar{F} = \\frac{1}{N}\
    \ \\sum F_t$\n  $S = \\sqrt{\\frac{SSE}{N-2}}$\n- If the above condition is met,\
    \ then the intercept and slope are compared against 0 and 1, respectively, via\
    \ the following conditions\n  $|intercept| < 0.05 * \\bar{F}$\n  $|slope - 1|\
    \ < 0.2$\n\n![](img/cfcc9569b5e92ea115855752abddd75a_61_1.png)\n\n+   If all the\
    \ above three conditions are met, then multivariate Gaussian distribution is assumed"
  merge: -1
  pgno: 61
- img_proc: true
  md: "The example below shows the implementation steps¹⁹ of the above algorithm.\n\
    \n# Example 3.2: Consider the following three-variable system\n\n$x_3 = x_1 +\
    \ x_2 + e$\n\n$x_1$ and $x_2 \\in [0,1]$ are sampled uniformly. Let's assess the\
    \ system's non-Gaussianity.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_62_0.png)\n\
    \n```\n# import required packages\nimport numpy as np, matplotlib.pyplot as plt\n\
    import scipy.spatial, scipy.stats\n```\n\n```\n# find data statistics\ndata =\
    \ np.vstack((x1,x2,x3)).T # check online code to see how x1, x2, x3 vectors are\
    \ generated\nN, m = data.shape[0], data.shape[1]\nmu, Scov = np.mean(data, axis=0),\
    \ np.cov(data, rowvar=False, ddof=1)\nScov_inv = np.linalg.pinv(Scov)\n```\n\n\
    ```\n# calculate D statistic and the fractiles\nD = np.array([scipy.spatial.distance.mahalanobis(data[i,:],\
    \ mu, Scov_inv)**2 for i in range(N)])\nDt, rt = np.sort(D), [(t-0.5)/N for t\
    \ in range(1,N+1)]\nFt = (m*(N**2-1)/(N*(N-m)))*np.array([scipy.stats.f.ppf(p,\
    \ m, N-m) for p in rt])\n```\n\n```\n# fit a straight line\nlinearFit = scipy.stats.linregress(Dt,\
    \ Ft)\nintercept, slope = linearFit[1], linearFit[0]\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_62_1.png)\n\
    \n```\n# perform significance tests\nFbar = np.mean(Ft)\nSfit = np.sqrt(((Ft-(intercept+slope*Dt))**2).sum()/(N-2))\n\
    Sfit_by_Fbar = Sfit/Fbar\nif Sfit_by_Fbar > 0.15:\n    gaussianity = False\nelse:\n\
    \    if np.abs(slope-1) < 0.2 and np.abs(intercept) < Fbar*0.05:\n        gaussianity\
    \ = True\n    else:\n        gaussianity = False\n```\n\n> This condition fails\
    \ ⇒ Gaussianity= False"

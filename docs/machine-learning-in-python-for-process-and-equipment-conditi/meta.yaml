    \ = X_scaler.transform(X_test)\nscores_test = kPCA.transform(X_test_scaled)\n\
    ```\n\n```python\n# compute Q statistics for test data\nN_test = X_test.shape[0]\n\
    Q_test = np.zeros((N_test,1))\nfor i in range(N_test):\n    Q_test[i] = np.dot(scores_test[i,:],\
    \ scores_test[i,:]) - np.dot(scores_test[i,:n_comp],\n                       \
    \                                       scores_test[i,:n_comp])\n```\n\n```python\n\
    # monitoring chart for test data\nplt.figure(), plt.plot(Q_test), plt.plot([1,len(Q_test)],[Q_CL,Q_CL],\
    \ color='red')\nplt.xlabel('Sample #'), plt.ylabel('Q (test data))\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_186_0.png)\n\
    \nHopefully, you now feel confident about being able to deploy a KPCA-based fault\
    \ detection system for nonlinear systems.\n\n## 10.3 Kernel PLS: An Introduction\n\
    \nKernel PLS is the nonlinear extension of conventional PLS to handle nonlinear\
    \ process data that exhibit significant nonlinearity. As shown in Figure 10.2\

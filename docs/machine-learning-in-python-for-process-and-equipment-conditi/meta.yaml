    RMS (and peak, P2P) are not capable of detecting faults during early stages. Kurtosis
    and skewness are more preferred for incipient faults. Kurtosis is a good indicator
    of an impulsive/spiky signal. Skewness quantifies the asymmetry of the distribution
    of the vibration signal amplitude. It is known that for a normally functioning
    machine, kurtosis and skewness are around 3 and 0, respectively. For faulty machines,
    kurtosis becomes higher than 3 and skewness deviate from 0 significantly. Note
    that kurtosis is known to be not suitable for very severe faults as its value
    decreases when the waveform becomes less impulsive.'
- md: '## Frequency domain features


    Although time domain features are easy to compute and interpret, a major shortcoming
    with them is that they do not provide clues regarding the underlying source of
    abnormal vibrations. Frequency domain features enjoy several advantages over time
    domain features. Abnormal frequencies show up with significant amplitudes in the
    vibration spectrum in the presence of faults. Frequency domain features are good
    indicators of both incipient and severe faults. Moreover, presence of specific
    frequency components provide direct clues regarding which component of a rotating
    machine has failed.


    When provided a vibration spectrum, one of the first thing an expert may look
    at is the presence of harmonic frequencies corresponding to the rotational speed
    of the machine. For example, if a machine is rotating at 3600 RPM (rotations per
    minute), then the amplitudes at 60 Hz (called 1X), 120 Hz (called 2X or second
    harmonic), and higher harmonics are extracted as features. You will see in the
    next chapter how these frequency components are useful for FDD. Analogous to Table
    1, Table 2 shows the common statistical features derived from vibration spectrum.
    Here, $Y(k)$ is the amplitude at the $k^{th}$ spectrum line and $f_k$ is the corresponding
    frequency for $k = 1,2, \cdots, K$.


    Sub-harmonics (0.5X, 0.25X, ...) are also used as useful features.


    ## Table 2: Frequency domain statistical features


    113 https://github.com/Oybek90/Machine_Learning_from_scratch/blob/main/frequency-domain-feature-extraction-methods.ipynb.

    Yaguo Lei, Intelligent Fault Diagnosis and Remaining Useful Life Prediction of
    Rotating Machinery.


    The first feature, mean of the spectrum, is the average of the amplitudes of all
    the frequencies in the spectrum. As fault severity increases, overall vibration
    energy goes up and so does $F_1$. Frequency center ($F_5$ or $F_c$) and root mean
    square frequency ($F_7$ or RMSF) are used to track the dominant frequencies in
    the spectrum. The peak frequencies (say, top 10) and their respective amplitudes
    are also commonly used for fault detection.


    > Impact of operating conditions


    Variations in machine load and running speed impact machine vibration characteristics
    such as overall vibration levels, amplitudes of specific frequency components,
    etc. Therefore, operating condition should be taken into account during interpretation
    of vibration features. Very often, a reference vibration signal and/or spectrum
    is recorded for different operational conditions and used later for FDD. Alternatively,
    operations conditions are used as additional variables for training ML models.


    ## Time-frequency domain features


    A commonly extracted time-frequency domain feature is mean peak frequency which
    is simply average of the peak frequencies at different time instances in the spectrogram.
    It is computed as shown below where $N_{\tau}$ is the number of segments used
    in SFTF.


    $$f_{peak}(\tau) = \underset{f}{\text{argmax}} S(\tau, f)$$

    $$f_{mean, peak} = \frac{\sum_{\tau} f_{peak}(\tau)}{N_{\tau}}$$


    Another common strategy is to extract frequency domain features from each FFT
    spectrum of the waterfall.


    > Fault prone components of a rotating machine such as gears and bearings have
    been well studied and their ‘frequencies of defect’ have been discovered and defined
    mathematically. These frequencies show up in spectrum when faults occur and therefore
    work quite well as diagnostic features. Readers are encouraged to see the work
    by Sim et al. titled ‘A Tutorial for Feature Engineering in the Prognostics and
    Health Management of Gears and Bearings’ (Applied Sciences, 2020).


    With this we have completed our study of the first phase of VCM which is summarizing
    complex waveforms from rotating machines into a bunch of features. These features
    are used for fault detection, fault classification, and fault prognosis as we
    will see in the upcoming chapters. Many more advanced techniques than what we
    have covered in this chapter have been devised for analysis of vibration signals.
    These techniques include, amongst others, envelope analysis, wavelet transforms,
    empirical mode decomposition, and Hilbert-Huang transform. Although we have only
    scratched the surface of the broad field of vibration signal processing, you now
    have the fundamentals in place to navigate this world confidently!


    ## Summary


    In this chapter, we acquainted ourselves with the basics of processing vibration
    signals as a precursor to building ML-based fault detection solutions. We studied
    the concept of vibration spectrum and understood how to generate the spectrum.
    We looked into some detail how to extract time domain, frequency domain, and time-frequency
    domain features. We will continue building upon this foundation and see how to
    utilize these features to detect faults in rotating machines.


    # Chapter 18


    ## Vibration-based Condition Monitoring: Fault Detection & Diagnosis


    Vibration-based condition monitoring was already a widely adopted technique in
    process industry long before ML craze took over the manufacturing world. The International
    Organization for Standardization (ISO) has come up with alarm limits for vibration
    RMS for different classes of rotating machines. Additionally, VCM researchers
    have worked diligently to discover the characteristics signatures of failures
    in different components of a rotating machines. Correspondingly, several rules
    of thumb and heuristics have been devised to pinpoint root causes of faults using
    vibration features. However, these heuristics do not cover all possible fault
    scenarios and a vibration expert is still required to conduct analysis and interpretation
    of vibration signal features. Fortunately, the advent of machine learning has
    made VCM more accessible to generic process data scientists.


    Several different types of ML models have been reported in VCM literature for
    fault classification, fault detection, and fault diagnosis. For example, fault
    detection applications have been built by using the whole spectrum (or waveform)
    as input to an autoencoder or spectrogram image as input to a CNN (convolutional
    neural network) model. ML models don the cap of a vibration expert to find the
    patterns in vibration signal, distinguish between NOC and abnormal vibrations,
    and discriminate between different fault conditions. In this chapter, we will
    look at one such implementation of ML-based VCM. Specifically, the following topics
    are covered


    - VCM workflow

    - Classical approaches for VCM

    - SVM-based fault classification of motors


    ## 18.1 VCM Workflow: Revisited


    Vibration signals contain indicators of machine faults. Previously, we saw the
    steps commonly taken to ‘amplify’ these indicators through judicious extraction
    of features. In this chapter, we will focus on how these features are used to
    make inferences regarding health of rotating machinery. Figure 18.1 shows some
    of the approaches commonly employed. The classical approaches include, amongst
    others, simply looking for the presence of harmonics in the spectrum and comparing
    individual features against ISO-recommended thresholds. In recent times, ML-based
    VCM is gradually becoming more popular. Any of the ML techniques that we have
    seen in the previous parts of the book can be employed.


    ![](img/cfcc9569b5e92ea115855752abddd75a_325_0.png)'
  mdcn: '## 频域特征


    尽管时域特征易于计算和解释，但其主要缺点在于无法提供异常振动根本来源的线索。频域特征相比时域特征具有多项优势。当存在故障时，异常频率会在振动频谱中以显著幅值显现。频域特征是早期故障和严重故障的良好指标。此外，特定频率分量的存在直接揭示了旋转机械哪个部件发生了故障。


    当获得振动频谱时，专家首先关注的通常是与机器转速对应的谐波频率是否存在。例如，若机器以3600 RPM（转/分钟）旋转，则60 Hz（称为1X）、120 Hz（称为2X或二次谐波）及更高次谐波的幅值会被提取为特征。下一章将展示这些频率分量如何用于故障检测与诊断（FDD）。与表1类似，表2展示了从振动频谱中提取的常见统计特征。其中，$Y(k)$表示第$k$条谱线的幅值，$f_k$为对应频率，$k
    = 1,2, \cdots, K$。


    次谐波（0.5X、0.25X等）也被用作有效特征。


    ## 表2：频域统计特征


    113 https://github.com/Oybek90/Machine_Learning_from_scratch/blob/main/frequency-domain-feature-extraction-methods.ipynb.

    Yaguo Lei, Intelligent Fault Diagnosis and Remaining Useful Life Prediction of
    Rotating Machinery.


    第一个特征——频谱均值，是频谱中所有频率幅值的平均值。随着故障严重程度增加，整体振动能量上升，$F_1$也随之增大。频率中心（$F_5$或$F_c$）和均方根频率（$F_7$或RMSF）用于追踪频谱中的主导频率。峰值频率（如前10个）及其对应幅值也常用于故障检测。


    > 工况影响


    机器负载和转速的变化会影响振动特性，如整体振动水平、特定频率分量的幅值等。因此，解读振动特征时应考虑运行工况。通常会为不同工况记录参考振动信号和/或频谱，用于后续故障检测与诊断。或者，将运行工况作为额外变量用于训练机器学习模型。


    ## 时频域特征


    一种常用的时频域特征是平均峰值频率，即频谱图中不同时间点峰值频率的平均值。其计算公式如下，其中$N_{\tau}$是短时傅里叶变换（SFTF）使用的分段数。


    $$f_{peak}(\tau) = \underset{f}{\text{argmax}} S(\tau, f)$$

    $$f_{mean, peak} = \frac{\sum_{\tau} f_{peak}(\tau)}{N_{\tau}}$$


    另一种常见策略是从瀑布图的每个FFT频谱中提取频域特征。


    > 旋转机械中易发生故障的部件（如齿轮和轴承）已被深入研究，其“缺陷频率”已被发现并数学定义。这些频率在故障发生时会在频谱中显现，因此作为诊断特征效果显著。建议读者参阅Sim等人的论文《齿轮和轴承预测与健康管理中的特征工程教程》（Applied
    Sciences, 2020）。


    至此，我们完成了振动状态监测（VCM）第一阶段的学习，即将旋转机械的复杂波形归纳为一系列特征。这些特征将用于故障检测、故障分类和故障预测，后续章节将详细展开。本章之外，还有更多先进技术可用于振动信号分析，包括但不限于包络分析、小波变换、经验模态分解和希尔伯特-黄变换。尽管我们仅触及振动信号处理广阔领域的皮毛，但您现在已具备基础，能够自信地探索这一领域！


    ## 总结


    本章我们学习了振动信号处理的基础知识，为构建基于机器学习的故障检测方案奠定基础。我们研究了振动频谱的概念，理解了如何生成频谱，并详细探讨了时域、频域和时频域特征的提取方法。我们将在此基础上继续学习，了解如何利用这些特征检测旋转机械的故障。


    # 第18章


    ## 基于振动的状态监测：故障检测与诊断


    在机器学习热潮席卷制造业之前，基于振动的状态监测已是过程工业广泛采用的技术。国际标准化组织（ISO）为不同类别的旋转机械制定了振动均方根值的报警限值。此外，VCM研究人员致力于发现旋转机械不同部件故障的特征信号。相应地，已制定多种经验法则和启发式方法，利用振动特征定位故障根本原因。然而，这些启发式方法无法覆盖所有可能的故障场景，仍需振动专家分析和解读振动信号特征。幸运的是，机器学习的出现使VCM更易于通用过程数据科学家掌握。


    VCM文献中报道了多种用于故障分类、故障检测和诊断的机器学习模型。例如，通过将整个频谱（或波形）作为自编码器的输入，或将频谱图图像作为卷积神经网络（CNN）模型的输入，构建故障检测应用。机器学习模型扮演振动专家的角色，发现振动信号中的模式，区分正常运行状态（NOC）与异常振动，并辨别不同故障条件。本章将探讨基于机器学习的VCM的一种实现。具体内容包括：


    - VCM工作流程

    - VCM经典方法

    - 基于SVM的电机故障分类



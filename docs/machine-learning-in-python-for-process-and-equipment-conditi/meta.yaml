    - The quantization error is 0 here, but it’s obvious that the topology has not
    been preserved


    Therefore, different metrics are used to judge the fitted map quality. A couple
    of commonly used metrics are described below.


    # Quantization error


    As described before, the overall quantization error ($E_Q$) for fitting samples
    is given as


    $$E_Q = \frac{\sum_i \|x_i - m_{b_i}\|^2}{N}$$


    Although $E_Q$ does not give a good measure of topological preservation, it can
    indicate how good the map fits to data. $E_Q$ can also be used to infer overfitting
    and underfitting. Adding more neurons lead to lower $E_Q$ and therefore very low
    $E_Q$ may imply overfitted model. High values of $E_Q$ can indicate insufficient
    number of neurons or unconverged network learning.


    # Topographic error


    This metric measures how well the original shape of data has been preserved on
    SOM grid. It is computed by simply counting the number of samples for which the
    first and second BMUs are not adjacent neurons on the SOM grid.


    $$E_T = \frac{1}{N} \sum_{i=1}^N u(x_i)$$


    $$u(x_i) = \begin{cases} 1, & \text{if } 1^{st} \text{ and } 2^{nd} \text{ BMUs
    are non-adjacent} \ 0, & \text{otherwise} \end{cases}$$'

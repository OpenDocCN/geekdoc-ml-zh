    ```python\n# 将GMM模型拟合到金属蚀刻数据\ngmm = GaussianMixture(n_components = optimal_n_cluster,\
    \ random_state = 100)\ncluster_label = gmm.fit_predict(score_train)\nplt.scatter(score_train[:,\
    \ 0], score_train[:, 1], c = cluster_label, cmap='viridis')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_209_1.png)\n\
    \n## 11.5 基于GMM的故障检测：半导体制造案例研究\n\n由于其概率化的公式，GMM被广泛应用于过程系统监控。在本节中，我们将研究一个针对金属蚀刻过程的此类应用。图11.16显示了PCA得分空间中的金属蚀刻校准批次和故障批次。很明显，故障批次倾向于远离校准聚类。我们的目标是开发一个基于GMM的监控工具，能够自动检测这些故障批次。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_210_0.png)\n\n## 故障检测指标\n\n检测故障批次的一个直接方法是为每个聚类/模式构建单独的椭球边界或$T^2$控制图，并检查故障批次的$T^2$指标是否超出所有聚类的控制限。然而，当高斯分量数量较多时，监控多个控制图可能会变得繁琐。为了方便，可以将局部指标/图组合起来生成一个单一的全局指标/图。我们将遵循Xie\
    \ & Shi<sup>79</sup>的方法（Yu & Qin<sup>77</sup>提供了另一种方法）。对于一个测试数据点$x_t$，从每个聚类计算局部马氏距离\n\
    \n$$D_{local}^{(k)}(x_t) = (x_t - \\mu_k)^T \\Sigma_k^{-1} (x_t - \\mu_k)$$\n\n\
    然后使用测试样本对每个高斯分量的后验概率计算全局指标\n\n$$D_{global}(x_t) = \\sum_{k=1}^K P(C_k|x_t) D_{local}^{(k)}(x_t)$$\n\
    \n$D_{global}$的控制限可以使用$F$分布获得\n\n$$D_{global,CL} = \\frac{r(N^2-1)}{N(N-r)} F_{r,N-r}(\\\
    alpha)$$\n\n$F_{r,N-r}(\\alpha)$是自由度为$r$和$n-r$的$F$分布的$(1-\\alpha)$分位数，$r$是变量维度（我们在具有3个潜变量的PCA得分空间中执行GMM，因此$r\
    \ = 3$）。如果$D_{global} > D_{global, CL}$，则认为测试样本异常。\n\n```python\n# 全局马氏距离指标\n\
    N = score_train.shape[0]\nDglobal_train = np.zeros((N,))\n\nfor i in range(N):\n\
    \    x = score_train[i,:,np.newaxis]\n    probs = gmm.predict_proba(x.T)\n   \
    \ \n    for component in range(3):\n        Dlocal = np.dot(np.dot((x-gmm.means_[component,:,np.newaxis]).T,\n\
    \                              np.linalg.inv(gmm.covariances_[component,:,:])),\n\
    \                       (x-gmm.means_[component,:,np.newaxis]))\n        \n  \
    \      Dglobal_train[i] = Dglobal_train[i] + probs[0,component]*Dlocal\n\n# Dglobal控制限\n\
    r = 3\nalpha = 0.05 # 95%控制限\nDglobal_CL = r*(N**2-1)*scipy.stats.f.ppf(1-alpha,\
    \ r, N-r)/(N*(N-r))\n\n# Dglobal控制图\nplt.figure()\nplt.plot(Dglobal_train)\nplt.plot([1,\
    \ len(Dglobal_train)], [Dglobal_CL, Dglobal_CL], color='red')\nplt.xlabel('Sample\
    \ #'), plt.ylabel('D_global for training data')\n```\n\n图11.17显示了训练数据的控制图。\n\n\
    ![](img/cfcc9569b5e92ea115855752abddd75a_212_0.png)\n\n图11.17：金属蚀刻校准数据的全局监控图\n\
    \n## 测试数据的故障检测\n\n图11.18显示，全局距离指标似乎是检测故障批次的合适指标。在20个批次中，有18个批次的监控指标违反了阈值。这种良好的监控性能可归因于对数据进行了适当的多模态建模。\n\
    \n```python\n# 获取测试数据并展开\ntest_dataAll = Etch_data[0,0].test\n\nunfolded_TestdataMatrix\
    \ = np.empty((1,n_vars*n_samples))\nfor expt in range(test_dataAll.size):\n  \
    \  test_expt = test_dataAll[expt,0][5:90,2:]\n\n    if test_expt.shape[0] < 85:\n\
    \        continue\n\n    unfolded_row = np.ravel(test_expt, order='F')[np.newaxis,:]\n\
    \    unfolded_TestdataMatrix = np.vstack((unfolded_TestdataMatrix, unfolded_row))\n\
    \nunfolded_TestdataMatrix = unfolded_TestdataMatrix[1:,:]\n\n# 对故障数据进行PCA\ndata_test_normal\
    \ = scaler.transform(unfolded_TestdataMatrix)\nscore_test = pca.transform(data_test_normal)\n\
    \n# 计算Dglobal_test\nDglobal_test = np.zeros((score_test.shape[0],))\n\nfor i in\
    \ range(score_test.shape[0]):\n    x = score_test[i,:,np.newaxis]\n    probs =\
    \ gmm.predict_proba(x.T)\n```"

    \ is monitored using Shewhart control charts, i.e., a machine is considered healthy\
    \ if each feature remains within the range $\\mu \\pm 3\\sigma$ where the mean\
    \ $\\mu$ and standard deviation $\\sigma$ are computed from NOC waveforms.\n\n\
    ### ISO Code\n\nAn alternative to 3σ control chart is to directly compare your\
    \ machine’s vibration level to industrial standards. One such standard is ISO\
    \ 10816¹¹⁴ that provide good/satisfactory/unsatisfactory levels of RMS values\

    - ICA简介

    - 非高斯过程的过程监控

    - FDA简介

    - 大规模过程的故障分类。


    ### 8.1 ICA简介


    独立成分分析（ICA）是一种多元技术，用于将测量变量转换为低维空间中统计独立的潜变量。统计独立性是比不相关性更严格的条件，在某些情况下，使用独立成分（ICs）可能比使用PCA中不相关的主成分（PCs）能获得更好的结果。虽然ICA和PCA相关（在潜变量是测量变量的线性投影这一意义上），但它们在提取潜变量的方式上有所不同。图8.1通过一个简单的示例突出了它们之间的差异，其中两个独立信号被线性组合以生成相关信号，然后使用PCA/ICA来提取潜信号。显然，仅通过PCA对信号进行去相关处理并未恢复原始信号。另一方面，ICA准确地重建了原始信号⁴⁶。


    ![](img/cfcc9569b5e92ea115855752abddd75a_136_0.png)


    ICA使用高阶统计量进行潜变量提取，而不是像PCA那样仅使用二阶统计量（均值、方差/协方差）。因此，对于非高斯（多元高斯分布完全由二阶统计量定义）的工业数据集，ICs可以比PCs提供更多信息，从而可能带来更好的建模性能。在上面的示例中，我们看到ICA如何通过将IC方向向量与数据簇的边缘对齐来提供更有意义的表示，而PC向量则根据设计被迫指向最大方差的方向。图8.2总结了ICA和PCA之间的主要区别。在本章结束时，您将更清楚地理解这些微妙的差异及其含义。


    ![](img/cfcc9569b5e92ea115855752abddd75a_137_0.png)


    ### 独立性与不相关性


    在深入探讨ICA背后的数学原理之前，让我们花几秒钟确保我们理解独立性和不相关性背后的概念。如果两个随机变量y1和y2的值互不影响，则称它们是独立的。数学上，该条件表述为


    $p(y1, y2) = p(y1)p(y2)$


    其中$p(y1)$是y1自身的概率密度函数，$p(y1, y2)$是联合概率密度函数。如果变量y1和y2的协方差为零，则称它们是不相关的


    $C(y1, y2) = E\{(y1 - E(y1))(y2 - E(y2))\} = E(y1 * y2) - E(y1)E(y2) = 0$


    其中$E(.)$表示数学期望。利用独立性条件，可以很容易地证明，如果变量是独立的，那么它们也是不相关的，但反之则不然。因此，不相关性是独立性的一种较弱形式。


    ### 数学背景


    考虑数据矩阵$X \in \mathbb{R}^{m \times N}$，它包含$N$个$m$个输入变量的观测值，其中每一列代表原始测量空间中的一个数据点。注意，与PCA不同，这里使用的是数据矩阵的转置形式。在ICA中，假设测量变量是$d
    (\le m)$个独立成分$s_1, s_2, \dots, s_d$的线性组合。


    $$X = AS \quad \text{eq. 1}$$


    其中$S \in \mathbb{R}^{d \times N}$，$A \in \mathbb{R}^{m \times d}$称为混合矩阵。ICA的目标是从测量数据$X$中估计未知矩阵$A$和$S$。这是通过找到一个解混矩阵$W$来实现的，使得ICs或估计矩阵（$\hat{S}$）的行尽可能独立。


    $$\hat{S} = WX \quad \text{eq. 2}$$


    在估计$W$之前，ICA的初始步骤涉及去除数据矩阵$X$中变量之间的相关性。这一步称为白化或球化，通过PCA完成。


    $$Z = QX \quad \text{eq. 3}$$


    其中$Q \in \mathbb{R}^{d \times d}$称为白化矩阵。白化使得$Z$的行不相关。为了理解其作用，令$B = QA$并考虑以下关系，


    $$Z = QX = QAS = BS \quad \text{eq. 4}$$


    因此，白化将寻找矩阵A的问题转化为寻找矩阵B的问题。其优势在于B是一个正交矩阵——考虑到白化变量是不相关的且ICs是独立的，可以证明这一点——因此需要估计的参数更少。利用正交性，得到以下关系，


    $$S = B^T Z = B^T QX \implies W = B^T Q \quad \text{eq. 5}$$


    因此，一旦找到$B$，就可以生成$W$。矩阵$B$通过最大化估计IC值的非高斯性来估计，即$S$的每一行（$s_i$）应尽可能远离高斯分布。利用中心极限定理，可以证明最大化非高斯性将得到我们需要的独立成分$^{47}$。


    上述过程总结了ICA中涉及的步骤。请注意，对于任何非零标量$n$，集合$\{A/n, S/n\}$和$\{A, S\}$会产生相同的测量数据矩阵$X$，因此


    ---


    变量#9对$SPEx$和$T^2$指数都有很大贡献，在图7.10中我们可以看到其值在采样期结束时急剧增加。在McGregor等人的工作中，变量#9也被报告为贡献最大的变量$^{43}$。


    ![](img/cfcc9569b5e92ea115855752abddd75a_134_1.png)


    至此，我们结束了基于PCA和PLS的监控解决方案开发的研究。您现在可能理解了为什么这两种技术如此受欢迎。然而，尽管PCA和PLS功能强大，您可能会遇到原始PCA和原始PLS无法提供满意性能的问题。表现出严重非线性和/或动态性的过程数据需要对原始技术进行一些修改。我们将在接下来的章节中研究这些变体。


    ## 总结


    随着本章的结束，我们在基于ML的PM/PdM之旅中达到了一个重要的里程碑。您已经看到如何从过程数据中方便地提取隐藏的过程知识，并将其转化为过程洞察。掌握了PCA和PLS工具，您现在已具备解决许多过程监控相关问题的能力。然而，我们的旅程并未结束。在下一章中，我们将研究更多同样强大的基于潜变量的技术。


    ---


    ⁴⁶ 如果您仔细观察，会发现ICA潜信号（u1和u2）在符号和幅度上确实与s1和s2信号不同；我们很快就会了解为什么会发生这种情况以及为什么这不必担心。


    $^{47}$ www.sci.utah.edu/~shireen/pdfs/tutorials/Elhabian_ICA09.pdf 是了解有关此内容更多细节的优秀快速读物。'

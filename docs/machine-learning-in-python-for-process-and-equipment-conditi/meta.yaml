  md: '# Gaussian kernels and classification


    A better intuition behind the kernels can help us understand the impact of kernel
    hyperparameters on the classification boundaries. Kernels provide an indirect
    measure of similarity between any two points in the high-dimensional space. Consider
    again the Gaussian kernel


    ![](img/cfcc9569b5e92ea115855752abddd75a_225_0.png)


    Here, if two points $(x, z)$ are close to each-other in the original space, then
    their similarity (or kernel value) in the mapped space will be higher, compared
    to when $x$ and $z$ are far away from each-other. Now, let''s look at the classifier
    prediction formula for a sample $z$


    ![](img/cfcc9569b5e92ea115855752abddd75a_225_1.png)


    Therefore, the classifier is nothing but a sum of Gaussian bumps from the support
    vectors (plus an offset $b$)!


    ![](img/cfcc9569b5e92ea115855752abddd75a_225_2.png)


    Given bandwidth $(\sigma)$, during training, SVM tries to find the optimal values
    of the bump multipliers $(\alpha_s)$ such that the training samples get correct
    labels while keeping maximum separation between classification boundary and training
    samples. The boundary is simply the set of points where the net summations of
    bumps and offset become zero. Small values of $\sigma$ lead to very localized
    bumps near any support vector, resulting in higher number of support vectors with
    too much ''wiggles'' in the separating boundary which often indicates overfitting.'
  merge: -1
  pgno: 225
- img_proc: true
  md: 'The idea behind SVDD is to envelop training data by a hypersphere (circle in
    2D, sphere in 3D) containing maximum number of data-points within a smallest volume.
    Any new observation that lies farther than the hypersphere radius from hypersphere
    center can be regarded as abnormal observation. But the data in Figure 12.7 don''t
    look like it can be suitably enveloped with a circle? That is correct and our
    recourse is to use kernel functions to implicitly project original data onto a
    higher dimensional space where data can be adequately enveloped within a compact
    hypersphere. The projection of the optimal hyperplane onto the original space
    will show up as a tight nonlinear boundary around the dataset!


    Just like classical 2-class SVM, only a small set of training samples get to completely
    define the hypersphere. These data-points or support vectors lie on the circumference
    or outside of the hypersphere (or the nonlinear boundary in the original space).


    # Mathematical background


    Assume again that $\varphi(x)$ represents a data-point in the higher dimensional
    feature space. In this space, the optimal hypersphere is found via the following
    optimization problem


    ```

    $$\min_{R,a,\xi} \quad R^2 + C \sum_{i=1}^N \xi_i$$

    $$\text{s.t.} \quad ||\varphi(x_i) - a||^2 \leq R^2 + \xi_i, \quad i = 1, \cdots
    N$$

    $$\xi_i \geq 0$$

    ```


    As is evident, the above program is trying to minimize the radius ($R$) of the
    hypersphere centered at ''a'' such that most of the data-points lie within the
    hypersphere. Slack variables, $\xi$, allow certain samples to fall outside and
    the number of such violations is tuned via the hyperparameter $C$. As before,
    the problem is solved in its dual form


    ```

    $$\min_{\alpha} \quad \sum_{i=1}^N \sum_{j=1}^N \alpha_i \alpha_j K(x_i, x_j)
    - \sum_{i=1}^N \alpha_i K(x_i, x_i)$$

    $$\text{s.t.} \quad \sum_{i=1}^N \alpha_i = 1$$

    $$0 \leq \alpha_i \leq C \quad i = 1, \cdots N$$

    ```


    Like SVM, the alphas indicate the position of training samples w.r.t. the optimal
    boundary. The following relationships hold true'
  merge: -1
  pgno: 226
- img_proc: true
  md: 'Inside the boundary: $||\varphi(x_i) - a|| < R \Rightarrow \alpha_i = 0$

    On the boundary: $||\varphi(x_i) - a|| = R \Rightarrow 0 < \alpha_i < C$

    Outside the boundary: $||\varphi(x_t) - a|| > R \Rightarrow \alpha_i = C$


    The optimal solution satisfies the following expression


    $$R = \sqrt{k(x_s, x_s) - 2 \sum_{i \in \{SV\}} \alpha_i k(x_s, x_i) + \sum_{i
    \in \{SV\}} \sum_{j \in \{SV\}} \alpha_i \alpha_j k(x_i, x_j)}$$


    where $x_s$ is any support vector lying on the boundary. Any test observation
    $x_t$ is abnormal if its distance from center $a$ in the mapped space is greater
    than $R$ where the distance is given as follows


    $$Dist(\varphi(x_t), a)^2 = ||\varphi(x_t) - a||^2 = k(x_t, x_t) - 2 \sum_{i \in
    \{SV\}} \alpha_i k(x_t, x_i) + \sum_{i \in \{SV\}} \sum_{j \in \{SV\}} \alpha_i
    \alpha_j k(x_i, x_j)$$


    As you can see, specifications of kernel functions and other model hyperparameters
    is all that is needed; no knowledge of mapping $\varphi$ is required.


    # OC-SVM vs SVDD


    There is another technique closely related to SVDD, called one class SVM (OC-SVM).
    Infact, OC-SVM is the unsupervised SVM algorithm currently available in Sklearn.
    OC-SVM finds a separating hyperplane that best separates the training data from
    the origin. Its kernelized dual form is given by


    $$\min_{\alpha} \quad \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N \alpha_i \alpha_j
    k(x_i, x_j)$$

    $$\text{s.t.} \quad \sum_{i=1}^N \alpha_i = 1$$

    $$\quad \quad \quad 0 \leq \alpha_i \leq C \quad i = 1, \cdots N$$


    You will notice that for Gaussian kernel, OC-SVM formulation becomes equivalent
    to that of SVDD because $k(x_i, x_i) = 1$ and we end up with the same values of
    the multipliers. The decision boundaries are the same as well. For other kernels
    with $k(x_i, x_i) \neq 1$, results would be different.'
  merge: -1

    # 20.4 RUL Estimation via ANN-based Regression Modeling for a Gas Turbine


    For illustration of regression-based direct prediction of RUL using past run-to-failure
    histories, we will use simulated aircraft gas turbine engine dataset¹²⁵ which
    consists of operational and dynamic data (such as temperature, pressure) from
    multiple sensors from several engine operation simulations. Each simulation starts
    with an engine (with different degrees of initial wear) operating within normal
    limits. Engine degradation starts at some point during the simulation and continues
    until engine failure (engine health margin, a function of efficiency and flow,
    falling below a threshold). Training datasets contain complete data until engine
    failures, while the test dataset contains data until some point prior to failure.
    Actual RULs for the engines have been provided for the test dataset. Our objective
    is to develop a PdM model to predict engine failure using simulation data in the
    test dataset.


    # Aircraft engine dataset


    We will use data in the following three files from the repository dataset.


    +   - train_FD001.txt: Along with (3) operational settings, it contains timeseries
    data from 21 sensors (s1 to s21) from 100 different simulations or engines. The
    last cycle of each simulation is the point of failure of the corresponding engine.
    In Figure 20.5, sensor drift due to engine degradation is apparent.

    - test_FD001.txt: It also contains simulated timeseries data for 100 engines,
    however, here only partial timeseries is provided for each engine. Figure 20.5
    shows the provided timeseries for engine ID 90. The RUL of each engine needs to
    be estimated.

    - RUL_FD001.txt: It contains the actual RULs of the 100 engines in the test dataset
    measured in cycles. We will use this information to measure our model predictions’
    accuracy.


    ![](img/cfcc9569b5e92ea115855752abddd75a_352_0.png)'

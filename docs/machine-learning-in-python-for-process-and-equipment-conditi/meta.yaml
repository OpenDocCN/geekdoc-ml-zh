    \n![](img/cfcc9569b5e92ea115855752abddd75a_148_0.png)\n\n## 8.3 FDA: An Introduction\n\
    \nFisher Discriminant Analysis (FDA), also called linear discriminant analysis\
    \ (LDA), is a multivariate dimensionality reduction technique which maximizes\
    \ the ‘separation’ in the lower dimensional space between data belonging to different\
    \ classes. For conceptual understanding, consider the simple illustration in Figure\
    \ 8.9 where a 2D dataset (with 2 classes of data) has been projected onto 1D spaces\
    \ by FDA and PCA. The respective 1-D scores show that while the two classes of\
    \ data are well segregated in LD space, the segregation is very poor in PC space.\
    \ This observation was expected because PCA, while determining the projection\
    \ directions, does not consider information about different data classes. Therefore,\
    \ if your intention is to reduce dimensionality for subsequent data classification\
    \ and training data is labeled into different classes, then FDA is more suitable.\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_149_0.png)\n\nDue to the powerful data\
    \ discrimination ability of FDA, it is widely used in process industry for operating\
    \ mode classification and fault diagnosis. Large-scale industrial processes often\
    \ experience different kinds of process issues/faults and it is imperative to\
    \ accurately identify the specific issue quickly during online operations to minimize\
    \ economic losses. During model training, FDA learns from data collected from\
    \ historical process failures (data from a specific process fault form a class)\
    \ to find the optimal projection directions and classify abnormal process data\
    \ into specific faults in real-time. We will study one such application in this\
    \ chapter.\n\n### Mathematical background\n\nTo facilitate data classification,\
    \ FDA not only maximizes the separation between the classes but also minimizes\
    \ the variation/scatter within each class. To see how this is achieved, let us\
    \ first consider a dataset matrix $X \\in \\mathbb{R}^{N \\times m}$ consisting\
    \ of $N$ samples, $N_1$ of which belong to class 1 ($\\omega_1$) and $N_2$ belong\
    \ to class 2 ($\\omega_2$). FDA seeks to find a projection vector $w \\in \\mathbb{R}^m$\
    \ such that the projected scalars/samples ($z = w^T x$) are maximally separated.\
    \ Let $\\tilde{\\mu}_1$ and $\\tilde{\\mu}_2$ denote the means of projected values\
    \ of classes 1 and 2, respectively\n\n$$\\tilde{\\mu}_i = \\frac{1}{N_i} \\sum_{z\
    \ \\in \\omega_1} z$$\n\nClass separation could be quantified as distance between\
    \ the projected means $|\\tilde{\\mu}_1 - \\tilde{\\mu}_2|$; this, however, is\
    \ not a robust measure as shown by the illustration below."

    process performance and plant equipment health status, and forecast of impending
    failures are no longer a ‘nice to have’ but an absolute necessity!


    Process industry has responded to the above challenges by putting more sensors
    and collecting more real-time data. Unfortunately, this has led to data deluge
    and operators being overwhelmed with ‘too much information but little insights’.
    Thankfully, machine learning comes to the rescue with its ability to parse huge
    amount of data and find hidden patterns in real-time. ML allows smart process
    monitoring (PM) wherein objective is not just to detect process abnormalities
    but to catch the issues at early stages. Furthermore, ML facilitates predictive
    maintenance (PdM) through advance prediction of equipment failure times.


    In this chapter we will take a bird’s-eye view of the ML landscape for PM/PdM
    and understand what it takes to achieve the above objectives. Specifically, the
    following topics are covered


    +   - Introduction to process/equipment abnormalities and faults

    - Typical workflow for ML-based process monitoring and predictive maintenance

    - ML landscape for process monitoring and predictive maintenance

    - Common PM/PdM solution deployment infrastructure employed in industry


    Machine learning is a great tool, but it’s not magic; it still takes a lot ‘ML
    art’ to get the things right. Let’s now take the first step towards mastering
    this art.'
- md: '## 1.1 Process Industry and ML-based Plant Health Management


    Process industry is a parent term used to refer to industries like petrochemical,
    oil & gas, chemical, power, paper, cement, pharmaceutical, etc. These industries
    use processing plants to manufacture intermediate or final consumer products.
    As emphasized in Figure 1.1, the prime concerns of the management of these plants
    include, amongst others, optimal and safe operations, quality control, and high
    reliability through proactive process monitoring and predictive maintenance. All
    these tasks fall under the ambit of process systems engineering (PSE). While ML
    is being slowly incorporated in the PSE tasks (for example, deep learning-based
    process controller¹), ML has had the biggest influence on the tasks related to
    plant health management, viz, fault detection, fault diagnosis, and predictive
    maintenance.


    ![](img/cfcc9569b5e92ea115855752abddd75a_21_0.png)


    Figure 1.2 shows a sample process flowsheet with traditional measurements of flow,
    temperature, pressure, level, composition, power, and vibration. Such complex
    and highly integrated operations, tight product specifications, and the economic
    compulsion to push processes to their limits are making industrial operations
    more prone to failures. Nonetheless, there is an increasing trend to have unmanned
    or lean-staffed plants with less human eyes to monitor the process. This is where
    automated plant health management comes into play to resolve this dichotomy. Process
    models combined with sensor data are used for continuous monitoring of processes
    to detect, isolate, and diagnose faults, and for predicting fault progression.
    The obvious gains are prevention of costly downtimes through better planned maintenance.
    For developing process models, data-driven/ML models have become more popular
    due to the relative ease of implementation and model maintenance compared to first
    principle-based models.


    > ¹ https://www.aspentech.com/en/products/msc/aspen-dmc3


    ![](img/cfcc9569b5e92ea115855752abddd75a_22_0.png)


    Let’s continue learning about the ML-based plant health management by first taking
    a closer look at the meaning of process faults and abnormalities.


    ## What are process faults and abnormalities?


    Colloquially speaking, process faults or abnormalities are unexpected and unfavorable
    deviations/patterns in process variables that defy the normal/acceptable process
    behavior. The deviations could be undesirable decreases in product yield and product
    purity, fluctuations in critical liquid levels, rise in temperatures, increase
    in rotating machine vibrations, etc. There are various causes of faults in process
    system including, amongst others, fouling, pipe blockages, leaks, catalyst poisoning,
    and valve stiction. The flowsheet below illustrates some common fault sources.


    > ² Adapted from the original flowsheet by Gilberto Xavier (https://github.com/gmxavier/TEP-meets-LSTM)
    provided under Creative-Commons Attribution 4.0 International License (https://creativecommons.org/licenses/by/4.0/).


    ![](img/cfcc9569b5e92ea115855752abddd75a_23_0.png)


    Figure 1.3: Some common sources of process faults in a process plant


    ## Equipment monitoring vs plantwide monitoring


    A common approach for process monitoring in process industry is to monitor the
    different critical equipment of a plant separately. The ML models are built separately
    for each equipment. While this approach makes ML model development easier as each
    ML model handles only a subset of the plant variables, one is left with having
    to maintain and analyze results from multiple ML models. An alternative approach
    is plantwide monitoring wherein the whole plant comprising of multiple equipment
    is monitored using a single ML model. The downside of this approach is high dimensionality
    of the variable-set and reduced fault detection performance. Same ML models can
    be employed for either of the approaches. Nonetheless, some specialized techniques
    have been devised for plantwide monitoring. We will remark upon these techniques
    as suitable in the upcoming chapters.


    As remarked before, faults entail unwanted deviations in process variables. Figure
    below shows samples of data patterns that may be observed under the influence
    of process faults.


    ![](img/cfcc9569b5e92ea115855752abddd75a_24_0.png)


    Figure 1.4 shows why automated fault detection is not a very straightforward activity.
    Under normal plant operation, process variables do not remain at fixed values
    but show stochastic fluctuations and normal variations due to changing plant load,
    product grade, ambient conditions, etc. Therefore, one can’t just compare each
    process variable against some fixed thresholds to ascertain the healthy state
    of the process. Modeling the multivariable relationships among the plant variables
    become indispensable in most of the scenarios.


    The takeaway message is that modern process plants are prone to multiple failures,
    and it takes an ‘army’ to ensure reliable operations. In the industry 4.0 era,
    ML is being employed as that ‘army’. Before we look at the different ML models
    available at our disposal, let’s try and understand what exactly an ML model is
    expected to do.


    ## 1.2 Plant Health Management (PHM) Workflow


    In the previous section we discussed in some detail the fault detection aspect
    of plant health management. However, it is only a part of the journey towards
    reliable plant operation. Figure 1.5 shows the different milestones of the journey.
    As shown, fault detection is followed by fault isolation or fault diagnosis wherein
    the objective is to identify the process variables that have been affected by
    the fault or determine the underlying cause of the fault, respectively. For example,
    for the valve malfunction problem illustrated in Figure 1.3, fault isolation pinpoints
    the flow from the separator to the stripper as the faulty variable and fault diagnosis
    pinpoints the valve stiction as the root cause of faulty behavior.


    > FDI vs FDD


    In the process monitoring literature, you will find the acronyms FDI and FDD very
    often. FDI stands for fault detection and isolation, and FDD stands for fault
    detection and diagnosis. As alluded to before, although fault diagnosis is different
    from fault isolation, it is often used (incorrectly) to refer to the task of finding
    variables showing abnormal behavior.


    Other terms that you may encounter are fault identification and fault classification.
    While fault identification is same as fault isolation, fault classification refers
    to categorizing/classifying a fault into one of several pre-defined fault types.


    Following FDI/FDD, lies the task of fault prognosis which entails forecasting
    the progression of the identified fault. Fault prognosis helps to determine the
    amount of time left before the equipment affected by the fault needs to be taken
    out of service for maintenance or the whole plant needs to be shutdown for fault
    repair. For equipment-level monitoring, fault prognosis provides what is popularly
    known as remaining useful life (RUL). For example, for the compressor bearing
    damage problem illustrated in Figure 1.3, the vibrations will only be slightly
    higher than normal during the initial stages of crack development. However, with
    time the crack grows leading to greater and greater vibrations, and ultimately
    the compressor fails or becomes too dangerous to operate. A good fault prognostic
    model can accurately estimate the time left until the failure point of compressor
    is reached.


    The advancement in fault prognosis algorithms have popularized the concept of
    predictive maintenance, wherein the plant management can plan well-in-advance
    the maintenance schedule based on actual equipment/process health condition. As
    you can imagine, this approach has obvious economic benefits (compared to time-based/preventive
    maintenance) and, to nobody’s surprise, has caught fascination of process industry
    executives!


    ![](img/cfcc9569b5e92ea115855752abddd75a_26_0.png)


    Figure 1.5: Plant health management workflow


    ### Prognostic and Health Management


    In industrial community, the PM/PdM workflow shown in Figure 1.5 is commonly called
    as *prognostic and health management*³. This includes both condition monitoring
    (fault detection, isolation, and diagnosis) and predictive maintenance (fault
    prognosis) aspects.


    In the upcoming chapters, we will study in detail all the shown major aspects
    of PHM and learn how to implement the end-to-end solutions.


    > ³ Although the acronym ‘PHM’ is commonly used by the prognostic research community
    to refer to prognostic and health management, we will use it to denote ‘plant
    health management’ in this book.'
  mdcn: '## 1.1 流程工业与基于机器学习的工厂健康管理


    流程工业是一个总称，用于指代石化、石油与天然气、化工、电力、造纸、水泥、制药等行业。这些行业使用加工装置来制造中间产品或最终消费品。如图1.1所示，这些工厂管理的主要关注点包括但不限于：通过主动的过程监控和预测性维护，实现最优且安全的运行、质量控制以及高可靠性。所有这些任务都属于过程系统工程（PSE）的范畴。虽然机器学习正逐步被引入PSE任务（例如，基于深度学习的过程控制器¹），但其对与工厂健康管理相关的任务——即故障检测、故障诊断和预测性维护——影响最大。


    ![](img/cfcc9569b5e92ea115855752abddd75a_21_0.png)


    图1.2展示了一个典型的过程流程图，其中包含了流量、温度、压力、液位、组分、功率和振动等传统测量参数。如此复杂且高度集成的运行、严格的产品规格，以及将工艺推向极限的经济压力，使得工业运行更容易发生故障。然而，一个日益增长的趋势是建立无人值守或精简人员的工厂，减少人工对过程的监控。这正是自动化工厂健康管理发挥作用以解决这一矛盾的地方。过程模型与传感器数据相结合，用于持续监控过程，以检测、隔离和诊断故障，并预测故障的发展。其明显收益是通过更好的计划性维护来防止代价高昂的停机。在开发过程模型方面，数据驱动/机器学习模型由于其相对易于实施和维护（与基于第一性原理的模型相比），已变得越来越受欢迎。


    > ¹ https://www.aspentech.com/en/products/msc/aspen-dmc3


    ![](img/cfcc9569b5e92ea115855752abddd75a_22_0.png)


    让我们首先深入了解过程故障和异常的含义，继续学习基于机器学习的工厂健康管理。


    ## 什么是过程故障和异常？


    通俗地说，过程故障或异常是指过程变量中出现的、违背正常/可接受过程行为的意外且不利的偏差/模式。这些偏差可能是产品产率和纯度的不良下降、关键液位的波动、温度升高、旋转机械振动加剧等。过程系统中的故障有多种原因，包括但不限于：结垢、管道堵塞、泄漏、催化剂中毒和阀门卡滞。下面的流程图说明了一些常见的故障来源。


    > ² 改编自Gilberto Xavier（https://github.com/gmxavier/TEP-meets-LSTM）提供的原始流程图，该图基于知识共享署名4.0国际许可协议（https://creativecommons.org/licenses/by/4.0/）发布。


    ![](img/cfcc9569b5e92ea115855752abddd75a_23_0.png)


    图1.3：过程工厂中一些常见的过程故障来源


    ## 设备监控与全厂监控


    流程工业中过程监控的一种常见方法是分别监控工厂的不同关键设备。机器学习模型是为每台设备单独构建的。虽然这种方法使机器学习模型开发更容易，因为每个模型只处理工厂变量的一个子集，但用户需要维护和分析来自多个机器学习模型的结果。另一种方法是全厂监控，即使用单个机器学习模型监控由多台设备组成的整个工厂。这种方法的缺点是变量集维度高，且故障检测性能下降。相同的机器学习模型可以用于任一种方法。然而，已经为全厂监控设计了一些专门的技术。我们将在后续章节中适时介绍这些技术。


    如前所述，故障意味着过程变量出现不期望的偏差。下图展示了在过程故障影响下可能观察到的数据模式示例。


    ![](img/cfcc9569b5e92ea115855752abddd75a_24_0.png)


    图1.4说明了为什么自动故障检测并非一项非常直接的活动。在工厂正常运行期间，过程变量不会保持在固定值，而是由于工厂负荷、产品等级、环境条件等的变化而表现出随机波动和正常变化。因此，不能仅仅将每个过程变量与某个固定阈值进行比较来确定过程的健康状态。在大多数情况下，对工厂变量之间的多变量关系进行建模变得不可或缺。


    关键信息是，现代过程工厂容易发生多种故障，需要一支“大军”来确保可靠运行。在工业4.0时代，机器学习正被用作这支“大军”。在我们了解可用的不同机器学习模型之前，让我们先尝试理解机器学习模型究竟需要做什么。


    ## 1.2 工厂健康管理（PHM）工作流程


    在上一节中，我们详细讨论了工厂健康管理的故障检测方面。然而，这只是实现可靠工厂运行旅程的一部分。图1.5展示了这段旅程的不同里程碑。如图所示，故障检测之后是故障隔离或故障诊断，其目标分别是识别受故障影响的过程变量或确定故障的根本原因。例如，对于图1.3所示的阀门故障问题，故障隔离将从分离器到汽提塔的流量定位为故障变量，而故障诊断则将阀门卡滞确定为故障行为的根本原因。


    > FDI 与 FDD


    在过程监控文献中，您会经常遇到FDI和FDD这两个缩写。FDI代表故障检测与隔离，FDD代表故障检测与诊断。如前所述，尽管故障诊断与故障隔离不同，但它经常被（错误地）用来指代寻找表现出异常行为的变量的任务。


    您可能遇到的其他术语是故障识别和故障分类。虽然故障识别与故障隔离相同，但故障分类是指将故障归类/分类到几个预定义的故障类型之一。


    在FDI/FDD之后，是故障预测任务，它涉及预测已识别故障的发展进程。故障预测有助于确定在受故障影响的设备需要停机维护或整个工厂需要停机修复故障之前剩余的时间。对于设备级监控，故障预测提供了通常所说的剩余使用寿命（RUL）。例如，对于图1.3所示的压缩机轴承损坏问题，在裂纹发展的初始阶段，振动只会略高于正常水平。然而，随着时间的推移，裂纹增长导致振动越来越大，最终压缩机失效或变得过于危险而无法运行。一个良好的故障预测模型可以准确估计压缩机达到故障点之前的剩余时间。


    故障预测算法的进步普及了预测性维护的概念，工厂管理层可以根据设备/过程的实际健康状况提前规划维护计划。可以想象，这种方法具有明显的经济效益（与基于时间的/预防性维护相比），并且毫不意外地引起了流程工业高管们的极大兴趣！


    ![](img/cfcc9569b5e92ea115855752abddd75a_26_0.png)


    图1.5：工厂健康管理工作流程


    ### 预测与健康管理


    在工业界，图1.5所示的PM/PdM工作流程通常被称为*预测与健康管理*³。这包括状态监控（故障检测、隔离和诊断）和预测性维护（故障预测）两个方面。


    在接下来的章节中，我们将详细研究PHM的所有主要方面，并学习如何实施端到端的解决方案。


    > ³ 尽管缩写“PHM”通常被预测研究社区用来指代预测与健康管理，但本书中我们将用它来表示“工厂健康管理”。'

  md: 'The first feature, mean of the spectrum, is the average of the amplitudes of
    all the frequencies in the spectrum. As fault severity increases, overall vibration
    energy goes up and so does $F_1$. Frequency center ($F_5$ or $F_c$) and root mean
    square frequency ($F_7$ or RMSF) are used to track the dominant frequencies in
    the spectrum. The peak frequencies (say, top 10) and their respective amplitudes
    are also commonly used for fault detection.


    > Impact of operating conditions


    Variations in machine load and running speed impact machine vibration characteristics
    such as overall vibration levels, amplitudes of specific frequency components,
    etc. Therefore, operating condition should be taken into account during interpretation
    of vibration features. Very often, a reference vibration signal and/or spectrum
    is recorded for different operational conditions and used later for FDD. Alternatively,
    operations conditions are used as additional variables for training ML models.


    # Time-frequency domain features


    A commonly extracted time-frequency domain feature is mean peak frequency which
    is simply average of the peak frequencies at different time instances in the spectrogram.
    It is computed as shown below where $N_{\tau}$ is the number of segments used
    in SFTF.


    ```

    $$f_{peak}(\tau) = \underset{f}{\text{argmax}} S(\tau, f)$$

    $$f_{mean, peak} = \frac{\sum_{\tau} f_{peak}(\tau)}{N_{\tau}}$$

    ```


    Another common strategy is to extract frequency domain features from each FFT
    spectrum of the waterfall.


    > Fault prone components of a rotating machine such as gears and bearings have
    been well studied and their ‘frequencies of defect’ have been discovered and defined
    mathematically. These frequencies show up in spectrum when faults occur and therefore
    work quite well as diagnostic features. Readers are encouraged to see the work
    by Sim et al. titled ‘A Tutorial for Feature Engineering in the Prognostics and
    Health Management of Gears and Bearings’ (Applied Sciences, 2020).'

    \ monitoring using data-based fault detection techniques: comparative studies\
    \ (2017)’的开放获取论文中使用了这个系统来展示核化 MSPM 模型的优越性。该系统被模拟以生成 401 个 NOC 样本和 200 个测试数据样本（分别在文件\

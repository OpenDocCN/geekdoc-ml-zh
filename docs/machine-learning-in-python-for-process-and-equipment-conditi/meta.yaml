  md: '![](img/cfcc9569b5e92ea115855752abddd75a_242_0.png)


    Figure 13.6: (Left) Random forest regression predictions, (middle) predictions
    from a couple of constituent decision trees, (right) Impact of number of trees
    in RF model on validation error


    Figure 13.6 also shows the validation error for different number of trees in the
    forest. What we see here is a general characteristic of RFs: as number of trees
    increase, the validation errors plateau out. Therefore, if computation time is
    not a concern, it is preferable to use as many trees as possible until the error
    levels out. As far as $M$ is concerned, a lower value leads to greater reduction
    in variance but increases the model bias. Do note that RF primarily brings down
    the variance (compared to using single DT models) and not the bias. Therefore,
    if DT itself is underfitting, then RF won''t be able to provide high accuracy
    (or low bias). This is why full-grown trees are used in RF. You will find out
    the reason behind this later in this chapter.



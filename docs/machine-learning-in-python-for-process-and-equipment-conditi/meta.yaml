  md: "$LCL = \\hat{\\mu} - 3\\hat{\\sigma}\\sqrt{\\frac{\\lambda}{2-\\lambda}} \\\
    quad ; \\quad UCL = \\hat{\\mu} + 3\\hat{\\sigma}\\sqrt{\\frac{\\lambda}{2-\\\
    lambda}}$\n\nwhere $\\hat{\\sigma}$ is the historical IC standard deviation as\
    \ calculated for Shewhart charts.\n\n**Example 5.1 continued:** We will again\
    \ take the data from Figure 5.3 and learn how to build EWMA control charts.\n\n\
    ```\n# EWMA chart\nmu, sigma = np.mean(x0), np.std(x0)\nsmoothFactor = 0.1\n\n\
    LCL = mu - 3*sigma*np.sqrt(smoothFactor/(2-smoothFactor))\nUCL = mu + 3*sigma*np.sqrt(smoothFactor/(2-smoothFactor))\n\
    \nz = np.zeros((len(x),))\nz[0] = mu\n\nfor i in range(1,len(x)):\n    z[i] =\
    \ smoothFactor*x[i] + (1-smoothFactor)*z[i-1]\n\nplt.plot(z,'--',marker='o', color='teal')\n\
    plt.plot([1,len(x)],[LCL,LCL], color='red'), plt.plot([1,len(x)],[UCL,UCL], color='red')\n\
    plt.plot([1,len(x)],[mu,mu], '--', color='maroon')\nplt.xlabel('sample #')\n```\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_95_0.png)\n\nThe balance between the\

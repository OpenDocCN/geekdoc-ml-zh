  md: 'The phenomenal success of deep learning in areas of computer vision and natural
    language processing has encouraged VCM practitioners to bypass explicit feature
    extraction and directly use the vibration waveform/spectrum/spectrogram as inputs
    to the deep learning models; for example, passing 2D spectrogram images as inputs
    to convolutional neural networks models. Deep learning automatically learns the
    fault signatures in vibration data. Illustrations below compares shallow learning-
    and deep learning-based VCM using time domain waveforms.


    ![](img/cfcc9569b5e92ea115855752abddd75a_326_0.png)


    # 18.2 Classical VCM Approaches: A Quick Primer


    Below we discuss a few (easy to implement and understand) classical approaches
    for VCM.


    # Control charts for vibration features


    In this approach, some key features (say, RMS, kurtosis, etc.) are selected as
    the fault indicators to monitor. Each selected indicator is monitored using Shewhart
    control charts, i.e., a machine is considered healthy if each feature remains
    within the range $\mu \pm 3\sigma$ where the mean $\mu$ and standard deviation
    $\sigma$ are computed from NOC waveforms.'

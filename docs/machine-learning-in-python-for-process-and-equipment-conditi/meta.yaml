  md: '# 18.1 VCM Workflow: Revisited


    Vibration signals contain indicators of machine faults. Previously, we saw the
    steps commonly taken to ‘amplify’ these indicators through judicious extraction
    of features. In this chapter, we will focus on how these features are used to
    make inferences regarding health of rotating machinery. Figure 18.1 shows some
    of the approaches commonly employed. The classical approaches include, amongst
    others, simply looking for the presence of harmonics in the spectrum and comparing
    individual features against ISO-recommended thresholds. In recent times, ML-based
    VCM is gradually becoming more popular. Any of the ML techniques that we have
    seen in the previous parts of the book can be employed.


    ![](img/cfcc9569b5e92ea115855752abddd75a_325_0.png)'

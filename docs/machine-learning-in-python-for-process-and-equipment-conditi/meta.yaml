    First published: January 2024


    ## About the Authors


    ![](img/cfcc9569b5e92ea115855752abddd75a_5_0.png)


    **Ankur Kumar** holds a PhD degree (2016) in Process Systems Engineering from
    the University of Texas at Austin and a bachelor’s degree (2012) in Chemical Engineering
    from the Indian Institute of Technology Bombay. He currently works at Linde in
    the Advanced Digital Technologies & Systems Group in Linde’s Center of Excellence,
    where he has developed several in-house machine learning-based monitoring and
    process control solutions for Linde’s hydrogen and air-separation plants. Ankur’s
    tools have won several awards both within and outside Linde. One of his tools,
    PlantWatch (a plantwide fault detection and diagnosis tool), received the 2021
    Industry 4.0 Award by the Confederation of Industry of the Czech Republic. Ankur
    has authored or co-authored several peer-reviewed journal papers (in the areas
    of data-driven process modeling and monitoring), is a frequent reviewer for many
    top-ranked Journals, and has served as Session Chair at several international
    conferences. Ankur served as an Associate Editor of the Journal of Process Control
    from 2019 to 2021, and currently serves on the Editorial Advisory Board of Industrial
    & Engineering Chemistry Research Journal. Most recently, he was included in the
    ‘Engineering Leaders Under 40, Class of 2023’ by *Plant Engineering* Magazine.


    ![](img/cfcc9569b5e92ea115855752abddd75a_5_1.png)


    **Jesus Flores-Cerrillo** is currently an Associate Director - R&D at Linde and
    manages the Advanced Digital Technologies & Systems Group in Linde’s Center of
    Excellence. He has over 20 years of experience in the development and implementation
    of monitoring technologies and advanced process control & optimization solutions.
    Jesus holds a PhD degree in Chemical Engineering from McMaster University and
    has authored or co-authored more than 40 peer-reviewed journal papers in the areas
    of multivariate statistics and advanced process control among others. His team
    develops and implements novel plant monitoring, machine learning, IIOT solutions
    to improve the efficiency and reliability of Linde’s processes. Jesus’s team received
    the Artificial Intelligence and Advanced Analytics Leadership 2020 award from
    the National Association of Manufacturers’ Manufacturing Leadership Council.


    ## Note to the readers


    Jupyter notebooks and Spyder scripts with complete code implementations are available
    for download at [https://github.com/ML-PSE/Machine_Learning_for_PM_and_PdM](https://github.com/ML-PSE/Machine_Learning_for_PM_and_PdM).
    Code updates, when necessary, will be made and updated on the GitHub repository.
    Updates to the book''s text material will be available on Leanpub ([www.leanpub.com](http://www.leanpub.com))
    and Google Play ([https://play.google.com/store/books](https://play.google.com/store/books)).
    We would greatly appreciate any information about any corrections and/or typos
    in the book.


    ## Series Introduction


    In the 21st century, data science has become an integral part of the work culture
    at every manufacturing industry and process industry is no exception to this modern
    phenomenon. From predictive maintenance to process monitoring, fault diagnosis
    to advanced process control, machine learning-based solutions are being used to
    achieve higher process reliability and efficiency. However, few books are available
    that adequately cater to the needs of budding process data scientists. The scant
    available resources include: 1) generic data science books that fail to account
    for the specific characteristics and needs of process plants 2) process domain-specific
    books with rigorous and verbose treatment of underlying mathematical details that
    become too theoretical for industrial practitioners. Understandably, this leaves
    a lot to be desired. Books are sought that have process systems in the backdrop,
    stress application aspects, and provide a guided tour of ML techniques that have
    proven useful in process industry. This series ‘Machine Learning for Process Industry’
    addresses this gap to reduce the barrier-to-entry for those new to process data
    science.


    The first book of the series ‘Machine Learning in Python for Process Systems Engineering’
    covers the basic foundations of machine learning and provides an overview of broad
    spectrum of ML methods primarily suited for static systems. Step-by-step guidance
    on building ML solutions for process monitoring, soft sensing, predictive maintenance,
    etc. are provided using real process datasets. Aspects relevant to process systems
    such as modeling correlated variables via PCA/PLS, handling outliers in noisy
    multidimensional dataset, controlling processes using reinforcement learning,
    etc. are covered. The second book of the series ‘Machine Learning in Python for
    Dynamic Process Systems’ focuses on dynamic systems and provides a guided tour
    along the wide range of available dynamic modeling choices. Emphasis is paid to
    both the classical methods (ARX, CVA, ARMAX, OE, etc.) and modern neural network
    methods. Applications on time series analysis, noise modeling, system identification,
    and process fault detection are illustrated with examples. This third book of
    the series takes a deep dive into an important application area of ML, viz, prognostics
    and health management. ML methods that are widely employed for the different aspects
    of plant health management, namely, fault detection, fault isolation, fault diagnosis,
    and fault prognosis, are covered in detail. Emphasis is placed on conceptual understanding
    and practical implementations. Future books of the series will continue to focus
    on other aspects and needs of process industry. It is hoped that these books can
    help process data scientists find innovative ML solutions to the real-world problems
    faced by the process industry.


    With the growing trend in usage of machine learning in the process industry, there
    is growing demand for process domain experts/process engineers with data science/ML
    skills. These books have been written to cover the existing gap in ML resources
    for such process data scientists. Specifically, books of this series will be useful
    to budding process data scientists, practicing process engineers looking to ‘pick
    up’ machine learning, and data scientists looking to understand the needs and
    characteristics of process systems. With the focus on practical guidelines and
    industrial-scale case studies, we hope that these books lead to wider spread of
    data science in the process industry.'

    # 13.4 Introduction to Ensemble Learning


    The idea of combining multiple ‘not so good’/weak models to generate a strong
    model is not restricted to random forests. The idea is more generic and is called
    ensemble learning. Specific methods that implement the idea (like RFs) are called
    ensemble methods. Figure 13.7 below shows an ensemble modeling scheme employing
    a diverse set of base models. The shown model is heterogeneous ensemble model
    as individual models employ different learning methodologies. In contrast, in
    the homogeneous models, the base models use the same learning algorithm.


    ![](img/cfcc9569b5e92ea115855752abddd75a_245_0.png)


    There are several options at our disposal to aggregate the predictions from the
    base models. For classification, we can use majority voting and pick the class
    that is predicted by most of the base models. Alternatively, if base models return
    class probabilities, then soft voting can also be used. For regression, we can
    use simple or weighted averaging.


    In the ensemble world, a weak model is any model that has poor performance due
    to either high bias or high variance. However, together, the weak models combine
    to achieve better,


    > <sup>87</sup> Another popular heterogeneous ensemble technique is stacking where
    base models’ predictions serve as inputs to another meta-model which is trained
    separately'

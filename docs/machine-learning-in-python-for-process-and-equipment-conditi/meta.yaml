    ```\n\n图11.5确实显示了具有均值和协方差变化的多模态运行。然而，通过直接检查高维数据集来估计运行模式的数量是困难的。一种常见的做法是通过PCA降低过程维度，然后应用聚类以促进可视化。执行PCA还有其他目的。我们稍后会看到，期望最大化（EM）算法被用于估计K-Means和GMM模型中的簇参数。高维度意味着需要估计大量参数，这增加了EM收敛到局部最优结果的可能性，并且相关变量会导致EM收敛问题。PCA有助于同时克服这两个问题。\n\
    \n我们将为此批次过程数据集采用多向PCA。我们将遵循He等人<sup>76</sup>的方法，其中每个批次保留85个样本点以处理批次长度的可变性，忽略前5个样本以消除传感器测量的初始波动，并保留3个主成分。\n\

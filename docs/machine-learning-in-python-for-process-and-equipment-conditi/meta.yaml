  md: '# Monitoring statistic


    The primary statistic to monitor is $Q$, which for a sample $x_t$ is defined as


    $$Q = \|\bar{\varphi}(x_t) - \widehat{\bar{\varphi}}_a(x_t)\|^2$$

    *reconstructed feature vector using $a$ latents*


    The above expression can be expressed in terms of the score vector $t_t$ as follows<sup>72</sup>


    $$Q = \sum_{i=1}^{n} t_{ti}^2 - \sum_{i=1}^{a} t_{ti}^2$$

    * $n$ is the number of non-zero eigenvalues in Eq. 4


    Note that Tan et al. have shown that the KPCA $Q$ metric can help detect fault
    cases where variables go out of healthy operating range as well as cases where
    test samples do not follow model of the training data.


    > In KPCA literature, you may encounter usage of Hotelling''s $T^2$ as a monitoring
    statistic. However, Tan et al. have shown that Hotelling''s $T^2$ is non-monotonic
    w.r.t. the severity of fault, i.e., Hotelling''s $T^2$ may decrease when faults
    become more severe! For example, if a sample $x_{test}$ lies far away from the
    NOC samples, then score value along every principal component will be small because
    the Gaussian kernel function values will be small. Therefore, $T^2$ will be small
    and will only become smaller as $x_{test}$ goes farther away from the healthy
    data.


    Let us now implement the KPCA model and generate monitoring charts.


    ```

    # scale data

    X_scaler = StandardScaler()

    X_train_scaled = X_scaler.fit_transform(X_train)


    # fit kpca model

    gamma = 1/((5*3)**2) # gamma = 1/σ²

    kpca = KernelPCA(kernel=''rbf'', gamma=gamma)

    ```'

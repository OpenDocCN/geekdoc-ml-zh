    # 用于统计过程控制的控制图


    在机器学习席卷过程工业之前，使用统计选择的上下限对关键工厂变量进行简单绘图曾是检测过程异常的常规做法。这些图表被称为控制图，构成了统计过程控制或统计质量控制的主要组成部分。尽管由于先进的多元过程监控工具的出现，控制图失去了一些光彩，但它们仍被工厂管理层广泛用于监控关键KPI，例如产品质量、过程效率等。概念简单、解释容易和实施快速是它们持续流行的一些原因。


    休哈特控制图（包括流行的3-sigma控制图）是最早、最简单和最常用的控制图。然而，它们在检测导致小偏差的故障时表现不佳。因此，已经设计了诸如CUSUM控制图和EWMA控制图等替代方案。在本章中，我们将学习这些技术，并熟悉如何在实践中实施它们。最后，我们将讨论克服单变量控制图缺点的方法。具体涵盖以下主题。



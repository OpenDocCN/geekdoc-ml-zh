    \ confusion_matrix\nimport seaborn as sns\n```\n\n```python\n# read feature data\n\
    featureData = pd.read_csv('feature_timeDomain_48k_2048_load_1HP.csv')\n```\n\n\
    ![](img/cfcc9569b5e92ea115855752abddd75a_329_0.png)\n\n```python\nfeatureData['faultType']\
    \ = pd.Categorical(featureData['faultType']) # designates last column as categorical\
    \ variable\n```\n\n```python\n# generate training and test datasets\ntrain_data,\
    \ test_data = train_test_split(featureData, test_size = 750, stratify = featureData['faultType'],\
    \ random_state = 1234)\nprint(train_data['faultType'].value_counts())\n```\n\n\
    ```\n>>> Ball_007_1    155\n    Ball_014_1    155\n    Ball_021_1    155\n   \
    \ IR_007_1      155\n    IR_014_1      155\n    IR_021_1      155\n    Normal_1\
    \      155\n    OR_007_6_1    155\n    OR_014_6_1    155\n    OR_021_6_1    155\n\
    ```\n\n```python\n# scale data\nscaler = StandardScaler()\ntrain_data_scaled =\
    \ scaler.fit_transform(train_data.iloc[:,:-1])\ntest_data_scaled = scaler.transform(test_data.iloc[:,:-1])\n\
    ```\n\n```python\n# find best SVM hyperparameters via grid-search\nhyperParameters\
    \ = {'C':[0.1, 1, 10, 50, 100, 300], 'gamma':[0.01, 0.05, 0.1, 0.5, 1, 10]}\n\
    svm_clf = GridSearchCV(SVC(), hyperParameters, cv= 5)\nsvm_clf.fit(train_data_scaled,\
    \ train_data['faultType'])\nprint(svm_clf.best_params_)\n```\n\n```\n>>> {'C':\
    \ 50, 'gamma': 0.1}\n```\n\n```python\n# predict fault classes and generate confusion\
    \ matrices\ntrain_pred = svm_clf.predict(train_data_scaled)\ntest_pred = svm_clf.predict(test_data_scaled)\n\
    CM_train = confusion_matrix(train_data['faultType'], train_pred)\nCM_test = confusion_matrix(test_data['faultType'],\
    \ test_pred)\n\nfault_type = ['C1','C2','C3','C4','C5','C6','C7','C8','C9','C10']\n\
    sns.heatmap(CM_train, annot= True, fmt = \"d\", xticklabels=fault_type, yticklabels=fault_type,\n\
    \           cmap = \"Blues\", cbar = False)\n\nsns.heatmap(CM_test, annot = True,\
    \ xticklabels=fault_type, yticklabels=fault_type, cmap =\n           \"Blues\"\
    , cbar = False)\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_330_0.png)\n\n\
    ![](img/cfcc9569b5e92ea115855752abddd75a_330_1.png)\n\n![](img/cfcc9569b5e92ea115855752abddd75a_331_0.png)\n\

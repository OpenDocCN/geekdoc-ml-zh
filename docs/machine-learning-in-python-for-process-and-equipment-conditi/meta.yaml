    \ mu - 3*sigma\n\n# 为组合数据绘制控制图\nplt.plot(x,'--',marker='o', color='teal')\nplt.plot([1,len(x)],[UCL,UCL],\
    \ color='red'), plt.plot([1,len(x)],[LCL,LCL], color='red')\nplt.plot([1,len(x)],[mu,\
    \ mu], '--', color='maroon')\nplt.xlabel('sample #'), plt.ylabel('x')\n\n## 5.3\
    \ CUSUM图：简介\n\n考虑下图所示的控制图，其对应图5.3中的数据集。显然，与休哈特图不同，该控制图能轻松标记出失控状态。此图称为CUSUM图，已知其在检测小幅均值偏移方面更为有效。在第$i^{th}$个采样时刻，绘制在CUSUM图上的CUSUM统计量（$S_i$）是每个可用测量值与均值（或目标值）偏差的“累积和”。当过程处于受控状态时，围绕均值的随机偏差相互抵消，$S_i$在零附近波动；然而，若在第$r^{th}$个采样时刻出现均值偏移，例如偏移量为$\\\
    Delta$，则在每个时刻$\\geq r$，$S_i$都会增加一个额外的$\\Delta$项，从而导致如图5.4所示的持续上升（或下降）趋势。\n\n![](img/cfcc9569b5e92ea115855752abddd75a_91_0.png)\n\
    \n过去，使用CUSUM图进行故障检测通常是通过观察趋势斜率（使用所谓的V形掩模）以图形方式完成的。然而，在现代统计软件系统中，使用的是以下双向CUSUM图。\n\
    \n$$S_i^+ = \\max[0, x_i - (\\mu_0 + k) + S_{i-1}^+] \\longrightarrow \\text{追踪均值的正向偏移}$$\n\
    $$S_i^- = \\max[0, (\\mu_0 - k) - x_i + S_{i-1}^-] \\longrightarrow \\text{追踪均值的负向偏移}$$\n\
    \n- $k \\geq 0$\n- 偏离均值（或目标值）大于$k$会增加$S^+$或$S^-$\n- $k$通常设置为我们希望快速检测到的均值偏移大小的一半\n\
    \n$S^+$和$S^-$都绘制在同一图表上，并附有指定的控制限（或阈值）$H$，如下所示。\n\n![](img/cfcc9569b5e92ea115855752abddd75a_92_0.png)\n\
    \nCUSUM图的实现需要指定$k$、$H$和均值$\\mu_0$（或目标值$T$）。虽然$\\mu_0$只是历史IC数据的样本均值，但控制限$H$的确定比休哈特图稍复杂。$H$通常根据不同均值偏移水平下的ARL(0)和ARL(1)值来选择$^{27}$。通常，$H$设置为$4\\\
    hat{\\sigma}$或$5\\hat{\\sigma}$，其中$\\hat{\\sigma}$的估计方式与休哈特图相同。\n\n## 变点检测\n\n\
    > 在异常检测领域，你可能会遇到“变点检测”（CPD）这个术语。CPD是寻找信号属性（均值、标准差等）发生显著变化时刻的问题。CUSUM和EWMA是用于CPD的两种流行技术。\n\
    \n## 示例5.1：我们将使用图5.3中的数据，学习如何构建CUSUM控制图。我们还将了解$k$对图表性能的影响。\n\n```python\n# CUSUM\
    \ chart\nmu, sigma = np.mean(x0), np.std(x0)\nk, H = 0.25*sigma, 5*sigma\n\nS_positive,\
    \ S_negative = np.zeros((len(x),)), np.zeros((len(x),))\nS_positive[0], S_negative[0]\
    \ = 0, 0\n\nfor i in range(1,len(x)):\n    S_positive[i] = np.max([0, x[i]-(mu+k)\
    \ + S_positive[i-1]])\n    S_negative[i] = np.max([0, (mu-k)-x[i] + S_negative[i-1]])\n\
    \nplt.plot(S_positive,'--',marker='o', color='teal', label='S+')\nplt.plot(S_negative,'--',marker='*',\
    \ color='steelblue', label='S-')\nplt.plot([1,len(x)],[H,H], color='red'), plt.plot([1,len(x)],[0,0],\
    \ '--', color='maroon')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_93_0.png)\n\
    \nCUSUM图可以及时检测到均值偏移。然而，我们也看到NOC数据中有一些误报。这是因为我们的图表非常敏感（设计用于捕捉仅$0.5\\sigma$的偏移）。下图显示了将$k$增加到$0.5\\\
    sigma$的影响——误报发生率降低了，但故障检测有相当大的延迟（约50个样本）。\n\n![](img/cfcc9569b5e92ea115855752abddd75a_93_1.png)\n\
    \nCUSUM图也可以检测过程均值的大幅偏移；然而，其检测速度比休哈特图慢（即ARL(1)更高）。EWMA在小幅均值偏移检测和快速检测大幅偏移之间提供了良好的折衷。\n\
    \n## 5.4 EWMA图：简介\n\n与CUSUM类似，EWMA图是具有记忆功能的控制图。这里，在任何第$i^{th}$个采样时刻，绘制在EWMA控制图上的统计量（$z_i$）是第$i^{th}$个过程测量值与先前统计量$z_{i-1}$的加权组合；这意味着EWMA统计量是所有过去测量值的指数加权平均，如图5.5所示。我们可以看到，EWMA图在休哈特图（仅考虑当前观测值）和CUSUM图（对所有可用观测值赋予相等权重）之间取得了平衡；因此，这导致了检测延迟和故障敏感性之间的良好平衡。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_94_0.png)\n\n超参数$\\lambda$决定了赋予过去观测值的权重。对于$\\\
    lambda = 1$，EWMA图退化为休哈特图，而当$\\lambda \\to 0$时，开始出现类似CUSUM的特性。通常建议$0.2 \\le \\\
    lambda \\le 0.3$。3-sigma控制限如下所示。\n\n$LCL = \\hat{\\mu} - 3\\hat{\\sigma}\\sqrt{\\\
    frac{\\lambda}{2-\\lambda}} \\quad ; \\quad UCL = \\hat{\\mu} + 3\\hat{\\sigma}\\\
    sqrt{\\frac{\\lambda}{2-\\lambda}}$\n\n其中$\\hat{\\sigma}$是如休哈特图计算的历史IC标准差。\n\n\
    **示例5.1续：** 我们将再次使用图5.3中的数据，学习如何构建EWMA控制图。\n\n```python\n# EWMA chart\nmu, sigma\
    \ = np.mean(x0), np.std(x0)\nsmoothFactor = 0.1\n\nLCL = mu - 3*sigma*np.sqrt(smoothFactor/(2-smoothFactor))\n\
    UCL = mu + 3*sigma*np.sqrt(smoothFactor/(2-smoothFactor))\n\nz = np.zeros((len(x),))\n\
    z[0] = mu\n\nfor i in range(1,len(x)):\n    z[i] = smoothFactor*x[i] + (1-smoothFactor)*z[i-1]\n\
    \nplt.plot(z,'--',marker='o', color='teal')\nplt.plot([1,len(x)],[LCL,LCL], color='red'),\
    \ plt.plot([1,len(x)],[UCL,UCL], color='red')\nplt.plot([1,len(x)],[mu,mu], '--',\
    \ color='maroon')\nplt.xlabel('sample #')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_95_0.png)\n\
    \n在上述EWMA图中，休哈特图和CUSUM图性能之间的平衡立即显现。EWMA统计量突破了（尽管勉强）警报阈值（⇒ 性能优于休哈特图），并且检测延迟也低于CUSUM图（⇒\
    \ 性能优于CUSUM图）。\n\n## 5.5 案例研究：监测曝气池中的气流\n\n为了说明控制图的工业应用，我们将考虑来自下图所示曝气池的数据$^{28}$。曝气池使用小气泡使固体颗粒保持悬浮状态。如果向池中吹入过多空气，会导致过度起泡和有价值的固体产品损失。如果吹入的空气过少，颗粒会下沉并从悬浮液中析出。模拟数据集包含573个观测值，每个观测值等于一分钟间隔内添加到池中的空气总升数。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_96_0.png)\n\n所有573个观测值绘制如下。如果你第一眼没有注意到大约300分钟时的轻微向上偏移，这不会被评判。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_96_1.png)\n\n然而，我们已经了解到CUSUM图在捕捉小幅均值偏移方面表现出色。让我们看看它在这个数据集上工作得多么出色。我们将前200个观测值作为NOC数据，绘制如下。均值和标准差是从这些样本计算得出的。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_97_0.png)\n\n为了生成CUSUM图，$k$取为$0.25\\\
    sigma$。使用示例5.1中所示的代码，生成了下面所示的CUSUM控制图$^{29}$。令人印象深刻的是，在没有太多误报的情况下，小幅均值偏移现在变得非常“明显”可见！\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_97_1.png)\n\n$^{29}$ 完整代码可在在线GitHub仓库中找到。"

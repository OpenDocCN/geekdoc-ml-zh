    # # Chapter 10

    Multivariate Statistical Process Monitoring for Nonlinear Processes


    In the previous chapters, we saw how a simple trick of using time-lagged variables
    enabled application of conventional MSPM techniques to dynamic processes. You
    may wonder if anything similar exists for nonlinear processes. Fortunately, it
    does! The underlying principle is to project the original variables onto a high-dimensional
    feature space where features are linearly related. The challenging part is the
    determination of the nonlinear mapping from the original measurement space to
    the feature space This is where a ‘kernel’ trick comes into picture wherein data
    gets projected without the need to explicitly define the nonlinear mapping. Conventional
    MSPM is then employed in the feature space. Sounds complicated? Once you are done
    with this chapter, you will realize that it’s much easier than it may seem to
    you right now.


    The main advantage of kernel-based MSPM techniques (KPCA, KPLS, KICA, KFDA, etc.)
    is that they do not require nonlinear optimization and only linear algebra is
    involved. Unsurprisingly, kernelized methods have become very attractive for dealing
    with nonlinear datasets while retaining the simplicity of their linear counterparts.
    Among the kernel MSPM techniques, kernel PCA and kernel PLS are the most widely
    adopted, have found considerable successes in process monitoring applications,
    and therefore will be the focus of our study in this chapter. Specifically, the
    following topics are covered


    +   - Introduction to kernel PCA

    - Fault detection using kernel PCA

    - Introduction to kernel PLS

    - Fault detection using kernel PLS'
- md: '## 10.1 Kernel PCA: An Introduction


    Kernel PCA is the nonlinear extension of conventional PCA suitable for handling
    processes that exhibit significant nonlinearity. To understand the motivation
    behind KPCA, consider the simple scenarios illustrated in Figure 10.1. In Figure
    10.1a, we can see that the data lie along a line which can be obtained from the
    first eigenvector of linear PCA. In Figure 10.1b, data lie along a curve; conventional
    PCA cannot help to find this nonlinear curve. Correspondingly, PCA fails to detect
    the obvious outlier. However, all is not lost for the latter scenario. Instead
    of working in the ($x_1$, $x_2$) measurement space, if we work in the ($z_1$,
    $z_2$) = ($x_1^4$, $x_2$) feature space, then we end up with linearly related
    features and the abnormal data point can be flagged as such. Unfortunately, the
    task of finding such (nonlinear) mapping that maps raw data to feature variables
    is not trivial. Thankfully, there is something called ‘kernel trick’ that allows
    you to work in the feature space without having to define the nonlinear mapping.
    We will learn how this is accomplished in the next section.


    ![](img/cfcc9569b5e92ea115855752abddd75a_176_0.png)


    KPCA can work with arbitrary data distributions. As far as process monitoring
    applications are concerned, KPCA can help you create an abnormality boundary around
    your NOC data as shown below.


    ![](img/cfcc9569b5e92ea115855752abddd75a_176_1.png)


    To understand how KPCA works, let’s revisit the mathematical underpinnings of
    PCA.


    ## Kernel functions and kernel trick


    Usage of kernel trick is not limited to KPCA and KPLS. Other ML techniques such
    as SVM, CVA, etc., also use kernel functions to model nonlinear processes. So,
    what are these kernel functions? Let’s try to understand them.


    We alluded to before that a popular approach to handling nonlinearity is to map
    observation sample $x$ to $x_F$ in feature space where conventional linear ML
    technique can be applied.


    $\varphi(x): x \rightarrow x_F$


    However, the map $\varphi(.)$ is unknown. Thankfully, in the mathematical formulation
    of many ML algorithms, the inner (or dot) product of feature vectors, $\varphi(x)^T\varphi(x)$,
    is frequently encountered. This inner product is denoted as


    $k(x_i, x_j) = <\varphi(x_i), \varphi(x_j)> = \varphi(x_i)^T\varphi(x_j)$


    where $k(.,.)$ is called the kernel function. Several forms of $k(.,.)$ are available
    and the most common form is Gaussian or radial basis function defined as


    $k(x_i, x_j) = exp\left[-\frac{(x_i-x_j)^T(x_i-x_j)}{\sigma^2}\right]$


    where, $\sigma$ (a hyperparameter), is called kernel width. Usage of kernel functions
    allow application of linear ML techniques in feature space without explicitly
    knowing the feature vectors and this trick is called the ‘kernel trick’. Another
    term you will encounter in kernelized algorithms is kernel matrix (often denoted
    as $K$). The $(i, j)^{th}$ element of $K$ is simply $k(x_i, x_j)$. The table below
    lists the commonly used kernel functions


    | Function | Equation | Hyperparameter |

    | :--- | :--- | :--- |

    | Linear | $k(x, z) = x^Tz$ | |

    | Gaussian | $k(x, z) = exp(-\frac{\|x-z\|^2}{\sigma^2})$ | $\sigma$ |

    | Polynomial | $k(x, z) = (\gamma x^Tz + r)^d$ | $\gamma, r, d$ |

    | Sigmoid | $k(x, z) = tanh(\gamma x^Tz + r)$ | $\gamma, r$ |


    Let''s use the polynomial kernel to illustrate how using kernel functions amounts
    to higher dimensional mapping. Assume that we use the following kernel


    $$k(x, z) = (x^T z + 1)^2$$


    where $x = [x_1, x_2]^T$ and $z = [z_1, z_2]^T$ are two vectors in the original
    2D space. We claim that the above kernel is equivalent to the following mapping


    $$\varphi(x) = [x_1, x_2, \sqrt{2}x_1, \sqrt{2}x_2, \sqrt{2}x_1x_2, 1]$$


    To see how, just compute $\varphi(x)^T \varphi(z)$


    $$\begin{aligned} \varphi(x)^T \varphi(z) &= x_1^2 z_1^2 + x_2^2 z_2^2 + 2x_1
    z_1 + 2x_2 z_2 + 2x_1 x_2 z_1 z_2 + 1 \\ &= (x_1 z_1 + x_2 z_2 + 1)^2 \\ &= (x^T
    z + 1)^2 \\ &= k(x, z) \end{aligned}$$


    Therefore, if you use the above polynomial kernel, you are implicitly projecting
    your data onto a 6th dimensional feature space! If you were amazed by this illustration,
    you will find it more interesting to know that Gaussian kernels map original space
    into an infinite dimensional feature space! Luckily, we don''t need to know the
    form of this feature space.


    ## Mathematical background


    The main objective in KPCA is to obtain the score vectors in the feature space.
    To see how it can be obtained, let $x \in \mathbb{R}^m$ and $\varphi(x)$ denote
    a sample in the original measurement space and the projected feature vector in
    the high-dimensional feature space, respectively. We know that the conventional
    PCA involves the solution of the following eigenvalue problem


    ![](img/cfcc9569b5e92ea115855752abddd75a_178_0.png)


    Let $X_F = [\varphi(x_1), \varphi(x_2), \cdots, \varphi(x_N)]^T$ denote the feature
    data matrix. We assume for now that $X_F$ is mean centered. PCA in the feature
    space, therefore, involves the following eigen-decomposition problem


    $$\frac{1}{N-1} X_F^T X_F v = \lambda_F v \quad \text{eq. 1}$$


    $X_F$ is not known and, therefore, the above equation cannot be solved directly.
    Let''s pre-multiply both sides of Eq. 1 by $X_F$ which results in


    $$\frac{1}{N-1} X_F X_F^T X_F v = \lambda_F X_F v \quad \text{eq. 2}$$


    Linear algebra shows that eigenvector$^{68}$ can be written as a linear combination
    of the samples, i.e.,


    $$v = \sum_{i=1}^N \alpha_i \varphi(x_i) = X_F^T \alpha \quad \text{eq. 3}$$


    Let us also define the kernel matrix, $K = X_F X_F^T$. Let''s now substitute the
    kernel matrix and $v$ from Eq. 3 in Eq. 2 which leads to


    $$K \alpha = (N-1) \lambda_F \alpha \quad \text{eq. 4}$$


    Eq. 4 is an eigen-decomposition problem which can be solved for the kernel eigenvectors
    $\alpha^{(1)}, \alpha^{(2)}, \cdots, \alpha^{(N)}$ and kernel eigenvalues$^{69}$
    $\lambda_1 \ge \lambda_2 \ge \cdots \ge \lambda_N$. The $l^{th}$ eigenvector $\alpha^{(l)}
    \equiv [\alpha_1^{(l)}, \alpha_2^{(l)}, \cdots, \alpha_N^{(l)}] \in \mathbb{R}^N$.
    One may retain only the first $a$ eigenvectors for dimensionality reduction in
    feature space. The corresponding eigenvector in feature space becomes $v^{(l)}
    = X_F^T \alpha^{(l)}$. To ensure eigenvector $v^{(l)}$ is of unit length, the
    following condition is imposed on $\alpha^{(l)}$,


    $$\|v^{(l)}\|_2 = v^{(l)T} v^{(l)} = \alpha^{(l)T} X_F X_F^T \alpha^{(l)} = 1$$

    $$\Rightarrow (N-1) \lambda_{Fl} \|\alpha^{(l)}\|_2 = 1$$

    $$\Rightarrow \|\alpha^{(l)}\|_2 = 1 / (N-1) \lambda_{Fl} \quad \text{eq. 5}$$


    $^{68}$ Note that with Gaussian kernels, $\varphi(x)$ and $v$ have infinite dimensions

    $^{69}$ Kernel eigenvalue $\lambda_l$ can be divided by $N-1$ to obtain eigenvalue
    $\lambda_{Fl}$.


    Above expression implies that the calculated kernel eigenvectors $\alpha^{(l)}$
    obtained from Eq. 4 corresponding to non-zero eigenvalues are scaled to satisfy
    Eq. 5. Note that the eigenvectors $v^{(l)}$ are still unobtainable as $X_F$ is
    unknown. However, our main variable of interest is score vector $t_j \in \mathbb{R}^a$
    corresponding to sample $x_j$. Before we see how $t_j$ can be obtained, we need
    to come straight on a big assumption we made regarding data in feature space $\varphi(x_1),
    \varphi(x_2), \cdots, \varphi(x_N)$ being mean centered. To ensure mean-centering,
    kernel matrix $K$ is modified as follows


    $$\bar{K} = K - 1_N K - K 1_N + 1_N K 1_N \quad \text{eq. 6}$$


    $$\text{Where } 1_N = \frac{1}{N} \begin{bmatrix} 1 & \cdots & 1 \\ \vdots & \ddots
    & \vdots \\ 1 & \cdots & 1 \end{bmatrix}_{N \times N}$$


    $$\rightarrow \bar{K} \text{ can be shown to be equal to } \bar{X}_F^T \bar{X}_F$$


    $$\bar{X}_F = [\bar{\varphi}(x_1), \bar{\varphi}(x_2), \cdots, \bar{\varphi}(x_N)]^T$$


    $$\rightarrow \text{equivalently, } \bar{K}_{ij} = \bar{k}(x_i, x_j) = \bar{\varphi}(x_i)^T
    \bar{\varphi}(x_j)$$


    ## Score vectors for training and test samples


    To find score vector ($t_j \in \mathbb{R}^{a \times 1} = [t_{j1}, t_{j2}, \cdots,
    t_{ja}]^T$) for a training sample $x_j$, we need to compute the score or projection
    of $\varphi(x_i)$ along each eigenvector $v^{(l)}$, $l = 1, 2, \cdots, a$, which
    can be obtained as follows


    $$t_{jl} = < v_l, \bar{\varphi}(x_j) > = \sum_{i=1}^N \alpha_i^{(l)} \bar{k}(x_i,
    x_j) = \sum_{i=1}^N \alpha_i^{(l)} \bar{K}_{ji} = \alpha^{(l)T} \bar{k}_j \quad
    \text{eq. 7}$$



    # 第7章


    ## 线性稳态过程的多元统计过程监控：第1部分


    在制造设施中，测量数百个与过程相关的变量并不少见。然而，守恒定律（如质量平衡、热力学约束）、强制执行的产品规格以及其他操作限制会在过程变量之间引入相关性，使得测量变量看起来都源自少数几个隐藏（未测量）变量。已经衍生出几种智能技术来寻找这些隐藏的潜在变量。基于潜在变量的技术允许表征在正常操作条件（NOC）下影响过程的“正常”过程噪声。基于潜在空间的过程监控方法实时监控潜在变量和过程噪声的值，以推断过程故障的存在。听起来很复杂？别担心！本章将向您展示如何实现这一点，同时保持对概念理解和实际应用的关注。


    PCA和PLS是最流行的基于潜在变量的过程监控工具之一，并已在多个成功的工业过程监控应用中得到报道。本章全面阐述了PCA和PLS技术，并教您如何应用它们进行故障检测。此外，我们将学习如何使用流行的贡献分析方法来识别故障过程变量。具体涵盖以下主题：


    - PCA和PLS简介

    - 通过PCA和PLS进行过程故障检测

    - 基于PCA和PLS的过程监控应用中的故障隔离

    - 通过PCA监控聚合物制造过程

    - 通过PLS监控聚乙烯制造过程


    ## 7.1 PCA简介


    主成分分析（PCA）本质上是一种多元技术，它将一组高维的相关变量转换为一组低维的不相关（潜在）变量，同时信息损失最小。考虑图7.1中的三维数据。很明显，尽管数据是三维的，但数据点主要分布在一个二维平面上；即使在这个平面上，沿某个特定方向的分布也更广。PCA将原始的(x,y,z)空间转换为二维主成分（PC）空间，其中第一主成分（PC1）对应于数据中最大分布/方差的方向，第二主成分（PC2）对应于所有与PC1正交的方向中方差最大的方向。根据建模要求，甚至可以丢弃第二主成分，本质上获得一维数据，同时会损失一些信息。此外，正如我们很快将看到的，从PC空间的数据恢复原始数据是直接的。


    在机器学习领域，常见在PC空间中应用分类和聚类技术。在过程工业中，过程建模（通过主成分回归，PCR）和监控是PCA的常见应用³⁴。PCA也经常用于过程可视化。对于许多应用，两个或三个PC足以捕获过程数据中的大部分变异性，因此，压缩后的过程数据可以在单个图中可视化。工厂操作员和工程师使用这个单一图表来发现过程数据中的过去和当前模式。基于PCA的故障检测更进一步，将PC空间中的所有信息和过程噪声压缩到几个控制图中。您很快将学习如何生成和使用这些控制图。


    > ³⁴ 潜在变量技术在过程控制和监控中的普及源于麦克马斯特大学John McGregor的开创性工作。


    ### 数学背景


    考虑一个数据矩阵 $X \in \mathbb{R}^{N \times m}$，它由 $N$ 个 $m$ 个过程变量的样本组成，其中每一行代表原始测量空间中的一个数据点。假设每一列都已归一化为零均值和单位方差。令
    $v \in \mathbb{R}^m$ 表示将数据点投影到PC1方向上的“载荷”向量；它可以通过求解以下优化问题找到


    $$\max_{v \neq 0} \frac{(Xv)^T Xv}{v^T v} \quad \text{eq. 1}$$


    显然，公式1试图最大化投影数据点沿PC1方向的方差。其他PC的载荷向量通过求解相同的问题并附加与先前计算的载荷向量正交的约束来找到。或者，载荷向量也可以从
    $X$ 的协方差矩阵（$S$）的特征值分解中计算得出


    $$\frac{1}{N-1} X^T X = S = V \Lambda V^T \quad \text{eq. 2}$$


    以上是您在PCA文献中常见的形式。特征向量矩阵 $V \in \mathbb{R}^{m \times m}$ 的列就是我们需要的载荷向量。对角特征值矩阵
    $\Lambda$ 等于 $diag\{\lambda_1, \lambda_2, \dots, \lambda_m\}$，其中 $\lambda_1 \geq
    \lambda_2 \geq \dots \geq \lambda_m$ 是特征值。实际上，$\lambda_j$ 等于沿第 $j^{th}$ 个PC方向的方差。如果原始数据中的过程变量之间存在显著相关性，则只有前几个特征值会是显著的。假设保留
    $k$ 个PC，则取 $V$ 的前 $k$ 列（对应于前 $k$ 个 $\lambda_s$）形成载荷矩阵 $P \in \mathbb{R}^{m \times
    k}$。现在可以获得PC空间中的转换数据


    $$t_j = Xp_j \text{ or } T = XP \quad \text{eq. 3}$$


    $X$ 的 $m$ 维 $i^{th}$ 行已被转换为 $T$ 的 $k$（$< m$）维 $i^{th}$ 行。$T \in \mathbb{R}^{N
    \times k}$ 称为得分矩阵，$T$ 的第 $j^{th}$ 列（$t_j$）包含沿第 $j^{th}$ 个PC方向的（得分）值。得分可以如下投影回原始测量空间


    $$\hat{X} = TP^T \quad \text{eq. 4}$$


    请注意，由于我们丢弃了与不显著的 $\lambda_s$ 对应的载荷向量，因此 $\hat{X} \neq X$。差值 $E = X - \hat{X}$
    被称为残差矩阵，因为每一行都是一个数据点的残差或误差向量。总的来说，PC空间捕获了过程数据中的系统性趋势，而残差空间主要描述了数据中的噪声。'

    The kernel trick acts as a beautiful solution to allow the KPCA/KPLS scores to
    relate nonlinearly to the original input data while retaining the simplicity of
    linear algebra-based PCA/PLS. However, before we fall in love with kernelized
    MSPM techniques, remember that are a few drawbacks as well! If number of samples,
    $N$, is very large then eigenvector decomposition of $N \times N$ dimensional
    kernel matrix can become challenging. Also, judicious selection of the hyperparameter
    $\sigma$, is critical, else a poor model is obtained.


    # Summary


    In this chapter, we acquainted ourselves with the procedures to obtain nonlinear
    versions of classical MSPM techniques using kernels. Specifically, we looked at
    kernel PCA and kernel PLS algorithms. These techniques can help you build robust
    monitoring solutions for process systems that show significant nonlinearities.
    In the next chapter, we will learn how to deal with multi-clustered.'

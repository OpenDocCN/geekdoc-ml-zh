  - '[PAGE 259]


    # 14.2 LOF: An Introduction


    The simple nature and powerful capabilities of k-NN has put it amongst the top
    data-mining algorithms. However, it is not rare to encounter scenarios where k-NN-based
    abnormality detection gives poor performance. One such scenario involves NOC training
    samples distributed among different clusters with varying densities as shown in
    Figure 14.5. A few test samples are also shown in the figure. K-NN-based FD will
    correctly identify $X2$, $X3$, and $X4$ as anomalies, but will fail to detect
    $X1$ as an abnormal sample. This will happen because the NOC samples in cluster
    $A$ are sparsely distributed which will make the threshold for fault detection
    large enough that the average k-NN-distance of $X1$ will lie below the threshold.
    For our naked eye, $X1$ is an obvious outlier because it is located ‘far’ away
    from its ‘local’ neighbors which are densely distributed. But how do we modify
    the k-NN algorithm to embed this logic? Well, one thing that can be done is to
    compare the local density of a test sample with the local densities of its neighbors.
    If the test sample has substantially lower density than its neighbors, then it
    is potentially an anomaly. This is the guiding principle behind the local outlier
    factor (LOF) algorithm.


    ![](img/cfcc9569b5e92ea115855752abddd75a_259_0.png)


    # Computing LOF for a sample


    Let $x_t \in \mathbb{R}^m$ be a sample. To find its LOF, we need to find the local
    density at the location of $x_t$. Alternatively, we need to find how easy is it
    to reach $x_t$ from $x_t$’s neighbors. Let’s look at all the steps involved one-by-one.


    +   > $k$-distance of $x_t$

    > For a specified hyperparameter $k$, $k$-distance of $x_t$ is simply the distance
    between $x_t$ and the $k^{th}$ nearest neighbor of $x_t$, i.e.,

    > $$\text{k-distance}(x_t) = d_k(x_t, x^*) = \sqrt{\sum_{i=1}^{m} (x_{ti} - x_i^*)^2}$$

    > $x^*$ is $k^{th}$ nearest neighbor'
  - '[PAGE 260]


    ![](img/cfcc9569b5e92ea115855752abddd75a_260_0.png)


    +   - $k$-distance neighborhood of $x_t$


    $k$-distance neighborhood of $x_t$, denoted as $N_k(x_t)$, is the set of points
    whose distances from $x_t$ is not greater than $k$-distance of $x_t$. It usually
    would contain $k$ data points (the $k$-nearest neighbors) but can be more than
    $k$ in case of a tie.


    +   - Reachability distance of $x_t$ from its neighbors


    Let $x^o$ belong to $N_k(x_t)$. The reachability distance of $x_t$ from $x^o$
    is defined as follows


    $$\text{reach-dist}(x_t, x^o) = \max\{\text{k-distance}(x^o), d_k(x_t, x^*)\}$$


    If $x_t$ is far away from $x^o$ compared to $x^o$''s neighbors, then reachability
    distance of $x_t$ from $x^o$ is the actual distance else reach-dist($x_t, x^o$)
    equals k-distance($x^o$)


    ![](img/cfcc9569b5e92ea115855752abddd75a_260_1.png)


    +   - Local reachability density of $x_t$


    The local (reachability) density of $x_t$ is simply the inverse of average reachability
    distance of $x_t$ from its neighbors.'
  - '[PAGE 261]


    $lrd_k(x_t) = 1 / \left( \frac{\sum_{x^o \in N_k(x_t)} reach\text{-}dist(x_t,
    x^o)}{|N_k(x_t)|} \right)$


    number of points in $N_k(x_t)$


    > **LOF of $x_t$**


    The local reachability density of $x_t$ is compared with those of the neighbors
    to compute the LOF. Specifically, the local outlier factor is the average of the
    ratio of local reachability density of the neighbors to that of $x_t$.


    $LOF_k(x_t) = \frac{\sum_{x^o \in N_k(x_t)} lrd_k(x^o)}{|N_k(x_t)| \cdot lrd_k(x_t)}$


    $LOF \sim 1 \Rightarrow x_t$''s density is similar to that of neighbors.


    $LOF < 1 \Rightarrow x_t$''s density is higher than neighbors'' densities.


    $LOF > 1 \Rightarrow x_t$''s density is lower than neighbors'' densities and may
    be an outlier.


    A threshold for LOF is computed during training based on a ''contamination parameter''
    that specifies the proportion of anomalies in training data (or the acceptable
    false alarm rate if training dataset contains only NOC samples).


    > The hyperparameter $k$ influences the performance of anomaly detection and its
    optimal value is application dependent. A small value for $k$ will lead to inaccurate
    determination of local densities while a large value will diminish the differences
    between NOC samples and anomalies. Values between 20 to 30 work well in general.


    # Application of LOF for fault detection


    Below we show how a monitoring chart could be generated using LOF model.


    ```

    # LOF of each training sample

    from sklearn.neighbors import LocalOutlierFactor

    lof_model = LocalOutlierFactor(n_neighbors=5, novelty=True, contamination=0.05)

    lof_model.fit(score_train)

    ```'
  - '[PAGE 262]


    ```

    lof_train = -lof_model.negative_outlier_factor_ # negative_outlier_factor_ gives
    the opposite LOF of the training samples

    lof_CL = -lof_model.offset_

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_262_0.png)


    Figure 14.6 shows the monitoring chart for the training samples. Note that a specification

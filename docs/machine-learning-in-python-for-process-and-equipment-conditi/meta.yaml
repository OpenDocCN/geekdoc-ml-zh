    \ conditions:\n\n- C1 : Ball defect (0.007 inch)\n- C2 : Ball defect (0.014 inch)\n\
    - C3 : Ball defect (0.021 inch)\n- C4 : Inner race fault (0.007 inch)\n- C5 :\
    \ Inner race fault (0.014 inch)\n- C6 : Inner race fault (0.021 inch)\n- C7 :\
    \ Normal operation\n- C8 : Outer race fault (0.007 inch, data collected from 6\
    \ O'clock position)\n- C9 : Outer race fault (0.014 inch, data collected from\
    \ 6 O'clock)\n- C10 : Outer race fault (0.021 inch, data collected from 6 O'clock)\n\
    \nThe data from each condition is provided in a separate file (such as *110.mat*)\
    \ on the CWRU website<sup>117</sup>. Data from each file is divided into smaller\
    \ segments of 2048 data points and 230 segments are obtained from each of the\
    \ 10 files corresponding to *C1* to *C10*. In total 2300 waveforms are available\
    \ to us. For each segment, nine time domain features (peak, peak-to-peak, mean,\
    \ standard deviation, RMS, skewness, kurtosis, crest factor, and shape factor)\
    \ are extracted. This results in a feature matrix of size 2300 X 9. A column indicating\
    \ the condition class is also added to the end and the final data matrix is provided\
    \ in the file *feature_time_48k_2048_load_1.csv*<sup>118</sup>. Our objective\
    \ is to develop a ML model that can predict the operating condition of the motor\
    \ using the time domain features. For this, we will build a kernel SVM-based classifier\
    \ as shown below.\n\n```python\n# import packages\nimport numpy as np, pandas\

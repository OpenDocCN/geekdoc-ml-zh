    # 17.3 Vibration Signal Processing


    As alluded to in the previous section, analyzing the time-domain waveform manually
    can be very inconvenient and may not provide sufficient leading indicators of
    incipient faults. A more useful representation of vibration data can be obtained
    in frequency domain and time-frequency domain.


    # Frequency domain analysis


    Consider the following time domain and frequency domain vibration data of a machine.


    ![](img/cfcc9569b5e92ea115855752abddd75a_312_0.png)


    For an untrained eye, the waveform does not provide much useful information about
    ‘how’ the machine is vibrating. However, in the frequency domain, one can clearly
    see two distinct frequency components potentially arising from different rotating
    components of the machine. Comparison of peak amplitudes and peak frequencies
    with NOC values can indicate the severity and type of fault, if any exists. This
    extremely useful plot of frequency versus amplitude is called a spectrum and is
    commonly obtained via FFT.


    # Fourier transformation


    Frequency domain analysis entails decomposition of a waveform into a sum of several
    sinusoids of different frequencies. This decomposition is called Fourier transformation.
    To see how it is calculated, let us define a few terms first. Let the sampling
    frequency be $f_s$, the waveform contain $N$ data points, and the frequency resolution,
    $df$, be defined as $\frac{f_s}{N}$.


    ![](img/cfcc9569b5e92ea115855752abddd75a_312_1.png)'
- md: 'The Fourier transform (FT) is calculated as follows,


    $$Y(kdf) = \frac{2}{N} \sum_{i=0}^{N-1} y(t_i) e^{-j\frac{2\pi ik}{N}} \quad k
    = 0, 1, 2, ..., \frac{N}{2} - 1$$


    FT value at frequency $f_k = kdf$


    $y(t_i) = y(t)$ at time $t_i = idt$


    $Y(f_k)$ is a complex number and the amplitude corresponding to $f_k$ that is
    shown on a spectrum plot is given as the amplitude of $Y(f_k)$, i.e., $|Y(f_k)|$.
    A spectrum can be very easily generated in Python. Let us do it for our above
    waveform.


    ```python

    # simulate signal

    import numpy as np, matplotlib.pyplot as plt

    fs = 1000 # 1000 Hz

    dt = 1.0/fs

    t = np.arange(0,0.5,dt) # sampling instants


    y1 = np.sin(2*np.pi*50*t ) # 50Hz component

    y2 = 2.5*np.sin(2*np.pi*20*t) # 20Hz component

    y = y1+y2 # sampled signal


    # generate spectrum

    from scipy.fft import rfft, rfftfreq

    N = len(t)

    Y_spectrum = rfft(y)

    freq_spectrum = rfftfreq(N, dt)


    plt.plot(freq_spectrum, 2.0/N *np.abs(Y_spectrum), ''black'')

    plt.ylabel(''Amplitude (g)''), plt.xlabel(''frequency (Hz)'')

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_313_0.png)


    ## Sources of error during Fourier transformation


    There are several sources of error during Fourier transformation which can result
    in spurious frequencies showing up in your spectrum plot, amplitudes being incorrect,
    and frequencies incorrectly missing from the spectrum. The errors can arise due
    to noisy measurements, inadequate frequency resolution, etc. Let’s consider a
    well-known error called ‘leakage’. To understand this, assume that a machine is
    vibrating sinusoidally at 1 Hz. A sequence of length 9.4 seconds is taken for
    analysis at $f_s = 20$ Hz.


    ![](img/cfcc9569b5e92ea115855752abddd75a_314_0.png)


    ![](img/cfcc9569b5e92ea115855752abddd75a_314_1.png)


    Instead of a sharp spectral line at 1 Hz, we have obtained a range of dominant
    frequencies. These spurious components result from the non-periodic waveform taken
    for analysis and the resulting smearing of energy in the frequency domain is called
    *leakage*. To prevent leakage, the waveform is multiplied with a window of data
    to force the sampled waveform to be zero at the beginning and the end as shown
    below. We can see that windowing has significantly reduced the smearing of frequencies.
    The window shown in the below illustration is called Hann window and is commonly
    employed for leakage reduction.


    ![](img/cfcc9569b5e92ea115855752abddd75a_314_2.png)


    ![](img/cfcc9569b5e92ea115855752abddd75a_314_3.png)


    ## Time-frequency domain analysis


    Consider the two scenarios below.


    ![](img/cfcc9569b5e92ea115855752abddd75a_315_0.png)


    ![](img/cfcc9569b5e92ea115855752abddd75a_315_1.png)


    It is obvious that the two waveforms are different - two frequency components
    are present throughout the time in scenario 1 and in scenario 2, the two components
    are present at different points in time. However, the spectrum for both the scenarios
    are similar (ignoring the little ripples in the 2nd spectrum and the amplitude
    differences of peak frequencies). Understandably, the spectrum for scenario 2
    can lead to wrong inferences. The solution to handle scenario 2 is to analyze
    the waveform in both time and frequency domains together and the most popular
    tool to do this is short-time Fourier transform (STFT) whose procedure is in Figure
    17.3<sup>110</sup>.


    Here, you can see that the waveform is divided into overlapped segments, and Fourier
    transformation is performed, resulting in a 2D matrix, $S_y(f, \tau)$. The STFT
    is visualized using spectrogram and waterfall plots. A waterfall simply plots
    each FT spectrum one after the other giving an impression of a waterfall in a
    3D plot. A spectrogram is a 2D plot on time-frequency axis with amplitude variations
    shown using colors. These diagrams help to see how constituent frequencies change
    within a waveform over time. The code below shows how to obtain time-frequency
    decomposition of our waveform in scenario 2.


    > <sup>110</sup> The figure is adapted from the open-access article by Kim et
    al. title ‘Diagnostics 101: A Tutorial for Fault Diagnostics of Rolling Element
    Bearing Using Envelope Analysis in MATLAB’ and published in *Applied Sciences*
    (2020). The article is distributed under the terms and conditions of the Creative
    Commons Attribution (CC BY) license (http://creativecommons.org/licenses/by/4.0/).


    ![](img/cfcc9569b5e92ea115855752abddd75a_316_0.png)


    Figure 17.3: STFT procedure


    ```python

    # simulate signal

    import numpy as np, matplotlib.pyplot as plt

    fs = 1000 # 1000 Hz

    dt = 1.0/fs

    t = np.arange(0,1,dt)


    y1 = np.sin(2*np.pi*20*t ) # 20Hz component

    y2 = np.sin(2*np.pi*80*t) # 80Hz component

    y = np.hstack((y1,y2)) # sampled signal

    t = np.hstack((t, t[-1]+t))


    # generate spectrogram

    from scipy import signal

    f, t, Sxx = signal.stft(y, fs)


    plt.pcolormesh(t, f, np.abs(Sxx), shading=''gouraud'')

    plt.colorbar(), plt.ylabel(''Frequency [Hz]''), plt.xlabel(''Time [sec]'')

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_316_1.png)


    ## 17.4 Feature Extraction from Vibration Signals


    By the time you reach this step of your VCM workflow, you will have a waveform,
    and its spectrum and spectrogram at hand from which you can extract meaningful
    features. To illustrate feature extraction, we will use data from a real wind
    turbine. The wind turbine dataset<sup>111</sup> consists of vibration acceleration
    recorded from a wind turbine for a period of 50 days. Six seconds of vibration
    data was recorded each day A total of 50 files have been provided with each file
    containing data for a day. A bearing fault leads to increasing vibration levels
    with failure occurring on the 50<sup>th</sup> day. Figure 17.4 shows the combined
    vibration signal for the 50 days. An increasing level of vibration is clearly
    evident. Let’s understand how features can be extracted for a waveform from one
    day of data. We will reuse this dataset for building a metric called health indicator
    using only time domain features in Part 7 of the book and therefore, we will look
    at the code for time domain feature generation.


    ![](img/cfcc9569b5e92ea115855752abddd75a_317_0.png)


    ### Time domain features


    When a fault occurs in a rotating machine, the vibration levels and distribution
    of waveform may change. Waveform features can reflect these changes. Table 1 below
    shows the commonly used time domain features. We assume that the signal is $y(n)$
    for where $n = 1,2, \cdots , N$ where N is the number of data points.


    | Mean | Standard deviation | Root mean square (RMS) |

    | :--- | :--- | :--- |

    | $Y_m = \frac{1}{N} \sum_{n=1}^{N} y(n)$ | $Y_{std} = \sqrt{\frac{\sum_{n=1}^{N}(y(n)
    - Y_m)^2}{N - 1}}$ | $Y_{rms} = \sqrt{\frac{\sum_{n=1}^{N}(y(n))^2}{N}}$ |

    | **Peak** | **Peak-to-Peak** | **Skewness** |

    | $Y_{peak} = \max |y(n)|$ | $Y_{P2P} = \max y(n) - \min y(n)$ | $Y_{skewness}
    = \frac{\sum_{n=1}^{N}(y(n) - Y_m)^3}{(N - 1)Y_{std}^3}$ |

    | **Kurtosis** | **Shape factor** | **Crest factor** |

    | $Y_{kurtosis} = \frac{\sum_{n=1}^{N}(y(n) - Y_m)^4}{(N - 1)Y_{std}^4}$ | $Y_{SF}
    = \frac{Y_{rms}}{\frac{1}{N} \sum_{n=1}^{N} |y(n)|}$ | $Y_{CF} = \frac{Y_{peak}}{Y_{rms}}$
    |

    | **Impulse factor** | **Margin (or clearance) factor** | |

    | $Y_{IF} = \frac{Y_{peak}}{\frac{1}{N} \sum_{n=1}^{N} |y(n)|}$ | $Y_{MF} = \frac{Y_{peak}}{\left(\frac{1}{N}
    \sum_{n=1}^{N} \sqrt{|y(n)|}\right)^2}$ | |


    Table 1: Time domain statistical features


    Features like RMS (root mean square), STD (standard deviation), peak, and P2P
    (peak to peak) show increasing trend as a fault becomes more and more severe.
    RMS quantifies the energy content in the vibration signal and is a popular metric
    for vibration monitoring. RMS is also more stable and robust to noise compared
    to other metrics such as peak and P2P. The code below shows how to compute these
    features.


    ```python

    # import packages

    import numpy as np, matplotlib.pyplot as plt, pandas as pd

    import scipy.io

    ```


    ```python

    # fetch data for a waveform (file data-20130418T230803Z.mat randomly selected)

    matlab_data = scipy.io.loadmat(''data-20130418T230803Z.mat'', struct_as_record
    = False)

    vib_data = matlab_data[''vibration''][:,0]

    ```


    ```python

    plt.figure(figsize=(15,6))

    plt.plot(vib_data, linewidth=0.2)

    plt.xlabel(''sample #'', fontsize=25), plt.ylabel(''Acceleration (g)'', fontsize=25)

    ```


    ![](img/cfcc9569b5e92ea115855752abddd75a_319_0.png)


    ```python

    # compute RMS, STD, peak, peak2peak

    N = len(vib_data)

    vibStd = np.std(vib_data, ddof=1, axis=0)

    vibRMS = np.sqrt(np.sum(vib_data ** 2)/N)

    vibPeak = np.max(np.abs(vib_data))

    vibPeak2Peak = np.max(vib_data) - np.min(vib_data)

    ```


    ```

    >>> Standard deviation: 2.288

    >>> RMS: 2.293

    >>> Peak: 16.049

    >>> Peak-to-Peak: 31.163

    ```


    RMS (and peak, P2P) are not capable of detecting faults during early stages. Kurtosis
    and skewness are more preferred for incipient faults. Kurtosis is a good indicator
    of an impulsive/spiky signal. Skewness quantifies the asymmetry of the distribution
    of the vibration signal amplitude. It is known that for a normally functioning
    machine, kurtosis and skewness are around 3 and 0, respectively. For faulty machines,
    kurtosis becomes higher than 3 and skewness deviate from 0 significantly. Note
    that kurtosis is known to be not suitable for very severe faults as its value
    decreases when the waveform becomes less impulsive.'

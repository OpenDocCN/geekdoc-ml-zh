    ## 线性稳态过程的多元统计过程监控：第二部分


    至此，您一定对PCA和PLS技术的强大功能印象深刻。这些方法使我们能够提取潜变量，并分别监控潜空间中的系统性变化和过程噪声。然而，您可能会问：“这些是适用于所有问题的最佳潜变量技术吗？”。我们很高兴您提出这个问题！确实存在其他强大的方法，在某些场景下可能更为适用。例如，当过程数据不服从高斯分布时，独立成分分析（ICA）比PCA更可取。它能提供具有更严格统计独立性（而非仅仅是不相关性）的潜变量。独立成分可能比主成分更能表征过程数据，从而可能带来更好的监控性能。


    在另一种场景下，如果您的最终目标是将过程故障分类为不同类别以进行故障诊断，那么，最大化不同类别故障数据之间的分离度将是您的首要关注点，而非最大化数据方差的捕获。对于此类任务，Fisher判别分析（FDA）是首选。



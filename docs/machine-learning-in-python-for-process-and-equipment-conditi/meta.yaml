  md: '# Chapter 14


    # Proximity-based Techniques for Fault Detection


    Most of the anomaly detection techniques that we have studied so far work by finding
    some structure in training dataset, such as the low-dimensional manifold in PCA,
    NOC boundary in SVDD, optimal separating hyperplane in SVM, etc. However, another
    popular class of methods exists that utilizes a very straightforward and natural
    notion of anomalies as data points that are far away or isolated from the NOC
    data samples; logically, these methods are classified as proximity-based methods.


    Proximity of a data point can simply be defined as its distance (as done in *k*-NN
    method) from its neighbors. An abnormal data point lies far away from other NOC
    data and therefore, its nearest neighbors’ distances will be large compared to
    those for NOC samples. Another related but slightly different notion of proximity
    is the density or number of other data points in a local region around a test
    sample. Local outlier factor (LOF) is a popular method in this category wherein
    samples not lying in dense region are classified as anomalies. The third technique,
    isolation forest (IF), that we will study in this chapter uses the similar notion
    that anomalies are ‘far and between’. Here, the data space is split until each
    data point gets ‘isolated’. Anomalies can be isolated easily and require very
    few splits compared to NOC samples that lie close to each other.


    You may have realized that these techniques generate interpretable results and
    are easy to understand. Correspondingly, they come in pretty handy to analyze
    complex system whose characteristics may not be well-known *a priori*. Let’s now
    get down to business. We will cover the following topics


    +   - Introduction to k-NN technique

    - Introduction to LOF technique

    - Introduction to isolation forest technique

    - Applications of k-NN, LOF, and IF for fault detection in semiconductor manufacturing
    process'
  merge: -1
  pgno: 253
- img_proc: true
  md: '# 14.1 KNN: An Introduction


    The k-nearest neighbors (k-NN or KNN) algorithm is a versatile technique based
    on a simple intuitive idea that the label/value for a new sample can be obtained
    from the labels/values of closest neighboring samples (in the feature space) from
    the training dataset. The parameter $k$ denotes the number of neighboring samples
    utilized by the algorithm. As shown in Figure 14.1, k-NN can be used for both
    classification and regression. For classification, k-NN assigns test sample to
    the class that appears the most amongst the $k$ neighbors. For regression, the
    predicted output is the average of the value of the $k$ neighbors. Due to its
    simplicity, k-NN is widely used for pattern classification and was included in
    the list of top 10 algorithms in data mining. $^{89}$


    ![](img/cfcc9569b5e92ea115855752abddd75a_254_0.png)


    > k-NN belongs to the class of lazy learners where models are not built explicitly
    until test samples are received. At the other end of the spectrum, eager learners
    (like, SVM, decision trees, ANN) ''learn'' explicit models from training samples.
    Unsurprisingly, training is slower, and testing is faster for eager learners.
    KNN requires computing the distance of the test sample from all the training samples,
    therefore, k-NN also falls under the classification of instance-based learning.
    Instance-based learners make predictions by comparing the test sample with training
    instances stored in memory. On the other hand, model-based learners do not need
    to store the training instances for making predictions.'
  merge: -1
  pgno: 254
- img_proc: true
  md: '# Conceptual background


    Apart from an integer $k$ and input-output training pairs, k-NN algorithm needs
    a distance metric to quantify the closeness of a test sample with the training
    samples. The standard Euclidean metric is commonly employed. Once the nearest
    neighbors have been determined, two approaches, namely uniform and distance-based,
    can be employed to decide weights assigned to each neighbor which impacts the
    neighbor’s contribution in prediction. In uniform weighting, all $k$ neighbors
    are treated equally while, in distance-based weighting, each of the $k$ neighbors
    is weighted by the inverse of their distance from the test sample so that closer
    neighbors will have greater contributions. The figure below illustrates the difference
    between the two weight schemes for a classification problem


    ![](img/cfcc9569b5e92ea115855752abddd75a_255_0.png)


    Figure 14.2: Illustration on impact of weight-scheme on k-NN output. Dashed circles
    are for distance references.


    In Figure 14.2, with uniform weighting (also called majority voting for classification
    problems), the test sample is assigned to class 1 for $k = 1$ or 3 and class 2
    for $k = 6$. For $k = 8$, no decision can be made. With distance-weighting, test
    sample is always classified as class 1 for k = 1, 3, 6, or 8. This illustration
    shows that distance weighting can help reduce the prediction dependence on the
    choice of $k$.


    For predictions, k-NN needs to compute the distance of test samples from all the
    training samples. For large training sets, this computation can become expensive.
    However, specialized techniques, such as KDTree and BallTree, have been developed
    to speed up the extraction of neighboring points without impacting prediction
    accuracies. These techniques utilize the structure in data to avoid computing
    distances from all training samples. The NearestNeighbors implementation in scikit-learn
    automatically selects the algorithm best suited to the problem at hand. The KNeighborsRegressor
    and KNeighborsClassifier modules are provided by Scikit-learn for regression and
    classification, respectively.'
  merge: -1
  pgno: 255
- img_proc: true
  md: 'A couple of things to pay careful attention in k-NN include variable selection
    and variable scaling. Variables that are not important for output predictions
    should be removed; otherwise unimportant variables will undesirably impact the
    determination of nearest neighbors. Further, the selected variables should be
    properly scaled to ensure that variables with large magnitudes do not dwarf the
    contribution of other variables during distance computations.


    # Deciding k-NN hyperparameters


    The choice of the hyperparameter, $k$, is critical and is the knob to balance
    underfitting and overfitting. Small $k$ can lead to overfitting where noisy measurements
    unfavorably impact the predictions. Large $k$ can reduce the effect of noise but
    can lead to underfitting as it over-smooths the predictions for regression or
    make classification boundaries less distinct. Unfortunately, there is no standard
    guidance on the choice of $k$. The optimal value depends on the data and can be
    estimated via cross-validation.


    # Applications of k-NN for process systems


    As alluded to before, k-NN method is often employed for equipment condition monitoring$^{90}$.
    For process-level monitoring, k-NN classification can be used to classify process
    abnormalities into distinct fault classes if sufficient historical faulty samples
    are available. As opposed to k-NN fault classification, an interesting adaptation
    of k-NN for fault detection was proposed by He & Wang that made use of only normal
    operation data$^{91}$. We will study this application in more detail in the next
    section.


    A few other notable applications of k-NN for process systems include the work
    of Facco et al. on automatic maintenance of soft sensors$^{92}$, Borghesan et
    al. on forecasting of process disturbances$^{93}$, Cecilio et al. on detecting
    transient process disturbances$^{94}$, and Zhou et al. on fault identification
    in industrial processes$^{95}$. These applications may not utilize the k-NN method
    directly for classification or regression but use the underlying concept of similarity
    of nearest neighbors.


    $^{90}$ Dong Wang, K-nearest neighbors-based methods for identification of different
    gear crack levels under different motor speeds and loads: Revisited, Mechanical
    Systems and Signal Processing, 2016

    $^{91}$ He and Wang, Fault detection using k-nearest neighbor rule for semiconductor
    manufacturing processes, IEEE Transactions on Semiconductor Manufacturing, 2007.

    $^{92}$ Facco et al., Nearest-neighbor method for the automatic maintenance of
    multivariate statistical soft sensors in batch processing, Industrial Engineering
    & Chemistry Research, 2010.

    $^{93}$ Borghesan et al., Forecasting of process disturbances using k-nearest
    neighbors, with an application in process control, Computers and Chemical Engineering,
    2019.

    $^{94}$ Cecilio et al., Nearest neighbors methods for detecting transient disturbances
    in process and electromechanical systems, Journal of Process Control, 2014.

    $^{95}$ Zhou et al., Fault identification using fast k-nearest neighbor reconstruction,
    Processes, 2019'
  merge: -1
  pgno: 256

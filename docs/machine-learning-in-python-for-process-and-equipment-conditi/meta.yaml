- img_proc: true
  md: 'It is apparent that very small $\sigma$ yields overfitted models leading to
    high rate of false alarms, while large $\sigma$ results in underfitted models
    because the abnormality contours are not able to accurately capture the data distribution.
    The kernel width may be selected empirically or via cross-validation. Empirically,
    $\sigma$ is often set to be $5m$ where $m$ is the number of process variables$^{70}$.
    In the cross-validation approach, $\sigma$ is set to be the smallest value that
    results in acceptable level of false alarm on a validation dataset. Tan et al.,
    suggested the range $[0, d_{train,max}]^{71}$ to search for the optimal $\sigma$
    where $d_{train,max} = \max \sqrt{\|x_i - x_j\|}$ for $x_i, x_j \in$ training
    dataset.


    # Selection of number of retained latents ($a$)


    A common approach is to choose $a$ such that 95% of the variability in feature
    space is captured, i.e.,


    $$a = \underset{j \in [1, N]}{argmin} \sum_{i=1}^j \lambda_i / \sum_{i=1}^N \lambda_i
    \geq 0.95$$


    Another popular approach is the average eigenvalue method where only eigenvectors
    with eigenvalues above the average of all eigenvalues are included.


    # 10.2 Fault Detection using Kernel PCA


    Phew! It was a lot of mathematics in the previous section. Our aim was not to
    scare you away by going into this level of details, but to provide you with enough
    background so that you can carry out each step of KPCA-based fault detection confidently.
    In fact, Sklearn provides KernelPCA class that does the job of computing the scores
    for you; all you need to do it compute the monitoring statistic. To further clarify
    all the steps, we will use the following synthetic process for demonstration.
    It is a system with 3 measurements $x_1$, $x_2$ and $x_3$.


    $$x_1 = u^2 + 0.3 \sin(2\pi u) + \varepsilon_1$$

    $$x_2 = u + \varepsilon_2$$

    $$x_3 = u^3 + u + 1 + \varepsilon_3$$'

    test_df_scaled = test_df_scaled.reindex(columns = all_cols) # same columns order\
    \ as before\n```\n\nNext, we will create the sequence samples. For each engine,\
    \ any continuous block of 50 cycles forms a sequence. To accomplish this, we will\

  - '[PAGE 94]


    CUSUM charts can also detect large shifts in process mean; however, the detection
    is slower (i.e., the ARL(1) is higher) than Shewhart charts. EWMA provides a good
    compromise between detection of small mean shifts and quick detection of large
    shifts.


    # 5.4 EWMA Charts: An Introduction


    Like CUSUM, EWMA charts are control charts with memory. Here, at any $i^{th}$
    sampling instant, the statistic ($z_i$) plotted on the EWMA control chart is a
    weighted combination of the $i^{th}$ process measurement and the previous statistic
    $z_{i-1}$; this translates to EWMA statistic being an exponentially weighted average
    of all the past measurements as shown in Figure 5.5. We can see that EWMA chart
    provides a balance between Shewhart (only current observation is considered) and
    CUSUM (equal weightage given to all available observations) charts; accordingly,
    this leads to a good balance between detection delay and fault sensitivity.


    ![](img/cfcc9569b5e92ea115855752abddd75a_94_0.png)


    The hyperparameter $\lambda$ determines the weightage given to past observations.
    For $\lambda = 1$, EWMA chart reduces to Shewhart chart and as $\lambda \to 0$,
    CUSUM-like properties begin to emerge. A usual recommendation is to have $0.2
    \le \lambda \le 0.3$. The 3-sigma control limits are given as follows.'

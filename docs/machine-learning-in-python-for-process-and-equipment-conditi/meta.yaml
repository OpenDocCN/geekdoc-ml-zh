    # Complex chemical process: Tennessee Eastman Process (TEP)


    To demonstrate the superior performance of ICA and FDA over PCA, we will use the
    TEP dataset that we previously saw in Chapter 3. We know that this process consists
    of several unit operations: a reactor, a condenser, a separator, a stripper, and
    a recycle compressor<sup>48</sup>. There are 22 continuous process measurements,
    19 composition measurements, and 11 manipulated variables. The dataset contains
    training and test data from normal operation period and 21 faulty periods with
    distinct fault causes. For each fault class, training dataset contains 480 samples
    collected over 24 operation hours and test dataset contains 960 samples collected
    over 48 operation hours. For the faulty data, faulty operation starts from sample

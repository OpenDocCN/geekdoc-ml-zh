    Variable # 24 makes large contributions to both the indices and in Figure 7.10
    we can see a sharp decline in its value towards the end of the sampling period.
    A plant operator can use his/her judgement to further troubleshoot the abnormality
    to isolate the root-cause.


    ![](img/cfcc9569b5e92ea115855752abddd75a_122_0.png)


    Note that contribution plots do not explicitly identify the underlying cause of
    the fault; rather, they only isolate the variables that have been most affected
    by the fault or are most inconsistent with the NOC behavior.


    # Smearing effect


    > While contribution analysis is a widely employed method for fault isolation,
    it is prone to errors – variables that are not impacted by fault can end up having
    significant contributions. For example, in the simple illustration below, assume
    that an actual process state denoted by point ‘a’ is measured as point ‘b’ due
    to faulty $f_1$ sensor. However, as shown, variable $f_2$ makes significant contribution
    to the Q metric and therefore, $f_2$ will be inferred to be faulty as well. The
    take-home message is that caution must be exercised during interpretation of the
    contribution plot and the actual data for the highlighted variables should be
    checked before reporting the faulty variables.


    ![](img/cfcc9569b5e92ea115855752abddd75a_122_1.png)


    Other approaches for fault isolation have been explored such as the reconstruction-based
    approach by Alcala & Qin (see the 2009 article title ‘Reconstruction-based approach
    for process monitoring’ published in Automatica).'
- md: "## 7.4 PLS: An Introduction\n\nPartial least squares (PLS) is a supervised\
    \ multivariate regression technique that estimates linear relationship between\
    \ a set of input variables and a set of output variables. Like PCA, PLS transforms\
    \ raw data into latent components - input ($X$) and output ($Y$) data matrices\
    \ are transformed into score matrices $T$ and $U$, respectively. Figure 7.11 provides\
    \ a conceptual comparison of PLS methodology with those of other popular linear\
    \ regression techniques, principal component regression (PCR) and multivariate\
    \ linear regression (MLR).\n\n![](img/cfcc9569b5e92ea115855752abddd75a_123_0.png)\n\
    \nWhile MLR computes the least-squares fit between $X$ and $Y$ directly, PCR first\
    \ performs PCA on input data and then computes least-squares fit between the score\
    \ matrix and $Y$. By doing so, PCR is able to overcome the issues of collinearity,\
    \ high correlation, noisy measurements, and limited training dataset. However,\
    \ the latent variables are computed independent of the output data and therefore,\
    \ the score matrix may capture those variations in $X$ which are not relevant\
    \ for predicting $Y$. PLS overcomes this issue by estimating the score matrices,\
    \ $T$ and $U$, simultaneously such that the variation in $X$ that is relevant\
    \ for predicting $Y$ is maximally captured in the latent variable space.\n\n>\
    \ Note that if the number of latent components retained in PLS or PCR model is\
    \ equal to the original number of input variables (m), then PLS and PCR models\
    \ are equivalent to MLR model.\n\nThe unique favorable properties of PLS along\
    \ with low computational requirements has led to its widespread usage in process\
    \ monitoring for real-time process monitoring, soft-sensing, fault classification,\
    \ and so on.\n\n## Mathematical background\n\nPLS performs 3 simultaneous jobs:\n\
    \n- Capture maximum variability in $X$\n- Capture maximum variability in $Y$\n\
    - Maximize correlation between $X$ and $Y$\n\nTo see how PLS achieves its objectives,\
    \ consider again the data matrix $X \\in \\mathbb{R}^{N \\times m}$ consisting\
    \ of $N$ observations of $m$ input variables where each row represents a data-point\
    \ in the original measurement space. In addition, we also have an output data\
    \ matrix with $p$ ($\\ge 1$) output variables, $Y \\in \\mathbb{R}^{N \\times\
    \ p}$. It is assumed that each column is normalized to zero mean and unit variance\
    \ in both the matrices. The first latent component scores are given by:\n\n$t_1\
    \ = Xw_1$ and $u_1 = Yc_1$\n\nThe vectors $w_1$ and $c_1$, termed weight vectors,\
    \ are computed such that the covariance between $t_1$ and $u_1$ are maximized.\
    \ Referring to the definition of covariance, we can see that by maximizing the\
    \ covariance, PLS tries to meet all the three objectives simultaneously.\n\n$Cov(t_1,\
    \ u_1) = Correlation(t_1, u_1) * \\sqrt{Var(t_1)} * \\sqrt{Var(u_1)}$\n\nIn the\
    \ next step, with the computed pairs $\\{X, t_1\\}$ and $\\{Y, u_1\\}$, loading\
    \ vectors ($p_1$ and $q_1$), are found via least squares regression\n\n$X = t_1p_1^T\
    \ + E_1$ and $Y = u_1q_1^T + F_1$\n\nIn Eq. 12, $E$ and $F$ are called residual\
    \ matrices and represent the part of $X$ and $Y$ that have not yet been captured.\
    \ To find the next component scores, the above three steps are repeated with matrices\
    \ $E_1$ and $F_1$ replacing $X$ and $Y$. Note that the maximum number of possible\
    \ components equals $m$. For each component, the weight vectors are found via\
    \ iterative procedures like NIPALS (algorithm shown later) or SIMPLS. The final\
    \ PLS decomposition looks like the following\n\n$X = TP^T + E = \\sum_{i=1}^k\
    \ t_ip_i^T + E$\n\n$Y = UQ^T + F = \\sum_{i=1}^k u_iq_i^T + F$\n\nwhere $k$ is\
    \ the number of latent components computed. The expressions in Eq. (11) are referred\
    \ to as the outer relations for the X and Y blocks, respectively. An inner relation\
    \ is also estimated for each pair $\\{t_i, u_i\\}$ via linear regression\n\n$u_i\
    \ \\approx b_i t_i$\n\nor $U = [u_1, u_2, \\cdots, u_k] \\approx [b_1 t_1, b_2\
    \ t_2, \\cdots, b_k t_k] = TB$\n\nwhere $B = diag([b_1, b_2, \\cdots, b_k])$ is\
    \ a diagonal matrix of regression coefficients and connects the two blocks together;\
    \ it is used to estimate an unknown $Y$ for a given $X$ through the latent variables\
    \ as follows\n\n$\\hat{Y} = \\hat{U}Q^T = TBQ^T$\n\nIf these algorithmic details\
    \ appear intimidating, do not worry$^{40}$. Sklearn provides the class PLSRegression\
    \ which is very convenient to use as we will see in the next section where we\
    \ will develop a PLS-based fault detection tool.\n\n## Algorithm: PLS model fitting\
    \ via NIPALS\n\n1. Initialize $i = 1$, $X_1 = X, Y_1 = Y$\n2. Set score vector\
    \ $u_i (\\in \\mathbb{R}^{Nx1})$ to any column of $Y_i$\n3. Calculate weight vector\
    \ $w_i = X^T u_i$\n4. Compute score vector $t_i (\\in \\mathbb{R}^{Nx1}) = X_i\
    \ w_i$\n5. Scale $t_i$ to unit length: $t_i = t_i / \\|t_i\\|$\n6. Calculate weight\
    \ vector $c_i = Y_i^T t_i$\n7. Update score vector $u_i = Y_i c_i$\n8. Scale $u_i$\
    \ to unit length: $u_i = u_i / \\|u_i\\|$\n9. Repeat steps 3 to 8 until convergence\n\
    10. Deflate matrices:\n    $X_{i+1} = X_i - t_i t_i^T X_i$\n    $Y_{i+1} = Y_i\
    \ - t_i t_i^T Y_i$\n11. Set $i = i + 1$ and return to step 2. Stop when $i > k$\
    \ [number of latents to be retained]\n12. Form the matrices $T = [t_1, t_2, \\\
    cdots, t_k]$\n    $U = [u_1, u_2, \\cdots, u_k]$\n\n## Computing score matrix\
    \ $T$ directly from $X$\n\nIn PCA, we could directly obtain the score matrix T\
    \ via the relation $T = XP$ (Eq. (3)). Therefore, it is natural to wonder if we\
    \ can extend Eq. (11) to write $T = XW$? Unfortunately, this wouldn't be correct\
    \ as the weight vectors ($w$) operate on the deflated matrices (see NIPALS algorithm).\
    \ Nonetheless, there exist another set of vectors called the $r$ vectors$^{41}$\
    \ or the $R$ matrix which can provide us the scores directly from the original\
    \ predictor matrix $X$.\n\n$t_i = Xr_i$ and $T = XR$\n\nwhere, $R = W(P^TW)^{-1}$\
    \ whose $j^{th}$ column equals the vector $r_i$. An obvious relationship is that\
    \ $r_1 = w_1$.\n\n## 7.5 Fault Detection via PLS: Polyethylene Manufacturing Case\
    \ Study\n\nAlthough soft sensing is the predominant use of PLS in process industry,\
    \ the PLS framework renders itself useful for process monitoring as well. The\
    \ overall methodology is similar to PCA-based monitoring: after PLS modeling,\
    \ monitoring indices are computed, control limits are determined, and violation\
    \ of the control limits are checked for fault detection. PLS-based monitoring\
    \ is preferred when process data can be divided into input and output blocks.\
    \ For illustration, we will use data collected from an LDPE (low-density polyethylene)\
    \ production process using a simulated model that was tuned to match a typical\
    \ industrial process$^{42}$. As shown in the figure below, the process consists\
    \ of a multi-zonal tubular reactor. The dataset consists of 54 samples of 14 process\
    \ variables and 5 product quality variables. It is known that a process fault\
    \ occurs sample 51 onwards (Figure 7.13).\n\n![](img/cfcc9569b5e92ea115855752abddd75a_126_0.png)\n\
    \nOur objective here is to build a fault detection tool that clearly indicates\
    \ the onset of process fault. To appreciate the need for such a tool, let's look\
    \ at the alternative conventional monitoring approach. If a plant operator was\
    \ manually monitoring the 5 quality variables continuously, he/she could notice\
    \ a slight drop in values for the last 4 samples. However, given that the quality\
    \ variables exhibit large variability during normal operations, it is difficult\
    \ to make any decision without first examining other process variables because\
    \ the quality variables may simply be responding to 'normal' changes elsewhere\
    \ in the process. Unfortunately, it would be very inconvenient to manually interpret\
    \ all the process plots simultaneously.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_127_0.png)\n\
    \nWe begin by building a PLS model using 3 latent components<sup>43</sup>.\n\n\
    ```python\n# fetch data\ndata = pd.read_csv('LDPE.csv', usecols = range(1,20)).values\n\
    data_train = data[:-4,:] # exclude last 4 faulty samples\n\n# scale data\nfrom\
    \ sklearn.preprocessing import StandardScaler\nscaler = StandardScaler()\ndata_train_normal\
    \ = scaler.fit_transform(data_train)\n```\n\n> <sup>43</sup> Kourt & MacGregor,\
    \ Process analysis, monitoring and diagnosis, using multivariate projection methods,\
    \ Chemometrics and Intelligent Laboratory Systems, 1995"
  mdcn: "## 7.4 PLS：简介\n\n偏最小二乘法（PLS）是一种有监督的多元回归技术，用于估计一组输入变量与一组输出变量之间的线性关系。与主成分分析（PCA）类似，PLS将原始数据转换为潜在成分——输入（$X$）和输出（$Y$）数据矩阵分别被转换为得分矩阵$T$和$U$。图7.11提供了PLS方法与其他流行线性回归技术——主成分回归（PCR）和多元线性回归（MLR）的概念性比较。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_123_0.png)\n\nMLR直接计算$X$和$Y$之间的最小二乘拟合，而PCR首先对输入数据执行PCA，然后计算得分矩阵与$Y$之间的最小二乘拟合。通过这种方式，PCR能够克服共线性、高相关性、噪声测量和有限训练数据集等问题。然而，潜在变量的计算独立于输出数据，因此，得分矩阵可能捕获了与预测$Y$无关的$X$中的变异。PLS通过同时估计得分矩阵$T$和$U$来克服这个问题，从而在潜在变量空间中最大化地捕获与预测$Y$相关的$X$中的变异。\n\
    \n> 请注意，如果PLS或PCR模型中保留的潜在成分数量等于原始输入变量数量（m），则PLS和PCR模型等同于MLR模型。\n\nPLS独特的有利特性以及低计算需求，使其在过程监控中得到广泛应用，例如实时过程监控、软测量、故障分类等。\n\
    \n## 数学背景\n\nPLS同时执行三项任务：\n\n- 捕获$X$中的最大变异性\n- 捕获$Y$中的最大变异性\n- 最大化$X$和$Y$之间的相关性\n\
    \n为了理解PLS如何实现其目标，再次考虑数据矩阵$X \\in \\mathbb{R}^{N \\times m}$，它包含$N$个观测值，每个观测值有$m$个输入变量，其中每一行代表原始测量空间中的一个数据点。此外，我们还有一个输出数据矩阵$Y\
    \ \\in \\mathbb{R}^{N \\times p}$，包含$p$（$\\ge 1$）个输出变量。假设两个矩阵中的每一列都已归一化为零均值和单位方差。第一个潜在成分得分由下式给出：\n\
    \n$t_1 = Xw_1$ 和 $u_1 = Yc_1$\n\n向量$w_1$和$c_1$（称为权重向量）的计算方式是使$t_1$和$u_1$之间的协方差最大化。参考协方差的定义，我们可以看到，通过最大化协方差，PLS试图同时满足所有三个目标。\n\
    \n$Cov(t_1, u_1) = Correlation(t_1, u_1) * \\sqrt{Var(t_1)} * \\sqrt{Var(u_1)}$\n\
    \n在下一步中，利用计算出的配对$\\{X, t_1\\}$和$\\{Y, u_1\\}$，通过最小二乘回归找到载荷向量（$p_1$和$q_1$）：\n\n\
    $X = t_1p_1^T + E_1$ 和 $Y = u_1q_1^T + F_1$\n\n在公式12中，$E$和$F$称为残差矩阵，代表尚未被捕获的$X$和$Y$的部分。为了找到下一个成分得分，使用矩阵$E_1$和$F_1$代替$X$和$Y$，重复上述三个步骤。请注意，可能的最大成分数量等于$m$。对于每个成分，权重向量通过迭代过程（如NIPALS（算法稍后展示）或SIMPLS）找到。最终的PLS分解如下所示：\n\
    \n$X = TP^T + E = \\sum_{i=1}^k t_ip_i^T + E$\n\n$Y = UQ^T + F = \\sum_{i=1}^k\
    \ u_iq_i^T + F$\n\n其中$k$是计算出的潜在成分数量。公式(11)中的表达式分别称为X和Y块的外部关系。对于每一对$\\{t_i, u_i\\\
    }$，还通过线性回归估计一个内部关系：\n\n$u_i \\approx b_i t_i$\n\n或 $U = [u_1, u_2, \\cdots, u_k]\
    \ \\approx [b_1 t_1, b_2 t_2, \\cdots, b_k t_k] = TB$\n\n其中$B = diag([b_1, b_2,\
    \ \\cdots, b_k])$是一个回归系数的对角矩阵，它将两个块连接在一起；它用于通过潜在变量估计给定$X$的未知$Y$，如下所示：\n\n$\\hat{Y}\
    \ = \\hat{U}Q^T = TBQ^T$\n\n如果这些算法细节看起来令人生畏，请不要担心$^{40}$。Sklearn提供了PLSRegression类，使用起来非常方便，我们将在下一节中看到，届时我们将开发一个基于PLS的故障检测工具。\n\
    \n## 算法：通过NIPALS拟合PLS模型\n\n1.  初始化 $i = 1$, $X_1 = X, Y_1 = Y$\n2.  将得分向量 $u_i\
    \ (\\in \\mathbb{R}^{Nx1})$ 设置为 $Y_i$ 的任意一列\n3.  计算权重向量 $w_i = X^T u_i$\n4.  计算得分向量\
    \ $t_i (\\in \\mathbb{R}^{Nx1}) = X_i w_i$\n5.  将 $t_i$ 缩放为单位长度：$t_i = t_i / \\\
    |t_i\\|$\n6.  计算权重向量 $c_i = Y_i^T t_i$\n7.  更新得分向量 $u_i = Y_i c_i$\n8.  将 $u_i$\
    \ 缩放为单位长度：$u_i = u_i / \\|u_i\\|$\n9.  重复步骤3到8直到收敛\n10. 缩减矩阵：\n    $X_{i+1} =\
    \ X_i - t_i t_i^T X_i$\n    $Y_{i+1} = Y_i - t_i t_i^T Y_i$\n11. 设置 $i = i + 1$\
    \ 并返回步骤2。当 $i > k$ [要保留的潜在成分数] 时停止。\n12. 构建矩阵 $T = [t_1, t_2, \\cdots, t_k]$\n\
    \    $U = [u_1, u_2, \\cdots, u_k]$\n\n## 直接从$X$计算得分矩阵$T$\n\n在PCA中，我们可以通过关系式 $T\
    \ = XP$（公式(3)）直接获得得分矩阵T。因此，很自然地想知道我们是否可以扩展公式(11)来写成 $T = XW$？不幸的是，这是不正确的，因为权重向量（$w$）作用于缩减后的矩阵（参见NIPALS算法）。尽管如此，存在另一组向量，称为$r$向量$^{41}$或$R$矩阵，它可以直接从原始预测变量矩阵$X$为我们提供得分。\n\
    \n$t_i = Xr_i$ 和 $T = XR$\n\n其中，$R = W(P^TW)^{-1}$，其第$j^{th}$列等于向量$r_i$。一个明显的关系是\
    \ $r_1 = w_1$。\n\n## 7.5 通过PLS进行故障检测：聚乙烯制造案例研究\n\n尽管软测量是PLS在过程工业中的主要应用，但PLS框架本身也对过程监控很有用。总体方法类似于基于PCA的监控：在PLS建模后，计算监控指数，确定控制限，并检查是否违反控制限以进行故障检测。当过程数据可以分为输入和输出块时，基于PLS的监控是首选。为了说明，我们将使用从LDPE（低密度聚乙烯）生产过程中收集的数据，该数据来自一个经过调整以匹配典型工业过程的模拟模型$^{42}$。如下图所示，该过程包括一个多区管式反应器。数据集包含54个样本，每个样本有14个过程变量和5个产品质量变量。已知从样本51开始发生过程故障（图7.13）。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_126_0.png)\n\n我们这里的目标是构建一个故障检测工具，清楚地指示过程故障的发生。为了理解这种工具的必要性，让我们看看替代的传统监控方法。如果工厂操作员手动持续监控5个质量变量，他/她可能会注意到最后4个样本的值略有下降。然而，考虑到质量变量在正常运行期间表现出较大的变异性，在首先检查其他过程变量之前很难做出任何决定，因为质量变量可能只是对过程中其他地方的“正常”变化做出响应。不幸的是，同时手动解释所有过程图表将非常不便。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_127_0.png)\n\n我们首先使用3个潜在成分<sup>43</sup>构建一个PLS模型。\n\
    \n```python\n# fetch data\ndata = pd.read_csv('LDPE.csv', usecols = range(1,20)).values\n\
    data_train = data[:-4,:] # exclude last 4 faulty samples\n\n# scale data\nfrom\
    \ sklearn.preprocessing import StandardScaler\nscaler = StandardScaler()\ndata_train_normal\
    \ = scaler.fit_transform(data_train)\n```\n\n> <sup>43</sup> Kourt & MacGregor,\
    \ Process analysis, monitoring and diagnosis, using multivariate projection methods,\
    \ Chemometrics and Intelligent Laboratory Systems, 1995"

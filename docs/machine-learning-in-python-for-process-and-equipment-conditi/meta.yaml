    \ $T^2$ 关于故障严重程度是非单调的，即当故障变得更严重时，Hotelling's $T^2$ 可能会减小！例如，如果一个样本 $x_{test}$\
    \ 远离 NOC 样本，那么沿每个主成分的得分值都会很小，因为高斯核函数值会很小。因此，$T^2$ 会很小，并且当 $x_{test}$ 远离健康数据时只会变得更小。\n\

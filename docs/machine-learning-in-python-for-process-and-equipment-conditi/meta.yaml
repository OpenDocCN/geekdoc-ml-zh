    \ Both $T^2$ and $Q$ values are significantly above the respective control limits.\n\
    \nFigure 7.8: Monitoring charts for training and test data. Vertical cyan-colored\
    \ line separates training and test data\n\n## 7.3 Fault Isolation via Contribution\
    \ Analysis for PCA\n\nAfter detection of process faults, the next crucial task\
    \ is to diagnose the issue and identify which specific process variables are showing\
    \ abnormal behavior. The popular mechanism to accomplish this is based on contribution\
    \ plots. As the name suggests, a contribution plot is a plot of the contribution\
    \ of original process variables to the abnormality indexes. The variables with\
    \ highest contributions are flagged as potentially faulty variables.\n\n*SPE contributions*\n\
    \nFor SPE (squared prediction error), let’s reconsider Eq. 7 as shown below where\
    \ $SPE_j$ denotes the SPE contribution of the $j^{th}$ variable.\n\n$$SPE = \\\
    sum_{j=1}^{m} e_j^2 = \\sum_{j=1}^{m} SPE_j$$\n\nTherefore, SPE contribution of\
    \ a variable is simply squared error for that variable. If SPE index has violated\
    \ its control limit, then the variables with relatively large $SPE_j$ values are\
    \ considered the potentially faulty variables.\n\n## T² contributions\n\nFor T²\
    \ contributions, calculations are not as straightforward. Several expressions\
    \ have been postulated in literature³⁷. The commonly used expression below was\
    \ proposed by wise et al.³⁸\n\n$$T^2 \\text{ contribution of variable } j = \\\
    left(j^{th} \\text{ element of } \\left(D^{1/2}x\\right)\\right)^2$$\n$$D = P\\\
    Lambda_k^{-1}P^T$$\n*eq. 10*\n\nNote that these contributions³⁹ are computed for\
    \ each data-point. Let's find which variables need to be further investigated\

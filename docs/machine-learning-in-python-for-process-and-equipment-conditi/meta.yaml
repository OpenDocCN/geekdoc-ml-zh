    \ copy\narr8 = np.arange(10).reshape((2,5))\narr8_sub2 = arr8[:, :2].copy()\n\
    arr8_sub2[1, 1] = 100 # arr8 won't be affected here\n```\n\nFancy indexing is\
    \ another way of obtaining a copy instead of a view of the array being indexed.\
    \ Fancy indexing simply entails using integer or boolean array/list to access\

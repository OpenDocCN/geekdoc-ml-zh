    \n$$\\Sigma_i^{(s+1)} = \\frac{\\sum_{j=1}^N P^{(s)}(C_i|x_j)(x_j-\\mu_i^{(s+1)})(x_j-\\\
    mu_i^{(s+1)})^T}{\\sum_{j=1}^N P^{(s)}(C_i|x_j)}$$\n\n$$\\omega_i^{(s+1)} = \\\
    frac{\\sum_{j=1}^N P^{(s)}(C_i|x_j)}{N}$$\n\n> Update centroid and covariance\
    \ of each cluster using recomputed memberships from E-step.\n\nThe iteration continues\

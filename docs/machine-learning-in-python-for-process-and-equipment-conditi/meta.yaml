    # RNN outputs


    If the neural layer in the RNN cell in Figure 15.5 contains $n$ neurons ($n$ equals
    4 in the shown figure), then each $y_{(i)}$ or $h_{(i)}$ is a $n$-dimensional
    vector. For simple RNN cells, $y_{(i)}$ equals $h_{(i)}$. Let $x$ be a $m$-dimensional
    vector. At any $i^{th}$ step, we can write the following relationship


    $$y_{(i)} = g(W_x x_{(i)} + W_y y_{(i-1)} + b)$$


    where $W_x \in R^{n \times m}$ with each row containing the weight parameters
    of a neuron as applied to $x$ vector, $W_y \in R^{n \times n}$ with each row containing
    the weight parameters of a neuron as applied to $y$ vector, $b \in R^n$ contains
    the bias parameters, and $g$ denotes the activation function. The same neural
    parameters are used at each step.


    If all the outputs of the sequence are of interest, then it is called sequence-to-sequence
    or many-to-many network. However, very often only the last step output is needed,
    leading to sequence-to-vector or many-to-one network. Moreover, the last step
    output may need to be further processed and so a FC layer is often added. Figure
    15.6 shows one such topology.


    ![](img/cfcc9569b5e92ea115855752abddd75a_276_0.png)


    # LSTM networks


    RNNs are powerful dynamic models, however, the vanilla RNN (with a single neural
    layer in a cell) introduced before faces difficulty learning long-term dependencies,
    i.e., when number of steps in a sequence is large (~ $\geq$ 10). This happens
    due to the vanishing gradient problem during gradient backpropagation. To overcome
    this issue, LSTM (Long Short-Term Memory) cells have been devised which are able
    to learn very long-term dependencies (even greater than 1000) with ease. Unlike
    vanilla RNN cells, LSTM cells have 4 separate neural layers as shown in Figure
    15.7. Moreover, in a LSTM cell, the internal state is stored in two separate'
  - '[PAGE 277]


    vectors, $h_{(t)}$ or hidden state and $c_{(t)}$ or cell state. Both these states
    are passed from one LSTM cell to the next during sequence processing. $h_{(t)}$
    can be thought of as the short-term state/memory and $c_{(t)}$ as the long-term
    state/memory and hence the name LSTM.


    The vector outputs of the FC layers interact with each-other and the long-term
    state via three ‘gates’ where element-wise multiplications occur. These gates
    control what information go into the long-term and short-term states at any sequence
    processing step. A quick description of each gate’s purpose is the following:


    +   - **Forget gate:** determines what parts of long-term state, $c_{(t)}$, are
    retained and erased

    - **Input gate:** determines what parts of new information (obtained from processing
    of $x_{(t)}$ and $h_{(t-1)}$) are stored in long-term state

    - **Output gate:** determines what parts of long-term state are passed on as short-term
    state


    ![](img/cfcc9569b5e92ea115855752abddd75a_277_0.png)


    Figure 15.7: Architecture of a LSTM cell. Three FC layers use sigmoid activation
    functions and one FC layer uses $tanh$ activation function. Each of these neural
    layers have its own parameters $W_x$, $W_h$, and $b$


    This flexibility in being able to manipulate what information are passed down
    the chain during sequence processing is what makes LSTM networks so successful
    at capturing long-term patterns in sequential datasets. Consequently, LSTM network
    is the default RNN architecture employed now-a-days. In Chapter 20, we will employ
    an LSTM model to predict remaining useful life of gas turbines. Let’s next learn
    how to use supervised ANN models for process fault detection.'

    \ P^{(s)}(C_i|x_j)(x_j-\\mu_i^{(s+1)})(x_j-\\mu_i^{(s+1)})^T}{\\sum_{j=1}^N P^{(s)}(C_i|x_j)}$$\n\
    \n$$\\omega_i^{(s+1)} = \\frac{\\sum_{j=1}^N P^{(s)}(C_i|x_j)}{N}$$\n\n> 使用从E步重新计算的隶属度，更新每个聚类的中心和协方差。\n\
    \n迭代持续进行，直到对数似然目标函数满足某个收敛准则。你是否注意到这与用于寻找模型参数的k-means算法在概念上的相似性？之前，我们使用`predict_prob`方法计算了数据点1069的后验概率。现在，让我们使用公式5看看是否能得到相同的数值。\n\

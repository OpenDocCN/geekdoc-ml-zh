    # Sources of error during Fourier transformation


    There are several sources of error during Fourier transformation which can result
    in spurious frequencies showing up in your spectrum plot, amplitudes being incorrect,
    and frequencies incorrectly missing from the spectrum. The errors can arise due
    to noisy measurements, inadequate frequency resolution, etc. Let’s consider a
    well-known error called ‘leakage’. To understand this, assume that a machine is
    vibrating sinusoidally at 1 Hz. A sequence of length 9.4 seconds is taken for
    analysis at $f_s = 20$ Hz.


    ![](img/cfcc9569b5e92ea115855752abddd75a_314_0.png)


    ![](img/cfcc9569b5e92ea115855752abddd75a_314_1.png)


    Instead of a sharp spectral line at 1 Hz, we have obtained a range of dominant
    frequencies. These spurious components result from the non-periodic waveform taken
    for analysis and the resulting smearing of energy in the frequency domain is called
    *leakage*. To prevent leakage, the waveform is multiplied with a window of data
    to force the sampled waveform to be zero at the beginning and the end as shown
    below. We can see that windowing has significantly reduced the smearing of frequencies.
    The window shown in the below illustration is called Hann window and is commonly
    employed for leakage reduction.


    ![](img/cfcc9569b5e92ea115855752abddd75a_314_2.png)


    ![](img/cfcc9569b5e92ea115855752abddd75a_314_3.png)'

    \begin{bmatrix} 1 & 2 \ 3 & -4 \end{bmatrix} u(k-1)$$

    $$u(k) = \begin{bmatrix} 0.811 & -0.226 \ 0.477 & 0.415 \end{bmatrix} u(k-1) +
    \begin{bmatrix} 0.193 & 0.689 \ -0.320 & -0.749 \end{bmatrix} w(k-1)$$

    $$y(k) = z(k) + v(k)$$


    Here, the outputs ($y(k)$) and inputs ($u(k)$) measurements are available for
    analysis. $w(k)$ and $v(k)$ are zero-mean random noise signals with variances
    1 and 0.1, respectively. Simulated data from the process are available in files
    *multivariate_NOC_data.txt* and *multivariate_test_data.txt*. In test data, A
    disturbance with unit step change of $w_2$ was introduced at sample 50 to simulate
    a faulty condition.


    We will now go through each step of building a DPCA-based fault detection solution.
    Let''s begin by reading the datasets, generating the augmented data matrices,
    and then training the DPCA model.


    ```


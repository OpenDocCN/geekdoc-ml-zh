    \ the ICA/PCA monitoring charts for faults 10 and 5. For Fault 10, ICA gives significantly\
    \ higher FDR. There are many samples between 400 to 600 where PCA metrics are\
    \ below their control limits despite the presence of process abnormalities. The\
    \ performance difference is even more prominent for Fault 5 test data. Sample\
    \ 400 onwards PCA charts incorrectly indicate a normal operation although it is\
    \ known that the faulty condition remains till the end of the sampling period.\
    \ Another point to note is that both PCA and ICA have low FAR values as not many\
    \ samples before sample 160 violate the control limits. Here again ICA has lower/better\
    \ FAR values. Similar FAR behavior is observed for the non-faulty test dataset.\

    # P-F Curve


    In the machinery reliability world, the P-F (potential failure) curve is a frequently
    used concept. The curve represents the progression of an equipment''s health condition
    over time from a healthy state to initiation of defect to failure. The changes
    in machine''s characteristics or failure symptoms such as high temperature, high
    vibration, high acoustic noise, etc., are specified on the curve which indicates
    the technique that may be effective in fault detection at any given stage of fault.


    ![](img/cfcc9569b5e92ea115855752abddd75a_345_1.png)


    Hopefully, now you have a better understanding of what fault prognosis entails
    and the different methodologies available to implement predictive maintenance
    solutions.


    # Summary


    In this chapter, we acquainted ourselves with the methodologies employed for predictive
    maintenance and undertook a detailed conceptual study of health indicators (HIs).
    Generation of HIs is one of the primary means for the estimation of RUL and therefore,
    we looked at the methods commonly used to compute health indicators. We consolidated
    the concepts covered by working through a real case study of HI generation for
    a wind turbine.'
- md: "## Chapter 20\n\n### Fault Prognosis: RUL Estimation\n\nIn the previous chapter,\
    \ we introduced the concept of remaining useful life which is simply the time\
    \ remaining until failure of an equipment. Three broad data-based techniques were\
    \ mentioned that are: 1) reliability data-based approach wherein lifespan distribution\
    \ of similar equipment is utilized to find the expected RUL 2) direct computation\
    \ of RUL via regression-based ML modeling 3) computation of health indicator as\
    \ an intermediate step. The first two approaches require information about the\
    \ past lifespan of equipment and complete run-to-failure histories. However, it\
    \ is difficult to get these data in process industry as very often machines get\
    \ repaired before they reach failure stages (remember preventive maintenance!).\
    \ This makes HI-based approach more suitable and, unsurprisingly, more popular.\
    \ In the previous chapter, we saw how to compute HI for a wind turbine. We will\
    \ take this case study to completion and show how to estimate the RUL.\n\nWithin\
    \ the HI-based approach, two strategies are widely adopted. If decent amount of\
    \ past run-to-failure data are available, then one can simply pick up the historical\
    \ HI trend that matches the most with the current equipment's HI trajectory and\
    \ use the historical lifespan to compute the required RUL. This is called similarity-based\
    \ approach. A popular alternative is to simply use the existing HI values of current\
    \ equipment and fit a curve to it to extrapolate it in the future and find when\
    \ the failure threshold is breached. This is called degradation-based approach.\
    \ We will go into more details into these two strategies in this chapter. Overall,\
    \ the following topics are covered:\n\n- Introduction to RUL\n- Health indicator-based\
    \ RUL estimation strategies\n- Health indicator degradation modeling for RUL estimation\
    \ of a wind turbine\n- Deep learning-based direct RUL estimation for a gas turbine\n\
    \n### 20.1 RUL: Revisited\n\nIn the previous chapter, we looked at some broad\
    \ classes of strategies for RUL estimation. We also looked at how a health indicator\
    \ can be calculated. Figure 20.1 reproduces Figure 19.1 and adds more details\
    \ regarding HI-based approaches for RUL computation. The figure also highlights\
    \ the four commonly employed strategies. As alluded to earlier, the choice of\
    \ model depends on the type and amount of information available on past failures.\
    \ If large amount of past run-to-failure data are available, then one can build\
    \ a deep learning model to directly predict the RUL. We will see one such application\
    \ in this chapter.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_347_0.png)\n\n\
    While HI-based strategies are popular, a few points of caution need to be mentioned.\
    \ For degradation-based modeling, you should ensure that either the impact of\
    \ future operating conditions is taken into account or the operating conditions\
    \ do not change much. For similarity-based approach, care should be taken that\
    \ the historical HI trajectories are selected for the same faulty conditions as\
    \ the fault that the current equipment is experiencing. Therefore, correct fault\
    \ classification is crucial prior to deployment of fault prognosis.\n\n### RUL\
    \ estimation performance assessment\n\nConsider the figure below. At time $t_k$,\
    \ degradation curve is extrapolated to predict RUL$_{pred}$ while the actual RUL\
    \ is RUL$_{actual}$. A trivial way to quantify error is to use mean squared error\
    \ (MSE). However, the impact of positive and negative RUL errors on plant operations\
    \ can be quite different. Underprediction (RUL$_{pred}$ < RUL$_{actual}$) ⇒ maintenance\
    \ takes place earlier than it should have been. While this is bad, the cost of\
    \ overprediction (RUL$_{pred}$ > RUL$_{actual}$) is worse as it can lead to delayed\
    \ maintenance and, therefore, catastrophic equipment failure.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_348_0.png)\n\
    \nThe preference for negative $\\varepsilon$ over positive $\\varepsilon$ is often\
    \ specified by putting greater penalty for $\\varepsilon$>0 when computing the\
    \ overall performance (for example, during model fitting).\n\n### 20.2 Health\
    \ Indicator-based RUL Estimation Strategies\n\nIn Figure 20.2, we saw that by\
    \ the time instance $t_k$, HI already shows a degradation trend. For RUL estimation,\
    \ the trick lies in figuring out how the HI evolves further until it reaches the\
    \ failure threshold. Let’s look at two popular ways of approaching this problem.\n\
    \n### Health degradation modeling\n\nIn the degradation model approach, a HI model\
    \ is fitted, as shown in the figure below, using the available HI data for the\
    \ equipment under study. As shown, the model can take different forms. At time\
    \ $t_k$, the model is used to predict $t_F$ when the fitted HI curve breaches\
    \ the failure threshold; this gives RUL prediction at time $t_k$ as $t_F - t_k$.\
    \ The model training and RUL estimation is redone at time $t_{k+1}$, when $h_{k+1}$\
    \ becomes available. We will apply this strategy to the wind turbine case-study\
    \ introduced in the previous chapter.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_349_0.png)\n\
    \nThe selection of failure threshold is non-trivial. The threshold may be easy\
    \ to specify if HI is based out of a single measurement or feature such as RMS\
    \ of vibration signal or temperature of equipment. However, for a generic case,\
    \ domain specific knowledge or historical failure records would be needed.\n\n\
    ### Trajectory similarity-based modeling\n\nIn similarity-based approach, known\
    \ HI trends from past equipment failures are gathered as shown in Figure 20.4\
    \ below. At time $t_k$, the trajectories that are similar$^{124}$ to the current\
    \ equipment's HI trajectory until time $t_k$ are selected. The lifespans of these\
    \ selected records are combined (simple average or weighted combination) to estimate\
    \ the RUL of the current equipment.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_350_0.png)\n\
    \n### 20.3 RUL Estimation via Degradation Modeling for a Wind Turbine\n\nTo demonstrate\
    \ degradation modeling-based approach, we will continue the case study of wind\
    \ turbine from the previous chapter. We will attempt to fit an exponential model\
    \ to the HI values obtained for the training period of 32 days.\n\n```python\n\
    # fit exponential model (HI = a*exp(b*t) + c); t is in days\nPCA_train_scores\
    \ = pca.transform(selectFeatures_train_normal)\nHI_train = PCA_train_scores[:,\
    \ 0]\nHI_train = HI_train - HI_train[0] # forcing HI to start from 0 for better\
    \ fit\n\ndef func(t, a, b):\n    return a*np.exp(b*t)\n```\n\n$^{124}$ Similarity\
    \ between two trajectories are often quantified via Euclidean distance. Alternatively,\
    \ dynamic time warping (DTW) has also been employed.\n\n```python\nparam_opt,\
    \ param_cov = scipy.optimize.curve_fit(func, range(32), HI_train)\n\nplt.figure(),\
    \ plt.plot(range(32), HI_train, '-o', color='darkorange', label='actual HI')\n\
    plt.plot(range(32), func(np.arange(32), *param_opt), '-o', color='maroon', label='predicted\
    \ HI')\nplt.xlabel('day'), plt.ylabel('PC1 Score as HI'), plt.legend()\n```\n\n\
    ![](img/cfcc9569b5e92ea115855752abddd75a_351_0.png)\n\nThe actual HI trajectory\
    \ seems to have significant stochastic drift characteristic in the training period\
    \ and therefore, it is not surprising our deterministic exponential fit cannot\
    \ closely follow the actual trajectory. Nonetheless, let’s check out the error\
    \ in RUL prediction. We will use the last value of the computed HI (day 50) as\
    \ the failure threshold and estimate when the fitted trajectory crosses this threshold.\n\
    \n```python\n# forecast using the degradation model\nHI_all = PCA_all_scores[:,0]\n\
    HI_all = HI_all - HI_all[0]\n\nplt.figure(), plt.plot(range(50), HI_all, '-o',\
    \ color='darkorange', label='actual HI')\nplt.plot(range(50), func(np.arange(50),\
    \ *param_opt), '-o', color='maroon', label='predicted HI')\nplt.plot([0,60], [HI_all[-1],HI_all[-1]],'--',\
    \ color='red')\nplt.xlabel('day'), plt.ylabel('PC1 Score as HI'), plt.legend()\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_351_1.png)\n\nThe above plot indicates\
    \ that the simple exponential degradation model predicts the end of useful life\
    \ perfectly!"
  mdcn: "## 第20章\n\n### 故障预测：剩余使用寿命估计\n\n在上一章中，我们介绍了剩余使用寿命的概念，它简单来说就是设备失效前剩余的时间。文中提到了三种广泛使用的基于数据的技术：1)\
    \ 基于可靠性数据的方法，利用类似设备的寿命分布来预测期望的RUL；2) 通过基于回归的机器学习建模直接计算RUL；3) 将健康指标的计算作为中间步骤。前两种方法需要关于设备过去寿命和完整运行至失效历史的信息。然而，在流程工业中，由于机器通常在达到失效阶段之前就得到了维修（记住预防性维护！），获取这些数据很困难。这使得基于HI的方法更合适，而且不出所料，也更受欢迎。在上一章中，我们看到了如何计算风力涡轮机的HI。我们将完成这个案例研究，并展示如何估计RUL。\n\
    \n在基于HI的方法中，广泛采用两种策略。如果有足够的过去运行至失效数据，那么可以直接选取与当前设备HI轨迹最匹配的历史HI趋势，并利用历史寿命来计算所需的RUL。这被称为基于相似性的方法。一个流行的替代方法是简单地使用当前设备现有的HI值，对其拟合一条曲线以在未来进行外推，并找出何时超过失效阈值。这被称为基于退化的方法。我们将在本章中更详细地探讨这两种策略。总体而言，涵盖以下主题：\n\
    \n- RUL简介\n- 基于健康指标的RUL估计策略\n- 用于风力涡轮机RUL估计的健康指标退化建模\n- 基于深度学习的燃气轮机直接RUL估计\n\n\
    ### 20.1 RUL：再探\n\n在上一章中，我们了解了RUL估计的一些大类策略。我们还了解了如何计算健康指标。图20.1重现了图19.1，并添加了更多关于基于HI的RUL计算方法的细节。该图还突出了四种常用的策略。如前所述，模型的选择取决于关于过去失效信息的类型和数量。如果有大量的过去运行至失效数据，那么可以构建一个深度学习模型来直接预测RUL。我们将在本章中看到这样一个应用。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_347_0.png)\n\n虽然基于HI的策略很受欢迎，但需要提及几点注意事项。对于基于退化的建模，您应该确保要么考虑了未来运行条件的影响，要么运行条件变化不大。对于基于相似性的方法，应注意选择的HI轨迹历史应与当前设备所经历的故障条件相同。因此，在部署故障预测之前，正确的故障分类至关重要。\n\
    \n### RUL估计性能评估\n\n考虑下图。在时间 $t_k$，退化曲线被外推以预测 RUL$_{pred}$，而实际的RUL是 RUL$_{actual}$。量化误差的一个简单方法是使用均方误差（MSE）。然而，正负RUL误差对工厂运营的影响可能大不相同。低估（RUL$_{pred}$\
    \ < RUL$_{actual}$）⇒ 维护发生得比应该的时间早。虽然这不好，但高估（RUL$_{pred}$ > RUL$_{actual}$）的代价更糟糕，因为它可能导致维护延迟，从而造成灾难性的设备故障。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_348_0.png)\n\n在计算整体性能时（例如，在模型拟合期间），通常通过为\
    \ $\\varepsilon$>0 设置更大的惩罚来指定对负 $\\varepsilon$ 的偏好优于正 $\\varepsilon$。\n\n### 20.2\
    \ 基于健康指标的RUL估计策略\n\n在图20.2中，我们看到在时间 $t_k$，HI已经显示出退化趋势。对于RUL估计，关键在于弄清楚HI如何进一步演变，直到达到失效阈值。让我们看看两种流行的解决此问题的方法。\n\
    \n### 健康退化建模\n\n在退化模型方法中，使用所研究设备的可用HI数据拟合一个HI模型，如下图所示。如图所示，模型可以采用不同的形式。在时间 $t_k$，该模型用于预测拟合的HI曲线何时超过失效阈值的\
    \ $t_F$；这给出了在时间 $t_k$ 的RUL预测为 $t_F - t_k$。当 $h_{k+1}$ 可用时，在时间 $t_{k+1}$ 重新进行模型训练和RUL估计。我们将把这个策略应用于上一章介绍的风力涡轮机案例研究。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_349_0.png)\n\n失效阈值的选择并非易事。如果HI基于单一测量或特征（如振动信号的RMS或设备温度），则阈值可能容易指定。然而，对于一般情况，需要领域特定知识或历史失效记录。\n\
    \n### 基于轨迹相似性的建模\n\n在基于相似性的方法中，收集过去设备失效的已知HI趋势，如下图20.4所示。在时间 $t_k$，选择与当前设备直到时间\
    \ $t_k$ 的HI轨迹相似$^{124}$的轨迹。这些选定记录的寿命被组合（简单平均或加权组合）以估计当前设备的RUL。\n\n![](img/cfcc9569b5e92ea115855752abddd75a_350_0.png)\n\
    \n### 20.3 通过退化建模对风力涡轮机进行RUL估计\n\n为了演示基于退化建模的方法，我们将继续上一章的风力涡轮机案例研究。我们将尝试对训练期32天内获得的HI值拟合一个指数模型。\n\
    \n```python\n# fit exponential model (HI = a*exp(b*t) + c); t is in days\nPCA_train_scores\
    \ = pca.transform(selectFeatures_train_normal)\nHI_train = PCA_train_scores[:,\
    \ 0]\nHI_train = HI_train - HI_train[0] # forcing HI to start from 0 for better\
    \ fit\n\ndef func(t, a, b):\n    return a*np.exp(b*t)\n```\n\n$^{124}$ 两个轨迹之间的相似性通常通过欧几里得距离来量化。或者，也使用了动态时间规整（DTW）。\n\
    \n```python\nparam_opt, param_cov = scipy.optimize.curve_fit(func, range(32),\
    \ HI_train)\n\nplt.figure(), plt.plot(range(32), HI_train, '-o', color='darkorange',\
    \ label='actual HI')\nplt.plot(range(32), func(np.arange(32), *param_opt), '-o',\
    \ color='maroon', label='predicted HI')\nplt.xlabel('day'), plt.ylabel('PC1 Score\
    \ as HI'), plt.legend()\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_351_0.png)\n\
    \n实际的HI轨迹在训练期内似乎具有显著的随机漂移特征，因此，我们的确定性指数拟合无法紧密跟随实际轨迹也就不足为奇了。尽管如此，让我们检查一下RUL预测的误差。我们将使用计算出的HI的最后一个值（第50天）作为失效阈值，并估计拟合轨迹何时超过该阈值。\n\
    \n```python\n# forecast using the degradation model\nHI_all = PCA_all_scores[:,0]\n\
    HI_all = HI_all - HI_all[0]\n\nplt.figure(), plt.plot(range(50), HI_all, '-o',\
    \ color='darkorange', label='actual HI')\nplt.plot(range(50), func(np.arange(50),\
    \ *param_opt), '-o', color='maroon', label='predicted HI')\nplt.plot([0,60], [HI_all[-1],HI_all[-1]],'--',\
    \ color='red')\nplt.xlabel('day'), plt.ylabel('PC1 Score as HI'), plt.legend()\n\
    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_351_1.png)\n\n上图表明，简单的指数退化模型完美地预测了有用寿命的结束！"

    plt.figure(), plt.plot(TEdata_noFault_train[:,17])

    plt.xlabel(''sample #''), plt.ylabel(''Striper Tempearture''), plt.title(''Normal
    operation'')


    plt.figure(), plt.plot(TEdata_Fault_train[:,17])


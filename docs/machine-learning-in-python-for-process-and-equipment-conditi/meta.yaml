- md: "## scale data\nfrom sklearn.preprocessing import StandardScaler\nscaler = StandardScaler()\n\
    Faultydata_train_scaled = scaler.fit_transform(data_Faulty_train)\n\n# fit LDA\
    \ model\nfrom sklearn.discriminant_analysis import LinearDiscriminantAnalysis\n\
    lda = LinearDiscriminantAnalysis()\nscores_train_lda = lda.fit_transform(Faultydata_train_scaled,\
    \ y_train)\n\n# visualize LDA scores\nplt.figure()\nplt.plot(scores_train_lda[0:n_rows_train,0],\
    \ scores_train_lda[0:n_rows_train,1], 'b.', label='Fault 5')\nplt.plot(scores_train_lda[n_rows_train:2*n_rows_train,0],\n\
    \         scores_train_lda[n_rows_train:2*n_rows_train,1], 'r.', label='Fault\
    \ 10')\nplt.plot(scores_train_lda[2*n_rows_train:3*n_rows_train,0],\n        \
    \ scores_train_lda[2*n_rows_train:3*n_rows_train,1], 'm.', label='Fault 19')\n\
    plt.legend()\n\n![](img/cfcc9569b5e92ea115855752abddd75a_152_0.png)\n\nFigure\
    \ 8.10 shows the transformed samples in 2 dimensions after FDA and PCA. FDA is\
    \ able to provide a clear separation of Fault 5 samples; however, it could not\
    \ separate Faults 10 and 19 data. In fact, the 2nd discriminant (FD2) contributes\
    \ little to the discrimination and therefore, only FD1 is needed to separate samples\
    \ from Fault 5. To segregate Faults 10 and 19, kernel FDA can be explored⁵⁴. Linear\
    \ PCA, on the other hand, fails to separate any of the classes.\n\n> While FDA\
    \ is a powerful tool for fault diagnosis, it can also be used for fault detection\
    \ by including NOC data as a separate class.\n\n## 8.4 Fault Classification via\
    \ FDA: Tennessee Eastman Process Case Study\n\nAfter projecting the samples onto\
    \ the FDA space, any classification technique can be chosen to classify or diagnose\
    \ the specific fault. A popular T² statistic-based approach entails computing\
    \ a T² control limit for each fault class using the training data. The T² control\
    \ limit ($T^2_{CL,j}$) for the $j^{th}$ fault class represents a boundary around\
    \ the projected samples from the $j^{th}$ fault in the lower-dimensional space\
    \ – any given sample lying inside the boundary belongs to the $j^{th}$ fault class.\
    \ Mathematically, this can be specified as\n\n$T^2_{sample,j} < T^2_{CL,j} \\\
    Rightarrow sample \\ belongs \\ to \\ the \\ j^{th} \\ fault \\ class$\n\n$T^2_{sample,j}$\
    \ for a sample for the $j^{th}$ class is given by\n\n$T^2_{sample,j} = (z_{sample}\
    \ - \\tilde{\\mu}_j)^T \\tilde{S}_j (z_{sample} - \\tilde{\\mu}_j)$\n\nwhere,\
    \ $\\tilde{\\mu}_j$ and $\\tilde{S}_j$ denote the mean and covariance matrix of\
    \ the projected samples belonging to the $j^{th}$ fault class in training dataset,\
    \ respectively, and $z_{sample}$ denotes the projected sample in the FDA space.\
    \ $T^2_{CL,j}$ can be obtained using the same expression we used in PCA, $k(N_j^2\
    \ - 1)/N_j(N_j - k) F_{k,N-k}(\\alpha)$, where $k$ denotes the number of dimensions\
    \ retained in the FDA space. For illustration, let us see how many samples from\
    \ the Fault 5 test data get correctly identified.\n\n⁵⁴ Hyun-Woo Cho, Nonlinear\
    \ feature extraction and classification of multivariate process data in kernel\
    \ feature space, Expert Systems with Applications, 2007\n\n```python\n# compute\
    \ control limit\nimport scipy.stats\nNj = n_rows_train\nk = 2\n\nalpha = 0.01\
    \ # 99% control limit\nT2_CL = k*(Nj**2-1)*scipy.stats.f.ppf(1-alpha,k,Nj-k)/(Nj*(Nj-k))\n\
    \n# mean and covariance for Fault 5 class\nscores_train_lda_Fault5 = scores_train_lda[0:n_rows_train,:]\n\
    cov_scores_train_Fault5 = np.cov(scores_train_lda_Fault5.T)\nmean_scores_train_Fault5\
    \ = np.mean(scores_train_lda_Fault5, axis = 0)\n\n# fetch TE test data for fault\
    \ 5\nTEdata_Fault5_test = np.loadtxt('d05_te.dat')\nTEdata_Fault5_test = TEdata_Fault5_test[160:,:]\
    \ # faulty operation start sample 160 onwards\nn_rows_test = TEdata_Fault5_test.shape[0]\n\
    xmeas = TEdata_Fault5_test[:,0:22]\nxmv = TEdata_Fault5_test[:,41:52]\ndata_Faulty_test\
    \ = np.hstack((xmeas, xmv))\n\n# scale test data and transform\nFaultydata_test_scaled\
    \ = scaler.transform(data_Faulty_test)\nscores_test_lda = lda.transform(Faultydata_test_scaled)\n\
    \n# compute T² statistic for test data for Fault 5 class\nT2_test = np.zeros((n_rows_test,))\n\
    for sample in range(n_rows_test):\n    score_sample = scores_test_lda[sample,:]\n\
    \    score_sample_centered = score_sample - mean_scores_train_Fault5\n    T2_test[sample]\
    \ = np.dot(np.dot(score_sample_centered[np.newaxis,:],\n                     \
    \               np.linalg.inv(cov_scores_train_Fault5)), score_sample_centered[np.newaxis,:].T)\n\
    \n# plot test prediction\noutsideCL_flag = T2_test > T2_CL\ninsideCL_flag = T2_test\
    \ <= T2_CL\nplt.figure()\nplt.plot(scores_test_lda[outsideCL_flag,0], scores_test_lda[outsideCL_flag,1],\
    \ 'k.', label='within Fault 5 boundary')\nplt.plot(scores_test_lda[insideCL_flag,0],\
    \ scores_test_lda[insideCL_flag,1], 'b.', label='outside Fault 5 boundary')\n\
    plt.xlabel('FD1 (test data)'), plt.ylabel('FD2 (test data)')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_155_0.png)\n\
    \nFigure 8.11: Classification result for TEP Fault 5 test samples\n\nAbout 98%\
    \ of the samples have been correctly identified as belonging to Fault 5. As shown\
    \ in Figure 8.11, some of the samples which fall far away from the mean violate\
    \ the $T_{CL,5}^2$ and therefore are not classified as Fault 5.\n\n## Summary\n\
    \nWith this chapter, we have now covered the vanilla version of four major MSPM\
    \ techniques that are frequently utilized for analyzing process data. This chapter\
    \ has also provided an important message: blind application of a single technique\
    \ all the time may not yield best results. The techniques should be chosen according\
    \ to the process system (Gaussian vs non-Gaussian) and objective (fault detection\
    \ vs fault classification) at hand. ICA and FDA are powerful techniques and there\
    \ lies much more to them that what we have touched in this chapter. While you\
    \ are encouraged to explore more about these methods (now that you have conceptual\
    \ understandings), we will move to study variants of PCA and PLS suitable for\
    \ dynamic data in the next chapter.\n\n# Chapter 9\n\n## Multivariate Statistical\
    \ Process Monitoring for Linear and Dynamic Processes\n\nIn the previous chapters,\
    \ we saw how beautifully latent variable-based MSPM techniques can extract hidden\
    \ steady-state relationships from data. However, we imposed a major restriction\
    \ of absence of dynamics in the dataset. Unfortunately, it is common to have to\
    \ deal with industrial datasets that exhibit significant dynamics and the standard\
    \ MSPM techniques fail in extracting dynamic relationships among process variables.\
    \ Nonetheless, the MSPM research community came up with a simple but ingenious\
    \ modification to the standard MSPM techniques that made working with dynamic\
    \ dataset very easy. The trick entails including the past measurements as additional\
    \ process variables. That’s it! The standard techniques can then be employed on\
    \ the augmented dataset. The dynamic variants of the standard MSPM techniques\
    \ are dynamic PCA (DPCA), dynamic PLS (DPLS), dynamic ICA (DICA), etc.\n\nDynamic\
    \ PCA and dynamic PLS are among the most popular techniques for monitoring linear\
    \ and dynamic processes; accordingly, these are covered in detail in this chapter.\
    \ Additionally, this chapter also introduces another very popular and powerful\
    \ technique that is specially designed to extract dynamic relationships from process\
    \ data – canonical variate analysis (CVA). Using numerical and industrial-scale\
    \ case studies, we will see how to use these three techniques to build fault detection\
    \ tools. Specifically, the following topics are covered\n\n- Introduction to dynamic\
    \ PCA\n- Fault detection using DPCA\n- Introduction to dynamic PLS\n- Introduction\
    \ to CVA\n- Fault detection using CVA for Tennessee Eastman process\n\n## 9.1\
    \ Dynamic PCA: An Introduction\n\nDynamic PCA is the dynamic extension of conventional\
    \ PCA designed to handle process data that exhibit significant dynamics. DPCA\
    \ simply entails application of conventional PCA to augmented data matrix which,\
    \ as shown in Figure 9.1, is generated by using past measurements as additional\
    \ process variables. Note that each ‘variable’ of the augmented matrix is normalized\
    \ to zero mean and unit variance as is done in conventional PCA. It may seem surprising,\
    \ but such a simple approach has achieved great success in process industry and\
    \ has been readily adopted due to ease of implementation.\n\n![](img/cfcc9569b5e92ea115855752abddd75a_157_0.png)\n\
    \nAll the mathematical expressions for the computations of the score matrix⁵⁵,\
    \ residual matrix, Hotelling’s $T^2$, and SPE remain the same (Eq. 1 to Eq. 8)\
    \ as that shown in Chapter 7, except that now you will be using scaled $X_{aug}$\
    \ instead of $X$, i.e., $T = X_{aug}P$; $E = X_{aug} - \\hat{X}_{aug}$. The procedure\
    \ for determination of number of retained latent variables also remains the same.\
    \ You may, amongst other approaches, look for a ‘knee’ in the scree plot of the\
    \ explained variance or use the cumulative percent variance approach. If you choose\
    \ ‘l’ correctly, then both the static and dynamic relationships among process\
    \ variables are captured and correspondingly, the residuals and the Q statistic\
    \ will not exhibit autocorrelations⁵⁶. For test dataset, you would again simply\
    \ perform augmentation with time-lagged measurements. Before we get into the nitty-gritties,\
    \ let’s see a quick motivating example on why DPCA is superior to PCA in the presence\
    \ of dynamics.\n\n⁵⁵ The number of retained principal components in DPCA could\
    \ be greater than $m$.\n⁵⁶ The DPCA scores can show autocorrelations."

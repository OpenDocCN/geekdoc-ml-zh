  md: '# Dimensionality reduction via autoencoders


    To see autoencoders in action, let’s apply it for the dimensionality reduction
    of a simulated dataset from a fluid catalytic cracking unit (FCCU<sup>103</sup>)
    shown in Figure 16.2. FCCUs are critical units in modern oil refineries and convert
    heavy hydrocarbons into lighter and valuable products such as LPG, gasoline, etc.
    As shown, the FCCU operation involves catalytic reaction, catalyst regeneration,
    and distillation. A total of 46 signals are made available as outputs (recorded

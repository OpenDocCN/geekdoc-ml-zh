    \ function. For regularization, we utilize the dropout technique.\n\n```\n# import\
    \ ANN packages\nfrom tensorflow.keras import Sequential\nfrom tensorflow.keras.layers\
    \ import Dense, LSTM, Dropout\n\n# custom metric\nimport tensorflow.keras.backend\
    \ as K\ndef r2_custom(y_true, y_pred):\n    \"\"\"Coefficient of determination\n\
    \    \"\"\"\n    SS_res =  K.sum(K.square(y_true - y_pred))\n    SS_tot = K.sum(K.square(y_true\
    \ - K.mean(y_true)))\n    return (1 - SS_res/(SS_tot + K.epsilon()))\n\n# define\
    \ model\nmodel = Sequential()\nmodel.add(LSTM(units=100, return_sequences=True,\
    \ input_shape=(nSequenceSteps, 24)))\nmodel.add(Dropout(0.2))\nmodel.add(LSTM(units=50))\n\
    model.add(Dropout(0.2))\nmodel.add(Dense(1))\n\n# compile model\nmodel.compile(loss='mse',\
    \ optimizer='Adam', metrics= r2_custom)\n```\n\nWe can now fit the model. Validation\
    \ curves indicate that we can obtain pretty good predictions on training dataset."

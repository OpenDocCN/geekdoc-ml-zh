    ![](img/cfcc9569b5e92ea115855752abddd75a_99_0.png)


    Another popular strategy to deal with autocorrelated signals is to update the
    model using the latest observations and monitor the model parameters.


    # Summary


    In this chapter, we familiarized ourselves with statistical process control charts
    for monitoring univariate signals. We looked at the three popular techniques,
    viz, Shewhart charts, CUSUM charts, and EWMA charts. We learnt how to build these
    charts and understood the pros and cons of these different methods. In the next
    chapter, we will continue our study of univariate signal monitoring and look at
    pattern matching-based methodologies.'

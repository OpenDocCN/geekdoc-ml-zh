  md: '# # Chapter 18


    # ## Vibration-based Condition Monitoring: Fault Detection & Diagnosis


    Vibration-based condition monitoring was already a widely adopted technique in
    process industry long before ML craze took over the manufacturing world. The International
    Organization for Standardization (ISO) has come up with alarm limits for vibration
    RMS for different classes of rotating machines. Additionally, VCM researchers
    have worked diligently to discover the characteristics signatures of failures
    in different components of a rotating machines. Correspondingly, several rules
    of thumb and heuristics have been devised to pinpoint root causes of faults using
    vibration features. However, these heuristics do not cover all possible fault
    scenarios and a vibration expert is still required to conduct analysis and interpretation
    of vibration signal features. Fortunately, the advent of machine learning has
    made VCM more accessible to generic process data scientists.


    Several different types of ML models have been reported in VCM literature for
    fault classification, fault detection, and fault diagnosis. For example, fault
    detection applications have been built by using the whole spectrum (or waveform)
    as input to an autoencoder or spectrogram image as input to a CNN (convolutional
    neural network) model. ML models don the cap of a vibration expert to find the
    patterns in vibration signal, distinguish between NOC and abnormal vibrations,
    and discriminate between different fault conditions. In this chapter, we will
    look at one such implementation of ML-based VCM. Specifically, the following topics
    are covered


    +   - VCM workflow

    - Classical approaches for VCM

    - SVM-based fault classification of motors'

    # 5.3 CUSUM Charts: An Introduction


    Consider the control chart shown below for the dataset shown in Figure 5.3. It
    is apparent that unlike the Shewhart chart, this control chart easily flags the
    out-of-control situation. This chart is called CUSUM chart and is known to be
    more effective at detecting small mean shifts. At the $i^{th}$ sampling instant,
    the CUSUM statistic ($S_i$) that is plotted on the CUSUM chart is the ‘Cumulative
    SUM’ of deviations of each of the available measurements from mean (or target).
    When a process is in control, the random deviations around the mean cancel out
    and $S_i$ wanders around zero; however, in presence of a mean shift of, say, $\Delta$
    at $r^{th}$ sampling instant, an additional $\Delta$ term gets added to $S_i$
    at every instant $\geq r$ which leads to a continuous upward (or downward) trend
    as seen in Figure 5.4.


    ![](img/cfcc9569b5e92ea115855752abddd75a_91_0.png)'
  - '[PAGE 92]


    Fault detection using CUSUM charts used to be done graphically by looking at the
    slope of the trends using the so-called V-masks. However, in modern statistical
    software systems, the following two-sided CUSUM charts are utilized.


    ```

    $$S_i^+ = \max[0, x_i - (\mu_0 + k) + S_{i-1}^+] \longrightarrow \text{tracks
    positive shifts in mean}$$

    $$S_i^- = \max[0, (\mu_0 - k) - x_i + S_{i-1}^-] \longrightarrow \text{tracks
    negative shifts in mean}$$

    ```


    +   - $k \geq 0$

    - Deviation from mean (or target) greater than $k$ increases $S^+$ or $S^-$

    - $k$ is usually set to be ½ the size of mean shift that we want to detect quickly


    Both $S^+$ and $S^-$ are plotted together on the same chart along with a specified
    control limit (or threshold) $H$ as shown below.


    ![](img/cfcc9569b5e92ea115855752abddd75a_92_0.png)


    The implementation of CUSUM chart requires specification of $k$, $H$, and mean
    $\mu_0$ (or target $T$). While $\mu_0$ is simply the sample mean of historical
    IC data, determination of control limit $H$ is slightly more involved compared
    to Shewhart charts. $H$ is often selected based on the ARL(0) and ARL(1) values
    for different levels of mean shifts$^{27}$. Usually, $H$ is set at $4\hat{\sigma}$
    or $5\hat{\sigma}$ where $\hat{\sigma}$ is estimated the same way as done for
    Shewhart charts.


    # Change Point Detection


    > In the area of anomaly detection, you may encounter the term ‘change point detection’
    (CPD). CPD is the problem of finding when significant changes in properties (mean,
    standard deviation, etc.) of a signal occurs. CUSUM and EWMA are two popular techniques
    employed for CPD.'

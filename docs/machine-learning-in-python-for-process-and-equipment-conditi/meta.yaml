    \ - np.dot(Jn.T, Xn_test)\nQ_test = [np.dot(r_test[:,i], r_test[:,i]) for i in\
    \ range(pMatrix_test_centered.shape[0])]\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_174_0.png)\n\
    \n测试数据的控制图显示成功检测到了过程故障。已知$T_e^2$指标过于敏感，误报率高，这可以解释为什么它似乎经常在实际故障发生之前就突破阈值。\n\n##\
    \ 总结\n\n在本章中，我们为处理表现出显著动态特性的过程系统增加了更多的机器学习工具。我们研究了两种不同的流行方法：第一种方法通过包含滞后测量值对传统MSPM工具进行了简单扩展；第二种方法则使用了状态空间（CVA）模型。虽然动态MSPM方法更容易理解和实现，但基于CVA模型的故障检测已被发现能提供更优的结果。接下来，我们将学习如何处理非线性过程。\n\
    \n# 第10章\n## 非线性过程的多元统计过程监控\n\n在前面的章节中，我们看到了使用时间滞后变量的简单技巧如何使传统MSPM技术能够应用于动态过程。你可能会想，对于非线性过程是否存在类似的方法。幸运的是，确实存在！其基本原理是将原始变量投影到一个特征线性相关的高维特征空间中。具有挑战性的部分是确定从原始测量空间到特征空间的非线性映射。这就是‘核’技巧发挥作用的地方，数据可以在无需显式定义非线性映射的情况下进行投影。然后在特征空间中应用传统MSPM。听起来很复杂？一旦你完成本章的学习，你就会意识到它比你现在想象的要容易得多。\n\
    \n基于核的MSPM技术（KPCA、KPLS、KICA、KFDA等）的主要优势在于它们不需要非线性优化，只涉及线性代数。毫不奇怪，核化方法在处理非线性数据集的同时保留了其线性对应方法的简单性，因此变得非常有吸引力。在核MSPM技术中，核PCA和核PLS是应用最广泛的，在过程监控应用中取得了相当大的成功，因此将成为我们本章研究的重点。具体涵盖以下主题：\n\
    \n- 核PCA简介\n- 使用核PCA进行故障检测\n- 核PLS简介\n- 使用核PLS进行故障检测"

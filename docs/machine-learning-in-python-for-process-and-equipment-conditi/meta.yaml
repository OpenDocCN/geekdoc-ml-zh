    # 8.3 FDA: An Introduction


    Fisher Discriminant Analysis (FDA), also called linear discriminant analysis (LDA),
    is a multivariate dimensionality reduction technique which maximizes the ‘separation’
    in the lower dimensional space between data belonging to different classes. For
    conceptual understanding, consider the simple illustration in Figure 8.9 where
    a 2D dataset (with 2 classes of data) has been projected onto 1D spaces by FDA
    and PCA. The respective 1-D scores show that while the two classes of data are
    well segregated in LD space, the segregation is very poor in PC space. This observation
    was expected because PCA, while determining the projection directions, does not
    consider information about different data classes. Therefore, if your intention
    is to reduce dimensionality for subsequent data classification and training data
    is labeled into different classes, then FDA is more suitable.'
  - '[PAGE 149]


    ![](img/cfcc9569b5e92ea115855752abddd75a_149_0.png)


    Due to the powerful data discrimination ability of FDA, it is widely used in process
    industry for operating mode classification and fault diagnosis. Large-scale industrial
    processes often experience different kinds of process issues/faults and it is
    imperative to accurately identify the specific issue quickly during online operations
    to minimize economic losses. During model training, FDA learns from data collected
    from historical process failures (data from a specific process fault form a class)
    to find the optimal projection directions and classify abnormal process data into
    specific faults in real-time. We will study one such application in this chapter.


    # Mathematical background


    To facilitate data classification, FDA not only maximizes the separation between
    the classes but also minimizes the variation/scatter within each class. To see
    how this is achieved, let us first consider a dataset matrix $X \in \mathbb{R}^{N
    \times m}$ consisting of $N$ samples, $N_1$ of which belong to class 1 ($\omega_1$)
    and $N_2$ belong to class 2 ($\omega_2$). FDA seeks to find a projection vector
    $w \in \mathbb{R}^m$ such that the projected scalars/samples ($z = w^T x$) are
    maximally separated. Let $\tilde{\mu}_1$ and $\tilde{\mu}_2$ denote the means
    of projected values of classes 1 and 2, respectively


    $$\tilde{\mu}_i = \frac{1}{N_i} \sum_{z \in \omega_1} z$$


    Class separation could be quantified as distance between the projected means $|\tilde{\mu}_1
    - \tilde{\mu}_2|$; this, however, is not a robust measure as shown by the illustration
    below.'
- md: 'To quantify the variability within class $\omega_i$ we define a term called
    scatter, $\tilde{s}_i^2$


    $$\tilde{s}_i^2 = \sum_{z \in \omega_1} (z - \tilde{\mu}_i)^2$$


    The separation criterion is now defined as the normalized distance between the
    projected means. This formulation seeks to find a projection where the class means
    are far apart and samples from the same class are close to each other.


    $$J(\mathbf{w}) = \frac{|\tilde{\mu}_1 - \tilde{\mu}_2|^2}{\tilde{s}_1^2 + \tilde{s}_2^2}$$


    Using the base relation $y = w^T x$ and straightforward algebraic manipulations$^{53}$,
    one can equivalently represent the objective $J(w)$ as follows which also holds
    for any $(p)$ number of data classes


    $$J(w) = \frac{w^T S_b w}{w^T S_w w} \quad \text{eq. 9}$$


    $S_b$ (between-class-scatter matrix) and $S_w$ (within-class-scatter matrix) are
    defined as


    $$S_b = \sum_{j=1}^p N_j (\mu_j - \mu)(\mu_j - \mu)^T$$


    $$S_w = \sum_{j=1}^p S_j$$


    $$S_j = \sum_{x_i \in \omega_1} (x_i - \mu_j)(x_i - \mu_j)^T$$


    where, $\mu \in \mathbb{R}^m$ and $\mu_j \in \mathbb{R}^m$ denote the mean vectors
    of all the N samples and $N_j$ samples from $j^{th}$ class, respectively, in the
    measurement space. The first FDA vector, $w_1$, is found by maximizing $J(w)$
    and the subsequent vectors are found by solving the same problem with the added
    constraints of orthogonality to previously computed vectors. Note that there can
    be at most $p-1$ FDA vectors. Alternatively, like PCA, the vectors can also be
    computed as solutions of a generalized eigenvalue problem


    $$S_w^{-1}S_bw = \lambda w$$'

    \ 20, alpha=None)\nplt.gca().axhspan(-conf_int, conf_int) # shaded confidence\
    \ interval\nplt.xlabel('lag')\n```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_64_1.png)\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_65_0.png)\n\n## 3.5 多模态/多簇分布评估技术\n\n\
    确定数据中是否存在多模态的最常见方法是将数据集划分为不同的簇，并寻找最优的簇数。存在诸如k-means聚类和高斯混合模型等数据聚类技术。我们将把这些技术的详细讨论推迟到第11章。尽管如此，我们在下面的示例中展示了如何评估图3.1所示数据集的多模态性。在第16章中，你将看到一种基于神经网络的可视化技术，称为自组织映射，它可以提供高维数据集的二维视图，从而帮助检查是否存在簇。"

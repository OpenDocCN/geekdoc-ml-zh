    \n将样本投影到FDA空间后，可以选择任何分类技术来分类或诊断特定故障。一种流行的基于T²统计量的方法是使用训练数据为每个故障类别计算T²控制限。第$j^{th}$个故障类别的T²控制限（$T^2_{CL,j}$）代表了在低维空间中围绕第$j^{th}$个故障投影样本的边界——任何落在该边界内的给定样本都属于第$j^{th}$个故障类别。数学上，这可以表示为\n\
    \n$T^2_{sample,j} < T^2_{CL,j} \\Rightarrow 样本 \\ 属于 \\ 第 \\ j^{th} \\ 个 \\ 故障\
    \ \\ 类别$\n\n对于第$j^{th}$类别的样本，$T^2_{sample,j}$由下式给出\n\n$T^2_{sample,j} = (z_{sample}\
    \ - \\tilde{\\mu}_j)^T \\tilde{S}_j (z_{sample} - \\tilde{\\mu}_j)$\n\n其中，$\\\
    tilde{\\mu}_j$和$\\tilde{S}_j$分别表示训练数据集中属于第$j^{th}$个故障类别的投影样本的均值和协方差矩阵，$z_{sample}$表示FDA空间中的投影样本。$T^2_{CL,j}$可以使用我们在PCA中使用的相同表达式获得，即$k(N_j^2\
    \ - 1)/N_j(N_j - k) F_{k,N-k}(\\alpha)$，其中$k$表示FDA空间中保留的维度数。为了说明，让我们看看故障5测试数据中有多少样本被正确识别。\n\
    \n⁵⁴ Hyun-Woo Cho, Nonlinear feature extraction and classification of multivariate\
    \ process data in kernel feature space, Expert Systems with Applications, 2007\n\

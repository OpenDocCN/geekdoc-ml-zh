    >>> Posterior probabilities of clusters 1, 2, 3 for the data-point: [3.36e-54
    1.09e-15 1]


    GMM thinks that the data-point belongs to cluster 3 with 100% probability! It
    may seem surprising given that the point seems to lie equidistant (in terms of
    Euclidean distance) to clusters 3 and 2. We will study in the next subsection
    how these probabilities were obtained.


    # Mathematical background


    Let $x \in \mathbb{R}^m$ be a m-dimensional sample obtained from a multimode process
    with $K$ operating modes. In GMM, the overall probability density is formulated
    as a combination of local Gaussian densities. Let $C_i$ denote the $i^{th}$ local
    Gaussian cluster with parameters $\theta_i = \{\mu_i, \Sigma_i\}$ (mean vector
    and covariance matrix) and density


    $$g(x|\theta_i) = \frac{1}{(2\pi)^{m/2} |\Sigma_i|^{1/2}} exp\left[-\frac{1}{2}(x
    - \mu_i)^T \Sigma_i^{-1}(x - \mu_i)\right]$$ eq. 2


    The overall density at any spatial location is given by


    $$p(x|\theta) = \sum_{i=1}^K \omega_i g(x|\theta_i)$$ eq. 3


    where, $\omega_i$ represents the prior probability that a new sample comes from
    the $i^{th}$ Gaussian component and $\theta = \{\theta_1, ..., \theta_k\}$. The
    GMM model is constructed by estimating the parameters $\theta_i, \omega_i$ for
    all the clusters using the training samples $X \in \mathbb{R}^{N \times m}$. The
    parameters are estimated by optimizing the log-likelihood of the training dataset
    given as below


    $$\sum_{j=1}^N log \left(\sum_{i=1}^K \omega_i g(x_j|\theta_i)\right)$$ eq. 4


    To optimize the likelihood, expectation-maximization (EM) algorithm is commonly
    employed. Assuming an initial estimate of the parameters are given, EM algorithm
    involves iterating between 2 steps:


    +   - E-step ($s^{th}$ iteration): (Re-)compute membership association of samples
    to local clusters


    $$P^{(s)}(C_i|x_j) = \frac{\omega_i^{(s)} g(x_j | \mu_i^{(s)}, \Sigma_i^{(s)})}{\sum_{k=1}^K
    \omega_k^{(s)} g(x_j | \mu_k^{(s)}, \Sigma_k^{(s)})}$$ eq. 5


    $P^{(s)}(C_i|x_j)$ denotes the posterior probability that the $j^{th}$ sample
    comes from the $i^{th}$ Gaussian component.'
  merge: -1
  pgno: 206
- img_proc: true
  md: '+   - M-step ((s+1)th iteration): Update GMM parameters


    $$\mu_i^{(s+1)} = \frac{\sum_{j=1}^N P^{(s)}(C_i|x_j)x_j}{\sum_{j=1}^N P^{(s)}(C_i|x_j)}$$


    $$\Sigma_i^{(s+1)} = \frac{\sum_{j=1}^N P^{(s)}(C_i|x_j)(x_j-\mu_i^{(s+1)})(x_j-\mu_i^{(s+1)})^T}{\sum_{j=1}^N
    P^{(s)}(C_i|x_j)}$$


    $$\omega_i^{(s+1)} = \frac{\sum_{j=1}^N P^{(s)}(C_i|x_j)}{N}$$


    > Update centroid and covariance of each cluster using recomputed memberships
    from E-step.


    The iteration continues until some convergence criterion on log-likelihood objective
    is met. Did you notice the conceptual similarity with the k-means algorithm for
    finding model parameters? Previously, we computed posterior probabilities for
    data point 1069 using predict_prob method. Let us now use eq. 5 to see if we get
    the same numbers.


    ```

    # posterior probability calculation

    x = X_transformed[1069,np.newaxis]


    import scipy.stats

    g1 = scipy.stats.multivariate_normal(gmm.means_[0,:], gmm.covariances_[0,:]).pdf(x)

    g2 = scipy.stats.multivariate_normal(gmm.means_[1,:], gmm.covariances_[1,:]).pdf(x)

    g3 = scipy.stats.multivariate_normal(gmm.means_[2,:], gmm.covariances_[2,:]).pdf(x)

    print(''Local component densities: '', g1, g2, g3)


    >>> Local component densities: 8.33e-56 2.72e-17 0.025


    den = gmm.weights_[0]*g1 + gmm.weights_[1]*g2 + gmm.weights_[2]*g3

    posterior_prob_cluster1 = gmm.weights_[0]*g1/den

    posterior_prob_cluster2 = gmm.weights_[1]*g2/den

    posterior_prob_cluster3 = gmm.weights_[2]*g3/den

    print(''Posterior probabilities: '', posterior_prob_cluster1, posterior_prob_cluster2,
    posterior_prob_cluster3)


    >>> Posterior probabilities: 3.36e-54 1.09e-15 1

    ```


    As expected, we obtain the same posterior probabilities. Although component-wise
    densities are low, component 3 has (relatively) much higher density value at spatial
    coordinates of point 1069 and hence, resulting in highest membership association!
    Hopefully, this quick calculation helped you gain more insights into the workings
    of GMM models.'

    ```\n\n![](img/cfcc9569b5e92ea115855752abddd75a_183_0.png)\n\n我们现在将逐步介绍为测试数据生成监控图表的每个步骤。因此，让我们首先了解监控统计量是如何计算的。\n\
    \n## 监控统计量\n\n主要监控的统计量是 $Q$，对于样本 $x_t$，其定义为\n\n$$Q = \\|\\bar{\\varphi}(x_t) -\

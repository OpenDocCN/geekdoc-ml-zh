    \ \\lambda_i / \\sum_{i=1}^N \\lambda_i \\geq 0.95$$\n\nAnother popular approach\
    \ is the average eigenvalue method where only eigenvectors with eigenvalues above\
    \ the average of all eigenvalues are included.\n\n## 10.2 Fault Detection using\
    \ Kernel PCA\n\nPhew! It was a lot of mathematics in the previous section. Our\
    \ aim was not to scare you away by going into this level of details, but to provide\
    \ you with enough background so that you can carry out each step of KPCA-based\
    \ fault detection confidently. In fact, Sklearn provides KernelPCA class that\
    \ does the job of computing the scores for you; all you need to do it compute\
    \ the monitoring statistic. To further clarify all the steps, we will use the\
    \ following synthetic process for demonstration. It is a system with 3 measurements\
    \ $x_1$, $x_2$ and $x_3$.\n\n$$x_1 = u^2 + 0.3 \\sin(2\\pi u) + \\varepsilon_1$$\n\
    $$x_2 = u + \\varepsilon_2$$\n$$x_3 = u^3 + u + 1 + \\varepsilon_3$$\n\nHere,\
    \ $u$ is a variable uniformly sampled between -1 and 1, and $\\varepsilon_i$ is\

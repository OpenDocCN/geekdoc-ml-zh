    \ provides several useful functions like mean, sum, sort, etc., to manipulate\
    \ and analyze NumPy arrays. You can specify the dimension (axis) along which data\
    \ needs to be analyzed. Consider the sum function for example\n\n![](img/cfcc9569b5e92ea115855752abddd75a_45_0.png)\n\
    \nExecuting arr2D.sum() returns the scalar sum over the whole array, i.e., 25.\n\
    \n## Indexing and slicing arrays\n\nAccessing individual items and slicing NumPy\
    \ arrays work the same as that for Python lists\n\n```python\n# accessing individual\
    \ items\nprint(arr2D[1,2]) # returns 7\n```\n\n```python\n# slicing\narr8 = np.arange(10).reshape((2,5))\
    \ # rearrange the 1D array into shape (2,5)\nprint((arr8[0:1,1:3]))\n>>> [[1 2]]\n\
    ```\n\n```python\nprint((arr8[0,1:3])) # note that a 1D array is returned here\
    \ instead of the 2D array above\n>>> [1 2]\n```\n\n```python\n# accessing entire\
    \ row or column\nprint(arr8[1]) # returns 2nd row as array([5,6,7,8,9]); same\

    \n### SPEX和SPEy贡献\n\n对于SPE统计量，进行如下分解。\n\n$$SPE_x = \\sum_{j=1}^{m} e_j^2 = \\\
    sum_{j=1}^{m} SPE_{x,j}$$\n$$SPE_y = \\sum_{j=1}^{p} f_j^2 = \\sum_{j=1}^{p} SPE_{y,j}$$\n\
    \n### $T^2$贡献\n\n为找到$T^2$贡献，采用以下方法$^{45}$。设$x^{sample} \\in \\mathbb{R}^{mX1}$和$t^{sample}\

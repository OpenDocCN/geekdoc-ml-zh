  md: 'these specific signatures in the raw time domain vibration signal. Therefore,
    the standard approach is to convert time domain signal into frequency domain to
    extract features that provide early signs of failures and aid diagnosis of underlying
    faults.


    > In general, while vibration levels indicate the severity of faults, the dominant
    frequency components of the vibration signal can indicate the source of faults.


    The sequence of steps that are undertaken to convert raw vibration signal into
    useful features and to deploy ML models is presented in the next section. The
    focus of this chapter is to understand how to extract these features that can
    eventually be used as inputs to ML models.


    # Basic vibration terminology


    The time domain plot of vibration data is called waveform. Let''s look at a simple
    sinusoidal waveform to understand some terms that are used to characterize vibration.


    ![](img/cfcc9569b5e92ea115855752abddd75a_307_0.png)


    Frequency (f), measured in cycles/s or Hz (Hertz), denotes the number of cycles
    completed per unit time. The time taken to complete one cycle is referred to as
    time-period (T). T and f are inversely related


    ```

    $$f = \frac{1}{T}$$

    ```


    The height of the crest above the zero/reference line is called amplitude. Waveforms
    from real equipment are more complex than a simple sinusoid. However, you will
    see later that waveforms can be broken down into several sinusoidal components.'

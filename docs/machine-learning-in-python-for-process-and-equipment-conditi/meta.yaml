    # 9.3 Dynamic PLS: An Introduction


    Dynamic PLS is the dynamic extension of conventional PLS. As shown in Figure 9.2,
    DPLS entails employment of lagged measurements as additional predictor variables.
    As shown, there are two ways of generating a DPLS model: by including lagged values
    of only input variables or both input and output variables. While the first approach
    leads to FIR type of model, the later approach leads to ARX type of model. Like
    DPCA, once the augmented matrix is ready, scaling is performed and conventional
    PLS is applied. All the mathematical expressions for the computations of the score
    matrix, residual matrices, monitoring metrics, etc., remain the same as that seen
    in Chapter 7 for conventional PLS.


    ![](img/cfcc9569b5e92ea115855752abddd75a_163_0.png)


    There are two hyperparameters that needs to be specified: the time lags$^{60}$
    and the number of latents retained. Both these hyperparameters are commonly found
    via cross-validation. We have already seen how to modify the conventional FDI
    workflow to handle augmented data matrices in DPCA and therefore, we will skip
    showing the implementation code for DPLS-based FDI. Instead, we will move on to
    study a slightly different technique (state-space modeling) for building dynamic
    models.


    $^{60}$ Time lags are often chosen to be the same for all the input (and output
    if building ARX type model) variables'
- md: '## 9.4 Canonical Variate Analysis: An Introduction


    Canonical variate analysis (CVA) is a classical MSPM technique suited for modeling
    dynamic process systems. While PCA and PLS lead to input-output models, CVA is
    designed to provide state-space models as shown in Figure 9.3. States are like
    latent variables which act as a conduit between process inputs and outputs. For
    example, in the distillation column system, it is clear that $Q_B$ doesn''t affect
    $x_D$ directly. There are internal dynamics or states (e.g., arising from the
    liquid holdup at each column tray) that changes in $Q_B$ have to pass through
    before impacting $x_D$. Similar argument could be made for $Q_B$ vs $D$ relationship.
    The outputs share the same internal dynamics and this leads to better parameter
    efficiency of CVA model (compared to DPCA and DPLS model).


    ![](img/cfcc9569b5e92ea115855752abddd75a_164_0.png)


    For CVA-based process monitoring applications, we do not need the system matrices;
    only the computation of states for training and test datasets suffices. Tracking
    the systematic variations of states and state noise allow us to build monitoring
    metrics. As it turns out, the state vector at any time can be approximated as
    a linear combination of past inputs and outputs. The specific combination is found
    as the one that gives the best prediction of future outputs. Let''s now familiarize
    ourselves on how this is achieved.


    ## Mathematical background


    Using the state-space model and some smart re-arrangement$^{61}$ of input-output
    data sequence, it can be shown that state vector $x(k)$ at time instant $k$ can
    be approximated as a linear combination of past inputs and outputs.


    ![](img/cfcc9569b5e92ea115855752abddd75a_165_0.png)


    defined as $[y^T(k-1) \ y^T(k-2) \ \cdots \ y^T(k-l_y) \ u^T(k-1) \ u^T(k-2) \
    \cdots \ u^T(k-l_u)]^T$.


    In Eq. 1, $l_y$ and $l_u$ denote the number of lagged outputs and inputs used
    to build the $p(k)$ vector. Usually, $l_y = l_u = l$ and it is a model hyperparameter.
    The CVA method utilizes CCA (canonical covariate analysis), a multivariate statistical
    technique, to find $J$. A quick primer on the CCA technique is provided below.


    ### CCA: A quick primer


    CCA is a dimensionality reduction technique which aims to find linear combinations
    of input variables ($u \in \mathbb{R}^m$) that are maximally correlated with linear
    combinations of outputs variables ($y \in \mathbb{R}^r$)*. You may relate this
    to PLS wherein covariance between latent variables is maximized. These linear
    combinations are called canonical variables and are given as


    $$c = Ju$$

    $$d = Ly$$


    The covariance matrix between $c$ and $d$ is (rectangular) diagonal


    $$\Sigma_{cd} = J\Sigma_{uy}L^T = D = diag(\gamma_1, \gamma_2, \dots, \gamma_o,
    0, \dots, 0)$$


    The elements $\gamma_i$ of matrix D are called canonical correlations with ($\gamma_1
    \ge \gamma_2 \ge \dots \ge \gamma_o$) and quantify the degree of correlations
    between the $i^{th}$ canonical variate pair $c_i$ and $d_i$.


    ![](img/cfcc9569b5e92ea115855752abddd75a_166_0.png)


    The matrices $J \in \mathbb{R}^{m \times m}$ and $L \in \mathbb{R}^{r \times r}$
    are found via singular value decomposition


    $$\Sigma_{uu}^{-1/2} \Sigma_{uy} \Sigma_{yy}^{-1/2} = U \Sigma V^T$$


    where, $J = U^T \Sigma_{uu}^{-1/2}, L = V^T \Sigma_{yy}^{-1/2}, D = \Sigma$.


    One may retain only those canonical variate pairs (say, top $n$ pairs) that show
    significant correlations and discard the others, and therefore achieve dimensionality
    reduction. Let $\hat{c}$ and $\hat{d}$ be the n-dimensional ($n < m$ and $r$)
    vectors, then,


    $$\hat{c} = J_n u$$

    $$\hat{d} = L_n y$$


    where, $J_n$ and $L_n$ are first $n$ rows of $J$ and $L$.


    * It is assumed that $u$ and $y$ are centered. Scaling, however, is not required
    as CCA is scale-invariant, i.e., the estimated latent variables and the correlations
    remain the same with or without scaling. Also note that we have not used the ''$k$''
    notation as CCA is designed for static data.


    ## Computing CVA states


    In CVA, the two sets of vectors between which CCA is performed are $p(k)$ (defined
    in Eq. 1) and $f(k)$ where$^{62}$


    $$f(k) = [y^T(k) \ y^T(k+1) \ \cdots \ y^T(k+l)]^T$$


    current and future outputs.


    CVA therefore solves the following singular value decomposition problem and finds
    linear combinations of past inputs and outputs that are maximally correlated with
    linear combinations of the current and future outputs.


    $$\Sigma_{pp}^{-1/2} \Sigma_{pf} \Sigma_{ff}^{-1/2} = U \Sigma V^T$$


    eq. 2


    We know that $\Sigma$ is a diagonal matrix. Its elements are also called (Hankel)
    singular values. If $n$ is assumed to be the model order, then the optimal state
    at time $k$ that is most predictive of the future outputs is given by$^{63}$


    $$\hat{x}(k) = J_n p(k)$$


    eq. 3


    Contains first $n$ rows of matrix $J = U^T \Sigma_{pp}^{-1/2}$.


    Eq. 3 can be used to find the states for the training and test datasets.


    ## Hyperparameter selection


    The mathematical background of the CVA algorithm suggests specification of two
    hyperparameters: the lag order ($l$) and the model order ($n$). While model order
    specification is not required prior to state estimation, the lag order needs to
    be known beforehand. Let''s see the common approaches for estimation of these
    hyperparameters.


    ## Lag order ($l$)


    The guidance for assigning a value to the lag $l$ is that it should be large enough
    to capture data autocorrelation. A commonly recommended strategy is to fit several
    multivariate autoregressive models with different values of $l$ and choose the
    $l$ that minimizes the AIC criterion. An alternative approach was suggested by
    Odiowei and Cao<sup>64</sup> who suggest checking the autocorrelation function
    of the summed squares of the process variables and choosing the maximum value
    of lag for which the autocorrelation is significant as the lag order. Another
    convenient approach was given by Zhang et al.<sup>65</sup> who suggest choosing
    lag order as the minimum $s$ that satisfies the following equation


    $$A_{s+1} = \frac{\sqrt{\sum_{j=1}^{M}\left(autocorr(x_j, s+1)\right)^2}}{\sqrt{\sum_{i=1}^{s}
    \sum_{j=1}^{M}\left(autocorr(x_j, i)\right)^2 / s}} \leq \vartheta$$


    Where $autocorr(x_j, i)$ is the autocorrelation coefficient of the $j^{th}$ variable
    at time lag $i$. The threshold is chosen between 0 and 0.5.


    ## Model order ($n$)


    Correct selection of the value for $n$ is important: while too large a value leads
    to model overfitting, too small value for $n$ leads to underfitting. One approach
    for model order selection is based on Hankel singular values. If the plot of the
    singular values vs model order has a prominent ‘elbow’, then the model order corresponding
    to the elbow can be chosen as shown below.


    ![](img/cfcc9569b5e92ea115855752abddd75a_168_0.png)


    Another practice is to choose $n$ such that the normalized values of the $(n+1)^{th}$
    onwards singular values are below some threshold. However, very often there is
    no elbow or the singular values decrease slowly. Therefore, the more extensively
    used criteria for model order selection is AIC<sup>66</sup>.


    ## Process monitoring/fault detection indices


    In CVA-based fault detection strategy, 3 indices - $T_s^2, T_e^2, Q$ - are computed.
    The computation of these metrics and their corresponding threshold are shown below.
    Note that the threshold expressions are based on the assumption that process variables
    are Gaussian distributed; if this assumption is invalid then empirical techniques
    such as KDE or percentile may be employed.


    | Metric 1: $T_s^2$ | Metric 2: $T_e^2$ | Metric 3: $Q$ |

    | :--- | :--- | :--- |

    | $T_s^2(k) = x^T(k)x(k)$<br>$= p^T(k) J_n^T J_n p(k)$ | $T_e^2(k) = p^T(k) J_e^T
    J_e p(k)$ | $Q(k) = r^T(k)r(k)$<br>$r(k) = p(k) - J_n^T J_n p(k)$ |

    | Threshold @ significance level $\alpha$ | Threshold @ significance level $\alpha$
    | Threshold @ significance level $\alpha$ |

    | $T_{s,CL}^2 = \frac{n(N^2-1)}{N(N-n)} F_{\alpha}(n, N-n)$ | $T_{e,CL}^2 = \frac{z(N^2-1)}{N(N-z)}
    F_{\alpha}(z, N-z)$ | $Q_{CL} = \frac{\sigma}{2\mu} \chi_{\alpha}^2 \left( \frac{2\mu^2}{\sigma}
    \right)$ |


    - $J_e$ contains all except the first $n$ rows of $J$ i.e., the last $\ell(m+r)-n$
    rows of $J$.

    - $z = \ell(m+r)-n$.

    - $F_{\alpha}(n, N-n)$ is the 1-$\alpha$ percentile of a $F$ distribution with
    $n$ and $N-n$ degrees of freedom.

    - $\chi_{\alpha}^2(h)$ is the (1-$\alpha$) percentile of a chi-squared distribution
    with $h$ degrees of freedom; $\mu$ denotes the mean value and $\sigma$ denotes
    the variance of the Q metric.

    - Significance level of $\alpha = 0.05$ would mean that there is a 5% chance that
    an alert is false.


    ## (Unsupervised) CVA modeling with only output variables


    CVA can also be used to capture dynamic correlations in datasets where the variables
    are not divided into input and outputs. The state-space model that results is
    the following


    $$x(k+1) = Ax(k) + w(k)$$

    $$y(k) = Cx(k) + v(k)$$


    Such an approach can be used to monitor a process operating around a stable point.
    The overall approach remains the same (as shown in Figure 9.4) except for the
    definition of past and future vectors which are now defined as follows


    $$p(k) = [y^T(k-1) \ y^T(k-2) \ \cdots \ y^T(k-\ell)]^T$$

    $$f(k) = [y^T(k) \ y^T(k+1) \ \cdots \ y^T(k+\ell)]^T$$'
  mdcn: '## 9.4 典型变量分析：简介


    典型变量分析（CVA）是一种经典的多元统计过程监控技术，适用于对动态过程系统进行建模。虽然主成分分析（PCA）和偏最小二乘法（PLS）建立的是输入-输出模型，但CVA旨在提供状态空间模型，如图9.3所示。状态类似于潜变量，它们充当过程输入和输出之间的桥梁。例如，在精馏塔系统中，显然$Q_B$并不直接影响$x_D$。$Q_B$的变化必须经过内部动态或状态（例如，由每块塔板上的液体滞留量引起）才能影响$x_D$。对于$Q_B$与$D$的关系也可以进行类似的论证。输出共享相同的内部动态，这使得CVA模型（与DPCA和DPLS模型相比）具有更好的参数效率。


    ![](img/cfcc9569b5e92ea115855752abddd75a_164_0.png)


    对于基于CVA的过程监控应用，我们不需要系统矩阵；只需计算训练和测试数据集的状态即可。跟踪状态和状态噪声的系统性变化使我们能够构建监控指标。事实证明，任何时刻的状态向量都可以近似为过去输入和输出的线性组合。这个特定的组合被确定为能最好地预测未来输出的组合。现在让我们熟悉一下这是如何实现的。


    ## 数学背景


    利用状态空间模型以及对输入-输出数据序列的一些巧妙重排$^{61}$，可以证明在时间点$k$的状态向量$x(k)$可以近似为过去输入和输出的线性组合。


    ![](img/cfcc9569b5e92ea115855752abddd75a_165_0.png)


    定义为$[y^T(k-1) \ y^T(k-2) \ \cdots \ y^T(k-l_y) \ u^T(k-1) \ u^T(k-2) \ \cdots
    \ u^T(k-l_u)]^T$。


    在公式1中，$l_y$和$l_u$分别表示用于构建$p(k)$向量的滞后输出和输入的数量。通常，$l_y = l_u = l$，这是一个模型超参数。CVA方法利用典型协方差分析（CCA），一种多元统计技术，来找到$J$。下面提供关于CCA技术的简要介绍。


    ### CCA：简要介绍


    CCA是一种降维技术，旨在找到输入变量（$u \in \mathbb{R}^m$）的线性组合，使其与输出变量（$y \in \mathbb{R}^r$）的线性组合具有最大相关性*。你可以将其与PLS联系起来，在PLS中，潜变量之间的协方差被最大化。这些线性组合被称为典型变量，表示为


    $$c = Ju$$

    $$d = Ly$$


    $c$和$d$之间的协方差矩阵是（矩形）对角矩阵


    $$\Sigma_{cd} = J\Sigma_{uy}L^T = D = diag(\gamma_1, \gamma_2, \dots, \gamma_o,
    0, \dots, 0)$$


    矩阵D的元素$\gamma_i$被称为典型相关系数，满足（$\gamma_1 \ge \gamma_2 \ge \dots \ge \gamma_o$），并量化了第$i^{th}$对典型变量$c_i$和$d_i$之间的相关程度。


    ![](img/cfcc9569b5e92ea115855752abddd75a_166_0.png)


    矩阵$J \in \mathbb{R}^{m \times m}$和$L \in \mathbb{R}^{r \times r}$通过奇异值分解求得


    $$\Sigma_{uu}^{-1/2} \Sigma_{uy} \Sigma_{yy}^{-1/2} = U \Sigma V^T$$


    其中，$J = U^T \Sigma_{uu}^{-1/2}, L = V^T \Sigma_{yy}^{-1/2}, D = \Sigma$。


    可以只保留那些显示出显著相关性的典型变量对（例如，前$n$对），而丢弃其他对，从而实现降维。令$\hat{c}$和$\hat{d}$为$n$维（$n < m$且$r$）向量，则


    $$\hat{c} = J_n u$$

    $$\hat{d} = L_n y$$


    其中，$J_n$和$L_n$分别是$J$和$L$的前$n$行。


    * 假设$u$和$y$是中心化的。然而，不需要缩放，因为CCA具有尺度不变性，即无论是否缩放，估计的潜变量和相关性都保持不变。另请注意，我们没有使用“$k$”符号，因为CCA是为静态数据设计的。


    ## 计算CVA状态


    在CVA中，执行CCA的两组向量是$p(k)$（在公式1中定义）和$f(k)$，其中$^{62}$


    $$f(k) = [y^T(k) \ y^T(k+1) \ \cdots \ y^T(k+l)]^T$$


    即当前和未来的输出。


    因此，CVA求解以下奇异值分解问题，并找到过去输入和输出的线性组合，使其与当前和未来输出的线性组合具有最大相关性。


    $$\Sigma_{pp}^{-1/2} \Sigma_{pf} \Sigma_{ff}^{-1/2} = U \Sigma V^T$$


    公式2


    我们知道$\Sigma$是一个对角矩阵。它的元素也被称为（Hankel）奇异值。如果假设$n$是模型阶数，那么在时间$k$最能预测未来输出的最优状态由$^{63}$给出


    $$\hat{x}(k) = J_n p(k)$$


    公式3


    包含矩阵$J = U^T \Sigma_{pp}^{-1/2}$的前$n$行。


    公式3可用于计算训练和测试数据集的状态。


    ## 超参数选择


    CVA算法的数学背景表明需要指定两个超参数：滞后阶数（$l$）和模型阶数（$n$）。虽然在状态估计之前不需要指定模型阶数，但滞后阶数需要事先确定。让我们看看估计这些超参数的常用方法。


    ## 滞后阶数（$l$）


    为滞后$l$赋值的指导原则是它应该足够大以捕捉数据的自相关性。一个常用的推荐策略是拟合几个具有不同$l$值的多元自回归模型，并选择使AIC准则最小化的$l$。Odiowei和Cao<sup>64</sup>提出了另一种方法，他们建议检查过程变量平方和的自相关函数，并选择自相关显著的最大滞后值作为滞后阶数。Zhang等人<sup>65</sup>给出了另一种便捷的方法，他们建议选择满足以下方程的最小$s$作为滞后阶数


    $$A_{s+1} = \frac{\sqrt{\sum_{j=1}^{M}\left(autocorr(x_j, s+1)\right)^2}}{\sqrt{\sum_{i=1}^{s}
    \sum_{j=1}^{M}\left(autocorr(x_j, i)\right)^2 / s}} \leq \vartheta$$


    其中$autocorr(x_j, i)$是第$j^{th}$个变量在时间滞后$i$处的自相关系数。阈值选择在0到0.5之间。


    ## 模型阶数（$n$）


    正确选择$n$的值很重要：值太大会导致模型过拟合，而值太小会导致欠拟合。一种模型阶数选择方法基于Hankel奇异值。如果奇异值对模型阶数的图有一个明显的“肘部”，则可以选择对应于肘部的模型阶数，如下所示。


    ![](img/cfcc9569b5e92ea115855752abddd75a_168_0.png)


    另一种做法是选择$n$，使得从第$(n+1)^{th}$个开始的奇异值的归一化值低于某个阈值。然而，通常没有肘部或奇异值下降缓慢。因此，更广泛使用的模型阶数选择准则是AIC<sup>66</sup>。


    ## 过程监控/故障检测指标


    在基于CVA的故障检测策略中，计算三个指标：$T_s^2, T_e^2, Q$。这些指标的计算及其相应的阈值如下所示。请注意，阈值表达式基于过程变量服从高斯分布的假设；如果此假设无效，则可以采用核密度估计（KDE）或百分位数等经验技术。


    | 指标 1: $T_s^2$ | 指标 2: $T_e^2$ | 指标 3: $Q$ |

    | :--- | :--- | :--- |

    | $T_s^2(k) = x^T(k)x(k)$<br>$= p^T(k) J_n^T J_n p(k)$ | $T_e^2(k) = p^T(k) J_e^T
    J_e p(k)$ | $Q(k) = r^T(k)r(k)$<br>$r(k) = p(k) - J_n^T J_n p(k)$ |

    | 显著性水平 $\alpha$ 下的阈值 | 显著性水平 $\alpha$ 下的阈值 | 显著性水平 $\alpha$ 下的阈值 |

    | $T_{s,CL}^2 = \frac{n(N^2-1)}{N(N-n)} F_{\alpha}(n, N-n)$ | $T_{e,CL}^2 = \frac{z(N^2-1)}{N(N-z)}
    F_{\alpha}(z, N-z)$ | $Q_{CL} = \frac{\sigma}{2\mu} \chi_{\alpha}^2 \left( \frac{2\mu^2}{\sigma}
    \right)$ |


    - $J_e$包含$J$中除前$n$行外的所有行，即$J$的最后$\ell(m+r)-n$行。

    - $z = \ell(m+r)-n$。

    - $F_{\alpha}(n, N-n)$是自由度为$n$和$N-n$的$F$分布的1-$\alpha$百分位数。

    - $\chi_{\alpha}^2(h)$是自由度为$h$的卡方分布的(1-$\alpha$)百分位数；$\mu$表示Q指标的均值，$\sigma$表示其方差。

    - 显著性水平$\alpha = 0.05$意味着有5%的概率警报是误报。


    ## （无监督）仅使用输出变量的CVA建模


    CVA也可用于捕捉变量未被划分为输入和输出的数据集中的动态相关性。由此产生的状态空间模型如下


    $$x(k+1) = Ax(k) + w(k)$$

    $$y(k) = Cx(k) + v(k)$$


    这种方法可用于监控在稳定点附近运行的过程。整体方法保持不变（如图9.4所示），只是过去和未来向量的定义现在如下


    $$p(k) = [y^T(k-1) \ y^T(k-2) \ \cdots \ y^T(k-\ell)]^T$$

    $$f(k) = [y^T(k) \ y^T(k+1) \ \cdots \ y^T(k+\ell)]^T$$'

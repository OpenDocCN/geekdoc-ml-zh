- img_proc: true
  md: '# Data acquisition:


    As a common practice, the vibration data is analyzed in batches of equal length
    acquired at regular time intervals as shown in the illustration below. Here, at
    every minute, 1 second of vibration data is acquired and sent for pre-processing
    and vibration monitoring. If the sampling frequency is 1024 Hz, then each collected
    waveform contains 1024 data points.


    ![](img/cfcc9569b5e92ea115855752abddd75a_310_0.png)


    # Signal pre-processing:


    Tasks involved in this step attempt to improve the signal-to-noise ratio (SNR)
    of the acquired vibration signal to prepare it for the subsequent tasks. Unwanted
    frequency components of the signal due to noise and measurement system errors
    are removed. During the early stages of failure, the impact on the vibration signal
    is weak and can be difficult to detect in the absence of adequate signal pre-processing.
    As an example, the illustration below shows the benefits of trend removal.


    ![](img/cfcc9569b5e92ea115855752abddd75a_310_1.png)


    # Signal processing:


    A quick glimpse of waveform can tell you if a machine is vibrating at abnormally
    high levels. However, waveforms are notoriously difficult to use to detect failures
    at incipient stages of faults when fault characteristics are weak. Moreover, increased
    amplitude levels in vibration waveform does not tell much about the underlying
    source of failure. To derive more actionable information, spectrum analysis via
    fast Fourier transform (FFT) is commonly performed to find'
  merge: -1
  pgno: 310
- img_proc: true
  md: 'the frequency components of the waveform. Presence of significant components
    at unexpected frequencies indicates faulty conditions and provides clues for fault
    sources.


    A downside of Fourier transform is that it is restricted to stationary signals.
    It cannot indicate the change of component frequencies over time in a waveform,
    i.e., a frequency component is assumed to be present throughout the entire duration
    of a waveform at the same energy level. However, this is not always true, especially
    in the case of a degrading machine. Therefore, analysis in time-frequency domain
    is performed to decompose a waveform into its frequency components at different
    time-instants. The most popular tool for this analysis is short-time Fourier transform
    (STFT) and a spectrogram is the output from this analysis. We will go into more
    details on these techniques in the next section.


    ![](img/cfcc9569b5e92ea115855752abddd75a_311_0.png)


    # Feature extraction:


    One can directly compare the current waveform, spectrum, and spectrogram with
    those from NOC periods to detect abnormalities. Alternatively, one can pass the
    entire waveform and/or spectrum as input to a ML model. However, a more convenient
    approach is to extract meaningful features that summarize the vibration signals
    adequately and provide crucial clues regarding the operational state of a machine.
    Usage of features increases the chances of obtaining effective ML models. The
    commonly used features include, amongst others, RMS and kurtosis of waveform,
    frequency center and peak frequency of spectrum, and mean frequency from spectrogram.
    Once the features have been extracted, they can be used for fault detection and
    classification. While we will deal with this last step of VCM workflow in the
    next chapter, let’s obtain better familiarization with the vibration signal processing
    and feature extraction tasks.'
  merge: -1

  mdcn: "## RNN 输出\n\n如果图15.5中RNN单元的神经层包含$n$个神经元（图中$n$等于4），那么每个$y_{(i)}$或$h_{(i)}$都是一个$n$维向量。对于简单的RNN单元，$y_{(i)}$等于$h_{(i)}$。设$x$为一个$m$维向量。在任意第$i$步，我们可以写出以下关系式\n\
    \n$$y_{(i)} = g(W_x x_{(i)} + W_y y_{(i-1)} + b)$$\n\n其中$W_x \\in R^{n \\times\
    \ m}$，其每一行包含一个神经元应用于$x$向量的权重参数；$W_y \\in R^{n \\times n}$，其每一行包含一个神经元应用于$y$向量的权重参数；$b\
    \ \\in R^n$包含偏置参数；$g$表示激活函数。相同的神经参数在每一步都被使用。\n\n如果序列的所有输出都是关注的，那么它被称为序列到序列或到多到多网络。然而，很多时候只需要最后一步的输出，从而形成序列到向量或多对一网络。此外，最后一步的输出可能需要进一步处理，因此通常会添加一个全连接层。图15.6展示了这样一种拓扑结构。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_276_0.png)\n\n## LSTM 网络\n\nRNN是强大的动态模型，然而，之前介绍的原始RNN（单元中只有一个神经层）在学习长期依赖关系时面临困难，即当序列中的步数很大（~\
    \ $\\geq$ 10）时。这是由于梯度反向传播过程中的梯度消失问题造成的。为了克服这个问题，人们设计了LSTM（长短期记忆）单元，它们能够轻松学习非常长期的依赖关系（甚至超过1000步）。与原始RNN单元不同，LSTM单元有4个独立的神经层，如图15.7所示。此外，在LSTM单元中，内部状态存储在两个独立的向量中：$h_{(t)}$（隐藏状态）和$c_{(t)}$（单元状态）。在序列处理过程中，这两个状态都会从一个LSTM单元传递到下一个。$h_{(t)}$可以看作是短期状态/记忆，而$c_{(t)}$是长期状态/记忆，因此得名LSTM。\n\
    \n全连接层的向量输出通过三个“门”相互作用并与长期状态进行交互，这些门中发生逐元素乘法。这些门控制在任何序列处理步骤中，哪些信息进入长期和短期状态。每个门的目的简要描述如下：\n\
    \n- **遗忘门：** 决定长期状态$c_{(t)}$的哪些部分被保留和擦除\n- **输入门：** 决定新信息（从处理$x_{(t)}$和$h_{(t-1)}$获得）的哪些部分被存储在长期状态中\n\
    - **输出门：** 决定长期状态的哪些部分作为短期状态传递下去\n\n![](img/cfcc9569b5e92ea115855752abddd75a_277_0.png)\n\
    \n图15.7：LSTM单元的架构。三个全连接层使用sigmoid激活函数，一个全连接层使用$tanh$激活函数。每个神经层都有自己的参数$W_x$、$W_h$和$b$\n\
    \n这种在序列处理过程中能够操纵哪些信息被传递下去的灵活性，正是LSTM网络在捕捉序列数据中的长期模式方面如此成功的原因。因此，LSTM网络是当今默认的RNN架构。在第20章中，我们将使用LSTM模型来预测燃气轮机的剩余使用寿命。接下来，让我们学习如何使用有监督的ANN模型进行过程故障检测。\n\
    \n## 原始RNN单元 vs GRU单元 vs LSTM单元\n\n还有另一种流行的RNN单元变体，称为GRU单元。如下图所示，GRU单元比LSTM单元更简单。GRU单元有3个神经层，其内部状态用单个向量$h_{(t)}$表示。对于许多常见任务，基于GRU单元的RNN似乎能提供与基于LSTM单元的RNN相似的性能，因此，它正慢慢获得更多的普及。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_278_0.png)\n\n## 15.4 基于ANN的脱丁烷塔故障外部分析\n\
    \n考虑下面的图15.8，它说明了用于过程监控的基于ANN的外部分析$^{100}$策略。思路很简单：使用预测变量通过ANN预测响应变量，计算残差，然后使用经典统计技术监控残差。\n\
    \n![](img/cfcc9569b5e92ea115855752abddd75a_278_1.png)\n\n> $^{100}$ Yamamoto et\
    \ al., Applications of statistical process monitoring with external analysis to\
    \ an industrial monomer plant. *IFAC Advanced Control of Chemical Processes*,\
    \ 2003.\n\n让我们将此策略应用于检测炼油厂脱丁烷塔中的故障。脱丁烷塔是炼油厂的标准装置，用于将原油石脑油进料转化为液化石油气（作为塔顶产品）和汽油（作为塔底产品）。汽油产品中的丁烷（C4）含量需要保持在较低水平，并通过气相色谱法定期监测。为了增加另一层监督，需要一个模型来提供C4含量的“软”测量值，因此，实际C4含量与预期值的任何偏差都可以用来向工厂操作员发出警报。为此，我们将使用基于FFNN的外部分析构建一个故障检测模型。数据集$^{101}$作为补充材料提供在\
    \ https://link.springer.com/book/10.1007/978-1-84628-480-9。\n\n![](img/cfcc9569b5e92ea115855752abddd75a_279_0.png)\n\
    \n图15.9：脱丁烷塔及测量变量位置\n\n基础数据集包含2394个（归一化的）输入-输出过程值样本。在最后200个样本中引入了人工传感器漂移，以模拟故障传感器条件。让我们看看是否能尽早检测到这个故障。我们从加载数据开始。\n\
    \n```\n# import required packages and read data\nimport numpy as np, pandas as\

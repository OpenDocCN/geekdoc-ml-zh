- md: 'Now that your training dataset has been enriched, you can expect your fault
    classifier to perform much better!


    ## 4.4 Model Evaluation


    Post model fitting, we need some means of assessing the model performance to quantify
    how well the model detects faults. The most straightforward metric is *accuracy*
    which simply communicates the ratio of true predictions to the total number of
    predictions. Accuracy, however, can be misleading for imbalanced datasets. For
    example, if your model always trivially predicts ‘no fault’ and your dataset has
    95% NOC samples then the model’s accuracy will be 95%, which is deceptively good!
    Therefore, several other metrics have been devised that quantify different aspects
    of fault detection capabilities of a model. Before we introduce these metrics,
    let’s first understand a confusion matrix. As shown below, a confusion matrix
    for a fault detection (binary classification) model provides a comprehensive overview
    of how well the model has correctly (and incorrectly) classified samples belonging
    to positive (faulty) and negative (normal/fault-free) classes.


    Using the terms from the confusion matrix, the table below summarizes the varied
    performance metrics.


    | False Alarm Rate (FAR) or False Positive Rate (FPR) | Fault Detection Rate (FDR)
    or True Positive Rate (TPR) or Sensitivity or Recall | Missed Detection Rate or
    False Negative Rate (FNR) |

    | :--- | :--- | :--- |

    | Proportion of negatives that are flagged as positives | Proportion of positives
    that are correctly flagged | Proportion of positives that are flagged as negatives
    |

    | $FAR = \frac{FP}{AN} = \frac{FP}{FP + TN}$ | $FDR = \frac{TP}{AP} = \frac{TP}{TP
    + FN}$ | $FNR = \frac{FN}{AP} = \frac{FN}{FN + TP}$ |

    | Precision or Positive Predictive Value (PPV) | F1 Score | Accuracy (ACC) |

    | Proportion of positive predictions that are correct | Harmonic mean of precision
    and recall | Proportion of correct predictions |

    | $Precision = \frac{TP}{TP + FP}$ | $F1 = \frac{2}{\frac{1}{Precision} + \frac{1}{Recall}}$
    | $ACC = \frac{TP + TN}{TP + TN + FP + FN}$ |


    Table 1: Performance metrics for a fault detection model


    You will encounter the terms precision and recall commonly in the anomaly detection
    literature. Precision metric returns the ratio of number of correct positive predictions
    to the total number of positive predictions by the model while recall returns
    the ratio of number of correct positive predictions to the total number of positive
    samples in the data. For a process monitoring tool (where positive label implies
    presence of a process fault), recall denotes model''s ability to detect process
    fault, while precision denotes accuracy of model''s prediction of process fault.
    A model can have high recall if it detects process faults successfully, but occurrence
    of lots of false alarms will lower its precision. In other scenario, if the model
    can detect only a specific type of process fault and gives very few false alarms
    then it will have low recall and high precision. A perfect model will have high
    values (close to 1) for both precision and recall. However, we just saw that it
    is possible to have one of these two metrics high and the other low. Therefore,
    both metrics need to be reported. However, if only a single metric is desired
    then F1 score is utilized which returns a high value if both precision and recall
    are high and a low value if either precision or recall is low.


    In process industry, recall (FDR) and false alarm rate (FAR) are more commonly
    employed to assess a process monitoring tool''s performance. A plant operator
    is mainly concerned about two things: does the model detect a fault when it occurs
    (given by FDR) and does the model trigger false alerts under NOC (given by FAR).
    As would be obvious, FAR close to 0 is desirable. A well-designed monitoring tool
    has high FDR and low FAR values. Low FDR and high FAR values are both undesirable
    because while low FDR value leads to safety issues and economic losses due to
    delayed/no abnormality detection, high FAR value leads to loss of user''s confidence
    in the tool and eventually tool''s demise. If you make your model very sensitive
    to detect faults promptly at incipient stages, it will very likely generate lots
    of false alerts. As a process data scientist, you will very often find yourself
    tuning the model to balance the trade-off between FDR and FAR.


    ## ROC and area under curve (AUC)


    Most of the fault detection models compute abnormality metric(s) in one form or
    the other (Q and T² in PCA, distance from the center in SVDD, etc.). Based on
    the abnormality metrics of the training samples, an alerting threshold is chosen
    such that metric values beyond the threshold imply presence of faults as shown
    in the illustration below.


    As indicated, while a very ‘relaxed’ threshold will likely fail to detect faulty
    samples (FDR low, FAR low), a very aggressive threshold will lead to normal samples
    being flagged as faulty (FAR high, FDR high). This interplay between FDR and FAR
    for different alerting threshold is graphically presented via a ROC curve shown
    below. While an ideal fault detection tool will provide a perfect performance
    (FDR=1, FAR=0), in real scenarios, you will have to tune your alert threshold
    to provide acceptable levels of FDR and FAR.


    In general, the closer a curve is to the ideal detector or the more lift it has
    above the diagonal line, the better performance it provides over a random classifier.
    To compare two models using their ROC curves, a metric called AUC (area under
    curve) has been devised. AUC is obtained by integrating the ROC curve from FAR=0
    to FAR=1. An ideal detector has AUC=1 and higher AUC values imply better fault
    detection performance.


    ## Fault sensitivity vs fault detection speed


    Previously, we focused on a fault detection model’s ability to detect a fault.
    Another important characteristic to assess (fault detection) FD performance is
    ‘speed of detection’. The metric commonly used to quantify the detection speed
    is called average run length (ARL). Specifically, ARL1 refers to the number of
    samples (on an average) after the onset of fault that a FD model detects it.


    In Chapter 5, we will see the trade-off between fault sensitivity and fault detection
    speed. Specifically, a technique called CUSUM will be introduced that is able
    to detect faults of small magnitudes (⇒ high fault sensitivity) but shows higher
    ARL1 compared to classical 3-sigma technique (which is widely used for univariate
    signal monitoring). Another metric called ARL0 denotes the average time or number
    of samples a FD model takes to flag a (false) alarm when no fault exists in the
    process.


    ## 4.5 Model Tuning


    Every ML model comes with a set of hyperparameter (e.g., the number of neurons
    in ANNs, number of retained latent components in PCAs) that can be adjusted to
    improve the performance metrics. However, care must be taken to avoid overfitting
    the model. The illustration below shows SVDD modeling of NOC training samples
    for different values of the bandwidth.


    Figure 4.2: SVDD hyperparameter tuning


    For high-dimensional complex datasets, it is not easy to judge whether we are
    overfitting the data while tuning your model. Therefore, the standard approach
    is to use separate sets of datasets to use for fitting, tuning, and assessing
    the model as shown in the figure below.


    Figure 4.3: 3-way holdout methodology


    An overfitted model is an unnecessarily complex model that ends up fitting the
    noise in the training dataset and therefore, it can be expected to provide poor
    performance (high FAR) on validation dataset. On the other hand, the underfitted
    model fails to capture even the systematic structure in the training dataset leading
    to undesirable low FDR on both fitting and validation datasets. Therefore, the
    hyperparameter values that lead to the least complex model providing acceptable
    performance on validation dataset is often chosen as the final model. This practice
    of using validation dataset to assess model performance during model tuning is
    termed cross-validation.'
  mdcn: '既然你的训练数据集已经得到丰富，你可以预期你的故障分类器性能将大幅提升！


    ## 4.4 模型评估


    模型拟合后，我们需要一些方法来评估模型性能，以量化模型检测故障的效果。最直接的指标是*准确率*，它简单地表示正确预测数与总预测数的比例。然而，对于不平衡数据集，准确率可能会产生误导。例如，如果你的模型总是简单地预测“无故障”，而你的数据集中有95%的正常工况样本，那么模型的准确率将是95%，这看起来好得令人怀疑！因此，人们设计了其他几个指标来量化模型故障检测能力的不同方面。在介绍这些指标之前，我们先来理解混淆矩阵。如下所示，故障检测（二元分类）模型的混淆矩阵全面概述了模型正确（和错误）分类属于正类（故障）和负类（正常/无故障）样本的情况。


    使用混淆矩阵中的术语，下表总结了各种性能指标。


    | 误报率（FAR）或假阳性率（FPR） | 故障检测率（FDR）或真阳性率（TPR）或灵敏度或召回率 | 漏检率或假阴性率（FNR） |

    | :--- | :--- | :--- |

    | 被标记为阳性的阴性样本比例 | 被正确标记的阳性样本比例 | 被标记为阴性的阳性样本比例 |

    | $FAR = \frac{FP}{AN} = \frac{FP}{FP + TN}$ | $FDR = \frac{TP}{AP} = \frac{TP}{TP
    + FN}$ | $FNR = \frac{FN}{AP} = \frac{FN}{FN + TP}$ |

    | 精确率或阳性预测值（PPV） | F1分数 | 准确率（ACC） |

    | 阳性预测中正确的比例 | 精确率和召回率的调和平均值 | 正确预测的比例 |

    | $Precision = \frac{TP}{TP + FP}$ | $F1 = \frac{2}{\frac{1}{Precision} + \frac{1}{Recall}}$
    | $ACC = \frac{TP + TN}{TP + TN + FP + FN}$ |


    表1：故障检测模型的性能指标


    你将在异常检测文献中经常遇到精确率和召回率这两个术语。精确率指标返回模型正确阳性预测数与模型总阳性预测数的比率，而召回率返回正确阳性预测数与数据中总阳性样本数的比率。对于过程监控工具（其中阳性标签意味着存在过程故障），召回率表示模型检测过程故障的能力，而精确率表示模型预测过程故障的准确性。如果模型成功检测到过程故障，它可能具有高召回率，但大量误报会降低其精确率。在另一种情况下，如果模型只能检测特定类型的过程故障且误报很少，那么它的召回率会低而精确率会高。一个完美的模型在精确率和召回率上都会有高值（接近1）。然而，我们刚才看到，这两个指标中的一个可能高而另一个低。因此，需要同时报告这两个指标。但是，如果只需要一个指标，则使用F1分数，当精确率和召回率都高时，它返回高值；当精确率或召回率低时，它返回低值。


    在过程工业中，召回率（FDR）和误报率（FAR）更常用于评估过程监控工具的性能。工厂操作员主要关心两件事：模型是否在故障发生时检测到它（由FDR给出），以及模型在正常工况下是否触发误报（由FAR给出）。显而易见，FAR接近0是理想的。一个设计良好的监控工具具有高FDR和低FAR值。低FDR和高FAR值都是不可取的，因为低FDR值会导致安全问题和因延迟/未检测到异常而造成的经济损失，而高FAR值会导致用户对工具失去信心，并最终导致工具被淘汰。如果你使你的模型非常敏感，以便在初始阶段及时检测故障，它很可能会产生大量误报。作为过程数据科学家，你经常会发现自己需要调整模型以平衡FDR和FAR之间的权衡。


    ## ROC和曲线下面积（AUC）


    大多数故障检测模型以某种形式计算异常度量（PCA中的Q和T²，SVDD中到中心的距离等）。根据训练样本的异常度量，选择一个报警阈值，使得超过该阈值的度量值意味着存在故障，如下图所示。


    如图所示，虽然一个非常“宽松”的阈值可能无法检测到故障样本（FDR低，FAR低），但一个非常激进的阈值会导致正常样本被标记为故障（FAR高，FDR高）。不同报警阈值下FDR和FAR之间的这种相互作用通过下面的ROC曲线以图形方式呈现。虽然理想的故障检测工具将提供完美的性能（FDR=1，FAR=0），但在实际场景中，你必须调整报警阈值以提供可接受的FDR和FAR水平。


    通常，曲线越接近理想检测器，或者在对角线上方的提升越大，其性能就优于随机分类器。为了使用ROC曲线比较两个模型，人们设计了一个称为AUC（曲线下面积）的指标。AUC是通过从FAR=0到FAR=1对ROC曲线进行积分得到的。理想检测器的AUC=1，更高的AUC值意味着更好的故障检测性能。


    ## 故障灵敏度与故障检测速度


    之前，我们关注的是故障检测模型检测故障的能力。评估（故障检测）FD性能的另一个重要特征是“检测速度”。通常用于量化检测速度的指标称为平均运行长度（ARL）。具体来说，ARL1指的是从故障发生到FD模型检测到它所经过的平均样本数。


    在第5章中，我们将看到故障灵敏度和故障检测速度之间的权衡。具体来说，将介绍一种称为CUSUM的技术，它能够检测小幅值的故障（⇒高故障灵敏度），但与经典的3-sigma技术（广泛用于单变量信号监测）相比，显示出更高的ARL1。另一个称为ARL0的指标表示当过程中没有故障时，FD模型发出（误）警报所需的平均时间或样本数。


    ## 4.5 模型调优


    每个机器学习模型都带有一组超参数（例如，ANN中的神经元数量，PCA中保留的潜在成分数），可以调整这些参数以提高性能指标。但是，必须注意避免模型过拟合。下图显示了对不同带宽值的正常工况训练样本进行SVDD建模的情况。


    图4.2：SVDD超参数调优


    对于高维复杂数据集，在调整模型时不容易判断是否过拟合数据。因此，标准方法是使用单独的数据集组来拟合、调优和评估模型，如下图所示。


    图4.3：三路保持法


    过拟合的模型是一个不必要的复杂模型，最终拟合了训练数据集中的噪声，因此可以预期它在验证数据集上表现不佳（高FAR）。另一方面，欠拟合的模型甚至无法捕捉训练数据集中的系统结构，导致在拟合和验证数据集上都出现不理想的低FDR。因此，通常选择导致最不复杂模型且在验证数据集上提供可接受性能的超参数值作为最终模型。这种在模型调优期间使用验证数据集评估模型性能的做法称为交叉验证。'

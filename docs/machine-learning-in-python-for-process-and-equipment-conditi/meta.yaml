  md: '# 16.3 Self-Organizing Maps: An Introduction


    Self-organizing maps (SOMs)^105 are unsupervised neural networks that aim to map
    a high-dimensional dataset onto a 2D grid of neurons as shown in Figure 16.3.
    The mapping is done in such a way that the topology of data is preserved, i.e.,
    data samples close to each other in the original input space are mapped to nearby
    neurons on the SOM grid. Accordingly, SOMs render themselves very useful for visualization
    and clustering of complex high-dimensional datasets. SOMs are named as such as
    no supervision/guidance is needed to determine the mapping; this makes SOM an
    excellent EDA tool. Additionally, like autoencoders, no restriction is imposed
    on the input dataset regarding the data distribution, linearity, and independence
    among variables, etc.


    ![](img/cfcc9569b5e92ea115855752abddd75a_295_0.png)


    The neuron that a data sample gets mapped to is called the sample’s BMU (best
    matching unit). During training, multiple data samples may get assigned the same
    BMU. In a way, the BMUs discretize the input space during model training into
    several local sub-regions and the samples lying in a sub-region are mapped to
    the same BMU. For a test data sample, if there


    ^105 SOM is also called as Kohonen map in honor of Prof. Teuvo Kohonen who introduced
    SOM.'

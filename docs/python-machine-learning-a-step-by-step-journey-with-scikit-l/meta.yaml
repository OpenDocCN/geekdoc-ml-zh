    \ == i, 0], data_r[labels == i, 1], c=c, alpha=0.4)\nplt.legend()\nplt.title('Scatterplot\
    \ of Points')\nplt.show()\n```\n\nWhat conclusion can we draw from this? As you\
    \ can see in the scatterplot, you are able to pinpoint a class separation of the\
    \ first 2 components. That tells us it will be difficult to make accurate classifications\
    \ using the dataset.\n\nDespite that, you can see that classes are clustered in\
    \ a way that allows us to get some accurate results through clustering analysis.\
    \ PCA has given us a hint about the structure of the dataset, and we can probe\
    \ it further using other methods. Let’s perform that analysis through k-means\
    \ clustering algorithms.\n\n## K-MEANS CLUSTERING\n\nWe’ve said unsupervised machine\
    \ learning algorithms are great for gleaning information from very complex datasets.\
    \ These algorithms are a huge time-saver for data analysts who are trying to extract\
    \ data from a complicated dataset. Now, let’s take that a step further and look\
    \ at clustering algorithms.\n\nClustering is maybe the core unsupervised machine\
    \ learning method because it focuses on optimization and efficient implementation.\
    \ This algorithm is ridiculously fast. The most popular clustering technique is\
    \ “k-means.” k-means builds clusters by arbitrarily initiating them as k-many\
    \ points. Each point in the data functions as a mean of cluster. The mean is determined\
    \ based on the nearest mean in the cluster. Each cluster will have a center; that\
    \ center becomes the new mean, making all other means change their position.\n\
    \nAfter a number of iterations, the cluster’s center will move into a position\

    \   metrics.adjusted_rand_score(labels, estimator.labels_),\n             metrics.silhouette_score(data,\
    \ estimator.labels_,\n                                      metric='euclidean',\n\
    \                                      sample_size=sample_size)))\n```\n\nSo,\
    \ how does PCA code and k-means code differ? The main difference is that we start\
    \ by scaling the values within the dataset.\n\nWhy? Because if we don’t, we might\
    \ have various disproportionate feature values that can have unpredictable side-effects\
    \ on the entire dataset.\n\nClustering algorithms like these are only successful\
    \ when they can interpret the ways the data is grouped. Let’s look at the performance\
    \ measures we have in the code so we can better understand clustering:\n\n1. **Homogeneity\
    \ score**: A cluster containing measurements of a single class. It has a basic\
    \ score of zero to one. Values closer to zero tell that the sample has low homogeneity,\
    \ while those at the other end of the spectrum tell the sample is from a single\
    \ class.\n2. **Completeness score**: This score supports the homogeneity score\
    \ by giving us information on the assignments of measurements along the same class.\
    \ Put together with a homogeneity score, we will be able to tell if we have a\
    \ perfect clustering solution.\n3. **V-measure**: The harmonic mean of the homogeneity\
    \ score and the completeness score. It has a scaled measure of zero to one, which\
    \ assesses the homogeneity and completeness of the cluster.\n4. **Adjusted Rand\
    \ Index score**: Measures similarity in the labeling on a zero to one scale. Applied\
    \ to clustering, this measures the harmony of the assignment sets.\n5. **Silhouette\
    \ score**: Measures the performance of the clustering without using the clustering\
    \ of labeled data. The score is on a scale of -1 to 1. It tells us if the clusters\
    \ are well-defined. Incorrect clustering will equal -1, 1 is highly defined, and\
    \ if the score gravitates towards 0, it tells us there is some overlap between\
    \ clusters.\n\nIn the k-means clustering example, all these scores give us the\

  md: '# CONSTRUCTING DEEP BELIEF NETWORKS


    Deep belief networks are created by stacking RBMs. The specific number of RBMs
    will depend on the purpose for the network. The general aim is to achieve a balance
    between performance and accuracy. If you are looking for more accuracy, you will
    need more computational power. The first RBM is to train a layer of features based
    on the training data; the other layers work on the features of hidden layers.
    Every RBM improves the log probability. This means deep belief networks are improved
    the more layers are added.


    The size of the layer will have an impact. Usually, it is recommended to keep
    the number of nodes in the hidden layers of consecutive RMBs low. You don’t want
    an RBM that has a similar number of visible nodes as the hidden nodes of the one
    before. With that in mind, you can model any kind of function even if the layers
    have an extremely low number of nodes. It will as long as we have enough layers
    to compensate.


    # Training


    Deep belief networks happen through “greedy” learning; that means every RBM layer
    is trained locally.


    The RBM layer is trained the same way as we have seen in the RBM training section.
    Data distribution of the fist layer is converted with Gibbs sampling to a posterior
    distribution. The next RBM layer in the structure will learn the same distribution,
    and on it goes.'

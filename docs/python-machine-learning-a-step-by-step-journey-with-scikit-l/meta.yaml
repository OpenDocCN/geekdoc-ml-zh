  md: 'two techniques are common solutions to many complex problems that involve image
    or sound recognition.


    In the third chapter, we worked with convolutional neural networks. They are often
    used in artificial neural network implementations. We learned how


    to use them for photo search and image recognition. Today CNN algorithmsare often
    used in drones, robotics, and self-driven cars.


    In the fourth chapter, we looked at autoencoders and their variations, like denoising
    autoencoders. We mostly talked about them and explored some of the best techniques

  md: 'advantage of a convolution process like this is that it removes the need for
    feature engineering. We will talk about feature engineering in later chapters.
    For now, it’s enough to know that the feature engineering process is often challenging
    and demanding.


    # Training


    CNN learning is very similar to previous processes. For example, MLPs are pre-trained
    using convolution nets and the use of backpropagation for processing the gradient.


    Let’s discuss the steps performed during training. Firstly, we must compute a
    feature map by computing each as a sum of them all convolved with the coinciding
    weight kernel. That step is called the forward pass. Secondly, the gradients are
    calculated by convolving the exchanged weight kernels with the gradients. It’s
    called the backward pass. During the process we should also calculate the loss
    of kernels so we can adjust their weights.


    Remember that the training process is slow, so it takes a while regardless ofthe
    quality of your hardware.'

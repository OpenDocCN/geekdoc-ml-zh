- img_proc: true
  md: 'CNNs process visual data as tensors. A tensor is a matrix of numbers with additional
    dimensions formed by an array nested within an array. CNNs work with 4D tensors.
    To help explain better, imagine you are looking at a picture. We can deduce the
    height and width of the picture with ease, but what about the depth? Depth is
    the encoded colors: red, green and blue color channels. Convolution is used to
    produce feature maps, which are maps of image details. These exist in a fourth
    dimension. So, our picture is not a two-dimensional object but a four-dimensional
    object.


    The question now is: What is convolution? In math, convolution is measuring how
    much two functions overlap when they pass over each other. CNNs register different
    signals every time they pass a filter over an image. For instance, when mapping
    margins of an image, we can picture the following filters passing over it: horizontal,
    vertical and diagonal.


    Remember, convolution networks don’t process and analyze images in the manner
    RBMs do. CNNs learn by what are known as feature maps; in contrast, RBMs analyze
    the whole image.


    CNNs are inspired by the brain’s visual cortex, which gives people the ability
    to process and analyze visual imagery. The visual cortex has light detecting receptors
    that capture light data in overlapping visual field layers. This is one of reasons
    why image recognition algorithms are popular in artificial intelligence and machine
    learning.


    Facebook uses this technology. It has created DeepFace, a facial recognition system
    that can identify human faces with increasing accuracy. Some even report that
    DeepFace has an accuracy of 97%. In comparison, the FBI’s facial recognition system
    is only'

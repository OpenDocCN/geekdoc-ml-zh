    \ the PCA algorithm:\n\n```python\npca = PCA(n_components=10)\ndata_r = pca.fit(data).transform(data)\n\
    print('explained variance ratio (first two components): %s' % str(pca.explained_variance_ratio_))\n\
    print('sum of explained variance (first two components): %s' % str(sum(pca.explained_variance_ratio_)))\n\
    ```\n\nThe code will give us a variance which will be explained by all components.\
    \ They will be ordered by their explanatory power.\n\nOur result is a variance\
    \ of 0.589. We’ve cut down from 64 variables to 10 components. That’s a big improvement.\
    \ PCA will result in some information being lost, but when you weigh the disadvantages\
    \ against advantages, advantages win out. Let’s illustrate with visualizations.\
    \ We have the “data_r” project, which contains the output. We will add the “color”\

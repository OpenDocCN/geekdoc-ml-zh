    \n既然我们已经准备好了自编码器参数，我们就可以定义学习函数。既然我们说过自编码器需要我们在输入数据中加入噪声，我们就这样做。学习将通过输入数据的编码图像进行，这些图像将被重构以尽可能接近原始形式。让我们通过破坏输入数据来实现这个功能：\n\
    \n```python\ndef get_corrupted_input(self, input, corruption_level):\n    return\

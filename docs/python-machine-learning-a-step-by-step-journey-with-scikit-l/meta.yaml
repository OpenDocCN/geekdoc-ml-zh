    gain access to tag data within datasets where aggregation risks losing information.
    And one-hot encoding enables us to break apart particular response codes and split
    them into independent features useful for identifying relevant and meaningful
    codes for specific variables. This allows us to save values that matter to our
    goals.


    Another alternative is used on text codes. It is often referred to as the “hash
    trick.” It’s a function that we use to translate textual data into its numeric
    counterpart. In general, hashes are typically used to construct a summary of extensive
    data or to encode a wide range of parameters considered delicate. Let’s look at
    how hashes are used so you can understand and get the most out of them.


    After transforming text into numeric values, we can use those values as identifiers
    for a specific phrase. There are various types of hash algorithms, but for our
    purposes, the most basic will do the job. To get an idea, a simple hash can transform
    every letter in the alphabet into a correcting number.“A” would become 1, and
    “B” would become 2 and so on. Hashes can also create words and sentences by putting
    those numbers together. Look at the string example below where we have the words
    “dog” and “pics”:


    Dog: 4 + 15 + 7'
- md: '## REAL-WORLD FEATURE ENGINEERING


    This section depends on the techniques you are using. Deep learning algorithms
    work better when working with less-engineered data, and they will require less
    work in general. Note that you need to learn what you need through an iteration
    process.


    The first thing you will need to do is focus on the accuracy of our model and
    learn the minimum amount of processing needed. Then perform based on the minimum
    value, learn all the information you can from the data, analyze results and work
    on the next iteration.


    Let’s turn to real-world examples of feature engineering. You notice how big cities
    have serious transportation and infrastructure problems. This creates a problem
    for us because it means it is difficult to estimate the time needed to commute.
    The transportation method doesn’t matter; whether it’s a bus, car or rail system,
    it still makes it hard to predict arrival and departure times. Now, how can you
    fix that and improve your travelling experience? Below are some of the things
    you can do:


    - 1. You write code that harvests data from multiple APIs, like text and climate
    data.

    - 2. Using feature-learning algorithms learned in this book, you can get variables
    from the extracted information.

    - 3. Then you can test your feature sets by taking risk of commute-delay scores.


    In this situation you don’t need to focus on a model that will give you high performance
    and efficiency. All we need to do is to build an automated solution that will
    take adjustments based on where you are. However, there are other reasons why
    you might want to focus on this.


    We will see data from Twitter. Twitter requires us to duplicate datasets taken
    from them whenever you make any modifications to the datasets. Specifically, those
    datasets were shared openly with the public. An example of modification is a deletion
    of a tweet. That means it is difficult to give results that can be reproduced
    from a model that is based on streamed data. That is because a user would have
    created their stream and gathered data. We also need to think about context variations
    that may impact the model’s performance.


    We discussed a solution based on the area around you, but potential users of the
    model don’t live next to you, so that solution might not work for them. A solution
    that is adaptable is the best solution.


    ## Acquiring Data


    To achieve what we discussed earlier, we need to get some data. How do we do that?
    For better model training, we need to use stamped data that is recorded on a regular
    basis. Twitter’s API is perfect. We can use it to get tweet data.


    You might wonder why we chose Twitter of all places. That is because of official
    transit authorities registered on Twitter. You can get their tweets for information
    about bus and train companies. These companies will often update customers about
    delays and service interruptions. We can also get data from commuters too. We
    can do that using a dictionary that looks for terms related to disruptions and
    delays.


    We will also extract data from other APIs, like the Bing Traffic API. It will
    provide data on traffic congestions and other incidents.


    Issues with commuting aren’t always related to transportation companies and traffic
    congestion. Weather is an important factor as well. Driving on a typical summer
    day will have a different impact than driving on a snowy winter day. So, we should
    get information about the weather too. Weather APIs can help in that regard. They
    will give us details about precipitation, humidity, atmospheric pressure and visibility.
    We will get this data in textual descriptions instead of just forecasts.


    These three sources of data will be able to do the job. Of course, if you wanted,
    you could find other types of data to add to our model.


    ## Model Performance Testing


    We are trying to create meaningful assessments of our commute-disruption prediction.
    We need to begin by coming up with criteria for testing and the right performance
    measure.


    We need to determine the risk of disruption in advance so users aren’t badly affected.


    To do this we will need three requirements:


    - 1. Understanding the output we will get from our model.

    - 2. Use certain measures to get the model’s performance.

    - 3. Target data used to score the model’s performance based on measures.


    This is debatable, but we can make an argument that the risk is useful when it
    provides information we never had.


    We could make our model output a score between 0 to 1 for the daily commute. There
    are various ways we can present the score. The most obvious is log rescaling.
    The advantage is that we can make the distribution of commute delay time follow
    a power law. At this time, we will change the output score. We will do that at
    a later stage. For now, our focus should be delivering the score. A zero to one
    system does not look very practical, so we should aim for a three-level system:
    low risk, mid risk, and high-risk status within the 0 to 1 range. This means we
    will change our approach by treating it as a multiclass classification with labels.
    Doing things this way may improve the model’s performance, because we can expand
    the free error margin. However, you may not want to apply this in the first iteration.
    That is because, without looking at the distribution of our commute delays, we
    can’t know where the borders should be for different classes.


    Next, we should decide how to measure the performance of our model. Measure is
    decided based on the problems posed by specific features. We will begin with the
    most common performance scoring method which happens to be perfect for our case.
    It is called the confusion matrix. A confusion matrix is a table used to describe
    performance of a classifier on a test set. Think of it as a probability table
    that describes the label prediction against the real label. The technique is very
    useful when it comes to multiclass problems because we can learn a lot from classification
    values based on the class and the type of failure we get. Below is a simple matrix
    that assesses if there’s probability we aren’t interested in:


    | Prediction | TRUE | FALSE |

    | :--- | :--- | :--- |

    | **True Positive** | False Positive | |

    | **False Negative** | True Negative | |


    In our specific scenarios, we are interested in all these values. Let’s describe
    them. In the example above, the false positives indicate starting a commute early,
    while false negatives are about unexpected delays. This means we need a measure
    that takes high sensitivity and high specificity, meaning the best performance
    measure is AUC (area under the curve).


    Secondly, we need a method of measuring the score; we need a target to make a
    prediction against. To do this we need to travel ourselves, by picking a time
    and then recording the time. For it to work, we will need to be consistent with
    the departure time and the route we take.


    This approach is limited because of its reliance on personal habits. Maybe you
    live in an area where your route benefits from some advantage that others don’t
    get. It could even be that you are much more active about your commute when others
    aren’t. That means we can’t rely on data only provided by you. Data must be gathered
    from many people using different routes. For your own purposes, using your own
    target data might be enough.


    This measuring method might work for us, since we are trying to classify disruptions
    in the commute. We also don’t want natural time variance misinterpreted in the
    learning phase against targets set by other commuters including their routes.
    Deciding the best path for our model will be difficult. It can be hard to judge
    whether our model is performing at its best. The issues come up because we don’t
    have a way of guaranteeing the accuracy of our prediction if'
  mdcn: '## 真实世界中的特征工程


    本节内容取决于你所使用的技术。深度学习算法在处理较少工程化数据时表现更佳，总体上所需的工作量也更少。请注意，你需要通过迭代过程来学习所需内容。


    首先，你需要关注模型的准确性，并学习所需的最少处理步骤。然后基于最小值进行操作，从数据中尽可能多地获取信息，分析结果，并着手进行下一次迭代。


    现在，让我们转向特征工程的真实世界案例。你注意到大城市存在严重的交通和基础设施问题。这给我们带来了一个难题，因为它意味着很难估算通勤所需的时间。交通方式无关紧要；无论是公交车、私家车还是轨道交通系统，都难以预测到达和出发时间。那么，如何解决这个问题并改善你的出行体验呢？以下是一些你可以采取的措施：


    - 1. 编写代码从多个API（如文本和气候数据）中采集数据。

    - 2. 运用本书中学到的特征学习算法，你可以从提取的信息中获取变量。

    - 3. 然后，你可以通过通勤延误风险评分来测试你的特征集。


    在这种情况下，你无需专注于一个能提供高性能和高效率的模型。我们需要做的只是构建一个自动化解决方案，它会根据你的位置进行调整。然而，你可能还有其他原因想要关注这一点。


    我们将查看来自Twitter的数据。Twitter要求我们在对数据集进行任何修改时，都必须复制从他们那里获取的数据集。具体来说，这些数据集是公开共享给公众的。修改的一个例子是删除一条推文。这意味着，基于流数据的模型很难给出可复现的结果。这是因为用户会创建自己的数据流并收集数据。我们还需要考虑可能影响模型性能的上下文变化。


    我们讨论了一个基于你所在区域的解决方案，但模型的潜在用户并不住在你附近，因此该解决方案对他们可能不适用。一个可适应的解决方案才是最佳解决方案。


    ## 获取数据


    为了实现我们之前讨论的目标，我们需要获取一些数据。我们该怎么做呢？为了更好地训练模型，我们需要使用定期记录的带时间戳数据。Twitter的API是完美的选择。我们可以用它来获取推文数据。


    你可能会好奇为什么我们偏偏选择Twitter。这是因为有官方交通管理机构在Twitter上注册。你可以获取他们的推文，以了解公交和铁路公司的信息。这些公司通常会向客户更新延误和服务中断的情况。我们也可以从通勤者那里获取数据。我们可以使用一个词典来查找与中断和延误相关的术语。


    我们还将从其他API提取数据，例如Bing交通API。它将提供交通拥堵和其他事件的数据。


    通勤问题并非总是与交通公司和交通拥堵有关。天气也是一个重要因素。在典型的夏日开车与在下雪的冬日开车会产生不同的影响。因此，我们也应该获取天气信息。天气API在这方面可以提供帮助。它们会提供关于降水、湿度、大气压和能见度的详细信息。我们将以文本描述的形式获取这些数据，而不仅仅是预报。


    这三个数据源将能够完成这项工作。当然，如果你愿意，也可以找到其他类型的数据添加到我们的模型中。


    ## 模型性能测试


    我们试图对通勤中断预测进行有意义的评估。我们需要从制定测试标准和正确的性能度量开始。


    我们需要提前确定中断风险，以免用户受到严重影响。


    为此，我们需要满足三个要求：


    - 1. 理解我们将从模型中获得的输出。

    - 2. 使用特定度量来获取模型的性能。

    - 3. 用于根据度量对模型性能进行评分的目标数据。


    这一点存在争议，但我们可以论证，当风险提供了我们从未有过的信息时，它是有用的。


    我们可以让模型为每日通勤输出一个0到1之间的分数。我们可以通过多种方式呈现这个分数。最明显的是对数缩放。其优势在于我们可以使通勤延误时间的分布遵循幂律。届时，我们将改变输出分数。我们将在后续阶段进行此操作。目前，我们的重点应该是提供分数。一个0到1的系统看起来不太实用，因此我们的目标应该是一个三级系统：在0到1的范围内分为低风险、中风险和高风险状态。这意味着我们将改变方法，将其视为带有标签的多类别分类问题。这样做可能会提高模型的性能，因为我们可以扩大自由误差范围。然而，你可能不想在第一次迭代中应用这一点。这是因为，在不了解通勤延误分布的情况下，我们无法知道不同类别之间的边界应该设在哪里。


    接下来，我们应该决定如何衡量模型的性能。度量是根据特定特征所提出的问题来决定的。我们将从最常见的性能评分方法开始，它恰好非常适合我们的情况。它被称为混淆矩阵。混淆矩阵是一个用于描述分类器在测试集上性能的表格。可以将其视为一个概率表，描述标签预测与真实标签的对比。这种技术在处理多类别问题时非常有用，因为我们可以从基于类别和失败类型中学习到很多分类值。下面是一个简单的矩阵，用于评估是否存在我们不感兴趣的概率：


    | 预测 | 真 | 假 |

    | :--- | :--- | :--- |

    | **真阳性** | 假阳性 | |

    | **假阴性** | 真阴性 | |


    在我们的具体场景中，我们对所有这些值都感兴趣。让我们描述一下它们。在上面的例子中，假阳性表示过早开始通勤，而假阴性则与意外延误有关。这意味着我们需要一个同时具有高灵敏度和高特异性的度量，也就是说，最佳的性能度量是AUC（曲线下面积）。


    其次，我们需要一种衡量分数的方法；我们需要一个目标来进行预测。为此，我们需要亲自出行，选择一个时间，然后记录时间。为了使其有效，我们需要在出发时间和所走路线上保持一致。


    这种方法因其依赖个人习惯而受到限制。也许你住在一个你的路线能获得其他人没有的优势的区域。甚至可能是当其他人不那么积极时，你对通勤要积极得多。这意味着我们不能仅仅依赖你提供的数据。数据必须从使用不同路线的许多人那里收集。就你个人目的而言，使用你自己的目标数据可能就足够了。


    这种衡量方法可能对我们有用，因为我们试图对通勤中的中断进行分类。我们也不希望自然的时间差异在学习阶段被误解为其他通勤者（包括他们的路线）设定的目标。为我们的模型确定最佳路径将是困难的。很难判断我们的模型是否在最佳状态下运行。问题之所以出现，是因为我们无法保证预测的准确性，如果'

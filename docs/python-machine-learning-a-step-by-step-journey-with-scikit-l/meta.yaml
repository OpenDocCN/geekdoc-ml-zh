  md: '# INTRODUCTION


    This book is a step-by-step guide through intermediate machine learning concepts
    and techniques. You’ll also learn working with complex data, as any machine learning
    technology requires data. The bulk of the work in this book will be communicated
    with clear examples. This is great news if you are the type that does better learning
    from examples.


    Since this is an intermediate guide, there is a lot of assumed knowledge on our
    part. We expect you to know machine learning basics and Python. The act of publishing
    a book like this is always about simplifying things so anyone can learn. So, if
    you aren’t sure you got the basics down, you can still have a look and do some
    extra research when you come across concepts that are new to you. The information
    should otherwise be easy to digest.


    Let’s now talk about what you will learn:


    We will use unsupervised machine learning algorithms and tools for analyzing complex
    datasets. That means you will learn about principal component analysis, k-means
    clustering and more. If this sounds strange and new, that is okay; it’s why we
    are here. You don’t have to know what any of this means at this point. Again,
    all this will be accompanied with practical examples.


    Then we will learn about restricted Boltzmann machine algorithms and deep belief
    networks. These will be followed by convolutional neural networks, autoencoders,
    feature engineering and ensemble techniques. Each chapter will begin by explaining,
    in general terms, the theory behind these techniques.'

    # # NEURAL NETWORKS


    The restricted Boltzmann machine is a type of neural network. This means, before
    we do anything, we need to first understand neural networks.


    If you have read the first book in the series, you have an idea of what neural
    networks are. So, in this section we are going to delve a little deeper, but we
    won’t get any deeper than necessary to move on.


    In case you don’t remember, neural networks are mathematical models used to develop
    and optimize a function''s definition. Below are elements of a neural network:


    +   1. **Learning process:** Parameters are altered in the weight function of
    the neural network’s node. The output, the performance score, is fed in the network’s
    learning function. The function then outputs weight adjustments aimed at minimizing
    the cost function.

    2. **Set of neurons:** Each neuron set has an activation function. The activation
    function is known as the weight function. Its job is to handle input data. These
    functions will depend on the neural networks, meaning they tend to vary with the
    network.

    3. **Connectivity:** Connectivity functions direct which node sends data to which.
    Depending on the connection pattern, all this input data can be sent with or without
    restrictions.


    These three aspects reflect the core of neural networks, whichever types they
    might come in. This includes multi-layer perception and the restricted Boltzmann
    machine.


    # ## Neural Network Topology


    Neural network topologies are commonly referred to as neural structure or architecture.
    They tell us how the neurons come'
  - '[PAGE 26]


    together to form a network. The type of architecture a neural network has will
    have an influence on its performance and functionality. There are many neural
    network topologies,


    but one of the most popular is the three-layer feedforward network, which isoften
    used with supervised machine learning.


    The three-layer feedforward network is, you''ve guessed it, divided intothree
    layers that communicate data to the layer next to it. The first layer is the input
    layer. It will send data to the next layer, referred to as the hidden layer. The
    hidden layer builds a data presentation, and it is then shipped to the third layer.
    The third layer is the output layer; its function is to send results.


    The restricted Boltzmann machine topology is a bit different from that. It has
    an input layer and a hidden layer, but these layers are also connected to each
    other. So, instead of data going from one layer to the next in a chain, the layers
    are interconnected, and information can travel back and forth in a cyclical manner.
    The architecture gives the Boltzmann machine a stochastic recurrent neural network.
    This makes it a generative model; this means it models its inputs instead of just
    using observed ones.


    Choosing the right neural network topology is all about matching your problem
    to the typology that will give you the results you want. There are always advantages
    or disadvantages to all architectures. That is because, while some learning processes
    are compatible with other networks, some will be mutually exclusive. Thinking
    carefully about what each neuralnetwork structure can do for you is important
    when deciding which to use.


    Learning processes should iteratively improve functions across the model toyield
    the most precise results. Integral to this process are performance measures. In
    supervised machine learning, performance'
  - '[PAGE 27]


    measures come in the form of classification error measures. For restricted Boltzmann
    machines we have probability maximization. Probability-increasing measures need
    optimization methods to reduce them.


    The most popular network optimization method is the gradient descent method. Reduction
    of performance measures correlates to the extent of the gradient descent. The
    aim is to reach a point where the error measure is lowest. Remember that the learning
    rate of the algorithm is closely linked to the value of the performance measure.


    Now that you understand network topology, let’s move ahead to the restricted Boltzmann
    machine.'
- md: "## THE RESTRICTED BOLTZMANN MACHINE\n\nAs we already established, the Boltzmann\
    \ machine is a stochastic, recurrent neural network where all neural nodes are\
    \ interconnected, allowing outputs to constantly change. Boltzmann machines use\
    \ models based on energy. That means, in the Boltzmann machine, there is an energy\
    \ function that attaches an energy value to every network configuration. Energy\
    \ is the Boltzmann machine’s performance measure; it is used to update the network’s\
    \ stored parameters. The aim is to reduce the network’s free energy.\n\nThe Boltzmann\
    \ machine’s disadvantage comes when dealing with complex machine learning problems.\
    \ That is because it has a scaling issue; the more nodes it has, the higher the\
    \ computing time. If that goes on, we’ll reach a point where the network’s free\
    \ energy cannot be processed. The only way to stop this from happening is by changing\
    \ the network's architecture and training process.\n\n### Topology\n\nThe network's\
    \ efficiency can be improved by restricting connections between all nodes in the\
    \ network. Although this is a big architectural change, it solves our problems.\n\
    \nYou begin by preventing connections between nodes in the same layer. Then remove\
    \ communication between layers that are not next to each other. In fact this is\
    \ what is meant by the restricted Boltzmann machine. When restricting connectivity,\
    \ independence is observed between visible and hidden layers, minimizing weaknesses.\n\
    \n### Training\n\nAs we have mentioned, the more nodes that are added to Boltzmann\
    \ machines, the longer training time will take because of scaling issues.\n\n\
    The most popular training method for Boltzmann machines is the persistent contrastive\
    \ divergence (PCD). PCD allows us to determine the gradient of the energy function.\n\
    \nThe algorithm has two phases: positive and negative. The positive phase lowers\
    \ the energy value by increasing the training set’s probability, while the negative\
    \ phase determines the negative phase gradient and decreases probability by sampling.\
    \ The negative phase uses a type of sampling known as Gibbs sampling.\n\nSome\
    \ of you might wonder if we really need a PCD algorithm. You might ask yourself\
    \ why we don’t use gradient descent instead, just like we did before. It’s about\
    \ the disadvantage of the Boltzmann machine. Depending on the number of nodes,\
    \ calculating free energy gobbles up a lot of computing power. Our goal is to\
    \ reduce a function that has an unknowable value. The PCD algorithm happens to\
    \ be good at that. It gives us a method for calculating the energy gradient, allowing\
    \ us to make the best estimation of the free energy value that will be viable\
    \ to compute.\n\n### Boltzmann Machine Application\n\nNow that you have the understanding\
    \ of the basics of or the process behind the Boltzmann machine algorithm, we can\
    \ work with some code.\n\nWe will use the MNIST handwritten digit dataset. The\
    \ code will prepare the restricted Boltzmann machine algorithm. We will do this\
    \ by creating its class, setting up parameters, layers, bias vectors and weight\
    \ matrix. Then we will create a connect function which will control communication\
    \ between layers. Then we will prepare functions that handle parameter updates.\
    \ Lastly, we will implement the PCD algorithm to optimize the process and reduce\
    \ training time. Let’s not waste any time and jump straight into it:\n\n```python\n\
    class RBM(object):\n    def __init__(\n        self,\n        input=None,\n  \
    \      n_visible=784,\n        n_hidden=500,\n        W=None,\n        hbias=None,\n\
    \        vbias=None,\n        numpy_rng=None,\n        theano_rng=None\n    ):\n\
    ```\n\nWe begin by creating the RBM object and defining its parameters. “n_visible”\
    \ stands for the number of visible neural network nodes, and “n_hidden” stands\
    \ for hidden nodes. Then we added optional deep belief network parameters like\
    \ “W,” “hbias,” and “vbias”. They will be used in topologies where the weight\
    \ matrix is shared within the network. With the Boltzmann machine class defined,\
    \ let’s work on parameters:\n\n```python\nself.n_visible = n_visible\nself.n_hidden\
    \ = n_hidden\nif numpy_rng is None:\n    numpy_rng = numpy.random.RandomState(1234)\n\
    if theano_rng is None:\n    theano_rng = RandomStreams(numpy_rng.randint(2 **\
    \ 30))\n```\n\nWe’ve made random number generators and defined hidden and visible\
    \ nodes. Let’s continue:\n\n```python\nif W is None:\n    initial_W = numpy.asarray(\n\
    \        numpy_rng.uniform(\n            low=-4 * numpy.sqrt(6. / (n_hidden +\
    \ n_visible)),\n            high=4 * numpy.sqrt(6. / (n_hidden + n_visible)),\n\
    \            size=(n_visible, n_hidden)\n        ),\n        dtype=theano.config.floatX\n\
    \    )\n```\n\nWe begin by changing the data type of “W” so the GPU can run it.\
    \ Next “theano.shared” is defined so the variable's storage can be shared among\
    \ the functions it is featured in. In this instance the weight vector and bias\
    \ variables are the ones that will be shared. The next bit of code enables the\
    \ sharing between segments of the network:\n\n```python\nW = theano.shared(value=initial_W,\
    \ name='W', borrow=True)\nif hbias is None:\n    hbias = theano.shared(\n    \
    \    value=numpy.zeros(n_hidden, dtype=theano.config.floatX),\n        name='hbias',\n\
    \        borrow=True\n    )\nif vbias is None:\n    vbias = theano.shared(\n \
    \       value=numpy.zeros(n_visible, dtype=theano.config.floatX),\n        name='vbias',\n\
    \        borrow=True\n    )\n```\n\nThe next step is to compute the input layer:\n\
    \n```python\nself.input = input\nif not input:\n    self.input = T.matrix('input')\n\
    self.W = W\nself.hbias = hbias\nself.vbias = vbias\nself.theano_rng = theano_rng\n\
    self.params = [self.W, self.hbias, self.vbias]\n```\n\nThen we create a symbolic\
    \ graph. To do that we define the necessary functions that will deal with interlayer\
    \ propagation and activation. Let's look at them in more detail:\n\n```python\n\
    def propup(self, vis):\n    pre_sigmoid_activation = T.dot(vis, self.W) + self.hbias\n\
    \    return [pre_sigmoid_activation, T.nnet.sigmoid(pre_sigmoid_activation)]\n\
    \ndef propdown(self, hid):\n    pre_sigmoid_activation = T.dot(hid, self.W.T)\
    \ + self.vbias\n    return [pre_sigmoid_activation, T.nnet.sigmoid(pre_sigmoid_activation)]\n\
    ```\n\nAs shown, we have defined the first function so we can pass the activation\
    \ of the visible units upward to the hidden units. That allows the hidden units\
    \ to process their activation on a sample belonging to a visible unit. The second\
    \ function performs the same task but downwards instead of upwards because we\
    \ have data activation on the visible layer and send unit activations from the\
    \ hidden layer.\n\n```python\ndef sample_h_given_v(self, v0_sample):\n    pre_sigmoid_h1,\
    \ h1_mean = self.propup(v0_sample)\n    h1_sample = self.theano_rng.binomial(\n\
    \        size=h1_mean.shape, n=1, p=h1_mean, dtype=theano.config.floatX\n    )\n\
    \    return [pre_sigmoid_h1, h1_mean, h1_sample]\n```\n\nWe have sampled from\
    \ the hidden layer. Now let’s do the same with the visible layer:\n\n```python\n\
    def sample_v_given_h(self, h0_sample):\n    pre_sigmoid_v1, v1_mean = self.propdown(h0_sample)\n\
    \    v1_sample = self.theano_rng.binomial(\n        size=v1_mean.shape, n=1, p=v1_mean,\
    \ dtype=theano.config.floatX\n    )\n    return [pre_sigmoid_v1, v1_mean, v1_sample]\n\
    ```\n\nNow that the connection functions are added, we can implement the Gibbs\
    \ sampling we talked about:\n\n```python\ndef gibbs_hvh(self, h0_sample):\n  \
    \  pre_sigmoid_v1, v1_mean, v1_sample = self.sample_v_given_h(h0_sample)\n   \
    \ pre_sigmoid_h1, h1_mean, h1_sample = self.sample_h_given_v(v1_sample)\n    return\
    \ [\n        pre_sigmoid_v1, v1_mean, v1_sample,\n        pre_sigmoid_h1, h1_mean,\
    \ h1_sample\n    ]\n```\n\nGibbs sampling should also be applied to the visible\
    \ sample from it:\n\n```python\ndef gibbs_vhv(self, v0_sample):\n    pre_sigmoid_h1,\
    \ h1_mean, h1_sample = self.sample_h_given_v(v0_sample)\n    pre_sigmoid_v1, v1_mean,\
    \ v1_sample = self.sample_v_given_h(h1_sample)\n    return [\n        pre_sigmoid_h1,\
    \ h1_mean, h1_sample,\n        pre_sigmoid_v1, v1_mean, v1_sample\n    ]\n```\n\
    \nLet’s take a moment to go over what we have so far and talk about what we will\
    \ do next. We have prepared nodes, layers and put in place communication between\
    \ them. Lastly, we added Gibbs sampling. But we are not done.\n\nNext, we need\
    \ to compute free energy. That means we should use the Gibbs sampling code to\
    \ implement the PCD algorithm and assign a counting parameter to it (k = 1) so\
    \ we can measure the gradient descent. Lastly, we need a way of tracking the success\
    \ and progress rate of the RBM. Below we implement our code, starting with the\
    \ calculation of free energy:\n\n```python\ndef free_energy(self, v_sample):\n\
    \    wx_b = T.dot(v_sample, self.W) + self.hbias\n    vbias_term = T.dot(v_sample,\
    \ self.vbias)\n    hidden_term = T.sum(T.log(1 + T.exp(wx_b)), axis=1)\n    return\
    \ -hidden_term - vbias_term\n```\n\nNow we can implement the PCD algorithm. We\
    \ will have a learning rate parameter. The learning rate parameter is an"
  mdcn: "## 受限玻尔兹曼机\n\n正如我们已经确立的，玻尔兹曼机是一种随机、循环的神经网络，其中所有神经节点相互连接，允许输出不断变化。玻尔兹曼机使用基于能量的模型。这意味着，在玻尔兹曼机中，存在一个能量函数，它为每个网络配置赋予一个能量值。能量是玻尔兹曼机的性能度量；它用于更新网络的存储参数。目标是降低网络的自由能。\n\
    \n玻尔兹曼机的缺点在于处理复杂的机器学习问题时显现。这是因为它存在扩展性问题；节点越多，计算时间越长。如果这种情况持续下去，我们将达到一个点，即网络的自由能无法被处理。阻止这种情况发生的唯一方法是改变网络的架构和训练过程。\n\
    \n### 拓扑结构\n\n通过限制网络中所有节点之间的连接，可以提高网络的效率。尽管这是一个重大的架构改变，但它解决了我们的问题。\n\n你首先阻止同一层内节点之间的连接。然后移除不相邻层之间的通信。事实上，这就是受限玻尔兹曼机的含义。在限制连接性时，可见层和隐藏层之间观察到独立性，从而最小化了弱点。\n\
    \n### 训练\n\n正如我们所提到的，向玻尔兹曼机添加的节点越多，由于扩展性问题，训练时间就越长。\n\n玻尔兹曼机最流行的训练方法是持续对比散度（PCD）。PCD允许我们确定能量函数的梯度。\n\
    \n该算法有两个阶段：正阶段和负阶段。正阶段通过增加训练集的概率来降低能量值，而负阶段确定负阶段梯度并通过采样降低概率。负阶段使用一种称为吉布斯采样的采样类型。\n\
    \n你们中的一些人可能想知道我们是否真的需要PCD算法。你可能会问自己，为什么我们不使用梯度下降，就像我们之前做的那样。这与玻尔兹曼机的缺点有关。根据节点的数量，计算自由能会消耗大量的计算能力。我们的目标是减少一个具有不可知值的函数。PCD算法恰好擅长于此。它为我们提供了一种计算能量梯度的方法，使我们能够对自由能值做出最佳估计，该估计值在计算上是可行的。\n\
    \n### 玻尔兹曼机应用\n\n既然你已经理解了玻尔兹曼机算法的基础或其背后的过程，我们就可以处理一些代码了。\n\n我们将使用MNIST手写数字数据集。代码将准备受限玻尔兹曼机算法。我们将通过创建其类、设置参数、层、偏置向量和权重矩阵来实现这一点。然后我们将创建一个连接函数，该函数将控制层之间的通信。然后我们将准备处理参数更新的函数。最后，我们将实现PCD算法来优化过程并减少训练时间。让我们不要浪费任何时间，直接进入：\n\
    \n```python\nclass RBM(object):\n    def __init__(\n        self,\n        input=None,\n\
    \        n_visible=784,\n        n_hidden=500,\n        W=None,\n        hbias=None,\n\
    \        vbias=None,\n        numpy_rng=None,\n        theano_rng=None\n    ):\n\
    ```\n\n我们首先创建RBM对象并定义其参数。“n_visible”代表可见神经网络节点的数量，“n_hidden”代表隐藏节点的数量。然后我们添加了可选的深度信念网络参数，如“W”、“hbias”和“vbias”。它们将用于权重矩阵在网络内共享的拓扑结构中。定义了玻尔兹曼机类后，让我们处理参数：\n\
    \n```python\nself.n_visible = n_visible\nself.n_hidden = n_hidden\nif numpy_rng\
    \ is None:\n    numpy_rng = numpy.random.RandomState(1234)\nif theano_rng is None:\n\
    \    theano_rng = RandomStreams(numpy_rng.randint(2 ** 30))\n```\n\n我们创建了随机数生成器并定义了隐藏和可见节点。让我们继续：\n\
    \n```python\nif W is None:\n    initial_W = numpy.asarray(\n        numpy_rng.uniform(\n\
    \            low=-4 * numpy.sqrt(6. / (n_hidden + n_visible)),\n            high=4\
    \ * numpy.sqrt(6. / (n_hidden + n_visible)),\n            size=(n_visible, n_hidden)\n\
    \        ),\n        dtype=theano.config.floatX\n    )\n```\n\n我们首先更改“W”的数据类型，以便GPU可以运行它。接下来定义“theano.shared”，以便变量的存储可以在其出现的函数之间共享。在这个例子中，权重向量和偏置变量是将被共享的变量。下一段代码启用了网络各部分之间的共享：\n\
    \n```python\nW = theano.shared(value=initial_W, name='W', borrow=True)\nif hbias\
    \ is None:\n    hbias = theano.shared(\n        value=numpy.zeros(n_hidden, dtype=theano.config.floatX),\n\
    \        name='hbias',\n        borrow=True\n    )\nif vbias is None:\n    vbias\
    \ = theano.shared(\n        value=numpy.zeros(n_visible, dtype=theano.config.floatX),\n\
    \        name='vbias',\n        borrow=True\n    )\n```\n\n下一步是计算输入层：\n\n```python\n\
    self.input = input\nif not input:\n    self.input = T.matrix('input')\nself.W\
    \ = W\nself.hbias = hbias\nself.vbias = vbias\nself.theano_rng = theano_rng\n\
    self.params = [self.W, self.hbias, self.vbias]\n```\n\n然后我们创建一个符号图。为此，我们定义必要的函数来处理层间传播和激活。让我们更详细地看看它们：\n\
    \n```python\ndef propup(self, vis):\n    pre_sigmoid_activation = T.dot(vis, self.W)\
    \ + self.hbias\n    return [pre_sigmoid_activation, T.nnet.sigmoid(pre_sigmoid_activation)]\n\
    \ndef propdown(self, hid):\n    pre_sigmoid_activation = T.dot(hid, self.W.T)\
    \ + self.vbias\n    return [pre_sigmoid_activation, T.nnet.sigmoid(pre_sigmoid_activation)]\n\
    ```\n\n如图所示，我们定义了第一个函数，以便可以将可见单元的激活向上传递给隐藏单元。这允许隐藏单元处理其对属于可见单元的样本的激活。第二个函数执行相同的任务，但是向下而不是向上，因为我们有可见层上的数据激活，并从隐藏层发送单元激活。\n\
    \n```python\ndef sample_h_given_v(self, v0_sample):\n    pre_sigmoid_h1, h1_mean\
    \ = self.propup(v0_sample)\n    h1_sample = self.theano_rng.binomial(\n      \
    \  size=h1_mean.shape, n=1, p=h1_mean, dtype=theano.config.floatX\n    )\n   \
    \ return [pre_sigmoid_h1, h1_mean, h1_sample]\n```\n\n我们已经从隐藏层进行了采样。现在让我们对可见层做同样的事情：\n\
    \n```python\ndef sample_v_given_h(self, h0_sample):\n    pre_sigmoid_v1, v1_mean\
    \ = self.propdown(h0_sample)\n    v1_sample = self.theano_rng.binomial(\n    \
    \    size=v1_mean.shape, n=1, p=v1_mean, dtype=theano.config.floatX\n    )\n \
    \   return [pre_sigmoid_v1, v1_mean, v1_sample]\n```\n\n现在连接函数已经添加，我们可以实现我们讨论过的吉布斯采样：\n\
    \n```python\ndef gibbs_hvh(self, h0_sample):\n    pre_sigmoid_v1, v1_mean, v1_sample\
    \ = self.sample_v_given_h(h0_sample)\n    pre_sigmoid_h1, h1_mean, h1_sample =\
    \ self.sample_h_given_v(v1_sample)\n    return [\n        pre_sigmoid_v1, v1_mean,\
    \ v1_sample,\n        pre_sigmoid_h1, h1_mean, h1_sample\n    ]\n```\n\n吉布斯采样也应应用于从中得到的可见样本：\n\
    \n```python\ndef gibbs_vhv(self, v0_sample):\n    pre_sigmoid_h1, h1_mean, h1_sample\
    \ = self.sample_h_given_v(v0_sample)\n    pre_sigmoid_v1, v1_mean, v1_sample =\
    \ self.sample_v_given_h(h1_sample)\n    return [\n        pre_sigmoid_h1, h1_mean,\

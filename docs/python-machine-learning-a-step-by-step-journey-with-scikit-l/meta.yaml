    # Denoising Autoencoders


    Some problems are complex for a typical autoencoder to handle. That is because,
    sometimes, when handling high-dimensionality distributions, the encoding ends
    up as a clone of the input. This is known as the overcomplete autoencoder. Examples
    that will fit this are things like speech data. Speech data is difficult, and
    classifying it needs a hidden layer with high dimensionality and complex encoding.


    This is one of the reasons why in machine learning you need to pay attention to
    the dimensionality of hidden layers. This aspect can have a serious impact on
    the learning process, and your results might not end up being the ones you expect.
    If we have a scenario that involves a complex input, but the hidden layer doesn''t
    have enough nodes to process all that data, we end up with a failing neural net.
    Training sometimes requires more nodes when dealing with difficult distributions.


    Overcomplete autoencoders can achieve a low error representation, but configuring
    them so that they do is difficult. Optimizing that makes things even more difficult.
    Given that, it''s best to block the overcomplete encoder''s ability to learn the
    identify function. There are multiple ways to do this, and all of them won''t
    stop us from gaining useful data.


    One way is adding noise to the input data. It sounds bad because in most circumstances
    we want to avoid noise. But adding noisy data is how the autoencoder will go through
    the training processing and learn statistical precision instead of identity. Noisy
    data can be added using the dropout method. The dropout method is done by'

    \ score that the cluster centers aren’t well resolved. The v-measure and ARI are\
    \ also not very impressive.\n\nWe can say that these results need to be improved.\
    \ We can get better results by applying PCA on top of the k-means clustering.\
    \ When we reduce the dataset’s dimensionality, we should get better results. Let’s\

    for this reason.


    Overfitting-spotting techniques are extremely useful in dealing with errors and
    risk factors. They are commonly known as validation methods. The basis of these
    methods involves two distinct sets of data. One set creates the model, and the
    other tests it. A good example of the validation technique is independent validation.
    It’s the simplest one because it involves just waiting to learn about the accuracy
    of our prediction. However, this method isn’t always possible.


    Since independent validation is not always possible, we can save a data subset
    from the sample. This technique is known as sample splitting. Sample splitting
    is used in many validation methods. Since the majority of machine learning already
    involves training, testing and validation datasets, what is discussed now is a
    multilayered validation.


    If two validation techniques do not work, there''s a third that focuses on resampling.
    The method involves subsets of data repeatedly used for data validation.



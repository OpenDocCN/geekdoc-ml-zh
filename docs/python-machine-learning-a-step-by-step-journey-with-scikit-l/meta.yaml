    In the sixth and seventh chapter, we looked at feature engineering techniques
    and other related topics. We looked at how they are used with text-based data.
    We learned how to clean text-based data and prepare it for analysis. We learned
    about the importance of cleaning text data because it isoften filled with misspellings,

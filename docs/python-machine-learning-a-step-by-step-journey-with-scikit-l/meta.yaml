  md: '# CHAPTER 8: ENSEMBLE METHODS


    ![](img/f93bd3c453531f8694c8030975436eb1_120_0.png)


    In this chapter, we will focus on current techniques and how to enhance them using
    ensemble methods. Ensemble methods are exactly like how they sound. These methods
    are techniques for combining different models. Ensemble methods are often used
    by data scientists and machine learning enthusiasts. They are playing a key role
    in finding solutions to various problems. They help boost performance and much
    more. We look at a few ensemble techniques and look at how they are used in the
    real-world.


    Let’s look at ensembles in machine learning. There are two components involved
    in them. The first part is a group of models.'
  merge: -1
  pgno: 120
- img_proc: true
  md: 'The second is a set of rules that tell us how the results will be gathered
    from models and united into one output. Ensembles allow us to build more than
    one solution to a problem and then put together the results. It takes the best
    from every component. That means the solution we come to is more noise resistant,
    allowing for better training processes. This translates to fewer overfitting problems
    and training errors.


    Ensembles have had a big impact on machine learning techniques and provided us
    with more flexibility than we have ever had. Because of these changes, we can
    now test fragments of a solution or solve localized issues without overhauling
    the entire model. Below are types of ensemble methods:


    +   1. **Stacking ensemble s:** Weighted output of several classifiers becomes
    input for the next model.

    2. **Averaging ensembles:** Models are built next to each other, and averaging
    methods are used to get the united estimator.

    3. **Boosting ensembles :** Models are built in sequence, and each new addition
    works on improving the score of the united estimator.


    Let’s discuss each in a little more detail.'
  merge: -1
  pgno: 121
- img_proc: true
  md: '# AVERAGING ENSEMBLES


    Averaging ensembles are used in a wide array of applications like audio processing
    and statistical modeling. They are almost always interpreted the same way as reproduced
    cases of certain systems. The idea is that the average values within a given system,
    and variances between cases, are values of the most importance to the entire system.


    In machine learning, an averaging ensemble is a model collection training from
    the same dataset. Results are then aggregated. There are a few advantages to this.
    First, the ensemble reduces how much the model performances vary. A popular set
    of averaging ensembles is called random forests.


    Let’s look at it a little.


    # Working with Random Forests


    The random forest algorithm is loved by data scientists because it gives great
    results more often than not, and it is very simple. It’s used to make side-by-side
    decision tree classifiers. That means it can be used for classification operations
    and regression.


    It creates a random “forest” made up of an ensemble of decision trees. Decision
    trees are visual representations of decisions or decision making, often used in
    machine learning and data mining


    The forest has diverse decision stress, because there are, at the very least,
    2 sources of randomness added to the development of a classifier. Every tree is
    made from data sampled via replacement from the training dataset. The building
    process of a decision tree'
  merge: -1
  pgno: 122
- img_proc: true

- md: "## Backoff Tagging\n\nIn some cases, the tagger won't be reliable. This happens\
    \ when we are working with limited trained data. The only solution we have is\
    \ to make a structure that allows multiple taggers to work at the same time. To\
    \ do this we have to differentiate between a subtagger and backoff tagger. A subtagger\
    \ is very much like a sequential tagger. However, in cases where the subtagger\
    \ cannot give a specific token a tag, the backoff tagger will take over. The backoff\
    \ tagger will combine results found by the rest of the subtaggers in the structure.\
    \ This applies as long as we are working with a basic implementation. The subtaggers\
    \ will be polled in order, accepting the first tag that doesn't return a null\
    \ value. In cases where all subtaggers return null values for a given token, the\
    \ token will be classified as “none” by the backoff tagger.\n\nBackoff taggers\
    \ are often used with subtaggers belonging to different categories. That allows\
    \ us to take full advantage of all the different tagger types. In some cases,\
    \ we can even have backoff taggers that refer to other backoff taggers of a much\
    \ more complex structure. Let's work with a trigram tagger that will use bigram\
    \ tagger as a backoff tagger. We will also add a unigram tagger in case others\
    \ don't work. Below is how the code would look:\n\n```python\nbrown_a = nltk.corpus.brown.tagged_sents(categories='a')\n\
    tagger = None\nfor n in range(1, 4):\n    tagger = NgramTagger(n, brown_a, backoff=tagger)\n\
    \    words = tagger.tag(words)\n```\n\nJust like that we have cleaned our text.\
    \ Let’s move on to all the other work we have to do to improve our text.\n\n##\
    \ BUILDING FEATURES\n\nTo make our text useful, we have to create certain features.\
    \ Let’s explore this by looking at natural language processing techniques like\
    \ stemming and lemmatizing.\n\n## Stemming and Lemmatizing\n\nThe biggest problem\
    \ with text-based datasets is that there are many word arrangements for a word\
    \ stem. To understand this, think of a simple word like travel. The word travel\
    \ is the root word that other words like “travelling” and “traveler” stem from.\
    \ In that way “travel” is the stem. What we need to do is to reduce word shapes\
    \ into stems. To do this we have added stemmers. The idea is to parse words as\
    \ strings of vowels and consonants following several rules. When that is done,\
    \ we apply lemmatization. We will also describe the process of working with a\
    \ “porter stemmer.”\n\nPorter stemmers simplify suffixes, which means we will\
    \ reduce suffixes. For instance, we can decide to eliminate plural suffixes, then\
    \ past participles suffixes and so on. What happens in some situations when we\
    \ do this is that we end up with a word that is incomplete. For instance, we may\
    \ end up with “ceas” instead of “cease.” That is easily corrected by adding an\
    \ “e.” Let’s implement a porter stemmer so you see how it works:\n\n```python\n\
    from nltk.stem import PorterStemmer\nstemmer = PorterStemmer()\nstemmer.stem(words)\n\
    ```\n\nThe output will be the base/root of the word, although in some cases you\
    \ will find yourself with words that don’t exist like “glanci” instead of “glance.”\
    \ That needs to be corrected. To correct it we need to use the lemmatization technique.\
    \ Lemmatization determines word stems and roots through a normalization process.\
    \ Remember, the stem doesn’t have to be a real word either.\n\nThe result of lemmatization\
    \ is called lemma; it must produce real words. Lemmatization can even cut a synonym\
    \ to its base form. For example, porter stemming can give us “brochure” from “brochures,”\
    \ but it will be clueless when it comes to a synonym like “booklet.” Lemmatization,\
    \ on the other hand, can take both examples, “brochures” and “booklets,” and reduce\
    \ them to “brochure.” Let’s see how this method works when we assign our part\
    \ of speech (POS) tagger, called the grammatical tagger, to all tokens.\n\n```python\n\
    from nltk.stem import PorterStemmer, WordNetLemmatizer\nlemmatizer = WordNetLemmatizer()\n\
    words = lemmatizer.lemmatize(words, pos='pos')\n```\n\nHere’s how the result should\
    \ look:\n\n**Text before lemmatization** - The cries of laughter that you heard\
    \ were caused by a surprising memory.\n\n**Text after lemmatization** - [‘The’,\

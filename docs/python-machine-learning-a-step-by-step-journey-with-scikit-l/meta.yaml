- img_proc: true
  md: 'in the first several iterations and then escalates. To help, we can have a
    component in the prediction loop that will record the classification accuracy.
    This will allow us to find out how the accuracy varies during iterations. We will
    know what is wrong. Then we can start coming up with solutions to fix the error.
    If we think we have enough labeled data, we can have a diversified set of labeled
    data. You might consider using all labeled data, but when you do this, you risk
    overfitting (which we will discuss in another chapter). The best option is applying
    a multitude of subsets of the datasets and training multiple self- learning model
    instances on it. This will help you ascertain the impact ofthe input data on the
    self-learning algorithm.


    There are other options, since relying on a solution that uses quantity to fight
    the problem isn’t always the best. The issues can also be tackled with quality
    improvements. We can build a diverse subset of our labeled data by selection.
    We won’t have a limit representing the minimum amount needed for the self-learning
    implementation to begin on a number of cases. Remember, in theory, you can always
    work with just one labeled case for a class; it’s just that it is better if the
    training process involves a lot of labeled data.


    The second popular type of error that is often encountered when working with self-learning
    algorithms comprises biased selection. It is easy to assume that we are dealing
    with slight bias and that it can be ignored. But bias matters, since it can cause

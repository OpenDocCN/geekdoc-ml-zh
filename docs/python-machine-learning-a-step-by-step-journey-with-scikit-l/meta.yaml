    labelling the data to begin with. This is clearly a problem. You can do the tagging
    manually, but as we have already said, it will take a significant amount of time,
    and there is a high chance of some errors creeping in. Imagine you had to organize
    and process medical data. How difficult would it be to do that without human error?
    It would be very hard. This is why semi-supervised learning is so useful.


    We come up with semi-supervised learning capabilities by working with labeled
    and unlabeled data, together or separately. There is a category of learning methods
    that sit between supervised and unsupervised learning. They are called semi-supervised
    learning. There are a bunch of methods that belong in this category, like active
    learning techniques and transductive learning techniques. What these methods have
    in common is that they save a set of test data from the training phase, to be
    performed later.


    In transductive learning, we don’t have a testing process because it creates labels

    # **Punctuation and Tokenization**


    Tokenization is a method of building sets of tokens from a chain of text. Most
    tokens will be words, and some will be emoticons and or punctuation marks.


    We are going to use the “re” module for this process. The module allows us to
    run operations on regular expressions. An example of an operation is the substring
    replacement. It comprises multiple operations performed on the input text. It
    will try replacing “dirty” text with tokens. In the example below we convert the
    ‘ ’ symbol into a token.


    ```

    text = re.sub(r''[\w\-][\w\-\.]+ [\w\-][\w\-\.]+[a-zA-Z]{1,4}'', ''_EM'', text)

    ```


    This method can also be used to remove web addresses. Here’s how you would do
    it:


    ```

    text = re.sub(r''\w+:\/\/\S+'', r''_U'', text)

    ```


    We have replaced the “ ” using the “_EMO” token. We also removed URLs using the
    “_U” token. We can also remove extra spaces and any punctuation marks we don’t
    want. We will solve the issue of multiple characters. Punctuation is encoded in
    “_BQ” and “BX.” The tags are longer because we want to differentiate them from
    their simplified versions “_Q” and “_X.” The _Q represents a question mark while
    the -X stands for the exclamation mark. Next, we apply regular expressions to
    reduce the number of letters. For example, we can define a string to hold a maximum
    of two characters, limiting the number of combinations, and tokenize it using
    _EL token. That means we will have to manage'

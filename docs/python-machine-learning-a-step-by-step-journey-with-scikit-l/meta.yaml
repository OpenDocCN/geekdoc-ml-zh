    \ who don’t know, pooling layers are often put between convolutional layers to\
    \ reduce parameters and computation in the network.\n\nThose layers are partially\
    \ connected, while the MLP is wholly connected. Each layer is made up of channels,\
    \ allowing us to build powerful filters. The pool layers are there to add dimensionality\
    \ reduction so our output is equal to the input. There's a fully connected layer\
    \ where all computations are communicated towards. The diagram below illustrates\
    \ the architecture:\n\n![](img/f93bd3c453531f8694c8030975436eb1_53_0.png)\n\n\
    This implementation works great for certain applications but works not so well\
    \ for others. This architecture will produce abysmal results the more challenging\
    \ a task is. There’s an alternative LeNet architecture called GoogleLeNet.\n\n\
    It is also known as Google’s Inception network. Its architecture was made for\
    \ handling challenging image data. What we mean by challenging is photos and videos\

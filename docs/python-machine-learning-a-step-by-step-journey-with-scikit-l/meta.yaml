    The score represents the proportion of cases labeled correctly. We can conclude
    that random forests and randomized trees will give us very strong results. In
    both cases, we find scores above 0.9.


    There is a disadvantage. When working with random forests, it is difficult to
    see the effectiveness of an implementation. The difficulty increases with the
    size of the forest. Small forests and individual forests are simpler to dealwith.


    Another disadvantage is that the algorithm might need an extended computing time
    to process real-time predictions. Random forests are quick when training, but
    they are slow when producing predictions once the training phase is over. To make
    things worse, the more accuracy we want, the more trees we will have to add.'

- md: "## Punctuation and Tokenization\n\nTokenization is a method of building sets\
    \ of tokens from a chain of text. Most tokens will be words, and some will be\
    \ emoticons and or punctuation marks.\n\nWe are going to use the “re” module for\
    \ this process. The module allows us to run operations on regular expressions.\
    \ An example of an operation is the substring replacement. It comprises multiple\
    \ operations performed on the input text. It will try replacing “dirty” text with\
    \ tokens. In the example below we convert the ‘ ’ symbol into a token.\n\n```\n\
    text = re.sub(r'[\\w\\-][\\w\\-\\.]+ [\\w\\-][\\w\\-\\.]+[a-zA-Z]{1,4}', '_EM',\
    \ text)\n```\n\nThis method can also be used to remove web addresses. Here’s how\
    \ you would do it:\n\n```\ntext = re.sub(r'\\w+:\\/\\/\\S+', r'_U', text)\n```\n\
    \nWe have replaced the “ ” using the “_EMO” token. We also removed URLs using\
    \ the “_U” token. We can also remove extra spaces and any punctuation marks we\
    \ don’t want. We will solve the issue of multiple characters. Punctuation is encoded\
    \ in “_BQ” and “BX.” The tags are longer because we want to differentiate them\
    \ from their simplified versions “_Q” and “_X.” The _Q represents a question mark\
    \ while the -X stands for the exclamation mark. Next, we apply regular expressions\
    \ to reduce the number of letters. For example, we can define a string to hold\
    \ a maximum of two characters, limiting the number of combinations, and tokenize\
    \ it using _EL token. That means we will have to manage a smaller gamut of combinations.\
    \ Here's how we'd handle whitespaces:\n\n```\ntext = text.replace('\"', ' ')\n\
    text = text.replace('\\', ' ')\ntext = text.replace('_', ' ')\ntext = text.replace('-',\
    \ ' ')\ntext = text.replace('\\n', ' ')\ntext = text.replace('\\n', ' ')\ntext\
    \ = text.replace('\\', ' ')\ntext = re.sub(' +', ' ', text)\ntext = text.replace('\\\
    ', ' ')\n```\n\nHere's how we'd handle punctuation problems:\n\n```\ntext = re.sub(r'([^!?])(\\\
    ?{2,})(\\Z|[^!?])', r'\\1 _BQ\\n\\3', text)\ntext = re.sub(r'([^.])(\\.{2,})',\
    \ r'\\1 _SS\\n', text)\ntext = re.sub(r'([^!?])(\\?|!){2,}(\\Z|[^!?])', r'\\1\
    \ _BX\\n\\3', text)\ntext = re.sub(r'([^!?])\\?(\\Z|[^!?])', r'\\1 _Q\\n\\2',\
    \ text)\ntext = re.sub(r'([^!?])!(\\Z|[^!?])', r'\\1 _X\\n\\2', text)\ntext =\
    \ re.sub(r'([a-zA-Z])\\1\\1+(\\w*)', r'\\1\\1\\2 _EL', text)\ntext = re.sub(r'([a-zA-Z])\\\
    1\\1+(\\w*)', r'\\1\\1\\2 _EL', text)\ntext = re.sub(r'(\\w+)\\.(\\w+)', r'\\\
    1\\2', text)\n```\n\n```\ntext = re.sub(r'[^a-zA-Z]', '', text)\n```\n\nNew tokens\
    \ should be defined. For instance, the “_SW” stands for swearing. We will use\
    \ regular expressions to tokenize emoticons, especially smiley faces. We will\
    \ do that by declaring four categories for them: there will be big smiley faces\
    \ (_BS); small smiley faces (_S); big sad faces (_BF); and small sad faces(_F).\
    \ Here’s show it looks in code:\n\n```\ntext = re.sub(r'([#%&\\*\\$]{2,})(\\w*)',\
    \ r'\\1\\2 _SW', text)\ntext = re.sub(r' [8x;:=]-?(?:\\)|\\}|\\|>){2,}', r' _BS',\
    \ text)\ntext = re.sub(r' (?:[;:=]-?[\\)\\}\\|d>])|(?:<3)', r' _S', text)\ntext\
    \ = re.sub(r' [x;:=]-?(?:\\(\\|\\|\\|\\/\\|\\|<){2,}', r' _BF', text)\ntext =\
    \ re.sub(r' [x;:=]-?[\\(\\|\\|\\|\\/\\|\\|<]', r' _F', text)\n```\n\nLet’s take\
    \ a breather and discuss an important aspect of smileys. Smileys can cause complex\
    \ issues, since they change often. Our example is a bit incomplete because there\
    \ aren’t even any non-ascii emotions being considered. Also, character-driven\
    \ images that form part of a text are difficult to remove because they might end\
    \ up removing some cases in the datasets, which might lead to misleading results.\n\
    \nIn the next step, we perform text division using the “str.split” function. This\
    \ is done so our input is not evaluated as a string but as words instead.\n\n\
    ```\nphrases = re.split(r'[;:\\.()\\n]', text)\nphrases = [re.findall(r'[\\w%\\\
    *&#]+', ph) for ph in phrases]\nphrases = [ph for ph in phrases if ph]\nwords\
    \ = []\n```\n\n```\nfor ph in phrases:\n    words.extend(ph)\n```\n\nHere’s how\
    \ our result should look now:\n\n| ID | Date | Comment |\n|---|---|---|\n| 142\
    \ | 20120422021928Z | [[‘FlipEmote’, ‘why’, ‘aren’t’, ‘you’, ‘ded’, ‘already’]]\
    \ |\n\nWe will look at a sequence of single characters. That is because, on social\
    \ media and other online forums, people sometimes space out letters when they\
    \ use an offensive word without triggering automatic language filters.\n\n```\n\

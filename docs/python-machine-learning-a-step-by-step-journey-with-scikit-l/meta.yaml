- md: '## CHAPTER 3: CONVOLUTIONAL NEURAL NETWORKS


    Convolutional neural networks are one of the most popular artificial neural networks
    because of their ability to process and classify images. These algorithms are
    often used where photo search and image recognition are needed. They are also
    used to digitize text, for language processing and for graphically representing
    audio data. The main purpose is image recognition. This is what brought a lot
    of attention to deep learning. We see CNN algorithms being used in drones, AI-driven
    cars, robotics, medical science and much more. CNNs have advanced science and
    technology.


    CNNs process visual data as tensors. A tensor is a matrix of numbers with additional
    dimensions formed by an array nested within an array. CNNs work with 4D tensors.
    To help explain better, imagine you are looking at a picture. We can deduce the
    height and width of the picture with ease, but what about the depth? Depth is
    the encoded colors: red, green and blue color channels. Convolution is used to
    produce feature maps, which are maps of image details. These exist in a fourth
    dimension. So, our picture is not a two-dimensional object but a four-dimensional
    object.


    The question now is: What is convolution? In math, convolution is measuring how
    much two functions overlap when they pass over each other. CNNs register different
    signals every time they pass a filter over an image. For instance, when mapping
    margins of an image, we can picture the following filters passing over it: horizontal,
    vertical and diagonal.


    Remember, convolution networks don’t process and analyze images in the manner
    RBMs do. CNNs learn by what are known as feature maps; in contrast, RBMs analyze
    the whole image.


    CNNs are inspired by the brain’s visual cortex, which gives people the ability
    to process and analyze visual imagery. The visual cortex has light detecting receptors
    that capture light data in overlapping visual field layers. This is one of reasons
    why image recognition algorithms are popular in artificial intelligence and machine
    learning.


    Facebook uses this technology. It has created DeepFace, a facial recognition system
    that can identify human faces with increasing accuracy. Some even report that
    DeepFace has an accuracy of 97%. In comparison, the FBI’s facial recognition system
    is only 85% accurate. Another exciting application of CNNs is DeepDream, created
    by a Google engineer. DeepDream is used to give images a hallucinogenic look.
    These images are processed through algorithmic pareidolia. Other big tech companies
    like Microsoft and IBM have also used CNNs to develop intelligent software.


    ## UNDERSTANDING THE ARCHITECTURE


    The topology of CNNs is the same as that of a multi-layer perceptron. A multi-layer
    perceptron acyclic graph is constructed with layers made up of a few nodes where
    each layer communicates with the next.


    It’s worth mentioning that this type of a neural net has identical neurons. It’s
    an important difference, because it means we have identical parameters and weight
    values. This makes CNNs super-efficient because fewer values need computing. Another
    important difference is that the nodes have limited communication, meaning the
    inputs are not locally connected to neighboring nodes.


    ### Layers


    Like we’ve mentioned, weights should be shared on the whole layer to avoid unpredictable
    node parameters. We then have a filter made up of four parameters that is applied
    to the layer to create a feature map. Those four filter parameters are known as
    hyper-parameters. Hyper-parameters represent size, depth, stride and zero-padding.


    Size is arrived at by calculating the filter’s surface area. The filter''s size
    will have an impact on the output, making it important to control the output so
    that we have an efficient network. It’s worth noting that sizable filters often
    overlap, but it is not as bad as it sounds, since it can lead to better accuracy
    rates.


    The filter depth is about the nodes we have in a layer, and how many connect in
    the same area around the input. We might be talking about images, but when we
    are discussing depth, we are not referring to any image content. If you have worked
    with any image editing software, you know what color channels are. Color channels
    are needed to describe the content of an image. Our neural nodes are mapped so
    they can see red, green and blue color channels. That is why filter depth is almost
    always set to 3. Increasing it will give us more data about the image and including
    properties that are difficult to learn. Conversely, setting a lower depth will
    give us weak results.


    The third filter parameter is the stride. The stride values give us the space
    between neurons. If we are working with an image and our stride is equal to 1,
    we will set each pixel as the center of the filter. This will result in output
    increase and an increase in layer overlap. In that situation we can increase the
    stride value to minimize overlap; if we do this, the outputs will also be reduced
    in size. Fine tuning is all about aiming for a balance between accuracy and size,
    but that will depend on your aims. In most situations, lower values will be ideal.


    The fourth and final filter parameter will reduce a layer’s output size. Zero-padding
    sets the border values of the receptive field to 0. When it comes to CNNs, receptive
    fields are the input space that have effect over units that are part of the network.
    It’s important to ensure that all areas are covered by the filter before you set
    zero-padding. One of the advantages of a zero-padding setup is being able to adjust
    inputs and outputs so they have an identical size. Making the input and output
    have an equal size is standard practice because it allows us to adjust depth and
    stride parameters efficiently. Without zero-padding, setting up parameters properly
    and improving network performance would be a nightmare. In some cases, the borders
    of a filter might degrade.


    The question is: How should we calibrate all these parameters when setting up
    a network? We have an elegant formula for this. Here it is:


    $$O = \frac{W - F + 2P}{S + 1}$$


    The O stands for the layer’s output, W is for the image size, F for the filter
    size, P for the zero-padding and S for the stride. Remember that the layer’s output
    might not always be a positive integer, and that can potentially lead to issues.
    You can compensate for it by adjusting the stride.


    Now we know a bit about CNN layers and their parameters, let’s learn about what
    convolutional is. Convolutional is a mathematical operator like multiplication
    and addition. It is often used to break down complicated equations into simpler
    forms. It produces a third function after operating on two set functions, resulting
    in a new function that is a derivative of the two original functions.


    In CNNs, we have the input as the first element. When we apply the process to
    an image, it is assigned to the height and width of the image. We’ll have 3-pixel
    matrices for each color channel. The values of the matrix will go from 0 to 255.


    The second component, which consists of a matrix made up of floats, is the convolutional
    kernel. These numbers give the input matrix a filter, and the output is the feature
    map. The filter assesses the inputs and writes the feature map. The main advantage
    of a convolution process like this is that it removes the need for feature engineering.
    We will talk about feature engineering in later chapters. For now, it’s enough
    to know that the feature engineering process is often challenging and demanding.


    ### Training


    CNN learning is very similar to previous processes. For example, MLPs are pre-trained
    using convolution nets and the use of backpropagation for processing the gradient.


    Let’s discuss the steps performed during training. Firstly, we must compute a
    feature map by computing each as a sum of them all convolved with the coinciding
    weight kernel. That step is called the forward pass. Secondly, the gradients are
    calculated by convolving the exchanged weight kernels with the gradients. It’s
    called the backward pass. During the process we should also calculate the loss
    of kernels so we can adjust their weights.


    Remember that the training process is slow, so it takes a while regardless of
    the quality of your hardware.'
  mdcn: '## 第三章：卷积神经网络


    卷积神经网络是最受欢迎的人工神经网络之一，因其能够处理和分类图像。这些算法常用于需要照片搜索和图像识别的场景。它们也被用于文本数字化、语言处理以及音频数据的图形化表示。其主要目的是图像识别。正是这一点让深度学习备受关注。我们看到CNN算法被应用于无人机、AI驱动的汽车、机器人技术、医学科学等诸多领域。CNN推动了科学技术的进步。


    CNN将视觉数据处理为张量。张量是一个数字矩阵，具有由数组嵌套数组形成的额外维度。CNN处理的是4D张量。为了更好地解释，想象你正在看一张图片。我们可以轻松推断出图片的高度和宽度，但深度呢？深度是编码的颜色：红色、绿色和蓝色颜色通道。卷积用于生成特征图，即图像细节的映射。这些存在于第四个维度中。因此，我们的图片不是一个二维对象，而是一个四维对象。


    现在的问题是：什么是卷积？在数学中，卷积是衡量两个函数在相互经过时重叠程度的度量。CNN每次将滤波器应用于图像时，都会记录不同的信号。例如，在映射图像边缘时，我们可以想象以下滤波器经过它：水平、垂直和对角线。


    请记住，卷积网络处理和分析图像的方式与RBM不同。CNN通过所谓的特征图进行学习；相比之下，RBM分析的是整个图像。


    CNN的灵感来源于大脑的视觉皮层，它赋予人们处理和分析视觉图像的能力。视觉皮层具有光检测受体，可以在重叠的视觉场层中捕获光数据。这是图像识别算法在人工智能和机器学习中流行的原因之一。


    Facebook使用了这项技术。它创建了DeepFace，一个能够以越来越高的准确度识别人脸的面部识别系统。甚至有报道称DeepFace的准确率达到97%。相比之下，FBI的面部识别系统准确率仅为85%。CNN的另一个令人兴奋的应用是DeepDream，由一位谷歌工程师创建。DeepDream用于赋予图像一种幻觉般的外观。这些图像通过算法性空想性错视进行处理。其他大型科技公司如微软和IBM也使用CNN开发智能软件。


    ## 理解架构


    CNN的拓扑结构与多层感知机相同。多层感知机是一个无环图，由包含少量节点的层构成，其中每一层与下一层通信。


    值得一提的是，这种神经网络具有相同的神经元。这是一个重要的区别，因为它意味着我们拥有相同的参数和权重值。这使得CNN效率极高，因为需要计算的值更少。另一个重要区别是节点通信有限，意味着输入并非局部连接到相邻节点。


    ### 层


    正如我们提到的，权重应在整个层上共享，以避免不可预测的节点参数。然后我们有一个由四个参数组成的滤波器，应用于该层以创建特征图。这四个滤波器参数被称为超参数。超参数代表大小、深度、步幅和零填充。


    大小是通过计算滤波器的表面积得出的。滤波器的大小将影响输出，因此控制输出以获得高效的网络非常重要。值得注意的是，较大的滤波器通常会重叠，但这并不像听起来那么糟糕，因为它可以带来更高的准确率。


    滤波器深度涉及我们层中的节点数量，以及在输入周围相同区域连接的数量。我们可能在讨论图像，但当我们讨论深度时，我们指的不是任何图像内容。如果你使用过任何图像编辑软件，你就知道颜色通道是什么。颜色通道用于描述图像的内容。我们的神经节点被映射，以便它们可以看到红色、绿色和蓝色颜色通道。这就是为什么滤波器深度几乎总是设置为3。增加它将为我们提供更多关于图像的数据，并包括难以学习的属性。相反，设置较低的深度将给我们带来较弱的结果。


    第三个滤波器参数是步幅。步幅值给出了神经元之间的空间。如果我们处理图像且步幅等于1，我们将设置每个像素作为滤波器的中心。这将导致输出增加和层重叠增加。在这种情况下，我们可以增加步幅值以最小化重叠；如果我们这样做，输出的大小也会减小。微调旨在实现准确性和大小之间的平衡，但这取决于你的目标。在大多数情况下，较低的值是理想的。


    第四个也是最后一个滤波器参数将减少层的输出大小。零填充将感受野的边界值设置为0。对于CNN，感受野是影响网络单元的输入空间。在设置零填充之前，确保所有区域都被滤波器覆盖非常重要。零填充设置的优点之一是能够调整输入和输出，使它们具有相同的大小。使输入和输出大小相等是标准做法，因为它允许我们有效地调整深度和步幅参数。没有零填充，正确设置参数并提高网络性能将是一场噩梦。在某些情况下，滤波器的边界可能会退化。


    问题是：在设置网络时，我们应该如何校准所有这些参数？我们有一个优雅的公式。如下：


    $$O = \frac{W - F + 2P}{S + 1}$$


    O代表层的输出，W代表图像大小，F代表滤波器大小，P代表零填充，S代表步幅。请记住，层的输出可能并不总是正整数，这可能会导致问题。你可以通过调整步幅来补偿。


    现在我们对CNN层及其参数有了一些了解，让我们了解一下什么是卷积。卷积是一种数学运算符，类似于乘法和加法。它通常用于将复杂的方程分解为更简单的形式。它在对两个集合函数进行操作后产生第三个函数，结果是一个新函数，它是两个原始函数的导数。


    在CNN中，我们将输入作为第一个元素。当我们将该过程应用于图像时，它被分配给图像的高度和宽度。我们将为每个颜色通道拥有3像素矩阵。矩阵的值将从0到255。


    第二个组件由浮点数组成的矩阵构成，是卷积核。这些数字为输入矩阵提供滤波器，输出是特征图。滤波器评估输入并写入特征图。这种卷积过程的主要优点是消除了对特征工程的需求。我们将在后面的章节中讨论特征工程。现在，知道特征工程过程通常具有挑战性和要求很高就足够了。


    ### 训练


    CNN学习与之前的过程非常相似。例如，MLP使用卷积网络进行预训练，并使用反向传播处理梯度。


    让我们讨论训练期间执行的步骤。首先，我们必须通过计算每个特征图作为它们全部与相应权重核卷积的和来计算特征图。该步骤称为前向传播。其次，梯度是通过将交换的权重核与梯度卷积来计算的。这称为反向传播。在此过程中，我们还应计算核的损失，以便调整它们的权重。


    请记住，训练过程很慢，因此无论你的硬件质量如何，都需要一段时间。'

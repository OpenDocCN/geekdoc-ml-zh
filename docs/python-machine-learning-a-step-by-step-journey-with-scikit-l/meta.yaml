  md: '# STACKING ENSEMBLES


    Classic ensembles are similar in one way. We have multiple classifiers which are
    trained to fit a set of target labels. The models are then applied to produce
    a Meta function that includes other ensemble methods like averaging and boosting.
    An alternative to this is stacking, sometimes referred to as blending. We will
    talk about that instead.


    As we discussed, stacking is configuring layers of models so that the output of
    one is the training data for the next. We can do this for hundreds of layers without
    failure. We can go even further; we can have stacks of stacks. Then harvest the
    most successful parameters from one stacking ensemble and then apply them as Meta
    features within other stacks. It’s not dizzying if you take some time to imagine
    it.


    Stacking ensembles is much more efficient and powerful. Imagine a scenario where
    there are hundreds of features. Then we use stacking ensembles to improve the
    quality of our predictions. There are few things we will have to do:


    +   1. We can begin by leaving out some data while we train and optimize the ensemble.
    Before we apply the model to the test set, we can retrain and optimize it. This
    can give us great results.

    2. Then we use the root mean square error and gradient descent as a performance
    function. It’s best to use the root mean square of the ensemble, not the model.

    3. We can blend models that improve the residuals of other models alone. For instance,
    we can use a neighborhood approach to improve on residuals of an RBM. Knowing
    strengths and weaknesses of machine learning techniques can help you build superior
    configurations.

    4. Lastly, we can make k-fold cross-validation techniques to get residuals of
    our combinations.'
  merge: -1
  pgno: 127

  md: '# CONCLUSION


    That concludes our journey. Hopefully, this book has given you the knowledge you
    need to move on to more advanced topics. Just like we did here, you need to put
    in a lot of practice, even when you don’t fully understand something. Just do
    a little more research and give it a go.


    Machine learning is an area that is under constant development, much like any
    other field in the technology sector. New methods and techniques are constantly
    developed, and it can be hard to keep up sometimes. This isn’t a bad thing. Nobody
    expects you to know everything, but they expect you to be competent. And all these
    changes mean the field never gets stale, meaning there is always something fun
    and interesting to learn. That is encouragement enough to keep learning and improving.
    You don’t have to do it alone, as there are many online communities that are dedicated
    to learning, collaboration and discussion of the best methods when dealing with
    specific problems. Take advantage of it.


    So, what have we learned?


    In the first chapter, we looked at unsupervised machine learning techniques and
    other tools needed for an exploratory analysis. When working with complicated
    datasets, it’s important to know the stuff. You learned how to identify patterns
    and structures needed for data analysis. Then you learned about principal component
    analysis, k-means clustering and self-organizing maps. We also learned how to
    apply them using the UCI Handwritten Digitsdataset.


    In the second chapter, we looked at restricted Boltzmann machines anddeep belief
    networks. We learned to apply both. The'

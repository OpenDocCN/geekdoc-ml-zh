    \ going to delve any deeper than this or we will be stirred away from the focus\
    \ of this book. The big takeaway is that CNN architecture is good at finding solutions\
    \ to challenging tasks because they can be adapted to in their configurations.\n\
    \n## CHAPTER 4: STACKED DENOISING AUTOENCODERS\n\n![](img/f93bd3c453531f8694c8030975436eb1_55_0.png)\n\
    \nIn this chapter, we’ll look at autoencoders, with a special focus on stacked\
    \ denoising autoencoders. We’ll mainly look at the theory and technique behind\
    \ them, then look at a little bit of code. This topic is more on the advanced\
    \ side of the spectrum. Learning about the theory and principles behind autoencoders\
    \ is worthwhile for an intermediary guide because you will eventually work with\
    \ them.\n\nLet’s begin with a general discussion of autoencoders.\n\n## AUTOENCODERS\n\
    \nAutoencoders have a number of similarities to restricted Boltzmann machines.\
    \ In some cases, RBMs are replaced by autoencoders if they aren’t performing well.\
    \ But what are autoencoders?\n\nAutoencoders are neural networks with a three-layer\
    \ structure where outputs are connected to inputs. Autoencoders are built to learn\
    \ the encoding/representation for dimensionality reduction. The reduction is achieved\
    \ by ignoring signal noise. However, that is only a part of it; the other thing\
    \ they do is reconstruct. Reconstruction is where reduced representation is taken,\
    \ and we build up the encoding to be the same as the input we started with. Simply,\
    \ the autoencoder compresses data from the input layer and then uncompresses it\
    \ to match the original data. This is so dimensionality reduction is done and\
    \ to ignore data noise.\n\nFor instance, we can use an autoencoder to work on\
    \ image recognition. We encode basic image data like corners by taking from the\
    \ encoding layer. The second encoding layer will process the output from the first\
    \ layer and encode remaining features. Those features might be something like\
    \ the iris of an eye. The third layer will encode the rest of the eye, until the\
    \ image code matches the image representation. In the end, all that data will\
    \ be decoded, by the layers, back into the original data.\n\nWe’ve talked about\
    \ dimensionality reduction methods like the PCA. Autoencoders play the same role\
    \ as PCAs. The question becomes: Why use autoencoders if we already have a method\
    \ that works well? The answer is simple. It will all depend on the data you are\
    \ working with. PCA is not effective when working with high-dimensional data,\
    \ but autoencoders work well with high-dimensional data. Autoencoders are more\
    \ advanced ways of applying noise reductions and stacking methods. That is why\
    \ they are good at working with complex data at large scales while being accurate.\n\
    \nNow you know a bit about autoencoders. Let’s look at their architecture so you\
    \ understand how they are implemented.\n\n### Structure and Learning\n\nAutoencoders\
    \ have a straightforward architecture. We have the typical three-layer neural\
    \ net topology with the input, hidden and output layer. Just like with all other\
    \ topologies, the input layer’s data goes to the hidden layer, and from there\
    \ it goes to the output layer. What makes autoencoders unique is the small number\
    \ of nodes in the hidden layer compared to the input and output layers.\n\nOne\
    \ striking feature is that the output is set as the input. That is because, after\
    \ encoding input in the hidden layers, it relies on the accuracy to reconstruct\
    \ it. Below is an example of the encoding:\n\n```\ny = s(Wx + b)\n```\n\nIn the\
    \ example above, the encoding is performed by mapping the “x” input to a new version\
    \ of itself. That new version is “y.” The “W” stands for the weight value that\
    \ is attached to the “x” and “b” adjustable variable. Variable adjustments are\
    \ very important because they can help us limit errors in reconstruction.\n\n\
    Let’s have a look at the learning process. When autoencoders train, they rely\
    \ on low reconstruction error to be as efficient and accurate as possible. Errors\
    \ can be measured using the following formula:\n\n```\nE = 1/2 || z- x || 2\n\
    ```\n\n## Denoising Autoencoders\n\nSome problems are complex for a typical autoencoder\
    \ to handle. That is because, sometimes, when handling high-dimensionality distributions,\
    \ the encoding ends up as a clone of the input. This is known as the overcomplete\
    \ autoencoder. Examples that will fit this are things like speech data. Speech\
    \ data is difficult, and classifying it needs a hidden layer with high dimensionality\
    \ and complex encoding.\n\nThis is one of the reasons why in machine learning\
    \ you need to pay attention to the dimensionality of hidden layers. This aspect\
    \ can have a serious impact on the learning process, and your results might not\
    \ end up being the ones you expect. If we have a scenario that involves a complex\
    \ input, but the hidden layer doesn't have enough nodes to process all that data,\
    \ we end up with a failing neural net. Training sometimes requires more nodes\
    \ when dealing with difficult distributions.\n\nOvercomplete autoencoders can\
    \ achieve a low error representation, but configuring them so that they do is\
    \ difficult. Optimizing that makes things even more difficult. Given that, it's\
    \ best to block the overcomplete encoder's ability to learn the identity function.\
    \ There are multiple ways to do this, and all of them won't stop us from gaining\
    \ useful data.\n\nOne way is adding noise to the input data. It sounds bad because\
    \ in most circumstances we want to avoid noise. But adding noisy data is how the\
    \ autoencoder will go through the training processing and learn statistical precision\
    \ instead of identity. Noisy data can be added using the dropout method. The dropout\
    \ method is done by setting half the input values to zero at random. Below is\
    \ how the technique is applied through a stochastic corruption operation.\n\n\
    ```\ndef get_corrupted_input(self, input, corruption_level):\n    return self.theano_rng.binomial(size=input.shape,\
    \ n=1,\n        p=1 - corruption_level, dtype=theano.config.floatX) * input\n\
    ```\n\nStatistical features are learned by differentiating corrupted values from\
    \ uncorrupted values. This step will help with modeling input data with better\
    \ accuracy. In other words, the denoising process will create more powerful models.\
    \ Therefore, when working with noisy input data, whether it be images or speech,\
    \ this is an important step to take.\n\nEarlier we talked about how many machine\
    \ learning algorithms need to preprocess input data so they can reconstruct a\
    \ denoised input. Denoised autoencoders only require the bare minimum of preprocessing\
    \ to achieve a high level of accuracy. That happens to be of great use to deep\
    \ learning.\n\nIf we have an autoencoder learning the identity functions from\
    \ the input data, there’s a high chance of it being configured wrongly. In most\
    \ cases, this is because the autoencoder has more nodes than it should. If you\

    effective technique. The method selects optimal k-clusters. Usually, when the
    k-value is increased, improvement in distortion is decreased. The elbow method
    allows us to find the perfect area, known as the elbow point, where improvement
    in distortion is the absolute lowest. This is the point where we stop dividing
    out data into multiple clusters. The elbow'

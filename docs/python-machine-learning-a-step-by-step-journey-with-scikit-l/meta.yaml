  md: '# # PRINCIPAL COMPONENT ANALYSIS


    PCA is arguably the most popular linear dimensionality reduction method used in
    big data analytics. Its aim is to reduce the dimensionality of data so it becomes
    easy to manage.


    PCA is a decomposition method that is good at splitting a multivariate dataset
    into orthogonal components. Those elements will become the summary of the data
    sets, allowing for insights.


    It does this in a few steps: By identifying the dataset’s center point, calculating
    the covariance matrix and the eigenvectors of the matrix. Then it ortho-normalizes
    the eigenvectors and calculates the proportion of variance in the eigenvectors.
    Since you have likely never heard any of these terms, it is worth going in and
    explaining them further.


    +   1. **Covariance** : This is a variance between two or more variables, applying
    to multiple dimensions. Say we have a covariance between two variables; we’d use
    a 2 x 2 matrix to describe it. If there are 3 variables, we’ll need a 3 x 3 matrix,
    and on it goes. The first phase of any PCA calculation is the covariance matrix.

    2. **Eigenvector** : This vector doesn’t change direction when a linear transformation
    is realized. Let’s illustrate this. Imagine holding an elastic rubber band between
    your hands. Then you stretch the rubber band. The eigenvector would be the point
    in the band that did not move when you were stretching it. It is the point in
    the middle that stays at the same place before and after you stretch the band.

    3. **Orthogonalization** : The term means two vectors that are at right angles
    to each other. Simply referred to as orthogonal.

    4. **Eigenvalue** : The eigenvalue calculates the proportion of variance represented
    by the eigenvectors. The eigenvalue corresponds, more or less, to the length of
    the eigenvector.'
  merge: -1
  pgno: 10
- img_proc: true
  md: 'Here''s a short summary: Covariance is used to calculate eigenvectors, and
    then ortho-normalization takes place. This process describes how principal component
    analysis transforms complex data sets into low dimensional ones.


    # Applying PCA


    Now let''s see how the algorithm works in action. As we''ve said, we will use
    the UCI handwritten digits dataset. You can import it using Scikit-learn because
    it is an open-source dataset. The dataset has about 1800 instances of handwritten

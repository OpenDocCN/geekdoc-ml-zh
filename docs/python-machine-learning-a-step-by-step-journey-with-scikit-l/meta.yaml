- md: '## CHAPTER 7: MORE FEATURE ENGINEERING


    We have seen in the last chapter how crucial feature engineering is. We saw how
    we can convert data into features that are processed using machine learning techniques.
    We also saw how well-prepared data is expected by image recognition and natural
    language processing algorithms.


    In this chapter we will work with another kind of data: categorical data assembled
    from real applications. Data like this is common. You have likely dealt with an
    application that benefited from it. For instance, data capturing from a sensor
    needs this data type to function. Categorical data is also used by complex geological
    surveys; you will find a lot of sophisticated data. Regardless of the application,
    the same set of techniques are used. In this chapter you will learn to inspect
    data and remove quality problems or minimize their impact.


    Let’s have a brief look at some of the ideas we will be dealing with.


    1. There are several methods for creating feature sets. Also, understanding the
    limits of feature engineering is important.

    2. We will learn ways to deal with many techniques to improve the quality of the
    initial dataset.

    3. Domain knowledge to enhance the accuracy of data. Without wasting any time,
    let’s jump in.


    ## CREATING FEATURE SETS


    The most determinant factor when it comes to machine learning algorithms’ success
    is the quality of the data. It doesn’t matter how well prepared the data is if
    the data is inaccurate. However, when you have the right skills and knowledge
    of the data, it’s possible to create powerful feature sets. The necessity of knowing
    how to build features becomes apparent because you will need to perform audits
    to assess the datasets. Without the audit, you might miss certain details and
    create a feature that lacks accuracy and performance.


    We will start by looking at techniques for interpreting already existing features
    that will enable us to implement new parameters to improve our model.


    ### Rescaling Techniques


    One of the most infamous problems in machine learning is that introducing unprepared
    data often results in the algorithm becoming unstable in relation to the variables.
    For instance, you might come across a dataset that has differing parameters. In
    that case, our algorithm may deal with variables with a larger variance, like
    there’s an indication there’s a more powerful change. Simultaneously, algorithms
    with smaller variance and values are treated with less importance.


    To fix that we must implement a process called rescaling. In rescaling, we have
    parameter values whose sizes are corrected based on maintaining the initial order
    in every parameter; this is known as monotonic translation. Remember that gradient
    descent algorithms are more powerful if we scale the input data before the training
    process. In cases where all parameters are a different scale, we will have a complex
    parameter space that can become distorted under the training stage. The difficulty
    of training the model is determined by how complex the space is. Let’s illustrate
    this metaphorically.


    Imagine gradient descent models are like balls rolling down a ramp. The balls
    might come across obstacles or get stuck because of a deformity in the ramp. When
    we work with scaled data, we are taking care of deformities in the ramp and removing
    obstacles. When the training surface is even, the training will be more effective.


    Linear rescaling is the most basic example of rescaling; it is between zero and
    one. That means the most sizable parameter will have a rescaled value of one;
    the smallest will have a rescaled value of zero. There will be values that fall
    between zero and one. Take a vector for example. When you perform a transformation
    on [0, 10, 25, 20, 18], you get [0, 0.4, 1, 0.8, 0.72]. The raw data is very diverse,
    but when rescaled, we end up with more even range. This is good because our training
    algorithms perform better with this set of data.


    There are other alternatives to rescaling. In certain situations, we can use nonlinear
    scaling methods instead. Or we could look at others like square scaling, log scaling
    and square root scaling. You’ll find log scaling used in physics and other datasets
    with exponential growth. Log scaling focuses on adjusting the space between cases,
    making it the best option for working with outlying cases.


    ### Creating Derived Variables


    Rescaling is used in the preprocessing phase of most machine learning. On top
    of this step, we have other data-preparation methods for boosting model performance
    with tactical parameter reductions. An example is the derived measure; it uses
    existing data points and represents them in a single measure.


    Derived measures like this are common. That is because all derived scores are
    combination scores taken from several elements. Think of the body mass index as
    an example; it is calculated by considering three points: height, weight and age.


    Remember, if we have datasets containing familiar information, these measures/scores
    will be known. Finding new transformations by implementing domain knowledge with
    existing information can have a positive impact on performance. Below are the
    concepts you should be familiar with when it comes to derived measures:


    1. **Creating combinations of two variables:** This uses division, multiplication
    or normalization of an n parameter as the function of an m parameter.

    2. **Change over time:** An example of this is acceleration. Instead of working
    with current and past values, we work with a slope of a time series function.

    3. **Baseline subtraction:** It involves using the base expectation to modify
    parameters in relation to the baseline. It can be a better way of observing the
    same variable, since it is more informative. For instance, imagine we have a baseline
    churn rate (measure of objects moving out of a group over a certain amount of
    time). We can create a parameter that describes the churn by the deviation from
    expectation. Another example of this is stock trading; we can look at the closing
    price and the opening price.

    4. **Normalization:** It is a parameter value normalization based on another parameter’s
    value. An example is a failed-transaction rate.


    All these allow us to produce improved results. They can be combined to maximize
    effectiveness. For instance, imagine there is a parameter indicating that slope
    of customer engagement should be trained to express whether a customer is engaged
    or not. This is because context variety and small declines in engagements can
    suggest a number of factors depending on the situation. It’s the data scientist’s
    job to think of what those situations may be when creating the feature, as each
    domain has its own subtleties. So far, we have only focused on numerical data.
    However, in most cases there are categorical parameters like the code involved,
    and those require the right techniques to work with.


    Next, we will look at the interpretation of non-numeric features and learn techniques
    for turning them into useful parameters.


    ### Non-numeric Features


    In your job, you will often need to interpret non-numeric features. It is hard,
    since valuable data can be encoded in non-numerical values. For instance, when
    looking at stock trading data, knowing the identity of traders is also a valuable
    piece of information. Imagine you have a stock buyer who trades in a particular
    manner with a specific seller; the information is even more valuable. It can be
    challenging to work with such cases, but we can implement a series of aggregations
    to count how many times it happens and the chance of extended measures.


    Remember, if we create smart statistics and lower the number of dataset rows,
    there’s a possibility that the quality of the information the model has to access
    will be reduced. That will also increase the risk of overfitting. Reducing input
    data and introducing extensive aggregations isn’t always the best when working
    with the kinds of machine learning algorithms discussed in this book.


    Luckily, there is an alternative to aggregation. Encoding can be used to translate
    string values to numerical data. The common way of doing this is through “one-hot
    encoding.” The process is constituted of transforming groups of categorical answers,
    like age groups, into sets of binary values. This is advantageous. It lets us
    gain access to tag data within datasets where aggregation risks losing information.
    And one-hot encoding enables us to break apart particular response codes and split
    them into independent features useful for identifying relevant and meaningful
    codes for specific variables. This allows us to save values that matter to our
    goals.


    Another alternative is used on text codes. It is often referred to as the “hash
    trick.” It’s a function that we use to translate textual data into its numeric
    counterpart. In general, hashes are typically used to construct a summary of extensive
    data or to encode a wide range of parameters considered delicate. Let’s look at
    how hashes are used so you can understand and get the most out of them.


    After transforming text into numeric values, we can use those values as identifiers
    for a specific phrase. There are various types of hash algorithms, but for our
    purposes, the most basic will do the job. To get an idea, a simple hash can transform
    every letter in the alphabet into a correcting number. “A” would become 1, and
    “B” would become 2 and so on. Hashes can also create words and sentences by putting
    those numbers together. Look at the string example below where we have the words
    “dog” and “pics”:


    Dog: 4 + 15 + 7'
  mdcn: '## 第七章：更多特征工程


    上一章我们已经看到特征工程有多重要。我们了解了如何将数据转换为可通过机器学习技术处理的特征。我们也看到了图像识别和自然语言处理算法对数据准备的高要求。


    本章我们将处理另一种数据：来自真实应用的分类数据。这类数据很常见。你很可能用过受益于它的应用。例如，传感器采集的数据就需要这种数据类型才能运作。复杂的地质调查也会使用分类数据；你会发现大量复杂的数据。无论应用如何，所使用的技术集是相同的。在本章中，你将学习如何检查数据并消除质量问题或最小化其影响。


    让我们简要了解一下我们将要处理的一些思路。


    1.  创建特征集有多种方法。同时，理解特征工程的局限性也很重要。

    2.  我们将学习处理多种技术以提高初始数据集质量的方法。

    3.  利用领域知识来提高数据的准确性。事不宜迟，让我们开始吧。


    ## 创建特征集


    机器学习算法成功与否，最关键的决定因素是数据质量。即使数据准备得再好，如果数据不准确也无济于事。然而，当你掌握了正确的技能和数据知识时，就有可能创建强大的特征集。了解如何构建特征的必要性变得显而易见，因为你需要执行审计来评估数据集。没有审计，你可能会遗漏某些细节，创建出缺乏准确性和性能的特征。


    我们将从研究解释现有特征的技术开始，这将使我们能够实现新的参数来改进我们的模型。


    ### 缩放技术


    机器学习中最臭名昭著的问题之一是，引入未经准备的数据通常会导致算法在变量方面变得不稳定。例如，你可能会遇到一个具有不同参数的数据集。在这种情况下，我们的算法可能会处理具有较大方差的变量，就好像存在更强烈变化的迹象一样。同时，具有较小方差和值的算法则被认为不那么重要。


    为了解决这个问题，我们必须实施一个称为缩放的过程。在缩放中，我们根据保持每个参数的初始顺序来校正参数值的大小；这被称为单调转换。请记住，如果我们在训练过程之前对输入数据进行缩放，梯度下降算法会更强大。在所有参数都是不同尺度的情况下，我们将拥有一个复杂的参数空间，该空间在训练阶段可能会发生扭曲。训练模型的难度取决于空间的复杂程度。让我们用一个比喻来说明。


    想象一下，梯度下降模型就像滚下斜坡的球。球可能会遇到障碍物，或者因为斜坡的变形而卡住。当我们使用缩放数据时，我们就是在处理斜坡的变形并移除障碍物。当训练表面平坦时，训练将更加有效。


    线性缩放是缩放最基本的例子；它介于零和一之间。这意味着最大的参数将具有缩放值一；最小的将具有缩放值零。会有值落在零和一之间。以一个向量为例。当你对 [0,
    10, 25, 20, 18] 执行转换时，你会得到 [0, 0.4, 1, 0.8, 0.72]。原始数据非常多样化，但缩放后，我们最终得到了更均匀的范围。这很好，因为我们的训练算法在这种数据集上表现更好。


    缩放还有其他替代方案。在某些情况下，我们可以使用非线性缩放方法。或者我们可以看看其他方法，如平方缩放、对数缩放和平方根缩放。你会发现对数缩放用于物理学和其他具有指数增长的数据集。对数缩放侧重于调整案例之间的空间，使其成为处理异常案例的最佳选择。


    ### 创建派生变量


    缩放用于大多数机器学习的预处理阶段。在此步骤之上，我们还有其他数据准备方法，通过策略性的参数缩减来提升模型性能。一个例子是派生度量；它使用现有的数据点并将其表示为单一的度量。


    这样的派生度量很常见。这是因为所有派生分数都是从多个元素中提取的组合分数。以身体质量指数为例；它是通过考虑三个点来计算的：身高、体重和年龄。


    请记住，如果我们有包含熟悉信息的数据集，这些度量/分数将是已知的。通过将领域知识与现有信息结合来寻找新的转换，可以对性能产生积极影响。以下是关于派生度量你应该熟悉的概念：


    1.  **创建两个变量的组合：** 这使用除法、乘法或归一化，将一个 n 参数作为 m 参数的函数。

    2.  **随时间的变化：** 一个例子是加速度。我们不是处理当前和过去的值，而是处理时间序列函数的斜率。

    3.  **基线减法：** 它涉及使用基本期望来修改相对于基线的参数。这可能是观察同一变量的更好方式，因为它信息量更大。例如，假设我们有一个基线流失率（衡量在一定时间内移出群体的对象数量）。我们可以创建一个参数，通过与期望的偏差来描述流失。另一个例子是股票交易；我们可以查看收盘价和开盘价。

    4.  **归一化：** 这是基于另一个参数值的参数值归一化。一个例子是交易失败率。


    所有这些都使我们能够产生改进的结果。它们可以组合使用以最大化效果。例如，假设有一个参数表示客户参与度的斜率应该被训练来表达客户是否参与。这是因为情境的多样性和参与度的小幅下降可能暗示多种因素，具体取决于情况。数据科学家的工作就是在创建特征时思考这些情况可能是什么，因为每个领域都有其微妙之处。到目前为止，我们只关注了数值数据。然而，在大多数情况下，存在分类参数，如涉及的代码，这些需要正确的技术来处理。


    接下来，我们将研究非数值特征的解释，并学习将其转换为有用参数的技术。


    ### 非数值特征


    在你的工作中，你经常需要解释非数值特征。这很难，因为有价值的数据可能被编码在非数值中。例如，在查看股票交易数据时，了解交易者的身份也是一条有价值的信息。想象一下，你有一个股票买家与特定卖家以特定方式进行交易；这条信息就更有价值了。处理这样的案例可能具有挑战性，但我们可以实施一系列聚合来计算它发生的次数以及扩展度量的可能性。


    请记住，如果我们创建智能统计数据并减少数据集的行数，模型必须访问的信息质量可能会降低。这也会增加过拟合的风险。在使用本书讨论的机器学习算法时，减少输入数据和引入广泛的聚合并不总是最佳选择。


    幸运的是，聚合有一个替代方案。编码可用于将字符串值转换为数值数据。常见的方法是“独热编码”。该过程包括将分类答案组（如年龄组）转换为二进制值集。这是有利的。它让我们能够在聚合有丢失信息风险的数据集中访问标签数据。而独热编码使我们能够分解特定的响应代码，并将其拆分为独立的特征，这些特征有助于识别特定变量的相关且有意义的代码。这使我们能够保存对目标重要的值。


    另一个替代方案用于文本代码。它通常被称为“哈希技巧”。它是一个我们用来将文本数据转换为其数值对应物的函数。通常，哈希用于构建大量数据的摘要或编码被认为是敏感的广泛参数。让我们看看哈希是如何使用的，以便你能够理解并充分利用它们。


    将文本转换为数值后，我们可以将这些值用作特定短语的标识符。有多种类型的哈希算法，但就我们的目的而言，最基本的那种就能胜任。为了有个概念，一个简单的哈希可以将字母表中的每个字母转换为一个校正数字。“A”会变成
    1，“B”会变成 2，以此类推。哈希还可以通过将这些数字组合在一起来创建单词和句子。看看下面的字符串示例，其中有单词“dog”和“pics”：


    Dog: 4 + 15 + 7'

    The output will be 0.999. You can’t improve a score like that. If you look back
    at the models we use in this book, you will see that none has achieved such a
    high score. Remember, even if you make a bad random forest, you will still get
    results that are better than most methods.


    Let’s look at a random forest which is slightly different. It’s called randomized
    trees. It works similarly to a random forest but also randomizes the discrimination
    threshold. In other words, where the decision tree splits, classes are randomized
    at random values.'
  merge: -1
  pgno: 123
- img_proc: true
  md: 'Note that training decision trees is a highly efficient process. Any random
    forest algorithm will be able to deal with a larger number of trees; with that
    increase we get more nodes and get an even more effective classifier. The randomness
    aspect helps us limit noise.


    Let’s take a look at an example. Below we are using Scikit-learn''s ExtraTreesClassifier:



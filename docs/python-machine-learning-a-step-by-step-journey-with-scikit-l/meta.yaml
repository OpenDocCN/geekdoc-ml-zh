    \    - [Neural Networks](#)\n    - [The Restricted Boltzmann Machine](#)\n   \
    \ - [Constructing Deep Belief Networks](#)\n- [CONVOLUTIONAL NEURAL NETWORKS](#)\n\
    \    - [Understanding the Architecture](#)\n    - [Connecting the Pieces](#)\n\
    - [STACKED DENOISING AUTOENCODERS](#)\n    - [Autoencoders](#)\n- [SEMI-SUPERVISED\
    \ LEARNING](#)\n    - [Understanding the Techniques](#)\n    - [Self-learning](#)\n\
    \    - [Contrastive Pessimistic Likelihood Estimation](#)\n- [TEXT FEATURE ENGINEERING](#)\n\
    \    - [Text Data Cleaning](#)\n    - [Building Features](#)\n- [MORE FEATURE\
    \ ENGINEERING](#)\n    - [Creating Feature Sets](#)\n    - [Real-world Feature\
    \ Engineering](#)\n- [ENSEMBLE METHODS](#)\n    - [Averaging Ensembles](#)\n \
    \   - [Stacking Ensembles](#)\n- [CONCLUSION](#)\n\n## INTRODUCTION\n\nThis book\
    \ is a step-by-step guide through intermediate machine learning concepts and techniques.\
    \ You’ll also learn working with complex data, as any machine learning technology\
    \ requires data. The bulk of the work in this book will be communicated with clear\
    \ examples. This is great news if you are the type that does better learning from\
    \ examples.\n\nSince this is an intermediate guide, there is a lot of assumed\
    \ knowledge on our part. We expect you to know machine learning basics and Python.\
    \ The act of publishing a book like this is always about simplifying things so\
    \ anyone can learn. So, if you aren’t sure you got the basics down, you can still\
    \ have a look and do some extra research when you come across concepts that are\
    \ new to you. The information should otherwise be easy to digest.\n\nLet’s now\
    \ talk about what you will learn:\n\nWe will use unsupervised machine learning\
    \ algorithms and tools for analyzing complex datasets. That means you will learn\
    \ about principal component analysis, k-means clustering and more. If this sounds\
    \ strange and new, that is okay; it’s why we are here. You don’t have to know\
    \ what any of this means at this point. Again, all this will be accompanied with\
    \ practical examples.\n\nThen we will learn about restricted Boltzmann machine\
    \ algorithms and deep belief networks. These will be followed by convolutional\
    \ neural networks, autoencoders, feature engineering and ensemble techniques.\
    \ Each chapter will begin by explaining, in general terms, the theory behind these\
    \ techniques.\n\nAs a general overarching rule, practice the concepts in this\
    \ book. That is how you will benefit the most from the lessons in this book. You\
    \ might find some parts challenging. Don’t just steam ahead. Try to find extra\
    \ material that will help you understand the concept, or go over the material\
    \ again.\n\nOnly begin the practicals when you are somewhat confident in your\
    \ understanding. This is important because, if you don’t do the work, you won’t\
    \ understand the more advanced concepts.\n\nEach chapter will be structured to\
    \ include theory, tools and examples of real-world applications.\n\n## CHAPTER\
    \ 1: UNSUPERVISED MACHINE LEARNING\n\nUnsupervised machine learning is made up\
    \ of a set of techniques and tools crucial to exploratory analysis. Understanding\
    \ these tools and techniques is important to extracting valuable data from complex\
    \ datasets. These tools help reveal patterns and structures in data which are\
    \ hard to discern otherwise.\n\nThat is what we will do in this chapter. We will\
    \ begin with a solid data manipulation technique called principal component analysis.\
    \ Then we will quickly look at k-means clustering and self-organizing maps. We\
    \ will then learn how to use these techniques using UCI Handwritten Digits datasets.\
    \ Let’s get to it.\n\n## PRINCIPAL COMPONENT ANALYSIS\n\nPCA is arguably the most\
    \ popular linear dimensionality reduction method used in big data analytics. Its\
    \ aim is to reduce the dimensionality of data so it becomes easy to manage.\n\n\
    PCA is a decomposition method that is good at splitting a multivariate dataset\
    \ into orthogonal components. Those elements will become the summary of the data\
    \ sets, allowing for insights.\n\nIt does this in a few steps: By identifying\
    \ the dataset’s center point, calculating the covariance matrix and the eigenvectors\
    \ of the matrix. Then it ortho-normalizes the eigenvectors and calculates the\
    \ proportion of variance in the eigenvectors. Since you have likely never heard\
    \ any of these terms, it is worth going in and explaining them further.\n\n1.\
    \  **Covariance**: This is a variance between two or more variables, applying\
    \ to multiple dimensions. Say we have a covariance between two variables; we’d\
    \ use a 2 x 2 matrix to describe it. If there are 3 variables, we’ll need a 3\
    \ x 3 matrix, and on it goes. The first phase of any PCA calculation is the covariance\
    \ matrix.\n2.  **Eigenvector**: This vector doesn’t change direction when a linear\
    \ transformation is realized. Let’s illustrate this. Imagine holding an elastic\
    \ rubber band between your hands. Then you stretch the rubber band. The eigenvector\
    \ would be the point in the band that did not move when you were stretching it.\
    \ It is the point in the middle that stays at the same place before and after\
    \ you stretch the band.\n3.  **Orthogonalization**: The term means two vectors\
    \ that are at right angles to each other. Simply referred to as orthogonal.\n\
    4.  **Eigenvalue**: The eigenvalue calculates the proportion of variance represented\
    \ by the eigenvectors. The eigenvalue corresponds, more or less, to the length\
    \ of the eigenvector.\n\nHere's a short summary: Covariance is used to calculate\
    \ eigenvectors, and then ortho-normalization takes place. This process describes\
    \ how principal component analysis transforms complex data sets into low dimensional\
    \ ones.\n\n### Applying PCA\n\nNow let's see how the algorithm works in action.\
    \ As we've said, we will use the UCI handwritten digits dataset. You can import\
    \ it using Scikit-learn because it is an open-source dataset. The dataset has\
    \ about 1800 instances of handwritten digits from about 50 writers. The input\
    \ is comprised of pressure and location and resampled on an 8 x 8 grid. This is\
    \ to yield maps that can be changed to 64-feature vectors. These vectors will\
    \ be used for analysis. We use PCA on them because we need to reduce their number,\
    \ making them more manageable. Here is how the code looks:\n\n```python\nimport\
    \ numpy as np\nfrom sklearn.datasets import load_digits\nimport matplotlib.pyplot\
    \ as plt\nfrom sklearn.decomposition import PCA\nfrom sklearn.preprocessing import\
    \ scale\nfrom sklearn.lda import LDA\nimport matplotlib.cm as cm\n\ndigits = load_digits()\n\
    data = digits.data\n```"

    results. So, what went wrong?


    It takes one improperly set component in an algorithm, or ambiguous data, for
    things to go awry. If one iteration fails, they will build from the foundations
    of that feature, and the problem increases as faulty labeled data is reintroduced
    repeatedly in the later stages.


    There are a number of factors that contribute to the faulty result and error.
    In some cases, labeled data will not yield anything relevant or useful, but that
    usually happens in the first iterations. The reason for this is simple. The very
    easy to tag unlabeled cases are also likely to be nearly identical to existing
    labeled cases. This tells us we often enter labels that don''t contribute anything
    to the classification. The other problem is adding more cases to similar pre-defined
    cases leads to an increased change in misclassification.


    Knowing where their issues originate can be challenging, but the addition of a
    few plots can help us reveal what went wrong in the training model. As we have
    said, this issue is often encountered'

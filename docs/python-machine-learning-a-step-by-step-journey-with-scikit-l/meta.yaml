- md: "## Acquiring Twitter Data\n\nNow that we have the theory, we can begin by extracting\
    \ data from a source. We decided that it would be Twitter. We will find transit\
    \ authorities and harvest data from their service announcements for different\
    \ places. We are speaking about accounts belonging to New York’s Metropolitan\
    \ Transportation Authority and Vancouver’s TransLink and other similar authorities.\n\
    \nFor our purposes here, let’s use TransLink. Twitter's data is perfect for analysis\
    \ and text mining. So, we should start with some cleaning techniques from earlier\
    \ and make useful features.\n\nWe will use the Twitter API to get TransLink's\
    \ tweets. The API is easy to use, especially when working with Python. So, don’t\
    \ be intimidated if it’s your first time working with an API. There are easy to\
    \ find online guides for Twitter’s API. What we will extract are the text itself\
    \ and the date and time. Text is the most important part, as it has the content\
    \ we are looking for, like information of delays, service interruptions, which\
    \ station and areas are affected and so on.\n\nIf you decide to use TransLink\
    \ data, you encounter difficulties because it often includes information of train\
    \ lines and bus lines. But you will find that their Twitter is well put together\
    \ and they give all the information we need on delays and interruptions in uniform\
    \ terms: giving the type of service problem and a subject. They use hashtags like\
    \ #TLAlert, #TL300 and others. All these hashtags are straightforward, meaning\
    \ you will be able to tell what they are for. On top of that, you can incorporate\
    \ keywords that are likely to be used by a transport authority in your model.\
    \ Some of those common terms are things like delay, detour and diversion. That\
    \ will help you catch tweets that are most useful to your purposes and reduce\
    \ the data you have to deal with.\n\nLet’s assume you have gone ahead and gotten\
    \ the data you need. We will start with cleaning using BeautifulSoup and NLTK.\
    \ Assuming we are using TransLink, this is how it will look:\n\n```python\nfrom\
    \ bs4 import BeautifulSoup\n\ntweets = BeautifulSoup(train[\"TweetsFromTranslink.text\"\
    ])\ntweettext = tweets.get_text()\nbrown_a = nltk.corpus.brown.tagged_sents(categories='a')\n\
    \ntagger = None\nfor n in range(1, 4):\n    tagger = NgramTagger(n, brown_a, backoff=tagger)\n\
    taggedtweettext = tagger.tag(tweettext)\n```\n\nBecause of the nature of the data,\
    \ you don’t have to perform a very thorough cleaning process. That is because\
    \ organizational tweets from governments and companies often follow the same pattern\

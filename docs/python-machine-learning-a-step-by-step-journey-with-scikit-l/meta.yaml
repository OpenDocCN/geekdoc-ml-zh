- md: '## CHAPTER 8: ENSEMBLE METHODS


    In this chapter, we will focus on current techniques and how to enhance them using
    ensemble methods. Ensemble methods are exactly like how they sound. These methods
    are techniques for combining different models. Ensemble methods are often used
    by data scientists and machine learning enthusiasts. They are playing a key role
    in finding solutions to various problems. They help boost performance and much
    more. We look at a few ensemble techniques and look at how they are used in the
    real-world.


    Let’s look at ensembles in machine learning. There are two components involved
    in them. The first part is a group of models. The second is a set of rules that
    tell us how the results will be gathered from models and united into one output.
    Ensembles allow us to build more than one solution to a problem and then put together
    the results. It takes the best from every component. That means the solution we
    come to is more noise resistant, allowing for better training processes. This
    translates to fewer overfitting problems and training errors.


    Ensembles have had a big impact on machine learning techniques and provided us
    with more flexibility than we have ever had. Because of these changes, we can
    now test fragments of a solution or solve localized issues without overhauling
    the entire model. Below are types of ensemble methods:


    - 1. **Stacking ensembles:** Weighted output of several classifiers becomes input
    for the next model.

    - 2. **Averaging ensembles:** Models are built next to each other, and averaging
    methods are used to get the united estimator.

    - 3. **Boosting ensembles:** Models are built in sequence, and each new addition
    works on improving the score of the united estimator.


    Let’s discuss each in a little more detail.


    ## AVERAGING ENSEMBLES


    Averaging ensembles are used in a wide array of applications like audio processing
    and statistical modeling. They are almost always interpreted the same way as reproduced
    cases of certain systems. The idea is that the average values within a given system,
    and variances between cases, are values of the most importance to the entire system.


    In machine learning, an averaging ensemble is a model collection training from
    the same dataset. Results are then aggregated. There are a few advantages to this.
    First, the ensemble reduces how much the model performances vary. A popular set
    of averaging ensembles is called random forests.


    Let’s look at it a little.


    ### Working with Random Forests


    The random forest algorithm is loved by data scientists because it gives great
    results more often than not, and it is very simple. It’s used to make side-by-side
    decision tree classifiers. That means it can be used for classification operations
    and regression.


    It creates a random “forest” made up of an ensemble of decision trees. Decision
    trees are visual representations of decisions or decision making, often used in
    machine learning and data mining.


    The forest has diverse decision trees, because there are, at the very least, 2
    sources of randomness added to the development of a classifier. Every tree is
    made from data sampled via replacement from the training dataset. The building
    process of a decision tree selects the best split from features, not from the
    features subset. Let’s use Scikit-learn’s RandomForestClassifier, like below:


    ```python

    import numpy as np

    from sklearn.ensemble import RandomForestClassifier

    from sklearn.datasets import load_digits

    from sklearn.preprocessing import scale


    digits = load_digits()

    data = scale(digits.data)

    n_samples, n_features = data.shape

    n_digits = len(np.unique(digits.target))

    labels = digits.target


    clf = RandomForestClassifier(n_estimators=10)

    clf = clf.fit(data, labels)

    scores = clf.score(data, labels)


    print(scores)

    ```


    The output will be 0.999. You can’t improve a score like that. If you look back
    at the models we use in this book, you will see that none has achieved such a
    high score. Remember, even if you make a bad random forest, you will still get
    results that are better than most methods.


    Let’s look at a random forest which is slightly different. It’s called randomized
    trees. It works similarly to a random forest but also randomizes the discrimination
    threshold. In other words, where the decision tree splits, classes are randomized
    at random values.


    Note that training decision trees is a highly efficient process. Any random forest
    algorithm will be able to deal with a larger number of trees; with that increase
    we get more nodes and get an even more effective classifier. The randomness aspect
    helps us limit noise.


    Let’s take a look at an example. Below we are using Scikit-learn''s ExtraTreesClassifier:


    ```python

    from sklearn.cross_validation import cross_val_score

    from sklearn.ensemble import RandomForestClassifier

    from sklearn.ensemble import ExtraTreesClassifier

    from sklearn.tree import DecisionTreeClassifier

    from sklearn.datasets import load_digits

    from sklearn.preprocessing import scale


    digits = load_digits()

    data = scale(digits.data)

    X = data

    y = digits.target


    clf = DecisionTreeClassifier(max_depth=None, min_samples_split=1, random_state=0)

    scores = cross_val_score(clf, X, y)

    print(scores)


    clf = RandomForestClassifier(n_estimators=10, max_depth=None, min_samples_split=1,
    random_state=0)

    scores = cross_val_score(clf, X, y)

    print(scores)


    clf = ExtraTreesClassifier(n_estimators=10, max_depth=None, min_samples_split=1,
    random_state=0)

    scores = cross_val_score(clf, X, y)

    print(scores)

    ```


    The scores we obtain look something like this:


    | [0.82035783, 0.74262381, 0.75488341] |

    |---|

    | [0.9015025, 0.8918286, 0.88352197] |

    | [0.93388139, 0.91798342, 0.91789423] |


    The score represents the proportion of cases labeled correctly. We can conclude
    that random forests and randomized trees will give us very strong results. In
    both cases, we find scores above 0.9.


    There is a disadvantage. When working with random forests, it is difficult to
    see the effectiveness of an implementation. The difficulty increases with the
    size of the forest. Small forests and individual forests are simpler to deal with.


    Another disadvantage is that the algorithm might need an extended computing time
    to process real-time predictions. Random forests are quick when training, but
    they are slow when producing predictions once the training phase is over. To make
    things worse, the more accuracy we want, the more trees we will have to add.


    Generally random forests are fast enough for most real-world situations, but in
    some situations runtime delays are not desired. But they are efficient enough,
    even when you don’t properly optimize them.


    Random forests are often used for prediction modeling, so you can’t use them as
    a descriptive tool. If you want data relationship descriptions, you will need
    another technique, like the ones we talked about earlier.


    ## STACKING ENSEMBLES


    Classic ensembles are similar in one way. We have multiple classifiers which are
    trained to fit a set of target labels. The models are then applied to produce
    a Meta function that includes other ensemble methods like averaging and boosting.
    An alternative to this is stacking, sometimes referred to as blending. We will
    talk about that instead.


    As we discussed, stacking is configuring layers of models so that the output of
    one is the training data for the next. We can do this for hundreds of layers without
    failure. We can go even further; we can have stacks of stacks. Then harvest the
    most successful parameters from one stacking ensemble and then apply them as Meta
    features within other stacks. It’s not dizzying if you take some time to imagine
    it.


    Stacking ensembles is much more efficient and powerful. Imagine a scenario where
    there are hundreds of features. Then we use stacking ensembles to improve the
    quality of our predictions. There are few things we will have to do:


    - 1. We can begin by leaving out some data while we train and optimize the ensemble.
    Before we apply the model to the test set, we can retrain and optimize it. This
    can give us great results.

    - 2. Then we use the root mean square error and gradient descent as a performance
    function. It’s best to use the root mean square of the ensemble, not the model.

    - 3. We can blend models that improve the residuals of other models alone. For
    instance, we can use a neighborhood approach to improve on residuals of an RBM.
    Knowing strengths and weaknesses of machine learning techniques can help you build
    superior configurations.

    - 4. Lastly, we can make k-fold cross-validation techniques to get residuals of
    our combinations.'
  mdcn: '## 第八章：集成方法


    在本章中，我们将聚焦于当前的技术以及如何利用集成方法来增强它们。顾名思义，集成方法正是如此。这些方法是将不同模型组合起来的技术。数据科学家和机器学习爱好者经常使用集成方法。它们在解决各种问题中发挥着关键作用，有助于提升性能等等。我们将探讨几种集成技术，并了解它们在现实世界中的应用。


    让我们看看机器学习中的集成。它涉及两个组成部分。第一部分是一组模型。第二部分是一套规则，告诉我们如何从各个模型中收集结果并将其合并为一个输出。集成允许我们为一个问题构建多个解决方案，然后将结果整合在一起。它汲取每个组件的优点。这意味着我们得出的解决方案更具抗噪性，从而带来更好的训练过程。这转化为更少的过拟合问题和训练误差。


    集成对机器学习技术产生了巨大影响，并为我们提供了前所未有的灵活性。由于这些变化，我们现在可以测试解决方案的片段或解决局部问题，而无需彻底改造整个模型。以下是集成方法的类型：


    - 1. **堆叠集成：** 多个分类器的加权输出成为下一个模型的输入。

    - 2. **平均集成：** 模型并行构建，并使用平均方法获得统一的估计器。

    - 3. **提升集成：** 模型按顺序构建，每个新增模型都致力于提升统一估计器的得分。


    让我们更详细地讨论每一种。


    ## 平均集成


    平均集成广泛应用于音频处理和统计建模等多个领域。它们几乎总是被解释为某些系统的可重现案例。其核心思想是，给定系统内的平均值以及案例之间的方差，是整个系统最重要的值。


    在机器学习中，平均集成是从相同数据集训练的一组模型。然后对结果进行聚合。这有几个优点。首先，集成减少了模型性能的波动。一个流行的平均集成集合被称为随机森林。


    让我们稍微深入了解一下。


    ### 使用随机森林


    随机森林算法深受数据科学家喜爱，因为它通常能给出出色的结果，而且非常简单。它用于构建并行的决策树分类器。这意味着它可以用于分类操作和回归。


    它创建了一个由决策树集成组成的随机“森林”。决策树是决策或决策过程的可视化表示，常用于机器学习和数据挖掘。


    这个森林拥有多样的决策树，因为在分类器的构建过程中至少引入了两个随机性来源。每棵树都是通过从训练数据集中进行有放回抽样得到的数据构建的。决策树的构建过程是从所有特征中选择最佳分割点，而不是从特征子集中选择。让我们使用
    Scikit-learn 的 RandomForestClassifier，如下所示：


    ```python

    import numpy as np

    from sklearn.ensemble import RandomForestClassifier

    from sklearn.datasets import load_digits

    from sklearn.preprocessing import scale


    digits = load_digits()

    data = scale(digits.data)

    n_samples, n_features = data.shape

    n_digits = len(np.unique(digits.target))

    labels = digits.target


    clf = RandomForestClassifier(n_estimators=10)

    clf = clf.fit(data, labels)

    scores = clf.score(data, labels)


    print(scores)

    ```


    输出将是 0.999。你无法再提高这样的分数了。回顾一下我们在本书中使用的模型，你会发现没有一个能达到如此高的分数。请记住，即使你构建了一个糟糕的随机森林，你得到的结果仍然会比大多数方法要好。


    让我们看看一个略有不同的随机森林。它被称为随机化树。它的工作原理与随机森林类似，但也随机化了判别阈值。换句话说，在决策树进行分割的地方，类别在随机值处被随机化。


    请注意，训练决策树是一个高效的过程。任何随机森林算法都能够处理大量的树；随着树数量的增加，我们得到更多的节点，从而获得更有效的分类器。随机性方面有助于我们限制噪声。


    让我们看一个例子。下面我们使用 Scikit-learn 的 ExtraTreesClassifier：


    ```python

    from sklearn.cross_validation import cross_val_score

    from sklearn.ensemble import RandomForestClassifier

    from sklearn.ensemble import ExtraTreesClassifier

    from sklearn.tree import DecisionTreeClassifier

    from sklearn.datasets import load_digits

    from sklearn.preprocessing import scale


    digits = load_digits()

    data = scale(digits.data)

    X = data

    y = digits.target


    clf = DecisionTreeClassifier(max_depth=None, min_samples_split=1, random_state=0)

    scores = cross_val_score(clf, X, y)

    print(scores)


    clf = RandomForestClassifier(n_estimators=10, max_depth=None, min_samples_split=1,
    random_state=0)

    scores = cross_val_score(clf, X, y)

    print(scores)


    clf = ExtraTreesClassifier(n_estimators=10, max_depth=None, min_samples_split=1,
    random_state=0)

    scores = cross_val_score(clf, X, y)

    print(scores)

    ```


    我们得到的分数大致如下：


    | [0.82035783, 0.74262381, 0.75488341] |

    |---|

    | [0.9015025, 0.8918286, 0.88352197] |

    | [0.93388139, 0.91798342, 0.91789423] |


    分数代表了正确标记案例的比例。我们可以得出结论，随机森林和随机化树将为我们提供非常强大的结果。在这两种情况下，我们都发现分数高于 0.9。


    有一个缺点。在使用随机森林时，很难看出实现的有效性。随着森林规模的增大，难度也会增加。小型森林和单个森林更容易处理。


    另一个缺点是，该算法可能需要较长的计算时间来处理实时预测。随机森林在训练时很快，但在训练阶段结束后进行预测时却很慢。更糟糕的是，我们想要的精度越高，就需要添加越多的树。


    总的来说，随机森林对于大多数现实世界的情况来说足够快，但在某些情况下，运行时延迟是不希望出现的。但即使你没有正确优化它们，它们也足够高效。


    随机森林通常用于预测建模，因此你不能将它们用作描述性工具。如果你想要数据关系的描述，你需要另一种技术，比如我们之前讨论过的那些。


    ## 堆叠集成


    经典集成在某一方面是相似的。我们有多个分类器被训练来拟合一组目标标签。然后将这些模型应用于产生一个元函数，该函数包含其他集成方法，如平均和提升。堆叠是另一种选择，有时也称为混合。我们将讨论堆叠。


    正如我们所讨论的，堆叠是配置模型层，使得一层的输出成为下一层的训练数据。我们可以这样做数百层而不会失败。我们可以更进一步；我们可以有堆叠的堆叠。然后从一个堆叠集成中提取最成功的参数，并将它们作为元特征应用于其他堆叠中。如果你花点时间想象一下，这并不令人头晕。


    堆叠集成更加高效和强大。想象一个场景，其中有数百个特征。然后我们使用堆叠集成来提高预测质量。我们需要做几件事：


    - 1. 我们可以在训练和优化集成时首先留出一些数据。在将模型应用于测试集之前，我们可以重新训练和优化它。这可以给我们带来很好的结果。

    - 2. 然后我们使用均方根误差和梯度下降作为性能函数。最好使用集成的均方根，而不是模型的。

    - 3. 我们可以混合那些能够单独改善其他模型残差的模型。例如，我们可以使用邻域方法来改善受限玻尔兹曼机的残差。了解机器学习技术的优缺点可以帮助你构建更优的配置。

    - 4. 最后，我们可以使用 k 折交叉验证技术来获得我们组合的残差。'

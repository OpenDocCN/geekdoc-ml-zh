- md: "You might be tempted to think we should manually label all the data. While\
    \ we can do that, it might take a while to do that, especially when the dataset\
    \ is big. But also, manually tagging will also lead to some errors because humans\
    \ often make mistakes. The alternative, which is both efficient and less error\
    \ prone, is semi-supervised learning. It involves labeling untagged data by getting\
    \ the structure of underlying distributions.\n\nSemi-supervised learning is perhaps\
    \ the most popular method used for this problem because of its efficiency when\
    \ annotating. It is especially useful when dealing with natural language processing\
    \ and complex audio analysis. Manual annotation is often time-consuming and ineffective.\
    \ It often requires a lot of manual labor and specialized expertise. In this chapter\
    \ we will discuss semi-supervised learning techniques, like self-learning and\
    \ the contrastive pessimistic likelihood estimation. You will learn how to use\
    \ Python libraries to label complex datasets. You will also learn about some of\
    \ the disadvantages that come with using semi-supervised learning.\n\n## UNDERSTANDING\
    \ THE TECHNIQUES\n\nDatasets rarely come with class tags. That means we need a\
    \ trained classification technique to get a class label. However, the training\
    \ cannot be performed without labelling the data to begin with. This is clearly\
    \ a problem. You can do the tagging manually, but as we have already said, it\
    \ will take a significant amount of time, and there is a high chance of some errors\
    \ creeping in. Imagine you had to organize and process medical data. How difficult\
    \ would it be to do that without human error? It would be very hard. This is why\
    \ semi-supervised learning is so useful.\n\nWe come up with semi-supervised learning\
    \ capabilities by working with labeled and unlabeled data, together or separately.\
    \ There is a category of learning methods that sit between supervised and unsupervised\
    \ learning. They are called semi-supervised learning. There are a bunch of methods\
    \ that belong in this category, like active learning techniques and transductive\
    \ learning techniques. What these methods have in common is that they save a set\
    \ of test data from the training phase, to be performed later.\n\nIn transductive\
    \ learning, we don’t have a testing process because it creates labels with unlabeled\
    \ data. If there isn’t any labeled data to use, transductive techniques don’t\
    \ have to implement the testing process.\n\nNow that we have explored semi-learning\
    \ techniques in general, we should discuss them in a bit more detail with linear-regression\
    \ classifiers, support-vector machines and more. Let’s start with the most basic\
    \ learning technique: self-learning.\n\n## SELF-LEARNING\n\nThe semi-learning,\
    \ semi-supervised method is considered the most basic and simplistic, but it can\
    \ still be efficient and fast. There are many practical applications for this\
    \ method: we find them in areas like natural language processing, computer vision\
    \ and others.\n\nThis semi-supervised learning method might be considered basic\
    \ and simplistic; however, it has the potential to be fast and efficient. There\
    \ are many practical applications of self-learning, and we encounter them in such\
    \ areas as natural language processing and computer vision.\n\nComputer vision\
    \ is about training computers to have a high understanding of digital image data.\
    \ The aim is to give computers the ability to see in the very same way that human\
    \ beings can by mimicking a human being's visual system. Natural language processing\
    \ is about teaching computers to process language. This involves teaching computers\
    \ to hear verbal communication or read and respond to text. Voice assistants are\
    \ examples of natural language processing. So are chatbots that have become popular\
    \ on most online stores.\n\nWhen we use self-learning, we can get a lot of value,\
    \ but that is not always without risk. Self-learning is about identifying unlabeled\
    \ data by sorting data from unlabeled cases with labeled cases until we have a\
    \ fully labeled dataset.\n\nHow is self-learning applied? Usually, it is set at\
    \ the wrapper to the base model, like the support-vector machine. To apply the\
    \ algorithm correctly, simple instructions are followed:\n\nFirst, we use labeled\
    \ data to determine the labels of the unlabeled data and calculate confidence\
    \ for the newly labeled cases. Then the newly labeled cases are chosen for a following\
    \ iteration. The model trains itself from the total number of labeled cases, regardless\
    \ of the iteration of origin. This process is repeated until the model converges\
    \ with success. When training is done, testing and validation processes begin;\
    \ these are normally performed through cross-validation.\n\nI have said that self-learning,\
    \ despite its benefits, can be risky to implement. To minimize risk, you need\
    \ to know how the algorithm works and how to apply it.\n\n### Implementation\n\
    \nIn our discussion of the self-learning implementation, we are going to use code\
    \ in the semisup-learn GitHub repository. The code is free to clone or download.\n\
    \nThe first thing we need to do is generate labels for unlabeled cases. To this,\
    \ we define a “SelfLearningModel” class which will have a “basemodel” with iterating\
    \ limiting arguments. Iteration limits are usually given as a function of convergence.\
    \ We will have a “prob_threshold” parameter which will regulate the minimal desired\
    \ quality for the label acceptance. That means, if we have a label that isn’t\
    \ hitting the required value as defined by the minimal-quality parameter, it will\
    \ be dismissed.\n\nLet’s define our “SelfLearningModel” class with the code below:\n\
    \n```python\nclass SelfLearningModel(BaseEstimator):\n    def __init__(self, basemodel,\
    \ max_iter=200, prob_threshold=0.8):\n        self.model = basemodel\n       \
    \ self.max_iter = max_iter\n        self.prob_threshold = prob_threshold\n```\n\
    \nNext, we define the fitting functions we need:\n\n```python\ndef fit(self, X,\

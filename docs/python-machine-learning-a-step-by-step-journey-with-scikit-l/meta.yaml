  md: '# UNDERSTANDING THE ARCHITECTURE


    The topology of CNNs is the same as that of a multi-layer perceptron. A multi-layer
    perceptron acyclic graph is constructed with layers made up of a few nodes where
    each layer communicates with the next.


    It’s worth mentioning that this type of a neural net has identical neurons.It’s
    an important difference, because it means we have identical parameters and weight
    values. This makes CNNs super-efficient because fewer values need computing. Another
    important difference is that the nodes have limited communication, meaning the
    inputs are not locally connected to neighboring nodes.


    # Layers


    Like we’ve mentioned, weights should be shared on the whole layer toavoid unpredictable
    node parameters. We then have a filter made up of fourparameters that is applied
    to the layer to create a feature map. Those four filter parameters are known as
    hyper-parameters. Hyper-parameters represent size, depth, stride and zero-padding.


    Size is arrived at by calculating the filter’s surface area. The filter''s size
    will have an impact on the output, making it important to control the output so
    that we have an efficient network. It’s worth noting that sizable filters often
    overlap, but it is not as bad as it sounds, since it can lead to better accuracy
    rates.'
  merge: -1
  pgno: 49
- img_proc: true
  md: 'The filter depth is about the nodes we have in a layer, and how many connect
    in the same area around the input. We might be talking about images, but when
    we are discussing depth, we are not referring to any image content. If you have
    worked with any image editing software, you know what color channels are. Color
    channels are needed to describe the content of an image. Our neural nodes are
    mapped so they can see red, green and blue color channels. That is why filter
    depth is almost always set to 3. Increasing it will give us more data about the
    image and including properties that are difficult to learn. Conversely, setting
    a lower depth will give us weak results.


    The third filter parameter is the stride. The stride values give us the space
    between neurons. If we are working with an image and our stride is equal to 1,
    we will set each pixel as the center of the filter. This will result in output
    increase and an increase in layer overlap. In that situation we can increase the
    stride value to minimize overlap; if we do this, the outputs will also be reduced
    in size. Fine tuning is all about aiming for a balance between accuracy and size,
    but that will depend on your aims. In most situations, lower values will be ideal.


    The fourth and final filter parameter will reduce a layer’s output size. Zero-
    padding sets the border values of the receptive field to 0. When it comes to CNNs,
    receptive fields are the input space that have effect over units that are part
    of the network. It’s important to ensure that all areas are covered by the filter
    before you set zero-padding. One of the advantages of a zero- padding setup is
    being able to adjust inputs and outputs so they have an identical size. Making
    the input and output have an equal size is standard practice because it allows
    us to adjust depth and stride parameters efficiently. Without zero-padding, seeing
    up parameters'

- img_proc: true
  md: '# CONTRASTIVE PESSIMISTIC LIKELIHOOD ESTIMATION


    To fix many of the problems we encountered with a basic self-learning algorithm,
    we use subsetting and tracking performance of datasets, but this is not an option
    in some circumstances. This is even though self-learning works great when dealing
    with complex datasets. The methods we have used to deal with our problems are
    also very difficult to work with, especially when it comes to certain types of
    data like medical and scientific datasets.


    In some cases, self-learning classifiers can be exceeded by their supervised learning
    counterparts. What’s worse is that supervised learning techniques are more accurate
    when faced with more data. In contrast, the self-learning algorithms we are using
    lose their accuracy and perform poorly the more data is added. That is exactly
    why we need new ways of doing things. So, to get the benefits of self-learning
    algorithms while also gaining the benefits that come from supervised learning,
    we use semi-supervised learning. That will help us build a more efficient and
    accurate system.


    The new approach to self-learning we will discuss is called contrastive pessimistic
    likelihood estimation, or CPLE for short. Label predictions created through CPLE
    are superior to those produced through supervised and semi-supervised classifiers.
    Now let''s talk about why CPLE works.'
  merge: -1
  pgno: 82
- img_proc: true
  md: 'CPLE uses the maximized log-likelihood measure when optimizing parameters.
    This is one of the main reasons behind CPLE’s efficiency. To build a semi-supervised
    trainer to beat supervised versions, CPLE is used to register the supervised estimate.
    The loss that is found between the two learning models is used as a training performance
    measure.


    In other words, the classifier performs a calculation of the improvement of a
    semi-supervised learning estimation over the supervised estimation. If the supervised
    method prevails and performs better than its semi-supervised counterpart, then
    the function will show us this result, and the model will be trained to make corrections
    to the semi-supervised model and diminish losses. However, if the semi-supervised
    method proves to be superior to its supervised counterpart, then the model will
    adjust the model parameters and learn from the semi-supervised classifier.


    Like any method, CPLE also has its own drawbacks. Firstly, CPLE will not have
    access to posterior distribution, which is needed to calculate loss, because there
    are no data levels in semi-supervised solutions. CPLE is a pessimistic algorithm
    that takes Cartesian out of the predication combinations and selects the posterior
    distribution that will secure a minimized gain in likelihood. The results are
    exactly what we want. We get the accuracy of supervised learning with the efficiency
    of semi-supervised learning. We will experience good performance while testing.
    As an added benefit, we have an advantage over highly complex and challenging
    unsupervised solutions where labeled data is a weak representation of unlabeled
    data.'

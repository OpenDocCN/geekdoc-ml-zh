    # AUTOENCODERS


    Autoencoders have a number of similarities to restricted Boltzmann machines. In
    some cases, RBMs are replaced by autoencoders if they aren’t performing well.
    But what are autoencoders?


    Autoencoders are neural networks with a three-layer structure where outputs are
    connected to inputs. Autoencoders are built to learn the encoding/representation
    for dimensionality reduction. The reduction is achieved by ignoring signal noise.
    However, that is only a part of it; the other thing they do is reconstruct. Reconstruction
    is where reduced representation is taken, and we build up the encoding to be the
    same as the input we started with. Simply, the autoencoder compresses data from
    the input layer and then uncompresses it to match the original data. This is so
    dimensionality reduction is done and to ignore data noise.


    For instance, we can use an autoencoder to work on image recognition. We encode
    basic image data like corners by taking from the encoding layer. Thesecond encoding
    layer will process the output from the first layer and encode remaining features.
    Those features might be something like the iris of an eye. The third layer will
    encode the rest of the eye, until the image code matches the image representation.
    In the end, all that data will be decoded, by the layers, back into the original
    data.


    We’ve talked about dimensionality reduction methods like the PCA. Autoencoders
    play the same role as PCAs. The question becomes: Why use autoencoders if we already
    have a method that works well? The answer is simple. It will all depend on the
    data you are working with. PCA is not effective when working with high-dimensional
    data, but autoencoders work well with high-dimensional data. Autoencoders are
    more advanced ways of applying noise'
  - '[PAGE 57]


    reductions and stacking methods. That is why they are good at working with complex
    data at large scales while being accurate.

    Now you know a bit about autoencoders. Let’s look at their architecture so you
    understand how they are implemented.


    # **Structure and Learning**


    Autoencoders have a straightforward architecture. We have the typical three-layer
    neural net topology with the input, hidden and output layer. Just like with all
    other topologies, the input layer’s data goes to the hidden layer,and from there
    it goes to the output layer. What makes autoencoders unique is the small number
    of nodes in the hidden layer compared to the input and output layers.

    One striking feature is that the output is set as the input. That is because,
    after encoding input in the hidden layers, it relies on the accuracy to reconstruct
    it. Below is an example of the encoding:


    ```

    y = s(Wx + b)

    ```


    In the example above, the encoding is performed by mapping the “x” input to a
    new version of itself. That new version is “y.” The “W” stands for the weight
    value that is attached to the “x” and “b” adjustable variable. Variable adjustments
    are very important because they can help us limit errors in reconstruction.

    Let’s have a look at the learning process. When autoencoders train, they rely
    on low reconstruction error to be as efficient and accurate as possible. Errors
    can be measured using the following formula:


    ```

    E = 1/2 || z- x || 2

    ```'

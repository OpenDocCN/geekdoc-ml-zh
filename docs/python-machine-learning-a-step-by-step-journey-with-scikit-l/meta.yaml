    \n堆叠去噪自编码器的使用方式类似于 RBM。每一层将由一个去噪自编码器和一个 sigmoid 元素组成。该自编码器将用于整个 sigmoid 网络的预训练过程。\n\
    \n使用堆叠去噪自编码器时，我们使用训练集误差作为性能度量。该过程涉及逐层预训练。这是因为我们需要网络参数在优化过程之前对齐。当微调开始时，我们需要测试和验证数据来训练网络。这个过程在少量的\

    # # THE RESTRICTED BOLTZMANN MACHINE


    As we already established, the Boltzmann machine is a stochastic, recurrent neural
    network where all neural nodes are interconnected, allowing outputs to constantly
    change. Boltzmann machines use models based on energy. That means, in the Boltzmann
    machine, there is an energy function that attaches an energy value to every network
    configuration. Energy is the Boltzmann machine’s performance measure; it is used
    to update the network’s stored parameters. The aim is to reduce the network’s
    free energy.


    The Boltzmann machine’s disadvantage comes when dealing with complex machine learning
    problems. That is because it has a scaling issue; the more nodes it has, the higher
    the computing time. If that goes on, we’ll reach a point where the network’s free
    energy cannot be processed. The only way to stop this from happening is by changing
    the network''s architecture and training process.


    # ## Topology


    The network''s efficiency can be improved by restricting connections between all
    nodes in the network. Although this is a big architecturalchange, it solves our
    problems.


    You begin by preventing connections between nodes in the same layer. Then remove
    communication between layers that are not next to each other. In fact this is
    what is meant by the restricted Boltzmann machine. When restricting connectivity,'
  - '[PAGE 29]


    independence is observed between visible and hidden layers, minimizing weaknesses.


    # Training


    As we have mentioned, the more nodes that are added to Boltzmann machines, the
    longer training time will take because of scaling issues.


    The most popular training method for Boltzmann machines is the permanent contrastive
    divergence (PCD). PCD allows us to determine the gradient of the energy function.


    The algorithm has two phases: positive and negative. The positive phase lowers
    the energy value by increasing the training set’s probability, while the negative
    phase determines the negative phase gradient and decreases probability by sampling.
    The negative phase uses a type of sampling known as Gibbs sampling.


    Some of you might wonder if we really need a PCD algorithm. You might ask yourself
    why we don’t use gradient descent instead, just like we did before. It’s about
    the disadvantage of the Boltzmann machine. Depending on the number of nodes, calculating
    free energy gobbles up a lot of computing power. Our goal is to reduce a function
    that has an unknowable value. The PCD algorithm happens to be good at that. It
    gives us a method for calculating the energy gradient, allowing us to make the
    best estimation of the free energy value that will be viable to compute.



- img_proc: true
  md: 'As you might have noticed, in certain situations you may need techniques that
    work with one specific type of data. Luckily there is a process that allows us
    to develop features that can make any machine learning algorithm work with a dataset
    instead of just one technique.


    Every technique we worked with until now didn’t involve any feature engineering,
    at least not at an advanced level. But feature engineering is an important skill
    for any machine learning practitioner to have.


    Feature engineering is so powerful that, even if it is applied in small doses,
    it can have a massive impact on classifiers. And many situations using feature
    engineering are unavoidable, because it helps us produce the best possible results.
    Why settle for okay when you can get the best? Efficiency and performance are
    always on top of our most important goals.


    In this chapter we will focus on the techniques used commonly for textual data,
    and then build an understanding of how everything works. So far, we have dealt
    with general techniques that can’t be used effectively with no- numerical data.
    Whenever we deal with textual data, we need to develop methods that will deal
    with that specific problem; this is where feature engineering comes in. We concentrate
    on feature preparation and cleaning methods.'

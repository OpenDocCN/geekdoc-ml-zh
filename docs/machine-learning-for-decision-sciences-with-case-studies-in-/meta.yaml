    $$

    set 1 = \begin{bmatrix} a_{11} & a_{12} \\ a_{21} & a_{22} \\ \vdots & \vdots
    \\ \vdots & \vdots \\ a_{m1} & a_{m2} \end{bmatrix} \quad set 2 = \begin{bmatrix}
    b_{11} & b_{12} \\ b_{21} & b_{22} \\ \vdots & \vdots \\ \vdots & \vdots \\ b_{m1}
    & b_{m2} \end{bmatrix} \quad (7.10)


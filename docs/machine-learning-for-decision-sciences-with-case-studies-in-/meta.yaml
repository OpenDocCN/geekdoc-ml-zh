    ## 7.8 线性判别分析


    线性判别分析（LDA）是降维问题中的一种常用方法，作为机器学习和模式分类应用的预处理步骤。同时，它常被用作黑盒，但有时其原理并未被充分理解。LDA能够轻松处理一个区域内波形不均匀的情况，并通过随机生成的测试数据来评估其性能。这种方法在任何数据集中都能提高类间方差与类内方差的比率，从而确保高区分度。在PCA中，原始数据集的结构和位置在转换到独立空间时会发生改变。而LDA不改变位置，只尝试提供额外的分割，并在指定类别之间绘制决策区域。这种方法也有助于更好地理解特征数据的分布。数据集可以被修改，并且测试向量可以通过两种不同的方式从转换空间中分离出来。


    - **类别相关转换：** 这种方法旨在最大化类间方差与类内方差的比率。其主要目标是最大化这个比率，以获得足够的类别可分性。这种类别特定类型的方法使用两个优化标准来独立地转换数据集。

    - **类别无关转换：** 这种方法旨在最大化总体方差与类内方差的比率。这种方法只使用一个优化标准来转换数据集，因此所有数据点，无论其类别身份如何，都使用此转换进行变换。在这种类型的LDA中，每个类别都被视为一个独立的类别，与其他所有类别相对立。



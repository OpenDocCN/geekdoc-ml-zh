    ### 6.4.9 REGRESSION USING DECISION TREE


    Decision tree regression extracts the features of the object and trains the model
    to predict the data. The topmost node represents the root node, and the final
    node represents the leaf node. A decision node has two or more sub-branches that
    represent the value to be tested. The regression tree will predict the value.


    Consider the following example for the regression tree. A medical company produces
    a drug for the cold, and they have to determine a dosage of medicine. The medicine
    is given for different dosages, and effectiveness is predicted by using a regression
    tree.


    It''s difficult to solve the data in Figure 6.46 using linear regression. So it
    can be solved by using a non-regression tree. A regression tree classification
    is done using numeric values, while in a classification tree, the data are classified
    using true or false conditions. The above decision tree has low effectiveness
    for low dosage and high dosage. Introduce good results for medium dosage. The
    regression tree starts if the dosage is <14.5 mL. The six samples belong to the
    dosage <14.5 mL, and they have 4.2% of dosage effectiveness (Figure 6.47).


    A dosage value >29 mL has 2.5% dosage effectiveness. The medium dosage has 52.8%
    effectiveness. A dosage value >23.5 mL has 100% dosage effectiveness. The corresponding
    decision tree is shown in Figure 6.48.


    A regression tree is used for the prediction. In Figure 6.49, a regression decision
    tree is constructed for the iris flower. Data are divided into the root node based
    on the condition x1 ≥ 0.1973. Again, the data are divided further until it reaches
    the leaf node. Suppose if you want to predict the value 0.71, it traverses along

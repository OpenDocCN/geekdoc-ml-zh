    FIGURE 4.19 Illustration for density-reachable.


    **Density reachable:** The two variants of density-reachable are directly and
    indirectly density-reachable. As shown in Figure 4.19, data point d is directly
    density-reachable from data point c. Point c is directly density-reachable from
    b. Similarly, point b is directly density-reachable from a. Chain of objects from
    data point d to data point a is directly density-reachable.


    **Density-connected:** Data point a is density-connected to the point c if there
    is an intermediate data object b from which both a and b are density-reachable.


    # 4.8.2 SPACE AND TIME COMPLEXITY


    Time complexity is $O(n^2)$ for each data point; it has to be determined whether
    it is a core point or not. Therefore, space complexity is $O(n)$.


    # 4.8.3 ADVANTAGES AND DISADVANTAGES OF DBSCAN


    # 4.8.3.1 Advantages


    It can handle outliers and noise.

    It works well for any shape and size.


    # 4.8.3.2 Disadvantages


    It cannot handle varying densities and is sensitive to parameters.

    Identifying the correct value for the parameter is not easy.'

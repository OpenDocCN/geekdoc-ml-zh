  md: '# # 1 Introduction


    # ## LEARNING OBJECTIVES


    At the end of this chapter, the reader will be able to


    +   - Understand the need for data science and machine learning (ML) in a real-world
    scenario.

    - Appreciate the fundamentals of ML and deep learning.

    - Describe structural patterns and understand their variants.

    - Know the key roles of a data scientist for solving practical problems.

    - Identify the real-world application areas of ML models.


    # ## 1.1 INTRODUCTION TO DATA SCIENCE


    The process of considering the algorithm and coding it with the help of a programming
    language can be executed by the computer. IT world has made people’s life easier
    by providing helpful software. A design pattern provides a general refusal solution
    to the common problems that usually occur in software design. The patterns identify
    the connections between classes and objects. The primary purpose of patterns is
    to boost the performance of the development process. This chapter will understand
    the need for data science and machine learning (ML) in real-world scenarios, highlight
    the basics of ML and deep learning (DL), know how to describe structural patterns,
    and understand their variants. In addition, a detailed description of the key
    role of a data scientist in solving real-world applications is highlighted. Several
    areas in which ML algorithms are applied are also illustrated.


    Data science is a part of software engineering in which we study where the information
    comes from and its organization. It represents how we can turn the valuable resources
    in the initialization of any business and the information technology strategies.
    Data science allows mining a large amount of data that helps to identify the patterns
    for any organization’s efficiencies. There are some fields of data science: statistics,
    disciplines of computer science, data visualization, and data mining. Data scientists
    possess a combination of ML and analytic and statistical skills and experience
    in coding and algorithms. Data science is everywhere in today’s world. Let’s imagine
    that you are traveling to a new city. The user can search for some tourist places,
    restaurants, parks, hotels, etc., with just one click. How is this possible? It’s
    the data science that saves and displays the results on your phone screen in a
    few seconds.


    # ### 1.1.1 MATHEMATICS


    Mathematics is everywhere around us, from counting money, temperature calculation,
    shapes, etc. Data science and mathematics have a strong relation in all the decision-making
    processes like predicting the routes and searching for the best possible answer.
    All these tasks are incomplete without mathematics. Data science uses ML algorithms
    for decision-making processes.


    # ### 1.1.2 STATISTICS


    Data science is nothing without statistics, and data scientists require a graphical
    representation of the data with less theory. Business providers prefer data visualization
    like a bar chart as it becomes easier to evaluate the data and gain more information.'

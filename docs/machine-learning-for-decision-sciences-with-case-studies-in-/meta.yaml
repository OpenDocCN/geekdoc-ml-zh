    # TABLE 6.5

    Churn Prediction


    | Variable | Value | Type |

    | :--- | :--- | :--- |

    | Customer (y) | 0 – new customers<br>1 – existing customer<br>2 – churn customer
    | Discrete, multiclass |

    | Customer service (x₁) | 1 – satisfied<br>0 – not satisfied | Discrete, binary
    value |


    where *e* is that the base of the natural logarithms (Euler’s number or the EXP()
    function in your spreadsheet) and value is that the particular numerical value
    that you just simply want to remodel. Below might be a plot of the numbers between
    –5 and 5 transformed between the range 0 and 1 using the logistic function.


    Logistic regression could also be a linear method, but the predictions are transformed
    using the logistic function. The impact of this is often that we will not understand
    the predictions as a linear combination of the inputs as we will with linear regression;
    for instance, continuing from the above, the model is often stated as


    $$p(X) = e^{\wedge}(b_0+b_1X) / (1+e^{\wedge}(b_0+b_1X))$$


    We don’t want to dive into the math an excessive amount, but we will rotate the
    above equation as follows (remove the exponent term by adding a logarithm (ln)
    to the other):


    $$\ln(p(X)/1-p(X)) = b_0 + b_1 * X$$


    This is beneficial since we’ll notice that the output on the right is calculated
    linearly again (just like linear regression), and the input on the left might
    be a log of the default class’s probability. This ratio on the left is known as
    the default class’s chances (we’ve always used odds instead of probabilities;
    for example, odds are used in horse racing instead of probabilities). Odds are
    calculated as a ratio of the probability of an event divided by the probability
    of not occurring; for example, 0.8/(1 – 0.8) has a probability of 4. So instead,
    we could write:


    $$\ln(\text{odds}) = b_0 + b_1 * X$$


    We call this left side the log-odds or the probit since the chances are log-converted.
    Of course, other types of functions can be used for the transform (which is beyond
    the scope of this article). Still, it’s customary to ask for the transformation
    that relates the linear regression equation to the probabilities due to the link
    function, such as the probit link function. Then, we can return the exponent to
    its appropriate place and express it as


    $$\text{odds} = e^{\wedge}(b_0 + b_1 * X)$$


    All of this lets us see that the model is still a linear combination of inputs
    but that this linear combination is related to the default class’s log-odds. For
    explaining the logistic regression, we will be using a sample dataset called the
    Titanic dataset. Our goal is to predict, -the values for the variables (Pclass
    – Passenger class of travel, Name of the passenger, gender of the passenger, Age
    of the passenger, If they are related to any of other passengers – (like a spouse,
    sibling, or parent/child of another passenger and the fare paid) – if the person
    could have survived in the titanic mishap.'

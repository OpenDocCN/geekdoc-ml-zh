    # 6.4.5.2 C 4.5 Algorithm


    C 4.5 algorithm is used to generate decision tree, and it''s developed by Ross
    Quinlan. It is an extension of the ID3 algorithm. The decision tree developed
    by using C 4.5 is used for classifications; it is called a statistical classifier.
    The data are split by using the gain ratio. The attributes having the highest
    gain ratio are used as root nodes. The C 4.5 is similar to the ID3 algorithm,
    but additionally, normalization is applied in this algorithm.


    Gain ratio = Gain of the attribute/Splitinfo(A).


    Splitinfo(A) = $\sum_{j} \frac{D_j}{D} \log_2 \left( \frac{D_j}{D} \right)$ (6.19)


    # 6.4.5.3 CART Algorithm


    CART represents the classification and regression tree algorithm. Breiman discovered
    this algorithm in 1984. It''s a simple binary tree where a tree has one root node
    and two child nodes. This algorithm can be used in classification and regression
    problems. The classification is done by using the Gini index. The Gini index represents
    the squared probability of each class.


    Gini index = $1 - \sum_{k=0}^{n} p^2$ (6.20)


    where $n$ represents the number of probabilities.


    # 6.4.6 OVERFITTING AND UNDERFITTING


    Overfitting is the phenomenon in which the learning process matches exactly with
    all the training data. As a result, the model''s accuracy is high for trained
    data and low for untrained data. Overfitting (Figure 6.14) occurs in decision
    trees when the tree is designed to fit all samples in the training dataset perfectly.
    Underfitting occurs when the training model does not capture the underlying pattern.
    Underfitting (Figure 6.14) is destroying the accuracy of our model of ML.


    # 6.4.6.1 Overfitting


    +   - Overfitting is a scenario in which the system is learned with the entire
    training data.

    - It results in an inaccurate prediction of the data.

    - Overfitting can be solved by using pruning (i.e., remove the decision node from
    the leaf node without reducing the accuracy).'

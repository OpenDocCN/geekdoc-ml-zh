    Another technique to clean and enrich the data is typecasting. It is the technique
    to convert the data into a different type than the source data. For example, a
    variable in the source data may be coded as string/character even though the permissible
    values in the variable are only numeric (integers and float types). Simply put,
    typecasting is converting one data type to another. There are basic functions
    that are int(), string(), and float(), and they are used for typecasting. Int()
    function is used for integer literal, and float() is for decimal numbers. In python,
    it is very straightforward to convert from one data type to another.


    ```

    Here is the code snippet -

    x=float(2)

    y=float(30.0)

    z=float("20")

    print(x)

    print(y)

    print(z)

    ```'

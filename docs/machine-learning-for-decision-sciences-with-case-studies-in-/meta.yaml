    \ sort by comparing elements separated by a gap of several positions. This algorithm\
    \ uses insertion sort on the large interval of elements to sort. Further, the\
    \ interval keeps on decreasing until the value becomes 1. These intervals are\
    \ referred to as the gap sequences. Thus, the algorithm allows sorting different\
    \ combinations of smaller gap sizes through multiple passes. The array is almost\
    \ sorted by the time the algorithm reaches its termination, so a normal insertion\
    \ sort would be sufficient to get the sorted list. The algorithm of shell sort\
    \ is explained with a flowchart as shown in Figure 2.21.\n\n## 2.4.5.19 Quicksort\n\
    \nQuicksort is one of the efficient data structure algorithms based on partitioning\
    \ the array into smaller sub-arrays. First, a pivot value is chosen, and the partitioning\
    \ of a large array is done based on this value. Each sub-group of the array will\
    \ be holding values based on the pivot value. Once the array is partitioned, the\
    \ quicksort algorithm recursively calls itself to sort the sub-arrays. This algorithm\
    \ is efficient on large-sized data. Indices start from both ends of the array,\
    \ with one index starting from the left and the other starting from the right.\
    \ The left index selects the element smaller than the pivot, while the right index\
    \ selects the element larger than the pivot value. Then, these two selected elements\
    \ are compared and exchanged based on the comparison results. The process repeats\
    \ until all the elements to the left of the pivot and right of the pivot are compared.\
    \ Finally, the pivot value is also moved if required to maintain the sorted order.\
    \ The procedure of the algorithm is explained using a flowchart, as shown in Figure\
    \ 2.22.\n\n## 2.4.5.20 Data Structures in Python with Sample Codes\n\nThe purpose\

    ## Example 6.12


    Classify the given data points into two classes using SVM and find the optimal
    hyperplane


    | x | y | Label |

    |---|---|-------|

    | 1 | 1 | -ve |

    | 2 | 1 | -ve |

    | 1 | -1 | -ve |

    | 2 | -1 | -ve |

    | 4 | 0 | +ve |

    | 5 | 1 | +ve |

    | 5 | -1 | +ve |

    | 6 | 0 | +ve |


    First, let us plot the data points in a graph; negative points are marked as ‘-’,
    and positive points are marked as ‘+’, as given in Figure 6.110.


    There can be many possible hyperplanes, as shown in Figure 6.111, and the aim
    is to identify the optimal hyperplane.


    There are three support vectors (Figure 6.112), namely $S_1$, $S_2$, and $S_3$.


    $$S_1 = \begin{pmatrix} 2 & 1 \end{pmatrix}, S_2 = \begin{pmatrix} 2 & -1 \end{pmatrix},
    S_3 = \begin{pmatrix} 4 & 0 \end{pmatrix}$$


    Bias input is 1. So, augment the support vectors with the bias input, and then,
    $S_1$, $S_2$, and $S_3$ become $\widetilde{S_1}$, $\widetilde{S_2}$, $\widetilde{S_3}$
    as shown below.


    $$\widetilde{S_1} = \begin{pmatrix} 2 & 1 & 1 \end{pmatrix}, \widetilde{S_2} =
    \begin{pmatrix} 2 & -1 & 1 \end{pmatrix}, \widetilde{S_3} = \begin{pmatrix} 4
    & 0 & 1 \end{pmatrix}$$


    ## 6.110 Representation of data points.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_354_0.png)


    ## 6.111 Possible hyperplanes.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_355_0.png)


    ## 6.112 Support vectors representation.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_355_1.png)


    We need to find the three parameters $\alpha_1, \alpha_2$, and $\alpha_3$ based
    on the following three linear equations


    $$\alpha_1 \widetilde{S_1} \cdot \widetilde{S_1} + \alpha_2 \widetilde{S_2} \cdot
    \widetilde{S_1} + \alpha_3 \widetilde{S_3} \cdot \widetilde{S_1} = -1 \quad \text{(-ve
    class)}$$


    $$\alpha_1 \widetilde{S_1} \cdot \widetilde{S_2} + \alpha_2 \widetilde{S_2} \cdot
    \widetilde{S_2} + \alpha_3 \widetilde{S_3} \cdot \widetilde{S_2} = -1 \quad \text{(-ve
    class)}$$


    $$\alpha_1 \widetilde{S_1} \cdot \widetilde{S_3} + \alpha_2 \widetilde{S_2} \cdot
    \widetilde{S_3} + \alpha_3 \widetilde{S_3} \cdot \widetilde{S_3} = +1 \quad \text{(+ve
    class)}$$


    Let’s substitute $\widetilde{S_1}$, $\widetilde{S_2}$, $\widetilde{S_3}$ values
    in the above equations


    $$\alpha_1 \begin{pmatrix} 2 & 1 & 1 \end{pmatrix} \begin{pmatrix} 2 \\ 1 \\ 1
    \end{pmatrix} + \alpha_2 \begin{pmatrix} 2 & -1 & 1 \end{pmatrix} \begin{pmatrix}
    2 \\ 1 \\ 1 \end{pmatrix} + \alpha_3 \begin{pmatrix} 4 & 0 & 1 \end{pmatrix} \begin{pmatrix}
    2 \\ 1 \\ 1 \end{pmatrix} = -1$$

    $$\alpha_1 \begin{pmatrix} 2 & 1 & 1 \end{pmatrix} \begin{pmatrix} 2 \\ -1 \\
    1 \end{pmatrix} + \alpha_2 \begin{pmatrix} 2 & -1 & 1 \end{pmatrix} \begin{pmatrix}
    2 \\ -1 \\ 1 \end{pmatrix} + \alpha_3 \begin{pmatrix} 4 & 0 & 1 \end{pmatrix}
    \begin{pmatrix} 2 \\ -1 \\ 1 \end{pmatrix} = -1$$

    $$\alpha_1 \begin{pmatrix} 2 & 1 & 1 \end{pmatrix} \begin{pmatrix} 4 \\ 0 \\ 1
    \end{pmatrix} + \alpha_2 \begin{pmatrix} 2 & -1 & 1 \end{pmatrix} \begin{pmatrix}
    4 \\ 0 \\ 1 \end{pmatrix} + \alpha_3 \begin{pmatrix} 4 & 0 & 1 \end{pmatrix} \begin{pmatrix}
    4 \\ 0 \\ 1 \end{pmatrix} = +1$$


    After simplification, we get


    $$6\alpha_1 + 4\alpha_2 + 9\alpha_3 = -1$$

    $$4\alpha_1 + 6\alpha_2 + 9\alpha_3 = -1$$

    $$9\alpha_1 + 9\alpha_2 + 17\alpha_3 = 1$$


    After solving the above three simultaneous equations, we get


    $$\alpha_1 = \alpha_2 = -3.25 \quad \text{and} \quad \alpha_3 = 3.5$$


    The hyperplane that discriminates the two classes is given by


    $$\widetilde{w} = \sum_i \alpha_i S_i$$


    $$\widetilde{w} = -3.25 \begin{pmatrix} 2 & 1 & 1 \end{pmatrix} - 3.25 \begin{pmatrix}
    2 & -1 & 1 \end{pmatrix} + 3.5 \begin{pmatrix} 4 & 0 & 1 \end{pmatrix} = \begin{pmatrix}
    1 & 0 & -3 \end{pmatrix}$$


    Hence, we equate $y = wx + b$


    where $w = \begin{pmatrix} 1 & 0 \end{pmatrix}$ and $b = -3$, and the expected
    hyperplane for this linear SVM is shown in Figure 6.113.


    Most of the real-world data possess nonlinearity. Let’s consider an example in
    nonlinear data in one-dimensional space as in Figure 6.114.


    Convert them to higher-dimensional space by adding quadratic feature $x_2 = x_1^2$,
    which in turn makes the data linearly separable and is shown in Figure 6.115.


    The data that are not linearly separable will not be having a single hyperplane
    to separate them. The data point $x$ in the nonlinear model of feature space is
    mapped to the linear model of feature space $\emptyset(x)$. While mapping $x \rightarrow
    \emptyset(x)$, the computational cost becomes very high. We can achieve this transformation
    without any major hike in computational cost by using the kernel function in SVM.


    Figure 6.116a is not linearly separable, but when we transform these points to
    appropriate high-dimensional feature space, the points may become linearly separable,
    as shown in Figure 6.116b.



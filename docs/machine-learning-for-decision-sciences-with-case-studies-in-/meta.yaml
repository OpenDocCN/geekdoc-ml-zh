    ## 8 强化工程


    ### 学习目标


    本章结束后，读者将能够


    - 理解基于强化学习（RL）的目标导向学习

    - 领会强化学习与其他机器学习算法的区别

    - 了解强化学习的要素，如智能体、策略函数和价值函数

    - 掌握与价值函数、策略评估和改进相关的马尔可夫决策过程（MDP）和动态规划（DP）

    - 使用Python实现MDP和DP


    ### 8.1 引言


    当我们思考学习的本质时，获取关于处理周围环境信息的想法可能是首先想到的。新生儿在玩耍、摆弄手指或左右张望时，并没有明确的指导者；相反，它直接通过感官与自然接触。利用这种联系可以揭示大量关于因果关系、行动效果以及实现目标所需行动的信息。在我们的一生中，这种接触无疑是我们了解环境和自身的丰富信息来源。如果我们打算在小组中学习烹饪，我们确切知道我们的位置对我们的行为有何反应，并且我们需要预测我们的行为将导致什么结果。几乎所有关于学习和知识获取的理论都支持协作学习作为一个基本概念。在本书中，我们探讨如何使用计算方法从交互中学习。我们不直接考虑人类或动物如何学习，而是研究所调查的环境，并评估人工智能研究人员或工程师众多学习方法的有效性。我们研究数学分析和计算实验的结构，以设计能够有效解决具有科学或经济意义问题的机器。我们测试的方法称为强化学习，它比其他机器学习（ML）方法更侧重于从交互中进行目标导向学习。本章讨论基于强化学习（RL）的目标导向学习，以及RL与其他ML算法的不同之处。详细解释了RL的要素，如智能体、策略函数和价值函数，随后介绍了RL算法马尔可夫决策过程（MDP）和动态规划（DP）。通过在Python中实现MDP和DP，涵盖了价值函数、策略评估和改进。


    ### 8.2 强化学习


    RL是学习做什么的过程——如何将情境映射为行动——以提高数值奖励信号的价值。学习者不会被告知要遵循哪些步骤；相反，他必须确定哪些行动在尝试时能提供最高的奖励。在最激动人心和最困难的情况下，行动可能影响当前的奖励和下一个情境，从而影响所有后续的奖励。这是RL的两个最重要的部分：试错搜索和延迟奖励。


    RL，与其他以“ing”结尾的问题（如ML和攀爬）一样，既是一个问题，也是一类成功解决该问题的方案，同时还是研究该问题及其解决方案的学科。用一个词来描述所有这三个问题很诱人，但关键是要在脑海中区分这三个问题。此外，区分RL中的问题和解决方案尤为重要；未能表达这种区别会导致很多困惑。


    因此，我们设计一个RL问题，包括应用来自动态系统原理的概念，例如对马尔可夫完全匿名决策过程的完全控制。


    学习智能体必须在某种程度上感知其自然状态，并采取影响该状态的行动。此外，智能体在考虑环境状态时应有一个目标或一套原则。马尔可夫决策方法旨在以最基本的方式结合这三个变量——情感、行动和目的——而不损害其中任何一个。我们回忆起，任何解决此类问题的有效策略都是RL方法。RL不同于监督学习，后者是ML中正在进行的研究类型。


    监督学习基于由经验丰富的外部管理者作为培训计划一部分提供的分类示例。每个实例代表当前状况和程序在该情况下应执行的适当行动的特定标签，通常是将情况分配给一个类别。这种培训形式旨在使程序能够或整合其响应，以在训练集中未涵盖的情况下发挥最佳作用。这是学习知识的重要方法，但其本身并不足够。在协作问题中，找到期望行为的示例并表示智能体必须工作的所有环境通常是无效的。相反，智能体必须在未标记的区域中从其经验中研究，在那里人们期望学习最有价值。


    RL也不同于无监督学习，后者通常被机器学习研究人员用于发现隐藏在未标记信息中的结构。尽管监督学习和无监督学习似乎是两种不同的ML模型，但它们不再如此。虽然很容易将RL视为一种无监督的学习形式，因为它不依赖于积极的行为模型，但RL旨在放大奖励信号，而不是试图识别隐藏的结构。发现智能体经验的结构在强化中可能非常有用，但它本身并不能解决增加奖励信号的RL挑战。因此，我们认为RL是第三种ML范式，与监督和无监督学习并列，也可能与其他范式不同。


    探索与利用之间的权衡是RL中出现但其他类型学习中没有的挑战之一。RL智能体必须选择他或她过去尝试过并证明在产生奖励方面有效的行动，以获得最大利益。智能体不仅必须利用其经验来赢得奖励，还必须学习如何在未来做出最佳决策。问题在于，探索或利用都无法完美地进行。智能体必须尝试广泛的行动，同时继续倾向于那些似乎最有效的行动。在随机挑战中，每个行动必须重复多次，才能确定预期奖励的准确估计。数学家们研究这个探索与利用的问题已有数十年，但尚未解决。同时，我们只是认识到平衡探索与利用的困境不再可解。


    RL的另一个显著特点是它明确处理了意图导向智能体应对不可预测环境的全部困难。例如，许多ML研究人员研究了监督学习，而没有指定这种能力在长期内可能如何有价值。同样，其他研究人员提出了具有类似目标的规划理论，但没有考虑规划在实时决策中的作用，或者需要制定计划的预测模型来自何处的问题。尽管这些策略取得了许多积极成果，但它们对远程子类型的共同关注是一个普遍问题。RL采取了相反的行为，从一个完整的、交互式的、目标实现的智能体开始。


    此外，人们普遍认为，从一开始，智能体就必须在对其所面临的环境存在相当大的不确定性的情况下运作。当规划涉及RL时，它必须解决制定计划与选择实时行动之间的相互作用，此外还要了解环境模型是如何得出和发展的。当监督学习涉及RL时，它出于独特的原因，决定了哪些能力重要，哪些不重要。'

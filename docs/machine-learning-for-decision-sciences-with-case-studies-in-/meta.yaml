    import numpy as np\nimport seaborn as sns\nimport matplotlib.pyplot as plt\n\n\
    def sinplot(flip=1):\n    ng = np.linspace(0, 14, 100)\n    for i in range(1,\
    \ 7):\n        plt.plot(ng, np.sin(ng + i * .5) * (7 - i) * flip)\nsinplot()\n\
    ```\n\nAnother graph available is box plot. Below is the sample code snippet,\
    \ and the output is shown in Figure 3.17.\n\n```python\nimport seaborn as sns\n\
    import matplotlib.pyplot as plt\nsns.set(color_codes=True)\na = sns.load_dataset(\"\
    tips\")\nsns.boxplot(x=\"day\", y=\"total_bill\", data=a);\n```\n\nThe following\
    \ code illustrates the steps to remove the background and present it in white\
    \ background, and the corresponding output is shown in Figure 3.18.\n\n```python\n\
    sns.set()\nsinplot()\n```\n\nIn the above graph, we can notice the theme or the\
    \ background is changed to white. We can explore further using the other themes\
    \ as well (e.g., dark, darkgrid, white, and whitegrid). In the previous graph,\
    \ there are axes; the rectangular line is present all around the graph. This can\
    \ also be customized further using the despine() function. The code is presented\
    \ below, and the corresponding output is shown in Figure 3.19.\n\n```python\n\
    import seaborn as sns\nimport matplotlib.pyplot as plt\nsns.set(style=\"white\"\
    , color_codes=True)\na = sns.load_dataset(\"tips\")\nsns.boxplot(x=\"day\", y=\"\
    total_bill\", data=a);\nsns.despine(offset=10, trim=True);\n```\n\nIn multi-variate\
    \ data exploration, correlation analysis is one of the primary techniques the\
    \ data analysts use to understand the data. It is also known as a correlation\
    \ matrix, auto-covariance matrix, variance matrix, or dispersion matrix. It is\
    \ a matrix where the i-j position defines the correlation between the ith and\
    \ jth parameters in the dataset.\n\nWhen the data points result in a roughly straight-line\
    \ trend, the variables have an approximately linear relationship. In other cases,\
    \ the data points fall close to a straight line, but frequently there is quite\
    \ a bit of variability of the points around the straight-line trend. A synopsis\
    \ measure called the correlation describes the strength of the linear association.\
    \ Correlation summarizes the strength and the linear (straight-line) association\
    \ between two quantitative variables. Denoted by r, it takes values between -1\
    \ and +1. A positive r value indicates a positive association, and a negative\
    \ r value indicates a negative association. The closer the r value is to 1, the\
    \ closer the data points fall to a straight line. Thus, the linear association\
    \ is stronger. On the other hand, the closer the r value is to 0, making the linear\
    \ association weaker.\n\nTo demonstrate, let us take a House Price dataset. The\

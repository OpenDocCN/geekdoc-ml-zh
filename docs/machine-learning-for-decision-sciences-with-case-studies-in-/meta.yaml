    图2.1 带有解释器的Python代码。


    大多数机器学习模型和概念都是使用Python构建的，因为它易于理解，且语法复杂度较低。


    ### 2.2.1 为什么Python适合机器学习？


    在过去十年中，Python语言在机器学习、深度学习和人工智能领域日益普及，原因如下：


    - Python是一种平台无关的语言。

    - Python具有简洁且可读的代码，促进了复杂算法的快速测试，并使非程序员也能轻松使用该语言。

    - 虽然复杂的算法和多样化的工作流程是机器学习的支撑，但Python的简单性允许开发人员编写可靠的代码。

    - 开发人员可以专注于解决机器学习问题，而不是关注语言的技术细节。

    - 它可以执行一系列复杂的机器学习任务，并使您能够快速构建原型，从而允许您测试产品的机器学习功能。

    - Python附带多个框架和库，以减少开发人员的开发时间，并且这些库可以轻松配置。软件库是开发人员用于解决日常编程任务的预写代码。

    - Python凭借其丰富的技术栈，拥有用于机器学习的广泛库。

    - Python包含用于统计操作的统计库。它使数据可视化更容易。

    - 更大的用户社区致力于持续更新和共享库。

    - 如果组织将Python用于其他开发活动，例如桌面开发，这些技能可以轻松转移到机器学习项目。


    本章讨论如何设置Python集成开发环境（IDE）、Python框架以及对机器学习和深度学习有用的库。


    ## 2.3 设置Python


    要享受这种快速增长的编程语言，用户需要根据操作系统（如Windows、macOS和Linux）安装Python解释器。


    ### 2.3.1 Windows上的Python


    - 从https://www.python.org/downloads/下载最新的Python安装包并运行可执行文件。

    - 选择可选的安装选项；用户可以根据需要添加额外功能或调整位置。

    - 要从任何命令提示符访问Python，请勾选第二个选项“Add Python 3.7 to PATH”，如图2.2所示。

    - 用户现在可以从命令提示符验证安装。'

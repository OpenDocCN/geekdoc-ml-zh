    So, as the figure suggests, AI is a broad concept that first exploded in the late
    1950s, causing a significant shift in the data science industry. Later, in the
    late 1980s, ML was introduced, which improved AI features. Finally, in the late
    1990s, DL was introduced, which combines AI and ML (Figure 1.2).'
- md: '## 1.5 DATA SCIENCE LIFE CYCLE


    Collection of data manipulates and analyzes the data and shows a meaningful result.
    All these processes are complex and lengthy. The Data scientists require a proper
    flow or cycle to perform the data science life cycle tasks. On the other hand,
    working with big data is an easy task; data scientist uses a proper workflow for
    the result. The data science life cycle consists of six phases (Figure 1.3):


    - Discovery

    - Data preparation

    - Model planning

    - Model building

    - Communicate results

    - Operationalize


    **Discovery**

    Before starting the project, having a strong command of the background of the
    project is essential. It’s essential to have all the questions clear at the start.
    Gather all the requirements needed during the project. A data scientist must have
    a question/answer session with clients for a better understanding of requirements.
    Quick review on the history of company and project whether the similar project
    has been done in the past for reference.


    **Data preparation**

    This step plays a critical and time-consuming role in the life cycle; this phase
    acts as a filtration process of data. In this step, all the cleaning and elimination
    of missing attributes are done. Why is the phase time-consuming? When we talk
    about big data, it can be in terabytes or more than that. Cleaning a large amount
    of data requires hundreds of scenarios. Let’s take the example of variable “area,”
    which has the data type integer. All the records are in integer except one record,
    which is in decimal. The integer data type cannot contain a decimal value; here,
    you need to eliminate that particular record.


    **Model planning**

    In this phase, you need to select the ML model for your project, which algorithm
    needs to be applied, and select the mathematical approach which will give the
    best possible outcome.


    **Model building**

    Once the model is finalized and created just codes, the most commonly used language
    is Python. As soon as the project is ready, we deploy the system and share it
    with a customer. In this way, QA is done by the client itself. Any changes at
    the client end are urgently taken up and resolved.


    **Communicate results**

    The client should have a clearer understanding of the model and result, which
    is very difficult as the client has no understanding of data science. Therefore,
    model interfaces should be transparent and interpretable as it will become easier
    for the client to absorb them.


    **Operationalize**

    The final step is where documentation and maintenance of the project are done.
    Documentation will help the client to understand the project and run it efficiently.


    ## 1.6 KEY ROLE OF DATA SCIENTIST


    The activities the data scientists do are arranging the appropriate data and selecting
    models to meet the application needs. Data scientists are responsible for managing
    and presenting accurate data. Data scientist plays a vital role as all the business
    is depending on data analysis and data modeling.


    The primary role of a data scientist is to investigate and manipulate the data
    in meaningful aspects and solve diverse problems. They have core knowledge of
    computer science, ML, big data, statistics, and mathematics. In addition, data
    scientists have core expertise in different programming languages like Java and
    Python. A data scientist’s work starts with collecting, analyzing, and concluding
    a final result based on the decision-making process. Scientists also work on big
    data.


    There are two types of big data:


    - **Saturated data:** The data are mainly in an organized, sorted manner, for
    example, data gathered from devices like biometric devices, face detection devices,
    and longitudes and latitudes of different locations.

    - **Unsaturated data:** The data are scattered and unorganized, which need to
    be organized before further processing. E.g., social media adds data, client feedback
    data, emails, letters, posts all are unsaturated data.


    Data scientists manage these types of data. Below are some application examples
    on which data scientists work:


    - Fraud detection applications

    - Predictable applications

    - Cost estimation applications

    - Search engines


    ### 1.6.1 DIFFERENCE BETWEEN DATA SCIENTIST AND MACHINE LEARNING ENGINEER


    A data scientist is responsible for the evaluation and classification of the data
    according to the business requirements. Whenever a problem needs to be solved
    based on data, at this point, data scientist plays their role. Data scientists
    analyze the data using statistical methods and create charts and graphs to understand
    the result better. On the other hand, ML engineers use algorithms to solve their
    problems. They develop programs that control robots and computer machines. They
    implement or create new models for better predictive results.


    ## 1.7 REAL-WORLD EXAMPLES


    There is a wide range of application areas where AI, ML, and DL are gaining popularity.
    Some of the common areas that find the vast application of these domains are illustrated
    below:


    **Check deposit apps**

    Whether the business is small or large, AI is present in every field. AI helps
    in all cash management processes. People feel odium going to the bank and standing
    in the enormous queue for check deposits. AI had solved this problem. Check deposit
    applications allow the customer to automate the entire transaction process. AI
    observed the transaction patterns and saved them in the database now if any unusual
    step is identified in a transaction. It is considered fraud.


    **Google translator**

    Google translator uses an artificial neural network. It converts a sentence of
    one language into another language in just a few seconds. It works on the same
    pattern identification. Patterns are saved in the database whenever a new word
    system matches the patterns from the history and concludes the translation.


    **Google Maps**

    Google Maps use AI tools for the navigation and calculation of the shortest route.
    So whenever you are lost or at some new place, you google the location, and it
    displays the navigation in just a few seconds. How this is possible? It’s just
    because of AI.


    **Online shopping recommendation**

    Whenever you search for an item on a search engine, it is saved as a history.
    As per your search, next time, you will be displayed recommended ads. How is this
    possible? It’s because of AI. Same with online shopping, whenever you purchase
    an item from an online store, you start getting suggestions related to the same
    product and your interests.


    **Rideshare applications**

    The rideshare application uses a ML technique to predict the ride fare. So whenever
    you book a ride, all the rides close to your current location are displayed on
    the screen and associated estimated costs for your destination. How this is possible?
    It’s because of ML.


    ## 1.8 USE CASES


    Following are the use cases of industries that use ML:


    ### 1.8.1 FINANCIAL AND INSURANCE INDUSTRIES


    #### 1.8.1.1 Fraud Mitigation


    Many organizations give less importance to fraud detection; as a result, they
    experience significant losses.


    ##### 1.8.1.1.1 How Can We Identify Fraud?


    There are various frauds and threats taking place in almost every industry. The
    primary and most challenging step is to identify how fraud took place. Fraud can
    occur inside or outside the company. Fraud inside the company can occur like a
    company employee changing bank information without the permission of an authorized
    person. In the same manner, outside fraud can be like hacking web-sites or credit
    card fraud. In either case, to get rid of such kinds of fraud, data science helps
    here. Using predictive data science methodology, this issue can be overcome.


    ##### 1.8.1.1.2 Machine Learning for Fraud Detection


    Nowadays, ML is used in every field. ML algorithms identify the patterns with
    the help of data. It combines the data, relate them together, and concludes the
    fraud before something big happens. ML algorithms find the connection relation
    between locations and products and map them to people connected to that particular
    field. This approach of ML is convenient as it connects the data with all the
    individuals related to the fields.


    ##### 1.8.1.1.3 Fraud Detection in Insurance Industries


    Insurance industries are all about making a relationship with clients. However,
    it is next to impossible to keep the authenticity and verify each customer’s information,
    which leads to data privacy issues.


    These problems can be overcome by implementing a data analysis and ingestion platform,
    which makes data collaboration possible, checks transactions, and claims inappropriate
    information across insurance products. This solution identifies the unusual information
    about the insurer.


    ##### 1.8.1.1.4 Fraud Detection in Financial Industries


    The banking industry relies on data that need to be captured and preserved, like
    customer service calls, transactions etc. This is nearly impossible to keep the
    record, keep track, and analyze the data.'
  mdcn: '## 1.5 数据科学生命周期


    数据的收集、处理和分析，最终呈现出有意义的结果。所有这些过程都复杂且耗时。数据科学家需要一个合适的流程或周期来执行数据科学生命周期的任务。另一方面，处理大数据并非易事；数据科学家需要使用合适的工作流程来获得结果。数据科学生命周期包含六个阶段（图1.3）：


    -   发现

    -   数据准备

    -   模型规划

    -   模型构建

    -   结果沟通

    -   投入运营


    **发现**

    在开始项目之前，深入了解项目背景至关重要。在项目开始时，明确所有问题至关重要。收集项目期间所需的所有要求。数据科学家必须与客户进行问答环节，以更好地理解需求。快速回顾公司和项目的历史，查看过去是否做过类似项目以供参考。


    **数据准备**

    这一步在生命周期中扮演着关键且耗时的角色；此阶段充当数据的过滤过程。在此步骤中，完成所有清洗和剔除缺失属性的工作。为什么这个阶段耗时？当我们谈论大数据时，其规模可能是太字节甚至更大。清洗海量数据需要处理数百种场景。以变量“area”为例，其数据类型为整数。除了一条记录是小数外，所有记录都是整数。整数数据类型无法包含小数值；因此，你需要剔除那条特定的记录。


    **模型规划**

    在此阶段，你需要为项目选择机器学习模型，确定需要应用哪种算法，并选择能带来最佳可能结果的数学方法。


    **模型构建**

    一旦模型确定并创建完成，最常用的编程语言是Python。项目准备就绪后，我们部署系统并与客户共享。通过这种方式，客户自身可以进行质量保证。客户端的任何更改都会被紧急处理和解决。


    **结果沟通**

    客户应该对模型和结果有更清晰的理解，但这非常困难，因为客户通常不具备数据科学知识。因此，模型界面应透明且易于解释，这样客户才能更容易地理解。


    **投入运营**

    最后一步是完成项目的文档编写和维护。文档将帮助客户理解项目并高效运行。


    ## 1.6 数据科学家的关键角色


    数据科学家的活动包括整理合适的数据和选择模型以满足应用需求。数据科学家负责管理和呈现准确的数据。数据科学家扮演着至关重要的角色，因为所有业务都依赖于数据分析和数据建模。


    数据科学家的主要职责是以有意义的方式研究和处理数据，并解决各种问题。他们具备计算机科学、机器学习、大数据、统计学和数学的核心知识。此外，数据科学家精通Java和Python等不同的编程语言。数据科学家的工作始于收集、分析数据，并基于决策过程得出最终结论。科学家们也致力于大数据研究。


    大数据有两种类型：


    -   **饱和数据：** 数据主要以有序、排序的方式组织，例如，从生物识别设备、人脸识别设备以及不同地点的经纬度等设备收集的数据。

    -   **非饱和数据：** 数据分散且无组织，需要在进一步处理前进行组织。例如，社交媒体广告数据、客户反馈数据、电子邮件、信件、帖子等都属于非饱和数据。


    数据科学家管理这些类型的数据。以下是数据科学家工作的一些应用示例：


    -   欺诈检测应用

    -   预测性应用

    -   成本估算应用

    -   搜索引擎


    ### 1.6.1 数据科学家与机器学习工程师的区别


    数据科学家负责根据业务需求对数据进行评估和分类。每当需要基于数据解决问题时，数据科学家就会发挥作用。数据科学家使用统计方法分析数据，并创建图表和图形以更好地理解结果。另一方面，机器学习工程师使用算法来解决问题。他们开发控制机器人和计算机的程序。他们实施或创建新的模型以获得更好的预测结果。


    ## 1.7 现实世界示例


    人工智能、机器学习和深度学习在广泛的应用领域中日益普及。以下是一些这些领域得到广泛应用的常见领域：


    **支票存款应用**

    无论业务规模大小，人工智能都存在于各个领域。人工智能有助于所有的现金管理流程。人们厌恶去银行排队存支票。人工智能解决了这个问题。支票存款应用允许客户自动化整个交易过程。人工智能观察交易模式并将其保存在数据库中，现在如果在交易中识别出任何异常步骤，就会被视为欺诈。


    **谷歌翻译**

    谷歌翻译使用人工神经网络。它能在几秒钟内将一种语言的句子转换为另一种语言。它基于相同的模式识别工作。每当新词系统与历史记录中的模式匹配时，模式就会被保存在数据库中，并得出翻译结果。


    **谷歌地图**

    谷歌地图使用人工智能工具进行导航和计算最短路线。因此，当你迷路或身处陌生地方时，你只需谷歌搜索位置，它就能在几秒钟内显示导航。这是如何实现的？这完全归功于人工智能。


    **在线购物推荐**

    每当你在搜索引擎上搜索一个项目时，它都会被保存为历史记录。根据你的搜索，下次你会看到推荐的广告。这是如何实现的？这归功于人工智能。在线购物也是如此，每当你从在线商店购买一件商品，你就会开始收到与该产品和你的兴趣相关的建议。


    **共享出行应用**

    共享出行应用使用机器学习技术来预测乘车费用。因此，每当你预订一次行程，屏幕上会显示所有靠近你当前位置的车辆以及前往你目的地的预估费用。这是如何实现的？这归功于机器学习。


    ## 1.8 用例


    以下是使用机器学习的行业用例：


    ### 1.8.1 金融与保险行业


    #### 1.8.1.1 欺诈缓解


    许多组织对欺诈检测重视不足；结果，他们遭受了重大损失。


    ##### 1.8.1.1.1 我们如何识别欺诈？


    几乎每个行业都在发生各种欺诈和威胁。首要且最具挑战性的步骤是识别欺诈是如何发生的。欺诈可能发生在公司内部或外部。公司内部的欺诈可能像公司员工未经授权人员许可更改银行信息。同样，外部欺诈可能像网站黑客攻击或信用卡欺诈。无论哪种情况，要摆脱此类欺诈，数据科学在这里有所帮助。使用预测性数据科学方法，可以克服这个问题。


    ##### 1.8.1.1.2 用于欺诈检测的机器学习


    如今，机器学习应用于各个领域。机器学习算法借助数据识别模式。它整合数据，将它们关联起来，并在发生重大事件之前得出欺诈结论。机器学习算法发现地点和产品之间的关联关系，并将其映射到与该特定领域相关的人员。这种方法的机器学习非常方便，因为它将数据与该领域的所有相关人员联系起来。


    ##### 1.8.1.1.3 保险行业的欺诈检测


    保险行业完全关乎与客户建立关系。然而，要保持真实性并验证每位客户的信息几乎是不可能的，这会导致数据隐私问题。


    这些问题可以通过实施数据分析和摄取平台来克服，该平台使数据协作成为可能，检查交易，并在保险产品中识别不恰当的信息。此解决方案能识别出关于投保人的异常信息。


    ##### 1.8.1.1.4 金融行业的欺诈检测


    银行业依赖于需要捕获和保存的数据，例如客户服务电话、交易记录等。几乎不可能保存记录、跟踪和分析所有数据。'

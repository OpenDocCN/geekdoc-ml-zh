    - 6. Energy consumption

    - 7. Fraudulent statement detection


    ### 6.4.10.1 Predicting Library Book


    A decision tree is used to predict the future use of the library book. Harvard
    College Library uses this decision tree algorithm to move the book to off-site
    storage. The library has short storage space and stores the low-demand book into
    remote storage. The wider library in Harvard College has a lack of space problem.
    So they have to remove the old book and less useful modern book to remote storage.
    The books having lower expected future usage have to be moved to the remote storage.



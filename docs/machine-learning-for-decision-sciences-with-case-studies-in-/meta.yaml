    feature extraction, pairwise review scoring, and further categorization.


    ## 9.1 USE CASE 1 – RETAIL PRICE OPTIMIZATION USING PRICE ELASTICITY OF DEMAND
    METHOD


    ### 9.1.1 BACKGROUND


    Product pricing is a vital aspect of the rental industry, and there are several
    strategies to determine the optimal price of the products. As such, there are
    two main types of goods. First, there are several goods whose prices affect their
    sales. Small changes in the price of these products can therefore lead to distinctive
    changes in sales. On the other hand, sales of goods can be unaffected by their
    price. These products are generally luxury items and necessities such as certain
    medicines. This notebook will focus on the former type of goods, where price changes
    the demand for the product.


    Price elasticity of demand (PED) is a key economic measure defined as the degree
    to which demand changes as the cost of the product changes. In general, the demand
    for a product decreases as cost rises. However, in some cases, the demand can
    drop sharply even with a small increase in price, while in other cases, demand
    can stay approximately the same even with a sharp price increase. Therefore, the
    term price elasticity defines the percentage change in demand due to a change
    in price by 1%, given that everything else is held constant.


    In mathematical terms, the PED is the percentage change in quantity demanded,
    $q$, divided by the percentage change in price, $p$. The formula for the price
    elasticity ($\varrho$) is $e = \%\Delta Q / \%\Delta P$. In this program, we look
    at the sales of the items in a cafe, including burgers, coke, lemonade, and coffee.
    As data scientists, our task is to figure out the optimal prices to set for these
    items. If the price is set too high, the sales will drop, and if the price is
    low, then the margins will decrease. Hence, the crucial question to get an answer
    for is “what is the optimal price point that will maximize the profit?”


    ### 9.1.2 UNDERSTANDING THE DATA



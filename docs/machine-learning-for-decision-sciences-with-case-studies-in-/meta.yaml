    \ 2.4.6.3 变量的作用域\n\n程序中的所有变量可能并非在程序的所有位置都可访问。这取决于用户在何处声明了变量。变量的作用域决定了用户可以访问特定标识符的程序部分。Python\
    \ 中变量有两个基本作用域：\n\n- i. 全局变量\n- ii. 局部变量\n\n以下示例展示了函数中全局变量和局部变量的使用：\n\n```python\n\
    In [4]: total = 10  # 这是一个全局变量。\n        # 函数定义在这里\n        def sum(arg1, arg2):\n\
    \            # 将两个参数相加并返回它们。\"\n            total1 = arg1 + arg2\n           \
    \ a = total + 2\n            total  # 这里的 total 是局部变量。\n            print(\"Inside\
    \ the function local total : \", total1)\n            print(total)\n         \
    \   return total1\n\n        # 现在你可以调用 sum 函数\n        sum(10, 20)\n        #\
    \ print (\"Outside the function global total : \", total)\n\n        Inside the\
    \ function local total : 30 10\n        Out[4]: 30\n```"

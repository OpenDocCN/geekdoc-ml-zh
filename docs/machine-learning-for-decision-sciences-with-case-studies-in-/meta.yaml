    # 2.4.4.1 Conditional Statements


    Decision-making is required when we want to execute code only if a specific condition
    is satisfied. The if...elif...else statement is used in Python for decision-making.


    ```

    syntax:if test expression: statement(s)

    ```


    The program evaluates the test expression and will execute statement(s) only if
    the text expression is True. If the text expression is False, the statement(s)
    is not executed. In Python, the body of the if statement is indicated by the indentation.
    The body starts with an indentation, and the first unindented line marks the end.'

  md: '# 6.7.2 What Is a Hyperplane?


    For a classification task with only two features, you''ll consider a hyperplane
    as a line that linearly separates and classifies a set of information. Intuitively,
    the more beyond the hyperplane our data points lie, the more confident we are
    that they need to be correctly classified. We, therefore, want our data points
    to be as far off from the hyperplane as possible while still being on the right
    side of it. So when new testing data are added, whatever side of the hyperplane
    it lands will decide the category that we assign. Let''s revisit the iris dataset:


    ```

    import numpy as np

    from sklearn.model_selection import cross_val_score, train_test_split

    from sklearn import datasets

    from sklearn import svm


    iris = datasets.load_iris()


    X_train, X_test, y_train, y_test = train_test_split(iris.data, iris.target, test_size=0.4,
    random_state=0)


    # Build an SVC model for predicting iris classifications using training data

    clf = svm.SVC(kernel=''linear'', C=1).fit(X_train, y_train)


    # Now measure its performance with the test data

    clf.score(X_test, y_test)


    # The output is shown below.

    0.9666666666666667

    ```



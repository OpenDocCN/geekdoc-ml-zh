    In multi-variate data exploration, correlation analysis is one of the primary
    techniques the data analysts use to understand the data. It is also known as a
    correlation matrix, auto-covariance matrix, variance matrix, or dispersion matrix.
    It is a matrix where the i-j position defines the correlation between the ith
    and jth parameters in the dataset.


    When the data points result in a roughly straight-line trend, the variables have
    an approximately linear relationship. In other cases, the data points fall close
    to a straight line, but frequently there is quite a bit of variability of the
    points around the straight-line trend. A synopsis measure called the correlation
    describes the strength of the linear association. Correlation summarizes the strength
    and the linear (straight-line) association between two quantitative variables.
    Denoted by r, it takes values between -1 and +1. A positive r value indicates
    a positive association, and a negative r value indicates a negative association.
    The closer the r value is to 1, the closer the data points fall to a straight
    line. Thus, the linear association is stronger. On the other hand, the closer
    the r value is to 0, making the linear association weaker.


    To demonstrate, let us take a House Price dataset. The sample data in the CSV
    file are shown in Figure 3.20.'

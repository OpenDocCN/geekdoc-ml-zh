    \nComputational complexity refers to the number of resources required to complete\
    \ a task. Computational complexity helps the programmers identify the level of\
    \ complexity the program will face to overcome it.\nThe complexity of a program\
    \ or algorithm varies concerning the input data; it is generally expressed in\
    \ the form of “f(n)” where n indicates the size of the input.\nComputational complexity\
    \ in terms of an algorithm is how long an algorithm will take to solve the problem\
    \ in the worst case. Algorithms can be analyzed as follows:\n\n- **Asymptotic\
    \ analysis:** When creating an application, various things need to be focused\
    \ on. Such application should be user-friendly, fast, easily configurable, and\
    \ the performance is the key to an application. No one likes to run an application\
    \ that is slow in operations and works badly in a large amount of data. How can\
    \ we identify the speed of an algorithm and tell whether the algorithm will work\
    \ best in large input? The answer to all the above questions is asymptotic analysis.\n\
    \nIt evaluates the algorithm’s performance with large input data; it calculates\
    \ how the time increases as the data input increases. When we have two algorithms\
    \ for the same problem, asymptotic will help calculate and choose the best suitable\
    \ algorithm.\nThe algorithm can be analyzed based on the following cases:\n\n\
    **Worst-case complexity:** Maximum number of steps algorithm will perform. Identify\
    \ the UB on the run time of the algorithm. The case that causes a maximum number\
    \ of operations. For example, searching an element in the data that is not present\
    \ in it, as the loop will iterate till the end to search the element, which is\
    \ why it is the worst case.\n**Average-case complexity:** Find all the possible\
    \ inputs, calculate the time consumed, add all the calculated values, and divide\
    \ it with several inputs. It is not easy to do and has rarely been used.\n**Best-case\
    \ complexity:** It generates the LB of the algorithm. Calculate the case that\
    \ causes the minimum number of operations to be executed.\n**Space complexity:**\
    \ Space complexity is the required memory to solve a problem. Suppose the problem\
    \ requires large memory. As a result, the program will become more complex.\n\
    **Time complexity:** How much time the algorithm takes to solve a problem. Time\
    \ includes the execution time of the program.\n\n## 2.9 REAL-WORLD EXAMPLES\n\n\

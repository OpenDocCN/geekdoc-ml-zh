  md: '# 6.6.6.3 Other Domain-Specific Kernel


    The most challenging part is choosing the right kernel function, and it is highly
    problem-specific.


    # 6.6.6.4 Sigmoid Kernel


    An SVM with a sigmoid kernel is equivalent to a simple two-layer neural network
    with no hidden layers known as a multilayer perceptron. It is also called the
    hyperbolic tangent kernel. It comes from neural networks, where artificial neurons
    often use the bipolar sigmoid mechanism as an activation function. The sigmoid
    kernel equation is given in Equation 6.59.


    $K(x_i, x_j) = \tanh(\alpha x_i \cdot x_j - \delta)$


    # 6.6.6.5 Exponential Kernel


    It is closely equivalent to the Gaussian kernel and is shown below in Equation
    6.60.


    $K(x_i, x_j) = e^{-\left(\frac{\|x_i - x_j\|^2}{2\sigma^2}\right)}$


    # 6.6.6.6 ANOVA Kernel


    It is said to perform well in multidimensional regression problems.


    $K(x_i, x_j) = \sum_{k=1}^n \exp\left(-\sigma(x_i^k - x_j^k)^2\right)^d$


    # 6.6.6.7 Rational Quadratic Kernel


    It is less computationally intensive than the Gaussian kernel. If the Gaussian
    becomes too expensive, then rational quadratic kernel can be used as an alternative.


    $k(x_i, x_j) = 1 - \frac{\|x_i - x_j\|^2}{\|x_i - x_j\|^2 + c}$


    # 6.6.6.8 Multiquadratic Kernel


    The multiquadratic kernel can be used in the same situations as the rational quadratic
    kernel. As is the case with the sigmoid kernel, it is also an example of a non-positive
    definite kernel.


    $k(x_i, x_j) = \sqrt{\|x_i - x_j\|^2 + c^2}$


    # 6.6.6.9 Inverse Multiquadratic Kernel


    The Gaussian kernel results in a kernel matrix with full rank and thus forms an
    infinite dimension feature space.


    $k(x_i, x_j) = \frac{1}{\sqrt{\|x_i - x_j\|^2 + c^2}}$'

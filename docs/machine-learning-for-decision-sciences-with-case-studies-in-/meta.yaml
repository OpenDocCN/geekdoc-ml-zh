    | `HDFStore.select(key[, where, start, stop, ...])` | 检索存储在文件中的Pandas对象，可选地基于where条件。
    |

    | `HDFStore.info()` | 打印存储的详细信息。 |

    | `HDFStore.keys([include])` | 返回与HDFStore中存储的对象对应的键列表。 |

    | `HDFStore.groups()` | 返回所有顶级节点的列表。 |

    | `HDFStore.walk([where])` | 遍历Pandas对象的pytables组层次结构。 |


    ### 从结构化查询语言（SQL）表读取数据


    | 函数 | 描述 |

    | :--- | :--- |

    | `read_sql_table()` | 将SQL数据库表读入DataFrame。 |

    | `read_sql_query()` | 将SQL查询读入DataFrame。 |

    | `read_sql()` | 将SQL查询或数据库表读入DataFrame。 |


    我们可以从其他来源摄取数据，如Google BigQuery、SAS、STATA和SPSS。用户可以参考Pandas库帮助以获取支持的文件类型的最新列表。


    在数据准备阶段，涉及的人员与所使用的工具同样重要。需要IT分析师和数据库分析师的适当指导和协助。如前所述，此阶段在分析生命周期中至关重要；如果获取的数据质量不佳，将难以执行生命周期过程中的后续步骤。除了数据准备外，此阶段还确保考虑额外的数据方面，并避免常见陷阱。数据准备阶段的一些注意事项如下：


    -   确定所需的数据源。所有已识别的数据源是否都可用？需要确保对目标字段有适当的清晰度。

    -   所需的数据是否干净？

    -   内容和文件是否一致？


    在准备数据时，需要确定项目中可以考虑的缺失/不一致数据的数量，换句话说，要理解对空白/不一致数据的允许程度。此外，如果有一致的数据可用但发现偏离正常情况，则必须评估数据类型的一致性。例如，如果数据预期是数字型的，则必须确认是否允许任何特殊字符，如字母数字字符。必须对数据列进行关键和严格的审查，以确保它们有意义且形式正确。此外，必须验证系统性错误发生的可能性。系统性错误可能由于传感器数据或无监督数据而发生。这可能导致不规则数据或缺失数据。必须审查数据，以评估数据定义在重复测量中是否一致。



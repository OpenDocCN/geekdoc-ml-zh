    \ \\quad (6.5)$$\n$$P(Y = 1 | X) = 1 - \\left[\\sigma\\left(-\\beta_0 + \\sum\
    \ \\beta_i x_i\\right)\\right] \\quad (6.6)$$\n\nwhere\n\n$$\\sigma(z) = \\frac{1}{1\
    \ + e^{-z}}$$\n\nWith a simple example, let us understand whether a person has\
    \ a lung disease based on age and smoking habit.\n\n$$P(D = 1 | \\text{age, smoking\
    \ habit}) = \\frac{1}{1 + e^{-(\\beta_0 + \\beta_1 \\text{age} + \\beta_2 \\text{smoking\
    \ habit})}}$$\n$$P(D = 1 | x_1, x_2) = \\frac{1}{1 + e^{-(\\beta_0 + \\beta_1\
    \ x_1 + \\beta_2 x_2)}}$$\n$$P(D = 0 | \\text{age, smoking habit}) = \\frac{e^{-(\\\
    beta_0 + \\beta_1 \\text{age} + \\beta_2 \\text{smoking habit})}}{1 + e^{-(\\\
    beta_0 + \\beta_1 \\text{age} + \\beta_2 \\text{smoking habit})}}$$\n$$P(D = 0\
    \ | x_1, x_2) = \\frac{e^{-(\\beta_0 + \\beta_1 x_1 + \\beta_2 x_2)}}{1 + e^{-(\\\
    beta_0 + \\beta_1 x_1 + \\beta_2 x_2)}}$$\n\nwhere\n$D$ = presence of lung disease,\
    \ discrete value {1 – Yes and 0 – No}\n$x_1$ = age, continuous value\n$x_2$ =\
    \ smoking habit, discrete value {1 – Yes and 0 – No}\nTo estimate the parameters\
    \ $\\beta_0$, $\\beta_1$, and $\\beta_2$, maximum likelihood estimation (MLE)\
    \ is used\n\n$$\\ln\\left(\\frac{p}{1 - p}\\right) = \\beta_0 + \\beta_1 x_1 \\\
    quad (6.7)$$\n\n## TABLE 6.2\nExample Illustration\n\n| Heart Attack | Yes (1)\
    \ | No (0) | Total |\n| :--- | :--- | :--- | :--- |\n| Yes(1) | 3($R_{11}$) |\
    \ 7($R_{12}$) | 10 |\n| No(0) | 6($R_{21}$) | 4($R_{22}$) | 10 |\n| | 9 | 11 |\
    \ 20 |\n\nwhere $p/1-p$ is the odds ratio and $\\ln(p/1-p)$ is the logit odds\
    \ ratio.\n\n$$\\text{Odds} = \\frac{p(\\text{event})}{1-p(\\text{event})} \\quad\
    \ (6.8)$$\n\nThe odds ratio is the ratio between the probability of success and\
    \ the probability of failure. Let us understand how to calculate the odds ratio\
    \ with a simple illustration using Table 6.2.\nOdds that a person who had anger\
    \ treatment got a heart attack=$R_{11}/R_{21}=3/6=0.5$\nOdds that a person who\
    \ had not undergone anger treatment got a heart attack=$R_{12}/R_{22}=7/4=1.75$\n\
    Relative odds/odds ratio=$(R_{12}/R_{22})/(R_{11}/R_{21})=1.75/0.5=0.285$\nTo\
    \ estimate the probability of heart attack with respect to anger treatment, logistic\
    \ function is used\n\n$$\\ln\\left(\\frac{p}{1-p}\\right) = \\beta_0 + \\beta_1x_1$$\n\
    \nwhere $\\beta_0$ and $\\beta_1$ are regression coefficients and $p$ is the probability\
    \ of a person who has suffered a heart attack.\n\n## 6.3.2 VARIANTS OF LOGISTIC\
    \ REGRESSION\n\nThe major types of logistic regression (Figure 6.2) are\n\n- Simple\
    \ logistic regression\n- Multiple logistic regression\n- Binary logistic regression\n\
    \n### 6.3.2.1 Simple Logistic Regression\n\nIt is a simpler form with only one\
    \ independent variable. The general form of simple logistic regression is $\\\
    ln\\left(\\frac{p}{1-p}\\right) = \\beta_0 + \\beta_1$. To predict the presence\
    \ of heart disease (Yes/No) based on only one variable, say a smoking habit is\
    \ a simple logistic regression type. The variable description for heart disease\
    \ $y$ and smoking habit $x_1$ is\n\n$$\\text{Presence of heart disease } y = \\\
    begin{cases} 1 & \\text{Yes} \\\\ 0 & \\text{No} \\end{cases}$$\n\n![Variants\
    \ of logistic regression.](img/7fbca4852dbe91c6cea209148871a1b3_245_0.png)\n\n\
    FIGURE 6.2 Variants of logistic regression.\n\n$$\\text{Smoking habit } x_1 =\
    \ \\begin{cases} 1 & \\text{Smoker} \\\\ 0 & \\text{Non smoker} \\end{cases}$$\n\
    \nThe simple logistic function for predicting heart disease $y$ based on smoking\
    \ habit $x_1$ is given as\n\n$$\\ln\\left(\\frac{p(y=1|x_1)}{1-p(y=1|x_1)}\\right)\
    \ = \\beta_0 + \\beta_1 x_1$$\n\n### 6.3.2.2 Multiple Logistic Regression\n\n\
    If we have more than one independent variable, say $\\{x_1, x_2, \\dots, x_n\\\
    }$, then, it is called multiple logistic regression. The general form of multiple\
    \ logistic regression is in Equation 6.3\n\n$$\\ln\\left(\\frac{p}{1-p}\\right)\
    \ = \\beta_0 + \\beta_1 x_1 + \\dots + \\beta_n x_n \\quad (6.9)$$\n\nTo predict\
    \ the presence of heart disease $y$ (Yes/No) based on more than one variable,\
    \ say smoking habit $x_1$ and age-group $x_2$ are examples of multiple logistic\
    \ regression.\n\n$$\\ln\\left(\\frac{p(y=1|x_1, x_2)}{1-p(y=1|x_1, x_2)}\\right)\
    \ = \\beta_0 + \\beta_1 x_1 + \\beta_2 x_2 \\quad (6.10)$$\n\n### 6.3.2.3 Binary\
    \ Logistic Regression\n\nIt tries to predict the probability of binary target\
    \ (0, 1). Binary logistic regression is a simpler method that makes use of the\
    \ sigmoid function. For instance, as shown in Figure 6.3, to predict whether it\
    \ will rain tomorrow or not based on humidity, the target-dependent variable “Will\
    \ it Rain” contains exactly two classes, say rain (1) and no rain (0).\n\n![Binary\
    \ logistic regression.](img/7fbca4852dbe91c6cea209148871a1b3_246_0.png)\n\nFIGURE\
    \ 6.3 Binary logistic regression.\n\n$$P(\\text{rain} = 0 \\mid \\text{humidity})\
    \ = \\frac{e^{-(\\beta_0 + \\beta_1 \\text{humidity})}}{1 + e^{-(\\beta_0 + \\\
    beta_1 \\text{humidity})}}$$\n\nFew other examples of binary logistic regression\
    \ classification:\n\n- What factors influence a person's decision to travel for\
    \ leisure?\n  $Y=1$ if visit for leisure, 0 if not\n- What factors determine baby\
    \ birth weight?\n  $Y=1$ if baby birth weight is low, 0 if not\n- Which demography\
    \ is more likely to vote in favor of new legislation?\n  $Y=1$ if a person voted\
    \ Yes, 0 if not\n- Which customers are more likely to buy a new car?\n  $Y=1$\
    \ if a new car is bought, 0 if not\n\n### 6.3.2.4 Multiclass Logistic Regression\n\
    \nMulticlass logistic regression tries to predict the probability of more than\
    \ two target classes. Instead of using the sigmoid function, the softmax function\
    \ is used for multiclass classification problems. Examples of multiclass logistic\
    \ regression classification are given below.\n\nWhich party is a person going\
    \ to vote for?\n\n$$\\begin{cases} \\text{Republican} - 1 \\\\ \\text{Democratic}\
    \ - 2 \\\\ \\text{Independent} - 3 \\end{cases}$$\n\nWhat kind of symptoms does\
    \ a person have?\n\n$$\\text{Symptoms} \\begin{cases} \\text{None} - 0 \\\\ \\\
    text{Mild} - 1 \\\\ \\text{Moderate} - 2 \\\\ \\text{Severe} - 3 \\end{cases}$$\n\
    \nThe two types of multiclass logistic regression are ordinal and nominal logistic\
    \ regressions.\n\n### 6.3.2.5 Nominal Logistic Regression\n\nIt is a type of multiclass\
    \ logistic regression, where the target-dependent variable consists of more than\
    \ two class labels. There is no inherent or natural ordering present in nominal\
    \ class variables."
  mdcn: "## 表 6.1\n线性回归与逻辑回归\n\n**线性回归**\n\n- 预测连续输出值\n- 目标是找到最佳拟合直线\n\n$$Y = \\beta_0\
    \ + \\beta_1x_1$$\n\n- 用于解决回归分析问题\n- 使用最小二乘回归估计参数\n- 应用：股票价值预测、风速预测\n\n**逻辑回归**\n\
    \n- 预测分类输出值\n- 目标是找到一条 S 形曲线\n\n$$\\ln\\left(\\frac{p}{1-p}\\right) = \\beta_0\
    \ + \\beta_1x_1$$\n\n- 用于解决分类问题\n- 使用极大似然估计来估计参数\n- 应用：垃圾邮件分类、客户流失预测\n\n## 6.3.1\
    \ 几何直觉\n\n逻辑回归利用 sigmoid 函数来分隔两个类别，如公式 6.1 所示。逻辑 sigmoid 函数也称为 logit 函数。\n\n$$\\\
    sigma(z) = \\frac{1}{1 + e^{-z}}$$\n\nsigmoid 函数 $\\sigma(z)$ 的值介于 0 和 1 之间，其形状如图\
    \ 6.1 所示的 $S$ 形。假设函数或阈值 $h_\\theta(x)$ 设为 0.5。\n\n$$0 \\leq h_\\theta(x) \\leq\
    \ 1$$\n\n$$h_\\theta(x) = \\sigma(\\theta^T x) = \\frac{1}{1 + e^{-(\\theta^T\
    \ x)}}$$\n\n如果 $h_\\theta(x) \\geq 0.5$，则预测输出标签 $y$ 为 1。否则，如果 $h_\\theta(x) <\
    \ 0.5$，则预测输出标签 $y$ 为 0。让我们将权重向量视为 $\\beta_i$，观测值记为 $x_i$，偏置 $\\beta_0$ 视为线性回归中的截距。假设对于一个二分类问题，一个类别为\
    \ 0，另一个类别为 1，预测概率的公式如下。\n\n$$P(Y = 0 | X) = \\frac{1}{1 + \\exp\\left[\\beta_0\
    \ + \\sum \\beta_i x_i\\right]}$$\n\n$$P(Y = 1 | X) = \\frac{\\exp\\left[\\beta_0\
    \ + \\sum \\beta_i x_i\\right]}{1 + \\exp\\left[\\beta_0 + \\sum \\beta_i x_i\\\
    right]}$$\n\n![Sigmoid 曲线。](img/7fbca4852dbe91c6cea209148871a1b3_243_0.png)\n\n\
    图 6.1 Sigmoid 曲线。\n\n其中 exp[x] 类似于 $e^x$。更简单地，它可以重写为\n\n$$P(Y = 0 | X) = \\sigma\\\
    left(-\\beta_0 + \\sum \\beta_i x_i\\right) \\quad (6.5)$$\n$$P(Y = 1 | X) = 1\
    \ - \\left[\\sigma\\left(-\\beta_0 + \\sum \\beta_i x_i\\right)\\right] \\quad\
    \ (6.6)$$\n\n其中\n\n$$\\sigma(z) = \\frac{1}{1 + e^{-z}}$$\n\n通过一个简单的例子，让我们理解如何根据年龄和吸烟习惯判断一个人是否患有肺部疾病。\n\
    \n$$P(D = 1 | \\text{年龄, 吸烟习惯}) = \\frac{1}{1 + e^{-(\\beta_0 + \\beta_1 \\text{年龄}\
    \ + \\beta_2 \\text{吸烟习惯})}}$$\n$$P(D = 1 | x_1, x_2) = \\frac{1}{1 + e^{-(\\\
    beta_0 + \\beta_1 x_1 + \\beta_2 x_2)}}$$\n$$P(D = 0 | \\text{年龄, 吸烟习惯}) = \\\
    frac{e^{-(\\beta_0 + \\beta_1 \\text{年龄} + \\beta_2 \\text{吸烟习惯})}}{1 + e^{-(\\\
    beta_0 + \\beta_1 \\text{年龄} + \\beta_2 \\text{吸烟习惯})}}$$\n$$P(D = 0 | x_1, x_2)\
    \ = \\frac{e^{-(\\beta_0 + \\beta_1 x_1 + \\beta_2 x_2)}}{1 + e^{-(\\beta_0 +\
    \ \\beta_1 x_1 + \\beta_2 x_2)}}$$\n\n其中\n$D$ = 是否患有肺部疾病，离散值 {1 – 是，0 – 否}\n$x_1$\
    \ = 年龄，连续值\n$x_2$ = 吸烟习惯，离散值 {1 – 是，0 – 否}\n为了估计参数 $\\beta_0$、$\\beta_1$ 和 $\\\
    beta_2$，使用了极大似然估计。\n\n$$\\ln\\left(\\frac{p}{1 - p}\\right) = \\beta_0 + \\beta_1\
    \ x_1 \\quad (6.7)$$\n\n## 表 6.2\n示例说明\n\n| 心脏病发作 | 是 (1) | 否 (0) | 总计 |\n| :---\
    \ | :--- | :--- | :--- |\n| 是(1) | 3($R_{11}$) | 7($R_{12}$) | 10 |\n| 否(0) |\
    \ 6($R_{21}$) | 4($R_{22}$) | 10 |\n| | 9 | 11 | 20 |\n\n其中 $p/1-p$ 是优势比，$\\ln(p/1-p)$\
    \ 是 logit 优势比。\n\n$$\\text{优势} = \\frac{p(\\text{事件})}{1-p(\\text{事件})} \\quad\
    \ (6.8)$$\n\n优势比是成功概率与失败概率的比值。让我们通过表 6.2 的一个简单说明来理解如何计算优势比。\n接受过愤怒治疗的人患心脏病发作的优势\
    \ = $R_{11}/R_{21}=3/6=0.5$\n未接受过愤怒治疗的人患心脏病发作的优势 = $R_{12}/R_{22}=7/4=1.75$\n\
    相对优势/优势比 = $(R_{12}/R_{22})/(R_{11}/R_{21})=1.75/0.5=0.285$\n为了估计相对于愤怒治疗的心脏病发作概率，使用了逻辑函数\n\
    \n$$\\ln\\left(\\frac{p}{1-p}\\right) = \\beta_0 + \\beta_1x_1$$\n\n其中 $\\beta_0$\
    \ 和 $\\beta_1$ 是回归系数，$p$ 是一个人患心脏病发作的概率。\n\n## 6.3.2 逻辑回归的变体\n\n逻辑回归的主要类型（图 6.2）有\n\
    \n- 简单逻辑回归\n- 多元逻辑回归\n- 二元逻辑回归\n\n### 6.3.2.1 简单逻辑回归\n\n这是一种更简单的形式，只有一个自变量。简单逻辑回归的一般形式是\
    \ $\\ln\\left(\\frac{p}{1-p}\\right) = \\beta_0 + \\beta_1$。仅基于一个变量（例如吸烟习惯）来预测心脏病的存在（是/否），就是简单逻辑回归类型。心脏病\
    \ $y$ 和吸烟习惯 $x_1$ 的变量描述为\n\n$$\\text{心脏病存在 } y = \\begin{cases} 1 & \\text{是}\
    \ \\\\ 0 & \\text{否} \\end{cases}$$\n\n![逻辑回归的变体。](img/7fbca4852dbe91c6cea209148871a1b3_245_0.png)\n\
    \n图 6.2 逻辑回归的变体。\n\n$$\\text{吸烟习惯 } x_1 = \\begin{cases} 1 & \\text{吸烟者} \\\\\
    \ 0 & \\text{非吸烟者} \\end{cases}$$\n\n基于吸烟习惯 $x_1$ 预测心脏病 $y$ 的简单逻辑函数如下\n\n$$\\\
    ln\\left(\\frac{p(y=1|x_1)}{1-p(y=1|x_1)}\\right) = \\beta_0 + \\beta_1 x_1$$\n\
    \n### 6.3.2.2 多元逻辑回归\n\n如果我们有多个自变量，例如 $\\{x_1, x_2, \\dots, x_n\\}$，那么它被称为多元逻辑回归。多元逻辑回归的一般形式见公式\
    \ 6.3\n\n$$\\ln\\left(\\frac{p}{1-p}\\right) = \\beta_0 + \\beta_1 x_1 + \\dots\
    \ + \\beta_n x_n \\quad (6.9)$$\n\n基于多个变量（例如吸烟习惯 $x_1$ 和年龄组 $x_2$）来预测心脏病 $y$（是/否）的存在，是多元逻辑回归的例子。\n\
    \n$$\\ln\\left(\\frac{p(y=1|x_1, x_2)}{1-p(y=1|x_1, x_2)}\\right) = \\beta_0 +\
    \ \\beta_1 x_1 + \\beta_2 x_2 \\quad (6.10)$$\n\n### 6.3.2.3 二元逻辑回归\n\n它试图预测二元目标（0,\
    \ 1）的概率。二元逻辑回归是一种更简单的方法，它利用了 sigmoid 函数。例如，如图 6.3 所示，基于湿度预测明天是否会下雨，目标因变量“是否会下雨”恰好包含两个类别，即下雨（1）和不下雨（0）。\n\
    \n![二元逻辑回归。](img/7fbca4852dbe91c6cea209148871a1b3_246_0.png)\n\n图 6.3 二元逻辑回归。\n\
    \n$$P(\\text{下雨} = 0 \\mid \\text{湿度}) = \\frac{e^{-(\\beta_0 + \\beta_1 \\text{湿度})}}{1\
    \ + e^{-(\\beta_0 + \\beta_1 \\text{湿度})}}$$\n\n二元逻辑回归分类的其他一些例子：\n\n- 哪些因素影响一个人决定去休闲旅行？\n\
    \  $Y=1$ 如果去休闲旅行，否则为 0\n- 哪些因素决定婴儿出生体重？\n  $Y=1$ 如果婴儿出生体重偏低，否则为 0\n- 哪个人群更可能投票支持新立法？\n\
    \  $Y=1$ 如果一个人投了赞成票，否则为 0\n- 哪些客户更可能购买新车？\n  $Y=1$ 如果购买了新车，否则为 0\n\n### 6.3.2.4\
    \ 多类逻辑回归\n\n多类逻辑回归试图预测两个以上目标类别的概率。对于多类分类问题，不使用 sigmoid 函数，而是使用 softmax 函数。多类逻辑回归分类的例子如下。\n\
    \n一个人将投票给哪个政党？\n\n$$\\begin{cases} \\text{共和党} - 1 \\\\ \\text{民主党} - 2 \\\\ \\\
    text{独立党} - 3 \\end{cases}$$\n\n一个人有什么样的症状？\n\n$$\\text{症状} \\begin{cases} \\\
    text{无} - 0 \\\\ \\text{轻度} - 1 \\\\ \\text{中度} - 2 \\\\ \\text{重度} - 3 \\end{cases}$$\n\
    \n多类逻辑回归的两种类型是有序逻辑回归和名义逻辑回归。\n\n### 6.3.2.5 名义逻辑回归\n\n它是多类逻辑回归的一种类型，其中目标因变量包含两个以上的类别标签。名义类别变量中不存在固有的或自然的顺序。"

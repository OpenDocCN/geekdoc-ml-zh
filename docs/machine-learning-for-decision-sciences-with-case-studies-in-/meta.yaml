    以及以下标记为负类（用‘-’表示）的数据点（见图6.117）：


    $$\left\{\left(\begin{array}{l}1 \ 1\end{array}\right),\left(\begin{array}{l}1
    \ -1\end{array}\right),\left(\begin{array}{l}-1 \ -1\end{array}\right),\left(\begin{array}{l}-1
    \ 1\end{array}\right)\right\}$$


    这些点是非线性可分的，如图6.118所示。因此，我们必须使用非线性SVM；即映射函数 $\emptyset$ 是从输入空间到某个特征空间的非线性映射。该映射定义为


    $$\emptyset\left(\begin{array}{l}x_{1} \ x_{2}\end{array}\right)=\left\{\begin{array}{l}\left(\begin{array}{l}4-x_{2}+\left|x_{1}-x_{2}\right|
    \ 4-x_{1}+\left|x_{1}-x_{2}\right|\end{array}\right) \ \left(\begin{array}{l}x_{1}
    \ x_{2}\end{array}\right)\end{array}\right. \begin{array}{l}\text { 如果 } \sqrt{x_{1}^{2}+x_{2}^{2}}>2
    \ \text { 否则 }\end{array}$$


    正例数据映射到特征空间后为


    $$\left\{\left(\begin{array}{l}2 \ 2\end{array}\right),\left(\begin{array}{l}6
    \ 2\end{array}\right),\left(\begin{array}{l}6 \ 6\end{array}\right),\left(\begin{array}{l}2
    \ 6\end{array}\right)\right\}$$


    负例数据映射后为


    $$\left\{\left(\begin{array}{l}1 \ 1\end{array}\right),\left(\begin{array}{l}1
    \ -1\end{array}\right),\left(\begin{array}{l}-1 \ -1\end{array}\right),\left(\begin{array}{l}-1
    \ 1\end{array}\right)\right\}$$


    这些点绘制如图6.119所示，支持向量（圈出）靠近由坐标给出的超平面。


    $$\left\{s_1=\left(\begin{array}{l}1 \ 1\end{array}\right),s_2=\left(\begin{array}{l}2
    \ 2\end{array}\right)\right\}$$


    接下来，我们将使用添加了1作为偏置输入的增广向量


    $$\left\{ s_1 = \begin{pmatrix} 1 \ 1 \ 1 \end{pmatrix}, s_2 = \begin{pmatrix}
    2 \ 2 \ 1 \end{pmatrix} \right\}$$


    下图表示了SVM的结构，其对应的方程如下。


    $$\alpha_1 \emptyset(s_1) \cdot \emptyset(s_1) + \alpha_2 \emptyset(s_2) \cdot
    \emptyset(s_1) = -1$$

    $$\alpha_1 \emptyset(s_1) \cdot \emptyset(s_2) + \alpha_2 \emptyset(s_2) \cdot
    \emptyset(s_2) = +1$$


    由于目前我们有 $\emptyset() = 1$，这简化为


    $$\alpha_1 \widetilde{s_1} \cdot \widetilde{s_1} + \alpha_2 \widetilde{s_2} \cdot
    \widetilde{s_1} = -1$$

    $$\alpha_1 \widetilde{s_1} \cdot \widetilde{s_2} + \alpha_2 \widetilde{s_2} \cdot
    \widetilde{s_2} = +1$$


    让我们将S1、S2和S3的值代入上述方程


    $$\alpha_1 \begin{pmatrix} 1 \ 1 \ 1 \end{pmatrix} \cdot (1\ 1\ 1) + \alpha_2
    \begin{pmatrix} 2 \ 2 \ 1 \end{pmatrix} \cdot (1\ 1\ 1) = -1$$

    $$\alpha_1 \begin{pmatrix} 1 \ 1 \ 1 \end{pmatrix} \cdot (2\ 2\ 1) + \alpha_2
    \begin{pmatrix} 2 \ 2 \ 1 \end{pmatrix} \cdot (2\ 2\ 1) = +1$$


    $$3\alpha_1 + 5\alpha_2 = -1$$

    $$5\alpha_1 + 9\alpha_2 = +1$$


    解上述方程组，我们得到 $\alpha_1 = -7, \alpha_2 = 4$

    现在，我们得到了 $\alpha_i$。超平面的方程可以写为

    $$y = wx + b$$

    $w$ 和 $b$ 的值由下式给出

    $$\tilde{w} = \sum_i \alpha_i \cdot \tilde{s}_i$$

    $$= -7 \cdot \begin{pmatrix} 1 \ 1 \ 1 \end{pmatrix} + 4 \cdot \begin{pmatrix}
    2 \ 2 \ 1 \end{pmatrix}$$

    $$= \begin{pmatrix} 1 \ 1 \ -3 \end{pmatrix}$$

    这里，$w = \begin{pmatrix} 1 \ 1 \end{pmatrix}$ 且 $b = -3$。期望的决策边界是图6.120中所示的深色线。


    ## 示例 6.14


    给定表格中的十个实例，这是一个如图6.121所示的非线性可分情况。如何使用核技巧将非线性可分转换为线性可分？

    为了将特征空间从原始非线性空间转换，然后使用公式将 $x_1$ 和 $x_2$ 转换到高维空间 $z_1$ 和 $z_2$。

    $$z_1 = x_1^2 \text{ 且 } z_2 = x_1 \cdot x_2$$

    结果已制表，输出如图6.122所示。



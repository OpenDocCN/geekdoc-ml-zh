    data_split\n```\n\n# ## Building the training set:\n# #### We pairwise compared\
    \ each review of set1 with all reviews of set0 and vice-versa\n# + (Rx, Ry,1)\
    \ where x∈Set1 and y∈Set0 → Rx is better than Ry\n# + (Ry, Rx, 0) where x∈Set1\
    \ and y∈Set0 → Ry is worst than Rx\n\n# #### This now becomes a classification\
    \ problem, as illustrated in Figure 9.11.\n\n```\ndef building_training_data(df):\n\
    \    A = df[df['label']==1]\n    A.loc[df['label']==1,'join'] = 'j'\n    B = df[df['label']==0]\n\
    \    B.loc[df['label']==0,'join'] = 'j'\n    trainset1 = pd.merge(A,B,how='outer',on='join')\n\
    \    trainset2 = pd.merge(B,A,how='outer',on ='join')\n\n    trainset = pd.merge(trainset1,trainset2,how='outer')\n\
    \    return trainset\n```\n\n```\nproduct_list = df['product'].unique()\ndata_stack\
    \ = []\nfor product in product_list:\n    temp = deepcopy(df[df['product']==product].iloc[:,2:])\n\

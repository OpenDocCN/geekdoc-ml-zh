- md: "## 6.7.2 What Is a Hyperplane?\n\nFor a classification task with only two features,\
    \ you'll consider a hyperplane as a line that linearly separates and classifies\
    \ a set of information. Intuitively, the more beyond the hyperplane our data points\
    \ lie, the more confident we are that they need to be correctly classified. We,\
    \ therefore, want our data points to be as far off from the hyperplane as possible\
    \ while still being on the right side of it. So when new testing data are added,\
    \ whatever side of the hyperplane it lands will decide the category that we assign.\
    \ Let's revisit the iris dataset:\n\n```python\nimport numpy as np\nfrom sklearn.model_selection\
    \ import cross_val_score, train_test_split\nfrom sklearn import datasets\nfrom\
    \ sklearn import svm\n\niris = datasets.load_iris()\n\nX_train, X_test, y_train,\
    \ y_test = train_test_split(iris.data, iris.target, test_size=0.4, random_state=0)\n\
    \n# Build an SVC model for predicting iris classifications using training data\n\
    clf = svm.SVC(kernel='linear', C=1).fit(X_train, y_train)\n\n# Now measure its\
    \ performance with the test data\nclf.score(X_test, y_test)\n\n# The output is\
    \ shown below.\n0.9666666666666667\n```\n\nFor K-fold cross-validation, let's\
    \ use a K of 5\n\n```python\n# let us give cross_val_score a model, the entire\
    \ data set and its \"real\" values, and the number of folds:\nscores = cross_val_score(clf,\
    \ iris.data, iris.target, cv=5)\n\n# Print the accuracy for each fold:\nprint(scores)\n\
    \n# and the mean accuracy of all 5 folds:\nprint(scores.mean())\n\n# The output\
    \ is shown below.\n[0.96666667 1. 0.96666667 0.96666667 1. ]\n0.9800000000000001\n\
    clf = svm.SVC(kernel='poly', C=1).fit(X_train, y_train)\nscores = cross_val_score(clf,\
    \ iris.data, iris.target, cv=5)\nprint(scores)\nprint(scores.mean())\n\n# The\
    \ output is shown below.\n[1. 1. 0.9 0.93333333 1. ]\n0.9666666666666666\n```\n\
    \n## SUMMARY\n\nThis chapter introduced the supervised learning algorithms applied\
    \ for classification applications. Logistic regression, decision trees, RF, and\
    \ SVMs were covered in detail with solved examples, real-world applications, and\
    \ implementation in Python.\n\nSome of the key points to be remembered are as\
    \ follows:\n\n- A decision tree is a tree-structured classifier. The decision\
    \ node and leaf node are the two nodes in the decision tree. A test is done on\
    \ the decision node. A leaf node represents the class label. The path from the\
    \ root to the leaf represents the classification rule. Information gain is the\
    \ amount of energy that cannot be used to do work or measure disorders in the\
    \ system. $\\sum_{i=1}^{c} - P \\log P$.\n- In the ID3 algorithm, the information\
    \ gain is used for the selection of root attributes. The information gain is calculated\
    \ for each attribute, and the attributes having high information gain are selected\
    \ as the root node.\n- In C4.5 algorithm, the gain information is used for the\
    \ calculation of root attributes. The attributes having maximum gain ratio are\
    \ selected as the root node.\n- The CART algorithm uses the Gini index to identify\
    \ the attributes for the root node. The attribute having a low Gini index is selected\

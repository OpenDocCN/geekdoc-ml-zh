  md: '# Introduction


    Chapter 1 describes the basic concepts of data science, and structural patterns
    involved in decision sciences. The relation between machine learning and statistics
    is highlighted with an introduction to data science life cycle. The key role of
    a data scientist is briefed, and the real-world applications in these areas are
    emphasized.


    In Chapter 2, the need for Python programming in machine learning, basics of Python
    programming, and data structures and their implementation using Python are presented.
    In addition, we introduce the readers to NumPy basics, Matplotlib basics, Pandas
    basics, and the computational complexity involved in programming using Python.
    The chapter also provides programming examples for beginners using Python. A few
    real-world examples are also programmed so that the reader will understand implementation
    in Python with NumPy, Pandas, and Matplotlib libraries.


    Chapter 3 focuses on the phases involved in the data analytics life cycle for
    machine learning. The aspects involved in data discovery, data preparation and
    exploratory data analysis, model planning, and model building are delineated.
    The reader is also exposed to the process of communicating results and optimizing
    and operationalizing the models. The roles and responsibilities of the members
    involved throughout the phases of data analytics life cycle are explained in detail.


    Chapter 4 gives an insight into the basics of unsupervised learning, distance
    measures, the concept of clustering, the most commonly used clustering algorithms,
    their applications to solve problems in real time, and their limitations.


    In Chapter 5, the essential ideas behind all supervised algorithms in machine
    learning are discussed. The mathematical concept behind supervised algorithm with
    worked examples and implementation using Python is given in detail. Supervised
    algorithm for regression problem is well explained in this chapter with Python
    implementation.


    The supervised learning method learns from the labeled data. Logistic regression,
    decision tree, and support vector machine are the various supervised learning
    classification algorithms widely used. In Chapter 6, a detailed description of
    these algorithms, their mathematical modeling, merits and demerits, solved examples,
    and real-world applications are provided with step-by-step implementation in Python.


    Chapter 7 enlightens an analysis on feature engineering and reviews the basic
    requirements for features selection, wrapper models, and factor analysis with
    relevant Python examples.


    In Chapter 8, we discuss the goal-oriented learning based on reinforcement learning,
    and how reinforcement learning (RL) varies when compared with other machine learning
    algorithms. The elements of RL such as agent, policy function, and value function
    are explained in detail, followed by the RL algorithms the Markov decision process
    (MDP) and dynamic programming (DP). The value functions, policy evaluation, and
    improvements are covered along with implementation of MDP and DP in Python.


    Chapter 9 highlights a few applications of machine learning in various industries
    to solve problems where traditional programming cannot accommodate the reasoning
    for many combinations. The first use case, Retail Price Optimization Using the
    Price Elasticity of Demand Method, identifies the exact price at which the most
    profit may be made. We present the application based on a customer dataset in
    a supermarket in use case 2 – Market Basket Analysis – highlighting association
    rule mining. Use case 3 – Sales Prediction of a Retailer – shows how to create
    a machine learning model and determine the sales of each product at a certain
    store. In use case 4, the cost of insurance claims is predicted for a property
    and casualty (P&C) insurance company. This case study shows how to clean data,
    preprocess data, and deal with outliers.'

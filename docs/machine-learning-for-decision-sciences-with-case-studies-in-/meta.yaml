    # discuss all the features extracted from reviews.

    # Step 1: Noun Strength (Rn): Nouns are subjects regarded as the most

    # informative language section. The number of subjects shows the importance

    # of review because only a noun describes the prime factors of review

    # (which tells us what the review is about). We did POS Tagging to seek out

    # nouns during a review and computed score as:

    # Step 2: Score (Rn) = TFIDF(noun) / TFIDF(all words)

    # Step 3: Review Polarity (Rp): Its value lies between -1 to +1, which

    # tells whether a review has sentiment or negative sentiment.

    # Step 4: Review Subjectivity (Rs): The subjectivity could measure the

    # objective to subjective sentiment and goes from 0 to 1. Objective

    # expressions are facts, while Subjective expressions are opinions that

    # describe a person''s feelings. Consider the following expression:

    # Bournvita tastes excellent with milk: Subjective

    # Bournvita is brown: Objective

    # Step 5: Review Complexity (Rc): to gauge how good and sophisticated a

    # review is in terms of unique words within and across a specific product''s

    # entire review corpus.

    # Rc = Number of unique words during a Review / Number of unique words in

    # the entire Corpus

    # Step 6: Review Word Length (Rw): Word count of a Review

    # Step 7: Service Tagger (Rd): the simplest review talks more about how

    # the product, how it tastes, what its uses are, and therefore the one

    # which talks about the effectiveness of a product. Reviews are basically

    # to describe a product. So, a dictionary of words is made, which might

    # mark reviews as service-based, delivery reviews, and customer support.

    # Fuzzy matching each word during a review is finished with the words

    # within the dictionary with Levenshtein distance. Levenshtein distance

    # helps measure the difference between two sequences and tackles spell

    # errors in review. For instance, rather than "My delivery was on time",

    # Reviews is wrongly written as "My delivery was on time". In this case,

    # Fuzzy matching would help us to match both the reviews.

    # Step 8: Compound Score (Rsc): to enhance the efficiency of the system.


    which has all the calendar dates for a year, and that also has attributes, if
    the date is a holiday, weekend, or school break days. It also contains another
    attribute, temperature, that will dictate the outdoor dining possible (as a categorical
    variable). The second file is the Product master data that contains the product
    list, and the third file contains the sale transactions.



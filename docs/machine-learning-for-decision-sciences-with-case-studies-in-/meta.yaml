  md: '# 4 Unsupervised Learning


    LEARNING OBJECTIVES


    At the end of this chapter, the reader will be able to


    +   - Understand different types of clustering algorithms, namely k-means, fuzzy
    k-means, hierarchical (agglomerative and divisive), and DBSCAN algorithms

    - Implement the algorithms using Python

    - Analyze the performance of the algorithms based on several evaluation metrics

    - Appreciate the limitations of clustering algorithms and adapt suitable ones
    based on the working dataset


    # 4.1 INTRODUCTION


    One of the promising areas to learn systems formally is machine learning. Machine
    learning algorithms are used mostly in interdisciplinary areas by combining the
    thoughts from several fields, such as optimization theory, cognitive science,
    mathematics, statistics, and computer science. In this chapter, the reader would
    benefit from the broad underlying area of machine learning known as unsupervised
    learning. The present-day data scientists apply various machine learning algorithms
    to extract valuable information from the data provided. Most of the learning algorithms
    are supervised learning problems since we have a priori knowledge of the output
    of the type of data presented.


    On the contrary, unsupervised learning is a complex and challenging approach to
    machine learning algorithms. Despite its complexity, the advantages of unsupervised
    learning algorithms are numerous. This class of algorithms has proven to be potential
    enough to provide solutions to previously unsolvable problems and has gained a
    lot of popularity in machine learning and deep learning. This chapter will explain
    the basics of unsupervised learning, distance measures, the concept of clustering,
    the most commonly used clustering algorithms, their applications to solve problems
    in real time, and their limitations.


    # 4.2 UNSUPERVISED LEARNING


    The class of unsupervised learning is a kind of self-organized learning that helps
    us identify patterns or similarities in our data related to various features.
    The three main categories of machine learning are supervised learning, unsupervised
    learning, and reinforcement learning.


    Consider a machine or a system that receives a sequence of inputs $x_1, x_2, x_3,
    \dots$, from a sensor where $x_t$ is the sensory input at time $t$. This input
    that is received sequentially concerning time is called the data. Data can be
    any real-time measurement such as an image from a camera and voltage or current
    values from a solar panel.


    In supervised learning, the system is also presented with a sequence of desired
    outputs $y_1, y_2, \dots$, along with the received input data. The goal of the
    system is to learn to produce the correct output upon receiving successive inputs.


    In reinforcement learning, the system interacts with its environment by producing
    a set of actions. These actions, in turn, impact the environment, and this change
    results in the system receiving a few scalar rewards or penalties corresponding
    to every action. Thus, the system''s goal is to act in such a way as to maximize
    future rewards or minimize future penalties.'

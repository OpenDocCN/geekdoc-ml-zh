  md: "used in cases where the attributes of the data vectors are color components,\
    \ coordinates, or numeric types in D-dimensional Euclidean space.\n\n# 4.3.1.1\
    \ Minkowski Metric\n\nIf the D-dimensional space is large, then the Minkowski\
    \ metric is used to evaluate the distance. The Minkowski metric is expressed as\
    \ follows:\n\n$$d(x_i, x_j) = \\left( \\sum_{k=1}^{D} |x_i^k - x_j^k|^p \\right)^{1/p}$$\n\
    \nwhere $D$ is the dimensionality of the data. In *Euclidean distance*, $p = 2$,\
    \ while *Manhattan metric* has $p = 1$. As reported in the literature, there are\
    \ no standard theoretical guidelines for choosing a measure for any given application.\
    \ Researchers have formulated an appropriate measure using domain knowledge.\n\
    \n# 4.3.2 Similarity Measures\n\nThere are a set of similarity measures (proximity\
    \ measures) to obtain a specific clustering solution to a given set of data:\n\
    \n# Proximity Measures\n\nA proximity measure can be defined between two data\
    \ points in clustering. The term proximity refers to the similarity or dissimilarity\
    \ of the samples concerning each other. Assume $x_i$ and $x_j$ are the two data\
    \ points in a set of D-dimensional data as shown in Figure 4.3:\n\n+   - Similarity\
    \ measure $S(x_i, x_j)$ is large if $x_i$ and $x_j$ are similar\n- Dissimilarity(or\
    \ distance) measure $D(x_i, x_j)$ is small if $x_i$ and $x_j$ are dissimilar\n\
    \nSeveral similarity measures exist in the literature that can be used to evaluate\
    \ the similarity or dissimilarity.\n\n+   - **Vectors: cosine distance**\n  If\
    \ the data is represented in the form of vectors, then the similarity measure\
    \ is evaluated using the cosine distance according to the equation\n\n$$S(x_i,\
    \ x_j) = \\frac{x_i x_j}{\\|x_i\\| \\|x_j\\|}$$\n\n![](img/7fbca4852dbe91c6cea209148871a1b3_171_0.png)\n\
    \n**FIGURE 4.3** Similarity metrics based on distance."

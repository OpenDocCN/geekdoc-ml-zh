    # 4.6.2 DIVISIVE HIERARCHICAL CLUSTERING


    In divisive hierarchical clustering, the clustering process starts from the top
    or root of the dendrogram where all data points are in one single cluster. Then,
    it starts to split the root into a set of child clusters. The process of splitting
    is continuously performed for each child cluster. The process of splitting stops
    only when a singleton cluster of one data point is present. Moreover, top-down
    divisive hierarchical clustering is more complex than the bottom-up approach because
    it uses a flat clustering algorithm. The most extensively used flat clustering
    algorithm is k-means clustering.


    The top-down approach as shown in Figure 4.7 is more accurate as it gives a complete
    idea from global distribution, whereas the bottom-up approach decides from the
    local distributions. The following are the steps to perform divisive clustering:


    **Initialization:** Initially start from the top or root of the dendrogram, which
    contains one single cluster with all data points.


    **Repeat**


    +   - Choose which cluster to split

    - Determine how to split: Split that cluster by the flat clustering algorithm
    such as k-means clustering, and


    **Until termination condition:** Each data is in its singleton cluster.


    # 4.6.3 TECHNIQUES TO MERGE CLUSTER


    To define inter-cluster distance for merging two clusters, the following approaches
    are used widely:


    +   - Min or single link

    - Max or complete link

    - Group average or average link

    - Centroid distance

    - Ward''s method


    **Single linkage:** The distance between two clusters C1 and C2 is represented
    by the distance of the closest pair of data objects belonging to different clusters,
    as shown in Figure 4.8. The single-link method is sensitive to outliers because
    they lie far away from the rest of the data points.'

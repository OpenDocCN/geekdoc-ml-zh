    cm = np.corrcoef(data[cols].values.T)\nf, ax = plt.subplots(figsize =(12, 10))\n\
    sns.heatmap(cm, ax = ax, cmap =\"YlGnBu\",\n            linewidths = 0.1, yticklabels\
    \ = cols.values,\n            xticklabels = cols.values)\n```\n\n![](img/7fbca4852dbe91c6cea209148871a1b3_150_0.png)\n\
    \nAnother technique to clean and enrich the data is typecasting. It is the technique\
    \ to convert the data into a different type than the source data. For example,\
    \ a variable in the source data may be coded as string/character even though the\
    \ permissible values in the variable are only numeric (integers and float types).\
    \ Simply put, typecasting is converting one data type to another. There are basic\
    \ functions that are int(), string(), and float(), and they are used for typecasting.\
    \ Int() function is used for integer literal, and float() is for decimal numbers.\
    \ In python, it is very straightforward to convert from one data type to another.\n\
    \n```python\n#Here is the code snippet -\nx=float(2)\ny=float(30.0)\nz=float(\"\
    20\")\nprint(x)\nprint(y)\nprint(z)\n```\n\n![](img/7fbca4852dbe91c6cea209148871a1b3_151_0.png)\n\
    \nFIGURE 3.25 Correlation matrix with other columns.\n\nThe output is:\n\n```\n\
    2.0\n30.0\n20.0\n```\n\nTo understand the data type of the variable, use the function\
    \ type().\n\nThere are two types of typecasting, that is implicit and explicit.\
    \ In implicit conversion, python automatically converts one data type to another.\
    \ This process doesn't need any user involvement at all. When you add one integer\
    \ and another float number, the result will be automatically casted as a float\
    \ without the user specifying it. For example,\n\n```python\nnum_int = 123\nnum_float\
    \ = 1.23\n\nnum_new = num_int + num_float\n\nprint(\"datatype of num_int:\",type(num_int))\n\
    print(\"datatype of num_flo:\",type(num_float))\nprint(\"Value of num_new:\",num_new)\n\
    print(\"datatype of num_new:\",type(num_new))\n```\n\nThe output is:\n\n```\n\
    datatype of num_int: <class 'int'>\ndatatype of num_flo: <class 'float'>\nValue\
    \ of num_new: 124.23\ndatatype of num_new: <class 'float'>\n```\n\nIn explicit\
    \ conversion, the users had to explicitly convert the data type of an object to\
    \ the required data type. We use the predefined functions like int(), float(),\
    \ and str() to perform explicit type conversion.\n\n```python\nnum_int = 123\n\
    num_str = \"123\"\n\nprint(\"Data type of num_int:\",type(num_int))\nprint(\"\
    Data type of num_str before Type Casting:\",type(num_str))\n\nnum_str = int(num_str)\
    \ # WE ARE EXPLICITELY CONVERTING THE datatype\nprint(\"Data type of num_str after\
    \ Type Casting:\",type(num_str))\n\nnum_sum = num_int + num_str\n\nprint(\"Sum\
    \ of num_int and num_str:\",num_sum)\nprint(\"Data type of the sum:\",type(num_sum))\n\
    ```\n\nThe output is:\n\n```\nData type of num_int: <class 'int'>\nData type of\
    \ num_str before Type Casting: <class 'str'>\nData type of num_str after Type\
    \ Casting: <class 'int'>\nSum of num_int and num_str: 246\nData type of the sum:\
    \ <class 'int'>\n```\n\nEven though typecasting is a handy tool in data pre-processing,\
    \ we need to have few cautions in mind when using it. For example, when the Python\
    \ interpreter does the implicit conversion, the loss of data is prevented automatically\
    \ by the Python. But when there is an explicit conversion, there could be data\
    \ loss depending on the data types that might impact processes requiring data\
    \ accuracy.\n\nWhen complaining about the multiple despaired datasets, we need\
    \ to employ joins. For example, there are datasets with one master and transaction\
    \ data; to combine these datasets (tables), we need to use joins. The different\
    \ types of joins are illustrated in Figure 3.26. We can use the Python Pandas\
    \ library to use inner joins, full joins, left joins, and right joins. Inner joins\
    \ get the results set that are common in both tables. For example, you have two\
    \ tables from different sources with the customer data, and the inner join will\
    \ bring only the common data available in both tables. The full join or outer\
    \ join returns all records when there is a match in dataset1 and dataset2. Left\
    \ join returns all records from the left table (dataset1) and the matched records\
    \ from the right table (dataset2).\n\n![](img/7fbca4852dbe91c6cea209148871a1b3_152_0.png)\n\
    \nFIGURE 3.26 Types of joins."

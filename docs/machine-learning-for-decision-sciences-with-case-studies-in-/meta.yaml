    such as checkout details (number of past and last use), publication date, last
    use, language, country, and alphabetic prefix, are taken. Based on the EAR value,
    the book is moved to the off-site storage.


    Figure 6.51 represents the simple decision tree. First, the tree is classified
    based on the language and then classified based on the publication country. The
    trees are also constructed based on the single criteria (i.e., last use) as shown
    in Figure 6.52.


    Figure 6.53 represents the decision tree classification based on Fussler and Simon''s
    choice policy. First, a decision tree is constructed based on the root nodes divided
    between the language attribute and children of the root node divided based on
    the publication date.


    The ID3 algorithm is used for designing a decision tree. First, the information
    gain is calculated for the different attributes, and the tree with the greatest
    gain is selected to divide the data. Then, the nodes are created based on the
    checkout. Finally, the smoothed tree is evaluated by using pruning.



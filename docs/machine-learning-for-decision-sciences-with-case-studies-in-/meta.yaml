    Python has a lot of visualization libraries like Matplotlib (we have discussed
    that in Chapter 2) to Seaborn, which is based on Matplotlib and has advanced data
    visualization functions that help us understand the data behaviors visually. Seaborn
    library has multiple features, including an application programmable interface
    that allows comparing multiple variables, multi-plot grids to build easy visualizations,
    univariate (analysis with one variable), and bivariate to compare between subsets
    of data. These multiple color pallets allow showing various kinds of patterns.
    In addition, there are mandatory dependency libraries that are needed for Seaborn
    to work. They are Numpy, Pandas, Matplotlib, SciPy, and Statsmodels.



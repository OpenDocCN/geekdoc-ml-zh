    \n## 9.1.3 CONCLUSION\n\nBased on its previous sales data, this is the optimal\
    \ price the cafe must set on its items to earn the highest profit. It is essential\
    \ to note that this is on a normal day. On “other” days, such as a holiday or\
    \ an event, it has a different impact on customer buying behaviors and patterns.\
    \ Usually, an increase in consumption is seen on such days. These must be treated\
    \ separately.\n\nSimilarly, it is important to remove any external effects other\
    \ than price that will affect customers’ purchase behaviors, including the data\
    \ points when the item was on discount. Once the new prices are put up, it is\
    \ important to monitor the sales and profit continuously. If this pricing method\
    \ is a part of a product, a dashboard can be created to monitor these items and\
    \ calculate the lift in the profit.\n\n## 9.2 USE CASE 2 – MARKET BASKET ANALYSIS\
    \ (MBA)\n\n### 9.2.1 INTRODUCTION\n\nCustomer MBA is one of the important techniques\
    \ used by large retailers to uncover combinations and links between items. This\
    \ process is done by looking for combinations of items that arise together, usually\
    \ within transactions. To rephrase, this allows the retailers to identify connections\
    \ between the items that people buy. This proposition is based on the theory that\
    \ customers who buy one item are more likely to buy another related item.\n\n\
    For example, people who buy women’s hosiery usually buy kids’ clothes too. So\
    \ the marketing teams at retail chains will target those customers who buy women’s\
    \ and kids’ clothes and provide a discount to them to buy the third item, like\
    \ small jewelry (which has a high margin for the retailer). This also dictates\
    \ how the stores are organized. The variation of this is called space and capacity\
    \ analysis. Based on customer behavior, the store layout can be arranged to maximize\
    \ the revenue of the shelf space.\n\nSo, if customers buy women’s and kids’ clothes\
    \ and see a discount or an offer on jewelry, they will be encouraged to spend\
    \ more and buy the jewelry. This is what is referred to as Basket Analysis, or\
    \ Market Basket Analysis, or, in short, called MBA. This is just one example.\
    \ So, if we take hundreds and thousands of items of the supermarket’s data, we\
    \ can get a huge number of insights. And that is why association rule mining is\
    \ so critical.\n\n### 9.2.2 UNDERSTANDING THE DATA\n\nFor this example, we use\
    \ a customer dataset that describes the customer in detail such as location, age,\
    \ income, and education, and product and product class give the sufficient details\
    \ of the product and their groupings, store with details of location, sqft, store\
    \ type (if this is a super market, mini-store, etc.), region, and time dimension.\
    \ We also use the sales transaction data.\n\nIn this solution, we use Apriori\
    \ and Fpgrowth algorithms. Apriori is an algorithm for frequent item set mining\
    \ and association rule mining based on learning over relational databases. It\
    \ progresses by identifying the recurring individual items within the dataset\
    \ and increasing them to larger item sets as long as those item sets appear sufficiently\
    \ often in the database. On the other hand, Fpgrowth, also known as Frequent Pattern\
    \ Growth Algorithm, only generates the frequent item sets per the user’s minimum\
    \ support. One difference between Apriori and Fpgrowth algorithms is that the\
    \ Fpgrowth algorithm doesn’t scan the whole database multiple times, and the scanning\
    \ time increases linearly. Hence, the Fpgrowth algorithm is much faster than the\
    \ Apriori algorithm.\n\n```python\n#!/usr/bin/env python\n# coding: utf-8\n@author:\
    \ Suresh Rajappa\n# # Market Basket Analysis\n#\n# **What is Market Basket Analysis\
    \ ?**\n#\n# Market Basket Analysis is one of the large retailers' important techniques\
    \ to discover the relationship between items using the customer buying patterns.\n\
    # It works by looking for combinations of items that occur together frequently\
    \ in transactions. To put it another way, it allows retailers to identify relationships\
    \ between the items that people buy\n# # Market Basket Analysis (MBA) For Foodmart\
    \ Store sample Dataset\n# Food Mart (FM) is a chain of convenience stores in the\
    \ United States. The private company's headquarters are located in Mentor, Ohio,\
    \ and there are currently approximately **325 stores located in the US**. Food\
    \ Mart operates on the franchise system.\n```\n\n### Importing Libraries\n\n```python\n\

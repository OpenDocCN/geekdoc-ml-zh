    # Example 6.2: Oil Drill Using Decision Tree


    Assume that you have land that you believe may have oil underground. There is
    only a 15% chance of having oil if you drill, but the payoff is $50,000. Therefore,
    it costs $15,000 to drill. Develop a decision tree for the above problem.


    **Root node:** In the above problem, the root node decides whether the land has
    oil or not. The root node has two probabilities. The land may or may not have
    fuel. This is referred to as a split point. The given data are divided into two
    parts at a split point. The land has oil, and the land does not have oil, as shown
    in Figure 6.21. Table 6.8 represents the profit for drilling the land having oil.


    The profit obtained for drilling the land = 50,000 – 15,000 = 35,000


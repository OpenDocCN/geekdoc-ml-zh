    回归预测建模是近似一个从输入变量 (X) 到连续输出变量 (Y) 的映射函数 (f) 的过程。连续输出变量是一个实值，例如整数或浮点值。这些通常是数量，如金额和大小。


    回归问题需要预测一个连续值，例如预测降雨量。实值或离散输入变量可用于回归分析。具有单个输入变量的问题是简单回归，具有多个输入变量的问题称为多元回归问题。时间序列预测问题是一种输入为有序时间值的回归问题。


    由于预测回归模型预测的是一个数量，因此模型的性能必须使用预测误差来计算。估计预测回归模型性能的方法有很多。最广泛使用的是计算均方根误差 (RMSE)。


    回归预测模型的 RMSE 计算示例：该模型进行了两次预测，一次预测值为 1.5，期望值为 1.0；另一次预测值为 3.3，期望值为 3.0，则 RMSE 为：


    RMSE = sqrt(average(error²)) (5.1)


    RMSE = sqrt(((1.0 – 1.5)² + (3.0 – 3.3)²)/2) = 0.412


    ## 5.3.3 分类与回归


    根据目标值，可以将分类问题与回归问题区分开来，如图 5.5 所示。分类和回归问题都可以使用一些算法（如决策树和人工神经网络）通过微小的改动来学习。线性回归是一种回归预测建模算法，而逻辑回归是一种二元分类算法。分类算法可以使用准确率来评估，而回归算法可以使用
    RMSE 来估计。


    ## 5.3.4 分类与回归问题之间的转换


    在某些情况下，回归问题可用于预测离散值。这可以通过离散化技术实现，该技术将 $0 到 $1000 之间的连续值转换为两个离散的类别标签：类别 1（范围从 $0
    到 $499）和类别 2（范围从 $500 到 $1000）。


    同样，分类问题可用于预测数值。例如，目标输出标签可以转换为连续的数值范围。

    如果存在自然的序数关系，那么从分类问题到回归的转换效果良好，否则可能导致性能不佳。


    ## 5.4 线性回归


    回归分析是监督学习算法中广泛使用的预测技术。线性回归是回归分析最简单的形式，用于分析输入数据点背后的趋势。本节将通过实际示例解释回归的工作原理及其类型。

    线性回归是一种监督学习技术，其中我们有一组带有标签输出的训练样本。它是一种简单的统计技术和可解释的方法，在预测分析中应用非常广泛。线性回归的主要优势在于能更可行地预测趋势。线性回归可用于在给定输入变量值的情况下预测连续目标变量。回归分析用于分析数据之间的关系以预测连续输出变量。换句话说，线性回归通过一条倾斜的直线来识别因变量和自变量之间的关系。这条倾斜的直线被称为回归线或最佳拟合线。回归模型的表示如图
    5.6 所示。


    为了理解线性回归背后的数学原理，让我们看一个简单的例子。给定一组 $n$ 个数据，样本可以表示为 $D = \{D_1, D_2, \dots, D_n\}$，如图
    5.7 所示。单个数据点表示为 $D_i = \langle x_i, y_i \rangle$，其中 $x_i = (x_{i,1}, x_{i,2},
    \dots, x_{i,d})$ 是大小为 $d$ 的输入向量，$y_i$ 是期望输出。其思想是找到最佳的线性关系函数 $x_i \sim f(x_i)$，使得对于所有
    $i=1,2,\dots,n$，$y_i \sim f(x_i)$。


    回归问题定义为：给定一个样本实例 $x$ 和 $y$，我们必须学习一个函数，使得


    $fn : x \rightarrow y$


    $f(x) = w_0 + w_1x_1 + w_2x_2 + \dots + w_dx_d = w_0 + \sum_{i=1}^{d} w_ix_i$
    (5.2)


    其中 $w_0, w_1, \dots, w_d$ 是权重参数。


    线性回归的定义：给定一个包含 $N$ 个观测值 $\{x_n\}$（其中 $n=1, 2, \dots, N$）及其对应目标值 $\{t_n\}$ 的训练数据集。目标是预测新
    $x$ 值对应的 $t$ 值。


    ### 5.4.1 线性回归的类型


    线性回归的变体包括简单线性回归和多元线性回归，进一步分为线性和非线性，如图 5.8 所示。对于简单回归，输入或自变量是一个；而对于多元回归，则是两个或更多。


    ### 5.4.1.1 简单线性回归


    简单线性回归仅包含一个输入或自变量。简单线性回归模型的形式由公式 5.3 给出：


    $$y = \beta_0 + \beta_1 \cdot x$$ (5.3)


    其中 $y$ 是因变量（输出），$x$ 是自变量（输入），$\beta_0$ 是截距，$\beta_1$ 是回归线的斜率。


    有三种可能的情况。


    - **情况 1：** $\beta_1 < 0$，表示变量 $x$ 对 $y$ 有负面影响。在这种情况下，如果 $x$ 增加，$y$ 减少，反之亦然。

    - **情况 2：** $\beta_1 = 0$，表示变量 $x$ 对 $y$ 没有影响。

    - **情况 3：** $\beta_1 > 0$，表示变量 $x$ 对 $y$ 有正面影响。在这种情况下，如果 $x$ 增加，$y$ 增加，反之亦然。


    为了理解线性回归模型，让我们看一个简单的线性模型。例如，如果我们想根据记录的最高气温预测一个城市的峰值电力需求，可以构建一个简单的线性模型来预测明天的峰值需求。


    $$y_i = \theta_1 \cdot x_i + \theta_2$$ (5.4)


    即，预测峰值需求 = $\theta_1$ * 最高气温 + $\theta_2$

    其中

    $y_i$ 是输出或因变量，

    $x_i$ 是输入或自变量，

    $\theta_1 = 0.046$ 和 $\theta_2 = -1.46$ 是模型参数。


    例如，如果记录的最高气温是 80°F，则预测输出为


    $$y_i = \theta_1 \cdot x_i + \theta_2$$


    $$y_i = 0.046 * 80 - 1.46$$


    那么，预测的峰值需求输出为 2.19 GW。温度与峰值需求之间存在正相关关系（图 5.9）。


    ### 5.4.1.2 多元线性回归


    多元线性回归包含多个输入或自变量。例如，让我们创建一个基于葡萄酒年份预测葡萄酒价格的模型。这里，因变量是葡萄酒的年份，自变量是葡萄酒的价格（图 5.10）。'

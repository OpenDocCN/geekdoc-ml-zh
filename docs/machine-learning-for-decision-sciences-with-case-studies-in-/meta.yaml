    \n## 4.8.3 DBSCAN 的优缺点\n\n### 4.8.3.1 优点\n\n-   它可以处理异常值和噪声。\n-   它适用于任何形状和大小的数据。\n\
    \n### 4.8.3.2 缺点\n\n-   它无法处理密度变化的数据，并且对参数敏感。\n-   确定参数的正确值并不容易。\n\n## 4.8.4 使用\
    \ Python 实践 DBSCAN\n\n本节将说明如何使用 Python 应用 DBSCAN。此处，使用 sklearn 库中的 `make_blobs`\
    \ 函数生成随机聚类数据。在此案例中，数据经过了变换。与 k-means 算法相比，观察到在 k-means 中，数据仅围绕最近的聚类中心进行聚类，而在 DBSCAN\
    \ 中，数据的整个平面都可以被聚类。为了说明这一特性，对生成的随机数据进行了变换。\n\n生成的样本总数为 500，包含四个中心，`center_box`\
    \ 参数设置在 [-20, 20] 范围内。从相应的库中导入了所需的函数。在使用 DBSCAN 函数时，参数 “eps” 在聚类中起着重要作用。当 “eps”\
    \ 设置为较大值时，所有数据点都形成了一个聚类。同时，将 “eps” 设置为较小值会导致数据被标记为噪声。进行了多次实验以寻求平衡，在本例中，“eps” 设置为\
    \ 0.2。因此，读者可以探索不同的 “eps” 值并观察数据聚类情况。\n\n```python\nimport numpy as np\nimport\
    \ matplotlib.pyplot as plt\nfrom sklearn.datasets import make_blobs\nfrom sklearn.cluster\
    \ import DBSCAN\nfrom sklearn.preprocessing import StandardScaler\nfrom sklearn\
    \ import metrics\n```\n\n```python\n# generate some random cluster data\nX, labels_true\
    \ = make_blobs(n_samples=500, n_features=2, centers=4, cluster_std=1.0, center_box=(-20.0,\
    \ 20.0), shuffle=True, random_state=100)\nrng = np.random.RandomState(74)\n```\n\
    \n```python\n# transform the data to be stretched\ntransformation = rng.normal(size=(2,\
    \ 2))\nX = np.dot(X, transformation)\n```\n\n```python\nscaler = StandardScaler()\n\
    X_scaled = scaler.fit_transform(X)\n# cluster the data into five clusters\ndbscan\
    \ = DBSCAN(eps=0.123, min_samples = 2)\nclusters = dbscan.fit_predict(X_scaled)\n\
    # plot the cluster assignments\nplt.scatter(X[:, 0], X[:, 1], c=clusters, cmap=\"\
    plasma\")\nplt.xlabel(\"Feature 0\")\nplt.ylabel(\"Feature 1\")\n```\n\n```python\n\
    core_samples_mask = np.zeros_like(dbscan.labels_, dtype=bool)\ncore_samples_mask[dbscan.core_sample_indices_]\
    \ = True\nlabels=dbscan.labels_\nn_clusters_ = len(set(labels)) - (1 if -1 in\
    \ labels else 0)\nn_noise_ = list(labels).count(-1)\n```\n\n```python\nprint('Estimated\
    \ number of clusters: %d' % n_clusters_)\nprint('Estimated number of noise points:\
    \ %d' % n_noise_)\nprint(\"Adjusted Mutual Information: %0.3f\"\n      % metrics.adjusted_mutual_info_score(labels_true,\
    \ labels))\nprint(\"Adjusted Rand Index: %0.3f\"\n      % metrics.adjusted_rand_score(labels_true,\
    \ labels))\n```\n\n```python\nprint(\"Completeness: %0.3f\" % metrics.completeness_score(labels_true,\
    \ labels))\nprint(\"Homogeneity: %0.3f\" % metrics.homogeneity_score(labels_true,\
    \ labels))\nprint(\"V-measure: %0.3f\" % metrics.v_measure_score(labels_true,\
    \ labels))\n```\n\n在进行分析时，理解代码中涉及的度量指标非常重要。在实现 DBSCAN 的示例中，使用了 sklearn 库中的 `metrics`\
    \ 函数来评估所有与聚类相关的指标。上述代码的输出如下所示，展示了 “eps”=0.2 时的所有指标。图 4.20 显示了为聚类选择的随机数据的聚类结果。\n\
    \nEstimated number of clusters: 4\nEstimated number of noise points: 0\nAdjusted\
    \ Mutual Information: 1.000\nAdjusted Rand Index: 1.000\nCompleteness: 1.000\n\
    Homogeneity: 1.000\nV-measure: 1.000\n\n随后将 “eps” 的值更改为 0.05，结果如下所示，聚类情况如图 4.21\
    \ 所示。观察到，尽管所需的聚类数为 4，但算法估计的聚类数为 9。估计的噪声点数量也显著增加至 19。所有其他评估指标也存在差异。\n\nEstimated\
    \ number of clusters: 9\nEstimated number of noise points: 19\nAdjusted Mutual\
    \ Information: 0.858\nAdjusted Rand Index: 0.866\nCompleteness: 0.777\nHomogeneity:\
    \ 0.964\nV-measure: 0.860\n\n## 总结\n\n无监督学习是一种机器学习技术，模型不需要监督。可以基于聚类和关联的概念来探索数据的未知模式。本章讨论了几种聚类算法，即\
    \ k-means 聚类、模糊 k-means 聚类、层次聚类（凝聚型和分裂型）以及 DBSCAN 聚类。通过使用 Python 实现示例，详细讨论了这些算法。无监督机器学习帮助你发现数据中的各种未知模式。无监督学习的主要局限性在于聚类过程缺乏精确信息。这可以通过探索和进行多次额外实验，改变模型参数来克服。\n\
    \n## 复习题\n\n1.  假设我们想构建一个神经网络，将二维数据（即 $X=[x_1, x_2]$）分为两类：菱形和十字形。数据集包含 1000 个样本，包括菱形和十字形。使用\
    \ k-means 聚类和 DBSCAN 聚类算法对数据进行聚类，并评估聚类指标。比较算法的性能。通过改变模型参数列出你的观察结果。\n2.  主成分分析在无监督学习中的作用是什么？请详细解释。\n\
    3.  列出所有无监督聚类算法，并确定每个算法相关的模型参数。然后，生成一个随机数据集，并解释每个算法在至少五种设置（覆盖最小和最大范围）下改变模型参数时的观察结果。\n\
    4.  模糊 k-means 算法的局限性是什么？\n5.  讨论凝聚型层次聚类和分裂型层次聚类算法之间的区别。然后，在随机数据集上实现这些算法并观察输出。\n\
    6.  使用无监督学习算法进行聚类是否需要数据清洗？如果需要，适合的数据清洗方法是什么？请讨论。\n7.  进行聚类分析所需的最小特征数是多少？\n8. \
    \ 假设 k-means 算法在同一数据集上运行两次。你观察到的结果相同吗？请证明你的答案。\n9.  什么是树状图？为随机数据生成一个树状图。对于同一数据集，使用凝聚型聚类是否可能得到两个不同的树状图？请详细讨论。\n\
    10. 使用 k-means 聚类算法是否可能获得树状图？请讨论。\n11. 用于评估聚类算法的所有评估指标是什么？列出它们并用相关方程解释。"

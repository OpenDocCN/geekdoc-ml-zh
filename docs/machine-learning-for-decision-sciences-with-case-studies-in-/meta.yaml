  - '[PAGE 77]


    +   - The insertion sort algorithm is more efficient for an array that is almost
    sorted.

    - The insertion algorithm is not optimal since it moves an element only by one
    position at a time, thus consuming more time.


    The insertion sort is improved in shell sort by comparing elements separated by
    a gap of several positions. This algorithm uses insertion sort on the large interval
    of elements to sort. Further, the interval keeps on decreasing until the value
    becomes 1. These intervals are referred to as the gap sequences. Thus, the algorithm
    allows sorting different combinations of smaller gap sizes through multiple passes.
    The array is almost sorted by the time the algorithm reaches its termination,
    so a normal insertion sort would be sufficient to get the sorted list. The algorithm
    of shell sort is explained with a flowchart as shown in Figure 2.21.


    # 2.4.5.19 Quicksort


    Quicksort is one of the efficient data structure algorithms based on partitioning
    the array into smaller sub-arrays. First, a pivot value is chosen, and the partitioning
    of a large array is done based on this value. Each sub-group of the array will
    be holding values based on the pivot value. Once the array is partitioned, the
    quicksort algorithm recursively calls itself to sort the sub-arrays. This algorithm
    is efficient on large-sized data. Indices start from both ends of the array, with
    one index starting from the left and the other starting from the right. The left
    index selects the element smaller than the pivot, while the right index selects
    the element larger than the pivot value. Then, these two selected elements are
    compared and exchanged based on the caparison results. The process repeats until
    all the elements to the left of the pivot and right of the pivot are compared.
    Finally, the pivot value is also moved if required to maintain the sorted order.
    The procedure of the algorithm is explained using a flowchart, as shown in Figure
    2.22.


    # 2.4.5.20 Data Structures in Python with Sample Codes


    The purpose of data structures is to hold some data together. It is used to store
    a collection of data. There are four built-in data structures in Python–list,
    tuple, dictionary, and set.


    # 2.4.5.20.1 List


    A list is a data structure that holds an ordered and similar collection of items,
    that is, one can store a sequence of members in a given list. In Python, the list
    is initialized with square brackets, and each item is comma-separated. Items in
    a list are stored with an index. Once the items are stored in the list, they are
    changeable in the future. This is easy to imagine if the user wants to store the
    student’s name of a class; the student’s name can be similar and is ordered.


    ```

    Example:

    StudentName [“Alice”, “Luna”, “Alice”, “Mack”, “Jhon”]

    Output: [“Alice”, “Luna”, “Alice”, “Mack”, “Jhon”]

    If the user wants to access the 1 st element of a list: print (StudentName[0])

    ```


    # 2.4.5.20.2 Tuple


    The main purpose of the tuple is to hold multiple objects. They are very similar
    to lists but lack the extensive functionality that list offers, that is, items
    not changeable once stored. To create a tuple, specific items need to be defined
    separated by commas within an optional pair of parenthesis. If the user wants
    to store final marks scored by students in different subjects,


    ```

    Mack=(“Science”, 20, “English” 30)

    Output : (Science), 20, “English” 30)

    ```'

    - **控制流语句：** 控制流描述了代码执行的程序顺序。控制语句通过条件语句（如循环和函数调用）来处理。\n- **列表：** 列表是可变且有序的数据结构。列表的每个元素称为一个项。列表使用方括号初始化。\n\
    - **元组：** 元组是由逗号分隔的绝对对象序列。元组通过其索引访问。\n- **字典：** 它是用于映射和存储数据的数据结构，其中键充当索引。键将是单个元素，而值可以是数组或列表。\n\

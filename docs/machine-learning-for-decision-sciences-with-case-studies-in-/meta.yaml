- md: '## 6.3.2.6 Ordinal Logistic Regression


    It is a type of multiclass logistic regression, where the target variable consists
    of more than two class labels. The natural order is present in the ordinal class
    variable. Examples of the ordinal variable are the performance of students and
    tumor grade.


    ## 6.3.3 Optimization Problem


    Optimization is a minimization or maximization problem. Let the actual output
    be $y$ and the predicted output be $\hat{y}$, and the objective is to minimize
    the difference between the predicted output and actual output as given in Equation
    6.4.


    Objective is to $\min(\hat{y} - y)$


    Cross-entropy loss function $L_{CE}$ is the function used in logistic models


    $L_{CE} = -\log p(y|x)$


    $\log p(y|x) = y \log \hat{y} + (1-y) \log(1-\hat{y})$


    $L_{CE} = -[y \log \hat{y} + (1-y) \log(1-\hat{y})]$


    ## 6.3.4 Regularization


    The model performs well for training data and does not classify new unseen data,
    which is known as the overfitting problem. Overfitting occurs when our model fits
    with too much data. This can be resolved by using regularization term to generalize
    the logistic regression model. Regularization can be done by adding a penalty
    to the weight parameters. $L_1$ and $L_2$ regularizations are the two forms of
    regularizations. $L_2$ regularization is a widely used one, and the general form
    is in Equation 6.15.


    $\frac{\lambda}{2} ||w||^2 = \frac{\lambda}{2} \sum_{j=1}^{m} w_j^2$


    where $\lambda$ is the regularization parameter.


    ## 6.3.5 Real-World Applications


    ### 6.3.5.1 Medical Diagnosis


    Several studies utilized logistic regression for disease diagnosis. Evans County
    dataset collected by cohort study predicts the presence of heart disease using
    the logistic regression model. Some of the variables of the Evans County dataset
    are given in Table 6.3.


    The multiple logistic regression form to predict coronary heart disease is given
    in Figure 6.4.


    $$\ln\left(\frac{P(\text{CHD} = 1 | \text{CAT}, \text{CHL}, \text{SMK}, \text{ECG})}{1
    - P(\text{CHD} = 1 | \text{CAT}, \text{CHL}, \text{SMK}, \text{ECG})}\right) =
    \frac{1}{1 + e^{-(\beta_0 + \beta_1\text{CAT} + \beta_2\text{CHL} + \beta_3\text{SMK}
    + \beta_4\text{ECG})}}$$


    Several studies on cancer survival utilized the cancer dataset and performed multiclass
    ordinal logistic regression, as shown in Figure 6.5. Some of the variables of
    the cancer dataset are given in Table 6.4.


    ### 6.3.5.2 Text Classification


    Data scientist widely uses logistic regression for text analysis and classification.
    Several applications such as sentiment analysis, Twitter data classification,
    spam email identification, and recommendation system utilize logistic regression.
    For example, you have a movie review, says “Very Boring,” and the aim is to predict
    whether this review has a positive or negative review, as given in Figure 6.6.


    ### 6.3.5.3 Marketing


    The logistic regression technique is widely used to analyze customer behavior,
    retain the customer, and check a customer’s creditworthiness. Customer churn prediction
    application uses logistic regression technique more efficiently. In churn prediction,
    the logistic regression model classifies customers into three types, namely newly
    acquired customer, existing customer, and churn customer (who decided to end their
    relation). The customer can end their relationship based on various factors such
    as customer service. The variable description of churn prediction is given in
    Table 6.5.


    ## 6.3.6 Logistic Regression in Practice Using Python


    Logistic regression is named for the function used at the core of the tactic,
    the logistic function. The logistic function, also called the sigmoid function,
    is developed by statisticians to elucidate properties of an increase in population,
    rising quickly and maxing out at the environment’s carrying capacity. It’s an
    S-shaped curve that assumes any real-valued number and maps it into a worth between
    0 and 1 but never exactly at those limits.


    ```

    1/(1+e^-value)

    ```


    where *e* is that the base of the natural logarithms (Euler’s number or the EXP()
    function in your spreadsheet) and value is that the particular numerical value
    that you just simply want to remodel. Below might be a plot of the numbers between
    –5 and 5 transformed between the range 0 and 1 using the logistic function.


    Logistic regression could also be a linear method, but the predictions are transformed
    using the logistic function. The impact of this is often that we will not understand
    the predictions as a linear combination of the inputs as we will with linear regression;
    for instance, continuing from the above, the model is often stated as


    $$p(X) = e^{\wedge}(b_0+b_1X) / (1+e^{\wedge}(b_0+b_1X))$$


    We don’t want to dive into the math an excessive amount, but we will rotate the
    above equation as follows (remove the exponent term by adding a logarithm (ln)
    to the other):


    $$\ln(p(X)/1-p(X)) = b_0 + b_1 * X$$


    This is beneficial since we’ll notice that the output on the right is calculated
    linearly again (just like linear regression), and the input on the left might
    be a log of the default class’s probability. This ratio on the left is known as
    the default class’s chances (we’ve always used odds instead of probabilities;
    for example, odds are used in horse racing instead of probabilities). Odds are
    calculated as a ratio of the probability of an event divided by the probability
    of not occurring; for example, 0.8/(1 – 0.8) has a probability of 4. So instead,
    we could write:


    $$\ln(\text{odds}) = b_0 + b_1 * X$$


    We call this left side the log-odds or the probit since the chances are log-converted.
    Of course, other types of functions can be used for the transform (which is beyond
    the scope of this article). Still, it’s customary to ask for the transformation
    that relates the linear regression equation to the probabilities due to the link
    function, such as the probit link function. Then, we can return the exponent to
    its appropriate place and express it as


    $$\text{odds} = e^{\wedge}(b_0 + b_1 * X)$$


    All of this lets us see that the model is still a linear combination of inputs
    but that this linear combination is related to the default class’s log-odds. For
    explaining the logistic regression, we will be using a sample dataset called the
    Titanic dataset. Our goal is to predict, -the values for the variables (Pclass
    – Passenger class of travel, Name of the passenger, gender of the passenger, Age
    of the passenger, If they are related to any of other passengers – (like a spouse,
    sibling, or parent/child of another passenger and the fare paid) – if the person
    could have survived in the titanic mishap.


    Examples of the nominal variable are


    Occupational status $\begin{cases} \text{Self employed} - 0 \\ \text{Government
    employee} - 2 \\ \text{Private employee} - 3 \\ \text{Unemployed} - 1 \end{cases}$


    For instance, let us consider a nominal variable called the type of a target variable.
    We aim to classify the target variable based on the input variables age-group
    and smoking.


    Target dependent variable $Y = \text{Cancer type} \begin{cases} \text{Lung cancer}
    - 0, \\ \text{Mouth cancer} - 1 \\ \text{other} - 2 \end{cases}$


    Independent variable $x_1 = \text{Age group} \begin{cases} 0 & \text{if } \le
    50 \\ 1 & \text{if } > 50 \end{cases}$


    Independent variable $x_2 = \text{Smoking} \begin{cases} 0 - \text{Non smoker}
    \\ 1 - \text{Smoker} \end{cases}$


    To perform multiclass logistic regression, let us assume any category as a reference
    and then separately compare with the other two categories. For example, let us
    consider lung cancer {0} as a reference category and first compare mouth cancer
    {1} versus lung cancer {0} and later other {2} versus lung cancer {0}. Then, the
    odds ratio (OR) needs to be calculated for each separate comparison.


    $\text{OR}_{1\text{vs}0} = \frac{P(Y=1)}{P(Y=0)}$


    $\text{OR}_{2\text{vs}0} = \frac{P(Y=2)}{P(Y=0)}$


    The logit expression for two comparisons is given as


    $\ln\left(\frac{P(Y=1)}{P(Y=0)}\right)$ and $\ln\left(\frac{P(Y=2)}{P(Y=0)}\right)$


    The logistic function for category mouth cancer {1} versus lung cancer {0} is


    $\ln\left(\frac{P(Y=1|x_1, x_2)}{P(Y=0|x_1, x_2)}\right) = \frac{1}{1+e^{-(\beta_0+\beta_1
    \text{ age group}+\beta_2 \text{ smoking})}}$


    The logistic function for category other {2} versus carcinoma {0} is


    $\ln\left(\frac{P(Y=2|x_1, x_2)}{P(Y=0|x_1, x_2)}\right) = \frac{1}{1+e^{-(\beta_0+\beta_1
    \text{ age group}+\beta_2 \text{ smoking})}}$



  md: 'We can ingest data from other sources like Google BigQuery, SAS, STATA, and
    SPSS. The user can refer to the Pandas library help for the updated list of supported
    file types.


    In data preparation, the people involved are as important as the tools employed.
    Proper guidance and assistance are required from IT analysts and database analysts.
    As illustrated earlier, this phase is critical within the analytics life cycle;
    if there is a lack of quality in the acquired data, it would be difficult to perform
    the subsequent steps in the life cycle process. In addition to data preparation,
    this phase also ensures that additional data aspects are considered, and common
    pitfalls are avoided. A few considerations in the data preparation phase are listed
    as follows:


    +   - Identify the required data sources. Whether all the identified data sources
    are available? Proper clarity on the target fields is to be ensured.

    - Whether the required data are clean?

    - Whether the contents and files are consistent?


    While preparing the data, there is a need to identify the amount of missing/inconsistent
    data that can be considered for the project, in other words, to understand the
    degree of allowance for blank/inconsistent data. In addition, if consistent data
    are available and are found deviating from normal, then the consistency of the
    data types has to be assessed. For example, if data are expected to be numeric,
    then it has to be confirmed that any special character such as an alpha numeric
    character can be allowed or not. A crucial and critical review has to be conducted
    on the data columns to ensure they make sense and are in the right form. Also,
    the chances of occurrence of systematic errors have to be verified. Systematic
    error may occur due to the sensor data or unsupervised data. This may lead to
    irregular data or missing data. The data have to be reviewed to gauge if the definition
    of the data is uniform over the repeated measurements.


    # 3.2.2.1 Exploratory Data Analysis



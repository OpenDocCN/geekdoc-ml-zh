    \ $D_0, B_0, C_1, \\dots, D_{t-1}, B_{t-1}, C_t, D_t, B_t$。在这种情况下，环境和整个过程被称为具有马尔可夫性质。\n\
    \n如果环境遵循马尔可夫性质，给定当前状态和动作，单步动力学（方程 8.6）允许预测下一个状态并预期下一个奖励。通过重复此方程，可以预测所有未来状态并预期奖励，给定直到当前时间的整个历史。强化学习将马尔可夫性质视为一个重要标准，因为决策和价值被认为是当前状态的函数。因此，为了使它们强大且信息丰富，状态的表示必须具有指导性。\n\
    \n满足强化学习任务的马尔可夫性质被称为马尔可夫决策过程。如果状态和动作空间的数量有限，则称为有限马尔可夫决策过程。一个特定的有限马尔可夫决策过程由其状态和动作集以及环境的单步动力学确定。如果给定状态\

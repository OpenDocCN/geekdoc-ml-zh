    # 9.2 USE CASE 2 – MARKET BASKET ANALYSIS (MBA)


    # 9.2.1 INTRODUCTION


    Customer MBA is one of the important techniques used by large retailers to uncover
    combinations and links between items. This process is done by looking for combinations
    of items that arise together, usually within transactions. To rephrase, this allows
    the retailers to identify connections between the items that people buy. This
    proposition is based on the theory that customers who buy one item are more likely
    to buy another related item.


    For example, people who buy women’s hosiery usually buy kids’ clothes too. So
    the marketing teams at retail chains will target those customers who buy women’s
    and kids’ clothes and provide a discount to them to buy the third item, like small
    jewelry (which has a high margin for the retailer). This also dictates how the
    stores are organized. The variation of this is called space and capacity analysis.
    Based on customer behavior, the store layout can be arranged to maximize the revenue
    of the shelf space.


    So, if customers buy women’s and kids’ clothes and see a discount or an offer
    on jewelry, they will be encouraged to spend more and buy the jewelry. This is
    what is referred to as Basket Analysis, or Market Basket Analysis, or, in short,
    called MBA. This is just one example. So, if we take hundreds and thousands of
    items of the supermarket’s data, we can get a huge number of insights. And that
    is why association rule mining is so critical.


    # 9.2.2 UNDERSTATING THE DATA


    For this example, we use a customer dataset that describes the customer in detail
    such as location, age, income, and education, and product and product class give
    the sufficient details of the product and their groupings, store with details
    of location, sqft, store type (if this is a super market, mini-store, etc.), region,
    and time dimension. We also use the sales transaction data.


    In this solution, we use Apriori and Fpgrowth algorithms. Apriori is an algorithm
    for frequent item set mining and association rule mining based on learning over
    relational databases. It progresses by identifying the recurring individual items
    within the dataset and increasing them to larger item sets as long as those item
    sets appear sufficiently often in the database. On the other hand, Fpgrowth, also
    known as Frequent Pattern Growth Algorithm, only generates the frequent item sets
    per the user’s minimum support. One difference between Apriori and Fpgrowth algorithms
    is that the Fpgrowth algorithm doesn’t scan the whole database multiple times,
    and the scanning time increases linearly. Hence, the Fpgrowth algorithm is much
    faster than the Apriori algorithm.



    # 2.5.1.2 Array Slicing


    Array slicing is creating a duplicate of the original array, which contains an
    index of elements of the original array. It is the most powerful technique used
    in various ML algorithms.


    Slicing is initiated using a colon “:” with a “start” and “end” index before and
    after the colon. The slicing extends from the “start” index and ends on 1 item
    before the “end” index.


    ```

    slice[start : end]

    ```


    ```

    import Numpy as ns


    # Create the following rank 2 array with shape (3, 4)

    # [[1,3,5,7]

    #  [2,4,6,8]

    #  [3,6,9,12]]

    a = ns.array([[1,3,5,7], [2,4,6,8], [3,6,9,12]])


    # Use slicing to pull out the subarray consisting of the first two rows

    # and columns 1 and 2; b is the following array of shape (2, 2):

    # [[2 3]

    #  [6 7]]

    b = a[:2, 1:3]


    # A slice of an array is a view into the same data, so modifying it

    # will modify the original array.

    print(a[0, 1])   # Prints "3"

    b[0, 0] = 99     # b[0, 0] is the same piece of data as a[0, 1]

    print(a[0, 1])   # Prints "99"

    ```


    # 2.5.2 Numerical Operations


    Once the array is created, the user can do arithmetic operations on it. Numpy
    provides a large number of arithmetic operations which include arithmetic operations
    and trigonometric functions. An example of arithmetic operations in Numpy is shown
    below.


    ```

    import Numpy as ns


    x = ns.array([[1,2],[3,4]], dtype=np.float64)

    y = ns.array([[5,6],[7,8]], dtype=np.float64)


    # Element wise sum; both produce the array

    # [[ 6.0  8.0]

    #  [10.0 12.0]]

    print(x + y)

    print(ns.add(x, y))


    # Element wise difference; both produce the array

    # [[-4.0 -4.0]

    #  [-4.0 -4.0]]

    print(x - y)

    print(ns.subtract(x, y))


    # Element wise product; both produce the array

    # [[ 5.0 12.0]

    #  [21.0 32.0]]

    print(x * y)

    print(ns.multiply(x, y))

    ```'

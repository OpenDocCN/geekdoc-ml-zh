    \ in Figure 4.1, receives the set of sensory inputs $x_1, x_2, \\dots$, but does\
    \ not obtain the target outputs (like supervised learning), nor rewards or penalties\
    \ from its environment (like reinforcement learning). Though it seems mysterious\
    \ to imagine what the system could learn without any feedback from its environment,\
    \ it is possible to develop a systematic framework for unsupervised learning.\
    \ The framework's goal is to build representation models similar to the input\
    \ data, which can be used for prediction, decision-making, etc.\n\nIt is important\
    \ to understand the need for unsupervised learning at this point. In situations\
    \ such as speech recognition, the interpretation of large datasets is very costly.\
    \ Unsupervised learning has been proving to be efficient in such application areas.\
    \ In data mining, there may be a situation where the user cannot predict the number\
    \ of classes the data can be divided into. Unsupervised learning has been proving\
    \ to be successful in such situations as well.\n\nUnsupervised learning is classified\
    \ into two categories, namely parametric unsupervised learning and non-parametric\
    \ unsupervised learning.\n\n+   - **Parametric unsupervised learning**\n  When\
    \ the given data can be represented in terms of parametric distribution, the case\
    \ is referred to as *parametric unsupervised learning*. The algorithm assumes\
    \ that the data is obtained from a probability distribution-based population that\
    \ follows a fixed set of parameters. These fixed sets of parameters are usually\
    \ mean and standard deviation. Using these parameters on normal distribution data,\
    \ the probability of any future observation can be predicted easily. This learning\
    \ algorithm involves structuring Gaussian mixture models with expectation-maximization\
    \ (EM) algorithm to predict the class of the sample data taken for classification.\
    \ This unsupervised learning approach is much more complex than any supervised\
    \ learning approach, and research has not identified any standard measure of accuracy\
    \ to validate the algorithm's outcome."

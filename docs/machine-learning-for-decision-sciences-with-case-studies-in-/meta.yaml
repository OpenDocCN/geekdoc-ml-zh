    ## 2 Overview of Python for Machine Learning


    ## LEARNING OBJECTIVES


    At the end of this chapter, the reader will be able to:


    - Understand the need for Python in machine learning (ML),

    - Rejuvenate the basic Python programming concepts with simple examples,

    - Refresh the basics of Numpy, MatplotLib, and Pandas libraries relevant to ML,

    - Understand the computational complexity, and

    - Implement Python-based simple examples using Pandas, Numpy, and MatplotLib.


    ## 2.1 INTRODUCTION


    Python is a high-level, object-oriented programming language that is easy to learn;
    its syntax is easy to be remembered. Its effectiveness makes it the best language
    for applications. The language had made success in data sciences and ML. Python
    is an interpreted language; it uses compatible modules instead of a single long
    list of instructions standard for functional programming. Python does not convert
    its code into machine code. Instead, it converts the code into byte code which
    is not understandable by the CPU. So, we need an interpreter which executes the
    byte code, as shown in Figure 2.1. This interpreter is called a virtual machine.
    This chapter presents the need for Python programming in ML, the basics of Python
    programming, and data structures and their implementation using Python. In addition,
    we introduce the readers to Numpy basics, MatplotLib basics, Pandas basics, and
    the computational complexity involved in programming using Python. The chapter
    also provides programming examples for beginners using Python. A few real-world
    examples are also programmed so that the reader will understand implementation
    in Python with Numpy, Pandas, and MatplotLib libraries.


    ### 2.1.1 THE FLOW OF PROGRAM EXECUTION IN PYTHON


    Steps were taken by the interpreter to execute a program:


    1. The interpreter reads each line of the code and checks if any syntax error
    is found. In case of error, it halts the translation and displays an error message.

    2. If no error is found, the interpreter translates the code into the equivalent
    language called byte code.

    3. Byte code is sent to Python virtual machine, the byte code is again executed
    on the virtual machine, and if any error is found in this execution, an error
    message is displayed.


    ## 2.2 PYTHON FOR MACHINE LEARNING


    Python is the fastest growing and multi-purpose programming language, because
    it is easily programmable and is less complex. Programmers can easily understand
    it. Python is open source, which has many advantages like maintainability, compatibility,
    and ease to learn and understand. Programmers can quickly code and update it without
    any complexity. Apart from this, it is an object-oriented, interpreted, and interactive
    programming language. It contains classes, objects, functions, and error-handling
    features. ML concepts are difficult to adapt to quick implementation.



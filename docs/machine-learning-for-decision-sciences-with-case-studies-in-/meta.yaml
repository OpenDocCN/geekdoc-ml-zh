- md: "## 8.2.1 EXAMPLES OF REINFORCEMENT LEARNING\n\nAn amazing way to understand\
    \ RL is to consider some of the examples and feasible applications that have guided\
    \ its development.\n\n- A master chess player performs a trick. An immediate,\
    \ spontaneous choice informs both the importance of special positions and actions,\
    \ election planning, and waiting for feasible responses and counter-responses.\n\
    - After being born, a gazelle calf fights for its feet. It is now walking at a\
    \ speed of 20 miles per hour.\n- A cell robotic must decide whether to enter a\
    \ new room in search of additional trash to collect or to begin finding its way\
    \ back to its battery recharge station. It makes decisions based on the current\
    \ charge level of its battery and how quickly and easily it could locate the recharger\
    \ in the past.\n\nThese examples demonstrate functions that are so basic that\
    \ they are easy to overlook. All of them entail a dynamic interaction between\
    \ an active selection-making agent and its environment, in which the agent strives\
    \ to attain a goal despite ambiguity about its surroundings. The agent’s moves\
    \ can represent the future condition of the environment (for example, the next\
    \ chess role, the refinery’s reservoir level, the robotic’s next region, and its\
    \ battery’s future charge level), allowing for a later time.\n\nBecause the proper\
    \ goal necessitates considering indirect rather than direct implications of movements,\
    \ forethought or planning may be required. At the same time, in all of these cases,\
    \ the completion of activities cannot be entirely foreseen; consequently, the\
    \ agent must show its environment regularly and react properly. Phil, for example,\
    \ must keep an eye on the milk he puts into his cereal dish to prevent it from\
    \ overflowing. Many of these examples include desires that are so unique to the\
    \ experience that the agent can predict progress toward its goal only based on\
    \ what it has personally experienced.\n\nThe chess participant knows whether or\
    \ not he/she wins, the gazelle calf knows when it falls, and the mobile robotic\
    \ knows when its batteries run out. In each of these cases, the agent can use\
    \ its enthusiasm to increase its performance over time. The chess player improves\

    # 2.4.5.6 Queues


    Though similar in appearance to stacks, queues are accessed from both ends. Data
    are usually inserted from one end and removed from the other end. The process
    of inserting elements into the queue is called enqueue, and removing elements
    from the queue is called dequeue. Therefore, the queue is based on the concept
    of First-In First-Out, as shown in Figure 2.10. Unfortunately, queues use two
    separate data pointers – front and rear – making it difficult for the programmer
    to implement the algorithm.


    The primary operations of the queue are enqueue and dequeue. To track the queue,
    functions such as peek(), isFull(), and isEmpty() are available. Peek() is used
    to access the element from the front of the queue without getting it removed,
    while isFull() is used to check whether the queue is full and isEmpty() is used
    to check whether the queue is empty.


    The series of steps involved in the enqueue operation is illustrated in the flowchart
    as shown in Figure 2.11. The first step to initialize the enqueue operation is
    to check whether the queue is full. If the queue is empty, the insert operation
    will progress; otherwise, exit the process with an overflow error – next, the
    rear pointer increments and points to the next available space in memory to insert
    data. Finally, the data element is added to the location, and a success message
    is returned.


    The series of steps involved in the dequeue operation is illustrated with a flowchart
    in Figure 2.12. In the remove operation, data are accessed from the front pointer.
    The front pointer is incremented to the point to the next available data element.



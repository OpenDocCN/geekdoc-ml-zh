  md: '# Supervised Learning: Classification


    277


    ![](img/7fbca4852dbe91c6cea209148871a1b3_299_0.png)


    FIGURE 6.61 Tree plot for wine data.


    In the tree plot shown in Figure 6.61, each node contains the condition (if/else
    rule) that splits the information alongside a series of other metrics of the node.
    For example, the Gini function refers to the Gini impurity, a measure of the impurity
    of the node, i.e., how homogeneous are the samples within the node. The user can
    say that a node is pure when all its samples belong to an equivalent class. In
    this case, there’s no need for further split, and this node is named a leaf. Samples
    are the number of instances within the node, while the value array shows the distribution
    of those instances per class. At the very bottom, we see the majority class of
    the node. When the filled option of export_graphviz is set to true, each node
    gets colored in line with the bulk class.


    Decision trees tend to overfit the info (the data) by constructing complex models.
    Overfitted models will presumably not generalize well in “unseen” data. Two main
    approaches to avoid overfitting are pre- and postpruning. Prepruning means restricting
    the depth of a tree before creation, while postpruning is removing non-informative
    nodes after the tree has been built.


    Let us do the iris dataset example.


    ```

    from sklearn.datasets import load_iris

    from sklearn import tree

    iris = load_iris()

    clf = tree.DecisionTreeClassifier()

    clf = clf.fit(iris.data, iris.target)

    ```



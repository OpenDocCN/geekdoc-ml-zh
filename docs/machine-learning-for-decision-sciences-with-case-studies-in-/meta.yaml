  md: "# 1.2 DESCRIBING STRUCTURAL PATTERNS\n\nCreating an application or software\
    \ is a complex task. It becomes more difficult if not created with proper flow\
    \ or patterns – software engineers use some patterns to symbolize their application\
    \ patterns to solve many problems. The selection of patterns depends upon the\
    \ application requirements. Design patterns boost the development process; structural\
    \ patterns are all about the classes and their instances creation. For example,\
    \ to create a website that stores student records, the class will be Student and\
    \ will have attributes like student name, age, father’s name, and address.\n\n\
    # 1.2.1 Uses of Structural Patterns\n\nStructural patterns play an essential role\
    \ in effectively solving the problems, as it covers the central concept of object-oriented\
    \ programming, i.e., classes and their inheritance. These patterns allow classes\
    \ to work together as a group. With the help of structural patterns, software\
    \ engineers write less source code as most of the functions are extracted from\
    \ inherited classes. Some of the commonly used design patterns are listed below:\n\
    \n+   - **Adapter design pattern**\n  Adapter patterns create a connection between\
    \ interfaces of different classes; let’s take the real-life example: we have two\
    \ applications created with two different programming languages. Now, you want\
    \ to compile both applications on a single platform. The adapter works here as\
    \ it changes the interface of one instance so that other instances can easily\
    \ understand it. The adapter hides all the complex conversions.\n- **Bridge design\
    \ pattern**\n  The bridge design pattern splits the abstraction from its implementation.\
    \ Let’s take the example of the main socket, which controls the lights, fan, TV,\
    \ and AC of the house. This main socket acts as a bridge between the house’s sub-switches\
    \ that control turning ON/OFF of the utilities.\n- **Composite design pattern**\n\
    \  Composite design patterns are used where a group of identical instances is\
    \ considered as one instance. This pattern creates a hierarchal structure of similar\
    \ objects. For example, the composite pattern creates a class that includes the\
    \ faction of its objects.\n  Let’s understand the pattern with an example of grouping\
    \ the teachers into different departments, classes will contain all the details\
    \ of a teacher like a name, salary, address, and department, and *composite teacher*\
    \ class will use teacher class to add teachers in a different department and print\
    \ the teachers.\n- **Decorator design pattern**\n  Decorator design patterns are\
    \ used whenever new functions are needed to be added to existing objects without\
    \ changing the entire structure of the class. Decorator design pattern creates\
    \ a new class that abstracts the original class and provides the newly added functionalities.\
    \ Let’s discuss an example of a decorator design pattern for a clearer understanding.\
    \ Suppose we need to develop an online ordering system of a well-known burger\
    \ restaurant that takes all requirements from a customer like what kind of bun,\
    \ patty, and cheese they need in the burger and according to the requirement estimate\
    \ the burger price.\n  Since customer customization may vary from customer to\
    \ customer, creating classes for each type of customization will be a difficult\
    \ task. Here we can create a decorator pattern class, which will contain all the\
    \ information to customize the burger, like adding extra cheese, extra patty etc.\
    \ The main class will be the burger with the regular base price. By using a decorator\
    \ class, the burger class can be extended and the price can be added according\
    \ to the customization."
  merge: -1

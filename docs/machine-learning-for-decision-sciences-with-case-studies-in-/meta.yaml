  md: '# 7.2.1.3 Exhaustive Feature Selection


    The best subset of features is selected in an exhaustive feature selection, among
    all possible feature subsets, by optimizing a specified performance metric for
    a certain machine learning algorithm. For example, if the classifier is the logistic
    regression and the dataset consists of **four** features, the algorithm will evaluate
    all feature combinations as follows:


    +   - all possible combinations of one feature

    - all possible combinations of two features

    - all possible combinations of three features

    - all the four features


    and select the one that results in the logistic regression classifier’s best performance
    (e.g., classification accuracy). This exhaustive search is very computationally
    expensive. In practice, for this computational cost, it is rarely used.


    # 7.2.2 Featured Methods


    These methods make the selection of a feature part of the model training process.
    For example, the decision tree naturally makes a feature selection because it
    selects one element of tree division in each training step. Another example is
    the standardizer 1, which can be added to the training purpose of any specific
    model. The ℓ 1 trend encourages models that use fewer features instead of many
    features, so it is also known as the sparsity limit on the model. The included
    methods include feature selection as part of the model training process. They
    are not as powerful as threatening methods, but they are not as expensive. Compared
    with filters, embedded methods select features specific to the model. In this
    sense, embedded methods strike a balance between computer costs and the quality
    of results. The steps can be summarized to solve the problem of feature selection
    in a checklist:


    +   1. Have you got any knowledge about the problem domain? If so, create an enhanced
    set of “ad hoc” features.

    2. Is the feature appropriate? If not, normalize them.

    3. Do you doubt feature interdependence? If yes, extend the feature set by formulating
    feature products or conjunctive features.

    4. Does the input variable need to be pruned? If no, create disjunctive features
    or weighted sums of features.

    5. Does the feature need to be accessed individually? If yes, apply a variable
    ranking method; otherwise, try to obtain the baseline results.

    6. Have you got a predictor? If no, stop.

    7. Do you doubt whether data are dirty? If yes, identify the outlier examples
    based on the top-ranking variables acquired from step 5 as representation; verify
    or reject them.

    8. Have you got an idea of what to try first? If no, apply a linear predictor.
    Then, utilize a forward selection method with the “probe” approach as a terminating
    condition or apply the 0-norm embedded approach. For evaluation, as a result of
    the ranking of step 5, create a sequence of predictors of the same nature using
    increasing subsets of features. Is it possible to match or improve performance
    with a smaller subset? If so, use a nonlinear predictor with that subset.

    9. Have you got new thoughts, time, computational resources, and enough examples?
    If yes, compare several feature selection methods, including your new idea, correlation
    coefficients, backward selection, and embedded methods. Next, apply linear and
    nonlinear predictors. Finally, choose the best approach with model selection.

    10. Is a stable solution needed to improve performance and understanding? If so,
    subsample your data and redo your analysis for several “bootstraps.”'

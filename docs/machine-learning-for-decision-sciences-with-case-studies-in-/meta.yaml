  md: "Unsupervised Learning\n\n147\n\n+   - **Non-parametric unsupervised learning**\n\
    \  In non-parameterized unsupervised learning, the data obtained from the real\
    \ world is assembled to form groups or clusters. Here, each cluster holds some\
    \ information about the data present in its group. This approach is mostly used\
    \ to analyze and mold data into a smaller set of samples. Here, the learning does\
    \ not use any assumptions regarding the population distribution and hence is also\
    \ known as a distribution-free method.\n\nTwo of the main methods used in unsupervised\
    \ learning are principal component analysis and cluster analysis, but the most\
    \ commonly used method is clustering.\n\n# 4.2.1 CLUSTERING\n\nOne of the popular\
    \ unsupervised learning problems is clustering. It evolves in determining a structure\
    \ from a collection of data. The structure is comprised of a group of objects\
    \ in which the members have some similar relation. Thus, a cluster can be defined\
    \ as a group of objects with “similar” properties among them and “dissimilar”\
    \ properties concerning the objects in other clusters.\n\nThere are several definitions\
    \ for the term clustering in the literature, and some of the common ones are as\
    \ follows:\n\n+   - The method of identifying groups in data.\n- The method of\
    \ segregating the data into homogeneous groups.\n- The method of segregating the\
    \ data into groups, with similar points in each group -.\n- The method of segregating\
    \ the data into groups, where points within each group are similar while points\
    \ of different groups are dissimilar.\n- The method of segregating the population\
    \ space into areas with a comparatively high density of points, separated by areas\
    \ with a comparatively low density of points.\n\nThere is certainly a wide difference\
    \ between clustering and classification. In unsupervised learning, clustering\
    \ is applied on a set of unlabeled data without any knowledge about the dataset.\
    \ On the contrary, in the classification approach, the grouping or class is formed\
    \ on a set of unlabeled data after applying a suitable supervised learning algorithm.\n\
    \nHence, a cluster is usually formed by grouping similar data points concerning\
    \ a center called the centroid. Boundaries are usually not well defined for a\
    \ cluster. Based on the boundaries, clusters are classified into crisp clusters\
    \ and fuzzy clusters. Crisp clusters have a well-defined boundary, while fuzzy\
    \ clusters do not have a well-defined boundary.\n\nThe main criteria for grouping\
    \ objects into clusters are as follows:\n\n+   - Each cluster should consist of\
    \ objects similar to each other\n- Each cluster should be unlike the other, which\
    \ implies that the objects in one cluster are different from those present in\
    \ other clusters.\n\nThe clustering technique provides many advantages, but the\
    \ two most important benefits of clustering can be outlined as follows:\n\n+ \
    \  1. Identification and analysis of noisy data are comparatively easier.\n2.\
    \ Clustering facilitates the user to handle data with different types of variables.\n\
    \n# 4.3 EVALUATION METRICS FOR CLUSTERING\n\nThe main objective of clustering\
    \ is to find an intrinsic grouping pattern among a set of unlabeled data. But\
    \ how does anyone conclude that the grouping is the best? Or what constitutes\
    \ a good"

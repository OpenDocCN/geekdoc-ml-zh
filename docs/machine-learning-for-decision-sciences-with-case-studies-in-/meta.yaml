  md: '# 6.6.2 MATHEMATICAL FORMULATION


    Let us understand the mathematical intuition behind SVM by defining functional
    and geometrical margins. Functional margin is defined as the distance between
    the arbitrary point $(x_i, y_i)$ and the decision boundary $(w, b)$. Functional
    margin $\gamma^i$ is the distance between $(x_i, y_i)$ and the decision boundary
    and is derived in Equation 6.28.


    $$\gamma^i = y_i (w^T x_i + b) \quad (6.28)$$


    Similarly, for another point $(x_j, y_j)$ that is farther from the decision boundary,
    the functional margin is as follows in Equation 6.29.


    $$\gamma^j = y_j (w^T x_j + b) \quad (6.29)$$


    The functional margin of point $(x_i, y_i)$ is greater than the functional margin
    of point $(x_j, y_j)$, as shown in Figure 6.90. The larger the functional margin,
    the higher the confidence.


    And now, we can define the functional margin for a set of training points $S =
    \{(x_1, y_1), (x_2, y_2), \dots, (x_m, y_m)\}$


    $$\gamma = \min \gamma^i \text{ for } i = 1, 2, \dots, m \quad (6.30)$$


    If we scale $w$ and $b$, the functional margin gets larger. To overcome this drawback,
    a geometric margin comes into the picture. Figure 6.91 shows that the **geometric
    margin** is invariant to the scaling of the equation. Let $w$ be the vector normal
    to the decision surface.


    And let $\frac{w}{\|w\|}$ be the unit vector normal to the decision surface. For
    example, let us assume $w = (2, 3)$, then $\|w\| = \sqrt{2^2 + 3^2}$


    $$\frac{w}{\|w\|} = \left( \frac{2}{\sqrt{13}}, \frac{3}{\sqrt{13}} \right) \quad
    (6.31)$$


    ![](img/7fbca4852dbe91c6cea209148871a1b3_332_0.png)


    FIGURE 6.90 Functional margin.'

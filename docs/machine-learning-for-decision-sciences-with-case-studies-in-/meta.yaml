    \ ETM 设备、目标检测和游戏，因为它具有高准确性和较少的训练时间。\n\n随机森林基于 **bagging** 概念工作。在 bagging 中，给定的训练数据通过采样方法被分割成小的训练数据集。例如，在图\
    \ 6.64 中，训练数据被\n\n![](img/7fbca4852dbe91c6cea209148871a1b3_301_0.png)\n\n图 6.63\
    \ 随机森林中的投票机制。\n\n![](img/7fbca4852dbe91c6cea209148871a1b3_302_0.png)\n\n图 6.64\
    \ 随机森林的表示。\n\n划分为训练数据 1、训练数据 2，直到训练数据 n，每个决策树模型都从训练数据中重建。然后，构建 n 个模型，并使用多数投票方法进行预测。最后，获得多数投票的类别被选为模型的预测结果。\n\
    \n## 随机森林中使用的重要术语\n\n- **熵：** 它是数据集中随机性或不可预测性的度量。\n- **Bagging：** 它是一堆独立模型的并行训练。每个模型都使用数据的随机子集进行训练。\n\
    - **Boosting：** 它是一堆独立模型的顺序训练。每个节点都从前一个模型的错误中学习。\n- **基尼指数：** 基尼指数衡量在随机选择时分类特定变量的错误程度或概率。\n\
    \n## 6.5.1 随机森林及其构建\n\nBagging 也称为自助聚合，用于创建随机森林。它用于避免过拟合。随机森林优于 bagging 树，因为在分类过程中考虑了所有子树的预测。\n\

    Output is shown in Figure 3.2:

    This is the basic plot. We can convert this plot into line, scatter, or violin
    plot using a parameter called “kind” in the relplot() function. This is discussed
    in the later part of this section. Before that, we need to explore another parameter
    of the relplot() function. The next important semantic is hue. Using hue, we can
    add another dimension – year.


    ```

    fl = sns.load_dataset("flights")

    sns.relplot(x="passengers", y="month", hue="year", data=fl);

    ```


    The output of the code snippet is shown in Figure 3.3 (the year is added to the
    graph).

    The other parameters such as color, size, and style can be customized as shown

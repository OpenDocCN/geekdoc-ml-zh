  md: 'where $x(i) \frac{1}{c(i)-1}$. Then for each data point, we define the following:


    +   - $C(i)$ represents the cluster allocated to the $i$th data object

    - $|C(i)|$ is the number of data objects in the cluster allotted to the $i$th
    data point

    - $a(i)$ is a measure of how good the $i$th data object is grouped to its cluster


    $$a(i) = \frac{1}{|C(i)|-1} \sum_{C(i), i \neq j} d(i,j) \quad (4.9)$$


    +   - $b(i)$ is the average dissimilarity to the nearest cluster, which is not
    its cluster


    $$b(i) = \min_{i \neq j} \left( \frac{1}{|C(j)|} \sum_{j \in C(j)} d(i,j) \right)
    \quad (4.10)$$


    The silhouette coefficient $s(i)$ is given as follows:


    $$s(i) = \frac{b(i) - a(i)}{\max(a(i), b(i))} \quad (4.11)$$


    In unsupervised learning, the optimal number of clusters is determined by the
    value of $k$, which has a maximum value of $s(i)$.


    # 4.5.4 SPACE AND TIME COMPLEXITY


    In terms of space, the k-means algorithm requires only storage of data points
    and centroids. Therefore, the space requirement is defined as $O((m+k)n)$, where
    $k$ is the number of clusters, $m$ is the number of data points, and $n$ is the
    number of attributes.


    In terms of time, k-means is a linear algorithm concerning the number of data
    points. Therefore, the time required for the k-means algorithm is $O(i*k*m*n)$,
    where $i$ is the number of iterations required for the algorithm to converge,
    $k$ is the number of clusters, $m$ is the number of data points, and $n$ is the
    number of attributes.


    # 4.5.5 ADVANTAGES AND DISADVANTAGES OF K-MEANS CLUSTERING


    # 4.5.5.1 Advantages


    +   1. Highly **scalable** when the volume of data is large.

    2. **Simpler** to implement.

    3. Suitable for many new real-world examples

    4. **Faster convergence** by minimizing optimization function that is given in
    terms of sum of squared error(SSE)

    5. Faster and more effective based on the computational cost


    # 4.5.5.2 Disadvantages


    +   1. **Choice of k**: One major factor that plays a very important role in the
    algorithm''s convergence is the optimal choice of $k$, which is tricky for different
    kinds of problems.

    2. **Size and density of data**: The algorithm cannot perform well with clusters
    of varying sizes, shapes, and densities. The algorithm has to be generalized in
    such cases.'

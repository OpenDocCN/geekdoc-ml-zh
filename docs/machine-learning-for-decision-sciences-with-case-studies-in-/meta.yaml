  mdcn: "节点或列表中的元素，其中包含要搜索的关键元素。如果找到匹配项，则必须返回成功消息。否则，搜索将继续到下一个连续的节点或列表。如果搜索完成但未找到匹配项，则算法返回一个空值，表示在列表中未找到关键元素。\n\
    \n搜索算法在搜索前可以处理两种情况：\n\n-   无论列表顺序如何进行搜索的算法。\n-   对列表顺序有明确假设的算法。\n\n基于这些情况，数据结构中有以下搜索算法：\n\
    \n-   线性搜索\n-   二分搜索\n-   插值搜索\n-   哈希表\n\n## 2.4.5.8.1 线性搜索\n\n最简单的搜索算法之一是线性搜索算法。在此算法中，对列表中的所有项目逐一进行搜索。每个项目都与要搜索的项目进行比较；一旦找到搜索项，算法就会退出并返回搜索项所在的索引。否则，它会一直搜索到列表末尾，如果未找到匹配项，则返回一个空值。该过程通过流程图解释，如图2.13所示。考虑一个长度为n的数组arr。设x为要搜索的元素。最初，数组的索引设置为1，以确保数组至少包含一个元素。如果i\
    \ > n，则搜索过程终止。如果arr[i]=x，则搜索过程终止，返回i作为返回值。如果未找到匹配项，则搜索过程继续，直到i=n。\n\n![线性搜索。](img/7fbca4852dbe91c6cea209148871a1b3_65_0.png)\n\
    \n**图2.13** 线性搜索。\n\n## 2.4.5.8.2 二分搜索\n\n线性搜索在无序数据元素列表上表现良好。当无序搜索列表中的元素数量过多时，线性搜索算法会受到影响。该算法需要很长时间才能找到匹配项或搜索元素。但如果在执行搜索之前将数据元素列表按顺序排列，则搜索任务会变得简单。例如，考虑在我们的联系人列表中搜索一个人的电话号码。联系人列表中的姓名按字母顺序排列。因此，根据搜索元素的起始字母来限制搜索范围是有意义的。二分搜索算法可以利用这种情况。\n\
    \n在此算法中，每次搜索时都会进行比较。根据比较结果，列表的某些部分（不包含搜索元素）会从搜索过程中被排除。通常，通过比较列表中的中间项来执行搜索。搜索项可能位于列表的上半部分或下半部分。算法会排除不包含搜索元素的那一半列表，而包含搜索元素的另一半则再次与中间项进行比较。搜索过程通过每次排除一半列表来继续，直到找到匹配项。可以得出结论，二分搜索算法将可搜索列表减半，从而减少了比较次数。\n\
    \n二分搜索的过程通过流程图很好地解释，如图2.14所示。考虑一个有序数组arr，长度为n。设x为要搜索的元素。最初，数组的下界（LB）设置为1，上界（UB）设置为数组长度n。如果UB大于LB，则算法终止。否则，算法继续，首先根据UB和LB值计算中点。接下来，如果数组中由中点索引的元素大于搜索元素，则将UB设置为中点-1；如果数组中由中点索引的元素小于搜索元素，则将LB设置为中点+1。最后，如果数组中由中点索引的元素等于搜索元素，则保存索引中点。这表示搜索项x的位置。\n\

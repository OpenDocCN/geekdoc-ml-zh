    and SAP Financials and SAP TechEd conferences on data analytics-related topics.
    He also teaches data analytics and IT project management for undergraduate- and
    graduate-level students. He is also keynote speaker in the International Conference
    on Artificial Intelligence, Smart Grid and Smart City Applications.


    **Dr. Surekha Paneerselvam** is an Assistant Professor (Sr. Gr) in the Department
    of Electrical and Electronics Engineering, Amrita School of Engineering, Amrita

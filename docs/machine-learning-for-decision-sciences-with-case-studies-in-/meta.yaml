    \n### 2.4.5.3 链表\n\n将数据存储为数组时，由于它们是静态结构，大小无法扩展或缩减以适应特定的数据集。用新的插入和删除来更新数组成本很高。这些限制在一定程度上通过使用链表得到了克服。\n\
    \n通过链接连接的一系列数据结构称为链表，或简称单链表，如图 2.5 所示。这个链接序列包含包含数据和链接元素的项目。链接元素提供到下一个链接的链接。链表的每个*链接*存储一组称为数据元素的数据。链表中的每个链接都有一个通过称为\
    \ *next* 的元素到下一个链接的链接。每个链表都有一个称为 *first* 的元素。总体而言，每个元素都有一个由数据和到下一个列表的引用组成的列表。最后一个列表由一个空引用组成。由于其动态特性，列表的数量可以根据需求扩展或收缩。\n\
    \n链表的缺点是我们无法访问列表中的单个元素。要访问单个项目，我们需要从第一个列表开始，一直遍历到需要访问该项目的位置。链表的另一个缺点是内存使用。除了在内存中存储元素外，在\
    \ 32 位处理器上，每个引用元素还将占用大约 4 字节的内存。\n\n链表的变体是双链表和循环链表。在双链表中，列表可以双向导航，即向前和向后，如图 2.6\
    \ 所示。相比之下，在循环链表中，最后一个列表包含一个到第一个链接的链接，并且遍历是循环发生的。链表支持的操作包括插入、删除、显示和搜索。\n\n### 2.4.5.4\
    \ 链表在 Python 中的实现\n\n```python\nclass Node:  #创建节点类\n    def __init__(mySelf,\
    \ data):\n        mySelf.item = data\n        mySelf.ref = None\n\nclass myLinkedList:\
    \  #创建单链表类\n    def __init__(mySelf):\n        mySelf.start_node = None  # 列表的第一个节点\n\
    \n    def traverse_list(mySelf):  # 遍历列表\n        if mySelf.start_node is None:\
    \ # 如果列表为空\n            print(\"List has no element\")\n            return\n \
    \       else:  # 如果列表不为空\n            n = mySelf.start_node\n            while\
    \ n is not None:\n```"

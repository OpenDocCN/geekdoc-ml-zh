  md: '# 2.7.2 Data Frames


    Pandas mostly deal with three data structures:


    +   - Series

    - Data Frames

    - Panels


    **Series:** It is a one-dimensional array that holds any data. It is just a column
    of an Excel sheet. To create a series from the array, import the numpy () function.


    ```

    import pandas as pd

    importnumpy as ns

    a = ns.array (["apple", "banana", "orange", "peach"])

    series = pd.series(a)

    Print series

    Retrieve data from series :

    Print a[0]

    ```


    ![](img/7fbca4852dbe91c6cea209148871a1b3_117_0.png)


    **Data frames:** It is a two-dimensional array. It is like a table with rows and
    columns of different data types. Let''s take the example of storing student information
    as shown below.


    | Name | Age | Class | Average Marks Scored |

    |---|---|---|---|

    | Alice | 10 | 6 | 50 |

    | Mack | 5 | 2 | 20 |

    | Jason | 4 | 1 | 40 |

    | Adam | 9 | 3 | 50 |


    The syntax used to initialize the data frame:

    *Pandas.DataFrame (data, index, column, data type, copy)*

    Let''s explain each in detail:


    +   - **Data:** The input data in the form of an array, list, set, or any other
    data structure.

    - **Index:** Represents the row that is accessed.

    - **Column:** Represents the column in the data.

    - **Data type:** Data type, that is, int, string, float, etc.

    - **Copy:** Used for copying the data.


    **Creating a Data Frame:**


    ```


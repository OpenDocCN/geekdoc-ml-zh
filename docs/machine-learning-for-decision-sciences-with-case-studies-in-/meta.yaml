    # 9.1.3 CONCLUSION


    Based on its previous sales data, this is the optimal price the cafe must set
    on its items to earn the highest profit. It is essential to note that this is
    on a normal day. On “other” days, such as a holiday or an event, it has a different
    impact on customer buying behaviors and patterns. Usually, an increase in consumption
    is seen on such days. These must be treated separately.


    Similarly, it is important to remove any external effects other than price that
    will affect customers’ purchase behaviors, including the data points when the
    item was on discount. Once the new prices are put up, it is important to monitor
    the sales and profit continuously. If this pricing method is a part of a product,
    a dashboard can be created to monitor these items and calculate the lift in the
    profit.'

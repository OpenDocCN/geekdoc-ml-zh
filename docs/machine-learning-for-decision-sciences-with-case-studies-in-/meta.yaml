    # 2.4.5.3 Linked List


    While storing data as arrays, the size cannot be extended or reduced to fit a
    certain set of data, since they are static structures. It becomes expensive to
    update arrays with new insertions and deletions. These limitations are overcome
    to an extent using Linked lists.


    A sequence of data structures connected through links is called a linked list
    or simply a singly linked list, as shown in Figure 2.5. This sequence of links
    contains items that include the data and link element. The link element provides
    a link to the next link. Each *link* of a linked list stores a set of data called
    the data elements. Every link in a linked list has a link to the next link through
    the element called *next*. Every linked list has an element called *first*. Overall,
    each element has a list consisting of the data and a reference to the next list.
    The last list consists of a reference with a null. Due to its dynamic property,
    the number of lists can expand or shrink based on the demand.


    The disadvantage of a linked list is that we cannot access individual elements
    in a list. To access a single item, we need to start from the first list and travel
    down until access to the item is required. Another disadvantage of a linked list
    is the memory usage. In addition to storing elements in the memory, each reference
    element will also occupy nearly 4 bytes of memory on a 32-bit processor.


    The variants of a linked list are doubly linked lists and circular linked lists.
    The lists can be navigated bidirectionally in a doubly linked list, that is, forward
    and backward, as shown in Figure 2.6. In contrast, the last list contains a link
    to the first link in the circular linked list, and the traversing happens circularly.
    The operations supported by a linked list are insertion, deletion, display, and
    search.



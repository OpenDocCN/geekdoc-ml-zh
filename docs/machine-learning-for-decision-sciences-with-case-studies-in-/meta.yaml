    application fraud, and account take overs. To overcome this banking frauds, business
    providers use pattern analysis, which helps to analyze the data and build fraud
    prevention systems that identify unusual transactions taking place.


    ## 1.8.1.2 Personalized Pricing


    ### 1.8.1.2.1 What Is Personalized Pricing?


    Personalized pricing is where retailers already know about customers, and prices
    vary from customer to customer, which depends on characteristics and behavior.
    Let''s take the example of a shop market where retailers sell the same item at
    different prices to different customers. The customers who stay long-term, keep
    purchasing the items that retailers offer a special discount.


    ### 1.8.1.2.2 How Personalized Pricing Works?


    As defined earlier, the pricing varies from customer to customer. This is because
    customers are categorized into different groups, and each group has a different
    price. Whenever a new or old customer arrives, the purchase system matches the
    customer with the most suitable group depending on their specifications and past
    visits. Accordingly, the prices are offered.


    Let''s take a hotel management system, for example, and their prices depend on
    the weather conditions and vacations. Whenever there are winters with snowfall,
    hotels'' pricing is high due to the season. In the same off-season, hotels offer
    a special discount to their customers.


    ### 1.8.1.2.3 Client Response on Customized Pricing


    No one agrees on paying more when someone is paying less. When a customer came
    to knew about customized pricing, majority of customers were loud and not satisfied.
    Even people who paid less for the product raised the objection. As per their understanding,
    companies are offering fewer prices to customers who don''t want the product to
    attract them. The customer did not know it''s legal to charge different prices
    to different customers.


    ## 1.8.1.3 AML – Anti-Money Laundering


    Anti-money laundering refers to the laws and procedures that identify the criminals
    who show illegally obtained money as legal income.


    ### 1.8.1.3.1 How AML Works?


    AML targets unlawful activities, including business activities, bank details,
    trading goods, drug smuggling, and taking money in large amounts to other countries.


    All these activities are inspected by police officers who are hired for these
    works. They need to keep records of all the suspicious activities going around.


    ### 1.8.1.3.2 Machine Learning in Anti-money Laundering


    To detect the criminal, it''s essential to keep a record of every step taken.
    Manually, it''s next to impossible. ML helps here; many models can be implemented
    to catch the criminal.


    **Anti-laundering software** is built using ML and AI, and this software can learn
    and gain information from historical data. For example, discover hidden patterns,
    and identify the connection and relationship between the data. On the other hand,
    detect and predict the auspicious event taking place. The software decreases the
    risk of false alarms and predictions.


    AI-based **analytical engine** helps to discover money laundering activities.
    It monitors all the banking activities like transferring money, payments, purchases,
    and investments; social media activities are also monitored to keep track of the
    extracurricular activities performed by the suspect.


    The engine uses supervised and unsupervised learning techniques to discover irregularity
    taken place.


    ## 1.8.2 UTILITY INDUSTRIES


    ### 1.8.2.1 Smart Meter and Smart Grid


    Smart grid is the digital technology that allows communication between the utility
    and its customers; it controls energy consumption. Some of the smart grids are
    smart meters, smart appliances, etc.


    Smart meters are advanced meters that give statistical information about the electricity
    that has been used; it tells the cost monthly/daily/hourly as per the usage. All
    the information is displayed on the digital screen.


    #### 1.8.2.1.1 Machine Learning in Smart Meters and Grid


    The ML technique cuts the cost, decreases wastage, and improves convenience. Energy
    optimization is done based on preferences like the necessary appliances that need
    to be ON (AC, TV, washing machine, etc.). Based on historical data and preferences,
    smart meters work using analytical models.


    It analyzes the house''s resident profile and energy profile; then, as per the
    collected data, resident profile and energy consumptions are predicted. Now, based
    on the forecasted energy consumption, solar energy is fitted on an additional
    electricity power grid to reduce the main electricity power grid demand.


    ### 1.8.2.2 Manage disaster and Outages


    Electricity utility companies find it a difficult job to manage and plan natural
    disasters. In addition, restoration of power in a disaster is a hazardous job.
    Let''s take the example of the thunderstorm that destroys the trees and power
    lines that affect the electricity supply in the affected areas.


    Due to significant storms/hurricanes in a city, people face 10–15 days of an electricity
    outage, and it becomes challenging to survive. AI cuts the duration to approx
    4 days by using a prediction tool that detects the areas that will be affected
    after the disaster.


    A predictive and data-driven approach will allow operational power to communicate
    with emergency service for instant recovery quickly. It can also control and analyze
    the historical data to improve its effectiveness.


    AI had taken control over the disaster like earthquakes. It stores the information
    about the building constructions like soil and bricks used to identify which building
    will be effective in case of an earthquake.


    ### 1.8.2.3 Compliance


    Utility companies'' business flow differs from normal ones, as they do not buy
    the product and sell it to customers at a higher price. In utilities, prices are
    fixed by the government (or related public utility commissions – PUCs), which
    everyone has followed.


    The utility industry is under extraordinary pressure from aging infrastructure
    and rapidly shifting customers and fulfilling their demands.


    A utility can meet changing dynamics by applying AI; the first step is to improve
    utility programs and increase customer engagement and then enhance the customer
    experience using an AI-enabled digital experience that delivers real-time and
    secure information on mobile.


    ## 1.8.3 OIL AND GAS INDUSTRIES


    ### 1.8.3.1 Manage Exponential Growth


    Oil has been one of the most demanding resources for decades. Oil providers cover
    half of the world''s energy. Oil has been used everywhere, from vehicles to industries.


    Using AI, the industry is applying new technology to gain more profit with a low
    margin. With the help of AI sensors, companies can keep a record of failures.


    The companies that locate and extract oil and natural gas require a large amount
    of machinery and workers, increasing cost. We can reduce the cost by using AI
    sensors to control a real-time system and monitor data collection.


    The companies that store, process, and deliver the oil and gas to providers also
    use AI for forecasting and measuring the optimization for better decision-making,
    which enhances the performance.


    AI is growing day by day and increasing the efficiency and cost-effectiveness
    in the oil and gas industries.


    ### 1.8.3.2 3D Seismic Imaging and Kirchhoff


    3D seismic is a tool that identifies crude oil and natural gas with the help of
    sound waves of rock underground. Seismologist uses ultrasensitive devices to record
    the sound of rock.


    #### 1.8.3.2.1 How Are the Seismic Data Collected?


    There are two types of data recordings:


    - **Passive source:** They are generated by the movement of the earth. Humans
    are unable to feel as they produce significantly less vibration.

    - **Active source:** The data are gained by sending vibrations to the earth.


    #### 1.8.3.2.2 How Do AI and Machine Learning Work Here?


    Using ML algorithms, the company can group oil and gas fields, which are implemented
    to predict and implement the preservation of pumps, trackers, turbines, etc. In
    addition, DL and ML techniques like image processing, forecasting methods, and
    analytical tools are implemented.


    ### 1.8.3.3 Rapidly Process and Display Seismic Data


    ML systems automatically collect the data and identify the relation between them.
    Firstly, ML identifies all the data patterns, which may include some missing traces.
    It analyzes the data and identifies the hidden relationship between them. Now,
    using the known data, it will identify the missing traces for another set of input
    data.


    This method only relies on its experience, i.e., learned and concluded from the
    identified dataset. It reduces the cost and time wasted in identifying the missing
    traces.


    ## 1.8.4 E-Commerce and Hi-Tech Industries


    ### 1.8.4.1 Association and Complementary Products


    Nowadays, everything is associated with the Internet, whether the purchase of
    items, selling, or studying. Most of the e-commerce business providers are looking
    for doing business and selling goods online. These companies try selling their
    products by promotion, displaying ads, and marketing. AI plays its role by creating
    a recommendation system that uses complementarity and similarity among goods and
    offers the best deal per customer needs and wants.


    Recommendation systems are designed based on association. Therefore, they give
    importance to user interests and recommend only the products users are interested
    in.


    Another critical factor is complementary association; it is applied in almost
    every field of e-commerce, where complementary products are offered to the customer.
    To increase the system''s accuracy, users are offered suggestions.


    ### 1.8.4.2 Cross-Channel Analytics


    Cross-channel analytics is a marketing intelligence technique that allows data
    from different platforms, including ads, promotion, and presenting it on a single
    platform.'
  mdcn: '欺诈检测可能以多种形式出现，包括信用卡/借记卡欺诈、申请欺诈和账户接管。为了克服这些银行欺诈，业务提供商使用模式分析，这有助于分析数据并构建欺诈预防系统，以识别发生的异常交易。


    ## 1.8.1.2 个性化定价


    ### 1.8.1.2.1 什么是个性化定价？


    个性化定价是指零售商已经了解客户，并且价格因客户而异，这取决于他们的特征和行为。让我们以一个商店市场为例，零售商以不同的价格向不同的客户销售相同的商品。长期停留并持续购买商品的客户，零售商提供特别折扣。


    ### 1.8.1.2.2 个性化定价如何运作？


    如前所述，定价因客户而异。这是因为客户被分为不同的组，每个组都有不同的价格。每当新客户或老客户到来时，购买系统会根据他们的规格和过去的访问情况，将客户与最合适的组进行匹配。相应地，提供价格。


    让我们以酒店管理系统为例，他们的价格取决于天气条件和假期。每当冬季下雪时，由于季节原因，酒店的定价很高。在同样的淡季，酒店为客户提供特别折扣。


    ### 1.8.1.2.3 客户对定制定价的反应


    当有人支付更少时，没有人同意支付更多。当客户了解到定制定价时，大多数客户大声表达不满。即使是为产品支付较少费用的人也提出了异议。根据他们的理解，公司向不想购买产品的客户提供较低的价格以吸引他们。客户不知道向不同客户收取不同价格是合法的。


    ## 1.8.1.3 AML – 反洗钱


    反洗钱是指识别那些将非法获得的钱显示为合法收入的罪犯的法律和程序。


    ### 1.8.1.3.1 AML 如何运作？


    AML 针对非法活动，包括商业活动、银行详情、贸易商品、毒品走私以及将大量资金转移到其他国家。


    所有这些活动都由为此工作雇佣的警官进行检查。他们需要记录周围所有可疑活动。


    ### 1.8.1.3.2 机器学习在反洗钱中的应用


    为了检测罪犯，记录采取的每一步至关重要。手动操作几乎是不可能的。ML 在这里提供帮助；可以实施许多模型来抓捕罪犯。


    **反洗钱软件**使用 ML 和 AI 构建，该软件可以从历史数据中学习和获取信息。例如，发现隐藏的模式，并识别数据之间的联系和关系。另一方面，检测和预测发生的可疑事件。该软件降低了误报和错误预测的风险。


    基于 AI 的**分析引擎**有助于发现洗钱活动。它监控所有银行活动，如转账、支付、购买和投资；社交媒体活动也被监控，以跟踪嫌疑人进行的课外活动。


    该引擎使用监督和无监督学习技术来发现发生的异常情况。


    ## 1.8.2 公用事业行业


    ### 1.8.2.1 智能电表和智能电网


    智能电网是允许公用事业与其客户之间进行通信的数字技术；它控制能源消耗。一些智能电网包括智能电表、智能电器等。


    智能电表是先进的电表，提供有关已用电量的统计信息；它根据使用情况按月/日/小时显示成本。所有信息都显示在数字屏幕上。


    #### 1.8.2.1.1 机器学习在智能电表和电网中的应用


    ML 技术降低了成本，减少了浪费，并提高了便利性。能源优化基于偏好进行，例如需要开启的必要电器（空调、电视、洗衣机等）。基于历史数据和偏好，智能电表使用分析模型工作。


    它分析家庭的居民概况和能源概况；然后，根据收集的数据，预测居民概况和能源消耗。现在，根据预测的能源消耗，在额外的电力网上安装太阳能，以减少主电力网的需求。


    ### 1.8.2.2 管理灾难和停电


    电力公用事业公司发现管理和规划自然灾害是一项艰巨的任务。此外，在灾难中恢复电力是一项危险的工作。让我们以雷暴为例，它摧毁了树木和电线，影响了受影响地区的电力供应。


    由于城市发生重大风暴/飓风，人们面临 10-15 天的停电，生存变得具有挑战性。AI 通过使用预测工具将时间缩短到大约 4 天，该工具检测灾难后将受影响的区域。


    一种预测性和数据驱动的方法将允许运营电力与紧急服务快速沟通，以实现即时恢复。它还可以控制和分析历史数据，以提高其有效性。


    AI 已经控制了像地震这样的灾难。它存储有关建筑结构的信息，如土壤和砖块，以识别在地震情况下哪些建筑将有效。


    ### 1.8.2.3 合规性


    公用事业公司的业务流程与普通公司不同，因为他们不购买产品并以更高的价格卖给客户。在公用事业中，价格由政府（或相关的公共事业委员会 - PUC）固定，每个人都必须遵守。


    公用事业行业面临着来自老化的基础设施和快速变化的客户以及满足他们需求的巨大压力。


    公用事业可以通过应用 AI 来满足不断变化的动态；第一步是改进公用事业计划并增加客户参与度，然后使用支持 AI 的数字体验来增强客户体验，该体验在移动设备上提供实时和安全的信息。


    ## 1.8.3 石油和天然气行业


    ### 1.8.3.1 管理指数级增长


    石油几十年来一直是需求量最大的资源之一。石油供应商覆盖了世界一半的能源。石油被广泛使用，从车辆到工业。


    使用 AI，该行业正在应用新技术以低利润率获得更多利润。借助 AI 传感器，公司可以记录故障。


    定位和开采石油和天然气的公司需要大量的机械和工人，增加了成本。我们可以通过使用 AI 传感器来控制实时系统和监控数据收集来降低成本。


    存储、处理并将石油和天然气交付给供应商的公司也使用 AI 进行预测和测量优化，以做出更好的决策，从而提高性能。


    AI 正在日益增长，并在石油和天然气行业提高效率和成本效益。


    ### 1.8.3.2 3D 地震成像和 Kirchhoff


    3D 地震是一种利用地下岩石的声波识别原油和天然气的工具。地震学家使用超灵敏设备记录岩石的声音。


    #### 1.8.3.2.1 如何收集地震数据？


    有两种类型的数据记录：


    - **被动源：** 它们由地球的运动产生。人类无法感觉到，因为它们产生的振动非常小。

    - **主动源：** 数据是通过向地球发送振动获得的。


    #### 1.8.3.2.2 AI 和机器学习如何在这里工作？


    使用 ML 算法，公司可以对油气田进行分组，这些算法用于预测和实施泵、跟踪器、涡轮机等的保存。此外，还实施了 DL 和 ML 技术，如图像处理、预测方法和分析工具。


    ### 1.8.3.3 快速处理和显示地震数据


    ML 系统自动收集数据并识别它们之间的关系。首先，ML 识别所有数据模式，其中可能包括一些缺失的轨迹。它分析数据并识别它们之间的隐藏关系。现在，使用已知数据，它将识别另一组输入数据的缺失轨迹。


    这种方法仅依赖于其经验，即从已识别的数据集中学习和得出的结论。它减少了识别缺失轨迹所浪费的成本和时间。


    ## 1.8.4 电子商务和高科技行业


    ### 1.8.4.1 关联和互补产品


    如今，一切都与互联网相关，无论是购买物品、销售还是学习。大多数电子商务业务提供商都在寻找在线开展业务和销售商品。这些公司试图通过促销、展示广告和营销来销售他们的产品。AI
    通过创建推荐系统发挥作用，该系统使用商品之间的互补性和相似性，并根据客户的需求和愿望提供最佳交易。


    推荐系统基于关联设计。因此，它们重视用户兴趣，只推荐用户感兴趣的产品。


    另一个关键因素是互补关联；它几乎应用于电子商务的每个领域，向客户提供互补产品。为了提高系统的准确性，向用户提供建议。


    ### 1.8.4.2 跨渠道分析


    跨渠道分析是一种营销智能技术，允许来自不同平台的数据，包括广告、促销，并将其呈现在单一平台上。'

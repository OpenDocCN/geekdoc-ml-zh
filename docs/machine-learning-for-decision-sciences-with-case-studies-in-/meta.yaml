    x_i)}{n} = 528,492.64 - \frac{(267.25)(42,627.15)}{20} = -41,112.65$$


    $$\hat{\beta}_1 = \frac{S_{xy}}{S_{xx}} = \frac{-41,112.65}{1106.56} = -37.15$$


    $$\hat{\beta}_0 = \bar{y} - \hat{\beta}_1 \bar{x} = 2131.3575 - (37.15)13.3625

    \ the burger, like adding extra cheese, extra patty etc. The main class will be\
    \ the burger with the regular base price. By using a decorator class, the burger\
    \ class can be extended and the price can be added according to the customization."
- md: "## Introduction\n\n- **Façade design pattern**\n  Façade design patterns act\
    \ like abstraction, which conceals all the inner complex details of the application\
    \ and provides a simple interface to the client to access the applications. Let\
    \ us consider an example of a grocery shop, which is equipped with loads of items.\
    \ When a customer visits the shop for the first time, he is unable to search and\
    \ find the items he wishes to purchase. So he gives a list to the shopkeeper and\
    \ the shopkeeper gives the customer all the required items. This is an example\
    \ of Facade design pattern.\n\n- **Flyweight design pattern**\n  Flyweight design\
    \ patterns, as the name implies, are patterns that fly away from the weight, i.e.,\
    \ a memory from the application. It reduces the objects from the source code to\
    \ release the memory and boosts the performance. Flyweight design can be called\
    \ code optimization. Flyweight searches the objects that are similar and use them.\
    \ In case no match is found, it creates a new object. Improving system performance\
    \ is a non-functional and essential requirement of software as it affects its\
    \ appearance. Suppose we have an application running too slow due to lines and\
    \ lines of code written and wastage of cache; now, flyweight design patterns work\
    \ here. It will eliminate all the similar objects that are created and waste memory.\n\
    \n- **Private class**\n  This type of pattern is used for security purposes where\
    \ data are crucial. Create a private class and store the data, which will be in\
    \ the same state throughout the code. All variables defined in the private class\
    \ are only accessible within its class. To access the private class attributes,\
    \ you need to create their getters and setters. The private class is used where\
    \ information needs to be hidden from the outside world and only displayed to\
    \ you.\n\n- **Proxy**\n  Proxy is all about providing access. In proxy design\
    \ patterns, a class is created, which represents the functionality of other classes.\
    \ Let’s take the example of a credit card that acts as a proxy and contains all\
    \ your bank account amounts.\n\n## 1.3 MACHINE LEARNING AND STATISTICS\n\nML can\
    \ forecast better and more accurate output. It builds the algorithms that use\
    \ the input data statistics to predict the output. All social media websites use\
    \ ML to display the data on the feed. The procedure of ML involves searching through\
    \ data to look for patterns and program them accordingly. Some ML examples include\
    \ ads displayed as a suggestion and fraud detection. Some of the ML methods are\
    \ as follows:\n\n**Supervised machine learning algorithm**\nSupervised learning\
    \ deals with the known and categorizes data. It can classify uncategorized data\
    \ also. In supervised learning, a sample set contains input data with desired\
    \ output data. Based on this new test, data can easily be categorized. For example,\
    \ an application identifies the animal that is either an herbivore, a carnivore,\
    \ or an omnivore animal. Using supervised learning, it already knew the classification\
    \ of the animal. Now, whenever a new animal is entered into the system as an input,\
    \ the system will automatically predict its category.\n\n**Unsupervised machine\
    \ learning algorithm**\nIn the unsupervised learning sample set, data are unknown\
    \ and unlabeled. The data cannot be implemented directly as we are unaware of\
    \ the outputs. It simply works on finding the similarities between the data and\
    \ categorizes them as one. For example, categorize the customer based on which\
    \ product they purchase, and based on a similar product, we can categorize customers.\n\
    \n**Semi-supervised machine learning algorithm**\nSemi-supervised learning is\
    \ the mixture of supervised and unsupervised learning as its dataset contains\
    \ categorized and uncategorized data. The aim is to predict the new data that\
    \ are more effective and accurate than the output data given by the user. For\
    \ example, you wish to buy a product and watch ads related to the product, and\
    \ suddenly, you want to review the same product. Though the product is from a\
    \ different company, the categorized data would be the basic ad released by the\
    \ company.\n\n**Reinforcement machine learning algorithm**\nIn reinforcement learning,\
    \ the machine does not learn from classified data; instead it learns from its\
    \ experience and prediction, an agent takes all the actions (robotic avatar),\
    \ finds all possible scenarios and fits in the best solution. Games such as hangman\
    \ is the best example of reinforcement learning algorithm. Statistics is a representation\
    \ of data, hypothesis, etc. It's the correlation between the points, invariable\
    \ and multivariable.\n\nStatistics types are as follows:\n\n**Forecasting continuous\
    \ variable:** If a variable can adapt value between minimum and maximum, then\
    \ it is called continuous variable, for example, weight and age. It may be deterministic\
    \ or probabilistic. A deterministic result can be compared and evaluated with\
    \ respective observations. Probabilistic results are in the form of distribution.\n\
    \n**Regression:** It deals with the relationship between predictor and outcome\
    \ variables. It analyzes the results based on predictive analysis and modeling.\
    \ Let's take the example of dieting apps that predict the diet schedule based\
    \ on your daily food routine, weight, and height.\n\n**Classification:** It's\
    \ the process of grouping the data on the basis of similar categories. For example,\
    \ classify animals based on their habitats.\n\nML and statistics are two different\
    \ methodologies, but how are they similar? The similarity between both of them\
    \ is the prediction from the data. The primary difference between ML and statistics\
    \ is manipulating the data; ML is simply working out the data using algorithms,\
    \ whereas statistics is just mathematics in finding the patterns from the data.\n\
    \n## 1.4 RELATION BETWEEN ARTIFICIAL INTELLIGENCE, MACHINE LEARNING, NEURAL NETWORKS,\
    \ AND DEEP LEARNING\n\nThere is always a debate among researchers and beginners\
    \ about artificial intelligence (AI), ML, neural networks (NNs), and DL. Some\
    \ of the popular Google search questions are “Are AI and ML different?”, “Are\
    \ ML and DL the same?”, “How is NN related to ML and DL?”, etc. Data scientists\
    \ have come up with a clear definition for these terms:\n\n**Artificial intelligence\
    \ (AI)**, like mathematics and biology, is a science. It researches how to create\
    \ intelligent programs and machines that can solve issues creatively, which has\
    \ historically been considered a human right.\n\n**Machine learning (ML)** is\
    \ a subcategory of AI that allows systems to learn and improve independently without\
    \ being explicitly programmed. Different learning algorithms based on different\
    \ architectures (e.g., NNs) are used in ML to address problems.\n\n**Deep learning\
    \ (DL)**, also known as deep neural learning, is a type of ML that employs NNs\
    \ to assess various elements with a structure similar to that of the human nervous\
    \ system.\n\n![AI vs. ML vs. NN vs. DL analogous to a nesting doll.](img/7fbca4852dbe91c6cea209148871a1b3_27_0.png)\n\
    \nFIGURE 1.1 AI vs. ML vs. NN vs. DL analogous to a nesting doll.\n\nAI is a discipline\
    \ of computer science that teaches machines to think and function in the same\
    \ way that people do. DL is a branch of AI that processes and manipulates data\
    \ by mimicking the human brain’s working pattern. For example, the NN is used\
    \ in DL to predict output patterns. Let’s look at the shortest route computation\
    \ application as an illustration of how DL works. When we hurry and want to get\
    \ to our end destination as soon as possible, we look for a shorter path.\n\n\
    The user will be asked to provide the following system input:\n\n- Place to begin\n\
    - Destination\n\nAs previously said, DL is based on NNs, which have nodes similar\
    \ to interconnected neurons. The input, hidden, and output layers are the three\
    \ layers that make up a neuron. The input layer contains the records entered by\
    \ the user, such as the beginning place and destination. The hidden layer contains\
    \ all the calculations and implementation, such as calculating the shortest path\
    \ that covers the least amount of time and kilometers based on the user’s starting\
    \ location and destination. There can be one or several hidden layers. Here are\
    \ some DL implementations that feature more than one hidden layer. The final user\
    \ output is contained in the output layer. In other words, it will show the user\
    \ the optimized shortest route.\n\nAI, DL, and ML all have one thing in common:\
    \ They all use massive data and modern computer languages to anticipate outcomes.\
    \ DL is the interrelationship between the three. ML is a subset of AI, and AI\
    \ is a subset of ML.\n\nSo, as the figure suggests, AI is a broad concept that\
    \ first exploded in the late 1950s, causing a significant shift in the data science\
    \ industry. Later, in the late 1980s, ML was introduced, which improved AI features.\
    \ Finally, in the late 1990s, DL was introduced, which combines AI and ML (Figure\
    \ 1.2)."
  mdcn: "## 引言\n\n- **外观设计模式**\n  外观设计模式类似于抽象，它隐藏了应用程序所有内部复杂的细节，并为客户端提供一个简单的接口来访问应用程序。让我们考虑一个杂货店的例子，店里摆满了各种商品。当顾客第一次光顾商店时，他无法搜索和找到他想购买的商品。于是他把清单交给店主，店主则把顾客所需的所有商品都给他。这就是外观设计模式的一个例子。\n\
    \n- **享元设计模式**\n  享元设计模式，顾名思义，是“飞离重量”的模式，即从应用程序中释放内存。它通过减少源代码中的对象来释放内存并提升性能。享元设计可以称为代码优化。享元模式会搜索相似的对象并复用它们。如果没有找到匹配项，它会创建一个新对象。提升系统性能是软件的一个非功能性且至关重要的需求，因为它影响着软件的表现。假设我们有一个应用程序由于代码行数过多和缓存浪费而运行得非常慢；现在，享元设计模式就派上用场了。它会消除所有已创建的、浪费内存的相似对象。\n\
    \n- **私有类**\n  这种模式用于数据至关重要的安全场景。创建一个私有类并存储数据，这些数据在整个代码中将保持相同的状态。私有类中定义的所有变量只能在其类内部访问。要访问私有类的属性，你需要为它们创建getter和setter方法。私有类用于需要对外部世界隐藏信息，只向你显示信息的场景。\n\
    \n- **代理**\n  代理的核心是提供访问控制。在代理设计模式中，会创建一个类，该类代表其他类的功能。让我们以信用卡为例，它充当代理，包含了你银行账户的所有金额。\n\
    \n## 1.3 机器学习与统计学\n\n机器学习能够预测更好、更准确的结果。它构建算法，利用输入数据的统计信息来预测输出。所有社交媒体网站都使用机器学习来在信息流中展示数据。机器学习的过程包括在数据中搜索模式并据此进行编程。一些机器学习的例子包括作为建议展示的广告和欺诈检测。一些机器学习方法如下：\n\
    \n**监督式机器学习算法**\n监督式学习处理已知且分类的数据。它也可以对未分类的数据进行分类。在监督式学习中，一个样本集包含输入数据和期望的输出数据。基于此，新的测试数据可以很容易地被分类。例如，一个应用程序识别动物是食草动物、食肉动物还是杂食动物。使用监督式学习，它已经知道了动物的分类。现在，每当一个新的动物作为输入进入系统，系统将自动预测其类别。\n\
    \n**无监督式机器学习算法**\n在无监督式学习的样本集中，数据是未知且未标记的。由于我们不知道输出，数据不能直接应用。它只是通过寻找数据之间的相似性来工作，并将它们归为一类。例如，根据客户购买的产品对客户进行分类，基于相似的产品，我们可以对客户进行分类。\n\
    \n**半监督式机器学习算法**\n半监督式学习是监督式和无监督式学习的混合，因为其数据集包含已分类和未分类的数据。其目标是预测比用户提供的输出数据更有效、更准确的新数据。例如，你想购买一个产品并观看了相关产品的广告，突然，你想查看同一个产品的评论。尽管该产品来自不同的公司，但分类数据将是该公司发布的基本广告。\n\
    \n**强化式机器学习算法**\n在强化学习中，机器不是从分类数据中学习；而是从其经验和预测中学习，一个代理（机器人化身）执行所有动作，找到所有可能的场景并找到最佳解决方案。像猜词游戏这样的游戏就是强化学习算法的最佳例子。统计学是数据、假设等的表示。它是点之间的相关性，包括单变量和多变量。\n\
    \n统计类型如下：\n\n**预测连续变量：** 如果一个变量可以在最小值和最大值之间取值，那么它被称为连续变量，例如体重和年龄。它可能是确定性的或概率性的。确定性结果可以与相应的观察结果进行比较和评估。概率性结果以分布形式呈现。\n\
    \n**回归：** 它处理预测变量和结果变量之间的关系。它基于预测分析和建模来分析结果。让我们以节食应用为例，它根据你的日常饮食习惯、体重和身高来预测饮食计划。\n\
    \n**分类：** 它是根据相似类别对数据进行分组的过程。例如，根据栖息地对动物进行分类。\n\n机器学习和统计学是两种不同的方法论，但它们有何相似之处？它们之间的相似之处在于从数据中进行预测。机器学习和统计学之间的主要区别在于处理数据的方式；机器学习只是使用算法来处理数据，而统计学则是通过数学方法从数据中寻找模式。\n\
    \n## 1.4 人工智能、机器学习、神经网络与深度学习之间的关系\n\n研究人员和初学者之间一直存在关于人工智能（AI）、机器学习（ML）、神经网络（NNs）和深度学习（DL）的争论。一些流行的谷歌搜索问题包括“AI和ML不同吗？”，“ML和DL是一样的吗？”，“NN与ML和DL有何关系？”等等。数据科学家为这些术语给出了明确的定义：\n\
    \n**人工智能（AI）**，像数学和生物学一样，是一门科学。它研究如何创造能够创造性地解决问题的智能程序和机器，这在历史上一直被认为是人类的特权。\n\n\
    **机器学习（ML）**是AI的一个子类别，它允许系统在没有明确编程的情况下独立学习和改进。基于不同架构（例如，神经网络）的不同学习算法被用于ML来解决问题。\n\
    \n**深度学习（DL）**，也称为深度神经学习，是一种ML类型，它使用神经网络来评估各种元素，其结构类似于人类神经系统。\n\n![AI vs. ML vs.\
    \ NN vs. DL analogous to a nesting doll.](img/7fbca4852dbe91c6cea209148871a1b3_27_0.png)\n\
    \n图 1.1 AI vs. ML vs. NN vs. DL 类比于套娃。\n\nAI是计算机科学的一个分支，它教机器像人类一样思考和运作。DL是AI的一个分支，它通过模仿人类大脑的工作模式来处理和操作数据。例如，神经网络在DL中用于预测输出模式。让我们以最短路径计算应用为例来说明DL的工作原理。当我们匆忙并希望尽快到达目的地时，我们会寻找更短的路径。\n\
    \n系统将要求用户提供以下输入：\n\n- 出发地\n- 目的地\n\n如前所述，DL基于神经网络，其节点类似于相互连接的神经元。神经元由输入层、隐藏层和输出层三层组成。输入层包含用户输入的记录，例如出发地和目的地。隐藏层包含所有的计算和实现，例如根据用户的出发地和目的地计算覆盖最少时间和公里数的最短路径。可以有一个或多个隐藏层。这里有一些DL实现具有多个隐藏层。最终的用户输出包含在输出层中。换句话说，它将向用户展示优化的最短路线。\n\
    \nAI、DL和ML都有一个共同点：它们都使用海量数据和现代计算机语言来预测结果。DL是这三者之间的相互关联。ML是AI的子集，而AI是ML的子集。\n\n\
    因此，如图所示，AI是一个广泛的概念，最早在20世纪50年代末爆发，引起了数据科学行业的重大转变。后来，在20世纪80年代末，ML被引入，它改进了AI的功能。最后，在20世纪90年代末，DL被引入，它结合了AI和ML（图1.2）。"

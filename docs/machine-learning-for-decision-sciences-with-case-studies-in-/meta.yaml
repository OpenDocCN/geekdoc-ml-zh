- md: '## 3.2.3 PHASE 3 – MODEL PLANNING


    The next phase, ML model planning, is to understand whether a good model is available
    for the data chosen for the respective project. In this phase, the methods, model,
    approaches, and flow expected are finalized. In addition to this, the relationship
    between variables in the data, primary variables, and suitable models is explored.
    Since this phase executes just before executing the analytical model, care should
    be taken in understanding the features and choosing the model. At this phase,
    there is a need to refer to the hypotheses developed in the first phase, from
    where we get to know the data and understand the business problem. The IH helps
    in framing the analytics to be executed in the next phase and to choose the correct
    methods to meet the objectives. At this stage, there are some considerations based
    on the data listed as follows:


    - The type of data is a major factor that will prescribe and confine the tools
    and analytical techniques in the next phase. Different tools and approaches are
    applied based on the data chosen, whether it is textual data or transactional
    data (e.g., tumor prediction using clinical data in Hadoop – contains structured,
    semi-structured, and unstructured while forecasting weather is based on structured
    data).

    - There should be an assurance whether the analytical techniques will meet the
    business objectives and prove/disprove the working hypotheses.

    - Understand if the solution to the business problem requires a single test or
    a series of techniques for analytic workflow. Tools such as SAS Miner will help
    set up a series of steps and analyses and serve as a user-friendly interface for
    manipulating larger data sources.


    With the type of data and resources available, the review has to be performed
    to check whether smaller approaches are suitable or whether new approaches are
    required. On several occasions, ideas arise based on analogous problems solved
    in industry verticals.

    There are a few guidelines and recommendations on choosing ML and deep learning
    models based on the question we are trying to answer. The specific algorithms
    are explained in detail in the further chapters: supervised, unsupervised, and
    deep learning model chapters.

    We need to understand the border classification of ML models. There are three
    categories as follows:


    - **Supervised learning:** The answer to the question is specific, for example,
    what is the salary of a 5-year-experienced ML engineer? The data are labeled,
    and this type of model predicts the outcome/future. Direct feedback is given to
    the model. Ground Truth (input) and Answer Key (output) are also given to the
    model.

    - **Unsupervised learning:** The data are cumbersome and not labeled. The intention
    is to find the hidden patterns in the data. No feedback is given to the model.

    - **Reinforcement learning:** This type of model is based on the rewards systems.
    Suitable action is to maximize reward in a particular situation. These algorithms
    are learnt based on a series of actions.


    Now that we understand the types of the algorithm, let us discuss the other factors
    that dictate a model type selection.


    **Size of training set:** We all know that when the training dataset is not enough,
    it always results in poor estimation. An over-constrained model on the insufficient
    training dataset will always end in underfitting; on the other hand, an under-constrained
    model will probably lead to overfitting the dataset; in both the cases, the outcome
    will turn to be poor performance. Thus, the size of the training dataset may be
    a factor that plays a significant role for us when deciding the algorithm of our
    choice. For a little training dataset, as the low-bias/high-variance classifiers
    (such as k-nearest neighbors) are likely to overfit the training dataset, the
    high-bias/low-variance classifiers are at an advantage over this.


    **Training time:** Time taken to coach the model varies for every algorithm. This
    time correlates with the size of the dataset and the accuracy we are aiming for.


    **The number of parameters:** Parameters are one of the foremost important factors
    in an honest-performing model. Therefore, the components like an error tolerance
    level and a complete number of iterations depend on the algorithm’s nature. Usually,
    the foremost number of trail and errors is needed to seek an honest combination
    within the algorithms that have an enormous number of parameters. Although having
    many parameters typically gives more versatility, the time taken to train the
    model using a particular algorithm and the same accuracy may be sensitive in obtaining
    just the right setup.


    **The number of features:** Compared with the number of data points, the number
    of features of certain datasets may be quite large. We face the same situation
    when dealing with the Natural Language Processing (NLP) datasets, which are more
    textual datasets. Some learning algorithms can consume a longer training time
    when dealing with many features and make the work unrealistic. Some ML algorithms
    like support vector machines are especially well designed for this situation.
    These assumptions we make based on past experiences do not work for all situations,
    and we are required to have a better understanding of such algorithms to apply
    the best one for a specific problem.


    **Accuracy:** The ML algorithms we use to make realistic decisions and greater
    accuracy on model results lead to better decisions. The expense of errors may
    be enormous, so we need to minimize that cost by improving the model’s accuracy.
    The accuracy needed will be distinct, depending on the requirement. The approximation
    is often sufficient, which can result in a massive decrease in processing time.
    However, approximate techniques are likely to result in overfitting of the training
    dataset.


    Based on the factors described above, there are heuristics on the recommended
    type of model based on the situation (Table 3.4).


    There are many tools available, and let us discuss few popular ones.


    Python is very popular nowadays and has an entire range of modeling abilities,
    including a satisfactory environment for building ML models with sophisticated
    code. In addition, Python also can work with SQL and run statistical analysis
    and tests on big data through open-source connectivity. Some of these abilities
    have made Python suitable for building models. Moreover, it contains more than
    2000 packages and rapidly expanding everyday with the latest graphical features,
    thus making it user-friendly and more robust.


    SAP HANA and Microsoft SQL Server provide SQL services such as in-database analysis
    of common data mining functions, basic predictive models, and involved aggregations.'
  mdcn: '## 3.2.3 第三阶段 – 模型规划


    下一阶段是机器学习模型规划，旨在了解所选项目数据是否有合适的模型可用。在此阶段，将最终确定预期的方法、模型、方法和流程。此外，还需探索数据中变量之间的关系、主要变量以及合适的模型。由于此阶段在执行分析模型之前进行，因此需要仔细理解特征并选择模型。在此阶段，需要参考第一阶段建立的假设，从中我们得以了解数据并理解业务问题。初始假设有助于构建下一阶段要执行的分析，并选择正确的方法以达成目标。在此阶段，基于数据有以下一些考虑因素：


    -   数据类型是主要因素，它将规定并限制下一阶段的工具和分析技术。根据所选数据（无论是文本数据还是事务数据），会应用不同的工具和方法（例如，使用Hadoop中的临床数据进行肿瘤预测——包含结构化、半结构化和非结构化数据，而天气预报则基于结构化数据）。

    -   需要确保分析技术能够满足业务目标，并验证/证伪工作假设。

    -   理解业务问题的解决方案是需要单次测试还是需要一系列技术来构建分析工作流。像SAS Miner这样的工具有助于设置一系列步骤和分析，并作为用户友好的界面来处理大型数据源。


    根据数据类型和可用资源，需要进行审查，以检查较小的方法是否适用，或者是否需要新的方法。在许多情况下，想法源于在行业垂直领域解决的类似问题。

    关于根据我们试图回答的问题来选择机器学习和深度学习模型，有一些指导原则和建议。具体的算法将在后续章节中详细解释：监督学习、无监督学习和深度学习模型章节。

    我们需要理解机器学习模型的边界分类。有以下三个类别：


    -   **监督学习：** 问题的答案是具体的，例如，一个有5年经验的机器学习工程师的薪水是多少？数据是带标签的，这类模型预测结果/未来。模型会得到直接反馈。真实标签（输入）和答案键（输出）也会提供给模型。

    -   **无监督学习：** 数据复杂且未标记。目的是发现数据中的隐藏模式。模型不会得到反馈。

    -   **强化学习：** 这类模型基于奖励系统。合适的行动是在特定情况下最大化奖励。这些算法基于一系列动作进行学习。


    既然我们了解了算法的类型，让我们讨论决定模型类型选择的其他因素。


    **训练集大小：** 我们都知道，当训练数据集不足时，总是会导致估计不佳。在不足的训练数据集上过度约束的模型总是会导致欠拟合；另一方面，约束不足的模型可能会导致数据集过拟合；在这两种情况下，结果都会表现不佳。因此，训练数据集的大小可能是我们在决定所选算法时起重要作用的因素。对于较小的训练数据集，由于低偏差/高方差分类器（如k近邻）可能过拟合训练数据集，高偏差/低方差分类器在此方面具有优势。


    **训练时间：** 训练模型所需的时间因算法而异。此时间与数据集的大小和我们追求的准确性相关。


    **参数数量：** 参数是性能良好模型中最重要的因素之一。因此，诸如误差容忍度和总迭代次数等组件取决于算法的性质。通常，对于具有大量参数的算法，需要最多的试错次数来寻找一个良好的组合。尽管拥有许多参数通常提供更多的灵活性，但使用特定算法和相同精度训练模型所需的时间可能对获得正确的设置很敏感。


    **特征数量：** 与数据点数量相比，某些数据集的特征数量可能相当大。在处理自然语言处理数据集（更多是文本数据集）时，我们面临同样的情况。一些学习算法在处理大量特征时会消耗更长的训练时间，使工作变得不切实际。一些机器学习算法，如支持向量机，特别为此类情况设计。我们基于过去经验做出的这些假设并非适用于所有情况，我们需要更好地理解此类算法，以便为特定问题应用最佳算法。


    **准确性：** 我们使用的机器学习算法用于做出实际决策，模型结果的更高准确性会带来更好的决策。错误的代价可能巨大，因此我们需要通过提高模型的准确性来最小化该成本。根据需求，所需的准确性会有所不同。近似通常就足够了，这可以大大减少处理时间。然而，近似技术可能导致训练数据集过拟合。


    基于上述因素，根据情况，有关于推荐模型类型的启发式方法（表3.4）。


    有许多可用的工具，让我们讨论一些流行的工具。


    Python如今非常流行，具有一系列建模能力，包括一个用于构建具有复杂代码的机器学习模型的满意环境。此外，Python还可以与SQL协作，并通过开源连接对大数据运行统计分析和测试。其中一些能力使Python适合构建模型。此外，它包含超过2000个软件包，并且每天都在快速扩展最新的图形功能，从而使其用户友好且更强大。


    SAP HANA和Microsoft SQL Server提供SQL服务，例如常见数据挖掘功能的数据库内分析、基本预测模型和复杂聚合。'

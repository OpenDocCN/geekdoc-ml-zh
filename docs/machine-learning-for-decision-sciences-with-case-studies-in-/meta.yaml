  mdcn: '## 6.3.2.6 有序逻辑回归


    这是一种多类别逻辑回归，其目标变量包含两个以上的类别标签。有序类别变量中存在自然顺序。有序变量的例子包括学生成绩和肿瘤分级。


    ## 6.3.3 优化问题


    优化是一个最小化或最大化问题。设实际输出为 $y$，预测输出为 $\hat{y}$，目标是最小化预测输出与实际输出之间的差异，如公式 6.4 所示。


    目标是 $\min(\hat{y} - y)$


    交叉熵损失函数 $L_{CE}$ 是逻辑回归模型中使用的函数


    $L_{CE} = -\log p(y|x)$


    $\log p(y|x) = y \log \hat{y} + (1-y) \log(1-\hat{y})$


    $L_{CE} = -[y \log \hat{y} + (1-y) \log(1-\hat{y})]$


    ## 6.3.4 正则化


    模型在训练数据上表现良好，但无法对新的未见数据进行分类，这被称为过拟合问题。当我们的模型拟合了过多数据时，就会发生过拟合。这可以通过使用正则化项来泛化逻辑回归模型来解决。正则化可以通过对权重参数添加惩罚项来实现。$L_1$
    和 $L_2$ 正则化是两种正则化形式。$L_2$ 正则化被广泛使用，其一般形式如公式 6.15 所示。


    $\frac{\lambda}{2} ||w||^2 = \frac{\lambda}{2} \sum_{j=1}^{m} w_j^2$


    其中 $\lambda$ 是正则化参数。


    ## 6.3.5 现实世界应用


    ### 6.3.5.1 医学诊断


    多项研究利用逻辑回归进行疾病诊断。由队列研究收集的埃文斯县数据集使用逻辑回归模型预测心脏病的存在。埃文斯县数据集的部分变量见表 6.3。


    用于预测冠心病的多重逻辑回归形式如图 6.4 所示。


    $$\ln\left(\frac{P(\text{CHD} = 1 | \text{CAT}, \text{CHL}, \text{SMK}, \text{ECG})}{1
    - P(\text{CHD} = 1 | \text{CAT}, \text{CHL}, \text{SMK}, \text{ECG})}\right) =
    \frac{1}{1 + e^{-(\beta_0 + \beta_1\text{CAT} + \beta_2\text{CHL} + \beta_3\text{SMK}
    + \beta_4\text{ECG})}}$$


    几项关于癌症生存的研究使用了癌症数据集并进行了多类别有序逻辑回归，如图 6.5 所示。癌症数据集的部分变量见表 6.4。


    ### 6.3.5.2 文本分类


    数据科学家广泛使用逻辑回归进行文本分析和分类。情感分析、Twitter 数据分类、垃圾邮件识别和推荐系统等多种应用都利用了逻辑回归。例如，你有一条电影评论，写着“非常无聊”，目标是预测这条评论是正面还是负面，如图
    6.6 所示。


    ### 6.3.5.3 市场营销


    逻辑回归技术被广泛用于分析客户行为、保留客户以及评估客户的信用度。客户流失预测应用更有效地使用了逻辑回归技术。在流失预测中，逻辑回归模型将客户分为三类：新获取的客户、现有客户和流失客户（决定终止关系的客户）。客户可能基于多种因素（如客户服务）终止关系。流失预测的变量描述见表
    6.5。


    ## 6.3.6 使用 Python 实践逻辑回归


    逻辑回归因其核心策略所使用的函数——逻辑函数而得名。逻辑函数，也称为 S 型函数，由统计学家开发，用于解释人口增长的特性：快速增长并在环境承载能力处达到上限。它是一条
    S 形曲线，接受任何实数值并将其映射到 0 到 1 之间的值，但永远不会精确达到这些极限值。


    ```

    1/(1+e^-value)

    ```


    其中 *e* 是自然对数的底数（欧拉数或电子表格中的 EXP() 函数），value 是你想要转换的特定数值。下面是使用逻辑函数将 -5 到 5 之间的数字转换到
    0 到 1 范围内的图表。


    逻辑回归也是一种线性方法，但预测结果经过了逻辑函数的转换。这样做的影响是，我们不能像线性回归那样将预测理解为输入的线性组合；例如，从上面继续，模型可以表示为


    $$p(X) = e^{\wedge}(b_0+b_1X) / (1+e^{\wedge}(b_0+b_1X))$$


    我们不想过多深入数学细节，但我们可以将上述方程转换如下（通过对另一侧添加对数 (ln) 来移除指数项）：


    $$\ln(p(X)/1-p(X)) = b_0 + b_1 * X$$


    这很有用，因为我们可以看到右侧的输出再次是线性计算的（就像线性回归一样），而左侧的输入是默认类别概率的对数。左侧的这个比率被称为默认类别的几率（我们通常使用几率而不是概率；例如，赛马中使用几率而不是概率）。几率计算为事件发生的概率除以不发生的概率；例如，0.8/(1
    – 0.8) 的几率是 4。因此，我们可以写成：


    $$\ln(\text{odds}) = b_0 + b_1 * X$$


    我们将左侧称为对数几率或 probit，因为几率经过了对数转换。当然，其他类型的函数也可以用于转换（这超出了本文的范围）。但是，通常要求将线性回归方程与概率联系起来的转换，称为链接函数，例如
    probit 链接函数。然后，我们可以将指数放回其适当的位置并表示为


    $$\text{odds} = e^{\wedge}(b_0 + b_1 * X)$$


    所有这些让我们看到模型仍然是输入的线性组合，但这个线性组合与默认类别的对数几率相关。为了说明逻辑回归，我们将使用一个名为泰坦尼克号数据集的样本数据集。我们的目标是预测，根据变量（Pclass
    – 旅行的乘客等级、乘客姓名、乘客性别、乘客年龄、是否与其他乘客有亲属关系——（例如配偶、兄弟姐妹或父母/子女）以及支付的费用）的值，判断该人是否可能在泰坦尼克号事故中幸存。


    名义变量的例子有


    职业状况 $\begin{cases} \text{个体经营者} - 0 \\ \text{政府雇员} - 2 \\ \text{私营企业雇员} - 3 \\
    \text{失业} - 1 \end{cases}$


    例如，让我们考虑一个名为目标变量类型的名义变量。我们的目标是根据输入变量年龄组和吸烟状况对目标变量进行分类。


    目标因变量 $Y = \text{癌症类型} \begin{cases} \text{肺癌} - 0, \\ \text{口腔癌} - 1 \\ \text{其他}
    - 2 \end{cases}$


    自变量 $x_1 = \text{年龄组} \begin{cases} 0 & \text{如果 } \le 50 \\ 1 & \text{如果 } >
    50 \end{cases}$


    自变量 $x_2 = \text{吸烟} \begin{cases} 0 - \text{非吸烟者} \\ 1 - \text{吸烟者} \end{cases}$


    为了执行多类别逻辑回归，让我们假设任何类别作为参考，然后分别与其他两个类别进行比较。例如，让我们考虑肺癌 {0} 作为参考类别，首先比较口腔癌 {1} 与肺癌
    {0}，然后比较其他 {2} 与肺癌 {0}。然后，需要为每个单独的比较计算比值比 (OR)。


    $\text{OR}_{1\text{vs}0} = \frac{P(Y=1)}{P(Y=0)}$


    $\text{OR}_{2\text{vs}0} = \frac{P(Y=2)}{P(Y=0)}$


    两个比较的 logit 表达式为


    $\ln\left(\frac{P(Y=1)}{P(Y=0)}\right)$ 和 $\ln\left(\frac{P(Y=2)}{P(Y=0)}\right)$


    口腔癌 {1} 与肺癌 {0} 类别的逻辑函数为


    $\ln\left(\frac{P(Y=1|x_1, x_2)}{P(Y=0|x_1, x_2)}\right) = \frac{1}{1+e^{-(\beta_0+\beta_1
    \text{ age group}+\beta_2 \text{ smoking})}}$


    其他 {2} 与肺癌 {0} 类别的逻辑函数为


    $\ln\left(\frac{P(Y=2|x_1, x_2)}{P(Y=0|x_1, x_2)}\right) = \frac{1}{1+e^{-(\beta_0+\beta_1
    \text{ age group}+\beta_2 \text{ smoking})}}$


    **表 6.3**


    # 6.6.2.1 Maximize Margin with Noise


    SVM can handle the noise in the data in a very efficient way. The optimization
    function is required to find the weight vector $w$ and $b$ such that the margin
    width is maximized. So the margin can be written as in Equation 6.37.


    $\text{max } \frac{2}{\|w\|}$ (6.37)


    And for each of the $m$ training points $(x_i, y_i)$


    $\text{s.t. } y_i(w^T x_i + b) \geq 1$


    and can be rewritten as a minimization problem


    $\|w\|^2 = w \cdot w \text{ is minimized}$


    And for each of the m training points $(x_i, y_i)$


    $\text{s.t. } y_i(w^T x_i + b) \geq 1$


    The main objective is to minimize $w \cdot w + c$ where $c$ is the distance of
    error points to their correct zones.


    # 6.6.2.2 Slack Variable $\xi_i$


    In Figure 6.92, there are two wrongly classified slack variables given as $\xi_1,
    \xi_2$ and the maximum margin is given as $M$, which we want to maximize.'

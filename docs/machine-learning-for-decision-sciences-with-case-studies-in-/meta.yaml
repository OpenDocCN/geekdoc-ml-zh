    Let''s take the example, suppose the user is creating an application that includes
    many modules, it becomes very difficult to manage the code if all are placed into
    one location. Packages help in creating a hierarchical structuring of the module
    name using dot notation.


    Packages are the namespace that holds many packages and modules themselves. They
    are the directories that are imported into the projects. The directory should
    contain a file called "init.py". It indicates that it is a Python library and
    is imported into the program.


    *Example:* Suppose we have a package that contains two modules name "a.py" and
    "b.py"

    Now the user can import the modules using the following package:

    import package.a, package.b



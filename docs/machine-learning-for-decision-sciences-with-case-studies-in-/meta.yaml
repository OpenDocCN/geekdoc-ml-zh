    decision tree, we can infer the profit and loss for drilling land for oil.


    ### Example 6.3: Decision Tree for Purchasing Laptop


    Create a decision tree for the following problem. Table 6.10 gives the details
    of purchasing a laptop.


    ## CALCULATION OF MUTUAL INFORMATION


    Mutual information between two random variables X and Y is given as


    $I(X;Y) = H(X) - H(X|Y)$


    ![](img/7fbca4852dbe91c6cea209148871a1b3_270_0.png)


    FIGURE 6.23 Decision tree for oil drill.


    TABLE 6.10

    Data for Purchasing Laptop


    | RID | Age | Earning | Class |

    |---|---|---|---|

    | 1 | ≤30 | High | No |

    | 2 | ≤30 | High | No |

    | 3 | 31 ... 40 | High | Yes |

    | 4 | >40 | Medium | Yes |

    | 5 | >40 | Low | Yes |

    | 6 | >40 | Low | No |

    | 7 | 31 ... 40 | Low | Yes |


    where

    $I(X; Y)$ is mutual information for $X$ and $Y$

    $H(X)$ is entropy of $X$

    $H (X|Y)$ is the conditional entropy for $X$ given $Y$.


    The mutual information of two classes $= -4 / 7 \log_2 (4 / 7) - 3 / 7 \log_2
    (3 / 7)$

    $= 4 / 7\log_2 (0.571) - 3 / 7\log_2 (0.48)$

    $= 4 / 7(0.808) + 3 / 7(1.05)$

    $= 0.461 + 0.45$

    $= 0.911$


    ## CALCULATION OF GAIN BASED ON AGE


    | RID | Age | Class |

    |---|---|---|

    | 1 | ≤30 | No |

    | 2 | ≤30 | Yes |

    | 3 | 31 ... 40 | Yes |

    | 4 | >40 | Yes |

    | 5 | >40 | Yes |

    | 6 | >40 | No |

    | 7 | 31 ... 40 | Yes |


    For age, we have two values for ≤ 30(1 – No, 1 – Yes), 2 values for 31 ... 40
    (2 – Yes, 0 – No), and 3 values for > 40(2 – Yes, 1 – No).


    Entropy = 2 / 7(0) + 2 / 7(0) + 3 / 7(-2 / 7 log₂(2 / 7) – 1 / 7 log₂(1 / 7))

    = 3 / 7(2 / 7(-1.83) + 1 / 7(-2.81))

    = 3 / 7(0.5228 + 0.4014)

    = 0.3961


    Gain = 0.911 – 0.391

    = 0.52


    ## CALCULATION BASED ON EARNING


    | RID | Earning | Class |

    |---|---|---|

    | 1 | High | No |

    | 2 | High | No |

    | 3 | High | Yes |

    | 4 | Medium | Yes |

    | 5 | Low | Yes |

    | 6 | Low | No |

    | 7 | Low | Yes |


    For earning, we have three values for high (2 – No, 1 – Yes), one value for medium
    (1 – Yes, 0 – No), and three values for low (2 – Yes, 1 – No).


    Entropy = 3 / 7(-1 / 7 log₂(1 / 7) – (2 / 7) log₂(2 / 7))

    + 0 + 3 / 7(-2 / 7 log₂(-2 / 7) – 1 / 7 log₂(-1 / 7))

    = 0.7922


    Gain = 0.911 – 0.7922

    = 0.1188


    Since age has the highest gain, the data are divided based on the age factor,
    as shown in Figure 6.24.'

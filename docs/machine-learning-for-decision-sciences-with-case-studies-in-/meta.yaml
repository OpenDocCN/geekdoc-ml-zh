    # ## 8.1 INTRODUCTION


    When we consider the nature of learning, the idea of gaining information about
    dealing with our surroundings may be the first that comes to mind. A newborn does
    not have an unambiguous instructor when playing, swinging its fingers, or looking
    from side to side; instead, it is in direct contact with its senses and nature.
    Using this link shows a wealth of information on causes and effects, the effects
    of actions, and what you need to do to attain your objectives. Throughout our
    lives, such contact is unquestionably a rich source of information about our environment
    and ourselves. If we are going to learn cooking in a group, we know exactly how
    our place reacts to what we do, and we need to persuade what will happen with
    our behavior. Almost all theories of learning and knowledge acquisition support
    collaborative learning as a fundamental notion. In this book, we look at how to
    learn from interactions using a computational method. Instead of directly considering
    how humans or animals learn, we study the investigated settings and evaluate the
    efficacy of artificial intelligence researchers or engineers’ numerous learning
    approaches. We investigate the structure of mathematical analysis and computational
    experimentation to design machines that effectively solve scientific or economic
    significance problems. The method we are testing, called reinforcement learning,
    is more goal-oriented learning from interaction than other machine learning (ML)
    methods. This chapter discusses goal-oriented learning based on reinforcement
    learning (RL) and how RL varies with other ML algorithms. The elements of RL such
    as agent, policy function, and value function are explained in detail, followed
    by the RL algorithms the Markov decision process (MDP) and dynamic programming
    (DP). The value functions, policy evaluation, and improvements are covered by
    implementing MDP and DP in Python.


    # ## 8.2 REINFORCEMENT LEARNING


    RL is the process of learning what to do – how to map situations into actions
    – to raise the numerical reward signal’s value. The learner is not told which
    steps to follow; instead, he must determine which acts provide the highest reward
    for trying. In the most thrilling and difficult situations, actions may impact
    the current reward and the next situation and, as a result, all subsequent prizes.
    These are two most important parts of RL: trial-and-error search and delayed rewards.


    RL, like other issues with names that finish in “ing,” such as ML and climbing,
    is a problem, a category of successful solutions to the problem and a subject
    that studies the problem and its solutions all at the same time. It’s tempting
    to use a single word to describe all three issues, but it’s critical to keep these
    three issues separate in your mind. Furthermore, the distinction between problems
    and solutions in RL is particularly important; failing to express this distinction
    causes much confusion.'

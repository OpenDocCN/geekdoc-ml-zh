    # 6.6.9 One-Class SVM


    Outlier detection is an example of one-class SVM. Outlier detection is used for
    anomaly detection, where one is interested in detecting abnormal or unusual observations.
    The training data contain outliers, which are defined as observations that are
    far from the others. A one-class SVM is an unsupervised learning algorithm that
    learns the boundaries of data points and can classify any points that lie outside
    the boundary as, you guessed it, outliers.


    Figure 6.102 shows an example where the kitten and cub are the target classes
    with the label y=+1 and other extremes (neither kitten nor cub) are outliers y=-1.
    A one-class classifier is shown, which distinguishes kitten and cub from all other
    objects.


    # 6.6.10 Multiclass SVM


    In general, SVM is a binary classifier, but in real-time scenarios, there can
    be multiple classes. The multiclass classification can be achieved using one against
    one, one against all, and directed acyclic graph SVM methods.


    # 6.6.10.1 One against All


    In one against all, k binary SVM classifier is constructed where k is the number
    of classes. For example, there are three classes {1, 2, 3} as given in Figure
    6.103. Initially, let us perform binary classification by assuming class 1 as
    positive and the remaining classes from 2 and 3 as negative. Similarly, repeat
    the same procedure for the other four classes.'

    # 6.6.1 Geometric Intuition


    SVM is a supervised learning algorithm in which the learning model is provided
    with the set of inputs and their associated outputs or labels. SVMs are used in
    classification problems. The classification problem can be viewed as the task
    of separating classes in feature space. To understand the mystery of SVM, a simple
    binary classification problem with two classes is considered as an example, as
    shown in Figure 6.85. It consists of a decision boundary or hyperplane that separates
    the two classes. The goal of SVM is to choose an optimized hyperplane for separating
    the classes. For example, in Figure 6.85, many possible lines separate the two
    classes, and the dark shaded thick line is the optimal hyperplane among all others.


    The support vectors are the essential data points that are closer to the decision
    boundary. The *main objective of SVM* is to find an optimal hyperplane classifier
    for this problem. The optimal hyperplane is to identify the maximum distance between
    the support vectors and the hyperplane.



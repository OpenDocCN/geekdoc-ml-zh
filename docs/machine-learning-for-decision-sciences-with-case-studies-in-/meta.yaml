    # 6.6.12.2 Preprocessing


    A three-step preprocessing is applied to each MRI brain image. Steps in preprocessing
    are as follows:


    +   Step 1: Skull in the brain is not required for AD analysis, so skull stripping
    is done using a free surfer tool

    Step 2: MRI image is segmented in white matter, gray matter, and CSF (cerebra
    spinal fluid) using free surfer tool

    Step 3: Histogram equalization is done to adjust the contrast by modifying intensity
    distribution. Histogram equalization is preferred without loss of data; it equalizes
    the contrast of images.


    # 6.6.12.3 Feature Extraction


    Gray-level co-occurrence matrix (GLCM) is used to extract the 3D texture parameters
    of each region of interest (ROI). GLCM parameters are described in Table 6.38.


    # 6.6.12.4 SVM Classification


    SVM plots each data item as a point in n-dimensional space (where n is the number
    of features you have), with the value of each feature being the value of a particular
    coordinate. SVM maps the original features via a kernel function to construct
    a maximum classifier in a high-dimensional feature space. Gaussian RBF kernel
    with an empirical scaling factor of three differentiates the two classes very
    well. Finally, SVM with fivefold cross-validation is done.


    # 6.6.12.5 Procedure


    **Input:** ADNI dataset

    **Output:** SVM model for AD diagnosis with accuracy for a given dataset'

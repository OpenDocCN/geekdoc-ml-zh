    code, and technical documents throughout this project phase. Finally, we undertake
    a pilot project and put the models to the test in a real-world setting. It is
    vital to make sure that once we’ve run the models and gotten the results, we frame
    them in a way that’s appropriate for the audience who hired us and that provides
    demonstrable value. People will not perceive the value of a technically accurate
    analysis if we cannot interpret the data into a language they can understand.
    A lot of work will have been wasted.


    In this phase, we’ll evaluate the work’s benefits and set up a pilot so we may
    launch the work in a controlled manner before expanding it to a larger enterprise
    or ecosystem of consumers. We scored the model in the sandbox in step 4, and most
    analytics approaches implementing new analytical methods or models in a production
    environment for the first time in Phase 6. Therefore, instead of deploying this
    on a large scale, we advocate starting with a small pilot rollout. This approach
    will allow us to limit the risk relative to full-enterprise-wide deployment, learn
    about the performance and related constraints on a small scale, and make fine-tune
    adjustments before a full deployment.


    As we scope this effort, consider running the model in a production environment
    for a discrete set of single products or a single line of business, which will
    test the model in a live setting. This will allow the team to learn from the deployment
    and make adjustments before launching across the enterprise. Keep in mind that
    this phase can bring in a new set of team members, namely those responsible for
    the production environment, who have a new set of issues and concerns. The production
    support team and administrators want to ensure that the model can be incorporated
    into downstream processes and that it runs well in the production environment.
    Be on the lookout for input irregularities before feeding them to the model when
    running the model in the production environment. Evaluate run times and resource
    competition with other processes in the manufacturing environment.


    Once the model is deployed, the project team conducts follow-ups to re-evaluate
    the model after it has been in production for a period of time. Assess whether
    the model is meeting goals and expectations and whether desired changes (such
    as an increase in revenue, reduction in churn) are occurring. If these final results
    are not occurring, determine if this is due to a model inaccuracy or if its predictions
    are not being acted on appropriately. If needed, automate the retraining/updating
    of the model. In any case, we will need ongoing monitoring of model accuracy,
    and if accuracy degrades, we will need to retrain the model. If possible, design
    alerts for when the model is operating “out-of-bounds.” This includes situations
    when the inputs are far beyond the range that the model was trained on, which
    can cause the model’s outputs to be inaccurate. If this happens regularly, retraining
    is called for.


    Analytical projects often yield new insights about a business, a problem, or a
    concept that individuals may have taken at face value or thought was impossible
    to dig into. If appropriate, hold a post-mortem with your analytic team to discuss
    the process or project you would change if we had to do it again.


    Presenting the results to various groups is a daunting task. However, because
    each group will require a unique set of data, here are some general principles
    for preparing the analysis’ findings for sharing with the major sponsors.


    For a Business Audience: The more business-oriented the audience, the more succinct
    we must be. The majority of executive sponsors receive numerous briefings throughout
    the day and week. So, make sure the presentation gets to the point quickly and
    frames the results in terms of value to the sponsor’s organization. For instance,
    if we are working with a bank to analyze cases of credit card fraud, highlight
    the frequency of fraud, the number of cases in the last month or year, and the
    way much cost or revenue impacts the bank (or the main focus on the reverse, how
    much more revenue they might gain if they address the fraud problem). This will
    showcase the business impact better than deep dives on the methodology. We will
    need to include supporting information about analytical methodology and data sources.
    Still, generally, we tend to analyze the data only as supporting detail or to
    ensure the audience has confidence in the approach.


    For Analysts Audience: If you''re giving a presentation to other analysts, spend
    more time on the process and results. Colleagues will be more interested in the
    techniques if we establish a brand-new way of processing or evaluating data that
    will be reused in the future or applied to comparable problems. When possible,
    use photos and screenshots. People tend to recall mental images to illustrate
    extended lists of bullets to some extent.


    ## SUMMARY


    There are many Data Analytics Life Cycle frameworks available in the market; they
    tend to have few variations with the same basic structure. Following the phases
    and the activities will alleviate the known pitfalls in implementing the ML projects.
    However, the users need to be mindful of the iterative nature between the phases.
    Without putting a solid foundation in the previous phase, the next phase''s activities
    will be impacted. Therefore, we cannot emphasize the importance of data discovery
    and pre-processing data phases in the Data Analytics Life Cycle. A recent survey
    of data scientists from Gartner Inc. suggests that they spend over 80% of their
    time capturing, cleaning, and organizing data. The remaining less than 20% of
    their time was spent creating and optimizing the ML models. More than 75% also
    reported that preparing data was the least enjoyable part of their process. Table
    3.6 shows the breakup of time consumed per activity in the data analytics projects.


    ### TABLE 3.6

    Time Consumption for Each Activity in a Project


    | Project Activity | % of Project Time Allocated |

    | :--- | :--- |

    | Collecting data | 19% |

    | Building training datasets | 3% |

    | Cleaning, enriching, and organizing the data | 60% |

    | Mining data for patterns | 9% |

    | Refining algorithms | 5% |

    | Other activities | 4% |


    ### TABLE 3.7

    Key Roles and Responsibilities of Team Members


    | Key Project Role | Description |

    | :--- | :--- |

    | Project sponsor | A person responsible for the project''s existence, motivating,
    solving the core business problem, and providing funding |

    | Business users | Members who benefit from the end result of the project/product.
    They can advise and be consulted on the value of the end results |

    | SMEs/subject matter advisors (SMAs) | Members who had domain knowledge and could
    guide the project team in Phase 1 and Phase 2 primarily. They can be internal
    or external to the organization |

    | Project manager | Key member responsible for delivering the project on time
    and under budget with expected quality |

    | Business intelligence analyst | A member who has a deep understanding of the
    data, KPIs, and other key metrics and a clear vision of the data visualization
    aspects |

    | Data engineers | Members who have deep technical skills to assist with data
    ingest queries and technically responsible for bringing the data into the analytics
    sandbox |

    | Data scientists | Members who provide subject matter expertise in analytical
    techniques, applying efficient analytical techniques for the given business problem
    and ensuring the overall analytical goal of the project, are met |

    | Administrators | Member of the Database Administrators Team, platform administrators,
    and cloud engineers who provisions and configures the environments to support
    the analytical team |



    ## 总结


    **设计模式：** 在计算机科学中，它是对最常遇到问题的通用解决方案。它就像一个开发的虚拟模板。然后，基于模板代码编写整个源代码。设计模式有三种类型：创建型、结构型和行为型设计模式。


    **数据科学：** 它是关于数据及其操作的研究，分析数据，将原始数据整理成有意义的形式。数据科学包括数学、计算机研究、经济学和统计学。


    **计算机科学：** 它是处理计算机及其研究的科学分支，包括计算机如何工作以及如何操作它。研究计算机的人被称为计算机科学家。


    **经济学：** 它涉及对建设、支出和分配的研究。


    **机器学习：** 它完全关乎数据的表示、算法和模式。如今，数据科学家使用机器学习技术和模式来构建应用程序。


    **人工智能：** 它是机器像人类一样行动的过程。例如，创建类人机器人。这之所以成为可能，是因为人工智能。


    **统计学：** 数学的一个分支，涉及收集、整理、组织和以图形形式表示数据。它在以集合、图表和图形的形式得出结论方面表现出色。


    **数据科学家：** 数据科学家负责管理和呈现准确的数据。数据科学家扮演着至关重要的角色，因为所有业务都依赖于数据分析和数据建模。


    **面向对象编程：** 解释其类型，面向对象编程完全是关于创建类及其实例。数据被转换为对象，所有数据的行为都在类中执行。它是编写代码的一个极好方面。


    **对象：** 类的实例被称为对象；如果我们需要访问类的属性和函数，就必须创建其对象。


    **监督式机器学习算法：** 在这种类型的学习中，数据具有有意义的格式，机器对数据有一些了解，并可以预测输出。



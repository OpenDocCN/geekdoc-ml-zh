    # 6.4.10.5 Fault Diagnosis


    Faults should be detected, identified, and removed as quickly as possible on transmission
    lines. In power transmission line safety, error detection and defective phase
    identification (fault classification) are important. The measured voltage and
    current data at the relay point are used to identify and diagnose the fault with
    or without fault resistance in the line. A three-phase fault current is given
    as input to the decision tree for fault detection. In the case of fault classification,
    the three-phase currents and the zero-sequence current samples for half cycle
    are used as inputs to the decision tree to categorize all ten types of faults.
    The decision tree (Figure 6.57) has provided accurate results to identify and
    classify defects in the power system. DT also provides higher classification accuracy
    compared to SVM. The DT-based approach is validated for wide variations in the
    power system network operating conditions and can thus be applied to online fault
    detection for large power system networks.


    # 6.4.10.6 Healthcare Management


    A decision tree may be used in the management of health care. Data mining is used
    to collect and view useful information in easy-to-interpret visualizations from
    large datasets. The medical use of decision trees includes the diagnosis of a
    symptom-specific medical disorder. The categories identified by the decision tree
    could be either separate clinical subtypes or a disease. With the advent of electronic
    data processing, the number of regularly tracked variables in clinical settings
    has increased dramatically. Many of these variables are of limited significance
    and should therefore likely not be included in experiments on data mining. However,
    many important input variables are to be used in decision-making tree models.
    Figure 6.58 represents the decision tree for fault identification.


    # 6.4.10.7 Decision Tree in Data Mining


    Data mining can be done on the decision tree on segmented images. Image segment
    is a process of extracting useful information from the image. The pixel with gray
    value ranges from 180 to 240, and its local variation >80 and its slope variation
    >0.5 are selected for segmentation. For example, the image in Figure 6.59a is
    segmented into Figure 6.59b using the decision tree.



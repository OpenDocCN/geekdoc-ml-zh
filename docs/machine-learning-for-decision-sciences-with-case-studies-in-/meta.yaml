    \ sum is\", sum)\nThe sum is 55\n```\n\n```python\nIn [23]:\nn = 5\ni = 1\nwhile\
    \ (i <= n):\n    if (i == 3):\n        print(i)\n    i = i + 1 # 每次迭代 i 递增\n3\n\
    ```\n\n在上面的程序中，只要我们的计数器变量 *i* 小于或等于 *n*（在我们的程序中是 10），测试表达式就为 True。因此，我们需要在循环体中增加计数器变量的值。这一点非常重要（而且经常被遗忘）。如果不这样做，将导致无限循环（永不停止的循环）。\n\
    \n## 2.4.4.8 带 else 的 While 循环\n\n与 for 循环一样，我们也可以为 while 循环设置一个可选的块。如果 while\
    \ 循环中的条件评估为 False，则执行 else 部分。while 循环可以用 break 语句终止。在这种情况下，else 部分将被忽略。因此，如果没有发生\
    \ break 且条件为 False，while 循环的 else 部分才会运行。以下示例说明了 *带 else 的 while 循环*。\n\n```python\n\
    In [24]:\n# 说明在 while 循环中\n# 使用 else 语句的示例\n\ncounter = 0\n\nwhile counter < 0:\
    \ #条件失败，其主体不会被执行\n    print(\"Inside loop\")\n    counter = counter + 1\nelse:\n\
    \    print(\"Inside else\")\nInside else\n```\n\n## 2.4.4.9 Python Break 和 Continue\n\
    \n在 Python 中，break 和 continue 语句可以改变正常循环的流程。例如，循环会遍历一个代码块，直到测试表达式为 False。但是，有时我们希望在不检查测试表达式的情况下终止当前迭代甚至整个循环。break\
    \ 和 continue 语句就用于这些情况。\n\n## 2.4.4.10 Python Break 语句\n\nbreak 语句终止包含它的循环。程序的控制流转向循环主体之后的语句。如果\
    \ break 语句在嵌套循环（一个循环在另一个循环内部）中，break 将终止最内层的循环。\n语法\nbreak\n以下示例展示了 break 语句在\
    \ Python 中与 *for* 循环和 *while* 循环一起工作的情况："

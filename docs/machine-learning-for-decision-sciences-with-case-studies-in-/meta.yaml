    # 4.4.4 Monothetic and Polythetic Clustering Approaches


    Monothetic and polythetic clustering are mostly suitable for obtaining solutions
    to problems in taxonomy. The monothetic clustering algorithm uses the features
    or objects of the dataset one by one for clustering. In contrast, the polythetic
    clustering algorithm uses all the dataset features at one for clustering.


    # 4.4.5 Deterministic and Probabilistic Clustering Approaches


    In the deterministic clustering approach, the data objects are grouped into clusters
    in a deterministic manner, while in the probabilistic approach, an object is assigned
    to a certain cluster based on probability.


    Though there are different approaches used for clustering, as discussed in the
    previous section, only a few successful and popular algorithms are derived from
    these approaches. Therefore, the following sections will deal with the most common
    clustering algorithms such as k-means clustering, fuzzy k-means clustering, mixture
    of Gaussians, and density-based clustering, used for real-time applications.


    # 4.5 k-MEANS CLUSTERING


    One of the simplest and most commonly used unsupervised learning algorithms is
    the k-means clustering algorithm proposed by MacQueen in 1967. The algorithm classifies
    the given set of unlabeled data into a pre-defined number of k clusters.


    # 4.5.1 Geometric Intuition, Centroids


    The basic aim of the k-means clustering algorithm is to define k centroids, each
    cluster with one centroid, respectively. These pre-defined centroids should be
    placed cleverly since the different locations of centroids give different outputs.
    The better approach is to maintain the centroids as far away from each other.
    Once the centroids'' location is identified, the points in the dataset have to
    be associated with the nearest centroid. The process is repeated until no points
    are left free without association. This is specified as the first stage of grouping
    or clustering. Once the first stage is done, then a new set of k new centroids
    are computed. Once again, clustering is done according to the new k centroids.
    The iterative process is repeated until no change is observed between the k new
    centroids in the current iteration and the k centroids evaluated in the previous
    iteration. Once the final clusters are formed, then the objective function is
    evaluated; in this case, the objective function is to minimize the squared error
    function given by the equation


    $$J = \sum_{j=1}^{k} \sum_{i=1}^{n} \|x_i^j - c_j^2\|$$


    where $\|x_i^j - c_j^2\|$ is the distance evaluated between the data point $x_i^j$
    and the cluster center $c_j$. The above equation gives us the information of the
    n data points from their respective k cluster centers.


    To minimize the objective function, the k-means clustering algorithm should satisfy
    the following criterion:'

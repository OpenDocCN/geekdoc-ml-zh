    ## 3.2.2 第二阶段 – 数据准备与探索性数据分析


    数据发现阶段的主要重点是确保“高质量数据的可用性”。在此阶段，准备一个分析沙箱，用于项目的剩余阶段。执行提取、加载和转换（ELT）以及提取、转换和加载（ETL），将相关数据导入沙箱。然后对数据进行转换以便进行分析。基本思路是清晰地理解数据，并采取必要的措施来处理数据。数据分析师将此过程称为数据丰富和协调，此阶段被认为是数据生命周期中最关键和最耗时的阶段之一。


    在此阶段，定义一个空间来探索数据，而不干扰实时生产数据库。此外，所有类型的数据都应收集在沙箱中，因为分析项目需要大量和多样化的数据。因此，海量数据将包括摘要、结构化数据、原始数据馈送（例如传感器）和非结构化文本数据（日志数据）。因此，沙箱很大，几乎是组织企业数据仓库大小的10-50倍。'

    # 6.6.10.2 One against One


    In one against one method, for $M$ classes, $M(M - 1)/2$ classifiers are built.
    Figure 6.104 shows the architecture for three-class SVM problem using one against
    one method.


    # 6.6.10.3 Directed Acyclic Graph SVM


    It is a combination of one against one method and a directed acyclic graph concept.
    For the three-class example {1, 2, 3}, initially construct a binary classifier
    for classes {1 and 2} as in one against one method. The binary classifier moves
    to the right node if the data belong to class 1, else to the left node. Finally,
    the directed acyclic graph shown in Figure 6.105 is constructed to make a decision.
    The leaf node indicates the final class label.'

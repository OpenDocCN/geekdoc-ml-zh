    ## 2.4.3 流程控制\n\n程序的流程是顺序的。语句逐条执行。当用户需要重复执行语句时，就会用到条件。在这种情况下，控制流语句就起作用了。控制流语句包括\
    \ `if` 条件、`for` 条件、`else`、`if-else` 和 `while` 循环。计算机程序理解真（True）和假（False）的语言；让我们用图\
    \ 2.3 所示的流程图来解释这一点。\n\n### 2.4.3.1 If & elif 语句\n\n有时用户需要根据某些条件执行语句；对于多个条件，我们使用\
    \ `elif`。\n\n```\nIf 表达式 :\n    语句\nElif 表达式 :\n    语句\nElif 表达式 :\n    语句\nElse\
    \ 表达式 :\n    语句\n```\n\n让我们用一个例子来解释，假设创建一个程序来识别数字是负数，否则如果数字是正数且是偶数，否则将该数字视为正奇数。\n\
    \n```\nIf y<0 :\n    print \"y 是负数\"\nelif\n    y/2 = 0:\n    print \"y 是偶数\"\n\
    else :\n    print \"y 是一个负数。\"\n```\n\n![](img/7fbca4852dbe91c6cea209148871a1b3_47_0.png)\n\
    \n图 2.4 循环语句的流程图。\n\n### 2.4.3.2 循环语句\n\n循环语句允许我们多次执行一条语句。例如，如果用户想要打印他的名字十次，这种情况下循环将有所帮助；而不是写十次名字，使用循环函数并定义其范围。图\
    \ 2.4 所示的流程图解释了循环语句。\n如以下各节所述，有不同类型的循环语句，即 `for`、`while`、嵌套循环等。\n\n**For 循环：**\
    \ 循环使用每次执行时递增的迭代器变量重复执行语句。让我们以打印水果名称为例。设 \"fruits\" 是包含三种水果名称的列表。当程序执行时，每个水果都保存在变量\
    \ \"I\" 中，然后逐一打印。\n\n```\nFruits = [\"apple\", \"mango\", \"banana\"];\nFor I\
    \ in fruits :\n    Print (i);\n```\n\n**While 循环：** 如果给定条件为真，则重复执行一组语句。例如，将前五个自然数相加。\n\
    \n```\nI = 0;\nWhile y<6:\n    y = y+y\n    I++;\n```\n\n**嵌套循环：** 在另一个循环内部使用循环称为嵌套循环。让我们以向班级每位学生分发四块巧克力为例。嵌套循环在这里会起作用，因为我们必须使用两个循环，即巧克力和学生。\n\
    \n```\nchocolate = [\"Cadbury\", \"kitkat\", \"mars\", \"galaxy\"];\nstudents\
    \ = [\"Alice\", \"Jhon\", \"Nick\" ];\n```\n\n```python\nFor students in students\
    \ :\n    For chocolate in chocolate :\n        Print (students + \"got\" + chocolate);\n\
    ```\n\n### 2.4.3.3 循环控制语句\n\n为了改变代码执行的顺序，Python 提供了多种控制语句。以下是循环控制语句：\n\n**Break\
    \ 语句：** 用于退出循环。让我们以 20 个注册号为例，用户只想打印其中的十个注册号。\n\n```\nx=1;\nWhile x <= 20:\n \
    \   If x ==10:\n        break\n    Print (x)\n    x++;\n```\n\n> 一旦循环到达第 10 个注册号，`break`\
    \ 语句将退出循环，并且只显示 10 个注册号。\n\n**Continue 语句：** 它类似于 `break` 语句，它退出当前循环迭代，但不会退出整个循环。让我们考虑与前面相同的例子，并将\
    \ `break` 替换为 `continue`。\n\n```\nx=1;\nWhile x <= 20:\n    if x ==10:\n     \
    \   continue\n    Print (x)\n    x++;\n```\n\n> 一旦循环到达第 10 个注册号，`continue` 语句将跳过本次迭代，显示从\
    \ 1 到 20 的所有注册号，但不包括第 10 个注册号。\n\n**Pass 语句：** 它也称为空操作符。执行时什么也不会发生。考虑一个由两名程序员完成的项目；其中一名生病了，无法在特定日期来上班。问题是另一名程序员无法接手工作。在这种情况下，生病程序员编写的所有函数都将使用\
    \ `pass` 语句留空。让我们考虑与前面相同的例子，并使用 `pass` 语句。\n\n```\nx=1;\nWhile x <= 20:\n    if\
    \ x ==10:\n        pass\n        print \"10 不包含在内\"\n    Print (x)\n    x++;\n\
    ```\n\n> 一旦循环到达第 10 个注册号，`pass` 语句将起作用，显示从 1 到 20 的所有注册号，但不包括第 10 个注册号，因为我们跳过了它，并会打印\
    \ \"10 不包含在内\"。\n\n## 2.4.4 流程控制语句的 Python 代码示例\n\n### 2.4.4.1 条件语句\n\n当我们只想在满足特定条件时执行代码时，就需要进行决策。Python\

    \ \\quad (4.5)$$\n  where $p = 2$.\n\nGenerally, good proximity measures are also\
    \ application-dependent. For example, for good proximity measures, the clustering\
    \ user should not normalize the data drawn from multiple distributions.\n\n# 4.4\
    \ CLUSTERING ALGORITHMS\n\nIn this section, a broad classification of the clustering\
    \ algorithms is presented. The classification is performed based on the orthogonal\
    \ characteristics of the data available for clustering.\n\n# 4.4.1 HIERARCHICAL\
    \ AND PARTITIONAL CLUSTERING APPROACHES\n\nIn hierarchical clustering, similar\
    \ objects in a dataset are grouped into clusters and can be represented as *trees*\
    \ of clusters. Here, any two clusters are displaced, or one cluster includes the\
    \ other like branches of a tree, hence the term hierarchical.\nIn partitional\
    \ clustering, multiple groups or partitions are formed from the given dataset.\
    \ Here, the user has to specify the number of partitions or clusters as required\
    \ for the application.\n\n# 4.4.2 AGGLOMERATIVE AND DIVISIVE CLUSTERING APPROACHES\n\
    \nThe agglomerative and divisive **clustering methods belong to the hierarchical\
    \ clustering family** work in a reverse fashion concerning each other. In the\
    \ agglomerative approach, each object in the dataset is assigned to its cluster\
    \ based on the pairwise distance, and then, the clusters are merged. On the contrary,\
    \ in the divisive approach, all the objects in the dataset are assigned to a unique\
    \ cluster, and then, the clusters are split further from the unique cluster.\n\
    \n# 4.4.3 HARD AND FUZZY CLUSTERING APPROACHES\n\nEach data object must belong\
    \ to a single cluster while determining a clustering output for a given set of\
    \ data. This approach is called hard clustering. But in a real-time scenario,\
    \ the data can belong to more than one cluster since there may be many similarity\
    \ relations between the data among clusters. To address this issue, fuzzy clustering\
    \ algorithms are used with the concepts of fuzzy set theory. The algorithm allows\
    \ objects to belong to different clusters based on certain degrees of membership.\
    \ This approach is referred to as the fuzzy clustering approach.\nAll the algorithms\

    ## 6.4.6.3 Pruning to Avoid Overfitting


    Overfitting can be eliminated by the following method:


    - Prepruning

    - Postpruning


    ![](img/7fbca4852dbe91c6cea209148871a1b3_265_0.png)


    FIGURE 6.16 Decision tree with noise point.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_265_1.png)


    FIGURE 6.17 Decision tree with less data.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_266_0.png)


    FIGURE 6.18 Prepruning at stage S1.


    ### 6.4.6.3.1 Prepruning


    It is the process of pruning the decision tree on growing. Tree growth is stopped
    for negative gain or low positive benefit value. It is used to stop overfitting
    at an earlier stage.

    Considering Figure 6.18, the root node is divided based on an attribute A. Calculate
    the gain of the decision tree at S1 and S2. The decision tree will be stopped
    at S1 and S2 for the low or negative value of gain, as shown in Figure 6.18.


    ### 6.4.6.3.2 Postpruning


    Postpruning is also called backward pruning (Figure 6.19). First, a complete decision
    tree is constructed fully. Then, the accuracy of the tree is improved by removing
    the least significant branches. In postpruning, a decision tree is grown fully
    first. Several heuristics are used to delete subnodes. The error is measured on
    the whole tree (i.e., error (T)) and at point ST1 (i.e., error (st1)). If the
    error at ST1 is smaller than error T, then we can remove the subtree. The pruning
    can be done by using reduced error pruning, minimum error pruning, and cost-based
    pruning. The reduced error pruning is the simplest pruning algorithm.

    In this method, the error is measured on the whole tree (i.e., error (T)) and
    at point ST1 (i.e., error (st1)). If the error at ST1 is smaller than error T,
    then we can remove the subtree. In the minimum error pruning, the error rate is
    calculated at each non-leaf node by pruning subtree and without pruning subtree.
    If the error rate of the subtree with pruning is high, then keep that subnode.
    In cost-based pruning, the error and cost are also considered for pruning the
    data.


    ## 6.4.7 ADVANTAGES AND DISADVANTAGES


    ### 6.4.7.1 Advantages


    - **Interpretability**: Easy to understand. It can handle both categorical and
    numerical data

    - Useful in data exploration and deal with missing data points

    - Nonparametric method

    - Capture nonlinear relationship

    - Simple rule-based approach

    - Feature scaling is not explicitly required for the algorithm work

    - Quite useful for exploring a large dataset to pick out useful variables.

    - Little effort is required for data preparation.


    ### 6.4.7.2 Disadvantages


    - A highly complicated decision tree has a low bias.

    - Overfitting is the major problem of decision tree

    - It does not apply to the continuous variable

    - Cost is high


    ![](img/7fbca4852dbe91c6cea209148871a1b3_267_0.png)


    FIGURE 6.19 Postpruning of decision tree.


    ## 6.4.8 Decision Tree Examples


    ### Example 6.1: A Simple Decision Tree for Classification of Iris Flower


    The problem describes the creation of a very simple decision tree using iris flower.
    The iris flower is classified based on the petal length. The iris flower with
    a petal length >2.45 belongs to versi-Setsoa and <1.75 belongs to Versicolor.
    The iris flower having petal length between 2.45 and 1.75 belongs to Verginica.


    Draw a decision tree based on the data in Table 6.7 for the iris flower. The petal
    length of the iris flower differs for each flower. Take the petal length as an
    attribute for creating a decision tree.


    Consider the decision tree shown in Figure 6.20 for the classification of the
    iris flower. The three types of iris flower are iris Versisetosa, Versicolor,
    and Virginica. The data are divided into two parts at the root node based on the
    petal width (i.e., petal width having a length >2.45 cm). A petal width >2.45
    cm belongs to Versisetosa. Again at point B, the data are divided further based
    on the petal width. Petal widths >1.75 are classified as Versicolor, and petal
    widths <1.75 are classified as Virginica.



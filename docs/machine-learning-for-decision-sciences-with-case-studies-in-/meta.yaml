    \n状态转移的概率由下式给出，\n\n$$p(d' | d, e) = P_r \\{D_{t+1} = d' | D_t = d, B_t = e\\}\
    \ = \\sum_{a \\in C} p(d', a | d, e)$$\n\n对于状态-动作-下一状态三元组，预期奖励由下式给出，\n\n$$r(d,\
    \ e, d') = \\mathbb{E}[C_{t+1} | D_t = d, B_t = e, D_{t+1} = d'] = \\frac{\\sum_{a\
    \ \\in C} a \\ p(d', a | d, e)}{p(d' | d, e)}$$\n\n### 8.5.2 价值函数\n\n本质上，每个强化学习算法都包含评估状态-动作对，以评估智能体在给定状态下执行给定动作的能力。“多好”的观点可以定义为关于未来奖励，或者更准确地说，关于预期回报。智能体未来预期收到的回报取决于它所采取的动作。因此，价值函数是根据特定策略定义的。\n\

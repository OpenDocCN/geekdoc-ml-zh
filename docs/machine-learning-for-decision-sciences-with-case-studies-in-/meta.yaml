- md: '## 6.6.4 DUAL FORMULATION


    Lagrangian duality for a primal problem is to minimize $f(w)$ where $w$ is the
    parameter. There are two linear constraints: inequality constraints $g(w)$ and
    equality constraints $h(w)$.


    $$\min_w f(w) \quad (6.44)$$

    $$\text{s.t. } g_i(w) \leq 0, \quad i = 1, 2, ..., k$$

    $$h(w) = 0 \quad i = 1, 2, ..., l$$


    The generalized Lagrangian is given as $L(w, \alpha, \beta)$ where $\alpha, \beta$
    are Lagrange multipliers and $\alpha \geq 0$


    $$L(w, \alpha, \beta) = f(w) + \sum_{i=1}^k \alpha_i g_i(w) + \sum_{i=1}^l \beta_i
    h_i(w) \quad (6.45)$$


    Lemma:


    $$\max_{\alpha, \beta, \alpha \geq 0} L(w, \alpha, \beta) = \begin{cases} f(w)
    & \text{if } w \text{ satisfies primal constraints} \\ \infty & \text{Otherwise}
    \end{cases}$$


    The solution to the primal problem is $p^*$, and the dual problem is $d^*$.


    Theorem (Weak Duality)


    $$p^* = \min_w \max_{\alpha, \beta, \alpha \geq 0} L(w, \alpha, \beta)$$

    $$\nwarrow \searrow$$

    $$d^* = \max_{\alpha, \beta, \alpha \geq 0} \min_w L(w, \alpha, \beta)$$


    $$d^* = \max_{\alpha, \beta, \alpha \geq 0} \min_w L(w, \alpha, \beta) \leq \min_w
    \max_{\alpha, \beta, \alpha \geq 0} L(w, \alpha, \beta) = p^* \quad (6.46)$$


    Theorem (Strong Duality)


    If there exists a saddle point of $L(w, \alpha, \beta)$, we have $d^* = p^*$.
    As per the strong duality theorem, when the saddle point exists, the following
    Karush-Kuhn-Tucker (KKT) conditions are satisfied.


    $$\frac{\partial}{\partial w_i} L(w, \alpha, \beta) = 0, \quad i = 1, ..., k$$

    $$\frac{\partial}{\partial b_i} L(w, \alpha, \beta) = 0, \quad i = 1, ..., l$$

    $$\alpha_i g_i(w) = 0, \quad i = 1, ..., m$$

    $$g_i(w) \leq 0, \quad i = 1, ..., m$$

    $$\alpha_i \geq 0, \quad i = 1, ..., m$$


    The theorem states that if $w^*, \alpha^*$, and $\beta^*$ satisfy KKT conditions,
    then it is a solution to the primal and dual problems.


    $\alpha_i g_i(w) = 0$ (6.47)


    If $\alpha_i > 0$, then $g_i(w) = 0$.


    Now, let''s see how to solve the optimization problem in SVM. After applying Lagrangian,
    the quadratic programming with linear constraints is as follows.


    min $w$ and $b$ with fixed $\alpha$.


    $\frac{\partial L_p}{\partial w} = 0 \rightarrow w = \sum_{i=1}^n \alpha_i y_i
    x_i$


    $\frac{\partial L_p}{\partial b} = 0 \rightarrow \alpha_i y_i = 0$


    $L_p(w, b, \alpha) = \sum_{i=1}^m \alpha_i - \frac{1}{2} \sum_{i,j=1}^m \alpha_i
    \alpha_j y_i y_j (x_i^T x_j) - b \sum_{i=1}^m \alpha_i y_i$ (6.48)


    $L_p(w, b, \alpha) = \sum_{i=1}^m \alpha_i - \frac{1}{2} \sum_{i,j=1}^m \alpha_i
    \alpha_j y_i y_j (x_i^T x_j)$


    Now, we have the following dual problem, and this is a quadratic programming problem
    where a global maxima $\alpha_i$ can be found at all times.


    $\max_{\alpha} J(\alpha) = \sum_{i=1}^m \alpha_i - \frac{1}{2} \sum_{i,j=1}^m
    \alpha_i \alpha_j y_i y_j (x_i^T x_j)$ (6.49)


    s.t. $\alpha_i \geq 0$, $i = 1, ..., k$


    $\sum_{i=1}^m \alpha_i y_i = 0$ (6.50)


    After getting the Lagrangian multiplier $\alpha_i$, then the parameter vectors
    $w$ can be reconstructed as follows:


    $w = \sum_{i=1}^m \alpha_i y_i x_i w = \sum_{i \in SV} \alpha_i y_i x_i$ (6.51)


    ### TABLE 6.37 Two-Dimensional Data


    | x1 | x2 | y | Lagrange Multiplier α |

    |---|---|---|---|

    | 0.3858 | 0.4687 | 1 | 65.5261 |

    | 0.4871 | 0.611 | -1 | 65.5261 |

    | 0.9218 | 0.4103 | -1 | 0 |

    | 0.7382 | 0.8936 | -1 | 0 |

    | 0.1763 | 0.0579 | 1 | 0 |

    | 0.4057 | 0.3529 | 1 | 0 |

    | 0.9355 | 0.8132 | -1 | 0 |

    | 0.2146 | 0.0099 | 1 | 0 |


    At last, compute with new data z


    $$w^T z + b = \sum_{i \in SV} \alpha_i y_i (x_i^T z) + b$$


    If the resulting sum is +ve, then classify the new data z as 1, and else, if the
    sum is -ve, then z is classified as 2. The discriminant function w depends on
    the dot product of the new data z and support vector x_i.


    **Example** Consider the two-dimensional data as shown in Table 6.37, which contain
    eight instances. Let w=(w1, w2) and b denote the parameters of the decision boundary;
    using the below equation, we can solve for w1 and w2 in the following way:


    $$w_1 = \sum_i \alpha_i y_i x_{i1} = 65.5621 * 1 * 0.3858 + 65.5621 * -1 * 0.4871
    = -6.64$$

    $$w_2 = \sum_i \alpha_i y_i x_{i2} = 65.5621 * 1 * 0.4687 + 65.5621 * -1 * 0.611
    = -9.32$$


    The bias term b is computed using equation


    $$b^{(1)} = 1 - w \cdot x_1 = 1 - (-6.64)(0.3858) - (-9.32)(0.4687) = 7.9300$$

    $$b^{(2)} = -1 - w \cdot x_2 = -1 - (-6.64)(0.4871) - (-9.32)(0.611) = 7.9289$$

    $$\text{Bias } b = \frac{b^{(1)} + b^{(2)}}{2} = 7.93$$


    The decision boundary corresponding to these parameters is shown in Figure 6.98.
    Once the decision boundary is found, a test instance z is classified as


    $$f(z) = \text{sign} (w.z + b) = \text{sign} \left( \sum_{i=1}^N \alpha_i y_i
    x_i.z + b \right)$$


    If f(z) = 1, then the test instance is classified as a positive class; otherwise,
    it is classified as negative class.


    ## 6.6.5 THE KERNEL TRICK


    To explore the kernel trick mechanism, we must understand the math behind linearly
    separable and nonlinearly separable. Consider a binary classification problem
    with class labels 0 and 1. A linearly separable case is the one in which a single
    line separates the two classes, whereas nonlinearly separable case is the one
    in which more than one line is required to separate the two classes. Logic functions
    such as AND function and OR function are linearly separable, while XOR function
    is nonlinearly separable, as shown in Figures 6.99 and 6.100. Solved examples
    to understand the concept are illustrated in Section 6.6.10 of this chapter.


    ## 6.6.6 POLYNOMIAL KERNEL


    The notion of the kernel function in SVM is given in Equation 6.53.


    $$g(x) = w^T \emptyset(x) + b = \sum_{i \in SV} \alpha_i \emptyset(x_j)^T \emptyset(x)
    + b$$


    A kernel function is the dot product of two feature vectors in feature space in
    Equation 6.54.


    $$k(x_a, x_b) = \emptyset(x_a) \cdot \emptyset(x_b)$$


    The idea of the kernel function is to replace the dot product with the kernel
    function. To prove this, we can solve an example given two-dimensional vectors
    $\vec{x} = [x_1, x_2]$ where $x_1$ and $x_2$ are the two attributes of the vector.
    Let $k(x_i, x_j) = (1 + x_i \cdot x_j)^2$; we need to show $k(x_i, x_j) = \emptyset(x_i)
    \cdot \emptyset(x_j)$


    $$k(x_i, x_j) = (1 + x_i \cdot x_j)^2$$


    where $x_{i1}$ and $x_{i2}$ are the two attributes of $x_i$ and $x_{j1}$ and $x_{j2}$
    are the two attributes of $x_j$.


    $k(x_i, x_j) = 1 + x_{i1}^2 x_{j1}^2 + 2x_{i1}x_{j1}x_{i2}x_{j2} + x_{i2}^2 x_{j2}^2
    + 2x_{i1}x_{j1} + 2x_{i2}x_{j2}$


    can be rewritten as


    $k(x_i, x_j) = [1 \ x_{i1}^2 \ \sqrt{2}x_{i1}x_{i2} \ x_{i2}^2 \ \sqrt{2}x_{i1}
    \ \sqrt{2}x_{i2}] \cdot [1 \ x_{j1}^2 \ \sqrt{2}x_{j1}x_{j2} \ x_{j2}^2 \ \sqrt{2}x_{j1}
    \ \sqrt{2}x_{j2}]$

    $= \emptyset(x_i) \cdot \emptyset(x_j)$


    where $\emptyset(x) = [1 \ x_1^2 \ \sqrt{2}x_1x_2 \ x_2^2 \ \sqrt{2}x_1 \ \sqrt{2}x_2]$.
    Thus, the solution of the determinant function is given as


    $g(x) = \sum_{i \in SV} \alpha_i k(x_i, x_j) + b$


    Commonly used kernel functions are the linear kernel, polynomial kernel, and Gaussian
    kernel.


    Linear kernel is given in Equation 6.24.


    $K(x_i, x_j) = x_i \cdot x_j$


    A non-stationary kernel is also called the polynomial kernel. It is well applicable
    for the problems where all the training data are normalized. Polynomial of power
    $p$ is given in Equation 6.25.


    $K(x_i, x_j) = (1 + x_i \cdot x_j)^p$


    where $p$ is the polynomial power.


    The polynomial kernel is a nonlinear kernel that should satisfy Mercer''s theorem.


    ### 6.6.6.1 Mercer''s Theorem


    A kernel function can be expressed as


    $k(x_i, x_j) = \emptyset(x_i) \cdot \emptyset(x_j)$


    If and only if for any function $g(x)$ such that $\int g(x)^2 dx$ is finite, then


    $\int k(x, y) g(x) g(y) dx dy \geq 0$


    ### 6.6.6.2 Radial Basis Function (RBF) Kernel


    The most common kernel function is the RBF or Gaussian similarity kernel shown
    in Figure 6.101. This kernel results in high values near the point x, and the
    parameter $\sigma = 1$ is used to control over- and underfitting. The equation
    for the RBF kernel is given in Equation 6.27.


    $K(x_i, x_j) = e^{-\frac{\|x_i - x_j\|^2}{2\sigma^2}}$'

    在此阶段，我们将评估工作的效益，并建立一个试点，以便在将工作扩展到更大的企业或消费者生态系统之前，以受控的方式启动工作。我们在第4步的沙箱中对模型进行了评分，大多数分析方法在第6阶段首次在生产环境中实施新的分析方法或模型。因此，我们主张从小规模试点部署开始，而不是大规模部署。这种方法将使我们能够将风险限制在相对于全企业部署的范围内，在小规模上了解性能和相关约束，并在全面部署前进行微调。


    在规划此工作时，考虑在生产环境中为一组离散的单一产品或单一业务线运行模型，这将在实际环境中测试模型。这将使团队能够从部署中学习，并在全面启动前进行调整。请记住，此阶段可能会引入一组新的团队成员，即负责生产环境的成员，他们有一套新的问题和关注点。生产支持团队和管理员希望确保模型能够融入下游流程，并在生产环境中运行良好。在生产环境中运行模型时，要注意在将输入数据馈送给模型之前检查其不规则性。评估运行时间以及与制造环境中其他流程的资源竞争。


    模型部署后，项目团队会在其投入生产一段时间后进行后续跟进，重新评估模型。评估模型是否达到目标和期望，以及期望的变化（如收入增加、客户流失减少）是否发生。如果这些最终结果没有发生，确定是由于模型不准确，还是其预测没有得到适当执行。如果需要，自动执行模型的重新训练/更新。无论如何，我们需要持续监控模型准确性，如果准确性下降，我们将需要重新训练模型。如果可能，为模型“越界”运行时设计警报。这包括输入远超出模型训练范围的情况，这可能导致模型输出不准确。如果这种情况经常发生，则需要重新训练。


    分析项目通常会产生关于业务、问题或概念的新见解，而这些可能是人们以前认为理所当然或认为不可能深入挖掘的。如果合适，与您的分析团队举行事后分析会，讨论如果必须重做，我们会改变哪些流程或项目。


    向不同群体展示结果是一项艰巨的任务。然而，由于每个群体都需要一组独特的数据，以下是为向主要赞助方分享分析结果而准备的一些通用原则。


    面向业务受众：受众越偏向业务，我们就必须越简洁。大多数执行赞助方每天和每周都会收到大量简报。因此，确保演示文稿能快速切入要点，并将结果框架设定为对赞助方组织的价值。例如，如果我们正在与一家银行合作分析信用卡欺诈案例，请强调欺诈的频率、过去一个月或一年的案件数量，以及对银行造成的成本或收入影响（或者主要关注相反的方面，如果他们解决欺诈问题可能获得多少额外收入）。这将比深入探讨方法论更好地展示业务影响。我们需要包含关于分析方法和数据来源的支持信息。不过，通常我们倾向于仅将数据分析作为支持细节，或确保受众对该方法有信心。


    面向分析师受众：如果您向其他分析师做演示，请花更多时间在流程和结果上。如果我们建立了一种全新的数据处理或评估方法，该方法将来可以重用或应用于类似问题，同事们会对这些技术更感兴趣。尽可能使用照片和截图。人们倾向于在一定程度上通过回忆心理图像来理解冗长的要点列表。


    ## 总结


    市场上有许多数据分析生命周期框架；它们往往在相同的基本结构上变化不大。遵循这些阶段和活动将减轻实施ML项目时已知的陷阱。然而，用户需要注意各阶段之间的迭代性质。如果没有在前一阶段打下坚实的基础，下一阶段的活动将受到影响。因此，我们如何强调数据分析生命周期中数据发现和数据预处理阶段的重要性都不为过。Gartner
    Inc.最近对数据科学家的一项调查显示，他们超过80%的时间花在捕获、清理和组织数据上。剩下的不到20%的时间用于创建和优化ML模型。超过75%的人还报告说，准备数据是他们过程中最不愉快的部分。表3.6显示了数据分析项目中每项活动消耗的时间分布。



    # 2.4.1 Python Operators


    Operators manipulate the value of operands, and it performs operations on variables
    and values. In addition, it carries out all the arithmetic and logic operations.

    Example: Consider the expression, 3+ 4= 7, where 3 and 4 are operands and +is
    the operator.

    A variety of operations are supported by Python, namely arithmetic, comparison,
    assignment, and logical operations. A detailed discussion of these operations
    is presented in this section with relevant Python examples.


    # 2.4.1.1 Arithmetic Operators


    Arithmetic operators perform all the arithmetic operations like addition, subtraction,
    multiplication, and division. Table 2.1 shows a list of all arithmetic operations
    supported by Python.


    # 2.4.1.2 Comparison Operators


    Comparison operators compare the variables and identify the relationship between
    them; it returns either True or False. Table 2.2 presents the comparison operators
    supported by Python.


    # 2.4.1.3 Assignment Operators


    Similar to other programming languages, a group of Python operators assign values
    to the variable, as shown in Table 2.3.


    # 2.4.1.4 Logical Operators


    Logical operators are used in Python to combine conditional statements. The list
    of Python logical operators is shown in Table 2.4.


    TABLE 2.1

    Arithmetic Operators in Python


    | Operator | Details | Example | Syntax |

    | :--- | :--- | :--- | :--- |

    | + | Add two operands | X + Y | X = 3; Y = 2; print(X + Y) |

    | - | Sub two operands | X - Y | X = 3; Y = 2; print(X - Y) |

    | * | Multiply two operands | X * Y | X = 3; Y = 2; print(X * Y) |

    | / | Divide two operands | X / Y | X = 2; Y = 2; print(X / Y) |

    | % | Divides left hand operand with right hand operand and returns remainder
    | X % Y | X = 2; Y = 2; print(X % Y) |

    | ** | Exponent calculates power | X ** Y | X = 2; Y = 2; print(X ** Y) |

    | // | Floor division | X // Y | X = 2; Y = 2; print(X // Y) |


    TABLE 2.2

    Comparison Operators in Python


    | Operator | Details | Example |

    | :--- | :--- | :--- |

    | == | Values of two operands are equal; it returns True | X == Y |

    | != | The values of two operands are not equal; it returns True | X != Y |

    | <> | The values of two operands are not equal; it returns True same like (!
    =) | X <> Y |

    | > | Greater than | X > Y |

    | < | Less than | X < Y |

    | >= | Greater than or equal to | X >= Y |

    | <= | Less than or equal to | X <= Y |'

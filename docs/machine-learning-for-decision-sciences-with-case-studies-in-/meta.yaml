    # 5.3 TYPES OF SUPERVISED LEARNING


    Supervised techniques train the model using labeled data. The training process
    should continue until the level of performance is high enough. After training,
    the system should predict new unseen data correctly, as shown in Figure 5.2.


    There are two types of supervised learning techniques: regression and classification.
    Classification separates the data, whereas regression fits the data.


    # 5.3.1 SUPERVISED LEARNING – CLASSIFICATION


    Classification is the process of categorizing the given input data into different
    classes. The output of the classification problem is a discrete or categorical
    value such as positive or negative, spam or not spam. Classifying the tumor as
    malignant or benign and classifying whether the account of a person is hacked
    or not are few examples of classification problems. Classification can be either
    binary or multi-class classification. Logistic regression is the best example
    for binary classification. Multi-class classification is a problem with more than
    two output classes; for example, alphabet character recognition is a multi-class
    classification problem. The various classification techniques are decision tree,
    logistic regression, random forest, gradient boosted tree, SVM, and naïve Bayes
    algorithm.


    Which of the following is/are classification problem(s)?


    +   - Predicting the sales of a newly introduced SUV over the next 6 months.

    - Predicting whether a customer account is hacked or not.


    Solution: Predicting the sale of car output is a continuous value and therefore
    it is not a classification problem. Predicting whether an account is hacked or
    not is a classification problem where the output value is categorical.'

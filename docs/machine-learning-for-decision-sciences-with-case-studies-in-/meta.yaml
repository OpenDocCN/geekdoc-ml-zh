    # 6.5 RANDOM FOREST CLASSIFIER


    ML algorithms are classified into supervised learning, unsupervised learning,
    and reinforced learning. Supervised learning is divided into classification and
    regression problems. The decision tree belongs to supervised learning. The decision
    tree is a popular ML algorithm. It''s a tree-like structure used for classification
    and regression problems. The decision tree is a tree-shaped diagram used to determine
    a course of action. Each branch of the tree represents the possible action. Entropy
    (i.e., the measure of randomness or unpredictability in the dataset) and information
    gain (i.e., a measure of the decrease in entropy after the dataset is split) are
    used to construct the decision tree. The testing is done on the decision node,
    and it has two or more branches, and the leaf node carries classification or decision.
    It''s used in the classification and regression problem. The trees are constructed
    only with the relevant features. So to improve the accuracy, the tree has to construct
    in deep to learn a highly irregular pattern. So it leads to an overfitting problem
    (i.e., low bias and high variance). This overfitting problem can be solved by
    using random forest (RF).


    The RF is a classification algorithm that consists of many decision trees. Each
    tree in the RF will predict the class. The class having majority voting is selected
    as the predicted class of the RF model. RF is an ensemble classifier first proposed
    by Tin Kam Ho of Bell Labs in 1995. It belongs to the classifier of the ensemble
    because it uses several ML algorithms for classification. If the number of trees
    is more, then the accuracy of the RF model is high.


    RF is a method that operates by constructing multiple decision trees during the
    training phase. The main advantage of the RF tree is that it has less training
    due to multiple trees. Since we are training a large data, the system''s accuracy
    is very high in RF. The RF chooses the decision of the majority tree, which is
    the final decision. RF is based on the bagging concept.


    The difference between RF and decision tree is the process of finding the root
    node and splitting features nodes that are done randomly in RF. The rules are
    formed by using information gain and the Gini index.


    The sample RF with a decision tree is shown in Figure 6.63. The two decision trees
    classify the input parameter as α, and one classifies the input parameter as β.
    Since α has majority voting, the input parameters are classified into class α.
    RF is used in ETM devices, object detection, and game because it has high accuracy
    and less training time.


    The RF works on the concept of **bagging**. In bagging, the given training data
    are split into small training datasets by using the sampling method. For example,
    in Figure 6.64, the training data are


    ![](img/7fbca4852dbe91c6cea209148871a1b3_301_0.png)


    FIGURE 6.63 Voting mechanism in RF.'

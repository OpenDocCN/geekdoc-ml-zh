    # 6.4.6.3.1 Prepruning


    It is the process of pruning the decision tree on growing. Tree growth is stopped
    for negative gain or low positive benefit value. It is used to stop overfitting
    at an earlier stage.

    Considering Figure 6.18, the root node is divided based on an attribute A. Calculate
    the gain of the decision tree at S1 and S2. The decision tree will be stopped
    at S1 and S2 for the low or negative value of gain, as shown in Figure 6.18.


    # 6.4.6.3.2 Postpruning


    Postpruning is also called backward pruning (Figure 6.19). First, a complete decision
    tree is constructed fully. Then, the accuracy of the tree is improved by removing
    the least significant branches. In postpruning, a decision tree is grown fully
    first. Several heuristics are used to delete subnodes. The error is measured on
    the whole tree (i.e., error (T)) and at point ST1 (i.e., error (st1)). If the
    error at ST1 is small than error T, then we can remove the subtree. The pruning
    can be done by using reduced error pruning, minimum error pruning, and cost-based
    pruning. The reduced error pruning is the simplest pruning algorithm.

    In this method, the error is measured on the whole tree (i.e., error (T)) and
    at point ST1 (i.e., error (st1)). If the error at ST1 is small than error T, then
    we can remove the subtree. In the minimum error pruning, the error rate is calculated
    at each non-leaf node by pruning subtree and without pruning subtree. If the error
    rate of the subtree with pruning is high, then keep that subnode. In cost-based
    pruning, the error and cost are also considered for pruning the data.



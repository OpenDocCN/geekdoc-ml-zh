    Due to the huge volume of data, a strong bandwidth with good network connections
    must be ensured to handle the data so that quick transformations and extractions
    from datasets can be done at ease. Now, the data analyst has a choice to make
    between ELT and ETL. In this context, ELT is preferred over ETL since this is
    a typical data approach problem. In the analytic sandbox approach with ELT, data
    are extracted, loaded, and then transformed. Here, the raw data are extracted
    and loaded into the analytics sandbox, and then the data transformation happens.
    This approach is followed to maintain and preserve the raw data as part of the
    other data in the sandbox before being subjected to any transformations. Some
    of the key differences between the ELT and ETL approaches are listed in Table
    3.2. The data analyst makes a choice based on the data needs.


    For example, let us consider an analysis for fraud detection on credit card usage.
    Frequently, the outliers in this data population can represent higher-risk transactions
    that may be flag fraudulent credit card activity. Using ETL, these outliers could
    be unintentionally filtered out or transformed and cleaned before being loaded
    into the database. This might cause bias in the data. Due to this, the extraction
    load and then transform method (ELT) is encouraged to have the data in its raw
    state and the ability to transform it after loading in the staging or operational
    data store ODS area. This approach will give us clean data to analyze that is
    available in the database and also, the data in its original form for finding
    hidden features in the data.


    The Hadoop, Alpine Miner, and SAS are some of the tools we can use to inject the
    data into analytics sandbox. Hadoop can perform parallel ingest and custom analysis
    for parsing web traffic, GPS location analytics, proteomic analysis, sensor data
    collection, genomic analysis, and combining massive unstructured data feeds from
    multiple sources. Alpine Miner provides a user-friendly graphical interface for
    creating analytic workflows, including data manipulations and a series of analytic
    events such as staged data mining techniques (e.g., select top 100 customers,
    then run descriptive statistics and clustering) on Postgre SQL and other big data
    sources. We can use Python libraries to bring data from various sources. For example,
    using the Python Pandas library, we can ingest data from various sources.


    ```

    #Load the libraries

    import pandas as pd

    ```


    TABLE 3.2

    Comparison of ELT and ETL Approaches


    | Extract, Transform, and Load | Extract, Load, and Transform |

    | :--- | :--- |

    | Used for compute-intensive transformations and a small amount of data | Preferred
    and used for high amounts of data |

    | Transformations are done at the staging/ETL server area | Transformations are
    performed in the target system (e.g., analytics sandbox) |

    | No data duplication; if we need to perform another transformation, we need to
    load it again | Data duplication; copy of the raw data available for further transformation
    and use |

    | Data are first loaded into the staging layer and later pushed into the target
    system. Time-intensive | Data loaded into target system directly only once. So
    faster |

    | High maintenance since we need to select data to load and transform | Low maintenance
    as data are already available in the target system |

    | Implementation complexity is low comparatively | ELT process requires the user
    to have deep knowledge of tools and expert skills |

    | Supports only structured data; no support for data lakes | Allows use of data
    lakes (analytics sandbox) with unstructured data |'

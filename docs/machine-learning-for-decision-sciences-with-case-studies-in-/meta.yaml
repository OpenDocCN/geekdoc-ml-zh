    $$\sum_{j=1}^{k} \sum_{i=1}^{n} \|x_i^j - c_j\|^2 \quad (4.7)$$


    In simple words, the objective function should be minimized over the samples of
    the cluster.


    Criterion 2: A point $x_i^j$ must be assigned to the cluster whose centroid $c^*(x)$
    is the closest toc $^*(x) = \arg \min_k \|x_i^j - c_j\|^2$. In simple words, the
    objective function should be minimized over the samples of $x$.


    # 4.5.2 THE ALGORITHM


    The steps of the k-means clustering algorithm are explained as follows:


    +   Step 1: Determine the value of $k$ and place the $k$ centroids in the data
    space consisting of the dataset to be clustering. These $k$ points represent the
    initial group of centroids.

    Step 2: Once the centroids are fixed, assign each object in the dataset to the
    cluster with the closest centroid.

    Step 3: Verify if all objects of the dataset have been assigned. Then, recompute
    the positions of the $k$ centroids.

    Step 4: Repeat steps 2 and 3 until there is no change in the new centroids and
    the previous centroids. Now we get a set of clusters with objects grouped. Next,
    evaluate the objective function based on the equation.


    # 4.5.3 CHOOSING k


    While finding the solution to a given dataset using the k-means algorithm, there
    always raises how to fix the value of initial $k$ centroids. Based on research
    experiments on various datasets, there are several approaches to find the optimal
    value of $k$. The optimal value of $k$ is required for proper convergence of the
    algorithm. The following are the various approaches to choose the value of $k$:


    **Elbow method**

    The elbow method is one of the common and popular approaches used in the k-means
    clustering algorithm to find the optimal value of $k$. First, for each $k$ value,
    we will initialize k-means and identify the sum of squared distances of samples
    to the nearest cluster center. Then, a graph is plotted between various values
    of $k$ and the sum of squared distances. Finally, a point on the graph corresponding
    to $k$ is identified, beyond which the sum of squared distances starts declining.
    This point is known as the elbow point, and the $k$ value is chosen as the optimal
    value of $k$.


    **Silhouette method**

    The silhouette method is a better approach to determine the number of clusters
    to be formulated from the dataset. We assume that the data has already been clustered
    into $k$ clusters by k-means clustering. With the available information on the
    clusters, the silhouette coefficient $s(i)$ is given according to Equation 4.8:


    $$s(i) = \frac{x(i) - y(i)}{\max(x(i), y(i))} \quad (4.8)$$'

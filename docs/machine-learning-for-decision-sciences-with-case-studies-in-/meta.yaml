    # 7.3.3 TERMINOLOGIES


    # 7.3.3.1 Definition of Factor


    A factor is a subtle variable that describes the correlation between the number
    of variables observed. The maximum number of factors is equal to the number of
    variables detected. Everything explains a certain variation in the visual variability.
    Factors with very low variability have been reduced. Factors are also known as
    hidden or latent variables or hypothetical variables.


    # 7.3.3.2 Factor Loading


    The loading factor is a matrix that demonstrates the relationship of each variation
    to an underlying factor. It expresses the coefficient correlation for the observed
    variable and the factor. It shows the defined differences in the observed variables.


    # 7.3.3.3 Eigenvalues


    Eigenvalues represent diversity defining each item from a complete diversity.
    It is also known as the root of the feature.


    # 7.3.3.4 Communalities


    Communalities are the sum of double the loading of each variable. Represents common
    variations. It goes from 0 to 1, and the value around 1 represents the most varied.


    $\hat{h}_i^2 = \sum_{k=1}^n \hat{l}_{ik}^2$


    # 7.3.3.5 Factor Rotation


    Rotation is a better translation tool for FA. Rotation can be orthogonal or oblique.
    It also distributed the standard with a clear loading pattern.


    # 7.3.3.6 Selecting the Number of Factors


    The Kaiser method is the analytical method based on the most important part of
    the variance defined by the factor to be selected. The eigenvalue is a good way
    to determine the number of factors. Mostly, eigenvalue larger than 1 will be considered
    as optional factors. The graphic method represents certain eigenvalue factors,
    also called scree plots, as shown in Figure 7.2. This scree structure helps us
    determine the number of factors in which a curve forms an elbow.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_378_0.png)


    FIGURE 7.2 Scree plot.'

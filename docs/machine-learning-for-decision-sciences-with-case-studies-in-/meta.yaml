    To understand the math behind linear regression, let’s see a simple example. Given
    a set of $n$ data, samples can be represented as $D = \{D_1, D_2, \dots, D_n\}$
    as shown in Figure 5.7. The single data point is represented as $D_i = \langle
    x_i, y_i \rangle$, where $x_i = (x_{i,1}, x_{i,2}, \dots, x_{i,d})$ is an input
    vector of size $d$ and $y_i$ is the desired output. And the idea is to find the
    best linear relationship function $x_i \sim f(x_i)$ such that $y_i \sim f(x_i)$
    for all $i=1,2,\dots,n$.


    The regression problem is defined as given a sample instance $x$ and $y$ we have
    to learn a function such that


    $fn : x \rightarrow y$


    $f(x) = w_0 + w_1x_1 + w_2x_2 + \dots + w_dx_d = w_0 + \sum_{i=1}^{d} w_ix_i$
    (5.2)


    where $w_0, w_1, \dots, w_d$ are the weight parameters.


    Definition of linear regression: Given a training dataset comprising $N$ observations
    $\{x_n\}$ where $n=1, 2, \dots, N$ and their corresponding target values are $\{t_n\}$.
    The goal is to predict the value of $t$ for a new value of $x$.


    # 5.4.1 Types of Linear Regression


    The variants of linear regression are simple and multiple linear regressions further
    classified as linear and non-linear, as shown in Figure 5.8. For simple regression,
    the input or independent variable is one, whereas for multiple regression, it
    is two or more.'

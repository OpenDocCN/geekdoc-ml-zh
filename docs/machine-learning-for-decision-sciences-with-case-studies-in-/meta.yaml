    # 5.4.2 GEOMETRIC INTUITION


    Given an input $x$, the goal is to compute an output $y$. The linear function
    can be the optimal line function where the line can be characterized by a slope
    and intercept with $x$- or $y$-axis, as represented in Figure 5.14.


    Let us consider these blue points as input data points, and we want to fit a linear
    function. For example, predict height $y$ from given age $x$. Similarly, predict
    the house price value from the given house area.


    Figure 5.15 shows the parameters, and the population line is the actual line,
    and it is given as Equation 5.5:


    $y = \beta_0 + \beta_1x + \epsilon$ (5.5)


    where $y$ is the linear dependent function, $\beta_0$ is the population $y$-intercept,
    $\beta_1$ is the population slope, and $\epsilon$ is the random error. The mean
    and the variance of the distribution are as follows:


    $E(y|x) = \beta_0 + \beta_1x$ (5.6)


    $var(y|x) = var(\beta_0 + \beta_1x + \epsilon) = \sigma^2$ (5.7)'

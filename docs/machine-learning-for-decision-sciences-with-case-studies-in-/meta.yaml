  md: '# 7.3 FACTOR ANALYSIS


    Factor analysis (FA) is a method of analyzing experimental data to search for
    potential influential factors or hidden variables from a set of notable variables.
    It helps in translating data by reducing the amount of flexibility. It subtracts
    a complete standard variation across all variables and sets the same points.


    FA is widely used in market research, marketing, psychology, finance, and performance
    research. For example, market analysts utilize FA to identify price-sensitive
    customers, identify product features that influence consumer preferences, and
    help to understand the selection channels for distribution channels. FA is a straightforward
    mathematical model. It is used to describe the differences between visual variables
    and obscure a set of invisible variables called factors. Visual differences are
    followed as a direct combination of features and error words. Factor or latent
    variable is associated with multiple visual variables, which have common response
    patterns. Each feature describes a certain amount of variability in observed variables.
    It helps in translating data by reducing the amount of flexibility.


    $X_i = \beta_{i0} + \beta_{i1}F_1 + \beta_{i2}F_2 + (1)e_i$


    FA is a way of investigating whether several variables of interest, $X_1, X_2,
    \dots, X_k$, are equally related to a small number of intangible factors $F_1,
    F_2, \dots, F_k$.


    **Assumptions:**


    +   1. Outliers are not present in the data.

    2. The sample size must be larger than the factor.

    3. There must be no perfect multicollinearity.

    4. There must be no rigidity among the variables.


    # 7.3.1 TYPES OF FACTOR ANALYSIS


    +   - Exploratory Factor Analysis: It is the most popular way of analyzing factors
    for social researchers and administrators. Its basic assumption is that any apparent
    flexibility is directly related to any factor.

    - Confirmatory Factor Analysis (CFA): Its basic assumption is that each item is
    associated with a specific set of observed variables. CFA confirms basic expectations.


    # 7.3.2 WORKING OF FACTOR ANALYSIS


    The primary purpose of FA is to reduce the number of observations and detect invisible
    variables. These tangible variables help the market researcher to complete the
    research. This recognizable variation of the observed variables can be achieved
    in two steps:


    +   - **Factor extraction:** In this step, the number of factors and the removal
    methods is chosen using variance partitioning methods like principal component
    analysis (PCA) and common factor analysis.

    - **Factor rotation:** In this step, rotation attempts to convert factors into
    unrelated factors. The main purpose of this step is to improve the overall interpretation.
    Many rotation methods are available: Varimax rotation method, Quartimax rotation
    method, and Promax rotation method.'

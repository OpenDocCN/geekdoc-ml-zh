    FIGURE 6.123 Applications of SVM.


    # 6.6.12 Real-World Applications


    SVM has been used in many real-world applications such as image classification,
    handwritten OCR, bioinformatics, and text categorization (Figure 6.123). In addition,
    the bioinformatics field has been used for cancer diagnosis based on gene expression
    of data and protein secondary structure prediction. The advantages of SVM are
    that sparseness of solution to problems and overfitting can be controlled by using
    a soft margin approach make it used in a wide range of applications.


    # 6.6.12.1 Classification of Cognitive Impairment


    Alzheimer’s disease (AD) is a degenerative brain disease and the most common cause
    of dementia. The symptoms of dementia include memory loss and difficulties with
    thinking, problem-solving, or language, which seriously affect a patient’s daily
    life. Mild cognitive impairment (MCI) is an early stage of AD characterized by
    significant cognitive impairment in the absence of dementia. In the United States,
    there were more than 5.2 million people with AD in 2014, and it is estimated that
    13.8 million Americans have AD by 2050. Thus, precise prediction and diagnosis
    of AD, especially at its early warning stage such as MCI, have become a crucial
    step to delay or even avoid dementia.


    Commonly used modalities include magnetic resonance imaging (MRI), functional
    magnetic resonance imaging (fMRI), and positron emission tomography (PET). Owing
    to its easy access in clinical settings, MRI receives the most attention of researchers
    compared with other modalities. The structural changes in the brain associated
    with AD can be noninvasively assessed using MRI.


    Early detection of AD at the early stage is of great importance in terms of patient
    management. Some of the earliest symptoms of AD, such as short-term memory loss,
    are often mistaken as related to aging and stress; it remains challenging to predict
    the disease in an early stage. The Alzheimer’s Disease Neuroimaging Initiative
    (ADNI) dataset is used for evaluation. The design of the system is given in Figure
    6.124.'

    tools like SharePoint. Error logging tools like Jira. |


    For the successful implementation of the project, there are many roles involved.
    Table 3.7 presents the roles and responsibilities of the team members.


    Finally, the “analyst wish list” refers to suggestions for tools, data access,
    and working conditions that will ensure that employees are productive on the project
    and boost your chances of a good outcome. These requirements reflect the need
    for more adaptable ecosystems for storing data and performing complex, iterative
    analysis. In addition to the technical requirements outlined above, the project
    would benefit from quick access to key stakeholders and domain experts. Table
    3.8 illustrates a few examples of the “analyst wish list.”


    ## REVIEW QUESTIONS


    1.  Explain the importance of the Data Analytics Life Cycle framework.

    2.  Describe the phases of the analytical life cycle and how these phases interact
    with other phases.

    3.  Describe various techniques used for data pre-processing.


    # Ranking is a canonical problem for humans. It is easy to classify whether a
    review is useful (informative) or not. However, ranking reviews based on usefulness
    is a complex task. Our ranking methodology is based on this simple education.

    #Pairwise ranking approach is applied to rank reviews in the semi-supervised learning
    method. The pairwise ranking approach looks at a pair of documents in a loss function
    and predicts a relative ordering. The objective is not to determine the relevance
    score but to find which document is more relevant. This relevance is developed
    to judge the preference of one review over another.

    #In this semi-supervised learning method, mapping is constructed between input
    and output. This input-output pair in the training model is used to learn the
    system.


    #Review Segregation: We segregated two sets of reviews on which we train our model.


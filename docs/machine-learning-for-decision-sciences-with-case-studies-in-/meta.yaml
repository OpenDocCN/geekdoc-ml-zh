    ## Example 6.7: The Toy Industry


    ABC toys Pvt. Ltd is considering the addition of a new toy to its existing product
    line. Three alternative courses of action are available.


    - a. Work overtime to meet the demand for the new toy. Overtime expenses are estimated
    at Rs. 20,000 per month.

    - b. Install new equipment for which fixed expenses per month are expected at
    Rs.80,000.

    - c. Lease (rent) a machine at the rate of Rs. 35,000 per month.


    Variable costs associated with the above three alternatives are Rs. 9, Rs. 7,
    and Rs. 8 per toy. The price per unit of the toy, which is independent of the
    manufacturing alternative, is fixed at Rs. 15. The expected demand for the toys
    is given below.


    - 10,000 pieces with a probability of 0.5

    - 20,000 pieces with a probability of 0.3

    - 50,000 pieces with a probability of 0.2


    Which alternatives should the company adapt to manufacture the toy?


    ### GIVEN DATA


    ABC toys had decided to add a new product. They have three alternate courses.


    - 1. If workers work overtime, they are paid Rs. 20,000 per month with a variable
    cost of Rs. 9 per toy

    - 2. If new equipment is installed, they have to pay 80,000 per month Rs. 7 per
    toy

    - 3. Lease the machine at the rate of 35,000 per month Rs. 8 per toy


    The sales price of toys=Rs. 15


    ### EXPECTED DEMAND


    - 10,000 pieces with a probability of 0.5

    - 20,000 pieces with a probability of 0.3

    - 50,000 pieces with a probability of 0.2


    There are three alternatives from a decision node as represented in Figure 6.32.
    Each alternative node has three demands, as shown in Table 6.16.


    ```

    Profit = 10,000 × 15 – 10,000 × 9 – 20,000 = 15,0000 – 90,000 – 20,000

    = 60,000 – 20,000 = 40,000

    ```



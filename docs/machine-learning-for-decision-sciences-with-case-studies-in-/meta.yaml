    ## 6.4.3 SAMPLE DECISION TREE


    Let us consider a simple example of creating a decision tree for crediting a loan,
    as shown in Figure 6.11. First, the data are spitted into two parts based on the
    employment status at the root node (i.e., employed or not employed).


    **Decision tree classification for unemployed:** The decision tree goes to node
    A if the applicant is not employed. Again, the data are divided based on the credit
    score (i.e., high or low). The loans are approved for the applicant having a high
    credit score.


    **Decision tree classification for unemployed:** The decision tree goes to node
    B if the applicant is employed. Again, the data are divided based on the income
    (i.e., high or low). The loans are approved for the applicant having a high income.


    ## 6.4.4 DECISION TREE FORMATION


    Let us consider a dataset having four attributes, namely A1, A2, A3, and A4. Let
    us assume that the decision tree is started with attribute A1 (i.e., root node).
    The data are divided into two parts at the root node based on attribute A1. Data
    d1 represent the data satisfying the attribute A1. Data d2 represent the data
    that are not satisfying attribute A1, as shown in Figure 6.12.


    **Data d1:** All the data in d1 belong to the same class. So it becomes a leaf
    node.

    **Data d2:** The data d2 belong to a different class. So the data are divided
    further based on the attribute A3. d3 represent the data satisfying the condition
    A3. d4 represent the data that are not satisfying condition A3.


    **Data d3:** The data d3 belong to a different class. So the data are divided
    further based on the attribute A4. d5 represent the data satisfying attribute
    A4, and d6 represent the data that are not satisfying the condition A4.

    **Data d5, d6, and d3:** The data in d5, d6, and d3 belong to the same class.
    So these data belong to a leaf node.


    ## 6.4.5 ALGORITHMS USED FOR DECISION TREES


    The dataset having many attributes (i.e., bank loans are given based on the attributes
    like employment status and salary) for root nodes are calculated from the following
    algorithm:


    1. CART 4.5

    2. ID3

    3. C 4.5


    In the ID3 algorithm, the information gain is used for the selection of root attributes.
    The information gain is calculated for each attribute, and the attributes having
    high information gain are selected as the root node. In C 4.5 algorithm, the gain
    information is used for the calculation of root attributes. The attributes having
    maximum gain ratio are selected as the root node. The CART 4.5 algorithm uses
    the Gini index to identify the attributes for the root node. The attribute having
    a low Gini index is selected as the root node.


    | S.No. | Algorithm | Parameter | Maximum/Minimum |

    |---|---|---|---|

    | 1 | ID3 algorithm | Information gain | Maximum |

    | 2 | C 4.5 | Gain index | Maximum |

    | 3 | CART | Gini index | Minimum |


    ### 6.4.5.1 ID3 Algorithm


    If the decision tree has multiple attributes, then root node attributes can be
    selected using entropy and information gain.

    **Entropy:** Entropy is a measure of disorder. Entropy is small for the sample
    with only positive or negative values. It is high for the half-positive or half-negative
    value of the sample. Entropy is defined as the average optimal number of bits
    to encode information about certainty and uncertainty about Sample S.

    **Information gain:** Gain is a measure of uncertainty reduction. The sample having
    different classes has less information gain. Information gain is expressed in
    entropy.

    Let S be the sample of training examples, $p+$ be the number of positive samples,
    and $p-$ be the number of negative samples. Then, sample entropy is shown in Figure
    6.13.


    $$Entropy(S) = p_+ (-\log_2 p_+) + p_- (-\log_2 p_-)$$

    $$= - p_+ (\log_2 p_+) - p_-$$


    Information gain of samples concerning attribute a is given as


    $$Gain(S, A) = Entropy(s) - \sum \frac{S_v}{S} entropy(s_v)$$


    ### 6.4.5.2 C 4.5 Algorithm


    C 4.5 algorithm is used to generate decision tree, and it''s developed by Ross
    Quinlan. It is an extension of the ID3 algorithm. The decision tree developed
    by using C 4.5 is used for classifications; it is called a statistical classifier.
    The data are split by using the gain ratio. The attributes having the highest
    gain ratio are used as root nodes. The C 4.5 is similar to the ID3 algorithm,
    but additionally, normalization is applied in this algorithm.


    Gain ratio = Gain of the attribute/Splitinfo(A).


    Splitinfo(A) = $\sum_{j} \frac{D_j}{D} \log_2 \left( \frac{D_j}{D} \right)$ (6.19)


    ### 6.4.5.3 CART Algorithm


    CART represents the classification and regression tree algorithm. Breiman discovered
    this algorithm in 1984. It''s a simple binary tree where a tree has one root node
    and two child nodes. This algorithm can be used in classification and regression
    problems. The classification is done by using the Gini index. The Gini index represents
    the squared probability of each class.


    Gini index = $1 - \sum_{k=0}^{n} p^2$ (6.20)


    where $n$ represents the number of probabilities.


    ## 6.4.6 OVERFITTING AND UNDERFITTING


    Overfitting is the phenomenon in which the learning process matches exactly with
    all the training data. As a result, the model''s accuracy is high for trained
    data and low for untrained data. Overfitting (Figure 6.14) occurs in decision
    trees when the tree is designed to fit all samples in the training dataset perfectly.
    Underfitting occurs when the training model does not capture the underlying pattern.
    Underfitting (Figure 6.14) is destroying the accuracy of our model of ML.


    ### 6.4.6.1 Overfitting


    - Overfitting is a scenario in which the system is learned with the entire training
    data.

    - It results in an inaccurate prediction of the data.

    - Overfitting can be solved by using pruning (i.e., remove the decision node from
    the leaf node without reducing the accuracy).


    ### 6.4.6.2 Underfitting


    - Underfitting model is not a suitable model, and it will result in poor performance
    on training data.


    A more splitting of data will result in a larger decision tree. The larger decision
    tree has less error rate. The overfitting results in a higher error on training
    data and a low error on test data. The accuracy is high on the training data but
    less on test data, as shown in Figure 6.15. The overfitting occurs due to the
    following condition:


    - Due to noise in the data

    - Not enough data'

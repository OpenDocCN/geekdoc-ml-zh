  md: 'The sorting algorithms in data structures are bubble sort, insertion sort,
    selection sort, merge sort, shell sort, and quicksort. These algorithms can fall
    under two broad categories based on the additional memory requirement – in-place
    sorting and not-in-place sorting. When the sorting algorithm works in-place (within
    the array itself) without consuming extra space, it is called in-place sorting.
    The best example of an in-place sorting algorithm is bubble sort. On the other
    hand, certain sorting algorithms require additional space (memory) apart from
    the array size. This space is generally more than the elements being sorted. Hence,
    this group of algorithms is called not-in-place sorting, and one of the best examples
    would be the merge sort.


    # 2.4.5.10.1 Bubble Sort


    One of the simplest sorting algorithms is the bubble sort, also known as the exchange
    sort. The algorithm is based on a comparison between adjacent elements. If the
    elements are in the right order, they are left in their place and if the elements
    are in the wrong order, they are swapped (interchange their positions). The process
    is repeated until all the elements are compared and sorted. The algorithm is found
    suitable for sorting fewer data elements.


    The procedure for bubble sort is illustrated in the flowchart as shown in Figure
    2.16. Consider an array arr[] with n elements. Let i be the index pointing to
    the elements in the array. For each element in the array, a comparison is made
    between arr[i] and arr[i+1]. If arr[i] is greater than arr[i+1], then the elements
    are swapped, else kept in place. The process is repeated, and each pair of the
    array arr is compared until the whole array is completely sorted.



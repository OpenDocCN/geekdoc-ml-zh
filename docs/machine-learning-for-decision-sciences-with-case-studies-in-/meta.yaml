    # 5.4.5.2 Medical Outcome Prediction


    Linear regression plays an important role in medical analysis. For instance, smoking
    reduces the life span, and linear regression analyzes the relationship between
    these two variables. In this scenario, the relationship can be defined using the
    simple linear regression such as the following:


    $$LifeSpan = \beta_0 + \beta_1 Smoking$$


    where life span is the dependent variable and smoking is the independent variable.
    Similarly, it can also be represented using multiple linear regression form by
    adding another independent variable socioeconomic status:


    $$LifeSpan = \beta_0 + \beta_1 Smoking + \beta_1 Socioeconomicstatus$$


    For another instance, to measure the lung capacity based on the exposure of dust,
    consider the scatter plot in Figure 5.31, where the x-axis is the exposure to
    dust, and the y-axis is the measure of lung capacity (PEFR or PEAK expiratory
    flow rate).


    $$PEFR = \beta_0 + \beta_1 \cdot Exposure$$


    The regression line for this model is shown in Figure 5.32.



    # 3.2.3 PHASE 3 – MODEL PLANNING


    The next phase, ML model planning, is to understand whether a good model is available
    for the data chosen for the respective project. In this phase, the methods, model,
    approaches, and flow expected are finalized. In addition to this, the relationship
    between variables in the data, primary variables, and suitable models is explored.
    Since this phase executes just before executing the analytical model, care should
    be taken in understanding the features and choosing the model. At this phase,
    there is a need to refer to the hypotheses developed in the first phase, from
    where we get to know the data and understand the business problem. The IH helps
    in framing the analytics to be executed in the next phase and to choose the correct
    methods to meet the objectives. At this stage, there are some considerations based
    on the data listed as follows:


    +   - The type of data is a major factor that will prescribe and confine the tools
    and analytical techniques in the next phase. Different tools and approaches are
    applied based on the data chosen, whether it is textual data or transactional
    data (e.g., tumor prediction using clinical data in Hadoop – contains structured,
    semi-structured, and unstructured while forecasting weather is based on structured
    data).

    - There should be an assurance whether the analytical techniques will meet the
    business objectives and prove/disprove the working hypotheses.

    - Understand if the solution to the business problem requires a single test or
    a series of techniques for analytic workflow. Tools such as SAS Miner will help
    set up a series of steps and analyses and serve as a user-friendly interface for
    manipulating larger data sources.


    With the type of data and resources available, the review has to be performed
    to check whether smaller approaches are suitable or whether new approaches are
    required. On several occasions, ideas arise based on analogous problems solved
    in industry verticals.

    There are a few guidelines and recommendations on choosing ML and deep learning
    models based on the question we are trying to answer. The specific algorithms
    are explained in detail in the further chapters: supervised, unsupervised, and
    deep learning model chapters.

    We need to understand the border classification of ML models. There are three
    categories as follows:


    +   - **Supervised learning:** The answer to the question is specific, for example,
    what is the salary of a 5-year-experienced ML engineer? The data are labeled,
    and this type of model predicts the outcome/future. Direct feedback is given to
    the model. Ground Truth (input) and Answer Key (output) are also given to the
    model.

    - **Unsupervised learning:** The data are cumbersome and not labeled. The intention
    is to find the hidden patterns in the data. No feedback is given to the model.'

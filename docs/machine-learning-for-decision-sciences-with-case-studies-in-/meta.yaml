    程序或算法的复杂度随输入数据的不同而变化；通常以“f(n)”的形式表示，其中 n 表示输入的大小。\n算法的计算复杂度是指在最坏情况下，算法解决问题所需的时间。算法可以按以下方式分析：\n\
    \n- **渐近分析：** 创建应用程序时，需要关注多个方面。这样的应用程序应该是用户友好的、快速的、易于配置的，并且性能是关键。没有人喜欢运行一个操作缓慢且在处理大量数据时表现不佳的应用程序。我们如何识别算法的速度，并判断该算法在处理大量输入时是否表现最佳？所有上述问题的答案就是渐近分析。\n\
    \n它评估算法在处理大量输入数据时的性能；它计算随着数据输入的增加，时间如何增长。当我们有两个解决同一问题的算法时，渐近分析将帮助计算并选择最合适的算法。\n\
    算法可以基于以下情况进行分析：\n\n**最坏情况复杂度：** 算法将执行的最大步骤数。确定算法运行时间的上界。导致最大操作数的情况。例如，在数据中搜索一个不存在的元素，因为循环将迭代到最后以搜索该元素，这就是为什么它是最坏情况。\n\
    **平均情况复杂度：** 找出所有可能的输入，计算所消耗的时间，将所有计算值相加，然后除以输入的数量。这不容易做到，并且很少使用。\n**最佳情况复杂度：**\
    \ 它生成算法的下界。计算导致执行最少操作数的情况。\n**空间复杂度：** 空间复杂度是解决问题所需的内存。假设问题需要大量内存。结果，程序将变得更加复杂。\n\
    **时间复杂度：** 算法解决问题所需的时间。时间包括程序的执行时间。\n\n## 2.9 现实世界的例子\n\n基于本章解释的主题，作者提供了现实世界的例子，以便更好地理解概念。\n\

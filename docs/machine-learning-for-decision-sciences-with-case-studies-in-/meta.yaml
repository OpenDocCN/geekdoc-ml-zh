    +   - Partition the data into three types of points (core, boundary, and noise).
    The core points are the high-density points at the center with lots of neighbors
    around them.

    - Connect the core points to create clusters

    - Assign boundary points to each cluster


    Two parameters involved are eps and MinPts. $\epsilon$ Neighborhood refers to
    the objects within the radius $\epsilon$. The $\epsilon$ Neighborhood is defined
    as follows:


    $\epsilon$ Neighborhood$(x) = \{y \in D : d(x, y) \leq \epsilon\}$


    where $D$ is the dataset and $d$ is the distance between data objects.


    The higher density of objects should hold at least MinPts of objects. For example,
    as shown in Figure 4.17, let us consider MinPts=4. It is inferred from the figure
    that the density of $p$ is higher than the density of $q$.


    For Figure 4.18, the assigned parameters are eps=1 unit and MinPts=5. Based on
    the given parameters, the data points are classified into three points: core,
    border, and outlier points, as shown in Figure 4.18.


    The core point is the data point if it has more objects than MinPts within the
    radius $\epsilon$. Border point has fewer objects than MinPts within the radius
    $\epsilon$, but it lies nearer to the core point. Outliers are the ones that are
    extreme data objects. The two approaches in DBSCAN are as follows:


    +   - Density reachable

    - Density-connected'

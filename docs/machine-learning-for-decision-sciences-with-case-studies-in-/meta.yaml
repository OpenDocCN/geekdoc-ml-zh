- md: '## 5.4.2 GEOMETRIC INTUITION


    Given an input $x$, the goal is to compute an output $y$. The linear function
    can be the optimal line function where the line can be characterized by a slope
    and intercept with $x$- or $y$-axis, as represented in Figure 5.14.


    Let us consider these blue points as input data points, and we want to fit a linear
    function. For example, predict height $y$ from given age $x$. Similarly, predict
    the house price value from the given house area.


    Figure 5.15 shows the parameters, and the population line is the actual line,
    and it is given as Equation 5.5:


    $y = \beta_0 + \beta_1x + \epsilon$ (5.5)


    where $y$ is the linear dependent function, $\beta_0$ is the population $y$-intercept,
    $\beta_1$ is the population slope, and $\epsilon$ is the random error. The mean
    and the variance of the distribution are as follows:


    $E(y|x) = \beta_0 + \beta_1x$ (5.6)


    $var(y|x) = var(\beta_0 + \beta_1x + \epsilon) = \sigma^2$ (5.7)


    ## 5.4.3 MATHEMATICAL FORMULATION


    The equation of the line mathematically drives the statistical theory of linear
    regression technique is given as in equation 5.8:


    $$y_i = \beta_0 + \beta_1 x_i + \epsilon_i \text{ for } i = 1, 2, \dots n$$


    To estimate the two unknown parameters $\beta_0$ and $\beta_1$, the least-squares
    criteria are


    $$S(\beta_0, \beta_1) = \sum_{i=1}^{n} (y_i - \beta_0 - \beta_1 x_i)^2$$


    The least-squares estimators of $\beta_0$ and $\beta_1$, say $\hat{\beta}_0$ and
    $\hat{\beta}_1$, must satisfy


    $$\frac{\partial S}{\partial \beta_0} \bigg|_{\hat{\beta}_0, \hat{\beta}_1} =
    -2 \sum_{i=1}^{n} (y_i - \hat{\beta}_0 - \hat{\beta}_1 x_i) = 0 \quad (5.10)$$


    And


    $$\frac{\partial S}{\partial \beta_1} \bigg|_{\hat{\beta}_0, \hat{\beta}_1} =
    -2 \sum_{i=1}^{n} (y_i - \hat{\beta}_0 - \hat{\beta}_1 x_i) x_i = 0 \quad (5.11)$$


    Simplifying these two equations yields


    $$n \hat{\beta}_0 + \hat{\beta}_1 \sum_{i=1}^{n} x_i = \sum_{i=1}^{n} y_i \quad
    (5.12)$$


    $$\hat{\beta}_0 \sum_{i=1}^{n} x_i + \hat{\beta}_1 \sum_{i=1}^{n} x_i^2 = \sum_{i=1}^{n}
    y_i x_i \quad (5.13)$$


    The above equation is the least-squares normal equation; the solution to the normal
    equation is


    $$\hat{y} = \hat{\beta}_0 + \hat{\beta}_1 \bar{x} \quad (5.14)$$


    where


    $$\bar{y} = \frac{1}{n} \sum_{i=1}^{n} y_i \quad (5.15)$$


    $$\bar{x} = \frac{1}{n} \sum_{i=1}^{n} x_i \quad (5.16)$$


    $$\hat{\beta}_1 = \frac{S_{xy}}{S_{xx}} \quad (5.17)$$


    where


    $$S_{xx} = \sum_{i=1}^{n} x_i^2 - \frac{\left(\sum_{i=1}^{n} x_i\right)^2}{n}
    = \sum_{i=1}^{n} (x_i - \bar{x})^2$$


    $$S_{xy} = \sum_{i=1}^{n} x_i y_i - \frac{\left(\sum_{i=1}^{n} y_i\right)\left(\sum_{i=1}^{n}
    x_i\right)}{n} = \sum_{i=1}^{n} y_i (x_i - \bar{x}) \quad (5.18)$$


    The residual $e$ is the difference between the observed value $y_i$ and their
    fitted value $\hat{y}_i$


    $$e = y_i - \hat{y}_i \quad \text{for } i = 1, 2, ..., n \quad (5.19)$$


    ## Example 5.1


    The rocket propellant data is given in Table 5.1, and the corresponding scatter
    diagram is shown in Figure 5.16. There exists a relationship between shear strength
    and the age of the propellant. First, find the residual and equation of a line.


    $$S_{xx} = \sum_{i=1}^{n} x_i^2 - \frac{(\sum_{i=1}^{n} x_i)^2}{n} = 4677.69 -
    \frac{71,422.56}{20} = 1106.56$$


    $$S_{xy} = \sum_{i=1}^{n} x_i y_i - \frac{(\sum_{i=1}^{n} y_i)(\sum_{i=1}^{n}
    x_i)}{n} = 528,492.64 - \frac{(267.25)(42,627.15)}{20} = -41,112.65$$


    $$\hat{\beta}_1 = \frac{S_{xy}}{S_{xx}} = \frac{-41,112.65}{1106.56} = -37.15$$


    $$\hat{\beta}_0 = \bar{y} - \hat{\beta}_1 \bar{x} = 2131.3575 - (37.15)13.3625
    = 2627.82$$


    The results computed for the rocket propulsion data in terms of observed value,
    fitted value, and residual are presented in Table 5.2.



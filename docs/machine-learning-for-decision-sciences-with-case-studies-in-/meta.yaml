    # 2.4.5.16 Merge Sort


    The merge sort algorithm works based on the divide and conquer mechanism. The
    array is first divided into two halves; then, each half portion is divided into
    equal halves. The dividing process continues until each divided portion consists
    of only one element of the array (the array cannot be further divided). Then,
    the elements are combined (merged) in the order of their division. During the
    combination of elements, a comparison is made, and sorting happens in successive
    halved arrays. Finally, the merged array results in a sorted array. An example
    for merge sort is shown in Figure 2.19. The algorithm is explained with a flowchart,
    as shown in Figure 2.20.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_74_0.png)



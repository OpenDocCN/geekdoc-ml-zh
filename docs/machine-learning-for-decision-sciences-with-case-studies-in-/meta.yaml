    # 4.6.4 SPACE AND TIME COMPLEXITY


    **Space complexity:** The space complexity remains high when the number of data
    points is more because more space is required to store the proximity matrix.

    Space complexity $S = O(n^2)$, where $n$ is the total count of input data objects.

    **Time complexity:** The time complexity is also high as we need to update the
    similarity matrix in every iteration.

    Time complexity $= O(n^3)$, where $n$ is the total count of input data objects.


    # 4.6.5 LIMITATIONS OF HIERARCHICAL CLUSTERING


    +   - Highly sensitive to scaling

    - Difficulty in handling noise data and not efficient with outliers

    - High space and time complexity



    Heuristics and Their Applications


    | ML/Deep Learning Strategy | Description |

    | :--- | :--- |

    | Resampling strategy | Use this when there is an unbalanced dataset |

    | Principal component analysis | Use this for reducing dimensionality, create
    new features |

    | Autoencoding | To create new features |

    | Regularization techniques | To prevent overfitting, outliers, and noise in linear
    regression and lasso regression |

    | Random forest | Use this to overcome the outliers |

    | Linear regression | Use this when predicting continuous variables |

    | Logistic regression or simple vector machine | Use this when predicting a binary
    outcome |

    | Random forest | Use this when predicting multi-class classification |

    | Convolutional neural networks (CNNs) | Use this when doing image classification,
    object detection, and image segmentation |

    | RNNs (typically LSTM) | Use this when doing sequence modeling such as natural
    language processing or text classifications |


    SAS provides a strong integration between SAS and databases through multiple data
    connectors, OBDC, JDBC, and OLE DB. Though SAS is used on file extracts, it can
    also be used to interface relational databases (Teradata or Oracle), data warehouse
    applications (snowflake), files, and also enterprise applications (SAP, JD Edwards).


    The next step in the model selection process is data exploration. In this phase,
    it is critical to explore the data and observe the relationships among the variables
    in the data. The choice of variables and the methods for a corresponding problem
    are also challenging. Tools used for data visualization can be applied to review
    the data and assess the relationships between variables. Simultaneously, variable
    selection is also an important factor for successful model selection. In most
    cases, stakeholders/SMEs will have a strong knowledge of the data that has to
    be considered for analysis.


    Initially, the inputs and the data required for the problem are taken and reviewed
    to check whether these inputs are related to the proposed outcomes used in prediction
    and analysis. Some models properly handle such tasks. However, based on the proposed
    solutions, a different model may also be considered after examining the inputs
    and transforming the inputs. This enables the selection of the best model. Generally,
    the model should aim to capture the best features so that the outcome is as expected.
    The process involves several iterations to obtain the most critical variables
    for the analysis chosen. Then, testing is performed on the range of possible variables
    and features in the data, and the most prominent features are selected.


    In case regression problems are handled, candidate features have to be identified
    concerning the model''s outcome. Here case should be taken in terms of correlation
    and collinearity between the data, such that they do not affect the model''s outcome.


    The last step in this phase is model selection. The model created in Python or
    any other equivalent tool should be converted to SQL so that the expected operation

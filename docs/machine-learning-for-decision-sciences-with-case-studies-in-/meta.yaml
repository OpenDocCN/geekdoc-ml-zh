    | RID | 年龄 | 类别 |

    |---|---|---|

    | 1 | ≤30 | 否 |

    | 2 | ≤30 | 是 |

    | 3 | 31 ... 40 | 是 |

    | 4 | >40 | 是 |

    | 5 | >40 | 是 |

    | 6 | >40 | 否 |

    | 7 | 31 ... 40 | 是 |


    对于年龄，我们有两个值 ≤ 30（1 – 否，1 – 是），两个值 31 ... 40（2 – 是，0 – 否），以及三个值 > 40（2 – 是，1 –
    否）。


    熵 = 2 / 7(0) + 2 / 7(0) + 3 / 7(-2 / 7 log₂(2 / 7) – 1 / 7 log₂(1 / 7))

    = 3 / 7(2 / 7(-1.83) + 1 / 7(-2.81))

    = 3 / 7(0.5228 + 0.4014)

    = 0.3961


    增益 = 0.911 – 0.391

    = 0.52


    ## 基于收入的计算


    | RID | 收入 | 类别 |

    |---|---|---|

    | 1 | 高 | 否 |

    | 2 | 高 | 否 |

    | 3 | 高 | 是 |

    | 4 | 中 | 是 |

    | 5 | 低 | 是 |

    | 6 | 低 | 否 |

    | 7 | 低 | 是 |


    对于收入，我们有三个值 高（2 – 否，1 – 是），一个值 中（1 – 是，0 – 否），以及三个值 低（2 – 是，1 – 否）。


    熵 = 3 / 7(-1 / 7 log₂(1 / 7) – (2 / 7) log₂(2 / 7))

    + 0 + 3 / 7(-2 / 7 log₂(-2 / 7) – 1 / 7 log₂(-1 / 7))

    = 0.7922


    增益 = 0.911 – 0.7922

    = 0.1188


    由于年龄具有最高的增益，数据根据年龄因素进行划分，如图6.24所示。'

    # 6.6.11 SVM EXAMPLES


    # Example 6.11


    Let us see the linear SVM problem. Suppose we are given the following positively
    labeled data points


    $$\left\{\left(\begin{array}{l}3 \ 1\end{array}\right),\left(\begin{array}{l}3
    \ -1\end{array}\right),\left(\begin{array}{l}6 \ 1\end{array}\right),\left(\begin{array}{l}6
    \ -1\end{array}\right)\right\}$$


    and the following negatively labeled data points (see Figure 6.106):


    $$\left\{\left(\begin{array}{l}1 \ 0\end{array}\right),\left(\begin{array}{l}0
    \ 1\end{array}\right),\left(\begin{array}{l}0 \ -1\end{array}\right),\left(\begin{array}{l}-1
    \ 0\end{array}\right)\right\}$$


    Let us identify a simple hyperplane that separates the positive and negative points.
    Linear SVM can be used because the data points are linearly separable.


    Let us define a hyperplane by observing the given input data. There are three
    support vectors circled, as shown in Figure 6.107, which are close to the hyperplane
    and they are


    $$\left\{s_{1}=\left(\begin{array}{l}1 \ 0\end{array}\right), s_{2}=\left(\begin{array}{l}3
    \ 1\end{array}\right), s_{3}=\left(\begin{array}{l}3 \ -1\end{array}\right)\right\}$$


    In what follows, we will use vectors augmented with 1 as a bias input


    $$\left\{\widetilde{s_{1}}=\left(\begin{array}{l}1 \ 0 \ 1\end{array}\right),
    \widetilde{s_{2}}=\left(\begin{array}{l}3 \ 1 \ 1\end{array}\right), \widetilde{s_{3}}=\left(\begin{array}{l}3
    \ -1 \ 1\end{array}\right)\right\}$$'

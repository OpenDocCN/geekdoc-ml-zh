    火箭推进剂数据如表 5.1 所示，相应的散点图如图 5.16 所示。剪切强度与推进剂龄期之间存在关系。首先，求残差和直线方程。


    $$S_{xx} = \sum_{i=1}^{n} x_i^2 - \frac{(\sum_{i=1}^{n} x_i)^2}{n} = 4677.69 -
    \frac{71,422.56}{20} = 1106.56$$



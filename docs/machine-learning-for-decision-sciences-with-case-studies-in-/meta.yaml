    \n**图2.15** 插值搜索。\n\n## 2.4.5.10 排序\n\n在数据结构中，必须理解如何将一组元素按顺序排列。有多种方式或方法可以排列元素。排序是指将数据按特定格式排列的这些方法。排序算法提供了一组排列数据的程序。如果排序组织得当，搜索过程可以优化到高效水平。数据一旦排序，就可以以简单、可读的形式表示。最常见的排序顺序是字典顺序或数字顺序。\n\

    \n- **适用性：** 数据结构实现应能以正确的方式使用其接口。\n- **时间效率：** 数据结构执行的操作应消耗尽可能少的时间。\n- **空间效率：**\
    \ 关于数据结构的操作应能占用尽可能少的内存。\n\n在本节中，我们将回顾以下数据结构及其相关的 Python 示例：\n\n- 数组数据结构\n- 链表\n\
    - 栈和队列\n- 查找\n- 排序\n- 递归\n\n### 2.4.5.1 数组数据结构\n\n数据结构使用数组来执行操作。众所周知，数组是用于存储属于同一数据类型的相似项目集合的实体。存储在数组中的项目称为*元素*，每个元素的位置被分配一个*索引*以访问或操作它。\n\
    \n通常，数组声明为 **data_type array_name [array_size]**。例如，\n**Int matrixA [5]={1, 2,\
    \ 3, 4, 5};**\n\n在上面的例子中，需要考虑以下几点：\n\n- 数组索引从 0 开始，而不是 1。\n- 数组长度为 5 – 它可以存储五个元素。\n\
    - 通过其索引值访问每个元素；例如，第三个元素可以访问为 matrixA[2]。\n\n```\n#常用代码\n# 代码    C 类型         \
    \   Python 类型    最小字节数\n# 'b'     signed char       int            1\n# 'B'  \
    \   unsigned char     int            1\n# 'u'     Py_UNICODE        Unicode  \
    \      2\n# 'h'     signed short      int            2\n# 'H'     unsigned short\
    \    int            2\n# 'i'     signed int        int            2\n# 'I'   \
    \  unsigned int      int            2\n# 'l'     signed long       int       \
    \     4\n# 'L'     unsigned long     int            4\n# 'f'     float       \
    \      float          4\n# 'd'     double            float          8\n```\n\n\
    ### 2.4.5.2 数组在 Python 中的实现\n\n```python\nimport array as arr\nmyArray = arr.array('d',\
    \ [3.14, 3.5, 4.99])\nprint(myArray)  # 输出显示为 --> array('d', [3.14, 3.5, 4.99])\n\
    ```\n\n```python\nimport array as arr\nmyArray2 = arr.array('i', [1, 2, 3, 5,\
    \ 7, 11, 13, 17, 19])\nprint(\"First element:\", myArray2[0]) # 输出显示为 --> First\
    \ element: 1\nprint(\"Second element:\", myArray2[1]) # 输出显示为 --> Second element:\
    \ 2\nprint(\"Last element:\", myArray2[-1])  # 输出显示为 -->  Last element: 19\n```\n\
    \n```python\n# 数组切片\nprint(myArray2[2:5]) # 第3到第5个；输出显示为 --> array('i', [3, 5,\
    \ 7])\nprint(myArray2[:-5]) # 开始到第4个；输出显示为 --> array('i', [1, 2, 3, 5])\nprint(myArray2[5:])\
    \  # 第6个到最后；输出显示为 --> array('i', [11, 13, 17, 19])\nprint(myArray2[:])   # 开始到最后；输出显示为\
    \ --> array('i', [1, 2, 3, 5, 7, 11, 13, 17, 19])\n```\n\n```python\n# 更改数组中的值\n\
    # 更改第一个元素\nmyArray2[0] = 99\nprint(myArray2) # 数组的第一个值更改为 99；输出显示为 --> array('i',\
    \ [99, 2, 3, 5, 7, 11, 13, 17, 19])\n```\n\n```python\n# 更改第3和第4个元素\nmyArray2[2:3]=\
    \ arr.array('i', [88,77])\nprint(myArray2) # 数组的第三和第四个值分别更改为 88 和 77；输出显示为 -->\
    \ array('i', [99, 2, 88, 77, 5, 7, 11, 13, 17, 19])\n```\n\n![](img/7fbca4852dbe91c6cea209148871a1b3_58_0.png)\n\

    \nFIGURE 6.7 Sample decision tree.\n\n## 6.4 DECISION TREE CLASSIFIER\n\nThe decision\
    \ tree belongs to the nonparametric supervised learning. A decision tree is one\
    \ of the most popular classification and prediction algorithms. It is used in\
    \ data mining, operation research, and machine learning (ML). A decision tree\
    \ is a tree-structured classifier. The decision node and leaf node are the two\
    \ nodes in the decision tree. A test is done on the decision node. A leaf node\
    \ represents the class label. The path from the root to the leaf represents the\
    \ classification rule. A decision tree is a flowchart-like structure. The test\
    \ is conducted on each node of the decision tree, and the branch represents the\
    \ outcome of the test. The last node or leaf node represents the class label.\
    \ The path from the root node to the leaf node represents the classification rule.\
    \ The goal of the decision tree is to create a decision model from the dataset\
    \ that predicts the value of a target variable by using a simple decision rule.\
    \ A decision tree is a visual representation of the decision. The real data have\
    \ many features (i.e., in iris flower, the features are petal width and length).\
    \ These features are represented clearly in the decision tree. The relationship\
    \ between the features can be easily identified by using the decision tree. A\
    \ decision tree can be built efficiently by using the decision tree algorithm.\n\
    \nThe decision tree problem can be solved from the starting node (i.e., root node)\
    \ to the end node. Figure 6.7 shows the sample decision tree. The decision tree\
    \ can be used for classification or regression. A decision tree is very easy to\
    \ understand because it has a graphical representation.\n\nThe decision trees\
    \ are constructed based on the attributes. The attribute for Figure 6.7 is whether\
    \ the climate is rainy or not. Based on the attribute, the decision trees are\
    \ constructed. This section explains in detail about the selection of attributes\
    \ for using a decision tree algorithm. The performance of decision trees is affected\
    \ by the overfitting and underfitting problem. The detailed procedure for solving\
    \ these problems is also discussed in this section. Nowadays, the decision trees\
    \ play a vital role in medical, library management, healthcare management, business\
    \ management, banking sector, etc.; these applications are discussed in detail.\n\
    \n### 6.4.1 IMPORTANT TERMINOLOGY IN THE DECISION TREE\n\nFigure 6.8 represents\
    \ a simple decision tree. The various terminologies used in the decision tree\
    \ are as follows:\n\n- **Root node:** The entire population of the tree is represented\
    \ by the root node. The root node is divided into two or more nodes.\n- **Decision\

  md: 'containing different observations. After that, the projected data $O''$ is
    available as $O'' = W^T O$. The number of residual values is selected, such as
    columns of $W$ which, directly, can define the number of variations of actual
    data that need to be maintained while removing eigenvectors. If only $N$ eigenvectors

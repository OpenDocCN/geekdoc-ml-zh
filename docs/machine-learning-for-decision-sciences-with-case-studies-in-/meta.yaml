    \ of links contains items that include the data and link element. The link element\
    \ provides a link to the next link. Each *link* of a linked list stores a set\
    \ of data called the data elements. Every link in a linked list has a link to\
    \ the next link through the element called *next*. Every linked list has an element\
    \ called *first*. Overall, each element has a list consisting of the data and\

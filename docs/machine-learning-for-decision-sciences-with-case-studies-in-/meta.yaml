    \n为了执行一个将在整个项目中使用的任务，我们将这样的任务编码为一个函数，以便将来可以重用。因此，函数为项目提供了更好的模块化。此外，程序员使用函数可以更容易地管理代码。函数可以使用关键字“def”后跟函数名和括号来初始化；输入数据位于这些括号内，而文档字符串描述了函数的功能。这是一个可选的文档字符串。冒号（:）表示函数头的结束。让我们以编写一个两数相加的函数为例。\n\
    \n```python\ndef add(a, b):\n    sum = a + b\n    print('the sum is ', sum)\n\
    \    return\n```\n\n我们可以使用函数名和参数来调用该函数：\n\n```python\nadd(1, 2)\n```\n\n### 2.4.6.1\
    \ 函数的 Python 代码示例\n\n函数是一个有组织的、可重用的代码块，用于执行单个相关的操作。因此，函数为应用程序提供了更好的模块化和高度的代码重用。\n\
    \n```python\n# 语法：def 函数名(参数): \"函数文档字符串\" 函数体\n#         return [表达式]\n\nIn [1]:\
    \ def my_first_function(name):  # 带参数的函数声明。\n            return(name)\n      \
    \  print(my_first_function('suresh'))  # 必须传递参数。\n        suresh\n```\n\n### 2.4.6.2\
    \ 从函数返回值\n\n用户可以使用函数返回单个值或多个值。\n\n```python\nIn [2]: def add_two_numbers(num1=6,\
    \ num2=5):  # 函数定义中参数的默认赋值。\n            return (num1 + num2)\n        # number1\
    \ = 34\n        # number2 = 44.6\n        result = add_two_numbers()  # 未传递值，因此使用默认值。\n\
    \        print(result)\n        11\n```\n\n```python\nIn [3]: def print_max(a,\
    \ b):  # 带参数的函数，必须传递值。\n            if a > b:\n                print(a, 'is maximum')\n\
    \            elif a == b:\n                print(a, 'is equal to', b)\n      \

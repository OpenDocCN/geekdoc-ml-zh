    \ 2.21 所示。\n\n## 2.4.5.19 快速排序\n\n快速排序是基于将数组划分为更小子数组的高效数据结构算法之一。首先，选择一个基准值，并基于此值对大数组进行划分。数组的每个子组将根据基准值保存值。一旦数组被划分，快速排序算法会递归调用自身来对子数组进行排序。该算法对大规模数据高效。索引从数组的两端开始，一个索引从左侧开始，另一个从右侧开始。左侧索引选择小于基准的元素，而右侧索引选择大于基准值的元素。然后，根据比较结果比较并交换这两个选定的元素。该过程重复进行，直到基准左侧和右侧的所有元素都被比较完毕。最后，如果需要，基准值也会被移动以保持排序顺序。该算法的流程图如图\

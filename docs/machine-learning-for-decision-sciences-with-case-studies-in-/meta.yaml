    $$\mu = \frac{1}{n} \sum_{i=1}^{n} X_{(i)}$$ (7.3)


    +   2. Substitute $X_{(i)}$ with $X_{(i)} - \mu$.

    3. Resize every vector $X_{j(i)}$ to obtain unit variance with the help of equation

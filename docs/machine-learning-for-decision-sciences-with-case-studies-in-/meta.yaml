    | 13 | 78.5 | 12.3 |

    | 14 | 74.3 | 14.0 |

    | 15 | 74.8 | 16.7 |

    | Average | 88.84 | 18.17 |


    ![](img/7fbca4852dbe91c6cea209148871a1b3_215_0.png)


    **FIGURE 5.18** Scatter plot of house size vs. price.


    The equation of the above regression problems is given below:


    $$y = \beta_0 + \beta_1x_1 + \beta_2x_2 + \beta_3x_3 + \beta_4x_4 + \beta_5x_5
    + \cdots + \beta_px_p + \epsilon$$


    where $p$ is the predictor or independent variable. Let us assume that the expected
    value of $y$ given $x$ is given by the population line.


    $$E(Y|X) = \beta_0 + \beta_1x_1 + \beta_2x_2 + \beta_3x_3 + \beta_4x_4 + \beta_5x_5
    + \cdots + \beta_px_p$$


    To minimize the sum of squared errors based on the training points, the least-squares
    line equation is as follows:


    $$\text{Least-Square Line} = \widehat{\beta}_0 + \widehat{\beta}_1x_1 + \widehat{\beta}_2x_2
    + \widehat{\beta}_3x_3 + \cdots + \widehat{\beta}_px_p$$


    Now the data we may have may not form a perfect line. The error function is used
    to determine the deviation between actual and predicted. So, the assumptions about
    the errors are given as follows:


    - $E(\varepsilon_i) = 0$ for $i = 0,1,2,...n$

    - $\sigma(\varepsilon_i) = \sigma_\varepsilon$, where $\sigma_\varepsilon$ is
    unknown

    - The errors $\varepsilon_i$ are independent to each other

    - The errors $\varepsilon_i$ are normally distributed (with mean 0 and standard
    deviation $\sigma_\varepsilon$)


    So, this kind of noise is called Gaussian noise or white noise.


    The least-squares regression line is the unique line such that the sum of squared
    vertical ($y$) distances between the data points (blue colored) and the line is
    the smallest possible. The red-colored vertical lines are errors, as given in
    Figure 5.19.


    Let us consider for a training point $d_i = (x_i, y_i)$ where $y_i$ is the actual
    value. The idea is to minimize these errors. There are different methods to identify
    the error of the model. The mean absolute error is the simple one that calculates
    the average of the absolute value of errors and is given as


    $$\text{MAE} = \frac{1}{n} \sum_{i=1}^{n} |y_i - \hat{y}_i| \quad (5.20)$$


    where $y_i$ is the actual value and $\hat{y}_i$ is the predicted value.


    The mean squared error is given as MSE:


    $$\text{MSE} = \frac{1}{n} \sum_{i=1}^{n} (y_i - \hat{y}_i)^2 \quad (5.21)$$


    ![](img/7fbca4852dbe91c6cea209148871a1b3_216_0.png)


    **FIGURE 5.19** Measuring the distance between hyperplane and data points.


    where $y_i$ is the actual value and $\hat{y}_i$ is the predicted value.

    The root mean squared error is given as RMSE:


    $$\text{RMSE} = \sqrt{\frac{1}{n} \sum_{i=1}^{n} (y_i - \hat{y}_i)^2}$$


    The rooted absolute error, also known as the residual sum of squares, is given
    as RAE:


    $$\text{RAE} = \frac{\sum_{i=1}^{n} |y_i - \hat{y}_i|}{\sum_{i=1}^{n} y_i - \bar{y}}$$


    where $y_i$ is the actual value, $\hat{y}_i$ is the predicted value, and $\bar{y}$
    is average value of $y$.

    The rooted square error is RSE, which is similar to RAE:


    $$\text{RSE} = \frac{\sum_{i=1}^{n} (y_i - \hat{y}_i)^2}{\sum_{i=1}^{n} (y_i -
    \bar{y})^2}$$


    The least-squares regression line equation for n data points is given as


    $$y = ax + b$$


    where $a$ and $b$ are


    $$a = \frac{n \sum_{i=1}^{n} x_i y_i - \sum_{i=1}^{n} x_i \sum_{i=1}^{n} y_i}{n
    \sum_{i=1}^{n} x_i^2 - (\sum_{i=1}^{n} x_i)^2}$$


    $$b = \frac{1}{n} \left( \sum_{i=1}^{n} y_i - a \sum_{i=1}^{n} x_i \right)$$


    ## Example 5.4


    Find the least-squares regression line for the following set of data points $\{(-1,
    0), (0, 2), (1, 4), (2, 5)\}$ given in Table 5.5. Plot the given points and identify
    the regression line.


    ### TABLE 5.5

    Sample Data Points


    | x | y | xy | x² |

    |---|---|---|---|

    | -1 | 0 | 0 | 1 |

    | 0 | 2 | 0 | 0 |

    | 1 | 4 | 4 | 1 |

    | 2 | 5 | 10 | 4 |

    | $\sum x = 2$ | $\sum y = 11$ | $\sum xy = 14$ | $\sum x^2 = 6$ |


    ![](img/7fbca4852dbe91c6cea209148871a1b3_218_0.png)


    The least-squares regression line equation for $n$ data points is given as


    $$y = ax + b$$


    where $a$ and $b$ are


    $$a = \frac{n \sum_{i=1}^{n} x_i y_i - \sum_{i=1}^{n} x_i \sum_{i=1}^{n} y_i}{n
    \sum_{i=1}^{n} x_i^2 - \left( \sum_{i=1}^{n} x_i \right)^2}$$


    $$b = \frac{1}{n} \left( \sum_{i=1}^{n} y_i - a \sum_{i=1}^{n} x_i \right)$$


    $$a = \frac{4 * 14 - 2 * 11}{4 * 6 - 2^2}$$


    $$a = 17/10 = 1.7$$


    $$b = \frac{1}{4} (11 - 1.7 * 2)$$


    $$b = 1.9$$


    The least-squares regression line for the given problem is shown in Figure 5.20.


    $$y = 1.7x + 1.9$$


    ## Example 5.5


    The values of $x$ and their corresponding values of $y$ are shown in Table 5.6.


    - i. Find the least-squares regression line $y=ax+b$

    - ii. Estimate the value of $y$ when $x=10$.


    ### TABLE 5.6

    Data for Example 5.5


    | x | 0 | 1 | 2 | 3 | 4 |

    |---|---|---|---|---|---|

    | y | 2 | 3 | 5 | 4 | 6 |


    **Solution:**


    The least-squares regression line equation for $n$ data points is given as


    $$y = ax + b$$


    where $a$ and $b$ are


    $$a = \frac{n \sum_{i=1}^{n} x_i y_i - \sum_{i=1}^{n} x_i \sum_{i=1}^{n} y_i}{n
    \sum_{i=1}^{n} x_i^2 - (\sum_{i=1}^{n} x_i)^2}$$


    $$b = \frac{1}{n} \left( \sum_{i=1}^{n} y_i - a \sum_{i=1}^{n} x_i \right)$$


    | x | y | xy | x^2 |

    |---|---|---|---|

    | 0 | 2 | 0 | 0 |

    | 1 | 3 | 3 | 1 |

    | 2 | 5 | 10 | 4 |

    | 3 | 4 | 12 | 9 |

    | 4 | 6 | 24 | 16 |

    | $\sum x = 10$ | $\sum y = 20$ | $\sum xy = 49$ | $\sum x^2 = 30$ |


    $$a = \frac{5 * 49 - 10 * 20}{5 * 30 - 10^2}$$


    $$a = 0.9$$


    $$b = \frac{1}{5} (20 - 0.9 * 10)$$


    $$b = 2.2$$


    Thus, the least-squares regression equation is


    $$y = 0.9x + 2.2$$


    Substitute the value of $x=10$; then


    $$y = 0.9 * 10 + 2.2$$


    $$y = 11.2$$


    The output for the example is presented in Figure 5.21.



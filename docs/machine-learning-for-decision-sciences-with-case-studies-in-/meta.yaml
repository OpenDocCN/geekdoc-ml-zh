    \n- 1. 编写一个用于 3D 绘图的 matplotlib 代码。\n- 2. 使用 “sin” 函数绘制正弦波图形\n  a. Y 轴为电压 (mV)\n\
    \  b. X 轴为时间 (s)\n- 3. 如何将 matplotlib 图形保存到文件？\n- 4. 给定 INFO.CSV 文件（包含电压和时间两列），绘制折线图来绘制这些值。\n\
    - 5. 在绘制图形之前进行缩放的目的是什么？\n\n## 3 机器学习的数据分析生命周期\n\n### 学习目标\n\n在本章结束时，读者将能够：\n\n\
    - 理解机器学习（ML）数据分析生命周期所涉及的各个阶段。\n- 领会数据发现、数据准备和探索性数据分析所涉及的方面。\n- 理解模型规划和模型构建的要求。\n\
    - 深入了解如何沟通结果、优化和实施模型。\n- 了解数据分析生命周期各阶段中成员的角色和职责。\n\n### 3.1 引言\n\n过去两年产生的数据量远超过去\
    \ 50 年的总和。随着数据呈指数级增长，它带来了一个巨大的问题。我们必须妥善管理它，以便数据可以用于商业利益。采用并成功实施一个框架将帮助用户避免与数据相关的陷阱。该框架还有助于用户将时间集中在数据分析（从数据中推断）而非数据准备上，确保数据的严谨性和完整性，促进跨职能分析团队成员之间更好的过渡，实现可重复的规模扩展到其他分析，并支持研究结果的有效性。\n\
    \n一些现实世界的数据问题看起来复杂而混乱，但通过一个良好的框架方法，复杂的问题可以分解为更简单的模块，从而更容易解决。有时，应用经过测试的数据分析过程具有挑战性。因此，需要建立一个全面的方法来进行分析。一旦数据在多个时刻被收集，用户就开始分析数据，然后计划并确定工作的范围和数量。在此过程中，涉及的人员尝试探索不同的目标或解决与沟通目标不同的问题。文档过程有助于展示探索的严谨性，并在团队内部共享时为项目提供额外的可信度。这有助于团队进行知识共享，并采用这些方法和分析，以便在后续年份中可以重复并稍作修改。\n\
    \n存在一个定义明确的流程来开发数据科学项目。然而，始终建议采用一个数据分析生命周期框架，这也是本章的主要焦点。许多提出的框架阶段将是相似的。例如，数据发现和数据准备阶段将是通用的，只有细微差别。然而，有些阶段可能根本不需要。例如，框架的模型训练阶段要求用户创建训练和测试数据集；商业智能项目将没有这些阶段。此外，数据科学通常处理各种数据集，例如大数据，包括半结构化/非结构化数据和稀疏数据集。与仅关注商业智能的项目相比，这些数据集在数据准备、数据拼接和丰富方面需要更多的关注。\n\
    \n数据准备可能是 ML 项目中最重要的部分。它是最耗时的部分，尽管它似乎是最少被讨论的话题。数据准备也称为数据预处理，是将原始数据转换为适合建模的形式的行为。ML\
    \ 算法要求输入数据为数值，大多数算法开发和部署都保持这一期望。因此，如果数据包含非数字的数据类型和值（如标签），则需要将数据更改为数字。此外，特定的 ML\
    \ 算法对数据类型、规模、概率分布和输入变量之间的关系有特定的期望。你可能需要更改数据以满足这些期望。\n\n数据准备的观点是发现如何最好地将问题未知的底层结构暴露给\
    \ ML 算法。这通常需要通过一系列不同的数据准备技术进行迭代实验，以发现什么有效或最佳。项目中使用的绝大多数 ML 算法已有数年甚至数十年的历史。这些算法的实现和应用已被充分理解。它们已经非常常规化，拥有像\
    \ Python 中 Scikit-learn 这样功能齐全的令人惊叹的开源 ML 库。项目之间不同的是数据。我们可能在新的应用设置中首次获取一个新数据集，以使用特定数据集作为预测建模项目的基础。因此，准备数据以最好地呈现给学习算法的问题是任何现代\
    \ ML 项目的主要任务。\n\n数据准备的挑战在于每个数据集都是独特且不同的。数据集在变量数量（数十、数百、数千或更多）、变量类型（数值型、名义型、序数型、布尔型）、变量规模、值随时间的变化等方面各不相同。因此，这使得讨论数据准备成为一个挑战。要么使用特定的案例研究，要么专注于跨项目使用的通用方法。结果是两种方法都没有得到深入探讨。\n\
    \n### 3.2 数据分析生命周期\n\n数据分析生命周期包含六个阶段，这些阶段在整个生命周期中是迭代进行的。图 3.1 所示的数据分析生命周期描绘了从数据发现到项目完成和运营阶段的端到端数据分析流程的最佳实践方法。这些阶段还涵盖了基于数据分析和决策科学领域既定方法的过程改进。\n\
    \n### 3.2.1 阶段 1 – 数据发现\n\n数据发现阶段要回答的问题是“我们是否有足够的信息？”。数据发现是从各种来源收集和分析数据，以从隐藏的模式和趋势中获得洞察的过程。这是充分利用组织数据以支持关键业务决策的主要步骤。通过数据发现过程，数据在一系列步骤中被收集、组合和分析。目标是将混乱分散的数据变得干净、易于理解且用户友好。此阶段的主要重点是了解业务领域，包括从过去的经验中学习，并进一步评估支持项目所需的资源，例如人力资源、时间、技术和数据。业务问题必须以关注分析挑战的方式进行框架化，这将在后续的数据分析生命周期阶段中解决。最后，必须制定初始假设（IH）以验证并开始学习信息。\n\
    \n深入理解我们试图寻找答案的给定问题的领域至关重要。在某些情况下，数据科学家需要具备高级的计算和定量知识，以便应用可以是多学科的。这些科学家需要具备将启发式方法应用于不同业务和概念问题的技术、方法和模型的深入知识。具有定量专业知识的领域专家"

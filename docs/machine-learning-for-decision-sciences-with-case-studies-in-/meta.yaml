  md: '![](img/7fbca4852dbe91c6cea209148871a1b3_243_0.png)


    FIGURE 6.1 Sigmoid curve.


    where exp[x] is similar to $e^x$. More simply, it can be rewritten as


    $$P(Y = 0 | X) = \sigma\left(-\beta_0 + \sum \beta_i x_i\right) \quad (6.5)$$

    $$P(Y = 1 | X) = 1 - \left[\sigma\left(-\beta_0 + \sum \beta_i x_i\right)\right]
    \quad (6.6)$$


    where


    $$\sigma(z) = \frac{1}{1 + e^{-z}}$$


    With a simple example, let us understand whether a person has a lung disease based
    on age and smoking habit.


    $$P(D = 1 | \text{age, smoking habit}) = \frac{1}{1 + e^{-(\beta_0 + \beta_1 \text{age}
    + \beta_2 \text{smoking habit})}}$$

    $$P(D = 1 | x_1, x_2) = \frac{1}{1 + e^{-(\beta_0 + \beta_1 x_1 + \beta_2 x_2)}}$$

    $$P(D = 0 | \text{age, smoking habit}) = \frac{e^{-(\beta_0 + \beta_1 \text{age}
    + \beta_2 \text{smoking habit})}}{1 + e^{-(\beta_0 + \beta_1 \text{age} + \beta_2
    \text{smoking habit})}}$$

    $$P(D = 0 | x_1, x_2) = \frac{e^{-(\beta_0 + \beta_1 x_1 + \beta_2 x_2)}}{1 +
    e^{-(\beta_0 + \beta_1 x_1 + \beta_2 x_2)}}$$


    where

    $D$ = presence of lung disease, discrete value {1 – Yes and 0 – No}

    $x_1$ = age, continuous value

    $x_2$ = smoking habit, discrete value {1 – Yes and 0 – No}

    To estimate the parameters $\beta_0$, $\beta_1$, and $\beta_2$, maximum likelihood
    estimation (MLE) is used


    $$\ln\left(\frac{p}{1 - p}\right) = \beta_0 + \beta_1 x_1 \quad (6.7)$$'

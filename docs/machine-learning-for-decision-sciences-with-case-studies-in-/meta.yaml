    - It provides a mechanism for finding variable interactions through experimentation.


    # 6.5.6.2 Properties


    +   - Each tree has maximal strength

    - Each tree has a minimal correlation with the other trees.

    - Ensemble of trees votes for the final result.


    # 6.5.7 Advantages and Disadvantages of Random Forest


    # 6.5.7.1 Advantages


    +   - It can be used for both classification and regression tasks.

    - Handle the missing value and maintains accuracy for missing data.

    - No overfitting the model.

    - Handle larger datasets with higher dimensionality.


    # 6.5.7.2 Disadvantages


    +   - Works well for classification and does not work for regression.

    - Less control on the model.


    # 6.5.8 Calculation of Error Using Bias and Variance


    The bias and variance represent the deviation of the result from the expected
    value. Let $F$ be the true function having random noise. Then, hypothesis $h$
    is imperfect for the following reason.


    # 6.5.8.1 Bias


    H is unable to fit f perfectly because it lacks capacity or complexity.


    # 6.5.8.2 Variance


    $H$ is fitting to the noise in the data and missing the true function $f$.

    Let $z$ be that arbitrary point and generated point is given as


    $\Upsilon = f(z) + \epsilon$ (6.22)


    Expected value is given as


    $E[\Upsilon] = f(z)$ (6.23)


    Variance is given as


    $var[\Upsilon] = var[\epsilon]$ (6.24)'

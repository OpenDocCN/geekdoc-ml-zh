    $$\text{Smoking habit } x_1 = \begin{cases} 1 & \text{Smoker} \ 0 & \text{Non
    smoker} \end{cases}$$


    The simple logistic function for predicting heart disease $y$ based on smoking
    habit $x_1$ is given as


    $$\ln\left(\frac{p(y=1|x_1)}{1-p(y=1|x_1)}\right) = \beta_0 + \beta_1 x_1$$


    # 6.3.2.2 Multiple Logistic Regression


    If we have more than one independent variable, say $\{x_1, x_2, \dots, x_n\}$,
    then, it is called multiple logistic regression. The general form of multiple
    logistic regression is in Equation 6.3


    $$\ln\left(\frac{p}{1-p}\right) = \beta_0 + \beta_1 x_1 + \dots + \beta_n x_n
    \quad (6.9)$$


    To predict the presence of heart disease $y$ (Yes/No) based on more than one variable,
    say smoking habit $x_1$ and age-group $x_2$ are examples of multiple logistic
    regression.


    $$\ln\left(\frac{p(y=1|x_1, x_2)}{1-p(y=1|x_1, x_2)}\right) = \beta_0 + \beta_1
    x_1 + \beta_2 x_2 \quad (6.10)$$


    # 6.3.2.3 Binary Logistic Regression


    It tries to predict the probability of binary target (0, 1). Binary logistic regression
    is a simpler method that makes use of the sigmoid function. For instance, as shown
    in Figure 6.3, to predict whether it will rain tomorrow or not based on humidity,
    the target-dependent variable “Will it Rain” contains exactly two classes, say
    rain (1) and no rain (0).'

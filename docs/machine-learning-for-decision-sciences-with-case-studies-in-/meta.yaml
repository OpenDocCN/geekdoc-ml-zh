    # 5.4.3 MATHEMATICAL FORMULATION


    The equation of the line mathematically drives the statistical theory of linear
    regression technique is given as in equation 5.8:


    $$y_i = \beta_0 + \beta_1 x_i + \epsilon_i \text{ for } i = 1, 2, \dots n$$


    To estimate the two unknown parameters $\beta_0$ and $\beta_1$, the least-squares
    criteria are


    $$S(\beta_0, \beta_1) = \sum_{i=1}^{n} (y_i - \beta_0 - \beta_1 x_i)^2$$'
  merge: -1
  pgno: 209
- img_proc: true
  md: 'The least-squares estimators of $\beta_0$ and $\beta_1$, say $\hat{\beta}_0$
    and $\hat{\beta}_1$, must satisfy


    $$\frac{\partial S}{\partial \beta_0} \bigg|_{\hat{\beta}_0, \hat{\beta}_1} =
    -2 \sum_{i=1}^{n} (y_i - \hat{\beta}_0 - \hat{\beta}_1 x_i) = 0 \quad (5.10)$$


    And


    $$\frac{\partial S}{\partial \beta_1} \bigg|_{\hat{\beta}_0, \hat{\beta}_1} =
    -2 \sum_{i=1}^{n} (y_i - \hat{\beta}_0 - \hat{\beta}_1 x_i) x_i = 0 \quad (5.11)$$


    Simplifying these two equation yields


    $$n \hat{\beta}_0 + \hat{\beta}_1 \sum_{i=1}^{n} x_i = \sum_{i=1}^{n} y_i \quad
    (5.12)$$


    $$\hat{\beta}_0 \sum_{i=1}^{n} x_i + \hat{\beta}_1 \sum_{i=1}^{n} x_i^2 = \sum_{i=1}^{n}
    y_i x_i \quad (5.13)$$


    The above equation is the least-squares normal equation; the solution to the normal
    equation is


    $$\hat{y} = \hat{\beta}_0 + \hat{\beta}_1 \bar{x} \quad (5.14)$$


    where


    $$\bar{y} = \frac{1}{n} \sum_{i=1}^{n} y_i \quad (5.15)$$


    $$\bar{x} = \frac{1}{n} \sum_{i=1}^{n} x_i \quad (5.16)$$


    $$\hat{\beta}_1 = \frac{S_{xy}}{S_{xx}} \quad (5.17)$$


    where


    $$S_{xx} = \sum_{i=1}^{n} x_i^2 - \frac{\left(\sum_{i=1}^{n} x_i\right)^2}{n}
    = \sum_{i=1}^{n} y_i (x_i - \bar{x})^2$$


    $$S_{xy} = \sum_{i=1}^{n} x_i y_i - \frac{\left(\sum_{i=1}^{n} y_i\right)\left(\sum_{i=1}^{n}
    x_i\right)}{n} = \sum_{i=1}^{n} y_i (x_i - \bar{x}) \quad (5.18)$$


    The residual e is the difference between the observed value $y_i$ and their fitted
    value $\hat{y}_i$


    $$e = y_i - \hat{y}_i \quad \text{for } i = 1, 2, ..., n \quad (5.19)$$'

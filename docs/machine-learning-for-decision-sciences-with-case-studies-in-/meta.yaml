    3 和决策树 *m*。每棵树都可以使用任何决策树算法（如 CART 和 ID3）构建。每个决策树都会产生一个值。每个决策树的输出在回归过程中被考虑。在分类过程中，使用投票机制。取每棵树的平均输出来计算最终类别，如图

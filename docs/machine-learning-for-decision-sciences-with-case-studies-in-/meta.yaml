    ### 5.1 引言


    监督学习是机器学习算法的一种变体，用于学习输入-输出配对样本。医学图像分析、预测分析和计算机视觉应用都利用这些监督算法对数据进行分类。为了获得有用的见解并发现模式，数据科学家会使用各种类型的机器学习算法。通常，根据学习数据以预测未来的方法，这些算法分为两类：监督学习和无监督学习。用户通过监督学习算法以期望的方式学习大数据。监督学习是一种广泛使用的机器学习算法，它通过确定近似映射函数
    Y=f(X) 来学习独立输入变量 (X) 和因变量输出变量 (Y) 之间的关系。这在图5.1中有所展示。其目标是学习一个最优映射函数，以了解它在对新的未知输入数据
    (X) 进行外推时的效果如何。


    监督学习技术包括支持向量机 (SVM)、线性回归、逻辑回归、多类分类和决策树。训练监督学习算法需要为每个输入提供正确的输出标签。例如，分类算法需要在经过正确标记相应数字
    (1-10) 的数字图像数据集训练后，对1到10的数字图像进行分类。回归和分类是监督算法可以高效学习的两大类问题。回归和分类问题的区别在于，回归问题的输出变量是连续的或数值型的，而分类问题的输出变量是离散的或分类型的。本章介绍了机器学习中所有监督算法背后的基本思想。详细阐述了监督算法背后的数学概念、实例以及使用Python的实现。本章详细解释了回归问题的监督算法及其Python实现。线性回归是根据输入x预测输出y坐标的基本回归算法。本章讨论了简单线性回归和多元线性回归等多种线性回归方法。


    ### 5.2 监督学习——现实场景


    监督学习是从标记数据中揭示隐藏模式和结构的任务。成功的监督学习需要技术专长来标记数据。在现实应用中，监督学习被广泛使用，例如目标检测、语言处理、语音识别、异常检测、产品推荐、信用风险分析、光学字符识别、医学诊断、蛋白质结构预测和生物识别。


    图5.1 输入与输出之间的映射。


    图5.2 使用监督学习进行预测。


    ## 5.3 监督学习的类型


    监督技术使用标记数据训练模型。训练过程应持续进行，直到性能水平足够高。训练完成后，系统应能正确预测新的未见数据，如图5.2所示。


    监督学习技术有两种类型：回归和分类。分类用于分离数据，而回归用于拟合数据。


    ### 5.3.1 监督学习——分类


    分类是将给定输入数据划分为不同类别的过程。分类问题的输出是离散的或分类型的值，例如正或负、垃圾邮件或非垃圾邮件。将肿瘤分类为恶性或良性，以及分类个人账户是否被入侵，都是分类问题的例子。分类可以是二分类或多分类。逻辑回归是二分类的最佳例子。多分类是指输出类别超过两个的问题；例如，字母字符识别就是一个多分类问题。各种分类技术包括决策树、逻辑回归、随机森林、梯度提升树、SVM和朴素贝叶斯算法。


    以下哪项是分类问题？


    - 预测新推出的SUV在未来6个月的销量。

    - 预测客户账户是否被入侵。


    解答：预测汽车销量输出是一个连续值，因此不是分类问题。预测账户是否被入侵是一个分类问题，其输出值是分类型的。


    图5.3 一个简单的分类示例。


    #### 5.3.1.1 分类——预测建模


    分类预测建模是近似一个从输入变量 (X) 到离散输出变量 (y) 的映射函数 (f) 的过程。映射函数 f 为给定的观测值预测其类别或类别。


    分类问题要求将输入数据划分为两个或更多类别之一。输入数据可以是离散的或连续的值。具有两个不同类别的问题称为二类或二分类问题，例如真或假。具有两个以上类别的问题通常称为多分类问题，例如带有愤怒、悲伤和快乐标签的情感分析。


    通常，分类模型为给定的输入预测一个连续的概率值，对应于每个输出类别。这些概率可以被解释为给定输入属于每个输出类别的可能性或置信度。预测概率可以通过选择概率最高的类别标签转换为类别值。例如，对于特定输入数据预测明天是否下雨，为输入数据分配概率，并选择概率大于截止值的标签，因为它具有最高的可能性，如图5.3所示。有许多方法可以衡量预测分类模型的性能，但最常见的是计算分类准确率。分类准确率是所有预测中正确分类的示例所占的百分比。


    例如，如果一个分类预测模型进行了十次预测，其中七次正确，三次错误，那么仅基于这些预测的模型分类准确率计算如下：


    ```

    accuracy = correct predictions / total predictions * 100

    accuracy = 7 / 10 * 100 = 70%

    ```


    ### 5.3.2 监督学习——回归


    回归是识别一个模型或函数的过程，用于将数据拟合到连续的实数值，而不是使用类别或离散值。例如，回归问题是基于数量的，其输出变量是实数或连续值，例如薪水、年龄、销售率、速度和体重。最简单的形式是线性回归，它试图用通过这些点的最优超平面或直线来拟合数据（图5.4）。


    **以下哪项是回归任务？**


    - 预测信用风险分析

    - 预测一个人的国籍

    - 预测特定地点明天的风速

    - 预测产品评论的情感'

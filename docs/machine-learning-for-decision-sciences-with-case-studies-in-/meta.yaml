    \ Time), draw a line graph to plot the values.\n- 5. What is the purpose of scaling\
    \ before plotting the graphs?\n\n## 3 Data Analytics Life Cycle for Machine Learning\n\
    \n### LEARNING OBJECTIVES\n\nAt the end of this chapter, the reader will be able\
    \ to:\n\n- Comprehend the phases involved in the Data Analytics Life Cycle for\
    \ machine learning (ML).\n- Appreciate the aspects involved in data discovery,\
    \ data preparation, and exploratory data analysis.\n- Understand the requirements\
    \ for model planning and model building.\n- Have a deep acquaintance on communicating\
    \ results, optimize and operationalize the models.\n- Gain knowledge on the roles\
    \ and responsibilities of the members involved throughout the phases of the Data\
    \ Analytics Life Cycle.\n\n### 3.1 INTRODUCTION\n\nThe data generated in the last\
    \ two years are much larger than the last 50 years combined. As the data grow\
    \ exponentially, it brings a huge issue. We have to manage it properly so that\
    \ the data can be used for business benefits. Adopting and successfully implementing\
    \ a framework will help the user to avoid data-related pitfalls. The framework\
    \ also helps the user to focus their time on data analysis (inference from data)\
    \ than data preparation, ensure the rigor and completeness of the data, enable\
    \ the better transition to members of the cross-functional analytic teams with\
    \ repeatable scale to additional analytics, and to support the validity of findings.\n\
    \nSeveral real-world data problems look complex and chaotic, but with a well-framed\
    \ approach, the complex problem can be broken down into simpler modules, which\
    \ can be easily addressed. Sometimes, applying a tested procedure for analyzing\
    \ the data is challenging. Hence, it is required to establish a comprehensive\
    \ method for performing the analysis. Once data are collected in several instants,\
    \ the user starts analyzing the data, then later plans and identifies the scope\
    \ and the amount of work involved. During the process, the people involved try\
    \ to explore a different objective or address a different issue that differs from\
    \ the objectives communicated. The documentation process helps demonstrate rigor\
    \ in the exploration and provides additional credibility to the project when shared\
    \ among the team. This helps the team in knowledge sharing and to adopt the methods\
    \ and analysis so it can be repeated and modified slightly over the successive\
    \ years.\n\nA well-defined process exists for developing a data science project.\
    \ However, it is always recommended to have a Data Analytic Life Cycle framework,\
    \ which is of primary focus in this chapter. Many of the proposed framework phases\
    \ will be similar. For example, the data discovery and data preparation phases\
    \ will be common, with subtle differences. However, some phases would not be needed\
    \ at all. For example, the model training phase of the framework requires the\
    \ user to create the training and testing datasets; the business intelligence\
    \ project will not have those phases. Subsequently, data science often deals with\
    \ various datasets such as big data, including semi-/unstructured data and sparse\
    \ datasets. Such datasets require more attentiveness in data preparation, data\
    \ stitching, and enriching than projects that only focus on business intelligence.\n\
    \nData preparation may be the most important part of a ML project. It is the most\
    \ time-consuming part, although it seems to be the least discussed topic. Data\
    \ preparation is also called data preprocessing and is the act of transforming\
    \ raw data into a form that is appropriate for modeling. ML algorithms require\
    \ input data to be numeric values, and most algorithm development and deployments\
    \ maintain this expectation. So, if the data contain data types and values that\
    \ are not numbers, such as labels, you will need to change the data into numbers.\
    \ Further, specific ML algorithms have expectations regarding the data types,\
    \ scale, probability distribution, and relationships between input variables.\
    \ You may need to change the data to meet these expectations.\n\nThe viewpoint\
    \ of data preparation is to discover how to best expose the unknown underlying\
    \ structure of the problem to the ML algorithms. This often requires an iterative\
    \ path of experimentation through a suite of different data preparation techniques\
    \ to discover what works well or best. The vast majority of the ML algorithms\
    \ used on a project are years-to-decades old. The implementation and application\
    \ of the algorithms are well understood. So much so that they are routine, with\
    \ amazing fully featured open-source ML libraries like Scikit-learn in python.\
    \ The thing that is different from project to project is the data. We may acquire\
    \ a new dataset for the first time in a new application setup to use a specific\
    \ data set as the basis for a predictive modeling project. As such, the preparation\
    \ of the data to best present it to the problem of the learning algorithms is\
    \ the primary task of any modern ML project.\n\nThe challenge of data preparation\
    \ is that each dataset is unique and different. Datasets differ in the number\
    \ of variables (tens, hundreds, thousands, or more), the types of the variables\
    \ (numeric, nominal, ordinal, Boolean), the scale of the variables, the drift\
    \ in the values over time, and more. As such, this makes discussing data preparation\
    \ a challenge. Either specific case studies are used, or focus is put on the general\
    \ methods used across projects. The result is that neither approach is explored.\n\
    \n### 3.2 DATA ANALYTICS LIFE CYCLE\n\nThe Data Analytics Life Cycle comprises\
    \ six phases, which are iterative between the steps throughout the life cycle.\
    \ The Data Analytics Life Cycle shown in Figure 3.1 portrays the best practices\
    \ approach for an end-to-end data analytics process starting from data discovery\
    \ to project completion and operation phase. The phases also cover the process\
    \ improvement based on established methods in the domain of data analytics and\
    \ decision science.\n\n### 3.2.1 Phase 1 – Data Discovery\n\nThe question to answer\
    \ in the data discovery phase is “Do we have enough information?”. Data discovery\
    \ is the process of collecting and analyzing data from various sources to realize\
    \ insight from hidden patterns and trends. It is the primary step in fully harnessing\
    \ an organization’s data to tell critical business decisions. Through the data\
    \ discovery process, data are gathered, combined, and analyzed during a sequence\
    \ of steps. The goal is to form messy and scattered data clean, understandable,\
    \ and user-friendly. The primary focus of this phase is to learn the business\
    \ domain, including learning from past experiences and further assessing the resources\
    \ required to support the project, such as human resources, time, technology,\
    \ and data. The business problem has to be framed in such a way with the focus\
    \ on the analytic challenge, and this would be addressed in subsequent Data Analytic\
    \ Life Cycle phases. Finally, the initial hypotheses (IHs) have to be formulated\
    \ to validate and begin learning the information.\n\nUnderstanding the domain\
    \ in-depth for the given problem we are trying to find an answer to is critical.\
    \ In a few situations, data scientists are required to possess advanced computational\
    \ and quantitative knowledge such that the applications can be multi-disciplinary.\
    \ These scientists are expected to possess an in-depth knowledge of the techniques,\
    \ methods, and models for applying heuristics to different business and conceptual\
    \ problems. Experts from domain areas with quantitative expertise"

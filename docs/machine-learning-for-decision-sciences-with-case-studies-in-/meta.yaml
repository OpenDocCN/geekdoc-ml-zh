    # 6.4.5 ALGORITHMS USED FOR DECISION TREES


    The dataset having many attributes (i.e., bank loans are given based on the attributes
    like employment status and salary) for root nodes are calculated from the following
    algorithm:


    +   1. CART 4.5

    2. ID3

    3. C 4.5


    In the ID3 algorithm, the information gain is used for the selection of root attributes.
    The information gain is calculated for each attribute, and the attributes having
    high information gain are selected as the root node. In C 4.5 algorithm, the gain
    information is used for the calculation of root attributes. The attributes having
    maximum gain ratio are selected as the root node. The CART 4.5 algorithm uses
    the Gini index to identify the attributes for the root node. The attribute having
    a low Gini index is selected as the root node.


    | S.No. | Algorithm | Parameter | Maximum/Minimum |

    |---|---|---|---|

    | 1 | ID3 algorithm | Information gain | Maximum |

    | 2 | C 4.5 | Gain index | Maximum |

    | 3 | CART | Gini index | Minimum |


    # 6.4.5.1 ID3 Algorithm


    If the decision tree has multiple attributes, then root node attributes can be
    selected using entropy and information gain.

    **Entropy:** Entropy is a measure of disorder. Entropy is small for the sample
    with only positive or negative values. It is high for the half-positive or half-negative
    value of the sample. Entropy is defined as the average optimal number of bits
    to encode information about certainty and uncertainty about Sample S.

    **Information gain:** Gain is a measure of uncertainty reduction. The sample having
    different classes has less information gain. Information gain is expressed in
    entropy.

    Let S be the sample of training examples, $p+$ be the number of positive samples,
    and $p-$ be the number of negative samples. Then, sample entropy is shown in Figure
    6.13.


    $$Entropy(S) = p_+ (-\log_2 p_+) + p_- (-\log_2 p_-)$$

    $$= - p_+ (\log_2 p_+) - p_-$$


    Information gain of samples concerning attribute a is given as


    $$Gain(S, A) = Entropy(s) - \sum \frac{S_v}{S} entropy(s_v)$$'

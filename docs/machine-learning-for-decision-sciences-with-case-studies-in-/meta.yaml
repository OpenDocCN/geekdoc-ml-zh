  md: '# TABLE 6.38

    GLCM Parameters


    | Parameter | Description |

    | :--- | :--- |

    | Entropy | Measures the degree of disorder among pixels in the image |

    | Energy | Provides the sum of squared elements in the GLCM |

    | Contrast | Measures the local variations in GLCM |

    | Correlation | Measures the joint probability occurrence of the specified pixel
    pairs |

    | Homogeneity | Measures the closeness of the distribution of elements in the
    GLCM to the GLCM diagonal. |

    | Difference variance | Measures the dispersion related to the gray-level difference
    distribution of image |

    | Difference entropy | Measures the disorder related to the gray-level difference
    distribution of image |



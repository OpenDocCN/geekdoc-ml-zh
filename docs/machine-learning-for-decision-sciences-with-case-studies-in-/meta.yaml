  md: 'When using PCA to reduce dimension, one has to deal with how many principal
    components ($k$) should be used. As with all hyperparameters, this number can
    be changed based on the quality of the emerging model. But some tests do not include
    expensive calculations. Therefore, another option is to select a $k$ in the account
    with the desired value of the total variance. (This option is available in the
    scikit-learn package PCA.) The variations of projection onto the $k$th component
    are:


    $$|Xv_k|^2 = ||u_k \sigma_k||^2 \sigma_k^2 \quad (7.8)$$


    which is the square of the $k$th largest singular value of $X$. The ordered list
    of singular values of a matrix is called its spectrum. Therefore, to define how
    many components to use, one can perform a simple spectral analysis of the data
    matrix and pick the threshold that retains enough variance.

    To retain enough components to cover 80% of the total variance in the data, pick
    $k$ such that


    $$\frac{\sum_{i=1}^{k} \sigma_i^2}{\sum_{i=1}^{d} \sigma_i^2} \geq 0.8 \quad (7.9)$$


    PCA is computationally expensive. It relies on SVD, which is an expensive process.
    Calculation of the full SVD of the matrix takes O-functions ($nd^2+d^3$) by assuming
    $n \geq d$ where there are more data points than features. Even if we only want
    the principal components of $k$, using a reduced SVD (single $k$ values and vectors)
    still takes $O((n+d)^2k)=O(n^2k)$ operations. This is available when there are
    a large number of data points or features. It is difficult to perform PCA in the
    form of streaming, batch updates, or a sample of full data. Streaming computation
    of the SVD, updating the SVD, and computing the SVD from a subsample are all difficult
    research problems.

    Algorithms exist but at the cost of reduced accuracy. One implication is that
    one has to expect lower representational accuracy when capturing test data in
    the principal components found in the training set. In addition, as the distribution
    of the data changes, one needs to recompute the principal components in the current
    dataset.


    # 7.6.1 FACTOR ANALYSIS VS. PRINCIPAL COMPONENT ANALYSIS


    +   - PCA components define a high degree of variability, while FA defines covariance
    in data.

    - PCA components are completely orthogonal to each other, while FA does not require
    factors to be orthogonal.

    - Components of PCA are a linear combination of the observed variable, while in
    FA, the observed variables are a linear combination of the unobserved variables
    or factors.

    - PCA components are not defined. In FA, key factors are sets and interpretable.

    - PCA is a method of reducing the dimension, whereas FA is the latent variable
    method.

    - PCA is a type of FA. PCA is observational, whereas FA is a modeling technique.



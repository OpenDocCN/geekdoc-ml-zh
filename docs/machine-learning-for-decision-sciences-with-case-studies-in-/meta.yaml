    # 7.6 FEATURE REDUCTION


    The art of machine learning begins with the creation of appropriate data presentations.
    Better performance is often achieved using features taken from the original input.
    Creating a feature presentation can add domain information to the data and can
    be specified by the specific application. However, there are many ways to make
    common features, including clustering, basic input linear transform variables
    [PCA/SVD, linear discriminant analysis (LDA)], complex line variations such as
    spectral transformations (Fourier, Hadamard), wavelet transform, or convolutions
    of kernels, and apply simple functions to flexible subsets, such as monomials.

    Two different objectives can be pursued by feature design: to achieve data reconstruction
    or be more efficient in making predictions. The first problem is an unsupervised
    learning problem. It is very close to data compression, and many algorithms are
    used in both fields. The second problem is supervised. Are there reasons to select
    features in an unsupervised manner when the problem is supervised? Yes, with a
    few possibilities. Other problems, e.g., for text processing applications, come
    with unlabeled data compared to labeled data. Also, the selection of unsupervised
    features is not usually overdone to overfitting.

    Our goal is to have an algorithm-friendly dataset. What do we mean by that?

    If you have a lot of features, there are a few potential problems:


    +   - The model has a high degree of difficulty.

    - It can make a lot of noise.

    - If they have different scales, it reduces the performance of several algorithms
    that are scale-sensitive.

    - More complex visualizations in n-dimensional space.


    Here comes the role of PCA. It reduces the dimensionality of the dataset by extracting/eliminating
    the important/unimportant features.

    PCA detects a change that reduces the size of the data while calculating the variance
    as large as possible. PCA is the oldest process in a multivariate analysis. The
    basic concept of PCA is a projection-based process. Here, the actual dataset X
    ∈ R n with n columns (features) is projected into a subspace with k or lower dimensions''
    representation X ∈ R K (fewer columns) while maintaining the total amount of original
    data.

    The algorithm works as follows: to reduce the dimensionality of the feature from
    n-dimensions to k-dimensions, two stages are implemented; the preprocessing and
    dimensionality reduction stage. First, in the preprocessing stage (steps 1–4 in
    Section 7.4), the data is preprocessed to normalize its mean and variance using
    equations 7.3 and 7.4 in Section 7.4. Then, in the second stage (steps 5–8 in
    Section 7.4), which denotes the reduction phase, the covariance matrix C_M, eigenvectors
    and eigenvalues are calculated from equations 7.5 and 7.6 in Section 7.4.'

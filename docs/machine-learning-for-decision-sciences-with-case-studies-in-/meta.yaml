    \n## 9.2 用例2 – 购物篮分析（MBA）\n\n### 9.2.1 引言\n\n顾客购物篮分析是大型零售商用来发现商品组合和关联的重要技术之一。这个过程是通过寻找在交易中共同出现的商品组合来完成的。换句话说，它允许零售商识别人们购买的商品之间的关联。这个假设基于这样一个理论：购买一件商品的顾客更有可能购买另一件相关商品。\n\
    \n例如，购买女式袜子的人通常也会购买童装。因此，零售连锁店的营销团队会针对那些购买女装和童装的顾客，并为他们提供折扣以购买第三件商品，比如小首饰（这对零售商来说利润率很高）。这也决定了商店的布局方式。其变体称为空间和容量分析。根据顾客行为，可以安排商店布局以最大化货架空间的收入。\n\
    \n因此，如果顾客购买了女装和童装，并看到首饰的折扣或优惠，他们就会被鼓励花更多的钱购买首饰。这就是所谓的购物篮分析，或市场购物篮分析，简称MBA。这只是一个例子。因此，如果我们获取超市成千上万件商品的数据，我们就能获得大量的洞察。这就是为什么关联规则挖掘如此重要。\n\
    \n### 9.2.2 理解数据\n\n在这个例子中，我们使用一个详细描述顾客的数据集，如位置、年龄、收入和教育程度，以及产品和产品类别，它们提供了产品及其分组的详细信息，商店包含位置、面积、商店类型（是超市、迷你店等）、区域和时间维度的详细信息。我们还使用销售交易数据。\n\
    \n在这个解决方案中，我们使用Apriori和Fpgrowth算法。Apriori是一种基于关系数据库学习的频繁项集挖掘和关联规则挖掘算法。它通过识别数据集中重复出现的单个项目，并将其扩展到更大的项集来推进，只要这些项集在数据库中出现的频率足够高。另一方面，Fpgrowth，也称为频繁模式增长算法，仅根据用户的最小支持度生成频繁项集。Apriori和Fpgrowth算法之间的一个区别是，Fpgrowth算法不会多次扫描整个数据库，扫描时间线性增加。因此，Fpgrowth算法比Apriori算法快得多。\n\

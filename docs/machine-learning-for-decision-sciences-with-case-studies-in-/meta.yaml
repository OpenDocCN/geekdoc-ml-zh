    # 7.4 PRINCIPAL COMPONENT ANALYSIS


    With automatic data collection and feature-generating techniques, one can quickly
    discover a large number of features. But not all are helpful. Let’s discuss feature
    dimensionality reduction using PCA. Often, we encounter situations where a particular
    outcome or decision depends not on a single indicator (forecaster) but many complex
    factors of the decision-making process. This is called the curse of dimensionality.
    It is a well-known fact that it is important to limit the number of important
    factors to reach the right conclusion. This process is called dimensionality reduction.
    In machine learning, the problem of high dimensionality is treated in two ways:


    +   - **Feature selection**: a careful selection of key features by filtering
    out inconsistent features.

    - **Feature extraction**: we create new and relevant features from the original
    features. PCA is one of the key means of extracting a feature.


    Similarly, PCA converts the corresponding features of data into orthogonal components
    to capture all important information from the data while minimizing its size.

    PCA can be used in the following means:


    +   - Limit the number of features but cannot identify the less important ones
    that are ignored.

    - Make sure that data features are standalone even if the features are not slightly
    interpreted.


    # 7.4.1 CENTER THE DATA


    Eigen decomposition produces transformation matrices where eigenvectors denote
    the rotational matrix, while eigenvalues denote scaling factors. Conversely, the
    covariance matrix has no data related to data translation. Undeniably, the translation
    is represented by an affine transformation required instead of a linear transformation.
    Consequently, before installing PCA to exchange data for obtaining unrelated axes,
    any existing changes need to be calculated by removing the mean data from each
    data point. This is just like entering the data in such a way that its scale becomes
    zero.


    # 7.4.2 NORMALIZE THE DATA


    Eigenvector covariance matrix points when referring to large data differences.
    Conversely, variance is a whole number, not a relative. This means that the difference
    in data measured in inches will be much greater than the same data when measured
    in feet. For instance, one feature denotes an object’s length in meters, while
    the second feature denotes the object in inches. If the data is normalized, the
    biggest difference, and therefore the largest eigenvector, will be fully determined
    by the first factor. To avoid this PCA scale-based approach, it helps normalize
    the data by separating each feature with a standard deviation. This is particularly
    significant when different features are related to different metrics.


    # 7.4.3 ESTIMATE THE EIGEN DECOMPOSITION


    As details will be shown to larger eigenvectors to reduce the size, eigendecomposition
    must be determined. One of the most widely used methods of calculating eigendecomposition
    is singular value decomposition (SVD).


    # 7.4.4 PROJECT THE DATA


    To reduce the size, the data is automatically displayed to the largest eigenvectors.
    Let *W* be a matrix with its columns containing the largest eigenvectors and let
    *O* be the original data with its columns'

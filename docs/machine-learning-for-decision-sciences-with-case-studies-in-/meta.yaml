    # 6.6.4 DUAL FORMULATION


    Lagrangian duality for a primal problem is to minimize $f(w)$ where $w$ is the
    parameter. There are two linear constraints: inequality constraints $g(w)$ and
    equality constraints $h(w)$.


    $$\min_w f(w) \quad (6.44)$$

    $$\text{s.t. } g_i(w) \leq 0, \quad i = 1, 2, ..., k$$

    $$h(w) = 0 \quad i = 1, 2, ..., l$$


    The generalized Lagrangian is given as $L(w, \alpha, \beta)$ where $\alpha, \beta$
    are Lagrange multipliers and $\alpha \geq 0$


    $$L(w, \alpha, \beta) = f(w) + \sum_{i=1}^k \alpha_i g_i(w) + \sum_{i=1}^l \beta_i
    h_i(w) \quad (6.45)$$


    Lemma:


    $$\max_{\alpha, \beta, \alpha \geq 0} L(w, \alpha, \beta) = \begin{cases} f(w)
    & \text{if } w \text{ Satisfies primal constraints} \ \infty & \text{Otherwise}
    \end{cases}$$


    The solution to the primal problem is $p^*$, and the dual problem is $d^*$.


    Theorem (Weak Duality)


    $$p^* = \min_w \max_{\alpha, \beta, \alpha \geq 0} L(w, \alpha, \beta)$$

    $$\nwarrow \searrow$$

    $$d^* = \max_{\alpha, \beta, \alpha \geq 0} \min_w L(w, \alpha, \beta)$$


    $$d^* = \max_{\alpha, \beta, \alpha \geq 0} \min_w L(w, \alpha, \beta) \leq \min_w
    \max_{\alpha, \beta, \alpha \geq 0} L(w, \alpha, \beta) = p^* \quad (6.46)$$


    Theorem (Strong Duality)


    If there exists a saddle point of $L(w, \alpha, \beta)$, we have $d^* = p^*$.
    As per the strong duality theorem, when the saddle point exists, the following
    Karush-Kuhn-Tucker (KKT) conditions are satisfied.


    $$\frac{\partial}{\partial w_i} L(w, \alpha, \beta) = 0, \quad i = 1, ..., k$$

    $$\frac{\partial}{\partial b_i} L(w, \alpha, \beta) = 0, \quad i = 1, ..., l$$

    $$\alpha_i g_i(w) = 0, \quad i = 1, ..., m$$

    $$g_i(w) \leq 0, \quad i = 1, ..., m$$

    $$\alpha_i \geq 0, \quad i = 1, ..., m$$


    The theorem states that if $w^*, \alpha^*$, and $\beta^*$ satisfy KKT conditions,
    then it is a solution to the primal and dual problems.'

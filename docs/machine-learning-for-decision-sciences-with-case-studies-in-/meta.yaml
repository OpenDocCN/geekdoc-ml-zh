    $W$ which, directly, can define the number of variations of actual data that need
    to be maintained while removing eigenvectors. If only $N$ eigenvectors are stored,
    and $e_1, \dots, e_N$ denote the respective eigenvalues, the number of variants
    leftover after projected original d-dimensional data can be calculated as:


    $$s = \frac{\sum_{i=0}^{N} e_i}{\sum_{j=0}^{d} e_j}$$ (7.2)


    +   1. The original feature values of the given data are normalized by its mean

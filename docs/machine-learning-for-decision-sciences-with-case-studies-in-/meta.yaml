  md: '# Appendix


    | Predicting output | | |

    | :--- | :--- | :--- |

    | Supervised Estimators | Unsupervised Estimators | |

    | >>> y_pred = svc.predict(np.random.random((2,5))) | >>> y_pred = k_means.predict(X_test)
    | |

    | >>> y_pred = lr.predict(X_test) | | |

    | >>> y_pred = knn.predict_proba(X_test) | | |


    | Clustering Metrics Model Performance | | |

    | :--- | :--- | :--- |

    | Adjusted Rand Index | Homogeneity | Cross-Validation |

    | >>> from sklearn.metrics import adjusted_rand_score | >>> from sklearn.metrics
    import homogeneity_score | >>> print(cross_val_score(knn, X_train, y_train, cv=4))
    |

    | >>> adjusted_rand_score(y_true, y_pred) | >>> homogeneity_score(y_true, y_pred)
    | >>> print(cross_val_score(lr, X, y, cv=2)) |


    | Classification Metrics Model Performance | | |

    | :--- | :--- | :--- |

    | Accuracy Score | Classification Report | Confusion Matrix |

    | >>> knn.score(X_test, y_test) | >>> from sklearn.metrics import classification_report
    | >>> from sklearn.metrics import confusion_matrix |

    | >>> from sklearn.metrics import accuracy_score | >>> print(classification_report(y_test,
    y_pred)) | >>> print(confusion_matrix(y_test, y_pred)) |

    | >>> accuracy_score(y_test, y_pred) | | |'

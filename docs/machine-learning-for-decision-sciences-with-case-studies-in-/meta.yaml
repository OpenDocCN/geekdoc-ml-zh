    and artificial intelligence in the last decade because of the following:


    - Python is a platform-independent language.

    - Python has concise and readable code, promotes rapid testing of complex algorithms,
    and makes the language accessible to non-programmers.

    - While complex algorithms and versatile workflows stand behind ML, Python’s simplicity
    allows developers to write reliable code.

    - Developers get to focus on solving an ML problem instead of focusing on the
    technical nuances of the language.

    - It can do a set of complex ML tasks and enable you to build prototypes quickly
    that allow you to test your product for ML purposes.

    - Python comes with multiple frameworks and libraries to reduce developers’ development
    time, and these libraries can be easily configurable. A software library is a
    pre-written code that developers use to solve everyday programming tasks.

    - Python, with its rich technology stack, has an extensive set of libraries for
    ML.

    - Python contains statistical libraries for statistical operation. It makes data
    visualizations easier.

    - A larger user community works toward updating and sharing the libraries continuously.

    - If the organization uses Python for other development activities, such as desktop
    development, those skills can be easily transferred to ML projects.


    This chapter discusses how to set up Python Integrated Development Environment
    (IDE), Python frameworks, and libraries useful for ML and deep learning.



    Extremely randomized trees do not use bagging to create a collection for each
    tree of training samples. Instead, the same set of input learning is used to train
    all trees. Extremely randomized trees strongly choose a split node (both a variable
    index and a variable split value are randomly selected). In contrast, RF considers
    the strongest split between random subsets of variables (optimal'

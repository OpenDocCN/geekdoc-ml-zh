    where $p/1-p$ is the odds ratio and $\ln(p/1-p)$ is the logit odds ratio.


    $$\text{Odds} = \frac{p(\text{event})}{1-p(\text{event})} \quad (6.8)$$


    The odds ratio is the ratio between the probability of success and the probability
    of failure. Let us understand how to calculate the odds ratio with a simple illustration
    using Table 6.2.

    Odds that a person who had anger treatment got a heart attack=$R_{11}/R_{21}=3/6=0.5$

    Odds that a person who had not undergone anger treatment got a heart attack=$R_{12}/R_{22}=7/4=1.75$

    Relative odds/odds ratio=$(R_{12}/R_{22})/(R_{11}/R_{21})=1.75/0.5=0.285$

    To estimate the probability of heart attack with respect to anger treatment, logistic
    function is used


    $$\ln\left(\frac{p}{1-p}\right) = \beta_0 + \beta_1x_1$$


    where $\beta_0$ and $\beta_1$ are regression coefficients and $p$ is the probability
    of a person who has suffered a heart attack.


    # 6.3.2 VARIANTS OF LOGISTIC REGRESSION


    The major types of logistic regression (Figure 6.2) are


    +   - Simple logistic regression

    - Multiple logistic regression

    - Binary logistic regression


    # 6.3.2.1 Simple Logistic Regression


    It is a simpler form with only one independent variable. The general form of simple
    logistic regression is $\ln\left(\frac{p}{1-p}\right) = \beta_0 + \beta_1$. To
    predict the presence of heart disease (Yes/No) based on only one variable, say
    a smoking habit is a simple logistic regression type. The variable description
    for heart disease $y$ and smoking habit $x_1$ is


    $$\text{Presence of heart disease } y = \begin{cases} 1 & \text{Yes} \ 0 & \text{No}
    \end{cases}$$'

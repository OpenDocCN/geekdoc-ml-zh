    \n```python\ncorr = data.corr()\ncg = sns.clustermap(corr, cmap =\"YlGnBu\", linewidths\
    \ = 0.1);\nplt.setp(cg.ax_heatmap.yaxis.get_majorticklabels(), rotation = 0)\n\
    cg\n```\n\nThe output is shown in Figure 3.24.\n\nNow that we have explored the\
    \ correlation between all variables, let us focus on the SalePrice column, and\
    \ on how it is correlating with other columns (Figure 3.25).\n\nk=20 #k: number\
    \ of variables for heatmap – the # of variables that will be compared against\

    # 6.5.11.1 Machine Fault Diagnosis


    RF algorithm is a novel assembly classifier that creates many decision trees to
    improve the single tree classification. While there are many current fault diagnostic
    techniques, such as artificial neural networks and SVMs, RF research is essential
    due to its fast speed, tree classifier characteristics, and high performance in
    computer fault diagnosis. Moreover, it is proved that by combining with other
    optimization methods, the RF-based diagnosis approach can produce more accurate
    results.

    RF adopts a set of decision trees and defines by majority voting algorithm the
    categorical groups. To check the quality of RF, a serious consideration of overfitting
    is therefore required. Some of the research work is done by combining RFs with
    genetic algorithms. In this approach, the RF is developed by using a decision
    tree from the CART algorithm. The tree is built by splitting a node recursively.

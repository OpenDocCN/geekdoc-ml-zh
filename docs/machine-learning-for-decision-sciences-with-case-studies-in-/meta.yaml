    # 6.6.1 Geometric Intuition


    SVM is a supervised learning algorithm in which the learning model is provided
    with the set of inputs and their associated outputs or labels. SVMs are used in
    classification problems. The classification problem can be viewed as the task
    of separating classes in feature space. To understand the mystery of SVM, a simple
    binary classification problem with two classes is considered as an example, as
    shown in Figure 6.85. It consists of a decision boundary or hyperplane that separates
    the two classes. The goal of SVM is to choose an optimized hyperplane for separating
    the classes. For example, in Figure 6.85, many possible lines separate the two
    classes, and the dark shaded thick line is the optimal hyperplane among all others.


    The support vectors are the essential data points that are closer to the decision
    boundary. The *main objective of SVM* is to find an optimal hyperplane classifier
    for this problem. The optimal hyperplane is to identify the maximum distance between
    the support vectors and the hyperplane.


    +   a. the distance to the closest negative sample $d_2$ is lesser than the distance
    to the closest positive sample $d_1$. In contrast to Figure 6.86,

    b. the optimal hyperplane was found where the distance to the closest negative
    sample $d_2$ is equal to the distance to the closest positive sample $d_1$.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_329_0.png)


    FIGURE 6.85 Identifying an optimal hyperplane.'
- md: '## 6.6.2 MATHEMATICAL FORMULATION


    Let us understand the mathematical intuition behind SVM by defining functional
    and geometrical margins. Functional margin is defined as the distance between
    the arbitrary point $(x_i, y_i)$ and the decision boundary $(w, b)$. Functional
    margin $\gamma^i$ is the distance between $(x_i, y_i)$ and the decision boundary
    and is derived in Equation 6.28.


    $$\gamma^i = y_i (w^T x_i + b) \quad (6.28)$$


    Similarly, for another point $(x_j, y_j)$ that is farther from the decision boundary,
    the functional margin is as follows in Equation 6.29.


    $$\gamma^j = y_j (w^T x_j + b) \quad (6.29)$$


    The functional margin of point $(x_i, y_i)$ is greater than the functional margin
    of point $(x_j, y_j)$, as shown in Figure 6.90. The larger the functional margin,
    the higher the confidence.


    And now, we can define the functional margin for a set of training points $S =
    \{(x_1, y_1), (x_2, y_2), \dots, (x_m, y_m)\}$


    $$\gamma = \min \gamma^i \text{ for } i = 1, 2, \dots, m \quad (6.30)$$


    If we scale $w$ and $b$, the functional margin gets larger. To overcome this drawback,
    a geometric margin comes into the picture. Figure 6.91 shows that the **geometric
    margin** is invariant to the scaling of the equation. Let $w$ be the vector normal
    to the decision surface.


    And let $\frac{w}{\|w\|}$ be the unit vector normal to the decision surface. For
    example, let us assume $w = (2, 3)$, then $\|w\| = \sqrt{2^2 + 3^2}$


    $$\frac{w}{\|w\|} = \left( \frac{2}{\sqrt{13}}, \frac{3}{\sqrt{13}} \right) \quad
    (6.31)$$


    ![](img/7fbca4852dbe91c6cea209148871a1b3_332_0.png)


    FIGURE 6.90 Functional margin.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_333_0.png)


    FIGURE 6.91 Geometric margin.


    Now, if we want to find the distance of $p$ from $q$. But the distance is in the
    direction of $w$, and we can write it as


    $$p = q + \gamma \frac{w}{\|w\|} \quad (6.32)$$


    The above equation 6.32 can be rewritten as


    $$(a_1, a_2) = (b_1, b_2) + \gamma \frac{w}{\|w\|}$$

    $$w^T \left( (a_1, a_2) - \gamma \frac{w}{\|w\|} \right) + b = 0$$

    $$\gamma = y \frac{(w^T (a_1, a_2) + b)}{\|w\|} \quad (6.33)$$


    Now, we can scale $\|w\|=1$; then,


    $$\gamma = y(w^T (a_1, a_2) + b) \quad (6.34)$$


    After normalization, the geometric margin is


    $$\frac{\gamma}{\|w\|} \quad (6.35)$$


    $$w^T x_i + b \geq \gamma \text{ for + ve points}$$

    $$w^T x_i + b < \gamma \text{ for - ve points}$$


    and can be rewritten as


    $$y_i(w^T x_i + b) \geq 1$$

    $$y_i(w^T x_i + b) < 1 \text{ for } i = 1, 2, ..., m$$


    $$\gamma = 1$$


    $$\text{maximize } \frac{1}{\|w\|} \equiv \text{minimize } \frac{1}{2}\|w\|^2$$


    Hence, the formulation for optimization problem concerning SVM subject to linear
    constraints is given as follows:


    $$\text{minimize } \frac{1}{2}\|w\|^2 \quad (6.36)$$

    $$\text{s.t. } y_i(w^T x_i + b) \geq 1$$


    ## 6.6.2.1 Maximize Margin with Noise


    SVM can handle the noise in the data in a very efficient way. The optimization
    function is required to find the weight vector $w$ and $b$ such that the margin
    width is maximized. So the margin can be written as in Equation 6.37.


    $$\text{max } \frac{2}{\|w\|} \quad (6.37)$$


    And for each of the $m$ training points $(x_i, y_i)$


    $$\text{s.t. } y_i(w^T x_i + b) \geq 1$$


    and can be rewritten as a minimization problem


    $$\|w\|^2 = w \cdot w \text{ is minimized}$$


    And for each of the m training points $(x_i, y_i)$


    $$\text{s.t. } y_i(w^T x_i + b) \geq 1$$


    The main objective is to minimize $w \cdot w + c$ where $c$ is the distance of
    error points to their correct zones.


    ## 6.6.2.2 Slack Variable $\xi_i$


    In Figure 6.92, there are two wrongly classified slack variables given as $\xi_1,
    \xi_2$ and the maximum margin is given as $M$, which we want to maximize.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_335_0.png)


    FIGURE 6.92 Maximize margin with noise.


    The maximum margin with noise is defined by adding the penalty due to slack variables.


    $$\text{minimize } w \cdot w + c \sum_{k=1}^{n} \xi_k \quad (6.38)$$

    $$\text{s.t. } y_k(w \cdot x_k + b) \geq 1 - \xi_k, \quad k = 1, ..., m$$

    $$\xi_k \geq 0, \quad k = 1, ..., m$$


    The Lagrangian of this quantity will be given in Equation 6.39.


    $$L(w, b, \xi, \alpha, \beta) = \frac{1}{2} w \cdot w + C \sum_{i=1}^{m} \xi_i
    + \sum_{i=1}^{m} \alpha_i [y_i(x \cdot w + b) - 1 + \xi_i] - \sum_{i=1}^{m} \beta_i
    \xi_i \quad (6.39)$$


    where $\alpha_i$ and $\beta_i$ are Lagrange multipliers $\geq 0$


    The soft SVM separates the positive and negative points. And the solution to the
    dual problem is given in Equation 6.40.


    $$w = \sum_{i=1}^{m} \alpha_i y_i x_i \quad (6.40)$$


    $$b = y_k(1 - \xi_k) - \sum_{i=1}^{m} \alpha_i y_i x_i x_k \quad (6.41)$$


    for any $k$ such that $\alpha_k > 0$. And for classification, the function $f(x)$
    is given as in Equation 6.42.


    $$f(x) = \sum_{i=1}^{m} \alpha_i y_i x_i \cdot x + b \quad (6.42)$$


    where $x$ is the test point and $\alpha_i$ is nonzero support vectors.


    However, the decision surface classifier is still linear and cannot handle the
    nonlinear case. Overfitting is controlled by soft margin SVM. The difference between
    soft margin and hard margin of SVM is presented in Figure 6.93.


    Let see a simple example in one-dimensional space as shown in Figure 6.94. Suppose
    we have three data points and one scalar feature $x$ with two negative classes
    ($x=-3$ and $-1$) and one positive class ($x=2$). These data are easily separable
    with many linear classifiers ($wx+b$). So let’s find the classifier with maximum
    margin.


    $x = -3$ and $y = -1$


    $x = -1$ and $y = -1$


    $x = 2$ and $y = 1$


    The margin constraints are rewritten and visualized in two-dimensional spaces
    as in Figure 6.95. The set of parameters that satisfy our margin constraints are
    shown in the green-shaded region.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_336_0.png)


    **FIGURE 6.93** (a) Soft margin SVM and (b) hard margin SVM.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_336_1.png)


    **FIGURE 6.94** Points at one-dimensional space.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_337_0.png)


    FIGURE 6.95 Visualization of margin constraints in 2D space.


    $$a(-3) + b < -1 \rightarrow b < 3a - 1$$

    $$a(-1) + b < -1 \rightarrow b < a - 1$$

    $$a(2) + b < +1 \rightarrow b > -2a + 1$$


    Finally, the objective is to minimize $\|a\|$.


    ## 6.6.3 Loss Minimization


    In Figure 6.96, the data point $D$ is misclassified, and for such instance, SVM
    defines slack variable $\xi$


    $$\text{minimize } \frac{1}{2}\|w\|^2 + C \sum_i \xi$$

    $$\text{s.t. } y_i(w^T x_i + b) \geq 1$$

    $$\text{minimize } \frac{1}{2}\|w\|^2 + C \sum_i \max(0, 1 - y_i(w^T x_i)) \quad
    (6.43)$$


    where $C$ is the regularization parameter that can be set using cross-validation.


    An instance may have four possible cases described in Figure 6.96 while classifying
    the data points.


    - 1. The data point A is on the correct side, and far away from the margin, then
    the penalty is 0

    - 2. The data point B is on the correct side, and closer to the margin, then the
    penalty is 0

    - 3. The data point C is the correct side but is in the margin lying very close
    to the hyperplane then the penalty is $1 - y_i(w^T x_i)$

    - 4. The data point D is on the wrong side; then, the penalty is $1 - y_i(w^T
    x_i)$


    And the comparison of hinge loss with 0–1 loss is shown in Figure 6.97.'
  mdcn: '## 6.6.2 数学表述


    让我们通过定义函数间隔和几何间隔来理解支持向量机背后的数学直觉。函数间隔定义为任意点 $(x_i, y_i)$ 与决策边界 $(w, b)$ 之间的距离。函数间隔
    $\gamma^i$ 是点 $(x_i, y_i)$ 与决策边界之间的距离，其推导见公式 6.28。


    $$\gamma^i = y_i (w^T x_i + b) \quad (6.28)$$


    类似地，对于另一个离决策边界更远的点 $(x_j, y_j)$，其函数间隔如公式 6.29 所示。


    $$\gamma^j = y_j (w^T x_j + b) \quad (6.29)$$


    点 $(x_i, y_i)$ 的函数间隔大于点 $(x_j, y_j)$ 的函数间隔，如图 6.90 所示。函数间隔越大，置信度越高。


    现在，我们可以定义一组训练点 $S = \{(x_1, y_1), (x_2, y_2), \dots, (x_m, y_m)\}$ 的函数间隔


    $$\gamma = \min \gamma^i \text{ for } i = 1, 2, \dots, m \quad (6.30)$$


    如果我们缩放 $w$ 和 $b$，函数间隔会变大。为了克服这个缺点，引入了几何间隔。图 6.91 显示**几何间隔**对于方程的缩放是不变的。令 $w$ 为垂直于决策面的向量。


    令 $\frac{w}{\|w\|}$ 为垂直于决策面的单位向量。例如，假设 $w = (2, 3)$，则 $\|w\| = \sqrt{2^2 + 3^2}$


    $$\frac{w}{\|w\|} = \left( \frac{2}{\sqrt{13}}, \frac{3}{\sqrt{13}} \right) \quad
    (6.31)$$


    ![](img/7fbca4852dbe91c6cea209148871a1b3_332_0.png)


    图 6.90 函数间隔。


    ![](img/7fbca4852dbe91c6cea209148871a1b3_333_0.png)


    图 6.91 几何间隔。


    现在，如果我们想找到点 $p$ 到点 $q$ 的距离。但这个距离是在 $w$ 的方向上，我们可以将其写为


    $$p = q + \gamma \frac{w}{\|w\|} \quad (6.32)$$


    上述公式 6.32 可以改写为


    $$(a_1, a_2) = (b_1, b_2) + \gamma \frac{w}{\|w\|}$$

    $$w^T \left( (a_1, a_2) - \gamma \frac{w}{\|w\|} \right) + b = 0$$

    $$\gamma = y \frac{(w^T (a_1, a_2) + b)}{\|w\|} \quad (6.33)$$


    现在，我们可以缩放 $\|w\|=1$；那么，


    $$\gamma = y(w^T (a_1, a_2) + b) \quad (6.34)$$


    归一化后，几何间隔为


    $$\frac{\gamma}{\|w\|} \quad (6.35)$$


    $$w^T x_i + b \geq \gamma \text{ 对于正类点}$$

    $$w^T x_i + b < \gamma \text{ 对于负类点}$$


    并且可以改写为


    $$y_i(w^T x_i + b) \geq 1$$

    $$y_i(w^T x_i + b) < 1 \text{ for } i = 1, 2, ..., m$$


    $$\gamma = 1$$


    $$\text{最大化 } \frac{1}{\|w\|} \equiv \text{最小化 } \frac{1}{2}\|w\|^2$$


    因此，关于支持向量机在受线性约束下的优化问题表述如下：


    $$\text{最小化 } \frac{1}{2}\|w\|^2 \quad (6.36)$$

    $$\text{约束条件 } y_i(w^T x_i + b) \geq 1$$


    ## 6.6.2.1 带噪声的最大间隔


    支持向量机可以非常有效地处理数据中的噪声。优化函数需要找到权重向量 $w$ 和 $b$，使得间隔宽度最大化。因此，间隔可以写成公式 6.37。


    $$\text{最大 } \frac{2}{\|w\|} \quad (6.37)$$


    并且对于 $m$ 个训练点中的每一个 $(x_i, y_i)$


    $$\text{约束条件 } y_i(w^T x_i + b) \geq 1$$


    并且可以改写为一个最小化问题


    $$\|w\|^2 = w \cdot w \text{ 被最小化}$$


    并且对于 $m$ 个训练点中的每一个 $(x_i, y_i)$


    $$\text{约束条件 } y_i(w^T x_i + b) \geq 1$$


    主要目标是最小化 $w \cdot w + c$，其中 $c$ 是错误点到其正确区域的距离。


    ## 6.6.2.2 松弛变量 $\xi_i$


    在图 6.92 中，有两个被错误分类的松弛变量，记为 $\xi_1, \xi_2$，最大间隔记为 $M$，我们希望最大化它。


    ![](img/7fbca4852dbe91c6cea209148871a1b3_335_0.png)


    图 6.92 带噪声的最大间隔。


    带噪声的最大间隔是通过添加由松弛变量引起的惩罚来定义的。


    $$\text{最小化 } w \cdot w + c \sum_{k=1}^{n} \xi_k \quad (6.38)$$

    $$\text{约束条件 } y_k(w \cdot x_k + b) \geq 1 - \xi_k, \quad k = 1, ..., m$$

    $$\xi_k \geq 0, \quad k = 1, ..., m$$


    该量的拉格朗日函数将在公式 6.39 中给出。


    $$L(w, b, \xi, \alpha, \beta) = \frac{1}{2} w \cdot w + C \sum_{i=1}^{m} \xi_i
    + \sum_{i=1}^{m} \alpha_i [y_i(x \cdot w + b) - 1 + \xi_i] - \sum_{i=1}^{m} \beta_i
    \xi_i \quad (6.39)$$


    其中 $\alpha_i$ 和 $\beta_i$ 是拉格朗日乘子 $\geq 0$


    软支持向量机分离正类点和负类点。对偶问题的解在公式 6.40 中给出。


    $$w = \sum_{i=1}^{m} \alpha_i y_i x_i \quad (6.40)$$


    $$b = y_k(1 - \xi_k) - \sum_{i=1}^{m} \alpha_i y_i x_i x_k \quad (6.41)$$


    对于任何满足 $\alpha_k > 0$ 的 $k$。对于分类，函数 $f(x)$ 如公式 6.42 所示。


    $$f(x) = \sum_{i=1}^{m} \alpha_i y_i x_i \cdot x + b \quad (6.42)$$


    其中 $x$ 是测试点，$\alpha_i$ 是非零支持向量。


    然而，决策面分类器仍然是线性的，无法处理非线性情况。过拟合由软间隔支持向量机控制。软间隔与硬间隔支持向量机的区别如图 6.93 所示。


    让我们看一个一维空间中的简单例子，如图 6.94 所示。假设我们有三个数据点和一个标量特征 $x$，其中有两个负类（$x=-3$ 和 $-1$）和一个正类（$x=2$）。这些数据很容易被许多线性分类器（$wx+b$）分开。所以让我们找到具有最大间隔的分类器。


    $x = -3$ 且 $y = -1$


    $x = -1$ 且 $y = -1$


    $x = 2$ 且 $y = 1$


    间隔约束被改写并在二维空间中可视化，如图 6.95 所示。满足我们间隔约束的参数集显示在绿色阴影区域。


    ![](img/7fbca4852dbe91c6cea209148871a1b3_336_0.png)


    **图 6.93** (a) 软间隔支持向量机和 (b) 硬间隔支持向量机。


    ![](img/7fbca4852dbe91c6cea209148871a1b3_336_1.png)


    **图 6.94** 一维空间中的点。


    ![](img/7fbca4852dbe91c6cea209148871a1b3_337_0.png)


    图 6.95 二维空间中间隔约束的可视化。


    $$a(-3) + b < -1 \rightarrow b < 3a - 1$$

    $$a(-1) + b < -1 \rightarrow b < a - 1$$

    $$a(2) + b < +1 \rightarrow b > -2a + 1$$


    最后，目标是最小化 $\|a\|$。


    ## 6.6.3 损失最小化


    在图 6.96 中，数据点 $D$ 被错误分类，对于这种情况，支持向量机定义了松弛变量 $\xi$


    $$\text{最小化 } \frac{1}{2}\|w\|^2 + C \sum_i \xi$$

    $$\text{约束条件 } y_i(w^T x_i + b) \geq 1$$

    $$\text{最小化 } \frac{1}{2}\|w\|^2 + C \sum_i \max(0, 1 - y_i(w^T x_i)) \quad (6.43)$$


    其中 $C$ 是正则化参数，可以通过交叉验证来设置。


    在对数据点进行分类时，一个实例可能有四种可能的情况，如图 6.96 所述。


    - 1. 数据点 A 在正确的一侧，并且远离间隔，那么惩罚为 0

    - 2. 数据点 B 在正确的一侧，并且更靠近间隔，那么惩罚为 0

    - 3. 数据点 C 在正确的一侧，但在间隔内，非常靠近超平面，那么惩罚为 $1 - y_i(w^T x_i)$

    - 4. 数据点 D 在错误的一侧；那么，惩罚为 $1 - y_i(w^T x_i)$


    合页损失与 0-1 损失的比较如图 6.97 所示。'

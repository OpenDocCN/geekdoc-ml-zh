    ### 6.4.11 Decision Trees in Practice Using Python


    Decision trees are widely used supervised models for classification and regression
    tasks. These classifiers build a sequence of straightforward if/else rules on
    the training data through which they predict the target value. Decision trees
    are simple to interpret thanks to their structure and, therefore, visualize the
    modeled tree.



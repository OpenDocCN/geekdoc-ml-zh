  mdcn: "## 4.6.2 划分式层次聚类\n\n在划分式层次聚类中，聚类过程从树状图的顶部或根节点开始，此时所有数据点都位于一个单一的簇中。然后，它开始将根节点分裂为一组子簇。分裂过程会持续对每个子簇进行。只有当出现仅包含一个数据点的单点簇时，分裂过程才会停止。此外，自顶向下的划分式层次聚类比自底向上的方法更复杂，因为它使用了平坦聚类算法。最广泛使用的平坦聚类算法是k-means聚类。\n\
    \n如图4.7所示的自顶向下方法更准确，因为它提供了全局分布的完整概念，而自底向上的方法则基于局部分布进行决策。执行划分式聚类的步骤如下：\n\n**初始化：**\
    \ 最初从树状图的顶部或根节点开始，其中包含一个包含所有数据点的单一簇。\n\n**重复**\n\n-   选择要分裂的簇\n-   确定如何分裂：使用平坦聚类算法（如k-means聚类）分裂该簇，并且\n\
    \n**直到终止条件：** 每个数据点都位于其自身的单点簇中。\n\n## 4.6.3 合并簇的技术\n\n为了定义用于合并两个簇的簇间距离，广泛使用以下方法：\n\
    \n-   最小距离或单链接\n-   最大距离或全链接\n-   组平均或平均链接\n-   质心距离\n-   Ward方法\n\n**单链接：** 两个簇C1和C2之间的距离由属于不同簇的最近数据对象对之间的距离表示，如图4.8所示。单链接方法对离群值敏感，因为它们远离其他数据点。\n\
    \n$d_{\\min}(C_1, C_2) = \\min_{x \\in C_1, y \\in C_2} d(x, y)$ (4.14)\n\n**全链接：**\

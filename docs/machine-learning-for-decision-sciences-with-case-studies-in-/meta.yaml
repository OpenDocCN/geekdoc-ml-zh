    if the user wants to print his/her name ten times, this care loop will help; instead
    of writing the name ten times, use the loop function and define its range. The
    flow diagram shown in Figure 2.4 explains the loop statement.

    As discussed in the following sections, there are different types of loop statements,
    namely for, while, nested loops, etc.


    **For loop:** The loop executes the statement repeatedly using the iterator variable
    that increments each execution. Let’s take the same example of printing fruits
    name. Let “fruits” be the list that contains the names of three fruits. When the
    program executes, each fruit is saved in variable “I” and then printed one by
    one.


    ```

    Fruits = [“apple”, “mango”, “banana”];

    For I in fruits :

    Print (i);

    ```


    **While loop:** Repeats the group of a statement if the given condition is True.
    For example, add the first five natural numbers.


    ```

    I = 0;

    While y<6:

    y = y+y

    I++;

    ```


    **Nested loop:** To use the loop inside another loop is called a nested loop.
    Let’s take an example of distributing four chocolates to each student of the class.
    The nested loop will work here, as we have to use two loops, that is, for chocolate
    and students.


    ```

    chocolate = [“Cadbury”, “kitkat” “mars”, “galaxy”];


    # 6.6.6.10 Circular Kernel


    The circular kernel is used in geostatic applications. It is an example of an
    isotropic stationary kernel and is positive definite in $R_2$.


    $k(x_i, x_j) = \frac{2}{\pi} \arccos\left(-\frac{\|x_i - x_j\|}{\sigma}\right)
    - \frac{2}{\pi} \frac{\|x_i - x_j\|}{\sigma}$


    # 6.6.6.11 Bayesian Kernel


    The Bayesian kernel could be given as


    $k(x, y) = \prod_{l=1}^N k_l(x_l, y_l)$


    # 6.6.6.12 Chi-Square Kernel


    It is derived from chi-square distribution and is given as follows:


    $k(x, y) = 1 - \sum_{l=1}^n \frac{(x_l - y_l)^2}{\frac{1}{2}(x_l + y_l)}$


    # 6.6.6.13 Histogram Intersection Kernel


    It is widely used in image classification and is also called as min kernel.


    $k(x, y) = \sum_{l=1}^n \min(x_l, y_l)$


    # 6.6.6.14 Generalized Histogram Intersection Kernel


    It is a variant of histogram intersection kernel and is widely applicable in image
    classification.


    $k(x, y) = \sum_{l=1}^n \min(|x_l|^\alpha, |y_l|^\beta)$


    # 6.6.7 NU SVM


    In soft margin SVM, finding the parameter $C$ is difficult. Instead of using $C$,
    Scholkopf et al. introduce nu SVM. nu is bounded between 0 and 1. The function
    is given as in Equation 6.70.


    minimize $\frac{1}{2}\|w\|^2 - \gamma\rho + \frac{1}{2}\sum_l \xi^l$


    Subject to


    $r^l(w^T x^l + w_0) \geq \rho - \xi^l, \xi^l \geq 0, \rho \geq 0$'

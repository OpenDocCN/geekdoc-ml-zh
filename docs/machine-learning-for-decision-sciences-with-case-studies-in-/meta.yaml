    FIGURE 1.1 AI vs. ML vs. NN vs. DL analogous to a nesting doll.


    AI is a discipline of computer science that teaches machines to think and function
    in the same way that people do. DL is a branch of AI that processes and manipulates
    data by mimicking the human brain’s working pattern. For example, the NN is used
    in DL to predict output patterns. Let’s look at the shortest route computation
    application as an illustration of how DL works. When we hurry and want to get
    to our end destination as soon as possible, we look for a shorter path.


    The user will be asked to provide the following system input:


    +   - Place to begin

    - Destination


    As previously said, DL is based on NNs, which have nodes similar to interconnected
    neurons. The input, hidden, and output layers are the three layers that make up
    a neuron. The input layer contains the records entered by the user, such as the
    beginning place and destination. The hidden layer contains all the calculations
    and implementation, such as calculating the shortest path that covers the least
    amount of time and kilometers based on the user’s starting location and destination.
    There can be one or several hidden layers. Here are some DL implementations that
    feature more than one hidden layer. The final user output is contained in the
    output layer. In other words, it will show the user the optimized shortest route.


    AI, DL, and ML all have one thing in common: They all use massive data and modern
    computer languages to anticipate outcomes. DL is the interrelationship between
    the three. ML is a subset of AI, and AI is a subset of ML.


    So, as the figure suggests, AI is a broad concept that first exploded in the late
    1950s, causing a significant shift in the data science industry. Later, in the
    late 1980s, ML was introduced, which improved AI features. Finally, in the late
    1990s, DL was introduced, which combines AI and ML (Figure 1.2).'

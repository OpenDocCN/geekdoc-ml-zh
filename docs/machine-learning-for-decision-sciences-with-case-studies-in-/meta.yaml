    \n# 6.6 支持向量机\n\n机器学习旨在识别数据背后的模式，并构建能够从获得的经验中学习的系统。支持向量机因其利用优化技术并实现更高性能而获得了研究兴趣。支持向量机与其他经典机器学习技术不同，因为它利用了统计学思想。在机器学习中学习模型时，我们通常试图最小化训练阶段的误差，这会导致数据过拟合。支持向量机通过最大化间隔技术，巧妙地解决了过拟合问题。本章介绍了支持向量机和核函数的基本思想。支持向量机是最有效的基于核的监督机器学习分类器。这是一种复杂的分类技术，可以处理线性和非线性数据。核机器具有许多有用的特性来分析非线性数据。支持向量机的变体是支持向量回归，可用于解决回归分析问题。支持向量机是一种稳健的学习方法，这从其在工程各个领域的应用中可见一斑。它已被应用于现实世界的应用，包括手写体光学字符识别、人脸识别、说话人识别、自然语言处理、文本挖掘、药物设计、机器故障诊断、桥梁损伤评估和模式识别。理解支持向量机的唯一先决条件是基于拉格朗日乘子法的约束优化。在本节中，将详细讨论支持向量机的工作原理、潜在的统计概念、核技巧、线性和非线性支持向量机分类器、寻找最优超平面、最大间隔分类器、支持向量机的硬间隔和软间隔、支持向量机的变体、支持向量机的优缺点、支持向量回归分析以及应用。\n\
    \n## 6.6.1 几何直觉\n\n支持向量机是一种监督学习算法，其中学习模型被提供输入集及其关联的输出或标签。支持向量机用于分类问题。分类问题可以看作是在特征空间中分离类别的任务。为了理解支持向量机的奥秘，考虑一个简单的二元分类问题作为例子，如图6.85所示。它包含一个将两个类别分开的决策边界或超平面。支持向量机的目标是选择一个用于分离类别的优化超平面。例如，在图6.85中，有许多可能的线可以分离这两个类别，而深色阴影粗线是所有其他线中的最优超平面。\n\
    \n支持向量是靠近决策边界的关键数据点。*支持向量机的主要目标*是为这个问题找到一个最优超平面分类器。最优超平面是为了识别支持向量与超平面之间的最大距离。\n\
    \n- a. 到最近负样本的距离 $d_2$ 小于到最近正样本的距离 $d_1$。与图6.86相反，\n- b. 找到了最优超平面，其中到最近负样本的距离\
    \ $d_2$ 等于到最近正样本的距离 $d_1$。\n\n![](img/7fbca4852dbe91c6cea209148871a1b3_329_0.png)\n\
    \n图6.85 识别最优超平面。"

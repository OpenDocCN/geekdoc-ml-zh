    added or inserted into this sub-array and sorted within the sub-array. Hence,
    the name insertion sort. Sometimes, the algorithm is referred to as an online
    algorithm since the values are sorted and added into the sub-array.


    The insertion sort algorithm is simple to implement, and it is efficient on small

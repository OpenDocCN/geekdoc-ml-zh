    where $P$ predicts the next state and $C$ predicts the next reward.


    # 8.4.5 The Reinforcement Learning Algorithm


    The RL problem can be framed primarily based on the following key elements:


    +   - **Agent():** An entity that could observe or discover the environment and
    use it.

    - **Environment():** A scenario wherein an agent is presented or surrounded through.
    In RL, we count on the stochastic surroundings; this means that it’s natural structures.
    It is nothing but the physical world wherein the agent works.

    - **Action():** Actions are the moves taken using an agent inside the environment.

    - **State():** State of affairs restored with the aid of the environment after
    each action is taken using the agent. It is the agent’s current status.

    - **Reward():** A feedback returned to the agent from the environment to access
    the agent’s action. It is the response from the environment.

    - **Policy():** Policy is an approach carried out by the agent for the next action
    depending upon the current state. It is an approach to map an agent’s state to
    actions.

    - **Value():** It is predicted that it will also meet the discount factor for
    the long term and infringement of the interim reward. Future reward that an agent
    can earn by taking action in a specific situation.

    - **Q-value():** Very similar to a value but takes one additional parameter as
    the current action (a).


    The algorithm is given by


    **At every step $t$ the agent:** Performs the action $A_t$ recognized by observation
    $O_t$ and receives scalar reward $R_t$

    **The environment:** Finds action $A_t$, produces observation $O_{t+1}$, radiates
    scalar reward $R_{t+1}$ at $t$ increments.'

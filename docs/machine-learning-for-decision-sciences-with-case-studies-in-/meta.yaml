    # 3.2.4 PHASE 4 – MODEL BUILDING


    The objective of this phase is to understand whether the ML model is robust enough.
    Here the data- sets are developed and categorized as testing, training, production,
    and validation. In addition, there is a need to ensure a suitable environment
    for executing models and workflows, which includes fast hardware and parallel
    processing.


    The model will be fitted on the training data and evaluated against the testing
    data during this phase. This exercise is usually done in a sandbox rather than
    in a live production environment. ML model planning and model building have a
    lot of overlap. We can iterate between the two phases for a long time before agreeing
    on a final ML model. Some methods necessitate using a training dataset (and, in
    some cases, a validation dataset), depending on the method.


    Although the modeling techniques and logic necessary to develop this step can
    be complex, the actual duration of this phase can be very brief compared to all
    of the data pretreatment and approach definition work. In general, project phases
    1 and 2 will require more time in the actual world to prepare and study the data
    and construct a presentation of the data.


    As part of this phase, the following steps are conducted:


    +   - Put the models created in Phase 3 into action.

    - Wherever possible, convert the models to SQL or another appropriate database
    language and run them as in-database functions. This is far faster and more efficient
    than run- ning them in memory. (Use SQL to run Python models on huge datasets)
    SAS Scoring Accelerator allows us to run SAS models in the browser if we are using
    SAS software.

    - For testing and tiny datasets, use Python (or SAS) models on file extracts.

    - Assess the model’s validity and outcomes (for example, does it account for most
    of the data and has strong predictive power?)

    - Adjust variable inputs to fine-tune the models for best results.

    - Keep a record of the model’s outcomes and logic.


    During these iterations and refinement of the model, document the answers to the

    ## About the Authors


    **Dr. S. Sumathi** is working as a Professor in the Department of Electrical and
    Electronics Engineering, PSG College of Technology, Coimbatore, with teaching
    and research experience of 30 years. Her research interests include neural networks,
    fuzzy systems and genetic algorithms, pattern recognition and classification,
    data warehousing and data mining, operating systems, and parallel computing. She
    is the author of more than 40 papers in refereed journals and international conferences.
    She has authored books with reputed publishers such as Springer and CRC Press.


    **Dr. L. Ashok Kumar** was a Postdoctoral Research Fellow from San Diego State
    University, California. He is a recipient of the BHAVAN Fellowship from the Indo-US
    Science and Technology Forum and SYST Fellowship from DST, Govt. of India. His
    current research focuses on integration of renewable energy systems in the smart
    grid and wearable electronics. He has 3 years of industrial experience and 19
    years of academic and research experience. He has published 167 technical papers
    in international and national journals and presented 157 papers in national and
    international conferences. He has authored ten books with leading publishers such
    as CRC, Springer, and Elsevier. He has completed 26 Government-of-India-funded
    projects, and currently, 7 projects are in progress.



- md: '## 5 Supervised Learning

    ### Regression


    ### LEARNING OBJECTIVES


    At the end of this chapter, the reader will be able to


    - Know the basic paradigms and their underlying mathematical concept of supervised
    learning technique

    - Understand the concepts of supervised learning for classification and regression
    problems

    - Identify the appropriate supervised learning approaches for regression – linear
    regression

    - Understand and implement linear regression using Python for practical problems


    ### 5.1 INTRODUCTION


    Supervised learning is a variant of a machine learning algorithm to learn about
    the input–output paired samples. Medical image analysis, predictive analysis,
    and computer vision applications utilize these supervised algorithms for classifying
    data. To get useful insights and discover the patterns, data scientists utilize
    various types of machine learning algorithms. In general, these algorithms are
    categorized into two types depending on the method of learning about data to predict
    the future: supervised and unsupervised learning. A user teaches the supervised
    learning algorithm to learn about big data in the desired fashion. Supervised
    learning is a widely used machine learning algorithm that is used to learn the
    relationship between the independent input variable (X) and dependent output variable
    (Y) by determining the approximate mapping function Y=f(X). This is shown in Figure
    5.1. The objective is to learn an optimal mapping function to know how well it
    works to extrapolate for the new unknown input data (X).


    Supervised learning techniques are support vector machines (SVMs), linear regression,
    logistic regression, multi-class classification, and decision trees. Training
    a supervised learning algorithm for each input requires a correct output label.
    For example, a classification algorithm needs to classify images of digits from
    1 to 10 after being trained on a dataset of digit images that are properly labeled
    with the corresponding digits (1–10). Regression and classification are the two
    groups of the problem that can be efficiently learned using a supervised algorithm.
    The difference between the regression and classification problem is that the output
    variable is continuous or numerical for regression, whereas it is discrete or
    categorical for classification. This chapter introduces essential ideas behind
    all supervised algorithms in machine learning. The mathematical concept behind
    supervised algorithms with worked examples and implementation using Python is
    given in detail. Supervised algorithm for regression problem is well explained
    in this chapter with Python implementation. Linear regression is the fundamental
    regression algorithm to predict the output y-coordinate from the input x. Multiple
    linear regressions such as simple and multiple regression are discussed in this
    chapter.


    ### 5.2 SUPERVISED LEARNING – REAL-LIFE SCENARIO


    Supervised learning is the task of uncovering hidden patterns and structures from
    labeled data. Successful supervised learning requires technical expertise to label
    data. In real-life applications, supervised learning is used widely, such as object
    detection, language processing, spoken word recognition, anomaly detection, product
    recommendation, credit risk analysis, optical character recognition, medical diagnosis,
    protein structure prediction, and biometrics.


    FIGURE 5.1 Mapping between input and output.


    FIGURE 5.2 Prediction using supervised learning.


    ## 5.3 TYPES OF SUPERVISED LEARNING


    Supervised techniques train the model using labeled data. The training process
    should continue until the level of performance is high enough. After training,
    the system should predict new unseen data correctly, as shown in Figure 5.2.


    There are two types of supervised learning techniques: regression and classification.
    Classification separates the data, whereas regression fits the data.


    ### 5.3.1 SUPERVISED LEARNING – CLASSIFICATION


    Classification is the process of categorizing the given input data into different
    classes. The output of the classification problem is a discrete or categorical
    value such as positive or negative, spam or not spam. Classifying the tumor as
    malignant or benign and classifying whether the account of a person is hacked
    or not are few examples of classification problems. Classification can be either
    binary or multi-class classification. Logistic regression is the best example
    for binary classification. Multi-class classification is a problem with more than
    two output classes; for example, alphabet character recognition is a multi-class
    classification problem. The various classification techniques are decision tree,
    logistic regression, random forest, gradient boosted tree, SVM, and naïve Bayes
    algorithm.


    Which of the following is/are classification problem(s)?


    - Predicting the sales of a newly introduced SUV over the next 6 months.

    - Predicting whether a customer account is hacked or not.


    Solution: Predicting the sale of car output is a continuous value and therefore
    it is not a classification problem. Predicting whether an account is hacked or
    not is a classification problem where the output value is categorical.


    FIGURE 5.3 A simple classification example.


    #### 5.3.1.1 Classification – Predictive Modeling


    Classification predictive modeling is the process of approximating a mapping function
    (f) from input variables (X) to discrete output variables (y). The mapping function
    f predicts the class or category for a given observation.


    A classification problem needs that input data to be categorized into one of two
    or more classes. The input data can be either discrete or continuous values. A
    problem with two distinct classes is called a two-class or binary classification
    problem, such as true or false. A problem with more than two classes is often
    called a multi-class classification problem, such as sentiment analysis with angry,
    sad, and happy labels.


    In general, the classification models predict a continuous probability value for
    the given input corresponding to each output class. The probabilities can be interpreted
    as the likelihood or confidence of a given input belonging to each output class.
    A predicted probability can be converted into a class value by selecting the class
    label with the highest probability. For example, for specific input data to predict
    whether it will rain tomorrow or not, assign the probability for the input data
    and select the label whose probability is greater than the cutoff value as it
    has the highest likelihood, as shown in Figure 5.3. There are many ways to measure
    the performance of a predictive classification model, but perhaps the most common
    is to calculate the classification accuracy. The classification accuracy is the
    percentage of correctly classified examples out of all predictions made.


    For example, if a classification predictive model made ten predictions and seven
    of them were correct and three of them were incorrect, then the classification
    accuracy of the model based on just these predictions would be as follows:


    ```

    accuracy = correct predictions / total predictions * 100

    accuracy = 7 / 10 * 100 = 70%

    ```


    ### 5.3.2 SUPERVISED LEARNING – REGRESSION


    Regression is the process of identifying a model or function for fitting the data
    into continuous real values instead of using classes or discrete values. For example,
    a regression problem is quantity based where the output variable is a real or
    continuous value, such as salary, age, sales rate, speed, and weight. The simplest
    form is the linear regression that tries to fit data (Figure 5.4) with the optimal
    hyperplane or line that goes through the points.


    **Which of the following is the regression task?**


    - Predicting credit risk analysis

    - Predicting nationality of a person

    - Predicting tomorrow’s wind speed in a specific site

    - Predicting the sentiment of a product review'

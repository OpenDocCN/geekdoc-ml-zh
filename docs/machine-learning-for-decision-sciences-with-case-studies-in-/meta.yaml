    application based on a customer dataset in a supermarket, thus highlighting association
    rule mining. The product associations are compared based on Apriori and Fpgrowth
    algorithms. Use case 3, Sales Prediction of a Retailer, is illustrated to build
    a ML model and find out the sales of each product at a particular store. The code
    is implemented to compare different regression models and identify Gradient Boosting
    as the best model. Predicting the cost of insurance claims for a Property and
    Casualty (P&C) Insurance Company is covered in use case 4. This case study illustrates
    data cleaning, data preprocessing, and handling outliers. Use case 5, E-Commerce
    Product Ranking and Sentiment Analysis, deals with understanding the data, data

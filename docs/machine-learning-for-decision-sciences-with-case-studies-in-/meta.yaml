    # 6.3.1 Geometric Intuition


    Logistic regression makes use of the sigmoid function for separating two classes,
    as given in Equation 6.1. The logistic sigmoid function is otherwise called logit.


    ```

    $\sigma(z) = \frac{1}{1 + e^{-z}}$

    ```


    The value of sigmoid function $\sigma(z)$ is bounded between 0 and 1, which looks
    like $S$ as in Figure 6.1. The hypothesis function or the threshold $h_\theta(x)$
    is at 0.5.


    ```

    $0 \leq h_\theta(x) \leq 1$

    ```


    ```

    $h_\theta(x) = \sigma(\theta^T x) = \frac{1}{1 + e^{-(\theta^T x)}}$

    ```


    If $h_\theta(x) \geq 0.5$, then predict output label $y$ as 1. Else if $h_\theta(x)
    < 0.5$, then predict output label $y$ as 0. Let us consider weight vector as $\beta_i$,
    observations say $x_i$ and bias $\beta_0$ as intercept in linear regression. Assume
    for a binary classification problem, one class is 0, and another class is one,
    and the formula for predicting probabilities is given below.


    ```

    $P(Y = 0 | X) = \frac{1}{1 + \exp\left[\beta_0 + \sum \beta_i x_i\right]}$

    ```


    ```

    $P(Y = 1 | X) = \frac{\exp\left[\beta_0 + \sum \beta_i x_i\right]}{1 + \exp\left[\beta_0
    + \sum \beta_i x_i\right]}$

    ```'

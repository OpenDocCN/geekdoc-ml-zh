    - PCA方法可以使用python中的numpy包（不使用sklearn包中的直接实现函数）通过线性代数工具来定义和执行。\n\n考虑表7.1中的数据。\n\
    \n**表7.1**\n用于实现特征分解的数据\n\n| 年龄 | 体重 | 身高 |\n| :--- | :--- | :--- |\n| 20 | 60\

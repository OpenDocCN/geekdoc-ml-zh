  md: 'where $y_i$ is the actual value and $\hat{y}_i$ is the predicted value.

    The root mean squared error is given as RMSE:


    ```

    $$\text{RMSE} = \sqrt{\frac{1}{n} \sum_{i=1}^{n} (y_i - \hat{y}_i)^2}$$

    ```


    The rooted absolute error, also known as the residual sum of squares, is given
    as RAE:


    ```

    $$\text{RAE} = \frac{\sum_{i=1}^{n} |y_i - \hat{y}_i|}{\sum_{i=1}^{n} y_i - \bar{y}}$$

    ```


    where $y_i$ is the actual value, $\hat{y}_i$ is the predicted value, and $\bar{y}$
    is average value of $y$.

    The rooted square error is RSE, which is similar to RAE:


    ```

    $$\text{RSE} = \frac{\sum_{i=1}^{n} (y_i - \hat{y}_i)^2}{\sum_{i=1}^{n} (y_i -
    \bar{y})^2}$$

    ```


    The least-squares regression line equation for n data points is given as


    ```

    $$y = ax + b$$

    ```


    where $a$ and $b$ are


    ```

    $$a = \frac{n \sum_{i=1}^{n} x_i y_i - \sum_{i=1}^{n} x_i \sum_{i=1}^{n} y_i}{n
    \sum_{i=1}^{n} x_i^2 - (\sum_{i=1}^{n} x_i)^2}$$

    $$b = \frac{1}{n} \left( \sum_{i=1}^{n} y_i - a \sum_{i=1}^{n} x_i \right)$$

    ```



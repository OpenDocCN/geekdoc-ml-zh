- md: '## 4.5.7 Fuzzy k-Means Clustering Algorithm


    In fuzzy k-means clustering, the points or objects in the data to be clustered
    have a probability that defines its association with each cluster. This is contradictory
    to the conventional k-means algorithm where data points belong to a cluster. Fuzzy
    k-means particularly deals with the degree of belonging. The degree of belonging
    is defined in terms of probability. This is achieved by replacing distance with
    probability, which can be a function of distance, such as having probability relative
    to the inverse of the distance. The fuzzy k-means clustering algorithm uses a
    weighted centroid based on the defined probabilities.


    The algorithm of fuzzy k-means is similar to the conventional k-means algorithm
    in terms of initialization, iteration, and convergence. The clusters obtained
    at each stage are evolved based on the probabilistic distributions. The probability
    function in fuzzy k-means is defined within a range of [0,1], where “0” indicates
    that the data point is far away from the centroid while “1” indicates that the
    data point is closest to the centroid.


    The fuzzy k-means algorithm was developed by Dunn in 1973 [27] and later improvised
    by Peizhuang in 1981 [28]. The clustering is performed by exploring a set of fuzzy
    groups, W, and the associated cluster centers, C, that define the structure of
    the data point as best as possible iteratively. The partition matrix obtained
    after clustering would be expressed as W with size k×m, where k denotes the cluster
    number and m defines the number of data points in each cluster. W can also be
    expressed as W = [w_ab], where w_ab is the membership defined concerning the probability
    of a data point u_b from a cluster center c_a, where a denotes the cluster number
    varying from 1 to k, and b denotes the number of data points in each cluster varying
    from 1 to m. In the case of crisp partitioning, W = [w_ab] = 0. The final objective
    of the fuzzy k-means clustering algorithm is to minimize the sum of the squared
    error function E_s(C,W) according to Equation 4.12:


    $$E_s(C,W) = \sum_{b=1}^{m} \sum_{a=1}^{k} (w_{ab})^s \|u_b - c_a\|^2, s \in [1,
    \infty]$$


    where $s$ is a real number and is the fuzziness coefficient. It is a very important
    factor that influences the membership grades, thus aiding the algorithm''s performance.
    As the value of $s$ increases, the algorithm becomes fuzzier, and researchers
    have proved that the fuzzy k-means algorithm converges for $s$ value in the range
    $[1, \infty]$. Here, $w_{ab}$ is the membership degree of $u_b$ in cluster $a$,
    $c_a$ is the cluster center, and the $||$ operator indicates the inner product
    showing the similarity between the data points and the cluster. The error function
    is mainly dependent on $W$ and $C$, subject to two main constraints as follows:


    $$\sum_{a=1}^{k} w_{ab} = 1, \text{ for } b = 1, 2, ... m \quad (4.13)$$


    and


    $$0 < \sum_{b=1}^{m} w_{ab} < k, \text{ for } a = 1, 2, ... k$$


    The algorithm is iterated to minimize the error function defined above.


    ### 4.5.7.1 The Algorithm


    The steps of the fuzzy k-means clustering algorithm are explained as follows:


    - **Step 1:** Choose an optimal value of $k$, which indicates the number of clusters.

    - **Step 2:** Initialize the k-means membership $\mu_k$ associated with the clusters
    and evaluate the probability such that each data point $x_i$ is assigned to a
    cluster $k$, $P(\mu_k \mid x_i, k)$.

    - **Step 3:** Recompute the centroid of the cluster according to the equation.

    - **Step 4:** Repeat steps 2 and 3 until convergence or until a specified number
    of iterations have been reached, and the error function is minimized.


    ### 4.5.8 Advantages and Disadvantages of Fuzzy k-Means Clustering


    Since the fuzzy k-means clustering algorithm works similarly to the k-means clustering,
    most of the advantages and limitations of the fuzzy k-means clustering algorithm
    are common. Still, we differentiate the two clustering algorithms as follows:


    **Advantages:**


    - For classification problems pertinent to hard classes, the k-means algorithm
    performs better than fuzzy k-means, despite an exploratory data analysis.

    - The underlying benefit of the fuzzy k-means clustering algorithm becomes evident
    based on the membership values of the fuzzy clustering. The membership values
    show a powerful skewed bimodal distribution for classification problems. This
    is a major benefit for having proper clustering between classes in a clustering
    algorithm.

    - For huge datasets, the fuzzy k-means clustering algorithm is recommended for
    analyzing the substructure of the data, for existing known patterns, and unexplored
    data in the available dataset.


    **Disadvantages:**


    - The fuzzy k-means clustering algorithm requires more computation time (slower
    than k-means clustering). When compared to k-means clustering, it is observed
    in various studies that the computation time increases more rapidly for the fuzzy
    k-means clustering algorithm as the number of clusters increases.


    ## 4.6 HIERARCHICAL CLUSTERING


    Hierarchical clustering algorithm, otherwise called hierarchical cluster analysis,
    is a method used to create a tree of clusters by grouping homogeneous data points.
    The endpoint is a set of cluster in which each cluster is unique from every other.


    For the given input of six raw data points {A,B,C,D,E,F}, hierarchical cluster
    analysis computes the distance matrix.


    Let''s see how hierarchical clustering works with an example. Initially, each
    observation is considered as a group or cluster. Execute the following two steps
    repetitively until all the clusters are merged:


    |   | A  | B  | C  | D  | E  |

    |---|----|----|----|----|----|

    | B | 16 |    |    |    |    |

    | C | 47 | 37 |    |    |    |

    | D | 72 | 57 | 40 |    |    |

    | E | 77 | 65 | 30 | 31 |    |

    | F | 79 | 66 | 35 | 23 | 10 |


    - Identify the two closer clusters

    - Merge the identified two clusters


    Treelike dendrograms represent the cluster relationship. The dendrograms for the
    example considered is shown in Figure 4.4.


    ### Types of Hierarchical Clustering


    Hierarchical clustering is classified (Figure 4.5) as agglomerative or divisive
    based on how hierarchical decomposition is performed.


    ### 4.6.1 AGGLOMERATIVE HIERARCHICAL CLUSTERING


    In agglomerative hierarchical clustering, dendrograms are built from the bottom
    level. Then, the two most similar or nearest clusters from the bottom are merged.
    The algorithm stops the merging process when all the data points are merged into
    a single cluster. The following steps (Figure 4.6) describe how to build a dendrogram
    based on agglomerative hierarchical clustering:'
  mdcn: '## 4.5.7 模糊k-均值聚类算法


    在模糊k-均值聚类中，待聚类数据中的点或对象具有一个概率值，该概率定义了其与每个簇的关联程度。这与传统的k-均值算法（数据点明确属于某个簇）是相反的。模糊k-均值特别处理的是归属程度。归属程度以概率来定义。这是通过用概率替代距离来实现的，而概率可以是距离的函数，例如概率与距离的倒数成正比。模糊k-均值聚类算法使用基于所定义概率的加权质心。


    模糊k-均值算法在初始化、迭代和收敛方面与传统的k-均值算法相似。每个阶段获得的簇是基于概率分布演化而来的。模糊k-均值中的概率函数定义在[0,1]的范围内，其中“0”表示数据点远离质心，而“1”表示数据点最接近质心。


    模糊k-均值算法由Dunn于1973年提出[27]，后来由Peizhuang于1981年改进[28]。聚类通过迭代地探索一组模糊组W和相关的簇中心C来执行，这些簇中心尽可能好地定义了数据点的结构。聚类后获得的划分矩阵将表示为W，大小为k×m，其中k表示簇的数量，m定义每个簇中的数据点数量。W也可以表示为W
    = [w_ab]，其中w_ab是关于数据点u_b从簇中心c_a的概率定义的隶属度，其中a表示从1到k变化的簇编号，b表示从1到m变化的每个簇中的数据点数量。在硬划分的情况下，W
    = [w_ab] = 0。模糊k-均值聚类算法的最终目标是根据公式4.12最小化平方误差函数E_s(C,W)的和：


    $$E_s(C,W) = \sum_{b=1}^{m} \sum_{a=1}^{k} (w_{ab})^s \|u_b - c_a\|^2, s \in [1,
    \infty]$$


    其中$s$是一个实数，是模糊系数。这是一个非常重要的因素，它影响着隶属度等级，从而有助于算法的性能。随着$s$值的增加，算法变得更加模糊，研究人员已经证明，模糊k-均值算法在$s$值范围$[1,
    \infty]$内收敛。这里，$w_{ab}$是$u_b$在簇$a$中的隶属度，$c_a$是簇中心，$||$运算符表示内积，显示数据点与簇之间的相似性。误差函数主要依赖于$W$和$C$，受以下两个主要约束：


    $$\sum_{a=1}^{k} w_{ab} = 1, \text{ for } b = 1, 2, ... m \quad (4.13)$$


    以及


    $$0 < \sum_{b=1}^{m} w_{ab} < k, \text{ for } a = 1, 2, ... k$$


    该算法通过迭代来最小化上述定义的误差函数。


    ### 4.5.7.1 算法


    模糊k-均值聚类算法的步骤说明如下：


    - **步骤1：** 选择一个最优的$k$值，它表示簇的数量。

    - **步骤2：** 初始化与簇相关的k-均值隶属度$\mu_k$，并评估概率，使得每个数据点$x_i$被分配到一个簇$k$，$P(\mu_k \mid x_i,
    k)$。

    - **步骤3：** 根据方程重新计算簇的质心。

    - **步骤4：** 重复步骤2和3，直到收敛或达到指定的迭代次数，并且误差函数被最小化。


    ### 4.5.8 模糊k-均值聚类的优缺点


    由于模糊k-均值聚类算法的工作方式与k-均值聚类相似，因此模糊k-均值聚类算法的大多数优点和局限性是共通的。不过，我们仍然可以区分这两种聚类算法如下：


    **优点：**


    - 对于与硬类别相关的分类问题，尽管进行了探索性数据分析，k-均值算法的表现优于模糊k-均值。

    - 模糊k-均值聚类算法的潜在优势基于模糊聚类的隶属度值变得明显。对于分类问题，隶属度值显示出强大的偏态双峰分布。这是聚类算法中在类别之间实现适当聚类的一个主要优势。

    - 对于大型数据集，建议使用模糊k-均值聚类算法来分析数据的子结构、已知的现有模式以及可用数据集中未探索的数据。


    **缺点：**


    - 模糊k-均值聚类算法需要更多的计算时间（比k-均值聚类慢）。与k-均值聚类相比，各种研究观察到，随着簇数量的增加，模糊k-均值聚类算法的计算时间增长得更快。


    ## 4.6 层次聚类


    层次聚类算法，也称为层次聚类分析，是一种通过将同质数据点分组来创建簇树的方法。最终结果是一组簇，其中每个簇与其他所有簇都是不同的。


    对于给定的六个原始数据点输入{A,B,C,D,E,F}，层次聚类分析计算距离矩阵。


    让我们通过一个例子看看层次聚类是如何工作的。最初，每个观测值被视为一个组或簇。重复执行以下两个步骤，直到所有簇合并：


    |   | A  | B  | C  | D  | E  |

    |---|----|----|----|----|----|

    | B | 16 |    |    |    |    |

    | C | 47 | 37 |    |    |    |

    | D | 72 | 57 | 40 |    |    |

    | E | 77 | 65 | 30 | 31 |    |

    | F | 79 | 66 | 35 | 23 | 10 |


    - 识别两个更近的簇

    - 合并识别出的两个簇


    树状图表示簇之间的关系。所考虑示例的树状图如图4.4所示。


    ### 层次聚类的类型


    层次聚类根据层次分解的执行方式被分类（图4.5）为凝聚型或分裂型。


    ### 4.6.1 凝聚型层次聚类


    在凝聚型层次聚类中，树状图从底层开始构建。然后，从底部合并两个最相似或最近的簇。当所有数据点合并成一个簇时，算法停止合并过程。以下步骤（图4.6）描述了如何基于凝聚型层次聚类构建树状图：'

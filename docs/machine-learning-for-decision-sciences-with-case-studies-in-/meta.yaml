    \ the clustering process starts from the top or root of the dendrogram where all\
    \ data points are in one single cluster. Then, it starts to split the root into\
    \ a set of child clusters. The process of splitting is continuously performed\
    \ for each child cluster. The process of splitting stops only when a singleton\
    \ cluster of one data point is present. Moreover, top-down divisive hierarchical\
    \ clustering is more complex than the bottom-up approach because it uses a flat\
    \ clustering algorithm. The most extensively used flat clustering algorithm is\
    \ k-means clustering.\n\nThe top-down approach as shown in Figure 4.7 is more\
    \ accurate as it gives a complete idea from global distribution, whereas the bottom-up\
    \ approach decides from the local distributions. The following are the steps to\
    \ perform divisive clustering:\n\n**Initialization:** Initially start from the\
    \ top or root of the dendrogram, which contains one single cluster with all data\
    \ points.\n\n**Repeat**\n\n- Choose which cluster to split\n- Determine how to\
    \ split: Split that cluster by the flat clustering algorithm such as k-means clustering,\
    \ and\n\n**Until termination condition:** Each data is in its singleton cluster.\n\
    \n## 4.6.3 TECHNIQUES TO MERGE CLUSTER\n\nTo define inter-cluster distance for\
    \ merging two clusters, the following approaches are used widely:\n\n- Min or\
    \ single link\n- Max or complete link\n- Group average or average link\n- Centroid\
    \ distance\n- Ward's method\n\n**Single linkage:** The distance between two clusters\
    \ C1 and C2 is represented by the distance of the closest pair of data objects\
    \ belonging to different clusters, as shown in Figure 4.8. The single-link method\
    \ is sensitive to outliers because they lie far away from the rest of the data\
    \ points.\n\n$d_{\\min}(C_1, C_2) = \\min_{x \\in C_1, y \\in C_2} d(x, y)$ (4.14)\n\
    \n**Complete linkage:** The distance between two clusters C1 and C2 is represented\
    \ by the distance of the farthest pair of data objects belonging to different\
    \ clusters, i.e., the maximum distance between two data objects (Figure 4.9).\n\
    \n$d_{\\min}(C_1, C_2) = \\max_{x \\in C_1, y \\in C_2} d(x, y)$ (4.15)\n\nThe\
    \ complete link method is less sensitive to outliers because they lie far away\
    \ from the rest of the data points.\n\n**Average linkage:** The similarity of\
    \ two clusters is determined by the average similarity (Figure 4.10) between all\
    \ pairs of data objects belonging to different clusters.\n\n$d_{\\min}(C_1, C_2)\
    \ = \\text{avg}_{x \\in C_1, y \\in C_2} d(x, y)$ (4.16)\n\nThe average link method\
    \ is robust to noise and outlier. However, the limitation of average linkage is\
    \ biased toward global clusters.\n\n**Centroid distance:** The distance between\
    \ two clusters is represented by the distance between the means (Figure 4.11)\
    \ of the clusters.\n\n$d_{\\text{mean}}(C_1, C_2) = d(m_1, m_2)$ (4.17)\n\n**Ward's\
    \ method:** The sum of squares of the distance of $P_i$ and $P_j$ is calculated\
    \ in Ward's method based on the relation\n\n$$\\text{sim}(C_1, C_2) = \\sum \\\
    left( \\text{dist}(P_i, P_j)^2 \\right) / |C_1| * |C_2| \\quad (4.18)$$\n\nIt\
    \ performs well with noisy data, and the problem of Ward's method is biased toward\
    \ global clusters.\n\n## 4.6.4 SPACE AND TIME COMPLEXITY\n\n**Space complexity:**\
    \ The space complexity remains high when the number of data points is more because\
    \ more space is required to store the proximity matrix.\nSpace complexity $S =\

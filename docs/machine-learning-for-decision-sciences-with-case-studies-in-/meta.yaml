    +   6. Determine the eigenvectors and respective eigenvalues of $C_M$.

    7. Decrease eigenvalues and sort the eigenvectors, and select $k$ eigenvectors
    containing the largest eigenvalues to obtain $V$.

    8. Make use of $V$ to change the samples to a new subspace using equation (7.6)


    $$y = V^T \times X$$ (7.6)



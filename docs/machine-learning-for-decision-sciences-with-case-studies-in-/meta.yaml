    ## 示例 6.12


    使用支持向量机将给定的数据点分为两类，并找到最优超平面


    | x | y | 标签 |

    |---|---|-------|

    | 1 | 1 | -ve |

    | 2 | 1 | -ve |

    | 1 | -1 | -ve |

    | 2 | -1 | -ve |

    | 4 | 0 | +ve |

    | 5 | 1 | +ve |

    | 5 | -1 | +ve |

    | 6 | 0 | +ve |


    首先，让我们在图中绘制数据点；负类点标记为‘-’，正类点标记为‘+’，如图 6.110 所示。


    可能存在许多可能的超平面，如图 6.111 所示，目标是识别出最优超平面。


    有三个支持向量（图 6.112），即 $S_1$、$S_2$ 和 $S_3$。


    $$S_1 = \begin{pmatrix} 2 & 1 \end{pmatrix}, S_2 = \begin{pmatrix} 2 & -1 \end{pmatrix},
    S_3 = \begin{pmatrix} 4 & 0 \end{pmatrix}$$


    偏置输入为 1。因此，用偏置输入增强支持向量，然后 $S_1$、$S_2$ 和 $S_3$ 变为 $\widetilde{S_1}$、$\widetilde{S_2}$、$\widetilde{S_3}$，如下所示。


    $$\widetilde{S_1} = \begin{pmatrix} 2 & 1 & 1 \end{pmatrix}, \widetilde{S_2} =
    \begin{pmatrix} 2 & -1 & 1 \end{pmatrix}, \widetilde{S_3} = \begin{pmatrix} 4
    & 0 & 1 \end{pmatrix}$$


    ## 6.110 数据点表示。


    ![](img/7fbca4852dbe91c6cea209148871a1b3_354_0.png)


    ## 6.111 可能的超平面。


    ![](img/7fbca4852dbe91c6cea209148871a1b3_355_0.png)


    ## 6.112 支持向量表示。


    ![](img/7fbca4852dbe91c6cea209148871a1b3_355_1.png)


    我们需要根据以下三个线性方程来求解三个参数 $\alpha_1, \alpha_2$ 和 $\alpha_3$


    $$\alpha_1 \widetilde{S_1} \cdot \widetilde{S_1} + \alpha_2 \widetilde{S_2} \cdot
    \widetilde{S_1} + \alpha_3 \widetilde{S_3} \cdot \widetilde{S_1} = -1 \quad \text{(-ve
    class)}$$


    $$\alpha_1 \widetilde{S_1} \cdot \widetilde{S_2} + \alpha_2 \widetilde{S_2} \cdot
    \widetilde{S_2} + \alpha_3 \widetilde{S_3} \cdot \widetilde{S_2} = -1 \quad \text{(-ve
    class)}$$


    $$\alpha_1 \widetilde{S_1} \cdot \widetilde{S_3} + \alpha_2 \widetilde{S_2} \cdot
    \widetilde{S_3} + \alpha_3 \widetilde{S_3} \cdot \widetilde{S_3} = +1 \quad \text{(+ve
    class)}$$


    让我们将 $\widetilde{S_1}$、$\widetilde{S_2}$、$\widetilde{S_3}$ 的值代入上述方程


    $$\alpha_1 \begin{pmatrix} 2 & 1 & 1 \end{pmatrix} \begin{pmatrix} 2 \\ 1 \\ 1
    \end{pmatrix} + \alpha_2 \begin{pmatrix} 2 & -1 & 1 \end{pmatrix} \begin{pmatrix}
    2 \\ 1 \\ 1 \end{pmatrix} + \alpha_3 \begin{pmatrix} 4 & 0 & 1 \end{pmatrix} \begin{pmatrix}
    2 \\ 1 \\ 1 \end{pmatrix} = -1$$

    $$\alpha_1 \begin{pmatrix} 2 & 1 & 1 \end{pmatrix} \begin{pmatrix} 2 \\ -1 \\
    1 \end{pmatrix} + \alpha_2 \begin{pmatrix} 2 & -1 & 1 \end{pmatrix} \begin{pmatrix}
    2 \\ -1 \\ 1 \end{pmatrix} + \alpha_3 \begin{pmatrix} 4 & 0 & 1 \end{pmatrix}
    \begin{pmatrix} 2 \\ -1 \\ 1 \end{pmatrix} = -1$$

    $$\alpha_1 \begin{pmatrix} 2 & 1 & 1 \end{pmatrix} \begin{pmatrix} 4 \\ 0 \\ 1
    \end{pmatrix} + \alpha_2 \begin{pmatrix} 2 & -1 & 1 \end{pmatrix} \begin{pmatrix}
    4 \\ 0 \\ 1 \end{pmatrix} + \alpha_3 \begin{pmatrix} 4 & 0 & 1 \end{pmatrix} \begin{pmatrix}
    4 \\ 0 \\ 1 \end{pmatrix} = +1$$


    化简后，我们得到


    $$6\alpha_1 + 4\alpha_2 + 9\alpha_3 = -1$$

    $$4\alpha_1 + 6\alpha_2 + 9\alpha_3 = -1$$

    $$9\alpha_1 + 9\alpha_2 + 17\alpha_3 = 1$$


    求解上述三个联立方程后，我们得到


    $$\alpha_1 = \alpha_2 = -3.25 \quad \text{and} \quad \alpha_3 = 3.5$$


    区分两类的超平面由下式给出


    $$\widetilde{w} = \sum_i \alpha_i S_i$$


    $$\widetilde{w} = -3.25 \begin{pmatrix} 2 & 1 & 1 \end{pmatrix} - 3.25 \begin{pmatrix}
    2 & -1 & 1 \end{pmatrix} + 3.5 \begin{pmatrix} 4 & 0 & 1 \end{pmatrix} = \begin{pmatrix}
    1 & 0 & -3 \end{pmatrix}$$


    因此，我们令 $y = wx + b$


    其中 $w = \begin{pmatrix} 1 & 0 \end{pmatrix}$ 且 $b = -3$，该线性支持向量机的预期超平面如图 6.113
    所示。


    大多数现实世界的数据都具有非线性。让我们考虑一个一维空间中的非线性数据示例，如图 6.114 所示。


    通过添加二次特征 $x_2 = x_1^2$ 将它们转换到高维空间，这反过来使数据线性可分，如图 6.115 所示。


    线性不可分的数据将没有单一的超平面来分离它们。特征空间非线性模型中的数据点 $x$ 被映射到特征空间的线性模型 $\emptyset(x)$。在映射 $x
    \rightarrow \emptyset(x)$ 的过程中，计算成本变得非常高。我们可以通过在支持向量机中使用核函数来实现这种转换，而不会导致计算成本大幅增加。


    图 6.116a 是线性不可分的，但当我们将这些点转换到适当的高维特征空间时，这些点可能变得线性可分，如图 6.116b 所示。



    - 3. If income is >$80 k, credit the loan.


    A decision tree is constructed based on the income range. The application having
    income <$ 20k is rejected and income >$80k is credited with a loan. An applicant
    with a salary between $20k and $80k is divided further based on the experience
    details. From the decision tree shown in Figure 6.28, the loans are credited for
    a person having experience >2 years and having a salary >$20k to $80k and also
    for the person having a salary >$80.


    ## Example 6.5: Calculate the Entropy for the Given Sample


    | Climate | Temperature | Humidity | Play |

    | :--- | :--- | :--- | :--- |

    | Sunny | Hot | High | No |

    | Rainy | Mild | Normal | Yes |

    | Sunny | Mild | Normal | Yes |

    | Rainy | Mild | High | No |

    | Sunny | Hot | Normal | Yes |

    | Rainy | Cool | Normal | No |


    The entropy of the dataset is the sum of entropy for Yes and the sum of entropy
    for No.

    There are four Yes and two No on the weather data.

    The **entropy of the weather dataset**:


    $$H(s) = \sum -p(c) \log_2 p(c)$$

    $$= 0.3933 + 0.523$$

    $$= 0.9163$$

    $$P \text{ yes} = (-4/6) \log_2(4/6) = -(0.66)(-0.599) = 0.3933$$

    $$P \text{ no} = (-2/6) \log_2(2/6) = 0.333 \times 1.584 = 0.523$$



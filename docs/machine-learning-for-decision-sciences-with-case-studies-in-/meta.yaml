    \n$$a(i) = \\frac{1}{|C(i)|-1} \\sum_{C(i), i \\neq j} d(i,j) \\quad (4.9)$$\n\
    \n- $b(i)$ 是到最近的非自身聚类的平均相异度\n\n$$b(i) = \\min_{i \\neq j} \\left( \\frac{1}{|C(j)|}\
    \ \\sum_{j \\in C(j)} d(i,j) \\right) \\quad (4.10)$$\n\n轮廓系数 $s(i)$ 如下所示：\n\n\
    $$s(i) = \\frac{b(i) - a(i)}{\\max(a(i), b(i))} \\quad (4.11)$$\n\n在无监督学习中，最优聚类数由\
    \ $k$ 的值决定，该值对应于 $s(i)$ 的最大值。\n\n## 4.5.4 空间和时间复杂度\n\n在空间方面，k-means算法只需要存储数据点和质心。因此，空间需求定义为\
    \ $O((m+k)n)$，其中 $k$ 是聚类数，$m$ 是数据点数，$n$ 是属性数。\n\n在时间方面，k-means是一个关于数据点数量的线性算法。因此，k-means算法所需的时间为\
    \ $O(i*k*m*n)$，其中 $i$ 是算法收敛所需的迭代次数，$k$ 是聚类数，$m$ 是数据点数，$n$ 是属性数。\n\n## 4.5.5 K-Means聚类的优缺点\n\
    \n### 4.5.5.1 优点\n\n1. 当数据量很大时，具有高度的**可扩展性**。\n2. 实现**更简单**。\n3. 适用于许多新的现实世界示例。\n\
    4. 通过最小化以平方误差和（SSE）形式给出的优化函数，实现**更快的收敛**。\n5. 基于计算成本，速度更快且更有效。\n\n### 4.5.5.2\
    \ 缺点\n\n1. **k的选择**：在算法收敛中起非常重要作用的一个主要因素是 $k$ 的最优选择，这对于不同类型的问题来说很棘手。\n2. **数据的大小和密度**：该算法无法很好地处理大小、形状和密度各异的聚类。在这种情况下，算法必须进行泛化。\n\
    3. **不属于任何聚类的点**：不属于任何聚类的点必须被移除。否则，经过迭代，这些点由于形成新的聚类而倾向于形成另一个质心。这会影响算法的性能。\n4.\
    \ **对初始值的依赖**：在k-means算法的情况下，$k$ 的值是有限的。对于较高的 $k$ 值，算法的性能会下降。\n5. **聚类之间的重叠**：由于k-means聚类算法没有明确的不确定性度量，因此很难识别重叠区域中的点，并且将它们分配到聚类成为一项复杂的任务。\n\

    # 2.3.2.1 Ubuntu


    If the users are using Ubuntu 16.10 or latest, then write the following command
    :


    ```

    $ sudoapt-get update

    $ sudoapt-get install python3.6

    ```


    If the users are using Ubuntu 14.0, then they need to get personal package active,
    then write the following:



    \n## 2.4.4.7 While 循环\n\nPython 编程语言中的 while 循环语句只要给定条件为 True，就会重复执行目标语句。Python\
    \ 编程语言中 while 循环的语法是 –\nwhile 表达式: 语句(s)\n这里，语句(s) 可以是单条语句或语句块。条件可以是任何表达式，True\
    \ 是任何非零值。当条件为 True 时，循环进行迭代。当条件变为 False 时，程序控制传递到循环之后的下一行。以下示例说明了 while 循环的一个应用：\n\
    \n```python\nIn [22]:\n# 将自然数相加直到\n# sum = 1+2+3+...+n 的程序\n\n# 从用户获取输入，\n# n\

  mdcn: "## 3.2.4 第四阶段 – 模型构建\n\n本阶段的目标是理解机器学习模型是否足够稳健。在此阶段，数据集被开发并分类为测试集、训练集、生产集和验证集。此外，还需要确保执行模型和工作流的合适环境，这包括快速硬件和并行处理。\n\
    \n在此阶段，模型将在训练数据上进行拟合，并使用测试数据进行评估。此操作通常在沙箱中进行，而非在实际的生产环境中。机器学习模型规划和模型构建存在大量重叠。在最终确定机器学习模型之前，我们可能在这两个阶段之间反复迭代很长时间。根据所采用的方法，某些方法需要使用训练数据集（在某些情况下，还需要验证数据集）。\n\
    \n尽管开发此步骤所需的建模技术和逻辑可能很复杂，但与所有数据预处理和方法定义工作相比，此阶段的实际持续时间可能非常简短。在实际项目中，第一和第二阶段通常需要更多时间来准备和研究数据，并构建数据的呈现方式。\n\
    \n作为本阶段的一部分，将执行以下步骤：\n\n-   将第三阶段创建的模型投入实际应用。\n-   在可能的情况下，将模型转换为SQL或其他适当的数据库语言，并将其作为数据库内函数运行。这比在内存中运行要快得多，也更高效。（使用SQL在大型数据集上运行Python模型）如果我们使用SAS软件，SAS评分加速器允许我们在浏览器中运行SAS模型。\n\
    -   对于测试和小型数据集，使用Python（或SAS）模型处理文件提取数据。\n-   评估模型的有效性和结果（例如，它是否涵盖了大部分数据并具有强大的预测能力？）\n\
    -   调整变量输入，以微调模型以获得最佳结果。\n-   记录模型的结果和逻辑。\n\n在这些模型迭代和优化过程中，记录以下问题的答案以评估模型效率：\n\
    \n-   模型在测试和验证数据上看起来是否合理且准确？\n-   模型的输出/行为对领域专家和主题专家是否有意义？换句话说，模型是否看起来在提供“正确的答案”或在业务背景下有意义的答案？\n\
    -   模型是否足够准确以满足成功标准？（效率、性能以及第一阶段定义的其他关键绩效指标）\n-   模型是否避免了需要避免的错误？例如，根据具体情况，假阳性可能比假阴性更严重或更不严重。\n\
    -   拟合模型的参数值在业务领域背景下是否有意义？\n-   我们是否需要更多数据或更多输入？我们是否需要转换或消除任何输入？\n-   我们是否需要不同形式的模型？如果是这样，我们将需要回到机器学习模型规划阶段（第三阶段）并修改建模方法。\n\
    \n## 3.2.5 第五阶段 – 结果沟通\n\n在预测和结果沟通阶段需要回答的问题是：“模型是否足够稳健，能够准确预测结果（在误差值范围内）？”首先，基于我们在数据发现阶段创建的标准（成功标准的关键绩效指标），我们与关键利益相关者共同决定模型在本阶段是成功还是失败。接下来，确定最重要的结果，量化业务价值，并撰写叙述性报告，向关键利益相关者综合和传达研究发现。\n\
    \n基于我们在数据发现阶段创建的标准（成功标准的关键绩效指标），我们与关键利益相关者共同决定模型在本阶段是成功还是失败。确定最重要的结果，量化业务价值，并撰写叙述性报告，向关键利益相关者综合和传达研究发现。由于研究发现很可能在企业内部多个层级（从高管到运营）传播，因此需要考虑如何构建研究发现的框架并有效描述其影响。\n\
    \n作为项目收尾的一部分，项目团队将提供对未来工作或改进现有流程的建议，同时考虑每位团队成员和利益相关者需要您完成的任务以及丰富数据的众多新用例。此外，这也是我们强调项目业务效益的阶段。最后，此阶段将作为将模型投入生产并使其运行的检查点。\n\
    \n作为本阶段的最后一步，既然模型已成功运行，将执行以下活动来记录从项目中吸取的经验教训：\n\n-   评估模型的结果。\n    -   研究发现是否具有统计显著性和一致性？如果是这样，结果的哪些特征/属性比较突出？如果不是，我们需要对模型进行哪些更改以进行优化和迭代，使其更具可持续性？\n\
    \    -   哪些事实/细节让您感到惊讶，哪些与您在第一阶段提出的假设一致？将确认的结果与我们早期制定的想法相关联，通常会产生额外的想法和见解，如果我们没有在早期努力制定初始假设，这些想法和见解就会被遗漏。\n\
    -   通过分析观察到了哪些数据？\n    -   其中最重要的发现是什么？\n    -   这些发现是否具有商业价值或意义？根据模型产生的结果，我们可能需要花时间量化结果的业务影响，以便为演示做准备。\n\
    \n在本阶段结束时，我们将记录由于分析得出的重要发现和主要见解。此外，本阶段的最终成果将是外部利益相关者和赞助商眼中流程中最可见的部分，因此需要清晰地阐述研究发现的结果、方法和业务价值。\n\
    \n## 3.2.6 第六阶段 – 优化和模型运营化\n\n在模型运营化阶段需要回答的问题是：“模型的技术预测是否已转化为业务语言，以便业务团队成员能够解释结果？”"

    \n## 7.1 引言\n\n机器学习拟合数据中的统计类型以进行理解或预测。这些类型将特征作为输入。原始数据的特征表示被命名为特征数字。特征位于设备内的数据和模型之间，是了解机器学习流程的关键。特征工程是从原始数据中提取特征并将其转换为适合机器学习模型的格式的行为。它是机器学习流程中的一个重要步骤，因为合适的特征可以减少建模问题，从而使流程能够产生高质量的结果。专家们一致认为，构建机器学习流程的大部分时间都花在特征工程和统计清洗上。然而，尽管它很重要，这个话题并不经常被单独讨论。也许，这是因为相关的特征只能在每个模型和数据的上下文中定义；因为事实和模型如此多样化，很难在所有项目中概括特征工程的实践。\n\
    \n特征工程是通过改变其特征空间来改进数据库中模型预测的任务。改变此过程的现有策略依赖于通过实验引导的搜索进行灵活的空间测试，或者通过特征选择观察到的所有修改特征来显式扩展数据集。然而，这些方法在操作和/或内存方面会带来更高的计算成本。\n\
    \n特征工程是将原始数据转换为能够更好地表示推测模型中潜在问题的特征的过程，这导致了模型在不可见数据上准确性的提高。\n\n特征工程是准备机器学习数据的核心任务。它是从给定特征中构建相关特征以提高预测性能的实践。特征工程涉及在给定的新设计特征中使用算术和积分算子等转换函数。转换有助于测量特征或将元素与目标类别之间的非线性关系转换为易于理解的线性关系。特征工程通常由数据科学家完成，他们依赖于其领域的技术和错误测试以及模型测试。为了进行自动特征工程，一些现有方法使用启发式特征质量度量和其他约定操作步骤在特征空间中进行定向搜索。\n\
    \n特征是原始数据的数字表示。有多种方法可以将原始数据转换为数值，这就是为什么特征最终可能看起来像许多东西。自然地，特征应该来自可用的数据类型。不太明确的空间也与模型相关；某些模型更适合某些类型的特征，反之亦然。合适的特征与正在进行的工作保持一致，并且应该易于模型处理。特征工程是根据给定的数据、模型和函数构建最相关特征的技术。如果没有"

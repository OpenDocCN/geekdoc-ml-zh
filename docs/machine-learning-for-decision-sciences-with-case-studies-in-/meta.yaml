    # 1.8.1.2 Personalized Pricing


    # 1.8.1.2.1 What Is Personalized Pricing?


    Personalized pricing is where retailers already know about customers, and prices
    vary from customer to customer, which depends on characteristics and behavior.
    Let''s take the example of a shop market where retailers sell the same item at
    different prices to different customers. The customers who stay long-term, keep
    purchasing the items that retailers offer a special discount..


    # 1.8.1.2.2 How Personalized Pricing Works?


    As defined earlier, the pricing varies from customer to customer. This is because
    customers are categorized into different groups, and each group has a different
    price. Whenever a new or old customer arrives, the purchase system matches the
    customer with the most suitable group depending on their specifications and past
    visits. Accordingly, the prices are offered.

    Let''s take a hotel management system, for example, and their prices depend on
    the weather conditions and vacations. Whenever there are winters with snowfall,
    hotels'' pricing is high due to the season. In the same off-season, hotels offer
    a special discount to their customers.


    # 1.8.1.2.3 Client Response on Customized Pricing


    No one agrees on paying more when someone is paying less. When a customer came
    to knew about customized pricing, majority of customers were loud and not satisfied.
    Even people who paid less for the product raised the objection. As per their understanding,
    companies are offering fewer prices to customers who don''t want the product to
    attract them. The customer did not know it''s legal to charge different prices
    to different customers.


    # 1.8.1.3 AML – Anti-Money Laundering


    Anti-money laundering refers to the laws and procedures that identify the criminals
    who show illegally obtained money as legal income.


    # 1.8.1.3.1 How AML Works?


    AML targets unlawful activities, including business activities, bank details,
    trading goods, drug smuggling, and taking money in large amounts to other countries.

    All these activities are inspected by police officers who are hired for these
    works. They need to keep records of all the suspicious activities going around.


    # 1.8.1.3.2 Machine Learning in Anti-money Laundering


    To detect the criminal, it''s essential to keep a record of every step taken.
    Manually, it''s next to impossible. ML helps here; many models can be implemented
    to catch the criminal.

    **Anti-laundering software** is built using ML and AI, and this software can learn
    and gain information from historical data. For example, discover hidden patterns,
    and identify the connection and relationship between the data. On the other hand,
    detect and predict the auspicious event taking place. The software decreases the
    risk of false alarms and predictions.

    AI-based **analytical engine** helps to discover money laundering activities.
    It monitors all the banking activities like transferring money, payments, purchases,
    and investments; social media activities are also monitored to keep track of the
    extracurricular activities performed by the suspect.

    The engine uses supervised and unsupervised learning techniques to discover irregularity
    taken place.'

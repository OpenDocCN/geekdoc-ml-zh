- md: "## 7.5 EIGENVALUES AND PCA\n\nPCA uses the structure of eigendecomposition.\
    \ “Eigen” is a German word meaning “own.” Here, the matrix (A) is divided into:\n\
    \n- The diagonal matrix formed by eigenvalues of a matrix (A)\n- And the matrix\
    \ formed by the eigenvectors of a matrix (A)\n\nA square matrix can have one eigenvector\
    \ and as many eigenvalues as the size of the matrix. For example, a 4×4 matrix\
    \ will have four eigenvalues.\n\n### 7.5.1 USAGE OF EIGENDECOMPOSITION IN PCA\n\
    \nSuppose there is a database with a variety of “predictors.” After centering\
    \ the forecasters in their way, the “n×n” covariance matrix is obtained. This\
    \ matrix of covariance is then divided into eigenvalues and eigenvectors. The\
    \ covariance matrix, also named as dispersion matrix or variance–covariance matrix,\
    \ is a matrix with its feature in i, j position is the covariance among ith and\
    \ jth feature of a random vector. A random vector is a random variable with a\
    \ maximum size. From the covariance structures and the covariance matrix, the\
    \ following aspects are defined.\n\n- The covariance of random variables (forecasts)\
    \ itself is simply a variance.\n- Each item in the main diagonal of the covariance\
    \ matrix demonstrates the variances of each random variance.\n- The entire matrix\
    \ of covariance is symmetric.\n\nTherefore, the matrix of covariance has variances\
    \ (covariance of a predictor with itself) and covariances (between predictions).\
    \ Eigenvector is units that have a length or size equal to 1. It is often called\
    \ the right vector, also called a column vector. Eigenvalues are coefficients\
    \ used in eigenvectors that give vectors their length or magnitude.\n\nTherefore,\
    \ PCA is a way of:\n\n- Measurement of how each variable is linked using the covariance\
    \ matrix.\n- Interpretation of the guidelines of the spread of the data using\
    \ **eigenvectors**.\n- Exposing the comparative significance of these directions\
    \ using **eigenvalues**.\n- The PCA method can be defined and executed using the\
    \ tools of linear algebra using the numpy package in python (without using its\
    \ direct implementation function from the sklearn package).\n\nConsider the data\
    \ in Table 7.1.\n\n**TABLE 7.1**\nData to Implement Eigendecomposition\n\n| Age\
    \ | Weight | Height |\n| :--- | :--- | :--- |\n| 20 | 60 | 4.5 |\n| 35 | 65 |\
    \ 5 |\n| 40 | 70 | 5.5 |\n| 45 | 75 | 6 |\n\nThis data can be represented as a\
    \ 5×3 matrix and named as A.\n\n```\nMatrix A:\n[[20.  60.   4.5]\n [35.  65.\
    \   5. ]\n [40.  70.   5.5]\n [45.  75.   6. ]]\n```\n\nLet’s center the features\
    \ of this matrix to mean, determine covariance matrix, and implement eigendecomposition\
    \ as depicted below.\n\n```\n# calculate the mean of each column\nM=np.mean(A.T,\
    \ axis=1)\nprint(\"\\n Means of Cols n:\\n\",M)\n\n#Center columns by subtracting\
    \ colum means\nC = A - M\n\nprint(\"\\n Matrix after centering the column to its\
    \ means\\n\",C)\n\n#Calculate Covariance matrix of Centered Matrix\nV=np.cov(C.T)\n\
    \nprint(\"\\n The Covariance Matrix :\\n\",V)\n\n#Eigen decompistion of Covariance\
    \ Matrix\neigen_values,eigen_vectors = LA.eig(V)\n\nprint(\"\\n Eigen values:\
    \ \\n\",eigen_values)\nprint(\"\\n Eigen Vectors: \\n\",eigen_vectors)\n```\n\n\
    ```\nMeans of Cols n:\n[35.  67.5  5.25]\n\nMatrix after centering the column\
    \ to its means\n[[-15.   -7.5  -0.75]\n [  0.   -2.5  -0.25]\n [  5.    2.5  \
    \ 0.25]\n [ 10.    7.5   0.75]]\n\nThe Covariance Matrix :\n[[116.66666667  66.66666667\
    \   6.66666667]\n [ 66.66666667  41.66666667   4.16666667]\n [  6.66666667   4.16666667\
    \   0.41666667]]\n\nEigen Values:\n[1.56053271e+02 2.69672869e+00 7.48573384e-17]\n\
    \nEigen Vectors:\n[[-8.62072917e-01 -5.06784259e-01 -1.19177337e-16]\n [-5.04269186e-01\
    \  8.57794613e-01 -9.95037190e-02]\n [-5.04269186e-02  8.57794613e-02  9.95037190e-01]]\n\
    ```\n\nFrom the above output, it is clear that eigenvectors give PCA components,\
    \ and eigenvalues give explained variances of the components. Therefore, since\
    \ there are three predictors, three eigenvalues are obtained.\n\n- Eigenvectors\
    \ can now be organized by eigenvalues to reduce the supply of components or axes\
    \ for the new matrix A.\n- If there is an eigenvalue near zero, they represent\
    \ disposable components.\n- A total of “n” (here 3) or a few elements that make\
    \ up the selected bottom area should be selected. Ideally, we can choose k (<n)\
    \ eigenvectors, called principal components, with the largest eigenvalues.\n\n\
    The explained variance ratio of the first component is given as:\n*explained variance\
    \ of 1st component/(total of all explained variances)*\n\n```\nexp_ratio1=eigen_values[0]\
    \ / sum(eigen_values)\nprint(\"\\n The explained ratio of the first component:\\\
    n\",exp_ratio1)\n\nThe explained ratio of the first component:\n0.9830127326851055\n\
    ```\n\n- It can be noticed that the first component is enough to explain up to\
    \ 98% of the variance in the data. So, the data can be projected into a 4×1 matrix\
    \ instead of a 4×3 matrix, reducing the dimension of data, of course, with a minor\
    \ loss in information.\n\n## 7.6 FEATURE REDUCTION\n\nThe art of machine learning\
    \ begins with the creation of appropriate data presentations. Better performance\
    \ is often achieved using features taken from the original input. Creating a feature\
    \ presentation can add domain information to the data and can be specified by\
    \ the specific application. However, there are many ways to make common features,\
    \ including clustering, basic input linear transform variables [PCA/SVD, linear\
    \ discriminant analysis (LDA)], complex line variations such as spectral transformations\
    \ (Fourier, Hadamard), wavelet transform, or convolutions of kernels, and apply\
    \ simple functions to flexible subsets, such as monomials.\n\nTwo different objectives\
    \ can be pursued by feature design: to achieve data reconstruction or be more\
    \ efficient in making predictions. The first problem is an unsupervised learning\
    \ problem. It is very close to data compression, and many algorithms are used\
    \ in both fields. The second problem is supervised. Are there reasons to select\
    \ features in an unsupervised manner when the problem is supervised? Yes, with\
    \ a few possibilities. Other problems, e.g., for text processing applications,\
    \ come with unlabeled data compared to labeled data. Also, the selection of unsupervised\
    \ features is not usually overdone to overfitting.\n\nOur goal is to have an algorithm-friendly\
    \ dataset. What do we mean by that?\n\nIf you have a lot of features, there are\
    \ a few potential problems:\n\n- The model has a high degree of difficulty.\n\
    - It can make a lot of noise.\n- If they have different scales, it reduces the\
    \ performance of several algorithms that are scale-sensitive.\n- More complex\
    \ visualizations in n-dimensional space.\n\nHere comes the role of PCA. It reduces\
    \ the dimensionality of the dataset by extracting/eliminating the important/unimportant\
    \ features.\n\nPCA detects a change that reduces the size of the data while calculating\
    \ the variance as large as possible. PCA is the oldest process in a multivariate\
    \ analysis. The basic concept of PCA is a projection-based process. Here, the\
    \ actual dataset X ∈ R n with n columns (features) is projected into a subspace\
    \ with k or lower dimensions' representation X ∈ R K (fewer columns) while maintaining\
    \ the total amount of original data.\n\nThe algorithm works as follows: to reduce\
    \ the dimensionality of the feature from n-dimensions to k-dimensions, two stages\
    \ are implemented; the preprocessing and dimensionality reduction stage. First,\
    \ in the preprocessing stage (steps 1–4 in Section 7.4), the data is preprocessed\
    \ to normalize its mean and variance using equations 7.3 and 7.4 in Section 7.4.\
    \ Then, in the second stage (steps 5–8 in Section 7.4), which denotes the reduction\
    \ phase, the covariance matrix C_M, eigenvectors and eigenvalues are calculated\
    \ from equations 7.5 and 7.6 in Section 7.4.\n\nWhen using PCA to reduce dimension,\
    \ one has to deal with how many principal components ($k$) should be used. As\
    \ with all hyperparameters, this number can be changed based on the quality of\
    \ the emerging model. But some tests do not include expensive calculations. Therefore,\
    \ another option is to select a $k$ in the account with the desired value of the\
    \ total variance. (This option is available in the scikit-learn package PCA.)\
    \ The variations of projection onto the $k$th component are:\n\n$$|Xv_k|^2 = ||u_k\
    \ \\sigma_k||^2 \\sigma_k^2 \\quad (7.8)$$\n\nwhich is the square of the $k$th\
    \ largest singular value of $X$. The ordered list of singular values of a matrix\
    \ is called its spectrum. Therefore, to define how many components to use, one\
    \ can perform a simple spectral analysis of the data matrix and pick the threshold\
    \ that retains enough variance.\n\nTo retain enough components to cover 80% of\
    \ the total variance in the data, pick $k$ such that\n\n$$\\frac{\\sum_{i=1}^{k}\
    \ \\sigma_i^2}{\\sum_{i=1}^{d} \\sigma_i^2} \\geq 0.8 \\quad (7.9)$$\n\nPCA is\
    \ computationally expensive. It relies on SVD, which is an expensive process.\
    \ Calculation of the full SVD of the matrix takes O-functions ($nd^2+d^3$) by\
    \ assuming $n \\geq d$ where there are more data points than features. Even if\
    \ we only want the principal components of $k$, using a reduced SVD (single $k$\
    \ values and vectors) still takes $O((n+d)^2k)=O(n^2k)$ operations. This is available\
    \ when there are a large number of data points or features. It is difficult to\
    \ perform PCA in the form of streaming, batch updates, or a sample of full data.\
    \ Streaming computation of the SVD, updating the SVD, and computing the SVD from\
    \ a subsample are all difficult research problems.\n\nAlgorithms exist but at\
    \ the cost of reduced accuracy. One implication is that one has to expect lower\
    \ representational accuracy when capturing test data in the principal components\
    \ found in the training set. In addition, as the distribution of the data changes,\
    \ one needs to recompute the principal components in the current dataset.\n\n\
    ### 7.6.1 FACTOR ANALYSIS VS. PRINCIPAL COMPONENT ANALYSIS\n\n- PCA components\
    \ define a high degree of variability, while FA defines covariance in data.\n\
    - PCA components are completely orthogonal to each other, while FA does not require\
    \ factors to be orthogonal.\n- Components of PCA are a linear combination of the\
    \ observed variable, while in FA, the observed variables are a linear combination\
    \ of the unobserved variables or factors.\n- PCA components are not defined. In\
    \ FA, key factors are sets and interpretable.\n- PCA is a method of reducing the\
    \ dimension, whereas FA is the latent variable method.\n- PCA is a type of FA.\
    \ PCA is observational, whereas FA is a modeling technique.\n\n## 7.7 PCA TRANSFORMATION\
    \ IN PRACTICE USING PYTHON\n\nIn this example, we consider the role of PCA in\
    \ dimension reduction. A random dataset with 100 points is considered, and all\
    \ the required libraries are imported as presented.\n\n```\nimport numpy as np\n\
    import matplotlib.pyplot as plt\nimport seaborn as sns; sns.set()\n```"
  mdcn: "## 7.5 特征值与PCA\n\nPCA利用了特征分解的结构。“Eigen”是一个德语词，意为“自身的”。在此，矩阵（A）被分解为：\n\n-\
    \ 由矩阵（A）的特征值构成的对角矩阵\n- 以及由矩阵（A）的特征向量构成的矩阵\n\n一个方阵可以有一个特征向量，以及与矩阵尺寸相同数量的特征值。例如，一个4×4的矩阵将有四个特征值。\n\
    \n### 7.5.1 特征分解在PCA中的应用\n\n假设有一个包含多种“预测变量”的数据库。以某种方式对预测变量进行中心化处理后，得到“n×n”的协方差矩阵。然后，这个协方差矩阵被分解为特征值和特征向量。协方差矩阵，也称为离散矩阵或方差-协方差矩阵，是一个矩阵，其第i行第j列的元素是随机向量中第i个和第j个特征之间的协方差。随机向量是一个具有最大维度的随机变量。从协方差结构和协方差矩阵中，可以定义以下方面：\n\
    \n- 随机变量（预测值）自身的协方差就是方差。\n- 协方差矩阵主对角线上的每个元素表示每个随机变量的方差。\n- 整个协方差矩阵是对称的。\n\n因此，协方差矩阵包含方差（预测变量与自身的协方差）和协方差（预测变量之间）。特征向量是长度或大小等于1的单位向量。它通常被称为右向量，也称为列向量。特征值是特征向量中使用的系数，赋予向量其长度或大小。\n\

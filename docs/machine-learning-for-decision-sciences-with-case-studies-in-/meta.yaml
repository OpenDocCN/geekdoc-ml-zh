    # 7.5 EIGENVALUES AND PCA


    PCA uses the structure of eigendecomposition. “Eigen” is a German word meaning
    “own.” Here, the matrix (A) is divided into:


    +   - The diagonal matrix formed by eigenvalues of a matrix (A)

    - And the matrix formed by the eigenvectors of a matrix (A)


    A square matrix can have one eigenvector and as many eigenvalues as the size of
    the matrix. For example, a 4×4 matrix will have four eigenvalues.


    # 7.5.1 USAGE OF EIGENDECOMPOSITION IN PCA


    Suppose there is a database with a variety of “predictors.” After centering the
    forecasters in their way, the “n×n” covariance matrix is obtained. This matrix
    of covariance is then divided into eigenvalues and eigenvectors. The covariance
    matrix, also named as dispersion matrix or variance–covariance matrix, is a matrix
    with its feature in i, j position is the covariance among ith and jth feature
    of a random vector. A random vector is a random variable with a maximum size.
    From the covariance structures and the covariance matrix, the following aspects
    are defined.


    +   - The covariance of random variables (forecasts) itself is simply a variance.

    - Each item in the main diagonal of the covariance matrix demonstrates the variances
    of each random variance.

    - The entire matrix of covariance is symmetric.


    Therefore, the matrix of covariance has variances (covariance of a predictor with
    itself) and covariances (between predictions). Eigenvector is units that have
    a length or size equal to 1. It is often called the right vector, also called
    a column vector. Eigenvalues are coefficients used in eigenvectors that give vectors
    their length or magnitude.

    Therefore, PCA is a way of:


    +   - Measurement of how each variable is linked using the covariance matrix.

    - Interpretation of the guidelines of the spread of the data using **eigenvectors**.

    - Exposing the comparative significance of these directions using **eigenvalues**.

    - The PCA method can be defined and executed using the tools of linear algebra
    using the numpy package in python (without using its direct implementation function
    from the sklearn package).



    ![](img/7fbca4852dbe91c6cea209148871a1b3_248_0.png)


    # 6.3.3 Optimization Problem


    Optimization is a minimization or maximization problem. Let the actual output
    be $y$ and the predicted output be $\hat{y}$, and the objective is to minimize
    the difference between the predicted output and actual output as given in Equation
    6.4.


    Objective is to $\min(\hat{y} - y)$


    Cross-entropy loss function $L_{CE}$ is the function used in logistic models


    $L_{CE} = -\log p(y|x)$


    $\log p(y|x) = y \log \hat{y} + (1-y) \log(1-\hat{y})$


    $L_{CE} = -[y \log \hat{y} + (1-y) \log(1-\hat{y})]$


    # 6.3.4 Regularization


    The model performs well for training data and does not classify new unseen data,
    which is known as the overfitting problem. Overfitting occurs when our model fits
    with too much data. This can be resolved by using regularization term to generalize
    the logistic regression model. Regularization can be done by adding a penalty
    to the weight parameters. $L_1$ and $L_2$ regularizations are the two forms of
    regularizations. $L_2$ regularization is a widely used one, and the general form
    is in Equation 6.15.


    $\frac{\lambda}{2} ||w||^2 = \frac{\lambda}{2} \sum_{j=1}^{m} w_j^2$


    where $\lambda$ is the regularization parameter.'

    # 2.4.9 DEBUGGING IN PYTHON


    The process of identifying errors from the source code is called debugging. It
    helps the programmer dry run each step and identifies the exact line of code due
    to which error occurred. The software which allows the programmer to debug the
    code is called a debugger.


    There are many ways to debug the code and identify errors. For example, some of
    the developers print all the lines, which may execute errors. The print statement
    will help show the output on each step; preserving the log is another way to debug
    the code. Besides all this, many debugging tools assist developers in automating
    the debugging.


    Python has a debugger, which is known as PDB (Python Debugger). The user can configure
    it to explore all the debugging features included in it. Thus, the user can easily
    look into their code while debugging and identify the error-affected lines.


    PDB can easily be configured using below-mentioned code:


    ```

    import pdb;

    Pdb.set_trace()

    ```


    > While execution, as soon as compiler reaches this line, command prompt opens
    in the terminal which displays all the debugging information


    Following are the built-in commands used during debugging:


    +   1. **List:** Allow the user to view the line which is currently executed.

    2. **Up and Down:** The user can change the position of execution with this command.

    3. **Step and Next:** Both commands allow the sequential execution of the code.
    Next, it will go to the next line of the code, ignoring the call to another function.
    The step will not ignore the call to other functions and goes deeper.

    4. **Break:** Allow the user to add break points at different points. It stops
    the debugging.



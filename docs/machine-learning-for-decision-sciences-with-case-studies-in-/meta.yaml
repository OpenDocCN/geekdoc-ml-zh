  md: 'model training. In other words, the selection of features is not about reducing
    training time – in fact, some strategies increase the total training time – but
    reduce model installation time. Simply put, feature selection techniques fall
    into three categories: Preprocessing filtration methods to remove those that may
    apply to the model. For example, one can combine the knowledge of the relation
    or interaction between each element and the flexibility of the answer and then
    filter the features that fall under the threshold. Filter techniques are much
    cheaper than the wrapping techniques described below, but they do not consider
    the model used. Therefore, they may not be able to select the appropriate features
    of the model. Therefore, it’s best to make choices before saving to avoid unnecessarily
    removing useful features before they get to the training step.


    # 7.2.1 WRAPPER METHODS


    Wrapper methods are expensive but try the subsets of features, which means that
    it can’t accidentally cut out the features that are not only taught but useful
    when taken together. The wrap method treats the model like a black box that provides
    quality results of the proposed subset of features. There is a different way of
    over-filtering the set, which is described below.


    Wrappers use a search strategy to search through the space of possible feature
    subsets and evaluate each subset by the performance quality on an ML algorithm.
    Practically, any combination of search strategy and algorithm can be used as a
    wrapper. It is featured as:


    +   - use ML models to score the feature subset

    - train a new model on each subset

    - very computationally expensive

    - usually provide the best performing subset for a given ML algorithm but probably
    not for another

    - need an arbitrarily defined stopping criteria


    The most common **search strategy** group is Sequential search, including Forward
    Selection, Backward Elimination, and Exhaustive Search. Randomized search is another
    popular choice, including Evolutionary computation algorithms such as genetic
    and Simulated annealing.


    Another key element in wrappers is **stopping criteria**. The searching process
    is stopped based on three criteria:


    +   - performance increase

    - performance decrease

    - the predefined number of features is reached


    # 7.2.1.1 Forward Selection


    Forward feature selection starts by evaluating all features individually and selects
    the one that generates the best performing algorithm, according to preset evaluation
    criteria. Then, the algorithm evaluates all possible combinations of the selected
    feature and selects the pair that produces the best performing algorithm based
    on the same preset criteria. This selection procedure is called greedy because
    it evaluates all possible single, double, triple, and feature combinations. Therefore,
    it is quite computationally expensive, and sometimes, if feature space is big,
    even unfeasible.


    # 7.2.1.2 Backward Elimination


    Backward feature selection starts by fitting a model using all features. Then,
    it removes one feature. Next, it will remove the one that produces the highest
    performing algorithm (least statistically significant) for certain evaluation
    criteria. The second step will remove a second feature, the one that again produces
    the best-performing algorithm. And it proceeds with removing feature after feature
    until a certain criterion is met.'

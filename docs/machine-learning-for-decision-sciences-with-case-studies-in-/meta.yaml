  md: "# 2.4.6.4 Function Arguments\n\nThe user can call a function by using the following\
    \ types of formal arguments:\n\n+   - Keyword arguments\n- Default arguments\n\
    - Variable-length arguments\n\n# 2.4.6.4.1 Keyword Arguments\n\nKeyword arguments\
    \ are related to the function calls. When the user uses keyword arguments in a\
    \ function call, the caller identifies the arguments by the parameter name. This\
    \ allows the user to skip arguments or place them out of order because the Python\
    \ interpreter can use the keywords provided to match the values with parameters.\
    \ The user can also make keyword calls to the printme() function in the following\
    \ ways:\n\n```\nIn [1]: def printme(str):\n    #\"This prints a passed string\
    \ into this function\"\n    print(str)\n    return\n\n# Now you can call printme\
    \ function\nprintme(str= \"My string\")\n\nMy string\n```\n\n```\nIn [3]: def\
    \ func(a, b=5, c=10): # value assignment to function varible must be from right\
    \ to left.\n    print('a is', a, 'and b is', b, 'and c is', c)\n\nfunc(2) # In\
    \ this case, Default value of b&c are taken as its value.\n\nfunc(25, c=24) #\
    \ In this case, Default value of b laone is taken, since other two values are\
    \ passed.\n\nfunc(c=50, a=100)\n\na is 2 and b is 5 and c is 10\na is 25 and b\
    \ is 5 and c is 24\na is 100 and b is 5 and c is 50\n```\n\n# 2.4.6.4.2 Default\
    \ Arguments\n\nA default argument is an argument that assumes a default value\
    \ if a value is not provided in the function call for that argument. The following\
    \ example gives an idea of default arguments; it prints the default age if not\
    \ passed.\n\n```\nIn [9]: def say(message, times=3):\n    print (message * times)\n\
    \nsay('Hello ')\n\nsay('World ', 5)\n\nHello Hello Hello\nWorld WorldWorldWorldWorld\n\
    ```"

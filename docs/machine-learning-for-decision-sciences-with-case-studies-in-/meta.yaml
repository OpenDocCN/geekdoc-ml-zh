    Features and models reside between the raw data and the desired insight, depicted
    in Figure 7.1. In the workflow of machine learning, the model is not only chosen
    but also the features. This is a double-edged coin, and one choice affects the
    other. Positive features make the next step of modeling easier, and the emerging
    model is able to complete the task you are looking for. Negative features may
    require a more sophisticated model to achieve the same level of performance. Throughout
    the book, we will talk about different features and discuss the advantages and
    disadvantages of different types of data and models.


    Knowing where feature engineering fits into the context of the process of machine
    learning equipment highlights that it is not independent.


    It is a repetitive process associated with data selection and model testing, over
    and over again, until we run out of time on our problem.


    The process may look like the following:


    +   1. **Brainstorm capabilities:** Get into the problem, see more details, learn
    the feature engineering of other problems and see what you can steal.

    2. **Devise capabilities:** The automatic feature extraction, text feature creation,
    and both combinations can be used depending on the problem.

    3. **Select capabilities:** Use key feature variations and feature selection methods
    to prepare one or more views for your working models.

    4. **Examine models:** Evaluate model accuracy on invisible data using selected
    features.


    A well-defined problem is needed to know when to stop this repetitive process
    and then continue to try other models, other model configurations, model combinations,
    and so on. A well-thought-out test device is also needed to be designed to measure
    the potential of a model in intangible data. It will be the only measure got from
    the feature engineering process.


    # 7.2 FEATURE SELECTION


    Feature selection strategies have eliminated useless features to reduce the complexity
    of the emerging model. The ultimate goal is a model of pride that is quick to
    reckon with, with little or no damage to speculation. To get to such a model,
    some feature selection techniques require more than one'
  - '[PAGE 375]


    model training. In other words, the selection of features is not about reducing
    training time – in fact, some strategies increase the total training time – but
    reduce model installation time. Simply put, feature selection techniques fall
    into three categories: Preprocessing filtration methods to remove those that may
    apply to the model. For example, one can combine the knowledge of the relation
    or interaction between each element and the flexibility of the answer and then
    filter the features that fall under the threshold. Filter techniques are much
    cheaper than the wrapping techniques described below, but they do not consider
    the model used. Therefore, they may not be able to select the appropriate features
    of the model. Therefore, it’s best to make choices before saving to avoid unnecessarily
    removing useful features before they get to the training step.


    # 7.2.1 WRAPPER METHODS


    Wrapper methods are expensive but try the subsets of features, which means that
    it can’t accidentally cut out the features that are not only taught but useful
    when taken together. The wrap method treats the model like a black box that provides
    quality results of the proposed subset of features. There is a different way of
    over-filtering the set, which is described below.


    Wrappers use a search strategy to search through the space of possible feature
    subsets and evaluate each subset by the performance quality on an ML algorithm.
    Practically, any combination of search strategy and algorithm can be used as a
    wrapper. It is featured as:


    +   - use ML models to score the feature subset

    - train a new model on each subset

    - very computationally expensive

    - usually provide the best performing subset for a given ML algorithm but probably
    not for another

    - need an arbitrarily defined stopping criteria


    The most common **search strategy** group is Sequential search, including Forward
    Selection, Backward Elimination, and Exhaustive Search. Randomized search is another
    popular choice, including Evolutionary computation algorithms such as genetic
    and Simulated annealing.


    Another key element in wrappers is **stopping criteria**. The searching process
    is stopped based on three criteria:


    +   - performance increase

    - performance decrease

    - the predefined number of features is reached


    # 7.2.1.1 Forward Selection


    Forward feature selection starts by evaluating all features individually and selects
    the one that generates the best performing algorithm, according to preset evaluation
    criteria. Then, the algorithm evaluates all possible combinations of the selected
    feature and selects the pair that produces the best performing algorithm based
    on the same preset criteria. This selection procedure is called greedy because
    it evaluates all possible single, double, triple, and feature combinations. Therefore,
    it is quite computationally expensive, and sometimes, if feature space is big,
    even unfeasible.


    # 7.2.1.2 Backward Elimination


    Backward feature selection starts by fitting a model using all features. Then,
    it removes one feature. Next, it will remove the one that produces the highest
    performing algorithm (least statistically significant) for certain evaluation
    criteria. The second step will remove a second feature, the one that again produces
    the best-performing algorithm. And it proceeds with removing feature after feature
    until a certain criterion is met.'
  - '[PAGE 376]


    # 7.2.1.3 Exhaustive Feature Selection


    The best subset of features is selected in an exhaustive feature selection, among
    all possible feature subsets, by optimizing a specified performance metric for
    a certain machine learning algorithm. For example, if the classifier is the logistic
    regression and the dataset consists of **four** features, the algorithm will evaluate
    all feature combinations as follows:


    +   - all possible combinations of one feature

    - all possible combinations of two features

    - all possible combinations of three features

    - all the four features


    and select the one that results in the logistic regression classifier’s best performance
    (e.g., classification accuracy). This exhaustive search is very computationally
    expensive. In practice, for this computational cost, it is rarely used.


    # 7.2.2 Featured Methods


    These methods make the selection of a feature part of the model training process.
    For example, the decision tree naturally makes a feature selection because it
    selects one element of tree division in each training step. Another example is
    the standardizer 1, which can be added to the training purpose of any specific
    model. The ℓ 1 trend encourages models that use fewer features instead of many
    features, so it is also known as the sparsity limit on the model. The included
    methods include feature selection as part of the model training process. They
    are not as powerful as threatening methods, but they are not as expensive. Compared
    with filters, embedded methods select features specific to the model. In this
    sense, embedded methods strike a balance between computer costs and the quality
    of results. The steps can be summarized to solve the problem of feature selection
    in a checklist:


    +   1. Have you got any knowledge about the problem domain? If so, create an enhanced
    set of “ad hoc” features.

    2. Is the feature appropriate? If not, normalize them.

    3. Do you doubt feature interdependence? If yes, extend the feature set by formulating
    feature products or conjunctive features.

    4. Does the input variable need to be pruned? If no, create disjunctive features
    or weighted sums of features.

    5. Does the feature need to be accessed individually? If yes, apply a variable
    ranking method; otherwise, try to obtain the baseline results.

    6. Have you got a predictor? If no, stop.

    7. Do you doubt whether data are dirty? If yes, identify the outlier examples
    based on the top-ranking variables acquired from step 5 as representation; verify
    or reject them.

    8. Have you got an idea of what to try first? If no, apply a linear predictor.
    Then, utilize a forward selection method with the “probe” approach as a terminating
    condition or apply the 0-norm embedded approach. For evaluation, as a result of
    the ranking of step 5, create a sequence of predictors of the same nature using
    increasing subsets of features. Is it possible to match or improve performance
    with a smaller subset? If so, use a nonlinear predictor with that subset.

    9. Have you got new thoughts, time, computational resources, and enough examples?
    If yes, compare several feature selection methods, including your new idea, correlation
    coefficients, backward selection, and embedded methods. Next, apply linear and
    nonlinear predictors. Finally, choose the best approach with model selection.

    10. Is a stable solution needed to improve performance and understanding? If so,
    subsample your data and redo your analysis for several “bootstraps.”'
- md: '## 7.3 FACTOR ANALYSIS


    Factor analysis (FA) is a method of analyzing experimental data to search for
    potential influential factors or hidden variables from a set of notable variables.
    It helps in translating data by reducing the amount of flexibility. It subtracts
    a complete standard variation across all variables and sets the same points.


    FA is widely used in market research, marketing, psychology, finance, and performance
    research. For example, market analysts utilize FA to identify price-sensitive
    customers, identify product features that influence consumer preferences, and
    help to understand the selection channels for distribution channels. FA is a straightforward
    mathematical model. It is used to describe the differences between visual variables
    and obscure a set of invisible variables called factors. Visual differences are
    followed as a direct combination of features and error words. Factor or latent
    variable is associated with multiple visual variables, which have common response
    patterns. Each feature describes a certain amount of variability in observed variables.
    It helps in translating data by reducing the amount of flexibility.


    $X_i = \beta_{i0} + \beta_{i1}F_1 + \beta_{i2}F_2 + (1)e_i$


    FA is a way of investigating whether several variables of interest, $X_1, X_2,
    \dots, X_k$, are equally related to a small number of intangible factors $F_1,
    F_2, \dots, F_k$.


    **Assumptions:**


    1.  Outliers are not present in the data.

    2.  The sample size must be larger than the factor.

    3.  There must be no perfect multicollinearity.

    4.  There must be no rigidity among the variables.


    ### 7.3.1 TYPES OF FACTOR ANALYSIS


    -   Exploratory Factor Analysis: It is the most popular way of analyzing factors
    for social researchers and administrators. Its basic assumption is that any apparent
    flexibility is directly related to any factor.

    -   Confirmatory Factor Analysis (CFA): Its basic assumption is that each item
    is associated with a specific set of observed variables. CFA confirms basic expectations.


    ### 7.3.2 WORKING OF FACTOR ANALYSIS


    The primary purpose of FA is to reduce the number of observations and detect invisible
    variables. These tangible variables help the market researcher to complete the
    research. This recognizable variation of the observed variables can be achieved
    in two steps:


    -   **Factor extraction:** In this step, the number of factors and the removal
    methods is chosen using variance partitioning methods like principal component
    analysis (PCA) and common factor analysis.

    -   **Factor rotation:** In this step, rotation attempts to convert factors into
    unrelated factors. The main purpose of this step is to improve the overall interpretation.
    Many rotation methods are available: Varimax rotation method, Quartimax rotation
    method, and Promax rotation method.


    ### 7.3.3 TERMINOLOGIES


    #### 7.3.3.1 Definition of Factor


    A factor is a subtle variable that describes the correlation between the number
    of variables observed. The maximum number of factors is equal to the number of
    variables detected. Everything explains a certain variation in the visual variability.
    Factors with very low variability have been reduced. Factors are also known as
    hidden or latent variables or hypothetical variables.


    #### 7.3.3.2 Factor Loading


    The loading factor is a matrix that demonstrates the relationship of each variation
    to an underlying factor. It expresses the coefficient correlation for the observed
    variable and the factor. It shows the defined differences in the observed variables.


    #### 7.3.3.3 Eigenvalues


    Eigenvalues represent diversity defining each item from a complete diversity.
    It is also known as the root of the feature.


    #### 7.3.3.4 Communalities


    Communalities are the sum of double the loading of each variable. Represents common
    variations. It goes from 0 to 1, and the value around 1 represents the most varied.


    $\hat{h}_i^2 = \sum_{k=1}^n \hat{l}_{ik}^2$


    #### 7.3.3.5 Factor Rotation


    Rotation is a better translation tool for FA. Rotation can be orthogonal or oblique.
    It also distributed the standard with a clear loading pattern.


    #### 7.3.3.6 Selecting the Number of Factors


    The Kaiser method is the analytical method based on the most important part of
    the variance defined by the factor to be selected. The eigenvalue is a good way
    to determine the number of factors. Mostly, eigenvalue larger than 1 will be considered
    as optional factors. The graphic method represents certain eigenvalue factors,
    also called scree plots, as shown in Figure 7.2. This scree structure helps us
    determine the number of factors in which a curve forms an elbow.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_378_0.png)


    FIGURE 7.2 Scree plot.


    ## 7.4 PRINCIPAL COMPONENT ANALYSIS


    With automatic data collection and feature-generating techniques, one can quickly
    discover a large number of features. But not all are helpful. Let’s discuss feature
    dimensionality reduction using PCA. Often, we encounter situations where a particular
    outcome or decision depends not on a single indicator (forecaster) but many complex
    factors of the decision-making process. This is called the curse of dimensionality.
    It is a well-known fact that it is important to limit the number of important
    factors to reach the right conclusion. This process is called dimensionality reduction.
    In machine learning, the problem of high dimensionality is treated in two ways:


    -   **Feature selection**: a careful selection of key features by filtering out
    inconsistent features.

    -   **Feature extraction**: we create new and relevant features from the original
    features. PCA is one of the key means of extracting a feature.


    Similarly, PCA converts the corresponding features of data into orthogonal components
    to capture all important information from the data while minimizing its size.

    PCA can be used in the following means:


    -   Limit the number of features but cannot identify the less important ones that
    are ignored.

    -   Make sure that data features are standalone even if the features are not slightly
    interpreted.


    ### 7.4.1 CENTER THE DATA


    Eigen decomposition produces transformation matrices where eigenvectors denote
    the rotational matrix, while eigenvalues denote scaling factors. Conversely, the
    covariance matrix has no data related to data translation. Undeniably, the translation
    is represented by an affine transformation required instead of a linear transformation.
    Consequently, before installing PCA to exchange data for obtaining unrelated axes,
    any existing changes need to be calculated by removing the mean data from each
    data point. This is just like entering the data in such a way that its scale becomes
    zero.


    ### 7.4.2 NORMALIZE THE DATA


    Eigenvector covariance matrix points when referring to large data differences.
    Conversely, variance is a whole number, not a relative. This means that the difference
    in data measured in inches will be much greater than the same data when measured
    in feet. For instance, one feature denotes an object’s length in meters, while
    the second feature denotes the object in inches. If the data is normalized, the
    biggest difference, and therefore the largest eigenvector, will be fully determined
    by the first factor. To avoid this PCA scale-based approach, it helps normalize
    the data by separating each feature with a standard deviation. This is particularly
    significant when different features are related to different metrics.


    ### 7.4.3 ESTIMATE THE EIGEN DECOMPOSITION


    As details will be shown to larger eigenvectors to reduce the size, eigendecomposition
    must be determined. One of the most widely used methods of calculating eigendecomposition
    is singular value decomposition (SVD).


    ### 7.4.4 PROJECT THE DATA


    To reduce the size, the data is automatically displayed to the largest eigenvectors.
    Let *W* be a matrix with its columns containing the largest eigenvectors and let
    *O* be the original data with its columns containing different observations. After
    that, the projected data $O''$ is available as $O'' = W^T O$. The number of residual
    values is selected, such as columns of $W$ which, directly, can define the number
    of variations of actual data that need to be maintained while removing eigenvectors.
    If only $N$ eigenvectors are stored, and $e_1, \dots, e_N$ denote the respective
    eigenvalues, the number of variants leftover after projected original d-dimensional
    data can be calculated as:


    $$s = \frac{\sum_{i=0}^{N} e_i}{\sum_{j=0}^{d} e_j}$$ (7.2)


    1.  The original feature values of the given data are normalized by its mean and
    variance specified in equation 7.3, where $k$ is the number of instances in the
    dataset and $X_{(i)}$ are data points.


    $$\mu = \frac{1}{n} \sum_{i=1}^{n} X_{(i)}$$ (7.3)


    2.  Substitute $X_{(i)}$ with $X_{(i)} - \mu$.

    3.  Resize every vector $X_{j(i)}$ to obtain unit variance with the help of equation
    7.4.


    $$\sigma_j^2 = \frac{1}{n}$$ (7.4)


    4.  Substitute $X_{j(i)}$ with $\frac{X_{j(i)}}{\sigma}$.

    5.  Determine the covariance matrix $C_M$ as:


    $$C_M = \frac{1}{m} (X_{(i)}) (X_{(i)})^T$$ (7.5)


    6.  Determine the eigenvectors and respective eigenvalues of $C_M$.

    7.  Decrease eigenvalues and sort the eigenvectors, and select $k$ eigenvectors
    containing the largest eigenvalues to obtain $V$.

    8.  Make use of $V$ to change the samples to a new subspace using equation (7.6)


    $$y = V^T \times X$$ (7.6)


    where $X$ denotes $d \times 1$ dimensional vector representing one sample, $y$
    is the transformed $k \times 1$ dimensional vector sample in the new subspace.
    The execution of the designed PCA computational complexity depends on the number
    of features P that depicts each data point given by


    $$O(P^3)$$ (7.7)


    PCA''s reduction ratio (RR) is defined as the relation between the number of target
    dimensions and several original dimensions. Thus, the efficiency of PCA is higher
    as the value of RR becomes low.'
  mdcn: '## 7.3 因子分析


    因子分析（FA）是一种分析实验数据的方法，旨在从一组显著变量中寻找潜在的影响因素或隐藏变量。它通过减少数据的灵活性来帮助转换数据。它减去所有变量的完整标准变异，并设定相同的点。


    FA广泛应用于市场研究、营销、心理学、金融和绩效研究。例如，市场分析师利用FA来识别对价格敏感的客户，识别影响消费者偏好的产品特征，并帮助理解分销渠道的选择渠道。FA是一个直接的数学模型。它用于描述视觉变量之间的差异，并模糊一组称为因子的不可见变量。视觉差异被视为特征和误差项的直接组合。因子或潜在变量与多个具有共同响应模式的视觉变量相关联。每个因子描述了观测变量中一定量的变异性。它通过减少数据的灵活性来帮助转换数据。


    $X_i = \beta_{i0} + \beta_{i1}F_1 + \beta_{i2}F_2 + (1)e_i$


    FA是一种研究方法，用于探究若干感兴趣的变量 $X_1, X_2, \dots, X_k$ 是否与少数几个无形因子 $F_1, F_2, \dots, F_k$
    相关。


    **假设：**


    1.  数据中不存在异常值。

    2.  样本量必须大于因子数。

    3.  不存在完全多重共线性。

    4.  变量之间不存在刚性。


    ### 7.3.1 因子分析的类型


    -   探索性因子分析：这是社会研究人员和管理者分析因子最常用的方法。其基本假设是，任何明显的灵活性都与任何因子直接相关。

    -   验证性因子分析（CFA）：其基本假设是，每个项目都与一组特定的观测变量相关联。CFA验证基本预期。


    ### 7.3.2 因子分析的工作原理


    FA的主要目的是减少观测数量并检测不可见变量。这些有形变量帮助市场研究人员完成研究。观测变量的这种可识别变异可以通过两个步骤实现：


    -   **因子提取：** 在此步骤中，使用方差划分方法（如主成分分析（PCA）和共同因子分析）来选择因子数量和提取方法。

    -   **因子旋转：** 在此步骤中，旋转尝试将因子转换为不相关的因子。此步骤的主要目的是提高整体解释性。有多种旋转方法可用：方差最大旋转法、四次方最大旋转法和斜交旋转法。


    ### 7.3.3 术语


    #### 7.3.3.1 因子的定义


    因子是一个微妙的变量，描述了多个观测变量之间的相关性。因子的最大数量等于检测到的变量数量。每个因子都解释了视觉变异性中的一定变异。变异性非常低的因子已被移除。因子也称为隐藏变量、潜在变量或假设变量。


    #### 7.3.3.2 因子载荷


    因子载荷是一个矩阵，展示了每个变量与一个潜在因子之间的关系。它表达了观测变量与因子之间的相关系数。它显示了观测变量中定义的差异。


    #### 7.3.3.3 特征值


    特征值代表每个项目从总变异中定义的多样性。它也称为特征根。


    #### 7.3.3.4 共同度


    共同度是每个变量载荷平方的总和。代表共同变异。其值范围从0到1，接近1的值代表变异最大。


    $\hat{h}_i^2 = \sum_{k=1}^n \hat{l}_{ik}^2$


    #### 7.3.3.5 因子旋转


    旋转是FA更好的转换工具。旋转可以是正交的或斜交的。它还以清晰的载荷模式分布了标准。


    #### 7.3.3.6 选择因子数量


    Kaiser方法是一种基于待选因子所定义的方差最重要部分的分析方法。特征值是确定因子数量的好方法。通常，大于1的特征值将被视为可选因子。图形方法将某些特征值因子表示为碎石图，如图7.2所示。这种碎石结构帮助我们确定因子数量，其中曲线形成一个肘部。


    ![](img/7fbca4852dbe91c6cea209148871a1b3_378_0.png)


    图 7.2 碎石图。


    ## 7.4 主成分分析


    借助自动数据收集和特征生成技术，可以快速发现大量特征。但并非所有特征都有帮助。让我们讨论使用PCA进行特征降维。我们经常遇到这样的情况：特定的结果或决策不依赖于单个指标（预测变量），而是依赖于决策过程中的许多复杂因素。这就是所谓的维度灾难。众所周知，将重要因素的数量限制在一定范围内以得出正确结论非常重要。这个过程称为降维。在机器学习中，高维问题通过两种方式处理：


    -   **特征选择：** 通过过滤不一致的特征来仔细选择关键特征。

    -   **特征提取：** 我们从原始特征中创建新的相关特征。PCA是特征提取的关键手段之一。


    同样，PCA将数据的相应特征转换为正交成分，以捕获数据中的所有重要信息，同时最小化其大小。

    PCA可用于以下方式：


    -   限制特征数量，但无法识别被忽略的不太重要的特征。

    -   确保数据特征是独立的，即使特征没有被轻微解释。


    ### 7.4.1 中心化数据


    特征分解产生变换矩阵，其中特征向量表示旋转矩阵，而特征值表示缩放因子。相反，协方差矩阵没有与数据平移相关的数据。不可否认，平移是由所需的仿射变换而非线性变换表示的。因此，在安装PCA以交换数据以获得不相关轴之前，需要通过从每个数据点中减去数据均值来计算任何现有的变化。这就像以某种方式输入数据，使其尺度变为零。


    ### 7.4.2 标准化数据


    特征向量协方差矩阵在处理大数据差异时指向。相反，方差是一个绝对数，而不是相对数。这意味着以英寸测量的数据差异将远大于以英尺测量的相同数据。例如，一个特征表示物体的长度（以米为单位），而第二个特征表示物体的长度（以英寸为单位）。如果数据被标准化，最大的差异，因此最大的特征向量，将完全由第一个因子决定。为了避免这种基于PCA尺度的方法，它有助于通过将每个特征除以其标准差来标准化数据。当不同特征与不同度量相关时，这一点尤为重要。


    ### 7.4.3 估计特征分解


    由于细节将显示给较大的特征向量以减小尺寸，因此必须确定特征分解。计算特征分解最广泛使用的方法之一是奇异值分解（SVD）。


    ### 7.4.4 投影数据


    为了减小尺寸，数据会自动显示给最大的特征向量。设 *W* 是一个矩阵，其列包含最大的特征向量，设 *O* 是原始数据，其列包含不同的观测值。之后，投影数据
    $O''$ 可以表示为 $O'' = W^T O$。选择剩余值的数量，例如 $W$ 的列数，这可以直接定义在移除特征向量时需要保留的实际数据的变异数量。如果只存储
    $N$ 个特征向量，并且 $e_1, \dots, e_N$ 表示相应的特征值，则投影原始d维数据后剩余的变异数量可以计算为：


    $$s = \frac{\sum_{i=0}^{N} e_i}{\sum_{j=0}^{d} e_j}$$ (7.2)


    1.  给定数据的原始特征值通过其均值和方差进行标准化，如公式7.3所示，其中 $k$ 是数据集中的实例数，$X_{(i)}$ 是数据点。


    $$\mu = \frac{1}{n} \sum_{i=1}^{n} X_{(i)}$$ (7.3)


    2.  用 $X_{(i)} - \mu$ 替换 $X_{(i)}$。

    3.  使用公式7.4调整每个向量 $X_{j(i)}$ 的大小以获得单位方差。


    $$\sigma_j^2 = \frac{1}{n}$$ (7.4)


    4.  用 $\frac{X_{j(i)}}{\sigma}$ 替换 $X_{j(i)}$。

    5.  确定协方差矩阵 $C_M$ 为：


    $$C_M = \frac{1}{m} (X_{(i)}) (X_{(i)})^T$$ (7.5)


    6.  确定 $C_M$ 的特征向量和相应的特征值。

    7.  降低特征值并排序特征向量，选择包含最大特征值的 $k$ 个特征向量以获得 $V$。

    8.  利用 $V$ 使用公式（7.6）将样本更改为新的子空间


    $$y = V^T \times X$$ (7.6)


    其中 $X$ 表示表示一个样本的 $d \times 1$ 维向量，$y$ 是在新子空间中转换后的 $k \times 1$ 维向量样本。设计的PCA计算复杂度的执行取决于描述每个数据点的特征数量P，由下式给出


    $$O(P^3)$$ (7.7)


    PCA的缩减比（RR）定义为目标维度数量与原始维度数量之间的关系。因此，当RR值变低时，PCA的效率更高。'

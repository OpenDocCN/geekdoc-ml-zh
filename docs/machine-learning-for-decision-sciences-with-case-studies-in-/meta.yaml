    # Semi-supervised machine learning algorithm


    Semi-supervised learning is the mixture of supervised and unsupervised learning
    as its dataset contains categorized and uncategorized data. The aim is to predict
    the new data that are more effective and accurate than the output data given by
    the user. For example, you wish to buy a product and watch ads related to the
    product, and suddenly, you want to review the same product. Though the product
    is from a different company, the categorized data would be the basic ad released
    by the company.


    # Reinforcement machine learning algorithm


    In reinforcement learning, the machine does not learn from classified data; instead
    it learns from its experience and prediction, an agent takes all the actions (robotic
    avatar), finds all possible scenarios and fits in the best solution. Games such
    as hangman is the best example of reinforcement learning algorithm. Statistics
    is a representation of data, hypothesis, etc. It''s the correlation between the
    points, invariable and multivariable.


    Statistics types are as follows:


    **Forecasting continuous variable:** If a variable can adapt value between minimum
    and maximum, then it is called continuous variable, for example, weight and age.
    It may be deterministic or probabilistic. A deterministic result can be compared
    and evaluated with respective observations. Probabilistic results are in the form
    of distribution.


    **Regression:** It deals with the relationship between predictor and outcome variables.
    It analyzes the results based on predictive analysis and modeling. Let''s take
    the example of dieting apps that predict the diet schedule based on your daily
    food routine, weight, and height.


    **Classification:** It''s the process of grouping the data on the basis of similar
    categories. For example, classify animals based on their habitats.


    ML and statistics are two different methodologies, but how are they similar? The
    similarity between both of them is the prediction from the data. The primary difference
    between ML and statistics is manipulating the data; ML is simply working out the
    data using algorithms, whereas statistics is just mathematics in finding the patterns
    from the data.


    # 1.4 RELATION BETWEEN ARTIFICIAL INTELLIGENCE, MACHINE LEARNING, NEURAL NETWORKS,
    AND DEEP LEARNING


    There is always a debate among researchers and beginners about artificial intelligence
    (AI), ML, neural networks (NNs), and DL. Some of the popular Google search questions
    are “Are AI and ML different?”, “Are ML and DL the same?”, “How is NN related
    to ML and DL?”, etc. Data scientists have come up with a clear definition for
    these terms:


    **Artificial intelligence (AI)**, like mathematics and biology, is a science.
    It researches how to create intelligent programs and machines that can solve issues
    creatively, which has historically been considered a human right.


    **Machine learning (ML)** is a subcategory of AI that allows systems to learn
    and improve independently without being explicitly programmed. Different learning
    algorithms based on different architectures (e.g., NNs) are used in ML to address
    problems.


    **Deep learning (DL)**, also known as deep neural learning, is a type of ML that
    employs NNs to assess various elements with a structure similar to that of the
    human nervous system.'

    # 8.4.4 Model of the Environment


    The last aspect of elements of RL is to strengthen the environmental model. This
    mimics how the environment works or, more typically, allows for a hypothesis about
    how the environment will act. For example, based on the current state and actions
    of the environment, the model might predict the future state of the outcome and
    follow rewards. Models are used to make plans, in which we recommend any method
    of deciding on a course of action by contemplating potential future activities
    before they are experienced. Solutions for RL using modeling and planning are
    called model-based approaches, in contrast to simple non-model approaches that
    explicitly expose learners to trials and errors – which are considered almost
    counter-planning. Current RL encompasses a wide range from low-level, experimental,
    and trail-and-mistake-based learning to advanced, deliberate planning.



    \n## 7.6 特征降维\n\n机器学习的艺术始于创建合适的数据表示。通常，使用从原始输入中提取的特征可以获得更好的性能。创建特征表示可以为数据添加领域信息，并且可以由特定应用指定。然而，有许多方法可以创建通用特征，包括聚类、基本输入线性变换变量[PCA/SVD、线性判别分析（LDA）]、复杂的线性变换如谱变换（傅里叶、阿达玛）、小波变换或核卷积，以及对灵活子集应用简单函数，如单项式。\n\
    \n特征设计可以追求两个不同的目标：实现数据重构或更高效地进行预测。第一个问题是无监督学习问题。它非常接近数据压缩，许多算法在这两个领域都有应用。第二个问题是监督学习。当问题是监督学习时，是否有理由以无监督的方式选择特征？是的，有几种可能性。其他问题，例如文本处理应用，与有标签数据相比，带有无标签数据。此外，无监督特征的选择通常不会过度导致过拟合。\n\
    \n我们的目标是拥有一个算法友好的数据集。这是什么意思？\n\n如果你有很多特征，会存在一些潜在问题：\n\n- 模型复杂度高。\n- 可能会产生很多噪声。\n\
    - 如果它们具有不同的尺度，会降低几种对尺度敏感的算法的性能。\n- 在n维空间中进行更复杂的可视化。\n\n这就是PCA的作用。它通过提取/消除重要/不重要的特征来降低数据集的维度。\n\
    \nPCA检测一种在计算方差尽可能大的同时减少数据大小的变化。PCA是多元分析中最古老的过程。PCA的基本概念是基于投影的过程。这里，具有n列（特征）的实际数据集X\
    \ ∈ R n被投影到一个具有k或更低维度的子空间表示X ∈ R K（更少的列），同时保持原始数据的总量。\n\n该算法的工作原理如下：为了将特征的维度从n维降低到k维，实施两个阶段：预处理阶段和降维阶段。首先，在预处理阶段（第7.4节中的步骤1-4），使用第7.4节中的公式7.3和7.4对数据进行预处理，以标准化其均值和方差。然后，在第二阶段（第7.4节中的步骤5-8），即降维阶段，根据第7.4节中的公式7.5和7.6计算协方差矩阵C_M、特征向量和特征值。\n\
    \n当使用PCA降维时，必须处理应该使用多少个主成分（$k$）的问题。与所有超参数一样，这个数字可以根据生成模型的质量进行更改。但有些测试不涉及昂贵的计算。因此，另一个选项是根据所需的总方差值来选择一个$k$。（此选项在scikit-learn包的PCA中可用。）投影到第$k$个成分上的方差为：\n\
    \n$$|Xv_k|^2 = ||u_k \\sigma_k||^2 \\sigma_k^2 \\quad (7.8)$$\n\n它是$X$的第$k$个最大奇异值的平方。矩阵的奇异值的有序列表称为其谱。因此，要确定使用多少个成分，可以对数据矩阵执行简单的谱分析，并选择保留足够方差的阈值。\n\
    \n为了保留足够的成分以覆盖数据中总方差的80%，选择$k$使得\n\n$$\\frac{\\sum_{i=1}^{k} \\sigma_i^2}{\\sum_{i=1}^{d}\
    \ \\sigma_i^2} \\geq 0.8 \\quad (7.9)$$\n\nPCA计算成本很高。它依赖于SVD，这是一个昂贵的过程。计算矩阵的完整SVD需要O函数（$nd^2+d^3$），假设$n\
    \ \\geq d$，即数据点多于特征数。即使我们只想要$k$个主成分，使用缩减SVD（单个$k$值和向量）仍然需要$O((n+d)^2k)=O(n^2k)$次操作。当数据点或特征数量很多时，这是可用的。以流式处理、批量更新或完整数据样本的形式执行PCA是困难的。SVD的流式计算、更新SVD以及从子样本计算SVD都是困难的研究问题。\n\

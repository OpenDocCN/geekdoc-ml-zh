    where $w_0, w_1, \dots, w_d$ are the weight parameters.


    Definition of linear regression: Given a training dataset comprising $N$ observations
    $\{x_n\}$ where $n=1, 2, \dots, N$ and their corresponding target values are $\{t_n\}$.
    The goal is to predict the value of $t$ for a new value of $x$.


    # 5.4.1 Types of Linear Regression


    The variants of linear regression are simple and multiple linear regressions further
    classified as linear and non-linear, as shown in Figure 5.8. For simple regression,
    the input or independent variable is one, whereas for multiple regression, it
    is two or more.'

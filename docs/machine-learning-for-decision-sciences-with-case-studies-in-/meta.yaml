    \nFIGURE 2.3 Control flow statement.\n\n## 2.4.3 FLOW CONTROL\n\nThe flow of the\
    \ program is sequential. One by one, each statement is executed. There is a condition\
    \ when the user needs to repeat the statement again and again. In this case, the\
    \ control flow statement works. Control flow statement includes if condition,\
    \ for condition, else, if-else, and while loop. The computer program understands\
    \ True and False’s language; let’s explain this with a flow diagram as shown in\
    \ Figure 2.3.\n\n### 2.4.3.1 If & elif Statement\n\nSometimes the user needs to\
    \ execute statements depending on some conditions; for multiple conditions, we\
    \ use elif.\n\n```\nIf expression :\n    Statement\nElif expression :\n    Statement\n\
    Elif expression :\n    Statement\nElse expression :\n    Statement\n```\n\nLet’s\
    \ explain this with an example, suppose create a program that identifies if the\
    \ number is negative, else if the number is positive and even number else consider\
    \ the number as a positive odd number\n\n```\nIf y<0 :\n    print \"y is negative\"\
    \nelif\n    y/2 = 0:\n    print \"y is even number\"\nelse :\n    print \"y is\
    \ a negative number.\"\n```\n\n![](img/7fbca4852dbe91c6cea209148871a1b3_47_0.png)\n\
    \nFIGURE 2.4 Flow diagram of the loop statement.\n\n### 2.4.3.2 Loop Statement\n\
    \nA loop statement allows us to execute a statement multiple times. For example,\
    \ if the user wants to print his/her name ten times, this care loop will help;\
    \ instead of writing the name ten times, use the loop function and define its\
    \ range. The flow diagram shown in Figure 2.4 explains the loop statement.\nAs\
    \ discussed in the following sections, there are different types of loop statements,\
    \ namely for, while, nested loops, etc.\n\n**For loop:** The loop executes the\
    \ statement repeatedly using the iterator variable that increments each execution.\
    \ Let’s take the same example of printing fruits name. Let “fruits” be the list\
    \ that contains the names of three fruits. When the program executes, each fruit\
    \ is saved in variable “I” and then printed one by one.\n\n```\nFruits = [\"apple\"\
    , \"mango\", \"banana\"];\nFor I in fruits :\n    Print (i);\n```\n\n**While loop:**\
    \ Repeats the group of a statement if the given condition is True. For example,\
    \ add the first five natural numbers.\n\n```\nI = 0;\nWhile y<6:\n    y = y+y\n\
    \    I++;\n```\n\n**Nested loop:** To use the loop inside another loop is called\
    \ a nested loop. Let’s take an example of distributing four chocolates to each\
    \ student of the class. The nested loop will work here, as we have to use two\
    \ loops, that is, for chocolate and students.\n\n```\nchocolate = [\"Cadbury\"\
    , \"kitkat\", \"mars\", \"galaxy\"];\nstudents = [\"Alice\", \"Jhon\", \"Nick\"\
    \ ];\n```\n\n```python\nFor students in students :\n    For chocolate in chocolate\
    \ :\n        Print (students + \"got\" + chocolate);\n```\n\n### 2.4.3.3 Loop\
    \ Control Statements\n\nTo change the sequence of executing a code, Python provides\
    \ multiple control statements. Following are the loop control statements:\n\n\
    **Break statement:** To exit from a loop, break statements are used. Let’s take\
    \ the example of 20 enrollment numbers, and the user wants to print only ten enrollment\
    \ numbers.\n\n```\nx=1;\nWhile x <= 20:\n    If x ==10:\n        break\n    Print\
    \ (x)\n    x++;\n```\n\n> As soon as loop reaches the 10th enrollment the break\
    \ statement will exit the loop and will display 10 enrollments only\n\n**Continue\
    \ statement:** It is similar to the break statement, it exits the loop, but the\
    \ loop itself is not exited. Let’s consider the same previous example and replace\
    \ the break with continue.\n\n```\nx=1;\nWhile x <= 20:\n    if x ==10:\n    \
    \    continue\n    Print (x)\n    x++;\n```\n\n> As soon as loop reaches the 10th\
    \ enrollment the continue statement will exit the loop and will display all the\
    \ enrollment from 1 till 20 except the enrollment 10\n\n**Pass statement:** It\
    \ is also called a null operator. Nothing happens when it is executed. Consider\
    \ a project that two programmers complete; one falls sick and cannot come on a\
    \ specific day. The problem is that another programmer cannot hold the work. In\
    \ this case, all the functions that the sick programmer wrote will be left empty\
    \ using the pass statement. Let’s consider the same previous example with a pass\
    \ statement.\n\n```\nx=1;\nWhile x <= 20:\n    if x ==10:\n        pass\n    \
    \    print \"10 not included\"\n    Print (x)\n    x++;\n```\n\n> As soon as loop\
    \ reaches the 10th enrollment the pass statement will work and display all the\
    \ enrollment from 1 till 20 except the enrollment 10 as we had passed it and will\
    \ print 10 not included with it\n\n## 2.4.4 PYTHON CODE SAMPLES ON FLOW CONTROL\
    \ STATEMENTS\n\n### 2.4.4.1 Conditional Statements\n\nDecision-making is required\
    \ when we want to execute code only if a specific condition is satisfied. The\
    \ if...elif...else statement is used in Python for decision-making.\n\n```\nsyntax:\
    \ if test expression: statement(s)\n```\n\nThe program evaluates the test expression\
    \ and will execute statement(s) only if the text expression is True. If the text\
    \ expression is False, the statement(s) is not executed. In Python, the body of\
    \ the if statement is indicated by the indentation. The body starts with an indentation,\
    \ and the first unindented line marks the end."

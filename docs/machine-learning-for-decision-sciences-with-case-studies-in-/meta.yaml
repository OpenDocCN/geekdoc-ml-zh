    \n另一种清理和丰富数据的技术是类型转换。这是一种将数据转换为与源数据不同类型的技术。例如，源数据中的一个变量可能被编码为字符串/字符，即使该变量允许的值仅为数字（整数和浮点数类型）。简而言之，类型转换就是将一种数据类型转换为另一种数据类型。有基本函数如\
    \ `int()`、`string()` 和 `float()`，它们用于类型转换。`Int()` 函数用于整数字面量，`float()` 用于十进制数。在\
    \ Python 中，从一种数据类型转换为另一种数据类型非常直接。\n\n```python\n#Here is the code snippet -\n\
    x=float(2)\ny=float(30.0)\nz=float(\"20\")\nprint(x)\nprint(y)\nprint(z)\n```\n\
    \n![](img/7fbca4852dbe91c6cea209148871a1b3_151_0.png)\n\n图 3.25 与其他列的相关矩阵。\n\n\
    输出为：\n\n```\n2.0\n30.0\n20.0\n```\n\n要理解变量的数据类型，请使用函数 `type()`。\n\n类型转换有两种类型，即隐式和显式。在隐式转换中，Python\
    \ 会自动将一种数据类型转换为另一种。此过程完全不需要用户参与。当你将一个整数和一个浮点数相加时，结果将自动转换为浮点数，而无需用户指定。例如，\n\n```python\n\
    num_int = 123\nnum_float = 1.23\n\nnum_new = num_int + num_float\n\nprint(\"datatype\
    \ of num_int:\",type(num_int))\nprint(\"datatype of num_flo:\",type(num_float))\n\
    print(\"Value of num_new:\",num_new)\nprint(\"datatype of num_new:\",type(num_new))\n\
    ```\n\n输出为：\n\n```\ndatatype of num_int: <class 'int'>\ndatatype of num_flo: <class\
    \ 'float'>\nValue of num_new: 124.23\ndatatype of num_new: <class 'float'>\n```\n\
    \n在显式转换中，用户必须显式地将对象的数据类型转换为所需的数据类型。我们使用预定义的函数如 `int()`、`float()` 和 `str()` 来执行显式类型转换。\n\
    \n```python\nnum_int = 123\nnum_str = \"123\"\n\nprint(\"Data type of num_int:\"\
    ,type(num_int))\nprint(\"Data type of num_str before Type Casting:\",type(num_str))\n\
    \nnum_str = int(num_str) # WE ARE EXPLICITELY CONVERTING THE datatype\nprint(\"\
    Data type of num_str after Type Casting:\",type(num_str))\n\nnum_sum = num_int\
    \ + num_str\n\nprint(\"Sum of num_int and num_str:\",num_sum)\nprint(\"Data type\
    \ of the sum:\",type(num_sum))\n```\n\n输出为：\n\n```\nData type of num_int: <class\
    \ 'int'>\nData type of num_str before Type Casting: <class 'str'>\nData type of\
    \ num_str after Type Casting: <class 'int'>\nSum of num_int and num_str: 246\n\
    Data type of the sum: <class 'int'>\n```\n\n尽管类型转换是数据预处理中的一个便捷工具，但在使用时我们需要牢记一些注意事项。例如，当\
    \ Python 解释器进行隐式转换时，Python 会自动防止数据丢失。但是，当进行显式转换时，根据数据类型的不同，可能会发生数据丢失，这可能会影响需要数据准确性的过程。\n\
    \n当需要合并多个独立的数据集时，我们需要使用连接（joins）。例如，有一个主数据集和一个事务数据集；要组合这些数据集（表），我们需要使用连接。不同类型的连接如图\
    \ 3.26 所示。我们可以使用 Python Pandas 库来进行内连接、全连接、左连接和右连接。内连接获取两个表中都存在的结果集。例如，你有两个来自不同来源的客户数据表，内连接将只带来两个表中都存在的共同数据。全连接或外连接返回数据集1和数据集2中匹配的所有记录。左连接返回左表（数据集1）的所有记录以及右表（数据集2）的匹配记录。\n\
    \n![](img/7fbca4852dbe91c6cea209148871a1b3_152_0.png)\n\n图 3.26 连接的类型。"

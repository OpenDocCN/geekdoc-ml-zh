    $$\left\{\left(\begin{array}{l}2 \ 2\end{array}\right),\left(\begin{array}{l}6
    \ 2\end{array}\right),\left(\begin{array}{l}6 \ 6\end{array}\right),\left(\begin{array}{l}2
    \ 6\end{array}\right)\right\}$$



    There are two types of typecasting, that is implicit and explicit. In implicit
    conversion, python automatically converts one data type to another. This process
    doesn''t need any user involvement at all. When you add one integer and another
    float number, the result will be automatically casted as a float without the user
    specifying it. For example,


    ```

    num_int = 123

    num_float = 1.23


    num_new = num_int + num_float


    print("datatype of num_int:",type(num_int))


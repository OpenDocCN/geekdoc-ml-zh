    # 4.7 MIXTURE OF GAUSSIAN CLUSTERING


    The Gaussian clustering algorithm is probability-based which is highly suitable
    for unlabeled or unsupervised data. The Gaussian clustering algorithm performs
    similar to k-means clustering. However, the k-means clustering algorithm doesn''t
    take care of the distribution of data or variance. Moreover, the k-means algorithm
    only works well when the data is circular and unsuitable for oblong data distribution.
    But the Gaussian method can handle more elongated clusters.


    Let''s understand with a simple example of classifying images based on their RGB
    intensity. In Figure 4.14, images of the sea (dark-shaded circles), forest (dark
    gray-shaded circles), and desert (light gray circles) without any labels are considered.


    Select a data point $x_i$ that is circled in Figure 4.14, and associate probability
    $\pi_k$ with each Gaussian component. In this case, the $\pi$ is represented as


    $\pi = [\pi_1 = 0.8, \pi_2 = 0.2, \pi_3 = 0]$


    The prior probability of the data point $x_i$ to be associated with the kth cluster
    is given as


    $p(z_i = k) = \pi_k$ (4.19)


    The likelihood of seeing the data point $x_i$ in cluster sea is given as


    $p(x_i | z_i = k, \mu_k, \sigma_k^2)$ (4.20)


    To maximize the likelihood, we can use the EM algorithm.

    The main advantages of model-based clustering are as follows:


    +   - Less sensitive to scalability

    - Highly flexible for any data distribution'
- md: '## 4.7.1 EXPECTATION MAXIMIZATION


    To maximize the likelihood of Gaussian clustering, EM algorithm comes into the
    picture. Let us understand this with a simple example. EM proceeds iteratively
    with two steps. The expectation treats the Gaussian parameters, Mean $\mu$, and
    covariance $\Sigma_c$, while $\pi$ for the cluster is fixed.


    **Expectation step (E step):**

    For each data point $x_i$ and cluster $c$, compute relative probability $r_{ic}$
    of data point $x_i$ such that it belongs to cluster $c$, using the equation below.


    $$r_{ic} = \frac{\pi N\left(x_i; \mu_c, \Sigma_c\right)}{\sum_{c''} \pi N\left(x_i;
    \mu_{c''}, \Sigma_{c''}\right)}$$


    If $x_i$ is very likely to be the $c$th cluster, then it will get high values.
    So the denominator is just to normalize, i.e., to make the sum to one.


    **Maximization step (M step):**

    Start with the relative probability $r_{ic}$ and update the parameter of the clusters
    mean $\mu$, covariance $\Sigma_c$, and $\pi$.

    For each cluster, $z=c$. Update the parameters using the weighted data points.


    $$m_c = \sum_i r_{ic} \text{ (Total responsibility allocated to cluster } c \text{)}$$


    $\pi_c = \frac{m_c}{m}$ (Fraction of total assigned to cluster $c$)


    $\mu_c = \frac{1}{m_c} \sum_i r_{ic} x^{(i)}$ (Weighted mean of assigned data)


    $\Sigma_c = \frac{1}{m_c} \sum_i r_{ic} (x^{(i)} - \mu_c)^T (x^{(i)} - \mu_c)$
    (Weighted covariance of assigned data)


    Example: Suppose $x_k$ are the student marks and $p(x_k)$ are their probability.


    $x_1 = 30 \quad P(x_1) = \frac{1}{2}$


    $x_2 = 18 \quad P(x_2) = \mu$


    $x_3 = 0 \quad P(x_3) = 2\mu$


    $x_4 = 23 \quad P(x_4) = \frac{1}{2} - 3\mu$


    First case: We observe that the marks are so distributed among students:

    $x_1$: a students

    $x_2$: b students

    $x_3$: c students

    $x_4$: d students


    $P(a,b,c,d|\mu) \propto \left(\frac{1}{2}\right)^a * (\mu)^b * (2\mu)^c * \left(\frac{1}{2}
    - 3\mu\right)^d$


    Maximize by deriving $\frac{\partial P}{\partial \mu} = 0$. Derive the logarithm
    of the function and maximize it:


    $P_L = \log\left(\frac{1}{2}\right)^a + \log(\mu)^b + \log(2\mu)^c + \log\left(\frac{1}{2}
    - 3\mu\right)^d$


    $\frac{\partial P_L}{\partial \mu} = \frac{b}{\mu} + \frac{2c}{2\mu} - \frac{3d}{\frac{1}{2}
    - 3\mu} = 0$


    $\Rightarrow \mu = \frac{b+c}{6(b+c+d)}$


    Suppose $a=14$, $b=6$, $c=9$, and $d=10$, and we can calculate $\mu = \frac{1}{10}$.


    Second case: We observe that marks are so distributed among students:

    $x_1 + x_2$: h students

    $x_3$: c students

    $x_4$: d students


    expectation:$\mu \rightarrow a = \frac{\frac{1}{2}}{\frac{1}{2} + \mu} h, b =
    \frac{\mu}{\frac{1}{2} + \mu} h$


    maximization: $a,b \rightarrow \mu = \frac{b+c}{6(b+c+d)}$ (4.25)


    This circularity can be solved iteratively.


    The time complexity of the EM algorithm is O(NKD$^3$), where $N$ is the number
    of data objects, $K$ is the number of Gaussian components, and $D$ is number of
    dimensions.


    Advantages of EM


    - Convergence is guaranteed

    - Likelihood increases in every iteration


    Disadvantages of EM


    - It is highly complex when the number of dimensions increases and thus of limited
    use.


    ## 4.7.2 Mixture of Gaussian Clustering in Practice Using Python


    This example applies GMM to a random dataset using the GaussianMixture from the
    sklearn library. All the necessary libraries are imported accordingly. A random
    dataset of size 100 is generated using the random function from the numpy library
    with 100 rows and two columns.


    ```python

    import numpy as np

    import matplotlib.pyplot as plt

    from sklearn.mixture import GaussianMixture

    from numpy import random


    DATA_SET=random.randint(100, size=(100, 2))

    print(DATA_SET)

    plt.plot(DATA_SET[:,0], DATA_SET[:,1], ''gx'')

    plt.axis(''equal'')

    plt.show()


    gmm = GaussianMixture(n_components=2)

    gmm.fit(DATA_SET)

    print(gmm.means_)

    print(''\n'')

    print(gmm.covariances_)


    X, Y = np.meshgrid(np.linspace(-200, 400), np.linspace(-200,400))

    XX = np.array([X.ravel(), Y.ravel()]).T

    Z = gmm.score_samples(XX)

    Z = Z.reshape((50,50))


    plt.contour(X, Y, Z)

    plt.scatter(DATA_SET[:, 0], DATA_SET[:, 1])


    plt.show()

    ```



  md: '# 2.4.5.14 Selection Sort


    Selection sort is yet another in-place sort algorithm based on the comparison.
    The entire array is divided into two groups, one sorted part and the other unsorted
    part. The sorted portion of the array is kept empty initially, and the unsorted
    part contains all the elements of the array. The element that has the smallest
    value is selected from the unsorted portion and added as the first element to
    the sorted portion. The element that was located already in the sorted portion
    swaps position with the smallest element. The comparison process continues with
    the next smallest element from the unsorted portion. The algorithm continues until
    all the elements of the unsorted portion are compared. The algorithm is explained
    with a flowchart as shown in Figure 2.18.



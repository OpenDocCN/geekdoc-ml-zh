    # 5.3.4 CONVERSION BETWEEN CLASSIFICATION AND REGRESSION PROBLEMS


    In certain cases, a regression problem can be used to predict discrete values.
    This can be achieved using the discretization technique that converts continuous
    values between $0 and $1000 into two discrete class labels: class 1 (range from
    $0 to $499) and class 2 (range from $500 to $1000).


    ![](img/7fbca4852dbe91c6cea209148871a1b3_203_1.png)


    Similarly, a classification problem can be used to predict a numerical value.
    For example, the target output label can be converted into a continuous numerical
    range.

    If there is a natural ordinal relationship, then the conversion from classification
    problem to regression learns well, or it may result in poor performance.


    # 5.4 LINEAR REGRESSION


    Regression analysis is an extensively used forecasting technique of supervised
    learning algorithms. Linear regression is the simplest form of regression analysis
    to analyze the trend behind the input data points. In this section, the working
    of regression and its types with real-time examples are explained.

    Linear regression is a supervised learning technique in which we have a collection
    of training samples with a labeled output. It is a simple statistical technique
    and an interpretable method and is very widely used in prediction analysis. The
    main advantage of linear regression is to forecast the trend more feasibly. Linear
    regression can be used to predict the continuous target variable given the value
    of input variables. Regression analysis is used for analyzing the relationship
    among data to predict the continuous output variable. In other words, linear regression
    identifies the relationship between dependent and independent variables via a
    sloped straight line. The sloped straight line is known as the regression line
    or best-fit line. The representation of the regression model is given in Figure
    5.6.'

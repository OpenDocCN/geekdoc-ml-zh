    # SUMMARY


    Unsupervised learning is a machine learning technique where the model does not
    require supervision. The unknown patterns of data can be explored based on the
    concept of clustering and association. This chapter has discussed several clustering
    algorithms, namely the k-means clustering, fuzzy k-means clustering, hierarchical
    (agglomerative and divisive) clustering, and DBSCAN clustering. These algorithms
    were discussed in detail with the implementation of examples using Python. Unsupervised
    machine learning helps you to find all kinds of unknown patterns in data. The
    major limitation of unsupervised learning is the lack of precise information from
    the clustering process. This can be overcome by exploring and conducting several
    additional experiments by varying the model parameters.



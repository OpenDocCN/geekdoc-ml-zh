    ## 6.6.12 现实世界应用


    SVM已被用于许多现实世界的应用中，例如图像分类、手写OCR、生物信息学和文本分类（图6.123）。此外，生物信息学领域已用于基于基因表达数据的癌症诊断和蛋白质二级结构预测。SVM的优点在于其解的稀疏性以及通过使用软间隔方法可以控制过拟合，这使其在广泛的应用中得以使用。


    ### 6.6.12.1 认知障碍分类


    阿尔茨海默病（AD）是一种退行性脑疾病，也是痴呆症最常见的原因。痴呆症的症状包括记忆力减退以及思维、解决问题或语言方面的困难，严重影响患者的日常生活。轻度认知障碍（MCI）是AD的早期阶段，其特征是在没有痴呆症的情况下出现显著的认知障碍。在美国，2014年有超过520万人患有AD，据估计到2050年将有1380万美国人患有AD。因此，精确预测和诊断AD，尤其是在其预警阶段如MCI，已成为延缓甚至避免痴呆症的关键一步。


    常用的模态包括磁共振成像（MRI）、功能磁共振成像（fMRI）和正电子发射断层扫描（PET）。由于其在临床环境中的易获得性，与其他模态相比，MRI最受研究人员关注。与AD相关的大脑结构变化可以使用MRI进行无创评估。


    在早期阶段检测AD对于患者管理至关重要。AD的一些最早症状，如短期记忆丧失，常被误认为与衰老和压力有关；在早期阶段预测该疾病仍然具有挑战性。阿尔茨海默病神经影像计划（ADNI）数据集用于评估。系统的设计如图6.124所示。


    ### 6.6.12.2 预处理


    对每张MRI脑图像应用三步预处理。预处理步骤如下：


    - 步骤1：大脑中的头骨对于AD分析不是必需的，因此使用free surfer工具进行颅骨剥离

    - 步骤2：使用free surfer工具将MRI图像分割为白质、灰质和脑脊液（CSF）

    - 步骤3：进行直方图均衡化，通过修改强度分布来调整对比度。直方图均衡化在不损失数据的情况下是优选的；它均衡了图像的对比度。


    ### 6.6.12.3 特征提取


    灰度共生矩阵（GLCM）用于提取每个感兴趣区域（ROI）的3D纹理参数。GLCM参数在表6.38中描述。


    ### 6.6.12.4 SVM分类


    SVM将每个数据项绘制为n维空间中的一个点（其中n是你拥有的特征数量），每个特征的值是特定坐标的值。SVM通过核函数将原始特征映射到高维特征空间中构建最大分类器。具有经验缩放因子的高斯RBF核很好地将两类区分开来。最后，进行了五折交叉验证的SVM。


    ### 6.6.12.5 流程


    **输入：** ADNI数据集

    **输出：** 用于AD诊断的SVM模型，包含给定数据集的准确率'

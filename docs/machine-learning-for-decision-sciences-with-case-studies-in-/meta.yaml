    parameter $\sigma = 1$ is used to control over- and underfitting. The equation
    for the RBF kernel is given in Equation 6.27.


    $K(x_i, x_j) = e^{-\frac{\|x_i - x_j\|^2}{2\sigma^2}}$


    ![](img/7fbca4852dbe91c6cea209148871a1b3_344_0.png)


    FIGURE 6.101 RBF kernel.'
- md: '## 6.6.6.3 Other Domain-Specific Kernel


    The most challenging part is choosing the right kernel function, and it is highly
    problem-specific.


    ## 6.6.6.4 Sigmoid Kernel


    An SVM with a sigmoid kernel is equivalent to a simple two-layer neural network
    with no hidden layers known as a multilayer perceptron. It is also called the
    hyperbolic tangent kernel. It comes from neural networks, where artificial neurons
    often use the bipolar sigmoid mechanism as an activation function. The sigmoid
    kernel equation is given in Equation 6.59.


    $$K(x_i, x_j) = \tanh(\alpha x_i \cdot x_j - \delta)$$


    ## 6.6.6.5 Exponential Kernel


    It is closely equivalent to the Gaussian kernel and is shown below in Equation
    6.60.


    $$K(x_i, x_j) = e^{-\left(\frac{\|x_i - x_j\|^2}{2\sigma^2}\right)}$$


    ## 6.6.6.6 ANOVA Kernel


    It is said to perform well in multidimensional regression problems.


    $$K(x_i, x_j) = \sum_{k=1}^n \exp\left(-\sigma(x_i^k - x_j^k)^2\right)^d$$


    ## 6.6.6.7 Rational Quadratic Kernel


    It is less computationally intensive than the Gaussian kernel. If the Gaussian
    becomes too expensive, then rational quadratic kernel can be used as an alternative.


    $$k(x_i, x_j) = 1 - \frac{\|x_i - x_j\|^2}{\|x_i - x_j\|^2 + c}$$


    ## 6.6.6.8 Multiquadratic Kernel


    The multiquadratic kernel can be used in the same situations as the rational quadratic
    kernel. As is the case with the sigmoid kernel, it is also an example of a non-positive
    definite kernel.


    $$k(x_i, x_j) = \sqrt{\|x_i - x_j\|^2 + c^2}$$


    ## 6.6.6.9 Inverse Multiquadratic Kernel


    The Gaussian kernel results in a kernel matrix with full rank and thus forms an
    infinite dimension feature space.


    $$k(x_i, x_j) = \frac{1}{\sqrt{\|x_i - x_j\|^2 + c^2}}$$


    ## 6.6.6.10 Circular Kernel


    The circular kernel is used in geostatic applications. It is an example of an
    isotropic stationary kernel and is positive definite in $R_2$.


    $$k(x_i, x_j) = \frac{2}{\pi} \arccos\left(-\frac{\|x_i - x_j\|}{\sigma}\right)
    - \frac{2}{\pi} \frac{\|x_i - x_j\|}{\sigma}$$


    ## 6.6.6.11 Bayesian Kernel


    The Bayesian kernel could be given as


    $$k(x, y) = \prod_{l=1}^N k_l(x_l, y_l)$$


    ## 6.6.6.12 Chi-Square Kernel


    It is derived from chi-square distribution and is given as follows:


    $$k(x, y) = 1 - \sum_{l=1}^n \frac{(x_l - y_l)^2}{\frac{1}{2}(x_l + y_l)}$$


    ## 6.6.6.13 Histogram Intersection Kernel


    It is widely used in image classification and is also called as min kernel.


    $$k(x, y) = \sum_{l=1}^n \min(x_l, y_l)$$


    ## 6.6.6.14 Generalized Histogram Intersection Kernel


    It is a variant of histogram intersection kernel and is widely applicable in image
    classification.


    $$k(x, y) = \sum_{l=1}^n \min(|x_l|^\alpha, |y_l|^\beta)$$


    ## 6.6.7 NU SVM


    In soft margin SVM, finding the parameter $C$ is difficult. Instead of using $C$,
    Scholkopf et al. introduce nu SVM. nu is bounded between 0 and 1. The function
    is given as in Equation 6.70.


    minimize $\frac{1}{2}\|w\|^2 - \gamma\rho + \frac{1}{2}\sum_l \xi^l$


    Subject to


    $r^l(w^T x^l + w_0) \geq \rho - \xi^l, \xi^l \geq 0, \rho \geq 0$


    ## 6.6.8 SVM Regression


    Let us extend SVM to regression problem, given the training data $\{(X_1, y_1)
    \dots (X_n, y_n)\}$ $X_i \in R^m$, $y_i \in R$ the idea is to learn the best optimal
    function to predict $y$ given $X$. This regression problem can be parameterized
    by weight vector $w$ as shown below in Equation 6.71,


    $$g(X, W) = w_1 \emptyset_1(x) + \dots + w_{m''} \emptyset_{m''}(x) + b = w^T
    \emptyset(x) + b \quad (6.71)$$


    where $\emptyset_i : R^m \rightarrow R$. If we choose $\emptyset_i(X) = x_i$,
    then it is a linear regression model. By specifying $Z = \emptyset(X) \in R^{m''}$,
    we are learning a linear model in a newly transformed feature space. Kernel functions
    can be used instead of explicitly specifying the dot product.


    Loss function $L$ in regression problem is to minimize $W$ and is given in Equation
    6.72,


    $$\sum_i L(y_{i,g}(X_i, W)) \quad (6.72)$$


    A special loss function called $\varepsilon$ insensitive loss is used, which allows
    us to use kernel trick in SVM regression as given in Equation 6.42.


    $$L_{\varepsilon}(y_i, g(X_i, W)) = \begin{cases} 0 & \text{If } |y_i - g(X_i,
    W)| < \varepsilon \\ |y_i - g(X_i, W)| - \varepsilon & \text{Otherwise} \end{cases}
    \quad (6.73)$$


    where $\varepsilon$ is the parameter of the loss function, and if the prediction
    is within $\varepsilon$ of true value, then there is no loss. And choose absolute
    error value instead of a square of the error to achieve high robustness.


    Hence, empirical risk minimization under $\varepsilon$ insensitive loss would
    minimize


    $$\sum_{i=1}^n \max(|y_i - \emptyset(X_i)^T W - b| - \varepsilon, o) \quad (6.74)$$


    The optimization problem for SVM regression is to find $W$, $b$, $\varepsilon_i$,
    $\varepsilon_i''$


    $$\text{Minimize } \frac{1}{2} W^T W + C \left( \sum_{i=1}^n \varepsilon_i + \sum_{i=1}^n
    \varepsilon_i'' \right) \quad (6.75)$$


    $$\text{Subject to } y_i - W^T \emptyset(X_i) - b \leq \varepsilon + \varepsilon_i,
    \quad i = 1, \dots, n$$

    $$W^T \emptyset(X_i) + b - y_i \leq \varepsilon + \varepsilon_i'', \quad i = 1,
    \dots, n$$

    $$\varepsilon_i \geq 0, \quad \varepsilon_i'' \geq 0, \quad i = 1, \dots, n$$


    To construct a dual problem for SVM regression, introduce non-negative multipliers
    $\alpha_i$ and $\alpha_i''$ as follows


    $$\max_{\alpha, \alpha''} \sum_{i=1}^n y_i (\alpha_i - \alpha_i'') - \varepsilon
    \sum_{i=1}^n (\alpha_i + \alpha_i'') - \frac{1}{2} \sum_{i,j} (\alpha_i - \alpha_i'')(\alpha_j
    - \alpha_j'') \emptyset(X_i)^T \emptyset(X_j)^T \quad (6.76)$$


    Subject to $\sum_{i=1}^{n} (\alpha_i - \alpha''_i) = 0$


    $0 \leq \alpha_i, \alpha''_i \leq C, i = 1, ..., n$


    ## 6.6.9 One-Class SVM


    Outlier detection is an example of one-class SVM. Outlier detection is used for
    anomaly detection, where one is interested in detecting abnormal or unusual observations.
    The training data contain outliers, which are defined as observations that are
    far from the others. A one-class SVM is an unsupervised learning algorithm that
    learns the boundaries of data points and can classify any points that lie outside
    the boundary as, you guessed it, outliers.


    Figure 6.102 shows an example where the kitten and cub are the target classes
    with the label y=+1 and other extremes (neither kitten nor cub) are outliers y=-1.
    A one-class classifier is shown, which distinguishes kitten and cub from all other
    objects.


    ## 6.6.10 Multiclass SVM


    In general, SVM is a binary classifier, but in real-time scenarios, there can
    be multiple classes. The multiclass classification can be achieved using one against
    one, one against all, and directed acyclic graph SVM methods.


    ### 6.6.10.1 One against All


    In one against all, k binary SVM classifier is constructed where k is the number
    of classes. For example, there are three classes {1, 2, 3} as given in Figure
    6.103. Initially, let us perform binary classification by assuming class 1 as
    positive and the remaining classes from 2 and 3 as negative. Similarly, repeat
    the same procedure for the other four classes.


    ### 6.6.10.2 One against One


    In one against one method, for $M$ classes, $M(M - 1)/2$ classifiers are built.
    Figure 6.104 shows the architecture for three-class SVM problem using one against
    one method.


    ### 6.6.10.3 Directed Acyclic Graph SVM


    It is a combination of one against one method and a directed acyclic graph concept.
    For the three-class example {1, 2, 3}, initially construct a binary classifier
    for classes {1 and 2} as in one against one method. The binary classifier moves
    to the right node if the data belong to class 1, else to the left node. Finally,
    the directed acyclic graph shown in Figure 6.105 is constructed to make a decision.
    The leaf node indicates the final class label.


    ## 6.6.11 SVM EXAMPLES


    ### Example 6.11


    Let us see the linear SVM problem. Suppose we are given the following positively
    labeled data points


    $$\left\{\left(\begin{array}{l}3 \\ 1\end{array}\right),\left(\begin{array}{l}3
    \\ -1\end{array}\right),\left(\begin{array}{l}6 \\ 1\end{array}\right),\left(\begin{array}{l}6
    \\ -1\end{array}\right)\right\}$$


    and the following negatively labeled data points (see Figure 6.106):


    $$\left\{\left(\begin{array}{l}1 \\ 0\end{array}\right),\left(\begin{array}{l}0
    \\ 1\end{array}\right),\left(\begin{array}{l}0 \\ -1\end{array}\right),\left(\begin{array}{l}-1
    \\ 0\end{array}\right)\right\}$$


    Let us identify a simple hyperplane that separates the positive and negative points.
    Linear SVM can be used because the data points are linearly separable.


    Let us define a hyperplane by observing the given input data. There are three
    support vectors circled, as shown in Figure 6.107, which are close to the hyperplane
    and they are


    $$\left\{s_{1}=\left(\begin{array}{l}1 \\ 0\end{array}\right), s_{2}=\left(\begin{array}{l}3
    \\ 1\end{array}\right), s_{3}=\left(\begin{array}{l}3 \\ -1\end{array}\right)\right\}$$


    In what follows, we will use vectors augmented with 1 as a bias input


    $$\left\{\widetilde{s_{1}}=\left(\begin{array}{l}1 \\ 0 \\ 1\end{array}\right),
    \widetilde{s_{2}}=\left(\begin{array}{l}3 \\ 1 \\ 1\end{array}\right), \widetilde{s_{3}}=\left(\begin{array}{l}3
    \\ -1 \\ 1\end{array}\right)\right\}$$'
  mdcn: '## 6.6.6.3 其他领域特定核函数


    最具挑战性的部分是选择合适的核函数，这高度依赖于具体问题。


    ## 6.6.6.4 Sigmoid 核函数


    使用 Sigmoid 核函数的支持向量机等价于一个简单的、没有隐藏层的两层神经网络，即所谓的多层感知器。它也被称为双曲正切核函数。它源于神经网络，其中人工神经元通常使用双极性
    Sigmoid 机制作为激活函数。Sigmoid 核函数的方程由公式 6.59 给出。


    $$K(x_i, x_j) = \tanh(\alpha x_i \cdot x_j - \delta)$$


    ## 6.6.6.5 指数核函数


    它与高斯核函数非常接近，如下公式 6.60 所示。


    $$K(x_i, x_j) = e^{-\left(\frac{\|x_i - x_j\|^2}{2\sigma^2}\right)}$$


    ## 6.6.6.6 ANOVA 核函数


    据说它在多维回归问题中表现良好。


    $$K(x_i, x_j) = \sum_{k=1}^n \exp\left(-\sigma(x_i^k - x_j^k)^2\right)^d$$


    ## 6.6.6.7 有理二次核函数


    它的计算强度低于高斯核函数。如果高斯核函数计算成本过高，那么有理二次核函数可以作为替代方案。


    $$k(x_i, x_j) = 1 - \frac{\|x_i - x_j\|^2}{\|x_i - x_j\|^2 + c}$$


    ## 6.6.6.8 多二次核函数


    多二次核函数可用于与有理二次核函数相同的场景。与 Sigmoid 核函数一样，它也是非正定核函数的一个例子。


    $$k(x_i, x_j) = \sqrt{\|x_i - x_j\|^2 + c^2}$$


    ## 6.6.6.9 逆多二次核函数


    高斯核函数生成的核矩阵是满秩的，因此形成无限维特征空间。


    $$k(x_i, x_j) = \frac{1}{\sqrt{\|x_i - x_j\|^2 + c^2}}$$


    ## 6.6.6.10 圆形核函数


    圆形核函数用于地统计应用。它是各向同性平稳核函数的一个例子，在 $R_2$ 中是正定的。


    $$k(x_i, x_j) = \frac{2}{\pi} \arccos\left(-\frac{\|x_i - x_j\|}{\sigma}\right)
    - \frac{2}{\pi} \frac{\|x_i - x_j\|}{\sigma}$$


    ## 6.6.6.11 贝叶斯核函数


    贝叶斯核函数可以表示为


    $$k(x, y) = \prod_{l=1}^N k_l(x_l, y_l)$$


    ## 6.6.6.12 卡方核函数


    它源于卡方分布，表示如下：


    $$k(x, y) = 1 - \sum_{l=1}^n \frac{(x_l - y_l)^2}{\frac{1}{2}(x_l + y_l)}$$


    ## 6.6.6.13 直方图相交核函数


    它广泛用于图像分类，也被称为最小核函数。


    $$k(x, y) = \sum_{l=1}^n \min(x_l, y_l)$$


    ## 6.6.6.14 广义直方图相交核函数


    它是直方图相交核函数的一个变体，广泛应用于图像分类。


    $$k(x, y) = \sum_{l=1}^n \min(|x_l|^\alpha, |y_l|^\beta)$$


    ## 6.6.7 NU SVM


    在软间隔支持向量机中，寻找参数 $C$ 很困难。Scholkopf 等人引入了 nu SVM 来替代使用 $C$。nu 的取值范围在 0 和 1 之间。其函数由公式
    6.70 给出。


    最小化 $\frac{1}{2}\|w\|^2 - \gamma\rho + \frac{1}{2}\sum_l \xi^l$


    约束条件为


    $r^l(w^T x^l + w_0) \geq \rho - \xi^l, \xi^l \geq 0, \rho \geq 0$


    ## 6.6.8 支持向量机回归


    让我们将支持向量机扩展到回归问题。给定训练数据 $\{(X_1, y_1) \dots (X_n, y_n)\}$，其中 $X_i \in R^m$，$y_i
    \in R$，其思想是学习一个最优函数，以便在给定 $X$ 的情况下预测 $y$。这个回归问题可以通过权重向量 $w$ 进行参数化，如下公式 6.71 所示，


    $$g(X, W) = w_1 \emptyset_1(x) + \dots + w_{m''} \emptyset_{m''}(x) + b = w^T
    \emptyset(x) + b \quad (6.71)$$


    其中 $\emptyset_i : R^m \rightarrow R$。如果我们选择 $\emptyset_i(X) = x_i$，那么它就是一个线性回归模型。通过指定
    $Z = \emptyset(X) \in R^{m''}$，我们是在一个新变换的特征空间中学习一个线性模型。可以使用核函数来代替显式指定点积。


    回归问题中的损失函数 $L$ 是为了最小化 $W$，由公式 6.72 给出，


    $$\sum_i L(y_{i,g}(X_i, W)) \quad (6.72)$$


    使用一种特殊的损失函数，称为 $\varepsilon$ 不敏感损失，它允许我们在支持向量机回归中使用核技巧，如公式 6.42 所示。


    $$L_{\varepsilon}(y_i, g(X_i, W)) = \begin{cases} 0 & \text{如果 } |y_i - g(X_i,
    W)| < \varepsilon \\ |y_i - g(X_i, W)| - \varepsilon & \text{否则} \end{cases} \quad
    (6.73)$$


    其中 $\varepsilon$ 是损失函数的参数，如果预测值在真实值的 $\varepsilon$ 范围内，则没有损失。并且选择绝对误差值而不是误差的平方以实现高鲁棒性。


    因此，在 $\varepsilon$ 不敏感损失下的经验风险最小化将最小化


    $$\sum_{i=1}^n \max(|y_i - \emptyset(X_i)^T W - b| - \varepsilon, o) \quad (6.74)$$


    支持向量机回归的优化问题是找到 $W$，$b$，$\varepsilon_i$，$\varepsilon_i''$


    $$\text{最小化 } \frac{1}{2} W^T W + C \left( \sum_{i=1}^n \varepsilon_i + \sum_{i=1}^n
    \varepsilon_i'' \right) \quad (6.75)$$


    $$\text{约束条件为 } y_i - W^T \emptyset(X_i) - b \leq \varepsilon + \varepsilon_i,
    \quad i = 1, \dots, n$$

    $$W^T \emptyset(X_i) + b - y_i \leq \varepsilon + \varepsilon_i'', \quad i = 1,
    \dots, n$$

    $$\varepsilon_i \geq 0, \quad \varepsilon_i'' \geq 0, \quad i = 1, \dots, n$$


    为了构建支持向量机回归的对偶问题，引入非负乘子 $\alpha_i$ 和 $\alpha_i''$ 如下


    $$\max_{\alpha, \alpha''} \sum_{i=1}^n y_i (\alpha_i - \alpha_i'') - \varepsilon
    \sum_{i=1}^n (\alpha_i + \alpha_i'') - \frac{1}{2} \sum_{i,j} (\alpha_i - \alpha_i'')(\alpha_j
    - \alpha_j'') \emptyset(X_i)^T \emptyset(X_j)^T \quad (6.76)$$


    约束条件为 $\sum_{i=1}^{n} (\alpha_i - \alpha''_i) = 0$


    $0 \leq \alpha_i, \alpha''_i \leq C, i = 1, ..., n$


    ## 6.6.9 单类支持向量机


    离群点检测是单类支持向量机的一个例子。离群点检测用于异常检测，其中人们感兴趣的是检测异常或不寻常的观测值。训练数据包含离群点，这些离群点被定义为远离其他观测值的观测值。单类支持向量机是一种无监督学习算法，它学习数据点的边界，并且可以将任何位于边界之外的点分类为，你猜对了，离群点。


    图 6.102 显示了一个例子，其中小猫和幼崽是目标类别，标签为 y=+1，而其他极端情况（既不是小猫也不是幼崽）是离群点 y=-1。图中显示了一个单类分类器，它将小猫和幼崽与所有其他对象区分开来。


    ## 6.6.10 多类支持向量机


    通常，支持向量机是一个二元分类器，但在实时场景中，可能存在多个类别。多类分类可以使用一对一、一对多和有向无环图支持向量机方法来实现。


    ### 6.6.10.1 一对多


    在一对多方法中，构建 k 个二元支持向量机分类器，其中 k 是类别数量。例如，有三个类别 {1, 2, 3}，如图 6.103 所示。最初，让我们通过假设类别
    1 为正类，类别 2 和 3 为负类来进行二元分类。类似地，对其他四个类别重复相同的过程。


    ### 6.6.10.2 一对一


    在一对一方法中，对于 $M$ 个类别，构建 $M(M - 1)/2$ 个分类器。图 6.104 显示了使用一对一方法解决三类支持向量机问题的架构。


    ### 6.6.10.3 有向无环图支持向量机


    它是一对一方法和有向无环图概念的结合。对于三类示例 {1, 2, 3}，最初像一对一方法一样为类别 {1 和 2} 构建一个二元分类器。如果数据属于类别 1，则二元分类器移动到右节点，否则移动到左节点。最后，构建如图
    6.105 所示的有向无环图来做出决策。叶节点表示最终的类别标签。


    ## 6.6.11 支持向量机示例


    ### 示例 6.11


    让我们来看一个线性支持向量机问题。假设我们给定以下正标签数据点


    $$\left\{\left(\begin{array}{l}3 \\ 1\end{array}\right),\left(\begin{array}{l}3
    \\ -1\end{array}\right),\left(\begin{array}{l}6 \\ 1\end{array}\right),\left(\begin{array}{l}6
    \\ -1\end{array}\right)\right\}$$


    以及以下负标签数据点（见图 6.106）：


    $$\left\{\left(\begin{array}{l}1 \\ 0\end{array}\right),\left(\begin{array}{l}0
    \\ 1\end{array}\right),\left(\begin{array}{l}0 \\ -1\end{array}\right),\left(\begin{array}{l}-1
    \\ 0\end{array}\right)\right\}$$


    让我们确定一个简单的超平面来分离正负点。由于数据点是线性可分的，可以使用线性支持向量机。


    让我们通过观察给定的输入数据来定义一个超平面。有三个支持向量被圈出，如图 6.107 所示，它们靠近超平面，分别是


    $$\left\{s_{1}=\left(\begin{array}{l}1 \\ 0\end{array}\right), s_{2}=\left(\begin{array}{l}3
    \\ 1\end{array}\right), s_{3}=\left(\begin{array}{l}3 \\ -1\end{array}\right)\right\}$$


    在下文中，我们将使用添加了 1 作为偏置输入的增广向量


    $$\left\{\widetilde{s_{1}}=\left(\begin{array}{l}1 \\ 0 \\ 1\end{array}\right),
    \widetilde{s_{2}}=\left(\begin{array}{l}3 \\ 1 \\ 1\end{array}\right), \widetilde{s_{3}}=\left(\begin{array}{l}3
    \\ -1 \\ 1\end{array}\right)\right\}$$'

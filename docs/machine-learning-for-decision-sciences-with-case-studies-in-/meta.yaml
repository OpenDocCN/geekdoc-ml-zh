    # 6.5.6 FEATURES AND PROPERTIES OF RANDOM FOREST


    # 6.5.6.1 Features


    +   - It is the most accurate algorithm currently available, and it works quickly
    on huge datasets.

    - It can handle tens of thousands of input variables without deleting any of them.

    - It calculates the importance of several variables in the classification.

    - As the forest grows, it generates an internal unbiased estimate of the generalization
    error.

    - It offers a method for guessing missing data that works well and retains accuracy
    even with a considerable amount of missing data.

    - It includes techniques for balancing errors in uneven datasets with a class
    population.

    - The forests that are created can be preserved and used on other data in the
    future.'

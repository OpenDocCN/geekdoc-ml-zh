  md: '# 2.6 MATPLOTLIB BASICS


    Creating the statistical view of the data is the most demanding; Python provides
    a library called “Matplotlib.” It is very powerful and easily understandable for
    programmers who are already working with Python and Numpy. It is used with Numpy
    to provide a 2D graphical view.


    The matplotlib is useful for data scientists who want to visualize their data
    to provide the best outcome. Matplotlib is the most popular module of Python of
    data visualization.


    To use matplotlib, the user should first download its package according to the
    Python installed. The library which is used to draw 2D data is called **pyplot()**.
    Matplotlib can be initialized as follows:


    ```

    import matplotlib

    import pyplot as plot

    ```


    Let’s take the example of a survey on food items purchased by students from the
    canteen. Show the graphical representation of the most and least eaten items by
    students.


    ```

    import numpy as ns

    import matplotlib

    import pyplot as plot

    fooditems = ns. array ["Chips", "Burgers", "Sandwich", "Roll", "Patties",

    "Pizza"]

    students = ns.array [0, 1, 2, 3, 4,5,6]

    plot.title ("Survey on food items")

    plot.xlabel ("x-axis represents the food item sold in the canteen")

    plot.ylabel ("y-axis represents the number of students purchase items")

    plot.plot(fooditems,students)

    plot.show()

    ```


    Output : The output of the above code is shown in Figure 2.23.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_114_0.png)


    **FIGURE 2.23** Output for illustration on matplotlib.'

    ### 2.5.3.2 Class and Attributes of ndarray---.ndim


    Numpy''s array class is “ndarray,” also referred to as “numpy.ndarray.” This refers
    to the number of axes (dimensions) of the array. It is also called the rank of
    the array.


    ```

    f = np.array([[[1.5,2,3], (4,5,6),(7,8,9)]]])

    f.ndim

    ##OUTPUT --> 2


    # Describes how the bytes in the fixed-size block of memory corresponding to

    # an array item should be interpreted

    f.dtype

    ##OUTPUT --> dtype(''int32'')


    f.itemsize

    ##OUTPUT --> 4  ## The array is 32 bit length; 8 bytes ; 32/8 = 4



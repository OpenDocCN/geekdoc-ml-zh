  mdcn: "## 8.2.1 强化学习示例\n\n理解强化学习（RL）的一个绝佳方式，是考察一些引导其发展的示例和可行应用。\n\n-   一位国际象棋大师施展妙招。一个即时、自发的选择，既体现了特殊位置和行动的重要性，也涉及选举规划，并等待可行的应对与反击。\n\
    -   一只小羚羊出生后奋力站立。如今它已能以每小时20英里的速度奔跑。\n-   一个扫地机器人必须决定：是进入新房间寻找更多垃圾，还是开始返回充电站。它根据当前电池电量，以及过去定位充电器的速度和难易程度来做决策。\n\
    \n这些示例展示了一些基础到容易被忽视的功能。它们都涉及一个主动决策智能体与其环境之间的动态交互，智能体在环境信息模糊的情况下努力达成目标。智能体的行动会影响环境的未来状态（例如，下一步棋、炼油厂的储罐液位、机器人的下一个区域、其电池的未来电量），从而为后续行动提供依据。\n\
    \n由于正确的目标需要考虑行动的间接而非直接影响，因此可能需要深思熟虑或规划。同时，在所有这些情况下，行动的完成都无法完全预见；因此，智能体必须定期观察其环境并做出适当反应。例如，菲尔必须留意他倒入麦片碗的牛奶，以防溢出。许多示例中的目标如此独特，以至于智能体只能根据其亲身经历来预测目标的进展。\n\
    \n国际象棋选手知道他/她是否获胜，小羚羊知道何时摔倒，移动机器人知道何时电量耗尽。在每种情况下，智能体都能利用其热情（或反馈）来随时间提升表现。国际象棋选手通过精进评估局面的直觉来提升棋艺；小羚羊通过练习提高奔跑能力，等等。\n\
    \n## 8.3 强化学习与其他机器学习算法有何不同？\n\n### 8.3.1 监督学习\n\n在监督学习中，智能体知道要做什么工作以及哪些行动是合适的。数据科学家在带有标签的目标数据历史记录上训练智能体。智能体获得直接反馈，并能预测目标数据是否会发生变化。\n\
    \n强化学习不依赖于分类数据集。智能体不会被告知应采取哪些行动或执行任务的最佳方式。RL使用奖励和惩罚，而非与每个数据集选项相关的标签，来指示所执行的行动是积极还是消极。因此，智能体只有在完成任务后才会收到反馈。这种延迟的反馈和试错过程，是RL区别于监督学习的关键。\n\
    \n**强化学习 vs. 无监督学习：** 在无监督学习中，算法分析匿名数据，通过相似性或差异性来发现数据点和结构之间的隐藏关联。RL的目标是定义一个最优行动策略以获得最大的长期回报，这使其在主要目的上区别于无监督学习。\n\
    \n**强化学习与深度学习：** 大多数RL实现都使用深度学习模型。它们包含深度神经网络的使用，因为这是训练智能体的重要手段。深度学习非常适合识别图像、声音和文本中的复杂模式。此外，神经网络允许数据科学家将所有过程整合到一个单一模型中，而无需将智能体结构拆分成多个模块。\n\
    \n## 8.4 强化学习的要素\n\n除了智能体和环境之外，RL系统还有四个基本组成部分——策略、奖励信号、价值函数和环境模型。\n\n### 8.4.1\
    \ 策略\n\n策略表示在一段时间内指导智能体行为的信息。策略是已知环境状态区域的映射，以及在这些状态下应采取的步骤。它与心理学研究中所谓的“策略集”或“联想集”相辅相成。在某些情况下，策略可以是一个简单的查找表，而在另一些情况下，它可能包含复杂的计算和搜索过程。策略是强化智能体知识获取的核心，因为它直接决定了行为。通常，策略可以是随机的，为每个状态指定行动的概率分布。一般来说，策略就是智能体的行为。它可以是从状态到行动的映射。例如，\n\
    \n```\n确定性策略，$d = \\pi(p)$\n随机策略，$\\pi(d|p) = (D_t = d \\| P_t = p)\\pi(d|p)$\n\
    ```\n\n### 8.4.2 奖励信号\n\n奖励信号代表了RL问题的目标。在每一步，环境向智能体发送一个称为奖励的数字。智能体的主要目标是最大化其随时间获得的总回报。奖励信号指定了智能体经历的积极和消极事件。我们可以将生物系统中的奖励视为愉快或痛苦的体验。它们是对智能体问题的简洁而描述性的说明。奖励信号是策略改变的主要驱动力。如果一个策略选择的行动之后跟随了一个较低的奖励，那么该策略在未来可能会被改变以选择不同的行动。环境的状态变化和行动通常被用作奖励信号。价值函数表明了什么是长期有益的，而奖励信号则指明了什么是短期可取的。\n\
    \n### 8.4.3 价值函数\n\n在大多数情况下，价值函数是智能体从当前点开始在未来预期获得的总奖励。因此，价值反映了在评估了潜在状态及其可获得的奖励后，该状态的长期目标。相比之下，奖励表示即时的欲望。\n\
    \n例如，某个状态可能总是提供短暂而适度的奖励，但其价值仍然很高，因为它总是与其他提供更大奖励的状态相连。反之亦然。用人类的比喻来说，奖励类似于快乐（当高时），而更复杂的价值标准则决定了悲伤（当低时）。\n\
    \n奖励R是一个信号响应尺度，表示智能体在任务步骤中表现如何，以最大化累积奖励。RL依赖于这个奖励假设。\n\n#### 8.4.3.1 奖励示例\n\n\
    -   驾驶直升机进行特技飞行\n    -   按照预定路线飞行获得正奖励\n    -   发生碰撞获得负奖励\n-   在拼字游戏中击败世界冠军\n\
    \    -   赢得/输掉一局游戏获得正/负奖励\n-   管理投资组合\n    -   银行账户中每种货币获得正奖励\n-   控制发电站\n   \
    \ -   发电获得正奖励\n    -   超过安全阈值获得负奖励\n-   让人形机器人行走\n    -   向前移动获得正奖励\n    -   摔倒获得负奖励\n\
    -   玩多种不同的雅达利游戏并超越人类\n    -   分数增加/减少获得正/负奖励\n\n换句话说，奖励是首要的，而价值（如奖励预测）是次要的。如果没有奖励，就不会有价值，因为衡量价值的唯一目的就是为了获得更多奖励。然而，在选择和比较行动时，价值是一个主要考量因素。价值判断被用来选择行动。我们寻求能导致更高价值状态的行为，而不仅仅是更大的即时奖励，因为这些行为能为我们带来最佳的长期回报。坦率地说，定义价值比分配奖励要困难得多。实际上，可靠地衡量价值是几乎所有RL系统中最重要的挑战。定量"

    \ =\n['product'], ignore_index = True)\n\ndf\n```\n\nFeatures extraction covers\
    \ every necessary property/viewpoint, and to live features quantitatively may\
    \ be a much-needed task. Hence, let us discuss all the features extracted from\
    \ reviews.\n\nStep 1: Noun Strength (Rn): Nouns are subjects regarded as the most\
    \ informative language section. The number of subjects shows the importance of\
    \ review because only a noun describes the prime factors of review (which tells\
    \ us what the review is about). We did POS Tagging to seek out nouns during a\
    \ review and computed score as:\n\nStep 2: Score (Rn) = TFIDF(noun) / TFIDF(all\
    \ words)\n\nStep 3: Review Polarity (Rp): Its value lies between -1 to +1, which\
    \ tells whether a review has sentiment or negative sentiment.\n\nStep 4: Review\
    \ Subjectivity (Rs): The subjectivity could measure the objective to subjective\
    \ sentiment and goes from 0 to 1. Objective expressions are facts, while Subjective\
    \ expressions are opinions that describe a person's feelings. Consider the following\
    \ expression:\nBournvita tastes excellent with milk: Subjective\nBournvita is\
    \ brown: Objective\n\nStep 5: Review Complexity (Rc): to gauge how good and sophisticated\
    \ a review is in terms of unique words within and across a specific product's\
    \ entire review corpus.\nRc = Number of unique words during a Review / Number\
    \ of unique words in the entire Corpus\n\nStep 6: Review Word Length (Rw): Word\
    \ count of a Review\n\nStep 7: Service Tagger (Rd): the simplest review talks\
    \ more about how the product, how it tastes, what its uses are, and therefore\
    \ the one which talks about the effectiveness of a product. Reviews are basically\
    \ to describe a product. So, a dictionary of words is made, which might mark reviews\
    \ as service-based, delivery reviews, and customer support. Fuzzy matching each\
    \ word during a review is finished with the words within the dictionary with Levenshtein\
    \ distance. Levenshtein distance helps measure the difference between two sequences\
    \ and tackles spell errors in review. For instance, rather than \"My delivery\
    \ was on time\", Reviews is wrongly written as \"My delivery was on time\". In\
    \ this case, Fuzzy matching would help us to match both the reviews.\n\nStep 8:\
    \ Compound Score (Rsc): to enhance the efficiency of the system. We compute the\
    \ compound score using VaderSentimentAnalyser. This library is taken from VADER\
    \ (Valence Aware Dictionary and sEntiment Reasoner). This is a lexicon and rule-based\
    \ sentiment analysis tool specifically tuned to figure out sentiments expressed\
    \ in social media content. It has the power to seek out the sentiment of Slang\
    \ (e.g., SUX!), Emoji (®, ®), Emoticons ( : ), :D ) and, therefore, the difference\
    \ between capitalized word expressions(I am SAD, I'm sad are different expressions).\n\
    \n```python\n#Rsc ≥ 0.5 (Positive Sentiment)\n# -0.5 (Positive Sentiment)\n# -0.5<Rsc<+0.5\
    \ (Neural Sentiment)\n# Rsc≤ -0.5 (Negative Sentiment)\n# Miscellaneous: We purposely\
    \ did not include Reviews Rating as a feature. The inclusion of Ratings blunders\
    \ the entire system because of two reasons:\n# 1. Common confusion between Rating\
    \ and Reviews. For example, someone who rates the product '1' (On a rating scale\
    \ of 1-5, '1' being the 'lowest' and '5' being the 'highest') writes the review\
    \ comment as 'very good and useful medicine'.\n# 2. A large portion of Reviews\
    \ from customers are either five stars or one star.\n#\n# TextBlob: https://textblob.readthedocs.io/en/dev/index.html\n\
    # VaderSentiment: https://github.com/cjhutto/vaderSentiment\n# spaCy: https://spacy.io/\n\
    ```\n\n### Add Feature Columns\n\n```python\ndf['Rn'] = 0.0\ndf['Rp'] = 0.0\n\

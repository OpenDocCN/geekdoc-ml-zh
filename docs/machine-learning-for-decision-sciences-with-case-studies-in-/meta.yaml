    3. **基于模型：** 在基于模型的方法中，环境创建一个虚拟模型，智能体检查该环境以进行分析。这种方法没有特定的算法或解决方案，因为虚拟模型对于每个环境都是独特的。\n\
    \n## 8.5 马尔可夫决策过程\n\n在强化学习框架中，决策由智能体从环境中做出，作为称为环境状态的信号函数。本节定义了马尔可夫性质，该性质定义了环境的属性和特定兴趣下的状态信号。在本节中，我们不关注设计状态信号，而是关注信号可用的函数。\n\
    \n### 8.5.1 预备知识\n\n状态应代表智能体的直接感觉，并能够向智能体传达更多信息。它不仅传达关于环境的一切，还传达对决策有用的一切。例如，如果智能体正在使用手机通信，它应该能够识别来电者是谁。如果智能体正在玩百家乐游戏，它应该知道下一张牌是什么。如果我们分析这些例子，环境中隐藏着一些状态信息，智能体知道可能有用，但智能体无法预测它，因为没有接收到相关的感觉。能够保留所有信息的状态信号被称为马尔可夫或具有马尔可夫性质。例如，棋子的位置可以作为马尔可夫状态，因为它封装了游戏中所有已进行位置序列的所有信息。虽然可能会错过一些序列，但未来所需的一切都被保留了。总的来说，我们可以说它应该保留到达此位置所做信号的历史。让我们考虑一组有限状态和奖励值，以及一个响应在时间\

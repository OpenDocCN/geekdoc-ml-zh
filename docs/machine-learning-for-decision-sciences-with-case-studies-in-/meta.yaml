    LEARNING OBJECTIVES


    At the end of this chapter, the reader will be able to:


    +   - Understand the application of phases of data analytics life cycle for machine
    learning (ML) problems,

    - Comprehend the data for a given problem and the objective of the problem such
    that a suitable algorithm can be identified,

    - Identify alternate ML models for the listed use cases,

    - Apprehend the differences between common ML models from an application perspective,
    and

    - Implement the use cases provided in this chapter using Python.


    Machine learning is endlessly fascinating and constantly evolving. The use of
    ML in various industries has been gaining speed in the last few years. There are
    multiple uses to solve industry-related business problems, from retail to financial
    services to healthcare to manufacturing. This chapter discusses a few uses in
    different industries to solve the industry problem using deep learning. Traditional
    programming cannot accommodate the logic for various combinations. Using the Price
    Elasticity of Demand Method, use case 1, Retail Price Optimization, finds the
    exact price at which maximum profit is gained. The use case highlights the step-by-step
    implementation of understanding the data, loading the data, exploring the data,
    and model building. In use case 2, Market Basket Analysis (MBA), we present the
    application based on a customer dataset in a supermarket, thus highlighting association
    rule mining. The product associations are compared based on Apriori and Fpgrowth
    algorithms. Use case 3, Sales Prediction of a Retailer, is illustrated to build
    a ML model and find out the sales of each product at a particular store. The code
    is implemented to compare different regression models and identify Gradient Boosting
    as the best model. Predicting the cost of insurance claims for a Property and
    Causalty (P&C) Insurance Company is covered in use case 4. This case study illustrates
    data cleaning, data preprocessing, and handling outliers. Use case 5, E-Commerce
    Product Ranking and Sentiment Analysis, deals with understanding the data, data
    preprocessing-filtering (including gibberish, language, and profanity detection),
    feature extraction, pairwise review scoring, and further categorization.


    # 9.1 USE CASE 1 – RETAIL PRICE OPTIMIZATION USING PRICE ELASTICITY OF DEMAND
    METHOD


    # 9.1.1 BACKGROUND


    Product pricing is a vital aspect of the rental industry, and there are several
    strategies to determine the optimal price of the products. As such, there are
    two main types of goods. First, there are several goods whose prices affect their
    sales. Small changes in the price of these products can therefore lead to distinctive
    changes in sales. On the other hand, sales of goods can be unaffected by their
    price. These products are generally luxury items and necessities such as certain
    medicines. This notebook will focus on the former type of goods, where price changes
    the demand for the product.


    Price elasticity of demand (PED) is a key economic measure defined as the degree
    to which demand changes as the cost of the product changes. In general, the demand
    for a product decreases as cost rises. However, in some cases, the demand can
    drop sharply even with a small increase'
  merge: -1
  pgno: 411
- img_proc: true
  md: 'in price, while in other cases, demand can stay approximately the same even
    with a sharp price increase. Therefore, the term price elasticity defines the
    percentage change in demand due to a change in price by 1%, given that everything
    else is held constant.


    In mathematical terms, the PED is the percentage change in quantity demanded,
    $q$, divided by the percentage change in price, $p$. The formula for the price
    elasticity ($\varrho$) is $e = \%\Delta Q / \%\Delta P$. In this program, we look
    at the sales of the items in a cafe, including burgers, coke, lemonade, and coffee.
    As data scientists, our task is to figure out the optimal prices to set for these
    items. If the price is set too high, the sales will drop, and if the price is
    low, then the margins will decrease. Hence, the crucial question to get an answer
    for is “what is the optimal price point that will maximize the profit?”



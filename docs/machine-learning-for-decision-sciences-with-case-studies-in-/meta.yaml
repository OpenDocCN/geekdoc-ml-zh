    +   - Ensure data distribution is consistent over the entire dataset. If not,
    the data preparation team proposes a new plan to handle the situation.

    - Assess the granularity of the data, the range of values, and the level of aggregation
    of the data.

    - For time-related variables, are the time measurements daily, weekly, monthly?
    Is that good enough? Is time measured in seconds everywhere? Or is it in milliseconds
    in some places? This will cause the data level mismatch when we combine the data
    and harmonizing it. Ensure the lowest level of data is consistent across data
    sources.

    - Are the data standardized/normalized? Are the scales consistent? If not, how
    normal or irregular is the data? In this case, a scaling function is applied to
    smoothen the data.

    - If geospatial datasets are considered, are country codes, state abbreviations,
    and postal codes consistent across the data? Are personal names normalized? Whether
    English units are considered? Whether standards metric units are considered?

    - How is the data deduplication handled? When combining multiple sources due to
    various factors such as incorrect abbreviations, using the last name instead of
    the full name, the same records appear as duplicate records in the target database.



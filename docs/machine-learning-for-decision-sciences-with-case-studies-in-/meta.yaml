    variables in a given dataset, and how these relationships depend on other variables.
    The first Seaborn function to explore is relplot(). This is a two-dimensional
    data visualization function. First, let us use the flights dataset that is available
    with the Seaborn.


    ```

    #improting the required libraries

    import numpy as np

    import pandas as pd

    import matplotlib.pyplot as plt

    import seaborn as sns

    sns.set(style="darkgrid") #style attribute is customizable and can take


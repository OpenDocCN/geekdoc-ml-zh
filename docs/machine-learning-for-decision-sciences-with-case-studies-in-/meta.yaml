    # 4.8.1 DBSCAN (Density-Based Spatial Clustering of Applications with Noise)


    The widely used density-based technique is DBSCAN, which was introduced by Ester
    et al. (1996). The main objective of DBSCAN is to identify the dense region. The
    main high-level idea of DBSCAN is as follows:'

  md: '# 6.5.5.1.2 Gini Index


    If dataset $D$ contains $n$ classes, Gini index is defined as


    $Gain(D) = 1 - \sum P_i^2$


    where $P_i$ represents the sum of the probabilities of the positive index and
    negative index


    # Home type ≤6:


    | Record | Zero | One | N=5 |

    | :--- | :---: | :---: | :---: |

    | Home type ≤6 | 1 | 0 | $n_1=1$ |

    | Home type >6 | 2 | 2 | $n_2=4$ |


    Gini (home type≤6) = $1 - (1^2 + 0) = 0$

    Gini (home type >6) = $1 - ((2/4)^2 + (2/4)^2) = 0.5$

    Gini (split) = $1/5(0) + 4/5(0.5) = 0.4$



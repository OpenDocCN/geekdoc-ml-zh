  md: '# 2.6.1 CREATING GRAPHS WITH MATPLOTLIB


    1. **Bar graph:** It is the most commonly used graph to show the data representations.
    Matplotlib provides a built-in function `bar()` to create bar graphs. It takes
    three input variables: fields, value, and color. Let''s consider the same example
    of a survey on students eating the same food items.


    ```

    import numpy as ns

    Impot matplotlib

    import pyplot as plot

    fooditems = ns.array ["Chips", "Burgers", "Sandwich", "Roll", "Patties", "Pizza"]

    students = ns.array [ 10, 20, 30, 40,50,60]

    plot.title ("Survey on food items")

    plot.xlabel ("x axis represents the food item sold in canteen")

    plot.ylabel ("y axis represents the number of students purchase items")

    plot.bar (fooditems,students, color = ''green'')

    plot.show()

    ```



    # 2.4.5.20.3 Dictionary


    Dictionary is like a box of an unordered set of objects. It acts like a telephone
    dictionary that saves the telephone numbers based on a person''s name, the dictionary''s
    key, and phone numbers will be its details. In the dictionary, the key should
    always be unique.


    Dictionary is initialized with curly braces; the key is separated from its value
    by a colon “:” and commas separate items. Items can be of any data type, but the
    key should be an immutable data type.


    **Example:** Saving students record based on enrollment numbers which will be
    the key, and it is always unique.


    ```

    Dict={''enroll'': ''121'', ''name'': ''adam'', ''class'': ''first''}

    Print dict[''enroll'']

    Print dict[''name'']

    To access the value with the help key, Python uses the following code:

    Dict[enroll];

    ```


    # 2.4.5.20.4 Set


    The concept of sets is same as sets we study in mathematics. An unordered group
    of items is known assets, and the user can find union, intersection, and set difference.
    Their usage is primarily when the existence of an object in a collection is more
    important than the order or how many times it occurs.


    Set can be initialized by using brackets. Let''s take the example of an equal
    set.


    ```

    **Input:**

    A= {1, 2, 3};

    B= {3,2, 1};

    Print (A==B);

    **Output:** true

    ```



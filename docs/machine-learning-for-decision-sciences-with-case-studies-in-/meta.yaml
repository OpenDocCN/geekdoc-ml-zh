- md: "## Introduction\n\nChapter 1 describes the basic concepts of data science,\
    \ and structural patterns involved in decision sciences. The relation between\
    \ machine learning and statistics is highlighted with an introduction to data\
    \ science life cycle. The key role of a data scientist is briefed, and the real-world\
    \ applications in these areas are emphasized.\n\nIn Chapter 2, the need for Python\
    \ programming in machine learning, basics of Python programming, and data structures\
    \ and their implementation using Python are presented. In addition, we introduce\
    \ the readers to NumPy basics, Matplotlib basics, Pandas basics, and the computational\
    \ complexity involved in programming using Python. The chapter also provides programming\
    \ examples for beginners using Python. A few real-world examples are also programmed\
    \ so that the reader will understand implementation in Python with NumPy, Pandas,\
    \ and Matplotlib libraries.\n\nChapter 3 focuses on the phases involved in the\
    \ data analytics life cycle for machine learning. The aspects involved in data\
    \ discovery, data preparation and exploratory data analysis, model planning, and\
    \ model building are delineated. The reader is also exposed to the process of\
    \ communicating results and optimizing and operationalizing the models. The roles\
    \ and responsibilities of the members involved throughout the phases of data analytics\
    \ life cycle are explained in detail.\n\nChapter 4 gives an insight into the basics\
    \ of unsupervised learning, distance measures, the concept of clustering, the\
    \ most commonly used clustering algorithms, their applications to solve problems\
    \ in real time, and their limitations.\n\nIn Chapter 5, the essential ideas behind\
    \ all supervised algorithms in machine learning are discussed. The mathematical\
    \ concept behind supervised algorithm with worked examples and implementation\
    \ using Python is given in detail. Supervised algorithm for regression problem\
    \ is well explained in this chapter with Python implementation.\n\nThe supervised\
    \ learning method learns from the labeled data. Logistic regression, decision\
    \ tree, and support vector machine are the various supervised learning classification\
    \ algorithms widely used. In Chapter 6, a detailed description of these algorithms,\
    \ their mathematical modeling, merits and demerits, solved examples, and real-world\
    \ applications are provided with step-by-step implementation in Python.\n\nChapter\
    \ 7 enlightens an analysis on feature engineering and reviews the basic requirements\
    \ for features selection, wrapper models, and factor analysis with relevant Python\
    \ examples.\n\nIn Chapter 8, we discuss the goal-oriented learning based on reinforcement\
    \ learning, and how reinforcement learning (RL) varies when compared with other\
    \ machine learning algorithms. The elements of RL such as agent, policy function,\
    \ and value function are explained in detail, followed by the RL algorithms the\
    \ Markov decision process (MDP) and dynamic programming (DP). The value functions,\
    \ policy evaluation, and improvements are covered along with implementation of\
    \ MDP and DP in Python.\n\nChapter 9 highlights a few applications of machine\
    \ learning in various industries to solve problems where traditional programming\
    \ cannot accommodate the reasoning for many combinations. The first use case,\
    \ Retail Price Optimization Using the Price Elasticity of Demand Method, identifies\
    \ the exact price at which the most profit may be made. We present the application\
    \ based on a customer dataset in a supermarket in use case 2 – Market Basket Analysis\
    \ – highlighting association rule mining. Use case 3 – Sales Prediction of a Retailer\
    \ – shows how to create a machine learning model and determine the sales of each\
    \ product at a certain store. In use case 4, the cost of insurance claims is predicted\
    \ for a property and casualty (P&C) insurance company. This case study shows how\
    \ to clean data, preprocess data, and deal with outliers.\n\n# 1 Introduction\n\
    \n## LEARNING OBJECTIVES\n\nAt the end of this chapter, the reader will be able\
    \ to\n\n- Understand the need for data science and machine learning (ML) in a\
    \ real-world scenario.\n- Appreciate the fundamentals of ML and deep learning.\n\
    - Describe structural patterns and understand their variants.\n- Know the key\
    \ roles of a data scientist for solving practical problems.\n- Identify the real-world\
    \ application areas of ML models.\n\n## 1.1 INTRODUCTION TO DATA SCIENCE\n\nThe\
    \ process of considering the algorithm and coding it with the help of a programming\
    \ language can be executed by the computer. IT world has made people’s life easier\
    \ by providing helpful software. A design pattern provides a general reusable\
    \ solution to the common problems that usually occur in software design. The patterns\
    \ identify the connections between classes and objects. The primary purpose of\
    \ patterns is to boost the performance of the development process. This chapter\
    \ will understand the need for data science and machine learning (ML) in real-world\
    \ scenarios, highlight the basics of ML and deep learning (DL), know how to describe\
    \ structural patterns, and understand their variants. In addition, a detailed\
    \ description of the key role of a data scientist in solving real-world applications\
    \ is highlighted. Several areas in which ML algorithms are applied are also illustrated.\n\
    \nData science is a part of software engineering in which we study where the information\
    \ comes from and its organization. It represents how we can turn the valuable\
    \ resources in the initialization of any business and the information technology\
    \ strategies. Data science allows mining a large amount of data that helps to\
    \ identify the patterns for any organization’s efficiencies. There are some fields\
    \ of data science: statistics, disciplines of computer science, data visualization,\
    \ and data mining. Data scientists possess a combination of ML and analytic and\
    \ statistical skills and experience in coding and algorithms. Data science is\
    \ everywhere in today’s world. Let’s imagine that you are traveling to a new city.\
    \ The user can search for some tourist places, restaurants, parks, hotels, etc.,\
    \ with just one click. How is this possible? It’s the data science that saves\
    \ and displays the results on your phone screen in a few seconds.\n\n### 1.1.1\
    \ MATHEMATICS\n\nMathematics is everywhere around us, from counting money, temperature\
    \ calculation, shapes, etc. Data science and mathematics have a strong relation\
    \ in all the decision-making processes like predicting the routes and searching\
    \ for the best possible answer. All these tasks are incomplete without mathematics.\
    \ Data science uses ML algorithms for decision-making processes.\n\n### 1.1.2\
    \ STATISTICS\n\nData science is nothing without statistics, and data scientists\
    \ require a graphical representation of the data with less theory. Business providers\
    \ prefer data visualization like a bar chart as it becomes easier to evaluate\
    \ the data and gain more information.\n\n## 1.2 DESCRIBING STRUCTURAL PATTERNS\n\
    \nCreating an application or software is a complex task. It becomes more difficult\
    \ if not created with proper flow or patterns – software engineers use some patterns\
    \ to symbolize their application patterns to solve many problems. The selection\
    \ of patterns depends upon the application requirements. Design patterns boost\
    \ the development process; structural patterns are all about the classes and their\
    \ instances creation. For example, to create a website that stores student records,\
    \ the class will be Student and will have attributes like student name, age, father’s\
    \ name, and address.\n\n### 1.2.1 Uses of Structural Patterns\n\nStructural patterns\
    \ play an essential role in effectively solving the problems, as it covers the\
    \ central concept of object-oriented programming, i.e., classes and their inheritance.\
    \ These patterns allow classes to work together as a group. With the help of structural\
    \ patterns, software engineers write less source code as most of the functions\
    \ are extracted from inherited classes. Some of the commonly used design patterns\
    \ are listed below:\n\n- **Adapter design pattern**\n  Adapter patterns create\
    \ a connection between interfaces of different classes; let’s take the real-life\
    \ example: we have two applications created with two different programming languages.\
    \ Now, you want to compile both applications on a single platform. The adapter\
    \ works here as it changes the interface of one instance so that other instances\
    \ can easily understand it. The adapter hides all the complex conversions.\n-\
    \ **Bridge design pattern**\n  The bridge design pattern splits the abstraction\
    \ from its implementation. Let’s take the example of the main socket, which controls\
    \ the lights, fan, TV, and AC of the house. This main socket acts as a bridge\
    \ between the house’s sub-switches that control turning ON/OFF of the utilities.\n\
    - **Composite design pattern**\n  Composite design patterns are used where a group\
    \ of identical instances is considered as one instance. This pattern creates a\
    \ hierarchal structure of similar objects. For example, the composite pattern\
    \ creates a class that includes the faction of its objects.\n  Let’s understand\
    \ the pattern with an example of grouping the teachers into different departments,\
    \ classes will contain all the details of a teacher like a name, salary, address,\
    \ and department, and *composite teacher* class will use teacher class to add\
    \ teachers in a different department and print the teachers.\n- **Decorator design\
    \ pattern**\n  Decorator design patterns are used whenever new functions are needed\
    \ to be added to existing objects without changing the entire structure of the\
    \ class. Decorator design pattern creates a new class that abstracts the original\
    \ class and provides the newly added functionalities. Let’s discuss an example\
    \ of a decorator design pattern for a clearer understanding. Suppose we need to\
    \ develop an online ordering system of a well-known burger restaurant that takes\
    \ all requirements from a customer like what kind of bun, patty, and cheese they\
    \ need in the burger and according to the requirement estimate the burger price.\n\
    \  Since customer customization may vary from customer to customer, creating classes\
    \ for each type of customization will be a difficult task. Here we can create\
    \ a decorator pattern class, which will contain all the information to customize\
    \ the burger, like adding extra cheese, extra patty etc. The main class will be\
    \ the burger with the regular base price. By using a decorator class, the burger\
    \ class can be extended and the price can be added according to the customization."
  mdcn: "## 引言\n\n第1章描述了数据科学的基本概念以及决策科学中涉及的结构模式。通过介绍数据科学生命周期，重点阐述了机器学习与统计学之间的关系。简要介绍了数据科学家的关键角色，并强调了这些领域在现实世界中的应用。\n\
    \n第2章介绍了机器学习中Python编程的必要性、Python编程基础、数据结构及其Python实现。此外，我们向读者介绍了NumPy基础、Matplotlib基础、Pandas基础，以及使用Python编程涉及的计算复杂度。本章还为初学者提供了使用Python的编程示例。同时，也编程实现了一些现实世界的例子，以便读者理解如何使用NumPy、Pandas和Matplotlib库在Python中进行实现。\n\
    \n第3章重点介绍了机器学习数据分析生命周期所涉及的阶段。详细阐述了数据发现、数据准备与探索性数据分析、模型规划和模型构建等方面。读者还将了解沟通结果、优化和模型化模型的过程。本章详细解释了数据分析生命周期各阶段中成员的角色和职责。\n\
    \n第4章深入探讨了无监督学习的基础、距离度量、聚类概念、最常用的聚类算法、它们在实时问题解决中的应用及其局限性。\n\n第5章讨论了机器学习中所有监督算法背后的基本思想。详细介绍了监督算法背后的数学概念，包括实例讲解和Python实现。本章还很好地解释了回归问题的监督算法及其Python实现。\n\
    \n监督学习方法从标记数据中学习。逻辑回归、决策树和支持向量机是广泛使用的各种监督学习分类算法。第6章详细描述了这些算法、它们的数学建模、优缺点、已解决的示例以及现实世界的应用，并提供了Python中的分步实现。\n\
    \n第7章深入分析了特征工程，并回顾了特征选择、包装模型和因子分析的基本要求，并提供了相关的Python示例。\n\n第8章我们讨论了基于强化学习的目标导向学习，以及强化学习与其他机器学习算法相比有何不同。详细解释了强化学习的要素，如智能体、策略函数和价值函数，随后介绍了强化学习算法马尔可夫决策过程和动态规划。涵盖了价值函数、策略评估和改进，以及在Python中实现MDP和DP。\n\
    \n第9章重点介绍了机器学习在各个行业中的几个应用，用于解决传统编程无法适应多种组合推理的问题。第一个用例“使用需求价格弹性方法的零售价格优化”确定了可以获得最大利润的确切价格。我们在用例2“购物篮分析”中，基于超市的客户数据集展示了该应用，重点介绍了关联规则挖掘。用例3“零售商销售预测”展示了如何创建机器学习模型并确定特定商店每种产品的销售额。在用例4中，预测了财产和意外伤害保险公司的保险索赔成本。这个案例研究展示了如何清理数据、预处理数据以及处理异常值。\n\
    \n# 1 引言\n\n## 学习目标\n\n本章结束后，读者将能够\n\n- 理解现实世界场景中对数据科学和机器学习的需求。\n- 领会机器学习和深度学习的基础知识。\n\
    - 描述结构模式并理解其变体。\n- 了解数据科学家在解决实际问题中的关键作用。\n- 识别机器学习模型的现实世界应用领域。\n\n## 1.1 数据科学简介\n\
    \n考虑算法并借助编程语言对其进行编码的过程可以由计算机执行。信息技术世界通过提供有用的软件使人们的生活更加便捷。设计模式为软件设计中通常出现的常见问题提供了一种通用的可重用解决方案。这些模式识别了类和对象之间的联系。模式的主要目的是提高开发过程的性能。本章将理解现实世界场景中对数据科学和机器学习的需求，重点介绍机器学习和深度学习的基础知识，了解如何描述结构模式并理解其变体。此外，还详细描述了数据科学家在解决现实世界应用中的关键作用。还说明了机器学习算法应用的几个领域。\n\
    \n数据科学是软件工程的一部分，我们研究信息的来源及其组织方式。它代表了我们如何将宝贵的资源转化为任何业务初始化和信息技术战略。数据科学允许挖掘大量数据，这有助于识别任何组织效率的模式。数据科学有一些领域：统计学、计算机科学学科、数据可视化和数据挖掘。数据科学家具备机器学习、分析和统计技能以及编码和算法方面的经验。数据科学在当今世界无处不在。想象一下，你正在前往一个新城市旅行。用户只需点击一下，就可以搜索一些旅游景点、餐厅、公园、酒店等。这怎么可能？正是数据科学在几秒钟内保存并将结果显示在你的手机屏幕上。\n\
    \n### 1.1.1 数学\n\n数学无处不在，从数钱、温度计算、形状等。数据科学和数学在所有决策过程中都有着密切的关系，比如预测路线和寻找最佳答案。没有数学，所有这些任务都是不完整的。数据科学使用机器学习算法进行决策过程。\n\
    \n### 1.1.2 统计学\n\n没有统计学，数据科学就一无是处，数据科学家需要较少理论的数据图形表示。商业提供者更喜欢数据可视化，如条形图，因为它更容易评估数据并获取更多信息。\n\
    \n## 1.2 描述结构模式\n\n创建应用程序或软件是一项复杂的任务。如果没有按照适当的流程或模式创建，难度会更大——软件工程师使用一些模式来象征他们的应用程序模式，以解决许多问题。模式的选择取决于应用程序的要求。设计模式提高了开发过程；结构模式是关于类及其实例创建的。例如，要创建一个存储学生记录的网站，类将是Student，并将具有学生姓名、年龄、父亲姓名和地址等属性。\n\
    \n### 1.2.1 结构模式的用途\n\n结构模式在有效解决问题方面发挥着重要作用，因为它涵盖了面向对象编程的核心概念，即类及其继承。这些模式允许类作为一个组协同工作。借助结构模式，软件工程师编写更少的源代码，因为大多数功能都是从继承的类中提取的。下面列出了一些常用的设计模式：\n\
    \n- **适配器设计模式**\n  适配器模式在不同类的接口之间创建连接；让我们举一个现实生活中的例子：我们有两个用两种不同编程语言创建的应用程序。现在，你想在单个平台上编译这两个应用程序。适配器在这里起作用，因为它改变了一个实例的接口，以便其他实例可以轻松理解它。适配器隐藏了所有复杂的转换。\n\
    - **桥接设计模式**\n  桥接设计模式将抽象与其实现分离。让我们以主插座为例，它控制房子的灯、风扇、电视和空调。这个主插座充当房子子开关之间的桥梁，控制电器的开启/关闭。\n\
    - **组合设计模式**\n  组合设计模式用于将一组相同的实例视为一个实例。此模式创建相似对象的层次结构。例如，组合模式创建一个包含其对象部分的类。\n\
    \  让我们通过一个将教师分组到不同部门的例子来理解这个模式，类将包含教师的所有详细信息，如姓名、工资、地址和部门，而*组合教师*类将使用教师类将教师添加到不同部门并打印教师。\n\
    - **装饰器设计模式**\n  当需要向现有对象添加新功能而不改变类的整个结构时，使用装饰器设计模式。装饰器设计模式创建一个新类，该类抽象原始类并提供新添加的功能。让我们讨论一个装饰器设计模式的例子以更清楚地理解。假设我们需要开发一个知名汉堡餐厅的在线订购系统，该系统从客户那里获取所有需求，比如他们需要什么样的面包、肉饼和奶酪，并根据需求估算汉堡价格。\n\
    \  由于客户定制可能因客户而异，为每种定制类型创建类将是一项困难的任务。在这里，我们可以创建一个装饰器模式类，它将包含所有定制汉堡的信息，如添加额外的奶酪、额外的肉饼等。主类将是具有常规基础价格的汉堡。通过使用装饰器类，可以扩展汉堡类，并根据定制添加价格。"

    ## 8 Reinforcement Engineering


    ### LEARNING OBJECTIVES


    At the end of this chapter, the reader will be able to


    - Understand the goal-oriented learning based on reinforcement learning (RL)

    - Appreciate the difference between RL and other ML algorithms

    - Have knowledge of elements of RL such as agent, policy function, and value function

    - Apprehend the Markov decision process (MDP) and dynamic programming (DP) concerning
    value functions, policy evaluation, and improvements

    - Implement MDP and DP using Python


    ### 8.1 INTRODUCTION


    When we consider the nature of learning, the idea of gaining information about
    dealing with our surroundings may be the first that comes to mind. A newborn does
    not have an unambiguous instructor when playing, swinging its fingers, or looking
    from side to side; instead, it is in direct contact with its senses and nature.
    Using this link shows a wealth of information on causes and effects, the effects
    of actions, and what you need to do to attain your objectives. Throughout our
    lives, such contact is unquestionably a rich source of information about our environment
    and ourselves. If we are going to learn cooking in a group, we know exactly how
    our place reacts to what we do, and we need to persuade what will happen with
    our behavior. Almost all theories of learning and knowledge acquisition support
    collaborative learning as a fundamental notion. In this book, we look at how to
    learn from interactions using a computational method. Instead of directly considering
    how humans or animals learn, we study the investigated settings and evaluate the
    efficacy of artificial intelligence researchers or engineers’ numerous learning
    approaches. We investigate the structure of mathematical analysis and computational
    experimentation to design machines that effectively solve scientific or economic
    significance problems. The method we are testing, called reinforcement learning,
    is more goal-oriented learning from interaction than other machine learning (ML)
    methods. This chapter discusses goal-oriented learning based on reinforcement
    learning (RL) and how RL varies with other ML algorithms. The elements of RL such
    as agent, policy function, and value function are explained in detail, followed
    by the RL algorithms the Markov decision process (MDP) and dynamic programming
    (DP). The value functions, policy evaluation, and improvements are covered by
    implementing MDP and DP in Python.


    ### 8.2 REINFORCEMENT LEARNING


    RL is the process of learning what to do – how to map situations into actions
    – to raise the numerical reward signal’s value. The learner is not told which
    steps to follow; instead, he must determine which acts provide the highest reward
    for trying. In the most thrilling and difficult situations, actions may impact
    the current reward and the next situation and, as a result, all subsequent prizes.
    These are two most important parts of RL: trial-and-error search and delayed rewards.


    RL, like other issues with names that finish in “ing,” such as ML and climbing,
    is a problem, a category of successful solutions to the problem and a subject
    that studies the problem and its solutions all at the same time. It’s tempting
    to use a single word to describe all three issues, but it’s critical to keep these
    three issues separate in your mind. Furthermore, the distinction between problems
    and solutions in RL is particularly important; failing to express this distinction
    causes much confusion.


    Therefore, we design a RL issue, including applying notions from dynamical system
    principles, such as complete control of Markov’s completely anonymous decision-making
    processes.


    The learning agent must sense its natural state to some extent and take actions
    that influence it. In addition, the agent should have a goal or set of principles
    in mind when it comes to the status of the environment. Markov’s decision-making
    methods are designed to combine only these three variables – emotion, action,
    and purpose – in the most basic ways possible, without jeopardizing any of them.
    We recall that any effective strategy to solve such issues is a RL method. RL
    is not the same as supervised learning, which is the type of research being done
    in ML.


    Supervised learning is based on categorized examples provided by an experienced
    external manager as part of a training program. Each instance represents the current
    condition and a specific label of the proper action that the program should perform
    in that situation, which is normally to assign the situation to a category. This
    form of training aims to get the program out or combine its responses to function
    best in situations that aren’t covered in the training set. This is an important
    method of learning knowledge, but it is not sufficient in and of itself. Finding
    instances of the desired behavior and representing all settings under which the
    agent must work is frequently unproductive in cooperative problems. Instead, an
    agent must research from their experience in an unmarked area, where one would
    expect learning to be most valuable.


    RL is also distinct from unsupervised learning, commonly used to uncover a structure
    buried in unlabeled information by machine learning researchers. Although supervised
    and unsupervised learning appear to be two distinct ML models, they are no longer
    so. Although it is tempting to think of RL as an unsupervised form of learning
    because it does not rely on positive behavioral models, RL aims to magnify the
    reward signal rather than trying to identify a hidden structure. Finding the structure
    of an agent’s experience can be highly useful in reinforcement. Still, it does
    not solve the challenge of RL to increase the reward signal on its own. As a result,
    we consider RL to be a third ML paradigm, alongside supervised and unsupervised
    learning, as well as perhaps different paradigms.


    The trade between exploration and exploitation is one of the challenges that arise
    from RL but not from other types of learning. The RL agent must choose actions
    that he or she has tried in the past and is proven to be effective in generating
    rewards to reap the most benefit. The agent must not only use his experience to
    win the prize, but he must also learn how to make the greatest decisions in the
    future. The issue is that exploration or exploitation cannot be carried out without
    fail. The agent must try for a broad range of acts while continuing to favor the
    ones that appear to be the most effective. In a stochastic challenge, each action
    must be repeated multiple times before an accurate estimate of the expected reward
    can be determined. Mathematicians have researched this problem of exploration
    and exploitation for decades, but it has yet to be solved. Meanwhile, we just
    recognize that the dilemma of balancing exploration and exploitation is no longer
    solvable.


    Another distinguishing feature of RL is that it explicitly addresses the total
    difficulty of an intention-directed agent dealing with an unpredictable environment.
    Many ML researchers, for example, have researched supervised learning without
    specifying how such a capability may be valuable in the long run. Likewise, different
    researchers have advanced theories of planning with similar goals, but without
    considering the function of planning in real-time decision-making or the question
    of where the forecasting models needing to make plans will come from. Even though
    these strategies have had many positive outcomes, their focus on remote subtypes
    is a common problem. RL takes the opposite behavior, beginning with a whole, interactive,
    goal-achieving agent.


    Furthermore, it is generally believed from the beginning that the agent has to
    function with a notwithstanding sizable uncertainty about the surroundings it
    faces. When planning is involved in RL, it has to address the interaction among
    making plans and the selection of real-time action, in addition, to knowing how
    the environmental model is derived and progressed. When supervised learning is
    involved in RL, it does so for unique reasons that determine which abilities are
    important and which are not.'

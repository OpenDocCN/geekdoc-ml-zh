- md: '## 5.4.4 SOLVING OPTIMIZATION PROBLEM


    The optimization problem can be solved using two different strategies:


    - Deriving a closed-form solution, and

    - Gradient descent


    To understand the method of deriving a closed-form solution, let’s take a partial
    derivative of the mean squared error $J_n$. For the optimal set of parameters,
    derivatives of the error concerning each parameter must be 0.


    $$\frac{\partial}{\partial w_j} J_n(w) = -\frac{2}{n} \sum_{i=1}^{n} (y_i - w_0
    x_{i,0} - w_1 x_{i,1} - \cdots - w_d x_{i,d}) x_{i,j} = 0$$


    The vector of derivatives


    $$\text{grad}_w J_n(w) = \nabla_w (J_n(w)) = -\frac{2}{n} \sum_{i=1}^{n} (y_i
    - w^T x_i) x_i = 0$$


    ### 5.4.4.1 Maxima and Minima


    In Figure 5.23, the peaks in the data are called maxima. The global maxima are
    the highest peak in the entire data. The global minima are the lowest trough in
    the entire data.


    For finding minima, let us see an example and set $f''(z) = 0$ and solve $z$:


    $$f(z) = z^2$$


    ![](img/7fbca4852dbe91c6cea209148871a1b3_223_0.png)


    FIGURE 5.23 Representation of maxima and minima.


    The derivative of $f(z) = z^2$ is $f''(z)$, and it can be written as


    $$f''(z) = 2z \quad (5.31)$$


    If $z = 0$, then the derivative function becomes zero, and this point is known
    as local maxima or local minima:


    $$f''(z) = 0 \quad (5.32)$$


    If the derivative is greater than zero or positive, the function increases, which
    implies that it is moving away from the trough. Else if the derivative is lesser
    than zero or negative, the function decreases, which means the function moves
    toward the trough.


    Finding minima by assuming $z = -1$, then the function $f''(z) = 2z$ becomes $f''(-1)
    = 2 * -1 = -2$, which is decreasing and moving toward the trough (Figure 5.24).
    Then, increase $z$ by the size of the gradient. If the size of the gradient is
    2, then $z$ becomes 1.


    $$z = -1 + 2 = 1$$


    For the second iteration, by assuming $z = 1$, then the function $f''(z) = 2z$
    becomes $f''(1) = 2 * 1 = 2$, which is increasing and moving away from the trough.
    Then, increase $z$ by the size of the gradient. If the size of the gradient is
    2, then $z$ becomes 1.


    $$z = 1 - 2 = -1$$


    Thus, it is kept jumping between the same two points, which can be overcome by
    using the appropriate learning rate or step size.


    ### 5.4.4.2 Gradient Descent


    Gradient descent is an optimization algorithm used to minimize the error function
    in machine learning. Gradient descent is used to solve linear regression problems
    iteratively, as shown in Figure 5.25.


    The objective of gradient descent is to minimize the error function. The simple
    example of the parabola for minimizing the error using gradient descent is explained
    below in Figure 5.26. If we


    ![](img/7fbca4852dbe91c6cea209148871a1b3_224_0.png)


    ![](img/7fbca4852dbe91c6cea209148871a1b3_225_0.png)


    FIGURE 5.25 Geometric intuition of gradient descent.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_225_1.png)


    FIGURE 5.26 Minimizing error in a parabola using gradient descent.


    start at point a and move left, the function $f$ is increasing. and if we move
    right, it is decreasing. Therefore, choose the direction where it is decreasing.


    But not all the functions are like a parabola. The other example is shown in Figure
    5.27, where the local minima and global minima are depicted clearly. In this graph,
    if $b$ moves right, it will reach local minima.


    Define a cost function $J(\theta)$:


    $$J(\theta) = \frac{1}{2} \left( \sum_{i=1}^{m} h(x)^{(i)} - y^{(i)} \right)^2$$

    $$h(x) = \sum_{i=0}^{n} \beta_i x_i$$


    ![](img/7fbca4852dbe91c6cea209148871a1b3_226_0.png)


    FIGURE 5.27 Minimizing error using an irregular function other than the parabola.


    where $h(x)^{(i)}$ is the predicted value and $y^{(i)}$ is the actual value. The
    main objective is to learn $\theta$, which minimizes cost function $J(\theta)$.


    Algorithm for Gradient Descent


    Begin


    Step 1: Initialize $\theta$ Randomly

    Step 2: Do

    {

    Step 3: $\theta = \theta - \alpha \nabla_{\theta} J(\theta)$

    }

    Step 4: while($\alpha \| \nabla J \| > \varepsilon$)


    The algorithm for gradient descent is as follows. First, initialize $\theta$ randomly
    or often set to zero and then iterate. The learning rate is denoted as $\alpha$.
    The stopping condition is that either $J$ is not changing quickly or the gradient
    is sufficiently small. Then, the process is repeated until it reaches minimal
    error or no further improvement is possible.


    In gradient descent, the learning rate $\alpha$ is used to ensure whether gradient
    descent is working correctly or not. The smaller the learning rates $\alpha$,
    the slower the convergence. Choose $\alpha$ as 0.001, 0.01, 0.1, and 1.


    $$\theta_j = \theta_j - \alpha \frac{\partial}{\partial \theta_j} J(\theta) \quad
    (5.35)$$


    Let the $x$-axis denote the number of iterations in gradient descent. $J(\theta)$
    should decrease at every iteration, as observed in Figure 5.28.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_227_0.png)


    FIGURE 5.28 Learning rate.


    ### 5.4.4.3 LMS (Least Mean Square) Update Rule


    Apply derivative to the cost function $J(\theta)$:


    $$\frac{\partial}{\partial \theta} J(\theta) = \frac{\partial}{\partial \theta_j}
    \frac{1}{2} (h(x) - y)^2$$

    $$= 2 \cdot \frac{1}{2} (h(x) - y) \frac{\partial}{\partial \theta_j} (h(x) -
    y)$$

    $$= (h(x) - y) \cdot \frac{\partial}{\partial \theta_j} \left( \sum_{i=0}^{n}
    \theta_i x_i - y \right)$$

    $$= (h(x) - y) x_j$$


    ### 5.4.4.4 SGD Algorithm


    Stochastic gradient descent (SGD) is a widely used variant of gradient descent.


    Algorithm for Stochastic Gradient Descent


    Begin


    Step 1: Repeat{

    Step 2: For $I=1$ to $m$ do

    Step 3: $\theta_j = \theta_j + \alpha (y^i - h(x^i)) x_j^{(i)}$ (for every $j$)

    Step 4: End for

    }

    Step 5: until convergence


    ![](img/7fbca4852dbe91c6cea209148871a1b3_228_0.png)


    FIGURE 5.29 Applications of linear regression.


    ## 5.4.5 Real-World Applications


    Many real-world applications make use of linear regression techniques, as shown
    in Figure 5.29. To analyze the trend overtime -plays an important role in business
    sectors. The analyses of GDP, oil price, and stock prices are well-known examples
    of trend analysis. With the help of statistical analysis, the business can gather
    new insights and achieve operational efficiency.


    ### 5.4.5.1 Predictive Analysis


    It can be used to generate insights on customer behavior, understanding business,
    and factors influencing profitability. Linear regressions can be used in business
    to evaluate trends and make estimates or forecasts. Linear regression can also
    analyze the marketing effectiveness, pricing, and promotions on sales of a product.
    Linear regression can also be used to assess risk in the financial services or
    insurance domain. The risk can be assessed based on the attributes of the car,
    driver information, or demographics. The results of such an analysis might guide
    important business decisions.'
  mdcn: '## 5.4.4 求解优化问题


    优化问题可以通过两种不同的策略来求解：


    - 推导出闭式解，以及

    - 梯度下降法


    为了理解推导闭式解的方法，让我们对均方误差 $J_n$ 求偏导数。对于最优的参数集，误差对每个参数的导数必须为 0。


    $$\frac{\partial}{\partial w_j} J_n(w) = -\frac{2}{n} \sum_{i=1}^{n} (y_i - w_0
    x_{i,0} - w_1 x_{i,1} - \cdots - w_d x_{i,d}) x_{i,j} = 0$$


    导数向量


    $$\text{grad}_w J_n(w) = \nabla_w (J_n(w)) = -\frac{2}{n} \sum_{i=1}^{n} (y_i
    - w^T x_i) x_i = 0$$


    ### 5.4.4.1 极大值与极小值


    在图 5.23 中，数据中的峰值被称为极大值。全局极大值是整个数据中的最高峰。全局极小值是整个数据中的最低谷。


    为了找到极小值，让我们看一个例子，令 $f''(z) = 0$ 并求解 $z$：


    $$f(z) = z^2$$


    ![](img/7fbca4852dbe91c6cea209148871a1b3_223_0.png)


    图 5.23 极大值与极小值的表示。


    $f(z) = z^2$ 的导数是 $f''(z)$，可以写成


    $$f''(z) = 2z \quad (5.31)$$


    如果 $z = 0$，则导函数变为零，该点被称为局部极大值或局部极小值：


    $$f''(z) = 0 \quad (5.32)$$


    如果导数大于零或为正，函数递增，这意味着它正在远离谷底。否则，如果导数小于零或为负，函数递减，这意味着函数正向谷底移动。


    通过假设 $z = -1$ 来寻找极小值，那么函数 $f''(z) = 2z$ 变为 $f''(-1) = 2 * -1 = -2$，这是递减的并向谷底移动（图
    5.24）。然后，按梯度的大小增加 $z$。如果梯度的大小是 2，那么 $z$ 变为 1。


    $$z = -1 + 2 = 1$$


    对于第二次迭代，假设 $z = 1$，那么函数 $f''(z) = 2z$ 变为 $f''(1) = 2 * 1 = 2$，这是递增的并远离谷底。然后，按梯度的大小增加
    $z$。如果梯度的大小是 2，那么 $z$ 变为 1。


    $$z = 1 - 2 = -1$$


    因此，它会在相同的两个点之间不断跳跃，这可以通过使用合适的学习率或步长来克服。


    ### 5.4.4.2 梯度下降法


    梯度下降法是一种用于最小化机器学习中误差函数的优化算法。梯度下降法用于迭代地求解线性回归问题，如图 5.25 所示。


    梯度下降法的目标是最小化误差函数。下面在图 5.26 中解释了使用梯度下降法最小化误差的抛物线简单例子。如果我们


    ![](img/7fbca4852dbe91c6cea209148871a1b3_224_0.png)


    ![](img/7fbca4852dbe91c6cea209148871a1b3_225_0.png)


    图 5.25 梯度下降法的几何直观。


    ![](img/7fbca4852dbe91c6cea209148871a1b3_225_1.png)


    图 5.26 使用梯度下降法最小化抛物线中的误差。


    从点 a 开始向左移动，函数 $f$ 是递增的。如果我们向右移动，它是递减的。因此，选择递减的方向。


    但并非所有函数都像抛物线。另一个例子如图 5.27 所示，其中清晰地描绘了局部极小值和全局极小值。在这个图中，如果 $b$ 向右移动，它将达到局部极小值。


    定义一个代价函数 $J(\theta)$：


    $$J(\theta) = \frac{1}{2} \left( \sum_{i=1}^{m} h(x)^{(i)} - y^{(i)} \right)^2$$

    $$h(x) = \sum_{i=0}^{n} \beta_i x_i$$


    ![](img/7fbca4852dbe91c6cea209148871a1b3_226_0.png)


    图 5.27 使用非抛物线的不规则函数最小化误差。


    其中 $h(x)^{(i)}$ 是预测值，$y^{(i)}$ 是实际值。主要目标是学习 $\theta$，以最小化代价函数 $J(\theta)$。


    梯度下降算法


    开始


    步骤 1：随机初始化 $\theta$

    步骤 2：执行

    {

    步骤 3：$\theta = \theta - \alpha \nabla_{\theta} J(\theta)$

    }

    步骤 4：当($\alpha \| \nabla J \| > \varepsilon$)时


    梯度下降算法如下。首先，随机初始化 $\theta$ 或通常设为零，然后进行迭代。学习率记为 $\alpha$。停止条件是 $J$ 变化不快或梯度足够小。然后，重复该过程，直到达到最小误差或无法进一步改进。


    在梯度下降中，学习率 $\alpha$ 用于确保梯度下降是否正常工作。学习率 $\alpha$ 越小，收敛越慢。选择 $\alpha$ 为 0.001、0.01、0.1
    和 1。


    $$\theta_j = \theta_j - \alpha \frac{\partial}{\partial \theta_j} J(\theta) \quad
    (5.35)$$


    令 $x$ 轴表示梯度下降中的迭代次数。如图 5.28 所示，$J(\theta)$ 应在每次迭代时递减。


    ![](img/7fbca4852dbe91c6cea209148871a1b3_227_0.png)


    图 5.28 学习率。


    ### 5.4.4.3 LMS（最小均方）更新规则


    对代价函数 $J(\theta)$ 应用导数：


    $$\frac{\partial}{\partial \theta} J(\theta) = \frac{\partial}{\partial \theta_j}
    \frac{1}{2} (h(x) - y)^2$$

    $$= 2 \cdot \frac{1}{2} (h(x) - y) \frac{\partial}{\partial \theta_j} (h(x) -
    y)$$

    $$= (h(x) - y) \cdot \frac{\partial}{\partial \theta_j} \left( \sum_{i=0}^{n}
    \theta_i x_i - y \right)$$

    $$= (h(x) - y) x_j$$


    ### 5.4.4.4 SGD 算法


    随机梯度下降（SGD）是梯度下降法的一种广泛使用的变体。


    随机梯度下降算法


    开始


    步骤 1：重复{

    步骤 2：对于 $I=1$ 到 $m$ 执行

    步骤 3：$\theta_j = \theta_j + \alpha (y^i - h(x^i)) x_j^{(i)}$（对于每个 $j$）

    步骤 4：结束循环

    }

    步骤 5：直到收敛



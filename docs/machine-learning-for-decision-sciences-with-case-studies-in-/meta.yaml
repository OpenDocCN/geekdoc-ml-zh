- md: "## 4 Unsupervised Learning\n\nLEARNING OBJECTIVES\n\nAt the end of this chapter,\
    \ the reader will be able to\n\n- Understand different types of clustering algorithms,\
    \ namely k-means, fuzzy k-means, hierarchical (agglomerative and divisive), and\
    \ DBSCAN algorithms\n- Implement the algorithms using Python\n- Analyze the performance\
    \ of the algorithms based on several evaluation metrics\n- Appreciate the limitations\
    \ of clustering algorithms and adapt suitable ones based on the working dataset\n\
    \n## 4.1 INTRODUCTION\n\nOne of the promising areas to learn systems formally\
    \ is machine learning. Machine learning algorithms are used mostly in interdisciplinary\
    \ areas by combining the thoughts from several fields, such as optimization theory,\
    \ cognitive science, mathematics, statistics, and computer science. In this chapter,\
    \ the reader would benefit from the broad underlying area of machine learning\
    \ known as unsupervised learning. The present-day data scientists apply various\
    \ machine learning algorithms to extract valuable information from the data provided.\
    \ Most of the learning algorithms are supervised learning problems since we have\
    \ a priori knowledge of the output of the type of data presented.\n\nOn the contrary,\
    \ unsupervised learning is a complex and challenging approach to machine learning\
    \ algorithms. Despite its complexity, the advantages of unsupervised learning\
    \ algorithms are numerous. This class of algorithms has proven to be potential\
    \ enough to provide solutions to previously unsolvable problems and has gained\
    \ a lot of popularity in machine learning and deep learning. This chapter will\
    \ explain the basics of unsupervised learning, distance measures, the concept\
    \ of clustering, the most commonly used clustering algorithms, their applications\
    \ to solve problems in real time, and their limitations.\n\n## 4.2 UNSUPERVISED\
    \ LEARNING\n\nThe class of unsupervised learning is a kind of self-organized learning\
    \ that helps us identify patterns or similarities in our data related to various\
    \ features. The three main categories of machine learning are supervised learning,\
    \ unsupervised learning, and reinforcement learning.\n\nConsider a machine or\
    \ a system that receives a sequence of inputs $x_1, x_2, x_3, \\dots$, from a\
    \ sensor where $x_t$ is the sensory input at time $t$. This input that is received\
    \ sequentially concerning time is called the data. Data can be any real-time measurement\
    \ such as an image from a camera and voltage or current values from a solar panel.\n\
    \nIn supervised learning, the system is also presented with a sequence of desired\
    \ outputs $y_1, y_2, \\dots$, along with the received input data. The goal of\
    \ the system is to learn to produce the correct output upon receiving successive\
    \ inputs.\n\nIn reinforcement learning, the system interacts with its environment\
    \ by producing a set of actions. These actions, in turn, impact the environment,\
    \ and this change results in the system receiving a few scalar rewards or penalties\
    \ corresponding to every action. Thus, the system's goal is to act in such a way\
    \ as to maximize future rewards or minimize future penalties.\n\n![](img/7fbca4852dbe91c6cea209148871a1b3_168_0.png)\n\
    \nFIGURE 4.1 Block diagram of unsupervised learning.\n\nIn unsupervised learning,\
    \ the system, as shown in Figure 4.1, receives the set of sensory inputs $x_1,\
    \ x_2, \\dots$, but does not obtain the target outputs (like supervised learning),\
    \ nor rewards or penalties from its environment (like reinforcement learning).\
    \ Though it seems mysterious to imagine what the system could learn without any\
    \ feedback from its environment, it is possible to develop a systematic framework\
    \ for unsupervised learning. The framework's goal is to build representation models\
    \ similar to the input data, which can be used for prediction, decision-making,\
    \ etc.\n\nIt is important to understand the need for unsupervised learning at\
    \ this point. In situations such as speech recognition, the interpretation of\
    \ large datasets is very costly. Unsupervised learning has been proving to be\
    \ efficient in such application areas. In data mining, there may be a situation\
    \ where the user cannot predict the number of classes the data can be divided\
    \ into. Unsupervised learning has been proving to be successful in such situations\
    \ as well.\n\nUnsupervised learning is classified into two categories, namely\
    \ parametric unsupervised learning and non-parametric unsupervised learning.\n\
    \n- **Parametric unsupervised learning**\n  When the given data can be represented\
    \ in terms of parametric distribution, the case is referred to as *parametric\
    \ unsupervised learning*. The algorithm assumes that the data is obtained from\
    \ a probability distribution-based population that follows a fixed set of parameters.\
    \ These fixed sets of parameters are usually mean and standard deviation. Using\
    \ these parameters on normal distribution data, the probability of any future\
    \ observation can be predicted easily. This learning algorithm involves structuring\
    \ Gaussian mixture models with expectation-maximization (EM) algorithm to predict\
    \ the class of the sample data taken for classification. This unsupervised learning\
    \ approach is much more complex than any supervised learning approach, and research\
    \ has not identified any standard measure of accuracy to validate the algorithm's\
    \ outcome.\n\n- **Non-parametric unsupervised learning**\n  In non-parameterized\
    \ unsupervised learning, the data obtained from the real world is assembled to\
    \ form groups or clusters. Here, each cluster holds some information about the\
    \ data present in its group. This approach is mostly used to analyze and mold\
    \ data into a smaller set of samples. Here, the learning does not use any assumptions\
    \ regarding the population distribution and hence is also known as a distribution-free\
    \ method.\n\nTwo of the main methods used in unsupervised learning are principal\
    \ component analysis and cluster analysis, but the most commonly used method is\
    \ clustering.\n\n### 4.2.1 CLUSTERING\n\nOne of the popular unsupervised learning\
    \ problems is clustering. It evolves in determining a structure from a collection\
    \ of data. The structure is comprised of a group of objects in which the members\
    \ have some similar relation. Thus, a cluster can be defined as a group of objects\
    \ with “similar” properties among them and “dissimilar” properties concerning\
    \ the objects in other clusters.\n\nThere are several definitions for the term\
    \ clustering in the literature, and some of the common ones are as follows:\n\n\
    - The method of identifying groups in data.\n- The method of segregating the data\
    \ into homogeneous groups.\n- The method of segregating the data into groups,\
    \ with similar points in each group.\n- The method of segregating the data into\
    \ groups, where points within each group are similar while points of different\
    \ groups are dissimilar.\n- The method of segregating the population space into\
    \ areas with a comparatively high density of points, separated by areas with a\
    \ comparatively low density of points.\n\nThere is certainly a wide difference\
    \ between clustering and classification. In unsupervised learning, clustering\
    \ is applied on a set of unlabeled data without any knowledge about the dataset.\
    \ On the contrary, in the classification approach, the grouping or class is formed\
    \ on a set of unlabeled data after applying a suitable supervised learning algorithm.\n\
    \nHence, a cluster is usually formed by grouping similar data points concerning\
    \ a center called the centroid. Boundaries are usually not well defined for a\
    \ cluster. Based on the boundaries, clusters are classified into crisp clusters\
    \ and fuzzy clusters. Crisp clusters have a well-defined boundary, while fuzzy\
    \ clusters do not have a well-defined boundary.\n\nThe main criteria for grouping\
    \ objects into clusters are as follows:\n\n- Each cluster should consist of objects\
    \ similar to each other\n- Each cluster should be unlike the other, which implies\
    \ that the objects in one cluster are different from those present in other clusters.\n\
    \nThe clustering technique provides many advantages, but the two most important\
    \ benefits of clustering can be outlined as follows:\n\n1. Identification and\
    \ analysis of noisy data are comparatively easier.\n2. Clustering facilitates\
    \ the user to handle data with different types of variables.\n\n## 4.3 EVALUATION\
    \ METRICS FOR CLUSTERING\n\nThe main objective of clustering is to find an intrinsic\
    \ grouping pattern among a set of unlabeled data. But how does anyone conclude\
    \ that the grouping is the best? Or what constitutes a good"
  mdcn: "## 4 无监督学习\n\n**学习目标**\n\n本章结束后，读者将能够\n\n- 理解不同类型的聚类算法，即k-means、模糊k-means、层次（凝聚和分裂）以及DBSCAN算法\n\
    - 使用Python实现这些算法\n- 基于多种评估指标分析算法的性能\n- 认识聚类算法的局限性，并根据工作数据集选择合适的算法\n\n## 4.1 引言\n\
    \n机器学习是系统化学习的一个有前景的领域。机器学习算法主要应用于跨学科领域，结合了来自优化理论、认知科学、数学、统计学和计算机科学等多个领域的思想。在本章中，读者将受益于机器学习这一广泛的基础领域，即无监督学习。当今的数据科学家应用各种机器学习算法从提供的数据中提取有价值的信息。大多数学习算法属于监督学习问题，因为我们对所呈现类型数据的输出具有先验知识。\n\
    \n相反，无监督学习是机器学习算法中一种复杂且具有挑战性的方法。尽管其复杂性，无监督学习算法的优势众多。这类算法已被证明具有足够的潜力，能够为以前无法解决的问题提供解决方案，并在机器学习和深度学习中获得了广泛普及。本章将解释无监督学习的基础知识、距离度量、聚类概念、最常用的聚类算法、它们在实时问题解决中的应用及其局限性。\n\
    \n## 4.2 无监督学习\n\n无监督学习是一类自我组织的学习，帮助我们识别数据中与各种特征相关的模式或相似性。机器学习的三个主要类别是监督学习、无监督学习和强化学习。\n\
    \n考虑一个机器或系统，它从传感器接收一系列输入 $x_1, x_2, x_3, \\dots$，其中 $x_t$ 是时间 $t$ 的感官输入。这种按时间顺序接收的输入称为数据。数据可以是任何实时测量，例如来自摄像头的图像，或来自太阳能电池板的电压或电流值。\n\
    \n在监督学习中，系统还会收到一系列期望输出 $y_1, y_2, \\dots$，以及接收到的输入数据。系统的目标是学习在接收到连续输入时产生正确的输出。\n\
    \n在强化学习中，系统通过产生一组动作与其环境进行交互。这些动作反过来影响环境，这种变化导致系统接收到与每个动作对应的几个标量奖励或惩罚。因此，系统的目标是以最大化未来奖励或最小化未来惩罚的方式行动。\n\
    \n![](img/7fbca4852dbe91c6cea209148871a1b3_168_0.png)\n\n图 4.1 无监督学习的框图。\n\n在无监督学习中，如图4.1所示，系统接收感官输入集合\
    \ $x_1, x_2, \\dots$，但不获得目标输出（如监督学习），也不从其环境中获得奖励或惩罚（如强化学习）。尽管想象系统在没有任何环境反馈的情况下能学到什么似乎很神秘，但为无监督学习开发一个系统框架是可能的。该框架的目标是构建类似于输入数据的表示模型，这些模型可用于预测、决策等。\n\
    \n此时理解无监督学习的必要性很重要。在诸如语音识别等情况下，解释大型数据集的成本非常高。无监督学习已被证明在此类应用领域中是高效的。在数据挖掘中，可能存在用户无法预测数据可被划分为多少类的情况。无监督学习在此类情况下也被证明是成功的。\n\
    \n无监督学习分为两类，即参数无监督学习和非参数无监督学习。\n\n- **参数无监督学习**\n  当给定数据可以用参数分布表示时，这种情况称为*参数无监督学习*。该算法假设数据来自遵循固定参数集的概率分布总体。这些固定的参数集通常是均值和标准差。使用这些参数在正态分布数据上，可以轻松预测任何未来观察的概率。该学习算法涉及使用期望最大化（EM）算法构建高斯混合模型，以预测用于分类的样本数据的类别。这种无监督学习方法比任何监督学习方法都要复杂得多，研究尚未确定任何标准的准确性度量来验证算法的结果。\n\
    \n- **非参数无监督学习**\n  在非参数化无监督学习中，从现实世界获得的数据被组合形成组或簇。这里，每个簇包含有关其组中存在的数据的一些信息。此方法主要用于分析和将数据塑形为更小的样本集。这里，学习不使用关于总体分布的任何假设，因此也称为无分布方法。\n\
    \n无监督学习中使用的两种主要方法是主成分分析和聚类分析，但最常用的方法是聚类。\n\n### 4.2.1 聚类\n\n聚类是流行的无监督学习问题之一。它从数据集合中确定一个结构。该结构由一组对象组成，其中成员具有某种相似关系。因此，聚类可以定义为一组对象，它们之间具有“相似”的属性，而与其他簇中的对象具有“不相似”的属性。\n\
    \n文献中对聚类一词有多种定义，一些常见的定义如下：\n\n- 识别数据中组的方法。\n- 将数据分割成同质组的方法。\n- 将数据分割成组的方法，每个组中的点相似。\n\
    - 将数据分割成组的方法，其中每个组内的点相似，而不同组的点不相似。\n- 将总体空间分割成点密度相对较高的区域，由点密度相对较低的区域分隔的方法。\n\n\
    聚类和分类之间肯定存在很大差异。在无监督学习中，聚类应用于一组未标记的数据，而无需了解数据集的任何信息。相反，在分类方法中，组或类是在应用适当的监督学习算法后，对一组未标记的数据形成的。\n\
    \n因此，聚类通常通过将相似的数据点分组到一个称为质心的中心周围来形成。聚类的边界通常定义不明确。根据边界，聚类分为硬聚类和模糊聚类。硬聚类具有明确的边界，而模糊聚类没有明确的边界。\n\
    \n将对象分组到聚类中的主要标准如下：\n\n- 每个聚类应包含彼此相似的对象\n- 每个聚类应与其他聚类不同，这意味着一个聚类中的对象与存在于其他聚类中的对象不同。\n\
    \n聚类技术提供了许多优势，但聚类的两个最重要的好处可以概述如下：\n\n1. 噪声数据的识别和分析相对容易。\n2. 聚类便于用户处理具有不同类型变量的数据。\n\
    \n## 4.3 聚类的评估指标\n\n聚类的主要目标是在一组未标记的数据中找到内在的分组模式。但如何得出分组是最佳的结论？或者什么构成了一个好的"

    \ 3: 'C', 4: 'Machine Learning'}\n```\n\n```python\nIn [6]: mydict\nOut[6]: {1:\
    \ ['python', '2019-01-03'], 2.5: 'java', 3: 'C', 4: 'Machine Learning'}\n```\n\
    \n```python\nIn [7]: type(mydict)  # Checking type of the variable\nOut[7]: dict\n\
    ```\n\n```python\nIn [8]: print(ab)\n        print(type(ab))\n        {'Suresh':\
    \ 'Suresh@Sureshch.com', 'Ashok': 'Ashok@wall.org',\n         'Sumathi': 'Sumathi@ruby-lang.org',\
    \ 'Surekha': 'Surekha@hotmail.com'}\n        <class 'dict'>\n```\n\n```python\n\
    In [9]: print(\"Suresh's e-address is\", ab['Suresh'])\n        Suresh's e-address\
    \ is Suresh@Sureshch.com\n```\n\n```python\nIn [10]: # Deleting a key-value pair\n\
    \         del ab['Surekha']\n```\n\n```python\nIn [11]: ab\nOut[11]: {'Suresh':\
    \ 'Suresh@Sureshch.com', 'Ashok': 'Ashok@wall.org',\n          'Sumathi': 'Sumathi@ruby-lang.org'}\n\
    ```\n\n```python\nIn [12]: # Adding a key-value pair\n         ab['Chinmay'] =\
    \ 'Chinmay@python.org'\n         ab\nOut[12]: {'Suresh': 'Suresh@Sureshch.com',\
    \ 'Ashok': 'Ashok@wall.org',\n          'Sumathi': 'Sumathi@ruby-lang.org', 'Chinmay':\
    \ 'Chinmay@python.org'}\n```\n\n```python\nIn [13]: mydict = {1: 2, 3: 4, 5: 6}\n\
    ```\n\n```python\nIn [14]: mydict\nOut[14]: {1: 2, 3: 4, 5: 6}\n```\n\n```python\n\
    In [15]: dict1 = {1: 'carrots', 'two': [1, 2, 3], 6.4: 2, 9: 8}\n```\n\n```python\n\
    In [16]: dict1\nOut[16]: {1: 'carrots', 'two': [1, 2, 3], 6.4: 2, 9: 8}\n```\n\
    \n```python\nIn [17]: len(dict1)\nOut[17]: 4\n```\n\n```python\nIn [18]: 'two'\
    \ in dict1  # check whether the value is present or not.\nOut[18]: True\n```\n\
    \n```python\nIn [19]: 'carrots' in dict1\nOut[19]: False\n```\n\n```python\nIn\
    \ [20]: dict1['two'] = 'radish'  # adding new value for key.\n\nIn [21]: dict1\n\
    Out[21]: {1: 'carrots', 'two': 'radish', 6.4: 2, 9: 8}\n\nIn [22]: words = {'house':\
    \ \"haus\", 'cat': \"katze\"}\n\nIn [23]: words[\"dog\"] = \"dogiee\"  # adding\
    \ new value to the dictionary variable.\n\nIn [24]: words\nOut[24]: {'house':\
    \ 'haus', 'cat': 'katze', 'dog': 'dogiee'}\n\nIn [25]: # copy the value to another\
    \ variable\n        w = words.copy()\n        # words[\"dog\"] = \"dogiee\"\n\
    \        print(w)\n        {'house': 'haus', 'cat': 'katze', 'dog': 'dogiee'}\n\
    \nIn [26]: # check the result\n        w\nOut[26]: {'house': 'haus', 'cat': 'katze',\
    \ 'dog': 'dogiee'}\n\nIn [27]: # clear the value\n        w.clear()\n        #\
    \ now check out the result\n        w\nOut[27]: {}\n\nIn [28]: words1 = {\"red\"\
    : \"rounge\", \"blue\": \"bleu\"}\n\nIn [29]: words2 = {\"red\": \"round\", \"\
    blue\": \"bluue\"}\n\nIn [30]: words1.update(words2)  # update the key values\n\
    \nIn [31]: words1\nOut[31]: {'red': 'round', 'blue': 'bluue'}\n\nIn [32]: # list\
    \ down the items like keys and data\n        words1.items()\nOut[32]: dict_items([('red',\
    \ 'round'), ('blue', 'bluue')])\n\nIn [33]: # list down only the keys\n      \
    \  words1.keys()\nOut[33]: dict_keys(['red', 'blue'])\n\nIn [34]: # list down\
    \ only the values\n        words1.values()\nOut[34]: dict_values(['round', 'bluue'])\n\
    \nIn [35]: # list the keys\n        for key in words1:\n            print(key)\n\
    \        red\n        blue\n```\n\n```python\nIn [36]: # combine keys respective\
    \ values from two dictionary variables.\n        A = {'a': 72, 'b': 17, 'c': 8}\n\
    \        B = {'a': 1308, 'b': 1, 'c': 12}\n        combinedDict = {}\n       \
    \ for key in A.keys():\n            if key in B.keys():\n                combinedDict[key]\
    \ = []\n                combinedDict[key].append(A[key])\n                combinedDict[key].append(B[key])\n\
    \nIn [37]: combinedDict\nOut[37]: {'a': [72, 1308], 'b': [17, 1], 'c': [8, 12]}\n\
    ```\n\n## 2.4.6 FUNCTIONS IN PYTHON\n\nTo perform a task that will be used throughout\
    \ the project, we code such a task as a function that will be reusable in the\
    \ future. Thus, functions provide better modularity for the project. In addition,\
    \ it becomes easy for programmers to manage code using functions. The function\
    \ can be initialized using the keyword “def” followed by the function name and\
    \ brackets; input data are positioned within these brackets, and docstring describes\
    \ the function's performance. It is an optional documentation string. Colon (:)\
    \ signifies the end of function header. Let’s take an example of writing a function\
    \ of adding two numbers.\n\n```python\ndef add(a, b):\n    sum = a + b\n    print('the\
    \ sum is ', sum)\n    return\n```\n\nWe can call the function using its name and\
    \ parameters:\n\n```python\nadd(1, 2)\n```\n\n### 2.4.6.1 Python Code Samples\

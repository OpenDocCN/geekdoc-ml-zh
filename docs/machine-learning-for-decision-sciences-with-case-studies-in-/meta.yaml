  md: '# 6.6.8 SVM Regression


    Let us extend SVM to regression problem, given the training data $\{(X_1, y_1)
    \dots (X_n, y_n)\}$ $X_i \in R^m$, $y_i \in R$ the idea is to learn the best optimal
    function to predict $y$ given $X$. This regression problem can be parameterized
    by weight vector $w$ as shown below in Equation 6.71,


    $$g(X, W) = w_1 \emptyset_1(x) + \dots + w_{m''} \emptyset_{m''}(x) + b = w^T
    \emptyset(x) + b \quad (6.71)$$


    where $\emptyset_i : R^m \rightarrow R$. If we choose $\emptyset_i(X) = x_i$,
    then it is a linear regression model. By specifying $Z = \emptyset(X) \in R^{m''}$,
    we are learning a linear model in a newly transformed feature space. Kernel functions
    can be used instead of explicitly specifying the dot product.


    Loss function $L$ in regression problem is to minimize $W$ and is given in Equation
    6.72,


    $$\sum_i L(y_{i,g}(X_i, W)) \quad (6.72)$$


    A special loss function called $\varepsilon$ insensitive loss is used, which allows
    us to use kernel trick in SVM regression as given in Equation 6.42.


    $$L_{\varepsilon}(y_i, g(X_i, W)) = \begin{cases} 0 & \text{If } |y_i - g(X_i,
    W)| < \varepsilon \ |y_i - g(X_i, W)| - \varepsilon & \text{Otherwise} \end{cases}
    \quad (6.73)$$


    where $\varepsilon$ is the parameter of the loss function, and if the prediction
    is within $\varepsilon$ of true value, then there is no loss. And choose absolute
    error value instead of a square of the error to achieve high robustness.


    Hence, empirical risk minimization under $\varepsilon$ insensitive loss would
    minimize


    $$\sum_{i=1}^n \max(|y_i - \emptyset(X_i)^T W - b| - \varepsilon, o) \quad (6.74)$$


    The optimization problem for SVM regression is to find $W$, $b$, $\varepsilon_i$,
    $\varepsilon_i''$


    $$\text{Minimize } \frac{1}{2} W^T W + C \left( \sum_{i=1}^n \varepsilon_i + \sum_{i=1}^n
    \varepsilon_i'' \right) \quad (6.75)$$


    $$\text{Subject to } y_i - W^T \emptyset(X_i) - b \leq \varepsilon + \varepsilon_i,
    \quad i = 1, \dots, n$$

    $$W^T \emptyset(X_i) + b - y_i \leq \varepsilon + \varepsilon_i'', \quad i = 1,
    \dots, n$$

    $$\varepsilon_i \geq 0, \quad \varepsilon_i'' \geq 0, \quad i = 1, \dots, n$$


    To construct a dual problem for SVM regression, introduce non-negative multipliers
    $\alpha_i$ and $\alpha_i''$ as follows


    $$\max_{\alpha, \alpha''} \sum_{i=1}^n y_i (\alpha_i - \alpha_i'') - \varepsilon
    \sum_{i=1}^n (\alpha_i + \alpha_i'') - \frac{1}{2} \sum_{i,j} (\alpha_i - \alpha_i'')(\alpha_j
    - \alpha_j'') \emptyset(X_i)^T \emptyset(X_j)^T \quad (6.76)$$'

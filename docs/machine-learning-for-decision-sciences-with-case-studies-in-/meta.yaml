    ## 6.6.5 核技巧


    要探索核技巧机制，我们必须理解线性可分和非线性可分背后的数学原理。考虑一个具有类别标签 0 和 1 的二元分类问题。线性可分的情况是指一条直线可以将两个类别分开，而非线性可分的情况是指需要多条直线才能将两个类别分开。逻辑函数如
    AND 函数和 OR 函数是线性可分的，而 XOR 函数是非线性可分的，如图 6.99 和 6.100 所示。本章第 6.6.10 节提供了理解该概念的求解示例。


    ## 6.6.6 多项式核


    SVM 中核函数的概念在公式 6.53 中给出。


    $$g(x) = w^T \emptyset(x) + b = \sum_{i \in SV} \alpha_i \emptyset(x_j)^T \emptyset(x)
    + b$$


    核函数是特征空间中两个特征向量的点积，如公式 6.54 所示。


    $$k(x_a, x_b) = \emptyset(x_a) \cdot \emptyset(x_b)$$



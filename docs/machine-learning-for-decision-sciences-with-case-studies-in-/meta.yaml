  md: '# # 6 Supervised Learning Classification


    # ## LEARNING OBJECTIVES


    At the end of this chapter, the reader will be able to


    +   - Understand the difference between supervised learning algorithms used for
    regression and classification

    - Comprehend the various supervised learning algorithms related to classification
    problems

    - Know the basic mathematical concepts involved in logistic regression, decision
    trees, random forests, and support vector machines

    - Solve examples based on the algorithms covered in this chapter

    - Implement the supervised learning algorithms using Python for practical problems


    # ## 6.1 INTRODUCTION


    The idea of the classification problem is to classify the outcome variable into
    one or more categories. Then, the supervised learning method learns from the labeled
    data. Logistic regression, decision tree, and support vector machine (SVM) are
    the various supervised learning classification algorithms widely used. In this
    chapter, a detailed description of these algorithms, their mathematical modeling,
    merits and demerits, solved examples, and real-world applications are provided
    with step-by-step implementation in Python.


    # ## 6.2 USE CASES OF CLASSIFICATION


    Classification techniques are used for predictive analysis, image classification,
    and text analysis. In addition, many real-world applications such as handwritten
    character recognition, self-driving cars, remote sensing, marketing, and biomedical
    analysis utilize classification algorithm. As we walk through this chapter, several
    real-world examples are illustrated in the context of the classification algorithm.


    # ## 6.3 LOGISTIC REGRESSION


    Logistic regression is a supervised classification technique widely used to solve
    many real-world problems by data scientists. For example, various useful insights
    about big data can be obtained using logistic regression. Logistic regression
    is a simpler and powerful algorithm for both binary classification and multiclass
    classification problems. Some examples of binary classification problems are detecting
    spam email or not, whether an online transaction is fraudulent or not, and whether
    the examined tumor is malignant. In all of these above classification problems,
    we are trying to predict the output label y is either 0 (negative class) or 1
    (positive class).


    $$y \in \{0,1\} \begin{cases} 0 & \text{Negative class (e.g., not a fraudulent
    transaction)} \ 1 & \text{Positive class (e.g., fraudulent transaction)} \end{cases}$$


    Logistic regression is not a regression problem, as the name implies. It is different
    from linear regression, as given in Table 6.1.'

    Examples of the nominal variable are


    Occupational status $\begin{cases} \text{Self employed} - 0 \ \text{Government
    employee} - 2 \ \text{Private employee} - 3 \ \text{Unemployed} - 1 \end{cases}$


    For instance, let us consider a nominal variable called the type of a target variable.
    We aim to classify the target variable based on the input variables age-group
    and smoking.


    Target dependent variable $Y = \text{Cancer type} \begin{cases} \text{Lung cancer}
    - 0, \ \text{Mouth cancer} - 1 \ \text{other} - 2 \end{cases}$


    Independent variable $x_1 = \text{Age group} \begin{cases} 0 & \text{if } \le
    50 \ 1 & \text{if } > 50 \end{cases}$


    Independent variable $x_2 = \text{Smoking} \begin{cases} 0 - \text{Non smoker}
    \ 1 - \text{Smoker} \end{cases}$


    To perform multiclass logistic regression, let us assume any category as a reference
    and then separately compare with the other two categories. For example, let us
    consider lung cancer {0} as a reference category and first compare mouth cancer
    {1} versus lung cancer {0} and later other {2} versus lung cancer {0}. Then, the
    odds ratio (OR) needs to be calculated for each separate comparison.


    $\text{OR}_{1\text{vs}0} = \frac{P(Y=1)}{P(Y=0)}$


    $\text{OR}_{2\text{vs}0} = \frac{P(Y=2)}{P(Y=0)}$


    The logit expression for two comparisons is given as


    $\ln\left(\frac{P(Y=1)}{P(Y=0)}\right)$ and $\ln\left(\frac{P(Y=2)}{P(Y=0)}\right)$


    The logistic function for category mouth cancer {1} versus lung cancer {0} is


    $\ln\left(\frac{P(Y=1|x_1, x_2)}{P(Y=0|x_1, x_2)}\right) = \frac{1}{1+e^{-(\beta_0+\beta_1
    \text{ age group}+\beta_2 \text{ smoking})}}$


    The logistic function for category other {2} versus carcinoma {0} is


    $\ln\left(\frac{P(Y=2|x_1, x_2)}{P(Y=0|x_1, x_2)}\right) = \frac{1}{1+e^{-(\beta_0+\beta_1
    \text{ age group}+\beta_2 \text{ smoking})}}$'

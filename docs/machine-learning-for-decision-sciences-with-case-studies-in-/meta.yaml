- md: '## 5.3.2.1 Regression Predictive Modeling


    Regression predictive modeling is the process of approximating a mapping function
    (f) from input variables (X) to a continuous output variable (Y). A continuous
    output variable is a real value, such as an integer or floating-point value. These
    are often quantities, such as amounts and sizes.


    A regression problem requires the prediction of a continuous value, such as predicting
    the amount of rainfall. Real values or discrete input variables can be used for
    regression analysis. A problem with a single input variable is simple regression,
    and a problem with multiple input variables is called a multivariate regression
    problem. Time series forecasting problem is a type of regression problem with
    an input ordered time value.


    Because a predictive regression model predicts a quantity, the model''s performance
    must be calculated using error in predictions. There are many ways to estimate
    the performance of the predictive regression model. The most widely used is to
    calculate the root mean squared error (RMSE).


    Sample RMSE calculation for regression predictive model which made two predictions,
    one of 1.5 where the expected value is 1.0 and another of 3.3 and the expected
    value is 3.0, then the RMSE would be:


    RMSE = sqrt(average(error²)) (5.1)


    RMSE = sqrt(((1.0 – 1.5)² + (3.0 – 3.3)²)/2) = 0.412


    ## 5.3.3 Classification vs. Regression


    Based on the target value, classification problems can be differentiated from
    regression, as shown in Figure 5.5. Both classification and regression problems
    can be learned using some algorithms with slight changes, such as decision trees
    and artificial neural networks. Linear regression is a regression predictive modeling
    algorithm, whereas logistic regression is a binary classification algorithm. Classification
    algorithm can be evaluated using accuracy, whereas regression algorithm can be
    estimated using RMSE.


    ## 5.3.4 CONVERSION BETWEEN CLASSIFICATION AND REGRESSION PROBLEMS


    In certain cases, a regression problem can be used to predict discrete values.
    This can be achieved using the discretization technique that converts continuous
    values between $0 and $1000 into two discrete class labels: class 1 (range from
    $0 to $499) and class 2 (range from $500 to $1000).


    Similarly, a classification problem can be used to predict a numerical value.
    For example, the target output label can be converted into a continuous numerical
    range.

    If there is a natural ordinal relationship, then the conversion from classification
    problem to regression learns well, or it may result in poor performance.


    ## 5.4 LINEAR REGRESSION


    Regression analysis is an extensively used forecasting technique of supervised
    learning algorithms. Linear regression is the simplest form of regression analysis
    to analyze the trend behind the input data points. In this section, the working
    of regression and its types with real-time examples are explained.

    Linear regression is a supervised learning technique in which we have a collection
    of training samples with a labeled output. It is a simple statistical technique
    and an interpretable method and is very widely used in prediction analysis. The
    main advantage of linear regression is to forecast the trend more feasibly. Linear
    regression can be used to predict the continuous target variable given the value
    of input variables. Regression analysis is used for analyzing the relationship
    among data to predict the continuous output variable. In other words, linear regression
    identifies the relationship between dependent and independent variables via a
    sloped straight line. The sloped straight line is known as the regression line
    or best-fit line. The representation of the regression model is given in Figure
    5.6.


    To understand the math behind linear regression, let’s see a simple example. Given
    a set of $n$ data, samples can be represented as $D = \{D_1, D_2, \dots, D_n\}$
    as shown in Figure 5.7. The single data point is represented as $D_i = \langle
    x_i, y_i \rangle$, where $x_i = (x_{i,1}, x_{i,2}, \dots, x_{i,d})$ is an input
    vector of size $d$ and $y_i$ is the desired output. And the idea is to find the
    best linear relationship function $x_i \sim f(x_i)$ such that $y_i \sim f(x_i)$
    for all $i=1,2,\dots,n$.


    The regression problem is defined as given a sample instance $x$ and $y$ we have
    to learn a function such that


    $fn : x \rightarrow y$


    $f(x) = w_0 + w_1x_1 + w_2x_2 + \dots + w_dx_d = w_0 + \sum_{i=1}^{d} w_ix_i$
    (5.2)


    where $w_0, w_1, \dots, w_d$ are the weight parameters.


    Definition of linear regression: Given a training dataset comprising $N$ observations
    $\{x_n\}$ where $n=1, 2, \dots, N$ and their corresponding target values are $\{t_n\}$.
    The goal is to predict the value of $t$ for a new value of $x$.


    ### 5.4.1 Types of Linear Regression


    The variants of linear regression are simple and multiple linear regressions further
    classified as linear and non-linear, as shown in Figure 5.8. For simple regression,
    the input or independent variable is one, whereas for multiple regression, it
    is two or more.


    ### 5.4.1.1 Simple Linear Regression


    The simple linear regression consists of only one input or independent variable.
    The form of the simple linear regression model is given in Equation 5.3:


    $$y = \beta_0 + \beta_1 \cdot x$$ (5.3)


    where $y$ is the independent output variable, $x$ is the dependent input variable,
    $\beta_0$ is bias, and $\beta_1$ is the slope of the regression line.


    There are three possible cases.


    - **Case 1:** $\beta_1 < 0$, which indicates the variable $x$ has a negative impact
    on $y$. In this case, if $x$ increases, $y$ decreases, and vice versa.

    - **Case 2:** $\beta_1 = 0$, which implies the variable $x$ has no impact on $y$.

    - **Case 3:** $\beta_1 > 0$, which indicates the variable $x$ has a positive impact
    on $y$. In this case, if $x$ increases, $y$ increases, and vice versa.


    To understand the linear regression model, let us see a simple linear model. For
    instance, if we want to predict the peak electricity demand of a city based on
    the high temperature recorded, a simple linear model can be constructed for predicting
    peak demand for tomorrow.


    $$y_i = \theta_1 \cdot x_i + \theta_2$$ (5.4)


    i.e., Predicted Peak Demand=$\theta_1$. high temperature+$\theta_2$

    where

    $y_i$ is the output or independent variable,

    $x_i$ is the input or dependent variable,

    $\theta_1 = 0.046$ and $\theta_2 = -1.46$ are model parameters.


    For instance, if the high temperature recorded is 80°F, then the predicted output
    is


    $$y_i = \theta_1 \cdot x_i + \theta_2$$


    $$y_i = 0.046 * 80 - 1.46$$


    Then, the predicted output of peak demand is 2.19 GW. There is a positive correlation
    between temperature and peak demand (Figure 5.9).


    ### 5.4.1.2 Multiple Linear Regression


    The multiple linear regression consists of multiple input or independent variables.
    For example, let’s create a model for predicting the price of wine based on the
    age of the wine. Here, the dependent variable is the age of the wine, and the
    independent variable is the price of wine (Figure 5.10).'

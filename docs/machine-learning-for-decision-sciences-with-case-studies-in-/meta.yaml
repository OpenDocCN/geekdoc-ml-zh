    # 5.3.2.1 Regression Predictive Modeling


    Regression predictive modeling is the process of approximating a mapping function
    (f) from input variables (X) to a continuous output variable (Y). A continuous
    output variable is a real value, such as an integer or floating-point value. These
    are often quantities, such as amounts and sizes.


    A regression problem requires the prediction of a continuous value, such as predicting
    the amount of rainfall. Real values or discrete input variables can be used for
    regression analysis. A problem with a single input variable is simple regression,
    and a problem with multiple input variables is called a multivariate regression
    problem. Time series forecasting problem is a type of regression problem with
    an input ordered time value.


    Because a predictive regression model predicts a quantity, the model''s performance
    must be calculated using error in predictions. There are many ways to estimate
    the performance of the predictive regression model. The most widely used is to
    calculate the root mean squared error (RMSE).


    Sample RMSE calculation for regression predictive model which made two predictions,
    one of 1.5 where the expected value is 1.0 and another of 3.3 and the expected
    value is 3.0, then the RMSE would be:


    RMSE = sqrt(average(error²)) (5.1)


    RMSE = sqrt(((1.0 – 1.5)² + (3.0 – 3.3)²)/2) = 0.412


    # 5.3.3 Classification vs. Regression


    Based on the target value, classification problems can be differentiated from
    regression, as shown in Figure 5.5. Both classification and regression problems
    can be learned using some algorithms with slight changes, such as decision trees
    and artificial neural networks. Linear regression is a regression predictive modeling
    algorithm, whereas logistic regression is a binary classification algorithm. Classification
    algorithm can be evaluated using accuracy, whereas regression algorithm can be
    estimated using RMSE.'

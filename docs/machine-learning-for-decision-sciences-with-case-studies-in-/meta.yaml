    # 2.4.3.3 Loop Control Statements


    To change the sequence of executing a code, Python provides multiple control statements.
    Following are the loop control statements:


    **Break statement:** To exit from a loop, break statements are used. Let’s take
    the example of 20 enrollment numbers, and the user wants to print only ten enrollment
    numbers.


    ```

    x=1;

    While x< = 20:

    Ifx ==10:

    break

    Print (x)

    x++;

    ```


    > As soon as loop reaches the 10th enrollment the beak statement will exit the
    loop and will display 10 enrollments only


    **Continue statement:** It is similar to the break statement, it exits the loop,
    but the loop itself is not exited. Let’s consider the same previous example and
    replace the break with continue.


    ```

    x=1;

    While x < = 20:

    if x ==10:

    continue

    Print (x)

    x++;

    ```


    > As soon as loop reaches the 10th enrollment the continue statement will exit
    the loop and will display all the enrollment from 1 till 20 except the enrollment
    10


    **Pass statement:** It is also called a null operator. Nothing happens when it
    is executed. Consider a project that two programmers complete; one falls sick
    and cannot come on a specific day. The problem is that another programmer cannot
    hold the work. In this case, all the functions that the sick programmer wrote
    will be left empty using the pass statement. Let’s consider the same previous
    example with a pass statement.


    ```

    x=1;

    While x < = 20:

    if x ==10:

    pass

    print "10 not included"

    Print (x)

    x++;

    ```


    > As soon as loop reaches the 10th enrollment the pass statement will work and
    display all the enrollment from 1 till 20 except the enrollment 10 as we had passed
    it and will print 10 not included with it



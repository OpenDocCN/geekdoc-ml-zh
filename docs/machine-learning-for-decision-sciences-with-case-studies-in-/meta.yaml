    \ 1\end{array}\right)\right\}$$


    The points are nonlinearly separable, as shown in Figure 6.118. Therefore, we
    must use nonlinear SVM; i.e., the mapping function $\emptyset$ is a nonlinear
    mapping from input space into some feature space. The mapping is given as


    $$\emptyset\left(\begin{array}{l}x_{1} \ x_{2}\end{array}\right)=\left\{\begin{array}{l}\left(\begin{array}{l}4-x_{2}+\left|x_{1}-x_{2}\right|

    Even though typecasting is a handy tool in data pre-processing, we need to have
    few cautions in mind when using it. For example, when the Python interpreter does
    the implicit conversion, the loss of data is prevented automatically by the Python.
    But when there is an explicit conversion, there could be data loss depending on
    the data types that might impact processes requiring data accuracy.


    When complaining about the multiple despaired datasets, we need to employ joins.
    For example, there are datasets with one master and transaction data; to combine
    these datasets (tables), we need to use joins. The different types of joins are
    illustrated in Figure 3.26. We can use the Python Pandas library to use inner
    joins, full joins, left joins, and right joins. Inner joins get the results set
    that are common in both tables. For example, you have two tables from different
    sources with the customer data, and the inner join will bring only the common
    data available in both tables. The full join or outer join returns all records
    when there is a match in dataset1 and dataset2. Left join returns all records
    from the left table (dataset1) and the matched records from the right table (dataset2).



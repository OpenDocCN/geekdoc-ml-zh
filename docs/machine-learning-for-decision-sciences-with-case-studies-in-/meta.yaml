    ## SUMMARY


    This chapter introduced the concepts of supervised learning and the types of supervised
    learning. A detailed analysis of supervised learning for regression is covered
    in this chapter. The simple and multiple linear regression methods with solved
    examples are illustrated to depict the procedure to find the optimal regression
    line clearly. In addition, the various error functions to converge the error between
    actual and predicted values are also shown clearly. Various real-world applications
    such as sales forecasting, medical prediction, and wind speed prediction are exemplified.
    Finally, simple and multiple linear regression implementation using Python is
    comprehensively demonstrated, starting from handling data to feature scaling,
    thus determining the output.



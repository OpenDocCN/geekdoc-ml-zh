    # 5.4.1.1 Simple Linear Regression


    The simple linear regression consists of only one input or independent variable.
    The form of the simple linear regression model is given in Equation 5.3:


    $$y = \beta_0 + \beta_1 \cdot x$$ (5.3)


    where $y$ is the independent output variable, $x$ is the dependent input variable,
    $\beta_0$ is bias, and $\beta_1$ is the slope of the regression line.


    There are three possible cases.


    +   - **Case 1:** $\beta_1 < 0$, which indicates the variable $x$ has a negative
    impact on $y$. In this case, if $x$ increases, $y$ decreases, and vice versa.

    - **Case 2:** $\beta_1 = 0$, which implies the variable $x$ has no impact on $y$.

    - **Case 3:** $\beta_1 > 0$, which indicates the variable $x$ has a positive impact
    on $y$. In this case, if $x$ increases, $y$ increases, and vice versa.


    To understand the linear regression model, let us see a simple linear model. For
    instance, if we want to predict the peak electricity demand of a city based on
    the high temperature recorded, a simple linear model can be constructed for predicting
    peak demand for tomorrow.


    $$y_i = \theta_1 \cdot x_i + \theta_2$$ (5.4)


    i.e., Predicted Peak Demand=$\theta_1$. high temperature+$\theta_2$

    where

    $y_i$ is the output or independent variable,

    $x_i$ is the input or dependent variable,

    $\theta_1 = 0.046$ and $\theta_2 = -1.46$ are model parameters.


    For instance, if the high temperature recorded is 80°F, then the predicted output
    is


    $$y_i = \theta_1 \cdot x_i + \theta_2$$


    $$y_i = 0.046 * 80 - 1.46$$'

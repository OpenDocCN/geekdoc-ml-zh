    \n# 6.6 SUPPORT VECTOR MACHINES\n\nML aims to identify the pattern behind the\
    \ data and build systems that learn from the experience gained. SVM gained research\
    \ interest as it utilizes optimization techniques and achieves higher performance.\
    \ SVM differs from other classical ML techniques since it makes use of statistical\
    \ ideas. While learning a model in ML, we generally attempt to minimize the errors\
    \ in the training phase, leading to the overfitting of data. SVM has a clever\
    \ way to tackle the overfitting problem with the help of maximizing margin techniques.\
    \ This chapter presents the basic ideas of SVMs and kernel functions. SVM is the\
    \ most effective kernel-based supervised ML classifier. This is a sophisticated\
    \ classification technique that handles both linear and nonlinear data. Kernel\
    \ machines have many useful properties to analyze nonlinear data. The variants\
    \ of SVM are support vector regression (SVR), which can be used for solving regression\
    \ analysis. SVM is a robust learning method as a piece of evidence from its usage\
    \ in diverse fields of engineering. It has been applied for real-world applications,\
    \ including handwritten OCR, face recognition, speaker identification, natural\
    \ language processing, text mining, drug design, fault diagnosis in machines,\
    \ damage assessment of bridges, and pattern recognition. The only prerequisite\
    \ for understanding SVM is constrained optimization based on the Lagrangian multiplier\
    \ method. In this section, working of SVM, underlying statistical concept, kernel\
    \ tricks, linear and nonlinear SVM classifier, finding optimal hyperplane, maximum\
    \ margin classifier, the hard and soft margin of SVM, variants of SVM, pros and\
    \ cons of SVM, SVM regression analysis, and applications are discussed in detail.\n\
    \n## 6.6.1 Geometric Intuition\n\nSVM is a supervised learning algorithm in which\
    \ the learning model is provided with the set of inputs and their associated outputs\
    \ or labels. SVMs are used in classification problems. The classification problem\
    \ can be viewed as the task of separating classes in feature space. To understand\
    \ the mystery of SVM, a simple binary classification problem with two classes\
    \ is considered as an example, as shown in Figure 6.85. It consists of a decision\
    \ boundary or hyperplane that separates the two classes. The goal of SVM is to\
    \ choose an optimized hyperplane for separating the classes. For example, in Figure\
    \ 6.85, many possible lines separate the two classes, and the dark shaded thick\
    \ line is the optimal hyperplane among all others.\n\nThe support vectors are\
    \ the essential data points that are closer to the decision boundary. The *main\
    \ objective of SVM* is to find an optimal hyperplane classifier for this problem.\
    \ The optimal hyperplane is to identify the maximum distance between the support\
    \ vectors and the hyperplane.\n\n- a. the distance to the closest negative sample\
    \ $d_2$ is lesser than the distance to the closest positive sample $d_1$. In contrast\
    \ to Figure 6.86,\n- b. the optimal hyperplane was found where the distance to\
    \ the closest negative sample $d_2$ is equal to the distance to the closest positive\
    \ sample $d_1$.\n\n![](img/7fbca4852dbe91c6cea209148871a1b3_329_0.png)\n\nFIGURE\
    \ 6.85 Identifying an optimal hyperplane."

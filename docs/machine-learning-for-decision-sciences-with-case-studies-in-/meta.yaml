    # 2.4.5.5 Stacks and Queues


    Consider a real-world example of a stack – a pile of books or a stack of plates.
    We will be able to place or remove a book from the top of the stack only. This
    implies that the stack operations can be performed from one end only, the top
    of the stack. Such a data structure is commonly referred to as a Last-In First-Out
    data structure. The element placed first will be accessed last, and the element
    placed last will be accessed first. The process of inserting an element into the
    stack is called PUSH operation, and removing an element from the stack is called
    POP operation.


    In data structures, stacks can be implemented using arrays and linked lists. The
    size of the stack can either be static or dynamic (stack grows).


    The primary operations of the stack involve push and pop, as illustrated in Figure
    2.7. To check the efficiency of the stack, the user has to keep track of the data
    on the stack. To track the stack, functions such as peek(), isFull(), and isEmpty()
    are available. Peek() is used to access the element on top of the stack without
    getting it removed, while isFull() is used to check whether the stack is full
    and isEmpty() is used to check whether the stack is empty.


    The series of steps involved in the PUSH operation is illustrated through a flowchart
    in Figure 2.8. The first step to initialize the PUSH operation is to check whether
    the stack is full. If the stack is empty, the PUSH operation will progress; otherwise,
    exit the PUSH operation with an error. The stack pointer (top of stack) increments
    and points to the next available space in memory to insert data. The data element
    is added to the location, and a success message is returned.


    The steps involved in the POP operation are illustrated with a flowchart, as shown
    in Figure 2.9. In the POP operation, data are accessed from the top of the stack,
    and the top of the stack is decremented to the next lower address. Finally, the
    memory location is deallocated.



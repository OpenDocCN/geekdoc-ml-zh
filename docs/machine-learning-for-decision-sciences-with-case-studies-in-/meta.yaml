    ### 6.5.3 PSEUDOCODE FOR RANDOM FOREST


    - **Step 1:** Randomly select $K$ features from total $M$ features where $k$ is
    less than $M$

    - **Step 2:** Among $K$ features, calculate the node “d” using the best split
    node

    - **Step 3:** Split the node into daughter node using the best split


    ![](img/7fbca4852dbe91c6cea209148871a1b3_309_0.png)


    **FIGURE 6.71** Creation of decision tree based on the salary.


    - **Step 4:** Repeat 1–3 steps until the “i” number of nodes has been reached.

    - **Step 5:** Building forest by repeating steps 1–4 for “n” times to create “n”
    of trees.


    Let us assume a dataset that has *M* features. A *K* feature is selected from
    the dataset by using the sampling method. The selected *K* features should be
    less than *M* features in the dataset. The decision tree is constructed by using
    the *K* features. By using split node, first, determine the root node and daughter
    node. Then, the tree is constructed by using the split node concept until it reaches
    the leaf node. Similarly, construct another decision tree in the RF.


    ### 6.5.3.1 Pseudocode for Prediction in Random Forest


    - **Step 1:** Take the test features and use the rules of each randomly created
    decision tree to predict the outcome and store the predicted outcome

    - **Step 2:** Calculate the votes for each predicted target

    - **Step 3:** Consider the high voted predicted target as the final prediction
    from the RF algorithm.


    Input is given to all the decision trees of the RF. Then, calculate the number
    of votes given to each class. The class having majority voting is selected as
    the predicted class of the model.


    ### 6.5.4 Regression Using Random Forest


    We can use the RF for regression also. Consider sample *X*. Sample *x* is divided
    into subsample 1, sample 2, sample 3, and sample. Decision tree 1, decision tree
    2, decision tree 3, and decision tree *m* are constructed from the samples. Each
    tree can be constructed from any of the decision tree algorithms like CART and
    ID3. Each decision tree will produce a value. The output of each decision tree
    is considered in the regression process. In the classification process, the voting
    mechanisms are used. The average output of each tree is taken to compute the final
    class, as represented in Figure 6.72.


    ![](img/7fbca4852dbe91c6cea209148871a1b3_310_0.png)



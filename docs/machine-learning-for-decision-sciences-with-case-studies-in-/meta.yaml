    # 9.4 USE CASE 4–PREDICTING THE COST OF INSURANCE CLAIMS FOR A PROPERTY AND CAUSALTY
    (P&C) INSURANCE COMPANY


    # 9.4.1 Background


    Property and Casualty Insurance (a.k.a P&C insurance) are types of coverage that
    help protect the insurer and the property they own. Property insurance helps cover
    the thing the insurer owns, like a home or a car. On the other hand, casualty
    insurance refers to the policy that includes liability coverage to help protect
    the insurer if they are found legally responsible for an accident that causes
    injuries to another person or damage to their person''s belongings. Property and
    Casualty Insurance are typically packaged together into one policy. A clear understanding
    of a given claim''s future cost, or severity, is fundamental to an insurance company
    and would enable it to price its plans more effectively. Additionally, knowing
    the perspective of different attributes would allow the company to evaluate potential
    customers more efficiently.



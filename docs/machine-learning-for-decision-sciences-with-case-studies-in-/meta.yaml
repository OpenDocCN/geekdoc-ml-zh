- md: '## 7.1 特征工程


    特征工程在机器学习工作流中的位置如图7.1所示。


    ![](img/7fbca4852dbe91c6cea209148871a1b3_374_0.png)


    图7.1 特征工程在机器学习工作流中的位置。


    如果特征不够，模型将无法完成最终任务。如果特征过多或许多特征无效，模型将更昂贵且更难训练。训练过程中的某些问题可能会影响模型的性能。


    特征和模型位于原始数据和期望的洞察之间，如图7.1所示。在机器学习工作流中，不仅要选择模型，还要选择特征。这是一把双刃剑，一个选择会影响另一个。好的特征使下一步建模更容易，新兴模型能够完成你正在寻找的任务。负面的特征可能需要更复杂的模型才能达到相同的性能水平。在整本书中，我们将讨论不同的特征，并讨论不同类型数据和模型的优缺点。


    了解特征工程在机器学习设备流程中的位置，突出了它并非独立的事实。


    它是一个与数据选择和模型测试相关的重复过程，一遍又一遍，直到我们用完时间。


    这个过程可能如下所示：


    1.  **头脑风暴能力：** 深入问题，查看更多细节，学习其他问题的特征工程，看看你能借鉴什么。

    2.  **设计能力：** 根据问题，可以使用自动特征提取、文本特征创建以及两者的组合。

    3.  **选择能力：** 使用关键特征变异和特征选择方法，为你的工作模型准备一个或多个视图。

    4.  **检查模型：** 使用选定的特征在不可见数据上评估模型准确性。


    需要一个明确定义的问题来知道何时停止这个重复过程，然后继续尝试其他模型、其他模型配置、模型组合等。还需要设计一个经过深思熟虑的测试设备来衡量模型在不可见数据上的潜力。这将是特征工程过程获得的唯一衡量标准。


    ## 7.2 特征选择


    特征选择策略已消除无用特征，以降低新兴模型的复杂性。最终目标是一个值得骄傲的模型，它计算快速，对推测几乎没有或没有损害。为了达到这样的模型，一些特征选择技术需要不止一次模型训练。换句话说，特征选择不是为了减少训练时间——事实上，一些策略增加了总训练时间——而是为了减少模型安装时间。简而言之，特征选择技术分为三类：预处理过滤方法，用于移除那些可能适用于模型的特征。例如，可以结合每个元素与答案灵活性之间的关系或交互知识，然后过滤掉低于阈值的特征。过滤技术比下面描述的包装技术便宜得多，但它们不考虑所使用的模型。因此，它们可能无法选择适合模型的特征。因此，最好在保存之前做出选择，以避免在进入训练步骤之前不必要地移除有用的特征。


    ### 7.2.1 包装方法


    包装方法成本高昂，但尝试特征子集，这意味着它不会意外地剪掉那些不仅单独有用而且组合在一起时也有用的特征。包装方法将模型视为一个黑盒，该黑盒提供所提议特征子集的质量结果。有多种不同的方法可以过滤集合，下面将进行描述。


    包装器使用搜索策略来搜索可能的特征子集空间，并通过ML算法上的性能质量来评估每个子集。实际上，任何搜索策略和算法的组合都可以用作包装器。其特点如下：


    -   使用ML模型对特征子集进行评分

    -   在每个子集上训练一个新模型

    -   计算成本非常高

    -   通常为给定的ML算法提供性能最佳的子集，但可能不适用于另一个算法

    -   需要任意定义的停止标准


    最常见的**搜索策略**组是顺序搜索，包括前向选择、后向消除和穷举搜索。随机化搜索是另一个流行的选择，包括进化计算算法，如遗传算法和模拟退火。


    包装器中的另一个关键元素是**停止标准**。搜索过程基于三个标准停止：


    -   性能提升

    -   性能下降

    -   达到预定义的特征数量


    #### 7.2.1.1 前向选择


    前向特征选择首先单独评估所有特征，并根据预设的评估标准选择生成最佳性能算法的特征。然后，算法评估所选特征的所有可能组合，并根据相同的预设标准选择产生最佳性能算法的配对。这个选择过程被称为贪婪的，因为它评估所有可能的单个、双个、三个和特征组合。因此，它的计算成本相当高，有时，如果特征空间很大，甚至不可行。


    #### 7.2.1.2 后向消除


    后向特征选择首先使用所有特征拟合一个模型。然后，它移除一个特征。接下来，它将移除那个产生最高性能算法（统计上最不显著）的特征，基于某个评估标准。第二步将移除第二个特征，即再次产生最佳性能算法的那个。它继续一个接一个地移除特征，直到满足某个标准。


    #### 7.2.1.3 穷举特征选择


    在穷举特征选择中，通过优化特定机器学习算法的指定性能指标，从所有可能的特征子集中选择最佳特征子集。例如，如果分类器是逻辑回归，数据集包含**四个**特征，算法将评估所有特征组合如下：


    -   一个特征的所有可能组合

    -   两个特征的所有可能组合

    -   三个特征的所有可能组合

    -   所有四个特征


    并选择使逻辑回归分类器性能最佳（例如，分类准确率）的组合。这种穷举搜索的计算成本非常高。实际上，由于这种计算成本，它很少被使用。


    ### 7.2.2 嵌入方法


    这些方法使特征选择成为模型训练过程的一部分。例如，决策树自然地进行特征选择，因为它在每个训练步骤中选择一个树划分元素。另一个例子是标准化器1，它可以添加到任何特定模型的训练目的中。ℓ1趋势鼓励使用较少特征而不是许多特征的模型，因此它也被称为模型上的稀疏性限制。包含的方法将特征选择作为模型训练过程的一部分。它们不如包装方法强大，但也不那么昂贵。与过滤器相比，嵌入方法选择特定于模型的特征。从这个意义上说，嵌入方法在计算成本和结果质量之间取得了平衡。这些步骤可以总结为解决特征选择问题的清单：


    1.  你是否对问题领域有任何了解？如果是，创建一个增强的“临时”特征集。

    2.  特征是否合适？如果不是，对它们进行归一化。

    3.  你是否怀疑特征之间的依赖性？如果是，通过制定特征乘积或连接特征来扩展特征集。

    4.  输入变量是否需要修剪？如果不是，创建析取特征或特征的加权和。

    5.  特征是否需要单独评估？如果是，应用变量排名方法；否则，尝试获得基线结果。

    6.  你是否有预测器？如果没有，停止。

    7.  你是否怀疑数据是脏的？如果是，根据步骤5中获得的顶级变量作为代表性，识别异常值示例；验证或拒绝它们。

    8.  你是否有首先尝试的想法？如果没有，应用线性预测器。然后，利用前向选择方法，以“探测”方法作为终止条件，或应用0-范数嵌入方法。作为评估，根据步骤5的排名结果，使用特征的递增子集创建一系列相同性质的预测器。是否可以用更小的子集匹配或改进性能？如果是，使用该子集的非线性预测器。

    9.  你是否有新的想法、时间、计算资源和足够的示例？如果是，比较几种特征选择方法，包括你的新想法、相关系数、后向选择和嵌入方法。接下来，应用线性和非线性预测器。最后，通过模型选择选择最佳方法。

    10. 是否需要稳定的解决方案来提高性能和理解？如果是，对数据进行子采样，并为几个“引导程序”重新进行分析。'

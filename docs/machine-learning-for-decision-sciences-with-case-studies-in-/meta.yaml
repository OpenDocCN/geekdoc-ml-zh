    ## 6.5.6 FEATURES AND PROPERTIES OF RANDOM FOREST


    ### 6.5.6.1 Features


    - It is the most accurate algorithm currently available, and it works quickly
    on huge datasets.

    - It can handle tens of thousands of input variables without deleting any of them.

    - It calculates the importance of several variables in the classification.

    - As the forest grows, it generates an internal unbiased estimate of the generalization
    error.

    - It offers a method for guessing missing data that works well and retains accuracy
    even with a considerable amount of missing data.

    - It includes techniques for balancing errors in uneven datasets with a class
    population.

    - The forests that are created can be preserved and used on other data in the
    future.

    - Prototypes are created that reveal the relationship between the variables and
    the classification.

    - It calculates distances between pairs of examples, which can be useful in clustering,
    detecting outliers, or giving fascinating views of the data (by scale).

    - Unlabeled data can be used to create unsupervised clustering, data visualizations,
    and outlier identification using the capabilities described above.

    - It provides a mechanism for finding variable interactions through experimentation.


    ### 6.5.6.2 Properties


    - Each tree has maximal strength

    - Each tree has a minimal correlation with the other trees.

    - Ensemble of trees votes for the final result.


    ## 6.5.7 Advantages and Disadvantages of Random Forest


    ### 6.5.7.1 Advantages


    - It can be used for both classification and regression tasks.

    - Handle the missing value and maintains accuracy for missing data.

    - No overfitting the model.

    - Handle larger datasets with higher dimensionality.


    ### 6.5.7.2 Disadvantages


    - Works well for classification and does not work for regression.

    - Less control on the model.


    ## 6.5.8 Calculation of Error Using Bias and Variance


    The bias and variance represent the deviation of the result from the expected
    value. Let $F$ be the true function having random noise. Then, hypothesis $h$
    is imperfect for the following reason.


    ### 6.5.8.1 Bias


    H is unable to fit f perfectly because it lacks capacity or complexity.


    ### 6.5.8.2 Variance


    $H$ is fitting to the noise in the data and missing the true function $f$.

    Let $z$ be that arbitrary point and generated point is given as


    $\Upsilon = f(z) + \epsilon$ (6.22)


    Expected value is given as


    $E[\Upsilon] = f(z)$ (6.23)


    Variance is given as


    $var[\Upsilon] = var[\epsilon]$ (6.24)


    Mean squared error is given as


    $$R(h) = E\left[(h(z) - \mathbb{Y})^2\right]$$

    $$= E\left[h(z)^2\right] + E\left[\mathbb{Y}^2\right] - 2E\left[\mathbb{Y}h(z)\right]$$


    where $\mathbb{Y}$ and $(z)$ are independent.

    Variance of $\mathbb{Y}$ and $(z)$ is given as


    $$= E\left[h(z)^2\right] + E\left[\mathbb{Y}^2\right] - 2E\left[\mathbb{Y}h(z)\right]$$

    $$= \text{var}[h(z)] + E[h(Z)]^2 + \text{var}[\mathbb{Y}] + E[\mathbb{Y}]^2 -
    2E[\mathbb{Y}]E[h(Z)]$$

    $$= (E[h(z)] - E[\mathbb{Y}])^2 + \text{var}[h(z)] + \text{var}[\mathbb{Y}]$$

    $$= (Eh(z) - f(Z))^2 + \text{var}[h(z)] + \text{var}[\mathbb{C}]$$


    $(E[h(z)]-f(z))^2$ represents the squared bias. It represents the quantity in
    which the model differs from the real data distribution function.

    $\text{var}[h(Z)]$ represents the variance. The variance determines the risk factors.

    $\text{var}[\mathbb{C}]$ represents the irreducible error. The error is due to
    the noise introduced in the input signal.


    ### 6.5.8.3 Properties of Bias and Variance


    - Too much bias leads to underfitting

    - Too much variance leads to overfitting.

    - Training errors show bias.

    - Test errors show bias and variance.

    - If the $n$ value is infinity, then the variance is zero.

    - A model has sufficient modeling capacity when bias is zero when $n$ tends to
    infinity

    - If the number of features is increased, then there is a drop in bias.

    - Noise in the test only affects $\text{var}(\mathbb{C})$. Noise in the training
    set affects only bias and $\text{var}(\mathbb{C})$.


    ## 6.5.9 Time Complexity


    RF is a decision tree ensemble system. The time complexity for creating a complete
    unpruned decision tree is $O(v * n \log(n))$, where $n$ is the record number and
    $v$ is the number of variables/attributes.

    Let $n$ tree be the number of trees in the RF and $m$ try be the number of variables
    at each node. Then, the time complexity of a single tree is $o(m \text{ try} *
    n \log(n))$.

    The time complexity of $n$ tree is $o(n \text{ tree} * m \text{ try} * n \log(n))$.
    Let the depth of the tree be $o(\log n)$.

    Let $d$ represent the depth of the tree. Then, the time complexity is represented
    as $o(n \text{ tree} * m \text{ try} * d * n)$.



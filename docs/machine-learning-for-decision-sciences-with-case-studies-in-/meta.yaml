    \ 0: #else if 条件语句。\n    print(\"Zero\")\nelse:\n    print(\"Negative number\"\
    )\nNegative number\n```\n\n## 2.4.4.4 For 循环\n\nPython 中的 for 循环用于遍历一个序列（列表、元组、字符串）或其他可迭代对象。遍历序列称为遍历。\n\
    \nfor 循环语法\nFor Val in 序列: for 的主体\n这里，Val 是一个变量，在每次迭代中获取序列中项目的值。\n循环持续进行，直到我们到达序列中的最后一个项目。for\

    # **Algorithm 7.1: Class-Independent Linear Discriminant Analysis**


    1. Given a set of $N$ samples $[x_i]_{i=1}^N$, where each corresponds to a row
    of length $M$ (step(A)), and $X(N \times M)$ is denoted by


    $$X = \begin{bmatrix} x_{11} & x_{12} & \cdots & x_{1M} \ x_{21} & x_{22} & \cdots
    & x_{2M} \ \vdots & \vdots & \vdots & \vdots \ x_{N1} & x_{N2} & \cdots & x_{NM}
    \end{bmatrix} \quad (7.21)$$


    2. Determine the mean of each class $\mu_i (1 \times M)$


    3. Determine the total mean of all data $\mu (1 \times M)$


    4. The between-class matrix $S_B (M \times M)$ is determined as


    $$S_B = \sum_{i=1}^c n_i (\mu_i - \mu) (\mu_i - \mu)^T \quad (7.22)$$


    5. The within-class matrix $S_w (M \times M)$ is determined as


    $$S_W = \sum_{j=1}^c \sum_{i=1}^{n_j} (x_{ij} - \mu_j) (x_{ij} - \mu_j)^T \quad
    (7.23)$$


    6. From equations 7.22 and 7.23, the matrix $W$ that maximizes Fisher''s formula
    is determined as $W = S_W^{-1} S_B$. Determine the eigenvalues and eigenvectors
    of $W$.


    7. Sort eigenvectors in decreasing order per their respective eigenvalues. The
    first $k$ eigenvectors are used as a lower-dimensional space ($V_k$).


    8. Project all original samples ($X$) onto the lower-dimensional space of LDA.'

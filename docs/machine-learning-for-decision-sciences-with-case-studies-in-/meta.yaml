    ![](img/7fbca4852dbe91c6cea209148871a1b3_184_2.png)


    FIGURE 4.10 Average distance between two data objects in two different clusters.


    $d_{\min}(C_1, C_2) = \min_{x \in C_1, y \in C_2} d(x, y)$ (4.14)


    **Complete linkage:** The distance between two clusters C1 and C2 is represented
    by the distance of the farthest pair of data objects belonging to different clusters,
    i.e., the maximum distance between two data objects (Figure 4.9).


    $d_{\min}(C_1, C_2) = \max_{x \in C_1, y \in C_2} d(x, y)$ (4.15)


    The complete link method is less sensitive to outliers because they lie far away
    from the rest of the data points.


    **Average linkage:** The similarity of two clusters is determined by the average
    similarity (Figure 4.10) between all pairs of data objects belonging to different
    clusters.


    $d_{\min}(C_1, C_2) = \text{avg}_{x \in C_1, y \in C_2} d(x, y)$ (4.16)


    The average link method is robust to noise and outlier. However, the limitation
    of average linkage is biased toward global clusters.


    **Centroid distance:** The distance between two clusters is represented by the
    distance between the means (Figure 4.11) of the clusters.


    $d_{\text{mean}}(C_1, C_2) = d(m_1, m_2)$ (4.17)'

  md: '![](img/7fbca4852dbe91c6cea209148871a1b3_333_0.png)


    FIGURE 6.91 Geometric margin.


    Now, if we want to find the distance of $p$ from $q$. But the distance is in the
    direction of $w$, and we can write it as


    $$p = q + \gamma \frac{w}{\|w\|}$$ (6.32)


    The above equation 6.6 can be rewritten as


    $$(a_1, a_2) = (b_1, b_2) + \gamma \frac{w}{\|w\|}$$

    $$w^T \left( (a_1, a_2) - \gamma \frac{w}{\|w\|} \right) + b = 0$$

    $$\gamma = y \frac{(w^T (a_1, a_2) + b)}{\|w\|}$$ (6.33)


    Now, we can scale $\|w\|=1$; then,


    $$\gamma = y(w^T (a_1, a_2) + b)$$ (6.34)


    After normalization, the geometric margin is


    $$\frac{\gamma}{\|w\|}$$ (6.35)


    $$w^T x_i + b \geq \gamma$$ for + ve points

    $$w^T x_i + b < \gamma$$ for - ve points'

- img_proc: true
  md: '![](img/7fbca4852dbe91c6cea209148871a1b3_302_0.png)


    FIGURE 6.64 Representation of RF.


    divided into training data 1, training data 2 up to training data each decision
    tree model reconstructed from the training data. Then, the n models are constructed,
    and prediction is done by using majority voting methods. Finally, the class having
    majority voting is selected as the predicted result of the model.


    # Important terminology used in random forest


    +   - **Entropy:** It is a randomness or unpredictability measure in the dataset.

    - **Bagging:** It is parallel training of a bunch of individual models. A random
    subset of the data is conditioned for each model.

    - **Boosting:** It is training sequentially a bunch of individual models. Each
    node learns from the previous model''s mistake.

    - **Gini index:** Gini index measures the degree or probability of error in classifying
    a particular variable when selected randomly.


    # 6.5.1 RANDOM FOREST AND THEIR CONSTRUCTION


    Bagging is also called bootstrap aggregating, which is used in the creation of
    RFs. It is used to avoid overfitting. RF is better than bagging trees because
    the prediction of all subtrees is considered during classification.'

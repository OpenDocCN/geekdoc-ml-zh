    \ libraries. While using the DBSCAN function, the parameter “eps” plays a significant\
    \ role in clustering. All the data points resulted in a single cluster when “eps”\
    \ was set to a large value. At the same time, setting “eps” to small values resulted\
    \ in data labeled as noise. Several experiments were conducted to have a trade-off,\
    \ and in this example, “eps” is set to 0.2. Thus, the readers can explore different\
    \ values of “eps” and observe the data clustering.\n\n```python\nimport numpy\
    \ as np\nimport matplotlib.pyplot as plt\nfrom sklearn.datasets import make_blobs\n\
    from sklearn.cluster import DBSCAN\nfrom sklearn.preprocessing import StandardScaler\n\
    from sklearn import metrics\n```\n\n```python\n# generate some random cluster\
    \ data\nX, labels_true = make_blobs(n_samples=500, n_features=2, centers=4, cluster_std=1.0,\
    \ center_box=(-20.0, 20.0), shuffle=True, random_state=100)\nrng = np.random.RandomState(74)\n\
    ```\n\n```python\n# transform the data to be stretched\ntransformation = rng.normal(size=(2,\
    \ 2))\nX = np.dot(X, transformation)\n```\n\n```python\nscaler = StandardScaler()\n\
    X_scaled = scaler.fit_transform(X)\n# cluster the data into five clusters\ndbscan\
    \ = DBSCAN(eps=0.123, min_samples = 2)\nclusters = dbscan.fit_predict(X_scaled)\n\
    # plot the cluster assignments\nplt.scatter(X[:, 0], X[:, 1], c=clusters, cmap=\"\
    plasma\")\nplt.xlabel(\"Feature 0\")\nplt.ylabel(\"Feature 1\")\n```\n\n```python\n\
    core_samples_mask = np.zeros_like(dbscan.labels_, dtype=bool)\ncore_samples_mask[dbscan.core_sample_indices_]\
    \ = True\nlabels=dbscan.labels_\nn_clusters_ = len(set(labels)) - (1 if -1 in\
    \ labels else 0)\nn_noise_ = list(labels).count(-1)\n```\n\n```python\nprint('Estimated\
    \ number of clusters: %d' % n_clusters_)\nprint('Estimated number of noise points:\
    \ %d' % n_noise_)\nprint(\"Adjusted Mutual Information: %0.3f\"\n      % metrics.adjusted_mutual_info_score(labels_true,\
    \ labels))\nprint(\"Adjusted Rand Index: %0.3f\"\n      % metrics.adjusted_rand_score(labels_true,\
    \ labels))\n```\n\n```python\nprint(\"Completeness: %0.3f\" % metrics.completeness_score(labels_true,\
    \ labels))\nprint(\"Homogeneity: %0.3f\" % metrics.homogeneity_score(labels_true,\
    \ labels))\nprint(\"V-measure: %0.3f\" % metrics.v_measure_score(labels_true,\
    \ labels))\n```\n\nWhen it comes to analysis, it is important to understand the\
    \ metrics involved in a code. In the example considered for implementing DBSCAN,\
    \ the metrics function from the sklearn library is used to evaluate all the metrics\
    \ corresponding to clustering. The output of the above code is presented below\
    \ with all the metrics shown for “eps”=0.2. Figure 4.20 shows the clustering for\
    \ the random data chosen for clustering.\n\nEstimated number of clusters: 4\n\
    Estimated number of noise points: 0\nAdjusted Mutual Information: 1.000\nAdjusted\
    \ Rand Index: 1.000\nCompleteness: 1.000\nHomogeneity: 1.000\nV-measure: 1.000\n\
    \nThe value of “eps” was then changed to 0.05, and the results are presented below\
    \ with clustering shown in Figure 4.21. It is observed that though the number\
    \ of clusters required was 4, the algorithm has estimated the number of clusters\
    \ as 9. The number of noise points estimated has also increased considerably to\
    \ 19. There is a variation concerning all the other evaluation metrics.\n\nEstimated\
    \ number of clusters: 9\nEstimated number of noise points: 19\nAdjusted Mutual\
    \ Information: 0.858\nAdjusted Rand Index: 0.866\nCompleteness: 0.777\nHomogeneity:\
    \ 0.964\nV-measure: 0.860\n\n## SUMMARY\n\nUnsupervised learning is a machine\
    \ learning technique where the model does not require supervision. The unknown\
    \ patterns of data can be explored based on the concept of clustering and association.\
    \ This chapter has discussed several clustering algorithms, namely the k-means\
    \ clustering, fuzzy k-means clustering, hierarchical (agglomerative and divisive)\
    \ clustering, and DBSCAN clustering. These algorithms were discussed in detail\
    \ with the implementation of examples using Python. Unsupervised machine learning\
    \ helps you to find all kinds of unknown patterns in data. The major limitation\
    \ of unsupervised learning is the lack of precise information from the clustering\
    \ process. This can be overcome by exploring and conducting several additional\
    \ experiments by varying the model parameters.\n\n## REVIEW QUESTIONS\n\n1. Suppose\
    \ we want to build a neural network that classifies two-dimensional data (i.e.,\
    \ $X=[x_1, x_2]$) into two classes: diamonds and crosses. The dataset has 1000\
    \ samples, including diamonds and crosses. Use k-means clustering and DBSCAN clustering\
    \ algorithms to cluster the data and evaluate the clustering metrics. Compare\
    \ the performance of the algorithms. List your observations by varying the model\
    \ parameters.\n2. What is the role of principal component analysis in unsupervised\
    \ learning? Explain in detail.\n3. List out all the unsupervised clustering algorithms\
    \ and identify the model parameters relevant to each algorithm. Then, generate\
    \ a random dataset, and explain the observations for each algorithm to vary the\
    \ model parameter for at least five settings covering the minimum and maximum\
    \ range.\n4. What are the limitations of the fuzzy k-means algorithm?\n5. Discuss\
    \ the differences between agglomerative hierarchical and divisive hierarchical\
    \ clustering algorithms. Then, implement these algorithms on a random dataset\
    \ and observe the output.\n6. Does clustering using unsupervised learning algorithms\
    \ require data cleaning? If so, what would be the suitable approach for data cleaning?\
    \ Discuss.\n7. For performing a clustering analysis, what is the minimum number\
    \ of features required?\n8. Suppose the k-means algorithm is run twice on the\
    \ same dataset. Do you observe the same results? Justify your answer.\n9. What\
    \ are dendrograms? Generate a dendrogram for random data. Is it possible to have\
    \ two different dendrograms using agglomerative clustering for the same dataset?\
    \ Discuss in detail.\n10. Is it possible to obtain dendrograms using k-means clustering\
    \ algorithms? Discuss.\n11. What are all the evaluation metrics used to evaluate\
    \ a clustering algorithm? List them and explain with relevant equations."

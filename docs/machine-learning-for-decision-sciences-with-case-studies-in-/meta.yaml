    y_i)}{20}$$

    $$= 2214.6566 - \frac{(23.92)(1843.21)}{20} = 10.17744$$


    Therefore, the least-squares estimates of the slope and intercept are


    $$\beta_1 = \frac{S_{xy}}{S_{xx}} = \frac{10.17744}{0.68088} = 14.94748$$


    and


    $$\beta_0 = \bar{y} - \beta_1 \bar{x} = 92.1605 - (14.94748)1.196 = 74.28331$$


    The linear regression model is


    $$y = 74.28331 + 14.94748x$$


    ## Example 5.3


    To understand mathematically behind regression, let''s see an example where 15
    samples of houses of a region are given in Table 5.4. The idea is to predict the
    price y given area of the house x.


    The 15 data points are plotted in a graph (Figure 5.18) where the x-axis is the
    house size in terms of 100 square feet and the y-axis is the prize. So given these
    15 points, we have to find the equation of the line. This is a linear regression
    problem that consists of 15 independent variables.



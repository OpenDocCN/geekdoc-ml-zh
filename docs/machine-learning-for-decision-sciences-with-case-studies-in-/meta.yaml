- md: '## 6.5.11 Real-World Examples


    The RF is a popular ML algorithm. The accuracy of RF is high because it has multiple
    decision trees. So it plays a major role in classification and regression problems.
    A few application areas where RF is popular are as follows:


    - 1. Machine fault diagnosis

    - 2. Medical field

    - 3. Banking

    - 4. E-Commerce

    - 5. Security


    ### 6.5.11.1 Machine Fault Diagnosis


    RF algorithm is a novel assembly classifier that creates many decision trees to
    improve the single tree classification. While there are many current fault diagnostic
    techniques, such as artificial neural networks and SVMs, RF research is essential
    due to its fast speed, tree classifier characteristics, and high performance in
    computer fault diagnosis. Moreover, it is proved that by combining with other
    optimization methods, the RF-based diagnosis approach can produce more accurate
    results.


    RF adopts a set of decision trees and defines by majority voting algorithm the
    categorical groups. To check the quality of RF, a serious consideration of overfitting
    is therefore required. Some of the research work is done by combining RFs with
    genetic algorithms. In this approach, the RF is developed by using a decision
    tree from the CART algorithm. The tree is built by splitting a node recursively.
    The tree is constructed from the sample data and the majority voting process.
    The class that has the highest voting is selected for classification. The RF can
    be strengthened by using a genetic algorithm. The rule of survival of the fittest
    is applied to the population of individuals. GA has a powerful search algorithm
    because of its simplicity and powerful features. GA is used for parameter optimization.


    ### 6.5.11.2 Medical Field


    #### 6.5.11.2.1 Diabetic Retinopathy Classification Analyses


    RF methods are for evaluating the identification of data for diabetic retinopathy
    (DR) fundus photography. In the United States and worldwide, DR is one of the
    leading causes of blindness. DR is a chronic illness that may go unnoticed for
    effective treatment until it is too late. Early detection could therefore improve
    the chances of therapeutic interventions to reduce its effects. Graded fundus
    photography and structural data were used to estimate RF and logistic regression
    classifiers. The impact of sample size on classifier performance and the possibility
    of using conditional probabilities are generated by RF as metrics describing DR
    risk. Variable RF measurements are used to identify factors that affect the quality
    of classification. By comparing participants with or without DR, both types of
    data are valuable. RF-based models provided much higher classification accuracy
    than those based on logistical regression. Combining both data types did not increase
    reliability but increased statistical bias among healthy participants who subsequently
    had or did not have DR events over 4 years of monitoring. RF factor value parameters
    showed that the number of microaneurysms in both eyes seemed to play the most
    important role in the discrimination between the graded fundus variables and the
    number of medicinal products.


    ![Disease prediction using RF.](img/7fbca4852dbe91c6cea209148871a1b3_321_0.png)


    **FIGURE 6.82** Disease prediction using RF.


    At the initial stage, the data are collected from the patient report. There should
    not be any missing data in the collected data. For example, among all the collected
    attributes, one of the attributes should represent whether the patient is suffering
    from liver damage or not.


    Figure 6.82 represents the prediction of liver damage using RF. At the initial
    stage, the data are collected from the patient report. There should not be any
    missing data in the collected data. Among all the collected attributes, one of
    the attributes should represent whether the patient is suffering from liver damage
    or not. RF model is collected for the above model, and it produces an accuracy
    of 70.50%. The data are collected from the UCI ML repository. The dataset has
    167 negative tests, and 416 positive test classifications are done at various
    decision trees. The final output is selected by using the voting mechanism. Liver
    damage occurs due to inhaling harmful gases, intake of contaminated food, different
    kinds of drugs, and excessive alcohol consumption. Preprocessing is used for cleansing
    the data attributes that are selected from the data.


    ### 6.5.11.3 Banking


    RF algorithms are widely used in the banking sector in two main applications.
    These are meant to recognize clients who are trustworthy and to find customers
    who are fraud. The loyal customer is not the customer who pays well, but also
    the customer who can take the huge amount as a loan and pay the interest on the
    bank loan well. As the success of the bank is purely dependent on loyal customers,
    bank customer data are highly evaluated to determine the pattern for the loyal
    customer based on customer data.


    Similarly, consumers who are not important to the bank need to be identified,
    such as taking the loan, paying interest on the loan appropriately, and finding
    outgoing customers. Then, bank will have a chance not to approve this customer
    loan form. Also used in this case is the RF algorithm to identify customers that
    are not beneficial to the bank.


    The RF is used to predict bank failures. The bank-level financial statement is
    analyzed to identify the falling of the bank. RF improves classification accuracy
    because classification is done at many trees rather than single tree. The RF predicts
    the bank failure event by analyzing bank-level financial data to distinguish active
    and inactive banks. The data are collected from bank scope. 8 indicators are selected
    from these data, and these data are classified into four groups (profitability
    ratio, capitalization, loan quality, and funding). This method can be applied
    to a commercial bank, saving bank, and cooperative bank. A threshold value or
    explanatory variable is used to split the active and interactive banking. First,
    a large number of the trees are constructed based on the given data. Then, the
    class is selected based on the voting mechanism. The three trees are constructed
    for testing: first, a single tree, second one RF with many trees, and third one
    with a large dataset by training multiple tree parallel. A single tree represents
    a decision tree, and the accuracy obtained by the single tree is less than the
    RF tree.


    First, the RF is constructed as a single tree, RF with many trees, and RF with
    multiple tree parallel. Compared to single tree RF, the multiple tree RF produced
    higher accuracy.


    The explanatory variables are:


    - 1. The average rate of interest on loans and assets

    - 2. The average rate of a bank in deposits.


    ### 6.5.11.4 E-Commerce


    For E-Commerce, the RF is used only in the small segment of the recommendation
    engine on various types of customers to identify the likelihood of customers who
    like the recommended goods. It takes high-end GPU systems to run RF algorithms
    on very large datasets. If GPU is not available, the ML models can also be run
    on the cloud hosting environment. The online cloud computing system can be used
    from any corner of the world to run high-end ML models.


    ### 6.5.11.5 Security


    In recent times, the RF has played a major role in the intrusion detecting system.
    Due to advancements in the technologies like IoT, big data, and the cloud, there
    is increased usage of the computer system in business. A huge amount of data are
    transferred and processed. The IDS maintains the confidentiality and integrity
    of data. The IDS in the network should have a low false-positive rate. RF algorithm
    plays a major role in IDS because it requires less training time and fast prediction.
    Detection strategy type, problem domain, and software architecture are used to
    create a RF model. Proximity methods are used in the RF. The various data collected
    from the network are HOST log (i.e., operational system and system logs), application
    log (i.e., data generated from the application), network traffic (i.e., OSI layer
    3), and wireless traffic (i.e., OSI layer 1). Data can be collected from the centralized
    or distributed method. In analogy-based detection, patterns different from normal
    patterns are identified. In signature-based detection, the misused data are identified,
    and in specification-based detection, the data violated from the protocol specification
    are identified. The detection can be done by using online, i.e., block the IP
    address or off-line.



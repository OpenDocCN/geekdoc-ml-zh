    # 3 Data Analytics Life Cycle for Machine Learning


    # LEARNING OBJECTIVES


    At the end of this chapter, the reader will be able to:


    +   - Comprehend the phases involved in the Data Analytics Life Cycle for machine
    learning (ML).

    - Appreciate the aspects involved in data discovery, data preparation, and exploratory
    data analysis.

    - Understand the requirements for model planning and model building.

    - Have a deep acquaintance on communicating results, optimize and operationalize
    the models.

    - Gain knowledge on the roles and responsibilities of the members involved throughout
    the phases of the Data Analytics Life Cycle.


    # 3.1 INTRODUCTION


    The data generated in the last two years are much larger than the last 50 years
    combined. As the data grow exponentially, it brings a huge issue. We have to manage
    it properly so that the data can be used for business benefits. Adopting and successfully
    implementing a framework will help the user to avoid data-related pitfalls. The
    framework also helps the user to focus their time on data analysis (inference
    from data) than data preparation, ensure the rigor and completeness of the data,
    enable the better transition to members of the cross-functional analytic teams
    with repeatable scale to additional analytics, and to support the validity of
    findings.


    Several real-world data problems look complex and chaotic, but with a well-framed
    approach, the complex problem can be broken down into simpler modules, which can
    be easily addressed. Sometimes, applying a tested procedure for analyzing the
    data is challenging. Hence, it is required to establish a comprehensive method
    for performing the analysis. Once data are collected in several instants, the
    user starts analyzing the data, then later plans and identifies the scope and
    the amount of work involved. During the process, the people involved try to explore
    a different objective or address a different issue that differs from the objectives
    communicated. The documentation process helps demonstrate rigor in the exploration
    and provides additional credibility to the project when shared among the team.
    This helps the team in knowledge sharing and to adopt the methods and analysis
    so it can be repeated and modified slightly over the successive years.


    A well-defined process exists for developing a data science project. However,
    it is always recommended to have a Data Analytic Life Cycle framework, which is
    of primary focus in this chapter. Many of the proposed framework phases will be
    similar. For example, the data discovery and data preparation phases will be common,
    with subtle differences. However, some phases would not be needed at all. For
    example, the model training phase of the framework requires the user to create
    the training and testing datasets; the business intelligence project will not
    have those phases. Subsequently, data science often deals with various datasets
    such as big data, including semi-/unstructured data and sparse datasets. Such
    datasets require more attentiveness in data preparation, data stitching, and enriching
    than projects that only focus on business intelligence.'
  - '[PAGE 126]


    Data preparation may be the most important part of a ML project. It is the most
    time-consuming part, although it seems to be the least discussed topic. Data preparation
    is also called data preprocessing and is the act of transforming raw data into
    a form that is appropriate for modeling. ML algorithms require input data to be
    numeric values, and most algorithm development and deployments maintain this expectation.
    So, if the data contain data types and values that are not numbers, such as labels,
    you will need to change the data into numbers. Further, specific ML algorithms
    have expectations regarding the data types, scale, probability distribution, and
    relationships between input variables. You may need to change the data to meet
    these expectations.


    The viewpoint of data preparation is to discover how to best expose the unknown
    underlying structure of the problem to the ML algorithms. This often requires
    an iterative path of experimentation through a suite of different data preparation
    techniques to discover what works well or best. The vast majority of the ML algorithms
    used on a project are years-to-decades old. The implementation and application
    of the algorithms are well understood. So much so that they are routine, with
    amazing fully featured open-source ML libraries like Scikit-learn in python. The
    thing that is different from project to project is the data. We may acquire a
    new dataset for the first time in a new application setup to use a specific data
    set as the basis for a predictive modeling project. As such, the preparation of
    the data to best present it to the problem of the learning algorithms is the primary
    task of any modern ML project.


    The challenge of data preparation is that each dataset is unique and different.
    Datasets differ in the number of variables (tens, hundreds, thousands, or more),
    the types of the variables (numeric, nominal, ordinal, Boolean), the scale of
    the variables, the drift in the values over time, and more. As such, this makes
    discussing data preparation a challenge. Either specific case studies are used,
    or focus is put on the general methods used across projects. The result is that
    neither approach is explored.


    # 3.2 DATA ANALYTICS LIFE CYCLE


    The Data Analytics Life Cycle comprises six phases, which are iterative between
    the steps throughout the life cycle. The Data Analytics Life Cycle shown in Figure
    3.1 portrays the best practices approach for an end-to-end data analytics process
    starting from data discovery to project completion and operation phase. The phases
    also cover the process improvement based on established methods in the domain
    of data analytics and decision science.


    # 3.2.1 Phase 1 – Data Discovery


    The question to answer in the data discovery phase is “Do we have enough information?”.
    Data discovery is the process of collecting and analyzing data from various sources
    to realize insight from hidden patterns and trends. It is the primary step in
    fully harnessing an organization’s data to tell critical business decisions. Through
    the data discovery process, data are gathered, combined, and analyzed during a
    sequence of steps. The goal is to form messy and scattered data clean, understandable,
    and user-friendly. The primary focus of this phase is to learn the business domain,
    including learning from past experiences and further assessing the resources required
    to support the project, such as human resources, time, technology, and data. The
    business problem has to be framed in such a way with the focus on the analytic
    challenge, and this would be addressed in subsequent Data Analytic Life Cycle
    phases. Finally, the initial hypotheses (IHs) have to be formulated to validate
    and begin learning the information.


    Understanding the domain in-depth for the given problem we are trying to find
    an answer to is critical. In a few situations, data scientists are required to
    possess advanced computational and quantitative knowledge such that the applications
    can be multi-disciplinary. These scientists are expected to possess an in-depth
    knowledge of the techniques, methods, and models for applying heuristics to different
    business and conceptual problems. Experts from domain areas with quantitative
    expertise'
- md: '## 3.2.1 Phase 1 – Business Understanding


    The Data Analytics Life Cycle will also partner with data scientists to address
    the gap between domain knowledge and analytical depth.


    While assessing the resources, there should be a focus on the available tools
    and technology used for the process and the types of systems required for interaction
    with subsequent phases. It is also required to have an evaluation concerning analytical
    facilities available within the organization. Questions are as follows:


    - a. What would be the type of roles required for end-users of the model?

    - b. The current development model will drive success?

    - c. Are the roles available within the organization?


    Such evaluation will help decide on the current implementation and future implementations
    on the type of data handling. In addition, it is necessary to validate whether
    the information available is sufficient to support the objectives of the current
    project, or whether data collection is required, whether the purchase of data
    from outside sources is required, or any extensions or transformations on existing
    data are required.


    Moreover, for successful project implementation, a good project team has a proper
    combination of subject matter experts (SMEs), domain experts, analytic team, customers,
    and the project management team. Also, it is required to assess the proportion
    of SMEs such that there is a clear focus on the depth and breadth of skills on
    the working team. Once the inventory for the project is decided concerning the
    team, tools, data, and technology, then another set of evaluations is done to
    decide on the resources, else additional resources are added.


    Once the interaction is complete with the stakeholder and sufficient knowledge
    is obtained on the domain, the business problem can be framed by considering experience.
    Later, the analytics problem is defined, and during this phase, the role of the
    stakeholders, their project requirements, their interests, and their criteria
    to evaluate the project. Since the analytical part of the project aims at a business
    perspective, it is necessary to address the weak points very clearly so that haphazard
    can be avoided while working on the project.


    Based on the number of participants and stakeholders, we must consider using the
    responsible, accountable, consulted, and informed (RACI) matrix. This will give
    a clear picture of the expectation and participation from each stakeholder, set
    clear expectations with the participants, and avoid delays later when we need
    approvals from stakeholders, rather than the supervisor of the work product. The
    RACI matrix is a method in which the responsibilities are documented. These responsibilities
    include the role of a person in the project, whether the person fits rightly in
    the project, etc. RACI refers to the role of people within a project:


    - **Responsible:** Those individuals or groups responsible for doing the critical
    path activity and expected to complete the tasks actively.

    - **Accountable:** Those individuals or groups who are answerable for a decision.
    In this case, only one accountable person/group is assigned to a given task to
    ensure clear ownership and accountability.

    - **Consult:** Those individuals or groups who are the specific domain experts/SMEs
    will be in consultation throughout the project.

    - **Inform:** Those individuals or groups who have to be kept informed whenever
    a decision or an action is taken.


    A sample RACI matrix is given in Table 3.1.


    Creating a framework similar to the RACI matrix will ensure that we have accountability
    and clear agreement on responsibilities in the project. In addition, the information
    to share with the right people is kept informed of progress.


    Most likely, the project sponsors will start with the end goal (or the solution).
    The project team needs to use that as a reference and identify the problem and
    the desired outcomes. Thus, interviewing project sponsors (individuals like CFO,
    CIO, or Director) becomes a key. Here are some tips and samples for interviewing
    the project sponsor to frame the core business problem and project assumptions
    and constraints.


    - What business problem are we trying to solve as part of the project?

    - What industry issues (stable vs. dynamic industry, etc. – the data might be
    stable or changing rapidly) impact the project?

    - What are the success criteria for this project (key project metrics)?

    - How much historic information is needed for the analysis?

    - What is in scope and out of scope for this project? (a lot of users focus on
    in-scope items and ignore the out-of-scope items, and that will create a scope
    creep in the future)

    - What are the time line and cost guidelines we should be working under (scope,
    time, and cost are called triple constraints. If one changes, the other two need
    to be evaluated and changed properly to avoid project cost overruns and delays)?

    - Where do we get the data from? (internal data sources vs. external data sources,
    one data source vs. many)

    - Who can (internal vs. external to the organization) act as an SME to the project?

    - How the scope changes will be handled (change control board, etc.)


    **TABLE 3.1 RACI Matrix**


    | Critical Path Activities | Stakeholder 1 | Stakeholder 2 | Stakeholder 3 | Stakeholder
    4 | Stakeholder 5 |

    | :--- | :---: | :---: | :---: | :---: | :---: |

    | Activity 1 | R | R | A | C | I |

    | Activity 2 | R | C | I | A | I |

    | Activity 3 | C | R | A | C,I | I |

    | Activity 4 | R | R | A | I | I |


    Now, the initial hypotheses (IHs) can be formed to approve or disapprove the data.
    It is always encouraged to develop a few IHs to test-generate additional ideas
    for the hypotheses. The IH formed initially serves as the basis of the tests that
    will be performed in later phases for analysis, and these serve as the foundation
    for additional learning. Hypothesis testing will be covered in greater detail
    in supervised and unsupervised learning chapters. Initially, the type of data
    required to solve a specific problem is chosen along with the data sources and
    their classification, such as structured, semi-structured, or unstructured data.
    The volume, type, and time span of the data needed to test the hypotheses must
    be considered. In addition to this, the data sources should be identified so that
    easy access is ensured. In some applications, the raw data may be required to
    run through the models. Hence, the possibilities to access the data have to be
    identified to serve as a basis for experimental analysis.


    Once the hypothesis definition is complete, a thorough diagnosis of the data situation
    is performed. Then, the tools and techniques can be listed for the application,
    starting from the data preparation phase to operationalizing the model. Also,
    if data exploration is performed during this phase, there is clarity on the quantity
    of data, which helps in structuring and formatting the data. Now the scope of
    the information is reviewed and validated with the help of the project domain
    experts.


    Many articles describe how to become experts in various fields, specifically the
    amount of practice needed to become an expert. This context is referred to as
    deliberate learning. To develop the required expertise, it is important to identify
    the possible solutions to a problem. This will lead to a set of possible solutions.
    If the IHs are formulated, then it is much easier to arrive at conclusions on
    the analytic model.


    Before moving on to the next phase, the following points are to be ensured:


    - Availability of sufficient information to draft the analytic plan and share
    for peer review.

    - Whether a clear understanding of the business problem exists and whether step-by-step
    approach exists to address the problem.

    - Sufficient SMEs are available to support in the domain area of the problem.

    - Whether the success criteria for the project are detected.


    With the above points, the problem definition is more clear and helps when it
    comes to identifying the possible choices of analytical methods used in the following
    phases.


    ## 3.2.2 Phase 2 – Data Preparation and Exploratory Data Analysis


    The primary focus in the data discovery phase is to ensure the “availability of
    good quality data.” In this phase, an analytic sandbox is prepared, such that
    it would be used for the remaining phases of the project. The extract, load, and
    transform (ELT) and extract, transform, and load (ETL) are performed to get the
    relevant data into the sandbox. Now the data get transformed so that analysis
    can be carried out. The basic idea is to obtain a clear understanding of the data
    and take the required measures to condition the data. Data analysts refer to this
    process as data enriching and harmonizing, and this phase is considered one of
    the most critical and time-consuming phases within the data life cycle.


    In this phase, a space is defined to explore the data without interfering with
    the live production databases. In addition, all kinds of data should be collected
    in the sandbox since a high volume and variety of data would be required for the
    analytic project. Thus, huge data would include the summary, structured data,
    raw data feeds (e.g., sensors), and unstructured text data (log data). Hence,
    the sandbox is large and almost 10–50 times the size of an organization’s enterprise
    data warehouse.'
  mdcn: '## 3.2.1 第一阶段 – 业务理解


    数据分析生命周期还将与数据科学家合作，以弥合领域知识与分析深度之间的差距。


    在评估资源时，应重点关注可用于该流程的现有工具和技术，以及与后续阶段交互所需的系统类型。同时，还需要对组织内可用的分析设施进行评估。相关问题如下：


    - a. 模型的最终用户需要什么类型的角色？

    - b. 当前的开发模型能否推动成功？

    - c. 组织内部是否具备这些角色？


    此类评估将有助于决定当前及未来在数据处理类型方面的实施。此外，有必要验证现有信息是否足以支持当前项目的目标，或者是否需要收集数据、从外部来源购买数据，或对现有数据进行任何扩展或转换。


    此外，为了项目的成功实施，一个优秀的项目团队需要由主题专家（SMEs）、领域专家、分析团队、客户和项目管理团队合理组合而成。同时，需要评估主题专家的比例，以确保工作团队在技能的深度和广度上有明确的重点。一旦确定了项目在团队、工具、数据和技术方面的清单，就需要进行另一轮评估来确定资源，否则需要增加额外资源。


    一旦与利益相关者完成互动并获得了足够的领域知识，就可以结合经验来界定业务问题。随后，定义分析问题，在此阶段，需要明确利益相关者的角色、他们的项目需求、他们的兴趣以及他们评估项目的标准。由于项目的分析部分旨在服务于业务视角，因此有必要非常清晰地指出薄弱环节，以避免在项目工作中出现混乱。


    根据参与者和利益相关者的数量，我们必须考虑使用负责、问责、咨询和知情（RACI）矩阵。这将清晰地展示每位利益相关者的期望和参与度，与参与者设定明确的期望，并避免在需要利益相关者（而非工作成果的主管）批准时出现延误。RACI矩阵是一种记录职责的方法。这些职责包括个人在项目中的角色、个人是否适合该项目等。RACI指的是项目中人员的角色：


    - **负责（Responsible）：** 负责执行关键路径活动并期望主动完成任务的个人或群体。

    - **问责（Accountable）：** 对决策负责的个人或群体。在此情况下，每个给定任务只分配一个问责人/群体，以确保明确的所有权和问责制。

    - **咨询（Consult）：** 作为特定领域专家/主题专家的个人或群体，将在整个项目过程中提供咨询。

    - **知情（Inform）：** 每当做出决策或采取行动时，需要被告知的个人或群体。


    表3.1给出了一个RACI矩阵示例。


    创建一个类似于RACI矩阵的框架将确保我们对项目中的问责制和职责有明确的共识。此外，与正确的人共享信息，使其了解进展。


    很可能，项目发起人会从最终目标（或解决方案）开始。项目团队需要以此为参考，识别问题和期望的结果。因此，采访项目发起人（如CFO、CIO或总监等）变得至关重要。以下是一些采访项目发起人的技巧和示例，用于界定核心业务问题以及项目假设和约束条件。


    - 我们作为项目的一部分试图解决什么业务问题？

    - 哪些行业问题（稳定与动态行业等——数据可能是稳定的或快速变化的）会影响项目？

    - 该项目的成功标准是什么（关键项目指标）？

    - 分析需要多少历史信息？

    - 该项目的范围和范围外是什么？（许多用户关注范围内的项目而忽略范围外的项目，这将在未来导致范围蔓延）

    - 我们应在什么时间线和成本指导下工作（范围、时间和成本被称为三重约束。如果其中一个改变，另外两个需要被评估并适当改变，以避免项目成本超支和延误）？

    - 我们从哪里获取数据？（内部数据源与外部数据源，单一数据源与多个数据源）

    - 谁可以（组织内部或外部）担任项目的主题专家？

    - 如何处理范围变更（变更控制委员会等）


    **表3.1 RACI矩阵**


    | 关键路径活动 | 利益相关者1 | 利益相关者2 | 利益相关者3 | 利益相关者4 | 利益相关者5 |

    | :--- | :---: | :---: | :---: | :---: | :---: |

    | 活动1 | R | R | A | C | I |

    | 活动2 | R | C | I | A | I |

    | 活动3 | C | R | A | C,I | I |

    | 活动4 | R | R | A | I | I |


    现在，可以形成初始假设（IHs）以批准或否决数据。始终鼓励制定几个IHs来测试并生成额外的假设想法。最初形成的IHs作为后续阶段进行分析的测试基础，并为额外的学习奠定基础。假设测试将在监督学习和无监督学习章节中更详细地介绍。最初，选择解决特定问题所需的数据类型以及数据源及其分类，例如结构化、半结构化或非结构化数据。必须考虑测试假设所需的数据量、类型和时间跨度。此外，应识别数据源以确保易于访问。在某些应用中，可能需要将原始数据输入模型运行。因此，必须确定访问数据的可能性，作为实验分析的基础。


    一旦假设定义完成，就需要对数据状况进行彻底诊断。然后，可以列出从数据准备阶段到模型操作化阶段的应用工具和技术。此外，如果在此阶段进行了数据探索，就能明确数据量，这有助于构建和格式化数据。现在，在项目领域专家的帮助下，审查和验证信息的范围。


    许多文章描述了如何成为各个领域的专家，特别是成为专家所需的练习量。此背景被称为刻意学习。为了发展所需的专业知识，识别问题的可能解决方案非常重要。这将引出一系列可能的解决方案。如果制定了IHs，那么就更容易得出关于分析模型的结论。


    在进入下一阶段之前，需要确保以下几点：



    # 4.2 UNSUPERVISED LEARNING


    The class of unsupervised learning is a kind of self-organized learning that helps
    us identify patterns or similarities in our data related to various features.
    The three main categories of machine learning are supervised learning, unsupervised
    learning, and reinforcement learning.


    Consider a machine or a system that receives a sequence of inputs $x_1, x_2, x_3,
    \dots$, from a sensor where $x_t$ is the sensory input at time $t$. This input
    that is received sequentially concerning time is called the data. Data can be
    any real-time measurement such as an image from a camera and voltage or current
    values from a solar panel.


    In supervised learning, the system is also presented with a sequence of desired
    outputs $y_1, y_2, \dots$, along with the received input data. The goal of the
    system is to learn to produce the correct output upon receiving successive inputs.


    In reinforcement learning, the system interacts with its environment by producing
    a set of actions. These actions, in turn, impact the environment, and this change
    results in the system receiving a few scalar rewards or penalties corresponding
    to every action. Thus, the system''s goal is to act in such a way as to maximize
    future rewards or minimize future penalties.'
  - "[PAGE 168]\n\n![](img/7fbca4852dbe91c6cea209148871a1b3_168_0.png)\n\nFIGURE 4.1\
    \ Block diagram of unsupervised learning.\n\nIn unsupervised learning, the system,\
    \ as shown in Figure 4.1, receives the set of sensory inputs $x_1, x_2, \\dots$,\
    \ but does not obtain the target outputs (like supervised learning), nor rewards\
    \ or penalties from its environment (like reinforcement learning). Though it seems\
    \ mysterious to imagine what the system could learn without any feedback from\
    \ its environment, it is possible to develop a systematic framework for unsupervised\
    \ learning. The framework's goal is to build representation models similar to\
    \ the input data, which can be used for prediction, decision-making, etc.\n\n\
    It is important to understand the need for unsupervised learning at this point.\
    \ In situations such as speech recognition, the interpretation of large datasets\
    \ is very costly. Unsupervised learning has been proving to be efficient in such\
    \ application areas. In data mining, there may be a situation where the user cannot\
    \ predict the number of classes the data can be divided into. Unsupervised learning\
    \ has been proving to be successful in such situations as well.\n\nUnsupervised\
    \ learning is classified into two categories, namely parametric unsupervised learning\
    \ and non-parametric unsupervised learning.\n\n+   - **Parametric unsupervised\
    \ learning**\n  When the given data can be represented in terms of parametric\
    \ distribution, the case is referred to as *parametric unsupervised learning*.\
    \ The algorithm assumes that the data is obtained from a probability distribution-based\
    \ population that follows a fixed set of parameters. These fixed sets of parameters\
    \ are usually mean and standard deviation. Using these parameters on normal distribution\
    \ data, the probability of any future observation can be predicted easily. This\
    \ learning algorithm involves structuring Gaussian mixture models with expectation-maximization\
    \ (EM) algorithm to predict the class of the sample data taken for classification.\
    \ This unsupervised learning approach is much more complex than any supervised\
    \ learning approach, and research has not identified any standard measure of accuracy\
    \ to validate the algorithm's outcome."
  - "[PAGE 169]\n\nUnsupervised Learning\n\n147\n\n+   - **Non-parametric unsupervised\
    \ learning**\n  In non-parameterized unsupervised learning, the data obtained\
    \ from the real world is assembled to form groups or clusters. Here, each cluster\
    \ holds some information about the data present in its group. This approach is\
    \ mostly used to analyze and mold data into a smaller set of samples. Here, the\
    \ learning does not use any assumptions regarding the population distribution\
    \ and hence is also known as a distribution-free method.\n\nTwo of the main methods\
    \ used in unsupervised learning are principal component analysis and cluster analysis,\
    \ but the most commonly used method is clustering.\n\n# 4.2.1 CLUSTERING\n\nOne\
    \ of the popular unsupervised learning problems is clustering. It evolves in determining\
    \ a structure from a collection of data. The structure is comprised of a group\
    \ of objects in which the members have some similar relation. Thus, a cluster\
    \ can be defined as a group of objects with “similar” properties among them and\
    \ “dissimilar” properties concerning the objects in other clusters.\n\nThere are\
    \ several definitions for the term clustering in the literature, and some of the\
    \ common ones are as follows:\n\n+   - The method of identifying groups in data.\n\
    - The method of segregating the data into homogeneous groups.\n- The method of\
    \ segregating the data into groups, with similar points in each group -.\n- The\
    \ method of segregating the data into groups, where points within each group are\
    \ similar while points of different groups are dissimilar.\n- The method of segregating\
    \ the population space into areas with a comparatively high density of points,\
    \ separated by areas with a comparatively low density of points.\n\nThere is certainly\
    \ a wide difference between clustering and classification. In unsupervised learning,\
    \ clustering is applied on a set of unlabeled data without any knowledge about\
    \ the dataset. On the contrary, in the classification approach, the grouping or\
    \ class is formed on a set of unlabeled data after applying a suitable supervised\
    \ learning algorithm.\n\nHence, a cluster is usually formed by grouping similar\
    \ data points concerning a center called the centroid. Boundaries are usually\
    \ not well defined for a cluster. Based on the boundaries, clusters are classified\
    \ into crisp clusters and fuzzy clusters. Crisp clusters have a well-defined boundary,\
    \ while fuzzy clusters do not have a well-defined boundary.\n\nThe main criteria\
    \ for grouping objects into clusters are as follows:\n\n+   - Each cluster should\
    \ consist of objects similar to each other\n- Each cluster should be unlike the\
    \ other, which implies that the objects in one cluster are different from those\
    \ present in other clusters.\n\nThe clustering technique provides many advantages,\
    \ but the two most important benefits of clustering can be outlined as follows:\n\
    \n+   1. Identification and analysis of noisy data are comparatively easier.\n\
    2. Clustering facilitates the user to handle data with different types of variables.\n\
    \n# 4.3 EVALUATION METRICS FOR CLUSTERING\n\nThe main objective of clustering\
    \ is to find an intrinsic grouping pattern among a set of unlabeled data. But\
    \ how does anyone conclude that the grouping is the best? Or what constitutes\
    \ a good"
- md: "## 4.3.1 DISTANCE MEASURES\n\nAccording to the clustering process, we have\
    \ discussed that similar objects are grouped. The parameter that governs this\
    \ similarity is the *distance measure*, which is one of the vital properties measuring\
    \ the distance between two points. Thus, two or more objects are grouped into\
    \ a cluster based on the closeness of objects concerning each other. This concept\
    \ of grouping objects based on the geometric distance is called *distance-based\
    \ clustering*.\n\nEvaluating the distance between objects is completely dependent\
    \ on the type of attributes of the data. According to Kaufman and Rousseeuw (2005),\
    \ the distance function used to form clusters must satisfy the following criteria:\n\
    \n- The distance between any two objects should always be positive.\n- The distance\
    \ from an object to itself is always zero.\n- The distance is symmetric.\n- The\
    \ distance should always satisfy the triangle inequality. The distance from objects\
    \ a to b to c should be greater than the direct distance from a to c.\n\nSuppose\
    \ the dataset consists of objects having the same physical units. In that case,\
    \ the distance can be evaluated using the simple Euclidean distance metric to\
    \ group the objects into different clusters. The Euclidean distance between two\
    \ objects $x_i$ and $x_j$ in a D-dimensional space is expressed as follows:\n\n\
    $$d(x_i, x_j) = \\sqrt{\\sum_{k=1}^{D} (x_i^k - x_j^k)^2} = \\|x_i - x_j\\|$$\
    \ (4.1)\n\nIf the dataset consists of components represented in similar physical\
    \ units, then the Euclidean distance metric is the best choice to group the data\
    \ instances successfully. Euclidean distance is mostly used in cases where the\
    \ attributes of the data vectors are color components, coordinates, or numeric\
    \ types in D-dimensional Euclidean space.\n\n### 4.3.1.1 Minkowski Metric\n\n\
    If the D-dimensional space is large, then the Minkowski metric is used to evaluate\
    \ the distance. The Minkowski metric is expressed as follows:\n\n$$d(x_i, x_j)\
    \ = \\left( \\sum_{k=1}^{D} |x_i^k - x_j^k|^p \\right)^{1/p}$$\n\nwhere $D$ is\
    \ the dimensionality of the data. In *Euclidean distance*, $p = 2$, while *Manhattan\
    \ metric* has $p = 1$. As reported in the literature, there are no standard theoretical\
    \ guidelines for choosing a measure for any given application. Researchers have\
    \ formulated an appropriate measure using domain knowledge.\n\n## 4.3.2 Similarity\
    \ Measures\n\nThere are a set of similarity measures (proximity measures) to obtain\
    \ a specific clustering solution to a given set of data:\n\n### Proximity Measures\n\
    \nA proximity measure can be defined between two data points in clustering. The\
    \ term proximity refers to the similarity or dissimilarity of the samples concerning\
    \ each other. Assume $x_i$ and $x_j$ are the two data points in a set of D-dimensional\
    \ data as shown in Figure 4.3:\n\n- Similarity measure $S(x_i, x_j)$ is large\
    \ if $x_i$ and $x_j$ are similar.\n- Dissimilarity (or distance) measure $D(x_i,\
    \ x_j)$ is small if $x_i$ and $x_j$ are dissimilar.\n\nSeveral similarity measures\
    \ exist in the literature that can be used to evaluate the similarity or dissimilarity.\n\
    \n- **Vectors: cosine distance**\n  If the data is represented in the form of\
    \ vectors, then the similarity measure is evaluated using the cosine distance\
    \ according to the equation\n\n$$S(x_i, x_j) = \\frac{x_i x_j}{\\|x_i\\| \\|x_j\\\
    |}$$\n\n- **Sets: Jaccard distance**\n  If the data is represented in the form\
    \ of sets, then the similarity measure is evaluated using the Jaccard distance\
    \ given by the equation\n  $$J(A, B) = \\frac{A \\cap B}{A \\cup B} = \\frac{A\
    \ \\cap B}{|A| + |B| - |A \\cap B|}, \\text{ where } 0 \\leq J(A, B) \\leq 1 \\\
    quad (4.4)$$\n  If sets $A$ and $B$ are empty, then $J(A, B) = 1$.\n\n- **Points:\
    \ Euclidean distance**\n  If the data is represented in the form of points, then\
    \ the similarity measure is evaluated using the Euclidean distance given by the\
    \ equation\n  $$d(x_i, x_j) = \\left( \\sum_{k=1}^{D} |x_i^k - x_j^k|^p \\right)^{1/p}\
    \ \\quad (4.5)$$\n  where $p = 2$.\n\nGenerally, good proximity measures are also\
    \ application-dependent. For example, for good proximity measures, the clustering\
    \ user should not normalize the data drawn from multiple distributions.\n\n##\
    \ 4.4 CLUSTERING ALGORITHMS\n\nIn this section, a broad classification of the\
    \ clustering algorithms is presented. The classification is performed based on\
    \ the orthogonal characteristics of the data available for clustering.\n\n###\
    \ 4.4.1 HIERARCHICAL AND PARTITIONAL CLUSTERING APPROACHES\n\nIn hierarchical\
    \ clustering, similar objects in a dataset are grouped into clusters and can be\
    \ represented as *trees* of clusters. Here, any two clusters are displaced, or\
    \ one cluster includes the other like branches of a tree, hence the term hierarchical.\n\
    \nIn partitional clustering, multiple groups or partitions are formed from the\
    \ given dataset. Here, the user has to specify the number of partitions or clusters\
    \ as required for the application.\n\n### 4.4.2 AGGLOMERATIVE AND DIVISIVE CLUSTERING\
    \ APPROACHES\n\nThe agglomerative and divisive clustering methods belong to the\
    \ hierarchical clustering family and work in a reverse fashion concerning each\
    \ other. In the agglomerative approach, each object in the dataset is assigned\
    \ to its cluster based on the pairwise distance, and then, the clusters are merged.\
    \ On the contrary, in the divisive approach, all the objects in the dataset are\
    \ assigned to a unique cluster, and then, the clusters are split further from\
    \ the unique cluster.\n\n### 4.4.3 HARD AND FUZZY CLUSTERING APPROACHES\n\nEach\
    \ data object must belong to a single cluster while determining a clustering output\
    \ for a given set of data. This approach is called hard clustering. But in a real-time\
    \ scenario, the data can belong to more than one cluster since there may be many\
    \ similarity relations between the data among clusters. To address this issue,\
    \ fuzzy clustering algorithms are used with the concepts of fuzzy set theory.\
    \ The algorithm allows objects to belong to different clusters based on certain\
    \ degrees of membership. This approach is referred to as the fuzzy clustering\
    \ approach.\n\nAll the algorithms discussed so far will find a clustering result,\
    \ such that each data object must belong to a single cluster (called hard clustering).\
    \ However, in real-time scientific and industrial applications, a data object\
    \ may belong to one or more clusters. The existing clustering methods have been\
    \ extended with the concepts of fuzzy set theory to address such issues. Fuzzy\
    \ clustering algorithms allow objects to belong to several clusters simultaneously\
    \ with different degrees of membership Kutner et al. (2005).\n\n### 4.4.4 Monothetic\
    \ and Polythetic Clustering Approaches\n\nMonothetic and polythetic clustering\
    \ are mostly suitable for obtaining solutions to problems in taxonomy. The monothetic\
    \ clustering algorithm uses the features or objects of the dataset one by one\
    \ for clustering. In contrast, the polythetic clustering algorithm uses all the\
    \ dataset features at one for clustering.\n\n### 4.4.5 Deterministic and Probabilistic\
    \ Clustering Approaches\n\nIn the deterministic clustering approach, the data\
    \ objects are grouped into clusters in a deterministic manner, while in the probabilistic\
    \ approach, an object is assigned to a certain cluster based on probability.\n\
    \nThough there are different approaches used for clustering, as discussed in the\
    \ previous section, only a few successful and popular algorithms are derived from\
    \ these approaches. Therefore, the following sections will deal with the most\
    \ common clustering algorithms such as k-means clustering, fuzzy k-means clustering,\
    \ mixture of Gaussians, and density-based clustering, used for real-time applications.\n\
    \n## 4.5 k-MEANS CLUSTERING\n\nOne of the simplest and most commonly used unsupervised\
    \ learning algorithms is the k-means clustering algorithm proposed by MacQueen\
    \ in 1967. The algorithm classifies the given set of unlabeled data into a pre-defined\
    \ number of k clusters.\n\n### 4.5.1 Geometric Intuition, Centroids\n\nThe basic\
    \ aim of the k-means clustering algorithm is to define k centroids, each cluster\
    \ with one centroid, respectively. These pre-defined centroids should be placed\
    \ cleverly since the different locations of centroids give different outputs.\
    \ The better approach is to maintain the centroids as far away from each other.\
    \ Once the centroids' location is identified, the points in the dataset have to\
    \ be associated with the nearest centroid. The process is repeated until no points\
    \ are left free without association. This is specified as the first stage of grouping\
    \ or clustering. Once the first stage is done, then a new set of k new centroids\
    \ are computed. Once again, clustering is done according to the new k centroids.\
    \ The iterative process is repeated until no change is observed between the k\
    \ new centroids in the current iteration and the k centroids evaluated in the\
    \ previous iteration. Once the final clusters are formed, then the objective function\
    \ is evaluated; in this case, the objective function is to minimize the squared\
    \ error function given by the equation\n\n$$J = \\sum_{j=1}^{k} \\sum_{i=1}^{n}\
    \ \\|x_i^j - c_j^2\\|$$\n\nwhere $\\|x_i^j - c_j^2\\|$ is the distance evaluated\
    \ between the data point $x_i^j$ and the cluster center $c_j$. The above equation\
    \ gives us the information of the n data points from their respective k cluster\
    \ centers.\n\nTo minimize the objective function, the k-means clustering algorithm\
    \ should satisfy the following criterion:"
  mdcn: "## 4.3.1 距离度量\n\n根据聚类过程，我们已经讨论过相似的对象会被分组。控制这种相似性的参数是*距离度量*，它是衡量两点之间距离的关键属性之一。因此，两个或多个对象根据彼此之间的接近程度被分组到一个簇中。这种基于几何距离对对象进行分组的概念称为*基于距离的聚类*。\n\
    \n评估对象之间的距离完全取决于数据属性的类型。根据Kaufman和Rousseeuw（2005）的研究，用于形成簇的距离函数必须满足以下标准：\n\n-\
    \ 任意两个对象之间的距离应始终为正。\n- 对象到其自身的距离始终为零。\n- 距离具有对称性。\n- 距离应始终满足三角不等式。从对象a到b再到c的距离应大于从a到c的直接距离。\n\
    \n假设数据集由具有相同物理单位的对象组成。在这种情况下，可以使用简单的欧几里得距离度量来评估距离，从而将对象分组到不同的簇中。D维空间中两个对象 $x_i$\
    \ 和 $x_j$ 之间的欧几里得距离表示如下：\n\n$$d(x_i, x_j) = \\sqrt{\\sum_{k=1}^{D} (x_i^k - x_j^k)^2}\
    \ = \\|x_i - x_j\\|$$ (4.1)\n\n如果数据集由以相似物理单位表示的分量组成，那么欧几里得距离度量是成功分组数据实例的最佳选择。欧几里得距离主要用于数据向量的属性是D维欧几里得空间中的颜色分量、坐标或数值类型的情况。\n\
    \n### 4.3.1.1 闵可夫斯基度量\n\n如果D维空间很大，则使用闵可夫斯基度量来评估距离。闵可夫斯基度量表示如下：\n\n$$d(x_i, x_j)\
    \ = \\left( \\sum_{k=1}^{D} |x_i^k - x_j^k|^p \\right)^{1/p}$$\n\n其中 $D$ 是数据的维度。在*欧几里得距离*中，$p\
    \ = 2$，而*曼哈顿度量*的 $p = 1$。据文献报道，对于任何给定的应用，选择度量标准没有标准的理论指导。研究人员已利用领域知识制定了适当的度量。\n\
    \n## 4.3.2 相似性度量\n\n存在一组相似性度量（邻近度量），用于获得给定数据集的特定聚类解：\n\n### 邻近度量\n\n邻近度量可以在聚类中定义在两个数据点之间。术语“邻近度”指的是样本彼此之间的相似性或不相似性。假设\
    \ $x_i$ 和 $x_j$ 是D维数据集中的两个数据点，如图4.3所示：\n\n- 如果 $x_i$ 和 $x_j$ 相似，则相似性度量 $S(x_i,\
    \ x_j)$ 较大。\n- 如果 $x_i$ 和 $x_j$ 不相似，则不相似性（或距离）度量 $D(x_i, x_j)$ 较小。\n\n文献中存在多种相似性度量，可用于评估相似性或不相似性。\n\
    \n- **向量：余弦距离**\n  如果数据以向量形式表示，则根据以下公式使用余弦距离评估相似性度量\n\n$$S(x_i, x_j) = \\frac{x_i\
    \ x_j}{\\|x_i\\| \\|x_j\\|}$$\n\n- **集合：杰卡德距离**\n  如果数据以集合形式表示，则根据以下公式使用杰卡德距离评估相似性度量\n\
    \  $$J(A, B) = \\frac{A \\cap B}{A \\cup B} = \\frac{A \\cap B}{|A| + |B| - |A\
    \ \\cap B|}, \\text{ 其中 } 0 \\leq J(A, B) \\leq 1 \\quad (4.4)$$\n  如果集合 $A$ 和\
    \ $B$ 为空，则 $J(A, B) = 1$。\n\n- **点：欧几里得距离**\n  如果数据以点形式表示，则根据以下公式使用欧几里得距离评估相似性度量\n\
    \  $$d(x_i, x_j) = \\left( \\sum_{k=1}^{D} |x_i^k - x_j^k|^p \\right)^{1/p} \\\
    quad (4.5)$$\n  其中 $p = 2$。\n\n通常，良好的邻近度量也依赖于具体应用。例如，对于良好的邻近度量，聚类用户不应规范化从多个分布中抽取的数据。\n\
    \n## 4.4 聚类算法\n\n本节介绍了聚类算法的广泛分类。分类是基于可用于聚类的数据的正交特性进行的。\n\n### 4.4.1 层次聚类与划分聚类方法\n\
    \n在层次聚类中，数据集中的相似对象被分组到簇中，并可以表示为簇的*树*。在这里，任何两个簇是分离的，或者一个簇包含另一个簇，就像树的分支一样，因此称为层次聚类。\n\
    \n在划分聚类中，从给定数据集中形成多个组或划分。在这里，用户必须根据应用要求指定划分或簇的数量。\n\n### 4.4.2 凝聚聚类与分裂聚类方法\n\n\
    凝聚和分裂聚类方法属于层次聚类家族，并且彼此以相反的方式工作。在凝聚方法中，数据集中的每个对象根据成对距离被分配到其簇中，然后合并簇。相反，在分裂方法中，数据集中的所有对象被分配到一个唯一的簇中，然后从该唯一簇进一步分裂簇。\n\
    \n### 4.4.3 硬聚类与模糊聚类方法\n\n在确定给定数据集的聚类输出时，每个数据对象必须属于单个簇。这种方法称为硬聚类。但在实时场景中，数据可能属于多个簇，因为数据之间可能存在许多相似性关系。为了解决这个问题，使用了基于模糊集理论概念的模糊聚类算法。该算法允许对象根据一定的隶属度属于不同的簇。这种方法被称为模糊聚类方法。\n\
    \n到目前为止讨论的所有算法都将找到一个聚类结果，使得每个数据对象必须属于单个簇（称为硬聚类）。然而，在实时科学和工业应用中，一个数据对象可能属于一个或多个簇。现有的聚类方法已经通过模糊集理论的概念进行了扩展，以解决此类问题。模糊聚类算法允许对象同时属于多个簇，并具有不同的隶属度（Kutner等人，2005）。\n\
    \n### 4.4.4 单一特征聚类与多特征聚类方法\n\n单一特征聚类和多特征聚类大多适用于获得分类学问题的解决方案。单一特征聚类算法一次使用数据集的一个特征或对象进行聚类。相比之下，多特征聚类算法一次使用所有数据集特征进行聚类。\n\
    \n### 4.4.5 确定性聚类与概率性聚类方法\n\n在确定性聚类方法中，数据对象以确定性方式分组到簇中，而在概率性方法中，对象根据概率被分配到某个簇。\n\
    \n尽管如前一节所述，聚类使用了不同的方法，但只有少数成功且流行的算法源自这些方法。因此，以下部分将讨论最常用的聚类算法，例如k-means聚类、模糊k-means聚类、高斯混合模型和基于密度的聚类，这些算法用于实时应用。\n\
    \n## 4.5 k-MEANS 聚类\n\n最简单和最常用的无监督学习算法之一是k-means聚类算法，由MacQueen于1967年提出。该算法将给定的无标签数据集分类为预定义数量的k个簇。\n\
    \n### 4.5.1 几何直觉，质心\n\nk-means聚类算法的基本目标是定义k个质心，每个簇对应一个质心。这些预定义的质心应巧妙地放置，因为质心的不同位置会产生不同的输出。更好的方法是使质心彼此尽可能远离。一旦确定了质心的位置，数据集中的点就必须与最近的质心关联。重复此过程，直到没有点处于未关联状态。这被指定为分组或聚类的第一阶段。第一阶段完成后，计算一组新的k个质心。再次根据新的k个质心进行聚类。重复迭代过程，直到观察到当前迭代中的k个新质心与上一次迭代中评估的k个质心之间没有变化。一旦形成最终簇，就评估目标函数；在这种情况下，目标函数是最小化由以下公式给出的平方误差函数\n\
    \n$$J = \\sum_{j=1}^{k} \\sum_{i=1}^{n} \\|x_i^j - c_j^2\\|$$\n\n其中 $\\|x_i^j\

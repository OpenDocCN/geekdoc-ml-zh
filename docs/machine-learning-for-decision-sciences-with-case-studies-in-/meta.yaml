    # 2.5.3.10 Broadcasting


    Numpy uses broadcasting to carry out arithmetic operations between arrays of different
    shapes. In this method, Numpy automatically broadcasts the smaller array over
    the larger array. Though broadcasting can help carry out mathematical operations
    between different-shaped arrays, they are subject to certain constraints as listed
    below.


    When Numpy operates on two arrays, it compares their shapes element-wise. It finds
    these shapes compatible only if:


    +   - Their dimensions are the same or

    - One of them has a dimension of size 1.

    - If these conditions are not met, a “ValueError” is thrown, indicating that the
    arrays have incompatible shapes.


    ```

    import numpy as np

    a = np.array([1,2,3,4])

    b = np.array([10,20,30,40])

    c = a * b

    c

    ##OUTPUT -->array([ 10,  40,  90, 160])

    ```


    ```

    a = np.array([5])

    a

    ##OUTPUT -->array([5])

    ```'

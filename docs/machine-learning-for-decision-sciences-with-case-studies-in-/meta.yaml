    | 4 | >40 | 中 | 是 |

    | 5 | >40 | 低 | 是 |

    | 6 | >40 | 低 | 否 |

    | 7 | 31 ... 40 | 低 | 是 |


    其中

    $I(X; Y)$ 是 $X$ 和 $Y$ 的互信息

    $H(X)$ 是 $X$ 的熵

    $H (X|Y)$ 是给定 $Y$ 时 $X$ 的条件熵。


    两个类别的互信息 $= -4 / 7 \log_2 (4 / 7) - 3 / 7 \log_2 (3 / 7)$

    $= 4 / 7\log_2 (0.571) - 3 / 7\log_2 (0.48)$

    $= 4 / 7(0.808) + 3 / 7(1.05)$

    $= 0.461 + 0.45$

    $= 0.911$



    # 4.3.1 DISTANCE MEASURES


    According to the clustering process, we have discussed that similar objects are
    grouped. The parameter that governs this similarity is the *distance measure*,
    which is one of the vital properties measuring the distance between two points.
    Thus, two or more objects are grouped into a cluster based on the closeness of
    objects concerning each other. This concept of grouping objects based on the geometric
    distance is called *distance-based clustering*.

    Evaluating the distance between objects is completely dependent on the type of
    attributes of the data. According to Kaufman and Rousseeuw (2005), the distance
    function used to form clusters must satisfy the following criteria:


    +   - The distance between any two objects should always be positive

    - The distance from an object to itself is always zero

    - The distance is symmetric

    - The distance should always satisfy the triangle inequality. The distance from
    objects a to b to c should be greater than the direct distance from a to c.


    Suppose the dataset consists of objects having the same physical units. In that
    case, the distance can be evaluated using the simple Euclidean distance metric
    to group the objects into different clusters. The Euclidean distance between two
    objects $x_i$ and $x_j$ in a D-dimensional space is expressed as follows:


    $$d(x_i, x_j) = \sqrt{\sum_{k=1}^{D} (x_i^k - x_j^k)^2} = \|x_i - x_j\|$$ (4.1)


    If the dataset consists of components represented in similar physical units, then
    the Euclidean distance metric is the best choice to group the data instances successfully.

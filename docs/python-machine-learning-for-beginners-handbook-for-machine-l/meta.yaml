- md: '## Getting started with the basics of TensorFlow


    Since we have spent some time talking about the vectors and some of the things
    that you will need to know to get started here, you will now need to take some
    time to learn how to get TensorFlow all set up and ready to use some of the basics.
    We already talked how to install TensorFlow in an earlier chapter, so now it is
    time to take a look at how to actually work with this program.


    You are generally going to write with TensorFlow programs, which you will run
    as a chunk. This is, when you look at it first, kind of contradictory, when you
    want to write out your programs in Python. However, if you are able to, or if
    you find it a bit easier, you can choose to work with TensorFlow''s Interaction
    Session, which you can use to work more interactively within this same library.
    This can even be helpful when you want to work with IPython.


    For what we are going to talk about in this section, we will want to put our focus
    on using the second option. This is going to help you to get a nice start with
    using the process of deep learning in TensorFlow. But before we get into some
    of the hard stuff and all the cool things that you are able to do with TensorFlow,
    we need to start out with some of the basic stuff to make it easier.


    To do any of the basics, we need to first import the tensorflow library under
    the alias of “tf”, as we did before. We will then be able to initialize two variables
    that are going to be constants. Then you need to pass an array of four numbers
    using the function of “constant()”.


    It is possible that you could go through and pass in an integer if you would like.
    But for the most part, working with and trying to pass an array is going to be
    easier and will work the best for your needs. Tensors are often about arrays so
    this is why it is better to use them.


    Once you have put in the integer, or more likely the array, that you want to use,
    it is time to use the function of “multiply()” to get the variables to multiply
    together. Store the result as the “result” variable. And last, print out the result
    using the function of print().


    Keep in mind that if you have defined the constants in the DataCampLight code.
    However, there are a few other value types that you can work with in this, namely
    known as the placeholders. These placeholders are important because they are going
    to be values that are unassigned and that can be initialized by the session where
    you choose to let it run. Like the name is giving away, the placeholder for a
    particular tensor that you want to work with will be fed when the session actually
    runs.


    You can also work with variables. These are options that are going to have values
    that can change. The constants, though, are the values that you won’t be able
    to change. If you want to make sure that no one can come in later on and make
    some changes to the values that you have in the equation, then you would want
    to work with the constants. If the fact that the values can change on occasion
    isn’t that big of a deal to you, or you want the ability for the value to be changed,
    then you can work more with variables.


    The results of the code that you write is going to end up with an abstract tensor
    in the computational graph. However, even though it may seem a bit contradictory
    in the process, the results with this aren’t going to be calculated. It is just
    going to go through and define the model, but there wasn’t a process ran in order
    to calculate the result.


    ## Belgian Traffic Signs



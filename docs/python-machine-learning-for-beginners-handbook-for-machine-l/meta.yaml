    # When do we work with the KNN algorithm?


    You can use this algorithm for both regression and classification problems of
    prediction, which can make it really powerful and useful. With that said, it is
    going to be used the most with classification problems in your industry. There
    are three important things that you need to consider when you want to evaluate
    the technique and these include:


    +   - How easy it is to interpret the output that you have.

    - The calculation of time.

    - Predictive power.


    When the KNN algorithm is compared to some of the other algorithms, including
    random forests, CART, and logistic regression, you will see that it can fair well
    across all of the parameters and considerations. Often this algorithm is going
    to be used because it is easy to interpret the results that it provides, and the
    calculation is going to be lower.


    # How does this algorithm work?


    There are a few steps that you are able to follow when it comes to using the KNN
    algorithm. Some of these steps include:'

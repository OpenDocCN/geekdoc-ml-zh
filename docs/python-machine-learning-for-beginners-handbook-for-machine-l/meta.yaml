    the solution they want to use. However, there can possibly be times when your
    learner is going to end up with a reward that is higher than what the average
    is for their trials. This is a bigger issue with the SARSA compared to some of
    the other algorithms that you have.


    There are also going to be times when the learner ends up not going with the optimal
    path either. Depending on how the program decides to react to this, it could bring
    up some issues with how they learn and how the program is going to behave for
    them.'

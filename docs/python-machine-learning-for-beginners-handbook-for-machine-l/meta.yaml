  md: 'There are three main types of algorithms that all the learning algorithms of
    machine learning can be. These include supervised learning, unsupervised learning,
    and reinforced learning.


    # Supervised machine learning


    The first type of learning that we are going to take a look at is known as supervised
    learning. This is the kind where the human using the system is going to need to
    provide the input and the output that are desired, and you need to furnish the
    feedback to the system, based on how accurate the systems predictions are during
    the process of training. This basically means that the trainer needs to show a
    bunch of examples to the system, and shows them what is going to work and what
    isn''t a good answer, so that the system has time to learn along the way.


    After the completion of the training, the algorithm will need to apply what it
    learned from the data earlier on to make the best predictions. The concept that
    comes with supervised learning can be seen to be similar to learning under the
    supervision of a teacher to their students. The teacher is going to give a lesson
    to the students with some examples, and then the student is going to derive the
    new rules and knowledge from these examples. They can then take the knowledge
    and apply it to different situations, even if they don''t match up directly to
    the examples that the teacher gives.


    When we are looking at supervised machine learning, it is also a good thing to
    know the difference between the classification problems and the regression problems.
    A regression problem is'
  merge: -1
  pgno: 11
- img_proc: true

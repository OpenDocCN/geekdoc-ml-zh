    ## Recommendations after shopping


    Going through large amounts of data about finances and customers and making accurate
    predictions about what the company should do to increase profits and happy customers
    along the way.


    These are just a few of the examples of when you would want to start utilizing
    a program that needs to be able to act on its own. Many of the traditional programs
    that you are going to learn how to use as a beginner are going to be much simpler
    than this. They will tell the computer exactly what it should do in a given situation.
    This works great for a lot of programs, but for things like artificial intelligence,
    it is not going to be enough.


    With traditional coding, you will be able to figure out, or at least limit the
    choices, that the other person is going to give to you. And then you can add in
    a catch all at the end in case the other person puts in something else. For example,
    if your program has the question “What is 2 + 2?” You would then have a response
    to if they picked 4 as the answer, and then another answer to handle any other
    inputs that the user put into the system.


    But this doesn’t always work the best if you are working with some of the programs
    that work the best with machine learning. For example, if you are doing a search
    engine, you won’t be able to guess each and every query that the user is going
    to make. If you are using voice recognition on Alexa, you won’t be able to figure
    out each request, and how each dialect is going to sound to the machine, ahead
    of time. This is why machine learning can come into play and is so important.


    ## The importance of Python


    While we will take a look at Python and how it works in a bit, it is important

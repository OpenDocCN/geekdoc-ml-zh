    # Chapter 12: Working with Recurrent Neural Networks


    ![](img/98b44ff7f124fd812f4dbf856d56928b_96_0.png)


    When we are looking at the human brain, it is reasonable to understand that we
    don’t restart our thinking from nothing each second. You will keep building up
    on what you have learned in the past, whether it is from your childhood, or from
    something that you learned a few seconds ago. As you read through the different
    parts of this guidebook, you will understand each of the words, based on how much
    understanding you had of the words that were there before. You won’t just see
    a word and then throw it away, and then start over with your thinking from the
    beginning. It basically shows that your thoughts have some persistence and consistency
    with them.


    A traditional neural network on machine learning isn’t able to do this. And this
    can prove to be a big shortcoming in many cases. For example, if you want to take
    the time to classify the kind of event that is happening at each point of the
    movie, it is really hard to figure out how some of the traditional neural network
    could use its reasoning about events that happened earlier in the film in order
    to inform what happens later on.'
- md: 'The good news is that these recurrent neural networks that we are going to
    take a look at here are able to address this kind of issue in machine learning.
    They are networks that have some loops in them, which allows the information to
    persist. In this method, a loop is going to allow information to be passed from
    one part of the network will move over to the next. A recurrent neural network
    can be the similar idea as having multiple copies of the same network, with each
    message over to the successor.


    This chain like nature is going to reveal that recurrent neural networks are going
    to be intimately related to lists and sequences. They are the natural architecture
    of a neural network to use for such data. And they will be used quite a bit. In
    the past few years, there is going to be a lot of success when you apply these
    to a variety of machine learning problems including image captioning, translation,
    language modeling, and speech recognition.


    One of the glaring limitations that come with the vanilla neural networks is that
    their API is going to have a lot of constraints on it. They are only able to accept
    a fixed sized vector as their input, and then they can only produce a fixed sized
    vector as the output. But this is just one of the problems. These models are going
    to perform this mapping with a fixed amount of computational steps, which equals
    the number of layers that you will be able to see in the model.


    The main reason that these recurrent options are going to add some more excitement
    into what you can do is because they allow the programmer to operate their work
    over a sequence of vectors. This includes sequences in the input, the output,
    and usually with both.


    ![](img/98b44ff7f124fd812f4dbf856d56928b_98_0.png)


    Let’s take a look at the chart above. Each of the rectangles that are there are
    going to be a vector and the arrows are going to show us the functions. The input
    vectors are going to show up in red, and then the output vectors that we need
    to know are going to be in blue. And then the green vectors will hold onto the
    RNN state (which we are going to talk about in a minute). Going from the left
    over to the right, let’s take a look at how each of these work:


    The first one is going to be the vanilla mode of processing, the one that doesn’t
    use the RNN at all. This is going to include an input that is fixed, and an output
    that is fixed. This is also known as image classification.


    Sequence output is going to be the second part. This is going to be image captioning
    that is able to take an image and then will provide you with an output of a sentence
    of words.


    Sequence input: This is going to be the third picture above. It is going to be
    more of a sentiment analysis that shows us a given sentence and makes sure that
    it is classified as either a negative or positive sentiment.


    Sequence output and sequence output. You can find this one in the fourth box,
    and it is getting a bit closer to what we want. This one is going to be similar
    to a machine translation. This is when the RNN is able to read a sentence out
    in English, and then can take that information and provide you with an output
    that reads the sentence in French.


    And finally, the last box is going to be the synced sequence input and output.
    The video classification here is going to help us to label out each of the frames
    that occur in a video if we decide to.


    Notice that in each of these, there aren''t going to be any constraints put on
    the lengths of the sequences that we have to specify ahead of time. This is because
    the recurrent transformation, which is going to be shown in green, is fixed, and
    we are able to apply it out as many times as we would like, or as many times as
    work with our project.


    ## An example of using RNN


    In this example, we are going to take some time to train the RNN character level
    language model. What this means is that we are going to give the RNN a big amount
    of text, and then we are going to ask it to model the probability of distribution
    of the next character in the sequence, given a sequence of previous characters.
    This is a good thing to work on because it ensures that we are able to generate
    some new text, going with just one character at a time.


    As an example, suppose that we had a really limited vocabulary to work with, and
    just four possible letters, of helo. With this information, we want to train the
    RNN to do a training sequence of “hello” instead. This training sequence is going
    to be a source of four separate training examples. This may sound a bit complex
    when we are first getting started, but we will take this step by step to help
    you see how it works. Some of the things to consider to get this started includes:


    - The probability of getting “e” should be just as likely to occur as getting
    the letter “h”.

    - “l” should be likely in the context of “he”

    - The “l” should also be likely if the system is given the context of “hel”

    - “o” should be likely if the other sequences have happened and the context of
    “hell” is in place.


    Now we are going to encode each of the characters that occur in the vector working
    with the one-hot encoding (this is going to mean that we will use all zeroes except
    for a single one at the index of the character in the vocabulary). We will then
    be able to feed them into the RNN, doing so one at a time, using the function
    for step to make this happen.


    Once all of this has gotten into place, we are going to observe a sequence of
    4-dimensional output vectors, with one dimension showing up for each character,
    which we can then interpret as the confidence that the RNN is able to assign right
    now to each of the characters that come up in the next sequence at a time.


    Let’s take a look at a diagram that can show up when it is time to run this kind
    of sequence.


    ![](img/98b44ff7f124fd812f4dbf856d56928b_101_0.png)


    Out of this, we may use an example of seeing that in the first time step, the
    RNN would see the character of “h” it was able to assign some confidence to this
    of 1.0, to the next letter turning into “h”, 2.2 to getting the letter “e” -3.0
    to “l” and 4.1 to “o”. Since the training data that we are using, (which is the
    string of hello that we talked about above), had the next right character being
    “e” we want to increase the confidence, or the green color, and then decrease
    how confident it is in all of the other letters, which are going to be shown in
    the red above.


    In addition, we are going to need to take another step and come up with a desired
    target character at every one of the four time steps that we want the network
    to assign a great confidence to. This takes a bit more time to accomplish, but
    it can be really helpful because it helps us to get the right amount of confidence
    that the system is able to assign the right letters at the right time.


    Since we are working with RNN and it is going to consist entirely of the differentiable
    operations, we are able to use the back-propagation algorithm. What this is includes
    a recursive application of the chain rule from calculus. We are able to use this
    in order to figure out what direction we are able to adjust all of the weights
    in order to ensure that we have been able to increase the scores of the correct
    targets, which are going to be the green and bold numbers.


    Once we have been able to do this, we are able to work on what is known as a parameter
    update. This is going to nudge all the weights a tiny amount into the direction
    that we want. If we are able to make sure that the inputs we feed into the RNN
    are the same after each of the updates of the parameter, we will find that the
    scores of the correct characters, would end up being a big higher (meaning it
    would go from a 2.2 up to a 2.4) and that the incorrect characters would go down
    a little bit.


    Now, you may need to go through and repeat this process over and over again quite
    a few times in order to make it work. The number of times that this has to happen
    is going to depend on how complex the system is. Since we are working with a simple
    word of hello here, you probably won’t have to do it too much. But since machine
    learning is going to be a big programming technique and it can get complicated,
    it is possible that you will need to do this many times. You will want to repeat
    the process.'
  mdcn: '好消息是，我们接下来要探讨的这些循环神经网络能够解决机器学习中的这类问题。它们是包含一些循环结构的网络，这使得信息得以持续存在。在这种方法中，循环允许信息从网络的一部分传递到下一部分。循环神经网络可以类比为拥有同一网络的多个副本，每个副本将信息传递给后继者。


    这种链式特性表明，循环神经网络与列表和序列密切相关。它们是处理此类数据的神经网络的自然架构，并且将被广泛使用。在过去几年中，将这些网络应用于各种机器学习问题（包括图像描述、翻译、语言建模和语音识别）取得了巨大成功。


    普通神经网络的一个显著局限是其API存在诸多限制。它们只能接受固定大小的向量作为输入，并且只能产生固定大小的向量作为输出。但这只是问题之一。这些模型以固定的计算步骤执行映射，该步骤数等于模型中可见的层数。


    循环神经网络之所以能为你的工作增添更多可能性，主要原因在于它们允许程序员在向量序列上进行操作。这包括输入序列、输出序列，通常两者兼有。


    ![](img/98b44ff7f124fd812f4dbf856d56928b_98_0.png)


    让我们看看上面的图表。每个矩形代表一个向量，箭头表示函数。输入向量显示为红色，我们需要了解的输出向量显示为蓝色。绿色向量将保存RNN状态（我们稍后会讨论）。从左到右，让我们看看每个部分是如何工作的：


    第一个是普通处理模式，完全不使用RNN。这包括固定的输入和固定的输出。这也被称为图像分类。


    序列输出是第二部分。这是图像描述，能够接收图像并为你提供一个句子的输出。


    序列输入：这是上面的第三张图。它更像情感分析，向我们展示一个给定的句子，并确保它被分类为负面或正面情感。


    序列输入和序列输出。你可以在第四个框中找到这个，它更接近我们想要的。这个类似于机器翻译。当RNN能够读取一个英语句子，然后利用这些信息为你提供一个法语句子的输出时，就是这种情况。


    最后，最后一个框是同步序列输入和输出。这里的视频分类将帮助我们标记视频中出现的每一帧（如果我们决定这样做的话）。


    请注意，在所有这些情况中，我们都不需要提前指定序列的长度限制。这是因为循环变换（将显示为绿色）是固定的，我们可以根据需要应用任意多次，或者根据项目需要应用任意多次。


    ## 使用RNN的一个例子


    在这个例子中，我们将花一些时间训练一个字符级语言模型的RNN。这意味着我们将给RNN大量的文本，然后要求它建模序列中下一个字符的概率分布，给定前面字符的序列。这是一个很好的练习，因为它确保我们能够生成一些新文本，一次只生成一个字符。


    例如，假设我们有一个非常有限的词汇表，只有四个可能的字母：h、e、l、o。有了这些信息，我们想训练RNN来处理训练序列“hello”。这个训练序列将作为四个独立的训练样本的来源。刚开始时这可能听起来有点复杂，但我们将一步一步地帮助你理解它是如何工作的。开始时需要考虑的一些事情包括：


    - 获得“e”的概率应该与获得字母“h”的可能性一样大。

    - 在“he”的上下文中，“l”应该是可能的。

    - 如果系统给定“hel”的上下文，“l”也应该可能是下一个字符。

    - 如果其他序列已经发生并且“hell”的上下文存在，“o”应该是可能的。


    现在我们将使用独热编码对向量中出现的每个字符进行编码（这意味着除了词汇表中字符索引处的一个1之外，我们将使用所有零）。然后我们将能够将它们输入RNN，一次一个，使用step函数来实现这一点。


    一旦所有这些都到位，我们将观察到一个4维输出向量的序列，每个字符对应一个维度，我们可以将其解释为RNN当前对下一个序列中每个字符的置信度。


    让我们看看运行这种序列时可能出现的图表。


    ![](img/98b44ff7f124fd812f4dbf856d56928b_101_0.png)


    从中，我们可能会看到一个例子：在第一个时间步，RNN看到字符“h”，它能够为下一个字母变成“h”分配1.0的置信度，为获得字母“e”分配2.2，为“l”分配-3.0，为“o”分配4.1。由于我们使用的训练数据（即我们上面讨论的字符串“hello”）中下一个正确的字符是“e”，我们希望增加置信度（即绿色），然后降低它对所有其他字母的置信度（这些字母将显示为红色）。


    此外，我们需要采取另一个步骤，在四个时间步中的每一个都提出一个我们希望网络分配高置信度的目标字符。这需要更多时间来完成，但它非常有帮助，因为它帮助我们获得系统能够在正确时间分配正确字母的正确置信度。


    由于我们使用的是RNN，并且它完全由可微操作组成，我们能够使用反向传播算法。这包括微积分中链式法则的递归应用。我们能够使用它来确定我们可以调整所有权重的方向，以确保我们能够提高正确目标的分数（这些目标将是绿色和粗体数字）。


    一旦我们能够做到这一点，我们就可以进行所谓的参数更新。这将把所有权重向我们想要的方向微调一点。如果我们能够确保在每次参数更新后输入到RNN的输入是相同的，我们会发现正确字符的分数最终会高一点（例如从2.2上升到2.4），而不正确字符的分数会下降一点。


    现在，你可能需要多次重复这个过程才能使其工作。需要重复的次数取决于系统的复杂程度。由于我们这里处理的是简单的单词“hello”，你可能不需要做太多次。但由于机器学习是一个重要的编程技术，它可能变得复杂，你可能需要多次这样做。你会想要重复这个过程。'

  md: '# Chapter 6: K-Nearest Neighbors Algorithm


    One of the algorithms that we are going to focus on is the K-Nearest Neighbors
    Algorithm, or KNN. This is a type of supervised machine learning so we get some
    time to look at how this works as well. When you work with the KNN algorithm,
    you are going to use it to search through the data that you have for k most similar
    examples of any kind of instance that you are trying to work with. Once you are
    able to do this and see some success, then the KNN algorithm will move on to look
    through all of the information that you have and will summarize it. Then the algorithm
    will use the results that you receive in order to make some predictions for that
    instance.


    Any time that you bring out the KNN algorithm model, you will find that your learning
    is going to become more competitive. The reason that this is going to work because
    there is some competition between the different parts, or the different elements,
    in various models so that you get the best predictions based on the data on hand.


    The KNN algorithm is going to work a bit different than a few of the other algorithms
    that we are going to discuss in this guidebook. In some instances, it is seen
    as a lazier approach to learning, mainly because it isn''t going to create any
    of the models that you need, until you go in and ask it for a new predictions.
    Depending on the situation you are working with, this can be a good thing because
    waiting to make new predictions ensures that the data you have at hand, and the
    data you are'
  merge: -1
  pgno: 45
- img_proc: true
  md: 'using for these predictions is always relevant for the tasks that you want.


    If the program went through and just tries to do predictions on regular intervals,
    or each time that you put in new data, this can be helpful in some situations.
    But if you want to see what happens in certain situations, or you want to just
    look at a certain customer group, having this happen all the time, or update with
    all the information rather than just the information that you want, will make
    you miss out on things. The KNN algorithm can help out with this.


    There are a lot of benefits that come when you decide to work with the KNN algorithm.
    When you are working with this, you are able to cut through some of the noise
    that comes with your data set. This noise can be really loud if you have a lot
    of data to go through, and getting rid of some of that noise can make a big difference
    in the information that you are able to get. And if you are trying to handle and
    go through larger amounts of data all at once, then this is the algorithm that
    you should choose. Unlike some of the others that are going to be more limited
    on the amount of data they can sort through, the KNN algorithm doesn''t have this
    kind of issue, and you are able to use it on large and small data sets.


    One of the biggest issues that can come when you use this algorithm is that the
    computational costs are going to be higher. This is especially true when you compare
    it to some of the other algorithms that are available to do the same thing. The
    reason that the computational costs are going to be higher is because'

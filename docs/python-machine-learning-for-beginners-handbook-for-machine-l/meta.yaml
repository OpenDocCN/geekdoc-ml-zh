    is going to be a class or a tag. A regression task can help to determine the average
    cost of all the homes in a town, while the classification would help to determine
    what type of flower is in the picture based on the length of their petals.


    Supervised learning is going to occur when you pick out an algorithm that is able
    to learn the right response to the data a user inputs to it. There are several
    ways that supervised machine learning can do this. It can look at examples and
    other targeted responses that you provide to the computer. You could include values
    or strings of labels to help the program learn the right way to behave.


    This is a simple process to work with, but an example to look at is when a teacher
    is teaching their students a new topic and they will show the class examples of
    the situation. The students would then learn how to memorize these examples because
    the examples will provide general rules about the topic. Then, when they see these
    examples, or things that are similar, they know how to respond. However, if an
    example is shown that isn’t similar to what the class was shown, then they know
    how to respond as well.



    Load the data into the algorithm for it to read through.

    Initialize the value that you are going to use and rely on for k.

    When you are ready to get the predicted class, iteration from one to total number
    of the data points that you use for training, you can use the following steps
    to help.


    Start by calculating the distance that is in between each of your test data, and
    each row of your training data. We are going to work with the Euclidean distance
    as our metric for distance since it''s the most popular method. Some of the other
    metrics that you may choose to work with here include the cosine and Chebyshev.


    +   - Sort the calculated distances going in ascending order, based on their distance
    values.

    - Get the k rows from the sorted array.

    - Get the most frequent class for these rows.

    - Return back the class prediction.


    # Why is KNN non-parametric?


    When we take a look at non-parametric, it means that we are not making any assumptions
    of the way that the distribution of the underlying data is done. Non-parametric
    methods don''t need to have a fixed number of parameters in the model. In a similar
    manner, when you work with KNN, the model parameters will actually grow with the

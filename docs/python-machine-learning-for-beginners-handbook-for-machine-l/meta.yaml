    place causing some issues.

    - It is an easy algorithm to work with. It is easy to understand, especially if
    you are brand new to the machine learning process.


    However, there are more options of algorithms that you are able to work with because
    the KNN algorithm isn''t going to be perfect in each and every situation that
    you go to. Some of the negatives that come with using the KNN algorithm includes:


    - It is going to be computationally and memory intensive expensive.

    - If you don''t have the right system and the right amount of space to work with

    Anaconda 还有一个非常独特的地方，你可能想了解一下，以便它能帮助你进行机器学习。它帮助我们借助 `conda` 包创建一个属于你自己的虚拟 Python
    环境。这个虚拟环境将是 Python 的一个隔离副本，能够维护其所需的所有文件、所有路径和所有目录。这是一件很棒的事情，因为它将允许你执行所有这些操作，并使用特定版本的
    Python 或任何你想要的其他库，而不会对你正在处理的其他项目产生负面影响。


    这些虚拟环境将非常棒，因为它们为用户提供了一种隔离项目的方式，然后你可以避免因不同组件的不同版本要求和依赖关系而可能出现的问题。请注意，这是一个与你已下载的普通
    Python 环境不同的环境。这一点很重要，因为它确保了虚拟环境不会对你使用 Python 进行的任何普通项目产生任何影响，无论是好的还是坏的影响。


    此时，我们将致力于为 TensorFlow 包创建一个虚拟环境。这可以在 `conda create` 命令的帮助下完成。由于我们将创建一个名为 `tensorenviron`
    的环境，你将使用以下语法：


    ```

    conda create -n tensorenviron

    ```


    此时，程序将询问你是否希望允许创建环境的过程继续，或者是否希望取消你正在进行的工作。你需要输入 `y`，然后按回车键继续。这将允许安装继续成功进行，以看到你想要的结果。


    在你创建了这种环境之后，你需要花时间激活它。没有正确的激活，你将无法使用你设置的新环境。激活将通过 `activate` 命令完成。然后你将列出你想要使用的环境名称。一个如何调出你刚刚创建的环境的例子包括：


    ```

    activate tensorenviron

    ```


    现在你已经能够激活 TensorFlow 环境，是时候确保 TensorFlow 包也被安装了。你可以通过使用以下命令来完成此操作：


    ```

    conda install tensorflow

    ```


    从这里，计算机将向你展示所有可以与 TensorFlow 包一起安装的不同包的列表（如果你愿意的话）。系统会提示你决定是否要安装这些包。然后你可以输入 `y`
    并按键盘上的回车键。


    一旦你同意这样做，该包的安装将立即开始。但是，请注意这个特定的安装过程会花费一些时间，所以你需要耐心等待。然而，你的互联网连接速度将决定安装过程所需的时间。进度以及安装已完成和尚未完成的部分将在提示窗口中显示。


    一段时间后，安装过程将完成，然后你可以花时间确定安装过程是否成功。这很容易做到，因为你只需在 Python 中运行 `import` 语句。该语句将从 Python
    的常规终端执行。如果你使用 Anaconda 提示符执行此操作，只需输入 `python` 并按回车键。这将确保你进入 Python 终端，然后你可以运行以下
    `import` 语句：


    ```

    import tensorflow as tf

    ```


    如果你发现该包没有以正确的方式安装，在你执行此代码后，屏幕上最终会出现错误消息。如果你没有看到错误消息，那么你就知道该包的安装是成功的。



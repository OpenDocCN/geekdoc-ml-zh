- img_proc: true
  md: 'The good news is that these recurrent neural networks that we are going to
    take a look at here are able to address this kind of issue in machine learning.
    They are networks that have some loops in them, which allows the information to
    persist. In this method, a loop is going to allow information to be passed from
    one part of the network will move over to the next. A recurrent neural network
    can be the similar idea as having multiple copies of the same network, with each
    message over to the successor.


    This chain like nature is going to reveal that recurrent neural networks are going
    to be intimately related to lists and sequences. They are the natural architecture
    of a neural network to use for such data. And they will be used quite a bit. In
    the past few years, there is going to be a lot of success when you apply these
    to a variety of machine learning problems including image captioning, translation,
    language modeling, and speech recognition.


    One of the glaring limitations that come with the vanilla neural networks is that
    their API is going to have a lot of constraints on it. They are only able to accept
    a fixed sized vector as their input, and then they can only produce a fixed sized
    vector as the output. But this is just one of the problems. These models are going
    to perform this mapping with a fixed amount of computational steps, which equals
    the number of layers that you will be able to see in the model.


    The main reason that these recurrent options are going to add some more excitement
    into what you can do is because they'
  merge: -1
  pgno: 97

    is known as Department, and inside this, there are going to be five categories
    or levels that are unique. Because of this, each of the dummy variables has 1
    against its department and else 0.


    ## How to find the best K value?


    A good way to figure out the most optimal value of K is to do some cross-validation.
    It is going to be important to use this cross-validation in order to estimate
    the validation error. To do this, you will hold out a subset of the training set
    from the model building process.


    Cross-validation (let’s say that it is 10 fold validation), will involve you going
    through and randomly dividing up the training set into 10 groups, which are also
    known as folds, while trying to keep them close to equal in size. From that, 90
    percent of the data is going to be used to train the model of your choice, and
    then the rest of the ten percent is going to be used in order to validate the
    model that you use.


    The misclassification rate that you are going to need to work with is going to
    be computed using that ten percent that you saved back for the validation data.
    This procedure is going to need to go through and repeat itself ten different
    times. Each of the different groups of observations that you run into are going
    to be treated as a validation set each of the ten times that you go through with
    it. It is going to be a result to 10 estimates of the validation error, which
    are then going to be averaged out.


    ## Chapter 7: What is K-Means Clustering?


    The next item on the list to discuss is the idea of k-means clustering. This is
    a pretty basic idea when it comes to machine learning, and it is going to do some
    to machine learning, but it is going to go a long way to helping you see some
    results with your programming. The basic idea with this is that you can take a
    lot of the data in your system that hasn''t been labeled, and then put them together
    in a group of their own clusters.


    Clustering is going to fall under the category of an algorithm that is unsupervised
    machine learning. It is going to be applied when the data that you have doesn''t
    come with any labels on it. The goal of this kind of algorithm is to ensure that
    you are able to identify the groups or the clusters that are found inside your
    data.


    The idea of working with these clusters is that the objects that end up in the
    same cluster are going to be very closely related to one another, and have fewer
    similarities to the items that are in some of the other clusters. The similarity
    here is going to be a metric that can reflect the strength of the relationship
    between these two objects of data.


    You may find that this clustering is going to be applied highly in the use of
    data mining, especially if it is exploratory. It could also have uses in other
    kinds of fields including computer graphics, bio-informatics, data compression,
    image analysis, information retrieval, machine learning, and pattern recognition.


    The algorithm is going to form some clusters of data that is based on how similar
    the data values are. You are then required to specify the value of K, which are
    the number of clusters that you expect the algorithm to make out of the data.
    The algorithm will start out by selecting a centroid value for each of these clusters.
    And then it is going to go through three steps in an iterative manner includes:


    - You will want to start with the Euclidian distance between each data instance
    and the centroids for all of the clusters.

    - Assign the instances of data to the cluster of centroid with the nearest distance
    possible.

    - Calculate the new centroid values, depending on what the mean values of the
    coordinates of the data instances from the corresponding cluster.


    ## How to work with k-means clustering?


    For this, the input that you use for the k-means is just going to be found in
    matrix X. for the most part, you will be able to add in some kind of organization
    of your choice to ensure that each of the rows you create will be a different
    sample, while each of the columns are going to include a different kind of feature
    or factor. To make this happen, there are going to be two main steps that you
    must follow to get the k-means algorithm.


    For the first step, it is time to choose the centers that you want to use for
    these clusters. If you are not sure about which centers are going to work the
    best for you, it is fine if you just go with a random point and use that as your
    center for this time. if it seems a little bit off after some time, you can go
    back through and make changes later.


    The second step is going to be with the main loop. After you have your centers
    chosen, it is time for you to decide which cluster each of your points will belong
    to. You can look at all of the samples that you have and then choose the center
    of the cluster that fits into it the best.


    From here, you will be able to spend some time re-calculating the cluster centers.
    In this part, you are going to do this based on the center points that you assigned
    to each part. This is pretty simple because it is done when you take all of your
    samples and then figure out what the mean of those samples are. And once you are
    able to come up with an answer to this, you will have the k-mean.


    You are going to continue to do this until you get the algorithm to converge.
    There are no more changes in the cluster centers or assignments. For the most
    part, this will happen in five steps or less. You should notice that this is going
    to be very different from the gradient descent that you will see in deep learning,
    which could end up with many iterations before they end up with a convergence.


    To understand what is going on, let’s take a look at how the k-means is going
    to work.'
  mdcn: '在下一章中，我们将讨论K-means算法，对于初次接触机器学习的人来说，这可能会让人感到非常困惑。很多时候，人们很容易混淆，可能不清楚这两种统计技术之间有什么区别。当你开始接触这两种技术并积累更多经验时，你会注意到的一些区别包括：


    K-means是一种用于无监督学习的技术。这意味着不存在任何因变量。另一方面，KNN是一种用于监督学习的算法。这意味着存在一个因变量。


    K-means是一种很好的聚类技术，它会尝试将数据点分割成K个簇，使得每个簇中的点彼此靠近。但对于K近邻算法，你将尝试找到该点的分类，然后结合来自该点最近的K个点的分类结果。


    ## 为什么我应该使用KNN？


    在KNN算法方面，你可以使用许多不同的算法。那么，为什么你会选择这个算法而不是其他可用的算法呢？KNN的一些优点包括：


    - 即使问题被认为是多类别的，它也能很好地处理。

    - 你可以将此算法应用于回归问题和分类问题。

    - 对数据没有任何假设。这确保了你获得所需的信息，而不是让任何假设导致问题。

    - 这是一个易于使用的算法。它很容易理解，特别是如果你是机器学习的新手。


    然而，由于KNN算法并非在每种情况下都完美，因此你可以使用更多算法选项。使用KNN算法的一些缺点包括：


    - 它在计算和内存方面成本高昂。

    - 如果你没有合适的系统和足够的空间来使用它，那么从该算法中获得你想要的结果将会更加困难。

    - 如果你要处理很多自变量，你会发现KNN算法会很吃力。

    - 如果你有任何罕见事件或偏斜的目标变量，KNN算法的效果不会很好。

    - 对数据尺度敏感。


    对于你遇到的任何给定问题，较小的k值会导致预测结果具有更大的方差。此外，当你将k设置为较大的值时，可能会出现模型偏差较大的问题。


    在某些时候，你可能需要创建一些虚拟变量，以便使用该算法来理解一些分类变量。这将是你代替原始分类变量所做的工作。与回归不同，你可以创建k个虚拟变量，而不是(k-1)个。例如，你可能有一个名为“部门”的分类变量，其中有五个独特的类别或级别。因此，每个虚拟变量在其部门上为1，否则为0。


    ## 如何找到最佳的K值？


    找到K的最佳值的一个好方法是进行一些交叉验证。使用这种交叉验证来估计验证误差非常重要。为此，你需要在模型构建过程中保留训练集的一个子集。


    交叉验证（假设是10折验证）涉及你将训练集随机分成10组，也称为折，同时尽量保持它们大小接近相等。然后，90%的数据将用于训练你选择的模型，剩下的10%将用于验证你使用的模型。


    你需要处理的错误分类率将使用你为验证数据保留的那10%来计算。此过程需要重复十次。你遇到的每组不同的观测值在每次运行时都将被视为验证集。这将产生10个验证误差估计值，然后对这些估计值取平均值。


    ## 第7章：什么是K-Means聚类？


    接下来要讨论的是k-means聚类的概念。在机器学习中，这是一个相当基础的概念，它会对机器学习有所帮助，并且将极大地帮助你在编程中看到一些结果。其基本思想是，你可以获取系统中大量未标记的数据，然后将它们放入各自的簇中。


    聚类属于无监督机器学习算法的范畴。当你的数据没有任何标签时，它将被应用。这类算法的目标是确保你能够识别数据中发现的组或簇。


    使用这些簇的概念是，最终位于同一簇中的对象彼此之间将非常密切相关，而与其他簇中的项目相似性较少。这里的相似性是一个度量标准，可以反映这两个数据对象之间关系的强度。


    你可能会发现这种聚类在数据挖掘中应用广泛，尤其是在探索性数据挖掘中。它也可能在其他领域有用途，包括计算机图形学、生物信息学、数据压缩、图像分析、信息检索、机器学习和模式识别。


    该算法将根据数据值的相似性形成一些数据簇。然后你需要指定K的值，即你期望算法从数据中生成的簇的数量。算法将首先为每个簇选择一个质心值。然后它将以迭代方式经历三个步骤，包括：


    - 你将需要从每个数据实例与所有簇的质心之间的欧几里得距离开始。

    - 将数据实例分配给距离最近的质心所在的簇。

    - 根据相应簇中数据实例坐标的平均值，计算新的质心值。


    ## 如何使用k-means聚类？


    对于这个，你用于k-means的输入将只在矩阵X中找到。在大多数情况下，你可以添加某种你选择的组织方式，以确保你创建的每一行都是一个不同的样本，而每一列将包含一种不同的特征或因素。为了实现这一点，你必须遵循两个主要步骤来获得k-means算法。


    第一步是选择你想要用于这些簇的中心。如果你不确定哪些中心最适合你，那么这次随机选择一个点作为你的中心是可以的。如果过一段时间后看起来有点不对，你可以稍后再回来进行更改。


    第二步是主循环。在你选择了中心之后，是时候决定你的每个点将属于哪个簇了。你可以查看你拥有的所有样本，然后选择最适合它的簇的中心。


    从这里，你可以花一些时间重新计算簇中心。在这部分，你将根据你分配给每个部分的中心点来执行此操作。这非常简单，因为当你取所有样本并计算这些样本的平均值时就完成了。一旦你能够得出这个问题的答案，你就得到了k-mean。


    你将继续这样做，直到算法收敛。簇中心或分配不再发生变化。在大多数情况下，这将在五步或更少的步骤内发生。你应该注意到，这与你在深度学习中看到的梯度下降非常不同，后者可能需要多次迭代才能收敛。


    为了理解正在发生的事情，让我们看看k-means将如何工作。'

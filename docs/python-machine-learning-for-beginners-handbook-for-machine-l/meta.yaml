    this algorithm.

    - If there are a lot of independent variables that you are going to work with,
    you will find that the KNN algorithm is going to struggle.

    - The KNN algorithm isn''t going to work that well if you have any rare event,
    or skewed, target variables.

    - Sensitive to scale of data.


    For any given problem that you have, a small value of k is going to lead to a
    larger amount of variance in the predictions that you will get. In addition, when
    you set the k to a bigger value, there could be some issues with a large model
    bias along the way.


    At some point, you may need to go through and create some dummy variables in order
    to figure out some of the categorical variables with this algorithm. This is going
    to be something that you do instead of original categorical variables. Unlike
    what you would do with a regression, you can work with creating these k dummies

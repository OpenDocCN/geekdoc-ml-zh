    to make sure that we are up to speed with all of the knowledge about domains that
    are needed before we start.


    To get started, we need to take a look at some anecdotes to go with this and to
    help us set up for the exercises that we are going to do as we progress through
    this guidebook. To start, take a look at the information below:


    - The traffic signs that are found in Belgium are often going to come in French
    and Dutch. This is some good information to know about, but for the kind of datasets
    that we are going to explore soon, it’s not too important.

    - There are going to be six categories of traffic signs that show up in Belgium.
    These include designatory signs, signs that would relate to standing still or
    parking on the road, mandatory signs, prohibitory signs, priority signs, and warning
    signs.

    - On January 1, 2017, there were more than 30,000 of these traffic signs that
    the country decided to remove from the roads in Belgium. All of the signs that

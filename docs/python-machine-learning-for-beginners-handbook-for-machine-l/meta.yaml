    例如，如果你使用回归算法并发现你的公司增长速度与经济中其他行业的增长速度相同，那么你就可以利用这些信息来预测如果经济最终发生变化，你的公司未来的表现如何。


    你会发现回归算法有一些变体，你需要根据你试图从算法中获取的信息来选择你想要的那一种。你可能想在机器学习中使用的一些最常见的回归算法包括：



- md: 'In the next chapter, we are going to talk about K-means, and it is going to
    be a big confusing for those who are working with machine learning for the first
    time. Many times it is easy to get confused and you may not know what the difference
    is between these two statistical techniques. Some of the differences that you
    are going to start to notice when you get started with these two, and you gain
    some more experience with them will include:


    K-means is going to be a technique that you use with unsupervised learning. This
    means that there isn’t going to be any dependent variables present. On the other
    hand, the KNN is going to be an algorithm for supervised learning. This means
    that there is going to be a dependent variable that exists.


    K-means is going to be a good clustering technique which is going to try and split
    the data points out into K-clusters such that the points in each cluster will
    tend to be near each other. But with the K-nearest neighbor, you are going to
    try and find the classification of the point, and then it is going to combine
    together the classification of the K nearest points from that.


    ## Why should I use KNN?


    There are a lot of different algorithms that you can use when it comes to the
    KNN algorithm. So, why would you want to choose to go with this algorithm over
    some of the others that are available for you to choose? Some of the benefits
    that come with KNN include:


    - It can work well with problems, even if they are considered multi-class.

    - You are able to apply this algorithm to both problems that are regressive and
    those that are classification.

    - There aren''t any assumptions that come up with the data. This ensures that

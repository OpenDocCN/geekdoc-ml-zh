    # INITIALIZING THE WEIGHT MATRICES


    One of the important choices which have to be made before training a neural network
    consists in initializing the weight matrices. We don''t know anything about the
    possible weights, when we start. So, we could start with arbitrary values?


    As we have seen the input to all the nodes except the input nodes is calculated
    by applying the activation function to the following sum:


    $$y_j = \sum_{i=1}^{n} w_{ji} \cdot x_i$$


    (with n being the number of nodes in the previous layer and $y_j$ is the input
    to a node of the next layer)


    We can easily see that it would not be a good idea to set all the weight values
    to 0, because in this case the result of this summation will always be zero. This
    means that our network will be incapable of learning. This is the worst choice,
    but initializing a weight matrix to ones is also a bad choice.


    The values for the weight matrices should be chosen randomly and not arbitrarily.
    By choosing a random normal distribution we have broken possible symmetric situations,
    which can and often are bad for the learning process.


    There are various ways to initialize the weight matrices randomly. The first one
    we will introduce is the unity function from numpy.random. It creates samples
    which are uniformly distributed over the half-open interval [low, high), which
    means that low is included and high is excluded. Each value within the given interval
    is equally likely to be drawn by ''uniform''.


    ```

    python

    import numpy as np


    number_of_samples = 1200

    low = -1

    high = 0

    s = np.random.uniform(low, high, number_of_samples)

    ```'

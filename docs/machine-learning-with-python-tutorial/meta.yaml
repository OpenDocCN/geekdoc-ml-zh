  md: "If the error e is 0, i.e. the target result is equal to the calculated result,\
    \ we don't have to do anything. The network is perfect for these input values.\
    \ If the error is not equal, we have to change the weights. We have to change\
    \ the weights by adding small values to them. These values may be positive or\
    \ negative. The amount we have a change a weight value depends on the error and\
    \ on the input value. Let us assume, $x_1 = 0$ and $x_2 > 0$. In this case the\
    \ result in this case solely results on the input $x_2$. This on the other hand\
    \ means that we can minimize the error by changing solely $w_2$. If the error\
    \ is negative, we will have to add a negative value to it, and if the error is\
    \ positive, we will have to add a positive value to it. From this we can understand\
    \ that whatever the input values are, we can multiply them with the error and\
    \ we get values, we can add to the weights. One thing is still missing: Doing\
    \ this we would learn to fast. We have many samples and each sample should only\
    \ change the weights a little bit. Therefore we have to multiply this result with\
    \ a learning rate (`self.learning_rate`). The learning rate is used to control\
    \ how fast the weights are updated. Small values for the learning rate result\
    \ in a long training process, larger values bear the risk of ending up in sub-optimal\
    \ weight values. We will have a closer look at this in our chapter on backpropagation.\n\
    \nWe are ready now to write the code for adapting the weights, which means training\
    \ the network. For this purpose, we add a method 'adjust' to our Perceptron class.\
    \ The task of this method is to correct the error.\n\n```\nimport numpy as np\n\
    from collections import Counter\n\nclass Perceptron:\n    def __init__(self,\n\
    \                 weights,\n                 learning_rate=0.1):\n        \"\"\
    \"\n        'weights' can be a numpy array, list or a tuple with the\n       \
    \ actual values of the weights. The number of input values\n        is indirectly\
    \ defined by the length of 'weights'\n        \"\"\"\n        self.weights = np.array(weights)\n\
    \        self.learning_rate = learning_rate\n\n    @staticmethod\n    def unit_step_function(x):\n\
    \        if x < 0:\n            return 0\n        else:\n            return 1\n\
    \n    def __call__(self, in_data):\n        weighted_input = self.weights * in_data\n\
    \        weighted_sum = weighted_input.sum()\n        #print(in_data, weighted_input,\
    \ weighted_sum)\n```"

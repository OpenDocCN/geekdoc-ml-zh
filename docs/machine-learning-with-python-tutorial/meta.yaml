  md: '# MULTI-CLASS CASE


    To measure the results of machine learning algorithms, the previous confusion
    matrix will not be sufficient. We will need a generalization for the multi-class
    case.


    Let us assume that we have a sample of 25 animals, e.g. 7 cats, 8 dogs, and 10
    snakes, most probably Python snakes. The confusion matrix of our recognition algorithm
    may look like the following table:


    | | predicted | | |

    |---|---|---|---|

    | actual | dog | cat | snake |

    | dog | 6 | 2 | 0 |

    | cat | 1 | 6 | 0 |

    | snake | 1 | 1 | 8 |


    In this confusion matrix, the system correctly predicted six of the eight actual
    dogs, but in two cases it took a dog for a cat. The seven acutal cats were correctly
    recognized in six cases but in one case a cat was taken to be a dog. Usually,
    it is hard to take a snake for a dog or a cat, but this is what happened to our
    classifier in two cases. Yet, eight out of ten snakes had been correctly recognized.
    (Most probably this machine learning algorithm was not written in a Python program,
    because Python should properly recognize its own species :-) )


    You can see that all correct predictions are located in the diagonal of the table,
    so prediction errors can be easily found in the table, as they will be represented
    by values outside the diagonal.


    We can generalize this to the multi-class case. To do this we summarize over the
    rows and columns of the confusion matrix. Given that the matrix is oriented as
    above, i.e., that a given row of the matrix corresponds to specific value for
    the "truth", we have:


    $$Precision_i = \frac{M_{ii}}{\sum_j M_{ji}}$$


    $$Recall_i = \frac{M_{ii}}{\sum_j M_{ij}}$$


    This means, precision is the fraction of cases where the algorithm correctly predicted
    class i out of all instances where the algorithm predicted i (correctly and incorrectly).
    recall on the other hand is the fraction of cases where the algorithm correctly
    predicted i out of all of the cases which are labelled as i.


    Let us apply this to our example:'

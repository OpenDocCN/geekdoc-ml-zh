  md: '![](bbox=[0.15, 0.1, 0.85, 0.48])


    If a point $B = (b_1, b_2)$ is below this line, there must be a $\delta_B > 0$
    so that the point $(b_1, b_2 + \delta_B)$ will be on the line.


    This means that


    $$m \cdot b_1 - (b_2 + \delta_B) = 0$$


    which can be rearranged to


    $$m \cdot b_1 - b_2 = \delta_B$$


    Finally, we have a criteria for a point to be below the line. $m \cdot b_1 - b_2$
    is positive, because $\delta_B$ is positive.


    The reasoning for "a point is above the line" is analogue: If a point $A = (a_1,
    a_2)$ is above the line, there must be a $\delta_A > 0$ so that the point $(a_1,
    a_2 - \delta_A)$ will be on the line.


    This means that


    $$m \cdot a_1 - (a_2 - \delta_A) = 0$$


    which can be rearranged to


    $$m \cdot a_1 - a_2 = -\delta_A$$'

  md: '+   - **n**: (n_samples) The number of samples: each sample is an item to process
    (e.g. classify). A sample can be a document, a picture, a sound, a video, an astronomical
    object, a row in database or CSV file, or whatever you can describe with a fixed
    set of quantitative traits.

    - **m**: (n_features) The number of features or distinct traits that can be used
    to describe each item in a quantitative manner. Features are generally real-valued,
    but may be Boolean or discrete-valued in some cases.


    ```

    from sklearn import datasets

    ```


    Be warned: many of these datasets are quite large, and can take a long time to
    download!'

    Now it is time to think about a possible Python implementation.


    We will start with the weight matrix between input and hidden layer. We will randomly
    create a weight matrix for 10 input nodes and 5 hidden nodes. We fill our matrix
    with random numbers between -10 and 10, which are not proper weight values, but

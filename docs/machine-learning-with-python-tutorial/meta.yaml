  md: '# NEURAL NETWORKS, STRUCTURE, WEIGHTS AND MATRICES


    # INTRODUCTION


    We introduced the basic ideas about neural networks in the previous chapter of
    our machine learning tutorial.


    We have pointed out the similarity between neurons and neural networks in biology.
    We also introduced very small articial neural networks and introduced decision
    boundaries and the XOR problem.


    In the simple examples we introduced so far, we saw that the weights are the essential
    parts of a neural network. Before we start to write a neural network with multiple
    layers, we need to have a closer look at the weights.


    We have to see how to initialize the weights and how to efficiently multiply the
    weights with the input values.


    In the following chapters we will design a neural network in Python, which consists
    of three layers, i.e. the input layer, a hidden layer and an output layer. You
    can see this neural network structure in the following diagram. We have an input
    layer with three nodes $i_1, i_2, i_3$ These nodes get the corresponding input
    values $x_1, x_2, x_3$. The middle or hidden layer has four nodes $h_1, h_2, h_3,
    h_4$. The input of this layer stems from the input layer. We will discuss the
    mechanism soon. Finally, our output layer consists of the two nodes $o_1, o_2$


    The input layer is different from the other layers. The nodes of the input layer
    are passive. This means that the input neurons do not change the data, i.e. there
    are no weights used in this case. They receive a single value and duplicate this
    value to their many outputs.


    ![](bbox=[0.41, 0.32, 0.9, 0.52])'

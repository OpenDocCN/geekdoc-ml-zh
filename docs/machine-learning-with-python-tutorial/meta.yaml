    $$e_{who} = \begin{bmatrix} \frac{w_{11}}{\sum_{i=1}^4 w_{1i}} & \frac{w_{21}}{\sum_{i=1}^4
    w_{2i}} & \frac{w_{31}}{\sum_{i=1}^4 w_{3i}} \ \frac{w_{12}}{\sum_{i=1}^4 w_{1i}}
    & \frac{w_{22}}{\sum_{i=1}^4 w_{2i}} & \frac{w_{32}}{\sum_{i=1}^4 w_{3i}} \ \frac{w_{13}}{\sum_{i=1}^4
    w_{1i}} & \frac{w_{23}}{\sum_{i=1}^4 w_{2i}} & \frac{w_{33}}{\sum_{i=1}^4 w_{3i}}
    \ \frac{w_{14}}{\sum_{i=1}^4 w_{1i}} & \frac{w_{24}}{\sum_{i=1}^4 w_{2i}} & \frac{w_{34}}{\sum_{i=1}^4
    w_{3i}} \end{bmatrix} \cdot \begin{bmatrix} e_1 \ e_2 \ e_3 \end{bmatrix}$$

    ```


    You can see that the denominator in the left matrix is always the same. It functions
    like a scaling factor. We can drop it so that the calculation gets a lot simpler:


    ```

    $$e_{who} = \begin{bmatrix} w_{11} & w_{21} & w_{31} \ w_{12} & w_{22} & w_{32}
    \ w_{13} & w_{23} & w_{33} \ w_{14} & w_{24} & w_{34} \end{bmatrix} \cdot \begin{bmatrix}
    e_1 \ e_2 \ e_3 \end{bmatrix}$$

    ```


    If you compare the matrix on the right side with the ''who'' matrix of our chapter
    [Neuronal Network Using Python and Numpy](https://www.python-course.eu/neural_networks_with_python_numpy.php),
    you will notice that it is the transpose of ''who''.


    ```

    $$e_{who} = who.T \cdot e$$

    ```


    So, this has been the easy part for linear neural networks. We haven''t taken
    into account the activation function until now.


    We want to calculate the error in a network with an activation function, i.e.
    a non-linear network. The derivation of the error function describes the slope.
    As we mentioned in the beginning of the this chapter, we want to descend. The
    derivation describes how the error $E$ changes as the weight $w_{kj}$ changes:'
  merge: -1
  pgno: 167
- img_proc: false
  md: '$$\frac{\partial E}{\partial w_{kj}}$$


    The error function E over all the output nodes $o_i$ ($i = 1, \dots n$) where
    $n$ is the total number of output nodes:


    $$E = \sum_{i=1}^{n} \frac{1}{2}(t_i - o_i)^2$$


    Now, we can insert this in our derivation:


    $$\frac{\partial E}{\partial w_{kj}} = \frac{\partial}{\partial w_{kj}} \frac{1}{2}
    \sum_{i=1}^{n} (t_i - o_i)^2$$


    If you have a look at our example network, you will see that an output node $o_k$
    only depends on the input signals created with the weights $w_{ki}$ with $i =
    1, \dots m$ and $m$ the number of hidden nodes.


    The following diagram further illuminates this:


    ![](bbox=[0.35, 0.48, 0.65, 0.72])


    This means that we can calculate the error for every output node independently
    of each other. This means that we can remove all expressions $t_i - o_i$ with
    $i \neq k$ from our summation. So the calculation of the error for a node k looks
    a lot simpler now:


    $$\frac{\partial E}{\partial w_{kj}} = \frac{\partial}{\partial w_{kj}} \frac{1}{2}
    (t_k - o_k)^2$$


    The target value $t_k$ is a constant, because it is not depending on any input
    signals or weights. We can apply the chain rule for the differentiation of the
    previous term to simplify things:'
  merge: -1
  pgno: 168
- img_proc: false
  md: '$$\frac{\partial E}{\partial w_{kj}} = \frac{\partial E}{\partial o_k} \cdot
    \frac{\partial o_k}{\partial w_{kj}}$$


    In the previous chapter of our tutorial, we used the sigmoid function as the activation
    function:


    $$\sigma(x) = \frac{1}{1 + e^{-x}}$$


    The output node $o_k$ is calculated by applying the sigmoid function to the sum
    of the weighted input signals. This means that we can further transform our derivative
    term by replacing $o_k$ by this function:


    $$\frac{\partial E}{\partial w_{kj}} = (t_k - o_k) \cdot \frac{\partial}{\partial
    w_{kj}} \sigma(\sum_{i=1}^{m} w_{ki}h_i)$$


    where $m$ is the number of hidden nodes.


    The sigmoid function is easy to differentiate:


    $$\frac{\partial \sigma(x)}{\partial x} = \sigma(x) \cdot (1 - \sigma(x))$$


    The complete differentiation looks like this now:


    $$\frac{\partial E}{\partial w_{kj}} = (t_k - o_k) \cdot \sigma(\sum_{i=1}^{m}
    w_{ki}h_i) \cdot (1 - \sigma(\sum_{i=1}^{m} w_{ki}h_i)) \frac{\partial}{\partial
    w_{kj}} \sum_{i=1}^{m} w_{ki}h_i$$


    The last part has to be differentiated with respect to $w_{kj}$. This means that
    the derivation of all the products will be 0 except the the term $w_{kj}h_j$)
    which has the derivative $h_j$ with respect to $w_{kj}$:


    $$\frac{\partial E}{\partial w_{kj}} = (t_k - o_k) \cdot \sigma(\sum_{i=1}^{m}
    w_{ki}h_i) \cdot (1 - \sigma(\sum_{i=1}^{m} w_{ki}h_i)) \cdot h_j$$


    This is what we need to implement the method ''train'' of our NeuralNetwork class
    in the following chapter.


    ```


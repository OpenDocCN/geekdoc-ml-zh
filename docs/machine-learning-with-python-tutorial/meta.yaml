    \n# SOLUTIONS TO THE EXERCISES\n\n# SOLUTION TO THE 1. EXERCISE\n\n```\nfrom perceptrons\
    \ import Perceptron\n\np = Perceptron(weights=[0.3, 0.3, 0.3],\n             \

  md: '# # NEURAL NETWORKS


    # ## INTRODUCTION


    When we say "Neural Networks", we mean artificial Neural Networks (ANN). The idea
    of ANN is based on biological neural networks like the brain of living being.


    The basic structure of a neural network - both an artificial and a living one
    - is the neuron. A neuron in biology consists of three major parts: the soma (cell
    body), the dendrites and the axon.


    The dendrites branch of from the soma in a tree-like way and become thinner with
    every branch. They receive signals (impulses) from other neurons at synapses.
    The axon - there is always only one - also leaves the soma and usually tend to
    extend for longer distances than the dendrites. The axon is used for sending the
    output of the neuron to other neurons or better to the synapsis of other neurons.


    ![](bbox=[0.41, 0.2, 0.9, 0.41])


    # ## BIOLOGICAL NEURON


    The following image by [Quasar Jarosz](https://en.wikipedia.org/wiki/Quasar_Jarosz),
    courtesy of Wikipedia, illustrates this:


    ![](bbox=[0.19, 0.58, 0.81, 0.87])'

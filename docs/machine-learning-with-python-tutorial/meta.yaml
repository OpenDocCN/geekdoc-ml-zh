    \ blobs, i.e. the clusters. `n_samples` corresponds to the total number of points\
    \ equally divided among clusters. If `random_state` is not set, we will have random\
    \ results every time we call the function. We pass an int to this parameter for\
    \ reproducible output across multiple function calls.\n\n```\nimport numpy as\
    \ np\nimport matplotlib.pyplot as plt\nfrom sklearn.datasets import make_blobs\n\

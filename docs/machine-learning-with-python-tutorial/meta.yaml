  md: '# DATA PREPARATION


    # LEARN, TEST AND EVALUATION DATA


    You have your data ready and you are eager to start training the classifier? But
    be careful: When your classifier will be finished, you will need some test data
    to evaluate your classifier. If you evaluate your classifier with the data used
    for learning, you may see surprisingly good results. What we actually want to
    test is the performance of classifying on unknown data.


    ![](bbox=[0.57, 0.19, 0.9, 0.36])


    For this purpose, we need to split our data into two parts:


    +   1. A training set with which the learning algorithm adapts or learns the model

    2. A test set to evaluate the generalization performance of the model


    When you consider how machine learning normally works, the idea of a split between
    learning and test data makes sense. Really existing systems train on existing
    data and if other new data (from customers, sensors or other sources) comes in,
    the trained classifier has to predict or classify this new data. We can simulate
    this during training with a training and test data set - the test data is a simulation
    of "future data" that will go into the system during production.


    In this chapter of our Python Machine Learning Tutorial, we will learn how to
    do the splitting with plain Python.


    We will see also that doing it manually is not necessary, because the `train_test_split`
    function from the `model_selection` module can do it for us.


    If the dataset is sorted by label, we will have to shuffle it before splitting.


    ![](bbox=[0.3, 0.64, 0.7, 0.88])'
  merge: -1
  pgno: 66
- img_proc: false
  md: 'We separated the dataset into a learn (a.k.a. training) dataset and a test
    dataset. Best practice is to split it into a learn, test and an evaluation dataset.


    We will train our model (classifier) step by step and each time the result needs
    to be tested. If we just have a test dataset. The results of the testing might
    get into the model. So we will use an evaluation dataset for the complete learning
    phase. When our classifier is finished, we will check it with the test dataset,
    which it has not "seen" before!


    ![](bbox=[0.39, 0.23, 0.61, 0.57])


    Yet, during our tutorial, we will only use splittings into learn and test datasets.


    # SPLITTING EXAMPLE: IRIS DATA SET


    We will demonstrate the previously discussed topics with the Iris Dataset.


    The 150 data sets of the Iris data set are sorted, i.e. the first 50 data correspond
    to the first flower class (0 = Setosa), the next 50 to the second flower class
    (1 = Versicolor) and the remaining data correspond to the last class (2 = Virginica).


    If we were to split our data in the ratio 2/3 (learning set) and 1/3 (test set),
    the learning set would contain all the flowers of the first two classes and the
    test set all the flowers of the third flower class. The classifier could only
    learn two classes and the third class would be completely unknown. So we urgently
    need to mix the data.


    Assuming all samples are independent of each other, we want to shuffle the data
    set **randomly before we split the data set** as shown above.'

    \ of the fur, going from sandish to black. We have three kinds of squirrels, 0,\
    \ 1, and 2. (Be aware that our squirrals are imaginary squirrels and have nothing\
    \ to do with the real squirrels of the Sahara!)\n\n```\nimport matplotlib.pyplot\
    \ as plt\n\ncolours = ('green', 'red', 'blue', 'magenta', 'yellow', 'cyan')\n\

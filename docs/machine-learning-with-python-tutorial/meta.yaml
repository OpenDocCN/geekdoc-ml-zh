    \ adjust the weight values with an incremental value, i.e. $w_1 = w_1 + \\Delta\
    \ w_1$ and $w_2 = w_2 + \\Delta w_2$\n\n![](bbox=[0.15, 0.65, 0.85, 0.93])"

  md: '![](bbox=[0.22, 0.1, 0.78, 0.38])


    At first, we will have a look at the weight array between the input and the hidden
    layer. We called this array ''wih'' (weights between input and hidden layer).


    Let''s deactivate (drop out) the node $i_2$. We can see in the following diagram
    what''s happening:


    ![](bbox=[0.08, 0.51, 0.92, 0.88])'

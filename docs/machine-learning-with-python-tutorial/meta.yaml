    Each of the arrows in our network diagram has an associated weight value. We will
    only look at the arrows between the input and the output layer now.


    ![](bbox=[0.34, 0.2, 0.66, 0.48])


    The value $x_1$ going into the node $i_1$ will be distributed according to the
    values of the weights. In the following diagram we have added some example values.
    Using these values, the input values ($Ih_1, Ih_2, Ih_3, Ih_4$) into the nodes
    ($h_1, h_2, h_3, h_4$) of the hidden layer can be calculated like this:


    $Ih_1 = 0.81 * 0.5 + 0.12 * 1 + 0.92 * 0.8$


    $Ih_2 = 0.33 * 0.5 + 0.44 * 1 + 0.72 * 0.8$


    $Ih_3 = 0.29 * 0.5 + 0.22 * 1 + 0.53 * 0.8$


    $Ih_4 = 0.37 * 0.5 + 0.12 * 1 + 0.27 * 0.8$



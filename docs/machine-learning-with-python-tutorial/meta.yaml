  md: "![](bbox=[0.12, 0.12, 0.37, 0.31])\n\n# DISTANCE METRICS\n\nWe have already\
    \ mentioned in detail, we calculate the distances between the points of the sample\
    \ and the object to be classified. To calculate these distances we need a distance\
    \ function.\n\nIn n-dimensional vector rooms, one usually uses one of the following\
    \ three distance metrics:\n\n+   - **Euclidean Distance**\n\n  The Euclidean distance\
    \ between two points $x$ and $y$ in either the plane or 3-dimensional space measures\
    \ the length of a line segment connecting these two points. It can be calculated\
    \ from the Cartesian coordinates of the points using the Pythagorean theorem,\
    \ therefore it is also occasionally being called the Pythagorean distance. The\
    \ general formula is\n\n  $$d(x, y) = \\sqrt{\\sum_{i=1}^{n} (x_i - y_i)^2}$$\n\
    \n- **Manhattan Distance**\n\n  It is defined as the sum of the absolute values\
    \ of the differences between the coordinates of x and y:\n\n  $$d(x, y) = \\sum_{i=1}^{n}\
    \ |x_i - y_i|$$\n\n- **Minkowski Distance**\n\n  The Minkowski distance generalizes\
    \ the Euclidean and the Manhatten distance in one distance metric. If we set the\
    \ parameter $p$ in the following formula to 1 we get the manhattan distance an\
    \ using the value 2 gives us the euclidean distance:"
  merge: -1
  pgno: 78
- img_proc: false
  md: "$$d(x, y) = \\left( \\sum_{i=1}^{n} |x_i - y_i|^p \\right)^{\\frac{1}{p}}$$\n\
    \nThe following diagram visualises the Euclidean and the Manhattan distance:\n\
    \n![](bbox=[0.28, 0.22, 0.72, 0.56])\n\nThe blue line illustrates the Eucliden\
    \ distance between the green and red dot. Otherwise you can also move over the\
    \ orange, green or yellow line from the green point to the red point. The lines\
    \ correspond to the manhtten distance. The length is equal.\n\n# DETERMINING THE\
    \ NEIGHBORS\n\nTo determine the similarity between two instances, we will use\
    \ the Euclidean distance.\n\nWe can calculate the Euclidean distance with the\
    \ function `norm` of the module `np.linalg`: \n\n```\npython\ndef distance(instance1,\
    \ instance2):\n    \"\"\" Calculates the Euclidian distance between two instances\"\
    \"\"\n    return np.linalg.norm(np.subtract(instance1, instance2))\n\nprint(distance([3,\

    # THE WEIGHTED NEAREST NEIGHBOUR CLASSIFIER


    We looked only at k items in the vicinity of an unknown object „UO", and had a
    majority vote. Using the majority vote has shown quite efficient in our previous
    example, but this didn''t take into account the following reasoning: The farther
    a neighbor is, the more it "deviates" from the "real" result. Or in other words,
    we can trust the closest neighbors more than the farther ones. Let''s assume,
    we have 11 neighbors of an unknown item UO. The closest five neighbors belong
    to a class A and all the other six, which are farther away belong to a class B.
    What class should be assigned to UO? The previous approach says B, because we
    have a 6 to 5 vote in favor of B. On the other hand the closest 5 are all A and
    this should count more.


    To pursue this strategy, we can assign weights to the neighbors in the following
    way: The nearest neighbor of an instance gets a weight 1/1, the second closest
    gets a weight of 1/2 and then going on up to 1/k for the farthest away neighbor.


    This means that we are using the harmonic series as weights:


    ![](bbox=[0.35, 0.81, 0.65, 0.86])


    We implement this in the following function:'
  merge: -1
  pgno: 84

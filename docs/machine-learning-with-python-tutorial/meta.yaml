    The question now is whether we can find a solution with minor modifications of
    our network model? Or in other words: Can we create a perceptron capable of defining
    arbitrary decision boundaries?


    The solution consists in the addition of a bias node.


    # SINGLE PERCEPTRON WITH A BIAS


    A perceptron with two input values and a bias corresponds to a general straight
    line. With the aid of the bias value $b$ we can train the perceptron to determine
    a decision boundary with a non zero intercept $c$.'

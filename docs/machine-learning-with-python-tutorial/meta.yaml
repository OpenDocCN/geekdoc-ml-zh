    # NEURAL NETWORK WITH BIAS NODES


    We already introduced the basic idea and necessity of bias nodes in the chapter
    "Simple Neural Network", in which we focussed on very simple linearly separable
    data sets. We learned that a bias node is a node that is always returning the
    same output. In other words: It is a node which is not depending on some input
    and it does not have any input. The value of a bias node is often set to one,
    but it can be set to other values as well. Except for zero, which makes no sense
    for obvious reasons. If a neural network does not have a bias node in a given
    layer, it will not be able to produce output in the next layer that differs from
    0 when the feature values are 0. Generally speaking, we can say that bias nodes
    are used to increase the flexibility of the network to fit the data. Usually,
    there will be not more than one bias node per layer. The only exception is the
    output layer, because it makes no sense to add a bias node to this layer.


    The following diagram shows the first two layers of our previously used three-layered
    neural network:


    ![](bbox=[0.17, 0.47, 0.83, 0.78])


    We can see from this diagram that our weight matrix needs one additional column
    and the bias value has to be added to the input vector:'

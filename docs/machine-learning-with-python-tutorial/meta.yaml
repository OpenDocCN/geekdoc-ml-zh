  md: '# EVALUATION METRICS


    # INTRODUCTION


    Not only in machine learning but also in general life, especially business life,
    you will hear questiones like "How accurate is your product?" or "How precise
    is your machine?". When people get replies like "This is the most accurate product
    in its field!" or "This machine has the highest imaginable precision!", they feel
    fomforted by both answers. Shouldn''t they? Indeed, the terms `accurate` and `precise`
    are very often used interchangeably. We will give exact definitions later in the
    text, but in a nutshell, we can say: Accuracy is a measure for the closeness of
    some measurements to a specific value, while precision is the closeness of the
    measurements to each other.


    ![](bbox=[0.41, 0.2, 0.9, 0.43])


    These terms are also of extreme importance in Machine Learning. We need them for
    evaluating ML algorithms or better their results.


    We will present in this chapter of our Python Machine Learning Tutorial four important
    metrics. These metrics are used to evaluate the results of classifications. The
    metrics are:


    +   - Accuracy

    - Precision

    - Recall

    - F1-Score


    We will introduce each of these metrics and we will discuss the pro and cons of
    each of them. Each metric measures something different about a classifiers performance.
    The metrics will be of outmost importance for all the chapters of our machine
    learning tutorial.


    # ACCURACY


    Accuracy is a measure for the closeness of the measurements to a specific value,
    while precision is the closeness of the measurements to each other, i.e. not necessarily
    to a specific value. To put it in other words: If we have a set of data points
    from repeated measurements of the same quantity, the set is said to be accurate
    if their average is close to the true value of the quantity being measured. On
    the other hand, we call the set to be precise, if the values are close to each
    other. The two concepts are independent of each other, which means that the set
    of data can be accurate, or precise, or both, or neither. We show this in the
    following diagram:'
  merge: -1
  pgno: 8
- img_proc: false
  md: '![](bbox=[0.19, 0.12, 0.45, 0.33])


    ![](bbox=[0.54, 0.12, 0.81, 0.33])


    A: accurate and precise


    B: precise, but not accurate


    ![](bbox=[0.19, 0.42, 0.45, 0.63])


    ![](bbox=[0.54, 0.42, 0.81, 0.63])


    C: neither accurate nor precise


    D: accurate, but not precise


    # CONFUSION MATRIX


    Before we continue with the term `accuracy`, we want to make sure that you understand
    what a confusion matrix is about.


    A confusion matrix, also called a contingency table or error matrix, is used to
    visualize the performance of a classifier.


    The columns of the matrix represent the instances of the predicted classes and
    the rows represent the instances of the actual class. (Note: It can be the other
    way around as well.)


    In the case of binary classification the table has 2 rows and 2 columns.'
  merge: -1
  pgno: 9
- img_proc: false
  md: 'We want to demonstrate the concept with an example.


    Example:


    | Confusion Matrix | Predicted classes | |

    | :--- | :--- | :--- |

    | | cat | dog |

    | Actual classes | cat | 42 | 8 |

    | | dog | 18 | 32 |


    This means that the classifier correctly predicted a cat in 42 cases and it wrongly
    predicted 8 cat instances as dog. It correctly predicted 32 instances as dog.
    18 cases had been wrongly predicted as cat instead of dog.


    # ACCURACY IN CLASSIFICATION


    We are interested in Machine Learning and accuracy is also used as a statistical
    measure. Accuracy is a statistical measure which is defined as the quotient of
    correct predictions (both True positives (TP) and True negatives (TN)) made by
    a classifier divided by the sum of all predictions made by the classifier, including
    False positves (FP) and False negatives (FN). Therefore, the formula for quantifying
    binary accuracy is:


    $$accuracy = \frac{TP + TN}{TP + TN + FP + FN}$$


    where: TP = True positive; FP = False positive; TN = True negative; FN = False
    negative


    The corresponding Confusion Matrix looks like this:


    | Confusion Matrix | Predicted classes | |

    | :--- | :--- | :--- |

    | | negative | positive |

    | Actual classes | negative | TN | FP |

    | | positive | FN | TP |


    We will now calculate the accuracy for the cat-and-dog classification results.
    Instead of "True" and "False", we see here "cat" and "dog". We can calculate the
    accuracy like this:'
  merge: -1
  pgno: 10
- img_proc: false
  md: '```

    TP = 42

    TN = 32

    FP = 8

    FN = 18


    Accuracy = (TP + TN) / (TP + TN + FP + FN)

    print(Accuracy)


    0.74

    ```


    Let''s assume we have a classifier, which always predicts "dog".


    | Confusion Matrix | Predicted classes | |

    | :--- | :--- | :--- |

    | | cat | dog |

    | Actual classes | cat | 0 | 50 |

    | | dog | 0 | 50 |


    We have an accuracy of 0.5 in this case:


    ```

    TP, TN, FP, FN = 0, 50, 50, 0

    Accuracy = (TP + TN) / (TP + TN + FP + FN)

    print(Accuracy)


    0.5

    ```


    # ACCURACY PARADOX


    We will demonstrate the so-called accuracy paradox.


    A spam recognition classifier is described by the following confusion matrix:


    | Confusion Matrix | Predicted classes | |

    | :--- | :--- | :--- |

    | | spam | ham |

    | Actual classes | spam | 4 | 1 |

    | | ham | 4 | 91 |'

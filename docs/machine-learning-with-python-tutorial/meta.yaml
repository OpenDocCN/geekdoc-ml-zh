  md: 'ham 0 114


    We can calculate the `precision` for our example:


    ```

    TP = 114

    FP = 14

    # FN (0) and TN (12) are not needed in the formula!

    precision = TP / (TP + FP)

    print(f"precision: {precision:4.2f}")

    ```


    precision: 0.89


    Exercise: Before you go on with the text think about what the value `precision`
    means. If you look at the precision measure of our spam filter example, what does
    it tell you about the quality of the spam filter? What do the results of the confusion
    matrix of an ideal spam filter look like? What is worse, high FP or FN values?


    You will find the answers indirectly in the following explanations.


    Incidentally, the ideal spam filter would have 0 values for both FP and FN.


    The previous result means that 11 mailpieces out of a hundred will be classified
    as ham, even though they are spam. 89 are correctly classified as ham. This is
    a point where we should talk about the costs of misclassification. It is troublesome
    when a spam mail is not recognized as "spam" and is instead presented to us as
    "ham". If the percentage is not too high, it is annoying but not a disaster. In
    contrast, when a non-spam message is wrongly labeled as spam, the email will not
    be shown in many cases or even automatically deleted. For example, this carries
    a high risk of losing customers and friends. The measure `precision` makes no
    statement about this last-mentioned problem class. What about other measures?


    We will have a look at `recall` and `F1-score`.


    # RECALL


    Recall, also known as sensitivity, is the ratio of the correctly identified positive
    cases to all the actual positive cases, which is the sum of the "False Negatives"
    and "True Positives".


    $$recall = \frac{TP}{TP + FN}$$


    ```

    TP = 114

    FN = 0

    # FT (14) and TN (12) are not needed in the formula!

    recall = TP / (TP + FN)

    print(f"recall: {recall:4.2f}")

    ```'

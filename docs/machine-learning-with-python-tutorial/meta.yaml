  md: "![](bbox=[0.25, 0.1, 0.75, 0.25])\n\nWhile the input values can change, a bias\
    \ value always remains constant. Only the weight of the bias node can be adapted.\n\
    \nNow, the linear equation for a perceptron contains a bias:\n\n$$\\sum_{i=1}^{n}\
    \ w_i \\cdot x_i + w_{n+1} \\cdot b = 0$$\n\nIn our case it looks like this:\n\
    \n$$w_1 \\cdot x_1 + w_2 \\cdot x_2 + w_3 \\cdot b = 0$$\n\nthis is equivalent\
    \ with\n\n$$x_2 = -\\frac{w_1}{w_2} \\cdot x_1 - \\frac{w_3}{w_2} \\cdot b$$\n\
    \nThis means:\n\n$$m = -\\frac{w_1}{w_2}$$\n\nand\n\n$$c = -\\frac{w_3}{w_2} \\\
    cdot b$$\n\n```\npython\nimport numpy as np\nfrom collections import Counter\n\
    \nclass Perceptron:\n    def __init__(self,\n```"

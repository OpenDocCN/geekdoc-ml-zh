  md: "$-s_i \\cdot s_j$\n\nWe can summarize these two cases and write the derivative\
    \ as:\n\n$g'(x) = \\begin{cases} s_i \\cdot (1 - s_i), & \\text{if } i = j \\\
    \ -s_i \\cdot s_j, & \\text{otherwise} \\end{cases}$\n\nIf we use the Kronecker\
    \ delta function$^1$, we can get rid of the case differentiation, i.e. we \"let\
    \ the Kronecker delta do this work\":\n\n$\\frac{\\partial s_i}{\\partial o_j}\
    \ = s_i(\\delta_{ij} - s_j)$\n\nFinally we can calculate the derivative of softmax:\n\
    \n$\\frac{\\partial S}{\\partial O} = \\begin{bmatrix} s_1(\\delta_{11} - s_1)\
    \ & s_1(\\delta_{12} - s_2) & \\cdots & s_1(\\delta_{1n} - s_n) \\ s_2(\\delta_{21}\
    \ - s_1) & s_2(\\delta_{22} - s_2) & \\cdots & s_2(\\delta_{2n} - s_n) \\ \\vdots\

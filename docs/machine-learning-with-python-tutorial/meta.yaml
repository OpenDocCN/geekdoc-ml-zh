  md: "improve the voting by using the actual distance. To this purpos we will write\
    \ a new voting function:\n\n```\ndef vote_distance_weights(neighbors, all_results=True):\n\
    \    class_counter = Counter()\n    number_of_neighbors = len(neighbors)\n   \
    \ for index in range(number_of_neighbors):\n        dist = neighbors[index][1]\n\
    \        label = neighbors[index][2]\n        class_counter[label] += 1 / (dist**2\
    \ + 1)\n    labels, votes = zip(*class_counter.most_common())\n    #print(labels,\
    \ votes)\n    winner = class_counter.most_common(1)[0][0]\n    votes4winner =\
    \ class_counter.most_common(1)[0][1]\n    if all_results:\n        total = sum(class_counter.values(),\
    \ 0.0)\n        for key in class_counter:\n            class_counter[key] /= total\n\
    \        return winner, class_counter.most_common()\n    else:\n        return\
    \ winner, votes4winner / sum(votes)\n```\n\n```\nfor i in range(n_training_samples):\n\
    \    neighbors = get_neighbors(learn_data,\n                              learn_labels,\n\
    \                              test_data[i],\n                              6,\n\
    \                              distance=distance)\n    print(\"index: \", i,\n\

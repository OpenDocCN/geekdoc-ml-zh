  md: '# CONFUSION MATRIX


    In the previous chapters of our Machine Learning tutorial ([Neural Networks with
    Python and Numpy](https://www.python-course.eu/neural_networks_with_python_numpy.php)
    and [Neural Networks from Scratch](https://www.python-course.eu/neural_networks_from_scratch.php))
    we implemented various algorithms, but we didn''t properly measure the quality
    of the output. The main reason was that we used very simple and small datasets
    to learn and test. In the chapter [Neural Network: Testing with MNIST](https://www.python-course.eu/neural_networks_testing.php),
    we will work with large datasets and ten classes, so we need proper evaluations
    tools. We will introduce in this chapter the concepts of the confusion matrix:


    ![](bbox=[0.41, 0.16, 0.9, 0.38])


    A **confusion matrix** is a matrix (table) that can be used to measure the performance
    of an machine learning algorithm, usually a supervised learning one. Each row
    of the confusion matrix represents the instances of an actual class and each column
    represents the instances of a predicted class. This is the way we keep it in this
    chapter of our tutorial, but it can be the other way around as well, i.e. rows
    for predicted classes and columns for actual classes. The name confusion matrix
    reflects the fact that it makes it easy for us to see what kind of confusions
    occur in our classification algorithms. For example the algorithms should have
    predicted a sample as $c_i$ because the actual class is $c_i$, but the algorithm
    came out with $c_j$. In this case of mislabelling the element $cm[i,j]$ will be
    incremented by one, when the confusion matrix is constructed.


    We will define methods to calculate the confusion matrix, precision and recall
    in the following class.


    # 2-CLASS CASE


    In a 2-class case, i.e. "negative" and "positive", the confusion matrix may look
    like this:


    | | predicted | |

    |---|---|---|

    | actual | negative | positive |

    | negative | 11 | 0 |

    | positive | 1 | 12 |'
  merge: -1
  pgno: 193
- img_proc: false
  md: 'The fields of the matrix mean the following:


    | | predicted | |

    |---|---|---|

    | actual | negative | positive |

    | negative | TN<br>True positive | FP<br>False Positive |

    | positive | FN<br>False negative | TP<br>True positive |


    We can define now some important performance measures used in machine learning:


    # Accuracy:


    $$AC = \frac{TN + TP}{TN + FP + FN + TP}$$


    The accuracy is not always an adequate performance measure. Let us assume we have
    1000 samples. 995 of these are negative and 5 are positive cases. Let us further
    assume we have a classifier, which classifies whatever it will be presented as
    negative. The accuracy will be a surprising 99.5%, even though the classifier
    could not recognize any positive samples.


    # Recall aka. True Positive Rate:


    $$recall = \frac{TP}{FN + TP}$$


    # True Negative Rate:


    $$TNR = \frac{FP}{TN + FP}$$


    # Precision:


    $$precision: \frac{TP}{FP + TP}$$'

    accuracy = (TP + TN) / (TP + TN + FP + FN)

    print(accuracy)

    ```


    0.95


    The following classifier predicts solely "ham" and has the same accuracy.


    | Confusion Matrix | Predicted classes | |

    | :--- | :--- | :--- |

    | | spam | ham |

    | Actual classes spam | 0 | 5 |

    | Actual classes ham | 0 | 95 |


    ```

    TP, TN, FP, FN = 0, 95, 5, 0

    accuracy = (TP + TN) / (TP + TN + FP + FN)

    print(accuracy)

    ```


    0.95


    The accuracy of this classifier is 95%, even though it is not capable of recognizing
    any spam at all.


    # PRECISION


    Precision is the ratio of the correctly identified positive cases to all the predicted
    positive cases, i.e. the correctly and the incorrectly cases predicted as `positive`.
    Precision is the fraction of retrieved documents that are relevant to the query.
    The formula:


    $$precision = \frac{TP}{TP + FP}$$


    We will demonstrate this with an example.


    | Confusion Matrix | Predicted classes | |

    | :--- | :--- | :--- |

    | | spam | ham |

    | Actual classes spam | 12 | 14 |'
  merge: -1
  pgno: 12

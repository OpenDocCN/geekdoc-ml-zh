    Depending on this error, we have to change the weights from the incoming values
    accordingly. We have four weights, so we could spread the error evenly. Yet, it
    makes more sense to to do it proportionally, according to the weight values. The
    larger a weight is in relation to the other weights, the more it is responsible
    for the error. This means that we can calculate the fraction of the error $e_1$
    in $w_{11}$ as:


    $$e_1 \cdot \frac{w_{11}}{\sum_{i=1}^{4} w_{1i}}$$


    This means in our example:


    $$0.08 \cdot \frac{0.6}{0.6 + 0.1 + 0.15 + 0.25} = 0.0343$$


    The total error in our weight matrix between the hidden and the output layer -
    we called it in our previous chapter ''who'' - looks like this'

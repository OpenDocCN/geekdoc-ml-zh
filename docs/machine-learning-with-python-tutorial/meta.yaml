  md: '# DROPOUT NEURAL NETWORKS


    # INTRODUCTION


    The term "dropout" is used for a technique which drops out some nodes of the network.
    Dropping out can be seen as temporarily deactivating or ignoring neurons of the
    network. This technique is applied in the training phase to reduce overfitting
    effects. Overfitting is an error which occurs when a network is too closely fit
    to a limited set of input samples.


    ![](bbox=[0.5, 0.2, 0.9, 0.46])


    The basic idea behind dropout neural networks is to dropout nodes so that the
    network can concentrate on other features. Think about it like this. You watch
    lots of films from your favourite actor. At some point you listen to the radio
    and here somebody in an interview. You don''t recognize your favourite actor,
    because you have seen only movies and your are a visual type. Now, imagine that
    you can only listen to the audio tracks of the films. In this case you will have
    to learn to differentiate the voices of the actresses and actors. So by dropping
    out the visual part you are forced tp focus on the sound features!


    This technique has been first proposed in a paper "Dropout: A Simple Way to Prevent
    Neural Networks from Overfitting" by Nitish Srivastava, Geoffrey Hinton, Alex
    Krizhevsky, Ilya Sutskever and Ruslan Salakhutdinov in 2014


    We will implement in our tutorial on machine learning in Python a Python class
    which is capable of dropout.


    # MODIFYING THE WEIGHT ARRAYS


    If we deactivate a node, we have to modify the weight arrays accordingly. To demonstrate
    how this can be accomplished, we will use a network with three input nodes, four
    hidden and two output nodes:'
  merge: -1
  pgno: 237

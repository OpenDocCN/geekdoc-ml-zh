  md: '# SOFTMAX AS ACTIVATION FUNCTION


    # SOFTMAX


    The previous implementations of neural networks in our tutorial returned float
    values in the open interval (0, 1). To make a final decision we had to interprete
    the results of the output neurons. The one with the highest value is a likely
    candidate but we also have to see it in relation to the other results. It should
    be obvious that in a two classes case ($c_1$ and $c_2$) a result (0.013, 0.95)
    is a clear vote for the class $c_2$ but (0.73, 0.89) on the other hand is a different
    thing. We could say in this situation ''$c_2$ is more likely than $c_1$, but $c_1$
    has still a high likelihood''. Talking about likelihoods: The return values are
    not probabilities. It would be a lot better to have a normalized output with a
    probability function. Here comes the softmax function into the picture. The softmax
    function, also known as softargmax or normalized exponential function, is a function
    that takes as input a vector of n real numbers, and normalizes it into a probability
    distribution consisting of n probabilities proportional to the exponentials of
    the input vector. A probability distribution implies that the result vector sums
    up to 1. Needless to say, if some components of the input vector are negative
    or greater than one, they will be in the range (0, 1) after applying Softmax .
    The Softmax function is often used in neural networks, to map the results of the
    output layer, which is non-normalized, to a probability distribution over predicted
    output classes.


    The softmax function $\sigma$ is defined by the following formula:


    $\sigma(o_i) = \frac{e^{o_i}}{\sum_{j=1}^{n} e^{o_j}}$


    where the index i is in (0, ..., n-1) and o is the output vector of the network


    $o = (o_0, o_1, \dots, o_{n-1})$


    We can implement the softmax function like this:


    ```

    import numpy as np

    ```'

  md: '# DATA GENERATION


    # GENERATE SYNTHETICAL DATA WITH PYTHON


    A problem with machine learning, especially when you are starting out and want
    to learn about the algorithms, is that it is often difficult to get suitable test
    data. Some cost a lot of money, others are not freely available because they are
    protected by copyright. Therefore, artificially generated test data can be a solution
    in some cases.


    For this reason, this chapter of our tutorial deals with the artificial generation
    of data. This chapter is about creating artificial data. In the previous chapters
    of our tutorial we learned that Scikit-Learn (sklearn) contains different data
    sets. On the one hand, there are small toy data sets, but it also offers larger
    data sets that are often used in the machine learning community to test algorithms
    or also serve as a benchmark. It provides us with data coming from the ''real
    world''.


    All this is great, but in many cases this is still not sufficient. Maybe you find
    the right kind of data, but you need more data of this kind or the data is not
    completely the kind of data you were looking for, e.g. maybe you need more complex
    or less complex data. This is the point where you should consider to create the
    data yourself. Here, `sklearn` offers help. It includes various random sample
    generators that can be used to create custom-made artificial datasets. Datasets
    that meet your ideas of size and complexity.


    ![](bbox=[0.41, 0.19, 0.9, 0.78])


    The following Python code is a simple example in which we create artificial weather
    data for some German cities. We use Pandas and Numpy to create the data:


    ```

    import numpy as np

    ```'

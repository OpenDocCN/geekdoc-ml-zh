  md: '# FROM DIVIDING LINES TO NEURAL NETWORKS


    We will develop a simple neural network in this chapter of our tutorial. A network
    capable of separating two classes, which are separable by a straight line in a
    2-dimensional feature space.


    # LINE SEPARATION


    Before we start programming a simple neural network, we are going to develop a
    different concept. We want to search for straight lines that separate two points
    or two classes in a plane. We will only look at straight lines going through the
    origin. We will look at general straight lines later in the tutorial.


    You could imagine that you have two attributes describing an eddible object like
    a fruit for example: "sweetness" and "sourness".


    We could describe this by points in a two-dimensional space. The A axis is used
    for the values of sweetness and the y axis is correspondingly used for the sourness
    values. Imagine now that we have two fruits as points in this space, i.e. an orange
    at position (3.5, 1.8) and a lemon at (1.1, 3.9).


    We could define dividing lines to define the points which are more lemon-like
    and which are more orange-like.


    In the following diagram, we depict one lemon and one orange. The green line is
    separating both points. We assume that all other lemons are above this line and
    all oranges will be below this line.


    ![](bbox=[0.49, 0.28, 0.9, 0.5])'
  merge: -1

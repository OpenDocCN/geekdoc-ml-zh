    \ = file_data[:,:-1]\nlabels = file_data[:,2:]\n\nlabels = labels.reshape((labels.shape[0]))\n\
    ```\n\nWe had called the data file `squirrels.txt`, because we imagined a strange\
    \ kind of animal living in the Sahara desert. The x-values stand for the night\

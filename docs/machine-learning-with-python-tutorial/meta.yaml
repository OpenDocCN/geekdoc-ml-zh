  md: '# RUNNING A NEURAL NETWORK WITH PYTHON


    # A NEURAL NETWORK CLASS


    We learned in the previous chapter of our tutorial on neural networks the most
    important facts about weights. We saw how they are used and how we can implement
    them in Python. We saw that the multiplication of the weights with the input values
    can be accomplished with arrays from Numpy by applying matrix multiplication.


    However, what we hadn''t done was to test them in a real neural network environment.
    We have to create this environment first. We will now create a class in Python,
    implementing a neural network. We will proceed in small steps so that everything
    is easy to understand.


    The most essential methods our class needs are:



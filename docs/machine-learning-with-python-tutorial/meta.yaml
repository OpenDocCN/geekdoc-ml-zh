    # BACKPROPAGATION IN DETAIL


    Now, we have to go into the details, i.e. the mathematics.


    We will start with the simpler case. We look at a linear network. Linear neural
    networks are networks where the output signal is created by summing up all the
    weighted input signals. No activation function will be applied to this sum, which
    is the reason for the linearity.


    The will use the following simple network.


    When we are training the network we have samples and corresponding labels. For
    each output value $o_i$ we have a label $t_i$, which is the target or the desired
    value. If the label is equal to the output, the result is correct'

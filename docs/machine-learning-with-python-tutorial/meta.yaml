    \ - s_2) & \\cdots & s_n(\\delta_{nn} - s_n) \\end{bmatrix}$\n\n```\npython\n\
    import numpy as np\n\ndef softmax(x):\n    e_x = np.exp(x)\n    return e_x / e_x.sum()\n\

  md: 'This means that we have to take out every second product of the summation,
    which means that we have to delete the whole second column of the matrix. The
    second element from the input vector has to be deleted as well.


    ![](bbox=[0.35, 0.18, 0.65, 0.28])


    Now we will examine what happens if we take out a hidden node. We take out the
    first hidden node, i.e. $h_1$.


    ![](bbox=[0.15, 0.35, 0.85, 0.65])


    In this case, we can remove the complete first line of our weight matrix:


    ![](bbox=[0.35, 0.71, 0.65, 0.81])


    Taking out a hidden node affects the next weight matrix as well. Let''s have a
    look at what is happening in the network graph:'
  merge: -1
  pgno: 239
- img_proc: false
  md: '![](bbox=[0.17, 0.1, 0.83, 0.29])


    It is easy to see that the first column of the who weight matrix has to be removed
    again:


    ![](bbox=[0.3, 0.36, 0.7, 0.44])


    So far we have arbitrarily chosen one node to deactivate. The dropout approach
    means that we randomly choose a certain number of nodes from the input and the
    hidden layers, which remain active and turn off the other nodes of these layers.
    After this we can train a part of our learn set with this network. The next step
    consists in activating all the nodes again and randomly chose other nodes. It
    is also possible to train the whole training set with the randomly created dropout
    networks.


    We present three possible randomly chosen dropout networks in the following three
    diagrams:


    ![](bbox=[0.17, 0.63, 0.83, 0.9])'

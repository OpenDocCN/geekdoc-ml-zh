  md: '# NEURAL NETWORK


    # USING MNIST


    The [MNIST database](https://en.wikipedia.org/wiki/MNIST_database) (Modified National
    Institute of Standards and Technology database) of handwritten digits consists
    of a training set of 60,000 examples, and a test set of 10,000 examples. It is
    a subset of a larger set available from NIST. Additionally, the black and white
    images from NIST were size-normalized and centered to fit into a 28x28 pixel bounding
    box and anti-aliased, which introduced grayscale levels.


    This database is well liked for training and testing in the field of machine learning
    and image processing. It is a remixed subset of the original NIST datasets. One
    half of the 60,000 training images consist of images from NIST''s testing dataset
    and the other half from Nist''s training set. The 10,000 images from the testing
    set are similarly assembled.


    The MNIST dataset is used by researchers to test and compare their research results
    with others. The lowest error rates in literature are as low as 0.21 percent.¹


    ![](bbox=[0.49, 0.26, 0.9, 0.58])


    # READING THE MNIST DATA SET


    The images from the data set have the size 28 x 28. They are saved in the csv
    data files [mnist_train.csv](mnist_train.csv) and [mnist_test.csv](mnist_test.csv).


    Every line of these files consists of an image, i.e. 785 numbers between 0 and
    255.


    The first number of each line is the label, i.e. the digit which is depicted in
    the image. The following 784 numbers are the pixels of the 28 x 28 image.


    ```

    python

    import numpy as np


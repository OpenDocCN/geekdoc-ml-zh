  md: "# MULTI-LAYER PERCEPTRON\n\n```\nfrom sklearn.neural_network import MLPClassifier\n\
    X = [[0., 0.], [0., 1.], [1., 0.], [1., 1.]]\ny = [0, 0, 0, 1]\nclf = MLPClassifier(solver='lbfgs',\
    \ alpha=1e-5,\n                    hidden_layer_sizes=(5, 2), random_state=1)\n\
    \nprint(clf.fit(X, y))\n```\n\nMLPClassifier(alpha=1e-05, hidden_layer_sizes=(5,\
    \ 2), random_state=1,\n              solver='lbfgs')\n\nThe following diagram\
    \ depicts the neural network, that we have trained for our classifier clf. We\
    \ have two input nodes $X_0$ and $X_1$, called the input layer, and one output\
    \ neuron 'Out'. We have two hidden layers the first one with the neurons $H_{00}\
    \ ... H_{04}$ and the second hidden layer consisting of $H_{10}$ and $H_{11}$.\
    \ Each neuron of the hidden layers and the output neuron possesses a corresponding\
    \ Bias, i.e. $B_{00}$ is the corresponding Bias to the neuron $H_{00}$, $B_{01}$\
    \ is the corresponding Bias to the neuron $H_{01}$ and so on.\n\nEach neuron of\
    \ the hidden layers receives the output from every neuron of the previous layers\
    \ and transforms these values with a weighted linear summation\n\n$$\\sum_{i=0}^{n-1}\
    \ w_i x_i = w_0 x_0 + w_1 x_1 + \\dots + w_{n-1} x_{n-1}$$\n\ninto an output value,\
    \ where n is the number of neurons of the layer and $w_i$ corresponds to the $i^{th}$\
    \ component of the weight vector. The output layer receives the values from the\
    \ last hidden layer. It also performs a linear summation, but a non-linear activation\
    \ function\n\n$$g(\\cdot): R \\rightarrow R$$\n\nlike the hyperbolic tan function\
    \ will be applied to the summation result."

  md: "# NEURAL NETWORKS WITH SCIKIT / SKLEARN\n\n# INTRODUCTION\n\nIn the previous\
    \ chapters of our tutorial, we manually created Neural Networks. This was necessary\
    \ to get a deep understanding of how Neural networks can be implemented. This\
    \ understanding is very useful to use the classifiers provided by the `sklearn`\
    \ module of Python. In this chapter we will use the multilayer perceptron classifier\
    \ `MLPClassifier` contained in `sklearn.neural_network`\n\n![](bbox=[0.41, 0.22,\
    \ 0.9, 0.51])\n\nWe will use again the Iris dataset, which we had used already\
    \ multiple times in our Machine Learning tutorial with Python, to introduce this\
    \ classifier.\n\n# MLPCLASSIFIER CLASSIFIER\n\nWe will continue with examples\
    \ using the multilayer perceptron (MLP). The multilayer perceptron (MLP) is a\
    \ feedforward artificial neural network model that maps sets of input data onto\
    \ a set of appropriate outputs. An MLP consists of multiple layers and each layer\
    \ is fully connected to the following one. The nodes of the layers are neurons\
    \ using nonlinear activation functions, except for the nodes of the input layer.\
    \ There can be one or more non-linear hidden layers between the input and the\
    \ output layer.\n\n# MULTILABEL EXAMPLE\n\n```\npython\nimport matplotlib.pyplot\
    \ as plt\nfrom sklearn.datasets import make_blobs\n\nn_samples = 200\nblob_centers\
    \ = ([1, 1], [3, 4], [1, 3.3], [3.5, 1.8])\ndata, labels = make_blobs(n_samples=n_samples,\n\
    \                         centers=blob_centers,\n                         cluster_std=0.5,\n\
    \                         random_state=0)\n```"

- img_proc: false
  md: '![](bbox=[0.15, 0.1, 0.85, 0.48])


    The green line is defined by


    $$y = mx$$


    where:


    m is the slope or gradient of the line and x is the independent variable of the
    function.


    $$m = \frac{p_2}{p_1}x$$


    This means that a point $P'' = (p''_1, p''_2)$ is on this line, if the following
    condition is fulfilled:


    $$mp''_1 - p''_2 = 0$$


    The following Python program plots a graph depicting the previously described
    situation:


    ```

    python

    import matplotlib.pyplot as plt

    import numpy as np

    ```'

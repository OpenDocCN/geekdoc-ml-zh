  md: 'The following picture shows in a simple way how the nearest neighbor classifier
    works. The puzzle piece is unknown. To find out which animal it might be we have
    to find the neighbors. If k=1, the only neighbor is a cat and we assume in this
    case that the puzzle piece should be a cat as well. If k=4, the nearest neighbors
    contain one chicken and three cats. In this case again, it will be save to assume
    that our object in question should be a cat.



  md: '# K-NEAREST-NEIGHBOR CLASSIFIER


    > "Show me who your friends are and I''ll tell you who you are?"


    The concept of the k-nearest neighbor classifier can hardly be simpler described.
    This is an old saying, which can be found in many languages and many cultures.
    It''s also metnioned in other words in the Bible: "He who walks with wise men
    will be wise, but the companion of fools will suffer harm" (Proverbs 13:20 )


    ![](bbox=[0.4, 0.16, 0.9, 0.35])


    This means that the concept of the k-nearest neighbor classifier is part of our
    everyday life and judging: Imagine you meet a group of people, they are all very
    young, stylish and sportive. They talk about there friend Ben, who isn''t with
    them. So, what is your imagination of Ben? Right, you imagine him as being yong,
    stylish and sportive as well.


    If you learn that Ben lives in a neighborhood where people vote conservative and
    that the average income is above 200000 dollars a year? Both his neighbors make
    even more than 300,000 dollars per year? What do you think of Ben? Most probably,
    you do not consider him to be an underdog and you may suspect him to be a conservative
    as well?


    The principle behind nearest neighbor classification consists in finding a predefined
    number, i.e. the ''k'' - of training samples closest in distance to a new sample,
    which has to be classified. The label of the new sample will be defined from these
    neighbors. k-nearest neighbor classifiers have a fixed user defined constant for
    the number of neighbors which have to be determined. There are also radius-based
    neighbor learning algorithms, which have a varying number of neighbors based on
    the local density of points, all the samples inside of a fixed radius. The distance
    can, in general, be any metric measure: standard Euclidean distance is the most
    common choice. Neighbors-based methods are known as non-generalizing machine learning
    methods, since they simply "remember" all of its training data. Classification
    can be computed by a majority vote of the nearest neighbors of the unknown sample.


    The k-NN algorithm is among the simplest of all machine learning algorithms, but
    despite its simplicity, it has been quite successful in a large number of classification
    and regression problems, for example character recognition or image analysis.


    Now let''s get a little bit more mathematically:


    As explained in the chapter Data Preparation, we need labeled learning and test
    data. In contrast to other classifiers, however, the pure nearest-neighbor classifiers
    do not do any learning, but the so-called learning set LS is a basic component
    of the classifier. The k-Nearest-Neighbor Classifier (kNN) works directly on the
    learned samples, instead of creating rules compared to other classification methods.'
  merge: -1
  pgno: 73
- img_proc: false
  md: "# Nearest Neighbor Algorithm:\n\nGiven a set of categories $C = \\{c_1, c_2,\
    \ \\dots c_m\\}$, also called classes, e.g. {\"male\", \"female\"}. There is also\
    \ a learnset $LS$ consisting of labelled instances:\n\n$LS = \\{(o_1, c_{o_1}),\
    \ (o_2, c_{o_2}), \\dots(o_n, c_{o_n})\\}$\n\nAs it makes no sense to have less\
    \ lebelled items than categories, we can postulate that\n\n$n > m$ and in most\
    \ cases even $n \\ggg m$ (n much greater than m.)\n\nThe task of classification\
    \ consists in assigning a category or class $c$ to an arbitrary instance $o$.\n\
    \nFor this, we have to differentiate between two cases:\n\n+   - Case 1:\n  The\
    \ instance $o$ is an element of $LS$, i.e. there is a tupel $(o, c) \\in LS$\n\
    \  In this case, we will use the class $c$ as the classification result.\n- Case\
    \ 2:\n  We assume now that $o$ is not in $LS$, or to be precise:\n  $\\forall\
    \ c \\in C, (o, c) \\notin LS$\n\n$o$ is compared with all the instances of $LS$.\
    \ A distance metric $d$ is used for the comparisons.\nWe determine the $k$ closest\
    \ neighbors of $o$, i.e. the items with the smallest distances.\n$k$ is a user\
    \ defined constant and a positive integer, which is usually small.\nThe number\
    \ $k$ is typically chosen as the square root of $LS$, the total number of points\
    \ in the training data set.\n\nTo determine the $k$ nearest neighbors we reorder\
    \ $LS$ in the following way:\n$(o_{i_1}, c_{o_{i_1}}), (o_{i_2}, c_{o_{i_2}}),\
    \ \\dots(o_{i_n}, c_{o_{i_n}})$\nso that $d(o_{i_j}, o) \\leq d(o_{i_{j+1}}, o)$\
    \ is true for all $1 \\leq j \\leq n - 1$\nThe set of k-nearest neighbors $N_k$\
    \ consists of the first $k$ elements of this ordering, i.e.\n$N_k = \\{(o_{i_1},\
    \ c_{o_{i_1}}), (o_{i_2}, c_{o_{i_2}}), \\dots(o_{i_k}, c_{o_{i_k}})\\}$\nThe\
    \ most common class in this set of nearest neighbors $N_k$ will be assigned to\
    \ the instance $o$. If there is no unique most common class, we take an arbitrary\
    \ one of these.\n\nThere is no general way to define an optimal value for 'k'.\
    \ This value depends on the data. As a general rule we can say that increasing\
    \ 'k' reduces the noise but on the other hand makes the boundaries less distinct.\n\
    \nThe algorithm for the k-nearest neighbor classifier is among the simplest of\
    \ all machine learning algorithms.\nk-NN is a type of **instance-based learning**,\
    \ or lazy learning. In machine learning, **lazy learning** is understood to be\
    \ a learning method in which generalization of the training data is delayed until\
    \ a query is made to the system. On the other hand, we have **eager learning**,\
    \ where the system usually generalizes the training data before receiving queries.\
    \ In other words: The function is only approximated locally and all the computations\
    \ are performed, when the actual classification is being performed."

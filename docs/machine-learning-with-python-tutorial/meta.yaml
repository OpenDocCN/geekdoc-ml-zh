  md: '# ABSTRACTION OF A BIOLOGICAL NEURON AND ARTIFICIAL NEURON


    Even though the above image is already an abstraction for a biologist, we can
    further abstract it:


    ![](bbox=[0.26, 0.18, 0.73, 0.33])


    A perceptron of artificial neural networks is simulating a biological neuron.


    ![](bbox=[0.26, 0.4, 0.73, 0.56])


    It is amazingly simple, what is going on inside the body of a perceptron or neuron.
    The input signals get multiplied by weight values, i.e. each input has its corresponding
    weight. This way the input can be adjusted individually for every $x_i$. We can
    see all the inputs as an input vector and the corresponding weights as the weights
    vector.


    When a signal comes in, it gets multiplied by a weight value that is assigned
    to this particular input. That is, if a neuron has three inputs, then it has three
    weights that can be adjusted individually. The weights usually get adjusted during
    the learn phase.

    After this the modified input signals are summed up. It is also possible to add
    additionally a so-called bias ''b'' to this sum. The bias is a value which can
    also be adjusted during the learn phase.


    Finally, the actual output has to be determined. For this purpose an activation
    or step function $\Phi$ is applied to the weighted sum of the input values.'

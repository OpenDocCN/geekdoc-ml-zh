    \   5.6 Workshop\n   5.7 Face Synthesis\n   5.8 Motion Detecting CCTV\n6. Geometric\
    \ Transform\n   6.1 Translate, Scaling, Rotate\n   6.2 Warping\n   6.3 Lens Distortion\n\
    7. Workshop\n   - Face Mosaic\n   - Liquefy Tool\n   - Distortion Camera\n8. Filter\n\
    \   8.1 Convolution Filter\n   8.2 Blurring\n   8.3 Edge detection\n   8.4 Morphology\n\
    \   8.5 Image pyramids\n   8.6 Workshop\n   - Mosaic2\n   - Cartoonizing\n9. Image\
    \ Segmentation\n   9.1 Contour\n   9.2 Hough Transform\n   9.3 Connected Component\n\
    \   9.4 Workshop\n   - Recognizing Shapes\n   - Document Scanner\n   - Coin Counter\n\
    10. Matching and Tracking\n    10.1 Matching with a similar picture\n    10.2\
    \ Feature and Key Point\n    10.3 Descriptor Extractor\n    10.4 Feature Matching\n\
    \    10.5 Tracking\n    10.6 Workshop\n    - Panorama Picture Maker\n    - Book\
    \ cover searcher\n11. Machine Learning and Object Detection\n    11.1 k-Means\n\
    \    11.2 k-NN\n    11.3 SVM and HOG\n    11.4 Cascade Classifier\n    11.5 Workshop\n\
    \    - Face Mosaic\n    - Hanibal Mask (Snapchat Filter)\n    - Face Distortion\
    \ (Snapchat Filter)\n\n# Computer Vision\n\n1. **Computer Vision**\n2. Application\
    \ Field\n\n# Field of Computer Vision\n\n- Image Processing\n  - Process of getting\
    \ better quality video using computer\n  - Print new video after receiving video\n\
    \    - Image Enhancement\n    - Image Restoration\n    - Image Compositing\n \
    \   - Image Segmentation\n- Computer Vision(CV)\n  - Get meaningful info. from\
    \ video\n  - Print data from received video\n    - Object Detection\n    - Object\
    \ Recognition\n    - Object Tracking\n- Computer Graphics(CG)\n  - Generating\
    \ video not exiting\n  - Print new data from received data\n\n# Image Processing\
    \ Case\n\n- Improve Image\n\n![](img/9de0cb7cd12c1232044968590f57e471_6_0.png)\n\

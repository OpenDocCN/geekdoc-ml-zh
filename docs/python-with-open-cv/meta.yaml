    \ = None\ncv2.destroyAllWindows()\ncap.release()\n```"
  mdcn: "## 匹配与跟踪\n\n1.  使用相似图像进行匹配\n2.  特征与关键点\n3.  描述符提取器\n4.  特征匹配\n5.  **跟踪**\n\
    6.  实践工作坊\n\n## 背景减除\n\n-   需要跟踪访客或交通流量\n-   使用预备好的背景图像进行计算较为简单\n-   但通常没有预备好的背景图像\n\
    -   `cv2.BackgroundSubtractor` 抽象类\n    -   `fgmask = bgsubtractor.apply( image[,\
    \ fgmask[, learningRate]] )`\n        -   `image`：输入图像\n        -   `fgmask`：前景图像掩码\n\
    \        -   `learningRate=-1`：背景训练速度，范围 0 ~ 1，-1 表示自动\n    -   `backgroundImage\
    \ = bgsubtractor.getBackgroundImage([,backgroundImage])`\n        -   `backgroundImage`：训练得到的背景图像\n\
    -   消除背景的算法\n    -   `BackgroundSubtractorMOG`\n    -   `BackgroundSubtractorMOG2`\n\
    \    -   `BackgroundSubtractorGMG`\n\n## BackgroundSubtractorMOG\n\n-   基于高斯混合模型的背景/前景分割算法\n\
    -   K 个高斯分布（K 从 3 到 5）\n-   对每个背景像素使用混合模型\n-   权重表示每个像素停留在某处的比例\n    -   背景应停留较长时间或保持固定\n\
    -   `cv2.bgsegm.createBackgroundSubtractorMOG()`\n    -   必须设置历史长度、高斯混合数量、阈值\n\
    \    -   仅调用 `apply`（帧），基本值已设定\n    -   contrib 模块\n\n## ❖ BackgroundSubtractorMOG\n\
    \n-   示例\n\n```python\nimport numpy as np, cv2\n\ncap = cv2.VideoCapture('../img/walking.avi')\n\
    fps = cap.get(cv2.CAP_PROP_FPS) # 获取帧数\ndelay = int(1000/fps)\n\nfgbg = cv2.bgsegm.createBackgroundSubtractorMOG()\n\
    while cap.isOpened():\n    ret, frame = cap.read()\n    if not ret:\n        break\n\
    \    fgmask = fgbg.apply(frame)\n    cv2.imshow('frame',fgmask)\n    cv2.imshow('bg',\
    \ fgbg.getBackgroundImage())\n    if cv2.waitKey(1) & 0xff == 27:\n        break\n\
    cap.release()\ncv2.destroyAllWindows()\n```\n\n-   示例 <结果>\n\n![](img/9de0cb7cd12c1232044968590f57e471_340_0.png)\n\
    \n## ❖ BackgroundSubtractorMOG2\n\n-   基于两篇论文。\n-   Z.Zivkovic, \"Improved adaptive\
    \ Gaussian mixture model for background subtraction\" (2004)\n-   \"Efficient\
    \ Adaptive Density Estimation per Image Pixel for the Task of Background Subtraction\"\
    \ (2006)。\n-   为每个像素选择合适的高斯分布\n-   适用于各种场景，尤其对光照变化适应性好\n-   `retval = cv.createBackgroundSubtractorMOG2([,\
    \ history[, varThreshold[, detectShadows]]] )`\n    -   `history=500`：历史帧数\n \
    \   -   `varThreshold=16`：分布阈值\n    -   `detectShadows=True`：标记阴影\n-   `fgbg.apply(frame)`\n\
    \    -   `detectShadows` 设为 `True`（基本值）\n        -   以灰色标记阴影，处理速度会变慢。\n-   示例\n\
    \n```python\nimport numpy as np, cv2\n\ncap = cv2.VideoCapture('../img/walking.avi')\n\
    fps = cap.get(cv2.CAP_PROP_FPS) # 统计帧数\ndelay = int(1000/fps)\nfgbg = cv2.createBackgroundSubtractorMOG2()\n\
    while cap.isOpened():\n    ret, frame = cap.read()\n    if not ret:\n        break\n\
    \    fgmask = fgbg.apply(frame)\n    cv2.imshow('frame',frame)\n    cv2.imshow('bgsub',fgmask)\n\
    \    if cv2.waitKey(delay) & 0xff == 27:\n        break\ncap.release()\ncv2.destroyAllWindows()\n\
    ```\n\n## ❖ BackgroundSubtractorMOG2\n\n-   示例 <结果>\n\n![](img/9de0cb7cd12c1232044968590f57e471_342_0.png)\n\
    \n## ❖ BackgroundSubtractorGMG\n\n-   Andrew B. Godbehere, Akihiro Matsukawa,\
    \ Ken Goldberg, \"Visual Tracking of Human Visitors under Variable-Lighting Conditions\
    \ for a Responsive Audio Art Installation\", 2012。\n-   结合统计背景图像估计和像素级贝叶斯分割的算法。\n\
    -   用于初始帧（120帧，基本值）的背景建模\n    -   前几帧将全黑\n-   使用贝叶斯假设识别前景物体\n-   对最近的视图差异赋予更高权重以适应光照变化\n\
    -   使用形态学滤波器消除噪声（闭运算、开运算）\n-   `fgbg = cv2.bgsegm.createBackgroundSubtractorGMG()`\
    \ # 创建对象\n-   `kernel = cv2.getStructuringElement(cv2.MORPH_ELLIPSE,(3,3))`\n\
    -   `fgmask = fgbg.apply(frame)`\n-   `fgmask = cv2.morphologyEx(fgmask, cv2.MORPH_OPEN,\
    \ kernel)`\n\n## ❖ BackgroundSubtractorGMG\n\n-   示例\n\n```python\nimport numpy\
    \ as np\nimport cv2\ncap = cv2.VideoCapture('../img/walking.avi')\n#fgbg = cv2.createBackgroundSubtractorGMG()\
    \ # 创建对象\nfgbg = cv2.bgsegm.createBackgroundSubtractorGMG() # 创建对象\nkernel = cv2.getStructuringElement(cv2.MORPH_ELLIPSE,(3,3))\n\
    while(1):\n    ret, frame = cap.read()\n    fgmask = fgbg.apply(frame)\n    fgmask\
    \ = cv2.morphologyEx(fgmask, cv2.MORPH_OPEN,\nkernel) # 滤波以减少噪声\n    cv2.imshow('frame',fgmask)\n\
    \    k = cv2.waitKey(30) & 0xff\n    if k == 27:\n        break\ncap.release()\n\
    cv2.destroyAllWindows()\n```\n\n-   示例 <结果>\n\n![](img/9de0cb7cd12c1232044968590f57e471_343_0.png)\n\
    \n## 光流\n\n-   前一帧与当前帧之间运动方向和距离的分布\n-   无需帧内先前信息即可追踪运动的方法\n-   稀疏光流（较少使用）\n  \
    \  -   预设部分点进行追踪\n    -   Lucas-Kanade：平方方法\n-   稠密光流（密集）\n    -   计算所有像素的速度\n\
    \    -   计算量大\n\n![](img/9de0cb7cd12c1232044968590f57e471_344_0.png)\n\n## Lucas-Kanade\n\
    \n-   LK 算法的 3 个假设\n    -   亮度恒定\n        -   追踪对象的像素亮度不变\n    -   时间持续性\n   \
    \     -   图像中时间流逝快于物体运动\n        -   帧间差异不大\n    -   空间一致性\n        -   相邻点（相邻像素）很可能属于同一物体\n\
    \        -   并具有相同运动\n-   用于小窗口，无法计算大运动\n-   使用图像金字塔进行改进\n\n-   OpenCV 函数\n  \
    \  -   `cv2.calcOpticalFlowLK`：不使用图像金字塔\n    -   `cv2.calcOpticalFlowPyrLK`：使用图像金字塔\n\
    \    -   使用 `goodToTrack` 选择的点作为输入\n\n-   `calcOpticalFlowPyrLK(prevImg, nextImg,\
    \ prevPts, nextPts)`\n    -   `prevImg`：前一帧，n*1*2\n    -   `nextImg`：下一帧，n*1*2\n\
    \    -   `prevPts`：可能移动的点，n*1*2\n    -   `nextPts`：追踪对象经过的点的位置，None，使用返回值\n  \
    \  -   `winSize`：每个金字塔层级的窗口大小\n    -   `maxLevel`：图像金字塔层数，若为 0 则不使用\n    -   `criteria`：搜索停止标准\n\
    \n-   返回值：\n    -   `nextPts`：追踪对象经过的点的位置\n    -   `status`：与 `nextPts` 数量相同\n\
    \        -   每个索引为 1 或 0，0 表示未找到对应点 (n*1)\n    -   `err`：前一帧特征点与当前帧移动距离点之间的距离，用于剔除\n\
    \n-   光流示例 <1/3>\n\n```python\nimport numpy as np, cv2\n\ncap = cv2.VideoCapture('../img/walking.avi')\n\
    fps = cap.get(cv2.CAP_PROP_FPS) # 统计帧数\ndelay = int(1000/fps)\n\ncolor = np.random.randint(0,255,(200,3))\n\
    lines = None\nprevImg = None\n# calcOpticalFlowPyrLK 设置停止条件\ntermcriteria = (cv2.TERM_CRITERIA_EPS\
    \ | cv2.TERM_CRITERIA_COUNT, 10, 0.03)\n```\n\n## Lucas-Kanade\n\n-   光流示例 <2/2>\n\
    \n```python\nwhile cap.isOpened():\n    ret,frame = cap.read()\n    if not ret:\n\
    \        break\n    img_draw = frame.copy()\n    if prevImg is None:\n       \
    \ prevImg = cv2.cvtColor(frame, cv2.COLOR_BGR2GRAY)\n        lines = np.zeros_like(frame)\n\
    \        prevPt = cv2.goodFeaturesToTrack(prevImg, 200, 0.01, 10)\n\n    else:\n\
    \        nextImg = cv2.cvtColor(frame, cv2.COLOR_BGR2GRAY)\n        nextPt, status,\
    \ err = cv2.calcOpticalFlowPyrLK(prevImg, nextImg, prevPt, None, criteria=termcriteria)\n\
    \        prevMv = prevPt[status==1]\n        nextMv = nextPt[status==1]\n\n  \
    \  for i,(p, n) in enumerate(zip(prevMv, nextMv)):\n        px,py = p.ravel()\n\
    \        nx,ny = n.ravel()\n        cv2.line(lines, (px, py), (nx,ny), color[i].tolist(),2)\n\
    \        cv2.circle(img_draw, (nx,ny), 2, color[i].tolist(), -1)\n    img_draw\
    \ = cv2.add(img_draw, lines)\n    prevImg = nextImg\n    prevPt = nextMv.reshape(-1,1,2)\n\
    \    cv2.imshow('OpticalFlow-LK', img_draw)\n    key = cv2.waitKey(delay)\n  \
    \  if key == 27 : # Esc: 结束\n        break\n    elif key == 8: # Backspace: 删除追踪日志\n\
    \        prevImg = None\ncv2.destroyAllWindows()\ncap.release()\n```"

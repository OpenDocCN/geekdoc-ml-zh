    \ hierarchy = cv2.findContours(imthres,\ncv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_NONE)\n\
    print(len(contour), hierarchy)\n\nim2, contour2, hierarchy = cv2.findContours(imthres,\
    \ cv2.RETR_TREE,\ncv2.CHAIN_APPROX_SIMPLE)\nprint(len(contour2), hierarchy)\n\n\
    cv2.drawContours(img, contour, -1, (0,255,0), 3)\nfor idx, cont in enumerate(contour2):\n\
    \    color = [int(i) for i in np.random.randint(0,255, 3)]\n    cv2.drawContours(img2,\
    \ contour2, idx, color, 3)\n    cv2.putText(img2, str(idx), tuple(cont[0][0]),\n\
    cv2.FONT_HERSHEY_PLAIN, 1, (0,0,255))\n\ncv2.imshow('RETR_EXTERNAL', img)\ncv2.imshow('RETR_TREE',\
    \ img2)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n- Example <Result>\n\n\
    ```\n3 [[[ 1 -1 -1 -1]\n  [ 2  0 -1 -1]\n  [-1  1 -1 -1]]]\n6 [[[ 2 -1  1 -1]\n\
    \  [-1 -1 -1  0]\n  [ 4  0  3 -1]\n  [-1 -1 -1  2]\n  [-1  2  5 -1]\n  [-1 -1\
    \ -1  4]]]\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_253_0.png)\n\n## Image\
    \ Moment\n\n- Moment\n  - Physics, Terminology for the quantity of force\n- Image\
    \ Moment\n  - Show quantity of the object\n    - $m_{p,q} = \\sum_{x} \\sum_{y}\
    \ f(x, y) x^p y^q$\n  - Area that contour is surrounding; addition of multiplication\
    \ of x,y coordination pixel value and coordination index p,q\n  - Binary image:\
    \ If it is not 0, it is 1\n- p, q degree : Calculate by changing from 0 ~3, get\
    \ meaningful info\n- m00 : Area of contour\n  - 0 degree of all number is 1, Add\
    \ by multiplying by 1 to the number of area\n- Center moment\n  - $\\mu_{p,q}\
    \ = \\sum_{x} \\sum_{y} f(x,y)(x - \\bar{x})^p(y - \\bar{y})^q$\n    - $\\bar{x}\
    \ = \\frac{m_{10}}{m_{00}}$\n    - $\\bar{y} = \\frac{m_{01}}{m_{00}}$\n\n###\
    \ ❖ Image Moment\n\n- moment = cv2.moments(contour)\n  - contour : Coordination\
    \ of the calculation subject for moment\n  - moment : Result Moment, Python dictionary\n\
    \    - m00, m01, m10, m11, m02, m12, m20, m21, m03, m30 : Space moment\n    -\
    \ mu20, mu11, mu02, mu30, mu21, mu12, mu03 : Center moment\n    - nu20, nu11,\
    \ nu02, nu30, nu21, nu03 : Regular center moment\n- retval = cv.contourArea(contour[,\
    \ oriented=False]): Calculate area with contour\n  - contour: Contour to calculate\
    \ area\n  - oriented: Contour orientation flag\n    - True: Turnaround negative\
    \ depends on contour orientation\n    - False : Turnaround absolute value\n  -\
    \ retval : Area of Contour\n- retval = cv.arcLength( curve, closed ) : Calculate\
    \ circumference\n  - curve : Contour to calculate\n  - closed : Close or not flag\n\
    \  - retval : Value of contour circumference\n\n### ❖ Image Moment\n\n- Center\
    \ Point, Area, Circumference Example < 1/2 >\n\n```python\nimport cv2\nimport\
    \ numpy as np\nimg = cv2.imread(\"../img/shapes.png\")\nimggray = cv2.cvtColor(img,\

    \n1. Convolution Filter\n2. Blurring\n3. Edge Detection\n4. Morphology\n5. **Image\
    \ Pyramids**\n6. Workshop\n\n## Image Pyramids\n\n- Stacking up like pyramid by\
    \ reducing and enlarging image step-by-step\n- Speed and accuracy\n    - Analyze\

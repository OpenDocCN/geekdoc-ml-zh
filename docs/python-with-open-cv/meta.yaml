    \ - `cv2.COLOR_BGR2HSV` : Change BGR color image to HSV image\n    - `cv2.COLOR_HSV2BGR`\
    \ : Change HSV color image to BGR image\n    - `cv2.COLOR_BGR2YUV` : Change BGR\
    \ color image to YUV\n    - `cv2.COLOR_YUV2BGR` : Change YUV color image to BGR\n\

    \ Merge objects, tuple\n\n```python\n>>> a = np.arange(4).reshape(2,2)\n>>> a\n\
    array([[0, 1],\n       [2, 3]])\n>>> b = np.arange(10, 14).reshape(2,2)\n>>> b\n\

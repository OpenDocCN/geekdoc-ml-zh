    # ❖ ROI Copy and Open New Window


    ```

    import cv2

    import numpy as np


    img = cv2.imread(''./img/sunset.jpg'')


    x=320; y=150; w=50; h=50

    roi = img[y:y+h, x:x+w]      # roi Set

    img2 = roi.copy()             # roi Array Copy---①


    img[y:y+h, x+w:x+w+w] = roi

    cv2.rectangle(img, (x,y), (x+w+w, y+h), (0,255,0))


    cv2.imshow("img", img)        # Print original image

    cv2.imshow("roi", img2)       # Print roi only


    cv2.waitKey(0)

    cv2.destroyAllWindows()

    ```'
- md: "## ❖ ROI Copy and Open New Window\n\n![](img/9de0cb7cd12c1232044968590f57e471_129_0.png)\n\
    \n## ❖ Select ROI with Mouse (1/2)\n\n```python\nimport cv2\nimport numpy as np\n\
    \nisDragging = False\nx0, y0, w, h = -1,-1,-1,-1\nblue, red = (255,0,0),(0,0,255)\n\
    \ndef onMouse(event,x,y,flags,param):\n    global isDragging, x0, y0, img\n  \
    \  if event == cv2.EVENT_LBUTTONDOWN:\n        isDragging = True\n        x0 =\
    \ x\n        y0 = y\n    elif event == cv2.EVENT_MOUSEMOVE:\n        if isDragging:\n\
    \            img_draw = img.copy()\n            cv2.rectangle(img_draw, (x0, y0),\
    \ (x, y), blue, 2)\n            cv2.imshow('img', img_draw)\n    elif event ==\
    \ cv2.EVENT_LBUTTONUP:\n        if isDragging:\n            isDragging = False\n\
    \            w = x - x0\n            h = y - y0\n            print(\"x:%d, y:%d,\
    \ w:%d, h:%d\" % (x0, y0, w, h))\n            if w > 0 and h > 0:\n          \
    \      img_draw = img.copy()\n                cv2.rectangle(img_draw, (x0, y0),\
    \ (x, y), red, 2)\n                cv2.imshow('img', img_draw)\n             \
    \   roi = img[y0:y0+h, x0:x0+w]\n                cv2.imshow('cropped', roi)\n\
    \                cv2.moveWindow('cropped', 0, 0)\n                cv2.imwrite('./cropped.jpg',\
    \ roi)\n                print(\"croped.\")\n        else:\n            cv2.imshow('img',\
    \ img)\n            print(\"Drag area from left top to right bottom.\")\nimg =\
    \ cv2.imread('./img/sunset.jpg')\ncv2.imshow('img', img)\ncv2.setMouseCallback('img',\
    \ onMouse)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n## ❖ Select ROI with\
    \ Mouse\n\n```\nx:193, y:174, w:-56, h:-77\nDrag area from left top to right bottom\n\
    x:314, y:148, w:64, h:54\ncroped.\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_131_0.png)\n\
    \n## ❖ Select ROI\n\n- Easy Mouse ROI selection\n- `ret=cv2.selectROI([win_name,]\
    \ img[, showCrossHair, fromCenter])`\n  - `win_name` : Name of the window for\
    \ ROI selection, str\n  - `img` : Image for ROI selection, NumPy ndarray\n  -\
    \ `showCrossHair=True` : Show or not show cross at the center of region\n  - `fromCenter=False`\
    \ : Set around mouse starting point as a center of area\n  - `ret` : Size and\
    \ coordination of selected area (x, y, w, h), When selection is canceled, all\
    \ 0\n- Space or Enter : End Selection\n- key board 'C' : Cancel Selection\n\n\
    ```python\nimport cv2, numpy as np\n\nimg = cv2.imread('../img/sunset.jpg')\n\n\

  - "[PAGE 310]\n\n# Feature Descriptor\n\n+   - Demand of feature narrator regardless\
    \ of rotation, size and orientation\n- Divide pixels surrounding Key Point into\
    \ certain size blocks\n- Calculated gradient histogram of pixel in block\n- Generally,\
    \ it shows 8 direction slope\n    - 4 x 4 x 8 for each key point = Composed of\
    \ 128 values\n\n![](img/9de0cb7cd12c1232044968590f57e471_310_0.png)\n\n# Descriptor\
    \ Extractor Interface\n\n+   - cv2.Feature2D Abstract Class\n- keypoints, descriptors\
    \ = detector.compute(image, keypoints[, descriptors]) : Calculate certain narrator\
    \ while delivery key point to turnaround\n- keypoints, descriptors = detector.detectAndCompute(image,\
    \ mask[, descriptors, useProvidedKeypoints]): Run both 0 key point detection and\
    \ feature narration calculation at once\n    - image : Input Image\n    - keypoints\
    \ : Key point necessary for narrator calculation\n    - descriptors : Calculated\
    \ narrator\n    - mask : Mask to use in key point detection\n    - useProvidedKeypoints\
    \ : When True, do not run key point detection (do not use)"
- md: "## ❖ SIFT (Scale-Invariant Feature Transform)\n\n- D.Lowe, Univ. of British\
    \ Columbia, 2004\n- Corner Matching Issue\n  - Intensity: Brightness, move, rotation,\
    \ affine strength\n  - Scaling: Detect more corner if the size is reduced\n- Solve\
    \ scale issue using Image Pyramid\n  - Find feature point at maximized Laplacian\
    \ value\n- It has patent right; only allowed to use at school and research\n-\
    \ From OpenCV3.0 package, it is not included in basic package\n  - Included in\
    \ Extra(contrib) package\n\n![](img/9de0cb7cd12c1232044968590f57e471_311_0.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_311_1.png)\n\n- Generate objects\n\
    - detector = cv.xfeatures2d.SIFT_create([, nfeatures[, nOctaveLayers[, contrastThreshold[,\
    \ edgeThreshold[, sigma]]]]] )\n  - nfeatures : Max feature number to detect\n\
    \  - nOctaveLayers : # of layers to use image pyramid\n  - contrastThreshold :\
    \ Weak feature threshold value to filter\n  - edgeThreshold : Weak edge threshold\
    \ value to filter\n  - sigma : Sigma value used in Gaussian filter to be used\
    \ in image pyramid 0 layers\n\n## ❖ SIFT (Scale-Invariant Feature Transform)\n\
    \n- Example\n\n```\nimport cv2\nimport numpy as np\n\nimg = cv2.imread('../img/house.jpg')\n\
    gray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\nsift = cv2.xfeatures2d.SIFT_create()\n\
    keypoints, descriptor = sift.detectAndCompute(gray, None)\nprint('keypoint:',len(keypoints),\
    \ 'descriptor:', descriptor.shape)\nprint(descriptor)\n\nimg_draw = cv2.drawKeypoints(img,\
    \ keypoints, None,\nflags=cv2.DRAW_MATCHES_FLAGS_DRAW_RICH_KEYPOINTS)\n\ncv2.imshow('SIFT',\
    \ img_draw)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n- Example <Result>\n\
    \n```\nkeypoint: 413 descriptor: (413, 128)\n[[  1.   1.   1. ...   0.   0.  \
    \ 1.]\n [  8.  24.   0. ...   1.   0.   4.]\n [  0.   0.   0. ...   0.   0.  \
    \ 2.]\n ...\n [  1.   8.  71. ...  73. 127.   3.]\n [ 35.   2.   7. ...   0. \
    \  0.   9.]\n [ 36.  34.   3. ...   0.   0.   1.]]\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_312_0.png)\n\
    \n## ❖ SURF (Speeded-Up Robust Feature)\n\n- Improve SIFT performance\n  - Changing\
    \ size of filter instead of Image Pyramid\n- It has patent right; only allowed\
    \ to use at school and research\n- From OpenCV3.0 package, it is not included\
    \ in basic package, but included in Extra(contrib) package\n- detector = cv.xfeatures2d.SURF_create([hessianThreshold,\
    \ nOctaves, nOctaveLayers, extended, upright])\n  - hessianThreshold : Boundary\
    \ value to detect features (100)\n  - nOctaves : # of image pyramid layer (3)\n\
    \  - extended : Narrator generating flag(False), True : 128, False : 64\n  - upright\
    \ : Orientation calculating flag (False), True : Ignore orientation, False: Apply\
    \ orientation\n- Example\n\n```\nimport cv2\nimport numpy as np\n\nimg = cv2.imread('../img/house.jpg')\n\
    gray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\nsurf = cv2.xfeatures2d.SURF_create(1000,\
    \ 3, True, True)\n\nkeypoints, desc = surf.detectAndCompute(gray, None)\nprint(desc.shape,\
    \ desc)\n\nimg_draw = cv2.drawKeypoints(img, keypoints, None,\nflags=cv2.DRAW_MATCHES_FLAGS_DRAW_RICH_KEYPOINTS)\n\
    cv2.imshow('SURF', img_draw)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n\
    ## ❖ SURF (Speeded-Up Robust Feature)\n\n- Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_314_0.png)\n\
    \n## ❖ BRIEF (Binary Robust Independent Elementary Features)\n\n- Transform floating\
    \ point data to binary string\n- Quick processing, memory use decreases\n- Only\
    \ able Descriptor calculation\n  - KeyPoint detection is depended on SIFT/SURF/Star\n\
    \  - KeyPoint: Coordination of image for feature\n  - Descriptor :\n    - Feature\
    \ information of detected local image\n    - Gradient distribution histogram information\n\
    \    - Mostly used for deciding matching level of two images\n\n## ❖ BRIEF (Binary\
    \ Robust Independent Elementary Features)\n\n- Example\n\n```\nimport cv2\nimport\
    \ numpy as np\n\nimg = cv2.imread('../img/model.jpg')\ngray = cv2.cvtColor(img,\
    \ cv2.COLOR_BGR2GRAY)\n\nstar = cv2.xfeatures2d.StarDetector_create()\nbrief =\
    \ cv2.xfeatures2d.BriefDescriptorExtractor_create()\n\nkp1 = star.detect(img,\
    \ None)\nkp2, desc = brief.compute(img, kp1)\n\nprint(desc.shape)\nprint(desc)\n\
    img = cv2.drawKeypoints(img, kp2, img)\n\ncv2.imshow('BRIEF', img)\ncv2.waitKey()\n\
    cv2.destroyAllWindows()\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_315_0.png)\n\
    \n## ORB(Oriented FAST and Rotated BRIEF)\n\n- Rublee, Rabaud, Konolige, Bradski,\
    \ 2011\n- Detect features with FAST\n- Consider rotation and orientation at BRIEF\n\
    \  - SIFT/SURF/BRIEF alternative\n- detector = cv.ORB_create([nfeatures, scaleFactor,\
    \ nlevels, edgeThreshold, firstLevel, WTA_K, scoreType, patchSize, fastThreshold]\
    \ )\n  - nfeatures=500 : Max # of features to detect\n  - scaleFactor = 1.2 :\
    \ Image pyramid ratio\n  - nlevels = 8 : # of layers in image pyramid\n  - edgeThreshold\
    \ = 31 : Size of boarder excluding search, match with patchSize\n  - firstLevel\
    \ = 0 : Initial image pyramid layer level\n  - WTA_K = 2 : # of generated temporary\
    \ coordination\n  - scoreType : Type to be used in key point detection\n    -\
    \ cv2.ORB_HARRIS_SCORE : Harris corner detection (Basic Value)\n    - cv2.ORB_FAST_SCORE\
    \ : FAST Corner detection\n  - patchSize = 31 : Patch size of narrator\n  - fastThreshold\
    \ = 20 : Threshold value to be used in FAST\n- Example\n\n```\nimport cv2\nimport\
    \ numpy as np\n\nimg = cv2.imread('../img/house.jpg')\ngray = cv2.cvtColor(img,\
    \ cv2.COLOR_BGR2GRAY)\n\norb = cv2.ORB_create()\nkeypoints, descriptor = orb.detectAndCompute(img,\
    \ None)\nimg_draw = cv2.drawKeypoints(img, keypoints,\nNone,  flags=cv2.DRAW_MATCHES_FLAGS_DRAW_RICH_KEYPOINTS)\n\
    \ncv2.imshow('ORB', img_draw)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n\
    ## ORB(Oriented FAST and Rotated BRIEF)\n\n- Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_317_0.png)\n\
    \n## Matching & Tracking\n\n1. Matching with a similar image\n2. Feature and Key\
    \ Point\n3. Descriptor Extractor\n4. **Feature Matching**\n5. Tracking\n6. Workshop\n\
    \n## Matching\n\n- Matching similarities by comparing key points and descriptor\
    \ of different images\n- Measure and detect similarity of images depends on #\
    \ of matching point\n- Image search, generate panorama image, use in object recognition\n\
    \n## Common Interface\n\n- cv2.DescriptorMatcher : Inherit matching abstract classes\n\
    - cv2.DMatch : Object to save matching result\n\n![](img/9de0cb7cd12c1232044968590f57e471_319_0.png)\n\
    \n## Common Interface\n\n- matcher = cv2.DescriptorMatcher_create(matcherType)\
    \ : Matching Generator\n  - matcherType: Algorithm of operation classes to generate,\
    \ string\n    - \"BruteForce\": BFMatcher using NORM_L2\n    - \"BruteForce-L1\"\
    : BFMatcher using NORM_L1\n    - \"BruteForce-Hamming\": BFMatcher using NORM_HAMMING\n\
    \    - \"BruteForce-Hamming(2)\": BFMatcher using NORM_HAMMING2\n    - \"FlannBased\"\
    \ : FlannBasedMatcher using NORM_L2\n- matches = matcher.match(queryDescriptors,\
    \ trainDescriptors[, mask]): 1 optimal matching\n- queryDescriptors: Array feature\
    \ narrator, narrator to be standard of matching\n- trainDescriptors: Array feature\
    \ narrator, narrator to be object of matching\n- mask: Mask for matching\n- matches:\
    \ Matching Result, DMatch List of objects\n\n- matches = matcher.knnMatch( queryDescriptors,\
    \ trainDescriptors, k[, mask[, compactResult]] : K # of most closest matching\n\
    \  - k : # of neighbors to match\n  - compactResult=False : True: If no match,\
    \ exclude in the result\n\n- matches = matcher.radiusMatch(queryDescriptors, trainDescriptors,\
    \ maxDistance[, mask, compactResult]): Distance matching within maxDistance\n\
    \  - maxDistance : Distance to match\n\n- DMatch\n  - queryIdx : queryDescriptor's\
    \ index\n  - trainIdx : trainDescriptor's index\n  - imgIdx : trainDescriptor's\
    \ image index\n  - distance : Similarity distance\n\n- cv2.drawMatches(img1, kp1,\
    \ img2, kp2, matches, flags): Mark matching point in img1, kp1 : queryDescriptor's\
    \ image and key point\n- img1, kp1 : trainDescriptor's image and key point\n-\
    \ matches : Matching Result\n- flags : Matching point drawing option\n  - cv2.DRAW_MATCHES_FLAGS_DEFAULT\
    \ : Newly generate result image (Base value)\n  - cv2.DRAW_MATCHES_FLAGS_DRAW_OVER_OUTIMG\
    \ : Do not newly generate result image\n  - cv2.DRAW_MATCHES_FLAGS_DRAW_RICH_KEYPOINTS:\
    \ Draw size and orientation of key point\n  - cv2.DRAW_MATCHES_FLAGS_NOT_DRAW_SINGLE_POINTS\
    \ : Exclude one-side matching result drawing"
  mdcn: "## ❖ SIFT（尺度不变特征变换）\n\n- D.Lowe，不列颠哥伦比亚大学，2004年\n- 角点匹配问题\n  - 强度：亮度、移动、旋转、仿射强度\n\
    \  - 缩放：如果尺寸减小，会检测到更多角点\n- 使用图像金字塔解决尺度问题\n  - 在拉普拉斯值最大化处寻找特征点\n- 它拥有专利权；仅允许在学校和研究中使用\n\
    - 从OpenCV3.0包开始，它不包含在基础包中\n  - 包含在额外（contrib）包中\n\n![](img/9de0cb7cd12c1232044968590f57e471_311_0.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_311_1.png)\n\n- 生成对象\n- detector =\
    \ cv.xfeatures2d.SIFT_create([, nfeatures[, nOctaveLayers[, contrastThreshold[,\
    \ edgeThreshold[, sigma]]]]] )\n  - nfeatures : 要检测的最大特征数\n  - nOctaveLayers :\
    \ 使用图像金字塔的层数\n  - contrastThreshold : 用于过滤弱特征的阈值\n  - edgeThreshold : 用于过滤弱边缘的阈值\n\
    \  - sigma : 在图像金字塔0层使用的高斯滤波器中的Sigma值\n\n## ❖ SIFT（尺度不变特征变换）\n\n- 示例\n\n```\n\
    import cv2\nimport numpy as np\n\nimg = cv2.imread('../img/house.jpg')\ngray =\
    \ cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\nsift = cv2.xfeatures2d.SIFT_create()\n\
    keypoints, descriptor = sift.detectAndCompute(gray, None)\nprint('keypoint:',len(keypoints),\
    \ 'descriptor:', descriptor.shape)\nprint(descriptor)\n\nimg_draw = cv2.drawKeypoints(img,\
    \ keypoints, None,\nflags=cv2.DRAW_MATCHES_FLAGS_DRAW_RICH_KEYPOINTS)\n\ncv2.imshow('SIFT',\
    \ img_draw)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n- 示例 <结果>\n\n```\n\
    keypoint: 413 descriptor: (413, 128)\n[[  1.   1.   1. ...   0.   0.   1.]\n [\
    \  8.  24.   0. ...   1.   0.   4.]\n [  0.   0.   0. ...   0.   0.   2.]\n ...\n\
    \ [  1.   8.  71. ...  73. 127.   3.]\n [ 35.   2.   7. ...   0.   0.   9.]\n\
    \ [ 36.  34.   3. ...   0.   0.   1.]]\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_312_0.png)\n\
    \n## ❖ SURF（加速稳健特征）\n\n- 改进SIFT性能\n  - 改变滤波器尺寸而非图像金字塔\n- 它拥有专利权；仅允许在学校和研究中使用\n\
    - 从OpenCV3.0包开始，它不包含在基础包中，但包含在额外（contrib）包中\n- detector = cv.xfeatures2d.SURF_create([hessianThreshold,\
    \ nOctaves, nOctaveLayers, extended, upright])\n  - hessianThreshold : 检测特征的边界值（100）\n\
    \  - nOctaves : 图像金字塔层数（3）\n  - extended : 描述符生成标志（False），True : 128，False : 64\n\
    \  - upright : 方向计算标志（False），True : 忽略方向，False: 应用方向\n- 示例\n\n```\nimport cv2\n\
    import numpy as np\n\nimg = cv2.imread('../img/house.jpg')\ngray = cv2.cvtColor(img,\
    \ cv2.COLOR_BGR2GRAY)\n\nsurf = cv2.xfeatures2d.SURF_create(1000, 3, True, True)\n\
    \nkeypoints, desc = surf.detectAndCompute(gray, None)\nprint(desc.shape, desc)\n\
    \nimg_draw = cv2.drawKeypoints(img, keypoints, None,\nflags=cv2.DRAW_MATCHES_FLAGS_DRAW_RICH_KEYPOINTS)\n\
    cv2.imshow('SURF', img_draw)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n\
    ## ❖ SURF（加速稳健特征）\n\n- 示例 <结果>\n\n![](img/9de0cb7cd12c1232044968590f57e471_314_0.png)\n\
    \n## ❖ BRIEF（二进制稳健独立基本特征）\n\n- 将浮点数据转换为二进制字符串\n- 处理快速，内存使用减少\n- 仅能进行描述符计算\n  -\
    \ 关键点检测依赖于SIFT/SURF/Star\n  - 关键点：图像中特征的坐标\n  - 描述符：\n    - 检测到的局部图像的特征信息\n  \
    \  - 梯度分布直方图信息\n    - 主要用于确定两张图像的匹配程度\n\n## ❖ BRIEF（二进制稳健独立基本特征）\n\n- 示例\n\n```\n\
    import cv2\nimport numpy as np\n\nimg = cv2.imread('../img/model.jpg')\ngray =\
    \ cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\nstar = cv2.xfeatures2d.StarDetector_create()\n\
    brief = cv2.xfeatures2d.BriefDescriptorExtractor_create()\n\nkp1 = star.detect(img,\
    \ None)\nkp2, desc = brief.compute(img, kp1)\n\nprint(desc.shape)\nprint(desc)\n\
    img = cv2.drawKeypoints(img, kp2, img)\n\ncv2.imshow('BRIEF', img)\ncv2.waitKey()\n\
    cv2.destroyAllWindows()\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_315_0.png)\n\
    \n## ORB（定向FAST和旋转BRIEF）\n\n- Rublee, Rabaud, Konolige, Bradski, 2011\n- 使用FAST检测特征\n\
    - 在BRIEF中考虑旋转和方向\n  - SIFT/SURF/BRIEF的替代方案\n- detector = cv.ORB_create([nfeatures,\
    \ scaleFactor, nlevels, edgeThreshold, firstLevel, WTA_K, scoreType, patchSize,\
    \ fastThreshold] )\n  - nfeatures=500 : 要检测的最大特征数\n  - scaleFactor = 1.2 : 图像金字塔比率\n\
    \  - nlevels = 8 : 图像金字塔中的层数\n  - edgeThreshold = 31 : 排除搜索的边界大小，与patchSize匹配\n\
    \  - firstLevel = 0 : 初始图像金字塔层级别\n  - WTA_K = 2 : 生成的临时坐标数\n  - scoreType : 关键点检测中使用的类型\n\
    \    - cv2.ORB_HARRIS_SCORE : Harris角点检测（基本值）\n    - cv2.ORB_FAST_SCORE : FAST角点检测\n\
    \  - patchSize = 31 : 描述符的块大小\n  - fastThreshold = 20 : FAST中使用的阈值\n- 示例\n\n```\n\
    import cv2\nimport numpy as np\n\nimg = cv2.imread('../img/house.jpg')\ngray =\
    \ cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\norb = cv2.ORB_create()\nkeypoints,\
    \ descriptor = orb.detectAndCompute(img, None)\nimg_draw = cv2.drawKeypoints(img,\
    \ keypoints,\nNone,  flags=cv2.DRAW_MATCHES_FLAGS_DRAW_RICH_KEYPOINTS)\n\ncv2.imshow('ORB',\
    \ img_draw)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n## ORB（定向FAST和旋转BRIEF）\n\
    \n- 示例 <结果>\n\n![](img/9de0cb7cd12c1232044968590f57e471_317_0.png)\n\n## 匹配与跟踪\n\
    \n1. 与相似图像匹配\n2. 特征与关键点\n3. 描述符提取器\n4. **特征匹配**\n5. 跟踪\n6. 实践\n\n## 匹配\n\n- 通过比较不同图像的关键点和描述符来匹配相似性\n\
    - 根据匹配点数量来衡量和检测图像的相似性\n- 图像搜索、生成全景图像、用于物体识别\n\n## 通用接口\n\n- cv2.DescriptorMatcher\
    \ : 继承匹配抽象类\n- cv2.DMatch : 保存匹配结果的对象\n\n![](img/9de0cb7cd12c1232044968590f57e471_319_0.png)\n\
    \n## 通用接口\n\n- matcher = cv2.DescriptorMatcher_create(matcherType) : 匹配生成器\n \
    \ - matcherType: 要生成的操作类算法，字符串\n    - \"BruteForce\": 使用NORM_L2的BFMatcher\n  \
    \  - \"BruteForce-L1\": 使用NORM_L1的BFMatcher\n    - \"BruteForce-Hamming\": 使用NORM_HAMMING的BFMatcher\n\
    \    - \"BruteForce-Hamming(2)\": 使用NORM_HAMMING2的BFMatcher\n    - \"FlannBased\"\
    \ : 使用NORM_L2的FlannBasedMatcher\n- matches = matcher.match(queryDescriptors, trainDescriptors[,\
    \ mask]): 1个最佳匹配\n- queryDescriptors: 数组特征描述符，作为匹配标准的描述符\n- trainDescriptors:\
    \ 数组特征描述符，作为匹配对象的描述符\n- mask: 匹配的掩码\n- matches: 匹配结果，DMatch对象列表\n\n- matches =\
    \ matcher.knnMatch( queryDescriptors, trainDescriptors, k[, mask[, compactResult]]\
    \ : K个最接近的匹配\n  - k : 要匹配的邻居数\n  - compactResult=False : True: 如果没有匹配，则在结果中排除\n\
    \n- matches = matcher.radiusMatch(queryDescriptors, trainDescriptors, maxDistance[,\
    \ mask, compactResult]): 在maxDistance内的距离匹配\n  - maxDistance : 匹配的距离\n\n- DMatch\n\
    \  - queryIdx : queryDescriptor的索引\n  - trainIdx : trainDescriptor的索引\n  - imgIdx\
    \ : trainDescriptor的图像索引\n  - distance : 相似性距离\n\n- cv2.drawMatches(img1, kp1,\
    \ img2, kp2, matches, flags): 在img1中标记匹配点，kp1 : queryDescriptor的图像和关键点\n- img1,\
    \ kp1 : trainDescriptor的图像和关键点\n- matches : 匹配结果\n- flags : 匹配点绘制选项\n  - cv2.DRAW_MATCHES_FLAGS_DEFAULT\
    \ : 新生成结果图像（基本值）\n  - cv2.DRAW_MATCHES_FLAGS_DRAW_OVER_OUTIMG : 不新生成结果图像\n  -\
    \ cv2.DRAW_MATCHES_FLAGS_DRAW_RICH_KEYPOINTS: 绘制关键点的大小和方向\n  - cv2.DRAW_MATCHES_FLAGS_NOT_DRAW_SINGLE_POINTS\
    \ : 排除单侧匹配结果绘制"

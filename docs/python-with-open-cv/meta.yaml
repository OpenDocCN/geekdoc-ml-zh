  - "[PAGE 307]\n\n# ❖ SimpleBlobDetctor\n\n+   - cv2.SimpleBlobDetector_Params()\n\
    \    - minThreshold, maxThreshold, thresholdStep : Boundary value to generate\
    \ Blob\n        - Increase by thresholdStep until it goes over max threshold from\
    \ minThreshold\n    - minRepeatability: # of consecutive boundary value to participate\
    \ in Blob\n    - minDistBetweenBlobs: Distance recognizing two blobs as one blobs\n\
    \    - filterByArea: Area filter option\n    - minArea, maxArea: Detect it as\

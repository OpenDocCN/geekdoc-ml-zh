    \n![](img/9de0cb7cd12c1232044968590f57e471_143_14.png)\n\n## Otsu’s Binarization\
    \ Method\n\n- Nobuyuki Otsu, 1979\n- Divide pixels into two classes according\
    \ to light level\n- Middle point as threshold\n- How to\n  - Divide image pixels\
    \ into two classes with threshold value t\n    - t: 0~255\n    - Ratio of each\
    \ class: $\\omega_1, \\omega_2,$\n    - Mean of each class light: $\\mu1, \\mu2$\n\
    \    - Distribution of each class: $\\sigma_1^2, \\sigma_2^2$\n    - Intra-class\
    \ variance: $\\sigma_{\\omega}^2(t) = \\omega_1(t)\\sigma_1^2(t) + \\omega_2(t)\\\
    sigma_2^2(t)$\n      - Minimum t Value\n      - Maximum t Value\n    - Inter-Class\
    \ Variance: $\\sigma_b^2(t) = \\omega_1(t)\\omega_2(t) [\\mu_1(t) - \\mu_2(t)]^2$\n\
    - cv2.threshold\n  - Flag: cv2.THRESH_OTSU, Turnaround: T value\n  - Effective\

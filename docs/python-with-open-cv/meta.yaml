  md: "+   - hogDesc = cv2.HOGDescriptor(winSize,blockSize,blockStride,cellSize,nbins)\n\
    \  - windsize : Size of HOG extraction area\n  - blockSize : Size of normalization\
    \ area\n  - blockStride : Size of normalization overlapping block\n  - cellSize\
    \ : Size of HOG calculation\n  - nbins : # of histogram level\n  - hodDesc : HOG\
    \ specialized narrator\n    - Vector Size :\n      $$nbins \\times (\\frac{blockSize}{cellSize})^2\
    \ \\times (\\frac{(winSize - blockSize)}{blockStride} + 1)^2$$\n\n# ❖ HOG SVM\n\
    \n+   - MNIST Handwriting Study <1/3>\n\n```\nimport cv2 as cv\nimport numpy as\
    \ np\n\nwinSize = (20,20)\nblockSize = (10,10)#blockSize = (8,8)\nblockStride\
    \ = (5,5)#blockStride = (4,4)#half of blocSize\ncellSize = (10,10)#cellSize =\
    \ (8,8)\nnbins = 9\nhogDesc =\ncv.HOGDescriptor(winSize,blockSize,blockStride,cellSize,nbins)\n\
    \naffine_flags = cv.WARP_INVERSE_MAP|cv.INTER_LINEAR\ndef deskew(img):\n    m\
    \ = cv.moments(img)\n    if abs(m['mu02']) < 1e-2:\n        return img.copy()\n\
    \    skew = m['mu11']/m['mu02']\n    M = np.float32([[1, skew, -0.5*20*skew],\
    \ [0, 1, 0]])\n    img = cv.warpAffine(img,M,(20, 20),flags=affine_flags)\n  \
    \  return img\n```"

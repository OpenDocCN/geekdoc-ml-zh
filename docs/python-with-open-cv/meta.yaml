    \n# Image Moment\n\n+   - Moment\n  - Physics, Terminology for the quantity of\
    \ force\n- Image Moment\n  - Show quantity of the object\n    - $m_{p,q} = \\\
    sum_{x} \\sum_{y} f(x, y) x^p y^q$\n  - Area that contour is surrounding; addition\
    \ of multiplication of x,y coordination pixel value and coordination index p,q\n\
    \  - Binary image: If it is not 0, it is 1"

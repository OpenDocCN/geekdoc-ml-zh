    ![](img/9de0cb7cd12c1232044968590f57e471_251_0.png)\n\n## Contour Hierarchy\n\n\
    - Example\n\n```python\nimport cv2\nimport numpy as np\n\nimg = cv2.imread('../img/shapes_donut.png')\n\
    img2 = img.copy()\nimggray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\nret, imthres\

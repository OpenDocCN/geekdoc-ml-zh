    \n![](img/9de0cb7cd12c1232044968590f57e471_247_1.png)\n\n## 图像分割\n\n1. **轮廓**\n\
    2. 霍夫变换\n3. 连通组件\n4. 实践练习\n\n## 轮廓\n\n- 连接相同颜色或亮度点的曲线。\n- 对图形分析和物体识别有效。\n- 为获得更好的准确性，最好进行二值化处理。\n\

    \ Video Reading\n- Automobile\n  - Around View, Autonomous Cars\n- Security, Safety,\
    \ Traffics\n  - Intruder alarm, trace suspect, protect, figure out accident types,\
    \ control entrance\n- Industry\n  - Process inspection, defect inspection, sense\

    ## Contours\n\n- dst, contours, hierarchy = cv2.findContours(img, mode, method)\n\
    \    - img : Input image\n    - mode : Result contour Mode\n        - cv2.RETR_EXTERNAL\
    \ : External border line\n        - cv2.RETR_LIST : All line without hierarchy\n\

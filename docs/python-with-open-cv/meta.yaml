  - "[PAGE 146]\n\n# Adaptive Threshold\n\n+   - Set threshold according to surrounding\
    \ resolution value\n- Adopt and react to surrounding situation\n- cv2.adaptiveThreshold(src,\
    \ maxVal, method, type, blockSize, C)\n  - src : gray scaled image\n  - maxVal\
    \ : Value applied to pixels when it meets threshold value\n  - method : Deciding\
    \ threshold\n    - cv2.ADPTIVE_THRESH_*\n    - MEAN_C : Decide by mean of neighboring\
    \ pixel\n    - GAUSSIAN_C: Decide by addition of weight by Gaussian distribution\n\
    \  - type : threshold type\n  - blockSize : Size of neighboring area\n  - C :\
    \ Decide threshold by adding subtracting to the calculated result\n\n$$T(x,y)=\\\
    frac{1}{n^2} \\sum_{x_i} \\sum_{y_i} I(x+x_i,y+y_j) - C$$\n\n+   - sudoku scan\
    \ example < 1/2 >\n\n```\nimport cv2\nimport numpy as np\nfrom matplotlib import\
    \ pyplot as plt\n\nfile_name = '../img/sudoku.png'\nimg = cv2.imread(file_name,\
    \ cv2.IMREAD_GRAYSCALE)\nprint(img.shape)\nret, th1 = cv2.threshold(img,127,255,cv2.THRESH_BINARY)\n\
    th2 = cv2.adaptiveThreshold(img,255,cv2.ADAPTIVE_THRESH_MEAN_C,\n            cv2.THRESH_BINARY,11,7)\n\
    th3 = cv2.adaptiveThreshold(img,255,cv2.ADAPTIVE_THRESH_GAUSSIAN_C,\n        \
    \    cv2.THRESH_BINARY,11,7)\n```"

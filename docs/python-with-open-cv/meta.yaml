    \n![](img/9de0cb7cd12c1232044968590f57e471_137_0.png)\n\n![](img/9de0cb7cd12c1232044968590f57e471_137_1.png)\n\
    \n## BGR to HSV\n\n```python\nimport cv2\nimport numpy as np\n\nred_bgr = np.array([[[0,0,255]]],\

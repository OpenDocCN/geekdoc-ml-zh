    \ - 3 assumption of LK algorithm\n    - Brightness Constancy\n        - Pixel\
    \ brightness of chasing object do not change\n    - Temporal Persistence\n   \
    \     - Time moves faster than object movement in images\n        - Differences\
    \ between frame is not big\n    - Spatial Consistency\n        - High possibility\
    \ for neighboring dots (neighboring pixels) to be included in the same objects\
    \ and\n        - Have same movement\n- It is used in small window, it cannot calculate\
    \ big movements\n- Use image pyramid to improve it"

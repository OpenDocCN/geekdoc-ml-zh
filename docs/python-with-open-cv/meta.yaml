    \ desc2, 2)\nratio = 0.75\ngood_matches = [first for first,second in matches\n\
    \                if first.distance < second.distance * ratio]\nprint('matches:%d/%d'\
    \ %(len(good_matches),len(matches)))\nres = cv2.drawMatches(img1, kp1, img2, kp2,\
    \ good_matches, None,\n                     flags=cv2.DRAW_MATCHES_FLAGS_NOT_DRAW_SINGLE_POINTS)\n\
    cv2.imshow('Matching', res)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n##\
    \ Finding Good Matching\n\n- kNNmatch() Example\n\n![](img/9de0cb7cd12c1232044968590f57e471_331_0.png)\n\
    \n## Matching Homography to find Object\n\n- Calculate distance transform array\
    \ of two images with good matching points\n- Find object location\n- Eliminate\
    \ bad matching point above transform array\n- cv2.findHomography()\n    - Calculate\
    \ distance transform array approx. with multiple matching couple\n- cv2.perspectiveTransform()\n\
    \    - Distance transform original coordination fit to transform array\n- mtrx,\
    \ mask = cv.findHomography( srcPoints, dstPoints[, method[, ransacReprojThreshold[,\
    \ mask[, maxIters[, confidence]]]] )\n    - srcPoints: Original coordination array\n\
    \    - dstPoints: Result coordination array\n    - method=0 : Select approx. calculation\
    \ algorithm\n        - 0 : Calculate min square errors to all points\n       \
    \ - cv2.RANSAC\n        - cv2.LMEDS\n        - cv2.RHO\n    - ransacReprojThreshold=3:\
    \ Normal distance threshold value, when RANSAC,RHO\n    - maxIters=2000 : # of\
    \ approximate calculation repetition\n    - confidence=0.995 : Reliability, 0\
    \ ~ 1\n    - mtrx : Result transform array\n    - mask : Normal level judging\
    \ Result, N x 1 array (0:Normal, 1:abnormal)\n- dst = cv.perspectiveTransform(src,\
    \ m[, dst])\n    - src : Input coordination array\n    - m : Transform array\n\
    \    - dst : Output coordination array\n- Approximate Calculation Algorithm\n\
    \    - RANSAC(Random Sample Consensus)\n        - Select random points, calculate\
    \ approximate points for most satisfactory points\n        - Normal Value (Inlier),\
    \ Abnormal Value (outlier)\n    - LMEDS(Least Median of Squares)\n        - Least\
    \ median value of square\n        - No need for extra parameter\n        - Run\
    \ only when normal value is more than 50%\n    - RHO\n        - Use PROSAC (Progressive\
    \ Simple Consensus); improved RANSAC\n        - Faster when there is more outlier\n\
    \n## Matching Homography to find Object\n\n- Example\n\n```python\nimport cv2,\
    \ numpy as np\n\nimg1 = cv2.imread('../img/taekwonv1.jpg')\nimg2 = cv2.imread('../img/figures.jpg')\n\
    gray1 = cv2.cvtColor(img1, cv2.COLOR_BGR2GRAY)\ngray2 = cv2.cvtColor(img2, cv2.COLOR_BGR2GRAY)\n\
    \ndetector = cv2.ORB_create()\nkp1, desc1 = detector.detectAndCompute(gray1, None)\n\
    kp2, desc2 = detector.detectAndCompute(gray2, None)\nmatcher = cv2.BFMatcher(cv2.NORM_HAMMING2)\n\
    matches = matcher.knnMatch(desc1, desc2, 2)\n\nratio = 0.75\ngood_matches = [first\
    \ for first,second in matches\n                if first.distance < second.distance\
    \ * ratio]\nprint('good matches:%d/%d' %(len(good_matches),len(matches)))\n\n\
    src_pts = np.float32([ kp1[m.queryIdx].pt for m in good_matches ])\ndst_pts =\
    \ np.float32([ kp2[m.trainIdx].pt for m in good_matches ])\nmtrx, mask = cv2.findHomography(src_pts,\
    \ dst_pts)\nh,w, = img1.shape[:2]\npts = np.float32([ [[0,0]],[[0,h-1]],[[w-1,h-1]],[[w-1,0]]\
    \ ])\ndst = cv2.perspectiveTransform(pts,mtrx)\nimg2 = cv2.polylines(img2,[np.int32(dst)],True,255,3,\
    \ cv2.LINE_AA)\n\nres = cv2.drawMatches(img1, kp1, img2, kp2, good_matches, None,\n\
    \                      flags=cv2.DRAW_MATCHES_FLAGS_NOT_DRAW_SINGLE_POINTS)\n\
    cv2.imshow('Matching Homography', res)\ncv2.waitKey()\ncv2.destroyAllWindows()\n\
    ```\n\n## Matching Homography to find Object\n\n- Example <result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_334_0.png)\n\

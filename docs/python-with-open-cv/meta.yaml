  md: "# Installing OpenCV from Building Source\n\n+   - CMake\n\n```\n~/opencv/opencv3.4.0/build\
    \ $ cmake -D CMAKE_BUILD_TYPE=RELEASE \\n  -D CMAKE_INSTALL_PREFIX=/usr/local\
    \ \\n  -D OPENCV_EXTRA_MODULES_PATH=../../opencv_contrib-3.4.0/modules \\n  -D\
    \ BUILD_DOCS=ON \\n  -D BUILD_EXAMPLES=ON \\n  -D ENABLE_NEON=ON \\n  -D WITH_QT=ON\
    \ \\n  -D WITH_OPENGL=ON \\n  -D WITH_XINE=ON ../\n```\n\n+   - swap memory\n\
    \  - Memory check\n    - free -h\n  - Swap check\n    - swapon -s\n  - Creating\
    \ swap file 1GB\n    - sudo fallocate -l 1024M /var/swap_temp\n  - Making swap\n\
    \    - sudo mkswap /var/swap_temp\n  - Applying swap\n    - sudo swapon /var/swap_temp\n\
    \  - Remove swap\n    - sudo swapoff -v /var/swap_temp\n  - Remove swap file\n\
    \    - rm -f /var/swap_temp"

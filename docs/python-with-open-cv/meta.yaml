- md: "## Matching & Tracking\n\n1. Matching with a similar image\n2. Feature and\
    \ Key Point\n3. Descriptor Extractor\n4. Feature Matching\n5. **Tracking**\n6.\
    \ Workshop\n\n## Background Subtraction\n\n- Need to track visitors or traffics\n\
    - Easy calculation with prepared background image\n- But it often does not have\
    \ prepared background images\n- cv2.BackgroundSubtractor Abstraction Class\n \
    \   - fgmask = bgsubtractor.apply( image[, fgmask[, learningRate]] )\n       \
    \ - image : Input Image\n        - fgmask : Front Image Mask\n        - learningRate=-1\
    \ : Background, Training Speed, 0 ~ 1, -1:Auto\n    - backgroundImage = bgsubtractor.getBackgroundImage([,backgroundImage])\n\
    \        - backgroundImage : Training background image\n- Algorithms to eliminate\
    \ background\n    - BackgroundSubtractorMOG\n    - BackgroundSubtractorMOG2\n\
    \    - BackgroundSubtractorGMG\n\n## BackgroundSubtractorMOG\n\n- Gaussian Mixture-based\
    \ Background/Foreground Segmentation Algorithm\n- K Gaussian Distribution (From\
    \ K=3 to 5)\n- Use blend to each background pixel\n- Weight is the ratio of how\
    \ much each pixel stays in one place\n    - Should background stays long or fixed\n\
    - cv2.bgsegm.createBackgroundSubtractorMOG()\n    - Must set history length, number\
    \ of Gaussian mixture, threshold value\n    - Call apply (frame) only, basic value\
    \ is set\n    - contrib module\n\n## ❖ BackgroundSubtractorMOG\n\n- Example\n\n\
    ```python\nimport numpy as np, cv2\n\ncap = cv2.VideoCapture('../img/walking.avi')\n\
    fps = cap.get(cv2.CAP_PROP_FPS) # Get # of frames\ndelay = int(1000/fps)\n\nfgbg\
    \ = cv2.bgsegm.createBackgroundSubtractorMOG()\nwhile cap.isOpened():\n    ret,\
    \ frame = cap.read()\n    if not ret:\n        break\n    fgmask = fgbg.apply(frame)\n\
    \    cv2.imshow('frame',fgmask)\n    cv2.imshow('bg', fgbg.getBackgroundImage())\n\
    \    if cv2.waitKey(1) & 0xff == 27:\n        break\ncap.release()\ncv2.destroyAllWindows()\n\
    ```\n\n- Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_340_0.png)\n\
    \n## ❖ BackgroundSubtractorMOG2\n\n- Based on 2 papers.\n- Z.Zivkovic, \"Improved\
    \ adaptive Gaussian mixture model for background subtraction\" in 2004\n- \"Efficient\
    \ Adaptive Density Estimation per Image Pixel for the Task of Background Subtraction\"\
    \ in 2006.\n- Select appropriate Gaussian distribution for each pixel\n- Good\
    \ for various scenes as for transformation by light\n- retval = cv.createBackgroundSubtractorMOG2([,\
    \ history[, varThreshold[, detectShadows]]] )\n    - history=500 : # of history\n\
    \    - varThreshold=16 : Distribution Threshold value\n    - detectShadows=True\
    \ : Mark shadow\n- fgbg.apply(frame)\n    - detectShadows=Set True(Basic Value)\n\
    \        - Mark shadow in gray, it gets slow.\n- Example\n\n```python\nimport\
    \ numpy as np, cv2\n\ncap = cv2.VideoCapture('../img/walking.avi')\nfps = cap.get(cv2.CAP_PROP_FPS)\
    \ # Count frame number\ndelay = int(1000/fps)\nfgbg = cv2.createBackgroundSubtractorMOG2()\n\
    while cap.isOpened():\n    ret, frame = cap.read()\n    if not ret:\n        break\n\
    \    fgmask = fgbg.apply(frame)\n    cv2.imshow('frame',frame)\n    cv2.imshow('bgsub',fgmask)\n\
    \    if cv2.waitKey(delay) & 0xff == 27:\n        break\ncap.release()\ncv2.destroyAllWindows()\n\
    ```\n\n## ❖ BackgroundSubtractorMOG2\n\n- Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_342_0.png)\n\
    \n## ❖ BackgroundSubtractorGMG\n\n- Andrew B. Godbehere, Akihiro Matsukawa, Ken\
    \ Goldberg, \"Visual Tracking of Human Visitors under Variable-Lighting Conditions\
    \ for a Responsive Audio Art Installation\", 2012.\n- An algorithm combining statistical\
    \ background image estimation and Bayesian division by pixel.\n- Used in background\
    \ modeling of initial frames (120, Base value)\n    - First few frame will be\
    \ all black\n- Use Bayesian assumption to recognize front objects\n- Place more\
    \ weight to most recent view differences to accept lighting changes\n- Use morphology\
    \ filter to eliminate noise (closing, opening)\n- fgbg = cv2.bgsegm.createBackgroundSubtractorGMG()\
    \ # create object\n- kernel = cv2.getStructuringElement(cv2.MORPH_ELLIPSE,(3,3))\n\
    - fgmask = fgbg.apply(frame)\n- fgmask = cv2.morphologyEx(fgmask, cv2.MORPH_OPEN,\
    \ kernel)\n\n## ❖ BackgroundSubtractorGMG\n\n- Example\n\n```python\nimport numpy\
    \ as np\nimport cv2\ncap = cv2.VideoCapture('../img/walking.avi')\n#fgbg = cv2.createBackgroundSubtractorGMG()\
    \ # create object\nfgbg = cv2.bgsegm.createBackgroundSubtractorGMG() # create\
    \ object\nkernel = cv2.getStructuringElement(cv2.MORPH_ELLIPSE,(3,3))\nwhile(1):\n\
    \    ret, frame = cap.read()\n    fgmask = fgbg.apply(frame)\n    fgmask = cv2.morphologyEx(fgmask,\
    \ cv2.MORPH_OPEN,\nkernel) # filtering for reduce noise\n    cv2.imshow('frame',fgmask)\n\
    \    k = cv2.waitKey(30) & 0xff\n    if k == 27:\n        break\ncap.release()\n\
    cv2.destroyAllWindows()\n```\n\n- Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_343_0.png)\n\
    \n## Optical Flow\n\n- Distribution of move orientation and distance in between\
    \ previous frame and current frame\n- Method of chasing movement without previous\
    \ information in frame\n- Sparse Optical Flow (Rare)\n    - Pre-set part of points\
    \ to chase\n    - Lucas-Kanade: Square methods\n- Dense Optical Flow (Density)\n\
    \    - Calculating velocity in all pixels\n    - Large quantity of calculation\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_344_0.png)\n\n## Lucas-Kanade\n\n-\
    \ 3 assumption of LK algorithm\n    - Brightness Constancy\n        - Pixel brightness\
    \ of chasing object do not change\n    - Temporal Persistence\n        - Time\
    \ moves faster than object movement in images\n        - Differences between frame\
    \ is not big\n    - Spatial Consistency\n        - High possibility for neighboring\
    \ dots (neighboring pixels) to be included in the same objects and\n        -\
    \ Have same movement\n- It is used in small window, it cannot calculate big movements\n\
    - Use image pyramid to improve it\n\n- OpenCV Function\n    - cv2.calcOpticalFlowLK\
    \ : Do not use image pyramid\n    - cv2.calcOpticalFlowPyrLK : Use image pyramid\n\
    \    - Use dots selected by goodToTrack as input\n\n- calcOpticalFlowPyrLK(prevImg,\
    \ nextImg, prevPts, nextPts)\n    - prevImg : Previous Frame, n*1*2\n    - nextImg\
    \ : Next Frame, n*1*2\n    - prevPts : Point of move chance, n*1*2\n    - nextPts\
    \ : Position of dots chasing object passed by, None, use return value\n    - winSize\
    \ : Window size of each pyramid levels,\n    - maxLevel : # of layers of image\
    \ pyramid, Do not use if it is 0\n    - criteria : Search halt criteria\n\n- return:\n\
    \    - nextPts : Position of dots chasing object passed by\n    - status : Same\
    \ # as nextPts\n        - 1 or 0 in each index, 0: Did not find corresponding\
    \ point (n*1)\n    - err : Distance between previous frame feature point and current\
    \ frame moving distance point, use to eliminate\n\n- Flow Example <1/3>\n\n```python\n\
    import numpy as np, cv2\n\ncap = cv2.VideoCapture('../img/walking.avi')\nfps =\
    \ cap.get(cv2.CAP_PROP_FPS) # Count frame #\ndelay = int(1000/fps)\n\ncolor =\
    \ np.random.randint(0,255,(200,3))\nlines = None\nprevImg = None\n# calcOpticalFlowPyrLK\
    \ Set halt condition\ntermcriteria = (cv2.TERM_CRITERIA_EPS | cv2.TERM_CRITERIA_COUNT,\
    \ 10, 0.03)\n```\n\n## Lucas-Kanade\n\n- Flow Example <2/2>\n\n```python\nwhile\
    \ cap.isOpened():\n    ret,frame = cap.read()\n    if not ret:\n        break\n\
    \    img_draw = frame.copy()\n    if prevImg is None:\n        prevImg = cv2.cvtColor(frame,\
    \ cv2.COLOR_BGR2GRAY)\n        lines = np.zeros_like(frame)\n        prevPt =\
    \ cv2.goodFeaturesToTrack(prevImg, 200, 0.01, 10)\n\n    else:\n        nextImg\
    \ = cv2.cvtColor(frame, cv2.COLOR_BGR2GRAY)\n        nextPt, status, err = cv2.calcOpticalFlowPyrLK(prevImg,\
    \ nextImg, prevPt, None, criteria=termcriteria)\n        prevMv = prevPt[status==1]\n\
    \        nextMv = nextPt[status==1]\n\n    for i,(p, n) in enumerate(zip(prevMv,\
    \ nextMv)):\n        px,py = p.ravel()\n        nx,ny = n.ravel()\n        cv2.line(lines,\
    \ (px, py), (nx,ny), color[i].tolist(),2)\n        cv2.circle(img_draw, (nx,ny),\
    \ 2, color[i].tolist(), -1)\n    img_draw = cv2.add(img_draw, lines)\n    prevImg\
    \ = nextImg\n    prevPt = nextMv.reshape(-1,1,2)\n    cv2.imshow('OpticalFlow-LK',\
    \ img_draw)\n    key = cv2.waitKey(delay)\n    if key == 27 : # Esc: end\n   \

  md: "# Average Hash Matching\n\n+   - Finding Gun Image\n\n```\nimport cv2\nimport\
    \ numpy as np\nimport glob\n\nimg = cv2.imread('../img/pistol.jpg')\ncv2.imshow('query',\
    \ img)\nsearch_dir = '../img/101_ObjectCategories'\n\ndef img2hash(img):\n   \
    \ gray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n    gray = cv2.resize(gray, (16,\
    \ 16))\n    avg = gray.mean()\n    bi = 1 * (gray > avg)\n    return bi\ndef hamming_distance(a,\
    \ b):\n    a = a.reshape(1,-1)\n    b = b.reshape(1,-1)\n    distance = (a !=b).sum()\n\
    \    return distance\n\nquery_hash = img2hash(img)\n\nimg_path = glob.glob(search_dir+'/**/*.jpg')\n\
    for path in img_path:\n    img = cv2.imread(path)\n    cv2.imshow('searching...',\
    \ img)\n    cv2.waitKey(5)\n    a_hash = img2hash(img)\n    dst = hamming_distance(query_hash,\
    \ a_hash)\n    if dst/256 < 0.25:\n        print(path, dst/256)\n        cv2.imshow(path,\
    \ img)\ncv2.destroyWindow('searching...')\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n\
    ```"

    cv2.destroyAllWindows()\n```\n\n- 示例 <结果>\n\n![](img/9de0cb7cd12c1232044968590f57e471_282_0.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_282_1.png)\n\n## ❖ 均值漂移滤波器\n\n- 它是一个具有特定边界大小的核窗口，将中心移动到平均像素值\n\
    - 通过将起点和终点绑定为一个来查找连通区域\n- 将连通区域的颜色值更改为最频繁的颜色值\n- `dst = cv.pyrMeanShiftFiltering(src,\
    \ sp, sr[, dst, maxLevel, termcrit])`\n    - `src`：输入图像\n    - `sp`：空间窗口半径\n \
    \   - `sr`：颜色窗口半径\n    - `maxLevel`：图像金字塔的最大级别\n    - `termcrit`：均值漂移终止标准\n- 示例\n\
    \n```python\nimport cv2\nimport numpy as np\n\nimg = cv2.imread('../img/taekwonv1.jpg')\n\
    def onChange(x):\n    sp = cv2.getTrackbarPos('sp', 'img')\n    sr = cv2.getTrackbarPos('sr',\
    \ 'img')\n    lv = cv2.getTrackbarPos('lv', 'img')\n    mean = cv2.pyrMeanShiftFiltering(img,\
    \ sp, sr, None, lv)\n    cv2.imshow('img', np.hstack((img, mean)))\n\ncv2.imshow('img',\
    \ np.hstack((img, img)))\ncv2.createTrackbar('sp', 'img', 0,100, onChange)\ncv2.createTrackbar('sr',\
    \ 'img', 0,100, onChange)\ncv2.createTrackbar('lv', 'img', 0,5, onChange)\ncv2.waitKey(0)\n\
    cv2.destroyAllWindows()\n```\n\n## ❖ 均值漂移滤波器\n\n- 示例 <结果>\n\n![](img/9de0cb7cd12c1232044968590f57e471_284_0.png)\n\
    \n## 图像分割\n\n1. 轮廓\n2. 霍夫变换\n3. 连通域\n4. **实践工作坊**\n\n## 形状识别\n\n- 编写一个程序，获取包含五个图形的图像中图形的名称。\n\
    - 结果示例\n\n![](img/9de0cb7cd12c1232044968590f57e471_286_0.png)\n\n- 提示\n    - 查找轮廓，并通过将其简化为近似值来计算顶点数量\n\
    \n## 文档扫描器\n\n- 起草一个无需鼠标输入即可产生扫描效果的程序\n- 结果示例\n\n![](img/9de0cb7cd12c1232044968590f57e471_286_1.png)\n\
    \n- 提示\n    - 获取 4 个顶点\n        - 使用 canny 边缘检测检测边界\n            - 使用 findContour()\
    \ 查找最大轮廓，并使用 approxPolyDP() 进行简化\n\n## ❖ 硬币计数器\n\n- 编写一个分离并计数硬币的程序。\n- 结果示例\n\n\
    ![](img/9de0cb7cd12c1232044968590f57e471_287_0.png)\n\n- 提示\n    - pyrMeanShiftFiltering()\
    \ 模糊硬币表面\n    - Otsu 阈值\n    - distanceTransform() 硬币中心点\n    - 查找局部最大值\n    -\
    \ floodfill() 将局部最大值作为种子\n    - 使用 distanceTransform 确定硬币的绝对前景\n    - 使用 distanceTransform\
    \ 确定硬币的绝对背景\n    - 绝对背景 – 绝对前景 = 未知区域\n    - connectComponents() 标记\n    - watershed()\n\
    \    - 使用 findContour(), boundingRect() 分离硬币区域\n\n## 匹配与跟踪\n\n1. **相似图像匹配**\n\
    2. 特征与关键点\n3. 描述符提取器\n4. 特征匹配\n5. 跟踪\n6. 实践工作坊\n\n## 平均哈希匹配\n\n- 适用于理解相似图像\n-\
    \ 平均哈希\n    - 通过计算平均值将图像转换为一个数字\n        - 无论宽高比如何，将图像缩小到特定尺寸\n        - 计算所有像素的平均值并进行比较\n\
    \        - `px > Average? 1 : 0`\n        - 将其转换为一行，并将其转换为一个二进制数\n        - 可以转换为十六进制\n\
    - 相似距离\n    - 测量两个值之间的距离，如果数字小，则相似度高\n    - 欧几里得距离\n        - 将数字之间的差异作为距离\n \
    \       - 例如) 5:3 = 2, 5:8=3\n    - 汉明距离\n        - 显示两个数字之间不同位数的数量\n        \

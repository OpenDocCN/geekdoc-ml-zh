- img_proc: true
  md: "+   - p, q degree : Calculate by changing from 0 ~3, get meaningful info\n\
    - m00 : Area of contour\n  - 0 degree of all number is 1, Add by multiplying by\
    \ 1 to the number of area\n- Center moment\n  - $\\mu_{p,q} = \\sum_{x} \\sum_{y}\
    \ f(x,y)(x - \\bar{x})^p(y - \\bar{y})^q$\n    - $\\bar{x} = \\frac{m_{10}}{m_{00}}$\n\
    \    - $\\bar{y} = \\frac{m_{01}}{m_{00}}$\n\n# ❖ Image Moment\n\n+   - moment\
    \ = cv2.moments(contour)\n  - contour :Coordination of the calculation subject\
    \ for moment\n  - moment : Result Moment, Python dictionary\n    - m00, m01, m10,\
    \ m11, m02, m12, m20, m21, m03, m30 : Space moment\n    - mu20, mu11, mu02, mu30,\
    \ mu21, mu12, mu03 : Center moment\n    - nu20, nu11, nu02, nu30, nu21, nu03 :\
    \ Regular center moment\n- retval = cv.contourArea(contour[, oriented=False]):\
    \ Claculate area with contour\n  - contour: Contour to calculate area\n  - oriented:\
    \ Contour orientation flag\n    - True: Turnaround negative depends on contour\
    \ orientation\n    - False : Turnround absolute value\n  - retval : Area of Contour\n\
    - retval = cv.arcLength( curve, closed ) : Calculate circumference\n  - curve\
    \ : Contour to calculate\n  - closed : Close or not flag\n  - retval : Value of\
    \ countour circumference"

    \n![](img/9de0cb7cd12c1232044968590f57e471_169_5.png)\n\n## Equalize\n\n- Control\
    \ height of pixel distribution not width\n- Effective for lighting\n- dst = cv.equalizeHist(src[,\
    \ dst])\n    - src : Image subject, 8 bit 1 channel\n    - dst : Result image\n\
    \n> $H'(v) = round\\left(\\frac{cdf(v) - cdf_{min}}{(M \\times N) - cdf_{min}}\
    \ \\times (L - 1)\\right)$\n\n- $cdf(v)$ : 히스토그램 누적 합수\n- $cdf_{min}$ : 누적 최소\
    \ 값, 1\n- $M \\times N$ : 픽셀 수, 폭 x 높이\n- $L$ : 분포 영역, 256\n- $round(v)$ : 반올림\n\
    - $H'(v)$ : 이퀄라이즈된 히스토그램 값\n\n## ❖ Equalize Gray Scale\n\n```python\nimport cv2\n\
    import numpy as np\nimport matplotlib.pylab as plt\n\nimg = cv2.imread('../img/yate.jpg',\

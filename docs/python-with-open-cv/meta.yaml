  - "[PAGE 224]\n\n# Detecting Boarder\n\n+   - Dividing front image and background\
    \ image\n- Sharpening: Emphasizing boarder by detecting\n- Boarder: Point with\
    \ large pixel value\n- Differentiation\n  - Ration of resolution change\n  - Slope\
    \ of image\n\nContinuous function:\n\n```\n$$\\frac{\\partial f(x, y)}{\\partial\
    \ x} = \\lim_{h \\to 0} \\frac{f(x+h, y) - f(x, y)}{h}$$\n\n$$\\frac{\\partial\
    \ f(x, y)}{\\partial y} = \\lim_{h \\to 0} \\frac{f(x, y+h) - f(x, y)}{h}$$\n\
    ```\n\n# Basic Differentiation Filter\n\n+   - Simplify differentiation equation\n\
    \  - Not sequential space\n  - Differentiate to calculate approximate\n  - Next\
    \ pixel – current pixel\n  - 2-way convolution kernel\n    - $Gx = [-1 \\quad\
    \ 1]$\n    - $Gy = \\begin{bmatrix} -1 \\ 1 \\end{bmatrix}$\n\n```\n$$Gx = \\\
    frac{\\partial f(x, y)}{\\partial x} \\approx f_{x+1, y} - f_{x, y}$$\n\n$$Gy\
    \ = \\frac{\\partial f(x, y)}{\\partial y} \\approx f_{x, y+1} - f_{x, y}$$\n\
    ```\n\n![](img/9de0cb7cd12c1232044968590f57e471_224_0.png)\n\n| 픽셀 값 | 6 | 6 |\
    \ 6 | 5 | 4 | 3 | 2 | 1 | 1 | 1 | 6 | 6 |\n|---|---|---|---|---|---|---|---|---|---|---|---|---|\n\
    | 1차 미분 | 0 | 0 | 0 | -1 | -1 | -1 | -1 | 0 | 0 | 5 | 0 | |\n| 2차 미분 | 0 | 0 |\

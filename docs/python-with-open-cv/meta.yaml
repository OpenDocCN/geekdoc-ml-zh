    \    - Picture mark 0 data close to C1 as red, and 1 data as blue.\n\n![](img/9de0cb7cd12c1232044968590f57e471_366_0.png)\n\
    \n## K-Means Clustering\n\n- Algorithm\n  - Step4.\n    - Average red and blue,\
    \ set is as new center point and as in step 2, calculate distance and mark as\
    \ 0, 1\n    - Repeat step 2 to 4, until each center point is fixed in as center\

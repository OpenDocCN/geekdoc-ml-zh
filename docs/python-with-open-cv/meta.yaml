    \n# ❖ Industry\n\n- Quality, Defect Inspection\n\n![](img/9de0cb7cd12c1232044968590f57e471_20_0.png)\n\
    \n# ❖ Robotics\n\n![](img/9de0cb7cd12c1232044968590f57e471_20_1.png)\n\n# Opencv\
    \ with Python\n\n1. **OpenCV3 Intro**\n2. Setup on Windows\n3. Setup on Mac\n\
    4. Setup on Ubuntu\n5. Setup on Raspberry-Pi\n\n# ❖ OpenCV\n\n- http://opencv.org\n\
    - Open Source Computer Vision Library\n- Official Support\n  - Native : C/C++\n\
    \  - Bindings: Python, Java\n  - Support Platform : Windows, Linux, Mac, iOS,\
    \ Android\n- Support Acceleration of OpenCL Activation Hardware\n- Intel Russia\
    \ Team\n  - Began by part of CPU intensive application performance enhancing research\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_22_0.png)\n\n# ❖ History\n\n- Launched\
    \ : 1999' Jan, IPL(Image Processing Library) based, C language\n- First Ver. alpha\
    \ : 2000'\n- 5 Betas : 2001 ~ 2005\n- Ver 1.0 : 2006' Oct\n  - Precompiled Python\
    \ module included\n  - Borland C++ makefiles added\n- Ver 2.0 : 2009' Sep\n  -\
    \ new C++ API , STL Based\n  - new Python interface\n- Ver 2.2 : 2010' Dec\n \
    \ - package reorganized ( core, imgproc, features2d, ml, contrib, ...)\n  - new\
    \ Python biding, NumPy Required\n- Ver 2.3 : 2011' July\n  - Android porting\n\
    \  - Python module cv2 for OpenCV 2.x\n- ver 3.4 : 2017' Dec , latest\n\n# ❖ OpenCV\n\
    \n- Official Web Site : https://opencv.org\n- Source Repository\n  - Main Repository\n\
    \    - https://github.com/opencv/opencv\n    - Code storage for official distribution\n\
    \  - Extra Repository\n    - https://github.com/opencv/opencv_contrib\n    - Include\
    \ immature or non-popularized details\n    - When completion level increases,\
    \ move to main storage\n    - Include SIFT, SURFS and other codes with patent\
    \ issues\n    - BSD License\n  - Free\n    - Regardless of research or industry\n\
    \    - Exclude Extra Repository\n  - No need for source open obligation\n- OpenCV-Python:\
    \ Support both python 2, 3 (No difference)\n  - 2.7, 3.4+\n\n# ❖ Environment\n\
    \n| Platform | Version | HardWare |\n| :--- | :--- | :--- |\n| Windows | Windows\
    \ 7 or later | WebCam |\n| Mac | OS X Siera or later | WebCam |\n| Ubuntu | 16.04\
    \ LTS | WebCam |\n| RaspberryPi | RaspberryPi3 B Model<br>Rasbian Stretch | SD\
    \ card 16GB<br>PiCamera or USB WebCam(UVC) |\n\n# ❖ Pre Required\n\n- Python 3.4+\n\
    \  - This course Not Supports Python2.7\n- NumPy 1.8+\n- OpenCV-Python 3.4+, Extra(contrib)\
    \ included\n\n# Opencv with Python\n\n1. OpenCV3 Intro\n2. **Setup on Windows**\n\
    3. Setup on Mac\n4. Setup on Ubuntu\n5. Setup on Raspberry-Pi\n\n# Setup Python\n\
    \n- Python 3 Only\n  - Python 3.4+\n- Python 2 Only\n  - Python 2.7\n- Python\
    \ 3 + Python 2\n  - 설치 순서 중요\n  - 1. Setup Python 3\n  - 2. Setup Python 2\n\n\
    ![](img/9de0cb7cd12c1232044968590f57e471_25_0.png)\n\n# Setup Python 3\n\n- https://www.python.org/downloads/\n\
    - Download Python 3.4+\n  - Numpy not support Python 3.3-\n\n# Setup Python 3.x\n\
    \n- Start Install wizard\n- Check Click \"Add Python 3.x to PATH\"\n- Click \"\
    Customize installation\"\n\n![](img/9de0cb7cd12c1232044968590f57e471_25_1.png)"
  mdcn: "# Python 与 OpenCV3\n\n- 计算机视觉\n- 图像处理\n- 机器学习与目标检测\n\n![](img/9de0cb7cd12c1232044968590f57e471_0_0.png)\n\
    \nRichard Stallman\n\n# OpenCV3 与 Python\n\n# 目录\n\n## 第1章：OpenCV3 与 Python\n\n\
    1. 计算机视觉\n   1.1 计算机视觉\n   1.2 应用领域\n2. OpenCV3 简介与安装\n   2.1 OpenCV3 简介\n   2.2\
    \ 在 Windows 上安装\n   2.3 在 Mac 上安装\n   2.4 在 Ubuntu 上安装\n   2.5 在树莓派上安装\n3. 基本接口\n\
    \   3.1 图像与视频输入/输出\n   3.2 绘图\n   3.3 窗口管理\n   3.4 事件处理\n4. NumPy 与 Matplotlib\n\
    \   4.1 NumPy\n   4.2 Matplotlib\n5. 基本图像处理\n   5.1 感兴趣区域 (ROI)\n   5.2 颜色空间\n\
    \   5.3 阈值处理\n   5.4 图像算术\n   5.5 直方图\n   5.6 实践练习\n   5.7 人脸合成\n   5.8 运动检测监控\n\
    6. 几何变换\n   6.1 平移、缩放、旋转\n   6.2 图像扭曲\n   6.3 镜头畸变\n7. 实践练习\n   - 人脸马赛克\n   -\
    \ 液化工具\n   - 畸变相机\n8. 滤波器\n   8.1 卷积滤波器\n   8.2 模糊处理\n   8.3 边缘检测\n   8.4 形态学操作\n\
    \   8.5 图像金字塔\n   8.6 实践练习\n   - 马赛克2\n   - 卡通化\n9. 图像分割\n   9.1 轮廓\n   9.2 霍夫变换\n\
    \   9.3 连通域\n   9.4 实践练习\n   - 形状识别\n   - 文档扫描仪\n   - 硬币计数器\n10. 匹配与跟踪\n    10.1\
    \ 使用相似图片进行匹配\n    10.2 特征与关键点\n    10.3 描述符提取器\n    10.4 特征匹配\n    10.5 跟踪\n \
    \   10.6 实践练习\n    - 全景图制作\n    - 书籍封面搜索器\n11. 机器学习与目标检测\n    11.1 k-均值聚类\n  \
    \  11.2 k-近邻算法\n    11.3 支持向量机与方向梯度直方图\n    11.4 级联分类器\n    11.5 实践练习\n    - 人脸马赛克\n\
    \    - 汉尼拔面具 (Snapchat 滤镜)\n    - 人脸扭曲 (Snapchat 滤镜)\n\n# 计算机视觉\n\n1. **计算机视觉**\n\
    2. 应用领域\n\n# 计算机视觉领域\n\n- 图像处理\n  - 使用计算机获取更高质量视频的过程\n  - 接收视频后输出新视频\n    - 图像增强\n\
    \    - 图像复原\n    - 图像合成\n    - 图像分割\n- 计算机视觉 (CV)\n  - 从视频中获取有意义的信息\n  - 从接收的视频中输出数据\n\
    \    - 目标检测\n    - 目标识别\n    - 目标跟踪\n- 计算机图形学 (CG)\n  - 生成不存在的视频\n  - 从接收的数据中输出新数据\n\

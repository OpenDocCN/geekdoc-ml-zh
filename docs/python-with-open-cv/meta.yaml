    \ [, t, f]) : Finding items fit to condition\n    * return : Tuple, array filled\
    \ with index or changed value fit to the search condition\n    * condition : Condition\
    \ that will be used in search\n    * t, f : Value or array set according to condition,\
    \ if it is array, same shame as condition\n        * t : Value or array fit to\
    \ condition\n        * f : Value or array unfit to condition\n* numpy.nonzero(array)\
    \ : Turnaround index that is non-0 among array parameter, tuple\n* numpy.all(array\
    \ [, axis]) : Search true for all array parameter\n    * array : Array of search\
    \ subject\n    * axis : Axis to search, if omitted, search all axis, if defined,\

    \        - cv2.MORPH_BLACKHAT : 闭运算与原图的差值\n\n![](img/9de0cb7cd12c1232044968590f57e471_238_1.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_238_2.png)\n\n## ❖ 开运算与闭运算\n\n- 示例\n\
    \n```python\nimport cv2\nimport numpy as np\n\nimg1 = cv2.imread('../img/morph_dot.png',\

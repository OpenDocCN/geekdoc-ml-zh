    \n## ❖ Grabcut\n\n- Expand based on Graph Cut algorithm\n- Assume color distribution\
    \ for subject that will separate front image\n- At the connected area with same\
    \ label, separate front image and background\n- `mask, bgdModel, fgdModel = cv2.grabCut(img,\
    \ mask, rect, bgdModel, fgdModel, iterCount[, mode])`\n- `img` : input image\n\
    - `mask` : 1 channel array, same size as input image, save value that separates\
    \ background and front page\n    - `cv2.GC_BGD` : Absolutely Background (0)\n\
    \    - `cv2.GC_FGD` : Absolutely Front Image(1)\n    - `cv2.GC_PR_BGD` : Maybe\
    \ background(2)\n    - `cv2.GC_PR_FGD` : Maybe front image (3)\n- `rect` : Rectangular\
    \ coordination for area that front image is assumed, Tuple (x1, y1, x2, y2)\n\
    - `bgdModel`, `fgdModel`: Temporary array buffer to be used within function, do\
    \ not edit when re used\n- `iterCount` : # of repetition\n- `mode` :\n    - `cv2.GC_INIT_WITH_RECT`\
    \ : Grabcut based on set coordination at rect\n    - `cv2.GC_INIT_WITH_MASK` :\
    \ Grabcut based on set coordination at mask\n    - `cv2.GC_EVAL` : Re-try\n\n\
    ## Grabcut\n\n- Example <1/2>\n\n```python\nimport cv2\nimport numpy as np\nimg\
    \ = cv2.imread('../img/taekwonv1.jpg')\nimg_draw = img.copy()\nmask = np.zeros(img.shape[:2],\
    \ dtype=np.uint8)\nrect = [0,0,0,0]\nmode = cv2.GC_EVAL\nbgdmodel = np.zeros((1,65),np.float64)\n\
    fgdmodel = np.zeros((1,65),np.float64)\ndef onMouse(event, x, y, flags, param):\n\
    \    global mouse_mode, rect, mask, mode\n    if event == cv2.EVENT_LBUTTONDOWN\
    \ :\n        if flags <= 1: # If no key input\n            mode = cv2.GC_INIT_WITH_RECT\n\
    \            rect[:2] = x, y\n    elif event == cv2.EVENT_MOUSEMOVE and flags\
    \ &\n    cv2.EVENT_FLAG_LBUTTON :\n        if mode == cv2.GC_INIT_WITH_RECT:\n\
    \            img_temp = img.copy()\n            cv2.rectangle(img_temp, (rect[0],\
    \ rect[1]), (x, y), (0,255,0), 2)\n            cv2.imshow('img', img_temp)\n \
    \       elif flags > 1:\n            mode = cv2.GC_INIT_WITH_MASK\n          \
    \  if flags & cv2.EVENT_FLAG_CTRLKEY :\n                cv2.circle(img_draw,(x,y),3,\
    \ (255,255,255),-1)\n                cv2.circle(mask,(x,y),3, cv2.GC_FGD,-1)\n\
    ```\n\n## ❖ Grabcut\n\n- Example <2/2>\n\n```python\nif flags & cv2.EVENT_FLAG_SHIFTKEY\
    \ :\n    cv2.circle(img_draw,(x,y),3, (0,0,0),-1)\n    cv2.circle(mask,(x,y),3,\
    \ cv2.GC_BGD,-1)\n    cv2.imshow('img', img_draw)\nelif event == cv2.EVENT_LBUTTONUP:\n\
    \    if mode == cv2.GC_INIT_WITH_RECT :\n        rect[2:] =x, y\n    cv2.rectangle(img_draw,\
    \ (rect[0], rect[1]), (x, y), (255,0,0), 2)\n    cv2.imshow('img', img_draw)\n\
    cv2.grabCut(img, mask, tuple(rect), bgdmodel, fgdmodel, 1, mode)\n    img2 = img.copy()\n\
    \    img2[(mask==cv2.GC_BGD) | (mask==cv2.GC_PR_BGD)] = 0\n    cv2.imshow('grabcut',\
    \ img2)\n    mode = cv2.GC_EVAL\ncv2.imshow('img', img)\ncv2.setMouseCallback('img',\
    \ onMouse)\nwhile True:\n    if cv2.waitKey(0) & 0xFF == 27 : # esc\n        break\n\
    cv2.destroyAllWindows()\n```\n\n- Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_282_0.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_282_1.png)\n\n## ❖ MeanShift Filter\n\
    \n- It is kernel window with certain border size kernel, move center to average\
    \ pixel value\n- Find connecting area by binding starting point and stop point\
    \ as one\n- Change connecting area color value as most frequent color value\n\
    - `dst = cv.pyrMeanShiftFiltering(src, sp, sr[, dst, maxLevel, termcrit])`\n \
    \   - `src` : input image\n    - `sp` : Space window radius\n    - `sr` : Color\
    \ window radius\n    - `maxLevel` : Max level of image pyramid\n    - `termcrit`\
    \ : Standard for mean move cut\n- Example\n\n```python\nimport cv2\nimport numpy\
    \ as np\n\nimg = cv2.imread('../img/taekwonv1.jpg')\ndef onChange(x):\n    sp\
    \ = cv2.getTrackbarPos('sp', 'img')\n    sr = cv2.getTrackbarPos('sr', 'img')\n\
    \    lv = cv2.getTrackbarPos('lv', 'img')\n    mean = cv2.pyrMeanShiftFiltering(img,\

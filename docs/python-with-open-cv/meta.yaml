    matches = matcher.match(desc1, desc2)

    res = cv2.drawMatches(img1, kp1, img2, kp2, matches, None, \n                     flags=cv2.DRAW_MATCHES_FLAGS_NOT_DRAW_SINGLE_POINTS)

    cv2.imshow(''Flann + SIFT'', res)

    cv2.waitKey()

    cv2.destroyAllWindows()


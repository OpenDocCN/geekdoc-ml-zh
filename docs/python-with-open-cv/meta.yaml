    t, t_otsu = cv2.threshold(img, 0, 255, cv2.THRESH_BINARY | cv2.THRESH_OTSU)\n\
    print('otsu threshold:', t)\n\nimgs = {'Original': img, 't:130':t_130, 'otsu:%d'%t:\

    \n## Meanshift\n\n- Chase ROI objects based on density distribution (feature or\
    \ color)\n  - Decide initial window\n  - Calculate center of mass of data within\
    \ window\n  - Move center of window to center of mass\n  - Repeat until window\
    \ movement stops\n- Applying Steps\n  - Select chasing object, calculate H histogram\
    \ of HSV color\n  - Back projects to histogram of all images\n  - Chase object\
    \ that moved from back projection by MeanShift\n\n![](img/9de0cb7cd12c1232044968590f57e471_350_0.png)\n\
    \n- cv2.meanShift(img, window, criteria)\n  - img : Input Image\n  - window :\
    \ Initial window coordination\n  - criteria : Criteria to stop search repeat\n\
    \    - type : cv2.TERM_CRITERIA_*\n      - EPS : When accuracy is smaller than\
    \ epsilon\n      - MAX_ITER : Repeat max_iter #\n      - COUNT : Same as MAX_ITER\n\
    \    - max_iter : Max # of repeat\n    - epsilon : Minimum accuracy\n\n- Example\n\
    \n```python\nimport numpy as np, cv2\n\nroi_hist = None     # Histogram storage\
    \ variable for chasing objects\nwin_name = 'MeanShift Tracking'\ntermination =\
    \ (cv2.TERM_CRITERIA_EPS | cv2.TERM_CRITERIA_COUNT, 10, 1)\n\ncap = cv2.VideoCapture(0)\n\
    while cap.isOpened():\n    ret, frame = cap.read()\n    img_draw = frame.copy()\n\
    \n    if roi_hist is not None:  # Histogram for chasing object registered\n  \
    \      hsv = cv2.cvtColor(frame, cv2.COLOR_BGR2HSV)\n        dst = cv2.calcBackProject([hsv],\
    \ [0], roi_hist, [0,180], 1)\n        ret, (x,y,w,h) = cv2.meanShift(dst, (x,y,w,h),\
    \ termination)\n        cv2.rectangle(img_draw, (x,y), (x+w, y+h), (0,255,0),\
    \ 2)\n        result = np.hstack((img_draw, cv2.cvtColor(dst, cv2.COLOR_GRAY2BGR)))\n\
    \    else:  # Histogram for chasing object not registered\n        cv2.putText(img_draw,\
    \ \"Hit the Space to set target to track\", (10,30),cv2.FONT_HERSHEY_SIMPLEX,\
    \ 1, (0,0,255), 1, cv2.LINE_AA)\n        result = img_draw\n```\n\n- Example <Result>\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_352_0.png)\n\n![](img/9de0cb7cd12c1232044968590f57e471_352_1.png)\n\
    \n## Camshift\n\n- Continuously Adaptive Meanshift\n- Improve window fix issues\
    \ of Meanshift\n- Calculate center point using meanshift\n- Reset window size\
    \ and orientation\n\n- cv2.CamShift(img, window, criteria)\n  - img : Input image\n\
    \  - window : Initial search window\n  - criteria : Criteria to halt search\n\n\
    - Example <1/2>\n\n```python\nimport numpy as np, cv2\n\nroi_hist = None     #\
    \ Saved variables for detecting object histogram\nwin_name = 'MeanShift Tracking'\n\
    termination = (cv2.TERM_CRITERIA_EPS | cv2.TERM_CRITERIA_COUNT, 10, 1)\n\ncap\
    \ = cv2.VideoCapture(0)\ncap.set(cv2.CAP_PROP_FRAME_WIDTH, 640)\ncap.set(cv2.CAP_PROP_FRAME_HEIGHT,\
    \ 480)\nwhile cap.isOpened():\n    ret, frame = cap.read()\n    img_draw = frame.copy()\n\
    \n    if roi_hist is not None:  # detecting object histogram registered\n    \
    \    hsv = cv2.cvtColor(frame, cv2.COLOR_BGR2HSV)\n        dst = cv2.calcBackProject([hsv],\
    \ [0], roi_hist, [0,180], 1)\n        ret, (x,y,w,h) = cv2.CamShift(dst, (x,y,w,h),\
    \ termination)\n        cv2.rectangle(img_draw, (x,y), (x+w, y+h), (0,255,0),\
    \ 2)\n        result = np.hstack((img_draw, cv2.cvtColor(dst, cv2.COLOR_GRAY2BGR)))\n\
    \    else:  # detecting object histogram not registered\n        cv2.putText(img_draw,\
    \ \"Hit the Space to set target to track\",\n            (10,30),cv2.FONT_HERSHEY_SIMPLEX,\
    \ 1, (0,0,255), 1, cv2.LINE_AA)\n        result = img_draw\n    cv2.imshow(win_name,\
    \ result)\n    key = cv2.waitKey(1) & 0xff\n    if key == 27: # Esc\n        break\n\
    \    elif key == ord(' '): # Space bar, Set ROI\n        x,y,w,h = cv2.selectROI(win_name,\
    \ frame, False)\n        if w and h:    # ROI is set properly\n            roi\
    \ = frame[y:y+h, x:x+w]\n            roi = cv2.cvtColor(roi, cv2.COLOR_BGR2HSV)\n\
    \            mask = None\n            roi_hist = cv2.calcHist([roi], [0], mask,\
    \ [180], [0,180])\n            cv2.normalize(roi_hist, roi_hist, 0, 255, cv2.NORM_MINMAX)\n\
    \        else:           # ROI is not set properly\n            roi_hist = None\n\
    else:\n    print('no camera!')\ncap.release()\ncv2.destroyAllWindows()\n```\n\n\
    - Example <result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_354_0.png)\n\n\
    ## Tracking API\n\n- Add to OpenCV3 contrib\n- Tracking API operated by machine\
    \ learning algorithm\n- Even users do not know algorithm, them can select various\
    \ algorithms in interface to select tracker\n- retval = cv.Tracker.init(image,\
    \ boundingBox) : Initialize Trackers\n  - image : Input Image\n  - boundingBox\
    \ : Coordination with object to detect (x,y,w,h)\n- retval, boundingBox = cv.Tracker.update(image)\
    \ : Find location of objects to detect in new frame\n  - image : New frame image\n\
    \  - retval : Detection pass/fail\n  - boundingBox : New position of detected\
    \ objects in new frame (x,y,w,h)\n\n- Tracker Generator\n  - tracker = cv2.TrackerBoosting_create()\n\
    \    Based on AdaBoot algorithm\n  - tracker = cv2.TrackerMIL_create()\n    Based\
    \ on MIL(Multiple Instance Learning) algorithm\n  - tracker = cv2.TrackerKCF_create()\n\
    \    Based on KCF(Kernelized Correlation Filters) algorithm\n  - tracker = cv2.TrackerTLD_create()\n\
    \    Based on TLD(Tracking, learning and detection) algorithm\n  - tracker = cv2.TrackerMedianFlow_create()\n\
    \    Measure mismatch of objects by detecting front/back orientation\n  - tracker\
    \ = cv2.TrackerGOTURN_create()\n    Based on CNN(Convolutional Neural Networks),\
    \ Does not work for OpenCV 3.4 version; it recognizes it as bug\n  - tracker =\
    \ cv.TrackerCSRT_create()\n    CSRT(Channel and Spatial Reliability)\n  - tracker\

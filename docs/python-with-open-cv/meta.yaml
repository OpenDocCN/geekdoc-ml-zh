- md: "## BF(Brute-Force) Matcher\n\n- Investigate all feature descriptor of two images\n\
    - matcher = cv.BFMatcher_create([normType[, crossCheck]])\n  - normType : Distance\
    \ metering algorithm\n    - cv2.NORM_L1\n    - cv2.NORM_L2 : Base value\n    -\
    \ cv2.NORM_L2SQR\n    - cv2.NORM_HAMMING\n    - cv2.NORM_HAMMING2\n  - crossCheck=False\
    \ : Apply only ones with mutual matching\n- Selecting normType by feature\n  -\
    \ SIFT SURF : NORM_L1, NORM_L2\n  - ORB : NORM_HAMMING\n  - ORB , WTA_K : NORM_HAMMING2\n\
    - SIFT-BF Example\n\n```\nimport cv2, numpy as np\n\nimg1 = cv2.imread('../img/taekwonv1.jpg')\n\
    img2 = cv2.imread('../img/figures.jpg')\ngray1 = cv2.cvtColor(img1, cv2.COLOR_BGR2GRAY)\n\
    gray2 = cv2.cvtColor(img2, cv2.COLOR_BGR2GRAY)\n\ndetector = cv2.xfeatures2d.SIFT_create()\n\
    kp1, desc1 = detector.detectAndCompute(gray1, None)\nkp2, desc2 = detector.detectAndCompute(gray2,\
    \ None)\n\nmatcher = cv2.BFMatcher(cv2.NORM_L1, crossCheck=True)\nmatches = matcher.match(desc1,\
    \ desc2)\nres = cv2.drawMatches(img1, kp1, img2, kp2, matches, None, \\n     \
    \                 flags=cv2.DRAW_MATCHES_FLAGS_NOT_DRAW_SINGLE_POINTS)\n\ncv2.imshow('BFMatcher\
    \ + SIFT', res)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n## ❖ BF(Brute-Force)\
    \ Matching\n\n- SIFT-BF Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_322_0.png)\n\
    \n- SURF– BF Example\n\n```\nimport cv2\nimport numpy as np\nimg1 = cv2.imread('../img/taekwonv1.jpg')\n\
    img2 = cv2.imread('../img/figures.jpg')\ngray1 = cv2.cvtColor(img1, cv2.COLOR_BGR2GRAY)\n\
    gray2 = cv2.cvtColor(img2, cv2.COLOR_BGR2GRAY)\ndetector = cv2.xfeatures2d.SURF_create()\n\
    kp1, desc1 = detector.detectAndCompute(gray1, None)\nkp2, desc2 = detector.detectAndCompute(gray2,\
    \ None)\nmatcher = cv2.BFMatcher(cv2.NORM_L2, crossCheck=True)\nmatches = matcher.match(desc1,\
    \ desc2)\nres = cv2.drawMatches(img1, kp1, img2, kp2, matches, None, \\n     \
    \                flags=cv2.DRAW_MATCHES_FLAGS_NOT_DRAW_SINGLE_POINTS)\ncv2.imshow('BF\
    \ + SURF', res)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n## ❖ BF(Brute-Force)\
    \ Matching\n\n- SURF– BF Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_323_0.png)\n\
    \n- ORB– BF Example\n\n```\nimport cv2, numpy as np\n\nimg1 = cv2.imread('../img/taekwonv1.jpg')\n\
    img2 = cv2.imread('../img/figures.jpg')\ngray1 = cv2.cvtColor(img1, cv2.COLOR_BGR2GRAY)\n\
    gray2 = cv2.cvtColor(img2, cv2.COLOR_BGR2GRAY)\ndetector = cv2.ORB_create()\n\
    kp1, desc1 = detector.detectAndCompute(gray1, None)\nkp2, desc2 = detector.detectAndCompute(gray2,\
    \ None)\nmatcher = cv2.BFMatcher(cv2.NORM_HAMMING, crossCheck=True)\nmatches =\
    \ matcher.match(desc1, desc2)\nres = cv2.drawMatches(img1, kp1, img2, kp2, matches,\
    \ None, \\n                      flags=cv2.DRAW_MATCHES_FLAGS_NOT_DRAW_SINGLE_POINTS)\n\
    cv2.imshow('BFMatcher + ORB', res)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\
    \n## BF(Brute-Force) Matching\n\n- ORB– BF Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_324_0.png)\n\
    \n## FLANN Matching\n\n- Fast library for Approximate Nearest Neighbors Matching\n\
    - Disadvantage of BF matching\n  - Inspect All: If image size is large, performance\
    \ decreases\n- Do not compare all descriptor, only match most close neighboring\
    \ value\n  - Need extra parameter for algorithm selection\n- Select search parameter\
    \ and index parameter\n  - C++ class operation is omitted in python binding\n\
    \  - Draft key – value couple in dictionary objects\n- matcher = cv2.FlannBasedMatcher([indexParams[,\
    \ searchParams]])\n  - indexParams : Index parameter, dictionary\n    - algorithm\
    \ : Algorithm select key, Decide subsidiary key according to selected key\n  \
    \  - FLANN_INDEX_LINEAR = 0: Linear indexing, same as BFMatcher\n    - FLANN_INDEX_KDTREE\
    \ = 1 : KD-Tree Indexing\n    - FLANN_INDEX_KMEANS = 2 : K-Average Tree Indexing\n\
    \    - FLANN_INDEX_COMPOSITE = 3 : KD Tree, K Average mixed indexing\n    - FLANN_INDEX_LSH\
    \ = 6 : LSH Indexing\n    - FLANN_INDEX_AUTOTUNED = 255 : Auto index\n  - searchParams\
    \ : Search Parameter, dictionary objects\n    - checks=32 : Number of candidate\
    \ to search\n    - eps =0.0 : Do not use\n    - sorted=True : Organize and Turnaround\n\
    \n## ❖ FLANN Matching\n\n- Difficult and picky to draft index parameter\n- Suggested\
    \ index parameter value\n  - SIFT, SURF\n\n```\nFLANN_INDEX_KDTREE = 1\nindex_params\
    \ = dict(algorithm=FLANN_INDEX_KDTREE, trees=5)\n```\n\n  - ORB\n\n```\nFLANN_INDEX_LSH\
    \ = 6\nindex_params= dict(algorithm = FLANN_INDEX_LSH,\n                  table_number\
    \ = 6,\n                  key_size = 12,\n                  multi_probe_level\
    \ = 1)\n```\n\n## FLANN Matching\n\n- SIFT-FLANN Example\n\n```\nimport cv2, numpy\
    \ as np\nimg1 = cv2.imread('../img/taekwonv1.jpg')\nimg2 = cv2.imread('../img/figures.jpg')\n\
    gray1 = cv2.cvtColor(img1, cv2.COLOR_BGR2GRAY)\ngray2 = cv2.cvtColor(img2, cv2.COLOR_BGR2GRAY)\n\
    detector = cv2.xfeatures2d.SIFT_create()\nkp1, desc1 = detector.detectAndCompute(gray1,\
    \ None)\nkp2, desc2 = detector.detectAndCompute(gray2, None)\nFLANN_INDEX_KDTREE\

    \ Making swap\n    - sudo mkswap /var/swap_temp\n  - Applying swap\n    - sudo\
    \ swapon /var/swap_temp\n  - Remove swap\n    - sudo swapoff -v /var/swap_temp\n\
    \  - Remove swap file\n    - rm -f /var/swap_temp\n\n## Installing OpenCV from\

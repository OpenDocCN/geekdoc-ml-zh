    \ 2, 3, 0.04)\ncoord = np.where(corner > 0.1* corner.max())\ncoord = np.stack((coord[1],\
    \ coord[0]), axis=-1)\nfor x, y in coord:\n    cv2.circle(img, (x,y), 5, (0,0,255),\
    \ 1, cv2.LINE_AA)\ncorner_norm = cv2.normalize(corner, None, 0, 255, cv2.NORM_MINMAX,\
    \ cv2.CV_8U)\ncorner_norm = cv2.cvtColor(corner_norm, cv2.COLOR_GRAY2BGR)\nmerged\
    \ = np.hstack((corner_norm, img))\ncv2.imshow('Harris Corner', merged)\ncv2.waitKey()\n\
    cv2.destroyAllWindows()\n```"
- md: "## ❖ Harris Corner Detection\n\n- Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_300_0.png)\n\
    \n## ❖ Shi-Tomasi\n\n- J.Shi, C. Tomasi’s Paper, 1994\n- Good for finding features\
    \ to detect using Optical Flow\n- Consider only min value λ1, λ2 in Harris method\n\
    - Apply threshold value in Result value, If it is bigger than that, recognize\
    \ it as corner\n- **R = min(λ1, λ2) > T**\n- cv2.goodFeaturesToTrack(img, maxCorner,\
    \ qualityLev, minDistance)\n  - img : input image\n  - maxCorner : # of corners\
    \ wish to detect, From the strongest one\n  - qualityLev: Threshold to consider\
    \ it as corners\n  - mask : Mask to exclude in detection\n  - blockSize = 3 :\
    \ Size of area surrounding corners\n    - useHarrisDetector=False: Select method\
    \ to detect corner\n    - True = Harris corner detection. False = Shi-Tomasi detection\n\
    \  - K : k Coefficient to use in Harris Corner detection\n  - corners : Corner\
    \ detection coordination result, Array size of N x 1 x 2, it is in real number\
    \ value, so need to change them into integer\n\n## ❖ Shi-Tomasi\n\n- Example\n\
    \n```python\nimport cv2\nimport numpy as np\nimg = cv2.imread('../img/house.jpg')\n\
    gray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\ncorners = cv2.goodFeaturesToTrack(gray,\
    \ 80, 0.01, 10)\ncorners = np.int32(corners)\nfor corner in corners:\n    x, y\
    \ = corner[0]\n    cv2.circle(img, (x, y), 5, (0,0,255), 1, cv2.LINE_AA)\ncv2.imshow('Corners',\
    \ img)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n- Example <Result>\n\n\
    ![](img/9de0cb7cd12c1232044968590f57e471_301_0.png)\n\n## Key Point and Feature\
    \ Detector\n\n- Offer common interface regardless of feature detecting algorithm\n\
    - Feature detector: Operate after inheriting cv2.Feature2D, 12 types (as of 3.4.1\
    \ ver.)\n- Feature : cv2.KeyPoint\n\n![](img/9de0cb7cd12c1232044968590f57e471_302_0.png)\n\
    \n## cv2.Feature2D\n\n- keypoints = detector.detect(img [, mask]) : Function to\
    \ detect key point\n  - img : Input image, binary scale\n  - mask : Mask to exclude\
    \ in detection\n  - keypoints : Feature detection Result, List of KeyPoint\n-\
    \ KeyPoint : Object with feature info\n  - pt : Coordination of key point (x,\
    \ y), Need to change into integer, it is in float type\n  - size : Radius of meaningful\
    \ key point neighbors\n  - angle : Orientation of feature point (Clockwise, -1=Meaningless)\n\
    \  - response : Strength of feature point response (Depends on the detector)\n\
    \  - octave : Layers of pyramid in detected images\n  - class_id : Object ID with\
    \ key point\n\n## ❖ Show Key Point\n\n- outImg = cv2.drawKeypoints(img, keypoints,\
    \ outImg[, color[, flags]])\n  - img : Input Image\n  - keypoints : Key Point\
    \ List to show\n  - outImg : Result image with key point drawn\n  - color : Color\
    \ to show, (Basic Value : Random)\n  - flags : Flag to show marking methods\n\
    \    - cv2.DRAW_MATCHES_FLAGS_DEFAULT : Draw only circle in the center of coordination\n\
    \    - cv2.DRAW_MATCHES_FLAGS_DRAW_RICH_KEYPOINTS : Draw circle considering size\
    \ and angles\n\n## ❖ GFTTDetector\n\n- cv2.goodFeaturesToTrack() Detector show\
    \ in function\n  - detector = cv2.GFTTDetector_create([, maxCorners[, qualityLevel,\
    \ minDistance, blockSize, useHarrisDetector, k] )\n- All details in parameters\
    \ are same as cv2.goodFeaturesToTrack()\n- There is no value other than PT feature\
    \ coordination in KeyPoint Object\n\n```python\nimport cv2\nimport numpy as np\n\
    \nimg = cv2.imread(\"../img/house.jpg\")\ngray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\
    \ngftt = cv2.GFTTDetector_create()\n\nkeypoints = gftt.detect(gray, None)\n\n\
    img_draw = cv2.drawKeypoints(img, keypoints, None)\n\ncv2.imshow('GFTTDectector',\
    \ img_draw)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n## ❖ GFTTDetector\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_304_0.png)\n\n## ❖ FAST (Feature from\
    \ Accelerated Segment Test)\n\n- Edward Rosten, Tom Drummond, Cambridge Univ,\
    \ 2006\n- Improve speed in real time\n  - Check 16 pixels that passes a circle\
    \ with radius 3 as point P as center\n  - Recognize them as corner if it is brighter\
    \ than certain value (t) than P\n  - n : FAST-9, 10, 11, 12, 13, 14, 15, 16\n\
    - Detects only key point without descriptor\n\n![](img/9de0cb7cd12c1232044968590f57e471_304_1.png)\n\
    \n## ❖ FAST (Feature from Accelerated Segment Test)\n\n- detector = cv2.FastFeatureDetector_create([threshold[,\
    \ nonmaxSuppression, type]])\n  - threshold=10 : Corner Detecting Threshold\n\
    \  - nonmaxSuppression = True : Control corner not max value\n  - type : Edge\
    \ detecting pattern\n    - cv2.FastFeatureDetector_TYPE_9_16: 9 of 16 consecutive\
    \ values (basic value)\n    - cv2.FastFeatureDetector_TYPE_7_12: 7 of 12 consecutive\n\
    \    - cv2.FastFeatureDetector_TYPE_5_8: 5 of 8 consecutive\n\n- Example\n\n```python\n\
    import cv2\nimport numpy as np\nimg = cv2.imread('../img/house.jpg')\ngray = cv2.cvtColor(img,\
    \ cv2.COLOR_BGR2GRAY)\nfast = cv2.FastFeatureDetector_create(50)\nkeypoints =\
    \ fast.detect(gray, None)\nimg = cv2.drawKeypoints(img, keypoints, None)\ncv2.imshow('FAST',\
    \ img)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n- Example <result>\n\n\
    ![](img/9de0cb7cd12c1232044968590f57e471_305_0.png)\n\n## ❖ SimpleBlobDetector\n\
    \n- BLOB (Binary Large Object)\n  - Connected pixel group of binary scale image\n\
    \  - Recognize small objects as noise\n  - Only interested in objects bigger than\n\
    \n- detector = cv2.SimpleBlobDetector_create( [parameters] ) : Blob detector generator\n\
    \  - parameters : Object for Blob detecting filter parameter\n\n- Example\n\n\
    ```python\nimport cv2\nimport numpy as np\nimg = cv2.imread(\"../img/house.jpg\"\
    )\ngray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\ndetector = cv2.SimpleBlobDetector_create()\n\
    keypoints = detector.detect(gray)\nimg = cv2.drawKeypoints(img, keypoints, None,\n\
    (0,0,255),flags=cv2.DRAW_MATCHES_FLAGS_DRAW_RICH_KEYPOINTS)\ncv2.imshow(\"Blob\"\
    , img)\ncv2.waitKey(0)\n```\n\n- Example <result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_306_0.png)\n\
    \n## ❖ SimpleBlobDetector\n\n- cv2.SimpleBlobDetector_Params()\n  - minThreshold,\
    \ maxThreshold, thresholdStep : Boundary value to generate Blob\n    - Increase\
    \ by thresholdStep until it goes over max threshold from minThreshold\n  - minRepeatability:\
    \ # of consecutive boundary value to participate in Blob\n  - minDistBetweenBlobs:\
    \ Distance recognizing two blobs as one blobs\n  - filterByArea: Area filter option\n\
    \  - minArea, maxArea: Detect it as blob for min~max area\n  - filterByCircularity:\
    \ Circle ratio filter option\n  - minCircularity, maxCircularity : Detect only\
    \ circle ratio within min ~ max as blob\n  - filterByColor: Filter option using\
    \ brightness\n  - blobColor : 0=detect black blob, 255= Detect white blob\n  -\
    \ filterByConvexity: Block ratio filter option\n  - minConvexity, maxConvexity\
    \ : Detect it as blob for min~max area\n  - filterByInertia : Consistency ratio\
    \ filter option\n  - minInertiaRatio, maxInertiaRatio: Detect it as blob for min~max\
    \ area consistency ratio\n\n- Example <1/2>\n\n```python\nimport cv2\nimport numpy\
    \ as np\n\nimg = cv2.imread(\"../img/house.jpg\")\ngray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\
    \nparams = cv2.SimpleBlobDetector_Params()\n\nparams.minThreshold = 10\nparams.maxThreshold\
    \ = 240\n\nparams.thresholdStep = 5\n\nparams.filterByArea = True\nparams.minArea\
    \ = 200\n```\n\n- Example <2/2>\n\n```python\nparams.filterByColor = False\nparams.filterByConvexity\
    \ = False\nparams.filterByInertia = False\nparams.filterByCircularity = False\n\
    \ndetector = cv2.SimpleBlobDetector_create(params)\nkeypoints = detector.detect(gray)\n\
    img_draw = cv2.drawKeypoints(img, keypoints, None, None,\n    cv2.DRAW_MATCHES_FLAGS_DRAW_RICH_KEYPOINTS)\n\
    \ncv2.imshow(\"Blob with Params\", img_draw)\ncv2.waitKey(0)\n```\n\n- Example\
    \ <result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_308_0.png)\n\n## Matching\
    \ & Tracking\n\n1. Matching with a similar image\n2. Feature and Key Point\n3.\
    \ **Descriptor Extractor**\n4. Feature Matching\n5. Tracking\n6. Workshop\n\n\
    ## Feature Descriptor\n\n- Demand of feature narrator regardless of rotation,\
    \ size and orientation\n- Divide pixels surrounding Key Point into certain size\
    \ blocks\n- Calculated gradient histogram of pixel in block\n- Generally, it shows\
    \ 8 direction slope\n  - 4 x 4 x 8 for each key point = Composed of 128 values\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_310_0.png)\n\n## Descriptor Extractor\
    \ Interface\n\n- cv2.Feature2D Abstract Class\n- keypoints, descriptors = detector.compute(image,\
    \ keypoints[, descriptors]) : Calculate certain narrator while delivery key point\
    \ to turnaround\n- keypoints, descriptors = detector.detectAndCompute(image, mask[,\
    \ descriptors, useProvidedKeypoints]): Run both key point detection and feature\
    \ narration calculation at once\n  - image : Input Image\n  - keypoints : Key\
    \ point necessary for narrator calculation\n  - descriptors : Calculated narrator\n\
    \  - mask : Mask to use in key point detection\n  - useProvidedKeypoints : When\
    \ True, do not run key point detection (do not use)"
  mdcn: "## ❖ Harris 角点检测\n\n- 示例 <结果>\n\n![](img/9de0cb7cd12c1232044968590f57e471_300_0.png)\n\
    \n## ❖ Shi-Tomasi\n\n- J.Shi, C. Tomasi 的论文，1994年\n- 适用于寻找使用光流法检测的特征\n- 仅考虑 Harris\
    \ 方法中的最小特征值 λ1, λ2\n- 在结果值上应用阈值，若大于该阈值，则将其识别为角点\n- **R = min(λ1, λ2) > T**\n-\
    \ cv2.goodFeaturesToTrack(img, maxCorner, qualityLev, minDistance)\n  - img :\
    \ 输入图像\n  - maxCorner : 希望检测的角点数量，从最强的开始\n  - qualityLev: 被视为角点的阈值\n  - mask :\
    \ 检测中要排除的掩码\n  - blockSize = 3 : 角点周围区域的大小\n    - useHarrisDetector=False: 选择检测角点的方法\n\
    \    - True = Harris 角点检测。False = Shi-Tomasi 检测\n  - K : Harris 角点检测中使用的 k 系数\n\
    \  - corners : 角点检测坐标结果，数组大小为 N x 1 x 2，其值为实数，因此需要将其转换为整数\n\n## ❖ Shi-Tomasi\n\
    \n- 示例\n\n```python\nimport cv2\nimport numpy as np\nimg = cv2.imread('../img/house.jpg')\n\
    gray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\ncorners = cv2.goodFeaturesToTrack(gray,\
    \ 80, 0.01, 10)\ncorners = np.int32(corners)\nfor corner in corners:\n    x, y\
    \ = corner[0]\n    cv2.circle(img, (x, y), 5, (0,0,255), 1, cv2.LINE_AA)\ncv2.imshow('Corners',\
    \ img)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n- 示例 <结果>\n\n![](img/9de0cb7cd12c1232044968590f57e471_301_0.png)\n\
    \n## 关键点与特征检测器\n\n- 无论特征检测算法如何，都提供通用接口\n- 特征检测器：继承 cv2.Feature2D 后操作，共12种类型（截至\
    \ 3.4.1 版本）\n- 特征 : cv2.KeyPoint\n\n![](img/9de0cb7cd12c1232044968590f57e471_302_0.png)\n\
    \n## cv2.Feature2D\n\n- keypoints = detector.detect(img [, mask]) : 检测关键点的函数\n\
    \  - img : 输入图像，二值尺度\n  - mask : 检测中要排除的掩码\n  - keypoints : 特征检测结果，KeyPoint 列表\n\
    - KeyPoint : 包含特征信息的对象\n  - pt : 关键点坐标 (x, y)，需要转换为整数，其类型为浮点数\n  - size : 有意义的关键点邻域半径\n\
    \  - angle : 特征点方向（顺时针，-1=无意义）\n  - response : 特征点响应强度（取决于检测器）\n  - octave : 检测图像中的金字塔层数\n\
    \  - class_id : 关键点所属对象的 ID\n\n## ❖ 显示关键点\n\n- outImg = cv2.drawKeypoints(img,\
    \ keypoints, outImg[, color[, flags]])\n  - img : 输入图像\n  - keypoints : 要显示的关键点列表\n\
    \  - outImg : 绘制了关键点的结果图像\n  - color : 显示颜色，（基本值：随机）\n  - flags : 标记显示方法的标志\n\
    \    - cv2.DRAW_MATCHES_FLAGS_DEFAULT : 仅在坐标中心绘制圆圈\n    - cv2.DRAW_MATCHES_FLAGS_DRAW_RICH_KEYPOINTS\
    \ : 绘制考虑大小和角度的圆圈\n\n## ❖ GFTTDetector\n\n- cv2.goodFeaturesToTrack() 检测器以函数形式展示\n\
    \  - detector = cv2.GFTTDetector_create([, maxCorners[, qualityLevel, minDistance,\
    \ blockSize, useHarrisDetector, k] )\n- 所有参数细节与 cv2.goodFeaturesToTrack() 相同\n\
    - KeyPoint 对象中除了 PT 特征坐标外没有其他值\n\n```python\nimport cv2\nimport numpy as np\n\n\
    img = cv2.imread(\"../img/house.jpg\")\ngray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\
    \ngftt = cv2.GFTTDetector_create()\n\nkeypoints = gftt.detect(gray, None)\n\n\
    img_draw = cv2.drawKeypoints(img, keypoints, None)\n\ncv2.imshow('GFTTDectector',\
    \ img_draw)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n## ❖ GFTTDetector\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_304_0.png)\n\n## ❖ FAST (加速段测试特征)\n\
    \n- Edward Rosten, Tom Drummond, 剑桥大学, 2006\n- 提高实时速度\n  - 检查以点 P 为中心、半径为3的圆上的16个像素\n\
    \  - 如果比 P 亮超过某个值 (t)，则将其识别为角点\n  - n : FAST-9, 10, 11, 12, 13, 14, 15, 16\n-\
    \ 仅检测关键点，不提供描述符\n\n![](img/9de0cb7cd12c1232044968590f57e471_304_1.png)\n\n## ❖\
    \ FAST (加速段测试特征)\n\n- detector = cv2.FastFeatureDetector_create([threshold[, nonmaxSuppression,\
    \ type]])\n  - threshold=10 : 角点检测阈值\n  - nonmaxSuppression = True : 控制角点是否为最大值\n\
    \  - type : 边缘检测模式\n    - cv2.FastFeatureDetector_TYPE_9_16: 16个连续值中的9个（基本值）\n\
    \    - cv2.FastFeatureDetector_TYPE_7_12: 12个连续值中的7个\n    - cv2.FastFeatureDetector_TYPE_5_8:\
    \ 8个连续值中的5个\n\n- 示例\n\n```python\nimport cv2\nimport numpy as np\nimg = cv2.imread('../img/house.jpg')\n\
    gray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\nfast = cv2.FastFeatureDetector_create(50)\n\
    keypoints = fast.detect(gray, None)\nimg = cv2.drawKeypoints(img, keypoints, None)\n\
    cv2.imshow('FAST', img)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n- 示例 <结果>\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_305_0.png)\n\n## ❖ SimpleBlobDetector\n\
    \n- BLOB (二值大对象)\n  - 二值尺度图像中连通的像素组\n  - 将小物体识别为噪声\n  - 仅对大于某尺寸的物体感兴趣\n\n- detector\
    \ = cv2.SimpleBlobDetector_create( [parameters] ) : Blob 检测器生成器\n  - parameters\
    \ : Blob 检测过滤器参数的对象\n\n- 示例\n\n```python\nimport cv2\nimport numpy as np\nimg\
    \ = cv2.imread(\"../img/house.jpg\")\ngray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\
    detector = cv2.SimpleBlobDetector_create()\nkeypoints = detector.detect(gray)\n\
    img = cv2.drawKeypoints(img, keypoints, None,\n(0,0,255),flags=cv2.DRAW_MATCHES_FLAGS_DRAW_RICH_KEYPOINTS)\n\
    cv2.imshow(\"Blob\", img)\ncv2.waitKey(0)\n```\n\n- 示例 <结果>\n\n![](img/9de0cb7cd12c1232044968590f57e471_306_0.png)\n\
    \n## ❖ SimpleBlobDetector\n\n- cv2.SimpleBlobDetector_Params()\n  - minThreshold,\
    \ maxThreshold, thresholdStep : 生成 Blob 的边界值\n    - 从 minThreshold 开始，按 thresholdStep\
    \ 递增，直到超过 maxThreshold\n  - minRepeatability: 参与 Blob 的连续边界值数量\n  - minDistBetweenBlobs:\
    \ 将两个 Blob 识别为一个 Blob 的距离\n  - filterByArea: 面积过滤器选项\n  - minArea, maxArea: 将\
    \ min~max 面积内的检测为 Blob\n  - filterByCircularity: 圆形度过滤器选项\n  - minCircularity,\
    \ maxCircularity : 仅将 min ~ max 圆形度内的检测为 Blob\n  - filterByColor: 使用亮度的过滤器选项\n\
    \  - blobColor : 0=检测黑色 Blob, 255= 检测白色 Blob\n  - filterByConvexity: 凸度过滤器选项\n\
    \  - minConvexity, maxConvexity : 将 min~max 凸度内的检测为 Blob\n  - filterByInertia\
    \ : 惯性比过滤器选项\n  - minInertiaRatio, maxInertiaRatio: 将 min~max 惯性比内的检测为 Blob\n\n\
    - 示例 <1/2>\n\n```python\nimport cv2\nimport numpy as np\n\nimg = cv2.imread(\"\
    ../img/house.jpg\")\ngray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\nparams =\
    \ cv2.SimpleBlobDetector_Params()\n\nparams.minThreshold = 10\nparams.maxThreshold\
    \ = 240\n\nparams.thresholdStep = 5\n\nparams.filterByArea = True\nparams.minArea\
    \ = 200\n```\n\n- 示例 <2/2>\n\n```python\nparams.filterByColor = False\nparams.filterByConvexity\
    \ = False\nparams.filterByInertia = False\nparams.filterByCircularity = False\n\
    \ndetector = cv2.SimpleBlobDetector_create(params)\nkeypoints = detector.detect(gray)\n\
    img_draw = cv2.drawKeypoints(img, keypoints, None, None,\n    cv2.DRAW_MATCHES_FLAGS_DRAW_RICH_KEYPOINTS)\n\
    \ncv2.imshow(\"Blob with Params\", img_draw)\ncv2.waitKey(0)\n```\n\n- 示例 <结果>\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_308_0.png)\n\n## 匹配与跟踪\n\n1. 与相似图像匹配\n\
    2. 特征与关键点\n3. **描述符提取器**\n4. 特征匹配\n5. 跟踪\n6. 实践\n\n## 特征描述符\n\n- 要求特征描述符不受旋转、大小和方向的影响\n\
    - 将关键点周围的像素划分为特定大小的块\n- 计算块内像素的梯度直方图\n- 通常，它显示8个方向的斜率\n  - 每个关键点 4 x 4 x 8 = 由128个值组成\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_310_0.png)\n\n## 描述符提取器接口\n\n- cv2.Feature2D\
    \ 抽象类\n- keypoints, descriptors = detector.compute(image, keypoints[, descriptors])\
    \ : 在传递关键点进行周转时计算特定描述符\n- keypoints, descriptors = detector.detectAndCompute(image,\
    \ mask[, descriptors, useProvidedKeypoints]): 同时运行关键点检测和特征描述符计算\n  - image : 输入图像\n\
    \  - keypoints : 描述符计算所需的关键点\n  - descriptors : 计算出的描述符\n  - mask : 关键点检测中使用的掩码\n\
    \  - useProvidedKeypoints : 当为 True 时，不运行关键点检测（不使用）"

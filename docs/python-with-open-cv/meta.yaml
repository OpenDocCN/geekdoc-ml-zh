  md: "# ❖ Harris Corner Detection\n\n+   - Chris harris, Mike Stephens’s paper, 1988\n\
    - Representative methods of finding Corner Keypoint\n- When move kernel, all direction\
    \ changes\n- cv2.cornerHarris(img, blockSize, ksize, k)\n  - img : Input image,\
    \ float32\n  - blocksize : Size of neighboring pixel\n  - ksize : Kernel size\
    \ to use in Sobel\n  - k : K Parameter (Empirical Integer, 0.04~0.06)\n  - Turnaround\
    \ : Same size as input image\n    - Changed value\n\n![](img/9de0cb7cd12c1232044968590f57e471_299_0.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_299_1.png)\n\n![](img/9de0cb7cd12c1232044968590f57e471_299_2.png)\n\
    \n# ❖ Harris Corner Detection\n\n```\npython\nimport cv2\nimport numpy as np\n\
    img = cv2.imread('../img/house.jpg')\ngray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\
    corner = cv2.cornerHarris(gray, 2, 3, 0.04)\ncoord = np.where(corner > 0.1* corner.max())\n\
    coord = np.stack((coord[1], coord[0]), axis=-1)\nfor x, y in coord:\n    cv2.circle(img,\
    \ (x,y), 5, (0,0,255), 1, cv2.LINE_AA)\ncorner_norm = cv2.normalize(corner, None,\
    \ 0, 255, cv2.NORM_MINMAX, cv2.CV_8U)\ncorner_norm = cv2.cvtColor(corner_norm,\
    \ cv2.COLOR_GRAY2BGR)\nmerged = np.hstack((corner_norm, img))\ncv2.imshow('Harris\
    \ Corner', merged)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```"
  merge: -1
  pgno: 299

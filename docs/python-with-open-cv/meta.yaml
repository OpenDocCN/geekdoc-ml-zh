  - "[PAGE 319]\n\n# Matching\n\n+   - Matching similarities by comparing key points\
    \ and descriptor of different images\n- Measure and detect similarity of images\
    \ depends on # of matching point\n- Image search, generate panorama image, use\
    \ in object recognition\n\n# Common Interface\n\n+   - cv2.DescriptorMatcher :\
    \ Inherit matching abstract classes\n- cv2.DMatch : Object to save matching result\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_319_0.png)\n\n# Common Interface\n\n\
    +   - matcher = cv2.DescriptorMatcher_create(matcherType) : Matching Generator\n\
    \  - matcherType: Algorithm of operation classes to generate, string\n    - \"\
    BruteForce\": BFMatcher using NORM_L2r\n    - \"BruteForce-L1\": BFMatcher using\
    \ NORM_L1\n    - \"BruteForce-Hamming\": BFMatcher using NORM_HAMMING\n    - \"\
    BruteForce-Hamming(2)\": BFMatcher using NORM_HAMMING2\n    - \"FlannBased\" :\
    \ FlannBasedMatcher using NORM_L2\n- matches = matcher.match(queryDescriptors,\
    \ trainDescriptors[, mask]): 1 optimal matching\n- queryDescriptors: Arrau feature\
    \ narrator, narrator to be standard of matching\n- trainDescriptors: Arrau feature\
    \ narrator, narrator to be object of matching"
  - "[PAGE 320]\n\n+   - mask: Mask for matching\n- matches: Matching Result, DMatch\
    \ List of objects\n\n+   - matches = matcher.knnMatch( queryDescriptors, trainDescriptors,\
    \ k[, mask[, compactResult]] : K # of most closest matching\n  - k : # of neighbors\
    \ to match\n  - compactResult=False : True: If no match, exclude in the result\n\
    \n+   - matches = matcher.radiusMatch(queryDescriptors, trainDescriptors, maxDistance[,\
    \ mask, compactResult]): Distance matching within maxDistance\n  - maxDistance\
    \ : Distance to match\n\n+   - DMatch\n  - queryIdx : queryDescriptor's index\n\
    \  - trainIdx : trainDescriptor's index\n  - imgIdx : trainDescriptor's image\
    \ index\n  - distance : Similarity distance\n\n+   - cv2.drawMatches(img1, kp1,\
    \ img2, kp2, matches, flags): Mark matching point in img1, kp1 : queryDescirptor's\
    \ image and key point\n\n+   - img1, kp1 : trainDescirptor's image and key point\n\
    \n+   - matches : Matching Result\n\n+   - flags : Matching point drawing option\n\

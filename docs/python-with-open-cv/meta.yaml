  md: "# ❖ Watershed\n\n+   • Example\n\n```\nimport cv2\nimport numpy as np\n\nimg\
    \ = cv2.imread('../img/taekwonv1.jpg')\nrows, cols = img.shape[:2]\nimg_draw =\
    \ img.copy()\nmarker = np.zeros((rows, cols), np.int32)\nmarkerId = 1\ncolors\
    \ = []\nisDragging = False\ndef onMouse(event, x, y, flags, param):\n    global\
    \ img_draw, marker, markerId, isDragging\n    if event == cv2.EVENT_LBUTTONDOWN:\
    \  # Drag down left mouse\nbutton, start dragging\n        isDragging = True\n\
    \        colors.append((markerId, img[y,x]))\n    elif event == cv2.EVENT_MOUSEMOVE:\
    \  # Mouse moving\n        if isDragging:            # Dragging\n            marker[y,x]\
    \ = markerId\n            cv2.circle(img_draw, (x,y), 3, (0,0,255), -1)\n    \
    \        cv2.imshow('watershed', img_draw)\n    elif event == cv2.EVENT_LBUTTONUP:\
    \  # Up left mouse button\n        if isDragging:\n            isDragging = False\
    \    # Stop dragging\n            markerId +=1\n    elif event == cv2.EVENT_RBUTTONDOWN:\
    \ # Click right mouse button\n        cv2.watershed(img, marker)\n        img_draw[marker\
    \ == -1] = (0,255,0)\n        for mid, color in colors: # Repeat as the number\
    \ of marker ID\n            img_draw[marker==mid] = color\n        cv2.imshow('watershed',\
    \ img_draw) # Print marked result\ncv2.imshow('watershed', img)\ncv2.setMouseCallback('watershed',\
    \ onMouse)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```"

  - "[PAGE 332]\n\n+   - 0 : Calculate min square errors to all points\n- cv2.RANSAC\n\
    - cv2.LMEDS\n- cv2.RHO\n\n+   - ransacReprojThreshold=3: Normal distance threshold\
    \ value, when RANSAC,RHO\n\n+   - maxIters=2000 : # of approximate calculation\
    \ repetition\n\n+   - confidence=0.995 : Reliability, 0 ~ 1\n\n+   - mtrx : Result\
    \ transform array\n\n+   - mask : Normal level judging Result, N x 1 array (0:Normal,\
    \ 1:abnormal)\n\n+   - dst = cv.perspectiveTransform(src, m[, dst])\n\n+   - src\
    \ : Input coordination array\n\n+   - m : Transform array\n\n+   - dst : Output\
    \ coordination array\n\n+   - Approximate Calculation Algorithm\n    - RANSAC(Random\
    \ Sample Consensus)\n        - Select random points, calculate approximate points\
    \ for most satisfactory points\n        - Normal Value (Inlier), Abnormal Value\
    \ (outlier)\n    - LMEDS(Least Median of Squares)\n        - Least median value\
    \ of square\n        - No need for extra parameter\n        - Run only when normal\
    \ value is more than 50%\n    - RHO\n        - Use PROSAC (Progressive Simple\
    \ Consensus); improved RANSAC\n        - Faster when there is more outlier"

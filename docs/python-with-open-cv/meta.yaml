    \n- Use different threshold for each pixel\n- When each area has different light\
    \ level\n\n## ❖ Simple Global fixed threshold\n\n- Set temporary threshold (boundary)\
    \ value\n- numpy masking\n  - `dst[ src > thresh ] =255`\n- `ret, dst = cv.threshold(src,\
    \ thresh, maxval, flag)`\n  - `src` : input image\n  - `thresh` : threshold value\n\
    \  - `value` : Value to be applied to the pixel fit to the threshold value\n \
    \ - `flag` : `cv2.THRESH_*`\n    - `BINARY` : px > thresh ? value : 0\n    - `BINARY_INV`\
    \ : px > thresh ? 0 : value\n    - `TRUNC` : px > thresh ? value : px\n    - `TOZERO`\
    \ : px > thresh ? px : 0\n    - `TOZERO_INV` : px > thresh ? 0 : px"

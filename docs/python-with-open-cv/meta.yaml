    \n# ❖ History\n\n+   - Launched : 1999' Jan, IPL(Image Processing Library) based,\
    \ C language\n- First Ver. alpha : 2000'\n- 5 Betas : 2001 ~ 2005\n- Ver 1.0 :\
    \ 2006' Oct\n- Precompiled Python module included\n  - Borland C++ makefiles added\n\
    - Ver 2.0 : 2009' Sep\n  - new C++ API , STL Based\n  - new Python interface\n\
    - Ver2.2 :2010' Dec\n  - package reorganized ( core, imgproc, features2d, ml,\
    \ contrib, ...)\n  - new Python biding, NumPy Required\n- Ver 2.3 : 2011' July\n\
    \  - Android porting\n  - Python module cv2 for OpenCV 2.x\n- ver 3.4 : 2017'\
    \ Dec , latest"

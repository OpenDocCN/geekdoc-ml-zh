    \n## 滤波器\n\n1. 卷积滤波器\n2. 模糊\n3. 边缘检测\n4. 形态学\n5. **图像金字塔**\n6. 实践练习\n\n## 图像金字塔\n\
    \n- 通过逐步缩小和放大图像，像金字塔一样堆叠。\n- 速度与精度\n    - 使用小图像进行快速分析，并对下一层图像进行详细分析。\n- 通过尺寸补偿结果差异。\n\

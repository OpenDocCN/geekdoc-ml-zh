    \n## Image Processing Basic\n\n1. **ROI(Region Of Interest)**\n2. Color Space\n\
    3. Threshold\n4. Image Arithmetic\n5. Histogram\n6. Workshop\n\n## ❖ ROI\n\n-\
    \ Region Of Interest\n  - Interested region\n  - Subject to image edit Region,\
    \ No All Pixel\n  - Improve calculation speed\n- Set certain area as Numpy slicing\n\
    \  - img[h:h+y, w:w+x]\n    - Slicing is effective for area pixel approach\n \
    \ - img.item(h, w, c), img.itemset( (h, w, c), val)\n    - Item() function is\
    \ effective for individual pixel approach\n  - Turnaround original reference\n\
    \    - Different as Python list.\n    - If ROI is edited, original changes too.\n\
    \    - If original is edited, ROI is changed too.\n    - If you do not want to\
    \ edit, copy to use (img.copy())\n\n## ❖ ROI (Region Of Image)\n\n- Set ROI\n\n\
    ```\nimport cv2\nimport numpy as np\n\nimg = cv2.imread('./img/sunset.jpg')\n\n\
    x=320; y=150; w=50; h=50       # roi Coordination\nroi = img[y:y+h, x:x+w]   \
    \     # set ROI\n\nprint(roi.shape)                # roi shape, (50,50,3)\ncv2.rectangle(roi,\
    \ (0,0), (h-1, w-1), (0,255,0))\ncv2.imshow(\"img\", img)\n\ncv2.waitKey(0)\n\
    cv2.destroyAllWindows()\n```\n\n## ❖ ROI(Region Of Image)\n\n- Set ROI\n\n![](img/9de0cb7cd12c1232044968590f57e471_128_0.png)\n\
    \n## ❖ ROI Copy and Open New Window\n\n```\nimport cv2\nimport numpy as np\n\n\
    img = cv2.imread('./img/sunset.jpg')\n\nx=320; y=150; w=50; h=50\nroi = img[y:y+h,\
    \ x:x+w]      # roi Set\nimg2 = roi.copy()             # roi Array Copy---①\n\n\
    img[y:y+h, x+w:x+w+w] = roi\ncv2.rectangle(img, (x,y), (x+w+w, y+h), (0,255,0))\n\
    \ncv2.imshow(\"img\", img)        # Print original image\ncv2.imshow(\"roi\",\
    \ img2)       # Print roi only\n\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```"

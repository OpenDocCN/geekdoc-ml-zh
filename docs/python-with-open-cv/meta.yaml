    accuracy=float(mask.sum()) / mask.size\nprint(\"accuracy: %d/%d(%.2f%%)\"% (mask.sum(),\
    \ mask.size, accuracy))\ncv2.imshow('Matching-All', res1)\ncv2.imshow('Matching-Inlier\
    \ ', res2)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n- Example <result>\n\

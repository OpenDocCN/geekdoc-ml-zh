    img_clahe = cv2.cvtColor(img_clahe, cv2.COLOR_YUV2BGR)


    cv2.imshow(''Before'', img)

    cv2.imshow(''CLAHE'', img_clahe)

    cv2.imshow(''equalizeHist'', img_eq)


    \ Image\n    - dstsize : Size of output image\n    - Generate upper level image\
    \ of pyramid\n    - After applying Gaussian kernel, delete odd number column and\
    \ row\n    - Reduced to ¼ size\n- cv2.pyrUp()\n    - Generate lower level image\
    \ of pyramid\n    - Fill column and row with 0, convolution with designated filter\

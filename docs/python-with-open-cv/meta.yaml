  md: "# ❖ Camera Frame Flip\n\n+   - cv2.flip(img, flipCode)\n    - Flip image\n\
    \    - flipcode\n        - 0 : x-axis (rows)\n        - 1 : y-axis (cols)\n  \
    \      - -1 : x,y axis (rows, cols)\n\n$$dst_{ij} = \\begin{cases} src_{src.rows-i-1,j}\
    \ & \\text{if flipCode = 0} \\ src_{i,src.cols-j-1} & \\text{if flipCode > 0}\
    \ \\ src_{src.rows-i-1,src.cols-j-1} & \\text{if flipCode < 0} \\end{cases}$$\n\
    \n```\nimport cv2\ncap = cv2.VideoCapture(0)\nwhile True:\n    ret, frame = cap.read()\n\
    \    if ret==True:\n        frame = cv2.flip(frame,1)\n        cv2.imshow('frame',frame)\n\
    \        if cv2.waitKey(1) & 0xFF == 27: #esc\n            break\n    else:\n\
    \        break\ncap.release()\ncv2.destroyAllWindows()\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_77_0.png)\n\

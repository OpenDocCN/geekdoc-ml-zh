  mdcn: "## ❖ 分水岭算法\n\n- 示例 <结果>\n\n![](img/9de0cb7cd12c1232044968590f57e471_280_0.png)\n\
    \n## ❖ Grabcut 算法\n\n- 基于图割算法进行扩展\n- 假设前景主体的颜色分布，以分离前景图像\n- 在具有相同标签的连通区域中，分离前景图像和背景\n\
    - `mask, bgdModel, fgdModel = cv2.grabCut(img, mask, rect, bgdModel, fgdModel,\
    \ iterCount[, mode])`\n- `img`：输入图像\n- `mask`：单通道数组，与输入图像大小相同，用于保存区分背景和前景的值\n\
    \    - `cv2.GC_BGD`：绝对背景 (0)\n    - `cv2.GC_FGD`：绝对前景 (1)\n    - `cv2.GC_PR_BGD`：可能是背景\
    \ (2)\n    - `cv2.GC_PR_FGD`：可能是前景 (3)\n- `rect`：假设前景区域的矩形坐标，元组 (x1, y1, x2, y2)\n\
    - `bgdModel`, `fgdModel`：函数内部使用的临时数组缓冲区，重复使用时请勿编辑\n- `iterCount`：迭代次数\n- `mode`：\n\
    \    - `cv2.GC_INIT_WITH_RECT`：基于 `rect` 中设置的坐标进行 Grabcut\n    - `cv2.GC_INIT_WITH_MASK`：基于\
    \ `mask` 中设置的坐标进行 Grabcut\n    - `cv2.GC_EVAL`：重新尝试\n\n## Grabcut\n\n- 示例 <1/2>\n\
    \n```python\nimport cv2\nimport numpy as np\nimg = cv2.imread('../img/taekwonv1.jpg')\n\

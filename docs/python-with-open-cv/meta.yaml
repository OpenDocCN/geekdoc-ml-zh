    ![](img/9de0cb7cd12c1232044968590f57e471_196_0.png)\n\n## ❖ Triangular Affine\
    \ Transform\n\n- No function offered by OpenCV\n- Procedure for triangular affine\
    \ transform\n  1. Select 3 matching coordination of triangle before transformation\n\
    \  2. Select 3 matching coordination of triangle after transformation\n  3. Calculate\
    \ border quadrangle coordination surrounding step 1 triangle coordination.\n \
    \ 4. Select quadrangle area of step 3 as interested area.\n  5. Interested area\
    \ as in step 4, calculate change matrix with step 1 and step 2 coordination and\
    \ transform affine.\n  6. Mask only triangle coordination of step 2 from the transformed\
    \ interested area in step 5.\n  7. Using mask in step 6, compose it with original\
    \ or other images.\n\n- x,y,w,h = cv2.boundingRect(pts) pts : polygon coordination,\
    \ need step 3\n  - x, y, w, h : Width and height of border quadrangle\n- cv2.fillConvexPoly(img,\
    \ points, color [, lineType]) img : Input image, need step 6\n  - points : Vertex\
    \ of polygon\n  - color : Color to use for fill\n  - lineType : Selection flag\
    \ for line drawing algorithm\n- Triangular Affine Transform < 1/2>\n\n```python\n\
    import cv2\nimport numpy as np\n\nimg = cv2.imread(\"../img/taekwonv1.jpg\")\n\

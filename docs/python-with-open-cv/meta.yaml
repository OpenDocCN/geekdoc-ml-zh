    \ original\n\n![](img/9de0cb7cd12c1232044968590f57e471_238_1.png)\n\n![](img/9de0cb7cd12c1232044968590f57e471_238_2.png)\n\
    \n## ❖ Opening & Closing\n\n- Example\n\n```python\nimport cv2\nimport numpy as\
    \ np\n\nimg1 = cv2.imread('../img/morph_dot.png', cv2.IMREAD_GRAYSCALE)\nimg2\

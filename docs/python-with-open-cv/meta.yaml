- md: "## Filter\n\n- Filter out unwanted value and get only wanted value.\n- LPF\
    \ (Low Pass Filter): Blurring, Eliminate Noise\n- HPF (High Pass Filter): Sharpening,\
    \ Edge Detection\n- Domain\n  - Spatial Domain Filter\n    - Calculate by using\
    \ surrounding pixel value not just one pixel\n    - Convolution Calculation\n\
    \  - Frequency Domain Filter\n    - Calculate by transferring pixel value differences\
    \ to frequency\n    - Fourier Transform\n\n## Convolution\n\n- Core calculation\
    \ for spatial domain filter\n- Multiply input pixel value matching to each factors\
    \ of Kernel and add them all\n- Kernel: Select surrounding pixels to be used in\
    \ calculation\n  - Name may vary like window, mask, filter etc.\n  - Kernel Size:\
    \ n x n\n  - n: Generally odd number\n\n![](img/9de0cb7cd12c1232044968590f57e471_213_0.png)\n\
    \n## ❖ Convolution Function for Calculation\n\n- dst = cv2.filter2D(src, ddepth,\
    \ kernel[, dst, anchor, delta, borderType])\n  - src: Input image, NumPy array\n\
    \  - ddepth: dtype of output image,\n    - -1: Same as input image\n    - CV_8U,\
    \ CV_16U/CV_16S, CV_32F, CV_64F\n  - kernel: Convolution kernel, float32\n  -\
    \ dst: Result image, NumPy array\n  - anchor: Standard point of kernel, default:\
    \ Center point(-1,-1)\n  - delta: Value to be added in result value with filter\n\
    \  - borderType: Designate border pixel correction method\n\n## Filter\n\n1. Convolution\
    \ Filter\n2. **Blurring**\n3. Edge Detection\n4. Morphology\n5. Image Pyramids\n\
    6. Workshop\n\n## ❖ Blurring\n\n- Blur image using Filter\n- Superior for Noise\
    \ removal\n- Blur Types\n  - Averaging Blur\n    - cv2.blur, cv2.boxFilter\n \
    \ - Gaussian Blur\n    - cv2.GaussianBlur\n  - Median Blur\n    - cv2.medianBlur\n\
    \  - Bilateral Filter\n    - cv2.bilateralFilter\n\n## ❖ Averaging Blurring\n\n\
    - Change pixel value to average value of surrounding factors\n- Decide domain\
    \ of surrounding factors\n  - Generate Kernel matrix\n  - More unclear as Kernel\
    \ gets large\n- Method\n  - cv2.filter2D()\n  - cv2.boxFilter()\n  - cv2.blur()\n\
    - Apply surrounding pixel to average pixels\n- Average eigen value to give blur\
    \ effects\n- 5 X 5 average filter\n\n![](img/9de0cb7cd12c1232044968590f57e471_216_0.png)\n\
    \n## ❖ Averaging Blurring\n\ncv2.filter2D Example\n\n```python\nimport cv2, numpy\
    \ as np\n\nimg = cv2.imread('../img/girl.jpg')\n...\n# 5x5 평균 필터 커널 생성\nkernel\
    \ = np.array([[0.04, 0.04, 0.04, 0.04, 0.04],\n                   [0.04, 0.04,\
    \ 0.04, 0.04, 0.04],\n                   [0.04, 0.04, 0.04, 0.04, 0.04],\n   \
    \                [0.04, 0.04, 0.04, 0.04, 0.04],\n                   [0.04, 0.04,\
    \ 0.04, 0.04, 0.04]])\n...\nkernel = np.ones((5,5))/5*5\nblured = cv2.filter2D(img,\
    \ -1, kernel)\n\ncv2.imshow('origin', img)\ncv2.imshow('avrg blur', blured)\n\
    cv2.waitKey()\ncv2.destroyAllWindows()\n```\n\nExample <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_217_0.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_217_1.png)\n\n## ❖ Averaging Blurring\n\
    \n- Applying blur without defining kernel\n- dst = cv2.blur(src, ksize[, dst,\
    \ anchor, borderType])\n  - src: Input image, NumPy array\n  - ksize: Size of\
    \ kernel\n  - Other factors are same as cv2.filter2D()\n- dst = cv2.boxFilter(src,\
    \ ddepth, ksize[, dst, anchor, normalize, borderType])\n  - src: Input image,\
    \ NumPy array\n  - ddepth: dtype of output image, -1: Same as input image\n  -\
    \ normalize: rather to normalize by kernel size, boolean\n  - Other factors are\
    \ same as cv2.filter2D()\n- Blur specific function Example\n\n```python\nimport\
    \ cv2\nimport numpy as np\n\nfile_name = '../img/taekwonv1.jpg'\nimg = cv2.imread(file_name)\n\
    \n# blur()\nblur1 = cv2.blur(img, (10,10))\n\n# boxFilter()\nblur2 = cv2.boxFilter(img,\
    \ -1, (10,10))\n\nmerged = np.hstack( (img, blur1, blur2))\ncv2.imshow('blur',\
    \ merged)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n## ❖ Averaging Blurring\n\
    \n- Blur specific function Result\n\n![](img/9de0cb7cd12c1232044968590f57e471_219_0.png)\n\
    \n## ❖ Gaussian Blurring\n\n- Using Kernel applying Gaussian function\n- Effective\
    \ for white noise\n- cv2.GaussianBlur(src, ksize, sigmaX[, sigmaY, border])\n\
    \  - src: Input image\n  - ksize: kernel size\n  - sigmaX: X direction standard\
    \ deviation, 0 = auto\n    - σ = 0.3 * ((ksize - 1) * 0.5 - 1) + 0.8\n  - sigmaY:\
    \ Y direction standard deviation, default = sigmaX\n  - border: Revising border\n\
    - kernel = cv2.getGaussianKernel(ksize, sigma)\n  - ksize: Kernel size\n  - sigma:\
    \ Standard Deviation\n  - kernel * kernel.T\n\n![](img/9de0cb7cd12c1232044968590f57e471_219_1.png)\n\
    \n| 1 | 4 | 7 | 4 | 1 |\n|---|---|---|---|---|\n| 4 | 16 | 26 | 16 | 4 |\n| 7\
    \ | 26 | 41 | 26 | 7 |\n| 4 | 16 | 26 | 16 | 4 |\n| 1 | 4 | 7 | 4 | 1 |\n\n$$\\\
    frac{1}{273}$$\n\n## Gaussian Blurring\n\n- Example\n\n```python\nimport cv2\n\
    import numpy as np\n\nimg = cv2.imread('../img/gaussian_noise.jpg')\n\nk1 = np.array([[1,\
    \ 2, 1],\n               [2, 4, 2],\n               [1, 2, 1]]) * (1/16)\nblur1\
    \ = cv2.filter2D(img, -1, k1)\n\nk2 = cv2.getGaussianKernel(3, 0)\nblur2 = cv2.filter2D(img,\
    \ -1, k2*k2.T)\n\nblur3 = cv2.GaussianBlur(img, (3, 3), 0)\n\nprint('k1:', k1)\n\
    print('k2:', k2*k2.T)\nmerged = np.hstack((img,blur1,blur2,blur3))\ncv2.imshow('gaussian\
    \ blur', merged)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n- Example <Execution\
    \ Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_220_0.png)\n\n## ❖ Median\
    \ Blurring\n\n- Of the kernel domain pixel value, apply middle value\n- Effective\
    \ for salt-and-pepper noise\n- Reuse existing pixel value not new value\n- dst\
    \ = cv2.medianBlur(src, ksize)\n  - src: Input Image, NumPy array\n  - ksize:\
    \ Kernel Size\n\n```python\nimport cv2\nimport numpy as np\n\nimg = cv2.imread(\"\
    ../img/salt_pepper_noise.jpg\")\n\nblur = cv2.medianBlur(img, 5)\n\nmerged = np.hstack((img,blur))\n\
    cv2.imshow('media', merged)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n\
    ![](img/9de0cb7cd12c1232044968590f57e471_221_0.png)\n\n## ❖ Bilateral Filter Blurring\n\
    \n- Both way filter, use 2 filters\n  - Gaussian filter + border filter\n- Blur\
    \ result blurs edge as well, it improves this issue\n- Slow, due to long calculation\
    \ time\n- dst = cv2.bilateralFilter(src, d, sigmaColor, sigmaSpace[, dst, borderType])\n\
    \  - src: Input image, NumPy array\n  - d: diameter of filter, If it is bigger\
    \ than 5, it is very slow\n  - sigmaColor: Sigma value of color domain filter\n\
    \  - sigmaSpace: Sigma value of coordination domain\n    - Suggest to use same\
    \ value for Sigma Color and Sigma Space for simpler use\n    - Suggest value in\
    \ between 10 ~ 150\n- Example\n\n```python\nimport cv2\nimport numpy as np\n\n\
    img = cv2.imread(\"../img/gaussian_noise.jpg\")\n\nblur1 = cv2.GaussianBlur(img,\
    \ (5,5), 0)\n\nblur2 = cv2.bilateralFilter(img, 5, 75, 75)\n\nmerged = np.hstack((img,\
    \ blur1, blur2))\ncv2.imshow('bilateral', merged)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n\
    ```\n\n![](img/9de0cb7cd12c1232044968590f57e471_222_0.png)\n\n## Filter\n\n1.\
    \ Convolution Filter\n2. Blurring\n3. **Edge Detection**\n4. Morphology\n5. Image\
    \ Pyramids\n6. Workshop\n\n## Detecting Border\n\n- Dividing front image and background\
    \ image\n- Sharpening: Emphasizing border by detecting\n- Border: Point with large\
    \ pixel value\n- Differentiation\n  - Ratio of resolution change\n  - Slope of\
    \ image\n\nContinuous function:\n\n$$\\frac{\\partial f(x, y)}{\\partial x} =\
    \ \\lim_{h \\to 0} \\frac{f(x+h, y) - f(x, y)}{h}$$\n\n$$\\frac{\\partial f(x,\
    \ y)}{\\partial y} = \\lim_{h \\to 0} \\frac{f(x, y+h) - f(x, y)}{h}$$\n\n## Basic\
    \ Differentiation Filter\n\n- Simplify differentiation equation\n  - Not sequential\
    \ space\n  - Differentiate to calculate approximate\n  - Next pixel – current\
    \ pixel\n  - 2-way convolution kernel\n    - $Gx = [-1 \\quad 1]$\n    - $Gy =\
    \ \\begin{bmatrix} -1 \\\\ 1 \\end{bmatrix}$\n\n$$Gx = \\frac{\\partial f(x, y)}{\\\
    partial x} \\approx f_{x+1, y} - f_{x, y}$$\n\n$$Gy = \\frac{\\partial f(x, y)}{\\\
    partial y} \\approx f_{x, y+1} - f_{x, y}$$\n\n![](img/9de0cb7cd12c1232044968590f57e471_224_0.png)\n\
    \n| 픽셀 값 | 6 | 6 | 6 | 5 | 4 | 3 | 2 | 1 | 1 | 1 | 6 | 6 |\n|---|---|---|---|---|---|---|---|---|---|---|---|---|\n\
    | 1차 미분 | 0 | 0 | 0 | -1 | -1 | -1 | -1 | 0 | 0 | 5 | 0 | |\n| 2차 미분 | 0 | 0 |\
    \ 0 | -1 | 0 | 0 | 1 | 0 | 5 | -5 | 0 | |\n\n## Basic Differentiation Filter\n\
    \nkernel [-1, 1] Example\n\n```python\nimport cv2\nimport numpy as np\n\nimg =\
    \ cv2.imread(\"../img/sudoku.jpg\")\n\ngx_kernel = np.array([[ -1, 1]])\ngy_kernel\
    \ = np.array([[ -1],[ 1]])\n\nedge_gx = cv2.filter2D(img, -1, gx_kernel)\nedge_gy\
    \ = cv2.filter2D(img, -1, gy_kernel)\n\nmerged = np.hstack((img, edge_gx, edge_gy))\n\
    cv2.imshow('edge', merged)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\nkernel\
    \ [-1, 1] Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_225_0.png)"
  mdcn: "## 滤波器\n\n- 滤除不需要的值，仅获取所需的值。\n- LPF（低通滤波器）：模糊化，消除噪声\n- HPF（高通滤波器）：锐化，边缘检测\n\
    - 域\n  - 空间域滤波器\n    - 使用周围像素值进行计算，而非单个像素\n    - 卷积计算\n  - 频率域滤波器\n    - 通过将像素值差异转换为频率进行计算\n\
    \    - 傅里叶变换\n\n## 卷积\n\n- 空间域滤波器的核心计算\n- 将输入像素值与卷积核的每个因子相乘并求和\n- 卷积核：选择用于计算的周围像素\n\
    \  - 名称可能不同，如窗口、掩码、滤波器等\n  - 卷积核大小：n x n\n  - n：通常为奇数\n\n![](img/9de0cb7cd12c1232044968590f57e471_213_0.png)\n\
    \n## ❖ 用于计算的卷积函数\n\n- dst = cv2.filter2D(src, ddepth, kernel[, dst, anchor, delta,\
    \ borderType])\n  - src：输入图像，NumPy 数组\n  - ddepth：输出图像的数据类型，\n    - -1：与输入图像相同\n\
    \    - CV_8U, CV_16U/CV_16S, CV_32F, CV_64F\n  - kernel：卷积核，float32 类型\n  - dst：结果图像，NumPy\
    \ 数组\n  - anchor：卷积核的锚点，默认值：中心点(-1,-1)\n  - delta：在滤波器结果值上要添加的值\n  - borderType：指定边界像素校正方法\n\
    \n## 滤波器\n\n1. 卷积滤波器\n2. **模糊化**\n3. 边缘检测\n4. 形态学\n5. 图像金字塔\n6. 实践\n\n## ❖ 模糊化\n\
    \n- 使用滤波器模糊图像\n- 适用于噪声去除\n- 模糊类型\n  - 均值模糊\n    - cv2.blur, cv2.boxFilter\n  -\
    \ 高斯模糊\n    - cv2.GaussianBlur\n  - 中值模糊\n    - cv2.medianBlur\n  - 双边滤波器\n  \
    \  - cv2.bilateralFilter\n\n## ❖ 均值模糊\n\n- 将像素值更改为周围因子的平均值\n- 确定周围因子的域\n  - 生成卷积核矩阵\n\
    \  - 卷积核越大，图像越模糊\n- 方法\n  - cv2.filter2D()\n  - cv2.boxFilter()\n  - cv2.blur()\n\
    - 将周围像素应用于平均像素\n- 平均特征值以产生模糊效果\n- 5 X 5 均值滤波器\n\n![](img/9de0cb7cd12c1232044968590f57e471_216_0.png)\n\
    \n## ❖ 均值模糊\n\ncv2.filter2D 示例\n\n```python\nimport cv2, numpy as np\n\nimg =\
    \ cv2.imread('../img/girl.jpg')\n...\n# 5x5 평균 필터 커널 생성\nkernel = np.array([[0.04,\
    \ 0.04, 0.04, 0.04, 0.04],\n                   [0.04, 0.04, 0.04, 0.04, 0.04],\n\
    \                   [0.04, 0.04, 0.04, 0.04, 0.04],\n                   [0.04,\
    \ 0.04, 0.04, 0.04, 0.04],\n                   [0.04, 0.04, 0.04, 0.04, 0.04]])\n\
    ...\nkernel = np.ones((5,5))/5*5\nblured = cv2.filter2D(img, -1, kernel)\n\ncv2.imshow('origin',\
    \ img)\ncv2.imshow('avrg blur', blured)\ncv2.waitKey()\ncv2.destroyAllWindows()\n\
    ```\n\n示例 <结果>\n\n![](img/9de0cb7cd12c1232044968590f57e471_217_0.png)\n\n![](img/9de0cb7cd12c1232044968590f57e471_217_1.png)\n\
    \n## ❖ 均值模糊\n\n- 无需定义卷积核即可应用模糊\n- dst = cv2.blur(src, ksize[, dst, anchor, borderType])\n\
    \  - src：输入图像，NumPy 数组\n  - ksize：卷积核大小\n  - 其他参数与 cv2.filter2D() 相同\n- dst =\
    \ cv2.boxFilter(src, ddepth, ksize[, dst, anchor, normalize, borderType])\n  -\
    \ src：输入图像，NumPy 数组\n  - ddepth：输出图像的数据类型，-1：与输入图像相同\n  - normalize：是否根据卷积核大小进行归一化，布尔值\n\
    \  - 其他参数与 cv2.filter2D() 相同\n- 模糊特定函数示例\n\n```python\nimport cv2\nimport numpy\
    \ as np\n\nfile_name = '../img/taekwonv1.jpg'\nimg = cv2.imread(file_name)\n\n\
    # blur()\nblur1 = cv2.blur(img, (10,10))\n\n# boxFilter()\nblur2 = cv2.boxFilter(img,\
    \ -1, (10,10))\n\nmerged = np.hstack( (img, blur1, blur2))\ncv2.imshow('blur',\
    \ merged)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n## ❖ 均值模糊\n\n- 模糊特定函数结果\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_219_0.png)\n\n## ❖ 高斯模糊\n\n- 使用应用高斯函数的卷积核\n\
    - 对白噪声有效\n- cv2.GaussianBlur(src, ksize, sigmaX[, sigmaY, border])\n  - src：输入图像\n\
    \  - ksize：卷积核大小\n  - sigmaX：X 方向标准差，0 = 自动\n    - σ = 0.3 * ((ksize - 1) * 0.5\
    \ - 1) + 0.8\n  - sigmaY：Y 方向标准差，默认值 = sigmaX\n  - border：边界修正\n- kernel = cv2.getGaussianKernel(ksize,\
    \ sigma)\n  - ksize：卷积核大小\n  - sigma：标准差\n  - kernel * kernel.T\n\n![](img/9de0cb7cd12c1232044968590f57e471_219_1.png)\n\
    \n| 1 | 4 | 7 | 4 | 1 |\n|---|---|---|---|---|\n| 4 | 16 | 26 | 16 | 4 |\n| 7\
    \ | 26 | 41 | 26 | 7 |\n| 4 | 16 | 26 | 16 | 4 |\n| 1 | 4 | 7 | 4 | 1 |\n\n$$\\\
    frac{1}{273}$$\n\n## 高斯模糊\n\n- 示例\n\n```python\nimport cv2\nimport numpy as np\n\
    \nimg = cv2.imread('../img/gaussian_noise.jpg')\n\nk1 = np.array([[1, 2, 1],\n\
    \               [2, 4, 2],\n               [1, 2, 1]]) * (1/16)\nblur1 = cv2.filter2D(img,\
    \ -1, k1)\n\nk2 = cv2.getGaussianKernel(3, 0)\nblur2 = cv2.filter2D(img, -1, k2*k2.T)\n\
    \nblur3 = cv2.GaussianBlur(img, (3, 3), 0)\n\nprint('k1:', k1)\nprint('k2:', k2*k2.T)\n\
    merged = np.hstack((img,blur1,blur2,blur3))\ncv2.imshow('gaussian blur', merged)\n\
    cv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n- 示例 <执行结果>\n\n![](img/9de0cb7cd12c1232044968590f57e471_220_0.png)\n\
    \n## ❖ 中值模糊\n\n- 应用卷积核域内像素值的中值\n- 对椒盐噪声有效\n- 重用现有像素值，而非新值\n- dst = cv2.medianBlur(src,\
    \ ksize)\n  - src：输入图像，NumPy 数组\n  - ksize：卷积核大小\n\n```python\nimport cv2\nimport\
    \ numpy as np\n\nimg = cv2.imread(\"../img/salt_pepper_noise.jpg\")\n\nblur =\
    \ cv2.medianBlur(img, 5)\n\nmerged = np.hstack((img,blur))\ncv2.imshow('media',\
    \ merged)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_221_0.png)\n\
    \n## ❖ 双边滤波器模糊\n\n- 双向滤波器，使用两个滤波器\n  - 高斯滤波器 + 边界滤波器\n- 模糊结果会模糊边缘，此方法改善了这一问题\n\
    - 速度较慢，因为计算时间长\n- dst = cv2.bilateralFilter(src, d, sigmaColor, sigmaSpace[, dst,\
    \ borderType])\n  - src：输入图像，NumPy 数组\n  - d：滤波器直径，如果大于 5，速度会非常慢\n  - sigmaColor：颜色域滤波器的\
    \ Sigma 值\n  - sigmaSpace：坐标域的 Sigma 值\n    - 建议为 Sigma Color 和 Sigma Space 使用相同的值以简化使用\n\
    \    - 建议值在 10 ~ 150 之间\n- 示例\n\n```python\nimport cv2\nimport numpy as np\n\n\
    img = cv2.imread(\"../img/gaussian_noise.jpg\")\n\nblur1 = cv2.GaussianBlur(img,\
    \ (5,5), 0)\n\nblur2 = cv2.bilateralFilter(img, 5, 75, 75)\n\nmerged = np.hstack((img,\
    \ blur1, blur2))\ncv2.imshow('bilateral', merged)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n\
    ```\n\n![](img/9de0cb7cd12c1232044968590f57e471_222_0.png)\n\n## 滤波器\n\n1. 卷积滤波器\n\
    2. 模糊化\n3. **边缘检测**\n4. 形态学\n5. 图像金字塔\n6. 实践\n\n## 边缘检测\n\n- 区分前景图像和背景图像\n- 锐化：通过检测强调边缘\n\
    - 边缘：像素值变化大的点\n- 微分\n  - 分辨率变化的比率\n  - 图像的斜率\n\n连续函数：\n\n$$\\frac{\\partial f(x,\
    \ y)}{\\partial x} = \\lim_{h \\to 0} \\frac{f(x+h, y) - f(x, y)}{h}$$\n\n$$\\\
    frac{\\partial f(x, y)}{\\partial y} = \\lim_{h \\to 0} \\frac{f(x, y+h) - f(x,\
    \ y)}{h}$$\n\n## 基本微分滤波器\n\n- 简化微分方程\n  - 非连续空间\n  - 通过微分计算近似值\n  - 下一个像素 – 当前像素\n\
    \  - 双向卷积核\n    - $Gx = [-1 \\quad 1]$\n    - $Gy = \\begin{bmatrix} -1 \\\\ 1\
    \ \\end{bmatrix}$\n\n$$Gx = \\frac{\\partial f(x, y)}{\\partial x} \\approx f_{x+1,\
    \ y} - f_{x, y}$$\n\n$$Gy = \\frac{\\partial f(x, y)}{\\partial y} \\approx f_{x,\
    \ y+1} - f_{x, y}$$\n\n![](img/9de0cb7cd12c1232044968590f57e471_224_0.png)\n\n\
    | 像素值 | 6 | 6 | 6 | 5 | 4 | 3 | 2 | 1 | 1 | 1 | 6 | 6 |\n|---|---|---|---|---|---|---|---|---|---|---|---|---|\n\
    | 一阶微分 | 0 | 0 | 0 | -1 | -1 | -1 | -1 | 0 | 0 | 5 | 0 | |\n| 二阶微分 | 0 | 0 | 0\
    \ | -1 | 0 | 0 | 1 | 0 | 5 | -5 | 0 | |\n\n## 基本微分滤波器\n\n卷积核 [-1, 1] 示例\n\n```python\n\
    import cv2\nimport numpy as np\n\nimg = cv2.imread(\"../img/sudoku.jpg\")\n\n\
    gx_kernel = np.array([[ -1, 1]])\ngy_kernel = np.array([[ -1],[ 1]])\n\nedge_gx\
    \ = cv2.filter2D(img, -1, gx_kernel)\nedge_gy = cv2.filter2D(img, -1, gy_kernel)\n\
    \nmerged = np.hstack((img, edge_gx, edge_gy))\ncv2.imshow('edge', merged)\ncv2.waitKey(0)\n\
    cv2.destroyAllWindows()\n```\n\n卷积核 [-1, 1] 示例 <结果>\n\n![](img/9de0cb7cd12c1232044968590f57e471_225_0.png)"

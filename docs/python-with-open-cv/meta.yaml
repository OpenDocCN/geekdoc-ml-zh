    \n## 通过单应性匹配寻找物体\n\n- 计算具有良好匹配点的两张图像的距离变换矩阵\n- 寻找物体位置\n- 消除变换矩阵上方的不良匹配点\n- cv2.findHomography()\n\
    \    - 通过多对匹配点计算近似距离变换矩阵\n- cv2.perspectiveTransform()\n    - 将原始坐标距离变换以适应变换矩阵\n\
    - mtrx, mask = cv.findHomography( srcPoints, dstPoints[, method[, ransacReprojThreshold[,\
    \ mask[, maxIters[, confidence]]]] )\n    - srcPoints：原始坐标数组\n    - dstPoints：结果坐标数组\n\
    \    - method=0：选择近似计算算法\n        - 0：计算所有点的最小平方误差\n        - cv2.RANSAC\n   \
    \     - cv2.LMEDS\n        - cv2.RHO\n    - ransacReprojThreshold=3：正常距离阈值，用于\
    \ RANSAC、RHO\n    - maxIters=2000：近似计算重复次数\n    - confidence=0.995：可靠性，0 ~ 1\n\
    \    - mtrx：结果变换矩阵\n    - mask：正常水平判断结果，N x 1 数组（0：正常，1：异常）\n- dst = cv.perspectiveTransform(src,\
    \ m[, dst])\n    - src：输入坐标数组\n    - m：变换矩阵\n    - dst：输出坐标数组\n- 近似计算算法\n    -\
    \ RANSAC（随机采样一致性）\n        - 选择随机点，为最满意点计算近似点\n        - 正常值（内点），异常值（外点）\n   \
    \ - LMEDS（最小中值平方）\n        - 平方的最小中值\n        - 无需额外参数\n        - 仅在正常值超过 50%\
    \ 时运行\n    - RHO\n        - 使用 PROSAC（渐进简单一致性）；改进的 RANSAC\n        - 当外点较多时更快\n\
    \n## 通过单应性匹配寻找物体\n\n- 示例\n\n```python\nimport cv2, numpy as np\n\nimg1 = cv2.imread('../img/taekwonv1.jpg')\n\

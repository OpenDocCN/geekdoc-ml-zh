    \n## 图像分割\n\n1. 轮廓\n2. **霍夫变换**\n3. 连通组件\n4. 工作坊\n\n## 霍夫变换\n\n- 区分直线、圆形等简单形状\n\
    - 从寻找直线的方法扩展到各种图形\n- Paul Hough 首次发现（气泡室），1962年\n- Richard Duda 和 Peter Hart 推广，1972年\n\
    - 通过 Dana H. Ballard 的《计算机视觉》普及，1981年\n- 霍夫直线变换\n- 霍夫圆变换\n- 从图像中众多点中检测直线\n- r\
    \ = cos θx + sin θy\n- 对于一个点 (r, θ)\n- 连接所有具有相同 (r, θ) 的点的直线\n\n![](img/9de0cb7cd12c1232044968590f57e471_267_0.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_267_1.png)\n\n## ❖ 霍夫直线变换\n\n- `lines\
    \ = cv2.HoughLines(img, rho, theta, threshold[, lines, srn=0, stn=0, min_theta,\
    \ max_theta])`\n  - `img`：输入图像，1通道二值图像\n  - `rho`：距离分辨率，0~1\n  - `theta`：角度分辨率，弧度单位（np.pi/0~180）\n\
    \  - `threshold`：判断为直线的最小匹配数\n    - 小值：精度下降，但检测到的直线数量增加\n    - 大值：精度提高，但检测到的直线数量减少\n\
    \  - `lines`：检测结果，N x 1 x 2 数组 (r,θ)\n  - `srn, stn`：用于多尺度霍夫变换，检测中不使用\n  - `min_theta,\
    \ max_theta`：用于检测的最大和最小角度\n- 示例\n\n```python\nimport cv2\nimport numpy as np\n\
    \nimg = cv2.imread('../img/sudoku.jpg')\nimg2 = img.copy()\nh, w = img.shape[:2]\n\
    imggray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\nedges = cv2.Canny(imggray, 100,\
    \ 200 )\nlines = cv2.HoughLines(edges, 1, np.pi/180, 130)\nfor line in lines:\
    \ # Tour all detected lines\n    r,theta = line[0] # Distance and angle\n    tx,\
    \ ty = np.cos(theta), np.sin(theta) # Trigonometric ration to x, y\n    x0, y0\
    \ = gx*r, gy*r  #Coordination based on x, y\n    cv2.circle(img2, (abs(x0), abs(y0)),\
    \ 3, (0,0,255), -1)\n    x1, y1 = int(x0 + w*(-ty)), int(y0 + h * tx)\n    x2,\
    \ y2 = int(x0 - w*(-ty)), int(y0 - h * tx)\n    cv2.line(img2, (x1, y1), (x2,\
    \ y2), (0,255,0), 1)\nmerged = np.hstack((img, img2))\ncv2.imshow('hough line',\
    \ merged)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n## ❖ 霍夫直线变换\n\n- 示例\
    \ <结果>\n\n![](img/9de0cb7cd12c1232044968590f57e471_269_0.png)\n\n## ❖ 概率霍夫直线变换\n\
    \n- 避免计算所有像素的低效性\n- 随机选择像素\n- `lines = cv2.HoughLineP(src, rho, theta, threshold,\
    \ minLineLen, maxLineGap)`\n  - `src`：输入图像\n  - `rho`：距离精度（0~1）\n  - `theta`：角度精度，弧度（np.pi/0~180）\n\
    \  - `threshold`：找到直线的最小匹配值\n  - `minLineLen`：如果长度小于此值，则丢弃\n  - `maxLineGap`：如果距离大于此值，则视为不同的直线\n\
    \  - `lines`：检测到的直线坐标\n    - 用于直线中两条线的 nx1x4 数组 (x1, y1, x2, y2)"

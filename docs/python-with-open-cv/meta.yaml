  md: "# ❖ Flood Fill\n\n+   - Filling same color to consecutive area\n- retval, img,\
    \ mask, rect = cv2.floodFill(img, mask, seed, newVal[, loDiff, upDiff, flags])\n\
    \  - img : input image, 1 or 3 channels\n  - mask : Larger by 2x2 pixel than input\
    \ image, If it meets area that is not 0, stop filling\n  - seed : Coordination\
    \ to start filling\n  - newVal : Color value used to fill\n  - loDiff, upDiff\
    \ : Min and max value used to decide to fill\n  - flags : Flag for filling type,\n\
    \    - 4 or 8 distance filling\n    - cv2.FLODDFILL_MASK_ONLY : Fill only mask\
    \ not img\n      - Need to include 8-16 bits for the value to be used in fillings\n\
    \      - cv2.FLOODFILL_FIXED_RANGE: Compare it with seed pixel not neighboring\
    \ pixel\n- retval: # of pixels filled\n- rect : Rectangle surrounding areas done\
    \ filling\n\n+   - Example\n\n```\nimport cv2\nimport numpy as np\nimg = cv2.imread('../img/taekwonv1.jpg')\n\
    rows, cols = img.shape[:2]\nmask = np.zeros((rows+2, cols+2), np.uint8)\nnewVal\
    \ = (255,255,255)\nloDiff, upDiff = (10,10,10), (10,10,10)\ndef onMouse(event,\
    \ x, y, flags, param):\n    global mask, img\n    if event == cv2.EVENT_LBUTTONDOWN:\n\
    \        seed = (x,y)\n        retval = cv2.floodFill(img,mask,seed,newVal,loDiff,\
    \ upDiff)\n        cv2.imshow('img', img)\ncv2.imshow('img', img)\ncv2.setMouseCallback('img',\
    \ onMouse)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n> - $src(x', y') -\
    \ loDiff \\leq src(x, y) \\leq src(x', y') + upDiff$\n  - $src(x, y)$ : 현재 픽셀\n\
    \  - $src(x', y')$ : 이웃 픽셀"
  merge: -1

  md: "# Template Matching\n\n+   - The most basic methods of Object Detecting\n-\
    \ Search image to find from all images\n- cv2. matchTemplate(image, templ, method)\
    \ : result\n  - image : Input Image\n  - templ : Object of Detection\n  - method\
    \ : Matching Algorithm\n    - cv2.TM_CCOEFF, cv2.TM_CCOEFF_NORMED\n    - cv2.TM_CCORR,\
    \ cv2.TM_CCORR_NORMED\n    - cv2.TM_SQDIFF, cv2.TM_SQDIFF_NORMED\n  - Turnaround\
    \ : Array result value of matching ,\n    - TM_SQDIFF, For TM_SQDIFF_NORMED, min_loc\n\
    \    - 니머지는 max_loc\n- cv2.minMaxLoc(matched)\n  - Turnaround : min_val, max_val,\
    \ min_loc, max_loc\n\n![](img/9de0cb7cd12c1232044968590f57e471_293_0.png)\n\n\
    # Matching Method ( I : Image, T : Template, R : Result )\n\n+   - method=CV_TM_SQDIFF\n\
    \  - $R(x, y) = \\sum_{x', y'} (T(x', y') - I(x + x', y + y'))^2$\n- method=CV_TM_SQDIFF_NORMED\n\
    \  - $R(x, y) = \\frac{\\sum_{x', y'} (T(x', y') - I(x + x', y + y'))^2}{\\sqrt{\\\
    sum_{x', y'} T(x', y')^2 \\cdot \\sum_{x', y'} I(x + x', y + y')^2}}$\n- method=CV_TM_CCORR\n\
    \  - $R(x, y) = \\sum_{x', y'} (T(x', y') \\cdot I(x + x', y + y'))$\n- method=CV_TM_CCORR_NORMED\n\
    \  - $R(x, y) = \\frac{\\sum_{x', y'} (T(x', y') \\cdot I(x + x', y + y'))}{\\\
    sqrt{\\sum_{x', y'} T(x', y')^2 \\cdot \\sum_{x', y'} I(x + x', y + y')^2}}$\n\
    - method=CV_TM_CCOEFF\n  - $R(x, y) = \\sum_{x', y'} (T'(x', y') \\cdot I'(x +\
    \ x', y + y'))$\n  - where\n    - $T'(x', y') = T(x', y') - 1/(w \\cdot h) \\\
    cdot \\sum_{x'', y''} T(x'', y'')$\n    - $I'(x + x', y + y') = I(x + x', y +\
    \ y') - 1/(w \\cdot h) \\cdot \\sum_{x'', y''} I(x + x'', y + y'')$\n- method=CV_TM_CCOEFF_NORMED\n\
    \  - $R(x, y) = \\frac{\\sum_{x', y'} (T'(x', y') \\cdot I'(x + x', y + y'))}{\\\
    sqrt{\\sum_{x', y'} T'(x', y')^2 \\cdot \\sum_{x', y'} I'(x + x', y + y')^2}}$"
  merge: -1
  pgno: 293

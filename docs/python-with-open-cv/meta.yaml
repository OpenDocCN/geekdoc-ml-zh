    \ min~max area\n    - filterByInertia : Consistency ration filter option\n   \
    \ - minInertiaRatio, maxInertiaRatio: Detect it as blob for min~max area consistency\
    \ ration\n\n+   - Example <1/2>\n\n```\nimport cv2\nimport numpy as np\n\nimg\
    \ = cv2.imread(\"../img/house.jpg\")\ngray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\
    \nparams = cv2.SimpleBlobDetector_Params()\n\nparams.minThreshold = 10\nparams.maxThreshold\

  md: "# K-Means Clustering\n\n+   - Clustered algorithm, non-guide learning\n- Cluster\
    \ mixed data as wanted\n- Algorithm\n    - Step1.\n        - Set two center points(C1,\
    \ C2) randomly.\n    - Step2.\n        - Calculate distance at the two center\
    \ points.\n        - If test data is close to C1, 0, close to C2, 1.\n       \
    \ - If center point is C3, C4, mark as 2,3.\n    - Step3\n        - Picture mark\
    \ 0 data close to C1 as red, and 1 data as blue.\n\n![](img/9de0cb7cd12c1232044968590f57e471_366_0.png)"
  merge: -1
  pgno: 366
- img_proc: true
  md: "# K-Means Clustering\n\n+   - Algorithm\n  - Step4.\n    - Average red and\
    \ blue, set is as new center point and as in step 2, calculate distance and mark\
    \ as 0, 1\n    - Repeat step 2 to 4, until each center point is fixed in as center\
    \ point.\n    - Or, repeat it until it satisfies certain criteria; set given #\
    \ of repetition or accuracy.\n    - Center point is dots with smallest value of\
    \ distance of data added.\n\nThere are various algorithm of getting first center\
    \ points, repeating the calculation and etc.\n\n![](img/9de0cb7cd12c1232044968590f57e471_367_0.png)\n\
    \n```\nminimize [ J = \\sum_{All Red\\_Points} distance(C1, Red\\_Point) + \\\
    sum_{All Blue\\_Points} distance(C2, Blue\\_Point) ]\n```"

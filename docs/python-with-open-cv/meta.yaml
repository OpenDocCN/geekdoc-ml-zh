    \n## Opening & Closing\n\n- Combination of Erosion & Dilation\n- Opening : Erosion\
    \ + Dilation\n    - Effective for eliminating lighter noise\n    - Divide adjacent\
    \ independent objects\n- Closing : Dilation + Erosion\n    - Effective for eliminating\
    \ darker noise\n    - Link disconnection\n- cv2.morphologyEx(src, op, kernel)\n\
    \    - src : Input image\n    - op : Operation type\n        - cv2.MORPH_OPEN\n\
    \        - cv2.MORPH_CLOSE\n        - cv2.MORPH_GRADIENT : Difference between\

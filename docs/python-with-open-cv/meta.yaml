    3. k-近邻\n4. SVM 与 HOG\n5. 级联分类器\n6. 实践环节\n\n## 人工智能\n\n- 1956年，美国达特茅斯大学的约翰·麦卡锡教授在一次会议上首次使用了“人工智能”一词\n\
    - 通用人工智能：像人类一样思考的 AI\n- 专用人工智能：仅执行特定功能的 AI，例如图像分类、人脸识别等\n\n## 机器学习\n\n- 使用算法分析数据，学习分析后的数据，并根据学习到的细节进行判断或预测\n\
    - 多种算法\n\n## 深度学习\n\n- 机器学习的一种算法\n- 人工神经网络：受人脑运作方式启发的网络；它需要大量的计算，因此需要大量时间和高性能设备。\n\
    - 2012年，谷歌和斯坦福大学的吴恩达教授实现了深度神经网络。\n\n## 机器学习\n\n- 通过数据的预处理过程，将数据转换为特征，并通过生成的特征向量构建模型。\n\
    - 通过模型分析各种算法、权重、阈值和其他参数的特性，以实现目标。\n- 在数据集中，90% 用于训练集，10% 用于测试集\n\n## 监督学习\n\n\
    - 使用带有标签（答案）的数据进行学习\n- 分类：名称到标签\n- 回归：数值标签\n- 线性回归：学习时间到分数（0~100）\n  - `H(x) =\
    \ Wx + b`，H：假设，W：权重，b：偏置\n- 二元分类：学习时间到通过/不通过\n- 多标签分类：学习时间到 GPA（A, B, C, D, F）\n\
    \n## 无监督学习\n\n- 无标签学习\n- 聚类：只关心数据被分到哪个组\n\n## OpenCV 的实现\n\n- 旧版接口：在标准化接口设计之前就已实现\n\
    \  - 核心模块\n    - k-均值，马氏距离\n- 标准化接口\n  - `ml` 模块，运行 `StatModel` 抽象类继承\n    - 正态贝叶斯（正态/纯贝叶斯分类器）\n\
    \    - 决策树\n    - 提升方法\n    - 随机树\n    - 期望值最大化\n    - k-近邻\n    - 多层感知机（MLP，多层感知器）\n\
    \    - 支持向量机（SVM）\n- 目标检测器\n  - 使用学习方法的高级类\n    - `CascadeClassifier`，潜在 SVM（`DPMDetector`），词袋模型\n\
    \n## 机器学习\n\n1. 机器学习\n2. **K-均值聚类**\n3. k-近邻\n4. SVM 与 HOG\n5. 级联分类器\n6. 实践环节\n\
    \n## K-均值聚类\n\n- 聚类算法，无监督学习\n- 按需聚类混合数据\n- 算法\n  - 步骤 1.\n    - 随机设置两个中心点（C1,\
    \ C2）。\n  - 步骤 2.\n    - 计算到两个中心点的距离。\n    - 如果测试数据靠近 C1，则标记为 0；靠近 C2，则标记为 1。\n\
    \    - 如果中心点是 C3, C4，则标记为 2, 3。\n  - 步骤 3\n    - 将靠近 C1 的标记为 0 的数据点画成红色，标记为 1\
    \ 的数据点画成蓝色。\n\n![](img/9de0cb7cd12c1232044968590f57e471_366_0.png)\n\n## K-均值聚类\n\
    \n- 算法\n  - 步骤 4.\n    - 计算红色和蓝色数据点的平均值，将其设置为新的中心点，并像步骤 2 一样计算距离并标记为 0, 1。\n \
    \   - 重复步骤 2 到 4，直到每个中心点固定为中心点。\n    - 或者，重复直到满足特定条件；设定给定的重复次数或精度。\n    - 中心点是数据点距离之和最小的点。\n\
    \n有各种获取初始中心点、重复计算等的算法。\n\n![](img/9de0cb7cd12c1232044968590f57e471_367_0.png)\n\
    \n```\nminimize [ J = \\sum_{All Red\\_Points} distance(C1, Red\\_Point) + \\\
    sum_{All Blue\\_Points} distance(C2, Blue\\_Point) ]\n```\n\n## K-均值聚类\n\n- `cv2.kmeans(data,\
    \ K, bestLabels, criteria, attempts, flags)` : retval, bestLabels, centers\n \
    \ - data : `np.float32`，应保存为单列\n  - k : 期望的聚类数量\n  - bestLabels : 结果数据，None\n\
    \  - criteria : 终止条件，元组 (type, max_iter, epsilon)\n  - attempts : 通过不同初始标签运行的次数\n\
    \  - flags : 选择初始中心点，\n    - `cv2.KMEANS_PP_CENTERS`\n    - `cv2.KMEANS_RANDOM_CENTERS`\n\
    \    - `cv2.KMEANS_USE_INITIAL_LABELS`\n- 返回值：\n  - retval : 中心点与每个数据点距离之和的平方，\n\
    \  - bestLabels : 标签，0, 1, ...\n  - centers : 聚类中心点数组\n- 随机数聚类示例\n\n```python\n\
    import numpy as np, cv2\nimport matplotlib.pyplot as plt\n\nx = np.random.randint(0,150,(25,2))\n\
    y = np.random.randint(128, 255,(25,2))\nz = np.vstack((x,y)).astype(np.float32)\n\
    \ncriteria = (cv2.TERM_CRITERIA_EPS + cv2.TERM_CRITERIA_MAX_ITER, 10, 1.0)\nret,label,center=cv2.kmeans(z,2,None,criteria,10,cv2.KMEANS_RANDOM_CENTERS)\n\
    \na = z[label.ravel()==0]\nb = z[label.ravel()==1]\nplt.scatter(a[:,0],a[:,1],\
    \ c='b')\nplt.scatter(b[:,0],b[:,1], c='r')\nplt.scatter(center[:,0],center[:,1],s\
    \ = 80,c = 'y', marker = 's')\nplt.show()\n```"

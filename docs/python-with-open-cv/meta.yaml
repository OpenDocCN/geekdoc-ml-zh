    - Clustered algorithm, non-guide learning\n- Cluster mixed data as wanted\n- Algorithm\n\
    \  - Step1.\n    - Set two center points (C1, C2) randomly.\n  - Step2.\n    -\
    \ Calculate distance at the two center points.\n    - If test data is close to\

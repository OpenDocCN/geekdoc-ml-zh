- md: "## Geometric Transform\n\n1. Translate, Scaling, Rotate\n2. Warping\n3. **Lens\
    \ Distortion**\n4. Workshop\n\n## Remapping\n\n- Non-linear turnaround that cannot\
    \ be expressed in determinant\n- dst = cv2.remap(src, mapx, mapy, interpolation\
    \ [, dst, borderMode, borderValue])\n  - src : input image\n  - mapx, mapy : Coordination\
    \ that will move to x and y axis (Index)\n    - Same size as src, dtype=float32\n\
    \  - Other factors are the same as cv2.warpAffine()\n  - dst : Result image\n\
    - mapy, mapx = np.indices( (rows, cols), dtype=np.float32)\n  - Generate array\
    \ with the index value\n  - Use cv2.remap() function initial array\n\n## Flip\
    \ as Remapping\n\n- Equation\n  - $x' = cols - x - 1$\n  - $y' = rows - y - 1$\n\
    - Determinant\n  - $\\begin{bmatrix} x' \\\\ y' \\end{bmatrix} = \\begin{bmatrix}\
    \ -1 & 0 & cols - 1 \\\\ 0 & -1 & rows - 1 \\end{bmatrix} \\begin{bmatrix} x \\\
    \\ y \\\\ 1 \\end{bmatrix}$\n- Linear change that can be shown in determinant\
    \ is inefficient\n\n```python\nimport cv2\nimport numpy as np\nimport time\n\n\
    img = cv2.imread('../img/girl.jpg')\nrows, cols = img.shape[:2]\nst = time.time()\n\
    mflip = np.float32([ [-1, 0, cols-1],[0, -1, rows-1]])\nfliped1 = cv2.warpAffine(img,\
    \ mflip, (cols, rows))\nprint('matrix:', time.time()-st)\n\nst2 = time.time()\n\
    mapy, mapx = np.indices((rows, cols),dtype=np.float32)\nmapx = cols - mapx -1\n\
    mapy = rows - mapy -1\nfliped2 = cv2.remap(img,mapx,mapy,cv2.INTER_LINEAR)\nprint('remap:',\
    \ time.time()-st2)\n\ncv2.imshow('origin', img)\ncv2.imshow('fliped1',fliped1)\n\
    cv2.imshow('fliped2',fliped2)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n\
    matrix: 0.0009329319000244141\nremap: 0.00399327278137207\n\n![](img/9de0cb7cd12c1232044968590f57e471_201_0.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_201_1.png)\n\n![](img/9de0cb7cd12c1232044968590f57e471_201_2.png)\n\
    \n## ❖ Trigonometric function non-linear Remap\n\n```python\nimport cv2\nimport\
    \ numpy as np\n\nl = 20       # wave length\namp = 15     # amplitude\nimg = cv2.imread('../img/taekwonv1.jpg')\n\
    rows, cols = img.shape[:2]\n\nmapy, mapx = np.indices((rows, cols),dtype=np.float32)\n\
    sinx = mapx + amp * np.sin(mapy/l)\ncosy = mapy + amp * np.cos(mapx/l)\n\nimg_sinx=cv2.remap(img,\
    \ sinx, mapy, cv2.INTER_LINEAR) # Apply sin curve for only x\nimg_cosy=cv2.remap(img,\
    \ mapx, cosy, cv2.INTER_LINEAR) # Apply cos curve for only y\nimg_both=cv2.remap(img,\
    \ sinx, cosy, cv2.INTER_LINEAR, None, cv2.BORDER_REPLICATE)\n\ncv2.imshow('origin',\
    \ img)\ncv2.imshow('sin x', img_sinx)\ncv2.imshow('cos y', img_cosy)\ncv2.imshow('sin\
    \ cos', img_both)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_202_0.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_202_1.png)\n\n![](img/9de0cb7cd12c1232044968590f57e471_202_2.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_202_3.png)\n\n## ❖ Convex Concave Lens\
    \ Distortion\n\n- Coordinate System\n  - 직교좌표 → 극좌표 : $\\theta = \\arctan(x, y)$,\
    \ $r = \\sqrt{x^2 + y^2}$\n  - 극좌표 → 직교좌표 : $x = r \\cos(\\theta)$, $y = r \\\
    sin(\\theta)$\n\n- r, theta = cv.cartToPolar( x, y ) : Rectangular Coordination\
    \ → Polar Coordination\n- x, y = cv.polarToCart(r, theta): Polar Coordination\
    \ → Rectangular Coordination\n  - x, y : x, y array\n  - r : Distance from zero\n\
    \  - theta : Angle value\n\n![](img/9de0cb7cd12c1232044968590f57e471_203_0.png)\n\
    \n```python\nimport cv2, numpy as np\n\nimg = cv2.imread('../img/taekwonv1.jpg')\n\
    rows, cols = img.shape[:2]\nexp = 0.5        # Convex, Concave (concave : 0.1\
    \ ~ 1, Convex: 1.1~)\nscale = 1        # Size of turnaround (0 ~ 1)\n\nmapy, mapx\
    \ = np.indices((rows, cols),dtype=np.float32)\nmapx = (2*mapx - cols)/cols\nmapy\
    \ = (2*mapy - rows)/rows\n\nr, theta = cv2.cartToPolar(mapx, mapy)\nr[r< scale]\
    \ = r[r<scale] **exp\nmapx, mapy = cv2.polarToCart(r, theta)\n\nmapx = ((mapx\
    \ + 1)*cols)/2\nmapy = ((mapy + 1)*rows)/2\ndistorted = cv2.remap(img,mapx,mapy,cv2.INTER_LINEAR)\n\
    \ncv2.imshow('origin', img)\ncv2.imshow('distorted', distorted)\ncv2.waitKey()\n\
    cv2.destroyAllWindows()\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_204_0.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_204_1.png)\n\n![](img/9de0cb7cd12c1232044968590f57e471_204_2.png)\n\
    \n## ❖ Radial Distortion\n\n- Quadrangle image from circular camera lenses\n-\
    \ Barrel Distortion: Image distortion with convex edge\n- Barrel distortion equation\
    \ :\n    - Depends on coefficient, pin cushion distortion, barrel distortion\n\
    \n$r_d = r_u(1 + k_1r_u^2 + k_2r_u^4 + k_3r_u^6)$\n- $r_d$ : 왜곡 변형 후\n- $r_u$\
    \ : 왜곡 변형 전\n- $k_1, k_2, k_3$ : 왜곡 계수\n\n![](img/9de0cb7cd12c1232044968590f57e471_205_0.png)\n\
    \n```python\nimport cv2\nimport numpy as np\nk1, k2, k3 = 0.5, 0.2, 0.0 # Barrel\
    \ distortion\n#k1, k2, k3 = -0.3, 0, 0    # Pin cushion distortion\nimg = cv2.imread('../img/girl.jpg')\n\
    rows, cols = img.shape[:2]\nmapy, mapx = np.indices((rows, cols),dtype=np.float32)\n\
    mapx = (2*mapx - cols)/cols\nmapy = (2*mapy - rows)/rows\nr, theta = cv2.cartToPolar(mapx,\
    \ mapy)\nru = r*(1+k1*(r**2) + k2*(r**4) + k3*(r**6))\nmapx, mapy = cv2.polarToCart(ru,\
    \ theta)\nmapx = ((mapx + 1)*cols)/2\nmapy = ((mapy + 1)*rows)/2\ndistored = cv2.remap(img,mapx,mapy,cv2.INTER_LINEAR)\n\
    \ncv2.imshow('original', img)\ncv2.imshow('distored', distored)\ncv2.waitKey()\n\
    cv2.destroyAllWindows()\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_206_0.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_206_1.png)\n\n![](img/9de0cb7cd12c1232044968590f57e471_206_2.png)\n\
    \n- Function eliminating barrel distortion OpenCV\n- dst = cv2.undistort(src,\
    \ cameraMtrix, distCoeffs)\n    - src : Original input image\n    - cameraMatrix\
    \ : Camera matrix\n    - distCoeffs : Distortion coefficient. Min 4, or 5, 8,\
    \ 12, 14\n        - (k1, k2, p1, p2[,k3])\n\n$$\\begin{bmatrix} f_x & 0 & c_x\
    \ \\\\ 0 & f_y & c_y \\\\ 0 & 0 & 1 \\end{bmatrix}$$\n\n- cv2.undistort()\n\n\
    ```python\nimport numpy as np\nimport cv2\n\nimg = np.full((300,400,3), 255, np.uint8)\n\
    img[::10, :, :] = 0\nimg[:, ::10, :] = 0\nwidth  = img.shape[1]\nheight = img.shape[0]\n\
    \nk1, k2, p1, p2 = 0.001, 0, 0, 0     # Barrel distortion\n#k1, k2, p1, p2 = -0.0005,\
    \ 0, 0, 0  # Pin cushion distortion\ndistCoeff = np.float64([k1, k2, p1, p2])\n\
    \nfx, fy = 10, 10\ncx, cy = width/2, height/2\ncamMtx = np.float32([[fx,0, cx],\n\
    \                      [0, fy, cy],\n                      [0 ,0 ,1]])\n\ndst\
    \ = cv2.undistort(img,camMtx,distCoeff)\ncv2.imshow('original', img)\ncv2.imshow('dst',dst)\n\
    cv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_207_0.png)\n\

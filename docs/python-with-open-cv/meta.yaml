    \ image step-by-step\n- Speed and accuracy\n    - Analyze fast with small image,\
    \ and have detail analysis for next level image\n- Compensate result differences\
    \ by size\n- Gaussian Pyramids\n    - Down Sampling/Scaling\n    - Shrinking Images\n\
    - Laplacian Pyramids\n    - Up Sampling/Scaling\n    - Enlarging Images\n\n![](img/9de0cb7cd12c1232044968590f57e471_243_0.png)\n\
    \n# Gaussian Pyramids\n\n+   - cv2.pyrDown(src [, dstsize, borderType] )\n   \
    \ - src : Original Image\n    - dstsize : Size of output image\n    - Generate\
    \ upper level image of pyramid\n    - After applying Gaussian kernel, delete odd\
    \ number column and row\n    - Reduced to ¼ size\n- cv2.pyrUp()\n    - Generate\
    \ lower level image of pyramid\n    - Fill column and row with 0, convolution\
    \ with designated filter and set\n    - Enlarged to 4 times.\n    - Blurred"

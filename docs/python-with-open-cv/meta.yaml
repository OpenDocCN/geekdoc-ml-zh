    \ + Distance to move\n- Equation\n  - $x' = x + d_x$\n  - $y' = y + d_y$\n- Determinant\n\
    \  - $\\begin{bmatrix} x' \\ y' \\end{bmatrix} = \\begin{bmatrix} 1 & 0 & d_x\
    \ \\ 0 & 1 & d_y \\end{bmatrix} \\begin{bmatrix} x \\ y \\ 1 \\end{bmatrix} \\\
    quad \\begin{bmatrix} x' \\ y' \\end{bmatrix} = \\begin{bmatrix} x + d_x \\ y\
    \ + d_y \\end{bmatrix} = \\begin{bmatrix} 1x + 0y + 1d_x \\ 0x + 1y + 1d_y \\\
    end{bmatrix}$\n\n![](img/9de0cb7cd12c1232044968590f57e471_183_0.png)\n\n# ❖ Translate\n\
    \n+   - dst = cv2.warpAffine(src, mtrx, dsize [, dst, flags, borderMode, borderValue])\n\
    \  - src: Original image, NumPy array\n  - mtrx: 2 x 3 matrix of change, NumPy\
    \ array, dtype=float32\n  - dsize: Result image size, tuple(width, height)\n \
    \ - flags: Interpolation algorithm selection flag\n    - cv2.INTER_LINEAR: base\
    \ value, use distance weight for near 4 pixels\n    - cv2.INTER_NEAREST: Use closest\
    \ pixel value\n    - cv2.INTER_AREA: Re-sampling using pixel area relationship\n\
    \    - cv2.INTER_CUBIC: use distance weight for near 16 pixels\n    - cv2.INTER_LANCZOS4:\
    \ Lanco ‘s algorithm using near 8 pixels"

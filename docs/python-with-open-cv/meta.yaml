    \ [294,216]])\npts2 = np.float32([[128,40], [85,307], [306,167]])\n\nx1,y1,w1,h1\
    \ = cv2.boundingRect(pts1)\nx2,y2,w2,h2 = cv2.boundingRect(pts2)\n\nroi1 = img[y1:y1+h1,\
    \ x1:x1+w1]\nroi2 = img2[y2:y2+h2, x2:x2+w2]\n\noffset1 = np.zeros((3,2), dtype=np.float32)\n\
    offset2 = np.zeros((3,2), dtype=np.float32)\nfor i in range(3):\n    offset1[i][0],\
    \ offset1[i][1] = pts1[i][0]-x1, pts1[i][1]-y1\n    offset2[i][0], offset2[i][1]\
    \ = pts2[i][0]-x2, pts2[i][1]-y2\n```\n\n## Triangular Affine Transform <2/2>\n\
    \n```python\nmtrx = cv2.getAffineTransform(offset1, offset2)\nwarped = cv2.warpAffine(\
    \ roi1, mtrx, (w2, h2), None,\n    cv2.INTER_LINEAR, cv2.BORDER_REFLECT_101 )\n\
    \nmask = np.zeros((h2, w2), dtype = np.uint8)\ncv2.fillConvexPoly(mask, np.int32(offset2),\
    \ (255))\n\nwarped_masked = cv2.bitwise_and(warped, warped, mask=mask)\nroi2_masked\
    \ = cv2.bitwise_and(roi2, roi2,\n    mask=cv2.bitwise_not(mask))\nroi2_masked\
    \ = roi2_masked + warped_masked\nimg2[y2:y2+h2, x2:x2+w2] = roi2_masked\n\ncv2.rectangle(draw,\
    \ (x1, y1), (x1+w1, y1+h1), (0,255,0), 1)\ncv2.polylines(draw, [pts1.astype(np.int32)],\
    \ True, (255,0,0), 1)\ncv2.rectangle(img2, (x2, y2), (x2+w2, y2+h2), (0,255,0),\
    \ 1)\n\ncv2.imshow('origin', draw)\ncv2.imshow('warped triangle', img2)\ncv2.waitKey(0)\n\
    cv2.destroyAllWindows()\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_198_0.png)\n\

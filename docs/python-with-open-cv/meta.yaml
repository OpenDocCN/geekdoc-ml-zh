    \n![](img/9de0cb7cd12c1232044968590f57e471_166_1.png)\n\n## ❖ Normalize\n\n- Evenly\
    \ distribute pixel\n- If distribution of pixel is centered on certain area, quality\
    \ bad.\n    - Improve image quality\n\n- $I_N = (I - Min)\\frac{newMax - newMin}{Max\
    \ - Min} + newMin$\n    - $I$ : 정규화 이전 값\n    - $Min, Max$ : 정규화 전 범위 최소 값, 최대\
    \ 값\n    - $newMin, newMax$ : 정규화 후 최소 값, 최대 값\n    - $I_N$: 정규화 이후 값\n\n![](img/9de0cb7cd12c1232044968590f57e471_167_0.png)\n\
    \n- dst = cv2.normalize(src, dst, alpha, beta, type_flag)\n    - src : Previous\
    \ data before normalize\n    - dst : Data after normalize\n    - alpha : Normalizing\
    \ area 1\n    - beta : Normalizing area 2, Not in use when it is not sectional\
    \ normalization\n    - type_flag : Flag integer selected for normalization algorithm\n\
    \        - cv2.NORM_MINMAX : Normalize by alpha & beta area\n        - cv2.NORM_L1\
    \ : Divide by total addition, alpha = Addition of all normalization\n        -\
    \ cv2.NORM_L2 : Normalize unit vector\n        - cv2.NORM_INF : Divide by maximum\
    \ number\n\n## Histogram Normalize\n\n```python\nimport cv2\nimport numpy as np\n\
    import matplotlib.pylab as plt\n\nimg = cv2.imread('../img/abnormal.jpg', cv2.IMREAD_GRAYSCALE)\n\
    \nimg_f = img.astype(np.float32)\nimg_norm = ((img_f - img_f.min()) * (255) /\
    \ (img_f.max() - img_f.min())).astype(np.uint8)\n\nimg_norm2 = cv2.normalize(img,\
    \ None, 0, 255, cv2.NORM_MINMAX)\n\nhist = cv2.calcHist([img], [0], None, [256],\
    \ [0, 256])\nhist_norm = cv2.calcHist([img_norm], [0], None, [256], [0, 256])\n\
    hist_norm2 = cv2.calcHist([img_norm2], [0], None, [256], [0, 256])\n\ncv2.imshow('Before',\
    \ img)\ncv2.imshow('Manual', img_norm)\ncv2.imshow('cv2.normalize()', img_norm2)\n\
    \nhists = {'Before': hist, 'Manual': hist_norm,\n         'cv2.normalize()': hist_norm2}\n\
    for i, (k, v) in enumerate(hists.items()):\n    plt.subplot(1,3,i+1)\n    plt.title(k)\n\
    \    plt.plot(v)\nplt.show()\n```\n\n## Histogram Normalize\n\n![](img/9de0cb7cd12c1232044968590f57e471_169_0.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_169_1.png)\n\n![](img/9de0cb7cd12c1232044968590f57e471_169_2.png)\n\

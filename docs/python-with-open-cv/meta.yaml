    \ merged3)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n- Example <Result>\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_239_0.png)\n\n## Gradient, Top-Hat,\

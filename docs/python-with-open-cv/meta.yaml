  - "[PAGE 289]\n\n# Average Hash Matching\n\n+   - Fit for understanding similar\
    \ pictures\n- Average Hash\n    - Transform image into one number by calculating\
    \ average value\n        - Reduce image into a certain size regardless of the\
    \ ration of width and height\n        - Calculate all pixel average and compare\n\
    \        - px > Average? 1 : 0\n        - Change it to 1 line, and transform that\
    \ into one binary number\n        - Able to transform into hexadecimal\n- Analogous\
    \ Distance\n    - Measure distance between the two value, if the number is small,\
    \ similarity is high\n    - Euclidian distance\n        - Find the differences\
    \ between the number as distance\n        - 예) 5:3 = 2, 5:8=3\n    - Hamming distance\n\
    \        - Showing the number of differences in digits in between two numbers\n\
    \            - 12345:12354=2, 12345:92345=1\n- Example\n\n```\nimport cv2\n\n\
    img = cv2.imread('../img/pistol.jpg')\ngray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\
    gray = cv2.resize(gray, (8,8))\navg = gray.mean()\nbin = 1 * (gray > avg)\nprint(bin)\n\
    dhash = []\nfor row in bin.tolist():\n    s = ''.join([str(i) for i in row])\n\
    \    dhash.append('%02x'%(int(s,2)))\ndhash = ''.join(dhash)\nprint(dhash)\ncv2.imshow('pistol',\
    \ img)\ncv2.waitKey(0)\n```"

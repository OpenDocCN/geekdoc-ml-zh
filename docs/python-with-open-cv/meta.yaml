  md: "# ❖ MeanShift Filter\n\n+   - It is kernel window with certain boarder size\
    \ kernel, move center to average pixel value\n- Find connecting area by binding\
    \ starting point and stop point as one\n- Change connecting area color value as\
    \ most frequent color value\n- dst = cv.pyrMeanShiftFiltering(src, sp, sr[, dst,\
    \ maxLevel, termcrit])\n  - src : input image\n  - sp : Space window radius\n\
    \  - sr : Color window radius\n  - maxLevel : Max level of image pyramid\n  -\
    \ termcrit : Standard for mean move cut\n- Example\n\n```\nimport cv2\nimport\
    \ numpy as np\n\nimg = cv2.imread('../img/taekwonv1.jpg')\ndef onChange(x):\n\
    \    sp = cv2.getTrackbarPos('sp', 'img')\n    sr = cv2.getTrackbarPos('sr', 'img')\n\
    \    lv = cv2.getTrackbarPos('lv', 'img')\n    mean = cv2.pyrMeanShiftFiltering(img,\
    \ sp, sr, None, lv)\n    cv2.imshow('img', np.hstack((img, mean)))\n\ncv2.imshow('img',\
    \ np.hstack((img, img)))\ncv2.createTrackbar('sp', 'img', 0,100, onChange)\ncv2.createTrackbar('sr',\
    \ 'img', 0,100, onChange)\ncv2.createTrackbar('lv', 'img', 0,5, onChange)\ncv2.waitKey(0)\n\
    cv2.destroyAllWindows()\n```"

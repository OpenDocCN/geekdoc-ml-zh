    \n## Template Matching\n\n- The most basic methods of Object Detecting\n- Search\
    \ image to find from all images\n- cv2.matchTemplate(image, templ, method) : result\n\
    \  - image : Input Image\n  - templ : Object of Detection\n  - method : Matching\
    \ Algorithm\n    - cv2.TM_CCOEFF, cv2.TM_CCOEFF_NORMED\n    - cv2.TM_CCORR, cv2.TM_CCORR_NORMED\n\
    \    - cv2.TM_SQDIFF, cv2.TM_SQDIFF_NORMED\n  - Turnaround : Array result value\
    \ of matching,\n    - TM_SQDIFF, For TM_SQDIFF_NORMED, min_loc\n    - 나머지는 max_loc\n\
    - cv2.minMaxLoc(matched)\n  - Turnaround : min_val, max_val, min_loc, max_loc\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_293_0.png)\n\n## Matching Method (\
    \ I : Image, T : Template, R : Result )\n\n- method=CV_TM_SQDIFF\n  - $R(x, y)\
    \ = \\sum_{x', y'} (T(x', y') - I(x + x', y + y'))^2$\n- method=CV_TM_SQDIFF_NORMED\n\
    \  - $R(x, y) = \\frac{\\sum_{x', y'} (T(x', y') - I(x + x', y + y'))^2}{\\sqrt{\\\
    sum_{x', y'} T(x', y')^2 \\cdot \\sum_{x', y'} I(x + x', y + y')^2}}$\n- method=CV_TM_CCORR\n\
    \  - $R(x, y) = \\sum_{x', y'} (T(x', y') \\cdot I(x + x', y + y'))$\n- method=CV_TM_CCORR_NORMED\n\
    \  - $R(x, y) = \\frac{\\sum_{x', y'} (T(x', y') \\cdot I(x + x', y + y'))}{\\\
    sqrt{\\sum_{x', y'} T(x', y')^2 \\cdot \\sum_{x', y'} I(x + x', y + y')^2}}$\n\
    - method=CV_TM_CCOEFF\n  - $R(x, y) = \\sum_{x', y'} (T'(x', y') \\cdot I'(x +\
    \ x', y + y'))$\n  - where\n    - $T'(x', y') = T(x', y') - 1/(w \\cdot h) \\\
    cdot \\sum_{x'', y''} T(x'', y'')$\n    - $I'(x + x', y + y') = I(x + x', y +\
    \ y') - 1/(w \\cdot h) \\cdot \\sum_{x'', y''} I(x + x'', y + y'')$\n- method=CV_TM_CCOEFF_NORMED\n\
    \  - $R(x, y) = \\frac{\\sum_{x', y'} (T'(x', y') \\cdot I'(x + x', y + y'))}{\\\
    sqrt{\\sum_{x', y'} T'(x', y')^2 \\cdot \\sum_{x', y'} I'(x + x', y + y')^2}}$\n\
    \n## ❖ Template Matching\n\n- Example\n\n```python\nimport cv2\nimport numpy as\
    \ np\n\nimg = cv2.imread('../img/figures.jpg')\ntemplate = cv2.imread('../img/taekwonv1.jpg')\n\
    th, tw = template.shape[:2]\ncv2.imshow('template', template)\n\nmethods = ['cv2.TM_CCOEFF_NORMED',\n\
    'cv2.TM_CCORR_NORMED', 'cv2.TM_SQDIFF_NORMED']\nfor i, method_name in enumerate(methods):\n\
    \    img_draw = img.copy()\n    method = eval(method_name)\n    res = cv2.matchTemplate(img,\
    \ template, method)\n    min_val, max_val, min_loc, max_loc = cv2.minMaxLoc(res)\n\
    \    print(method_name, min_val, max_val, min_loc, max_loc)\n    if method in\
    \ [cv2.TM_SQDIFF, cv2.TM_SQDIFF_NORMED]:\n        top_left = min_loc\n       \
    \ match_val = min_val\n    else:\n        top_left = max_loc\n        match_val\
    \ = max_val\n    bottom_right = (top_left[0] + tw, top_left[1] + th)\n    cv2.rectangle(img_draw,\
    \ top_left, bottom_right, (0,0,255),2)\n    cv2.putText(img_draw, str(match_val),\
    \ top_left,\ncv2.FONT_HERSHEY_PLAIN, 2,(0,255,0), 1, cv2.LINE_AA)\n    cv2.imshow(method_name,\
    \ img_draw)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n```\ncv2.TM_CCOEFF_NORMED\
    \ -0.17781560122966766 0.5126562714576721 (42, 0) (208, 43)\ncv2.TM_CCORR_NORMED\
    \ 0.8271383047103882 0.9236084818840027 (85, 6) (208, 43)\ncv2.TM_SQDIFF_NORMED\
    \ 0.1706070452928543 0.36892083287239075 (208, 43) (86, 7)\n```\n\n## ❖ Template\
    \ Matching\n\n- Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_295_0.png)\n\
    \n## ❖ Multi Object Matching\n\n- When you want to find same template in one image\n\
    - cv2.matchTemplate() turns around only one result\n- cv2.minMaxLoc(): Problem\
    \ of turning around max or minimum one\n- Find smallest differences in max or\
    \ min value.\n  - threshold = max * (1-0.01)\n  - np.where(res >= threshold)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_295_1.png)\n\n## Multi Object Matching\n\
    \n- Example\n\n```python\nimg = cv2.imread('../img/mario.png')\nimggray = cv2.cvtColor(img,\
    \ cv2.COLOR_BGR2GRAY)\n\ntemplate = cv2.imread('../img/mario_template.png',0)\n\
    w, h = template.shape[::-1]\n\nres = cv2.matchTemplate(imggray,template,cv2.TM_CCOEFF_NORMED)\n\
    min_val, max_val, min_loc, max_loc = cv2.minMaxLoc(res)\nthreshold = max_val *\
    \ (1-0.01)\nprint(\"max:%f, threshold : %f\" %(max_val, threshold))\n\nloc = np.where(\
    \ res >= threshold)\nfor pt in zip(*loc[::-1]):\n    cv2.rectangle(img, pt, (pt[0]\
    \ + w, pt[1] + h), (0,0,255), 2)\n\ncv2.imshow('Question Box',img)\ncv2.waitKey()\n\
    cv2.destroyAllWindows()\n```\n\n- Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_296_0.png)\n\
    \n## Matching & Tracking\n\n1. Matching with a similar image\n2. **Feature and\
    \ Key Point**\n3. Descriptor Extractor\n4. Feature Matching\n5. Tracking\n6. Workshop\n\
    \n## Corner Feature Detector\n\n- Limitation of Template Matching\n  - Rotate,\
    \ Scale, Brightness, Contrast, Hue, Unable Affine transform\n- Image’s Corner:\n\
    \  - Easy to find characters from image\n  - Unable to detect even human other\
    \ than Corner\n  - Detect Image Feature\n\n![](img/9de0cb7cd12c1232044968590f57e471_298_0.png)\n\
    \n## ❖ Harris Corner Detection\n\n- Chris Harris, Mike Stephens’s paper, 1988\n\
    - Representative methods of finding Corner Keypoint\n- When move kernel, all direction\
    \ changes\n- cv2.cornerHarris(img, blockSize, ksize, k)\n  - img : Input image,\
    \ float32\n  - blocksize : Size of neighboring pixel\n  - ksize : Kernel size\
    \ to use in Sobel\n  - k : K Parameter (Empirical Integer, 0.04~0.06)\n  - Turnaround\
    \ : Same size as input image\n    - Changed value\n\n![](img/9de0cb7cd12c1232044968590f57e471_299_0.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_299_1.png)\n\n![](img/9de0cb7cd12c1232044968590f57e471_299_2.png)\n\
    \n## ❖ Harris Corner Detection\n\n```python\nimport cv2\nimport numpy as np\n\
    img = cv2.imread('../img/house.jpg')\ngray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\
    corner = cv2.cornerHarris(gray, 2, 3, 0.04)\ncoord = np.where(corner > 0.1* corner.max())\n\
    coord = np.stack((coord[1], coord[0]), axis=-1)\nfor x, y in coord:\n    cv2.circle(img,\
    \ (x,y), 5, (0,0,255), 1, cv2.LINE_AA)\ncorner_norm = cv2.normalize(corner, None,\

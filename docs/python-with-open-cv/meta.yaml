    \ threshold, minLineLen, maxLineGap)\n  - src : Input image\n  - rho : Distance\
    \ accuracy (0~1)\n  - theta : Angle accuracy, radian (np.pi/0~180)\n  - threshold\
    \ : Min, matching value found to be straight line\n  - minLineLen : If the length\
    \ is shorter than this, drop\n  - maxLineGap : If the distance is bigger than\
    \ this, it is different line\n  - lines : Detected line coordination\n    - nx1x\
    \ 4 array for two lines in straight line (x1, y1, x2, y2)"

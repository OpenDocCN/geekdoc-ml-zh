    \  - Noise, Erosion\n- Douglas-Peucker Algorithm\n  - Set epsilon Value: Max distance\
    \ from contour to approximate contour\n- approx = cv2.approxPolyDP(contour, epsilon,\
    \ closed)\n  - contour : Contour coordination\n  - epsilon : Accuracy of approximate\
    \ value, margin of error\n  - closed : Rather contour is closed\n  - approx :\
    \ Coordination of approximate contour\n\n![](img/9de0cb7cd12c1232044968590f57e471_259_0.png)\n\
    \n+   - Example\n\n```\nimport cv2\nimport numpy as np\n\nimg = cv2.imread('../img/bad_rect.png')\n\
    img2 = img.copy()\nimggray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\nret, th =\
    \ cv2.threshold(imggray, 127, 255, cv2.THRESH_BINARY)\ntemp, contours, hierachy\
    \ = cv2.findContours(th, cv2.RETR_EXTERNAL,\n    cv2.CHAIN_APPROX_SIMPLE)\ncontour\
    \ = contours[0]\nepsilon = 0.05 * cv2.arcLength(contour, True)\napprox = cv2.approxPolyDP(contour,\
    \ epsilon, True)\ncv2.drawContours(img, [contour], -1, (0,255,0), 3)\ncv2.drawContours(img2,\
    \ [approx], -1, (0,255,0), 3)\ncv2.imshow('contour', img)\ncv2.imshow('approx',\
    \ img2)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```"
- md: "## Contour Approximation\n\n- Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_260_0.png)\n\
    \n## Convex Hull\n\n- Convex Hull: without concaved part, object formed with convex\
    \ curve\n- Coordination of object border area\n- Effective in finding actual area\
    \ and center point of the object\n- `hull = cv2.convexHull(points, hull, clockwise,\
    \ returnPoints)`\n  - `points`: contours\n  - `hull`: output, avoid\n  - `clockwise`:\
    \ Set orientation, True/False\n  - `returnPoints`:\n    - True*: hull points turnaround\
    \ coordination\n    - False: Turnaround hull given index of contour\n- `ret =\
    \ cv2.isContourConvex(contour)`: True/False\n  - `ret`: Check Convex\n- `defects\
    \ = cv2.convexityDefects(contour, convexhull)`: Finding defect of convex hull\n\
    \  - `contour`: Input contour\n  - `convexhull`: Contour index for convex object\n\
    \  - `defects`: Array index of contour with convex hull defects, N x 1 x 4 array\n\
    \  - `[start, end, farthest, distance]`\n    - `start`: Index of contour starting\
    \ convex angle\n    - `end`: Index of contour ending convex angle\n    - `farthest`:\
    \ Contour index of farthest from convex hull\n    - `distance`: Distance from\
    \ farthest to convex hull\n      - 8 bit fixed decimal (distance/256.0)\n\n##\
    \ ❖ Convex Hull\n\n- Example\n\n```python\nimport cv2\nimport numpy as np\n\n\
    img = cv2.imread('../img/hand.jpg')\nimg2 = img.copy()\ngray = cv2.cvtColor(img,\
    \ cv2.COLOR_BGR2GRAY)\nret, th = cv2.threshold(gray, 127, 255, cv2.THRESH_BINARY_INV)\n\
    \ntemp, contours, heiarcy = cv2.findContours(th, cv2.RETR_EXTERNAL,\n    cv2.CHAIN_APPROX_SIMPLE)\n\
    cntr = contours[0]\ncv2.drawContours(img, [cntr], -1, (0, 255,0), 1)\n\nhull =\
    \ cv2.convexHull(cntr)\ncv2.drawContours(img2, [hull], -1, (0,255,0), 1)\nprint(cv2.isContourConvex(cntr),\
    \ cv2.isContourConvex(hull))\nhull2 = cv2.convexHull(cntr, returnPoints=False)\n\
    defects = cv2.convexityDefects(cntr, hull2)\nfor i in range(defects.shape[0]):\n\
    \    startP, endP, farthestP, distance = defects[i, 0]\n    farthest = tuple(cntr[farthestP][0])\n\
    \    dist = distance/256.0\n    if dist > 1 :\n        cv2.circle(img2, farthest,\
    \ 3, (0,0,255), -1)\ncv2.imshow('contour', img)\ncv2.imshow('convex hull', img2)\n\
    cv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n## Convex Hull\n\n- Example <Result>\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_262_0.png)\n\n## Point Polygon Test\n\
    \n- Calculate distance between certain point of image to contour\n  - `cv2.pointPolygonTest(img,\
    \ pt, measureDist)`\n    - `img`: input image\n    - `pt`: (x,y), Measured point\n\
    \    - `measureDist`: True/False\n      - True: Distance measure\n      - False:\
    \ Show only internal and external (-1,0,1)\n  - Turnaround\n    - Positive: Internal\n\
    \    - Negative: External\n\n## Point Polygon Test\n\n- Example\n\n```python\n\
    img = cv2.imread('../img/4star.jpg')\nimggray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\
    ret, th = cv2.threshold(imggray, 127,255, cv2.THRESH_BINARY_INV)\n_, contours,\
    \ _ = cv2.findContours(th, cv2.RETR_EXTERNAL,\n                              \
    \  cv2.CHAIN_APPROX_SIMPLE)\n\ncontour = contours[0]\ncv2.drawContours(img, [contour],\
    \ 0, (0,255,0),2)\np1 = (100,100)\np2 = (200,200)\ncv2.circle(img, p1, 3, (255,0,0),\
    \ -1)\ncv2.circle(img, p2, 3, (255,0,255), -1)\ndist1 = cv2.pointPolygonTest(contour,\
    \ p1, True)\ndist2 = cv2.pointPolygonTest(contour, p2, True)\ncv2.putText(img,\
    \ '%f'%dist1, p1, cv2.FONT_HERSHEY_PLAIN, 1,\n            (0,0,255), 1)\ncv2.putText(img,\
    \ '%f'%dist2, p2, cv2.FONT_HERSHEY_PLAIN, 1,\n            (0,0,255), 1)\ncv2.imshow('Convex\
    \ defects', img)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n- Example <Result>\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_263_0.png)\n\n## ❖ Match Shape\n\n\
    - Compare two different contours\n- `ret = cv2.matchShape(cntr1, cntr2, method,\
    \ param)`\n  - `cntr1, cntr2`: contours to compare\n  - `method`: Hu Moment comparing\
    \ algorithms\n    - `cv2.CONTOURS_MATCH_I1`\n    - `cv2.CONTOURS_MATCH_I2`\n \
    \   - `cv2.CONTOURS_MATCH_I3`\n  - `param`: Parameter delivering algorithm, 0.0\
    \ (not supported)\n  - `ret`:\n    - Similarity: Smaller it is, similar it is,\
    \ 0=Same\n- Example <1/2>\n\n```python\nimport cv2\nimport numpy as np\n\ntarget\
    \ = cv2.imread('../img/4star.jpg') # 매칭 대상\nshapes = cv2.imread('../img/shapestomatch.jpg')\
    \ # 여러 도형\ntargetGray = cv2.cvtColor(target, cv2.COLOR_BGR2GRAY)\nshapesGray =\
    \ cv2.cvtColor(shapes, cv2.COLOR_BGR2GRAY)\nret, targetTh = cv2.threshold(targetGray,\
    \ 127, 255,\ncv2.THRESH_BINARY_INV)\nret, shapesTh = cv2.threshold(shapesGray,\
    \ 127, 255,\ncv2.THRESH_BINARY_INV)\n\n_, cntrs_target, _ = cv2.findContours(targetTh,\
    \ cv2.RETR_EXTERNAL,\ncv2.CHAIN_APPROX_SIMPLE)\n_, cntrs_shapes, _ = cv2.findContours(shapesTh,\
    \ cv2.RETR_EXTERNAL,\ncv2.CHAIN_APPROX_SIMPLE)\n```\n\n## Match Shape\n\n- Example\
    \ <2/2>\n\n```python\nmatchs = [] # List to save contour and matching points\n\
    for contr in cntrs_shapes:\n    match = cv2.matchShapes(cntrs_target[0], contr,\n\
    \    cv2.CONTOURS_MATCH_I2, 0.0)\n    matchs.append( (match, contr) )\n    cv2.putText(shapes,\
    \ '%.2f'%match, tuple(contr[0][0]),\n    cv2.FONT_HERSHEY_PLAIN, 1,(0,0,255),1\
    \ )\nmatchs.sort(key=lambda x : x[0])\n\ncv2.drawContours(shapes, [matchs[0][1]],\
    \ -1, (0,255,0), 3)\ncv2.imshow('target', target)\ncv2.imshow('Match Shape', shapes)\n\
    cv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n- Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_265_0.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_265_1.png)\n\n## Image Segmentation\n\
    \n1. Contour\n2. **Hough Transform**\n3. Connected Component\n4. Workshop\n\n\
    ## Hough Transform\n\n- Distinguish line, circle simple shape\n- Expanded to various\
    \ figures, starting from line finding method\n- Paul Hough First Discovered (bubble\
    \ chamber), 1962\n- Richard Duda and Peter Hart Generalized, 1972\n- Popularized\
    \ by Dana H. Ballard’s Computer Vision, 1981\n- Hough Line Transform\n- Hough\
    \ Circle Transform\n- Detect straight line from numerous dots in images\n- r =\
    \ cos θx + sin θy\n- For one dot (r, θ)\n- Straight line connecting all same (r,\
    \ θ) of all dots\n\n![](img/9de0cb7cd12c1232044968590f57e471_267_0.png)\n\n![](img/9de0cb7cd12c1232044968590f57e471_267_1.png)\n\
    \n## ❖ Hough Line Transform\n\n- `lines = cv2.HoughLines(img, rho, theta, threshold[,\
    \ lines, srn=0, stn=0, min_theta, max_theta])`\n  - `img`: Input image, 1 channel\
    \ binary scale\n  - `rho`: Resolution of distance, 0~1\n  - `theta`: Resolution\
    \ of angle, Radian unit (np.pi/0~180)\n  - `threshold`: Minimum number of matching\
    \ to judge straight line\n    - Small value: Accuracy drops but # of detected\
    \ value increases\n    - Big Value: Accuracy increases but # of detected value\
    \ decreases\n  - `lines`: Detecting Result, N x 1 x 2 array (r,θ)\n  - `srn, stn`:\
    \ Use for multi scale hough transform, not used in detection\n  - `min_theta,\
    \ max_theta`: Max and min angle to use for detection\n- Example\n\n```python\n\
    import cv2\nimport numpy as np\n\nimg = cv2.imread('../img/sudoku.jpg')\nimg2\
    \ = img.copy()\nh, w = img.shape[:2]\nimggray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\
    edges = cv2.Canny(imggray, 100, 200 )\nlines = cv2.HoughLines(edges, 1, np.pi/180,\
    \ 130)\nfor line in lines: # Tour all detected lines\n    r,theta = line[0] #\
    \ Distance and angle\n    tx, ty = np.cos(theta), np.sin(theta) # Trigonometric\
    \ ration to x, y\n    x0, y0 = gx*r, gy*r  #Coordination based on x, y\n    cv2.circle(img2,\
    \ (abs(x0), abs(y0)), 3, (0,0,255), -1)\n    x1, y1 = int(x0 + w*(-ty)), int(y0\
    \ + h * tx)\n    x2, y2 = int(x0 - w*(-ty)), int(y0 - h * tx)\n    cv2.line(img2,\
    \ (x1, y1), (x2, y2), (0,255,0), 1)\nmerged = np.hstack((img, img2))\ncv2.imshow('hough\
    \ line', merged)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```\n\n## ❖ Hough Line\
    \ Transform\n\n- Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_269_0.png)\n\
    \n## ❖ Probabilistic Hough Line Transform\n\n- Avoid inefficiency of calculating\
    \ all pixels\n- Randomly select pixel\n- `lines = cv2.HoughLineP(src, rho, theta,\
    \ threshold, minLineLen, maxLineGap)`\n  - `src`: Input image\n  - `rho`: Distance\
    \ accuracy (0~1)\n  - `theta`: Angle accuracy, radian (np.pi/0~180)\n  - `threshold`:\
    \ Min, matching value found to be straight line\n  - `minLineLen`: If the length\
    \ is shorter than this, drop\n  - `maxLineGap`: If the distance is bigger than\
    \ this, it is different line\n  - `lines`: Detected line coordination\n    - nx1x\
    \ 4 array for two lines in straight line (x1, y1, x2, y2)"

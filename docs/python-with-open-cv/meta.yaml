  md: "# Distance Transform\n\n+   - Finding center point of object\n- Farthest from\
    \ the boundary\n- For binary scale image\n- Starting from 0 where pixel value\
    \ is 0, it increases by 1 as it distances from 0\n- cv2.distanceTransform(src,\
    \ distanceType, maskSize)\n  - src : Input image, binary scale\n  - distanceType\
    \ : Selecting distance calculation type\n    - cv2.DIST_L2, cv2.DIST_L1, cv2.DIST_L12,\
    \ cv2.DIST_FAIR, cv2.DIST_WELSCH, cv2.DIST_HUBER\n  - maskSize : Distance transform\
    \ kernel size\n\n![](img/9de0cb7cd12c1232044968590f57e471_274_0.png)\n\n+   -\
    \ Example\n\n```\nimport cv2\nimport numpy as np\n\nimg = cv2.imread('../img/full_body.jpg',\
    \ cv2.IMREAD_GRAYSCALE)\n_, biimg = cv2.threshold(img, 127, 255, cv2.THRESH_BINARY_INV)\n\
    \ndst = cv2.distanceTransform(biimg, cv2.DIST_L2, 5)\ndst = (dst/(dst.max()-dst.min())\
    \ * 255).astype(np.uint8)\nskeleton = cv2.adaptiveThreshold(dst, 255,\ncv2.ADAPTIVE_THRESH_GAUSSIAN_C,\
    \ cv2.THRESH_BINARY, 7, -3)\ncv2.imshow('origin', img)\ncv2.imshow('dist', dst)\n\
    cv2.imshow('skel', skeleton)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```"

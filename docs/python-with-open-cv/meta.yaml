    4. Feature Matching\n5. Tracking\n6. Workshop\n\n## Average Hash Matching\n\n\
    - Fit for understanding similar pictures\n- Average Hash\n    - Transform image\
    \ into one number by calculating average value\n        - Reduce image into a\

  - "[PAGE 268]\n\n# ❖ Hough Line Transform\n\n+   - lines = cv2.HoughLines(img, rho,\
    \ theta, threshold[, lines, srn=0, stn=0, min_theta, max_theta])\n  - img: Input\
    \ image, 1 channel binary scale\n  - rho: Resolution of distance, 0~1\n  - theta:\
    \ Resolution of angle, Radian unit (np.pi/0 ~180)\n  - threshold: Minimum number\
    \ of matching to judge straight line\n    - Small value: Accuracy drops but #\
    \ of detected value increases\n    - Big Value: Accuracy increases but # of detected\
    \ value decreases\n  - lines : Detecting Result, N x 1 x 2 array ( r,θ)\n  - srn,\
    \ stn : Use for multi scale huff transform, not used in detection\n  - min_theta,\
    \ max_theta : Max and min angle to use for detection\n- Example\n\n```\nimport\
    \ cv2\nimport numpy as np\n\nimg = cv2.imread('../img/sudoku.jpg')\nimg2 = img.copy()\n\
    h, w = img.shape[:2]\nimggray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\nedges =\
    \ cv2.Canny(imggray, 100, 200 )\nlines = cv2.HoughLines(edges, 1, np.pi/180, 130)\n\
    for line in lines: # Tour all detected lines\n    r,theta = line[0] # Distance\
    \ and angle\n    tx, ty = np.cos(theta), np.sin(theta) # Trigonometric ration\
    \ to x, y\n    x0, y0 = gx*r, gy*r  #Coordination based on x, y\n    cv2.circle(img2,\
    \ (abs(x0), abs(y0)), 3, (0,0,255), -1)\n    x1, y1 = int(x0 + w*(-ty)), int(y0\
    \ + h * tx)\n    x2, y2 = int(x0 - w*(-ty)), int(y0 - h * tx)\n    cv2.line(img2,\
    \ (x1, y1), (x2, y2), (0,255,0), 1)\nmerged = np.hstack((img, img2))\ncv2.imshow('hough\
    \ line', merged)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```"
  - "[PAGE 269]\n\n# ❖ Hough Line Transform\n\n+   - Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_269_0.png)\n\
    \n# ❖ Probabilistic Hough Line Transform\n\n+   - Avoid inefficiency of calculating\
    \ all pixels\n- Randomly select pixel\n- lines = cv2.HoughLineP(src, rho, theta,\
    \ threshold, minLineLen, maxLineGap)\n  - src : Input image\n  - rho : Distance\
    \ accuracy (0~1)\n  - theta : Angle accuracy, radian (np.pi/0~180)\n  - threshold\
    \ : Min, matching value found to be straight line\n  - minLineLen : If the length\
    \ is shorter than this, drop\n  - maxLineGap : If the distance is bigger than\
    \ this, it is different line\n  - lines : Detected line coordination\n    - nx1x\
    \ 4 array for two lines in straight line (x1, y1, x2, y2)"
- md: "## ❖ Probabilistic Hough Line Transform\n\n- Example\n\n```python\nimport cv2\n\
    import numpy as np\n\nimg = cv2.imread('../img/sudoku.jpg')\nimg2 = img.copy()\n\
    imgray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\nedges = cv2.Canny(imgray, 100,\
    \ 200)\n\nlines = cv2.HoughLinesP(edges, 1, np.pi/180, 50, 5, 10)\nfor line in\
    \ lines:\n    x1, y1, x2, y2 = line[0]\n    cv2.line(img, (x1, y1), (x2, y2),\
    \ (0, 255, 0), 1)\n\ncv2.imshow('Probability hough line', img)\ncv2.waitKey()\n\
    cv2.destroyAllWindows()\n```\n\n- Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_270_0.png)\n\
    \n## ❖ Hough Circle Transform\n\n- Transform rectangular coordination to polarity\
    \ coordination\n- Able to detect circle with straight line transform algorithm\n\
    - Too much calculation, slow\n\n- Hough Gradient Method\n  - OpenCV operation\n\
    \  - Detect edge with Canny\n  - Calculate gradient orientation with Sobel\n \
    \ - Calculate center and radius of circle, 3D accumulator\n  - Inaccurate b/c\
    \ it gets gradient orientation using Sobel\n  - Difficult to detect overlapping\
    \ concentric circle\n\n- `circles = cv2.HoughCircles(src, method, dp, minDst,\
    \ circles, param1, param2, minRds, maxRds)`\n  - `src` : Input image\n  - `method`\
    \ : `cv2.HOUGH_GRADIENT`, only available\n    - `cv.HOUGH_STANDARD`\n    - `cv.HOUGH_PROBABILISTIC`\n\
    \    - `cv.HOUGH_MULTI_SCALE`\n    - `cv.HOUGH_GRADIENT`\n  - `dp` : Inverse proportion\
    \ rate of resolution between accumulator and input image\n    - 1: same, 2: ½,\
    \ small value: Increase accuracy,\n    - Big value: Increase # detected\n  - `minDst`\
    \ : Min value between center points of circle, 0=err, unable to detect concentric\
    \ circle\n  - `circles` : Circle Result, N x 1 x 3 (x, y, r)\n  - `param1` : maxValue\
    \ used for Canny Edge\n  - `param2` : HOUGH_GRADIENT threshold,\n    - Small value:\
    \ increase # detected, decrease accuracy\n  - `minRadius`, `maxRadius`: Min radius\
    \ of circle, max radius (if 0, size of image)\n\n## ❖ Hough Circle Transform\n\
    \n- Example\n\n```python\nimport cv2\nimport numpy as np\n\nimg = cv2.imread('../img/coins_spread1.jpg')\n\
    gray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\nblur = cv2.GaussianBlur(gray, (3,\
    \ 3), 0)\ncircles = cv2.HoughCircles(blur, cv2.HOUGH_GRADIENT, 1.5, 30, None,\
    \ 200)\nif circles is not None:\n    circles = np.uint16(np.around(circles))\n\
    \    for i in circles[0, :]:\n        cv2.circle(img, (i[0], i[1]), i[2], (0,\
    \ 255, 0), 2)\n        cv2.circle(img, (i[0], i[1]), 2, (0, 0, 255), 5)\n\ncv2.imshow('hough\
    \ circle', img)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n- Example <Result>\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_272_0.png)\n\n## Image Segmentation\n\
    \n1. Contour\n2. Hough Transform\n3. **Connected Component**\n4. Workshop\n\n\
    ## Distance Transform\n\n- Finding center point of object\n- Farthest from the\
    \ boundary\n- For binary scale image\n- Starting from 0 where pixel value is 0,\
    \ it increases by 1 as it distances from 0\n- `cv2.distanceTransform(src, distanceType,\
    \ maskSize)`\n  - `src` : Input image, binary scale\n  - `distanceType` : Selecting\
    \ distance calculation type\n    - `cv2.DIST_L2`, `cv2.DIST_L1`, `cv2.DIST_L12`,\
    \ `cv2.DIST_FAIR`, `cv2.DIST_WELSCH`, `cv2.DIST_HUBER`\n  - `maskSize` : Distance\
    \ transform kernel size\n\n![](img/9de0cb7cd12c1232044968590f57e471_274_0.png)\n\
    \n- Example\n\n```python\nimport cv2\nimport numpy as np\n\nimg = cv2.imread('../img/full_body.jpg',\
    \ cv2.IMREAD_GRAYSCALE)\n_, biimg = cv2.threshold(img, 127, 255, cv2.THRESH_BINARY_INV)\n\
    \ndst = cv2.distanceTransform(biimg, cv2.DIST_L2, 5)\ndst = (dst / (dst.max()\
    \ - dst.min()) * 255).astype(np.uint8)\nskeleton = cv2.adaptiveThreshold(dst,\
    \ 255,\n    cv2.ADAPTIVE_THRESH_GAUSSIAN_C, cv2.THRESH_BINARY, 7, -3)\ncv2.imshow('origin',\
    \ img)\ncv2.imshow('dist', dst)\ncv2.imshow('skel', skeleton)\ncv2.waitKey(0)\n\
    cv2.destroyAllWindows()\n```\n\n- Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_275_0.png)\n\
    \n## ❖ Labeling\n\n- 연결된 요소들 끼리 분리\n- 픽셀 값이 0으로 끊어 지지 않는 영역 끼리 같은 레이블 값 부여\n-\
    \ `retval, labels = cv.connectedComponents(src[, labels, connectivity=8, ltype])`\
    \ : 연결 요소 레이블링과 갯수 반환\n  - `src` : input image, 바이너리 스케일 이미지\n  - `labels` : 레이블링\
    \ 된 input image와 같은 크기의 배열\n  - `connectivity` : 연결성 검사할 방향 갯수, 4, 8 중 선택\n  -\
    \ `ltype` : Result 레이블 배열 dtype\n  - `retval` : 레이블 갯수\n- `retval, labels, stats,\
    \ centroids = cv.connectedComponentsWithStats(src[, labels, stats, centroids,\
    \ connectivity, ltype])` : 레이블링과 각종 상태 정보 반환\n  - `stats` : N x 5 행렬(N:레이블 갯수)\n\
    \    - [x좌표, y좌표, 폭, 높이, 넓이]\n  - `centroids` : 각 레이블의 중심점 좌표, N x 2 행렬(N:레이블\
    \ 갯수)\n\n![](img/9de0cb7cd12c1232044968590f57e471_275_1.png)\n\n## ❖ Labeling\n\
    \n- Example\n\n```python\nimport cv2\nimport numpy as np\n\nimg = cv2.imread('../img/shapes_donut.png')\n\
    img2 = np.zeros_like(img)\ngray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n_, th\
    \ = cv2.threshold(gray, 127, 255, cv2.THRESH_BINARY)\n\ncnt, labels = cv2.connectedComponents(th)\n\
    # retval, labels, stats, cent = cv2.connectedComponentsWithStats(th)\n# ---②\n\
    \nfor i in range(cnt):\n    img2[labels == i] = [int(j) for j in np.random.randint(0,\
    \ 255, 3)]\n\ncv2.imshow('origin', img)\ncv2.imshow('labeled', img2)\n```\n\n\
    - Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_276_0.png)\n\n\
    ## ❖ Flood Fill\n\n- Filling same color to consecutive area\n- `retval, img, mask,\
    \ rect = cv2.floodFill(img, mask, seed, newVal[, loDiff, upDiff, flags])`\n  -\
    \ `img` : input image, 1 or 3 channels\n  - `mask` : Larger by 2x2 pixel than\
    \ input image, If it meets area that is not 0, stop filling\n  - `seed` : Coordination\
    \ to start filling\n  - `newVal` : Color value used to fill\n  - `loDiff`, `upDiff`\
    \ : Min and max value used to decide to fill\n  - `flags` : Flag for filling type,\n\
    \    - 4 or 8 distance filling\n    - `cv2.FLOODFILL_MASK_ONLY` : Fill only mask\
    \ not img\n      - Need to include 8-16 bits for the value to be used in fillings\n\
    \    - `cv2.FLOODFILL_FIXED_RANGE`: Compare it with seed pixel not neighboring\
    \ pixel\n- `retval`: # of pixels filled\n- `rect` : Rectangle surrounding areas\
    \ done filling\n\n- Example\n\n```python\nimport cv2\nimport numpy as np\n\nimg\
    \ = cv2.imread('../img/taekwonv1.jpg')\nrows, cols = img.shape[:2]\nmask = np.zeros((rows\
    \ + 2, cols + 2), np.uint8)\nnewVal = (255, 255, 255)\nloDiff, upDiff = (10, 10,\
    \ 10), (10, 10, 10)\n\ndef onMouse(event, x, y, flags, param):\n    global mask,\
    \ img\n    if event == cv2.EVENT_LBUTTONDOWN:\n        seed = (x, y)\n       \
    \ retval = cv2.floodFill(img, mask, seed, newVal, loDiff, upDiff)\n        cv2.imshow('img',\
    \ img)\n\ncv2.imshow('img', img)\ncv2.setMouseCallback('img', onMouse)\ncv2.waitKey(0)\n\
    cv2.destroyAllWindows()\n```\n\n> - $src(x', y') - loDiff \\leq src(x, y) \\leq\
    \ src(x', y') + upDiff$\n>   - $src(x, y)$ : 현재 픽셀\n>   - $src(x', y')$ : 이웃 픽셀\n\
    \n## ❖ Flood Fill\n\n- Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_278_0.png)\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_278_1.png)\n\n## ❖ Watershed\n\n- Divide\
    \ subject by considering edge balanced area as valley\n- Designate marker to divide\
    \ by user (or algorithm)\n- Fill water to each different marker area, stop when\
    \ they meet.\n- Marker\n  - Apply ID (1~) for each different object, Mark subject\
    \ to distinguish\n  - 0 : Unknown\n  - i.e.) Front Image=1, Background=2\n  -\
    \ i.e.) Orange=1, lime=2, Background=3\n- `markers = cv2.watershed(img, markers)`\n\
    \  - `img` : input image\n  - `markers`\n    - Marker border set as -1, same size\
    \ as input\n\n## ❖ Watershed\n\n- Example\n\n```python\nimport cv2\nimport numpy\
    \ as np\n\nimg = cv2.imread('../img/taekwonv1.jpg')\nrows, cols = img.shape[:2]\n\
    img_draw = img.copy()\nmarker = np.zeros((rows, cols), np.int32)\nmarkerId = 1\n\
    colors = []\nisDragging = False\n\ndef onMouse(event, x, y, flags, param):\n \
    \   global img_draw, marker, markerId, isDragging\n    if event == cv2.EVENT_LBUTTONDOWN:\
    \  # Drag down left mouse button, start dragging\n        isDragging = True\n\
    \        colors.append((markerId, img[y, x]))\n    elif event == cv2.EVENT_MOUSEMOVE:\
    \  # Mouse moving\n        if isDragging:            # Dragging\n            marker[y,\
    \ x] = markerId\n            cv2.circle(img_draw, (x, y), 3, (0, 0, 255), -1)\n\
    \            cv2.imshow('watershed', img_draw)\n    elif event == cv2.EVENT_LBUTTONUP:\
    \  # Up left mouse button\n        if isDragging:\n            isDragging = False\

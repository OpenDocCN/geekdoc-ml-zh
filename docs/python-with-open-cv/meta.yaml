    \n# OpenCV 与 Python\n\n1. **OpenCV3 简介**\n2. 在 Windows 上安装\n3. 在 Mac 上安装\n4. 在\
    \ Ubuntu 上安装\n5. 在树莓派上安装\n\n# ❖ OpenCV\n\n- http://opencv.org\n- 开源计算机视觉库\n- 官方支持\n\
    \  - 原生语言：C/C++\n  - 绑定语言：Python, Java\n  - 支持平台：Windows, Linux, Mac, iOS, Android\n\
    - 支持 OpenCL 激活硬件加速\n- Intel 俄罗斯团队\n  - 源于部分 CPU 密集型应用性能增强研究\n\n![](img/9de0cb7cd12c1232044968590f57e471_22_0.png)\n\
    \n# ❖ 历史\n\n- 发布：1999年1月，基于 IPL（图像处理库），C 语言\n- 首个 alpha 版本：2000年\n- 5个 Beta 版本：2001\
    \ ~ 2005\n- 版本 1.0：2006年10月\n  - 包含预编译的 Python 模块\n  - 添加了 Borland C++ makefiles\n\
    - 版本 2.0：2009年9月\n  - 新的 C++ API，基于 STL\n  - 新的 Python 接口\n- 版本 2.2：2010年12月\n\
    \  - 重新组织包结构（核心、imgproc、features2d、ml、contrib 等）\n  - 新的 Python 绑定，需要 NumPy\n\
    - 版本 2.3：2011年7月\n  - 移植到 Android\n  - 用于 OpenCV 2.x 的 Python 模块 cv2\n- 版本 3.4：2017年12月，最新版本\n\
    \n# ❖ OpenCV\n\n- 官方网站：https://opencv.org\n- 源代码仓库\n  - 主仓库\n    - https://github.com/opencv/opencv\n\
    \    - 官方发行版的代码存储库\n  - 附加仓库\n    - https://github.com/opencv/opencv_contrib\n\

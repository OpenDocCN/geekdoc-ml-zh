    \ WITH_QT=ON \\\n  -D WITH_OPENGL=ON \\\n  -D WITH_XINE=ON ../\n```\n\n- swap\
    \ memory\n  - Memory check\n    - free -h\n  - Swap check\n    - swapon -s\n \

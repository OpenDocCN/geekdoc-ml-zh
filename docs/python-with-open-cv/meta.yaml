    [100%] Built target opencv_python3\n\nreal    45m16.204s\nuser    152m25.580s\n\
    sys     3m26.660s\n```\n\n## Installing OpenCV from Building Source\n\n- htop\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_66_0.png)\n\n- make install\n\n```\n\
    bash\n~/opencv/opencv3.4.0/build $ sudo make install\n```\n\n- check version\n\
    \n```\nbash\n~ $ pkg-config -modversion opencv\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_66_1.png)\n\
    \n## Installing OpenCV from Building Source\n\n- Check Python 2, 3 cv2 module\
    \ version\n\n```\nimport cv2\ncv2.  version\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_67_0.png)\n\
    \n## Installing OpenCV with Pre-built Debian Packages\n\n- Provided from this\
    \ course unofficially\n- Download deb package files from github\n  - https://github.com/dltpdn/opencv-for-rpi\n\
    \    - opencv-main\n    - opencv-libs\n    - opencv-dev\n    - opencv-python\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_67_1.png)\n\n## Installing OpenCV with\
    \ Pre-built Debian Packages\n\n- git download\n\n```\n~ $ git clone https://github.com/dltpdn/opencv-for-rpi.git\n\
    ~ $ cd ./opencv-for-rpi/stretch/3.4.0\n```\n\n- directory\n\n- <debian_version>\
    \ / <opencv_version>\n\n![](img/9de0cb7cd12c1232044968590f57e471_68_0.png)\n\n\
    - Installing\n\n```\n~/opencv-for-rpi/stretch/3.4.0 $ sudo apt -y install ./OpenCV*.dev\n\
    ```\n\n![](img/9de0cb7cd12c1232044968590f57e471_68_1.png)\n\n## Installing OpenCV\
    \ with Pre-built Debian Packages\n\n- Check result\n\n```\n~ $ pkg-config -modversion\
    \ opencv\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_69_0.png)\n\n## Installing\
    \ python Matplotlib\n\n- pip not support matplotlib for Raspberry Pi\n- Installing\
    \ from APT Repository\n\n```\nsudo apt-get install python-matplotlib\nsudo apt-get\
    \ install python3-matplotlib\n\nsudo apt-get install python-gi-cairo\nsudo apt-get\
    \ install python3-gi-cairo\n\nsudo apt-get install python-cairocffi\nsudo apt-get\
    \ install python3-cairocffi\n```\n\n- Matplotlib Check in Python\n  - import matplotlib\n\
    \  - matplotlib.__version__\n\n![](img/9de0cb7cd12c1232044968590f57e471_69_1.png)\n\
    \n## ❖ Test Code\n\n```\nimport cv2\n\nimg_file = \"img/model.jpg\"\nimg = cv2.imread(img_file)\n\
    \nif img:\n    cv2.imshow('model', img)\n    cv2.waitKey(0)\n    cv2.destroyAllWindows()\n\
    ```\n\n![](img/9de0cb7cd12c1232044968590f57e471_70_0.png)\n\n## Basic Interface\n\
    \n1. **Image and Video I/O**\n2. Drawing\n3. Window Management\n4. Event Handling\n\
    \n## ❖ Image show\n\n- img = cv2.imread(file_name [,mod_flag]): Read image from\
    \ file\n  - file_name: Image path, string\n  - mode_flag: Defining Read mode flag\n\
    \    - cv2.IMREAD_UNCHANGED: Color (BGR) scale, base value -1\n    - cv2.IMREAD_GRAYSCALE:\
    \ Grey Scale, 0\n    - cv2.IMREAD_COLOR: Scale saved in file, 1\n  - img: reading\
    \ image, NumPy ndarray\n- cv2.imshow(title, img): Display on image\n  - title\
    \ : Name of the window, string\n  - img : Image to show, NumPy ndarray\n- key\
    \ = cv2.waitKey( [delay]): Keyboard input standby\n  - delay : Standby time, ms\n\
    \  - key : Inserted keyboard value, -1: timeout\n- cv2.destroyAllWindows() : Close\
    \ all open window\n\n## ❖ Image show\n\n```\nimport cv2\n\nimg_file = \"../img/model.jpg\"\
    \nimg = cv2.imread(img_file)\n\nif img:\n    cv2.imshow('model', img)\n    cv2.waitKey(0)\n\
    \    cv2.destroyAllWindows()\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_72_0.png)\n\
    \n## Read in GrayScale\n\n```\nimport cv2\n\nimg_file = \"../img/model.jpg\"\n\
    img = cv2.imread(img_file,\n    cv2.IMREAD_GRAYSCALE)\n\nif not img is None:\n\
    \    cv2.imshow(img_file, img)\n    cv2.waitKey(0)\n    cv2.destroyAllWindows()\n\
    else:\n    print(\"no file:\", img_file)\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_73_0.png)\n\
    \n## Image Write\n\n- cv2.imwrite(file_name, img)\n  - file_name: Name of file\
    \ to save, string\n  - img: Image to save (NumPy array)\n\n```\nimport cv2\n\n\
    img_file = \"../img/model.jpg\"\nimg = cv2.imread(img_file, cv2.IMREAD_GRAYSCALE)\n\
    cv2.imshow(\"my darling daughter\", img)\n\nkey = cv2.waitKey(0) & 0xFF\nif key\
    \ == 27: #esc\n    cv2.destroyAllWindows()\nelif key == ord('s'):\n    print('saving\
    \ file.');\n    cv2.imwrite(\"./gray.jpg\", img)\n    cv2.destroyAllWindows()\n\
    ```\n\n## ❖ Video Capture\n\n- cap = cv2.VideoCapture(file_path or index): Video\
    \ capture object generator\n  - file_path: Image file path, str\n  - index: Camera\
    \ device number, int, Inclement gradually from 0 (i.e.:0,1,2,...)\n- ret = cap.isOpened():\
    \ Check connection initialization\n  - ret : Check for success, Boolean\n- cap.set()/get()\
    \ : Property Change and confirm\n  - cv2.CAP_PROP_FRAME_WIDTH(3), cv2.CAP_PROP_FRAME_HEIGHT(4)\n\
    \  - cv2.CAP_PROP_FPS: Number of frame per second\n  - cv2.CAP_PROP_POS_MSEC:\
    \ Frame position of video file (ms)\n  - cv2.CAP_PROP_POS_AVI_RATIO: Position\
    \ of video file (0-Start, 1-End)\n  - cv2.CAP_PROP_FOURCC: Video file codec string\n\
    \  - cv2.CAP_PROP_AUTOFOCUS: Camera auto focus\n  - cv2.CAP_PROP_ZOOM: Camera\
    \ Zoom\n- ret, img = cap.read(): Read next frame\n  - ret : Check for success,\
    \ boolean\n  - img: Image frame data (numpy array)\n\n## ❖ Video File Play\n\n\
    ```\nimport cv2\nvideo_file = \"../img/big_buck.avi\"\ncap = cv2.VideoCapture(video_file)\

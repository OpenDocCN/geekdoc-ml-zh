    \    - Kernel applied to original image\n    - Quadrangle, Oval, Cross\n    -\
    \ np.ones( ) :Quadrangle\n    - cv2.getStructuringElements(shape, ksize[, anchor])\
    \ : Other than Quadrangle\n        - shape: cv2.MORPH_*\n            - RET, ELLIPSE,\
    \ CROSS\n        - ksize : Kernel size\n        - anchor : Standard point of structural\
    \ factor, meaningless other than cross type\n- Operation Type\n    - Erosion\n\
    \    - Dilation\n    - Opening\n    - Closing\n\n# Erosion\n\n+   - Apply Structuring\
    \ Element, if there is at least one pixel, delete\n    - Delete if kernel cannot\
    \ be placed\n- Effective for eliminating small objects (mostly noise)\n- cv2.erode(src,\
    \ kernel [, anchor, iteration])\n    - src : Input image\n    - kernel : Structuring\
    \ Element\n    - anchor : Center point of Kernel, default(-1, -1)\n    - iteration\
    \ : # of repetition, default(1)\n\n![](img/9de0cb7cd12c1232044968590f57e471_236_0.png)"

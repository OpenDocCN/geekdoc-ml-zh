  - "[PAGE 213]\n\n# Filter\n\n+   - Filter out unwanted value and get only wanted\
    \ value.\n  - LPF(Low Pass Filter) : Blurring, Eliminate Noise\n  - HPF(High Pass\
    \ Filter) : Sharpening, Edge Detection\n- Domain\n  - Spatial Domain Filter\n\
    \    - Calculate by using surrounding pixel value not just one pixel\n    - Convolution\
    \ Calculation\n  - Frequency Domain Filter\n    - Calculate by transferring pixel\
    \ value differences to frequency\n    - Fourier Transform\n\n# Convolution\n\n\
    +   - Core calculation for spatial domain filter\n- Multiply input pixel value\
    \ matching to each factors of Kernel and add them all\n- Kernel: Select surrounding\
    \ pixels to be used in calculation\n  - Name may vary like window, mask, filter\
    \ etc.\n  - Kernel Size: n x n\n  - n : Generally odd number\n\n![](img/9de0cb7cd12c1232044968590f57e471_213_0.png)"

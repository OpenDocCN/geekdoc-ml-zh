    \n# Convex Hull\n\n+   - Convex Hull: without concaved part, object formed with\
    \ convex curve\n- Coordination of object boarder area\n- Effective in finding\
    \ actual area and center point of the object\n- hull = cv2.convexHull(points,\
    \ hull, clockwise, returnPoints)\n  - points : contours\n  - hull : output, avoid\n\
    \  - clockwise : Set orientation, True/False\n  - returnPoints :\n    - True*:\
    \ hull points turnaround coordination\n    - False : Turnaround hull given index\
    \ of contour\n- ret = cv2.isContourConvex(contour) : True/False\n  - ret : Check\
    \ Convex\n- defects = cv2.convexityDefects(contour, convexhull) : Finding defect\
    \ of convex hull\n  - contour : Input contour\n  - convexhull : Contour index\
    \ for convex object\n  - defects: Array index of contour with convex hull defects,\
    \ N x 1 x 4 array"

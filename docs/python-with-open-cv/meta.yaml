  md: "# ❖ Hough Line Transform\n\n+   - lines = cv2.HoughLines(img, rho, theta, threshold[,\
    \ lines, srn=0, stn=0, min_theta, max_theta])\n  - img: Input image, 1 channel\
    \ binary scale\n  - rho: Resolution of distance, 0~1\n  - theta: Resolution of\
    \ angle, Radian unit (np.pi/0 ~180)\n  - threshold: Minimum number of matching\
    \ to judge straight line\n    - Small value: Accuracy drops but # of detected\
    \ value increases\n    - Big Value: Accuracy increases but # of detected value\
    \ decreases\n  - lines : Detecting Result, N x 1 x 2 array ( r,θ)\n  - srn, stn\
    \ : Use for multi scale huff transform, not used in detection\n  - min_theta,\
    \ max_theta : Max and min angle to use for detection\n- Example\n\n```\nimport\
    \ cv2\nimport numpy as np\n\nimg = cv2.imread('../img/sudoku.jpg')\nimg2 = img.copy()\n\
    h, w = img.shape[:2]\nimggray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\nedges =\
    \ cv2.Canny(imggray, 100, 200 )\nlines = cv2.HoughLines(edges, 1, np.pi/180, 130)\n\
    for line in lines: # Tour all detected lines\n    r,theta = line[0] # Distance\
    \ and angle\n    tx, ty = np.cos(theta), np.sin(theta) # Trigonometric ration\
    \ to x, y\n    x0, y0 = gx*r, gy*r  #Coordination based on x, y\n    cv2.circle(img2,\
    \ (abs(x0), abs(y0)), 3, (0,0,255), -1)\n    x1, y1 = int(x0 + w*(-ty)), int(y0\
    \ + h * tx)\n    x2, y2 = int(x0 - w*(-ty)), int(y0 - h * tx)\n    cv2.line(img2,\
    \ (x1, y1), (x2, y2), (0,255,0), 1)\nmerged = np.hstack((img, img2))\ncv2.imshow('hough\
    \ line', merged)\ncv2.waitKey()\ncv2.destroyAllWindows()\n```"
  merge: -1

    \ 视频文件的位置（0-开始，1-结束）\n  - cv2.CAP_PROP_FOURCC: 视频文件编解码器字符串\n  - cv2.CAP_PROP_AUTOFOCUS:\
    \ 摄像头自动对焦\n  - cv2.CAP_PROP_ZOOM: 摄像头变焦\n- ret, img = cap.read(): 读取下一帧\n  - ret\
    \ : 检查是否成功，布尔值\n  - img: 图像帧数据（numpy 数组）\n\n## ❖ 视频文件播放\n\n```\nimport cv2\nvideo_file\
    \ = \"../img/big_buck.avi\"\ncap = cv2.VideoCapture(video_file) #0 or -1\nwhile\
    \ cap.isOpened():\n    ret, img = cap.read()\n    if ret:\n        cv2.imshow(video_file,\
    \ img)\n        if cv2.waitKey(1) & 0xFF == 27:\n            break\n    else:\n\
    \        print('no more frame.')\n        break\nelse:\n    print('can't open\
    \ video.')\ncap.release()\ncv2.destroyAllWindows()\n```\n\n![](img/9de0cb7cd12c1232044968590f57e471_74_0.png)\n\
    \n## ❖ 带 FPS 的视频文件播放\n\n- delay = 1000/FPS\n\n```\nimport cv2\n\nvideo_file =\
    \ \"../img/big_buck.avi\"\ncap = cv2.VideoCapture(video_file) #0 or -1\nfps =\
    \ cap.get(cv2.CAP_PROP_FPS)\ndelay = int(1000/fps)\nprint(\"FPS: %f, Delay: %dms\"\
    \ %(fps, delay))\n\nwhile cap.isOpened():\n    ret, img = cap.read()\n    if ret:\n\
    \        cv2.imshow(video_file, img)\n        if cv2.waitKey(delay) & 0xFF ==\
    \ 27:\n            break\n    else:\n        print('no more frame.')\n       \
    \ break\nelse:\n    print('can't open video.')\ncap.release()\ncv2.destroyAllWindows()\n\
    ```\n\n![](img/9de0cb7cd12c1232044968590f57e471_75_0.png)"

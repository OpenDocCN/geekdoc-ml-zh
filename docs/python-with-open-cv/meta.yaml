    \ OpenCV operation\n  - Detect edge with Canny\n  - Calculate gradient orientation\
    \ with Sobel\n  - Calculate center and radius of circle, 3D accumulator\n  - Inaccurate\
    \ b/c it gets gradient orientation using Sobel\n  - Difficult to detect overlapping\
    \ concentric circle\n\n+   - circles = cv2.HoughCircle(src, method, dp, minDst,\
    \ circles, param1, param2, minRds, maxRds)\n  - src : Input image\n  - method\
    \ : cv2.HOUGH_GRADIENT, only available\n    - cv.HOUGH_STANDARD\n    - cv.HOUGH_PROBABILISTIC\n\
    \    - cv.HOUGH_MULTI_SCALE\n    - cv.HOUGH_GRADIENT\n  - dp : Inverse proportion\
    \ rate of resolution between accumulator and input image\n    - 1: same, 2: ½,\
    \ small value : Increase accuracy,\n    - Big value: Increase # detected\n  -\
    \ minDst : Min value between center points of circle, 0=err, unable to detect\
    \ concentric circle\n  - circles : Circle Result, N x 1 x 3 (x, y, r)\n  - param1\
    \ : maxValue used for Canny Edge\n  - param2 : HUGH_GRADENT threshold ,\n    -\
    \ Small value: increase # detected, decrease accuracy\n  - minRadius, maxRadius:\
    \ Min radius of circule, max radius (if 0, size of image)"

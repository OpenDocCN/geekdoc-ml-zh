  md: "+   - [start, end, farthest, distance]\n  - start : Index of contour starting\
    \ convex angle\n  - end : Index of contour ending convex angle\n  - farthest:\
    \ Contour index of farthest from convex hull\n  - distance : Distance from farthest\
    \ to convex hull\n    - 8 bit fixed decimal (distance/256.0)\n\n# ❖ Convex Hull\n\
    \n+   - Example\n\n```\nimport cv2\nimport numpy as np\n\nimg = cv2.imread('../img/hand.jpg')\n\
    img2 = img.copy()\ngray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\nret, th = cv2.threshold(gray,\

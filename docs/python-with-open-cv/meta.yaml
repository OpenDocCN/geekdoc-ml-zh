    img2, contours, hierachy = cv2.findContours(th, cv2.RETR_EXTERNAL,\ncv2.CHAIN_APPROX_SIMPLE)\n\
    for c in contours:\n    mmt = cv2.moments(c)\n    cx = int(mmt['m10']/mmt['m00'])\n\
    \    cy = int(mmt['m01']/mmt['m00'])\n    a = mmt['m00']\n    l = cv2.arcLength(c,\
    \ True)\n    cv2.circle(img, (cx, cy), 5, (0, 255, 255), -1)\n    cv2.putText(img,\
    \ \"A:%.0f\"%a, (cx, cy+20) ,\ncv2.FONT_HERSHEY_PLAIN, 1, (0,0,255))\n    cv2.putText(img,\
    \ \"L:%.2f\"%l, tuple(c[0][0]),\ncv2.FONT_HERSHEY_PLAIN, 1, (255,0,0))\n    print(\"\
    area:%.2f\"%cv2.contourArea(c, False))\ncv2.imshow('center', img)\ncv2.waitKey(0)\n\
    cv2.destroyAllWindows()\n```\n\n- Center Point, Area, Circumference Example <Result>\n\
    \n![](img/9de0cb7cd12c1232044968590f57e471_255_0.png)\n\n### ❖ Bounding Shapes\n\
    \n- x,y,w,h = cv2.boundingRect(contour) : Calculate quadrangle surrounding coordination\n\
    \  - x, y : Left top coordination of quadrangle\n  - w, h : Width, Height\n- rotateRect\
    \ = cv2.minAreaRect(contour) : Minimum quadrangle surrounding coordination\n \
    \ - rotateRect : Coordination of rotated quadrangle\n    - center : Center point\
    \ (x,y)\n    - size : Size (w, h)\n    - angle : Rotation angle, positive: clockwise,\
    \ Negative: counter clockwise\n- vertex = cv2.boxPoints(rotateRect): Vertex coordination\
    \ from rotateRect\n  - vertex : 4 Vertex, including decimal, need to change to\
    \ integer\n- center, radius = cv2.minEnclosingCircle(contour) :\n  - Minimum circle\
    \ surrounding coordination\n  - center : Original coordination (x, y), Tuple\n\
    \  - radius : Radius\n- area, triangle = cv.minEnclosingTriangle(points) : Minimum\
    \ triangle surrounding coordination\n  - area : Area\n  - triangle : Coordination\
    \ of 3 vertex\n- ellipse = cv.fitEllipse( points ) : Coordination of minimum ellipse\
    \ surrounding coordination\n  - ellipse\n    - center : Center coordination(x,y),\
    \ Tuple\n    - axes : Length of axis(x, y), Tuple\n    - angle : Rotation Angle\n\
    - line = cv.fitLine( points, distType, param, reps, aeps[, line] ) : Calculate\
    \ straight line passing center point\n  - distType : Calculating distance\n  \
    \  - cv2.DIST_L2, cv2.DIST_L1, cv2.DIST_L12, cv2.DIST_FAIR, cv2.DIST_WELSCH, cv2.DIST_HUBER\n\
    \  - param : Parameter to deliver to distType, 0= Select optimal value\n  - reps\
    \ : Accuracy of radius, Distance between line and original coordination, Recommend\
    \ 0.01\n  - aeps : Angle accuracy, Recommend 0.01\n  - line\n    - vx, vy : Regular\
    \ unit vector, Slope of straight line, Tuple\n    - x0, y0 : Center point, coordination,\
    \ Tuple\n\n### ❖ Bounding Shapes\n\n- Example < 1/2 >\n\n```python\nimport cv2\n\
    import numpy as np\n\nimg = cv2.imread(\"../img/lightning.png\")\nimggray = cv2.cvtColor(img,\
    \ cv2.COLOR_BGR2GRAY)\nret, th = cv2.threshold(imggray, 127,255,cv2.THRESH_BINARY_INV)\n\
    \nim, contours, hr = cv2.findContours(th, cv2.RETR_EXTERNAL,\ncv2.CHAIN_APPROX_SIMPLE)\n\
    contr = contours[0]\n\nx,y,w,h = cv2.boundingRect(contr)\ncv2.rectangle(img, (x,y),\
    \ (x+w, y+h), (0,0,0), 3)\n\nrect = cv2.minAreaRect(contr)\nbox = cv2.boxPoints(rect)\
    \    # Convert center point and angle to 4 vertex coordinates\nbox = np.int0(box)\
    \           # Convert to integer\ncv2.drawContours(img, [box], -1, (0,255,0),\
    \ 3)\n```\n\n- Example < 2/2 >\n\n```python\n(x,y), radius = cv2.minEnclosingCircle(contr)\n\
    cv2.circle(img, (int(x), int(y)), int(radius), (255,0,0), 2)\n\nret, tri = cv2.minEnclosingTriangle(contr)\n\
    cv2.polylines(img, [np.int32(tri)], True, (255,0,255), 2)\n\nellipse = cv2.fitEllipse(contr)\n\
    cv2.ellipse(img, ellipse, (0,255,255), 3)\n\n[vx,vy,x,y] = cv2.fitLine(contr,\
    \ cv2.DIST_L2,0,0.01,0.01)\ncols,rows = img.shape[:2]\ncv2.line(img,(0, 0-x*(vy/vx)\
    \ + y), (cols-1, (cols-x)*(vy/vx) + y),(0,0,255),2)\n\ncv2.imshow('Bound Fit shapes',\
    \ img)\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\n- Example <Result>\n\n\
    ![](img/9de0cb7cd12c1232044968590f57e471_258_0.png)\n\n## Contour Approximation\n\
    \n- When accurate contour is inaccurate\n  - Noise, Erosion\n- Douglas-Peucker\
    \ Algorithm\n  - Set epsilon Value: Max distance from contour to approximate contour\n\

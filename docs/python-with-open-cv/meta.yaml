- md: "## Luca—Kaneda\n\n- Flow Example <Result>\n\n![](img/9de0cb7cd12c1232044968590f57e471_347_0.png)\n\
    \n## Dense Optical Flow\n\n- cv2.calcOpticalFlowFarneback(prev, next, flow, pyr_scale,\
    \ levels, winsize, iterations, poly_n, poly_sigma, flags)\n  - prev : Previous\
    \ image\n  - next : Next Frame\n  - flow : Calculation having same size as previous\
    \ frame for 32F type Resultflow, None\n  - pyr_scale : Pyramid scale, 0.5\n  -\
    \ levels : # of pyramid levels\n  - winsize : Average window size, Larger value\
    \ makes stronger algorithm.\n  - iteration : # of repeats in each pyramid\n  -\
    \ poly_n : # of neighboring pixel to use polynomial equation in each pixel, 5\
    \ or 7\n  - poly_sigma: Sigma value to use in Gaussian variation poly_n=5:1.1,\
    \ poly_n=7:1.5\n  - flags : Calculation Mode\n    - cv2.OPTFLOW_USE_INITIAL_FLOW:\
    \ Use flow value as initial value\n    - cv2.OPTFLOW_FARNEBACK_GAUSSIAN: Use box\
    \ filter instead of Gaussian filter\n  - Turnaround: Same size as input image,\
    \ Distance value of each pixel move\n\nExample <1/2>\n\n```python\nimport cv2,\
    \ numpy as np\n\ndef drawFlow(img,flow,step=16):\n    h,w = img.shape[:2]\n  \
    \  idx_y,idx_x = np.mgrid[step/2:h:step,step/2:w:step].astype(np.int)\n    indices\
    \ = np.stack((idx_x,idx_y), axis=-1).reshape(-1,2)\n\n    for x,y in indices:\
    \   # Index Tour\n        cv2.circle(img, (x,y), 1, (0,255,0), -1)\n        dx,dy\

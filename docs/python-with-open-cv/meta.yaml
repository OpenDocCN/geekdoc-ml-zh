  md: "# ❖ Mormalize\n\n+   - Evenly distribute pixel\n- If distribution of pixel\
    \ is centered on certain area, quality bad.\n    - Improve image quality\n\n-\
    \ $I_N = (I - Min)\\frac{newMax - newMin}{Max - Min} + newMin$\n    - $I$ : 정규화\
    \ 이전 값\n    - $Min, Max$ : 정규화전 범위 최소 값, 최대 값\n    - $newMin, newMax$ : 정규화 후\
    \ 최소 값, 최대 값\n    - $I_N$: 정규화 이후 값\n\n![](img/9de0cb7cd12c1232044968590f57e471_167_0.png)\n\
    \n+   - dst = cv2.normalize(src, dst, alpha, beta, type_flag)\n    - src : Previous\
    \ data before mormalize\n    - dst : Data after mormalize\n    - alpha : Mormalizing\
    \ area 1\n    - beta : Mormalizing area 2, Not in use when it is not sectional\
    \ mormalization\n    - type_flag : Flag integer selected for mormalization algorithm\n\
    \        - cv2.NORM_MINMAX : Mormalize by alpha & beta area\n        - cv2.NORM_L1\
    \ : Divide by total addition, alpha = Addition of all mormalization\n        -\
    \ cv2.NORM_L2 :Mormalize unit vector\n        - cv2.NORM_INF : Divide by maximum\
    \ number"

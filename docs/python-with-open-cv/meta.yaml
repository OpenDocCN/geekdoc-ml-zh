    ```

    import cv2

    import numpy as np

    import matplotlib.pylab as plt


    img = cv2.imread(''../img/bright.jpg'')

    img_yuv = cv2.cvtColor(img, cv2.COLOR_BGR2YUV)


    img_eq = img_yuv.copy()

    img_eq[:,:,0] = cv2.equalizeHist(img_eq[:,:,0])


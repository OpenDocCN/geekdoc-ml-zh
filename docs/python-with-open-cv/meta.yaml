    \ able to adjust window size\n    - cv2.WINDOW_AUTOSIZE: size same as window,\
    \ unable to readjust window size\n- `cv2.moveWindow(title, x, y)`: Move window\
    \ position\n  - title: Window title to change position\n  - x, y: Window position\
    \ to move\n- `cv2.resizeWindow(title, width, height)`: Change window size\n  -\
    \ title: Name of window to change size\n  - width, height: Width and height of\
    \ window to change\n- `cv2.destroyWindow(title)`: Close window\n  - title: Title\
    \ of window to close\n- `cv2.destroyAllWindows()`: Close all open window\n\n```python\n\
    import cv2\n\nfile_path = './img/girl.jpg'\nimg = cv2.imread(file_path)\nimg_gray\
    \ = cv2.imread(file_path, cv2.IMREAD_GRAYSCALE)\ncv2.namedWindow('origin', cv2.WINDOW_AUTOSIZE)\n\
    cv2.namedWindow('gray', cv2.WINDOW_NORMAL)\n\ncv2.imshow('origin', img)\ncv2.imshow('gray',\
    \ img_gray)\ncv2.moveWindow('origin', 0, 0)\ncv2.moveWindow('gray', 100, 100)\n\
    cv2.waitKey(0)\ncv2.resizeWindow('origin', 200, 200)\ncv2.resizeWindow('gray',\
    \ 100, 100)\ncv2.waitKey(0)\ncv2.destroyWindow(\"gray\")\ncv2.waitKey(0)\ncv2.destroyAllWindows()\n\
    ```\n\n## ❖ Window Management\n\n![](img/9de0cb7cd12c1232044968590f57e471_92_0.png)\n\
    \n## Basic Interface\n\n1. Image and Video I/O\n2. Drawing\n3. Window Management\n\
    4. **Event Handling**\n\n## Keyboard Event\n\n- `val = cv2.waitKey([ delay ])`:\
    \ Keyboard input standby, move only activated window\n  - delay=0: Standby time,\
    \ ms\n    - delay <= 0: Wait infinitely\n  - val: code of pressed key\n    - -1:\
    \ time out\n- Compare string of key code, Use with python internalized function\n\
    \  - `ord(c)`: Turnaround mapped code to c string\n    - ex: `ord('a')` #97\n\
    \  - `chr(code)`: Turnaround mapped string to code\n    - ex: `chr(97)` # 'a'\n\
    \  - `cv2.waitKey() == ord('a')`\n- ASCII(8bit) code overflow\n  - Turnaround\
    \ 32 bit integer at some 64bit environment, Need to initialize bit more than 8\
    \ bit\n  - `key = cv2.waitKey(0) & 0xFF`\n\n```python\nimport cv2\nimg_file =\
    \ \"./img/girl.jpg\"\nimg = cv2.imread(img_file)\ntitle = 'IMG'              \
    \  # Window Title\nx, y = 100, 100              # Initial Coordination\nwhile\
    \ True:\n    cv2.imshow(title, img)\n    cv2.moveWindow(title, x, y)\n    key\
    \ = cv2.waitKey(0) & 0xFF # Wait infinitely for keyboard input, 8 bit mask work\n\
    \    print(key, chr(key))        # Keyboard input value, print string value\n\
    \    if key == ord('h'):         # Move left with 'h'\n        x -= 10\n    elif\
    \ key == ord('j'):       # Move down with 'j'\n        y += 10\n    elif key ==\
    \ ord('k'):       # Move up with 'k'\n        y -= 10\n    elif key == ord('l'):\
    \       # Move right with 'l'\n        x += 10\n    elif key == ord('q') or key\
    \ == 27: # End if 'q' or 'esc'\n        break\n    cv2.destroyAllWindows()\n \
    \   cv2.moveWindow(title, x, y)\n```\n\n## Mouse Event\n\n- `cv2.setMouseCallback(win_name,\
    \ onMouse [, param])`: Register onMouse function\n  - win_name: Window title to\
    \ register event\n  - onMouse: Callback function object declared in advance for\
    \ the event\n  - param: Parameter to be delivered to onMouse function as needed\n\
    - `MouseCallback(event, x, y, flags, param)`: Callback function declaration\n\
    \  - event: Mouse event type, All 12 types integer beginning with cv2.EVENT_\n\
    \  - x, y: Mouse coordination\n  - flags: Extra state happened with mouse move,\
    \ All 6 types integer beginning with cv2.EVENT_FLAG_\n  - param: cv2.setMouseCallback()\
    \ Parameter delivered from function\n\n```python\ndef onMouse(event, x, y, flags,\
    \ param):\n    #Draft work fit to the mouse event.\n    pass\n\ncv2.setMouseCallback('title',\
    \ onMouse)\n```\n\n## Mouse Event and Flags Type\n\n- `cv2.EVENT_*`\n\n```python\n\
    import cv2\n\nevents = [i for i in dir(cv2) if 'EVENT_' in i]\nprint( len(events)\
    \ ,\"events\" )\nprint( events )\n```\n\n```\n18 events\n['EVENT_FLAG_ALTKEY',\
    \ 'EVENT_FLAG_CTRLKEY', 'EVENT_FLAG_LBUTTON',\n'EVENT_FLAG_MBUTTON', 'EVENT_FLAG_RBUTTON',\
    \ 'EVENT_FLAG_SHIFTKEY',\n'EVENT_LBUTTONDBLCLK', 'EVENT_LBUTTONDOWN', 'EVENT_LBUTTONUP',\n\
    'EVENT_MBUTTONDBLCLK', 'EVENT_MBUTTONDOWN', 'EVENT_MBUTTONUP',\n'EVENT_MOUSEHWHEEL',\
    \ 'EVENT_MOUSEMOVE', 'EVENT_MOUSEWHEEL',\n'EVENT_RBUTTONDBLCLK', 'EVENT_RBUTTONDOWN',\
    \ 'EVENT_RBUTTONUP']\n```\n\n## Mouse Event Type\n\n- cv2.EVENT_MOUSEMOVE: Move\

    ## Part III


    ## Applications of Orthogonal Kernels


    ## Chapter 7

    Solving Ordinary Differential Equations

    by LS-SVM


    Mohsen Razzaghi, Simin Shekarpaz, and Alireza Rajabi


    **Abstract** In this chapter, we propose a machine learning method for solving
    a class of linear and nonlinear ordinary differential equations (ODEs) which is
    based on the least squares-support vector machines (LS-SVM) with collocation procedure.
    One of the most important and practical models in this category is Lane-Emden
    type equations. By using LS-SVM for solving these types of equations, the solution
    is expanded based on rational Legendre functions and the LS-SVM formulation is
    presented. Based on this, the linear problems are solved in dual form and a system
    of linear algebraic equations is concluded. Finally, by presenting some numerical
    examples, the results of the current method are compared with other methods. The
    comparison shows that the proposed method is fast and highly accurate with exponential
    convergence.


    **Keywords** Lane-Emden differential equation · Collocation method · Rational
    Legendre functions


    ### 7.1 Introduction


    Differential equations are a kind of mathematical equation that can be used for
    modeling many physical and engineering problems in real life, such as dynamics
    of oscillators, cosmology, study of the solar system, the study of unsteady gases,
    fluid dynamics, and many other applications (see, e.g., Liu et al. 2018; Rodrigues
    et al. 2018; Anderson et al. 2016; Khoury et al. 2018; Farzaneh-Gord and Rahbari
    2016; Lusch et al. 2018; Bristeau et al. 1979; Parand et al. 2011; Parand and
    Rad 2012; Kazem et al. 2011; Parand et al. 2016; Kazem et al. 2012; Parand et
    al. 2012, 2017; Abbasbandy et al. 2013). In the meantime, Lane-Emden type equations
    are an important class of ordinary differential equations on the semi-infinite
    domain which was introduced by Jonathan Homer Lane and by Emden as a model for
    the temperature of the sun Lane (1870); Emden (1907). These equations have found
    many interesting applications in modeling many physical phenomena such as the
    theory of stellar structure, thermal behavior of a spherical cloud of gas, isothermal
    gas spheres, and the theory of thermionic currents Chandrasekhar and Chandrasekhar
    (1957), Wood (1921). As one of the important applications, it can be said that
    in astrophysics, this equation describes the equilibrium density distribution
    in the self-gravitating sphere of polytropic isothermal gas.


    The general form of the Lane-Emden equation is as follows Hadian Rasanana et al.
    (2020), Parand et al. (2010), Omidi et al. (2021):


    $$y''''(x) + \frac{k}{x}y''(x) + f(x, y(x)) = h(x),$$

    $$y(x_0) = A, \quad y''(x_0) = B,$$


    where $A$, $B$ are constants and $f(x, y)$ and $h(x)$ are given functions of $x$
    and $y$.


    Some of these equations do not have an exact solution, and as a result of their
    singularity at $x = 0$, their numerical solutions are a challenge for scientists
    Parand et al. (2009, 2010). Many semi-analytical and numerical approaches have
    been applied to solve the Lane-Emden equations, which can be presented as follows:
    In Bender et al. (1989), a new perturbation technique based on an artificial parameter
    $\delta$ proposed to solve the Lane-Emden equation. Also, a non-perturbative analytical
    solution of this equation was derived in Shawagfeh (1993) by the Adomian decomposition
    method (ADM). On the other hand, Mandelzweig et al. (2001) used the quasi-linearization
    method for solving the standard Lane-Emden equation, and Liao (2003) produced
    an analytical framework based on the Adomian decomposition method for Lane-Emden
    type equations. The approach based on semi-analytical methods continued as He
    (2003) obtained the analytical solutions to the problem by using Ritz''s variational
    method. Also, in Wazwaz (2006), the modified decomposition method for the analytic
    behavior of nonlinear differential equations was used, and Yildirim et al. (2007)
    obtained approximate solutions of a class of Lane-Emden equations by homotopy
    perturbation method (HPM). Following this approach, Ramos (2005) solved Lane-Emden
    equations by using a linearization method and a series solution has been suggested
    in Ramos (2008). Those solutions were obtained by writing this equation as a Volterra
    integral equation and assuming that the nonlinearities are smooth. Then, Dehghan
    (2006; 2008) proposed the Adomian decomposition method for differential equations
    with an alternate procedure to overcome the difficulty of singularity. Also, Aslanov
    (2008) introduced an improved Adomian decomposition method for non-homogeneous,
    linear, and nonlinear Lane-Emden type equations. On the other hand, Dehghan and
    Shakeri (2008) used an exponential transformation for the Lane-Emden type equations
    to overcome the difficulty of a singular point at $x = 0$ and the resulting nonsingular
    problem solved by the variational iteration method (VIM). The use of two important
    analytical approaches, namely the homotopy analysis method (HAM) and HPM, seems
    to have been so common. For example, Singh et al. (2009) proposed an efficient
    analytic algorithm for the Lane-Emden type equations using a modified homotopy
    analysis method. Also, Bataineh et al. (2009) proposed a homotopy analysis method
    to obtain the analytical solutions of the singular IVPs of the Emden-Fowler type,
    and in Chowdhury and Hashim (2009), Chowdhury et al. applied an algorithm based
    on the homotopy perturbation method to solve singular IVPs of the Emden-Fowler
    type. However, robust numerical approaches have also been used for these studies.
    In Yousefi (2006), a numerical method was provided for solving the Lane-Emden
    equations. In that work, by using the integral operator and Legendre wavelet approximation,
    the problem is converted into an integral equation. Also, Marzban et al. (2008)
    applied the properties of a hybrid of block-pulse functions together with the
    Lagrange interpolating polynomials for solving the nonlinear second-order initial
    value problems and the Lane-Emden equation. Then, Parand et al. (2009) presented
    a numerical technique based on the rational Legendre approach to solving higher
    ordinary differential equations such as Lane-Emden. In Parand et al. (2010), have
    applied an algorithm for the nonlinear Lane-Emden problems, using Hermite functions
    collocation methods. On the other hand, Pandey and Kumar (2010) presented an efficient
    and accurate method for solving Lane-Emden type equations arising in astrophysics
    using Bernstein polynomials. Recently, in Yüzbaşı and Sezer (2013), the linear
    Lane-Emden equations solved by the Bessel collocation method and the error of
    the problem were also obtained. More recently, Parand and Khaleghi (2016) also
    suggested a rational Chebyshev of the second kind collocation method to solve
    the Lane-Emden equation. For analysis of the Lane-Emden equation based on the
    Lie symmetry approach, we refer the interested reader Kara and Mahomed (1992,
    1993). This important model has been carefully examined from a simulation point
    of view with more numerical methods (see Hossayni et al. 2015; Parand et al. 2013),
    but due to the weaknesses of the performance of these approaches in complex dynamic
    models, one of the current trends for solving and simulating dynamic models based
    on ODEs and partial differential equations (PDEs) is neural networks (NN). In
    fact, NN is a machine learning technique to obtain the numerical solution of higher-order
    ODE and partial differential equations (PDEs) which has been proposed by many
    researchers. For example, Lagaris et al (1998) solved some well-known ODEs by
    using a neural network. Also, in Malek and Beidokhti (2006), a hybrid numerical
    method based on an artificial neural network and optimization technique was studied
    for solving directly higher-order ODEs. More importantly, a regression-based artificial
    neural network method was analyzed by Chakraverty and Mall in Mall and Chakraverty
    (2014) to solve ODEs where a single layer Chebyshev neural network was suggested
    to solve the Lane-Emden equation. On the other hand, Mall and Chacraverty (2015)
    solved Emden-Fowler equations by using Chebyshev neural network. They also used
    a Legendre neural network to solve the Lane-Emden'

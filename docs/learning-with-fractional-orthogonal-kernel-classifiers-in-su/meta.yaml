    and α > 0. By applying this transformation, the fractional order of Jacobi functions
    is obtained which is denoted by FJ_n^{ψ,ω,α}(x) as follows:


    FJ_n^{ψ,ω,α}(x) = J_n^{ψ,ω}(2(\frac{x-a}{b-a})^α - 1). \tag{6.21}


    The fractional order of Jacobi function is orthogonal over the interval [-1, 1]
    with the following weight function Doman (2015), Askey (1975), Hadian et al. (2020):


    w^{ψ,ω,α}(x) = (1 - (2(\frac{x-a}{b-a})^α - 1) - ε)^ψ (1 + (2(\frac{x-a}{b-a})^α
    - 1) + ε)^ω. \tag{6.22}


    Similarly, there exists a Sturm–Liouville differential equation for the fractional
    order of Jacobi functions. This Sturm–Liouville equation is as follows Doman (2015),
    Askey (1975), Hadian et al. (2020):


    \frac{d}{dx} ((1 - (2(\frac{x-a}{b-a})^α - 1) - ε)^{ψ+1} (1 + (2(\frac{x-a}{b-a})^α
    - 1) + ε)^{ω+1} \frac{d}{dx} J_n^{ψ,ω}(x)) + (1 - (2(\frac{x-a}{b-a})^α - 1) -
    ε)^ψ (1 + (2(\frac{x-a}{b-a})^α - 1) + ε)^ω ρ_n J_n^{ψ,ω}(x) = 0, \tag{6.23}


    where ρ_n = n(n + ψ + ω + 1). By applying the mapping z = 2(\frac{x-a}{b-a})^α
    - 1 to the generating function defined for Jacobi polynomials, one can get the
    equation for the fractional form:


    \frac{2^{ψ,ω}}{R(1 + R - (2(\frac{x-a}{b-a})^α - 1)^ψ (1_R + (2(\frac{x-a}{b-a})^α
    - 1)^ψ)^ω} = \sum_{n=0}^{\infty} FJ_n^{ψ,ω,α}(x) ((2(\frac{x-a}{b-a})^α - 1)^ψ)^n.
    \tag{6.24}


    where


    R = \sqrt{1 - 2x((2(\frac{x-a}{b-a})^α - 1)^ψ) + ((2(\frac{x-a}{b-a})^α - 1)^ψ)^2},


    and (2(\frac{x-a}{b-a})^α - 1)^ψ ∈ [-1, 1].'

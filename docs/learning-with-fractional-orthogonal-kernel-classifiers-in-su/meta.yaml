    The problem with this formulation is that when solving the differential equation,
    we don''t have the value of $y_i$, and therefore, we put the differential equation
    in our model. The collocation form of equations is used as the constraint of our
    optimization problem.


    To solve the optimization problem, the kernel trick is used and the problem is
    transformed into a dual form.


    # 7.2.1 Collocation Form of LS-SVM


    In the case that LS-SVM is used to solve a linear ODE, the approximate solution
    is obtained by solving the following optimization problem Mehrkanoon et al. (2012),
    Pakniyat et al. (2021):


    $$\begin{aligned} \text{minimize}_{w,\varepsilon} \quad & \frac{1}{2}w^Tw + \frac{\gamma}{2}\varepsilon^T\varepsilon,
    \ \text{subject to} \quad & L[\tilde{y}_i] - F(x_i) = \varepsilon_i, \quad i =
    0, 1, \ldots, N, \end{aligned}$$


    where $\varepsilon = [\varepsilon_0, \ldots, \varepsilon_N]^T$ and $\tilde{y}$
    is the approximate solution, which is written in terms of the basis functions,
    to satisfy the initial conditions. The collocation points $\{x_i\}_{i=0}^N$ are
    also chosen to be the roots of rational Legendre functions in the learning phase.


    Now we introduce a dual form of the problem:


    > **Theorem 7.1** (Mehrkanoon et al. (2012)) *Suppose that $\varphi_i$ be the
    basis functions and $\boldsymbol{\alpha} = [\alpha_0, \alpha_1, \ldots, \alpha_N]^T$
    be the Lagrangian coefficients in the dual form of the minimization problem Eq.
    7.4, then the solution of minimization problem is as follows:*


    $$w = M\boldsymbol{\alpha} = \begin{pmatrix} L(\varphi_0(x_0)) & L(\varphi_0(x_1))
    & \ldots & L(\varphi_0(x_N)) \ L(\varphi_1(x_0)) & \ldots & \ldots & L(\varphi_1(x_N))
    \ \ldots & \ldots & \ldots & \ldots \ L(\varphi_N(x_0)) & L(\varphi_N(x_1)) &
    \ldots & L(\varphi_N(x_N)) \end{pmatrix} \begin{pmatrix} \alpha_0 \ \alpha_1 \
    . \ . \ \alpha_N \end{pmatrix}, \quad \varepsilon = \frac{\boldsymbol{\alpha}}{\gamma}
    = \begin{pmatrix} \frac{1}{\gamma}\alpha_0 \ \frac{1}{\gamma}\alpha_1 \ . \ .
    \ \frac{1}{\gamma}\alpha_N \end{pmatrix},$$


    where


    $$(M^TM + \frac{1}{\gamma}I)\boldsymbol{\alpha} = \boldsymbol{F},$$


    and $\boldsymbol{F} = [F(x_0), F(x_1), \ldots, F(x_N)]^T$.'

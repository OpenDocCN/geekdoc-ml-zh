    and Van Der Veer 2001; Cheung and See 2021）。特别是，他们已经成功尝试解决一些常见数值方法难以解决的难题，例如通过噪声观测求解偏微分方程或求解非常高维的偏微分方程。一些近期的基于机器学习的数值方法包括物理信息神经网络（PINN）（Raissi

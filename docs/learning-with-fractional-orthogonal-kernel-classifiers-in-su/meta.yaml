- md: '## 2.3 SVM Regressors


    The support vector machine model for classification tasks can be modified for
    the regression problems. This can be achieved by applying the $\epsilon$-insensitive
    loss function to the model Drucker et al. (1997). This loss function is defined
    as


    $$\text{loss}(y, \hat{y}; \epsilon) = |y - \hat{y}|_\epsilon = \begin{cases} 0
    & |y - \hat{y}| \leq \epsilon, \\ |y - \hat{y}| - \epsilon & \text{otherwise},
    \end{cases}$$


    where $\epsilon \in \mathbb{R}^+$ is a hyper-parameter which specifies the $\epsilon$-tube.
    Every predicted point outside this tube will incorporate in the model with a penalty.
    The unknown function is also defined as


    $$y(\mathbf{x}) = \mathbf{w}^T \phi(\mathbf{x}) + w_0,$$


    where $\mathbf{x} \in \mathbb{R}^d$ and $y \in \mathbb{R}$. The formulation of
    the primal form of the support vector regression model is constructed as


    $$\min_{\mathbf{w}, w_0, \xi, \xi^*} \quad \frac{1}{2} \mathbf{w}^T \mathbf{w}
    + C \sum_{i=1}^N (\xi_i + \xi_i^*)$$

    $$\text{s.t.} \quad y_i - \mathbf{w}^T \phi(\mathbf{x}_i) - w_0 \leq \varepsilon
    + \xi_i, \quad i = 1, \dots, N, \quad (2.39)$$

    $$\mathbf{w}^T \phi(\mathbf{x}_i) + w_0 - y_i \leq \varepsilon + \xi_i^*, \quad
    i = 1, \dots, N,$$

    $$\xi_i, \xi_i^* \geq 0, \quad i = 1, \dots, N.$$


    Using the Lagrangian multipliers, the dual form of this optimization problem leads
    to


    $$\max_{\alpha, \alpha^*} -\frac{1}{2} \sum_{i,j=1}^N (\alpha_i - \alpha_i^*)
    (\alpha_j - \alpha_j^*) K(\mathbf{x}_i, \mathbf{x}_j) - \epsilon \sum_{i=1}^N
    (\alpha_i + \alpha_i^*) + \sum_{i=1}^N y_i (\alpha_i - \alpha_i^*)$$


    $$\text{s.t.} \sum_{i=1}^N (\alpha_i - \alpha_i^*) = 0,$$


    $$\alpha_i, \alpha_i^* \in [0, C].$$


    The bias variable $w_0$ follows the KKT conditions


    $$w_0 = \frac{1}{|S|} \sum_{s \in S} \left[ y_s - \epsilon - \sum_{i=1}^N (\alpha_i
    - \alpha_i^*) K(\mathbf{x}_s, \mathbf{x}_i) \right],$$


    where $|S|$ is the cardinality of support vectors set. The unknown function $y(\mathbf{x})$
    in the dual form can be computed as


    $$y(\mathbf{x}) = \sum_{i=1}^N (\alpha_i - \alpha_i^*) K(\mathbf{x}, \mathbf{x}_i)
    + w_0.$$


    ## 2.4 LS-SVM Classifiers


    The least squares support vector machine (LS-SVM) is a modification of SVM formulation
    for machine learning tasks which was originally proposed by Suykens and Vandewalle
    (1999). The LS-SVM replaces the inequality constraints of SVM''s primal model
    with equality ones. Also, the slack variables loss function changes to the squared
    error loss function. Taking advantage of these changes, the dual problem leads
    to a system of linear equations. Solving this system of linear equations can be
    more computationally efficient than a quadratic programming problem in some cases.
    Although this reformulation preserves the kernel trick property, the sparseness
    of the model is lost. Here, the formulation of LS-SVM for two-class classification
    tasks will be described.


    Same as support vector machines, the LS-SVM considers the separating hyperplane
    in a feature space:


    $$y(\mathbf{x}) = \text{sign} \left[ \mathbf{w}^T \phi(\mathbf{x}) + w_0 \right].$$


    $K(\mathbf{x}, \mathbf{t}) = (1 + \mathbf{x}^T \mathbf{t})^2$

    $= (1 + x_1 t_1 + x_2 t_2)^2$

    $= 1 + 2x_1 t_1 + 2x_2 t_2 + x_1^2 t_1^2 + x_2^2 t_2^2 + 2x_1 t_1 x_2 t_2.$


    As can be seen, the expansion of this kernel function equals to the inner product
    of the following second-order $\phi$''s:


    $\phi(\mathbf{x}) = [1, \sqrt{2}x_1, \sqrt{2}x_2, x_1^2, x_2^2, \sqrt{2}x_1 x_2],$

    $\phi(\mathbf{t}) = [1, \sqrt{2}t_1, \sqrt{2}t_2, t_1^2, t_2^2, \sqrt{2}t_1 t_2].$


    So, we can substitute the dot product $\phi(\mathbf{x})^T \phi(\mathbf{t})$ with
    the kernel function $K(\mathbf{x}, \mathbf{t}) = (1 + \mathbf{x}^T \mathbf{t})^2$
    without directly calculating $\phi(\mathbf{x})$ and $\phi(\mathbf{t})$.


    The polynomial kernel function can similarly be generalized to $d$-dimensional
    feature space $\mathbf{x} = [x_1, \dots, x_d]$ where $\phi$''s are polynomials
    of order $M$ as follows:


    $\phi(\mathbf{x}) = [1, \sqrt{2}x_1, \dots, \sqrt{2}x_d, x_1^2, \dots, x_d^2,
    \sqrt{2}x_1 x_2, \dots,$

    $\sqrt{2}x_1 x_d, \sqrt{2}x_2 x_3, \dots, \sqrt{2}x_{d-1} x_d]^T.$


    The following polynomial kernel function can indeed be efficiently computed with
    a cost proportional to $d$ (the dimension of $\mathbf{x}$) instead of $k$ (the
    dimension of $\phi(\mathbf{x})$)


    $K(\mathbf{x}, \mathbf{t}) = (1 + \mathbf{x}^T \mathbf{t})^M = (1 + x_1 t_1 +
    x_2 t_2 + \dots, x_d t_d)^M.$


    In many cases, the inner product in the embedding space can be computed efficiently
    by defining a kernel function. Some common kernel functions are listed below:


    - $K(\mathbf{x}, \mathbf{t}) = \mathbf{x}^T \mathbf{t},$

    - $K(\mathbf{x}, \mathbf{t}) = (\mathbf{x}^T \mathbf{t} + 1)^M,$

    - $K(\mathbf{x}, \mathbf{t}) = \exp(-\frac{\|\mathbf{x}-\mathbf{t}\|^2}{\gamma}),$

    - $K(\mathbf{x}, \mathbf{t}) = \tanh(a\mathbf{x}^T \mathbf{t} + b).$


    These functions are known as linear, polynomial, Gaussian, and sigmoid kernels,
    respectively Cheng et al. (2017).


    A valid kernel corresponds to an inner product in some feature space. A necessary
    and sufficient condition to check the validity of a kernel function is the Mercer
    condition Mercer (1909). This condition states that any symmetric positive definite
    matrix can be regarded as a kernel matrix. By restricting a kernel function to
    a set of points $\{\mathbf{x}_1, \dots, \mathbf{x}_N\}$, the corresponding kernel
    matrix $K_{N \times N}$ is a matrix that the element in row $i$ and column $j$
    is $K(\mathbf{x}_i, \mathbf{x}_j)$ as follows:


    $K = \begin{bmatrix} K(\mathbf{x}_1, \mathbf{x}_1) & \dots & K(\mathbf{x}_1, \mathbf{x}_N)
    \\ \vdots & \ddots & \vdots \\ K(\mathbf{x}_N, \mathbf{x}_1) & \dots & K(\mathbf{x}_N,
    \mathbf{x}_N) \end{bmatrix}.$


    In other words, a real-valued function $K(\mathbf{x}, \mathbf{t})$ satisfies Mercer
    condition if for any square-integrable function $g(\mathbf{x})$, we have


    $$\int \int g(\mathbf{x}) K(\mathbf{x}, \mathbf{t}) g(\mathbf{t}) \mathrm{d}\mathbf{x}
    \mathrm{d}\mathbf{t} \geq 0. \tag{2.35}$$


    Therefore, using a valid and suitable kernel function, the optimization problem
    Eq. 2.29 becomes the following problem:


    $$\begin{aligned} \max_{\alpha} & \left\{ \sum_{i=1}^{N} \alpha_i - \frac{1}{2}
    \sum_{i=1}^{N} \sum_{j=1}^{N} \alpha_i \alpha_j y_i y_j K(\mathbf{x}_i, \mathbf{x}_j)
    \right\} \tag{2.36} \\ \text{s.t.} & \sum_{i=1}^{N} \alpha_i y_i = 0, \\ & 0 \leq
    \alpha_i \leq C, \quad i = 1, \ldots, N, \end{aligned}$$


    which is still a convex QP problem and is solved to find $\alpha_i$''s. Moreover,
    for classifying new data, the similarity of the input sample $\mathbf{x}$ is compared
    with all training data corresponding to the support vectors by the following formula:


    $$\hat{y} = \text{sign}\left(w_0 + \sum_{\alpha_i > 0} \alpha_i y_i K(\mathbf{x}_i,
    \mathbf{x})\right), \tag{2.37}$$


    where


    $$w_0 = y_{s_j} - \sum_{\alpha_i > 0} \alpha_i y_i K(\mathbf{x}_i, \mathbf{x}_{s_j}),
    \tag{2.38}$$


    such that $\mathbf{x}_{s_j}$ is an arbitrary sample from the support vectors set.


    Now it is important to mention some theorems about producing new kernels based
    on known kernel functions.


    **Theorem 2.1** *A non-negative linear combination of some valid kernel functions
    is also a valid kernel function [Zanaty and Afifi (2011)].*


    **Proof** Let''s $K_1, \ldots, K_m$ satisfy the Mercer condition, we are going
    to show, $K_{new} = \sum_{i=1}^{m} a_i K_i$ where $a_i \geq 0$ satisfies the Mercer
    condition too. So, we have


    $$\begin{aligned} \int \int g(\mathbf{x}) K_{new}(\mathbf{x}, \mathbf{t}) g(\mathbf{t})
    \mathrm{d}\mathbf{x} \mathrm{d}\mathbf{t} &= \int \int g(\mathbf{x}) \sum_{i=1}^{m}
    a_i K_i(\mathbf{x}, \mathbf{t}) g(\mathbf{t}) \mathrm{d}\mathbf{x} \mathrm{d}\mathbf{t}
    \\ &= \sum_{i=1}^{m} a_i \int \int g(\mathbf{x}) K_i(\mathbf{x}, \mathbf{t}) g(\mathbf{t})
    \mathrm{d}\mathbf{x} \mathrm{d}\mathbf{t} \\ &\geq 0. \end{aligned}$$


    **Theorem 2.2** *The product of some valid kernel functions is also a valid kernel
    function [Zanaty and Afifi (2011)].*


    *Proof* A similar way can be applied to this theorem. □


    The first implication of Theorems 2.1 and 2.2 is if $K$ be a valid Mercer kernel
    function, then any polynomial function with positive coefficients of $K$ makes
    also a valid Mercer kernel function. On the other hand, the $\exp(K)$ also makes
    a valid Mercer kernel function (i.e., consider Maclaurin expansion of $\exp()$
    for the proof) Genton (2001), Shawe-Taylor and Cristianini (2004).'
  mdcn: '## 2.3 支持向量回归


    用于分类任务的支持向量机模型可以被修改以解决回归问题。这可以通过将 $\epsilon$-不敏感损失函数应用于模型来实现 Drucker et al. (1997)。该损失函数定义为


    $$\text{loss}(y, \hat{y}; \epsilon) = |y - \hat{y}|_\epsilon = \begin{cases} 0
    & |y - \hat{y}| \leq \epsilon, \\ |y - \hat{y}| - \epsilon & \text{otherwise},
    \end{cases}$$


    其中 $\epsilon \in \mathbb{R}^+$ 是一个超参数，它指定了 $\epsilon$-管道。任何落在该管道之外的预测点都会在模型中引入惩罚项。未知函数也定义为


    $$y(\mathbf{x}) = \mathbf{w}^T \phi(\mathbf{x}) + w_0,$$


    其中 $\mathbf{x} \in \mathbb{R}^d$ 且 $y \in \mathbb{R}$。支持向量回归模型的原始形式构建如下


    $$\min_{\mathbf{w}, w_0, \xi, \xi^*} \quad \frac{1}{2} \mathbf{w}^T \mathbf{w}
    + C \sum_{i=1}^N (\xi_i + \xi_i^*)$$

    $$\text{s.t.} \quad y_i - \mathbf{w}^T \phi(\mathbf{x}_i) - w_0 \leq \varepsilon
    + \xi_i, \quad i = 1, \dots, N, \quad (2.39)$$

    $$\mathbf{w}^T \phi(\mathbf{x}_i) + w_0 - y_i \leq \varepsilon + \xi_i^*, \quad
    i = 1, \dots, N,$$

    $$\xi_i, \xi_i^* \geq 0, \quad i = 1, \dots, N.$$


    使用拉格朗日乘子，该优化问题的对偶形式为


    $$\max_{\alpha, \alpha^*} -\frac{1}{2} \sum_{i,j=1}^N (\alpha_i - \alpha_i^*)
    (\alpha_j - \alpha_j^*) K(\mathbf{x}_i, \mathbf{x}_j) - \epsilon \sum_{i=1}^N
    (\alpha_i + \alpha_i^*) + \sum_{i=1}^N y_i (\alpha_i - \alpha_i^*)$$


    $$\text{s.t.} \sum_{i=1}^N (\alpha_i - \alpha_i^*) = 0,$$


    $$\alpha_i, \alpha_i^* \in [0, C].$$


    偏置变量 $w_0$ 遵循 KKT 条件


    $$w_0 = \frac{1}{|S|} \sum_{s \in S} \left[ y_s - \epsilon - \sum_{i=1}^N (\alpha_i
    - \alpha_i^*) K(\mathbf{x}_s, \mathbf{x}_i) \right],$$


    其中 $|S|$ 是支持向量集的基数。对偶形式中的未知函数 $y(\mathbf{x})$ 可以计算为


    $$y(\mathbf{x}) = \sum_{i=1}^N (\alpha_i - \alpha_i^*) K(\mathbf{x}, \mathbf{x}_i)
    + w_0.$$


    ## 2.4 最小二乘支持向量机分类器


    最小二乘支持向量机 (LS-SVM) 是对机器学习任务中 SVM 公式的一种修改，最初由 Suykens 和 Vandewalle (1999) 提出。LS-SVM
    将 SVM 原始模型中的不等式约束替换为等式约束。此外，松弛变量损失函数变为平方误差损失函数。利用这些变化，对偶问题转化为一个线性方程组。在某些情况下，求解这个线性方程组可能比求解二次规划问题在计算上更高效。尽管这种重新表述保留了核技巧的特性，但模型的稀疏性丢失了。这里将描述用于两类分类任务的
    LS-SVM 公式。


    与支持向量机相同，LS-SVM 在特征空间中考虑分离超平面：


    $$y(\mathbf{x}) = \text{sign} \left[ \mathbf{w}^T \phi(\mathbf{x}) + w_0 \right].$$


    $K(\mathbf{x}, \mathbf{t}) = (1 + \mathbf{x}^T \mathbf{t})^2$

    $= (1 + x_1 t_1 + x_2 t_2)^2$

    $= 1 + 2x_1 t_1 + 2x_2 t_2 + x_1^2 t_1^2 + x_2^2 t_2^2 + 2x_1 t_1 x_2 t_2.$


    可以看出，该核函数的展开式等于以下二阶 $\phi$ 的内积：


    $\phi(\mathbf{x}) = [1, \sqrt{2}x_1, \sqrt{2}x_2, x_1^2, x_2^2, \sqrt{2}x_1 x_2],$

    $\phi(\mathbf{t}) = [1, \sqrt{2}t_1, \sqrt{2}t_2, t_1^2, t_2^2, \sqrt{2}t_1 t_2].$


    因此，我们可以用核函数 $K(\mathbf{x}, \mathbf{t}) = (1 + \mathbf{x}^T \mathbf{t})^2$ 来替代点积
    $\phi(\mathbf{x})^T \phi(\mathbf{t})$，而无需直接计算 $\phi(\mathbf{x})$ 和 $\phi(\mathbf{t})$。


    多项式核函数可以类似地推广到 $d$ 维特征空间 $\mathbf{x} = [x_1, \dots, x_d]$，其中 $\phi$ 是 $M$ 阶多项式，如下所示：


    $\phi(\mathbf{x}) = [1, \sqrt{2}x_1, \dots, \sqrt{2}x_d, x_1^2, \dots, x_d^2,
    \sqrt{2}x_1 x_2, \dots,$

    $\sqrt{2}x_1 x_d, \sqrt{2}x_2 x_3, \dots, \sqrt{2}x_{d-1} x_d]^T.$


    以下多项式核函数确实可以高效地计算，其计算成本与 $d$（$\mathbf{x}$ 的维度）成正比，而不是与 $k$（$\phi(\mathbf{x})$
    的维度）成正比


    $K(\mathbf{x}, \mathbf{t}) = (1 + \mathbf{x}^T \mathbf{t})^M = (1 + x_1 t_1 +
    x_2 t_2 + \dots, x_d t_d)^M.$


    在许多情况下，通过定义核函数可以高效地计算嵌入空间中的内积。下面列出了一些常见的核函数：


    - $K(\mathbf{x}, \mathbf{t}) = \mathbf{x}^T \mathbf{t},$

    - $K(\mathbf{x}, \mathbf{t}) = (\mathbf{x}^T \mathbf{t} + 1)^M,$

    - $K(\mathbf{x}, \mathbf{t}) = \exp(-\frac{\|\mathbf{x}-\mathbf{t}\|^2}{\gamma}),$

    - $K(\mathbf{x}, \mathbf{t}) = \tanh(a\mathbf{x}^T \mathbf{t} + b).$


    这些函数分别被称为线性核、多项式核、高斯核和 Sigmoid 核 Cheng et al. (2017)。


    一个有效的核对应于某个特征空间中的内积。检查核函数有效性的充要条件是 Mercer 条件 Mercer (1909)。该条件指出，任何对称正定矩阵都可以被视为核矩阵。通过将核函数限制在一组点
    $\{\mathbf{x}_1, \dots, \mathbf{x}_N\}$ 上，相应的核矩阵 $K_{N \times N}$ 是一个矩阵，其第 $i$
    行第 $j$ 列的元素是 $K(\mathbf{x}_i, \mathbf{x}_j)$，如下所示：


    $K = \begin{bmatrix} K(\mathbf{x}_1, \mathbf{x}_1) & \dots & K(\mathbf{x}_1, \mathbf{x}_N)
    \\ \vdots & \ddots & \vdots \\ K(\mathbf{x}_N, \mathbf{x}_1) & \dots & K(\mathbf{x}_N,
    \mathbf{x}_N) \end{bmatrix}.$


    换句话说，一个实值函数 $K(\mathbf{x}, \mathbf{t})$ 满足 Mercer 条件，如果对于任何平方可积函数 $g(\mathbf{x})$，我们有


    $$\int \int g(\mathbf{x}) K(\mathbf{x}, \mathbf{t}) g(\mathbf{t}) \mathrm{d}\mathbf{x}
    \mathrm{d}\mathbf{t} \geq 0. \tag{2.35}$$


    因此，使用一个有效且合适的核函数，优化问题 Eq. 2.29 变为以下问题：


    $$\begin{aligned} \max_{\alpha} & \left\{ \sum_{i=1}^{N} \alpha_i - \frac{1}{2}
    \sum_{i=1}^{N} \sum_{j=1}^{N} \alpha_i \alpha_j y_i y_j K(\mathbf{x}_i, \mathbf{x}_j)
    \right\} \tag{2.36} \\ \text{s.t.} & \sum_{i=1}^{N} \alpha_i y_i = 0, \\ & 0 \leq
    \alpha_i \leq C, \quad i = 1, \ldots, N, \end{aligned}$$


    这仍然是一个凸二次规划问题，通过求解它来找到 $\alpha_i$。此外，为了对新数据进行分类，输入样本 $\mathbf{x}$ 的相似性通过以下公式与所有对应于支持向量的训练数据进行比较：


    $$\hat{y} = \text{sign}\left(w_0 + \sum_{\alpha_i > 0} \alpha_i y_i K(\mathbf{x}_i,
    \mathbf{x})\right), \tag{2.37}$$


    其中


    $$w_0 = y_{s_j} - \sum_{\alpha_i > 0} \alpha_i y_i K(\mathbf{x}_i, \mathbf{x}_{s_j}),
    \tag{2.38}$$


    使得 $\mathbf{x}_{s_j}$ 是支持向量集中的任意样本。


    现在需要提及一些关于基于已知核函数生成新核的定理。


    **定理 2.1** *一些有效核函数的非负线性组合也是一个有效的核函数 [Zanaty and Afifi (2011)]。*


    **证明** 设 $K_1, \ldots, K_m$ 满足 Mercer 条件，我们将证明 $K_{new} = \sum_{i=1}^{m} a_i K_i$（其中
    $a_i \geq 0$）也满足 Mercer 条件。因此，我们有


    $$\begin{aligned} \int \int g(\mathbf{x}) K_{new}(\mathbf{x}, \mathbf{t}) g(\mathbf{t})
    \mathrm{d}\mathbf{x} \mathrm{d}\mathbf{t} &= \int \int g(\mathbf{x}) \sum_{i=1}^{m}
    a_i K_i(\mathbf{x}, \mathbf{t}) g(\mathbf{t}) \mathrm{d}\mathbf{x} \mathrm{d}\mathbf{t}
    \\ &= \sum_{i=1}^{m} a_i \int \int g(\mathbf{x}) K_i(\mathbf{x}, \mathbf{t}) g(\mathbf{t})
    \mathrm{d}\mathbf{x} \mathrm{d}\mathbf{t} \\ &\geq 0. \end{aligned}$$


    **定理 2.2** *一些有效核函数的乘积也是一个有效的核函数 [Zanaty and Afifi (2011)]。*


    *证明* 可以用类似的方法证明此定理。 □


    定理 2.1 和 2.2 的第一个推论是，如果 $K$ 是一个有效的 Mercer 核函数，那么 $K$ 的任何具有正系数的多项式函数也是一个有效的 Mercer
    核函数。另一方面，$\exp(K)$ 也是一个有效的 Mercer 核函数（即，考虑 $\exp()$ 的麦克劳林展开进行证明） Genton (2001),
    Shawe-Taylor and Cristianini (2004)。'

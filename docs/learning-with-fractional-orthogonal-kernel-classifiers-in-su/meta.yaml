    \n```\n1:  import pycuda.driver as cuda\n2:  from pycuda.compiler import SourceModule\n\
    3:  import numpy\n4:  import pdb\n5:\n6:  def Chebyshev(x,y,n=3,f='r'):\n7:  \
    \    m=len(x)\n8:      chebyshev_result = 0\n9:      p_cheb = 1\n10:\n11:    \
    \ for j in range(0,m):\n12:         for i in range(0,n+1):\n13:             a=\

  md: '$K(\mathbf{x}, \mathbf{t}) = (1 + \mathbf{x}^T \mathbf{t})^2$

    $= (1 + x_1 t_1 + x_2 t_2)^2$

    $= 1 + 2x_1 t_1 + 2x_2 t_2 + x_1^2 t_1^2 + x_2^2 t_2^2 + 2x_1 t_1 x_2 t_2.$



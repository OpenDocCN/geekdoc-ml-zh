    ### 5.3.3.1 广义 Gegenbauer 核


    广义 Gegenbauer 核 (GGK) 是通过使用广义 Gegenbauer 多项式内积的部分和来构建的。广义 Gegenbauer 多项式具有如下递归关系
    (Yang et al. 2020)：


    $GG_0^\lambda(x) = 1,$

    $GG_1^\lambda(x) = 2\lambda x,$

    $GG_n^\lambda(x) = \frac{1}{d}[2x(d + \lambda - 1)GG_{n-1}^\lambda(x) - (n + 2\lambda
    - 2)GG_{n-2}^\lambda(x)],$


    其中 $x \in \mathbb{R}^n$ 表示输入变量的向量。广义 Gegenbauer 多项式 $GG_n^\lambda(x)$ 的输出在 $n$
    为偶数阶时是标量，在 $n$ 为奇数阶时是向量。


    然后 Yang 等人 (2020) 提出了针对两个输入向量 $x_i$ 和 $x_j$ 的 $n$ 阶广义 Gegenbauer 核函数 $K_{GG}(x_i,
    x_j)$：


    $K_{GG}(x_i, x_j) = \frac{\sum_{l=0}^n GG_l^\lambda(x_i)^T GG_l^\lambda(x_j)}{\exp(\sigma
    \| x_i - x_j \|_2^2)},$


    其中 $x_i$ 和 $x_j$ 的每个元素都在 $[-1, 1]$ 范围内归一化。在此背景下，$\alpha$ 和 $\sigma$ 都被视为核尺度或所提出核函数的所谓衰减参数。



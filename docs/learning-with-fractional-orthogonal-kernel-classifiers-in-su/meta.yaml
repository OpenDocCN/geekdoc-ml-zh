    uses a different address space from the host memory.


    The host (the CPU) and the GPU cannot share data easily. This limitation of communication
    between the host and GPU is especially problematic when both host and GPU are
    working on shared data simultaneously. In this case, the data must be returned,
    and the host must wait for the GPU and vice versa. The worse section of this scenario
    is transferring data between the host and the GPU as it is slow,'

    $$= \int_{0}^{\pi} \frac{1}{2}[\cos(n+m)\theta + \cos(n-m)\theta]d\theta,$$

    $$= \frac{1}{2} \left[ \frac{1}{n+m} \sin(n+m)\theta + \frac{1}{m-n} \sin(m-n)\theta
    \right] \Big|_{0}^{\pi} = 0.$$


    In case of $n = m \neq 0$, we have


    $$\int_{-1}^{1} T_n(x)T_m(x)\frac{1}{\sqrt{1-x^2}}dx,$$

    $$= \int_{0}^{\pi} \cos n\theta \cos n\theta d\theta,$$

    $$= \int_{0}^{\pi} \cos^2 n\theta d\theta = \int_{0}^{\pi} \frac{1}{2}(1 + \cos
    2n\theta)d\theta,$$

    $$= \frac{1}{2} \left[ \theta + \frac{-1}{2n} \sin 2n\theta \right] \Big|_{0}^{\pi}
    = \frac{\pi}{2}.$$


    Also in the case where $n = m = 0$, we can write that


    $$\int_{-1}^{1} T_n(x)T_m(x)\frac{1}{\sqrt{1-x^2}}dx = \int_{0}^{\pi} 1d\theta
    = \pi.$$


    The orthogonality of these polynomials provides an efficient framework for computing
    the kernel matrix which will be discussed later. Computationally efficiency is
    not the only property of the Chebyshev polynomials, but there is even more about
    it. For example, the maximum value for $T_n(x)$ is no more than 1 since for $-1
    \leqslant x \leqslant 1$, $T_n(x)$ is defined as the cosine of an argument. This
    property prevents overflow during computation. Besides, the Chebyshev polynomial
    of order $n > 0$ has exactly $n$ roots and $n + 1$ local extremum in the interval
    $[-1, 1]$, in which two extremums are'

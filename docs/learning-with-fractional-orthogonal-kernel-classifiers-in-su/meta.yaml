    ## 正交核的应用


    ## 第7章

    基于LS-SVM求解常微分方程


    Mohsen Razzaghi, Simin Shekarpaz, and Alireza Rajabi


    **摘要** 本章提出一种基于最小二乘支持向量机（LS-SVM）与配置法的机器学习方法，用于求解一类线性和非线性常微分方程（ODEs）。此类方程中最重要的实用模型之一是Lane-Emden型方程。通过使用LS-SVM求解这类方程，解基于有理Legendre函数展开，并给出了LS-SVM的公式。在此基础上，线性问题以对偶形式求解，并得出一个线性代数方程组。最后，通过给出一些数值算例，将当前方法的结果与其他方法进行了比较。比较表明，所提方法快速且精度高，具有指数收敛性。


    **关键词** Lane-Emden微分方程 · 配置法 · 有理Legendre函数


    ### 7.1 引言


    微分方程是一种数学方程，可用于对现实生活中许多物理和工程问题进行建模，例如振荡器动力学、宇宙学、太阳系研究、非定常气体研究、流体动力学以及许多其他应用（参见，例如，Liu
    et al. 2018; Rodrigues et al. 2018; Anderson et al. 2016; Khoury et al. 2018;
    Farzaneh-Gord and Rahbari 2016; Lusch et al. 2018; Bristeau et al. 1979; Parand
    et al. 2011; Parand and Rad 2012; Kazem et al. 2011; Parand et al. 2016; Kazem
    et al. 2012; Parand et al. 2012, 2017; Abbasbandy et al. 2013）。与此同时，Lane-Emden型方程是半无限域上的一类重要常微分方程，由Jonathan
    Homer Lane和Emden作为太阳温度模型引入（Lane (1870); Emden (1907)）。这些方程在建模许多物理现象方面有许多有趣的应用，例如恒星结构理论、球形气体云的热行为、等温气体球以及热离子电流理论（Chandrasekhar
    and Chandrasekhar (1957), Wood (1921)）。作为重要应用之一，可以说在天体物理学中，该方程描述了多变等温气体自引力球中的平衡密度分布。


    Lane-Emden方程的一般形式如下（Hadian Rasanana et al. (2020), Parand et al. (2010), Omidi
    et al. (2021)）：


    $$y''''(x) + \frac{k}{x}y''(x) + f(x, y(x)) = h(x),$$

    $$y(x_0) = A, \quad y''(x_0) = B,$$


    其中$A$, $B$是常数，$f(x, y)$和$h(x)$是给定的关于$x$和$y$的函数。


    其中一些方程没有精确解，并且由于它们在$x = 0$处的奇异性，其数值解对科学家来说是一个挑战（Parand et al. (2009, 2010)）。许多半解析和数值方法已被应用于求解Lane-Emden方程，可以列举如下：在Bender
    et al. (1989)中，提出了一种基于人工参数$\delta$的新摄动技术来求解Lane-Emden方程。此外，在Shawagfeh (1993)中，通过Adomian分解法（ADM）推导出了该方程的非摄动解析解。另一方面，Mandelzweig
    et al. (2001)使用拟线性化方法求解标准Lane-Emden方程，而Liao (2003)基于Adomian分解法为Lane-Emden型方程构建了一个解析框架。基于半解析方法的方法持续发展，He
    (2003)使用Ritz变分法获得了该问题的解析解。此外，在Wazwaz (2006)中，使用了修正分解法来分析非线性微分方程的解析行为，而Yildirim
    et al. (2007)通过同伦摄动法（HPM）获得了一类Lane-Emden方程的近似解。遵循这种方法，Ramos (2005)使用线性化方法求解Lane-Emden方程，并在Ramos
    (2008)中提出了一种级数解。这些解是通过将该方程写成Volterra积分方程并假设非线性项是光滑的而获得的。然后，Dehghan (2006; 2008)提出了用于微分方程的Adomian分解法，并采用了一种替代程序来克服奇异性带来的困难。此外，Aslanov
    (2008)引入了一种改进的Adomian分解法，用于非齐次、线性和非线性Lane-Emden型方程。另一方面，Dehghan and Shakeri (2008)对Lane-Emden型方程使用了指数变换，以克服$x
    = 0$处奇点的困难，并通过变分迭代法（VIM）求解了由此产生的非奇异问题。两种重要的解析方法，即同伦分析法（HAM）和HPM的使用似乎非常普遍。例如，Singh
    et al. (2009)提出了一种使用修正同伦分析法求解Lane-Emden型方程的高效解析算法。此外，Bataineh et al. (2009)提出了一种同伦分析法来获得Emden-Fowler型奇异初值问题的解析解，而在Chowdhury
    and Hashim (2009)中，Chowdhury et al. 应用了一种基于同伦摄动法的算法来求解Emden-Fowler型奇异初值问题。然而，稳健的数值方法也已用于这些研究。在Yousefi
    (2006)中，提供了一种求解Lane-Emden方程的数值方法。在该工作中，通过使用积分算子和Legendre小波近似，将问题转化为积分方程。此外，Marzban
    et al. (2008)应用了分段常数函数与Lagrange插值多项式混合的性质来求解非线性二阶初值问题和Lane-Emden方程。然后，Parand et
    al. (2009)提出了一种基于有理Legendre方法的数值技术，用于求解高阶常微分方程，如Lane-Emden方程。在Parand et al. (2010)中，应用了一种算法来处理非线性Lane-Emden问题，使用了Hermite函数配置法。另一方面，Pandey
    and Kumar (2010)提出了一种高效且精确的方法，使用Bernstein多项式求解天体物理学中出现的Lane-Emden型方程。最近，在Yüzbaşı
    and Sezer (2013)中，线性Lane-Emden方程通过Bessel配置法求解，并且也获得了问题的误差。更近期，Parand and Khaleghi
    (2016)也建议使用第二类有理切比雪夫配置法来求解Lane-Emden方程。关于基于李对称方法的Lane-Emden方程分析，我们建议感兴趣的读者参阅Kara
    and Mahomed (1992, 1993)。这个重要的模型已经从仿真的角度，通过更多的数值方法进行了仔细研究（参见Hossayni et al. 2015;
    Parand et al. 2013），但由于这些方法在复杂动态模型中性能的弱点，当前求解和模拟基于常微分方程（ODEs）和偏微分方程（PDEs）的动态模型的趋势之一是神经网络（NN）。事实上，NN是一种机器学习技术，用于获得高阶ODE和偏微分方程（PDEs）的数值解，已被许多研究者提出。例如，Lagaris
    et al (1998)使用神经网络求解了一些著名的ODEs。此外，在Malek and Beidokhti (2006)中，研究了一种基于人工神经网络和优化技术的混合数值方法，用于直接求解高阶ODEs。更重要的是，在Mall
    and Chakraverty (2014)中，Chakraverty and Mall分析了一种基于回归的人工神经网络方法来求解ODEs，其中提出了一种单层切比雪夫神经网络来求解Lane-Emden方程。另一方面，Mall
    and Chacraverty (2015)使用切比雪夫神经网络求解了Emden-Fowler方程。他们还使用Legendre神经网络来求解Lane-Emden'

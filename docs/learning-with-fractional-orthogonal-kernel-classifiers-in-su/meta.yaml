    a modified homotopy analysis method. Also, Bataineh et al. (2009) proposed a homotopy
    analysis method to obtain the analytical solutions of the singular IVPs of the
    Emden-Fowler type, and in Chowdhury and Hashim (2009), Chowdhury et al. applied
    an algorithm based on the homotopy perturbation method to solve singular IVPs
    of the Emden-Fowler type. However, robust numerical approaches have also been
    used for these studies. In Yousefi (2006), a numerical method was provided for
    solving the Lane-Emden equations. In that work, by using the integral operator

    to this distribution. On the other side, discriminative models do predictions
    by estimating conditional probability $P(Class|Data)$.


    Examples of generative methods are deep generative models (DGMs) such as Variational
    Autoencoder (VAE) and GANs, Naïve Bayes, Markov random fields, and Hidden Markov
    Models (HMM). SVM is a discriminative method that learns the decision boundary
    like some other methods such as logistic regression, traditional neural networks
    such as multi-layer perceptron (MLP), KNN, and Conditional Random Fields (CRFs).


    ## 1.2 What Is the Pattern?


    In ML, we seek to design and build machines that can learn and recognize patterns,
    as is also called pattern recognition. To do this, the data need to have regularity
    or arrangement, called pattern, to be learned by ML algorithms. The data may be
    created by humans such as stock price or a signature or have a natural nature
    such as speech signals or DNS. Therefore, a pattern includes elements that are
    repeated in a predictable manner. The patterns in natural data, e.g., speech signals,
    are often chaotic and stochastic and do not exactly repeat. There are various
    types of natural patterns which include spirals, meanders, waves, foams, tilings,
    cracks, and those created by symmetries of rotation and reflection. Some types
    of patterns such as a geometric pattern in an image can be directly observed while
    abstract patterns in a huge amount of data or a language may become observable
    after analyzing the data using pattern discovery methods. In both cases, the underlying
    mathematical structure of a pattern can be analyzed by machine learning techniques
    which are mainly empowered by mathematical tools. The techniques can learn the
    patterns to predict or recognize them or can search them to find the regularities.
    Accordingly, if a dataset suffers from any regularities and repeatable templates,
    the modeling result of ML techniques will not be promising.


    ## 1.3 An Introduction to SVM with a Geometric Interpretation


    Support Vector Machine (SVM), also known as support vector network, is a supervised
    learning approach used for classification and regression. Given a set of training
    labeled examples belonging to two classes, the SVM training algorithm builds a
    decision boundary between the samples of these classes. SVM does this in such
    a way that optimally discriminates between two classes by maximizing the margin
    between two data categories. For data samples in an $N$-dimensional space, SVM
    constructs an $N - 1$-dimensional separating hyperplane to discriminate two classes.
    To describe


    # 1 Introduction to SVM


    ![](img/a1d5f013073c7da63184a763d887fe2f_21_0.png)


    the SVM, assume a binary classification example in a two-dimensional space, e.g.,
    distinguishing a cat from a dog using the values of their height ($x_1$) and weight
    ($x_2$). An example of the training labeled samples for these classes in the feature
    space is given in Fig. 1.2a, in which the samples for the dog are considered as
    the positive samples and the cat samples are presented as the negative ones. To
    do the classification, probably the primary intuitive approach is to draw a separate
    line between the positive and negative samples. However, as it is shown in Fig.
    1.2b, there are many possible lines to be the decision boundary between these
    classes. Now, the question is which line is better and should be chosen as the
    boundary?


    Although all the lines given in Fig. 1.2b are a true answer to do the classification,
    neither of them seems the best fit. Alternatively, a line that is drawn between
    the two classes which have the maximum distance from both classes is the better
    choice. To do this, the data points that lie closest to the decision boundary
    are the most difficult samples to classify and they have a direct bearing on the
    optimum location of the boundary. These samples are called support vectors that
    are closer to the decision boundary and influence the position and orientation
    (see Fig. 1.3). According to these vectors, the maximum distance between the two
    classes is determined. This distance is called margin and a decision line that
    is half this margin seems to be the optimum boundary. This line is such that the
    margin is maximized which is called the maximum-margin line between the two classes.
    SVM classifier attempts to find this optimal line.


    In SVM, to construct the optimal decision boundary, a vector $\mathbf{w}$ is considered
    to be perpendicular to the margin. Now, to classifying an unknown vector $\mathbf{x}$,
    we can project it onto $\mathbf{w}$ by computing $\mathbf{w}.\mathbf{x}$ and determine
    on which side of the decision boundary $\mathbf{x}$ lies by calculating $\mathbf{w}.\mathbf{x}
    \geq t$ for a constant threshold $t$. It means that if the values of $\mathbf{w}.\mathbf{x}$
    are more than $t$, i.e., it is far away, sample $\mathbf{x}$ is classified as
    a positive example. By assuming $t = -w_0$, the given decision rule can be given
    as $\mathbf{w}.\mathbf{x} + w_0 \geq 0$. Now, the question is, how we can determine
    the values of $\mathbf{w}$ and $w_0$? To do this, the following constraints are
    considered which means a sample is classified as positive if the value is equal
    or greater than 1, it is classified as negative if the value of $-1$ or less:


    ![](img/a1d5f013073c7da63184a763d887fe2f_22_0.png)


    (a) Support vectors and optimum decision boundary. (b) Decision boundary equation
    and maximum margin.


    **Fig. 1.3** a SVM optimum decision boundary, b Definition of the notations


    $$\mathbf{w}.\mathbf{x}_+ + w_0 \geq 1, \quad and \quad \mathbf{w}.\mathbf{x}_-
    + w_0 \leq -1. \tag{1.1}$$


    These two equations can be integrated into an inequality, as in Eq. 1.2 by introducing
    a supplementary variable, $y_i$ which is equal to $+1$ for positive samples and
    is equal to $-1$ for negative samples. This inequality is considered as equality,
    i.e., $y_i(\mathbf{w}.\mathbf{x}_i + w_0) - 1 = 0$, to define the main constraint
    of the problem which means the examples lying on the margins (i.e., *support vectors*)
    to be constrained to 0. This equation is equivalence to a line that is the answer
    to our problem. This decision boundary line in this example becomes a hyperplane
    in the general $N$-dimensional case.


    $$y_i(\mathbf{w}.\mathbf{x}_i + w_0) - 1 \geq 0. \tag{1.2}$$


    To find the maximum margin that separating positive and negative examples, we
    need to know the width of the margin. To calculate the width of the margin, $(\mathbf{x}_+
    - \mathbf{x}_-)$ need to be projected onto unit normalized $\frac{\mathbf{w}}{\|\mathbf{w}\|}$.
    Therefore, the width is computed as $(\mathbf{x}_+ - \mathbf{x}_-).\frac{\mathbf{w}}{\|\mathbf{w}\|}$
    in which by using $y_i(\mathbf{w}.\mathbf{x}_i + w_0) - 1 = 0$ to substituting
    $\mathbf{w}.\mathbf{x}_+ = 1 - w_0$ and $\mathbf{w}.\mathbf{x}_- = 1 + w_0$ in
    that, the final value for width is obtained as $2\|\mathbf{w}\|$ (see Fig. 1.3).
    Finally, maximizing this margin is equivalent to Eq. 1.3 which is a quadratic
    function:


    $$\min_{\mathbf{w}, w_0} \frac{1}{2} \|\mathbf{w}\|^2, \quad y_i(\mathbf{w}.\mathbf{x}_i
    + w_0) - 1 \geq 0. \tag{1.3}$$


    This is a constrained optimization problem and can be solved by the Lagrange multiplier
    method. After writing the Lagrangian equation as in Eq. 1.4, and computing the
    partial derivative with respect to $\mathbf{w}$ and setting it to zero results
    in $\mathbf{w} = \sum_i \alpha_i y_i \mathbf{x}_i$ and with respect to $w_0$ and
    setting it to zero gives $\sum_i \alpha_i y_i$. It means that $\mathbf{w}$ is
    a linear combination of the samples. Using these values in Eq. 1.4 results in
    a Lagrangian


    # 1 Introduction to SVM


    ![](img/a1d5f013073c7da63184a763d887fe2f_23_0.png)


    equation in which the problem depends only on dot products of pairs of data samples.
    Also, $\alpha_i = 0$ for the training examples that are not support vectors that
    means these examples do not affect the decision boundary. Another interesting
    fact about this optimization problem is that it is a convex problem and it is
    guaranteed to always find a global optimum.


    $$L(\mathbf{w}, w_0) = \frac{1}{2}\|\mathbf{w}\|^2 + \sum_i [y_i(\mathbf{w}.\mathbf{x}_i
    + w_0) - 1]\alpha_i. \quad (1.4)$$


    The above-described classification problem and its solution using the SVM assumes
    the data is linearly separable. However, in most real-life applications, this
    assumption is not correct and most problems are not classified simply using a
    linear boundary. The SVM decision boundary is originally linear Vapnik (1963)
    but has been extended to handle nonlinear cases as well Boser et al. (1992). To
    do this, SVM proposes a method called kernel trick in which an input vector is
    transformed using a nonlinear function like $\phi(.)$ into a higher dimensional
    space. Then, in this new space, the maximum-margin linear boundary is found. It
    means that a nonlinear problem is converted into a linearly separable problem
    in the new higher dimensional space without affecting the convexity of the problem.
    A simple example of this technique is given in Fig. 1.4 in which one-dimensional
    data samples, $x_i$, are transformed into two-dimensional space using $(x_i, x_i
    \times x_i)$ transform. In this case, the dot product of two samples, i.e., $x_i.x_j$,
    in the optimization problem is replaced with $\phi(x_i).\phi(x_j)$. In practice,
    if we have a function like such that $K(x_i, x_j) = \phi(x_i).\phi(x_j)$, then
    we do not need to know the transformation $\phi(.)$ and only function $K(.)$ (which
    is called the *kernel function*) is required. Some common kernel functions are
    linear, polynomial, sigmoid, and radial basis functions (RBF).


    Although the kernel trick is a clever method to handle the nonlinearity, the SVM
    still assumes that the data is linearly separable in this transformed space. This
    assumption is not true in most real-world applications. Therefore, another type
    of SVM is proposed which is called *soft-margin SVM* Cortes and Vapnik (1995).
    The described SVM method up to now is known as *hard-margin SVM*. As given, hard-margin
    SVMs assume the data is linearly separable without any errors, whereas soft-margin
    SVMs allow some misclassification and results in a more robust decision in nonlinearly'

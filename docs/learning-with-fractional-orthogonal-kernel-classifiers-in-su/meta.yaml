- md: 'Utilizing the properties of orthogonal functions in machine learning has always
    been attractive for researchers. The first Chebyshev kernel function is introduced
    in 2006 by Ye et al. (2006). Thereafter, the use of orthogonal Chebyshev kernel
    has been under investigation by many researchers (Ozer and Chen 2008; Ozer et
    al. 2011; Jafarzadeh et al. 2013; Zhao et al. 2013). In 2011, Ozer et al. proposed
    a set of generalized Chebyshev kernels which made it possible for the input to
    be a vector rather than a single variable (Ozer et al. 2011). The generalized
    Chebyshev kernel made it easy to have modified Chebyshev kernels in which weight
    function can be an exponential function, for example, Ozer et al. used the Gaussian
    kernel function specifically. In fact, this brings more nonlinearity to the kernel
    function. Hence, the combination of Chebyshev kernel with other well-known kernels
    has been investigated too, for instance, the Chebyshev-Gaussian and Chebyshev-Wavelet
    (Jafarzadeh et al. 2013) kernel functions are bases on this combination. Also,
    Jinwei Zhao et al. (2013) proposed the unified Chebyshev polynomials, a new sequence
    of orthogonal polynomials and consequently unified Chebyshev kernel through combining
    Chebyshev polynomials of the first and second kinds, which has shown to have excellent
    generalization performance and prediction accuracy.


    The classical orthogonal polynomials proved to be highly efficient in many applied
    problems. The uniform proximity and orthogonality have attracted researchers in
    the kernel learning domain. In fact, **Vladimir Vapnik**, the approximation of
    real-valued functions using n-dimensional Hermit polynomials of classical orthogonal
    polynomials was first introduced (Statistical Learning Theory, Wiley, USA, 1998).
    Then, a new perspective opened, later in 2006, Ye and colleagues Ye et al. (2006)
    constructed an orthogonal Chebyshev kernel based on the Chebyshev polynomials
    of the first kind. Based on what is said in Ye et al. (2006), “As Chebyshev polynomial
    has the best uniform proximity and its orthogonality promises the minimum data
    redundancy in feature space, it is possible to represent the data with fewer support
    vectors.”


    One of the recent improvements in the field of special functions is the development
    of fractional orthogonal polynomials (Kazem et al. 2013). The fractional orthogonal
    functions can be obtained by some nonlinear transformation function and have much
    better performance in function approximation (Dabiri et al. 2017; Kheyrinataj
    and Nazemi 2020; Habibli and Noori Skandari 2019). However, these functions have
    not been used as a kernel. Thus, this chapter first aims to present essential
    backgrounds for Chebyshev polynomial and its fractional version, then bring all
    the Chebyshev kernel functions together, and finally introduce and examine the
    fractional Chebyshev kernel functions.


    This chapter is organized as follows. The basic definitions and properties of
    orthogonal Chebyshev polynomials and the fractional Chebyshev functions are presented
    in Sect. 3.2. Then, the ordinary Chebyshev kernel function and two previously
    proposed kernels based on these polynomials are discussed and the novel fractional
    Chebyshev kernel functions are introduced in Sect. 3.3. In Sect. 3.4, the results
    of experiments of both the ordinary Chebyshev kernel and the fractional one are
    covered and then a comparison between the obtained accuracy results of the mentioned
    kernels and RBF and polynomial kernel functions in the SVM algorithm on well-known
    datasets is exhibited to specify the validity and efficiency of the fractional
    kernel functions. Finally, in Sect. 3.5, conclusion remarks of this chapter are
    presented.


    ## 3.2 Preliminaries


    Definition and basic properties of Chebyshev orthogonal polynomials of the first
    kind are presented in this section. In addition to the basics of these polynomials,
    the fractional form of this family is presented and discussed.


    ### 3.2.1 Properties of Chebyshev Polynomials


    There are four kinds of Chebyshev polynomials, but the focus of this chapter is
    on introducing the first kind of Chebyshev polynomials which is denoted by $T_n(x)$.
    The interested readers can investigate the other types of Chebyshev polynomials
    in Boyd (2001).


    The power of polynomials originally comes from their relation with trigonometric
    functions (sine and cosine) that are very useful in describing all kinds of natural
    phenomena (Mason and Handscomb 2002). Since $T_n(x)$ is a polynomial, then it
    is possible to define $T_n(x)$ using trigonometric relations.


    Let us assume $z$ be a complex number over a unit circle $|z| = 1$, in which $\theta$
    is the argument of $z$ and $\theta \in [0, 2\pi]$, in other words:


    $$x = \Re z = \frac{1}{2}(z + z^{-1}) = \cos \theta \quad \in [-1, 1], \tag{3.1}$$


    where $\Re$ is the real axis of a complex number.


    Considering Chebyshev polynomials of the first kind is denoted by $T_n(x)$, so
    one can define (Mason and Handscomb 2002; Boyd 2001; Shen et al. 2011; Asghari
    et al. 2022):


    $$T_n(x) = \Re z^n = \frac{1}{2}(z^n + z^{-n}) = \cos n\theta. \tag{3.2}$$


    Therefore, the $n$-th order of Chebyshev polynomial can be obtained by


    $$T_n(x) = \cos n\theta, \quad \text{where} \quad x = \cos \theta. \tag{3.3}$$


    The relation between $x$, $z$ and $\theta$ is illustrated in Fig. 3.1:


    Fig. 3.1 The plot of the relation between $x$, $z$, and $\theta$


    ![](img/a1d5f013073c7da63184a763d887fe2f_54_0.png)


    Based on definition (3.2), the Chebyshev polynomials for some $n$ are defined
    as follows:


    $$\Re z^0 = \frac{1}{2}(z^0 + z^0), \quad \Longrightarrow \quad T_0(x) = 1, \qquad
    (3.4)$$

    $$\Re z^1 = \frac{1}{2}(z^1 + z^{-1}), \quad \Longrightarrow \quad T_1(x) = x,
    \qquad (3.5)$$

    $$\Re z^2 = \frac{1}{2}(z^2 + z^{-2}), \quad \Longrightarrow \quad T_2(x) = 2x^2
    - 1, \qquad (3.6)$$

    $$\Re z^3 = \frac{1}{2}(z^3 + z^{-3}), \quad \Longrightarrow \quad T_3(x) = 4x^3
    - 3x, \qquad (3.7)$$

    $$\Re z^4 = \frac{1}{2}(z^4 + z^{-4}), \quad \Longrightarrow \quad T_4(x) = 8x^4
    - 8x^2 + 1. \qquad (3.8)$$


    Consequently, by considering this definition for $T_{n+1}(x)$ as follows:


    $$T_{n+1}(x) = \frac{1}{2}(z^{n+1} + z^{-n-1})$$

    $$= \frac{1}{2}(z^n + z^{-n})(z + z^{-1}) - \frac{1}{2}(z^{n-1} + z^{1-n})$$

    $$= 2\cos(n\theta)\cos(\theta) - \cos((n-1)\theta), \qquad (3.9)$$


    the following recursive relation can be obtained for the Chebyshev polynomials:


    $$T_0(x) = 1,$$

    $$T_1(x) = x,$$

    $$T_n(x) = 2xT_{n-1}(x) - T_{n-2}(x), \quad n \geq 2. \tag{3.10}$$


    Thus, any order of the Chebyshev polynomials can be generated using this recursive
    formula.


    Additional to the recursive formula, the Chebyshev polynomials can be obtained
    directly by the following expansion for $n \in \mathbb{Z}^+$ (Mason and Handscomb
    2002; Boyd 2001; Shen et al. 2011; Asghari et al. 2022):


    $$T_n(x) = \sum_{k=0}^{\lfloor \frac{1}{2}n \rfloor} (-1)^k \frac{n!}{(2k)!(n-2k)!}
    (1-x^2)^k x^{n-2k}. \tag{3.11}$$


    The other way to obtain the Chebyshev polynomials is by solving their Sturm-Liouville
    differential equation.


    **Theorem 3.1** (Mason and Handscomb (2002); Boyd (2001); Shen et al. (2011);
    Asghari et al. (2022)) $T_n(x)$ is the solution of the following second-order
    linear Sturm-Liouville differential equation:


    $$(1-x^2)\frac{d^2y}{dx^2} - x\frac{dy}{dx} + n^2y = 0, \tag{3.12}$$


    where $-1 < x < 1$ and $n$ is an integer number.


    **Proof** By considering $\frac{d}{dx}\cos^{-1}(x) = -\frac{1}{\sqrt{1-x^2}}$,
    we have


    $$\frac{d}{dx}T_n(x) = \frac{d}{dx}\cos(n\cos^{-1}x),$$

    $$= n.\frac{1}{\sqrt{1-x^2}}\sin(n\cos^{-1}x). \tag{3.13}$$


    In a similar way, we can write that


    $$\frac{d^2}{dx^2}T_n(x) = \frac{d}{dx}\left\{\frac{n}{\sqrt{1-x^2}}\sin(n\cos^{-1}x)\right\},$$

    $$= \frac{nx}{\sqrt[3]{(1-x^2)^2}}\sin(n\cos^{-1}x) + \frac{n}{\sqrt{1-x^2}}\cos(n\cos^{-1}x).\frac{-n}{\sqrt{1-x^2}},$$

    $$= \frac{nx}{\sqrt[3]{1-x^2}}\sin(n\cos^{-1}(x)) - \frac{n^2}{1-x^2}\cos(n\cos^{-1}).$$


    So, by replacing the derivatives with their obtained formula in (3.12), the following
    is yielded:'
  mdcn: '在机器学习中利用正交函数的特性一直吸引着研究者。Ye等人（2006）于2006年首次引入了第一类切比雪夫核函数。此后，许多研究者对正交切比雪夫核的使用进行了研究（Ozer
    and Chen 2008; Ozer et al. 2011; Jafarzadeh et al. 2013; Zhao et al. 2013）。2011年，Ozer等人提出了一组广义切比雪夫核，使得输入可以是向量而非单个变量（Ozer
    et al. 2011）。广义切比雪夫核使得修改切比雪夫核变得容易，例如，权重函数可以是指数函数，Ozer等人特别使用了高斯核函数。事实上，这为核函数带来了更多的非线性。因此，切比雪夫核与其他著名核的组合也得到了研究，例如，切比雪夫-高斯和切比雪夫-小波（Jafarzadeh
    et al. 2013）核函数就是基于这种组合。此外，金伟赵等人（2013）提出了统一的切比雪夫多项式，这是一种新的正交多项式序列，并通过结合第一类和第二类切比雪夫多项式，进而提出了统一的切比雪夫核，该核已被证明具有出色的泛化性能和预测精度。


    经典的正交多项式在许多应用问题中被证明是高度有效的。一致逼近性和正交性吸引了核学习领域的研究者。事实上，**弗拉基米尔·瓦普尼克**首次引入了使用经典正交多项式的n维埃尔米特多项式来逼近实值函数（《统计学习理论》，Wiley，美国，1998年）。随后，一个新的视角开启了，2006年，Ye及其同事Ye等人（2006）基于第一类切比雪夫多项式构建了一个正交切比雪夫核。根据Ye等人（2006）所述，“由于切比雪夫多项式具有最佳的一致逼近性，且其正交性保证了特征空间中最小的数据冗余，因此可以用更少的支持向量来表示数据。”


    特殊函数领域最近的一项改进是分数阶正交多项式的发展（Kazem et al. 2013）。分数阶正交函数可以通过某些非线性变换函数获得，并且在函数逼近方面具有更好的性能（Dabiri
    et al. 2017; Kheyrinataj and Nazemi 2020; Habibli and Noori Skandari 2019）。然而，这些函数尚未被用作核。因此，本章首先旨在介绍切比雪夫多项式及其分数阶版本的基本背景，然后将所有切比雪夫核函数汇集在一起，最后介绍并探讨分数阶切比雪夫核函数。


    本章组织如下。第3.2节介绍了正交切比雪夫多项式和分数阶切比雪夫函数的基本定义和性质。然后，第3.3节讨论了基于这些多项式的普通切比雪夫核函数和先前提出的两个核，并介绍了新颖的分数阶切比雪夫核函数。第3.4节涵盖了普通切比雪夫核和分数阶切比雪夫核的实验结果，然后展示了在SVM算法中，上述核与RBF和多项式核函数在知名数据集上的精度结果比较，以明确分数阶核函数的有效性和效率。最后，第3.5节给出了本章的结论性评述。


    ## 3.2 预备知识


    本节介绍了第一类切比雪夫正交多项式的定义和基本性质。除了这些多项式的基础知识外，还介绍并讨论了该族的分数阶形式。


    ### 3.2.1 切比雪夫多项式的性质


    切比雪夫多项式有四种，但本章的重点是介绍第一类切比雪夫多项式，记为 $T_n(x)$。感兴趣的读者可以在Boyd (2001)中研究其他类型的切比雪夫多项式。


    多项式的威力最初源于它们与三角函数（正弦和余弦）的关系，这些函数在描述各种自然现象时非常有用（Mason and Handscomb 2002）。由于 $T_n(x)$
    是一个多项式，因此可以使用三角关系来定义 $T_n(x)$。


    让我们假设 $z$ 是单位圆 $|z| = 1$ 上的一个复数，其中 $\theta$ 是 $z$ 的辐角，且 $\theta \in [0, 2\pi]$，换句话说：


    $$x = \Re z = \frac{1}{2}(z + z^{-1}) = \cos \theta \quad \in [-1, 1], \tag{3.1}$$


    其中 $\Re$ 是复数的实轴。


    考虑到第一类切比雪夫多项式记为 $T_n(x)$，因此可以定义（Mason and Handscomb 2002; Boyd 2001; Shen et al.
    2011; Asghari et al. 2022）：


    $$T_n(x) = \Re z^n = \frac{1}{2}(z^n + z^{-n}) = \cos n\theta. \tag{3.2}$$


    因此，$n$ 阶切比雪夫多项式可以通过以下方式获得：


    $$T_n(x) = \cos n\theta, \quad \text{其中} \quad x = \cos \theta. \tag{3.3}$$


    $x$, $z$ 和 $\theta$ 之间的关系如图3.1所示：


    图3.1 $x$, $z$ 和 $\theta$ 之间关系的图示


    ![](img/a1d5f013073c7da63184a763d887fe2f_54_0.png)


    根据定义 (3.2)，某些 $n$ 的切比雪夫多项式定义如下：


    $$\Re z^0 = \frac{1}{2}(z^0 + z^0), \quad \Longrightarrow \quad T_0(x) = 1, \qquad
    (3.4)$$

    $$\Re z^1 = \frac{1}{2}(z^1 + z^{-1}), \quad \Longrightarrow \quad T_1(x) = x,
    \qquad (3.5)$$

    $$\Re z^2 = \frac{1}{2}(z^2 + z^{-2}), \quad \Longrightarrow \quad T_2(x) = 2x^2
    - 1, \qquad (3.6)$$

    $$\Re z^3 = \frac{1}{2}(z^3 + z^{-3}), \quad \Longrightarrow \quad T_3(x) = 4x^3
    - 3x, \qquad (3.7)$$

    $$\Re z^4 = \frac{1}{2}(z^4 + z^{-4}), \quad \Longrightarrow \quad T_4(x) = 8x^4
    - 8x^2 + 1. \qquad (3.8)$$


    因此，通过考虑 $T_{n+1}(x)$ 的如下定义：


    $$T_{n+1}(x) = \frac{1}{2}(z^{n+1} + z^{-n-1})$$

    $$= \frac{1}{2}(z^n + z^{-n})(z + z^{-1}) - \frac{1}{2}(z^{n-1} + z^{1-n})$$

    $$= 2\cos(n\theta)\cos(\theta) - \cos((n-1)\theta), \qquad (3.9)$$


    可以得到切比雪夫多项式的以下递推关系：


    $$T_0(x) = 1,$$

    $$T_1(x) = x,$$

    $$T_n(x) = 2xT_{n-1}(x) - T_{n-2}(x), \quad n \geq 2. \tag{3.10}$$


    因此，可以使用此递推公式生成任意阶的切比雪夫多项式。


    除了递推公式外，对于 $n \in \mathbb{Z}^+$，切比雪夫多项式也可以通过以下展开式直接获得（Mason and Handscomb 2002;
    Boyd 2001; Shen et al. 2011; Asghari et al. 2022）：


    $$T_n(x) = \sum_{k=0}^{\lfloor \frac{1}{2}n \rfloor} (-1)^k \frac{n!}{(2k)!(n-2k)!}
    (1-x^2)^k x^{n-2k}. \tag{3.11}$$


    获得切比雪夫多项式的另一种方法是求解它们的Sturm-Liouville微分方程。


    **定理 3.1** (Mason and Handscomb (2002); Boyd (2001); Shen et al. (2011); Asghari
    et al. (2022)) $T_n(x)$ 是以下二阶线性Sturm-Liouville微分方程的解：


    $$(1-x^2)\frac{d^2y}{dx^2} - x\frac{dy}{dx} + n^2y = 0, \tag{3.12}$$


    其中 $-1 < x < 1$ 且 $n$ 是一个整数。


    **证明** 通过考虑 $\frac{d}{dx}\cos^{-1}(x) = -\frac{1}{\sqrt{1-x^2}}$，我们有


    $$\frac{d}{dx}T_n(x) = \frac{d}{dx}\cos(n\cos^{-1}x),$$

    $$= n.\frac{1}{\sqrt{1-x^2}}\sin(n\cos^{-1}x). \tag{3.13}$$


    类似地，我们可以写出


    $$\frac{d^2}{dx^2}T_n(x) = \frac{d}{dx}\left\{\frac{n}{\sqrt{1-x^2}}\sin(n\cos^{-1}x)\right\},$$

    $$= \frac{nx}{\sqrt[3]{(1-x^2)^2}}\sin(n\cos^{-1}x) + \frac{n}{\sqrt{1-x^2}}\cos(n\cos^{-1}x).\frac{-n}{\sqrt{1-x^2}},$$

    $$= \frac{nx}{\sqrt[3]{1-x^2}}\sin(n\cos^{-1}(x)) - \frac{n^2}{1-x^2}\cos(n\cos^{-1}).$$


    因此，将导数及其在 (3.12) 中得到的公式代入，可得：'

    proper weight function for orthogonality relation of fractional Jacobi polynomials
    is Bhrawy and Zaky (2016), Hadian et al. (2020), Kazem (2013)


    $$Fw^{\psi,\omega,\alpha}(x) = (1 - (2(\frac{x-a}{b-a})^{\alpha} - 1) + \epsilon)^{\psi}
    (1 - (2(\frac{x-a}{b-a})^{\alpha} - 1) + \epsilon)^{\omega}. \quad (6.25)$$


    Now one can define the orthogonality relation for the fractional Jacobi polynomials
    as


    $$\int_{a}^{b} FP_{m}^{\psi,\omega,\alpha}(x) FP_{n}^{\psi,\omega,\alpha}(x) Fw^{\psi,\omega,\alpha}(x)
    dx. \quad (6.26)$$


    The recursive relation for fractional Jacobi polynomials can be defined the same
    way as already has been done so far by using the mapped $x$ into the normal equation
    Doman (2015), Askey (1975), Bhrawy and Zaky (2016), Hadian et al. (2020):


    $$FJ_{0}^{\psi,\omega,\alpha}(x) = 1,$$

    $$FJ_{1}^{\psi,\omega,\alpha}(x) = \frac{1}{2}(\psi + \omega + 2)(2(\frac{x-a}{b-a})^{\alpha}
    - 1) + \frac{1}{2}(\psi - \omega),$$

    $$FJ_{n+1}^{\psi,\omega,\alpha}(x) = (A_{n}(2(\frac{x-a}{b-a})^{\alpha} - 1) +
    B_{n})FJ_{n}^{\psi,\omega,\alpha}(x) - C_{n}FJ_{n+1}^{\psi,\omega,\alpha}(x),
    \quad n \geqslant 1, \quad (6.27)$$


    where


    $$A_{n} = \frac{(2n + \psi + \omega + 1)(2n + \psi + \omega + 2)}{2(n + 1)(n +
    \psi + \omega + 1)},$$

    $$B_{n} = \frac{(\omega^{2} - \psi^{2})(2n + \psi + \omega + 1)}{2(n + 1)(n +
    \psi + \omega + 1)(2n + \psi + \omega)},$$

    $$C_{n} = \frac{(n + \psi)(n + \omega)(2n + \psi + \omega + 2)}{(n + 1)(n + \psi
    + \omega + 1)(2n + \psi + \omega)}. \quad (6.28)$$



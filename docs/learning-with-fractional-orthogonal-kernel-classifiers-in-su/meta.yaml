    ## 8.3.2 广义 Fitzhugh–Nagumo 方程


    Fitzhugh–Nagumo (FHN) 模型基于轴突表面神经细胞的电传输 (FitzHugh 1961; Gordon et al. 1999)。换句话说，该模型是著名的
    Hodgkin–Huxley (HH) 模型 (Hodgkin and Huxley 1952) 的简化方程，因为它使用更简单的结构来解释神经元表面的电传输，而不是复杂的
    HH 设计 (Moayeri et al. 2020a; Hemami et al. 2019, 2020; Moayeri et al. 2020b)。在电学分析中，HH
    模型使用电容器、电阻器、变阻器和电流源元件的组合进行模拟 (Hemami et al. 2019, 2020; Moayeri et al. 2020a,
    b)，而 FHN 模型则使用电阻器、电感器、电容器和二极管元件的组合 (Hemami et al. 2019, 2020; Moayeri et al. 2020a,
    b)。此外，HH 模型在电信号产生中涉及钠、钾和泄漏三个通道，并通过变阻器和电池进行模拟，而 FHN 模型仅通过一个二极管和电感器来模拟行为 (Hemami
    et al. 2019, 2020; Moayeri et al. 2020a, b)。因此，该模型吸引了许多研究人员的关注，并已被用于火焰传播 (Van
    Gorder 2012)、逻辑斯谛种群增长 (Appadu and Agbavon 2019)、神经生理学 (Aronson and Weinberger
    1975)、分支布朗运动过程 (Ali et al. 2020)、自催化化学反应 (İnan 2018)、核反应堆理论 (Bhrawy 2013) 等各种其他领域
    (Abbasbandy 2008; Abdusalam 2004; Aronson and Weinberger 1978; Browne et al. 2008;
    Kawahara and Tanaka 1983; Li and Guo 2006; Jiwari et al. 2014)。经典的 Fitzhugh–Nagumo
    方程由下式给出 (Triki and Wazwaz 2013; Abbasbandy 2008)


    $$\frac{\partial u}{\partial t} = \frac{\partial^2 u}{\partial x^2} - u(1 - u)(\rho
    - u), \quad (8.13)$$


    其中 $0 \leq \rho \leq 1$，$u(x, t)$ 是依赖于时间变量 $t$ 和空间变量 $x$ 的未知函数。需要注意的是，该方程结合了扩散和非线性，其中非线性由项
    $u(1 - u)(\rho - u)$ 控制。广义 FHN 方程可以表示如下 (Bhrawy 2013)：


    $$\frac{\partial u}{\partial t} = -v(t)\frac{\partial u}{\partial x} + \mu(t)\frac{\partial^2
    u}{\partial x^2} + \eta(t)u(1 - u)(\rho - u). \quad (8.14)$$



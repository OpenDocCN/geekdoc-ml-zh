  md: 'on SVM with Chebyshev’s first kind kernel function. The proposed work is divided
    into two parts: the training (fit) function and the test (project) function.


    # 11.3.1 Analyzing the Training Function


    At the beginning of the fit function, the two-nested for-loop calculates the $K$
    matrix. The matrix $K$ is 2D with the train size elements for each dimension.
    Inside the nested loops, a Chebyshev function is calculated in each iteration.
    The recursive form of Chebyshev calculation is not appropriate. In recursive functions,
    handling the stack and always returning the results of each function call is problematic.
    GPU-based implementations of the repeated memory access tasks by recursive functions
    are not efficient. However, the $T_n$ polynomial has an explicit form, which is
    called the Chebyshev polynomial. For more details of the Chebyshev function and
    its explicit form, refer to Chap. 3. The matrix $P$ is the result of an inner
    product of matrix $K$ with the vectorized outer product on the target array. The
    next complex part of the fit function is a quadratic problem (QP) solver. For
    the case of GPU acceleration, CUDA has its own QP solver APIs.


    # 11.3.2 Analyzing the Test Function


    In the project function (test or inference), the complex part is the iterations
    inside the nested loop, which in turn contains a call to the Chebyshev function.
    As mentioned in Sect. 11.3.1, we avoid recursive functions due to the lack of
    efficient stack handling in GPUs, and thus using them is not helpful. Therefore,
    for the test function, we do the same as we did in the training function for calling
    the Chebyshev function.



    and $w(x) = (1-x)^\psi(1+x)^\omega$. In addition, $\delta_{n,m}$ is the Kronecker
    function, $\Gamma$ is the Euler gamma, and $\langle \cdot, \cdot \rangle_{L_w^2}$
    denotes the inner product of $L_w^2([-1, 1])$. The family $\left\{ J_m^{(\psi,
    \omega)} \right\}_{m \in \mathbb{N}}$ forms an orthogonal basis for $L_w^2([-1,
    1])$.


    # 6.3.3 Fractional Jacobi Kernel


    Since the weight function of the fractional Jacobi functions is equal to Eq. 6.25,
    defining the fractional Jacobi kernel is easy. One can construct the *fractional
    Jacobi kernel* as follows:


    $$K_{F Jacobi}(x, z) = \sum_{i=0}^{n} \langle F J_i^{\psi, \omega, \alpha}(x),
    F J_i^{\psi, \omega, \alpha}(z) \rangle F w^{\psi, \omega, \alpha}(x, z). \quad
    (6.35)$$


    **Theorem 6.3** *The Jacobi kernel introduced at Eq. 6.35 is valid Mercer kernel.*


    **Proof** Similar to the proof for Theorem 6.2, fractional Jacobi kernel function
    Eq. 6.35 can be considered as multiplication of two kernels:


    $$K_{(1)}(x, z) = \sum_{i=0}^{n} F J_i^{\psi, \omega, \alpha}(x) F J_i^{\psi,
    \omega, \alpha^T}(z), \quad (6.36)$$


    $$K_{(2)}(x, z) = F w^{\psi, \omega, \alpha}(x, z)$$

    $$= (d - (2(\frac{x-a}{b-a})^\alpha - 1, 2(\frac{z-a}{b-a})^\alpha - 1) - \epsilon)^\psi
    (d + (2(\frac{x-a}{b-a})^\alpha - 1, 2(\frac{z-a}{b-a})^\alpha - 1) + \epsilon)^\omega
    \quad (6.37, 6.38)$$


    where $d$ is the dimension of inputs $x$ and $z$. Consider $f : \mathbb{R}^m \longrightarrow
    \mathbb{R}$, and assume each element is independent from others. One can evaluate
    the Mercer condition for $K_{(1)}(x, z)$ as follows:


    $$\iint K_{(1)}(x, z) f(x) f(z) dx dz$$

    $$= \iint \sum_{j=0}^{n} F J_j^{\psi, \omega, \alpha}(x) F J_j^{\psi, \omega,
    \alpha^T}(z) f(x) f(z) dx dz$$

    $$= \sum_{j=0}^{n} \iint F J_j^{\psi, \omega, \alpha}(x) F J_j^{\psi, \omega,
    \alpha^T}(z) f(x) f(z) dx dz$$

    $$= \sum_{j=0}^{n} \left[ \int F J_j^{\psi, \omega, \alpha}(x) f(x) dx \int F
    J_j^{\psi, \omega, \alpha^T}(z) f(z) dz \right]$$

    $$= \sum_{j=0}^{n} \left[ \left( \int F J_j^{\psi, \omega, \alpha}(x) f(x) dx
    \right) \left( \int F J_j^{\psi, \omega, \alpha^T}(z) f(z) dz \right) \right]
    \geqslant 0. \quad (6.39)$$'

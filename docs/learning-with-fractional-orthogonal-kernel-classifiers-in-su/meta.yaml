    ## 第5章

    分数阶盖根鲍尔核函数：理论与应用


    Sherwin Nedaei Janbesaraei, Amirreza Azmoon, and Dumitru Baleanu


    **摘要** 由于许多函数被用作核，支持向量机方法在处理众多机器学习问题时展现出了卓越的多功能性。盖根鲍尔多项式，与前面章节介绍的切比雪夫和勒让德多项式一样，是最常用的正交多项式之一，在支持向量机方法中取得了优异的成果。本章介绍并回顾了盖根鲍尔函数和分数阶盖根鲍尔函数的一些基本性质，随后引入并验证了这些函数的核。最后，评估了这些函数在解决两个问题（两个示例数据集）上的性能。


    **关键词** 盖根鲍尔多项式 · 分数阶盖根鲍尔函数 · 核技巧 · 正交函数 · 默塞尔定理


    ### 5.1 引言


    *盖根鲍尔多项式*，或更广为人知的*超球多项式*，是另一类经典正交多项式，以奥地利数学家*利奥波德·伯恩哈德·盖根鲍尔*（1849–1903）的名字命名。正如其名所示，*超球多项式*为高维球谐函数提供了一种自然的扩展（Avery
    2012）。*球谐函数*是定义在球面上的特殊函数。它们常被应用于数学中求解微分方程（Doha 1998; Elliott 1960）。近年来，经典正交多项式，特别是盖根鲍尔正交多项式，已被用于解决模式识别（Liao
    et al. 2002; Liao and Chen 2013; Herrera-Acosta et al. 2020）、分类（Hjouji et al.
    2021; Eassa et al. 2022）以及许多领域（如物理学（Ludlow and Everitt 1995）、医学图像处理（Arfaoui et
    al. 2020; Stier et al. 2021; Öztrk et al. 2020）、电子学（Tamandani and Alijani 2022）和其他基础领域（Soufivand
    et al. 2021; Park 2009; Feng and Varshney 2021））中的基于核的学习。2006年，Pawlak (2006) 展示了基于盖根鲍尔多项式及其相应矩的图像重建过程的优势。随后几年，Hosny
    (2011) 利用盖根鲍尔矩的高计算需求，提出了用于图像分析和识别的新方法，这些研究中出现了分数阶移位盖根鲍尔矩（Hosny et al. 2020）和盖根鲍尔矩不变量（Hosny
    2014）。同样在2014年，Abd Elaziz et al. (2019) 使用基于正交盖根鲍尔矩的人工蜂群算法，借助支持向量机对星系图像进行分类。2009年，Langley和Zhao
    (2009) 利用盖根鲍尔多项式的正交性，提出了一种新的三维相位解缠算法，用于磁共振成像（MRI）分析。此外，在1995年，Ludlow研究了盖根鲍尔多项式在球体光发射中的应用（Ludlow
    and Everitt 1995）。克利福德多项式特别适合作为高维连续小波变换的核函数。2004年，Brackx et al. (2004) 构造了克利福德-盖根鲍尔和广义克利福德-盖根鲍尔多项式，作为高维连续小波变换的新特定小波核函数。然后，Ilić和Pavlović
    (2011) 在2011年，利用盖根鲍尔正交多项式的克里斯托费尔-达布公式，提出了具有最佳幅度和最佳群延迟特性的滤波器函数解。


    在SVM算法中使用不同核的灵活性是正交经典多项式最近被用作核的原因之一。盖根鲍尔多项式就是其中之一，它在该领域展示了可接受的结果。2018年，Padierna
    et al. (2018) 为SVM分类引入了正交多项式核函数的公式。同样在2020年，他（Padierna et al. 2020）使用该核对2型糖尿病患者的外周动脉疾病进行分类。除了在SVM中使用正交多项式作为核来解决分类问题外，这些多项式还可以用作支持向量回归（SVR）中的核来解决回归问题，并有助于研究时间序列问题。1992年，Azari
    et al. (1992) 提出了相应的超球核。此外，在2019年，Feng建议使用扩展支持向量回归（X-SVR），这是一种新的基于机器学习的元模型，用于基于首次通过理论的动态系统可靠性研究。此外，X-SVR的能力通过一个由向量化盖根鲍尔多项式构建的新核函数得到增强，专门用于处理复杂的工程问题（Feng
    et al. 2019）。另一方面，在2001年，Ferrara和Guégan (2001) 处理了长记忆盖根鲍尔过程的k因子扩展，该模型研究了k因子盖根鲍尔模型对巴黎地区城市交通真实数据的预测能力。正交盖根鲍尔多项式的其他应用包括它们在构建和开发神经网络方面的有效性。2018年，Zhang
    et al. (2018) 利用概率论、多项式插值和逼近理论，研究并构建了双输入盖根鲍尔正交神经网络（TIGONN），以避免反向传播（BP）训练算法的固有问题。然后，在2019年，构建并研究了一种基于盖根鲍尔正交多项式的新型神经网络，称为GNN（He
    et al. 2019）。该模型可以克服极限学习机（ELM）的计算鲁棒性问题，同时仍具有相当的结构简单性和逼近能力（He et al. 2019）。除了这里提到的应用外，表5.1展示了一些不同类型多项式的应用。


    > **利奥波德·伯恩哈德·盖根鲍尔**（1849–1903）是一位奥地利数学家。然而，他进入维也纳大学学习历史和语言学，但最终以数学和物理教师的身份毕业。他数学方面的职业生涯始于他获得的一笔资助，这使他得以在柏林大学进行为期2年的研究，在那里他得以聆听当时伟大数学家的讲座，如卡尔·魏尔斯特拉斯、爱德华·库默尔、赫尔曼·亥姆霍兹和利奥波德·克罗内克。利奥波德·盖根鲍尔在数学领域有许多兴趣，如数论和函数论。他在1875年的博士论文中引入了一类正交多项式，即盖根鲍尔正交多项式。然而，盖根鲍尔的名字出现在许多数学概念中，如盖根鲍尔变换、盖根鲍尔积分不等式、盖根鲍尔逼近、傅里叶-盖根鲍尔和、盖根鲍尔振荡器等等，但盖根鲍尔的另一个重要贡献是在维也纳大学设计了一门“保险理论”课程，他从1893年到1903年去世一直担任该校的数学全职教授。$^a$


    $^a$ 关于*L.B. 盖根鲍尔*及其贡献的更多信息，请参见：https://mathshistory.st-andrews.ac.uk/Biographies/Gegenbauer/。


    在本章中，引入了一种新型的盖根鲍尔正交多项式，称为分数阶盖根鲍尔函数，并构建了相应的核，该核在支持向量机等基于核的学习方法中具有出色的应用性。在第5.2节中，介绍了盖根鲍尔多项式及其分数形式的基本定义和性质。然后，在第5.3节中，除了解释先前提出的盖根鲍尔核函数外，还提出了分数阶盖根鲍尔函数。此外，在第5.4节中，展示了在知名数据集上使用盖根鲍尔和分数阶盖根鲍尔核进行SVM分类的结果'

  md: '$$T_0(x) = 1,$$

    $$T_1(x) = x,$$

    $$T_n(x) = 2xT_{n-1}(x) - T_{n-2}(x), \quad n \geq 2. \tag{3.10}$$


    Thus, any order of the Chebyshev polynomials can be generated using this recursive
    formula.


    Additional to the recursive formula, the Chebyshev polynomials can be obtained
    directly by the following expansion for $n \in \mathbb{Z}^+$ (Mason and Handscomb
    2002; Boyd 2001; Shen et al. 2011; Asghari et al. 2022):


    $$T_n(x) = \sum_{k=0}^{\lfloor \frac{1}{2}n \rfloor} (-1)^k \frac{n!}{(2k)!(n-2k)!}
    (1-x^2)^k x^{n-2k}. \tag{3.11}$$


    The other way to obtain the Chebyshev polynomials is by solving their Sturm-Liouville
    differential equation.


    **Theorem 3.1** (Mason and Handscomb (2002); Boyd (2001); Shen et al. (2011);
    Asghari et al. (2022)) $T_n(x)$ is the solution of the following second-order
    linear Sturm-Liouville differential equation:


    $$(1-x^2)\frac{d^2y}{dx^2} - x\frac{dy}{dx} + n^2y = 0, \tag{3.12}$$


    where $-1 < x < 1$ and $n$ is an integer number.


    **Proof** By considering $\frac{d}{dx}\cos^{-1}(x) = -\frac{1}{\sqrt{1-x^2}}$,
    we have


    $$\frac{d}{dx}T_n(x) = \frac{d}{dx}\cos(n\cos^{-1}x),$$

    $$= n.\frac{1}{\sqrt{1-x^2}}\sin(n\cos^{-1}x). \tag{3.13}$$


    In a similar way, we can write that


    $$\frac{d^2}{dx^2}T_n(x) = \frac{d}{dx}\left\{\frac{n}{\sqrt{1-x^2}}\sin(n\cos^{-1}x)\right\},$$


    (Kazem et al. 2012a; Lakestani and Dehghan 2008). In order to overcome the nonlinearity
    of the problem, we use the value of $u$ and its derivatives in the previous steps.
    For this example we set $n = 20$, $\Delta t = 0.0001$, and $\gamma = 10^{12}$.



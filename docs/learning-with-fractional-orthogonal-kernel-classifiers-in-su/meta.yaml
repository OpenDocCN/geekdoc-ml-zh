  md: '# 10.3 LS-SVR Method for Solving Distributed-Order Fractional Differential
    Equations


    In this section, first, the LS-SVR is introduced, then some of its characteristics
    are discussed, then the considered method based on LS-SVR, which helps solve the
    DOFDEs, is included. Having the concepts of LS-SVM, we present our solution based
    on the LS-SVM regression in this section. Due to this, consider the following
    equations


    $$\int_{a}^{b} G_{1}(p, D^{p}u(t)) dp + G_{2}(t, u(t), D^{\alpha_{i}}u(t)) = F(t),
    \quad t \in [0, \eta], \qquad (10.12)$$


    with the following initial conditions:


    $$u^{(k)}(0) = 0, \qquad (10.13)$$


    where $k = 0, 1, \ldots, \lfloor \max\{b, \alpha_{i}\} \rfloor$. Now, we discuss
    the convergence and consistency of method analysis in a linear situation


    $$\int_{a}^{b} g(p) D^{p}u(t) dp + A(u(t)) = F(t), \qquad (10.14)$$


    since $A$ is a linear operator, we can rewrite the Eq. 10.14 as


    $$L(u(t)) = F(t), \qquad (10.15)$$


    now we consider the LS-SVR for solving the Eq. 10.14


    $$u(x) \approx u_{N}(x) = \omega^{T} \phi(x), \qquad (10.16)$$


    which $\omega = [\omega_{0}, \ldots, \omega_{N}]^{T}$ are the weight coefficients
    and $\phi = [\phi_{0}, \ldots, \phi_{N}]^{T}$ are the basis functions. To determine
    the unknown coefficients, we consider the following optimization problem


    $$\min_{\omega, \varepsilon} \quad \frac{1}{2} \omega^{T} \omega + \frac{\gamma}{2}
    \varepsilon^{T} \varepsilon, \qquad (10.17)$$


    such that for every $i = 0, \ldots, N$


    $$\int_{a}^{b} g(p) D^{p}(u(t_{i})) dp + Au(t_{i}) - F(t_{i}) = \varepsilon_{i}
    \qquad (10.18)$$


    hence we have


    $$Lu(t_{i}) - F(t_{i}) = \varepsilon_{i} \qquad (10.19)$$'

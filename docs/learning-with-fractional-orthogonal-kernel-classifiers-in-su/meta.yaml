    # 10.2 Preliminaries


    As we point out earlier, modal Legendre functions are used in the proposed algorithm.
    We skip clarifying the properties and the procedure of making modal Legendre functions
    in this chapter as they have been discussed thoroughly in Chap. 4. Albeit, the
    fractional derivative focusing on the Caputo definition of the fractional derivative
    and the numerical integration are described in this section.


    # 10.2.1 Fractional Derivative


    By considering $f(x)$ as a function, the Cauchy formula for n-th order can be
    obtained, and by generalizing the Cauchy formula for non-integer orders, we can
    achieve the Riemann-Liouville definition of fractional integral, and due to this,
    the well-known Gamma function is used as the factorial function for non-integer
    numbers. Therefore, by denoting the Riemann-Liouville definition of the fractional
    order of integral as ${}^{RL}\mathcal{I}_x^\beta f(x)$, it can be defined as follows
    Hadian et al. (2020):


    $${}^{RL}\mathcal{I}_x^\beta f(x) = \frac{1}{\Gamma(\beta)} \int_a^x (x-t)^{\beta-1}
    f(t) dt. \quad (10.5)$$


    in which $\beta$ is a real number which indicates the order of integral. Moreover,
    there is another definition for fractional derivative, namely, Caputo definition,
    and by denoting it as ${}^C\mathcal{D}_x^\beta f(x)$, it can be defined as follows
    Hadian et al. (2020):


    $${}^C\mathcal{D}_x^\beta f(x) = {}^{RL}\mathcal{I}_x^{(k-\beta)} f^{(k)}(x) =
    \begin{cases} \frac{1}{\Gamma(k-\beta)} \int_a^x \frac{f^{(k)}(t)dt}{(x-t)^{\beta+1-k}}
    & \text{if } \beta \notin \mathbb{N} \ \frac{d^\beta}{dx^\beta} & \text{if } \beta
    \in \mathbb{N} \end{cases}, \quad (10.6)$$


    It is worth mentioning that Eqs. (10.7) and (10.8) are the most useful properties
    of the Caputo derivative Hadian et al. (2020)'

    # Formatting the Style of Your Plot


    In order to distinguish each plot, there is an optional third argument that indicates
    the color and the shape of the plot. The letters and symbols of the format string
    are like MATLAB.


    ```

    plt.plot([1, 2, 3, 4], [1, 4, 9, 16], ''ro'')

    ```


    ![](img/a1d5f013073c7da63184a763d887fe2f_308_1.png)


    Numpy arrays also can be used to plot any sequenced data.


    ```

    import numpy as np


    # evenly sampled time at 200ms intervals

    t = np.arange(0., 5., 0.2)

    ```'
  - "[PAGE 309]\n\n```\n# red dashes, blue squares and green Radical.\nplt.plot(t,\
    \ t, 'r--', t, t**2, 'bs', t, np.sqrt(t), 'g^')\nplt.show()\n```\n\n![](img/a1d5f013073c7da63184a763d887fe2f_309_0.png)\n\
    \n# Plotting with Keyword Strings\n\nThere are some cases in which the format\
    \ of the data lets accessing particular variables with strings. With the Matplotlib\
    \ library, you can skillfully plot them. There is a sample demonstrating how it\
    \ is carried out.\n\n```\ndata = {'a': np.arange(50),\n        'c': np.random.randint(0,\
    \ 50, 50),\n        'd': np.random.randn(50)}\ndata['b'] = data['a'] + 10 * np.random.randn(50)\n\
    data['d'] = np.abs(data['d']) * 100\n\nplt.scatter('a', 'b', c='c', s='d', data=data)\n\
    plt.xlabel('entry a')\nplt.ylabel('entry b')\nplt.show()\n```"

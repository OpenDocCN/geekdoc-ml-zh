    ## 5.5 结论


    Gegenbauer（超球面）正交多项式在正交多项式中非常重要，因为它们已被用于解决许多微分方程问题，特别是如其名称所示在球面空间中。本章简要介绍了研究历史背景，解释了这些多项式的基础和性质，并构建了相关的核函数。此外，介绍了分数阶Gegenbauer正交多项式及其相应核的新方法，并在最后一节中，通过在基于核的学习算法（如SVM）中使用知名数据集的实验，展示了如何成功使用这种新核。



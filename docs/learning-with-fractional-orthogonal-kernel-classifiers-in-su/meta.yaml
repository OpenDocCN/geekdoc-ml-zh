    $$= \sum_{i=0}^{n} u(G_i^\lambda)^2 \iint \sum_{i=0}^{n} G_i^\lambda(x''_j)G_j^\lambda(x''_j)
    \left( \left( 1 - \left( \frac{x-a}{b-a} \right)^{2\alpha} \right) \left( 1 -
    \left( \frac{z-a}{b-a} \right)^{2\alpha} \right) \right)^{\lambda - \frac{1}{2}}
    g(x)g(z)dxdz$$

    $$+ \sum_{i=0}^{n} \epsilon u(G_i^\lambda)^2 \iint G_i^\lambda(x''_j)G_j^\lambda(x''_j)g(x)g(z)dxdz.
    \quad (5.46)$$



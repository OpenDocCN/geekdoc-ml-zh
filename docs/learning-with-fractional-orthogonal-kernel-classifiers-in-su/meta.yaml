    to calculate the coefficients in the sum in order to satisfy the differential
    equation as well as possible. Generally, in simple geometries for smooth problems,
    the spectral methods offer exponential rates of convergence/spectral accuracy
    (Spalart et al. 1991; Mai-Duy 2006). This method is divided into three main categories:
    collocation (Zayernouri and Karniadakis 2014, 2015), Galerkin (Shen 1994; Chen

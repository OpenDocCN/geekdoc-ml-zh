    # 6.5 Summary and Conclusion


    Jacobi orthogonal polynomials have been covered in this chapter which is the most
    general kind of classical orthogonal polynomials and has been used in many cases.
    In fact, the basics and the properties of these polynomials are explained, and
    also the ordinary Jacobi kernel function is constructed. Moreover, the fractional
    form of Jacobi polynomials and the relevant fractional Jacobi kernel function
    are introduced here which extended the applicability of such kernel by transforming
    the input data into a fractional space that has proved to leverage the accuracy
    of classification. Also, a comprehensive comparison is provided between the introduced
    Jacobi kernels'

- md: '## Chapter 4

    Fractional Legendre Kernel Functions:

    Theory and Application


    Amirreza Azmoon, Snehashish Chakraverty, and Sunil Kumar


    **Abstract** The support vector machine algorithm has been able to show great
    flexibility in solving many machine learning problems due to the use of different
    functions as a kernel. Linear, radial basis functions, and polynomial functions
    are the most common functions used in this algorithm. Legendre polynomials are
    among the most widely used orthogonal polynomials that have achieved excellent
    results in the support vector machine algorithm. In this chapter, some basic features
    of Legendre and fractional Legendre functions are introduced and reviewed, and
    then the kernels of these functions are introduced and validated. Finally, the
    performance of these functions in solving two problems (two sample datasets) is
    measured.


    **Keywords** Legendre polynomial · Fractional legendre functions · Kernel trick
    · Orthogonal functions · Mercer’s theorem


    ### 4.1 Introduction


    Another family of classic complete and orthogonal polynomials is the family of
    *Legendre Polynomials*, which was discovered by French mathematician *Adrien-Marie
    Legendre* (1752–1833) in 1782.


    A. Azmoon (✉)

    Department of Computer Science, The Institute for Advance Studies in Basic Sciences
    (IASBS), Zanjan, Iran

    e-mail: a.azmoon@iasbs.ac.ir


    S. Chakraverty

    Department of Mathematics, National Institute of Technology Rourkela, Sundargarh,
    OR, India


    S. Kumar

    Department of Mathematics, National Institute of Technology, Jamshedpur 831014,
    JH, India

    e-mail: skumar.math@nitjsr.ac.in


    © The Author(s), under exclusive license to Springer Nature Singapore Pte Ltd.
    2023

    J. A. Rad et al. (eds.), *Learning with Fractional Orthogonal Kernel Classifiers
    in Support Vector Machines*, Industrial and Applied Mathematics,

    https://doi.org/10.1007/978-981-19-6553-1_4


    > **Adrien-Marie Legendre** (1752–1833) is a French mathematician who made numerous
    contributions to mathematics. Legendre got his education from Collège Mazarin
    of Paris and defended his thesis at the age of 18. In 1782, he won a prize from
    the Berlin Academy for an essay titled “Research on the Trajectories of Projectiles
    in a Resistant Medium”, which brought significant attention to this young mathematician.
    During his career, many papers have been published on elliptic functions, number
    theory, and the method of least squares. In a publication titled “Research on
    the Shape of Planets”, he introduced Legendre polynomials. In honor of Legendre,
    a crater on the moon is named after him.<sup>a</sup>


    <sup>a</sup> For more information about **A.M. Legendre** and his contribution,
    please see: [https://mathshistory.st-andrews.ac.uk/Biographies/Legendre/](https://mathshistory.st-andrews.ac.uk/Biographies/Legendre/).


    Like other functions in the family of orthogonal functions, Legendre polynomials
    are used in various fields of science and industry, such as topography filtering
    Haitjema (2021), solving differential equations in the crystallization process
    in chemistry Chang and Wang (1984), expansions of hypergeometric functions Holderman
    and Jonas (1970); Sánchez-Ruiz and Dehesa (1988), calculating scattering of charged
    particles in physics Spencer (1953), Kaghashvili et al. (2004), financial market
    prediction models Dash (2020), Dash and Dash (2017), and modeling epileptic seizure
    Moayeri et al. (2020). Other important and common applications of Legendre functions
    in the industry include the analysis of time-varying linear control systems HWANG
    et al. (1985); model reduction in control systems Chang and Wang (1983); estimation
    algorithms in PMU systems Qian et al. (2014) in the field of power; wave motion
    in propagation Gao et al. (2021), Dahmen et al. (2016), Zheng et al. (2019); and
    reflection Gao et al. (2019). These examples mentioned are some of the fields
    in which orthogonal functions, especially Legendre functions, have been extensively
    used both to improve the scientific level of projects and to improve industrial
    efficiency. One of the most common and attractive applications of Legendre functions
    is to solve differential equations with different orders with the help of Legendre
    wavelet functions Mohammadi and Hosseini (2011), Chang and Isah (2016) and shifted
    Legendre functions Chang and Wang (1983), Zeghdane (2021). In particular, Mall
    and Chakraverty (2016) designed neural networks using Legendre functions to solve
    ordinary differential equations. This method, based on a single-layer Legendre
    neural network model, has been developed to solve initial and boundary value problems.
    In the proposed approach, a Legendre-polynomial-based functional link artificial
    neural network is developed. In fact, the hidden layer is eliminated by expanding
    the input pattern using Legendre polynomials. On the other hand, due to the diversity
    of different kernels, support vector machine algorithms Pan et al. (2012) are
    one of the most frequent and varied machine learning methods. In a recent study
    on this subject Afifi and Zanaty (2019), the usage of orthogonal functions as
    kernels has expanded substantially, so that these functions are now utilized as
    fractional, wavelet, or shifting order kernels in addition to regular orthogonal
    functions Afifi and Zanaty (2019),


    Parand, K., Moayeri, M.M., Latifi, S., Rad, J.A.: Numerical study of a multidimensional

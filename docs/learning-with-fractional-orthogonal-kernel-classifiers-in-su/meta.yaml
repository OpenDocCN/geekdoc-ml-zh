    \  Model class literally creates the model. Initialization starts under this class.\
    \ Calling the *model.model_fit* function initiates an object from the SVM class.\
    \ After calling the *Transformation* function, the train set gets ready to input\
    \ into the SVM object. Then, an object is ready to start the fitting process of\
    \ the SVM object from SVM class.\n  1. **ModelFit function**\n     Initiates an\
    \ object from the SVM class, transforms/normalizes the train set, and calls the\
    \ fit function of the SVM object. Finally captures the fitted model and parameters.\n\
    \  2. **ModelPredict function**\n     Transforms/Normalizes the train set. Calls\
    \ the predict function of the SVM object with proper parameters. And finally calls\
    \ *accuracy_score*, *confusion_matrix*, and *classification_report* of Scikit\
    \ learn (sklearn.metrics) with the previously captured result.\n- **SVM class**\n\
    \  Here the svm equation is formed, and required matrices of *cvxopt* are created\
    \ under the fit function of the SVM class. Invokes *cvxopt* and solves the SVM\
    \ equation to determine the support vectors and calculate the hyper-plane's equation.\
    \ The prediction procedure is implemented under the prediction function of the\
    \ SVM class.\n  1. **fit function** creates proper matrices by directly calling\
    \ kernels. Such matrices are the *Gram matrix* and also other matrices of the\
    \ SVM equation required by *cvxopt*. As the result, *cvxopt* returns *Lagrange\
    \ Multipliers*. Applying some criteria of user interest, support vectors opt from\
    \ them, and as a result, the *SVM.fit* function returns the weights and bias of\
    \ the hyper-plane's equation and also the array of support vectors.\n  2. **predict**\
    \ function maps data points from the test set with the decision boundary (hyper-plane\
    \ equation) and determines to which class each data points belong.\n- **Transformation**\
    \ function\n  This is the function that normalizes the input dataset or, in the\
    \ case of fractional form, transforms the input dataset into fractional space,\
    \ in other words, normalizes the input in fractional space.\n- **Kernels** module\
    \ includes one class per kernel. So currently there exist four classes for each\
    \ orthogonal kernel. The following classes are available in the *kernels* module:\n\
    \  - **Chebyshev** class contains the relevant functions to calculate the orthogonal\
    \ polynomials and fractional form of the Chebyshev family of the first kind.\n\
    \  - **Legendre** class holds the relevant functions to calculate the orthogonal\
    \ polynomials and fractional form of the Legendre family.\n  - **Gegenbauer**\
    \ class consists of the relevant functions to calculate the orthogonal polynomials\
    \ and fractional form of the Gegenbauer family.\n  - **Jacobi** class includes\
    \ the relevant functions to calculate the orthogonal polynomials and fractional\
    \ form of the Jacobi family.\n\n**ORSVM** is written in Python programming language\
    \ which requires Python version 3 or higher.\n\n## 12.2 How to Install\n\nTo use\
    \ the package you can install it using pip as follows:\n\n```\npip install orsvm.py\n\
    ```\n\nor you can easily clone the package from our GitHub and use the setup.py\
    \ file to install the package;\n\n```\npython setup.py install.\n```\n\n## 12.3\
    \ Model Class\n\nThis is the interface to use the **ORSVM** package. Using **ORSVM**\
    \ starts with creating an object of the *Model* class. This class includes a *ModelFit*\
    \ function which itself creates an **ORSVM** model as an instance of the *SVM*\
    \ class. Then normalizes the input data in the case of the normal form of the\
    \ kernel or transforms the input data in the case of fractional form. Choosing\
    \ between normal or fractional is determined by the value of the argument $T$\
    \ if $T = 1$ the kernel is in normal form, and in the case of $0 < T < 1$, then\
    \ it is the fractional form. $model\\_fit$ function receives the train and test\
    \ set separately; moreover, each of them should be divided into two matrices of\
    \ $x$ and $y$. The matrix $x$ is the whole dataset where the relevant column to\
    \ output a.k.a class or label is omitted and the matrix $y$ is that specific column\
    \ of class or label. Division of datasets can be achieved through multiple methods.\
    \ A widely used one is $StratifiedShuffleSplit$ from $sklearn.model\\_selection$.\n\
    \nCreating an object of the Model class requires some input parameters, cause\
    \ it needs to create an SVM object with these passed parameters. The following\
    \ example code creates an $orsvm$ classifier from the $Jacobi$ kernel function\
    \ of order 3.\n\n```\nobj = orsvm.Model(kernel=\"jacobi\", order = 3, T = 0.5,\n\
    \                  k_param1 = -0.8, k_param2 = 0.2,\n                  sv_determiner\
    \ = 'a', form = 'r', C = 100)\n```\n\nHere $T = 0.5$ means that it is in the fractional\
    \ form of order 0.5. “k\\_param1” is equivalent to $\\psi$, and “k\\_param2” is\
    \ equivalent to $\\omega$ in case “Jacobi” kernel is chosen. If it was $Gegenbauer$,\
    \ then only “k\\_param1” was applicable to the kernel. Because $Chebyshev$ and\
    \ $Legendre$ both do not have any hyper-parameter, there is no need to pass any\
    \ value for “k\\_param1” and “k\\_param2”, even if one passes values for these\
    \ parameters, those will be ignored. Parameter $sv\\_determiner$ is the user’s\
    \ choice on how support vectors have to be selected among Lagrange Multipliers\
    \ (data points which were computed through convex optimization solver and opted\
    \ as candidates to draw the SVM’s hyper-plane). This is one of the important parameters\
    \ that can affect final classification performance metrics. Three options are\
    \ considered for choosing support vectors. Two options are widely used, first\
    \ a number of type int, that represents the number of support vectors that should\
    \ be selected from Lagrange Multipliers, if the number is greater than that number\
    \ of Lagrange Multipliers then all of them will be selected as support vectors.\
    \ The second one is a number in scientific notation (often a negative power of\
    \ 10) as a minimum threshold, and the third method which is considered in **ORSVM**\
    \ is the flag “a” that represents $Average$. Most of the time, we have no clear\
    \ conjecture about the values of Lagrange Multipliers, how small they are, or\
    \ how many of them will be available. Therefore, we do not know what the threshold\
    \ should be, or how many support vectors should be chosen. Sometimes, it leads\
    \ to **zero** support vectors, then there will be an **Error**. Our solution to\
    \ this situation, which always happens for a new dataset, is the $average$ method.\
    \ In this case, **ORSVM** finds the average of Lagrange Multipliers and sets the\
    \ threshold. Then, never an error has occurred. However, this method does not\
    \ guarantee the best generalization accuracy. But gives a factual estimation about\
    \ support vectors. After all, choosing the best number of support vectors itself\
    \ is an important task to do in SVM. The parameter $form$ is only applicable to\
    \ $Chebyshev$ kernel, because two implementations of $Chebyshev$ Kernel are available,\
    \ an explicit equation and a recursive one. So “r” refers to recursive and “e”\
    \ refers to “explicit”. Parameter “noise” is only applicable to the $Jacobi$ kernel,\
    \ and the Jacobi’s weight function indeed. In fact, ‘noise’ purpose is to avoid\
    \ the errors that happen at the boundaries of the weight function as it has already\
    \ been explained. Finally, parameter “C” is the regularization\n\n¹ A suitable\
    \ guide on this package is available at http://cvxopt.org about installation and\
    \ how to use it."
  mdcn: "SVM算法的核心在于求解SVM的凸方程并找到*支持向量*，这可以通过*cvxopt*库中的凸二次求解器实现，而*cvxopt*本身是一个用于凸优化的免费Python包。¹\n\
    \nORSVM由两个模块构成。一个模块包含核函数类，另一个模块包含支持初始化、归一化、拟合过程、捕获拟合模型以及分类报告的相关类和函数。**ORSVM**的结构如下：\n\
    \n- **orsvm模块**\n  这是主模块，包含拟合过程、预测和报告。它包括Model和SVM类以及转换（归一化）函数。我们选择使用*transformation*（转换）而非*normalization*（归一化）这个名称，是因为该函数也能实现到分数空间的转换。\n\
    - **Model类**\n  Model类字面上就是创建模型的地方。初始化从这个类开始。调用*model.model_fit*函数会从SVM类创建一个对象。调用*Transformation*函数后，训练集就准备好输入到SVM对象中。然后，一个对象就准备好开始SVM类中SVM对象的拟合过程。\n\
    \  1. **ModelFit函数**\n     从SVM类创建一个对象，转换/归一化训练集，并调用SVM对象的fit函数。最后捕获拟合后的模型和参数。\n\
    \  2. **ModelPredict函数**\n     转换/归一化训练集。使用适当的参数调用SVM对象的predict函数。最后，使用之前捕获的结果调用Scikit\
    \ learn (sklearn.metrics)的*accuracy_score*、*confusion_matrix*和*classification_report*。\n\
    - **SVM类**\n  在这里，SVM方程被构建，并在SVM类的fit函数下创建*cvxopt*所需的矩阵。调用*cvxopt*并求解SVM方程以确定支持向量并计算超平面方程。预测过程在SVM类的预测函数下实现。\n\
    \  1. **fit函数**通过直接调用核函数创建合适的矩阵。这些矩阵是*Gram矩阵*以及*cvxopt*所需的SVM方程的其他矩阵。结果，*cvxopt*返回*拉格朗日乘子*。应用用户感兴趣的某些标准，从中选择支持向量，结果，*SVM.fit*函数返回超平面方程的权重和偏置以及支持向量数组。\n\
    \  2. **predict**函数将测试集的数据点与决策边界（超平面方程）进行映射，并确定每个数据点属于哪个类别。\n- **Transformation函数**\n\
    \  这个函数用于归一化输入数据集，或者在分数形式的情况下，将输入数据集转换到分数空间，换句话说，在分数空间中归一化输入。\n- **Kernels模块**包含每个核函数一个类。因此，目前每个正交核函数有四个类。*kernels*模块中可用的类如下：\n\
    \  - **Chebyshev类**包含计算第一类切比雪夫族正交多项式和分数形式的相关函数。\n  - **Legendre类**包含计算勒让德族正交多项式和分数形式的相关函数。\n\
    \  - **Gegenbauer类**包含计算盖根鲍尔族正交多项式和分数形式的相关函数。\n  - **Jacobi类**包含计算雅可比族正交多项式和分数形式的相关函数。\n\
    \n**ORSVM**使用Python编程语言编写，需要Python 3或更高版本。\n\n## 12.2 如何安装\n\n要使用该包，你可以使用pip安装如下：\n\
    \n```\npip install orsvm.py\n```\n\n或者你可以轻松地从我们的GitHub克隆该包，并使用setup.py文件安装该包；\n\
    \n```\npython setup.py install.\n```\n\n## 12.3 Model类\n\n这是使用**ORSVM**包的接口。使用**ORSVM**从创建*Model*类的对象开始。这个类包含一个*ModelFit*函数，该函数本身创建一个**ORSVM**模型作为*SVM*类的实例。然后，在核函数为正常形式的情况下归一化输入数据，或在分数形式的情况下转换输入数据。在正常和分数形式之间选择由参数$T$的值决定，如果$T\
    \ = 1$，核函数为正常形式；如果$0 < T < 1$，则为分数形式。$model\\_fit$函数分别接收训练集和测试集；此外，每个集合都应分为$x$和$y$两个矩阵。矩阵$x$是整个数据集，其中省略了与输出（即类别或标签）相关的列，矩阵$y$是该特定的类别或标签列。数据集的划分可以通过多种方法实现。一种广泛使用的方法是$sklearn.model\\\
    _selection$中的$StratifiedShuffleSplit$。\n\n创建Model类的对象需要一些输入参数，因为它需要使用这些传递的参数创建一个SVM对象。以下示例代码创建一个来自阶数为3的$Jacobi$核函数的$orsvm$分类器。\n\
    \n```\nobj = orsvm.Model(kernel=\"jacobi\", order = 3, T = 0.5,\n            \
    \      k_param1 = -0.8, k_param2 = 0.2,\n                  sv_determiner = 'a',\
    \ form = 'r', C = 100)\n```\n\n这里$T = 0.5$表示它是阶数为0.5的分数形式。如果选择“Jacobi”核函数，“k\\\
    _param1”相当于$\\psi$，“k\\_param2”相当于$\\omega$。如果是$Gegenbauer$，则只有“k\\_param1”适用于该核函数。因为$Chebyshev$和$Legendre$都没有任何超参数，所以不需要为“k\\\
    _param1”和“k\\_param2”传递任何值，即使传递了这些参数的值，也会被忽略。参数$sv\\_determiner$是用户选择如何在拉格朗日乘子（通过凸优化求解器计算并被选为绘制SVM超平面候选的数据点）中选择支持向量的方式。这是可能影响最终分类性能指标的重要参数之一。选择支持向量有三种选项。两种选项被广泛使用，第一种是整数类型，表示应从拉格朗日乘子中选择的支持向量数量，如果该数字大于拉格朗日乘子的数量，则所有拉格朗日乘子都将被选为支持向量。第二种是科学计数法表示的数字（通常是10的负幂次）作为最小阈值，第三种在**ORSVM**中考虑的方法是标志“a”，代表$Average$（平均值）。大多数时候，我们对拉格朗日乘子的值没有明确的推测，它们有多小，或者有多少个可用。因此，我们不知道阈值应该是多少，或者应该选择多少个支持向量。有时，这会导致**零**个支持向量，然后会出现**错误**。我们对这种情况的解决方案，对于新数据集总是会发生，是$average$方法。在这种情况下，**ORSVM**找到拉格朗日乘子的平均值并设置阈值。这样，就不会发生错误。然而，这种方法不能保证最佳的泛化精度。但它提供了关于支持向量的事实估计。毕竟，选择最佳数量的支持向量本身在SVM中就是一项重要的任务。参数$form$仅适用于$Chebyshev$核函数，因为$Chebyshev$核函数有两种实现方式，显式方程和递归方程。因此“r”指递归，“e”指“显式”。参数“noise”仅适用于$Jacobi$核函数，实际上是雅可比权重函数。事实上，“noise”的目的是避免在权重函数边界处发生的错误，正如之前已经解释的那样。最后，参数“C”是正则化\n\
    \n¹ 关于此包的安装和使用方法的合适指南可在 http://cvxopt.org 获取。"

    ## 第11章

    基于分数阶正交函数的LS-SVM的GPU加速


    Armin Ahmadzadeh, Mohsen Asghari, Dara Rahmati, Saeid Gorgin, and Behzad Salami


    **摘要** SVM分类器在分类问题中被广泛使用。然而，其计算复杂性阻碍了它在没有加速方法的情况下的应用。使用图形处理单元进行通用计算（GPGPU）是加速基于数组操作的最常用技术之一。本章介绍了一种在GPU设备上应用分数阶正交函数核来加速SVM的方法。本书中用作SVM核的第一类切比雪夫函数的实验结果表明，与CPU执行相比，GPU加速实现了2.2倍的加速。在代码的拟合函数和训练部分，在Google
    Colab GPU设备上获得了58倍的加速。本章提出了更多关于GPU架构的细节，以及它如何与CPU一起作为协处理器来加速SVM分类器。


    **关键词** 软件加速器 · 核函数 · 图形处理单元



    or arrangement, called pattern, to be learned by ML algorithms. The data may be
    created by humans such as stock price or a signature or have a natural nature
    such as speech signals or DNS. Therefore, a pattern includes elements that are
    repeated in a predictable manner. The patterns in natural data, e.g., speech signals,
    are often chaotic and stochastic and do not exactly repeat. There are various
    types of natural patterns which include spirals, meanders, waves, foams, tilings,
    cracks, and those created by symmetries of rotation and reflection. Some types
    of patterns such as a geometric pattern in an image can be directly observed while
    abstract patterns in a huge amount of data or a language may become observable
    after analyzing the data using pattern discovery methods. In both cases, the underlying
    mathematical structure of a pattern can be analyzed by machine learning techniques
    which are mainly empowered by mathematical tools. The techniques can learn the
    patterns to predict or recognize them or can search them to find the regularities.
    Accordingly, if a dataset suffers from any regularities and repeatable templates,
    the modeling result of ML techniques will not be promising.


    # 1.3 An Introduction to SVM with a Geometric Interpretation


    Support Vector Machine (SVM), also known as support vector network, is a supervised
    learning approach used for classification and regression. Given a set of training
    labeled examples belonging to two classes, the SVM training algorithm builds a
    decision boundary between the samples of these classes. SVM does this in such
    a way that optimally discriminates between two classes by maximizing the margin
    between two data categories. For data samples in an $N$-dimensional space, SVM
    constructs an $N - 1$-dimensional separating hyperplane to discriminate two classes.
    To describe'
  - '[PAGE 21]


    # 1 Introduction to SVM


    ![](img/a1d5f013073c7da63184a763d887fe2f_21_0.png)


    the SVM, assume a binary classification example in a two-dimensional space, e.g.,
    distinguishing a cat from a dog using the values of their height ($x_1$) and weight
    ($x_2$). An example of the training labeled samples for these classes in the feature
    space is given in Fig. 1.2a, in which the samples for the dog are considered as
    the positive samples and the cat samples are presented as the negative ones. To
    do the classification, probably the primary intuitive approach is to draw a separate
    line between the positive and negative samples. However, as it is shown in Fig.
    1.2b, there are many possible lines to be the decision boundary between these
    classes. Now, the question is which line is better and should be chosen as the
    boundary?


    Although all the lines given in Fig. 1.2b are a true answer to do the classification,
    neither of them seems the best fit. Alternatively, a line that is drawn between
    the two classes which have the maximum distance from both classes is the better
    choice. To do this, the data points that lie closest to the decision boundary
    are the most difficult samples to classify and they have a direct bearing on the
    optimum location of the boundary. These samples are called support vectors that
    are closer to the decision boundary and influence the position and orientation
    (see Fig. 1.3). According to these vectors, the maximum distance between the two
    classes is determined. This distance is called margin and a decision line that
    is half this margin seems to be the optimum boundary. This line is such that the
    margin is maximized which is called the maximum-margin line between the two classes.
    SVM classifier attempts to find this optimal line.


    In SVM, to construct the optimal decision boundary, a vector $\mathbf{w}$ is considered
    to be perpendicular to the margin. Now, to classifying an unknown vector $\mathbf{x}$,
    we can project it onto $\mathbf{w}$ by computing $\mathbf{w}.\mathbf{x}$ and determine
    on which side of the decision boundary $\mathbf{x}$ lies by calculating $\mathbf{w}.\mathbf{x}
    \geq t$ for a constant threshold $t$. It means that if the values of $\mathbf{w}.\mathbf{x}$
    are more than $t$, i.e., it is far away, sample $\mathbf{x}$ is classified as
    a positive example. By assuming $t = -w_0$, the given decision rule can be given
    as $\mathbf{w}.\mathbf{x} + w_0 \geq 0$. Now, the question is, how we can determine
    the values of $\mathbf{w}$ and $w_0$? To do this, the following constraints are
    considered which means a sample is classified as positive if the value is equal
    or greater than 1, it is classified as negative if the value of $-1$ or less:'
  - '[PAGE 22]


    ![](img/a1d5f013073c7da63184a763d887fe2f_22_0.png)


    (a) Support vectors and optimum decision boundary. (b) Decision boundary equation
    and maximum margin.


    **Fig. 1.3** a SVM optimum decision boundary, b Definition of the notations


    $$\mathbf{w}.\mathbf{x}_+ + w_0 \geq 1, \quad and \quad \mathbf{w}.\mathbf{x}_-
    + w_0 \leq -1. \tag{1.1}$$


    These two equations can be integrated into an inequality, as in Eq. 1.2 by introducing
    a supplementary variable, $y_i$ which is equal to $+1$ for positive samples and
    is equal to $-1$ for negative samples. This inequality is considered as equality,
    i.e., $y_i(\mathbf{w}.\mathbf{x}_i + w_0) - 1 = 0$, to define the main constraint
    of the problem which means the examples lying on the margins (i.e., *support vectors*)
    to be constrained to 0. This equation is equivalence to a line that is the answer
    to our problem. This decision boundary line in this example becomes a hyperplane
    in the general $N$-dimensional case.


    $$y_i(\mathbf{w}.\mathbf{x}_i + w_0) - 1 \geq 0. \tag{1.2}$$


    To find the maximum margin that separating positive and negative examples, we
    need to know the width of the margin. To calculate the width of the margin, $(\mathbf{x}_+
    - \mathbf{x}_-)$ need to be projected onto unit normalized $\frac{\mathbf{w}}{\|\mathbf{w}\|}$.
    Therefore, the width is computed as $(\mathbf{x}_+ - \mathbf{x}_-).\frac{\mathbf{w}}{\|\mathbf{w}\|}$
    in which by using $y_i(\mathbf{w}.\mathbf{x}_i + w_0) - 1 = 0$ to substituting
    $\mathbf{w}.\mathbf{x}_+ = 1 - w_0$ and $\mathbf{w}.\mathbf{x}_- = 1 + w_0$ in
    that, the final value for width is obtained as $2\|\mathbf{w}\|$ (see Fig. 1.3).
    Finally, maximizing this margin is equivalent to Eq. 1.3 which is a quadratic
    function:


    $$\min_{\mathbf{w}, w_0} \frac{1}{2} \|\mathbf{w}\|^2, \quad y_i(\mathbf{w}.\mathbf{x}_i
    + w_0) - 1 \geq 0. \tag{1.3}$$


    This is a constrained optimization problem and can be solved by the Lagrange multiplier
    method. After writing the Lagrangian equation as in Eq. 1.4, and computing the
    partial derivative with respect to $\mathbf{w}$ and setting it to zero results
    in $\mathbf{w} = \sum_i \alpha_i y_i \mathbf{x}_i$ and with respect to $w_0$ and
    setting it to zero gives $\sum_i \alpha_i y_i$. It means that $\mathbf{w}$ is
    a linear combination of the samples. Using these values in Eq. 1.4 results in
    a Lagrangian'
  - '[PAGE 23]


    # 1 Introduction to SVM


    ![](img/a1d5f013073c7da63184a763d887fe2f_23_0.png)


    equation in which the problem depends only on dot products of pairs of data samples.
    Also, $\alpha_i = 0$ for the training examples that are not support vectors that
    means these examples do not affect the decision boundary. Another interesting
    fact about this optimization problem is that it is a convex problem and it is
    guaranteed to always find a global optimum.


    $$L(\mathbf{w}, w_0) = \frac{1}{2}\|\mathbf{w}\|^2 + \sum_i [y_i(\mathbf{w}.\mathbf{x}_i
    + w_0) - 1]\alpha_i. \quad (1.4)$$


    The above-described classification problem and its solution using the SVM assumes
    the data is linearly separable. However, in most real-life applications, this
    assumption is not correct and most problems are not classified simply using a
    linear boundary. The SVM decision boundary is originally linear Vapnik (1963)
    but has been extended to handle nonlinear cases as well Boser et al. (1992). To
    do this, SVM proposes a method called kernel trick in which an input vector is
    transformed using a nonlinear function like $\phi(.)$ into a higher dimensional
    space. Then, in this new space, the maximum-margin linear boundary is found. It
    means that a nonlinear problem is converted into a linearly separable problem
    in the new higher dimensional space without affecting the convexity of the problem.
    A simple example of this technique is given in Fig. 1.4 in which one-dimensional
    data samples, $x_i$, are transformed into two-dimensional space using $(x_i, x_i
    \times x_i)$ transform. In this case, the dot product of two samples, i.e., $x_i.x_j$,
    in the optimization problem is replaced with $\phi(x_i).\phi(x_j)$. In practice,
    if we have a function like such that $K(x_i, x_j) = \phi(x_i).\phi(x_j)$, then
    we do not need to know the transformation $\phi(.)$ and only function $K(.)$ (which
    is called the *kernel function*) is required. Some common kernel functions are
    linear, polynomial, sigmoid, and radial basis functions (RBF).


    Although the kernel trick is a clever method to handle the nonlinearity, the SVM
    still assumes that the data is linearly separable in this transformed space. This
    assumption is not true in most real-world applications. Therefore, another type
    of SVM is proposed which is called *soft-margin SVM* Cortes and Vapnik (1995).
    The described SVM method up to now is known as *hard-margin SVM*. As given, hard-margin
    SVMs assume the data is linearly separable without any errors, whereas soft-margin
    SVMs allow some misclassification and results in a more robust decision in nonlinearly'
- md: '## 1.4 History of SVMs


    Vladimir Vapnik, the Russian statistician, is the main originator of the SVM technique.
    The primary work on the SVM algorithm was proposed by Vapnik (1963) as the Generalized
    Portrait algorithm for pattern recognition. However, it was not the first algorithm
    for pattern recognition, and Fisher in 1936 had proposed a method for this purpose
    Fisher (1936). Also, Frank Rosenblatt had been proposed the perceptron linear
    classifier which was an early feedforward neural network Rosenblatt (1958). One
    year after the primary work of Vapnik and Lerner, in 1964, Vapnik further developed
    the Generalized Portrait algorithm Vapnik and Chervonenkis (1964). In this year,
    a geometrical interpretation of the kernels was introduced in Aizerman et al.
    (1964) as inner products in a feature space. The kernel theory which is the main
    concept in the development of SVM and is called “kernel trick” was previously
    proposed in Aronszajn (1950). In 1965, a large margin hyperplane in the input
    space was introduced in Cover (1965) which is another key idea of the SVM algorithm.
    At the same time, a similar optimization concept was used in pattern recognition
    by Mangasarian (1965). Another important research that defines the basic idea
    of the soft-margin concept in SVM was introduced by Smith (1968). This idea was
    presented as the use of slack variables to overcome the problem of noisy samples
    that are not linearly separable. In the history of SVM development, the breakthrough
    work is the formulation of statistical learning framework or VC theory proposed
    by Vapnik and Chervonenkis (1974) which presents one of the most robust prediction
    methods. It is not surprising to say that the rising of SVM was in this decade
    and this reference has been translated from Russian into other languages such
    as German Vapnik and Chervonenkis (1979) and English Vapnik (1982). The use of
    polynomial kernel in SVM was proposed by Poggio (1975) and the improvement of
    kernel techniques for regression was presented by Wahba (1990). Studying the connection
    between neural networks and kernel regression was done by Poggio and Girosi (1990).
    The improvement of the previous work on slack variables in Smith (1968) was done
    by Bennett and Mangasarian (1992). Another main milestone in the development of
    SVM is in 1992 in which SVM has been presented in its today’s form by Boser et
    al. (1992). In this work, the optimal margin classifier of linear classifiers
    (from Vapnik (1963)) was extended to nonlinear cases by utilizing the kernel trick
    to maximum-margin hyperplanes Aizerman et al. (1964). In 1995, soft margin of
    SVM classifiers to handle noisy and not linearly separable data was introduced
    using slack variables by Cortes and Vapnik (1995). In 1996, the algorithm was
    extended to the case of regression Drucker et al. (1996) which is called Support
    Vector Regression (SVR). The rapid growth of SVM and using this technique in various
    applications has been increased after 1995. Also, the theoretical aspects of SVM
    have been studied and it has been extended in other domains than the classification.
    The statistical bounds on the generalization of hard margin were given by Bartlett
    (1998) and it was presented for soft margin and the regression case in 2000 by
    Shawe-Taylor and Cristianini (2000). The SVM was originally developed for supervised
    learning which has been extended to the unsupervised case in Ben-Hur et al. (2001)
    called support vector clustering. Another improvement of SVM was its extension
    from the binary classification into multiclass SVM by Duan and Keerthi in Duan
    and Keerthi (2005) by distinguishing between one of the labels and the rest (one-versus-all)
    or between every pair of classes (one-versus-one). In 2011, SVM was analyzed as
    a graphical model and it was shown that it admits a Bayesian interpretation using
    data augmentation technique Polson and Scott (2011). Accordingly, a scalable version
    of the Bayesian SVM was developed in Wenzel et al. (2017) enabling the application
    of Bayesian SVMs in big data applications. A summary of the related researches
    to SVM development is given in Table 1.1.


    ### Table 1.1 A brief history of SVM development


    | Decade | Year | Researcher(s) | SVM development |

    |---|---|---|---|

    | 1950 | 1950 | Aronszajn (1950) | Introducing the “Theory of Reproducing Kernels”
    |

    | 1960 | 1963 | Vapnik and Lerner (1963) | Introducing the Generalized Portrait
    algorithm (the algorithm implemented by support vector machines is a nonlinear
    generalization of the Generalized Portrait algorithm) |

    | | 1964 | Vapnik (1964) | Developing the Generalized Portrait algorithm |

    | | 1964 | Aizerman et al. (1964) | Introducing the geometrical interpretation
    of the kernels as inner products in a feature space |

    | | 1965 | Cover (1965) | Discussing large margin hyperplanes in the input space
    and also sparseness |

    | | 1965 | Mangasarian (1965) | Studying optimization techniques for pattern recognition
    similar to large margin hyperplanes |

    | | 1968 | Smith (1968) | Introducing the use of slack variables to overcome the
    problem of noise and non-separability |

    | 1970 | 1973 | Duda and Hart (1973) | Discussing large margin hyperplanes in
    the input space |

    | | 1974 | Vapnik and Chervonenkis (1974) | Writing a book on “statistical learning
    theory” (in Russian) which can be viewed as the starting of SVMs |

    | | 1975 | Poggio (1975) | Proposing the use of polynomial kernel in SVM |

    | | 1979 | Vapnik and Chervonenkis (1979) | Translating of Vapnik and Chervonenkis’s
    1974 book to German |

    | 1980 | 1982 | Vapnik (1982) | Writing an English translation of his 1979 book
    |

    | 1990 | 1990 | Poggio and Girosi (1990) | Studying the connection between neural
    networks and kernel regression |

    | | 1990 | Wahba (1990) | Improving the kernel method for regression |

    | | 1992 | Bennett and Mangasarian (1992) | Improving Smith’s 1968 work on slack
    variables |

    | | 1992 | Boser et al. (1992) | Presenting SVM in today’s form at the COLT 1992
    conference |

    | | 1995 | Cortes and Vapnik (1995) | Introducing the soft-margin classifier |

    | | 1996 | Drucker et al. (1996) | Extending the algorithm to the case of regression,
    called SVR |

    | | 1997 | Muller et al. (1997) | Extending SVM for time-series prediction |

    | | 1998 | Bartlett (1998) | Providing the statistical bounds on the generalization
    of hard margin |

    | 2000 | 2000 | Shawe-Taylor and Cristianini (2000) | Giving the statistical bounds
    on the generalization of soft margin and the regression case |

    | | 2001 | Ben-Hur et al. (2001) | Extending SVM to the unsupervised case |

    | | 2005 | Duan and Keerthi (2005) | Extending SVM from the binary classification
    into multiclass SVM |

    | 2010 | 2011 | Polson and Scott (2011) | Studying graphical model representation
    of SVM and its Bayesian interpretation |

    | | 2017 | Wenzel et al. (2017) | Developing a scalable version of Bayesian SVM
    for big data applications |


    ## 1.5 SVM Applications


    Today, machine learning algorithms are on the rise and are widely used in real
    applications. Every year new techniques are proposed that overcome the current
    leading algorithms. Some of them are only little advances or combinations of existing
    algorithms and others are newly created and lead to astonishing progress. Although
    deep learning techniques are dominant in many real applications such as image
    processing (e.g., for image classification) and sequential data modeling (e.g.,
    in natural language processing tasks such as machine translation), these techniques
    require a huge amount of training data for success modeling. Large-scale labeled
    datasets are not available in many applications in which other ML techniques (called
    classical ML methods) such as SVM, decision tree, and Bayesian family methods
    have higher performance than deep learning techniques. Furthermore, there is another
    fact in ML. Each task in ML applications can be solved using various methods;
    however, there is no single algorithm that will work well for all tasks. This
    fact is known as the No Free Lunch Theorem in ML Wolpert (1996). Each task that
    we want to solve has its idiosyncrasies and there are various ML algorithms to
    suit the problem. Among the non-deep learning methods, SVM, as a well-known machine
    learning technique, is widely used in various classification and regression tasks
    today due to its high performance and reliability across a wide variety of problem
    domains and datasets Cervantes et al. (2020). Generally, SVM can be applied to
    any ML task in any application such as computer vision and image processing, natural
    language processing (NLP), medical applications, biometrics, and cognitive science.
    In the following, some common applications of SVM are reviewed.'
  mdcn: '## 1.4 支持向量机的历史


    俄罗斯统计学家**弗拉基米尔·瓦普尼克**是支持向量机技术的主要创始人。支持向量机算法的主要工作由瓦普尼克（1963）提出，作为用于模式识别的广义肖像算法。然而，这并非第一个用于模式识别的算法，费舍尔在1936年就为此目的提出了一种方法费舍尔（1936）。此外，弗兰克·罗森布拉特提出了感知器线性分类器，这是一种早期的前馈神经网络罗森布拉特（1958）。在瓦普尼克和勒纳的主要工作一年后，即1964年，瓦普尼克进一步发展了广义肖像算法瓦普尼克和乔尔文基斯（1964）。同年，艾泽曼等人（1964）引入了核的几何解释，将其视为特征空间中的内积。核理论是支持向量机发展的主要概念，被称为“核技巧”，此前已在阿罗恩扎恩（1950）中提出。1965年，科弗（1965）引入了输入空间中的大间隔超平面，这是支持向量机算法的另一个关键思想。与此同时，曼加萨里安（1965）在模式识别中使用了类似的优化概念。史密斯（1968）引入了另一项重要研究，定义了支持向量机中软间隔概念的基本思想。该思想被提出作为使用松弛变量来克服噪声样本线性不可分的问题。在支持向量机发展史上，突破性工作是瓦普尼克和乔尔文基斯（1974）提出的统计学习框架或VC理论，它提出了最稳健的预测方法之一。毫不奇怪地说，支持向量机的兴起始于这十年，该参考文献已从俄语翻译成其他语言，如德语瓦普尼克和乔尔文基斯（1979）和英语瓦普尼克（1982）。波吉奥（1975）提出了在支持向量机中使用多项式核，而瓦哈（1990）提出了改进回归的核技术。波吉奥和吉罗西（1990）研究了神经网络与核回归之间的联系。贝内特和曼加萨里安（1992）改进了史密斯（1968）关于松弛变量的先前工作。支持向量机发展的另一个主要里程碑是在1992年，博瑟等人（1992）以当今的形式呈现了支持向量机。在这项工作中，线性分类器的最优间隔分类器（来自瓦普尼克（1963））通过利用核技巧扩展到最大间隔超平面的非线性情况艾泽曼等人（1964）。1995年，科尔特斯和瓦普尼克（1995）引入了支持向量机分类器的软间隔，使用松弛变量处理噪声和线性不可分数据。1996年，该算法被扩展到回归情况德鲁克等人（1996），称为支持向量回归。1995年后，支持向量机的快速增长以及该技术在各种应用中的使用有所增加。此外，支持向量机的理论方面已被研究，并已扩展到分类以外的其他领域。巴特利特（1998）给出了硬间隔泛化的统计界限，而肖-泰勒和克里斯蒂亚尼尼（2000）在2000年将其呈现给软间隔和回归情况。支持向量机最初是为监督学习开发的，后来被扩展到无监督情况本-胡尔等人（2001），称为支持向量聚类。支持向量机的另一个改进是段和克尔蒂（2005）将其从二元分类扩展到多类支持向量机，通过区分一个标签与其余标签（一对多）或每对类别之间（一对一）。2011年，支持向量机被分析为一个图模型，并表明它使用数据增强技术接受贝叶斯解释波尔森和斯科特（2011）。因此，韦策尔等人（2017）开发了一个可扩展的贝叶斯支持向量机版本，使得贝叶斯支持向量机能够应用于大数据应用。表1.1总结了与支持向量机发展相关的研究。


    ### 表1.1 支持向量机发展的简要历史


    | 十年 | 年份 | 研究者 | 支持向量机发展 |

    |---|---|---|---|

    | 1950 | 1950 | 阿罗恩扎恩（1950） | 引入“再生核理论” |

    | 1960 | 1963 | 瓦普尼克和勒纳（1963） | 引入广义肖像算法（支持向量机实现的算法是广义肖像算法的非线性推广） |

    | | 1964 | 瓦普尼克（1964） | 发展广义肖像算法 |

    | | 1964 | 艾泽曼等人（1964） | 引入核的几何解释，将其视为特征空间中的内积 |

    | | 1965 | 科弗（1965） | 讨论输入空间中的大间隔超平面以及稀疏性 |

    | | 1965 | 曼加萨里安（1965） | 研究类似于大间隔超平面的模式识别优化技术 |

    | | 1968 | 史密斯（1968） | 引入使用松弛变量来克服噪声和不可分性问题 |

    | 1970 | 1973 | 达达和哈特（1973） | 讨论输入空间中的大间隔超平面 |

    | | 1974 | 瓦普尼克和乔尔文基斯（1974） | 撰写关于“统计学习理论”的书籍（俄语），可视为支持向量机的起点 |

    | | 1975 | 波吉奥（1975） | 提出在支持向量机中使用多项式核 |

    | | 1979 | 瓦普尼克和乔尔文基斯（1979） | 将瓦普尼克和乔尔文基斯1974年的书籍翻译成德语 |

    | 1980 | 1982 | 瓦普尼克（1982） | 撰写其1979年书籍的英文翻译 |

    | 1990 | 1990 | 波吉奥和吉罗西（1990） | 研究神经网络与核回归之间的联系 |

    | | 1990 | 瓦哈（1990） | 改进回归的核方法 |

    | | 1992 | 贝内特和曼加萨里安（1992） | 改进史密斯1968年关于松弛变量的工作 |

    | | 1992 | 博瑟等人（1992） | 在COLT 1992会议上以当今的形式呈现支持向量机 |

    | | 1995 | 科尔特斯和瓦普尼克（1995） | 引入软间隔分类器 |

    | | 1996 | 德鲁克等人（1996） | 将算法扩展到回归情况，称为支持向量回归 |

    | | 1997 | 穆勒等人（1997） | 扩展支持向量机用于时间序列预测 |

    | | 1998 | 巴特利特（1998） | 提供硬间隔泛化的统计界限 |

    | 2000 | 2000 | 肖-泰勒和克里斯蒂亚尼尼（2000） | 给出软间隔和回归情况泛化的统计界限 |

    | | 2001 | 本-胡尔等人（2001） | 将支持向量机扩展到无监督情况 |

    | | 2005 | 段和克尔蒂（2005） | 将支持向量机从二元分类扩展到多类支持向量机 |

    | 2010 | 2011 | 波尔森和斯科特（2011） | 研究支持向量机的图模型表示及其贝叶斯解释 |

    | | 2017 | 韦策尔等人（2017） | 开发可扩展的贝叶斯支持向量机版本，用于大数据应用 |


    ## 1.5 支持向量机的应用


    如今，机器学习算法正在兴起，并广泛应用于实际应用中。每年都提出新的技术来克服当前领先的算法。其中一些只是微小的进步或现有算法的组合，而另一些则是新创建的，并带来了惊人的进步。尽管深度学习技术在许多实际应用中占据主导地位，例如图像处理（例如，用于图像分类）和序列数据建模（例如，在自然语言处理任务中，如机器翻译），但这些技术需要大量的训练数据才能成功建模。在许多应用中，大规模标注数据集不可用，其中其他机器学习技术（称为经典机器学习方法），如支持向量机、决策树和贝叶斯家族方法，比深度学习技术具有更高的性能。此外，机器学习中还有另一个事实。机器学习应用中的每个任务都可以使用各种方法解决；然而，没有单一算法能对所有任务都表现良好。这一事实被称为机器学习中的无免费午餐定理沃尔珀特（1996）。我们想要解决的每个任务都有其独特性，并且有各种机器学习算法适合该问题。在非深度学习方法中，支持向量机作为一种著名的机器学习技术，由于其在各种问题领域和数据集上的高性能和可靠性，如今被广泛用于各种分类和回归任务塞尔万特斯等人（2020）。通常，支持向量机可以应用于任何应用中的任何机器学习任务，例如计算机视觉和图像处理、自然语言处理、医学应用、生物识别和认知科学。下面，将回顾支持向量机的一些常见应用。'

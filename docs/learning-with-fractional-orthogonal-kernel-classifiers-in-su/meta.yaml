    range of $K(x, t)$, then this equation has a solution. For instance, if the kernel
    is in the form of $K(x, t) = \sin(x) \sin(t)$, the function $f(x)$ should be a
    coefficient of $\sin(x)$ Golberg (2013). Otherwise, the equation has no solution
    Wazwaz (2011). Due to the importance of function $f(x)$ in integral equations,
    scientists have categorized equations based on the existence or non-existence
    of this function. If there is a function $f(x)$ in the integral equation, it is
    called inhomogeneous; otherwise, it is identified as homogeneous. In other words,
    the Fredholm integral equation of the second kind $u(x) = f(x) + \lambda \int_a^b
    K(x, t)u(t)dt$ is inhomogeneous and equation $u(x) = \lambda \int_a^b K(x, t)u(t)dt$
    is homogeneous.


    # 9.2.4 Integro-Differential Equations


    As mentioned at the beginning of this chapter, integro-differential equations
    are integral equations in which the derivatives of the unknown function also appear
    in the equation. For instance, the equation


    $$\frac{d^n u(x)}{dx^n} = f(x) + \lambda \int_a^b K(x, t)u(t)dt,$$

    $$\left. \frac{d^k u}{dx^k} \right|_{x_0} = b_k \quad 0 \le k \le n - 1$$


    is the second kind Fredholm integro-differential equation, in which $n$ is a positive
    integer and $b_k$ is the initial value for determining the unknown function. Several
    numerical methods have been proposed for solving the model discussed here. For
    example, in 2006, several finite difference schemes including the forward Euler
    explicit, the backward Euler implicit, the Crank-Nicolson implicit, and Crandall''s
    implicit have been developed for solving partial integro-differential equations
    by Dehghan (2006). In another research, Dehghan and Saadatmandi have utilized
    Chebyshev finite difference algorithm for both linear and nonlinear Fredholm integro-differential
    equations. To see more, the interested reader can see El-Shahed (2005), Wang and
    He (2007), Parand et al. (2011, 2016, 2011, 2014).


    # 9.2.5 Multi-dimensional Integral Equations


    Due to the existence of different variables, the study and modeling of physical
    problems usually lead to the creation of multi-dimensional cases Mikhlin (2014).
    Partial differential equations and multi-dimensional integral equations are the
    most famous examples of modeling these problems. The general form of these equations
    is defined as follows:'
  - '[PAGE 213]


    $$\mu u(\mathbf{x}) = f(\mathbf{x}) + \lambda \int_S K(\mathbf{x}, \mathbf{t})
    \sigma(u(\mathbf{t})) dt, \quad \mathbf{x}, \mathbf{t} \in S \subset \mathbb{R}^n,
    \quad (9.2)$$


    where $\mathbf{x} = (x_1, x_2, \dots, x_n)$, $\mathbf{t} = (t_1, t_2, \dots, t_n)$,
    and $\lambda$ is the eigenvalue of the integral equation. Also, for convenience
    in defining the first and second kind equations, the constant $\mu \in \mathbb{R}$
    has been added to the left side of the equation. If this constant is zero, it
    is called the first kind equation; otherwise, it is the second kind. In the general
    case, this type of integral equation cannot be evaluated usually using exact closed-form
    solutions, and powerful computational algorithms are required. However, some works
    are available on numerical simulations of this model. For example, Mirzaei and
    Dehghan (2010) moving least squares method for one- and two-dimensional Fredholm
    integral equations, Legendre collocation method for Volterra-Fredholm integral
    equations Zaky et al. (2021), and Jacobi collocation method for multi-dimensional
    Volterra integral equations Abdelkawy et al. (2017). To see more, the interested
    reader can see Bhrawy et al. (2016), Esmaeilbeigi et al. (2017), and Mirzaei and
    Alipour (2020).


    # 9.2.6 System of Integral Equations


    Another type of problem in integral equations is systems of equations. These systems
    appear in the form of several equations and several unknowns in which their equations
    are integral. The general form of these systems is defined as follows:


    $$u_i(x) = f_i(x) + \int_a^b \sum_{j=1}^n K_{ij}(x, t) v_{ij}(t) dt, \quad i =
    1, \dots, n.$$


    Here, the functions $v_{ij}$ are defined as $g_i(u_j(t))$ for some functions $g_i$.
    For example, the following is a system of two equations and two unknowns of the
    Fredholm integral equations:


    $$\begin{cases} u_1(x) = f_1(x) + \int_a^b (K_{11}(x, t) v_{11}(t) + K_{12}(x,
    t) v_{12}(t)) dt, \ u_2(x) = f_2(x) + \int_a^b (K_{21}(x, t) v_{21}(t) + K_{22}(x,
    t) v_{22}(t)) dt. \end{cases}$$


    > **Remark 9.4** *(Relationship between differential equations and integral equations)*
    Differential equations and integral equations are closely related, and some of
    them can be converted into another. Sometimes it is beneficial to convert a differential
    equation into an integral equation because this approach can prevent the instability
    of numerical solvers in differential equations Wazwaz (2011, 2015), Rahman (2007).
    Fredholm integral equations can be converted to differential equations with boundary'
  - '[PAGE 214]


    values, and Volterra integral equations can be converted to differential equations
    with initial values Parand et al. (2020).


    # 9.3 LS-SVR for Solving IEs


    In this section, an efficient method for the numerical simulation of integral
    equations is proposed. Using the ideas behind weighted residual methods, the proposed
    technique introduces two different algorithms named collocation LS-SVR (CLS-SVR)
    and Galerkin LS-SVR (GLS-SVR). For the sake of simplicity, here we denote an integral
    equation in the operator form


    $$\mathcal{N}(u) = f, \tag{9.3}$$


    in which


    $$\mathcal{N}(u) = \mu u - \mathcal{K}_1(u) - \mathcal{K}_2(u).$$


    Here, $\mu \in \mathbb{R}$ is a constant which specifies the first or second kind
    integral equation for $\mu = 0$ and $\mu \neq 0$, respectively. The operators
    $\mathcal{K}_1$ and $\mathcal{K}_2$ are Fredholm and Volterra integral operators,
    respectively. These operators are defined as


    $$\mathcal{K}_1(u) = \lambda_1 \int_{\Delta_1} K_1(\mathbf{x}, \mathbf{t})u(\mathbf{t})\mathrm{d}\mathbf{t},$$


    and


    $$\mathcal{K}_2(u) = \lambda_2 \int_{\Delta_2} K_2(\mathbf{x}, \mathbf{t})u(\mathbf{t})\mathrm{d}\mathbf{t}.$$


    The proposed method can solve a wide range of integral equations, so we split
    the subject into three sections, based on the structure of the unknown function
    which should be approximated.


    # 9.3.1 One-Dimensional Case


    In order to approximate the solution of Eq. 9.3 using the LS-SVR formulations,
    some training data is needed. In contrast to the LS-SVR, in which there is a set
    of labeled training data, there are no labels for any arbitrary set of training
    data in solving Eq. 9.3. To handle this problem, the approximate solution is expanded
    as a linear combination of unknown coefficients, and some basis functions $\varphi_i$
    for $i = 1, \dots, d$'
- md: '$$u(x) \simeq \tilde{u}(x) = w^T \varphi(x) + b = \sum_{i=1}^d w_i \varphi_i(x)
    + b.$$


    In a general form, the LS-SVR primal problem can be formulated as follows:


    $$\begin{aligned} \min_{w,e} \quad & \frac{1}{2} w^T w + \frac{\gamma}{2} e^T
    e \\ \text{s.t.} \quad & \langle \mathcal{N}(\tilde{u}) - f, \psi_k \rangle =
    e_k, \quad k = 1, \dots, n, \end{aligned}$$


    in which $n$ is the number of training points, $\{\psi_k\}_{k=1}^n$ is a set of
    test functions in the test space, and $\langle \cdot, \cdot \rangle$ is the inner
    product of two functions. In order to take advantage of the kernel trick, the
    dual form of this optimization problem is constructed. If the operator $\mathcal{N}$
    is linear, the optimization problem of Eq. 9.5 is convex, and the dual form can
    be derived easily. To do so, we denote the linear operators as $\mathcal{L}$ and
    construct the Lagrangian function


    $$\mathfrak{L}(w, e, \alpha) = \frac{1}{2} w^T w + \frac{\gamma}{2} e^T e - \sum_{k=1}^n
    \alpha_k \left[ \langle \mathcal{L} \tilde{u} - f, \psi_k \rangle - e_k \right],$$


    in which $\alpha_k \in \mathbb{R}$ are Lagrangian multipliers. The conditions
    for the optimality of the Eq. 9.6 yield


    $$\left\{ \begin{aligned} \frac{\partial \mathfrak{L}}{\partial w_k} &= 0 \rightarrow
    w_k = \sum_{i=0}^n \alpha_i \langle \mathcal{L} \varphi_k, \psi_i \rangle, \quad
    k = 1, \dots, d. \\ \frac{\partial \mathfrak{L}}{\partial e_k} &= 0 \rightarrow
    \gamma e_k + \alpha_k = 0, \quad k = 1, \dots, n. \\ \frac{\partial \mathfrak{L}}{\partial
    b} &= 0 \rightarrow \sum_{i=0}^n \alpha_i \langle \mathcal{L} 1, \psi_i \rangle
    = 0, \\ \frac{\partial \mathfrak{L}}{\partial \alpha_k} &= 0 \rightarrow \sum_{i=1}^d
    w_i \langle \mathcal{L} \varphi_i - f, \psi_k \rangle + \langle \mathcal{L} 0,
    \psi_i \rangle = e_k. \quad k = 1, \dots, n. \end{aligned} \right.$$


    By eliminating $w$ and $e$, the following linear system is obtained:


    $$\begin{bmatrix} 0 & \widetilde{\mathcal{L}}^T \\ \widetilde{\mathcal{L}} & \Omega
    + I/\gamma \end{bmatrix} \begin{bmatrix} b \\ \alpha \end{bmatrix} = \begin{bmatrix}
    0 \\ y \end{bmatrix},$$


    in which


    $$\begin{aligned} \alpha &= [\alpha_1, \dots, \alpha_n]^T, \\ y &= [\langle f,
    \psi_1 \rangle, \langle f, \psi_2 \rangle, \dots, \langle f, \psi_n \rangle]^T,
    \\ \widetilde{\mathcal{L}} &= \langle \mathcal{L} 1, \psi_i \rangle. \end{aligned}$$


    The kernel trick is also applied within the matrix $\Omega$:


    $$\Omega_{i,j} = \langle \mathcal{L}\varphi, \psi_i \rangle^T \langle \mathcal{L}\varphi,
    \psi_j \rangle = \langle \mathcal{L}(\mathcal{L}K(x, t), \psi_i), \psi_j \rangle,
    \quad i, j = 1, 2, \ldots, n,$$


    with any valid Mercer kernel $K(x, t)$. The approximate solution in the dual form
    takes the form


    $$\tilde{u}(x) = \sum_{i=1}^n \alpha_i \widetilde{K}(x, x_i) + b, \tag{9.10}$$


    where


    $$\widetilde{K}(x, x_i) = \langle \langle \mathcal{L}\varphi, \psi_i \rangle,
    \varphi \rangle = \langle \mathcal{L}K(x, t), \psi_i \rangle.$$


    ## 9.3.2 Multi-dimensional Case


    One of the most used techniques to solve multi-dimensional integral equations
    is to approximate the solution using a nested summation with a tensor of unknown
    coefficients and some basis functions. For instance, in order to solve a two-dimensional
    integral equation, we can use this function:


    $$u(x, y) \simeq \tilde{u}(x, y) = \sum_{i=1}^d \sum_{j=1}^d w_{i,j} \varphi_i(x)
    \varphi_j(y) + b.$$


    Note that the upper summation bound $d$ and basis functions $\varphi$ can vary
    in each dimension. Fortunately, there is no need to reconstruct the proposed model.
    In order to use LS-SVR for solving multi-dimensional equations, we can vectorize
    the unknown tensor $w$, basis functions $\varphi_i, \varphi_j$, and training points
    $X$. For example, in the case of 2D integral equations, we first vectorize the
    $d \times d$ matrix $w$:


    $$\overline{w} = [w_{1,1}, w_{1,2}, \ldots, w_{1,d}, w_{2,1}, w_{2,2}, \ldots,
    w_{2,d}, \ldots, w_{d,1}, w_{d,2}, \ldots, w_{d,d}],$$


    and then use new indexing function


    $$w_{i,j} = \overline{w}_{i*d+j}.$$


    For three-dimensional case, the indexing function


    $$w_{i,j,k} = \overline{w}_{i*d^2+j*d+k}$$


    can be used. Also, this indexing should be applied to the basis function and training
    data tensor. After using this technique, the proposed dual form Eq. 9.8 can be
    utilized for a one-dimensional case. Solving the dual form returns the vector
    $\alpha$ which can be converted to a tensor using the inverse of the indexing
    function.


    ## 9.3.3 System of Integral Equations


    In the system of integral equations, there are $k$ equations and unknown functions:


    $$N_i(u_1, u_2, \ldots, u_k) = f_i, \quad i = 1, 2, \ldots, k. \tag{9.11}$$


    For solving these types of equations, the approximated solution can be formulated
    as follows:


    $$\tilde{u}_i(x) = w_i^T \varphi(x) + b_i, \quad i = 1, 2, \ldots, k,$$


    where $\varphi(x)$ is feature map vector, and $w_i$ and $b_i$ are the unknown
    coefficients. In the next step, the unknown coefficients are set side by side
    in a vector form; thus, we have


    $$\overline{w} = [w_{1,1}, w_{1,2}, \ldots, w_{1,d}, w_{2,1}, w_{2,2}, \ldots,
    w_{2,d}, \ldots, w_{k,1}, w_{k,2}, \ldots, w_{k,d}].$$


    Same as the previous formulation for solving high-dimensional equations, the basis
    functions can vary for each approximate function, but for simplicity, the same
    functions are used. Since these functions are shared, they can be seen in a $d$-dimensional
    vector. Using this formulation, the optimization problem for solving Eq. 9.11
    can be constructed as


    $$\min_{w,e} \quad \frac{1}{2} w^T w + \frac{\gamma}{2} e^T e \tag{9.12}$$

    $$\text{s.t.} \quad \langle N_i(\tilde{u}_1, \tilde{u}_2, \ldots, \tilde{u}_k)
    - f_i, \psi_j \rangle = e_{i,j}, \quad j = 1, \ldots, n,$$


    where $i = 1, 2, \ldots, k$. Also, the matrix $e_{i,j}$ should be vectorized the
    same as unknown coefficients $w$. For any linear operator $N$, denoted by $\mathcal{L}$,
    the dual form of the optimization problem Eq. 9.12 can be derived. Here, we obtain
    the dual form for a system of two equations and two unknown functions. This process
    can be generalized for the arbitrary number of equations.



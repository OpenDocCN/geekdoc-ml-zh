    = \iint \sum_{i=0}^{n} F P_{i}^{\alpha}\left(x_{x}^{\prime}\right) F P_{i}^{\alpha}\left(x_{z}^{\prime}\right)^{T}
    f w\left(x_{x_{j}}^{\prime}, x_{z_{j}}^{\prime}\right) f(x) f(z) d x d z,

    = \sum_{i=0}^{n} \iint F P_{i}^{\alpha}\left(x_{x}^{\prime}\right) F P_{i}^{\alpha}\left(x_{z}^{\prime}\right)^{T}\left(x_{x}^{\prime}
    x_{z}^{\prime T}\right)^{\alpha-1} f(x) f(z) d x d z,

    = \sum_{i=0}^{n}\left[\int F P_{i}^{\alpha}\left(x_{x}^{\prime}\right)\left(x_{x}^{\prime}\right)^{\alpha-1}
    f(x) d x \int F P_{i}^{\alpha}\left(x_{z}^{\prime}\right)^{T}\left(x_{z}^{\prime
    T}\right)^{\alpha-1} f(z) d z\right],

    = \sum_{i=0}^{n}\left[\left(\int F P_{i}^{\alpha}\left(x_{x}^{\prime}\right)\left(x_{x}^{\prime}\right)^{\alpha-1}
    f(x) d x\right)\left(\int F P_{i}^{\alpha}\left(x_{z}^{\prime}\right)^{T}\left(x_{z}^{\prime
    T}\right)^{\alpha-1} f(z) d z\right)\right],

    \geqslant 0. \tag{4.37}


    # 4.4 Application of Legendre Kernel Functions on Real Datasets


    In this section, the application of the ordinary Legendre kernel and the fractional
    Legendre kernel is shown in SVM. Also, the obtained results on two real datasets
    are compared with the results of RBF kernels, ordinary polynomial kernel, ordinary
    Chebyshev kernel, and fractional Chebyshev kernel.


    # 4.4.1 Spiral Dataset


    The Spiral dataset has already been introduced in the previous chapter. In this
    section, the Legendre kernel and the fractional Legendre kernel are used to classify
    spiral datasets using SVM. As we mentioned before, this multi-class classification
    dataset can be split into three binary classification datasets. It was also previously
    explained (Fig. 3.5), by transferring data to the fractional space using the $\alpha$
    coefficient ($0.1 \leqslant \alpha \leqslant 0.9$), the data density gradually
    decreases with decreasing alpha value, and the central axis of data density from
    the point (0, 0) is transferred to point (1, 1). Although it seems that data points
    are conglomerated on one corner of the axis on a 2D plot, Fig. 4.4, this is not
    necessarily what happens in 3D space when the kernel function is applied, Fig.
    4.5.

    Using the data transferred to the fractional space, the decision boundaries are
    found for the problem with the above-mentioned divisions with the help of the
    Legendre and fractional Legendre kernel functions.

    In order to have an intuition of how the decision boundaries are different, we
    can see Fig. 4.6, which depicts corresponding Legendre classifiers of different
    orders of'

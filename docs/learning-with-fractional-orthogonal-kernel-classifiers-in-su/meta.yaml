    suitable classifier.


    Figure 6.10 demonstrates the same dataset while the Jacobi kernel function is
    applied. The plot on the left depicts the original dataset after the Jacobi kernel
    of order 3 and $\psi = -0.2$, and $\omega = 0.3$ is applied to. The plot on the
    right demonstrates the Spiral dataset in fractional space of order 0.3 where the
    fractional Jacobi kernel of order 3, $\psi = -0.2$, $\omega = 0.3$, and the fractional
    order of 0.3 is applied.



    \ Belmehdi (2001) 建立了一个微分-差分关系，该序列求解了由广义盖根瓦尔（任意阶）的关联所满足的二阶和四阶微分方程。此外，Cohl (2013)；Liu\
    \ 和 Wang (2020) 也在他们的研究中展示了这些函数的应用。随后，在 2020 年，Yang 等人 (2020) 提出了一种基于准解析小波包变换\
    \ (QAWPT) 和广义盖根瓦尔支持向量机 (GGSVM) 的多域敏感特征的螺栓连接结构松动状态识别新方法。 |\n| 有理盖根瓦尔函数的分数阶 | 为了解决\
    \ Thomas–Fermi 问题，Hadian-Rasanan 等人 (2019) 提出了两种基于牛顿迭代法和谱算法的数值方法。这两种方法都使用了谱技术，并且基于有理盖根瓦尔函数的分数阶\
    \ (Hadian-Rasanan et al. 2019)。 |\n\n与前几章的类似结果进行比较。最后，在第 5.5 节，结论性评述将总结整章内容。\n\
    \n## 5.2 预备知识\n\n本节涵盖了盖根瓦尔多项式的基础知识。这些多项式已使用相关的微分方程定义，接下来介绍了盖根瓦尔多项式的性质，并且除了它们的性质之外，还定义了它们的分数形式。\n\
    \n### 5.2.1 盖根瓦尔多项式的性质\n\n度为 $n$、阶为 $\\lambda > -\\frac{1}{2}$ 的盖根瓦尔多项式 $G_n^\\\
    lambda(x)$ 是以下施图姆-刘维尔微分方程的解 (Doman 2015; Padierna et al. 2018; Asghari et al.\
    \ 2022)：\n\n$$(1 - x^2)\\frac{d^2y}{dx^2} - (2\\lambda + 1)x\\frac{dy}{dx} + n(n\
    \ + 2\\lambda)y = 0, \\quad (5.1)$$\n\n其中 $n$ 是正整数，$\\lambda$ 是实数且大于 $-0.5$。盖根瓦尔多项式在区间\
    \ $[-1, 1]$ 上关于权函数是正交的 (Padierna et al. 2018; Parand et al. 2018; Asghari et al.\
    \ 2022)：\n\n$$w(x) = (1 - x^2)^{\\lambda - \\frac{1}{2}}. \\quad (5.2)$$\n\n因此，正交关系定义为\
    \ (Ludlow and Everitt 1995; Parand et al. 2018; Hadian-Rasanan et al. 2019; Asghari\
    \ et al. 2022)\n\n$$\\int_{-1}^1 G_n^\\lambda(x)G_m^\\lambda(x)w(x)dx = \\frac{\\\
    pi 2^{1-2\\lambda}\\Gamma(n + 2\\lambda)}{n!(n + \\lambda)(\\Gamma(\\lambda))^2}\\\
    delta_{nm}, \\quad (5.3)$$\n\n其中 $\\delta_{nm}$ 是克罗内克 delta 函数 (El-Kalaawy et\
    \ al. 2018)。标准盖根瓦尔多项式 $G_n^{(\\lambda)}(x)$ 也可以定义如下 (Parand et al. 2018; Hadian-Rasanan\
    \ et al. 2019)：\n\n$$G_n^\\lambda(x) = \\sum_{n=1}^{\\lfloor \\frac{n}{2} \\rfloor}\
    \ (-1)^j \\frac{\\Gamma(n + \\lambda - j)}{j!(n - 2j)!\\Gamma(\\lambda)} (2x)^{n-2j},\
    \ \\quad (5.4)$$\n\n其中 $\\Gamma(.)$ 是 Gamma 函数。\n\n假设 $\\lambda \\neq 0$ 且 $\\\
    lambda \\in \\mathbb{R}$，盖根瓦尔多项式的生成函数给出为 (Cohl 2013; Doman 2015; Asghari et al.\
    \ 2022)\n\n$$G_n^\\lambda(x, z) = \\frac{1}{(1 - 2xz + z^2)^\\lambda}. \\quad\
    \ (5.5)$$\n\n可以证明，当 $|z| < 1$，$|x| \\leqslant 1$，$\\lambda > -\\frac{1}{2}$ 时成立\
    \ (Cohl 2013; Doman 2015)。考虑到对于固定的 $x$，该函数在 $|z| < 1$ 内是*全纯*的，它可以展开为 *Taylor*\
    \ 级数 (Reimer 2013)：\n\n$$G_n^\\lambda(x, z) = \\sum_{n=0}^{\\infty} G_n^\\lambda(x)\
    \ z^n.$$\n\n盖根瓦尔多项式可以通过以下递推公式获得 (Olver et al. 2010; Yang et al. 2020; Hadian-Rasanan\
    \ et al. 2019)：\n\n$$G_0^\\lambda(x) = 1, \\quad G_1^\\lambda(x) = 2\\lambda x,$$\n\
    $$G_n^\\lambda(x) = \\frac{1}{n}[2x(n + \\lambda - 1)G_{n-1}^\\lambda(x) - (n\
    \ + 2\\lambda - 2)G_{n-2}^\\lambda(x)].$$\n\n此外，该正交多项式的其他递推关系如下 (Doman 2015)：\n\
    \n$$(n + 2)G_{n+2}^\\lambda(x) = 2(\\lambda + n + 1)xG_{n+1}^\\lambda(x) - (2\\\
    lambda + n)G_n^\\lambda(x),$$\n$$nG_n^\\lambda(x) = 2\\lambda\\{xG_{n-1}^{\\lambda+1}(x)\
    \ - G_{n-2}^{\\lambda+1}(x)\\},$$\n$$(n + 2\\lambda)G_n^\\lambda(x) = 2\\lambda\\\
    {G_n^{\\lambda+1}(x) - xG_{n-1}^{\\lambda+1}(x)\\},$$\n$$nG_n^\\lambda(x) = (n\
    \ - 1 + 2\\lambda)xG_{n-1}^\\lambda(x) - 2\\lambda(1 - x^2)G_{n-2}^{\\lambda-1}(x),$$\n\
    $$\\frac{d}{dx}G_n^\\lambda = 2\\lambda G_{n+1}^{\\lambda-1}.$$\n\n每个尝试生成盖根瓦尔多项式的人都经历过随着阶数升高项数增加带来的一些困难，例如，对于零到四阶，如下所示：\n\
    \n$$G_0^\\lambda(x) = 1,$$\n$$G_1^\\lambda(x) = 2\\lambda x,$$\n$$G_2^\\lambda(x)\
    \ = (2\\lambda^2 + 2\\lambda)x^2 - \\lambda,$$\n$$G_3^\\lambda(x) = \\left(\\\
    frac{4}{3}\\lambda^3 + 4\\lambda^2 + \\frac{8}{3}\\lambda\\right)x^3 + (-2\\lambda^2\
    \ - 2\\lambda)x,$$\n$$G_4^\\lambda(x) = \\left(\\frac{2}{3}\\lambda^4 + 4\\lambda^3\
    \ + \\frac{22}{3}\\lambda^2 + 4\\lambda\\right)x^4 + (-2\\lambda^3 - 6\\lambda^2\
    \ - 4\\lambda)x^2,$$\n\n这些在图 5.1 和 5.2 中描绘，随后更高阶将会有更多项。为了克服这个困难，已经使用了 *Pochhammer\
    \ 多项式* 来简化 (Doman 2015)。*Pochhammer 多项式* 或 *上升阶乘* 定义为\n\n$$x^{(n)} = x(x + 1)(x\
    \ + 2) \\cdots (x + n - 1) = \\prod_{k=1}^{n}(x + k - 1).$$\n\n因此，一些 Pochhammer\
    \ 多项式是\n\n$$x^{(0)} = 1,$$\n$$x^{(1)} = x,$$\n$$x^{(2)} = x(x+1) = x^2 + x,$$\n\
    $$x^{(3)} = x(x+1)(x+2) = x^3 + 3x^2 + 2x,$$\n$$x^{(4)} = x(x+1)(x+2)(x+3) = x^4\
    \ + 6x^3 + 11x^2 + 6x,$$\n$$x^{(5)} = x^5 + 10x^4 + 35x^3 + 50x^2 + 24x,$$\n$$x^{(6)}\
    \ = x^6 + 15x^5 + 85x^4 + 225x^3 + 274x^2 + 120x. \\quad (5.15)$$\n\n借助 Pochhammer\
    \ 多项式，阶为 $\\lambda$ 的盖根瓦尔多项式的前几阶是\n\n$$G_0^{\\lambda}(x) = 1,$$\n$$G_1^{\\lambda}(x)\
    \ = 2\\lambda x,$$\n$$G_2^{\\lambda}(x) = a^{(2)}2x^2 - \\lambda,$$\n$$G_3^{\\\
    lambda}(x) = \\frac{a^{(3)}4x^3}{3} - 2a^{(2)}x,$$\n$$G_4^{\\lambda}(x) = \\frac{a^{(4)}2x^4}{3}\
    \ - a^{(3)}2x^2 + a^{(2)},$$\n$$G_5^{\\lambda}(x) = \\frac{a^{(5)}4x^5}{15} -\
    \ \\frac{a^{(4)}4x^3}{3} + a^{(3)}x,$$\n$$G_6^{\\lambda}(x) = \\frac{a^{(6)}4x^6}{45}\
    \ - \\frac{a^{(5)}2x^4}{3} + \\frac{a^{(4)}x^2}{2} - a^{(3)}. \\quad (5.16)$$\n\
    \n其中 $a^{(n)}$ 是 *Pochhammer* 多项式。\n\n这里为了方便，介绍了一个 Python 代码，可以使用 sympy 库符号化地生成任意阶的阶为\
    \ $\\lambda$ 的盖根瓦尔多项式：\n\n```python\nimport sympy\nx = sympy.Symbol(\"x\")\nlambd\
    \ = sympy.Symbol(r'\\lambda')\n\ndef Gn(x, n):\n    if n == 0:\n        return\
    \ 1\n    elif n == 1:\n        return 2*lambd*x\n    elif n >= 2:\n        return\
    \ (sympy.Rational(1,n) * (2*x*(n+lambda-1)*Gn(x,n-1) - (n+2*lambda-2)*Gn(x,n-2)))\n\
    ```\n\n**程序代码**\n\n```\nsympy.expand(sympy.simplify(Gn(x,2)))\n> 2x^2\\lambda^2\
    \ + 2x^2\\lambda - \\lambda\n```\n\n对于 $G_n^\\lambda(x), n = 0, 1, \\dots, n,\
    \ \\lambda > -\\frac{1}{2}$，它关于权函数 $(1-x^2)^{\\lambda-\\frac{1}{2}}$ 正交，在 $[-1,\
    \ 1]$ 中恰好有 $n$ 个零点，记为 $x_{nk}(\\lambda), k = 1, \\dots, n$，并按递减顺序排列 $1 > x_{n1}(\\\
    lambda) > x_{n2} > \\dots > x_{nn}(\\lambda) > -1$ (Reimer 2013)。$G_n^\\lambda(x)$\
    \ 和 $G_m^\\lambda(x), m > n$ 的零点相互交错，并且在 $G_n^\\lambda(x)$ 的任何两个零点之间，至少有一个零点 (Olver\
    \ et al. 2010)。\n\n盖根瓦尔多项式遵循与其他经典正交多项式相同的对称性。因此，偶数阶的盖根瓦尔多项式具有偶对称性，仅包含 $x$ 的偶次幂；同样，奇数阶的盖根瓦尔多项式具有奇对称性，仅包含\
    \ $x$ 的奇次幂 (Olver et al. 2010)。\n\n$$G_n^\\lambda(x) = (-1)^n G_n^\\lambda(x)\
    \ = \\begin{cases} G_n^\\lambda(-x), & n \\text{ even} \\\\ -G_n^\\lambda(-x),\
    \ & n \\text{ odd} \\end{cases}, \\quad (5.17)$$\n\n此外，$G_n^\\lambda(x)$ 的一些特殊值可以写成如下形式：\n\
    \n$$G_n^\\lambda(1) = \\frac{(2\\lambda)n}{n!}, \\quad (5.18)$$\n$$G_{2n}^\\lambda(0)\
    \ = \\frac{(-1)^n(\\lambda)n}{n!}, \\quad (5.19)$$\n$$G_{2n+1}^\\lambda(0) = \\\
    frac{2(-1)^n(\\lambda)n+1}{n!}. \\quad (5.20)$$\n\n### 5.2.2 分数阶盖根瓦尔多项式的性质\n\n\
    通过使用映射 $x' = 2(\\frac{x-a}{b-a})^\\alpha - 1$（其中 $\\alpha > 0$ 且 $x' \\in [-1,\
    \ 1]$），在有限区间 $[a, b]$ 上的分数阶 $\\lambda$ 的盖根瓦尔多项式定义如下 (Parand and Delkhosh 2016)：\n\
    \n$$FG_n^{\\alpha,\\lambda}(x) = G_n^\\lambda(x') = G_n^\\lambda\\left(2\\left(\\\
    frac{x-a}{b-a}\\right)^\\alpha - 1\\right), \\quad (5.21)$$"

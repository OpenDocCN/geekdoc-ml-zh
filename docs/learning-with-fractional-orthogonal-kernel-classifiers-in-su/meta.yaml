    # 9.5 Conclusion


    In this chapter, a new computational method for solving different types of integral
    equations, including multi-dimensional cases and systems of integral equations,
    is proposed. In linear equations, learning the solution reduces to solving a positive
    definite system of linear equations. This formulation was similar to the LS-SVR
    method for solving regression problems. By using the ideas behind spectral methods,
    we have presented CLS-SVR and GLS-SVR methods. Although the CLS-SVR method is
    more computationally efficient, the resulting matrix in the GLS-SVR method has
    a sparsity property. In the last section, some integral equations have been solved
    using the CLS-SVR and GLS-SVR methods. The numerical results show that these methods
    have high efficiency and exponential convergence rate for integral equations.



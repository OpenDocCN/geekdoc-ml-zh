    has been compared on some datasets, with other well-known kernels such as *RBF*,
    *polynomial*, and also *Chebyshev* and *fractional Chebyshev* kernels, introduced
    in the previous chapters. In order to have a neat classification, there may need
    to be some preprocessing steps according to the dataset. Here, these steps have
    not been focused on, but they are mandatory when using *Gegenbauer polynomials*
    as the kernel. For this section, two datasets have been selected, which are well
    known and helpful for machine learning practitioners.



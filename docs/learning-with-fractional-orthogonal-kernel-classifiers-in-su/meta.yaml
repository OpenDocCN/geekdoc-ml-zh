- md: "## 3.3 Chebyshev Kernel Functions\n\nFollowing the Chebyshev polynomial principles\
    \ and their fractional type discussed in the previous sections, this section presents\
    \ the formulation of Chebyshev kernels. Therefore, in the following, first, the\
    \ ordinary Chebyshev kernel function, then some other versions of this kernel\
    \ function, and finally the fractional Chebyshev kernels will be explained.\n\n\
    ### 3.3.1 Ordinary Chebyshev Kernel Function\n\nMany kernels constructed from\
    \ orthogonal polynomials have been proposed for SVM and other kernel-based learning\
    \ algorithms (Ye et al. 2006; Moghaddam and Hamidzadeh 2016; Tian and Wang 2017).\
    \ Some characteristics of such kernels have attracted attention such as lower\
    \ data redundancy in feature space or on some occasions these kernels need fewer\
    \ support vectors during the fitting procedure which thereby leads to less execution\
    \ time (Jung and Kim 2013). On the other hand, orthogonal kernels have shown superior\
    \ performance in classification problems than traditional kernels like RBF and\
    \ polynomial (Moghaddam and Hamidzadeh 2016; Ozer et al. 2011; Padierna et al.\
    \ 2018).\n\nNow, using the fundamental definition of the orthogonal kernel we\
    \ will formulate the Chebyshev kernel. As we know, the unweighted orthogonal polynomial\
    \ kernel function for SVM, for scalar inputs, is defined as\n\n$$K(x, z) = \\\
    sum_{i=0}^{n} T_i(x)T_i(z), \\quad (3.31)$$\n\nwhere $T(.)$ denotes the evaluation\
    \ of the polynomial; $x, z$ are kernel's input arguments; and $n$ is the highest\
    \ polynomial order. In most applications of the real world, input data is a multidimensional\
    \ vector, hence two approaches have been proposed to extend one-dimensional polynomial\
    \ kernel to multidimensional vector input (Ozer et al. 2011; Vert et al. 2007):\n\
    \n1.  **Pairwise**\n    According to *Vapnik*'s theorem (Vapnik 2013):\n    >\
    \ Let a multidimensional set of functions be defined by the basis functions that\
    \ are the tensor products of the coordinate-wise basis functions. Then the kernel\
    \ that defines the inner product in the n-dimensional basis is the product of\
    \ one-dimensional kernels.\n\nThe multidimensional orthogonal polynomial kernel\
    \ is constructed as a tensor product of one-dimensional kernel as\n\n$$K(x, z)\
    \ = \\prod_{j=1}^{m} K_j(x_j, z_j). \\tag{3.32}$$\n\nIn this approach, the function\
    \ evaluation of element pair of each input vectors $x$ and $z$ is multiplied in\
    \ pairs, which means multiplying the corresponding elements of $x$ and $z$ and\
    \ then overall kernel output is the multiplication of all outcomes of the previous\
    \ step. Therefore, for an m-dimensional input vector $x \\in \\mathbb{R}^m$, given\
    \ $x = \\{x_1, x_2, \\dots, x_m\\}$, $z \\in \\mathbb{R}^m$, and $z = \\{z_1,\
    \ z_2, \\dots, z_m\\}$, the unweighted Chebyshev kernel is defined as\n\n$$K_{Cheb}(x,\
    \ z) = \\prod_{j=1}^{m} K_j(x_j, z_j) = \\prod_{j=1}^{m} \\sum_{i=0}^{n} T_i(x_j)T_i(z_j),\
    \ \\tag{3.33}$$\n\nwhere $\\{T_i(.)\\}$ are Chebyshev polynomials. Simply by multiplying\
    \ the weight function defined in (3.14) which the orthogonality of the Chebyshev\
    \ polynomial of first kind is defined with (see (3.15)), one can construct the\
    \ pairwise orthogonal Chebyshev kernel function as\n\n$$K_{Cheb}(x, z) = \\frac{\\\
    sum_{i=0}^{n} T_i(x)T_i(z)}{\\sqrt{1 - xz}}, \\tag{3.34}$$\n\nwhere $x$ and $z$\
    \ are scalar-valued inputs and for vector input we have\n\n$$K_{Cheb}(\\mathbf{x},\
    \ \\mathbf{z}) = \\prod_{j=1}^{m} \\frac{\\sum_{i=0}^{n} T_i(x_j)T_i(z_j)}{\\\
    sqrt{1 - x_j z_j}}, \\tag{3.35}$$\n\nwhere $m$ is a dimension of vectors $x$ and\
    \ $z$.\nHowever, this method was first proposed and then many kernels have been\
    \ constructed using a pairwise method (Ye et al. 2006; Vert et al. 2007; Zhou\
    \ et al. 2007; Pan et al. 2021), but kernels of this method suffer from two drawbacks.\
    \ First, the time complexity or better to say computational complexity is considerably\
    \ high, thus this can be a serious problem when input vectors are of high dimension\
    \ (Ozer et al. 2011). Second, those kernels constructed on pairwise method lead\
    \ to poor generalization if one of the kernels ($T_i(x)$ or $T_i(z)$) is close\
    \ to zero, at the time when two vectors $x$ and $z$ are quite similar to each\
    \ other (Ozer and Chen 2008).\n\n2.  **Vectorized**\n\nIn this method proposed\
    \ by Ozer et al. (2008), the generalization problem of *pairwise* is tackled by\
    \ applying the input vectors as a whole rather than per element and this is done\
    \ by means of evaluation of the inner product of input vectors. Based on the fact\
    \ that the inner product of two vectors $x$ and $z$ is defined as $\\langle x,\
    \ z \\rangle = xz^T$ and considering Eq. 3.31, one can construct the *unweighted\
    \ Generalized Chebyshev kernel* as Ozer and Chen (2008); Ozer et al. (2011)\n\n\
    $$K(\\mathbf{x}, \\mathbf{z}) = \\sum_{i=0}^{n} T_i(\\mathbf{x}) T_i^T(\\mathbf{z})\
    \ = \\sum_{i=0}^{n} \\langle T_i(x) T_i(z) \\rangle.$$\n\nIn a similar fashion\
    \ to Eq. 3.35, the *Generalized Chebyshev Kernel* is defined as Ozer and Chen\
    \ (2008); Ozer et al. (2011)\n\n$$K_{G\\_Cheb}(\\mathbf{x}, \\mathbf{z}) = \\\
    frac{\\sum_{i=0}^{n} \\langle T_i(x), T_i(z) \\rangle}{\\sqrt{m - \\langle x,\
    \ z \\rangle}},$$\n\nwhere $m$ is the dimensional of input vectors $\\mathbf{x}$\
    \ and $\\mathbf{z}$.\n\nNote that as the Chebyshev polynomials are orthogonal\
    \ within $[-1, 1]$, the input data should be normalized according to\n\n$$x^{new}\
    \ = \\frac{2(x - Min)}{Max - Min} - 1,$$\n\nwhere $Min$ and $Max$ are minimum\
    \ and maximum values of the input data, respectively. It is clear that if the\
    \ input data is a dataset, normalization should be done column-wise.\n\n#### 3.3.1.1\
    \ Validation of Chebyshev Kernel\n\nAccording to *Mercer Theorem* introduced at\
    \ 2.2.12, a valid kernel function needs to be positive semi-definite or equivalently\
    \ must satisfy the necessary and sufficient conditions of Mercer's theorem. Here\
    \ the validity of the generalized Chebyshev kernel will be proved.\n\n**Theorem\
    \ 3.3** (Ozer et al. (2011)) *The generalized Chebyshev kernel introduced at Eq.\
    \ 3.37 is a valid Mercer kernel.*\n\n**Proof** As Mercer's theorem states, any\
    \ SVM kernel as a valid kernel must be non-negative, in a precise way:\n\n$$\\\
    iint K(x, z) f(x) f(z) dx dz \\geq 0.$$\n\nThe multiplication of two valid kernels\
    \ is also a valid kernel. Therefore, one can express any order of the Chebyshev\
    \ kernel as a product of two kernel functions:\n\n$$K(x, z) = k_{(1)}(x, z) k_{(2)}(x,\
    \ z),$$\n\nwhere\n\n$$k_{(1)}(x, z) = \\sum_{j=0}^{n} T_j(x) T_j^T(z) = T_0(x)\
    \ T_0^T(z) + T_1(x) T_1^T(z) + \\cdots + T_n(x) T_n^T(z)$$\n\nand\n\n$$k_{(2)}(x,\
    \ z) = \\frac{1}{\\sqrt{m - \\langle x, z \\rangle}}.$$\n\nConsidering $f : \\\
    mathbb{R}^m \\longrightarrow \\mathbb{R}$ and assuming that each element is independent\
    \ of the other elements of the kernel, we can evaluate the Mercer condition for\
    \ $k_{(1)}(\\mathbf{x}, \\mathbf{z})$ as follows:\n\n$$\\begin{aligned} \\iint\
    \ k_{(1)}(x, z) f(x) f(z) dx dz &= \\iint \\sum_{j=0}^{n} T_j(x) T_j^T(z) f(x)\
    \ f(z) dx dz, \\\\ &= \\sum_{j=0}^{n} \\iint T_j(x) T_j^T(z) f(x) f(z) dx dz,\
    \ \\\\ &= \\sum_{j=0}^{n} \\left[ \\int T_j(x) f(x) dx \\int T_j^T(z) f(z) dz\
    \ \\right], \\\\ &= \\sum_{j=0}^{n} \\left[ \\left( \\int T_j(x) f(x) dx \\right)\
    \ \\left( \\int T_j^T(z) f(z) dz \\right) \\right] \\geq 0. \\end{aligned}$$\n\
    \nTherefore, the kernel $k_{(1)}(x, z)$ is a valid Mercer kernel. To prove that\
    \ $k_{(2)}(x, z) = \\frac{1}{\\sqrt{m - \\langle x, z \\rangle}}$ (in the simplest\
    \ form where $m = 1$) is a valid kernel function, we can say that $< x, y >$ is\
    \ the linear kernel and the Taylor series of $\\frac{1}{\\sqrt{1 - x, y}}$ is\n\
    \n$$1 + \\frac{1}{2} < x, y > + \\frac{3}{8} < x, y >^2 + \\frac{5}{16} < x, y\
    \ >^3 + \\frac{35}{128} < x, y >^4 + \\cdots,$$\n\nwhich for each coefficient\
    \ $\\frac{\\prod_{i=1}^{n} n(2i-1)}{n! 2^n} \\geq 0$, $k_{(2)}(x, z) = \\frac{1}{\\\
    sqrt{m - \\langle x, z \\rangle}}$ is also a valid kernel.\n\n### 3.3.2 Other\
    \ Chebyshev Kernel Functions\n\n#### 3.3.2.1 Chebyshev-Wavelet Kernel\n\nA valid\
    \ kernel should satisfy the Mercer conditions (Vapnik 2013; Schölkopf et al. 2002),\
    \ and based on Mercer's theorem, a kernel made from multiplication or summation\
    \ of two valid Mercer kernels is also a valid kernel. This idea motivated Jafarzadeh\
    \ et al. (2013) to construct *Chebyshev-Wavelet* kernel which is in fact the multiplication\
    \ of generalized Chebyshev and Wavelet kernels as follows:"
  mdcn: "## 3.3 切比雪夫核函数\n\n基于前几节讨论的切比雪夫多项式原理及其分数类型，本节将阐述切比雪夫核的构建方法。因此，下文将首先介绍普通的切比雪夫核函数，然后说明该核函数的其他几种变体，最后解释分数阶切比雪夫核。\n\
    \n### 3.3.1 普通切比雪夫核函数\n\n许多基于正交多项式构建的核函数已被提出，用于支持向量机及其他基于核的学习算法（Ye et al. 2006;\
    \ Moghaddam and Hamidzadeh 2016; Tian and Wang 2017）。这类核函数的一些特性引起了关注，例如在特征空间中具有较低的数据冗余度，或者在某些情况下，这些核函数在拟合过程中需要更少的支持向量，从而减少了执行时间（Jung\
    \ and Kim 2013）。另一方面，正交核在分类问题上表现出优于传统核（如RBF核和多项式核）的性能（Moghaddam and Hamidzadeh\
    \ 2016; Ozer et al. 2011; Padierna et al. 2018）。\n\n现在，我们将利用正交核的基本定义来构建切比雪夫核。众所周知，对于标量输入，支持向量机的无权重正交多项式核函数定义为\n\
    \n$$K(x, z) = \\sum_{i=0}^{n} T_i(x)T_i(z), \\quad (3.31)$$\n\n其中 $T(.)$ 表示多项式的求值；$x,\
    \ z$ 是核函数的输入参数；$n$ 是最高多项式阶数。在大多数实际应用中，输入数据是多维向量，因此提出了两种方法将一维多项式核扩展到多维向量输入（Ozer\
    \ et al. 2011; Vert et al. 2007）：\n\n1.  **成对法**\n    根据*Vapnik*定理（Vapnik 2013）：\n\
    \    > 设一个多维函数集由坐标基函数的张量积作为基函数定义。那么，在n维基中定义内积的核就是一维核的乘积。\n\n多维正交多项式核被构建为一维核的张量积：\n\
    \n$$K(x, z) = \\prod_{j=1}^{m} K_j(x_j, z_j). \\tag{3.32}$$\n\n在这种方法中，每个输入向量 $x$\
    \ 和 $z$ 的元素对的函数值被成对相乘，这意味着将 $x$ 和 $z$ 的对应元素相乘，然后整个核的输出是前一步所有结果的乘积。因此，对于一个m维输入向量\
    \ $x \\in \\mathbb{R}^m$，给定 $x = \\{x_1, x_2, \\dots, x_m\\}$，$z \\in \\mathbb{R}^m$，且\
    \ $z = \\{z_1, z_2, \\dots, z_m\\}$，无权重切比雪夫核定义为\n\n$$K_{Cheb}(x, z) = \\prod_{j=1}^{m}\
    \ K_j(x_j, z_j) = \\prod_{j=1}^{m} \\sum_{i=0}^{n} T_i(x_j)T_i(z_j), \\tag{3.33}$$\n\
    \n其中 $\\{T_i(.)\\}$ 是切比雪夫多项式。只需乘上在(3.14)中定义的权重函数（第一类切比雪夫多项式的正交性由此定义，参见(3.15)），就可以构建出成对正交切比雪夫核函数：\n\
    \n$$K_{Cheb}(x, z) = \\frac{\\sum_{i=0}^{n} T_i(x)T_i(z)}{\\sqrt{1 - xz}}, \\\
    tag{3.34}$$\n\n其中 $x$ 和 $z$ 是标量输入，对于向量输入，我们有\n\n$$K_{Cheb}(\\mathbf{x}, \\mathbf{z})\
    \ = \\prod_{j=1}^{m} \\frac{\\sum_{i=0}^{n} T_i(x_j)T_i(z_j)}{\\sqrt{1 - x_j z_j}},\
    \ \\tag{3.35}$$\n\n其中 $m$ 是向量 $x$ 和 $z$ 的维度。\n然而，这种方法最初被提出后，许多核函数都是通过成对法构建的（Ye\
    \ et al. 2006; Vert et al. 2007; Zhou et al. 2007; Pan et al. 2021），但这种方法构建的核函数存在两个缺点。首先，时间复杂度或更准确地说是计算复杂度相当高，因此当输入向量维度很高时，这可能成为一个严重问题（Ozer\
    \ et al. 2011）。其次，如果其中一个核（$T_i(x)$ 或 $T_i(z)$）接近零，即使两个向量 $x$ 和 $z$ 彼此非常相似，基于成对法构建的核函数也会导致泛化能力差（Ozer\
    \ and Chen 2008）。\n\n2.  **向量化法**\n\n在Ozer等人（2008）提出的方法中，通过将输入向量作为一个整体而非逐个元素来处理，解决了*成对法*的泛化问题，这是通过计算输入向量的内积来实现的。基于两个向量\
    \ $x$ 和 $z$ 的内积定义为 $\\langle x, z \\rangle = xz^T$，并考虑公式3.31，可以构建*无权重广义切比雪夫核*（Ozer\
    \ and Chen 2008; Ozer et al. 2011）：\n\n$$K(\\mathbf{x}, \\mathbf{z}) = \\sum_{i=0}^{n}\
    \ T_i(\\mathbf{x}) T_i^T(\\mathbf{z}) = \\sum_{i=0}^{n} \\langle T_i(x) T_i(z)\
    \ \\rangle.$$\n\n类似于公式3.35，*广义切比雪夫核*定义为（Ozer and Chen 2008; Ozer et al. 2011）：\n\
    \n$$K_{G\\_Cheb}(\\mathbf{x}, \\mathbf{z}) = \\frac{\\sum_{i=0}^{n} \\langle T_i(x),\
    \ T_i(z) \\rangle}{\\sqrt{m - \\langle x, z \\rangle}},$$\n\n其中 $m$ 是输入向量 $\\\
    mathbf{x}$ 和 $\\mathbf{z}$ 的维度。\n\n请注意，由于切比雪夫多项式在 $[-1, 1]$ 区间内是正交的，输入数据应根据以下公式进行归一化：\n\
    \n$$x^{new} = \\frac{2(x - Min)}{Max - Min} - 1,$$\n\n其中 $Min$ 和 $Max$ 分别是输入数据的最小值和最大值。显然，如果输入数据是一个数据集，则应按列进行归一化。\n\
    \n#### 3.3.1.1 切比雪夫核的验证\n\n根据2.2.12节介绍的*Mercer定理*，一个有效的核函数需要是半正定的，或者等价地必须满足Mercer定理的充要条件。这里将证明广义切比雪夫核的有效性。\n\
    \n**定理 3.3** (Ozer et al. (2011)) *公式3.37中引入的广义切比雪夫核是一个有效的Mercer核。*\n\n**证明**\
    \ 正如Mercer定理所述，任何作为有效核的SVM核必须是非负的，精确地说：\n\n$$\\iint K(x, z) f(x) f(z) dx dz \\\
    geq 0.$$\n\n两个有效核的乘积也是一个有效核。因此，可以将任意阶的切比雪夫核表示为两个核函数的乘积：\n\n$$K(x, z) = k_{(1)}(x,\
    \ z) k_{(2)}(x, z),$$\n\n其中\n\n$$k_{(1)}(x, z) = \\sum_{j=0}^{n} T_j(x) T_j^T(z)\
    \ = T_0(x) T_0^T(z) + T_1(x) T_1^T(z) + \\cdots + T_n(x) T_n^T(z)$$\n\n且\n\n$$k_{(2)}(x,\
    \ z) = \\frac{1}{\\sqrt{m - \\langle x, z \\rangle}}.$$\n\n考虑 $f : \\mathbb{R}^m\
    \ \\longrightarrow \\mathbb{R}$，并假设每个元素独立于核的其他元素，我们可以对 $k_{(1)}(\\mathbf{x}, \\\
    mathbf{z})$ 评估Mercer条件如下：\n\n$$\\begin{aligned} \\iint k_{(1)}(x, z) f(x) f(z)\
    \ dx dz &= \\iint \\sum_{j=0}^{n} T_j(x) T_j^T(z) f(x) f(z) dx dz, \\\\ &= \\\
    sum_{j=0}^{n} \\iint T_j(x) T_j^T(z) f(x) f(z) dx dz, \\\\ &= \\sum_{j=0}^{n}\
    \ \\left[ \\int T_j(x) f(x) dx \\int T_j^T(z) f(z) dz \\right], \\\\ &= \\sum_{j=0}^{n}\
    \ \\left[ \\left( \\int T_j(x) f(x) dx \\right) \\left( \\int T_j^T(z) f(z) dz\
    \ \\right) \\right] \\geq 0. \\end{aligned}$$\n\n因此，核 $k_{(1)}(x, z)$ 是一个有效的Mercer核。为了证明\
    \ $k_{(2)}(x, z) = \\frac{1}{\\sqrt{m - \\langle x, z \\rangle}}$（在最简单形式 $m =\
    \ 1$ 下）是一个有效的核函数，我们可以说 $< x, y >$ 是线性核，而 $\\frac{1}{\\sqrt{1 - x, y}}$ 的泰勒级数为\n\
    \n$$1 + \\frac{1}{2} < x, y > + \\frac{3}{8} < x, y >^2 + \\frac{5}{16} < x, y\
    \ >^3 + \\frac{35}{128} < x, y >^4 + \\cdots,$$\n\n其中每个系数 $\\frac{\\prod_{i=1}^{n}\
    \ n(2i-1)}{n! 2^n} \\geq 0$，因此 $k_{(2)}(x, z) = \\frac{1}{\\sqrt{m - \\langle\
    \ x, z \\rangle}}$ 也是一个有效的核。\n\n### 3.3.2 其他切比雪夫核函数\n\n#### 3.3.2.1 切比雪夫-小波核\n\
    \n一个有效的核应满足Mercer条件（Vapnik 2013; Schölkopf et al. 2002），并且根据Mercer定理，由两个有效Mercer核相乘或相加得到的核也是一个有效核。这一思想启发了Jafarzadeh等人（2013）构建*切比雪夫-小波*核，它实际上是广义切比雪夫核与小波核的乘积，如下所示："

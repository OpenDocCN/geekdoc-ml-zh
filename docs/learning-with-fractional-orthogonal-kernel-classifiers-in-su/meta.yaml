  md: '# 11.7 Accelerating the QP Solver


    Quadratic Programming (QP) is the process of solving a particular mathematical
    problem. As mentioned in previous chapters, it is needed to solve a quadratic
    equation and find its minimal answer to create the best separating line. Therefore,
    we calculate the K matrix and prepare all the constraint matrixes to make a quadratic
    problem. Previously the CVXOPT library was used to solve the mentioned quadratic
    equation. One of the complex parts of the code is the QP solver function. However,
    there is a valuable library inside the CUDA API for the quadratic equations. Moreover,
    it is possible to use the PyTorch and QPTH PyTorch (Amos and Kolter 2017) libraries
    inside our Python implementation. As a prerequisite, the following needed libraries
    should be installed.


    Installing torchvision and qpth packages


    ```

    pip3 install torchvision

    pip3 install qpth

    ```


    After the installation, we have to import the solver


    Import the solver in your code


    ```

    from qpth.qp import QPFunction

    ```


    The following shows the problem formulation. The standard form of the QP is used
    as follows:


    $$\begin{cases} \min \frac{1}{2}(x^T)Px + q^T.x \ \text{subject to : } Gx <= h,
    \text{ and } Ax = b \end{cases}$$


    However, the QPTH define a quadratic program layer as


    $$\begin{cases} \min \frac{1}{2}(z^T)Qz + p^T.z \ \text{subject to : } Gz <= h,
    \text{ and } Az = b \end{cases}$$


    The differences are only at the name of variables. Therefore, we replace the following
    statement:


    ```

    solution = cvxopt.solvers.qp(P, q, G, h, A, b)

    ```



  md: "# Range, Break, and Continue\n\nIf it is needed to iterate over a sequence\
    \ of numbers, there is a built-in function *range()* which generates the arithmetic\
    \ progression of numbers. Consider the *range()* which starts from 0 and ends\
    \ at a specified number, except 1. To iterate over the indices of a list or any\
    \ sequence, we can use the combination of the *range()* and *len()* functions\
    \ that are applicable. The *range()* function by default moves in the sequence\
    \ by one step, so we can specify the increment value by adding a third parameter\
    \ to the function.\n\n```\nfor x in range(3):\n    print(x)\n\n> 0\n> 1\n> 2\n\
    ```\n\n```\nfor x in range(2, 4):\n    print(x)\n\n> 2\n> 3\n```\n\n```\nnums\
    \ = [\"One\", \"Two\", \"Three\"]\nfor i in range(len(nums)):\n    print(i, nums[i])\n\
    for x in range(2, 10, 3):\n    print(x)\n\n> 0 One\n> 1 Two\n> 2 Three\n```\n\n\
    ```\nfor x in range(2, 10, 3):\n    print(x)\n\n> 2\n> 5\n> 8\n```\n\nSame as\
    \ *while* loop, *else* statement can be used after *for* loop. In Python, *break*\
    \ and *continue* are used like other programming languages to terminate the loop\
    \ or skip the current iteration, respectively."

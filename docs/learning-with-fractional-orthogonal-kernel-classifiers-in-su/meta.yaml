    \psi_1(x_1) & \psi_1(x_2) & \dots & \psi_1(x_N) \\ \vdots & \vdots & \vdots &
    \ddots & \vdots \\ \psi_N(x_0) & \psi_N(x_1) & \psi_N(x_2) & \dots & \psi_N(x_N)
    \end{bmatrix} \begin{bmatrix} \alpha_0 \\ \alpha_1 \\ \vdots \\ \alpha_N \end{bmatrix},$$


    可以总结为 $\boldsymbol{w} = \boldsymbol{M}\boldsymbol{\alpha}$，其中 $M_{li} = \{\psi_l(x_i)\}_{0
    \le l, i \le N}$。


    利用公式7.22中的第三个关系，


    $$\forall l : \epsilon_l = \frac{-\alpha_l}{\gamma}, \tag{7.24}$$


    并将 $w_j$ 代入公式7.22的第二个方程，得到


    $$\sum_{j=0}^{N} (\sum_{i=0}^{N} \alpha_i \psi_j(x_i)) \psi_j(x_l) + \frac{\alpha_l}{\gamma}
    = h(x_l), \quad 0 \le l \le N, \tag{7.25}$$


    用矩阵形式表示，可得


    $$\begin{bmatrix} \psi_0(x_0) & \psi_1(x_0) & \dots & \psi_N(x_0) \\ \psi_0(x_1)
    & \psi_1(x_1) & \dots & \psi_N(x_1) \\ \vdots & \vdots & \ddots & \vdots \\ \psi_0(x_N)
    & \psi_1(x_N) & \dots & \psi_N(x_N) \end{bmatrix} \begin{bmatrix} \psi_0(x_0)
    & \psi_0(x_1) & \dots & \psi_0(x_N) \\ \psi_1(x_0) & \psi_1(x_1) & \dots & \psi_1(x_N)
    \\ \vdots & \vdots & \ddots & \vdots \\ \psi_N(x_0) & \psi_N(x_1) & \dots & \psi_N(x_N)
    \end{bmatrix} \begin{bmatrix} \alpha_0 \\ \alpha_1 \\ \vdots \\ \alpha_N \end{bmatrix}$$

    $$+ \begin{bmatrix} \frac{1}{\gamma} & 0 & \dots & 0 \\ 0 & \frac{1}{\gamma} &
    \dots & 0 \\ \vdots & \vdots & \ddots & \vdots \\ 0 & 0 & \dots & \frac{1}{\gamma}
    \end{bmatrix} \begin{bmatrix} \alpha_0 \\ \alpha_1 \\ \vdots \\ \alpha_N \end{bmatrix}
    = \begin{bmatrix} h_0 \\ h_1 \\ \vdots \\ h_N \end{bmatrix}$$


    可以写成 $(\boldsymbol{M}^T\boldsymbol{M} + \frac{1}{\gamma}\boldsymbol{I})\boldsymbol{\alpha}
    = \boldsymbol{h}$，其中 $\boldsymbol{I} = I_{N+1 \times N+1}$，$h_i = h(x_i)$ 且 $\boldsymbol{h}
    = [h_0, h_1, \dots, h_N]^T$。


    现在，我们需要定义核函数 $K(x_l, x_i) = [\varphi(x_l)]^T \varphi(x_i)$ 的导数。利用Mercer定理 Vapnik
    (1998); Lázaro et al. (2005)，特征映射的导数可以用核函数的导数来表示。让我们考虑以下微分算子：


    $$\nabla^{m,n} = \frac{\partial^{m+n}}{\partial u^m \partial v^n},$$


    该算子将在本节中使用。


    我们定义 $\chi^{(m,n)}(u, v) = \nabla^{m,n} K(u, v)$ 和 $\chi_{l,i}^{(m,n)} = \nabla^{m,n}
    K(u, v)|_{u=x(l), v=x(i)}$，公式7.25可写为：


    $$h_l = \sum_{i=0}^N \alpha_i [\chi_{l,i}^{(2,2)} + \frac{k}{x_i} \chi_{l,i}^{(1,2)}
    + f_i \chi_{l,i}^{(0,2)} + \frac{k}{x_i} \chi_{l,i}^{(2,1)} + \frac{k^2}{x_i x_l}
    \chi_{l,i}^{(1,1)} + \frac{k}{x_i} f_i \chi_{l,i}^{(0,1)} + f_i \chi_{l,i}^{(2,0)}
    + f_i \frac{k}{x_i} \chi_{l,i}^{(1,0)} + f_i f_l \chi_{l,i}^{(0,0)}] + \frac{\alpha_l}{\gamma},
    \quad 0 \le l \le N.$$


    因此，我们计算 $\{\alpha_i\}_{0 \le i \le N}$，并将其代入公式7.23，计算出 $\{w_l\}_{0 \le l \le N}$，并且


    $$\tilde{y} = \sum_{i=0}^n \alpha_i (\chi^{(2,0)}(x_i, x) + \frac{k}{x_i} \chi^{(1,0)}(x_i,
    x) + f_i \chi^{(0,0)}(x_i, x))$$


    将是Lane-Emden方程中近似解的对偶形式。



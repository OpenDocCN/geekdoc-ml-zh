    ## 6.2 Preliminaries


    This section covers the basic definitions and properties of Jacobi orthogonal
    polynomials. Moreover, the fractional form of Jacobi orthogonal polynomials is
    introduced and relevant properties are clarified.


    ### 6.2.1 Properties of Jacobi Polynomials


    Let’s start with a simple recap on the definition of orthogonal polynomials. In
    Szegő (1939), Szegő defined the orthogonal polynomials using a function, such
    as $F(x)$, to be non-decreasing which includes many points of increase in the
    interval $[a, b]$. Suppose the following moments exist for this function:


    $$c_n = \int_a^b x^n dF(x), \quad n = 0, 1, 2, \ldots \qquad (6.1)$$


    By orthogonalizing the set of non-negative powers of $x$, i.e., $1, x, x^2, x^3,
    \ldots, x^n, \ldots$, he obtained a set of polynomials as follows Szegő (1939),
    Asghari et al. (2022):


    $$J_0(x), J_1(x), J_2(x), \ldots, J_n(x), \ldots \qquad (6.2)$$


    which can be determined, uniquely by the following conditions Szegő (1939):


    - $J_n(x)$ is a polynomial of exactly degree $n$, where the coefficient of $x^n$
    is positive.

    - $\{J_n(x)\}$ is orthonormal, i.e.,


    $$\int_a^b J_n(x) J_m(x) dF(x) = \delta_{nm}, \quad n, m = 0, 1, 2, \ldots \qquad
    (6.3)$$


    where $\delta_{nm}$ is Kronecker’s delta function.


    Using Eq. 6.3 one can define Jacobi orthogonal polynomials. Therefore, Jacobi
    polynomials which are denoted by $J_n^{\psi, \omega}(x)$ are orthogonal over $[-1,
    1]$ interval with $w^{\psi, \omega}(x)$ weight function Hadian et al. (2020),
    Askey and Wilson (1985), Kazem (2013), Asghari et al. (2022):


    $$w^{(\psi, \omega)}(x) = (1 - x)^\psi (1 + x)^\omega, \qquad (6.4)$$


    where $\psi, \omega > -1$. However, Eq. 6.4 formulation of the weight function
    suffers from computational difficulties at two distinct input points where $\psi,
    \omega < 0$ Doman (2015). The input data has to be normalized into interval $[-1,
    1]$. In general, it can be written that:


    The orthogonal polynomials with the weight function $(b - x)^\psi (x - a)^\omega$
    on the interval $[a, b]$, for any orthogonal polynomial denoted by $J_n^{\psi,
    \omega}(x)$, can be expressed in the following form Doman (2015), Bhrawy and Zaky
    (2016):


    $$J_n^{(\psi, \omega)} \left\{ 2 \left( \frac{x - a}{b - a} \right) - 1 \right\},
    \qquad (6.5)$$


    where $a = -1$ and $b = 1$. It is clear that the minimum and maximum of possible
    input can be $-1$ and $+1$, respectively. Practically while $\psi < 0$ and $x
    = +1$ causes the term $(1 - x)^\psi$ equal to zero to the power of a negative
    number and that yields infinity.


    Similarly, it happens when $\omega < 0$ for the second part $(1 + x)^\omega$,
    while $x = -1$. To tackle this issue adding a trivial noise to $x$ is proposed
    through summing with a slack variable $\epsilon = 10^{-4}$ Tian and Wang (2017).


    Consequently, one can rewrite the relation (6.4) as follows:


    $$w^{(\psi,\omega)}(x) = (1 - x + \epsilon)^\psi (1 + x + \epsilon)^\omega. \tag{6.6}$$


    Note that in programming languages like Python, it is necessary that floating
    point part precision of $1 - x$ and $1 + x$ should be handled and set equal to
    precision of the slack variable, for example, following figures compare Eqs. 6.4
    and 6.6 for different $\psi$, $\omega$, and $\epsilon = 0.0001$. Since there are
    some difficulties with the calculation of ordinary weight functions on boundaries,
    we have used Maple software for plotting. Figure 6.1 demonstrates the weight function
    of Jacobi polynomials without a noise term for different $\psi$ and $\omega$,
    whereas Fig. 6.2 depicts the plots of weight function of Jacobi polynomials for
    different $\psi$ and $\omega$ while a noise ($\epsilon = 0.0001$) is added to
    terms. As these plots depict, there is no considerable difference in the output
    of related functions.


    Thus, the orthogonality relation is Bhrawy et al. (2016), Doman (2015), Askey
    (1975):


    $$\int_{-1}^{1} J_{m}^{\psi,\omega}(x) J_{n}^{\psi,\omega}(x) w^{(\psi,\omega)}(x)
    dx = 0, \quad m \neq n. \tag{6.7}$$


    The Jacobi polynomials can be defined as eigenfunctions of a singular Sturm–Liouville
    differential equation as follows: Doman (2015), Askey (1975), Bhrawy and Zaky
    (2016), Hadian et al. (2020):


    $$\frac{d}{dx}\left((1-x+\epsilon)^{\psi+1}(1+x+\epsilon)^{\omega+1}\frac{d}{dx}J_{n}^{\psi,\omega}(x)\right)
    + (1-x+\epsilon)^{\psi}(1+x+\epsilon)^{\omega}\rho_{n}J_{n}^{\psi,\omega}(x) =
    0, \tag{6.8}$$


    where $\rho_{n} = n(n+\psi+\omega+1)$.


    Considering the general form of recurrence relation which the orthogonal polynomials
    follow, for *Jacobi Polynomials*, there exist the following relation: Doman (2015),
    Askey (1975), Bhrawy and Zaky (2016), Hadian et al. (2020)


    $$J_{n+1}^{\psi,\omega}(x) = (A_{n}x + B_{n})J_{n}^{\psi,\omega}(x) - C_{n}J_{n-1}^{\psi,\omega}(x),
    \quad n \geqslant 1, \tag{6.9}$$


    while


    $$J_{0}^{\psi,\omega}(x) = 1,$$

    $$J_{1}^{\psi,\omega}(x) = \frac{1}{2}(\psi+\omega+2)x + \frac{1}{2}(\psi-\omega),
    \tag{6.10}$$


    where


    $$A_{n} = \frac{(2n+\psi+\omega+1)(2n+\psi+\omega+2)}{2(n+1)(n+\psi+\omega+1)},$$

    $$B_{n} = \frac{(\omega^{2}-\psi^{2})(2n+\psi+\omega+1)}{2(n+1)(n+\psi+\omega+1)(2n+\psi+\omega)},$$

    $$C_{n} = \frac{(n+\psi)(n+\omega)(2n+\psi+\omega+2)}{(n+1)(n+\psi+\omega+1)(2n+\psi+\omega)}.
    \tag{6.11}$$


    The first few *Jacobi polynomials* are same as Eq. 6.10. On the other hand, because
    Jacobi polynomials form lengthy terms, the higher orders are ignored to present
    here. For higher orders of *Jacobi polynomials*, the following code can be used
    which uses Python''s *sympy* module to calculate symbolically rather than numerically:


    ```python

    import sympy

    x = sympy.Symbol("x")

    a = sympy.Symbol("a")

    ```'

    $$\gamma_{i+1} = \begin{cases} 0 & i=0, \ \frac{\int_{-1}^{1} J_{i}^{\psi, \omega}(x)
    J_{i}^{\psi, \omega}(x) w^{\psi, \omega}(x) dx}{\int_{-1}^{1} J_{i-1}^{\psi, \omega}(x)
    J_{i-1}^{\psi, \omega}(x) w^{\psi, \omega}(x) dx} & i=1, 2, \dots \end{cases}.$$


    Jacobi polynomials satisfy the following ordinary differential equation Doman
    (2015), Askey (1975), Hadian et al. (2020):


    $$(1-x^2)\frac{d^2y}{dx^2} + [\omega - \psi(\psi + \omega + 2)x]\frac{dy}{dx}
    + \lambda y = 0.$$


    The solution can be expressed by means of power series $y = \sum_{n=0}^{\infty}
    a_n x^n$:


    $$(1-x^2)\sum_{n=0}^{\infty} n(n-1)a_n x^{n-2} + [\omega - \psi - (\psi + \omega
    + 2)x]\sum_{n=0}^{\infty} a_n x^{n-1} + \lambda \sum_{n=0}^{\infty} a_n x^n =
    0.$$


    Also, generating function for *Jacobi Polynomials* can be defined as follows Doman
    (2015), Askey (1975):


    $$\frac{2^{\psi+\omega}}{R(1+R-x)^{\psi}(1+R+x)^{\omega}} = \sum_{n=0}^{\infty}
    J_{n}^{\psi, \omega}(x) x^n,$$


    where $R = \sqrt{1-2xz+z^2}$ and $|z| < 1$.


    This family of orthogonal polynomials follows the same symmetry as previous orthogonal
    families already introduced, i.e.,


    $$J_{n}^{\psi, \omega}(x) = (-1)^n J_{n}^{\psi, \omega}(x) = \begin{cases} J_n(-x),
    & n \text{ even} \ -J_n(-x), & n \text{ odd} \end{cases}$$


    Figures 6.3 and 6.4 illustrate *Jacobi polynomials* of orders 0 to 6 and compare
    negative $\psi$, positive $\omega$ in Fig. 6.3 versus positive $\psi$ while negative
    $\omega$ in Fig. 6.4. Figures 6.5 and 6.6 depict Jacobi polynomials of order 5
    with different $\psi$, fixed $\omega$, fixed $\psi$, and fixed $\omega$, respectively.


    # 6.2.2 Properties of Fractional Jacobi Functions


    In order to obtain fractional order of Jacobi functions, a transformation is used
    as $x'' = 2(\frac{x-a}{b-a})^{\alpha} - 1$, where $a$ and $b$ are the minimum
    and maximum of the transition'

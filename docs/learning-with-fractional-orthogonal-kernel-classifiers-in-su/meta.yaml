    Therefore, Eq. 6.36 is a valid Mercer kernel. Validity of $K_{(2)}(x, z)$ can
    be considered similar to the weight function of ordinary Jacobi kernel function.
    It can be deduced that the output of $K_{(2)}(x, z)$ is never less than zero,
    as the inner product of two vectors which are normalized over $[-1, 1]$ is in
    the range $[-d, d]$, where $d$ is the dimension of the input vectors $x$ or $z$,
    and the effect of negative inner product will be neutralized by the parameter
    $d$. Therefore, Eq. 6.37 is also a valid Mercer kernel. $\square$


    # 6.4 Application of Jacobi Kernel Functions on Real Datasets


    In this section, the results of *Jacobi* and the *fractional Jacobi kernel* on
    some well-known datasets are compared with other kernels such as *RBF*, *polynomial*,
    *Chebyshev*, *fractional Chebyshev*, *Gegenbauer*, *fractional Gegenbauer*, *Legendre*,
    and *fractional Legendre kernels* introduced in the previous chapters. To have
    a neat classification, there may need to apply some prepossessing steps to dataset,
    here these steps are not in focus, but the normalization which is mandatory when
    using *Jacobi polynomials* as a kernel. There are some online data stores available
    for public use, such a widely used datastore is the *UCI Machine Learning Repository*<sup>1</sup>
    of *University of California, Irvine*, and also *Kaggle*.<sup>2</sup> For this
    section, four datasets from UCI are used that are well known for machine learning
    practitioners.



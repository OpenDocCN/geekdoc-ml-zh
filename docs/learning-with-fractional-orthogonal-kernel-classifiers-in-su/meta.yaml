  md: "# 5.3.1 Ordinary Gegenbauer Kernel Function\n\nGegenbauer polynomials have\
    \ been used as a kernel function due to less need to support vectors while acquiring\
    \ high accuracy in comparison with well-known kernel functions such as RBF or\
    \ many other classical and orthogonal kernels (Padierna et al. 2018). That is\
    \ because Gegenbauer polynomials, same as any other orthogonal polynomial kernels\
    \ produce kernel matrices with lower significant eigenvalues which in turn means\
    \ fewer support vectors are needed (Padierna et al. 2018).\n\nAs we know, a multidimensional\
    \ SVM kernel function can be defined as follows:\n\n$$K(X, Z) = \\prod_{j=0}^{d}\
    \ K_j(x_j, z_j).$$\n\nIt can be seen that two undesired results are produced,\
    \ **annihilation effect**, when any or both of $x_j$ and $z_j$ of $k(x_j, z_j)$\
    \ is/are close to zero, then kernel outputs very small values, and the second\
    \ one is considered as **explosion effect** which refers to very big output of\
    \ the kernel $|\\prod_{j=1}^{d} K(x_j, z_j)| \\longrightarrow \\infty$ which leads\
    \ to numerical difficulties (Padierna et al. 2018). To overcome **annihilation**\
    \ and **explosion** effects, Padierna et al. (2018) proposed a new formulation\

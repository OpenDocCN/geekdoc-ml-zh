    \ 0.5.\n\n![](img/a1d5f013073c7da63184a763d887fe2f_89_0.png)\n\nAlso, Fig. 4.3\
    \ depicts the fractional Legendre functions of the first kind of order 5 for different\
    \ values of α.\n\n## 4.3 Legendre Kernel Functions\n\nIn this section, the ordinary\
    \ Legendre polynomial kernel formula is presented first. Then, some other versions\
    \ of this kernel function will be introduced, and at the end, the fractional Legendre\
    \ polynomial kernel will be introduced in this section.\n\n### 4.3.1 Ordinary\
    \ Legendre Kernel Function\n\nLegendre polynomials, like other polynomials, are\
    \ orthogonal except that Legendre polynomial weight function is a constant function\
    \ of value 1 (w(x) = 1). So according to Eqs. 4.2 and 4.3 for different m and\
    \ n, Legendre polynomials are orthogonal to each other with weight function 1.\
    \ This enables us to construct the Legendre kernel without denominators. Therefore,\
    \ for scalar inputs x and z, Legendre kernel is defined as follows:\n\n$K(x, z)\
    \ = \\sum_{i=0}^{n} P_i(x) P_i(z) = < \\phi(x), \\phi(z) >,$\n\nwhere $<, >$ is\
    \ an inner product and the unique parameter $n$ is the highest order of the Legendre\
    \ polynomials, and the nonlinear mapping determined by Legendre kernel is\n\n\
    $\\phi(x) = (P_0(x), P_1(x), ..., P_n(x)) \\in \\mathbb{R}^{n+1}.$\n\nNow, with\
    \ this formula, it can be seen that the $\\phi(x)$ values are orthogonal to each\
    \ other, indicating that the Legendre kernel is also orthogonal Shawe-Taylor and\
    \ Cristianini (2004).\n\n**Theorem 4.1** (Pan et al. (2012)) *Legendre kernel\
    \ is a valid Mercer kernel.*\n\n*Proof* According to the Mercer theorem introduced\
    \ at (Sect. 2.2.1), a valid kernel function that needs to be positive semi-definite,\
    \ or equivalently should satisfy the necessary and sufficient conditions of Mercer's\
    \ theorem. As Mercer theorem states any SVM kernel to be a valid kernel should\
    \ be non-negative, in a precise way:\n\n$\\iint K(x, z)w(x, z)f(x)f(z)dxdz \\\
    geq 0,$\n\nwhere\n\n$K(x, z) = \\sum_{i=0}^{n} P_i(x) P_i^T(z),$\n\nand $w(x,\
    \ z) = 1$, and $f(x)$ is a function where $: f : \\mathbb{R}^m \\rightarrow \\\
    mathbb{R}$. Assuming each element is independent of the others, the Mercer condition\
    \ $K(x, z)$ can be evaluated as follows:\n\n$\\iint K(x, z)w(x, z)f(x)f(z)dxdz\
    \ = \\iint \\sum_{j=0}^{n} P_j(x)P_j^T(z)f(x)f(z)dxdz,$\n$= \\sum_{j=0}^{n} \\\
    iint P_j(x)P_j^T(z)f(x)f(z)dxdz,$\n$= \\sum_{j=0}^{n} \\left[ \\int P_j(x)f(x)dx\
    \ \\int P_j^T(z)f(z)dz \\right],$\n$= \\sum_{j=0}^{n} \\left[ \\left( \\int P_j(x)f(x)dx\
    \ \\right) \\left( \\int P_j^T(z)f(z)dz \\right) \\right],$\n$\\geq 0.$\n\nThe\
    \ Legendre kernels up to the third order can be expressed as:\n\n$K(x, z) = 1\
    \ + xz,$\n$K(x, z) = 1 + xz + \\frac{9(xz)^2 - 3x^2 - 3z^2 + 1}{4},$\n$K(x, z)\
    \ = 1 + xz + \\frac{9(xz)^2 - 3x^2 - 3z^2 + 1}{4} + \\frac{25(xz)^3 - 15x^3z -\
    \ 15xz^3 + 9xz}{4}.$\n\nThis kernel can be expanded and specified as the following\
    \ for vector inputs $x$, $z \\in \\mathbb{R}^d$:\n\n$K(\\mathbf{x}, \\mathbf{z})\
    \ = \\prod_{j=1}^d K_j(x_j, z_j) = \\prod_{j=1}^d \\sum_{i=0}^n P_i(x_j)P_i(z_j)$\n\
    \nwhere $x_j$ is j-th element of the vector $\\mathbf{x}$.\n\nGiven that the multiplication\
    \ of two valid kernels is still a valid kernel, this kernel is also valid. The\
    \ same as the Chebyshev kernel function for vector input, each feature of the\
    \ input vector for the Legendre kernel function lies in $[-1, 1]$. So the input\
    \ data has been normalized to $[-1, 1]$ via the following formula:\n\n$x_i^{new}\
    \ = \\frac{2(x_i^{old} - Min_i)}{Max_i - Min_i} - 1$\n\nwhere $x_i$ is the i-th\
    \ feature of the vector $\\mathbf{x}$, $Max_i$ and $Min_i$ are the minimum and\
    \ maximum values along the i-th dimensions of all the training and test data,\
    \ respectively.\n\n### 4.3.2 Other Legendre Kernel Functions\n\nApart from the\
    \ ordinary form of the Legendre kernel function, other kernels with unique properties\
    \ and special weight functions are defined on Legendre polynomials, some of which\
    \ are introduced in this section.\n\n#### 4.3.2.1 Generalized Legendre Kernel\n\
    \nOzer et al. (2011) applied kernel functions onto vector inputs directly instead\
    \ of applying them to each input element. In fact, the generalized Legendre kernel\
    \ by generalized Legendre polynomial was proposed as follows Tian and Wang (2017):\n\
    \n$K_{G-Legendre}(x, z) = \\sum_{i=0}^n P_i(x)P_i^T(z)$\n\nwhere\n\n$P_0(x) =\
    \ 1,$\n$P_1(x) = x,$\n$P_n(x) = \\frac{2n-1}{n} x P_{n-1}^T(x) - \\frac{n-1}{n}\
    \ P_{n-2}(x). \\quad (4.30)$\n\nRegarding Chebyshev generalized kernels, it should\
    \ be noted that these kernels have more complex expressions than generalized Legendre\
    \ kernels due to their more complex weight function, so generalized Chebyshev\
    \ kernels can depict more abundant nonlinear information.\n\n#### 4.3.2.2 Exponentially\
    \ Legendre Kernel\n\nThe exponentially modified orthogonal polynomial kernels\
    \ are actually the product of the well-known Gaussian kernel and the corresponding\
    \ generalized orthogonal polynomial kernels (without weighting function). Since\
    \ an exponential function (the Gaussian kernel) can capture local information\
    \ along the decision surface better than the square root function, Ozer et al.\
    \ (2011) replaced the weighting function with Gaussian kernel ($\\frac{1}{\\exp\
    \ \\gamma \\|x-z\\|^2}$), and defined the exponentially modified Legendre kernels\
    \ as Tian and Wang (2017)\n\n$K_{exp-Legendre}(x, z) = \\frac{\\sum_{i=0}^n P_i(x)\
    \ P_i^T(z)}{\\exp \\gamma \\|x-z\\|^2}. \\quad (4.31)$\n\nIt should be noted that\
    \ the modified generalized orthogonal polynomial kernels can be seen as semi-local\
    \ kernels. Also, having two parameters, $n$ and $\\gamma > 0$, makes the optimization\
    \ of these two kernels more difficult to exploit than that of the generalized\
    \ orthogonal polynomial kernels Tian and Wang (2017).\n\n#### 4.3.2.3 Triangularly\
    \ Modified Legendre Kernel\n\nThe Triangular kernel, which is basically an affine\
    \ function of the Euclidean distance ($d(i, j)$) between the points in the original\
    \ space, is expressed as Fleuret and Sahbi (2003)\n\n$K(x, z) = (1 - \\frac{\\\
    |x-z\\|}{\\lambda})_+, \\quad (4.32)$\n\nwhere the $()_+$ forces this mapping\
    \ to be positive and ensures this expression to be a kernel. Therefore, the triangularly\
    \ modified Legendre kernels can be written as follows Tian and Wang (2017), Belanche\
    \ Muñoz (2013); Fleuret and Sahbi (2003):"

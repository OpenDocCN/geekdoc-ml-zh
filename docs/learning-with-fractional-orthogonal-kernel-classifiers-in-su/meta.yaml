    $$M^T M \boldsymbol{\alpha} + \frac{1}{\gamma} \boldsymbol{\alpha} = \boldsymbol{F},
    \quad \Rightarrow \left( M^T M + \frac{1}{\gamma} I \right) \boldsymbol{\alpha}

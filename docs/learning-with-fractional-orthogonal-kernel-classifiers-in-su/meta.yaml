    \varphi \rangle = \langle \mathcal{L}_2(K(x, t), 0), \psi_i \rangle,$$

    $$\tilde{K}_3(x, x_i) = \langle \langle \mathcal{L}_1(0, \varphi), \psi_i \rangle,
    \varphi \rangle = \langle \mathcal{L}_1(0, K(x, t)), \psi_i \rangle,$$

    $$\tilde{K}_4(x, x_i) = \langle \langle \mathcal{L}_2(0, \varphi), \psi_i \rangle,
    \varphi \rangle = \langle \mathcal{L}_2(0, K(x, t)), \psi_i \rangle.$$


    # 9.3.4 CLS-SVR Method


    In this section, the collocation form of the LS-SVR model is proposed for solving
    integral equations. Similar to the weighted residual methods, by using the Dirac
    delta function as the test function in the test space, we can construct the collocation
    LS-SVR model, abbreviated as CLS-SVR. In this case, the primal form of optimization
    problem Eq. 9.5 can be expressed as


    $$\min_{w,e} \quad \frac{1}{2} w^T w + \frac{\gamma}{2} e^T e$$

    $$\text{s.t.} \quad \mathcal{N}(\tilde{u})(x_k) - f(x_k) = e_k, \quad k = 1, \ldots,
    n, \tag{9.17}$$'

- md: '## 10.2 Preliminaries


    As we point out earlier, modal Legendre functions are used in the proposed algorithm.
    We skip clarifying the properties and the procedure of making modal Legendre functions
    in this chapter as they have been discussed thoroughly in Chap. 4. Albeit, the
    fractional derivative focusing on the Caputo definition of the fractional derivative
    and the numerical integration are described in this section.


    ### 10.2.1 Fractional Derivative


    By considering $f(x)$ as a function, the Cauchy formula for n-th order can be
    obtained, and by generalizing the Cauchy formula for non-integer orders, we can
    achieve the Riemann-Liouville definition of fractional integral, and due to this,
    the well-known Gamma function is used as the factorial function for non-integer
    numbers. Therefore, by denoting the Riemann-Liouville definition of the fractional
    order of integral as ${}^{RL}\mathcal{I}_x^\beta f(x)$, it can be defined as follows
    Hadian et al. (2020):


    $${}^{RL}\mathcal{I}_x^\beta f(x) = \frac{1}{\Gamma(\beta)} \int_a^x (x-t)^{\beta-1}
    f(t) dt. \quad (10.5)$$


    in which $\beta$ is a real number which indicates the order of integral. Moreover,
    there is another definition for fractional derivative, namely, Caputo definition,
    and by denoting it as ${}^C\mathcal{D}_x^\beta f(x)$, it can be defined as follows
    Hadian et al. (2020):


    $${}^C\mathcal{D}_x^\beta f(x) = {}^{RL}\mathcal{I}_x^{(k-\beta)} f^{(k)}(x) =
    \begin{cases} \frac{1}{\Gamma(k-\beta)} \int_a^x \frac{f^{(k)}(t)dt}{(x-t)^{\beta+1-k}}
    & \text{if } \beta \notin \mathbb{N} \\ \frac{d^\beta}{dx^\beta} & \text{if }
    \beta \in \mathbb{N} \end{cases}, \quad (10.6)$$


    It is worth mentioning that Eqs. (10.7) and (10.8) are the most useful properties
    of the Caputo derivative Hadian et al. (2020):


    $$_{0}^{C}\mathcal{D}_{x}^{\alpha}x^{\gamma} = \begin{cases} \frac{\Gamma(\gamma+1)}{\Gamma(\gamma-\alpha+1)}x^{\gamma-\alpha},
    & 0 \leq \alpha \leq \gamma \\ 0, & \alpha > \gamma \end{cases}$$


    and since the Caputo derivative is a linear operator Hadian et al. (2020), we
    have


    $$_{a}^{C}\mathcal{D}_{x}^{\alpha}(\lambda f(x) + \mu g(x)) = \lambda _{a}^{C}\mathcal{D}_{x}^{\alpha}f(x)
    + \mu _{a}^{C}\mathcal{D}_{x}^{\alpha}g(x) \quad \lambda, \mu \in \mathbb{R}.$$


    ### 10.2.2 Numerical Integration


    In numerical analysis, the quadrature rule is an approximation of the definite
    integral of a function, and it is usually stated as a weighted sum of function
    values at specified points within the considered domain of integration. An n-point
    Gaussian quadrature rule, named after Carl Friedrich Gauss, the German mathematician,
    is a quadrature rule constructed to yield an exact result for polynomials of degree
    $2n - 1$ or less, by a suitable choice of the nodes $x_i$ and weights $\omega_i
    = \int_{a}^{b} h_i(x)\omega(x) dx$ for $i = 1, 2, \ldots, n$. The most common
    domain of integration for such a rule is taken as $[-1, 1]$, but we assume the
    interval $[a, b]$ for the integral boundary so the rule is stated as


    $$\int_{a}^{b} f(x) dx \approx \sum_{i=1}^{n} \omega_i f(x_i)$$


    Now we consider the following theorem.


    **Theorem 10.1** (Mastroianni and Milovanovic (2008)) *Suppose $x_0, x_1, \ldots,
    x_n$ as the roots of the orthogonal polynomial $p_{N+1}$ of order $N + 1$. Then
    there exist a unique set of quadrature weights $\omega_0, \omega_1, \ldots, \omega_N$
    defined as $\omega_j = \int_{a}^{b} h_j(x)\omega(x) dx$*


    $$\int_{a}^{b} \omega(x) p(x) dx \approx \sum_{i=1}^{n} \omega_i p(x_i) \quad
    \forall p \in P_{2N+1}$$


    *In which the weights are positive and calculated as follows:*


    $$\omega_i = \frac{k_{n+1}}{k_n} \frac{\|f_n\|_{\omega}^2}{f_n(x_i) f_{n+1}''(x_i)},
    \quad 0 \leq i \leq n$$


    *which $k_i$s are the leading coefficients of $f_i$.*


    In the next section, the mentioned method is proposed by considering the Least
    squares support vector regression definition.


    ## 10.3 LS-SVR Method for Solving Distributed-Order Fractional Differential Equations


    In this section, first, the LS-SVR is introduced, then some of its characteristics
    are discussed, then the considered method based on LS-SVR, which helps solve the
    DOFDEs, is included. Having the concepts of LS-SVM, we present our solution based
    on the LS-SVM regression in this section. Due to this, consider the following
    equations


    $$\int_{a}^{b} G_{1}(p, D^{p}u(t)) dp + G_{2}(t, u(t), D^{\alpha_{i}}u(t)) = F(t),
    \quad t \in [0, \eta], \qquad (10.12)$$


    with the following initial conditions:


    $$u^{(k)}(0) = 0, \qquad (10.13)$$


    where $k = 0, 1, \ldots, \lfloor \max\{b, \alpha_{i}\} \rfloor$. Now, we discuss
    the convergence and consistency of method analysis in a linear situation


    $$\int_{a}^{b} g(p) D^{p}u(t) dp + A(u(t)) = F(t), \qquad (10.14)$$


    since $A$ is a linear operator, we can rewrite the Eq. 10.14 as


    $$L(u(t)) = F(t), \qquad (10.15)$$


    now we consider the LS-SVR for solving the Eq. 10.14


    $$u(x) \approx u_{N}(x) = \omega^{T} \phi(x), \qquad (10.16)$$


    which $\omega = [\omega_{0}, \ldots, \omega_{N}]^{T}$ are the weight coefficients
    and $\phi = [\phi_{0}, \ldots, \phi_{N}]^{T}$ are the basis functions. To determine
    the unknown coefficients, we consider the following optimization problem


    $$\min_{\omega, \varepsilon} \quad \frac{1}{2} \omega^{T} \omega + \frac{\gamma}{2}
    \varepsilon^{T} \varepsilon, \qquad (10.17)$$


    such that for every $i = 0, \ldots, N$


    $$\int_{a}^{b} g(p) D^{p}(u(t_{i})) dp + Au(t_{i}) - F(t_{i}) = \varepsilon_{i}
    \qquad (10.18)$$


    hence we have


    $$Lu(t_{i}) - F(t_{i}) = \varepsilon_{i} \qquad (10.19)$$


    consider the Lagrangian $L(u) = \sum_{j=0}^N \omega_j l_j$ we have


    $$\mathcal{L} = \frac{1}{2} \omega^T \omega + \frac{\gamma}{2} \varepsilon^T \varepsilon
    - \sum_{i=0}^N \lambda_i (L(u(t_i)) - F(t_i) - \varepsilon_i), \quad (10.20)$$


    and we also have


    $$\mathcal{L} = \frac{1}{2} \sum_{j=0}^N \omega_j^2 + \frac{\gamma}{2} \sum_{i=0}^N
    \varepsilon_i^2 - \sum_{i=0}^N \lambda_i \left( \sum_{j=0}^N \omega_j L(\phi_j(t_i))
    - F_i - \varepsilon_i \right), \quad (10.21)$$


    we can calculate the extremums of Eq. 10.21 as follows


    $$\begin{cases} \frac{\partial \mathcal{L}}{\partial \omega_k} = 0 & \omega_k
    = \sum_{i=0}^N \lambda_i (L(\phi_k(t_i))) = 0 \quad k = 0, 1, \dots, N \\ \frac{\partial
    \mathcal{L}}{\partial \varepsilon_k} = 0 & 2\gamma \varepsilon_k + \lambda_k =
    0 \quad k = 0, 1, \dots, N \\ \frac{\partial \mathcal{L}}{\partial \lambda_k}
    = 0 & \sum_{j=0}^N \omega_j (L(\phi_j(t_k))) = F_k - \varepsilon_k \quad k = 0,
    1, \dots, N \end{cases} \quad (10.22)$$


    and it can be summarized in a vector form as follows


    $$\begin{cases} \omega - S\lambda = 0 & (\text{I}) \\ 2\gamma \varepsilon = -\lambda
    \ ; \ \varepsilon = -\frac{1}{2\gamma} \lambda & (\text{II}) \\ S^T \omega - f
    - \varepsilon = 0 & (\text{III}) \end{cases} \quad (10.23)$$


    Matrix $S$ is as below


    $$S_{ij} = L(\phi_i(t_j)) = \int_a^b g(p) D^p \phi_i(t_j) \, dp + A \phi_i(t_j),
    \quad (10.24)$$


    and by considering this equation, $M_{ij} := D^p \phi_i(t_i)$ can be defined.
    We use the Gaussian numerical integration to calculate $\int_a^b g(p) M_{ij}^{(p)}
    \, dp$.


    There exist two ways to determine numerical integration


    $$\int_a^b f(x) dx \approx \sum_{i=1}^N \omega_i f(x_i) \quad (10.25)$$


    Ordinarily, we can apply the Newton–Cotes method by considering each $x_i$ as

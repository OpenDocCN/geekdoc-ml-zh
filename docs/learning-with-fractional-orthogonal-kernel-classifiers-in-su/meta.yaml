  mdcn: "## 12.4.4 Jacobi 类\n\n**Jacobi** 核是 *ORSVM* 包中目前可用的最后一个正交核。导入 ORSVM 包后，即可选择\
    \ *Jacobi 核*。只需在 *Model* 类的对象初始化时，将核名称设置为 “Jacobi”。Jacobi 类需要以下参数：\n\n- *order*\
    \ := Jacobi 核函数的阶数。\n- *psi* := Jacobi 核函数的 $\\psi$ 参数。\n- *omega* := Jacobi 核函数的\
    \ $\\omega$ 参数。\n- *noise* := 添加到权重函数的小噪声，以避免边界处出现错误。\n\n## 12.5 变换函数\n\n变换函数实际上是著名的\
    \ *Min-max 特征缩放*\n$$x' = \\frac{x - x_{min}}{x_{max} - x_{min}},$$\n与之前介绍的所有核函数分数形式的映射方程的组合。\n\
    $$x' = 2x^{\\alpha} - 1,$$\n因此我们有\n$$x' = 2\\left(\\frac{x - x_{min}}{x_{max}\
    \ - x_{min}}\\right)^{\\alpha} - 1,$$\n该式将输入 $x$ 变换到与函数分数阶（$\\alpha$）相关的核空间。因此，变换函数需要\
    \ $x$（输入数据）和 alpha（作为 Model 类参数的 $'T'$，$'T'$ 代表变换步骤），默认值为 1，此时其作用类似于 Min-max 特征缩放函数对输入数据进行归一化。用户通常无需直接调用变换函数，但若需要，可使用如下代码：\n\
    \n```python\nimport orsvm\norsvm.transformation(x, T=1).\n```\n\n## 12.6 使用方法\n\
    \n使用 ORSVM 库简单直接。易用性是开发 ORSVM 包的重要动机之一。用户只需提供矩阵形式的数据集并选择一个核函数，通过设置 $T$，用户可以选择核函数的普通形式或分数形式。与所选核相关的其他必要参数应在对象初始化步骤中提供。这些参数已在前文详细讨论。本节仅演示一个使用\
    \ *ORSVM* 对数据集进行分类的示例代码。\n\n以第 3 章介绍过的三 monk 问题数据集为例。三 monk 问题的训练集和测试集是分开的。若需要进行这种划分，请参考第\
    \ 12.3 节的代码片段。为了使用 ORSVM，我们首先需要将训练集和测试集划分为 $x\\_train$ 和 $y\\_train$。这可以通过首先将数据集导入\
    \ pandas 数据框来实现，然后我们将 monk 数据集中的类别值映射为 $-1$ 和 $1$，这比 $0$ 和 $1$ 更适合 SVM 算法。\n\n\
    ```python\nimport numpy as np\nimport pandas as pd\nimport orsvm\n\n# 加载训练集\n\
    df = pd.read_csv('/home/datasets/1_monks.train',\n                 names = ['Class',\
    \ 'col1', 'col2', 'col3',\n                          'col4', 'col5', 'col6'],\n\
    \                 index_col = False)\n\ndf.loc[df.Class==0, ['Class']] = -1  #\
    \ 将 \"0\" 映射为 \"-1\"\ny_train=df['Class'].to_numpy() # 将 y_train 转换为 numpy 数组\n\
    df.drop('Class', axis = 1, inplace = True) # 删除类别标签\nX_train=df.to_numpy()  #\
    \ 将 x_train 转换为 numpy 数组\n\n\n# 加载测试集\ndf = pd.read_csv('/home/datasets/1_monks.test',\n\
    \                 names = ['Class', 'col1', 'col2', 'col3',\n                \
    \          'col4','col5','col6'],\n                 index_col = False)\ndf.loc[df.Class\
    \ == 0, ['Class']] = -1\ny_test=df['Class'].to_numpy()\ndf.drop('Class', axis\
    \ = 1, inplace = True)\nX_test = df.to_numpy()\n```\n\n现在我们已经准备好了 *训练集* 和 *测试集*，我们需要一个\
    \ Model 类的实例，以便使用合适的参数调用 **ModelFit** 函数。例如，这里我们选择 Chebyshev 核，设置 $T = 0.5$，并让\
    \ SVM 的 *正则化* 参数保持默认值 “None”，同时在第二行通过调用 *ModelFit* 函数时优先选择递归实现。ORSVM 会拟合模型并返回拟合后的参数。我们可以捕获这些参数以供后续使用，例如用于预测。\n\
    \n```python\n# 从 ORSVM 的 Model 类创建一个对象\nobj = orsvm.Model(kernel=\"Chebyshev\"\
    ,order=3,T=0.5,form='r')\n\n# 拟合模型并捕获参数\n********** 06/09/2021 16:43:14 **********\n\
    ** ORSVM kernel: Chebyshev\n** Order: 3\n** Fractional mode, transition: 0.5\n\
    ** Average SV determiner!\n** SV threshold: 10^ -4\n```\n\n**图 12.1** 阶数为 5，固定\
    \ $\\psi$ 且不同 $\\omega$ 的 Jacobi 多项式\n\n```python\nWeights, S_Vectors, Bias, K_Instance\
    \ = obj.ModelFit(X_train,\n                                                y_train)\n\
    ```\n\n这些仅用于日志记录目的。然后，若需要预测，可以调用 *ModelPredict* 函数，该函数需要划分为 x 和 y 的测试集，以及上一步得到的偏置和核实例。\n\
    \n```python\naccuracy_score = obj.ModelPredict(X_test,\n                     \
    \           y_test,\n                                Bias,\n                 \
    \               K_Instance)\n```\n\n*ModelPredict* 返回准确率分数，我们可以捕获它。此外，该函数会打印更多关于分类的信息。以下是输出（图\
    \ 12.1）：\n\n使用日志信息可能有助于更好地调试，或通过将拟合函数的 *log* 参数设置为 *True* 来更好地理解数据集的拟合过程。\n\n\
    在第一部分介绍了 SVM 的基础知识，第二部分介绍了一些分数正交核函数，并回顾了 SVM 算法的一些应用之后，本章的目标是介绍一个 Python 包，使我们能够在现实世界中应用所介绍的分数正交核函数。本节介绍了该包的架构和简要使用教程。如需更多信息和该包的详细更新教程，您可以访问其在线页面：http://orsvm.readthedocs.io。\n\
    \n## 附录：Python 编程预备知识\n\n### A.1 简介\n\nPython 是一种面向对象、多范式的高级编程语言，由 Guido van Rossum\
    \ 创建，于 1991 年发布。其高级内置数据结构和动态绑定鼓励开发者将其用于应用程序开发，同时也用作脚本语言。根据 TIOBE 编程社区指数，¹ Python\
    \ 是 2020 年三大最受欢迎的编程语言之一，并且是 2018 年最佳编程语言的得主。\n\nPython 2.0 于 2000 年 10 月 16 日发布，包含一些小修复、优化、更好的错误处理信息、循环检测垃圾收集器以及对\
    \ Unicode 的支持。Python 3.0 于 2008 年 12 月 3 日发布，与 Python 2 不完全向后兼容。Python 2.7 的生命周期结束日期最初定于\
    \ 2015 年，但推迟到了 2020 年。推迟的主要原因是担心大量现有代码无法轻松地向前移植到 Python 3。\n\n该编程语言对用户非常流行的一些特性包括其解释器和广泛的源代码或二进制形式的标准库，这使用户能够在所有主要平台上免费使用它，这一特性允许我们在多个平台上运行相同的编译代码，而无需重新编译。作为\
    \ Python 的另一个特性，庞大的社区以及众多的开源框架、工具和库降低了开发成本并提高了开发速度。\n\n¹ https://www.tiobe.com/tiobe-index/.\n\
    \n© The Author(s), under exclusive license to Springer Nature Singapore Pte Ltd.\

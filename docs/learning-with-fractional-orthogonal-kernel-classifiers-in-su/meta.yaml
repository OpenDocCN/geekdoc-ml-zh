    Xu method Xu et al. (2019)


    | N | Method in Xu et al. (2019) with $M = 4$ | Proposed method with $M = 4$ |

    |---|---|---|

    | 5 | 4.2915E-010 | 4.8113E-002 |

    | 6 | 3.3273E-010 | 1.6388E-013 |

    | 7 | 1.9068E-010 | 1.4267E-013 |

    | 8 | 9.4633E-011 | 1.2609E-013 |

    | 9 | 6.7523E-011 | 1.1283E-013 |


    Table 10.4 indicates the comparison between our proposed method and the method
    proposed in Xu et al. (2019). By studying this table, it can be concluded that
    besides $N = 5$, our method is achieving results more accurately.



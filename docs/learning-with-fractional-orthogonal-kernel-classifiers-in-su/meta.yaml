    k = 1, \dots, d. \\ \frac{\partial \mathfrak{L}}{\partial e_k} &= 0 \rightarrow
    \gamma e_k + \alpha_k = 0, \quad k = 1, \dots, n. \\ \frac{\partial \mathfrak{L}}{\partial
    b} &= 0 \rightarrow \sum_{i=0}^n \alpha_i \langle \mathcal{L} 1, \psi_i \rangle
    = 0, \\ \frac{\partial \mathfrak{L}}{\partial \alpha_k} &= 0 \rightarrow \sum_{i=1}^d
    w_i \langle \mathcal{L} \varphi_i - f, \psi_k \rangle + \langle \mathcal{L} 0,
    \psi_i \rangle = e_k. \quad k = 1, \dots, n. \end{aligned} \right.$$


    消去 $w$ 和 $e$ 后，可得如下线性系统：


    $$\begin{bmatrix} 0 & \widetilde{\mathcal{L}}^T \\ \widetilde{\mathcal{L}} & \Omega
    + I/\gamma \end{bmatrix} \begin{bmatrix} b \\ \alpha \end{bmatrix} = \begin{bmatrix}
    0 \\ y \end{bmatrix},$$


    其中


    $$\begin{aligned} \alpha &= [\alpha_1, \dots, \alpha_n]^T, \\ y &= [\langle f,
    \psi_1 \rangle, \langle f, \psi_2 \rangle, \dots, \langle f, \psi_n \rangle]^T,
    \\ \widetilde{\mathcal{L}} &= \langle \mathcal{L} 1, \psi_i \rangle. \end{aligned}$$


    核技巧同样应用于矩阵 $\Omega$：


    $$\Omega_{i,j} = \langle \mathcal{L}\varphi, \psi_i \rangle^T \langle \mathcal{L}\varphi,
    \psi_j \rangle = \langle \mathcal{L}(\mathcal{L}K(x, t), \psi_i), \psi_j \rangle,
    \quad i, j = 1, 2, \ldots, n,$$


    其中 $K(x, t)$ 为任意有效的 Mercer 核。对偶形式的近似解为


    $$\tilde{u}(x) = \sum_{i=1}^n \alpha_i \widetilde{K}(x, x_i) + b, \tag{9.10}$$


    其中


    $$\widetilde{K}(x, x_i) = \langle \langle \mathcal{L}\varphi, \psi_i \rangle,
    \varphi \rangle = \langle \mathcal{L}K(x, t), \psi_i \rangle.$$


    ## 9.3.2 多维情形


    求解多维积分方程最常用的技术之一是使用嵌套求和、未知系数张量和一些基函数来近似解。例如，为求解二维积分方程，可使用如下函数：


    $$u(x, y) \simeq \tilde{u}(x, y) = \sum_{i=1}^d \sum_{j=1}^d w_{i,j} \varphi_i(x)
    \varphi_j(y) + b.$$


    注意，求和上界 $d$ 和基函数 $\varphi$ 在每个维度上可以不同。幸运的是，无需重构所提模型。为使用 LS-SVR 求解多维方程，可将未知张量 $w$、基函数
    $\varphi_i, \varphi_j$ 和训练点 $X$ 向量化。例如，对于二维积分方程，首先将 $d \times d$ 矩阵 $w$ 向量化：


    $$\overline{w} = [w_{1,1}, w_{1,2}, \ldots, w_{1,d}, w_{2,1}, w_{2,2}, \ldots,
    w_{2,d}, \ldots, w_{d,1}, w_{d,2}, \ldots, w_{d,d}],$$


    然后使用新的索引函数


    $$w_{i,j} = \overline{w}_{i*d+j}.$$


    对于三维情形，可使用索引函数


    $$w_{i,j,k} = \overline{w}_{i*d^2+j*d+k}$$


    同样，此索引应应用于基函数和训练数据张量。使用此技术后，所提对偶形式式 9.8 可用于一维情形。求解对偶形式返回向量 $\alpha$，可通过索引函数的逆将其转换为张量。


    ## 9.3.3 积分方程组


    在积分方程组中，存在 $k$ 个方程和未知函数：


    $$N_i(u_1, u_2, \ldots, u_k) = f_i, \quad i = 1, 2, \ldots, k. \tag{9.11}$$


    为求解此类方程，近似解可表述如下：


    $$\tilde{u}_i(x) = w_i^T \varphi(x) + b_i, \quad i = 1, 2, \ldots, k,$$


    其中 $\varphi(x)$ 是特征映射向量，$w_i$ 和 $b_i$ 是未知系数。下一步，将未知系数并排置于向量形式中；因此，我们有


    $$\overline{w} = [w_{1,1}, w_{1,2}, \ldots, w_{1,d}, w_{2,1}, w_{2,2}, \ldots,
    w_{2,d}, \ldots, w_{k,1}, w_{k,2}, \ldots, w_{k,d}].$$


    与之前求解高维方程的公式相同，基函数可以对每个近似函数不同，但为简单起见，使用相同的函数。由于这些函数是共享的，它们可以视为一个 $d$ 维向量。使用此公式，求解式
    9.11 的优化问题可构建为


    $$\min_{w,e} \quad \frac{1}{2} w^T w + \frac{\gamma}{2} e^T e \tag{9.12}$$

    $$\text{s.t.} \quad \langle N_i(\tilde{u}_1, \tilde{u}_2, \ldots, \tilde{u}_k)
    - f_i, \psi_j \rangle = e_{i,j}, \quad j = 1, \ldots, n,$$


    其中 $i = 1, 2, \ldots, k$。同时，矩阵 $e_{i,j}$ 应与未知系数 $w$ 一样进行向量化。对于任何线性算子 $N$，记为 $\mathcal{L}$，可推导出优化问题式
    9.12 的对偶形式。此处，我们得到两个方程和两个未知函数的对偶形式。此过程可推广到任意数量的方程。


    假设给定以下方程组：


    $$\begin{cases} \mathcal{L}_1(u_1, u_2) = f_1 \\ \mathcal{L}_2(u_1, u_2) = f_2
    \end{cases}.$$


    通过使用以下近似解


    $\tilde{u}_1(x) = w_1^T \varphi(x) + b_1,$

    $\tilde{u}_2(x) = w_2^T \varphi(x) + b_2,$


    优化问题式 9.12 变为


    $$\min_{w,e} \quad \frac{1}{2} w^T w + \frac{\gamma}{2} e^T e$$

    $$\text{s.t.} \quad \langle \mathcal{L}_1(\tilde{u}_1, \tilde{u}_2) - f_1, \psi_j
    \rangle = e_j, \quad j = 1, \dots, n,$$

    $$\text{s.t.} \quad \langle \mathcal{L}_2(\tilde{u}_1, \tilde{u}_2) - f_2, \psi_j
    \rangle = e_j, \quad j = n+1, \dots, 2n,$$


    其中

    $w = [w_1, w_2] = [w_{1,1}, w_{1,2}, \dots, w_{1,d}, w_{2,1}, w_{2,2}, \dots,
    w_{2,d}]$,

    $e = [e_1, e_2] = [e_{1,1}, e_{1,2}, \dots, e_{1,d}, e_{2,1}, e_{2,2}, \dots,
    e_{2,d}]$.


    对于对偶解，拉格朗日函数构造如下：


    $$\mathfrak{L}(w, e, \alpha) = \frac{1}{2} w^T w + \frac{\gamma}{2} e^T e$$

    $$- \sum_{j=1}^n \alpha_j \langle \mathcal{L}_1(\tilde{u}_1, \tilde{u}_2) - f_1,
    \psi_j \rangle - e_j$$

    $$- \sum_{j=1}^n \alpha_{n+j} \langle \mathcal{L}_2(\tilde{u}_1, \tilde{u}_2)
    - f_2, \psi_j \rangle - e_{n+j},$$


    则拉格朗日函数的最优性条件为


    $$\frac{\partial \mathfrak{L}}{\partial w_k} = 0 \rightarrow w_k = \begin{cases}
    \sum_{j=1}^n \alpha_j \langle \mathcal{L}_1(\varphi_k, 0) - f_1, \psi_j \rangle
    - e_j + \\ \sum_{j=1}^n \alpha_{n+j} \langle \mathcal{L}_2(\varphi_k, 0) - f_2,
    \psi_j \rangle - e_{n+j}, \quad k = 1, 2, \dots, d. \\ \sum_{j=1}^n \alpha_j \langle
    \mathcal{L}_1(0, \varphi_k) - f_1, \psi_j \rangle - e_j + \\ \sum_{j=1}^n \alpha_{n+j}
    \langle \mathcal{L}_2(0, \varphi_k) - f_2, \psi_j \rangle - e_{n+j}, \quad k =
    d+1, d+2, \dots, 2d. \end{cases}$$

    (9.13)


    $$\frac{\partial \mathfrak{L}}{\partial e_k} = 0 \rightarrow \gamma e_k + \alpha_k
    = 0, \quad k = 1, \dots, 2n.$$


    $$\frac{\partial \mathfrak{L}}{\partial b} = 0 \rightarrow \begin{cases} \frac{\partial
    \mathfrak{L}}{\partial b_1} = 0 \rightarrow \sum_{i=1}^n \alpha_i \langle \mathcal{L}_1(1,
    0), \psi_i \rangle + \sum_{i=1}^n \alpha_{n+i} \langle \mathcal{L}_2(1, 0), \psi_i
    \rangle, \\ \frac{\partial \mathfrak{L}}{\partial b_2} = 0 \rightarrow \sum_{i=1}^n
    \alpha_i \langle \mathcal{L}_1(0, 1), \psi_i \rangle + \sum_{i=1}^n \alpha_{n+i}
    \langle \mathcal{L}_2(0, 1), \psi_i \rangle, \end{cases}$$


    $$\frac{\partial \mathfrak{L}}{\partial \alpha_k} = 0 \rightarrow \begin{cases}
    \sum_{j=1}^d w_j \langle \mathcal{L}_1(\varphi_j, 0) - f_1, \psi_k \rangle + \\
    \sum_{j=1}^d w_{d+j} \langle \mathcal{L}_1(0, \varphi_j) - f_1, \psi_k \rangle
    = e_k \quad k = 1, 2, \dots, n. \\ \sum_{j=1}^d w_j \langle \mathcal{L}_2(\varphi_j,
    0) - f_2, \psi_k \rangle + \\ \sum_{j=1}^d w_{d+j} \langle \mathcal{L}_2(0, \varphi_j)
    - f_2, \psi_k \rangle = e_k \quad k = n+1, n+2, \dots, 2n. \end{cases}$$


    (9.14)


    通过定义


    $$\begin{aligned} A_{i,j} &= \langle \mathcal{L}_1(\varphi_i, 0), \psi_j \rangle,
    \\ B_{i,j} &= \langle \mathcal{L}_2(\varphi_i, 0), \psi_j \rangle, \\ C_{i,j}
    &= \langle \mathcal{L}_1(0, \varphi_i), \psi_j \rangle, \\ D_{i,j} &= \langle
    \mathcal{L}_2(0, \varphi_i), \psi_j \rangle, \\ E_j &= \langle \mathcal{L}_1(1,
    0), \psi_i \rangle, \\ F_j &= \langle \mathcal{L}_2(1, 0), \psi_i \rangle, \\
    G_j &= \langle \mathcal{L}_1(0, 1), \psi_i \rangle, \\ H_j &= \langle \mathcal{L}_2(0,
    1), \psi_i \rangle, \end{aligned}$$


    以及


    $$Z = \begin{bmatrix} A & B \\ C & D \end{bmatrix}, \quad V = \begin{bmatrix}
    E & F \\ G & H \end{bmatrix},$$


    关系式 9.14 可重新表述为


    $$\begin{cases} Z\alpha = w \\ e = -\alpha/\gamma \\ b = V^T\alpha \\ Z^Tw - e
    = y. \end{cases}$$'

  md: '![](img/a1d5f013073c7da63184a763d887fe2f_310_0.png)


    # Plotting with Categorical Variables


    It is also possible to create a plot using categorical variables. Matplotlib allows
    us to pass categorical variables directly to different plotting functions.


    ```

    names = [''group_a'', ''group_b'', ''group_c'']

    values = [1, 10, 100]


    plt.figure(figsize=(9, 3))


    plt.subplot(131)

    plt.bar(names, values)

    plt.subplot(132)

    plt.scatter(names, values)

    plt.subplot(133)

    plt.plot(names, values)

    plt.suptitle(''Categorical Plotting'')

    plt.show()

    ```'

  md: 'where


    $P_0(x) = 1,$

    $P_1(x) = x,$

    $P_n(x) = \frac{2n-1}{n} x P_{n-1}^T(x) - \frac{n-1}{n} P_{n-2}(x). \quad (4.30)$


    Regarding Chebyshev generalized kernels, it should be noted that these kernels
    have more complex expressions than generalized Legendre kernels due to their more
    complex weight function, so generalized Chebyshev kernels can depict more abundant
    nonlinear information.


    # 4.3.2.2 Exponentially Legendre Kernel


    The exponentially modified orthogonal polynomial kernels are actually the product
    of the well-known Gaussian kernel and the corresponding generalized orthogonal
    polynomial kernels (without weighting function). Since an exponential function
    (the Gaussian kernel) can capture local information along the decision surface
    better than the square root function, Ozer et al. (2011) replaced the weighting
    function with Gaussian kernel ($\frac{1}{\exp \gamma \|x-z\|^2}$), and defined
    the exponentially modified Legendre kernels as Tian and Wang (2017)


    $K_{exp-Legendre}(x, z) = \frac{\sum_{i=0}^n P_i(x) P_i^T(z)}{\exp \gamma \|x-z\|^2}.
    \quad (4.31)$


    It should be noted that the modified generalized orthogonal polynomial kernels
    can be seen as semi-local kernels. Also, having two parameters, $n$ and $\gamma
    > 0$, makes the optimization of these two kernels more difficult to exploit than
    that of the generalized orthogonal polynomial kernels Tian and Wang (2017).


    # 4.3.2.3 Triangularly Modified Legendre Kernel


    The Triangular kernel, which is basically an affine function of the Euclidean
    distance ($d(i, j)$) between the points in the original space, is expressed as
    Fleuret and Sahbi (2003)


    $K(x, z) = (1 - \frac{\|x-z\|}{\lambda})_+, \quad (4.32)$


    where the $()_+$ forces this mapping to be positive and ensures this expression
    to be a kernel. Therefore, the triangularly modified Legendre kernels can be written
    as follows Tian and Wang (2017), Belanche Muñoz (2013); Fleuret and Sahbi (2003):'
  merge: -1
  pgno: 92
- img_proc: true
  md: '$K_{Tri-Legendre}(x, z) = (1 - \frac{\|x - z\|}{\lambda})_+ \sum_{i=0}^{n}
    P_i(x) P_i^T(z)$, (4.33)


    where $\lambda = \max\{d(x_i, \bar{x})|\bar{x} = \frac{1}{N} \sum_{i=1}^{N} x_i,
    x_i \in X\}$, $X$ is a finite sample set, and $N$ is the number of samples. Thus,
    all the data live in a ball of radius $\lambda$. Since the parameter $\lambda$
    only depends on the input data, the triangularly modified orthogonal polynomial
    kernels have a unique parameter chosen from a small set of integers.


    # 4.3.3 Fractional Legendre Kernel


    Given that the fractional weight function is $(fw(x, z) = (xz^T)^{\alpha-1})$
    and similar to the Legendre kernel, the corresponding fractional forms are introduced
    as


    $K_{FLegendre}(X, Z) = \prod_{j=1}^{m} \sum_{i=0}^{n} FP_i^{\alpha}(x''_{x_j})
    FP_i^{\alpha}(x''_{z_j}) fw(x''_{x_j}, x''_{z_j})$, (4.34)


    where $m$ is the dimension of vectors $X$ and $Z$. According to the procedure
    we have in this book, after introducing a kernel, we should guarantee its validity.
    So we can continue with the following theorem.


    **Theorem 4.2** *The fractional Legendre kernel is a valid Mercer kernel.*


    **Proof** According to Mercer''s theorem introduced at (Sect. 2.2.1), a valid
    kernel should satisfy the sufficient conditions of Mercer''s theorem. As we know,
    Mercer''s theorem states any SVM kernel to be a valid kernel must be non-negative,
    in a precise way:


    $\iint K(x, z)w(x, z) f(x) f(z) dxdz \geq 0$, (4.35)


    where


    $K(x, z) = \sum_{i=0}^{n} FP_i^{\alpha}(x''_{x_j}) FP_i^{\alpha}(x''_{z_j})^T
    fw(x''_{x_j}, x''_{z_j})$, (4.36)


    and $fw(x, z) = (xz^T)^{\alpha-1}$, where $f(x)$ is function as $f : \mathbb{R}^m
    \rightarrow \mathbb{R}$. Thus, we have


    $\iint K(x, z)w(x, z) f(x) f(z) dxdz$'

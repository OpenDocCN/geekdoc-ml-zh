    ## 8.4 结论


    在本章中，我们介绍了一种基于机器学习的数值算法，称为最小二乘支持向量机方法，用于求解偏微分方程。首先，通过 Crank–Nicolson 方法对时间维度进行离散化。然后，在每个时间步长上，将配点
    LS-SVM 方法应用于所得方程。通过采用对偶形式，该问题被转化为一个代数方程组，可以使用标准求解器进行求解。在 LS-SVM 公式中使用了改进的 Chebyshev
    和 Legendre 正交核函数。为了评估所提方法的有效性，将其应用于两个著名的二阶偏微分方程，即 Fokker–Planck 方程和广义 Fitzhugh–Nagumo
    方程。从不同正交核获得的结果以数值绝对误差和均方根误差的形式报告。可以得出结论，所提方法具有可接受的精度，并且对于求解线性和非线性偏微分方程是有效的。



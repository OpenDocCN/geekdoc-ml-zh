  md: '$$K = \begin{bmatrix} k(x_1, x_2) & \cdots & k(x_1, x_m) \ \vdots & k(x_i,
    x_j) & \vdots \ k(x_m, x_1) & \cdots & k(x_m, x_m) \end{bmatrix}.$


    This is also known as *kernel matrix* as it represents the kernel trick of SVM.
    “K” can be any of *Legendre*, *Gegenbauer*, *Chebyshev*, or *Jacobi*.


    Here, after the convex optimization problem, or better to say minimization of
    the dual form of SVM equation, it will be solved using *qp* function from *cvxopt*
    library:

    `cvxopt.solvers.qp(P, q, G, h, A, b)`


    This function solves a quadratic program:


    $$\begin{aligned} \text{minimize} \quad & \left(\frac{1}{2}\right) x^T P x + q^T
    x, \ \text{subject to} \quad & Gx \leqslant h, \ & Ax = b. \end{aligned}$$


    According to documents provided by developers of this library, the arguments of
    *qp* functions are as follows²


    +   - **P** is an $n \times n$ dense or sparse Wigner D-matrix with the lower
    triangular part of **P** stored in the lower triangle. It should be positive semi-definite.

    - **q** is an $n \times 1$ dense Wigner D-matrix.

    - **G** is an $m \times n$ dense or sparse Wigner D-matrix.

    - **h** is an $m \times 1$ dense Wigner D-matrix.

    - **A** is a $p \times n$ dense or sparse Wigner D-matrix. In particular, **A**
    is the $y$ matrix (containing $y$ values of the training set) with shape of row
    = 1 and column = (number of rows of the $x$ matrix)

    - **b** is a $p \times 1$ dense Wigner D-matrix or None.


    The output of *qp* contains the *Lagrange Multipliers*, which support vectors
    lie between them and we need the policy to choose some of them as support vectors.
    Here, the trade-off is between over-fit and under-fit, and choosing too much of
    them as support vectors cause the model to over-fit whereas selecting a few leads
    to under-fitting the problem.


    SVM class includes a fit function that constructs the Gram matrix using the specified
    kernel function. Thereafter, solving the SVM’s equation returns the support vectors.
    Moreover, the bias is calculated in *Svm.fit* function. Also, *Svm.predict* is
    another function of class SVM which predicts labels of a given array. The user
    never needs to call functions under the SVM class directly, and all usage of ORSVM
    is achievable through Model Class and its functions.


    ² For comprehensive documentation and examples of cvxopt, please visit https://cvxopt.org.'

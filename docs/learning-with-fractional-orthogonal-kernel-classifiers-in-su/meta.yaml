    +   - Another NVIDIA GPU architecture’s codename is Kepler. This architecture
    was introduced in April 2012 Corporation (2019), Wang et al. (2015). The VLSI
    technology feature size is 28 nm, which is better than previous architectures.
    This architecture was the first NVIDIA GPU that is designed considering energy
    efficiency. Most of the NVIDIA GPUs are based on Kepler architecture, such as
    K20 and K20x, which are Tesla computing devices with double precision. The performance
    of the Tesla K20x is 1312 GFLOPS in double-precision computations and 3935 GFLOPS
    in single-precision computations. This GPU has 6 GB GDDR5 memory with 250 GB/s
    bandwidth. The K20x family has 2688 CUDA cores that work at a frequency of 732
    MHz. This architecture was also followed by the new NVIDIA GPUs, called Maxwell
    (GTX 980) and also Geforce 800M series.


    +   - The Maxwell architecture was introduced in 2014, and the GeForce 900 series
    is a member of this architecture. This architecture was also manufactured in TSMC
    28 nm as the same process as the previous model (Kepler) NVIDIA (2014). Maxwell
    architecture has a new generation of streaming multi-processors (SM); this architecture
    decreased the power consumption of the SMs. The Maxwell line of products came
    with a 2 MB L2 cache. The GTX980 GPU has the Maxwell internal architecture, which
    delivers five TFLOPS of single-precision performance Corporation (2019). In this
    architecture, one CUDA core includes an integer and also a floating-point logic
    that can work simultaneously. Each SM has a WARP scheduler, dispatch unit, instruction
    cache, and register file. Besides the 128 cores in each SM, there are eight load/store
    units (LD/ST) and eight special function units (SFU) Wang et al. (2015). The GTX
    980 has four WARP schedulers in each SM, enabling four concurrent WARPs to be
    issued and executed. LD/ST units calculate source and destination addresses in
    parallel, letting eight threads load and store data at each address inside the
    on-chip cache or DRAM Mei et al. (2016). SFUs execute transcendental mathematical
    functions such as Cosine, Sine, and Square root. At each clock, one thread can
    execute a single instruction in SFU, so each WARP has to be executed four times
    if needed.



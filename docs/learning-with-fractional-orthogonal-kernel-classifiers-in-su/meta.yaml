    # 1.4 History of SVMs


    Vladimir Vapnik, the Russian statistician, is the main originator of the SVM technique.
    The primary work on the SVM algorithm was proposed by Vapnik (1963) as the Generalized
    Portrait algorithm for pattern recognition. However, it was not the first algorithm
    for pattern recognition, and Fisher in 1936 had proposed a method for this purpose
    Fisher (1936). Also, Frank Rosenblatt had been proposed the perceptron linear
    classifier which was an early feedforward neural network Rosenblatt (1958). One
    year after the primary work of Vapnik and Lerner, in 1964, Vapnik further developed
    the Generalized Portrait algorithm Vapnik and Chervonenkis (1964). In this year,
    a geometrical interpretation of the kernels was introduced in Aizerman et al.
    (1964) as inner products in a feature space. The kernel theory which is the main
    concept in the development of SVM and is called “kernel trick” was previously
    proposed in Aronszajn (1950). In 1965, a large margin hyperplane in the input
    space was introduced in Cover (1965) which is another key idea of the SVM algorithm.
    At the same time, a similar optimization concept was used in pattern recognition
    by Mangasarian (1965). Another important research that defines the basic idea
    of the soft-margin concept in SVM was introduced by Smith (1968). This idea was
    presented as the use of slack variables to overcome the problem of noisy samples
    that are not linearly separable. In the history of SVM development, the breakthrough
    work is the formulation of statistical learning framework or VC theory proposed
    by Vapnik and Chervonenkis (1974) which presents one of the most robust prediction
    methods. It is not surprising to say that the rising of SVM was in this decade
    and this reference has been translated from Russian into other languages such
    as German Vapnik and Chervonenkis (1979) and English Vapnik (1982). The use of
    polynomial kernel in SVM was proposed by Poggio (1975) and the improvement of
    kernel techniques for regression was presented by Wahba (1990). Studying the connection
    between neural networks and kernel regression was done by Poggio and Girosi (1990).
    The improvement of the previous work on slack variables in Smith (1968) was done
    by Bennett and Mangasarian (1992). Another main milestone in the development of
    SVM is in 1992 in which SVM has been presented in its today’s form by Boser et
    al. (1992). In this work, the optimal margin classifier of linear classifiers
    (from Vapnik (1963)) was extended to nonlinear cases by utilizing the kernel trick
    to maximum-margin hyperplanes Aizerman et al. (1964). In 1995, soft margin of
    SVM classifiers to handle noisy and not linearly separable data was introduced
    using slack variables by Cortes and Vapnik (1995). In 1996, the algorithm was
    extended to the case of regression Drucker et al. (1996) which is called Support
    Vector Regression (SVR). The rapid growth of SVM and using this technique in various
    applications has been increased after 1995. Also, the theoretical aspects of SVM
    have been'

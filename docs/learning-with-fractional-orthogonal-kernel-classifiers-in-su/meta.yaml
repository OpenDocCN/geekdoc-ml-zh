    frac{x-a}{b-a}\\right)^{4\\alpha} + 1120\\left(\\frac{x-a}{b-a}\\right)^{3\\alpha}\
    \ - 400\\left(\\frac{x-a}{b-a}\\right)^{2\\alpha} + 50\\left(\\frac{x-a}{b-a}\\\
    right)^{\\alpha} - 1$\n\n由于切比雪夫多项式在 $[-1, 1]$ 上关于权函数 $\\frac{1}{\\sqrt{1-x^2}}$\
    \ 正交，使用 $x' = 2(\\frac{x-a}{b-a})^{\\alpha} - 1$ 可以得出，分数阶切比雪夫多项式在有限区间上关于以下权函数也是正交的：\n\
    \n$w(x) = \\frac{1}{\\sqrt{1 - (2(\\frac{x-a}{b-a})^{\\alpha} - 1)^{\\alpha}}}$\n\
    \n因此，我们可以定义分数阶切比雪夫多项式的正交关系为\n\n$\\int_{-1}^{1} T_n(x')T_m(x')w(x')dx' = \\int_{a}^{b}\
    \ FT_n^{\\alpha}(x)FT_m^{\\alpha}(x)w(x)dx = \\frac{\\pi}{2}c_n\\delta_{mn}$\n\
    \n其中 $c_0 = 2$，对于 $n \\geqslant 1$ 有 $c_n = 1$，且 $\\delta_{mn}$ 是 *Kronecker delta\
    \ 函数*。\n\n分数阶切比雪夫函数 $FT_n^{\\alpha}(x)$ 在有限区间 $(0, \\eta)$ 内恰好有 $n$ 个不同的零点，它们是\n\
    \n**图 3.3** 最高至六阶的第一类分数阶切比雪夫函数，其中 $a = 0$，$b = 5$，且 $\\alpha = 0.5$\n\n**图 3.4**\
    \ 不同 $\\alpha$ 值下的五阶第一类分数阶切比雪夫函数\n\n$$x_k = \\left( \\frac{1 - \\cos(\\frac{(2k-1)\\\
    pi}{2n})}{2} \\right)^{\\frac{1}{\\alpha}}, \\quad \\text{对于} \\quad k = 1, 2,\
    \ \\ldots, n. \\tag{3.29}$$\n\n此外，分数阶切比雪夫函数的导数在有限区间 $(0, \\eta)$ 内恰好有 $n - 1$\
    \ 个不同的零点，这些是*极值点*：\n\n$$x'_k = \\left( \\frac{1 - \\cos(\\frac{k\\pi}{n})}{2}\
    \ \\right)^{\\frac{1}{\\alpha}}, \\quad \\text{对于} \\quad k = 1, 2, \\ldots, n\
    \ - 1. \\tag{3.30}$$\n\n图 3.3 展示了最高至六阶的第一类分数阶切比雪夫函数，其中 $a = 0$，$b = 5$，且 $\\alpha$\
    \ 为 0.5。\n\n同时，图 3.4 描绘了在 $\\eta$ 固定为 5 时，不同 $\\alpha$ 值下的五阶第一类分数阶切比雪夫函数。"

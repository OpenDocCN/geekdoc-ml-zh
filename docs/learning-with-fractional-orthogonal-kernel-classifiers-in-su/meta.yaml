    # Chapter 2

    Basics of SVM Method and Least Squares SVM


    Kurosh Parand, Fatemeh Baharifard, Alireza Afzal Aghaei, and Mostafa Jani


    **Abstract** The learning process of support vector machine algorithms leads to
    solving a convex quadratic programming problem. Since this optimization problem
    has a unique solution and also satisfies the Karush–Kuhn–Tucker conditions, it
    can be solved very efficiently. In this chapter, the formulation of optimization
    problems which have arisen in the various forms of support vector machine algorithms
    is discussed.


    **Keywords** Support vector machine · Classification · Regression · Kernel trick


    # 2.1 Linear SVM Classifiers


    As mentioned in the previous chapter, the linear support vector machine method
    for categorizing separable data was introduced by Vapnik and Chervonenkis (1964).
    This method finds the best discriminator hyperplane, which separates samples of
    two classes among a training dataset. Consider $\mathcal{D} = \{(\mathbf{x}_i,
    y_i) \mid i = 1 \dots N, \mathbf{x}_i \in \mathbb{R}^d \text{ and } y_i \in \{-1,
    +1\}\}$ as a set of training data, where the samples in classes $C_1$ and $C_2$
    have $+1$ and $-1$ labels, respectively.


    In this section, the SVM method is explained for two cases. The first case occurs
    when the training samples are linearly separable and the goal is to find a linear
    separator by the hard margin SVM method. The second is about the training samples


    K. Parand (✉)

    Department of Computer and Data Sciences, Faculty of Mathematical Sciences, Shahid
    Beheshti University, Tehran, Iran

    e-mail: k.parand1394@gmail.com


    Department of Statistics and Actuarial Science, University of Waterloo, Waterloo,
    ON, Canada


    F. Baharifard

    School of Computer Science, Institute for Research in Fundamental Sciences (IPM),
    Tehran, Iran


    A. A. Aghaei · M. Jani

    Department of Computer and Data Science, Faculty of Mathematical Sciences, Shahid
    Beheshti University, Tehran, Iran


    © The Author(s), under exclusive license to Springer Nature Singapore Pte Ltd.
    2023

    J. A. Rad et al. (eds.), *Learning with Fractional Orthogonal Kernel Classifiers
    in Support Vector Machines*, Industrial and Applied Mathematics,

    https://doi.org/10.1007/978-981-19-6553-1_2'
  - '[PAGE 32]


    which are not linearly separable (e.g., due to noise) and so have to use the soft
    margin SVM method.


    # 2.1.1 Hard Margin SVM


    Assume that the input data is linearly separable. Figure 2.1 shows an example
    of this data as well as indicates that the separator hyperplane is not unique.
    The aim of the SVM method is to find a unique hyperplane that has a maximum distance
    to the closest points of both classes. The equation of this hyperplane can be
    considered as follows:


    $$\langle \mathbf{w}, \mathbf{x}\rangle + w_0 = \mathbf{w}^T \mathbf{x} + w_0
    = \sum_{i=1}^d w_i x_i + w_0 = 0, \quad (2.1)$$


    where $w_i$''s are unknown weights of the problem.

    The margin of a separator is the distance between the hyperplane and the closest
    training samples. The larger margin provides better generalization to unseen data.
    The hyperplane with the largest margin has equal distances to the closest samples
    of both classes. Consider the distance from the separating hyperplane to the nearest
    sample of each of classes $C_1$ and $C_2$ is equal to $\frac{D}{\|\mathbf{w}\|}$,
    where $\|\mathbf{w}\|$ is the Euclidean norm of $\mathbf{w}$. So, the margin will
    be equal to $\frac{2D}{\|\mathbf{w}\|}$. The purpose of the hard margin SVM method
    is to maximize this margin so that all training data is categorized correctly.
    Therefore, the following conditions must be satisfied:


    $$\begin{cases} \forall \mathbf{x}_i \in C_1 \quad (y_i = +1) \rightarrow (\mathbf{w}^T
    \mathbf{x}_i + w_0) \geq D, \ \forall \mathbf{x}_i \in C_2 \quad (y_i = -1) \rightarrow
    (\mathbf{w}^T \mathbf{x}_i + w_0) \leq -D. \end{cases} \quad (2.2)$$


    ![](img/a1d5f013073c7da63184a763d887fe2f_32_0.png)'
  - '[PAGE 33]


    ![](img/a1d5f013073c7da63184a763d887fe2f_33_0.png)


    So, the following optimization problem is obtained to find the separator hyperplane,
    which is depicted in Fig. 2.2 for two-dimensional space


    ```

    $$\max_{D,\mathbf{w},w_0} \frac{2D}{\|\mathbf{w}\|}$$

    $$\text{s.t. } (\mathbf{w}^T\mathbf{x}_i + w_0) \geq D, \quad \forall \mathbf{x}_i
    \in C_1,$$

    $$\quad\quad (\mathbf{w}^T\mathbf{x}_i + w_0) \leq -D, \quad \forall \mathbf{x}_i
    \in C_2.$$

    (2.3)

    ```


    One can set $\mathbf{w}'' = \frac{\mathbf{w}}{D}$ and $w_0'' = \frac{w_0}{D}$
    and combine the above two inequalities as an inequality $y_i(\mathbf{w}^T\mathbf{x}_i
    + w_0) \geq 1$ to have


    ```

    $$\max_{\mathbf{w}'',w_0''} \frac{2}{\|\mathbf{w}''\|}$$

    $$\text{s.t. } y_i(\mathbf{w}''^T\mathbf{x}_i + w_0'') \geq 1, \quad i = 1, \ldots,
    N.$$

    (2.4)

    ```


    Moreover, in order to maximize the margin, it can equivalently minimize $\|\mathbf{w}''\|$.
    This gives us the following primal problem for normalized vectors $\mathbf{w}$
    and $w_0$ (here $\|\mathbf{w}\|$ is substituted with $\|\mathbf{w}\|^2 = \mathbf{w}^T\mathbf{w}$
    for simplicity)


    ```

    $$\min_{\mathbf{w},w_0} \frac{1}{2} \mathbf{w}^T\mathbf{w}$$

    $$\text{s.t. } y_i(\mathbf{w}^T\mathbf{x}_i + w_0) \geq 1, \quad i = 1, \ldots,
    N.$$

    (2.5)

    ```


    The Quadratic Programming (QP) problem as a special case of nonlinear programming
    is a problem of minimizing or maximizing a quadratic objective function of several
    variables, subject to some linear constraints defined on these variables. The'
- md: 'advantage of QP problems is that there are some efficient computational methods
    to solve them Frank and Wolfe (1956), Murty and Yu (1988). The general format
    of this problem is shown below. Here, $Q$ is a real symmetric matrix.


    $$\min_{x} \frac{1}{2} \mathbf{x}^T Q \mathbf{x} + \mathbf{c}^T \mathbf{x} \quad
    (2.6)$$

    $$\text{s.t. } A\mathbf{x} \leq \mathbf{b},$$

    $$E\mathbf{x} = \mathbf{d}.$$


    According to the above definition, the problem Eq. 2.5 can be considered as a
    convex QP problem ($Q$ be an identity matrix, vector $\mathbf{c}$ equals to zero
    and constraints are reformulated to become $A\mathbf{x} \leq \mathbf{b}$ form).
    If the problem has a feasible solution, it is a global minimum and can be obtained
    by an efficient method.


    On the other hand, instead of solving the primal form of the problem, the dual
    form of it can be solved. The dual problem is often easier and helps us to have
    better intuition about the optimal hyperplane. More importantly, it enables us
    to take advantage of the kernel trick which will be explained later.


    A common method for solving constrained optimization problems is using the technique
    of Lagrangian multipliers. In the Lagrangian multipliers method, a new function,
    namely, the Lagrangian function is formed from the objective function and constraints,
    and the goal is to obtain the stationary point of this function. Consider the
    minimization problem as follows:


    $$p^* = \min_{x} f(x) \quad (2.7)$$

    $$\text{s.t. } g_i(x) \leq 0, \quad i = 1, \dots, m,$$

    $$h_i(x) = 0, \quad i = 1, \dots, p.$$


    The Lagrangian function of this problem is


    $$\mathcal{L}(x, \alpha, \lambda) = f(x) + \sum_{i=1}^{m} \alpha_i g_i(x) + \sum_{i=1}^{p}
    \lambda_i h_i(x), \quad (2.8)$$


    where $\alpha = [\alpha_1, \dots, \alpha_m]$ and $\lambda = [\lambda_1, \dots,
    \lambda_p]$ are Lagrangian multiplier vectors. According to the following equation,
    by setting $\alpha_i \geq 0$, the maximum of $\mathcal{L}(x, \alpha, \lambda)$
    is equivalent to $f(x)$


    $$\max_{\alpha_i \geq 0, \lambda_i} \mathcal{L}(x, \alpha, \lambda) = \begin{cases}
    \infty & \forall g_i(x) > 0, \\ \infty & \forall h_i(x) \neq 0, \\ f(x) & \text{otherwise}.
    \end{cases} \quad (2.9)$$


    Therefore, the problem Eq. 2.7 can be written as


    $$p^* = \min_{x} \max_{\alpha_i \geq 0, \lambda_i} \mathcal{L}(x, \alpha, \lambda).
    \quad (2.10)$$


    The dual form of Eq. 2.10 will be obtained by swapping the order of max and min


    $$d^* = \max_{\alpha_i \ge 0, \lambda_i} \min_x \mathcal{L}(x, \alpha, \lambda).
    \tag{2.11}$$


    The weak duality is always held and so $d^* \le p^*$. In addition, because the
    primal problem is convex, the strong duality is also established and $d^* = p^*$.
    So, the primal optimal objective and the dual optimal objective are equal and
    instead of solving the primal problem, the dual problem can be solved.


    Here, the dual formulation of the problem Eq. 2.5 is discussed. Combining the
    objective function and the constraints gives us


    $$\mathcal{L}(\mathbf{w}, w_0, \alpha) = \frac{1}{2} \|\mathbf{w}\|^2 + \sum_{i=1}^N
    \alpha_i (1 - y_i (\mathbf{w}^T \mathbf{x}_i + w_0)), \tag{2.12}$$


    which leads to the following optimization problem:


    $$\min_{\mathbf{w}, w_0} \max_{\alpha_i \ge 0} \left\{ \frac{1}{2} \|\mathbf{w}\|^2
    + \sum_{i=1}^N \alpha_i (1 - y_i (\mathbf{w}^T \mathbf{x}_i + w_0)) \right\}.
    \tag{2.13}$$


    Corresponding to the strong duality, the following dual optimization problem can
    be examined to find the optimal solution of the above problem


    $$\max_{\alpha_i \ge 0} \min_{\mathbf{w}, w_0} \left\{ \frac{1}{2} \|\mathbf{w}\|^2
    + \sum_{i=1}^N \alpha_i (1 - y_i (\mathbf{w}^T \mathbf{x}_i + w_0)) \right\}.
    \tag{2.14}$$


    The solution is characterized by the saddle point of the problem. To find


    $$\min_{\mathbf{w}, w_0} \mathcal{L}(\mathbf{w}, w_0, \alpha),$$


    taking the first-order partial derivative of $\mathcal{L}$ with respect to $\mathbf{w}$
    and $w_0$ obtain


    $$\begin{cases} \nabla_{\mathbf{w}} \mathcal{L}(\mathbf{w}, w_0, \alpha) = 0,
    & \rightarrow \mathbf{w} = \sum_{i=1}^N \alpha_i y_i \mathbf{x}_i, \\ \frac{\partial
    \mathcal{L}(\mathbf{w}, w_0, \alpha)}{\partial w_0} = 0, & \rightarrow \sum_{i=1}^N
    \alpha_i y_i = 0. \end{cases} \tag{2.15}$$


    In these equations, $w_0$ has been removed and a global constraint has been set
    for $\alpha$. By substituting $\mathbf{w}$ from the above equation in the Lagrangian
    function of Eq. 2.12, we have


    $$\mathcal{L}(\alpha) = \sum_{i=1}^N \alpha_i - \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N
    \alpha_i \alpha_j y_i y_j \mathbf{x}_i^T \mathbf{x}_j. \tag{2.16}$$


    So, the dual form of problem Eq. 2.5 is as follows:


    $$\max_{\alpha} \left\{ \sum_{i=1}^{N} \alpha_i - \frac{1}{2} \sum_{i=1}^{N} \sum_{j=1}^{N}
    \alpha_i \alpha_j y_i y_j \mathbf{x}_i^T \mathbf{x}_j \right\} \quad (2.17)$$


    s.t. $\sum_{i=1}^{N} \alpha_i y_i = 0$,


    $\alpha_i \geq 0, \quad i = 1, \dots, N$.


    The equivalent of the problem Eq. 2.17 can be considered as follows, which is
    a quadratic programming due to Eq. 2.6


    $$\min_{\alpha} \frac{1}{2} \alpha^T \begin{bmatrix} y_1 y_1 \mathbf{x}_1^T \mathbf{x}_1
    & \dots & y_1 y_N \mathbf{x}_1^T \mathbf{x}_N \\ \vdots & \ddots & \vdots \\ y_N
    y_1 \mathbf{x}_N^T \mathbf{x}_1 & \dots & y_N y_N \mathbf{x}_N^T \mathbf{x}_N
    \end{bmatrix} \alpha + (-\mathbf{1})^T \alpha \quad (2.18)$$


    s.t. $-\alpha \leq \mathbf{0}$,


    $\mathbf{y}^T \alpha = \mathbf{0}$.


    After finding $\alpha$ by QP process, vector of $\mathbf{w}$ can be calculated
    from equality $\mathbf{w} = \sum_{i=1}^{N} \alpha_i y_i \mathbf{x}_i$ and the
    only unknown variable that remains is $w_0$. For computing $w_0$, support vectors
    must be introduced first. To express the concept of support vectors, we need to
    explain the Karush–Kuhn–Tucker (KKT) conditions Karush (1939), Kuhn and Tucker
    (1951) beforehand.


    The necessary conditions for the optimal solution of nonlinear programming are
    called the Karush–Kuhn–Tucker (KKT) conditions. In fact, if there exists some
    saddle point $(\mathbf{w}^*, w_0^*, \alpha^*)$ of $\mathcal{L}(\mathbf{w}, w_0,
    \alpha)$, then it satisfies the following KKT conditions:


    $$\begin{cases} 1. & y_i(\mathbf{w}^{*T} \mathbf{x}_i + w_0^*) \geq 1, \quad i
    = 1, \dots, N, \\ 2. & \nabla_{\mathbf{w}} \mathcal{L}(\mathbf{w}, w_0, \alpha)|_{\mathbf{w}^*,
    w_0^*, \alpha^*} = 0, \\ & \frac{\partial \mathcal{L}(\mathbf{w}, w_0, \alpha)}{\partial
    w_0}|_{\mathbf{w}^*, w_0^*, \alpha^*} = 0, \\ 3. & \alpha_i^* (1 - y_i(\mathbf{w}^{*T}
    \mathbf{x}_i + w_0^*)) = 0, \quad i = 1, \dots, N, \\ 4. & \alpha_i^* \geq 0,
    \quad i = 1, \dots, N. \end{cases} \quad (2.19)$$


    The first condition indicates the feasibility of the solution and states that
    the conditions at the optimal point should not be violated. The second condition
    ensures that there is no direction that can both improve the objective function
    and be feasible. The third condition is related to the complementary slackness,
    which together with the fourth condition indicates that the Lagrangian multipliers
    of the inequality constraints are zero and the Lagrangian multipliers of the equality
    constraints are positive. In other words, for active constraint $y_i(\mathbf{w}^T
    \mathbf{x}_i + w_0) = 1$, $\alpha_i$ can be greater than zero and the corresponding
    $\mathbf{x}_i$ is defined as a support vector. But for inactive constraints $y_i(\mathbf{w}^T
    \mathbf{x}_i + w_0) > 1$, $\alpha_i = 0$ and $\mathbf{x}_i$ is not a support vector
    (see Fig. 2.3).


    ![](img/a1d5f013073c7da63184a763d887fe2f_37_0.png)


    Fig. 2.3 The support vectors in the hard margin SVM method


    If we define a set of support vectors as $SV = \{\mathbf{x}_j | \alpha_j > 0\}$
    and consequently define $S = \{i | \mathbf{x}_i \in SV\}$, the direction of the
    hyperplane which is related to $\mathbf{w}$ can be found as follows:


    $$\mathbf{w} = \sum_{s \in S} \alpha_s y_s \mathbf{x}_s. \tag{2.20}$$


    Moreover, any sample whose Lagrangian multiplier is greater than zero is on the
    margin and can be used to compute $w_0$. Using the sample $\mathbf{x}_{s_j}$ that
    $s_j \in S$ for which the equality $y_{s_j} (\mathbf{w}^T \mathbf{x}_{s_j} + w_0)
    = 1$ is established, we have


    $$w_0 = y_{s_j} - \mathbf{w}^T \mathbf{x}_{s_j}. \tag{2.21}$$


    By assuming that the linear classifier is $y = \text{sign}(w_0 + \mathbf{w}^T
    \mathbf{x})$, new samples can be classified using only support vectors of the
    problem. Consider a new sample $\mathbf{x}$, thus the label of this sample ($\hat{y}$)
    can be computed as follows:


    $$\begin{aligned} \hat{y} &= \text{sign}(w_0 + \mathbf{w}^T \mathbf{x}) \tag{2.22}
    \\ &= \text{sign}\left(y_{s_j} - \left(\sum_{s \in S} \alpha_s y_s \mathbf{x}_s\right)^T
    \mathbf{x}_{s_j} + \left(\sum_{s \in S} \alpha_s y_s \mathbf{x}_s\right)^T \mathbf{x}\right)
    \\ &= \text{sign}\left(y_{s_j} - \sum_{s \in S} \alpha_s y_s \mathbf{x}_s^T \mathbf{x}_{s_j}
    + \sum_{s \in S} \alpha_s y_s \mathbf{x}_s^T \mathbf{x}\right). \end{aligned}$$'
  mdcn: '二次规划问题的优势在于存在一些高效的计算方法来求解它们，例如 Frank 和 Wolfe (1956)、Murty 和 Yu (1988) 提出的方法。该问题的一般形式如下所示。其中，$Q$
    是一个实对称矩阵。


    $$\min_{x} \frac{1}{2} \mathbf{x}^T Q \mathbf{x} + \mathbf{c}^T \mathbf{x} \quad
    (2.6)$$

    $$\text{s.t. } A\mathbf{x} \leq \mathbf{b},$$

    $$E\mathbf{x} = \mathbf{d}.$$


    根据上述定义，式 2.5 的问题可以被视为一个凸二次规划问题（$Q$ 为单位矩阵，向量 $\mathbf{c}$ 为零，且约束条件被重新表述为 $A\mathbf{x}
    \leq \mathbf{b}$ 的形式）。如果该问题存在可行解，那么它就是一个全局最小值，并且可以通过高效的方法获得。


    另一方面，我们不求解问题的原始形式，而是可以求解其对偶形式。对偶问题通常更容易处理，并且有助于我们更好地理解最优超平面。更重要的是，它使我们能够利用核技巧，这一点将在后面解释。


    求解约束优化问题的一个常用方法是使用拉格朗日乘子法。在拉格朗日乘子法中，由目标函数和约束条件构成一个新的函数，即拉格朗日函数，其目标是获得该函数的驻点。考虑如下最小化问题：


    $$p^* = \min_{x} f(x) \quad (2.7)$$

    $$\text{s.t. } g_i(x) \leq 0, \quad i = 1, \dots, m,$$

    $$h_i(x) = 0, \quad i = 1, \dots, p.$$


    该问题的拉格朗日函数为


    $$\mathcal{L}(x, \alpha, \lambda) = f(x) + \sum_{i=1}^{m} \alpha_i g_i(x) + \sum_{i=1}^{p}
    \lambda_i h_i(x), \quad (2.8)$$


    其中 $\alpha = [\alpha_1, \dots, \alpha_m]$ 和 $\lambda = [\lambda_1, \dots, \lambda_p]$
    是拉格朗日乘子向量。根据以下方程，通过设定 $\alpha_i \geq 0$，$\mathcal{L}(x, \alpha, \lambda)$ 的最大值等价于
    $f(x)$


    $$\max_{\alpha_i \geq 0, \lambda_i} \mathcal{L}(x, \alpha, \lambda) = \begin{cases}
    \infty & \forall g_i(x) > 0, \\ \infty & \forall h_i(x) \neq 0, \\ f(x) & \text{otherwise}.
    \end{cases} \quad (2.9)$$


    因此，式 2.7 的问题可以写为


    $$p^* = \min_{x} \max_{\alpha_i \geq 0, \lambda_i} \mathcal{L}(x, \alpha, \lambda).
    \quad (2.10)$$


    式 2.10 的对偶形式将通过交换最大和最小的顺序得到


    $$d^* = \max_{\alpha_i \ge 0, \lambda_i} \min_x \mathcal{L}(x, \alpha, \lambda).
    \tag{2.11}$$


    弱对偶性总是成立的，因此 $d^* \le p^*$。此外，由于原始问题是凸的，强对偶性也成立，即 $d^* = p^*$。所以，原始最优目标值和对偶最优目标值是相等的，我们可以求解对偶问题来代替求解原始问题。


    这里讨论式 2.5 问题的对偶形式。结合目标函数和约束条件，我们得到


    $$\mathcal{L}(\mathbf{w}, w_0, \alpha) = \frac{1}{2} \|\mathbf{w}\|^2 + \sum_{i=1}^N
    \alpha_i (1 - y_i (\mathbf{w}^T \mathbf{x}_i + w_0)), \tag{2.12}$$


    这引出了以下优化问题：


    $$\min_{\mathbf{w}, w_0} \max_{\alpha_i \ge 0} \left\{ \frac{1}{2} \|\mathbf{w}\|^2
    + \sum_{i=1}^N \alpha_i (1 - y_i (\mathbf{w}^T \mathbf{x}_i + w_0)) \right\}.
    \tag{2.13}$$


    对应于强对偶性，可以考察以下对偶优化问题来寻找上述问题的最优解


    $$\max_{\alpha_i \ge 0} \min_{\mathbf{w}, w_0} \left\{ \frac{1}{2} \|\mathbf{w}\|^2
    + \sum_{i=1}^N \alpha_i (1 - y_i (\mathbf{w}^T \mathbf{x}_i + w_0)) \right\}.
    \tag{2.14}$$


    该解的特征是问题的鞍点。为了找到


    $$\min_{\mathbf{w}, w_0} \mathcal{L}(\mathbf{w}, w_0, \alpha),$$


    对 $\mathcal{L}$ 关于 $\mathbf{w}$ 和 $w_0$ 求一阶偏导数，得到


    $$\begin{cases} \nabla_{\mathbf{w}} \mathcal{L}(\mathbf{w}, w_0, \alpha) = 0,
    & \rightarrow \mathbf{w} = \sum_{i=1}^N \alpha_i y_i \mathbf{x}_i, \\ \frac{\partial
    \mathcal{L}(\mathbf{w}, w_0, \alpha)}{\partial w_0} = 0, & \rightarrow \sum_{i=1}^N
    \alpha_i y_i = 0. \end{cases} \tag{2.15}$$


    在这些方程中，$w_0$ 已被消去，并且为 $\alpha$ 设置了一个全局约束。将上述方程中的 $\mathbf{w}$ 代入式 2.12 的拉格朗日函数，我们得到


    $$\mathcal{L}(\alpha) = \sum_{i=1}^N \alpha_i - \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N
    \alpha_i \alpha_j y_i y_j \mathbf{x}_i^T \mathbf{x}_j. \tag{2.16}$$


    因此，式 2.5 问题的对偶形式如下：


    $$\max_{\alpha} \left\{ \sum_{i=1}^{N} \alpha_i - \frac{1}{2} \sum_{i=1}^{N} \sum_{j=1}^{N}
    \alpha_i \alpha_j y_i y_j \mathbf{x}_i^T \mathbf{x}_j \right\} \quad (2.17)$$


    s.t. $\sum_{i=1}^{N} \alpha_i y_i = 0$,


    $\alpha_i \geq 0, \quad i = 1, \dots, N$.


    式 2.17 的等价形式可以考虑如下，根据式 2.6，这是一个二次规划问题


    $$\min_{\alpha} \frac{1}{2} \alpha^T \begin{bmatrix} y_1 y_1 \mathbf{x}_1^T \mathbf{x}_1
    & \dots & y_1 y_N \mathbf{x}_1^T \mathbf{x}_N \\ \vdots & \ddots & \vdots \\ y_N
    y_1 \mathbf{x}_N^T \mathbf{x}_1 & \dots & y_N y_N \mathbf{x}_N^T \mathbf{x}_N
    \end{bmatrix} \alpha + (-\mathbf{1})^T \alpha \quad (2.18)$$


    s.t. $-\alpha \leq \mathbf{0}$,


    $\mathbf{y}^T \alpha = \mathbf{0}$.


    通过二次规划过程求得 $\alpha$ 后，向量 $\mathbf{w}$ 可以通过等式 $\mathbf{w} = \sum_{i=1}^{N} \alpha_i
    y_i \mathbf{x}_i$ 计算得出，剩下的唯一未知变量是 $w_0$。为了计算 $w_0$，必须首先引入支持向量的概念。为了阐述支持向量的概念，我们需要先解释
    Karush–Kuhn–Tucker (KKT) 条件 Karush (1939), Kuhn and Tucker (1951)。


    非线性规划最优解的必要条件被称为 Karush–Kuhn–Tucker (KKT) 条件。事实上，如果存在 $\mathcal{L}(\mathbf{w},
    w_0, \alpha)$ 的某个鞍点 $(\mathbf{w}^*, w_0^*, \alpha^*)$，那么它满足以下 KKT 条件：


    $$\begin{cases} 1. & y_i(\mathbf{w}^{*T} \mathbf{x}_i + w_0^*) \geq 1, \quad i
    = 1, \dots, N, \\ 2. & \nabla_{\mathbf{w}} \mathcal{L}(\mathbf{w}, w_0, \alpha)|_{\mathbf{w}^*,
    w_0^*, \alpha^*} = 0, \\ & \frac{\partial \mathcal{L}(\mathbf{w}, w_0, \alpha)}{\partial
    w_0}|_{\mathbf{w}^*, w_0^*, \alpha^*} = 0, \\ 3. & \alpha_i^* (1 - y_i(\mathbf{w}^{*T}
    \mathbf{x}_i + w_0^*)) = 0, \quad i = 1, \dots, N, \\ 4. & \alpha_i^* \geq 0,
    \quad i = 1, \dots, N. \end{cases} \quad (2.19)$$


    第一个条件表示解的可行性，并指出在最优点处不应违反约束条件。第二个条件确保不存在既能改善目标函数又可行的方向。第三个条件与互补松弛性有关，它与第四个条件一起表明，不等式约束的拉格朗日乘子为零，而等式约束的拉格朗日乘子为正。换句话说，对于起作用的约束
    $y_i(\mathbf{w}^T \mathbf{x}_i + w_0) = 1$，$\alpha_i$ 可以大于零，相应的 $\mathbf{x}_i$
    被定义为支持向量。但对于不起作用的约束 $y_i(\mathbf{w}^T \mathbf{x}_i + w_0) > 1$，$\alpha_i = 0$，且
    $\mathbf{x}_i$ 不是支持向量（见图 2.3）。


    ![](img/a1d5f013073c7da63184a763d887fe2f_37_0.png)


    图 2.3 硬间隔 SVM 方法中的支持向量


    如果我们定义一组支持向量为 $SV = \{\mathbf{x}_j | \alpha_j > 0\}$，并相应地定义 $S = \{i | \mathbf{x}_i
    \in SV\}$，那么与 $\mathbf{w}$ 相关的超平面方向可以如下求得：


    $$\mathbf{w} = \sum_{s \in S} \alpha_s y_s \mathbf{x}_s. \tag{2.20}$$


    此外，任何拉格朗日乘子大于零的样本都位于间隔上，可用于计算 $w_0$。使用满足等式 $y_{s_j} (\mathbf{w}^T \mathbf{x}_{s_j}
    + w_0) = 1$ 的样本 $\mathbf{x}_{s_j}$（其中 $s_j \in S$），我们有


    $$w_0 = y_{s_j} - \mathbf{w}^T \mathbf{x}_{s_j}. \tag{2.21}$$


    假设线性分类器为 $y = \text{sign}(w_0 + \mathbf{w}^T \mathbf{x})$，那么新样本可以仅使用问题的支持向量进行分类。考虑一个新样本
    $\mathbf{x}$，那么该样本的标签（$\hat{y}$）可以如下计算：


    $$\begin{aligned} \hat{y} &= \text{sign}(w_0 + \mathbf{w}^T \mathbf{x}) \tag{2.22}
    \\ &= \text{sign}\left(y_{s_j} - \left(\sum_{s \in S} \alpha_s y_s \mathbf{x}_s\right)^T
    \mathbf{x}_{s_j} + \left(\sum_{s \in S} \alpha_s y_s \mathbf{x}_s\right)^T \mathbf{x}\right)
    \\ &= \text{sign}\left(y_{s_j} - \sum_{s \in S} \alpha_s y_s \mathbf{x}_s^T \mathbf{x}_{s_j}
    + \sum_{s \in S} \alpha_s y_s \mathbf{x}_s^T \mathbf{x}\right). \end{aligned}$$'

    $K_1(x_i, x_j) = \exp(-\sigma \| x_i - x_j \|_2^2),$

    $K_2(x_i, x_j) = \sum_{l=0}^d GG_l^\alpha(x_i)^T GG_l^\alpha(x_j),$

    $K_{GG}(x_i, x_j) = K_1(x_i, x_j)K_2(x_i, x_j).$



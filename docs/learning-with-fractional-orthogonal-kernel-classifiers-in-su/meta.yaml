  md: 'Wilson polynomials using Jacobi polynomials. Also, Khodabandehlo et al. (2021)
    used shifted Jacobi operational matrix to present generalized nonlinear delay
    differential equations of fractional variable order. For more applications of
    different types of Jacobi polynomials, the interested readers can see Doha et
    al. (2012), Bhrawy (2016), Bhrawy et al. (2015, 2016).


    If one can choose a general family among classical orthogonal polynomials, without
    no doubt it is the *Jacobi polynomials* $J_n^{\psi, \omega}$. The **Jacobi polynomials**
    are also known as **hypergeometric polynomials** named after **Carl Gustav Jacob
    Jacobi** (1804–1851). In fact, Jacobi polynomials are the most general class in
    the domain $[-1, 1]$. All of the other families are special cases of this family.
    For example, $\psi = \omega = 0$ is the *Legendre polynomials* and $\psi = \omega$
    is the *Gegenbauer family*.


    > **Carl Gustav Jacob Jacobi** (1804–1851) was a Prussian (German) genius mathematician
    who could reach the standards of entering university at the age of 12; however,
    he had to wait until the age of 16 according to the University of Berlin’s laws.
    He received his doctorate at the age of 21 from the University of Berlin. Jacobi’s
    contribution is mainly recognized by his theory of elliptic functions and its
    relations with theta functions in 1829. Moreover, he also had many discoveries
    in number theory. His results on cubic residues impressed Carl Friedrich Gauss,
    and brought significant attention to him among other mathematicians such as Friedrich
    Bessel and Adrien-Marie Legendre. Jacobi had important research on partial differential
    equations and their applications and also determinants, and as a result functional
    determinants also known as Jacobian determinants. Due to the numerous contributions
    of Jacobi, his name has appeared in many mathematical concepts such as Jacobi’s
    elliptic functions, Jacobi symbol, Jacobi polynomials, Jacobi transform, and many
    others. His political point of view, during the revolution days of Prussia, made
    his last years of life full of disturbances. He died under infection to smallpox,
    at the age of 46.$^a$


    $^a$ For more information about Carl Gustav Jacob Jacobi and his contribution,
    please see: https://mathshistory.st-andrews.ac.uk/Biographies/Jacobi/.


    # 6.2 Preliminaries


    This section covers the basic definitions and properties of Jacobi orthogonal
    polynomials. Moreover, the fractional form of Jacobi orthogonal polynomials is
    introduced and relevant properties are clarified.'

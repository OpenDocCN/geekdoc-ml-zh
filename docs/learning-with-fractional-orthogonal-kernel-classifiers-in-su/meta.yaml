    ## 1.1.1 Classification of Machine Learning Techniques

    Machine learning techniques are classified into three following categories, depending
    on the nature of the learning data or learning process:


    1.  **Supervised learning:** In this type of learning, there is a supervisor to
    teach machines in learning a concept. This means that the algorithm learns from
    labeled data (i.e., training data) which include example data and related target
    responses, i.e., input and output pairs. If we assume the ML algorithm as a system
    (e.g., a face identification), in the training phase of the system, we provide
    both input sample (e.g., an image from a face) and the corresponding output (e.g.,
    the ID of the person to whom face belongs) to the system. The collection of labeled
    data requires skilled human agents (e.g., a translator to translate a text from
    a language to another) or a physical experiment (e.g., determining whether there
    is rock or metal near to a sonar system of a submarine) that is costly and time-consuming.
    The supervised learning methods can be divided into classification and regression.
    When the number of classes of the data is limited (i.e., the output label of the
    data is a discrete variable) the learning is called classification (e.g., classifying
    an email to spam and not-spam classes), and when the output label is a continuous
    variable (e.g., the price of a stock index) the topic is called regression. Examples
    of the most widely used supervised learning algorithms are SVM Boser et al. (1992),
    Vapnik (1995), Cortes and Vapnik (1995), artificial neural networks (e.g., multi-layer
    perceptron Rumelhart et al. (1986), LSTM Hochreiter and Schmidhuber (1997), Gers
    et al. (1999)), linear and logistic regression Cramer (2002), Naïve Bayes Hand
    and Yu (2001), decision trees Morgan and Sonquist (1963), and K-Nearest Neighbor
    (KNN) Sebestyen (1962), Nilsson (1965).


    2.  **Unsupervised learning:** In this case, there is not any supervision in the
    learning and the ML algorithm works on the unlabeled data. It means that the algorithm
    learns from plain examples without any associated response, leaving to the algorithm
    to determine the data patterns based on the similarities in the data. This type
    of algorithm tends to restructure the data and cluster them. From a system viewpoint,
    this kind of learning receives sample data as the input (e.g., the human faces)
    without the corresponding output and groups with similar samples in the same clusters.
    The categorization of unlabeled data is commonly called clustering. Also, association
    as another type of unsupervised learning refers to methods which can discover
    rules that describe large portions of data, such as people who buy product X also
    tend to buy the other product Y. Dimensionality reduction as another type of unsupervised
    learning denotes the methods transform data from a high-dimensional space into
    a low-dimensional space. Examples of well-known unsupervised learning methods
    Xu and Wunsch (2005) are k-means, hierarchical clustering, density-based spatial
    clustering of applications with noise (DBSCAN), neural networks (e.g., autoencoders,
    self-organizing map), Expectation-Maximization (EM), and Principal Component Analysis
    (PCA).


    3.  **Reinforcement learning:** In this category of learning, an agent can learn
    from an action-reward mechanism by interacting with an environment just like the
    learning process of a human to play chess game by exercising and training by trial
    and error. Reinforcement algorithms are presented with examples and without labels
    but receiving positive (e.g., reward) or negative (e.g., penalty) feedback from
    the environment. Two widely used reinforcement models are Markov Decision Process
    (MDP) and Q-learning Sutton and Barto (2018).


    A summary of machine learning types is summarized in Fig. 1.1. In addition to
    the mentioned three categories, there is another type called semi-supervised learning
    (that is also referred to as either transductive learning or inductive learning)
    which falls between supervised and unsupervised learning methods. It combines
    a small amount of labeled data with a large amount of unlabeled data for training.


    From another point of view, machine learning techniques are classified into the
    generative approach and discriminative approach. Generative models explicitly
    model the actual distribution of each class of data while discriminative models
    learn the (hard or soft) boundary between classes. From the statistical viewpoint,

    The rational Legendre kernel function for non-vector data $x$ and $z$ is recommended
    as follows:


    $$K(x, z) = \sum_{i=0}^{N} R P_i(x) R P_i(z). \tag{7.15}$$


    This function is a valid SVM kernel if that satisfies the conditions of the Mercer
    theorem (see, e.g., Suykens et al. (2002)).


    **Theorem 7.2** *To be a valid SVM kernel, for any finite function $g(x)$, the
    following integration should always be nonnegative for the given kernel function
    $K(x, z)$:*


    $$\int \int K(x, z)g(x)g(z)dxdz \geq 0. \tag{7.16}$$


    **Proof** *Consider $g(x)$ to be a function and $K(x, z)$ that was defined in
    Eq. 7.15, then by using the Mercer condition, one obtains*


    $$\begin{aligned} \int \int K(x, z)g(x)g(z)dxdz &= \int \int \sum_{i=0}^{N} R
    P_i(x) R P_i(z)g(x)g(z)dxdz \ &= \sum_{i=0}^{N} (\int \int R P_i(x) R P_i(z)g(x)g(z)dxdz)
    \ &= \sum_{i=0}^{N} (\int R P_i(x)g(x)dx \int R P_i(z)g(z)dz) \tag{7.17} \ &=
    \sum_{i=0}^{N} (\int R P_i(x)g(x)dx \int R P_i(x)g(x)dx) \ &= \sum_{i=0}^{N} (\int
    R P_i(x)g(x)dx)^2 \geq 0. \end{aligned}$$


    Therefore, the proposed function is a valid kernel. $\square$


    # 7.4 Collocation Form of LS-SVM for Lane-Emden Type Equations


    In this section, we implement the proposed method to solve the Lane-Emden type
    equations. As we said before, these types of equations are an important class
    of ordinary differential equations in the semi-infinite domain. The general form
    of the Lane-Emden equation is as follows:'
  - '[PAGE 164]


    $$y''''(x) + \frac{k}{x}y''(x) + f(x, y(x)) = h(x),$$

    $$y(x_0) = A, \quad y''(x_0) = B,$$


    where $A$, $B$ are constants and $f(x, y(x))$ and $h(x)$ are given functions of
    $x$ and $y$. Since the function $f(x, y(x))$ can be both linear or nonlinear,
    in this chapter, we assume that this function can be reformed to $f(x, y(x)) =
    f(x)y(x)$. In this case, there is no need for any linearization method and the
    LS-SVM method can be directly applied to Eq. 7.18. For the nonlinear cases, the
    quasi-linearization method can be applied to Eq. 7.18 first and then the solution
    is approximated by using the LS-SVM algorithm. Now we can consider the LS-SVM
    formulation of this equation, which is


    $$\text{minimize}_{\boldsymbol{w}, \boldsymbol{\varepsilon}} \quad \frac{1}{2}\boldsymbol{w}^T\boldsymbol{w}
    + \frac{\gamma}{2}\boldsymbol{\varepsilon}^T\boldsymbol{\varepsilon},$$

    $$\text{subject to} \quad \frac{d^2\tilde{y}_i}{dx^2} + \frac{k}{x_i}\left(\frac{d\tilde{y}_i}{dx}\right)
    + f(x_i)\tilde{y}(x_i) - h(x_i) = \varepsilon_i, \quad k > 0,$$


    where $\tilde{y}_i = \tilde{y}(x_i)$ is the approximate solution. We use the Lagrangian
    function and then


    $$G = \frac{1}{2}\boldsymbol{w}^T\boldsymbol{w} + \frac{\gamma}{2}\boldsymbol{\varepsilon}^T\boldsymbol{\varepsilon}
    - \sum_{i=0}^N \alpha_i \left( \frac{d^2\tilde{y}_i}{dx^2} + \frac{k}{x_i}\left(\frac{d\tilde{y}_i}{dx}\right)
    + f(x_i)\tilde{y}(x_i) - h(x_i) - \varepsilon_i \right).$$


    So, by expanding the solution in terms of the rational Legendre kernels, one obtains


    $$G = \frac{1}{2}\sum_{i=0}^N w_i^2 + \frac{\gamma}{2}\sum_{i=0}^N \varepsilon_i^2
    - \sum_{i=0}^N \alpha_i \left( \sum_{j=0}^N w_j \varphi_j''''(x_i) + \frac{k}{x_i}\sum_{j=0}^N
    w_j \varphi_j''(x_i) + f(x_i)\left(\sum_{j=0}^N w_j \varphi_j(x_i)\right) - h(x_i)
    - \varepsilon_i \right),$$


    where $\{\varphi_j\}$ are the rational Legendre kernels. Then by employing the
    Karush-Kuhn-Tucker (KKT) optimality conditions for $0 \le l \le N$, we conclude
    that


    $$\frac{\partial G}{\partial w_l} = w_l - \sum_{i=0}^N \alpha_i \left( \varphi_l''''(x_i)
    + \frac{k}{x_i}\varphi_l''(x_i) + f(x_i)\varphi_l(x_i) \right) = 0,$$

    $$\frac{\partial G}{\partial \alpha_l} = \sum_{j=0}^N w_j \varphi_j''''(x_l) +
    \frac{k}{x_l}\sum_{j=0}^N w_j \varphi_j''(x_l) + f(x_l)\left(\sum_{j=0}^N w_j
    \varphi_j(x_l)\right) - h(x_l) - \varepsilon_l = 0,$$

    $$\frac{\partial G}{\partial \varepsilon_l} = \gamma \varepsilon_l + \alpha_l
    = 0,$$'
  - '[PAGE 165]


    and, by using the above relations,


    $$w_l = \sum_{i=0}^{N} \alpha_i (\varphi_l''''(x_i) + \frac{k}{x_i} \varphi_l''(x_i)
    + f(x_i)\varphi_l(x_i))$$

    $$= \sum_{i=0}^{N} \alpha_i \psi_l(x_i),$$

    (7.23)


    where $\psi_l(x_i) = \varphi_l''''(x_i) + \frac{k}{x_i} \varphi_l''(x_i) f(x_i)\varphi_l(x_i)$.
    Now, we can show the matrix form as follows:


    $$\begin{bmatrix} w_0 \ w_1 \ \vdots \ w_n \end{bmatrix} = \begin{bmatrix} \psi_0(x_0)
    & \psi_0(x_1) & \psi_0(x_2) & \dots & \psi_0(x_N) \ \psi_1(x_0) & \psi_1(x_1)
    & \psi_1(x_2) & \dots & \psi_1(x_N) \ \vdots & \vdots & \vdots & \ddots & \vdots
    \ \psi_N(x_0) & \psi_N(x_1) & \psi_N(x_2) & \dots & \psi_N(x_N) \end{bmatrix}
    \begin{bmatrix} \alpha_0 \ \alpha_1 \ \vdots \ \alpha_N \end{bmatrix},$$


    which can be summarized as $\boldsymbol{w} = \boldsymbol{M}\boldsymbol{\alpha}$
    where $M_{li} = \{\psi_l(x_i)\}_{0 \le l, i \le N}$.

    By using the third relation in Eq. 7.22,


    $$\forall l : \epsilon_l = \frac{-\alpha_l}{\gamma},$$

    (7.24)


    and substituting $w_j$ in the second equation of Eq. 7.22 results in


    $$\sum_{j=0}^{N} (\sum_{i=0}^{N} \alpha_i \psi_j(x_i)) \psi_j(x_l) + \frac{\alpha_l}{\gamma}
    = h(x_l), \quad 0 \le l \le N,$$

    (7.25)


    and in matrix form, one gets


    $$\begin{bmatrix} \psi_0(x_0) & \psi_1(x_0) & \dots & \psi_N(x_0) \ \psi_0(x_1)
    & \psi_1(x_1) & \dots & \psi_N(x_1) \ \vdots & \vdots & \ddots & \vdots \ \psi_0(x_N)
    & \psi_1(x_N) & \dots & \psi_N(x_N) \end{bmatrix} \begin{bmatrix} \psi_0(x_0)
    & \psi_0(x_1) & \dots & \psi_0(x_N) \ \psi_1(x_0) & \psi_1(x_1) & \dots & \psi_1(x_N)
    \ \vdots & \vdots & \ddots & \vdots \ \psi_N(x_0) & \psi_N(x_1) & \dots & \psi_N(x_N)
    \end{bmatrix} \begin{bmatrix} \alpha_0 \ \alpha_1 \ \vdots \ \alpha_N \end{bmatrix}$$

    $$+ \begin{bmatrix} \frac{1}{\gamma} & 0 & \dots & 0 \ 0 & \frac{1}{\gamma} &
    \dots & 0 \ \vdots & \vdots & \ddots & \vdots \ 0 & 0 & \dots & \frac{1}{\gamma}
    \end{bmatrix} \begin{bmatrix} \alpha_0 \ \alpha_1 \ \vdots \ \alpha_N \end{bmatrix}
    = \begin{bmatrix} h_0 \ h_1 \ \vdots \ h_N \end{bmatrix}$$


    and can be written as $(\boldsymbol{M}^T\boldsymbol{M} + \frac{1}{\gamma}\boldsymbol{I})\boldsymbol{\alpha}
    = \boldsymbol{h}$ where $\boldsymbol{I} = I_{N+1 \times N+1}$, $h_i = h(x_i)$
    and $\boldsymbol{h} = [h_0, h_1, \dots, h_N]^T$.


    Now, we need to define the derivatives of the kernel function $K(x_l, x_i) = [\varphi(x_l)]^T
    \varphi(x_i)$. Making use of Mercer''s Theorem Vapnik (1998); Lázaro et al. (2005),'

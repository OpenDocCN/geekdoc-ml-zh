  - '[PAGE 242]


    $Au(t_i)$ as $A$ is a differential operator (which can be fractional) is explained.
    With the help of Eq. 10.23-(II) and substituting Eq. 10.23-(I) in Eq. 10.23-(III),
    we have


    $$S^T S\lambda + \frac{1}{2\gamma}\lambda = f, \quad (10.26)$$


    By defining $A := S^T S + \frac{1}{2\gamma} I$, the following equation is achieved


    $$A\alpha = f. \quad (10.27)$$


    **Remark 10.1** The Matrix $A$ is positive definite if and only if for all vectors
    $x \in \mathbb{R}^{n+1}$ we have $x^T Ax \geq 0$. So for every vector $x$, we
    can address


    $$x^T \left( S^T S + \frac{1}{2\gamma} I \right) x = x^T S^T Sx + \frac{1}{\gamma}
    x^T x, \quad (10.28)$$


    as $\gamma > 0$ the matrix $A$ is positive definite.


    **Theorem 10.2** *In linear system Eq. 10.23, there is a unique solution.*


    **Proof** By considering the Remark 10.1, the theorem is proved. $\square$


    Since the system Eq. 10.27 is positive definite and the sparseness of $A$ with
    solving Eq. 10.27, we can reach $\alpha$, and with the help of criteria (I) of
    Eq. 10.23, we can calculate $\omega$.


    In the nonlinear cases, the nonlinear equation can be converted to a sequence
    of linear equations using Quasi-Linearization Method (QLM). Then we are able to
    solve the obtained linear equations separately.


    In the next section, some numerical examples are provided for indicating the efficiency
    and accuracy of the presented method, and the convergence of the proposed approach
    is represented.


    # 10.4 Numerical Results and Discussion


    In this section, various numerical examples are presented to express the mentioned
    method''s accuracy and efficiency, here are three linear and three nonlinear examples,
    and the comparison of our results with other related works. Moreover, the interval
    $\Omega = [0, T]$ is considered as the intended domain. Additionally, the utilized
    norm for comparing the exact solution and the approximated one, which is denoted
    by $\|e\|_2$ is defined as follows:


    $$\|e\|_2 = \left( \int_0^T (u(t) - u_{app}(t))^2 dt \right)^{\frac{1}{2}}, \quad
    (10.29)$$'

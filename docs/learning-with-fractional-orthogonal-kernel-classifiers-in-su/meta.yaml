  md: 'Utilizing the properties of orthogonal functions in machine learning has always
    been attractive for researchers. The first Chebyshev kernel function is introduced
    in 2006 by Ye et al. (2006). Thereafter, the use of orthogonal Chebyshev kernel
    has been under investigation by many researchers (Ozer and Chen 2008; Ozer et
    al. 2011; Jafarzadeh et al. 2013; Zhao et al. 2013). In 2011, Ozer et al. proposed
    a set of generalized Chebyshev kernels which made it possible for the input to
    be a vector rather than a single variable (Ozer et al. 2011). The generalized
    Chebyshev kernel made it easy to have modified Chebyshev kernels in which weight
    function can be an exponential function, for example, Ozer et al. used the Gaussian
    kernel function specifically. In fact, this brings more nonlinearity to the kernel
    function. Hence, the combination of Chebyshev kernel with other well-known kernels
    has been investigated too, for instance, the Chebyshev-Gaussian and Chebyshev-Wavelet
    (Jafarzadeh et al. 2013) kernel functions are bases on this combination. Also,
    Jinwei Zhao et al. (2013) proposed the unified Chebyshev polynomials, a new sequence
    of orthogonal polynomials and consequently unified Chebyshev kernel through combining
    Chebyshev polynomials of the first and second kinds, which has shown to have excellent
    generalization performance and prediction accuracy.


    > The classical orthogonal polynomials proved to be highly efficient in many applied
    problems. The uniform proximity and orthogonality have attracted researchers in
    the kernel learning domain. In fact, **Vladimir Vapnik**, the approximation of
    real-valued functions using n-dimensional Hermit polynomials of classical orthogonal
    polynomials was first introduced (Statistical Learning Theory, Wiley, USA, 1998).
    Then, a new perspective opened, later in 2006, Ye and colleagues Ye et al. (2006)
    constructed an orthogonal Chebyshev kernel based on the Chebyshev polynomials
    of the first kind. Based on what is said in Ye et al. (2006), “As Chebyshev polynomial
    has the best uniform proximity and its orthogonality promises the minimum data
    redundancy in feature space, it is possible to represent the data with fewer support
    vectors.”


    One of the recent improvements in the field of special functions is the development
    of fractional orthogonal polynomials (Kazem et al. 2013). The fractional orthogonal
    functions can be obtained by some nonlinear transformation function and have much
    better performance in function approximation (Dabiri et al. 2017; Kheyrinataj
    and Nazemi 2020; Habibli and Noori Skandari 2019). However, these functions have
    not been used as a kernel. Thus, this chapter first aims to present essential
    backgrounds for Chebyshev polynomial and its fractional version, then bring all
    the Chebyshev kernel functions together, and finally introduce and examine the
    fractional Chebyshev kernel functions.


    This chapter is organized as follows. The basic definitions and properties of
    orthogonal Chebyshev polynomials and the fractional Chebyshev functions are presented
    in Sect. 3.2. Then, the ordinary Chebyshev kernel function and two previously
    proposed kernels based on these polynomials are discussed and the novel fractional
    Chebyshev kernel functions are introduced in Sect. 3.3. In Sect. 3.4, the results
    of'

  md: '# Chapter 5

    Fractional Gegenbauer Kernel Functions: Theory and Application


    Sherwin Nedaei Janbesaraei, Amirreza Azmoon, and Dumitru Baleanu


    **Abstract** Because of the usage of many functions as a kernel, the support vector
    machine method has demonstrated remarkable versatility in tackling numerous machine
    learning issues. Gegenbauer polynomials, like the Chebyshev and Legendre polynomials
    which are introduced in previous chapters, are among the most commonly utilized

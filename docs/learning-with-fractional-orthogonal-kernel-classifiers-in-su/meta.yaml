- img_proc: true
  md: '$$\mathcal{K} = Diag(\mathcal{A})\left(\chi^{(0,0)}Diag(\mathcal{A}) + \chi^{(1,0)}Diag(\mathcal{B})
    + \chi_{j,i}^{(2,0)}Diag(\mathcal{C})\right) +$$

    $$Diag(\mathcal{B})\left(\chi^{(0,1)}Diag(\mathcal{A}) + \chi^{(1,1)}Diag(\mathcal{B})
    + \chi^{(2,1)}Diag(\mathcal{C})\right) +$$

    $$Diag(\mathcal{C})\left(\chi^{(0,2)}Diag(\mathcal{A}) + \chi^{(1,2)}Diag(\mathcal{B})
    + \chi^{(2,2)}Diag(\mathcal{C})\right),$$


    $$\mathcal{P}_n = Diag(\mathcal{A})\chi_{2:n-1,n}^{(0,0)} + Diag(\mathcal{B})\chi_{2:n-1,n}^{(0,1)}
    + Diag(\mathcal{C})\chi_{2:n-1,n}^{(0,2)},$$


    $$\mathcal{M}_2 = \chi_{n,2:n-1}^{(0,0)}Diag(\mathcal{A}) + \chi_{n,2:n-1}^{(1,0)}Diag(\mathcal{B})
    + \chi_{n,2:n-1}^{(2,0)}Diag(\mathcal{C}),$$


    $$r^k = [r_i^k]_{2:n-1}^T.$


    By solving system Eq. 8.9, $\{\alpha_i\}_{i=2}^{n-1}$, $\beta_1$, $\beta_2$, and
    $b$ are calculated. Then, the solution in time step $k$, in the dual form, can
    be obtained as follows:



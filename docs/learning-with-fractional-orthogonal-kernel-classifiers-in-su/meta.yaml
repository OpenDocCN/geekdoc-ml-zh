    # 5.2.1 Properties of Gegenbauer Polynomials


    Gegenbauer polynomials of degree $n$, $G_n^\lambda(x)$ and order $\lambda > -\frac{1}{2}$
    are solutions to the following Sturm–Liouville differential equation (Doman 2015;
    Padierna et al. 2018; Asghari et al. 2022):


    $$(1 - x^2)\frac{d^2y}{dx^2} - (2\lambda + 1)x\frac{dy}{dx} + n(n + 2\lambda)y
    = 0, \quad (5.1)$$


    where $n$ is a positive integer and $\lambda$ is a real number and greater than
    $-0.5$. Gegenbauer polynomials are orthogonal on the interval $[-1, 1]$ with respect
    to the weight function (Padierna et al. 2018; Parand et al. 2018; Asghari et al.
    2022):


    $$w(x) = (1 - x^2)^{\lambda - \frac{1}{2}}. \quad (5.2)$$


    Therefore, the orthogonality relation is defined as (Ludlow and Everitt 1995;
    Parand et al. 2018; Hadian-Rasanan et al. 2019; Asghari et al. 2022)


    $$\int_{-1}^1 G_n^\lambda(x)G_m^\lambda(x)w(x)dx = \frac{\pi 2^{1-2\lambda}\Gamma(n
    + 2\lambda)}{n!(n + \lambda)(\Gamma(\lambda))^2}\delta_{nm}, \quad (5.3)$$


    where $\delta_{nm}$ is the Kronecker delta function (El-Kalaawy et al. 2018).
    The standard Gegenbauer polynomial $G_n^{(\lambda)}(x)$ can be defined also as
    follows (Parand et al. 2018; Hadian-Rasanan et al. 2019):


    $$G_n^\lambda(x) = \sum_{n=1}^{\lfloor \frac{n}{2} \rfloor} (-1)^j \frac{\Gamma(n
    + \lambda - j)}{j!(n - 2j)!\Gamma(\lambda)} (2x)^{n-2j}, \quad (5.4)$$


    where $\Gamma(.)$ is the Gamma function.


    Assuming $\lambda \neq 0$ and $\lambda \in \mathbb{R}$, the generating function
    for Gegenbauer polynomial is given as (Cohl 2013; Doman 2015; Asghari et al. 2022)


    $$G_n^\lambda(x, z) = \frac{1}{(1 - 2xz + z^2)^\lambda}. \quad (5.5)$$


    It can be shown that it is true for $|z| < 1$, $|x| \leqslant 1$, $\lambda > -\frac{1}{2}$
    (Cohl 2013; Doman 2015). Considering for fixed $x$ the function is *holomorphic*
    in $|z| < 1$, it can be expanded in *Taylor* series (Reimer 2013):'
  merge: -1

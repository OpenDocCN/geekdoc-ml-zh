- md: '## 10.5 Conclusion


    In this chapter, the LS-SVR algorithm was utilized for solving the Distributed-order
    fractional differential equations, which is based on utilizing modal Legendre
    as the basis function. The mentioned algorithm has better accuracy in comparison
    with other proposed methods for DOFDEs. On the other hand, the uniqueness of the
    solution is provided. One of the important parameters for obtaining high precision
    in solving this kind of equation is the Gamma parameter. The impact of this parameter
    on the accuracy of the numerical algorithm is indicated in numerical examples.
    Moreover, it has to be considered that the Gamma value cannot be increased too
    much because it might become more than machine accuracy. Even though all of the
    computations are done with MAPLE, which is a symbolic application, this point
    is considered. For indicating the applicability of the proposed algorithm, five
    examples are proposed in which the obtained accuracy of these examples is compared
    with other methods.


    **Fig. 10.5** Calculated error for three different aspects for Example 10.4.5



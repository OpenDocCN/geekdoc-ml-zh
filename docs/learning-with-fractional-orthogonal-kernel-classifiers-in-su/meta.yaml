- md: '## Part IV

    Orthogonal Kernels in Action


    ## Chapter 11

    GPU Acceleration of LS-SVM, Based on Fractional Orthogonal Functions


    Armin Ahmadzadeh, Mohsen Asghari, Dara Rahmati, Saeid Gorgin, and Behzad Salami


    **Abstract** SVM classifiers are employed widely in classification problems. However,
    the computation complexity prevents it from becoming applicable without acceleration
    approaches. General-Purpose Computing using Graphics Processing Units (GPGPU)
    is one of the most used techniques for accelerating array-based operations. In
    this chapter, a method for accelerating the SVM with the kernel of fractional
    orthogonal functions applied on GPU devices is introduced. The experimental result
    for the first kind of Chebyshev function, used as an SVM kernel in this book,
    resulted in a 2.2X speedup compared to GPU acceleration with CPU execution. In
    the fit function and training part of the code, a 58X speedup on the Google Colab
    GPU devices is obtained. This chapter proposes more details of GPU architecture
    and how it can be used as a co-processor along with the CPU to accelerate the
    SVM classifiers.


    **Keywords** Software accelerator · Kernel functions · Graphical processing unit


    A. Ahmadzadeh (✉) · M. Asghari

    School of Computer Science, Institute for Research in Fundamental Sciences, Farmanieh
    Campus, Tehran, Iran

    e-mail: a.ahmadzadeh@ipm.ir


    M. Asghari

    e-mail: m.asgari@ipm.ir


    D. Rahmati

    Computer Science and Engineering (CSE) Department, Shahid Beheshti University,
    Tehran, Iran

    e-mail: d_rahmati@sbu.ac.ir


    S. Gorgin

    Department of Electrical Engineering and Information Technology, Iranian Research
    Organization for Science and Technology (IROST), Tehran, Iran

    e-mail: gorgin@irost.ir


    B. Salami

    Barcelona Supercomputing Center (BSC), Barcelona, Spain

    e-mail: behzad.salami@bsc.es


    © The Author(s), under exclusive license to Springer Nature Singapore Pte Ltd.
    2023

    J. A. Rad et al. (eds.), *Learning with Fractional Orthogonal Kernel Classifiers
    in Support Vector Machines*, Industrial and Applied Mathematics,

    https://doi.org/10.1007/978-981-19-6553-1_11


    ### 11.1 Parallel Processing


    Nowadays, computers and their benefits have revolutionized human life. Due to
    their vast applications, the need for accuracy and multi-feature application demand
    have made them more complex. These complexities are due to data accessibility
    and processing complexity. Chip vendors always try to produce memories with less
    latency and broader bandwidth to overcome data accessibility. Besides, the parallel
    processing approach overcomes the processing complexity Asghari et al. (2022).
    Parallel processing is an approach to divide large and complex tasks into several
    small tasks. This approach allows execution of the processing parts simultaneously.
    GPUs are special-purpose processors mainly designed for graphical workloads. Using
    GPUs for general-purpose computing enlightened the way for the emergence of a
    new era in high-performance computing Owens et al. (2007), Ahmadzadeh et al. (2018),
    including accelerators for cryptosystems Ahmadzadeh et al. (2018), Gavahi et al.
    (2015), Luo et al. (2015), multimedia compression standards Xiao et al. (2019),
    scientific computing Moayeri et al. (2020), Parand et al. (2021), machine learning
    and clustering accelerators Rahmani et al. (2016), simulation of molecular dynamics
    Allec et al. (2019), and quantum computing simulation Moayeri et al. (2020). The
    designers are gradually making improvements in GPU architecture to accelerate
    it, resulting in real-time processing in many applications. Many smaller computational
    units handle simple parallel tasks within a GPU that traditionally CPUs were supposed
    to hold. This usage of GPUs instead of CPUs is called General-Purpose Computing
    on Graphics Processing Unit (GPGPU). One admiring improvement of the GPGPUs is
    the release of CUDA (Compute Unified Device Architecture), NVIDIA’s parallel computing
    platform and programming model. CUDA was introduced in 2007, allowing many researchers
    and scientists to deploy their compute-intensive tasks on GPUs. CUDA provides
    libraries and APIs that could be used inside multiple programming languages such
    as C/C++ and Python, general-purpose applications such as multimedia compression,
    cryptosystems, machine learning, etc. Moreover, they are generally faster than
    CPUs, performing more instructions in a given time. Therefore, together with CPUs,
    GPUs provide heterogeneous and scalable computing, acting as co-processors while
    reducing the CPU’s workload.


    The rest of this chapter is organized as follows. In Sect. 11.2, the NVIDIA GPU
    architecture and how it helps us as an accelerator is presented. PyCUDA is also
    described in Sect. 11.2. In Sect. 11.3, the proposed programming model is analyzed
    before acceleration. Section 11.4 defines the hardware and software requirements
    for implementing our GPU acceleration platform. The method of accelerating the
    Chebyshev kernel is described in Sect. 11.5 in detail. In Sect. 11.6, we propose
    critical optimizations that should be considered for more speedup. Then, we recommend
    a Quadratic Problem Solver (QPS) based on GPU in Sect. 11.7 for more speedup in
    our platform. This chapter is concluded in Sect. 11.8.


    ### 11.2 GPU Architecture


    The GPUs are specifically well-suited for three-dimensional graphical processing.
    They are massively parallel processing units that have their usage in general-purpose
    applications. Because of the power of parallelism and the flexible programming
    model of modern GPUs, GPGPU computation has become an attractive platform for
    both research and industrial applications. As some examples, developers can use
    GPUs for physics-based simulation, linear algebra operations, Fast Fourier Transform
    (FFT) and reconstruction, flow visualization, database operations, etc., to achieve
    high performance, while having accurate results.


    A GPU consists of many streaming multi-processors (SM) modules, and each SM contains
    several processors that are referred to as CUDA cores in NVIDIA products (Fig.
    11.1) Cheng et al. (2014). These multi-processors are utilized by scheduling thousands
    of threads in thread blocks and dispatching the blocks onto SMs. The latency of
    data load/store operation is high in GPUs. However, unlike CPUs that have low
    latency in data loading/storing and lower processing throughput, they are high-throughput
    processors. Threads of a block are arranged as WARPs to be scheduled for execution.
    Every 32 consecutive threads make a WARP, and all threads of a WARP are executed
    simultaneously in the SM as a Single Instruction Multiple Thread (SIMT) operation.
    In a SIMT operation, all threads of a WARP execute the same instruction, and any
    thread makes the output of the operation on its private data. By using WARP scheduling
    and switching between stalling WARPs and ready-to-execute WARPs, GPUs can hide
    the memory latency. In GPUs, the codes are executed in the form of Kernels. Kernels
    are blocks of codes that are separated from the main code and are called from
    the CPU (known as a host) and executed on GPU (known as device) (Fig. 11.2) Cheng
    et al. (2014).


    The kernel code should fully exploit the computational task’s data parallelism
    in order to benefit fruitfully from the GPU’s massively parallel architecture.
    A group of threads that can be launched together is called a thread block. There
    are different CUDA memory types in a GPU. The most important memory types include
    global memory, shared memory, and register memory Dalrymple (2014). Global memory
    is the slowest of the three types, but is accessible to all of the threads and
    has the largest capacity. Shared memory is accessible to all of the threads that
    share the same thread block, and register memory is accessible only to a single
    thread, but it is the fastest of the three memory types.


    The host can read (write) from (to) GPU’s global memory shown in Fig. 11.3. These
    accesses are made possible by the CUDA API. The global memory and constant memory
    are the only memories in which their content can be accessed and manipulated by

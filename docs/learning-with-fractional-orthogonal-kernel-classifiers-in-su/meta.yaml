    The Monk’s problem is a classic one introduced in 1991, according to “*Monk’s
    Problems—A Performance Comparison of Different Learning algorithms*” by Thrun
    et al. (1991); Sun et al. (2015):


    The Monk’s problems rely on an artificial robot domain in which robots are described
    by six different attributes:


    $x_1$: head shape ∈ {round, square, octagon}

    $x_2$: body shape ∈ {round, square, octagon}

    $x_3$: is smiling ∈ {yes, no}

    $x_4$: holding ∈ {sword, balloon, flag}

    $x_5$: jacket color ∈ {red, yellow, green, blue}

    $x_6$: has tie ∈ {yes, no}


    The learning task is a binary classification one. Each problem is given by a logical
    description of a class. Robots belong either to this class or not, but instead
    of providing a complete class description to the learning problem, only a subset
    of all 432 possible robots with its classification is given. The learning task
    is to generalize over these examples and if the particular learning technique
    at hand allows this to derive a simple class description.


    Then the three problems are


    - **Problem $M_1$: (head shape = body shape) or (jacket color = red)** From 432
    possible examples, 124 are randomly selected for the training set. There are no
    misclassifications.

    - **Problem $M_2$: Exactly two of the six attributes have their first value.**
    (e.g., *body shape = head shape = round* implies that the robot is not smiling,
    holding no sword, jacket color is not red, and has no tie, since then exactly
    two (body shape and head shape) attributes have their *first* value). From 432
    possible examples, 169 are randomly selected. Again, there is no noise.

    - **Problem $M_3$: (jacket color is green and holding a sword) or (jacket color
    is not blue and body shape is not octagon)** From 432 examples, 122 are selected
    randomly, and among them, there are 5% misclassifications, i.e., noise in the
    training set.


    Fig. 3.5 Spiral dataset, different fractional order


    - Binary Classification task 3: class 1 versus class 4,

    - Binary Classification task 4: class 2 versus class 3,

    - Binary Classification task 5: class 2 versus class 4,

    - Binary Classification task 6: class 3 versus class 4.


    Generally, the **OVA** method is often preferred due to computational and time
    considerations.


    The following figures show how the transformation to fractional order affects
    the original dataset''s distribution, and how the Chebyshev kernel chooses decision
    boundaries in different orders. Figure 3.5 depicts the transformed Spiral dataset
    in its original state and fractional form where $0.1 \leqslant \alpha \leqslant
    0.9$. As fractional order gets lower and closer to 0.1, transformation moves more
    data points from the original dataset to the upright side of the space into the
    positive quarter of the new space in precise, where $x1 > 0$ and $x2 > 0$. Although
    it seems that data points are conglomerated on one corner of the axis on a 2D
    plot, this is not necessarily what happens in 3D space when the kernel function
    is applied. In other words, when a kernel function such as the Chebyshev kernel
    function is applied, data points may spread over a new axis while concentrating
    on a 2D axis and making it possible to classify those points considering the higher
    dimension instead. This kind of transformation combined with a kernel function
    creates a new dimension for the original dataset and makes it possible for the
    kernel function''s decision boundary to capture and classify the data points with
    a better chance of accuracy.


    In order to have a better intuition of how a kernel function takes the dataset
    to a higher dimension, see Fig. 3.6, which shows the Chebyshev kernel function
    of the first kind (both normal and fractional forms) applied to the Spiral dataset.
    The figure on the left depicts the dataset in a higher dimension when the normal
    Chebyshev kernel of order 3 is applied, and the one at right demonstrates how
    the data points are changed when the fractional Chebyshev kernel of order 3 and
    alpha 0.3 is applied to the original dataset. It is clear that the transformation
    has moved the data points to the positive side of the axes x, y, and also z.


    After the transformation of the dataset and taking the data points to a higher
    dimension, it is time to determine the decision boundaries of the classifier.⁴
    The decision boundary is highly dependent on the kernel function. In the case
    of orthogonal polynomials, the order of these functions has a critical role. For
    example, the Chebyshev kernel function with order 3 outcomes a different decision
    boundary in comparison to the same kernel function with the order of 6. There
    is no general rule to know which order outcomes the most suitable decision boundary.
    Hence, trying different decision boundaries gives a useful metric to compare and
    find the best order or even the kernel function itself.


    In order to have an intuition of how the decision boundaries are different, take
    a look at Fig. 3.7 which depicts corresponding Chebyshev classifiers of different
    orders {3, 4, 5, 6} on the original Spiral dataset where the binary classification
    of 1-versus-{2, 3} is chosen. From these plots, one can see that decision boundaries
    are getting more twisted and twirled as we approach higher orders. In order 6
    (the last subplot on the right), the decision boundary is slightly more complex
    in comparison with order 3 (the first subplot on the right). The complexity of
    the decision boundary even gets worse in fractional space. Figure 3.8 demonstrates
    the decision boundary of the fractional Chebyshev classifier with different orders
    of 3, 4, 5, and 6 where $\alpha = 0.3$. Again there is a complicated decision
    boundary as one approaches from order 3 to order 6.


    > ⁴ Please note that “decision boundary” refers to the 2D space and the “decision
    surface” refers to the 3D space.


    Fig. 3.7 Chebyshev kernel with orders of 3, 4, 5, and 6 on Spiral dataset


    The purpose is not to specify which one has a better or worse accuracy or final
    result, it is all about which one is most suitable considering to dataset’s distribution.
    Each decision boundary (or decision surface) classifies the data points in a specific
    form. As the decision boundary/surface of a kernel function of each order is fixed
    and determined, it is the degree of correlation between that specific shape and
    the data points that determine the final accuracy.


    Finally, the following tables provide a comparison of the experiments on the Spiral
    dataset. All decision boundaries depicted in previous figures are applied on the
    dataset and the accuracy score is adopted as the final metric, by the way, three
    possible binary classifications have been examined according to the One-versus-All
    method. As it is clear from Table 3.1, RBF kernel and the fractional Chebyshev
    kernel show better performance for the class 1-versus-{2, 3}. However, for other

    类似于第一类切比雪夫多项式的生成函数 ($\frac{1-tx}{1-2tx+t^2} = \sum_{n=0}^\infty T_n(x)t^n$)，第二类的生成函数定义为
    Mason and Handscomb (2002)：


    $\frac{1}{1 - 2xt + t^2} = \sum_{n=0}^\infty U_n(x)t^n$, $|x| \leqslant 1, |t|
    \leqslant 1$. (3.48)


    根据定义的权重函数公式 3.46，Zhao 等人 (2013) 将第二类切比雪夫多项式的正交关系定义为：


    $$\int_{-1}^{1} \sqrt{1-x^2} U_m(x) U_n(x) dx = \begin{cases} \frac{\pi}{2}, &
    (m=n \neq 0) \\ 0, & ((m \neq n) \text{或} (m=n=0)) \end{cases}.$$ (3.49)


    此外，他们使用 $P_n(.)$ 表示统一切比雪夫多项式 (UPC)，但在本书中，符号 $P_n(.)$ 用于勒让德正交多项式。因此，为避免任何歧义，我们特意改用

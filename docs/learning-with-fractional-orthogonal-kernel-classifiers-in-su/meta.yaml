    \ldots, \mathcal{L}1(x_n)], \qquad (9.19) \ \Omega_{i,j} &= \mathcal{L}\varphi(x_i)^T
    \mathcal{L}\varphi(x_j) \ &= \mathcal{L}\mathcal{L}K(x_i, x_j), \quad i, j = 1,
    2, \ldots, n. \end{aligned}$$

    ```


    The approximated solution in the dual form takes the following form:


    ```

    $$\bar{u}(x) = \sum_{i=1}^n \alpha_i \widetilde{K}(x, x_i) + b,$$

    ```


    where


    ```

    $$\widetilde{K}(x, x_i) = \mathcal{L}\varphi(x_i)^T \varphi(x) = \mathcal{L}K(x,
    x_i).$$

    ```


    # 9.3.5 GLS-SVR Method


    The Galerkin approach is a famous method for solving a wide of problems. In this
    approach, the test functions $\psi$ are chosen equal to the basis functions. If
    the basis functions are orthogonal together, this approach leads to a sparse system
    of algebraic equations. Some examples of this feature are provided in the next
    section. For now, let us define the model. In the primal space, the model can
    be constructed as follows:


    ```

    $$\begin{aligned} \min_{w;e} \quad & \frac{1}{2} w^T w + \frac{\gamma}{2} e^T
    e \ \text{s.t.} \quad & \int_{\Delta} [\mathcal{L}\bar{u}(x) - f(x)]\varphi_k(x)dx
    = e_k, \quad k = 0, \ldots, d, \end{aligned} \qquad (9.20)$$

    ```


    where $d$ is the number of basis functions and $\mathcal{N}$ is a linear or nonlinear
    functional operator. If the operator is linear, then the dual form of the optimization
    problem Eq. 9.20 can be computed using the following linear system:'
  - '[PAGE 222]


    $$\left[\begin{array}{c|c} 0 & \widetilde{\mathcal{L}}^{T} \ \hline \widetilde{\mathcal{L}}
    & \Omega + I / \gamma \end{array}\right]\left[\begin{array}{c} b \ \hline \alpha
    \end{array}\right]=\left[\begin{array}{c} 0 \ \hline y \end{array}\right],$$


    (9.21)


    in which


    $$\alpha = [\alpha_1, \ldots, \alpha_n]^T,$$


    $$\widetilde{\mathcal{L}} = \left[\int_{\Delta} \mathcal{L} 1(x) \varphi_1(x)
    dx, \int_{\Delta} \mathcal{L} 1(x) \varphi_2(x) dx, \ldots, \int_{\Delta} \mathcal{L}
    1(x) \varphi_d(x) dx, \right],$$


    $$y = \left[\int_{\Delta} f(x) \varphi_1(x) dx, \int_{\Delta} f(x) \varphi_2(x)
    dx, \ldots, \int_{\Delta} f(x) \varphi_d(x) dx\right]^T,$$


    $$\Omega_{i,j} = \left(\int_{\Delta} \mathcal{L} \varphi(x) \varphi_i(x) dx\right)^T
    \left(\int_{\Delta} \mathcal{L} \varphi(x) \varphi_j(x) dx\right)$$


    $$= \int_{\Delta} \int_{\Delta} \mathcal{L} \mathcal{L} K(s, t) \varphi_i(s) \varphi_j(t)
    ds dt, \quad i, j = 1, 2, \ldots, d.$$


    (9.22)


    The approximated solution in the dual form takes the form


    $$\tilde{u}(x) = \sum_{i=1}^{n} \alpha_i \widetilde{K}(x, x_i) + b,$$


    where


    $$\widetilde{K}(x, x_i) = \left(\int_{\Delta} \mathcal{L} \varphi(s) \varphi_i(s)
    ds\right)^T \varphi(x) = \int_{\Delta} \mathcal{L} K(x, s) \varphi_i(s) ds.$$


    # 9.4 Numerical Simulations


    In this section, some integral equations are considered as test problems and the
    efficiency of the proposed method is shown by approximating the solution of these
    test problems. Also, the shifted Legendre polynomials are used as the kernel of
    LS-SVR. Since the Legendre polynomial of degree 0 is a constant, the bias term
    $b$ can be removed and the approximate solution is defined as $\sum_{i=0}^{d}
    w_i P_i(x)$. As a result, the system Eq. 9.8 reduces to $\Omega \alpha = y$, which
    can be efficiently solved using the Cholesky decomposition or the conjugate gradient
    method. The training points for the following examples are the roots of the shifted
    Legendre polynomials, and the test data are equidistant points in the problem
    domain.


    This method has been implemented in Maple 2019 software with 15 digits of accuracy.
    The results are obtained on an Intel Core i5 CPU with 8 GB of RAM. In all of the
    presented numerical tables, the efficiency of the method is computed using the
    mean absolute error function:'
  - '[PAGE 223]



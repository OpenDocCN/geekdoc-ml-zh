    # 7.6 Conclusion


    In this chapter, we developed the least squares-support vector machine model for
    solving various forms of Lane-Emden type equations. For solving this problem,
    the collocation LS-SVM formulation was applied and the problem was solved in dual
    form. The rational Legendre functions were also employed to construct kernel function,
    because of their good properties to approximate functions on semi-infinite domains.


    We used the shifted roots of the Legendre polynomial for training our algorithm
    and equidistance points as the testing points. The numerical results by applying
    the training and testing points show the accuracy of our proposed model. Moreover,
    the exponential convergence of our proposed method was achieved by choosing the
    different numbers of training points and basis functions. In other words, when
    the number of training points is increased, the norm of errors decreased exponentially.



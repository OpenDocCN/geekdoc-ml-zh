  mdcn: '## 第2章

    SVM方法与最小二乘SVM基础


    Kurosh Parand, Fatemeh Baharifard, Alireza Afzal Aghaei, and Mostafa Jani


    **摘要** 支持向量机算法的学习过程涉及求解一个凸二次规划问题。由于该优化问题具有唯一解，并且满足Karush–Kuhn–Tucker条件，因此可以非常高效地求解。本章讨论了在各种形式的支持向量机算法中出现的优化问题的公式化。


    **关键词** 支持向量机 · 分类 · 回归 · 核技巧


    ### 2.1 线性SVM分类器


    如前一章所述，用于分类可分离数据的线性支持向量机方法由Vapnik和Chervonenkis（1964）提出。该方法在训练数据集中找到最佳判别超平面，将两类样本分开。考虑$\mathcal{D}
    = \{(\mathbf{x}_i, y_i) \mid i = 1 \dots N, \mathbf{x}_i \in \mathbb{R}^d \text{
    and } y_i \in \{-1, +1\}\}$作为一组训练数据，其中$C_1$类和$C_2$类的样本分别具有$+1$和$-1$标签。


    本节将针对两种情况解释SVM方法。第一种情况发生在训练样本线性可分时，目标是通过硬间隔SVM方法找到一个线性分隔器。第二种情况涉及训练样本线性不可分（例如，由于噪声），因此必须使用软间隔SVM方法。


    #### 2.1.1 硬间隔SVM


    假设输入数据是线性可分的。图2.1展示了此类数据的一个示例，并表明分隔超平面不是唯一的。SVM方法的目标是找到一个唯一的超平面，使其到两类最近点的距离最大。该超平面的方程可考虑如下：


    $$\langle \mathbf{w}, \mathbf{x}\rangle + w_0 = \mathbf{w}^T \mathbf{x} + w_0
    = \sum_{i=1}^d w_i x_i + w_0 = 0, \quad (2.1)$$


    其中$w_i$是问题的未知权重。


    分隔器的间隔是超平面与最近训练样本之间的距离。较大的间隔能为未见数据提供更好的泛化能力。具有最大间隔的超平面到两类最近样本的距离相等。考虑从分隔超平面到$C_1$类和$C_2$类最近样本的距离均等于$\frac{D}{\|\mathbf{w}\|}$，其中$\|\mathbf{w}\|$是$\mathbf{w}$的欧几里得范数。因此，间隔将等于$\frac{2D}{\|\mathbf{w}\|}$。硬间隔SVM方法的目的是最大化此间隔，以便所有训练数据都能被正确分类。因此，必须满足以下条件：


    $$\begin{cases} \forall \mathbf{x}_i \in C_1 \quad (y_i = +1) \rightarrow (\mathbf{w}^T
    \mathbf{x}_i + w_0) \geq D, \ \forall \mathbf{x}_i \in C_2 \quad (y_i = -1) \rightarrow
    (\mathbf{w}^T \mathbf{x}_i + w_0) \leq -D. \end{cases} \quad (2.2)$$


    因此，为了找到分隔超平面，得到以下优化问题，该问题在二维空间中的示意图如图2.2所示：


    $$\max_{D,\mathbf{w},w_0} \frac{2D}{\|\mathbf{w}\|}$$

    $$\text{s.t. } (\mathbf{w}^T\mathbf{x}_i + w_0) \geq D, \quad \forall \mathbf{x}_i
    \in C_1,$$

    $$\quad\quad (\mathbf{w}^T\mathbf{x}_i + w_0) \leq -D, \quad \forall \mathbf{x}_i
    \in C_2.$$

    (2.3)


    可以设$\mathbf{w}'' = \frac{\mathbf{w}}{D}$和$w_0'' = \frac{w_0}{D}$，并将上述两个不等式合并为一个不等式$y_i(\mathbf{w}^T\mathbf{x}_i
    + w_0) \geq 1$，得到：


    $$\max_{\mathbf{w}'',w_0''} \frac{2}{\|\mathbf{w}''\|}$$

    $$\text{s.t. } y_i(\mathbf{w}''^T\mathbf{x}_i + w_0'') \geq 1, \quad i = 1, \ldots,
    N.$$

    (2.4)


    此外，为了最大化间隔，可以等价地最小化$\|\mathbf{w}''\|$。这给出了我们以下关于归一化向量$\mathbf{w}$和$w_0$的原始问题（为简单起见，此处用$\|\mathbf{w}\|^2
    = \mathbf{w}^T\mathbf{w}$代替$\|\mathbf{w}\|$）：


    $$\min_{\mathbf{w},w_0} \frac{1}{2} \mathbf{w}^T\mathbf{w}$$

    $$\text{s.t. } y_i(\mathbf{w}^T\mathbf{x}_i + w_0) \geq 1, \quad i = 1, \ldots,
    N.$$

    (2.5)


    二次规划（QP）问题作为非线性规划的一个特例，是在一些线性约束条件下，最小化或最大化多个变量的二次目标函数的问题。



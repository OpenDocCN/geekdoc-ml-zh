- md: '## Chapter 10

    Solving Distributed-Order Fractional Equations by LS-SVR


    Amir Hosein Hadian Rasanana, Arsham Gholamzadeh Khoee, and Mostafa Jani


    **Abstract** Over the past years, several artificial intelligence methods have
    been developed for solving various types of differential equations; due to their
    potential to deal with different problems, so many paradigms of artificial intelligence
    algorithms such as evolutionary algorithms, neural networks, deep learning methods,
    and support vector machine algorithms, have been applied to solve them. In this
    chapter, an artificial intelligence method has been employed to approximate the
    solution of distributed-order fractional differential equations, which is based
    on the combination of least squares support vector regression algorithm and a
    well-defined spectral method named collocation approach. The importance of solving
    distributed-order fractional differential equations is being used to model some
    significant phenomena that existed in nature, such as the ones in viscoelasticity,
    diffusion, sub-diffusion, and wave. We used the modal Legendre functions, which
    have been introduced in Chap. 4 and have been applied several times in the previous
    chapters as the least squares support vector regression algorithm’s kernel basis
    in the presented method. The uniqueness of the obtained solution is proved for
    the resulting linear systems. Finally, the efficiency and applicability of the
    proposed algorithm are determined by the results of applying it to different linear
    and nonlinear test problems.


    **Keywords** Fractional calculus · Distributed order · Caputo operator · Numerical
    approximation


    A. H. Hadian Rasanana (✉)

    Department of Cognitive Modeling, Institute for Cognitive and Brain Sciences,

    Shahid Beheshti University, Tehran, Iran

    e-mail: amir.h.hadian@gmail.com


    A. G. Khoee

    Department of Computer Science, School of Mathematics, Statistics, and Computer
    Science,

    University of Tehran, Tehran, Iran

    e-mail: arsham.khoee@ut.ac.ir


    M. Jani

    Department of Computer and Data Science, Faculty of Mathematical Sciences,

    Shahid Beheshti University, Tehran, Iran


    ## 10.1 Introduction


    Fractional differential equations are frequently used for modeling real-world
    problems in science and engineering, such as fractional time evolution, polymer
    physics, rheology, and thermodynamics Hilfer (2000), cognitive science Cao et
    al. (2021), Hadian-Rasanan et al. (2021), neuroscience Datsko et al. (2015). Since
    the analytical methods can only solve some special simple cases of fractional
    differential equations, numerical methods are developed for solving these equations
    involving linear and nonlinear cases. On the other hand, since the fractional
    calculus foundation, several definitions have been presented by scientists such
    as Liouville Hilfer (2000), Caputo (1967), Rad et al. (2014), Riesz Podlubny (1998),
    and Atangana-Baleanu-Caputo (2017). So solving fractional differential equations
    is still a challenging problem.


    In modeling some phenomena, the order of derivatives depends on time (i.e., derivative
    operators'' order as a function of t). It is for the memory property of the variable-order
    fractional operators Heydari et al. (2020). A similar concept to the variable-order
    differentiation is the distributed order differentiation, which indicates a continuous
    form of weighted summation of various orders chosen in an interval. In many problems,
    differential equations can have different orders. For instance, the first-order
    differential equation can be written by the summation of various orders along
    with their proper weight functions as follows


    $$\sum_{j=0}^{n} \omega_j D_t^{\alpha_j} u, \quad (10.1)$$


    in which $\alpha_j$s are descending and have equal distance to each other, $\omega_j$s
    can be determined by using the data. It is worth mentioning, by calculating the
    limit of the above equation, convert to the following form, which is convergence:


    $$\int_{0}^{1} \omega(x) D^{\alpha} u \, dx. \quad (10.2)$$


    Distributed-order fractional differential equations (DOFDEs) have been considered
    since 2000 Ding et al. (2021). DOFDEs have many applications in different areas
    of physics and engineering. For example, DOFDEs can describe various phenomena
    in viscoelastic material Bagley and Torvik (1985), Umarov and Gorenflo (2005),
    statistical and solid mechanics Carpinteri and Mainardi (2014), citetch10rossikhin1997applications.
    System identification is also a significant application of DOFDEs Hartley (1999).
    Moreover, in the study of the anomalous diffusion process, DOFDEs provide more
    compatible models with experimental data Caputo (2003), citetch10sokolov2004distributed.
    Also, in signal processing and system controls, DOFDEs have been used frequently
    Parodi and Gómez (2014). In this chapter, an algorithm based on a combination
    of the least squares support vector regression (LS-SVR) algorithm, and modal Legendre
    collocation method is presented for solving a DOFDE given by Mashayekhi and Razzaghi
    (2016), Yuttanan and Razzaghi (2019):


    $$\int_{a}^{b} G_1(p, D^p u(t))dp + G_2(t, u(t), D^{\alpha_i} u(t)) = F(t), \quad
    t > 0, \qquad (10.3)$$


    with the initial conditions:


    $$u^{(k)}(0) = 0, \qquad (10.4)$$


    where $i \in \mathbb{N}$, $\alpha_i > 0$, $k = 0, 1, \ldots, \lfloor \max\{b,
    \alpha_i\} \rfloor$ and $G_1$, $G_2$ can be linear or non-linear functions. In
    the proposed algorithm, the unknown function is expanded by using modal Legendre
    polynomials; then, using the support vector regression algorithm and collocating
    the training points in the residual function, the problem is converted to a constrained
    optimization problem. By solving this optimization problem, the solution of DOFDEs
    is obtained. Since DOFDEs have a significant role in various fields of science,
    many researchers have developed several numerical algorithms for solving them.
    In the following section, we review the existing methods used to solve DOFDEs
    and some artificial intelligence algorithms that are developed to solve different
    types of differential equations.


    ### 10.1.1 A Brief Review of Other Methods Existing in the Literature


    Najafi et al. analyzed the stability of three classes of DOFDEs subjected to the
    nonnegative density function Najafi et al. (2011). Atanacković et al. studied
    the existence, and the uniqueness of mild and classical solutions for the specific
    general form, which are arisen in distributed derivative models of viscoelasticity
    and identification theory Atanacković et al. (2007). He and his collaborators
    also studied some properties of the distributed-order fractional derivative in
    viscoelastic rod solutions Atanackovic et al. (2005). Refahi et al. presented
    DOFDEs to generalized the inertia and characteristics of polynomial concepts concerning
    the nonnegative density function Refahi et al. (2012). Aminikhah et al. employed
    a combined Laplace transform and new Homotopy perturbation method for solving
    a particular class of the distributed-order fractional Riccati equation Aminikhah
    et al. (2018). For a time distributed order multi-dimensional diffusion-wave equation
    which is contained a forcing term, Atanacković et al. reinterpreted a Cauchy problem
    Atanackovic et al. (2009).


    Katsikadelis proposed a method based on the finite-difference method to solve
    both linear and nonlinear DOFDEs numerically Katsikadelis (2014). Dielthem and
    Ford proposed a method for DOFDEs of the general form $\int_{0}^{m} \mathscr{A}(r,
    D_{*}^{r} u(t))dr = f(t)$ where $m \in \mathbb{R}^{+}$ and $D_{*}^{r}$ is the
    fractional derivative of Caputo type of order $r$ and introduced its analysis
    Diethelm and Ford (2009). Zaky and Machado first derived the generalized necessary
    conditions for optimal control with dynamics described by DOFDEs and then proposed
    a practical numerical scheme for solving these equations Zaky and Machado (2017).
    Hadian-Rasanan et al. provided an artificial neural network framework for approximating
    various types of Lane-Emden equations such as fractional-order, and Lane-Emden
    equations system Hadian-Rasanan et al. (2020). Razzaghi and Mashayekhi presented
    a numerical method to solve the DOFDEs based on hybrid function approximation
    Mashayekhi and Razzaghi (2016). Mashhoof and Refahi proposed methods based on
    the fractional-order integration''s operational matrix with an initial value point
    for solving the DOFDEs Mashhoof and Sheikhani (2017). Li et al. presented a high
    order numerical scheme for solving diverse DOFDEs by applying the reproducing
    kernel Li et al. (2017). Gao and Sun derived two implicit difference schemes for
    two-dimensional DOFDEs Gao et al. (2016).


    In the first chapter, SVM has been fully and comprehensively discussed. Mehrkanoon
    et al. introduced a novel method based on LS-SVMs to solve ODEs Mehrkanoon et
    al. (2012). Mehrkanoon and Suykens also presented another new approach for solving
    delay differential equations Mehrkanoon et al. (2013). Ye et al. presented an
    orthogonal Chebyshev kernel for SVMs Ye et al. (2006). Leake et al. compared the
    application of the theory of connections by employing LS-SVMs Leake et al. (2019).
    Baymani et al. developed a new technique by utilizing ϵ-LS-SVMs to achieve the
    solution of the ODEs in an analytical form Baymani et al. (2016). Chu et al. presented
    an improved method for the numerical solution of LS-SVMs. They indicated that
    by using a reduced system of linear equations, the problem could be solved. They
    believed that their proposed approach is about twice as effective as the previous
    algorithms Chu et al. (2005). Pan et al. proposed an orthogonal Legendre kernel
    function for SVMs using the properties of kernel functions and comparing it to
    the previous kernels Pan et al. (2012). Ozer et al. introduced a new set of functions
    with the help of generalized Chebyshev polynomials, and they also increase the
    generalization capability of their previous work Ozer et al. (2011).


    Lagaris et al. proposed a method based on artificial neural networks that can
    solve some categories of ODEs and PDEs and later compared their method to those
    obtained using the Galerkin finite element method Lagaris et al. (1998). Meade
    and Fernandez illustrated theoretically how a feedforward neural network could
    be constructed to approximate arbitrary linear ODEs Meade et al. (1994). They
    also indicated the way of directly constructing a feedforward neural network to
    approximate the nonlinear ordinary differential equations without training Meade
    et al. (1994). Dissanayake and Phan-Thien presented a numerical method for solving
    PDEs, which is based on neural-network-based functions Dissanayake and Phan-Thien
    (1994). To solve ODEs and elliptic PDEs, Mai-Duy and Tran-Cong proposed mesh-free
    procedures that rely on multiquadric radial basis function networks Mai-Duy and
    Tran-Cong (2001). Effati and Pakdaman proposed a new algorithm by utilizing feedforward
    neural networks for solving fuzzy differential equations Effati and Pakdaman (2010).
    To solve the linear second kind integral equations of Volterra and Fredholm types,
    Golbabai and Seifollahi presented a novel method based on radial basis function
    networks that applied a neural network as the approximate solution of the integral'
  mdcn: '## 第10章

    通过LS-SVR求解分布阶分数阶方程


    Amir Hosein Hadian Rasanana, Arsham Gholamzadeh Khoee, and Mostafa Jani


    **摘要** 过去几年，已开发出多种人工智能方法用于求解各类微分方程；由于其处理不同问题的潜力，众多人工智能算法范式，如进化算法、神经网络、深度学习方法以及支持向量机算法，已被应用于求解这些问题。本章采用一种人工智能方法来近似求解分布阶分数阶微分方程，该方法基于最小二乘支持向量回归算法与一种定义明确的谱方法——配置法的结合。求解分布阶分数阶微分方程的重要性在于，它可用于建模自然界中存在的某些重要现象，例如粘弹性、扩散、亚扩散和波动中的现象。我们在所提方法中使用了第4章介绍并在前几章多次应用的模态勒让德函数，作为最小二乘支持向量回归算法的核基函数。对于所得的线性系统，证明了解的唯一性。最后，通过将其应用于不同的线性和非线性测试问题的结果，确定了所提算法的效率和适用性。


    **关键词** 分数阶微积分 · 分布阶 · Caputo算子 · 数值近似


    A. H. Hadian Rasanana (✉)

    Department of Cognitive Modeling, Institute for Cognitive and Brain Sciences,

    Shahid Beheshti University, Tehran, Iran

    e-mail: amir.h.hadian@gmail.com


    A. G. Khoee

    Department of Computer Science, School of Mathematics, Statistics, and Computer
    Science,

    University of Tehran, Tehran, Iran

    e-mail: arsham.khoee@ut.ac.ir


    M. Jani

    Department of Computer and Data Science, Faculty of Mathematical Sciences,

    Shahid Beheshti University, Tehran, Iran


    ## 10.1 引言


    分数阶微分方程常用于对科学和工程中的实际问题进行建模，例如分数阶时间演化、聚合物物理、流变学和热力学 Hilfer (2000)、认知科学 Cao et al.
    (2021), Hadian-Rasanan et al. (2021)、神经科学 Datsko et al. (2015)。由于解析方法只能求解分数阶微分方程的一些特殊简单情况，因此开发了数值方法来求解涉及线性和非线性情况的这些方程。另一方面，自分数阶微积分基础建立以来，科学家们提出了多种定义，如Liouville
    Hilfer (2000)、Caputo (1967)、Rad et al. (2014)、Riesz Podlubny (1998) 和 Atangana-Baleanu-Caputo
    (2017)。因此，求解分数阶微分方程仍然是一个具有挑战性的问题。


    在对某些现象建模时，导数的阶数依赖于时间（即导数算子的阶数是t的函数）。这是由于变阶分数阶算子的记忆特性 Heydari et al. (2020)。与变阶微分类似的一个概念是分布阶微分，它表示在某个区间内选择的各种阶数的加权求和的连续形式。在许多问题中，微分方程可以具有不同的阶数。例如，一阶微分方程可以写成各种阶数及其相应权重函数的求和形式，如下所示


    $$\sum_{j=0}^{n} \omega_j D_t^{\alpha_j} u, \quad (10.1)$$


    其中 $\alpha_j$ 是递减的且彼此等距，$\omega_j$ 可以通过使用数据来确定。值得一提的是，通过计算上述方程的极限，可以转换为以下收敛形式：


    $$\int_{0}^{1} \omega(x) D^{\alpha} u \, dx. \quad (10.2)$$


    分布阶分数阶微分方程（DOFDEs）自2000年以来就受到关注 Ding et al. (2021)。DOFDEs在物理和工程的不同领域有许多应用。例如，DOFDEs可以描述粘弹性材料中的各种现象
    Bagley and Torvik (1985), Umarov and Gorenflo (2005)、统计和固体力学 Carpinteri and Mainardi
    (2014), citetch10rossikhin1997applications。系统辨识也是DOFDEs的一个重要应用 Hartley (1999)。此外，在异常扩散过程的研究中，DOFDEs提供了与实验数据更兼容的模型
    Caputo (2003), citetch10sokolov2004distributed。同样，在信号处理和系统控制中，DOFDEs也经常被使用 Parodi
    and Gómez (2014)。本章提出了一种基于最小二乘支持向量回归（LS-SVR）算法与模态勒让德配置法相结合的算法，用于求解由Mashayekhi
    and Razzaghi (2016), Yuttanan and Razzaghi (2019)给出的DOFDE：


    $$\int_{a}^{b} G_1(p, D^p u(t))dp + G_2(t, u(t), D^{\alpha_i} u(t)) = F(t), \quad
    t > 0, \qquad (10.3)$$


    初始条件为：


    $$u^{(k)}(0) = 0, \qquad (10.4)$$


    其中 $i \in \mathbb{N}$，$\alpha_i > 0$，$k = 0, 1, \ldots, \lfloor \max\{b, \alpha_i\}
    \rfloor$，且 $G_1$、$G_2$ 可以是线性或非线性函数。在所提算法中，未知函数通过使用模态勒让德多项式展开；然后，利用支持向量回归算法并在残差函数中配置训练点，将问题转化为一个约束优化问题。通过求解这个优化问题，即可获得DOFDEs的解。由于DOFDEs在科学的各个领域都扮演着重要角色，许多研究人员已经开发了多种数值算法来求解它们。在下一节中，我们将回顾现有的用于求解DOFDEs的方法，以及为求解不同类型微分方程而开发的一些人工智能算法。


    ### 10.1.1 文献中其他方法的简要回顾


    Najafi等人分析了三类受非负密度函数影响的DOFDEs的稳定性 Najafi et al. (2011)。Atanacković等人研究了在粘弹性分布导数模型和辨识理论中出现的特定一般形式的温和解和经典解的存在性和唯一性
    Atanacković et al. (2007)。他及其合作者还研究了粘弹性杆解中分布阶分数阶导数的一些性质 Atanackovic et al. (2005)。Refahi等人提出了DOFDEs，以推广关于非负密度函数的多项式概念的惯性和特性
    Refahi et al. (2012)。Aminikhah等人采用结合拉普拉斯变换和新的同伦扰动方法来求解一类特定的分布阶分数阶Riccati方程 Aminikhah
    et al. (2018)。对于包含强迫项的时间分布阶多维扩散-波动方程，Atanacković等人重新解释了一个柯西问题 Atanackovic et al.
    (2009)。


    Katsikadelis提出了一种基于有限差分法的方法来数值求解线性和非线性DOFDEs Katsikadelis (2014)。Dielthem和Ford提出了一种针对一般形式
    $\int_{0}^{m} \mathscr{A}(r, D_{*}^{r} u(t))dr = f(t)$ 的DOFDEs的方法，其中 $m \in \mathbb{R}^{+}$，$D_{*}^{r}$
    是阶数为 $r$ 的Caputo型分数阶导数，并介绍了其分析 Diethelm and Ford (2009)。Zaky和Machado首先推导了由DOFDEs描述的动力学的最优控制的广义必要条件，然后提出了一种求解这些方程的实用数值方案
    Zaky and Machado (2017)。Hadian-Rasanan等人提供了一个用于近似各种类型Lane-Emden方程（如分数阶Lane-Emden方程组）的人工神经网络框架
    Hadian-Rasanan et al. (2020)。Razzaghi和Mashayekhi提出了一种基于混合函数近似求解DOFDEs的数值方法 Mashayekhi
    and Razzaghi (2016)。Mashhoof和Refahi提出了基于分数阶积分运算矩阵和初始值点的方法来求解DOFDEs Mashhoof and
    Sheikhani (2017)。Li等人通过应用再生核，提出了一种求解各种DOFDEs的高阶数值方案 Li et al. (2017)。Gao和Sun推导了二维DOFDEs的两种隐式差分格式
    Gao et al. (2016)。


    在第一章中，SVM已被全面而透彻地讨论。Mehrkanoon等人引入了一种基于LS-SVMs求解ODEs的新方法 Mehrkanoon et al. (2012)。Mehrkanoon和Suykens还提出了另一种求解时滞微分方程的新方法
    Mehrkanoon et al. (2013)。Ye等人提出了一种用于SVMs的正交切比雪夫核 Ye et al. (2006)。Leake等人比较了通过使用LS-SVMs应用连接理论的应用
    Leake et al. (2019)。Baymani等人通过利用ϵ-LS-SVMs开发了一种新技术，以解析形式获得ODEs的解 Baymani et al.
    (2016)。Chu等人提出了一种改进的LS-SVMs数值解法。他们指出，通过使用简化的线性方程组，可以解决该问题。他们认为，所提方法的效率大约是先前算法的两倍
    Chu et al. (2005)。Pan等人利用核函数的性质，为SVMs提出了一种正交勒让德核函数，并将其与先前的核函数进行了比较 Pan et al.
    (2012)。Ozer等人借助广义切比雪夫多项式引入了一组新函数，并且他们还提高了先前工作的泛化能力 Ozer et al. (2011)。


    Lagaris等人提出了一种基于人工神经网络的方法，可以求解某些类别的ODEs和PDEs，后来将他们的方法与使用Galerkin有限元法获得的方法进行了比较
    Lagaris et al. (1998)。Meade和Fernandez从理论上说明了如何构建一个前馈神经网络来近似任意线性ODEs Meade et al.
    (1994)。他们还指出了直接构建前馈神经网络来近似非线性常微分方程而无需训练的方法 Meade et al. (1994)。Dissanayake和Phan-Thien提出了一种基于神经网络函数的求解PDEs的数值方法
    Dissanayake and Phan-Thien (1994)。为了求解ODEs和椭圆PDEs，Mai-Dy和Tran-Cong提出了依赖于多二次径向基函数网络的无网格过程
    Mai-Duy and Tran-Cong (2001)。Effati和Pakdaman通过利用前馈神经网络提出了一种求解模糊微分方程的新算法 Effati和Pakdaman
    (2010)。为了求解Volterra和Fredholm类型的线性第二类积分方程，Golbabai和Seifollahi提出了一种基于径向基函数网络的新方法，该方法应用神经网络作为积分的近似解'

    and since the Caputo derivative is a linear operator Hadian et al. (2020), we
    have


    $$_{a}^{C}\mathcal{D}_{x}^{\alpha}(\lambda f(x) + \mu g(x)) = \lambda _{a}^{C}\mathcal{D}_{x}^{\alpha}f(x)
    + \mu _{a}^{C}\mathcal{D}_{x}^{\alpha}g(x) \quad \lambda, \mu \in \mathbb{R}.$$


    # 10.2.2 Numerical Integration


    In numerical analysis, the quadrature rule is an approximation of the definite
    integral of a function, and it is usually stated as a weighted sum of function
    values at specified points within the considered domain of integration. An n-point
    Gaussian quadrature rule, named after Carl Friedrich Gauss, the German mathematician,
    is a quadrature rule constructed to yield an exact result for polynomials of degree
    $2n - 1$ or less, by a suitable choice of the nodes $x_i$ and weights $\omega_i
    = \int_{a}^{b} h_i(x)\omega(x) dx$ for $i = 1, 2, \ldots, n$. The most common
    domain of integration for such a rule is taken as $[-1, 1]$, but we assume the
    interval $[a, b]$ for the integral boundary so the rule is stated as


    $$\int_{a}^{b} f(x) dx \approx \sum_{i=1}^{n} \omega_i f(x_i)$$


    Now we consider the following theorem


    **Theorem 10.1** (Mastroianni and Milovanovic (2008)) *Suppose $x_0, x_1, \ldots,
    x_n$ as the roots of the orthogonal polynomial $p_{N+1}$ of order $N + 1$. Then
    there exist a unique set of quadrature weights $\omega_0, \omega_1, \ldots, \omega_N$
    defined as $\omega_j = \int_{a}^{b} h_j(x)\omega(x) dx$*


    $$\int_{a}^{b} \omega(x) p(x) dx \approx \sum_{i=1}^{n} \omega_i p(x_i) \quad
    \forall p \in P_{2N+1}$$


    *In which the weights are positive and calculated as follows:*


    $$\omega_i = \frac{k_{n+1}}{k_n} \frac{\|f_n\|_{\omega}^2}{f_n(x_i) f_{n+1}''(x_i)},
    \quad 0 \leq i \leq n$$


    *which $k_i$s are the leading coefficients of $f_i$*


    In the next section, the mentioned method is proposed by considering the Least
    squares support vector regression definition.'

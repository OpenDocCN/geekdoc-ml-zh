    machine method. In this chapter, some essential properties of Gegenbauer and fractional
    Gegenbauer functions are presented and reviewed, followed by the kernels of these
    functions, which are introduced and validated. Finally, the performance of these
    functions in addressing two issues (two example datasets) is evaluated.



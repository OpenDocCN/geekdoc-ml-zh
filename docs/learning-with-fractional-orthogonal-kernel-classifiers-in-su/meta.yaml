    ## Chapter 5

    Fractional Gegenbauer Kernel Functions: Theory and Application


    Sherwin Nedaei Janbesaraei, Amirreza Azmoon, and Dumitru Baleanu


    **Abstract** Because of the usage of many functions as a kernel, the support vector
    machine method has demonstrated remarkable versatility in tackling numerous machine
    learning issues. Gegenbauer polynomials, like the Chebyshev and Legendre polynomials
    which are introduced in previous chapters, are among the most commonly utilized
    orthogonal polynomials that have produced outstanding results in the support vector
    machine method. In this chapter, some essential properties of Gegenbauer and fractional
    Gegenbauer functions are presented and reviewed, followed by the kernels of these
    functions, which are introduced and validated. Finally, the performance of these
    functions in addressing two issues (two example datasets) is evaluated.


    **Keywords** Gegenbauer polynomial · Fractional Gegenbauer functions · Kernel
    trick · Orthogonal functions · Mercer’s theorem


    ### 5.1 Introduction


    *Gegenbauer polynomials* or better known as *ultra-spherical polynomials* are
    another family of classic orthogonal polynomials, named after Austrian mathematician
    *Leopold Bernhard Gegenbauer* (1849–1903). As the name itself suggests, *ultra-spherical
    polynomials* provide a natural extension to spherical harmonics in higher dimensions
    (Avery 2012). *Spherical harmonics* are special functions defined on the surface
    of a sphere. They are often being used in applied mathematics for solving differential
    equations (Doha 1998; Elliott 1960). In recent years, the classical orthogonal
    polynomials, especially the Gegenbauer orthogonal polynomials, have been used
    to address pattern recognition (Liao et al. 2002; Liao and Chen 2013; Herrera-Acosta
    et al. 2020), classification (Hjouji et al. 2021; Eassa et al. 2022), and kernel-based
    learning in many fields such as physic (Ludlow and Everitt 1995), medical image
    processing (Arfaoui et al. 2020; Stier et al. 2021; Öztrk et al. 2020), electronic
    (Tamandani and Alijani 2022), and other basic fields (Soufivand et al. 2021; Park
    2009; Feng and Varshney 2021). In 2006, Pawlak (2006) showed the benefits of the
    image reconstruction process based on Gegenbauer polynomials and corresponding
    moments. Then in the years that followed, Hosny (2011) used the high computational
    requirements of Gegenbauer moments to propose novel methods for image analysis
    and recognition, which in these studies, fractional-order shifted Gegenbauer moments
    (Hosny et al. 2020) and Gegenbauer moment invariants (Hosny 2014) are seen. Also
    in 2014, Abd Elaziz et al. (2019) used artificial bee colony based on orthogonal
    Gegenbauer moments to be able to classify galaxies images with the help of support
    vector machines. In 2009, with the help of the orthogonality property of the Gegenbauer
    polynomial, Langley and Zhao (2009) introduced a new 3D phase unwrapping algorithm
    for the analysis of magnetic resonance imaging (MRI). Also, in 1995, Ludlow studied
    the application of Gegenbauer polynomials to the emission of light from spheres
    (Ludlow and Everitt 1995). Clifford polynomials are particularly well suited as
    kernel functions for a higher dimensional continuous wavelet transform. In 2004,
    Brackx et al. (2004) constructed Clifford–Gegenbauer and generalized Clifford–Gegenbauer
    polynomials as new specific wavelet kernel functions for a higher dimensional
    continuous wavelet transform. Then, Ilić and Pavlović (2011) in 2011, with the
    use Christoffel–Darboux formula for Gegenbauer orthogonal polynomials, present
    the filter function solution that exhibits optimum amplitude as well as optimum
    group delay characteristics.


    Flexibility in using different kernels in the SVM algorithm is one of the reasons
    why orthogonal classical polynomials have recently been used as kernels. The Gegenbauer
    polynomial is one of those that have been able to show acceptable results in this
    area. In 2018, Padierna et al. (2018) introduced a formulation of orthogonal polynomial
    kernel functions for SVM classification. Also in 2020, he (Padierna et al. 2020)
    used this kernel to classify peripheral arterial disease in patients with type
    2 diabetes. In addition to using orthogonal polynomials as kernels in SVM to solve
    classification problems, these polynomials can be used as kernels in support vector
    regression (SVR) to solve regression problems as well as help examine time series
    problems. In 1992, Azari et al. (1992) proposed a corresponding ultra-spherical
    kernel. Also, in 2019, Feng suggests using extended support vector regression
    (X-SVR), a new machine-learning-based metamodel, for the reliability study of
    dynamic systems using first-passage theory. Furthermore, the power of X-SVR is
    strengthened by a novel kernel function built from the vectorized Gegenbauer polynomial,
    specifically for handling complicated engineering problems (Feng et al. 2019).
    On the other hand, in 2001, Ferrara and Guégan (2001) dealt with the k-factor
    extension of the long memory Gegenbauer process, in which this model investigated
    the predictive ability of the k-factor Gegenbauer model on real data of urban

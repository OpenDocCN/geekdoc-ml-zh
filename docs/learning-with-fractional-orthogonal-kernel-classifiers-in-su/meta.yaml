  md: 'et al. 1997) and polynomial kernel functions (Reddy et al. 2014; Yaman and
    Pelecanos 2013) perhaps are the most popular ones, because they are easy to learn,
    have acceptable performance in pattern classification, and are very computationally
    efficient. However, there are many other examples where the performance of those
    kernels is not satisfactory (Moghaddam and Hamidzadeh 2016). One of the well-established
    alternatives to these two kernels is the orthogonal kernel functions which have
    many useful properties embedded in their nature. These orthogonal functions are
    very useful in various fields of science as well as machine learning (Hajimohammadi
    et al. 2021; Tian and Wang 2017; Sun et al. 2015). It can be said that the simplest
    family of these functions is Chebyshev. This family of orthogonal functions has
    been used in different cases such as signal and image processing (Shuman et al.
    2018), digital filtering (Pavlović et al. 2013), spectral graph theory (Hadian
    Rasanana et al. 2019), astronomy (Capozziello et al. 2018), numerical analysis
    (Sedaghat et al. 2012; Zhao et al. 2017; Shaban et al. 2013; Kazem et al. 2012;
    Parand et al. 2019; Hadian-Rasanana and Rad 2020; Kazem et al. 2017), and machine
    learning (Mall and Chakraverty 2020). On the other hand, in the literature of
    numerical analysis and scientific computing, the Chebyshev polynomials have been
    used for solving various problems in fluid dynamics (Parand et al. 2017), theoretical
    physics (Parand and Delkhosh 2017), control (Hassani et al. 2019), and finance
    (Glau et al. 2019; Mesgarani et al. 2021). One of the exciting applications of
    the Chebyshev polynomials has been introduced by Mall and Chakraverty (Mall and
    Chakraverty 2015), where they used the Chebyshev polynomials as an activation
    function of functional link neural network. The functional link neural network
    is a kind of single-layer neural network which utilizes orthogonal polynomials
    as the activation function. This framework based on Chebyshev polynomials has
    been used for solving various types of equations such as ordinary, partial, or
    system of differential equations (Mall and Chakraverty 2017; Chakraverty and Mall
    2020; Omidi et al. 2021).


    > **Chebyshev polynomials** are named after Russian mathematician ***Pafnuty Lvovich
    Chebyshev*** (1821–1894). P.L. Chebyshev, the “extraordinary Russian mathematician”,
    had some significant contributions to mathematics during his career. His papers
    on the calculation of equations root, multiple integrals, the convergence of Taylor
    series, theory of probability, Poisson’s weak law of large numbers, and also integration
    by means of logarithms brought to him worldwide fame. Chebyshev wrote an important
    book titled “Teoria sravneny” which was submitted for his doctorate in 1849 and
    won a prize from *Académie des Sciences* of Paris. It was 1854 when he introduced
    the famous Chebyshev orthogonal Polynomials. He was appointed to a professorship
    at St. Petersburg University officially, for 22 years. Finally, he died in St.
    Petersburg on November 26, 1894.<sup>a</sup>


    <sup>a</sup> For more information about ***Chebyshev*** and his contribution in
    orthogonal polynomials visit: http://mathshistory.st-andrews.ac.uk/Biographies/Chebyshev.html.'

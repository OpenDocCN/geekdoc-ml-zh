  mdcn: '## 2.1.2 软间隔支持向量机


    软间隔支持向量机是一种为那些实际上并非线性可分的训练样本获取线性分类器的方法。类别重叠或包含一些噪声数据的可分类别就是这类问题的例子。在这些情况下，硬间隔支持向量机效果不佳，甚至无法得到正确答案。解决这些问题的一个方案是，尝试在最小化误分类点数量的同时，最大化正确分类的样本数量。但这种计数方案属于NP完全问题（Cortes
    和 Vapnik, 1995）。因此，一个高效的解决方案是定义一个连续问题，该问题可以通过某些优化技术在多项式时间内确定性地求解。为此，Cortes 和 Vapnik
    (1995) 提出了硬间隔方法的扩展，称为软间隔支持向量机方法。


    在软间隔方法中，允许样本违反条件，但这些违反的总量不应增加。实际上，软间隔方法试图在最小化总违反量的同时最大化间隔。因此，对于每个样本 $\mathbf{x}_i$，应定义一个松弛变量
    $\xi_i \geq 0$，它表示该样本偏离正确间隔的程度，并将该样本的不等式放宽为


    $$y_i(\mathbf{w}^T \mathbf{x}_i + w_0) \geq 1 - \xi_i. \tag{2.23}$$


    此外，总违反量为 $\sum_{i=1}^N \xi_i$，应将其最小化。因此，获取分离超平面的原始优化问题变为


    $$\min_{\mathbf{w}, w_0, \{\xi_i\}_{i=1}^N} \frac{1}{2} \mathbf{w}^T \mathbf{w}
    + C \sum_{i=1}^N \xi_i \tag{2.24}$$

    $$\text{s.t.} \quad y_i(\mathbf{w}^T \mathbf{x}_i + w_0) \geq 1 - \xi_i, \quad
    i = 1, \ldots, N,$$

    $$\xi_i \geq 0,$$


    其中 $C$ 是一个正则化参数。$C$ 值较大意味着几乎忽略条件，因此如果 $C \to \infty$，该方法等同于硬间隔支持向量机。相反，如果 $C$
    值较小，条件容易被放宽，从而获得较大的间隔。因此，应根据问题和目的按比例使用适当的 $C$ 值。


    如果样本 $\mathbf{x}_i$ 被正确分类，但位于间隔内部，则 $0 < \xi_i < 1$。否则 $\xi_i > 1$，这是因为样本 $\mathbf{x}_i$
    被错误分类，是一个误分类点（见图 2.4）。


    如公式 2.24 所示，该问题仍然是一个凸二次规划问题，并且与硬间隔方法不同，它总能获得可行解。


    这里讨论软间隔支持向量机的对偶形式。拉格朗日公式为


    $$\mathcal{L}(\mathbf{w}, w_0, \xi, \alpha, \beta) = \frac{1}{2} \|\mathbf{w}\|^2
    + C \sum_{i=1}^N \xi_i + \sum_{i=1}^N \alpha_i (1 - \xi_i - y_i (\mathbf{w}^T
    \mathbf{x}_i + w_0)) - \sum_{i=1}^N \beta_i \xi_i, \tag{2.25}$$


    其中 $\alpha_i$ 和 $\beta_i$ 是拉格朗日乘子。拉格朗日公式应关于 $\mathbf{w}$、$w_0$ 和 $\xi_i$ 最小化，同时关于正的拉格朗日乘子
    $\alpha_i$ 和 $\beta_i$ 最大化。为了找到 $\min_{\mathbf{w}, w_0, \xi} \mathcal{L}(\mathbf{w},
    w_0, \xi, \alpha, \beta)$，我们有


    $$\begin{cases} \nabla_{\mathbf{w}} \mathcal{L}(\mathbf{w}, w_0, \xi, \alpha,
    \beta) = 0 & \rightarrow \mathbf{w} = \sum_{i=1}^N \alpha_i y_i \mathbf{x}_i,
    \\ \frac{\partial \mathcal{L}(\mathbf{w}, w_0, \xi, \alpha, \beta)}{\partial w_0}
    = 0 & \rightarrow \sum_{i=1}^N \alpha_i y_i = 0, \\ \frac{\partial \mathcal{L}(\mathbf{w},
    w_0, \xi, \alpha, \beta)}{\partial \xi_i} = 0 & \rightarrow C - \alpha_i - \beta_i
    = 0. \end{cases} \tag{2.26}$$


    将上述方程中的 $\mathbf{w}$ 代入公式 2.25 的拉格朗日函数，可以得到与公式 2.16 相同的方程。但是，这里对 $\alpha$ 产生了两个约束。一个与之前相同，另一个是
    $0 \le \alpha_i \le C$。需要注意的是，$\beta_i$ 不出现在公式 2.16 的 $\mathcal{L}(\alpha)$ 中，只需考虑
    $\beta_i \ge 0$。因此，条件 $C - \alpha_i - \beta_i = 0$ 可以替换为条件 $0 \le \alpha_i \le
    C$。所以，问题公式 2.24 的对偶形式变为如下：


    $$\max_{\alpha} \left\{ \sum_{i=1}^N \alpha_i - \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N
    \alpha_i \alpha_j y_i y_j \mathbf{x}_i^T \mathbf{x}_j \right\} \tag{2.27}$$


    s.t. $\sum_{i=1}^N \alpha_i y_i = 0$,

    $0 \le \alpha_i \le C, \quad i = 1, \dots, N.$


    求解上述二次规划问题后，可以根据公式 (2.20) 和 (2.21) 分别获得 $\mathbf{w}$ 和 $w_0$，同时仍然定义 $S = \{i |
    \mathbf{x}_i \in SV\}$。如前所述，支持向量集 ($SV$) 是基于样本 $\mathbf{x}_i$ 的互补松弛条件 $\alpha_i^*
    (1 - y_i (\mathbf{w}^{*T} \mathbf{x}_i + w_0^*)) = 0$ 获得的。公式 2.24 的另一个互补松弛条件是
    $\beta_i^* \xi_i = 0$。据此，支持向量分为两类：间隔支持向量和非间隔支持向量：


    - 如果 $0 < \alpha_i < C$，根据条件 $C - \alpha_i - \beta_i = 0$，我们有 $\beta_i \neq 0$，因此
    $\xi_i$ 应为零。所以，$y_i (\mathbf{w}^T \mathbf{x}_i + w_0) = 1$ 成立，样本 $\mathbf{x}_i$
    位于间隔上，是一个间隔支持向量。

    - 如果 $\alpha_i = C$，我们有 $\beta_i = 0$，因此 $\xi_i$ 可以大于零。所以，$y_i (\mathbf{w}^T \mathbf{x}_i
    + w_0) < 1$，样本 $\mathbf{x}_i$ 位于间隔上或间隔外，是一个非间隔支持向量。


    此外，软间隔支持向量机中新样本的分类公式与硬间隔支持向量机相同，后者在公式 2.22 中讨论过。


    ## 2.2 非线性支持向量机分类器


    一些问题具有非线性决策面，因此线性方法无法为其提供合适的答案。Vapnik (2000) 为这些问题引入了非线性支持向量机分类器。在这种方法中，输入数据通过一个非线性函数映射到一个新的特征空间，并在变换后的特征空间中找到一个超平面。通过应用逆映射，该超平面在输入数据空间中变成一条曲线或一个曲面（见图
    2.5）。


    对输入空间应用变换 $\phi : \mathbb{R}^d \rightarrow \mathbb{R}^k$，样本 $\mathbf{x} = [x_1,
    \dots x_d]$ 在变换空间中可以表示为 $\phi(\mathbf{x}) = [\phi_1(\mathbf{x}), \dots, \phi_k(\mathbf{x})]$，其中
    $\phi_i(\mathbf{x}) : \mathbb{R}^d \rightarrow \mathbb{R}$。变换空间中软间隔支持向量机的原始问题如下：


    $$\min_{\mathbf{w}, w_0, \{\xi_i\}_{i=1}^N} \frac{1}{2} \mathbf{w}^T \mathbf{w}
    + C \sum_{i=1}^N \xi_i$$


    s.t. $y_i(\mathbf{w}^T \phi(\mathbf{x}_i) + w_0) \geq 1 - \xi_i, \quad i = 1,
    \dots, N,$


    $\xi_i \geq 0,$


    其中 $\mathbf{w} \in \mathbb{R}^k$ 是需要求解的分离参数。


    对偶问题公式 2.27 在变换空间中也发生变化，如下所示：


    $$\max_{\alpha} \left\{ \sum_{i=1}^N \alpha_i - \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N
    \alpha_i \alpha_j y_i y_j \phi(\mathbf{x}_i)^T \phi(\mathbf{x}_j) \right\}$$


    s.t. $\sum_{i=1}^N \alpha_i y_i = 0,$


    $0 \leq \alpha_i \leq C, \quad i = 1, \dots, N.$


    在这种情况下，分类器定义为


    $$\hat{y} = \text{sign}(w_0 + \mathbf{w}^T \phi(\mathbf{x})),$$


    其中 $\mathbf{w} = \sum_{\alpha_i > 0} \alpha_i y_i \phi(\mathbf{x}_i)$ 且 $w_0 =
    y_{s_j} - \mathbf{w}^T \phi(\mathbf{x}_{s_j})$，其中 $\mathbf{x}_{s_j}$ 是来自支持向量集的样本。


    这种方法的挑战在于选择合适的变换。如果使用了合适的映射，问题可以在变换空间中以良好的精度建模。但是，如果 $k \gg d$，那么需要学习的参数更多，这会花费更多的计算时间。在这种情况下，最好使用下一节提到的核技巧。核技巧是一种无需显式地将特征映射应用于输入数据即可使用特征映射的技术。


    ### 2.2.1 核技巧与Mercer条件


    在基于核的方法中，无需对输入数据应用变换函数即可获得高维空间中的线性分离器。在优化问题公式 2.29 的对偶形式中，只存在每对训练样本的点积。通过计算这些内积的值，只剩下计算
    $\alpha = [\alpha_1, \dots, \alpha_N]$。因此，与原始问题公式 2.28 不同，这里不需要学习 $k$ 个参数。当 $k
    \gg d$ 时，这一点的重要性就显而易见了。


    让我们定义 $K(\mathbf{x}, \mathbf{t}) = \phi(\mathbf{x})^T \phi(\mathbf{t})$ 为核函数。核技巧的基础是在不将样本
    $\mathbf{x}$ 和 $\mathbf{t}$ 映射到变换空间的情况下计算 $K(\mathbf{x}, \mathbf{t})$。例如，考虑一个二维输入数据集，并定义一个核函数如下：'

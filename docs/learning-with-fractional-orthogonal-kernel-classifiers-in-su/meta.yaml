    \ 条件 $K(x, z)$ 可以如下计算：\n\n$\\iint K(x, z)w(x, z)f(x)f(z)dxdz = \\iint \\sum_{j=0}^{n}\
    \ P_j(x)P_j^T(z)f(x)f(z)dxdz,$\n$= \\sum_{j=0}^{n} \\iint P_j(x)P_j^T(z)f(x)f(z)dxdz,$\n\

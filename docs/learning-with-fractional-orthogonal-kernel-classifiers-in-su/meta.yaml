  md: '# Chapter 4

    Fractional Legendre Kernel Functions:

    Theory and Application


    Amirreza Azmoon, Snehashish Chakraverty, and Sunil Kumar


    **Abstract** The support vector machine algorithm has been able to show great
    flexibility in solving many machine learning problems due to the use of different
    functions as a kernel. Linear, radial basis functions, and polynomial functions
    are the most common functions used in this algorithm. Legendre polynomials are
    among the most widely used orthogonal polynomials that have achieved excellent
    results in the support vector machine algorithm. In this chapter, some basic features
    of Legendre and fractional Legendre functions are introduced and reviewed, and
    then the kernels of these functions are introduced and validated. Finally, the
    performance of these functions in solving two problems (two sample datasets) is
    measured.


    **Keywords** Legendre polynomial · Fractional legendre functions · Kernel trick
    · Orthogonal functions · Mercer’s theorem


    # 4.1 Introduction


    Another family of classic complete and orthogonal polynomials is the family of
    *Legendre Polynomials*, which was discovered by French mathematician *Adrien-Marie
    Legendre* (1752–1833) in 1782.



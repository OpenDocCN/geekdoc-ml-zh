    # 9.2.3 Volterra-Fredholm Integral Equations


    Volterra-Fredholm integral equations are a combination of the Fredholm and Volterra
    integral equations. These equations are obtained from parabolic boundary value
    problems Wazwaz (2011, 2015), Rahman (2007) and can also be derived from spatio-temporal
    epidemic modeling Brunner (1990), Maleknejad and Hadizadeh (1999). Several numerical
    methods have been proposed for solving the Volterra-Fredholm integral model. For
    example, Brunner has developed a Spline collocation method for solving nonlinear
    Volterra-Fredholm integral equation appeared in spatio-temporal development of
    epidemic Brunner (1990), Maleknejad and colleagues have utilized a collocation
    method based on orthogonal triangular functions for this kind of problems Maleknejad
    et al. (2010), and Legendre wavelet collocation method is applied to these problems
    by Yousefi and Razzaghi (2005). To see more, the interested reader can see Parand
    and Rad (2012), Ghasemi et al. (2007), Babolian et al. (2009), and Babolian and
    Shaerlar (2011).


    In a one-dimensional linear case, these equations can be written as follows Wazwaz
    (2011, 2015), Rahman (2007):


    $u(x) = f(x) + \lambda_1 \int_{a}^{b} K_1(x, t)u(t)dt + \lambda_2 \int_{g(x)}^{h(x)}
    K_2(x, t)u(t)dt,$


    which include Fredholm and Volterra integral operators.


    **Remark 9.1** *(First and second kind integral equations)* It should be noted
    that if $u(x)$ only appears under the integral sign, it is called the first kind;
    otherwise, if the unknown function appears inside and outside the integral sign,
    it is named the second kind. For instance, Eq. 9.1 is a second kind Volterra integral
    equation and the equation below $f(x) = \lambda \int_{g(x)}^{h(x)} K(x, t)u(t)dt$
    is the first kind.


    **Remark 9.2** *(Linear and nonlinear integral equations)* Suppose we have the
    integral equation $\psi(u(x)) = f(x) + \lambda \int_{g(x)}^{h(x)} K(x, t)\phi(u(t))dt$.
    If either $\psi(x)$ or $\phi(x)$ be a nonlinear function, the equation is called
    nonlinear. In the case of the first kind Volterra integral equation, we have $f(x)
    = \lambda \int_{g(x)}^{h(x)} K(x, t)\phi(u(t))dt$.


    **Remark 9.3** *(Homogeneous and inhomogeneous integral equations)* In the field
    of integral equations, the function $f(x)$, which appeared in previous equations,
    is defined as the data function. This function plays an important role in determining
    the solution of the integral equation. It is known if the function $f(x)$ is on
    the function'

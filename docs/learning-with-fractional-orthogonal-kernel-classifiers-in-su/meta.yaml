    \n## 4.3 勒让德核函数\n\n本节首先介绍普通勒让德多项式核公式。然后，将介绍该核函数的其他一些版本，最后，本节将介绍分数阶勒让德多项式核。\n\n\
    ### 4.3.1 普通勒让德核函数\n\n勒让德多项式与其他多项式一样是正交的，不同之处在于勒让德多项式的权函数是一个值为 1 的常数函数（w(x) =\
    \ 1）。因此，根据公式 4.2 和 4.3，对于不同的 m 和 n，勒让德多项式在权函数为 1 的情况下彼此正交。这使我们能够构建没有分母的勒让德核。因此，对于标量输入\
    \ x 和 z，勒让德核定义如下：\n\n$K(x, z) = \\sum_{i=0}^{n} P_i(x) P_i(z) = < \\phi(x), \\\
    phi(z) >,$\n\n其中 $<, >$ 是内积，唯一参数 $n$ 是勒让德多项式的最高阶数，由勒让德核确定的非线性映射为\n\n$\\phi(x)\
    \ = (P_0(x), P_1(x), ..., P_n(x)) \\in \\mathbb{R}^{n+1}.$\n\n现在，根据这个公式，可以看出 $\\\
    phi(x)$ 的值彼此正交，这表明勒让德核也是正交的（Shawe-Taylor 和 Cristianini，2004）。\n\n**定理 4.1**（Pan\

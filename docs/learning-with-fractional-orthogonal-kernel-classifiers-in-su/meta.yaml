  mdcn: "## 11.3.1 分析训练函数\n\n在 `fit` 函数的开头，双重嵌套的 `for` 循环计算 $K$ 矩阵。矩阵 $K$ 是一个二维矩阵，每个维度的大小等于训练样本数。在嵌套循环内部，每次迭代都会计算一个切比雪夫函数。切比雪夫计算的递归形式并不合适。在递归函数中，处理调用栈以及始终返回每次函数调用的结果是有问题的。基于\
    \ GPU 的实现对于递归函数执行的重复内存访问任务效率不高。然而，$T_n$ 多项式有一个显式形式，称为切比雪夫多项式。关于切比雪夫函数及其显式形式的更多细节，请参考第\
    \ 3 章。矩阵 $P$ 是矩阵 $K$ 与目标数组的向量化外积进行内积运算的结果。`fit` 函数下一个复杂的部分是二次规划（QP）求解器。对于 GPU\
    \ 加速的情况，CUDA 有其自己的 QP 求解器 API。\n\n## 11.3.2 分析测试函数\n\n在预测函数（测试或推理）中，复杂的部分是嵌套循环内部的迭代，而该迭代又包含对切比雪夫函数的调用。如第\
    \ 11.3.1 节所述，由于 GPU 缺乏高效的栈处理能力，我们避免使用递归函数，因此使用它们并无帮助。所以，对于测试函数，我们处理切比雪夫函数调用的方式与训练函数中相同。\n\
    \n## 11.4 硬件和软件要求\n\n到目前为止，我们已经详细阐述了为 SVM 应用选择合适的 GPU 架构。在我们的应用（加速 LS-SVM 程序）中，单精度\
    \ GPU 设备在计算上是足够的，同时它也符合性能-成本限制。这与训练阶段形成对比，在训练阶段更倾向于使用双精度 GPU。本工作已在基于 Turing 架构的\
    \ NVIDIA Tesla T4 GPU 设备上进行了测试，这是一款节能的 GPU 设备，具有 16GB 内存、2560 个 CUDA 核心和 8.1 TFLOPS\
    \ 的性能；但是，任何其他支持 CUDA 的 GPU 设备都可以用于此目的。作为复制此平台的第一步，必须为您的设备安装 CUDA 工具包和相应的驱动程序。然后，必须在操作系统中安装\
    \ Python3。Python 可以独立安装，也可以通过 Anaconda 平台及其库一起安装。作为替代方案，我们建议使用 Google Colab Welcome\
    \ To Colaboratory (2021)，只需注册并在网页上点击几下即可获得所有硬件要求和软件驱动程序。\n\n### 使用以下命令安装 PyCUDA\n\
    \n```\npip3 install pycuda\n```\n\n### 要检查 CUDA 工具包及其功能，请执行此命令\n\n```\nnvidia-smi\n\
    ```\n\n上述命令的结果如图 11.4 所示，其中显示了 GPU 卡信息及其运行进程。为了测试 PyCUDA，可以执行用 Python3 实现的程序 1。\n\
    \n### 程序 1：用于测试库和驱动程序的第一个 PyCUDA 程序\n\n```\n1:  import pycuda.driver as cuda\n\
    2:  import pycuda.autoinit\n3:  from pycuda.compiler import SourceModule\n4:\n\
    5:  if __name__ == \"__main__\":\n6:\n7:      mod = SourceModule(\"\"\"\n8:  \

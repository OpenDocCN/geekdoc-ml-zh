    et al. (2014)


    especially compared to the speed of host memory or the GPU dedicated memory. The
    maximum speed of data transferred is limited to the PCI express bus speed, as
    the GPU is connected to the host using the PCI express bus. Consequently, data
    transmission often has the highest cost in GPU computation. Several methods have
    been tried to avoid data transfers when costs exceed the gain of GPU computation
    AlSaber et al. (2013). Therefore, GPU programming has many limitations that need
    to be considered to achieve higher performance. For example, the amount of shared
    memory capacity and the sequence of process executions and branch divergence,
    or other bottlenecks, which are needed to be fixed by considering the GPU architecture.

    5.30 中的先前相应定义，即：


    $$f w^{\alpha, \lambda}(x, z) = \left( \left( 1 - \left( \frac{x-a}{b-a} \right)^{2\alpha}
    \right) \left( 1 - \left( \frac{z-a}{b-a} \right)^{2\alpha} \right) \right)^{\lambda
    - \frac{1}{2}} + \epsilon. \tag{5.41}$$


    因此，分数阶 Gegenbauer 核函数为：


    $$K_{FGeg}(X, Z) = \prod_{j=1}^{d} \sum_{i=0}^{n} G_{i}^{\lambda}(x''_{x_{j}})
    G_{j}^{\lambda}(x''_{z_{j}}) f w^{\alpha, \lambda}(x''_{x_{j}}, x''_{z_{j}}) u(G_{j}^{\lambda})^{2}.
    \tag{5.42}$$


    **定理 5.3** 式 5.42 中引入的 Gegenbauer 核函数是一个有效的 Mercer 核。



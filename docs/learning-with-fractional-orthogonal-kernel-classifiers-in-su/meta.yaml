    需要注意的是，$u(G_{i}^{\lambda})$ 始终为正且与数据无关，因此：


    $$=\sum_{i=0}^{n} u\left(G_{i}^{\lambda}\right)^{2} \iint G_{i}^{\lambda}(x) G_{i}^{\lambda}(z)\left(1-x^{2}\right)^{\lambda-\frac{1}{2}}\left(1-z^{2}\right)^{\lambda-\frac{1}{2}}

    In this chapter, the LS-SVM algorithm together with the rational Legendre functions
    as kernel functions is used to solve the Lane-Emden equation. In our proposed
    method, the constraints are the collocation form of the residual function. Then
    the coefficients of approximate solutions together with the error function are
    minimized. To obtain the solution to the minimization problem, the Lagrangian
    function is used and the problem is solved in dual form.


    The remainder of this chapter is organized as follows. In Sect. 7.2, the LS-SVM
    formulation is discussed which is used to solve differential equations. The kernel
    trick is also introduced in Sect. 7.3, and their properties together with the
    operational matrix of differentiation are presented. In Sect. 7.4, the LS-SVM
    formulation of the Lane-Emden equation is given and the problem is solved in dual
    form. Finally, the numerical results are presented which show the efficiency of
    the proposed technique.


    # 7.2 LS-SVM Formulation


    We consider the general form of an $m$-th order initial value problem (IVP), which
    is as follows:


    ```

    $$L[y(x)] - F(x) = 0, \quad x \in [a, c],$$

    $$y^{(i)}(a) = p_i, \quad i = 0, 1, \ldots, m - 1,$$

    ```


    where $L$ represents an ordinary differential operator, i.e.,


    ```

    $$L[y(x)] = L(x, y(x), y''(x), \ldots, y^{(m)}(x)),$$

    ```


    and $F(x)$ and $\{p_i\}_{i=0}^{m-1}$ are known. The aim is to find a learning
    solution to this equation by using the LS-SVM formulation.


    We assume that we have training data $\{x_i, y_i\}_{i=0}^N$, in which $x_i \in
    \mathbb{R}$ is the input data and $y_i \in \mathbb{R}$ is output data. To solve
    the ODE, one-dimensional data is sufficient. Then, the solution to our regression
    problem is approximated by $y(x) = \boldsymbol{w}^T \boldsymbol{\varphi}(x)$,

    # 5.5 Conclusion


    Gegenbauer (ultra-spherical) orthogonal polynomials are very important among orthogonal
    polynomials since they have been used to address many differential equation problems,
    specifically in spherical spaces as its name suggests. This chapter gives a brief
    background on the research history and explained the basics and properties of
    these polynomials, and constructed the related kernel function which have been
    reviewed. Moreover, the novel method of the fractional Gegenbauer orthogonal polynomials
    and the corresponding kernels have been introduced, and in the'

    \ is not appropriate. In recursive functions, handling the stack and always returning\
    \ the results of each function call is problematic. GPU-based implementations\
    \ of the repeated memory access tasks by recursive functions are not efficient.\
    \ However, the $T_n$ polynomial has an explicit form, which is called the Chebyshev\
    \ polynomial. For more details of the Chebyshev function and its explicit form,\

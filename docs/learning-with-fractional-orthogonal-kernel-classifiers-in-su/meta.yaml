  md: '$$G_n^\lambda(x, z) = \sum_{n=0}^{\infty} G_n^\lambda(x) z^n.$$


    Gegenbauer polynomials can be obtained by the following recursive formula (Olver
    et al. 2010; Yang et al. 2020; Hadian-Rasanan et al. 2019):


    $$G_0^\lambda(x) = 1, \quad G_1^\lambda(x) = 2\lambda x,$$

    $$G_n^\lambda(x) = \frac{1}{n}[2x(n + \lambda - 1)G_{n-1}^\lambda(x) - (n + 2\lambda
    - 2)G_{n-2}^\lambda(x)].$$


    Also, other recursive relations for this orthogonal polynomial are as follows
    (Doman 2015):


    $$(n + 2)G_{n+2}^\lambda(x) = 2(\lambda + n + 1)xG_{n+1}^\lambda(x) - (2\lambda
    + n)G_n^\lambda(x),$$

    $$nG_n^\lambda(x) = 2\lambda\{xG_{n-1}^{\lambda+1}(x) - G_{n-2}^{\lambda+1}(x)\},$$

    $$(n + 2\lambda)G_n^\lambda(x) = 2\lambda\{G_n^{\lambda+1}(x) - xG_{n-1}^{\lambda+1}(x)\},$$

    $$nG_n^\lambda(x) = (n - 1 + 2\lambda)xG_{n-1}^\lambda(x) - 2\lambda(1 - x^2)G_{n-2}^{\lambda-1}(x),$$

    $$\frac{d}{dx}G_n^\lambda = 2\lambda G_{n+1}^{\lambda-1}.$$


    Everyone who has tried to generate Gegenbauer polynomials has experienced some
    difficulties as the number of terms rises at each higher order, for example, for
    the orders of zero to four, in the following:


    $$G_0^\lambda(x) = 1,$$

    $$G_1^\lambda(x) = 2\lambda x,$$

    $$G_2^\lambda(x) = (2\lambda^2 + 2\lambda)x^2 - \lambda,$$

    $$G_3^\lambda(x) = \left(\frac{4}{3}\lambda^3 + 4\lambda^2 + \frac{8}{3}\lambda\right)x^3
    + (-2\lambda^2 - 2\lambda)x,$$

    $$G_4^\lambda(x) = \left(\frac{2}{3}\lambda^4 + 4\lambda^3 + \frac{22}{3}\lambda^2
    + 4\lambda\right)x^4 + (-2\lambda^3 - 6\lambda^2 - 4\lambda)x^2,$$


    which are depicted in Figs. 5.1, 5.2, and there will be more terms in higher orders
    subsequently. To overcome this difficulty *Pochhammer polynomials* have already
    been used to simplify (Doman 2015). The *Pochhammer polynomials* or the *rising
    factorial* is defined as


    $$x^{(n)} = x(x + 1)(x + 2) \cdots (x + n - 1) = \prod_{k=1}^{n}(x + k - 1).$$'

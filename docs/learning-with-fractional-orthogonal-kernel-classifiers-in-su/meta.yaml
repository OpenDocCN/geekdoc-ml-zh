    # 第三章

    分数切比雪夫核函数：

    理论与应用


    ![](img/a1d5f013073c7da63184a763d887fe2f_50_0.png)


    Amir Hosein Hadian Rasanana, Sherwin Nedaei Janbesaraei,

    和 Dumitru Baleanu


    **摘要** 正交函数具有许多有用的性质，可用于机器学习的不同目的。正交函数的主要应用之一是为支持向量机算法生成强大的核函数。也许可用于生成核函数的最简单的正交函数是切比雪夫多项式。在本章中，回顾了切比雪夫多项式和分数切比雪夫函数的一些基本性质后，介绍了各种切比雪夫核函数，并引入了分数切比雪夫核函数。最后，在两个样本数据集上展示了各种切比雪夫核函数的性能。


    **关键词** 切比雪夫多项式 · 分数切比雪夫函数 · 核技巧 · 正交函数 · Mercer定理


    ## 3.1 引言


    如前几章所述，核函数在SVM算法的性能中起着至关重要的作用。在SVM文献中，已经开发了各种核函数并应用于多个数据集 (Hussain et al. 2011;
    Ozer et al. 2011; An-na et al. 2010; Padierna et al. 2018; Tian and Wang 2017)，但每种核函数都有其自身的优点和局限性
    (Achirul Nanda et al. 2018; Hussain et al. 2011)。径向基函数 (RBF) (Musavi et al. 1992;
    Scholkopf et al. 1997) 和多项式核函数 (Reddy et al. 2014; Yaman and Pelecanos 2013) 也许是最流行的，因为它们易于学习，在模式分类中具有可接受的性能，并且计算效率非常高。然而，也有许多其他例子表明这些核函数的性能并不令人满意
    (Moghaddam and Hamidzadeh 2016)。这两种核函数的一个成熟的替代方案是正交核函数，其本质中嵌入了许多有用的性质。这些正交函数在科学和机器学习的各个领域都非常有用
    (Hajimohammadi et al. 2021; Tian and Wang 2017; Sun et al. 2015)。可以说，这些函数中最简单的族是切比雪夫族。这类正交函数已用于不同领域，例如信号和图像处理
    (Shuman et al. 2018)、数字滤波 (Pavlović et al. 2013)、谱图理论 (Hadian Rasanana et al.
    2019)、天文学 (Capozziello et al. 2018)、数值分析 (Sedaghat et al. 2012; Zhao et al. 2017;
    Shaban et al. 2013; Kazem et al. 2012; Parand et al. 2019; Hadian-Rasanana and
    Rad 2020; Kazem et al. 2017) 和机器学习 (Mall and Chakraverty 2020)。另一方面，在数值分析和科学计算文献中，切比雪夫多项式已被用于解决流体动力学
    (Parand et al. 2017)、理论物理 (Parand and Delkhosh 2017)、控制 (Hassani et al. 2019)
    和金融 (Glau et al. 2019; Mesgarani et al. 2021) 中的各种问题。Mall 和 Chakraverty 介绍了切比雪夫多项式的一个令人兴奋的应用
    (Mall and Chakraverty 2015)，他们将切比雪夫多项式用作函数链神经网络的激活函数。函数链神经网络是一种单层神经网络，利用正交多项式作为激活函数。这个基于切比雪夫多项式的框架已被用于解决各种类型的方程，例如常微分方程、偏微分方程或微分方程组
    (Mall and Chakraverty 2017; Chakraverty and Mall 2020; Omidi et al. 2021)。


    > **切比雪夫多项式**以俄罗斯数学家 ***帕夫努季·利沃维奇·切比雪夫*** (1821–1894) 的名字命名。P.L. 切比雪夫，这位“非凡的俄罗斯数学家”，在他的职业生涯中对数学做出了重大贡献。他关于方程根计算、多重积分、泰勒级数收敛性、概率论、泊松弱大数定律以及对数积分的论文为他赢得了世界声誉。切比雪夫写了一本重要的书，题为“Teoria
    sravneny”，该书于1849年提交作为他的博士论文，并获得了巴黎 ***法兰西科学院*** 的奖项。1854年，他引入了著名的切比雪夫正交多项式。他被正式任命为圣彼得堡大学教授，任职22年。最终，他于1894年11月26日在圣彼得堡逝世。<sup>a</sup>


    <sup>a</sup> 关于 ***切比雪夫*** 及其在正交多项式方面贡献的更多信息，请访问：http://mathshistory.st-andrews.ac.uk/Biographies/Chebyshev.html。'

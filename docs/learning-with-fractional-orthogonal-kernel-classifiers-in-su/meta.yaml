    # 12.4.4 Jacobi Class


    The **Jacobi** kernel is the last orthogonal kernel currently available in the
    *ORSVM* package. *Jacobi kernel* is available to choose from when the ORSVM package
    is imported. Simply, the kernel name should be “Jacobi” during the initiation
    of an object from the *Model* class. The Jacobi class needs the following parameters:


    +   - *order* := Order of the Jacobi kernel function.

    - *psi* := The $\psi$ parameter of Jacobi kernel function.

    - *omega* := The $\omega$ parameter of Jacobi kernel function.

    - *noise* := A small noise to weight function to avoid errors at boundaries.


    # 12.5 Transformation Function


    The transformation function is actually the composition of the well-known *Min-max
    feature scaling*

    $$x'' = \frac{x - x_{min}}{x_{max} - x_{min}},$$

    and the mapping equation already introduced for the fractional form of all kernels.

    $$x'' = 2x^{\alpha} - 1,$$

    so we have

    $$x'' = 2\left(\frac{x - x_{min}}{x_{max} - x_{min}}\right)^{\alpha} - 1,$$

    which transforms the input $x$ into the kernel space related to the fractional
    order of function ($\alpha$). Therefore, the transformation function requires
    the $x$ (input data) and alpha ($''T''$ as a parameter of the Model class, $''T''$
    represents the transformation step.) which is 1 by default and causes to normalize
    the input data as the Min-max feature scaling function does. The user never needs
    to call the transformation function directly, but in the case one needs so


    ```

    import orsvm

    orsvm.transformation(x, T=1).

    ```


    # 12.6 How to Use


    Using the ORSVM library is easy and straightforward. The simplicity of use has
    been an important motivation in developing the ORSVM package. The user only'

    ## 3.3.2.2 统一切比雪夫核 (UCK)


    如前所述，存在四种切比雪夫多项式。Zhao 等人 (2013) 通过结合第一类 ($T_n$) 和第二类 ($U_n$) 切比雪夫多项式，提出了一种新的核。应当注意，第二类切比雪夫多项式在区间
    $(-1, 1)$ 上关于以下权重函数是正交的 (Mason and Handscomb 2002)：


    $w_{U_n}(x) = \sqrt{1 - x^2}$, (3.46)


    而第一类切比雪夫多项式的三角关系在 3.3 节中已介绍，第二类多项式由 Mason and Handscomb (2002) 描述为：



  md: '# 9.2.1 Fredholm Integral Equations


    Fredholm integral equations are an essential class of integral equations used
    in image processing Mohammad (2019) and reinforcement learning problems Keller
    and Dahm (2019), Dahm and Keller (2016). Since analytical methods for finding
    the exact solution are only available in specific cases, various numerical techniques
    have been developed to approximate the exact solution of these types of equations
    as well as a larger class of these models such as Hammerstein, the system of equations,
    multi-dimensional equations, and nonlinear equations. Here, a brief overview of
    some numerical methods for these integral equations is given. The local radial
    basis function method was presented in Assari et al. (2019) for solving Fredholm
    integral equations. Also, Bahmanpour et al. developed the Müntz wavelets method
    Bahmanpour et al. (2019) to simulate these models. On the other hand, Newton-Raphson
    and Newton-Krylov methods were used for solving one- and two-dimensional nonlinear
    Fredholm integral equations Parand et al. (2019). In another work, the least squares
    support vector regression method was proposed to solve Fredholm integral equations
    Parand et al. (2021). To see more, the interested reader can see Amiri et al.
    (2020), Maleknejad and Nosrati Sahlan (2010), Li and Wu (2021), and Rad and Parand
    (2017a,b).


    For any $a, b, \lambda \in \mathbb{R}$, the following equation is called a Fredholm
    integral equation Wazwaz (2011, 2015), Rahman (2007)


    $$u(x) = f(x) + \lambda \int_{a}^{b} K(x, t)u(t)dt,$$


    where $u(x)$ is the unknown function and $K(x, t)$ is the kernel of the equation.



    algorithms and others are newly created and lead to astonishing progress. Although
    deep learning techniques are dominant in many real applications such as image
    processing (e.g., for image classification) and sequential data modeling (e.g.,
    in natural language processing tasks such as machine translation), these techniques
    require a huge amount of training data for success modeling. Large-scale labeled
    datasets are not available in many applications in which other ML techniques (called
    classical ML methods) such as SVM, decision tree, and Bayesian family methods
    have higher performance than deep learning techniques. Furthermore, there is another
    fact in ML. Each task in ML applications can be solved using various methods;
    however, there is no single algorithm that will work well for all tasks. This
    fact is known as the No Free Lunch Theorem in ML Wolpert (1996). Each task that
    we want to solve has its idiosyncrasies and there are various ML algorithms to
    suit the problem. Among the non-deep learning methods, SVM, as a well-known machine
    learning technique, is widely used in various classification and regression tasks
    today due to its high performance and reliability across a wide variety of problem
    domains and datasets Cervantes et al. (2020). Generally, SVM can be applied to
    any ML task in any application such as computer vision and image processing, natural
    language processing (NLP), medical applications, biometrics, and cognitive science.
    In the following, some common applications of SVM are reviewed.'

    # 4.2.2 Properties of Fractional Legendre Functions


    Legendre polynomials of fractional order of $\alpha$ (called $FP_n^\alpha(x)$)
    over the finite interval $[a, b]$ by use of mapping $x'' = 2(\frac{x-a}{b-a})^\alpha
    - 1$, $(\alpha > 0)$ that $x'' \in [-1, 1]$, are defined as Kazem et al. (2013)


    $FP_n^\alpha(x) = P_n(x'') = P_n(2(\frac{x-a}{b-a})^\alpha - 1).$


    Also, the generating function for fractional Legendre is defined in the same way
    as the generating function for Legendre, with the difference that in this function
    $x$ is defined as $(x = 2(\frac{x-a}{b-a})^\alpha - 1)$ in the interval $[a, b]$
    Shen (1994), Kazem et al. (2013), Hadian Rasan et al. (2020), Rad et al. (2014),
    Asghari et al. (2022):


    $\frac{1}{\sqrt{1 - 2t(\frac{x-a}{b-a})^\alpha - 1 + t^2}} = \sum_{n=0}^{\infty}
    FP_n^\alpha(x)t^n = \sum_{n=0}^{\infty} P_n(2(\frac{x-a}{b-a})^\alpha - 1)t^n.$


    On the other hand, the fractional Legendre function with weight function $w(x)
    = x^{\alpha-1}$, like the Legendre polynomial, has the property of orthogonality
    Hadian Rasan et al. (2020), this property, for example, over the interval $[0,
    1]$ is easily defined as follows:'

    # 3.4.2 Three Monks’ Dataset


    The Monk’s problem is a classic one introduced in 1991, according to “*Monk’s
    Problems—A Performance Comparison of Different Learning algorithms*” by Thrun
    et al. (1991); Sun et al. (2015):


    The Monk’s problems rely on an artificial robot domain in which robots are described
    by six different attributes:


    $x_1$: head shape ∈ {round, square, octagon}

    $x_2$: body shape ∈ {round, square, octagon}

    $x_3$: is smiling ∈ {yes, no}

    $x_4$: holding ∈ {sword, balloon, flag}

    $x_5$: jacket color ∈ {red, yellow, green, blue}

    $x_6$: has tie ∈ {yes, no}


    The learning task is a binary classification one. Each problem is given by a logical
    description of a class. Robots belong either to this class or not, but instead
    of providing a complete class description to the learning problem, only a subset
    of all 432 possible robots with its classification is given. The learning task
    is to generalize over these examples and if the particular learning technique
    at hand allows this to derive a simple class description.


    Then the three problems are


    +   - **Problem $M_1$: (head shape = body shape) or (jacket color = red)** From
    432 possible examples, 124 are randomly selected for the training set. There are
    no misclassifications.

    - **Problem $M_2$: Exactly two of the six attributes have their first value.**
    (e.g., *body shape = head shape = round* implies that the robot is not smiling,
    holding no sword, jacket color is not red, and has no tie, since then exactly
    two (body shape and head shape) attributes have their *first* value). From 432
    possible examples, 169 are randomly selected. Again, there is no noise.

    - **Problem $M_3$: (jacket color is green and holding a sword) or (jacket color
    is not blue and body shape is not octagon)** From 432 examples, 122 are selected
    randomly, and among them, there are 5% misclassifications, i.e., noise in the
    training set.'
- md: '## 3.5 Conclusion


    This chapter is started with a brief history and basics of Chebyshev orthogonal
    polynomials. Chebyshev polynomials have been used in many use cases and recently
    as the kernel function in kernel-based learning algorithms and are proved to surpass
    traditional kernels in many situations. Construction of Chebyshev kernels explained
    and proved. It is demonstrated in this chapter that the fractional form of Chebyshev
    polynomials extends the applicability of the Chebyshev kernel. Thus, by using
    fractional Chebyshev kernel functions, a wider set of problems can be tackled.
    Experiments demonstrate fractional Chebyshev kernel leverages the accuracy of
    classification with SVM when being used as the kernel in the SVM kernel trick.
    In the last section, the results of such experiments are depicted.


    Table 3.4 Comparison of RBF, polynomial, Chebyshev, and fractional Chebyshev kernels
    on the Monk’s first problem. It is clear that the RBF kernel outperforms other
    kernels


    | | Sigma | Power | Order | Alpha(α) | Accuracy |

    |---|---|---|---|---|---|

    | RBF | 2.844 | – | – | – | **0.8819** |

    | Polynomial | – | 3 | – | – | 0.8681 |

    | Chebyshev | – | – | 3 | – | 0.8472 |

    | Fractional Chebyshev | – | – | 3 | 1/16 | 0.8588 |


    Table 3.5 Comparison of RBF, polynomial, Chebyshev, and fractional Chebyshev kernels
    on the Monk’s second problem. Fractional Chebyshev Kernel outperforms other kernels
    with highest accuracy at 96%


    | | Sigma | Power | Order | Alpha(α) | Accuracy |

    |---|---|---|---|---|---|

    | RBF | 5.5896 | – | – | – | **0.875** |

    | Polynomial | – | 3 | – | – | 0.8657 |

    | Chebyshev | – | – | 3 | – | 0.8426 |

    | Fractional Chebyshev | – | – | 6 | 1/15 | **0.9653** |


    Considering the above definitions, we applied *RBF*, *Polynomial*, *Chebyshev*,
    and *Fractional Chebyshev* kernels to all three Monk’s problems. Table 3.4 illustrates
    the output accuracy of each model where the *RBF kernel* has the best accuracy
    by σ ≈ 2.84 at **0.8819** and the *Chebyshev kernel* has the worst among them
    at **0.8472**. Table 3.5 shows the results for Monk’s second problem, where *fractional
    Chebyshev kernel* has the best accuracy at **0.9653** while *Chebyshev Kernel*
    has the worst performance with an accuracy of **0.8426**. Finally, Table 3.6 represents
    the results for the third Monk’s problem where both *RBF* and *fractional Chebyshev
    kernel* have the same best accuracy at **0.91**.


    Table 3.6 Comparison of RBF, polynomial, Chebyshev, and fractional Chebyshev kernels
    on the Monk’s third problem. Fractional Chebyshev Kernel and RBF kernel had same
    accuracy result at 0.91


    | | Sigma | Power | Order | Alpha(α) | Accuracy |

    |---|---|---|---|---|---|

    | RBF | 2.1586 | – | – | – | **0.91** |

    | Polynomial | – | 3 | – | – | 0.875 |

    | Chebyshev | – | – | 6 | – | 0.8958 |

    | Fractional Chebyshev | – | – | 5 | 1/5 | **0.91** |



  - '[PAGE 151]


    6 Fractional Jacobi Kernel Functions ... 141


    Table 6.6 Comparison of RBF, polynomial, Chebyshev, fractional Chebyshev, Gegenbauer,
    fractional Gegenbauer, Legendre, fractional Legendre, Jacobi, and fractional Jacobi
    kernels on the third Monk’s problem. The Gegenbauer and fractional Gegenbauer
    kernels have the best accuracy score, then Jacobi, fractional Jacobi, RBF, and
    fractional Chebyshev Kernels


    | | Sigma | Power | Order | Alpha(α) | Lambda(λ) | Psi(ψ) | Omega(ω) | Accuracy
    |

    |---|---|---|---|---|---|---|---|---|

    | RBF | 2.1586 | – | – | – | – | – | – | 0.91 |

    | Polynomial | – | 3 | – | – | – | – | – | 0.875 |

    | Chebyshev | – | – | 6 | – | – | – | – | 0.895 |

    | Fractional Chebyshev | – | – | 5 | 1/5 | – | – | – | 0.91 |

    | Legendre | – | – | 3 | – | – | – | – | 0.8472 |

    | Fractional Legendre | – | – | 3 | 0.8 | – | – | – | 0.8379 |

    | Gegenbauer | – | – | 4 | – | –0.2 | – | – | **0.9259** |

    | Fractional Gegenbauer | – | – | 3 | 0.7 | –0.2 | – | – | **0.9213** |

    | Jacobi | – | – | 5 | – | – | –0.5 | 0.0 | 0.919 |

    | Fractional Jacobi | – | – | 4 | – | – | –0.5 | 0.0 | 0.9167 |


    Table 6.7 A summary of SVM kernels


    | Kernel function | Description |

    |---|---|

    | Legendre | The Legendre kernel is presented in Pan et al. (2012) and has considerable
    merit, which does not require a weight function. Although it is immune to the
    explosion effect, it suffers from the annihilation effect |

    | Chebyshev | This kernel was presented by Ye et al. (2006). They reported it
    as the first orthogonal polynomial kernel for SVM classifiers. Also, it is not
    immune to both explosion and annihilation effects |

    | Generalized Chebyshev | This kernel was proposed by Ozer et al. (2011), and
    it was the first orthogonal kernel with vector formulation. By introducing this
    kernel, they found an effective way to avoid the annihilation effect |

    | Modified Chebyshev | This kernel was introduced by Ozer et al. (2011) and has
    the same characteristics as the generalized Chebyshev kernel. The vector form
    of this kernel has better performance in facing the nonlinear problems in comparison
    with the generalized Chebyshev kernel |

    | Chebyshev Wavelet | Introduced by Jafarzadeh et al. at (2013) using mercer rules,
    which in fact was the multiplications of Chebyshev and wavelet kernels and showed
    to have competitive accuracy |

    | Unified Chebyshev | Zhao et al. (2013) introduced a new kernel through unifying
    Chebyshev kernels of the first and second kind. A new kernel with two notifiable
    properties, orthogonality, and adaptivity. This kernel was also shown to have
    low computational cost and competitive accuracy |

    | Gegenbauer | It was introduced in Padierna et al. (2018), it is not only immune
    to both annihilation and explosion effects, but also it involves Chebyshev and
    Legendre kernels and improves them as special cases |

    | Generalized Gegenbauer | Introduced by Yang et al. (2020) originally to address
    an engineering problem of state recognition of bolted structures. Showed considerable
    accuracy in that specific context |

    | Regularized Jacobi Wavelets | This kernel function was introduced by Abassa
    in Nadira et al. (2019). Although such kernel has high time complexity, it still
    provides competitive results compared to other kernels |


    and all other kernels discussed in Chaps. 3, 4, and 5. The experiments showed
    the efficiency of Jacobi kernels that made them a suitable kernel function for
    kernel-based learning algorithms such as SVM.'

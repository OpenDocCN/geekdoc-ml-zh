    # 8.3.2.1 Example 1


    Consider a non-classical FHN model Eq. 8.14 with $v(t) = 0$, $\mu(t) = 1$, $\eta(t)
    = -1$, $\rho = 2$, initial condition $u(x, 0) = \frac{1}{2} + \frac{1}{2} \tanh(\frac{x}{2\sqrt{2}})$,
    and domain over $(x, t) \in [-10, 10] \times [0, 1]$. In this example, we have
    $A(x, t, u) = -\rho + (1 - \rho)u - u^2$, $B(x, t, u) = 0$ and $C(x, t, u) = -1$.
    So the exact solution of this test problem is $u(x, t) = \frac{1}{2} + \frac{1}{2}
    \tanh(\frac{x - \frac{2\rho - 1}{\sqrt{2}}t}{2\sqrt{2}})$ (Bhrawy 2013; Jiwari
    et al. 2014; Wazwaz 2007).'

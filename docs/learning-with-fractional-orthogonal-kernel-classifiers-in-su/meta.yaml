  md: "# 3.3 Chebyshev Kernel Functions\n\nFollowing the Chebyshev polynomial principles\
    \ and their fractional type discussed in the previous sections, this section presents\
    \ the formulation of Chebyshev kernels. Therefore, in the following, first, the\
    \ ordinary Chebyshev kernel function, then some other versions of this kernel\
    \ function, and finally the fractional Chebyshev kernels will be explained.\n\n\
    # 3.3.1 Ordinary Chebyshev Kernel Function\n\nMany kernels constructed from orthogonal\
    \ polynomials have been proposed for SVM and other kernel-based learning algorithms\
    \ (Ye et al. 2006; Moghaddam and Hamidzadeh 2016; Tian and Wang 2017). Some characteristics\
    \ of such kernels have attracted attention such as lower data redundancy in feature\
    \ space or on some occasions these kernels need fewer support vectors during the\
    \ fitting procedure which thereby leads to less execution time (Jung and Kim 2013).\
    \ On the other hand, orthogonal kernels have shown superior performance in classification\
    \ problems than traditional kernels like RBF and polynomial (Moghaddam and Hamidzadeh\
    \ 2016; Ozer et al. 2011; Padierna et al. 2018).\n\nNow, using the fundamental\
    \ definition of the orthogonal kernel we will formulate the Chebyshev kernel.\
    \ As we know, the unweighted orthogonal polynomial kernel function for SVM, for\
    \ scalar inputs, is defined as\n\n$$K(x, z) = \\sum_{i=0}^{n} T_i(x)T_i(z), \\\
    quad (3.31)$$\n\nwhere $T(.)$ denotes the evaluation of the polynomial; $x, z$\
    \ are kernel's input arguments; and $n$ is the highest polynomial order. In most\
    \ applications of the real world, input data is a multidimensional vector, hence\
    \ two approaches have been proposed to extend one-dimensional polynomial kernel\
    \ to multidimensional vector input (Ozer et al. 2011; Vert et al. 2007):\n\n+\
    \   1. **Pairwise**\n    According to *Vapnik*'s theorem (Vapnik 2013):\n    >\
    \ Let a multidimensional set of functions be defined by the basis functions that\
    \ are the tensor products of the coordinate-wise basis functions. Then the kernel\
    \ that defines the inner product in the n-dimensional basis is the product of\
    \ one-dimensional kernels.\n\nThe multidimensional orthogonal polynomial kernel\
    \ is constructed as a tensor product of one-dimensional kernel as"

  md: '![](img/a1d5f013073c7da63184a763d887fe2f_84_0.png)


    So, the first few Legendre polynomials in explicit form are


    $P_0(x) = 1,$

    $P_1(x) = x,$

    $P_2(x) = (3x^2 - 1)/2,$

    $P_3(x) = (5x^3 - 3x)/2,$

    $P_4(x) = (35x^4 - 30x^2 + 3)/8,$

    $P_5(x) = (63x^5 - 70x^3 + 15x)/8,$

    $P_6(x) = (231x^6 - 315x^4 + 105x^2 - 5)/16, \quad (4.7)$


    which are depicted in Fig. 4.1.


    In addition to the recursive relation in Eq. 4.6, using the generator function
    Eq. 4.4, the Legendre polynomials are defined in the following two ways as recursive
    relations:


    $n P_n(x) = x P''_n(x) - P''_{n-1}(x),$

    $P''_{n+1}(x) = x P''_n(x) + (n + 1) P_n(x). \quad (4.8)$'

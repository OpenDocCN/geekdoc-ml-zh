    $$w_l = \sum_{i=0}^{N} \alpha_i (\varphi_l''''(x_i) + \frac{k}{x_i} \varphi_l''(x_i)
    + f(x_i)\varphi_l(x_i))$$

    $$= \sum_{i=0}^{N} \alpha_i \psi_l(x_i), \tag{7.23}$$


    其中 $\psi_l(x_i) = \varphi_l''''(x_i) + \frac{k}{x_i} \varphi_l''(x_i) + f(x_i)\varphi_l(x_i)$。现在，我们可以将矩阵形式表示如下：


    $$\begin{bmatrix} w_0 \\ w_1 \\ \vdots \\ w_n \end{bmatrix} = \begin{bmatrix}

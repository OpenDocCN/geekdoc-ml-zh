    ## 5.3.2 Validation of Gegenbauer Kernel Function


    **Theorem 5.1** (Padierna et al. (2018)) *Gegenbauer kernel function introduced
    at Eq. 5.31 is a valid Mercer kernel.*


    *Proof* A valid kernel function needs to be positive semi-definite or equivalently
    must satisfy the necessary and sufficient conditions of *Mercer''s theorem* introduced
    in 2.2.1. Furthermore, positive semi-definiteness property ensures that the optimization
    problem of the SVM algorithm can be solved with **Convex Optimization Programming**
    (Wu and Zhou 2005). According to *Mercer theorem*, a symmetric and continuous
    function K(X, Z) is a kernel function if it satisfies


    $$\iint K(x, z) f(x) f(z) dx dz \geq 0. \quad (5.32)$$


    Bearing in mind that $K_{Geg}(x, z) = \prod_{j=1}^{d} K_{Geg}(x_j, z_j)$, denoting
    the multidimensionality of the Gegenbauer kernel function, consequently the Gegenbauer
    for scalars x and z is


    $$K_{Geg}(x, z) = \sum_{i=0}^{n} G_{i}^{\lambda}(x) G_{i}^{\lambda}(z) w_{\lambda}(x,
    z) u(G_{i}^{\lambda})^2. \quad (5.33)$$


    By substitution of Eq. 5.33 into Eq. 5.32, we conclude


    $$\iint K_{Geg}(x, z) g(x) g(z) dx dz =$$


    $$\iint \sum_{i=0}^{n} G_{i}^{\lambda}(x) G_{i}^{\lambda}(z) w_{\lambda}(x, z)
    u(G_{i}^{\lambda})^{2} g(x) g(z) d x d z. \quad (5.34)$$


    Also, by inserting weight function from Eq. 5.30 into Eq. 5.34, we have


    $$= \iint \sum_{i=0}^{n} G_{i}^{\lambda}(x) G_{i}^{\lambda}(z)\left[\left(1-x^{2}\right)^{\lambda-\frac{1}{2}}\left(1-z^{2}\right)^{\lambda-\frac{1}{2}}+\varepsilon\right]
    u\left(G_{i}^{\lambda}\right)^{2} g(x) g(z) d x d z. \quad (5.35)$$


    It should be noted that $u(G_{i}^{\lambda})$ is always positive and independent
    of the data, so


    $$=\sum_{i=0}^{n} u\left(G_{i}^{\lambda}\right)^{2} \iint G_{i}^{\lambda}(x) G_{i}^{\lambda}(z)\left(1-x^{2}\right)^{\lambda-\frac{1}{2}}\left(1-z^{2}\right)^{\lambda-\frac{1}{2}}
    g(x) g(z) d x d z,$$

    $$+\sum_{i=0}^{n} \varepsilon u\left(G_{i}^{\lambda}\right)^{2} \iint G_{i}^{\lambda}(x)
    G_{i}^{\lambda}(z) g(x) g(z) d x d z, \quad (5.36)$$


    $$=\sum_{i=0}^{n} u\left(G_{i}^{\lambda}\right)^{2} \int G_{i}^{\lambda}(x)\left(1-x^{2}\right)^{\lambda-\frac{1}{2}}
    g(x) d x \int G_{i}^{\lambda}(z)\left(1-z^{2}\right)^{\lambda-\frac{1}{2}} g(z)
    d z,$$

    $$+\sum_{i=0}^{n} \varepsilon u\left(G_{i}^{\lambda}\right)^{2} \int G_{i}^{\lambda}(x)
    g(x) d x \int G_{i}^{\lambda}(z) g(z) d z,$$


    $$=\sum_{i=0}^{n} u\left(G_{i}^{\lambda}\right)^{2}\left(\int G_{i}^{\lambda}(x)\left(1-x^{2}\right)^{\lambda-\frac{1}{2}}
    g(x) d x\right)^{2}+\sum_{i=0}^{n} \varepsilon u\left(G_{i}^{\lambda}\right)^{2}\left(\int
    G_{i}^{\lambda}(x) g(x) d x\right)^{2} \geq 0.$$


    Therefore, $K(x, z)$ is a valid kernel. Considering the product of two kernels
    is a kernel too, then $K_{Geg}(X, Z)=\prod_{j=1}^{d} K_{Geg}\left(x_{j}, z_{j}\right)$
    for the vectors $x$ and $z$ is also a valid kernel. Consequently, one can deduce
    that the Gegenbauer kernel function in Eq. 5.31 is a valid kernel too. $\square$


    ## 5.3.3 Other Gegenbauer Kernel Functions


    In this section, the generalized Gegenbauer kernel has been introduced which was
    recently proposed by Yang et al. (2020).


    ### 5.3.3.1 Generalized Gegenbauer Kernel


    The Generalized Gegenbauer kernel (GGK) is constructed by using the partial sum
    of the inner products of generalized Gegenbauer polynomials. The generalized Gegenbauer
    polynomials have the recursive relation as follows (Yang et al. 2020):


    $GG_0^\lambda(x) = 1,$

    $GG_1^\lambda(x) = 2\lambda x,$

    $GG_n^\lambda(x) = \frac{1}{d}[2x(d + \lambda - 1)GG_{n-1}^\lambda(x) - (n + 2\lambda
    - 2)GG_{n-2}^\lambda(x)],$


    where $x \in \mathbb{R}^n$ denotes the vector of input variables. The output of
    generalized Gegenbauer polynomial $GG_n^\lambda(x)$ is scalar for even orders
    of $n$ and is a vector for odd orders of $n$.


    Then Yang et al. (2020) proposed generalized Gegenbauer kernel function $K_{GG}(x_i,
    x_j)$ for order $n$ of two input vectors $x_i$ and $x_j$ as


    $K_{GG}(x_i, x_j) = \frac{\sum_{l=0}^n GG_l^\lambda(x_i)^T GG_l^\lambda(x_j)}{\exp(\sigma
    \| x_i - x_j \|_2^2)},$


    where each element of $x_i$ and $x_j$ is normalized in the range $[-1, 1]$. In
    this context, both $\alpha$ and $\sigma$ are considered as the kernel scales or
    the so-called decaying parameters of the proposed kernel function.


    **Theorem 5.2** (Padierna et al. (2018)) *The proposed GGK is a valid Mercer kernel.*


    **Proof** The proposed GGK can be alternatively formulated as the product of two
    kernel functions such that


    $K_1(x_i, x_j) = \exp(-\sigma \| x_i - x_j \|_2^2),$

    $K_2(x_i, x_j) = \sum_{l=0}^d GG_l^\alpha(x_i)^T GG_l^\alpha(x_j),$

    $K_{GG}(x_i, x_j) = K_1(x_i, x_j)K_2(x_i, x_j).$


    As already been discussed in 2.2.1, the multiplication of two valid Mercer Kernels
    is also a valid kernel function. Since that $K_1(x_i, x_j)$ is the Gaussian kernel
    ($\sigma > 0$) which satisfies the Mercer theorem, $K_{GG}(x_i, x_j)$ can be proved
    as a valid kernel by verifying that $K_2(x_i, x_j)$ satisfies the Mercer theorem.
    Given an arbitrary squared integrable function $g(x)$ defined as $g : \mathbb{R}^n
    \rightarrow \mathbb{R}$ and assuming each element in $x_i$ and $x_j$ is independent
    with each other, we can conclude that


    $\iint K_2(x_i, x_j)g(x_i)g(x_j)dx_idx_j =$


    $$= \iint \sum_{l=0}^{n} GG_{l}^{\lambda}(x_{i})^{T} GG_{l}^{\lambda}(x_{j}) g(x_{i})
    g(x_{j}) dx_{i} dx_{j},$$

    $$= \sum_{l=0}^{n} \iint GG_{l}^{\lambda}(x_{i})^{T} GG_{l}^{\lambda}(x_{j}) g(x_{i})
    g(x_{j}) dx_{i} dx_{j},$$

    $$= \sum_{l=0}^{n} \left[ \int GG_{l}^{\lambda}(x_{i})^{T} g(x_{i}) dx_{i} \int
    GG_{l}^{\lambda}(x_{j}) g(x_{j}) dx_{j} \right],$$

    $$= \sum_{l=0}^{n} \left[ \int GG_{l}^{\lambda}(x_{i})^{T} g(x_{i}) dx_{i} \right]
    \left[ \int GG_{l}^{\lambda}(x_{j}) g(x_{j}) dx_{j} \right] \geq 0. \tag{5.40}$$


    Thus, $K_{2}(x_{i}, x_{j})$ is a valid Mercer kernel, and it can be concluded
    that the proposed GGK $K_{GG}(x_{i}, x_{j})$ is an admissible Mercer kernel function.
    $\square$


    ## 5.3.4 Fractional Gegenbauer Kernel Function


    Similar to the latest kernel function introduced at Eq. 5.31 as the Gegenbauer
    kernel and the weight function introduced at Eq. 5.28 as the fractional weight
    function, the fractional Gegenbauer kernel has been introduced. First, the bivariate
    form of the fractional weight function has to be defined that its approach is
    again similar to the previous corresponding definition at Eq. 5.30, i.e.,


    $$f w^{\alpha, \lambda}(x, z) = \left( \left( 1 - \left( \frac{x-a}{b-a} \right)^{2\alpha}
    \right) \left( 1 - \left( \frac{z-a}{b-a} \right)^{2\alpha} \right) \right)^{\lambda
    - \frac{1}{2}} + \epsilon. \tag{5.41}$$


    Therefore, the fractional Gegenbauer kernel function is


    $$K_{FGeg}(X, Z) = \prod_{j=1}^{d} \sum_{i=0}^{n} G_{i}^{\lambda}(x''_{x_{j}})
    G_{j}^{\lambda}(x''_{z_{j}}) f w^{\alpha, \lambda}(x''_{x_{j}}, x''_{z_{j}}) u(G_{j}^{\lambda})^{2}.
    \tag{5.42}$$


    **Theorem 5.3** Gegenbauer kernel function introduced at Eq. 5.42 is a valid Mercer
    kernel.


    **Proof** According to the Mercer theorem, a valid kernel must satisfy sufficient
    conditions of Mercer''s theorem. As Mercer theorem states, any SVM kernel to be
    a valid kernel must be non-negative, in a precise way:


    $$\iint K(x, z) w(x, z) f(x) f(z) dx dz \geq 0. \tag{5.43}$$


    By the fact that here the kernel is as Eq. 5.42, it can be seen with a simple
    replacement that


    $$\iint K_{FGeg}(x, z)g(x)g(z)dxdz =$$

    $$\iint \sum_{i=0}^{n} G_i^\lambda(x''_j)G_j^\lambda(x''_j) f w_\lambda(x''_j,
    x''_j) u(G_j^\lambda)^2 g(x)g(z)dxdz. \quad (5.44)$$


    In the last equation, the fractional bivariate weight function (i.e., Eq. 5.41)
    is considered, so we have


    $$\iint \sum_{i=0}^{n} G_i^\lambda(x''_j)G_j^\lambda(x''_j) \left[ \left( \left(
    1 - \left( \frac{x-a}{b-a} \right)^{2\alpha} \right) \left( 1 - \left( \frac{z-a}{b-a}
    \right)^{2\alpha} \right) \right)^{\lambda - \frac{1}{2}} + \epsilon \right] u(G_j^\lambda)^2
    g(x)g(z)dxdz. \quad (5.45)$$


    Note that $u(G_i^\lambda)$ is always positive and independent of the data, therefore:


    $$= \sum_{i=0}^{n} u(G_i^\lambda)^2 \iint \sum_{i=0}^{n} G_i^\lambda(x''_j)G_j^\lambda(x''_j)
    \left( \left( 1 - \left( \frac{x-a}{b-a} \right)^{2\alpha} \right) \left( 1 -
    \left( \frac{z-a}{b-a} \right)^{2\alpha} \right) \right)^{\lambda - \frac{1}{2}}
    g(x)g(z)dxdz$$

    $$+ \sum_{i=0}^{n} \epsilon u(G_i^\lambda)^2 \iint G_i^\lambda(x''_j)G_j^\lambda(x''_j)g(x)g(z)dxdz.
    \quad (5.46)$$



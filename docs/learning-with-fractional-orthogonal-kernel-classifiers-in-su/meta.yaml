- md: '## 11.1 GPU Architecture and GPGPU Computation


    GPU架构通过最大化WARP、处理器资源以及内存层次结构资源的利用率来实现更高的性能。


    GPGPU计算存在两个主要限制。首先，为了增加核心和SM（流多处理器）的数量并实现能效，GPU核心设计得非常简单且时钟频率较低。它们只有在程序被仔细地并行化为大量线程时才能提供性能提升。因此，试图让通用代码在GPU上运行是一项困难的任务，且通常会导致低效的运行。相反，只执行那些适合GPU风格并行性的程序部分（如线性代数代码），而将程序的其他部分留给CPU处理，会更加高效。因此，编写适合利用GPU核心的程序即使对于非常适合并行编程的算法来说也是复杂的。已经出现了一些库，它们提供了标准线性代数内核（BLAS）的GPU实现，这有助于将代码分离成这些库中使用的子任务，并实现更高的性能（Cheng
    et al., 2014）。这描述了第一个限制。GPU用于GPGPU计算的第二个限制是，GPU使用与主机内存分离的内存。换句话说，GPU具有特殊的内存和访问层次结构，并使用与主机内存不同的地址空间。


    主机（CPU）和GPU无法轻松共享数据。主机和GPU之间通信的这种限制在两者同时处理共享数据时尤其成问题。在这种情况下，数据必须返回，主机必须等待GPU，反之亦然。这种情况最糟糕的部分是在主机和GPU之间传输数据，因为它很慢，特别是与主机内存或GPU专用内存的速度相比。数据传输的最大速度受限于PCI
    Express总线速度，因为GPU通过PCI Express总线连接到主机。因此，数据传输通常在GPU计算中成本最高。已经尝试了几种方法来避免在成本超过GPU计算收益时进行数据传输（AlSaber
    et al., 2013）。因此，GPU编程有许多限制需要考虑以实现更高的性能。例如，共享内存容量、进程执行顺序和分支发散，或其他瓶颈，这些都需要通过考虑GPU架构来解决。这里介绍了NVIDIA处理器的不同架构，如Tesla、Maxwell、Pascal、Volta和Turing，以便更好地探索。


    - Tesla架构通过引入GeForce 8800产品线而出现，该产品线统一了顶点和像素处理器单元。该架构基于可扩展阵列处理器，通过促进高效的并行处理器来实现。2007年，另一款采用此架构的GPU
    C2050进入市场（Pienaar et al., 2011）。Tesla C2050的性能在双精度算术中达到515 GFLOPS。它受益于3 GB GDDR5内存，带宽为144
    GB/s。该GPU拥有448个CUDA核心，频率为1.15 GHz。


    - 另一个NVIDIA GPU架构的代号是Kepler。该架构于2012年4月推出（Corporation, 2019; Wang et al., 2015）。VLSI技术特征尺寸为28
    nm，优于之前的架构。该架构是第一个考虑能效设计的NVIDIA GPU。大多数NVIDIA GPU基于Kepler架构，例如K20和K20x，它们是具有双精度的Tesla计算设备。Tesla
    K20x的性能在双精度计算中为1312 GFLOPS，在单精度计算中为3935 GFLOPS。该GPU拥有6 GB GDDR5内存，带宽为250 GB/s。K20x系列拥有2688个CUDA核心，工作频率为732
    MHz。该架构之后也被新的NVIDIA GPU所采用，称为Maxwell（GTX 980）以及GeForce 800M系列。


    - Maxwell架构于2014年推出，GeForce 900系列是该架构的成员。该架构同样采用TSMC 28 nm工艺制造，与之前的型号（Kepler）相同（NVIDIA,
    2014）。Maxwell架构具有新一代流多处理器（SM）；该架构降低了SM的功耗。Maxwell产品线配备了2 MB L2缓存。GTX980 GPU采用Maxwell内部架构，提供5
    TFLOPS的单精度性能（Corporation, 2019）。在此架构中，一个CUDA核心包含一个整数和一个浮点逻辑单元，可以同时工作。每个SM都有一个WARP调度器、分发单元、指令缓存和寄存器文件。除了每个SM中的128个核心外，还有八个加载/存储单元（LD/ST）和八个特殊功能单元（SFU）（Wang
    et al., 2015）。GTX 980在每个SM中有四个WARP调度器，支持四个并发WARP被发出和执行。LD/ST单元并行计算源地址和目标地址，允许八个线程在片上缓存或DRAM内的每个地址加载和存储数据（Mei
    et al., 2016）。SFU执行超越数学函数，如余弦、正弦和平方根。在每个时钟周期，一个线程可以在SFU中执行一条指令，因此每个WARP如果需要必须执行四次。


    - 另一个NVIDIA GPU架构代号是Pascal，于2016年4月推出，作为Maxwell架构的后续产品。作为该架构的成员，我们可以提到GPU设备如Tesla
    P100和GTX 1080，它们采用TSMC的16 nm FinFET工艺技术制造。GTX 1080 Ti GPU采用Pascal内部架构，提供10 TFLOPS的单精度性能。该产品拥有3584个CUDA核心，工作频率为1.5
    GHz，内存大小为11 GB，带宽为484 GB/s。GTX 1080 Ti拥有28个SM，每个SM有128个核心，256 KB寄存器文件容量，96 KB共享内存，以及48
    KB总L1缓存，CUDA计算能力为6.1（NVIDIA, 2016）。此计算能力具有动态并行性和原子加法操作等特性，可在GPU全局内存和共享内存中的64位浮点值上操作（NVIDIA,
    2016）。


    - 下一代NVIDIA GPU架构是Volta，它接替了Pascal GPU。该架构于2017年推出，是第一款配备Tensor核心的芯片，专为深度学习设计，以实现比常规CUDA核心更高的性能。采用此架构的NVIDIA
    GPU，如Tesla V100，采用TSMC 12 nm FinFET工艺制造。Tesla V100的性能在双精度浮点计算中为7.8 TFLOPS，在单精度浮点计算中为15.7
    TFLOPS。该GPU卡设计具有7.0的CUDA计算能力，每个SM有64个CUDA核心；总核心数为5120个，内存大小为16 GB，带宽为900 GB/s，采用HBM2内存特性（Mei
    et al., 2016）。最大功耗为250 W；在功耗和每瓦性能方面设计得非常高效（NVIDIA, 2017）。


    - 另一个NVIDIA GPU架构于2018年推出，是Turing架构，著名的RTX 2080 Ti产品基于此架构（NVIDIA, 2018）。Turing架构具有实时光线追踪能力，配备专用光线追踪处理器和专用人工智能处理器（Tensor
    Cores）。4352个CUDA核心在1.35 GHz频率下的性能为11.7 TFLOPS（单精度计算），使用GDDR6/HBM2内存控制器（NVIDIA,
    2018）。其全局内存大小为11 GB，该产品的带宽为616 GB/s，每个线程块的最大共享内存量为64 KB。然而，最大功耗为250 W，采用TSMC 12
    nm FinFET工艺制造，该GPU支持计算能力7.5（Ahmadzadeh et al., 2018; NVIDIA, 2018; Kalaiselvi
    et al., 2017; Choquette et al., 2021）。


    ## 11.2.1 CUDA Programming with Python


    CUDA为C/C++编程语言提供了带有库的API。然而，Python也有自己的库来访问CUDA API和GPGPU功能。PyCUDA（2021）提供了对CUDA
    API的Pythonic访问，用于并行计算，其声称：


    1. PyCUDA在对象生命周期结束后会自动清理对象。

    2. 通过一些抽象，它比使用NVIDIA基于C的运行时编程更方便。

    3. PyCUDA拥有所有CUDA的驱动程序API。

    4. 它支持自动错误检查。

    5. PyCUDA的底层是用C++编写的，因此速度很快。


    ## 11.3 Analyzing Codes and Functions


    为了使基于CPU的应用程序运行更快，有必要对其进行分析。找到代码中可以并行化的部分至关重要。一种方法是找到SVM代码中的循环。特别是在本章中，我们重点关注'

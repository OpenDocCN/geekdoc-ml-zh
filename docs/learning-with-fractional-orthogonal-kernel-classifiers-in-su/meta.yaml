    In many cases, the inner product in the embedding space can be computed efficiently
    by defining a kernel function. Some common kernel functions are listed below:


    +   - $K(\mathbf{x}, \mathbf{t}) = \mathbf{x}^T \mathbf{t},$

    - $K(\mathbf{x}, \mathbf{t}) = (\mathbf{x}^T \mathbf{t} + 1)^M,$

    - $K(\mathbf{x}, \mathbf{t}) = \exp(-\frac{\|\mathbf{x}-\mathbf{t}\|^2}{\gamma}),$

    - $K(\mathbf{x}, \mathbf{t}) = \tanh(a\mathbf{x}^T \mathbf{t} + b).$


    These functions are known as linear, polynomial, Gaussian, and sigmoid kernels,
    respectively Cheng et al. (2017).


    A valid kernel corresponds to an inner product in some feature space. A necessary
    and sufficient condition to check the validity of a kernel function is the Mercer
    condition Mercer (1909). This condition states that any symmetric positive definite
    matrix can be regarded as a kernel matrix. By restricting a kernel function to
    a set of points $\{\mathbf{x}_1, \dots, \mathbf{x}_N\}$, the corresponding kernel
    matrix $K_{N \times N}$ is a matrix that the element in row $i$ and column $j$
    is $K(\mathbf{x}_i, \mathbf{x}_j)$ as follows:


    $K = \begin{bmatrix} K(\mathbf{x}_1, \mathbf{x}_1) \dots K(\mathbf{x}_1, \mathbf{x}_N)
    \ \vdots \ddots \vdots \ K(\mathbf{x}_N, \mathbf{x}_1) \dots K(\mathbf{x}_N, \mathbf{x}_N)
    \end{bmatrix}.$'

  md: 'By substituting the first and third equations in the fourth one, the primal
    variables are eliminated. Now, since the multiplications of the basis functions
    appear in themselves or their derivatives, we need to define the derivatives of
    the kernel function $K(x_i, x_j) = \varphi(x_i)^T \varphi(x_j)$. According to
    Mercer''s theorem, derivatives of the feature map can be written in terms of derivatives
    of the kernel function. So, we use differential operator $\nabla^{m,n}$ which
    is defined in the previous chapters 3 and 4. So, in time step $k$, it can be written
    that


    $$\sum_{j=2}^{n-1} \alpha_j \left[ \tilde{A}_i \left( \chi_{j,i}^{(0,0)} \tilde{A}_j
    + \chi_{j,i}^{(1,0)} \tilde{B}_j + \chi_{j,i}^{(2,0)} \tilde{C}_j \right) + \tilde{B}_i
    \left( \chi_{j,i}^{(0,1)} \tilde{A}_j + \chi_{j,i}^{(1,1)} \tilde{B}_j + \chi_{j,i}^{(2,1)}
    \tilde{C}_j \right) + \tilde{C}_i \left( \chi_{j,i}^{(0,2)} \tilde{A}_j + \chi_{j,i}^{(1,2)}
    \tilde{B}_j + \chi_{j,i}^{(2,2)} \tilde{C}_j \right) \right] + \beta_1 \left(
    \chi_{1,i}^{(0,0)} \tilde{A}_i + \chi_{1,i}^{(0,1)} \tilde{B}_i + \chi_{1,i}^{(0,2)}
    \tilde{C}_i \right) + \beta_2 \left( \chi_{n,i}^{(0,0)} \tilde{A}_i + \chi_{1,i}^{(0,n)}
    \tilde{B}_i + \chi_{n,i}^{(0,2)} \tilde{C}_i \right) + \frac{\alpha_i}{\gamma}
    + \tilde{A}_i b = r_i^k, \quad i = 2, \dots, n.$$


    $$\sum_{j=2}^{n-1} \alpha_j \left[ \chi_{j,1}^{(0,0)} \tilde{A}_j + \chi_{j,1}^{(1,0)}
    \tilde{B}_j + \chi_{j,1}^{(2,0)} \tilde{C}_j \right] + \chi_{1,1}^{(0,0)} \beta_1
    + \chi_{n,1}^{(0,0)} \beta_2 + b = p_1,$$


    $$\sum_{j=2}^{n-1} \alpha_j \left[ \chi_{j,n}^{(0,0)} \tilde{A}_j + \chi_{j,n}^{(1,0)}
    \tilde{B}_j + \chi_{j,n}^{(2,0)} \tilde{C}_j \right] + \chi_{1,n}^{(0,0)} \beta_1
    + \chi_{n,n}^{(0,0)} \beta_2 + b = p_2,$$


    $$\sum_{j=2}^{n-1} \alpha_j \tilde{A}_j + \beta_1 + \beta_2 = 0. \tag{8.8}$$


    According to the aforementioned equations, the following linear system is defined:


    $$\begin{bmatrix} \chi_{1,1}^{(0,0)} & \mathcal{M}_1 & \chi_{1,n}^{(0,0)} & 1
    \ \mathcal{P}_1 & \mathcal{K} + \frac{1}{\gamma} I & \mathcal{P}_n & \mathcal{A}^T
    \ \chi_{n,1}^{(0,0)} & \mathcal{M}_2 & \chi_{n,n}^{(0,0)} & 1 \ 1 & \mathcal{A}
    & 1 & 0 \end{bmatrix} \begin{bmatrix} \beta_1 \ \alpha \ \beta_2 \ b \end{bmatrix}
    = \begin{bmatrix} p_1 \ r^k \ p_2 \ 0 \end{bmatrix}, \tag{8.9}$$


    where


    $$\mathcal{A} = [\tilde{A}_{2:n-1}], \quad \mathcal{B} = [\tilde{B}_{2:n-1}],
    \quad C = [\tilde{C}_{2:n-1}],$$


    $$\mathcal{M}_1 = \chi_{1,2:n-1}^{(0,0)} Diag(\mathcal{A}) + \chi_{1,2:n-1}^{(1,0)}
    Diag(\mathcal{B}) + \chi_{1,2:n-1}^{(2,0)} Diag(C),$$


    $$\mathcal{P}_1 = Diag(\mathcal{A}) \chi_{2:n-1,1}^{(0,0)} + Diag(\mathcal{B})
    \chi_{2:n-1,1}^{(0,1)} + Diag(C) \chi_{2:n-1,1}^{(0,2)},$$'
  merge: -1

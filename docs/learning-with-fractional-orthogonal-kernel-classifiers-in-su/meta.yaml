    x = 5 # x is integer\ny = \"Adam\" # y is string\ny = 1 # y is integer\n```\n\n\
    字符串变量可以使用单引号或双引号声明。\n\n```\ny = \"Adam\" # y is string\ny = 'Adam' # y is string\n\
    ```\n\nPython 变量的规则是：\n\n- 变量名必须以字母或下划线字符开头，不能以数字开头。\n- 变量名只能包含字母数字字符和下划线。\n-\
    \ 变量名区分大小写（yy、Yy 和 YY 是三个不同的变量）。\n\nPython 允许在一行中为多个变量赋值，也可以在一行中将相同的值赋给多个变量：\n\

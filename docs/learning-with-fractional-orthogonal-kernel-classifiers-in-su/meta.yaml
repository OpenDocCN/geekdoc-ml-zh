  mdcn: '## 第9章

    利用LS-SVR求解积分方程


    Kourosh Parand, Alireza Afzal Aghaei, Mostafa Jani, and Reza Sahleh


    **摘要** 科学与工程中的另一类重要问题是积分方程。因此，开发精确的数值算法来近似求解这类问题是科学计算的主要课题之一。本章利用最小二乘支持向量算法，开发了一种求解各类积分方程的数值算法。通过提供若干数值算例，本章讨论了所提方法的鲁棒性与收敛性。


    **关键词** 积分方程 · Galerkin LS-SVR · 配点LS-SVR · 数值模拟


    ## 9.1 引言


    任何在积分号下含有未知函数的方程都称为积分方程。这类方程在科学与工程中频繁出现，例如，不同的数学模型，如衍射问题 Eswaran (1990)、量子力学中的散射
    Barlette et al. (2001)、塑性 Kanaun and Martínez (2012)、保角映射 Reichel (1986)、水波 Manam
    (2011) 以及Volterra种群模型 Wazwaz (2002)，都被表示为积分方程 Assari and Dehghan (2019), Bažant
    and Jirásek (2002), Bremer (2012), Kulish and Novozhilov (2003), Lu et al. (2020),
    Parand and Delkhosh (2017), Volterra (1928)。近年来，研究人员也讨论了积分方程在机器学习问题中的应用 Keller
    and Dahn (2019), Chen et al. (2018), Dahn and Keller (2016)。此外，积分方程与微分方程密切相关，在某些情况下，这两类方程可以相互转换。积分微分方程也是积分方程的一种，其中不仅未知函数位于积分算子下，其导数也出现在方程中。在某些情况下，未知函数的偏导数可能出现在方程中。此时，该方程称为偏积分微分方程。分布分数阶微分方程也是分数阶微分方程的一种，与积分方程非常相似。在这类方程中，未知函数的分数阶导数出现在积分下，且分数阶导数的阶数与积分变量相同。


    由于积分方程的重要性和广泛应用，许多研究者开发了高效的方法来求解这类方程 Abbasbandy (2006), Assari and Dehghan (2019),
    Fatahi et al. (2016), Golberg (2013), Mandal and Chakrabarti (2016), Marzban et
    al. (2011), Nemati et al. (2013), Wazwaz (2011)。本章首先解释积分方程，随后提出一种基于最小二乘支持向量回归方法的新型高效数值方法，用于模拟某些积分方程。


    ## 9.2 积分方程


    积分方程根据其性质分为不同类别。然而，积分方程主要有三种类型 Wazwaz (2011)，即Fredholm积分方程、Volterra积分方程和Volterra-Fredholm积分方程。Fredholm积分方程具有常数积分限，而Volterra积分方程中至少有一个积分限依赖于自变量。Volterra-Fredholm积分方程则同时包含这两种类型的方程。这些方程本身又分为线性/非线性、齐次/非齐次以及第一类/第二类等子类。下一节将介绍并讨论这些方程的不同类别。


    ### 9.2.1 Fredholm积分方程


    Fredholm积分方程是积分方程的一个重要类别，用于图像处理 Mohammad (2019) 和强化学习问题 Keller and Dahm (2019),
    Dahm and Keller (2016)。由于求精确解的解析方法仅在特定情况下可用，因此已开发了各种数值技术来近似求解这类方程以及更大一类的模型，如Hammerstein方程、方程组、多维方程和非线性方程。这里简要概述一些用于这些积分方程的数值方法。局部径向基函数方法在
    Assari et al. (2019) 中被提出用于求解Fredholm积分方程。此外，Bahmanpour等人开发了Müntz小波方法 Bahmanpour
    et al. (2019) 来模拟这些模型。另一方面，Newton-Raphson和Newton-Krylov方法被用于求解一维和二维非线性Fredholm积分方程
    Parand et al. (2019)。在另一项工作中，最小二乘支持向量回归方法被提出用于求解Fredholm积分方程 Parand et al. (2021)。欲了解更多，感兴趣的读者可以参阅
    Amiri et al. (2020), Maleknejad and Nosrati Sahlan (2010), Li and Wu (2021), and
    Rad and Parand (2017a,b)。


    对于任意 $a, b, \lambda \in \mathbb{R}$，以下方程称为Fredholm积分方程 Wazwaz (2011, 2015), Rahman
    (2007)


    $$u(x) = f(x) + \lambda \int_{a}^{b} K(x, t)u(t)dt,$$


    其中 $u(x)$ 是未知函数，$K(x, t)$ 是方程的核。


    ### 9.2.2 Volterra积分方程


    Volterra积分方程是积分方程的另一类别。这类方程出现在许多科学应用中，如种群动力学 Jafari et al. (2021)、传染病传播 Wang et
    al. (2006) 和半导体器件 Unterreiter (1996)。此外，这些方程可以从初值问题中获得。已提出不同的数值方法来求解这类方程，例如，提出了一种使用Sinc和有理Legendre函数的配点方法来求解Volterra种群模型
    Parand et al. (2011)。在另一项工作中，最小二乘支持向量回归方法被提出用于求解Volterra积分方程 Parand et al. (2020)。此外，Runge-Kutta方法被用于求解第二类线性Volterra积分方程
    Maleknejad and Shahrezaee (2004)。欲了解更多，感兴趣的读者可以参阅 Messina and Vecchio (2017),
    Tang et al. (2008), and Maleknejad et al. (2011)。在这一类别中，方程定义如下 Wazwaz (2011, 2015),
    Rahman (2007):



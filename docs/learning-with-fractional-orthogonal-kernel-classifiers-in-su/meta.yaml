    ![](img/a1d5f013073c7da63184a763d887fe2f_37_0.png)


    Fig. 2.3 The support vectors in the hard margin SVM method


    If we define a set of support vectors as $SV = \{\mathbf{x}_j | \alpha_j > 0\}$
    and consequently define $S = \{i | \mathbf{x}_i \in SV\}$, the direction of the
    hyperplane which is related to $\mathbf{w}$ can be found as follows:


    $$\mathbf{w} = \sum_{s \in S} \alpha_s y_s \mathbf{x}_s. \tag{2.20}$$


    Moreover, any sample whose Lagrangian multiplier is greater than zero is on the
    margin and can be used to compute $w_0$. Using the sample $\mathbf{x}_{s_j}$ that
    $s_j \in S$ for which the equality $y_{s_j} (\mathbf{w}^T \mathbf{x}_{s_j} + w_0)
    = 1$ is established, we have


    $$w_0 = y_{s_j} - \mathbf{w}^T \mathbf{x}_{s_j}. \tag{2.21}$$


    By assuming that the linear classifier is $y = \text{sign}(w_0 + \mathbf{w}^T
    \mathbf{x})$, new samples can be classified using only support vectors of the
    problem. Consider a new sample $\mathbf{x}$, thus the label of this sample ($\hat{y}$)
    can be computed as follows:


    $$\begin{aligned} \hat{y} &= \text{sign}(w_0 + \mathbf{w}^T \mathbf{x}) \tag{2.22}
    \ &= \text{sign}\left(y_{s_j} - \left(\sum_{s \in S} \alpha_s y_s \mathbf{x}_s\right)^T
    \mathbf{x}_{s_j} + \left(\sum_{s \in S} \alpha_s y_s \mathbf{x}_s\right)^T \mathbf{x}\right)
    \ &= \text{sign}\left(y_{s_j} - \sum_{s \in S} \alpha_s y_s \mathbf{x}_s^T \mathbf{x}_{s_j}
    + \sum_{s \in S} \alpha_s y_s \mathbf{x}_s^T \mathbf{x}\right). \end{aligned}$$'
- md: '## 2.1.2 Soft Margin SVM


    Soft margin SVM is a method for obtaining a linear classifier for some training
    samples which are not actually linearly separable. The overlapping classes or
    separable classes that include some noise data are examples of these problems.
    In these cases, the hard margin SVM does not work well or even does not get the
    right answer. One solution for these problems is trying to minimize the number
    of misclassified points as well as maximize the number of samples that are categorized
    correctly. But this counting solution falls into the category of NP-complete problems
    Cortes and Vapnik (1995). So, an efficient solution is defining a continuous problem
    that is solvable deterministically in a polynomial time by some optimization techniques.
    The extension of the hard margin method, called the soft margin SVM method, was
    introduced by Cortes and Vapnik (1995) for this purpose.


    In the soft margin method, the samples are allowed to violate the conditions,
    while the total amount of these violations should not be increased. In fact, the
    soft margin method tries to maximize the margin while minimizing the total violations.
    Therefore, for each sample $\mathbf{x}_i$, a slack variable $\xi_i \geq 0$, which
    indicates the amount of violation of it from the correct margin, should be defined
    and the inequality of this sample should be relaxed to


    $$y_i(\mathbf{w}^T \mathbf{x}_i + w_0) \geq 1 - \xi_i. \tag{2.23}$$


    Moreover, the total violation is $\sum_{i=1}^N \xi_i$, which should be minimized.
    So, the primal optimization problem to obtain the separator hyperplane becomes


    $$\min_{\mathbf{w}, w_0, \{\xi_i\}_{i=1}^N} \frac{1}{2} \mathbf{w}^T \mathbf{w}
    + C \sum_{i=1}^N \xi_i \tag{2.24}$$

    $$\text{s.t.} \quad y_i(\mathbf{w}^T \mathbf{x}_i + w_0) \geq 1 - \xi_i, \quad
    i = 1, \ldots, N,$$

    $$\xi_i \geq 0,$$


    where $C$ is a regularization parameter. A large amount for $C$ leads to ignoring
    conditions hardly so if $C \to \infty$, this method is equivalent to hard margin
    SVM. Conversely, if the amount of $C$ is small, conditions are easily relaxed
    and a large margin will be achieved. Therefore, the appropriate value of $C$ should
    be used in proportion to the problem and the purpose.


    If sample $\mathbf{x}_i$ is categorized correctly, but located inside the margin,
    then $0 < \xi_i < 1$. Otherwise $\xi_i > 1$, which is because sample $\mathbf{x}_i$
    is in the wrong category and is a misclassified point (see Fig. 2.4).


    As can be seen in Eq. 2.24, this problem is still a convex QP and unlike the hard
    margin method, it has always obtained a feasible solution.


    Here, the dual formulation of the soft margin SVM is discussed. The Lagrange formulation
    is


    $$\mathcal{L}(\mathbf{w}, w_0, \xi, \alpha, \beta) = \frac{1}{2} \|\mathbf{w}\|^2
    + C \sum_{i=1}^N \xi_i + \sum_{i=1}^N \alpha_i (1 - \xi_i - y_i (\mathbf{w}^T
    \mathbf{x}_i + w_0)) - \sum_{i=1}^N \beta_i \xi_i, \tag{2.25}$$


    where $\alpha_i$''s and $\beta_i$''s are the Lagrangian multipliers. The Lagrange
    formulation should be minimized with respect to $\mathbf{w}$, $w_0$, and $\xi_i$''s
    while be maximized with respect to positive Lagrangian multipliers $\alpha_i$''s
    and $\beta_i$''s. To find $\min_{\mathbf{w}, w_0, \xi} \mathcal{L}(\mathbf{w},
    w_0, \xi, \alpha, \beta)$, we have


    $$\begin{cases} \nabla_{\mathbf{w}} \mathcal{L}(\mathbf{w}, w_0, \xi, \alpha,
    \beta) = 0 & \rightarrow \mathbf{w} = \sum_{i=1}^N \alpha_i y_i \mathbf{x}_i,
    \\ \frac{\partial \mathcal{L}(\mathbf{w}, w_0, \xi, \alpha, \beta)}{\partial w_0}
    = 0 & \rightarrow \sum_{i=1}^N \alpha_i y_i = 0, \\ \frac{\partial \mathcal{L}(\mathbf{w},
    w_0, \xi, \alpha, \beta)}{\partial \xi_i} = 0 & \rightarrow C - \alpha_i - \beta_i
    = 0. \end{cases} \tag{2.26}$$


    By substituting $\mathbf{w}$ from the above equation in the Lagrangian function
    of Eq. 2.25, the same equation as Eq. 2.16 is achieved. But, here two constraints
    on $\alpha$ are created. One is the same as before and the other is $0 \le \alpha_i
    \le C$. It should be noted that $\beta_i$ does not appear in $\mathcal{L}(\alpha)$
    of Eq. 2.16 and just need to consider that $\beta_i \ge 0$. Therefore, the condition
    $C - \alpha_i - \beta_i = 0$ can be replaced by condition $0 \le \alpha_i \le
    C$. So, the dual form of problem Eq. 2.24 becomes as follows:


    $$\max_{\alpha} \left\{ \sum_{i=1}^N \alpha_i - \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N
    \alpha_i \alpha_j y_i y_j \mathbf{x}_i^T \mathbf{x}_j \right\} \tag{2.27}$$


    s.t. $\sum_{i=1}^N \alpha_i y_i = 0$,

    $0 \le \alpha_i \le C, \quad i = 1, \dots, N.$


    After solving the above QP problem, $\mathbf{w}$ and $w_0$ can be obtained based
    on Eqs. (2.20) and (2.21), respectively, while still defined $S = \{i | \mathbf{x}_i
    \in SV\}$. As mentioned before, the set of support vectors ($SV$) is obtained
    based on the complementary slackness criterion of $\alpha_i^* (1 - y_i (\mathbf{w}^{*T}
    \mathbf{x}_i + w_0^*)) = 0$ for sample $\mathbf{x}_i$. Another complementary slackness
    condition of Eq. 2.24 is $\beta_i^* \xi_i = 0$. According to it, the support vectors
    are divided into two categories, the margin support vectors and the non-margin
    support vectors:


    - If $0 < \alpha_i < C$, based on condition $C - \alpha_i - \beta_i = 0$, we have
    $\beta_i \neq 0$ and so $\xi_i$ should be zero. Therefore, $y_i (\mathbf{w}^T
    \mathbf{x}_i + w_0) = 1$ is hold and sample $\mathbf{x}_i$ located on the margin
    and be a margin support vector.

    - If $\alpha_i = C$, we have $\beta_i = 0$ and so $\xi_i$ can be greater than
    zero. So, $y_i (\mathbf{w}^T \mathbf{x}_i + w_0) < 1$ and sample $\mathbf{x}_i$
    is on or over the margin and be a non-margin support vector.


    Also, the classification formula of a new sample in the soft margin SVM is the
    same as hard margin SVM which is discussed in Eq. 2.22.


    ## 2.2 Nonlinear SVM Classifiers


    Some problems have nonlinear decision surfaces and therefore linear methods do
    not provide a suitable answer for them. The nonlinear SVM classifier was introduced
    by Vapnik Vapnik (2000) for these problems. In this method, the input data is
    mapped to a new feature space by a nonlinear function and a hyperplane is found
    in the transformed feature space. By applying reverse mapping, the hyperplane
    becomes a curve or a surface in the input data space (see Fig. 2.5).


    Applying a transformation $\phi : \mathbb{R}^d \rightarrow \mathbb{R}^k$ on the
    input space, sample $\mathbf{x} = [x_1, \dots x_d]$ can be represented by $\phi(\mathbf{x})
    = [\phi_1(\mathbf{x}), \dots, \phi_k(\mathbf{x})]$ in the transformed space, where
    $\phi_i(\mathbf{x}) : \mathbb{R}^d \rightarrow \mathbb{R}$. The primal problem
    of soft margin SVM in the transformed space is as follows:


    $$\min_{\mathbf{w}, w_0, \{\xi_i\}_{i=1}^N} \frac{1}{2} \mathbf{w}^T \mathbf{w}
    + C \sum_{i=1}^N \xi_i$$


    s.t. $y_i(\mathbf{w}^T \phi(\mathbf{x}_i) + w_0) \geq 1 - \xi_i, \quad i = 1,
    \dots, N,$


    $\xi_i \geq 0,$


    and $\mathbf{w} \in \mathbb{R}^k$ are the separator parameters that should be
    obtained.


    The dual problem Eq. 2.27 also changes in a transformed space, as follows:


    $$\max_{\alpha} \left\{ \sum_{i=1}^N \alpha_i - \frac{1}{2} \sum_{i=1}^N \sum_{j=1}^N
    \alpha_i \alpha_j y_i y_j \phi(\mathbf{x}_i)^T \phi(\mathbf{x}_j) \right\}$$


    s.t. $\sum_{i=1}^N \alpha_i y_i = 0,$


    $0 \leq \alpha_i \leq C, \quad i = 1, \dots, N.$


    In this case, the classifier is defined as


    $$\hat{y} = \text{sign}(w_0 + \mathbf{w}^T \phi(\mathbf{x})),$$


    where $\mathbf{w} = \sum_{\alpha_i > 0} \alpha_i y_i \phi(\mathbf{x}_i)$ and $w_0
    = y_{s_j} - \mathbf{w}^T \phi(\mathbf{x}_{s_j})$ such that $\mathbf{x}_{s_j}$
    is a sample from the support vectors set.


    The challenge of this method is choosing a suitable transformation. If the proper
    mapping is used, the problem can be modeled with good accuracy in the transformed
    space. But, if $k \gg d$, then there are more parameters to learn and this takes
    more computational time. In this case, it is better to use the kernel trick which
    is mentioned in the next section. The kernel trick is a technique to use feature
    mapping without explicitly applying it to the input data.


    ### 2.2.1 Kernel Trick and Mercer Condition


    In the kernel-based approach, a linear separator in a high-dimensional space is
    obtained without applying the transformation function to the input data. In the
    dual form of the optimization problem Eq. 2.29 only the dot product of each pair
    of training samples exists. By computing the value of these inner products, the
    calculation of $\alpha = [\alpha_1, \dots, \alpha_N]$ only remains. So, unlike
    the primal problem Eq. 2.28, learning $k$ parameters is not necessary here. The
    importance of this is well seen when $k \gg d$.


    Let us define $K(\mathbf{x}, \mathbf{t}) = \phi(\mathbf{x})^T \phi(\mathbf{t})$
    as the kernel function. The basis of the kernel trick is the calculation of $K(\mathbf{x},
    \mathbf{t})$ without mapping samples $\mathbf{x}$ and $\mathbf{t}$ to the transformed
    space. For example, consider a two-dimensional input dataset and define a kernel

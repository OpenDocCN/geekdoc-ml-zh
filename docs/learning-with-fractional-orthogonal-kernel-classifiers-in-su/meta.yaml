    # 6.3 Jacobi Kernel Functions


    In this section, the kernel functions of ordinary type will be introduced and
    also its validation will be proved according to Mercer condition. Moreover, Wavelet-Jacobi
    kernel will be introduced which recently attracted the attention of researchers.
    The last subsection is devoted to fractional Jacobi kernel.


    # 6.3.1 Ordinary Jacobi Kernel Function


    As we already know, the unweighted orthogonal polynomial kernel function for SVM
    can be written as follows:


    $$K(x, z) = \sum_{i=0}^{n} J_i(x) J_i(z), \quad (6.29)$$


    where $J(.)$ denotes the evaluation of the polynomial. $x$ and $z$ are the kernel''s
    input arguments and $n$ is the highest polynomial order. Using this definition
    and the fact that need the multi-dimensional form of the kernel function, one
    can introduce the *Jacobi kernel function* by the evaluation of inner product
    of input vectors $((x, z) = xz^T)$ Nadira et al. (2019), Ozer et al. (2011):


    $$k_{Jacobi}(x, z) = \sum_{i=0}^{n} J_i^{\psi, \omega}(x) J_i^{\psi, \omega T}(z)
    w^{\psi, \omega}(x, z). \quad (6.30)$$'
  merge: -1
  pgno: 141
- img_proc: true
  md: '# Theorem 6.2 (Nadira et al. (2019)) The Jacobi Kernel introduced in Eq. 6.30
    is valid mercer kernel.


    Proof Mercer theorem states that an SVM kernel should be positive semi-definite
    or non-negative; in other words, the kernel should satisfy below relation:


    $$\iint K(x, z) f(x) f(z) dxdz \geqslant 0. \quad (6.31)$$


    By using the fact that multiplication of two valid kernels is also a valid kernel,
    one can divide the Jacobi kernel introduced at Eq. 6.30 into two kernels, one
    the inner product and the other is weight function, therefore:


    $$K_{(1)}(x, z) = \sum_{i=0}^{n} J_{i}^{\psi, \omega}(x) J_{i}^{\psi, \omega^T}(z),
    \quad (6.32)$$

    $$K_{(2)}(x, z) = w^{\psi, \omega}(x, z) \quad (6.33)$$

    $$= (d - \langle x, z \rangle + \epsilon)^{\psi} (d + \langle x, z \rangle + \epsilon)^{\omega},$$


    where $d$ is the dimension of input $x$ and $z$. Considering $f(x)$ is a function
    where $f : \mathbb{R}^m \longrightarrow \mathbb{R}$, one can evaluate the mercer
    condition for $K_{(1)}(\mathbf{x}, \mathbf{z})$ as follows, assuming each element
    is independent from others:


    $$\iint K_{(1)}(x, z) f(x) f(z) dxdz = \iint \sum_{j=0}^{n} J_{j}^{\psi, \omega}(x)
    J_{j}^{\psi, \omega^T}(z) f(x) f(z) dxdz$$

    $$= \sum_{j=0}^{n} \iint J_{j}^{\psi, \omega}(x) J_{j}^{\psi, \omega^T}(z) f(x)
    f(z) dxdz$$

    $$= \sum_{j=0}^{n} \left[ \int J_{j}^{\psi, \omega}(x) f(x) dx \int J_{j}^{\psi,
    \omega^T}(z) f(z) dz \right]$$

    $$= \sum_{j=0}^{n} \left[ \left( \int J_{j}^{\psi, \omega}(x) f(x) dx \right)
    \left( \int J_{j}^{\psi, \omega^T}(z) f(z) dz \right) \right] \geqslant 0. \quad
    (6.34)$$


    Therefore, the kernel $K_{(1)}(x, z)$ is a valid Mercer kernel. To prove $K_{(2)}(x,
    z) \geqslant 0$, we can prove the weight function in Eq. 6.6 is positive semi-definite,
    because it is easier to intuitively consider, then the general weight function
    for kernel which reformulated for two vectors input becomes clear. Due to normalization
    of the input data, this weight function is positive semi-definite, so the weight
    function $w^{\psi, \omega}(x, z) = (d - \langle x, z \rangle)^{\psi} (d + \langle
    x, z \rangle)^{\omega}$ which is a generalized form for two input vectors of the
    kernel is positive semi-definite too. $\square$'

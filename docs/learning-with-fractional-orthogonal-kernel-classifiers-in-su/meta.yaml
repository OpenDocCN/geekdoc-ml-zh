    # Chapter 8

    Solving Partial Differential Equations

    by LS-SVM


    Mohammad Mahdi Moayeri and Mohammad Hemami


    **Abstract** In recent years, much attention has been paid to machine learning-based
    numerical approaches due to their applications in solving difficult high-dimensional
    problems. In this chapter, a numerical method based on support vector machines
    is proposed to solve second-order time-dependent partial differential equations.
    This method is called the least squares support vector machines (LS-SVM) collocation
    approach. In this approach, first, the time dimension is discretized by the Crank–Nicolson
    algorithm, then, the optimal representation of the solution is obtained in the
    primal setting. Using KKT optimality conditions, the dual formulation is derived,
    and at the end, the problem is converted to a linear system of algebraic equations
    that can be solved by standard solvers. The Fokker–Planck and generalized Fitzhugh–Nagumo
    equations are considered as test cases to demonstrate the proposed effectiveness
    of the scheme. Moreover, two kinds of orthogonal kernel functions are introduced
    for each example, and their performances are compared.


    **Keywords** Partial differential equation · Fokker–Planck equation · Fitzhugh–Nagumo
    equation · Collocation LS-SVM


    # 8.1 Introduction


    Nowadays, most mathematical models of problems in science have more than one independent
    variable which usually represents time and space variables (Moayeri et al. 2020b;
    Mohammadi and Dehghan 2020, 2019; Hemami et al. 2021). These models lead to partial
    differential equations (PDEs). However, these equations usually do not have exact/analytical
    solutions due to their complexity. Thus, numerical methods can help us approximate
    the solution of equations and simulate models. Let us consider the following general
    form of a second-order PDE:'
- md: '$$A \frac{\partial^2 u}{\partial x^2} + B \frac{\partial^2 u}{\partial x \partial
    y} + C \frac{\partial^2 u}{\partial y^2} + D \frac{\partial u}{\partial x} + E
    \frac{\partial u}{\partial y} + Fu + G = 0, \quad (8.1)$$


    where $A, B, C, D, E, F$, and $G$ can be a constant, or a function of $x, y$,
    and $u$. It is clear when $G = 0$, we have a homogeneous equation, and otherwise,
    we have a nonhomogeneous equation. According to these coefficients, there are
    three kinds of PDEs (Smith 1985). This equation is called elliptic when $B^2 -
    4AC < 0$, parabolic when $B^2 - 4AC = 0$, and hyperbolic when $B^2 - 4AC > 0$.
    In science, most of the problems which include time dimension are parabolic or
    hyperbolic such as heat and wave equations (Smith 1985). In addition, the Laplace
    equation is also an example of the elliptic type equation (Lindqvist 2019; Kogut
    et al. 2019). On the other hand, if $A, B, C, D, E$, or $F$ is a function of dependent
    variable $u$, the equation converts to a nonlinear PDE which is usually more complex
    than the linear one.


    Since analytical and semi-analytical methods can be used only for simple differential
    equations, scientists have developed various numerical approaches to solve more
    complex and nonlinear ordinary/partial differential equations. These approaches
    can be divided into six general categories as


    - Finite difference method (FDM) (Smith 1985; Strikwerda 2004): The intervals
    are discretized to a finite number of steps, and the derivatives are approximated
    by finite difference formulas. Usually, the approximate solution of a problem
    is obtained by solving a system of algebraic equations obtained by employing FDM
    on PDE. Some examples of this method are implicit method (Hemami et al. 2021;
    Moayeri et al. 2021), explicit method (Smith 1985; Strikwerda 2004), Crank–Nicolson
    method (Liu and Hao 2022; Abazari and Yildirim 2019), etc. (Trefethen 1996; Meerschaert
    and Tadjeran 2006; Dehghan and Taleei 2010).

    - Finite element method (FEM) (Bath and Wilson 1976; Ottosen et al. 1992): This
    approach is based on mesh generating. In fact, FEM subdivides the space into smaller
    parts called finite elements. Then, the variation calculus and low-order local
    basis functions are used in these elements. Finally, all sets of element equations
    are combined into a global system of equations for the final calculation. Different
    kinds of FEMs are standard FEM (Hughes 2012; Zienkiewicz et al. 2005), nonconforming
    FEM (Carstensen and Köhler 2017; Wilson et al. 2021), mixed FEM (Bruggi and Venini
    2008; Bossavit and Vérité 1982), discontinuous FEM (Kanschat 2004; Chien and Wu
    2001), etc. (Pozrikidis 2014; Wang et al. 2019; Yeganeh et al. 2017; Zhao et al.
    2017).

    - Finite volume method (FVM) (Chien and Wu 2001; Eymard et al. 2000): FVM is similar
    to FEM and needs mesh construction. In this approach, these mesh elements are
    called control volumes. In fact, in this method, volume integrals are used with
    the divergence theorem. An additional feature is the local conservative of the
    numerical fluxes; that is, the numerical flux is conserved from one discretization
    cell to its neighbor. Due to this property, FVM is appropriate for the models
    where the flux is of importance (Zhao et al. 1996; Kassab et al. 2003). Actually,
    a finite volume method evaluates exact expressions for the average value of the
    solution over some volume, and uses this data to construct approximations of the
    solution within cells (Fallah et al. 2000). Some famous FVMs are cell-centered
    FVM (Ghidaglia et al. 2001; Bertolazzi and Manzini 2001), vertex-centered FVM
    (Asouti et al. 2011; Zhang and Zou 2013), Petrov–Galerkin FVM (Dubois 2000; Moosavi
    and Khelil 2008), etc. (Zhao et al. 1996; Liu et al. 2014; Fallah 2004).

    - Spectral method (Shizgal 2015): Unlike previous approaches, the spectral method
    is a high-order global method. In the spectral method, the solution of the differential
    equation is considered as a finite sum of basis functions as $\sum_{i=0}^{n} a_i
    \phi_i(x)$. Usually, basis functions $\phi_i(x)$ are one of the orthogonal polynomials
    because of their orthogonality properties which make the calculations easier (Asghari
    et al. 2022). Now, different strategies are developed to calculate the coefficients
    in the sum in order to satisfy the differential equation as well as possible.
    Generally, in simple geometries for smooth problems, the spectral methods offer
    exponential rates of convergence/spectral accuracy (Spalart et al. 1991; Mai-Duy
    2006). This method is divided into three main categories: collocation (Zayernouri
    and Karniadakis 2014, 2015), Galerkin (Shen 1994; Chen et al. 2008), Petrov–Galerkin
    methods (Gamba and Rjasanow 2018; Zayernouri et al. 2015), etc. (Moayeri et al.
    2020b; Kopriva 2009; Delkhosh and Parand 2021; Latifi and Delkhosh 2020).

    - Meshfree method (Fasshauer 2007; Liu 2003): The meshfree method is used to establish
    a system of algebraic equations for the whole problem domain without the use of
    a predefined mesh, or uses easily generable meshes in a much more flexible or
    freer manner. It can be said that meshfree methods essentially use a set of nodes
    scattered within the problem domain as well as on the boundaries to represent
    the problem domain and its boundaries. The field functions are then approximated
    locally using these nodes (Liu 2003). Meshfree methods have been considered by
    many researchers in the last decade due to their high flexibility and high accuracy
    of the numerical solution (Rad and Parand 2017a; Dehghan and Shokri 2008). However,
    there are still many challenges and questions about these methods that need to
    be answered (Abbasbandy and Shirzadi 2010, 2011), such as optimal shape parameter
    selection in methods based on radial basis functions and enforcing boundary conditions
    in meshfree methods. Some of the meshfree methods are radial basis function approach
    (RBF) (Rad et al. 2012, 2014; Parand et al. 2017; Kazem and Rad 2012; Kazem et
    al. 2012b; Rashedi et al. 2014; Parand and Rad 2013), radial basis function generated
    finite difference (RBF-FD) (Mohammadi et al. 2021; Abbaszadeh and Dehghan 2020a),
    meshfree local Petrov–Galerkin (MLPG) (Rad and Parand 2017a,b; Abbaszadeh and
    Dehghan 2020b; Rad et al. 2015a), element free Galerkin (EFG) (Belytschko et al.
    1994; Dehghan and Narimani 2020), meshfree local radial point interpolation method
    (MLRPIM) (Liu et al. 2005; Liu and Gu 2001; Rad and Ballestra 2015; Rad et al.
    2015b), etc. (Hemami et al. 2020, 2019; Mohammadi and Dehghan 2020, 2019).

    - Machine learning-based methods (Cortes and Vapnik 1995; Jordan and Mitchell
    2015): With the growth of available scientific data and improving machine learning
    approaches, recently, researchers of scientific computing have been trying to
    develop machine learning and deep learning algorithms for solving differential
    equations (Aarts and Van Der Veer 2001; Cheung and See 2021). Especially, they
    have had some successful attempts to solve some difficult problems that common
    numerical methods are not well able to solve such as PDEs by noisy observations
    or very high-dimension PDEs. Some of the recent machine learning-based numerical
    methods are physics-informed neural networks (PINN) (Raissi et al. 2019; Cai et
    al. 2022), neural network collocation method (NNCM) (Brink et al. 2021; Liaqat
    et al. 2001), deep Galerkin method (DGM) (Sirignano and Spiliopoulos 2018; Saporito
    and Zhang 2021), deep Ritz method (DRM) (Yu 2018; Lu et al. 2021), differential
    equation generative adversarial networks (DEGAN) (Lee et al. 2021; Kadeethumm
    et al. 2021), fractional orthogonal neural networks (Hadian-Rasanan et al. 2019,
    2020), least squares support vector machines (LS-SVM) (Shivanian et al. 2022;
    Hajimohammadi et al. 2022), etc. (Pang et al. 2019; Parand et al. 2021a; Hajimohammadi
    and Parand 2021).


    Each of these methods has its advantages and disadvantages; for instance, the
    spectral method has a spectral convergence for smooth functions, but it is not
    a good choice for problems with a complex domain. On the other hand, the finite
    element method can handle domain complexity and singularity easily. Moreover,
    scientists have combined these methods with each other to introduce new efficient
    numerical approaches; for example, the spectral element approach (Karniadakis
    and Sherwin 2005), finite volume spectral element method (Shakeri and Dehghan
    2011), radial basis function-finite difference method (RBF-FD) (Mohammadi et al.
    2021), and deep RBF collocation method (Saha and Mukhopadhyay 2020).


    In this chapter, we utilize a machine learning-based method using support vector
    machines called the least squares support vector machines collocation algorithm
    (Mehrkanoon and Suykens 2015, 2012) in conjunction with the Crank-Nicolson method
    to solve well-known second-order PDEs. In this algorithm, modified Chebyshev and
    Legendre orthogonal functions are considered as kernels. In the proposed method,
    first, the temporal dimension is discretized by the Crank–Nicolson approach. With
    the aid of the LS-SVM collocation method, the obtained equation at each time step
    is converted to an optimization problem in a primal form whose constraints are
    the discretized equation with its boundary conditions. Then, the KKT optimality
    condition is utilized to derive the dual form. Afterward, the problem is minimized
    in dual form using the Lagrange multipliers method (Parand et al. 2021b). Finally,
    the problem is converted to a linear system of algebraic equations that can be
    solved by a standard method such as QR or LU decomposition.


    ## 8.2 LS-SVM Method for Solving Second-Order Partial Differential Equations


    We consider a time-dependent second-order PDE with Dirichlet boundary condition
    in the following form:


    $$\frac{\partial u}{\partial t} = A(x, t, u)u + B(x, t, u)\frac{\partial u}{\partial
    x} + C(x, t, u)\frac{\partial^2 u}{\partial x^2}, \quad (8.2)$$

    $$x \in \Omega \subset \mathbb{R} \quad \text{and} \quad t \in [0, T].$$'
  mdcn: '$$A \frac{\partial^2 u}{\partial x^2} + B \frac{\partial^2 u}{\partial x
    \partial y} + C \frac{\partial^2 u}{\partial y^2} + D \frac{\partial u}{\partial
    x} + E \frac{\partial u}{\partial y} + Fu + G = 0, \quad (8.1)$$


    其中 $A, B, C, D, E, F$ 和 $G$ 可以是常数，也可以是 $x, y$ 和 $u$ 的函数。显然，当 $G = 0$ 时，我们得到一个齐次方程；否则，我们得到一个非齐次方程。根据这些系数，偏微分方程（PDEs）分为三种类型（Smith
    1985）。当 $B^2 - 4AC < 0$ 时，该方程称为椭圆型方程；当 $B^2 - 4AC = 0$ 时，称为抛物型方程；当 $B^2 - 4AC
    > 0$ 时，称为双曲型方程。在科学中，大多数包含时间维度的问题是抛物型或双曲型的，例如热传导方程和波动方程（Smith 1985）。此外，拉普拉斯方程也是椭圆型方程的一个例子（Lindqvist
    2019; Kogut et al. 2019）。另一方面，如果 $A, B, C, D, E$ 或 $F$ 是因变量 $u$ 的函数，则该方程转化为非线性偏微分方程，通常比线性方程更复杂。


    由于解析和半解析方法只能用于简单的微分方程，科学家们已经开发了各种数值方法来求解更复杂的非线性常微分方程/偏微分方程。这些方法可以分为以下六大类：


    -   有限差分法（FDM）（Smith 1985; Strikwerda 2004）：将区间离散化为有限数量的步长，并用有限差分公式近似导数。通常，通过对偏微分方程应用有限差分法得到的代数方程组进行求解，从而获得问题的近似解。该方法的一些例子包括隐式方法（Hemami
    et al. 2021; Moayeri et al. 2021）、显式方法（Smith 1985; Strikwerda 2004）、Crank-Nicolson
    方法（Liu and Hao 2022; Abazari and Yildirim 2019）等（Trefethen 1996; Meerschaert and
    Tadjeran 2006; Dehghan and Taleei 2010）。

    -   有限元法（FEM）（Bath and Wilson 1976; Ottosen et al. 1992）：该方法基于网格生成。事实上，有限元法将空间细分为称为有限元的更小部分。然后，在这些单元中使用变分法和低阶局部基函数。最后，将所有单元方程组组合成一个全局方程组以进行最终计算。不同类型的有限元法包括标准有限元法（Hughes
    2012; Zienkiewicz et al. 2005）、非协调有限元法（Carstensen and Köhler 2017; Wilson et al.
    2021）、混合有限元法（Bruggi and Venini 2008; Bossavit and Vérité 1982）、间断有限元法（Kanschat
    2004; Chien and Wu 2001）等（Pozrikidis 2014; Wang et al. 2019; Yeganeh et al. 2017;
    Zhao et al. 2017）。

    -   有限体积法（FVM）（Chien and Wu 2001; Eymard et al. 2000）：有限体积法类似于有限元法，也需要构建网格。在这种方法中，这些网格单元被称为控制体积。实际上，在该方法中，体积积分与散度定理一起使用。一个额外的特点是数值通量的局部守恒性；即数值通量从一个离散单元守恒到其相邻单元。由于这一特性，有限体积法适用于通量很重要的模型（Zhao
    et al. 1996; Kassab et al. 2003）。实际上，有限体积法计算解在某些体积上的平均值的精确表达式，并使用这些数据在单元内构建解的近似（Fallah
    et al. 2000）。一些著名的有限体积法包括单元中心有限体积法（Ghidaglia et al. 2001; Bertolazzi and Manzini
    2001）、顶点中心有限体积法（Asouti et al. 2011; Zhang and Zou 2013）、Petrov-Galerkin 有限体积法（Dubois
    2000; Moosavi and Khelil 2008）等（Zhao et al. 1996; Liu et al. 2014; Fallah 2004）。

    -   谱方法（Shizgal 2015）：与之前的方法不同，谱方法是一种高阶全局方法。在谱方法中，微分方程的解被视为基函数的有限和，即 $\sum_{i=0}^{n}

    functional operator. If the operator is linear, then the dual form of the optimization
    problem Eq. 9.17 can be computed using the following linear system of equations:


    ```

    $$\left[\begin{array}{c|c} 0 & \widetilde{\mathcal{L}}^T \ \hline \widetilde{\mathcal{L}}
    & \Omega + I/\gamma \end{array}\right] \left[\begin{array}{c} b \ \alpha \end{array}\right]
    = \left[\begin{array}{c} 0 \ y \end{array}\right], \qquad (9.18)$$

    ```


    in which


    ```

    $$\begin{aligned} \alpha &= [\alpha_1, \ldots, \alpha_n]^T, \ y &= [f(x_1), f(x_2),
    \ldots, f(x_n)]^T, \ \widetilde{\mathcal{L}} &= [\mathcal{L}1(x_1), \mathcal{L}1(x_2),
    \ldots, \mathcal{L}1(x_n)], \qquad (9.19) \ \Omega_{i,j} &= \mathcal{L}\varphi(x_i)^T
    \mathcal{L}\varphi(x_j) \ &= \mathcal{L}\mathcal{L}K(x_i, x_j), \quad i, j = 1,
    2, \ldots, n. \end{aligned}$$

    ```


    The approximated solution in the dual form takes the following form:


    ```

    $$\bar{u}(x) = \sum_{i=1}^n \alpha_i \widetilde{K}(x, x_i) + b,$$

    ```


    where


    ```

    $$\widetilde{K}(x, x_i) = \mathcal{L}\varphi(x_i)^T \varphi(x) = \mathcal{L}K(x,
    x_i).$$

    ```


    # 9.3.5 GLS-SVR Method


    The Galerkin approach is a famous method for solving a wide of problems. In this
    approach, the test functions $\psi$ are chosen equal to the basis functions. If
    the basis functions are orthogonal together, this approach leads to a sparse system
    of algebraic equations. Some examples of this feature are provided in the next
    section. For now, let us define the model. In the primal space, the model can
    be constructed as follows:


    ```

    $$\begin{aligned} \min_{w;e} \quad & \frac{1}{2} w^T w + \frac{\gamma}{2} e^T
    e \ \text{s.t.} \quad & \int_{\Delta} [\mathcal{L}\bar{u}(x) - f(x)]\varphi_k(x)dx
    = e_k, \quad k = 0, \ldots, d, \end{aligned} \qquad (9.20)$$

    ```


    where $d$ is the number of basis functions and $\mathcal{N}$ is a linear or nonlinear
    functional operator. If the operator is linear, then the dual form of the optimization
    problem Eq. 9.20 can be computed using the following linear system:'

  md: '# A.2 Basics of Python


    In this section, we try to introduce the fundamentals of Python language, how
    to install Python and how to use this language, and also how to define variables,
    loops, conditions, and functions. Pandas, Numpy, and Matplotlib are three libraries
    that are used for all the data scientists’ tasks and we will discuss their preparations.


    # How to Use Python?


    There are many ways you can install Python and work with it. Here, some ways that
    are more appropriate are discussed. The basic way of installing is to go to the
    Python website² and find the suitable version of Python for your work based on
    your operation system. After downloading and installing Python, also we need a
    code editor for writing out code such as Notepad++,³ Atom,⁴ Sublime,⁵ or any code
    editor. These code editors are open source and we can easily download and use
    them for free. There is also some commercial programs like PyCharm, Spyder, Pydev,
    etc. The applicability of a program can be seen in debugging of big Python programs.
    There is another way to install Python using Anaconda,⁶ a Python distribution
    that its objective is scientific computing (data science, machine learning applications,
    large-scale data processing, predictive analytics, etc.). By installing Anaconda,
    all important and famous packages are effortlessly installed. Additionally, Anaconda
    installs some programs such as Jupyter Notebook⁷ which is a well-known open-source
    platform to develop code. One of the advantages of Jupyter Notebook over others
    is that in this program we can run Python code cell by cell which can be very
    helpful. For installing Anaconda in Windows or macOS, you can download the graphical
    installer, but for Linux .sh file should be downloaded and run in the terminal.
    This is the last step to install Python and its packages. Now the basics of the
    language can be explained.


    # Python Basics


    The basics of Python are very similar to other programming languages like C, C++,
    C#, and Java, so if one is familiar with these programming languages they can
    easily learn Python.



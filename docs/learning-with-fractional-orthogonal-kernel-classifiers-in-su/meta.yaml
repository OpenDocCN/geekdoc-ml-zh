    \ of them has been defined besides their properties too.\n\n### 5.2.1 Properties\
    \ of Gegenbauer Polynomials\n\nGegenbauer polynomials of degree $n$, $G_n^\\lambda(x)$\
    \ and order $\\lambda > -\\frac{1}{2}$ are solutions to the following Sturm–Liouville\
    \ differential equation (Doman 2015; Padierna et al. 2018; Asghari et al. 2022):\n\
    \n$$(1 - x^2)\\frac{d^2y}{dx^2} - (2\\lambda + 1)x\\frac{dy}{dx} + n(n + 2\\lambda)y\
    \ = 0, \\quad (5.1)$$\n\nwhere $n$ is a positive integer and $\\lambda$ is a real\

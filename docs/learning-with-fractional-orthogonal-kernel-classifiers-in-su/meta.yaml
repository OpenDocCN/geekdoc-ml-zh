- md: '## 7.2 LS-SVM Formulation


    We consider the general form of an $m$-th order initial value problem (IVP), which
    is as follows:


    $$L[y(x)] - F(x) = 0, \quad x \in [a, c],$$

    $$y^{(i)}(a) = p_i, \quad i = 0, 1, \ldots, m - 1,$$


    where $L$ represents an ordinary differential operator, i.e.,


    $$L[y(x)] = L(x, y(x), y''(x), \ldots, y^{(m)}(x)),$$


    and $F(x)$ and $\{p_i\}_{i=0}^{m-1}$ are known. The aim is to find a learning
    solution to this equation by using the LS-SVM formulation.


    We assume that we have training data $\{x_i, y_i\}_{i=0}^N$, in which $x_i \in
    \mathbb{R}$ is the input data and $y_i \in \mathbb{R}$ is output data. To solve
    the ODE, one-dimensional data is sufficient. Then, the solution to our regression
    problem is approximated by $y(x) = \boldsymbol{w}^T \boldsymbol{\varphi}(x)$,
    where $\boldsymbol{w} = [w_0, \ldots, w_N]^T$, and $\boldsymbol{\varphi}(x) =
    [\varphi_0(x), \varphi_1(x), \ldots, \varphi_N(x)]^T$ is a vector of arbitrary
    basis functions. It is worth mentioning that the basis functions are selected
    in a way that they satisfy the initial conditions. The primal LS-SVM model is
    as follows (see, e.g., Suykens et al. (2002)):


    $$\text{minimize}_{\boldsymbol{w}, \boldsymbol{\varepsilon}} \quad \frac{1}{2}
    \boldsymbol{w}^T \boldsymbol{w} + \frac{\gamma}{2} \boldsymbol{\varepsilon}^T
    \boldsymbol{\varepsilon},$$

    $$\text{subject to} \quad y_i = \boldsymbol{w}^T \boldsymbol{\varphi}(x_i) + \varepsilon_i,
    \quad i = 0, 1, \ldots, N,$$


    where $\varepsilon_i$ is the error of the $i$-th training point, $w \in \mathbb{R}^h$,
    $\varphi(.) : \mathbb{R} \rightarrow \mathbb{R}^h$ is a feature map, and $h$ is
    the dimension of feature space. In this formulation, the term $\frac{1}{2}w^Tw$
    can be interpreted to obtain the stable solutions.


    The problem with this formulation is that when solving the differential equation,
    we don''t have the value of $y_i$, and therefore, we put the differential equation
    in our model. The collocation form of equations is used as the constraint of our
    optimization problem.


    To solve the optimization problem, the kernel trick is used and the problem is
    transformed into a dual form.


    ### 7.2.1 Collocation Form of LS-SVM


    In the case that LS-SVM is used to solve a linear ODE, the approximate solution
    is obtained by solving the following optimization problem Mehrkanoon et al. (2012),
    Pakniyat et al. (2021):


    $$\begin{aligned} \text{minimize}_{w,\varepsilon} \quad & \frac{1}{2}w^Tw + \frac{\gamma}{2}\varepsilon^T\varepsilon,
    \\ \text{subject to} \quad & L[\tilde{y}_i] - F(x_i) = \varepsilon_i, \quad i
    = 0, 1, \ldots, N, \end{aligned}$$


    where $\varepsilon = [\varepsilon_0, \ldots, \varepsilon_N]^T$ and $\tilde{y}$
    is the approximate solution, which is written in terms of the basis functions,
    to satisfy the initial conditions. The collocation points $\{x_i\}_{i=0}^N$ are
    also chosen to be the roots of rational Legendre functions in the learning phase.


    Now we introduce a dual form of the problem:


    > **Theorem 7.1** (Mehrkanoon et al. (2012)) *Suppose that $\varphi_i$ be the
    basis functions and $\boldsymbol{\alpha} = [\alpha_0, \alpha_1, \ldots, \alpha_N]^T$
    be the Lagrangian coefficients in the dual form of the minimization problem Eq.
    7.4, then the solution of minimization problem is as follows:*


    $$w = M\boldsymbol{\alpha} = \begin{pmatrix} L(\varphi_0(x_0)) & L(\varphi_0(x_1))
    & \ldots & L(\varphi_0(x_N)) \\ L(\varphi_1(x_0)) & \ldots & \ldots & L(\varphi_1(x_N))
    \\ \ldots & \ldots & \ldots & \ldots \\ L(\varphi_N(x_0)) & L(\varphi_N(x_1))
    & \ldots & L(\varphi_N(x_N)) \end{pmatrix} \begin{pmatrix} \alpha_0 \\ \alpha_1
    \\ . \\ . \\ \alpha_N \end{pmatrix}, \quad \varepsilon = \frac{\boldsymbol{\alpha}}{\gamma}
    = \begin{pmatrix} \frac{1}{\gamma}\alpha_0 \\ \frac{1}{\gamma}\alpha_1 \\ . \\
    . \\ \frac{1}{\gamma}\alpha_N \end{pmatrix},$$


    where


    $$(M^TM + \frac{1}{\gamma}I)\boldsymbol{\alpha} = \boldsymbol{F},$$


    and $\boldsymbol{F} = [F(x_0), F(x_1), \ldots, F(x_N)]^T$.


    Proof First, we construct the Lagrangian function of our optimization problem
    as follows:


    $$G = \frac{1}{2} \boldsymbol{w}^T \boldsymbol{w} + \frac{\gamma}{2} \boldsymbol{\varepsilon}^T
    \boldsymbol{\varepsilon} - \sum_{i=0}^N \alpha_i \left( \sum_{j=0}^N w_j L(\varphi_j(x_i))
    - F_i - \varepsilon_i \right), \quad (7.6)$$


    where $\alpha_i \geq 0$ ($i = 0, 1, \ldots, N$) are Lagrange multipliers. To obtain
    the optimal solution, by using the Karush-Kuhn-Tucker (KKT) optimality conditions
    Mehrkanoon et al. (2012), Mehrkanoon and Suykens (2013), Cortes and Vapnik (1995),
    one gets


    $$\frac{\partial G}{\partial w_k} = w_k - \sum_{i=0}^N \alpha_i (L(\varphi_k(x_i)))
    = 0,$$

    $$\frac{\partial G}{\partial \varepsilon_k} = \gamma \varepsilon_k + \alpha_k
    = 0, \quad (7.7)$$

    $$\frac{\partial G}{\partial \alpha_k} = \sum_{j=0}^N w_j L(\varphi_j(x_k)) -
    F_k - \varepsilon_k = 0.$$


    So, the solution is obtained by the following relations:


    $$w_k = \sum_{i=0}^N M_{ki} \alpha_i, \quad (M_{ki} = (L(\varphi_k(x_i)))), \quad
    k = 0, 1, 2, \ldots, N, \quad (7.8)$$

    $$\boldsymbol{w} = M \boldsymbol{\alpha},$$


    and by using the second relation in Eq. 7.7, one obtains


    $$\varepsilon_k = \frac{-\alpha_k}{\gamma}, \quad \Rightarrow \boldsymbol{\varepsilon}
    = \frac{-1}{\gamma} \boldsymbol{\alpha}. \quad (7.9)$$


    Considering the third equation results in


    $$\sum_{j=0}^N w_j L(\varphi_j(x_k)) - F_k - \varepsilon_k = 0, \quad (7.10)$$

    $$(M^T \boldsymbol{w})_k - F_k - \varepsilon_k = 0, \quad \Rightarrow M^T \boldsymbol{w}
    - \boldsymbol{\varepsilon} = \boldsymbol{F}.$$


    So, by using Eqs. 7.8–7.10, we have


    $$M^T M \boldsymbol{\alpha} + \frac{1}{\gamma} \boldsymbol{\alpha} = \boldsymbol{F},
    \quad \Rightarrow \left( M^T M + \frac{1}{\gamma} I \right) \boldsymbol{\alpha}
    = \boldsymbol{F}, \quad (7.11)$$


    where $F_i = F(x_i)$ and so, the vector of Lagrange multipliers $\boldsymbol{\alpha}$
    is obtained. $\square$


    ## 7.3 Rational Legendre Kernels


    Kernel function has an efficient rule in using LS-SVM; therefore, the choice of
    kernel function is important. These kernel functions can be constructed by using
    orthogonal polynomials. The operational matrices of orthogonal polynomials are
    sparse and the derivatives are obtained exactly which makes our method fast and
    it leads to well-posed systems. Given that the properties of Legendre polynomials,
    fractional Legendre functions, as well as the Legendre kernel functions are discussed
    in Chap.4, we recommend that readers refer to that chapter of the book for review,
    and as a result, in this section, we will focus more on the rational Legendre
    kernels. In particular, Guo et al. (2000) introduced a new set of rational Legendre
    functions which are mutually orthogonal in $L_2(0, +\infty)$ with the weight function
    $w(x) = \frac{2L}{(L+x)^2}$, as follows:


    $$RP_n(x) = P_n\left(\frac{x-L}{x+L}\right). \tag{7.12}$$


    Thus,


    $$RP_0(x) = 1, \quad RP_1(x) = \frac{x-L}{x+L},$$

    $$nRP_n(x) = (2n-1)\left(\frac{x-L}{x+L}\right)RP_{n-1}(x) - (n-1)RP_{n-2}(x),
    \quad n \ge 2, \tag{7.13}$$


    where $\{P_n(x)\}$ are Legendre polynomials which were defined in Chap 5. These
    functions are used to solve problems on semi-infinite domains, and they can also
    produce sparse matrices and have a high convergence rate Guo et al. (2000), Parand
    and Razzaghi (2004).


    Since the range of Legendre polynomials is $[-1, 1]$, we have $|RP_n(x)| \le 1$.
    The operational matrix of the derivative is also a lower Hessenberg matrix which
    can be calculated as Parand and Razzaghi (2004), Parand et al. (2009):


    $$D = \frac{1}{L}(D_1 + D_2), \tag{7.14}$$


    where $D_1$ is a tridiagonal matrix


    $$D_1 = \text{Diag}\left(\frac{7i^2 - i - 2}{2(2i+1)}, -i, \frac{i(i+1)}{2(2i+1)}\right),
    \quad i = 0, \dots, n-1,$$


    and $D_2 = [d_{ij}]$ such that


    $$d_{ij} = \begin{cases} 0, & j \ge i-1, \\ (-1)^{i+j+1}(2j+1), & j < i-1. \end{cases}$$'

    $$y_i(\mathbf{w}.\mathbf{x}_i + w_0) - 1 \geq 0. \tag{1.2}$$


    为了找到分隔正负样本的最大间隔，我们需要知道间隔的宽度。为了计算间隔的宽度，需要将$(\mathbf{x}_+ - \mathbf{x}_-)$投影到单位归一化的$\frac{\mathbf{w}}{\|\mathbf{w}\|}$上。因此，宽度计算为$(\mathbf{x}_+

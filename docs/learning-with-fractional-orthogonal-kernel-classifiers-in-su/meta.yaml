    derivatives of the feature map can be written in terms of derivatives of the kernel
    function. Let us consider the following differential operator:


    $$\nabla^{m,n} = \frac{\partial^{m+n}}{\partial u^m \partial v^n},$$


    which will be used in this section.

    We define $\chi^{(m,n)}(u, v) = \nabla^{m,n} K(u, v)$ and $\chi_{l,i}^{(m,n)}
    = \nabla^{m,n} K(u, v)|_{u=x(l), v=x(i)}$, and Eq. 7.25 is written as follows:


    $$h_l = \sum_{i=0}^N \alpha_i [\chi_{l,i}^{(2,2)} + \frac{k}{x_i} \chi_{l,i}^{(1,2)}
    + f_i \chi_{l,i}^{(0,2)} + \frac{k}{x_i} \chi_{l,i}^{(2,1)} + \frac{k^2}{x_i x_l}
    \chi_{l,i}^{(1,1)} + \frac{k}{x_i} f_i \chi_{l,i}^{(0,1)} + f_i \chi_{l,i}^{(2,0)}
    + f_i \frac{k}{x_i} \chi_{l,i}^{(1,0)} + f_i f_l \chi_{l,i}^{(0,0)}] + \frac{\alpha_l}{\gamma},

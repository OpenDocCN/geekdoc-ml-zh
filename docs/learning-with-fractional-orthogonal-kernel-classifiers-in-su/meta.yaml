    ## 8.3.1 福克-普朗克方程


    福克-普朗克方程在天体物理学 (Chavanis 2006)、生物学 (Frank et al. 2003)、化学物理学 (Grima et al. 2011)、聚合物
    (Chauvière and Lozinski 2001)、电路理论 (Kumar 2013)、介电弛豫 (Tanimura 2006)、经济学 (Furioli
    et al. 2017)、气体中的电子弛豫 (Braglia et al. 1981)、成核 (Reguera et al. 1998)、光学双稳态 (Gronchi
    and Lugiato 1973)、量子光学 (D’ariano et al. 1994)、反应系统 (De Decker and Nicolis 2020)、固态物理
    (Kumar 2013)、金融 (Rad et al. 2018)、认知心理学 (Hadian-Rasanan et al. 2021) 等领域有着广泛的应用
    (Risken 1989; Kazem et al. 2012a)。事实上，该方程源于对粒子布朗运动的描述 (Ullersma 1966; Uhlenbeck
    and Ornstein 1930)。例如，描述势场中布朗运动的方程之一是克拉默斯方程，它是福克-普朗克方程的一个特例 (Jiménez-Aquino and
    Romero-Bastida 2006; Friedrich et al. 2006)。福克-普朗克方程的一般形式为


    $\frac{\partial u}{\partial t} = \left[ -\frac{\partial}{\partial x} \psi_1(x,
    t, u) + \frac{\partial^2}{\partial x^2} \psi_2(x, t, u) \right] u$, (8.11)


    其中 $\psi_1$ 和 $\psi_2$ 分别是漂移系数和扩散系数。如果这些系数依赖于 $x$ 和 $t$，则该偏微分方程被称为前向柯尔莫哥洛夫方程 (Conze
    et al. 2022; Risken 1989)。还有一种类似于前向柯尔莫哥洛夫方程的福克-普朗克方程，称为后向柯尔莫哥洛夫方程 (Risken 1989;
    Flandoli and Zanco 2016)，其形式为 (Parand et al. 2018)：


    $\frac{\partial u}{\partial t} = \left[ -\psi_1(x, t) \frac{\partial}{\partial
    x} + \psi_2(x, t) \frac{\partial^2}{\partial x^2} \right] u$. (8.12)


    此外，如果 $\psi_1$ 和 $\psi_2$ 除了依赖于时间和空间外，还依赖于 $u$，那么我们就得到了非线性福克-普朗克方程，它在生物物理学 (Xing
    et al. 2005)、神经科学 (Hemami et al. 2021; Moayeri et al. 2021)、工程学 (Kazem et al.
    2012a)、激光物理学 (Blackmore et al. 1986)、非线性流体动力学 (Zubarev and Morozov 1983)、等离子体物理学
    (Peeters and Strintzi 2008)、图案形成 (Bengfort et al. 2016) 等领域有着重要的应用 (Barkai 2001;
    Tsurui and Ishikawa 1986)。


    已有一些富有成效的研究通过经典数值方法探索了福克-普朗克方程。例如，Vanaja (1992) 提出了一种求解该模型的迭代算法。在数值方法方面，例如 (Zorzano
    et al. 1999)，研究人员将有限差分方法应用于二维福克-普朗克方程。2006年，Dehghan 和 Tatari (2006) 发展了何氏变分迭代法
    (VIM) 来近似求解该方程。此外，Tatari 等人 (2007) 研究了阿多米安分解法在求解不同类型福克-普朗克方程中的应用。一年后，Lakestani
    和 Dehghan (2008) 使用三次 B 样条尺度函数获得了福克-普朗克方程的数值解。此外，Kazem 等人 (2012a) 提出了一种无网格方法来求解线性和非线性福克-普朗克方程。最近，一种伪谱方法被应用于高精度近似求解福克-普朗克方程
    (Parand et al. 2018)。


    通过简化方程 8.11，福克-普朗克方程可化为方程 8.2 的形式。值得一提的是，如果我们的方程是线性的，那么 $A(x, t, u) = 0$。下面我们给出一些不同的线性和非线性示例。这些示例定义在
    $\Omega = [0, 1]$ 上。


    需要注意的是，福克-普朗克方程和广义 FHN 方程所有示例的平均 CPU 时间约为 2.48 和 2.5 秒，具体取决于空间节点数和时间步长。此外，所提方法的时间复杂度阶为
    $O(Mn^3)$，其中 $M$ 是时间步数，$n$ 是空间节点数。


    ### 8.3.1.1 示例 1


    考虑方程 8.11，其中 $\psi_1(x) = -1$，$\psi_2(x) = 1$，初始条件为 $f(x) = x$。使用这些固定值，我们可以写出
    $A(x, t, u) = 0$，$B(x, t, u) = 1$，以及 $C(x, t, u) = 1$。该测试问题的精确解为 $u(x, t) = x
    + t$ (Kazem et al. 2012a; Lakestani and Dehghan 2008)。


    在此示例中，我们考虑 $n = 15$，$\Delta t = 0.001$，$\gamma = 10^{15}$。图 8.1 展示了使用三阶切比雪夫核作为示例所获得的函数
    $u(x, t)$ 的结果。同时，表 8.1 和 8.2 显示了不同核在不同时间的 $L_2$ 和 RMS 误差。请注意，在这些表格中，多项式名称旁边的数字表示其阶数。此外，每个核的衰减参数值也在表中指明。



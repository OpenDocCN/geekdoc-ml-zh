    # Chapter 12

    Classification Using Orthogonal Kernel Functions: Tutorial on ORSVM Package


    Amir Hosein Hadian Rasanan, Sherwin Nedaei Janbesaraei, Amirreza Azmoon, Mohammad
    Akhavan, and Jamal Amani Rad


    **Abstract** Classical and fractional orthogonal functions and their properties
    as the kernel functions for the SVM algorithm are discussed throughout this book.
    In Chaps. 3, 4, 5, and 6, the four classical families of the orthogonal polynomials
    (Chebyshev, Legendre, Gegenbauer, and Jacobi) were considered and the fractional
    forms of these polynomials were presented as kernel function and their performance
    has been shown. However, using these kernels needs much effort to implement. To
    make it easy for anyone who needs to try and use these kernels, a Python package
    is provided here. In this chapter, the ORSVM package is introduced as an SVM classification
    package with orthogonal kernel functions.


    **Keywords** Python · ORSVM · Orthogonal Kernel · Classification


    # 12.1 Introduction



  mdcn: '## 10.2 预备知识


    如前所述，本算法中使用了模态勒让德函数。由于第4章已对其性质和构造过程进行了详细阐述，本章将不再赘述。不过，本节将介绍以Caputo定义为核心的分数阶导数以及数值积分方法。


    ### 10.2.1 分数阶导数


    将$f(x)$视为函数，可推导出$n$阶柯西公式。通过将该公式推广至非整数阶，我们得到Riemann-Liouville分数阶积分定义。为此，著名的Gamma函数被用作非整数的阶乘函数。因此，将分数阶积分的Riemann-Liouville定义记为${}^{RL}\mathcal{I}_x^\beta
    f(x)$，其定义如下（Hadian等，2020）：


    $${}^{RL}\mathcal{I}_x^\beta f(x) = \frac{1}{\Gamma(\beta)} \int_a^x (x-t)^{\beta-1}
    f(t) dt. \quad (10.5)$$


    其中$\beta$为实数，表示积分阶数。此外，分数阶导数还有另一种定义，即Caputo定义，记为${}^C\mathcal{D}_x^\beta f(x)$，其定义如下（Hadian等，2020）：


    $${}^C\mathcal{D}_x^\beta f(x) = {}^{RL}\mathcal{I}_x^{(k-\beta)} f^{(k)}(x) =
    \begin{cases} \frac{1}{\Gamma(k-\beta)} \int_a^x \frac{f^{(k)}(t)dt}{(x-t)^{\beta+1-k}}
    & \text{若 } \beta \notin \mathbb{N} \\ \frac{d^\beta}{dx^\beta} & \text{若 } \beta
    \in \mathbb{N} \end{cases}, \quad (10.6)$$


    值得一提的是，公式(10.7)和(10.8)是Caputo导数最重要的性质（Hadian等，2020）：


    $$_{0}^{C}\mathcal{D}_{x}^{\alpha}x^{\gamma} = \begin{cases} \frac{\Gamma(\gamma+1)}{\Gamma(\gamma-\alpha+1)}x^{\gamma-\alpha},
    & 0 \leq \alpha \leq \gamma \\ 0, & \alpha > \gamma \end{cases}$$


    由于Caputo导数是线性算子（Hadian等，2020），我们有


    $$_{a}^{C}\mathcal{D}_{x}^{\alpha}(\lambda f(x) + \mu g(x)) = \lambda _{a}^{C}\mathcal{D}_{x}^{\alpha}f(x)
    + \mu _{a}^{C}\mathcal{D}_{x}^{\alpha}g(x) \quad \lambda, \mu \in \mathbb{R}.$$


    ### 10.2.2 数值积分


    在数值分析中，求积法是函数定积分的近似计算方法，通常表示为积分域内指定点处函数值的加权和。以德国数学家卡尔·弗里德里希·高斯命名的$n$点高斯求积法，通过适当选择节点$x_i$和权重$\omega_i
    = \int_{a}^{b} h_i(x)\omega(x) dx$（$i = 1, 2, \ldots, n$），可对$2n - 1$次及以下多项式实现精确计算。此类方法最常用的积分域为$[-1,
    1]$，但本文假设积分边界为区间$[a, b]$，因此该方法表述为


    $$\int_{a}^{b} f(x) dx \approx \sum_{i=1}^{n} \omega_i f(x_i)$$


    现考虑以下定理。


    **定理10.1**（Mastroianni和Milovanovic，2008）*设$x_0, x_1, \ldots, x_n$为$N + 1$阶正交多项式$p_{N+1}$的根。则存在唯一的求积权重集$\omega_0,
    \omega_1, \ldots, \omega_N$，定义为$\omega_j = \int_{a}^{b} h_j(x)\omega(x) dx$*


    $$\int_{a}^{b} \omega(x) p(x) dx \approx \sum_{i=1}^{n} \omega_i p(x_i) \quad
    \forall p \in P_{2N+1}$$


    *其中权重为正数，计算公式如下：*


    $$\omega_i = \frac{k_{n+1}}{k_n} \frac{\|f_n\|_{\omega}^2}{f_n(x_i) f_{n+1}''(x_i)},
    \quad 0 \leq i \leq n$$


    *其中$k_i$为$f_i$的首项系数。*


    下一节将基于最小二乘支持向量回归定义提出所述方法。


    ## 10.3 求解分布阶分数阶微分方程的LS-SVR方法


    本节首先介绍LS-SVR，然后讨论其部分特性，接着引入基于LS-SVR的求解方法，该方法有助于解决分布阶分数阶微分方程。在掌握LS-SVM概念的基础上，本节将基于LS-SVM回归提出我们的解法。为此，考虑以下方程


    $$\int_{a}^{b} G_{1}(p, D^{p}u(t)) dp + G_{2}(t, u(t), D^{\alpha_{i}}u(t)) = F(t),
    \quad t \in [0, \eta], \qquad (10.12)$$


    初始条件如下：


    $$u^{(k)}(0) = 0, \qquad (10.13)$$


    其中$k = 0, 1, \ldots, \lfloor \max\{b, \alpha_{i}\} \rfloor$。现在线性情形下讨论方法的收敛性和一致性分析


    $$\int_{a}^{b} g(p) D^{p}u(t) dp + A(u(t)) = F(t), \qquad (10.14)$$


    由于$A$是线性算子，可将公式10.14改写为


    $$L(u(t)) = F(t), \qquad (10.15)$$


    现考虑用LS-SVR求解公式10.14


    $$u(x) \approx u_{N}(x) = \omega^{T} \phi(x), \qquad (10.16)$$


    其中$\omega = [\omega_{0}, \ldots, \omega_{N}]^{T}$为权重系数，$\phi = [\phi_{0}, \ldots,
    \phi_{N}]^{T}$为基函数。为确定未知系数，考虑以下优化问题


    $$\min_{\omega, \varepsilon} \quad \frac{1}{2} \omega^{T} \omega + \frac{\gamma}{2}
    \varepsilon^{T} \varepsilon, \qquad (10.17)$$


    使得对每个$i = 0, \ldots, N$满足


    $$\int_{a}^{b} g(p) D^{p}(u(t_{i})) dp + Au(t_{i}) - F(t_{i}) = \varepsilon_{i}
    \qquad (10.18)$$


    因此有


    $$Lu(t_{i}) - F(t_{i}) = \varepsilon_{i} \qquad (10.19)$$


    考虑拉格朗日函数$L(u) = \sum_{j=0}^N \omega_j l_j$，可得


    $$\mathcal{L} = \frac{1}{2} \omega^T \omega + \frac{\gamma}{2} \varepsilon^T \varepsilon
    - \sum_{i=0}^N \lambda_i (L(u(t_i)) - F(t_i) - \varepsilon_i), \quad (10.20)$$


    同时有


    $$\mathcal{L} = \frac{1}{2} \sum_{j=0}^N \omega_j^2 + \frac{\gamma}{2} \sum_{i=0}^N
    \varepsilon_i^2 - \sum_{i=0}^N \lambda_i \left( \sum_{j=0}^N \omega_j L(\phi_j(t_i))
    - F_i - \varepsilon_i \right), \quad (10.21)$$


    可通过以下方式计算公式10.21的极值


    $$\begin{cases} \frac{\partial \mathcal{L}}{\partial \omega_k} = 0 & \omega_k
    = \sum_{i=0}^N \lambda_i (L(\phi_k(t_i))) = 0 \quad k = 0, 1, \dots, N \\ \frac{\partial
    \mathcal{L}}{\partial \varepsilon_k} = 0 & 2\gamma \varepsilon_k + \lambda_k =
    0 \quad k = 0, 1, \dots, N \\ \frac{\partial \mathcal{L}}{\partial \lambda_k}
    = 0 & \sum_{j=0}^N \omega_j (L(\phi_j(t_k))) = F_k - \varepsilon_k \quad k = 0,
    1, \dots, N \end{cases} \quad (10.22)$$


    可总结为向量形式


    $$\begin{cases} \omega - S\lambda = 0 & (\text{I}) \\ 2\gamma \varepsilon = -\lambda
    \ ; \ \varepsilon = -\frac{1}{2\gamma} \lambda & (\text{II}) \\ S^T \omega - f
    - \varepsilon = 0 & (\text{III}) \end{cases} \quad (10.23)$$


    矩阵$S$如下所示



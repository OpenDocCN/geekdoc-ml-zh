    # 8.4 Conclusion


    In this chapter, we introduced a machine learning-based numerical algorithm called
    the least squares support vector machine approach to solve partial differential
    equations. First, the temporal dimension was discretized by the Crank–Nicolson
    method. Then, the collocation LS-SVM approach was applied to the obtained equations
    at each time step. By employing the dual form, the problem was converted to a
    system of algebraic equations that can be solved by standard solvers. The modified
    Chebyshev and Legendre orthogonal kernel functions were used in LS-SVM formulations.
    In order to evaluate the effectiveness of the proposed method, it was applied
    to two well-known second-order partial differential equations, i.e. Fokker–Planck
    and generalized Fitzhugh–Nagumo equations. The obtained results from various orthogonal
    kernels were reported in terms of numerical absolute error and root-mean-square
    error. It can be concluded that the proposed approach has acceptable accuracy
    and is effective to solve linear and nonlinear partial differential equations.



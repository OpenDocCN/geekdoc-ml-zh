    and is defined as


    $$K(X_1, X_2) = exp\left(-\frac{\|x - x''\|^2}{2\sigma^2}\right).$$


    # 3.4.1 Spiral Dataset


    The Spiral dataset is a famous classic dataset, but there are many datasets that
    have a spiraling distribution of data points such as the one that is considered
    here; however, there are simulated ones with similar characteristics and even
    better controlled distributional properties. The Spiral dataset is consisted of
    1000 data points, equally clustered into 3 numerical labels with 2 other attributes
    “Chem 1” and “Chem2” of float type. It is known that SVM is a binary classification
    algorithm; therefore, to deal with multi-class datasets the common method is to
    split such datasets into multiple binary class datasets. Two examples of such
    methods are


    +   - One-vs-All (OVA),

    - One-vs-One (OVO).


    Using the **OVA**, Spiral classification task with numerical classes $\in \{1,
    2, 3\}$ will be divided into 3 classifications of the following forms:


    +   - Binary Classification task 1: class 1 versus class {2, 3},

    - Binary Classification task 2: class 2 versus class {1, 3},

    - Binary Classification task 3: class 3 versus class {1, 2}.


    Also, using the **OVO** method, the classification task is divided into any possible
    binary classification; then, for the Spiral dataset, we have


    +   - Binary Classification task 1: class 1 versus class 2,

    - Binary Classification task 2: class 1 versus class 3,

    - Binary Classification task 3: class 2 versus class 3.


    However, in our example, final number of split datasets are equally in both methods,
    but generally **OVO** method generates more datasets to classify. Assume a multi-class
    dataset with 4 numerical labels {1, 2, 3, 4}; afterward, using the first method
    binary classification datasets are


    +   - Binary Classification task 1: class 1 versus class {2, 3, 4},

    - Binary Classification task 2: class 2 versus class {1, 3, 4},

    - Binary Classification task 3: class 3 versus class {1, 2, 4},

    - Binary Classification task 4: class 4 versus class {1, 2, 3}.


    While using the second method, we have the following binary datasets to classify:


    +   - Binary Classification task 1: class 1 versus class 2,

    - Binary Classification task 2: class 1 versus class 3,'

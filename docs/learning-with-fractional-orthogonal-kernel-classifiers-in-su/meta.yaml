    \ 和 Wang，2017）：\n\n$K_{exp-Legendre}(x, z) = \\frac{\\sum_{i=0}^n P_i(x) P_i^T(z)}{\\\
    exp \\gamma \\|x-z\\|^2}. \\quad (4.31)$\n\n应该注意的是，修正的广义正交多项式核可以看作是半局部核。此外，具有两个参数\

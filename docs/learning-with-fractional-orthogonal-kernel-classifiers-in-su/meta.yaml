    # 8.3.1 Fokker–Planck Equation


    Fokker–Planck equations have various applications in astrophysics (Chavanis 2006),
    biology (Frank et al. 2003), chemical physics (Grima et al. 2011), polymers (Chauvière
    and Lozinski 2001), circuit theory (Kumar 2013), dielectric relaxation (Tanimura
    2006), economics (Furioli et al. 2017), electron relaxation in gases (Braglia
    et al. 1981), nucleation (Reguera et al. 1998), optical bistability (Gronchi and
    Lugiato 1973), quantum optics (D’ariano et al. 1994), reactive systems (De Decker
    and Nicolis 2020), solid-state physics (Kumar 2013), finance (Rad et al. 2018),
    cognitive psychology (Hadian-Rasanan et al. 2021), etc. (Risken 1989; Kazem et
    al. 2012a). In fact, this equation is derived from the description of the Brownian
    motion of particles (Ullersma 1966; Uhlenbeck and Ornstein 1930). For instance,
    one of the equations describing the Brownian motion in potential is the Kramer
    equation which is a special case of the Fokker–Planck equation (Jiménez-Aquino
    and Romero-Bastida 2006; Friedrich et al. 2006). The general form of the Fokker–Planck
    equation is


    $\frac{\partial u}{\partial t} = \left[ -\frac{\partial}{\partial x} \psi_1(x,
    t, u) + \frac{\partial^2}{\partial x^2} \psi_2(x, t, u) \right] u$, (8.11)


    in which $\psi_1$ and $\psi_2$ are the drift and diffusion coefficients, respectively.
    If these coefficients depend on $x$ and $t$, the PDE is called forward Kolmogorov
    equation (Conze et al. 2022; Risken 1989). There is another type of Fokker–Planck
    equation similar to the forward Kolmogorov equation called backward Kolmogorov
    equation (Risken 1989; Flandoli and Zanco 2016) that is in the form (Parand et
    al. 2018):


    $\frac{\partial u}{\partial t} = \left[ -\psi_1(x, t) \frac{\partial}{\partial
    x} + \psi_2(x, t) \frac{\partial^2}{\partial x^2} \right] u$. (8.12)


    Moreover, if $\psi_1$ and $\psi_2$ are dependent on $u$ in addition to time and
    space, then we have the nonlinear Fokker–Planck equation which has important applications
    in biophysics (Xing et al. 2005), neuroscience (Hemami et al. 2021; Moayeri et
    al. 2021), engineering (Kazem et al. 2012a), laser physics (Blackmore et al. 1986),
    nonlinear hydrodynamics (Zubarev and Morozov 1983), plasma physics (Peeters and
    Strintzi 2008), pattern formation (Bengfort et al. 2016), and so on (Barkai 2001;
    Tsurui and Ishikawa 1986).'
  - '[PAGE 189]


    There are some fruitful studies that explored the Fokker–Planck equation by classical
    numerical methods. For example, Vanaja (1992) presented an iterative algorithm
    for solving this model. In numerical methods, for example, (Zorzano et al. 1999),
    researchers employed the finite difference approach to the two-dimensional Fokker–Planck
    equation. In 2006, Dehghan and Tatari (2006) developed He’s variational iteration
    method (VIM) to approximate the solution of this equation. Moreover, Tatari et
    al. (2007) investigated the application of the Adomian decomposition method for
    solving different types of Fokker–Planck equations. One year later, Lakestani
    and Dehghan (2008) obtained the numerical solution of the Fokker–Planck equation
    using cubic B-spline scaling functions. In addition, Kazem et al. (2012a) proposed
    a meshfree approach to solve linear and nonlinear Fokker–Planck equations. Recently,
    a pseudo-spectral method was applied to approximate the solution of the Fokker–Planck
    equation with high accuracy (Parand et al. 2018).


    By simplifying Eq. 8.11, the Fokker–Planck equation takes the form of Eq. 8.2.
    It is worth mentioning that if our equation is linear, then $A(x, t, u) = 0$.
    In the following, we present a number of various linear and nonlinear examples.
    These examples are defined over $\Omega = [0, 1]$.


    It should be noted that the average CPU times for all examples of the Fokker–Planck
    equation and the Generalized FHN equation are about 2.48 and 2.5 s depending on
    the number of spatial nodes and the time steps. In addition, the order of time
    complexity for the proposed method is $O(Mn^3)$, in which $M$ is the number of
    time steps and $n$ is the number of spatial nodes.


    # 8.3.1.1 Example 1


    Consider Eq. 8.11 with $\psi_1(x) = -1$ and $\psi_2(x) = 1$, and initial condition
    $f(x) = x$. Using these fixed values, we can write $A(x, t, u) = 0$, $B(x, t,
    u) = 1$, and $C(x, t, u) = 1$. The exact solution of this test problem is $u(x,
    t) = x + t$ (Kazem et al. 2012a; Lakestani and Dehghan 2008).


    In this example, we consider $n = 15$, $\Delta t = 0.001$, $\gamma = 10^{15}$.
    Figure 8.1 shows the obtained result of function $u(x, t)$ by third-order Chebyshev
    kernel as an example. Also, the $L_2$ and RMS errors of different kernels at various
    times are represented in Tables 8.1 and 8.2. Note that in these tables, the number
    next to the polynomial name indicates its order. Moreover, the value of the decaying
    parameter for each kernel is specified in the tables.


    # 8.3.1.2 Example 2


    Consider the backward Kolmogorov equation (8.12) with $\psi_1(x) = -(x + 1)$,
    $\psi_2(x, t) = x^2 \exp(t)$, and initial condition $f(x) = x + 1$. This equation
    has the exact solution $u(x, t) = (x + 1) \exp(t)$ (Kazem et al. 2012a; Lakestani
    and Dehghan 2008). In this example, we have $A(x, t, u) = 0$, $B(x, t, u) = (x
    + 1)$, and $C(x, t, u) = x^2 \exp(t)$. The parameters are set as $n = 10$, $\Delta
    t = 0.0001$, and $\gamma = 10^{15}$.'

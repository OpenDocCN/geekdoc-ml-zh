    one to develop a reusable code. This feature of programming languages cultivates
    the development process by making it easier and faster. Suppose you have written
    a code for a customized SVM algorithm of your own, consisting of some classes
    with relevant functions. Instead of writing the same classes and functions, every
    time and everywhere you need to access them, you can save those classes and functions
    in a separate file let''s name it, *custom-svm.py*, then you only need to add
    a single line of code *import custom-svm*, somewhere in your code to gain access
    to all the functions of your custom SVM algorithm. It is been a widely accepted
    paradigm of using reusable codes specifically in the Python programming language.
    There exist multiple Python packages available for SVM classification, such as
    the *SVM* which *Scikit learn* package provides. Although it is easy to use, it
    lacks kernel diversity, more specifically orthogonal kernels and definitely the
    novel fractional orthogonal kernels. Kernels in SVM play a critical role, without
    a doubt there does not exist a kernel that suits every problem of the real world,
    in precise one kernel function is not suitable for all datasets because each kernel
    function produces a higher dimension in SVM with the same data scattering pattern.
    Suppose the linear kernel function, $K(x, y) = x.y$, the decision boundary of
    such kernel is a straight line in 2D space or a flat plane in 3D space. No argument
    that a flat plane cannot classify all datasets. Hence, there is a perpetual struggle
    to find the most suitable kernel function for each dataset, and a new kernel function
    is always welcomed if can improve the success metrics of classification tasks.
    To make it easier for anyone to use orthogonal kernel functions and also the fractional
    form, we decided to create the Python package **ORSVM** (consists of multiple
    modules). Through this chapter, this package will be introduced. Moreover, the
    basics of the **ORSVM**, how to install and how to use it, are discussed all through
    examples.


    # 12.1.1 ORSVM


    **ORSVM** is a free and open-source Python package that provides an SVM classifier
    with some novel orthogonal kernel functions. This library provides a complete
    chain of using the SVM classifier from normalization to calculation of the SVM
    equation and the final evaluation. However, note that there are some necessary
    steps before normalization that should be handled for every dataset, such as duplicate
    checking, Null values or outlier handling, or even dimensionality reduction or
    whatever enhancements that may apply to a dataset. These steps are out of the
    scope of the SVM algorithm, thereupon, **ORSVM** package. Instead, the normalization
    step which is a must before sending data points into orthogonal kernels is handled
    directly in ORSVM, by calling the relevant function. As it has been discussed
    already, the fractional form of all kernels is achievable during the normalization
    process too. **ORSVM** package includes multiple classes and functions. All of
    them will be introduced in this chapter.


    **ORSVM** package is heavily dependent on *Numpy* and *cvxopt* packages. *Arrays*,
    *matrices*, and *linear algebra* functions are used repeatedly from *numpy* and
    the'

    ## 4.4 勒让德核函数在真实数据集上的应用


    本节展示了普通勒让德核和分数阶勒让德核在 SVM 中的应用。同时，将两个真实数据集上获得的结果与 RBF 核、普通多项式核、普通切比雪夫核和分数阶切比雪夫核的结果进行了比较。


    ### 4.4.1 螺旋数据集


    螺旋数据集已在前面章节中介绍过。本节使用勒让德核和分数阶勒让德核，通过 SVM 对螺旋数据集进行分类。如前所述，这个多类分类数据集可以拆分为三个二分类数据集。之前也解释过（图
    3.5），通过使用 $\alpha$ 系数（$0.1 \leqslant \alpha \leqslant 0.9$）将数据转换到分数空间，数据密度随着 alpha
    值的减小而逐渐降低，并且数据密度的中心轴从点 (0, 0) 转移到点 (1, 1)。尽管在二维图上数据点似乎聚集在轴的一个角落（图 4.4），但当应用核函数时，在三维空间中情况未必如此（图
    4.5）。


    利用转换到分数空间的数据，在勒让德和分数阶勒让德核函数的帮助下，为上述划分的问题找到了决策边界。


    为了直观了解决策边界有何不同，我们可以查看图 4.6，该图描绘了在原始螺旋数据集上，不同阶数（3、4、5 和 6）的对应勒让德分类器，其中选择了 1-vs-{2,
    3} 的二分类。从这些图中可以看出，决策边界变得越来越扭曲。


    在分数空间中，决策边界的复杂性甚至变得更糟。图 4.7 展示了不同阶数（3、4、5 和 6）的分数阶勒让德分类器的决策边界，其中 $\alpha = 0.4$。同样，从阶数
    3 到阶数 6，决策边界变得复杂。$^1$


    三维空间中的每个决策边界或决策面都以特定形式对数据点进行分类。由于每个阶数的核函数的决策边界或面是固定且确定的，因此是该特定形状与数据点之间的相关程度决定了最终的准确性。



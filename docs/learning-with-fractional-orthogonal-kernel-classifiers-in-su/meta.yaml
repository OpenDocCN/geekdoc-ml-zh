  - "[PAGE 62]\n\n# 3.3 Chebyshev Kernel Functions\n\nFollowing the Chebyshev polynomial\
    \ principles and their fractional type discussed in the previous sections, this\
    \ section presents the formulation of Chebyshev kernels. Therefore, in the following,\
    \ first, the ordinary Chebyshev kernel function, then some other versions of this\
    \ kernel function, and finally the fractional Chebyshev kernels will be explained.\n\
    \n# 3.3.1 Ordinary Chebyshev Kernel Function\n\nMany kernels constructed from\
    \ orthogonal polynomials have been proposed for SVM and other kernel-based learning\
    \ algorithms (Ye et al. 2006; Moghaddam and Hamidzadeh 2016; Tian and Wang 2017).\
    \ Some characteristics of such kernels have attracted attention such as lower\
    \ data redundancy in feature space or on some occasions these kernels need fewer\
    \ support vectors during the fitting procedure which thereby leads to less execution\
    \ time (Jung and Kim 2013). On the other hand, orthogonal kernels have shown superior\
    \ performance in classification problems than traditional kernels like RBF and\
    \ polynomial (Moghaddam and Hamidzadeh 2016; Ozer et al. 2011; Padierna et al.\
    \ 2018).\n\nNow, using the fundamental definition of the orthogonal kernel we\
    \ will formulate the Chebyshev kernel. As we know, the unweighted orthogonal polynomial\
    \ kernel function for SVM, for scalar inputs, is defined as\n\n$$K(x, z) = \\\
    sum_{i=0}^{n} T_i(x)T_i(z), \\quad (3.31)$$\n\nwhere $T(.)$ denotes the evaluation\
    \ of the polynomial; $x, z$ are kernel's input arguments; and $n$ is the highest\
    \ polynomial order. In most applications of the real world, input data is a multidimensional\
    \ vector, hence two approaches have been proposed to extend one-dimensional polynomial\
    \ kernel to multidimensional vector input (Ozer et al. 2011; Vert et al. 2007):\n\
    \n+   1. **Pairwise**\n    According to *Vapnik*'s theorem (Vapnik 2013):\n  \
    \  > Let a multidimensional set of functions be defined by the basis functions\
    \ that are the tensor products of the coordinate-wise basis functions. Then the\
    \ kernel that defines the inner product in the n-dimensional basis is the product\
    \ of one-dimensional kernels.\n\nThe multidimensional orthogonal polynomial kernel\
    \ is constructed as a tensor product of one-dimensional kernel as"
  - '[PAGE 63]


    $$K(x, z) = \prod_{j=1}^{m} K_j(x_j, z_j). \tag{3.32}$$


    In this approach, the function evaluation of element pair of each input vectors
    $x$ and $z$ is multiplied in pairs, which means multiplying the corresponding
    elements of $x$ and $z$ and then overall kernel output is the multiplication of
    all outcomes of the previous step. Therefore, for an m-dimensional input vector
    $x \in \mathbb{R}^m$, given $x = \{x_1, x_2, \dots, x_m\}$, $z \in \mathbb{R}^m$,
    and $z = \{z_1, z_2, \dots, z_m\}$, the unweighted Chebyshev kernel is defined
    as


    $$K_{Cheb}(x, z) = \prod_{j=1}^{m} K_j(x_j, z_j) = \prod_{j=1}^{m} \sum_{i=0}^{n}
    T_i(x_j)T_i(z_j), \tag{3.33}$$


    where $\{T_i(.)\}$ are Chebyshev polynomials. Simply by multiplying the weight
    function defined in (3.14) which the orthogonality of the Chebyshev polynomial
    of first kind is defined with (see (3.15)), one can construct the pairwise orthogonal
    Chebyshev kernel function as


    $$K_{Cheb}(x, z) = \frac{\sum_{i=0}^{n} T_i(x)T_i(z)}{\sqrt{1 - xz}}, \tag{3.34}$$


    where $x$ and $z$ are scalar-valued inputs and for vector input we have


    $$K_{Cheb}(\mathbf{x}, \mathbf{z}) = \prod_{j=1}^{m} \frac{\sum_{i=0}^{n} T_i(x_j)T_i(z_j)}{\sqrt{1
    - x_j z_j}}, \tag{3.35}$$


    where $m$ is a dimension of vectors $x$ and $z$.

    However, this method was first proposed and then many kernels have been constructed
    using a pairwise method (Ye et al. 2006; Vert et al. 2007; Zhou et al. 2007; Pan
    et al. 2021), but kernels of this method suffer from two drawbacks. First, the
    time complexity or better to say computational complexity is considerably high,
    thus this can be a serious problem when input vectors are of high dimension (Ozer
    et al. 2011). Second, those kernels constructed on pairwise method lead to poor
    generalization if one of the kernels ($T_i(x)$ or $T_i(z)$) is close to zero,
    at the time when two vectors $x$ and $z$ are quite similar to each other (Ozer
    and Chen 2008).


    # 2. Vectorized


    In this method proposed by Ozer et al. (2008), the generalization problem of *pairwise*
    is tackled by applying the input vectors as a whole rather than per element and
    this is done by means of evaluation of the inner product of input vectors. Based
    on the fact that the inner product of two vectors $x$ and $z$ is defined as $\langle
    x, z \rangle = xz^T$ and considering Eq. 3.31, one can construct the *unweighted
    Generalized Chebyshev kernel* as Ozer and Chen (2008); Ozer et al. (2011)'
  - '[PAGE 64]


    $$K(\mathbf{x}, \mathbf{z}) = \sum_{i=0}^{n} T_i(\mathbf{x}) T_i^T(\mathbf{z})
    = \sum_{i=0}^{n} \langle T_i(x) T_i(z) \rangle.$$


    In a similar fashion to Eq. 3.35, the *Generalized Chebyshev Kernel* is defined
    as Ozer and Chen (2008); Ozer et al. (2011)


    $$K_{G\_Cheb}(\mathbf{x}, \mathbf{z}) = \frac{\sum_{i=0}^{n} \langle T_i(x), T_i(z)
    \rangle}{\sqrt{m - \langle x, z \rangle}},$$


    where $m$ is the dimensional of input vectors $\mathbf{x}$ and $\mathbf{z}$.


    Note that as the Chebyshev polynomials are orthogonal within $[-1, 1]$, the input
    data should be normalized according to


    $$x^{new} = \frac{2(x - Min)}{Max - Min} - 1,$$


    where $Min$ and $Max$ are minimum and maximum values of the input data, respectively.
    It is clear that if the input data is a dataset, normalization should be done
    column-wise.


    # 3.3.1.1 Validation of Chebyshev Kernel


    According to *Mercer Theorem* introduced at 2.2.12, a valid kernel function needs
    to be positive semi-definite or equivalently must satisfy the necessary and sufficient
    conditions of Mercer''s theorem. Here the validity of the generalized Chebyshev
    kernel will be proved.


    **Theorem 3.3** (Ozer et al. (2011)) *The generalized Chebyshev kernel introduced
    at Eq. 3.37 is a valid Mercer kernel.*


    **Proof** As Mercer''s theorem states, any SVM kernel as a valid kernel must be
    non-negative, in a precise way:


    $$\iint K(x, z) f(x) f(z) dx dz \geq 0.$$


    The multiplication of two valid kernels is also a valid kernel. Therefore, one
    can express any order of the Chebyshev kernel as a product of two kernel functions:


    $$K(x, z) = k_{(1)}(x, z) k_{(2)}(x, z),$$


    where


    $$k_{(1)}(x, z) = \sum_{j=0}^{n} T_j(x) T_j^T(z) = T_0(x) T_0^T(z) + T_1(x) T_1^T(z)
    + \cdots + T_n(x) T_n^T(z)$$'
  - '[PAGE 65]


    and


    $$k_{(2)}(x, z) = \frac{1}{\sqrt{m - \langle x, z \rangle}}.$$


    Considering $f : \mathbb{R}^m \longrightarrow \mathbb{R}$ and assuming that each
    element is independent of the other elements of the kernel, we can evaluate the
    Mercer condition for $k_{(1)}(\mathbf{x}, \mathbf{z})$ as follows:


    $$\begin{aligned} \iint k_{(1)}(x, z) f(x) f(z) dx dz &= \iint \sum_{j=0}^{n}
    T_j(x) T_j^T(z) f(x) f(z) dx dz, \ &= \sum_{j=0}^{n} \iint T_j(x) T_j^T(z) f(x)
    f(z) dx dz, \ &= \sum_{j=0}^{n} \left[ \int T_j(x) f(x) dx \int T_j^T(z) f(z)
    dz \right], \ &= \sum_{j=0}^{n} \left[ \left( \int T_j(x) f(x) dx \right) \left(
    \int T_j^T(z) f(z) dz \right) \right] \geq 0. \end{aligned}$$


    Therefore, the kernel $k_{(1)}(x, z)$ is a valid Mercer kernel. To prove that
    $k_{(2)}(x, z) = \frac{1}{\sqrt{m - \langle x, z \rangle}}$ (in the simplest form
    where $m = 1$) is a valid kernel function, we can say that $< x, y >$ is the linear
    kernel and the Taylor series of $\frac{1}{\sqrt{1 - x, y}}$ is


    $$1 + \frac{1}{2} < x, y > + \frac{3}{8} < x, y >^2 + \frac{5}{16} < x, y >^3
    + \frac{35}{128} < x, y >^4 + \cdots,$$


    which for each coefficient $\frac{\prod_{i=1}^{n} n(2i-1)}{n! 2^n} \geq 0$, $k_{(2)}(x,
    z) = \frac{1}{\sqrt{m - \langle x, z \rangle}}$ is also a valid kernel.


    # 3.3.2 Other Chebyshev Kernel Functions


    # 3.3.2.1 Chebyshev-Wavelet Kernel


    A valid kernel should satisfy the Mercer conditions (Vapnik 2013; Schölkopf et
    al. 2002), and based on Mercer''s theorem, a kernel made from multiplication or
    summation of two valid Mercer kernels is also a valid kernel. This idea motivated
    Jafarzadeh et al. (2013) to construct *Chebyshev-Wavelet* kernel which is in fact
    the multiplication of generalized Chebyshev and Wavelet kernels as follows:'
- md: '$k_{G\_Cheb}(\mathbf{x}, \mathbf{z}) = \frac{\sum_{i=0}^n \langle T_i(x), T_i(z)
    \rangle}{\sqrt{m - \langle x, z \rangle}}$,


    $k_{wavelet}(\mathbf{x}, \mathbf{z}) = \prod_{i=1}^m \left( \cos\left(1.75 \frac{x_j
    - z_j}{\alpha}\right) \exp\left(-\frac{\|x - z\|^2}{2\alpha^2}\right) \right)$.
    (3.44)


    Thus, the **Chebyshev-Wavelet kernel** is introduced as Jafarzadeh et al. (2013)


    $k_{Cheb\text{-}wavelet}(\mathbf{x}, \mathbf{z}) = \frac{\sum_{i=0}^n \langle
    T_i(x), T_i(z) \rangle}{\sqrt{m - \langle x, z \rangle}} \times \prod_{i=1}^m
    \left( \cos\left(1.75 \frac{x_j - z_j}{\alpha}\right) \exp\left(-\frac{\|x - z\|^2}{2\alpha^2}\right)
    \right)$, (3.45)


    where $n$ is the Chebyshev kernel parameter (the order), $a$ is the wavelet kernel
    parameter, and $m$ is the dimension of the input vector.


    ## 3.3.2.2 Unified Chebyshev Kernel (UCK)


    As it is already mentioned, there are four kinds of Chebyshev polynomials. Zhao
    et al. (2013) proposed a new kernel by combining Chebyshev polynomials of the
    first ($T_n$) and second ($U_n$) kind of Chebyshev polynomials. It should be noted
    that the Chebyshev polynomials of the second kind are orthogonal on the interval
    $(-1, 1)$ with respect to the following weight function (Mason and Handscomb 2002):


    $w_{U_n}(x) = \sqrt{1 - x^2}$, (3.46)


    while the trigonometric relation of the Chebyshev polynomials of the first kind
    is introduced at 3.3, polynomials of the second kind are described by Mason and
    Handscomb (2002)


    $U_n(\cos\theta) = \frac{\sin((n+1)\theta)}{\sin(\theta)}$, $n = 0, 1, 2, \dots$
    (3.47)


    Similar to the generating function of Chebyshev polynomials of the first kind
    ($\frac{1-tx}{1-2tx+t^2} = \sum_{n=0}^\infty T_n(x)t^n$), the generating function
    for the second kind is defined as Mason and Handscomb (2002)


    $\frac{1}{1 - 2xt + t^2} = \sum_{n=0}^\infty U_n(x)t^n$, $|x| \leqslant 1, |t|
    \leqslant 1$. (3.48)


    According to defined weight function Eq. 3.46, Zhao et al. (2013) defined the
    orthogonality relation for the Chebyshev polynomials of the second kind as


    $$\int_{-1}^{1} \sqrt{1-x^2} U_m(x) U_n(x) dx = \begin{cases} \frac{\pi}{2}, &
    (m=n \neq 0) \\ 0, & ((m \neq n) \text{or} (m=n=0)) \end{cases}.$$ (3.49)


    Moreover, they used $P_n(.)$ to denote unified Chebyshev polynomials (UPC), but
    in this book, notation $P_n(.)$ is used for Legendre Orthogonal Polynomials. Therefore,
    in order to avoid any ambiguity, we consciously use $UCP_n(.)$ instead. Considering
    the generating function of the first and the second kind, Zhao et al. (2013) constructed
    the generating function of UCP:


    $$\frac{1-xt}{1-axt} \times \frac{1}{1-2xt+t^2} = \sum_{n=0}^{\infty} UCP_n(x)t^n,$$
    (3.50)


    where $x \in [-1, 1], t \in [-1, 1], n = 0, 1, 2, 3 \dots$, and $UCP_n(x)$ is
    the UCP of the nth order. It is clear that the Chebyshev polynomials of the first
    and the second kinds are special cases of UCP where $a=0$ and $a=1$, respectively.
    Also, Zhao et al. (2013) introduced the recurrence relation of the nth order of
    UCP as


    $$UCP_n(x) = (a+2)xUCP_{n-1}(x) - (2ax^2+1)UCP_{n-2}(x) + axUCP_{n-3}(x).$$ (3.51)


    Therefore using (3.51) some instances of these polynomials are


    - $UCP_0(x) = 1,$

    - $UCP_1(x) = ax + x,$

    - $UCP_2(x) = (a^2 + a + 2)x^2 - 1,$

    - $UCP_3(x) = (a^3 + a^2 + 2a + 4)x^3 - (a+3)x,$

    - $UCP_4(x) = (a^4 + a^3 + 2a^2 + 4a + 8)x^4 - (a^2 + 3a + 8)x^2 + 1.$


    For sake of simplicity, we do not go deeper into formulations provided in the
    corresponding paper. However, the details and proofs are investigated in the relevant
    paper (Zhao et al. 2013).


    On the other hand, Zhao et al. (2013) constructed the UCP kernel as


    $$\iint (m - \langle x, z \rangle + r)^{-\frac{1}{2}} \sum_{j=0}^{n} UCP_j(x),
    UCP_j^T(z) f(x) f(z) dx dz \geqslant 0.$$ (3.52)


    Hence:


    $$k_{UCP}(X, Z) = \frac{\sum_{j=0}^{n} \langle UCP_j(x) UCP_j(z) \rangle}{\sqrt{(m
    - \langle x, z \rangle + r)}},$$ (3.53)


    where $m$ is the dimension of the input vector and $r$ is the minimum positive
    value to prevent the equation from being 0.


    ## 3.3.3 Fractional Chebyshev Kernel


    Using the weight function Eq. 3.27, with the same approach performed in Eqs. 3.35
    and 3.37, we can introduce the corresponding fractional kernels as follows:


    $$k_{FCheb}(\mathbf{x}, \mathbf{z}) = \prod_{j=1}^{m} \frac{\sum_{i=0}^{n} FT_i^{\alpha}(x_j)
    FT_i^{\alpha}(z_j)}{\sqrt{1 - \left(2\left(\frac{x_j z_j - a}{b-a}\right)^{\alpha}
    - 1\right)^{\alpha}}}, \quad (3.54)$$


    $$k_{Gen-FCheb}(\mathbf{x}, \mathbf{z}) = \frac{\sum_{i=0}^{n} \langle FT_i^{\alpha}(x),
    FT_i^{\alpha}(z) \rangle}{\sqrt{m - \left(2\left(\frac{\langle x, z \rangle -
    a}{b-a}\right)^{\alpha} - 1\right)^{\alpha}}}, \quad (3.55)$$


    where $m$ is the dimension of vectors $x$ and $z$.


    ### 3.3.3.1 Validation of Fractional Chebyshev Kernel


    To prove validation of fractional Chebyshev kernels introduced in Eq. 3.55, a
    similar procedure like the proof of the generalized Chebyshev kernel Eq. 3.37
    is followed.


    > **Theorem 3.4** *The generalized Chebyshev kernel of fractional order introduced
    in Eq. 3.55 is a valid Mercer kernel.*


    **Proof** Considering Mercer theorem states any SVM kernel to be a valid kernel
    must be non-negative (see (3.39)) and by use of the fact that multiplication of
    two valid kernels is also a kernel (see (3.40)), we have


    $$k_{(1)}(x, z) = \sum_{j=0}^{n} FT_j^{\alpha}(x) FT_j^{\alpha}(z),$$


    $$k_{(2)}(x, z) = w(x) = \frac{1}{\sqrt{1 - \left(2\left(\frac{x-a}{b-a}\right)^{\alpha}
    - 1\right)^{\alpha}}}.$$


    Since $f$ is a function where $f : \mathbb{R}^m \longrightarrow \mathbb{R}$, we
    have


    $$\iint K_{(1)}(x, z) f(x) f(z) dxdz = \iint \sum_{j=0}^{n} (FT_{j}^{\alpha})(x)
    (FT_{j}^{\alpha})^{T}(z) f(x) f(z) dxdz,$$

    $$= \sum_{j=0}^{n} \iint (FT_{j}^{\alpha})(x) (FT_{j}^{\alpha})^{T}(z) f(x) f(z)
    dxdz,$$

    $$= \sum_{j=0}^{n} \left[ \int (FT_{j}^{\alpha})(x) f(x) dx \int (FT_{j}^{\alpha})^{T}(z)
    f(z) dz \right],$$

    $$= \sum_{j=0}^{n} \left[ \left( \int (FT_{j}^{\alpha})(x) f(x) dx \right) \left(
    \int (FT_{j}^{\alpha})^{T}(z) f(z) dz \right) \right] \geq 0.$$

    $$(3.56)$$


    Therefore, the kernel $k_{(1)}(x, z)$ is a valid Mercer kernel. In order to prove
    that $k_{(2)}(x, z)$ is a valid Mercer kernel too, one can show that $k_{(2)}(x,
    z)$ is *positive semi-definite*. According to definition Eq. 3.24, both $x$ and
    $b$ are positive because $0 \leqslant x \leqslant b$, $b \in \mathbb{R}^{+}$ and
    $\alpha \in \mathbb{R}^{+}$; in other words, by mapping defined in Eq. 3.24, we
    are sure the output is always positive. Hence, the second kernel Eq. 3.56 or precisely
    the weight function is positive semi-definite, so $k_{(2)}(x, z) \geqslant 0$.


    ## 3.4 Application of Chebyshev Kernel Functions on Real Datasets


    In this section, we will illustrate the use of *fractional Chebyshev kernel* in
    *SVM* applied to some real datasets which are widely used by machine learning
    experts to examine the accuracy of any given model. Then, we will compare the
    accuracy of the *fractional Chebyshev kernel* with the accuracy of the *Chebyshev
    kernel*, and two of other well-known kernels used in kernel-based learning algorithms,
    such as *RBF* and *polynomial kernel*. As we know, applying SVM to a dataset involves
    a number of pre-processing tasks, such as data cleansing and generation of the
    training/test. We do not dwell in these steps except for the normalization of
    the dataset that already has been mentioned that is mandatory using Chebyshev
    polynomials of any kind as the kernel function.


    There are some online data stores available for public use, such a widely used
    datastore is the *UCI Machine Learning Repository*<sup>2</sup> of the *University
    of California, Irvine*, and also *Kaggle*.<sup>3</sup> In this section, four datasets
    are selected from UCI, which are well known and widely used for machine learning
    practitioners.


    The *polynomial kernel* is widely used in kernel-based models and, in general,
    is defined as


    $$K(X_1, X_2) = (a + X_1^T X_2)^b.$$

    $$(3.57)$$


    Also, *RBF kernel* a.k.a *Gaussian RBF kernel* is another popular kernel for SVM,
    and is defined as


    $$K(X_1, X_2) = exp\left(-\frac{\|x - x''\|^2}{2\sigma^2}\right).$$


    ### 3.4.1 Spiral Dataset


    The Spiral dataset is a famous classic dataset, but there are many datasets that
    have a spiraling distribution of data points such as the one that is considered
    here; however, there are simulated ones with similar characteristics and even
    better controlled distributional properties. The Spiral dataset is consisted of

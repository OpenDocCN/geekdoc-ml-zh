    # 8.3.2 Generalized Fitzhugh–Nagumo Equation


    The Fitzhugh–Nagumo (FHN) model is based on electrical transmission in a nerve
    cell at the axon surface (FitzHugh 1961; Gordon et al. 1999). In other words,
    this model is a simplified equation of the famous Hodgkin–Huxley (HH) model (Hodgkin
    and Huxley 1952), because it uses a simpler structure to interpret the electrical
    transmission at the surface of the neuron as opposed to the complex HH design
    (Moayeri et al. 2020a; Hemami et al. 2019, 2020; Moayeri et al. 2020b). In electrical
    analysis, the HH model is simulated using a combination of a capacitor, resistor,
    rheostat, and current source elements (Hemami et al. 2019, 2020; Moayeri et al.
    2020a, b), while the FHN model uses a combination of resistor, inductor, capacitor,
    and diode elements (Hemami et al. 2019, 2020; Moayeri et al. 2020a, b). Also,
    the HH model involves three channels of sodium, potassium, and leak in the generation
    of electrical signals and is simulated by a rheostat and battery, while the FHN
    model simulates behavior by only one diode and inductor (Hemami et al. 2019, 2020;
    Moayeri et al. 2020a, b). For this reason, this model has attracted the attention
    of many researchers, and it has been used in various other fields of flame propagation
    (Van Gorder 2012), logistic population growth (Appadu and Agbavon 2019), neurophysiology
    (Aronson and Weinberger 1975), branching Brownian motion process (Ali et al. 2020),
    auto-catalytic chemical reaction (İnan 2018), nuclear reactor theory (Bhrawy 2013),
    etc. (Abbasbandy 2008; Abdusalam 2004; Aronson and Weinberger 1978; Browne et
    al. 2008; Kawahara and Tanaka 1983; Li and Guo 2006; Jiwari et al. 2014). The
    classical Fitzhugh–Nagumo equation is given by (Triki and Wazwaz 2013; Abbasbandy
    2008)


    $$\frac{\partial u}{\partial t} = \frac{\partial^2 u}{\partial x^2} - u(1 - u)(\rho
    - u), \quad (8.13)$$


    where $0 \leq \rho \leq 1$, and $u(x, t)$ is the unknown function depending on
    the temporal variable $t$ and the spatial variable $x$. It should be noted that
    this equation combines diffusion and nonlinearity which is controlled by the term
    $u(1 - u)(\rho - u)$. The generalized FHN equation can be represented as follows
    (Bhrawy 2013):


    $$\frac{\partial u}{\partial t} = -v(t)\frac{\partial u}{\partial x} + \mu(t)\frac{\partial^2
    u}{\partial x^2} + \eta(t)u(1 - u)(\rho - u). \quad (8.14)$$'

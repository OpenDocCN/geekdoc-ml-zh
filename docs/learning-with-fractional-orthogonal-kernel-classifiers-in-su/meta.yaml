  mdcn: "在第7章和第8章中，介绍了支持向量机在科学计算中的一些应用，并解释了使用最小二乘支持向量机求解常微分方程/偏微分方程的流程。这两章也讨论了常微分方程/偏微分方程的数学基础，以及用于近似求解这些方程的传统数值算法。\n\

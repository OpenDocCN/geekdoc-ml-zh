    # 6.3 Jacobi Kernel Functions


    In this section, the kernel functions of ordinary type will be introduced and
    also its validation will be proved according to Mercer condition. Moreover, Wavelet-Jacobi
    kernel will be introduced which recently attracted the attention of researchers.
    The last subsection is devoted to fractional Jacobi kernel.


    # 6.3.1 Ordinary Jacobi Kernel Function


    As we already know, the unweighted orthogonal polynomial kernel function for SVM
    can be written as follows:


    $$K(x, z) = \sum_{i=0}^{n} J_i(x) J_i(z), \quad (6.29)$$


    where $J(.)$ denotes the evaluation of the polynomial. $x$ and $z$ are the kernel''s
    input arguments and $n$ is the highest polynomial order. Using this definition
    and the fact that need the multi-dimensional form of the kernel function, one
    can introduce the *Jacobi kernel function* by the evaluation of inner product
    of input vectors $((x, z) = xz^T)$ Nadira et al. (2019), Ozer et al. (2011):


    $$k_{Jacobi}(x, z) = \sum_{i=0}^{n} J_i^{\psi, \omega}(x) J_i^{\psi, \omega T}(z)
    w^{\psi, \omega}(x, z). \quad (6.30)$$'
- md: '## Theorem 6.2 (Nadira et al. (2019)) The Jacobi Kernel introduced in Eq. 6.30
    is a valid Mercer kernel.


    **Proof** Mercer theorem states that an SVM kernel should be positive semi-definite
    or non-negative; in other words, the kernel should satisfy the below relation:


    $$\iint K(x, z) f(x) f(z) dxdz \geqslant 0. \quad (6.31)$$


    By using the fact that multiplication of two valid kernels is also a valid kernel,
    one can divide the Jacobi kernel introduced at Eq. 6.30 into two kernels, one
    the inner product and the other is weight function, therefore:


    $$K_{(1)}(x, z) = \sum_{i=0}^{n} J_{i}^{\psi, \omega}(x) J_{i}^{\psi, \omega^T}(z),
    \quad (6.32)$$

    $$K_{(2)}(x, z) = w^{\psi, \omega}(x, z) \quad (6.33)$$

    $$= (d - \langle x, z \rangle + \epsilon)^{\psi} (d + \langle x, z \rangle + \epsilon)^{\omega},$$


    where $d$ is the dimension of input $x$ and $z$. Considering $f(x)$ is a function
    where $f : \mathbb{R}^m \longrightarrow \mathbb{R}$, one can evaluate the Mercer
    condition for $K_{(1)}(\mathbf{x}, \mathbf{z})$ as follows, assuming each element
    is independent from others:


    $$\iint K_{(1)}(x, z) f(x) f(z) dxdz = \iint \sum_{j=0}^{n} J_{j}^{\psi, \omega}(x)
    J_{j}^{\psi, \omega^T}(z) f(x) f(z) dxdz$$

    $$= \sum_{j=0}^{n} \iint J_{j}^{\psi, \omega}(x) J_{j}^{\psi, \omega^T}(z) f(x)
    f(z) dxdz$$

    $$= \sum_{j=0}^{n} \left[ \int J_{j}^{\psi, \omega}(x) f(x) dx \int J_{j}^{\psi,
    \omega^T}(z) f(z) dz \right]$$

    $$= \sum_{j=0}^{n} \left[ \left( \int J_{j}^{\psi, \omega}(x) f(x) dx \right)
    \left( \int J_{j}^{\psi, \omega^T}(z) f(z) dz \right) \right] \geqslant 0. \quad
    (6.34)$$


    Therefore, the kernel $K_{(1)}(x, z)$ is a valid Mercer kernel. To prove $K_{(2)}(x,
    z) \geqslant 0$, we can prove the weight function in Eq. 6.6 is positive semi-definite,
    because it is easier to intuitively consider, then the general weight function
    for kernel which reformulated for two vectors input becomes clear. Due to normalization
    of the input data, this weight function is positive semi-definite, so the weight
    function $w^{\psi, \omega}(x, z) = (d - \langle x, z \rangle)^{\psi} (d + \langle
    x, z \rangle)^{\omega}$ which is a generalized form for two input vectors of the
    kernel is positive semi-definite too. $\square$


    ## 6.3.2 Other Jacobi Kernel Functions


    SVM with the kernel-trick heavily depends on the proper kernel to choose according
    to data, which is still an attractive topic to introduce and examine new kernels
    for SVM. Orthogonality properties of some polynomials such as Jacobi have made
    them a hot alternative for such use cases. By the way, some previously introduced
    kernels such as wavelet have been used successfully Nadira et al. (2019). Combining
    the wavelet and orthogonal Kernel functions such as Chebyshev, Hermit and Legendre
    have already been proposed and examined in signal processing Garnier et al. (2003),
    solving differential equations Imani et al. (2011), Khader and Adel (2018), optimal
    control Razzaghi and Yousefi (2002), Elaydi et al. (2012), and calculus variation
    problems Bokhari et al. (2018).


    ### 6.3.2.1 Regularized Jacobi Wavelet Kernel Function


    Abassa et al. Nadira et al. (2019) recently introduced SVM kernels based on Jacobi
    wavelets. However, the proposed kernel will be glanced here, interested reader
    may find the proof and details in original paper Nadira et al. (2019). It should
    be noted that some notations have to be changed to preserve the integrity of the
    book, but the integration of formulation is intact and same as the original work.


    The Jacobi polynomials $J_m^{(\psi, \omega)}$ are defined as follows:


    $$J_m^{(\psi, \omega)}(x) = \frac{(\psi + \omega + 2m - 1)[\psi^2 - \omega^2 +
    x(\psi + \omega + 2m)(\psi + \omega + 2m - 2)]}{2m(\psi + \omega + 2m - 2)(\psi
    + \omega + m)} J_{m-1}^{(\psi, \omega)}(x) - \frac{(\psi + m - 1)(\omega + m -
    1)(\psi + \omega + 2m)}{m(\psi + \omega + 2m - 2)(\psi + \omega + m)} J_{m-2}^{(\psi,
    \omega)}(x),$$


    where $\psi > -1, \omega > -1$, and


    $$J_0^{(\psi, \omega)}(x) = 1, J_1^{(\psi, \omega)}(x) = \frac{\psi + \omega +
    2}{2}x + \frac{\psi - \omega}{2}.$$


    These polynomials belong to the weight space $L_w^2([-1, 1])$, i.e.,


    $$\left\langle J_m^{(\psi, \omega)}, J_{m''}^{(\psi, \omega)} \right\rangle_{L_w^2}
    = h_m^{(\psi, \omega)} \delta_{m,m''}, \quad \forall m, m'' \in \mathbb{N},$$


    where


    $$h_m^{(\psi, \omega)} = \| J_m^{(\psi, \omega)} \| = \frac{2^{\psi + \omega +
    1} \Gamma(\psi + m + 1) \Gamma(\omega + m + 1)}{(2m + 1 + \psi + \omega) m! \Gamma(\psi
    + \omega + m + 1)},$$


    and $w(x) = (1-x)^\psi(1+x)^\omega$. In addition, $\delta_{n,m}$ is the Kronecker
    function, $\Gamma$ is the Euler gamma, and $\langle \cdot, \cdot \rangle_{L_w^2}$
    denotes the inner product of $L_w^2([-1, 1])$. The family $\left\{ J_m^{(\psi,
    \omega)} \right\}_{m \in \mathbb{N}}$ forms an orthogonal basis for $L_w^2([-1,
    1])$.


    ## 6.3.3 Fractional Jacobi Kernel


    Since the weight function of the fractional Jacobi functions is equal to Eq. 6.25,
    defining the fractional Jacobi kernel is easy. One can construct the *fractional
    Jacobi kernel* as follows:


    $$K_{F Jacobi}(x, z) = \sum_{i=0}^{n} \langle F J_i^{\psi, \omega, \alpha}(x),
    F J_i^{\psi, \omega, \alpha}(z) \rangle F w^{\psi, \omega, \alpha}(x, z). \quad
    (6.35)$$


    **Theorem 6.3** *The Jacobi kernel introduced at Eq. 6.35 is a valid Mercer kernel.*


    **Proof** Similar to the proof for Theorem 6.2, fractional Jacobi kernel function
    Eq. 6.35 can be considered as multiplication of two kernels:


    $$K_{(1)}(x, z) = \sum_{i=0}^{n} F J_i^{\psi, \omega, \alpha}(x) F J_i^{\psi,
    \omega, \alpha^T}(z), \quad (6.36)$$


    $$K_{(2)}(x, z) = F w^{\psi, \omega, \alpha}(x, z)$$

    $$= (d - (2(\frac{x-a}{b-a})^\alpha - 1, 2(\frac{z-a}{b-a})^\alpha - 1) - \epsilon)^\psi
    (d + (2(\frac{x-a}{b-a})^\alpha - 1, 2(\frac{z-a}{b-a})^\alpha - 1) + \epsilon)^\omega
    \quad (6.37, 6.38)$$


    where $d$ is the dimension of inputs $x$ and $z$. Consider $f : \mathbb{R}^m \longrightarrow
    \mathbb{R}$, and assume each element is independent from others. One can evaluate
    the Mercer condition for $K_{(1)}(x, z)$ as follows:


    $$\iint K_{(1)}(x, z) f(x) f(z) dx dz$$

    $$= \iint \sum_{j=0}^{n} F J_j^{\psi, \omega, \alpha}(x) F J_j^{\psi, \omega,
    \alpha^T}(z) f(x) f(z) dx dz$$

    $$= \sum_{j=0}^{n} \iint F J_j^{\psi, \omega, \alpha}(x) F J_j^{\psi, \omega,
    \alpha^T}(z) f(x) f(z) dx dz$$

    $$= \sum_{j=0}^{n} \left[ \int F J_j^{\psi, \omega, \alpha}(x) f(x) dx \int F
    J_j^{\psi, \omega, \alpha^T}(z) f(z) dz \right]$$

    $$= \sum_{j=0}^{n} \left[ \left( \int F J_j^{\psi, \omega, \alpha}(x) f(x) dx
    \right) \left( \int F J_j^{\psi, \omega, \alpha^T}(z) f(z) dz \right) \right]
    \geqslant 0. \quad (6.39)$$


    Therefore, Eq. 6.36 is a valid Mercer kernel. Validity of $K_{(2)}(x, z)$ can
    be considered similar to the weight function of ordinary Jacobi kernel function.
    It can be deduced that the output of $K_{(2)}(x, z)$ is never less than zero,
    as the inner product of two vectors which are normalized over $[-1, 1]$ is in
    the range $[-d, d]$, where $d$ is the dimension of the input vectors $x$ or $z$,
    and the effect of negative inner product will be neutralized by the parameter
    $d$. Therefore, Eq. 6.37 is also a valid Mercer kernel. $\square$


    ## 6.4 Application of Jacobi Kernel Functions on Real Datasets


    In this section, the results of *Jacobi* and the *fractional Jacobi kernel* on
    some well-known datasets are compared with other kernels such as *RBF*, *polynomial*,
    *Chebyshev*, *fractional Chebyshev*, *Gegenbauer*, *fractional Gegenbauer*, *Legendre*,
    and *fractional Legendre kernels* introduced in the previous chapters. To have
    a neat classification, there may need to apply some prepossessing steps to dataset,
    here these steps are not in focus, but the normalization which is mandatory when
    using *Jacobi polynomials* as a kernel. There are some online data stores available
    for public use, such a widely used datastore is the *UCI Machine Learning Repository*<sup>1</sup>
    of *University of California, Irvine*, and also *Kaggle*.<sup>2</sup> For this
    section, four datasets from UCI are used that are well known for machine learning
    practitioners.


    ### 6.4.1 Spiral Dataset


    The Spiral dataset is already introduced in details in Chap. 3. As a quick recap,
    Fig. 6.9 depicts the original Spiral dataset (on the left) and also the same dataset
    in fractional space of order $\alpha = 0.3$ (on the right), which consist of 1000
    data points. In classification task on this dataset, 90% of data points are chosen

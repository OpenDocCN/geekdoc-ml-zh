  - "[PAGE 275]\n\nheart of SVM algorithm which is solving the convex equation of\
    \ SVM and finding the *Support Vectors* is achievable by means of a convex quadratic\
    \ solver from *cvxopt* library which is in turn a free Python package for convex\
    \ optimization.¹\n\nORSVM is structured on two modules. A module consists of Kernel\
    \ classes and the other one consists of relevant classes and functions supporting\
    \ initialization, normalization, fitting process, capturing the fitted model,\
    \ and the classification report. **ORSVM** is structured as follows:\n\n+   -\
    \ **orsvm module**\n  This is the main module consisting of the fitting procedure,\
    \ prediction, and report. It includes Model and SVM classes and the transformation\
    \ (normalization) function. We opted for the *transformation* name instead of\
    \ *normalization* because transforming to fractional space is achievable through\
    \ this function too.\n  - **Model Class**\n    Model class literally creates the\
    \ model. Initialization starts under this class. Calling the *model.model_fit*\
    \ function initiates an object from the SVM class. After calling the *Transformation*\
    \ function, the train set gets ready to input into the SVM object. Then, an object\
    \ is ready to start the fitting process of the SVM object from SVM class.\n  \
    \  1. **ModelFit function**\n       Initiates an object from the SVM class, transforms/normalizes\
    \ the train set, and calls the fit function of the SVM object. Finally captures\
    \ the fitted model and parameters.\n    2. **ModelPredict function**\n       Transforms/Normalizes\
    \ the train set. Calls the predict function of the SVM object with proper parameters.\
    \ And finally calls *accuracy_score*, *confusion_matrix*, and *classification_report*\
    \ of Scikit learn (sklearn.metrics) with the previously captured result.\n  -\
    \ **SVM class**\n    Here the svm equation is formed, and required matrices of\
    \ *cvxopt* are created under the fit function of the SVM class. Invokes *cvxopt*\
    \ and solves the SVM equation to determine the support vectors and calculate the\
    \ hyper-plane's equation. The prediction procedure is implemented under the prediction\
    \ function of the SVM class.\n    1. **fit function** creates proper matrices\
    \ by directly calling kernels. Such matrices are the *Gram matrix* and also other\
    \ matrices of the SVM equation required by *cvxopt*. As the result, *cvxopt* returns\
    \ *Lagrange Multipliers*. Applying some criteria of user interest, support vectors\
    \ opt from them, and as a result, the *SVM.fit* function returns the weights and\
    \ bias of the hyper-plane's equation and also the array of support vectors.\n\n\
    > ¹ A suitable guide on this package is available at http://cvxopt.org about installation\
    \ and how to use it."
  - "[PAGE 276]\n\n2. **predict** function maps data points from the test set with\
    \ the decision boundary( hyper-plane equation) and determines to which class each\
    \ data points belong.\n\n+   - **Transformation** function\n  This is the function\
    \ that normalizes the input dataset or, in the case of fractional form, transforms\
    \ the input dataset into fractional space, in other words, normalizes the input\
    \ in fractional space.\n\n+   - **Kernels** module includes one class per kernel.\
    \ So currently there exist four classes for each orthogonal kernel. The following\
    \ classes are available in the *kernels* module:\n  - **Chebyshev** class contains\
    \ the relevant functions to calculate the orthogonal polynomials and fractional\
    \ form of the Chebyshev family of the first kind.\n  - **Legendre** class holds\
    \ the relevant functions to calculate the orthogonal polynomials and fractional\
    \ form of the Legendre family.\n  - **Gegenbauer** class consists of the relevant\
    \ functions to calculate the orthogonal polynomials and fractional form of the\
    \ Gegenbauer family.\n  - **Jacobi** class includes the relevant functions to\
    \ calculate the orthogonal polynomials and fractional form of the Jacobi family.\n\
    \n**ORSVM** is written in Python programming language which requires Python version\
    \ 3 or higher.\n\n# 12.2 How to Install\n\nTo use the package you can install\
    \ it using pip as follows:\n\n```\npip install orsvm.py\n```\n\nor you can easily\
    \ clone the package from our GitHub and use the setup.py file to install the package;\n\
    \n```\npython setup.py install.\n```\n\n# 12.3 Model Class\n\nThis is the interface\
    \ to use the **ORSVM** package. Using **ORSVM** starts with creating an object\
    \ of the *Model* class. This class includes a *ModelFit* function which itself\
    \ creates an **ORSVM** model as an instance of the *SVM* class. Then normalizes\
    \ the input data in the case of the normal form of the kernel or transforms the\
    \ input data in the case of fractional form. Choosing between normal or fractional\
    \ is determined"
  - "[PAGE 277]\n\nby the value of the argument $T$ if $T = 1$ the kernel is in normal\
    \ form, and in the case of $0 < T < 1$, then it is the fractional form. $model\\\
    _fit$ function receives the train and test set separately; moreover, each of them\
    \ should be divided into two matrices of $x$ and $y$. The matrix $x$ is the whole\
    \ dataset where the relevant column to output a.k.a class or label is omitted\
    \ and the matrix $y$ is that specific column of class or label. Division of datasets\
    \ can be achieved through multiple methods. A widely used one is $StratifiedShuffleSplit$\
    \ from $sklearn.model\\_selection$.\n\nCreating an object of the Model class requires\
    \ some input parameters, cause it needs to create an SVM object with these passed\
    \ parameters. The following example code creates an $orsvm$ classifier from the\
    \ $Jacobi$ kernel function of order 3.\n\n```\nobj = orsvm.Model(kernel=\"jacobi\"\
    , order = 3, T = 0.5,\n                  k_param1 = -0.8, k_param2 = 0.2,\n  \
    \                sv_determiner = 'a', form = 'r', C = 100)\n```\n\nHere $T = 0.5$\
    \ means that it is in the fractional form of order 0.5. “k\\_param1” is equivalent\
    \ to $\\psi$, and “k\\_param2” is equivalent to $\\omega$ in case “Jacobi” kernel\
    \ is chosen. If it was $Gegenbauer$, then only “k\\_param1” was applicable to\
    \ the kernel. Because $Chebyshev$ and $Legendre$ both do not have any hyper-parameter,\
    \ there is no need to pass any value for “k\\_param1” and “k\\_param2”, even if\
    \ one passes values for these parameters, those will be ignored. Parameter $sv\\\
    _determiner$ is the user’s choice on how support vectors have to be selected among\
    \ Lagrange Multipliers (data points which were computed through convex optimization\
    \ solver and opted as candidates to draw the SVM’s hyper-plane). This is one of\
    \ the important parameters that can affect final classification performance metrics.\
    \ Three options are considered for choosing support vectors. Two options are widely\
    \ used, first a number of type int, that represents the number of support vectors\
    \ that should be selected from Lagrange Multipliers, if the number is greater\
    \ than that number of Lagrange Multipliers then all of them will be selected as\
    \ support vectors. The second one is a number in scientific notation (often a\
    \ negative power of 10) as a minimum threshold, and the third method which is\
    \ considered in **ORSVM** is the flag “a” that represents $Average$. Most of the\
    \ time, we have no clear conjecture about the values of Lagrange Multipliers,\
    \ how small they are, or how many of them will be available. Therefore, we do\
    \ not know what the threshold should be, or how many support vectors should be\
    \ chosen. Sometimes, it leads to **zero** support vectors, then there will be\
    \ an **Error**. Our solution to this situation, which always happens for a new\
    \ dataset, is the $average$ method. In this case, **ORSVM** finds the average\
    \ of Lagrange Multipliers and sets the threshold. Then, never an error has occurred.\
    \ However, this method does not guarantee the best generalization accuracy. But\
    \ gives a factual estimation about support vectors. After all, choosing the best\
    \ number of support vectors itself is an important task to do in SVM. The parameter\
    \ $form$ is only applicable to $Chebyshev$ kernel, because two implantations of\
    \ $Chebyhsev$ Kernel are available, an explicit equation and a recursive one.\
    \ So “r” refers to recursive and “e” refers to “explicit”. Parameter “noise” is\
    \ only applicable to the $Jacobi$ kernel, and the Jacobi’s weight function indeed.\
    \ In fact, ‘noise’ purpose is to avoid the errors that happen at the boundaries\
    \ of the weight function as it has already been explained. Finally, parameter\
    \ “C” is the regularization"
- md: "## 12.3 Model Class\n\nTable 12.1 The Model class of ORSVM and parameters list\n\
    \n| | Parameter | Default | Value |\n|---|---|---|---|\n| 1 | kernel | Chebyshev\
    \ | Jacobi, Gegenbauer, Chebyshev, Legendre |\n| 2 | order | 3 | 3, 4, 5, ...\
    \ |\n| 3 | T | 1 | 0<T<1 |\n| 4 | param1 | None | *param1* > -1 for the Jacobi\
    \ kernel, *param1* > -0.5 for the Gegenbauer kernel |\n| 5 | param2 | None | *param2*\
    \ > -1 for the Jacobi kernel |\n| 6 | svd | \"a\" | Int, scientific notation,\
    \ \"a\" |\n| 7 | form | \"r\" | \"r\", \"e\" |\n| 8 | noise | \"0.01\" | Often:\
    \ 0.01, 0.001, ... |\n| 9 | C | None | Often: 10, 100, 1000, ... |\n\nparameter\
    \ of the SVM algorithm, which controls to what degree the misclassified data points\
    \ are important. Setting “C” to the best value leads to a better generalization\
    \ of the classifier. Table 12.1 summarizes the parameters of the *Model* class.\n\
    \nRight at this point, **ORSVM** just has initiated the model and has not done\
    \ any computation yet; to fit the model, we have to call the *ModelFit* function.\
    \ Clearly, fitting requires an input dataset. As already discussed, *ModelFit*\
    \ receives train and test datasets which are divided into *x* (data without label)\
    \ and *y* (label). The following code snippet represents how one can divide the\
    \ dataset. Function *LoadDataSet* reads and loads dataset into a *pandas DataFrame*,\
    \ then converts and maps the classes to binary classification. As the “*Clnum*”\
    \ is the label column, we have to select and convert that column solely into one\
    \ Numpy array. Then remove the label column from Pandas data frame to reach the\
    \ data without the label. It converts data into *numpy array*; however, it is\
    \ not necessary. Calling the ‘*LoadDataSet*’ function gives the *x* and *y*. In\
    \ the next line using *StratifiedShuffleSplit*, we can create an object of stratified\
    \ shuffle split with required parameters, and then using the *split* function\
    \ of the created object, we can get the train and test set divided into *X* and\
    \ *y*.\n\nNow that train and test set are ready, we can call *ModelFit* with proper\
    \ parameters, and as the result, the function prints status messages and returns\
    \ weights and bias of the SVM’s hyper-plane equation and also an array for support\
    \ vectors and the kernel instance. Therefore, we have the fitted model and corresponding\
    \ parameters we can use to predict. By calling the *ModelPredict* function, the\
    \ final step of classification with **ORSVM** will be achieved. *ModelPredict*\
    \ requires text sets and also the bias and the kernel instance to calculate the\
    \ accuracy. It should be noted that the test set will be transformed into proper\
    \ space through the *ModelPredict* function. As the result, the accuracy score\
    \ will be returned. Moreover, *ModelPredict* will print the confusion matrix,\
    \ classification report, and accuracy score.\n\n```python\nimport pandas\nfrom\
    \ sklearn.model_selection import StratifiedShuffleSplit\n\ndef LoadDataSet():\n\
    \    # load dataset\n    df = pandas.read_csv('/home/data/spiral.csv',\n     \
    \                    names = ['Chem1', 'Chem2', 'Clnum'],\n                  \
    \       index_col = False)\n\n    #convert to binary classification\n    df.loc[df.Clnum\
    \ == 0, ['Clnum']] = -1\n    df.loc[df.Clnum == 1, ['Clnum']] = 1\n    y_np =\
    \ df['Clnum'].to_numpy()\n    df.drop('Clnum', axis = 1, inplace = True)\n   \
    \ df_np = df.to_numpy()\n\n    return df_np, y_np\n\nX, y = LoadDataSet()\nsss\
    \ = StratifiedShuffleSplit(n_splits = 5,\n                            random_state\
    \ = 30,\n                            test_size = 0.9)\n\nfor train_index, test_index\
    \ in sss.split(X, y):\n    X_train, X_test = X[train_index], X[test_index]\n \
    \   y_train, y_test = y[train_index], y[test_index]\n\nWeights, S_Vectors, Bias,\
    \ K_Instance = obj.ModelFit(X_train,\n                                       \
    \             y_train)\n\nAccuracy_score = obj.ModelPredict(X_test,\n        \
    \                          y_test,\n                                  Bias,\n\
    \                                  K_Instance)\n```\n\n## 12.4 SVM Class\n\nThe\
    \ SVM class is the heart of this package where the fitting process happens, the\
    \ SVM equation is evaluated to find the support vectors, and finally, the equation\
    \ of hyper-plane is constituted. Before getting delve into svm equation and finding\
    \ the support vectors, we have to do the kernel trick. So we need a “Gram matrix”,\
    \ the matrix of all possible inner products of $x\\_train$ under the selected\
    \ kernel. Therefore, considering $X\\_train_{m \\times n}$, the “SVM.fit” will\
    \ create a square matrix of shape $m \\times m$:\n\n$$K = \\begin{bmatrix} k(x_1,\
    \ x_2) & \\cdots & k(x_1, x_m) \\\\ \\vdots & k(x_i, j) & \\vdots \\\\ k(x_m,\
    \ x_1) & \\cdots & k(x_m, x_m) \\end{bmatrix}.$$\n\nThis is also known as *kernel\
    \ matrix* as it represents the kernel trick of SVM. “K” can be any of *Legendre*,\
    \ *Gegenbauer*, *Chebyshev*, or *Jacobi*.\n\nHere, after the convex optimization\
    \ problem, or better to say minimization of the dual form of SVM equation, it\
    \ will be solved using *qp* function from *cvxopt* library:\n`cvxopt.solvers.qp(P,\
    \ q, G, h, A, b)`\n\nThis function solves a quadratic program:\n\n$$\\begin{aligned}\
    \ \\text{minimize} \\quad & \\left(\\frac{1}{2}\\right) x^T P x + q^T x, \\\\\
    \ \\text{subject to} \\quad & Gx \\leqslant h, \\\\ & Ax = b. \\end{aligned}$$\n\
    \nAccording to documents provided by developers of this library, the arguments\
    \ of *qp* functions are as follows²\n\n- **P** is an $n \\times n$ dense or sparse\
    \ Wigner D-matrix with the lower triangular part of **P** stored in the lower\
    \ triangle. It should be positive semi-definite.\n- **q** is an $n \\times 1$\
    \ dense Wigner D-matrix.\n- **G** is an $m \\times n$ dense or sparse Wigner D-matrix.\n\
    - **h** is an $m \\times 1$ dense Wigner D-matrix.\n- **A** is a $p \\times n$\
    \ dense or sparse Wigner D-matrix. In particular, **A** is the $y$ matrix (containing\
    \ $y$ values of the training set) with shape of row = 1 and column = (number of\
    \ rows of the $x$ matrix)\n- **b** is a $p \\times 1$ dense Wigner D-matrix or\
    \ None.\n\nThe output of *qp* contains the *Lagrange Multipliers*, which support\
    \ vectors lie between them and we need the policy to choose some of them as support\
    \ vectors. Here, the trade-off is between over-fit and under-fit, and choosing\
    \ too much of them as support vectors cause the model to over-fit whereas selecting\
    \ a few leads to under-fitting the problem.\n\nSVM class includes a fit function\
    \ that constructs the Gram matrix using the specified kernel function. Thereafter,\
    \ solving the SVM’s equation returns the support vectors. Moreover, the bias is\
    \ calculated in *Svm.fit* function. Also, *Svm.predict* is another function of\
    \ class SVM which predicts labels of a given array. The user never needs to call\
    \ functions under the SVM class directly, and all usage of ORSVM is achievable\
    \ through Model Class and its functions.\n\n² For comprehensive documentation\
    \ and examples of cvxopt, please visit https://cvxopt.org.\n\n### 12.4.1 Chebyshev\
    \ Class\n\nAnother kernel introduced in this package is the **Chebyshev** kernel,\
    \ which is implemented in the *vectorial* approach which has already been introduced\
    \ as a Generalized Chebyshev Kernel. Similar to the Legendre-kernel, the Chebyshev\
    \ kernel is available when initiating the Model class object by passing the “Chebyshev”\
    \ parameter as the kernel name. Another parameter applicable to the Chebyshev\
    \ kernel is *form*. Two different types of Chebyshev kernels are implemented in\
    \ the Chebyshev class. One uses an explicit equation and another is a recursive\
    \ function. Selecting a type to use is possible through *form* parameter. The\
    \ parameters of the Chebyshev class are as follows:\n\n- *order* := Order of polynomial\n\
    - *form* := “e” for *Explicit* form and “r” for *Recursive* form.\n\n### 12.4.2\
    \ Legendre Class\n\n*Legendre* kernel class is generally given as an object to\
    \ the kernel parameter of *Models* class in the initialization step of an object\
    \ and also its *Legendre-kernel* function is explicitly used in constructing the\
    \ gram matrix *K*. Legendre class benefits from a recursive implementation of\
    \ the Legendre-kernel function. To use this kernel, the user only needs to initiate\
    \ the Model object with “Legendre” as the kernel parameter of the Model class.\
    \ The Legendre class needs the following parameters:\n\n- *order* := Order of\
    \ the Legendre-kernel function.\n\n### 12.4.3 Gegenbauer Class\n\nThe **Gegenbauer**\
    \ kernel is also available in the *ORSVM* package. For the implementation of the\
    \ Gegenbauer kernel function, the fractional kernel function which is introduced\
    \ in Chap. 5 is used. Therefore, in addition to the product of input vectors,\
    \ the values are obtained from the two other equations. The Gegenbauer class has\
    \ the following parameters:\n\n- *order* := Order of the Gegenbauer kernel function.\n\
    - *lambda* := The λ parameter of the Gegenbauer kernel function."
  mdcn: "## 12.3 模型类\n\n表 12.1 ORSVM 的模型类及其参数列表\n\n| | 参数 | 默认值 | 取值范围 |\n|---|---|---|---|\n\
    | 1 | kernel | Chebyshev | Jacobi, Gegenbauer, Chebyshev, Legendre |\n| 2 | order\
    \ | 3 | 3, 4, 5, ... |\n| 3 | T | 1 | 0<T<1 |\n| 4 | param1 | None | 对于 Jacobi\
    \ 核，*param1* > -1；对于 Gegenbauer 核，*param1* > -0.5 |\n| 5 | param2 | None | 对于\
    \ Jacobi 核，*param2* > -1 |\n| 6 | svd | \"a\" | 整数，科学计数法，\"a\" |\n| 7 | form |\
    \ \"r\" | \"r\", \"e\" |\n| 8 | noise | \"0.01\" | 常用值：0.01, 0.001, ... |\n| 9\
    \ | C | None | 常用值：10, 100, 1000, ... |\n\nSVM 算法的参数，它控制误分类数据点的重要性程度。将“C”设置为最佳值可以提高分类器的泛化能力。表\
    \ 12.1 总结了 *Model* 类的参数。\n\n此时，**ORSVM** 仅初始化了模型，尚未进行任何计算；要拟合模型，我们必须调用 *ModelFit*\
    \ 函数。显然，拟合需要输入数据集。如前所述，*ModelFit* 接收训练集和测试集，这些数据集被划分为 *x*（无标签数据）和 *y*（标签）。以下代码片段展示了如何划分数据集。函数\
    \ *LoadDataSet* 读取并将数据集加载到 *pandas DataFrame* 中，然后转换并将类别映射为二分类。由于“*Clnum*”是标签列，我们必须单独选择该列并将其转换为一个\
    \ Numpy 数组。然后从 Pandas 数据框中移除标签列，以获得无标签的数据。它将数据转换为 *numpy array*；然而，这并非必需。调用 ‘*LoadDataSet*’\
    \ 函数可得到 *x* 和 *y*。在下一行中，使用 *StratifiedShuffleSplit*，我们可以创建一个具有所需参数的分层随机分割对象，然后使用该对象的\
    \ *split* 函数，我们可以得到划分为 *X* 和 *y* 的训练集和测试集。\n\n既然训练集和测试集已准备就绪，我们可以使用适当的参数调用 *ModelFit*，作为结果，该函数会打印状态信息，并返回\
    \ SVM 超平面方程的权重和偏置，以及一个支持向量数组和核实例。因此，我们得到了拟合好的模型和相应的参数，可以用于预测。通过调用 *ModelPredict*\
    \ 函数，**ORSVM** 分类的最后一步将得以实现。*ModelPredict* 需要文本集以及偏置和核实例来计算准确率。需要注意的是，测试集将通过 *ModelPredict*\
    \ 函数转换到适当的空间。作为结果，将返回准确率分数。此外，*ModelPredict* 将打印混淆矩阵、分类报告和准确率分数。\n\n```python\n\
    import pandas\nfrom sklearn.model_selection import StratifiedShuffleSplit\n\n\
    def LoadDataSet():\n    # load dataset\n    df = pandas.read_csv('/home/data/spiral.csv',\n\
    \                         names = ['Chem1', 'Chem2', 'Clnum'],\n             \
    \            index_col = False)\n\n    #convert to binary classification\n   \
    \ df.loc[df.Clnum == 0, ['Clnum']] = -1\n    df.loc[df.Clnum == 1, ['Clnum']]\
    \ = 1\n    y_np = df['Clnum'].to_numpy()\n    df.drop('Clnum', axis = 1, inplace\
    \ = True)\n    df_np = df.to_numpy()\n\n    return df_np, y_np\n\nX, y = LoadDataSet()\n\
    sss = StratifiedShuffleSplit(n_splits = 5,\n                            random_state\
    \ = 30,\n                            test_size = 0.9)\n\nfor train_index, test_index\
    \ in sss.split(X, y):\n    X_train, X_test = X[train_index], X[test_index]\n \
    \   y_train, y_test = y[train_index], y[test_index]\n\nWeights, S_Vectors, Bias,\
    \ K_Instance = obj.ModelFit(X_train,\n                                       \
    \             y_train)\n\nAccuracy_score = obj.ModelPredict(X_test,\n        \
    \                          y_test,\n                                  Bias,\n\
    \                                  K_Instance)\n```\n\n## 12.4 SVM 类\n\nSVM 类是本包的核心，拟合过程在此发生，SVM\
    \ 方程被评估以找到支持向量，最终构成超平面方程。在深入探讨 SVM 方程和寻找支持向量之前，我们必须进行核技巧。因此，我们需要一个“格拉姆矩阵”，即在所选核下\
    \ $x\\_train$ 所有可能内积的矩阵。因此，考虑 $X\\_train_{m \\times n}$，“SVM.fit”将创建一个形状为 $m \\\
    times m$ 的方阵：\n\n$$K = \\begin{bmatrix} k(x_1, x_2) & \\cdots & k(x_1, x_m) \\\
    \\ \\vdots & k(x_i, j) & \\vdots \\\\ k(x_m, x_1) & \\cdots & k(x_m, x_m) \\end{bmatrix}.$$\n\
    \n这也被称为*核矩阵*，因为它表示了 SVM 的核技巧。“K”可以是 *Legendre*、*Gegenbauer*、*Chebyshev* 或 *Jacobi*\
    \ 中的任何一种。\n\n这里，在凸优化问题之后，或者更准确地说，在最小化 SVM 方程的对偶形式之后，它将使用 *cvxopt* 库中的 *qp* 函数来求解：\n\
    `cvxopt.solvers.qp(P, q, G, h, A, b)`\n\n此函数求解一个二次规划问题：\n\n$$\\begin{aligned}\
    \ \\text{minimize} \\quad & \\left(\\frac{1}{2}\\right) x^T P x + q^T x, \\\\\
    \ \\text{subject to} \\quad & Gx \\leqslant h, \\\\ & Ax = b. \\end{aligned}$$\n\
    \n根据该库开发者提供的文档，*qp* 函数的参数如下²\n\n- **P** 是一个 $n \\times n$ 的稠密或稀疏 Wigner D-矩阵，其下三角部分存储在下三角中。它应该是半正定的。\n\
    - **q** 是一个 $n \\times 1$ 的稠密 Wigner D-矩阵。\n- **G** 是一个 $m \\times n$ 的稠密或稀疏 Wigner\
    \ D-矩阵。\n- **h** 是一个 $m \\times 1$ 的稠密 Wigner D-矩阵。\n- **A** 是一个 $p \\times n$\
    \ 的稠密或稀疏 Wigner D-矩阵。特别地，**A** 是 $y$ 矩阵（包含训练集的 $y$ 值），其形状为行 = 1，列 = ($x$ 矩阵的行数)\n\
    - **b** 是一个 $p \\times 1$ 的稠密 Wigner D-矩阵或 None。\n\n*qp* 的输出包含*拉格朗日乘子*，支持向量位于它们之间，我们需要一个策略来选择其中一些作为支持向量。这里，权衡在于过拟合和欠拟合之间，选择过多的支持向量会导致模型过拟合，而选择过少则会导致欠拟合问题。\n\
    \nSVM 类包含一个 fit 函数，该函数使用指定的核函数构建格拉姆矩阵。随后，求解 SVM 方程返回支持向量。此外，偏置在 *Svm.fit* 函数中计算。同时，*Svm.predict*\
    \ 是 SVM 类的另一个函数，用于预测给定数组的标签。用户永远不需要直接调用 SVM 类下的函数，ORSVM 的所有用法都可以通过模型类及其函数实现。\n\
    \n² 有关 cvxopt 的全面文档和示例，请访问 https://cvxopt.org。\n\n### 12.4.1 切比雪夫类\n\n本包引入的另一个核是**切比雪夫**核，它以*向量*方法实现，该方法之前已作为广义切比雪夫核引入。与勒让德核类似，切比雪夫核在初始化模型类对象时通过传递“Chebyshev”参数作为核名称即可使用。另一个适用于切比雪夫核的参数是\
    \ *form*。切比雪夫类中实现了两种不同类型的切比雪夫核。一种使用显式方程，另一种是递归函数。可以通过 *form* 参数选择要使用的类型。切比雪夫类的参数如下：\n\
    \n- *order* := 多项式的阶数\n- *form* := “e”表示*显式*形式，“r”表示*递归*形式。\n\n### 12.4.2 勒让德类\n\
    \n*勒让德*核类通常在对象初始化步骤中作为对象传递给 *Models* 类的核参数，并且其 *Legendre-kernel* 函数在构建格拉姆矩阵 *K*\
    \ 时被显式使用。勒让德类利用了勒让德核函数的递归实现。要使用此核，用户只需使用“Legendre”作为模型类的核参数来初始化模型对象即可。勒让德类需要以下参数：\n\
    \n- *order* := 勒让德核函数的阶数。\n\n### 12.4.3 盖根鲍尔类\n\n**盖根鲍尔**核在 *ORSVM* 包中也可用。对于盖根鲍尔核函数的实现，使用了第\
    \ 5 章介绍的分数核函数。因此，除了输入向量的乘积外，还从另外两个方程获得值。盖根鲍尔类具有以下参数：\n\n- *order* := 盖根鲍尔核函数的阶数。\n\
    - *lambda* := 盖根鲍尔核函数的 λ 参数。"

  md: '# 3.2.2 Properties of Fractional Chebyshev Functions


    Fractional Chebyshev functions are a general form of the Chebyshev polynomials.
    The main difference between the Chebyshev polynomial and the fractional Chebyshev
    functions is that the order of $x$ can be any positive real number in the latter.
    This generalization seems to improve the approximation power of the Chebyshev
    polynomials. To introduce the fractional Chebyshev functions, first, it is needed
    to introduce a mapping function which is used to define fractional Chebyshev function
    of order $\alpha$ over a finite interval $[a, b]$, which is Parand and Delkhosh
    (2016):


    $$x'' = 2\left(\frac{x-a}{b-a}\right)^{\alpha} - 1. \qquad (3.23)$$


    By utilizing this transformation the fractional Chebyshev functions can be obtained
    as follows (Parand and Delkhosh 2016):


    $$FT_n^{\alpha}(x) = T_n(x'') = T_n\left(2\left(\frac{x-a}{b-a}\right)^{\alpha}
    - 1\right), \quad a \leqslant x \leqslant b, \qquad (3.24)$$


    where $\alpha \in \mathbb{R}^+$ is the "fractional order" of function which is
    chosen relevant to the context. Considering 3.10, the recursive form of fractional
    Chebyshev functions is defined as Parand and Delkhosh (2016)


    $$FT_0^{\alpha}(x) = 1, \quad FT_1^{\alpha}(x) = 2\left(\frac{x-a}{b-a}\right)^{\alpha}
    - 1,$$


    $$FT_n^{\alpha}(x) = 2\left(2\left(\frac{x-a}{b-a}\right)^{\alpha} - 1\right)
    FT_{n-1}^{\alpha}(x) - FT_{n-2}^{\alpha}(x), \quad n \geqslant 1. \qquad (3.25)$$


    The formulation of some of these functions is presented here:


    $$FT_0^{\alpha}(x) = 1,$$

    $$FT_1^{\alpha}(x) = 2\left(\frac{x-a}{b-a}\right)^{\alpha} - 1,$$

    $$FT_2^{\alpha}(x) = 8\left(\frac{x-a}{b-a}\right)^{2\alpha} - 8\left(\frac{x-a}{b-a}\right)^{\alpha}
    + 1,$$

    $$FT_3^{\alpha}(x) = 32\left(\frac{x-a}{b-a}\right)^{3\alpha} - 48\left(\frac{x-a}{b-a}\right)^{2\alpha}
    + 18\left(\frac{x-a}{b-a}\right)^{\alpha} - 1,$$

    $$FT_4^{\alpha}(x) = 128\left(\frac{x-a}{b-a}\right)^{4\alpha} - 256\left(\frac{x-a}{b-a}\right)^{3\alpha}
    + 160\left(\frac{x-a}{b-a}\right)^{2\alpha} - 32\left(\frac{x-a}{b-a}\right)^{\alpha}
    + 1. \qquad (3.26)$$



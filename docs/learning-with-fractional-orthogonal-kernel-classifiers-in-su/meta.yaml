    ## 6.5 总结与结论


    本章涵盖了雅可比正交多项式，这是经典正交多项式中最一般的一种，并已在许多情况下得到应用。实际上，本章解释了这些多项式的基础和性质，并构建了普通的雅可比核函数。此外，本章还介绍了雅可比多项式的分数阶形式以及相关的分数阶雅可比核函数，这通过将输入数据转换到分数阶空间，扩展了此类核函数的适用性，而该空间已被证明能提升分类的准确率。同时，本章还对引入的雅可比核函数进行了全面的比较'

    # 4.3 Legendre Kernel Functions


    In this section, the ordinary Legendre polynomial kernel formula is presented
    first. Then, some other versions of this kernel function will be introduced, and
    at the end, the fractional Legendre polynomial kernel will be introduced in this
    section.


    # 4.3.1 Ordinary Legendre Kernel Function


    Legendre polynomials, like other polynomials, are orthogonal except that Legendre
    polynomial weight function is a constant function of value 1 (w(x) = 1). So according
    to Eqs. 4.2 and 4.3 for different m and n, Legendre polynomials are orthogonal
    to each other with weight function 1. This enables us to construct the Legendre
    kernel without denominators. Therefore, for scalar inputs x and z, Legendre kernel
    is defined as follows:'
  - '[PAGE 90]


    $K(x, z) = \sum_{i=0}^{n} P_i(x) P_i(z) = < \phi(x), \phi(z) >,$


    where $<, >$ is an inner product and the unique parameter $n$ is the highest order
    of the Legendre polynomials, and the nonlinear mapping determined by Legendre
    kernel is


    $\phi(x) = (P_0(x), P_1(x), ..., P_n(x)) \in \mathbb{R}^{n+1}.$


    Now, with this formula, it can be seen that the $\phi(x)$ values are orthogonal
    to each other, indicating that the Legendre kernel is also orthogonal Shawe-Taylor
    and Cristianini (2004).


    **Theorem 4.1** (Pan et al. (2012)) *Legendre kernel is a valid Mercer kernel.*


    *Proof* According to the Mercer theorem introduced at (Sect. 2.2.1), a valid kernel
    function that needs to be positive semi-definite, or equivalently should satisfy
    the necessary and sufficient conditions of Mercer''s theorem. As Mercer theorem
    states any SVM kernel to be a valid kernel should be non-negative, in a precise
    way:


    $\iint K(x, z)w(x, z)f(x)f(z)dxdz \geq 0,$


    where


    $K(x, z) = \sum_{i=0}^{n} P_i(x) P_i^T(z),$


    and $w(x, z) = 1$, and $f(x)$ is a function where $: f : \mathbb{R}^m \rightarrow
    \mathbb{R}$. Assuming each element is independent of the others, the Mercer condition
    $K(x, z)$ can be evaluated as follows:


    $\iint K(x, z)w(x, z)f(x)f(z)dxdz = \iint \sum_{j=0}^{n} P_j(x)P_j^T(z)f(x)f(z)dxdz,$

    $= \sum_{j=0}^{n} \iint P_j(x)P_j^T(z)f(x)f(z)dxdz,$

    $= \sum_{j=0}^{n} \left[ \int P_j(x)f(x)dx \int P_j^T(z)f(z)dz \right],$

    $= \sum_{j=0}^{n} \left[ \left( \int P_j(x)f(x)dx \right) \left( \int P_j^T(z)f(z)dz
    \right) \right],$

    $\geq 0.$


    The Legendre kernels up to the third order can be expressed as:'
  - '[PAGE 91]


    $K(x, z) = 1 + xz,$

    $K(x, z) = 1 + xz + \frac{9(xz)^2 - 3x^2 - 3z^2 + 1}{4},$

    $K(x, z) = 1 + xz + \frac{9(xz)^2 - 3x^2 - 3z^2 + 1}{4} + \frac{25(xz)^3 - 15x^3z
    - 15xz^3 + 9xz}{4}.$


    This kernel can be expanded and specified as the following for vector inputs $x$,
    $z \in \mathbb{R}^d$:


    $K(\mathbf{x}, \mathbf{z}) = \prod_{j=1}^d K_j(x_j, z_j) = \prod_{j=1}^d \sum_{i=0}^n
    P_i(x_j)P_i(z_j)$


    where $x_j$ is j-th element of the vector $\mathbf{x}$.


    Given that the multiplication of two valid kernels is still a valid kernel, this
    kernel is also valid. The same as the Chebyshev kernel function for vector input,
    each feature of the input vector for the Legendre kernel function lies in $[-1,
    1]$. So the input data has been normalized to $[-1, 1]$ via the following formula:


    $x_i^{new} = \frac{2(x_i^{old} - Min_i)}{Max_i - Min_i} - 1$


    where $x_i$ is the i-th feature of the vector $\mathbf{x}$, $Max_i$ and $Min_i$
    are the minimum and maximum values along the i-th dimensions of all the training
    and test data, respectively.


    # 4.3.2 Other Legendre Kernel Functions


    Apart from the ordinary form of the Legendre kernel function, other kernels with
    unique properties and special weight functions are defined on Legendre polynomials,
    some of which are introduced in this section.


    # 4.3.2.1 Generalized Legendre Kernel


    Ozer et al. (2011) applied kernel functions onto vector inputs directly instead
    of applying them to each input element. In fact, the generalized Legendre kernel
    by generalized Legendre polynomial was proposed as follows Tian and Wang (2017):


    $K_{G-Legendre}(x, z) = \sum_{i=0}^n P_i(x)P_i^T(z)$'
  - '[PAGE 92]


    where


    $P_0(x) = 1,$

    $P_1(x) = x,$

    $P_n(x) = \frac{2n-1}{n} x P_{n-1}^T(x) - \frac{n-1}{n} P_{n-2}(x). \quad (4.30)$


    Regarding Chebyshev generalized kernels, it should be noted that these kernels
    have more complex expressions than generalized Legendre kernels due to their more
    complex weight function, so generalized Chebyshev kernels can depict more abundant
    nonlinear information.


    # 4.3.2.2 Exponentially Legendre Kernel


    The exponentially modified orthogonal polynomial kernels are actually the product
    of the well-known Gaussian kernel and the corresponding generalized orthogonal
    polynomial kernels (without weighting function). Since an exponential function
    (the Gaussian kernel) can capture local information along the decision surface
    better than the square root function, Ozer et al. (2011) replaced the weighting
    function with Gaussian kernel ($\frac{1}{\exp \gamma \|x-z\|^2}$), and defined
    the exponentially modified Legendre kernels as Tian and Wang (2017)


    $K_{exp-Legendre}(x, z) = \frac{\sum_{i=0}^n P_i(x) P_i^T(z)}{\exp \gamma \|x-z\|^2}.
    \quad (4.31)$


    It should be noted that the modified generalized orthogonal polynomial kernels
    can be seen as semi-local kernels. Also, having two parameters, $n$ and $\gamma
    > 0$, makes the optimization of these two kernels more difficult to exploit than
    that of the generalized orthogonal polynomial kernels Tian and Wang (2017).


    # 4.3.2.3 Triangularly Modified Legendre Kernel


    The Triangular kernel, which is basically an affine function of the Euclidean
    distance ($d(i, j)$) between the points in the original space, is expressed as
    Fleuret and Sahbi (2003)


    $K(x, z) = (1 - \frac{\|x-z\|}{\lambda})_+, \quad (4.32)$


    where the $()_+$ forces this mapping to be positive and ensures this expression
    to be a kernel. Therefore, the triangularly modified Legendre kernels can be written
    as follows Tian and Wang (2017), Belanche Muñoz (2013); Fleuret and Sahbi (2003):'
- md: '$K_{Tri-Legendre}(x, z) = (1 - \frac{\|x - z\|}{\lambda})_+ \sum_{i=0}^{n}
    P_i(x) P_i^T(z)$, (4.33)


    where $\lambda = \max\{d(x_i, \bar{x})|\bar{x} = \frac{1}{N} \sum_{i=1}^{N} x_i,
    x_i \in X\}$, $X$ is a finite sample set, and $N$ is the number of samples. Thus,
    all the data live in a ball of radius $\lambda$. Since the parameter $\lambda$
    only depends on the input data, the triangularly modified orthogonal polynomial
    kernels have a unique parameter chosen from a small set of integers.


    ## 4.3.3 Fractional Legendre Kernel


    Given that the fractional weight function is $(fw(x, z) = (xz^T)^{\alpha-1})$
    and similar to the Legendre kernel, the corresponding fractional forms are introduced
    as


    $K_{FLegendre}(X, Z) = \prod_{j=1}^{m} \sum_{i=0}^{n} FP_i^{\alpha}(x''_{x_j})
    FP_i^{\alpha}(x''_{z_j}) fw(x''_{x_j}, x''_{z_j})$, (4.34)


    where $m$ is the dimension of vectors $X$ and $Z$. According to the procedure
    we have in this book, after introducing a kernel, we should guarantee its validity.
    So we can continue with the following theorem.


    **Theorem 4.2** *The fractional Legendre kernel is a valid Mercer kernel.*


    **Proof** According to Mercer''s theorem introduced at (Sect. 2.2.1), a valid
    kernel should satisfy the sufficient conditions of Mercer''s theorem. As we know,
    Mercer''s theorem states any SVM kernel to be a valid kernel must be non-negative,
    in a precise way:


    $\iint K(x, z)w(x, z) f(x) f(z) dxdz \geq 0$, (4.35)


    where


    $K(x, z) = \sum_{i=0}^{n} FP_i^{\alpha}(x''_{x_j}) FP_i^{\alpha}(x''_{z_j})^T
    fw(x''_{x_j}, x''_{z_j})$, (4.36)


    and $fw(x, z) = (xz^T)^{\alpha-1}$, where $f(x)$ is function as $f : \mathbb{R}^m
    \rightarrow \mathbb{R}$. Thus, we have


    $\iint K(x, z)w(x, z) f(x) f(z) dxdz$


    $= \iint \sum_{i=0}^{n} F P_{i}^{\alpha}\left(x_{x}^{\prime}\right) F P_{i}^{\alpha}\left(x_{z}^{\prime}\right)^{T}
    f w\left(x_{x_{j}}^{\prime}, x_{z_{j}}^{\prime}\right) f(x) f(z) d x d z,$


    $= \sum_{i=0}^{n} \iint F P_{i}^{\alpha}\left(x_{x}^{\prime}\right) F P_{i}^{\alpha}\left(x_{z}^{\prime}\right)^{T}\left(x_{x}^{\prime}
    x_{z}^{\prime T}\right)^{\alpha-1} f(x) f(z) d x d z,$


    $= \sum_{i=0}^{n}\left[\int F P_{i}^{\alpha}\left(x_{x}^{\prime}\right)\left(x_{x}^{\prime}\right)^{\alpha-1}
    f(x) d x \int F P_{i}^{\alpha}\left(x_{z}^{\prime}\right)^{T}\left(x_{z}^{\prime
    T}\right)^{\alpha-1} f(z) d z\right],$


    $= \sum_{i=0}^{n}\left[\left(\int F P_{i}^{\alpha}\left(x_{x}^{\prime}\right)\left(x_{x}^{\prime}\right)^{\alpha-1}
    f(x) d x\right)\left(\int F P_{i}^{\alpha}\left(x_{z}^{\prime}\right)^{T}\left(x_{z}^{\prime
    T}\right)^{\alpha-1} f(z) d z\right)\right],$


    $\geqslant 0. \tag{4.37}$


    ## 4.4 Application of Legendre Kernel Functions on Real Datasets


    In this section, the application of the ordinary Legendre kernel and the fractional
    Legendre kernel is shown in SVM. Also, the obtained results on two real datasets
    are compared with the results of RBF kernels, ordinary polynomial kernel, ordinary
    Chebyshev kernel, and fractional Chebyshev kernel.


    ### 4.4.1 Spiral Dataset


    The Spiral dataset has already been introduced in the previous chapter. In this
    section, the Legendre kernel and the fractional Legendre kernel are used to classify
    spiral datasets using SVM. As we mentioned before, this multi-class classification
    dataset can be split into three binary classification datasets. It was also previously
    explained (Fig. 3.5), by transferring data to the fractional space using the $\alpha$
    coefficient ($0.1 \leqslant \alpha \leqslant 0.9$), the data density gradually
    decreases with decreasing alpha value, and the central axis of data density from
    the point (0, 0) is transferred to point (1, 1). Although it seems that data points
    are conglomerated on one corner of the axis on a 2D plot, Fig. 4.4, this is not
    necessarily what happens in 3D space when the kernel function is applied, Fig.
    4.5.


    Using the data transferred to the fractional space, the decision boundaries are
    found for the problem with the above-mentioned divisions with the help of the
    Legendre and fractional Legendre kernel functions.


    In order to have an intuition of how the decision boundaries are different, we
    can see Fig. 4.6, which depicts corresponding Legendre classifiers of different
    orders of 3, 4, 5 and 6 on the original Spiral dataset, where the binary classification
    of 1-vs-2, 3 is chosen. From these figures, it can be seen that the boundaries
    of decision-making are becoming more twisted.


    The complexity of the decision boundary even gets worse in fractional space. Figure
    4.7 demonstrates the decision boundary of the fractional Legendre classifier with
    different orders of 3, 4, 5, and 6, where $\alpha = 0.4$. Again there is a complicated
    decision boundary as one approach from order 3 to order 6.$^1$


    Each decision boundary or decision surface in 3D space classifies the data points
    in a specific form. As the decision boundary or surface of a kernel function for
    each order is fixed and determined, it is the degree of correlation between that
    specific shape and the data points that determine the final accuracy.


    The experiment results are summarized in the following tables. In particular,
    Table 4.2 summarizes the results of class 1-vs-{2, 3}. As it can be seen, the
    **fractional Legendre** kernel outperforms other kernels, and the **fractional
    Chebyshev** kernel has the second best accuracy. Also, the classification accuracy
    of the mentioned kernels on class 2-vs-{1, 3} is summarized in Table 4.3, where
    the **RBF** kernel has the best accuracy score. Finally, Table 4.4 is the classification
    accuracy scores on class 3-vs-{1, 2}, in which the **fractional Legendre** kernel
    has the best performance.


    > $^1$ Based on many studies, it was concluded that the fractional Legendre kernel
    with order 3 is not a suitable option for use on the spiral dataset.



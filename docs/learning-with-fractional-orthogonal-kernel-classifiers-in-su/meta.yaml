    ## 第一部分


    ## 支持向量机基础


    ## 第一章


    ### 支持向量机简介


    Hadi Veisi


    **摘要** 本章回顾了机器学习和模式识别的概念，并描述了基本的机器学习技术（监督学习、无监督学习和强化学习）。同时，简要介绍了机器学习从20世纪50年代前的早期工作（包括贝叶斯理论）到最新方法（包括深度学习）的发展简史。随后，介绍了支持向量机及其几何解释，并描述了其基本概念和公式。还回顾了支持向量机的发展历程（从20世纪60年代Vapnik的早期工作至今）。最后，展示了支持向量机在医学、文本分类和图像分类等多个领域的各种机器学习应用。


    **关键词** 机器学习 · 模式识别 · 支持向量机 · 历史


    ### 1.1 什么是机器学习？


    从一个人的面部识别此人、阅读手写信件、理解语音讲座、分析公司资料后决定购买其股票，以及在繁忙的街道上驾驶汽车，这些都是使用人类智能的例子。人工智能是指在机器（即计算机）中模拟人类智能。机器学习作为人工智能的一个子集，是一门让计算机从经验中自动学习以执行智能和类人任务的科学。与计算机科学和工程中的其他行动类似，机器学习通过计算机算法实现，这些算法可以从其环境（即数据）中学习，并能将这种训练泛化，以便在新环境中智能地行动。如今，计算机可以使用人脸识别算法从面部识别人，使用手写识别将手写信件转换为可编辑形式，使用语音识别和自然语言理解理解语音讲座，使用算法交易方法购买公司股票，并且可以在自动驾驶汽车中自动驾驶。机器学习一词由Arthur
    Samuel于1959年创造，他是美国计算机游戏和人工智能领域的先驱，他将这个术语定义为“它赋予计算机无需显式编程就能学习的能力”Samuel (2000)。1997年，美国计算机科学家、卡内基梅隆大学机器学习系前主任Tom
    Mitchell给出了一个数学和关系定义：“如果一个计算机程序在任务T上的性能（通过性能度量P衡量）随着经验E而提高，那么就说该程序从经验E中学习”Mitchell
    (1997)。因此，如果你想让你的机器学习程序预测股票的增长（任务T）以决定是否购买，你可以使用该股票过去价格模式的数据（经验E，称为训练数据）运行机器学习算法，如果它成功“学习”了，那么它在预测未来价格（性能度量P）方面会做得更好。机器学习的早期工作可以追溯到20世纪50年代，在过去的70年里，这个领域已经有了许多改进。以下是机器学习的简史：


    - **20世纪50年代之前**：已经发展了几种与机器学习相关的理论，包括贝叶斯理论Bayes (1991)、马尔可夫链Gagniuc (2017)、回归和估计理论Fisher
    (1922)。此外，Donald Hebb在1949年Hebb (1949)提出了他的脑神经元相互作用模型，这是McCulloch-Pitts神经网络McCulloch
    and Pitts (1943)的基础。

    - **20世纪50年代**：在这个十年里，机器学习的先驱们提出了机器学习的初步想法和算法。图灵测试最初被称为模仿游戏，由Alan Turing提出，作为测试机器表现出与人类相当或无法区分的智能行为的能力。IBM的Arthur
    Samuel开发了一个用于玩跳棋的计算机程序Samuel (1959)。Frank Rosenblatt将Hebb的脑细胞交互学习模型与Arthur Samuel的想法相结合，创造了感知器Rosenblatt
    (1958)。

    - **20世纪60年代**：贝叶斯方法被引入用于概率推理Solomonoff (1964)。支持向量机的初步想法由Vapnik和Lerner提出Vapnik
    (1963)。Widrow和Hoff为神经网络开发了delta学习规则，这是反向传播算法的前身Vapnik (1963)。Sebestyen Sebestyen
    (1962)和Nilsson Nilsson (1965)提出了最近邻思想。Donald Michie使用强化学习来玩井字棋Michie (1963)。决策树由Morgan和Sonquist引入Morgan
    and Sonquist (1963)。

    - **20世纪70年代**：这是所谓的“退出年”，也被称为人工智能寒冬，这是由于对机器学习有效性的悲观态度，因为机器学习方法在解决仅线性可分问题方面的局限性Minsky
    and Papert (1969)。

    - **20世纪80年代**：杰出思想的诞生带来了新的热情。Rumelhart等人(1986)推广的反向传播导致了机器学习的复兴。Hopfield推广了他的递归神经网络Hopfield
    (Hopfield)。Watkins在强化学习中开发了Q学习Watkins (1989)。'

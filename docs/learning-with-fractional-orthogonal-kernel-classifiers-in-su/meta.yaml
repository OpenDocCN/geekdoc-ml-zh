    # 7.5 Numerical Examples


    In this section, the collocation form of least squares-support vector regressions
    is applied for solving various forms of Lane-Emden type equations based on the
    rational Legendre kernels.

    The value of the regularization parameter $\gamma$ is effective in the performance
    of the LS-SVM model. Based on experience the larger regularization parameter results
    in a smaller error. Therefore, the chosen value for $\gamma$ is $10^8$ in the
    presented examples which is obtained by trial and error.

    For solving this problem by using the proposed method, we train our algorithm
    by using the shifted roots of Legendre polynomials, and the testing points are
    considered to be the set of equidistant points on the domain. Then the training
    and testing errors are computed which have been defined by $e = y - \tilde{y}$.
    In order to show the efficiency and capability of the proposed method, the numerical
    approximations are compared with the other obtained results. Also, the convergence
    of our method is also illustrated by numerical results.


    **Test case 1:** Ramos (2005), Yildirim and Özis (2009), Chowdhury and Hashim
    (2007) Let us consider $f(x, y) = -2(2x^2 + 3)y$, $k = 2$, $h(x) = 0$, $A = 1$,
    and $B = 0$ in Eq. 7.18, then the linear Lane-Emden equation is as follows:'

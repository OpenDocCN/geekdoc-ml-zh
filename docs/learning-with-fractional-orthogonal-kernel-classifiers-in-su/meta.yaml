    \ # y is string\n```\n\nRules for Python variables are:\n\n- A variable name must\
    \ start with a letter or underscore character and cannot start with a number.\n\
    - A variable name can only contain alpha-numeric characters and underscores.\n\
    - Variable names are case sensitive (yy, Yy, and YY are three different variables).\n\
    \nPython allows multiple variables to be assigned in one line and the same value\
    \ is assigned to multiple variables in one line:\n\n```\nx, y, z = \"Green\",\
    \ \"Blue\", \"Red\"\nx = y = z = 2\n```\n\nIn Python, a *print* statement can\
    \ be used to combine both text and a variable(s) or mathematical operation with\
    \ the + character but a string and a numeric variable are not integrable:\n\n\
    ```\nx = \"World!\"\nprint(\"Hello\" + x)\nx = 2\ny = 3\nprint(x + y)\nx = 5\n\
    y = \"Python\"\nprint(x + y) # raise error\n```\n\n```\n> Hello World!\n> 5\n\
    > TypeError: unsupported operand type(s) for +: 'int' and 'str'\n```\n\nVariables\
    \ that are created outside of a function or class are known as global variables\
    \ and can be used everywhere, both inside and outside of functions.\n\n```\nx\
    \ = \"World!\"\ndef myfunc():\n    print(\"Hello\" + x)\nmyfunc()\n```\n\n```\n\
    > Hello World!\n```\n\nIf a variable was defined globally and is redefined in\
    \ a function with the same name, its local value can only be usable in that function\
    \ and the global value remains as it was.\n\n```\nx = \"World!\"\ndef myfunc():\n\
    \    x = \"Python.\"\n    print(\"Hello \" + x)\nmyfunc()\n```\n\n```\n> Hello\
    \ Python.\n```\n\nTo create or change a global variable locally in a function,\
    \ a *global* keyword must use before the variable:\n\n```\nx = \"2.7\"\ndef myfunc():\n\
    \    global x\n    x = \"3.7\"\nmyfunc()\nprint(\"Python version is\" + x)\n```\n\
    \n```\n> Python version is 3.7\n```\n\n## Numbers and Casting\n\nThere are three\
    \ types of numbers in Python:\n\n- int,\n- float, and\n- complex,\n\nwhich can\
    \ be represented as follows:\n\n```\na = 10    # int\nb = 3.3   # float\nc = 2j\
    \    # complex\n```\n\nThe *type()* is a command used for identifying the type\
    \ of any object in Python. Casting is an attribute to change the type of a variable\
    \ to another. This can be done by using that type and giving the variable as input:\n\
    \n- *int()* manufacture an integer number from a float (by rounding down it) or\
    \ string (it should be an integer).\n- *float()* manufacture a float number from\
    \ an integer or string (it can be float or int).\n- *str()* manufacture a string\
    \ from a wide variety of data types.\n\n```\na = int(2)    # a will be 2\nb =\
    \ int(2.8)  # b will be 2\nc = int(\"4\")  # c will be 4\n```\n\n```\nx = float(8)\
    \     # x will be 8.0\ny = float(4.8)   # y will be 4.8\nz = float(\"3\")   #\
    \ z will be 3.0\nw = float(\"4.2\") # w will be 4.2\ni = str(\"aa1\")   # i will\
    \ be 'aa1'\nj = str(45)      # j will be '45'\nk = str(3.1)     # k will be '3.1'\n\
    ```\n\n## Strings\n\nStrings in Python can be represented by either quotation\
    \ marks or double quotation marks. Even string can be assigned to a variable and\
    \ it can be a multi-line string by using three double quotes or three single quotes:\n\
    \n```\na = \"Hello\"\nprint(a)\n```\n\n```\n> Hello\n```\n\n```\na = \"\"\"Strings\
    \ in Python can be represent\nsurrounded by either single quotation marks,\nor\
    \ double quotation marks.\"\"\"\nprint(a)\n```\n\n```\n> Strings in Python can\
    \ be represent\nsurrounded by either single quotation marks,\nor double quotation\
    \ marks.\n```\n\n```\na = '''Strings in Python can be represent\nsurrounded by\
    \ either single quotation marks,\nor double quotation marks'''\nprint(a)\n```\n\
    \n```\n> Strings in Python can be represent\nsurrounded by either single quotation\
    \ marks,\nor double quotation marks.\n```\n\nIn Python, there is no dedicated\
    \ data type as the character. In fact, a single character is simply a string with\
    \ a length equal to 1. Strings in Python like many other programming languages\
    \ are arrays of bytes representing Unicode characters.\n\n```\na = \"Hello, World!\"\
    \nprint(a[3])\n```\n\n```\n> l\n```\n\nSlicing is an attribute in Python that\
    \ returns a range of values in an array or list. In this case, slicing returns\
    \ a range of characters. In order to specify the starting and the ending indices\
    \ of range, separate them by a colon. Negative indexes can be used to start the\
    \ slice from the end of a list or array.\n\n```\na = \"Hello, World!\"\nprint(a[3:7])\n\
    print(a[-6:-1])\n```\n\n```\n> lo, W\n> World\n```\n\nTo spot the length of a\
    \ string, use the *len()* function.\n\n```\na = \"Hello, World!\"\nprint(len(a))\n\
    ```\n\n```\n> 13\n```\n\nThere are so many built-in methods that are applicable\
    \ on strings, just to name a few:\n\n- *strip()* removes any white-space from\
    \ the beginning or the end:\n\n    ```\n    a = \"Hello, World!\"\n    print(a.strip())\n\
    \    ```\n\n    ```\n    > Hello, World!\n    ```\n\n- *lower()* returns the string\
    \ in lower case:\n\n    ```\n    a = \"Hello, World!\"\n    print(a.lower())\n\
    \    ```\n\n    ```\n    > hello, world!\n    ```\n\n- *upper()* returns the string\
    \ in upper case:\n\n    ```\n    a = \"Hello, World!\"\n    print(a.upper())\n\
    \    ```\n\n    ```\n    > HELLO, WORLD!\n    ```\n\n- *replace()* replaces a\
    \ string with another one:\n\n    ```\n    a = \"Hello, World!\"\n    print(a.replace(\"\
    W\", \"K\"))\n    ```\n\n    ```\n    > Hello, Korld!\n    ```\n\n- The *split()*\
    \ method splits the string into substrings if it finds instances of the separator:\n\
    \n    ```\n    a = \"Hello, World!\"\n    print(a.split(\"o\"))\n    ```\n\n \
    \   ```\n    > ['Hell', ', W', 'rld!']\n    ```\n\nUse the keywords *in* for checking\
    \ if there is a certain phrase or a character in a string:\n\n```\ntxt = \"Hello,\
    \ World! My name is Python.\"\nif \"Python\" in txt:\n    print(\"The Python word\
    \ exist in txt.\")\n```\n\n```\n> The Python word exist in txt.\n```\n\nTo concatenate,\
    \ or combine two strings, + operator can be used.\n\n```\nx = \"Hello\"\ny = \"\
    World\"\nz = x + \" \" + y\nprint(z)\n```\n\n```\n> Hello World\n```\n\nNumbers\
    \ cannot be combined with strings. But we can apply casting by *str()* or use\
    \ the *format()* method that takes the passed arguments and place them in the\
    \ string where the placeholders {} are. It is worth mentioning that the *format()*\
    \ method can take an unlimited number of arguments:\n\n```\nversion = 3.7\nage\
    \ = 29\ntxt1 = \"My name is Python, and my version is {} and my age is {}\"\n\
    txt2 = \"My name is Python, and my version is \" + str(version) + \" and my age\
    \ is\" + str(age)\nprint(txt1.format(version, age))\nprint(txt2)\n```\n\n```\n\
    > My name is Python, and my version is 3.7 and my age is 29\n> My name is Python,\
    \ and my version is 3.7 and my age is 29\n```\n\nAn escape character is a backslash\
    \ \\ for writing characters that are illegal in a string. For example, a double\
    \ quote inside a string that is surrounded by double quotes.\n\n```\ntxt1 = \"\
    This is an \\\"error\\\" example.\"\ntxt2 = \"This is an 'error' example.\"\n\
    print(txt2)\n```\n\n```\n> This is an 'error' example.\n```\n\n- \\' single quote;\n\
    - \\\\ backslash;\n- \\n new line;\n- \\t tab;\n- \\r carriage Return;\n- \\b\
    \ backspace;\n- \\f form feed;\n- \\ooo octal value;\n- \\xhh Hex value.\n\n##\
    \ Lists\n\nLists are one of all four collection data types. When we decide to\
    \ save some data in one variable, a list container can be used. In Python lists,\
    \ elements are written by square brackets and an item is accessible by referring\
    \ to its index number.\n\n```\nmylist = [\"first\", \"second\"]\nprint(mylist)\n\
    print(mylist[1])\n```\n\n```\n> ['first', 'second']\n> second\n```\n\nAs mentioned\
    \ in the Strings section, a string is a list and all the negative indexing and\
    \ range of indexes can be used for lists, and also remember that the first item\
    \ in Python language has an index 0. By considering one side of colon devoid,\
    \ the range will go on to the end of the beginning of the list.\n\n```\nmylist\
    \ = [\"first\", \"second\", \"Third\", \"fourth\", \"fifth\"]\nprint(mylist[-1])\n\
    print(mylist[1:3])\nprint(mylist[2:])\n```\n\n```\n> fifth\n> ['second', 'Third']\n\
    > ['Third', 'fourth', 'fifth']\n```\n\nTo change an item value in a list, we can\
    \ refer to its index number. Iterating through the list items is possible by for\
    \ loop. To determine that an item is present in a list we can use *in* keyword\
    \ and with *len()* function we can find how many items are in a list."
  mdcn: "## 基本语法\n\nPython 语法可以直接在命令行中执行。例如，输入以下命令：\n\n```\nprint(\"Hello, World!\"\

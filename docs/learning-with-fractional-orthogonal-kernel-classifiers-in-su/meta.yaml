    and are enumerated in decreasing order $1 > x_{n1}(\lambda) > x_{n2} > \dots >
    x_{nn}(\lambda) > -1$ (Reimer 2013). The zeros of $G_n^\lambda(x)$ and $G_m^\lambda(x),
    m > n$ separate each other and between any two zeros of $G_n^\lambda(x)$, there
    is at least one zero (Olver et al. 2010).


    Gegenbauer polynomials follow the symmetry same as other classical orthogonal
    polynomials. Therefore, Gegenbauer polynomials of even order have even symmetry
    and contain only even powers of $x$ and similarly odd orders of Gegenbauer polynomials
    have odd symmetry and contain only odd powers of $x$ (Olver et al. 2010).


    $$G_n^\lambda(x) = (-1)^n G_n^\lambda(x) = \begin{cases} G_n^\lambda(-x), & n
    \text{ even} \ -G_n^\lambda(-x), & n \text{ odd} \end{cases}, \quad (5.17)$$



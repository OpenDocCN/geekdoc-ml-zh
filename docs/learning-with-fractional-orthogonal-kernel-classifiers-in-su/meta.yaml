  md: '# 6.3.2 Other Jacobi Kernel Functions


    SVM with the kernel-trick heavily depends on the proper kernel to choose according
    to data, which is still an attractive topic to introduce and examine new kernels
    for SVM. Orthogonality properties of some polynomials such as Jacobi have made
    them a hot alternative for such use cases. By the way, some previously introduced
    kernels such as wavelet have been used successfully Nadira et al. (2019). Combining
    the wavelet and orthogonal Kernel functions such as Chebyshev, Hermit and Legendre
    have already been proposed and examined in signal processing Garnier et al. (2003),
    solving differential equations Imani et al. (2011), Khader and Adel (2018), optimal
    control Razzaghi and Yousefi (2002), Elaydi et al. (2012), and calculus variation
    problems Bokhari et al. (2018).


    # 6.3.2.1 Regularized Jacobi Wavelet Kernel Function


    Abassa et al. Nadira et al. (2019) recently introduced SVM kernels based on Jacobi
    wavelets. However, the proposed kernel will be glanced here, interested reader
    may find the proof and details in original paper Nadira et al. (2019). It should
    be noted that some notations have to be changed to preserve the integrity of the
    book, but the integration of formulation is intact and same as the original work.


    The Jacobi polynomials $J_m^{(\psi, \omega)}$ are defined as follows:


    ```

    $$J_m^{(\psi, \omega)}(x) = \frac{(\psi + \omega + 2m - 1)[\psi^2 - \omega^2 +
    x(\psi + \omega + 2m)(\psi + \omega + 2m - 2)]}{2m(\psi + \omega + 2m - 2)(\psi
    + \omega + m)} J_{m-1}^{(\psi, \omega)}(x) - \frac{(\psi + m - 1)(\omega + m -
    1)(\psi + \omega + 2m)}{m(\psi + \omega + 2m - 2)(\psi + \omega + m)} J_{m-2}^{(\psi,
    \omega)}(x),$$

    ```


    where $\psi > -1, \omega > -1$, and


    ```

    $$J_0^{(\psi, \omega)}(x) = 1, J_1^{(\psi, \omega)}(x) = \frac{\psi + \omega +
    2}{2}x + \frac{\psi - \omega}{2}.$$

    ```


    These polynomials belong to the weight space $L_w^2([-1, 1])$, i.e.,


    ```

    $$\left\langle J_m^{(\psi, \omega)}, J_{m''}^{(\psi, \omega)} \right\rangle_{L_w^2}
    = h_m^{(\psi, \omega)} \delta_{m,m''}, \quad \forall m, m'' \in \mathbb{N},$$

    ```


    where


    ```

    $$h_m^{(\psi, \omega)} = \| J_m^{(\psi, \omega)} \| = \frac{2^{\psi + \omega +
    1} \Gamma(\psi + m + 1) \Gamma(\omega + m + 1)}{(2m + 1 + \psi + \omega) m! \Gamma(\psi
    + \omega + m + 1)},$$

    ```'

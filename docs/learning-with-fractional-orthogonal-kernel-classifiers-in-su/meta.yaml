  md: 'Martínez (2012), conformal mapping Reichel (1986), water waves Manam (2011),
    and Volterra’s population model Wazwaz (2002) are expressed as integral equations
    Assari and Dehghan (2019), Bažant and Jirásek (2002), Bremer (2012), Kulish and
    Novozhilov (2003), Lu et al. (2020), Parand and Delkhosh (2017), Volterra (1928).
    Recently, the applications of integral equations in machine learning problems
    have also been discussed by researchers Keller and Dahn (2019), Chen et al. (2018),
    Dahn and Keller (2016). Furthermore, integral equations are closely related to
    differential equations, and in some cases, these equations can be converted to
    each other. Integro-differential equations are also a type of integral equations,
    in which not only the unknown function is placed under the integral operator,
    but also its derivatives appear in the equation. In some cases, the partial derivative
    of the unknown function may appear in the equation. In this case, the equation
    is called the partial integro-differential equation. Distributed fractional differential
    equations are also a type of fractional differential equations, which are very
    similar to integral equations. In these equations, the derivative fraction of
    the unknown function appears under the integral in such a way that the fractional
    derivative order is the same as the integral variable.


    Due to the importance and wide applications of integral equations, many researchers
    have developed efficient methods for solving these types of equations Abbasbandy
    (2006), Assari and Dehghan (2019), Fatahi et al. (2016), Golberg (2013), Mandal
    and Chakrabarti (2016), Marzban et al. (2011), Nemati et al. (2013), Wazwaz (2011).
    In this chapter, starting with the explanation of integral equations, and in the
    following, a new numerically efficient method based on the least squares support
    vector regression approach is proposed for the simulation of some integral equations.


    # 9.2 Integral Equations


    Integral equations are divided into different categories based on their properties.
    However, there are three main types of integral equations Wazwaz (2011), i.e.,
    Fredholm, Volterra, and Volterra-Fredholm integral equations. While the Fredholm
    integral equations have constant integration bounds, in Volterra integral equations
    at least one of the bounds depends on the independent variable. Volterra-Fredholm
    integral equations also include both types of equations. These equations themselves
    are divided into subcategories such as linear/nonlinear, homogeneous/inhomogeneous,
    and first/second kind. In the next section, different classes of these equations
    are presented and discussed.'

    same as hard margin SVM which is discussed in Eq. 2.22.


    # 2.2 Nonlinear SVM Classifiers


    Some problems have nonlinear decision surfaces and therefore linear methods do
    not provide a suitable answer for them. The nonlinear SVM classifier was introduced
    by Vapnik Vapnik (2000) for these problems. In this method, the input data is
    mapped to a new feature space by a nonlinear function and a hyperplane is found
    in the transformed feature space. By applying reverse mapping, the hyperplane
    becomes a curve or a surface in the input data space (see Fig. 2.5).

    Applying a transformation $\phi : \mathbb{R}^d \rightarrow \mathbb{R}^k$ on the
    input space, sample $\mathbf{x} = [x_1, \dots x_d]$ can be represented by $\phi(\mathbf{x})
    = [\phi_1(\mathbf{x}), \dots, \phi_k(\mathbf{x})]$ in the transformed space, where
    $\phi_i(\mathbf{x}) : \mathbb{R}^d \rightarrow \mathbb{R}$. The primal problem
    of soft margin SVM in the transformed space is as follows:


    ![](img/a1d5f013073c7da63184a763d887fe2f_40_0.png)


    Fig. 2.5 Mapping input data to a high-dimensional feature space to have a linear
    separator hyperplane in the transformed space'

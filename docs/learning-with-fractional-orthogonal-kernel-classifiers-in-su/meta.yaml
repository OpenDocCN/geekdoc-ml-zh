    error handling messages, cycle-detecting garbage collector, and support for Unicode.
    Python 3.0 was released on December 3, 2008 that is not completely backward-compatible.
    Python 2.7s end-of-life date was set in 2015 but postponed to 2020. The main reason
    for the postponement was concern that a large body of existing code could not
    easily be forward-ported to Python 3.



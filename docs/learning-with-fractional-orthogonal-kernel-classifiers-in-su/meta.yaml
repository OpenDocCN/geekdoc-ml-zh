    # 8.3.2.2 Example 2


    Consider the Fisher type of classical FHN equation with $v(t) = 0$, $\mu(t) =
    1$, $\eta(t) = -1$, $\rho = \frac{1}{2}$, initial condition $u(x, 0) = \frac{3}{4}
    + \frac{1}{4} \tanh(\frac{\sqrt{2}}{8}x)$, and domain over $(x, t) \in [0, 1]
    \times [0, 1]$. So, we have $A(x, t, u) = -\rho + (1 - \rho)u - u^2$, $B(x, t,
    u) = 0$ and $C(x, t, u) = -1$. This equation has the exact solution $u(x, t) =
    \frac{1+\rho}{2} + (\frac{1}{2} - \frac{\rho}{2}) \tanh(\sqrt{2}(1 - \rho)\frac{x}{4}
    + \frac{1-\rho^2}{4}t)$ (Kawahara and Tanaka 1983; Jiwari et al. 2014; Wazwaz
    and Gorguis 2004).



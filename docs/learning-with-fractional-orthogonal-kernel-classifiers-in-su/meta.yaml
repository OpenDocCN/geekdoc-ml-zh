  mdcn: '## 第12章

    使用正交核函数的分类：ORSVM包教程


    Amir Hosein Hadian Rasanan, Sherwin Nedaei Janbesaraei, Amirreza Azmoon, Mohammad
    Akhavan, and Jamal Amani Rad


    **摘要** 本书通篇讨论了经典和分数阶正交函数及其作为SVM算法核函数的性质。在第3、4、5和6章中，我们考虑了四种经典的正交多项式族（切比雪夫、勒让德、盖根鲍尔和雅可比），并介绍了这些多项式的分数形式作为核函数，展示了它们的性能。然而，使用这些核函数需要大量的实现工作。为了方便任何需要尝试和使用这些核函数的人，这里提供了一个Python包。在本章中，我们将介绍ORSVM包，这是一个具有正交核函数的SVM分类包。


    **关键词** Python · ORSVM · 正交核 · 分类


    ### 12.1 引言


    Python编程语言是开发者和研究人员中最受欢迎的编程语言之一。然而，Python受欢迎的原因有很多，其中很大一部分是因为存在数百个开源Python包，人们可以将它们包含在自己的主代码中，扩展代码的功能，而无需额外编码。这使得开发可重用代码成为可能。编程语言的这一特性通过使开发过程更简单、更快捷来促进开发。假设你已经为自己的定制SVM算法编写了一些包含相关函数的类。与其每次在需要访问它们时都重新编写相同的类和函数，不如将这些类和函数保存在一个单独的文件中，我们称之为*custom-svm.py*，然后你只需在代码中的某处添加一行代码*import
    custom-svm*，就可以访问自定义SVM算法的所有函数。这是一种被广泛接受的范式，特别是在Python编程语言中使用可重用代码。目前有多个用于SVM分类的Python包可用，例如*Scikit
    learn*包提供的*SVM*。尽管它易于使用，但缺乏核函数的多样性，更具体地说，缺乏正交核函数，当然也缺乏新颖的分数阶正交核函数。核函数在SVM中起着关键作用，毫无疑问，不存在一个适合所有现实世界问题的核函数，确切地说，一个核函数并不适合所有数据集，因为每个核函数在SVM中都会产生具有相同数据散射模式的更高维度。假设线性核函数$K(x,
    y) = x.y$，这种核函数的决策边界在二维空间中是一条直线，在三维空间中是一个平面。毫无疑问，一个平面无法对所有数据集进行分类。因此，人们一直在努力为每个数据集找到最合适的核函数，如果一个新的核函数能够提高分类任务的成功指标，它总是受欢迎的。为了方便任何人使用正交核函数及其分数形式，我们决定创建Python包**ORSVM**（包含多个模块）。在本章中，将介绍这个包。此外，还将通过示例讨论**ORSVM**的基础知识、如何安装以及如何使用。


    ### 12.1.1 ORSVM


    **ORSVM**是一个免费的开源Python包，提供了一个具有一些新颖正交核函数的SVM分类器。该库提供了使用SVM分类器的完整流程，从归一化到SVM方程的计算以及最终的评估。但是，请注意，在归一化之前有一些必要的步骤需要为每个数据集处理，例如重复检查、空值或异常值处理，甚至降维或任何可能适用于数据集的增强。这些步骤超出了SVM算法的范围，因此也超出了**ORSVM**包的范围。相反，归一化步骤是将数据点送入正交核函数之前必须完成的，这在ORSVM中通过调用相关函数直接处理。正如已经讨论过的，所有核函数的分数形式也可以在归一化过程中实现。**ORSVM**包包含多个类和函数。本章将介绍所有这些内容。


    **ORSVM**包严重依赖于*Numpy*和*cvxopt*包。*数组*、*矩阵*和*线性代数*函数在*numpy*中被反复使用，并且



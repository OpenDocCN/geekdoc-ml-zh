    \ - Min_i)}{Max_i - Min_i} - 1$\n\n其中 $x_i$ 是向量 $\\mathbf{x}$ 的第 i 个特征，$Max_i$\
    \ 和 $Min_i$ 分别是所有训练和测试数据在第 i 维上的最小值和最大值。\n\n### 4.3.2 其他勒让德核函数\n\n除了普通形式的勒让德核函数外，还定义了其他具有独特特性和特殊权函数的基于勒让德多项式的核，本节将介绍其中一些。\n\

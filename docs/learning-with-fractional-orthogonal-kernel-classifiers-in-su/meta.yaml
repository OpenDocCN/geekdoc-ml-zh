  md: '# Chapter 3

    Fractional Chebyshev Kernel Functions:

    Theory and Application


    ![](img/a1d5f013073c7da63184a763d887fe2f_50_0.png)


    Amir Hosein Hadian Rasanana, Sherwin Nedaei Janbesaraei,

    and Dumitru Baleanu


    **Abstract** Orthogonal functions have many useful properties and can be used
    for different purposes in machine learning. One of the main applications of the
    orthogonal functions is producing powerful kernel functions for the support vector
    machine algorithm. Maybe the simplest orthogonal function that can be used for
    producing kernel functions is the Chebyshev polynomials. In this chapter, after
    reviewing some essential properties of Chebyshev polynomials and fractional Chebyshev
    functions, various Chebyshev kernel functions are presented, and fractional Chebyshev
    kernel functions are introduced. Finally, the performance of the various Chebyshev
    kernel functions is illustrated on two sample datasets.


    **Keywords** Chebyshev polynomial · Fractional Chebyshev functions · Kernel trick
    · Orthogonal functions · Mercer’s theorem


    # 3.1 Introduction


    As mentioned in the previous chapters, the kernel function plays a crucial role
    in the performance of the SVM algorithms. In the literature of the SVM, various
    kernel functions have been developed and applied on several datasets (Hussain
    et al. 2011; Ozer et al. 2011; An-na et al. 2010; Padierna et al. 2018; Tian and
    Wang 2017), but each kernel function has its own benefits and limitations (Achirul
    Nanda et al. 2018; Hussain et al. 2011). The radial basis function (RBF) (Musavi
    et al. 1992; Scholkopf



    ## 6.2 预备知识


    本节涵盖Jacobi正交多项式的基本定义和性质。此外，介绍了Jacobi正交多项式的分数形式，并阐明了相关性质。


    ### 6.2.1 Jacobi多项式的性质


    让我们首先简单回顾一下正交多项式的定义。在Szego（1939）中，Szego使用一个函数（例如 $F(x)$）来定义正交多项式，该函数是非递减的，并且在区间
    $[a, b]$ 上包含许多增长点。假设该函数存在以下矩：


    $$c_n = \int_a^b x^n dF(x), \quad n = 0, 1, 2, \ldots \qquad (6.1)$$


    通过对 $x$ 的非负幂次集合（即 $1, x, x^2, x^3, \ldots, x^n, \ldots$）进行正交化，他得到了一组多项式，如下所示（Szego,
    1939; Asghari et al., 2022）：


    $$J_0(x), J_1(x), J_2(x), \ldots, J_n(x), \ldots \qquad (6.2)$$


    这组多项式可以由以下条件唯一确定（Szego, 1939）：


    - $J_n(x)$ 是一个恰好 $n$ 次的多项式，其中 $x^n$ 的系数为正。

    - $\{J_n(x)\}$ 是标准正交的，即，


    $$\int_a^b J_n(x) J_m(x) dF(x) = \delta_{nm}, \quad n, m = 0, 1, 2, \ldots \qquad
    (6.3)$$


    其中 $\delta_{nm}$ 是克罗内克δ函数。


    利用公式6.3可以定义Jacobi正交多项式。因此，记为 $J_n^{\psi, \omega}(x)$ 的Jacobi多项式在区间 $[-1, 1]$ 上关于权重函数
    $w^{\psi, \omega}(x)$ 正交（Hadian et al., 2020; Askey and Wilson, 1985; Kazem, 2013;
    Asghari et al., 2022）：


    $$w^{(\psi, \omega)}(x) = (1 - x)^\psi (1 + x)^\omega, \qquad (6.4)$$


    其中 $\psi, \omega > -1$。然而，公式6.4的权重函数形式在 $\psi, \omega < 0$ 的两个不同输入点处存在计算困难（Doman,
    2015）。输入数据必须归一化到区间 $[-1, 1]$。一般地，可以写成：


    在区间 $[a, b]$ 上，具有权重函数 $(b - x)^\psi (x - a)^\omega$ 的正交多项式，对于任何记为 $J_n^{\psi,
    \omega}(x)$ 的正交多项式，可以表示为以下形式（Doman, 2015; Bhrawy and Zaky, 2016）：


    $$J_n^{(\psi, \omega)} \left\{ 2 \left( \frac{x - a}{b - a} \right) - 1 \right\},
    \qquad (6.5)$$


    其中 $a = -1$ 且 $b = 1$。显然，可能输入的最小值和最大值分别为 $-1$ 和 $+1$。实际上，当 $\psi < 0$ 且 $x = +1$
    时，会导致项 $(1 - x)^\psi$ 等于零的负数次幂，从而得到无穷大。


    类似地，当 $\omega < 0$ 且 $x = -1$ 时，第二部分 $(1 + x)^\omega$ 也会发生这种情况。为了解决这个问题，建议通过加上一个松弛变量
    $\epsilon = 10^{-4}$ 来向 $x$ 添加一个微不足道的噪声（Tian and Wang, 2017）。


    因此，可以将关系式（6.4）重写如下：


    $$w^{(\psi,\omega)}(x) = (1 - x + \epsilon)^\psi (1 + x + \epsilon)^\omega. \tag{6.6}$$


    请注意，在像Python这样的编程语言中，必须处理 $1 - x$ 和 $1 + x$ 的浮点部分精度，并将其设置为等于松弛变量的精度，例如，下图比较了不同
    $\psi$、$\omega$ 和 $\epsilon = 0.0001$ 下的公式6.4和6.6。由于在边界处计算普通权重函数存在一些困难，我们使用了Maple软件进行绘图。图6.1展示了不同
    $\psi$ 和 $\omega$ 下没有噪声项的Jacobi多项式权重函数，而图6.2描绘了在项中添加噪声（$\epsilon = 0.0001$）后，不同
    $\psi$ 和 $\omega$ 下Jacobi多项式权重函数的图。如这些图所示，相关函数的输出没有显著差异。


    因此，正交关系为（Bhrawy et al., 2016; Doman, 2015; Askey, 1975）：


    $$\int_{-1}^{1} J_{m}^{\psi,\omega}(x) J_{n}^{\psi,\omega}(x) w^{(\psi,\omega)}(x)
    dx = 0, \quad m \neq n. \tag{6.7}$$


    Jacobi多项式可以定义为奇异Sturm-Liouville微分方程的特征函数，如下所示（Doman, 2015; Askey, 1975; Bhrawy
    and Zaky, 2016; Hadian et al., 2020）：


    $$\frac{d}{dx}\left((1-x+\epsilon)^{\psi+1}(1+x+\epsilon)^{\omega+1}\frac{d}{dx}J_{n}^{\psi,\omega}(x)\right)
    + (1-x+\epsilon)^{\psi}(1+x+\epsilon)^{\omega}\rho_{n}J_{n}^{\psi,\omega}(x) =
    0, \tag{6.8}$$


    其中 $\rho_{n} = n(n+\psi+\omega+1)$。


    考虑正交多项式所遵循的递推关系的一般形式，对于*Jacobi多项式*，存在以下关系（Doman, 2015; Askey, 1975; Bhrawy and
    Zaky, 2016; Hadian et al., 2020）：


    $$J_{n+1}^{\psi,\omega}(x) = (A_{n}x + B_{n})J_{n}^{\psi,\omega}(x) - C_{n}J_{n-1}^{\psi,\omega}(x),
    \quad n \geqslant 1, \tag{6.9}$$


    而


    $$J_{0}^{\psi,\omega}(x) = 1,$$

    $$J_{1}^{\psi,\omega}(x) = \frac{1}{2}(\psi+\omega+2)x + \frac{1}{2}(\psi-\omega),
    \tag{6.10}$$


    其中


    $$A_{n} = \frac{(2n+\psi+\omega+1)(2n+\psi+\omega+2)}{2(n+1)(n+\psi+\omega+1)},$$

    $$B_{n} = \frac{(\omega^{2}-\psi^{2})(2n+\psi+\omega+1)}{2(n+1)(n+\psi+\omega+1)(2n+\psi+\omega)},$$

    $$C_{n} = \frac{(n+\psi)(n+\omega)(2n+\psi+\omega+2)}{(n+1)(n+\psi+\omega+1)(2n+\psi+\omega)}.
    \tag{6.11}$$


    前几个*Jacobi多项式*与公式6.10相同。另一方面，由于Jacobi多项式构成冗长的项，此处忽略更高阶的表示。对于更高阶的*Jacobi多项式*，可以使用以下代码，该代码使用Python的*sympy*模块进行符号计算而非数值计算：


    ```python

    import sympy

    x = sympy.Symbol("x")

    a = sympy.Symbol("a")

    ```'

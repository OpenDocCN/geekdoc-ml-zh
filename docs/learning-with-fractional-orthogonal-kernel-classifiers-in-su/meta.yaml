    ## Part I


    ## Basics of Support Vector Machines


    ## Chapter 1


    ### Introduction to SVM


    Hadi Veisi


    **Abstract** In this chapter, a review of the machine learning (ML) and pattern
    recognition concepts is given, and basic ML techniques (supervised, unsupervised,
    and reinforcement learning) are described. Also, a brief history of ML development
    from the primary works before the 1950s (including Bayesian theory) up to the
    most recent approaches (including deep learning) is presented. Then, an introduction
    to the support vector machine (SVM) with a geometric interpretation is given,
    and its basic concepts and formulations are described. A history of SVM progress
    (from Vapnik’s primary works in the 1960s up to now) is also reviewed. Finally,
    various ML applications of SVM in several fields such as medical, text classification,
    and image classification are presented.


    **Keywords** Machine learning · Pattern recognition · Support vector machine ·
    History


    ### 1.1 What Is Machine Learning?


    Recognizing a person from his/her face, reading a handwritten letter, understanding
    a speech lecture, deciding to buy the stock of a company after analyzing the company’s
    profile, and driving a car in a busy street are some examples of using human intelligence.
    Artificial Intelligence (AI) refers to the simulation of human intelligence in
    machines, i.e., computers. Machine Learning (ML) as a subset of AI is the science
    of automatically learning computers from experiences to do intelligent and human-like
    tasks. Similar to other actions in computer science and engineering, ML is realized
    by computer algorithms that can learn from their environment (i.e., data) and
    can generalize this training to act intelligently in new environments. Nowadays,
    computers can recognize people from their face using face recognition algorithms,
    converting a handwritten letter to its editable form using handwritten recognition,
    understand a speech lecture using speech recognition and natural language understanding,
    buy a stock of a company using algorithmic trading methods, and can drive a car
    automatically in self-driving cars. The term machine learning was coined by Arthur
    Samuel in 1959, an American pioneer in the field of computer gaming and artificial
    intelligence that defines this term as “it gives computers the ability to learn
    without being explicitly programmed” Samuel (2000). In 1997, Tom Mitchell, an
    American computer scientist and a former Chair of the Machine Learning Department
    at the Carnegie Mellon University (CMU) gave a mathematical and relational definition
    that “A computer program is said to learn from experience E with respect to some
    task T and some performance measure P, if its performance on T, as measured by
    P, improves with experience E” Mitchell (1997). So, if you want your ML program
    to predict the growth of a stock (task T) to decide for buying it, you can run
    a machine learning algorithm with data about past price patterns of this stock
    (experience E, which is called training data) and, if it has successfully “learned”,
    it will then do better at predicting future price (performance measure P). The
    primary works in ML return to the 1950s and this field has received several improvements
    during the last 70 years. There is a short history of ML:


    - **Before the 1950s**: Several ML-related theories have been developed including
    Bayesian theory Bayes (1991), Markov chain Gagniuc (2017), regression, and estimation
    theories Fisher (1922). Also, Donald Hebb in 1949 Hebb (1949) presented his model
    of brain neuron interactions which is the basis of McCulloch-Pitts’s neural networks
    McCulloch and Pitts (1943).

    - **The 1950s**: In this decade, ML pioneers have proposed the primary ideas and
    algorithms for machine learning. The Turing test, originally called the imitation
    game, was proposed by Alan Turing as a test of a machine’s ability to exhibit
    intelligent behavior equivalent to, or indistinguishable from, that of a human.
    Arthur Samuel of IBM developed a computer program for playing checkers Samuel
    (1959). Frank Rosenblatt extended Hebb’s learning model of brain cell interaction
    with Arthur Samuel’s ideas and created the perceptron Rosenblatt (1958).

    - **The 1960s**: Bayesian methods are introduced for probabilistic inference Solomonoff
    (1964). The primary idea of Support Vector Machines (SVMs) is given by Vapnik
    and Lerner Vapnik (1963). Widrow and Hoff developed the delta learning rules for
    neural networks which was the precursor of the backpropagation algorithm Vapnik
    (1963). Sebestyen Sebestyen (1962) and Nilsson Nilsson (1965) proposed the nearest
    neighbor idea. Donald Michie used reinforcement learning to play Tic-tac-toe Michie
    (1963). The decision tree was introduced by Morgan and Sonquist Morgan and Sonquist
    (1963).

    - **The 1970s**: The quit years which is also known as AI Winter caused by pessimism
    about machine learning effectiveness due to the limitation of the ML methods in
    solving only linearly separable problems Minsky and Papert (1969).

    - **The 1980s**: The birth of brilliant ideas resulted in renewed enthusiasm.
    Backpropagation publicized by Rumelhart et al. (1986) causes a resurgence in machine
    learning. Hopfield popularizes his recurrent neural networks Hopfield (Hopfield).
    Watkins develops Q-learning in reinforcement learning Watkins (1989).'

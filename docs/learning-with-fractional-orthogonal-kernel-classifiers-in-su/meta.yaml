    $f(x) = x + 1$。该方程的精确解为 $u(x, t) = (x + 1) \exp(t)$ (Kazem et al. 2012a; Lakestani
    and Dehghan 2008)。在此示例中，我们有 $A(x, t, u) = 0$，$B(x, t, u) = (x + 1)$，以及 $C(x, t,
    u) = x^2 \exp(t)$。参数设置为 $n = 10$，$\Delta t = 0.0001$，以及 $\gamma = 10^{15}$。



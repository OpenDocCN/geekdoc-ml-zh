  md: 'There are some fruitful studies that explored the Fokker–Planck equation by
    classical numerical methods. For example, Vanaja (1992) presented an iterative
    algorithm for solving this model. In numerical methods, for example, (Zorzano
    et al. 1999), researchers employed the finite difference approach to the two-dimensional
    Fokker–Planck equation. In 2006, Dehghan and Tatari (2006) developed He’s variational
    iteration method (VIM) to approximate the solution of this equation. Moreover,
    Tatari et al. (2007) investigated the application of the Adomian decomposition
    method for solving different types of Fokker–Planck equations. One year later,
    Lakestani and Dehghan (2008) obtained the numerical solution of the Fokker–Planck
    equation using cubic B-spline scaling functions. In addition, Kazem et al. (2012a)
    proposed a meshfree approach to solve linear and nonlinear Fokker–Planck equations.
    Recently, a pseudo-spectral method was applied to approximate the solution of
    the Fokker–Planck equation with high accuracy (Parand et al. 2018).


    By simplifying Eq. 8.11, the Fokker–Planck equation takes the form of Eq. 8.2.
    It is worth mentioning that if our equation is linear, then $A(x, t, u) = 0$.
    In the following, we present a number of various linear and nonlinear examples.
    These examples are defined over $\Omega = [0, 1]$.


    It should be noted that the average CPU times for all examples of the Fokker–Planck
    equation and the Generalized FHN equation are about 2.48 and 2.5 s depending on
    the number of spatial nodes and the time steps. In addition, the order of time
    complexity for the proposed method is $O(Mn^3)$, in which $M$ is the number of
    time steps and $n$ is the number of spatial nodes.


    # 8.3.1.1 Example 1


    Consider Eq. 8.11 with $\psi_1(x) = -1$ and $\psi_2(x) = 1$, and initial condition
    $f(x) = x$. Using these fixed values, we can write $A(x, t, u) = 0$, $B(x, t,
    u) = 1$, and $C(x, t, u) = 1$. The exact solution of this test problem is $u(x,
    t) = x + t$ (Kazem et al. 2012a; Lakestani and Dehghan 2008).


    In this example, we consider $n = 15$, $\Delta t = 0.001$, $\gamma = 10^{15}$.
    Figure 8.1 shows the obtained result of function $u(x, t)$ by third-order Chebyshev
    kernel as an example. Also, the $L_2$ and RMS errors of different kernels at various
    times are represented in Tables 8.1 and 8.2. Note that in these tables, the number
    next to the polynomial name indicates its order. Moreover, the value of the decaying
    parameter for each kernel is specified in the tables.


    # 8.3.1.2 Example 2


    Consider the backward Kolmogorov equation (8.12) with $\psi_1(x) = -(x + 1)$,
    $\psi_2(x, t) = x^2 \exp(t)$, and initial condition $f(x) = x + 1$. This equation
    has the exact solution $u(x, t) = (x + 1) \exp(t)$ (Kazem et al. 2012a; Lakestani
    and Dehghan 2008). In this example, we have $A(x, t, u) = 0$, $B(x, t, u) = (x
    + 1)$, and $C(x, t, u) = x^2 \exp(t)$. The parameters are set as $n = 10$, $\Delta
    t = 0.0001$, and $\gamma = 10^{15}$.'

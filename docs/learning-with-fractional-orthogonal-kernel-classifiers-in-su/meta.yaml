    \ 等人，2018）。这是因为 Gegenbauer 多项式与任何其他正交多项式核一样，生成的核矩阵具有较低的显著特征值，这意味着需要更少的支持向量（Padierna\
    \ 等人，2018）。\n\n众所周知，多维 SVM 核函数可以定义如下：\n\n$$K(X, Z) = \\prod_{j=0}^{d} K_j(x_j,\

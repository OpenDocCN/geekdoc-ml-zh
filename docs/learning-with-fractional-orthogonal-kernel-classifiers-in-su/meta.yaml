    $$= \iint \sum_{l=0}^{n} GG_{l}^{\lambda}(x_{i})^{T} GG_{l}^{\lambda}(x_{j}) g(x_{i})
    g(x_{j}) dx_{i} dx_{j},$$

    $$= \sum_{l=0}^{n} \iint GG_{l}^{\lambda}(x_{i})^{T} GG_{l}^{\lambda}(x_{j}) g(x_{i})
    g(x_{j}) dx_{i} dx_{j},$$

    $$= \sum_{l=0}^{n} \left[ \int GG_{l}^{\lambda}(x_{i})^{T} g(x_{i}) dx_{i} \int
    GG_{l}^{\lambda}(x_{j}) g(x_{j}) dx_{j} \right],$$

    $$= \sum_{l=0}^{n} \left[ \int GG_{l}^{\lambda}(x_{i})^{T} g(x_{i}) dx_{i} \right]
    \left[ \int GG_{l}^{\lambda}(x_{j}) g(x_{j}) dx_{j} \right] \geq 0. \tag{5.40}$$


    Thus, $K_{2}(x_{i}, x_{j})$ is a valid Mercer kernel, and it can be concluded
    that the proposed GGK $K_{GG}(x_{i}, x_{j})$ is an admissible Mercer kernel function.
    $\square$


    # 5.3.4 Fractional Gegenbauer Kernel Function


    Similar to the latest kernel function introduced at Eq. 5.31 as the Gegenbauer
    kernel and the weight function introduced at Eq. 5.28 as the fractional weight
    function, the fractional Gegenbauer kernel has been introduced. First, the bivariate
    form of the fractional weight function has to be defined that its approach is
    again similar to the previous corresponding definition at Eq. 5.30, i.e.,


    $$f w^{\alpha, \lambda}(x, z) = \left( \left( 1 - \left( \frac{x-a}{b-a} \right)^{2\alpha}
    \right) \left( 1 - \left( \frac{z-a}{b-a} \right)^{2\alpha} \right) \right)^{\lambda
    - \frac{1}{2}} + \epsilon. \tag{5.41}$$


    Therefore, the fractional Gegenbauer kernel function is


    $$K_{FGeg}(X, Z) = \prod_{j=1}^{d} \sum_{i=0}^{n} G_{i}^{\lambda}(x''_{x_{j}})
    G_{j}^{\lambda}(x''_{z_{j}}) f w^{\alpha, \lambda}(x''_{x_{j}}, x''_{z_{j}}) u(G_{j}^{\lambda})^{2}.
    \tag{5.42}$$


    **Theorem 5.3** Gegenbauer kernel function introduced at Eq. 5.42 is a valid Mercer
    kernel.


    **Proof** According to the Mercer theorem, a valid kernel must satisfy sufficient
    conditions of Mercer''s theorem. As Mercer theorem states, any SVM kernel to be
    a valid kernel must be non-negative, in a precise way:


    $$\iint K(x, z) w(x, z) f(x) f(z) dx dz \geq 0. \tag{5.43}$$'
  - '[PAGE 120]


    By the fact that here the kernel is as Eq. 5.42, it can be seen with a simple
    replacement that


    $$\iint K_{FGeg}(x, z)g(x)g(z)dxdz =$$

    $$\iint \sum_{i=0}^{n} G_i^\lambda(x''_j)G_j^\lambda(x''_j) f w_\lambda(x''_j,
    x''_j) u(G_j^\lambda)^2 g(x)g(z)dxdz. \quad (5.44)$$


    In the last equation, the fractional bivariate weight function (i.e., Eq. 5.41)
    is considered, so we have


    $$\iint \sum_{i=0}^{n} G_i^\lambda(x''_j)G_j^\lambda(x''_j) \left[ \left( \left(
    1 - \left( \frac{x-a}{b-a} \right)^{2\alpha} \right) \left( 1 - \left( \frac{z-a}{b-a}
    \right)^{2\alpha} \right) \right)^{\lambda - \frac{1}{2}} + \epsilon \right] u(G_j^\lambda)^2
    g(x)g(z)dxdz. \quad (5.45)$$


    Note that $u(G_i^\lambda)$ is always positive and independent of the data, therefore:


    $$= \sum_{i=0}^{n} u(G_i^\lambda)^2 \iint \sum_{i=0}^{n} G_i^\lambda(x''_j)G_j^\lambda(x''_j)
    \left( \left( 1 - \left( \frac{x-a}{b-a} \right)^{2\alpha} \right) \left( 1 -
    \left( \frac{z-a}{b-a} \right)^{2\alpha} \right) \right)^{\lambda - \frac{1}{2}}
    g(x)g(z)dxdz$$

    $$+ \sum_{i=0}^{n} \epsilon u(G_i^\lambda)^2 \iint G_i^\lambda(x''_j)G_j^\lambda(x''_j)g(x)g(z)dxdz.
    \quad (5.46)$$


    # 5.4 Application of Gegenbauer Kernel Functions on Real Datasets



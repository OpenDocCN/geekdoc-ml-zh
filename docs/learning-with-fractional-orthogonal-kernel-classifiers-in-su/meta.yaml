  - '[PAGE 27]


    1 Introduction to SVM 15


    +   - **ML Applications in Medical**: SVM is widely applied in medical applications
    including medical image processing (i.e., a cancer diagnosis in mammography Azar
    and El-Said (2014)), bioinformatics (i.e., patients and gene classification) Byvatov
    and Schneider (2003), and health signal analysis (i.e., electrocardiogram signal
    classification for detection for identifying heart anomalies Melgani and Bazi
    (2008) and electroencephalogram signal processing in psychology and neuroscience
    Li et al. (2013)). SVM which is among the successful methods in this field is
    used in diagnosis and prognosis of various types of diseases. Also, SVM is utilized
    for identifying the classification of genes, patients based on genes, and other
    biological problems Pavlidis et al. (2001).


    +   - **Text Classification**: There are various applications for text classification
    including topic identification (i.e., categorization of a given document into
    predefined classes such as scientific, sport, or political); author identification/verification
    of a written document, spam, and fake news/email/comment detection; language identification
    (i.e., determining the language of a document); polarity detection (e.g., finding
    that a given comment in a social media or e-commerce website is positive or negative);
    and word sense disambiguation (i.e., determining the meaning of a disembogues
    word in a sentence such as “bank”). SVM is a competitive method for the other
    ML techniques in this area Joachims (1999), Aggarwal and Zhai (2012).


    +   - **Image Classification**: The process of assigning a label to an image is
    generally known as image recognition which can be used in various fields such
    as in biometrics (e.g., face detection/identification/verification), medical (e.g.,
    processing MRI and CT images for disease diagnosis), object recognition, remote
    sensing classification (e.g., categorization of satellite images), automated image
    organization for social networks and websites, visual searches, and image retrieval.
    Although deep learning techniques, specially CNNs are leading this area for the
    representation and feature extraction, SVM is utilized commonly as the classifier
    Miranda et al. (2016), Tuia et al. (2011), both with classical image processing-based
    techniques and deep neural network methods Li (2019). The image recognition services
    are now generally offered by the AI teams of technology companies such as Microsoft,
    IBM, Amazon, and Google.


    +   - **Steganography Detection**: Steganography is the practice of concealing
    a message in an appropriate multimedia carrier such as an image, an audio file,
    or a video file. This technique is used for secure communication in security-based
    organizations to concealing both the fact that a secret message is being sent
    and its contents. This method has the advantage over cryptography in which only
    the content of a message is protected. On the other hand, the act of detecting
    whether an image (or other files) is stego or not is called steganalysis. The
    analysis of an image to determining if it is a stego image or not is a binary
    classification problem in which SVM is widely used Li (2011).'

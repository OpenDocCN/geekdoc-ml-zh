    # Chapter 4

    Fractional Legendre Kernel Functions:

    Theory and Application


    Amirreza Azmoon, Snehashish Chakraverty, and Sunil Kumar


    **Abstract** The support vector machine algorithm has been able to show great
    flexibility in solving many machine learning problems due to the use of different
    functions as a kernel. Linear, radial basis functions, and polynomial functions
    are the most common functions used in this algorithm. Legendre polynomials are
    among the most widely used orthogonal polynomials that have achieved excellent
    results in the support vector machine algorithm. In this chapter, some basic features
    of Legendre and fractional Legendre functions are introduced and reviewed, and
    then the kernels of these functions are introduced and validated. Finally, the
    performance of these functions in solving two problems (two sample datasets) is
    measured.


    **Keywords** Legendre polynomial · Fractional legendre functions · Kernel trick
    · Orthogonal functions · Mercer’s theorem


    # 4.1 Introduction


    Another family of classic complete and orthogonal polynomials is the family of
    *Legendre Polynomials*, which was discovered by French mathematician *Adrien-Marie
    Legendre* (1752–1833) in 1782.


    A. Azmoon (✉)

    Department of Computer Science, The Institute for Advance Studies in Basic Sciences
    (IASBS), Zanjan, Iran

    e-mail: a.azmoon@iasbs.ac.ir


    S. Chakraverty

    Department of Mathematics, National Institute of Technology Rourkela, Sundargarh,
    OR, India


    S. Kumar

    Department of Mathematics, National Institute of Technology, Jamshedpur 831014,
    JH, India

    e-mail: skumar.math@nitjsr.ac.in


    © The Author(s), under exclusive license to Springer Nature Singapore Pte Ltd.
    2023

    J. A. Rad et al. (eds.), *Learning with Fractional Orthogonal Kernel Classifiers
    in Support Vector Machines*, Industrial and Applied Mathematics,

    https://doi.org/10.1007/978-981-19-6553-1_4'
  - '[PAGE 81]


    > **Adrien-Marie Legendre** (1752–1833) is a French mathematician who made numerous
    contributions to mathematics. Legendre got his education from Collège Mazarin
    of Paris and defended his thesis at the age of 18. In 1782, he won a prize from
    the Berlin Academy for an essay titled “Research on the Trajectories of Projectiles
    in a Resistant Medium”, which brought significant attention to this young mathematician.
    During his career, many papers have been published on elliptic functions, number
    theory, and the method of least squares. In a publication titled “Research on
    the Shape of Planets”, he introduced Legendre polynomials. In honor of Legendre,
    a crater on the moon is named after him.<sup>a</sup>


    <sup>a</sup> For more information about **A.M. Legendre** and his contribution,
    please see: [https://mathshistory.st-andrews.ac.uk/Biographies/Legendre/](https://mathshistory.st-andrews.ac.uk/Biographies/Legendre/).


    Like other functions in the family of orthogonal functions, Legendre polynomials
    are used in various fields of science and industry, such as topography filtering
    Haitjema (2021), solving differential equations in the crystallization process
    in chemistry Chang and Wang (1984), expansions of hypergeometric functions Holderman
    and Jonas (1970); Sánchez-Ruiz and Dehesa (1988), calculating scattering of charged
    particles in physics Spencer (1953), Kaghashvili et al. (2004), financial market
    prediction models Dash (2020), Dash and Dash (2017), and modeling epileptic seizure
    Moayeri et al. (2020). Other important and common applications of Legendre functions
    in the industry include the analysis of time-varying linear control systems HWANG
    et al. (1985); model reduction in control systems Chang and Wang (1983); estimation
    algorithms in PMU systems Qian et al. (2014) in the field of power; wave motion
    in propagation Gao et al. (2021), Dahmen et al. (2016), Zheng et al. (2019); and
    reflection Gao et al. (2019). These examples mentioned are some of the fields
    in which orthogonal functions, especially Legendre functions, have been extensively
    used both to improve the scientific level of projects and to improve industrial
    efficiency. One of the most common and attractive applications of Legendre functions
    is to solve differential equations with different orders with the help of Legendre
    wavelet functions Mohammadi and Hosseini (2011), Chang and Isah (2016) and shifted
    Legendre functions Chang and Wang (1983), Zeghdane (2021). In particular, Mall
    and Chakraverty (2016) designed neural networks using Legendre functions to solve
    ordinary differential equations. This method, based on a single-layer Legendre
    neural network model, has been developed to solve initial and boundary value problems.
    In the proposed approach, a Legendre-polynomial-based functional link artificial
    neural network is developed. In fact, the hidden layer is eliminated by expanding
    the input pattern using Legendre polynomials. On the other hand, due to the diversity
    of different kernels, support vector machine algorithms Pan et al. (2012) are
    one of the most frequent and varied machine learning methods. In a recent study
    on this subject Afifi and Zanaty (2019), the usage of orthogonal functions as
    kernels has expanded substantially, so that these functions are now utilized as
    fractional, wavelet, or shifting order kernels in addition to regular orthogonal
    functions Afifi and Zanaty (2019),'
- md: "## 4.1 Some applications for different kinds of Legendre polynomials\n\n| Legendre\
    \ polynomials | Applications |\n| :--- | :--- |\n| Legendre polynomials | Legendre\
    \ polynomials are used frequently in different fields of science. For example,\
    \ they are used as an orthogonal kernel in support vector machines Marianela and\
    \ Gómez (2014), or as basis functions for solving various differential equations\
    \ such as fractional equations Saadatmandi and Dehghan (2010), integral equations\
    \ Bhravy et al. (2016), optimal control problems Ezz-Eldien et al. (2017), and\
    \ so on Kazem et al. (2012). Moreover, it has been used in long short-term memory\
    \ neural networks Voelker et al. (2019). |\n| Fractional Legendre functions |\
    \ Based on fractional-order Legendre polynomials, Benouini et al. proposed a new\
    \ set of moments that can be used to extract pattern features Pan et al. (2012),\
    \ Benouini et al. (2019). These functions have many other applications, for instance,\
    \ solving fractional differential equations Kazem et al. (2013), Bhravy et al.\
    \ (2016). |\n| Rational Legendre functions | They are used to solve differential\
    \ equations in semi-infinite intervals Parand and Razzaghi (2004), Parand et al.\
    \ (2009, 2010). |\n\nMarianela and Gómez (2014), Benouini et al. (2019). In Table\
    \ 4.1, some applications of different kinds of Legendre polynomials are mentioned.\n\
    \nThe following is how this chapter is organized: Section 4.2 presents the fundamental\
    \ definitions and characteristics of orthogonal Legendre polynomials and fractional\
    \ Legendre functions. In Sect. 4.3, the ordinary Legendre kernel is provided,\
    \ and the innovative fractional Legendre kernel is introduced. In Sect. 4.4, the\
    \ results of experiments on both the ordinary Legendre kernel and the fractional\
    \ covered and give a comparison of the accuracy results of the mentioned kernels\
    \ used as a kernel in the SVM algorithm with the normal polynomial and Gaussian\
    \ kernels and ordinary Chebyshev and fractional Chebyshev on well-known datasets\
    \ to demonstrate the validity and efficiency of kernels. Finally, in Sect. 4.5,\
    \ the concluding remarks of this chapter are presented.\n\n## 4.2 Preliminaries\n\
    \nThis section presents the definition and basic properties of Legendre orthogonal\
    \ polynomials. Addition to the basics of these polynomials, the fractional form\
    \ of this family is discussed.\n\n### 4.2.1 Properties of Legendre Polynomials\n\
    \nLegendre polynomials of degree $n$, $P_n(x)$, are solutions to the following\
    \ Sturm-Liouville differential equation Shen (1994), Kazem et al. (2013), Hadian\
    \ Rasanana et al. (2020), Rad et al. (2014), Asghari et al. (2022):\n\n$$(1 -\
    \ x^2)\\frac{d^2y}{d^2x} - 2x\\frac{dy}{dx} + n(n+1)y = 0, \\quad (4.1)$$\n\n\
    where $n$ is a positive integer. This family is also orthogonal over the interval\
    \ $[-1, 1]$ with respect to the weight function $w(x) = 1$ Olver et al. (2010),\
    \ such that\n\n$$\\int_{-1}^{1} P_n(x)P_m(x) \\, dx = \\frac{2}{2n+1}\\delta_{nm},\
    \ \\quad (4.2)$$\n\nin which $\\delta_{nm}$ is the Kronecker delta and is defined\
    \ as follows:\n\n$$\\delta_{mn} = \\begin{cases} 1, & n = m, \\\\ 0, & \\text{Otherwise}.\
    \ \\end{cases} \\quad (4.3)$$\n\nBesides the Sturm-Liouville differential equation,\
    \ there is a generating function for these polynomials that can generate each\
    \ order of the Legendre polynomials. By setting $|t| < 1$ and $|x| \\le 1$, the\
    \ generating function of the Legendre polynomials is obtained as follows Shen\
    \ (1994), Kazem et al. (2013), Hadian Rasanana et al. (2020), Rad et al. (2014),\
    \ Asghari et al. (2022):\n\n$$\\frac{1}{\\sqrt{1 - 2tx + t^2}} = \\sum_{n=0}^{\\\
    infty} t^n P_n(x). \\quad (4.4)$$\n\nThus, the coefficient of $t^n$ is a polynomial\
    \ in $x$ of degree $n$, which shows the $n$-th Legendre polynomial. Expanding\
    \ this generating function up to $t^1$ yields\n\n$$P_0(x) = 1, \\quad P_1(x) =\
    \ x. \\quad (4.5)$$\n\nSimilar to the Chebyshev polynomials, the Legendre polynomials\
    \ can be obtained by utilizing a recursive formula which is given as follows Doman\
    \ (2015), Shen (1994), Kazem et al. (2013), Hadian Rasanana et al. (2020), Rad\
    \ et al. (2014), Asghari et al. (2022):\n\n$$P_0(x) = 1,$$\n$$P_1(x) = x,$$\n\
    $$(n+1)P_{n+1}(x) - (2n+1)xP_n(x) + nP_{n-1}(x) = 0, \\quad n \\ge 1. \\quad (4.6)$$\n\
    \nSo, the first few Legendre polynomials in explicit form are\n\n$P_0(x) = 1,$\n\
    $P_1(x) = x,$\n$P_2(x) = (3x^2 - 1)/2,$\n$P_3(x) = (5x^3 - 3x)/2,$\n$P_4(x) =\
    \ (35x^4 - 30x^2 + 3)/8,$\n$P_5(x) = (63x^5 - 70x^3 + 15x)/8,$\n$P_6(x) = (231x^6\
    \ - 315x^4 + 105x^2 - 5)/16, \\quad (4.7)$\n\nwhich are depicted in Fig. 4.1.\n\
    \nIn addition to the recursive relation in Eq. 4.6, using the generator function\
    \ Eq. 4.4, the Legendre polynomials are defined in the following two ways as recursive\
    \ relations:\n\n$n P_n(x) = x P'_n(x) - P'_{n-1}(x),$\n$P'_{n+1}(x) = x P'_n(x)\
    \ + (n + 1) P_n(x). \\quad (4.8)$\n\nAlso, the following recursive relations,\
    \ by combining the above relations and their derivatives with each other, create\
    \ other forms of recursive relations of Legendre polynomials Lamb Jr (2011):\n\
    \n$$(2n + 1)P_n(x) = P'_{n+1}(x) - P'_{n-1}(x),$$\n$$(1 - x^2)P'_n(x) = n[P_{n-1}(x)\
    \ - xP_n(x)]. \\quad (4.9)$$\n\nThe reader can use the following Python code to\
    \ generate any order of Legendre polynomials symbolically:\n\n```python\nimport\
    \ sympy\nx = sympy.Symbol(\"x\")\n\ndef Ln(x, n):\n    if n == 0:\n        return\
    \ 1\n    elif n == 1:\n        return x\n    elif n >= 2:\n        return ((2\
    \ * n - 1) * (x * Ln(x,n-1)) - (n-1)*Ln(x,n-2))/n\n\nsympy.expand(sympy.simplify(Ln(x,3)))\n\
    ```\n\n> $\\frac{5x^3}{2} - \\frac{3x}{2}$.\n\nSimilar to other classical orthogonal\
    \ polynomials, Legendre polynomials follow symmetry. Therefore, Legendre polynomials\
    \ of even order have even symmetry and contain only even powers of $x$ and similarly\
    \ odd orders of Legendre polynomials have odd symmetry and contain only odd powers\
    \ of $x$:\n\n$$P_n(x) = (-1)^n P_n(x) = \\begin{cases} P_n(-x), & n \\text{ is\
    \ even}, \\\\ -P_n(-x), & n \\text{ is odd}. \\end{cases} \\quad (4.10)$$\n\n\
    $$P'_n(x) = (-1)^n P'_n(x) = \\begin{cases} P'_n(-x), & n \\text{ is even}, \\\
    \\ -P'_n(-x), & n \\text{ is odd}. \\end{cases} \\quad (4.11)$$\n\nFor $P_n(x)$,\
    \ $n = 0, 1, ..., n$, there exist exactly $n$ zeros in $[-1, 1]$ that are real,\
    \ distinct from each other Hadian Rasanan et al. (2020). If they are regarded\
    \ as dividing the interval $[-1, 1]$ into $n + 1$ sub-intervals, each sub-interval\
    \ will contain exactly one zero of $P_{n+1}$ Hadian Rasanan et al. (2020). Also,\
    \ $P_n(x)$ has $n - 1$ local minimum and maximum in $(-1, 1)$ Hadian Rasanan et\
    \ al. (2020). On the other hand, these polynomials have the following basic properties:\n\
    \n$P_n(1) = 1,$\n\n$P_n(-1) = \\begin{cases} 1, & n = 2m \\\\ -1, & n = 2m + 1\
    \ \\end{cases},$\n\n$P_n(0) = \\begin{cases} \\frac{(-1)^m}{4^m} \\binom{2m}{m}\
    \ = \\frac{(-1)^m}{2^{2m}} \\frac{(2m)!}{(m!)^2}, & n = 2m \\\\ 0, & n = 2m +\
    \ 1 \\end{cases}.$\n\nAbove all, to shift the Legendre polynomials from $[-1,\
    \ 1]$ to $[a, b]$, we should use the following transformation:\n\n$x = \\frac{2t\
    \ - a - b}{b - a},$\n\nwhere $x \\in [-1, 1]$ and $t \\in [a, b]$. It is worth\
    \ mentioning that all the properties of the Legendre polynomials remain unchanged\
    \ for shifted Legendre polynomials with this difference that the position of $-1$\
    \ transfers to $a$ and the position of $1$ transfers to $b$.\n\n### 4.2.2 Properties\
    \ of Fractional Legendre Functions\n\nLegendre polynomials of fractional order\
    \ of $\\alpha$ (called $FP_n^\\alpha(x)$) over the finite interval $[a, b]$ by\
    \ use of mapping $x' = 2(\\frac{x-a}{b-a})^\\alpha - 1$, $(\\alpha > 0)$ that\
    \ $x' \\in [-1, 1]$, are defined as Kazem et al. (2013)\n\n$FP_n^\\alpha(x) =\
    \ P_n(x') = P_n(2(\\frac{x-a}{b-a})^\\alpha - 1).$\n\nAlso, the generating function\
    \ for fractional Legendre is defined in the same way as the generating function\
    \ for Legendre, with the difference that in this function $x$ is defined as $(x\
    \ = 2(\\frac{x-a}{b-a})^\\alpha - 1)$ in the interval $[a, b]$ Shen (1994), Kazem\
    \ et al. (2013), Hadian Rasan et al. (2020), Rad et al. (2014), Asghari et al.\
    \ (2022):\n\n$\\frac{1}{\\sqrt{1 - 2t(\\frac{x-a}{b-a})^\\alpha - 1 + t^2}} =\
    \ \\sum_{n=0}^{\\infty} FP_n^\\alpha(x)t^n = \\sum_{n=0}^{\\infty} P_n(2(\\frac{x-a}{b-a})^\\\
    alpha - 1)t^n.$\n\nOn the other hand, the fractional Legendre function with weight\
    \ function $w(x) = x^{\\alpha-1}$, like the Legendre polynomial, has the property\
    \ of orthogonality Hadian Rasan et al. (2020), this property, for example, over\
    \ the interval $[0, 1]$ is easily defined as follows:"
  mdcn: "## 4.1 不同类型勒让德多项式的一些应用\n\n| 勒让德多项式 | 应用 |\n| :--- | :--- |\n| 勒让德多项式 | 勒让德多项式在科学的不同领域中被频繁使用。例如，它们被用作支持向量机中的正交核\
    \ Marianela and Gómez (2014)，或作为求解各种微分方程的基函数，例如分数阶方程 Saadatmandi and Dehghan (2010)、积分方程\
    \ Bhravy et al. (2016)、最优控制问题 Ezz-Eldien et al. (2017) 等等 Kazem et al. (2012)。此外，它还被用于长短期记忆神经网络\
    \ Voelker et al. (2019)。 |\n| 分数阶勒让德函数 | 基于分数阶勒让德多项式，Benouini 等人提出了一组新的矩，可用于提取模式特征\
    \ Pan et al. (2012), Benouini et al. (2019)。这些函数还有许多其他应用，例如求解分数阶微分方程 Kazem et\

    \ = \\frac{\\pi 2^{1-2\\lambda}\\Gamma(n + 2\\lambda)}{n!(n + \\lambda)(\\Gamma(\\\
    lambda))^2}\\delta_{nm}, \\quad (5.3)$$\n\nwhere $\\delta_{nm}$ is the Kronecker\
    \ delta function (El-Kalaawy et al. 2018). The standard Gegenbauer polynomial\
    \ $G_n^{(\\lambda)}(x)$ can be defined also as follows (Parand et al. 2018; Hadian-Rasanan\
    \ et al. 2019):\n\n$$G_n^\\lambda(x) = \\sum_{n=1}^{\\lfloor \\frac{n}{2} \\rfloor}\
    \ (-1)^j \\frac{\\Gamma(n + \\lambda - j)}{j!(n - 2j)!\\Gamma(\\lambda)} (2x)^{n-2j},\
    \ \\quad (5.4)$$\n\nwhere $\\Gamma(.)$ is the Gamma function.\n\nAssuming $\\\
    lambda \\neq 0$ and $\\lambda \\in \\mathbb{R}$, the generating function for Gegenbauer\
    \ polynomial is given as (Cohl 2013; Doman 2015; Asghari et al. 2022)\n\n$$G_n^\\\
    lambda(x, z) = \\frac{1}{(1 - 2xz + z^2)^\\lambda}. \\quad (5.5)$$\n\nIt can be\
    \ shown that it is true for $|z| < 1$, $|x| \\leqslant 1$, $\\lambda > -\\frac{1}{2}$\
    \ (Cohl 2013; Doman 2015). Considering for fixed $x$ the function is *holomorphic*\
    \ in $|z| < 1$, it can be expanded in *Taylor* series (Reimer 2013):\n\n$$G_n^\\\
    lambda(x, z) = \\sum_{n=0}^{\\infty} G_n^\\lambda(x) z^n.$$\n\nGegenbauer polynomials\
    \ can be obtained by the following recursive formula (Olver et al. 2010; Yang\
    \ et al. 2020; Hadian-Rasanan et al. 2019):\n\n$$G_0^\\lambda(x) = 1, \\quad G_1^\\\
    lambda(x) = 2\\lambda x,$$\n$$G_n^\\lambda(x) = \\frac{1}{n}[2x(n + \\lambda -\
    \ 1)G_{n-1}^\\lambda(x) - (n + 2\\lambda - 2)G_{n-2}^\\lambda(x)].$$\n\nAlso,\
    \ other recursive relations for this orthogonal polynomial are as follows (Doman\
    \ 2015):\n\n$$(n + 2)G_{n+2}^\\lambda(x) = 2(\\lambda + n + 1)xG_{n+1}^\\lambda(x)\
    \ - (2\\lambda + n)G_n^\\lambda(x),$$\n$$nG_n^\\lambda(x) = 2\\lambda\\{xG_{n-1}^{\\\
    lambda+1}(x) - G_{n-2}^{\\lambda+1}(x)\\},$$\n$$(n + 2\\lambda)G_n^\\lambda(x)\
    \ = 2\\lambda\\{G_n^{\\lambda+1}(x) - xG_{n-1}^{\\lambda+1}(x)\\},$$\n$$nG_n^\\\
    lambda(x) = (n - 1 + 2\\lambda)xG_{n-1}^\\lambda(x) - 2\\lambda(1 - x^2)G_{n-2}^{\\\
    lambda-1}(x),$$\n$$\\frac{d}{dx}G_n^\\lambda = 2\\lambda G_{n+1}^{\\lambda-1}.$$\n\
    \nEveryone who has tried to generate Gegenbauer polynomials has experienced some\
    \ difficulties as the number of terms rises at each higher order, for example,\
    \ for the orders of zero to four, in the following:\n\n$$G_0^\\lambda(x) = 1,$$\n\
    $$G_1^\\lambda(x) = 2\\lambda x,$$\n$$G_2^\\lambda(x) = (2\\lambda^2 + 2\\lambda)x^2\
    \ - \\lambda,$$\n$$G_3^\\lambda(x) = \\left(\\frac{4}{3}\\lambda^3 + 4\\lambda^2\
    \ + \\frac{8}{3}\\lambda\\right)x^3 + (-2\\lambda^2 - 2\\lambda)x,$$\n$$G_4^\\\
    lambda(x) = \\left(\\frac{2}{3}\\lambda^4 + 4\\lambda^3 + \\frac{22}{3}\\lambda^2\
    \ + 4\\lambda\\right)x^4 + (-2\\lambda^3 - 6\\lambda^2 - 4\\lambda)x^2,$$\n\n\
    which are depicted in Figs. 5.1, 5.2, and there will be more terms in higher orders\
    \ subsequently. To overcome this difficulty *Pochhammer polynomials* have already\
    \ been used to simplify (Doman 2015). The *Pochhammer polynomials* or the *rising\
    \ factorial* is defined as\n\n$$x^{(n)} = x(x + 1)(x + 2) \\cdots (x + n - 1)\
    \ = \\prod_{k=1}^{n}(x + k - 1).$$\n\nConsequently, some of Pochhammer polynomials\
    \ are\n\n$$x^{(0)} = 1,$$\n$$x^{(1)} = x,$$\n$$x^{(2)} = x(x+1) = x^2 + x,$$\n\
    $$x^{(3)} = x(x+1)(x+2) = x^3 + 3x^2 + 2x,$$\n$$x^{(4)} = x(x+1)(x+2)(x+3) = x^4\
    \ + 6x^3 + 11x^2 + 6x,$$\n$$x^{(5)} = x^5 + 10x^4 + 35x^3 + 50x^2 + 24x,$$\n$$x^{(6)}\
    \ = x^6 + 15x^5 + 85x^4 + 225x^3 + 274x^2 + 120x. \\quad (5.15)$$\n\nBy means\
    \ of Pochhammer polynomials, first few orders of Gegenbauer polynomials of order\
    \ $\\lambda$ are\n\n$$G_0^{\\lambda}(x) = 1,$$\n$$G_1^{\\lambda}(x) = 2\\lambda\
    \ x,$$\n$$G_2^{\\lambda}(x) = a^{(2)}2x^2 - \\lambda,$$\n$$G_3^{\\lambda}(x) =\
    \ \\frac{a^{(3)}4x^3}{3} - 2a^{(2)}x,$$\n$$G_4^{\\lambda}(x) = \\frac{a^{(4)}2x^4}{3}\
    \ - a^{(3)}2x^2 + a^{(2)},$$\n$$G_5^{\\lambda}(x) = \\frac{a^{(5)}4x^5}{15} -\
    \ \\frac{a^{(4)}4x^3}{3} + a^{(3)}x,$$\n$$G_6^{\\lambda}(x) = \\frac{a^{(6)}4x^6}{45}\
    \ - \\frac{a^{(5)}2x^4}{3} + \\frac{a^{(4)}x^2}{2} - a^{(3)}. \\quad (5.16)$$\n\
    \nwhere $a^{(n)}$ are *Pochhammer* polynomials.\n\nHere for the sake of convenience,\
    \ a Python code has been introduced that can generate any order of Gegenbauer\
    \ polynomials of order $\\lambda$ symbolically, using sympy library:\n\n```python\n\
    import sympy\nx = sympy.Symbol(\"x\")\nlambd = sympy.Symbol(r'\\lambda')\n\ndef\
    \ Gn(x, n):\n    if n == 0:\n        return 1\n    elif n == 1:\n        return\
    \ 2*lambd*x\n    elif n >= 2:\n        return (sympy.Rational(1,n) * (2*x*(n+lambda-1)*Gn(x,n-1)\
    \ - (n+2*lambda-2)*Gn(x,n-2)))\n```\n\n**Program Code**\n\n```\nsympy.expand(sympy.simplify(Gn(x,2)))\n\
    > 2x^2\\lambda^2 + 2x^2\\lambda - \\lambda\n```\n\nFor $G_n^\\lambda(x), n = 0,\
    \ 1, \\dots, n, \\lambda > -\\frac{1}{2}$, which is orthogonal with respect to\
    \ weight function $(1-x^2)^{\\lambda-\\frac{1}{2}}$, there exist exactly $n$ zeros\
    \ in $[-1, 1]$ which are denoted by $x_{nk}(\\lambda), k = 1, \\dots, n$ and are\
    \ enumerated in decreasing order $1 > x_{n1}(\\lambda) > x_{n2} > \\dots > x_{nn}(\\\
    lambda) > -1$ (Reimer 2013). The zeros of $G_n^\\lambda(x)$ and $G_m^\\lambda(x),\
    \ m > n$ separate each other and between any two zeros of $G_n^\\lambda(x)$, there\
    \ is at least one zero (Olver et al. 2010).\n\nGegenbauer polynomials follow the\
    \ symmetry same as other classical orthogonal polynomials. Therefore, Gegenbauer\
    \ polynomials of even order have even symmetry and contain only even powers of\
    \ $x$ and similarly odd orders of Gegenbauer polynomials have odd symmetry and\
    \ contain only odd powers of $x$ (Olver et al. 2010).\n\n$$G_n^\\lambda(x) = (-1)^n\
    \ G_n^\\lambda(x) = \\begin{cases} G_n^\\lambda(-x), & n \\text{ even} \\\\ -G_n^\\\
    lambda(-x), & n \\text{ odd} \\end{cases}, \\quad (5.17)$$\n\nAlso, some special\
    \ values of $G_n^\\lambda(x)$ can be written as follows:\n\n$$G_n^\\lambda(1)\
    \ = \\frac{(2\\lambda)n}{n!}, \\quad (5.18)$$\n$$G_{2n}^\\lambda(0) = \\frac{(-1)^n(\\\
    lambda)n}{n!}, \\quad (5.19)$$\n$$G_{2n+1}^\\lambda(0) = \\frac{2(-1)^n(\\lambda)n+1}{n!}.\
    \ \\quad (5.20)$$\n\n### 5.2.2 Properties of Fractional Gegenbauer Polynomials\n\
    \nGegenbauer polynomial of the fractional order of $\\lambda$ over a finite interval\
    \ $[a, b]$ by use of mapping $x' = 2(\\frac{x-a}{b-a})^\\alpha - 1$, where $\\\
    alpha > 0$ and $x' \\in [-1, 1]$, is defined as (Parand and Delkhosh 2016) follows:\n\
    \n$$FG_n^{\\alpha,\\lambda}(x) = G_n^\\lambda(x') = G_n^\\lambda\\left(2\\left(\\\
    frac{x-a}{b-a}\\right)^\\alpha - 1\\right), \\quad (5.21)$$"
  mdcn: "## 5.1 不同类型盖根瓦尔多项式的若干应用\n\n| 盖根瓦尔多项式 | 应用 |\n| :--- | :--- |\n| 盖根瓦尔多项式 |\
    \ Srivastava 等人 (2019) 提出了一种基于盖根瓦尔小波展开以及分数阶积分和块脉冲函数运算矩阵的、可能有助于解决 Bagley–Torvik\

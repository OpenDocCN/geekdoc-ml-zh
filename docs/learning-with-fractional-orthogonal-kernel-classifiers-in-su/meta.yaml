    + w_0.$$


    # 2.4 LS-SVM Classifiers


    The least squares support vector machine (LS-SVM) is a modification of SVM formulation
    for machine learning tasks which was originally proposed by Suykens and Vandewalle
    (1999). The LS-SVM replaces the inequality constraints of SVM''s primal model
    with equality ones. Also, the slack variables loss function changes to the squared
    error loss function. Taking advantage of these changes, the dual problem leads
    to a system of linear equations. Solving this system of linear equations can be
    more computationally efficient than a quadratic programming problem in some cases.
    Although this reformulation preserves the kernel trick property, the sparseness
    of the model is lost. Here, the formulation of LS-SVM for two-class classification
    tasks will be described.


    Same as support vector machines, the LS-SVM considers the separating hyperplane
    in a feature space:


    $$y(\mathbf{x}) = \text{sign} \left[ \mathbf{w}^T \phi(\mathbf{x}) + w_0 \right].$$'

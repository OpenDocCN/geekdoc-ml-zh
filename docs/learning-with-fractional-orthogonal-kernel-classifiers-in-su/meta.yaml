  mdcn: '## 第4章

    分数阶勒让德核函数：

    理论与应用


    Amirreza Azmoon, Snehashish Chakraverty, and Sunil Kumar


    **摘要** 支持向量机算法由于使用了不同的函数作为核，在解决许多机器学习问题时展现出了极大的灵活性。线性函数、径向基函数和多项式函数是该算法中最常用的函数。勒让德多项式是应用最广泛的正交多项式之一，在支持向量机算法中取得了优异的效果。本章介绍并回顾了勒让德函数和分数阶勒让德函数的一些基本特性，然后引入并验证了这些函数的核。最后，评估了这些函数在解决两个问题（两个样本数据集）时的性能。


    **关键词** 勒让德多项式 · 分数阶勒让德函数 · 核技巧 · 正交函数 · 梅塞尔定理


    ### 4.1 引言


    另一类经典的完备正交多项式族是*勒让德多项式*族，由法国数学家*阿德里安-马里·勒让德*（1752–1833）于1782年发现。


    A. Azmoon (✉)

    伊朗赞詹，基础科学高级研究所计算机科学系

    e-mail: a.azmoon@iasbs.ac.ir


    S. Chakraverty

    印度奥里邦桑达尔加尔，国家技术学院鲁尔克拉分校数学系


    S. Kumar

    印度贾坎德邦贾姆谢德布尔 831014，国家技术学院数学系

    e-mail: skumar.math@nitjsr.ac.in


    © The Author(s), under exclusive license to Springer Nature Singapore Pte Ltd.
    2023

    J. A. Rad et al. (eds.), *Learning with Fractional Orthogonal Kernel Classifiers
    in Support Vector Machines*, Industrial and Applied Mathematics,

    https://doi.org/10.1007/978-981-19-6553-1_4


    > **阿德里安-马里·勒让德**（1752–1833）是一位法国数学家，对数学做出了众多贡献。勒让德在巴黎马扎然学院接受教育，并于18岁答辩了他的论文。1782年，他凭借题为“关于抛射体在阻力介质中轨迹的研究”的论文获得了柏林科学院的奖项，这引起了人们对这位年轻数学家的广泛关注。在他的职业生涯中，发表了大量关于椭圆函数、数论和最小二乘法的论文。在一篇题为“关于行星形状的研究”的出版物中，他引入了勒让德多项式。为纪念勒让德，月球上有一个陨石坑以他的名字命名。<sup>a</sup>


    <sup>a</sup> 关于**A.M. 勒让德**及其贡献的更多信息，请参见：[https://mathshistory.st-andrews.ac.uk/Biographies/Legendre/](https://mathshistory.st-andrews.ac.uk/Biographies/Legendre/)。


    与其他正交函数族中的函数一样，勒让德多项式被用于科学和工业的各个领域，例如地形滤波 Haitjema (2021)、解决化学结晶过程中的微分方程 Chang
    and Wang (1984)、超几何函数的展开 Holderman and Jonas (1970); Sánchez-Ruiz and Dehesa (1988)、计算物理中带电粒子的散射
    Spencer (1953), Kaghashvili et al. (2004)、金融市场预测模型 Dash (2020), Dash and Dash
    (2017) 以及癫痫发作建模 Moayeri et al. (2020)。勒让德函数在工业中其他重要且常见的应用包括：时变线性控制系统的分析 HWANG
    et al. (1985)；控制系统中的模型降阶 Chang and Wang (1983)；电力领域PMU系统中的估计算法 Qian et al. (2014)；传播中的波动
    Gao et al. (2021), Dahmen et al. (2016), Zheng et al. (2019)；以及反射 Gao et al. (2019)。这些例子是正交函数，特别是勒让德函数被广泛使用的领域，既用于提高项目的科学水平，也用于提高工业效率。勒让德函数最常见且最吸引人的应用之一是借助勒让德小波函数
    Mohammadi and Hosseini (2011), Chang and Isah (2016) 和移位勒让德函数 Chang and Wang (1983),
    Zeghdane (2021) 来求解不同阶的微分方程。特别是，Mall 和 Chakraverty (2016) 设计了使用勒让德函数的神经网络来求解常微分方程。这种基于单层勒让德神经网络模型的方法已被开发用于求解初值和边值问题。在所提出的方法中，开发了一种基于勒让德多项式的函数链接人工神经网络。事实上，通过使用勒让德多项式扩展输入模式，消除了隐藏层。另一方面，由于不同核的多样性，支持向量机算法

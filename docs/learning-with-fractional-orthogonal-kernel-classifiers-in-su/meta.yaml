    At the end of the code (Program 5) in line 37, the CPU reads the whole data from
    the `p_cheb_gpu` location with the command `memcpy_dtoh`, which means copying
    the memory from the device to the host. Therefore, each GPU execution brings a
    row containing 60 elements for the K matrix.


    # 11.6 More Optimizations


    In this section, we focus on Program 5. Although it breaks 3600 calls of the Chebyshev
    function into only 60 calls, it is not efficient yet. This is because the execution
    time on the CPU is less than on GPU. Therefore, for acceleration, it is worth
    considering these hints:


    +   1. The object SourceModule (line 15 of Program 5) is not a compiled source
    code. Hence, having this statement inside a for-loop is inefficient because of
    the extra time for compilation in each iteration. We may move lines 15 to 33 of
    Program 5 outside the for-loop before line 1.

    2. Having memory allocation in each iteration of a for-loop is time-consuming.
    Therefore, we should allocate the needed memory first, and then use it in every
    iteration.

    3. It is more efficient to increase the utilization of CUDA cores. This will be
    reached by hiring more threads in our implementation. This issue will increase
    parallelism and also reduces memory communications.


    After the optimizations, a 2.2X speedup is obtained on Tesla T4 GPU over the CPU
    in a Colab machine containing two VCPUs of intel Xeon processor working at 2.20
    GHz and with 13 GB memory. You may download the codes from the footnote link.²
    In the chosen SVM classification code with the first kind of Chebyshev kernel,
    there are two parts, fit function and predict function. Significantly, the speedup
    for the fit function is 58X over the CPU. The nested loops inside the fit function
    result in more array-based computations. Therefore, the nature of our algorithm
    directly affects the rate of acceleration.


    > ² https://github.com/sampp098/SVM-Kernel-GPU-acceleration-.'

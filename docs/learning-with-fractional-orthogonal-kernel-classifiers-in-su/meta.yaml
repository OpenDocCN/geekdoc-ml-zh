  - '[PAGE 257]


    ![](img/a1d5f013073c7da63184a763d887fe2f_257_0.png)


    Fig. 11.1 GPU Architecture (CUDA Cores, Shared Memory, Special Function Units,
    WARP Scheduler, and Register Files) Cheng et al. (2014)


    higher performance by maximizing the utilization of WARP and processor resources
    and the memory hierarchy resources.


    There are two main limitations to GPGPU computations. Indeed, to increase the
    number of cores and SMs and achieve their energy efficiency, GPU cores are designed
    very simply and with low clock rates. They only provide performance gains when
    a program is carefully parallelized into a large number of threads. Hence, trying
    to make a general code work on GPUs is a difficult task and often results in inefficient'
  - '[PAGE 258]


    ![](img/a1d5f013073c7da63184a763d887fe2f_258_0.png)


    Fig. 11.2 GPU kernel and thread hierarchy (blocks of threads and grid of blocks)
    Cheng et al. (2014)


    running. Instead, it is more efficient to execute only those pieces of programs
    suitable to GPU-style parallelism, such as linear algebra code, and leave the
    other sections of the program code for the CPU. Therefore, writing suitable programs
    that utilize the GPU cores is intricate even for the algorithms well-suited to
    be programmed in parallel. There has been a generation of libraries that provide
    GPU implementations of standard linear algebra kernels (BLAS), which help separate
    code into pieces sub-tasks used in these libraries and achieve higher performance
    Cheng et al. (2014). This described the first limitation. The second limitation
    of GPUs for GPGPU computation is that GPUs use a separate memory from the host
    memory. In other words, the GPU has a special memory and access hierarchy and
    uses a different address space from the host memory.


    The host (the CPU) and the GPU cannot share data easily. This limitation of communication
    between the host and GPU is especially problematic when both host and GPU are
    working on shared data simultaneously. In this case, the data must be returned,
    and the host must wait for the GPU and vice versa. The worse section of this scenario
    is transferring data between the host and the GPU as it is slow,'

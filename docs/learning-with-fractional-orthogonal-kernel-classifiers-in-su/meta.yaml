    # Lists


    Lists are one of all four collection data types. When we decide to save some data
    in one variable, a list container can be used. In Python lists, elements are written
    by square brackets and an item is accessible by referring to its index number.


    ```

    mylist = ["first", "second"]

    print(mylist)

    print(mylist[1])

    ```


    ```

    > [''first'', ''second'']

    > second

    ```


    As mentioned in the Strings section, a string is a list and all the negative indexing
    and range of indexes can be used for lists, and also remember that the first item
    in Python language has an index 0. By considering one side of colon devoid, the
    range will go on to the end of the beginning of the list.


    ```

    mylist = ["first", "second", "Third", "fourth", "fifth"]

    print(mylist[-1])

    print(mylist[1:3])

    print(mylist[2:])

    ```


    ```

    > fifth

    > [''second'', ''Third'']

    > [''Third'', ''fourth'', ''fifth'']

    ```


    To change an item value in a list, we can refer to its index number. Iterating
    through the list items is possible by for loop. To determine that an item is present
    in a list we can use *in* keyword and with *len()* function we can find how many
    items are in a list.'
- md: "## Dictionary\n\nDictionary is another useful data type collection whose main\
    \ difference with other collections is that the dictionary is unordered and unlike\
    \ sequences, which are indexed by a range of numbers, dictionaries are indexed\
    \ by keys. Type of the keys can be any immutable types as strings and numbers.\
    \ In addition, one can create an empty dictionary with a pair of braces. A dictionary\
    \ with its keys and values is defined as follows:\n\n```python\nmydict = {\n \
    \   \"Age\": 23,\n    \"Gender\": \"Male\",\n    \"Education\": \"Student\"\n\
    }\nprint(mydict)\n```\n\n```\n> {'Age': 23, 'Gender': 'Male', 'Education': 'Student'}\n\
    ```\n\nIn order to access the items of a dictionary, we can refer to its key name\
    \ inside square brackets or call the get() method. Moreover, the corresponding\
    \ value to a key can be changed by assigning a new value to it. The keys() and\
    \ values() methods can be used for getting all keys and values in the dictionary.\n\
    \n```python\nprint(mydict[\"Age\"])\nprint(mydict.get(\"Age\"))\nmydict[\"Age\"\
    ] = 24\nprint(mydict[\"Age\"])\nprint(mydict.keys())\nprint(mydict.values())\n\
    ```\n\n```\n> 23\n> 23\n> 24\n> dict_keys(['Age', 'Gender', 'Education'])\n> dict_values([23,\
    \ 'Male', 'Student'])\n```\n\nIterating through dictionaries is a crucial technique\
    \ to access the items in dictionary. The return value of the loop can be keys\
    \ of the dictionary or by the key and corresponding value using the items().\n\
    \n```python\nfor x in mydict:\n    print(x) # printing Keys\nfor x in mydict:\n\
    \    print(mydict[x]) # printing Values\nfor x, y in mydict.items():\n    print(x,\
    \ y) # printing Keys and Values\n```\n\n```\n> Age\n> Gender\n> Education\n> 23\n\
    > Male\n> Student\n> Age 23\n> Gender Male\n> Education Student\n```\n\nChecking\
    \ the existence of a key in a dictionary can be done by the *in* keyword same\
    \ as lists. Moreover, to determine how many items are in a dictionary we can use\
    \ the *len()* method. Adding an item to a dictionary can be easily done by using\
    \ the value and its key.\n\n```python\nif \"Name\" in mydict:\n    print(\"No,\
    \ there is no Name in mydict.\")\nprint(len(mydict))\nmydict[\"weight\"] = 72\n\
    print(mydict)\n```\n\n```\n> No, there is no Name in mydict.\n> 3\n> {'Age': 23,\
    \ 'Gender': 'Male', 'Education': 'Student', 'weight': 72}\n```\n\n## If ... Else\n\
    \nLogical conditions from mathematics can be used in “if statements” and loops.\
    \ An “if statement” is written by using the *if* keyword. The scope of “if statement”\
    \ is defined with white-space while other programming languages use curly brackets.\
    \ Also, we can use an if statement inside another if statement called nested if/else\
    \ by observing the indentation.\n\n- Equals: $a == b$.\n- Not Equals: $a != b$.\n\
    - Less than: $a < b$.\n- Less than or equal to: $a <= b$.\n- Greater than: $a\
    \ > b$.\n- Greater than or equal to: $a >= b$.\n\n```python\nx = 10\ny = 15\n\
    if y > x:\n    print(\"y is greater than x\")\n```\n\n```\n> y is greater than\
    \ x\n```\n\nelif is a Python keyword that can be used for “if the previous conditions\
    \ were not true, then try this condition”. And the else keyword used for catches\
    \ anything that couldn’t be caught by previous conditions.\n\n```python\nx = 10\n\
    y = 9\nif x > y:\n    print(\"x is greater than y\")\nelif x == y:\n    print(\"\
    x and y are equal\")\nelse:\n    print(\"y is greater than x\")\n```\n\n```\n\
    > y is greater than x\n```\n\nThere are some logical keywords that can be used\
    \ for combining conditional statements like *and*, *or*.\n\n```python\na = 10\n\
    b = 5\nc = 20\nif a > b and c > a:\n    print(\"Both conditions are True\")\n\
    if a > b or a > c:\n    print(\"At least one of the conditions is True\")\n```\n\
    \n```\n> Both conditions are True\n> At least one of the conditions is True\n\
    ```\n\nYou can have an *if* statement inside another *if* statement.\n\n```python\n\
    a = 10\nb = 5\nc = 20\nif a > b:\n    if a > c:\n        print(\"a is greater\
    \ than both b and c.\")\n```\n\n```\n> a is greater than both b and c.\n```\n\n\
    ## While Loops\n\n*While* loop is one of two types of iterations in Python that\
    \ can execute specific statements as long as a condition is true.\n\n```python\n\
    i = 1\nwhile i < 3:\n    print(i)\n    i += 1\n```\n\n```\n> 1\n> 2\n```\n\nJust\
    \ like *if* statement, we can use *else* code block for when the while loop condition\
    \ is no longer true.\n\n```python\ni = 1\nwhile i < 3:\n    print(i)\n    i +=\
    \ 1\nelse:\n    print(\"i is greater or equal to 3.\")\n```\n\n```\n> 1\n> 2\n\
    > i is greater or equal to 3.\n```\n\n## For Loops\n\nThe *for* statement in Python\
    \ differs from what can be used in other programming languages like C and Java.\
    \ Unlike other programming languages that the *for* statement always iterates\
    \ over an arithmetic progression of numbers or lets the user define both the iteration\
    \ step and halting condition, in Python, we can iterate over the items of any\
    \ sequence (like string).\n\n```python\nnums = [\"One\", \"Two\", \"Three\"]\n\
    for n in nums:\n    print(n)\nfor x in \"One.\":\n    print(x)\n```\n\n```\n>\
    \ One\n> Two\n> Three\n> O\n> n\n> e\n> .\n```\n\nThere are some statements and\
    \ a function that can be very useful in *for* statement which will be discussed\
    \ in the next section.\n\n## Range, Break, and Continue\n\nIf it is needed to\
    \ iterate over a sequence of numbers, there is a built-in function *range()* which\
    \ generates the arithmetic progression of numbers. Consider the *range()* which\
    \ starts from 0 and ends at a specified number, except 1. To iterate over the\
    \ indices of a list or any sequence, we can use the combination of the *range()*\
    \ and *len()* functions that are applicable. The *range()* function by default\
    \ moves in the sequence by one step, so we can specify the increment value by\
    \ adding a third parameter to the function.\n\n```python\nfor x in range(3):\n\
    \    print(x)\n```\n\n```\n> 0\n> 1\n> 2\n```\n\n```python\nfor x in range(2,\
    \ 4):\n    print(x)\n```\n\n```\n> 2\n> 3\n```\n\n```python\nnums = [\"One\",\
    \ \"Two\", \"Three\"]\nfor i in range(len(nums)):\n    print(i, nums[i])\n```\n\
    \n```\n> 0 One\n> 1 Two\n> 2 Three\n```\n\n```python\nfor x in range(2, 10, 3):\n\
    \    print(x)\n```\n\n```\n> 2\n> 5\n> 8\n```\n\nSame as *while* loop, *else*\
    \ statement can be used after *for* loop. In Python, *break* and *continue* are\
    \ used like other programming languages to terminate the loop or skip the current\
    \ iteration, respectively.\n\n```python\nfor x in range(10):\n    print(x)\n \
    \   if x > 2:\n        break\n```\n\n```\n> 0\n> 1\n> 2\n```\n\n```python\nfor\
    \ x in range(3):\n    if x == 1:\n        continue\n    print(x)\n```\n\n```\n\
    > 0\n> 2\n```\n\n## Try, Except\n\nLike any programming language, Python has its\
    \ own error handling statements named *try* and *except* to test a block of code\
    \ for errors and handle the error, respectively.\n\n```python\ntry:\n    print(x)\n\
    except:\n    print(\"x is not defined!\")\n```\n\n```\n> x is not defined!\n```\n\
    \nA developer should handle the error completely in order that the user can see\
    \ where the error is accrued. For this purpose, we should use a *raise Exception*\
    \ statement to raise the error.\n\n```python\ntry:\n    print(x)\nexcept:\n  \
    \  raise Exception(\"x is not defined!\")\n```\n\n```\n> Traceback (most recent\
    \ call last):\n  File \"<stdin>\", line 4, in <module>\nException: x is not defined!\n\
    ```"

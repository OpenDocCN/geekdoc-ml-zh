    endpoints at ±1 points (Mason and Handscomb 2002). So, for $k = 1, 2, \ldots,
    n$, roots of $T_n(x)$ are obtained as follows:


    $$x_k = \cos \left( \frac{(2k - 1)\pi}{2n} \right). \tag{3.20}$$


    Note that $x = 0$ is a root of $T_n(x)$ for all odd orders $n$, other roots are
    symmetrically placed on either side of $x = 0$. For $k = 0, 1, \ldots, n$ extremums
    of Chebyshev polynomial of first kind can be found using


    $$x = \cos \left( \frac{\pi k}{n} \right). \tag{3.21}$$


    Chebyshev polynomials are even and odd symmetrical, meaning even orders only have
    the even powers of $x$ and odd orders only the odd powers of $x$. Therefore we
    have


    $$T_n(x) = (-1)^n T_n(-x) = \begin{cases} T_n(-x), & n \text{ even} \ -T_n(-x),
    & n \text{ odd} \end{cases}. \tag{3.22}$$


    Additionally, there exist some other properties of the Chebyshev polynomials at
    the boundaries:


    +   - $T_n(1) = 1$,

    - $T_n(-1) = (-1)^n$,

    - $T_{2n}(0) = (-1)^n$,

    - $T_{2n+1}(0) = 0$.


    Figure 3.2 demonstrates Chebyshev polynomials of the first kind up to sixth order.'

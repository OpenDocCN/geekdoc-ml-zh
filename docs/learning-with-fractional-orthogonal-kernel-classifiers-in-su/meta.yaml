    $$y(0) = 1, \quad y''(0) = 0.$$

    (7.28)


    The exact solution is $y(x) = e^{x^2}$. This type of equation has been solved
    with linearization, VIM, and HPM methods (see, e.g., Ramos (2005), Yıldırım and
    Özış (2009), Chowdhury and Hashim (2007)).


    By using the proposed method, the numerical results of this test case in [0, 1]

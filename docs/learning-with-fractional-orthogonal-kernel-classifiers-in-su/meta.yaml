    After the transformation of the dataset and taking the data points to a higher
    dimension, it is time to determine the decision boundaries of the classifier.⁴
    The decision boundary is highly dependent on the kernel function. In the case
    of orthogonal polynomials, the order of these functions has a critical role. For
    example, the Chebyshev kernel function with order 3 outcomes a different decision
    boundary in comparison to the same kernel function with the order of 6. There
    is no general rule to know which order outcomes the most suitable decision boundary.
    Hence, trying different decision boundaries gives a useful metric to compare and
    find the best order or even the kernel function itself.



  md: 'of oscillators, cosmology, study of the solar system, the study of unsteady
    gases, fluid dynamics, and many other applications (see, e.g., Liu et al. 2018;
    Rodrigues et al. 2018; Anderson et al. 2016; Khoury et al. 2018; Farzaneh-Gord
    and Rahbari 2016; Lusch et al. 2018; Bristeau et al. 1979; Parand et al. 2011;
    Parand and Rad 2012; Kazem et al. 2011; Parand et al. 2016; Kazem et al. 2012;
    Parand et al. 2012, 2017; Abbasbandy et al. 2013). In the meantime, Lane-Emden
    type equations are an important class of ordinary differential equations on the
    semi-infinite domain which was introduced by Jonathan Homer Lane and by Emden
    as a model for the temperature of the sun Lane (1870); Emden (1907). These equations
    have found many interesting applications in modeling many physical phenomena such
    as the theory of stellar structure, thermal behavior of a spherical cloud of gas,
    isothermal gas spheres, and the theory of thermionic currents Chandrasekhar and
    Chandrasekhar (1957), Wood (1921). As one of the important applications, it can
    be said that in astrophysics, this equation describes the equilibrium density
    distribution in the self-gravitating sphere of polytropic isothermal gas.


    The general form of the Lane-Emden equation is as follows Hadian Rasanana et al.
    (2020), Parand et al. (2010), Omidi et al. (2021):


    ```

    $$y''''(x) + \frac{k}{x}y''(x) + f(x, y(x)) = h(x),$$

    $$y(x_0) = A, \quad y''(x_0) = B,$$

    ```


    where $A$, $B$ are constants and $f(x, y)$ and $h(x)$ are given functions of $x$
    and $y$.


    Some of these equations do not have an exact solution, and as a result of their
    singularity at $x = 0$, their numerical solutions are a challenge for scientists
    Parand et al. (2009, 2010). Many semi-analytical and numerical approaches have
    been applied to solve the Lane-Emden equations, which can be presented as follows:
    In Bender et al. (1989), a new perturbation technique based on an artificial parameter
    $\delta$ proposed to solve the Lane-Emden equation. Also, a non-perturbative analytical
    solution of this equation was derived in Shawagfeh (1993) by the Adomian decomposition
    method (ADM). On the other hand, Mandelzweig et al. (2001) used the quasi-linearization
    method for solving the standard Lane-Emden equation, and Liao (2003) produced
    an analytical framework based on the Adomian decomposition method for Lane-Emden
    type equations. The approach based on semi-analytical methods continued as He
    (2003) obtained the analytical solutions to the problem by using Ritz''s variational
    method. Also, in Wazwaz (2006), the modified decomposition method for the analytic
    behavior of nonlinear differential equations was used, and Yildirim et al. (2007)
    obtained approximate solutions of a class of Lane-Emden equations by homotopy
    perturbation method (HPM). Following this approach, Ramos (2005) solved Lane-Emden
    equations by using a linearization method and a series solution has been suggested
    in Ramos (2008). Those solutions were obtained by writing this equation as a Volterra
    integral equation and assuming that the nonlinearities are smooth. Then, Dehghan
    (2006; 2008) proposed the Adomian decomposition method for differential equations
    with an alternate procedure to overcome the difficulty of singularity. Also, Aslanov
    (2008) introduced an improved Adomian decomposition method for'

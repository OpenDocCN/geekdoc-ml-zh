    # 4.3.1 Ordinary Legendre Kernel Function


    Legendre polynomials, like other polynomials, are orthogonal except that Legendre
    polynomial weight function is a constant function of value 1 (w(x) = 1). So according
    to Eqs. 4.2 and 4.3 for different m and n, Legendre polynomials are orthogonal
    to each other with weight function 1. This enables us to construct the Legendre
    kernel without denominators. Therefore, for scalar inputs x and z, Legendre kernel
    is defined as follows:'

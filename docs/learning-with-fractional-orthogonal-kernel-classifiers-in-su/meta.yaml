    \n> 第一个参数是 name，第二个是 family\n\n在函数中定义的参数应在调用函数时传递给函数。默认参数值用于避免调用函数时出错。因此，即使用户没有向函数传递值，代码也能通过默认值正常工作。\n\
    \n```python\ndef func(arg=\"Bob\"):\n    print(\"My name is\", arg)\n\nfunc(\"\
    john\")\nfunc()\n```\n\n> 我的名字是 john\n> 我的名字是 Bob\n\n要从函数返回一个值，我们可以使用 `return`\
    \ 语句。\n\n```python\ndef func(x):\n    return 5 * x\n\nprint(func(3))\n```\n\n\

    # Table 1.1 A brief history of SVM development


    | Decade | Year | Researcher(s) | SVM development |

    |---|---|---|---|

    | 1950 | 1950 | Aronszajn (1950) | Introducing the “Theory of Reproducing Kernels”
    |

    | 1960 | 1963 | Vapnik and Lerner (1963) | Introducing the Generalized Portrait
    algorithm (the algorithm implemented by support vector machines is a nonlinear
    generalization of the Generalized Portrait algorithm) |

    | | 1964 | Vapnik (1964) | Developing the Generalized Portrait algorithm |

    | | 1964 | Aizerman et al. (1964) | Introducing the geometrical interpretation
    of the kernels as inner products in a feature space |

    | | 1965 | Cover (1965) | Discussing large margin hyperplanes in the input space
    and also sparseness |

    | | 1965 | Mangasarian (1965) | Studding optimization techniques for pattern recognition
    similar to large margin hyperplanes |

    | | 1968 | Smith (1968) | Introducing the use of slack variables to overcome the
    problem of noise and non-separability |

    | 1970 | 1973 | Duda and Hart (1973) | Discussing large margin hyperplanes in
    the input space |

    | | 1974 | Vapnik and Chervonenkis (1974) | Writing a book on “statistical learning
    theory” (in Russian) which can be viewed as the starting of SVMs |

    | | 1975 | Poggio (1975) | Proposing the use of polynomial kernel in SVM |

    | | 1979 | Vapnik and Chervonenkis (1979) | Translating of Vapnik and Chervonenkis’s
    1974 book to German |

    | 1980 | 1982 | Vapnik (1982) | Writing an English translation of his 1979 book
    |

    | 1990 | 1990 | Poggio and Girosi (1990) | Studying the connection between neural
    networks and kernel regression |

    | | 1990 | Wahba (1990) | Improving the kernel method for regressing |

    | | 1992 | Bennett and Mangasarian (1992) | Improving Smith’s 1968 work on slack
    variables |

    | | 1992 | Boser et al. (1992) | Presenting SVM in today’s form at the COLT 1992
    conference |

    | | 1995 | Cortes and Vapnik (1995) | Introducing the soft-margin classifier |

    | | 1996 | Drucker et al. (1996) | Extending the algorithm to the case of regression,
    called SVR |

    | | 1997 | Muller et al. (1997) | Extending SVM for time-series prediction |

    | | 1998 | Bartlett (1998) | Providing the statistical bounds on the generalization
    of hard margin |

    | 2000 | 2000 | Shawe-Taylor and Cristianini (2000) | Giving the statistical bounds
    on the generalization of soft margin and the regression case |

    | | 2001 | Ben-Hur et al. (2001) | Extending SVM to the unsupervised case |

    | | 2005 | Duan and Keerthi (2005) | Extending SVM from the binary classification
    into multiclass SVM |

    | 2010 | 2011 | Polson and Scott (2011) | Studding graphical model representation
    of SVM and its Bayesian interpretation |

    | | 2017 | Wenzel et al. (2017) | Developing a scalable version of Bayesian SVM
    for big data applications |'
  - '[PAGE 26]


    studied and it has been extended in other domains than the classification. The
    statistical bounds on the generalization of hard margin were given by Bartlett
    (1998) and it was presented for soft margin and the regression case in 2000 by
    Shawe-Taylor and Cristianini (2000). The SVM was originally developed for supervised
    learning which has been extended to the unsupervised case in Ben-Hur et al. (2001)
    called support vector clustering. Another improvement of SVM was its extension
    from the binary classification into multiclass SVM by Duan and Keerthi in Duan
    and Keerthi (2005) by distinguishing between one of the labels and the rest (one-versus-all)
    or between every pair of classes (one-versus-one). In 2011, SVM was analyzed as
    a graphical model and it was shown that it admits a Bayesian interpretation using
    data augmentation technique Polson and Scott (2011). Accordingly, a scalable version
    of the Bayesian SVM was developed in Wenzel et al. (2017) enabling the application
    of Bayesian SVMs in big data applications. A summary of the related researches
    to SVM development is given in Table 1.1.


    # 1.5 SVM Applications


    Today, machine learning algorithms are on the rise and are widely used in real
    applications. Every year new techniques are proposed that overcome the current
    leading algorithms. Some of them are only little advances or combinations of existing
    algorithms and others are newly created and lead to astonishing progress. Although
    deep learning techniques are dominant in many real applications such as image
    processing (e.g., for image classification) and sequential data modeling (e.g.,
    in natural language processing tasks such as machine translation), these techniques
    require a huge amount of training data for success modeling. Large-scale labeled
    datasets are not available in many applications in which other ML techniques (called
    classical ML methods) such as SVM, decision tree, and Bayesian family methods
    have higher performance than deep learning techniques. Furthermore, there is another
    fact in ML. Each task in ML applications can be solved using various methods;
    however, there is no single algorithm that will work well for all tasks. This
    fact is known as the No Free Lunch Theorem in ML Wolpert (1996). Each task that
    we want to solve has its idiosyncrasies and there are various ML algorithms to
    suit the problem. Among the non-deep learning methods, SVM, as a well-known machine
    learning technique, is widely used in various classification and regression tasks
    today due to its high performance and reliability across a wide variety of problem
    domains and datasets Cervantes et al. (2020). Generally, SVM can be applied to
    any ML task in any application such as computer vision and image processing, natural
    language processing (NLP), medical applications, biometrics, and cognitive science.
    In the following, some common applications of SVM are reviewed.'
- md: '## 1 Introduction to SVM


    - **ML Applications in Medical**: SVM is widely applied in medical applications
    including medical image processing (i.e., a cancer diagnosis in mammography Azar
    and El-Said (2014)), bioinformatics (i.e., patients and gene classification) Byvatov
    and Schneider (2003), and health signal analysis (i.e., electrocardiogram signal
    classification for detection for identifying heart anomalies Melgani and Bazi
    (2008) and electroencephalogram signal processing in psychology and neuroscience
    Li et al. (2013)). SVM which is among the successful methods in this field is
    used in diagnosis and prognosis of various types of diseases. Also, SVM is utilized
    for identifying the classification of genes, patients based on genes, and other
    biological problems Pavlidis et al. (2001).


    - **Text Classification**: There are various applications for text classification
    including topic identification (i.e., categorization of a given document into
    predefined classes such as scientific, sport, or political); author identification/verification
    of a written document, spam, and fake news/email/comment detection; language identification
    (i.e., determining the language of a document); polarity detection (e.g., finding
    that a given comment in a social media or e-commerce website is positive or negative);
    and word sense disambiguation (i.e., determining the meaning of a disembogues
    word in a sentence such as “bank”). SVM is a competitive method for the other
    ML techniques in this area Joachims (1999), Aggarwal and Zhai (2012).


    - **Image Classification**: The process of assigning a label to an image is generally
    known as image recognition which can be used in various fields such as in biometrics
    (e.g., face detection/identification/verification), medical (e.g., processing
    MRI and CT images for disease diagnosis), object recognition, remote sensing classification
    (e.g., categorization of satellite images), automated image organization for social
    networks and websites, visual searches, and image retrieval. Although deep learning
    techniques, specially CNNs are leading this area for the representation and feature
    extraction, SVM is utilized commonly as the classifier Miranda et al. (2016),
    Tuia et al. (2011), both with classical image processing-based techniques and
    deep neural network methods Li (2019). The image recognition services are now
    generally offered by the AI teams of technology companies such as Microsoft, IBM,
    Amazon, and Google.


    - **Steganography Detection**: Steganography is the practice of concealing a message
    in an appropriate multimedia carrier such as an image, an audio file, or a video
    file. This technique is used for secure communication in security-based organizations
    to concealing both the fact that a secret message is being sent and its contents.
    This method has the advantage over cryptography in which only the content of a
    message is protected. On the other hand, the act of detecting whether an image
    (or other files) is stego or not is called steganalysis. The analysis of an image
    to determining if it is a stego image or not is a binary classification problem
    in which SVM is widely used Li (2011).



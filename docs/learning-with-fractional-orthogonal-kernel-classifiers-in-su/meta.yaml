d\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\'
  mdcn: '通过SVM求解此偏微分方程有两种策略。第一种方法是同时对时间和空间维度使用最小二乘支持向量机（LS-SVM）方法，如(Mehrankoon and
    Suykens 2015)中作者所提出。另一种方法是采用半离散方法，即为了求解方程8.2，首先回顾时间离散化方法，然后应用LS-SVM来求解该问题。所提算法的详细描述如下。


    ## 8.2.1 时间离散化


    由于Crank-Nicolson方法具有良好的收敛性和无条件稳定性，因此被选用于时间离散化。根据有限差分方法，首先，对公式8.2应用Crank-Nicolson方法得到导数公式，我们有


    $$\frac{u^{i+1}(x) - u^i(x)}{\Delta t} = \frac{1}{2} \left( A(x, t_i, u^i) u^{i+1}(x)
    + B(x, t_i, u^i) \frac{\partial u^{i+1}}{\partial t} + C(x, t_i, u^i) \frac{\partial^2
    u^{i+1}}{\partial x^2} \right) + \frac{1}{2} \left( A(x, t_i, u^i) u^i(x) + B(x,
    t_i, u^i) \frac{\partial u^i}{\partial t} + C(x, t_i, u^i) \frac{\partial^2 u^i}{\partial
    x^2} \right), \quad i = 0, \ldots, m-1, \quad (8.3)$$


    其中 $u^i(x) = u(x, t_i)$ 且 $t_i = i \Delta t$。此外，$\Delta t = T/m$ 是时间步长。该方程可以重写为


    $$u^{i+1}(x) - \frac{\Delta t}{2} \left( A(x, t_i, u^i) u^{i+1}(x) + B(x, t_i,
    u^i) \frac{\partial u^{i+1}}{\partial t} + C(x, t_i, u^i) \frac{\partial^2 u^{i+1}}{\partial
    x^2} \right) = u^i(x) + \frac{\Delta t}{2} \left( A(x, t_i, u^i) u^i(x) + B(x,
    t_i, u^i) \frac{\partial u^i}{\partial t} + C(x, t_i, u^i) \frac{\partial^2 u^i}{\partial
    x^2} \right). \quad (8.4)$$


    现在，将LS-SVM算法应用于方程8.4，以求解问题方程8.2的解。


    ## 8.2.2 LS-SVM配置点法


    在每个时间步 $j$，我们有训练数据 $\{x_i^j, u_i^j\}_{i=0}^n$，其中 $x_i^j \in \Omega$ 和 $u_i^j$
    分别是输入和输出数据。时间步 $j$ 的问题解近似为 $\hat{u}^j(x) = \sum_{i=1}^n w_i \varphi(x) + b = \boldsymbol{w}^T
    \varphi(x) + b$，其中 $\{\varphi(x)\}$ 是任意基函数。考虑


    $$r^i(x) = u^i(x) + \frac{\Delta t}{2} \left( A(x, t_i, u^i) u^i(x) + B(x, t_i,
    u^i) \frac{\partial u^i}{\partial t} + C(x, t_i, u^i) \frac{\partial^2 u^i}{\partial
    x^2} \right).$$


    通过求解以下优化问题获得 $u^j(x)$ 的解：


    $$minimize_{w,e} \quad \frac{1}{2}w^Tw + \frac{\gamma}{2}e^Te \tag{8.5}$$


    $$s.t. \quad \tilde{A}_i \left[ w^T \varphi(x_i) + b \right] + \tilde{B}_i w^T
    \varphi''(x_i) + \tilde{C}_i w^T \varphi''''(x_i) + r^j(x_i) + e_i = 0, \quad
    i = 0, \dots, n,$$

    $$w^T \varphi(x_0) = p_1,$$

    $$w^T \varphi(x_n) = p_2,$$


    其中 $\tilde{A}_i = 1 - \frac{\Delta t}{2} A_i$, $\tilde{B} = -\frac{\Delta t}{2}
    B_i$, 和 $\tilde{C}_i = -\frac{\Delta t}{2} C_i$。配置点 $\{x_i\}_{i=0}^n$ 是Gauss-Lobatto-Legendre点或Chebyshev点
    (Bhrawy and Baleanu 2013; Heydari and Avazzadeh 2020)。现在，问题的对偶形式表示如下。此外，问题方程8.5的拉格朗日函数如下：


    $$G = \frac{1}{2}w^Tw + \frac{\gamma}{2}e^Te - \sum_{i=2}^n \alpha_i \left[ w^T
    \left( \tilde{A}_i \varphi(x_i) + \tilde{B}_i \varphi''(x_i) + \tilde{C}_i \varphi''''(x_i)
    \right) \right.$$

    $$\left. - r^j(x_i) - e_i \right] - \beta_1 \left( w^T \varphi(x_0) + b - p_1
    \right) - \beta_2 \left( w^T \varphi(x_n) + b - p_2 \right), \tag{8.6}$$


    其中 $\{\alpha_i\}_{i=2}^n$, $\beta_1$, 和 $\beta_2$ 是拉格朗日乘子。然后，对于 $l = 2, \dots,
    n$，KKT最优性条件如下：


    $$\frac{\partial G}{\partial w} = 0 \rightarrow w = \sum_{i=2}^{n-1} \alpha_i
    \left[ \tilde{A}_i \varphi(x_i) + \tilde{B}_i \varphi''(x_i) + \tilde{C}_i \varphi''''(x_i)
    \right] + \beta_1 \varphi(x_0) + \beta_2 \varphi(x_n),$$

    $$\frac{\partial G}{\partial b} = 0 \rightarrow \sum_{i=2}^{n-1} \alpha_i \tilde{A}_i
    + \beta_1 + \beta_2 = 0,$$

    $$\frac{\partial G}{\partial e_l} = 0 \rightarrow e_l = \frac{\alpha_l}{\gamma},$$

    $$\frac{\partial G}{\partial \alpha_l} = 0 \rightarrow w^T \left( \tilde{A}_l
    \varphi(x_l) + \tilde{B}_l \varphi''(x_l) + \tilde{C}_l \varphi''''(x_l) \right)
    + \tilde{A}_l b - e_l = r^j(x_l),$$

    $$\frac{\partial G}{\partial \beta_1} = 0 \rightarrow w^T \varphi(x_0) + b = p_1,$$

    $$\frac{\partial G}{\partial \beta_2} = 0 \rightarrow w^T \varphi(x_n) + b = p_2.
    \tag{8.7}$$


    通过将第一个和第三个方程代入第四个方程，消去了原始变量。现在，由于基函数的乘积出现在其自身或其导数中，我们需要定义核函数 $K(x_i, x_j) = \varphi(x_i)^T
    \varphi(x_j)$ 的导数。根据Mercer定理，特征映射的导数可以用核函数的导数来表示。因此，我们使用在前面第3章和第4章中定义的微分算子 $\nabla^{m,n}$。因此，在时间步
    $k$，可以写为


    $$\sum_{j=2}^{n-1} \alpha_j \left[ \tilde{A}_i \left( \chi_{j,i}^{(0,0)} \tilde{A}_j
    + \chi_{j,i}^{(1,0)} \tilde{B}_j + \chi_{j,i}^{(2,0)} \tilde{C}_j \right) + \tilde{B}_i
    \left( \chi_{j,i}^{(0,1)} \tilde{A}_j + \chi_{j,i}^{(1,1)} \tilde{B}_j + \chi_{j,i}^{(2,1)}
    \tilde{C}_j \right) + \tilde{C}_i \left( \chi_{j,i}^{(0,2)} \tilde{A}_j + \chi_{j,i}^{(1,2)}
    \tilde{B}_j + \chi_{j,i}^{(2,2)} \tilde{C}_j \right) \right] + \beta_1 \left(
    \chi_{1,i}^{(0,0)} \tilde{A}_i + \chi_{1,i}^{(0,1)} \tilde{B}_i + \chi_{1,i}^{(0,2)}
    \tilde{C}_i \right) + \beta_2 \left( \chi_{n,i}^{(0,0)} \tilde{A}_i + \chi_{n,i}^{(0,1)}
    \tilde{B}_i + \chi_{n,i}^{(0,2)} \tilde{C}_i \right) + \frac{\alpha_i}{\gamma}
    + \tilde{A}_i b = r_i^k, \quad i = 2, \dots, n.$$


    $$\sum_{j=2}^{n-1} \alpha_j \left[ \chi_{j,1}^{(0,0)} \tilde{A}_j + \chi_{j,1}^{(1,0)}
    \tilde{B}_j + \chi_{j,1}^{(2,0)} \tilde{C}_j \right] + \chi_{1,1}^{(0,0)} \beta_1
    + \chi_{n,1}^{(0,0)} \beta_2 + b = p_1,$$


    $$\sum_{j=2}^{n-1} \alpha_j \left[ \chi_{j,n}^{(0,0)} \tilde{A}_j + \chi_{j,n}^{(1,0)}
    \tilde{B}_j + \chi_{j,n}^{(2,0)} \tilde{C}_j \right] + \chi_{1,n}^{(0,0)} \beta_1
    + \chi_{n,n}^{(0,0)} \beta_2 + b = p_2,$$


    $$\sum_{j=2}^{n-1} \alpha_j \tilde{A}_j + \beta_1 + \beta_2 = 0. \tag{8.8}$$


    根据上述方程，定义以下线性系统：


    $$\begin{bmatrix} \chi_{1,1}^{(0,0)} & \mathcal{M}_1 & \chi_{1,n}^{(0,0)} & 1
    \\ \mathcal{P}_1 & \mathcal{K} + \frac{1}{\gamma} I & \mathcal{P}_n & \mathcal{A}^T
    \\ \chi_{n,1}^{(0,0)} & \mathcal{M}_2 & \chi_{n,n}^{(0,0)} & 1 \\ 1 & \mathcal{A}
    & 1 & 0 \end{bmatrix} \begin{bmatrix} \beta_1 \\ \alpha \\ \beta_2 \\ b \end{bmatrix}
    = \begin{bmatrix} p_1 \\ r^k \\ p_2 \\ 0 \end{bmatrix}, \tag{8.9}$$


    其中


    $$\mathcal{A} = [\tilde{A}_{2:n-1}], \quad \mathcal{B} = [\tilde{B}_{2:n-1}],
    \quad C = [\tilde{C}_{2:n-1}],$$


    $$\mathcal{M}_1 = \chi_{1,2:n-1}^{(0,0)} Diag(\mathcal{A}) + \chi_{1,2:n-1}^{(1,0)}
    Diag(\mathcal{B}) + \chi_{1,2:n-1}^{(2,0)} Diag(C),$$


    $$\mathcal{P}_1 = Diag(\mathcal{A}) \chi_{2:n-1,1}^{(0,0)} + Diag(\mathcal{B})
    \chi_{2:n-1,1}^{(0,1)} + Diag(C) \chi_{2:n-1,1}^{(0,2)},$$


    $$\mathcal{K} = Diag(\mathcal{A})\left(\chi^{(0,0)}Diag(\mathcal{A}) + \chi^{(1,0)}Diag(\mathcal{B})
    + \chi_{j,i}^{(2,0)}Diag(\mathcal{C})\right) +$$

    $$Diag(\mathcal{B})\left(\chi^{(0,1)}Diag(\mathcal{A}) + \chi^{(1,1)}Diag(\mathcal{B})
    + \chi^{(2,1)}Diag(\mathcal{C})\right) +$$

    $$Diag(\mathcal{C})\left(\chi^{(0,2)}Diag(\mathcal{A}) + \chi^{(1,2)}Diag(\mathcal{B})
    + \chi^{(2,2)}Diag(\mathcal{C})\right),$$


    $$\mathcal{P}_n = Diag(\mathcal{A})\chi_{2:n-1,n}^{(0,0)} + Diag(\mathcal{B})\chi_{2:n-1,n}^{(0,1)}
    + Diag(\mathcal{C})\chi_{2:n-1,n}^{(0,2)},$$


    $$\mathcal{M}_2 = \chi_{n,2:n-1}^{(0,0)}Diag(\mathcal{A}) + \chi_{n,2:n-1}^{(1,0)}Diag(\mathcal{B})
    + \chi_{n,2:n-1}^{(2,0)}Diag(\mathcal{C}),$$


    $$r^k = [r_i^k]_{2:n-1}^T.$$


    通过求解方程组8.9，计算出 $\{\alpha_i\}_{i=2}^{n-1}$, $\beta_1$, $\beta_2$, 和 $b$。然后，时间步
    $k$ 的解，在对偶形式下，可以如下获得：


    $$\hat{u}^k(x) = \sum_{i=2}^{n-1} \alpha_i \left(\tilde{A}(x_i)\chi^{(0,0)}(x_i,
    x) + \tilde{B}(x_i)\chi^{(1,0)}(x_i, x) + \tilde{C}(x_i)\chi^{(2,0)}(x_i, x)\right)$$

    $$\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\quad\qua
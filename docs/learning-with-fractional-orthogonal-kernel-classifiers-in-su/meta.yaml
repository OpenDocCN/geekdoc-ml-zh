    # 12.4.1 Chebyshev Class


    Another kernel introduced in this package is the **Chebyshev** kernel, which is
    implemented in the *vectorial* approach which has already been introduced as a
    Generalized Chebyshev Kernel. Similar to the Legendre-kernel, the Chebyshev kernel
    is available when initiating the Model class object by passing the “Chebyshev”
    parameter as the kernel name. Another parameter applicable to the Chebyshev kernel
    is *form*. Two different types of Chebyshev kernels are implemented in the Chebyshev
    class. One uses an explicit equation and another is a recursive function. Selecting
    a type to use is possible through *form* parameter. The parameters of the Chebyshev
    class are as follows:


    +   - *order* := Order of polynomial

    - *form* := “e” for *Explicit* form and “r” for *Recursive* form.


    # 12.4.2 Legendre Class


    *Legendre* kernel class is generally given as an object to the kernel parameter
    of *Models* class in the initialization step of an object and also its *Legendre-kernel*
    function is explicitly used in constructing the gram matrix *K*. Legendre class
    benefits from a recursive implementation of the Legendre-kernel function. To use
    this kernel, the user only needs to initiate the Model object with “Legendre”
    as the kernel parameter of the Model class. The Legendre class needs the following
    parameters:


    +   - *order* := Order of the Legendre-kernel function.


    # 12.4.3 Gegenbauer Class


    The **Gegenbauer** kernel is also available in the *ORSVM* package. For the implementation
    of the Gegenbauer kernel function, the fractional kernel function which is introduced
    in Chap. 5 is used. Therefore, in addition to the product of input vectors, the
    values are obtained from the two other equations. The Gegenbauer class has the
    following parameters:


    +   - *order* := Order of the Gegenbauer kernel function.

    - *lambda* := The λ parameter of the Gegenbauer kernel function.'

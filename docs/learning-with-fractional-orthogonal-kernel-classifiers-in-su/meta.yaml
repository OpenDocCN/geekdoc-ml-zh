  mdcn: '## 第6章

    分数阶雅可比核函数：

    理论与应用


    Amir Hosein Hadian Rasanana, Jamal Amani Rad, Malihe Shaban Tameh,

    and Abdon Atangana


    **摘要** 某些多项式的正交性使其备受关注。经典正交多项式已被研究多年，其中雅可比多项式最为常见。特别是，这些多项式被用于解决多个数学、物理和工程问题，其作为核函数在支持向量机算法分类问题中的应用也已被研究。本文通过引入新颖的分数形式，提出相应的核函数以扩展支持向量机的应用。通过将输入数据集转换到分数空间，基于分数阶雅可比核的支持向量机在分类任务中展现出解决非线性问题的卓越能力。本章将回顾该族多项式的文献、基础和性质，解释相应的核函数，介绍雅可比多项式的分数形式，并证明其满足Mercer条件。最后，将使用所提及的核函数以及其他正交核函数以及径向基函数核和多项式核，在一个知名数据集上对所得结果进行比较。


    **关键词** 雅可比多项式 · 分数阶雅可比函数 · 核技巧 · 正交函数 · Mercer定理


    A. H. Hadian Rasanana (✉) · J. A. Rad

    Department of Cognitive Modeling, Institute for Cognitive and Brain Sciences,
    Shahid Beheshti University, Tehran, Iran

    e-mail: amir.h.hadian@gmail.com


    M. S. Tameh

    Department of Chemistry, University of Minnesota, Minneapolis, MN 55455, USA


    A. Atangana

    Faculty of Natural and Agricultural Sciences, Institute for Groundwater Studies,
    University of the Free State, Bloemfontein 9300, South Africa

    e-mail: AtanganaA@ufs.ac.za


    © The Author(s), under exclusive license to Springer Nature Singapore Pte Ltd.
    2023

    J. A. Rad et al. (eds.), *Learning with Fractional Orthogonal Kernel Classifiers
    in Support Vector Machines*, Industrial and Applied Mathematics,

    https://doi.org/10.1007/978-981-19-6553-1_6


    ### 6.1 引言


    经典正交函数在逼近理论 Mastroianni and Milovanovic (2008), Boyd (2001), Askey and Wilson
    (1985) 以及各种数值算法（如谱方法 Kazem (2013), Bhrawy and Alofi (2012), Abdelkawy et al. (2017)）中具有广泛应用。这些正交函数中最普遍的类型是雅可比多项式
    Askey and Wilson (1985), Milovanovic et al. (1994), Asghari et al. (2022)。该正交多项式族有一些特例，如勒让德多项式、四类切比雪夫多项式和盖根鲍尔多项式
    Ezz-Eldien and Doha (2019), Doha et al. (2011)。雅可比多项式已被用于解决科学不同领域的各种问题 Parand
    et al. (2016), Parand et al. (2019), Moayeri et al. (2021)。Ping等人使用雅可比-傅里叶矩处理确定性图像，然后利用这些矩重构原始图像
    Ping et al. (2007)。2013年，Kazem (2013) 使用雅可比多项式求解线性和非线性分数阶微分方程，我们知道分数阶微分方程在模拟物理和工程过程方面有许多用例。Shojaeizadeh
    et al. (2021) 使用移位雅可比多项式解决平流-扩散反应中的最优控制问题。此外，Bahrawy et al. (2012), Abdelkawy
    et al. (2017), Bhrawy (2016), Bhrawy and Zaky (2016) 对雅可比多项式的应用做出了许多贡献。在 Bhrawy
    and Alofi (2012) 中，他们提出了一种移位雅可比-高斯配置法来求解非线性Lane-Emden方程。同样，在 Abdelkawy et al.
    (2017) 中，作者使用雅可比多项式求解多维Volterra积分方程。在 Bhrawy (2016) 中，Bhrawy使用雅可比谱配置法求解多维非线性分数阶亚扩散方程。随后，Bhrawy
    and Zaky (2016) 使用分数阶雅可比函数求解时间分数阶问题。另一方面，雅可比多项式也用作高性能异构计算机中的核函数，例如“雅可比迭代法”，以获得更高的加速比，见
    Morris and Abed (2012)。此外，正交旋转不变矩在图像处理和模式识别中有许多用例，包括雅可比矩。特别是，Rahul Upneja et al.
    (2015) 使用雅可比-傅里叶矩进行不变图像处理，采用了一种利用时间复杂度的新型快速方法。


    可以明确地说，这些多项式的应用如此之多，以至于它们已经渗透到神经科学等其他科学分支，并找到了重要的应用。2020年，Moayeri et al. (2020)
    使用雅可比多项式进行配置法（确切地说是广义拉格朗日-雅可比-高斯-洛巴托法）来模拟非线性时空神经动力学模型以及相关的同步现象，从而降低了计算复杂度。Hadian
    Rasanana et al. (2020) 最近使用分数阶雅可比多项式作为神经网络的激活函数，来模拟认知决策建模中出现的非线性分数阶动力学。此外，Nkengfack
    et al. (2021) 使用雅可比多项式对脑电图信号进行分类，用于癫痫发作检测和眼动状态识别。作为这些多项式的另一个应用，Abdallah et al.
    (2021) 引入了



    # 4.5 Conclusion


    In this chapter, the Legendre polynomial kernel in fractional order for support
    vector machines is introduced and presented by using the ordinary Legendre polynomial
    kernel. The Legendre polynomial kernel can extract good properties from data due
    to the orthogonality of elements in the feature vector, thus reducing data redundancy.
    Also, based on the results of the experiment on two datasets in the previous section,
    it can be shown that SVM with Legendre and fractional Legendre kernels can separate
    nonlinear data well.'

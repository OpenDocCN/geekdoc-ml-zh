- md: '## Chapter 9

    Solving Integral Equations by LS-SVR


    Kourosh Parand, Alireza Afzal Aghaei, Mostafa Jani, and Reza Sahleh


    **Abstract** The other important type of problem in science and engineering is
    integral equations. Thus, developing precise numerical algorithms for approximating
    the solution to these problems is one of the main questions of scientific computing.
    In this chapter, the least squares support vector algorithm is utilized for developing
    a numerical algorithm for solving various types of integral equations. The robustness
    and also the convergence of the proposed method are discussed in this chapter
    by providing several numerical examples.


    **Keywords** Integral equations · Galerkin LS-SVR · Collocation LS-SVR · Numerical
    simulation


    ## 9.1 Introduction


    Any equation with an unknown function under the integral sign is called an integral
    equation. These equations frequently appear in science and engineering, for instance,
    different mathematical models such as diffraction problems Eswaran (1990), scattering
    in quantum mechanics Barlette et al. (2001), plasticity Kanaun and Martínez (2012),
    conformal mapping Reichel (1986), water waves Manam (2011), and Volterra’s population
    model Wazwaz (2002) are expressed as integral equations Assari and Dehghan (2019),
    Bažant and Jirásek (2002), Bremer (2012), Kulish and Novozhilov (2003), Lu et
    al. (2020), Parand and Delkhosh (2017), Volterra (1928). Recently, the applications
    of integral equations in machine learning problems have also been discussed by
    researchers Keller and Dahn (2019), Chen et al. (2018), Dahn and Keller (2016).
    Furthermore, integral equations are closely related to differential equations,
    and in some cases, these equations can be converted to each other. Integro-differential
    equations are also a type of integral equations, in which not only the unknown
    function is placed under the integral operator, but also its derivatives appear
    in the equation. In some cases, the partial derivative of the unknown function
    may appear in the equation. In this case, the equation is called the partial integro-differential
    equation. Distributed fractional differential equations are also a type of fractional
    differential equations, which are very similar to integral equations. In these
    equations, the derivative fraction of the unknown function appears under the integral
    in such a way that the fractional derivative order is the same as the integral
    variable.


    Due to the importance and wide applications of integral equations, many researchers
    have developed efficient methods for solving these types of equations Abbasbandy
    (2006), Assari and Dehghan (2019), Fatahi et al. (2016), Golberg (2013), Mandal
    and Chakrabarti (2016), Marzban et al. (2011), Nemati et al. (2013), Wazwaz (2011).
    In this chapter, starting with the explanation of integral equations, and in the
    following, a new numerically efficient method based on the least squares support
    vector regression approach is proposed for the simulation of some integral equations.


    ## 9.2 Integral Equations


    Integral equations are divided into different categories based on their properties.
    However, there are three main types of integral equations Wazwaz (2011), i.e.,
    Fredholm, Volterra, and Volterra-Fredholm integral equations. While the Fredholm
    integral equations have constant integration bounds, in Volterra integral equations
    at least one of the bounds depends on the independent variable. Volterra-Fredholm
    integral equations also include both types of equations. These equations themselves
    are divided into subcategories such as linear/nonlinear, homogeneous/inhomogeneous,
    and first/second kind. In the next section, different classes of these equations
    are presented and discussed.


    ### 9.2.1 Fredholm Integral Equations


    Fredholm integral equations are an essential class of integral equations used
    in image processing Mohammad (2019) and reinforcement learning problems Keller
    and Dahm (2019), Dahm and Keller (2016). Since analytical methods for finding
    the exact solution are only available in specific cases, various numerical techniques
    have been developed to approximate the exact solution of these types of equations
    as well as a larger class of these models such as Hammerstein, the system of equations,
    multi-dimensional equations, and nonlinear equations. Here, a brief overview of
    some numerical methods for these integral equations is given. The local radial
    basis function method was presented in Assari et al. (2019) for solving Fredholm
    integral equations. Also, Bahmanpour et al. developed the Müntz wavelets method
    Bahmanpour et al. (2019) to simulate these models. On the other hand, Newton-Raphson
    and Newton-Krylov methods were used for solving one- and two-dimensional nonlinear
    Fredholm integral equations Parand et al. (2019). In another work, the least squares
    support vector regression method was proposed to solve Fredholm integral equations
    Parand et al. (2021). To see more, the interested reader can see Amiri et al.
    (2020), Maleknejad and Nosrati Sahlan (2010), Li and Wu (2021), and Rad and Parand
    (2017a,b).


    For any $a, b, \lambda \in \mathbb{R}$, the following equation is called a Fredholm
    integral equation Wazwaz (2011, 2015), Rahman (2007)


    $$u(x) = f(x) + \lambda \int_{a}^{b} K(x, t)u(t)dt,$$


    where $u(x)$ is the unknown function and $K(x, t)$ is the kernel of the equation.


    ### 9.2.2 Volterra Integral Equations


    Volterra integral equations are another category of integral equations. This kind
    of equation appears in many scientific applications, such as population dynamics
    Jafari et al. (2021), the spread of epidemics Wang et al. (2006), and semi-conductor
    devices Unterreiter (1996). Also, these equations can be obtained from initial
    value problems. Different numerical methods are proposed to solve these types
    of equations, for example, a collocation method using Sinc and rational Legendre
    functions proposed to solve Volterra’s population model Parand et al. (2011).
    In another work, the least squares support vector regression method was proposed
    to solve Volterra integral equations Parand et al. (2020). Also, the Runge-Kutta
    method was implemented to solve the second kind of linear Volterra integral equations
    Maleknejad and Shahrezaee (2004). To see more, the interested reader can see Messina
    and Vecchio (2017), Tang et al. (2008), and Maleknejad et al. (2011). In this
    category, the equation is defined as follows Wazwaz (2011, 2015), Rahman (2007):



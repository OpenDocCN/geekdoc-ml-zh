    \omega^T}(z) f(z) dz \right]$$

    $$= \sum_{j=0}^{n} \left[ \left( \int J_{j}^{\psi, \omega}(x) f(x) dx \right)
    \left( \int J_{j}^{\psi, \omega^T}(z) f(z) dz \right) \right] \geqslant 0. \quad
    (6.34)$$


    因此，核 $K_{(1)}(x, z)$ 是一个有效的 Mercer 核。为了证明 $K_{(2)}(x, z) \geqslant 0$，我们可以证明式
    6.6 中的权重函数是半正定的，因为这更容易直观地考虑，然后为两个向量输入重新表述的核的一般权重函数就变得清晰了。由于输入数据的归一化，这个权重函数是半正定的，因此权重函数
    $w^{\psi, \omega}(x, z) = (d - \langle x, z \rangle)^{\psi} (d + \langle x, z
    \rangle)^{\omega}$，即核的两个输入向量的广义形式，也是半正定的。$\square$


    ## 6.3.2 其他雅可比核函数


    使用核技巧的 SVM 在很大程度上取决于根据数据选择合适的核，因此为 SVM 介绍和检验新核仍然是一个引人入胜的话题。一些多项式（如雅可比多项式）的正交性使其成为此类用例的热门替代方案。顺便提一下，一些先前引入的核，如小波核，已被
    Nadira 等人 (2019) 成功使用。结合小波和正交核函数（如切比雪夫、埃尔米特和勒让德）的方法已在信号处理 Garnier 等人 (2003)、求解微分方程
    Imani 等人 (2011)、Khader 和 Adel (2018)、最优控制 Razzaghi 和 Yousefi (2002)、Elaydi 等人
    (2012) 以及变分法问题 Bokhari 等人 (2018) 中被提出和检验。


    ### 6.3.2.1 正则化雅可比小波核函数


    Abassa 等人 Nadira 等人 (2019) 最近介绍了基于雅可比小波的 SVM 核。然而，这里将简要介绍所提出的核，感兴趣的读者可以在原始论文 Nadira
    等人 (2019) 中找到证明和细节。需要注意的是，为了保持本书的完整性，必须更改一些符号，但公式的整合是完整的，与原始工作相同。


    雅可比多项式 $J_m^{(\psi, \omega)}$ 定义如下：


    $$J_m^{(\psi, \omega)}(x) = \frac{(\psi + \omega + 2m - 1)[\psi^2 - \omega^2 +
    x(\psi + \omega + 2m)(\psi + \omega + 2m - 2)]}{2m(\psi + \omega + 2m - 2)(\psi
    + \omega + m)} J_{m-1}^{(\psi, \omega)}(x) - \frac{(\psi + m - 1)(\omega + m -
    1)(\psi + \omega + 2m)}{m(\psi + \omega + 2m - 2)(\psi + \omega + m)} J_{m-2}^{(\psi,
    \omega)}(x),$$


    其中 $\psi > -1, \omega > -1$，且


    $$J_0^{(\psi, \omega)}(x) = 1, J_1^{(\psi, \omega)}(x) = \frac{\psi + \omega +
    2}{2}x + \frac{\psi - \omega}{2}.$$


    这些多项式属于权重空间 $L_w^2([-1, 1])$，即


    $$\left\langle J_m^{(\psi, \omega)}, J_{m''}^{(\psi, \omega)} \right\rangle_{L_w^2}
    = h_m^{(\psi, \omega)} \delta_{m,m''}, \quad \forall m, m'' \in \mathbb{N},$$


    其中


    $$h_m^{(\psi, \omega)} = \| J_m^{(\psi, \omega)} \| = \frac{2^{\psi + \omega +
    1} \Gamma(\psi + m + 1) \Gamma(\omega + m + 1)}{(2m + 1 + \psi + \omega) m! \Gamma(\psi
    + \omega + m + 1)},$$


    且 $w(x) = (1-x)^\psi(1+x)^\omega$。此外，$\delta_{n,m}$ 是克罗内克函数，$\Gamma$ 是欧拉伽马函数，$\langle
    \cdot, \cdot \rangle_{L_w^2}$ 表示 $L_w^2([-1, 1])$ 的内积。族 $\left\{ J_m^{(\psi, \omega)}
    \right\}_{m \in \mathbb{N}}$ 构成了 $L_w^2([-1, 1])$ 的一个正交基。


    ## 6.3.3 分数阶雅可比核


    由于分数阶雅可比函数的权重函数等于式 6.25，定义分数阶雅可比核很容易。可以如下构建*分数阶雅可比核*：


    $$K_{F Jacobi}(x, z) = \sum_{i=0}^{n} \langle F J_i^{\psi, \omega, \alpha}(x),
    F J_i^{\psi, \omega, \alpha}(z) \rangle F w^{\psi, \omega, \alpha}(x, z). \quad
    (6.35)$$


    **定理 6.3** *式 6.35 中引入的雅可比核是一个有效的 Mercer 核。*


    **证明** 类似于定理 6.2 的证明，分数阶雅可比核函数式 6.35 可以被视为两个核的乘积：


    $$K_{(1)}(x, z) = \sum_{i=0}^{n} F J_i^{\psi, \omega, \alpha}(x) F J_i^{\psi,
    \omega, \alpha^T}(z), \quad (6.36)$$


    $$K_{(2)}(x, z) = F w^{\psi, \omega, \alpha}(x, z)$$

    $$= (d - (2(\frac{x-a}{b-a})^\alpha - 1, 2(\frac{z-a}{b-a})^\alpha - 1) - \epsilon)^\psi
    (d + (2(\frac{x-a}{b-a})^\alpha - 1, 2(\frac{z-a}{b-a})^\alpha - 1) + \epsilon)^\omega
    \quad (6.37, 6.38)$$


    其中 $d$ 是输入 $x$ 和 $z$ 的维度。考虑 $f : \mathbb{R}^m \longrightarrow \mathbb{R}$，并假设每个元素相互独立。可以如下评估
    $K_{(1)}(x, z)$ 的 Mercer 条件：


    $$\iint K_{(1)}(x, z) f(x) f(z) dx dz$$

    $$= \iint \sum_{j=0}^{n} F J_j^{\psi, \omega, \alpha}(x) F J_j^{\psi, \omega,
    \alpha^T}(z) f(x) f(z) dx dz$$

    $$= \sum_{j=0}^{n} \iint F J_j^{\psi, \omega, \alpha}(x) F J_j^{\psi, \omega,
    \alpha^T}(z) f(x) f(z) dx dz$$

    $$= \sum_{j=0}^{n} \left[ \int F J_j^{\psi, \omega, \alpha}(x) f(x) dx \int F
    J_j^{\psi, \omega, \alpha^T}(z) f(z) dz \right]$$

    $$= \sum_{j=0}^{n} \left[ \left( \int F J_j^{\psi, \omega, \alpha}(x) f(x) dx
    \right) \left( \int F J_j^{\psi, \omega, \alpha^T}(z) f(z) dz \right) \right]
    \geqslant 0. \quad (6.39)$$


    因此，式 6.36 是一个有效的 Mercer 核。$K_{(2)}(x, z)$ 的有效性可以类似于普通雅可比核函数的权重函数来考虑。可以推断 $K_{(2)}(x,
    z)$ 的输出永远不会小于零，因为两个在 $[-1, 1]$ 上归一化的向量的内积范围是 $[-d, d]$，其中 $d$ 是输入向量 $x$ 或 $z$
    的维度，负内积的影响将被参数 $d$ 中和。因此，式 6.37 也是一个有效的 Mercer 核。$\square$


    ## 6.4 雅可比核函数在真实数据集上的应用


    在本节中，将*雅可比*和*分数阶雅可比核*在一些知名数据集上的结果与前几章介绍的其他核（如*RBF*、*多项式*、*切比雪夫*、*分数阶切比雪夫*、*盖根鲍尔*、*分数阶盖根鲍尔*、*勒让德*和*分数阶勒让德核*）进行比较。为了获得清晰的分类，可能需要对数据集应用一些预处理步骤，这里不关注这些步骤，但使用*雅可比多项式*作为核时，归一化是强制性的。有一些在线数据存储可供公众使用，例如广泛使用的数据存储是*加州大学欧文分校*的*UCI
    机器学习库*<sup>1</sup>，以及*Kaggle*。<sup>2</sup> 本节使用来自 UCI 的四个数据集，这些数据集在机器学习从业者中广为人知。


    ### 6.4.1 螺旋数据集


    螺旋数据集已在第 3 章中详细介绍。简要回顾一下，图 6.9 描绘了原始螺旋数据集（左）以及相同数据集在阶数 $\alpha = 0.3$ 的分数空间中（右），包含
    1000 个数据点。在此数据集上的分类任务中，选择 90% 的数据点作为测试集。很明显，在分数空间中，数据点集中在正象限，正如在二维图中看到的那样。如前所述，这只是准备数据集以应用核函数并找到最合适的分类器的一个步骤。


    图 6.10 展示了应用雅可比核函数后的相同数据集。左图描绘了应用阶数为 3、$\psi = -0.2$ 和 $\omega = 0.3$ 的雅可比核后的原始数据集。右图展示了在阶数为
    0.3 的分数空间中的螺旋数据集，其中应用了阶数为 3、$\psi = -0.2$、$\omega = 0.3$ 且分数阶为 0.3 的分数阶雅可比核。


    应用雅可比核为螺旋数据集的每个数据点赋予了更高的维度。因此，以这种方式出现了一种新的秩序，从而有机会找到一个决策面（在三维中）来进行二元分类。然而，它可能不


    <sup>1</sup> https://archive.ics.uci.edu/ml/datasets.php.

    <sup>2</sup> https://www.kaggle.com/datasets.'

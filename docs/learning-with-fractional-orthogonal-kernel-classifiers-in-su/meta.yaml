    +   1. **Supervised learning:** In this type of learning, there is a supervisor
    to teach machines in learning a concept. This means that the algorithm learns
    from labeled data (i.e., training data) which include example data and related
    target responses, i.e., input and output pairs. If we assume the ML algorithm
    as a system (e.g., a face identification), in the training phase of the system,
    we provide both input sample (e.g., an image from a face) and the corresponding
    output (e.g., the ID of the person to whom face belongs) to the system. The collection
    of labeled data requires skilled human agents (e.g., a translator to translate
    a text from a language to another) or a physical experiment (e.g., determining
    whether there is rock or metal near to a sonar system of a submarine) that is
    costly and time-consuming. The supervised learning methods can be divided into
    classification and regression. When the number of classes of the data is limited
    (i.e., the output label of the data is a discrete variable) the learning is called
    classification (e.g., classifying an email to spam and not-spam classes), and
    when the output label is a continuous variable (e.g., the price of a stock index)
    the topic is called regression. Examples of the most widely used supervised learning
    algorithms are SVM Boser et al. (1992), Vapnik (1995), Cortes and Vapnik (1995),
    artificial neural networks (e.g., multi-layer perceptron Rumelhart et al. (1986),
    LSTM Hochreiter and Schmidhuber (1997), Gers et al. (1999)), linear and logistic
    regression Cramer (2002), Naïve Bayes Hand and Yu (2001), decision trees Morgan
    and Sonquist (1963), and K-Nearest Neighbor (KNN) Sebestyen (1962), Nilsson (1965).

    2. **Unsupervised learning:** In this case, there is not any supervision in the
    learning and the ML algorithm works on the unlabeled data. It means that the algorithm
    learns from plain examples without any associated response, leaving to the algorithm
    to determine the data patterns based on the similarities in the data. This type
    of algorithm tends to restructure the data and cluster them. From a system viewpoint,
    this kind of learning receives sample data as the input (e.g., the human faces)
    without the corresponding output and groups with similar samples in the same clusters.
    The categorization of unlabeled data is commonly called clustering. Also, association
    as another type of unsupervised learning refers to methods which can discover
    rules that describe large portions of data, such as people who buy product X also
    tend to buy the other product Y. Dimensionality'

    # 8.3.1 Fokker–Planck Equation


    Fokker–Planck equations have various applications in astrophysics (Chavanis 2006),
    biology (Frank et al. 2003), chemical physics (Grima et al. 2011), polymers (Chauvière
    and Lozinski 2001), circuit theory (Kumar 2013), dielectric relaxation (Tanimura
    2006), economics (Furioli et al. 2017), electron relaxation in gases (Braglia
    et al. 1981), nucleation (Reguera et al. 1998), optical bistability (Gronchi and
    Lugiato 1973), quantum optics (D’ariano et al. 1994), reactive systems (De Decker
    and Nicolis 2020), solid-state physics (Kumar 2013), finance (Rad et al. 2018),
    cognitive psychology (Hadian-Rasanan et al. 2021), etc. (Risken 1989; Kazem et
    al. 2012a). In fact, this equation is derived from the description of the Brownian
    motion of particles (Ullersma 1966; Uhlenbeck and Ornstein 1930). For instance,
    one of the equations describing the Brownian motion in potential is the Kramer
    equation which is a special case of the Fokker–Planck equation (Jiménez-Aquino
    and Romero-Bastida 2006; Friedrich et al. 2006). The general form of the Fokker–Planck
    equation is


    $\frac{\partial u}{\partial t} = \left[ -\frac{\partial}{\partial x} \psi_1(x,
    t, u) + \frac{\partial^2}{\partial x^2} \psi_2(x, t, u) \right] u$, (8.11)


    in which $\psi_1$ and $\psi_2$ are the drift and diffusion coefficients, respectively.
    If these coefficients depend on $x$ and $t$, the PDE is called forward Kolmogorov
    equation (Conze et al. 2022; Risken 1989). There is another type of Fokker–Planck
    equation similar to the forward Kolmogorov equation called backward Kolmogorov
    equation (Risken 1989; Flandoli and Zanco 2016) that is in the form (Parand et
    al. 2018):


    $\frac{\partial u}{\partial t} = \left[ -\psi_1(x, t) \frac{\partial}{\partial
    x} + \psi_2(x, t) \frac{\partial^2}{\partial x^2} \right] u$. (8.12)


    Moreover, if $\psi_1$ and $\psi_2$ are dependent on $u$ in addition to time and
    space, then we have the nonlinear Fokker–Planck equation which has important applications
    in biophysics (Xing et al. 2005), neuroscience (Hemami et al. 2021; Moayeri et
    al. 2021), engineering (Kazem et al. 2012a), laser physics (Blackmore et al. 1986),
    nonlinear hydrodynamics (Zubarev and Morozov 1983), plasma physics (Peeters and
    Strintzi 2008), pattern formation (Bengfort et al. 2016), and so on (Barkai 2001;
    Tsurui and Ishikawa 1986).'

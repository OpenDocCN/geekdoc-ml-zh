    其中 $h(x)$ 和 $g(x)$ 是已知函数。


    ## 9.2.3 Volterra-Fredholm 积分方程


    Volterra-Fredholm 积分方程是 Fredholm 积分方程和 Volterra 积分方程的组合。这类方程源于抛物型边值问题 Wazwaz (2011,
    2015), Rahman (2007)，也可从时空流行病学建模中推导出来 Brunner (1990), Maleknejad and Hadizadeh
    (1999)。已有多种数值方法被提出用于求解 Volterra-Fredholm 积分模型。例如，Brunner 开发了一种样条配置法来求解出现在流行病时空发展中的非线性
    Volterra-Fredholm 积分方程 Brunner (1990)，Maleknejad 及其同事利用基于正交三角函数的配置法处理此类问题 Maleknejad
    et al. (2010)，而 Yousefi 和 Razzaghi (2005) 则将 Legendre 小波配置法应用于这些问题。欲了解更多，感兴趣的读者可参阅
    Parand and Rad (2012), Ghasemi et al. (2007), Babolian et al. (2009), and Babolian
    and Shaerlar (2011)。


    在一维线性情况下，这些方程可写为如下形式 Wazwaz (2011, 2015), Rahman (2007)：


    $u(x) = f(x) + \lambda_1 \int_{a}^{b} K_1(x, t)u(t)dt + \lambda_2 \int_{g(x)}^{h(x)}
    K_2(x, t)u(t)dt,$


    其中包含了 Fredholm 和 Volterra 积分算子。


    **注 9.1** *（第一类与第二类积分方程）* 需要注意的是，如果 $u(x)$ 仅出现在积分号下，则称为第一类；否则，如果未知函数出现在积分号内外，则称为第二类。例如，方程
    9.1 是第二类 Volterra 积分方程，而下面的方程 $f(x) = \lambda \int_{g(x)}^{h(x)} K(x, t)u(t)dt$
    是第一类。


    **注 9.2** *（线性与非线性积分方程）* 假设我们有积分方程 $\psi(u(x)) = f(x) + \lambda \int_{g(x)}^{h(x)}
    K(x, t)\phi(u(t))dt$。如果 $\psi(x)$ 或 $\phi(x)$ 中任一为非线性函数，则该方程称为非线性方程。对于第一类 Volterra
    积分方程的情况，我们有 $f(x) = \lambda \int_{g(x)}^{h(x)} K(x, t)\phi(u(t))dt$。


    **注 9.3** *（齐次与非齐次积分方程）* 在积分方程领域，前面方程中出现的函数 $f(x)$ 被定义为数据函数。该函数在确定积分方程的解中起着重要作用。已知如果函数
    $f(x)$ 在 $K(x, t)$ 的函数值域内，则该方程有解。例如，如果核的形式为 $K(x, t) = \sin(x) \sin(t)$，则函数 $f(x)$
    应是 $\sin(x)$ 的系数 Golberg (2013)。否则，方程无解 Wazwaz (2011)。由于函数 $f(x)$ 在积分方程中的重要性，科学家们根据该函数的存在与否对方程进行了分类。如果积分方程中存在函数
    $f(x)$，则称为非齐次；否则，称为齐次。换句话说，第二类 Fredholm 积分方程 $u(x) = f(x) + \lambda \int_a^b K(x,
    t)u(t)dt$ 是非齐次的，而方程 $u(x) = \lambda \int_a^b K(x, t)u(t)dt$ 是齐次的。


    ## 9.2.4 积分微分方程


    如本章开头所述，积分微分方程是未知函数的导数也出现在方程中的积分方程。例如，方程


    $$\frac{d^n u(x)}{dx^n} = f(x) + \lambda \int_a^b K(x, t)u(t)dt,$$

    $$\left. \frac{d^k u}{dx^k} \right|_{x_0} = b_k \quad 0 \le k \le n - 1$$


    是第二类 Fredholm 积分微分方程，其中 $n$ 是正整数，$b_k$ 是确定未知函数的初始值。已有多种数值方法被提出用于求解此处讨论的模型。例如，2006
    年，Dehghan (2006) 开发了几种有限差分格式，包括前向 Euler 显式、后向 Euler 隐式、Crank-Nicolson 隐式和 Crandall
    隐式，用于求解偏积分微分方程。在另一项研究中，Dehghan 和 Saadatmandi 利用 Chebyshev 有限差分算法处理线性和非线性 Fredholm
    积分微分方程。欲了解更多，感兴趣的读者可参阅 El-Shahed (2005), Wang and He (2007), Parand et al. (2011,
    2016, 2011, 2014)。


    ## 9.2.5 多维积分方程


    由于不同变量的存在，物理问题的研究和建模通常会导致多维情况的产生 Mikhlin (2014)。偏微分方程和多维积分方程是建模这些问题最著名的例子。这些方程的一般形式定义如下：


    $$\mu u(\mathbf{x}) = f(\mathbf{x}) + \lambda \int_S K(\mathbf{x}, \mathbf{t})
    \sigma(u(\mathbf{t})) dt, \quad \mathbf{x}, \mathbf{t} \in S \subset \mathbb{R}^n,
    \quad (9.2)$$


    其中 $\mathbf{x} = (x_1, x_2, \dots, x_n)$，$\mathbf{t} = (t_1, t_2, \dots, t_n)$，$\lambda$
    是积分方程的特征值。同时，为了方便定义第一类和第二类方程，常数 $\mu \in \mathbb{R}$ 被添加到方程左侧。如果该常数为零，则称为第一类方程；否则，为第二类。在一般情况下，这类积分方程通常无法使用精确的封闭形式解进行评估，需要强大的计算算法。然而，关于该模型的数值模拟已有一些工作。例如，Mirzaei
    和 Dehghan (2010) 的移动最小二乘法用于一维和二维 Fredholm 积分方程，Zaky 等人 (2021) 的 Legendre 配置法用于
    Volterra-Fredholm 积分方程，以及 Abdelkawy 等人 (2017) 的 Jacobi 配置法用于多维 Volterra 积分方程。欲了解更多，感兴趣的读者可参阅
    Bhrawy et al. (2016), Esmaeilbeigi et al. (2017), and Mirzaei and Alipour (2020)。


    ## 9.2.6 积分方程组


    积分方程中的另一类问题是方程组。这些方程组以多个方程和多个未知数的形式出现，其中方程是积分方程。这些方程组的一般形式定义如下：


    $$u_i(x) = f_i(x) + \int_a^b \sum_{j=1}^n K_{ij}(x, t) v_{ij}(t) dt, \quad i =
    1, \dots, n.$$


    这里，函数 $v_{ij}$ 被定义为 $g_i(u_j(t))$，其中 $g_i$ 是某些函数。例如，下面是两个方程和两个未知数的 Fredholm 积分方程组：


    $$\begin{cases} u_1(x) = f_1(x) + \int_a^b (K_{11}(x, t) v_{11}(t) + K_{12}(x,
    t) v_{12}(t)) dt, \\ u_2(x) = f_2(x) + \int_a^b (K_{21}(x, t) v_{21}(t) + K_{22}(x,
    t) v_{22}(t)) dt. \end{cases}$$


    > **注 9.4** *（微分方程与积分方程的关系）* 微分方程和积分方程密切相关，其中一些可以相互转换。有时将微分方程转换为积分方程是有益的，因为这种方法可以防止微分方程数值求解器的不稳定性
    Wazwaz (2011, 2015), Rahman (2007)。Fredholm 积分方程可以转换为具有边界值的微分方程，而 Volterra 积分方程可以转换为具有初始值的微分方程
    Parand et al. (2020)。


    ## 9.3 用于求解积分方程的 LS-SVR


    本节提出了一种用于积分方程数值模拟的高效方法。利用加权残差法背后的思想，该技术引入了两种不同的算法，分别命名为配置 LS-SVR (CLS-SVR) 和 Galerkin
    LS-SVR (GLS-SVR)。为简单起见，此处我们用算子形式表示一个积分方程


    $$\mathcal{N}(u) = f, \tag{9.3}$$


    其中


    $$\mathcal{N}(u) = \mu u - \mathcal{K}_1(u) - \mathcal{K}_2(u).$$



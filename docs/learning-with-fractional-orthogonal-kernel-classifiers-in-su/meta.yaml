  md: "# Dictionary\n\nDictionary is another useful data type collection whose main\
    \ difference with other collections is that the dictionary is unordered and unlike\
    \ sequences, which are indexed by a range of numbers, dictionaries are indexed\
    \ by keys. Type of the keys can be any immutable types as strings and numbers.\
    \ In addition, one can create an empty dictionary with a pair of braces. A dictionary\
    \ with its keys and values is defined as follows:\n\n```\nmydict = {\n    \"Age\"\
    : 23,\n    \"Gender\": \"Male\",\n    \"Education\": \"Student\"\n}\nprint(mydict)\n\
    ```\n\n```\n> {'Age': 23, 'Gender': 'Male', 'Education': 'Student'}\n```\n\nIn\
    \ order to access the items of a dictionary, we can refer to its key name inside\
    \ square brackets or call the get() method. Moreover, the corresponding value\
    \ to a key can be changed by assigning a new value to it. The keys() and values()\
    \ methods can be used for getting all keys and values in the dictionary.\n\n```\n\
    print(mydict[\"Age\"])\nprint(mydict.get(\"Age\"))\nmydict[\"Age\"] = 24\nprint(mydict[\"\
    Age\"])\nprint(mydict.keys())\nprint(mydict.values())\n```\n\n```\n> 23\n> 23\n\
    > 24\n> dict_keys(['Age', 'Gender', 'Education'])\n> dict_values([23, 'Male',\
    \ 'Student'])\n```\n\nIterating through dictionaries is a crucial technique to\
    \ access the items in dictionary. The return value of the loop can be keys of\
    \ the dictionary or by the key and corresponding value using the items().\n\n\
    ```\nfor x in mydict:\n    print(x) # printing Keys\nfor x in mydict:\n    print(mydict[x])\
    \ # printing Values\nfor x, y in mydict.items():\n    print(x, y) # printing Keys\
    \ and Values\n```"

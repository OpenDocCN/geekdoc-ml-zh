    # Part II

    Special Kernel Classifiers


    # Chapter 3

    Fractional Chebyshev Kernel Functions:

    Theory and Application


    ![](img/a1d5f013073c7da63184a763d887fe2f_50_0.png)


    Amir Hosein Hadian Rasanana, Sherwin Nedaei Janbesaraei,

    and Dumitru Baleanu


    **Abstract** Orthogonal functions have many useful properties and can be used
    for different purposes in machine learning. One of the main applications of the
    orthogonal functions is producing powerful kernel functions for the support vector
    machine algorithm. Maybe the simplest orthogonal function that can be used for
    producing kernel functions is the Chebyshev polynomials. In this chapter, after
    reviewing some essential properties of Chebyshev polynomials and fractional Chebyshev
    functions, various Chebyshev kernel functions are presented, and fractional Chebyshev
    kernel functions are introduced. Finally, the performance of the various Chebyshev
    kernel functions is illustrated on two sample datasets.


    **Keywords** Chebyshev polynomial · Fractional Chebyshev functions · Kernel trick
    · Orthogonal functions · Mercer’s theorem


    ## 3.1 Introduction


    As mentioned in the previous chapters, the kernel function plays a crucial role
    in the performance of the SVM algorithms. In the literature of the SVM, various
    kernel functions have been developed and applied on several datasets (Hussain
    et al. 2011; Ozer et al. 2011; An-na et al. 2010; Padierna et al. 2018; Tian and
    Wang 2017), but each kernel function has its own benefits and limitations (Achirul
    Nanda et al. 2018; Hussain et al. 2011). The radial basis function (RBF) (Musavi
    et al. 1992; Scholkopf et al. 1997) and polynomial kernel functions (Reddy et
    al. 2014; Yaman and Pelecanos 2013) perhaps are the most popular ones, because
    they are easy to learn, have acceptable performance in pattern classification,
    and are very computationally efficient. However, there are many other examples
    where the performance of those kernels is not satisfactory (Moghaddam and Hamidzadeh
    2016). One of the well-established alternatives to these two kernels is the orthogonal
    kernel functions which have many useful properties embedded in their nature. These
    orthogonal functions are very useful in various fields of science as well as machine
    learning (Hajimohammadi et al. 2021; Tian and Wang 2017; Sun et al. 2015). It
    can be said that the simplest family of these functions is Chebyshev. This family
    of orthogonal functions has been used in different cases such as signal and image
    processing (Shuman et al. 2018), digital filtering (Pavlović et al. 2013), spectral
    graph theory (Hadian Rasanana et al. 2019), astronomy (Capozziello et al. 2018),
    numerical analysis (Sedaghat et al. 2012; Zhao et al. 2017; Shaban et al. 2013;
    Kazem et al. 2012; Parand et al. 2019; Hadian-Rasanana and Rad 2020; Kazem et
    al. 2017), and machine learning (Mall and Chakraverty 2020). On the other hand,
    in the literature of numerical analysis and scientific computing, the Chebyshev
    polynomials have been used for solving various problems in fluid dynamics (Parand
    et al. 2017), theoretical physics (Parand and Delkhosh 2017), control (Hassani
    et al. 2019), and finance (Glau et al. 2019; Mesgarani et al. 2021). One of the
    exciting applications of the Chebyshev polynomials has been introduced by Mall
    and Chakraverty (Mall and Chakraverty 2015), where they used the Chebyshev polynomials
    as an activation function of functional link neural network. The functional link
    neural network is a kind of single-layer neural network which utilizes orthogonal
    polynomials as the activation function. This framework based on Chebyshev polynomials
    has been used for solving various types of equations such as ordinary, partial,
    or system of differential equations (Mall and Chakraverty 2017; Chakraverty and

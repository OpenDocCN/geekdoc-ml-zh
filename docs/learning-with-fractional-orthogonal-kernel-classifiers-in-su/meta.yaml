  md: '# 3.5 Conclusion


    This chapter is started with a brief history and basics of Chebyshev orthogonal
    polynomials. Chebyshev polynomials have been used in many use cases and recently
    as the kernel function in kernel-based learning algorithms and are proved to surpass
    traditional kernels in many situations. Construction of Chebyshev kernels explained
    and proved. It is demonstrated in this chapter that the fractional form of Chebyshev
    polynomials extends the applicability of the Chebyshev kernel. Thus, by using
    fractional Chebyshev kernel functions, a wider set of problems can be tackled.
    Experiments demonstrate fractional Chebyshev kernel leverages the accuracy of
    classification with SVM when being used as the kernel in the SVM kernel trick.
    In the last section, the results of such experiments are depicted.



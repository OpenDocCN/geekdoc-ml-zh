    # 9.2 Integral Equations


    Integral equations are divided into different categories based on their properties.
    However, there are three main types of integral equations Wazwaz (2011), i.e.,
    Fredholm, Volterra, and Volterra-Fredholm integral equations. While the Fredholm
    integral equations have constant integration bounds, in Volterra integral equations
    at least one of the bounds depends on the independent variable. Volterra-Fredholm
    integral equations also include both types of equations. These equations themselves
    are divided into subcategories such as linear/nonlinear, homogeneous/inhomogeneous,
    and first/second kind. In the next section, different classes of these equations
    are presented and discussed.'

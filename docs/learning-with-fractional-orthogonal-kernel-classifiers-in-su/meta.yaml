    $$G_n^\lambda(x, z) = \sum_{n=0}^{\infty} G_n^\lambda(x) z^n.$$


    Gegenbauer polynomials can be obtained by the following recursive formula (Olver
    et al. 2010; Yang et al. 2020; Hadian-Rasanan et al. 2019):


    $$G_0^\lambda(x) = 1, \quad G_1^\lambda(x) = 2\lambda x,$$

    $$G_n^\lambda(x) = \frac{1}{n}[2x(n + \lambda - 1)G_{n-1}^\lambda(x) - (n + 2\lambda
    - 2)G_{n-2}^\lambda(x)].$$


    Also, other recursive relations for this orthogonal polynomial are as follows
    (Doman 2015):


    $$(n + 2)G_{n+2}^\lambda(x) = 2(\lambda + n + 1)xG_{n+1}^\lambda(x) - (2\lambda
    + n)G_n^\lambda(x),$$

    $$nG_n^\lambda(x) = 2\lambda\{xG_{n-1}^{\lambda+1}(x) - G_{n-2}^{\lambda+1}(x)\},$$

    $$(n + 2\lambda)G_n^\lambda(x) = 2\lambda\{G_n^{\lambda+1}(x) - xG_{n-1}^{\lambda+1}(x)\},$$

    $$nG_n^\lambda(x) = (n - 1 + 2\lambda)xG_{n-1}^\lambda(x) - 2\lambda(1 - x^2)G_{n-2}^{\lambda-1}(x),$$

    $$\frac{d}{dx}G_n^\lambda = 2\lambda G_{n+1}^{\lambda-1}.$$



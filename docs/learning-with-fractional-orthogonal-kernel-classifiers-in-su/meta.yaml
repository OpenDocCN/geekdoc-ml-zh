    In other words, a real-valued function $K(\mathbf{x}, \mathbf{t})$ satisfies Mercer
    condition if for any square-integrable function $g(\mathbf{x})$, we have


    $$\int \int g(\mathbf{x}) K(\mathbf{x}, \mathbf{t}) g(\mathbf{t}) \mathrm{d}\mathbf{x}
    \mathrm{d}\mathbf{t} \geq 0. \tag{2.35}$$


    Therefore, using a valid and suitable kernel function, the optimization problem
    Eq. 2.29 becomes the following problem:


    $$\begin{aligned} \max_{\alpha} & \left\{ \sum_{i=1}^{N} \alpha_i - \frac{1}{2}
    \sum_{i=1}^{N} \sum_{j=1}^{N} \alpha_i \alpha_j y_i y_j K(\mathbf{x}_i, \mathbf{x}_j)
    \right\} \tag{2.36} \ \text{s.t.} & \sum_{i=1}^{N} \alpha_i y_i = 0, \ & 0 \leq
    \alpha_i \leq C, \quad i = 1, \ldots, N, \end{aligned}$$


    which is still a convex QP problem and is solved to find $\alpha_i$''s. Moreover,
    for classifying new data, the similarity of the input sample $\mathbf{x}$ is compared
    with all training data corresponding to the support vectors by the following formula:


    $$\hat{y} = \text{sign}\left(w_0 + \sum_{\alpha_i > 0} \alpha_i y_i K(\mathbf{x}_i,
    \mathbf{x})\right), \tag{2.37}$$


    where


    $$w_0 = y_{s_j} - \sum_{\alpha_i > 0} \alpha_i y_i K(\mathbf{x}_i, \mathbf{x}_{s_j}),
    \tag{2.38}$$


    such that $\mathbf{x}_{s_j}$ is an arbitrary sample from the support vectors set.



  md: '# Editors and Contributors


    # About the Editors


    **Jamal Amani Rad** is Assistant Professor at the Department of Cognitive Modeling,
    Institute for Cognitive and Brain Sciences, Shahid Beheshti University (SBU),
    Tehran, Iran. He received his Ph.D. in numerical analysis (scientific computing)
    from SBU in 2015. Following his Ph.D., he started a one-year postdoctoral fellowship
    at SBU in May 2016 where he is currently midway through his fifth year as Assistant
    Professor. He is currently focused on the development of mathematical models for
    cognitive processes in mathematical psychology, especially in risky or perceptual
    decision making. With H-index 20, he has published 94 research papers with 1320
    citations. He also has contributed a chapter to the book, *Mathematical Methods
    in Interdisciplinary Sciences*, as well as published two books in Persian. He
    has supervised 21 M.Sc. theses and 9 Ph.D. theses. He has so far developed a good
    scientific collaboration with leading international researchers in mathematical
    modelling: E. Larsson and L. Sydow at Uppsala University, L.V. Ballestra at the
    University of Bologna, and E. Scalas at the University of Sussex. He is a reviewer
    of a few reputed journals as well as has organized quite a few international level
    conferences and workshops on deep learning and neural network.


    **Kourosh Parand** is Professor at the Department of Computer and Data Sciences,
    Faculty of Mathematical Sciences, Shahid Beheshti University, Tehran, Iran. He
    received his Ph.D. in numerical analysis from the Amirkabir University of Technology,
    Iran, in 2007. He has published more than 250 research papers in reputed journals
    and conferences and has more than 4261 citations. His fields of interest include
    partial differential equations, ordinary differential equations, fractional calculus,
    spectral methods, numerical methods and mathematical physics. Currently, he is
    working on machine learning techniques such as least squares support vector regression
    and deep learning for some engineering and neuroscience problems. He also collaborates,
    as a reviewer, with different prestigious international journals.'

  md: '$K(x, z) = \sum_{i=0}^{n} P_i(x) P_i(z) = < \phi(x), \phi(z) >,$


    where $<, >$ is an inner product and the unique parameter $n$ is the highest order
    of the Legendre polynomials, and the nonlinear mapping determined by Legendre
    kernel is


    $\phi(x) = (P_0(x), P_1(x), ..., P_n(x)) \in \mathbb{R}^{n+1}.$


    Now, with this formula, it can be seen that the $\phi(x)$ values are orthogonal
    to each other, indicating that the Legendre kernel is also orthogonal Shawe-Taylor
    and Cristianini (2004).


    **Theorem 4.1** (Pan et al. (2012)) *Legendre kernel is a valid Mercer kernel.*


    *Proof* According to the Mercer theorem introduced at (Sect. 2.2.1), a valid kernel
    function that needs to be positive semi-definite, or equivalently should satisfy
    the necessary and sufficient conditions of Mercer''s theorem. As Mercer theorem
    states any SVM kernel to be a valid kernel should be non-negative, in a precise
    way:


    $\iint K(x, z)w(x, z)f(x)f(z)dxdz \geq 0,$


    where


    $K(x, z) = \sum_{i=0}^{n} P_i(x) P_i^T(z),$


    and $w(x, z) = 1$, and $f(x)$ is a function where $: f : \mathbb{R}^m \rightarrow
    \mathbb{R}$. Assuming each element is independent of the others, the Mercer condition
    $K(x, z)$ can be evaluated as follows:


    $\iint K(x, z)w(x, z)f(x)f(z)dxdz = \iint \sum_{j=0}^{n} P_j(x)P_j^T(z)f(x)f(z)dxdz,$

    $= \sum_{j=0}^{n} \iint P_j(x)P_j^T(z)f(x)f(z)dxdz,$

    $= \sum_{j=0}^{n} \left[ \int P_j(x)f(x)dx \int P_j^T(z)f(z)dz \right],$

    $= \sum_{j=0}^{n} \left[ \left( \int P_j(x)f(x)dx \right) \left( \int P_j^T(z)f(z)dz
    \right) \right],$

    $\geq 0.$



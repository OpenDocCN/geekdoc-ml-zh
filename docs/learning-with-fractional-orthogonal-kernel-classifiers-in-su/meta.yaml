    # 1.2 What Is the Pattern?


    In ML, we seek to design and build machines that can learn and recognize patterns,
    as is also called pattern recognition. To do this, the data need to have regularity
    or arrangement, called pattern, to be learned by ML algorithms. The data may be
    created by humans such as stock price or a signature or have a natural nature
    such as speech signals or DNS. Therefore, a pattern includes elements that are
    repeated in a predictable manner. The patterns in natural data, e.g., speech signals,
    are often chaotic and stochastic and do not exactly repeat. There are various
    types of natural patterns which include spirals, meanders, waves, foams, tilings,
    cracks, and those created by symmetries of rotation and reflection. Some types
    of patterns such as a geometric pattern in an image can be directly observed while
    abstract patterns in a huge amount of data or a language may become observable
    after analyzing the data using pattern discovery methods. In both cases, the underlying
    mathematical structure of a pattern can be analyzed by machine learning techniques
    which are mainly empowered by mathematical tools. The techniques can learn the
    patterns to predict or recognize them or can search them to find the regularities.
    Accordingly, if a dataset suffers from any regularities and repeatable templates,
    the modeling result of ML techniques will not be promising.


    # 1.3 An Introduction to SVM with a Geometric Interpretation


    Support Vector Machine (SVM), also known as support vector network, is a supervised
    learning approach used for classification and regression. Given a set of training
    labeled examples belonging to two classes, the SVM training algorithm builds a
    decision boundary between the samples of these classes. SVM does this in such
    a way that optimally discriminates between two classes by maximizing the margin
    between two data categories. For data samples in an $N$-dimensional space, SVM
    constructs an $N - 1$-dimensional separating hyperplane to discriminate two classes.
    To describe'

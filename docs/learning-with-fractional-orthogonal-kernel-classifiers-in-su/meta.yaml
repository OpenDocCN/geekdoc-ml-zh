    right demonstrates the Spiral dataset in fractional space of order 0.3 where the
    fractional Jacobi kernel of order 3, $\psi = -0.2$, $\omega = 0.3$, and the fractional
    order of 0.3 is applied.


    Applying Jacobi kernel has given a higher dimension to each data point of the
    Spiral dataset. Thus, a new order has emerged in this way, and consequently a
    chance to find a decision surface (in 3D) to do a binary classification. However,

- md: '## Chapter 6

    Fractional Jacobi Kernel Functions:

    Theory and Application


    Amir Hosein Hadian Rasanana, Jamal Amani Rad, Malihe Shaban Tameh,

    and Abdon Atangana


    **Abstract** Orthogonality property in some kinds of polynomials has led to significant
    attention on them. Classical orthogonal polynomials have been under investigation
    for many years, with Jacobi polynomials being the most common. In particular,
    these polynomials are used to tackle multiple mathematical, physics, and engineering
    problems as well as their usage as the kernels has been investigated in the SVM
    algorithm classification problem. Here, by introducing the novel fractional form,
    a corresponding kernel is going to be proposed to extend the SVM’s application.
    Through transforming the input dataset to a fractional space, the fractional Jacobi
    kernel-based SVM shows the excellent capability of solving nonlinear problems
    in the classification task. In this chapter, the literature, basics, and properties
    of this family of polynomials will be reviewed and the corresponding kernel will
    be explained, the fractional form of Jacobi polynomials will be introduced, and
    the validation according to Mercer conditions will be proved. Finally, a comparison
    of the obtained results over a well-known dataset will be provided, using the
    mentioned kernels with some other orthogonal kernels as well as RBF and polynomial
    kernels.


    **Keywords** Jacobi polynomial · Fractional jacobi functions · Kernel trick ·
    Orthogonal functions · Mercer’s theorem


    A. H. Hadian Rasanana (✉) · J. A. Rad

    Department of Cognitive Modeling, Institute for Cognitive and Brain Sciences,
    Shahid Beheshti University, Tehran, Iran

    e-mail: amir.h.hadian@gmail.com


    M. S. Tameh

    Department of Chemistry, University of Minnesota, Minneapolis, MN 55455, USA


    A. Atangana

    Faculty of Natural and Agricultural Sciences, Institute for Groundwater Studies,
    University of the Free State, Bloemfontein 9300, South Africa

    e-mail: AtanganaA@ufs.ac.za


    © The Author(s), under exclusive license to Springer Nature Singapore Pte Ltd.
    2023

    J. A. Rad et al. (eds.), *Learning with Fractional Orthogonal Kernel Classifiers
    in Support Vector Machines*, Industrial and Applied Mathematics,

    https://doi.org/10.1007/978-981-19-6553-1_6


    ### 6.1 Introduction


    Classical orthogonal functions have many applications in approximation theory
    Mastroianni and Milovanovic (2008), Boyd (2001), Askey and Wilson (1985) as well
    as in various numerical algorithms such as spectral methods Kazem (2013), Bhrawy
    and Alofi (2012), Abdelkawy et al. (2017). The most general type of these orthogonal
    functions is Jacobi polynomials Askey and Wilson (1985), Milovanovic et al. (1994),
    Asghari et al. (2022). There are some special cases of this orthogonal polynomial
    family such as Legendre, the four kinds of Chebyshev, and Gegenbauer polynomials
    Ezz-Eldien and Doha (2019), Doha et al. (2011). The Jacobi polynomials have been
    used to solve various problems in different fields of science Parand et al. (2016),
    Parand et al. (2019), Moayeri et al. (2021). Ping et al. used Jacobi–Fourier moments
    for a deterministic image, and then they reconstructed the original image with
    the moments Ping et al. (2007). In 2013, Kazem (2013) used Jacobi polynomials
    to solve linear and nonlinear fractional differential equations, which we know
    that the fractional differential equations have many use cases to show model physical
    and engineering processes. Shojaeizadeh et al. (2021) used the shifted Jacobi
    polynomials to address the optimal control problem in advection–diffusion reaction.
    Also, Bahrawy et al. (2012), Abdelkawy et al. (2017), Bhrawy (2016), Bhrawy and
    Zaky (2016) have many contributions to Jacobi applications. In Bhrawy and Alofi
    (2012), they proposed a shifted Jacobi–Gauss collocation method to solve the nonlinear
    Lane–Emden equations. Also, in Abdelkawy et al. (2017), the authors used Jacobi
    polynomials for solving multi-dimensional Volterra integral equations. In Bhrawy
    (2016), Bhrawy used Jacobi spectral collocation method for solving multi-dimensional
    nonlinear fractional sub-diffusion equations. Then, Bhrawy and Zaky (2016) used
    fractional order of Jacobi functions to solve time fractional problems. On the
    other hand, Jacobi polynomials are also used as a kernel in high-performance heterogeneous
    computers, named “the Jacobi iterative method” as an example, to gain higher speed
    up, in Morris and Abed (2012). In addition, the orthogonal rotation-invariant
    moments have many use cases in image processing and pattern recognition, including
    Jacobi moments. In particular, Rahul Upneja et al. (2015) used Jacobi–Fourier
    moments for invariant image processing using a novel fast method leveraging the
    time complexity.


    It can be said explicitly that the applications of these polynomials are so many
    that they have penetrated into various other branches of science such as neuroscience,
    etc., and have found important applications. In 2020, Moayeri et al. (2020) used
    Jacobi polynomials for the collocation method (the generalized Lagrange–Jacobi–Gauss–Lobatto,
    precisely) to simulate nonlinear spatio-temporal neural dynamic models and also
    the relevant synchronizations that resulted in a lower computational complexity.
    Hadian Rasanana et al. (2020) have used recently the fractional order of Jacobi
    polynomials as the activation functions of neural networks to simulate the nonlinear
    fractional dynamics arising in the modeling of cognitive decision-making. Also,
    Nkengfack et al. (2021) used Jacobi polynomials for the classification of EEG
    signals for epileptic seizures detection and eye states identification. As another
    application of these polynomials, Abdallah et al. (2021) have introduced contiguous

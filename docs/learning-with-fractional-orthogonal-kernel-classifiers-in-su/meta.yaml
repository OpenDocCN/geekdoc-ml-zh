    \   # complex\n```\n\n*type()* 是一个用于识别 Python 中任何对象类型的命令。类型转换是将变量类型更改为另一种类型的属性。这可以通过使用该类型并将变量作为输入来完成：\n\
    \n- *int()* 从浮点数（通过向下取整）或字符串（必须是整数）创建一个整数。\n- *float()* 从整数或字符串（可以是浮点数或整数）创建一个浮点数。\n\

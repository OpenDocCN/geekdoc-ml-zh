    # 5.3 Gegenbauer Kernel Functions


    In this section, the ordinary Gegenbauer kernel function has been covered considering
    addressing annihilation and explosion problems and proving the validity of such
    a kernel. Furthermore, the generalized Gegenbauer kernel function and also the
    fractional form of the Gegenbauer kernel function have been covered and its validation
    has been proved according to the Mercer theorem.'
  - "[PAGE 113]\n\n# 5.3.1 Ordinary Gegenbauer Kernel Function\n\nGegenbauer polynomials\
    \ have been used as a kernel function due to less need to support vectors while\
    \ acquiring high accuracy in comparison with well-known kernel functions such\
    \ as RBF or many other classical and orthogonal kernels (Padierna et al. 2018).\
    \ That is because Gegenbauer polynomials, same as any other orthogonal polynomial\
    \ kernels produce kernel matrices with lower significant eigenvalues which in\
    \ turn means fewer support vectors are needed (Padierna et al. 2018).\n\nAs we\
    \ know, a multidimensional SVM kernel function can be defined as follows:\n\n\
    $$K(X, Z) = \\prod_{j=0}^{d} K_j(x_j, z_j).$$\n\nIt can be seen that two undesired\
    \ results are produced, **annihilation effect**, when any or both of $x_j$ and\
    \ $z_j$ of $k(x_j, z_j)$ is/are close to zero, then kernel outputs very small\
    \ values, and the second one is considered as **explosion effect** which refers\
    \ to very big output of the kernel $|\\prod_{j=1}^{d} K(x_j, z_j)| \\longrightarrow\
    \ \\infty$ which leads to numerical difficulties (Padierna et al. 2018). To overcome\
    \ **annihilation** and **explosion** effects, Padierna et al. (2018) proposed\
    \ a new formulation for SVM kernel:\n\n$$k(X, Z) = \\langle \\phi(X), \\phi(Z)\
    \ \\rangle = \\prod_{j=1}^{d} \\sum_{i=0}^{n} p_i(x_j) p_i(z_j) w(x_j, z_j) u(p_i)^2,$$\n\
    \nwhere $w(x_j, z_j)$ is the weight function, the scaling function is $u(p_i)\
    \ \\equiv \\beta \\| p_i(.) \\|_{max}^{-1} \\in \\mathbb{R}^+$, which is the reciprocal\
    \ of the maximum absolute value of an $i$th degree polynomial within its operational\
    \ range, and $\\beta$ is a convenient positive scalar factor (Padierna et al.\
    \ 2018).\n\nThe Gegenbauer polynomials $G_n^\\lambda$ can be classified into two\
    \ groups considering the value of $\\lambda$:\n\n+   1. $-0.5 < \\lambda \\leq\
    \ 0.5$\n   As it is clear in Figs. 5.1, 5.2, the amplitude is $-1 \\leq G_n^\\\
    lambda(x) \\leq 1$, so a scaling function is not required and also the weight\
    \ function for this group is equal to 1 (Padierna et al. 2018).\n2. $\\lambda\
    \ > 0.5$\n   In this group of Gegenbauer polynomials, the amplitude may grow way\
    \ bigger than 1, thereby it is probable to face an *explosion effect* (Padierna\
    \ et al. 2018), as mentioned before a weight function and scaling function come\
    \ to play (see Figs. 5.3, 5.4, 5.5). In this case, the weight function for Gegenbauer\
    \ polynomials is\n\n$$w_\\lambda(x) = (1 - x^2)^{\\lambda - \\frac{1}{2}}.$$"

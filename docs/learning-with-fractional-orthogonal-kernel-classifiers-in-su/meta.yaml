    # 4.2.1 Properties of Legendre Polynomials


    Legendre polynomials of degree $n$, $P_n(x)$, are solutions to the following Sturm-Liouville
    differential equation Shen (1994), Kazem et al. (2013), Hadian Rasanana et al.
    (2020), Rad et al. (2014), Asghari et al. (2022):


    $$(1 - x^2)\frac{d^2y}{d^2x} - 2x\frac{dy}{dx} + n(n+1)y = 0, \quad (4.1)$$


    where $n$ is a positive integer. This family is also orthogonal over the interval
    $[-1, 1]$ with respect to the weight function $w(x) = 1$ Olver et al. (2010),
    such that


    $$\int_{-1}^{1} P_n(x)P_m(x) \, dx = \frac{2}{2n+1}\delta_{nm}, \quad (4.2)$$


    in which $\delta_{nm}$ is the Kronecker delta and is defined as follows:


    $$\delta_{mn} = \begin{cases} 1, & n = m, \ 0, & Otherwise. \end{cases} \quad
    (4.3)$$


    Besides the Sturm-Liouville differential equation, there is a generating function
    for these polynomials that can generate each order of the Legendre polynomials.
    By setting $|t| < 1$ and $|x| \le 1$, the generating function of the Legendre
    polynomials is obtained as follows Shen (1994), Kazem et al. (2013), Hadian Rasanana
    et al. (2020), Rad et al. (2014), Asghari et al. (2022):


    $$\frac{1}{\sqrt{1 - 2tx + t^2}} = \sum_{n=0}^{\infty} t^n P_n(x). \quad (4.4)$$


    Thus, the coefficient of $t^n$ is a polynomial in $x$ of degree $n$, which shows
    the $n$-th Legendre polynomial. Expanding this generating function up to $t^1$
    yields


    $$P_0(x) = 1, \quad P_1(x) = x. \quad (4.5)$$


    Similar to the Chebyshev polynomials, the Legendre polynomials can be obtained
    by utilizing a recursive formula which is given as follows Doman (2015), Shen
    (1994), Kazem et al. (2013), Hadian Rasanana et al. (2020), Rad et al. (2014),
    Asghari et al. (2022):


    $$P_0(x) = 1,$$ $$P_1(x) = x,$$ $$(n+1)P_{n+1}(x) - (2n+1)xP_n(x) + nP_{n-1}(x)
    = 0, \quad n \ge 1. \quad (4.6)$$'

  md: 'Then, the primal form is formulated as


    $$\min_{\mathbf{w}, e, w_0} \quad \frac{1}{2} \mathbf{w}^T \mathbf{w} + \frac{\gamma}{2}
    \sum_{i=1}^N e_i^2$$

    $$\text{s.t.} \quad y_i \left[ \mathbf{w}^T \phi(\mathbf{x}_i) + w_0 \right] =
    1 - e_i, \quad i = 1, \dots, N,$$


    where $\gamma$ is the regularization parameter and $e_i$ is the slack variables
    which can be positive or negative. The corresponding Lagrangian function is


    $$\mathcal{L}(\mathbf{w}, w_0, e, \alpha) = \frac{1}{2} \mathbf{w}^T \mathbf{w}
    + \frac{\gamma}{2} \sum_{i=1}^N e_i^2 - \sum_{i=1}^N \alpha_i \left\{ y_i \left[
    \mathbf{w}^T \phi(\mathbf{x}_i) + w_0 \right] - 1 + e_i \right\}.$$


    The optimality conditions yield


    $$\begin{cases} \frac{\partial \mathcal{L}}{\partial \mathbf{w}} = 0 \rightarrow
    \mathbf{w} = \sum_{i=1}^N \alpha_i y_i \phi(\mathbf{x}_i), \ \frac{\partial \mathcal{L}}{\partial
    w_0} = 0 \rightarrow \sum_{i=1}^N \alpha_i y_i = 0, \ \frac{\partial \mathcal{L}}{\partial
    e_i} = 0 \rightarrow \alpha_i = \gamma e_i, \quad i = 1, \dots, N, \ \frac{\partial
    \mathcal{L}}{\partial \alpha_i} = 0 \rightarrow y_i \left[ \mathbf{w}^T \phi(\mathbf{x}_i)
    + w_0 \right] - 1 + e_i = 0, \quad i = 1, \dots, N, \end{cases}$$


    which can be written in the matrix form


    $$\begin{bmatrix} 0 & y^T \ y & \Omega + I/\gamma \end{bmatrix} \begin{bmatrix}
    w_0 \ \alpha \end{bmatrix} = \begin{bmatrix} 0 \ 1_v \end{bmatrix},$$


    where


    $$Z^T = \left[ \phi(\mathbf{x}_1)^T y_1; \dots; \phi(\mathbf{x}_N)^T y_N \right],$$

    $$y = [y_1; \dots; y_N],$$

    $$1_v = [1; \dots; 1],$$

    $$e = [e_1; \dots; e_N],$$

    $$\alpha = [\alpha_1; \dots; \alpha_N],$$


    and


    $$\Omega_{i,j} = y_i y_j \phi(\mathbf{x}_i)^T \phi(\mathbf{x}_j)$$

    $$= y_i y_j K(\mathbf{x}_i, \mathbf{x}_j), \quad i, j = 1, \dots, N.$$'

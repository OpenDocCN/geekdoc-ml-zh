    x''_j) u(G_j^\lambda)^2 g(x)g(z)dxdz. \quad (5.44)$$


    在最后一个方程中，考虑了分数阶双变量权重函数（即式 5.41），因此我们有：


    $$\iint \sum_{i=0}^{n} G_i^\lambda(x''_j)G_j^\lambda(x''_j) \left[ \left( \left(

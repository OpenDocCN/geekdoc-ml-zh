    as


    $K_{FLegendre}(X, Z) = \prod_{j=1}^{m} \sum_{i=0}^{n} FP_i^{\alpha}(x''_{x_j})
    FP_i^{\alpha}(x''_{z_j}) fw(x''_{x_j}, x''_{z_j})$, (4.34)


    where $m$ is the dimension of vectors $X$ and $Z$. According to the procedure
    we have in this book, after introducing a kernel, we should guarantee its validity.
    So we can continue with the following theorem.


    **Theorem 4.2** *The fractional Legendre kernel is a valid Mercer kernel.*


    **Proof** According to Mercer''s theorem introduced at (Sect. 2.2.1), a valid
    kernel should satisfy the sufficient conditions of Mercer''s theorem. As we know,
    Mercer''s theorem states any SVM kernel to be a valid kernel must be non-negative,
    in a precise way:


    $\iint K(x, z)w(x, z) f(x) f(z) dxdz \geq 0$, (4.35)


    where


    $K(x, z) = \sum_{i=0}^{n} FP_i^{\alpha}(x''_{x_j}) FP_i^{\alpha}(x''_{z_j})^T
    fw(x''_{x_j}, x''_{z_j})$, (4.36)


    and $fw(x, z) = (xz^T)^{\alpha-1}$, where $f(x)$ is function as $f : \mathbb{R}^m
    \rightarrow \mathbb{R}$. Thus, we have


    $\iint K(x, z)w(x, z) f(x) f(z) dxdz$'

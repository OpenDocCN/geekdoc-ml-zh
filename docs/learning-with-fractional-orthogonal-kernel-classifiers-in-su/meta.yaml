    \n二次规划（QP）是解决特定数学问题的过程。如前几章所述，需要求解二次方程并找到其最小值以创建最佳分离线。因此，我们计算K矩阵并准备所有约束矩阵以构成一个二次问题。之前使用CVXOPT库来解决上述二次方程。代码中一个复杂的部分是QP求解器函数。然而，CUDA\

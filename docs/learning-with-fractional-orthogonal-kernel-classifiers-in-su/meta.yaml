    is applied. In other words, when a kernel function such as the Chebyshev kernel
    function is applied, data points may spread over a new axis while concentrating
    on a 2D axis and making it possible to classify those points considering the higher
    dimension instead. This kind of transformation combined with a kernel function
    creates a new dimension for the original dataset and makes it possible for the
    kernel function''s decision boundary to capture and classify the data points with
    a better chance of accuracy.'

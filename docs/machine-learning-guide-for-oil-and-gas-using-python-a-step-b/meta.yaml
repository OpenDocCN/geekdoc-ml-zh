    ## Genetic algorithm example: EUR optimization\n\nIn this example, the objective\
    \ is to use a genetic algorithm to find optimum drilling and completions parameters\
    \ that maximize a well’s estimated ultimate recovery (EUR). In order to do that,\
    \ it is necessary to have a model that predicts EUR of a well with respect to\
    \ various geological, drilling, and completion parameters. This model would be\
    \ the fitness function that evaluates the effectiveness of drilling and completions\
    \ jobs. Shale Gas Wells example that was covered in Chapters 6 and 7 is used for\
    \ optimization. The genetic algorithm is implemented to find the optimum lateral\
    \ length and proppant amount that leads to the highest EUR for a well in a specific\
    \ location. Similar to previous examples, the first step is to load the Shale\
    \ Gas Well’s data, define input and output, normalize the data to 0 to 1 range,\
    \ split the data into train and test, and finally train a neural network. The\
    \ mentioned steps can be done in Python with the following codes:\n\n```\nimport\
    \ numpy as np\nimport pandas as pd\nimport matplotlib.pyplot as plt\nfrom sklearn.pipeline\
    \ import make_pipeline\nfrom sklearn.neural_network import MLPRegressor\nfrom\
    \ mpl_toolkits.mplot3d import Axes3D\nfrom sklearn.preprocessing import MinMaxScaler\n\
    #Import the data set\ndataset=pd.read_csv('Chapter9_Shale Gas Wells.csv')\nX=dataset.iloc[:,0:13]\n\
    y=dataset.iloc[:,13].values\n# Fix the seed number for splitting the data into\
    \ training and testing\nseed=15\nnp.random.seed(seed)\nfrom sklearn.model_selection\
    \ import train_test_split\nX_train, X_test, y_train, y_test=train_test_split(X,\
    \ y, test_size=0.25)\n```\n\n```\n#Specifying the neural network topology with\
    \ MLPRegressor including 2\n#hidden layers\nglobal modelNN\nmodelNN=make_pipeline(MinMaxScaler(),\
    \ MLPRegressor(\n    hidden_layer_sizes=(25,25),learning_rate_init=0.01,\n   \
    \ early_stopping=True,max_iter=500))\n#Training the model\nmodelNN.fit(X_train,\
    \ y_train)\nprint(\"Test R2 score: {:.2f}\".format(modelNN.score(X_test,\n   \
    \ y_test)))\nPython Output=\nTest R2 score: 0.79\n```\n\nPipeline was used to\
    \ normalize the data and then feed it to the neural network. There are two hidden\
    \ layers with 25 neurons per layer, with the initial learning rate of 0.01. The\
    \ R² for the test data set is 0.79. The next step is to import the genetic algorithm\
    \ optimizer and call it to find the maximum values for the well's EUR with two\
    \ variables: lateral length and proppant loading. \"Genetic algorithm\" library\
    \ should be installed by \"pip install genetic algorithm\" command in Anaconda\
    \ prompt (pypi). The genetic algorithm generally finds the minimum of a function.\
    \ Therefore, the neural network function should be multiplied by -1 to return\
    \ the maximum value. Afterward, it is necessary to specify the range of variables\
    \ as the solution space. A 2D array, named \"varbound,\" is used to define the\
    \ minimum and maximum of each variable. In the Shale Gas Wells example, there\

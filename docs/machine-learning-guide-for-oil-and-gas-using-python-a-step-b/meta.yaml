    Before applying DBSCAN, it is important to estimate the value of epsilon using
    the KNN library. Therefore, first import the library followed by applying KNN
    with 6 neighbors. The reason for picking 6 is because this is a three-dimensional
    database where 2*number of dimensions is recommended to be used for MinPts. Since
    MinPts is 6, the number of neighbors chosen to be used in the KNN algorithm is
    also 6. Therefore, after creating a KNN model with K = 6, that created model can
    be used to fit "df_scaled" (standardized data). In unsupervised KNN algorithm,
    the distance from each point to its closest neighbors is calculated. In this example,
    since K = 6, the distance from each point to the 6 nearest neighbors is calculated.
    KNN method yields two arrays. The first array contains the distance to the closest
    nearest neighbor points, and the second array is simply the index for each of
    those points. Please note that "NearestNeighbors" implements unsupervised nearest
    neighbors learning. KNN can also be applied for supervised regression and classification
    problems. Supervised KNN algorithm will be discussed in detail in the next chapter.'

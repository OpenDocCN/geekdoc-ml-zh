  md: 'Longer vertical lines in the dendrogram diagram indicate larger distance between
    clusters. As a general rule of thumb, identify clusters with the longest distance
    or branches (vertical lines). Shorter branches are more similar to one another.
    For instance, in Fig. 4.15, one cluster combines two smaller branches (clusters
    1 and 2) and another cluster combines the other two smaller branches (clusters
    3 and 4). Therefore, two clusters can be chosen in this example. Please note that
    the optimum number of clusters is subjective and could be influenced by the problem,
    domain knowledge of the problem, and application.



    # How does DBSCAN work?


    Below are the steps when applying DBSCAN algorithm:


    +   1) DBSCAN starts with an arbitrary point. The neighboring observations are
    then retrieved from the epsilon (ε) parameter.

    2) If this point contains **MinPts** based on the defined epsilon radius, DBSCAN
    starts forming clusters. Otherwise, this point is labeled as "noise." Please note
    that this point can later be found within the radius of investigation of another
    point. Therefore, it could potentially become part of a cluster.

    3) If a point is found to be a core point, the points within the radius of investigation
    (epsilon) is part of the cluster.

    4) This process is continued until the **density-connected cluster** is found.

    5) A new point can restart the workflow which could either be classified as part
    of a new cluster or labeled as noise.


    A density-connected cluster as defined by Ester et al. is as follows:


    > A point *a* is density-connected to a point *b* with respect to *epsilon* and
    *MinPts*, if there is a point *c* such that, both *a* and *b* are density reachable
    from *c* w.r.t. *epsilon* and *MinPts*.



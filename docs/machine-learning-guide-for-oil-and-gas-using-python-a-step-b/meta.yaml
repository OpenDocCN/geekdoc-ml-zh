    \ forest models covered previously.\n\n## Gradient boosting\n\nGradient boosting\
    \ is another type of ensemble supervised ML algorithm that can be used for both\
    \ classification and regression problems. The main reason why algorithms such\
    \ as random forest, extra trees, gradient boosting, etc., are called **ensemble**\
    \ is because a final model is generated based on many individual models. As described\
    \ under the bagging/boosting comparison section, gradient boosting will train\
    \ many models sequentially by placing more weights on instances with erroneous\
    \ predictions. Therefore, challenging cases are the focus during training. A sequential\
    \ model training using gradient boosting will gradually minimize a loss function.\
    \ The loss function is minimized similarly to an artificial neural network model\
    \ (will be discussed in the next chapter) in which weights are optimized. In gradient\
    \ boosting, after building the weak learners, the predictions are compared with\
    \ actual values. The difference between prediction and actual values represents\
    \ the error rate of the model. The error rate of the model can now be used to\
    \ calculate the gradient, which is essentially the partial derivative of the loss\
    \ function. The gradient is used to find the direction that the model parameters\
    \ would have to change to reduce the error in the next round of training. As opposed\
    \ to a neural network model where the objective function is to minimize a loss\
    \ function in a **single model**, multiple models' predictions are combined in\
    \ gradient boosting. Therefore, gradient boosting uses some of the hyperparameters\
    \ used in random forest/extra trees and other hyperparameters such as learning\
    \ rate, loss function, etc., that are used in an ANN model. These hyperparameters\
    \ will be discussed in detail in the next chapter.\n\n## Gradient boosting implementation\
    \ using scikit-learn\n\nIn this section, the goal is to use gradient boosting\
    \ to train a ML model to predict net present value (NPV) per well @ $3/MMBTU gas\
    \ pricing using the following input features:\n\n- Lateral length (ft), stage\
    \ length (ft), sand to water ratio or SWR (lb/gal), sand per ft (lb/ft), water\
    \ per ft (BBL/ft), estimated ultimate recovery or EUR (BCF)\n\nThe data set for\
    \ this example can be found below:\nhttps://www.elsevier.com/books-and-journals/book-companion/9780128219294\n\
    Therefore, let’s open a new Jupyter Notebook and start importing the following\
    \ libraries and data set as follows:"

  - '[PAGE 310]


    The first technique to calculate correlations between EUR and all the attributes
    is called "Spearman''s rank correlation." This is a nonparametric measurement
    that shows how two variables are statistically dependent in a monotonic way (increasing
    or decreasing trends). In this method, Spearman''s correlation coefficient or
    ρ is calculated to measure the degree of influence between two variables. ρ is
    between −1 and 1. As ρ gets closer to 1 or -1, the two variables become heavily
    correlated. Positive ρ values show increasing trend and negative ρ values show
    decreasing trends between values. "Spearmanr" in "stats" library of Python returns
    a covariance or ρ matrix and P-value matrix (P-value is a hypothesis test to see
    whether a pair of variables are correlated). ρ matrix includes correlation coefficients
    between each pair of variables. Spearman technique can be used to rank the features
    impacting EUR in the Shale Gas Wells data set using the following lines of code:


    ```

    from scipy import stats

    import matplotlib.pyplot as plt

    datanorm=sc.fit_transform(dataset)

    stats.spearmanr(dataset)

    rho, pval=stats.spearmanr(datanorm)

    corr=pd.Series(rho[:13,13], index=X.columns)

    corr.plot(kind=''barh'')

    plt.show()

    Python output=Fig. 6.8

    ```


    Please note that "rho" is a 14×14 matrix representing correlation coefficients
    between each pair of variables. To find the relationship between EURs and other
    attributes, one can use a bar plot of the ρ values at the last column of rho matrix
    (rho[:13,13]) versus column headers (X.columns). Feature importance of the Shale
    Gas Wells using "Spearman''s rank correlation" is shown in Fig. 6.8.


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_310_0.png)


    FIGURE 6.8 Feature ranking for Shale Gas Wells using Spearman''s rank correlation.'

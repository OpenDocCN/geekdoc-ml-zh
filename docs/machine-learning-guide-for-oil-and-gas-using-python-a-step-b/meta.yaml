    # Jupyter Notebook interface options


    To run a line in Jupyter Notebook, the "Run" button or preferably "SHIFT + ENTER"
    can be used. To add a line in Jupyter Notebook, hit "ALT + ENTER" or simply use
    "Insert → Cell Below." "Insert Cell Above can also be used for inserting a cell
    above where the current cell is. To delete a line in Jupyter Notebook, while that
    line is selected, hit "DD" (in other words, hit the "D" word key button twice
    in a row). If at any point when coding, the Jupyter Notebook would like to be
    stopped, select "Kernel → Interrupt" or "Kernel → Restart" to restart the cell.
    "Kernel → Restart and Run All" is another handy tool in Jupyter Notebook that
    can be used to run the whole notebook from top to bottom as opposed to using "SHIFT
    + ENTER" to run each line of code manually which can reduce productivity. Below
    are some of the handy shortcuts that are recommended to be used in Jupyter Notebook:


    +   - Shift + Enter → Run the current cell, select below

    - Ctrl + Enter → Run selected cells

    - Alt + Enter → Run the current cell, insert below

    - Ctrl + S → Save and checkpoint

    - Enter → Takes you into an edit mode

    - When in command mode "ESC" will get you out of edit mode.

    - H → Shows all shortcuts (use H when in command mode)

    - Up → Select cell above

    - Down → Select cell below

    - Shift + Up → Extends selected cells above (use when in command mode)'

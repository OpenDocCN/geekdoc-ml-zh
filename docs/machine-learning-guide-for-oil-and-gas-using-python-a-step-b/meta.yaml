  md: '![](img/84bb0bcf926cd79dfa24aaffa8e553c8_393_0.png)


    (i) fuzzification, the fuzzy sets are defined for the variables of this system
    (both inputs and output variables). The membership functions can be seen in Fig.
    8.16. The temperature is described using "Cold" and "Hot" linguistic values using
    a trapezoidal membership function as explained above. The humidity is described
    using "Low" and "High" values with Trapezoidal membership function. The Fan Speed
    is defined using three membership functions corresponding to Low, Medium, and
    High Fan Speeds, using Trapezoidal, Triangular, and Trapezoidal membership functions.
    The universe for each membership function can be observed in Fig. 8.16 as x-axis
    limits.


    Next step is the Fuzzification of each crisp input value Ii, where degrees of
    membership (values between 0 and 1) are assigned to different fuzzy sets defined
    for that input variable Ii. For example, for a temperature control system assuming
    temperature value of 75°F, the membership values to fuzzy sets "Cold" and "Hot"
    can be obtained by plugging in 75 into μCold(x) and μHot(x) which results in 0.25
    and 0.75, respectively. Now these membership values can be used in fuzzy rules
    defined in next step (ii) Fuzzy rules definition, to derive implications and consequently
    decisions.


    # Fuzzy rules


    Another important component of fuzzy sets are (ii) fuzzy rules definition, how
    they should be interpreted, and how decisions can be inferred from them. Fuzzy
    rules are defined as follows:


    > If x is C → y is D. (8.22)'

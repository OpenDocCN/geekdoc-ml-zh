    # Partial dependence plots


    When a machine learning model is trained, and its prediction performance is verified
    with evaluation techniques like cross-validation, it is possible to use the model
    for prediction or sensitivity analysis. It is sometimes required to understand
    what is the impact of one or several input attributes on the target value. One
    way is to create a matrix of all the input attributes and keep the value of each
    attribute equal to average or any other desired value. Then, vary the one specific
    attribute that is required for sensitivity analysis within the desired range.
    Finally, by using the matrix of input data (with one variable attribute) and predicting
    the model response, the dependency between target and input attribute can be identified.


    In Python, the interaction between the target and an input variable can be visualized
    by "partial dependence plots (PDPs)." What PDP does, is to plot the average of
    the model''s outcome over multiple combinations of input variables versus a specific
    input. In order to visualize the relationship between the target and two input
    variables, heat map, contour lines, or 3D plots can be used (scikit).


    In Chapter 6, the neural network was used to correlate gas EUR to 13 different
    geology, drilling, and completion variables. In this chapter, PDPs are used to
    find the dependency between gas EUR and some important input variables. In Chapter
    6, based on feature ranking analysis, it was determined that lateral length and
    proppant loading had the highest impact on the EUR. The partial dependence relations
    for pairs of some input variables and gas EUR can be plotted in Python by the
    following code:


    ```


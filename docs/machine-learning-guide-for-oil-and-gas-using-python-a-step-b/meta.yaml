    ## Density-based spatial clustering of applications with noise (DBSCAN)\n\nDBSCAN\
    \ is a density-based clustering algorithm in which the data points are partitioned\
    \ into high-density regions separated by low-density regions. This algorithm is\
    \ proposed by Martin Ester, Hans-Peter Kriegel, Jörg Sander, and Xiaowei Xu in\
    \ 1996 (Ester et al., 1996, pp. 226–231). The main reasons for using this algorithm\
    \ are as follows:\n\n- Clusters with arbitrary shapes can be detected\n- DBSCAN\
    \ is very efficient for very large data sets\n\nIn DBSCAN, density of each instance\
    \ is measured based on the number of samples within a specific radius (ε) of that\
    \ instance. Each circle with radius epsilon (ε) has minimum number of data points.\
    \ DBSCAN is defined by **two parameters**: (i) epsilon (ε) and (ii) MinPts. Parameter\
    \ ε specifies the radius of the circle and how close observations (points) must\
    \ be from one another to be considered as part of the same cluster. MinPts is\
    \ defined as the **minimum** number of observations (neighbors) that should be\
    \ within the radius of a data point to be considered as a core point. As illustrated\
    \ in Fig. 4.22, there are three main classifications of a point as follows:\n\n\
    - **Core point**: a core point specifies a dense area. A core point must have\
    \ at least MinPts number of neighboring samples within radius ε from it (Al-Fuqaha,\
    \ n.d.).\n- **Border point**: a border point has fewer than a specified number\
    \ of points (MinPts) within epsilon but it is in the neighborhood of a core point.\n\
    - **Noise point**: a noise point is a point that is neither a core point nor a\
    \ border point.\n\nOne of the biggest advantages of DBSCAN is that noise points\
    \ can be removed and each point is not assigned to a cluster (unlike k-means clustering).\n\
    \n150 Machine Learning Guide for Oil and Gas Using Python\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_150_0.png)\n\
    \nFIGURE 4.22 DBSCAN illustration.\n\nIn addition, the number of clusters are\
    \ not required to be defined since epsilon (ε) and MinPts will be used to determine\
    \ the **desired density of clusters resulting in specific** number of clusters.\
    \ However, choosing these hyperparameters requires domain expertise. Visualization\
    \ and interpretation of the resulting clustered data is crucial after applying\
    \ DBSCAN. If epsilon parameter is set to be too high, DBSCAN might interpret only\
    \ one cluster. On the other hand, if epsilon parameter is set to be too low, DBSCAN\
    \ could yield many unnecessary clusters. In addition, if MinPts (min sample) is\
    \ set too high, DBSCAN could interpret good neighboring points as noise. Therefore,\
    \ one of the biggest challenges in DBSCAN application is setting epsilon and MinPts\
    \ parameters when using the algorithm. It is highly recommended to perform several\
    \ iterations to fine tune these hyperparameters followed by visualizing until\
    \ satisfactory clustering is achieved. In addition, the following guidelines can\
    \ be used to estimate the hyperparameters (Schubert et al., 2017):\n\n- For two-dimensional\
    \ data, use default value of MinPts = 4\n- For larger dimensional data sets, MinPts\
    \ = 2*dimensions\n\nAfter determining MinPts, epsilon can be determined as follows:\n\
    \nPlot samples sorted by distance on the x-axis versus k-nearest neighbor (KNN)\
    \ distance on the y-axis where K = MinPts (Rahmah & Sitanggang, n.d.)\n\nFinally,\

    ## 模糊规则


    模糊集的另一个重要组成部分是 (ii) 模糊规则定义，它们应如何解释，以及如何从中推导决策。模糊规则定义如下：


    > 如果 x 是 C → y 是 D。 (8.22)


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_394_0.png)


    其解释为：如果输入 x 在模糊集 C 中（前提），则要做出的决策在模糊集 D 中（结论）。在此规则中，集合 C 和 D 是分别用于表征输入和输出语言变量的模糊集。第一个表达式称为前提，第二个表达式称为规则的结论。这些规则用于根据输入到模糊系统的精确输入推导结论（控制系统）。


    对于一个具有 N 个输入变量 $I_1, \cdots, I_N$ 的系统，每个输入变量有 $C_1, \cdots, C_N$ 个不同的语言值，可以推导出的规则总数为
    $2^{2N-1} \prod_{i=1}^{N} C_i$，其中 $2^{2N-1}$ 考虑了规则的不同组合（AND、OR）以及使用模糊集或其补集（NOT）。请注意，逻辑中的
    AND 运算定义为交集，OR 运算定义为并集，NOT 定义为补集，这些在前面的章节中已定义。例如，在前面定义的具有两个输入变量（温度和湿度）的温度控制系统中。输出或控制动作是风扇转速。温度有两个语言值“冷”和“热”，湿度有“低”和“高”，风扇转速有三个语言值“低”、“中”和“高”。对于这个系统，可以推导出四条规则，如表
    8.1 所示。请注意，如果考虑输入值的补集（NOT），可以定义另一组 12 条规则，使用不同模糊集的 AND 组合，总共产生 16 条规则。此外，如果使用输入值模糊集的
    OR 组合，可以推导出另外 16 条规则，总共产生 $2^{2 \times 2^{-1}(2 \times 2)} = 32$ 条可能的规则。


    对于此示例，温度控制系统考虑以下规则集：


    - 1) 如果温度是冷 AND 湿度是低 $\rightarrow$ 风扇转速低，

    - 2) 如果温度是冷 AND 湿度不是低 $\rightarrow$ 风扇转速中，

    - 3) 如果温度是热 OR 湿度是高 $\rightarrow$ 风扇转速中，

    - 4) 如果温度是热 AND 湿度是高 $\rightarrow$ 风扇转速高。


    请注意，通常使用规则的聚合进行决策，这些规则由领域专家根据不同的输入值和相应的控制动作定义。



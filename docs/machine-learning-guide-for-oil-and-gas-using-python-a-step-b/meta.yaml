    DL has many applications especially in the fields where enough labeled data are
    available. Speech recognition uses DL in many appliances such as cell-phones to
    recognize voice patterns. Image recognition is another widely used application
    of DL in automotive, gaming, e-commerce, medicine, manufacturing, and education
    industries. Another important usage of DL is in natural language processing (NLP)
    for text classification/extraction/summarization, autocorrection, translation,
    and market intelligence. DL is also used for self-driving cars, fraud detection,
    movie making, and product recommendation systems.


    There are more than 10 types of DL algorithms. Each algorithm can be suitable
    to handle specific applications that were mentioned earlier. The most widely used
    DL algorithms are Convolutional Neural Networks (CNNs), Recurrent Neural Networks
    (RNNs), LSTMs (which is a subset of RNN), Self-Organizing Map (SOM), Autoencoders,
    and Generative Adversarial Networks (GANs). For example, CNNs are incredibly powerful
    in image recognition while RNNs can handle text and speech recognition. In this
    section, the theories for CNN, RNN, and LSTM are explained. Finally, an example
    of using LSTM for predicting hydraulic fracturing treatment pressure is illustrated.


    # Convolutional neural network (CNN)


    CNNs were originally developed to handle image recognition specifically for handwritten
    digits. CNNs work by decomposing the image into three scales from low order to
    high order. In the low order, small details or local features of the image like
    lines, edges, and curves can be extracted by early layers of the neural network.
    Afterward, deeper layers would assemble these features, and final layers reconstruct
    the whole image (Kelleher). The whole process of CNN training for image classification
    includes different operations such as convolution, activation function, pooling,
    and fully connected layers. Each operation is explained in detail below.'
  - '[PAGE 326]


    # Convolution


    In the image recognition and classification, the first step is to discretize the
    image into pixels. Each pixel can have a value depending on the shape and the
    color. Let us start with a simple example and discretize a plus sign image into
    7 by 7 pixels. Black pixels can be represented by 1 and white pixels by zero (Fig.
    6.22).


    The convolution operation, the main part of the CNN, applies specific filters
    or kernel functions to a selected region of the image to detect local features.
    In other words, by convolution, it is possible to focus on a specific feature
    of the image at a time by applying specific filters. The filter moves over the
    image to detect specific patterns related to each feature (like line, edge, curve,
    etc.). Where the pattern is found in a selected region, kernel function returns
    large positive values. If a 2D matrix is assigned for each specific filter, the
    convolution operation can be considered as the sum of all elements of the dot
    product between the selected region (a 2D matrix) and the filter. Let us consider
    a 3 by 3 matrix as a filter for line detection. A 3 × 3 matrix with all elements
    in the middle column equaling to 1 is for vertical line detection, and a 3 × 3
    matrix with all elements in the middle row equaling to 1 is for horizontal line
    detection (all the other elements are equal to zero). The filter starts at the
    3 × 3 pixel region at the first column and the first row of the image. The sum
    of all elements of the dot product result is then stored in the first element
    of the feature map which is a 5 × 5 matrix. The filter slides one column to right
    and repeats the same operation until it reaches to the last column. Next, it starts
    all over from the first column and slides one row down and the same process is
    applied. It then produces element 2, 1 of the 5 × 5 feature map. This process
    repeats until the whole image is covered. The convolution process using vertical
    and horizontal line filters is illustrated in Fig. 6.23. Multiple filters (kernel
    functions) can be used to extract a variety of feature map of the image. The array
    of all these feature maps constitutes the convolutional layer of the network.


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_326_0.png)'
  - '[PAGE 327]


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_327_0.png)


    FIGURE 6.23 Image convolution using vertical and horizontal line filters.


    # Activation function


    In most of the pattern recognition practices, the relationship between input and
    output is nonlinear. To capture nonlinear patterns, the activation function, a
    nonlinear transformation is used. Activation functions were discussed in this
    chapter. The most common activation function for CNNs is rectified linear unit
    (ReLU) (Fig. 6.3). After convolution process, ReLu activation function is applied
    to each element of the feature map. As an example, the resultant feature map for
    vertical line feature after applying the ReLu activation function is shown in
    Fig. 6.24. Please note that ReLU function returns zero for any negative value.
    Since there is no negative value in the feature map in this example, applying
    ReLU activation function does not change the initial feature map.


    # Pooling layer


    The next step in the CNN includes pooling, reducing the size of convoluted feature
    maps by extracting the dominant features. This dimensionality reduction of feature
    maps retains important information while reducing required computational power
    especially for processing large images. In pooling operation, a section of the
    image is covered by a filter or kernel'
- md: '## Fully connected layers


    After the pooled feature maps are generated, they go through a flattening process
    to generate a one-dimensional matrix that will be considered as the input layer
    for a deep neural network. A flattening example is shown in Fig. 6.26. Next, the
    neural network goes through a training process to classify the images. The whole
    workflow is shown in Fig. 6.27.


    ## Recurrent neural networks


    In many data analytics problems, it is necessary to deal with sequential data
    such as time series or text sentences. When time or sequence is involved, neural
    network should be able to deal with the importance of the data at each time step.
    This can be illustrated in the oil and gas industry by forecasting oil production
    in the future. When oil production from a well is declining, the oil rate at each
    time step is not only a function of geology, completion, drilling, and surface
    facilities but is also heavily related to oil rate at previous time steps. RNNs
    are designed to handle consecutive data. The main specification of the RNN is
    that the output value of the previous time step is used to calculate the output
    at the current time step. The schematic of a RNN is shown in Fig. 6.28.


    In RNN, the hidden layer state of previous time step ($A^{t-1}$) which is considered
    the memory is carried forward and multiplied by a weight vector ($W_{aa}$). Then,
    the current hidden layer state ($A^t$) and output ($O^t$) can be calculated with
    the following equation:


    $$A^t = F(W_{ai}I^t + W_{aa}A^{t-1} + \theta_a)$$


    $$O^t = F(W_{ao}A^t + \theta_o)$$


    where $F$ is activation function, $W_{ai}$ is the weight matrix between input
    layer and hidden layer, $W_{ao}$ is the weight matrix between hidden layer and
    output, $\theta_a$ is the hidden layer bias, and $\theta_o$ is output layer bias.
    The schematic of a hidden layer in RNN is shown in Fig. 6.29.


    For the training of the RNNs, backpropagation technique is used. The overall process
    is similar to what was explained early in this chapter. However, since there are
    multiple sequences or hidden layers in RNNs, using gradient descent technique
    can be challenging. For example, the error gradient for the early time steps becomes
    very small referred to as diminishing gradient problem. It this case, earlier
    layers, weights do not change, and neural network cannot learn from the data during
    the training process. To handle diminishing gradient problem, Hochreiter and Schmidhuber
    introduced LSTM in 1997 (Raschka & Mirjalili).


    LSTM consist of connected memory cells that control the flow of information during
    the training process for sequential data. Each cell includes 3 operating units
    that interact with each other to preserve the error through sequential backpropagation.
    These units that act similar to computer memories are: input gate, forget gate,
    and output gate. The job of these gates is to control when data should enter,
    be stored, and/or leave the cells. The schematic of connected cells and cell components
    are shown in Fig. 6.30.


    One important feature of each cell, considered as cell''s memory, is cell state
    (C). The cell states move through all the cells sequentially and are responsible
    for either retaining or forgetting the previous information. At each time step,
    cell state from previous time ($C^{t-1}$), hidden layer state from previous time
    ($A^{t-1}$), and input data ($I^t$) enter the cell. Initially, input data ($I^t$)
    and hidden layer state from previous time ($A^{t-1}$) go through the "forget gate."
    The output of the forget gate ($f^t$) determines which information remains and
    which is forgotten from the previous step. Forget gates'' output is calculated
    as:


    $$f^t = F_{sigmoid}(W_{if}I^t + W_{Af}A^t + \theta_f)$$


    where $W_{if}$ is the weight matrix for input data in the forget gate, $W_{Af}$
    is weight matrix for hidden layer state in the forget gate, and $\theta_f$ is
    bias in the forget gate.


    Then, hidden layer state from previous time ($A^{t-1}$) and input data ($I^t$)
    goes through "input gate" which is responsible for updating the cells state by
    the following equations:


    $$i^t = F_{sigmoid}(W_{ii}I^t + W_{Ai}A^t + \theta_i)$$

    $$g^t = F_{tanh}(W_{ig}I^t + W_{Ag}A^t + \theta_g)$$

    $$C^t = (C^{t-1} \times f^t) + (i^t \times g^t)$$


    where $W_{ii}$, $W_{Ai}$, $W_{ig}$ , $W_{Ag}$ are weight matrix for input data
    and hidden layer state in two segments of the input gate (sigmoid and tanh activation).


    Finally, in the "output gate," updating the hidden layer state ($A^t$) by considering
    the updated cell state ($C^t$) is decided using the following equations:


    $$O^t = F_{sigmoid}(W_{io}I^t + W_{Ao}A^{t-1} + \theta_o)$$

    $$A^t = O^t \times F_{tanh}(C^t)$$


    where $W_{io}$ and $W_{Ao}$ are weight matrix for input data and hidden layer
    state in the output gate (Raschka & Mirjalili).


    ## Deep learning applications in oil and gas industry


    The oil and gas industry can be considered one of the main producers of big data.
    Fiber optics, satellite images, seismic data, downhole gauges/flowmeter records,
    well logs, and other sources of information are used every day for assessment,
    monitoring, and decision-making. Many oil and gas companies are now collaborating
    with IT giants like Amazon, Google, and Microsoft to store all the data on the
    cloud and use high computational capacities. This resulted in a sharp growth in
    the application of DL in the oil and gas industry, and few of them would be discussed.


    Crnkovic et al. (Crnkovic-Friis & Erlandson, 2015) used DL to estimate EUR from
    geological data from a region in the Eagle Ford Shale. The data set included 800
    wells with 200,000 data points. Seven geological parameters such as porosity,
    thickness, water saturation, etc. were populated into geological grids and averaged
    on a well level. They used stacked denoising autoencoder as DL method and used
    EUR as the target feature. They observed mean absolute percentage error of 28%
    for the validation set. Omrani et al. (Shoeibi Omrani et al., 2019) assessed the
    performance of different methods (physical models, decline curve analysis, DL,
    and hybrid models) for short-term (6 weeks) and long-term (several years) production
    forecasting for different gas fields. They used wellhead pressure, cumulative
    production, and choke size as inputs and production rate as the output of the
    neural network. The forecasted production rate was added to cumulative production
    to predict new production. They observed that DL models can predict short-term
    forecast with high precision. Gupta et al. (Gupta et al., 2019) utilized deep
    neural networks to analyze borehole images. They used fully convolutional networks
    (FCN) which are a form of CNN but without densely connected layers to detect geological
    features like induced fractures, natural fractures, and sedimentary surfaces.
    They used labeled borehole images from four wells to train local and global models
    that would be used for automated borehole image analysis. Alakeely et al. (Alakeely
    & Horne, 2020) modeled reservoir behavior with CNNs and RNNs. In their study,
    reservoir simulation was used to generate data sets based on different well patterns.
    The data set included pressure, injection, and production data as inputs and pressure
    or rate as the target feature. They compared the performance of CNN and RNN models
    in predicting reservoir performance.


    Dramsch et al. (Dramsch & Lüthje, 2018) used CNNs for 2D seismic interpretation.
    2D in-line seismic slice is labeled by different features such as steep dipping
    reflectors, continuous high amplitude regions, salt intrusions, etc. Afterward,
    three different CNN networks (Waldeland CNN, VGG16, and ResNet 50) were used for
    training. They compared the performance of these CNN networks for seismic facies
    classification. Zhange et al. (Zhang et al., 2019) trained a deep CNN model to
    pick the faults in the seismic images and determined fault dips and azimuth. They
    generated 100,000 3D synthetic images (cubes) with one linear fault for training
    and 10,000 images for validating the CNN model. The trained model was tested on
    various seismic images from different regions such as the Gulf of Mexico, North
    Sea, and Trinidad deep water for fault picking. Shen et al. (Shen & Cao, 2020)
    developed a CNN-based model that recognizes ball seat event for the hydraulic
    fracturing operations. They used slurry rate, wellhead pressure, and their first
    and second derivative as input data to train a CNN model to predict ball seat
    events. Das et al. (Das & Mukerji, 2019) obtained petrophysical properties from
    prestack seismic data using CNNs. They used two approaches to train CNNs that
    map the correlation between prestack seismic data and petrophysical properties
    like porosity, volume of clay, and water saturation. In the first approach, they
    used cascaded CNNs with two separate networks. The first one predicts elastic
    properties (Vp, Vs, and RHOB) from prestack seismic data, and the second one predicts
    petrophysical properties from elastic properties. In the second approach, called

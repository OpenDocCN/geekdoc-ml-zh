  md: '# Size of training set


    The reliability of a machine learning model depends on multiple factors like problem
    complexity (number of inputs, outputs, and interconnection), model selection,
    proper hyperparameters, and the amount of data available for training/testing.
    There are two important questions about the size of the required data for a reliable
    machine learning model. The first one is what is the minimum number of samples
    or observations that result in a high-performance model. The second question is
    whether adding new samples improves the performance of the model (generally, having
    more samples improves the model quality). For example, for the gas EUR prediction
    problem, one can ask: What is the minimum number of well data required for training
    a model with reliable prediction? Or what is the minimum number of PVT samples
    that are required to have a robust prediction for bubble point pressure? This
    can be a challenging question when the number of wells in the data set is important.
    For the green fields when the number of wells is low, it is very important to
    identify the minimum number of wells to make reliable models.


    There are some statistical methods that can be used to specify the minimum number
    of samples in the data set using hypothesis testing and a confidence interval.
    However, in machine learning problems, the complexity of the model (number of
    hyperparameters or model''s type) is very important. To evaluate the impact of
    a training sample size on the model performance, "Learning Curve" can be used
    (Albon, 2018). In order to use "learning_curve" in Python, one must specify the
    machine learning model, input and output (target) data, a range for training data
    samples, the number of folds for cross-validation, and finally score metric. After
    specifying these parameters, the Learning_curve algorithm starts with minimum
    sample size, splits it into folds, trains the model, and finally measures the
    score for train and test folds. Then, it increases the number of samples and repeats
    the mentioned procedure until it reaches a maximum number of samples in the range.
    At the end, the performance of the model (on both train and test data) versus
    the number of samples in the data can be visualized. As an example, Learning_curve
    is applied to the PVT problem. Python codes for using Learning Curve for PVT problem
    is as follows:


    ```

    import numpy as np

    import pandas as pd

    from sklearn.model_selection import learning_curve


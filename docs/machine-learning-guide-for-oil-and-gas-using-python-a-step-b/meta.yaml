- md: '## Set operations


    **Union** of two sets includes all the elements inside both sets. For example,

    $$A = \{a, b, c\}, \quad B = \{b, d\}, \quad A \cup B = \{a, b, c, d\}$$

    Union can be shown using a Venn diagram as illustrated in the shaded area of Fig.
    8.1.


    Intersection of two sets includes the common items in both sets. Below please
    find one example of intersection between A and B and its corresponding Venn diagram
    in Fig. 8.2 where the shaded area is showing $A \cap B$.

    $$A = \{a, b, c\}, \quad B = \{b, d\}, \quad A \cap B = \{b\}$$


    Complement of a set $A$ includes all elements in the universe U except the ones
    in set $A$. Complement of set $A$ is shown as $A^c$. Assume a set of Japanese
    car companies $J = \{\text{Mazda, Toyota, Honda}\}$, the $J^c$ is the set of all
    car companies except Mazda, Honda, and Toyota. The $J^c$ which is the complement
    of set J can be seen in Fig. 8.3 as the shaded area.


    Note that the intersection of a set and its complement is a null set, and the
    union of a set and its complement is the universe $J \cap J^c = \emptyset$ and
    $J \cup J^c = U$.


    Difference of set $A$ with respect to set $B$ is shown as $A-B$ which includes
    all elements of $A$ that are not an element of $B$. $A-B = \{a, c\}$ and $B-A
    = \{d\}$. The Venn diagram of $A-B$ can be seen in Fig. 8.4.


    ## Set properties


    **Law of Commutativity:** Union and intersection operations are commutative, meaning
    the order of sets does not change the result.


    $A \cup B = B \cup A$

    $A \cap B = B \cap A$ (8.1)


    **Law of Associativity:** Union and intersection operations performed on three
    sets follow associativity such that the order of applying the operation does not
    matter, note that parenthesis has the highest precedence so the operation in the
    parenthesis is done first:


    $A \cup (B \cup C) = (A \cup B) \cup C$

    $A \cap (B \cap C) = (A \cap B) \cap C$


    **Law of Distributivity:** When applying union and intersection on three sets,
    the first operation can be distributed as follows:


    $A \cup (B \cap C) = (A \cup B) \cap (A \cup C)$

    $A \cap (B \cup C) = (A \cap B) \cup (A \cap C)$


    **Idempotent Law:** This law states that union or intersection of a set with itself
    will be the set.


    $A \cup A = A$

    $A \cap A = A$


    **Identity Law:** Considering a null set and a universe set U, the following holds
    for operations on set $A$, $\phi$, $E$.


    $A \cup \phi = A$

    $A \cup U = U$

    $A \cap \phi = \phi$

    $A \cap U = A$


    **Absorption Law:** The union of a set $A$ with the intersection of the same set
    $A$ with some other set $B$ is $A$. The same holds for the intersection of a set
    $A$ with the union of set $A$ with some other set $B$.


    $A \cup (A \cap B) = A$

    $A \cap (A \cup B) = A$


    **Involution Law:** Applying the complement on a set two times will result in
    the set itself.


    $(A^c)^c = A$


    **Transitivity Law:** Transitivity law holds for the subset relationship, if a
    set $A$ is a subset of set $B$ which is a subset of $C$, then set $A$ will be
    a subset of $C$.


    $if \ A \subset B \ and \ B \subset C \ then \ A \subset C$


    **De Morgan Law:** The complement of union of two sets can be calculated as the
    intersection of the complement of those sets. Also, the complement of intersection
    of two sets can be calculated as the union of the complement of those sets.


    ## Fuzzy set


    ### Definition


    In the classical set theory, it was explained that there are two groups in the
    universe of discourse. One group considers all the members of the universe, and
    the other group includes nonmembers. Imagine a universe that includes reservoir
    rocks as shale and sandstone. Therefore, in this universe, any rock should be
    either shale or sandstone to be a member. Any other rock that contains, for example,
    80% sandstone and 20% limestone is not considered a member. In the classical set,
    membership values to the universe are crisp and considered 0 for nonmember and
    1 for the member. However, in the fuzzy set, it is possible to assume partial
    membership and assign varying degrees of membership to a set. It should be noted
    that fuzzy sets are mainly used to deal with uncertainty and precision. The uncertainty
    is somehow related to linguistic variables such as old, young, tall, short. Fuzzy
    sets can be used to quantify and analyze linguistic variables. For example, consider
    the age and linguistic variables old and young. Let’s assume people who are below
    45 years as young and above 45 years as old. In this example, the universe of
    discourse includes young and old people. Depending on the age, a person is either
    old or not-old which represents a membership of 0 or 1 (Fig. 8.5).


    This kind of crisp cut is not always defendable, as one might argue, the threshold
    should be 50 instead of 45. Since the concept of becoming an elderly happens during
    time rather than at one specific age, so the old variable can be viewed as a fuzzy
    concept and showed as a curve rather than a line.


    As illustrated in Fig. 8.6, a curve is plotted for two fuzzy sets young and old
    over the universe of age defined as [0,100]. There are different ways to plot
    this curve. Here, it is assumed that membership to the old set starts around age
    40 and gradually increases until 80 years old. This allows for more logical decisions
    (policy) making for different ages, specifically ones in the range 40–80 which
    have some membership to the young group as well as to the old group. For example,
    for age 50 the membership to the young group is 0.88 and to the old group is 0.12,
    while it is 0.5 for the old and young group for age 60. The fuzzy set concept
    allows for a smoother and more effective control in many systems including temperature
    control, automatic transmission in cars, handwriting recognition, and oil and
    gas problems such as investment decisions, candidate selection for restimulation,
    and choke management.


    ### Mathematical function


    Remember that in classical set theory the membership for element in the universe
    $X$ is 0 or 1, meaning considering a set $A$ with an item $x \in X$ is either
    in the set (1) or not in the set (0). However, for fuzzy sets, there is a range
    of membership defined for each element in the universe $X$, with range [0,1] inclusive.
    The function that formulates the membership value for a fuzzy set is called a
    *membership function* and is shown for a fuzzy set $A$ and universe $X$ as follows:


    $\mu_A(x)$, for $x \in X$. (8.10)


    In order to define a fuzzy set $A$ in universe $X$ given a membership function
    $\mu_A(x)$, a set of ordered pairs is defined as follows:


    $A = \{(x, \mu_A(x))|x \in X\}$ (8.11)


    An example of fuzzy set is shown in Fig. 8.6 where the membership to young and
    old fuzzy sets for age 50 is $\mu_{Young}(50) = 0.88$, $\mu_{Old}(50) = 0.12$.


    **Support** of a fuzzy set is the set of elements in the universe X with a nonzero
    membership function, $\mu_A(x) > 0$, $x \in X$. The **core** of a fuzzy set A
    is the set of elements with $\mu_A(x) = 1$. **Boundary** of fuzzy set A is a portion
    of the universe with nonzero membership which is not equal to 1. A crossover point
    of a fuzzy set A is the set with $\mu_A(x) = 0.5$. Core, support, and boundary
    are shown in Fig. 8.7.


    ### Membership functions type


    A variety of membership functions can be used for fuzzy sets. These membership
    functions are one dimensional for each set; however, when introducing more complex
    fuzzy systems, higher-order membership functions can be derived from multiple
    membership functions. Based on the behavior of the input variables, the following
    one-dimensional forms of membership functions can be used: (i) Triangular, (ii)
    Trapezoidal, (iii) Gaussian, and (iv) Sigmoidal (Himanshu & Lone, 2019). Some
    membership functions have linear form, e.g., Triangular and Trapezoidal which
    have some limitations because of their linear forms. However, linear membership
    functions are simpler for illustration and initial design of a fuzzy system. Smooth
    membership functions, e.g., Gaussian and Sigmoidal, are more complicated to design
    but more effective.'
  mdcn: '## 集合运算


    两个集合的**并集**包含两个集合中的所有元素。例如，

    $$A = \{a, b, c\}, \quad B = \{b, d\}, \quad A \cup B = \{a, b, c, d\}$$

    并集可以用维恩图表示，如图8.1中的阴影区域所示。


    两个集合的交集包含两个集合中的共同元素。下面请看A和B之间的一个交集示例及其对应的维恩图（图8.2），其中阴影区域表示$A \cap B$。

    $$A = \{a, b, c\}, \quad B = \{b, d\}, \quad A \cap B = \{b\}$$


    集合$A$的**补集**包含全集U中除集合$A$中的元素外的所有元素。集合$A$的补集表示为$A^c$。假设一个日本汽车公司的集合$J = \{\text{Mazda,
    Toyota, Honda}\}$，那么$J^c$就是除马自达、本田和丰田之外的所有汽车公司的集合。集合J的补集$J^c$如图8.3中的阴影区域所示。


    请注意，一个集合与其补集的交集是空集，而一个集合与其补集的并集是全集，即$J \cap J^c = \emptyset$且$J \cup J^c = U$。


    集合$A$相对于集合$B$的**差集**表示为$A-B$，它包含所有属于$A$但不属于$B$的元素。$A-B = \{a, c\}$，$B-A = \{d\}$。$A-B$的维恩图如图8.4所示。


    ## 集合性质


    **交换律：** 并集和交集运算满足交换律，这意味着集合的顺序不会改变结果。


    $A \cup B = B \cup A$

    $A \cap B = B \cap A$ (8.1)


    **结合律：** 对三个集合进行的并集和交集运算满足结合律，即运算的顺序无关紧要，请注意括号具有最高优先级，因此括号内的运算先执行：


    $A \cup (B \cup C) = (A \cup B) \cup C$

    $A \cap (B \cap C) = (A \cap B) \cap C$


    **分配律：** 当对三个集合应用并集和交集时，第一个运算可以按如下方式分配：


    $A \cup (B \cap C) = (A \cup B) \cap (A \cup C)$

    $A \cap (B \cup C) = (A \cap B) \cup (A \cap C)$


    **幂等律：** 该定律指出，一个集合与自身的并集或交集仍然是该集合。


    $A \cup A = A$

    $A \cap A = A$


    **同一律：** 考虑空集和全集U，对于集合$A$、$\phi$、$E$的运算，以下等式成立。


    $A \cup \phi = A$

    $A \cup U = U$

    $A \cap \phi = \phi$

    $A \cap U = A$


    **吸收律：** 一个集合$A$与同一集合$A$和另一个集合$B$的交集的并集是$A$。同样，一个集合$A$与集合$A$和另一个集合$B$的并集的交集也是$A$。


    $A \cup (A \cap B) = A$

    $A \cap (A \cup B) = A$


    **对合律：** 对一个集合应用两次补集运算将得到该集合本身。


    $(A^c)^c = A$


    **传递律：** 传递律适用于子集关系，如果集合$A$是集合$B$的子集，而集合$B$是集合$C$的子集，那么集合$A$将是集合$C$的子集。


    $if \ A \subset B \ and \ B \subset C \ then \ A \subset C$


    **德摩根律：** 两个集合的并集的补集可以计算为这些集合的补集的交集。同样，两个集合的交集的补集可以计算为这些集合的补集的并集。


    ## 模糊集


    ### 定义


    在经典集合论中，解释了论域中存在两个群体。一个群体包含论域的所有成员，另一个群体包含非成员。想象一个包含储层岩石（如页岩和砂岩）的论域。因此，在这个论域中，任何岩石要么是页岩，要么是砂岩，才能成为成员。任何其他岩石，例如包含80%砂岩和20%石灰岩的岩石，不被视为成员。在经典集合中，对论域的成员值是明确的，非成员为0，成员为1。然而，在模糊集中，可以假设部分成员资格，并为集合分配不同程度的成员资格。需要注意的是，模糊集主要用于处理不确定性和精确性。不确定性在某种程度上与语言变量有关，如老、年轻、高、矮。模糊集可用于量化和分析语言变量。例如，考虑年龄和语言变量“年轻”和“年老”。假设45岁以下的人为年轻，45岁以上的人为年老。在这个例子中，论域包括年轻人和老年人。根据年龄，一个人要么是年老的，要么不是年老的，这代表了0或1的成员资格（图8.5）。


    这种明确的划分并不总是合理的，因为有人可能会认为阈值应该是50而不是45。由于变老的概念是在时间过程中发生的，而不是在某个特定年龄，因此“年老”变量可以被视为一个模糊概念，并用曲线而不是直线来表示。


    如图8.6所示，在定义为[0,100]的年龄论域上，为两个模糊集“年轻”和“年老”绘制了一条曲线。绘制这条曲线有不同的方法。这里假设对“年老”集合的成员资格从40岁左右开始，并逐渐增加直到80岁。这允许对不同年龄做出更合乎逻辑的决策（策略），特别是那些在40-80岁范围内的人，他们对“年轻”组和“年老”组都有一定的成员资格。例如，对于50岁，对“年轻”组的成员资格是0.88，对“年老”组是0.12，而对于60岁，对“年老”和“年轻”组的成员资格都是0.5。模糊集概念允许在许多系统中进行更平滑和更有效的控制，包括温度控制、汽车自动变速器、手写识别以及油气问题，如投资决策、重复压裂候选选择和油嘴管理。


    ### 数学函数


    请记住，在经典集合论中，论域$X$中元素的成员资格是0或1，这意味着考虑一个集合$A$，其中元素$x \in X$要么在集合中（1），要么不在集合中（0）。然而，对于模糊集，论域$X$中的每个元素都定义了一个成员资格范围，范围是[0,1]（包含端点）。为模糊集制定成员资格值的函数称为*成员函数*，对于模糊集$A$和论域$X$表示如下：


    $\mu_A(x)$，对于$x \in X$。(8.10)


    为了在给定成员函数$\mu_A(x)$的情况下定义论域$X$中的模糊集$A$，定义了一组有序对如下：


    $A = \{(x, \mu_A(x))|x \in X\}$ (8.11)


    模糊集的一个例子如图8.6所示，其中50岁对“年轻”和“年老”模糊集的成员资格是$\mu_{Young}(50) = 0.88$，$\mu_{Old}(50)
    = 0.12$。


    模糊集的**支撑集**是论域X中成员函数非零的元素集合，即$\mu_A(x) > 0$，$x \in X$。模糊集A的**核**是满足$\mu_A(x) =
    1$的元素集合。模糊集A的**边界**是论域中成员资格非零且不等于1的部分。模糊集A的**交叉点**是满足$\mu_A(x) = 0.5$的集合。核、支撑集和边界如图8.7所示。


    ### 成员函数类型


    模糊集可以使用多种成员函数。这些成员函数对于每个集合都是一维的；然而，当引入更复杂的模糊系统时，高阶成员函数可以从多个成员函数推导出来。根据输入变量的行为，可以使用以下一维形式的成员函数：(i)
    三角形，(ii) 梯形，(iii) 高斯型，和 (iv) S型（Himanshu & Lone, 2019）。一些成员函数具有线性形式，例如三角形和梯形，由于其线性形式而存在一些限制。然而，线性成员函数对于模糊系统的说明和初始设计更简单。平滑的成员函数，例如高斯型和S型，设计起来更复杂但更有效。'

  md: '# Support vector machine


    SVM is another form of a supervised ML algorithm that can be used for both classification
    and regression problems. As opposed to many of the ML algorithms where the objective
    function is to minimize a cost function, the objective in SVM is to maximize the
    margin between support vectors through a separating hyperplane (Cortes & Vapnik,
    1995). In Fig. 5.29, a separating hyperplane (solid black line) is drawn to separate
    blue instances from the red ones. This hyperplane is drawn in a manner to maximize
    the margin from both sides. Please note that the widest possible stretch must
    be drawn to separate the red and blue instances. The closest blue and red instances
    to the separating hyperplane are referred to as support vectors and this is why
    this algorithm is called support vector machine. The distance between the dashed
    blue and red lines to the separating hyperplane (solid black line) is called the
    "margin." As previously mentioned, the idea is to maximize the margin from both
    sides. This illustration is for a two-dimensional space and hyperplane will be
    n-1 for n-dimensional space. For instance, for a two-dimensional space (two features),
    the hyperplane will be one dimension, which is just a line. For a three-dimensional
    space (three input features), the hyperplane becomes a two-dimensional plane.
    For a four-dimensional space (four features), the hyperplane would have three
    dimensions. This figure illustrates the simplest form of classification problem
    for linearly separable cases.


    The goal here is to maximize the margins between the support vectors. Fig. 5.29
    illustrates a data set with two input features for binary classification that
    are linearly separable. This is unfortunately not the case with most of the real-world
    application problems. Therefore, the following two concepts are very important
    to consider when the data are not linearly separable.


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_203_0.png)


    FIGURE 5.29 Support vector machine for classification illustration.'

    # Chapter 2


    # Data import and visualization


    # Data import and export using pandas


    In this chapter, data visualization with various Python libraries will be discussed
    in detail. Prior to discussing data visualization, let''s address data imports
    using pandas. To import a csv or excel file, "pd.read" syntax can be used as follows.
    As shown in Fig. 2.1, the "tab" key can be hit on your keyboard to see the list
    of available options. To import an excel file, simply choose "pd.read_excel."


    ```

    import pandas as pd

    df=pd.read_csv(''Chapter2_Shale_Gas_Wells_DataSet.csv'')

    ```


    To write a data frame to a csv or an excel file, the following lines of code can
    be executed:


    ```

    df=df.describe()

    df.to_csv(''Shale Gas Wells Description.csv'', index=False)

    ```


    Python output = this will write "Shale Gas Wells Description" csv file to the
    same folder where the original "ipynb" Python script was written.



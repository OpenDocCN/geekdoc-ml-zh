  md: "Therefore, least square regression was used to minimize the loss function in\
    \ this exercise. Please note that other loss functions such as \"lad,\" \"huber,\"\
    \ and \"quantile\" can also be used. \"lad\" stands for least absolute deviation\
    \ that is the same as MAE which essentially minimizes the absolute value of residuals.\
    \ \"huber\" is a combination of \"ls\" and \"lad\" loss functions developed by\
    \ Peter Huber (Huber, 1964). Finally, \"quantile\" allows quantile regression\
    \ where alpha must be specified.\n\nThe default \"criterion\" parameter is \"\
    friedman_mse\" which is the MSE with an improvement score by Friedman. Other criterion\
    \ such as \"mse\" and \"mae\" can also be used but \"friedman_mse\" is pretty\
    \ robust as it provides great approximations. The rest of the parameters have\
    \ been previously discussed.\n\n```\nfrom sklearn.ensemble import GradientBoostingRegressor\n\
    np.random.seed(seed)\ngb=GradientBoostingRegressor(loss='ls', learning_rate=0.1,\n\
    \    n_estimators=100, criterion='friedman_mse',\n    min_samples_split=4, min_samples_leaf=2,\
    \ max_depth=3,\n    max_features=None)\n```\n\nNext, let's fit to \"(X_train,\
    \ y_train)\" and predict the test data:\n\n```\ngb.fit(X_train,y_train)\ny_pred_train=gb.predict(X_train)\n\
    y_pred_test=gb.predict(X_test)\n```\n\nLet's also obtain the R^2 for training\

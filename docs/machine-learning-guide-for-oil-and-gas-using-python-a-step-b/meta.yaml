- md: '## Chapter 9


    ## Evolutionary optimization


    Optimization is the final and the most important step for most oil and gas–related
    problems. Optimization can be defined as selecting a set of attributes to deliver
    the best outcome of a process. Simply stated, optimization chooses the input values
    (within a reasonable range) to either maximize or minimize an objective function.
    Some famous optimization examples in the oil and gas industry are maximizing recovery
    factor, maximizing the net present value (NPV) of a project, minimizing capital
    expenditure known as CAPEX, minimizing water production, maximizing hydrocarbon
    production rates, minimizing environmental footprints, minimizing model’s error
    (history matching), etc. These maximizing/minimizing processes can be done by
    optimizing some problems such as well spacing, completions design, injection rates,
    and tubing size selection. Note that some of the machine learning techniques covered
    in previous chapters are actually optimization problems. In clustering problems,
    the goal is to find the optimum number of classes to differentiate heterogeneity
    in the data. In the neural networks, the goal is to optimize weights to minimize
    the model’s error (the difference between target values and prediction). All of
    these examples show the importance of the optimization process.


    Optimization algorithms are mainly classified into two types as "deterministic"
    and "stochastic." Deterministic optimization deals with problems that can be modeled
    with robust mathematical formulations as objective functions. By using some linear/nonlinear
    programming, it would be possible to change the independent variables and study
    their impact on objective function to move towards the optimum point (minima/maxima).
    If the derivative optimization algorithm (i.e., gradient descent explained in
    Chapter 6) is used, the optimum solution is deterministic. Since there is randomness
    neither in the outcome of the objective function nor in the optimization algorithm,
    the final optimization result will not change if the optimization process is repeated
    many times. However, if random variables exist either in the objective functions
    (i.e., Monte Carlo simulations) or in the optimization algorithms, the optimization
    process is considered stochastic. Some examples of stochastic optimization methods
    are simulated annealing, cross-entropy method, random search, swarm algorithms,
    and evolutionary algorithms.


    In this chapter, two stochastic optimization techniques such as genetic algorithm
    and particle swarm would be discussed. A brief theory for each method is provided
    with oil and gas-related examples in Python.


    ## Genetic algorithm


    In the middle of the 20th century, computer scientists started learning from nature,
    especially natural evolution, to deal with challenging optimization problems that
    required extensive search among highly populated alternatives. Genetic algorithm,
    introduced by Rechenberg and developed by John Holland in the 1960–70s (Rajasekaran
    & Pai, 2013), is mainly based on Darwin’s evolution theory of "survival of the
    fittest." The survival of the fittest is linked to the idea that the most successful
    organisms in surviving are the ones that best adjust to their environment. In
    a population of organisms, parents produce offspring. The fittest offspring survive
    and then become parents and this process continues through selection, crossovers,
    mutation, and inheritance. In 1990s, John Koza introduced "genetic programming"
    which utilizes genetic algorithm to find the best computer programs for solving
    a task (Mohaghegh, 2000). Genetic algorithm mimics the process of natural selection.
    Therefore, it is necessary to have a population of solutions/organisms which are
    referred to as chromosomes in biology. Each chromosome consists of genes which
    can be binary values, numbers, symbols, or characters. Next, it is required to
    evaluate the fitness of each solution/chromosome by the objective function. Chromosomes
    with higher fitness values go through a mating process with crossovers and mutations
    of genes and produce new chromosomes (offspring). New chromosomes with higher
    fitness have a higher probability to be selected for the mating process and produce
    a new generation. The fittest chromosome, the solution of the optimization, will
    be found after several iterations (generations).


    The genetic algorithm is a popular optimizer with advantages like no need for
    any derivative calculations. It also can deal with both continuous and discrete
    functions and work with large search spaces with a lot of parameters. However,
    since it is a stochastic process, the solution might be uncertain and unrepeatable
    (tutorialspoint).


    There have been several applications of genetic algorithms in the oil and gas
    industry. The first application of the genetic algorithm in the oil and gas industry
    was developed by Goldberg et al. for his Ph.D. work supervised by John Holland
    (Goldberg, 1983). In his work, a learning classifier system (LCS) was proposed
    to optimize gas pipeline performance by receiving some input variables like inlet/outlet
    pressures and flow rates, time of day, time of year, pressure rate change, and
    temperature. LCS decision was to select an optimal flow rate or detect gas leakage.
    Mohaghegh et al. showed the usage of hybrid neurogenetic approach to optimize
    hydraulic fracture design for refrac operation for the Clinton Sand in Northeast
    Ohio (Mohaghegh, 2000). He used the neural networks to predict wells’ post fracture
    deliverability from some important completion attributes. Then, he utilized the
    neural network as a fitness function for a genetic algorithm to find the best
    combination of completion parameters for getting the highest post fracture deliverability.
    Jefferys used a genetic algorithm for minimizing the weight of a column for an
    offshore structure by searching through different structure designs with various
    axial loads and radial pressures (Jefferys, 1993). Martinez et al. showed how
    to implement genetic algorithm to optimize oil production for the wells operating
    with gas lift. The objective of this work was to assign the optimum amount of
    gas to each individual well in the field considering the limited gas supply (Martinez
    et al., 1994). Sarich used genetic algorithm to optimize investment decision-making.
    In this work, the goal was to select the optimum number of wells to be drilled
    out of 30 potential wells with capital budget constrain of $30,000,000 and to
    maximize the NPV (Sarich, 2001). Emrick et al. used a genetic algorithm to optimize
    well placement with some nonlinear constraints. They used numerical simulator
    as fitness evaluator to find the optimized number, location, and trajectory of
    producer/injectors that results in maximized NPV (Emerick et al., 2009). Morales
    et al. applied a genetic algorithm in gas condensate reservoir for well placement
    optimization using a heterogeneous reservoir simulation model. They came up with
    the best well coordinates (x,y,z) and direction that maximized cumulative gas
    production (Morales et al., 2010). Another application of a genetic algorithm
    in the oil and gas industry is related to Chaari et al. work that used integrated
    neural network and genetic algorithm to model two phase-pressure drops in pipes
    (Chaari et al., 2020). They used a genetic algorithm to find the optimum number
    of input parameters to train a neural network to predict pressure drops in the
    pipes with the highest accuracy (least amount of error). The genetic algorithm
    is also used in many other applications for the oil and gas industry like petrophysics
    (Fang et al., 1992), seismic inversion (Salamanca et al., 2017), steam injection
    optimization (Bybee, 2005), and reservoir characterization (Romero et al., 2000).


    ## Genetic algorithm workflow


    In order to understand the workflow of a genetic algorithm, it is necessary to
    review some of the related terminologies. "Population" is a space of all the solutions
    for the problem to be optimized. "Chromosome" is actually a solution to the problem.
    "Gene" is the building block of each chromosome. In the computer binary language,
    0 and 1 are assigned to the values of the gene as "Allele." In the real-world
    population space, solutions are not in the binary format. For computational easiness,
    it is preferred to convert solution space into binary system space which is called
    "Genotype" through the "Encoding" process. "Fitness" evaluator is generally a
    mathematical function or objective function that should be maximized or minimized
    through the optimization'
  mdcn: '## 第9章


    ## 进化优化


    优化是大多数油气相关问题的最终且最重要的步骤。优化可以定义为选择一组属性以实现流程的最佳结果。简单来说，优化是在合理范围内选择输入值，以最大化或最小化目标函数。油气行业中一些著名的优化示例包括：最大化采收率、最大化项目的净现值（NPV）、最小化被称为CAPEX的资本支出、最小化产水量、最大化碳氢化合物产量、最小化环境足迹、最小化模型误差（历史拟合）等。这些最大化/最小化过程可以通过优化某些问题来实现，例如井距、完井设计、注入速率和油管尺寸选择。请注意，前面章节涵盖的一些机器学习技术实际上就是优化问题。在聚类问题中，目标是找到最佳类别数量以区分数据中的非均质性。在神经网络中，目标是优化权重以最小化模型误差（目标值与预测值之间的差异）。所有这些例子都表明了优化过程的重要性。


    优化算法主要分为“确定性”和“随机性”两类。确定性优化处理那些可以用稳健的数学公式建模为目标函数的问题。通过使用一些线性/非线性编程，可以改变自变量并研究它们对目标函数的影响，从而向最优点（最小值/最大值）移动。如果使用导数优化算法（例如第6章解释的梯度下降法），则最优解是确定性的。由于目标函数的结果和优化算法中都没有随机性，因此如果重复多次优化过程，最终的优化结果不会改变。然而，如果目标函数（即蒙特卡洛模拟）或优化算法中存在随机变量，则该优化过程被认为是随机的。随机优化方法的一些例子包括模拟退火、交叉熵法、随机搜索、群算法和进化算法。


    本章将讨论两种随机优化技术：遗传算法和粒子群算法。将为每种方法提供简要理论，并附带油气相关的Python示例。


    ## 遗传算法


    20世纪中叶，计算机科学家开始向大自然学习，特别是自然进化，以处理那些需要在大量备选方案中进行广泛搜索的具有挑战性的优化问题。遗传算法由Rechenberg提出，并由John
    Holland在1960-70年代发展（Rajasekaran & Pai, 2013），主要基于达尔文的“适者生存”进化论。适者生存与这样的观点相关：在生存方面最成功的生物是那些最能适应其环境的生物。在一个生物种群中，父母产生后代。最适应的后代存活下来，然后成为父母，这个过程通过选择、交叉、变异和遗传不断延续。1990年代，John
    Koza引入了“遗传编程”，它利用遗传算法来寻找解决任务的最佳计算机程序（Mohaghegh, 2000）。遗传算法模拟了自然选择的过程。因此，需要有一个解决方案/生物的种群，在生物学中被称为染色体。每条染色体由基因组成，基因可以是二进制值、数字、符号或字符。接下来，需要通过目标函数评估每个解决方案/染色体的适应度。适应度值较高的染色体经历一个交配过程，涉及基因的交叉和变异，产生新的染色体（后代）。适应度较高的新染色体被选中进行交配过程并产生新一代的概率更高。最适应的染色体，即优化问题的解决方案，将在几次迭代（代）后找到。


    遗传算法是一种流行的优化器，其优点包括无需进行任何导数计算。它还可以处理连续和离散函数，并在具有大量参数的大型搜索空间中工作。然而，由于它是一个随机过程，解决方案可能具有不确定性且不可重复（tutorialspoint）。


    遗传算法在油气行业已有多种应用。遗传算法在油气行业的首次应用是由Goldberg等人在其博士工作中开发的，该工作由John Holland指导（Goldberg,
    1983）。在他的工作中，提出了一种学习分类器系统（LCS），通过接收一些输入变量（如入口/出口压力和流量、一天中的时间、一年中的时间、压力变化率和温度）来优化天然气管道性能。LCS的决策是选择最佳流量或检测天然气泄漏。Mohaghegh等人展示了如何使用混合神经遗传方法来优化俄亥俄州东北部Clinton砂岩的重复压裂作业的水力压裂设计（Mohaghegh,
    2000）。他使用神经网络根据一些重要的完井属性来预测井的压裂后产能。然后，他利用神经网络作为遗传算法的适应度函数，以找到获得最高压裂后产能的最佳完井参数组合。Jefferys使用遗传算法，通过搜索具有不同轴向载荷和径向压力的各种结构设计，来最小化海上结构柱的重量（Jefferys,
    1993）。Martinez等人展示了如何实施遗传算法来优化使用气举作业的油井的石油产量。这项工作的目标是在考虑有限天然气供应的情况下，为油田中的每口井分配最佳气量（Martinez
    et al., 1994）。Sarich使用遗传算法来优化投资决策。在这项工作中，目标是在30,000,000美元的资本预算约束下，从30口潜在井中选择最佳钻井数量，并最大化NPV（Sarich,
    2001）。Emrick等人使用遗传算法来优化具有某些非线性约束的井位。他们使用数值模拟器作为适应度评估器，以找到优化的生产井/注入井的数量、位置和轨迹，从而实现NPV最大化（Emerick
    et al., 2009）。Morales等人将遗传算法应用于凝析气藏，使用非均质油藏模拟模型进行井位优化。他们得出了能够最大化累计产气量的最佳井坐标（x,y,z）和方向（Morales
    et al., 2010）。遗传算法在油气行业的另一个应用与Chaari等人的工作有关，他们使用集成的神经网络和遗传算法来模拟管道中的两相压降（Chaari
    et al., 2020）。他们使用遗传算法来找到最佳数量的输入参数，以训练神经网络，从而以最高精度（最小误差）预测管道中的压降。遗传算法还用于油气行业的许多其他应用，例如岩石物理学（Fang
    et al., 1992）、地震反演（Salamanca et al., 2017）、蒸汽注入优化（Bybee, 2005）和油藏表征（Romero et
    al., 2000）。


    ## 遗传算法工作流程


    为了理解遗传算法的工作流程，有必要回顾一些相关术语。“种群”是待优化问题的所有解决方案的空间。“染色体”实际上是问题的一个解决方案。“基因”是每条染色体的构建块。在计算机二进制语言中，0和1被分配给基因的值，称为“等位基因”。在现实世界的种群空间中，解决方案不是二进制格式的。为了计算方便，最好通过“编码”过程将解决方案空间转换为二进制系统空间，这称为“基因型”。“适应度”评估器通常是一个数学函数或目标函数，应通过优化过程最大化或最小化。'

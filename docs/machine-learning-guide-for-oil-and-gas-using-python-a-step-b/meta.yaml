- md: '## Artificial intelligence


    Terminologies such as AI, ML, big data, and data mining are used interchangeably
    across different organizations. Therefore, it is crucial to understand the true
    meaning of each terminology before diving deeper into various applications. AI
    is simply the use of machine or computer intelligence rather than human or animal
    intelligence. It is a branch of computer science that studies the simulation of
    human intelligence processes such as learning, reasoning, problem-solving, and
    self-correction by computers. Creating intelligent machines that work, react,
    and mimic cognitive functions of humans is the primary goal of AI. Examples of
    AI include email classification (categorization), smart personal assistants such
    as Siri, Alexa, and Google, automated respondents, process automation, security
    surveillance, fraud detection and prevention, pattern and image recognition, product
    recommendation and purchase prediction, smart searches, sales, volumes, and business
    forecasting, advertisement targeting, news feed personalization, terrorist activity
    detection, self-driving cars, health diagnostics, mortgage default prediction,
    house pricing prediction, robo-advisors (automated portfolio manager), and virtual
    travel assistant. As shown, the field of AI is only growing with extraordinary
    potential for decades to come. In addition, the demand for data science jobs has
    also exponentially grown in the past few years where companies search desperately
    for computer scientists, mathematicians, data scientists, and engineers that have
    postgraduate and preferably PhD degrees from accredited universities.


    ## Data mining


    Data mining is a terminology used in computer science and is defined as the process
    of extracting specific information from a database that was hidden and not explicitly
    available for the user, using a set of different techniques such as ML. It is
    also called **knowledge discovery in databases (KDD)**. Teaching someone how to
    play basketball is ML; however, using someone to find the best basketball centers
    is data mining. Data mining is used by ML algorithms to find links between various
    linear and nonlinear relationships. Data mining is often used to help **collect
    data** on various aspects of the business such as nonproductive time, sales trend,
    production key performance indicators, drilling data, completions data, stock
    market key indicators and information, etc. Data mining can also be used to go
    through websites, online platforms, and social media to collect and compile information
    (Belyadi et al., 2019).


    ## Machine learning


    ML is a subset of *AI*. It is defined as the collection of using various algorithms
    to teach computers to find patterns in data to be used for future prediction and
    forecasting or as a quality check for performance optimization. ML provides computers
    the ability to learn without being explicitly programmed. Some of the patterns
    may be hidden and therefore, finding those hidden patterns can add significant
    shareholder value to any organization. Please note that data mining deals with
    searching specific information while ML focuses on performing a certain task.
    In Chapter 2 of this book, various types of ML algorithms will be discussed. Also
    note that deep learning is a subset of machine learning in which multi-layer neural
    networks are used for various purposes including but not limited to image and
    facial recognition, time series forecasting, autonomous cars, language translation,
    etc. Examples of deep learning algorithms are convolution neural network (CNN)
    and recurrent neural network (RNN) that will be discussed with various O&G applications
    in Chapter 6.


    ## Python crash course


    Before covering the essentials of all the algorithms as well as the codes in Python,
    it is imperative to understand the fundamentals of Python. Therefore, this chapter
    will be used to illustrate the fundamentals before diving deeper into various
    workflow and examples.


    ## Anaconda introduction


    It is highly recommended to download Anaconda, the standard platform for Python
    data science which includes many of the necessary libraries with its installation.
    Most libraries used in this book are already preinstalled with Anaconda, so they
    don''t need to be downloaded individually. The libraries that are not preinstalled
    in Anaconda will be mentioned throughout the chapters.


    ## Anaconda installation


    To install Anaconda, go on Anaconda''s website (www.anaconda.com) and click on
    "Get Started." Afterward, click on "Download Anaconda Installers" and download
    the latest version of Anaconda either using Windows or Mac. Anaconda distribution
    will have over 250 packages some of which will be used throughout this book. If
    you do not download Anaconda, most libraries must be installed separately using
    the command prompt window. Therefore, it is highly advisable to download Anaconda
    to avoid downloading majority of the libraries that will be used in this book.
    Please note that while majority of the libraries will be installed by installing
    Anaconda, there will be some libraries where they would have to separately get
    installed using the command prompt or Anaconda prompt window. For those libraries
    that have not been preinstalled, simply open "Anaconda prompt" from the "start"
    menu, and type in "pip install (library name)" where "library name" is the name
    of the library that would like to be installed. Once the Anaconda has been successfully
    installed, search for "Jupyter Notebook" under start menu. Jupyter Notebook is
    a web-based, interactive computing notebook environment. Jupyter Notebook loads
    quickly, is user-friendly, and will be used throughout this book. There are other
    user interfaces such as Spyder, JupyterLab, etc. Fig. 1.1 shows the Jupyter Notebook''s
    window after opening. Simply go into "Desktop" and create a folder called "ML
    Using Python." Afterward, go to the created folder ("ML Using Python") and click
    on "New" on the top right-hand corner as illustrated in Fig. 1.2.


    You now have officially launched a new Jupyter Notebook and are ready to start
    coding as shown in Fig. 1.3.


    Displayed in Fig. 1.4, the top left-hand corner indicates the Notebook is "Untitled."
    Simply click on "Untitled" and name the Jupyter Notebook "Python Fundamentals."



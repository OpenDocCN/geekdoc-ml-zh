  md: '![](img/84bb0bcf926cd79dfa24aaffa8e553c8_204_0.png)


    FIGURE 5.30 The impact of increasing C on the SVM margin.


    1) **Soft margin:** is used to find a line for class separation but this line
    will tolerate one or few misclassified instances. This degree of tolerance is
    represented by the parameter "C" in SVM algorithm. As shown in Fig. 5.30, C essentially
    is a trade-off parameter used between having a **wide margin** and correctly **classifying
    training data**. C behaves as a regularization parameter when using SVM. C is
    one of the parameters that can be used for grid search optimization (which will
    be discussed in model validation chapter).


    +   - Larger C= Smaller width of the margin (smaller margin)= More incurred penalty
    when misclassified= Higher training accuracy and lower testing accuracy= Less
    general

    Lower C= Larger width of the margin (larger margin)= Less incurred penalty when
    misclassified= Lower training accuracy and higher testing accuracy= More general


    When C is large, the decision boundary will depend on fewer support vectors because
    the margin is narrower.


    2) **Kernel tricks:** when the data are not linearly separable, kernel tricks
    utilizes existing features and applies some transformation functions to create
    new features. For example, linear, polynomial, or radial basis'

    | | Corporation_Name | CVX | EXXON | GE |

    |---|---|---|---|---|

    | Sales_Amount | count | 2.000000 | 2.000000 | 2.000000 |

    | | mean | 6000.000000 | 25000.000000 | 40000.000000 |

    | | std | 5656.854249 | 28284.271247 | 28284.271247 |


    # Chapter 5


    # Supervised learning


    # Overview


    In this chapter, the following supervised machine learning (ML) algorithms will
    be discussed:


    +   (i) Multilinear regression

    (ii) Logistic regression

    (iii) K-nearest neighbor (KNN)

    (iv) Support vector machine (SVM)

    (v) Decision tree

    (vi) Random forest

    (vii) Extra trees

    (viii) Gradient boosting

    (ix) Extreme gradient boosting

    (x) Adaptive gradient boosting


    After discussing the concept for each algorithm and providing the mathematical
    background, scikit-learn library will be used to demonstrate the implementation
    of each algorithm with multiple, practical oil and gas problems such as production
    optimization, human resource employee sustainability prediction, sonic log (shear
    wave and compression wave travel times) prediction, economic (net present value)
    prediction, and stage fracability identification and prediction. Finally, at the
    end of this chapter, various imputation techniques such as k-nearest neighbor
    (KNN), multivariate imputation by chained equations (MICE), and iterative imputer
    will be discussed to deal with missing information.


    # Linear regression


    There are different types of regression algorithms such as linear regression,
    ridge regression, polynomial regression, lasso regression, etc., each suitable
    for different purposes. For example, linear regression is mostly suited for drawing
    a linear line across a graph that shows a linear relationship between two variables.
    Ridge regression is used when there is a high degree of collinearity between features.
    Polynomial regression is suited when the relationship between features is'
  - '[PAGE 170]


    nonlinear. Linear regression is one of the simplest and most commonly used forms
    of regression ML algorithms. The equation for linear regression is as follows:


    $$y = mx + b$$


    where m is the slope of the line, b is the intercept, x is the independent variable
    (input feature), and y is the dependent variable (output feature). In linear regression,
    "least square method" is used to find the slope and y-intercept. The least square
    method minimizes the squared distance from each data point to the line being fitted.
    For multilinear regression models with multiple input features, the equation below
    can be used:


    $$y = m_1x_1 + m_2x_2 + ... + m_nx_n + b$$


    Please note that when using multilinear regression model, it assumes that there
    is a linear relationship between input and output features. In addition, it assumes
    that independent variables (input features) are continuous as opposed to discrete.
    The majority of petroleum engineering–related problems have nonlinear relationships
    between the input and output features. Therefore, this algorithm must be used
    with care when tackling some of the nonlinear problems. We will discuss other
    algorithms that are best suited for nonlinear problems.


    # Regression evaluation metrics


    Before going deeper into the implementation of a multilinear regression model
    in scikit-learn, let''s review some of the regression evaluation metrics in addition
    to R and R² that have already been elaborated.


    +   1) **Mean absolute error (MAE):** is the mean of the **absolute value** of
    the errors. It is simply the average of absolute value of difference between actual
    and predicted values. MAE is also referred to as a loss function since the goal
    is to minimize this loss function and is defined as follows:


    $$\frac{1}{n} \sum_{i=1}^{n} |y_i - \widehat{y_i}|$$


    where $y_i$ is the $i^{th}$ sample point output and $\widehat{y_i}$ is the estimated
    value obtained from the model.


    +   2) **Mean squared error (MSE):** as the name indicates, it is referred to
    as the mean of the squared error as shown below. MSE is also considered a loss
    function that needs to be minimized. One of the reasons that MSE is heavily used
    in real-world ML applications is because the larger errors are penalized more
    when using MSE as the objective function compared to MAE.


    $$\frac{1}{n} \sum_{i=1}^{n} (y_i - \widehat{y_i})^2$$'

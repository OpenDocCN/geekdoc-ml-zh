    under "Poor."


    KNN has the following advantages:


    +   - As was illustrated in the example above, KNN is easy to implement.

    - It is considered a lazy algorithm which essentially indicates no prior training
    is required prior to making real-time decisions. In other words, it memorizes
    the training data set as opposed to learning a discriminative function from the
    training data set (Raschka, n.d.).

    - As opposed to many other algorithms that will be discussed later in this chapter,
    the main two parameters are number of K and distance function.


    Some of the disadvantages of using a KNN are as follows:


    +   - Distance calculation does not work well in a high-dimensional data set;
    therefore, using KNN can be challenging in high-dimensional data sets.

    - In addition, when KNN is used for making predictions, the cost of predictions
    in large training data sets is high. This is because KNN will need to search for
    the nearest neighbors in the entire data set.

    - It can computationally become intensive since the distance of each instance
    to all training samples must be calculated.

    - KNN algorithm does not work well with categorical features since dimension distance
    calculation using categorical feature is difficult.



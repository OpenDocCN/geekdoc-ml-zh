    \n## 决策树\n\n决策树是另一种监督式机器学习算法，可用于分类和回归问题。在讨论与决策树密切相关的随机森林之前，了解决策树的工作原理至关重要。决策树将数据分割成子树，然后这些子树再被分割成其他子树。如图5.38所示，**根节点**位于最顶层，本质上代表整个总体；**决策节点**也称为**内部节点**，有两个或更多分支；最后，**终端节点**也称为**叶节点**，是最低层的节点，不再进行分割。请注意，术语“分割”定义为将一个节点分割成两个或多个子节点。\n\
    \n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_215_0.png)\n\n图 5.38 决策树示意图。\n\n有多种决策树算法，如ID3、C4.5、C5.0和CART。ID3代表迭代二分器3，于1986年开发（Quinlan,\
    \ 1986）。该算法使用自顶向下的贪心方式在**分类**特征上构建决策树，以产生最大的信息增益（将讨论）。此外，ID3使用多路树。C4.5是决策树中使用的另一种算法，它移除了特征必须是分类的限制。C5.0是Quinlan的最新版本，它比C4.5使用更少的内存并构建更小的规则集。最后，CART代表分类和回归树，与C4.5类似，但它支持数值型目标变量，并且不计算规则集。CART创建二叉树，在每个节点产生最大的信息增益。请注意，scikit-learn库使用CART算法的优化版本（scikit-learn,\
    \ n.d.）。\n\n## 属性选择技术\n\n在具有N个属性的数据集中，决定哪些属性位于根节点或内部节点可能复杂且具有挑战性。属性选择的一些最重要标准如下：\n\
    \n-   1) **熵**：简单来说，是不确定性或纯度的度量，计算如下。请注意，高熵意味着低纯度。\n\n$$E(S) = \\sum_{i=1}^{c}\
    \ -P_i \\log_2 P_i$$ (5.23)\n\n其中c是类别数，$P_i$是数据集中某个类别的概率。例如，如果有100个样本，分为“压裂”和“不压裂”两类。假设40个样本属于“压裂”类，60个样本属于“不压裂”类，则熵可以计算如下：\n\
    \n$$-\\frac{40}{100}\\log_2\\frac{40}{100} - \\frac{60}{100}\\log_2\\frac{60}{100}\
    \ = 0.97$$ (5.24)\n\n从数学上讲，多个属性的熵可以计算如下：\n\n$$E(X, Y) = \\sum_{c \\in Y} P(c)E(c)$$\
    \ (5.25)\n\n其中$X$是当前状态，$Y$是选定的属性。$P(c)$是属性的概率，$E(c)$是属性的熵。对于下面列出的表格，让我们计算熵：\n\n\
    | 条件 | 继续 | 筛除 | 总和 |\n| :--- | :---: | :---: | :---: |\n| 平稳压力 | 4 | 1 | 5 |\n\
    | 压力上升 | 4 | 2 | 6 |\n| 快速上升 | 1 | 4 | 5 |\n| 总和 | 9 | 7 | 16 |\n\n让我们进行熵的计算，如下所示：\n\
    \n$$Probability(Flat\\ Pressure) \\times Entropy(4, 1) + Probability(Rising\\\
    \ Pressure) \\times Entropy(4, 2) + Probability(Rapid\\ Rise) \\times Entropy(1,\
    \ 4)$$\n$$= \\frac{5}{16} \\times Entropy(4, 1) + \\frac{6}{16} \\times Entropy(4,\
    \ 2) + \\frac{5}{16} \\times Entropy(1, 4)$$ (5.26)"

    The objective of the first example is to train a neural network to detect patterns
    between each well''s EUR and all the attributes or input features. Sometimes,
    when the number of attributes is high (not specifically in this case), it is recommended
    to determine the relative degree of influence of each attribute on EUR (output).
    This process is also known as feature ranking. By having the most important features,
    it would be possible to disregard low ranked attributes to improve the training
    speed and performance of the trained model.


    There are multiple feature ranking algorithms in the Python libraries. Each algorithm
    may lead to a different ranking hierarchy depending on the utilized math and formulations.
    To decrease the uncertainty in the ranking order, using different methods and
    compare their rankings is recommended. In this example, two methodologies were
    used and the reader has the opportunity to test other algorithms as well. Some
    of these ranking techniques were also discussed in chapter 5.



    ## Fuzzy set operations


    **Subset** of a fuzzy set $A$ is a subset of fuzzy set $B$, ($A \subset B$) if
    the following holds true:


    $$\forall x \in X, \mu_A(x) \leq \mu_B(x)$$


    Fig. 8.11 illustrates this concept.


    **Complement** of a fuzzy set $A$ is a fuzzy set $Ac$ with its membership function
    defined as follows:


    $$\mu_{A^c}(x) = 1 - \mu_A(x)$$


    **Union** of two fuzzy sets $A$ and $B$ is a fuzzy set $U$ with its membership
    function as maximum of the two sets $A$ and $B$ membership function values defined
    as follows:


    $$\mu_C(x) = \max\{\mu_A(x), \mu_B(x)\}$$


    A sample union of fuzzy sets $A$ and $B$ can be seen in Fig. 8.12.


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_390_0.png)


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_391_0.png)


    FIGURE 8.12 Union of two fuzzy sets A and B.


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_391_1.png)


    FIGURE 8.13 Intersection of two fuzzy sets A and B.


    **Intersection** of two sets A and B is a fuzzy set I with its membership function
    as a minimum of the two sets A and B defined as follows:


    $\mu_C(x) = \min\{\mu_A(x), \mu_B(x)\}$ (8.19)


    A sample intersection of two sets A and B can be seen in Fig. 8.13.


    ## Fuzzy inference system


    A fuzzy inference system is a principled control system based on the fuzzy theory.
    The main components of this system are (i) Fuzzification, (ii) Fuzzy Rules Definition,
    (iii) Fuzzy Inference, and (iv) Defuzzification of the decision (Himanshu & Lone,
    2019). All these steps are illustrated in a temperature control system and also
    a choke size control example in the next section. These four steps help us to
    define a logical framework based on the linguistic values defined and characterized
    using fuzzy sets. This system is similar to how humans use reasoning statements
    to solve some problems. This kind of control deems powerful in many engineering
    problems including oil and gas operations. There are three methods to perform
    a fuzzy inference system as Mamdani, Takagi-Sugeno, and Tsukamoto (Himanshu &
    Lone, 2019). In this book, the Mamdani Inference is used for two examples. The
    general workflow of the fuzzy inference system is shown in Fig. 8.14.


    ## Input fuzzification


    For (i) fuzzification, each input variable ($I_i$) and output variable ($O_i$)
    is considered over a meaningful universe (range of values). Also, a set of linguistic
    valuations for that input variable are used. For example, for temperature, a range
    [30, 120] can be defined and two linguistic variables "Cold" and "Hot" can be
    used to characterize the state of the temperature in our system. As part of fuzzification
    step, a membership function has to be defined for all the variables in that universe
    ($\mu_i(x)$, $x \in I_i$). Note that membership function can be of different forms,
    e.g., triangular, trapezoid, Gaussian. For example, membership functions $\mu_{Cold}(x)$
    and $\mu_{Hot}(x)$ for linguistic values "Cold" and "Hot" can be considered as
    shown in Fig. 8.15 with the following membership function definitions:


    $$\mu_{Cold}(x) = \max\left(\min\left(1, \frac{80-x}{80-60}\right), 0\right) \quad
    (8.20)$$


    $$\mu_{Hot}(x) = \max\left(\min\left(\frac{x-60}{80-60}, 1\right), 0\right) \quad
    (8.21)$$


    Consider a temperature control system where the fan speed is controlled given
    the input temperature and humidity level. In order to perform


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_392_0.png)


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_393_0.png)


    (i) fuzzification, the fuzzy sets are defined for the variables of this system
    (both inputs and output variables). The membership functions can be seen in Fig.
    8.16. The temperature is described using "Cold" and "Hot" linguistic values using
    a trapezoidal membership function as explained above. The humidity is described
    using "Low" and "High" values with Trapezoidal membership function. The Fan Speed
    is defined using three membership functions corresponding to Low, Medium, and
    High Fan Speeds, using Trapezoidal, Triangular, and Trapezoidal membership functions.
    The universe for each membership function can be observed in Fig. 8.16 as x-axis
    limits.


    Next step is the Fuzzification of each crisp input value Ii, where degrees of
    membership (values between 0 and 1) are assigned to different fuzzy sets defined
    for that input variable Ii. For example, for a temperature control system assuming
    temperature value of 75°F, the membership values to fuzzy sets "Cold" and "Hot"
    can be obtained by plugging in 75 into μCold(x) and μHot(x) which results in 0.25
    and 0.75, respectively. Now these membership values can be used in fuzzy rules
    defined in next step (ii) Fuzzy rules definition, to derive implications and consequently
    decisions.


    ## Fuzzy rules


    Another important component of fuzzy sets are (ii) fuzzy rules definition, how
    they should be interpreted, and how decisions can be inferred from them. Fuzzy
    rules are defined as follows:


    > If x is C → y is D. (8.22)


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_394_0.png)


    which is interpreted as if input x is in fuzzy set C (Premise) then the decision
    to make is in fuzzy set D (Conclusion). In this rule, the sets C and D are fuzzy
    sets defined to characterize linguistic variables for input and output, respectively.
    The first expression is called the premise and the second expression is conclusion
    of the rule. These rules are used to derive conclusions (control systems) based
    on crisp inputs fed into the fuzzy system.


    For a system with N input variables $I_1, \cdots, I_N$ with each input variable
    having $C_1, \cdots, C_N$ different linguistic values, the total number of rules
    that can be derived is $2^{2N-1} \prod_{i=1}^{N} C_i$ where $2^{2N-1}$ accounts
    for different combination of rules (AND, OR) as well as using the fuzzy set or
    its complement (NOT). Note that AND operation in logic is defined as Intersection,
    OR operation is defined as Union, and NOT is defined as Complement which were
    defined in the previous sections. For example, in the temperature control system
    defined earlier with two input variables, Temperature and Humidity. The output
    or control action is Fan Speed. There are two linguistic values Cold and Hot for
    the Temperature and Low and High for Humidity and three linguistic values Low,
    Medium, and High for Fan Speed. For this system, four rules can be derived as
    shown in Table 8.1. Note that another set of 12 rules can be defined if the complement
    of the input values (NOT) are considered resulting in a total of 16 rules using
    AND combination of different fuzzy sets. Additionally, if the OR combination of
    input values’ fuzzy sets are used, 16 more rules can be derived resulting in a
    total of $2^{2 \times 2^{-1}(2 \times 2)} = 32$ possible rules.


    For this example the following set of rules are considered for the temperature
    control system:


    - 1) If Temperature is Cold AND Humidity is Low $\rightarrow$ Fan Speed Low,

    - 2) if Temperature is Cold AND Humidity is NOT Low $\rightarrow$ Fan Speed Medium,

    - 3) if Temperature is Hot OR Humidity is High $\rightarrow$ Fan Speed Medium,

    - 4) if Temperature is Hot and Humidity is High $\rightarrow$ Fan Speed High.


    Note that usually an aggregation of rules is used for decision-making and these
    rules are defined by domain experts based on different values of inputs and corresponding
    control action.


    ## Inference


    In order to draw conclusions from a set of rules defined for a system ((iii) inference
    step), the strength of the premise of each rule, referred to as "Firing Strength"
    of the premise, is calculated given a set of input values. The firing strength
    of a rule shown as $\mu_{premise(i)}(x_1, x_2)$ quantifies the strength of the
    rule premise given a set of crisp input values $x_1, x_2$. Note that the premise
    can have different combination of input variables, e.g., AND, OR, NOT. Calculating
    the firing strength of each rule is different based on fuzzy set operations used
    in that rule (see Fuzzy set operations section). For example, considering input
    values: Temperature denoted as $x_1 = 75^\circ F$ and Humidity denoted as $x_2
    = 43\%$,


    TABLE 8.1 Temperature humidity rule space.


    | Fan speed | Humidity |

    | :--- | :--- |

    | | AND | Low | High |

    | Temperature | Cold | Low | Med |

    | | High | Med | High |'

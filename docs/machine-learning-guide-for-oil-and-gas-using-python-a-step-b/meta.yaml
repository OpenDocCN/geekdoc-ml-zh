  md: '![](img/84bb0bcf926cd79dfa24aaffa8e553c8_215_0.png)


    FIGURE 5.38 Decision tree illustration.


    works. A decision tree splits the data into subtrees which are then split into
    other subtrees. As illustrated in Fig. 5.38, a **root node** is at the topmost
    level which essentially represents the entire population, a **decision node**
    also referred to as an **internal node** has two or more branches, and finally,
    a **terminal node** also referred to as a **leaf node** is the lowest node and
    does not split any longer. Note that the term splitting is defined as splitting
    a node into two or more subnodes.


    There are various decision tree algorithms such as ID3, C4.5, C5.0, and CART.
    ID3 stands for Iterative Dichotomiser 3 which was developed in 1986 (Quinlan,
    1986). This algorithm builds decision trees using a top-down greedy manner on
    **categorical** features that results in the largest information gain (will be
    discussed). In addition ID3 uses a multiway tree. C4.5 is another algorithm used
    in decision trees which removes the restrictions that features must be categorical.
    C5.0 is Quinlan''s latest release which uses less memory and constructs smaller
    rulesets than C4.5. Finally, CART stands for classification and regression trees
    and is similar to C4.5 but it supports numerical target variables and does not
    calculate rulesets. CART creates binary trees that result in the largest information
    gain at each node. Please note that scikit-learn library uses an optimized version
    of the CART algorithm (scikit-learn, n.d.).


    # Attribute selection technique


    In a data set with N attributes, deciding the attributes to be at the root or
    internal node can be complex and challenging. Some of the most important criteria
    for attribute selection are as follows:


    +   1) **Entropy**: is simply a measure of uncertainty or purity which is calculated
    as follows. Note that high entropy means low purity.'
  merge: -1
  pgno: 215
- img_proc: true
  md: '$$E(S) = \sum_{i=1}^{c} -P_i \log_2 P_i$$ (5.23)


    where c is the number of classes, $P_i$ is the probability of a class in a data
    set. For example, if there are 100 samples of two classes of "Frac" versus "Don''t
    Frac." Assuming 40 samples belong to the "Frac" class and 60 samples belonging
    to the "Don''t Frac" class, the entropy can be calculated as follows:


    $$-\frac{40}{100}\log_2\frac{40}{100} - \frac{60}{100}\log_2\frac{60}{100} = 0.97$$
    (5.24)


    Mathematically, entropy for multiple attributes can be calculated as follows:


    $$E(X, Y) = \sum_{c \in Y} P(c)E(c)$$ (5.25)


    where $X$ is the current state and $Y$ is the selected attribute. $P(c)$ is the
    probability of the attribute and $E(c)$ is the entropy of the attribute. For a
    table listed below, let''s calculate the entropy:


    | Conditions | Continue | Screen-out | Sum |

    | :--- | :---: | :---: | :---: |

    | Flat pressure | 4 | 1 | 5 |

    | Rising pressure | 4 | 2 | 6 |

    | Rapid rise | 1 | 4 | 5 |

    | Sum | 9 | 7 | 16 |


    Let''s go through the entropy calculations as follows:


    $$Probability(Flat\ Pressure) \times Entropy(4, 1) + Probability(Rising\ Pressure)
    \times Entropy(4, 2) + Probability(Rapid\ Rise) \times Entropy(1, 4)$$

    $$= \frac{5}{16} \times Entropy(4, 1) + \frac{6}{16} \times Entropy(4, 2) + \frac{5}{16}
    \times Entropy(1, 4)$$ (5.26)'

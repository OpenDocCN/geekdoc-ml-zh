    and then calculate global best position

    (iii) Update particles’ best previous position ($pbest_{ij}$) and global best
    position ($gbest_{ij}$)

    (iv) Update particles’ velocities and positions

    (v) If termination condition is satisfied then end the process otherwise go back
    to step (iii).



- img_proc: true
  md: '# Calculations sample.


    | EUR (x) | NPV (y) | $x^2$ | $x \times y$ |

    |---|---|---|---|

    | 5 | 3 | 25 | 15 |

    | 2 | 0.2 | 4 | 0.4 |

    | 8 | 7 | 64 | 56 |

    | 9 | 10 | 81 | 90 |

    | 3 | 1 | 9 | 3 |

    | Total (27) | Total (21.2) | Total (183) | Total (164.4) |


    Step 2) Calculate the slope ($m$) as follows:


    $$m = \frac{N \sum (xy) - \sum x \sum y}{N \sum (x^2) - (\sum x)^2} = \frac{(5
    \times 164.4) - (27 \times 21.2)}{(5 \times 183) - (27^2)} = 1.3419 \quad (5.33)$$


    Step 3) Calculate intercept ($b$) as follows:


    $$b = \frac{\sum y - m \sum x}{N} = \frac{21.2 - (1.3419 \times 27)}{5} = -3.00645
    \quad (5.34)$$


    Step 4) Assemble the equation of the line as follows:


    $$y = mx + b \rightarrow y = 1.3419x - 3.00645 \quad (5.35)$$


    Step 5) The last step is to compare the $y$ values with the calculated $y$-values
    from the line equation calculated in step 4 as shown in the table below:


    # Difference between $y$-values and calculated $y$-values from the line equation.


    | NPV (y) | Calculated $y$-values from line equation | Difference (error) |

    |---|---|---|

    | 3 | 3.7032 | 0.7032 |

    | 0.2 | $-0.3226$ | $-0.5226$ |

    | 7 | 7.7290 | 0.7290 |

    | 10 | 9.0710 | $-0.9290$ |

    | 1 | 1.0194 | 0.0194 |'

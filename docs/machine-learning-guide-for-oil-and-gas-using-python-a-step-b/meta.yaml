  md: 'An example of fuzzy set is shown in Fig. 8.6 where the membership to young
    and old fuzzy sets for age 50 is $\mu_{Young}(50) = 0.88$, $\mu_{Old}(50) = 0.12$.


    **Support** of a fuzzy set is the set of elements in the universe X with a nonzero
    membership function, $\mu_A(x) > 0$, $x \in X$. The **core** of a fuzzy set A
    is the set of elements with $\mu_A(x) = 1$. **Boundary** of fuzzy set A is a portion
    of the universe with nonzero membership which is not equal to 1. A crossover point
    of a fuzzy set A is the set with $\mu_A(x) = 0.5$. Core, support, and boundary
    are shown in Fig. 8.7.


    # Membership functions type


    A variety of membership functions can be used for fuzzy sets. These membership
    functions are one dimensional for each set; however, when introducing more complex
    fuzzy systems, higher-order membership functions can be derived from multiple
    membership functions. Based on the behavior of the input variables, the following
    one-dimensional forms of membership functions can be used: (i) Triangular, (ii)
    Trapezoidal, (iii) Gaussian, and (iv) Sigmoidal (Himanshu & Lone, 2019). Some
    membership functions have linear form, e.g., Triangular and Trapezoidal which
    have some limitations because of their linear forms. However, linear membership
    functions are simpler for illustration and initial design of a fuzzy system. Smooth
    membership functions, e.g., Gaussian and Sigmoidal, are more complicated to design
    but more effective


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_387_0.png)


    FIGURE 8.7 Representation of the core, support, and boundary.'
  merge: -1
  pgno: 387
- img_proc: true
  md: 'for automated control. Also, note that most membership functions can be defined
    as a one-sided function to cover the whole range of universe values. Triangular
    membership functions are characterized with three parameters [a,b,c] in Eq. (8.12)
    and an example is illustrated in Fig. 8.8.


    $$\mu_{Triangular}(x) = \max\left(\min\left(\frac{x-a}{b-a}, \frac{c-x}{c-b}\right),
    0\right)$$


    Trapezoidal membership functions can be characterized with four parameters [a,b,c,d]
    and those are specified as follows.


    $$\mu_{Trapezoid}(x) = \max\left(\min\left(\frac{x-a}{b-a}, 1, \frac{d-x}{d-c}\right),
    0\right)$$


    where $\frac{x-a}{b-a}$ represents the ascending edge and $\frac{d-x}{d-c}$ is
    the descending edge with negative slope. A sample of trapezoidal membership function
    can be seen in Fig. 8.9.


    Trapezoidal membership function will be primarily used in this chapter. Note that
    a one-sided trapezoidal membership function can be specified by having either
    $a = b$ or $c = d$.


    The next membership function is Gaussian function which follows a Gaussian distribution
    and is characterized with two parameters $(m, \sigma)$. The function form can
    be seen below and an example is illustrated in Fig. 8.10.


    $$\mu_{Gaussian}(x) = \exp\left(-\frac{1}{2}\left(\frac{x-m}{\sigma}\right)^2\right)$$


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_388_0.png)


    FIGURE 8.8 Triangular membership function.'

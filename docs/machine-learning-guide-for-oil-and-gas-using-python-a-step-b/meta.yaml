    \        second_parent=roul_choice(sorted_population)\n        # Crossover\n \
    \       offspring=crossover(first_parent, second_parent)\n        # Mutation\n\
    \        offspring=mutate(offspring)\n        next_generation[i,:]=offspring\n\
    \    return next_generation\n```\n\nIn these lines of codes, all the steps for\
    \ (iii) parent selection using (ii) fitness function and also performing (iv)\

    A dendrogram is used to show the hierarchical relationship between objects and
    is the output of the hierarchical clustering. A dendrogram could potentially help
    with identifying the number of clusters to choose when applying hierarchical clustering.
    Dendrogram is also helpful in obtaining the overall structure of the data. To
    illustrate the concept of using a dendrogram, let''s create a dendrogram for the
    hierarchical clustering example above. As illustrated in Fig. 4.15, the distance
    between well numbers 1 and 2 is 0.2 as shown on the y-axis (distance) and the
    distance between well numbers 3 and 4 is 0.5. Finally, merged clusters 1,2 and
    3,4 are connected and have a distance of 1.1.



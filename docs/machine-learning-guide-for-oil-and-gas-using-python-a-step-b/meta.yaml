  mdcn: "## 训练集的大小\n\n机器学习模型的可靠性取决于多个因素，如问题复杂度（输入、输出的数量及其相互关系）、模型选择、合适的超参数以及可用于训练/测试的数据量。关于可靠机器学习模型所需数据的大小，有两个重要问题。第一个是：达到高性能模型所需的最小样本或观测数量是多少？第二个问题是：添加新样本是否能提升模型性能（通常，拥有更多样本会提升模型质量）。例如，对于气体EUR预测问题，可以提出：训练一个具有可靠预测能力的模型所需的最小井数据量是多少？或者，要获得对泡点压力的稳健预测，所需的最小PVT样本数是多少？当数据集中的井数很重要时，这可能是一个具有挑战性的问题。对于井数较少的绿色油田，确定使模型可靠的最小井数至关重要。\n\
    \n有一些统计方法可以使用假设检验和置信区间来确定数据集中的最小样本数。然而，在机器学习问题中，模型的复杂度（超参数数量或模型类型）非常重要。为了评估训练样本大小对模型性能的影响，可以使用“学习曲线”（Albon,\
    \ 2018）。为了在Python中使用`learning_curve`，必须指定机器学习模型、输入和输出（目标）数据、训练数据样本的范围、交叉验证的折数，以及最终的评分指标。指定这些参数后，`learning_curve`算法从最小样本大小开始，将其分割成折，训练模型，最后测量训练折和测试折的分数。然后，它增加样本数量并重复上述过程，直到达到范围内的最大样本数。最后，可以将模型性能（在训练和测试数据上）与数据中的样本数量进行可视化。例如，将`learning_curve`应用于PVT问题。使用学习曲线解决PVT问题的Python代码如下：\n\
    \n```python\nimport numpy as np\nimport pandas as pd\nfrom sklearn.model_selection\
    \ import learning_curve\nfrom sklearn.neural_network import MLPRegressor\nimport\
    \ matplotlib.pyplot as plt\nfrom sklearn.preprocessing import MinMaxScaler\ndataset=pd.read_csv('Chapter7_PVT\
    \ Data.csv')\nX=dataset.iloc[:,0:4]\ny=dataset.iloc[:,4].values\nsc=MinMaxScaler()\n\
    Xnorm=pd.DataFrame(data=sc.fit_transform(X))\nseed=50\nnp.random.seed(seed)\n\
    clfB = MLPRegressor(activation='relu',alpha=0.01,\n    hidden_layer_sizes=7, learning_rate_init=0.01,\n\
    \    max_iter=500, solver='lbfgs',random_state=20)\ntrain_sample_sizes, train_MSEscores,test_MSEscores\
    \ = learning_curve(clfB,Xnorm,y,cv=5,\n    scoring='neg_mean_absolute_error',n_jobs=-1,\n\
    \    train_sizes=np.linspace(0.1,1.0,100),random_state=10)\ntrain_MSEmean = np.mean(train_MSEscores,\
    \ axis=1)\ntest_MSEmean = np.mean(test_MSEscores, axis=1)\nplt.plot(train_sample_sizes,\
    \ -train_MSEmean, color=\"k\",\n    label=\"Training MSE score\")\nplt.plot(train_sample_sizes,\
    \ -test_MSEmean,'--', color=\"k\",\n    label=\"Cross-validation MSE score\")\n\
    plt.title(\"Learning Curve for PVT Data Set\")\nplt.xlabel(\"Training Set Sample\
    \ Size\"), plt.ylabel(\"MSE Score\"),\nplt.legend(loc=\"best\")\nplt.tight_layout()\n\
    plt.show()\n```\n\nPython输出=图7.15\n\n如图7.15所示，当训练数据集中的样本数量增加时，训练的平均MSE变化不大，而交叉验证的平均MSE则下降。当训练数据集中的样本数量达到120时，交叉验证的平均MSE稳定在105。这意味着要获得最高的MSE或最佳\n\
    \n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_376_0.png)\n\n图7.15 PVT估计问题的学习曲线。\n\
    \n374 使用Python的油气机器学习指南\n\n```python\nfrom sklearn.model_selection import train_test_split\n\
    X_train, X_test, y_train, y_test=train_test_split(X, y, test_size=0.25)\nmodel=make_pipeline(MinMaxScaler(),\
    \ MLPRegressor(hidden_layer_sizes=(25,25),\n                                 \
    \               learning_rate_init=0.01,\n                                   \
    \             early_stopping=True,max_iter=500))\nmodel.fit(X_train, y_train)\n\
    print(\"Test R2 score: {:.2f}\".format(model.score(X_test, y_test)))\nfeatures=['Stage\
    \ Spacing','bbl/ft','Proppant Loading','Dip',\n          'Thickness','Lateral\
    \ Length','Injection Rate','Porosity',\n          'Percentage of LG']\nplot_partial_dependence(model,X,\
    \ features,\n                       n_jobs=3, grid_resolution=20)\nfig = plt.gcf()\n\

    \ (1st ed.). O'Reilly Media. ISBN-10 : 1449369413.\n\n# Chapter 8\n\n## Fuzzy\
    \ logic\n\nIn almost every complex problem, it is required to deal with uncertainty.\
    \ The logic that has been used for most of the last 2000 years to address uncertainty\
    \ in the problems comes from Aristotle's logic or Stoic logic. In this logic,\
    \ binary faith resulted in one important rule that was either the fact or not\
    \ the fact. This logic considered the world in a black and white or bivalent manner\
    \ that, for example, says the sky is blue or not blue (Kosko, 1994). Gradually,\
    \ from the 17th century, philosophers and scientists realized that some scientific\
    \ statements cannot be completely true or false. They started to move from deterministic\
    \ (black and white) statements to gray or fuzzy ones.\n\nThe Stoic logic was improved\
    \ and formulated in an algebraic way by George Boole as Boolean Logic. His works\
    \ also included the illustration of using probability theory to analyze large\
    \ quantities of social data. Decades after Boole had published the *Laws of Thought*,\
    \ in which he covered theories of logic and probabilities, Georg Cantor, a German\
    \ mathematician, introduced Cantor set or \"Set Theory.\" The works of Boole and\
    \ Cantor were the foundation of probability theory, very powerful in dealing with\
    \ uncertainties in problems. Probability theory can mostly be applied to the problems\
    \ that are governed by randomness. For cases that partial unreliable information\
    \ is available or there are imprecision and vagueness in language that defines\
    \ the problem, probability theory is not very practical. In these cases, uncertainty\
    \ and vagueness should be handled with a different technique (Rajasekaran & Pai,\
    \ 2013).\n\nFrom the beginning of the 20th century, many scientists like Charles\
    \ Sanders Peirce, Jan Lukasiewicz, and Max Black started considering vagueness\

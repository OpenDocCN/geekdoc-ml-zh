    recurrent neural networks considering permeability multiplier as the input and
    production/injection rates and cumulative production/injection as output. Their
    RNN models showed good quality, especially for predicting future rates that were
    seen by the model during training. Chaun et al. (Tian & Horne, 2017) used RNNs
    to analyze permanent downhole gauge (PDG) data for reservoir characterization.
    They considered synthetic and actual cases in which flow rate and time were inputs
    and pressure (with and without noise) was output for the NARX (nonlinear autoregressive
    exogenous) model. Bao et al. (Bao et al., 2020) investigated the performance of
    LSTM and Ensemble Kalman filter LSTM on building proxy model for the reservoirs.
    Their proxy model can predict production and water cut using previous production
    rate, water cut, injection rate, and bottom hole pressure as inputs. Srinath et
    al. (Madasu & Rangarajan, 2018) developed a real time LSTM-based model to predict
    surface pressure for multistage pumping data during hydraulic fracturing using
    flow rate and proppant concentration. They used data from 3 wells (Permian, Marcellus,
    and Niobrara regions) to train the model. For all three wells, model''s prediction
    for surface pressure is within 5% of the actual values. Sun et al. (Sun et al.,
    2020) used both physics-based and data-driven models to predict screen out during
    hydraulic fracturing. Labeled data (screen out or not) at each time are considered
    as target and 14 features such as pressure, slurry rate, and proppant concentration
    as inputs for the LSTM model.


    # Frac treating pressure prediction using LSTM


    In this section, the one section frac stage data will be used to build an LSTM
    model to use the last 60 seconds of slurry rate and proppant concentration data
    to predict treatment pressure for the next second. This is for showing the proof
    of concept. In this exercise, the first 60 s of data will be used to predict the
    next second (61st second). Thereafter, seconds 2 to 61 will be used to predict
    the next second (62nd second). This process is then continued. The figure below
    illustrates this concept. 60 s is an arbitrary window size that was chosen for
    this exercise, and other window sizes such as 30, 90, 120, etc., can be evaluated
    as well.


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_334_0.png)'

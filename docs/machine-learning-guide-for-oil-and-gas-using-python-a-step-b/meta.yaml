    into clusters. Hierarchical clustering just like k-means clustering uses a **distance-based
    algorithm** to measure the distance between clusters. There are two main types
    of hierarchical clustering as follows:


    +   1) **Agglomerative hierarchical clustering (additive hierarchical clustering):**
    In this type, each point is assigned to a cluster. For instance, if there are
    10 points in a data set, there will be 10 clusters at the beginning of applying
    hierarchical clustering. Afterward, based on a distance function such as euclidean,
    the closest pair of clusters are merged. This iteration is repeated until a single
    cluster is left.


    2) **Divisive hierarchical clustering:** This type of hierarchical clustering
    works the opposite way of agglomerative hierarchical clustering. Hence, if there
    are 10 data points, all data points will initially belong to one single cluster.
    Afterward, the farthest point is split in the cluster and this process continues
    until each cluster has a single point.


    To further explain the concept of hierarchical clustering, let''s go through a
    step-by-step example of applying agglomerative hierarchical clustering to a small
    data set of 4 wells with their respective EURs as shown below. Note that since

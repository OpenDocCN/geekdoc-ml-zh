    \ library as follows:\n\n```python\nfrom sklearn.ensemble import AdaBoostRegressor\n\
    ```\n\nPlease note that if a classification problem is in question, simply use\
    \ \"AdaBoostClassifier\" instead. Next, define the hyperparameters in the adaptive\
    \ boosting regression algorithm. \"base_estimator\" defines how the boosted ensemble\
    \ is built. If \"None\" is selected, a \"DecisionTreeRegressor(max_depth=3)\"\
    \ is the default model estimator that will be used. For this example, the \"DecisionTreeRegressor()\"\
    \ was first imported \"from sklearn.tree\" and the hyperparameters within the\
    \ decision tree algorithm were adjusted to have a max depth of \"None,\" \"min_sample_split\"\
    \ of 4, and \"min_sample_leaf\" of 2. A loss function of \"linear,\" \"square,\"\
    \ and \"exponential\" can be used. A linear loss function was used in the example,\
    \ but feel free to adjust to the other two and observe the resulting impact. The\
    \ rest of the parameters such as \"n_estimators\" and \"learning_rate\" were previously\
    \ discussed.\n\n```python\nfrom sklearn.tree import DecisionTreeRegressor\nnp.random.seed(seed)\n\
    agb=AdaBoostRegressor(base_estimator=\n    DecisionTreeRegressor(max_depth=None,min_samples_split=4,\n\
    \    min_samples_leaf=2), n_estimators=200,\n    learning_rate=0.1,loss='linear')\n\
    ```\n\nNext, fit \"agb\" to \"(X_train,y_train)\" and predict both training and\
    \ testing data, and obtain R² on both training and testing data as follows:\n\n\
    ```python\nagb.fit(X_train,y_train)\ny_pred_train=agb.predict(X_train)\ny_pred_test=agb.predict(X_test)\n\
    corr_train=np.corrcoef(y_train, y_pred_train)[0,1]\nprint('Training Data R^2=',round(corr_train**2,4),'R=',\n\

    # Box plots


    Another important visualization plot that is recommended to be paired with distribution
    plots is box plots. Box plots are great visualization tools to identify anomalous
    and outlier points. Please note that the following parameters can be obtained
    from a box plot:


    +   - Median (50th percentile)

    - First quartile (25th percentile)

    - Third quartile (75th percentile)

    - Interquartile range (25th to 75th percentile)

    - Maximum: this is not the maximum value in a data set and it is defined as: Q3
    + 1.5 * IQR

    - Minimum: this is not the minimum value in a data set and it is defined as: Q1
    - 1.5 * IQR

    - Outliers are the points that lie outside of "Minimum" and "Maximum" terms defined
    above.


    Fig. 2.23 illustrates the above definitions for simplicity of understanding box
    plots.



    Next, let’s define the parameters that are used within a decision tree. "Criterion"
    is used to measure the quality of a split. The options that are provided in scikit-learn
    when using a "DecisionTreeRegressor" are "mse" standing for mean squared error,
    "mae" standing for mean absolute error, and "friedman_mse" standing for mean squared
    error with Friedman’s improvement score. In this example, "mse" is chosen; however,
    this is one of the hyperparameters that can be used when grid search is applied.
    Please note that in classification problems, "gini" for Gini index or "entropy"
    for information gain can be used under "criterion."


    The next parameter is called "**max_depth**" and according to scikit-learn, it
    is defined as the "maximum depth of the tree" and the default value is "None"
    which means "the nodes get expanded" until all leaves are pure or until all leaves
    contain less than "min_samples_split" samples (will be discussed shortly). In
    essence, the maximum depth of a decision tree can be the "number of training samples-1,"
    but please note that this length of a depth can lead to severe overfitting. Therefore,
    if a decision tree model is overfitted, reduce "max_depth" and, as previously
    discussed, always make sure to use cross-validation. Note that having a low "max_depth"
    could lead to underfitting. Therefore, compare the training and testing accuracy
    scores with various values for "max_depth." The higher the "max_depth," the deeper
    the tree and the more splits that will be associated with that tree. More splits
    mean capturing more information. Therefore, a higher depth leads to overfitting.


    The next parameter is called "**min_sample_split**" and, according to the scikit-learn
    library, it is defined as "The minimum number of samples required to split an
    internal node." Please refer to Fig. 5.38 to note that an internal node is the
    same as a decision node, and it can have children and branch off into other nodes.
    Please note that high values of "min_sample_split" could lead to underfitting
    because higher values of "min_sample_split" prevent a model from learning the
    details. In other words, the higher the "min_sample_split," the more constraint
    the tree becomes since it must consider more samples at each node. The default
    value in scikit-learn is 2. Simply increase "min_sample_split" from the default
    value of 2–100 and it’ll lead to a much lower model accuracy. Therefore, this
    is one of the parameters used to control overfitting and can be used as a hyper
    parameter when performing grid search optimization.


    "**min_sample_leaf**" is another parameter used to control overfitting and, according
    to scikit-learn, this parameter is defined as "The minimum number of samples required
    to be at a leaf node." The key difference between "min_sample_split" and "min_sample_leaf"
    is that the first focuses on an internal or decision node while the second focuses
    on a leaf or terminal node. A high value of "min_sample_leaf" will also lead to
    severe underfitting while a low value will lead to overfitting. Please make sure
    to include this parameter as one of the hyperparameters to be optimized when performing
    grid search optimization (discussed in chapter 7).'

    there is no need to visit multiple sources to obtain the necessary data to perform
    ML analysis. If your company is small and privately held, it is worthwhile to
    invest into a data warehouse where data from different sources are compiled into
    one source. The setup might be a lengthy project, but will pay off in the long
    run. Even if your company’s intention is to sell the asset and cash out, it is
    still important to have the data warehouse setup because this would be a selling
    point to any major operator. Data are the new gold and whoever has the best system
    in terms of storing and analyzing data would be the most powerful in terms of
    adding significant financial benefit.


    Before proceeding to data cleaning, it is important to understand the term “data
    center.” A data center is simply a building, multiple buildings, or a dedicated
    space within a building that houses hardware, data storage, servers, computer
    systems, etc., for an organization. There are different varieties of data centers
    as follows:


    +   - **On-premises data center**, also referred to as on-prem data center, is
    a group of servers owned and controlled privately by an organization. Therefore,
    there is complete control over the hardware. In an on-prem data center, there
    is an upfront capital investment which is one of the biggest disadvantages of
    this kind of data center. The upfront capital investment is used to buy server
    and networking hardware required to set up the data center. In addition, there
    are ongoing maintenance costs associated with maintaining the hardware since they
    will age and need to be maintained/replaced. On-prem data centers are typically
    found to have limited scalability due to the time needed to bring additional servers
    online. As observed, an on-prem data center uses space and power regardless of
    its usage amount. The security of the data center depends entirely on the local
    IT team. In addition, updates are not automatic and rely on the IT team. The main
    advantage of an on-prem data center is that the cost of use is easier to understand
    (when compared to cloud data centers), privacy can be maintained, and there is
    complete control over hardware. An on-prem data'

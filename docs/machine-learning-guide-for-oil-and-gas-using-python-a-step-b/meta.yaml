    ## Biography


    Hoss Belyadi is the founder and CEO of Obser-telligence, LLC, focused on providing
    artificial intelligence (AI) in-house training and solutions. As an adjunct faculty
    member at multiple universities, including West Virginia University, Marietta
    College, and Saint Francis University, Mr. Belyadi taught data analytics, natural
    gas engineering, enhanced oil recovery, and hydraulic fracture stimulation design.
    With over 10 years of experience working in various conventional and unconventional
    reservoirs across the world, he works on diverse machine learning projects and
    holds short courses across various universities, organizations, and the department
    of energy (DOE). Mr. Belyadi is the primary author of *Hydraulic Fracturing in
    Unconventional Reservoirs* (first and second editions) and is the author of *Machine
    Learning Guide for Oil and Gas Using Python*. Hoss earned his BS and MS, both
    in petroleum and natural gas engineering from West Virginia University.


    Dr. Alireza Haghighat is a senior technical advisor and instructor for Engi-neering
    Solutions at IHS Markit, focusing on reservoir/production engineering and data
    analytics. Prior to joining IHS, he was a senior reservoir engineer at Eclipse/Montage
    resources for nearly 5 years. As a reservoir engineer, he was involved in well
    performance evaluation with data analytics, rate transient analysis of unconventional
    assets (Utica and Marcellus), asset development, hydraulic fracture/reservoir
    simulation, DFIT analysis, and reserve evaluation. He was an adjunct faculty at
    Pennsylvania State University (PSU) for 5 years, teaching courses in Petroleum
    Engineering/Energy, Business and Finance departments. Dr. Haghighat has published
    several technical papers and book chapters on machine learning applications in
    smart wells, CO₂ sequestration modeling, and production analysis of unconventional
    reservoirs. He has received his PhD in petroleum and natural gas engineering from
    West Virginia University and a master’s degree in petroleum engineering from Delft
    University of Technology.


    ## Acknowledgment


    We would like to thank the whole Elsevier team including Katie Hammon, Hilary
    Carr, and Poulouse Joseph for their continued support in making the publication
    process a success. I, Hoss Belyadi, would like to thank two individuals who have
    truly helped with the grammar and technical review of this book. First, I would
    like to thank my beautiful wife, Samantha Walstra, for her continuous support
    and encouragement during the past 2 years of writing this book. I would also like
    to express my deepest appreciation to Dr. Neda Nasiriani for her technical review
    of the book.


    I, Alireza Haghighat, want to acknowledge Dr. Shahab D. Mohaghegh, who was my
    PhD advisor. He, a pioneer of AI & ML applications in the oil and gas industry,
    has guided me in my journey to learn petroleum data analytics. I would like to
    thank my wife, Dr. Neda Nasiriani, who has been incredibly supportive throughout
    the process of writing this book. She encouraged me to write, made recommendations
    that resulted in improvements, and reviewed every chapter of the book from a computer
    science point of view. I also want to thank Samantha Walstra for reviewing the
    technical writing of this book.


    # Chapter 1


    ## Introduction to machine learning and Python


    ### Introduction


    Artificial Intelligence (AI) and machine learning (ML) have grown in popularity
    throughout various industries. Corporations, universities, government, and research
    groups have noticed the true potential of various applications of AI and ML to
    automate various processes while increasing predicting capabilities. The potential
    of AI and ML is a remarkable game changer in various industries. The technological
    AI advancements of self-driving cars, fraud detection, speech recognition, spam
    filtering, Amazon and Facebook’s product and content recommendations, etc., have
    generated massive amounts of net asset value for various corporations. The energy
    industry is at the beginning phase of applying AI to different applications. The
    rise in popularity in the energy industry is due to new technologies such as sensors
    and high-performance computing services (e.g., Apache Hadoop, NoSQL, etc.) that
    enable big data acquisition and storage in different fields of study. Big data
    refers to a quantity of data that is too large to be handled (i.e., gathered,
    stored, and analyzed) using common tools and techniques, e.g., terabytes of data.
    The number of publications in this domain has exponentially increased over the
    past few years. A quick search on the number of publications in the oil and gas
    industry with Society of Petroleum Engineer’s OnePetro or American Association
    of Petroleum Geologists (AAPG) in the past few years attests to this fact. As
    more companies realize the value added through incorporating AI into daily operations,
    more creative ideas will foster. The intent of this book is to provide a step-by-step,
    easy-to-follow workflow on various applications of AI within the energy industry
    using Python, a free open source programming language. As one continues through
    this book, one will notice the incredible work that the Python community has accomplished
    by providing various libraries to perform ML algorithms easily and efficiently.
    Therefore, our main goal is to share our knowledge of various ML applications
    within the energy industry with this step-by-step guide. Whether you are new to
    data science/programming language or at an advanced level, this book is written
    in a manner suitable for anyone. We will use many examples throughout the book'

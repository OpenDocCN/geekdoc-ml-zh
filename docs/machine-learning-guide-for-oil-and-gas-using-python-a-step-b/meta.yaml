    # Support vector machine implementation in scikit-learn


    In this section, building a step-by-step ML model for SVM implementation in Python
    will be covered. One of the most important parameters in hydraulic fracturing
    design is the geomechanical properties of the rock. The geo-mechanical properties
    such as Poisson’s ratio, Young’s modulus, and minimum horizontal stress determine
    fracture geometry as well as ease of fracturing operationally. Brittle rocks with
    high Young’s modulus and low Poisson’s ratio are easier to frac while ductile
    rocks are much harder to hydraulically fracture. The geomechanical properties
    of the rock can be determined using sonic logs. However, please note that running
    sonic log on every well is either simply not economically feasible or can become
    very expensive. Therefore, the existing sonic logs can be used to train a ML model
    to predict shear and compression wave travel times (Δt_s and Δt_c). The calculations
    of Young’s modulus and Poisson’s ratio are as follows (Belyadi et al., 2019):


    ```

    $$R_v = \frac{\Delta t_s}{\Delta t_c}$$


    $$\Delta t_s = \text{Shear wave travel time, } \mu\text{sec/ft (obtained from
    sonic log)}$$


    $$\Delta t_c = \text{Compression wave travel time, } \mu\text{sec/ft (obtained
    from sonic log)}$$


    (5.20)

    ```


    Shear and compression wave travel times are directly obtained from sonic logs.
    The goal in this exercise is to train a ML model using SVM to predict shear and
    compression wave travel times. After training a ML model, a triple combo log with
    basic log properties such as gamma ray, bulk density, resistivity, total or neutron
    porosity, and depth can be used to predict shear and compression wave travel times
    in areas where there is no access to sonic logs. Therefore, as opposed to spending
    more money in obtaining new sonic logs, the trained ML model can be used to **predict**
    shear and compression wave travel times in an attempt to calculate geomechanical
    properties. Poisson’s ratio, formation modulus, and dynamic young’s modulus can
    be calculated as follows:'

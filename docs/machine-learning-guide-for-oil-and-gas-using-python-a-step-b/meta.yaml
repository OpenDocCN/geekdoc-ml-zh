    # Partial dependence plots


    When a machine learning model is trained, and its prediction performance is verified
    with evaluation techniques like cross-validation, it is possible to use the model
    for prediction or sensitivity analysis. It is sometimes required to understand
    what is the impact of one or several input attributes on the target value. One
    way is to create a matrix of all the input attributes and keep the value of each
    attribute equal to average or any other desired value. Then, vary the one specific
    attribute that is required for sensitivity analysis within the desired range.
    Finally, by using the matrix of input data (with one variable attribute) and predicting
    the model response, the dependency between target and input attribute can be identified.


    In Python, the interaction between the target and an input variable can be visualized
    by "partial dependence plots (PDPs)." What PDP does, is to plot the average of
    the model''s outcome over multiple combinations of input variables versus a specific
    input. In order to visualize the relationship between the target and two input
    variables, heat map, contour lines, or 3D plots can be used (scikit).


    In Chapter 6, the neural network was used to correlate gas EUR to 13 different
    geology, drilling, and completion variables. In this chapter, PDPs are used to
    find the dependency between gas EUR and some important input variables. In Chapter
    6, based on feature ranking analysis, it was determined that lateral length and
    proppant loading had the highest impact on the EUR. The partial dependence relations
    for pairs of some input variables and gas EUR can be plotted in Python by the
    following code:


    ```

    import numpy as np

    import pandas as pd

    import matplotlib.pyplot as plt

    from sklearn.pipeline import make_pipeline

    from sklearn.neural_network import MLPRegressor

    from sklearn.inspection import partial_dependence

    from sklearn.inspection import plot_partial_dependence

    from sklearn.preprocessing import MinMaxScaler

    import seaborn as sns

    dataset=pd.read_csv(''Chapter7_Shale Gas Wells.csv'')

    X=dataset.iloc[:,0:13]

    y=dataset.iloc[:,13].values

    seed=15

    np.random.seed(seed)

    ```'
- md: "## Size of training set\n\nThe reliability of a machine learning model depends\
    \ on multiple factors like problem complexity (number of inputs, outputs, and\
    \ interconnection), model selection, proper hyperparameters, and the amount of\
    \ data available for training/testing. There are two important questions about\
    \ the size of the required data for a reliable machine learning model. The first\
    \ one is what is the minimum number of samples or observations that result in\
    \ a high-performance model. The second question is whether adding new samples\
    \ improves the performance of the model (generally, having more samples improves\
    \ the model quality). For example, for the gas EUR prediction problem, one can\
    \ ask: What is the minimum number of well data required for training a model with\
    \ reliable prediction? Or what is the minimum number of PVT samples that are required\
    \ to have a robust prediction for bubble point pressure? This can be a challenging\
    \ question when the number of wells in the data set is important. For the green\
    \ fields when the number of wells is low, it is very important to identify the\
    \ minimum number of wells to make reliable models.\n\nThere are some statistical\
    \ methods that can be used to specify the minimum number of samples in the data\
    \ set using hypothesis testing and a confidence interval. However, in machine\
    \ learning problems, the complexity of the model (number of hyperparameters or\
    \ model's type) is very important. To evaluate the impact of a training sample\
    \ size on the model performance, \"Learning Curve\" can be used (Albon, 2018).\
    \ In order to use \"learning_curve\" in Python, one must specify the machine learning\
    \ model, input and output (target) data, a range for training data samples, the\
    \ number of folds for cross-validation, and finally score metric. After specifying\
    \ these parameters, the Learning_curve algorithm starts with minimum sample size,\
    \ splits it into folds, trains the model, and finally measures the score for train\
    \ and test folds. Then, it increases the number of samples and repeats the mentioned\
    \ procedure until it reaches a maximum number of samples in the range. At the\
    \ end, the performance of the model (on both train and test data) versus the number\
    \ of samples in the data can be visualized. As an example, Learning_curve is applied\
    \ to the PVT problem. Python codes for using Learning Curve for PVT problem is\
    \ as follows:\n\n```python\nimport numpy as np\nimport pandas as pd\nfrom sklearn.model_selection\
    \ import learning_curve\nfrom sklearn.neural_network import MLPRegressor\nimport\
    \ matplotlib.pyplot as plt\nfrom sklearn.preprocessing import MinMaxScaler\ndataset=pd.read_csv('Chapter7_PVT\
    \ Data.csv')\nX=dataset.iloc[:,0:4]\ny=dataset.iloc[:,4].values\nsc=MinMaxScaler()\n\
    Xnorm=pd.DataFrame(data=sc.fit_transform(X))\nseed=50\nnp.random.seed(seed)\n\
    clfB = MLPRegressor(activation='relu',alpha=0.01,\n    hidden_layer_sizes=7, learning_rate_init=0.01,\n\
    \    max_iter=500, solver='lbfgs',random_state=20)\ntrain_sample_sizes, train_MSEscores,test_MSEscores\
    \ = learning_curve(clfB,Xnorm,y,cv=5,\n    scoring='neg_mean_absolute_error',n_jobs=-1,\n\
    \    train_sizes=np.linspace(0.1,1.0,100),random_state=10)\ntrain_MSEmean = np.mean(train_MSEscores,\
    \ axis=1)\ntest_MSEmean = np.mean(test_MSEscores, axis=1)\nplt.plot(train_sample_sizes,\
    \ -train_MSEmean, color=\"k\",\n    label=\"Training MSE score\")\nplt.plot(train_sample_sizes,\
    \ -test_MSEmean,'--', color=\"k\",\n    label=\"Cross-validation MSE score\")\n\
    plt.title(\"Learning Curve for PVT Data Set\")\nplt.xlabel(\"Training Set Sample\
    \ Size\"), plt.ylabel(\"MSE Score\"),\nplt.legend(loc=\"best\")\nplt.tight_layout()\n\
    plt.show()\n```\n\nPython output=Fig. 7.15\n\nAs it is shown in Fig. 7.15, when\
    \ the number of samples in the training data set increases the average MSE for\
    \ training does not change significantly while the average MSE for the cross-validation\
    \ decreases. When the number of samples in the training data set reaches 120,\
    \ the average MSE for the cross-validation flattens to 105. It means that to have\
    \ the highest MSE or the best\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_376_0.png)\n\
    \nFIGURE 7.15 Learning curve for PVT estimation problem.\n\n374 Machine Learning\
    \ Guide for Oil and Gas Using Python\n\n```python\nfrom sklearn.model_selection\
    \ import train_test_split\nX_train, X_test, y_train, y_test=train_test_split(X,\
    \ y, test_size=0.25)\nmodel=make_pipeline(MinMaxScaler(), MLPRegressor(hidden_layer_sizes=(25,25),\n\
    \                                                learning_rate_init=0.01,\n  \
    \                                              early_stopping=True,max_iter=500))\n\
    model.fit(X_train, y_train)\nprint(\"Test R2 score: {:.2f}\".format(model.score(X_test,\
    \ y_test)))\nfeatures=['Stage Spacing','bbl/ft','Proppant Loading','Dip',\n  \
    \        'Thickness','Lateral Length','Injection Rate','Porosity',\n         \
    \ 'Percentage of LG']\nplot_partial_dependence(model,X, features,\n          \
    \             n_jobs=3, grid_resolution=20)\nfig = plt.gcf()\nfig.suptitle('Partial\
    \ dependence of Gas EUR\\n for Stage Spacing,bbl/ft,'\n             'Proppant\
    \ Loading,Dip,Thickness,Lateral Length,Injection Rate,'\n             'Porosity,Percentage\
    \ of LG')\nfig.subplots_adjust(hspace=0.3)\n```\n\nPython output=Fig. 7.12 Test\
    \ R2 score: 0.79\n\nNote: The three lines of code beginning with \"fig.suptitle\"\
    \ should be in the same line in Jupyter.\n\nThe pipeline was used to connect the\
    \ data preprocessing step (MinMaxScaler) and the model (MLPRegressor) and assemble\
    \ them together. The assembly eliminates the need to scale the data since MinMaxScaler\
    \ is part of the process within the pipeline. As shown in Fig. 7.12, there is\
    \ an increasing\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_372_0.png)\n\nFIGURE\
    \ 7.12 Partial dependence plot for gas EUR and several input attributes.\n\ntrend\

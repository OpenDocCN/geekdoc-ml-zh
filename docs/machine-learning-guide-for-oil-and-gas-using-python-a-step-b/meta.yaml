    \n## loc and iloc\n\nloc is for selecting rows and columns by **label**. The format\
    \ for loc is the rows of interest followed by columns of interest. Let's create\
    \ a 5×5 random number matrix as follows:\n\n```\nfrom numpy.random import randn\n\
    seed=200\nnp.random.seed(seed)\nmatrix=pd.DataFrame(randn(5,5), columns='Cycle_1\
    \ Cycle_2 Cycle_3 Cycle_4 Cycle_5'.split())\nmatrix\nPython output=Fig. 1.18\n\
    ```\n\n| | Cycle_1 | Cycle_2 | Cycle_3 | Cycle_4 | Cycle_5 |\n|---|---|---|---|---|---|\n\
    | 0 | -1.450948 | 1.910953 | 0.711879 | -0.247738 | 0.361466 |\n| 1 | -0.032950\
    \ | -0.221347 | 0.477257 | -0.691939 | 0.792006 |\n| 2 | 0.073249 | 1.303286 |\
    \ 0.213481 | 1.017349 | 1.911712 |\n| 3 | -0.529672 | 1.842135 | -1.057235 | -0.862916\
    \ | 0.237631 |\n| 4 | -1.154182 | 1.214984 | -1.293759 | 0.822723 | -0.332151\
    \ |\n\nFIGURE 1.18 matrix data frame.\n\nFrom the 5×5 matrix above, let's select\
    \ rows 0 through 2 and all columns as follows:\n\n```\nmatrix.loc[0:2,:]\nPython\
    \ output=Fig. 1.19\n```\n\n| | Cycle_1 | Cycle_2 | Cycle_3 | Cycle_4 | Cycle_5\
    \ |\n|---|---|---|---|---|---|\n| 0 | -1.450948 | 1.910953 | 0.711879 | -0.247738\
    \ | 0.361466 |\n| 1 | -0.032950 | -0.221347 | 0.477257 | -0.691939 | 0.792006\
    \ |\n| 2 | 0.073249 | 1.303286 | 0.213481 | 1.017349 | 1.911712 |\n\nFIGURE 1.19\
    \ First three rows of the matrix data frame.\n\nAs demonstrated, bracket notation\
    \ must be used with \".loc[].\" In addition, \":\" can be used to represent either\
    \ all rows or all columns. The code above can also be rewritten as follows with\
    \ the same outcome:\n\n```\nmatrix.loc[[0,1,2],:]\nPython output=same as above\n\
    ```\n\nPlease note instead of specifying rows of 0, 1, and 2, it is recommended\
    \ to use [0:2] if the rows of interest are continuous. If the rows of interests\
    \ are not continuous, the above command can be used instead.\n\nTo select all\
    \ rows and the first two columns, the code below can be used:\n\n```\nmatrix.loc[:,['Cycle_1','Cycle_2']]\n\

    \ and testing data as follows:\n\n```\ncorr_train=np.corrcoef(y_train, y_pred_train)\
    \ [0,1]\nprint('Training Data R^2=',round(corr_train**2,4),'R=',\n    round(corr_train,4))\n\
    Python output=Training Data R^2=0.9903 R=0.9952\n```\n\n```\ncorr_test=np.corrcoef(y_test,\
    \ y_pred_test) [0,1]\nprint('Testing Data R^2=',round(corr_test**2,4),'R=',\n\
    \    round(corr_test,4))\nPython output=Testing Data R^2=0.9168 R=0.9575\n```\n\
    \nLet's also visualize training and testing actual versus prediction as follows:\n\
    \n```\nplt.figure(figsize=(10,8))\nplt.plot(y_train, y_pred_train, 'b.')\nplt.xlabel('NPV\
    \ Training Actual')\nplt.ylabel('NPV Training Prediction')\nplt.title('NPV Training\
    \ Actual Vs. Prediction')\nPython output=Fig. 5.60\n```\n\n```\nplt.figure(figsize=(10,8))\n\
    plt.plot(y_test, y_pred_test, 'b.')\nplt.xlabel('NPV Testing Actual')\nplt.ylabel('NPV\

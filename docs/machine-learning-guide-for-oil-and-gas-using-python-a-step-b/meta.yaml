    scoresSK=cross_val_score(KNC, xnorm, y,cv=skfold,scoring=''accuracy'')

    print(" StratifiedKFold Cross-validation scores: {}". format (scoresSK))

    print(" Average StratifiedKFold cross-validation score: {}". format (scoresSK.mean()))

    ```



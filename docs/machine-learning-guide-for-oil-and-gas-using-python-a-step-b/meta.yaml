  md: '![](img/84bb0bcf926cd79dfa24aaffa8e553c8_328_0.png)


    FIGURE 6.24 Applying rectified linear unit (ReLU) activation function on the feature
    map.


    function. Next, the filter returns either maximum (max pooling) or average (average
    pooling) values of the section that is covered by the filter. The max pooling
    examples are shown in Fig. 6.25.


    # Fully connected layers


    After the pooled feature maps are generated, they go through a flattening process
    to generate a one-dimensional matrix that will be considered as the input layer
    for a deep neural network. A flattening example is shown in Fig. 6.26. Next, the
    neural network goes through a training process to classify the images. The whole
    workflow is shown in Fig. 6.27.



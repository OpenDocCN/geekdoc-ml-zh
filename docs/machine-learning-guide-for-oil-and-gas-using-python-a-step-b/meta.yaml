  md: '# Fuzzy inference system


    A fuzzy inference system is a principled control system based on the fuzzy theory.
    The main components of this system are (i) Fuzzification, (ii) Fuzzy Rules Definition,
    (iii) Fuzzy Inference, and (iv) Defuzzification of the decision (Himanshu & Lone,
    2019). All these steps are illustrated in a temperature control system and also
    a choke size control example in the next section. These four steps help us to
    define a logical framework based on the linguistic values defined and characterized
    using fuzzy sets. This system is similar to how humans use reasoning statements
    to solve some problems. This kind of control deems powerful in many engineering
    problems including oil and gas operations. There are three methods to perform
    a fuzzy inference system as Mamdani, Takagi-Sugeno, and Tsukamoto (Himanshu &
    Lone, 2019). In this book, the Mamdani Inference is used for two examples. The
    general workflow of the fuzzy inference system is shown in Fig. 8.14.


    # Input fuzzification


    For (i) fuzzification, each input variable ($I_i$) and output variable ($O_i$)
    is considered over a meaningful universe (range of values). Also, a set of linguistic
    valuations for that input variable are used. For example, for temperature, a range
    [30, 120] can be defined and two linguistic variables "Cold" and "Hot" can be
    used to characterize the state of the temperature in our system. As part of fuzzification
    step, a membership function has to be defined for all the variables in that universe
    ($\mu_i(x)$, $x \in I_i$). Note that membership function can be of different forms,
    e.g., triangular, trapezoid, Gaussian. For example, membership functions $\mu_{Cold}(x)$
    and $\mu_{Hot}(x)$ for linguistic values "Cold" and "Hot" can be considered as
    shown in Fig. 8.15 with the following membership function definitions:


    $$\mu_{Cold}(x) = \max\left(\min\left(1, \frac{80-x}{80-60}\right), 0\right) \quad
    (8.20)$$


    $$\mu_{Hot}(x) = \max\left(\min\left(\frac{x-60}{80-60}, 1\right), 0\right) \quad
    (8.21)$$


    Consider a temperature control system where the fan speed is controlled given
    the input temperature and humidity level. In order to perform


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_392_0.png)'
  merge: -1
  pgno: 392

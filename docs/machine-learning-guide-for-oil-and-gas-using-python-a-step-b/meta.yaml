    \ Local outlier factor (LOF)\n\nLOF is another useful unsupervised ML algorithm\
    \ that identifies outliers with respect to the local neighborhoods as opposed\
    \ to using the entire data distribution (Breunig et al., 2000). LOF is a density-based\
    \ technique that uses the nearest neighbor search to identify the anomalous points.\
    \ The advantage of using an LOF is identifying points that are outliers relative\
    \ to a local cluster of points. For instance, when using the local outlier factor\
    \ technique, neighbors of a certain points are identified and compared against\
    \ the density of the neighboring points. The following steps can be applied when\
    \ using an LOF model:\n\n+   1) Calculate distance between P and all the given\
    \ points using a distance function such as euclidean or Manhattan.\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_164_0.png)"
  merge: -1
  pgno: 164
- img_proc: true
  md: '2) Find the k (k-nearest neighbor) closest point. For example, if K = 3, find
    the third nearest neighbor’s distance.

    3) Find the k closest points.

    4) Find local reachability density using the following equation:


    $$lrd_k(O) = \frac{\|N_k(O)\|}{\sum_{O'' \in N_k(O)} reachdist_k(O'' \leftarrow
    O)}$$


    where reachable distance can be calculated as follows:

    $$reachdist_k(O'' \leftarrow O) = \max\{dist_k(O), \ dist(O, \ O'')\}$$

    Please note that Nk(O) refers to the number of neighbors.

    5) The last step is to calculate the local outlier factor as follows:


    $$LOF_k(O) = \frac{\sum_{O'' \in N_k(O)} \frac{lrd_k(O'')}{lrd_k(O)}}{\|N_k(O)\|}$$


    # Local outlier factor using scikit-learn


    Scikit-learn library can also be used to apply local outlier factor algorithm.
    One of the main steps that should not be forgotten before applying LOF is to make
    sure to standardize the data prior to applying the algorithm. LOF is based on
    a nearest neighbor approach where distance calculations are used. Therefore, features
    with higher magnitudes will dominate the distance calculation. Hence, let’s use
    the same data set that was used to apply isolation forest algorithm and standardize
    the data set prior to applying LOF. To avoid confusion, please start a new Jupyter
    Notebook, import the necessary libraries, import the isolation forest data set
    (call it df), apply "pd.get_dummies" exactly as was shown previously, and standardize
    the data as follows:


    ```

    from sklearn.preprocessing import StandardScaler

    scaler=StandardScaler()

    df_scaled=scaler.fit(df)

    df_scaled=scaler.transform(df)

    ```


    Next, let’s import the LOF library, define the model with 40 neighbors, contamination
    of 0.1, use euclidean distance calculation, and apply "fit(df_scaled)" as shown
    below. Please note that a large **n_neighbor** or **K** could lead to points that
    are far away from the highest density regions to be misclassified as outliers
    even though those points could be part of a cluster of points. On the other hand,
    if K is too small, it could lead to misclassification of outliers with respect
    to a very small local region of points. Therefore, it is highly recommended to
    alternate K until a satisfactory level of outlier detection is achieved.'

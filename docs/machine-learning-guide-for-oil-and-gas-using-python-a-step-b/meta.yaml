    # Machine learning workflows and types


    # Introduction


    Before diving into various machine learning (ML) algorithms and types, it is crucial
    to understand typical ML workflows and types. A common ML workflow includes but
    is not limited to: (i) data gathering and integration, (ii) data cleaning which
    includes (a) data visualization, (b) outlier detection and, (c) data imputation,
    (iii) feature ranking/selection, (iv) normalization/standardization, (v) cross-validation,
    (vi) model development, (vii) grid search for parameter fine tuning and optimization,
    and (viii) finally, implementing the trained model. In this chapter, each ML step
    will be discussed in detail to provide a practical workflow that can be applied
    to any ML project. In addition, various types of ML such as supervised, unsupervised,
    semi-supervised, and reinforcement learning will be thoroughly examined. The combination
    of data science knowledge and domain expertise is the key to a successful ML project
    implementation. Unfortunately, the O&G industry has seen many ML projects fail
    due to data scientists and domain experts not properly working together and in
    silos.


    # Machine learning workflows


    # Data gathering and integration


    Companies across the globe have different workflows when applying AI and ML projects
    to their problems; however, the goal of this chapter is to provide a practical
    workflow that can be used to tackle any problem. Data gathering and integration
    is one of the most important steps in any ML project. Many ML projects simply
    fail due to lack of data. Therefore, before diving into the project, it is important
    to understand data availability within an organization. If the data are simply
    not available or very challenging to obtain, it is recommended to focus on projects
    with available data and projects that are highly likely to provide tangible results
    that can demonstrate the potential of ML within an organization. If your organization
    is new to the application of AI and ML, it is recommended to find some practical
    use cases, prove the concept'

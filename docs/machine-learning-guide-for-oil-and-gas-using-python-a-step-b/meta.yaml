  md: 'Let''s calculate the entropy values for each term first and plug in the equation
    above:


    $$Entropy(4, 1) = -\frac{4}{5}\log_2\frac{4}{5} - \frac{1}{5}\log_2\frac{1}{5}
    = 0.7219$$

    $$Entropy(4, 2) = -\frac{4}{6}\log_2\frac{4}{6} - \frac{2}{6}\log_2\frac{2}{6}
    = 0.9183$$

    $$Entropy(1, 4) = -\frac{1}{5}\log_2\frac{1}{5} - \frac{4}{5}\log_2\frac{4}{5}
    = 0.7219$$


    Plug back the entropy values in the discussed equation as follows:


    $$\frac{5}{16} \times Entropy(4, 1) + \frac{6}{16} \times Entropy(4, 2) + \frac{5}{16}
    \times Entropy(1, 4)$$

    $$= \left(\frac{5}{16} \times 0.7219\right) + \left(\frac{6}{16} \times 0.9183\right)
    + \left(\frac{5}{16} \times 0.7219\right) = 0.7956$$


    2) **Information gain (IG)**: When constructing a decision tree, it is important
    to find an attribute that results in the highest information gain and smallest
    entropy. IG refers to how well an attribute separates training examples according
    to their target classification. Please note that IG favors smaller partitions
    and it can be calculated as follows:


    $$IG(Y, X) = E(Y) - E(Y, X)$$


    **IG example**: Calculate information gain for the previous example.


    1) Calculate the entropy of the target variable as follows:


    $$Entropy(9, 7) = -\frac{9}{16}\log_2\frac{9}{16} - \frac{7}{16}\log_2\frac{7}{16}
    = 0.9887$$


    2) Calculate IG as follows:


    $$IG(outcome, pressure\ trend) = 0.9887 - 0.7956 = 0.1931$$


    3) **Gini index**: as opposed to information gain, Gini index favors larger partitions
    and it is calculated by subtracting 1 from the sum of squared probabilities of
    each class as illustrated below. Please note that in perfectly classified examples,
    Gini index would be equal to 0.


    $$Gini = 1 - \sum_{i=1}^{c} (P_i)^2 = 1 - \left(P(class\ A)^2 + P(class\ B)^2
    + ... + P(class\ N)^2\right)$$


    where $P_i$ is the probability of an element being classified under a particular
    class. One of the most difficult challenges with using a decision tree is overfitting.
    One of the approaches of avoiding overfitting'

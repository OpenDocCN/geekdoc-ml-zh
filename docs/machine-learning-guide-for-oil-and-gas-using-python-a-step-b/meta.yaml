  md: '$A \cup (B \cup C) = (A \cup B) \cup C$

    $A \cap (B \cap C) = (A \cap B) \cap C$


    **Law of Distributivity:** When applying union and intersection on three sets,
    the first operation can be distributed as follows:


    $A \cup (B \cap C) = (A \cup B) \cap (A \cup C)$

    $A \cap (B \cup C) = (A \cap B) \cup (A \cap C)$


    **Idempotent Law:** This law states that union or intersection of a set with itself
    will be the set.


    $A \cup A = A$

    $A \cap A = A$


    **Identity Law:** Considering a null set and a universe set U, the following holds
    for operations on set $A$, $\phi$, $E$.


    $A \cup \phi = A$

    $A \cup U = U$

    $A \cap \phi = \phi$

    $A \cap U = A$


    **Absorption Law:** The union of a set $A$ with the intersection of the same set
    $A$ with some other set $B$ is $A$. The same holds for the intersection of a set
    $A$ with the union of set $A$ with some other set $B$.


    $A \cup (A \cap B) = A$

    $A \cap (A \cup B) = A$


    **Involution Law:** Applying the complement on a set two times will result in
    the set itself.


    $(A^c)^c = A$


    **Transitivity Law:** Transitivity law holds for the subset relationship, if a
    set $A$ is a subset of set $B$ which is a subset of $C$, then set $A$ will be
    a subset of $C$.


    $if \ A \subset B \ and \ B \subset C \ then \ A \subset C$


    **De Morgan Law:** The complement of union of two sets can be calculated as the
    intersection of the complement of those sets. Also, the complement of intersection
    of two sets can be calculated as the union of the complement of those sets.'

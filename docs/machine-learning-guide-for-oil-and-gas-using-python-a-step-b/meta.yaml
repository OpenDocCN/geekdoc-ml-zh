    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_150_0.png)


    FIGURE 4.22 DBSCAN illustration.


    In addition, the number of clusters are not required to be defined since epsilon
    (ε) and MinPts will be used to determine the **desired density of clusters resulting
    in specific** number of clusters. However, choosing these hyperparameters requires
    domain expertise. Visualization and interpretation of the resulting clustered
    data is crucial after applying DBSCAN. If epsilon parameter is set to be too high,
    DBSCAN might interpret only one cluster. On the other hand, if epsilon parameter
    is set to be too low, DBSCAN could yield many unnecessary clusters. In addition,
    if MinPts (min sample) is set too high, DBSCAN could interpret good neighboring
    points as noise. Therefore, one of the biggest challenges in DBSCAN application
    is setting epsilon and MinPts parameters when using the algorithm. It is highly
    recommended to perform several iterations to fine tune these hyperparameters followed
    by visualizing until satisfactory clustering is achieved. In addition, the following
    guidelines can be used to estimate the hyperparameters (Schubert et al., 2017):


    +   - For two-dimensional data, use default value of MinPts = 4

    - For larger dimensional data sets, MinPts = 2*dimensions'

    data in the curve and lateral portion of each well were used in this analysis.
    This is because we are interested in the ROP optimization in the curve and lateral
    portions only. It is highly recommended to use all the drilling data (10s or 100s
    of wells) across a field of interest to build a more comprehensive model. This
    example is for illustration purposes of the workflow, and the accuracy of the
    model predictive capabilities can certainly be improved when incorporating more
    wells and data. In this example, both curve and lateral portions were combined,
    however, when including more wells, a better approach could be evaluating the
    curve and lateral portions independently by building two separate models for curve
    and lateral portions individually.



    dividing the area into N familiar shapes and calculating the area below each part
    denoted as Ai as well as the centroid of each region denoted as yi and averaging
    using the following equation:


    $$y = \frac{\sum_{i}^{N} y_i A_i}{\sum_{i}^{N} A_i}$$ (8.26)


    (ii) Maxima defuzzification method is based on finding the maximum membership
    obtained from the implied fuzzy set ($\mu_{Aggr}(y)$) among the universe of decision
    values. There are different ways of choosing the maxima, e.g., First of Maxima
    (FOM), Last of Maxima (LOF) which, respectively, chooses the minimum and maximum
    decision values y that gives the maximum membership value.


    # Fuzzy inference example: choke adjustment


    This example is based on a work by Odedele et al. (Odedele & Ibrahim, 2014) which

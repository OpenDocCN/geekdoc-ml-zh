    bottom left: Sigmoid, bottom right: Tanh).


    would be the input for the second hidden layer. This consecutive process continues
    until the output of the last or final hidden layer is found. This process is called
    "feedforward," when there is no feedback from the output results into the layers
    and units. The process of how these weights are optimized is explained in the

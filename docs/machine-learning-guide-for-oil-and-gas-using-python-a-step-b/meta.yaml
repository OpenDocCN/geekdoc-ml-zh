    Box 3.1.

    - **Feature standardization (z-Score normalization):** Standardization transforms
    each feature with Gaussian distribution to Gaussian distribution with a mean of
    0 and a standard deviation of 1. Note that standardization does not transform
    the underlying distribution structure of the data. Some learning algorithms, such
    as SVM, assume that data are distributed around 0 with the same order of variance.
    If this condition is not met, then the algorithm will be biased towards features
    with a larger variance. Feature standardization can be performed using Box 3.2.


    The next question that is often asked is whether to use normalization or standardization.
    The answer of this question depends on the application. In clustering algorithms
    such as k-means clustering, hierarchical clustering, density-based spatial clustering
    of applications with noise (DBSCAN), etc., standardization is important due to
    comparing feature similarities based on distance measures. On the other hand,
    normalization becomes more important with certain algorithms such as ANN and image
    processing (Raschka, n.d.).


    > **BOX 3.1 Feature normalization**


    $$Feature\ normalization(X'') = \frac{X - min(X)}{max(X) - min(X)}$$ (3.1)


    where $X''$ is the normalized data point, $min(X)$ is the minimum of the data
    set, and $max(X)$ is the maximum of the data set.'

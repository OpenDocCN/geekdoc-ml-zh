    The goal for particle swarm is to find the optimum solution for an objective function
    denoted as $f(X)$ where $X$ is a vector of n variables, $X = [x_1, x_2, x_3, ...,
    x_n]$. In the PSO, $X$ is also considered as position vector and $f(X)$ is fitness
    or objective function. With fitness function, it would be possible to evaluate
    the goodness of each position and compare it with other positions. At each time
    or iteration step $t$, a swarm of $P$ particles (each particle is denoted with
    index $i$) includes position and velocity vector for particle $i$ as $X_i^t =
    (x_{i1}, x_{i2}, x_{i3}, ..., x_{in})^t$ and $V_i^t = (v_{i1}, v_{i2}, v_{i3},
    ..., v_{in})^t$. The objective for all the particles in the swarm is moving toward
    the optimum after each iteration until they get to the global optimum. For the
    $i^{th}$ particle, velocity vector at iteration $t+1$ denoted as $V_{ij}^{t+1}$
    determines the new position $X_{ij}^{t+1}$ of the $j^{th}$ variable of that particle
    with following equation (Almeida & Leite, 2019):


    $$X_{ij}^{t+1} = X_{ij}^t + V_{ij}^{t+1}$$ (9.1)


    where $i$ varies from 1 to $P$ and $j$ varies from 1 to $n$. To find the new position
    of each particle, it is necessary to calculate $V_{ij}^{t+1}$ with the following
    equation:


    $$V_{ij}^{t+1} = wV_{ij}^t + c_1r_1^t(pbest_{ij} - X_{ij}^t) + c_2r_2^t(gbest_{ij}
    - X_{ij}^t)$$ (9.2)


    The velocity of each particle at iteration t+1 is influenced by three components
    as inertia ($wV_{ij}^t$), individual cognitive component $c_1r_1^t(pbest_{ij}
    - X_{ij}^t)$, and social component $c_2r_2^t(gbest_{ij} - X_{ij}^t)$. In inertia
    term, $w$, which is called inertia weight constant, controls the balance between
    global search (exploration) and local search (exploitation). When $w$ is high,
    the particle is mainly following the previous direction, while lower values for
    $w$ lets the particle to move into different regions. The individual cognitive
    component calculates the difference between the current position ($X_{ij}^t$)
    of the particle and particle’s best previous position ($pbest_{ij}$) and multiplies
    it by a weight factor $c_1$ and a random number $r_1^t$. This component determines
    the importance of the particle’s own experience regarding finding the optima in
    the search space. The random parameter $r_1^t$ prevents the particle from becoming
    stuck in local optimum. The social component considers the fact that particles
    can communicate with each other and share the information about their previous
    experiences. After particles’ communication, it is possible to find the best value
    of the fitness function obtained by a particle in the swarm as global best point
    or $gbest_{ij}$. Therefore, the difference between a particle’s location ($X_{ij}^t$)
    and the global best point ($gbest_{ij}$) is the driving force that directs the
    particle towards global optima (Almeida & Leite, 2019). This driving force is
    multiplied by social learning factor ($c_2$) and random variable of $r_2^t$. Fig.
    9.13 shows how new position of particle i is calculated.'

    ## 非负矩阵分解（NMF）


    NMF的主要目标是将一个矩阵分解为两个矩阵。NMF是一种矩阵分解技术。如前所述，PCA创建的因子可以是正的也可以是负的；然而，NMF只创建正因子。当高维数据集被转换为低维时，只要可以接受丢失一些原始特征，PCA是可取的。NMF的一些应用包括图像处理、转录过程、文本挖掘、加密编码/解码以及视频和音乐的分解。假设矩阵$A$被分解为两个矩阵$X$和$Y$，如下所示：


    $$A \approx X \times Y$$


    因此，对于维度为**m乘n**（$m \times n$）的矩阵$A$（矩阵的每个元素必须大于0，即$a_{ij}>=0$），NMF将矩阵$A$分解为维度为**m乘r**（$m
    \times r$）和**r乘n**（$r \times n$）的两个矩阵$X$和$Y$，其中每个元素$x_{ij}>=0$且$y_{ij}>=0$。


    $$\begin{bmatrix} \ \ \ \end{bmatrix} \times \begin{bmatrix} \ \ \end{bmatrix}
    = \begin{bmatrix} \ \ \ \end{bmatrix}$$


    $X$ $Y$ $A$


    例如，假设$A$由$m$行$a_1, a_2, ..., a_m$组成，$X$由$n$行$x_1, x_2, ..., x_n$组成，$Y$由$K$行$y_1,
    y_2, ..., y_k$组成。$A$中的每一行可以被视为一个数据点。


    $$A = \begin{bmatrix} a1 \ a2 \ a3 \ ... \ an \end{bmatrix} \quad X = \begin{bmatrix}
    \bar{x}1 \ \bar{x}2 \ \bar{x}3 \ ... \ \bar{x}n \end{bmatrix} \quad Y = \begin{bmatrix}
    y1 \ y2 \ y3 \ ... \ yn \end{bmatrix}$$


    其中$\bar{x}i = [xi1xi2\cdots xin]$。让我们总结如下：


    $$ai = [xi1 \quad xi2 \quad ... \quad xin] \times \begin{bmatrix} y1 \ y2 \ ...
    \ yn \end{bmatrix} = \sum_{j=1}^{n} xij \times yj$$


    NMF的目标是最小化$A-XY$的平方距离，关于$X$和$Y$，注意$X$和$Y$必须大于或等于0。换句话说，目标是最小化以下函数：


    $\|A - XY\|^2$ (3.18)


    请注意，可以使用欧几里得或弗罗贝尼乌斯（将在后续章节中讨论）来最小化此类函数。有两种流行的数值方法来解决这个问题。第一种方法称为坐标下降法，其中固定$X$，使用梯度下降优化$Y$。然后固定$Y$，使用梯度下降优化$X$。重复此过程直到满足容差。另一种方法称为乘法技术。请注意，在这两种方法中，都会找到一个局部最小值，这通常足够有用（Cichocki
    & Phan, 2009）。



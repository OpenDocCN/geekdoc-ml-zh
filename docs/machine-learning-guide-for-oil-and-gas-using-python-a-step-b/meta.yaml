    \ Number of wells in each cluster centroid.\n\n## K-means clustering application:\
    \ manual calculation example\n\nThe production data such as gas rate, casing pressure,\
    \ tubing pressure, and line pressure from 500 wells were gathered into a single\
    \ data source. After applying k-means clustering using k-means++ initialization\
    \ and **euclidean distance** function using **two clusters**, the data were converged\
    \ into the two cluster centroids as shown in Table 4.1. Please indicate which\
    \ cluster (1 or 2) the following numbers will fall under:\n\nSolution: Step 1)\
    \ Calculate the euclidean distance function from the provided points to **cluster\
    \ 1** as follows: Gas rate= 4200 Mscf/D, CSG pressure= 800 psi, TBG pressure=\
    \ 700 psi, line pressure= 500 psi\n\nCluster 1 distance to provided points =\n\
    \n```\n$\\sqrt{(4200 - 4300)^2 + (800 - 640)^2 + (700 - 520)^2 + (500 - 360)^2}\
    \ = 360$\n```\n\nStep 2) Calculate the euclidean distance function from the provided\
    \ points to **cluster 2** as follows:\n\nCluster 2 distance to provided points\
    \ =\n\n```\n$\\sqrt{(4200 - 3900)^2 + (800 - 2050)^2 + (700 - 590)^2 + (500 -\
    \ 500)^2} = 1194$\n```\n\nStep 3) If the calculated distance is the smallest,\
    \ assign to cluster 1. In this example, the calculated distance for cluster 1\
    \ (step 1) is smaller than the calculated distance for cluster 2 (step 2). Therefore,\
    \ these proposed numbers (provided in this example) will be clustered as cluster\
    \ 1. If there are multiple cluster centroids, simply calculate the distance from\
    \ each interested new row of data to each cluster centroid, and use if statements\
    \ to assign each row of data to each cluster. The smallest distance will be assigned\
    \ to the first cluster and the largest distance will be assigned to the last cluster\
    \ and the ones in the middle can be assigned in the order of their distance magnitudes.\
    \ Please note that the resultant k-means clustering centroids can be easily programmed\
    \ real-time to detect liquid loading.\n\n| Attribute | Cluster 1 | Cluster 2 |\n\
    | :--- | :--- | :--- |\n| Gas rate (MSCF/D) | 4300 | 3900 |\n| CSG pressure (casing\
    \ pressure, psi) | 640 | 2050 |\n| TBG pressure (tubing pressure, psi) | 520 |\
    \ 590 |\n| Line pressure (psi) | 360 | 500 |\n| Gas rate = 4200 MSCF/D, CSG pressure\
    \ = 800 psi, TBG pressure = 700 psi, line pressure = 500 psi. | | |\n\n## Silhouette\
    \ coefficient\n\nAnother metric to evaluate the quality of clustering is referred\
    \ to as silhouette analysis. Silhouette analysis can be applied to other clustering\
    \ algorithms as well. Silhouette coefficient ranges between −1 and 1, where a\
    \ higher silhouette coefficient refers to a model with more **coherent** clusters.\
    \ In other words, silhouette coefficients close to +1 means the sample is far\
    \ away from the neighboring clusters. A value of 0 means that the sample is on\
    \ or very close to the decision boundary between two neighboring clusters. Finally,\
    \ negative values indicate that the samples could have potentially been assigned\
    \ to the wrong cluster (Rousseeuw, 1987).\n\nTo calculate silhouette coefficient,\
    \ cluster cohesion (a) and cluster separation (b) must be calculated. Cluster\
    \ cohesion refers to the average distance between an instance (sample) and all\
    \ other data points within the same cluster while cluster separation refers to\
    \ the average distance between an instance (sample) and all other data points\
    \ in the nearest cluster. Silhouette coefficient can be calculated as shown below.\
    \ Silhouette coefficient is essentially the difference between cluster separation\
    \ and cohesion divided by the maximum of the two (Rousseeuw, 1987).\n\n$$s = \\\
    frac{b - a}{\\max(a, b)}$$\n\n## Silhouette coefficient in the scikit-learn library\n\
    \nLet's apply silhouette coefficient and use the graphical tool to plot a measure\
    \ of how tightly grouped the samples in the clusters are. **Please make sure to\

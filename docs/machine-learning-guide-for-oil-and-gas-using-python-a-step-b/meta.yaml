    \ 5.28 Confusion matrix and classification report.\n\n## Support vector machine\n\
    \nSVM is another form of a supervised ML algorithm that can be used for both classification\
    \ and regression problems. As opposed to many of the ML algorithms where the objective\
    \ function is to minimize a cost function, the objective in SVM is to maximize\
    \ the margin between support vectors through a separating hyperplane (Cortes &\
    \ Vapnik, 1995). In Fig. 5.29, a separating hyperplane (solid black line) is drawn\
    \ to separate blue instances from the red ones. This hyperplane is drawn in a\
    \ manner to maximize the margin from both sides. Please note that the widest possible\
    \ stretch must be drawn to separate the red and blue instances. The closest blue\
    \ and red instances to the separating hyperplane are referred to as support vectors\
    \ and this is why this algorithm is called support vector machine. The distance\
    \ between the dashed blue and red lines to the separating hyperplane (solid black\
    \ line) is called the \"margin.\" As previously mentioned, the idea is to maximize\
    \ the margin from both sides. This illustration is for a two-dimensional space\
    \ and hyperplane will be n-1 for n-dimensional space. For instance, for a two-dimensional\
    \ space (two features), the hyperplane will be one dimension, which is just a\
    \ line. For a three-dimensional space (three input features), the hyperplane becomes\
    \ a two-dimensional plane. For a four-dimensional space (four features), the hyperplane\
    \ would have three dimensions. This figure illustrates the simplest form of classification\
    \ problem for linearly separable cases.\n\nThe goal here is to maximize the margins\
    \ between the support vectors. Fig. 5.29 illustrates a data set with two input\
    \ features for binary classification that are linearly separable. This is unfortunately\
    \ not the case with most of the real-world application problems. Therefore, the\
    \ following two concepts are very important to consider when the data are not\
    \ linearly separable.\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_203_0.png)\n\
    \nFIGURE 5.29 Support vector machine for classification illustration.\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_204_0.png)\n\
    \nFIGURE 5.30 The impact of increasing C on the SVM margin.\n\n1) **Soft margin:**\
    \ is used to find a line for class separation but this line will tolerate one\
    \ or few misclassified instances. This degree of tolerance is represented by the\
    \ parameter \"C\" in SVM algorithm. As shown in Fig. 5.30, C essentially is a\
    \ trade-off parameter used between having a **wide margin** and correctly **classifying\
    \ training data**. C behaves as a regularization parameter when using SVM. C is\
    \ one of the parameters that can be used for grid search optimization (which will\
    \ be discussed in model validation chapter).\n\n    - Larger C= Smaller width\
    \ of the margin (smaller margin)= More incurred penalty when misclassified= Higher\
    \ training accuracy and lower testing accuracy= Less general\n    - Lower C= Larger\
    \ width of the margin (larger margin)= Less incurred penalty when misclassified=\
    \ Lower training accuracy and higher testing accuracy= More general\n\nWhen C\
    \ is large, the decision boundary will depend on fewer support vectors because\
    \ the margin is narrower.\n\n2) **Kernel tricks:** when the data are not linearly\
    \ separable, kernel tricks utilizes existing features and applies some transformation\
    \ functions to create new features. For example, linear, polynomial, or radial\
    \ basis function (rbf) transformations can be used when dealing with nonlinearly\
    \ separable data.\n\nWithin the scikit-learn library, there are different Kernel\
    \ functions such as \"linear,\" \"poly,\" \"rbf,\" \"sigmoid,\" etc., that can\
    \ be chosen. The most popular, typically providing the highest accuracy, are poly\
    \ and rbf. Therefore, let's review these two transformation functions:\n\n   \
    \ - Polynomial kernel (or poly kernel):\n        Polynomial kernel is basically\
    \ a transformer that generates new features. SVM with a polynomial kernel can\
    \ generate a nonlinear decision boundary. It might be impossible to separate a\
    \ numpy array of X and Y with a line. However, after applying a polynomial transformer,\
    \ a line can be drawn to separate the X and Y arrays. Polynomial kernel is defined\
    \ as:\n\n        $K(X_1, X_2) = (a + X_1^T X_2)^b$\n\n        In this equation,\
    \ $X_1$ and $X_2$ are vectors in input space, $a$ is constant and is greater or\
    \ equal to zero, and finally $b$ is the degree of the polynomial kernel.\n\n \
    \   - Radial basis function (rbf):\n        Rbf kernel is a transformer, generating\
    \ new features using distance measurement between all other dots to specific dot(s)\
    \ or center(s). The most popular rbf kernel is the **Gaussian radial basis function**.\
    \ For example, if X and Y arrays cannot be separated using a line, a Gaussian\
    \ radial basis function transformation using two centers can be applied to generate\
    \ new features. Gaussian radial basis function is defined as:\n\n        $K(X_1,\
    \ X_2) = exp(\\gamma ||X_1 - X_2||^2)$\n\n        In this equation, $X_1$ and\
    \ $X_2$ are vectors in input space, $||X_1 - X_2||$ is the euclidean distance\
    \ between $X_1$ and $X_2$. $\\gamma$ also known as gamma is used to control the\
    \ influence of new features on the decision boundary. When gamma value is low,\
    \ far away points are taken into consideration when drawing the decision boundary\
    \ which would result in a more straight decision boundary. Low values of gamma\
    \ tend to underfit when training a model. On the other hand, when gamma is high,\
    \ only close points are taken into consideration when drawing the decision boundary\
    \ (wiggly decision boundary). This is because higher gamma values will have more\
    \ influence on the decision boundary. As a result, the boundaries would be more\
    \ wiggly. High gamma values tend to lead to overfitting. Therefore, when using\
    \ rbf kernel function, make sure to include various gamma values in the grid search\
    \ optimization. Fig. 5.31 illustrates the impact of increasing gamma on the SVM\
    \ boundaries. As illustrated, as gamma increases, the model tends to overfit and\
    \ memorize as opposed to building a generalized model."

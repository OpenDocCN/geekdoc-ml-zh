    features_LLPL=[('Lateral Length','Proppant Loading')]\nplot_partial_dependence(model,X,\
    \ features_LLPL, n_jobs=3,\n    grid_resolution=20)\nfig=plt.gcf()\nfig.suptitle('Gas\

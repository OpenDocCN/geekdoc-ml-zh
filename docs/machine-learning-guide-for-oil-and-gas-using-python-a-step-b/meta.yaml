    is therefore near real-time control close to the command. Another advantage is
    to process an extensive amount of data at the edge and send the remaining data
    back to the cloud. Near real-time feedback loop and saving bandwidth by performing
    most of the processing at the edge are two of the main advantages of edge computing.
    The main disadvantage of edge computing is that, since edge computing by definition
    is localized, if you are trying to scale at a larger level, it is better to send
    all those data to the cloud where algorithms can be run at the field level. So,
    to get a higher level of visibility as well as a broader level of optimization
    at the field level, cloud computing is better. Deploying machine learning models
    on the edge will have an enormous impact on real-time value proposition in the
    O&G industry.



    \ will be discussed in chapter 7. For now, just change some of the fine-tuning\
    \ parameters manually and observe the resultant impact on the model.\n\n## K-nearest\
    \ neighbor\n\nK-nearest neighbor also known as KNN is one of the simplest forms\
    \ of supervised ML algorithm that is used for both classification and regression\
    \ problems. KNN is assumed to be a nonparametric algorithm which means no assumptions\
    \ are made about the underlying data (Cover & Hart, 1967). The KNN algorithm works\
    \ based on the basis of similar proximity using distance calculations. The following\
    \ steps are used when developing a KNN model:\n\n1.  Determine the number of nearest\
    \ neighbors also known as K. For instance, if K=2, two of the closest points based\
    \ on distance calculation will be chosen to determine where an instance will be\
    \ assigned (in a classification problem). Selecting K can be challenging in a\
    \ KNN algorithm. Choosing a small K means a higher influence on the result. On\
    \ the other hand, choosing a higher K could lead to a smoother decision boundary\
    \ with lower variance but increased bias. One approach in selecting K is to train\
    \ a model with various K neighbors such as 1, 2 ... etc., to see which K would\
    \ result in the highest testing accuracy using a cross-validation technique discussed\
    \ in the model validation chapter. Prior to proceeding to the next step, make\
    \ sure to standardize the data.\n\n198 Machine Learning Guide for Oil and Gas\
    \ Using Python\n\nTABLE 5.1 Oil and natural gas price categories (KNN example).\n\
    \n| Oil price ($/BBL) | Natural gas price ($/MMBTU) | Category |\n| :--- | :---\
    \ | :--- |\n| 90 | 4 | Strong |\n| 40 | 2 | Poor |\n| 60 | 3 | Strong |\n| 80\
    \ | 3.5 | Strong |\n| 35 | 1.5 | Poor |\n\n2.  Use a distance function such as\
    \ euclidean to calculate the distance between each instance and all training samples.\n\
    3.  Next rank the distance from lowest to highest. Afterward, choose the nearest\
    \ neighbor(s) based on the number of nearest neighbors (K) that was selected in\
    \ step 1. In other words, choose K neighbors with the lowest distance.\n4.  Obtain\
    \ the category (classification) or numeric value (regression) of the nearest neighbors\
    \ obtained in step 3.\n5.  Use average (in regression problems) or majority (in\
    \ classification problems) of the nearest neighbors to predict a value or a class\
    \ of an instance.\n\nTo illustrate this, let's go through a step-by-step KNN classification\
    \ example. The following two features (oil price and gas price) belong to two\
    \ categories of \"Poor\" and \"Strong.\" Use 3 nearest neighbors (K=3) and euclidean\
    \ distance calculation to classify whether point (20, 2.2) would be classified\
    \ under \"Poor\" or \"Strong\" in Table 5.1. In other words, which category would\
    \ an oil price of $20/BBL and a natural gas price of $2.2/MMBTU fall under.\n\n\
    Step 1) Calculate the euclidean distance between each row and the given points\
    \ (20,2.2) as follows:\n\n```\nEuclidean distance between (90, 4) and (20, 2.2)\n\
    = √((90 - 20)² + (4 - 2.2)²) = 70.02\n\nEuclidean distance between (40, 2) and\
    \ (20, 2.2)\n= √((40 - 20)² + (2 - 2.2)²) = 20.00\n\nEuclidean distance between\
    \ (60, 3) and (20, 2.2)\n= √((60 - 20)² + (3 - 2.2)²) = 40.01\n\nEuclidean distance\
    \ between (80, 3.5) and (20, 2.2)\n= √((80 - 20)² + (3.5 - 2.2)²) = 60.01\n\n\
    Euclidean distance between (35, 1.5) and (20, 2.2)\n= √((35 - 20)² + (1.5 - 2.2)²)\
    \ = 15.02\n```\n\nTABLE 5.2 Lowest to highest distance for KNN classification.\n\
    \n| Oil price ($/BBL) | Natural gas price ($/MMBTU) | Category | Euclidean distance\
    \ |\n| :--- | :--- | :--- | :--- |\n| 35 | 1.5 | Poor | 15.02 |\n| 40 | 2 | Poor\
    \ | 20.00 |\n| 60 | 3 | Strong | 40.01 |\n| 80 | 3.5 | Strong | 60.01 |\n| 90\
    \ | 4 | Strong | 70.02 |\n\nStep 2) Rank from lowest to highest distance as shown\
    \ in Table 5.2.\nStep 3) Since K=3 and the two out of the three nearest neighbors\
    \ (bold rows shown in Table 5.2) are classified under \"Poor,\" point (20,2.2)\
    \ would be classified under \"Poor.\"\n\nKNN has the following advantages:\n\n\
    - As was illustrated in the example above, KNN is easy to implement.\n- It is\
    \ considered a lazy algorithm which essentially indicates no prior training is\
    \ required prior to making real-time decisions. In other words, it memorizes the\
    \ training data set as opposed to learning a discriminative function from the\
    \ training data set (Raschka, n.d.).\n- As opposed to many other algorithms that\
    \ will be discussed later in this chapter, the main two parameters are number\
    \ of K and distance function.\n\nSome of the disadvantages of using a KNN are\
    \ as follows:\n\n- Distance calculation does not work well in a high-dimensional\
    \ data set; therefore, using KNN can be challenging in high-dimensional data sets.\n\
    - In addition, when KNN is used for making predictions, the cost of predictions\
    \ in large training data sets is high. This is because KNN will need to search\
    \ for the nearest neighbors in the entire data set.\n- It can computationally\
    \ become intensive since the distance of each instance to all training samples\
    \ must be calculated.\n- KNN algorithm does not work well with categorical features\
    \ since dimension distance calculation using categorical feature is difficult.\n\

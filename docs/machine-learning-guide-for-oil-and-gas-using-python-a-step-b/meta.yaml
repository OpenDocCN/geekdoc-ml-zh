    PSO can be performed with the following steps:


    +   (i) Initialize particles’ positions ($X^0_{ij}$), velocities ($V^0_{ij}$),
    and best position ($pbest_{ij}$)

    (ii) Evaluate fitness values for each particle based on their initial positions
    and then calculate global best position

    (iii) Update particles’ best previous position ($pbest_{ij}$) and global best
    position ($gbest_{ij}$)

    (iv) Update particles’ velocities and positions

    (v) If termination condition is satisfied then end the process otherwise go back
    to step (iii).



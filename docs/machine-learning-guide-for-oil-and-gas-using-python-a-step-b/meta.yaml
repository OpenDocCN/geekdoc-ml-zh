    # Stratified K-fold cross-validation


    In K-fold cross-validation, the whole data set is divided into K folds to train
    the model on K-1 folds and test the model on the remaining fold iteratively. The
    percentage of samples belonging to various target classes in each fold can be
    different. In order to honor the percentage of different classes in the whole
    data set in each fold, it is recommended to use "stratified" k-fold cross-validation
    (Muller & Guido, 2016). In sand production example, 72% of the observations (wells)
    experienced sand production and 28% didn''t. Therefore, by using a stratified
    k-fold cross-validation, each fold includes 72% of sand produced wells and 28%
    of no-sand wells. It is worth mentioning that in cross_val_score when "cv" is
    an integer, stratified k-fold cross-validation would be the default. Stratified
    k-fold cross-validation for sand production problem can be done in Python with
    the following code:



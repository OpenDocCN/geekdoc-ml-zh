  md: '# Evaluation metrics for regression problems


    There are two common evaluation metrics for regression models: MSE and Coefficient
    of determination, R². MSE or loss function measures the sum of squared errors
    for the regression model as defined in Eq. 6.10. The error was defined as the
    difference between the target output and the model''s prediction. Squaring the
    error leads to dealing with positive numbers and penalizing higher error values.
    Higher the MSE means that the performance of the model gets worse. During neural
    network training, the objective was to minimize MSE or loss function for validation
    data set through weight optimization. MSEs for Shale Gas Wells problems were shown
    in Figs. 6.12 and 6.13. The other metric for regression problems is Coefficient
    of determination or R squared. It measures the amount of variance of target values
    to the model''s prediction:


    $$R^2 = 1 - \frac{\sum_{i=1}^{n} (y_i - \widehat{y}_i)^2}{\sum_{i=1}^{n} (y_i
    - \overline{y}_i)^2}$$


    In this R² equation, yi is target value, $\widehat{y}_i$ is model''s prediction,
    and $\overline{y}_i$ is the average of all the target values. R² values closer
    to 1 indicate better model performance. As shown in Chapter 6, R² in Python can
    be determined with "r2_score" method. R² for Shale Gas Well and PVT problems are
    shown in Figs. 6.14, 6.18–6.20.


    # Cross-validation


    Multiple evaluation metrics were introduced to understand how well a machine learning
    model can perform on test data or the data that has never been exposed to the
    model. In order to select test data, the whole data set is partitioned to train
    and test in typically 70% and 30% ratios. The model is built by going through
    the learning process using the train data and then assessed by test data. The
    drawback of the mentioned procedure is, evaluation results can be biased by the
    samples that were picked in the test data set. Moreover, the model is deprived
    of some data (test) for the training process. In order to have a more generalized
    model elevation that covers the whole data set, "cross-validation" is recommended.


    In "k-fold cross-validation," the most common version of cross-validation, the
    whole data set is partitioned into k "folds." K is typically between 5 and 10.
    In the first iteration of model training, the first fold indicates a test data
    set and the remaining (k-1) folds indicate a training data set. When the model
    is trained, the metric score would be calculated on the test data set which is
    fold one. Then, in the next iteration, the second fold indicates a test data set
    and the remaining (k-1) folds indicate a training data set. Next, the second model
    is built on the training data set (all the folds except the second one) and the
    score is determined on the second fold. This process continues until the kth iteration'

    # Bias–variance trade-off


    A very instrumental concept in ML is referred to as bias–variance trade-off. Before
    digging deep into the concept, let’s define bias and variance first as follows:


    **Bias** is referred to as model assumption simplification. In other words, the
    inability of a ML model to capture the true relationship is called “bias.” Models
    with high bias are unable to capture the true relationship between input and output
    features, and it usually leads to oversimplification of the model. An example
    of a model with high bias is when linear regression is used for a nonlinear data
    set.


    **Variance** refers to the variability of model prediction for a given data point.
    A model with high variance means it fits the training data very well but does
    a poor job predicting the testing data. It other words, it memorizes the training
    data very well and is not able to predict the test data due to low generalization.


    If a model is simple (which means it does not capture most of the complexity in
    the data), it is referred to as an underfit model. An underfit model is another
    name for a model that has high bias and low variance as illustrated in Fig. 3.4.
    On the other hand, if a model is super complex and captures all the underlying
    complexity in the data in a training set, it is called an overfit model. An overfit
    model means it has high variance and low bias. The ideal model would have **low
    bias** and **low variance** as shown in Fig. 3.5.


    # Model development and integration



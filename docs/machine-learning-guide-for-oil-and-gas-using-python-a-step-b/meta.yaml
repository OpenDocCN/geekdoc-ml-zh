    # Example 1: estimated ultimate recovery prediction in shale reservoirs


    In this example, we are going to use a neural network as a nonlinear regression
    estimator to find a correlation between 20 years gas EUR¹ (estimated ultimate
    recovery) and multiple well/reservoir attributes like geology, drilling, and completion
    attributes. Our data set consists of 507 dry gas horizontal multi-stage fractured
    wells in a shale asset. It is worth mentioning that this data is NOT an actual
    data set. You can find the "Shale Gas Wells" data set in the following location
    https://www.elsevier.com/books-and-journals/book-companion/9780128219294. The
    list of all the attributes is shown in Table 6.1.


    Let us clarify some of the input attributes that will be used during neural network
    training. The producing geologic formation height indicates "Thickness." Updip/Downdip
    attribute is a categorical input. To use the learning algorithm, these data are
    transformed into numbers. 1 is assigned to Updip wells and 0 to Downdip wells.
    Well spacing is the distance between two adjacent wells. There are multiple ways
    to calculate well spacing that are beyond the scope of this chapter. For completion
    parameters, refer to the book *Hydraulic Fracturing in Unconventional Reservoirs*
    (Belyadi et al. 2019).



  md: 'TABLE 7.2 Model Prediction for test data set.


    | y_test | y_test-predict | Prediction status |

    | :--- | :--- | :--- |

    | 0 | 0 | TN |

    | 1 | 1 | TP |

    | 0 | 1 | FP |


    $$\mu_{A^c}(x) = 1 - \mu_A(x)$$


    两个模糊集 $A$ 和 $B$ 的**并集**是一个模糊集 $U$，其隶属函数定义为两个集合 $A$ 和 $B$ 隶属函数值的最大值，如下所示：


    $$\mu_C(x) = \max\{\mu_A(x), \mu_B(x)\}$$


    模糊集 $A$ 和 $B$ 的并集示例如图 8.12 所示。



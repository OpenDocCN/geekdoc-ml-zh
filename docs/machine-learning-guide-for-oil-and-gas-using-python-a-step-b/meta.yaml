    \ R² 值为 80.99%，而之前介绍的决策树和随机森林模型分别为 63.03% 和 77.48%。\n\n## 梯度提升\n\n梯度提升是另一种集成监督机器学习算法，可用于分类和回归问题。随机森林、极端随机树、梯度提升等算法被称为**集成**算法的主要原因是，最终模型是基于许多单独模型生成的。如\
    \ bagging/boosting 比较部分所述，梯度提升将顺序训练许多模型，并对预测错误的实例赋予更高的权重。因此，训练过程中的重点是具有挑战性的案例。使用梯度提升进行顺序模型训练将逐渐最小化损失函数。损失函数的最小化方式类似于人工神经网络模型（将在下一章讨论），其中权重会被优化。在梯度提升中，构建弱学习器后，会将预测值与实际值进行比较。预测值与实际值之间的差异代表了模型的误差率。模型的误差率现在可用于计算梯度，这本质上是损失函数的偏导数。梯度用于确定模型参数需要改变的方向，以在下一轮训练中减少误差。与神经网络模型的目标是在**单个模型**中最小化损失函数不同，梯度提升结合了多个模型的预测。因此，梯度提升使用了随机森林/极端随机树中的一些超参数，以及人工神经网络模型中使用的其他超参数，如学习率、损失函数等。这些超参数将在下一章详细讨论。\n\
    \n## 使用 scikit-learn 实现梯度提升\n\n在本节中，目标是使用梯度提升训练一个机器学习模型，以使用以下输入特征预测每口井在 $3/MMBTU\
    \ 气价下的净现值 (NPV)：\n\n- 水平段长度 (ft)、段长 (ft)、砂水比或 SWR (lb/gal)、每英尺砂量 (lb/ft)、每英尺水量\

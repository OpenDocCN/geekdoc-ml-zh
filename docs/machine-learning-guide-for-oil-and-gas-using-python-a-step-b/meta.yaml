    \ 5.16\n```\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_185_1.png)\n\nFIGURE 5.16\
    \ Vitrinite reflectance (VR) OVAT on Aroot(K).\n\n## Logistic regression\n\nLogistic\
    \ regression is another powerful supervised ML algorithm used for binary classification\
    \ problems (when target is categorical). The best way to think about logistic\
    \ regression is that it is a linear regression but for classification problems.\
    \ Logistic regression essentially uses a logistic function defined below to model\
    \ a binary output variable (Tolles & Meurer, 2016). The primary difference between\
    \ linear regression and logistic regression is that logistic regression’s range\
    \ is bounded between 0 and 1. In addition, as opposed to linear regression, logistic\

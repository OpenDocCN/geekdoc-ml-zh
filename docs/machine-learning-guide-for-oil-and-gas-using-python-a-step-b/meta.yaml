    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_215_0.png)


    FIGURE 5.38 Decision tree illustration.


    works. A decision tree splits the data into subtrees which are then split into
    other subtrees. As illustrated in Fig. 5.38, a **root node** is at the topmost
    level which essentially represents the entire population, a **decision node**
    also referred to as an **internal node** has two or more branches, and finally,
    a **terminal node** also referred to as a **leaf node** is the lowest node and
    does not split any longer. Note that the term splitting is defined as splitting
    a node into two or more subnodes.


    There are various decision tree algorithms such as ID3, C4.5, C5.0, and CART.
    ID3 stands for Iterative Dichotomiser 3 which was developed in 1986 (Quinlan,
    1986). This algorithm builds decision trees using a top-down greedy manner on
    **categorical** features that results in the largest information gain (will be
    discussed). In addition ID3 uses a multiway tree. C4.5 is another algorithm used
    in decision trees which removes the restrictions that features must be categorical.
    C5.0 is Quinlan''s latest release which uses less memory and constructs smaller
    rulesets than C4.5. Finally, CART stands for classification and regression trees
    and is similar to C4.5 but it supports numerical target variables and does not
    calculate rulesets. CART creates binary trees that result in the largest information
    gain at each node. Please note that scikit-learn library uses an optimized version
    of the CART algorithm (scikit-learn, n.d.).



- md: '## Nomenclature


    - **e** Error, difference between a nodes output and target

    - **E** Global error

    - **F** Activation function

    - **g** Gas specific gravity

    - **h<sub>j</sub>** Action potential at node j in hidden layer

    - **I<sub>i</sub>** Input signal at node i

    - **j** Error gradient in hidden layer

    - **j** Bias on node j

    - **k** Error gradient in output layer

    - **n** Number of incoming links to a node

    - **P<sub>b</sub>** Bubble point pressure (psi)

    - **T** Temperature(°F)

    - **w<sub>ij</sub>** signal weight from node i to node j

    - **α** Learning Rate



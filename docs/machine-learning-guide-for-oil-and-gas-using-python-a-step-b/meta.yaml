  md: 'Some advantages of cloud computing are that it is someone else’s headache,
    and it is a scalable model as previously discussed. The main advantage of edge
    computing is that all data processing can be done at the edge and the control
    command can be sent back to the edge device for real-time or near real-time feedback
    control loop. There is no latency of sending the data to the cloud where processing

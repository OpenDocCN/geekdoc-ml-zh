  md: '# Particle swarm optimization


    In the previous section, the genetic algorithm, which is a nature-based search
    optimization, was explained. The genetic algorithm actually honors the theory
    that Darwin formulated for evolution according to natural selection. In this section
    "particle swarm optimization" (PSO) which is another nature-based optimization
    algorithm would be covered.


    Swarm is considered a population of moving particles (in nature it can be bees,
    birds, or fish) that try to make a cluster while each particle seems to move in
    a disorganized manner. In nature, swarms showed some sort of sociocognitive behavior
    across the particles, helping them solve problems like finding food or escaping
    from predators. The cultural behavior of the swarm particles can be categorized
    as evaluating, comparing, and imitating (Eberhart et al., 2001). At first, particles
    need to evaluate the environment to differentiate attracting or repelling features
    in order to make an appropriate decision. Afterward, individuals (particles) compare
    themselves with others and find which ones are in better positions. Finally, the
    individuals imitate the ones that are in superior positions. The mentioned principle
    helps particles adapt to the environment, deal with challenges, and solve difficult
    problems. Scientists and engineers tried to use the same principles of particle
    swarm intelligence behavior to solve complex optimization problems.


    Kennedy and Eberhart introduced particle swarm optimization in 1995 at a neural
    networks conference and then published the *Swarm Intelligence* book in 2001 (Eberhart
    et al., 2001). Similar to the genetic algorithm, particle swarm optimization has
    the capacity to optimize the problems with non-differentiable objective function
    (the main requirement for gradient-based optimizer). PSO is applied in various
    optimization problems like neural network training, fuzzy control, pattern recognition,
    robotics/nanorobotics, and even movie especial effects.


    There are several applications of PSO in the oil and gas industry. Mohamed et
    al. used PSO for reservoir history matching (Mohamed et al., 2011). The objective
    of history matching of a synthetic reservoir simulation model was to estimate
    fault characteristics such as throw thickness, good and poor permeability factors.
    They used oil and water rates as two objective functions for history matching.
    Isebor et al. applied multiple derivative-free optimizers such as particle swarm
    to come up with the best development plan (Isebor et al., 2013). They used two-dimensional
    reservoir models, including channels with water injection and oil-producing wells.
    The development plan was optimized by deciding the number, location, and control
    strategy of the wells. Al-Nemer et al. (Al-Nemer et al., 2015) evaluated the performance
    of four stochastic optimization algorithms like particle swarm for generating
    automated type-curve matching for pressure transient analysis (well-test). A dual-porosity
    reservoir model (proposed by Warren and Root) was used to simulate pressure data
    with added noise that would be considered real pressure data. Next,'
  merge: -1
  pgno: 437
- img_proc: true
  md: 'PSO was applied to estimate fracture permeability, matrix porosity, skin factor,
    the radius of investigation, storativity ratio, and interporosity flow parameter.
    Jesmani et al. applied PSO to find the best well placement for two different case
    studies (Jesmani et al., 2015). In one case study, they used a synthetic reservoir
    model with geological data taken from the Norne field in the Norwegian Sea. They
    used PSO to maximize NPV by finding the best combination of wells’ distance, lateral
    length, orientation, and keeping the wells in a specific part of the reservoir.
    Ottah et al. utilized PSO to history match a reservoir and find aquifer properties
    with material balance technique (Ottah et al., 2015). Self et al. applied particle
    swarm to reduce drilling costs by finding optimum operational parameters (Self
    et al., 2016). In this work, they considered the rate of penetration (ROP) as
    objective function and minimized cost per foot by adjusting downhole weight on
    bit, revolutions per minute, pull depth, and bit combinations (In chapter 5, a
    supervised ML model to estimate ROP using various input drilling features was
    build and discussed). Al-Mudhafar et al. showed the usage of particle swarm in
    optimizing the CO2-EOR process for unconventional oil reservoirs (Al-Mudhafar
    et al., 2017). They used a black oil reservoir model with five injectors/producers
    to forecast 30 years of performance of a shale oil reservoir that went through
    CO2 flooding. They considered eight optimization parameters like injection/production/soaking
    duration, minimum bottom hole pressure, and maximum oil/injection rates. Khan
    et al. implemented PSO to maximize oil recovery from a naturally fractured carbonate
    reservoir including smart wells (Khan et al., 2018). The objective of this study
    was to determine the optimum setting of the inflow control valve (choke setting)
    to maximize oil recovery. Yan et al. applied PSO for multilayer geosteering (Yan
    et al., 2018). They wanted to use logging while drilling (LWD) measurements and
    use particle swarm to estimate some parameters like layer boundaries and layer
    resistivity. There have been other applications of PSO in the oil and gas industry
    like geophysical data inversion (Fernandez-Martinez et al., 2008), location of
    the critical failure surface for rock slope stability analysis (Javadzadeh & Javadzadeh,
    2008), preselection of reservoir models (Le Ravalec-Dupin et al., 2010), and production
    optimization (Zhao et al., 2011).


    # Particle swarm optimization theory


    In order to understand the basics of particle swarm theory, it is useful to look
    at a famous example of birds’ swarm decision-making. When flying birds decide
    to land, they need to solve a complex problem and find the optimized landing point
    with the maximum chance of finding food and minimum risk of predators. The fact
    that swarm of birds can communicate and share information as social behavior enables
    them to find the optimum solution. The most important factor in the social behavior
    of birds’ swarm is that each bird (particle) balances its own knowledge with swarm
    knowledge. Birds start searching for the solution'

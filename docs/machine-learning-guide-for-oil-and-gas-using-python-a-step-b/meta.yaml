    test_size=0.30)\n```\n\nNext, let's import the logistic regression library and\
    \ call it \"lr.\" There are some hyperparameters that can be optimized when using\
    \ a logistic regression algorithm and they are as follows:\n\n- The solver options\
    \ that scikit-learn offers in logistic regression are \"newton-cg,\" \"lbfgs,\"\
    \ \"liblinear,\" \"sag,\" \"saga.\"\n\nnewton-cg is a Newton method which uses\
    \ a Hessian matrix. Hessian matrix was developed by the German mathematician named\
    \ Ludwig Otto Hesse in the 19th century which uses a square matrix of second-order\
    \ partial derivatives of a scalar-valued function. Please note that since second\
    \ derivative is calculated in this method, this solver can be slow for large data\
    \ sets.\n\nThe next frequently used algorithm which is the default algorithm in\
    \ scikit-learn 0.22.0 is called **lbfgs**. lbfgs stands for limited-memory Broyden–Fletcher–Goldfarb–Shanno.\
    \ lbfgs is an iterative method for solving unconstrained nonlinear optimization\
    \ problems which approximates the second derivative matrix updates with gradient\
    \ evaluations. It is referred to as a short-term memory because it only stores\
    \ the last few updates (Avriel, 2003).\n\n\"liblinear\" uses a coordinate descent\
    \ algorithm which is based on minimizing a coordinate directions of a function\
    \ in a loop. This solver performs well with high-dimensional data (Wright, 2015).\n\
    \n\"sag\" is stochastic average gradient descent (will be discussed in detail).\
    \ \"saga\" is an extension of \"sag\" that allows for L1 regularization (discussed\
    \ below). Please note that \"sag\" and \"saga\" are faster for larger data sets.\n\
    \nAs previously discussed, when a model is memorized and specifically tailored\
    \ for a particular training set without having the capability to predict accurately\
    \ when applied to a test or blind set, it is referred to as overfitting. Overfitting\
    \ essentially means the model is not generalized to predict a test or blind set\
    \ with high accuracy, and it is considered to be a major challenge when developing\
    \ a ML model. Therefore, regularization is used to avoid overfitting. Regularization\
    \ is the process of introducing additional fine-tuning parameters in an attempt\
    \ to prevent overfitting. There are different techniques to avoid overfitting\
    \ and some of the commonly used techniques are regularization, cross-validation,\
    \ and drop out.\n\nRegularization is simply the process of reducing complexity\
    \ in a model. Reducing a model complexity can be done by penalizing the loss function.\n\
    \nLoss function is simply the sum of squared difference between actual versus\
    \ predicted values as shown below:\n\n$$\\sum_{i=1}^{n} (y_i - \\widehat{y})^2\
    \ \\quad (5.12)$$\n\nA regularization term can be added to the above equation\
    \ as follows (highlighted in red):\n\n$$\\sum_{i=1}^{n} (y_i - \\widehat{y})^2\
    \ + \\lambda \\sum_{i=1}^{n} \\theta_i^2 \\quad (5.13)$$\n\n$\\theta_i$ represents\
    \ the weights of the features and $\\lambda$ represents the regularization strength\
    \ (penalty) parameter. The regularization parameter determines the amount of penalty\
    \ to apply to the weights. If no regularization is needed, simply set $\\lambda=0$\
    \ which will eliminate the regularization expression in the discussed equation.\
    \ A large $\\lambda$ could result in a model being underfit and a low $\\lambda$\
    \ could potentially lead to an overfit model. When grid search is discussed in\
    \ the subsequent chapters, regularization parameter can be used as one of the\
    \ hyper-tuning parameters used in a model optimization using grid search.\n\n\
    Examples of regularization parameters are $L_1$ and $L_2$ regularization. $L_1$\
    \ regularization is referred to as $L_1$ norm or Lasso regularization. In $L_1$\
    \ regularization, the absolute value of weights is penalized as shown below. In\
    \ addition, $L_1$ regularization has a sparse solution that is robust to outliers\
    \ and could possibly have multiple solutions. Please note that $L_1$ generates\
    \ simple models and cannot interpret complex patterns. Therefore, for complex\
    \ pattern recognition, it is recommended to use $L_2$ regularization.\n\n$$\\\
    sum_{i=1}^{n} (y_i - \\widehat{y})^2 + \\lambda \\sum_{i=1}^{n} |\\theta_i| \\\
    quad (5.14)$$\n\nOn the other hand, $L_2$ regularization is referred to as ridge\
    \ regularization which uses the sum of square of all feature weights as highlighted\
    \ below. In $L_2$ regularization, the weights are forced to be small. In contrast\
    \ to $L_1$ regularization, $L_2$ regularization has a nonsparse solution, is not\
    \ robust to outliers, and performs better with complex data patterns. $L_2$ regularization\
    \ always has one solution.\n\n$$\\sum_{i=1}^{n} (y_i - \\widehat{y})^2 + \\lambda\
    \ \\sum_{i=1}^{n} \\theta_i^2 \\quad (5.15)$$\n\nC is the inverse of $\\lambda$\
    \ (regularization strength) and the default value of C is 1. C is one of the essential\
    \ parameters used in SVM algorithm which will be discussed in more detail later\
    \ in this chapter."

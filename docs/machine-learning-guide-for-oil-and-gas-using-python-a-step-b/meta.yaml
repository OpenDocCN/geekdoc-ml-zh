    # Defuzzification


    Finally, in the step (iv) defuzzification, the aggregated fuzzy set has to be
    interpreted as a crisp output (control action) for the fuzzy inference system.
    There are different approaches for interpreting the aggregate fuzzy set. Some
    of these approaches include (i) Center of gravity (centroid), (ii) Maxima method
    (Himanshu & Lone, 2019). Note that these are some sample methods of defuzzification
    and other methods can be designed to serve the needs of the system. These methods
    will be explained here and illustrated in the following example.


    (i) Center of Gravity or centroid defuzzification method uses the area under the
    implied aggregated fuzzy set, using the following formula:


    $$y = \frac{\int y \mu_{Aggr}(y) dy}{\int \mu_{Aggr}(y) dy} \quad (8.25)$$


    where $\mu_{Aggr}(y)$ is the aggregated implied fuzzy set and the integral part
    in the denominator $\int \mu_{Aggr}(y)$ shows the area below the $\mu_{Aggr}(y)$.
    The centroid can be calculated for nonsmooth membership functions by


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_397_0.png)'

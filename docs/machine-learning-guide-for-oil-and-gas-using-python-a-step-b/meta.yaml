    %.2f\"))\nplt.show()\nPython output=Fig. 6.14\n```\n\n# Example 2: develop PVT\
    \ correlation for crude oils\n\nPetroleum/reservoir engineering calculations are\
    \ heavily dependent on phase behavior and PVT data. These calculations cover in-place\
    \ estimation, pressure loss along pipes, fluid flow in porous media, rate transient\
    \ analysis, and well testing. The most common approach to acquire PVT data is\
    \ through lab testing. In this method, to calculate PVT properties, the oil sample\
    \ is tested via multiple methods. Some of these tests are very complex, timely,\
    \ and expensive. On the other hand, some properties like oil API or gas specific\
    \ gravity can be easily achieved. Properties like solution gas/oil ratio, bubble/dew\
    \ point, and liquid drop out (condensate reservoirs) require sophisticated lab\
    \ tests. In the oil and gas industry, it has been a common practice to derive\
    \ mathematical and empirical correlations to determine one PVT parameter as function\
    \ of some easily obtained parameters. Statistical regression techniques are mainly\
    \ used to derive empirical correlations for different PVT properties. These correlations\
    \ can be found in *Reservoir Engineering Handbooks* (Ahmed, 2006) or other hydrocarbon\
    \ properties reference books (McCain, 1999).\n\n\"Bubble point\" is defined as\
    \ a pressure at which the first bubble of gas is formed within the liquid oil\
    \ phase. As pressure falls below the bubble point, more gas is liberated from\
    \ oil, and single liquid phase becomes two phases. Bubble point (bp) is one of\
    \ the PVT properties that cannot be measured in the lab easily. Therefore, several\
    \ correlations like \"Standing, Vasque/Beggs, Glaso, Marhoun, and Petrosky/Farshad\"\
    \ were proposed by several authors (Ahmed, 2006). Besides statistical regression\
    \ techniques, it is also possible to use neural networks to develop correlations\
    \ between PVT properties. The second example uses a PVT data set, including 249\
    \ PVT² samples consisting of temperature, solution gas to oil ratio (RS), gas\
    \ gravity, oil API, and bubble point pressure (Pbp). \"PVT Data\" can be found\
    \ in the following location https://www.elsevier.com/books-and-journals/book-companion/9780128219294.\n\
    \n2. This example is similar to work done by Osman et al. (2001)."

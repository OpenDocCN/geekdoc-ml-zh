    \n## Seaborn library\n\nSeaborn is a statistical plotting library and is built\
    \ on top of matplotlib. Seaborn library has many default styles that can be used\
    \ for quick plotting, and it is designed to work well with pandas library. As\
    \ it will be evident shortly through various examples, one of the main advantages\
    \ of the seaborn library is that it requires much less coding as compared to matplotlib.\
    \ Various high-resolution, presentable, and sophisticated plots can be created\
    \ rapidly with one or a few lines of code using this library. This library is\
    \ specifically useful for presentation creation purposes. The disadvantage of\
    \ the seaborn library is that although most of the important plots are available,\
    \ it does not have as wide of a collection as the matplotlib library and can only\
    \ create statistical plots that exist within the library. Some of the common useful\
    \ plots in seaborn are distribution plot, joint plot, pair plots, rug plot, kernel\
    \ density estimate (KDE) plot, bar plot, count plot, box plot, violin plot, and\
    \ swarm plot. Let's go ahead and start importing the seaborn library (highlighted\
    \ in bold) and \"Shale Gas Wells.\" The link to this data set can be found below:\n\
    \nhttps://www.elsevier.com/books-and-journals/book-companion/9780128219294\n\n\
    ```\nimport numpy as np\nimport pandas as pd\nimport matplotlib.pyplot as plt\n\
    import seaborn as sns\n%matplotlib inline\ndf_Shale=pd.read_csv('Chapter2_Shale_Gas_Wells_DataSet.csv')\n\
    df_Shale.columns\n```\n\n```\nPython output=Index(['Stage Spacing', 'bbl/ft',\
    \ 'Well Spacing',\n       'Dip', 'Thickness', 'Lateral Length', 'Injection Rate',\
    \ 'Porosity',\n       'ISIP', 'Water Saturation', 'Percentage of LG', 'Pressure\
    \ Gradient',\n       'Proppant Loading', 'EUR', 'Category'], dtype='object')\n\
    ```\n\n## Distribution plots\n\nOne of the most important plots to comprehend\
    \ a data set prior to performing any type of ML analysis is the distribution plot.\
    \ Here the distribution of each parameter is plotted for analysis. The main reason\
    \ for using a distribution plot is to make sure the distribution of the input\
    \ and output features are normal (Gaussian). This is because the majority of ML\
    \ algorithms assume that the distribution of the parameters is normal. Therefore,\
    \ when distribution of parameters is nonnormal, one should apply various techniques\
    \ to normalize them. Seaborn library can be used to plot distribution plots. As\
    \ illustrated below, \"sns.distplot\" method is used to plot the distribution\
    \ of each parameter. In addition, color can be specified and bins can be set to\
    \ a number. Otherwise, if \"bins = None,\" Freedman–Diaconis rule will be used\
    \ as the default parameter in the seaborn library.\n\nPlease note that Freedman–Diaconis\
    \ rule is a popular method developed in 1981 to select the width of the bins used\
    \ in a histogram. The bin width is calculated as shown below (Freedman & Diaconis,\
    \ 1981):\n\n> $Bin Width = 2 \\frac{IQR(x)}{\\sqrt[3]{n}}$\n\nIn this equation,\
    \ IQR(x) is the interquartile range of the data and n is the number of observations\
    \ in sample x. Interquartile range is defined as the difference between 75th and\
    \ 25th percentile (IQR = Q3-Q1). IQR is also referred to as \"middle 50,\" \"\
    H-spread,\" or \"midspread\" (Kokoska & Zwillinger, 2000).\n\nLet's go over calculating\
    \ the IQR on a sample assuming the following numbers:\n1,3,5,2,6,12,17,8,15,18,20\n\
    Step 1) Place the numbers in order as follows:\n1,2,3,5,6,**8**,12,15,17,18,20\n\
    Step 2) Find the median. The median for this example is 8.\nStep 3) To make Q1\
    \ and Q3 easier to identify, let's place parentheses around the numbers above\
    \ and below the median as follows:\n(1,2,3,5,6),8,(12,15,17,18,20)"

    neural network (ANN), support vector machine (SVM), decision tree (DT), random
    forest (RF), extreme random forest (ERF), gradient boosting (GB), adaptive gradient
    boost (AGB), multi-linear regression (MLR), logistic regression (LR), and KNN.


    # Unsupervised learning


    In this type of ML, only sets of input features ($x_i$) are available and there
    is no associated label. Therefore, existing pattern is sought in the input data.
    The major difference between unsupervised and supervised technique is that in
    unsupervised, there are no output(s) to compare the predictions, while in supervised
    learning, the model predictions could always be compared with actual available
    output(s). Unsupervised learning can potentially reduce labor within an organization
    because unsupervised learning algorithms can be used in place of human efforts
    to filter through large sets of data for clustering purposes. This could lead
    to improving efficiency. Examples of unsupervised ML algorithms are k-means clustering,
    hierarchical clustering, DBSCAN, principal component analysis (PCA), and apriori
    algorithm. An example of using an unsupervised ML algorithm is determining the
    type curve boundaries within a company''s acreage position. E&P companies primarily
    use production performance, geologic features, land, infrastructure, and capacity
    to determine type curve boundaries. All of these important features can simply
    be used as input features into an unsupervised ML model. A clustering algorithm
    can then be applied to cluster the data. After clustering the data, plot the resulting
    clusters for each well based on their latitude and longitude to determine proper
    type curve boundaries for each area of interest. This is an unbiased powerful
    unsupervised technique to provide a realistic view of type curve boundaries and
    regions without using human interference.'
  - '[PAGE 111]


    # Semi-supervised learning


    Semi-supervised ML is a combination of using **unsupervised** and **supervised**
    learning. If a large amount of unlabeled data is available, the first step is
    to use some type of unsupervised ML algorithm to cluster the data (label the data).
    Afterward, the labeled data obtained from the unsupervised technique can be used
    as the output for the supervised ML algorithm. Therefore, a combination of unsupervised
    and supervised algorithms is used to solve a problem. Please note that clustering
    the data using an unsupervised technique cannot necessarily lead to the best result
    in term of obtaining a desired labeled class. Therefore, massaging the data prior
    to using an unsupervised technique is extremely crucial to obtain the desired
    labeled class. In some cases, it might take less time to use domain expertise
    to label the data prior to using it in a supervised ML algorithm.


    # Reinforcement learning


    Reinforcement learning is a learning technique that directs the action to maximize
    the reward of an immediate action and those following. In this type of ML algorithm,
    the machine trains itself continuously by using a computational approach to learning
    from action. Reinforcement learning is different from supervised learning because
    labeled input/output pairs are not needed to be present. Imagine that you are
    a 9-year-old basketball player watching your mentors dunking to score. Then you
    manage to lower the basketball hoop and use it to dunk for practicing. You have
    learned that dunking can be used for the positive action of scoring. Now, you
    try to raise the hoop and dunk again and manage to twist your ankle while landing.
    You then realize that it can be used for the negative action of hurting yourself
    when used inappropriately. This learning procedure helps the kid to learn proper
    use of a basketball hoop for positive and not negative action. Humans learn by
    interaction and reinforcement learning. Learning through trial and error with
    prize and punishment is the most important feature of reinforcement learning.
    Reinforcement learning can also be used in the O&G industry for various purposes.
    An example of using reinforcement learning is for producing plunger or intermittent
    wells. For example, reinforcement learning can be used to adjust production set
    points as to when to open or close a well. This can be achieved by continuous
    model learning from set points that lead to poor production performance (bad behavior)
    or set points that lead to excellent production performance (good behavior). After
    learning the good and bad behaviors, the set points can be automatically optimized
    without human intervention. Coupling reinforcement learning and edge computing
    devices can add a tremendous value across various O&G companies and sectors. Two
    of the most commonly used reinforcement learning algorithms are Markov decision
    process (MDP) and Q-learning.'
- md: '## Dimensionality reduction


    Dimensionality reduction is the process of reducing the number of variables by
    obtaining a set of important variables. Often times when features are heavily
    related, the number of features can simply be reduced using some type of dimensionality
    reduction algorithms as opposed to using all collinear features. Dimensionality
    reduction is an effective approach when many correlated attributes exist within
    a data set. For instance, many geologic features that are collinear can be reduced
    to only a few important features. Examples of dimensionality reduction algorithms
    are PCA, nonnegative matrix factorization (NMF), and stochastic neighbor embedding
    (SNE).


    ## Principal component analysis (PCA)


    The desired goal in PCA is to find patterns in a data set and to reduce the dimensionality
    of collinear features in an attempt to increase computational efficiency while
    retaining all important information. The following steps are needed to perform
    PCA:


    - Standardize the data set as discussed in the workflow section.

    - Calculate the covariance matrix (also known as variance–covariance matrix).

    - Calculate eigenvectors and eigenvalues from the covariance matrix.

    - Sort the eigenvalues in a descending order and choose **n eigenvectors**. n
    is the number of dimensions after applying PCA.

    - Calculate the principal components and reduce the dimensions of the data set.


    PCA concept is easier to understand with illustrating a step-by-step example.
    Therefore, let''s examine Table 3.1. As illustrated in this table, permeability
    values for matrix, natural fracture, and effective **permeability** values are
    shown for five different wells.


    **TABLE 3.1** Permeability properties (nd).


    | Matrix permeability | Natural fracture permeability | Effective permeability
    |

    | :--- | :--- | :--- |

    | 30 | 75 | 120 |

    | 45 | 90 | 145 |

    | 20 | 65 | 120 |

    | 100 | 140 | 185 |

    | 50 | 90 | 130 |


    1) The first step in PCA is standardizing the data set; however, for the sake
    of working with easier numbers for this illustration purpose, this step was skipped.
    Please make sure this is done prior to performing any real-life example or the
    PCA will be inaccurate.


    2) The data from the table can be rewritten as matrix $X$:


    $$X = \begin{bmatrix} 30 & 75 & 120 \\ 45 & 90 & 145 \\ 20 & 65 & 120 \\ 100 &
    140 & 185 \\ 50 & 90 & 130 \end{bmatrix}$$


    3) Calculate the covariance matrix of $X$ using the equation below:


    $$cov(X, Y) = \frac{1}{n-1} \sum_{i=1}^{n} (X_i - \bar{X})(Y_i - \bar{Y})$$


    The covariance matrix of the following scenarios must be calculated:

    - Covariance(matrix perm, matrix perm), Covariance(natural fracture perm, matrix
    perm), Covariance(effective perm, matrix perm), Covariance(matrix perm, natural
    fracture perm), Covariance(natural fracture perm, natural fracture perm), Covariance(effective
    perm, natural fracture perm), Covariance(matrix perm, effective perm), Covariance(natural
    fracture perm, effective perm), Covariance(effective perm, effective perm)


    In other words, Table 3.2 illustrates the covariance matrix of matrix $X$:


    Therefore, the covariance of matrix $X$ is as follows:


    $$Covariance\ of\ matrix\ X = \begin{bmatrix} 764 & 712 & 645 \\ 712 & 666 & 610
    \\ 645 & 610 & 590 \end{bmatrix}$$


    **TABLE 3.2** Covariance matrix.


    | Perm covariance matrix | Matrix perm | Natural fracture perm | Effective perm
    |

    | :--- | :--- | :--- | :--- |

    | Matrix perm | 764 | 712 | 645 |

    | Natural fracture perm | 712 | 666 | 610 |

    | Effective perm | 645 | 610 | 590 |


    As illustrated in the diagonal in the covariance matrix $X$ above, 764 is the
    matrix perm covariance which is the highest number as compared to natural fracture
    perm (666) and effective perm (590). This essentially indicates higher variability
    in matrix perm as compared to natural fracture perm and effective perm. There
    is positive covariance between all perm values. This indicates as one perm increases,
    the other will also increase.


    4) Calculate eigenvalues and vectors of the covariance matrix shown above. Eigenvalues
    of a square matrix $X$ can be calculated as follows:


    $$Determinant(X - \lambda I) \quad (3.6)$$


    where $\lambda$ is eigenvalue, and $I$ is an identity matrix. Let''s plug in matrix
    $X$ in the above equation as follows:


    $$det\left(\begin{pmatrix} 764 & 712 & 645 \\ 712 & 666 & 610 \\ 645 & 610 & 590
    \end{pmatrix} - \lambda \begin{pmatrix} 1 & 0 & 0 \\ 0 & 1 & 0 \\ 0 & 0 & 1 \end{pmatrix}\right)
    \quad (3.7)$$


    Simplify the matrix excluding determinant as follows:


    $$\begin{pmatrix} 764 & 712 & 645 \\ 712 & 666 & 610 \\ 645 & 610 & 590 \end{pmatrix}
    - \begin{pmatrix} \lambda & 0 & 0 \\ 0 & \lambda & 0 \\ 0 & 0 & \lambda \end{pmatrix}
    \xrightarrow{Simplify} \begin{pmatrix} 764 - \lambda & 712 & 645 \\ 712 & 666
    - \lambda & 610 \\ 645 & 610 & 590 - \lambda \end{pmatrix} \quad (3.8)$$


    Add determinant back to the simplified matrix:


    $$det\begin{pmatrix} 764 - \lambda & 712 & 645 \\ 712 & 666 - \lambda & 610 \\
    645 & 610 & 590 - \lambda \end{pmatrix} \xrightarrow{Calculate \ determinant \
    and \ place \ the \ equation \ equal \ to \ 0}$$


    $$-\lambda^3 + 2020\lambda^2 - 57455\lambda + 24950 = 0$$

    $$\lambda_1 \approx 0.441$$

    $$\lambda_2 \approx 28.408$$

    $$\lambda_3 \approx 1991.151$$

    $$(3.9)$$


    Lambda 1, 2, and 3 represent the eigenvalues. Now it is time to calculate eigenvectors
    of the eigenvalues shown above. Eigenvectors are denoted as $V_1$, $V_2$, and
    $V_3$ below and were calculated using the Cramer''s rule.


    $$v_1 \approx \begin{pmatrix} 4.029 \\ -5.227 \\ 1 \end{pmatrix}$$


    $$v_2 \approx \begin{pmatrix} -0.608 \\ -0.278 \\ 1 \end{pmatrix}$$


    $$v_3 \approx \begin{pmatrix} 1.152 \\ 1.079 \\ 1 \end{pmatrix}$$


    5) Sort the eigenvectors by decreasing eigenvalues calculated in step 4.


    $$\begin{pmatrix} 1991.151 \\ 28.408 \\ 0.441 \end{pmatrix}$$


    For this example, let’s reduce the original three-dimensional feature space to
    two-dimensional feature subspace. Therefore, the eigenvectors associated with
    the maximum two eigenvalues of 1991.151 and 28.408 are as follows:


    $$K = \begin{bmatrix} 1.152 & -0.608 \\ 1.079 & -0.278 \\ 1 & 1 \end{bmatrix}$$


    $e1$ and $e2$ represent the top two eigenvectors. Finally, the last step is to
    take the $3 \times 2$ dimensional $K$ matrix and transform it using the following
    equation:


    $$Transformed\ data = Feature\ matrix \times K$$


    Feature matrix represents the original standardized matrix (for this example the
    perm matrix was not standardized) and $K$ represents the top $K$ eigenvectors.


    ## PCA using scikit-learn library


    Now that the concept of PCA component is clear, let’s go over the Python code
    and apply PCA to a completions data set in an attempt to reduce the dimensionality
    from 4 to 2 or 3 parameters. In a new Jupyter Notebook, let’s import the important
    libraries that will be used for PCA. Afterward, import “Chapter3_Completions_DataSet”
    located at the following link: https://www.elsevier.com/books-and-journals/book-companion/9780128219294


    ```python


  mdcn: "接下来，让我们在应用层次聚类之前对数据进行标准化，如下所示：\n\n```python\nfrom sklearn.preprocessing import\
    \ StandardScaler\nscaler = StandardScaler()\ndf_scaled = scaler.fit(df)\ndf_scaled\
    \ = scaler.transform(df)\n```\n\n接下来，让我们创建树状图。首先，导入 `scipy.cluster.hierarchy as\
    \ shc` 库。请确保在 `dend = shc.dendrogram(shc.linkage(df_scaled, method = 'ward'))`\
    \ 中传入 `df_scaled`，即数据集的标准化版本。\n\n```python\nimport scipy.cluster.hierarchy as\
    \ shc\nplt.figure(figsize=(15, 10))\ndend = shc.dendrogram(shc.linkage(df_scaled,\
    \ method='ward'))\nplt.title(\"Dendrogram\")\nplt.xlabel('Samples')\nplt.ylabel('Distance')\n\
    Python output = Fig. 4.17\n```\n\n如图 4.17 所示，黑色虚线与 5 条垂直线相交。这条黑色水平虚线是基于观察到的最长距离或分支绘制的，具有主观性。因此，你可以随意调整\
    \ `n_clusters`\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_145_0.png)\n\n图 4.17\
    \ 生成的树状图。\n\n并可视化聚类结果。现在，让我们导入凝聚聚类，并将凝聚聚类应用于 `df_scaled` 数据框。在 `AgglomerativeClustering`\
    \ 中，可以通过属性 `n_clusters` 访问所需的聚类数量，`affinity` 返回用于计算链接的度量。在此示例中，选择了欧几里得距离。链接决定了观测集之间使用哪种距离。`linkage`\
    \ 参数可以设置为 (i) ward, (ii) average, (iii) complete 或 maximum, 以及 (iv) single。\n\n\
    根据 scikit-learn 库，`ward` 最小化被合并簇的方差。`average` 使用两个集合中每个观测值之间距离的平均值。`complete`\
    \ 或 `maximum` 链接使用两个集合中所有观测值之间的最大距离。`single` 使用两个集合中所有观测值之间的最小距离。本示例中使用了默认的 `ward`\
    \ 链接。在 `HC` 下定义层次聚类标准后，将 `fit_predict()` 应用于标准化数据集 (df_scaled)。\n\n```python\n\
    from sklearn.cluster import AgglomerativeClustering\nHC = AgglomerativeClustering(n_clusters=5,\
    \ affinity='euclidean', linkage='ward')\nHC = HC.fit_predict(df_scaled)\nHC\n\
    Python output = Fig. 4.18.\n```\n\n让我们使用 pandas 的 `pd.DataFrame` 将 `df_scaled`\
    \ 转换为数据框。然后，如下所示，将轮廓系数应用于此数据集。\n\n```python\ndf_scaled = pd.DataFrame(df_scaled,\
    \ columns=df.columns[0:2])\ndf_scaled['Clusters'] = HC\ndf_scaled\nPython output\
    \ = Fig. 4.19\n```\n\n```\narray([4, 3, 4, 3, 4, 3, 4, 3, 4, 3, 4, 3, 4, 3, 4,\

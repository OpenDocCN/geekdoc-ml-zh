    # Fuzzy set operations


    **Subset** of a fuzzy set $A$ is a subset of fuzzy set $B$, ($A \subset B$) if
    the following holds true:


    $$\forall x \in X, \mu_A(x) \leq \mu_B(x)$$


    Fig. 8.11 illustrates this concept.


    **Complement** of a fuzzy set $A$ is a fuzzy set $Ac$ with its membership function
    defined as follows:


    $$\mu_{A^c}(x) = 1 - \mu_A(x)$$


    **Union** of two fuzzy sets $A$ and $B$ is a fuzzy set $U$ with its membership
    function as maximum of the two sets $A$ and $B$ membership function values defined
    as follows:


    $$\mu_C(x) = \max\{\mu_A(x), \mu_B(x)\}$$


    A sample union of fuzzy sets $A$ and $B$ can be seen in Fig. 8.12.


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_390_0.png)'

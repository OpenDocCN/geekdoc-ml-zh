    # Chapter 4


    ## Unsupervised machine learning: clustering algorithms


    ### Introduction to unsupervised machine learning


    As discussed in Chapter 3, unsupervised **Machine Learning (ML)** algorithms can
    be powerfully applied in clustering analysis. There are different types of clustering
    algorithms that are most commonly used. Some of the applications of clustering
    algorithms in the O&G industry are liquid-loading detection using k-means clustering
    proposed by Ansari et al., area of interest (type curve) clustering, and lithology
    classification clustering. The idea behind using a clustering algorithm is to
    cluster or partition the data. For instance, if dividing a producing gas well
    into its loaded versus unloaded condition is the desirable outcome, a clustering
    algorithm can be used to make this division. One might ask Turner and Coleman
    rates can be used for such segmentation using empirical equations, but those methodologies
    were developed for vertical conventional wells that are not applicable in deviated
    and horizontal wells with multistage hydraulic fracturing. The use of a clustering
    technique allows one to perform such analysis independent of empirical equations
    developed many decades ago and use the power of data to segment each well to loaded
    versus unloaded condition. Another example of using an unsupervised clustering
    technique in the O&G industry is type curve clustering. E&P operators use their
    knowledge of the area such as geologic features, production performance, BTU content,
    proximity to pipeline, etc., to define each formation’s type curve area and boundaries.
    As can be imagined, this process can be very difficult to comprehend, considering
    all the features that would affect the outcome. Therefore, the power of data and
    unsupervised ML algorithms can be used to cluster like-to-like or similar areas
    together. All of the aforementioned features can be used as the input features
    of the unsupervised ML model, and the clustering algorithm will indicate to which
    cluster each row of data will belong. Another application of unsupervised algorithms
    in the O&G is lithology classification. Both supervised and unsupervised ML models
    can be used for lithology classification. If unsupervised ML models are used for
    this purpose, the idea is to automate the process of identifying geologic formations
    such as sandstone, limestone, shale, etc., using an automated technique as opposed
    to manually having a geologist going through the process. If a model has been
    clustered properly, these clustering algorithms should provide similar classification
    results when compared to human interpretation. Clustering algorithms can also
    be used for clustering one second frac stage data to help screen out detection.
    In all of these applications, it is important to note that some of the algorithms
    will not yield the desirable outcome on the first trial. It is crucial to change/massage
    the data until the algorithm understands the best way to cluster the data. For
    example, when clustering the data for liquid-loading detection, feeding the model
    the basic properties such as gas rate, casing pressure, tubing pressure, and line
    pressure might not suffice. Other parameters such as slope and standard deviation
    of the gas rate might be necessary for the model to correctly cluster the data
    based on domain expertise. ML analysis heavily relies on domain expertise to understand
    and deeply comprehend the problem. Without domain expertise, most ML projects
    could potentially lead to unsatisfactory results. In this chapter, k-means clustering,
    hierarchical clustering, and density-based spatial clustering of applications
    with noise (DBSCAN) will be discussed. In addition, other unsupervised anomaly
    detection algorithms will be discussed.


    ### K-means clustering


    K-means is a powerful yet simple unsupervised ML algorithm used to cluster the
    data into various groups. K-means clustering can also be used for outlier detection.
    One of the biggest challenges of k-means clustering is identifying the optimum
    number of clusters that must be used. Domain expertise plays a key role in determining
    the number of clusters. For example, if the intent is to cluster the data into
    loaded versus unloaded conditions for dry gas wells, the domain expertise instructs
    one to use two clusters. On the other hand, if clustering is desired to be used
    to cluster type curve regions, various number of clusters should be applied and
    the results visualized before determining the number of clusters needed to define
    the type curve boundaries. If a problem is supercomplex and determining the number
    of clusters is simply not feasible, the "elbow" method can be used to get some
    understanding of the potential number of clusters that will be needed. In this
    approach, k-means algorithm is run multiple times at various clusters (2 clusters,
    3 clusters, etc.). Afterward, plot "number of clusters" on the x-axis versus "within
    cluster sum of squared errors" on the y-axis until an elbow point is observed.
    Increasing the number of clusters beyond the elbow point will not tangibly improve
    the result of the k-means algorithm. Fig. 4.1 illustrates the elbow point or the
    optimum number of clusters that occurred with 4 clusters. This method provides
    some insight into the number of clusters to choose, but it is very crucial to
    test higher'

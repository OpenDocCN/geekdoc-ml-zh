    # K-means clustering application: manual calculation example


    The production data such as gas rate, casing pressure, tubing pressure, and line
    pressure from 500 wells were gathered into a single data source. After applying
    k-means clustering using k-means++ initialization and **euclidean distance** function
    using **two clusters**, the data were converged into the two cluster centroids
    as shown in Table 4.1. Please indicate which cluster (1 or 2) the following numbers
    will fall under:


    Solution: Step 1) Calculate the euclidean distance function from the provided
    points to **cluster 1** as follows: Gas rate= 4200 Mscf/D, CSG pressure= 800 psi,
    TBG pressure= 700 psi, line pressure= 500 psi


    Cluster 1 distance to provided points =


    ```

    $\sqrt{(4200 - 4300)^2 + (800 - 640)^2 + (700 - 520)^2 + (500 - 360)^2} = 360$

    ```


    Step 2) Calculate the euclidean distance function from the provided points to
    **cluster 2** as follows:


    Cluster 2 distance to provided points =


    ```

    $\sqrt{(4200 - 3900)^2 + (800 - 2050)^2 + (700 - 590)^2 + (500 - 500)^2} = 1194$

    ```


    Step 3) If the calculated distance is the smallest, assign to cluster 1. In this
    example, the calculated distance for cluster 1 (step 1) is smaller than the calculated
    distance for cluster 2 (step 2). Therefore, these proposed numbers (provided in
    this example) will be clustered as cluster 1. If there are multiple cluster centroids,
    simply calculate the distance from each interested new row


    | Attribute | Cluster 1 | Cluster 2 |

    | :--- | :--- | :--- |

    | Gas rate (MSCF/D) | 4300 | 3900 |

    | CSG pressure (casing pressure, psi) | 640 | 2050 |

    | TBG pressure (tubing pressure, psi) | 520 | 590 |

    | Line pressure (psi) | 360 | 500 |

    | Gas rate = 4200 MSCF/D, CSG pressure = 800 psi, TBG pressure = 700 psi, line
    pressure = 500 psi. | | |'

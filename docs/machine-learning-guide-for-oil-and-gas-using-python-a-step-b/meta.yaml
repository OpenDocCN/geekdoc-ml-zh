  md: "ranges, it is recommended to scale the data between 0 and 1 for the learning\
    \ process (data set can also be standardized; the proper data transformation can\
    \ be determined by the performance of the model which will be explained in this\
    \ chapter). It is possible to perform feature ranking techniques mentioned in\
    \ Chapter 6 like Spearman’s rank correlation or random forest to see which attributes\
    \ play an important role in sand production. In this section, the objective is\
    \ to compare different evaluation metrics for a binary classification problem.\
    \ \"K-nearest neighbors\" (KNN) algorithm would be used to train a model that\
    \ predicts which well will produce sand. For the training process and more importantly\
    \ model evaluation, data should be partitioned into train and test segments. Data\
    \ scaling, partitioning, and training KNN model can be done with the following\
    \ codes.\n\n```\n# Define input(x) and target(y)\nx=dataset.iloc[:,1:11]\ny=dataset.iloc[:,11].values\n\
    # Scale input data between 0 and 1\nfrom sklearn.preprocessing import MinMaxScaler\n\
    sc=MinMaxScaler()\nxnorm=pd.DataFrame(data=sc.fit_transform(x))\n# Partition data\
    \ into test and train\nimport numpy as np\nseed=50\nnp.random.seed(seed)\nfrom\
    \ sklearn.model_selection import train_test_split\nx_train, x_test, y_train, y_test=train_test_split(xnorm,\n\
    \    y, test_size=0.3)\n# Train binary classifier (k-neighbor) and predict on\
    \ train and test data\n# set\nfrom sklearn.neighbors import KNeighborsClassifier\n\
    KNC=KNeighborsClassifier(n_neighbors=3,leaf_size=3)\nKNC.fit(x_train,y_train)\n\
    y_train_predict=KNC.predict(x_train)\ny_test_predict=KNC.predict(x_test)\n```\n\
    \nThe first evaluation metric is \"accuracy,\" defined as the ratio of correct\
    \ prediction to total prediction. The results of the trained KNN model prediction\
    \ for the test data set are shown in Table 7.2. In the test data set(y_train),\
    \ there are nine observations where six wells produced sand (1 values) and three\
    \ wells experienced no sand production (0 values). When the model predicts value\
    \ 1 or sand production correctly, it is called True Positive (TP). In this example,\
    \ there are five TPs. When the model makes a correct prediction for 0 values or\
    \ no sand production, it is called True Negative (TN). If the model makes a wrong\
    \ prediction equal to 1 or sand production, it is defined as False Positive (FP)\
    \ or type I error. Finally, if the model makes a wrong prediction equal to 0 or\
    \ no sand production, it is defined as False Negative (FP) or type II error. In\
    \ this example, there are six TPs, one TN, and two FPs. There was no FN in the\
    \ model’s prediction."

  md: 'the previous sections. For example, in the temperature control system defined
    earlier with two input variables, Temperature and Humidity. The output or control
    action is Fan Speed. There are two linguistic values Cold and Hot for the Temperature
    and Low and High for Humidity and three linguistic values Low, Medium, and High
    for Fan Speed. For this system, four rules can be derived as shown in Table 8.1.
    Note that another set of 12 rules can be defined if the complement of the input
    values (NOT) are considered resulting in a total of 16 rules using AND combination
    of different fuzzy sets. Additionally, if the OR combination of input values’
    fuzzy sets are used, 16 more rules can be derived resulting in a total of $2^{2
    \times 2^{-1}(2 \times 2)} = 32$ possible rules.


    For this example the following set of rules are considered for the temperature
    control system:


    +   1) If Temperature is Cold AND Humidity is Low $\rightarrow$ Fan Speed Low,

    2) if Temperature is Cold AND Humidity is NOT Low $\rightarrow$ Fan Speed Medium,

    3) if Temperature is Hot OR Humidity is High $\rightarrow$ Fan Speed Medium,

    4) if Temperature is Hot and Humidity is High $\rightarrow$ Fan Speed High.


    Note that usually an aggregation of rules is used for decision-making and these
    rules are defined by domain experts based on different values of inputs and corresponding
    control action.


    # Inference


    In order to draw conclusions from a set of rules defined for a system ((iii) inference
    step), the strength of the premise of each rule, referred to as "Firing Strength"
    of the premise, is calculated given a set of input values. The firing strength
    of a rule shown as $\mu_{premise(i)}(x_1, x_2)$ quantifies the strength of the
    rule premise given a set of crisp input values $x_1, x_2$. Note that the premise
    can have different combination of input variables, e.g., AND, OR, NOT. Calculating
    the firing strength of each rule is different based on fuzzy set operations used
    in that rule (see Fuzzy set operations section). For example, considering input
    values: Temperature denoted as $x_1 = 75^\circ F$ and Humidity denoted as $x_2
    = 43\%$,


    TABLE 8.1 Temperature humidity rule space.


    | Fan speed | Humidity |

    | :--- | :--- |

    | | AND | Low | High |

    | Temperature | Cold | Low | Med |

    | | High | Med | High |'

- img_proc: true
  md: '$$oj = F_{step}(hj) = \begin{cases} 0, & hj < 0 \ 1, & hj \ge 0 \end{cases}
    \quad (6.2)$$


    Rectified linear unit (ReLU) is the most widely used activation function. If action
    potential is less than 0, the activation function would be 0. For action potential
    values greater than 0, activation function and action potential values are the
    same. In other words, ReLU is actually a maximum function in terms of $F_{ReLU}
    = Max(0, hj)$ or:


    $$oj = F_{ReLU}(hj) = \begin{cases} 0, & hj < 0 \ hj, & hj \ge 0 \end{cases} \quad
    (6.3)$$


    The sigmoid function uses the following relation and ranges from 0 to 1. For large
    negative numbers, the sigmoid function returns 0 and for large positive numbers,
    it returns 1. The sigmoid activation function has been practiced less recently
    (compared with other activation functions). It is due to the fact that this function''s
    gradient would not be appropriate for weight optimization (will be discussed later)
    and also sigmoid outputs are not centered at 0.


    $$oj = F_{sigmoid}(hj) = \frac{1}{1 + e^{-hj}} \quad (6.4)$$


    Tanh activation function is similar to sigmoid function with a primary difference
    of returning values from $-1$ to 1. Tanh is preferred over the sigmoid activation
    function since it is zero centered with better gradient performance. All the mentioned
    activation functions are shown in Fig. 6.3.


    $$oj = F_{tanh}(hj) = tanh(hj) = \frac{1 - exp(-2hj)}{1 + exp(-2hj)} \quad (6.5)$$


    In order to solve the system of equations containing all the nodes in the neural
    network, linear algebra can be utilized by rewriting all the mentioned equations
    in a matrix form.


    For example, by assuming no bias, Formula 6.1 can be written as:


    $$H = W.I$$


    where W is the weights matrix, I is the input vector, and H is the action potential
    vector. To use the activation function and calculate the output vector for each
    hidden layer, it is possible to apply sigmoid functions to all the elements of
    vector H as follows:


    $$o = F(H)$$


    Neural network topologies are determined by connection patterns between neurons
    and propagation of data. The mentioned process can be repeated for each hidden
    layer considering that the output of the first hidden layer nodes'

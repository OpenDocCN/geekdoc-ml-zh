    Parameter "tol" represents tolerance for optimization. If the loss after several
    iterations does not improve by a larger amount than tol, the training process
    would stop. Model training is completed with the following codes:


    ```

    import numpy as np

    seed=50

    np.random.seed(seed)

    from sklearn.model_selection import train_test_split

    X_train, X_test, y_train, y_test=train_test_split(Xnorm, ynorm, test_size=0.3)

    from sklearn.neural_network import MLPRegressor

    np.random.seed(seed)

    clf=MLPRegressor(hidden_layer_sizes=(7), activation=''tanh'', solver=''lbfgs'',
    alpha=1, learning_rate_init=0.1, max_iter=200, random_state=None, tol=0.01)

    y_train_Ravel=y_train.values.ravel()

    clf.fit(X_train,y_train_Ravel)

    ```


    When the training process is done, it is necessary to plot the predictions and
    compare them with actual values to evaluate model''s performance. In this example,
    input data from both the train and test data sets are used to predict bubble point
    pressure. Then, predicted values are plotted against actual values with the trend
    line and R² to see the model''s performance. The following codes are used to plot
    the results in Fig. 6.18.


    ```

    from sklearn.metrics import r2_score

    Ppb_test=y_test*(y.max()-y.min())+y.min()

    Ppb_train=y_train*(y.max()-y.min())+y.min()

    Ppb_test_prediction=clf.predict(X_test)*(y.max()-y.min())+\ny.min()

    Ppb_train_prediction=clf.predict(X_train)*(y.max()-y.min())+\ny.min()

    ```'

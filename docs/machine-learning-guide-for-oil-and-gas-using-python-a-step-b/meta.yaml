    boost (GB), as well as many other algorithms available in the literature to perform
    feature ranking. These algorithms and Python application of each algorithm will
    be discussed in detail under the supervised learning chapter.


    Feature collinearity is also very important when performing feature selection.
    As was discussed in Chapter 2, please ensure to plot a Pearson correlation coefficient
    heat map of input variables to study the features collinearity. If the features
    are collinear, providing the model with the same information could potentially
    result in model confusion. Simply drop one of the collinear inputs. If both inputs
    are important to understand, it is advised to train two separate models with each
    collinear feature.


    # Scaling, normalization, or standardization


    To make sure the learning algorithm is not biased to the magnitude of the data,
    the data (input and output features) must be scaled. This can also speed up the
    optimization algorithms such as gradient descent that will be used in model development
    by having each of the input values in roughly the same range. Please note that
    not all ML algorithms will require feature scaling. The general rule of thumb
    is that algorithms that exploit distances or similarities between data samples,
    such as artificial neural network (ANN), KNN, support vector machine (SVM), and
    k-means clustering, are sensitive to feature transformations. However, some tree-based
    algorithms such as decision tree (DT), RF, and GB are not affected by feature
    scaling. This is because tree-based models are not distance-based models and can
    easily handle varying range'
  merge: -1
  pgno: 103
- img_proc: true
  md: 'of features. This is why tree-based models are referred to as “scale-invariant”
    due to not having to perform feature scaling. Each of the mentioned algorithms
    will be discussed in detail in the upcoming chapters. The three main types of
    scaling are referred to as:


    +   - **Feature normalization:** Feature normalization guarantees that each feature
    will be scaled to [0,1] interval. This is a critical step simply due to the fact
    that a model will be biased when features have different magnitudes. For instance,
    if two of the features in a ML model are surface frac treating rate and surface
    frac treating pressure, surface frac treating rate can range between 60 and 110
    bpm while surface frac treating pressure can range between 8000 and 12,500 psi.
    Leaving these features without scaling between 0 and 1 would result in a model
    bias towards frac treating pressure which has larger values. One of the primary
    disadvantages of feature normalization is that smaller standard deviation is obtained
    when the bound is between 0 and 1 which could result in suppressing the effects
    of outliers (if any). The equation for feature normalization is illustrated in
    Box 3.1.

    - **Feature standardization (z-Score normalization):** Standardization transforms
    each feature with Gaussian distribution to Gaussian distribution with a mean of
    0 and a standard deviation of 1. Note that standardization does not transform
    the underlying distribution structure of the data. Some learning algorithms, such
    as SVM, assume that data are distributed around 0 with the same order of variance.
    If this condition is not met, then the algorithm will be biased towards features
    with a larger variance. Feature standardization can be performed using Box 3.2.


    The next question that is often asked is whether to use normalization or standardization.
    The answer of this question depends on the application. In clustering algorithms
    such as k-means clustering, hierarchical clustering, density-based spatial clustering
    of applications with noise (DBSCAN), etc., standardization is important due to
    comparing feature similarities based on distance measures. On the other hand,
    normalization becomes more important with certain algorithms such as ANN and image
    processing (Raschka, n.d.).


    > **BOX 3.1 Feature normalization**


    $$Feature\ normalization(X'') = \frac{X - min(X)}{max(X) - min(X)}$$ (3.1)


    where $X''$ is the normalized data point, $min(X)$ is the minimum of the data
    set, and $max(X)$ is the maximum of the data set.'
  merge: -1
  pgno: 104
- img_proc: true
  md: "# BOX 3.2 Feature standardization\n\n$Feature\\ standardization(X') = \\frac{X\
    \ - \\mu}{\\sigma}$ (3.2)\n\nwhere $X'$ is the standardized data point, $\\mu$\
    \ is the mean of the data set, and $\\sigma$ is the standard deviation of the\
    \ data set.\n\n# Cross-validation\n\nBefore applying various ML models, cross-validation\
    \ must be applied when a supervised ML algorithm is used. Various types of ML\
    \ algorithms will be discussed shortly, therefore, for now just remember that\
    \ cross-validation is needed when supervised ML models are used. Unsupervised\
    \ ML models do not require cross-validation because the data are only used for\
    \ clustering. There are different types of cross-validations and they are as follows:\n\
    \n+   - **Holdout method:** This is one of the simplest type of cross-validation\
    \ where a portion of the data is held out from the training data set. For example,\
    \ in a data set with 100K rows of data, 70% or 70K is used for training the model,\
    \ and 30K or 30% is used for testing the model. The training and testing splits\
    \ are chosen at random. Note that a seed number can be defined in Python to replicate\
    \ any process that relies on drawing random numbers, e.g., the training and testing\
    \ split. As can be guessed, one of the main disadvantages of the holdout method\
    \ is that since the training is done randomly, it cannot be defined which data\
    \ rows to be used for training versus testing. If the data set being used for\
    \ ML analysis is small, this could lead to entirely different ML model outcome.\n\
    - **K-fold cross-validation:** This technique is an extension of the holdout method,\
    \ where the data set is divided into K subsets and the holdout method is repeated\
    \ K times. In k-fold cross-validation, the data set will be shuffled randomly\
    \ first and then, the slices will be used for train/test split. At each round,\
    \ one of the K slices will be held as test data. For instance, for a data set\
    \ with 100K rows of data, the k-fold cross-validation is performed as follows\
    \ when 10-fold is selected:\n    - First 10K rows of data is used as the testing\
    \ set, while the remaining 90K is used as the training set.\n    - Next, rows\
    \ 10K—20K is used as the testing set, and the remaining data set (rows 1K—10K\
    \ and 20K—100K) is used as the training set.\n    - Afterward, rows 20K—30K is\
    \ used as the testing set, and the remaining data set (rows 1K—20K and 30K—100K)\
    \ is used as the training set."
  merge: -1
  pgno: 105
- img_proc: true
  md: '+   - This process is continued 10 times or until the defined k-fold is reached.
    In other words, each time one of the K subsets is used as test and the remaining
    K-1 is used as training set.

    - Finally, the evaluation metric is averaged over 10 trials (for 10-fold cross-validation).

    - This simply indicates that every data point is in the test set one time and
    in the training set nine times (for 10-fold cross-validation).


    One of the main advantages of k-fold cross-validation is that it reduces bias
    and variance (will be discussed) since most of the data is being used for both
    training and testing. Please note that as the number of K increases, the computation
    time also increases. Therefore, please make sure to perform a quick sensitivity
    analysis to see whether the problem can be optimized with less number of K’s such
    as fivefold or threefold without deteriorating the model performance. Fig. 3.1
    illustrates a fivefold cross-validation.


    +   - **Stratified k-fold cross-validation**: When there is a large imbalance
    in the output variable (also called the response variable) of a ML model, a stratified
    k-fold cross-validation could be used. For example, let’s assume that 70% of the
    output of a classification model is classified as “Continue” and 30% is classified
    as “Evaluate.” This is referred to as a **model imbalance** as the number of **output**
    classification is 70%–30%. Therefore stratified k-fold cross-validation ensures
    that each fold is representative of all data strata. This process will aim to
    make sure output distribution is similar across each test fold. In other words,
    k-fold cross-validation is varied in a manner that each fold contains approximately
    the same sample percentage of each target class. For instance, in a stratified
    k-fold cross-validation with 100K rows of data, if 30K is classified as “Evaluate”
    and 70K is classified as “Continue” and 10-fold cross-validation is used, each
    fold will have 3K (30K divided by 10-fold) of “Evaluate” class and 7K (70K divided
    by 10) of “Continue” class. The stratified k-fold cross-validation is not necessary
    when there is no model imbalance.

    - **Leave-P-out cross-validation (LPOCV)**: This is another type of cross-validation
    where every possible combination of P test data points is evaluated. In this technique,
    P data points are left out of the training data. If there are N data points, N–P
    data points are used to train a model and P



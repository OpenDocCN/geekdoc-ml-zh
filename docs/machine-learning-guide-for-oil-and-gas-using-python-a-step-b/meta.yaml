  md: "function (rbf) transformations can be used when dealing with nonlinearly separable\
    \ data.\n\nWithin the scikit-learn library, there are different Kernel functions\
    \ such as \"linear,\" \"poly,\" \"rbf,\" \"sigmoid,\" etc., that can be chosen.\
    \ The most popular, typically providing the highest accuracy, are poly and rbf.\
    \ Therefore, let's review these two transformation functions:\n\n+   - Polynomial\
    \ kernel (or poly kernel):\n    Polynomial kernel is basically a transformer that\
    \ generates new features. SVM with a polynomial kernel can generate a nonlinear\
    \ decision boundary. It might be impossible to separate a numpy array of X and\
    \ Y with a line. However, after applying a polynomial transformer, a line can\
    \ be drawn to separate the X and Y arrays. Polynomial kernel is defined as:\n\n\
    $K(X_1, X_2) = (a + X_1^T X_2)^b$\n\nIn this equation, $X_1$ and $X_2$ are vectors\
    \ in input space, $a$ is constant and is greater or equal to zero, and finally\
    \ $b$ is the degree of the polynomial kernel.\n\n+   - Radial basis function (rbf):\n\
    \    Rbf kernel is a transformer, generating new features using distance measurement\
    \ between all other dots to specific dot(s) or center(s). The most popular rbf\
    \ kernel is the **Gaussian radial basis function**. For example, if X and Y arrays\
    \ cannot be separated using a line, a Gaussian radial basis function transformation\
    \ using two centers can be applied to generate new features. Gaussian radial basis\
    \ function is defined as:\n\n$K(X_1, X_2) = exp(\\gamma ||X_1 - X_2||^2)$\n\n\
    In this equation, $X_1$ and $X_2$ are vectors in input space, $||X_1 - X_2||$\
    \ is the euclidean distance between $X_1$ and $X_2$. $\\gamma$ also known as gamma\
    \ is used to control the influence of new features on the decision boundary. When\
    \ gamma value is low, far away points are taken into consideration when drawing\
    \ the decision boundary which would result in a more straight decision boundary.\
    \ Low values of gamma tend to underfit when training a model. On the other hand,\
    \ when gamma is high, only close points are taken into consideration when drawing\
    \ the decision boundary (wiggly decision boundary). This is because higher gamma\
    \ values will have more influence on the decision boundary. As a result, the boundaries\
    \ would be more wiggly. High gamma values tend to lead to overfitting. Therefore,\
    \ when using rbf kernel function, make sure to include various gamma values in\
    \ the grid search optimization. Fig. 5.31 illustrates the impact of increasing\
    \ gamma on the SVM boundaries. As illustrated, as gamma increases, the model tends\
    \ to overfit and memorize as opposed to building a generalized model."

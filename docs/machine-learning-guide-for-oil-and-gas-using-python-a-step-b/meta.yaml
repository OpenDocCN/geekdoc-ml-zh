  mdcn: '## Matplotlib 库


    Matplotlib 是 Python 中最重要且最常用的可视化库之一。它在绘制图形的各个方面提供了极大的灵活性。该库的设计旨在提供与 Matlab 图形绘制类似的用户交互体验。该库的主要优势之一是其多功能性，几乎可以绘制任何图形。然而，绘制更复杂的图形可能具有挑战性，这将需要更多的编码。如果希望探索本章未涵盖的一些更复杂图形，请参阅
    Matplotlib 的网站（Matplotlib 网站：https://matplotlib.org/tutorials/introductory/sample_plots.html）。请注意，matplotlib
    创建的是静态图像文件，如 JPEG 或 PNG 文件，一旦创建便不会改变。


    要开始创建一些图形，让我们导入 pandas、numpy 和 matplotlib 库。同时添加了 `"%matplotlib inline"`（仅在 Jupyter
    Notebook 中），以便所有图形都在 Jupyter Notebook 中显示。变量 x 和 y 也可以如下创建：


    ```

    import numpy as np

    import pandas as pd

    import matplotlib.pyplot as plt

    %matplotlib inline

    x=np.linspace(0,10,100)

    y=x**3

    ```


    现在，让我们使用 "plt.plot" 绘制上面创建的 x 和 y 变量。请注意，可以简单地输入任何颜色，如下所示。在此图中，使用了红色、线宽为 4 以及线型为
    "--"。此外，"plt.xlabel" 和 "plt.ylabel" 用于显示 x 和 y 标签，"plt.title" 用于显示图形的标题。


    ```

    plt.plot(x,y,''red'',linewidth=4, linestyle=''--'')

    plt.xlabel(''Time'')

    plt.ylabel(''Number of iterations'')

    plt.title(''Number of Iterations Vs. Time'')


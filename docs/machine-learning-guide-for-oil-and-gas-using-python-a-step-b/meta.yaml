- md: "## Handling missing data (imputation techniques)\n\nThis chapter has primarily\
    \ focused on supervised algorithms that can be applied to solve various problems.\
    \ Another important concept that was briefly discussed in Chapter 1 is handling\
    \ missing data. The basic types of dealing with missing data were previously discussed.\
    \ Below are various common approaches to missing data:\n\n1) Simply remove any\
    \ samples with N/A values: This is the simplest method of treating missing data,\
    \ and the disadvantage of this approach is that the number of samples could be\
    \ drastically reduced due to the removal of missing info. For example, if 1000\
    \ out of 2000 wells miss one important feature, removing wells with missing features\
    \ will result in only 1000 wells. This is 50% less wells that could be included\
    \ in the ML model.\n\n2) Replacing missing values with the mean, median, most\
    \ frequent, first value after missing, last value before missing of the existing\
    \ data: Although this approach is overly simplistic and easy to perform, it is\
    \ not typically recommended since there are other powerful algorithms that can\
    \ be used instead.\n\n3) Some algorithms such as k-nearest neighbor (KNN) and\
    \ MICE can be used to fill the missing data. These algorithms do a great job only\
    \ when the following two conditions exist:\n- There is an inherent relationship\
    \ between the parameters that are missing and the existing parameters. For example,\
    \ if sand/ft for one well is missing, but water per foot for the well is available,\
    \ these algorithms might produce meaningful answers.\n- Most of the features with\
    \ some inherent relationships must be present. One challenge that could be encountered\
    \ when using these algorithms is that when a well misses a feature, it could potentially\
    \ miss other important features. For example, when gathering competitor data,\
    \ when a well misses sand loading, it usually misses water loading, stage spacing,\
    \ etc.\n\nThe fancyimpute package in Python is a powerful package when one or\
    \ two parameters in a data set are sporadically missing while there are other\
    \ parameters that have inherent relationships between those parameters. When most\
    \ of the parameters are simply missing from a well’s data, it is not recommended\
    \ to use these packages because they could quite possibly produce erroneous results.\
    \ When using these packages, be sure to normalize or standardize the data prior\
    \ to applying algorithms such as KNN and MICE. K-nearest neighbor uses feature\
    \ similarity to predict the missing values. KNN essentially assigns a new value\
    \ based on how closely it resembles points in the data set. The advantage of KNN\
    \ is that it is more accurate than simply using mean, median, or most frequent\
    \ methods. The disadvantage when using KNN is that it is computationally expensive,\
    \ meaning it works by storing the whole training data set in memory. In addition,\
    \ KNN is sensitive to outliers in the data set. Therefore, make sure the outliers\
    \ are removed and the data are standardized prior to usage.\n\n## Multivariate\
    \ imputation by chained equations\n\nMultivariate imputation involves filling\
    \ in the missing values multiple times, creating multiple \"complete\" data sets.\
    \ This is described in detail by Schafer and Graham (2002). The missing values\
    \ are imputed based on the observed values for a given individual and the relations\
    \ observed in the data for other participants, assuming the observed variables\
    \ are included in the imputation model. Multiple imputation procedures, particularly\
    \ MICE, are very flexible and can be used in a broad range of settings. The following\
    \ steps are taken when using MICE:\n\nStep 1) A simple imputation, such as mean\
    \ imputation is performed for every missing value in the data set. These mean\
    \ imputations can be elaborated as \"place holders\" (Azur et al., 2011).\n\n\
    Step 2) The \"place holder\" mean imputations for one variable (\"var\") are set\
    \ back to missing (Azur et al., 2011).\n\nStep 3) \"var\" would then become the\
    \ dependent variable in a regression model and all the other variables become\
    \ independent variables in the regression model (Azur et al., 2011).\n\nStep 4)\
    \ The missing values for \"var\" are then replaced with imputation predictions\
    \ from the regression model (Azur et al., 2011).\n\nStep 5) Steps 2–4 are then\
    \ repeated for each variable with missing data. The cycling through each of the\
    \ variables constitutes one iteration or \"cycle.\" At the end of one cycle, all\
    \ the missing values have been substituted with predictions from regressions that\
    \ reflect the observed data relationships (Azur et al., 2011).\n\nStep 6) Steps\
    \ 2 through 4 are repeated for several cycles, with the imputations being updated\
    \ at each cycle. The number of cycles to be performed can be specified by the\
    \ user. At the end of these cycles, the final imputations are retained, resulting\
    \ in one imputed data set (Azur et al., 2011).\n\n## Fancy impute implementation\
    \ in Python\n\nAs discussed, there are various applications for filling in missing\
    \ values. One of the main applications of imputing missing values is in log analysis.\
    \ Portions of the data that are believed to be washed out could be imputed using\
    \ various techniques such as KNN, MICE, iterative imputer, etc. In addition, well\
    \ data (drilling, completions, and production) could also be imputed if there\
    \ are important features that could be used to get the missing data. In this section,\
    \ the implementation of KNN and MICE to impute missing values for one second hydraulic\
    \ frac data of a stage in the Marcellus Shale is covered. These data were obtained\
    \ from the MSEEL publicly available data set and a portion of the surface treating\
    \ pressure data was removed for this exercise. The file can be found at the link\
    \ below:\n\nhttps://www.elsevier.com/books-and-journals/book-companion/9780128219294\n\
    \nOpen a new Jupyter Notebook and start importing the following libraries:\n\n\
    ```python\nimport numpy as np\nimport pandas as pd\nimport matplotlib.pyplot as\
    \ plt\nimport seaborn as sns\nimport missingno as msno\n%matplotlib inline\ndf=pd.read_excel('Chapter5_Imputation_DataSet.xlsx')\n\
    df.describe()\n```\n\nPython output=Fig. 5.85\n\nIt is important to visualize\
    \ the missing data in each feature as follows:\n\n```python\nplt.figure(figsize=(10,8))\n\
    sns.heatmap(df.isnull(),yticklabels=False,cbar=False,\n    cmap='viridis')\n```\n\
    \nPython output=Fig. 5.86\n\nNext, let's visualize the missing data using a slightly\
    \ different approach using \"missingno\" library as follows. Please note that\
    \ this library is used for exploratory visualization of missing data.\n\n| | Surface\
    \ Treating Pressure | Slurry Rate | Proppant Concentration |\n|---|---|---|---|\n\
    | count | 4588.000000 | 4752.000000 | 4752.000000 |\n| mean | 8142.469922 | 99.710795\
    \ | 1.422033 |\n| std | 85.671249 | 3.308136 | 0.703032 |\n| min | 7913.000000\
    \ | 64.400000 | 0.000000 |\n| 25% | 8088.000000 | 99.900000 | 1.000000 |\n| 50%\
    \ | 8116.000000 | 100.300000 | 1.500000 |\n| 75% | 8193.000000 | 100.700000 |\
    \ 2.000000 |\n| max | 8708.000000 | 101.600000 | 3.500000 |\n\nFIGURE 5.85 Missing\
    \ data set description.\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_277_0.png)\n\
    \nFIGURE 5.86 Missing data visualization.\n\n```python\nmissingdata_df=df.columns[df.isnull().any()].tolist()\n\
    msno.matrix(df[missingdata_df])\n```\n\nPython output=Fig. 5.87\n\nNext, obtain\
    \ the number of missing values for each feature (in this exercise, only surface\
    \ treating pressure has missing data) as follows:\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_277_1.png)\n\
    \nFIGURE 5.87 Missing data visualization using \"missingno\" library.\n\n```python\n\
    missing_val_count_by_column=(df.isnull().sum())\nprint(missing_val_count_by_column\n\
    \    [missing_val_count_by_column > 0])\n```\n\n**Python output=Surface Treating\
    \ Pressure 164**\ndtype: int64\n\nNext, standardize the data as follows:\n\n```python\n\
    from sklearn.preprocessing import StandardScaler\nscaler=StandardScaler()\nscaler.fit(df)\n\
    df_scaled=scaler.transform(df)\ndf_scaled=pd.DataFrame(df_scaled, columns=['Surface\
    \ Treating\\n    Pressure', 'Slurry Rate', 'Proppant Concentration'])\n```\n\n\
    First, in \"Anaconda prompt,\" use \"pip install fancyimpute\" before importing\
    \ the library as shown below. Next, use two nearest neighbors and the KNN algorithm\
    \ to impute the missing values:\n\n```python\nfrom fancyimpute import KNN\nX_filled_knn=KNN(k=2).fit_transform(df_scaled)\n\
    X_filled_knn=pd.DataFrame(X_filled_knn,columns=['Surface Treating\\n    Pressure',\
    \ 'Slurry Rate', 'Proppant Concentration'])\nX_filled_knn\n```\n\n**Python output=Fig.\
    \ 5.88**\n\nNext, since the data were standardized prior to feeding the data into\
    \ the KNN imputation algorithm, convert back to its original form and export into\
    \ a csv file.\n\n```python\nX_filled_knn['Surface Treating Pressure']=(X_filled_knn['Surface\\\
    n    Treating Pressure']*df['Surface Treating Pressure'].std())+df\\n    ['Surface\
    \ Treating Pressure'].mean()\nX_filled_knn['Slurry Rate']=(X_filled_knn['Slurry\\\
    n    Rate']*df['Slurry\\n    Rate'].std())+df['Slurry\\n    Rate'].mean()\nX_filled_knn['Proppant\
    \ Concentration']=(X_filled_knn['Proppant\\n    Concentration']*df['Proppant\\\
    n    Concentration'].std())+df\\n    ['Proppant Concentration'].mean()\nX_filled_knn.to_csv('KNN_Imputation.csv',\
    \ index=False)\n```\n\nNext, import the MICE library and apply the MICE algorithm\
    \ to fill in the missing data in average treating pressure column as follows:\n\
    \n```python\nfrom impyute.imputation.cs import mice\nimputed_training=mice(df_scaled.values)\n\
    imputed_training=pd.DataFrame(imputed_training,columns=\n    ['Surface Treating\
    \ Pressure', 'Slurry Rate', 'Proppant\\n    Concentration'])\n```"
  mdcn: "## 处理缺失数据（插补技术）\n\n本章主要关注可用于解决各种问题的监督算法。第1章中简要讨论的另一个重要概念是处理缺失数据。之前已经讨论了处理缺失数据的基本类型。以下是处理缺失数据的几种常见方法：\n\
    \n1)  简单地移除任何含有N/A值的样本：这是处理缺失数据最简单的方法，其缺点是由于移除了缺失信息，样本数量可能会大幅减少。例如，如果2000口井中有1000口井缺少一个重要特征，移除缺少特征的井将导致只剩下1000口井。这比可纳入机器学习模型的井数减少了50%。\n\
    \n2)  用现有数据的均值、中位数、最频繁值、缺失后的第一个值、缺失前的最后一个值替换缺失值：尽管这种方法过于简单且易于执行，但通常不推荐使用，因为有其他更强大的算法可以替代。\n\
    \n3)  一些算法，如k-近邻（KNN）和MICE，可用于填充缺失数据。这些算法仅在满足以下两个条件时才能发挥出色作用：\n-   缺失参数与现有参数之间存在内在关系。例如，如果某口井的砂/英尺数据缺失，但该井的每英尺水量数据可用，这些算法可能会产生有意义的答案。\n\
    -   大多数具有内在关系的特征必须存在。使用这些算法时可能遇到的一个挑战是，当一口井缺少一个特征时，它可能也缺少其他重要特征。例如，在收集竞争对手数据时，当一口井缺少砂加载量时，它通常也缺少水加载量、级间距等。\n\
    \n当数据集中有一两个参数零星缺失，而其他参数之间存在内在关系时，Python中的`fancyimpute`包是一个强大的工具。当一口井的数据中大部分参数都缺失时，不建议使用这些包，因为它们很可能产生错误的结果。使用这些包时，请务必在应用KNN和MICE等算法之前对数据进行归一化或标准化。K-近邻使用特征相似性来预测缺失值。KNN本质上是根据数据集中点的相似程度来分配新值。KNN的优点是比简单使用均值、中位数或最频繁值方法更准确。使用KNN的缺点是计算成本高，这意味着它通过将整个训练数据集存储在内存中来工作。此外，KNN对数据集中的异常值敏感。因此，请确保在使用前移除异常值并对数据进行标准化。\n\
    \n## 链式方程多重插补\n\n多重插补涉及多次填充缺失值，创建多个“完整”数据集。Schafer和Graham（2002）对此进行了详细描述。缺失值是基于给定个体的观测值以及数据中其他参与者观测到的关系进行插补的，假设观测变量包含在插补模型中。多重插补程序，特别是MICE，非常灵活，可用于广泛的场景。使用MICE时采取以下步骤：\n\
    \n步骤1）对数据集中的每个缺失值执行简单插补，例如均值插补。这些均值插补可以被详细描述为“占位符”（Azur等人，2011）。\n\n步骤2）将一个变量（“var”）的“占位符”均值插补重新设置为缺失（Azur等人，2011）。\n\
    \n步骤3）然后，“var”将成为回归模型中的因变量，所有其他变量成为回归模型中的自变量（Azur等人，2011）。\n\n步骤4）然后，使用回归模型的插补预测值替换“var”的缺失值（Azur等人，2011）。\n\
    \n步骤5）然后对每个具有缺失数据的变量重复步骤2-4。遍历每个变量构成一次迭代或“循环”。在一个循环结束时，所有缺失值都已用反映观测数据关系的回归预测值替代（Azur等人，2011）。\n\
    \n步骤6）重复步骤2到4多次循环，每次循环更新插补值。用户可以指定要执行的循环次数。在这些循环结束时，保留最终的插补值，从而产生一个插补数据集（Azur等人，2011）。\n\
    \n## Python中的Fancy impute实现\n\n如前所述，填充缺失值有多种应用。插补缺失值的主要应用之一是测井分析。可以使用各种技术（如KNN、MICE、迭代插补器等）对被认为被冲刷掉的数据部分进行插补。此外，如果有可用于获取缺失数据的重要特征，也可以对井数据（钻井、完井和生产）进行插补。本节将介绍在Marcellus页岩中，使用KNN和MICE对某一级水力压裂数据的每秒数据进行缺失值插补的实现。这些数据来自MSEEL公开数据集，并且为了本次练习，移除了部分地面处理压力数据。文件可在以下链接找到：\n\
    \nhttps://www.elsevier.com/books-and-journals/book-companion/9780128219294\n\n\
    打开一个新的Jupyter Notebook，并开始导入以下库：\n\n```python\nimport numpy as np\nimport pandas\
    \ as pd\nimport matplotlib.pyplot as plt\nimport seaborn as sns\nimport missingno\
    \ as msno\n%matplotlib inline\ndf=pd.read_excel('Chapter5_Imputation_DataSet.xlsx')\n\
    df.describe()\n```\n\nPython输出=图5.85\n\n可视化每个特征中的缺失数据非常重要，如下所示：\n\n```python\n\
    plt.figure(figsize=(10,8))\nsns.heatmap(df.isnull(),yticklabels=False,cbar=False,\n\
    \    cmap='viridis')\n```\n\nPython输出=图5.86\n\n接下来，让我们使用“missingno”库以稍微不同的方法可视化缺失数据，如下所示。请注意，该库用于缺失数据的探索性可视化。\n\
    \n| | 地面处理压力 | 浓度 | 支撑剂浓度 |\n|---|---|---|---|\n| count | 4588.000000 | 4752.000000\
    \ | 4752.000000 |\n| mean | 8142.469922 | 99.710795 | 1.422033 |\n| std | 85.671249\
    \ | 3.308136 | 0.703032 |\n| min | 7913.000000 | 64.400000 | 0.000000 |\n| 25%\
    \ | 8088.000000 | 99.900000 | 1.000000 |\n| 50% | 8116.000000 | 100.300000 | 1.500000\
    \ |\n| 75% | 8193.000000 | 100.700000 | 2.000000 |\n| max | 8708.000000 | 101.600000\
    \ | 3.500000 |\n\n图5.85 缺失数据集描述。\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_277_0.png)\n\
    \n图5.86 缺失数据可视化。\n\n```python\nmissingdata_df=df.columns[df.isnull().any()].tolist()\n\
    msno.matrix(df[missingdata_df])\n```\n\nPython输出=图5.87\n\n接下来，获取每个特征的缺失值数量（在本练习中，只有地面处理压力有缺失数据），如下所示：\n\
    \n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_277_1.png)\n\n图5.87 使用“missingno”库进行缺失数据可视化。\n\
    \n```python\nmissing_val_count_by_column=(df.isnull().sum())\nprint(missing_val_count_by_column\n\
    \    [missing_val_count_by_column > 0])\n```\n\n**Python输出=地面处理压力 164**\ndtype:\
    \ int64\n\n接下来，对数据进行标准化，如下所示：\n\n```python\nfrom sklearn.preprocessing import\
    \ StandardScaler\nscaler=StandardScaler()\nscaler.fit(df)\ndf_scaled=scaler.transform(df)\n\
    df_scaled=pd.DataFrame(df_scaled, columns=['Surface Treating\\n    Pressure',\
    \ 'Slurry Rate', 'Proppant Concentration'])\n```\n\n首先，在“Anaconda prompt”中，使用“pip\
    \ install fancyimpute”安装库，如下所示。接下来，使用两个最近邻和KNN算法来插补缺失值：\n\n```python\nfrom fancyimpute\
    \ import KNN\nX_filled_knn=KNN(k=2).fit_transform(df_scaled)\nX_filled_knn=pd.DataFrame(X_filled_knn,columns=['Surface\
    \ Treating\\n    Pressure', 'Slurry Rate', 'Proppant Concentration'])\nX_filled_knn\n\
    ```\n\n**Python输出=图5.88**\n\n接下来，由于数据在输入KNN插补算法之前已经标准化，因此需要转换回其原始形式并导出为csv文件。\n\
    \n```python\nX_filled_knn['Surface Treating Pressure']=(X_filled_knn['Surface\\\
    n    Treating Pressure']*df['Surface Treating Pressure'].std())+df\\n    ['Surface\
    \ Treating Pressure'].mean()\nX_filled_knn['Slurry Rate']=(X_filled_knn['Slurry\\\
    n    Rate']*df['Slurry\\n    Rate'].std())+df['Slurry\\n    Rate'].mean()\nX_filled_knn['Proppant\
    \ Concentration']=(X_filled_knn['Proppant\\n    Concentration']*df['Proppant\\\
    n    Concentration'].std())+df\\n    ['Proppant Concentration'].mean()\nX_filled_knn.to_csv('KNN_Imputation.csv',\
    \ index=False)\n```\n\n接下来，导入MICE库并应用MICE算法来填充平均处理压力列中的缺失数据，如下所示：\n\n```python\n\
    from impyute.imputation.cs import mice\nimputed_training=mice(df_scaled.values)\n\
    imputed_training=pd.DataFrame(imputed_training,columns=\n    ['Surface Treating\
    \ Pressure', 'Slurry Rate', 'Proppant\\n    Concentration'])\n```"

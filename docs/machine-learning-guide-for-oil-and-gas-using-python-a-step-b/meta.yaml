  - '[PAGE 305]


    Forecasting the post-fracture deliverability of wells in the Clinton Sandstone
    gas storage field was done by Mohaghegh et al. (Mohaghegh et al., 1995) using
    a backpropagation neural network. The input parameters in this work included well
    data such as date of completion, well type, sand thickness, flow test values,
    number of stages, fracturing fluid type, total water used, total sand, acid volume,
    injection rate, injection pressure, etc. The output variable used was the maximum
    flow rate after fracture stimulation. Post-fracture well deliverability was forecasted
    by neural networks with very high accuracy. Additionally, neural networks were
    used with genetic algorithms to optimize the fracturing operation and select the
    best candidate for well restimulation.


    The other application of neural networks is in the development of the Surrogate
    Reservoir Model (SRM, recently it is also called "Smart Proxy")—a replica of the
    reservoir simulation models that reproduces simulation results with high accuracy
    and short computation time. SRM can be a good substitute for a reservoir simulation
    model, especially when numerous simulation runs are needed. Risk assessment, uncertainty
    analysis, optimization, and history matching are the typical analyses requiring
    many simulation runs. Amini et al. (Amini et al., 2012) developed an SRM for the
    reservoir simulation model of the CO2 storage site in Australia which included
    100,000 grid blocks. The grid-based SRM was developed by 12 simulation runs to
    generate an inclusive database for the neural network, including well data, static,
    and dynamic data for all grid blocks in the reservoir.


    The Top-Down Model (TDM), invented by Mohaghegh (Mohaghegh et al., 2012), is another
    neural network application that incorporates field measurements such as drilling
    data, well logs, cores, well tests, production history, etc. to build a comprehensive,
    full field reservoir model. Haghighat et al. (Haghighat et al., 2014) analyzed
    the production behavior of 145 wells located in an unconventional asset in Wattenberg
    Field-Niobrara using wells'' static (reservoir properties, well completion information)
    and dynamic data (operational information like days of production per month).


    Apart from the aforementioned applications, neural networks were used in the oil
    and gas industry for drill-bit diagnoses (Arehart, 1990), inversion of seismic
    waveforms (Gunter & Albert, 1992), seismic attribute calibration (Johnston, 1993),
    lithology prediction from well logs (Ford & Kelly, 2001), pitting potential prediction
    (Gartland et al., 1999), reservoir facies classification (Tang, 2008), EOR method
    evaluation and screening (Surguchev & Li, 2000), stuck pipe prediction (Siruvuri
    et al., 2006), assessment of formation damage (Kalam et al., 1996), water flooding
    analysis (Nakutnyy et al., 2008), conductive fracture identification (Thomas &
    La Pointe, 1995), bit bounce detection (Vassallo & Bernasconi, 2004), and calibration
    of quarts transducers (Schultz & Chen, 2003).'

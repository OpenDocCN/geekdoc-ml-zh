- md: "## Model selection\n\nIn the previous section, the grid search was applied\
    \ for just one model to find the hyperparameters that return the best performance\
    \ model. For many pattern recognition, classification, clustering, and regression\
    \ problems, it is possible to use different machine learning algorithms or models.\
    \ The question here is which model and combination of hyperparameters would perform\
    \ the best on a specific data set. In this case, the search space includes different\
    \ learning algorithms (models) and hyperparameters.\n\nFacies classification problem\
    \ would be used to illustrate model selection more clearly. In the facies classification\
    \ problem, logistic regression was used to classify rock types into nine different\
    \ groups. In the previous section, the grid search resulted in the average precision\
    \ for the best logistic regression model as 0.58. This time, in the search space,\
    \ in addition to logistic regression, random forest classifier is also included.\
    \ For random forest classifier, the number of estimators and classifier's maximum\
    \ number of features is the hyperparameters in the search space. For logistic\
    \ regression, \"penalty and regularization strength\" (C) is in the search space.\
    \ The objective here is to discover which learning algorithm and combination of\
    \ hyperparameters returns the best model. Python codes for model selection and\
    \ hyperparameter optimization of facies classification problem is as follows:\n\
    \n```python\nimport numpy as np\nfrom sklearn.linear_model import LogisticRegression\n\
    from sklearn.ensemble import RandomForestClassifier\nfrom sklearn.model_selection\
    \ import GridSearchCV\nfrom sklearn.pipeline import Pipeline\nnp.random.seed(50)\n\
    pipe = Pipeline([(\"clf\", LogisticRegression(solver='liblinear',\n    max_iter=200))])\n\
    \nlog_classifier = {\"clf\": [LogisticRegression(solver='liblinear',\n    max_iter=200)],\n\
    \    \"clf__penalty\": ['l1', 'l2'],\n    \"clf__C\": np.arange(0.1, 100, 20)}\n\
    \nranforest_classifier = {\"clf\": [RandomForestClassifier(random_state=0)],\n\
    \    \"clf__n_estimators\": np.arange(10, 300, 10),\n    \"clf__max_features\"\
    : [1, 2, 3]}\n\ngrid = [ranforest_classifier, log_classifier]\n\ngridsearch_models\
    \ = GridSearchCV(pipe, grid, cv=5, verbose=0,\n    n_jobs=-1)\nBest_modelM = gridsearch_models.fit(x_train,\
    \ y_train)\n\nprint(Best_modelM.best_estimator_.get_params()[\"clf\"])\ny_BM=Best_modelM.predict(x_test)\n\
    from sklearn.metrics import classification_report\nprint(classification_report(y_test,\
    \ y_BM))\n```\n\nPython output:\nRandomForestClassifier(max_features=2, n_estimators=80,\n\
    \    random_state=0)\n\n| | precision | recall | f1-score | support |\n|---|---|---|---|---|\n\
    | 1 | 0.81 | 0.71 | 0.76 | 62 |\n| 2 | 0.71 | 0.78 | 0.74 | 185 |\n| 3 | 0.75\
    \ | 0.73 | 0.74 | 156 |\n| 4 | 0.79 | 0.72 | 0.75 | 46 |\n| 5 | 0.64 | 0.42 |\
    \ 0.51 | 50 |\n| 6 | 0.70 | 0.77 | 0.73 | 113 |\n| 7 | 0.68 | 0.77 | 0.72 | 22\
    \ |\n| 8 | 0.75 | 0.76 | 0.76 | 131 |\n| 9 | 0.95 | 0.91 | 0.93 | 43 |\n| accuracy\
    \ | | | 0.74 | 808 |\n| macro avg | 0.75 | 0.73 | 0.74 | 808 |\n| weighted avg\
    \ | 0.74 | 0.74 | 0.74 | 808 |\n\nClassification report for facies classification\
    \ example using model selection and grid search\n\nFrom grid search results, it\
    \ is observed that the random forest classifier outperforms logistic regression\
    \ in the classification performance of facies classification problem. The best\
    \ model was achieved by setting the number of estimators to 80 and a maximum feature\
    \ of 2. The best model was used to predict different classes on test data set\
    \ and compared with target values. Based on classification report results, the\
    \ weighted average precision for nine classes using random forest classifier is\
    \ 0.74 which is much better than logistic regression.\n\n## Partial dependence\
    \ plots\n\nWhen a machine learning model is trained, and its prediction performance\
    \ is verified with evaluation techniques like cross-validation, it is possible\
    \ to use the model for prediction or sensitivity analysis. It is sometimes required\
    \ to understand what is the impact of one or several input attributes on the target\
    \ value. One way is to create a matrix of all the input attributes and keep the\
    \ value of each attribute equal to average or any other desired value. Then, vary\
    \ the one specific attribute that is required for sensitivity analysis within\
    \ the desired range. Finally, by using the matrix of input data (with one variable\
    \ attribute) and predicting the model response, the dependency between target\
    \ and input attribute can be identified.\n\nIn Python, the interaction between\
    \ the target and an input variable can be visualized by \"partial dependence plots\
    \ (PDPs).\" What PDP does, is to plot the average of the model's outcome over\
    \ multiple combinations of input variables versus a specific input. In order to\
    \ visualize the relationship between the target and two input variables, heat\
    \ map, contour lines, or 3D plots can be used (scikit).\n\nIn Chapter 6, the neural\
    \ network was used to correlate gas EUR to 13 different geology, drilling, and\
    \ completion variables. In this chapter, PDPs are used to find the dependency\
    \ between gas EUR and some important input variables. In Chapter 6, based on feature\
    \ ranking analysis, it was determined that lateral length and proppant loading\
    \ had the highest impact on the EUR. The partial dependence relations for pairs\
    \ of some input variables and gas EUR can be plotted in Python by the following\
    \ code:\n\n```python\nimport numpy as np\nimport pandas as pd\nimport matplotlib.pyplot\
    \ as plt\nfrom sklearn.pipeline import make_pipeline\nfrom sklearn.neural_network\
    \ import MLPRegressor\nfrom sklearn.inspection import partial_dependence\nfrom\
    \ sklearn.inspection import plot_partial_dependence\nfrom sklearn.preprocessing\
    \ import MinMaxScaler\nimport seaborn as sns\ndataset=pd.read_csv('Chapter7_Shale\
    \ Gas Wells.csv')\nX=dataset.iloc[:,0:13]\ny=dataset.iloc[:,13].values\nseed=15\n\
    np.random.seed(seed)\n```"
  mdcn: "## 模型选择\n\n在上一节中，网格搜索仅应用于一个模型，以找到能返回最佳性能模型的超参数。对于许多模式识别、分类、聚类和回归问题，可以使用不同的机器学习算法或模型。这里的问题是，对于特定的数据集，哪种模型和超参数组合的表现最好。在这种情况下，搜索空间包括不同的学习算法（模型）和超参数。\n\
    \n我们将使用相带分类问题来更清晰地说明模型选择。在相带分类问题中，逻辑回归被用于将岩石类型分为九个不同的组。在上一节中，网格搜索得出最佳逻辑回归模型的平均精度为0.58。这一次，在搜索空间中，除了逻辑回归，还包含了随机森林分类器。对于随机森林分类器，估计器的数量和分类器的最大特征数是搜索空间中的超参数。对于逻辑回归，“惩罚项和正则化强度”（C）在搜索空间中。这里的目标是找出哪种学习算法和超参数组合能返回最佳模型。相带分类问题的模型选择和超参数优化的Python代码如下：\n\
    \n```python\nimport numpy as np\nfrom sklearn.linear_model import LogisticRegression\n\
    from sklearn.ensemble import RandomForestClassifier\nfrom sklearn.model_selection\
    \ import GridSearchCV\nfrom sklearn.pipeline import Pipeline\nnp.random.seed(50)\n\
    pipe = Pipeline([(\"clf\", LogisticRegression(solver='liblinear',\n    max_iter=200))])\n\
    \nlog_classifier = {\"clf\": [LogisticRegression(solver='liblinear',\n    max_iter=200)],\n\
    \    \"clf__penalty\": ['l1', 'l2'],\n    \"clf__C\": np.arange(0.1, 100, 20)}\n\
    \nranforest_classifier = {\"clf\": [RandomForestClassifier(random_state=0)],\n\
    \    \"clf__n_estimators\": np.arange(10, 300, 10),\n    \"clf__max_features\"\
    : [1, 2, 3]}\n\ngrid = [ranforest_classifier, log_classifier]\n\ngridsearch_models\
    \ = GridSearchCV(pipe, grid, cv=5, verbose=0,\n    n_jobs=-1)\nBest_modelM = gridsearch_models.fit(x_train,\
    \ y_train)\n\nprint(Best_modelM.best_estimator_.get_params()[\"clf\"])\ny_BM=Best_modelM.predict(x_test)\n\

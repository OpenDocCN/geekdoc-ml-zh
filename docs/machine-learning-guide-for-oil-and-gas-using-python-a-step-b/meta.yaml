- md: '## Chapter 3


    ## Machine learning workflows and types


    ## Introduction


    Before diving into various machine learning (ML) algorithms and types, it is crucial
    to understand typical ML workflows and types. A common ML workflow includes but
    is not limited to: (i) data gathering and integration, (ii) data cleaning which
    includes (a) data visualization, (b) outlier detection and, (c) data imputation,
    (iii) feature ranking/selection, (iv) normalization/standardization, (v) cross-validation,
    (vi) model development, (vii) grid search for parameter fine tuning and optimization,
    and (viii) finally, implementing the trained model. In this chapter, each ML step
    will be discussed in detail to provide a practical workflow that can be applied
    to any ML project. In addition, various types of ML such as supervised, unsupervised,
    semi-supervised, and reinforcement learning will be thoroughly examined. The combination
    of data science knowledge and domain expertise is the key to a successful ML project
    implementation. Unfortunately, the O&G industry has seen many ML projects fail
    due to data scientists and domain experts not properly working together and in
    silos.


    ## Machine learning workflows


    ## Data gathering and integration


    Companies across the globe have different workflows when applying AI and ML projects
    to their problems; however, the goal of this chapter is to provide a practical
    workflow that can be used to tackle any problem. Data gathering and integration
    is one of the most important steps in any ML project. Many ML projects simply
    fail due to lack of data. Therefore, before diving into the project, it is important
    to understand data availability within an organization. If the data are simply
    not available or very challenging to obtain, it is recommended to focus on projects
    with available data and projects that are highly likely to provide tangible results
    that can demonstrate the potential of ML within an organization. If your organization
    is new to the application of AI and ML, it is recommended to find some practical
    use cases, prove the concept with a few projects, and show tangible value associated
    with practical applications of ML and AI. Since data come from many different
    sources, it is imperative for organizations to have a central data warehouse that
    can be relied on. A centralized data warehouse allows everyone within an organization
    to use the same data for different projects. The O&G and other industries must
    move away from using the excel spreadsheets to using a centralized data warehouse
    such as SQL to store all the data. Unfortunately, because of inefficient data
    storage systems, in many companies data scientists have to spend 80% of their
    time collecting the data and only 20% analyzing the data. Wouldn’t it be so powerful
    and rewarding to spend less than 5% of the time obtaining the necessary information
    while spending most of the time analyzing the data and finding out of the box
    problems to apply ML to solve various complex problems? When the data are housed
    in a centralized location, there is no need to visit multiple sources to obtain
    the necessary data to perform ML analysis. If your company is small and privately
    held, it is worthwhile to invest into a data warehouse where data from different
    sources are compiled into one source. The setup might be a lengthy project, but
    will pay off in the long run. Even if your company’s intention is to sell the
    asset and cash out, it is still important to have the data warehouse setup because
    this would be a selling point to any major operator. Data are the new gold and
    whoever has the best system in terms of storing and analyzing data would be the
    most powerful in terms of adding significant financial benefit.


    Before proceeding to data cleaning, it is important to understand the term “data
    center.” A data center is simply a building, multiple buildings, or a dedicated
    space within a building that houses hardware, data storage, servers, computer
    systems, etc., for an organization. There are different varieties of data centers
    as follows:


    - **On-premises data center**, also referred to as on-prem data center, is a group
    of servers owned and controlled privately by an organization. Therefore, there
    is complete control over the hardware. In an on-prem data center, there is an
    upfront capital investment which is one of the biggest disadvantages of this kind
    of data center. The upfront capital investment is used to buy server and networking
    hardware required to set up the data center. In addition, there are ongoing maintenance
    costs associated with maintaining the hardware since they will age and need to
    be maintained/replaced. On-prem data centers are typically found to have limited
    scalability due to the time needed to bring additional servers online. As observed,
    an on-prem data center uses space and power regardless of its usage amount. The
    security of the data center depends entirely on the local IT team. In addition,
    updates are not automatic and rely on the IT team. The main advantage of an on-prem
    data center is that the cost of use is easier to understand (when compared to
    cloud data centers), privacy can be maintained, and there is complete control
    over hardware. An on-prem data center is like buying a house. If anything in the
    purchased house breaks down, it is solely your responsibility to fix and maintain.
    On-prem data centers are typically suited for smaller companies that already have
    a heavy capital investment in IT infrastructure.


    - **Cloud data center:** As opposed to an on-prem data center, in a cloud data
    center, the actual hardware is managed and run by the cloud company in question.
    There are various cloud data center providers such as Amazon Web Services (AWS),
    Microsoft Azure (also known as Azure), and Google Cloud Platform (GCP). As opposed
    to on-prem data center where a heavy amount of capital is invested upfront, there
    is little upfront investment with cloud data centers, and it is a scalable model.
    Cloud data centers require little knowledge and less manpower to get started,
    have a rapid implementation period, have independent platforms, have automatic
    updates, have easy remote access, and the customer pays for what is used. Some
    of the disadvantages are less control over the hardware and operating system,
    complicated cost structure, and closely monitoring privacy and access. Some companies
    are simply not comfortable with giving up too much control with a cloud data center,
    and they like to have full internal control to hardware, data, etc. Please note
    that major cloud providers have extensive security levels since billions of dollars
    are spent every year to ensure customer data privacy. Cloud data center can be
    thought of as renting an apartment where there is no upfront down payment (investment)
    and can be rented immediately. When equipment breaks down, the property management
    company will fix those broken items. Cloud data centers are suitable for most
    organizations of any size.


    - **Hybrid data center:** This is simply a combination of on-prem data center,
    private clouds, or public clouds. Please note that public clouds are offered to
    multiple clients (companies) by a cloud provider while a private cloud is a cloud
    service that is not shared with any other organizations. Note that in public clouds,
    each customer''s data and applications remain hidden from other cloud customers,
    so no data is shared. On a private cloud, the services and infrastructure are
    maintained on a private network. In addition, both hardware and software are dedicated
    to your specific organization.


    ## Cloud vs. edge computing


    After generating the data on an end device, the data can then be traveled to the
    cloud for processing through public internet *or* the data can be processed at
    the site through an edge device. In the case of the second scenario where the
    data are sent to a device that is locally present, the device is referred to as
    an edge device. When the data are processed at the cloud, it is referred to as
    cloud computing. However, when the data are processed at the edge for near real-time
    or real-time data processing, it is referred to as edge computing.



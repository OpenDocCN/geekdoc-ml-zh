    # Deep learning


    As explained in Chapter 1, artificial intelligence (AI) is defined as using computers
    to perform some tasks that are generally handled by human intelligence like learning,
    reasoning, and discovering. Machine learning (ML) is a subset of AI which mainly
    focuses on the algorithms that help the machine to interpret patterns in the data.
    Depending on whether the data are labeled or not, the learning process is supervised
    or unsupervised.'

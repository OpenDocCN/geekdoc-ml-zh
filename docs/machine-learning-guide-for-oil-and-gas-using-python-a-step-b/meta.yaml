    net present value (NPV) per well @ $3/MMBTU gas pricing using the following input
    features:


    +   - Lateral length (ft), stage length (ft), sand to water ratio or SWR (lb/gal),
    sand per ft (lb/ft), water per ft (BBL/ft), estimated ultimate recovery or EUR
    (BCF)



    Poisson''s ratio = $v = \frac{0.5R_v^2 - 1}{R_v^2 - 1}$


    (5.21)


    Formation modulus = $G = 1.34 \times 10^{10} \times \frac{\rho_b}{\Delta t_s^2}$


    where $\rho_b$ is bulk density in g/cc.


    Dynamic Young''s modulus = $E = 2G(1 + v)$


    Minimum horizontal stress = $P_c = \frac{v}{1 - v}(\sigma_v - \alpha P_p) + \alpha
    P_p + \sigma_{tectonic}$


    (5.22)


    where $\sigma_v$ is vertical stress in psi, $\alpha$ is biot''s constant, $P_p$
    is pore pressure in psi, and $\sigma_{tectonic}$ is tectonic stress in psi.


    Now that the concept is clear, let''s go over introducing the data set that will

    and they like to have full internal control to hardware, data, etc. Please note
    that major cloud providers have extensive security levels since billions of dollars
    are spent every year to ensure customer data privacy. Cloud data center can be
    thought of as renting an apartment where there is no upfront down payment (investment)
    and can be rented immediately. When equipment breaks down, the property management
    company will fix those broken items. Cloud data centers are suitable for most
    organizations of any size.


    +   - **Hybrid data center:** This is simply a combination of on-prem data center,
    private clouds, or public clouds. Please note that public clouds are offered to
    multiple clients (companies) by a cloud provider while a private cloud is a cloud
    service that is not shared with any other organizations. Note that in public clouds,
    each customer''s data and applications remain hidden from other cloud customers,
    so no data is shared. On a private cloud, the services and infrastructure are
    maintained on a private network. In addition, both hardware and software are dedicated
    to your specific organization.


    # Cloud vs. edge computing


    After generating the data on an end device, the data can then be traveled to the
    cloud for processing through public internet *or* the data can be processed at
    the site through an edge device. In the case of the second scenario where the
    data are sent to a device that is locally present, the device is referred to as
    an edge device. When the data are processed at the cloud, it is referred to as
    cloud computing. However, when the data are processed at the edge for near real-time
    or real-time data processing, it is referred to as edge computing.'

    Note that the population environment or model can be (a) steady state (incremental)
    or (b) generational. In a steady-state model, a few number of offsprings replace
    the same number of parents. In generational populations, the number of offsprings
    is equal to the population size. In other words, offsprings replace all the previous
    generations or parents.



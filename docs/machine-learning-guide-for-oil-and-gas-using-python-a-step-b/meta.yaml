    \ | -1 |\n| 40 | 65 | 87.846764 | 33.25 | 0 | -0.001817 | -1 |\n| 140 | 57 | 173.381770\
    \ | 4.75 | 1 | -0.014385 | -1 |\n| 162 | 19 | 187.252312 | 4.75 | 1 | -0.008069\
    \ | -1 |\n| 178 | 59 | 214.993395 | 13.30 | 1 | -0.005844 | -1 |\n| 194 | 47 |\

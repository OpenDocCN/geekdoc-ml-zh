  md: '# Biography


    Hoss Belyadi is the founder and CEO of Obser-telligence, LLC, focused on providing
    artificial intelligence (AI) in-house training and solutions. As an adjunct faculty
    member at multiple universities, including West Virginia University, Marietta
    College, and Saint Francis University, Mr. Belyadi taught data analytics, natural
    gas engineering, enhanced oil recovery, and hydraulic fracture stimulation design.
    With over 10 years of experience working in various conventional and unconventional
    reservoirs across the world, he works on diverse machine learning projects and
    holds short courses across various universities, organizations, and the department
    of energy (DOE). Mr. Belyadi is the primary author of *Hydraulic Fracturing in
    Unconventional Reservoirs* (first and second editions) and is the author of *Machine
    Learning Guide for Oil and Gas Using Python*. Hoss earned his BS and MS, both
    in petroleum and natural gas engineering from West Virginia University.


    Dr. Alireza Haghighat is a senior technical advisor and instructor for Engi-neering
    Solutions at IHS Markit, focusing on reservoir/production engineering and data
    analytics. Prior to joining IHS, he was a senior reservoir engineer at Eclipse/Montage
    resources for nearly 5 years. As a reservoir engineer, he was involved in well
    performance evaluation with data analytics, rate transient analysis of unconventional
    assets (Utica and Marcellus), asset development, hydraulic fracture/reservoir
    simulation, DFIT analysis, and reserve evaluation. He was an adjunct faculty at
    Pennsylvania State University (PSU) for 5 years, teaching courses in Petroleum
    Engineering/Energy, Business and Finance departments. Dr. Haghighat has published
    several technical papers and book chapters on machine learning applications in
    smart wells, CO₂ sequestration modeling, and production analysis of unconventional
    reservoirs. He has received his PhD in petroleum and natural gas engineering from
    West Virginia University and a master’s degree in petroleum engineering from Delft
    University of Technology.'

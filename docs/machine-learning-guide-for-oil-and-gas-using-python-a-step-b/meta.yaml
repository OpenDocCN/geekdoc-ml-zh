    # Backpropagation technique


    The objective of the training procedure in neural networks is to adjust the calculated
    weights until the model estimates the output values correctly. The backpropagation
    method requires updating the weights to minimize the error which is the difference
    between network outputs and the target values. These errors are filtered back
    through the network. The backpropagation process includes a feedforward calculation
    to find the initial output, an error'
  merge: -1
  pgno: 300
- img_proc: true
  md: 'calculation that propagates backward into the network, and finally, weight
    adjustments based on the magnitude of errors.


    The "Gradient Descent" method, a popular way to find the minimum of complex functions,
    is used to calculate weight changes. This method finds the steepest path to reach
    the minimum of the function. The steepness is defined as the slope (first derivative)
    of the function which is used to take steps towards the minimum. Therefore, considering
    the error values as a function of the network weights, the gradient descend technique
    is used to minimize the error subject to the weights, by taking steps of the size
    of the error gradient "∂e/∂w". To minimize the error function, the output error
    may be modified by multiplying it by the activation function gradient (Chain Rule).
    Depending on whether the error is positive or negative, the gradient of the activation
    function may move up or down (Fausett, 1993).


    The backpropagation procedure is straightforward for the last or output layer
    because the error can be calculated using the output and target values (e = t_k
    - o_k). In the last layer, to adjust the weights based on error, error gradient
    (δk) at each neuron k of the output layer is calculated by the following formula:


    $$\frac{\partial e_k}{\partial w_k} = \delta_k = (t_k - o_k) \frac{\partial F(O_k)}{\partial
    w_k}$$ (6.6)


    where o_k and t_k are output and target values at neuron k of the output layer
    and F is activation function. If the target value is not available in the hidden
    layer, the weight adjustment parameter can be calculated as follows:


    $$\delta_j = \frac{\partial F(O_j)}{\partial W_j} \sum_{k=1}^{n} w_{jk} \delta_k$$
    (6.7)


    The new weights ($W_{jk}^n$) are then manipulated into the following equation:


    $$w_{jk}^n = w_{jk}^{n-1} + \Delta w_{jk}, \quad \Delta w_{jk} = \alpha.\delta_k$$
    (6.8)


    where α represents the learning rate and takes the value between 0 and 1; this
    value determines the rate of the weight adjustments and learning speed. A small
    value of α causes low learning rates and high values may lead to network instability
    or stuck in local optima. To overcome this problem, "Momentum" term (μ) is recommended.
    It increases step sizes towards the global minimum and bypasses local minima.
    Therefore, new weights can be calculated using the following equation:


    $$\Delta_{j, k}^n = \alpha.\delta_k + \mu.\Delta w_{j, k}^{n-1}$$ (6.9)


    To start the training process, it is necessary to assign initial random values
    to weights. These values can be randomly selected within the range of -1 to 1
    with a uniform probability distribution. However, some specific random'
  merge: -1
  pgno: 301
- img_proc: true
  md: 'weight initialization might be required, depending on the network topology
    and the type of activation function. One common rule for the weight initialization
    of a node with "n" number of incoming links is random sampling in the range of
    $\pm\frac{1}{\sqrt{n}}$ (Rashid, 2016).


    Before the training process, the data set should be prepared to prevent the activation
    function from flattening towards 1 which would make the gradient descend method
    ineffective. This occurs with large input values (Fig. 6.3). To do so, it is recommended
    to scale or normalize all the inputs in the range of 0.01 (instead of zero) and
    1. The same rescaling procedure can also be applied for the output values considering
    range 0–1.


    # Data partitioning


    The main objective of building a neural network model is to use its prediction
    capabilities. It means a model should predict reliable output(s) when it is exposed
    to new data set that was not used during the training phase. To make sure that
    the model''s predictions are reliable, the whole data set would be partitioned
    into three segments consisting of training, test, and validation sets. Training
    data sets are only used for model training, the weight modification procedure
    that was discussed earlier. After training a model, its reliability can be verified
    by using a portion of the data that is new to the network and was not used during
    the training process. This portion of the data, set aside to verify the prediction
    precision (capability) of the model, is called the test set. It is worth mentioning
    that neural network topology and parameters can be tuned (i.e., number of layers,
    nodes per layer, learning rate, etc.) to improve the accuracy of the model on
    the test data set. Therefore, one must measure the accuracy of the model for the
    second time on the portion of the data set that was not seen during training and
    testing. This portion of the data is called the validation set.


    The most commonly used partitioning technique is random sampling. For example,
    it is common to have 70% of data for training, 15% for testing, and 15% for validation.
    There are also some other techniques that use over-sampling that helps to populate
    new data points around low-frequency intervals. If any of the input attributes
    represents nonuniformity, the training data set should contain some data points
    from the less represented intervals. Otherwise, neural networks would not be capable
    of predicting reliable outputs in the range within such low populated intervals.


    The last step of the neural network training process is to decide when to end.
    During neural network training, "Epoch" indicates one complete cycle of the whole
    training process (feedforward calculation, finding errors, and backpropagation).
    In most cases, it is necessary to go through a number of iterations or epochs
    to complete the training process. The main objective'
  merge: -1
  pgno: 302
- img_proc: true
  md: 'during neural network training is to minimize the global error or "Loss Function,"
    defined as follows (this formula is actually Mean Squared Error; MSE):


    $$E = \frac{1}{n} \sum_{i=1}^{n} (t_{ik} - o_{ik})^2$$


    As the number of epochs increases, the error of training and test data sets generally
    decreases. The training process should continue if the error of the test data
    set decreases. When the test error starts increasing and the training error continues
    to decrease, the neural network starts memorizing the training pattern, an activity
    that does not improve the generalization of the model. At this point, it is recommended
    to stop the training process (Fig. 6.4). In some instances, iteration through
    the epochs continues a number of times (i.e., 1000 times) or for a time period
    (i.e., 24 h), depending on computational capacity. At the end, it is important
    to select and memorize the information of the epoch at which the minimum error
    of the test data set is achieved.


    The steps required to train a neural network model are summarized as follows:


    +   1. Normalize or rescale the input and output data

    2. Partition the data into training, validation, and testing

    3. Define the topology of the neural network, describing the number of hidden
    layers, the number on nodes (neurons) per hidden layer, the activation function,
    learning rate, momentum, solver, etc.

    4. Initialize all the weights and bias values


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_303_0.png)


    FIGURE 6.4 Training and validation data set accuracy versus number of iterations.'
  merge: -1
  pgno: 303
- img_proc: true
  md: '+   5. For each node in the hidden layer, calculate the node’s output using
    Formula 6.5 (Formula 6.2, 6.3, and 6.4 can also be used depending on the type
    of activation function) and continue the feedforward process until the final output
    from the output layer is calculated

    6. Calculate the output layer error relative to the actual output and update the
    weights for nodes in the prior layers using Formula 6.6, 6.8, and 6.9.

    7. For the rest of the hidden layers, update the nodes, weights using Formula
    6.7, 6.8 and 6.9

    8. Repeat Step 5 and calculate new output using the updated weights

    9. Calculate the global error using Formula 6.10. Stop the training based on the
    termination criteria (number of epochs or minimum error validation data set)


    # Neural network applications in oil and gas industry


    Neural networks have shown a wide variety of applications in different E&P disciplines,
    but the implementation of neural networks is not recommended if conventional methods
    provide firm solutions. Neural networks have been able to perform accurate analyses
    in large historical data sets that cannot reveal explicit information by conventional
    modeling (Mohaghegh, 2000).


    The early use of neural networks in the oil and gas industry was mostly related
    to reservoir characterization, specifically obtaining porosity, permeability,
    and fluid saturation from well logs. Well logs were generally used as the inputs
    for neural networks while core results such as porosity and permeability were
    considered outputs. It was possible to predict reservoir characteristics using
    well logs when core data were unavailable (Mohaghegh, 2000). Additionally, it
    was possible to train neural networks to generate synthetic magnetic resonance
    logs with conventional wire line logs such as SP, gamma ray, density, and induction
    logs (Mohaghegh et al., 2000).


    Another well-known implication of neural networks is oil and gas PVT property
    estimation. There are many empirical correlations that estimate some PVT properties.
    Gharbi et al. (Gharbi & Elsharkawy, 1997) trained a universal neural network using
    5200 PVT data points gathered from all around the world to predict bubble point
    pressure (Pb) and oil formation volume factor (Bob) as a function of solution
    gas ratio (Rs), gas specific gravity (γg), oil specific gravity (γo), and reservoir
    temperature. The results were more accurate than the existing PVT correlations.


    Neural networks were also used to predict the conditions for wax precipitation
    in the pipelines. One important parameter that determines wax formations is temperature.
    A neural network was trained by Adeyemi et al. (Adeyemi & Sulaimon, 2012) with
    a combination of data including molecular weight, density, and activation energy,
    providing very good estimation for wax appearance temperature (WAT).'

  md: 'with a few projects, and show tangible value associated with practical applications
    of ML and AI. Since data come from many different sources, it is imperative for
    organizations to have a central data warehouse that can be relied on. A centralized
    data warehouse allows everyone within an organization to use the same data for
    different projects. The O&G and other industries must move away from using the
    excel spreadsheets to using a centralized data warehouse such as SQL to store
    all the data. Unfortunately, because of inefficient data storage systems, in many
    companies data scientists have to spend 80% of their time collecting the data
    and only 20% analyzing the data. Wouldn’t it be so powerful and rewarding to spend
    less than 5% of the time obtaining the necessary information while spending most

  md: 'discover the patterns in big data sets. So, the main building blocks of the
    DL are neural network. One of the key parameters that define the structure of
    a neural network is the number of hidden layers that connects input and output
    nodes. The number of hidden layers determines the depth of a neural network. In
    deep neural networks, the number of hidden layers can vary from 5 to hundreds
    or thousands. The other characteristic of a deep neural network is about neurons’
    connectivity. In this chapter, for the theory and example, it was assumed that
    every neuron is connected to all the neurons in the next layer. In deep neural
    networks, it is possible to not have full connectivity between the neurons in
    consecutive layers. Therefore, the architecture of the neural network may change
    by partial neuron/layers connectivity, backward connections, and sharing weights.
    These neural network architectures are covered later in this chapter.


    DL has many applications especially in the fields where enough labeled data are
    available. Speech recognition uses DL in many appliances such as cell-phones to
    recognize voice patterns. Image recognition is another widely used application
    of DL in automotive, gaming, e-commerce, medicine, manufacturing, and education
    industries. Another important usage of DL is in natural language processing (NLP)
    for text classification/extraction/summarization, autocorrection, translation,
    and market intelligence. DL is also used for self-driving cars, fraud detection,
    movie making, and product recommendation systems.


    There are more than 10 types of DL algorithms. Each algorithm can be suitable
    to handle specific applications that were mentioned earlier. The most widely used
    DL algorithms are Convolutional Neural Networks (CNNs), Recurrent Neural Networks
    (RNNs), LSTMs (which is a subset of RNN), Self-Organizing Map (SOM), Autoencoders,
    and Generative Adversarial Networks (GANs). For example, CNNs are incredibly powerful
    in image recognition while RNNs can handle text and speech recognition. In this
    section, the theories for CNN, RNN, and LSTM are explained. Finally, an example
    of using LSTM for predicting hydraulic fracturing treatment pressure is illustrated.


    # Convolutional neural network (CNN)


    CNNs were originally developed to handle image recognition specifically for handwritten
    digits. CNNs work by decomposing the image into three scales from low order to
    high order. In the low order, small details or local features of the image like
    lines, edges, and curves can be extracted by early layers of the neural network.
    Afterward, deeper layers would assemble these features, and final layers reconstruct
    the whole image (Kelleher). The whole process of CNN training for image classification
    includes different operations such as convolution, activation function, pooling,
    and fully connected layers. Each operation is explained in detail below.'
  merge: -1
  pgno: 325
- img_proc: true
  md: '# Convolution


    In the image recognition and classification, the first step is to discretize the
    image into pixels. Each pixel can have a value depending on the shape and the
    color. Let us start with a simple example and discretize a plus sign image into
    7 by 7 pixels. Black pixels can be represented by 1 and white pixels by zero (Fig.
    6.22).


    The convolution operation, the main part of the CNN, applies specific filters
    or kernel functions to a selected region of the image to detect local features.
    In other words, by convolution, it is possible to focus on a specific feature
    of the image at a time by applying specific filters. The filter moves over the
    image to detect specific patterns related to each feature (like line, edge, curve,
    etc.). Where the pattern is found in a selected region, kernel function returns
    large positive values. If a 2D matrix is assigned for each specific filter, the
    convolution operation can be considered as the sum of all elements of the dot
    product between the selected region (a 2D matrix) and the filter. Let us consider
    a 3 by 3 matrix as a filter for line detection. A 3 × 3 matrix with all elements
    in the middle column equaling to 1 is for vertical line detection, and a 3 × 3
    matrix with all elements in the middle row equaling to 1 is for horizontal line
    detection (all the other elements are equal to zero). The filter starts at the
    3 × 3 pixel region at the first column and the first row of the image. The sum
    of all elements of the dot product result is then stored in the first element
    of the feature map which is a 5 × 5 matrix. The filter slides one column to right
    and repeats the same operation until it reaches to the last column. Next, it starts
    all over from the first column and slides one row down and the same process is
    applied. It then produces element 2, 1 of the 5 × 5 feature map. This process
    repeats until the whole image is covered. The convolution process using vertical
    and horizontal line filters is illustrated in Fig. 6.23. Multiple filters (kernel
    functions) can be used to extract a variety of feature map of the image. The array
    of all these feature maps constitutes the convolutional layer of the network.


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_326_0.png)'
  merge: -1
  pgno: 326
- img_proc: true
  md: '![](img/84bb0bcf926cd79dfa24aaffa8e553c8_327_0.png)


    FIGURE 6.23 Image convolution using vertical and horizontal line filters.


    # Activation function


    In most of the pattern recognition practices, the relationship between input and
    output is nonlinear. To capture nonlinear patterns, the activation function, a
    nonlinear transformation is used. Activation functions were discussed in this
    chapter. The most common activation function for CNNs is rectified linear unit
    (ReLU) (Fig. 6.3). After convolution process, ReLu activation function is applied
    to each element of the feature map. As an example, the resultant feature map for
    vertical line feature after applying the ReLu activation function is shown in
    Fig. 6.24. Please note that ReLU function returns zero for any negative value.
    Since there is no negative value in the feature map in this example, applying
    ReLU activation function does not change the initial feature map.


    # Pooling layer


    The next step in the CNN includes pooling, reducing the size of convoluted feature
    maps by extracting the dominant features. This dimensionality reduction of feature
    maps retains important information while reducing required computational power
    especially for processing large images. In pooling operation, a section of the
    image is covered by a filter or kernel'

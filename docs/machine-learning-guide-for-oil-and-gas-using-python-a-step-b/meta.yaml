  md: '# How does K-means clustering work?


    Understanding k-means clustering is actually very simple when broken down into
    the step-by-step procedure. Therefore, let’s go over the step-by-step procedure
    when applying k-means clustering to any data:


    +   1) Standardize the data since similarities between features based on distance
    measures are the key in k-means clustering. Hence, having different scales can
    skew the result in favor of features with larger values.

    2) Determine the number of clusters, using (i) elbow method, (ii) silhouette,
    or (iii) hierarchical clustering. If unsure, write a "for loop" to calculate the
    sum of squared errors versus number of clusters. Afterward, determine the number
    of clusters that will be used.

    3) The initialization of centroids within a data set can be either **initialized**
    randomly or selected purposefully. The default initialization method for most
    open-source ML software including Python’s scikit learn library is random initialization.
    If random initialization does not work, carefully selecting the initial centroids
    could potentially help the model.

    4) Next, find the distance between each data point (instance) and the randomly
    selected (or carefully selected) cluster centroids. Afterward, assign each data
    point to each cluster centroid based on the distance calculations (euclidean is
    commonly used) presented below. For example, if two centroids have been randomly
    selected within a data set, the model will calculate the distance from each data
    point to centroid #1 and #2. In this case, each data point will be clustered under
    either centroid #1 or #2 based on the distance from each data point to randomly
    initialized cluster centroids. There are various ways to calculate the distance.
    This step can be summarized as assigning each data point to each cluster centroid
    based on their distance. The ones closest to centroid #1 will be assigned to centroid
    #1 and the ones closest to centroid #2 will be assigned to centroid #2. The following
    distance functions are commonly used, the most common being the euclidean distance
    function:


    Euclidean distance function = $\sqrt{\sum_{k=1}^{n} (x_{ik} - \mu_{jk})^2}$


    Manhattan distance function = $\sum_{k=1}^{n} |x_{ik} - \mu_{jk}|$ (4.2)


    Minkowsky distance function = $\left( \sum_{k=1}^{n} (|x_{ik} - \mu_{jk}|)^q \right)^{1/q}$


    where assuming each instance has $n$ features, the distance of the $i$th instance
    ($xi$) to centroid of cluster $j$ ($\mu j$) can be calculated. $q$ represents
    the order of the norm. The scenario where $q$ is equal to 1 represents Manhattan
    distance and the case where $q$ is equal to 2 represents Euclidean distance.'

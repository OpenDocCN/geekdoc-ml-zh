    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_8_1.png)


    FIGURE 1.4 Python Fundamentals.


    ## Jupyter Notebook interface options


    To run a line in Jupyter Notebook, the "Run" button or preferably "SHIFT + ENTER"
    can be used. To add a line in Jupyter Notebook, hit "ALT + ENTER" or simply use
    "Insert → Cell Below." "Insert Cell Above can also be used for inserting a cell
    above where the current cell is. To delete a line in Jupyter Notebook, while that
    line is selected, hit "DD" (in other words, hit the "D" word key button twice
    in a row). If at any point when coding, the Jupyter Notebook would like to be
    stopped, select "Kernel → Interrupt" or "Kernel → Restart" to restart the cell.
    "Kernel → Restart and Run All" is another handy tool in Jupyter Notebook that
    can be used to run the whole notebook from top to bottom as opposed to using "SHIFT
    + ENTER" to run each line of code manually which can reduce productivity. Below
    are some of the handy shortcuts that are recommended to be used in Jupyter Notebook:


    - Shift + Enter → Run the current cell, select below

    - Ctrl + Enter → Run selected cells

    - Alt + Enter → Run the current cell, insert below

    - Ctrl + S → Save and checkpoint

    - Enter → Takes you into an edit mode

    - When in command mode "ESC" will get you out of edit mode.

    - H → Shows all shortcuts (use H when in command mode)

    - Up → Select cell above

    - Down → Select cell below

    - Shift + Up → Extends selected cells above (use when in command mode)'
  mdcn: '## 人工智能


    AI、ML、大数据和数据挖掘等术语在不同组织中被混用。因此，在深入探讨各种应用之前，理解每个术语的真实含义至关重要。人工智能（AI）简单来说就是使用机器或计算机智能，而非人类或动物智能。它是计算机科学的一个分支，研究计算机如何模拟人类智能过程，如学习、推理、问题解决和自我修正。创造能够像人类一样工作、反应并模仿认知功能的智能机器，是人工智能的主要目标。人工智能的例子包括电子邮件分类（归类）、智能个人助理（如Siri、Alexa和Google）、自动应答器、流程自动化、安全监控、欺诈检测与预防、模式与图像识别、产品推荐与购买预测、智能搜索、销售、销量与商业预测、广告定向投放、新闻推送个性化、恐怖活动检测、自动驾驶汽车、健康诊断、抵押贷款违约预测、房价预测、智能投顾（自动化投资组合管理）以及虚拟旅行助手。如上所示，人工智能领域在未来数十年内将持续增长，潜力非凡。此外，过去几年对数据科学岗位的需求也呈指数级增长，企业迫切寻找拥有认证大学研究生（最好是博士学位）的计算机科学家、数学家、数据科学家和工程师。


    ## 数据挖掘


    数据挖掘是计算机科学中的一个术语，定义为使用一组不同的技术（如机器学习）从数据库中提取特定信息的过程，这些信息通常是隐藏的、未明确提供给用户的。它也被称为**数据库知识发现（KDD）**。教某人打篮球是机器学习；而利用某人来寻找最佳篮球中锋则是数据挖掘。数据挖掘被机器学习算法用来发现各种线性和非线性关系之间的联系。数据挖掘常用于帮助企业**收集**各方面的数据，例如非生产时间、销售趋势、生产关键绩效指标、钻井数据、完井数据、股市关键指标和信息等。数据挖掘也可用于浏览网站、在线平台和社交媒体，以收集和汇编信息（Belyadi等人，2019）。


    ## 机器学习


    机器学习（ML）是*人工智能*的一个子集。它被定义为使用各种算法教计算机在数据中寻找模式，以用于未来预测和预报，或作为性能优化的质量检查。机器学习使计算机能够在没有明确编程的情况下学习。其中一些模式可能是隐藏的，因此，发现这些隐藏模式可以为任何组织增加显著的股东价值。请注意，数据挖掘处理的是搜索特定信息，而机器学习则专注于执行特定任务。本书第2章将讨论各种类型的机器学习算法。另请注意，深度学习是机器学习的一个子集，它使用多层神经网络用于各种目的，包括但不限于图像和人脸识别、时间序列预测、自动驾驶汽车、语言翻译等。深度学习算法的例子包括卷积神经网络（CNN）和循环神经网络（RNN），它们将在第6章结合各种油气应用进行讨论。


    ## Python速成课程


    在涵盖所有算法以及Python代码的要点之前，理解Python的基础知识至关重要。因此，本章将用于阐述基础知识，然后再深入探讨各种工作流程和示例。


    ## Anaconda简介


    强烈建议下载Anaconda，这是Python数据科学的标准平台，其安装包含了许多必要的库。本书中使用的大多数库已随Anaconda预装，因此无需单独下载。未在Anaconda中预装的库将在各章节中提及。


    ## Anaconda安装


    要安装Anaconda，请访问Anaconda网站（www.anaconda.com）并点击“Get Started”。然后，点击“Download Anaconda
    Installers”，并下载适用于Windows或Mac的最新版本Anaconda。Anaconda发行版将包含超过250个软件包，其中一些将在本书中使用。如果您不下载Anaconda，大多数库必须使用命令提示符窗口单独安装。因此，强烈建议下载Anaconda，以避免下载本书中将使用的大部分库。请注意，虽然安装Anaconda会安装大多数库，但仍有一些库需要使用命令提示符或Anaconda提示符窗口单独安装。对于那些未预装的库，只需从“开始”菜单中打开“Anaconda
    prompt”，然后输入“pip install (库名)”，其中“库名”是要安装的库的名称。Anaconda成功安装后，在开始菜单中搜索“Jupyter
    Notebook”。Jupyter Notebook是一个基于网络的交互式计算笔记本环境。Jupyter Notebook加载迅速、用户友好，并将在本书中全程使用。还有其他用户界面，如Spyder、JupyterLab等。图1.1显示了打开后的Jupyter
    Notebook窗口。只需进入“桌面”并创建一个名为“ML Using Python”的文件夹。然后，进入创建的文件夹（“ML Using Python”），并点击右上角的“New”，如图1.2所示。


    您现在已正式启动了一个新的Jupyter Notebook，并准备好开始编码，如图1.3所示。


    如图1.4所示，左上角表示笔记本为“Untitled”。只需点击“Untitled”并将Jupyter Notebook命名为“Python Fundamentals”。


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_7_0.png)


    图1.1 Jupyter Notebook窗口。


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_7_1.png)


    图1.2 打开新的Jupyter Notebook。


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_8_0.png)


    图1.3 空白的Jupyter Notebook。


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_8_1.png)


    图1.4 Python Fundamentals。


    ## Jupyter Notebook界面选项


    要在Jupyter Notebook中运行一行代码，可以使用“Run”按钮，或者更推荐使用“SHIFT + ENTER”。要在Jupyter Notebook中添加一行，按“ALT
    + ENTER”或直接使用“Insert → Cell Below”。“Insert Cell Above”也可用于在当前单元格上方插入单元格。要删除Jupyter
    Notebook中的一行，在选中该行时，按“DD”（换句话说，连续按两次“D”键）。如果在编码过程中任何时候想要停止Jupyter Notebook，可以选择“Kernel
    → Interrupt”或“Kernel → Restart”来重启单元格。“Kernel → Restart and Run All”是Jupyter Notebook中另一个便捷工具，可用于从头到尾运行整个笔记本，而不是使用“SHIFT
    + ENTER”手动运行每一行代码，后者可能会降低工作效率。以下是一些推荐在Jupyter Notebook中使用的便捷快捷键：


    - Shift + Enter → 运行当前单元格，选择下方单元格

    - Ctrl + Enter → 运行选定的单元格

    - Alt + Enter → 运行当前单元格，在下方插入新单元格

    - Ctrl + S → 保存并创建检查点

    - Enter → 进入编辑模式

    - 在命令模式下按“ESC”可退出编辑模式。

    - H → 显示所有快捷键（在命令模式下使用H）

    - Up → 选择上方单元格

    - Down → 选择下方单元格

    - Shift + Up → 向上扩展选择单元格（在命令模式下使用）'

    \ features to consider when looking for the best split,\" in the scikit-learn\
    \ library. For example, in classification problems, every time there is a split,\
    \ the decision tree algorithm uses the defined number of features using gini or\
    \ information gain. One of the main essences of using \"max_feature\" is to reduce\
    \ overfitting by choosing a lower number of \"max_features.\" Some of the available\
    \ options are \"auto,\" \"sqrt,\" \"log2,\" and the default is \"None\" which\
    \ sets \"max_features\" to number of features. \"auto\" also sets \"max_features\"\
    \ to number of features. \"sqrt\" sets \"max_features\" to square root of number\
    \ of features, and \"log2\" sets \"max_features\" to log2 of number of features.\
    \ If computation time and overfitting are major concerns, consider using \"sqrt\"\
    \ or \"log2.\"\n\nThe next parameter is called \"**ccp_alpha**\" which is used\
    \ for pruning purposes. By default, no pruning will be chosen. Let's define the\
    \ decision tree parameters as shown below:\n\n```\nnp.random.seed(seed)\ndtree=DecisionTreeRegressor(criterion='mse',\
    \ splitter='best',\n    max_depth=None, min_samples_split=4, min_samples_leaf=2,\n\
    \    max_features=None,ccp_alpha=0)\n```\n\nLet's apply \"dtree\" to \"(X_train,y_train)\"\
    \ as follows:\n\n```\ndtree.fit(X_train,y_train)\n```\n\nNow that the model has\
    \ been fit to training inputs and output, let's apply to predict \"X_train\" and\
    \ \"X_test\" as follows. The main reason to apply to \"X_train\" is to be able\
    \ to obtain the training accuracy on the model as well as the testing accuracy.\n\
    \n```\ny_pred_train=dtree.predict(X_train)\ny_pred_test=dtree.predict(X_test)\n\
    ```\n\nNext, let's obtain the training and testing R² as follows:\n\n```\ncorr_train=np.corrcoef(y_train,\
    \ y_pred_train) [0,1]\nprint('Training Data R^2=',round(corr_train**2,4),'R=',\n\
    \    round(corr_train,4))\n**Python output=Training Data R^2=0.975 R=0.9874**\n\
    \ncorr_test=np.corrcoef(y_test, y_pred_test) [0,1]\nprint('Testing Data R^2=',round(corr_test**2,4),'R=',\n\
    \    round(corr_test,4))\n**Python output=Testing Data R^2=0.6833 R=0.8266**\n\
    ```\n\nAs illustrated, the training R² is 97.5%. However, the testing R² is only\

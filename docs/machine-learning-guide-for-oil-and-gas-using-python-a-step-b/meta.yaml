  md: '![](img/84bb0bcf926cd79dfa24aaffa8e553c8_394_0.png)


    which is interpreted as if input x is in fuzzy set C (Premise) then the decision
    to make is in fuzzy set D (Conclusion). In this rule, the sets C and D are fuzzy
    sets defined to characterize linguistic variables for input and output, respectively.
    The first expression is called the premise and the second expression is conclusion
    of the rule. These rules are used to derive conclusions (control systems) based
    on crisp inputs fed into the fuzzy system.


    For a system with N input variables $I_1, \cdots, I_N$ with each input variable
    having $C_1, \cdots, C_N$ different linguistic values, the total number of rules
    that can be derived is $2^{2N-1} \prod_{i=1}^{N} C_i$ where $2^{2N-1}$ accounts
    for different combination of rules (AND, OR) as well as using the fuzzy set or
    its complement (NOT). Note that AND operation in logic is defined as Intersection,
    OR operation is defined as Union, and NOT is defined as Complement which were
    defined in'

    Please note that k-means algorithm''s goal is to select centroids that will lead
    to minimizing "inertia." Another term used in lieu of "inertia" is "within cluster
    sum of squared errors" and it is defined **for cluster** j as follows:


    $$\sum_{i=0}^{n} \min\left(\|x_i - \mu_j\|^2\right)$$ (4.1)


    $x_i$ is referred to as **the ith instance in cluster** j and $\mu_j$ is referred
    to as the mean of the samples **or "centroid" of cluster** j. Inertia essentially
    measures how internally consistent clusters are. Please note that a lower inertia
    number is desired. 0 is optimal; however, in a high-dimensional problem, inertia
    could be high. In those problems, applying PCA prior to k-means clustering could
    alleviate this problem which is often referred to as "curse of dimensionality"
    (Clustering, n.d.).


    After applying k-means clustering, visualization is the key to making sure the
    desired clustering outcome is achieved. Another useful approach in using k-means
    clustering is clustering (labeling) or partitioning the data prior to feeding
    the labeled data as the output of a supervised ML algorithm. This is the semi-supervised
    ML approach that was discussed.'

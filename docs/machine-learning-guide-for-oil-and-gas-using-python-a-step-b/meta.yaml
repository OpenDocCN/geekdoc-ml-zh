    forest (RF), extreme random forest (ERF), gradient boosting (GB), adaptive gradient
    boost (AGB), multi-linear regression (MLR), logistic regression (LR), and KNN.


    # Unsupervised learning


    In this type of ML, only sets of input features ($x_i$) are available and there
    is no associated label. Therefore, existing pattern is sought in the input data.
    The major difference between unsupervised and supervised technique is that in
    unsupervised, there are no output(s) to compare the predictions, while in supervised
    learning, the model predictions could always be compared with actual available
    output(s). Unsupervised learning can potentially reduce labor within an organization
    because unsupervised learning algorithms can be used in place of human efforts
    to filter through large sets of data for clustering purposes. This could lead
    to improving efficiency. Examples of unsupervised ML algorithms are k-means clustering,
    hierarchical clustering, DBSCAN, principal component analysis (PCA), and apriori
    algorithm. An example of using an unsupervised ML algorithm is determining the
    type curve boundaries within a company''s acreage position. E&P companies primarily
    use production performance, geologic features, land, infrastructure, and capacity
    to determine type curve boundaries. All of these important features can simply
    be used as input features into an unsupervised ML model. A clustering algorithm
    can then be applied to cluster the data. After clustering the data, plot the resulting
    clusters for each well based on their latitude and longitude to determine proper
    type curve boundaries for each area of interest. This is an unbiased powerful
    unsupervised technique to provide a realistic view of type curve boundaries and
    regions without using human interference.'

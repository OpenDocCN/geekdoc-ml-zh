  md: "and visualize the clustering outcome. Let's now import agglomerative clustering\
    \ and apply agglomerative clustering to \"df_scaled\" data frame. Under \"AgglomerativeClustering,\"\
    \ number of desired clusters can be accessed with attribute \"n_clusters,\" \"\
    affinity\" returns the metric used to compute the linkage. In this example, euclidean\
    \ distance was selected. The linkage determines which distance to use between\
    \ sets of observation. The \"linkage\" parameter can be set as (i) ward, (ii)\
    \ average, (iii) complete or maximum, and (iv) single.\n\nAccording to scikit-learn\
    \ library, \"ward\" minimizes the variance of the clusters being merged. \"average\"\
    \ uses the average of the distances of each observation of the two sets. \"complete\"\
    \ or \"maximum\" linkage uses the maximum distances between all observations of\
    \ the two sets. \"single\" uses the minimum of the distances between all observations\
    \ of the two sets. The default linkage of \"ward\" was used in this example. After\
    \ defining the hierarchical clustering criteria under \"HC,\" apply \"fit_predict()\"\
    \ to the standardized data set (df_scaled).\n\n```\nfrom sklearn.cluster import\
    \ AgglomerativeClustering\nHC=AgglomerativeClustering(n_clusters=5, affinity='euclidean',\

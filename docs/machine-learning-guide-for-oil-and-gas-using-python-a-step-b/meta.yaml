    。最后，使用 \".input\" 确定输入参数，并通过 \".compute\" 函数确定节流阀控制决策。节流阀尺寸的去模糊化输出为10.1，解释为将节流阀减小10.1%。\n\
    \n为了查看不同输入值的决策值，接下来可以编写一个油管头压力（THP）、流量（q）和固定气液比（GLR）为5 mscf/bbl的三维图代码如下：\n\n```python\n\
    n=50\nTHP_highres=np.linspace(70, 540, n+1)\nq_highres=np.linspace(60, 640, n+1)\n\
    x, y=np.meshgrid(THP_highres, q_highres)\nz=np.zeros_like(x)\n# 循环遍历输入值以计算相应的控制值\n\
    for i in range(n+1):\n    for j in range(n+1):\n        choking.input['THP']=x[i,\
    \ j]\n        choking.input['GLR']=5\n        choking.input['q']=y[i, j]\n   \
    \     choking.compute()\n        z[i, j]=choking.output['choke']\n# 绘制三维图\nimport\
    \ matplotlib.pyplot as plt\nfrom mpl_toolkits.mplot3d import Axes3D\nfig=plt.figure(figsize=(8,\
    \ 10))\nax=fig.add_subplot(111, projection='3d')\nsurf=ax.plot_surface(x, y, z,\
    \ cmap='YlGnBu', linewidth=0.5)\nfig.colorbar(surf, ax=ax, shrink=0.3, aspect=5)\n\
    ax.set_xlabel('THP (psi)')\nax.set_ylabel('q (bbl/d)')\nax.set_zlabel('Choke Adjustment\
    \ (-%)')\nPython 输出=图 8.25\n```\n\n图 8.25 中的三维图显示了在气液比恒定的情况下，当流量和油管头压力在其范围内变化时，应采取何种控制动作来改变节流阀。对于流量低于300桶/天且油管头压力低于250\
    \ psi的条件，节流阀应最多增加10%。对于流量高于300桶/天且油管头压力高于250 psi的条件，节流阀尺寸应最多减小20%。\n\n## 模糊C均值聚类\n\
    \n在属于无监督学习范畴的聚类问题中，目标是将数据集划分为若干类别，使得每个类别中的样本彼此相似，而与其他类别中的样本相比差异较大。第4章讨论了不同的聚类技术。本节将解释模糊逻辑在无监督聚类问题中的应用。为了了解模糊逻辑如何在聚类算法中使用，让我们快速回顾一下第4章的K均值聚类。\n\
    \n412 使用Python的油气机器学习指南\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_410_0.png)\n\
    \n图 8.25 THP和q范围的三维节流阀调整决策值。\n\n在K均值聚类中，首先设定聚类数量，然后为每个聚类分配随机质心。之后，计算数据点与质心之间的距离（即欧几里得距离）。根据数据点到类别质心的最小距离，将其分配到各个类别。计算每个类别的新质心，然后根据新计算的到每个类别质心的距离，将数据点重新分配到各个类别。这些步骤（计算新质心、计算距离、将数据重新分配到各个类别）重复进行，直到质心与上一步相同（收敛）。在这种技术中，每个数据点仅根据其到类别质心的最小距离属于一个类别。在模糊聚类（也称为“模糊c均值”聚类）中，通过计算每个数据点到类别中心的隶属度，每个数据点可以属于多个类别。\n\
    \n为了理解模糊c均值聚类的工作原理，假设 $X = \\{x_1, x_2, \\cdots, x_n\\}$ 是数据集空间。每个数据点有m个属性，因此\
    \ $x_i$ 可以定义为一个属性向量 $x_i = (x_{i1}, x_{i2}, \\cdots, x_{im})$。该空间是m维的。因此，$x_{ij}$\
    \ 可以视为第 $i$ 个数据点的第 $j$ 个属性。假设数据集中有c个聚类，因此聚类集合定义为 $C = \\{C_1, C_2, \\cdots, C_c\\\
    }$。对于C空间中的每个聚类，确定一个属于V空间的质心v，V空间定义为 $V = \\{v_1, v_2, \\cdots, v_c\\}$。由于数据集是m维的，每个质心有m个属性，即\
    \ $v_i = (v_{i1}, v_{i2}, \\cdots, v_{im})$。对于每个数据点，可以使用公式 (8.28) 确定其对每个类别的隶属度（$u_{ik}$）。由于有n个数据点和c个聚类，形成一个模糊划分矩阵\
    \ $U = (u_{ik})_{(n \\times c)}$，其中 $u_{ik}$ 是第 $i^{th}$ 个数据点对第 $k^{th}$ 个聚类的隶属度，且\
    \ $\\sum_{k=1}^{c} u_{ik} = 1$。模糊c均值聚类算法的最终目标是最小化目标函数 $J_h(U, V)$，该函数是每个数据点到每个类别质心的加权距离的二次和（Ren\
    \ et al., 2016）：\n\n$$J_h(U, V) = \\sum_{k=1}^{c} \\sum_{i=1}^{n} u_{ik}^f d_{ik}^2\
    \ \\quad (8.27)$$\n\n在公式 (8.27) 中，$d_{ik}$ 是第 $ith$ 个数据点与第 $kth$ 个类别质心之间的欧几里得距离，f\
    \ 是类别模糊指数。随着f的增加，预期会看到更模糊的隶属度。通常，f应在1.5–2.5的范围内，通常假设为2。模糊c均值聚类是一个迭代过程，从随机初始化隶属度开始，更新质心和隶属度，直到满足目标函数的最小化标准。在每次迭代中，使用公式\
    \ (8.28) 和 (8.29) 计算并更新隶属度值（$u_{ik}$）和质心（$v_k$）：\n\n$$u_{ik} = \\frac{1}{\\sum_{j=1}^{c}\
    \ \\left( \\frac{d_{ik}}{d_{jk}} \\right)^{2/(f-1)}} \\quad (8.28)$$\n\n$$v_k\
    \ = \\frac{\\sum_{i=1}^{n} u_{ik}^f x_i}{\\sum_{i=1}^{n} u_{ik}^f} \\quad (8.29)$$\n\
    \n模糊c均值聚类算法通过以下步骤的迭代过程工作：\n\n1.  初始化类别数量（c）、模糊指数（f）、最大迭代次数（$I_{max}$）和误差阈值（e）。\n\
    2.  随机初始化模糊隶属度矩阵 $U^{(0)}$。\n3.  在步骤t，通过公式 (8.29) 确定类别质心（$V^{(t)}$）。\n4.  通过公式\
    \ (8.27) 计算目标函数（$J_h^t$）。如果 $J_h^t - J_h^{t-1} < e$ 且 t 小于最大迭代次数（Imax），则停止算法；否则，重复步骤2、3和4。\n\
    \n模糊c均值聚类是一种计算成本低、运行速度快的简单算法。然而，与其他聚类技术类似，它可能受到以下事实的影响：模糊隶属度矩阵的初始化、聚类数量的初始化、噪声和异常值的存在可能会影响最终结果。"

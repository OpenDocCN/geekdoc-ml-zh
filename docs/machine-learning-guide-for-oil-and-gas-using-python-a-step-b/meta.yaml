  md: '# Chapter 7


    # Model evaluation


    The main objective of machine learning is to build models that can find patterns
    in the data. These data-driven models are generally trained to deal with clustering
    or regression problems. The quality of a model can be assessed by their prediction
    accuracy when given new (unseen) data. In order to improve the quality or prediction
    performance of a model, first, it is necessary to define evaluation metrics and
    scoring systems. Then, these metrics in conjunction with an evaluation method
    can be used to pick the best strategies to improve model quality. Some model enhancement
    techniques include but are not limited to (i) hyperparameter optimization for
    a specific model, (ii) training different models, and, (iii) finally, changing
    the percentage of the train and test portions during data partitioning. In this
    chapter, evaluation metrics and techniques will be covered. Then, the best model
    selection methods are discussed. Finally, some model handling practices in Python
    such as model saving/loading are covered. All of these methods will be applied
    to oil and gas-related problems.


    # Evaluation metrics and scoring


    There are different evaluation metrics that assess the performance of machine
    learning models. Binary classification, multinomial classification, and regression
    are the main learning techniques to be evaluated with specific metrics in this
    chapter. Some examples of the most widely used evaluation metrics for supervised
    classification problems are precision, accuracy, recall, F1 score, and confusion
    matrix. For unsupervised clustering problems, a silhouette score is recommended.
    Mean square error (MSE) and R² are the metrics that are mostly applied for regression
    models (e.g., neural networks). "Prediction of sand production," "rock typing,"
    and "PVT estimation" are three examples that would be used for model evaluation
    in this chapter.


    # Binary classification: prediction of sand production


    Sand production is one of the problems that many operators have been dealing with.
    Sand production can occur based on high flow rates, stress regime, rock geomechanical
    properties, and completion design. The prediction of sand production is very important
    since it helps production engineers to come up'

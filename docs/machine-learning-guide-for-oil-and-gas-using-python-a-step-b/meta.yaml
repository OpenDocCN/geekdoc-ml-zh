    TABLE 5.1 Oil and natural gas price categories (KNN example).


    | Oil price ($/BBL) | Natural gas price ($/MMBTU) | Category |

    | :--- | :--- | :--- |

    | 90 | 4 | Strong |

    | 40 | 2 | Poor |

    | 60 | 3 | Strong |

    | 80 | 3.5 | Strong |

    | 35 | 1.5 | Poor |


    +   2) Use a distance function such as euclidean to calculate the distance between
    each instance and all training samples.

    3) Next rank the distance from lowest to highest. Afterward, choose the nearest
    neighbor(s) based on the number of nearest neighbors (K) that was selected in
    step 1. In other words, choose K neighbors with the lowest distance.

    4) Obtain the category (classification) or numeric value (regression) of the nearest
    neighbors obtained in step 3.

    5) Use average (in regression problems) or majority (in classification problems)
    of the nearest neighbors to predict a value or a class of an instance.


    To illustrate this, let''s go through a step-by-step KNN classification example.
    The following two features (oil price and gas price) belong to two categories
    of "Poor" and "Strong." Use 3 nearest neighbors (K=3) and euclidean distance calculation
    to classify whether point (20, 2.2) would be classified under "Poor" or "Strong"
    in Table 5.1. In other words, which category would an oil price of $20/BBL and
    a natural gas price of $2.2/MMBTU fall under.


    Step 1) Calculate the euclidean distance between each row and the given points
    (20,2.2) as follows:


    ```

    Euclidean distance between (90, 4) and (20, 2.2)

    = √((90 - 20)² + (4 - 2.2)²) = 70.02


    Euclidean distance between (40, 2) and (20, 2.2)

    = √((40 - 20)² + (2 - 2.2)²) = 20.00


    Euclidean distance between (60, 3) and (20, 2.2)

    = √((60 - 20)² + (3 - 2.2)²) = 40.01


    Euclidean distance between (80, 3.5) and (20, 2.2)

    = √((80 - 20)² + (3.5 - 2.2)²) = 60.01


    Euclidean distance between (35, 1.5) and (20, 2.2)

    = √((35 - 20)² + (1.5 - 2.2)²) = 15.02

    ```'

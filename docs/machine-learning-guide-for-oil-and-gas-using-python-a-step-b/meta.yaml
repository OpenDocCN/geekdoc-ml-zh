    balance between coupling the fittest solutions and maintaining the diversity (covering
    the whole space of solutions) in the selection to prevent premature convergence
    and getting stuck in local optima. There are various parent selection methods
    such as Roulette wheel, Boltzmann, Tournament, Rank, Steady-state, and Random
    selection.


    Roulette wheel selection is considered a Fitness Proportionate Selection method
    that is widely used in genetic algorithms. In this method, a probability is assigned
    to each solution proportional to its fitness value. Solutions with higher probability
    have a better chance to be selected for mating and reproduction. To understand
    Roulette wheel selection, let''s assume a circular wheel that is divided into
    n portions equal to the number of solutions in the population. Solutions, fitness
    values, and Roulette wheel (pie chart) are shown in Table 9.1 and Fig. 9.5. Higher
    fitness values result in a larger portion sizes.


    In order to select a solution as a parent, the wheel rotates. At the end of the
    rotation, the portion of the wheel which is in front of the selection point is
    chosen as the first parent. The chance of election is proportional to the size
    of each portion or the fitness value. To select the next parent, the first selected
    parent could be removed from the population. The wheel rotates again, and at the
    next stop, the one in front of the selection point is selected. It is possible
    to have two selection points. Therefore, two parents can be selected at each wheel
    spin. The detail of the Roulette wheel selection method will be explained in an
    example.'

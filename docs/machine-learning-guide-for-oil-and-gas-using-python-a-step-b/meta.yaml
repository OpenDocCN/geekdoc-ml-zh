    \ R2_Cross-validation scores: {}\".\n    format(scores_R2.mean()))\nPython output=Average\
    \ R2_Cross-validation scores:\n0.6302954016341682\n```\n\nAs illustrated, first\
    \ import \"cross_val_score\" library from \"sklearn.model_selection.\" Next, use\
    \ \"dtree\" as the model, x and y as input and output variables, cv or cross-validation\

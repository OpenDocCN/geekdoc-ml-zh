    for computer scientists, mathematicians, data scientists, and engineers that have
    postgraduate and preferably PhD degrees from accredited universities.


    # Data mining


    Data mining is a terminology used in computer science and is defined as the process
    of extracting specific information from a database that was hidden and not explicitly
    available for the user, using a set of different techniques such as ML. It is
    also called **knowledge discovery in databases (KDD)**. Teaching someone how to
    play basketball is ML; however, using someone to find the best basketball centers
    is data mining. Data mining is used by ML algorithms to find links between various
    linear and nonlinear relationships. Data mining is often used to help **collect
    data** on various aspects of the business such as nonproductive time, sales trend,
    production key performance indicators, drilling data, completions data, stock
    market key indicators and information, etc. Data mining can also be used to go
    through websites, online platforms, and social media to collect and compile information
    (Belyadi et al., 2019).'

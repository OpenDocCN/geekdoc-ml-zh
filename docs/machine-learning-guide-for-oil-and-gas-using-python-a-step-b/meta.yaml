    that can be used is referred to as F1 score because it considers both false positive
    and false negative. F1 score is also beneficial when a balance between precision
    and recall is desired. The equation for F1 score is as follows:


    $$F_{1,score} = 2 \frac{Precision \times recall}{Precision + recall}$$



    Next, let''s import the logistic regression library and call it "lr." There are
    some hyperparameters that can be optimized when using a logistic regression algorithm
    and they are as follows:


    +   - The solver options that scikit-learn offers in logistic regression are "newton-cg,"
    "lbfgs," "liblinear," "sag," "saga."


    newton-cg is a Newton method which uses a Hessian matrix. Hessian matrix was developed
    by the German mathematician named Ludwig Otto Hesse in the 19th century which
    uses a square matrix of second-order partial derivatives of a scalar-valued function.
    Please note that since second derivative is calculated in this method, this solver
    can be slow for large data sets.


    The next frequently used algorithm which is the default algorithm in scikit-learn
    0.22.0 is called **lbfgs**. lbfgs stands for limited-memory Broyden–Fletcher–Goldfarb–Shanno.
    lbfgs is an iterative method for solving unconstrained nonlinear optimization
    problems which approximates the second derivative matrix updates with gradient
    evaluations. It is referred to as a short-term memory because it only stores the
    last few updates (Avriel, 2003).


    "liblinear" uses a coordinate descent algorithm which is based on minimizing a
    coordinate directions of a function in a loop. This solver performs well with
    high-dimensional data (Wright, 2015).


    "sag" is stochastic average gradient descent (will be discussed in detail). "saga"
    is an extension of "sag" that allows for L1 regularization (discussed below).
    Please note that "sag" and "saga" are faster for larger data sets.


    As previously discussed, when a model is memorized and specifically tailored for
    a particular training set without having the capability to predict accurately
    when applied to a test or blind set, it is referred to as overfitting. Overfitting
    essentially means the model is not generalized to predict a test or bind set with
    high accuracy, and it is considered to be a major challenge when developing a
    ML model. Therefore, regularization is used to avoid overfitting. Regularization
    is the process of introducing additional fine-tuning parameters in an attempt
    to prevent overfitting. There are different techniques to avoid overfitting and
    some of the commonly used techniques are regularization, cross-validation, and
    drop out.


    Regularization is simply the process of reducing complexity in a model. Reducing
    a model complexity can be done by penalizing the loss function.'

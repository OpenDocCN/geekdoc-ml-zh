    # Matplotlib library


    Matplotlib is one of the most important and common visualization libraries in
    Python. It provides great flexibility when plotting any aspect of a figure. This
    library was designed to have a similar user interaction as Matlab''s graphical
    plotting. One of the main advantages of this library is that it is versatile,
    and anything can be plotted. However, it might be challenging to do more complex
    plots. Those complex plots will require more coding. Please refer to Matplotlib''s
    website if some more complex plots that have not been covered in this chapter
    would like to be explored (Matplotlib''s website: https://matplotlib.org/tutorials/introductory/sample_plots.html).
    Please note that matplotlib creates static image files such as JPEG or PNG files
    and does not change once created.


    To start creating some plots, let''s import pandas, numpy, and matplotlib libraries.
    "%matplotlib inline" is also added (only in Jupyter Notebook), so all the plots
    are shown within Jupyter Notebook. Variables x and y can also be created as follows:



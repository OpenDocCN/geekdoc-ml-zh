    # Density-based spatial clustering of applications with noise (DBSCAN)


    DBSCAN is a density-based clustering algorithm in which the data points are partitioned
    into high-density regions separated by low-density regions. This algorithm is
    proposed by Martin Ester, Hans-Peter Kriegel, Jörg Sander, and Xiaowei Xu in 1996
    (Ester et al., 1996, pp. 226–231). The main reasons for using this algorithm are
    as follows:


    +   - Clusters with arbitrary shapes can be detected

    - DBSCAN is very efficient for very large data sets


    In DBSCAN, density of each instance is measured based on the number of samples
    within a specific radius (ε) of that instance. Each circle with radius epsilon
    (ε) has minimum number of data points. DBSCAN is defined by **two parameters**:
    (i) epsilon (ε) and (ii) MinPts. Parameter ε specifies the radius of the circle
    and how close observations (points) must be from one another to be considered
    as part of the same cluster. MinPts is defined as the **minimum** number of observations
    (neighbors) that should be within the radius of a data point to be considered
    as a core point. As illustrated in Fig. 4.22, there are three main classifications
    of a point as follows:


    +   - **Core point**: a core point specifies a dense area. A core point must have
    at least MinPts number of neighboring samples within radius ε from it (Al-Fuqaha,
    n.d.).

    - **Border point**: a border point has fewer than a specified number of points
    (MinPts) within epsilon but it is in the neighborhood of a core point.

    - **Noise point**: a noise point is a point that is neither a core point nor a
    border point.


    One of the biggest advantages of DBSCAN is that noise points can be removed and
    each point is not assigned to a cluster (unlike k-means clustering).'

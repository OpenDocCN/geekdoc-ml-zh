    \ f1-score | support |\n|---|---|---|---|---|\n| 1 | 0.60 | 0.58 | 0.59 | 62 |\n\
    | 2 | 0.59 | 0.68 | 0.63 | 185 |\n| 3 | 0.66 | 0.56 | 0.60 | 156 |\n| 4 | 0.56\

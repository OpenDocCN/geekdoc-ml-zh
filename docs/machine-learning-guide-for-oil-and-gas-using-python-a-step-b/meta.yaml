- md: "Pair plots for the Shale Gas Wells data set are shown in Fig. 6.7. Since there\
    \ are 14 variables (13 attributes and 1 target), pair plots include 14×14 plots.\
    \ On the diagonal, a histogram on each corresponding variable demonstrates the\
    \ distribution of each input feature. Scatter plots show the relationship between\
    \ each of the two variables. By using cross plots, correlated attributes can be\
    \ determined. It is extremely important to remove collinear input parameters from\
    \ the model since those parameters provide the same info. Therefore, to enhance\
    \ the training performance, removing the collinear parameters is recommended.\
    \ Moreover, the overall relationship between target (EUR) and other attributes\
    \ can be visualized. For example, in Fig. 6.7, the relationship between lateral\
    \ length and EUR can be clearly seen. On the other hand, there is no significant\
    \ relationship between EUR and Dip.\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_309_0.png)\n\
    \nFIGURE 6.7 Pair plots for Shale Gas Wells.\n\nThe first technique to calculate\
    \ correlations between EUR and all the attributes is called \"Spearman's rank\
    \ correlation.\" This is a nonparametric measurement that shows how two variables\
    \ are statistically dependent in a monotonic way (increasing or decreasing trends).\
    \ In this method, Spearman's correlation coefficient or ρ is calculated to measure\
    \ the degree of influence between two variables. ρ is between −1 and 1. As ρ gets\
    \ closer to 1 or -1, the two variables become heavily correlated. Positive ρ values\
    \ show increasing trend and negative ρ values show decreasing trends between values.\
    \ \"Spearmanr\" in \"stats\" library of Python returns a covariance or ρ matrix\
    \ and P-value matrix (P-value is a hypothesis test to see whether a pair of variables\
    \ are correlated). ρ matrix includes correlation coefficients between each pair\
    \ of variables. Spearman technique can be used to rank the features impacting\
    \ EUR in the Shale Gas Wells data set using the following lines of code:\n\n```\n\
    from scipy import stats\nimport matplotlib.pyplot as plt\ndatanorm=sc.fit_transform(dataset)\n\
    stats.spearmanr(dataset)\nrho, pval=stats.spearmanr(datanorm)\ncorr=pd.Series(rho[:13,13],\
    \ index=X.columns)\ncorr.plot(kind='barh')\nplt.show()\nPython output=Fig. 6.8\n\
    ```\n\nPlease note that \"rho\" is a 14×14 matrix representing correlation coefficients\
    \ between each pair of variables. To find the relationship between EURs and other\
    \ attributes, one can use a bar plot of the ρ values at the last column of rho\
    \ matrix (rho[:13,13]) versus column headers (X.columns). Feature importance of\
    \ the Shale Gas Wells using \"Spearman's rank correlation\" is shown in Fig. 6.8.\n\
    \n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_310_0.png)\n\nFIGURE 6.8 Feature ranking\
    \ for Shale Gas Wells using Spearman's rank correlation.\n\nFig. 6.8 shows that\
    \ stage spacing, water saturation, and percentage of linear gel (LG) have a negative\
    \ impact on EUR. If those parameters increase, EUR will decrease. Other attributes\
    \ show a positive correlation with EUR. By observing the magnitude of the correlation\
    \ coefficient, it is evident that Proppant loading, lateral length, stage spacing,\
    \ water saturation, and percentage of LG have the highest impact on EUR.\n\nThe\
    \ second technique that can be used for feature ranking is the \"random forest\"\
    \ model (which was discussed in detail in chapter 5). This method works based\
    \ on dividing the data into subsets—at each level of decision tree—with respect\
    \ to the attributes with a minimum variance estimator as the main objective (minimum\
    \ entropy for categorical data). To alleviate the high variance and overfitting\
    \ of a single decision tree, random forest injects randomness by creating multiple\
    \ trees and an average estimator. Consequently, the amount of variance reduction\
    \ at each level of the tree (based on different attributes' values) can be an\
    \ index of the importance of that attribute. Let's call \"RandomForestRegressor\"\
    \ from \"sklearn\" to see which attributes contribute more to gas production or\
    \ EUR. In this example, the maximum depth of each tree is assumed to be 10 and\
    \ the rest of the parameters for RandomForestRegressor are set as the sklearn\
    \ default values. Note that scaling and normalization can affect the correlation\
    \ between different features and should be avoided for random forest data.\n\n\
    ```\nimport matplotlib.pyplot as plt\nfrom sklearn.ensemble import RandomForestRegressor\n\
    model=RandomForestRegressor(max_depth=10, random_state=0)\nmodel.fit(X,y)\nfeat_importances=pd.Series(model.feature_importances_,\n\
    \    index=X.columns)\nfeat_importances.nlargest(13).plot(kind='barh')\nplt.show()\n\
    Python output=Fig. 6.9\n```\n\nFeature importance of the Shale Gas Wells is shown\
    \ in Fig. 6.9. For this particular data set, it appears that drilling and completion\
    \ parameters contribute more to production when compared to geologic parameters.\
    \ As shown, lateral length has the highest impact. Next, the amount of proppant\
    \ loading per ft showed the second-highest degree of influence on EUR. The only\
    \ geological parameter with any sort of importance is formation Thickness. On\
    \ the other side, porosity, Dip, and liquid per foot (bbl/ft) represent the lowest\

    \ find the distance between each data point (instance) and the randomly selected\
    \ (or carefully selected) cluster centroids. Afterward, assign each data point\
    \ to each cluster centroid based on the distance calculations (euclidean is commonly\
    \ used) presented below. For example, if two centroids have been randomly selected\
    \ within a data set, the model will calculate the distance from each data point\
    \ to centroid #1 and #2. In this case, each data point will be clustered under\
    \ either centroid #1 or #2 based on the distance from each data point to randomly\
    \ initialized cluster centroids. There are various ways to calculate the distance.\
    \ This step can be summarized as assigning each data point to each cluster centroid\
    \ based on their distance. The ones closest to centroid #1 will be assigned to\
    \ centroid #1 and the ones closest to centroid #2 will be assigned to centroid\
    \ #2. The following distance functions are commonly used, the most common being\
    \ the euclidean distance function:\n\n    Euclidean distance function = $\\sqrt{\\\

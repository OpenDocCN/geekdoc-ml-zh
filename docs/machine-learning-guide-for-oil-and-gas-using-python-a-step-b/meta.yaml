- md: "## Chapter 7\n\n## Model evaluation\n\nThe main objective of machine learning\
    \ is to build models that can find patterns in the data. These data-driven models\
    \ are generally trained to deal with clustering or regression problems. The quality\
    \ of a model can be assessed by their prediction accuracy when given new (unseen)\
    \ data. In order to improve the quality or prediction performance of a model,\
    \ first, it is necessary to define evaluation metrics and scoring systems. Then,\
    \ these metrics in conjunction with an evaluation method can be used to pick the\
    \ best strategies to improve model quality. Some model enhancement techniques\
    \ include but are not limited to (i) hyperparameter optimization for a specific\
    \ model, (ii) training different models, and, (iii) finally, changing the percentage\
    \ of the train and test portions during data partitioning. In this chapter, evaluation\
    \ metrics and techniques will be covered. Then, the best model selection methods\
    \ are discussed. Finally, some model handling practices in Python such as model\
    \ saving/loading are covered. All of these methods will be applied to oil and\
    \ gas-related problems.\n\n## Evaluation metrics and scoring\n\nThere are different\
    \ evaluation metrics that assess the performance of machine learning models. Binary\
    \ classification, multinomial classification, and regression are the main learning\
    \ techniques to be evaluated with specific metrics in this chapter. Some examples\
    \ of the most widely used evaluation metrics for supervised classification problems\
    \ are precision, accuracy, recall, F1 score, and confusion matrix. For unsupervised\
    \ clustering problems, a silhouette score is recommended. Mean square error (MSE)\
    \ and R² are the metrics that are mostly applied for regression models (e.g.,\
    \ neural networks). \"Prediction of sand production,\" \"rock typing,\" and \"\
    PVT estimation\" are three examples that would be used for model evaluation in\
    \ this chapter.\n\n## Binary classification: prediction of sand production\n\n\
    Sand production is one of the problems that many operators have been dealing with.\
    \ Sand production can occur based on high flow rates, stress regime, rock geomechanical\
    \ properties, and completion design. The prediction of sand production is very\
    \ important since it helps production engineers to come up with sand control strategies.\
    \ Based on actual data for the wells that experienced sand production, it is possible\
    \ to train a binary classifier model that predicts whether sand production occurs\
    \ for a well. In the sand production prediction example, a data set that includes\
    \ 29 wells from the Northern Adriatic basin (Moricca et al., 1994; Gharagheizi\
    \ et al., 2017) was used. Sand production data set consists of attributes in Table\
    \ 7.1.\n\n**TABLE 7.1 Well attributes in Sand Production Data Set.**\n\n| Symbol\
    \ | Definition | Symbol | Definition |\n| :--- | :--- | :--- | :--- |\n| TVD |\
    \ True vertical depth | BHFP | Bottom-hole flowing pressure |\n| TT | Transmit\
    \ time | DD | Drawdown pressure |\n| COH | Cohesive strength of formation | EOVS\
    \ | Effective overburden stress |\n| Qg | Gas flow rate | SPF | Shots per foot\
    \ |\n| Qw | Water flow rate | Hperf | Perforation interval |\n\nThe target variable\
    \ in this example is sand production which is considered to be 1 if sand production\
    \ occurred and 0 if sand was not produced from a well. Data set \"Sand production\"\
    \ can be found in the following link: https://www.elsevier.com/books-and-journals/book-companion/9780128219294.\
    \ Data loading and descriptive statistics are done by the following codes:\n\n\
    ```\n#data loading and descriptive statistics\nimport pandas as pd\ndataset=pd.read_csv('Chapter7_Sand\
    \ Production.CSV')\nprint(dataset.describe())\nPython output=Fig. 7.1\n```\n\n\
    The descriptive statistics of the data are shown in Fig. 7.1. Out of 29 wells,\
    \ sand production was observed in 21 wells. Since data attributes have different\
    \ ranges, it is recommended to scale the data between 0 and 1 for the learning\
    \ process (data set can also be standardized; the proper data transformation can\
    \ be determined by the performance of the model which will be explained in this\
    \ chapter). It is possible to perform feature ranking techniques mentioned in\
    \ Chapter 6 like Spearman’s rank correlation or random forest to see which attributes\
    \ play an important role in sand production. In this section, the objective is\
    \ to compare different evaluation metrics for a binary classification problem.\
    \ \"K-nearest neighbors\" (KNN) algorithm would be used to train a model that\
    \ predicts which well will produce sand. For the training process and more importantly\
    \ model evaluation, data should be partitioned into train and test segments. Data\
    \ scaling, partitioning, and training KNN model can be done with the following\
    \ codes.\n\n```\n# Define input(x) and target(y)\nx=dataset.iloc[:,1:11]\ny=dataset.iloc[:,11].values\n\
    # Scale input data between 0 and 1\nfrom sklearn.preprocessing import MinMaxScaler\n\
    sc=MinMaxScaler()\nxnorm=pd.DataFrame(data=sc.fit_transform(x))\n# Partition data\
    \ into test and train\nimport numpy as np\nseed=50\nnp.random.seed(seed)\nfrom\
    \ sklearn.model_selection import train_test_split\nx_train, x_test, y_train, y_test=train_test_split(xnorm,\n\
    \    y, test_size=0.3)\n# Train binary classifier (k-neighbor) and predict on\
    \ train and test data\n# set\nfrom sklearn.neighbors import KNeighborsClassifier\n\
    KNC=KNeighborsClassifier(n_neighbors=3,leaf_size=3)\nKNC.fit(x_train,y_train)\n\
    y_train_predict=KNC.predict(x_train)\ny_test_predict=KNC.predict(x_test)\n```\n\
    \nThe first evaluation metric is \"accuracy,\" defined as the ratio of correct\
    \ prediction to total prediction. The results of the trained KNN model prediction\
    \ for the test data set are shown in Table 7.2. In the test data set(y_test),\
    \ there are nine observations where six wells produced sand (1 values) and three\
    \ wells experienced no sand production (0 values). When the model predicts value\
    \ 1 or sand production correctly, it is called True Positive (TP). In this example,\
    \ there are five TPs. When the model makes a correct prediction for 0 values or\
    \ no sand production, it is called True Negative (TN). If the model makes a wrong\
    \ prediction equal to 1 or sand production, it is defined as False Positive (FP)\
    \ or type I error. Finally, if the model makes a wrong prediction equal to 0 or\
    \ no sand production, it is defined as False Negative (FN) or type II error. In\
    \ this example, there are six TPs, one TN, and two FPs. There was no FN in the\
    \ model’s prediction.\n\n**TABLE 7.2 Model Prediction for test data set.**\n\n\
    | y_test | y_test-predict | Prediction status |\n| :--- | :--- | :--- |\n| 0 |\
    \ 0 | TN |\n| 1 | 1 | TP |\n| 0 | 1 | FP |\n| 1 | 1 | TP |\n| 1 | 1 | TP |\n|\
    \ 1 | 1 | TP |\n| 0 | 1 | FP |\n| 1 | 1 | TP |\n| 1 | 1 | TP |\n\nBased on mentioned\
    \ definitions, accuracy can be defined as:\n\n$$accuracy = \\frac{TP + TN}{TP\
    \ + TN + FP + FN}$$\n\nIn this example, the accuracy is calculated to be (6 +\
    \ 1)/(6 + 1+2 + 0) = 0.78. In Python, the accuracy of a classification problem\
    \ can be calculated with the following code:\n\n```\nfrom sklearn.metrics import\
    \ accuracy_score\naccuracy_test=accuracy_score(y_test, y_test_predict)\nprint('Accuracy_test:\
    \ %f' % accuracy_test)\nPython output:\nAccuracy_test: 0.777778\n```\n\nIn binary\
    \ classification, when the number of cases in each class is very imbalanced, accuracy\
    \ may not be a good metric for the model's prediction performance evaluation (Albon,\
    \ 2018). Some of the imbalance classes in the oil and gas industry can be wells\
    \ that experience blowout or severe pipeline leakage/oil spills. For imbalanced\
    \ data sets, it is better to use \"Precision,\" defined as the ratio of correct\
    \ or TPs to all the positives that were predicted by the model. It should be mentioned\
    \ that class with fewer samples like the number of well blowouts is considered\
    \ positive.\n\n$$precision = \\frac{TP}{TP + FP}$$\n\nIn sand production example,\
    \ there are 6 TPs and 2 FPs. Therefore, precision is calculated as (6)/(6 + 2)\
    \ = 0.75. In Python, the precision of a classification problem is obtained with\
    \ the following codes:\n\n```\nfrom sklearn.metrics import precision_score\nprecision_test=precision_score(y_test,\
    \ y_test_predict)\nprint('Precision_test: %f' % precision_test)\nPython output:\n\
    Precision_test: 0.750000\n```\n\nThe other evaluation metric for the classification\
    \ problem is \"Recall.\" It is defined as what proportion of all positive values\
    \ are correctly predicted positives. All positive values include both TPs and\
    \ FNs (FN is actually a positive value which is incorrectly predicted as negative).\
    \ Recall identifies the ability of the model to predict positive values. Mathematically,\
    \ Recall can be defined as:\n\n$$recall = \\frac{TP}{TP + FN}$$\n\nFor this example,\
    \ there are 6 TPs and 0 FN. The recall is calculated as (6)/(6 + 0) = 1. In Python,\
    \ recall of a classification problem is obtained with the following codes:\n\n\
    ```\nfrom sklearn.metrics import recall_score\nrecall_test=recall_score(y_test,\
    \ y_test_predict)\nprint('Recall_test: %f' % recall_test)\nPython output:\nRecall_test:\
    \ 1.000000\n```\n\nSelecting an appropriate metric is sometimes related to the\
    \ objective of the classification problem. In some cases, the goal is to have\
    \ high precision while in other cases, having high recall is a necessity. In order\
    \ to have a balance between precision and recall, another metric, defined as \"\
    F1 score,\" is a harmonic mean of precision and recall. Considering that precision\
    \ is the ratio of TPs to all the values that predicted positive and recall is\
    \ the ratio of TPs to all positive values, F1 score can be defined as:\n\n$$F1\
    \ = 2 \\times \\frac{Precision \\times Recall}{Precision + Recall}$$\n\nIn this\
    \ example, precision is 0.75 and recall is 1; therefore, F1 score is calculated\
    \ as 2 × (0.75 × 1)/(0.75 + 1) = 0.857. Python codes for calculating F1 score\
    \ in sand production example is as follows:\n\n```\nfrom sklearn.metrics import\
    \ f1_score\nf1_test=f1_score(y_test, y_test_predict)\nprint('F1 score_train: %f'\
    \ % f1_test)\nPython Output=\nF1 score_train: 0.857143\n```"
  mdcn: "## 第7章\n\n## 模型评估\n\n机器学习的主要目标是构建能够发现数据中模式的模型。这些数据驱动的模型通常经过训练以处理聚类或回归问题。模型的质量可以通过其在给定新（未见过的）数据时的预测准确性来评估。为了提高模型的质量或预测性能，首先需要定义评估指标和评分系统。然后，这些指标结合评估方法可用于选择提升模型质量的最佳策略。一些模型增强技术包括但不限于：(i)\
    \ 针对特定模型的超参数优化，(ii) 训练不同的模型，以及 (iii) 最后，在数据划分时改变训练集和测试集的比例。本章将涵盖评估指标和技术。接着，讨论最佳模型选择方法。最后，介绍一些Python中的模型处理实践，例如模型保存/加载。所有这些方法都将应用于油气相关问题。\n\
    \n## 评估指标与评分\n\n有多种评估指标用于评估机器学习模型的性能。二元分类、多项式分类和回归是本章将使用特定指标进行评估的主要学习技术。监督分类问题最广泛使用的一些评估指标示例包括精确率、准确率、召回率、F1分数和混淆矩阵。对于无监督聚类问题，推荐使用轮廓系数。均方误差（MSE）和R²是回归模型（例如神经网络）最常用的指标。“出砂预测”、“岩石分类”和“PVT估算”是本章将用于模型评估的三个示例。\n\
    \n## 二元分类：出砂预测\n\n出砂是许多运营商一直在处理的问题之一。出砂可能基于高流量、应力状态、岩石地质力学特性和完井设计而发生。出砂预测非常重要，因为它有助于生产工程师制定防砂策略。基于实际经历过出砂的油井数据，可以训练一个二元分类器模型来预测一口井是否会发生出砂。在出砂预测示例中，使用了一个包含来自北亚得里亚盆地29口井的数据集（Moricca等人，1994年；Gharagheizi等人，2017年）。出砂数据集由表7.1中的属性组成。\n\
    \n**表7.1 出砂数据集中的油井属性。**\n\n| 符号 | 定义 | 符号 | 定义 |\n| :--- | :--- | :--- | :---\
    \ |\n| TVD | 真垂直深度 | BHFP | 井底流动压力 |\n| TT | 传播时间 | DD | 生产压差 |\n| COH | 地层内聚强度\
    \ | EOVS | 有效上覆岩层压力 |\n| Qg | 天然气流量 | SPF | 每英尺射孔数 |\n| Qw | 水流量 | Hperf | 射孔段\
    \ |\n\n本示例中的目标变量是出砂，如果发生出砂则视为1，如果油井未出砂则视为0。数据集“出砂”可在以下链接找到：https://www.elsevier.com/books-and-journals/book-companion/9780128219294。数据加载和描述性统计通过以下代码完成：\n\
    \n```\n#data loading and descriptive statistics\nimport pandas as pd\ndataset=pd.read_csv('Chapter7_Sand\
    \ Production.CSV')\nprint(dataset.describe())\nPython output=Fig. 7.1\n```\n\n\
    数据的描述性统计如图7.1所示。在29口井中，有21口井观察到出砂。由于数据属性具有不同的范围，建议在学习过程中将数据缩放到0到1之间（数据集也可以进行标准化；适当的数据转换可以通过模型的性能来确定，这将在本章中解释）。可以使用第6章中提到的特征排序技术，如斯皮尔曼等级相关或随机森林，来查看哪些属性在出砂中起重要作用。本节的目标是比较二元分类问题的不同评估指标。“K近邻”（KNN）算法将用于训练一个模型，预测哪口井会出砂。对于训练过程，更重要的是模型评估，数据应划分为训练集和测试集。数据缩放、划分和训练KNN模型可以通过以下代码完成。\n\
    \n```\n# Define input(x) and target(y)\nx=dataset.iloc[:,1:11]\ny=dataset.iloc[:,11].values\n\
    # Scale input data between 0 and 1\nfrom sklearn.preprocessing import MinMaxScaler\n\

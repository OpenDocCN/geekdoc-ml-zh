  md: 'Loss function is simply the sum of squared difference between actual versus
    predicted values as shown below:


    $$\sum_{i=1}^{n} (y_i - \widehat{y})^2 \quad (5.12)$$


    A regularization term can be added to the above equation as follows (highlighted
    in red):


    $$\sum_{i=1}^{n} (y_i - \widehat{y})^2 + \lambda \sum_{i=1}^{n} \theta_i^2 \quad
    (5.13)$$


    $\theta_i$ represents the weights of the features and $\lambda$ represents the
    regularization strength (penalty) parameter. The regularization parameter determines
    the amount of penalty to apply to the weights. If no regularization is needed,
    simply set $\lambda=0$ which will eliminate the regularization expression in the
    discussed equation. A large $\lambda$ could result in a model being underfit and
    a low $\lambda$ could potentially lead to an overfit model. When grid search is
    discussed in the subsequent chapters, regularization parameter can be used as
    one of the hyper-tuning parameters used in a model optimization using grid search.


    Examples of regularization parameters are $L_1$ and $L_2$ regularization. $L_1$
    regularization is referred to as $L_1$ norm or Lasso regularization. In $L_1$
    regularization, the absolute value of weights is penalized as shown below. In
    addition, $L_1$ regularization has a sparse solution that is robust to outliers
    and could possibly have multiple solutions. Please note that $L_1$ generates simple
    models and cannot interpret complex patterns. Therefore, for complex pattern recognition,
    it is recommended to use $L_2$ regularization.


    $$\sum_{i=1}^{n} (y_i - \widehat{y})^2 + \lambda \sum_{i=1}^{n} |\theta_i| \quad
    (5.14)$$


    On the other hand, $L_2$ regularization is referred to as ridge regularization
    which uses the sum of square of all feature weights as highlighted below. In $L_2$
    regularization, the weights are forced to be small. In contrast to $L_1$ regularization,
    $L_2$ regularization has a nonsparse solution, is not robust to outliers, and
    performs better with complex data patterns. $L_2$ regularization always has one
    solution.


    $$\sum_{i=1}^{n} (y_i - \widehat{y})^2 + \lambda \sum_{i=1}^{n} \theta_i^2 \quad
    (5.15)$$


    C is the inverse of $\lambda$ (regularization strength) and the default value
    of C is 1. C is one of the essential parameters used in SVM algorithm which will
    be discussed in more detail later in this chapter.'

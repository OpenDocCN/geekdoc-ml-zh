    # Blind set validation


    In addition to train and test splits, the blind set validation must also be applied
    to evaluate a model’s prediction accuracy. A blind set is a percentage of the
    data that is completely set aside and is not used in training nor in testing.
    This allows for a completely unbiased evaluation of a model’s accuracy. For example,
    let’s assume that 50 sonic logs are available to build a ML model



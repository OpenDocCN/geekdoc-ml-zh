    as follows:


    ```

    from sklearn.preprocessing import StandardScaler

    scaler=StandardScaler()

    df_scaled=scaler.fit(df)

    df_scaled=scaler.transform(df)

    ```


    Next, let''s create the dendrogram. First, "import scipy.cluster.hierarchy as
    shc" library. Please make sure to pass along "df_scaled" which is the standardized
    version of the data set in "dend = shc.dendrogram(shc.linkage(df_scaled, method
    = ''ward''))."


    ```

    import scipy.cluster.hierarchy as shc

    plt.figure(figsize=(15, 10))

    dend=shc.dendrogram(shc.linkage(df_scaled, method=''ward''))

    plt.title("Dendrogram")

    plt.xlabel(''Samples'')

    plt.ylabel(''Distance'')

    Python output=Fig. 4.17

    ```



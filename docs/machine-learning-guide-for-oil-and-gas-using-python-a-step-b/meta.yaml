    # Nonnegative matrix factorization (NMF)


    The main goal in NMF is to decompose a matrix into two matrices. NMF is a matrix
    factorization technique. As was previously discussed, PCA creates factors that
    can be both positive and negative; however, NMF only creates positive factors.
    PCA is desirable when a high-dimensional data set is transferred into low dimensions
    as long as losing some of the original features are acceptable. Some of the applications
    of NMF is in image processing, transcription processes, text mining, cryptic encoding/decoding,
    and decomposition of videos and music. Let’s assume matrix $A$ is factorized into
    two matrices called $X$ and $Y$ as follows:


    $$A \approx X \times Y$$


    Therefore, for matrix $A$ of dimension **mbyn** ($m \times n$) (each element of
    the matrix must be greater than 0 meaning $a_{ij}>=0$), NMF decomposes matrix
    $A$ into two matrices $X$ and $Y$ of dimensions **mbyr** ($m \times r$) and **rbyn**
    ($r \times n$) subsequently where each element $x_{ij}>=0$ and $y_{ij}>=0$.


    $$\begin{bmatrix} \ \ \ \end{bmatrix} \times \begin{bmatrix} \ \ \end{bmatrix}
    = \begin{bmatrix} \ \ \ \end{bmatrix}$$


    $X$ $Y$ $A$


    For example, let’s assume that $A$ is composed of $m$ rows of $a_1, a_2, ...,
    a_m$, $X$ is composed to $n$ rows of $x_1, x_2, ..., x_n$, and $Y$ is composed
    of $K$ rows of $y_1, y_2, ..., y_k$. Each row in $A$ can be considered as a data
    point.


    $$A = \begin{bmatrix} a1 \ a2 \ a3 \ ... \ an \end{bmatrix} \quad X = \begin{bmatrix}
    \bar{x}1 \ \bar{x}2 \ \bar{x}3 \ ... \ \bar{x}n \end{bmatrix} \quad Y = \begin{bmatrix}
    y1 \ y2 \ y3 \ ... \ yn \end{bmatrix}$$


    where $\bar{x}i = [xi1xi2\cdots xin]$. Let’s summarize as follows:


    $$ai = [xi1 \quad xi2 \quad ... \quad xin] \times \begin{bmatrix} y1 \ y2 \ ...
    \ yn \end{bmatrix} = \sum_{j=1}^{n} xij \times yj$$'
  - '[PAGE 121]


    The objective in NMF is to minimize the squared distance of $A-XY$ with respect
    to $X$ and $Y$, noting that $X$ and $Y$ must be greater or equal to 0. In other
    words, the objective is to minimize the following function:


    $\|A - XY\|^2$ (3.18)


    Note that Euclidean or Frobenius (will be discussed in later chapters) can be
    used to minimize such function. There are two popular approaches for solving this
    problem numerically. The first approach is called coordinate descend where $X$
    is fixed and $Y$ is optimized with gradient descend. Then $Y$ is fixed and $X$
    is optimized with gradient descend. This process is repeated until a tolerance
    is met. The other approach is called multiplicative technique. Please note that
    in both methodologies, a local minimum is found which are often useful enough
    (Cichocki & Phan, 2009).



    The last step prior to the neural network training process is data partitioning.
    "train_test_split" command from sklearn library to partition Shale Gas Wells data
    set. "train_test_split" partitions the data into train and test randomly (there
    is no partition for validation here, but we can run the same command on the test
    data to divide it into test and validation). In this command, one must define
    the proportion of the data set to be included in training, between 0 and 1. The
    following command will randomly split the data into 70% training denoted as X-train
    and y_train and 30% testing denoted as X_test and y_test. It is worth mentioning
    that the stochastic nature of data splitting (randomness) will result in a nonunique
    performance on the trained neural network over the same database with the same
    neural network topology. However, a seed number can be added to obtain the same
    result.


    ```

    import numpy as np

    seed=50

    np.random.seed(seed)

    from sklearn.model_selection import train_test_split

    X_train, X_test, y_train, y_test=train_test_split(Xnorm, ynorm, test_size=0.3)

    ```



    \ and the ones in the middle can be assigned in the order of their distance magnitudes.\
    \ Please note that the resultant k-means clustering centroids can be easily programmed\
    \ real-time to detect liquid loading.\n\n# Silhouette coefficient\n\nAnother metric\
    \ to evaluate the quality of clustering is referred to as silhouette analysis.\
    \ Silhouette analysis can be applied to other clustering algorithms as well. Silhouette\
    \ coefficient ranges between −1 and 1, where a higher silhouette coefficient refers\
    \ to a model with more **coherent** clusters. In other words, silhouette coefficients\
    \ close to +1 means the sample is far away from the neighboring clusters. A value\
    \ of 0 means that the sample is on or very close to the decision boundary between\
    \ two neighboring clusters. Finally, negative values indicate that the samples\
    \ could have potentially been assigned to the wrong cluster (Rousseeuw, 1987).\n\
    \nTo calculate silhouette coefficient, cluster cohesion (a) and cluster separation\
    \ (b) must be calculated. Cluster cohesion refers to the average distance between\
    \ an instance (sample) and all other data points within the same cluster while\
    \ cluster separation refers to the average distance between an instance (sample)\
    \ and all other data points in the nearest cluster. Silhouette coefficient can\
    \ be calculated as shown below. Silhouette coefficient is essentially the difference\
    \ between cluster separation and cohesion divided by the maximum of the two (Rousseeuw,\
    \ 1987).\n\n$$s = \\frac{b - a}{\\max(a, b)}$$\n\n# Silhouette coefficient in\
    \ the scikit-learn library\n\nLet's apply silhouette coefficient and use the graphical\
    \ tool to plot a measure of how tightly grouped the samples in the clusters are.\
    \ **Please make sure to place this code before unstandardizing the data.** The\

    # Make all fitness values positive so probabilities can be calculated\n#next\n\
    \    if min_fitness < 0:\n        func_vals += -min_fitness\n    fitness_sum=sum(func_vals)\n\
    # Draw a random variable from uniform distribution\n    rand=random.uniform(0,\
    \ 1)\n    acc=0\n```\n\n![Roulette wheel selection schematic.](img/84bb0bcf926cd79dfa24aaffa8e553c8_425_0.png)\n\
    \n**FIGURE 9.5** Roulette wheel selection schematic.\n\n```python\nfor i in range(len(sorted_population)):\n\
    \    fitness=func_vals[i]\n    # Probability of each individual being selected\
    \ is calculated\n    prob=fitness/fitness_sum\n    acc += prob\n    if rand <=\
    \ acc:\n        return sorted_population[i]\n```\n\nIn the codes shown above,\
    \ the method `roul_choice` where the parents are selected at random can be seen,\
    \ with their chance of selection proportional to their fitness value. In other\
    \ words, the individuals with more fitness have a higher probability of being\
    \ selected as parents. This logic is implemented by dividing the interval (0,1)\
    \ (our roulette) into pieces (slices of the pie), the size of each slice is equal\
    \ to the probability of that slice $\\frac{fitness}{fitness\\_sum}$. For example,\
    \ if there are four individuals x1,\\cdots,x4 with fitness values of 3, 6, 9,\
    \ and 12, the probability of each being selected is 0.1, 0.2, 0.3, and 0.4, respectively.\
    \ Therefore, if the random draw falls into intervals [0,0.1], (0.1,0.3], (0.3,\
    \ 0.6], (0.6, 1], the individuals x1,x2,x3,x4 will be chosen, respectively.\n\n\
    In the \"Tournament\" selection method, k random solutions from the population\
    \ are selected. The one out of many solutions with the highest fitness is considered\
    \ a parent. By repeating the same procedure, the next parents can be selected.\
    \ There are some other parent selection methods like \"Rank\" selection, \"Random\"\
    \ selection, and Boltzman selection.\n\n(iv) \"Crossover Operation\" is the next\
    \ step after the parents are selected. When the parents are selected and coupled,\
    \ their chromosomes should be combined to generate offspring. The combination\
    \ of the genetic information of the chromosomes is done with crossover operation.\
    \ In \"One Point\" or \"Single Site\" crossover operation, a break location in\
    \ the chromosomes is selected randomly and divides the chromosomes into two segments\
    \ (tutorialspoint). The gene information from the second segments is swapped between\
    \ chromosomes to generate offspring. This process is shown in Fig. 9.6. In \"\
    Two-point\" crossover operation, instead of one break location, two break locations\
    \ are selected randomly. Then gene information between two break locations is\
    \ exchanged between parents to generate offspring as shown in Fig. 9.7. In \"\
    Uniform\" crossover operation, a random value between 0 and 1 is assigned to each\
    \ gene in the chromosome. If the random number is equal or greater than 0.5 for\
    \ a gene, that gene is swapped as shown in Fig. 9.8.\n\nBelow is a simple crossover\
    \ which takes an average of parents values to create children (for the real numbers,\
    \ geometric mean or arithmetic mean for the cross over can be used):\n\n```python\n\
    #Crossover\ndef crossover(point_1, point_2):\n    return [(point_1[0] + point_2[0])/2,(point_1[1]\
    \ + point_2[1])/2]\n```\n\n![Crossover operations.](img/84bb0bcf926cd79dfa24aaffa8e553c8_427_0.png)\n\
    \n![Crossover operations.](img/84bb0bcf926cd79dfa24aaffa8e553c8_427_1.png)\n\n\
    There are other crossover operations like \"matrix,\" \"arithmetic recombination,\"\
    \ and \"Davis Order.\" One important characteristic of crossover is the crossover\
    \ rate/probability, defined as the ratio of offspring chromosomes that are generated\
    \ by crossover operation to the initial parent population. For example, if out\
    \ of 100 parent chromosomes, 70 offspring chromosomes are made by crossover, then\
    \ the crossover rate is 0.7. The crossover rate ranges from 0 to 1.\n\n![Crossover\
    \ rate.](img/84bb0bcf926cd79dfa24aaffa8e553c8_428_0.png)\n\n(v) \"Mutation\" happens\
    \ after the offspring chromosomes are generated by crossover operation, where\
    \ some of the genes are tweaked to add diversity to the new generation. This process\
    \ is called Mutation. The most common mutation operator is \"Bit Flip.\" In the\
    \ \"Bit Flip\" mutation, random bit/bits are selected and then the **allele**\
    \ (value) of the bit/bits is flipped as shown in Fig. 9.9. The mutation rate can\
    \ be used to understand what percentage of total bits went through mutation. The\
    \ mutation rate is generally less than the crossover rate.\n\n```python\n#Mutation\n\
    def mutate(point):\n    mute_x=point[0] + random.uniform(-0.5, 0.5)\n    mute_y=point[1]\
    \ + random.uniform(-0.5, 0.5)\n# Guarantee to be kept inside boundaries\n    mute_x=min(max(mute_x,\
    \ low_limit), up_limit)\n    mute_y=min(max(mute_y, low_limit), up_limit)\n  \
    \  return [mute_x,mute_y]\n```\n\n![Mutation.](img/84bb0bcf926cd79dfa24aaffa8e553c8_428_1.png)\n\
    \nIn this code, mutation is done by adding a small random value to the individual.\
    \ It is necessary to make sure the mutated values fall into the specified range.\
    \ All these steps (ii)–(v) are wrapped in the following method called `make_next_generation`.\n\
    \n```python\n#Make Next Generation: steps (ii)-(v)\n# (ii) Fitness Function used\

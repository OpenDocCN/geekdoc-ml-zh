    and production rate. The controller in this example receives tubing head pressure,
    GLR, and production rate as input variables and decides whether to keep the choke
    as it is, increase the choke size, or decrease the choke size (output). The output
    of this system is a recommendation of how much (%) the choke size should be increased
    or decreased. To model this problem using fuzzy inference system, the steps shown
    in the previous section should be taken as follows: (i)Fuzzification: It is necessary
    to generate fuzzy membership functions for all the input and output variables
    to be used to fuzzify the crisp input values. (ii) Fuzzy Rules Definition: define
    the fuzzy'

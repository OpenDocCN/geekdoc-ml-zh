    # Dimensionality reduction


    Dimensionality reduction is the process of reducing the number of variables by
    obtaining a set of important variables. Often times when features are heavily
    related, the number of features can simply be reduced using some type of dimensionality
    reduction algorithms as opposed to using all collinear features. Dimensionality
    reduction is an effective approach when many correlated attributes exist within
    a data set. For instance, many geologic features that are collinear can be reduced
    to only a few important features. Examples of dimensionality reduction algorithms
    are PCA, nonnegative matrix factorization (NMF), and stochastic neighbor embedding
    (SNE).


    # Principal component analysis (PCA)


    The desired goal in PCA is to find patterns in a data set and to reduce the dimensionality
    of collinear features in an attempt to increase computational efficiency while
    retaining all important information. The following steps are needed to perform
    PCA:


    +   - Standardize the data set as discussed in the workflow section.

    - Calculate the covariance matrix (also known as variance–covariance matrix).

    - Calculate eigenvectors and eigenvalues from the covariance matrix.

    - Sort the eigenvalues in a descending order and choose **n eigenvectors**. n
    is the number of dimensions after applying PCA.

    - Calculate the principal components and reduce the dimensions of the data set.


    PCA concept is easier to understand with illustrating a step-by-step example.
    Therefore, let''s examine Table 3.1. As illustrated in this table, permeability
    values for matrix, natural fracture, and effective **permeability** values are
    shown for five different wells.


    TABLE 3.1 Permeability properties (nd).



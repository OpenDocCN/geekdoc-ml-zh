    $$\sqrt{\frac{1}{n} \sum_{i=1}^{n} \left(y_{i}-\hat{y}_{i}\right)^{2}}$$ (5.5)


    # Application of multilinear regression model in scikit-learn


    Multilinear regression can be easily implemented in scikit-learn. For this exercise,
    a data set with the following geologic information is used:


    +   - Porosity (%)

    - Matrix permeability (nd)

    - Acoustic impedance (kg/m2s × 10^6)

    - Brittleness ratio

    - TOC (%)

    - Vitrinite reflectance (%)


    The goal is to train a **multilinear regression** model to understand the impact
    of each of these variables on production performance. A√K/lateral ft (md^1/2 ×
    ft) is used as the output feature in this exercise. A√K is a productivity metric
    obtained from rate transient analysis (RTA) in unconventional reservoirs and it
    is equivalent to kh in conventional reservoirs. A√K is simply the cross-sectional
    area multiplied by the square root of permeability. It is essentially a productivity
    metric that shows the strength of each well.


    The data set for this exercise can be found using the link below:

    https://www.elsevier.com/books-and-journals/book-companion/9780128219294


    Open a new Jupyter Notebook and let''s start importing the important libraries
    and set "sns.set_" style to "darkgrid" as illustrated below. Note that they are
    5 preset seaborn themes such as darkgrid, whitegrid, dark, white, and ticks that
    can be chosen based on personal preference.


    ```

    import numpy as np

    import pandas as pd

    import matplotlib.pyplot as plt

    %matplotlib inline

    import seaborn as sns

    sns.set_style("darkgrid")

    df=pd.read_csv(''Chapter5_Geologic_DataSet.csv'')

    df.describe().transpose()

    ```



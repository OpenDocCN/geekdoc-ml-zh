    \ print R² for each fold, and finally take the average of all 5 R² values to yield\
    \ the average cross-validation R² for this example. As can be observed, the R²\
    \ from 5 fold cross-validation appears to be slightly lower than the train_test_split\
    \ technique.\n\n## Random forest\n\nRandom forest is another powerful supervised\
    \ ML algorithm which can be used for both regression and classification problems.\
    \ The general technique of random decision forests was first proposed by Ho in\
    \ 1995 (Kam Ho, 1995). Random forest is an ensemble of decision trees or it can\
    \ be thought of as a forest of decision trees. Since random forest combines many\
    \ decision tree models into one, it is known as an ensemble algorithm. For example,\
    \ instead of building a decision tree to predict EUR/1000 ft, using a single tree\
    \ could result in an erroneous value due to **variance** in predictions. One way\
    \ to avoid this variance when predicting the EUR/1000 ft is to take predictions\
    \ from hundreds or thousands of decision trees and using the average of those\
    \ trees to calculate the final answer. Combining many decision trees into a single\
    \ model is essentially the fundamental concept behind using random forest. The\
    \ predictions made by a single decision tree could be inaccurate, but when combined,\
    \ the prediction will be closer to average. The reason random forest is typically\
    \ more accurate than a single decision tree is because much more knowledge is\
    \ incorporated from many predictions. For regression problems, random forest uses\
    \ the average of the decision trees for final prediction. However, as previously\
    \ mentioned, classification problems can also be solved using random forest by\
    \ taking a majority vote of the predicted class. Another type of ensemble learning\
    \ method is gradient boosting which will be discussed next. Fig. 5.47 illustrates\
    \ the difference between a single decision tree versus a random forest which consists\
    \ of an ensemble of decision trees.\n\nThere are two main types of combining multiple\
    \ decision trees into one and they are as follows:\n\n- **Bagging**, also referred\
    \ to as \"bootstrap aggregation,\" is used in random forest. Bagging was first\
    \ proposed by Leo Breiman in a technical report in 1994 (Breiman, 1994). In bagging\
    \ or bootstrap aggregation, an average of many **built independent** models is\
    \ used. In bagging, the decision trees are trained based on randomly sampling\
    \ subsets of data and sampling is done"

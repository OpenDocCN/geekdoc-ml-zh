    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_67_0.png)


    FIGURE 2.9 Natural gas pricing plot.


    and numbers listed below to understand the impact of each size and variable on
    the result. Our recommendation is to copy and paste the codes below and start
    exploring various parameters and sizes listed below.


    ```

    g=np.linspace(1,10,5)

    h=g**2


  md: 'In this chapter, two stochastic optimization techniques such as genetic algorithm
    and particle swarm would be discussed. A brief theory for each method is provided
    with oil and gas-related examples in Python.


    # Genetic algorithm


    In the middle of the 20th century, computer scientists started learning from nature,
    especially natural evolution, to deal with challenging optimization problems that
    required extensive search among highly populated alternatives. Genetic algorithm,
    introduced by Rechenberg and developed by John Holland in the 1960–70s (Rajasekaran
    & Pai, 2013), is mainly based on Darwin’s evolution theory of "survival of the
    fittest." The survival of the fittest is linked to the idea that the most successful
    organisms in surviving are the ones that best adjust to their environment. In
    a population of organisms, parents produce offspring. The fittest offspring survive
    and then become parents and this process continues through selection, crossovers,
    mutation, and inheritance. In 1990s, John Koza introduced "genetic programming"
    which utilizes genetic algorithm to find the best computer programs for solving
    a task (Mohaghegh, 2000). Genetic algorithm mimics the process of natural selection.
    Therefore, it is necessary to have a population of solutions/organisms which are
    referred to as chromosomes in biology. Each chromosome consists of genes which
    can be binary values, numbers, symbols, or characters. Next, it is required to
    evaluate the fitness of each solution/chromosome by the objective function. Chromosomes
    with higher fitness values go through a mating process with crossovers and mutations
    of genes and produce new chromosomes (offspring). New chromosomes with higher
    fitness have a higher probability to be selected for the mating process and produce
    a new generation. The fittest chromosome, the solution of the optimization, will
    be found after several iterations (generations).


    The genetic algorithm is a popular optimizer with advantages like no need for
    any derivative calculations. It also can deal with both continuous and discrete
    functions and work with large search spaces with a lot of parameters. However,
    since it is a stochastic process, the solution might be uncertain and unrepeatable
    (tutorialspoint).


    There have been several applications of genetic algorithms in the oil and gas
    industry. The first application of the genetic algorithm in the oil and gas industry
    was developed by Goldberg et al. for his Ph.D. work supervised by John Holland
    (Goldberg, 1983). In his work, a learning classifier system (LCS) was proposed
    to optimize gas pipeline performance by receiving some input variables like inlet/outlet
    pressures and flow rates, time of day, time of year, pressure rate change, and
    temperature. LCS decision was to select an optimal flow rate or detect gas leakage.
    Mohaghegh et al. showed the usage of hybrid neurogenetic approach to optimize
    hydraulic fracture design for refrac operation for the Clinton Sand in Northeast
    Ohio (Mohaghegh, 2000). He used the'
  merge: -1
  pgno: 418
- img_proc: true
  md: 'neural networks to predict wells’ post fracture deliverability from some important
    completion attributes. Then, he utilized the neural network as a fitness function
    for a genetic algorithm to find the best combination of completion parameters
    for getting the highest post fracture deliverability. Jefferys used a genetic
    algorithm for minimizing the weight of a column for an offshore structure by searching
    through different structure designs with various axial loads and radial pressures
    (Jefferys, 1993). Martinez et al. showed how to implement genetic algorithm to
    optimize oil production for the wells operating with gas lift. The objective of
    this work was to assign the optimum amount of gas to each individual well in the
    field considering the limited gas supply (Martinez et al., 1994). Sarich used
    genetic algorithm to optimize investment decision-making. In this work, the goal
    was to select the optimum number of wells to be drilled out of 30 potential wells
    with capital budget constrain of $30,000,000 and to maximize the NPV (Sarich,
    2001). Emrick et al. used a genetic algorithm to optimize well placement with
    some nonlinear constraints. They used numerical simulator as fitness evaluator
    to find the optimized number, location, and trajectory of producer/injectors that
    results in maximized NPV (Emerick et al., 2009). Morales et al. applied a genetic
    algorithm in gas condensate reservoir for well placement optimization using a
    heterogeneous reservoir simulation model. They came up with the best well coordinates
    (x,y,z) and direction that maximized cumulative gas production (Morales et al.,
    2010). Another application of a genetic algorithm in the oil and gas industry
    is related to Chaari et al. work that used integrated neural network and genetic
    algorithm to model two phase-pressure drops in pipes (Chaari et al., 2020). They
    used a genetic algorithm to find the optimum number of input parameters to train
    a neural network to predict pressure drops in the pipes with the highest accuracy
    (least amount of error). The genetic algorithm is also used in many other applications
    for the oil and gas industry like petrophysics (Fang et al., 1992), seismic inversion
    (Salamanca et al., 2017), steam injection optimization (Bybee, 2005), and reservoir
    characterization (Romero et al., 2000).


    # Genetic algorithm workflow


    In order to understand the workflow of a genetic algorithm, it is necessary to
    review some of the related terminologies. "Population" is a space of all the solutions
    for the problem to be optimized. "Chromosome" is actually a solution to the problem.
    "Gene" is the building block of each chromosome. In the computer binary language,
    0 and 1 are assigned to the values of the gene as "Allele." In the real-world
    population space, solutions are not in the binary format. For computational easiness,
    it is preferred to convert solution space into binary system space which is called
    "Genotype" through the "Encoding" process. "Fitness" evaluator is generally a
    mathematical function or objective function that should be maximized or minimized
    through the optimization'

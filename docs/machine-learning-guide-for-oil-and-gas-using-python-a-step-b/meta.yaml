- md: "## Extreme gradient boosting\n\nExtreme gradient boosting, also known as XGBoost,\
    \ developed by Tianqi Chen (Chen & Guestrin, 2016), is another type of ensemble\
    \ supervised ML algorithm used for both classification and regression problems.\
    \ XGBoost is a type of gradient boosting method and is different from a gradient\
    \ boosting model as follows:\n\n- XGBoost uses L₁ and L₂ regularization which\
    \ helps with model generalization and overfitting reduction.\n- As previously\
    \ discussed under the gradient boosting section, the error rate of a gradient\
    \ boosting model is used to calculate the gradient, which is essentially the partial\
    \ derivative of the loss function. In contrast, XGBoost uses the **second** partial\
    \ derivative of the loss function. Using the second partial derivative of the\
    \ loss function will provide more info about the direction of the gradient.\n\
    - XGBoost is usually faster than gradient boosting due to the parallelization\
    \ of tree construction.\n- XGBoost can handle missing values within a data set;\
    \ therefore, the data preparation is not as time-consuming.\n\n## Extreme gradient\
    \ boosting implementation using scikit-learn\n\nLet's also use the previous data\
    \ set to apply the regression version of XGBoost to see its performance. Start\
    \ a new Jupyter Notebook and follow the same previous steps shown in the gradient\
    \ boosting section until after train_test_split (or continue with the same Jupyter\
    \ Notebook). Instead of importing \"GradientBoostingRegressor,\" import \"XGBRegressor\"\
    \ as shown below. For classification problems, simply import \"XGBClassifier\"\
    \ instead. Prior to importing the \"XGBRegressor\" library shown below, make sure\
    \ to use the Anaconda command prompt to install this library using the following\
    \ command: pip install xgboost\n\n```\nfrom xgboost import XGBRegressor\n```\n\
    \nNext, let's define the XGBoost parameters. Objective is set to \"reg:squarederror\"\
    \ which uses the squared error to minimize the loss function. \"n_estimators\"\
    \ specifies the number of trees (as was discussed under multiple sections before).\
    \ Learning rate defines the step size which means each weight in all trees will\
    \ be multiplied by this value (in this case 0.1 was used). Learning rate can range\
    \ between 0 and 1. \"reg_alpha\" controls L1 regularization on leaf weights. A\
    \ high \"reg_alpha\" leads to more regularization. \"reg_lambda\" specifies L2\
    \ regularization on leaf weights. \"max_depth\" specifies the maximum depth of\
    \ the tree during any boosting run. \"gamma\" determines whether to proceed with\
    \ further partitioning on a leaf node of a tree based on the expected loss reduction.\n\
    \n```\nnp.random.seed(seed)\n\nxgb=XGBRegressor(objective ='reg:squarederror',n_estimators=200,\n\
    reg_lambda=1, gamma=0,max_depth=3, learning_rate=0.1,\nreg_alpha=0.1)\n```\n\n\
    Next, let's apply the defined model \"xgb\" to fit the training data (70% training).\
    \ In addition, also obtain \"y_pred_train\" and \"y_pred_test\" as follows:\n\n\
    ```\nxgb.fit(X_train,y_train)\ny_pred_train=xgb.predict(X_train)\ny_pred_test=xgb.predict(X_test)\n\
    ```\n\nNext, obtain R² for both training and testing data sets as follows:\n\n\
    ```\ncorr_train=np.corrcoef(y_train, y_pred_train) [0,1]\nprint('Training Data\
    \ R^2=',round(corr_train**2,4),'R=',\nround(corr_train,4))\nPython output=Training\
    \ Data R^2=0.9957 R=0.9979\n\ncorr_test=np.corrcoef(y_test, y_pred_test) [0,1]\n\
    print('Testing Data R^2=',round(corr_test**2,4),'R=',\nround(corr_test,4))\nPython\
    \ output=Testing Data R^2=0.9138 R=0.9559\n```\n\nAlso, visualize training and\
    \ testing actual versus prediction values as follows:\n\n```\nplt.figure(figsize=(10,8))\n\
    plt.plot(y_train, y_pred_train, 'm.')\nplt.xlabel('NPV Training Actual')\nplt.ylabel('NPV\
    \ Training Prediction')\nplt.title('NPV Training Actual Vs. Prediction')\nPython\
    \ output=Fig. 5.64\n```\n\nLet's also obtain MAE, MSE, and RMSE for the 30% testing\
    \ data as follows:\n\n```\nfrom sklearn import metrics\nprint('MAE:', round(metrics.mean_absolute_error(y_test,\
    \ y_pred_test),5))\nprint('MSE:', round(metrics.mean_squared_error(y_test, y_pred_test),5))\n\
    print('RMSE:', round(np.sqrt(metrics.mean_squared_error(y_test, y_pred_test)),5))\n\
    Python output=MAE: 0.76514\nMSE: 1.06659\nRMSE: 1.03276\n```\n\nLet's also obtain\
    \ the feature importance of each input variable and **permutation feature importance**.\
    \ The permutation feature importance is defined as the decrease in a model score\
    \ when a single feature value is randomly shuffled (Breiman, 2011). Permutation\
    \ feature importance evaluates input and output features by calculating the drop\
    \ in the model score. The bigger the drop in the model score, the more impact\
    \ the input feature has on the model, and the higher it will rank. Permutation\
    \ importance can be obtained by importing the \"permutation_importance\" library\
    \ from \"sklearn.inspection\" and passing in the trained model (in this case \"\
    gb\"), testing set (in this case \"X_test,y_test\"), n_repeats (in this case 10\
    \ was used), and random_state (to use a seed number of 1000 as was previously\
    \ used). Please note that \"n_repeats\" refers to the number of times a feature\
    \ is randomly shuffled. In this example, each feature was randomly shuffled 10\
    \ times and a sample of feature importance is returned.\n\n```\nfrom sklearn.inspection\
    \ import permutation_importance\nfeature_importance=gb.feature_importances_\n\
    sorted_features=np.argsort(feature_importance)\npos=np.arange(sorted_features.shape[0])\
    \ + .5\nfig=plt.figure(figsize=(12, 6))\nplt.subplot(1, 2, 1)\nplt.barh(pos, feature_importance[sorted_features],\n\
    \    align='center')\nplt.yticks(pos, np.array(df.columns)[sorted_features])\n\
    plt.title('Feature Importance')\nresult=permutation_importance(gb, X_test, y_test,\n\
    \    n_repeats=10,random_state=seed)\nsorted_idx=result.importances_mean.argsort()\n\
    plt.subplot(1, 2, 2)\nplt.boxplot(result.importances[sorted_idx].T, vert=False,\n\
    \    labels=np.array(df.columns)[sorted_idx])\nplt.title(\"Permutation Importance\
    \ (test set)\")\nfig.tight_layout()\nplt.show()\nPython output=Fig. 5.62\n```\n\
    \nLet's also call \"result\" which will show the **average** permutation importance\
    \ score for each feature in the first two lines (based on randomly shuffling 10\
    \ times). The next two lines show the **standard deviation** of each feature that\
    \ was randomly shuffled 10 times. Finally, the rest of the result shows the list\
    \ of **10 elements** of individual permutation score in each array for each feature.\
    \ Since there are 6 input features, there are also 6 arrays with each one including\
    \ 10 elements based on 10 random shuffling.\n\nresult\nPython output=Fig. 5.63\n\
    \n```\n{'importances_mean': array([ 5.62673558e-02,  4.21978379e-03, -1.68587786e-03,\
    \  1.08985184e-02,\n       1.29103662e-02,  2.28967526e+00]),\n 'importances_std':\
    \ array([0.01485314, 0.00449182, 0.00290839, 0.00638356, 0.00391517,\n       0.27624977]),\n\
    \ 'importances': array([[ 8.15151462e-02,  3.95292772e-02,  7.02221645e-02,\n\
    \         3.65059457e-02,  6.03294438e-02,  4.96642294e-02,\n         5.30148570e-02,\
    \  5.79832600e-02,  3.92243716e-02,\n         7.46848629e-02],\n       [ 7.44887785e-03,\
    \  9.59443016e-03,  2.58807132e-03,\n        -1.38147086e-03, -1.05835466e-03,\
    \  9.27570663e-03,\n         5.14050355e-03,  4.35297088e-03, -2.86902680e-03,\n\
    \         9.10612984e-03],\n       [ 4.48758354e-03,  1.25757307e-03, -2.61008665e-03,\n\
    \        -1.66488246e-03, -5.10349406e-03, -3.54065341e-03,\n        -4.17053339e-03,\
    \  1.94360646e-04, -5.02201479e-03,\n        -6.86631099e-03],\n       [ 2.01027500e-02,\
    \  1.38400077e-02,  1.45205740e-02,\n         8.05278583e-03,  9.32294255e-04,\
    \  1.76246999e-02,\n         3.92768661e-03,  1.23552019e-02,  2.21219261e-03,\n\
    \         1.14429341e-02],\n       [ 1.92971526e-02,  1.29535259e-02,  1.81843586e-02,\n\
    \         1.41525885e-02,  1.00042563e-02,  9.58542022e-03,\n         9.02224063e-03,\
    \  1.14259918e-02,  7.47400867e-03,\n         1.70041187e-02],\n       [ 1.78325738e+00,\
    \  2.50606649e+00,  2.24622373e+00,\n         2.09877842e+00,  2.87685350e+00,\
    \  2.45690805e+00,\n         2.17434168e+00,  2.27078646e+00,  2.36532335e+00,\n\
    \         2.11821354e+00]])}\n```\n\nFIGURE 5.63\n\nJust like the previous examples,\
    \ let's apply a 10-fold cross-validation to see the resultant R² as follows:\n\
    \n```\nfrom sklearn.model_selection import cross_val_score\nnp.random.seed(seed)\n\
    scores_R2=cross_val_score(gb, x, y,cv=10,scoring='r2')\nprint(\" R2_Cross-validation\
    \ scores: {}\". format(scores_R2))\nPython output=R2_Cross-validation scores:\
    \ [0.8862245 0.87216255 0.76550356 0.946582 0.94277734 0.89203469 0.54233081 0.9442973\
    \ 0.93938502 0.80444424]\n\nprint(\" Average R2_Cross-validation scores: {}\"\
    . format(scores_R2.mean()))\nPython output=Average R2_Cross-validation scores:\
    \ 0.8535741998748938\n```\n\nAs illustrated, the average R² score for the 10-fold\
    \ cross-validation is roughly 6% lower than the R² score obtained from random\
    \ 70/30 split validation."
  mdcn: "## 极端梯度提升\n\n极端梯度提升，也称为XGBoost，由陈天奇（Chen & Guestrin, 2016）开发，是另一种用于分类和回归问题的集成监督机器学习算法。XGBoost是一种梯度提升方法，与梯度提升模型的区别如下：\n\
    \n- XGBoost使用L₁和L₂正则化，这有助于模型泛化并减少过拟合。\n- 如之前在梯度提升部分所讨论的，梯度提升模型的误差率用于计算梯度，这本质上是损失函数的偏导数。相比之下，XGBoost使用损失函数的**二阶**偏导数。使用损失函数的二阶偏导数将提供关于梯度方向的更多信息。\n\
    - 由于树构建的并行化，XGBoost通常比梯度提升更快。\n- XGBoost可以处理数据集中的缺失值；因此，数据准备不那么耗时。\n\n## 使用scikit-learn实现极端梯度提升\n\
    \n让我们也使用之前的数据集来应用XGBoost的回归版本，看看它的性能。启动一个新的Jupyter Notebook，并按照梯度提升部分所示的相同先前步骤操作，直到完成train_test_split（或者继续使用同一个Jupyter\
    \ Notebook）。不要导入\"GradientBoostingRegressor\"，而是如下面所示导入\"XGBRegressor\"。对于分类问题，只需导入\"\
    XGBClassifier\"即可。在导入下面所示的\"XGBRegressor\"库之前，请确保使用Anaconda命令提示符使用以下命令安装此库：pip\
    \ install xgboost\n\n```\nfrom xgboost import XGBRegressor\n```\n\n接下来，让我们定义XGBoost参数。Objective设置为\"\
    reg:squarederror\"，它使用平方误差来最小化损失函数。\"n_estimators\"指定树的数量（正如之前多个部分所讨论的）。学习率定义了步长，这意味着所有树中的每个权重都将乘以这个值（在这种情况下使用了0.1）。学习率可以在0到1之间。\"\
    reg_alpha\"控制叶权重的L1正则化。较高的\"reg_alpha\"会导致更多的正则化。\"reg_lambda\"指定叶权重的L2正则化。\"\
    max_depth\"指定在任何提升运行期间树的最大深度。\"gamma\"根据预期的损失减少来决定是否继续对树的叶节点进行进一步分区。\n\n```\n\
    np.random.seed(seed)\n\nxgb=XGBRegressor(objective ='reg:squarederror',n_estimators=200,\n\
    reg_lambda=1, gamma=0,max_depth=3, learning_rate=0.1,\nreg_alpha=0.1)\n```\n\n\
    接下来，让我们将定义的模型\"xgb\"应用于拟合训练数据（70%训练）。此外，还如下获取\"y_pred_train\"和\"y_pred_test\"\
    ：\n\n```\nxgb.fit(X_train,y_train)\ny_pred_train=xgb.predict(X_train)\ny_pred_test=xgb.predict(X_test)\n\
    ```\n\n接下来，如下获取训练和测试数据集的R²：\n\n```\ncorr_train=np.corrcoef(y_train, y_pred_train)\
    \ [0,1]\nprint('Training Data R^2=',round(corr_train**2,4),'R=',\nround(corr_train,4))\n\
    Python output=Training Data R^2=0.9957 R=0.9979\n\ncorr_test=np.corrcoef(y_test,\
    \ y_pred_test) [0,1]\nprint('Testing Data R^2=',round(corr_test**2,4),'R=',\n\
    round(corr_test,4))\nPython output=Testing Data R^2=0.9138 R=0.9559\n```\n\n此外，如下可视化训练和测试的实际值与预测值：\n\
    \n```\nplt.figure(figsize=(10,8))\nplt.plot(y_train, y_pred_train, 'm.')\nplt.xlabel('NPV\
    \ Training Actual')\nplt.ylabel('NPV Training Prediction')\nplt.title('NPV Training\
    \ Actual Vs. Prediction')\nPython output=Fig. 5.64\n```\n\n让我们也如下获取30%测试数据的MAE、MSE和RMSE：\n\
    \n```\nfrom sklearn import metrics\nprint('MAE:', round(metrics.mean_absolute_error(y_test,\
    \ y_pred_test),5))\nprint('MSE:', round(metrics.mean_squared_error(y_test, y_pred_test),5))\n\
    print('RMSE:', round(np.sqrt(metrics.mean_squared_error(y_test, y_pred_test)),5))\n\
    Python output=MAE: 0.76514\nMSE: 1.06659\nRMSE: 1.03276\n```\n\n让我们也获取每个输入变量的特征重要性以及**排列特征重要性**。排列特征重要性定义为当单个特征值被随机打乱时模型分数的下降（Breiman,\
    \ 2011）。排列特征重要性通过计算模型分数的下降来评估输入和输出特征。模型分数下降越大，输入特征对模型的影响越大，其排名就越高。可以通过从\"sklearn.inspection\"\
    导入\"permutation_importance\"库并传入训练好的模型（在这种情况下是\"gb\"）、测试集（在这种情况下是\"X_test,y_test\"\
    ）、n_repeats（在这种情况下使用了10）和random_state（使用之前使用的种子数1000）来获得排列重要性。请注意，\"n_repeats\"\
    指的是特征被随机打乱的次数。在这个例子中，每个特征被随机打乱了10次，并返回特征重要性的样本。\n\n```\nfrom sklearn.inspection\
    \ import permutation_importance\nfeature_importance=gb.feature_importances_\n\
    sorted_features=np.argsort(feature_importance)\npos=np.arange(sorted_features.shape[0])\
    \ + .5\nfig=plt.figure(figsize=(12, 6))\nplt.subplot(1, 2, 1)\nplt.barh(pos, feature_importance[sorted_features],\n\
    \    align='center')\nplt.yticks(pos, np.array(df.columns)[sorted_features])\n\
    plt.title('Feature Importance')\nresult=permutation_importance(gb, X_test, y_test,\n\
    \    n_repeats=10,random_state=seed)\nsorted_idx=result.importances_mean.argsort()\n\
    plt.subplot(1, 2, 2)\nplt.boxplot(result.importances[sorted_idx].T, vert=False,\n\
    \    labels=np.array(df.columns)[sorted_idx])\nplt.title(\"Permutation Importance\
    \ (test set)\")\nfig.tight_layout()\nplt.show()\nPython output=Fig. 5.62\n```\n\
    \n让我们也调用\"result\"，它将在前两行显示每个特征的**平均**排列重要性分数（基于随机打乱10次）。接下来的两行显示每个特征随机打乱10次的**标准差**。最后，结果的其余部分显示每个特征的每个数组中**10个元素**的单个排列分数列表。由于有6个输入特征，因此也有6个数组，每个数组包含基于10次随机打乱的10个元素。\n\
    \nresult\nPython output=Fig. 5.63\n\n```\n{'importances_mean': array([ 5.62673558e-02,\
    \  4.21978379e-03, -1.68587786e-03,  1.08985184e-02,\n       1.29103662e-02, \
    \ 2.28967526e+00]),\n 'importances_std': array([0.01485314, 0.00449182, 0.00290839,\
    \ 0.00638356, 0.00391517,\n       0.27624977]),\n 'importances': array([[ 8.15151462e-02,\
    \  3.95292772e-02,  7.02221645e-02,\n         3.65059457e-02,  6.03294438e-02,\
    \  4.96642294e-02,\n         5.30148570e-02,  5.79832600e-02,  3.92243716e-02,\n\
    \         7.46848629e-02],\n       [ 7.44887785e-03,  9.59443016e-03,  2.58807132e-03,\n\
    \        -1.38147086e-03, -1.05835466e-03,  9.27570663e-03,\n         5.14050355e-03,\
    \  4.35297088e-03, -2.86902680e-03,\n         9.10612984e-03],\n       [ 4.48758354e-03,\
    \  1.25757307e-03, -2.61008665e-03,\n        -1.66488246e-03, -5.10349406e-03,\
    \ -3.54065341e-03,\n        -4.17053339e-03,  1.94360646e-04, -5.02201479e-03,\n\
    \        -6.86631099e-03],\n       [ 2.01027500e-02,  1.38400077e-02,  1.45205740e-02,\n\
    \         8.05278583e-03,  9.32294255e-04,  1.76246999e-02,\n         3.92768661e-03,\
    \  1.23552019e-02,  2.21219261e-03,\n         1.14429341e-02],\n       [ 1.92971526e-02,\
    \  1.29535259e-02,  1.81843586e-02,\n         1.41525885e-02,  1.00042563e-02,\
    \  9.58542022e-03,\n         9.02224063e-03,  1.14259918e-02,  7.47400867e-03,\n\
    \         1.70041187e-02],\n       [ 1.78325738e+00,  2.50606649e+00,  2.24622373e+00,\n\
    \         2.09877842e+00,  2.87685350e+00,  2.45690805e+00,\n         2.17434168e+00,\
    \  2.27078646e+00,  2.36532335e+00,\n         2.11821354e+00]])}\n```\n\n图 5.63\n\
    \n就像之前的例子一样，让我们应用10折交叉验证来查看结果R²，如下所示：\n\n```\nfrom sklearn.model_selection import\
    \ cross_val_score\nnp.random.seed(seed)\nscores_R2=cross_val_score(gb, x, y,cv=10,scoring='r2')\n\
    print(\" R2_Cross-validation scores: {}\". format(scores_R2))\nPython output=R2_Cross-validation\

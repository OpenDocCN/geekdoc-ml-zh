- md: '## Chapter 6


    ## Neural networks and Deep Learning


    ## Introduction and basic architecture of neural network


    Artificial Intelligence (AI) may be defined as the collection of analytical and
    numerical tools that try to learn and imitate a process. When the learning process
    is accomplished, AI is capable of handling and responding to new situations. Neural
    networks, genetic algorithms, and fuzzy logic are the building blocks of AI (Mohaghegh,
    2000).


    The neural network claims its artificial information processing correlates closely
    with biological neural networks. Neurons are the main elements comprising artificial
    neural networks. They pass signals between each other, like those of the human
    brain. The artificial neurons connect several inputs to one or multiple outputs
    by associated weights and nonlinear activation functions. When data are provided
    to neural networks, they undergo a learning process, by specific algorithms, to
    find the appropriate weights that describe the behavior of the output with respect
    to multiple inputs.


    Neural networks provide a high potential for exploring and analyzing large historical
    databases that don''t seem to be used in conventional modeling (Mohaghegh, 2000).
    In other words, neural networks should be applied in cases where mathematical
    modeling is impractical. The nature of the problems in the O&G industry is complex.
    These issues may be solved by unconventional methods such as AI.


    The artificial neural network was originally developed from the behavior of biological
    neurons in the brain by McCulloch and Pitts (Mohaghegh, 2000). The information
    processing in neural networks mimics mechanisms of neurons in biological systems.
    A schematic of the nervous system block body, which is also called a neuron, is
    shown in Fig. 6.1. Generally, a neuron consists of a cell body, axon, and dendrite
    connecting to another neuron with a synaptic connection. Information communication
    occurs through electrochemical signals that enter the cells through dendrites.
    Based on the characteristics of input, the neuron is stimulated and releases an
    output signal that passes through the axons. The action is referred to as "firing
    a signal" if a threshold is reached by a great enough electrical potential (Mohaghegh,
    2000). The output signal from one neuron is an input for another neuron, which
    generates a new electrochemical pulse as the output. Each module in the brain
    may have more than 100,000 neurons connecting to thousands of other neurons and
    forming the complex architecture for neural networks; this neural network architecture
    is the basis for the learning process in the human brain.


    Artificial neural networks are mathematically modeled based on the functionality
    of biological neural networks. From now on, neural networks and artificial neural
    networks will be used interchangeably. There are two main applications for neural
    networks: clustering (unsupervised classification) and finding a correlation between
    a set of numeric inputs (attributes) and outputs (targets). Neural networks generally
    consist of a series of "Neurons" in a sequential layering structure. Each input
    and output variable can be assigned to a node that is like a biological neuron.
    Nodes are gathered into layers, including an input layer, a hidden layer(s), and
    an output layer with the connected input and output layers as shown in Fig. 6.2.
    The topology of neural networks defines the number of hidden layers and the number
    of nodes in each hidden layer which are used to connect the input to the output
    layer. The connection between each of the two nodes (synapse from consecutive
    layers) is represented by weights *wij* in which *i* and *j* represent nodes in
    the input and output layers, respectively. The weight, as a given value, is like
    the strengths of the electrochemical signal. Excitatory reflections are designated
    by the weight''s positive values, while inhibitory ones are identified by negative
    values (Kriesel, 2005).


    Each node in the hidden layer receives signals from the input layer nodes, considers
    bias, and finally uses an activation function to produce an output signal. To
    explain this process (Fig. 6.2), assume "n" input nodes. Let''s represent the
    signal from the *i*th input node, *Ii*, signal weight from node *i* to node *j*,
    *wij*, and bias as *θj*. The action potential of the node *j* in the hidden layer
    (*hj*) is calculated as below-weighted summation.


    $$h_j = \sum_{i=1}^{N} w_{ij} \cdot I_i + \theta_j$$ (6.1)


    The bias or $\theta_j$ is a pseudo node with an output value of 1 and is used
    if the input value is 0. The final step is to calculate the node''s output (oj).
    The output is calculated using an activation function (F) that determines the
    amplitude of the output signal based on the action potential of the node ($h_j$).
    Based on the function type and a bias value, the activation function generates
    a value between 0 and 1, or $-1$ to 1. Generally, four types of activation functions
    (F) have been used in neural network models: (i) F_Step, (ii) F_ReLU, (iii) F_sigmoid,
    and (iv) F_tanh. Activation functions help neural networks to understand non-linear
    and complex patterns in the data.


    For $F_{step}$, activation function takes the value of 0 if action potential ($h_j$)
    is less than 0, and 1 *when it is equal or more than 0*.


    $$oj = F_{step}(hj) = \begin{cases} 0, & hj < 0 \\ 1, & hj \ge 0 \end{cases} \quad
    (6.2)$$


    Rectified linear unit (ReLU) is the most widely used activation function. If action
    potential is less than 0, the activation function would be 0. For action potential
    values greater than 0, activation function and action potential values are the
    same. In other words, ReLU is actually a maximum function in terms of $F_{ReLU}
    = Max(0, hj)$ or:


    $$oj = F_{ReLU}(hj) = \begin{cases} 0, & hj < 0 \\ hj, & hj \ge 0 \end{cases}
    \quad (6.3)$$


    The sigmoid function uses the following relation and ranges from 0 to 1. For large
    negative numbers, the sigmoid function returns 0 and for large positive numbers,
    it returns 1. The sigmoid activation function has been practiced less recently
    (compared with other activation functions). It is due to the fact that this function''s
    gradient would not be appropriate for weight optimization (will be discussed later)
    and also sigmoid outputs are not centered at 0.


    $$oj = F_{sigmoid}(hj) = \frac{1}{1 + e^{-hj}} \quad (6.4)$$


    Tanh activation function is similar to sigmoid function with a primary difference
    of returning values from $-1$ to 1. Tanh is preferred over the sigmoid activation
    function since it is zero centered with better gradient performance. All the mentioned
    activation functions are shown in Fig. 6.3.


    $$oj = F_{tanh}(hj) = tanh(hj) = \frac{1 - exp(-2hj)}{1 + exp(-2hj)} \quad (6.5)$$


    In order to solve the system of equations containing all the nodes in the neural
    network, linear algebra can be utilized by rewriting all the mentioned equations
    in a matrix form.


    For example, by assuming no bias, Formula 6.1 can be written as:


    $$H = W.I$$


    where W is the weights matrix, I is the input vector, and H is the action potential
    vector. To use the activation function and calculate the output vector for each
    hidden layer, it is possible to apply sigmoid functions to all the elements of
    vector H as follows:


    $$o = F(H)$$


    Neural network topologies are determined by connection patterns between neurons
    and propagation of data. The mentioned process can be repeated for each hidden
    layer considering that the output of the first hidden layer nodes would be the
    input for the second hidden layer. This consecutive process continues until the
    output of the last or final hidden layer is found. This process is called "feedforward,"
    when there is no feedback from the output results into the layers and units. The
    process of how these weights are optimized is explained in the next section.


    ## Backpropagation technique


    The objective of the training procedure in neural networks is to adjust the calculated
    weights until the model estimates the output values correctly. The backpropagation
    method requires updating the weights to minimize the error which is the difference
    between network outputs and the target values. These errors are filtered back
    through the network. The backpropagation process includes a feedforward calculation
    to find the initial output, an error'
  mdcn: '## 第六章


    ## 神经网络与深度学习


    ## 神经网络简介与基本架构


    人工智能（AI）可定义为一系列分析和数值工具的集合，旨在学习和模拟一个过程。当学习过程完成后，人工智能便能够处理和应对新的情况。神经网络、遗传算法和模糊逻辑是人工智能的基石（Mohaghegh,
    2000）。


    神经网络声称其人工信息处理与生物神经网络密切相关。神经元是构成人工神经网络的主要元素。它们彼此之间传递信号，就像人脑中的神经元一样。人工神经元通过关联权重和非线性激活函数，将多个输入连接到一个或多个输出。当数据输入神经网络时，它们会通过特定的算法经历一个学习过程，以找到合适的权重，这些权重描述了输出相对于多个输入的行为。


    神经网络在探索和分析那些在传统建模中似乎未被利用的大型历史数据库方面具有巨大潜力（Mohaghegh, 2000）。换句话说，神经网络应应用于数学建模不切实际的情况。石油和天然气行业的问题性质是复杂的。这些问题可以通过非常规方法（如人工智能）来解决。


    人工神经网络最初是由McCulloch和Pitts根据大脑中生物神经元的行为发展而来的（Mohaghegh, 2000）。神经网络中的信息处理模仿了生物系统中神经元的机制。图6.1展示了一个神经系统的示意性模块体，也称为神经元。通常，一个神经元由细胞体、轴突和树突组成，树突通过突触连接与另一个神经元相连。信息交流通过进入细胞的树突的电信号进行。根据输入的特性，神经元受到刺激并释放一个通过轴突传递的输出信号。如果电位达到足够大的阈值，该动作被称为“触发信号”（Mohaghegh,
    2000）。一个神经元的输出信号是另一个神经元的输入，后者产生一个新的电化学脉冲作为输出。大脑中的每个模块可能有超过100,000个神经元连接到数千个其他神经元，形成了神经网络的复杂架构；这种神经网络架构是人脑学习过程的基础。


    人工神经网络是基于生物神经网络的功能进行数学建模的。从现在起，神经网络和人工神经网络将互换使用。神经网络有两个主要应用：聚类（无监督分类）和寻找一组数值输入（属性）与输出（目标）之间的相关性。神经网络通常由一系列按顺序分层结构排列的“神经元”组成。每个输入和输出变量可以被分配到一个类似于生物神经元的节点。节点被组织成层，包括一个输入层、一个或多个隐藏层以及一个输出层，输入层和输出层相互连接，如图6.2所示。神经网络的拓扑结构定义了隐藏层的数量以及每个隐藏层中用于连接输入层到输出层的节点数量。两个节点之间的连接（来自连续层的突触）由权重
    *wij* 表示，其中 *i* 和 *j* 分别代表输入层和输出层中的节点。权重作为一个给定值，类似于电信号的强度。兴奋性反射由权重的正值表示，而抑制性反射则由负值表示（Kriesel,
    2005）。


    隐藏层中的每个节点接收来自输入层节点的信号，考虑偏置，最后使用激活函数产生输出信号。为了解释这个过程（图6.2），假设“n”个输入节点。让我们用 *Ii*
    表示来自第 *i* 个输入节点的信号，用 *wij* 表示从节点 *i* 到节点 *j* 的信号权重，用 *θj* 表示偏置。隐藏层中节点 *j* 的动作电位（*hj*）计算如下加权和。


    $$h_j = \sum_{i=1}^{N} w_{ij} \cdot I_i + \theta_j$$ (6.1)


    偏置或 $\theta_j$ 是一个输出值为1的伪节点，当输入值为0时使用。最后一步是计算节点的输出（oj）。输出使用激活函数（F）计算，该函数根据节点的动作电位（$h_j$）确定输出信号的幅度。根据函数类型和偏置值，激活函数生成一个介于0和1之间，或
    $-1$ 到 1 之间的值。通常，神经网络模型中使用了四种类型的激活函数（F）：(i) F_阶跃函数, (ii) F_ReLU, (iii) F_sigmoid,
    和 (iv) F_tanh。激活函数帮助神经网络理解数据中的非线性和复杂模式。


    对于 $F_{step}$，如果动作电位（$h_j$）小于0，激活函数取值为0，*当它大于或等于0时* 取值为1。


    $$oj = F_{step}(hj) = \begin{cases} 0, & hj < 0 \\ 1, & hj \ge 0 \end{cases} \quad
    (6.2)$$


    修正线性单元（ReLU）是使用最广泛的激活函数。如果动作电位小于0，激活函数值为0。对于大于0的动作电位值，激活函数值与动作电位值相同。换句话说，ReLU实际上是一个最大值函数，即
    $F_{ReLU} = Max(0, hj)$ 或：


    $$oj = F_{ReLU}(hj) = \begin{cases} 0, & hj < 0 \\ hj, & hj \ge 0 \end{cases}
    \quad (6.3)$$


    Sigmoid函数使用以下关系式，其值范围从0到1。对于大的负数，sigmoid函数返回0；对于大的正数，它返回1。Sigmoid激活函数最近的使用较少（与其他激活函数相比）。这是因为该函数的梯度可能不适合权重优化（稍后讨论），并且sigmoid的输出不是以0为中心的。


    $$oj = F_{sigmoid}(hj) = \frac{1}{1 + e^{-hj}} \quad (6.4)$$


    Tanh激活函数与sigmoid函数类似，主要区别在于其返回值范围从 $-1$ 到 1。Tanh比sigmoid激活函数更受青睐，因为它是以0为中心的，并且具有更好的梯度性能。所有上述激活函数如图6.3所示。


    $$oj = F_{tanh}(hj) = tanh(hj) = \frac{1 - exp(-2hj)}{1 + exp(-2hj)} \quad (6.5)$$


    为了求解包含神经网络中所有节点的方程组，可以通过将所有上述方程重写为矩阵形式来利用线性代数。


    例如，假设没有偏置，公式6.1可以写成：


    $$H = W.I$$


    其中W是权重矩阵，I是输入向量，H是动作电位向量。为了使用激活函数并计算每个隐藏层的输出向量，可以将sigmoid函数应用于向量H的所有元素，如下所示：


    $$o = F(H)$$


    神经网络的拓扑结构由神经元之间的连接模式和数据传播方式决定。上述过程可以对每个隐藏层重复进行，同时考虑到第一个隐藏层节点的输出将是第二个隐藏层的输入。这个连续的过程持续进行，直到找到最后一个或最终隐藏层的输出。当输出结果没有反馈到层和单元时，这个过程被称为“前馈”。这些权重如何优化的过程将在下一节中解释。


    ## 反向传播技术


    神经网络训练过程的目标是调整计算出的权重，直到模型能够正确估计输出值。反向传播方法需要更新权重以最小化误差，即网络输出与目标值之间的差异。这些误差通过网络反向传播。反向传播过程包括一个前馈计算以找到初始输出，一个误差'

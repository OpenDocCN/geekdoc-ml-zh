    # Heat maps


    The next very important plot to identify relationship between parameters is called
    a heat map and "sns.heatmap()" can be used to perform such plotting. In addition
    to plotting the heat map, it is extremely important to add the Pearson correlation
    coefficient inside the heat map to identify collinear parameters. The Pearson
    correlation is calculated as follows:


    $$P_{X, Y} = \frac{cov(X, Y)}{\sigma_X \sigma_Y}$$ (2.2)


    where cov(X,Y) is covariance between parameters X and Y, $\sigma_X$ is standard
    deviation of parameter X, and $\sigma_Y$ is standard deviation of parameter Y.
    Pearson correlation coefficient ranges between -1 and 1. Positive values indicate
    the tendency of one variable to increase or decrease respective to another variable.
    Negative values, on the other hand, indicate the tendency that the increase in
    value of one variable is due to the decrease in the value of another variable
    and vice versa. The square of correlation coefficient (R) is referred to as the
    coefficient of determination ($R^2$). (Pearson''s Correlation Coefficient, 2008).
    Please note that the general rule of thumb is to remove collinear input variables
    with |±90%| as those variables provide the same information; hence are redundant
    and would increase the dimensionality of the input data set. Unless those collinear
    parameters happen to be collinear due to other factors such as timing, it is best
    to remove those parameters. For example, the oil and gas



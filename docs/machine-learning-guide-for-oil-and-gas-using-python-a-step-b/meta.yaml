- md: '## KDE plots


    KDE stands for kernel density estimate and is used to visualize the probability
    density of a continuous variable and is used for nonparametric analysis. Please
    note that KDE plots can be useful in determining the shape of a distribution.
    When KDE is applied to a single parameter, the density of the observation is plotted
    on one axis and the height on the other axis ([Visualizing the Distribution of
    a Dataset, n.d.](https://example.com)). "sns.kdeplot()" method can be used to
    plot kde. Below is an example of plotting water saturation versus EUR (bivariate
    density plot). "cmap = ''Reds''" color maps the plot using a red color and "shade
    = True" provides shade in the area under the KDE curve.


    ```

    sns.kdeplot(df_Shale[''Water Saturation''],df_Shale[''EUR''],cmap=''Reds'',

    shade=True, shade_lowest=False)

    Python output=Fig. 2.28

    ```


    ## Heat maps


    The next very important plot to identify relationship between parameters is called
    a heat map and "sns.heatmap()" can be used to perform such plotting. In addition
    to plotting the heat map, it is extremely important to add the Pearson correlation
    coefficient inside the heat map to identify collinear parameters. The Pearson
    correlation is calculated as follows:


    $$P_{X, Y} = \frac{cov(X, Y)}{\sigma_X \sigma_Y}$$ (2.2)


    where cov(X,Y) is covariance between parameters X and Y, $\sigma_X$ is standard
    deviation of parameter X, and $\sigma_Y$ is standard deviation of parameter Y.
    Pearson correlation coefficient ranges between -1 and 1. Positive values indicate
    the tendency of one variable to increase or decrease respective to another variable.
    Negative values, on the other hand, indicate the tendency that the increase in
    value of one variable is due to the decrease in the value of another variable
    and vice versa. The square of correlation coefficient (R) is referred to as the
    coefficient of determination ($R^2$). (Pearson''s Correlation Coefficient, 2008).
    Please note that the general rule of thumb is to remove collinear input variables
    with |±90%| as those variables provide the same information; hence are redundant
    and would increase the dimensionality of the input data set. Unless those collinear
    parameters happen to be collinear due to other factors such as timing, it is best
    to remove those parameters. For example, the oil and gas industry switched to
    tighter stage spacing and higher proppant loading around the same time. Therefore,
    a Pearson correlation coefficient might indicate negative collinearity between
    these two parameters; however, in essence, this is due to timing rather than the
    inherent collinearity between these two variables. In this particular example,
    two separate models can be trained to understand the impact of each variable on
    the model. Let''s use the "sns.heatmap()" to visualize this. As illustrated below,
    "df_Shale.corr()," used to define Pearson correlation coefficient in Python (the
    default method when calling ".corr()" is ''pearson''), would be used to plot the
    heat map and "annot = True" would show the actual values on the heat map. With
    setting "annot = False," the Pearson correlation values will be shown on the heat
    map. Note that other methods such as "spearman" and "kendall" could also be passed
    using "df_Shale.corr(method=''spearman'')" instead of the "pearson" method which
    is the default case.


    ```

    fig=plt.figure(figsize=(17,8))

    sns.heatmap(df_Shale.corr(), cmap=''coolwarm'', annot=True,

    linewidths=4, linecolor=''black'')

    Python output=Fig. 2.29

    ```


    ## Cluster maps


    Cluster maps can be used to plot a matrix data set as a hierarchically clustered
    heat map and seaborn has a powerful built-in function for that purpose. Hierarchical
    clustering concept is discussed in detail in unsupervised clustering chapter of
    this book. Therefore, in this section, an example with the code is illustrated
    without explaining the concept. To visualize, let''s import the natural gas pricing
    csv file located below.


    https://www.elsevier.com/books-and-journals/book-companion/9780128219294


    The code below illustrates importing a csv file called "Chapter2_Natural_Gas_Pricing_Version2_DataSet,"
    followed by pivoting the df_ngp data frame by using the "Month" column as rows,
    "Prior to 2000" column as columns, and using average of gas pricing per month
    as "values." For illustration purpose of this example, note that "Prior to 2000"
    column is an arbitrary categorical column that has 0 for each gas pricing before
    year 2000 and 1 after year 2000. Afterward, a heat map of gas pricing per month
    can simply be visualized.


    ```

    df_ngp=pd.read_csv(''Chapter2_Natural_Gas_Pricing_Version2_DataSet.csv'')

    df_ngp_pivot=df_ngp.pivot_table(values=''Value'',index=''Month'',

    columns=''Prior to 2000'')

    fig=plt.figure(figsize=(10,5))

    sns.heatmap(df_ngp_pivot,annot=True,linecolor=''white'',

    linewidths=3)

    Python output=Fig. 2.30

    ```


    Next, let''s use "sns.clustermap()" to use a hierarchically clustered heat map
    to visualize the data. "standard_scale = 1" standardizes the dimension in which
    for each row or column, the minimum is subtracted and divided by its maximum.


    ```

    sns.clustermap(df_ngp_pivot,cmap=''coolwarm'',standard_scale=1)

    Python output=Fig. 2.31

    ```


    ## PairGrid plots


    PairGrid plots are similar to pair plots in which all variables are plotted against
    one another (as was previously illustrated). PairGrid plots simply provide more
    flexibility to create various plots and customize the plots. In the example below,
    a PairGrid plot of df_Shale data frame is created. A histogram was used to plot
    all the diagonal plots, the upper portion above the diagonal is scatter plots,
    and the lower portion is KDE plots. Please note that "Category" was used to distinguish
    between "New Design" and "Vintage." Pay attention to the bold texts within the
    script.


    ```

    Shale_Properties=sns.PairGrid(df_Shale, hue=''Category'')

    Shale_Properties.map_diag(plt.hist)

    Shale_Properties.map_upper(plt.scatter)

    Shale_Properties.map_lower(sns.kdeplot)

    Python output=Fig. 2.32

    ```


    ## Plotly and cufflinks


    Plotly is an open-source **interactive** visualization library in Python, and
    the quality of the plots is higher than matplotlib and seaborn. Plotly provides
    many interactive features such as zooming in/out, panning, box and lasso selection,
    auto scaling, etc. In addition, hovering over the plot will show the underlying
    data behind each point which makes it a super powerful visualization library.
    The quality of the pictures makes plotly a perfect library for presentation purposes
    as well. One of the advantages of plotly is that it is like "R" in the event the
    user is a fan of plots created within the R programming language.'
  mdcn: '## KDE 图


    KDE 代表核密度估计，用于可视化连续变量的概率密度，并用于非参数分析。请注意，KDE 图在确定分布形状方面很有用。当 KDE 应用于单个参数时，观测值的密度绘制在一个轴上，高度绘制在另一个轴上（[可视化数据集的分布，无日期](https://example.com)）。可以使用
    `sns.kdeplot()` 方法绘制 KDE。下面是绘制含水饱和度与 EUR 的示例（双变量密度图）。`cmap = ''Reds''` 颜色映射使用红色绘制图表，`shade
    = True` 在 KDE 曲线下方区域提供阴影。


    ```

    sns.kdeplot(df_Shale[''Water Saturation''],df_Shale[''EUR''],cmap=''Reds'',

    shade=True, shade_lowest=False)

    Python output=Fig. 2.28

    ```


    ## 热力图


    下一个用于识别参数间关系的非常重要的图表称为热力图，可以使用 `sns.heatmap()` 进行此类绘图。除了绘制热力图外，在热力图内添加皮尔逊相关系数以识别共线参数也极其重要。皮尔逊相关系数计算如下：


    $$P_{X, Y} = \frac{cov(X, Y)}{\sigma_X \sigma_Y}$$ (2.2)


    其中 cov(X,Y) 是参数 X 和 Y 之间的协方差，$\sigma_X$ 是参数 X 的标准差，$\sigma_Y$ 是参数 Y 的标准差。皮尔逊相关系数的范围在
    -1 和 1 之间。正值表示一个变量相对于另一个变量增加或减少的趋势。另一方面，负值表示一个变量值的增加是由于另一个变量值的减少，反之亦然。相关系数 (R)
    的平方称为决定系数 ($R^2$)。(皮尔逊相关系数, 2008)。请注意，一般经验法则是移除相关系数绝对值在 |±90%| 以上的共线输入变量，因为这些变量提供相同的信息；因此是冗余的，并且会增加输入数据集的维度。除非这些共线参数恰好由于其他因素（如时间）而共线，否则最好移除这些参数。例如，油气行业几乎在同一时间转向更紧密的井段间距和更高的支撑剂负载。因此，皮尔逊相关系数可能显示这两个参数之间存在负共线性；然而，本质上，这是由于时间因素，而不是这两个变量之间固有的共线性。在这个特定示例中，可以训练两个独立的模型来理解每个变量对模型的影响。让我们使用
    `sns.heatmap()` 来可视化这一点。如下所示，`df_Shale.corr()`（在 Python 中用于定义皮尔逊相关系数，调用 `.corr()`
    时的默认方法是 ''pearson''）将用于绘制热力图，`annot = True` 将在热力图上显示实际值。设置 `annot = False` 时，皮尔逊相关值将显示在热力图上。请注意，也可以使用
    `df_Shale.corr(method=''spearman'')` 传递其他方法，如 "spearman" 和 "kendall"，而不是默认情况下的
    "pearson" 方法。


    ```

    fig=plt.figure(figsize=(17,8))

    sns.heatmap(df_Shale.corr(), cmap=''coolwarm'', annot=True,

    linewidths=4, linecolor=''black'')

    Python output=Fig. 2.29

    ```


    ## 聚类图


    聚类图可用于将矩阵数据集绘制为层次聚类热力图，seaborn 为此目的提供了一个强大的内置函数。层次聚类的概念在本书的无监督聚类章节中有详细讨论。因此，在本节中，将通过代码示例进行说明，而不解释概念。为了可视化，让我们导入下面的天然气定价
    csv 文件。


    https://www.elsevier.com/books-and-journals/book-companion/9780128219294


    下面的代码演示了导入名为 "Chapter2_Natural_Gas_Pricing_Version2_DataSet" 的 csv 文件，然后使用 "Month"
    列作为行，"Prior to 2000" 列作为列，并使用每月天然气价格的平均值作为 "values" 来透视 df_ngp 数据框。为了本示例的说明目的，请注意
    "Prior to 2000" 列是一个任意的分类列，对于 2000 年之前的每个天然气价格为 0，之后为 1。之后，可以简单地可视化每月天然气价格的热力图。


    ```

    df_ngp=pd.read_csv(''Chapter2_Natural_Gas_Pricing_Version2_DataSet.csv'')

    df_ngp_pivot=df_ngp.pivot_table(values=''Value'',index=''Month'',

    columns=''Prior to 2000'')

    fig=plt.figure(figsize=(10,5))

    sns.heatmap(df_ngp_pivot,annot=True,linecolor=''white'',

    linewidths=3)

    Python output=Fig. 2.30

    ```


    接下来，让我们使用 `sns.clustermap()` 来使用层次聚类热力图可视化数据。`standard_scale = 1` 标准化维度，对于每一行或每一列，减去最小值并除以其最大值。


    ```

    sns.clustermap(df_ngp_pivot,cmap=''coolwarm'',standard_scale=1)

    Python output=Fig. 2.31

    ```


    ## PairGrid 图


    PairGrid 图类似于配对图，其中所有变量相互绘制（如前所述）。PairGrid 图只是提供了更大的灵活性来创建各种图表并自定义图表。在下面的示例中，创建了
    df_Shale 数据框的 PairGrid 图。直方图用于绘制所有对角线图，对角线上方的部分是散点图，下方部分是 KDE 图。请注意，"Category"
    用于区分 "New Design" 和 "Vintage"。注意脚本中的粗体文本。


    ```

    Shale_Properties=sns.PairGrid(df_Shale, hue=''Category'')

    Shale_Properties.map_diag(plt.hist)

    Shale_Properties.map_upper(plt.scatter)

    Shale_Properties.map_lower(sns.kdeplot)

    Python output=Fig. 2.32

    ```


    ## Plotly 和 cufflinks


    Plotly 是一个开源的**交互式** Python 可视化库，其图表质量高于 matplotlib 和 seaborn。Plotly 提供了许多交互功能，如缩放、平移、框选和套索选择、自动缩放等。此外，将鼠标悬停在图表上会显示每个点背后的基础数据，这使其成为一个超级强大的可视化库。图片的质量使得
    plotly 也非常适合用于演示目的。plotly 的优势之一是，如果用户喜欢在 R 编程语言中创建的图表，它就像 "R" 一样。'

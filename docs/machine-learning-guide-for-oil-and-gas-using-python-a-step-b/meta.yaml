    \ were covered under decision tree and the rest will be covered here. \"n_estimators\"\
    \ defines the number of trees in the forest. Usually the higher this number, the\
    \ more accurate the model is without leading to overfitting. In the example below,\
    \ \"n_estimators\" is set to be 5000 which means 5000 independent decision trees\
    \ will be constructed and the average of the 5000 trees will be used as the predicted\
    \ value for each prediction row. \"criterion\" of \"mse\" was chosen for this\

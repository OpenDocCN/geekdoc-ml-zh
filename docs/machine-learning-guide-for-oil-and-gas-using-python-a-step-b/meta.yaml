    Groupby can also be performed on multiple columns at one time. For example, to
    group by two columns named "col_name1" and "col_name_2" on a data frame called
    "df" and perform an average aggregate function, use the following format:


    ```

    df.groupby([''col_name_1'', ''col_name_2'']).mean()

    ```


    Other useful built-in pandas aggregation functions are listed below:


    +   - count() = total number of items

    - mean(), median() = mean and median

    - first(), last() = first and last item

    - std(), var() = standard deviation and variance

    - mad() = mean absolute deviation

    - prod() = product of all items

    - size() = calculate group sizes

    - sum() = calculate sum of group values


    Another useful way of utilizing the groupby function is to apply the describe
    function to create a summary by a column name.


    ```

    df.groupby(''Corporation_Name'').describe().transpose()


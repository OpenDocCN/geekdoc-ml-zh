- md: "The next important parameter that has a **significant** impact on outlier detection\
    \ in a data set is referred to as \"contamination.\" \"Contamination\" refers\
    \ to the expected proportion of the outliers and it ranges between 0 and 1. The\
    \ lower the number, the less number of outliers that will be identified. Higher\
    \ \"contamination\" values will lead to a higher number of outliers in a data\
    \ set. Therefore, please spend a few minutes and change the contamination value\
    \ from 0.1 to 0.2, 0.3, ..., 0.9 to observe the difference in outlier detection.\
    \ Once the clf model is defined, use \"clf.fit(df)\" to apply this defined model\
    \ to the \"df\" data frame.\n\n```python\nfrom sklearn.ensemble import IsolationForest\n\
    clf=IsolationForest(n_estimators=100,\n    max_samples=250,random_state=100, contamination=0.1)\n\
    clf.fit(df)\n```\n\nAs shown in Fig. 4.32, the warning message essentially indicates\
    \ that since \"max_sample\" of 250 was entered as the input and it is greater\
    \ than the total number of samples (which is 200 in this exercise), \"max_sample\"\
    \ will be set to 200.\n\nNext, let's obtain the isolation forest scores using\
    \ \"clf.decision_function(df),\" place it in the \"df\" data frame, and use a\
    \ histogram to plot the \"df['Scores']\" as follows. The negative score values\
    \ indicate presence of anomalous points.\n\n```python\ndf['Scores']=clf.decision_function(df)\n\
    plt.figure(figsize=(12,8))\nplt.hist(df['Scores'])\nplt.title('Histogram of Average\
    \ Anomaly Scores: Lower Scores=More\\nAnomalous Samples')\n```\n\nPlease feel\
    \ free to call \"df\" to observe the resulting \"df\" data frame with the added\
    \ \"Scores\" column. The next step is to predict the anomalies by applying \"\
    clf.predict(df.iloc[:,:4])\" to the first 4 columns of \"PE_Age,\" \"PE_Income,\"\
    \ \"PE_Spending habits,\" and \"PE_gender_male.\" Do not apply the \"predict\"\
    \ function to \"df\" since anomaly scores were added in the previous step. After\
    \ applying the \"predict\" function to the first 4 columns, let's look at the\
    \ resulting anomalous rows that were classified as \"-1.\" \"-1\" means presence\
    \ of anomalies and \"1\" represents normal data points.\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_162_0.png)\n\
    \n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_163_0.png)\n\nFIGURE 4.33 Histogram\
    \ of average anomaly scores.\n\n```python\ndf['Anomaly']=clf.predict(df.iloc[:,:4])\n\
    Anomaly=df.loc[df['Anomaly']==-1]\nAnomaly_index=list(Anomaly.index)\nAnomaly\n\
    ```\n\nFinally, let's visualize the outlier points on a scatter plot of PE_Income\
    \ and PE_Spending_Habits and color coded by the anomaly points.\n\n| Petroleum_Engineer_Age\
    \ | Petroleum_Engineer_Income (K$) | Spending_Habits (From 1 to 100) | Petroleum_Engineer_Gender_Male\
    \ | Scores | Anomaly |\n|---|---|---|---|---|---|\n| 0 | 19 | 34.676354 | 37.05\
    \ | 1 | -0.032601 | -1 |\n| 1 | 21 | 34.676354 | 76.95 | 1 | -0.004939 | -1 |\n\
    | 2 | 20 | 36.988111 | 5.70 | 0 | -0.060046 | -1 |\n| 6 | 35 | 41.611625 | 5.70\
    \ | 1 | -0.006933 | -1 |\n| 8 | 64 | 43.923382 | 2.85 | 1 | -0.058308 | -1 |\n\
    | 10 | 67 | 43.923382 | 13.30 | 1 | -0.058579 | -1 |\n| 12 | 58 | 46.235139 |\
    \ 14.25 | 0 | -0.012855 | -1 |\n| 14 | 37 | 46.235139 | 12.35 | 1 | -0.010101\
    \ | -1 |\n| 18 | 52 | 53.170410 | 27.55 | 1 | -0.008263 | -1 |\n| 30 | 60 | 69.352708\
    \ | 3.80 | 0 | -0.011495 | -1 |\n| 32 | 53 | 76.287979 | 3.80 | 1 | -0.000866\
    \ | -1 |\n| 33 | 18 | 76.287979 | 87.40 | 1 | -0.024124 | -1 |\n| 40 | 65 | 87.846764\
    \ | 33.25 | 0 | -0.001817 | -1 |\n| 140 | 57 | 173.381770 | 4.75 | 1 | -0.014385\
    \ | -1 |\n| 162 | 19 | 187.252312 | 4.75 | 1 | -0.008069 | -1 |\n| 178 | 59 |\
    \ 214.993395 | 13.30 | 1 | -0.005844 | -1 |\n| 194 | 47 | 277.410632 | 15.20 |\
    \ 0 | -0.009086 | -1 |\n| 196 | 45 | 291.281374 | 26.60 | 0 | -0.033078 | -1 |\n\
    | 198 | 32 | 316.710700 | 17.10 | 1 | -0.044971 | -1 |\n| 199 | 30 | 316.710700\
    \ | 78.85 | 1 | -0.040967 | -1 |\n\nFIGURE 4.34 Anomalous data.\n\n```python\n\
    plt.figure(figsize=(12,8))\ngroups=df.groupby('Anomaly')\nfor name, group in groups:\n\
    \    plt.plot(group['Petroleum_Engineer_Income (K$)'],\n             group['Spending_Habits\
    \ (From 1 to 100)'],\n             marker='o', linestyle='', label=name)\nplt.xlabel('Petroleum\
    \ Engineer Income')\nplt.ylabel('Spending Habits')\nplt.title('Isolation Forests\
    \ - Anomalies')\n```\n\n## Local outlier factor (LOF)\n\nLOF is another useful\
    \ unsupervised ML algorithm that identifies outliers with respect to the local\
    \ neighborhoods as opposed to using the entire data distribution (Breunig et al.,\
    \ 2000). LOF is a density-based technique that uses the nearest neighbor search\
    \ to identify the anomalous points. The advantage of using an LOF is identifying\
    \ points that are outliers relative to a local cluster of points. For instance,\
    \ when using the local outlier factor technique, neighbors of a certain points\
    \ are identified and compared against the density of the neighboring points. The\
    \ following steps can be applied when using an LOF model:\n\n- 1) Calculate distance\
    \ between P and all the given points using a distance function such as euclidean\
    \ or Manhattan.\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_164_0.png)\n\n- 2)\
    \ Find the k (k-nearest neighbor) closest point. For example, if K = 3, find the\
    \ third nearest neighbor’s distance.\n- 3) Find the k closest points.\n- 4) Find\
    \ local reachability density using the following equation:\n\n$$lrd_k(O) = \\\
    frac{\\|N_k(O)\\|}{\\sum_{O' \\in N_k(O)} reachdist_k(O' \\leftarrow O)}$$\n\n\
    where reachable distance can be calculated as follows:\n$$reachdist_k(O' \\leftarrow\
    \ O) = \\max\\{dist_k(O), \\ dist(O, \\ O')\\}$$\nPlease note that Nk(O) refers\
    \ to the number of neighbors.\n- 5) The last step is to calculate the local outlier\
    \ factor as follows:\n\n$$LOF_k(O) = \\frac{\\sum_{O' \\in N_k(O)} \\frac{lrd_k(O')}{lrd_k(O)}}{\\\
    |N_k(O)\\|}$$\n\n## Local outlier factor using scikit-learn\n\nScikit-learn library\
    \ can also be used to apply local outlier factor algorithm. One of the main steps\
    \ that should not be forgotten before applying LOF is to make sure to standardize\
    \ the data prior to applying the algorithm. LOF is based on a nearest neighbor\
    \ approach where distance calculations are used. Therefore, features with higher\
    \ magnitudes will dominate the distance calculation. Hence, let’s use the same\
    \ data set that was used to apply isolation forest algorithm and standardize the\
    \ data set prior to applying LOF. To avoid confusion, please start a new Jupyter\
    \ Notebook, import the necessary libraries, import the isolation forest data set\
    \ (call it df), apply \"pd.get_dummies\" exactly as was shown previously, and\
    \ standardize the data as follows:\n\n```python\nfrom sklearn.preprocessing import\
    \ StandardScaler\nscaler=StandardScaler()\ndf_scaled=scaler.fit(df)\ndf_scaled=scaler.transform(df)\n\
    ```\n\nNext, let’s import the LOF library, define the model with 40 neighbors,\
    \ contamination of 0.1, use euclidean distance calculation, and apply \"fit(df_scaled)\"\
    \ as shown below. Please note that a large **n_neighbor** or **K** could lead\
    \ to points that are far away from the highest density regions to be misclassified\
    \ as outliers even though those points could be part of a cluster of points. On\
    \ the other hand, if K is too small, it could lead to misclassification of outliers\
    \ with respect to a very small local region of points. Therefore, it is highly\
    \ recommended to alternate K until a satisfactory level of outlier detection is\
    \ achieved.\n\n```python\nfrom sklearn.neighbors import LocalOutlierFactor\nclf=LocalOutlierFactor(n_neighbors=40,\
    \ contamination=.1,\n    metric='euclidean')\nclf.fit(df_scaled)\n```\n\nThe abnormality\
    \ scores of the training samples can be obtained using \"negative_outlier_factor_\"\
    \ attribute. Next, let's plot \"clf.negative_outlier_factor_\" in a histogram.\
    \ Please note that **smaller** abnormality score indicates more **anomalous points**.\
    \ To find the outlier points, simply rank the abnormality score from highest to\
    \ lowest. The smallest values indicate the outlier points.\n\n```python\ndf_scaled=pd.DataFrame(df_scaled,\n\
    \    columns=['Petroleum_Engineer_Age',\n    'Petroleum_Engineer_Income (K$)',\n\
    \    'Spending_Habits (From 1 to 100)',\n    'Petroleum_Engineer_Gender_Male'])\n\
    df_scaled['Scores']=clf.negative_outlier_factor_\nplt.figure(figsize=(12,8))\n\
    plt.hist(df_scaled['Scores'])\nplt.title('Histogram of Negative Outlier Factor')\n\
    ```\n\nNext, let's use \"clf.fit_predict\" and apply it to the first 4 columns\
    \ (excluding the abnormality score column that was just added). Afterward, locate\
    \ the anomaly by identifying anomaly of \"-1.\" Please note that the anomalies\
    \ of −1 represent outlier points and the anomalies of 1 represent normal points.\
    \ Also note that since the data were standardized prior to applying LOF, the new\
    \ added columns were simply added to the \"df_scaled\"\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_166_0.png)\n\
    \nFIGURE 4.36 Histogram of negative outlier factor."

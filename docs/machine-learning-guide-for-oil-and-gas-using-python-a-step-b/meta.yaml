    x_2)$ 的规则触发强度量化了给定一组精确输入值 $x_1, x_2$ 时规则前提的强度。请注意，前提可以具有输入变量的不同组合，例如 AND、OR、NOT。计算每条规则的触发强度根据该规则中使用的模糊集运算而有所不同（参见模糊集运算部分）。例如，考虑输入值：温度表示为
    $x_1 = 75^\circ F$，湿度表示为 $x_2 = 43\%$，



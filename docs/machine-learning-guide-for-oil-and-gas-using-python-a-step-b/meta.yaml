    \ to predict the missing y values. This is accomplished for each feature in an\
    \ iterative fashion and it is repeated for \"max_iter\" imputation rounds. Let's\
    \ apply iterative imputer to the standardized data set as follows:\n\n```\nfrom\
    \ fancyimpute import IterativeImputer\nX_filled_ii=IterativeImputer(max_iter=10).fit_transform(df_scaled)\n\

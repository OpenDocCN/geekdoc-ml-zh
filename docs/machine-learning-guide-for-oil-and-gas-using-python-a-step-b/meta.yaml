    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_410_0.png)


    FIGURE 8.25 3D choke adjustment decision values for THP and q ranges.


    In K-means clustering, first, the number of clusters is set and then random centroids
    are assigned to each cluster. Afterward, the distances (i.e., euclidean) between
    the data points and centroids are calculated. Data points are assigned to each
    class based on having a minimum distance to class centroids. New centroids for
    each class are calculated and then data points are reassigned to each class based
    on a newly calculated distance to each class centroid. These steps (calculating
    new centroids, calculating distances, and reassigning data to each class) are
    repeated until centroids remain the same as previous step (converged). In this
    technique, each data point belongs to just one class based on having a minimum
    distance to the class’ centroid. In fuzzy clustering, which is also called "fuzzy
    c-means" clustering, it is possible that each data point belongs to many classes
    by calculating membership of each data point to the class centers.


    In order to understand how fuzzy c-means clustering works, let’s assume $X = \{x_1,
    x_2, \cdots, x_n\}$ is the data set space. Each data point has m attributes so
    $x_i$ can be defined as a vector of attributes $x_i = (x_{i1}, x_{i2}, \cdots,
    x_{im})$. The space is m-dimensional. Therefore, $x_{ij}$ can be considered as
    $j$th attribute for the $i$th data point. Imagine there are c clusters in the
    data set so the set of clusters is defined as $C = \{C_1, C_2, \cdots, C_c\}$.
    For each cluster in the C space, a centroid v is determined which belongs to V
    space defined as $V = \{v_1, v_2, \cdots, v_c\}$. Since the data set is m-dimensional,
    each centroid has m attributes as $v_i = (v_{i1}, v_{i2}, \cdots, v_{im})$. For
    each data point, it is possible to determine its'
  merge: -1
  pgno: 410
- img_proc: true
  md: 'degree of membership ($u_{ik}$) to each class using Eq. (8.28). Since there
    are n data points and c clusters, a fuzzy partition matrix is formed as $U = (u_{ik})_{(n
    \times c)}$ where $u_{ik}$ is the degree of membership of the $i^{th}$ data point
    to $k^{th}$ cluster and $\sum_{k=1}^{c} u_{ik} = 1$. The final goal in the fuzzy
    c-means clustering algorithm is to minimize an objective function $J_h(U, V)$
    which is the quadratic sum of the weighted distances of each data point to each
    class centroid (Ren et al., 2016):


    $$J_h(U, V) = \sum_{k=1}^{c} \sum_{i=1}^{n} u_{ik}^f d_{ik}^2 \quad (8.27)$$


    In Eq. (8.27), $d_{ik}$ is the euclidean distance between $ith$ data set and $kth$
    class centroid, and f is class fuzziness index. As f increases, it is expected
    to see fuzzier memberships. Generally, f should be in the range of 1.5–2.5 and
    is typically assumed to be 2. Fuzzy c-means clustering is an iterative process
    that starts from randomized initialization of membership degrees and updating
    centroids and membership degrees until minimization criteria for objective function
    are met. In each iteration, membership values ($u_{ik}$) and centroids ($v_k$)
    are calculated and updated using Eqs. (8.28) and (8.29):


    $$u_{ik} = \frac{1}{\sum_{j=1}^{c} \left( \frac{d_{ik}}{d_{jk}} \right)^{2/(f-1)}}
    \quad (8.28)$$


    $$v_k = \frac{\sum_{i=1}^{n} u_{ik}^f x_i}{\sum_{i=1}^{n} u_{ik}^f} \quad (8.29)$$


    The algorithm for fuzzy c-means clustering works by iterative process through
    the following steps:


    +   1. Initializing values for class number (c), fuzziness index (f), maximum
    number of iterations ($I_{max}$), and a threshold for error (e).

    2. Initializing fuzzy membership matrix $U^{(0)}$ randomly.

    3. Determining class centroids ($V^{(t)}$) by Eq. (8.29) at step t.

    4. Calculating the objective function ($J_h^t$) by Eq. (8.27). If $J_h^t - J_h^{t-1}
    < e$ and t is less than maximum number of iterations (Imax) then stop the algorithm;
    otherwise repeat steps 2, 3, and 4.


    Fuzzy c-means clustering is a simple algorithm with low computation cost and fast
    run time. However, similar to other clustering techniques, it may suffer from
    the fact that initialization of the fuzzy membership matrix, initialization for

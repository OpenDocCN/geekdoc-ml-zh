    algorithm to model the problem. Note that in this phase of the ML analysis, various
    algorithms should be evaluated to be able to pick the most effective algorithm.
    There is no one solution fits all algorithm and the underlying data will dictate
    the type of algorithm to be used for the problem. There are'

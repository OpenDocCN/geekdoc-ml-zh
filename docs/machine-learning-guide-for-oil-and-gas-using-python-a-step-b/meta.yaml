  md: '# Chapter 6


    # Neural networks and Deep Learning


    # Introduction and basic architecture of neural network


    Artificial Intelligence (AI) may be defined as the collection of analytical and
    numerical tools that try to learn and imitate a process. When the learning process
    is accomplished, AI is capable of handling and responding to new situations. Neural
    networks, genetic algorithms, and fuzzy logic are the building blocks of AI (Mohaghegh,
    2000).


    The neural network claims its artificial information processing correlates closely
    with biological neural networks. Neurons are the main elements comprising artificial
    neural networks. They pass signals between each other, like those of the human
    brain. The artificial neurons connect several inputs to one or multiple outputs
    by associated weighs and nonlinear activation functions. When data are provided
    to neural networks, they undergo a learning process, by specific algorithms, to
    find the appropriate weights that describe the behavior of the output with respect
    to multiple inputs.


    Neural networks provide a high potential for exploring and analyzing large historical
    databases that don''t seem to be used in conventional modeling (Mohaghegh, 2000).
    In other words, neural networks should be applied in cases where mathematical
    modeling is impractical. The nature of the problems in the O&G industry is complex.
    These issues may be solved by unconventional methods such as AI.


    The artificial neural network was originally developed from the behavior of biological
    neurons in the brain by McCulloch and Pitts (Mohaghegh, 2000). The information
    processing in neural networks mimics mechanisms of neurons in biological systems.
    A schematic of the nervous system block body, which is also called a neuron, is
    shown in Fig. 6.1. Generally, a neuron consists of a cell body, axon, and dendrite
    connecting to another neuron with a synaptic connection. Information communication
    occurs through electrochemical signals that enter the cells through dendrites.
    Based on the characteristics of input, the neuron is stimulated and releases an
    output signal that passes through the axons. The action is referred to as "firing
    a signal" if a threshold is reached by a great enough electrical potential (Mohaghegh,
    2000). The output'
  merge: -1
  pgno: 296
- img_proc: true
  md: '![](img/84bb0bcf926cd79dfa24aaffa8e553c8_297_0.png)


    FIGURE 6.1 Sketch of a biological neuron.


    signal from one neuron is an input for another neuron, which generates a new electrochemical
    pulse as the output. Each module in the brain may have more than 100,000 neurons
    connecting to thousands of other neurons and forming the complex architecture
    for neural networks; this neural network architecture is the basis for the learning
    process in the human brain.


    Artificial neural networks are mathematically modeled based on the functionality
    of biological neural networks. From now on, neural networks and artificial neural
    networks will be used interchangeably. There are two main applications for neural
    networks: clustering (unsupervised classification) and finding a correlation between
    a set of numeric inputs (attributes) and outputs (targets). Neural networks generally
    consist of a series of "Neurons" in a sequential layering structure. Each input
    and output variable can be assigned to a node that is like a biological neuron.
    Nodes are gathered into layers, including an input layer, a hidden layer(s), and
    an output layer with the connected input and output layers as shown in Fig. 6.2.
    The topology of neural networks defines the number of hidden layers and the number
    of nodes in each hidden layer which are used to connect the input to the output
    layer. The connection between each of the two nodes (synapse from consecutive
    layers) is represented by weights *wij* in which *i* and *j* represent nodes in
    the input and output layers, respectively. The weight, as a given value, is like
    the strengths of the electrochemical signal. Excitatory reflections are designated
    by the weight''s positive values, while inhibitory ones are identified by negative
    values (Kriesel, 2005).


    Each node in the hidden layer receives signals from the input layer nodes, considers
    bias, and finally uses an activation function to produce an output signal. To
    explain this process (Fig. 6.2), assume "n" input nodes. Let''s represent the
    signal from the *i*th input node, *Ii*, signal weight from node *i* to node *j*,
    *wij*, and bias as *θj*. The action potential of the node *j* in the hidden layer
    (*hj*) is calculated as below-weighted summation.'
  merge: -1
  pgno: 297
- img_proc: true
  md: '![](img/84bb0bcf926cd79dfa24aaffa8e553c8_298_0.png)


    FIGURE 6.2 Topology of a three-layer neural network.


    $$h_j = \sum_{i=1}^{N} w_{ij} \cdot I_i + \theta_j$$ (6.1)


    The bias or $\theta_j$ is a pseudo node with an output value of 1 and is used
    if the input value is 0. The final step is to calculate the node''s output (oj).
    The output is calculated using an activation function (F) that determines the
    amplitude of the output signal based on the action potential of the node ($h_j$).
    Based on the function type and a bias value, the activation function generates
    a value between 0 and 1, or $-1$ to 1. Generally, four types of activation functions
    (F) have been used in neural network models: (i) F_Step, (ii) F_ReLU, (iii) F_sigmoid,
    and (iv) F_tanh. Activation functions help neural networks to understand non-linear
    and complex patterns in the data.


    For $F_{step}$, activation function takes the value of 0 if action potential ($h_j$)
    is less than 0, and 1 *when it is equal or more than 0*.'

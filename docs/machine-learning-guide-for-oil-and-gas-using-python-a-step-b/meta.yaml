    \ 10 points in a data set, there will be 10 clusters at the beginning of applying\
    \ hierarchical clustering. Afterward, based on a distance function such as euclidean,\
    \ the closest pair of clusters are merged. This iteration is repeated until a\
    \ single cluster is left.\n- 2) **Divisive hierarchical clustering:** This type\
    \ of hierarchical clustering works the opposite way of agglomerative hierarchical\
    \ clustering. Hence, if there are 10 data points, all data points will initially\
    \ belong to one single cluster. Afterward, the farthest point is split in the\

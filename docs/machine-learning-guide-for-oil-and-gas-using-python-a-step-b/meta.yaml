    mu_{D_2}(y)$、$\\mu_{D_3}(y)$、$\\mu_{D_4}(y)$ 如图 8.17 所示绘制。\n\n接下来，所有这些蕴含模糊集必须聚合成一个模糊集以做出最终决策。为了聚合从\

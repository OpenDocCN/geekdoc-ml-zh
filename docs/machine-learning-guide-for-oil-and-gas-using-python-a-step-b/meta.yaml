  md: 'into clusters. Hierarchical clustering just like k-means clustering uses a
    **distance-based algorithm** to measure the distance between clusters. There are
    two main types of hierarchical clustering as follows:


    +   1) **Agglomerative hierarchical clustering (additive hierarchical clustering):**
    In this type, each point is assigned to a cluster. For instance, if there are
    10 points in a data set, there will be 10 clusters at the beginning of applying
    hierarchical clustering. Afterward, based on a distance function such as euclidean,
    the closest pair of clusters are merged. This iteration is repeated until a single
    cluster is left.


    2) **Divisive hierarchical clustering:** This type of hierarchical clustering
    works the opposite way of agglomerative hierarchical clustering. Hence, if there
    are 10 data points, all data points will initially belong to one single cluster.
    Afterward, the farthest point is split in the cluster and this process continues
    until each cluster has a single point.


    To further explain the concept of hierarchical clustering, let''s go through a
    step-by-step example of applying agglomerative hierarchical clustering to a small
    data set of 4 wells with their respective EURs as shown below. Note that since
    this is a one-dimensional data, the data was not standardized prior to calculating
    the distances. In other words, it is OK to not standardize the data for this particular
    example.


    4 well data set


    | Well number | EUR/1000 ft (BCF/1000 ft) |

    | :--- | :--- |

    | 1 | 1.4 |

    | 2 | 1.2 |

    | 3 | 2.5 |

    | 4 | 2.0 |


    Step 1) The first step in solving this problem is creating **proximity matrix**.
    Proximity matrix simply stores the distances between each two points. To create
    a proximity matrix for this example, a square matrix of n by n is created. n represents
    the number of observations. Therefore, a proximity matrix of 4*4 can be created
    as shown in Table 4.2.


    The diagonal elements of the matrix will be 0 because the distance of each element
    from itself is 0. To calculate the distance between point 1 and 2, let''s use
    the euclidean distance function as follows:


    ```

    $$\sqrt{(1.2 - 1.4)^2} = 0.2$$


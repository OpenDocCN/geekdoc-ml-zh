    # 第 4 章


    ## 无监督机器学习：聚类算法


    ### 无监督机器学习简介


    如第 3 章所述，无监督**机器学习 (ML)** 算法可有力地应用于聚类分析。存在多种最常用的聚类算法类型。聚类算法在油气行业的一些应用包括：Ansari
    等人提出的使用 k-means 聚类进行积液检测、感兴趣区域（类型曲线）聚类以及岩性分类聚类。使用聚类算法背后的思想是对数据进行聚类或划分。例如，如果期望的结果是将一口生产气井划分为积液与未积液状态，则可以使用聚类算法来进行这种划分。有人可能会问，Turner
    和 Coleman 速率可以使用经验方程进行此类划分，但这些方法是为垂直常规井开发的，不适用于具有多级水力压裂的斜井和水平井。使用聚类技术允许人们独立于几十年前开发的经验方程进行此类分析，并利用数据的力量将每口井划分为积液与未积液状态。在油气行业使用无监督聚类技术的另一个例子是类型曲线聚类。勘探与生产运营商利用他们对区域的了解，如地质特征、生产动态、BTU
    含量、与管道的距离等，来定义每个地层的类型曲线区域和边界。可以想象，考虑到所有会影响结果的特征，这个过程可能非常难以理解。因此，可以利用数据和无监督 ML
    算法的力量将相似的区域聚类在一起。所有上述特征都可以用作无监督 ML 模型的输入特征，聚类算法将指示每一行数据属于哪个聚类。无监督算法在油气行业的另一个应用是岩性分类。监督和无监督
    ML 模型都可用于岩性分类。如果使用无监督 ML 模型来实现此目的，其思想是使用自动化技术（而不是让地质学家手动进行）来自动化识别地质地层（如砂岩、石灰岩、页岩等）的过程。如果模型聚类得当，这些聚类算法在与人工解释进行比较时应提供相似的分类结果。聚类算法也可用于聚类一秒钟压裂阶段数据，以帮助筛选检测。在所有这些应用中，重要的是要注意，某些算法在第一次尝试时可能不会产生理想的结果。至关重要的是要更改/调整数据，直到算法理解聚类数据的最佳方式。例如，在对积液检测数据进行聚类时，仅向模型提供基本属性（如气量、套管压力、油管压力和管线压力）可能还不够。可能需要其他参数，如气量的斜率和标准差，以便模型能够根据领域专业知识正确地对数据进行聚类。ML
    分析严重依赖领域专业知识来理解和深入理解问题。没有领域专业知识，大多数 ML 项目都可能导致不满意的结果。本章将讨论 k-means 聚类、层次聚类和基于密度的带噪声应用空间聚类
    (DBSCAN)。此外，还将讨论其他无监督异常检测算法。


    ### K-means 聚类


    K-means 是一种强大而简单的无监督 ML 算法，用于将数据聚类成不同的组。K-means 聚类也可用于异常值检测。K-means 聚类最大的挑战之一是确定必须使用的最佳聚类数量。领域专业知识在确定聚类数量方面起着关键作用。例如，如果意图是将干气井的数据聚类为积液与未积液状态，则领域专业知识指导使用两个聚类。另一方面，如果希望使用聚类来划分类型曲线区域，则应应用不同数量的聚类，并在确定定义类型曲线边界所需的聚类数量之前可视化结果。如果问题超级复杂，确定聚类数量根本不可行，则可以使用“肘部”法来了解可能需要的潜在聚类数量。在这种方法中，k-means
    算法在不同的聚类数量（2 个聚类、3 个聚类等）下运行多次。然后，将“聚类数量”绘制在 x 轴上，“簇内误差平方和”绘制在 y 轴上，直到观察到肘点。将聚类数量增加到超过肘点不会显著改善
    k-means 算法的结果。图 4.1 说明了在 4 个聚类时出现的肘点或最佳聚类数量。这种方法为选择聚类数量提供了一些见解，但测试更高的'

    Before performing any analysis, it is recommended to take out 10%—20% of your
    data and set aside as a **blind set**. Afterward, feed in the remaining 80%—90%
    of the data and split that into **training** and **testing**. In this example,
    if 20% is used for the blind set, 20% of 50 logs or 10 logs will be set aside
    from the beginning and is used as a blind set. The remaining 40 logs are used
    to feed into the training and testing sets. After training a ML model, apply the
    trained model to the blind set (10 logs) to see the model’s performance. Consequently,
    in this problem, there will be training set accuracy, testing set accuracy, and
    blind set accuracy. Please note that in some literature, testing and blind sets
    are used interchangeably.


    ## Bias–variance trade-off


    A very instrumental concept in ML is referred to as bias–variance trade-off. Before
    digging deep into the concept, let’s define bias and variance first as follows:


    **Bias** is referred to as model assumption simplification. In other words, the
    inability of a ML model to capture the true relationship is called “bias.” Models
    with high bias are unable to capture the true relationship between input and output
    features, and it usually leads to oversimplification of the model. An example
    of a model with high bias is when linear regression is used for a nonlinear data
    set.


    **Variance** refers to the variability of model prediction for a given data point.
    A model with high variance means it fits the training data very well but does
    a poor job predicting the testing data. In other words, it memorizes the training
    data very well and is not able to predict the test data due to low generalization.


    If a model is simple (which means it does not capture most of the complexity in
    the data), it is referred to as an underfit model. An underfit model is another
    name for a model that has high bias and low variance as illustrated in Fig. 3.4.
    On the other hand, if a model is super complex and captures all the underlying
    complexity in the data in a training set, it is called an overfit model. An overfit
    model means it has high variance and low bias. The ideal model would have **low
    bias** and **low variance** as shown in Fig. 3.5.


    ## Model development and integration


    After completions of steps (i)—(v), the next step is to select the appropriate
    algorithm to model the problem. Note that in this phase of the ML analysis, various
    algorithms should be evaluated to be able to pick the most effective algorithm.
    There is no one solution fits all algorithm and the underlying data will dictate
    the type of algorithm to be used for the problem. There are different supervised,
    unsupervised, and reinforcement learning algorithms that are available and discussed
    below. After developing a successful ML model, save and apply the model. The trained
    model is now ready to be deployed or integrated into a real-time operations center.


    ## Machine learning types


    ### Supervised learning


    In this type of ML, both set of M number of inputs ($x_i$) and output(s) ($y_i$)
    are available. $x$ is an $M$ by $N$ matrix where $M$ is the number of data points
    and $N$ is the number of input features or attributes. $y_i$ is a vector of response
    features. A response feature ($y_i$) in the form of a number indicates a regression
    problem. Otherwise, it is a classification or pattern recognition problem. Let’s
    assume that $x_i$ is a matrix of 10 features (sand to water ratio (SWR), gas in
    place (GIP), cluster spacing, proppant loading/cluster, average rate/cluster,
    geologic complexity, BTU content, well spacing, pressure drawdown strategy, and
    number of clusters per stage) for 2000 wells drilled and completed in the Haynesville
    Shale reservoir and the $y_i$ is the estimated ultimate recovery (EUR) per 1000
    ft of lateral from these 2000 wells. If the question is to find the pattern between
    these features and EUR/1000 ft, it can be treated as a regression problem. However,
    if instead of EUR per 1000 ft of lateral, the $y_i$ indicates having well interference
    or not having well interference during stimulation of these 2000 wells, then the
    problem becomes a classification problem. In both cases, a supervised ML algorithm
    can be used since pairs of input $X_i$ and output $y_i$ are available. Note that
    a supervised ML algorithm could also have multiple outputs. For the same problem
    indicated above, the outputs of the model could be defined as 30-day cumulative
    gas production per ft (CUM 30/ft), CUM 60/ft, ..., CUM 720/ft. Therefore, instead
    of having a supervised single output ML model with EUR/1000 ft as the output,
    a multi-output ML model can be trained to predict CUM 30/ft, CUM 60/ft, ..., CUM
    720/ft. Examples of supervised ML algorithms are included but not limited to artificial
    neural network (ANN), support vector machine (SVM), decision tree (DT), random
    forest (RF), extreme random forest (ERF), gradient boosting (GB), adaptive gradient
    boost (AGB), multi-linear regression (MLR), logistic regression (LR), and KNN.


    ### Unsupervised learning


    In this type of ML, only sets of input features ($x_i$) are available and there
    is no associated label. Therefore, existing pattern is sought in the input data.
    The major difference between unsupervised and supervised technique is that in
    unsupervised, there are no output(s) to compare the predictions, while in supervised
    learning, the model predictions could always be compared with actual available
    output(s). Unsupervised learning can potentially reduce labor within an organization
    because unsupervised learning algorithms can be used in place of human efforts
    to filter through large sets of data for clustering purposes. This could lead
    to improving efficiency. Examples of unsupervised ML algorithms are k-means clustering,
    hierarchical clustering, DBSCAN, principal component analysis (PCA), and apriori
    algorithm. An example of using an unsupervised ML algorithm is determining the
    type curve boundaries within a company''s acreage position. E&P companies primarily
    use production performance, geologic features, land, infrastructure, and capacity
    to determine type curve boundaries. All of these important features can simply
    be used as input features into an unsupervised ML model. A clustering algorithm
    can then be applied to cluster the data. After clustering the data, plot the resulting
    clusters for each well based on their latitude and longitude to determine proper
    type curve boundaries for each area of interest. This is an unbiased powerful
    unsupervised technique to provide a realistic view of type curve boundaries and
    regions without using human interference.


    ### Semi-supervised learning


    Semi-supervised ML is a combination of using **unsupervised** and **supervised**
    learning. If a large amount of unlabeled data is available, the first step is
    to use some type of unsupervised ML algorithm to cluster the data (label the data).
    Afterward, the labeled data obtained from the unsupervised technique can be used
    as the output for the supervised ML algorithm. Therefore, a combination of unsupervised
    and supervised algorithms is used to solve a problem. Please note that clustering
    the data using an unsupervised technique cannot necessarily lead to the best result
    in term of obtaining a desired labeled class. Therefore, massaging the data prior
    to using an unsupervised technique is extremely crucial to obtain the desired
    labeled class. In some cases, it might take less time to use domain expertise
    to label the data prior to using it in a supervised ML algorithm.


    ### Reinforcement learning


    Reinforcement learning is a learning technique that directs the action to maximize
    the reward of an immediate action and those following. In this type of ML algorithm,
    the machine trains itself continuously by using a computational approach to learning
    from action. Reinforcement learning is different from supervised learning because
    labeled input/output pairs are not needed to be present. Imagine that you are
    a 9-year-old basketball player watching your mentors dunking to score. Then you
    manage to lower the basketball hoop and use it to dunk for practicing. You have
    learned that dunking can be used for the positive action of scoring. Now, you
    try to raise the hoop and dunk again and manage to twist your ankle while landing.
    You then realize that it can be used for the negative action of hurting yourself
    when used inappropriately. This learning procedure helps the kid to learn proper
    use of a basketball hoop for positive and not negative action. Humans learn by
    interaction and reinforcement learning. Learning through trial and error with
    prize and punishment is the most important feature of reinforcement learning.
    Reinforcement learning can also be used in the O&G industry for various purposes.
    An example of using reinforcement learning is for producing plunger or intermittent
    wells. For example, reinforcement learning can be used to adjust production set
    points as to when to open or close a well. This can be achieved by continuous
    model learning from set points that lead to poor production performance (bad behavior)
    or set points that lead to excellent production performance (good behavior). After
    learning the good and bad behaviors, the set points can be automatically optimized
    without human intervention. Coupling reinforcement learning and edge computing
    devices can add a tremendous value across various O&G companies and sectors. Two
    of the most commonly used reinforcement learning algorithms are Markov decision
    process (MDP) and Q-learning.'
  mdcn: '在需要预测横波和纵波传播时间的场景中。在进行任何分析之前，建议提取10%—20%的数据作为**盲集**。之后，将剩余的80%—90%的数据输入并划分为**训练集**和**测试集**。在本例中，如果使用20%作为盲集，那么从50口井中取20%即10口井的数据作为盲集。剩余的40口井数据用于训练集和测试集。训练机器学习模型后，将训练好的模型应用于盲集（10口井）以评估模型性能。因此，在这个问题中，将存在训练集准确率、测试集准确率和盲集准确率。请注意，在某些文献中，测试集和盲集可互换使用。


    ## 偏差-方差权衡


    机器学习中一个非常重要的概念是偏差-方差权衡。在深入探讨该概念之前，我们先定义偏差和方差：


    **偏差**是指模型假设的简化。换句话说，机器学习模型无法捕捉真实关系的能力被称为“偏差”。高偏差模型无法捕捉输入和输出特征之间的真实关系，通常导致模型过度简化。高偏差模型的一个例子是将线性回归用于非线性数据集。


    **方差**指的是模型对给定数据点预测的变异性。高方差模型意味着它能很好地拟合训练数据，但在预测测试数据时表现不佳。换句话说，它能很好地记忆训练数据，但由于泛化能力低，无法预测测试数据。


    如果一个模型很简单（意味着它没有捕捉到数据中的大部分复杂性），则称为欠拟合模型。欠拟合模型是高偏差和低方差模型的另一个名称，如图3.4所示。另一方面，如果一个模型非常复杂，并且在训练集中捕捉了数据中所有潜在的复杂性，则称为过拟合模型。过拟合模型意味着它具有高方差和低偏差。理想的模型应具有**低偏差**和**低方差**，如图3.5所示。


    ## 模型开发与集成


    完成步骤（i）—（v）后，下一步是选择合适的算法来建模问题。请注意，在机器学习分析的这一阶段，应评估各种算法以选择最有效的算法。没有一种算法适用于所有情况，底层数据将决定用于该问题的算法类型。有各种监督学习、无监督学习和强化学习算法可用，下文将进行讨论。开发成功的机器学习模型后，保存并应用该模型。训练好的模型现在可以部署或集成到实时运营中心。


    ## 机器学习类型


    ### 监督学习


    在这种类型的机器学习中，M个输入（$x_i$）和输出（$y_i$）的数据集都是可用的。$x$是一个$M$乘$N$的矩阵，其中$M$是数据点的数量，$N$是输入特征或属性的数量。$y_i$是响应特征的向量。以数字形式表示的响应特征（$y_i$）表示回归问题。否则，它是一个分类或模式识别问题。让我们假设$x_i$是一个包含10个特征（砂水比（SWR）、地质储量（GIP）、簇间距、每簇支撑剂负载、每簇平均速率、地质复杂性、BTU含量、井距、压降策略和每级簇数）的矩阵，这些特征来自在Haynesville页岩储层钻探和完井的2000口井，$y_i$是这2000口井每1000英尺水平段的估算最终采收率（EUR）。如果问题是找出这些特征与EUR/1000英尺之间的模式，它可以被视为一个回归问题。然而，如果$y_i$表示这2000口井在增产过程中是否存在井间干扰，而不是每1000英尺水平段的EUR，那么问题就变成了一个分类问题。在这两种情况下，都可以使用监督学习算法，因为输入$X_i$和输出$y_i$的配对是可用的。请注意，监督学习算法也可以有多个输出。对于上述相同问题，模型的输出可以定义为每英尺30天累计产气量（CUM
    30/ft）、CUM 60/ft、...、CUM 720/ft。因此，可以训练一个多输出机器学习模型来预测CUM 30/ft、CUM 60/ft、...、CUM
    720/ft，而不是使用以EUR/1000英尺为输出的监督单输出模型。监督学习算法的例子包括但不限于人工神经网络（ANN）、支持向量机（SVM）、决策树（DT）、随机森林（RF）、极端随机森林（ERF）、梯度提升（GB）、自适应梯度提升（AGB）、多元线性回归（MLR）、逻辑回归（LR）和KNN。


    ### 无监督学习


    在这种类型的机器学习中，只有输入特征（$x_i$）的数据集可用，没有关联的标签。因此，需要在输入数据中寻找现有模式。无监督学习和监督学习技术的主要区别在于，无监督学习没有输出可以与预测进行比较，而在监督学习中，模型预测总是可以与实际可用的输出进行比较。无监督学习可以潜在地减少组织内的人力劳动，因为无监督学习算法可以代替人力来筛选大量数据以进行聚类。这可以提高效率。无监督学习算法的例子包括k均值聚类、层次聚类、DBSCAN、主成分分析（PCA）和Apriori算法。使用无监督学习算法的一个例子是确定公司矿权范围内的类型曲线边界。勘探与生产公司主要利用生产动态、地质特征、土地、基础设施和产能来确定类型曲线边界。所有这些重要特征都可以简单地作为输入特征输入到无监督学习模型中。然后可以应用聚类算法对数据进行聚类。数据聚类后，根据每口井的纬度和经度绘制结果聚类图，以确定每个感兴趣区域的适当类型曲线边界。这是一种无偏见的强大无监督技术，可以在不使用人为干预的情况下提供类型曲线边界和区域的现实视图。


    ### 半监督学习


    半监督机器学习是结合使用**无监督**和**监督**学习。如果有大量未标记数据可用，第一步是使用某种无监督学习算法对数据进行聚类（标记数据）。然后，从无监督技术获得的标记数据可以用作监督学习算法的输出。因此，结合使用无监督和监督算法来解决问题。请注意，使用无监督技术对数据进行聚类不一定能获得理想的标记类别。因此，在使用无监督技术之前对数据进行处理对于获得理想的标记类别至关重要。在某些情况下，使用领域专业知识在将数据用于监督学习算法之前对其进行标记可能花费更少的时间。


    ### 强化学习


    强化学习是一种引导行动以最大化即时行动及其后续行动奖励的学习技术。在这种类型的机器学习算法中，机器通过使用计算方法从行动中学习来持续训练自身。强化学习不同于监督学习，因为不需要标记的输入/输出对。想象一下，你是一个9岁的篮球运动员，看着你的导师扣篮得分。然后你设法降低篮球篮筐并用它来练习扣篮。你已经学会扣篮可以用于得分的积极行动。现在，你尝试升高篮筐并再次扣篮，结果在落地时扭伤了脚踝。然后你意识到，如果使用不当，它可能用于伤害自己的消极行动。这个学习过程帮助孩子学会正确使用篮球篮筐进行积极而非消极的行动。人类通过互动和强化学习来学习。通过试错以及奖励和惩罚进行学习是强化学习最重要的特征。强化学习也可以用于石油和天然气行业的各种目的。使用强化学习的一个例子是生产柱塞井或间歇井。例如，强化学习可用于调整生产设定点，以决定何时开井或关井。这可以通过模型持续学习导致生产性能不佳（不良行为）的设定点或导致生产性能优异（良好行为）的设定点来实现。在学习了良好和不良行为后，可以在没有人为干预的情况下自动优化设定点。将强化学习与边缘计算设备相结合可以为各种石油和天然气公司和部门带来巨大价值。两种最常用的强化学习算法是马尔可夫决策过程（MDP）和Q学习。'

    \n图 9.12 EUR与水平段长度和支撑剂充填浓度的关系。\n\n## 粒子群优化\n\n上一节介绍了遗传算法，这是一种基于自然的搜索优化方法。遗传算法实际上遵循了达尔文根据自然选择提出的进化理论。本节将介绍另一种基于自然的优化算法——“粒子群优化”（PSO）。\n\
    \n群体被视为一群移动的粒子（在自然界中可以是蜜蜂、鸟类或鱼），它们试图形成一个集群，而每个粒子似乎都在无组织地移动。在自然界中，群体在粒子之间表现出某种社会认知行为，帮助它们解决诸如寻找食物或逃避捕食者等问题。群体粒子的文化行为可以归类为评估、比较和模仿（Eberhart等人，2001）。首先，粒子需要评估环境，以区分吸引或排斥的特征，从而做出适当的决策。然后，个体（粒子）将自己与他人进行比较，找出哪些粒子处于更好的位置。最后，个体模仿那些处于优越位置的粒子。上述原则帮助粒子适应环境、应对挑战并解决难题。科学家和工程师试图利用粒子群智能行为的相同原理来解决复杂的优化问题。\n\
    \nKennedy和Eberhart于1995年在一次神经网络会议上介绍了粒子群优化，随后于2001年出版了《*群体智能*》一书（Eberhart等人，2001）。与遗传算法类似，粒子群优化能够优化具有不可微目标函数的问题（这是基于梯度的优化器的主要要求）。PSO应用于各种优化问题，如神经网络训练、模糊控制、模式识别、机器人/纳米机器人，甚至电影特效。\n\
    \nPSO在石油和天然气行业有多种应用。Mohamed等人使用PSO进行油藏历史拟合（Mohamed等人，2011）。合成油藏模拟模型历史拟合的目标是估计断层特征，如断距厚度、高渗透率和低渗透率因子。他们使用产油量和产水量作为历史拟合的两个目标函数。Isebor等人应用了多种无导数优化器，如粒子群优化，以制定最佳开发方案（Isebor等人，2013）。他们使用了二维油藏模型，包括带有注水井和采油井的河道。通过决定井的数量、位置和控制策略来优化开发方案。Al-Nemer等人（Al-Nemer等人，2015）评估了四种随机优化算法（如粒子群优化）在压力瞬态分析（试井）中生成自动类型曲线匹配的性能。使用双孔隙度油藏模型（由Warren和Root提出）来模拟添加了噪声的压力数据，这些数据被视为真实压力数据。然后，应用PSO来估计裂缝渗透率、基质孔隙度、表皮系数、探测半径、储容比和层间流动参数。Jesmani等人应用PSO为两个不同的案例研究寻找最佳井位（Jesmani等人，2015）。在一个案例研究中，他们使用了一个合成油藏模型，地质数据取自挪威海的Norne油田。他们使用PSO通过寻找井距、水平段长度、方向的最佳组合，并将井保持在油藏的特定部分，来最大化净现值。Ottah等人利用PSO进行油藏历史拟合，并使用物质平衡技术寻找含水层特性（Ottah等人，2015）。Self等人应用粒子群优化，通过寻找最佳操作参数来降低钻井成本（Self等人，2016）。在这项工作中，他们将机械钻速（ROP）作为目标函数，并通过调整井下钻压、转速、起钻深度和钻头组合来最小化每英尺成本（在第5章中，构建并讨论了一个使用各种输入钻井特征来估计ROP的监督机器学习模型）。Al-Mudhafar等人展示了粒子群优化在优化非常规油藏CO2-EOR过程中的应用（Al-Mudhafar等人，2017）。他们使用了一个带有五个注入井/生产井的黑油油藏模型，来预测经历CO2驱油的页岩油藏30年的性能。他们考虑了八个优化参数，如注入/生产/浸泡时间、最小井底压力和最大产油/注入速率。Khan等人实施了PSO，以最大化包含智能井的天然裂缝性碳酸盐岩油藏的采收率（Khan等人，2018）。这项研究的目标是确定流入控制阀（油嘴设置）的最佳设置，以最大化采收率。Yan等人将PSO应用于多层地质导向（Yan等人，2018）。他们希望使用随钻测井（LWD）测量数据，并利用粒子群优化来估计一些参数，如地层边界和地层电阻率。PSO在石油和天然气行业还有其他应用，如地球物理数据反演（Fernandez-Martinez等人，2008）、岩石边坡稳定性分析中临界破坏面的定位（Javadzadeh\
    \ & Javadzadeh，2008）、油藏模型的预选（Le Ravalec-Dupin等人，2010）和生产优化（Zhao等人，2011）。\n\n##\
    \ 粒子群优化理论\n\n为了理解粒子群理论的基础，了解一个关于鸟群决策的著名例子很有帮助。当飞行的鸟类决定降落时，它们需要解决一个复杂的问题，找到一个优化的着陆点，这个点要有最大的机会找到食物，同时被捕食的风险最小。鸟群能够作为社会行为进行沟通和分享信息，这一事实使它们能够找到最优解。鸟群社会行为中最重要的因素是每只鸟（粒子）将其自身知识与群体知识相平衡。鸟类开始寻找解决方案"

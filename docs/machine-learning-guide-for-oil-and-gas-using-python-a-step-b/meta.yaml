    FIGURE 8.13 Intersection of two fuzzy sets A and B.


    **Intersection** of two sets A and B is a fuzzy set I with its membership function
    as a minimum of the two sets A and B defined as follows:


    $\mu_C(x) = \min\{\mu_A(x), \mu_B(x)\}$ (8.19)


    A sample intersection of two sets A and B can be seen in Fig. 8.13.'

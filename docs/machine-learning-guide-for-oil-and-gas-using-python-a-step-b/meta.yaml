  md: '# Random forest


    Random forest is another powerful supervised ML algorithm which can be used for
    both regression and classification problems. The general technique of random decision
    forests was first proposed by Ho in 1995 (Kam Ho, 1995). Random forest is an ensemble
    of decision trees or it can be thought of as a forest of decision trees. Since
    random forest combines many decision tree models into one, it is known as an ensemble
    algorithm. For example, instead of building a decision tree to predict EUR/1000
    ft, using a single tree could result in an erroneous value due to **variance**
    in predictions. One way to avoid this variance when predicting the EUR/1000 ft
    is to take predictions from hundreds or thousands of decision trees and using
    the average of those trees to calculate the final answer. Combining many decision
    trees into a single model is essentially the fundamental concept behind using
    random forest. The predictions made by a single decision tree could be inaccurate,
    but when combined, the prediction will be closer to average. The reason random
    forest is typically more accurate than a single decision tree is because much
    more knowledge is incorporated from many predictions. For regression problems,
    random forest uses the average of the decision trees for final prediction. However,
    as previously mentioned, classification problems can also be solved using random
    forest by taking a majority vote of the predicted class. Another type of ensemble
    learning method is gradient boosting which will be discussed next. Fig. 5.47 illustrates
    the difference between a single decision tree versus a random forest which consists
    of an ensemble of decision trees.


    There are two main types of combining multiple decision trees into one and they
    are as follows:


    +   - **Bagging**, also referred to as "bootstrap aggregation," is used in random
    forest. Bagging was first proposed by Leo Breiman in a technical report in 1994
    (Breiman, 1994). In bagging or bootstrap aggregation, an average of many **built
    independent** models is used. In bagging, the decision trees are trained based
    on randomly sampling subsets of data and sampling is done


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_228_0.png)'
  merge: -1
  pgno: 228
- img_proc: true
  md: 'with replacement. Please note that bootstrapping is a statistical resampling
    technique which means that samples are drawn with replacement. In other words,
    the idea behind bootstrapping is that some samples will be used multiple times
    in one single decision tree (Efron, 1979).


    One of the main advantages of using bagging when applying a random forest algorithm
    is **variance reduction** of the model. For example, when a single decision tree
    is used, it is very prone to overfitting and can be sensitive to the noise in
    the data. However, bootstrap aggregation reduces this problem. When feature bagging
    is used, at each split in the decision tree, not all input features are considered.
    In other words, only a **random subset** of input features are used. Let''s assume
    that a data set has 10 inputs and 1 output features. Let''s also assume that sand/ft
    and cluster spacing (two out of the 10 features) have the strongest impact on
    the output feature which is EUR/1000 ft. When applying bagging, since a random
    subset of input features are used, it will help to reduce the effects of sand/ft
    and cluster spacing on the target class which is EUR/1000 ft in this example.
    In essence, selecting a random subset of input features results in lower correlations
    across decision trees and, as a result, more diversification.


    - Boosting, on the other hand, (used in gradient boosting) is also considered
    to be an ensemble technique where the models are built sequentially as opposed
    to **independently**. In boosting, more weights are placed on instances with incorrect
    predictions. Therefore, the focus in boosting is the challenging cases that are
    being predicted inaccurately. As opposed to bagging where an **equal** weighted
    average is used, boosting uses **weighted average** where more weight is applied
    to the models with better performance. In other words, in boosting, the samples
    that were predicted inaccurately get a higher weight which would then lead to
    sampling them more often. This is the main reason why bagging can be performed
    independently while boosting is performed sequentially. As opposed to bagging
    where variance is reduced, boosting will try to reduce bias. In addition to gradient
    boosting, AdaBoost (adaptive gradient boosting) and XGBoost (extreme gradient
    boosting) are examples of boosting algorithms.


    Since majority of the terminologies used in random forest have already been covered
    in decision tree section of this chapter, let''s start implementing random forest
    to the same TOC data set covered under decision tree and compare the accuracy
    of both models.


    # Random forest implementation using scikit-learn


    In this section, the same TOC data set used under decision tree will be used to
    apply for random forest regression. Therefore, open a new Jupyter Notebook and
    follow the exact same codes covered in decision tree (or use the existing Jupyter
    Notebook to continue). Instead of importing "DecisionTreeRegressor" from sklearn.ensemble,
    import the "RandomForestRegressor" as follows:


    ```

    from sklearn.ensemble import RandomForestRegressor

    ```'

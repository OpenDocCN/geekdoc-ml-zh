  - '[PAGE 145]


    Next, let''s standardize the data prior to applying hierarchical clustering as
    follows:


    ```

    from sklearn.preprocessing import StandardScaler

    scaler=StandardScaler()

    df_scaled=scaler.fit(df)

    df_scaled=scaler.transform(df)

    ```


    Next, let''s create the dendrogram. First, "import scipy.cluster.hierarchy as
    shc" library. Please make sure to pass along "df_scaled" which is the standardized
    version of the data set in "dend = shc.dendrogram(shc.linkage(df_scaled, method
    = ''ward''))."


    ```

    import scipy.cluster.hierarchy as shc

    plt.figure(figsize=(15, 10))

    dend=shc.dendrogram(shc.linkage(df_scaled, method=''ward''))

    plt.title("Dendrogram")

    plt.xlabel(''Samples'')

    plt.ylabel(''Distance'')

    Python output=Fig. 4.17

    ```


    As illustrated in Fig. 4.17, the dashed black line intersects 5 vertical lines.
    This dashed black horizontal line is drawn based on longest distance or branches
    observed and is subjective. Therefore, feel free to alter "n_clusters"


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_145_0.png)


    FIGURE 4.17 Resulting dendrogram.'
  - "[PAGE 146]\n\nand visualize the clustering outcome. Let's now import agglomerative\
    \ clustering and apply agglomerative clustering to \"df_scaled\" data frame. Under\
    \ \"AgglomerativeClustering,\" number of desired clusters can be accessed with\
    \ attribute \"n_clusters,\" \"affinity\" returns the metric used to compute the\
    \ linkage. In this example, euclidean distance was selected. The linkage determines\
    \ which distance to use between sets of observation. The \"linkage\" parameter\
    \ can be set as (i) ward, (ii) average, (iii) complete or maximum, and (iv) single.\n\
    \nAccording to scikit-learn library, \"ward\" minimizes the variance of the clusters\
    \ being merged. \"average\" uses the average of the distances of each observation\
    \ of the two sets. \"complete\" or \"maximum\" linkage uses the maximum distances\
    \ between all observations of the two sets. \"single\" uses the minimum of the\
    \ distances between all observations of the two sets. The default linkage of \"\
    ward\" was used in this example. After defining the hierarchical clustering criteria\
    \ under \"HC,\" apply \"fit_predict()\" to the standardized data set (df_scaled).\n\
    \n```\nfrom sklearn.cluster import AgglomerativeClustering\nHC=AgglomerativeClustering(n_clusters=5,\
    \ affinity='euclidean', linkage='ward')\nHC=HC.fit_predict(df_scaled)\nHC\nPython\
    \ output=Fig. 4.18.\n```\n\nLet's convert the \"df_scaled\" to a data frame using\
    \ panda's \"pd.DataFrame.\" Afterward, apply the silhouette coefficient to this\
    \ data set as illustrated below.\n\n```\ndf_scaled=pd.DataFrame(df_scaled,columns=df.columns[0:2])\n\

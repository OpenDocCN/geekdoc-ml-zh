    ## 模糊集运算


    模糊集 $A$ 的**子集**是模糊集 $B$ 的子集，($A \subset B$)，如果以下条件成立：


    $$\forall x \in X, \mu_A(x) \leq \mu_B(x)$$


    图 8.11 阐释了此概念。



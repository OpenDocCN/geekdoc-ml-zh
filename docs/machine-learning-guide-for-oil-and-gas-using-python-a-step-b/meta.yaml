    that a data set has 10 inputs and 1 output features. Let''s also assume that sand/ft
    and cluster spacing (two out of the 10 features) have the strongest impact on
    the output feature which is EUR/1000 ft. When applying bagging, since a random
    subset of input features are used, it will help to reduce the effects of sand/ft
    and cluster spacing on the target class which is EUR/1000 ft in this example.
    In essence, selecting a random subset of input features results in lower correlations
    across decision trees and, as a result, more diversification.


    - Boosting, on the other hand, (used in gradient boosting) is also considered
    to be an ensemble technique where the models are built sequentially as opposed
    to **independently**. In boosting, more weights are placed on instances with incorrect
    predictions. Therefore, the focus in boosting is the challenging cases that are
    being predicted inaccurately. As opposed to bagging where an **equal** weighted
    average is used, boosting uses **weighted average** where more weight is applied
    to the models with better performance. In other words, in boosting, the samples
    that were predicted inaccurately get a higher weight which would then lead to
    sampling them more often. This is the main reason why bagging can be performed
    independently while boosting is performed sequentially. As opposed to bagging
    where variance is reduced, boosting will try to reduce bias. In addition to gradient
    boosting, AdaBoost (adaptive gradient boosting) and XGBoost (extreme gradient
    boosting) are examples of boosting algorithms.


    Since majority of the terminologies used in random forest have already been covered
    in decision tree section of this chapter, let''s start implementing random forest
    to the same TOC data set covered under decision tree and compare the accuracy
    of both models.



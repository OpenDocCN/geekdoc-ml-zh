- md: "## Support vector machine implementation in scikit-learn\n\nIn this section,\
    \ building a step-by-step ML model for SVM implementation in Python will be covered.\
    \ One of the most important parameters in hydraulic fracturing design is the geomechanical\
    \ properties of the rock. The geo-mechanical properties such as Poisson’s ratio,\
    \ Young’s modulus, and minimum horizontal stress determine fracture geometry as\
    \ well as ease of fracturing operationally. Brittle rocks with high Young’s modulus\
    \ and low Poisson’s ratio are easier to frac while ductile rocks are much harder\
    \ to hydraulically fracture. The geomechanical properties of the rock can be determined\
    \ using sonic logs. However, please note that running sonic log on every well\
    \ is either simply not economically feasible or can become very expensive. Therefore,\
    \ the existing sonic logs can be used to train a ML model to predict shear and\
    \ compression wave travel times (Δt_s and Δt_c). The calculations of Young’s modulus\
    \ and Poisson’s ratio are as follows (Belyadi et al., 2019):\n\n$$R_v = \\frac{\\\
    Delta t_s}{\\Delta t_c}$$\n\n$$\\Delta t_s = \\text{Shear wave travel time, }\
    \ \\mu\\text{sec/ft (obtained from sonic log)}$$\n\n$$\\Delta t_c = \\text{Compression\
    \ wave travel time, } \\mu\\text{sec/ft (obtained from sonic log)}$$\n\n(5.20)\n\
    \nShear and compression wave travel times are directly obtained from sonic logs.\
    \ The goal in this exercise is to train a ML model using SVM to predict shear\
    \ and compression wave travel times. After training a ML model, a triple combo\
    \ log with basic log properties such as gamma ray, bulk density, resistivity,\
    \ total or neutron porosity, and depth can be used to predict shear and compression\
    \ wave travel times in areas where there is no access to sonic logs. Therefore,\
    \ as opposed to spending more money in obtaining new sonic logs, the trained ML\
    \ model can be used to **predict** shear and compression wave travel times in\
    \ an attempt to calculate geomechanical properties. Poisson’s ratio, formation\
    \ modulus, and dynamic young’s modulus can be calculated as follows:\n\nPoisson's\
    \ ratio = $v = \\frac{0.5R_v^2 - 1}{R_v^2 - 1}$\n\n(5.21)\n\nFormation modulus\
    \ = $G = 1.34 \\times 10^{10} \\times \\frac{\\rho_b}{\\Delta t_s^2}$\n\nwhere\
    \ $\\rho_b$ is bulk density in g/cc.\n\nDynamic Young's modulus = $E = 2G(1 +\
    \ v)$\n\nMinimum horizontal stress = $P_c = \\frac{v}{1 - v}(\\sigma_v - \\alpha\
    \ P_p) + \\alpha P_p + \\sigma_{tectonic}$\n\n(5.22)\n\nwhere $\\sigma_v$ is vertical\
    \ stress in psi, $\\alpha$ is biot's constant, $P_p$ is pore pressure in psi,\
    \ and $\\sigma_{tectonic}$ is tectonic stress in psi.\n\nNow that the concept\

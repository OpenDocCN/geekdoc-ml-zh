    # Logistic regression


    Logistic regression is another powerful supervised ML algorithm used for binary
    classification problems (when target is categorical). The best way to think about
    logistic regression is that it is a linear regression but for classification problems.
    Logistic regression essentially uses a logistic function defined below to model
    a binary output variable (Tolles & Meurer, 2016). The primary difference between
    linear regression and logistic regression is that logistic regression’s range
    is bounded between 0 and 1. In addition, as opposed to linear regression, logistic
    regression does not require a linear relationship between inputs and output variables.
    This is due to applying a nonlinear log transformation to the odds ratio (will
    be defined shortly).


    $$Logistic function = \frac{1}{1 + e^{-x}}$$ (5.6)


    In the logistic function equation, $x$ is the input variable. Let’s **feed in
    values** $-20$ to $20$ into the logistic function. As illustrated in Fig. 5.17,
    the inputs have been transferred to between 0 and 1.


    As opposed to linear regression where MSE or RMSE is used as the loss function,
    logistic regression uses a loss function referred to as "maximum likelihood estimation
    (MLE)" which is a conditional probability. If the probability is greater than
    0.5, the predictions will be classified as class 0. Otherwise, class 1 will be
    assigned. Before going through logistic regression derivation, let’s first define
    the **logit** function. Logit function is defined as the natural log of the odds.
    A probability of 0.5 corresponds to a logit of 0, probabilities smaller than 0.5
    correspond to negative logit values, and probabilities greater than 0.5 correspond
    to positive logit values. It is important to note that as illustrated in Fig.
    5.17, logistic function ranges between 0 and 1


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_186_0.png)


    **FIGURE 5.17** Logistic regression applied to a range of $-20$ to $20$.'
- md: '$(P \in [0,1])$ while logit function can be any real number from minus infinity
    to positive infinity $(P \in [-\infty, \infty])$.


    $$odds = \frac{P}{1-P} \rightarrow \text{logit}(P) = \ln\left(\frac{P}{1-P}\right)
    \quad (5.7)$$


    Let''s set logit of $P$ to be equal to $mx + b$, therefore:


    $$\text{logit}(P) = mx + b \rightarrow mx + b = \ln\left(\frac{P}{1-P}\right)$$

    $$\left(\frac{P}{1-P}\right) = e^{(mx+b)} \rightarrow P = \frac{e^{(mx+b)}}{1+e^{(mx+b)}}
    \rightarrow P(x) = \frac{1}{1+e^{-(mx+b)}} \quad (5.8)$$


    Before using logistic regression in scikit-learn, let''s review some very important
    classification metrics used for evaluating a classification model such as logistic
    regression.


    ## Metrics for classification model evaluation


    A classification accuracy is defined as follows:


    $$Accuracy = \frac{\text{Number of correct predictions}}{\text{Number of all predictions}}
    \quad (5.9)$$


    Although accuracy provides a general understanding of the model''s accuracy in
    terms of predicting the correct classes, one major problem with using accuracy
    when evaluating a classification model is when there is unbalanced class distribution
    within a data set. For example, in a data set with 1 MM rows, 100K rows are assigned
    to class 0 and the remaining 900K rows are assigned to class 1, this is classified
    as an unbalanced distribution. Therefore, confusion matrix is recommended to obtain
    more information in terms of evaluating a model''s accuracy. Confusion matrix
    shows the correct and incorrect predictions on each class. For example, if there
    are two classes that a classification ML model predicted, a confusion matrix shows
    the true and false predictions on each class. In a binary classification problem
    when a logistic regression model is used, confusion matrix is a $2 \times 2$ matrix.
    For N output classification problems, NxN (N by N) matrix will be used. Now, let''s
    define the terminologies used within a confusion matrix assuming a $2 \times 2$
    confusion matrix with class A and B:


    - True positive: the number of times that a ML model is correctly classifying
    the sample as class A

    - False negative: the number of times that a ML model is incorrectly classifying
    the sample as class A

    - False positive: the number of times that a ML model is incorrectly classifying
    the sample as class B

    - True negative: the number of times that a ML model is correctly classifying
    the sample as class B


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_188_0.png)


    FIGURE 5.18 Confusion matrix.


    The idea is to maximize true positive and true negative and minimize false positive
    and false negative instances. Fig. 5.18 illustrates a confusion matrix with two
    classes (A and B) with the terminologies described above.


    Precision and recall are metrics used to evaluate a classification model. These
    parameters provide more insight into a model''s accuracy. Precision and recall
    are defined below:


    $$Precision = \frac{True\ positive}{Predicted\ results} = \frac{True\ positive}{True\
    positive + false\ positive}$$

    $$Recall = \frac{True\ positive}{Actual\ results} = \frac{True\ positive}{True\
    positive + false\ negative}$$

    (5.10)


    As illustrated, precision measures the accuracy of a model when evaluating positive
    classes. In other words, out of the predicted positive classes, precision determines
    the number that is actually positive. Precision is preferred when the cost of
    false positive is very high. For instance, ML can be used for spam email detection.
    In an email detection, a false positive indicates that an email that is not a
    spam was identified as a spam. Thus, the end user might not receive important
    emails if precision is not high. Therefore, there is a trade-off between precision
    and recall. As noted, precision and recall cannot be maximized at the same time
    and one is preferred over the other depending on the project. These two metrics
    are inversely proportional.


    Recall measures the number of actual positives. Recall is used when there is a
    high cost associated with **false negative**. In the banking industry, fraudulent
    detection is very important. Therefore, if a fraudulent transaction is predicted
    as nonfraudulent, it could lead to terrible consequences for the bank. In summary:


    - High cost associated with false positive: maximize precision

    - High cost associated with false negative: maximize recall


    In the O&G industry, if the goal is to classify a screen-out stage ahead of time,
    the idea is to send a warning and make sure any instance that could potentially
    lead to screening-out (sanding off) a well is classified as screen-out. Otherwise,
    a costly screen-out could be the consequence. Therefore, there is a high cost
    associated with false negative and the goal is to maximize recall when training
    a classification ML model. This will lead to proper investigation of every alert
    to be on the cautious side.



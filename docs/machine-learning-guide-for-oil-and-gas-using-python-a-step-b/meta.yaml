  md: 'Due to advancements in technology in the past few decades, the quantity of
    data that can be generated and stored has tremendously increased. Currently, more
    than 2 quadrillion bytes of data are produced (Forbes.Com) in the forms of text,
    image, voice, and video. This value is estimated to significantly increase in
    the future. Therefore, if the ML algorithms can be exposed to much more labeled
    data, this exposure can improve the performance of ML models. These algorithms
    are massively parallelizable, meaning they can benefit from modern graphics processing
    units (GPUs) architecture. These architectures simply were not available when
    deep learning (DL) was first introduced decades ago. Supercomputers and cloud
    computing make parallel processing faster and less expensive. Finally, due to
    open-source toolboxes such as TensorFlow (which will be discussed in the example),
    building these models has become extremely straightforward. We will use Keras,
    a high-level interface that uses TensorFlow for its back end to build a long short-term
    memory (LSTM) model for one-second frac data prediction later in this chapter.


    Fig. 6.21 illustrates the difference between AI, ML, and DL. AI simply uses machine
    intelligence as opposed to human intelligence; ML is a subset of AI and refers
    to various algorithms (some of which have been discussed) without being explicitly
    programmed. Finally, DL is a subset of ML that uses different forms of complex
    neural networks as the learning algorithm to



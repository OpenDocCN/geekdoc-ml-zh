- md: '## Matplotlib library


    Matplotlib is one of the most important and common visualization libraries in
    Python. It provides great flexibility when plotting any aspect of a figure. This
    library was designed to have a similar user interaction as Matlab''s graphical
    plotting. One of the main advantages of this library is that it is versatile,
    and anything can be plotted. However, it might be challenging to do more complex
    plots. Those complex plots will require more coding. Please refer to Matplotlib''s
    website if some more complex plots that have not been covered in this chapter
    would like to be explored (Matplotlib''s website: https://matplotlib.org/tutorials/introductory/sample_plots.html).
    Please note that matplotlib creates static image files such as JPEG or PNG files
    and does not change once created.


    To start creating some plots, let''s import pandas, numpy, and matplotlib libraries.
    "%matplotlib inline" is also added (only in Jupyter Notebook), so all the plots
    are shown within Jupyter Notebook. Variables x and y can also be created as follows:


    ```

    import numpy as np

    import pandas as pd

    import matplotlib.pyplot as plt

    %matplotlib inline

    x=np.linspace(0,10,100)

    y=x**3

    ```


    Now let''s plot the created x and y variables above using "plt.plot." Please note
    that any color can be simply entered as shown below. In this plot, red color,
    line width of 4, and line style of "--" are used. In addition, "plt.xlabel" and
    "plt.ylabel" are used to show the x and y labels, and "plt.title" is used to show
    the title of the plot.


    ```

    plt.plot(x,y,''red'',linewidth=4, linestyle=''--'')

    plt.xlabel(''Time'')

    plt.ylabel(''Number of iterations'')

    plt.title(''Number of Iterations Vs. Time'')

    ```


    Python output=Fig. 2.4


    Next, let''s use the matplotlib library to create a subplot of three plots as
    illustrated below. The first line of code is to define the figure size. In this
    example, a figsize of 10 by 5 is being used. 10 represents the length of the plot
    and 5 represents the width. Please feel free to adjust these numbers until your
    desired plot size is achieved. In addition, "plt.subplot(1,3,1)" represents a
    plot with 1 row, three columns, and plot #1 of the subplot. In other words, "plt.subplot(1,3,1)"
    can be considered as plt.subplot(row,column,plot#).


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_63_0.png)


    FIGURE 2.4 plt plot of x and y variables.


    ```

    fig=plt.figure(figsize=(10,5))

    plt.subplot(1,3,1)

    plt.plot(x,y,''b'')

    plt.title(''Plot 1'')

    plt.subplot(1,3,2)

    plt.plot(y*2,x**2,''r'')

    plt.title(''Plot 2'')

    plt.subplot(1,3,3)

    plt.plot(x,y,''purple'')

    plt.title(''Plot 3'')

    ```


    Python output=Fig. 2.5


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_63_1.png)


    FIGURE 2.5 plt.subplot of x and y variables.


    Next, let’s create two plots inside of one large plot. This can be achieved by
    creating an empty figure first. Then, use "fig.add_axes" to add the dimensions
    of each plot as revealed below. Afterward, each plot along with their titles and
    labels can simply be added as illustrated.


    ```

    # plt.figure() creates an empty figure

    fig=plt.figure()

    # figsize can be defined

    fig=plt.figure(figsize=(10,6))

    # The dimensions can then be added (left, bottom, width, height) for each figure

    fig1=fig.add_axes([0.1,0.1,0.8,0.8])

    fig2=fig.add_axes([0.25,0.5,0.3,0.2])

    # Each figure can be plotted and axes and tiles can be added

    fig1.plot(x,y)

    fig1.set_title(''Large Plot'')

    fig1.set_xlabel(''Time'')

    fig1.set_ylabel(''Number of iteration'')

    fig2.plot(x*2,y)

    fig2.set_title(''Small Plot'')

    fig2.set_xlabel(''Time'')

    fig2.set_ylabel(''Number of iteration'')

    Python output=Fig. 2.6

    ```


    Another method to draw a subplot is using "fig.axis" command as shown below:


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_64_0.png)


    FIGURE 2.6 Nested plots.


    ```

    fig,axes=plt.subplots(nrows=2,ncols=2,figsize=(5,5),dpi=100)

    # Plot #1 in the first row and first column

    axes[0,0].plot(x,y)

    axes[0,0].set_title(''Plot 1'')

    axes[0,0].set_xlabel(''Time'')

    axes[0,0].set_ylabel(''Production 1'')

    # Plot #2 in the first row and second column

    axes[0,1].plot(y,x)

    axes[0,1].set_title(''Plot 2'')

    axes[0,1].set_xlabel(''Time'')

    axes[0,1].set_ylabel(''Production 2'')

    # Plot #3 in the second row and first column

    axes[1,0].plot(y,x**2)

    axes[1,0].set_title(''Plot 3'')

    axes[1,0].set_xlabel(''Time'')

    axes[1,0].set_ylabel(''Production 3'')

    # Plot #4 in the second row and second column

    axes[1,1].plot(x,y**2)

    axes[1,1].set_title(''Plot 4'')

    axes[1,1].set_xlabel(''Time'')

    axes[1,1].set_ylabel(''Production 4'')

    plt.tight_layout()

    ```


    Python output=Fig. 2.7


    As illustrated above, Fig. 2.7 subplot contains 2 rows and 2 columns (nrows =
    2, ncols = 2). "figsize" and dpi of 100 are defined for plot resolution (feel
    free to adjust those accordingly). "axes[0,0].plot(x,y)" indicates to plot x and
    y variables (defined earlier) as x-axis and y-axis on the first plot located on
    the first row and first column. Title, x and y axes labels can also be set using
    "axes[row #, column #].set_title(''NAME'')," "axes[row #, column #].set_xlabel(''NAME''),"
    and "axes[row #, column #].set_ylabel(''NAME'')." Please note that "plt.tight_layout()"
    is used to avoid overlapping. This is a very useful function in matplotlib.


    Let''s import natural gas pricing using a csv file and call it "df_ng" as follows:


    ```

    df_ng=pd.read_csv(''Chapter2_Natural_Gas_Pricing_DataSet.csv'',

    parse_dates=[''Date''],index_col=[''Date''])

    df_ng.head()

    ```


    Python output=Fig. 2.8


    Please note that "parse_dates = [''Date'']" and "index_col = [''Date'']" are used
    when importing the csv file to make sure the date column when plotting is formatted/read
    properly and would not overlap. Next, let''s plot date versus gas pricing over
    time. To call the gas pricing column (which is called Value in this data frame),
    df_ng[''Value''] can be used and to call the date column in the csv file, "df_ng.index.values"
    can be used.



    the previous sections. For example, in the temperature control system defined
    earlier with two input variables, Temperature and Humidity. The output or control
    action is Fan Speed. There are two linguistic values Cold and Hot for the Temperature
    and Low and High for Humidity and three linguistic values Low, Medium, and High
    for Fan Speed. For this system, four rules can be derived as shown in Table 8.1.
    Note that another set of 12 rules can be defined if the complement of the input

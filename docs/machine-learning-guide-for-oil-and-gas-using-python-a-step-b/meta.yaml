    allows for a smoother and more effective control in many systems including temperature
    control, automatic transmission in cars, handwriting recognition, and oil and
    gas problems such as investment decisions, candidate selection for restimulation,
    and choke management.


    # Mathematical function


    Remember that in classical set theory the membership for element in the universe
    $X$ is 0 or 1, meaning considering a set $A$ with an item $x \in X$ is either
    in the set (1) or not in the set (0). However, for fuzzy sets, there is a range
    of membership defined for each element in the universe $X$, with range [0,1] inclusive.
    The function that formulates the membership value for a fuzzy set is called a
    *membership function* and is shown for a fuzzy set $A$ and universe $X$ as follows:


    $\mu_A(x)$, for $x \in X$. (8.10)


    In order to define a fuzzy set $A$ in universe $X$ given a membership function
    $\mu_A(x)$, a set of ordered pairs is defined as follows:


    $A = \{(x, \mu_A(x))|x \in X\}$ (8.11)'

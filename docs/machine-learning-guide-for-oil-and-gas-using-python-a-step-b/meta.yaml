    with sand control strategies. Based on actual data for the wells that experienced
    sand production, it is possible to train a binary classifier model that predicts
    whether sand production occurs for a well. In the sand production prediction example,
    a data set that includes 29 wells from the Northern Adriatic basin (Moricca et
    al., 1994; Gharagheizi et al., 2017) was used. Sand production data set consists
    of attributes in Table 7.1.


    The target variable in this example is sand production which is considered to
    be 1 if sand production occurred and 0 if sand was not produced from a well. Data
    set "Sand production" can be found in the following link: https://www.elsevier.com/books-and-journals/book-companion/9780128219294.
    Data loading and descriptive statistics are done by the following codes:



    # Extreme gradient boosting


    Extreme gradient boosting, also known as XGBoost, developed by Tianqi Chen (Chen
    & Guestrin, 2016), is another type of ensemble supervised ML algorithm used for
    both classification and regression problems. XGBoost is a type of gradient boosting
    method and is different from a gradient boosting model as follows:


    +   - XGBoost uses L₁ and L₂ regularization which helps with model generalization
    and overfitting reduction.

    - As previously discussed under the gradient boosting section, the error rate
    of a gradient boosting model is used to calculate the gradient, which is essentially
    the partial derivative of the loss function. In contrast, XGBoost uses the **second**
    partial derivative of the loss function. Using the second partial derivative of
    the loss function will provide more info about the direction of the gradient.

    - XGBoost is usually faster than gradient boosting due to the parallelization
    of tree construction.

    - XGBoost can handle missing values within a data set; therefore, the data preparation
    is not as time-consuming.


    # Extreme gradient boosting implementation using scikit-learn


    Let''s also use the previous data set to apply the regression version of XGBoost
    to see its performance. Start a new Jupyter Notebook and follow the same previous
    steps shown in the gradient boosting section until after train_test_split (or
    continue with the same Jupyter Notebook). Instead of importing "GradientBoostingRegressor,"
    import "XGBRegressor" as shown below. For classification problems, simply import
    "XGBClassifier" instead. Prior to'

    \n```python\ncorr_test=np.corrcoef(y_test, y_pred_test)[0,1]\nprint('Testing Data\
    \ R^2=',round(corr_test**2,4),'R=',\n    round(corr_test,4))\n```\n\nPython输出=Testing\
    \ Data R^2=0.8917 R=0.9443\n\n接下来，让我们可视化训练和测试数据的实际NPV值与预测NPV值，如下所示：\n\n```python\n\
    plt.figure(figsize=(10,8))\nplt.plot(y_train, y_pred_train, 'y.')\nplt.xlabel('NPV\

    Next, let''s define the XGBoost parameters. Objective is set to "reg:squarederror"
    which uses the squared error to minimize the loss function. "n_estimators" specifies
    the number of trees (as was discussed under multiple sections before). Learning
    rate defines the step size which means each weight in all trees will be multiplied
    by this value (in this case 0.1 was used). Learning rate can range between 0 and
    1. "reg_alpha" controls L1 regularization on leaf weights. A high "reg_alpha"
    leads to more regularization. "reg_lambda" specifies L2 regularization on leaf
    weights. "max_depth" specifies the maximum depth of the tree during any boosting
    run. "gamma" determines whether to proceed with further partitioning on a leaf
    node of a tree based on the expected loss reduction.


    ```

    np.random.seed(seed)



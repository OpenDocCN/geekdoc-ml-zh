  md: 'There has been a lot of application for fuzzy logic in the oil and gas industry
    since four decades ago in various fields such as drilling, petrophysics, well
    stimulation design, system control, field development optimization, reservoir
    characterization, production allocation, etc. Mohaghegh was one of the pioneers
    in using fuzzy logic in the oil and gas industry. He used fuzzy logic in conjunction
    with neural networks and genetic algorithms to select the best candidate for well
    restimulation in Green River Basin (Mohaghegh, 2000). He also applied fuzzy logic
    for pattern recognition in unconventional resources and mapping natural fracture
    systems (Mohaghegh, 2017). Gholami et al. used fuzzy rock typing to upscale high-resolution
    geological models for flow simulation (Gholami & Mohaghegh, 2009). Xion and Holditch
    showed how to design optimal stimulation treatment and developed fuzzy evaluators
    for treatment type, barrier condition, injection method, and formation damage
    diagnostics (Xion & Holditch, 1995). Rivera et al. used fuzzy logic to design
    a pressure control system for a fracturing facility, considering a wide range
    of fluid types and pumping conditions (Rivera, 1994). Aminzadeh et al. implemented
    fuzzy logic with neural networks to rank hydrocarbon reservoirs and identify high-grade
    prospects (Aminzadeh & Brouwer, 2006). Ahmed et al. utilized fuzzy logic to estimate
    the rate of penetration for a drilling bit using surface drilling parameters and
    drilling fluid properties (Ahmed et al., 2019). Fuzzy logic was also used to estimate
    rock strength by rock masses (Sari, 2016), production allocation in commingled
    production wells (Widarsono et al., 2005), and choke size control for production
    systems (Odedele & Ibrahim, 2014).


    In this chapter, the classical set theory will be briefly discussed to prepare
    the reader for the fuzzy set theory. For the fuzzy sets, membership functions,
    fuzzy set operations, and approximate reasoning would be explained. Finally, fuzzy
    inference and fuzzy clustering will be discussed with oil and gas–related examples
    like choke control and rock-type classification.


    # Classical set theory


    Classical sets are a collection of unique items usually denoted by curly brackets
    {}. RockType = {Sandstone, Limestone, Carbonate, Shale}. RockType set includes
    different rock types.


    As shown in Fig. 8.1, a Venn diagram can be used to visualize a set and shows
    its relationship with the other sets. Each circle represents a set; mutual members
    are shown by overlapping part of the circles. Universal Set denoted as U includes
    all the elements in the context which are being modeled using sets. Any subset
    of U can be considered as a set in the universe.


    Membership of Elements of an object x is in a set A and is shown as x ∈ A. For
    example, Limestone ∈ RockType means Limestone is a member of RockType set. Cardinality
    of sets is the number of items inside a set. Set cardinality is denoted as |A|
    for a set A. For example, when cardinality of RockType is 4, |RockType| = 4. Null
    set is a set with no items inside of it. For example, A = {} shows a null set
    with cardinality of |A| = 0. Usually null sets are denoted as ϕ. Singleton set
    is a set'

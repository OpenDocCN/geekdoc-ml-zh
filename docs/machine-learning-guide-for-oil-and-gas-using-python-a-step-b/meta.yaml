    \ ft，使用单棵树可能会由于预测中的**方差**而导致错误值。避免在预测EUR/1000 ft时出现这种方差的一种方法是，从数百或数千棵决策树中获取预测，并使用这些树的平均值来计算最终答案。将许多决策树组合成一个模型，本质上是使用随机森林背后的基本概念。单个决策树做出的预测可能不准确，但当它们组合在一起时，预测将更接近平均值。随机森林通常比单个决策树更准确的原因是，它融合了来自许多预测的更多知识。对于回归问题，随机森林使用决策树的平均值进行最终预测。然而，如前所述，分类问题也可以通过随机森林解决，方法是采用预测类别的多数投票。另一种集成学习方法是梯度提升，接下来将讨论。图5.47说明了单个决策树与由决策树集成组成的随机森林之间的区别。\n\

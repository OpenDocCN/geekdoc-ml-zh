- md: "## 2.3.2 Plotly与Cufflinks\n\n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_89_0.png)\n\
    \n**FIGURE 2.32** PairGrid plot of df_Shale data frame.\n\n请注意，Plotly既是一家公司，也是一个开源的交互式数据可视化库。顾名思义，Plotly公司专注于商业智能的数据可视化，例如创建仪表板、报告等。Plotly公司发布了一个名为plotly的开源交互式数据可视化库，该库主要专注于交互式数据可视化，正如稍后将展示的那样。单独使用Plotly\
    \ Python库可以创建交互式绘图，保存为.html文件。虽然这些绘图是高质量的交互式绘图，但它们无法连接到变化的数据源。因此，为了创建针对变化数据源的交互式实时仪表板，可以将“Dash”库与plotly库结合使用。Dash也是Plotly公司的一个开源库，允许使用各种交互组件和绘图来创建完整的仪表板。Dash库和创建仪表板不在本书中讨论，因为它超出了本书的范围。Cufflinks将plotly与pandas连接起来。请访问plotly.ly网站获取更多信息。Plotly和Cufflinks不包含在Anaconda包中，因此，请使用Anaconda提示符窗口下载这两个包，如下所示：\n\
    \n```\npip install plotly\npip install cufflinks\n```\n\n通过Anaconda提示符窗口下载后，插入以下代码行以离线使用此库。如果pandas和numpy库已在之前的模块中导入，则无需重新导入这些库，如下所示。\n\

  md: '# Handling missing data (imputation techniques)


    This chapter has primarily focused on supervised algorithms that can be applied
    to solve various problems. Another important concept that was briefly discussed
    in Chapter 1 is handling missing data. The basic types of dealing with missing
    data were previously discussed. Below are various common approaches to missing
    data:


    +   1) Simply remove any samples with N/A values: This is the simplest method
    of treating missing data, and the disadvantage of this approach is that the number
    of samples could be drastically reduced due to the removal of missing info. For
    example, if 1000 out of 2000 wells miss one important feature, removing wells
    with missing features will result in only 1000 wells. This is 50% less wells that
    could be included in the ML model.

    2) Replacing missing values with the mean, median, most frequent, first value
    after missing, last value before missing of the existing data: Although this approach
    is overly simplistic and easy to perform, it is not typically recommended since
    there are other powerful algorithms that can be used instead.

    3) Some algorithms such as k-nearest neighbor (KNN) and MICE can be used to fill
    the missing data. These algorithms do a great job only when the following two
    conditions exist:

    - There is an inherent relationship between the parameters that are missing and
    the existing parameters. For example, if sand/ft for one well is missing, but
    water per foot for the well is available, these algorithms might produce meaningful
    answers.

    - Most of the features with some inherent relationships must be present. One challenge
    that could be encountered when using these algorithms is that when a well misses
    a feature, it could potentially miss other important features. For example, when
    gathering competitor data, when a well misses sand loading, it usually misses
    water loading, stage spacing, etc.


    The fancyimpute package in Python is a powerful package when one or two parameters
    in a data set are sporadically missing while there are other parameters that have
    inherent relationships between those parameters. When most of the parameters are
    simply missing from a well’s data, it is not recommended to use these packages
    because they could quite possibly produce erroneous results. When using these
    packages, be sure to normalize or standardize the data prior to applying algorithms
    such as KNN and MICE. K-nearest neighbor uses feature similarity to predict the
    missing values. KNN essentially assigns a new value based on how closely it resembles
    points in the data set. The advantage of KNN is that it is more accurate than
    simply using'
  merge: -1
  pgno: 274
- img_proc: true
  md: 'mean, median, or most frequent methods. The disadvantage when using KNN is
    that it is computationally expensive, meaning it works by storing the whole training
    data set in memory. In addition, KNN is sensitive to outliers in the data set.
    Therefore, make sure the outliers are removed and the data are standardized prior
    to usage.


    # Multivariate imputation by chained equations


    Multivariate imputation involves filling in the missing values multiple times,
    creating multiple "complete" data sets. This is described in detail by Schafer
    and Graham (2002). The missing values are imputed based on the observed values
    for a given individual and the relations observed in the data for other participants,
    assuming the observed variables are included in the imputation model. Multiple
    imputation procedures, particularly MICE, are very flexible and can be used in
    a broad range of settings. The following steps are taken when using MICE:


    +   Step 1) A simple imputation, such as mean imputation is performed for every
    missing value in the data set. These mean imputations can be elaborated as "place
    holders" (Azur et al., 2011).

    Step 2) The "place holder" mean imputations for one variable ("var") are set back
    to missing (Azur et al., 2011).

    Step 3) "var" would then become the dependent variable in a regression model and
    all the other variables become independent variables in the regression model (Azur
    et al., 2011).

    Step 4) The missing values for "var" are then replaced with imputation predictions
    from the regression model (Azur et al., 2011).

    Step 5) Steps 2–4 are then repeated for each variable with missing data. The cycling
    through each of the variables constitutes one iteration or "cycle." At the end
    of one cycle, all the missing values have been substituted with predictions from
    regressions that reflect the observed data relationships (Azur et al., 2011).

    Step 6) Steps 2 through 4 are repeated for several cycles, with the imputations
    being updated at each cycle. The number of cycles to be performed can be specified
    by the user. At the end of these cycles, the final imputations are retained, resulting
    in one imputed data set (Azur et al., 2011).



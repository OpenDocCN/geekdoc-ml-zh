  - '[PAGE 412]


    In the following example, fuzzy c-means clustering would be used to determine
    multiple clusters for a porosity_permeability data set. This synthetic data set
    includes 120 samples with porosity and permeability values from core data. The
    objective is to define different rock types based on samples with two attributes.
    Generally, there are many attributes for samples in rock typing clustering problems.
    When the number of attributes is more than 2, it is not easy to visualize different
    classes versus multiple attributes. In order to differentiate and visualize all
    the classes versus multiple attributes, samples with two attributes are used in
    this example. It is also worth mentioning that typically, there is a logarithmic
    trend in permeability versus porosity. Therefore, permeability values should be
    used in logarithmic scales. The data set should also be scaled to the range of
    0–1 due to the fact that porosity and permeability values are in different ranges.
    Classification of rock types using porosity-permeability data using fuzzy c-means
    clustering can be done with the following Python codes: https://www.elsevier.com/books-and-journals/book-companion/9780128219294


    ```

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    import skfuzzy

    import math

    #Specify colors for different classes

    colors=[''b'', ''grey'', ''g'', ''r'', ''c'', ''m'', ''y'', ''k'', ''lime'', ''purple'']

    #import Dataset and change permeability to log-scale

    dataset = pd.read_csv(

    ''Chapter8_Fuzzy_Clustering_Porosity_Permeability.CSV'')

    ds_log=pd.DataFrame.copy(dataset)

    ds_log[''Permeability'']=ds_log[''Permeability''].apply(math.log10)

    # Scale the data from 0 to 1

    from sklearn.preprocessing import MinMaxScaler

    scaler=MinMaxScaler()

    scaler.fit(ds_log)

    ds_log_scaled=scaler.transform(ds_log)

    #Transpose Scaled data for Fuzzy Cluster Algorithm

    ds_log_scaled=ds_log_scaled.T

    #Plot permeability vs porosity

    plt.figure()

    plt.plot(dataset[''Porosity''],dataset[''Permeability''],''ro'')

    plt.xlabel(''Porosity(%)'')

    plt.ylabel(''Permeability(md)'')

    #Plot permeability vs porosity with scaled data

    plt.figure()

    plt.plot(ds_log_scaled[0,:],ds_log_scaled[1,:],''ro'')

    plt.xlabel(''Porosity'')

    plt.ylabel(''Permeability'')

    ```



    ## 模糊推理系统


    模糊推理系统是基于模糊理论的原理控制系统。该系统的主要组成部分是 (i) 模糊化，(ii) 模糊规则定义，(iii) 模糊推理，以及 (iv) 决策的去模糊化
    (Himanshu & Lone, 2019)。所有这些步骤将在下一节的温度控制系统和节气门尺寸控制示例中进行说明。这四个步骤帮助我们定义一个基于使用模糊集定义和表征的语言值的逻辑框架。该系统类似于人类使用推理陈述来解决某些问题的方式。这种控制在许多工程问题中（包括油气作业）被认为很强大。执行模糊推理系统有三种方法：Mamdani、Takagi-Sugeno
    和 Tsukamoto (Himanshu & Lone, 2019)。本书中，Mamdani 推理用于两个示例。模糊推理系统的一般工作流程如图 8.14
    所示。


    ## 输入模糊化


    对于 (i) 模糊化，每个输入变量 ($I_i$) 和输出变量 ($O_i$) 都在一个有意义的论域（值范围）上考虑。同时，使用该输入变量的一组语言估值。例如，对于温度，可以定义一个范围
    [30, 120]，并使用两个语言变量“冷”和“热”来表征我们系统中温度的状态。作为模糊化步骤的一部分，必须为该论域中的所有变量定义一个隶属函数 ($\mu_i(x)$,
    $x \in I_i$)。请注意，隶属函数可以是不同的形式，例如三角形、梯形、高斯形。例如，语言值“冷”和“热”的隶属函数 $\mu_{Cold}(x)$
    和 $\mu_{Hot}(x)$ 可以如图 8.15 所示，其隶属函数定义如下：


    $$\mu_{Cold}(x) = \max\left(\min\left(1, \frac{80-x}{80-60}\right), 0\right) \quad
    (8.20)$$


    $$\mu_{Hot}(x) = \max\left(\min\left(\frac{x-60}{80-60}, 1\right), 0\right) \quad
    (8.21)$$



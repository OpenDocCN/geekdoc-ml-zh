    gas fields. They used wellhead pressure, cumulative production, and choke size
    as inputs and production rate as the output of the neural network. The forecasted
    production rate was added to cumulative production to predict new production.
    They observed that DL models can predict short-term forecast with high precision.
    Gupta et al. (Gupta et al., 2019) utilized deep neural networks to analyze borehole
    images. They used fully convolutional networks (FCN) which are a form of CNN but

    In binary classification, when the number of cases in each class is very imbalanced,
    accuracy may not be a good metric for the model''s prediction performance evaluation
    (Albon, 2018). Some of the imbalance classes in the oil and gas industry can be
    wells that experience blowout or severe pipeline leakage/oil spills. For imbalanced
    data sets, it is better to use "Precision," defined as the ratio of correct or
    TPs to all the positives that were predicted by the model. It should be mentioned
    that class with fewer samples like the number of well blowouts is considered positive.



    **Python output=R2_Cross-validation scores: [0.89722326 0.86415599 0.79374482
    0.94312108 0.94706938 0.88140055 0.52043121 0.94923754 0.92307646 0.81054857]**


    print(" Average R2_Cross-validation scores: {}".

    format(scores_R2.mean()))

    **Python output=Average R2_Cross-validation scores: 0.8530008849657191**

    ```


    Thus far, we have observed that both gradient boosting and XGBoost algorithms
    have very similar performance for this particular data set.


    # Adaptive gradient boosting


    Adaptive gradient boosting or AdaBoost is another form of supervised ML boosting
    algorithm. In adaptive boosting, the weights on the sample observations that are
    challenging to classify or predict are **increased** by altering the distribution
    of the training data set. As opposed to AdaBoost where the sample distribution
    gets modified, in gradient boosting the distribution does **not** get modified
    and the weak learners train on the remaining errors of the strong learners. Remember
    that a weak learner is defined as a classifier that has a strong correlation with
    true classification. In other words, it can correctly classify or predict slightly
    better than random guessing. On the other hand, a strong learner is a classifier
    with a **stronger** correlation with true classification.'

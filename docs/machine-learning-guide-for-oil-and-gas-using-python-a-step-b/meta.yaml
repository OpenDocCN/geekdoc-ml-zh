    # K-nearest neighbor


    K-nearest neighbor also known as KNN is one of the simplest forms of supervised
    ML algorithm that is used for both classification and regression problems. KNN
    is assumed to be a nonparametric algorithm which means no assumptions are made
    about the underlying data (Cover & Hart, 1967). The KNN algorithm works based
    on the basis of similar proximity using distance calculations. The following steps
    are used when developing a KNN model:


    +   1) Determine the number of nearest neighbors also known as K. For instance,
    if K=2, two of the closest points based on distance calculation will be chosen
    to determine where an instance will be assigned (in a classification problem).
    Selecting K can be challenging in a KNN algorithm. Choosing a small K means a
    higher influence on the result. On the other hand, choosing a higher K could lead
    to a smoother decision boundary with lower variance but increased bias. One approach
    in selecting K is to train a model with various K neighbors such as 1, 2 ... etc.,
    to see which K would result in the highest testing accuracy using a cross-validation
    technique discussed in the model validation chapter. Prior to proceeding to the
    next step, make sure to standardize the data.'

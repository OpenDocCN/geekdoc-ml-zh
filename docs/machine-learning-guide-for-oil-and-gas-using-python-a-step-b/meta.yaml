    Please note that "&" is used in lieu of "and" in Python. If "&" symbol is replaced
    with "and," Python will return an error. Therefore, the conditional statement
    above indicates that Drill, No_Drill, and Frac columns should all be greater than
    0 and No_Frac should be less than 0. This condition is only satisfied in index
    3 (or row 4) of the Decision data frame.

    Another conditional statement is to use "|" for "or" as follows. For example,
    if the Drill column of greater than 0 **OR** No_Drill column of less than 0 is
    desirable, Python will filter out remaining rows that fail to meet these criteria.


    ```

    Decision[(Decision[''Drill'']>0) | (Decision[''No_Drill'']<0)]

    Python output=Fig. 1.26

    ```


    Conditional filtering is very useful for automating various processes prior to
    implementing ML models. As the amount of data increases in the source file, it
    is much more convenient to perform all the filtering processes in Python prior
    to performing any analysis.


    # Pandas groupby


    Groupby is a very useful way of grouping rows together and performing an aggregate
    function on them. To illustrate the concept, let''s create a data frame with 3
    different corporation names and sales amount per corporation and person as follows:


    ```

    df=pd.DataFrame({''Corporation_Name'':[''CVX'',''EXXON'', ''CVX'',

    ''EXXON'', ''GE'',''GE''],''Sales_Person'':[''Adam'',''Alex'', ''Bruce'',

    ''Jessica'', ''Natalie'',''Rachel''],''Sales_Amount'':[2000,5000,

    10000,45000,60000, 20000]})

    df


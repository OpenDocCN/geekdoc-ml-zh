    \ sensitivity analysis\n\nOne-variable-at-a-time (OVAT) is a commonly used sensitivity\
    \ analysis tool in which one variable at a time is altered to observe the resulting\
    \ impact of each variable change **independently** to the model output. This means\
    \ that all the remaining input variables are held constant while the input feature\
    \ of interest is being sensitized on. For example, the average or the median of\
    \ each parameter within the training data set can be used for each parameter while\
    \ the parameter of interest is changed. In this example, an excel sheet was created\
    \ and called \"Sensitivity Analysis.\" Each input feature was sensitized as follows:\n\
    \n+   - Porosity is increased from 4.5% to 16.5% with increments of 1% while keeping\
    \ the other parameters as approximately the average of the training set to obtain\
    \ the predicted values of Aroot(K) from the trained model.\n- Acoustic impedance\
    \ is increased from 1.4 to 5 with increments of 0.1 while keeping the other parameters\
    \ as approximately the average of the training set to obtain the predicted values\
    \ of Aroot(K) from the trained model."

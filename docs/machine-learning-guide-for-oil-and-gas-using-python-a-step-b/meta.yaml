- img_proc: true
  md: 'For the training of the RNNs, backpropagation technique is used. The overall
    process is similar to what was explained early in this chapter. However, since
    there are multiple sequences or hidden layers in RNNs, using gradient descent
    technique can be challenging. For example, the error gradient for the early time
    steps becomes very small referred to as diminishing gradient problem. It this
    case, earlier layers, weights do not change, and neural network cannot learn from
    the data during the training process. To handle diminishing gradient problem,
    Hochreiter and Schmidhuber introduced LSTM in 1997 (Raschka & Mirjalili).


    LSTM consist of connected memory cells that control the flow of information during
    the training process for sequential data. Each cell includes 3 operating units
    that interact with each other to preserve the error through sequential backpropagation.
    These units that act similar to computer memories are: input gate, forget gate,
    and output gate. The job of these gates is to control when data should enter,
    be stored, and/or leave the cells. The schematic of connected cells and cell components
    are shown in Fig. 6.30.


    One important feature of each cell, considered as cell''s memory, is cell state
    (C). The cell states move through all the cells sequentially and are responsible
    for either retaining or forgetting the previous information. At each time step,
    cell state from previous time ($C^{t-1}$), hidden layer state from previous time
    ($A^{t-1}$), and input data ($I^t$) enter the cell. Initially, input data ($I^t$)
    and hidden layer state from previous time ($A^{t-1}$) go through the "forget gate."
    The


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_331_0.png)


    FIGURE 6.30 Schematic of long short-term memory (LSTM) cell and units (Raschka
    & Mirjalili).'
  merge: -1
  pgno: 331
- img_proc: true
  md: 'output of the forget gate ($f^t$) determines which information remains and
    which is forgotten from the previous step. Forget gates'' output is calculated
    as:


    $$f^t = F_{sigmoid}(W_{if}I^t + W_{Af}A^t + \theta_f)$$


    where $W_{if}$ is the weight matrix for input data in the forget gate, $W_{Af}$
    is weight matrix for hidden layer state in the forget gate, and $\theta_f$ is
    bias in the forget gate.


    Then, hidden layer state from previous time ($A^{t-1}$) and input data ($I^t$)
    goes through "input gate" which is responsible for updating the cells state by
    the following equations:


    $$i^t = F_{sigmoid}(W_{ii}I^t + W_{Ai}A^t + \theta_i)$$

    $$g^t = F_{tanh}(W_{ig}I^t + W_{Ag}A^t + \theta_g)$$

    $$C^t = (C^{t-1} \times f^t) + (i^t \times g^t)$$


    where $W_{ii}$, $W_{Ai}$, $W_{ig}$ , $W_{Ag}$ are weight matrix for input data
    and hidden layer state in two segments of the input gate (sigmoid and tanh activation).


    Finally, in the "output gate," updating the hidden layer state ($A^t$) by considering
    the updated cell state ($C^t$) is decided using the following equations:


    $$O^t = F_{sigmoid}(W_{io}I^t + W_{Ao}A^{t-1} + \theta_o)$$

    $$A^t = O^t \times F_{tanh}(C^t)$$


    where $W_{io}$ and $W_{Ao}$ are weight matrix for input data and hidden layer
    state in the output gate (Raschka & Mirjalili).


    # Deep learning applications in oil and gas industry


    The oil and gas industry can be considered one of the main producers of big data.
    Fiber optics, satellite images, seismic data, downhole gauges/flowmeter records,
    well logs, and other sources of information are used every day for assessment,
    monitoring, and decision-making. Many oil and gas companies are now collaborating
    with IT giants like Amazon, Google, and Microsoft to store all the data on the
    cloud and use high computational capacities. This resulted in a sharp growth in
    the application of DL in the oil and gas industry, and few of them would be discussed.


    Crnkovic et al. (Crnkovic-Friis & Erlandson, 2015) used DL to estimate EUR from
    geological data from a region in the Eagle Ford Shale. The data set included 800
    wells with 200,000 data points. Seven geological parameters such as porosity,
    thickness, water saturation, etc. were populated into geological grids and averaged
    on a well level. They used stacked denoising autoencoder as DL method and used
    EUR as the target feature. They observed mean absolute percentage error of 28%
    for the validation set. Omrani et al. (Shoeibi Omrani et al., 2019) assessed the
    performance of different methods (physical models, decline curve analysis, DL,
    and hybrid models) for short-'
  merge: -1
  pgno: 332
- img_proc: true
  md: 'term (6 weeks) and long-term (several years) production forecasting for different
    gas fields. They used wellhead pressure, cumulative production, and choke size
    as inputs and production rate as the output of the neural network. The forecasted
    production rate was added to cumulative production to predict new production.
    They observed that DL models can predict short-term forecast with high precision.
    Gupta et al. (Gupta et al., 2019) utilized deep neural networks to analyze borehole
    images. They used fully convolutional networks (FCN) which are a form of CNN but
    without densely connected layers to detect geological features like induced fractures,
    natural fractures, and sedimentary surfaces. They used labeled borehole images
    from four wells to train local and global models that would be used for automated
    borehole image analysis. Alakeely et al. (Alakeely & Horne, 2020) modeled reservoir
    behavior with CNNs and RNNs. In their study, reservoir simulation was used to
    generate data sets based on different well patterns. The data set included pressure,
    injection, and production data as inputs and pressure or rate as the target feature.
    They compared the performance of CNN and RNN models in predicting reservoir performance.


    Dramsch et al. (Dramsch & Lüthje, 2018) used CNNs for 2D seismic interpretation.
    2D in-line seismic slice is labeled by different features such as steep dipping
    reflectors, continuous high amplitude regions, salt intrusions, etc. Afterward,
    three different CNN networks (Waldeland CNN, VGG16, and ResNet 50) were used for
    training. They compared the performance of these CNN networks for seismic facies
    classification. Zhange et al. (Zhang et al., 2019) trained a deep CNN model to
    pick the faults in the seismic images and determined fault dips and azimuth. They
    generated 100,000 3D synthetic images (cubes) with one linear fault for training
    and 10,000 images for validating the CNN model. The trained model was tested on
    various seismic images from different regions such as the Gulf of Mexico, North
    Sea, and Trinidad deep water for fault picking. Shen et al. (Shen & Cao, 2020)
    developed a CNN-based model that recognizes ball seat event for the hydraulic
    fracturing operations. They used slurry rate, wellhead pressure, and their first
    and second derivative as input data to train a CNN model to predict ball seat
    events. Das et al. (Das & Mukerji, 2019) obtained petrophysical properties from
    prestack seismic data using CNNs. They used two approaches to train CNNs that
    map the correlation between prestack seismic data and petrophysical properties
    like porosity, volume of clay, and water saturation. In the first approach, they
    used cascaded CNNs with two separate networks. The first one predicts elastic
    properties (Vp, Vs, and RHOB) from prestack seismic data, and the second one predicts
    petrophysical properties from elastic properties. In the second approach, called
    end to end, CNN finds the correlation between petrophysical data and prestack
    seismic data directly. Chaki et al. (Chaki et al., 2020) made proxy models for
    flow simulators by utilizing deep and recurrent neural networks. They used Brugge
    reservoir model which includes 60,000 grid blocks with 20 production and 10 injection
    wells. This model has nine grid layers in vertical direction (stratigraphic grid
    layer). A permeability multiplier is assigned to each grid layer. They trained
    deep and'

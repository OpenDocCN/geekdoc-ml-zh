- img_proc: true
  md: 'To illustrate the euclidean distance calculation for a data set with 3 features,
    let''s apply the euclidean distance to the following two vectors: (3,9,−5) and
    (8,−1,12)


    $$\sqrt{\sum_{i=1}^{k} (x_i - y_i)^2} = \sqrt{(8-3)^2 + (-1-9)^2 + (12-(-5))^2}
    = \sqrt{25 + 100 + 289} = \sqrt{414} = 20.35$$


    5) Afterward, find the average value of instances assigned to each cluster centroid
    (that was assigned in step 4) and recalculate a new centroid for each cluster
    by moving the cluster centroid to the average of instances'' average for each
    cluster.


    6) Since new centroids have been created in step 5, in this step, reassign each
    data point to the newly generated centroids based on one of the distance functions.


    7) Steps 5 and 6 are repeated until the model converges. This indicates that additional
    iteration will not lead to significant modification in the final centroid selection.
    In other words, cluster centroids will not move any further.


    Fig. 4.2 illustrates a step-by-step workflow on applying k-means clustering on
    a two-dimensional space data set.


    K-means like many other algorithms is not flawless and some of the main disadvantages
    of k-means are as follows:


    +   - K-means is very sensitive to outlier points. Therefore, before applying
    k-means clustering, make sure to investigate the outliers. This goes back to one
    of the first steps in applying any ML algorithm which was data visualization.
    If the outliers are invalid, make sure to remove them prior to using k-means algorithm.
    Otherwise, use an algorithm such as DBSCAN (will be discussed) which is more robust
    to noise.

    - K-means requires the number of clusters to be defined. This could also be classified
    as a disadvantage.


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_129_0.png)


    FIGURE 4.2 K-means clustering illustration.'

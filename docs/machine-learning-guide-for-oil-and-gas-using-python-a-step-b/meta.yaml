    3.  数据集中质心的初始化可以是**随机初始化**或有目的地选择。大多数开源机器学习软件（包括 Python 的 scikit learn 库）的默认初始化方法是随机初始化。如果随机初始化效果不佳，仔细选择初始质心可能会对模型有所帮助。\n\
    4.  接下来，计算每个数据点（实例）与随机选择（或仔细选择）的聚类质心之间的距离。然后，根据下面介绍的距离计算（通常使用欧几里得距离）将每个数据点分配给每个聚类质心。例如，如果在数据集中随机选择了两个质心，模型将计算每个数据点到质心\
    \ #1 和 #2 的距离。在这种情况下，每个数据点将根据其到随机初始化的聚类质心的距离，被聚类到质心 #1 或 #2 下。计算距离的方法有多种。此步骤可以总结为根据距离将每个数据点分配给每个聚类质心。最接近质心\
    \ #1 的点将被分配给质心 #1，最接近质心 #2 的点将被分配给质心 #2。以下是常用的距离函数，其中最常见的是欧几里得距离函数：\n\n    欧几里得距离函数\
    \ = $\\sqrt{\\sum_{k=1}^{n} (x_{ik} - \\mu_{jk})^2}$\n\n    曼哈顿距离函数 = $\\sum_{k=1}^{n}\
    \ |x_{ik} - \\mu_{jk}|$ (4.2)\n\n    闵可夫斯基距离函数 = $\\left( \\sum_{k=1}^{n} (|x_{ik}\
    \ - \\mu_{jk}|)^q \\right)^{1/q}$\n\n    其中，假设每个实例有 $n$ 个特征，可以计算第 $i$ 个实例 ($x_i$)\
    \ 到聚类 $j$ 的质心 ($\\mu_j$) 的距离。$q$ 代表范数的阶数。$q$ 等于 1 的情况代表曼哈顿距离，$q$ 等于 2 的情况代表欧几里得距离。\n\
    \n为了说明具有 3 个特征的数据集的欧几里得距离计算，让我们将欧几里得距离应用于以下两个向量：(3,9,−5) 和 (8,−1,12)\n\n$$\\sqrt{\\\
    sum_{i=1}^{k} (x_i - y_i)^2} = \\sqrt{(8-3)^2 + (-1-9)^2 + (12-(-5))^2} = \\sqrt{25\
    \ + 100 + 289} = \\sqrt{414} = 20.35$$\n\n5.  然后，找到分配给每个聚类质心（在步骤 4 中分配）的实例的平均值，并通过将聚类质心移动到每个聚类实例的平均值来重新计算每个聚类的新质心。\n\
    6.  由于在步骤 5 中已经创建了新的质心，在此步骤中，根据其中一个距离函数将每个数据点重新分配给新生成的质心。\n7.  重复步骤 5 和 6，直到模型收敛。这表明额外的迭代不会导致最终质心选择发生显著变化。换句话说，聚类质心将不再移动。\n\
    \n图 4.2 展示了在二维空间数据集上应用 K-means 聚类的逐步工作流程。\n\nK-means 与许多其他算法一样并非完美无缺，其主要缺点如下：\n\
    \n-   K-means 对离群点非常敏感。因此，在应用 K-means 聚类之前，请务必调查离群点。这回到了应用任何机器学习算法的最初步骤之一，即数据可视化。如果离群点无效，请确保在使用\
    \ K-means 算法之前将其移除。否则，请使用对噪声更稳健的算法，例如 DBSCAN（将稍后讨论）。\n-   K-means 需要预先定义聚类数量。这也可以被归类为一个缺点。\n\
    \n![](img/84bb0bcf926cd79dfa24aaffa8e553c8_129_0.png)\n\n图 4.2 K-means 聚类示意图。\n\
    \n## 使用 scikit-learn 库的 K-means 聚类应用\n\nK-means 聚类的应用之一是**典型曲线聚类**。典型曲线聚类可以根据各种因素确定，例如地质特征、生产动态、BTU\

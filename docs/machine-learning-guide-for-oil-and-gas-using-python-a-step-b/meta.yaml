    # Recurrent neural networks


    In many data analytics problems, it is necessary to deal with sequential data
    such as time series or text sentences. When time or sequence is involved, neural
    network should be able to deal with the importance of the data at each time step.
    This can be illustrated in the oil and gas industry by forecasting oil production
    in the future. When oil production from a well is declining, the oil rate at each
    time step is not only a function of geology, completion, drilling, and surface
    facilities but is also heavily related to oil rate at previous time steps. RNNs
    are designed to handle consecutive data. The main specification of the RNN is
    that the output value of the previous time step is used to calculate the output
    at the current time step. The schematic of a RNN is shown in Fig. 6.28.'
  merge: -1
  pgno: 329
- img_proc: true
  md: '![](img/84bb0bcf926cd79dfa24aaffa8e553c8_330_0.png)


    FIGURE 6.28 Schematic of recurrent neural network.


    In RNN, the hidden layer state of previous time step ($A^{t-1}$) which is considered
    the memory is carried forward and multiplied by a weight vector ($W_{aa}$). Then,
    the current hidden layer state ($A^t$) and output ($O^t$) can be calculated with
    the following equation:


    $$A^t = F(W_{ai}I^t + W_{aa}A^{t-1} + \theta_a)$$


    $$O^t = F(W_{ao}A^t + \theta_o)$$


    where $F$ is activation function, $W_{ai}$ is the weight matrix between input
    layer and hidden layer, $W_{ao}$ is the weight matrix between hidden layer and
    output, $\theta_a$ is the hidden layer bias, and $\theta_o$ is output layer bias.
    The schematic of a hidden layer in RNN is shown in Fig. 6.29.


    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_330_1.png)


    FIGURE 6.29 Sequence of layers in the recurrent neural networks.'
  merge: -1

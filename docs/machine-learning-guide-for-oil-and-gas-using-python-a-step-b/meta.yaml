    ![](img/84bb0bcf926cd79dfa24aaffa8e553c8_383_1.png)


    FIGURE 8.4 Difference.


    $A \cup B = B \cup A$

    $A \cap B = B \cap A$ (8.1)


    **Law of Associativity:** Union and intersection operations performed on three
    sets follow associativity such that the order of applying the operation does not
    matter, note that parenthesis has the highest precedence so the operation in the

    \ R². Cross-validation R² scores for eight splits range from 0.78 to 0.95 with\
    \ an average of 0.86.\n\n# Grid search and model selection\n\nIn previous sections,\
    \ different model evaluation metrics in conjunction with cross_validation methods\
    \ were introduced to assess the prediction performance of a model. The final goal\
    \ for training a machine learning model is to find and train a model with the\
    \ best performance. The model's performance is highly dependent on hyperparameter\
    \ selection. In order to maximize the performance of a model, optimized combinations\
    \ of hyperparameters must be picked. Moreover, for a specific problem like classification\
    \ or regression, multiple models can be used. Therefore, to achieve the best prediction\
    \ performance, it is necessary to select the best model with an optimized combination\
    \ of hyperparameters. In this section, some techniques for getting the best combination\
    \ of hyperparameters and selecting best models will be discussed.\n\n# Grid search\
    \ for hyperparameter optimization\n\nIn order to optimize model performance and\
    \ get the best set of hyperparameters, one should first generate a wide variety\
    \ of combinations for hyperparameters. Then, by searching through combinations\
    \ for hyperparameters, it is possible to find the combination that returns the\
    \ highest model's performance. Finding the best set of hyperparameters by searching\
    \ through all the combinations can be done by \"grid search.\" To illustrate grid\
    \ search, a for-loop would be used for generating search space for the sand production\
    \ problem followed by finding the best set of hyperparameters."
  - "[PAGE 363]\n\nIn sand production example, KNN was used for binary classification.\
    \ For this model, out of multiple hyperparameters, the number of neighbors, weight\
    \ function, and leaf size are selected for a grid search. Different values and\
    \ functions are assigned to hyperparameters. For each combination of hyperparameters,\
    \ five-fold cross-validation was performed, and the average accuracy of the folds\
    \ was calculated. At the end, there will be 24 different models with combinations\
    \ of hyperparameters and their accuracy. The set that returns a model with the\
    \ highest accuracy is the optimized hyperparameter. Initial grid search code in\
    \ Python for the sand production problem is as follows:\n\n```\nfrom sklearn.neighbors\
    \ import KNeighborsClassifier\n#define k-nearest neighbor's combination of hyper-parameters\n\
    highest_score=0\ni=0\nfor n in [2,3,4,5]:\n    for w in ['uniform','distance']:\n\
    \        for l in [2,3,4]:\n            #Train a model with each combination of\
    \ hyper-parameters and\n            #calculate the accuracy\n            KNCG=KNeighborsClassifier(n_neighbors=n,\n\
    \                                      weights=w, leaf_size=l)\n            scores=cross_val_score(KNCG,\
    \ xnorm, y,\n                                   cv=5,scoring='accuracy')\n   \
    \         scoreg=scores.mean()\n            print(\"iteration:\",i,\" score:\"\
    ,scoreg,\n                  \" NN:\",n,\" weight:\",w,\" leaf size:\",l)\n   \
    \         i+=1\n#Find the hyper-parameters that returns a model with the highest\n\
    #accuracy score\n            if scoreg >= highest_score:\n                highest_score=scoreg\n\
    \                best_parameters={' n_neighbors':\n                          \
    \       n, 'weights': w,'leaf_size':l}\nprint(\" Highest score: \", (highest_score))\n\
    print(\" Best parameters: \", format(best_parameters))\n```\n\nPython output=Fig.\
    \ 7.8\n\nBy looking at the results, it is observed that iterations 3, 4, and 5\
    \ return the highest scores. It means that combinations of 2 NN, \"distance\"\
    \ weights, and leaf sizes equal to \"2,3,4\" are the best combinations that result\
    \ in the highest score (accuracy) of 0.9. To combine grid search over hyperparameters\
    \ with cross-validation \"GridSearchCV\" form sklearn library can be used. In\
    \ GridSearchCV, the sets of all hyperparameters to be tuned are passed in as a\
    \ dictionary and the model type is the other input parameter (which is the KNN\
    \ model for sand production example). Afterward, the GridSearchCV method trains\
    \ a model based on the best combination of hyperparameters given the input and\
    \ output features. Grid search with cross-validation for sand"

    \ (5.5)\n\n## 多元线性回归模型在 scikit-learn 中的应用\n\n多元线性回归可以在 scikit-learn 中轻松实现。在本练习中，使用了一个包含以下地质信息的数据集：\n\
    \n- 孔隙度 (%)\n- 基质渗透率 (nd)\n- 声阻抗 (kg/m2s × 10^6)\n- 脆性比\n- 总有机碳含量 (%)\n- 镜质体反射率\
    \ (%)\n\n目标是训练一个**多元线性回归**模型，以理解每个变量对生产性能的影响。在本练习中，使用 A√K/横向英尺 (md^1/2 × ft) 作为输出特征。A√K\
    \ 是非常规储层通过产量瞬态分析 (RTA) 获得的产能指标，相当于常规储层中的 kh。A√K 简单来说就是横截面积乘以渗透率的平方根。它本质上是一个显示每口井产能强度的指标。\n\

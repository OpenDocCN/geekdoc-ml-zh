    been successfully tackled in the O&G industry has been liquid-loading clustering.
    As opposed to using a labeled class using Turner and Coleman techniques, k-means
    clustering was successfully applied to cluster the data into two separate groups
    of loaded versus unloaded. This is very powerful because clustering techniques
    independently divide the data into two separate clusters of loaded versus unloaded
    as opposed to using Turner and Coleman calculations which were developed many
    decades ago for vertical conventional wells.


    Cluster validation is another important step in clustering. As was discussed,
    silhouette coefficient is one way of analyzing the resulting clusters. If the
    average silhouette coefficient across all the resulting clusters turns out to
    be 0.2 (for example), clustering might not provide too much insight into the data.
    In those cases, a supervised ML model could probably shed more light.


    Finally, as discussed throughout this chapter, it is extremely important to apply
    basic statistical measures such as mean of each resultant cluster after applying
    any clustering technique. For example, let''s assume that a database is divided
    into two separate clusters of loaded versus unloaded using k-means clustering.
    Let''s assume gas rate, casing-tubing pressure, line pressure, and water rate
    were the features fed into the unsupervised model. The resulting average values
    for clusters 1 and 2 are shown in Table 4.5. As illustrated in this


    TABLE 4.5 Resulting cluster example.


    | Clusters | Gas rate (MSCF/D) | Casing-tubing pressure (psi) | Line pressure
    (psi) | Water rate (BBL/D) |

    | :--- | :--- | :--- | :--- | :--- |

    | Cluster 0 (loaded) | 1000 | 200 | 500 | 20 |

    | Cluster 1 (unloaded) | 1002 | 198 | 499 | 19 |'
- md: '## Outlier detection


    Outlier detection algorithms are incredibly powerful and useful tools for detecting
    outliers within a data set. First, let’s define some terminologies prior to diving
    in deeper into various outlier detection algorithms:


    - **Outlier:** an outlier is simply a point that is vastly different from other
    points in a data set. For instance, if the average GIP in a particular area ranges
    between 100 and 200 BCF/section, a point with a GIP of 20 or 350 BCF/section could
    be considered as outlier points.

    - **Anomaly detection:** is the process of finding outliers in a data set.


    Anomaly detection has many applications in different industries including banking,
    finance, manufacturing, insurance, oil and gas industry, etc. One of the main
    applications of anomaly detection in the banking industry is detecting large deposits
    or strange transactions for customers. If you have owned a credit card, you might
    have received a call from the bank inquiring about a fishy transaction that you
    most likely had nothing to do with. Therefore, banking industry saves billions
    of dollars a year detecting frauds using anomaly detection algorithms to find
    outliers. Anomaly detection can also be used in the insurance industry for detecting
    fraudulent insurance claims and payments. In the manufacturing and oil and gas
    industry, anomaly detection can be used for detecting abnormal behaviors for machines
    and equipment in terms of preventative maintenance and predicting failures. For
    example, finding abnormal behaviors in frac pumps can lead to preventative maintenance
    which could potentially lead to a longer life span for frac equipment. Anomalous
    activity detection can also be used in the IT industry to detect intruders into
    networks. Now that some of the use cases for anomaly detection have been identified
    in different industries, let’s review some of the algorithms that can be used
    for anomaly detection. Please note that DBSCAN is one of the algorithms that can
    be used for anomaly detection, and since it has already been addressed, it won’t
    be revisited under this section.


    ## Isolation forest


    Isolation forest is a type of unsupervised ML algorithm that can be used for anomaly
    detection which works based on the principle of isolating anomalies (Tony Liu
    et al., 2008). Isolation forest is based on a decision tree algorithm which will
    be discussed in the next chapter. As the name indicates, this algorithm isolates
    features by randomly selecting a feature from a given data set and randomly selecting
    a **split** value between min and max values of that feature. In other words,
    it selects a random **split** value within the range of that feature. Next, if
    the chosen value keeps the point above, change the minimum value of the feature
    range to that value, otherwise, if the chosen value keeps the point below, change
    the maximum value of the feature range to that value. Repeat these last two steps
    until the points are isolated. The number of times that these steps are repeated
    is called "isolation number." The lower the isolation number, the more anomalous
    a point is. This is because the random feature partitioning will result in a shorter
    tree paths for anomalous points. In other words, the anomalous points require
    less number of random partitions in order to be detected as anomaly. As will be
    illustrated shortly within Python, isolation forest uses ensemble of isolation
    trees (through a parameter called "n_estimators") to isolate anomalies. To calculate
    the anomaly score in an isolation forest, the equation below can be used.


    $$s(x, n) = 2^{-\frac{E(h(x))}{c(n)}}$$


    where:


    $$c(n) = 2H(n-1) - \left(\frac{2(n-1)}{n}\right)$$


    $n$ is defined as the number of data points, $c(n)$ is a reference metric that
    normalizes the score between 0 and 1 for ease of interpretation. $E(h(x))$ is
    referred to as the average of path lengths from the isolation forest. Path length
    indicates whether a point is normal or outlier. H is the harmonic number and can
    be estimated as follows:


    $$H(i) = \ln(i) + \gamma$$


    where $\gamma = 0.5772156649$ (Euler –Mascheroni constant)


    ## Isolation forest using scikit-learn


    Let’s go over an example of using isolation forest to find the outliers in a petroleum
    engineer’s income versus spending habit data set. The data set can be found using
    the link below:


    https://www.elsevier.com/books-and-journals/book-companion/9780128219294


    Let’s import all the necessary libraries (pandas, numpy, and regular visualization
    libraries) to get started and import "Chapter4_PE_Income_Spending_DataSet.csv"
    data set. As illustrated below, this data set has 4 columns of data and one of
    the columns is a categorical feature of petroleum engineer’s gender. Therefore,
    it is crucial to convert this categorical feature to a dummy/indicator variable
    using the "pd.get_dummies" method in pandas library.



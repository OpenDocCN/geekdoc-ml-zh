    is calculated as (6)/(6 + 2) = 0.75. In Python, the precision of a classification
    problem is obtained with the following codes:


    ```

    from sklearn.metrics import precision_score

    precision_test=precision_score(y_test, y_test_predict)

    print(''Precision_test: %f'' % precision_test)

    Python output:

    Precision_test: 0.750000

    ```


    The other evaluation metric for the classification problem is "Recall." It is
    defined as what proportion of all positive values are correctly predicted positives.
    All positive values include both TPs and FNs (FN is actually a positive value
    which is incorrectly predicted as negative). Recall identifies the ability of
    the model to predict positive values. Mathematically, Recall can be defined as:


    $$recall = \frac{TP}{TP + FN}$$


    For this example, there are 6 TPs and 0 FN. The recall is calculated as (6)/(6
    + 0) = 1. In Python, recall of a classification problem is obtained with the following
    codes:


    ```

    from sklearn.metrics import recall_score

    recall_test=recall_score(y_test, y_test_predict)

    print(''Recall_test: %f'' % recall_test)

    Python output:

    Recall_test: 1.000000

    ```


    Selecting an appropriate metric is sometimes related to the objective of the classification
    problem. In some cases, the goal is to have high precision while in other cases,
    having high recall is a necessity. In order to have a balance between precision
    and recall, another metric, defined as "F1 score," is a harmonic mean of precision
    and recall. Considering that precision is the ratio of TPs to all the values that
    predicted positive and recall is the ratio of TPs to all positive values, F1 score
    can be defined as:


    $$F1 = 2 \times \frac{Precision \times Recall}{Precision + Recall}$$


    In this example, precision is 0.75 and recall is 1; therefore, F1 score is calculated
    as 2 × (0.75 × 1)/(0.75 + 1) = 0.857. Python codes for calculating F1 score in
    sand production example is as follows:


    ```

    from sklearn.metrics import f1_score

    f1_test=f1_score(y_test, y_test_predict)

    print(''F1 score_train: %f'' % f1_test)

    Python Output=

    F1 score_train: 0.857143

    ```'

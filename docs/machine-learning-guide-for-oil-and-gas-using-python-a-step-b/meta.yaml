    接下来，让我们在一个大图形内创建两个图形。这可以通过首先创建一个空图形来实现。然后，使用 "fig.add_axes" 添加每个图形的尺寸，如下所示。之后，可以简单地添加每个图形及其标题和标签，如图所示。



- md: "In this example, a neural network with two hidden layers was used. There are\
    \ 13 input nodes that are equal to the number of attributes and 1 output node\
    \ which is \"gas EUR.\" There are 13 nodes in the two hidden layers. The activation\
    \ function for all the layers is \"Relu\" indicating a rectified linear unit (Fig.\
    \ 6.3, Piecewise-Linear). The optimization algorithm is \"adam,\" which calculates\
    \ the learning rates based on the momentum of changing gradients (Kingma & Ba,\
    \ 2015). The loss function is \"mean squared error,\" defined in Formula 6.10.\
    \ The schematic of the neural network topology is shown in Fig. 6.11.\n\nThe number\
    \ of epochs, in this case, is specified as 100. When the training process starts,\
    \ loss value for both training and test data sets are typically high. As the number\
    \ of epochs increases, loss values for both data sets decrease until test data\
    \ loss or accuracy does not improve. The progress of the neural network for the\
    \ first nine epochs is shown in Fig. 6.12.\n\nIn the progress report, epoch number,\
    \ runtime per epoch, and loss values of training and test are depicted. It is\
    \ best if both loss values of training and test data decrease while the number\
    \ of iterations (epochs) increases. In specific situations, training loss values\
    \ decrease but test loss values start increasing. At this point, networks will\
    \ start memorizing the training data and their corresponding weights. This will\
    \ lead to overfitting. To prevent overfitting, an \"early-stopping monitor\" was\
    \ used in the code. For this command, a criteria of \"patience = 3\" is defined,\
    \ meaning if after three number of epochs, loss value, or performance of test\
    \ data set is not improved, stop the model from training. This occurrence may\
    \ happen far before the target number of epochs is reached (in this case it happened\
    \ at epoch 50 while the total number of epochs is set to be 100). Training and\
    \ test loss histories are shown in Fig. 6.13 using the following code:\n\n```\n\
    plt.plot(history.history['loss'])\nplt.plot(history.history[\"val_loss\"],\"r--\"\
    )\nplt.title('Model Loss')\nplt.ylabel('loss value')\nplt.xlabel('# epochs')\n\
    plt.legend(['train', 'test'], loc='upper right')\nplt.show()\n```\n\nPython output=Fig.\
    \ 6.13\n\nWhen the training process is completed, it is possible to use a trained\
    \ model to make a prediction. To get the output results of the model for new or\
    \ unseen data (test), the \"model.predict\" function is used. One must provide\
    \ a matrix of inputs with all 13 attributes in the model to get the corresponding\
    \ EURs. In this example, one hopes to compare the actual or measured gas EURs\
    \ with model's predictions. As mentioned before, all attributes and target values\
    \ (EURs) were rescaled to values between 0 and 1. To scale the output from the\
    \ neural network back to the actual range, the following formula can be used:\n\
    \nEUR = EUR.Min + Ynorm × (EUR.Max – EUR.Min)\n\nY norm can be prediction from\
    \ the trained model. For comparing the measured with the predicted values, it\
    \ is useful to show R² of the trends on the plots. To calculate R², \"r2_score\"\
    \ from \"sklearn.metrics\" library is used. The following codes will plot predicted\
    \ gas EURs versus measured EURs for both train and test data set with R² on the\
    \ graph. The plots are shown in Fig. 6.14.\n\n```\nfrom sklearn.metrics import\
    \ r2_score\nEUR_test=y_test*(y.max()-y.min())+y.min()\nEUR_train=y_train*(y.max()-y.min())+y.min()\n\
    EUR_test_prediction=model.predict(X_test)*(y.max()-y.min())+\\n    y.min()\nEUR_train_prediction=model.predict(X_train)*(y.max()-y.min())+\\\
    n    y.min()\nr2_test=r2_score(EUR_test, EUR_test_prediction)\nr2_train=r2_score(EUR_train,\
    \ EUR_train_prediction)\nfig, ax=plt.subplots()\nax.scatter(EUR_test, EUR_test_prediction)\n\
    ax.plot([EUR_test.min(), EUR_test.max()], [EUR_test.min(),\n    EUR_test.max()],\
    \ 'k--', lw=4)\nax.set_xlabel('EUR_Test_Measured(Bcf)')\nax.set_ylabel('EUR_Test_Predicted(Bcf)')\n\
    plt.text(14,22,\"R2=\"+str(r2_test).format(\"%.2f\"))\nplt.show()\nfig, ax=plt.subplots()\n\
    ax.scatter(EUR_train, EUR_train_prediction)\nax.plot([EUR_train.min(), EUR_train.max()],\
    \ [EUR_train.min(),\n    EUR_train.max()], 'k--', lw=4)\nax.set_xlabel('EUR_Train_Measured(Bcf)')\n\
    ax.set_ylabel('EUR_Train_Predicted(Bcf)')\nplt.text(14,22,\"R2=\"+str(r2_train).format(\"\
    %.2f\"))\nplt.show()\nPython output=Fig. 6.14\n```\n\n## Example 2: develop PVT\
    \ correlation for crude oils\n\nPetroleum/reservoir engineering calculations are\
    \ heavily dependent on phase behavior and PVT data. These calculations cover in-place\
    \ estimation, pressure loss along pipes, fluid flow in porous media, rate transient\
    \ analysis, and well testing. The most common approach to acquire PVT data is\
    \ through lab testing. In this method, to calculate PVT properties, the oil sample\
    \ is tested via multiple methods. Some of these tests are very complex, timely,\
    \ and expensive. On the other hand, some properties like oil API or gas specific\
    \ gravity can be easily achieved. Properties like solution gas/oil ratio, bubble/dew\
    \ point, and liquid drop out (condensate reservoirs) require sophisticated lab\
    \ tests. In the oil and gas industry, it has been a common practice to derive\
    \ mathematical and empirical correlations to determine one PVT parameter as function\
    \ of some easily obtained parameters. Statistical regression techniques are mainly\
    \ used to derive empirical correlations for different PVT properties. These correlations\
    \ can be found in *Reservoir Engineering Handbooks* (Ahmed, 2006) or other hydrocarbon\
    \ properties reference books (McCain, 1999).\n\n\"Bubble point\" is defined as\
    \ a pressure at which the first bubble of gas is formed within the liquid oil\
    \ phase. As pressure falls below the bubble point, more gas is liberated from\
    \ oil, and single liquid phase becomes two phases. Bubble point (bp) is one of\
    \ the PVT properties that cannot be measured in the lab easily. Therefore, several\
    \ correlations like \"Standing, Vasque/Beggs, Glaso, Marhoun, and Petrosky/Farshad\"\
    \ were proposed by several authors (Ahmed, 2006). Besides statistical regression\
    \ techniques, it is also possible to use neural networks to develop correlations\
    \ between PVT properties. The second example uses a PVT data set, including 249\
    \ PVT² samples consisting of temperature, solution gas to oil ratio (RS), gas\
    \ gravity, oil API, and bubble point pressure (Pbp). \"PVT Data\" can be found\
    \ in the following location https://www.elsevier.com/books-and-journals/book-companion/9780128219294.\n\
    \n2. This example is similar to work done by Osman et al. (2001).\n\nThe first\
    \ step is to import the data and study descriptive statistics. It is necessary\
    \ to upload \"PVT Data.csv\" into Jupyter notebook and then load the data in Python\
    \ using pandas. Descriptive statistics of the PVT data are shown in Fig. 6.15.\n\
    \n```\nimport pandas as pd\ndataset=pd.read_csv('Chapter6_PVT Data.csv')\nprint(dataset.describe())\n\
    Python output=Fig. 6.15\n```\n\nAfter uploading the data in \"dataset\", the input\
    \ and output for neural networks should be determined and normalized. The input\
    \ in this example includes the first four columns as temperature, Rs, gas gravity,\
    \ and oil API and output is Pbp. \"MinMaxScaler\" is used to normalize the data\
    \ as \"Xnorm\" for input and \"ynorm\" for output.\n\n```\nX=dataset.iloc[:,0:4]\n\
    y=dataset.iloc[:,4].values\nfrom sklearn.preprocessing import MinMaxScaler\nsc=MinMaxScaler()\n\
    Xnorm=pd.DataFrame(data=sc.fit_transform(X))\nyshape=pd.DataFrame(data=y.reshape(-1,1))\n\
    ynorm=pd.DataFrame(data=sc.fit_transform(yshape))\n```\n\nIn this example, feature\
    \ ranking is done to see the relative importance of each parameter on the output\
    \ data. Like previous examples, \"Spearman's rank correlation\" and \"random forest\"\
    \ are used to rank all the input parameters based on their impact on Pbp. The\
    \ codes for both methods are as follows.\n\n```\n# \"Spearman's Rank Correlation\"\
    \ feature ranking\nfrom scipy import stats\nimport matplotlib.pyplot as plt\n\
    datanorm=sc.fit_transform(dataset)\nstats.spearmanr(dataset)\nrho, pval=stats.spearmanr(datanorm)\n\
    corr=pd.Series(rho[:4,4], index=X.columns)\ncorr.plot(kind='barh')\n```\n\n| |\
    \ Temperature | Rs | Gas Gravity | Oil API | Pbp |\n|---|---|---|---|---|---|\n\
    | count | 249.000000 | 249.000000 | 249.000000 | 249.000000 | 249.000000 |\n|\
    \ mean | 147.796271 | 411.145756 | 1.012870 | 31.658760 | 1424.602150 |\n| std\
    \ | 41.936641 | 291.829082 | 0.162192 | 5.036067 | 908.669973 |\n| min | 70.447234\
    \ | 27.832416 | 0.797048 | 17.854225 | 131.484967 |\n| 25% | 116.365357 | 183.034832\
    \ | 0.885612 | 28.469070 | 697.772696 |\n| 50% | 142.257643 | 348.735793 | 0.978741\
    \ | 32.604282 | 1252.802615 |\n| 75% | 176.074354 | 587.055416 | 1.113760 | 35.875571\
    \ | 1937.635034 |\n| max | 282.911419 | 1471.094081 | 1.632588 | 39.714096 | 4306.643567\
    \ |"
  mdcn: "在本例中，使用了一个具有两个隐藏层的神经网络。输入节点有13个，等于属性的数量；输出节点有1个，即“gas EUR”。两个隐藏层各有13个节点。所有层的激活函数均为“Relu”，即修正线性单元（图6.3，分段线性）。优化算法是“adam”，它根据梯度变化的动量来计算学习率（Kingma\
    \ & Ba, 2015）。损失函数是“均方误差”，定义见公式6.10。神经网络拓扑结构示意图如图6.11所示。\n\n本例中，训练轮数（epochs）指定为100。当训练过程开始时，训练集和测试集的损失值通常都很高。随着训练轮数的增加，两个数据集的损失值都会下降，直到测试集的损失或准确率不再提升。神经网络前九个轮次的进展如图6.12所示。\n\
    \n在进度报告中，展示了轮次编号、每个轮次的运行时间以及训练集和测试集的损失值。理想情况是，随着迭代次数（轮次）的增加，训练集和测试集的损失值都下降。在特定情况下，训练损失值下降，但测试损失值开始上升。此时，网络将开始记忆训练数据及其对应的权重，这将导致过拟合。为了防止过拟合，代码中使用了“早停监控器”。为此命令定义了“patience\
    \ = 3”的标准，意味着如果经过三个轮次后，测试数据集的损失值或性能没有改善，则停止模型训练。这种情况可能在达到目标轮数之前很久就发生（本例中发生在第50轮，而总轮数设置为100）。训练和测试损失历史记录如图6.13所示，使用以下代码绘制：\n\
    \n```\nplt.plot(history.history['loss'])\nplt.plot(history.history[\"val_loss\"\
    ],\"r--\")\nplt.title('Model Loss')\nplt.ylabel('loss value')\nplt.xlabel('# epochs')\n\
    plt.legend(['train', 'test'], loc='upper right')\nplt.show()\n```\n\nPython输出=图6.13\n\
    \n训练过程完成后，可以使用训练好的模型进行预测。为了获得模型对新数据或未见过的数据（测试集）的输出结果，使用“model.predict”函数。必须向模型提供一个包含全部13个属性的输入矩阵，以获得相应的EUR。在本例中，希望将实际或测量的天然气EUR与模型的预测值进行比较。如前所述，所有属性和目标值（EUR）都已重新缩放至0到1之间的值。要将神经网络的输出缩放回实际范围，可以使用以下公式：\n\
    \nEUR = EUR.Min + Ynorm × (EUR.Max – EUR.Min)\n\nY norm可以是训练模型的预测值。为了将测量值与预测值进行比较，在图上显示趋势的R²值很有用。计算R²时，使用“sklearn.metrics”库中的“r2_score”。以下代码将绘制训练集和测试集的预测天然气EUR与测量EUR的对比图，并在图上显示R²值。图表如图6.14所示。\n\
    \n```\nfrom sklearn.metrics import r2_score\nEUR_test=y_test*(y.max()-y.min())+y.min()\n\
    EUR_train=y_train*(y.max()-y.min())+y.min()\nEUR_test_prediction=model.predict(X_test)*(y.max()-y.min())+\\\
    n    y.min()\nEUR_train_prediction=model.predict(X_train)*(y.max()-y.min())+\\\
    n    y.min()\nr2_test=r2_score(EUR_test, EUR_test_prediction)\nr2_train=r2_score(EUR_train,\
    \ EUR_train_prediction)\nfig, ax=plt.subplots()\nax.scatter(EUR_test, EUR_test_prediction)\n\
    ax.plot([EUR_test.min(), EUR_test.max()], [EUR_test.min(),\n    EUR_test.max()],\
    \ 'k--', lw=4)\nax.set_xlabel('EUR_Test_Measured(Bcf)')\nax.set_ylabel('EUR_Test_Predicted(Bcf)')\n\
    plt.text(14,22,\"R2=\"+str(r2_test).format(\"%.2f\"))\nplt.show()\nfig, ax=plt.subplots()\n\
    ax.scatter(EUR_train, EUR_train_prediction)\nax.plot([EUR_train.min(), EUR_train.max()],\
    \ [EUR_train.min(),\n    EUR_train.max()], 'k--', lw=4)\nax.set_xlabel('EUR_Train_Measured(Bcf)')\n\
    ax.set_ylabel('EUR_Train_Predicted(Bcf)')\nplt.text(14,22,\"R2=\"+str(r2_train).format(\"\
    %.2f\"))\nplt.show()\nPython输出=图6.14\n```\n\n## 示例2：为原油开发PVT相关性\n\n石油/油藏工程计算严重依赖于相态行为和PVT数据。这些计算涵盖原始地质储量估算、管道压降、多孔介质中的流体流动、产量递减分析和试井。获取PVT数据最常用的方法是通过实验室测试。在此方法中，为了计算PVT性质，油样通过多种方法进行测试。其中一些测试非常复杂、耗时且昂贵。另一方面，一些性质如原油API度或气体比重则很容易获得。而像溶解气油比、泡点/露点和凝析油析出（凝析气藏）等性质则需要复杂的实验室测试。在石油和天然气行业中，通常的做法是推导数学和经验相关性，以某些容易获得的参数为函数来确定一个PVT参数。统计回归技术主要用于推导不同PVT性质的经验相关性。这些相关性可以在*油藏工程手册*（Ahmed,\
    \ 2006）或其他烃类性质参考书（McCain, 1999）中找到。\n\n“泡点”定义为液态油相中形成第一个气泡时的压力。当压力降至泡点以下时，更多的气体从油中释放出来，单相液体变为两相。泡点（bp）是PVT性质之一，无法在实验室中轻易测量。因此，几位作者（Ahmed,\
    \ 2006）提出了几种相关性，如“Standing, Vasque/Beggs, Glaso, Marhoun, and Petrosky/Farshad”。除了统计回归技术，也可以使用神经网络来开发PVT性质之间的相关性。第二个示例使用了一个PVT数据集，包含249个PVT²样本，包括温度、溶解气油比（RS）、气体比重、原油API度和泡点压力（Pbp）。“PVT数据”可在以下位置找到：https://www.elsevier.com/books-and-journals/book-companion/9780128219294。\n\
    \n2. 本示例类似于Osman等人（2001）所做的工作。\n\n第一步是导入数据并研究描述性统计。需要将“PVT Data.csv”上传到Jupyter\
    \ notebook，然后使用pandas在Python中加载数据。PVT数据的描述性统计如图6.15所示。\n\n```\nimport pandas as\
    \ pd\ndataset=pd.read_csv('Chapter6_PVT Data.csv')\nprint(dataset.describe())\n\
    Python输出=图6.15\n```\n\n将数据上传到“dataset”后，应确定神经网络的输入和输出并进行归一化。本例中的输入包括前四列，即温度、Rs、气体比重和原油API度，输出是Pbp。使用“MinMaxScaler”将数据归一化为输入“Xnorm”和输出“ynorm”。\n\
    \n```\nX=dataset.iloc[:,0:4]\ny=dataset.iloc[:,4].values\nfrom sklearn.preprocessing\
    \ import MinMaxScaler\nsc=MinMaxScaler()\nXnorm=pd.DataFrame(data=sc.fit_transform(X))\n\
    yshape=pd.DataFrame(data=y.reshape(-1,1))\nynorm=pd.DataFrame(data=sc.fit_transform(yshape))\n\
    ```\n\n在本例中，进行了特征排序，以查看每个参数对输出数据的相对重要性。与之前的示例类似，使用“斯皮尔曼等级相关”和“随机森林”根据它们对Pbp的影响对所有输入参数进行排序。两种方法的代码如下。\n\
    \n```\n# \"斯皮尔曼等级相关\"特征排序\nfrom scipy import stats\nimport matplotlib.pyplot as\
    \ plt\ndatanorm=sc.fit_transform(dataset)\nstats.spearmanr(dataset)\nrho, pval=stats.spearmanr(datanorm)\n\
    corr=pd.Series(rho[:4,4], index=X.columns)\ncorr.plot(kind='barh')\n```\n\n| |\
    \ 温度 | Rs | 气体比重 | 原油API度 | Pbp |\n|---|---|---|---|---|---|\n| count | 249.000000\
    \ | 249.000000 | 249.000000 | 249.000000 | 249.000000 |\n| mean | 147.796271 |\
    \ 411.145756 | 1.012870 | 31.658760 | 1424.602150 |\n| std | 41.936641 | 291.829082\
    \ | 0.162192 | 5.036067 | 908.669973 |\n| min | 70.447234 | 27.832416 | 0.797048\
    \ | 17.854225 | 131.484967 |\n| 25% | 116.365357 | 183.034832 | 0.885612 | 28.469070\
    \ | 697.772696 |\n| 50% | 142.257643 | 348.735793 | 0.978741 | 32.604282 | 1252.802615\
    \ |\n| 75% | 176.074354 | 587.055416 | 1.113760 | 35.875571 | 1937.635034 |\n\
    | max | 282.911419 | 1471.094081 | 1.632588 | 39.714096 | 4306.643567 |"

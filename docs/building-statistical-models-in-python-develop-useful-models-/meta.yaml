  mdcn: "## 置信区间\n\n如前所述，自助法的一个有用应用是在数据稀疏或有限的数据集周围创建置信区间——也就是说，数据集的值范围很广但样本不多。考虑一个使用`statsmodels`中“Duncan”数据集进行假设检验的自助法示例，该数据集包含按职业、类型、教育和声望划分的收入。虽然这是完整的数据集，但由于未提及抽样方法，且不太可能考虑所有职业和类型的所有工人的所有收入，因此将此数据集视为样本。要获取数据集，我们首先加载`matplotlib`、`statsmodels`、`pandas`和`numpy`库。然后下载数据集并将其存储为`pandas`\
    \ DataFrame，赋值给变量`df_duncan`。接着，我们将“prof”、“wc”和“bc”类型分别重新编码为“professional”、“white-collar”和“blue\
    \ collar”。最后，我们创建两个独立的`pandas` DataFrame；一个用于专业工作类型，另一个用于蓝领工作类型，因为这两个子集将是我们使用自助法进行分析的对象：\n\
    \n```python\nimport matplotlib.pyplot as plt, statsmodels.api as sm, pandas as\
    \ pd,\n    numpy as np, scipy.stats\ndf_duncan = sm.datasets.get_rdataset(\"Duncan\"\
    ,\n    \"carData\").data\ndf_duncan.loc[df_duncan['type'] == 'prof',\n    'type']\
    \ = 'professional'\ndf_duncan.loc[df_duncan['type'] == 'wc',\n    'type'] = 'white-collar'\n\
    df_duncan.loc[df_duncan['type'] == 'bc',\n    'type'] = 'blue-collar'\ndf_professional\
    \ = df_duncan.loc[(df_duncan['type'] == 'professional')]\ndf_blue_collar = df_duncan.loc[(df_duncan['type']\
    \ == 'blue-collar')]\n```\n\n| | 类型 | 收入 | 教育 | 声望 |\n|---|---|---|---|---|\n\
    | 会计师 | 专业 | 62 | 86 | 82 |\n| 飞行员 | 专业 | 72 | 76 | 83 |\n| 建筑师 | 专业 | 75 | 92\
    \ | 90 |\n| 作家 | 专业 | 55 | 90 | 76 |\n| 化学家 | 专业 | 64 | 86 | 90 |\n\n图 2.17 –\
    \ 显示 statsmodels Duncan 数据前五行的表格\n\n接下来，我们构建一组绘图函数。在`plot_distributions()`中，我们设定\
    \ p=5，这意味着 p 值在 0.05 的显著性水平下是显著的（1.00 - 0.05 = 0.95，因此是 95% 置信度）。然后我们将此值除以 2，因为这是一个双侧检验，意味着我们想知道完整的区间而不仅仅是一个边界（在*第\
    \ 1 章*中作为代表性检验统计量讨论过）。关于绘图，我们使用 matplotlib 中的直方图（`hist()`函数）可视化数据，然后使用`axvline()`函数绘制\
    \ 95% 的抽样置信区间，这些函数是使用 numpy 函数`percentile()`构建的。\n\n> **自助法中的百分位数**\n> 当应用于原始数据时，百分位数仅是百分位数本身，但当应用于自助抽样分布时，它就是置信区间。\n\
    \n简单来说，95% 的置信区间意味着每抽取 100 个样本均值，其中 95 个将落在此区间内。在 numpy 的`percentile()`函数中，我们使用\
    \ p=5 来支持 1-p 是置信水平，其中 *p* 是显著性水平（想想 *p 值*，任何等于或低于 *p* 的值都是显著的）。由于检验是双尾的，我们将 *p*\
    \ 除以 2，并在左尾和右尾各分配 2.5，因为我们有一个对称的标准正态分布。`subplot(2, 1, ...)`代码创建两行一列。图形的轴 0 用于专业收入，轴\
    \ 1 用于蓝领收入：\n\n```python\ndef plot_distributions(n_replicas, professional_sample,\
    \ blue_collar_sample, professional_label, blue_collar_label, p=5):\n    fig, ax\
    \ = plt.subplots(2, 1, figsize=(10,8))\n    ax[0].hist(professional_sample, alpha=.3,\
    \ bins=20)\n    ax[0].axvline(professional_sample.mean(),\n        color='black',\
    \ linewidth=5)\n# 抽样分布均值\n    ax[0].axvline(np.percentile(professional_sample,\
    \ p/2.),\n        color='red', linewidth=3, alpha=0.99)\n# 95% CI 下限（如果使用自助法）\n\
    \    ax[0].axvline(np.percentile(professional_sample,\n        100-p/2.), color='red',\
    \ linewidth=3, alpha=0.99)\n# 95% CI 上限（如果使用自助法）\n    ax[0].title.set_text(str(professional_label)\
    \ +\n        \"\\nn = {} Resamples\".format(n_replicas))\n    ax[1].hist(blue_collar_sample,\
    \ alpha=.3, bins=20)\n    ax[1].axvline(blue_collar_sample.mean(), color='black',\n\
    \        linewidth=5) # 抽样分布均值\n    ax[1].axvline(np.percentile(blue_collar_sample,\
    \ p/2.),\n        color='red', linewidth=3, alpha=0.99)\n# 95% CI 下限（如果使用自助法）\n\
    \    ax[1].axvline(np.percentile(blue_collar_sample,\n        100-p/2.), color='red',\
    \ linewidth=3, alpha=0.99)\n# 95% CI 上限（如果使用自助法）\n    ax[1].title.set_text(str(blue_collar_label)\
    \ +\n        \"\\nn = {} Resamples\".format(n_replicas))\n    if n_replicas >\
    \ 1:\n        print(\"Lower confidence interval limit: \",\n            np.percentile(round(professional_sample,4),\n\
    \            p/2.))\n        print(\"Upper confidence interval limit: \",\n  \
    \          np.percentile(round(professional_sample,4),\n            100-p/2.))\n\
    \        print(\"Mean: \", round(professional_sample,\n            4).mean())\n\
    \        print(\"Standard Error: \",\n            round(professional_sample.std()\
    \ /\n            np.sqrt(n_replicas), 4) )\n        print(\"Lower confidence interval\
    \ limit: \",\n            np.percentile(round(blue_collar_sample,4),\n       \
    \     p/2.))\n        print(\"Upper confidence interval limit: \",\n         \
    \   np.percentile(round(blue_collar_sample,4),\n            100-p/2.))\n     \
    \   print(\"Mean: \", round(blue_collar_sample,4).mean())\n        print(\"Standard\
    \ Error: \",\n            round(blue_collar_sample.std() /\n            np.sqrt(n_replicas),\
    \ 4) )\n    else:\n        print(\"At least two samples required to create the\
    \ following\nstatistics:\\nConfidence Intervals\\nMean\\nStandard Error\")\n```\n\
    \n在原始数据集中，专业工作类型有 18 个收入数据点，蓝领工作类型有 21 个数据点。专业工作类型的 95% 置信区间范围是 29.50 到 79.15，平均值为\
    \ 60.06。蓝领工作类型的区间范围是 7.00 到 64.00，平均值为 23.76。根据图 2.18，收入差异之间存在合理的重叠，这导致了置信区间的重叠。因此，可以合理地假设蓝领和专业工作类型之间的收入没有统计学上的显著差异。然而，这个数据集的样本量非常有限：\n\
    \n```python\nn_replicas=0\nplot_distributions(n_replicas=n_replicas,\nprofessional_sample=df_professional['income'],\n\
    \    blue_collar_sample=df_blue_collar['income'],\n    professional_label=\"Professional\"\
    ,\n    blue_collar_label=\"Blue Collar\")\n```\n\n![图 2.18 – 带有第 95 百分位线的原始数据分布](img/3de2e60811d1b90c67f6bb2d5cae034f_69_0.png)\n\
    \n图 2.18 – 带有第 95 百分位线的原始数据分布\n\n在接下来的代码中，使用`pandas`的`.sample()`函数，我们从每个分布中随机重采样\
    \ 50%（`frac=0.5`）的收入值 1,000 次，并每次计算一个新的均值，将其附加到以`_bootstrap_means`结尾的 Python 列表中。使用这些列表，我们推导出新的\
    \ 95% 置信区间。*图 2.19* 显示，考虑到数据集中的标准差和收入值，使用每个重采样子集的平均值绘制的新样本分布。`replace=True`参数允许重复采样同一条记录（如果随机发生这种情况），这是自助法的要求。\n\
    \n执行自助法程序后，我们可以看到收入开始大致呈标准正态（高斯）形式分布。值得注意的是，从这个实验来看，置信区间不再重叠。专业组和蓝领组之间置信区间的分离意味着，以\

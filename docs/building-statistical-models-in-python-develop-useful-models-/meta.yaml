- md: '## Multinomial logit model


    In practice, there are many situations where the outcomes (dependent variables)
    are not binary but have more than two possibilities. **Multinomial logistic regression**
    can be understood as a general case of the logit model, which we studied in the
    previous section. In this section, we will consider a hands-on study on Iris data
    by using the MNLogit class from statsmodels: https://www.statsmodels.org/dev/generated/statsmodels.discrete.discrete_model.MNLogit.html.


    Iris data (https://archive.ics.uci.edu/ml/datasets/iris) is one of the best-known
    statistical and machine learning datasets for education. The independent variables
    are sepal length (in cm), sepal width (in cm), petal length (in cm), and petal
    width (in cm). The dependent variable is a categorical variable with three levels:
    Iris Setosa (0), Iris Versicolor (1), and Iris Virginia (2). The following Python
    codes illustrate how to conduct this using sklearn and statsmodels:


    ```python

    # import packages

    import numpy as np

    import pandas as pd

    from sklearn import datasets

    from sklearn.model_selection import train_test_split

    from sklearn.linear_model import LogisticRegression

    from sklearn.metrics import confusion_matrix, accuracy_score, ConfusionMatrixDisplay

    import statsmodels.discrete.discrete_model as sm


    # import Iris data

    iris = datasets.load_iris()

    print(iris.feature_names)

    print(iris.target_names)


    #create dataframe

    df = pd.DataFrame(iris.data, columns = [''sepal_length'', ''sepal_width'', ''petal_length'',
    ''petal_width''])

    df[''target''] = iris.target

    df.head()


    # check missing values

    df.isna().sum()


    # create train and test data

    X = df.drop(''target'', axis=1)

    y = df[''target'']

    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size =0.2, random_state
    =1)


    # fit the model using sklearn

    model_sk = LogisticRegression(solver = ''newton-cg'', multi_class = ''multinomial'')

    model_sk.fit(X_train, y_train)

    y_hat_sk = model_sk.predict(X_test)

    pred_sk = list(map(round, y_hat_sk))

    # confusion matrix

    cm_sk = confusion_matrix(y_test, pred_sk)

    ConfusionMatrixDisplay(cm_sk).plot()

    # Accuracy

    print(''Test accuracy = '', accuracy_score(y_test, pred_sk))


    #fit the model using statsmodels

    model_stat = sm.MNLogit(y_train, X_train).fit(method=''bfgs'')

    model_stat.summary()

    y_hat_stat = model_stat.predict(X_test)

    pred_stat = np.asarray(y_hat_stat).argmax(1)

    # confusion matrix

    cm_stat = confusion_matrix(y_test, pred_stat)

    ConfusionMatrixDisplay(cm_stat).plot()

    # Accuracy

    print(''Test accuracy = '', accuracy_score(y_test, pred_stat))

    ```


    Both methods give us the same test accuracy value (96.67%), with the confusion
    matrix produced as follows:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_232_0.png)


    ## Poisson model


    In the previous section, we discussed models where the response variable was categorical.
    In this section, we will look at a model for count data. Count data is like categorical
    data (the categories are integers), but there are an infinite number of levels
    (0, 1, 2, 3, and so on). We model count data with the **Poisson distribution**.
    In this section, we will start by examining the Poisson distribution and its properties.
    Then, we will model a count variable with explanatory variables using the Poisson
    model.


    ## The Poisson distribution


    The Poisson distribution is given by the following formula:


    $$P(k) = \frac{\lambda^k e^{-\lambda}}{k!}$$


    Here, $\lambda$ is the average number of events and $k$ is the number of events
    for which we would like the probability. $P(k)$ is the probability that the $k$
    events occur. This distribution is used to calculate the probability of $k$ events
    occurring in a fixed time interval or a defined space.


    The shape of the distribution changes with the value of $\lambda$. When $\lambda$
    is greater than 10, the distribution appears approximately normal. However, as
    $\lambda$ approaches 0, the distribution becomes right-skewed. This is because
    count data cannot be negative. Three example Poisson distributions are shown in
    *Figure 8.7* with means of 12, 5, and 2. Notice that the distribution with the
    mean of 12 is approximately normally distributed, while the distributions of 5
    and 2 are right-skewed:


    214 Discrete Models


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_234_0.png)


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_234_1.png)


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_234_2.png)


    Figure 8.7 – Example Poisson distributions with means of 12, 5, and 2'

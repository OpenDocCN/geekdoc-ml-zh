    Because the negative binomial model is based on a Poisson-gamma mixture model,
    we need to estimate the model''s measure of over-dispersion using a Poisson model.
    A method referred to as **auxiliary OLS regression (without constant)** is provided
    by A. Colin Cameron and Pravin K. Trivedi in *Microeconometrics: Methods and Applications*.
    The authors propose the creation of an over-dispersion test statistic where the
    null hypothesis is α=0 and the alternate hypothesis is α ≠ 0, where α is the estimate
    of over-dispersion. The auxiliary OLS regression formula is as follows:


    $$\frac{(y_i - \hat{\mu}_i)^2 - y_i}{\hat{\mu}_i} = \alpha \frac{g(\hat{\mu}_i)}{\hat{\mu}_i}
    + \mu_i$$


    Here, $\mu_i$ is an error term and $g(\hat{\mu}_i)$ is $\hat{\mu}_i^2$. Thus,
    the right-hand operand reduces to $\alpha \hat{\mu}_i + \mu_i$. In terms of negative
    binomial regression, we consider the error to equal zero, so we can factor α in
    as the over-dispersion estimate.


    In the following code, we have fit our training data to a generalized linear model
    using the Poisson model for the linkage. Then, we used the regression mean of
    the model to build the estimated auxiliary target variable. Because the method

    # Coefficients of correlation\n\nA coefficient of correlation is a measure of\
    \ the statistical linear relationship between two variables and can be computed\
    \ using the following formula:\n\n$$r = \\frac{1}{n-1} \\sum_{i=1}^n \\left( \\\
    frac{x_i - \\bar{x}}{s_x} \\right) \\left( \\frac{y_i - \\bar{y}}{s_y} \\right)$$\n\
    \nThe reader can go here – https://shiny.rit.albany.edu/stat/corrsim/ – to simulate\

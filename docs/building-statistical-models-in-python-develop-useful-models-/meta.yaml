    particularly convincing result. This is due to the relatively high false positive
    rate of 0.3, even though the test has high accuracy. If we are not convinced,
    we can run the test again using 0.44 as the new prior. Assuming the second test
    is positive, we would get the following result:


    $$P(sick|test\ pos) = \frac{0.95(0.441)}{0.95(0.441) + 0.3(1 - 0.441)} \cong 0.71$$


    A second positive test provides a more convincing result of 0.71. We could continue
    to iteratively improve the probability estimation that a patient is sick by incorporating
    the results from additional tests. This incremental improvement of probability
    estimation is the basic idea of Bayesian statistics.


    This section contained an introduction to probability. We covered independent
    and dependent events and then provided more details on dependent events, which
    led to the introduction of Bayes'' Theorem. In the next section, we will discuss
    a type of classification model that uses Bayes'' Theorem.


    # Linear Discriminant Analysis


    In the previous chapter, we discussed logistic regression as a classification
    model leveraging linear regression to model directly the probability of a target
    distribution given an input distribution. One alternative to this approach is
    LDA. LDA models the probability of target distribution class memberships given
    input variable distributions corresponding to each class using decision boundaries
    constructed using Bayes'' Theorem, which we discussed previously. Where we have
    $k$ classes, using Bayes'' Theorem, we have the probability density function for
    LDA class membership simply as $P(Y = k|X = x)$ for any discrete random variable,
    $X$. This relies on the posterior probability that an observation $x$ in variable
    $X$ belongs to the $k$th class.


    Before proceeding, we must first make note that LDA makes three pertinent assumptions:


    +   - Each input variable is normally distributed.

    - Across all target classes, there is **equal covariance** among the predictors.
    In other words, the shared variance of all input variables is uniform. For this
    reason, it is useful to **standardize each input variable** to have a mean of
    0 and **scale to unit variance** (standard deviation of 1).

    - Samples are assumed to be independent; **random sampling** is highly important
    to avoid complications resulting from **serial or cluster effects**.


    With these assumptions met, we can make the assumption that the class probability
    density function is Gaussian (normal), and thus, in a one-dimensional form (one
    input variable), we have the following density function:


    $$\frac{1}{\sqrt{2\pi}\sigma_k} e^{\frac{-1}{2\sigma_k^2}(x-\mu_k)^2}$$'
  merge: -1
  pgno: 249
- img_proc: true
  md: 'Here, $\mu_k$ is the $k$th class mean and $\sigma_k^2$ is the $k$th class variance.
    In the multivariate case, the normal probability density function is this:


    $$\frac{1}{2\pi^{p/2}\sqrt{|D|}} e^{-\frac{1}{2}(x-\mu)^T D^{-1}(x-\mu)}$$


    Here, $D$ is the covariance matrix of the input variables, $p$ is the number of
    input variables (or parameters), and $\pi$ is the prior probability. The univariate
    calculation of the posterior probability is shown here (where $k$ corresponds
    to the $k$th class and $K$ corresponds to the number of classes):


    $$\frac{\pi_k \frac{1}{\sqrt{2\pi}\sigma} e^{-\frac{1}{2\sigma^2}(x-\mu_k)^2}}{\sum_{i=1}^K
    \pi_i \frac{1}{\sqrt{2\pi}\sigma} e^{-\frac{1}{2\sigma^2}(x-\mu_i)^2}}$$


    And for the multivariate case, the calculation looks like this:


    $$\frac{\pi_k \frac{1}{\sqrt{|D|}} e^{-\frac{1}{2}(x-\mu)^T D^{-1}(x-\mu)}}{\sum_{i=1}^K
    \pi_i \frac{1}{\sqrt{|D|}} e^{-\frac{1}{2}(x-\mu)^T D^{-1}(x-\mu)}}$$


    The univariate linear discriminant function, $\delta_k(x)$, can be written as
    follows:


    $$\delta_k(x) = \frac{x^* \mu_k}{\sigma^2} - \frac{\mu_k^2}{2\sigma^2} + \log(\pi_k)$$


    Here, the class with the largest value of $\delta_k(x)$ has its label assigned
    to the given observation. This uses the Bayesian decision boundary for $K$ classes:


    $$x = \frac{\mu_1^2 - \mu_2^2 - \dots - \mu_K^2}{K(\mu_1 - \mu_2)}$$


    For the multivariate case, the linear discriminant function, which follows the
    same Bayesian decision boundary, looks like this:


    $$\delta_k(x) = x^T D^{-1} \mu_k - \frac{1}{2} \mu_k^T D^{-1} \mu_k + \log(\pi_k)$$


    Now that we have identified the probability density functions, calculations for
    class membership posterior probabilities, the Bayesian decision boundary, and
    linear discriminant functions, we can understand how the required assumptions
    for LDA are very important. While transformations can be used to make data fit
    the required assumptions, these transformations must also be adaptable across
    future datasets. Therefore, if the data changes frequently and heavy transformations
    are needed to meet the parametric assumptions required of LDA to produce useful
    results across training and testing, this may not be the proper method of classification
    for the task (something such as **QDA** may be more useful). However, if these
    assumptions can be met at the researcher''s comfort, and with'

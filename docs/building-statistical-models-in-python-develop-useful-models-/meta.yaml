    # Models for non-stationary time series


    In the previous section, we discussed ARMA models for stationary time series data.
    In this section, we will look at non-stationary time series data and extend our
    model to work with non-stationary data. Let us start by taking a look at some
    sample data (shown in *Figure 11.17*). There are two series: US GDP (left) and
    airline passenger volume (right).


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_315_0.png)'
  merge: -1

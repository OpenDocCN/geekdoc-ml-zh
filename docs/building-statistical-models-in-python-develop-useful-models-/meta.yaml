    # # 12 Multivariate Time Series


    The models we discussed in the previous chapter only depended on the previous
    values of the single variable of interest. Those models are appropriate when we
    only have a single variable in our time series. However, it is common to have
    multiple variables in time-series data. Often, these other variables in the series
    can improve forecasting of the variable of interest. We will discuss models for
    time series with multiple variables in this chapter. We will first discuss the
    correlation relationship between time-series variables, then discuss how we can
    model multivariate time series. While there are many models for multivariate time-series
    data, we will discuss two models that are both powerful and widely used: **autoregressive
    integrated moving average with exogenous variables (ARIMAX)** and **vector autoregressive
    (VAR)**. Understanding these two models will extend the reader''s model toolbox
    and provide building blocks for the reader to learn more about multivariate time-series
    models.


    In this chapter, we''re going to cover the following main topics:


    +   - Multivariate time series

    - ARIMAX

    - VAR modeling


    # ## Multivariate time series


    In the previous chapter, we discussed models for **univariate time series** or
    a time series of one variable. However, in many modeling situations, it is common
    to have multiple time-varying variables that are measured together. A time series
    consisting of multiple time-varying variables is called a **multivariate time
    series**. Each variable in the time series is called a **covariate**. For example,
    a time series of weather data might include temperature, rain amount, wind speed,
    and relative humidity. Each of these variables, in the weather dataset, is a univariate
    time series, and together, a multivariate time series and each pair of variables
    are covariates.'
- md: 'Mathematically, we typically represent a multivariate time-series as a vector-valued
    series, as follows:


    $$X = \begin{bmatrix} x_{0,0} & x_{1,0} & \dots & x_{t,0} \\ x_{0,1} & x_{1,1}
    & \dots & x_{t,1} \\ \vdots & \vdots & \ddots & \vdots \end{bmatrix}$$


    Here, each $X$ instance consists of multiple values at each time step, and there
    are $t$ steps in the series. The first index in the preceding equation represents
    the time step (0 through $t$), and the second index represents the individual
    series (0 through $N$ variables). For example, if $X$ were a time series of stock
    prices, at each time step of $X$, there would be a value of each stock price.
    In that case, $X$ might look like the following equation if the first two stock
    symbols in the series were AAPL and GOOGL:


    $$X = \begin{bmatrix} x_{0, AAPL} & x_{1, AAPL} & \dots & x_{t, AAPL} \\ x_{0,
    GOOGL} & x_{1, GOOGL} & \dots & x_{t, GOOGL} \\ \vdots & \vdots & \ddots & \vdots
    \end{bmatrix}$$


    When we have a multivariate time series, a question arises: *What can we do with
    this additional information?* To answer that question, we need to understand whether
    these time-series variables are related. We can determine how time series are
    related by looking at their cross-correlation. Let''s discuss cross-correlation
    next.


    ## Time-series cross-correlation


    We need to understand how time series can be related in order to determine whether
    covariate time series may be useful for forecasting a time series of interest.
    In a previous chapter, we discussed how to understand the relationship between
    two variables using plots and correlation coefficients; we will take a similar
    approach for the time-series data. Recall the following **cross-correlation function**
    (CCF) discussed in *Chapter 10, Introduction to Time Series*:


    $$\hat{\rho}_k(X, Y) = \frac{\sum_{t=1}^{n-k} (X_t - \bar{X})(Y_{t-k} - \bar{Y})}{\sqrt{\sum_{t=1}^n
    (X_t - \bar{X})^2} \sqrt{\sum_{t=1}^n (Y_t - \bar{Y})^2}}$$


    Here, $X$ is a univariate time series and $Y$ is a univariate time series. This
    function tells us how $X$ and $Y$ are related at $k$ lags. In this equation, $Y$
    is $k$ time steps behind $X$. In this situation, we say that $X$ is leading $Y$
    by $k$ steps or $Y$ is lagging $X$ by $k$ steps. We will use this CCF to help
    us determine whether two time series are related and at which time steps they
    are related. Notice that if $X = Y$, then the CCF reduces to the **autocorrelation
    function** (ACF).


    > **Cross-correlation significance**

    > Just as with the ACF, cross-correlations have a threshold for statistical significance.
    We consider any cross-correlation value with an absolute value greater than $1.96/\sqrt{N}$
    (where $N$ is the sample size of the time series) to be significantly different
    from zero.


    Let''s take a look at cross-correlations with some data. This data [1] comes from
    the *UCI Machine Learning Repository* [2]. The data is weather data that was collected
    as part of a pollution study conducted in China. This data was sampled hourly
    over several years. We will subset the data to the first 1,000 data points. The
    weather data contained in this set consists of temperature (TEMP), pressure (PRES),
    dew point temperature (DEWP), rain precipitation (RAIN), and wind speed (WSPM).
    We will look at cross-correlations from the perspective of trying to forecast
    wind speed, meaning we will look at the cross-correlations of wind speed and the
    other variables. This may be an important problem for someone who wants to forecast
    power generation from windmills. The wind speed data and the ACF of the wind speed
    data are plotted in *Figure 12.1*:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_343_0.png)


    We can see from the plot in *Figure 12.1* that the wind speed could potentially
    be modeled by a stationary univariate model, which we discussed in the previous
    chapter. While there does not appear to be evidence of **autoregressive integrated
    moving average (ARIMA)** behavior, there does appear to be evidence of seasonality
    at lag 24. Since the data is sampled hourly, the seasonality is likely a daily
    pattern. We have plotted the time series of the other variables in *Figure 12.2*.
    These are the other variables we may want to use to help predict the value of
    wind speed:


    ## Multivariate Time Series


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_344_0.png)


    Figure 12.2 – Plot of wind speed time series and three other weather variables


    While we have not plotted the ACF for all the time series shown in *Figure 12.2*,
    these time series have characteristics that suggest they may be stationary. However,
    it is not clear from the time series alone whether these time series are related.
    This is where the cross-correlation of time series comes in. We can use a cross-correlation
    plot to determine whether any of the other time series are related to wind speed.
    We have plotted the cross-correlation of wind speed and the other variables in
    *Figure 12.3*. The CCFs are plotted up to 48 lags. Since the data was sampled
    hourly, this gives us 2 days’ worth of lags to see the cross-correlations:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_345_0.png)


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_345_1.png)


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_345_2.png)


    Figure 12.3 – CCF plots of wind speed and three other variables


    The plots in Figure 12.3 show that there are cross-correlations between wind speed
    and the other variables. While we are not too interested in the shapes of the
    cross-correlations, the patterns may provide some depth to how the variables are
    related. For example, the cross-correlation of wind speed and temperature shows
    an oscillating pattern with a period of about 12 hours; this may correspond to
    the effect of sunlight on wind speed. The primary finding is that these other
    variables share a relationship with wind speed and may help us forecast the values
    of wind speed. Let''s take a look at how we can use the additional variables for
    modeling.


    ## ARIMAX


    In the previous chapter, we discussed the ARIMA family of models and demonstrated
    how to model univariate time-series data. However, as we mentioned in the previous
    section, many time series are multivariate, such as stock data, weather data,
    or economic data. In this section, we will discuss how we can incorporate information
    from covariate variables when modeling time-series data.


    When we model a multivariate time series, we typically have a variable we are
    interested in forecasting. This variable is commonly called the **endogenous**
    variable. The other covariates in the multivariate time series are called **exogenous**
    variables. Recall from *Chapter 11, ARIMA Models*, the equation representing the
    ARIMA model:


    $$y''_{t} = c + \phi_{1} y''_{t-1} + \dots + \phi_{p} y''_{t-p} + \epsilon_{t}
    + \theta_{1} \epsilon_{t-1} + \dots + \theta_{q} \epsilon_{t-q}$$


    Here, $y''_{t}$ is the differenced series, differenced $d$ times until it is stationary.
    In this model, $y_{t}$ is the variable we are interested in forecasting; it is
    the endogenous variable. Let us rewrite this equation in a more compact form.
    We collect the terms related to $y''_{t}$ into one summation and the terms related
    to $\epsilon_{t}$ into another summation. Let us start with the $y''_{t}$ terms:


    $$\phi_{1} y''_{t-1} + \dots + \phi_{p} y''_{t-p} = \sum_{i=1}^{p} \phi_{i} y''_{t-i}$$


    Then, we will also collect the $\epsilon_{t}$ terms into different summations:


    $$\epsilon_{t} + \theta_{1} \epsilon_{t-1} + \dots + \theta_{q} \epsilon_{t-q}
    = \epsilon_{t} + \sum_{j=1}^{q} \theta_{j} \epsilon_{t-j}$$


    Putting these summations together, we get the following more compact version of
    our ARIMA equation:


    $$y''_{t} = c + \sum_{i=1}^{p} \phi_{i} y''_{t-i} + \epsilon_{t} + \sum_{j=1}^{q}
    \theta_{j} \epsilon_{t-j}$$


    Now, let''s add the exogenous variables to the model. We will add the exogenous
    variables by adding a summation term to the model:


    $$y''_{t} = c + \sum_{i=1}^{p} \phi_{i} y''_{t-i} + \epsilon_{t} + \sum_{j=1}^{q}
    \theta_{j} \epsilon_{t-j} + \sum_{k=1}^{r} \beta_{k} X_{tk}$$


    Here, there are $r$ exogenous variables contained in the vector-valued variable
    $X$. Recall from earlier in the chapter, we can represent the vector-valued variable,
    as shown next, where the first index represents the time step, and the second
    index represents an individual series within the vector-valued variable:


    $$X = \begin{bmatrix} x_{0,0} & x_{1,0} & \dots & x_{t,0} \\ \vdots & \vdots &
    \dots & \vdots \\ x_{0,k} & x_{1,k} & \dots & x_{t,k} \end{bmatrix}$$


    This is how we will incorporate the exogenous variables into the ARIMA model.
    Now, let''s talk about how we would pick the exogenous variables. In *Chapter
    11, ARIMA Models*, using an ACF plot, we saw that certain lags of a time series
    are more influential than others for modeling a univariate time series. We will
    make similar judgments about exogenous variables using CCF plots. Let''s take
    a look at example CCF plots and discuss how to make these judgments.


    The CCF plot for wind speed and temperature is shown in *Figure 12.4*. We have
    marked where the most significant cross-correlations occur within a lag period
    of 48 hours. Recall this data is sampled hourly; thus, each lagged time step corresponds
    to a lag of 1 hour. The plot shows that the most significant cross-correlations
    occur at approximately lag 13, lag 24, and lag 37:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_347_0.png)


    Figure 12.4 – CCF plot of wind speed and temperature variables'

    \n## 总结\n\n在本章中，我们首先概述了概率。我们涵盖了条件概率和独立概率之间的区别，以及贝叶斯定理如何利用这些概念为概率建模提供独特的方法。接下来，我们讨论了LDA、其假设，以及该算法如何应用于贝叶斯统计以执行分类建模和有监督的降维。最后，我们介绍了QDA，这是当线性决策边界无效时LDA的一种替代方案。\n\
    \n在下一章中，我们将介绍时间序列分析的基础知识，包括概述这种方法在回答统计问题方面的深度和局限性。\n\n## 第四部分：时间序列模型\n\n本部分的目标是学习如何分析和创建单变量和多变量时间序列数据的预测。\n\
    \n它包括以下章节：\n\n- 第10章，时间序列简介\n- 第11章，ARIMA模型\n- 第12章，多变量时间序列\n\n## 10 时间序列简介\n\n\
    在*第9章，判别分析*中，我们通过介绍使用贝叶斯定理的条件概率、**线性判别分析（LDA）**和**二次判别分析（QDA）**，结束了对统计分类建模的概述。在本章中，我们将介绍时间序列、其基础统计概念，以及如何在日常分析中应用它们。我们将首先区分时间序列数据与本书迄今为止讨论的内容来引入该主题。然后，我们将概述时间序列建模的预期内容及其可利用实现的目标。在时间序列的背景下，我们还将重新引入均值和方差统计参数，以及相关性。我们将概述**线性差分、互相关、自回归（AR）和移动平均（MA）**特性，以及如何使用**自相关函数（ACF）**和**偏自相关函数（PACF）**图来确定它们的阶数。之后，我们将概述入门级的白噪声模型。本章最后将详细、正式地概述平稳性的概念，这可以说是成功进行时间序列预测最重要的前提。\n\

    \ as follows:\n\n$$z_{95} = \\frac{95 - 98}{12} = -0.25,$$\n$$z_{100} = \\frac{104\
    \ - 98}{12} = 0.5.$$\n\nTherefore, the probability that the taken score is between\
    \ 95 and 104 is:\n\n$$P(95 < x < 104) = P(-0.25 < z < 0.5) = 0.6915 - 0.4013 =\
    \ 0.2902.$$\n\nThen, the probability is about 29.02% that an IQ score taken at\
    \ random from the data is between 95 and 104. We also can get the values from\

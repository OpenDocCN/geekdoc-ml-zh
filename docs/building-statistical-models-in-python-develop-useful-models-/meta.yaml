    \ The code for this selection process is shown here:\n\n```python\n# initial model\n\
    arima = pm.auto_arima(\n    y, X,\n    error_action='ignore',\n    trace=False,\n\
    \    suppress_warnings=True,\n    maxiter=5,\n    seasonal=False,\n    test='adf'\n\
    )\n\npvalues = arima.pvalues()\niterations = 0\n\nwhile (pvalues > 0.05).any():\n\
    \    # get the variable name with the largest p-value\n    variable_with_max_pval\
    \ = pvalues.idxmax()\n    # drop that variable from the exogenous variables\n\
    \    X = X.drop(variable_with_max_pval, axis=1)\n    arima = pm.auto_arima(\n\
    \        y, X,\n        error_action='ignore',\n        trace=False,\n       \
    \ suppress_warnings=True,\n        maxiter=5,\n        seasonal=False,\n     \
    \   test='adf'\n    )\n    pvalues = arima.pvalues()\n    print(f\"fit iteration\
    \ {iterations}\")\n    iterations += 1\n```\n\nPerforming this selection process\
    \ will result in a model only containing the `temp_lag_24`, `temp_lag_37`, `pres_lag_24`,\
    \ and `dewp_lag_2` exogenous variables. The ARIMA portion of the model is still\
    \ an AR(2) model. With a model selection taken, let's assess the model's performance.\n\
    \n## Assessing model performance\n\nWe will assess the performance of the model\
    \ by plotting the forecast versus the actual data points and calculating an error\
    \ estimate. Let us start by looking at the forecasts from the ARIMAX model for\
    \ the next 200 observations. The forecasts and test data points are plotted in\
    \ *Figure 12.6*:\n\n![Figure 12.6 – Forecast of wind speed using an ARIMAX model](img/3de2e60811d1b90c67f6bb2d5cae034f_353_0.png)\n\
    \nWe can see the forecast for wind speed using the ARIMAX model we created in\
    \ *Figure 12.6*. Two observations stand out from the plotted forecast:\n\n- The\
    \ forecast captures the oscillation of the windspeed variable.\n- The forecast\
    \ fails to capture the high spikes in windspeed.\n\nTo understand whether the\
    \ exogenous variables provided material value in the model, we should compare\
    \ the forecasts of the ARIMAX model, shown in *Figure 12.6*, to forecasts from\
    \ a univariate model. The forecasts from a univariate model are shown in *Figure\
    \ 12.7*:\n\n![Figure 12.7 – Forecast of wind speed using an ARIMA model](img/3de2e60811d1b90c67f6bb2d5cae034f_354_0.png)\n\
    \nThe forecasts of the ARIMA model, shown in *Figure 12.7*, do not appear to capture\
    \ much variation in the time series as the forecast length grows. This is actually\
    \ a property of ARMA models. It should be evident from the two plots that the\
    \ ARIMAX model provides a better forecast than the ARIMA model. Finally, let us\
    \ compare the **mean squared error (MSE)** of the forecasts of the two models.\
    \ The MSE from the ARIMAX model is approximately 1.5, while the MSE from the ARIMA\
    \ model is about 1.7. The MSE value confirms what we saw in the plots—namely,\
    \ the ARIMAX model provides a better forecast for this multivariate time series.\n\
    \nIn this section, we discussed an extension to the ARIMA model that allows us\
    \ to incorporate information from covariates in a multivariate time series. This\
    \ is only one of many methods for multivariate time series. In the next section,\
    \ we will discuss another method for working with multivariate time-series data.\n\
    \n## VAR modeling\n\nThe AR(p), MA(q), ARMA(p,q), ARIMA(p,d,q)m, and SARIMA(p,d,q)\
    \ models we looked at in the last chapter form the basis of multivariate VAR modeling.\
    \ In this chapter, we have discussed ARIMA with exogenous variables (ARIMAX).\
    \ We will now begin discussion on the VAR model. First, it is important to understand\
    \ that while **ARIMAX requires leading (future) values of the exogenous variables,\
    \ no future values of these variables are required for the VAR model** as they\
    \ are all autoregressive to each other – hence the name vector autoregressive\
    \ – and by definition not exogenous. To start, let us consider the two-variable,\
    \ or bivariate, case. Consider a process $y_t$ that is the output of two different\
    \ input variables, $y_{t1}$ and $y_{t2}$. Note that in matrix form, we are discussing\
    \ the case of an $n \\times m$ matrix ($y_{n,m}$) where $n$ corresponds to the\
    \ point in time and $m$ corresponds to the **variables** involved (variables 1,2,…,$m$).\
    \ We exclude the comma from notation going forward, but it is important to understand\
    \ when we discuss multivariate autoregressive processes that we are discussing\
    \ data within a multidimensional matrix rather than only the single-dimensional\
    \ vector form we used for univariate time-series analysis. We can write our process,\
    \ $y_t$, in vector notation as follows:\n\n$$y_t = \\begin{bmatrix} y_{t1} \\\\\
    \ y_{t2} \\end{bmatrix}.$$\n\nWe can expand on the input variables' definitions\
    \ as a VAR(1) process, here, for the two variables in $y_t$ shown previously:\n\
    \n$$y_{t1} = (1 - \\phi_{11})\\mu_1 - \\phi_{12}\\mu_2 + \\phi_{11}y_{t-11} +\
    \ \\phi_{12}y_{t-12} + \\varepsilon_{t1}$$\n$$y_{t2} = -\\phi_{21}\\mu_1 + (1\
    \ - \\phi_{22})\\mu_2 + \\phi_{21}y_{t-11} + \\phi_{22}y_{t-12} + \\varepsilon_{t2}.$$\n\
    \nThe terms $(1 - \\phi_{11})\\mu_1 - \\phi_{12}\\mu_2$ and $-\\phi_{21}\\mu_1\
    \ - (1 - \\phi_{22})\\mu_2$ are our **model constants** ($\\beta$ coefficients).\n\
    \nWe can reduce the previous processes (using a zero-mean form) into the matrix-reduced\
    \ form, like so:\n\n$$y_t = \\Phi_1 y_{t-1} + \\varepsilon_t$$\n\nHere, we have\
    \ the following:\n\n$$\\Phi_1 = \\begin{bmatrix} \\phi_{11} & \\phi_{12} \\\\\
    \ \\phi_{21} & \\phi_{22} \\end{bmatrix}$$\n\nOur forecast for a VAR(1) model\
    \ is shown here:\n\n$$\\hat{y}_{t_0,1}(l) = (1 - \\phi_{11})\\bar{y}_1 - \\phi_{12}\\\
    bar{y}_2 + \\phi_{11}\\hat{y}_{t_0,1}(l-1) + \\phi_{12}\\hat{y}_{t_0,2}(l-1)$$\n\
    $$\\hat{y}_{t_0,2}(l) = -\\phi_{21}\\bar{y}_1 + (1 - \\phi_{22})\\bar{y}_2 + \\\
    phi_{21}\\hat{y}_{t_0,1}(l-1) + \\phi_{22}\\hat{y}_{t_0,2}(l-1)$$\n\nIt also includes\
    \ this:\n\n$$\\hat{y}_{t_0}(l) = \\begin{bmatrix} \\hat{y}_{t_0,1}(l) \\\\ \\\
    hat{y}_{t_0,2}(l) \\end{bmatrix}$$\n\nHere, $l$ represents the forward lag ($t+1,\
    \ t+2, ..., t+n$), $\\hat{y}_{t,m}$ represents the forecasted value at time $t$\
    \ for variable $m$, and $t_0$ corresponds to the most recent point in time (often,\
    \ the length of the data). It is also important to note the $m \\times m$ covariance\
    \ matrix is this:\n\n$$\\hat{\\Gamma}(k) = \\begin{bmatrix} \\hat{\\gamma}_{11}(k)\
    \ & \\cdots & \\hat{\\gamma}_{1m}(k) \\\\ \\vdots & \\ddots & \\vdots \\\\ \\\
    hat{\\gamma}_{m1}(k) & \\cdots & \\hat{\\gamma}_{mm}(k) \\end{bmatrix}$$\n\nHere,\
    \ each covariance, $\\hat{\\gamma}_{ij}(k)$, with $k$ corresponding to the lag,\
    \ is calculated as follows:\n\n$$\\hat{\\gamma}_{ij}(k) = \\frac{1}{n} \\sum_{t=1}^{n-k}\
    \ (y_{ti} - \\bar{y}_i)(y_{t+k,j} - \\bar{y}_j).$$\n\nOur estimated cross-correlation\
    \ between each variable $y_{ti}$ and $y_{tj}$ is therefore calculated as follows:\n\
    \n$$\\hat{\\rho}_{ij}(k) = \\frac{\\hat{\\gamma}_{ij}(k)}{\\sqrt{\\hat{\\gamma}_{ii}(0)\
    \ \\hat{\\gamma}_{jj}(0)}}$$\n\nUnderstanding the calculations for cross-correlation\
    \ and, especially, covariance helps with understanding the relationships between\
    \ the variables and their impact on model fit. The method for combining the two\
    \ models to generate one overall process forecast, $\\hat{y}_t$, is through weighting\
    \ the two input means and their correlations into one response. As we can see\
    \ in our VAR(1) forecast, shown previously, the correlations between each given\
    \ variable and the other variables across different points in time are able to\
    \ be modeled using a VAR model. Notably, there are no truly independent and dependent\
    \ variables in a VAR model; there is simply an interaction between each variable.\
    \ It is important to note that all processes modeled with a VAR model should be\
    \ **stationary**.\n\nUsing the *United States Macroeconomic* dataset found at\
    \ https://www.statsmodels.org/dev/datasets/generated/macrodata.html, we can observe\
    \ the relationship between real gross private domestic investment (`realinv`),\
    \ real personal consumption expenditures (`realcons`), and real private disposable\
    \ income (`realdpi`) with a zero-mean form in the context of VAR modeling, as\
    \ follows:\n\n$$realcons(t) = \\phi_{11} realcons_{t-11} + \\phi_{12} realinv_{t-12}\
    \ + \\phi_{13} realdpi_{t-13} + \\varepsilon_{t1}$$\n$$realinv(t) = \\phi_{21}\
    \ realcons_{t-11} + \\phi_{22} realinv_{t-12} + \\phi_{23} realdpi_{t-13} + \\\
    varepsilon_{t2}$$\n$$realdpi(t) = \\phi_{31} realcons_{t-11} + \\phi_{32} realinv_{t-12}\
    \ + \\phi_{33} realdpi_{t-13} + \\varepsilon_{t3}$$"
  mdcn: "上述输出仅显示了当前模型中的三个外生变量，它们已被高亮显示。这意味着我们应该考虑减少该模型中的变量。我们可以通过多种方法来实现；在本例中，我们将选择基于p值来剔除特征。我们将迭代地移除p值最高的特征，直到所有特征的p值都低于0.05。此选择过程的代码如下所示：\n\

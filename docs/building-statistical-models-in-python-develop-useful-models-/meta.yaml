    # Shapiro-Wilk


    The **Shapiro-Wilk** test is a goodness-of-fit test that checks whether a given
    distribution is normally distributed. The test checks how closely a distribution
    of observed values centered on 0 and scaled to a unit variance of 1 approximates
    an observed centered and scaled standard normal distribution. This centering and
    scaling (called **standardizing**) are performed within the function in the `scipy.stats.shapiro`
    module, so input data does not need to be altered prior to testing. The level
    of significance for this test in `scipy` is 0.05.


    > **Shapiro-Wilk compared to Kolmogorov-Smirnov and Anderson-Darling**

    Shapiro-Wilk is ideal, compared to Kolmogorov-Smirnov and Anderson-Darling, for
    testing small sample sizes of roughly less than 50. However, one drawback is that
    since Shapiro-Wilk uses repeated sampling and testing for the calculated test
    statistic by applying Monte Carlo simulation, the law of large numbers poses a
    risk that as the sample size increases, there is an inherent increase in the risk
    of encountering a *type II error* (a loss of power) and failing to reject the
    null hypothesis, where the null hypothesis states the given distribution is normally
    distributed.'

  md: 'in other words, the probability used to determine whether $H_0$ should be rejected.
    The rejection rule (reject $H_0$) is the p-value being less than or equal to the
    specified level of significance $\alpha$ in the research. In order to find the
    p-value based on the value of the test statistic in Python, we use the following
    syntax:


    ```

    scipy.stats.norm.sf(abs(x))

    ```


    Here, x is the z-score. For example, we want to find the p-value associated with
    a z-score of -2.67 in a left-tailed test. The Python implementation is as follows:


    ```

    import scipy.stats


    #find p-value

    round(scipy.stats.norm.sf(abs(-2.67)),4)

    ```


    The output will be 0.0038. Similar Python code is used in the case of a right-tailed
    test. For a two-tailed test, we need to multiply the value by 2:


    ```

    #find p-value for two-tailed test

    scipy.stats.norm.sf(abs(2.67))*2

    ```


    The following figure illustrates the idea of how the p-value is computed in each
    type of test.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_93_0.png)


    The last step is to interpret the statistical conclusion.


    On the other hand, in the critical value approach, we will need to compute a critical
    value for the test statistic by using the level of significance. Critical values
    are the boundaries of the critical region where we can reject the null hypothesis.'

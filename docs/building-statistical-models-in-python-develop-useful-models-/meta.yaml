  md: 'The result of the ACF in *Figure 10.4* for the *transformed (differenced) data*
    suggests a moving average component up to an order of 3 (MA(3)) could be useful
    (although an MA(1) may be better). The result of the PACF in *Figure 10.5* for
    the *transformed data* suggests an autoregressive component of order 1 (AR(1))
    may be useful. Using the PACF, we could also conclude an AR(10) may be useful,
    but selecting an order this high will often result in overfitting. A rule of thumb
    is to not use an AR or MA component with an order greater than approximately 5
    for process modeling. Model order, however, depends on the analyst and the process
    details. While we will discuss this concept in depth in *Chapter 11, ARIMA Models*,
    if we are building an ARIMA model for this data, we would have a model of order
    (2,1,3) following the *AR(p)* and *MA(q)* construct we selected with an integrated
    difference, *d*, for the first-order difference we applied illustrated as an order
    (**p,d,q**) model. The orders are used to build **characteristic polynomial equations**
    based on the model that we can then use to assess **stationarity** and **invertibility**,
    which helps identify **model uniqueness** and assess its ability to **converge**
    toward a solution, using the roots of the equations'' factored forms.


    # Cross-correlation


    Moving on, we have, for any given lag *k* greater than zero, the **cross-correlation
    function (CCF)** that can be used to identify the correlation between two variables
    across points in time. This analysis can be used to facilitate the identification
    of leading or lagging indicators. The CCF for two one-dimensional vectors, *i*
    and *j*, for a given lag, *k*, $\hat{p}_{i,j}(k)$, is shown here:


    $$\hat{p}_{i,j}(k) = \frac{\sum_{t=1}^{n-k} (x_{t,i} - \bar{x}_i)(x_{t+k,j} -
    \bar{x}_j)}{\sqrt{\sum_{t=1}^{n} (x_{t,i} - \bar{x}_i)^2} \sqrt{\sum_{t=1}^{n}
    (x_{t+k,j} - \bar{x}_j)^2}}$$


    In considering a case of linear regression where we have two ordered, sequence-based
    input variables predicting an ordered, sequenced-based dependent variable, we
    evaluate the input and output variables at the same time, *t*. However, if using
    cross-correlation to identify a leading or lagging indicator, we can identify
    the lag, *k*, at which the leading variable leads and modify its series position
    by *k* indices. For example, if the time unit of our model is in weeks and we
    build a regression model to predict sales using advertising as an input, we may
    find that in any given week, advertising has no impact on sales. However, after
    performing a cross-correlation analysis, we find a strong lag of 1 exists between
    advertising and sales such that investment in advertising in 1 week directly impacts
    sales in the following week. We then use this information to shift forward the
    advertising expenditure variable by 1 week and rerun the regression model to leverage
    the strong correlation between advertising expense and sales to predict market
    behavior. This is what we can refer to as a **lag effect**.'

    \ square=True, linewidths=.5, annot=True)\n```\n\nSuppose we are curious about\
    \ the variables most meaningful for quarter-mile time (`qsec`). In *Figure 4.20*,\
    \ we can see by looking at the line for `qsec` that `vs` (v-shaped) is positively\
    \ correlated at 0.74. Since this is a binary variable, we can assume, based on\
    \ this dataset, that inline engines are faster than v-shaped engines. However,\
    \ there are other covariates involved with significant correlation. For example,\
    \ almost as strongly correlated with speed as engine shape is horsepower, such\
    \ that as horsepower goes up, quarter-mile runtime goes down:\n\n## Parametric\
    \ Tests\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_142_0.png)\n\nA correlation\
    \ matrix is useful for exploring the relationships between multiple variables\
    \ at one time. It is also a useful tool for feature selection when building statistical\
    \ and **machine learning (ML)** models, such as linear regression.\n\n## Power\
    \ analysis examples\n\nPower analysis is a statistical method for identifying\
    \ an appropriate sample size required for a hypothesis test to have sufficient\
    \ power in preventing *Type II* errors – or failing to reject the null hypothesis\
    \ when the null hypothesis should be rejected. Power analysis can also be used\
    \ for identifying, based on sample size, a detectable effect size (or difference)\
    \ between samples tested. In other words, based on a specific sample size and\
    \ distribution, a power analysis can provide the analyst with a specific minimum\
    \ difference the researcher may be able to reliably identify with a given test.\
    \ In this section, we will demonstrate a power analysis using a one-sample t-test.\n\
    \n### One-sample t-test\n\nLet's assume a manufacturer sells a type of machine\
    \ capable of producing 100,000 units per month with a standard deviation of 2,800\
    \ units. A company has bought a number of these machines and has found them to\
    \ only be producing 90,000 units. The company wants to know how many of the machines\
    \ are needed to determine with a high level of confidence the machines are not\
    \ capable of producing 100,000 units. The following power analysis indicates that\
    \ for a t-test, a sample of three machines is required to prevent, with an 85%\
    \ probability, failing to identify a statistically significant difference in actual\
    \ versus marketed machine performance when there is one:\n\n```python\nfrom statsmodels.stats.power\
    \ import TTestPower\nimport numpy as np\n# Difference of distribution mean and\
    \ the value to be assessed\n# divided by the distribution standard deviation\n\
    effect_size = abs(100000-90000) / 2800\npowersTT = TTestPower()\nresult = powersTT.solve_power(effect_size,\
    \ nobs=3, alpha=0.05,\nalternative='two-sided')\nprint('Power based on sample\
    \ size:{}'.format(round(result,2)))\n# Power based on sample size: 0.85\n```\n\
    \n### Additional power analysis example\n\nTo see additional examples of power\
    \ analysis in Python, please refer to this book's GitHub repository. There, we\
    \ have examples for additional t-tests and F-tests, which focus on analyzing variance\
    \ between sample groups.\n\n## Summary\n\nThis chapter covered topics of parametric\
    \ tests. Starting with the assumptions of parametric tests, we identified and\
    \ applied methods for testing the violation of these assumptions and discussed\
    \ scenarios where robustness can be assumed when the required assumptions are\
    \ not met. We then looked at one of the most popular alternatives to the z-test,\
    \ the t-test. We iterated through multiple applications of this test, covering\
    \ one-sample and two-sample versions of this test using pooling, pairing, and\
    \ Welch's non-pooled version of the two-sample analysis. Next, we explored ANOVA\
    \ techniques, where we looked at using data from multiple groups to identify statistically\
    \ significant differences between them. This included one of the most popular\
    \ adjustments to the p-value for when a high volume of groups is present—the Bonferroni\
    \ correction, which helps prevent inflating the Type I error when performing multiple\
    \ tests. We then looked at performing correlation analysis on continuous data\
    \ using Pearson's correlation coefficient and how to visualize correlation using\
    \ a correlation matrix and accompanying heatmap. Finally, we briefly overviewed\
    \ power analysis, with an example of performing this with a one-sample t-test.\
    \ In the next chapter, we will discuss non-parametric hypothesis testing, including\
    \ new tests in addition to those that pair with the parametric tests in this chapter\
    \ for when assumptions cannot be safely assumed.\n\n## References\n\n[1] *Dua,\
    \ D. and Graff, C. (2019). UCI Machine Learning Repository [http://archive.ics.uci.edu/ml].\
    \ Irvine, CA: University of California, School of Information and Computer Science.*"

    \ y_i}{n} - \\frac{(\\sum_{i=1}^n x_i)^2}{n} \\widehat{\\beta_1} + (\\sum_{i=1}^n\
    \ x_i^2) \\widehat{\\beta_1} = \\sum_{i=1}^n x_i y_i.$$\n\n因为 $\\bar{y} = \\frac{\\\
    sum_{i=1}^n y_i}{n}$ 且 $\\bar{x} = \\frac{\\sum_{i=1}^n x_i}{n}$，我们可以将斜率和截距重写如下：\n\
    \n$$\\widehat{\\beta_0} = \\bar{y} - \\widehat{\\beta_1} \\bar{x},$$\n\n$$\\widehat{\\\
    beta_1} = \\frac{\\sum (x_i - \\bar{x})(y_i - \\bar{y})}{\\sum (x_i - \\bar{x})^2}.$$\n\
    \n在 Python 中，我们可以实现以下代码来求 $\\widehat{\\beta_0}$ 和 $\\widehat{\\beta_1}$：\n\n```python\n\
    def least_squares_method(x, y):\n    x_mean = x.mean()\n    y_mean = y.mean()\n\

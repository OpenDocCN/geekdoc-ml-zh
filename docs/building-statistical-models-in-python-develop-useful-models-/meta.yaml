    \n```python\nsns.set_theme(style=\"white\")\ncorr = df_cars.corr()\nf, ax = plt.subplots(figsize=(15,\
    \ 10))\ncmap = sns.diverging_palette(250, 20, as_cmap=True)\nsns.heatmap(corr,\
    \ cmap=cmap, vmax=.4, center=0,\n            square=True, linewidths=.5, annot=True)\n\
    ```\n\n假设我们对四分之一英里时间（`qsec`）最有意义的变量感到好奇。在*图 4.20*中，通过查看 `qsec` 这一行，我们可以看到 `vs`（V\
    \ 型）呈 0.74 的正相关。由于这是一个二元变量，我们可以根据此数据集假设直列发动机比 V 型发动机更快。然而，还有其他具有显著相关性的协变量。例如，马力与速度的相关性几乎与发动机形状一样强，即马力越高，四分之一英里运行时间越短：\n\
    \n## 参数检验\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_142_0.png)\n\n相关矩阵对于一次探索多个变量之间的关系非常有用。它也是在构建统计和**机器学习（ML）**模型（如线性回归）时进行特征选择的有用工具。\n\
    \n## 功效分析示例\n\n功效分析是一种统计方法，用于确定假设检验为防止*第二类*错误（即在应该拒绝原假设时未能拒绝原假设）所需的适当样本量。功效分析也可用于根据样本量确定可检测的效应量（或差异）。换句话说，基于特定的样本量和分布，功效分析可以为分析人员提供一个特定的最小差异，研究人员可能能够通过给定的检验可靠地识别该差异。在本节中，我们将使用单样本\
    \ t 检验来演示功效分析。\n\n### 单样本 t 检验\n\n假设一家制造商销售一种机器，每月可生产 100,000 个单位，标准差为 2,800 个单位。一家公司购买了多台这样的机器，发现它们只能生产\
    \ 90,000 个单位。该公司想知道需要多少台机器才能以高度的信心确定这些机器无法生产 100,000 个单位。以下功效分析表明，对于 t 检验，需要三个机器的样本，以\
    \ 85% 的概率防止在实际与宣传的机器性能存在统计学显著差异时未能识别出来：\n\n```python\nfrom statsmodels.stats.power\
    \ import TTestPower\nimport numpy as np\n# 分布均值与待评估值之差除以分布标准差\neffect_size = abs(100000-90000)\
    \ / 2800\npowersTT = TTestPower()\nresult = powersTT.solve_power(effect_size,\
    \ nobs=3, alpha=0.05,\nalternative='two-sided')\nprint('Power based on sample\
    \ size:{}'.format(round(result,2)))\n# Power based on sample size: 0.85\n```\n\
    \n### 其他功效分析示例\n\n要查看 Python 中功效分析的更多示例，请参阅本书的 GitHub 仓库。那里有额外的 t 检验和 F 检验的示例，这些检验侧重于分析样本组之间的方差。\n\
    \n## 总结\n\n本章涵盖了参数检验的主题。从参数检验的假设开始，我们识别并应用了检验这些假设是否被违反的方法，并讨论了在所需假设不满足时可以假设稳健性的情景。然后，我们研究了\
    \ z 检验最受欢迎的替代方法之一——t 检验。我们迭代了该检验的多种应用，涵盖了使用合并、配对和 Welch 非合并版本的两样本分析的单样本和两样本版本。接下来，我们探讨了方差分析（ANOVA）技术，其中我们研究了使用来自多个组的数据来识别它们之间统计学显著差异的方法。这包括当存在大量组时对\
    \ p 值最受欢迎的调整之一——Bonferroni 校正，它有助于防止在执行多重检验时膨胀第一类错误。然后，我们研究了使用皮尔逊相关系数对连续数据进行相关性分析，以及如何使用相关矩阵和附带的热图可视化相关性。最后，我们简要概述了功效分析，并给出了使用单样本\
    \ t 检验执行此分析的示例。在下一章中，我们将讨论非参数假设检验，包括除了与本章参数检验配对的检验之外的新检验，用于无法安全假设假设的情况。\n\n##\
    \ 参考文献\n\n[1] *Dua, D. and Graff, C. (2019). UCI Machine Learning Repository [http://archive.ics.uci.edu/ml].\
    \ Irvine, CA: University of California, School of Information and Computer Science.*"

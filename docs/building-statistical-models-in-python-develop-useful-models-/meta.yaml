  md: 'The null distribution from the permutation test and the observed difference
    in the mean of the two groups is shown in *Figure 5.2*. The p-value from the permutation
    test is 0.036. The permutation test is the first of several non-parametric tests
    that will be covered in this section. Again, these types of tests are useful when
    the assumptions for parametric tests are not met. *However, if a parametric test
    can be used, it should be used*; non-parametric tests should not be used as default
    methods.


    In this section, we introduced non-parametric tests with permutation tests. The
    permutation test is a widely applicable non-parametric test, but the computations
    for permutations grow quickly with the size of the dataset, which may make its
    use impractical in some situations. In the following sections, we will cover several
    other non-parametric tests that do not require computing a null distribution.


    # The Rank-Sum test


    When the assumptions of the t-test are not met, the Rank-Sum test is often a good
    non-parametric alternative test. While the t-test can be used to test for the
    *difference between the means of two distributions*, the Rank-Sum test is used
    to test for the *difference between the locations of two distributions*. This
    difference in the test utility is due to the lack of parametric assumptions in
    the Rank-Sum test. The null hypothesis of the Rank-Sum test is that the distribution
    underlying the first sample is the same as the second sample. If the sample distributions
    appear to be similar, this allows us to use the Rank-Sum test to test for the
    difference in the locations of the two samples. As stated, the Rank-Sum test cannot
    specifically be used for testing the difference between means because it does
    not require assumptions about the sample distributions.


    # The test statistic procedure


    The test procedure is straightforward. The process is outlined here and an example
    is shown in the following table:


    +   1. Combine all sample values into one set and sort the samples in ascending
    order, keeping track of their labels.

    2. Assign ranks to all samples starting with rank 1 for the lowest sample value.

    3. Where ties occur, replace the rank of the tied values with the mean rank of
    the tied values.

    4. Sum the ranks for the smallest sample group, which is the test statistic *T*.


    Once the test statistic is calculated, the p-value can be calculated. The p-value
    can be done with a normal approximation or with an exact method. Generally, the
    exact method is only used when the sample size is small (less than 8 samples).'
  merge: -1
  pgno: 148
- img_proc: true
  md: '# Normal approximation


    Once the $T$ statistic is calculated for the Rank-Sum test, we can determine a
    p-value with an exact method or with a normal approximation. We will cover the
    approximation method here as the exact method requires a permutation test, which
    will require the use of software. We approximate the p-value with a z-score (recall
    the z-score from *Chapter 3, Hypothesis Testing*):


    $$Z = \frac{T - \text{Mean}(T)}{\text{STDEV}(T)}$$


    where


    $$\text{Mean}(T) = n_T \bar{R}$$


    and


    $$\text{STDEV}(T) = s_R \sqrt{\frac{n_T n_O}{n_T + n_O}}$$


    In the equations here, $n_T$ is the number of samples in the group used to calculate
    $T$, $n_O$ is the number of samples in the other group, $\bar{R}$ is the mean
    of the corrected ranks, and $s_R$ is the standard deviation of the corrected ranks.
    Once $Z$ is calculated, the corresponding p-value can be looked up for the z-distribution.
    Having described the method, let''s look at an example. The data shown in the
    following table can be found in the accompanying Jupyter notebook.


    # Rank-Sum example



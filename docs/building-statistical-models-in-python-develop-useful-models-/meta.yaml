    # The Central Limit Theorem


    When sampling data, it is common to encounter the issue of non-normal data. This
    may be for multiple reasons, such as the population not having a normal distribution
    or the sample being misrepresentative of the population. The Central Limit Theorem,
    which is important in statistical inference, postulates that if random samples
    of *n* observations are taken from a population that has a specific mean, μ, and
    **standard deviation, σ**, the sampling distribution constructed from the means
    of the randomly selected sub-sample distributions will approximate a normal distribution
    having roughly the same mean, μ, and standard deviation, calculated as $\sqrt{\frac{\sum(x_i
    - \mu)^2}{N}}$, as the population. The next section will use bootstrapping to
    demonstrate the Central Limit Theorem in action. A later section discussing transformations
    will provide techniques for reshaping data distributions that do not conform to
    normal distributions so that tools requiring normal distributions can still be
    effectively applied.


    # Bootstrapping


    Bootstrapping is a method of resampling that uses random sampling – typically
    with replacement – to generate statistical estimates about a population by resampling
    from subsets of the sampled distribution, such as the following:


    +   - Confidence intervals

    - Standard error

    - Correlation coefficients (Pearson’s correlation)


    The idea is that repeatedly sampling different random subsets of a sample distribution
    and taking the average each time, given enough repeats, will begin to approximate
    the true population using each subsample’s average. This follows directly the
    concept of the Central Limit Theorem, which to be restated, asserts that sampling
    means begins to approximate normal sampling distributions, centered around the
    original distribution’s mean, as sample sizes and counts increase. Bootstrapping
    is useful when a limited quantity of samples exists in a distribution relative
    to the amount needed for a specific test, but inference is needed.


    As discussed in *Chapter 1, Sampling and Generalization*, constraints such as
    time and expense are common reasons for obtaining samples rather than populations.
    Because the underlying concept of bootstrapping is to make assumptions about the
    population using samples, it is not beneficial to apply this technique to populations
    as the true statistical parameters – such as the percentiles and variance – of
    a population are known. Regarding sample preparation, the balance of attributes
    in the sample should represent the true approximation of the population. Otherwise,
    the results will likely be misleading. For example, if the population of species
    within a zoo is a split of 40% reptiles and 60% mammals and we want to bootstrap
    their longevity to identify the confidence intervals for their lifespans, it would
    be necessary to ensure the dataset to which bootstrapping was applied contained
    a split of 40% reptiles and 60% mammals; a split of 15% reptiles and 85% mammals,
    for example, would lead to misleading results. In other words, the sample stratification
    should be balanced in proportion to the population.'
- md: "## Confidence intervals\n\nAs mentioned before, one useful application of bootstrapping\
    \ is to create confidence intervals around sparsely defined or limited datasets\
    \ – that is to say, datasets with a wide range of values without many samples.\
    \ Consider an example of bootstrapping to perform a hypothesis test using a 95%\
    \ confidence interval using the \"Duncan\" dataset in `statsmodels`, which contains\
    \ incomes by profession, type, education, and prestige. While this is the full\
    \ dataset, consider this dataset a sample since the sampling method is not mentioned\
    \ and it is not likely to consider all incomes for all workers of every profession\
    \ and type. To obtain the dataset, we first load the `matplotlib`, `statsmodels`,\
    \ `pandas`, and `numpy` libraries. We then download the dataset and store it as\
    \ a `pandas` DataFrame in the `df_duncan` variable. Following this, we recode\
    \ the \"prof\", \"wc\", and \"bc\" types as \"professional\", \"white-collar\"\
    , and \"blue collar\", respectively. Finally, we create two separate `pandas`\
    \ DataFrames; one for professional job types and another for blue-collar job types,\
    \ as these are the two subsets we will analyze using bootstrapping:\n\n```python\n\
    import matplotlib.pyplot as plt, statsmodels.api as sm, pandas as pd,\n    numpy\
    \ as np, scipy.stats\ndf_duncan = sm.datasets.get_rdataset(\"Duncan\",\n    \"\
    carData\").data\ndf_duncan.loc[df_duncan['type'] == 'prof',\n    'type'] = 'professional'\n\
    df_duncan.loc[df_duncan['type'] == 'wc',\n    'type'] = 'white-collar'\ndf_duncan.loc[df_duncan['type']\
    \ == 'bc',\n    'type'] = 'blue-collar'\ndf_professional = df_duncan.loc[(df_duncan['type']\
    \ == 'professional')]\ndf_blue_collar = df_duncan.loc[(df_duncan['type'] == 'blue-collar')]\n\
    ```\n\n| | Type | Income | Education | Prestige |\n|---|---|---|---|---|\n| accountant\
    \ | professional | 62 | 86 | 82 |\n| pilot | professional | 72 | 76 | 83 |\n|\
    \ architect | professional | 75 | 92 | 90 |\n| author | professional | 55 | 90\
    \ | 76 |\n| chemist | professional | 64 | 86 | 90 |\n\nFigure 2.17 – Table displaying\
    \ the first five rows of the statsmodels Duncan data\n\nWe then build a set of\
    \ plotting functions, as seen next. In `plot_distributions()`, we denote p=5,\
    \ meaning the p-value will be significant at a significance level of 0.05 (1.00\
    \ - 0.05 = 0.95, hence, 95% confidence). We then divide this value by 2 since\
    \ this will be a two-sided test, meaning we want to know the full interval rather\
    \ than just one bound (discussed in *Chapter 1* as a representative test statistic).\
    \ Regarding the plots, we visualize the data using histograms (the `hist()` function)\
    \ in matplotlib and then plot the 95% sampling confidence intervals using the\
    \ `axvline()` functions, which we build using the numpy function `percentile()`.\n\
    \n> **Percentile in Bootstrapping**\n> When applied to the original data, the\
    \ percentile is only that, but when applied to the bootstrapped sampling distribution,\
    \ it is the confidence interval.\n\nTo state the confidence interval simply, a\
    \ 95% confidence interval means that for every 100 sample means taken, 95 of them\
    \ will fall within this interval. In the numpy `percentile()` function, we use\
    \ p=5 to support that 1-p is the confidence level, where *p* is the level of significance\
    \ (think *p-value*, where any value at or lower than *p* is significant). Since\
    \ the test is two-tailed, we divide *p* by 2 and split 2.5 in the left tail and\
    \ 2.5 in the right since we have a symmetrical, standard normal distribution.\
    \ The `subplot(2, 1, ...)` code creates two rows and one column. Axis 0 of the\
    \ figure is used for professional incomes and axis 1 is used for blue-collar incomes:\n\
    \n```python\ndef plot_distributions(n_replicas, professional_sample, blue_collar_sample,\

    - pandas 1.4.3


    本书代码中使用的包如 *图 1.1* 所示。`__version__` 方法可用于在代码中打印包版本。


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_25_0.png)


    在为本书设置好技术环境后，让我们开始讨论统计学。在接下来的章节中，我们将讨论总体和抽样的概念。我们将通过代码实现来演示抽样策略。


    ## 总体与样本


    通常，统计建模的目标是通过对一个群体进行推断来回答关于该群体的问题。我们进行推断的群体可以是生产工厂中的机器、选举中投票的人，或不同地块上的植物。整个群体，每一个个体项目或实体，被称为
    **总体**。在大多数情况下，感兴趣的总体规模如此之大，以至于收集总体中每个实体的数据是不切实际甚至不可能的。例如，以投票为例，可能无法对选举中投票的每个人进行民意调查。即使有可能联系到所有相关选举的选民，许多选民也可能不同意接受调查，这将阻碍对整个总体的数据收集。另一个考虑因素是调查如此庞大群体的费用。这些因素使得在我们的投票调查示例中收集总体统计数据实际上是不可能的。在许多我们可能想要评估总体属性的情况下，都存在这类限制性因素。幸运的是，我们不需要收集整个感兴趣总体的数据。可以使用总体的一个子集对总体进行推断。这个总体的子集称为
    **样本**。这是统计建模的主要思想。将使用样本创建一个模型，并对总体进行推断。


    为了使用样本对感兴趣的总体进行有效推断，样本必须 *代表* 感兴趣的总体，这意味着样本应包含总体中存在的变异。例如，如果我们有兴趣对田地中的植物进行推断，仅从田地一角取样可能不足以对更大的总体进行推断。整个田地的植物特征可能存在变异。我们可以想到各种可能导致变异的原因。对于这个例子，我们将参考
    *图 1.2* 中的一些示例。


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_27_0.png)


    图 1.2 – 植物田地


    该图显示 **样本 A** 靠近森林。该样本区域可能受到森林存在的影响；例如，该样本中的一些植物可能比其他样本中的植物接收到更少的阳光。**样本 B** 显示位于主要灌溉线之间。可以想象，该样本平均比其他两个样本接收更多的水，这可能对该样本中的植物产生影响。最后的
    **样本 C** 靠近道路。该样本可能受到 **样本 A** 或 **B** 中未见的其他影响。


    如果仅从其中一个区域取样，这些样本的推断将是 *有偏的*，并且无法提供关于总体的有效参考。因此，需要从整个田地取样，以创建一个更可能代表植物总体的样本。从总体中取样时，确保抽样方法对可能的问题具有稳健性至关重要，例如前例中的灌溉和遮荫影响。每当从总体中取样时，识别和减轻可能的偏差影响非常重要，因为数据中的偏差会影响您的模型并扭曲您的结论。


    在下一节中，将讨论从数据集中抽样的各种方法。另一个考虑因素是样本量。样本量影响我们可以使用的统计工具类型、可以对样本做出的分布假设以及推断和预测的置信度。样本量的影响将在
    *第 2 章，数据分布* 和 *第 3 章，假设检验* 中深入探讨。


    ## 从样本推断总体


    当使用统计模型从总体的样本子集对总体进行推断性结论时，研究设计必须考虑其变量中与总体中相似的不确定性程度。这就是本章前面提到的变异。为了恰当地对总体得出推断性结论，任何统计模型都必须围绕一个随机机制构建。围绕这些随机机制构建的研究称为
    **随机实验**，它们提供了对相关性和因果关系的理解。


    ## 随机实验


    随机实验有两个主要特征：


    - 随机抽样，通俗地称为随机选择

    - 处理的随机分配，这是研究的本质


    ### 随机抽样


    随机抽样（也称为随机选择）旨在创建一个代表整体总体的样本，以便统计模型能够很好地泛化总体，从而分配因果结果。为了使随机抽样成功，感兴趣的总体必须明确定义。从总体中抽取的所有样本都必须有被选中的机会。以选民民意调查为例，所有选民都必须愿意接受调查。一旦所有选民都进入抽签，就可以使用随机抽样来为建模选择选民子集。仅从愿意接受调查的选民中抽样会在统计建模中引入抽样偏差，从而导致结果扭曲。在只有部分选民愿意参与的情况下，抽样方法称为
    **自选择**。从自选择样本或任何非随机样本中获得和建模的任何信息都不能用于推断。


    ### 处理的随机分配


    处理的随机分配涉及两个动机：


    - 第一个动机是了解特定输入变量及其对响应的影响——例如，了解将处理 A 分配给特定个体是否比安慰剂产生更有利的结果。'

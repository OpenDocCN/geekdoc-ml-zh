  - "[PAGE 155]\n\n# Chi-square goodness-of-fit\n\nThe **chi-square goodness-of-fit\
    \ test** compares the count of occurrences of multiple factor levels for a single\
    \ variable (factor) to determine whether the levels are statistically equal. For\
    \ example, a vendor offers three models of phones – three levels (brands) of the\
    \ single factor (phone) – to customers, who purchase in total an average of 90\
    \ phones per week. We can say the expected frequency is 1/3 – so, 30 phones of\
    \ each model are sold per week, on average. Pearson's chi-square test statistic,\
    \ which is calculated by measuring the observed frequencies against expected frequencies,\
    \ is the test statistic used for the chi-square goodness-of-fit test. The linear\
    \ equation for this test statistic is as follows:\n\n$$\\chi^2 = \\sum \\frac{(O_i\
    \ - E_i)^2}{E_i}, \\text{degrees of freedom} = k-1$$\n\nWhere $O_i$ is the observed\
    \ frequency, $E_i$ is the expected frequency, and $k$ is the number of factor\
    \ levels. Using our phone example, we learn from the vendor the expected frequency\
    \ of 1/3 is not actually what is observed; the vendor sells an average of 45,\
    \ 30, and 15 phones of models A, B, and C, respectively. Suppose we want to know\
    \ whether this observed frequency differs with statistical significance from the\
    \ expected frequency. The null hypothesis is that the frequencies are equal. We\
    \ formulate the **Pearson's chi-square test statistic** as follows:\n\n$$\\chi^2\
    \ = \\frac{(45 - 30)^2}{30} + \\frac{(30 - 30)^2}{30} + \\frac{(15 - 30)^2}{30}\
    \ = 15$$\n\nSuppose we want to use a hypothesis test (right-tailed) with a 0.05\
    \ level of significance, thus forming the alternative hypothesis that the observed\
    \ and expected frequencies are not equal. The chi-square critical value table\
    \ shows that for a level of significance of 0.05 with $df: 3 - 1 = 2$ degrees\
    \ of freedom, the critical value is 5.9915. Because $15 > 5.9915$, we may conclude\
    \ to reject the null hypothesis based on the critical value test.\n\nTo perform\
    \ this operation in Python, we can use the `statsmodels.stats.gof` module's `chisquare`\
    \ function. Each group volume needs to be passed into a list or array, both for\
    \ the observed frequencies and the expected frequencies. The `statsmodels` `chisquare`\
    \ test will automatically calculate the k-1 degrees of freedom based on the counts\
    \ of values in the observed (`f_obs`) list, but the degrees of freedom must be\
    \ provided for the `scipy` `chi2.ppf` function, which provides the critical value,\
    \ bypassing the need for a manual table lookup:\n\n```\nfrom statsmodels.stats.gof\
    \ import chisquare\nfrom scipy.stats import chi2\n\nchi_square_stat, p_value =\
    \ chisquare(f_obs=[45, 30, 15],\n                                    f_exp=[30,\
    \ 30, 30])\nchi_square_critical_value = chi2.ppf(1-.05, df=2)\nprint('Chi-Square\
    \ Test Statistic: %.4f'%chi_square_stat)\nprint('Chi-Square Critical Value: %.4f'%chi_square_critical_value)\n\
    print('P-Value: %.4f'%p_value)\n```"

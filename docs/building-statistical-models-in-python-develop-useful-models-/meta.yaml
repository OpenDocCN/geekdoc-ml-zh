    # Validating models


    # The Durbin-Watson test


    It is important to acknowledge that based on the fact that data was observed over
    a 50-year period and random sampling was not performed, it is possible the residuals
    will have a **serial correlation**. We observe a possibility of serial correlation
    in the **Durbin-Watson test** statistic of 0.095, which suggests the residuals
    exhibit positive autocorrelation. The Durbin-Watson statistic tests whether there
    is autocorrelation at the first time lag. This means the Durbin-Watson tests whether
    the change in values between each data point is correlated with the value of the
    previous data point. If that correlation exists, it is considered **lag-one autocorrelation**.


    Durbin-Watson test statistic

    As a rule of thumb, a Durbin-Watson test statistic below roughly 2.0 (many consider
    1.5 to 2.0 to be reasonable) is considered a flag for positive autocorrelation,
    while a value above roughly 2.0 (many consider 2.0 to 2.5 to be reasonable) indicates
    possible negative autocorrelation. Procedurally, a table lookup is required to
    identify the critical values against which the test statistic should be measured.
    The process follows the same steps for any hypothesis test with respect to comparing
    the test statistic against the critical value. The Durbin-Watson test is typically
    interpreted as a one-tailed test as inference from a two-tailed test is not particularly
    useful. A version of the Durbin-Watson table can be found at https://www.real-statistics.com/statistics-tables/durbin-watson-table/.
    This table produces the critical values for **positive autocorrelation**. To find
    the critical values for **negative autocorrelation**, the positive critical values
    can be subtracted from 4.'

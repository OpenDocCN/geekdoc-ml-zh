  - "[PAGE 207]\n\nIn other words, take the differences between the response values\
    \ and the predicted response values, square the differences, and finally take\
    \ the mean of the squared differences. A small extension of this metric commonly\
    \ used is the **root mean squared error (RMSE)**, which is simply the square root\
    \ of the MSE. The RMSE is used when it is desirable for the metric to have the\
    \ same units as the response variable.\n\n# MAPE\n\nThe MAPE is given by the following\
    \ formula, where $N$ is the number of samples, $y$ is the response variable, and\
    \ $\\hat{y}$ is the predicted value of the response variable:\n\n$$MAPE = \\frac{100\\\
    %}{N} \\sum_{i=1}^{N} \\left| \\frac{y_i - \\hat{y}_i}{y_i} \\right|$$\n\nThis\
    \ formula is like the formula for the MSE, but instead of taking the mean of the\
    \ squared error, we take the mean of the percent error. This makes the MAPE easier\
    \ to interpret than the MSE, which is a distinct advantage over the MSE.\n\nNow\
    \ that we have discussed model validation and metrics, let's put these concepts\
    \ together to perform feature selection using model performance as an indicator.\n\
    \n# Recursive feature elimination\n\n**Recursive feature elimination (RFE)** is\
    \ a method for selecting an optimal number of features in a model using a metric.\
    \ Much like the backward selection method mentioned previously, the RFE algorithm\
    \ starts with all features in the model, then removes features with the least\
    \ influence on the model. At each step, cross-validation is performed. When RFE\
    \ is completed, we will be able to see the cross-validation performance of the\
    \ model over the various sets of features.\n\nIn this example, we use the linear\
    \ regression implementation and RFE implementation from scikit-learn (sklearn),\
    \ which is a primary package used for machine learning in the Python ecosystem.\
    \ In the following code example, we set up RFE to use the MAPE as the scoring\
    \ metric (make_scorer(mape, greater_is_better=False)), remove one feature at each\
    \ step (step=1), and indicate with cv=2 that it should score the model using two\
    \ cross-validation sets:\n\n```\nlinear_model = LinearRegression()\nlinear_model.fit(X,\
    \ y)\nrfecv = RFECV(\n    estimator=linear_model,\n    step=1,\n    cv=2,\n  \
    \  scoring=make_scorer(mape, greater_is_better=False),\n    min_features_to_select=1\n\
    )\nrfecv.fit(X,y)\n```"
  - '[PAGE 208]


    Once we fit the RFE object, we can look at the results to see how to model scored
    over the various sets of features. The performance of the model using the MAPE
    is shown in *Figure 7.8*.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_208_0.png)


    It’s clear that including all features produces the best-performing model but
    including all 10 features only provides a small increase over the performance
    of just five features. While the best-performing model contains all 10 features,
    we would still need to consider model assumptions and verify that the model is
    well fit.


    In this section, we have looked at several methods for feature selection, including
    statistical methods and performance-based methods. We also discussed metrics and
    how to compare models, including the reason for splitting the data into training
    and validation sets. In the next section, we will look at linear regression shrinkage
    methods. These types of models use a method called regularization, which in some
    ways acts like model-based feature selection.


    # Shrinkage methods


    The **bias-variance trade-off** is a decision point all statistics and machine
    learning practitioners must balance when performing modeling. Too much of either
    renders results useless. To catch these when they become issues, we look at test
    results and the residuals. For example, assuming a useful set of features and
    the appropriate model have been selected, a model that performs well on validation,
    but poorly on a test set could be indicative of too much variance and conversely,
    a model that fails to perform well at all could have too much bias. In either
    case, both models fail to generalize well. However, while bias in a model can
    be identified in poor model performance from the start, high variance can be notoriously
    deceptive as it has the potential to perform very well during training and even
    during validation, depending on the data. High-variance models frequently use
    values of'
  - '[PAGE 209]


    coefficients that are unnecessarily high when very similar results can be obtained
    from coefficients that are not. Further, in using coefficients that are not unnecessarily
    high, the model is more likely to be in bias-variance equilibrium, which provides
    it a better chance of generalizing well on future data. Additionally, more reliable
    insights into the influence of current factors on a given target are provided
    when model coefficients are not exaggerated, which aids in more useful descriptive
    analysis. This brings us to the concept of shrinkage.


    **Shrinkage** is a method that reduces model variance by shrinking model parameter
    coefficients toward zero. The coefficients are derived by applying least squares
    regression to all variables considered for a model. The amount of shrinkage is
    based on the parameters'' contribution to least squares estimates; parameters
    that contribute to a high level of squared error will have their coefficients
    pushed toward zero or zeroed out altogether. In this case, shrinkage can be used
    for variable elimination. Variables that do not contribute to high squared error
    across the model fit will have a minimal reduction in coefficient value, thus
    being useful for model fitting, assuming the practical purpose of their inclusion
    is vetted. The reason shrinkage – also called **regularization** – is important
    is because it helps models include useful variables while preventing them from
    introducing too much variance and thus overfitting. Preventing excess variance
    is particularly useful for ensuring that models generalize well over time. Let''s
    look at some of the most common shrinkage techniques, **ridge regression** and
    **Least Absolute Shrinkage and Selection Operator (LASSO) Regression**.


    # Ridge regression


    Recall the formulation for the **residual sum of squared errors (RSS)** for multiple
    linear regression using least squares regression is as follows:


    $$RSS = \sum_{i=1}^{n} \left( y_i - \widehat{\beta}_0 - \sum_{j=1}^{p} \widehat{\beta}_j
    x_{ij} \right)^2$$


    where $n$ is the number of samples and $p$ is the number of parameters. Ridge
    regression adds a scalar, $\lambda$, called a **tuning parameter** – which must
    be greater than or equal to 0 – that gets multiplied by the model parameter coefficient
    estimates, $\widehat{\beta}_j^2$, to create a **shrinkage penalty**. This gets
    added back to the RSS equation such that the new least squares regression''s fitting
    procedure is now defined as follows:


    $$RSS + \lambda \sum_{j=1}^{p} \widehat{\beta}_j^2$$


    When $\lambda=0$, the respective ridge regression **penalty term** is 0. However,
    as $\lambda \longrightarrow \infty$, the model coefficients shrink toward zero.
    The new fitting procedure can be rewritten as follows:


    $$\|y - X\beta\|_2^2 + \lambda \|\beta\|_2^2$$'
  - '[PAGE 210]


    where RSS = $\|y - X\beta\|_2^2$, $\|\beta\|_2^2$ is the squared $L^2$ **norm**
    (Euclidean norm) of the regression coefficients array, and $X$ is the design matrix.
    Further simplification brings this to the following:


    $$\|y - X\beta\|_2^2 + \lambda \beta^T \beta$$


    which can be rewritten in the closed form by using the tuning parameter''s scalar
    multiple of the identity matrix to derive the **ridge regression coefficient estimates**,
    $\hat{\beta}^R$, as follows:


    $$\hat{\beta}^R = (X^T X + \lambda I)^{-1} X^T y$$


    Simply stated, the ridge regression coefficient estimates are the set of coefficients
    that minimizes the least squares regression output as follows:


    $$\hat{\beta}^R = argmin \left\{ \sum_{i=1}^n \left( y_i - \hat{\beta}_0 - \sum_{j=1}^p
    \hat{\beta}_j x_{ij} \right)^2 + \lambda \sum_{j=1}^p \hat{\beta}_j^2 \right\}$$


    > **Standardizing coefficients prior to applying ridge regression**

    Because ridge regression seeks to minimize the error for the entire dataset and
    the tuning parameter for doing so is applied within the $L^2$-norm normalization
    process of taking the root of summed squared terms, it is important to apply a
    standard scaler to each variable in the model so that all variables are on the
    same scale, prior to applying ridge regression. If this is not performed, ridge
    regression will almost certainly fail to be useful for helping the model generalize
    across datasets.


    In summary, ridge regression reduces variance in a model by using the $L^2$ **penalty**,
    which penalizes the sum of squared coefficients. However, it is important to note
    the $L^2$ **norm**, and consequently, ridge regression, **will never produce a
    zero-valued coefficient**. Therefore, ridge regression is an excellent tool for
    reducing variance when the analyst seeks to use all terms in the model. However,
    ridge regression cannot be used for variable elimination. For variable elimination,
    we can use the LASSO regression shrinkage method, which uses the $L^1$ **penalty**
    to regularize coefficients with the $L^1$ **norm**, which uses the absolute value
    to shrink values to and including zero.


    Let''s walk through an example of a ridge regression implementation in Python.


    First, let''s load the Boston home prices dataset from `scikit-learn`. In the

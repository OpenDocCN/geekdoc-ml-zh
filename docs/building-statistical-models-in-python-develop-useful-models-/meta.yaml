- img_proc: true
  md: 'We can make two observations from the simulations shown in *Figure 11.18*.
    The first observation is that the time series appear to exhibit more wandering
    behavior as the root increases toward one. For instance, the middle-time series
    shows more wandering from the mean than the top-time series. The bottom time series
    (with a root of one), does not appear to regress toward a mean such as the other
    two simulations. The second observation is about the autocorrelations. As the
    root of the AR(1) approaches 1, the autocorrelations get stronger and decrease
    slower over the lags. These two observations are characteristic of a series with
    a root near or at one. Additionally, the presence of unit roots will dominate
    the time series behavior, making it easy to recognize from the autocorrelation
    plot.


    # Fitting an ARIMA model


    There are two steps to fit an ARIMA model: (1) stationarize the series from differencing
    to determine the difference order and (2) fit an ARMA model to the resulting series.
    In the previous section, we discussed how to fit an ARMA model so in this section,
    we will focus on the first step.


    At the beginning of this section, we showed a time series of US GDP values. We
    will use that time series as a case study for fitting an ARIMA model. First, let''s
    take a look at the series and its autocorrelations again. The series and autocorrelations
    are shown in *Figure 11.19*.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_319_0.png)


    Figure 11.19 – US GDP time series and autocorrelations'
  merge: -1
  pgno: 319
- img_proc: true
  md: 'From the plots shown in *Figure 11.19*, it appears that the time series of
    US GPD data is non-stationary time series. The time series exhibits wandering
    behavior, and the autocorrelations are strong and decrease slowly. As we discussed,
    this is characteristic behavior of unit roots. For secondary evidence, we can
    use the Dickey-Fuller test for unit root. The null hypothesis of the Dickey-Fuller
    test is that a unit root is present in the time series. The following code shows
    how to use the Dickey-Fuller test from pmdarima. The test returns a p-value of
    0.74 indicating we cannot reject the null hypothesis, meaning that the time series
    should be differenced:


    ```

    Import pmdarima as pm

    from sktime import datasets

    y_macro_economic = datasets.load_macroeconomic()

    adf_test = pm.arima.ADFTest()

    adf_test.should_diff(y_macro_economic.realgdp.values)

    # (0.7423236714537164, True)

    ```


    We can take the first difference of time series using the diff function from numpy:


    ```

    first_diff = np.diff(y_macro_economic.realgdp.values, n=1)

    ```


    Taking the first difference, we arrive at a new time series as shown in *Figure
    11.20*:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_320_0.png)'

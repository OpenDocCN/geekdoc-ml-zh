    shifted `realinv` variable when using one variable to forecast the values of the
    other.


    # The white-noise model


    Any time series can be considered to process two fundamental elements: signal
    and noise. We can present this mathematically as follows:


    $y(t) = signal(t) + noise(t)$


    The signal is some predictable pattern that we can model with a mathematical function.
    But the noise element in a time series is unpredictable and so cannot be modeled.
    Thinking of a time series this way leads to two consequential points:


    +   1. Before attempting to model, we should verify that the time series *is not
    consistent* with noise.

    2. Once we have fit a model to a time series, we should verify that the residuals
    *are consistent* with noise.


    Regarding the first point, if a time series is consistent with noise, there is
    no predictable pattern to model, and attempting to model the time series could
    lead to misleading results. About the second point, if the residuals of a time-series
    model are not consistent with noise, then there are additional patterns we can
    further model, and the current model is not sufficient to explain the patterns
    in the signal. Of course, to make these assessments, we first need to understand
    what noise is. In this section, we will discuss the **white-noise model**.'
- md: "White noise is a time series where the samples are independent and have a fixed\
    \ variance with a mean of zero. This means that each sample of the time series\
    \ is random. So, how do we assess whether a series is random? Let's work through\
    \ an example. Take a look at the series in *Figure 10.10*. Do you think this series\
    \ is random or a signal?\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_284_0.png)\n\
    \nThe time series in *Figure 10.10* is a random series generated with numpy. This\
    \ is not clear from just observing the time series. Let's take a look at how to\
    \ determine whether a series is noise.\n\nAs mentioned previously, the samples\
    \ in a time series are independent. This means that the sample should not be autocorrelated.\
    \ We can check the autocorrelation of this series with an ACF plot. The results\
    \ are shown in *Figure 10.11*:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_284_1.png)\n\
    \nThe ACF plot shows that the series does not appear to exhibit autocorrelation.\
    \ This is a strong indication that the time series does not have a pattern to\
    \ model and may just be noise.\n\nAnother assessment we have is the Ljung-Box\
    \ test for autocorrelation. This is a statistical test for autocorrelation in\
    \ the lags of a time series. The null hypothesis is there is no autocorrelation,\
    \ and the alternative hypothesis is there is a correlation. Since autocorrelation\
    \ can appear at any lag of the time series, the Ljung-Box test provides a p-value\
    \ for the autocorrelation at each lag. Performing the test on this series, we\
    \ get the following p-values for the first 10 lags: [0.41, 0.12, 0.21, 0.31, 0.44,\
    \ 0.53, 0.5, 0.57, 0.26, 0.2]. Each of these values is large, which indicates\
    \ this series is likely noise.\n\nBoth methods discussed previously indicate that\
    \ the series shown is noise, which is the correct result (we know this series\
    \ is randomly generated). As we progress with modeling time series, we will use\
    \ these methods to determine whether a series is noise as part of model assessment.\
    \ We will close this chapter with a discussion on the concept of time series stationarity.\n\
    \n## Stationarity\n\nIn this section, we provide an overview of stationary and\
    \ non-stationary time series. Broadly speaking, the main difference between these\
    \ two types of time series is the statistical properties such as mean, variance,\
    \ and autocorrelation. They do not vary across time in stationary time series\
    \ but do change through time in non-stationary time series. Particularly, time\
    \ series with a trend or seasonality is non-stationary because the trend or seasonality\
    \ will affect the statistical properties. The following examples illustrate the\
    \ behaviors of stationary versus non-stationary time series [1]:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_285_0.png)\n\
    \nFigure 10.12 – Examples of stationary and non-stationary time series\n\nIn order\
    \ to check the stationary properties, we will check the three following conditions:\n\
    \n- The mean is independent of time:\n  $$E[X_t] = \\mu \\text{ for all } t$$\n\
    - The variance is independent of time:\n  $$Var[X_t] = \\sigma^2 \\text{ for all\
    \ } t$$\n- No autocorrelation with time—the correlation between $X_{t_1}$ and\
    \ $X_{t_2}$ only depends on how far apart they are on time, $t_2 - t_1$\n\nWe\
    \ will now explore the analysis in Python using the *Air Passengers* dataset (https://www.kaggle.com/datasets/chirag19/air-passengers)\
    \ providing monthly totals of US airline passengers from 1949 to 1960 that can\
    \ be downloaded from Kaggle or can be found in GitHub repository of the book (https://github.com/PacktPublishing/Building-Statistical-Models-in-Python/blob/main/chapter_10/airline-passengers.csv).\
    \ First, we import the data to a Python notebook, change the index type to datetime,\
    \ and plot the dataset:\n\n```python\nimport pandas as pd\nimport matplotlib.pyplot\
    \ as plt\ndata = pd.read_csv('airline-passengers.csv', header=0, index_col=0)\n\
    data.index = pd.to_datetime(data.index, format='%Y-%m-%d')\nplt.plot(data)\n```\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_286_0.png)\n\nFigure 10.13 – Visualization\
    \ of passengers using US airlines 1949-1960\n\nFrom the plot, we can see there\
    \ are trends and seasonal effects here. Then, it is clearly non-stationary. In\
    \ the `statsmodels` package, there is a function called `seasonal_decompose` to\
    \ help us break the original data into different plots for visualization purposes.\
    \ You can see it in action here:\n\n```python\nfrom statsmodels.tsa.seasonal import\
    \ seasonal_decompose\nseason_trend = seasonal_decompose(data)\nseason_trend.plot()\n\
    plt.show()\n```\n\nWe get the resulting plot as follows:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_287_0.png)\n\
    \nFigure 10.14 – Trend and seasonality visualization of passengers using US airlines\
    \ 1949-1960\n\nThe trend plot shows that the number of passengers using US airlines\
    \ increases over time. It appears to oscillate seasonally, with summers being\
    \ the peak. There is a level of dependency between the data points and time, and\
    \ the variances seem to be smaller earlier (fewer passengers using US airlines\
    \ in the early 1950s) and greater later (more passengers using the services in\
    \ the late 1950s). These observations show us that conditions 1 and 2 (constant\
    \ mean and constant variance with time) are violated. Looking at the non-constant\
    \ variance differently, we can create boxplots for each year from 1949 to 1960\
    \ for visualization, as follows:\n\n```python\nimport seaborn as sns\nfig, ax\
    \ = plt.subplots(figsize=(24,10))\nsns.boxplot(x=data.index.year, y=data['Passengers'],\
    \ ax=ax, color=\"cornflowerblue\")\nax.set(xlabel='Year', ylabel='Number of Passengers')\n\
    ```\n\nFor the preceding code, we get the following result:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_288_0.png)\n\
    \nFigure 10.15 – Boxplot: passengers using US airlines 1949-1960\n\nTo check autocorrelation,\
    \ we use the following code:\n\n```python\nfrom statsmodels.graphics.tsaplots\
    \ import plot_acf\nplot_acf(data, lags=20, alpha=0.05)\nplt.show()\n```\n\nWe\
    \ get the result as shown in Figure 10.16:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_289_0.png)\n\
    \nFigure 10.16 – ACF visualization of passengers using US airlines 1949-1960\n\
    \nHowever, the trend dominates the data. After removing the trend and rerunning\
    \ the code, we get the Figure 10.17 ACF plot. There appears to be a strong seasonal\
    \ component. The autocorrelation cycles are similarly repeated after some lag\
    \ counts and spaces over time steps:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_289_1.png)\n\
    \nFigure 10.17 – ACF visualization of passengers using US airlines 1949-1960\n\
    \nThe Ljung-Box test that we discussed in the *Variance* and *Autocorrelation*\
    \ sections can also be used to check autocorrelation. Using that test, we get\
    \ `lb_pvalue = 0`. Therefore, the data has autocorrelation.\n\n## Summary\n\n\
    This chapter started with an introduction to time series. We provided an overview\
    \ of what a time series is and how it can be used to meet specific goals. We also\
    \ discussed the criteria for differentiating time-series data from data that does\
    \ not depend on time. We also discussed stationarity, which factors are important\
    \ for stationarity, how to measure them, and how to resolve cases where stationarity\
    \ does not exist. From there, we were able to understand the primary functions\
    \ of ACF and PACF analysis and for making inferences about processes using variance\
    \ around the mean. Additionally, we provided an introduction to time-series modeling\
    \ with an overview of the white-noise model and the basic concepts behind autoregressive\
    \ and moving average components, which help form the basis of ARIMA and **seasonal\
    \ autoregressive integrated moving average (SARIMA)** time-series models.\n\n\
    In *Chapter 11, ARIMA Models*, we will also move deeper into the discussion of\
    \ autoregressive, moving average, and ARMA models with conceptual overviews and\
    \ step-by-step examples in Python. We also work on integrated SARIMA models, as\
    \ well as methods for the evaluation of fit for these models.\n\n## References\n\
    \n[1] André Bauer, *Automated Hybrid Time Series Forecasting: Design, Benchmarking,\
    \ and Use Cases*, University of Chicago, 2021."
  mdcn: "白噪声是一种时间序列，其样本相互独立，具有固定的方差且均值为零。这意味着时间序列的每个样本都是随机的。那么，我们如何评估一个序列是否是随机的呢？让我们通过一个例子来分析。请看*图10.10*中的序列。你认为这个序列是随机的还是信号？\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_284_0.png)\n\n*图10.10*中的时间序列是用numpy生成的随机序列。仅从观察时间序列本身并不容易看出这一点。让我们看看如何确定一个序列是否是噪声。\n\
    \n如前所述，时间序列中的样本是相互独立的。这意味着样本不应存在自相关。我们可以通过ACF图来检查该序列的自相关性。结果如*图10.11*所示：\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_284_1.png)\n\
    \nACF图显示该序列似乎没有表现出自相关性。这强烈表明该时间序列没有可建模的模式，可能只是噪声。\n\n我们还有另一种评估方法，即Ljung-Box自相关检验。这是一种用于检验时间序列滞后项自相关性的统计检验。其原假设是不存在自相关，备择假设是存在相关性。由于自相关可能出现在时间序列的任何滞后阶数，Ljung-Box检验会为每个滞后阶数提供一个p值。对该序列进行检验，我们得到前10个滞后阶数的p值如下：[0.41,\
    \ 0.12, 0.21, 0.31, 0.44, 0.53, 0.5, 0.57, 0.26, 0.2]。这些值都较大，表明该序列很可能是噪声。\n\n\
    前面讨论的两种方法都表明所示序列为噪声，这是正确的结果（我们知道该序列是随机生成的）。随着我们深入时间序列建模，我们将使用这些方法来判断一个序列是否为噪声，作为模型评估的一部分。本章最后，我们将讨论时间序列平稳性的概念。\n\
    \n## 平稳性\n\n在本节中，我们将概述平稳和非平稳时间序列。广义上讲，这两类时间序列的主要区别在于其统计特性，如均值、方差和自相关性。在平稳时间序列中，这些特性不随时间变化，而在非平稳时间序列中则会随时间变化。特别是，具有趋势或季节性的时间序列是非平稳的，因为趋势或季节性会影响其统计特性。以下示例说明了平稳与非平稳时间序列的行为[1]：\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_285_0.png)\n\n图10.12 – 平稳与非平稳时间序列示例\n\
    \n为了检验平稳性，我们将检查以下三个条件：\n\n- 均值与时间无关：\n  $$E[X_t] = \\mu \\text{ for all } t$$\n\
    - 方差与时间无关：\n  $$Var[X_t] = \\sigma^2 \\text{ for all } t$$\n- 无时间自相关——$X_{t_1}$与$X_{t_2}$之间的相关性仅取决于它们在时间上的间隔$t_2\
    \ - t_1$\n\n现在，我们将使用*Air Passengers*数据集（https://www.kaggle.com/datasets/chirag19/air-passengers）在Python中进行分析。该数据集提供了1949年至1960年美国航空公司乘客的月度总数，可从Kaggle下载，也可在本书的GitHub仓库（https://github.com/PacktPublishing/Building-Statistical-Models-in-Python/blob/main/chapter_10/airline-passengers.csv）中找到。首先，我们将数据导入Python\
    \ notebook，将索引类型更改为datetime，并绘制数据集：\n\n```python\nimport pandas as pd\nimport\
    \ matplotlib.pyplot as plt\ndata = pd.read_csv('airline-passengers.csv', header=0,\
    \ index_col=0)\ndata.index = pd.to_datetime(data.index, format='%Y-%m-%d')\nplt.plot(data)\n\
    ```\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_286_0.png)\n\n图10.13 – 1949-1960年美国航空公司乘客可视化\n\
    \n从图中我们可以看到存在趋势和季节性效应。因此，它明显是非平稳的。在`statsmodels`包中，有一个名为`seasonal_decompose`的函数，可以帮助我们将原始数据分解为不同的图进行可视化。你可以看到它的实际应用：\n\
    \n```python\nfrom statsmodels.tsa.seasonal import seasonal_decompose\nseason_trend\
    \ = seasonal_decompose(data)\nseason_trend.plot()\nplt.show()\n```\n\n我们得到如下结果图：\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_287_0.png)\n\n图10.14 – 1949-1960年美国航空公司乘客的趋势和季节性可视化\n\
    \n趋势图显示，使用美国航空公司的乘客数量随时间增加。它似乎呈现季节性波动，夏季是高峰。数据点与时间之间存在一定程度的依赖性，而且方差似乎在早期较小（1950年代初使用美国航空公司的乘客较少），在后期较大（1950年代末使用该服务的乘客较多）。这些观察表明，条件1和条件2（均值和方差随时间保持恒定）被违反了。从另一个角度看非恒定方差，我们可以为1949年至1960年的每一年创建箱线图进行可视化，如下所示：\n\
    \n```python\nimport seaborn as sns\nfig, ax = plt.subplots(figsize=(24,10))\n\
    sns.boxplot(x=data.index.year, y=data['Passengers'], ax=ax, color=\"cornflowerblue\"\
    )\nax.set(xlabel='Year', ylabel='Number of Passengers')\n```\n\n对于上述代码，我们得到以下结果：\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_288_0.png)\n\n图10.15 – 箱线图：1949-1960年美国航空公司乘客\n\
    \n为了检查自相关性，我们使用以下代码：\n\n```python\nfrom statsmodels.graphics.tsaplots import plot_acf\n\
    plot_acf(data, lags=20, alpha=0.05)\nplt.show()\n```\n\n我们得到如图10.16所示的结果：\n\n\
    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_289_0.png)\n\n图10.16 – 1949-1960年美国航空公司乘客的ACF可视化\n\
    \n然而，趋势主导了数据。移除趋势并重新运行代码后，我们得到图10.17的ACF图。似乎存在一个很强的季节性成分。自相关周期在一定的滞后计数后相似地重复，并在时间步长上间隔分布：\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_289_1.png)\n\n图10.17 – 1949-1960年美国航空公司乘客的ACF可视化\n\
    \n我们在*方差*和*自相关*部分讨论的Ljung-Box检验也可用于检查自相关性。使用该检验，我们得到`lb_pvalue = 0`。因此，数据存在自相关性。\n\
    \n## 总结\n\n本章首先介绍了时间序列。我们概述了什么是时间序列以及如何利用它来实现特定目标。我们还讨论了区分时间序列数据与非时间依赖数据的标准。我们还讨论了平稳性，哪些因素对平稳性很重要，如何衡量它们，以及如何解决不存在平稳性的情况。由此，我们能够理解ACF和PACF分析的主要功能，以及如何利用均值周围的方差对过程进行推断。此外，我们还介绍了时间序列建模，概述了白噪声模型以及自回归和移动平均分量背后的基本概念，这些构成了ARIMA和**季节性自回归积分移动平均（SARIMA）**时间序列模型的基础。\n\
    \n在*第11章，ARIMA模型*中，我们将更深入地讨论自回归、移动平均和ARMA模型，包括概念概述和Python中的分步示例。我们还将研究积分SARIMA模型，以及评估这些模型拟合度的方法。\n\
    \n## 参考文献\n\n[1] André Bauer, *Automated Hybrid Time Series Forecasting: Design,\
    \ Benchmarking, and Use Cases*, University of Chicago, 2021."

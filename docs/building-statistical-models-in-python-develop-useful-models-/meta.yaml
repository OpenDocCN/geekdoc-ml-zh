    def permutation_testing(A,B,n_iter=1000):\n    #A, B are 2 lists of samples to\
    \ test the hypothesis,\n    #n_iter is number of iterations with the default is\
    \ 1000\n    differences = []\n    P = np.array(A+B)\n    original_mean = np.array(A).mean()\
    \ - np.array(B).mean()\n    for i in range(n_iter):\n        np.random.shuffle(P)#create\
    \ a random permutation of P\n        A_new = P[:len(A)] # having the same size\
    \ of A\n        B_new = P[-len(B):] # having the same size of B\n        differences.append(A_new.mean()-B_new.mean())\n\
    \    #Calculate p_value\n    p_value = round(1-(float(len(np.where(\n        differences<=original_mean)[0]))/float(n_iter)),2)\n\

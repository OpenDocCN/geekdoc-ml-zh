    - 总结 384\n\n## 索引\n\n## 您可能感兴趣的其他书籍\n\n## 前言\n\n统计学是一门应用分析方法，利用数据来回答问题和解决问题的学科，适用于学术和工业环境。许多方法已存在数百年，而另一些则更为新近。统计分析和结果对于向技术和非技术受众展示都相当直观。此外，进行统计分析并不一定需要大量数据或计算资源，并且可以相当快速地完成，特别是使用像\
    \ Python 这样相对易于使用和实现的编程语言时。\n\n虽然人工智能 (AI) 和高级机器学习 (ML) 工具近年来随着计算能力的普及而变得更加突出和流行，但在开发使用\
    \ AI 和 ML 的大规模项目之前，执行统计分析作为先决步骤，可以使从业者在投入更多计算资源和项目架构开发之前，评估其可行性和实用性。\n\n本书提供了各种常用的工具，用于检验假设并为分析师和数据科学家提供基本的预测能力。读者将首先了解理解本书统计工具所需的基本概念和术语，然后再探索不同的测试及其适用条件。此外，读者将获得评估测试性能的知识。全书将提供\
    \ Python 编程语言的示例，帮助读者开始使用所介绍的工具来理解他们的数据，这些工具适用于数据分析行业面临的一些最常见问题。我们将探讨的主题包括：\n\n\
    - 统计学简介\n- 回归模型\n- 分类模型\n- 时间序列模型\n- 生存分析\n\n理解这些部分提供的工具将为读者奠定坚实的基础，从而更容易在统计学领域实现进一步的独立成长。\n\
    \n## 本书适合谁\n\n大多数行业的专业人士都可以从本书的工具中受益。提供的工具主要用于较高层次的推断分析，但也可以根据从业者希望应用的行业，应用于更深层次。本书的目标读者是：\n\
    \n- 具有有限统计或编程知识，希望学习使用数据来检验其业务领域假设的行业专业人士\n- 希望拓宽统计知识，并寻找一套工具及其实施方法以执行各种数据导向任务的数据分析师和科学家\n\
    \n本书从基础入手的方法旨在为广泛的受众提供进入知识库的途径，因此既不应让初学者望而却步，也不应将高级从业者排除在所呈现材料的益处之外。\n\n## 本书涵盖的内容\n\
    \n*第 1 章，抽样与泛化*，描述了抽样和泛化的概念。关于抽样的讨论涵盖了从总体中抽样数据的几种常见方法，并讨论了泛化的含义。本章还讨论了如何设置本书所需的软件。\n\
    \n*第 2 章，数据分布*，详细介绍了数据类型、用于描述数据的常见分布以及统计度量。本章还涵盖了用于改变分布的常见变换。\n\n*第 3 章，假设检验*，介绍了统计检验作为回答感兴趣问题的方法的概念。本章涵盖了执行检验的步骤、检验中遇到的错误类型，以及如何使用\
    \ Z 检验选择功效。\n\n*第 4 章，参数检验*，进一步讨论了统计检验，提供了常见参数统计检验的详细描述、参数检验的假设，以及如何评估参数检验的有效性。本章还介绍了多重检验的概念，并提供了关于多重检验校正的详细信息。\n\
    \n*第 5 章，非参数检验*，讨论了当参数检验的假设被违反时，如何使用一类称为非参数检验的无假设检验来执行统计检验。\n\n*第 6 章，简单线性回归*，以简单线性回归模型为例介绍了统计模型的概念。本章首先讨论了简单线性回归的理论基础，然后讨论了如何解释模型结果并评估模型的有效性。"

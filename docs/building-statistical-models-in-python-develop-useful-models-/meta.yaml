  md: "Let us discuss the IQ test scores again in the high school in Dallas. The IQ\
    \ score data has a mean of $\\mu = 98$ and a standard deviation of $\\sigma =\
    \ 12$. A researcher wants to know whether IQ scores will be affected by some IQ\
    \ training. He recruits 30 students and trains them to answer IQ questions 2 hours\
    \ per day for 30 days and records their IQ levels after finishing the training\
    \ period. The IQ scores of 30 students after the training section are 95, 110,\
    \ 105, 120, 125, 110, 98, 90, 99, 100, 110, 112, 106, 92, 108, 97, 95, 99, 100,\
    \ 100, 103, 125, 122, 110, 112, 102, 92, 97, 89, and 102. Their average score\
    \ is 104.17. We can easily implement the calculation in Python as follows:\n\n\
    ```\nIQscores = [95, 110, 105, 120, 125, 110, 98, 90, 99, 100,\n           110,\
    \ 112, 106, 92, 108, 97, 95, 99, 100, 100,\n           103, 125, 122, 110, 112,\
    \ 102, 92, 97, 89, 102]\n\nIQmean = np.array(IQscores).mean()\n```\n\nWe define\
    \ the null hypothesis and the alternative hypothesis:\n\n$$H_0: \\mu_{after} =\
    \ \\mu = 98$$\n$$H_a: \\mu_{after} > \\mu = 98$$\n\nWe choose the level of significance\
    \ $\\alpha=0.05$. Previously, the critical value for the right-tailed test was\
    \ 1.64485. We now calculate the test statistic on the problem:\n\n$$z = \\frac{\\\
    bar{x} - \\mu}{\\sigma / \\sqrt{n}} = \\frac{104.17 - 98}{12 / \\sqrt{30}} = 2.8162$$\n\
    \nIt is implemented in Python as follows:\n\n```\nn=30 #number of students\nsigma\
    \ =12 #population standard deviation\nIQmean = 104.17 # IQ mean of 30 students\
    \ after the training\nmu = 98 # population mean\n\nz = (IQmean-mu)/(sigma/math.sqrt(n))\n\
    ```\n\nSince the test statistic value is 2.8162 > 1.64485, we reject the null\
    \ hypothesis. This means that the training does affect the IQ levels of these\
    \ students and helps them improve their IQ scores.\n\nWe also can use the `ztest()`\
    \ function from the `statsmodels` package (Seabold, Skipper, and Josef Perktold,\
    \ \"statsmodels: Econometric and statistical modeling with python.\" Proceedings\
    \ of the 9th Python in Science Conference. 2010) to perform one- or two-sample\
    \ z-tests (which we will discuss in the next part). The syntax is as follows:\n\
    \n```\nstatsmodels.stats.weightstats.ztest(x1, x2=None,\n    value=0, alternative='two-sided')\n\
    ```"

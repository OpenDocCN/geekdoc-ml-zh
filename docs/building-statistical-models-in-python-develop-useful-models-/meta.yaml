- img_proc: true
  md: 'Before conducting PCA, we perform pre-processing for the dataset by subtracting
    the mean from each data point and normalizing the standard deviation of each independent
    variable. In a high-level structure, the goal of the PCA technique is to find
    vectors $v_1, v_2, \dots, v_k$ such that any data point, $x$, in the dataset can
    be approximately represented as a linear combination:


    $$x = \sum_{i=1}^{k} a_i v_i$$


    for some constants $a_i$, with $i = \overline{1, k}$. Assume that we have these
    $k$ vectors; then, each data point can be written as a vector in $R^k$ corresponding
    the projections:


    $$x = \langle x, v_1 \rangle \cdot v_1 + \langle x, v_2 \rangle \cdot v_2 + \dots
    + \langle x, v_k \rangle \cdot v_k$$


    In other words, if we have $d$ original independent variables, we will construct
    a $d \times k$-dimensional transformation matrix that can map any data point onto
    a new $k$-dimensional variable subspace with $k$ smaller than $d$. It means that
    we have performed a dimension reduction by a linear transformation of the original
    independent variables. There are several applications of PCA, but here, we will
    cite a paper, *Gene mirror geography within Europe*, published in *Nature* (2008)
    (https://pubmed.ncbi.nlm.nih.gov/18758442/). Authors considered a sample of 3,000
    European individuals genotyped at over half a million variable DNA sites in the
    human genome; then, each individual was represented using more than half a million
    genetic markers. This means that it produced a matrix with dimensions larger than
    3,000 x 500,000. They performed a PCA on the dataset to find the most meaningful
    vectors, $v_1$ and $v_2$ (the first and second components), where each person
    only corresponds to two numbers. The authors plotted each person based on two
    numbers in a two-dimensional plane and then colored each point according to the
    country they came from.'

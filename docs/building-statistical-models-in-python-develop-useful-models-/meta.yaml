    \ \\right)^2$$\n\n其中$n$是样本数量，$p$是参数数量。岭回归添加一个标量$\\lambda$，称为**调优参数**——它必须大于或等于0——该参数乘以模型参数系数估计值$\\\
    widehat{\\beta}_j^2$，以创建一个**收缩惩罚项**。这被加回到RSS方程中，使得新的最小二乘回归拟合过程现在定义如下：\n\n$$RSS\
    \ + \\lambda \\sum_{j=1}^{p} \\widehat{\\beta}_j^2$$\n\n当$\\lambda=0$时，相应的岭回归**惩罚项**为0。然而，当$\\\
    lambda \\longrightarrow \\infty$时，模型系数向零收缩。新的拟合过程可以重写如下：\n\n$$\\|y - X\\beta\\\
    |_2^2 + \\lambda \\|\\beta\\|_2^2$$\n\n其中RSS = $\\|y - X\\beta\\|_2^2$，$\\|\\\
    beta\\|_2^2$是回归系数数组的平方$L^2$**范数**（欧几里得范数），$X$是设计矩阵。进一步简化得到：\n\n$$\\|y - X\\beta\\\
    |_2^2 + \\lambda \\beta^T \\beta$$\n\n这可以通过使用调优参数的标量乘以单位矩阵来推导**岭回归系数估计值**$\\hat{\\\
    beta}^R$，从而写成闭式解，如下所示：\n\n$$\\hat{\\beta}^R = (X^T X + \\lambda I)^{-1} X^T y$$\n\
    \n简单来说，岭回归系数估计值是使最小二乘回归输出最小化的系数集，如下所示：\n\n$$\\hat{\\beta}^R = argmin \\left\\\
    { \\sum_{i=1}^n \\left( y_i - \\hat{\\beta}_0 - \\sum_{j=1}^p \\hat{\\beta}_j\
    \ x_{ij} \\right)^2 + \\lambda \\sum_{j=1}^p \\hat{\\beta}_j^2 \\right\\}$$\n\n\
    > **在应用岭回归之前对系数进行标准化**\n> 因为岭回归旨在最小化整个数据集的误差，并且为此目的的调优参数是在$L^2$范数归一化过程中（即对平方和项取根）应用的，所以在应用岭回归之前，对模型中的每个变量应用标准缩放器，使所有变量处于相同的尺度，这一点很重要。如果不执行此操作，岭回归几乎肯定无法帮助模型在不同数据集上泛化。\n\

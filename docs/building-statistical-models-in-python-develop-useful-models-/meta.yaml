    \ for {}: {}'.format(col, adfuller_test[1]))\n```\n\n这里我们可以看到每个变量的迪基-富勒检验结果。回想一下，原假设是存在单个单位根。因此，由于p值不低，我们不会拒绝原假设。这为我们提供了统计证据，可以假设存在趋势：\n\
    \nADF p-value for realcons: 0.9976992503412904\n\nADF p-value for realinv: 0.6484956579101141\n\
    \nADF p-value for realdpi: 1.0\n\n让我们用循环对数据进行差分：\n\n```python\nimport numpy as\
    \ np\n\ndata_1d = pd.DataFrame()\nfor col in ['realcons','realinv','realdpi']:\n\
    \    data_1d[col] = np.diff(data[col], n=1)\n```\n\n## 步骤2 – 选择AR(p)的阶数\n\n现在，我们可以重新运行ACF图，检查是否仍然看到趋势性自相关。因为原始折线图似乎没有季节性，我们将继续绘制**偏自相关函数（PACFs）**，以了解什么样的AR(p)阶数可能有用。如果我们怀疑存在季节性，检查**样本自相关的谱密度以量化季节周期性**可能很有用，这是我们在*第11章，ARIMA模型*中演示过的过程。在检查PACF图时，我们将使用**尤尔-沃克方法**。\n\
    \n我们可以从ACF图中看到没有明显的季节性。当使用VAR模型时，所有项都用于估计所有其他项，因为任何项的预测估计都是同时开发的。换句话说，要预测一个，我们必须预测所有。这之所以重要，是因为当查看*图12.11*中的PACF时，我们可以看到一个变量可以用AR(1)（实际投资）模型拟合，一个可以用AR(2)（实际可支配收入）模型拟合，另一个可以用AR(3)（实际消费）模型拟合。使用对每个变量都显著的阶数是使VAR建模有效的一个重要方面。\n\
    \n在VAR模型中选择阶数的另一个重要方面是互相关。例如，我们可能有一个变量的最高阶数是3阶，但如果目标变量和输入变量之间的互相关在滞后5期，我们很可能需要使用滞后5期。然而，使用滞后3或4期的模型也可能有用。但是，与任何回归模型一样，我们总是希望在模型训练后检查系数项的显著性：\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_360_0.png)\n\n## 步骤3 – 评估互相关\n\n对于VAR模型，互相关在我们视为输入的变量和我们视为目标的变量之间最为重要。这可以使用多个滞后完成，或者如果担心使用不同偏移的同一变量的多次迭代会导致过拟合，则使用最显著的滞后。我们必须确认预测模型中使用的互相关分析是针对每个输入变量和因变量进行的。显示输入变量作为目标变量领先指标的互相关不是主要问题；这意味着使用输入的历史值来预测目标。然而，如果我们遇到输入是滞后指标的情况——意味着目标预测输入——而我们想使用输入来预测目标，我们将需要将输入向前移动，使相关性位于滞后0期，并根据移动量修剪数据。\n\
    \n在许多情况下，存在显著的领先和滞后互相关；这可能表明存在季节性。在VAR模型存在季节性的情况下，应包含一个指示变量，该变量在谱密度峰值处提供值为1，其他情况下为0。互相关的另一个特殊情况是，输入变量具有显著的统计显著性，但仅在时间上很远的滞后处。在这种情况下，可能适合将数据向前移动，以避免模型包含不显著的项（自相关），从而冒着过拟合的风险。为了演示基于CCF的移动，我们将在下一步中将其纳入我们的流程。\n\
    \n我们在*图12.12*中观察到，*realdpi*和*realinv*之间最强的相关性在滞后0期，但在图中*x*=-27和*x*=-37处至少还有两个其他相似相关的滞后。正如我们在*ARIMAX*部分所看到的，我们可以将同一变量的多个移动版本作为新变量包含进来，以提高模型的预测能力。这将使我们能够利用多个相关性。然而，出于模型演示的目的，我们不会包含这一点，因为VAR摘要的输出可能会变得很大。此外，正如我们提到的，包含同一变量的太多滞后可能导致过拟合。最终由实践者决定使用多少滞后。这必须通过评估模型拟合度和偏差/方差权衡来完成。这里给出的函数代码也在*第10章，时间序列导论*中：\n\
    \n```python\n# code imported from chapter 10\ndef plot_ccf(data_a, data_b, lag_lookback,\
    \ percentile, ax,\n            title=None):\n\n    n = len(data_a)\n    ccf =\
    \ correlate(data_a - np.mean(data_a), data_b -\n    np.mean(data_b), method='direct')\
    \ / (np.std(data_a) * np.std(data_b) *\n    n)\n\n    _min = (len(ccf)-1)//2 -\
    \ lag_lookback\n    _max = (len(ccf)-1)//2 + (lag_lookback-1)\n\n    zscore_vals={90:1.645,\n\
    \                 95:1.96,\n                 99:2.576}\n\n    markers, stems,\
    \ baseline = ax.stem(np.arange(-lag_lookback, (lag_\n    lookback-1)), ccf[_min:_max],\
    \ markerfmt='o', use_line_collection =\n    True)\n\n    z_score_95pct = zscore_vals.get(percentile)/np.sqrt(n)\
    \ #1.645 for\n    90%, 1.96 for 95%, and 2.576 for 99%\n\n    ax.set_title(title)\n\
    \    ax.set_xlabel('Lag')\n    ax.set_ylabel('Correlation')\n    ax.axhline(y=-z_score_95pct,\
    \ color='b', ls='--')# Z-statistic for\n    95% CL LL\n    ax.axhline(y=z_score_95pct,\
    \ color='b', ls='--')# Z-statistic for\n    95% CL UL\n    ax.axvline(x=0, color='black',\
    \ ls='-');\n\nplot = plot_ccf(data_a=data_1d['realdpi'], data_b=data_1d['realinv'],\n\
    lag_lookback=50, percentile=95)\n```"

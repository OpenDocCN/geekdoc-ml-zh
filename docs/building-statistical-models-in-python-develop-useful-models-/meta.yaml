nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp'
- md: "in other words, the probability used to determine whether $H_0$ should be rejected.\
    \ The rejection rule (reject $H_0$) is the p-value being less than or equal to\
    \ the specified level of significance $\\alpha$ in the research. In order to find\
    \ the p-value based on the value of the test statistic in Python, we use the following\
    \ syntax:\n\n```\nscipy.stats.norm.sf(abs(x))\n```\n\nHere, x is the z-score.\
    \ For example, we want to find the p-value associated with a z-score of -2.67\
    \ in a left-tailed test. The Python implementation is as follows:\n\n```\nimport\
    \ scipy.stats\n\n#find p-value\nround(scipy.stats.norm.sf(abs(-2.67)),4)\n```\n\
    \nThe output will be 0.0038. Similar Python code is used in the case of a right-tailed\
    \ test. For a two-tailed test, we need to multiply the value by 2:\n\n```\n#find\
    \ p-value for two-tailed test\nscipy.stats.norm.sf(abs(2.67))*2\n```\n\nThe following\
    \ figure illustrates the idea of how the p-value is computed in each type of test.\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_93_0.png)\n\nThe last step is to interpret\
    \ the statistical conclusion.\n\nOn the other hand, in the critical value approach,\
    \ we will need to compute a critical value for the test statistic by using the\
    \ level of significance. Critical values are the boundaries of the critical region\
    \ where we can reject the null hypothesis.\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_94_0.png)\n\
    \nFigure 3.8 – Critical regions in hypothesis testing\n\nTo compute the critical\
    \ value in Python, we use the following syntax:\n\n```\nscipy.stats.norm.ppf(alpha)\n\
    ```\n\nHere, alpha is the level of significance to be used. The following is the\
    \ implementation of the code in Python for left-tailed, right-tailed, and two-tailed\
    \ tests:\n\n```\nimport scipy.stats\nalpha = 0.05 # level of significance\n\n\
    #find Z critical value for left-tailed test\nprint(f\" The critical value is {scipy.stats.norm.ppf(alpha)}\"\
    )\n\n#find Z critical value for right-tailed test\nprint(f\" The critical value\
    \ is {scipy.stats.norm.ppf(1-alpha)}\")\n\n#find Z critical value for two-tailed\
    \ test\nprint(f\" The critical values are {-scipy.stats.norm.ppf(1-alpha/2)} and\
    \ {scipy.stats.norm.ppf(1-alpha/2)}\")\n```\n\nHere's the output of the preceding\
    \ code:\n\n```\nThe critical value is -1.6448536269514729\nThe critical value\
    \ is 1.6448536269514722\nThe critical values are -1.959963984540054 and 1.959963984540054\n\
    ```\n\nAt the level of significance α = 0.05 for the left-tailed test, the critical\
    \ value is about -1.64485. Since this is a left-tailed test, if the test statistic\
    \ is less than or equal to this critical value, we reject the null hypothesis.\
    \ Similarly, for the right-tailed test, if the test statistic is greater than\
    \ or equal to 1.64485, we reject the null hypothesis. For the two-tailed test,\
    \ we reject the null hypothesis if the test statistic is greater than or equal\
    \ to 1.95996 or less than or equal to -1.95996.\n\nAfter determining whether to\
    \ reject the null hypothesis, we interpret the statistical conclusion.\n\nLet\
    \ us discuss the IQ test scores again in the high school in Dallas. The IQ score\
    \ data has a mean of $\\mu = 98$ and a standard deviation of $\\sigma = 12$. A\
    \ researcher wants to know whether IQ scores will be affected by some IQ training.\
    \ He recruits 30 students and trains them to answer IQ questions 2 hours per day\
    \ for 30 days and records their IQ levels after finishing the training period.\
    \ The IQ scores of 30 students after the training section are 95, 110, 105, 120,\
    \ 125, 110, 98, 90, 99, 100, 110, 112, 106, 92, 108, 97, 95, 99, 100, 100, 103,\
    \ 125, 122, 110, 112, 102, 92, 97, 89, and 102. Their average score is 104.17.\
    \ We can easily implement the calculation in Python as follows:\n\n```\nIQscores\
    \ = [95, 110, 105, 120, 125, 110, 98, 90, 99, 100,\n           110, 112, 106,\
    \ 92, 108, 97, 95, 99, 100, 100,\n           103, 125, 122, 110, 112, 102, 92,\
    \ 97, 89, 102]\n\nIQmean = np.array(IQscores).mean()\n```\n\nWe define the null\
    \ hypothesis and the alternative hypothesis:\n\n$$H_0: \\mu_{after} = \\mu = 98$$\n\
    $$H_a: \\mu_{after} > \\mu = 98$$\n\nWe choose the level of significance $\\alpha=0.05$.\
    \ Previously, the critical value for the right-tailed test was 1.64485. We now\
    \ calculate the test statistic on the problem:\n\n$$z = \\frac{\\bar{x} - \\mu}{\\\
    sigma / \\sqrt{n}} = \\frac{104.17 - 98}{12 / \\sqrt{30}} = 2.8162$$\n\nIt is\
    \ implemented in Python as follows:\n\n```\nn=30 #number of students\nsigma =12\
    \ #population standard deviation\nIQmean = 104.17 # IQ mean of 30 students after\
    \ the training\nmu = 98 # population mean\n\nz = (IQmean-mu)/(sigma/math.sqrt(n))\n\
    ```\n\nSince the test statistic value is 2.8162 > 1.64485, we reject the null\
    \ hypothesis. This means that the training does affect the IQ levels of these\
    \ students and helps them improve their IQ scores.\n\nWe also can use the `ztest()`\
    \ function from the `statsmodels` package (Seabold, Skipper, and Josef Perktold,\
    \ \"statsmodels: Econometric and statistical modeling with python.\" Proceedings\
    \ of the 9th Python in Science Conference. 2010) to perform one- or two-sample\
    \ z-tests (which we will discuss in the next part). The syntax is as follows:\n\
    \n```\nstatsmodels.stats.weightstats.ztest(x1, x2=None,\n    value=0, alternative='two-sided')\n\
    ```\n\nHere, we see the following:\n\n- x1: The first of the two independent samples\n\
    - x2: The second of the two independent samples (if performing a two-sample z-test)\n\
    - value: In the one-sample case, value is the mean of x1 under the null hypothesis.\
    \ In the two-sample case, value is the difference between the mean of x1 and the\
    \ mean of x2 under the null hypothesis. The test statistic is x1_mean - x2_mean\
    \ - value.\n- alternative: The alternative hypothesis:\n  'two-sided': Two-sided\
    \ test\n  'larger': Right-tailed test\n  'smaller': Left-tailed test\n\nThe following\
    \ Python code shows how we perform a one-sample z-test:\n\n```\nfrom statsmodels.stats.weightstats\
    \ import ztest as ztest\n\n#IQ scores after training sections\nIQscores = [95,110,\
    \ 105, 120, 125, 110, 98, 90, 99, 100,\n            110, 112, 106, 92, 108, 97,\
    \ 95, 99, 100, 100,\n            103, 125, 122, 110, 112, 102, 92, 97, 89, 102]\n\
    \n#perform one sample z-test\nz_statistic, p_value = ztest(IQscores, value=98,\
    \ alternative = 'larger')\n\nprint(f\"The test statistic is {z_statistic} and\
    \ the corresponding p-value is {p_value}.\")\n```\n\nThe test statistic is 3.3975\
    \ and the p-value = 0.00034 < 0.05, where 0.05 is the level of significance. Therefore,\
    \ we have enough evidence to reject the null hypothesis. This means that the training\

    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_232_0.png)


    ## 泊松模型


    在上一节中，我们讨论了响应变量为分类变量的模型。在本节中，我们将研究一个用于计数数据的模型。计数数据类似于分类数据（类别是整数），但有无限多个水平（0, 1,
    2, 3，等等）。我们使用**泊松分布**对计数数据建模。在本节中，我们将首先研究泊松分布及其性质。然后，我们将使用泊松模型对具有解释变量的计数变量进行建模。


    ## 泊松分布


    泊松分布由以下公式给出：


    $$P(k) = \frac{\lambda^k e^{-\lambda}}{k!}$$


    这里，$\lambda$ 是事件的平均数量，$k$ 是我们想要计算概率的事件数量。$P(k)$ 是 $k$ 个事件发生的概率。该分布用于计算在固定时间间隔或定义空间内发生
    $k$ 个事件的概率。


    分布的形状随 $\lambda$ 的值而变化。当 $\lambda$ 大于10时，分布近似正态。然而，当 $\lambda$ 接近0时，分布变为右偏。这是因为计数数据不能为负。*图8.7*显示了三个示例泊松分布，其均值分别为12、5和2。请注意，均值为12的分布近似正态分布，而均值为5和2的分布是右偏的：



    \ mathematician and physicist who – among other things – contributed to the concepts\
    \ of approximation, and, in 1795, invented the method of least squares and the\
    \ normal distribution, which is commonly used in statistical modeling techniques,\
    \ such as least squares regression [3]. The standard normal distribution, also\
    \ referred to as a **parametric** distribution, is characterized by a symmetrical\
    \ distribution with a probability of data point dispersion consistent around the\
    \ mean – that is, the data appears near the mean more frequently than data farther\
    \ away. Since the location data dispersed within this distribution follows the\
    \ laws of probability, we can call this a **standard normal probability distribution**.\
    \ As an aside, a distribution in statistics that is not a probability distribution\
    \ is generated through non-probability sampling based on non-random selection,\
    \ whereas a probability distribution is based on random sampling. Both probability-based\
    \ and non-probability-based distributions can have a standard normal distribution.\
    \ The standard normal distribution exhibits neither skew nor kurtosis. It has\
    \ equal variance throughout and frequently occurs in nature. The **Empirical Rule**\
    \ is used to describe this distribution as having three pertinent standard deviations\
    \ centered around the mean, μ. There are two distinct assumptions about this distribution:\n\
    \n- The first, second, and third standard deviations contain 68%, 95%, and 99.7%\
    \ of the measurements dispersed, respectively\n- The mean, median, and mode are\
    \ all equal to each other\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_63_0.png)\n\
    \nFigure 2.15 – The standard normal distribution\n\nTwo common forms of a normal\

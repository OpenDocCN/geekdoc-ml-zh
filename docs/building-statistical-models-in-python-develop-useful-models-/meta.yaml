    \ kind of AR(p) ordering might be useful. Had we suspected seasonality, it might\
    \ have been useful to check the **spectral density of the sample autocorrelations\
    \ to quantify seasonal periodicity**, a process we demonstrated in *Chapter 11,\
    \ ARIMA Models*. When checking the PACF plots, we will use the **Yule-Walker method**.\n\
    \nWe can see in the ACF plots there is no apparent seasonality. When using a VAR\

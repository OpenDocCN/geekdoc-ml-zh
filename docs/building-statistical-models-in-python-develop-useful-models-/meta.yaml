    The main advantage of this method is that key population characteristics in a
    sample better represent the population that is studied and are also proportional
    to the overall population. This method helps to reduce sample selection bias.
    On the other hand, when classifying each member of a population into distinct
    subpopulations is not obvious, this method becomes unusable.


    # Cluster sampling


    Here, a population is divided into different subgroups called clusters. Each cluster
    has homogeneous characteristics. Instead of randomly selecting individual members
    in each cluster, entire clusters are randomly chosen and each of these clusters
    has an equal chance of being selected as part of a sample. If clusters are large,
    then we can conduct a **multistage sampling** by using one of the previous sampling
    methods to select individual members within each cluster. A cluster sampling example
    is discussed now. A local pizzeria plans to expand its business in the neighborhood.
    The owner wants to know how many people order pizzas from his pizzeria and what
    the preferred pizzas are. He then splits the neighborhood into different areas
    and selects clients randomly to form cluster samples. A survey is sent to the
    selected clients for his business study. Another example is related to multistage
    cluster sampling. A retail chain store conducts a study to see the performance
    of each store in the chain. The stores are divided into subgroups based on location,
    then samples are randomly selected to form clusters, and the sample cluster is
    used as a performance study of his stores. This method is easy and convenient.
    However, the sample clusters are not guaranteed to be representative of the whole
    population.


    # Non-probability sampling


    The other type of sampling method is non-probability sampling, where some or all
    members of a population do not have an equal chance of being selected as a sample
    to participate in the study. This method is used when random probability sampling
    is impossible to conduct and it is faster and easier to obtain data compared to
    the probability sampling method. One of the reasons to use this method is due
    to cost and time considerations. It allows us to collect data easily by using
    a non-random selection based on convenience or certain criteria. This method can
    lead to a higher-biased risk than the probability sampling method. The method
    is often used in exploratory and qualitative research. For example, if a group
    of researchers wants to understand clients’ opinions of a company related to one
    of its products, they send a survey to the clients who bought and used the product.
    It is a convenient way to get opinions, but these opinions are only from clients
    who already used the product. Therefore, the sample data is only representative
    of one group of clients and cannot be generalized as the opinions of all the clients
    of the company.'

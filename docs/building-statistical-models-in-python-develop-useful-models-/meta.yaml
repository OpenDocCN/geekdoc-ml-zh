- img_proc: true
  md: '# Measuring and describing distributions


    The distributions of data found in the wild come in many shapes and sizes. This
    section will discuss how distributions are measured and which measurements apply
    to the four types of data. These measurements will provide methods to compare
    and contrast different distributions. The measurements discussed in this section
    can be broken into the following categories:


    +   - Central tendency

    - Variability

    - Shape


    These measurements are called **descriptive statistics**. The descriptive statistics
    discussed in this section are commonly used in statistical summaries of data.


    # Measuring central tendency


    There are three types of measurement of central tendency:


    +   - Mode

    - Median

    - Mean


    Let''s discuss each one of them.


    # Mode


    The first measurement of central tendency we will discuss is the mode. The mode
    of a dataset is simply the most commonly occurring instance. Using the machines
    in the factory as an example (see *Figure 2.1*), the mode of the dataset would
    be model B. In the example, there are 3 of model A and 5 of model B, therefore,
    making model B the most common – the mode.


    A dataset can be one of the following:


    +   - Unimodal – having one mode

    - Multimodal – having more than one mode


    In the preceding example, the data is unimodal.


    Using the factory example again, let''s imagine that there are 3 of **Model A**,
    5 of **Model B**, and 5 of **Model D** (a new model). Then, the dataset will have
    two modes: **Model B** and **Model D**, as shown in *Figure 2.4*.'
  merge: -1
  pgno: 46
- img_proc: true
  md: '![](img/3de2e60811d1b90c67f6bb2d5cae034f_47_0.png)


    Figure 2.4 – Multimodel distribution of machines in a factory


    Therefore, this dataset is multimodal.


    > **Mode and Data Types**

    These examples of modes have used nominal data, but all four types of data support
    the mode because all four data types support the equality operation.


    While the mode refers to the most common instance, in multimodal cases of continuous
    data, the term mode is often used in a less strict sense. For example, the distribution
    in *Figure 2.5* would commonly be referred to as multimodal even though the peaks
    of the distribution are not the same magnitude. However, with nominal and ordinal
    data, it is more common to use the stricter definition of *most common* when referring
    to the modality of a distribution.'
  merge: -1
  pgno: 47

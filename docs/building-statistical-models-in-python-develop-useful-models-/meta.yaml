  - '[PAGE 157]


    The modified version of the Pearson''s chi-square test statistic we used in the
    goodness-of-fit test that extends to the chi-square test of independence follows:


    $$\chi^2 = \sum \frac{(O_{ij} - E_{ij})^2}{E_{ij}}, \text{degrees of freedom}
    = (r-1)(c-1)$$


    The subscript $j$ corresponds to columnar data and the subscript $i$ corresponds
    to the row data for the observed and expected values, denoted as $O$ and $E$,
    respectively. The values $r$ and $c$ in the degrees of freedom calculation correspond
    to the number of rows and the number of columns in the table (this is 2x2, so
    the degrees of freedom will equal (2-1)(2-1)=1.


    Using the values from the observed and expected tables, we find the chi-square
    test statistic to equal the following:


    $$\chi^2 = \frac{(1,429 - 2,612.75)^2}{2,612.75} + \frac{(1,216,934 - 1,214,324.31)^2}{1,214,324.31}
    + \frac{(1,235 - 51.25)^2}{51.25} + \frac{(22,663 - 23,846.75)^2}{23,846.75} =
    27,942.43$$


    The table lookup test statistic using the one degree of freedom calculated here
    is 3.84. We can reasonably conclude that since the test statistic of 27,942.43
    is greater than the critical value of 3.84, we can conclude that in the state
    of Texas in 2021, there was a statistically significant difference in the rate
    of fatalities in vehicle crashes where safety restraints were used compared to
    where they were not used.


    > **Chi-square contingency tables**

    The test we performed uses two 2x2 tables called contingency tables. The chi-square
    test of independence is frequently referred to as the **chi-squared contingency
    test**. The failure to reject the null hypothesis is **contingent** upon the observed
    table''s values matching the expected table''s values within a level of statistical
    confidence. However, the chi-square test of independence can be extended to **tables
    of any combination of rows and columns**. However, as the rows and columns increase
    in value, the tables may be less useful to interpret.


    To perform this test in Python, we can use the `chi2_contingency` function from
    the `scipy.stats` module. Inputting only the observed frequencies as a 2x2 numpy
    array, the `chi2_contingency` test provides the expected frequencies should the
    null hypothesis be true– the p-value, degrees of freedom used, and the chi-square
    test statistic:


    ```

    from scipy.stats import chi2_contingency

    from scipy.stats import chi2

    import numpy as np


    observed_frequencies = np.array([[1429, 1235], [1216934, 22663]])

    chi_square_test_statistic, p_value, degrees_of_freedom, expected_frequencies =
    chi2_contingency(observed_frequencies)

    chi_square_critical_value = chi2.ppf(1-.05, df=degrees_of_freedom)

    ```'

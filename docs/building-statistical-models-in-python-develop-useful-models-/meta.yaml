    \ it helps models include useful variables while preventing them from introducing\
    \ too much variance and thus overfitting. Preventing excess variance is particularly\
    \ useful for ensuring that models generalize well over time. Let's look at some\
    \ of the most common shrinkage techniques, **ridge regression** and **Least Absolute\
    \ Shrinkage and Selection Operator (LASSO) Regression**.\n\n## Ridge regression\n\
    \nRecall the formulation for the **residual sum of squared errors (RSS)** for\
    \ multiple linear regression using least squares regression is as follows:\n\n\
    $$RSS = \\sum_{i=1}^{n} \\left( y_i - \\widehat{\\beta}_0 - \\sum_{j=1}^{p} \\\
    widehat{\\beta}_j x_{ij} \\right)^2$$\n\nwhere $n$ is the number of samples and\
    \ $p$ is the number of parameters. Ridge regression adds a scalar, $\\lambda$,\
    \ called a **tuning parameter** – which must be greater than or equal to 0 – that\
    \ gets multiplied by the model parameter coefficient estimates, $\\widehat{\\\
    beta}_j^2$, to create a **shrinkage penalty**. This gets added back to the RSS\
    \ equation such that the new least squares regression's fitting procedure is now\
    \ defined as follows:\n\n$$RSS + \\lambda \\sum_{j=1}^{p} \\widehat{\\beta}_j^2$$\n\

    could be used to predict the response variable. For example, if we wanted to predict
    home prices, we might want to consider many variables, which may include lot size,
    the number of bedrooms, the number of bathrooms, and overall size. In this situation,
    we can expand the previous model to include these additional variables. This is
    called MLR. The MLR model can be expressed with the following equation.


    $$y = \beta_0 + \beta_1 x_1 + \beta_2 x_2 + \dots + \beta_p x_p + \epsilon$$


    Like the previous equation, $\beta_0$ represents an intercept. In this equation,
    in addition to the intercept value, we have a $\beta$ parameter for each explanatory
    variable. Each explanatory variable is denoted as $x$ with a numerical subscript.
    We can include as many explanatory variables as desired in the model, which is
    why the equation shows a final subscript of $p$.


    > **Impacts of data sizes on MLR**

    In general, we can include as many explanatory variables as desired in the model.
    However, there are some realistic limits. One of these potential limits is the
    number of samples relative to the number of explanatory variables. MLR tends to
    work best when the number of samples (N) is much less than the number of explanatory
    variables (P). As P approaches N, the model becomes difficult to estimate. If
    P is large compared to N, it would be wise to consider dimension reduction, which
    will be discussed later in this chapter.


    Let''s look at an example. The Python package `scikit-learn` contains several
    datasets for practice with modeling. We will utilize the `diabetes` dataset, which
    includes vital measurements and quantitative measures of the disease progression
    after one year. More information about this dataset can be found at this link:
    `https://scikit-learn.org/stable/datasets/toy_dataset.html#diabetes-dataset`.
    We will attempt to model the relationship between the vital statistics and the
    disease progression.


    The explanatory variables in this dataset are `age`, `bmi`, `bp`, `s1`, `s2`,
    `s3`, `s4`, `s5`, and `s6`. The response variable is a measurement of disease
    progression. This is how we would express this model mathematically:


    $$progression = \beta_0 + \beta_1 x_{age} + \beta_2 x_{bmi} + \beta_3 x_{bp} +
    \beta_4 x_{s1} + \beta_5 x_{s2} + \beta_6 x_{s3} + \beta_7 x_{s4} + \beta_8 x_{s5}
    + \beta_9 x_{s6} + \epsilon$$


    As discussed previously, we have a $\beta$ for each variable in the model.


    > **Transformations on the diabetes dataset**

    The explanatory variables in this dataset have been transformed from the original
    measurements. Referring to the dataset user''s guide, we can see that each variable
    has been mean-centered and scaled. In addition, the `sex` variable has been converted
    from a categorical variable into a numerical variable.'
  - '[PAGE 195]


    # Adding categorical variables


    Up until this point, we have only considered continuous variables in our model,
    that is, variables that can have any value on the number line. Thinking back to
    *Chapter 2, Distributions of Data*, the variables we have considered before now
    have been ratio data. However, the linear regression model is not limited to using
    continuous variables. We can include categorical variables in the model. Recall
    from *Chapter 2, Distributions of Data*, categorical variables are associated
    with groups of items. In statistical learning, the groups are generally called
    **levels** of the variable. For example, if we had five students, three with MS
    degrees, one with a PhD degree, and one with a BS degree, we would say that the
    student categorical variable has three levels: BS, MS, and PhD. Let''s look at
    how we include categorical variables in the model.


    We will include the categorical variable in the model by including additional
    $\beta$ terms. Specifically, we will add the number of levels ($L$) minus one
    additional $\beta$ term. For the student example with three levels, we would add
    two additional $\beta$ terms. Using one less than the number of levels will allow
    us to choose one level as a reference (or baseline) and compare the other levels
    to that reference level. We include the $\beta$ terms in the model just like the
    other $\beta$ terms. Let''s say in this example, we are modeling income level,
    and in addition to the education levels, we have the experience of the individuals.
    Then, we would construct our model like this:


    $$income = \beta_0 + \beta_1 x_{experience} + \beta_2 x_{ms} + \beta_3 x_{phd}$$


    With the addition of the beta terms, we also must make a data transformation.
    We will have to create **dummy variables** for each of the *non-reference* levels
    in the categorical variable. This process is called the dummification of the categorical
    variable. In dummification, we create a column for each non-reference level and
    insert ones where the level occurs in the original variable and zeros where it
    does not appear in the original variable. This process is demonstrated in *Figure
    7.1*.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_195_0.png)


    The original variable contains the BS, MS, and PhD levels. BS is chosen as the
    reference level and two dummy variables are created for the levels MS and PhD.
    This process of creating additional columns for categorical variables is called
    **encoding**. There are many types of variable encodings and encoding is a widely
    used technique in statistical learning and machine learning.'
  - '[PAGE 196]


    176 Multiple Linear Regression


    > **Categorical levels are shifts by a constant**


    Let''s look a little deeper at the impact of categorical variables on the linear
    regression model. Earlier, we discussed how categorical variables are encoded
    with dummy variables that take on values of zero and one. Essentially, that means
    that we are switching the associated $\beta$ terms, depending on the level, which
    will shift the response by a constant. For example, in the income model, when
    we want to calculate the income of an individual with a BS degree, the model resolves
    to the following:


    $$income = \beta_0 + \beta_1 x_{experience}$$


    And when we want to calculate the income of an individual with an MS degree, the
    model resolves to the following:


    $$income = \beta_0 + \beta_1 x_{experience} + \beta_2$$


    This means that levels of categories only shift the output of the model from the
    reference level by a constant, the beta associated with the level.


    Returning to our previous example, our dataset includes a categorical variable:
    the sex of the patient. The dataset includes two levels for sex. We will choose
    one level to serve as a reference and we will create a dummy variable for the
    other level. With this knowledge, let''s fit this data to a linear regression
    model and discuss the assumptions of multiple linear regression.


    # Evaluating model fit


    Whenever we fit a parametric model, we should verify that the model assumptions
    are met. As discussed in the previous chapter, if the model assumptions are not
    met, the model may provide misleading results. In the previous chapter, we discussed
    the four assumptions for simple linear regression:


    +   - A linear relationship between the response variable and explanatory variables

    - Normality of the residuals

    - Homoscedasticity of the residuals

    - Independent samples


    These assumptions also apply here, but in this new modeling context, we have an
    additional assumption: no or little **multicollinearity**. Multicollinearity occurs
    when two or more of the explanatory variables in an MLR model are highly correlated.
    The presence of multicollinearity impacts the statistical significance of the
    independent variables. Ideally, all the explanatory variables will be uncorrelated
    (or linearly independent). However, we can accept a small amount of multicollinearity
    without much impact on the model.


    Let''s evaluate the model on each of these assumptions.'

    \ t检验就足够了。原假设和备择假设如下：\n\n$H_0: \\mu_1 = \\mu_2$\n$H_a: \\mu_1 \\neq \\mu_2$\n\n\
    我们指定显著性水平为0.05。为了计算检验统计量和p值，我们实现如下代码：\n\n```\nimport scipy.stats as stats\nt_statistic,\
    \ p_value = stats.ttest_ind(sample1, sample2,\n    equal_var = False)\n```\n\n\
    检验统计量为-22.47，p值小于0.05（显著性水平）。我们拒绝原假设。有强有力的证据表明样本数据1的均值与样本数据2的均值不同。\n\n## 配对t检验\n\
    \n配对t检验也称为匹配对或依赖t检验，用于每个样本中的元素被测试两次（前测和后测或重复测量）的研究中，并且当研究人员认为存在一些相似性（如家庭关系）时使用。假设如下：\n\
    \n- 差值呈正态分布\n- 观察值之间的差值是独立的，但一次测试与另一次测试之间是相关的\n\n配对t检验在许多研究中使用，特别是在与治疗前后相关的医学推理测试中。让我们回到智商测试分数——一名研究人员招募了一些学生，以查看培训前后分数是否存在差异，如下表所示：\n\
    \n| 学生 | 培训前分数 | 培训后分数 | 差值 |\n| :--- | :--- | :--- | :--- |\n| A | 95 | 95 |\
    \ 0 |\n| B | 98 | 110 | 12 |\n| C | 90 | 97 | 7 |\n| D | 115 | 112 | -3 |\n| E\
    \ | 112 | 117 | 5 |\n\n图4.13 – 培训前和培训后分数\n\n在这种情况下，我们不应该使用独立双样本t检验。这里应该检验差值的均值。我们可以通过使用直方图和QQ图来检查正态分布的假设，如下所示：\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_133_0.png)\n\n图4.14 – 检查配对t检验的正态性\n\
    \n通过观察QQ图，数据呈正态分布的证据比直方图更明显。\n\n假设差值是独立的。原假设和备择假设如下：\n\n$$H_0: \\mu_{pos} - \\\
    mu_{pre} = 0$$\n$$H_a: \\mu_{pos} - \\mu_{pre} > 0$$\n\n$d_i$ 表示每个学生培训前分数和培训后分数之间的差值。原假设和备择假设可以改写如下：\n\
    \n$$H_0: \\mu_d = 0$$\n$$H_a: \\mu_d > 0$$\n\n然后，检验统计量计算如下：\n\n$$t = \\frac{\\\
    bar{d} - \\mu_d}{\\frac{s_d}{\\sqrt{n}}}$$\n\n这里，$\\bar{d}$ 是差值的样本均值，$s_d$ 是差值的样本标准差。换句话说，配对t检验简化为单样本t检验。然而，我们可以直接使用scipy中的以下函数：\n\
    \n```\nstats.ttest_rel(data_pos, data_pre, alternative = {'two-sided', 'less',\

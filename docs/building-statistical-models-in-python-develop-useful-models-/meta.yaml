    # Part 1: Introduction to Statistics


    This part will cover the statistical concepts that are foundational to statistical
    modeling.

    It includes the following chapters:


    - Chapter 1, Sampling and Generalization

    - Chapter 2, Distributions of Data

    - Chapter 3, Hypothesis Testing

    - Chapter 4, Parametric Tests

    - Chapter 5, Non-Parametric Tests


    # Sampling and Generalization


    In this chapter, we will describe the concept of populations and sampling from
    populations, including some common strategies for sampling. The discussion of
    sampling will lead to a section that will describe generalization. Generalization
    will be discussed as it relates to using samples to make conclusions about their
    respective populations. When modeling for statistical inference, it is necessary
    to ensure that samples can be generalized to populations. We will provide an in-depth
    overview of this bridge through the subjects in this chapter.


    We will cover the following main topics:


    - Software and environment setup

    - Population versus sample

    - Population inference from samples

    - Sampling strategies – random, systematic, and stratified


    ## Software and environment setup


    **Python** is one of the most popular programming languages for data science and
    machine learning thanks to the large open source community that has driven the
    development of these libraries. Python’s ease of use and flexible nature made
    it a prime candidate in the data science world, where experimentation and iteration
    are key features of the development cycle. While there are new languages in development
    for data science applications, such as **Julia**, Python currently remains the
    key language for data science due to its wide breadth of open source projects,
    supporting applications from statistical modeling to deep learning. We have chosen
    to use Python in this book due to its positioning as an important language for
    data science and its demand in the job market.


    Python is available for all major operating systems: Microsoft Windows, macOS,
    and Linux. Additionally, the installer and documentation can be found at the official
    website: https://www.python.org/.'
  mdcn: '## 第7章，*多元线性回归*，在前一章的基础上，将简单线性回归模型扩展到更多维度。本章还讨论了使用多个解释变量建模时出现的问题，包括多重共线性、特征选择和降维。


    ## 第8章，*离散模型*，介绍了分类的概念，并开发了一个将变量分类到分类响应变量的离散水平的模型。本章首先开发了二元分类模型，然后将模型扩展到多元分类。最后，涵盖了泊松模型和负二项模型。


    ## 第9章，*判别分析*，讨论了几种用于分类的其他模型，包括线性判别分析和二次判别分析。本章还介绍了贝叶斯定理。


    ## 第10章，*时间序列简介*，介绍了时间序列数据，讨论了时间序列的自相关概念和时间序列的统计度量。本章还介绍了白噪声模型和平稳性。


    ## 第11章，*ARIMA模型*，讨论了单变量模型。本章首先讨论了平稳时间序列的模型，然后将讨论扩展到非平稳时间序列。最后，本章对模型评估进行了详细讨论。


    ## 第12章，*多元时间序列*，在前两章的基础上，介绍了多元时间序列的概念，并将ARIMA模型扩展到多个解释变量。本章还讨论了时间序列的互相关。


    ## 第13章，*生存分析*，介绍了生存数据，也称为事件发生时间数据。本章讨论了删失的概念以及删失对生存数据的影响。最后，本章讨论了生存函数、风险函数和风险比。


    ## 第14章，*生存模型*，在前一章的基础上，概述了几种用于生存数据的模型，包括Kaplan-Meier模型、指数模型和Cox比例风险模型。



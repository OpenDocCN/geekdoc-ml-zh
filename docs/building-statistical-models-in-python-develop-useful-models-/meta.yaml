    \ import stats\nIQ_pre = [95, 98, 90, 115, 112]\nIQ_pos = [95, 110, 97, 112, 117]\n\
    t_statistic, p_value = stats.ttest_rel(IQ_pos, IQ_pre, alternative = 'greater')\n\
    ```\n\n检验统计量为1.594，p值为0.093。因此，鉴于p值小于0.05且显著性水平 $\\alpha = 0.05$，我们拒绝原假设。有充分的证据表明培训对智商分数有显著影响。\n\
    \n## 多组检验和方差分析\n\n在前一章和前面的章节中，我们涵盖了两组之间的检验。在本节中，我们将介绍两种检验组间差异的方法，如下：\n\n- 使用 **Bonferroni校正**\
    \ 的成对检验\n- 方差分析\n\n当检验两组以上的差异时，我们将不得不使用多次检验，这会影响我们的 *第一类* 错误率。有几种方法可以控制错误率。我们将了解如何利用Bonferroni校正来控制\
    \ *第一类* 错误率。我们还将在本节讨论方差分析，它用于检验多个组均值的差异。\n\n## 显著性的多重检验\n\n在前面的章节中，我们研究了两组之间的比较。在本节中，我们将考虑当存在两组以上时如何进行检验。让我们再次考虑工厂示例，其中有几种型号（型号A、型号B和型号C）的机器在"

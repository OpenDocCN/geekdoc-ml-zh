- md: "## Modeling count data\n\nNow, let's look at how to model the response variable\
    \ of counts with the Poisson model. As mentioned previously, count data often\
    \ follows a Poisson distribution. The Poisson model is expressed mathematically\
    \ as follows:\n\n$$y = e^{b_0 + b_1x_1 + ... + b_nx_n}$$\n\nHere, *y* is the response\
    \ variable, *b* values are model coefficients, and *x* variables represent explanatory\
    \ variables. This should appear similar to the equation we used in the previous\
    \ chapter but with the addition of the exponentiation of the explanatory variables.\
    \ This type of model is called a **log-linear** model, which is a model where\
    \ the logarithm of the response variable is modeled by a linear combination of\
    \ variables. We can rewrite this equation by applying the natural logarithm to\
    \ both sides of the equation to make it explicit:\n\n$$\\ln(y) = b_0 + b_1x_1\
    \ + ... + b_nx_n$$\n\nNow, we have the logarithm of the response variable ( $\\\
    ln(y)$ ) expressed as a linear combination of explanatory variables.\n\n> **The\
    \ natural logarithm**\n> The Poisson model uses a special logarithm called the\
    \ natural logarithm. The natural logarithm of a number is the logarithm of that\
    \ number using the mathematical constant *e* as the base. The natural logarithm\
    \ is generally written as $\\ln(x)$, $\\log_e(x)$, or $\\log(x)$ (the first two\
    \ options are explicit, but the third option can be ambiguous). The logarithm\
    \ operation is the inverse of exponentiation. In this case, the natural logarithm\
    \ is the inverse of the exponential function: $\\ln(e^x) = x = e^{\\ln(x)}$. The\
    \ natural logarithm and exponential function are commonly used in statistics,\
    \ mathematics, and science.\n\nLet's look at an example. We will be using the\
    \ Bike Sharing Dataset from UCI (`https://archive.ics.uci.edu/ml/datasets/bike+sharing+dataset.`).\
    \ In this dataset, we have counts of bikes rented each day. There are two types\
    \ of rentals: pre-registered (registered) and on-demand at a location (casual).\
    \ In this example, we will model the weekly mean count of casually rented bikes\
    \ over a given year. The dataset provides several explanatory variables, including\
    \ environmental factors such as temperature and calendar information such as whether\
    \ a holiday occurred.\n\nWe will start by setting up the equation for our model\
    \ and then take a look at the results from fitting the model with `statsmodels`.\
    \ The model equation follows the form we discussed previously:\n\n$$\\ln(weekly\\\
    _mean\\_rental\\_count) = b_0 + b_1(temperature) + b_1(season) + b_2(weather\\\
    _situation) + b_3(humidity) + b_4(wind\\_speed) + b_5(holiday)$$\n\nWe can fit\
    \ this model with the given data using `statsmodels`, similar to how we did in\
    \ the previous chapter. An excerpt of the code to fit the model is shown here\
    \ (see the Jupyter Notebook for details on preprocessing):\n\n```\n# select variables\n\
    X = df.groupby('isoweek').mean()[['atemp', 'season',\n    'weathersit', 'hum',\
    \ 'windspeed', 'holiday']]\n# transform holiday variable as an indicator that\
    \ a holiday occurs\n# within that week\nX['holiday'] = X['holiday'].apply(lambda\
    \ x: 1 if x > 0.1 else 0)\n# add a constant for the model\nX = sm.add_constant(X)\n\
    # get the response variable\ny = df.groupby('isoweek').mean()['casual']\nfit_model\
    \ = sm.Poisson(y, X).fit()\nfit_model.summary()\n```\n\nAfter fitting the model,\
    \ we can get details on the coefficients using the `summary()` method. For this\
    \ model, we get the following output for the coefficients:\n\n| | coef | std err\
    \ | z | P>|z| | [0.025 | 0.975] |\n|---|---|---|---|---|---|---|\n| const | 4.1252\
    \ | 0.072 | 57.096 | 0.000 | 3.984 | 4.267 |\n| atemp | 3.0915 | 0.042 | 73.155\
    \ | 0.000 | 3.009 | 3.174 |\n| season | 0.0427 | 0.007 | 6.179 | 0.000 | 0.029\
    \ | 0.056 |\n| weathersit | -0.2387 | 0.032 | -7.422 | 0.000 | -0.302 | -0.176\
    \ |\n| hum | 1.2369 | 0.100 | 12.345 | 0.000 | 1.040 | 1.433 |\n| windspeed |\
    \ 1.2132 | 0.177 | 6.856 | 0.000 | 0.866 | 1.560 |\n| holiday | 0.0955 | 0.014\
    \ | 6.771 | 0.000 | 0.068 | 0.123 |\n\nFigure 8.8 – Poisson model summary\n\n\
    Just like the modeling example for linear regression, these coefficient values\
    \ are estimates of the parameters listed in our model. All the explanatory variables\
    \ in the model appear to be significant in the model. Interestingly, based on\
    \ the value of the coefficient estimates, temperature (atemp) appears to be the\
    \ most influential factor, followed by humidity (hum) and wind speed. With the\
    \ model fit and no need to remove insignificant variables, we can assess the model's\
    \ performance. This model has an MAE of 155, which corresponds to a MAPE of 36%.\n\
    \nThe Poisson model depends strongly on the assumption that the response variable\
    \ has a Poisson distribution. In the next section, we will look at a similar type\
    \ of model for count data, but with weaker distributional assumptions.\n\n## The\
    \ negative binomial regression model\n\nAnother useful approach to **discrete\
    \ regression** is the **log-linear negative binomial regression** model, which\
    \ uses the negative binomial probability distribution. At a high level, negative\
    \ binomial regression is useful with *over-dispersed count data* where the *conditional\
    \ mean of the count is smaller than the conditional variance of the count*. Model\
    \ **over-dispersion** is where the variance of the target variable is greater\
    \ than the mean assumed by the model. In a regression model, the mean is the regression\
    \ line. We make the determination of using the negative binomial model based on\
    \ target variable counts analysis (mean versus variance) and supply a measure\
    \ of model over-dispersion to the negative binomial model to adjust for the over-dispersion,\
    \ which we will discuss here.\n\nIt is important to note that the negative binomial\
    \ model is not for modeling simply discrete data, but specifically **count data**\
    \ associated with a fixed number of **random** trials, such as modeling the number\
    \ of attempts before an event occurs – or failing to occur – in a random sampling\
    \ scenario. The model operates only on count data, where each count response of\
    \ the target variable is based on a finite set of outcomes. Additionally, because\
    \ the count data is the result of repeated binomial trials, the order of count\
    \ arrangement does not matter.\n\n## Negative binomial distribution\n\nThe following\
    \ is an example of the negative binomial distribution of failure counts with a\
    \ conditional mean of 17 and a conditional variance of 52:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_238_0.png)\n\
    \nFigure 8.9 – Negative binomial distribution example\n\nThe binomial distribution\
    \ is a construct of counts of successes in a fixed count of random trials ($X\
    \ = (X_1, X_2, \\dots)$) of a Bernoulli random variable, which is a variable that\
    \ has one of two outcome values: 0 or 1. The negative binomial distribution is\
    \ a construct of the count of failures in a fixed count of random draws of the\
    \ Bernoulli random variable. This distinction is important because a model using\
    \ binomial regression models a binary outcome across observations, whereas a negative\
    \ binomial regression model models a count outcome across observations. The negative\
    \ binomial distribution is the inverse of the binomial distribution. The probability\
    \ mass function for the negative binomial distribution is as follows:\n\n$$P(X\
    \ - x) = \\binom{x + n - 1}{n - 1} p^n (1 - p)^x$$\n\nHere, there are $x$ failures\
    \ and $n - 1$ successes in a set of $x + n - 1$ trials reaching success at trial\
    \ $x + n$.\n\nConcerning the Poisson distribution, the negative binomial *does\
    \ not require strict adherence to the assumption that conditional variance is\
    \ equal to the conditional mean* as it includes an additional parameter, $\\alpha$,\
    \ to explain the extra variance, whereas the Poisson model assumes the variance\
    \ is equal to the mean, $\\mu$. The negative binomial model assumes the variance,\
    \ here based on the Poisson-gamma mixture distribution, is equal to the following:\n\
    \n$$\\mu(1 + \\alpha\\mu)$$\n\nThis reduces to the following:\n\n$$(\\mu + \\\
    alpha\\mu^2)$$"
  mdcn: "## 建模计数数据\n\n现在，让我们看看如何使用泊松模型对计数类型的响应变量进行建模。如前所述，计数数据通常服从泊松分布。泊松模型的数学表达式如下：\n\
    \n$$y = e^{b_0 + b_1x_1 + ... + b_nx_n}$$\n\n其中，*y* 是响应变量，*b* 值是模型系数，*x* 变量代表解释变量。这看起来应该与我们在上一章使用的方程相似，但增加了对解释变量的指数运算。这种类型的模型称为\
    \ **对数线性** 模型，即对响应变量的对数进行线性组合建模。我们可以通过对方程两边取自然对数来重写这个方程，使其更明确：\n\n$$\\ln(y) =\
    \ b_0 + b_1x_1 + ... + b_nx_n$$\n\n现在，我们将响应变量的对数（ $\\ln(y)$ ）表示为解释变量的线性组合。\n\n\
    > **自然对数**\n> 泊松模型使用一种特殊的对数，称为自然对数。一个数的自然对数是以数学常数 *e* 为底的对数。自然对数通常写作 $\\ln(x)$、$\\\
    log_e(x)$ 或 $\\log(x)$（前两种写法明确，但第三种可能产生歧义）。对数运算是指数运算的逆运算。在这种情况下，自然对数是指数函数的逆运算：$\\\
    ln(e^x) = x = e^{\\ln(x)}$。自然对数和指数函数在统计学、数学和科学中被广泛使用。\n\n让我们看一个例子。我们将使用来自 UCI\
    \ 的自行车共享数据集（`https://archive.ics.uci.edu/ml/datasets/bike+sharing+dataset.`）。在这个数据集中，我们有每天租用自行车的数量。有两种类型的租赁：预先注册（注册用户）和现场按需（临时用户）。在这个例子中，我们将对给定年份内每周临时租赁自行车的平均数量进行建模。该数据集提供了几个解释变量，包括温度等环境因素以及是否为节假日等日历信息。\n\
    \n我们将首先建立模型的方程，然后查看使用 `statsmodels` 拟合模型的结果。模型方程遵循我们之前讨论的形式：\n\n$$\\ln(weekly\\\
    _mean\\_rental\\_count) = b_0 + b_1(temperature) + b_1(season) + b_2(weather\\\
    _situation) + b_3(humidity) + b_4(wind\\_speed) + b_5(holiday)$$\n\n我们可以使用 `statsmodels`\
    \ 用给定的数据拟合这个模型，类似于我们在上一章所做的。这里展示了拟合模型的代码片段（有关预处理的详细信息，请参阅 Jupyter Notebook）：\n\
    \n```\n# select variables\nX = df.groupby('isoweek').mean()[['atemp', 'season',\n\
    \    'weathersit', 'hum', 'windspeed', 'holiday']]\n# transform holiday variable\
    \ as an indicator that a holiday occurs\n# within that week\nX['holiday'] = X['holiday'].apply(lambda\
    \ x: 1 if x > 0.1 else 0)\n# add a constant for the model\nX = sm.add_constant(X)\n\
    # get the response variable\ny = df.groupby('isoweek').mean()['casual']\nfit_model\
    \ = sm.Poisson(y, X).fit()\nfit_model.summary()\n```\n\n拟合模型后，我们可以使用 `summary()`\
    \ 方法获取系数的详细信息。对于这个模型，我们得到以下系数输出：\n\n| | coef | std err | z | P>|z| | [0.025 |\
    \ 0.975] |\n|---|---|---|---|---|---|---|\n| const | 4.1252 | 0.072 | 57.096 |\
    \ 0.000 | 3.984 | 4.267 |\n| atemp | 3.0915 | 0.042 | 73.155 | 0.000 | 3.009 |\
    \ 3.174 |\n| season | 0.0427 | 0.007 | 6.179 | 0.000 | 0.029 | 0.056 |\n| weathersit\
    \ | -0.2387 | 0.032 | -7.422 | 0.000 | -0.302 | -0.176 |\n| hum | 1.2369 | 0.100\
    \ | 12.345 | 0.000 | 1.040 | 1.433 |\n| windspeed | 1.2132 | 0.177 | 6.856 | 0.000\
    \ | 0.866 | 1.560 |\n| holiday | 0.0955 | 0.014 | 6.771 | 0.000 | 0.068 | 0.123\
    \ |\n\n图 8.8 – 泊松模型摘要\n\n就像线性回归的建模示例一样，这些系数值是我们模型中列出参数的估计值。模型中的所有解释变量似乎都是显著的。有趣的是，根据系数估计值，温度（atemp）似乎是最具影响力的因素，其次是湿度（hum）和风速。模型拟合良好，无需移除不显著的变量，我们可以评估模型的性能。该模型的平均绝对误差（MAE）为\
    \ 155，对应的平均绝对百分比误差（MAPE）为 36%。\n\n泊松模型强烈依赖于响应变量服从泊松分布的假设。在下一节中，我们将介绍一种用于计数数据的类似模型，但其分布假设更弱。\n\
    \n## 负二项回归模型\n\n**离散回归** 的另一种有用方法是 **对数线性负二项回归** 模型，它使用负二项概率分布。从高层次来看，负二项回归适用于\
    \ *过度离散的计数数据*，其中 *计数的条件均值小于计数的条件方差*。模型 **过度离散** 是指目标变量的方差大于模型假设的均值。在回归模型中，均值就是回归线。我们根据目标变量计数分析（均值与方差）来决定是否使用负二项模型，并向负二项模型提供一个模型过度离散的度量来调整过度离散，我们将在下面讨论这一点。\n\
    \n需要注意的是，负二项模型并非用于简单地建模离散数据，而是专门用于建模与固定数量的 **随机** 试验相关的 **计数数据**，例如在随机抽样场景中建模事件发生（或未发生）之前的尝试次数。该模型仅适用于计数数据，其中目标变量的每个计数响应都基于一组有限的结果。此外，由于计数数据是重复二项试验的结果，因此计数排列的顺序无关紧要。\n\
    \n## 负二项分布\n\n以下是条件均值为 17、条件方差为 52 的失败次数负二项分布示例：\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_238_0.png)\n\
    \n图 8.9 – 负二项分布示例\n\n二项分布是伯努利随机变量（一种具有两个结果值：0 或 1 的变量）在固定次数随机试验（$X = (X_1, X_2,\
    \ \\dots)$）中成功次数的构造。负二项分布是伯努利随机变量在固定次数随机抽取中失败次数的构造。这一区别很重要，因为使用二项回归的模型对观测值的二元结果进行建模，而负二项回归模型对观测值的计数结果进行建模。负二项分布是二项分布的逆运算。负二项分布的概率质量函数如下：\n\
    \n$$P(X - x) = \\binom{x + n - 1}{n - 1} p^n (1 - p)^x$$\n\n其中，在 $x + n - 1$ 次试验中，有\
    \ $x$ 次失败和 $n - 1$ 次成功，并在第 $x + n$ 次试验时达到成功。\n\n关于泊松分布，负二项分布 *不要求严格遵守条件方差等于条件均值的假设*，因为它包含一个额外的参数\
    \ $\\alpha$ 来解释额外的方差，而泊松模型假设方差等于均值 $\\mu$。负二项模型假设方差（这里基于泊松-伽马混合分布）等于以下公式：\n\n\
    $$\\mu(1 + \\alpha\\mu)$$\n\n这可以简化为：\n\n$$(\\mu + \\alpha\\mu^2)$$"

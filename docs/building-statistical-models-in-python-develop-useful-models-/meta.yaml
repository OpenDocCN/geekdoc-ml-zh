    \n## Summary\n\nIn this chapter, we discussed various methods for modeling univariate\
    \ time series data from stationary time series models such as ARMA to non-stationary\
    \ models such as ARIMA. We started with stationary models and discussed how to\
    \ identify modeling approaches based on the characteristics of time series. Then\
    \ we built on the stationary models by adding a term in the model to stationarize\
    \ time series. Finally, we talked about seasonality and how to account for seasonality\
    \ in an ARIMA model. While these methods are powerful for forecasting, they do\
    \ not incorporate potential information from other external variables. As in the\
    \ previous chapter, we will see that external variables can help improve forecasts.\
    \ In the next chapter, we will look at multivariate methods for time series data\
    \ to take advantage of other explanatory variables.\n\n## References\n\nPlease\
    \ refer to the final word file for how the references should look.\n\n1. *APPLIED\
    \ TIME SERIES ANALYSIS WITH R*, W. Woodward, H. Gray, A. Elliott. Taylor & Francis\
    \ Group, LLC. 2017.\n2. Box, G. E. P., Jenkins, G. M. and Reinsel, G. C. (1976)\
    \ *Time Series Analysis, Forecasting and Control*. Third Edition. Holden-Day.\
    \ Series G.\n3. Brownlee, J, (2017) *Simple Time Series Forecasting Models to\
    \ Test So That You Don't Fool Yourself* (https://machinelearningmastery.com/simple-time-series-forecasting-models/).\n\
    \n# 12 Multivariate Time Series\n\nThe models we discussed in the previous chapter\
    \ only depended on the previous values of the single variable of interest. Those\
    \ models are appropriate when we only have a single variable in our time series.\
    \ However, it is common to have multiple variables in time-series data. Often,\
    \ these other variables in the series can improve forecasting of the variable\
    \ of interest. We will discuss models for time series with multiple variables\
    \ in this chapter. We will first discuss the correlation relationship between\
    \ time-series variables, then discuss how we can model multivariate time series.\
    \ While there are many models for multivariate time-series data, we will discuss\
    \ two models that are both powerful and widely used: **autoregressive integrated\
    \ moving average with exogenous variables (ARIMAX)** and **vector autoregressive\
    \ (VAR)**. Understanding these two models will extend the reader's model toolbox\
    \ and provide building blocks for the reader to learn more about multivariate\
    \ time-series models.\n\nIn this chapter, we're going to cover the following main\
    \ topics:\n\n- Multivariate time series\n- ARIMAX\n- VAR modeling\n\n## Multivariate\
    \ time series\n\nIn the previous chapter, we discussed models for **univariate\
    \ time series** or a time series of one variable. However, in many modeling situations,\
    \ it is common to have multiple time-varying variables that are measured together.\
    \ A time series consisting of multiple time-varying variables is called a **multivariate\
    \ time series**. Each variable in the time series is called a **covariate**. For\
    \ example, a time series of weather data might include temperature, rain amount,\
    \ wind speed, and relative humidity. Each of these variables, in the weather dataset,\
    \ is a univariate time series, and together, a multivariate time series and each\
    \ pair of variables are covariates."

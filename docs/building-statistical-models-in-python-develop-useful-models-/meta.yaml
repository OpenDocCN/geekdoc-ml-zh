- md: 'The null hypothesis for this test is that **the value of the β parameter is
    equal to zero**. Recall the following from *Chapter 3, Hypothesis Testing*:


    - A p-value below the significance threshold means we reject the null hypothesis.

    - A p-value above the significance threshold means that we fail to reject the
    null hypothesis.


    In this example, we would reject the null hypothesis for the `bmi` variable, but
    we fail to reject the null hypothesis for the age variable. Once we have determined
    the significant variables, we can move on to interpreting the meaning of the significant
    variables. We will not be able to provide an interpretation of the other variables
    because we cannot reject that their coefficient values might be zero. If the coefficient
    value is zero, then the variable makes no contribution to the model. Let''s look
    at how to interpret the coefficients.


    Often, when we construct a model, we want to understand how the parts of the model
    affect the output. In an MLR model, this comes down to understanding the coefficients
    of the model. We have two types of variables, continuous and categorical, and
    the associated coefficients have different meanings.


    ## Interpreting continuous variable coefficients


    For the continuous variables, such as BMI, as the value of the variable increases,
    so does its significance to the output of the model. A unit increase in the value
    of the variable is associated with an increase in the mean of the dependent variable
    by the size of the coefficient with all other variables held constant. Let''s
    take the `bmi` variable as an example. Since the coefficient of the `bmi` variable
    is approximately 526, we would say, "A unit increase in `bmi` would be associated
    with a 526 increase in the mean of the diabetes measurement with all other variables
    held constant." Of course, the coefficients can also take on negative values.


    ## Interpreting categorical variable coefficients


    For the categorical variables, such as `sex`, recall that, unlike the continuous
    variables, the values of the categorical are dummy-encoded, and therefore can
    only take on two values: zero and one. Also, recall that one level was chosen
    to be the reference level. In this case, `sex` level 0 is the reference level,
    and we can compare this reference to `sex` level 1. When we use the reference
    level, the coefficient will not affect the output of the model. Thus, the categorical-level
    change is associated with a change in the mean of the dependent variable by the
    size of the coefficient with all other variables held constant. Since the coefficient
    of the `sex` variable is approximately -22, we would say, "The level of `sex`
    is associated with a decrease of 22 in the mean of the diabetes measurement compared
    to the reference level with all other variables held constant."


    ## Diagnostic tests


    The bottom section of the fit results contains diagnostic statistics for the data
    and residuals. Glancing over the list, several should be from *Chapter 6, Simple
    Linear Regression*. The Durbin-Watson test is a test for serial correlation (data
    sampled sequentially over time). A result around 2 is not indicative of serial
    correlation. The skew and kurtosis are measurements of the shape of the distribution
    of the residuals. These results indicate almost no skew, but possibly some kurtosis.
    These are likely small deviations from the normal distribution and are not cause
    for concern as we saw in the plots earlier.


    In this section, we looked at our first model that can use multiple explanatory
    variables to predict a response variable. However, we noticed that several of
    the variables included in the model were not statistically significant. For this
    model, we only selected features by removing any features that had high VIF scores,
    but there are other methods to consider when choosing features. In the next section,
    we will discuss comparing models and feature selection.


    ## Feature selection


    There are many factors that influence the success or failure of a model, such
    as sampling, data quality, feature creation, and model selection, several of which
    we have not covered. One of those critical factors is **feature selection**. Feature
    selection is simply the process of choosing or systematically determining the
    best features for a model from an existing set of features. We have done some
    simple feature selection already. In the previous section, we removed features
    that had high VIFs. In this section, we will look at some methods for feature
    selection. The methods presented in this section fall into two categories: statistical
    methods for feature selection and performance-based methods for feature selection.
    Let''s start with statistical methods.


    ### Statistical methods for feature selection


    Statistical methods for feature selection rely on the primary tool that we have
    used throughout the previous chapters: statistical significance. The methods presented
    in this sub-section will be based on the statistical properties of the features
    themselves. We will cover two statistical methods for feature selection: correlation
    and statistical significance.


    ### Correlation


    The first statistical method we will discuss is **correlation**. We have discussed
    correlation in this chapter and in previous chapters; recall that correlation
    is a description of the relationship between two variables. Variables can be positively
    correlated, uncorrelated, or negatively correlated. In terms of feature selection,
    we want to *remove features that are uncorrelated with the response variable*.
    A feature that is uncorrelated with the response variable does not have a relationship
    with the response variable. Thus, an uncorrelated feature would not be a good
    predictor of the response variable.


    Recall from *Chapter 4, Parametric Tests*, that we can use Pearson''s correlation
    coefficient to measure the linear correlation between two variables. In fact,
    we can calculate the correlation coefficient between all features and the target
    variable. After performing those calculations, we can construct a correlation
    ranking as shown in *Figure 7.7*.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_205_0.png)


    When evaluating features based on correlation, we are most interested in features
    with a high *absolute* correlation. For example, the correlation ranking in *Figure
    7.7* shows the following:


    - `bmi` and `s5` exhibit a strong correlation with the response variable.

    - `bp`, `s4`, `s6`, and `s3` exhibit moderate correlation with the response variable.

    - `s1`, `age`, and `s2` exhibit a weak correlation with the response variable.


    While `sex` may appear to show no correlation with the response variable, Pearson''s
    correlation coefficient cannot be used with categorical features. From this correlation
    ranking, we can see that, at least, `bmi`, `s5`, and `bp`, are likely among the
    best features in this dataset for predicting the response. In fact, these features
    were considered statistically significant in our model. Now let''s discuss selection
    using statistical significance.


    ### Statistical significance


    Assessing features using correlation is generally a good first step for feature
    selection. We can easily eliminate features that are uncorrelated with the response
    variable. However, depending on the problem, we could still be left with many
    features that are correlated with the response. We can further select features
    using the statistical significance of the feature in the context of a model. However,
    in recent years, these methods for feature selection have somewhat fallen out
    of favor in the community. For this reason, we will not focus on these methods,
    but will only describe them for understanding.


    Recall when we fit the MLR model, the results included a test for statistical
    significance for each feature in the model. We can use that test to select features.
    There are three well-known algorithms for selecting features based on statistical
    significance: **forward selection**, **backward selection**, and **stepwise regression**.
    In forward selection, we start without any variables in the model and then iteratively
    add one variable at a time using the p-value to choose the best feature to add
    at each iteration. We stop once the p-values of any features in the model size
    are above a predefined threshold, such as 0.05. Backward selection takes the opposite
    approach. We start with all features in the model, then iteratively remove features
    one variable at a time using the p-value to determine the least important feature.
    The final algorithm is stepwise regression (also called bidirectional elimination).
    Stepwise regression is performed using both forward and backward tests. Start
    with no features in the model, then in each iteration, perform one forward selection
    step followed by one backward selection pass.


    These selection methods were widely used in the past. However, in recent years,
    performance-based methods have become more widely used. Let''s discuss performance-based
    methods now.


    ### Performance-based methods for feature selection


    The primary issue with the statistical feature selection methods mentioned previously
    is that they tend to create **overfit** models. An overfit model is a model that
    fits the given data exactly and fails to generalize to new data. Performance-based
    methods overcome overfitting using a method called **cross-validation**. In cross-validation,
    we have two datasets: a **training dataset** used to fit the model and a **test
    dataset** for evaluating the model. We can build models from multiple sets of
    features, fit all those potential models on the training set, and finally rank
    them based on the performance of the models on the testing set with a given metric.


    ### Comparing models


    Before we get into feature selection methods, let''s first discuss how to compare
    models. We use metrics to compare models. On a basic level, we can use metrics
    to help us determine whether one set of features is better than another set of
    features based on model performance. Many metrics can be used for comparing models.
    We will discuss two metrics, **mean square error (MSE)** and **mean absolute percentage
    error (MAPE)**, which are, by far, two of the most commonly used metrics for regression
    models.


    ### MSE


    The MSE is given by the following formula, where $N$ is the number of samples,
    $y$ is the response variable, and $\hat{y}$ is the predicted value of the response
    variable.


    $$MSE = \frac{1}{N} \sum_{i=1}^{N} (y_i - \hat{y}_i)^2$$'
  mdcn: '本次检验的**零假设是β参数的值等于零**。请回顾*第3章 假设检验*中的内容：


    -   p值低于显著性阈值意味着我们拒绝零假设。

    -   p值高于显著性阈值意味着我们未能拒绝零假设。


    在此示例中，我们将拒绝`bmi`变量的零假设，但未能拒绝年龄变量的零假设。一旦确定了显著变量，我们就可以继续解释这些显著变量的含义。我们将无法解释其他变量，因为我们无法拒绝其系数值可能为零的假设。如果系数值为零，则该变量对模型没有贡献。让我们看看如何解释系数。


    通常，当我们构建模型时，我们希望理解模型的各个部分如何影响输出。在多元线性回归模型中，这归结为理解模型的系数。我们有两种类型的变量：连续变量和分类变量，相关的系数具有不同的含义。


    ## 解释连续变量系数


    对于连续变量，例如BMI，随着变量值的增加，其对模型输出的重要性也随之增加。在保持所有其他变量不变的情况下，变量值每增加一个单位，因变量的平均值就会增加系数的大小。让我们以`bmi`变量为例。由于`bmi`变量的系数约为526，我们可以说：“在保持所有其他变量不变的情况下，`bmi`每增加一个单位，糖尿病测量值的平均值将增加526。”当然，系数也可以取负值。


    ## 解释分类变量系数


    对于分类变量，例如`sex`，请记住，与连续变量不同，分类变量的值是虚拟编码的，因此只能取两个值：零和一。此外，请记住，选择了一个水平作为参考水平。在这种情况下，`sex`水平0是参考水平，我们可以将此参考与`sex`水平1进行比较。当我们使用参考水平时，系数不会影响模型的输出。因此，在保持所有其他变量不变的情况下，分类水平的变化与因变量平均值的变化相关，变化量等于系数的大小。由于`sex`变量的系数约为-22，我们可以说：“在保持所有其他变量不变的情况下，与参考水平相比，`sex`水平与糖尿病测量值平均值降低22相关。”


    ## 诊断检验


    拟合结果的底部部分包含数据和残差的诊断统计量。浏览列表，其中一些应该来自*第6章 简单线性回归*。Durbin-Watson检验用于检验序列相关性（随时间顺序采样的数据）。结果在2附近表明不存在序列相关性。偏度和峰度是残差分布形状的度量。这些结果表明几乎没有偏度，但可能存在一些峰度。这些可能是与正态分布的小偏差，正如我们之前在图中看到的那样，无需担心。


    在本节中，我们研究了第一个可以使用多个解释变量来预测响应变量的模型。然而，我们注意到模型中包含的几个变量在统计上并不显著。对于这个模型，我们仅通过移除具有高VIF分数的特征来选择特征，但在选择特征时还有其他方法需要考虑。在下一节中，我们将讨论比较模型和特征选择。


    ## 特征选择


    有许多因素会影响模型的成功或失败，例如抽样、数据质量、特征创建和模型选择，其中一些我们尚未涉及。其中一个关键因素是**特征选择**。特征选择只是从现有特征集中选择或系统确定模型最佳特征的过程。我们已经进行了一些简单的特征选择。在上一节中，我们移除了具有高VIF的特征。在本节中，我们将介绍一些特征选择方法。本节介绍的方法分为两类：基于统计的特征选择方法和基于性能的特征选择方法。让我们从统计方法开始。


    ### 基于统计的特征选择方法


    基于统计的特征选择方法依赖于我们在前面章节中使用的主要工具：统计显著性。本小节介绍的方法将基于特征本身的统计属性。我们将介绍两种基于统计的特征选择方法：相关性和统计显著性。


    ### 相关性


    我们将讨论的第一个统计方法是**相关性**。我们在本章和前面的章节中讨论过相关性；请记住，相关性是对两个变量之间关系的描述。变量可以是正相关、不相关或负相关。就特征选择而言，我们希望*移除与响应变量不相关的特征*。与响应变量不相关的特征与响应变量没有关系。因此，不相关的特征不会是响应变量的良好预测因子。


    请回顾*第4章 参数检验*，我们可以使用皮尔逊相关系数来衡量两个变量之间的线性相关性。实际上，我们可以计算所有特征与目标变量之间的相关系数。执行这些计算后，我们可以构建一个相关性排名，如*图7.7*所示。


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_205_0.png)


    在基于相关性评估特征时，我们最感兴趣的是具有高*绝对*相关性的特征。例如，*图7.7*中的相关性排名显示：


    -   `bmi`和`s5`与响应变量表现出强相关性。

    -   `bp`、`s4`、`s6`和`s3`与响应变量表现出中等相关性。

    -   `s1`、`age`和`s2`与响应变量表现出弱相关性。


    虽然`sex`可能看起来与响应变量没有相关性，但皮尔逊相关系数不能用于分类特征。从这个相关性排名中，我们可以看到，至少`bmi`、`s5`和`bp`可能是该数据集中预测响应的最佳特征之一。事实上，这些特征在我们的模型中被认为是统计显著的。现在让我们讨论使用统计显著性进行选择。


    ### 统计显著性


    使用相关性评估特征通常是特征选择的一个良好第一步。我们可以轻松地消除与响应变量不相关的特征。然而，根据问题的不同，我们可能仍然会留下许多与响应相关的特征。我们可以进一步使用特征在模型上下文中的统计显著性来选择特征。然而，近年来，这些特征选择方法在社区中已有些失宠。因此，我们将不重点关注这些方法，而仅对其进行描述以供理解。


    请记住，当我们拟合多元线性回归模型时，结果包括对模型中每个特征的统计显著性检验。我们可以使用该检验来选择特征。有三种著名的基于统计显著性选择特征的算法：**前向选择**、**后向选择**和**逐步回归**。在前向选择中，我们从模型中没有任何变量开始，然后迭代地一次添加一个变量，使用p值在每次迭代中选择要添加的最佳特征。一旦模型中任何特征的p值高于预定义的阈值（例如0.05），我们就停止。后向选择采取相反的方法。我们从模型中的所有特征开始，然后迭代地一次移除一个变量，使用p值来确定最不重要的特征。最后一种算法是逐步回归（也称为双向消除）。逐步回归使用前向和后向检验进行。从模型中没有特征开始，然后在每次迭代中，执行一次前向选择步骤，然后执行一次后向选择过程。


    这些选择方法过去被广泛使用。然而，近年来，基于性能的方法得到了更广泛的使用。现在让我们讨论基于性能的方法。


    ### 基于性能的特征选择方法


    前面提到的统计特征选择方法的主要问题是它们倾向于创建**过拟合**模型。过拟合模型是完全拟合给定数据但无法泛化到新数据的模型。基于性能的方法使用一种称为**交叉验证**的方法来克服过拟合。在交叉验证中，我们有两个数据集：一个用于拟合模型的**训练数据集**和一个用于评估模型的**测试数据集**。我们可以从多个特征集构建模型，在训练集上拟合所有这些潜在模型，最后根据模型在测试集上使用给定指标的表现对它们进行排名。


    ### 比较模型


    在我们深入特征选择方法之前，让我们首先讨论如何比较模型。我们使用指标来比较模型。在基本层面上，我们可以使用指标来帮助我们根据模型性能确定一组特征是否优于另一组特征。许多指标可用于比较模型。我们将讨论两个指标：**均方误差（MSE）**和**平均绝对百分比误差（MAPE）**，它们是迄今为止回归模型最常用的两个指标。


    ### MSE


    MSE由以下公式给出，其中$N$是样本数量，$y$是响应变量，$\hat{y}$是响应变量的预测值。


    $$MSE = \frac{1}{N} \sum_{i=1}^{N} (y_i - \hat{y}_i)^2$$'

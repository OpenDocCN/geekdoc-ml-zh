    # Tests with more than two groups and ANOVA


    In the previous chapter and previous sections, we covered tests between two groups.
    In this section, we will cover two methods for testing differences between groups,
    as follows:


    +   - Pairwise tests with the **Bonferroni correction**

    - ANOVA


    When testing for differences between more than two groups, we will have to use
    multiple tests, which will affect our *type I* error rate. There are several methods
    to control the error rate. We will see how to utilize the Bonferroni correction
    to control the *Type I* error rate. We will also discuss ANOVA in this section,
    which is used to test for a difference in means of multiple groups.


    # Multiple tests for significance


    In the previous sections, we looked at making a comparison between two groups.
    In this section, we will consider how to perform tests when there are more than
    two groups present. Let''s again consider the factory example where we have several
    models (model A, model B, and model C) of machines on'
  merge: -1
  pgno: 134
- img_proc: true
  md: 'a factory floor, and these machines are used to perform the same operation
    in the factory. A plausible question of interest is: *Does one machine model have
    a higher mean output than the other two models?* To make this determination, we
    would need to do three tests comparing the difference in means of each model to
    the other models, testing that the difference in means is different than zero.
    These are the null hypotheses we would need to test:


    ```

    $$\mu_{output,A} - \mu_{output,B} = 0$$

    $$\mu_{output,B} - \mu_{output,C} = 0$$

    $$\mu_{output,A} - \mu_{output,C} = 0$$

    ```


    When performing multiple tests, we will need to apply p-value corrections for
    our expected error rate. Recall that in *Chapter 3, Hypothesis Testing*, we defined
    the expected error rate for a hypothesis test as $\alpha$. This is the rate at
    which we expect a *single* hypothesis test to result in a *Type I* error. In our
    example with factory machines, we are making three hypothesis tests, which means
    *we are three times more likely to see a Type I error*. While our example specifically
    considers multiple tests for differences in means, this applies to any type of
    hypothesis test. In these situations with multiple tests, we will generally define
    a **familywise error rate (FWER)** and apply p-value corrections to control for
    the FWER. The FWER is the probability of making a *Type I* error from a group
    of hypothesis tests. The error rate from tests within the group is the **individual
    error rate (IER)**. We will define the IER and FWER as follows:


    +   - **IER**: The expected *Type I* error rate for an individual hypothesis test

    - **FWER**: The expected *Type I* error rate for a group of hypothesis tests


    We will discuss one method for p-value correction in this section to provide intuition
    for the rationale.


    # **The Bonferroni correction**


    One method for adjusting the p-value to control multiple hypothesis tests is the
    Bonferroni correction. The Bonferroni correction controls the FWER by uniformly
    reducing the significance level of each individual test in the family of tests.
    Given that we have $m$ tests in a family each with the p-value $p_i$, then the
    p-value correction is given as follows:


    ```

    $$p_i \leq \frac{\alpha}{m}$$

    ```


    Taking our previous example of three models of machines, we have a family of three
    tests, making $m = 3$. If we let FWER be 0.05, then, with the Bonferroni correction,
    the level of significance for the three individual tests is this:


    ```

    $$\frac{0.05}{3} = 0.0167$$

    ```


    Thus, in this example, any of the individual tests would be required to have a
    p-value of 0.0167 to be considered significant.'

    ## 9 Discriminant Analysis


    In the previous chapter, we discussed discrete regression models, including classification
    using logistic regression. In this chapter, we will begin with an overview of
    probability, expanding into conditional and independent probability. We then discuss
    how these two approaches to understanding the laws of probability form the basis
    for Bayes’ Theorem, which is used directly to expand an approach called Bayesian
    statistics. Following this topic, we dive into **Linear Discriminant Analysis
    (LDA)** and **Quadratic Discriminant Analysis (QDA)**, two powerful classifiers
    that model data using the Bayesian approach to probability modeling.


    In this chapter we’re going to cover the following main topics:


    - Bayes’ Theorem

    - LDA

    - QDA


    ### Bayes’ theorem


    In this section, we will discuss **Bayes’ Theorem**, which is used in the classification
    models described later in this chapter. We will start the chapter by discussing
    the basics of probability. Then, we will take a look at dependent events and discuss
    how Bayes’ Theorem is related to dependent events.


    ### Probability


    Probability is a measurement of the likelihood that an event occurs or a certain
    outcome occurs. Generally, we can group events into two types of events: **independent
    events** and **dependent events**. The distinction between the types of events
    is in the name. An independent event is an event that is not affected or influenced
    by the occurrences of other events, while a dependent event is affected or influenced
    by the occurrences of other events.


    Let’s think about some examples of these events. For the first example, think
    about a fair coin toss. A coin toss can result in one of two states: heads and
    tails. If the coin is fair, there is a one-in-two chance that the toss will result
    in heads or tails. That means that the probability of heads or tails is 0.5 in
    a fair coin toss. We can calculate probability using the following formula when
    events are countable:


    $$P(E) = \frac{\text{Count of Desired Outcomes}}{\text{Total Number of Outcomes}}$$


    Here, $P(E)$ is the probability of the desired outcome. In the coin-toss example,
    the desired outcome is either heads or tails, each of which can only occur once
    per coin toss. Thus, for the coin toss, the count of desired events is one. The
    total number of outcomes is two because there are two possible states from a coin
    toss. Putting these numbers in the preceding equation yields 0.5 for heads and
    0.5 for tails. Now, putting your experience to work, does a previous coin toss
    give you any knowledge about the next toss of the same coin? It does not because
    *each coin toss is independent of every other coin toss*; it is an independent
    event.


    Now, let’s consider another example. Say we have a bag with three red marbles
    and five blue marbles. Let’s calculate the probability of selecting a red marble
    from the bag: $P(Red)$. There are eight total marbles, which is the total number
    of outcomes in the equation. We want to select a red marble, which means the count
    of desired outcomes is three. This means that the probability of selecting red
    marble from the bag is 3/8. Now, let’s calculate the probability of selecting
    a blue marble from the bag: $P(Blue)$. There are five blue marbles and eight total
    marbles, so the probability of selecting a blue marble from the bag is 5/8. Notice
    that the sum of the two probabilities is one: $P(Red) + P(Blue) = 3/8 + 5/8 =
    1$. This brings up an important property of probabilities: the total probability
    must be equal to one. This, of course, means that once we calculated the probability
    of selecting a red marble, we could have calculated the probability of selecting
    a blue marble by subtracting the probability of selecting a red marble from one.
    The property of probabilities is very useful and is used commonly in statistics
    and **machine learning (ML)**.


    Coming back to the example with red and blue marbles, let’s think about the type
    of event represented by this example. We select a marble from the bag. Now, there
    are two possible options next: (1) we replace the selected marble and select a
    marble from the bag again, and (2) we do not replace the marble and select a new
    marble from the remaining seven marbles in the bag. The first case is called **selection
    with replacement**. Selection with replacement is an independent event because
    the bag is reset before each draw from the bag. The second case is called **selection
    without replacement**. Selection without replacement is where you find dependent
    events. The first time you select a marble, the probability is the same as described
    previously (an independent event). However, if the marble is not replaced, the
    state of the bag has changed, and the probability of the next marble selection
    depends on which one was selected from the bag in the previous draw. Then, in
    selection without replacement, each subsequent marble draw is a dependent event.
    When discussing dependent events, it is useful to describe events using **conditional
    probability**. Let’s discuss conditional probability now.'

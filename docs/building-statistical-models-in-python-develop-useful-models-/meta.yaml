  - "[PAGE 322]\n\nSince the ARMA fit for the differenced data is ARMA(2,0), the ARIMA\
    \ orders for the original time series would be ARIMA(2,1,0). Next, we will look\
    \ at forecasting from an ARIMA model.\n\n# **Forecasting with ARIMA**\n\nOnce\
    \ we have a fit model, we can forecast with that model. As mentioned in previous\
    \ chapters, when making predictions we should create a train-test split, so we\
    \ have data to compare with the predictions. The model should only fit the training\
    \ data to avoid data leakage. We can use the `train_test_split` function from\
    \ `pmdarima` to split the data. Then we proceed with the usual steps: split, train,\
    \ and predict. The code for this is shown in the following code block:\n\n```\n\
    from pmdarima.model_selection import train_test_split\ntrain, test = \\n    train_test_split(y_macro_economic.realgdp.values,\n\
    \                     train_size=0.9\n)\n\narima = pm.auto_arima(\n    train,\
    \ out_of_sample_size=10,\n    suppress_warnings=True, error_action='ignore',\n\
    \    test='adf'\n)\n\npreds, conf_int = arima.predict(\n    n_periods=test.shape[0],\
    \ return_conf_int=True\n)\n```\n\nThe preceding code fits an ARIMA model with\
    \ `auto_arima` and then forecasts the size of the test set using the `predict`\
    \ method of the ARIMA object. The forecasts for the series generated by the code\
    \ are shown in *Figure 11.21*:"

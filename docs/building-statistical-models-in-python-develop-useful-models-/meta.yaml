  md: 'Here, the predicted outcome is a line crossing data points. With this model,
    we could build a model to predict house prices (the dependent variable) based
    on different independent variables, such as districts, units, stories, or distances.
    The same idea cannot be applied to a binary classification problem. Let''s consider
    a simple example that we want to predict if a house is sold only based on its
    price. Let''s build a model based on linear regression:


    $$Sold = \beta_0 + \beta_1 * Price + \epsilon \quad (1)$$


    Here, $Sold = 1$ if the house is sold and $Sold=0$ if it was not sold. By performing
    visualization using linear regression, we can draw a line of best fit through
    the data points. It looks like when the price increases, the chance of selling
    a house decreases:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_226_0.png)


    Figure 8.1 – Line of best fit using linear regression


    So, instead of considering the equation model (1), we will be considering the
    following:


    $$Prob(Sold) = \beta_0 + \beta_1 * Price + \epsilon$$


    Here, $Prob(Sold)$ is the probability of selling a house. The probability value
    will be between 0 and 1; the midpoint of its range is 0.5 when the probability
    of selling a house is equal to the probability of not selling a house. However,
    when the price of a house is very high, then the value of $Prob(Sold)$ can be
    negative. To avoid this problem, we can model the problem with the following equation:


    $$\frac{P}{1-P} = \beta_0 + \beta_1 * Price + \epsilon \quad (2)$$


    Here, $P$ is the probability of selling a house and $1 - P$ is the probability
    of not selling a house. The value of $\frac{P}{1-P}$ is in the range of $[0, \infty)$
    and when the probability of selling a car is the same as the probability of not
    selling a car, ($P=0.5$), then $\frac{P}{1-P} = 1$, or the midpoint of its range
    is 1. This is also called the **odds ratio**. To interpret the odds ratio, when
    $\frac{P}{1-P} = 1$, for every house that is sold, there is a house that is not
    sold. When $P = 0.75$, then the odds ratio is 3. In this case, the interpretation
    is that the odds of being able to sell the house are three times higher than the
    odds of not being able to sell the house. Going back to the equation (2), the
    range of the odds ratio is $[0, \infty)$ and its lower limit is 0, but as we discussed
    previously for equation (1), when the price of a house is really high, then the
    estimate of the odds ratio could be negative, which contradicts the probability
    properties. In addition, because the'

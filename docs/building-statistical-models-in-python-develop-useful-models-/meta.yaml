  md: '![](img/3de2e60811d1b90c67f6bb2d5cae034f_102_0.png)


    Figure 3.9 – Visualizing error in a left-tailed two-population z-test


    As illustrated in the preceding plot, we see a left-tailed t-test comparing the
    null distribution on the right to the alternate distribution on the left. In this
    plot, we can see two prominent concepts at hand:


    +   - As $\alpha$ becomes smaller, the critical value slides left, moving more
    toward distributional outliers, $\beta$ becomes larger, and vice versa

    - Statistical power is the area of data source 2 to the right of $\beta$, as $power
    = (1-\beta)$


    A type I error is determined based on a pre-selected threshold; a researcher may
    feel most comfortable with a 90, 95, or 99% level of confidence. However, a type
    II error is based on parameterization (standard deviation, effect size, sample
    size, and so on). Therefore, we can use a power analysis to identify the sample
    size, and vice versa. The implementation of power analysis for various hypothesis
    tests will be implemented in the following two chapters.


    # Power analysis for a two-population pooled z-test


    Let us look at a dataset of salaries for professors of two different disciplines,
    discipline A and discipline B. We want to know whether there is a statistically
    significant difference between them based on the data we have. First, we need
    to perform a power analysis to know whether we have enough samples to trust the
    results of the z-test we may perform to test this hypothesis. The components of
    a power analysis we need for this include effect size, the type I error rate,
    a desired type II error rate, the direction of the alternate hypothesis (group
    2 is expected to be larger than, smaller than, or could be either larger or smaller
    than group 1), and the ratio of observations in the larger sample relative to'

  md: '# # 9 Discriminant Analysis


    In the previous chapter, we discussed discrete regression models, including classification
    using logistic regression. In this chapter, we will begin with an overview of
    probability, expanding into conditional and independent probability. We then discuss
    how these two approaches to understanding the laws of probability form the basis
    for Bayes’ Theorem, which is used directly to expand an approach called Bayesian
    statistics. Following this topic, we dive into **Linear Discriminant Analysis
    (LDA)** and **Quadratic Discriminant Analysis (QDA)**, two powerful classifiers
    that model data using the Bayesian approach to probability modeling.


    In this chapter we’re going to cover the following main topics:


    +   - Bayes’ Theorem

    - LDA

    - QDA


    # ## Bayes’ theorem


    In this section, we will discuss **Bayes’ Theorem**, which is used in the classification
    models described later in this chapter. We will start the chapter by discussing
    the basics of probability. Then, we will take a look at dependent events and discuss
    how Bayes’ Theorem is related to dependent events.


    # ### Probability


    Probability is a measurement of the likelihood that an event occurs or a certain
    outcome occurs. Generally, we can group events into two types of events: **independent
    events** and **dependent events**. The distinction between the types of events
    is in the name. An independent event is an event that is not affected or influenced
    by the occurrences of other events, while a dependent event is affected or influenced
    by the occurrences of other events.'
  merge: -1
  pgno: 245
- img_proc: true
  md: 'Let’s think about some examples of these events. For the first example, think
    about a fair coin toss. A coin toss can result in one of two states: heads and
    tails. If the coin is fair, there is a one-in-two chance that the toss will result
    in heads or tails. That means that the probability of heads or tails is 0.5 in
    a fair coin toss. We can calculate probability using the following formula when
    events are countable:


    $$P(E) = \frac{\text{Count of Desired Outcomes}}{\text{Total Number of Outcomes}}$$


    Here, $P(E)$ is the probability of the desired outcome. In the coin-toss example,
    the desired outcome is either heads or tails, each of which can only occur once
    per coin toss. Thus, for the coin toss, the count of desired events is one. The
    total number of outcomes is two because there are two possible states from a coin
    toss. Putting these numbers in the preceding equation yields 0.5 for heads and
    0.5 for tails. Now, putting your experience to work, does a previous coin toss
    give you any knowledge about the next toss of the same coin? It does not because
    *each coin toss is independent of every other coin toss*; it is an independent
    event.


    Now, let’s consider another example. Say we have a bag with three red marbles
    and five blue marbles. Let’s calculate the probability of selecting a red marble
    from the bag: $P(Red)$. There are eight total marbles, which is the total number
    of outcomes in the equation. We want to select a red marble, which means the count
    of desired outcomes is three. This means that the probability of selecting red
    marble from the bag is 3/8. Now, let’s calculate the probability of selecting
    a blue marble from the bag: $P(Blue)$. There are five blue marbles and eight total
    marbles, so the probability of selecting a blue marble from the bag is 5/8. Notice
    that the sum of the two probabilities is one: $P(Red) + P(Blue) = 3/8 + 5/8 =
    1$. This brings up an important property of probabilities: the total probability
    must be equal to one. This, of course, means that once we calculated the probability
    of selecting a red marble, we could have calculated the probability of selecting
    a blue marble by subtracting the probability of selecting a red marble from one.
    The property of probabilities is very useful and is used commonly in statistics
    and **machine learning (ML)**.


    Coming back to the example with red and blue marbles, let’s think about the type
    of event represented by this example. We select a marble from the bag. Now, there
    are two possible options next: (1) we replace the selected marble and select a
    marble from the bag again, and (2) we do not replace the marble and select a new
    marble from the remaining seven marbles in the bag. The first case is called **selection
    with replacement**. Selection with replacement is an independent event because
    the bag is reset before each draw from the bag. The second case is called **selection
    without replacement**. Selection without replacement is where you find dependent
    events. The first time you select a marble, the probability is the same as described
    previously (an independent event). However, if the marble is not replaced, the
    state of the bag has changed, and the probability of the next marble selection
    depends on which one was selected from the bag in the previous draw. Then, in
    selection without replacement, each subsequent marble draw is a dependent event.
    When discussing dependent events, it is useful to describe events using **conditional
    probability**. Let’s discuss conditional probability now.'
  merge: -1
  pgno: 246
- img_proc: true
  md: '# Conditional probability


    Let''s start with a formal definition. When we have dependent events, we may be
    interested in the probability of Event B given Event A, which means we want to
    know the probability of Event B after Event A occurred. This is called the conditional
    probability of Event B given Event A and is denoted $P(B | A)$. This can be thought
    of as “the probability of Event B on the condition that Event A has already occurred.”
    This may feel a bit vague, so let''s look at conditional probability in terms
    of our last example.


    Let''s say Event A is drawn a red marble and Event B is drawn a blue marble. We
    want to find the conditional probability of drawing a blue marble given that we
    have already drawn a red marble and can denote this as $P(Blue | Red)$. Let''s
    work through this example. After drawing the first red marble from the bag, there
    are seven marbles remaining: two red marbles and five blue marbles. We calculate
    the probability of selecting a blue marble from the new set using the same equation,
    which gives us the probability of 5/7. This means that the conditional probability
    of drawing a blue marble, given this a red marble was already drawn, is 5/7.


    Now that we have discussed conditional probability, let''s look at the probability
    of making two draws from the bag. Formally, we want to calculate the probability
    of Event A and Event B. Continuing to follow our example, let''s calculate the
    probability of drawing a red marble and then drawing a blue marble. We can describe
    the probability of two sequential events with the following equation:


    $$P(A \text{ and } B) = P(A) * P(B | A)$$


    In words, the probability of A followed by B is the probability of Event A times
    the probability of Event B given Event A. In our example, we have calculated $P(Red)$
    and $P(Blue | Red)$. We can use those values to calculate the probability of drawing
    a red marble and then a blue marble $P(Red \text{ and } Blue)$, as follows:


    $$P(Red \text{ and } Blue) = P(Red) * P(Blue | Red) = \frac{3}{8} * \frac{5}{7}
    = \frac{15}{56} \cong 0.27$$


    Performing the calculation, we find that $P(Red \text{ and } Blue)$ is about 0.27.


    Now, out of interest, let''s make the calculations again, but *exchanging the
    order of the colors*; the probability of drawing a blue marble and then drawing
    a red marble or $P(Blue \text{ and } Red)$. Following the same logic as shown
    in the previous example, we will find that $P(Blue) = 5/8$ and $P(Red|Blue) =
    3/7$. Thus, the equation looks like this:


    $$P(Blue \text{ and } Red) = P(Blue) * P(Red | Blue) = \frac{5}{8} * \frac{3}{7}
    = \frac{15}{56} \cong 0.27$$


    Notice that $P(Red \text{ and } Blue)$ and $P(Blue \text{ and } Red)$ have the
    same probability. This is no coincidence. This is known as Bayes'' Theorem, which
    we will discuss next.'
  merge: -1
  pgno: 247
- img_proc: true
  md: '# Discussing Bayes’ Theorem


    In the previous section on conditional probability, we happened across Bayes’
    Theorem in the example of drawing marbles from a bag. Let’s discuss Bayes’ Theorem
    in more detail.


    Bayes’ Theorem is a basis of a field of statistics known as **Bayesian statistics**.
    The central idea of Bayesian statistics is that given a prior probability, we
    have used new information to update probability estimates. While a full description
    of Bayesian statistics is beyond the scope of this book, we will discuss Bayes’
    Theorem as it relates to the concepts discussed in this book. We generally describe
    Bayes’ Theorem with the following equation:


    $$P(B|A) = \frac{P(A|B)P(B)}{p(A)}$$


    In Bayesian terminology, $P(B)$ is called the **prior** and $P(B | A)$ is called
    the **posterior**. The posterior gives us an update given another event. Let’s
    make use of the Theorem in a real-world example.


    Let’s say that we want to determine whether someone has a disease based on the
    results of a test. We would present this in Bayes’ Theorem as follows:


    $$P(sick|test\ pos) = \frac{P(test\ pos|sick)P(sick)}{P(test\ pos)}$$


    Here, $P(sick)$ is the probability of having the disease, $P(test\ pos)$ is the
    probability of getting a positive test result, and $P(test\ pos|sick)$ is the
    conditional probability of a positive test result when the patient tested is sick
    (also known as the accuracy of the test).


    For this example, we will assume the probability of having the disease is 0.2
    and the test has an accuracy of 0.95 and a false positive rate of 0.3. The prior
    probability in this example is $P(sick)=0.2$. We can improve our knowledge of
    whether someone has the disease with the test. We want to find the posterior:
    $P(sick|test\ pos)$.


    Since we know the accuracy of the test is 0.95 and the prior, we already know
    the values of the terms in the numerator of the equation. To find $P(test\ pos)$,
    we need to consider all cases where we can get a positive test result, which could
    be a true positive or a false positive. We calculate the probability of the positive
    test result as follows:


    $$P(test\ pos) = P(test\ pos|sick)P(sick) + P(test\ pos|not\ sick)P(not\ sick)$$


    Recall that the total probability of possible states must equal one: $P(not\ sick)
    = 1 - P(sick) = 0.8$. With this in mind, we can calculate $P(sick|test\ pos)$:


    $$P(sick|test\ pos) = \frac{0.95(0.2)}{0.95(0.2) + 0.3(0.8)} \cong 0.44$$'

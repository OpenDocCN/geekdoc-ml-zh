    in extreme overfitting; the coefficients from lag 2 through roughly lag 45 would
    fall between roughly 0 and ±0.15. As referenced in *Chapter 4, Parametric Tests*,
    the correlation between about ±0.1 and ±0.3 is generally considered a weak correlation.


    # **The AR(2) model**


    Let''s look at the following stationary AR(2) process:


    $$y_t - 0.8y_{t-1} - 0.48y_{t-2} = \epsilon_t$$


    Converted to backshift operator notation, we have the following:


    $$(1 - 0.8B - 0.48B^2)y_t = \epsilon_t$$


    We also have this:


    $$(1 - 0.8z - 0.48z^2) = 0$$


    Since we''re focusing on Python in this book, we won''t walk through the steps,
    but it may be useful to know second-order polynomials – such as AR(2) – follow
    the quadratic equation, $ax^2 + bx + c$ ($-0.48z^2 - 0.8z + 1$ for our process).
    Therefore, we can use the quadratic formula:


    $$\frac{-b \pm \sqrt{b^2 - 4ac}}{2a}$$


    This is what we''ll use to find the roots. In Python, we can find the roots of
    this model using the following:


    ```

    python

    arparams = np.array([-0.8, -0.48])

    ar = np.r_[1, -arparams]

    ar_process = sm.tsa.ArmaProcess(ar)

    print(''AR(2) Roots: '', ar_process.arroots)

    print(''AR(2) Stationarity: '', ar_process.isstationary)

    ```'

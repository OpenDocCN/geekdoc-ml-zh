    Stuart J Miller\n\n版权所有 © 2023 Packt Publishing\n\n保留所有权利。未经出版商事先书面许可，不得以任何形式或任何方式复制、存储在检索系统中或传播本书的任何部分，除非在评论文章或评论中嵌入简短引文。\n\
    \n在准备本书时，我们已尽一切努力确保所呈现信息的准确性。然而，本书所含信息是按“原样”出售的，无论是明示还是暗示。作者、Packt Publishing\
    \ 或其经销商和分销商均不对因本书直接或间接造成的任何损害或声称造成的损害负责。\n\nPackt Publishing 已尽力通过适当使用大写字母提供本书中提及的所有公司和产品的商标信息。但是，Packt\
    \ Publishing 无法保证此信息的准确性。\n\n- **集团产品经理：** Ali Abidi\n- **出版产品经理：** Sanjana Gupta\n\
    - **高级编辑：** Sushma Reddy\n- **技术编辑：** Rahul Limbachiya\n- **文字编辑：** Safis Editing\n\
    - **图书项目经理：** Kirti Pisat\n- **项目协调员：** Farheen Fathima\n- **校对员：** Safis Editing\n\
    - **索引员：** Hemangini Bari\n- **制作设计师：** Prashant Ghare\n- **市场协调员：** Nivedita\
    \ Singh\n\n首次出版：2023年8月\n生产参考：3310823\n\n由 Packt Publishing Ltd. 出版。\nGrosvenor\
    \ House\n11 St Paul's Square\nBirmingham\nB3 1RB, UK.\n\nISBN 978-1-80461-428-0\n\
    \nwww.packtpub.com\n\n> 献给我的父母 Thieu 和 Tang，感谢他们巨大的支持和对我的信任。\n献给我的妻子 Tam，感谢她无尽的爱、奉献和勇气。\n\
    - Huy Hoang Nguyen\n\n> 献给我的女儿 Lydie，她展示了工作和奉献如何重新激发灵感和创造力。献给我的妻子 Helene，感谢她的爱和支持。\n\
    – Paul Adams\n\n> 献给我的伴侣 Kate，她一直支持我的努力。\n– Stuart Miller\n\n## 贡献者\n\n## 关于作者\n\
    \n**Huy Hoang Nguyen** 是一位数学家和数据科学家，在高等数学、战略领导力和应用机器学习研究方面拥有丰富经验。他拥有数学博士学位，以及应用数学和数据科学两个硕士学位。他之前的工作集中在偏微分方程、泛函分析及其在流体力学中的应用。从学术界转型到医疗保健行业后，他承担了各种数据科学项目，涵盖从传统机器学习到深度学习。\n\
    \n**Paul Adams** 是一位数据科学家，背景主要在医疗保健行业。Paul 在多个行业领域应用统计学和机器学习，专注于流程工程、流程改进、指标和业务规则开发、异常检测、预测、聚类和分类等项目。Paul\
    \ 拥有南卫理公会大学数据科学硕士学位。\n\n**Stuart Miller** 是一位经验丰富的机器学习工程师。Stuart 将机器学习方法应用于从保险到半导体制造等多个行业的各种项目。Stuart\
    \ 拥有数据科学、电气工程和物理学学位。\n\n## 关于审稿人\n\n**Krishnan Raghavan** 是一位拥有超过20年经验的IT专业人士，涉及软件开发和交付卓越性，领域涵盖从C++到Java、Python、数据仓库以及大数据工具和技术。\n\
    \n工作之余，Krishnan 喜欢与妻子和女儿共度时光，阅读小说、非小说类书籍以及技术书籍。Krishnan 通过参与 GDG Pune 志愿者小组，帮助团队组织活动，尝试回馈社区。目前，他正在尝试学习弹吉他，但尚未成功。\n\
    \n您可以通过 `mailto:krishnan@gmail.com` 或通过 **LinkedIn**：`www.linkedin.com/in/krishnan-raghavan`\
    \ 与 Krishnan 联系。\n\n> 我要感谢我的妻子 Anita 和女儿 Ananya，感谢她们给予我时间和空间来审阅这本书。\n\n**Karthik\
    \ Dulam** 是 EDB 的首席数据科学家。他对所有数据相关的事物充满热情，特别关注数据工程、统计建模和机器学习。他拥有多元化的背景，为医疗保健、IT、汽车、电信、税务和咨询行业提供机器学习解决方案。他积极与学生互动，作为客座演讲者在知名大学发表关于机器学习用例的富有洞察力的演讲。\n\
    \n> 我要感谢我的妻子 Sruthi Anem，感谢她坚定不移的支持和耐心。我还要感谢我的家人、朋友和同事，他们在塑造今天的我方面发挥了重要作用。他们坚定不移的支持、鼓励和对我的信念一直是灵感的源泉。\n\
    \n## 目录\n\n前言\n\nxiii\n\n## 第一部分：统计学导论\n\n### 1. 抽样与泛化\n\n3\n\n- 软件和环境设置 3\n-\
    \ 总体与样本 6\n- 从样本推断总体 8\n  - 随机化实验 8\n  - 观察性研究 9\n- 抽样策略——随机、系统、分层和整群抽样 11\n \
    \ - 概率抽样 11\n  - 非概率抽样 16\n- 总结 17\n\n### 2. 数据分布\n\n19\n\n- 技术要求 19\n- 理解数据类型\
    \ 20\n  - 名义数据 20\n  - 有序数据 21\n  - 区间数据 21\n  - 比率数据 22\n  - 可视化数据类型 22\n- 测量和描述分布\
    \ 26\n  - 测量集中趋势 26\n  - 测量变异性 33\n  - 测量形状 38\n- 正态分布和中心极限定理 42\n  - 中心极限定理 45\n\
    - 自助法 45\n  - 置信区间 46\n  - 标准误差 51\n  - 相关系数（皮尔逊相关） 51\n- 排列 52\n  - 排列与组合 52\n\
    \  - 排列检验 55\n- 变换 57\n- 总结 59\n- 参考文献 59\n\n### 3. 假设检验\n\n61\n\n- 假设检验的目标 61\n\
    \  - 均值假设检验概述 62\n  - 推断范围 62\n  - 假设检验步骤 63\n- 第一类和第二类错误 63\n  - 第一类错误 63\n \
    \ - 第二类错误 64\n- z检验基础——z分数、z统计量、临界值和p值 65\n  - z分数和z统计量 65\n  - 均值的z检验 72\n  -\
    \ 比例的z检验 78\n  - 双总体合并z检验的功效分析 82\n- 总结 85\n\n### 4. 参数检验\n\n87\n\n- 参数检验的假设 87\n\
    \  - 正态分布的总体数据 88\n  - 相等的总体方差 99\n- T检验——一种参数假设检验 102\n  - 均值的T检验 103\n  - 双样本t检验——合并t检验\
    \ 108\n  - 双样本t检验——Welch t检验 111\n  - 配对t检验 112\n- 超过两组的检验和方差分析 114\n  - 多重显著性检验\
    \ 114\n  - 方差分析 117\n  - 皮尔逊相关系数 118\n  - 功效分析示例 123\n- 总结 124\n- 参考文献 124\n\n\
    ### 5. 非参数检验\n\n125\n\n- 当参数检验假设被违反时 125\n  - 排列检验 126\n- 秩和检验 128\n  - 检验统计量程序\
    \ 128\n  - 正态近似 129\n  - 秩和检验示例 129\n- 符号秩检验 130"

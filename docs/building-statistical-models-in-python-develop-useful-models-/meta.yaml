    \n迪基-富勒检验考虑回归检验中包含的滞后数内的每个数据点。我们需要为此分析 ACF 图；因为我们要考虑趋势可能存在的最远范围，我们必须选择具有显著性的最长滞后。其思想是，如果我们的数据中存在强趋势，例如增长，那么在趋势存在的期间，每个连续的值通常会导致另一个递增的后续值。在我们的例子中，ACF\
    \ 图中的最大显著滞后大约是 25。迪基-富勒检验的统计功效相对较低（容易犯第二类错误，即在应该拒绝原假设时未能拒绝），因此只要实际可行，高阶滞后并不令人担忧；风险在于未能包含足够的滞后。\n\
    \n> **迪基-富勒单位根**\n迪基-富勒检验仅检验是否存在趋势单位根，但不检验是否存在季节性单位根。我们将在本章的 ARIMA 部分讨论趋势单位根和季节性单位根之间的区别。\n\

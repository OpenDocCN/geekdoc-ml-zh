    # T-test – a parametric hypothesis test


    In the last chapter, the z-test for means was applied when population standard
    deviations were known. However, in the real world, it is not easy (or virtually
    impossible) to obtain the population standard deviation. In this section, we will
    discuss another hypothesis test called the **t-test**, which is used when the
    population standard deviations are unknown. The mean and the standard deviation
    of a population are estimated by taking the mean and the standard deviation of
    sample data representative of this population.


    Broadly speaking, the method for the t-test for means is very similar to the one
    for the z-test for means, but the calculations for the test statistic and p-value
    are not the same as for the z-test. The test statistic is computed by the following
    formula:


    $$t = \frac{\bar{x} - \mu}{s / \sqrt{n}}$$


    Here, $\bar{x}$, $\mu$, $s$, and $n$ are the sample mean, population mean, sample
    standard deviation, and sample size, respectively, which has a **t-distribution**
    when the sample data, $x$, is normally distributed. The following code illustrates
    the standard normal distribution (blue curve) with 1,000 samples and t-distribution
    (green and red curves) with two sample sizes—3 and 16 samples:


    ```

    # libraries

    import numpy as np

    import scipy.stats as stats

    # creating normal distribution

    x =np.linspace(-5, 5, 1000) #create 1000 point from -5 to 5

    y = stats.norm.pdf(x) # create probability density for each point x - normal distribution


    # creating Student t distributions for 2 sample sizes n =3 and n =15

    degree_freedom1 = 2

    t_dis1 = stats.t.pdf(x, degree_freedom1)


    degree_freedom2 = 15

    t_dis2 = stats.t.pdf(x, degree_freedom2)

    ```'

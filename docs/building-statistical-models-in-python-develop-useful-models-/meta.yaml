- md: '## The Bonferroni correction


    One method for adjusting the p-value to control multiple hypothesis tests is the
    Bonferroni correction. The Bonferroni correction controls the FWER by uniformly
    reducing the significance level of each individual test in the family of tests.
    Given that we have $m$ tests in a family each with the p-value $p_i$, then the
    p-value correction is given as follows:


    $$p_i \leq \frac{\alpha}{m}$$


    Taking our previous example of three models of machines, we have a family of three
    tests, making $m = 3$. If we let FWER be 0.05, then, with the Bonferroni correction,
    the level of significance for the three individual tests is this:


    $$\frac{0.05}{3} = 0.0167$$


    Thus, in this example, any of the individual tests would be required to have a
    p-value of 0.0167 to be considered significant.


    > **Effects on Type I and Type II errors**

    As discussed, the Bonferroni correction reduces the significance levels of individual
    tests to control the *Type I* error rate at the family level. We should also consider
    how this change impacts the *Type II* error rate. In general, reducing the significance
    level of individual tests will increase the chance of making a *Type II* error
    for that test (as is done in the Bonferroni correction). While we have only discussed
    the Bonferroni correction in this section, there are other methods for p-value
    correction that provide different trade-offs. Check the documentation of `multipletests`
    in `statsmodels` to see a list of p-value corrections implemented in `statsmodels`.


    Let''s take a look at an example using the miles per gallon (MPG) data from the
    *Auto MPG* dataset from the *UCI Machine Learning Repository*, which can be found
    at this link: `https://archive.ics.uci.edu/ml/datasets/Auto+MPG` [1]. This dataset
    contains various attributes, including `origin`, `mpg`, `cylinders`, and `displacement`,
    for vehicles manufactured between 1970 and 1982. We will show an abbreviated form
    of the analysis here; the full analysis is included in the notebook in the code
    repository for this chapter.


    For this example, we will use the `mpg` and `origin` variables, and test whether
    there is a difference in `mpg` from the different origins with a significance
    level of 0.01. The group means are shown in the following table (`origin` is an
    integer-encoded label in this dataset).


    | Vehicle origin (`origin`) | MPG (`mpg`) |

    | :---: | :---: |

    | 1 | 20.0 |

    | 2 | 27.9 |

    | 3 | 30.5 |


    *Figure 4.15 – Vehicle MPG means for each origin group*


    Running a t-test to compare each mean, we get the following p-values:


    | Null hypothesis | Uncorrected p-value |

    | :---: | :---: |

    | $\mu_1 - \mu_2 = 0$ | 7.946116336281346e-12 |

    | $\mu_1 - \mu_3 = 0$ | 4.608511957238898e-19 |

    | $\mu_2 - \mu_3 = 0$ | 0.0420926104552266 |


    *Figure 4.16 – Uncorrected p-values for t-tests on the difference between each
    group*


    Applying the Bonferroni correction to the p-values, we get the following p-values:


    | Null hypothesis | Corrected p-value (Bonferroni) |

    | :--- | :--- |

    | $\mu_1 - \mu_2 = 0$ | 2.38383490e-11 |

    | $\mu_1 - \mu_3 = 0$ | 1.38255359e-18 |

    | $\mu_2 - \mu_3 = 0$ | 0.126277831 |


    *Figure 4.17 – Corrected p-values for t-tests on the difference between each group*


    With the preceding p-values, reject the null hypothesis for a difference in the
    means of groups 1 and 2 and a difference in the means of groups 1 and 3, but fail
    to reject the null hypothesis for a difference in the means of groups 2 and 3
    at our significance level of 0.01.


    > **Other p-value correction methods**

    In this section, we only discussed one method for p-value correction—the Bonferroni
    correction—to provide intuition for the rationale of p-value corrections. However,
    there are other correction methods available that might be better suited for your
    problem. To see a list of p-value correction methods implemented within `statsmodels`,
    check the documentation of `statsmodels.stats.multitest.multipletests`.


    ## ANOVA


    In the previous section on multiple tests for significance, we saw how to perform
    multiple tests to determine whether means differed between groups. When dealing
    with means of groups, a useful first task is to conduct an analysis of variance.
    ANOVA is a statistical test for determining whether there is a difference between
    means of several groups. The null hypothesis is there is no difference in means,
    and the alternative hypothesis is the means are not all equal. Since ANOVA tests
    for a difference in means, it is commonly used before testing for a difference
    in means with pairwise hypothesis tests. If the ANOVA null hypothesis fails to
    be rejected, then there is no need to perform the pairwise tests. However, if
    the ANOVA null hypothesis is rejected, then pairwise tests can be performed to
    determine which specific means differ.


    > **ANOVA versus pairwise tests**

    While pairwise testing is a general procedure for testing for differences between
    groups, ANOVA can only be used to test for differences in means.


    In this example, we will again consider the MPG of vehicles from the *Auto MPG*
    dataset. Since we have already run pairwise tests and found a significant difference
    in the mean mpg of vehicles based on origin, we expect that ANOVA will provide
    a positive test result (reject the null hypothesis). Performing the ANOVA calculation,
    we get the following output. The small p-value suggests that we should reject
    the null hypothesis:


    ```

    anova = anova_oneway(data.mpg, data.origin, use_var=''equal'')

    print(anova)

    # statistic = 98.54179491075868

    # pvalue = 1.915486418412936e-35

    ```


    The ANOVA analysis shown here is abbreviated. For the full code, see the associated
    notebook in the code repository for this chapter.


    In this section, we covered methods for performing hypothesis tests for more than
    two groups of data. The first method was pairwise testing with p-value correction,
    which is a general method that can be used for any type of hypothesis test. The
    other method we covered was ANOVA, which is a specific test for differences in
    the means of groups. This is not a general method such as pairwise testing but
    can be used as a first step before performing pairwise tests for differences in
    means. In the next section, we cover another type of parametric test that can
    be used to determine whether two sets of data are correlated.


    ## Pearson''s correlation coefficient


    **Pearson''s correlation coefficient**, also called Pearson''s *r* (or Pearson''s
    rho (ρ) when applied to population data) or the **Pearson product-moment sample
    coefficient of correlation (PPMCC)**, is a bivariate test that measures the linear
    correlation between two variables. The coefficient produces a value ranging from
    -1 to 1 where -1 is a strong, inverse correlation and 1 is a strong, direct correlation.
    A zero-valued coefficient indicates no correlation between the two variables.
    Weak correlation is generally considered to be correlation between +/- 0.1 and
    +/- 0.3, moderate correlation is between +/- 0.3 and +/- 0.5, and strong correlation
    is between +/- 0.5 to +/- 1.0.


    This test is considered parametric but does not require assumptions of normal
    distribution or homogeneity of variance. It is, however, required that data be
    independently sampled (both randomly selected and without serial correlation),
    have finite variance—such as with a distribution that has a very heavy tail—and
    be of a continuous data type. The test does not indicate an input variable and
    a response variable; it is simply a measure of the linear relation between two
    variables. The test uses standardized covariance to derive correlation. Recall
    that standardization requires dividing a value by the standard deviation.'
  mdcn: '## 邦费罗尼校正


    调整p值以控制多重假设检验的一种方法是邦费罗尼校正。邦费罗尼校正通过统一降低检验族中每个单独检验的显著性水平来控制族错误率。假设我们有一个包含$m$个检验的检验族，每个检验的p值为$p_i$，则p值校正如下所示：


    $$p_i \leq \frac{\alpha}{m}$$


    以我们之前关于三种机器模型的例子为例，我们有一个包含三个检验的检验族，因此$m = 3$。如果我们设定族错误率为0.05，那么，根据邦费罗尼校正，这三个单独检验的显著性水平为：


    $$\frac{0.05}{3} = 0.0167$$


    因此，在这个例子中，任何一个单独检验都需要p值达到0.0167才能被认为具有统计显著性。


    > **对第一类和第二类错误的影响**

    如前所述，邦费罗尼校正通过降低单独检验的显著性水平来控制族水平的*第一类*错误率。我们还应考虑这种变化如何影响*第二类*错误率。通常，降低单独检验的显著性水平会增加该检验犯*第二类*错误的概率（邦费罗尼校正正是如此）。虽然本节我们只讨论了邦费罗尼校正，但还有其他p值校正方法，它们提供了不同的权衡。请查阅`statsmodels`中`multipletests`的文档，以了解`statsmodels`中实现的p值校正方法列表。


    让我们看一个使用*UCI机器学习仓库*中*Auto MPG*数据集的每加仑英里数（MPG）数据的例子，该数据集可通过此链接找到：`https://archive.ics.uci.edu/ml/datasets/Auto+MPG`
    [1]。该数据集包含1970年至1982年间制造的各种车辆的属性，包括`origin`、`mpg`、`cylinders`和`displacement`。我们将在此展示分析的简化形式；完整分析包含在本章代码仓库的notebook中。


    在这个例子中，我们将使用`mpg`和`origin`变量，并在0.01的显著性水平下检验不同产地的`mpg`是否存在差异。各组均值如下表所示（在此数据集中，`origin`是整数编码的标签）。


    | 车辆产地 (`origin`) | MPG (`mpg`) |

    | :---: | :---: |

    | 1 | 20.0 |

    | 2 | 27.9 |

    | 3 | 30.5 |


    *图4.15 – 各产地组的车辆MPG均值*


    运行t检验比较每个均值，我们得到以下p值：


    | 零假设 | 未校正p值 |

    | :---: | :---: |

    | $\mu_1 - \mu_2 = 0$ | 7.946116336281346e-12 |

    | $\mu_1 - \mu_3 = 0$ | 4.608511957238898e-19 |

    | $\mu_2 - \mu_3 = 0$ | 0.0420926104552266 |


    *图4.16 – 各组间差异t检验的未校正p值*


    对p值应用邦费罗尼校正，我们得到以下p值：


    | 零假设 | 校正后p值（邦费罗尼） |

    | :--- | :--- |

    | $\mu_1 - \mu_2 = 0$ | 2.38383490e-11 |

    | $\mu_1 - \mu_3 = 0$ | 1.38255359e-18 |

    | $\mu_2 - \mu_3 = 0$ | 0.126277831 |


    *图4.17 – 各组间差异t检验的校正后p值*


    根据上述p值，在0.01的显著性水平下，我们拒绝第1组和第2组均值存在差异的零假设，也拒绝第1组和第3组均值存在差异的零假设，但未能拒绝第2组和第3组均值存在差异的零假设。


    > **其他p值校正方法**

    在本节中，我们只讨论了一种p值校正方法——邦费罗尼校正——以提供对p值校正原理的直观理解。然而，还有其他可用的校正方法可能更适合您的问题。要查看`statsmodels`中实现的p值校正方法列表，请查阅`statsmodels.stats.multitest.multipletests`的文档。


    ## 方差分析


    在上一节关于多重显著性检验中，我们了解了如何进行多重检验以确定组间均值是否存在差异。在处理组均值时，一个有用的首要任务是进行方差分析。方差分析是一种统计检验，用于确定几个组的均值之间是否存在差异。零假设是均值之间没有差异，备择假设是均值不全相等。由于方差分析检验的是均值差异，它通常在使用成对假设检验检验均值差异之前使用。如果方差分析的零假设未能被拒绝，则无需进行成对检验。然而，如果方差分析的零假设被拒绝，则可以进行成对检验以确定哪些特定均值存在差异。


    > **方差分析与成对检验**

    虽然成对检验是检验组间差异的通用程序，但方差分析只能用于检验均值差异。


    在这个例子中，我们将再次考虑*Auto MPG*数据集中车辆的MPG。由于我们已经进行了成对检验并发现基于产地的车辆平均MPG存在显著差异，我们预计方差分析将提供积极的检验结果（拒绝零假设）。进行方差分析计算，我们得到以下输出。较小的p值表明我们应该拒绝零假设：


    ```

    anova = anova_oneway(data.mpg, data.origin, use_var=''equal'')

    print(anova)

    # statistic = 98.54179491075868

    # pvalue = 1.915486418412936e-35

    ```


    此处显示的方差分析是简化的。完整代码请参见本章代码仓库中的相关notebook。


    在本节中，我们介绍了对两组以上数据进行假设检验的方法。第一种方法是带有p值校正的成对检验，这是一种可用于任何类型假设检验的通用方法。我们介绍的另一种方法是方差分析，这是一种专门检验组间均值差异的方法。它不是像成对检验那样的通用方法，但可以在进行均值差异的成对检验之前作为第一步使用。在下一节中，我们将介绍另一种参数检验，可用于确定两组数据是否相关。


    ## 皮尔逊相关系数


    **皮尔逊相关系数**，也称为皮尔逊*r*（或应用于总体数据时称为皮尔逊rho (ρ)）或**皮尔逊积矩样本相关系数（PPMCC）**，是一种双变量检验，用于衡量两个变量之间的线性相关性。该系数产生的值范围从-1到1，其中-1表示强负相关，1表示强正相关。零值系数表示两个变量之间没有相关性。弱相关通常被认为在+/-
    0.1到+/- 0.3之间，中等相关在+/- 0.3到+/- 0.5之间，强相关在+/- 0.5到+/- 1.0之间。


    该检验被认为是参数检验，但不要求正态分布或方差齐性的假设。然而，要求数据是独立抽样的（随机选择且无序列相关），具有有限方差——例如具有非常重尾的分布——并且是连续数据类型。该检验不指明输入变量和响应变量；它只是衡量两个变量之间的线性关系。该检验使用标准化协方差来推导相关性。回想一下，标准化需要将一个值除以标准差。'

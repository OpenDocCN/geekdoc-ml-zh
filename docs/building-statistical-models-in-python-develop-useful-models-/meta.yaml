  md: '# Models for stationary time series


    In this section, we will discuss **Autoregressive (AR)**, **Moving Average (MA)**,
    and **Autoregressive Moving Average (ARMA)** models that are useful for stationary
    data. These models are useful when modeling patterns and variance around process
    means that output over time. *When we have data that does not exhibit autocorrelation,
    we can use statistical and machine learning models that do not make assumptions
    about time, such as Logistic Regression or Naïve Bayes, so long as the data supports
    such use cases.*


    # Autoregressive (AR) models


    # The AR(p) model


    In *Chapter 10, Introduction to Time Series* we considered how the **Partial Auto-Correlation
    Function (PACF)** correlates one data point to another lag, controlling for those
    lags between. We also discussed how inspection of the PACF plot is a frequently
    used method for assessing the ordering of an autoregressive model. Thereto, the
    autoregressive model is one that considers specific points in the past to be directly
    correlated to the value of a given point at lag zero. Suppose we have a process
    $y_t$ with random, normally distributed white noise, $\epsilon_t$, where $t =
    \pm 1, \pm 2, \dots$ If – using real constants of $\phi_1, \phi_2, \dots, \phi_p$
    where $\phi_p \neq 0$ – we can formulate the process in the following way:


    $$y_t - \mu - \phi_1(y_{t-1} - \mu) - \phi_2(y_{t-2} - \mu) - \dots - \phi_p(y_{t-p}
    - \mu) = \epsilon_t$$


    Letting $\mu$ represent the overall process sample mean (in our examples, we will
    consider **zero-mean** processes), we can consider this to be an autoregressive
    process of order $p$, or AR(p) [1]. We can define the autocorrelation for the
    AR(p) model as follows:


    $$\rho_k = \phi_1^{|k|}$$


    There is also this example:


    $$\rho_k = \phi_1 \rho_{k-1} + \dots + \phi_p \rho_{k-p}$$


    In the preceding example, where $\rho_k$ is the lag $k$ autocorrelation. $\phi_1$
    is both the slope and autocorrelation for an AR(1) process.


    > **AR(p) model structure and components**


    To prevent confusion, note that with the equation $y_t - \mu - \phi_1(y_{t-1}
    - \mu) - \phi_2(y_{t-2} - \mu) - \dots - \phi_p(y_{t-p} - \mu) = \epsilon_t$ we
    are attempting to build a mathematical model that represents the process such
    that if perfectly modeled, all that remains is the random, normally distributed
    white noise, $\epsilon_t$. This effectively means the model leaves zero residual
    error (in other words, a perfect fit). Each $y_{t-k}$ term – where $k$ is a lag
    in time – represents the value at that point in time and each corresponding value
    of $\phi$ is the coefficient value required for the $y_{t-k}$ such that when taken
    in combination with all other values of $y$, the model statistically approximates
    zero error.'

    此检验用于检验两个总体比例之间的差异。零假设和备择假设也有三种形式。检验统计量计算如下：


    $$z = \frac{\bar{P}_1 - \bar{P}_2}{\sqrt{\bar{p}(1 - \bar{p})(\frac{1}{n_1} +
    \frac{1}{n_2})}}$$


    其中，$\overline{p}_1$ 是来自总体 1 的简单随机样本的样本比例，$\overline{p}_2$ 是来自总体 2 的简单随机样本的样本比例，$n_1$
    和 $n_2$ 是样本量，$\overline{p}$ 是总合并比例，计算如下：


    $$\overline{p} = \frac{n_1\overline{p}_1 + n_2\overline{p}_2}{n_1 + n_2}$$


    我们考虑一个类似的例子：学校 A 的学生支持变革的比例与学校 B 的学生支持变革的比例是否存在差异。此处，$n_1 = 100$，$n_2 = 100$，$\overline{p}_1
    = 0.8$，$\overline{p}_2 = 0.7$。你可以使用 `statsmodels` 库中的 `proportions_ztest`（Seabold,
    Skipper, and Josef Perktold, "statsmodels: Econometric and statistical modeling
    with python." *Proceedings of the 9th Python in Science Conference. 2010*）来执行假设检验。这里，我们将直接使用检验统计量计算
    p 值。零假设和备择假设如下：


    $$H_0: \overline{p}_1 = \overline{p}_2 \text{ （两个总体比例相等）}$$

    $$H_a: \overline{p}_1 \neq \overline{p}_2 \text{ （两个总体比例不同）}$$


    接下来，我们指定双尾检验的显著性水平为 $\alpha = 0.05$。然后我们计算检验统计量和 p 值如下：


    ```

    scipy.stats.norm.sf(abs(z))*2

    ```


    检验统计量为 1.633，双尾检验的 p 值为 0.10。由于 p 值大于指定的显著性水平 0.05，我们未能拒绝零假设。没有足够的证据表明学校 A 和学校
    B 的学生支持变革的比例存在差异。


    最后，上述计算的 Python 代码实现如下：


    ```

    import math

    import scipy

    p_1bar = 0.8

    p_2bar = 0.7

    n1 = 100.0

    n2 = 100.0


    p= (p_1bar*n1 + p_2bar*n2)/(n1+n2)    # the total pooled proportion


    z = (p_1bar-p_2bar)/math.sqrt(p*(1-p)*(1/n1+1/n2))

    pval = scipy.stats.norm.sf(abs(z))*2


    print(f"The test statistic is {z} and the p-value for two tailed test is {pval}.")

    ```


    在本节中，我们探讨了不同的重要统计概念，如 z 分数、z 统计量、临界值、p 值以及用于均值和比例的 z 检验。我们将在下一节讨论选择错误率和功效分析。


    ## 选择错误率和功效分析


    统计学概括了围绕数据行为形成可接受结论的近似值。因此，统计中的错误是不可避免的。统计模型发现的显著性本质上由错误率决定。一种可用于最小化建模错误的方法，特别是在样本量较低时，是功效检验。统计功效是正确拒绝零假设的概率，从而最小化第二类错误。其中
    alpha ($\alpha$) 是第一类错误，beta ($\beta$) 是第二类错误，功效的公式为 $1 - \beta$。回顾一下，第一类错误是错误拒绝零假设的概率。


    如前所述，功效在样本较小时更为重要，因为如果选择了适当的抽样方法，大数定律通常有助于随着样本量的增加而最小化错误。当比较的差异相对较小时，功效也很重要。功效分析可能特别有用的一种情况是抽样成本高昂时，例如在人体研究中。功效分析可用于在给定所需功效、第一类错误率和效应量的情况下，找到合适的最小样本量。可以根据需要探索这些参数之间的关系。效应量是假设检验中被比较数据的差异或相似性，例如均值的标准化差异或相关性。由于假设检验中常见的显著性水平（第一类错误）在
    0.01 到 0.1 之间，常见的功效水平在 0.8 到 0.9 之间，尽管这些度量取决于具体情况 (https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7745163/#:~:text=The%20ideal%20power%20of%20a,high%20as%200.8%20or%200.9)。


    功效的一些显著特性如下：


    - 必须有足够的功效才能检测到有意义的差异

    - 功效随样本量增加而增加

    - 功效随效应量增加而增加

    - 标准差（以及方差和标准误）随功效增加而减小


    在下图中，我们可以看到第一类错误 ($\alpha$) 是我们可能错误地假设零假设并得出没有统计学显著差异的结论，而实际上数据点不属于数据源 2（零假设），而是属于数据源
    1。第二类错误 ($\beta$) 是我们可能错误地假设该区域的数据属于数据源 1（备择假设），而实际上它属于数据源 2。


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_102_0.png)


    图 3.9 – 可视化左尾双总体 z 检验中的错误


    如上图所示，我们看到一个左尾 t 检验，比较右侧的零分布和左侧的备择分布。在此图中，我们可以看到两个突出的概念：


    - 随着 $\alpha$ 变小，临界值向左滑动，更接近分布的尾部，$\beta$ 变大，反之亦然

    - 统计功效是数据源 2 在 $\beta$ 右侧的面积，因为 $power = (1-\beta)$


    第一类错误是基于预先选择的阈值确定的；研究人员可能对 90%、95% 或 99% 的置信水平感到最放心。然而，第二类错误是基于参数化（标准差、效应量、样本量等）。因此，我们可以使用功效分析来确定样本量，反之亦然。各种假设检验的功效分析实现将在接下来的两章中进行。



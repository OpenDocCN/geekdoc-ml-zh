    \n```python\ndata['quarter'] = range(1, len(data)+1)\ndata.drop('yr_qtr', axis=1,\
    \ inplace=True)\ndata.index = data['quarter']\n```\n\n注意更新后的索引和`quarter`值：\n\n\
    | quarter | year | quarter | realcons | realinv | realdpi |\n| :--- | :--- | :---\
    \ | :--- | :--- | :--- |\n| 1 | 1959 | 1 | 1707.4 | 286.898 | 1886.9 |\n| 2 |\
    \ 1959 | 2 | 1733.7 | 310.859 | 1919.7 |\n| 3 | 1959 | 3 | 1751.8 | 289.226 |\
    \ 1916.4 |\n| 4 | 1959 | 4 | 1753.7 | 299.356 | 1931.3 |\n| 5 | 1960 | 5 | 1770.5\
    \ | 331.722 | 1955.5 |\n\n图12.8 – 用于VAR建模的宏观数据集的前五行\n\n在这里，我们将通过六个步骤，使用我们导入并准备好的数据集（部分显示在*图12.8*中）来构建一个VAR模型。\n\
    \n## 步骤1 – 可视化检查\n\n在*图12.9*的数据折线图中，我们可以看到似乎存在强烈的线性趋势。我们需要检查ACF图来评估这一点。之后，我们将运行**迪基-富勒检验**来确认：\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_358_0.png)\n\n*图12.10*中的ACF图显示出强烈的线性趋势和至少一个单位根的迹象，这很可能导致了该趋势：\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_358_1.png)\n\n运行迪基-富勒检验后，我们可以看到每个变量都包含一个单位根，因此是趋势性的。因此，我们需要对所有三个变量应用一阶差分，以便我们能够朝着使数据平稳化的方向努力。回想一下，**迪基-富勒检验的原假设是存在单位根**，而备择假设是不存在单位根。我们将执行以下代码：\n\

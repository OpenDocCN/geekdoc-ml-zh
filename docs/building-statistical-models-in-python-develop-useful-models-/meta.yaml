    The equation for the population Pearson''s coefficient, $\rho$, is shown here:


    $$\rho = \frac{\sigma_{xy}}{\sigma_x \sigma_y}$$


    Here, $\sigma_{xy}$ is the population covariance, calculated as follows:


    $$\sigma_{xy} = \frac{\sum_{i=1}^{N} (x_i - \mu_x)(y_i - \mu_y)}{N}$$


    The equation for the sample Pearson''s coefficient, $r$, is shown here:


    $$r = \frac{S_{xy}}{S_x S_y}$$


    Here, $S_{xy}$ is the sample covariance, calculated as follows:


    $$S_{xy} = \frac{\sum_{i=1}^{n} (x_i - \bar{x})(y_i - \bar{y})}{n - 1}$$



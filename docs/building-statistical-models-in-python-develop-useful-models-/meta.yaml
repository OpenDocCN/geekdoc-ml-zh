    \n很明显，包含所有特征会产生性能最佳的模型，但包含全部10个特征相比仅使用5个特征，性能提升很小。虽然性能最佳的模型包含所有10个特征，但我们仍然需要考虑模型假设并验证模型是否拟合良好。\n\
    \n在本节中，我们研究了几种特征选择方法，包括统计方法和基于性能的方法。我们还讨论了评估指标以及如何比较模型，包括将数据划分为训练集和验证集的原因。在下一节中，我们将研究线性回归收缩方法。这类模型使用一种称为正则化的方法，在某些方面类似于基于模型的特征选择。\n\
    \n## 收缩方法\n\n**偏差-方差权衡**是所有统计和机器学习从业者在进行建模时必须平衡的一个决策点。任何一方过多都会使结果变得无用。为了在它们成为问题时捕捉到这一点，我们会查看测试结果和残差。例如，假设已经选择了一组有用的特征和合适的模型，一个在验证集上表现良好但在测试集上表现不佳的模型可能表明方差过大；相反，一个完全表现不佳的模型可能偏差过大。在这两种情况下，模型都无法很好地泛化。然而，虽然模型中的偏差可以从一开始就在较差的模型性能中识别出来，但高方差可能具有欺骗性，因为它有可能在训练期间甚至在验证期间表现良好，这取决于数据。高方差模型经常使用不必要的高系数值，而使用非不必要的高系数值可以获得非常相似的结果。此外，使用非不必要的高系数值，模型更可能处于偏差-方差平衡状态，这为其在未来的数据上更好地泛化提供了更好的机会。此外，当模型系数没有被夸大时，可以提供关于当前因素对给定目标影响的更可靠的见解，这有助于进行更有用的描述性分析。这就引出了收缩的概念。\n\
    \n**收缩**是一种通过将模型参数系数向零收缩来减少模型方差的方法。系数是通过对模型考虑的所有变量应用最小二乘回归得出的。收缩量基于参数对最小二乘估计的贡献；对平方误差贡献大的参数，其系数将被推向零或完全归零。在这种情况下，收缩可用于变量消除。在模型拟合过程中，对高平方误差没有贡献的变量，其系数值将仅受到最小程度的减少，因此，如果其纳入的实际目的经过审查，它们对模型拟合是有用的。收缩——也称为**正则化**——之所以重要，是因为它有助于模型包含有用的变量，同时防止它们引入过多的方差，从而导致过拟合。防止过多的方差对于确保模型随时间推移良好泛化特别有用。让我们看一些最常见的收缩技术，**岭回归**和**最小绝对收缩和选择算子（LASSO）回归**。\n\
    \n## 岭回归\n\n回顾一下，使用最小二乘回归的多元线性回归的**残差平方和（RSS）**公式如下：\n\n$$RSS = \\sum_{i=1}^{n}\

    In this section, we have looked at several methods for feature selection, including
    statistical methods and performance-based methods. We also discussed metrics and
    how to compare models, including the reason for splitting the data into training
    and validation sets. In the next section, we will look at linear regression shrinkage
    methods. These types of models use a method called regularization, which in some
    ways acts like model-based feature selection.


    # Shrinkage methods


    The **bias-variance trade-off** is a decision point all statistics and machine
    learning practitioners must balance when performing modeling. Too much of either
    renders results useless. To catch these when they become issues, we look at test
    results and the residuals. For example, assuming a useful set of features and
    the appropriate model have been selected, a model that performs well on validation,
    but poorly on a test set could be indicative of too much variance and conversely,
    a model that fails to perform well at all could have too much bias. In either
    case, both models fail to generalize well. However, while bias in a model can
    be identified in poor model performance from the start, high variance can be notoriously
    deceptive as it has the potential to perform very well during training and even
    during validation, depending on the data. High-variance models frequently use
    values of'
  merge: -1
  pgno: 208
- img_proc: true
  md: 'coefficients that are unnecessarily high when very similar results can be obtained
    from coefficients that are not. Further, in using coefficients that are not unnecessarily
    high, the model is more likely to be in bias-variance equilibrium, which provides
    it a better chance of generalizing well on future data. Additionally, more reliable
    insights into the influence of current factors on a given target are provided
    when model coefficients are not exaggerated, which aids in more useful descriptive
    analysis. This brings us to the concept of shrinkage.


    **Shrinkage** is a method that reduces model variance by shrinking model parameter
    coefficients toward zero. The coefficients are derived by applying least squares
    regression to all variables considered for a model. The amount of shrinkage is
    based on the parameters'' contribution to least squares estimates; parameters
    that contribute to a high level of squared error will have their coefficients
    pushed toward zero or zeroed out altogether. In this case, shrinkage can be used
    for variable elimination. Variables that do not contribute to high squared error
    across the model fit will have a minimal reduction in coefficient value, thus
    being useful for model fitting, assuming the practical purpose of their inclusion
    is vetted. The reason shrinkage – also called **regularization** – is important
    is because it helps models include useful variables while preventing them from
    introducing too much variance and thus overfitting. Preventing excess variance
    is particularly useful for ensuring that models generalize well over time. Let''s
    look at some of the most common shrinkage techniques, **ridge regression** and
    **Least Absolute Shrinkage and Selection Operator (LASSO) Regression**.


    # Ridge regression


    Recall the formulation for the **residual sum of squared errors (RSS)** for multiple
    linear regression using least squares regression is as follows:


    $$RSS = \sum_{i=1}^{n} \left( y_i - \widehat{\beta}_0 - \sum_{j=1}^{p} \widehat{\beta}_j
    x_{ij} \right)^2$$


    where $n$ is the number of samples and $p$ is the number of parameters. Ridge
    regression adds a scalar, $\lambda$, called a **tuning parameter** – which must
    be greater than or equal to 0 – that gets multiplied by the model parameter coefficient
    estimates, $\widehat{\beta}_j^2$, to create a **shrinkage penalty**. This gets
    added back to the RSS equation such that the new least squares regression''s fitting
    procedure is now defined as follows:


    $$RSS + \lambda \sum_{j=1}^{p} \widehat{\beta}_j^2$$


    When $\lambda=0$, the respective ridge regression **penalty term** is 0. However,
    as $\lambda \longrightarrow \infty$, the model coefficients shrink toward zero.
    The new fitting procedure can be rewritten as follows:


    $$\|y - X\beta\|_2^2 + \lambda \|\beta\|_2^2$$'

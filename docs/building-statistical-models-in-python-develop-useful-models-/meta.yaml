- md: "Note the use of the `method` and `interpolation` keyword arguments in the `quantiles`\
    \ function and the `iqr` function, respectively. Several options can be used for\
    \ these keyword arguments, which will lead to different results.\n\nQuartiles\
    \ are often visualized with a boxplot. The following Figure 2.11 shows the main\
    \ parts of a boxplot. A boxplot is made up of two main parts:\n\n- The box\n-\
    \ The whiskers\n\nThe box part represents 50% of the data that is contained by\
    \ the IQR. The whiskers are drawn starting from the edge of the boxes to a length\
    \ of k * IQR, where k is commonly chosen to be 1.5. Any values beyond the whiskers\
    \ are considered outliers.\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_55_0.png)\n\
    \nFigure 2.12 shows how histograms and boxplots visualize the variability of a\
    \ symmetric and asymmetric distribution. Notice how the boxplot of the asymmetric\
    \ data is compressed on the left and expanded on the right, while the other boxplot\
    \ is clearly symmetric. While a boxplot is useful for visualizing the symmetry\
    \ of the data and the presence of outliers, the modality of the distribution would\
    \ not be evident.\n\n## Distributions of Data\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_56_0.png)\n\
    \nWhen exploring, it is common to use multiple visualizations since each type\
    \ of visualization has its own advantages and disadvantages. It is common to use\
    \ multiple visualizations since each type of visualization has its own advantages\
    \ and disadvantages.\n\n## Tukey fences\n\nIn the last few sections on measurements,\
    \ the concept of outliers has appeared a few times. Outliers are values that are\
    \ atypical compared to the main distribution, or anomalous values. While there\
    \ are methods for classifying data points as outliers, there is no generally robust\
    \ method for classifying data points as outliers. Defining outliers typically\
    \ should be informed by the use case of the data analysis, as there will be different\
    \ factors to consider based on the application domain. However, it is worth mentioning\
    \ the common technique shown in the boxplot example called Tukey fences. The lower\
    \ and upper Tukey fences are based on the IQR and defined as follows:\n\n- Lower\
    \ fence: $Q1 - k(IQR)$\n- Upper fence: $Q3 + k(IQR)$\n\nAs mentioned earlier,\
    \ k is often chosen to be 1.5 as a default value, but there may be a more appropriate\
    \ value for a given application domain.\n\nNow let's take a look at how to calculate\
    \ Tukey fences with numpy and scipy. This code example will build upon the previous\
    \ example since there is no function to calculate the fences directly. We will\
    \ again calculate the quartiles and the IQR with numpy and scipy. Then, we apply\
    \ these operations to the values listed in the preceding equations:\n\n```python\n\
    import numpy as np\nfrom scipy import stats\nvalues = stats.norm.rvs(10, size=3000)\n\
    q1, q3 = np.quantile(values, [.25, .75],\n    method='closest_observation')\n\
    iqr = stats.iqr(values, interpolation='closest_observation')\nlower_fence = q1\
    \ - iqr * 1.5\nupper_fence = q3 + iqr * 1.5\n# may vary due to randomness in data\
    \ generation\nprint(f\"The lower fence is {lower_fence:.2f} and the upper fence\
    \ is {upper_fence:.2f}\")\n# The lower fence is 7.36 and the upper fence is 12.67\n\

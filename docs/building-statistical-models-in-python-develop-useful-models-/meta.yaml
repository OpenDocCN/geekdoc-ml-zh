    print(f"该正态分布的峰度值为 {symmetric_value:.3f}")


    在本节中，我们介绍了用于衡量和描述数据分布的常用描述性统计量。这些度量提供了一种用于描述和比较分布的通用语言。本章讨论的概念是后续章节中许多概念的基础。在下一节中，我们将讨论正态分布，并使用这些度量来描述正态分布。


    ## 正态分布与中心极限定理


    在讨论正态分布时，我们指的是钟形的**标准正态分布**，它在形式上与**高斯分布**同义，后者以18至19世纪的数学家和物理学家卡尔·弗里德里希·高斯的名字命名。高斯在众多贡献中，包括了近似概念，并于1795年发明了最小二乘法和正态分布，后者在统计建模技术（如最小二乘回归）中被广泛使用[3]。标准正态分布，也称为**参数**分布，其特征是数据点围绕均值对称分布，且离散概率一致——即数据出现在均值附近的频率高于远离均值的数据。由于该分布内的位置数据遵循概率定律，我们可以称之为**标准正态概率分布**。顺便提一下，统计学中非概率分布是通过基于非随机选择的非概率抽样生成的，而概率分布则基于随机抽样。基于概率和非概率的分布都可以具有标准正态分布。标准正态分布既不偏斜也不具有峰度。它在整个范围内方差相等，并且在自然界中频繁出现。**经验法则**用于描述该分布具有围绕均值μ的三个相关标准差。关于该分布有两个不同的假设：


    - 第一、第二和第三个标准差分别包含68%、95%和99.7%的离散测量值

    - 均值、中位数和众数彼此相等


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_63_0.png)


    图2.15 – 标准正态分布


    正态分布的两种常见形式如下：


    - 概率密度分布

    - 累积密度分布


    如前所述，概率密度分布基于随机抽样，而累积密度分布基于累积数据，这些数据不一定是随机的。


    标准正态分布的双尾概率密度函数如下：


    $$f(x) = \frac{e^{-\frac{(x-\mu)^2}{2\sigma^2}}}{\sigma\sqrt{2\pi}}$$


    标准正态分布的左尾累积函数如下：


    $$f(x) = \int_{-\infty}^{x} \frac{e^{-\frac{x^2}{2}}}{\sqrt{2\pi}}$$


    在统计建模方面，正态分布代表平衡和对称。这在构建统计模型时很重要，因为许多模型假设正态分布，并且对于偏离该假设的许多情况并不稳健，因为它们是围绕均值构建的。因此，如果此类模型中的变量不是正态分布的，模型的误差将会增加且不一致，从而降低模型的稳定性。在考虑统计模型中的多个变量时，当两者都是正态分布时，它们的交互作用更容易近似。


    在下面的*图2.16*中，左侧图中，变量X和Y相互作用，并围绕均值产生集中的离散。在这种情况下，可以使用均值线或线性距离合理地使用X对Y进行建模。然而，如果两个变量的分布是偏斜的，如右侧图所示，这将导致两者之间的方差不恒定，从而导致误差分布不均和输出不可靠。


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_64_0.png)


    对于线性分类和回归模型，这意味着某些结果会比其他结果更好，而某些结果可能非常糟糕。有时使用基本模型指标很难评估这一点，需要更深入的模型分析，以防止信任可能最终具有误导性的结果。此外，部署到生产环境中将非常有风险。更多相关内容将在*第6章*中讨论。


    ## 中心极限定理


    在抽样数据时，经常会遇到非正态数据的问题。这可能有多种原因，例如总体不具有正态分布或样本不能代表总体。中心极限定理在统计推断中很重要，它假设如果从具有特定均值μ和**标准差σ**的总体中抽取*n*个观测值的随机样本，则由随机选择的子样本分布的均值构建的抽样分布将近似于具有大致相同均值μ和标准差（计算为$\sqrt{\frac{\sum(x_i
    - \mu)^2}{N}}$）的正态分布。下一节将使用自助法来演示中心极限定理的实际应用。后面讨论转换的部分将提供重塑不符合正态分布的数据分布的技术，以便仍然可以有效地应用需要正态分布的工具。


    ## 自助法


    自助法是一种重采样方法，它使用随机抽样——通常是有放回抽样——通过对抽样子集进行重采样来生成关于总体的统计估计，例如：


    - 置信区间

    - 标准误差

    - 相关系数（皮尔逊相关系数）


    其思想是，重复抽样样本分布的不同随机子集并每次取平均值，在足够多的重复次数下，将开始使用每个子样本的平均值来近似真实总体。这直接遵循中心极限定理的概念，重申一下，该定理断言，随着样本量和数量的增加，抽样均值开始近似于以原始分布均值为中心的正态抽样分布。当分布中相对于特定测试所需的样本数量有限，但需要推断时，自助法非常有用。


    如*第1章，抽样与泛化*中所讨论的，时间和费用等限制是获取样本而非总体的常见原因。由于自助法的基本概念是使用样本对总体进行假设，因此将此技术应用于总体并无益处，因为总体的真实统计参数（如百分位数和方差）是已知的。关于样本准备，样本中的属性平衡应代表总体的真实近似。否则，结果可能会产生误导。例如，如果动物园内物种的总体是40%爬行动物和60%哺乳动物的划分，并且我们想要自助法分析它们的寿命以确定其寿命的置信区间，则有必要确保应用自助法的数据集包含40%爬行动物和60%哺乳动物的划分；例如，15%爬行动物和85%哺乳动物的划分将导致误导性结果。换句话说，样本分层应按比例与总体保持平衡。'

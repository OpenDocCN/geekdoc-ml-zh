    \ = 10*9*8 = 720$$\n```\n\n从晚会上的 10 个人中选择 3 个人来分配 1,000 美元、500 美元和 200 美元的 3 个奖品，有\
    \ 720 种方式。\n\n在 Python 中，有一个名为 itertools 的包可以帮助我们直接找到排列。读者可以查看以下链接 – https://docs.python.org/3/library/itertools.html\

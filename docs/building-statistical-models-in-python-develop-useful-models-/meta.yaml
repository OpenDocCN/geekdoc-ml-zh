  md: '# Power analysis examples


    Power analysis is a statistical method for identifying an appropriate sample size
    required for a hypothesis test to have sufficient power in preventing *Type II*
    errors – or failing to reject the null hypothesis when the null hypothesis should
    be rejected. Power analysis can also be used for identifying, based on sample
    size, a detectable effect size (or difference) between samples tested. In other
    words, based on a specific sample size and distribution, a power analysis can
    provide the analyst with a specific minimum difference the researcher may be able
    to reliably identify with a given test. In this section, we will demonstrate a
    power analysis using a one-sample t-test.


    # One-sample t-test


    Let''s assume a manufacturer sells a type of machine capable of producing 100,000
    units per month with a standard deviation of 2,800 units. A company has bought
    a number of these machines and has found them to only be producing 90,000 units.
    The company wants to know how many of the machines are needed to determine with
    a high level of confidence the machines are not capable of producing 100,000 units.
    The following power analysis indicates that for a t-test, a sample of three machines
    is required to prevent, with an 85% probability, failing to identify a statistically
    significant difference in actual versus marketed machine performance when there
    is one:


    ```

    from statsmodels.stats.power import TTestPower

    import numpy as np

    # Difference of distribution mean and the value to be assessed

    divided by the distribution standard deviation

    effect_size = abs(100000-90000) / 2800

    powersTT = TTestPower()

    result = powersTT.solve_power(effect_size, nobs=3, alpha=0.05,

    alternative=''two-sided'')

    print(''Power based on sample size:{}''.format(round(result,2)))

    # Power based on sample size: 0.85

    ```


    # Additional power analysis example


    To see additional examples of power analysis in Python, please refer to this book''s
    GitHub repository. There, we have examples for additional t-tests and F-tests,
    which focus on analyzing variance between sample groups.'

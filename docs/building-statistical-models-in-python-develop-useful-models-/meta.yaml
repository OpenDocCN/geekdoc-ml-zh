    \ using the Dickey-Fuller test on the first differenced data:\n\n```\nfirst_diff\
    \ = np.diff(y_macro_economic.realgdp.values, n=1)\nadf_test.should_diff(first_diff)\n\
    # (0.01, False)\n```\n\nThe Dickey-Fuller test returns a p-value of 0.01 for the\
    \ first differenced data, which means we can reject the null hypothesis and we\
    \ can stop differencing the data. That means that our ARIMA model for this data\
    \ will have a difference order of 1 ($d = 1$).\n\nAfter finding the difference\
    \ order, we can fit an ARMA model to the differenced data. Since we have already\
    \ discussed fitting ARMA models, we will use an automated fitting method provided\
    \ by pmdarima. pm.auto_arima is a function for automatically fitting an ARIMA\
    \ model to data, however, in this case, we will use it to fit the ARMA portion\
    \ from the differenced series. The output of pm.auto_arima for the first difference\
    \ data is shown in the following code block:\n\n```\npm.auto_arima(\n    first_diff,\
    \ error_action='ignore', trace=True,\n    suppress_warnings=True, maxiter=5, seasonal=False,\n\
    \    test='adf'\n)\nPerforming stepwise search to minimize aic\nARIMA(2,0,2)(0,0,0)[0]\
    \             : AIC=2207.388, Time=0.03 sec\nARIMA(0,0,0)(0,0,0)[0]          \

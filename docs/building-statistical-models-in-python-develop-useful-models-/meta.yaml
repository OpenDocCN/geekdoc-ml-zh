    Two common forms of a normal distribution are as follows:


    +   - The probability density distribution

    - The cumulative density distribution


    As mentioned before, the probability density distribution is based on random sampling,
    whereas the cumulative density distribution is based on accumulated data, which
    is not necessarily random.


    The two-tailed probability density function of the standard normal distribution
    is this:


    ```

    $$f(x) = \frac{e^{-\frac{(x-\mu)^2}{2\sigma^2}}}{\sigma\sqrt{2\pi}}$$

    ```


    The left-tailed cumulative function of the standard normal distribution is this:


    ```

    $$f(x) = \int_{-\infty}^{x} \frac{e^{-\frac{x^2}{2}}}{\sqrt{2\pi}}$$

    ```'

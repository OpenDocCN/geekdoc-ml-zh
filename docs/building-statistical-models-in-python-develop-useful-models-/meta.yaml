    # Permutation testing


    Permutation testing is a non-parametric test that does not make the required assumption
    of normally distributed data. Both bootstrapping and permutations are useful for
    resampling techniques but best for different uses, one for estimating statistical
    parameters (bootstrapping) and another for hypothesis testing. Permutation testing
    is used to test the null hypothesis between two samples generated from the same
    population. It has different names such as **exact testing**, **randomization
    testing**, and **re-randomization testing**.


    First, we go to see a simple example for better understanding before implementing
    the code in Python. We suppose that there are 2 groups of people, one group representing
    children (A) and another group representing people over 40 years old (B) as follows:


    $$A = [3,5,4] \text{ and } B = [43,41,56,78,54]$$


    The mean difference in age between the two samples A and B is


    $$\frac{43 + 41 + 56 + 78 + 54}{5} - \frac{3 + 5 + 4}{3} = 50.4$$'

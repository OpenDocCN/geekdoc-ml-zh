    让我们首先计算研究中所有患者的生存函数。我们将使用 `lifelines` 中的 `KaplanMeierFitter`。这是一个对象，它将是我们刚刚讨论的
    Kaplan-Meier 模型。为了拟合这个模型，我们将使用 `fit()` 方法，它接受两个参数：`duration` 和 `event_observed`。`duration`
    是患者在研究中存活了多久。`event_observed` 是死亡是否被观察到：`True` 表示观察到，`False` 表示未观察到。数据已经设置好可以与这两个参数一起使用。我们可以如下拟合模型：


    ```python

    import matplotlib.pyplot as plt


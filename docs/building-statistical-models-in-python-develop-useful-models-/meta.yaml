    \ to distribute the prizes in the first example. Then, there is only 1 way to\
    \ distribute the same amount of $500 to Huy, Paul, and Stuart. The mathematical\
    \ formula of combinations is this:\n\n$$C(n,r) = \\frac{n!}{r!(n-r)!}$$\n\nHere,\
    \ $C(n,r)$ is the number of combinations, $n$ is the total number of objects in\
    \ a set, and $r$ is the number of objects that can be chosen from the set. Similarly,\
    \ we can calculate that there are\n\n$$\\frac{10!}{3!(10-3)!} = \\frac{10.9.8}{1.2.3}\
    \ = \\frac{720}{6} = 120$$\n\nways to distribute 3 prizes of $500.\n\nIn Python,\
    \ we also use the `itertools` package but, instead of the `permutations` function,\
    \ we import the `combinations` function:\n\n```\nfrom itertools import combinations\n\
    # list of 10 people in the party\npeople = ['P1','P2','P3','P4','P5','P6','P7','P8','P9','P10']\n\
    # all the ways that the 3 prizes are distributed\ncomb = combinations(people,\
    \ 3)\nlist_comb = list(comb)\nprint(f\"There are {len(list_comb)} ways to distribute\
    \ the prizes!\")\n```\n\n## Permutation testing\n\nPermutation testing is a non-parametric\
    \ test that does not make the required assumption of normally distributed data.\
    \ Both bootstrapping and permutations are useful for resampling techniques but\
    \ best for different uses, one for estimating statistical parameters (bootstrapping)\
    \ and another for hypothesis testing. Permutation testing is used to test the\
    \ null hypothesis between two samples generated from the same population. It has\
    \ different names such as **exact testing**, **randomization testing**, and **re-randomization\
    \ testing**.\n\nFirst, we go to see a simple example for better understanding\
    \ before implementing the code in Python. We suppose that there are 2 groups of\
    \ people, one group representing children (A) and another group representing people\
    \ over 40 years old (B) as follows:\n\n$$A = [3,5,4] \\text{ and } B = [43,41,56,78,54]$$\n\
    \nThe mean difference in age between the two samples A and B is\n\n$$\\frac{43\
    \ + 41 + 56 + 78 + 54}{5} - \\frac{3 + 5 + 4}{3} = 50.4$$\n\nWe merge A and B\
    \ into a single set, denoted as P as follows:\n\nP = [3,5,4,43,41,56,78,54].\n\
    \nThen, we take a permutation of P, for example, the following:\n\nP_new = [3,\
    \ 54, 78, 41, 4, 43, 5, 56]\n\nNext, we redivide P_new into 2 subsets called A_new\
    \ and B_new, which have the same size as A and B, respectively:\n\nA_new = [3,54,78]\
    \ and B_new = [41,4,43,5,56]\n\nThen, the mean difference in age between A_new\
    \ and B_new is 15.2, which is lower than the original mean difference in age between\
    \ A and B (50.4). In other words, the permuted P_new does not contribute to the\
    \ p-value. We can observe that only one permutation drawn from all possible permutations\
    \ of P is greater than or equal to the original mean difference itself, P. Now\
    \ we will implement the code in Python:\n\n```\nimport numpy as np\n# create permutation\
    \ testing function\ndef permutation_testing(A,B,n_iter=1000):\n    #A, B are 2\
    \ lists of samples to test the hypothesis,\n    #n_iter is number of iterations\
    \ with the default is 1000\n    differences = []\n    P = np.array(A+B)\n    original_mean\
    \ = np.array(A).mean() - np.array(B).mean()\n    for i in range(n_iter):\n   \
    \     np.random.shuffle(P)#create a random permutation of P\n        A_new = P[:len(A)]\
    \ # having the same size of A\n        B_new = P[-len(B):] # having the same size\
    \ of B\n        differences.append(A_new.mean()-B_new.mean())\n    #Calculate\
    \ p_value\n    p_value = round(1-(float(len(np.where(\n        differences<=original_mean)[0]))/float(n_iter)),2)\n\
    \    return p_value\n```\n\nIn the preceding Python code, A and B are two samples\
    \ and we want to know whether they are from the same larger population; n_iter\
    \ is the number of iterations that we want to perform; here, 1,000 is the default\
    \ number of iterations.\n\nLet's perform permutation testing for the two groups\
    \ of people in the example with 10,000 iterations:\n\n```\nA = [3,5,4]\nB = [43,41,56,78,54]\n\
    permutation_testing(A,B,n_iter=10000)\n```\n\nThe p-value obtained is 0.98. That\
    \ means that we fail to reject the null hypothesis, or there is not enough evidence\
    \ to confirm that samples A and B are from the same larger population.\n\nNext,\
    \ we will explore an important and necessary step in many statistical tests requiring\
    \ the normal distribution assumption.\n\n## Transformations\n\nIn this section,\
    \ we will consider three transformations:\n\n- Log transformation\n- Square root\
    \ transformation\n- Cube root transformation\n\nFirst, we will import the numpy\
    \ package to create a random sample drawn from a Beta distribution. The documentation\
    \ on Beta distributions can be found here:\n\nhttps://numpy.org/doc/stable/reference/random/generated/numpy.random.beta.html\n\
    \nThe sample, df, has 10,000 values. We also use matplotlib.pyplot to create different\
    \ histogram plots. Second, we transform the original data by using a log transformation,\
    \ square root transformation, and cube root transformation, and we draw four histograms:\n\
    \n```\nimport numpy as np\nimport matplotlib.pyplot as plt\nnp.random.seed(42)\
    \ # for reproducible purpose\n# create a random data\ndf = np.random.beta(a=1,\
    \ b=10, size = 10000)\ndf_log = np.log(df) #log transformation\ndf_sqrt = np.sqrt(df)\
    \ # Square Root transformation\ndf_cbrt = np.cbrt(df) # Cube Root transformation\n\
    \nplt.figure(figsize = (10,10))\nplt.subplot(2,2,1)\nplt.hist(df)\nplt.title(\"\
    Original Data\")\nplt.subplot(2,2,2)\nplt.hist(df_log)\nplt.title(\"Log Transformation\"\
    )\nplt.subplot(2,2,3)\nplt.hist(df_sqrt)\nplt.title(\"Square Root Transformation\"\
    )\nplt.subplot(2,2,4)\nplt.hist(df_cbrt)\nplt.title(\"Cube Root Transformation\"\
    )\nplt.show()\n```\n\nThe following is the output of the code:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_78_0.png)\n\
    \nUsing transformation, we can see the transformed histograms are more normally\
    \ distributed than the original one. It seems that the best transformation in\
    \ this example is cube root transformation. With real-world data, it is important\
    \ to determine whether a transformation is needed, and, if so, which transformation\
    \ should be used.\n\nOther data transformation methods, for example, finding duplicate\
    \ data, dealing with missing values, and feature scaling will be discussed in\
    \ hands-on, real-world use cases in Python in the following chapters.\n\n## Summary\n\
    \nIn the first section of this chapter, we learned about types of data and how\
    \ to visualize these types of data. Then, we covered how to describe and measure\
    \ attributes of data distribution. We learned about the standard normal distribution,\
    \ why it's important, and how the central limit theorem is applied in practice\
    \ by demonstrating bootstrapping. We also learned how bootstrapping can make use\
    \ of non-normally distributed data to test hypotheses using confidence intervals.\
    \ Next, we covered mathematical knowledge as permutations and combinations and\
    \ introduced permutation testing as another non-parametric test in addition to\
    \ bootstrapping. We finished the chapter with different data transformation methods\
    \ that are useful in many situations when performing statistical tests requiring\
    \ normally distributed data.\n\nIn the next chapter, we will take a detailed look\
    \ at hypothesis testing and discuss how to draw statistical conclusions from the\
    \ results of the tests. We will also look at errors that can occur in statistical\
    \ tests and how to select statistical power.\n\n## References\n\n- [1] Skewness\
    \ - https://www.itl.nist.gov/div898/handbook/eda/section3/eda35b.htm\n- [2] Kurtosis\
    \ - https://www.itl.nist.gov/div898/handbook/eda/section3/eda35b.htm#:~:text=Kurtosis%20is%20a%20measure%20of,would%20be%20the%20extreme%20case.\n\
    - [3] Normal Distribution - C.F. GAUSS AND THE METHOD OF LEAST SQUARES, ŚLĄSKI\
    \ PRZEGLĄD STATYSTYCZNY Silesian Statistical Review, Nr 12(18), O. Sheynin, Sep.\
    \ 1999\n\n# 3 Hypothesis Testing\n\nIn this chapter, we will begin discussing\
    \ drawing statistical conclusions from data, putting together sampling and experiment\
    \ design from *Chapter 1, Sampling and Generalization* and distributions from\
    \ *Chapter 2, Distributions of Data*. Our primary use of statistical modeling\
    \ is to answer questions of interest from data. Hypothesis testing provides a\
    \ formal framework for answering questions of interest with measures of uncertainty.\
    \ First, we will cover the goals and structure of hypothesis testing. Then, we\
    \ will talk about the errors that can occur from hypothesis tests and define the\
    \ expected error rate. Then, we will walk through the hypothesis test process\
    \ utilizing the z-test. Finally, we will discuss statistical power analysis.\n\
    \nIn this chapter, we're going to cover the following main topics:\n\n- The goal\
    \ of hypothesis testing\n- Type I and type II errors\n- Basics of the z-test –\
    \ the z-score, z-statistic, critical values, and p-values\n- One-sample and two-sample\
    \ z-tests for means and proportions\n- Selecting error rate and power analysis\n\
    - Applying the power analysis to the z-test\n\n## The goal of hypothesis testing\n\
    \nPut simply, the goal of hypothesis testing is to decide whether the data we\

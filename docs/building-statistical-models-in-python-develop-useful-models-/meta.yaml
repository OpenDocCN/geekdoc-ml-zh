  md: '# Cox Proportional Hazards regression model


    Survival analysis, also called TTE analysis, as we discussed in *Chapter 13, Time-to-Event
    Variables*, is an analytical approach that uses probability to estimate the time
    remaining before an event occurs based on previous observations. We have seen
    how this can be helpful when including appropriate covariates in applications
    such as estimating life expectancy, mechanical failure, and customer churn, which
    can help with prioritizing needs and to more efficiently allocate resources. As
    we discussed in depth in *Chapter 13*, censoring is an aspect making survival
    analysis unique from other statistical questions that can be solved using techniques
    such as regression. Consequently—and because dropping an observation due to censoring
    will almost certainly mislead our model and provide results we cannot trust—we
    insert what is known as an **event status indicator** to help account for whether
    an event will occur or fail to occur prior to estimating the time before an event’s
    occurrence. Recall that the event status indicator, $\delta$, for object $i$ is
    described as follows:


    ```

    $$\delta_i = \begin{cases} 1 \text{ if the event was observed,} \ 0 \text{ if
    censoring was observed.} \end{cases}$$

    ```


    We noted that $\delta_i = 1$ when the true event $T_i$ occurs *before* censoring
    time $C_i$ and $\delta_i = 0$ when the true event $T_i$ occurs *after* censoring
    time $C_i$, and that thus, the outcome $Y$ for object $i$ is this:


    ```

    $$Y_i = \min(T_i, C_i)$$

    ```


    Censored survival data for object $i$ can be captured as $(Y_i, \delta_i)$. In
    this chapter, we have discussed the **non-parametric Kaplan-Meier survival model**,
    which uses a raw conditional probability of survival counts respective to the
    sample volume at each point in time without consideration of covariates. We then
    walked through the parametric **exponential survival model**, which, unlike the
    Kaplan-Meier model assumes the data fits specific distributions and additionally
    includes a hazard ratio to compare groups. We will now discuss the semi-parametric
    **Cox Proportional Hazards survival model**, also referred to as the **Cox Proportional
    Hazards regression model**.


    The primary purpose and distinction of the Cox Proportional Hazards model is to
    use multiple covariates risk factors to model survival time. These covariates
    can be categorical or continuous. The Cox Proportional Hazards model is able to
    account for differences in survival between groups by leveraging the **hazard
    ratio**. As we have discussed, the hazard ratio is the ratio of the event rate,
    at any point in time, for one group with respect to another group provided that
    survival up to that point in time has been maintained among the two groups.


    The hazard ratio can be calculated as follows:


    ```

    $$\frac{\sum \text{Observed events in group A at time } t}{\sum \text{Expected
    events in group A at time } t} \Bigg/ \frac{\sum \text{Observed events in group
    B at time } t}{\sum \text{Expected events in group B at time } t}$$

    ```'
  merge: -1
  pgno: 392
- img_proc: true
  md: 'The issue with the hazard ratio is that when we fail to obtain a balance of
    values across covariates shared among the groups, we lose control of confounding
    variables. When we cannot control for confounding variables, we cannot reliably
    obtain inference. To account for any imbalance that may exist among covariate
    values in survival analysis, we can use the **Cox Proportional Hazards model**
    to introduce coefficients that help explain different levels of exogenous influence.
    The model follows this form:


    $$h(t) = h_0(t) e^{(\beta_1 X_1 + \beta_2 X_2 + \dots + \beta_n X_n)}$$


    Here, $h(t)$ is the expected hazard value at the base time, $t$, $h_0(t)$ is the
    baseline hazard value at $t$ when all covariates in the variable matrix $X$ are
    equal to zero, and $n$ is the count of variables included in the model. The coefficients
    $\beta_i$ provide quantification into the impact (effect) of each columnar variable
    in $X$. Therefore, we are able to predict survival using the specific values of
    the input variables multiplied against their corresponding estimated coefficients.


    Cox Proportional Hazards has three pertinent assumptions:


    +   - It is assumed the hazard ratio *remains constant* through follow-up. If
    the nature of input for one group is subject to change, this may negatively influence
    the results of the model; for example, we compare the performance of two machines,
    but one is likely to improve when the weather is warmer and the other is not,
    so our model may not be able to properly model mechanical survival.

    - Complete *survival independence*. This means the survival of one study participant
    or object has no dependence on the other. Consider two separate machines. If one''s
    vibrations are likely to result in an early failure that would not otherwise occur,
    and that vibration is additionally felt by the other machine, also at that other
    machine''s detriment, there may not be survival independence between the two machines.
    However, if the vibration of the first machine is not felt by the other, there
    is likely to be survival independence if all other confounders are controlled
    for.

    - The model assumes *any censoring that takes place is non-informative*. As such,
    any censoring that takes place does not introduce confounding into the model.
    Losing a study subject due to censoring prior to follow-up must not be correlated
    to changes in survival risk. For example, when testing the mechanical survival
    of two types of machines in a specific area of a facility, if one machine is relocated
    to another area of the facility to minimize its own self-destructive vibrations,
    this is informative censoring. However, if the machine was moved to a different
    area simply to make space and the move does not impact the machine''s survival
    risk or outcome, the censoring is non-informative. Therefore, it does not introduce
    model confounding. The Cox Proportional Hazards model is for **right-censored**
    data.'
  merge: -1
  pgno: 393

    of statistical tools we can use, the distributional assumptions that can be made
    about the sample, and the confidence of inferences and predictions. The impact
    of sample size will be explored in depth in *Chapter 2, Distributions of Data*
    and *Chapter 3, Hypothesis Testing*.


    # Population inference from samples


    When using a statistical model to make inferential conclusions about a population
    from a sample subset of that population, the study design must account for similar
    degrees of uncertainty in its variables as those in the population. This is the
    variation mentioned earlier in this chapter. To appropriately draw inferential
    conclusions about a population, any statistical model must be structured around
    a chance mechanism. Studies structured around these chance mechanisms are called
    **randomized experiments** and provide an understanding of both correlation and
    causation.


    # Randomized experiments


    There are two primary characteristics of a randomized experiment:


    +   - Random sampling, colloquially referred to as random selection

    - Random assignment of treatments, which is the nature of the study


    # *Random sampling*


    Random sampling (also called random selection) is designed with the intent of
    creating a sample representative of the overall population so that statistical
    models generalize the population well enough to assign cause-and-effect outcomes.
    In order for random sampling to be successful, the population of interest must
    be well defined. All samples taken from the population must have a chance of being
    selected. In considering the example of polling voters, all voters must be willing
    to be polled. Once all voters are entered into a lottery, random sampling can
    be used to subset voters for modeling. Sampling from only voters who are willing
    to be polled introduces sampling bias into statistical modeling, which can lead
    to skewed results. The sampling method in the scenario where only some voters
    are willing to participate is called **self-selection**. Any information obtained
    and modeled from self-selected samples – or any non-random samples – cannot be
    used for inference.


    # *Random assignment of treatments*


    The random assignment of treatments refers to two motivators:


    +   - The first motivator is to gain an understanding of specific input variables
    and their influence on the response – for example, understanding whether assigning
    treatment A to a specific individual may produce more favorable outcomes than
    a placebo.'
- md: '## Observational study


    The other type of statistical study often performed is an **observational study**,
    in which the researcher seeks to learn through observing data that already exists.
    An observational study can aid in the understanding of input variables and their
    relationships to both the target and each other, but cannot provide cause-and-effect
    understanding as a randomized experiment can. An observational study may have
    one of the two components of a randomized experiment – either random sampling
    or random assignment of treatment – but without both components, will not directly
    yield inference. There are many reasons why an observational study may be performed
    versus a randomized experiment, such as the following:


    - A randomized experiment being too costly

    - Ethical constraints for an experiment (for example, an experiment to determine
    the rate of birth defects caused by smoking while pregnant)

    - Using data from prior randomized experiments, which thus removes the need for
    another experiment


    One method for deriving some causality from an observational study is to perform
    random sampling and repeated analysis. Repeated random sampling and analysis can
    help minimize the impact of confounding variables over time. This concept plays
    a huge role in the usefulness of *big data* and *machine learning*, which has
    gained a lot of importance in many industries within this century. While almost
    any tool that can be used for observational analysis can also be used for a randomized
    experiment, this book focuses primarily on tools for observational analysis, as
    this is more common in most industries.


    It can be said that statistics is a science for helping make the best decisions
    when there are quantifiable uncertainties. All statistical tests contain a null
    hypothesis and an alternative hypothesis. That is to say, an assumption that there
    is no statistically significant difference between data (the null hypothesis)
    or that there is a statistically significant difference between data (the alternative
    hypothesis). The term statistically significant difference implies the existence
    of a benchmark – or threshold – beyond which a measure takes place and indicates
    significance. This benchmark is called the **critical value**.


    The measure that is applied against this critical value is called the **test statistic**.
    The critical value is a static value quantified based on behavior in the data,
    such as the average and variation, and is based on the hypothesis. If there are
    two possible routes by which a null hypothesis may be rejected – for example,
    we believe some output is either less than or more than the average – there will
    be two critical values (this test is called a **two-tailed** hypothesis test),
    but if there is only one argument against the null hypothesis, there will be only
    one critical value (this is called a **one-tailed** hypothesis test). Regardless
    of the number of critical values, there will always only be one test statistic
    measurement for each group within a given hypothesis test. If the test statistic
    exceeds the critical value, there is a statistically significant reason to support
    rejecting the null hypothesis and concluding there is a statistically significant
    difference in the data.


    It is useful to understand that a hypothesis test can test the following:


    - One variable against another (such as in a t-test)

    - Multiple variables against one variable (for example, linear regression)

    - Multiple variables against multiple variables (for example, MANOVA)


    In the following figure, we can see visually the relationship between the test
    statistic and critical values in a two-tailed hypothesis test.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_30_0.png)


    Based on the figure, we now have a visual idea of how a test statistic exceeding
    the critical value suggests rejecting the null hypothesis.


    One concern with using only the approach of measuring test statistics against
    critical values in the hypothesis, however, is that test statistics can be impractically
    large. This is likely to occur when there may be a wide range of results that
    are not considered to fall within the bounds of a treatment effect. It is uncertain
    whether a result as extreme as or more extreme than the test statistic is possible.
    To prevent misleadingly rejecting the null hypothesis, a **p-value** is used.
    The p-value represents the probability that chance alone resulted in a value as
    extreme as the one observed (the one that suggests rejecting the null hypothesis).
    If a p-value is low, relative to the level of significance, the null hypothesis
    can be rejected. Common levels of significance are 0.01, 0.05, and 0.10. It is
    beneficial to confirm prior to making a decision on a hypothesis to assess both
    the critical value''s relationship to the test statistic and the p-value. More
    will be discussed in *Chapter 3, Hypothesis Testing*, when we begin discussing
    hypothesis testing.


    ## Sampling strategies – random, systematic, stratified, and clustering


    In this section, we will discuss the different sampling methods used in research.
    Broadly speaking, in the real world, it is not easy or possible to get the whole
    population data for many reasons. For instance, the costs of gathering data are
    expensive in terms of money and time. Collecting all the data is impractical in
    many cases and ethical issues are also considered. Taking samples from the population
    can help us overcome these problems and is a more efficient way to collect data.
    By collecting an appropriate sample for a study, we can draw statistical conclusions
    or statistical inferences about the population properties. Inferential statistical
    analysis is a fundamental aspect of statistical thinking. Different sampling methods
    from probability strategies to non-probability strategies used in research and
    industry will be discussed in this section.


    There are essentially two types of sampling methods:


    - Probability sampling

    - Non-probability sampling


    ### Probability sampling


    In *probability sampling*, a sample is chosen from a population based on the theory
    of probability, or it is chosen randomly using random selection. In *random selection*,
    the chance of each member in a population being selected is equal. For example,
    consider a game with 10 similar pieces of paper. We write numbers 1 through 10,
    with a separate piece of paper for each number. The numbers are then shuffled
    in a box. The game requires picking three of these ten pieces of paper randomly.
    Because the pieces of paper have been prepared using the same process, the chance
    of any piece of paper being selected (or the numbers one through ten) is equal
    for each piece. Collectively, the 10 pieces of paper are considered a population
    and the 3 selected pieces of paper constitute a random sample. This example is
    one approach to the probability sampling methods we will discuss in this chapter.'
  mdcn: '## 观察性研究


    另一种常进行的统计研究类型是**观察性研究**，研究者通过观察已存在的数据来获取信息。观察性研究有助于理解输入变量及其与目标变量和彼此之间的关系，但无法像随机实验那样提供因果关系的理解。观察性研究可能包含随机实验的两个组成部分之一——随机抽样或随机分配处理——但若缺少其中一个组成部分，则无法直接得出推断。进行观察性研究而非随机实验的原因有很多，例如：


    - 随机实验成本过高

    - 实验存在伦理限制（例如，确定孕期吸烟导致出生缺陷率的实验）

    - 使用先前随机实验的数据，从而无需再进行另一项实验


    从观察性研究中推导出某种因果关系的一种方法是进行随机抽样和重复分析。重复的随机抽样和分析有助于随时间推移最小化混杂变量的影响。这一概念在*大数据*和*机器学习*的实用性中扮演着重要角色，而这两者在本世纪的许多行业中已变得至关重要。虽然几乎所有可用于观察性分析的工具也可用于随机实验，但本书主要关注观察性分析的工具，因为这在大多数行业中更为常见。


    可以说，统计学是一门帮助在存在可量化不确定性时做出最佳决策的科学。所有统计检验都包含一个原假设和一个备择假设。也就是说，假设数据之间没有统计学显著差异（原假设），或者数据之间存在统计学显著差异（备择假设）。术语“统计学显著差异”意味着存在一个基准——或阈值——超过该基准则表明存在显著性。这个基准被称为**临界值**。


    应用于该临界值的度量称为**检验统计量**。临界值是基于数据行为（如平均值和变异）量化的静态值，并基于假设。如果存在两种可能的途径来拒绝原假设——例如，我们相信某个输出要么低于平均值，要么高于平均值——则会有两个临界值（这种检验称为**双尾**假设检验），但如果只有一个反对原假设的论点，则只会有一个临界值（这称为**单尾**假设检验）。无论临界值的数量如何，在给定的假设检验中，每个组始终只有一个检验统计量测量值。如果检验统计量超过临界值，则存在统计学上的显著理由支持拒绝原假设，并得出数据中存在统计学显著差异的结论。


    理解假设检验可以检验以下内容是有用的：


    - 一个变量与另一个变量（例如，在t检验中）

    - 多个变量与一个变量（例如，线性回归）

    - 多个变量与多个变量（例如，多元方差分析）


    在下图中，我们可以直观地看到双尾假设检验中检验统计量与临界值之间的关系。


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_30_0.png)


    根据该图，我们现在直观地了解了检验统计量超过临界值如何表明应拒绝原假设。


    然而，仅使用在假设中将检验统计量与临界值进行比较的方法存在一个问题，即检验统计量可能大得不切实际。当可能存在广泛的结果范围，且这些结果不被认为属于处理效应的范围内时，就可能发生这种情况。无法确定是否可能出现与检验统计量一样极端或更极端的结果。为防止误导性地拒绝原假设，使用了**p值**。p值表示仅由偶然因素导致出现与观察到的值（即表明应拒绝原假设的值）一样极端的值的概率。如果p值相对于显著性水平较低，则可以拒绝原假设。常见的显著性水平为0.01、0.05和0.10。在对假设做出决定之前，评估临界值与检验统计量的关系以及p值是有益的。在*第3章
    假设检验*中，当我们开始讨论假设检验时，将对此进行更多讨论。


    ## 抽样策略——随机、系统、分层和整群抽样


    在本节中，我们将讨论研究中使用的不同抽样方法。广义上讲，在现实世界中，由于许多原因，获取总体数据并不容易或不可能。例如，收集数据的成本在金钱和时间上都很昂贵。在许多情况下，收集所有数据是不切实际的，伦理问题也需要考虑。从总体中抽取样本可以帮助我们克服这些问题，并且是收集数据的一种更有效的方式。通过为研究收集适当的样本，我们可以对总体属性得出统计结论或统计推断。推断性统计分析是统计思维的一个基本方面。本节将讨论研究和行业中使用的从概率策略到非概率策略的不同抽样方法。


    抽样方法基本上有两种类型：


    - 概率抽样

    - 非概率抽样


    ### 概率抽样


    在*概率抽样*中，样本是基于概率理论从总体中选择的，或者使用随机选择随机选择。在*随机选择*中，总体中每个成员被选中的机会是相等的。例如，考虑一个游戏，有10张相似的纸片。我们写下数字1到10，每个数字一张纸片。然后将这些数字在一个盒子里打乱。游戏要求从这10张纸片中随机抽取三张。由于纸片是使用相同的过程准备的，任何一张纸片（或数字1到10）被选中的机会对每张纸片都是相等的。总的来说，这10张纸片被视为一个总体，而选出的3张纸片构成一个随机样本。这个例子是我们将在本章讨论的概率抽样方法之一。'

    Figure 6.5 – Simulated bivariate distribution


    The coefficient of correlation exists as a value between -1 and 1. When r =1,
    we have a perfect positive correlation, and when r = -1, we have a perfect negative
    correlation. Observe that the value of the coefficient of correlation does not
    change if, for example, the variable x and the variable y are switched or if all
    values of either variable are linearly scaled. In general, correlation does not
    imply causation.


    # Coefficients of determination


    The coefficient of determination is just r², where r is the coefficient of correlation,
    which is a proportion of the variation in the variable y, explained by the variable
    x. The value of r² is between 0 and 1, with the linear relationship between the
    two variables becoming stronger as its value approaches 1. The value of r² can
    also be computed using the following formula:


    $$r^2 = 1 - \frac{SS_{Res}}{SS_{Tot}}$$'
  - '[PAGE 172]


    Here, $SS_{Res}$ is the sum of the square of errors and $SS_{Tot}$ is the total
    sum of the square of the difference between the actual value and the average value.
    In `statsmodels`, from the output of the OLS regression results, the value of
    determination can be obtained. This output is discussed in the next sections of
    this chapter.


    # Required model assumptions


    Like the parametric tests we discussed in *Chapter 4, Parametric Tests*, linear
    regression is a parametric method and requires certain assumptions to be met for
    the results to be valid. For linear regression, there are four assumptions:


    +   - A linear relationship between variables

    - The normality of the residuals

    - The homoscedasticity of the residuals

    - Independent samples


    Let''s discuss each of these assumptions individually.


    # A linear relationship between the variables


    When thinking about fitting a linear model to data, our first consideration should
    be whether the model is appropriate for the data. When working with two variables,
    the relationship between the variables should be assessed with a scatter plot.
    Let''s look at an example. Three scatter plots are shown in *Figure 6.6*. The
    data is plotted, and the actual function used to generate the data is drawn over
    the data points. The leftmost plot shows data exhibiting a linear relationship.
    The middle plot shows data exhibiting a quadratic relationship. The rightmost
    plot shows two uncorrelated variables.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_172_0.png)


    Figure 6.6 – Three scatter plots depicting three distinct relationships between
    two variables


    Of the example data in *Figure 6.6*, a linear model would only be appropriate
    for the leftmost data. In this example, we have the benefit of knowing the actual
    relationship of the two variables, but, in real problems, you will have to determine
    whether a linear model is appropriate. Once we have assessed'
  - '[PAGE 173]


    whether a linear model is appropriate and fitted a linear model, we can assess
    the two assumptions that depend on the model residuals.


    # Normality of the residuals


    In the previous two chapters, we discussed normality at length and looked at several
    examples of data that are normally distributed and several examples that were
    not normally distributed. In this case, we are making the same assessment, but
    it is for the model residuals rather than for the variables. In fact, unlike the
    previous parametric methods, the *variables themselves do not need to be normally
    distributed, only the residuals*. Let''s look at an example. We will fit a linear
    model on two variables, each of which exhibits a skewed distribution. As can be
    seen in *Figure 6.7*, even though each variable has a skewed distribution, the
    variables are linearly correlated.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_173_0.png)


    Now, let''s look at the residuals from the model fit. The residuals from the model
    fit are shown in *Figure 6.8*. As we expect, the residuals from this model fit
    appear to be normally distributed. This model appears to meet the assumption of
    normally distributed residuals.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_173_1.png)'
  - '[PAGE 174]


    With the assumption of normally distributed residuals verified, let’s move on
    to the assumption of homoscedasticity of the residuals.


    # Homoscedasticity of the residuals


    Not only should the residuals be normally distributed, but the residuals should
    also have constant variance over the linear model. **Homoscedasticity** refers
    to the residuals having equal scatter. Conversely, residuals that do exhibit equal
    spread are said to be **heteroscedastic**. Homoscedasticity is generally assessed
    by plotting the residuals against the model predictions with a scatter plot. The
    residuals should appear to be randomly distributed with a mean of 0 and equally
    dispersed along the *x* axis. *Figure 6.9* shows a scatter plot of the model residuals
    against the predicted value of *Y*. These residuals appear to exhibit homoscedasticity.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_174_0.png)


    Figure 6.9 – Scatter plot of model residuals versus prediction


    There are a few common ways the homoscedasticity of the residuals could be violated:


    +   - The residuals show a systematic change in variance

    - There is an extreme outlier


    Two examples of these violations are shown in *Figure 6.10*. The left plot shows
    an extreme outlier, and the right plot shows non-constant variance in the residuals.
    In both cases, the model assumptions are violated.'

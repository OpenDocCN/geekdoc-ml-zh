    # LASSO regression


    Earlier in this section, we mentioned how variable coefficients with unnecessarily
    high values contribute to model variance, and in so doing, take away a model''s
    ability to generalize as well as it could were the coefficients reasonable. We
    demonstrated applying ridge regression to enact this. A very popular alternative
    to ridge regression, however, is LASSO regression. LASSO regression follows a
    similar procedure of adding a penalty term to the model''s residual sum of squared
    error and seeks to minimize the resulting value (error). However, LASSO uses the
    $L^1$ norm rather than $L^2$. Consequently, it is possible to obtain absolute
    zero coefficient values as the tuning parameter reaches a sufficient size, thus
    functioning as a feature selection and shrinkage tool.'
  - '[PAGE 213]


    The LASSO equation seeks to minimize overall model error by shrinking each variable''s
    coefficient using the following method:


    $$\hat{\beta}^L = argmin\left\{\sum_{i=1}^{n}\left(y_i - \hat{\beta}_0 - \sum_{j=1}^{p}\hat{\beta}_j
    x_{ij}\right)^2 + \lambda \sum_{j=1}^{p}|\hat{\beta}_j|\right\}$$


    The only difference between LASSO and ridge regression is the penalty term $|\hat{\beta}_j|$.


    > **Choosing $\lambda$**

    The value of the tuning parameter, $\lambda$, is best selected using cross-validation.
    While the tuning parameter can go to infinity, in theory, it is typical to start
    with values less than 1, such as at 0.1 increasing by increments of tenths up
    to 1. After, typically integer values are used.


    Using the same data we used for ridge regression, we apply LASSO regression. Here,
    we set L1_wt=1, indicating the $L^1$ norm will be applied:


    ```

    ols_model = sm.OLS(y_train, X_train)

    compiled_model = ols_model.fit()

    compiled_model_lasso = ols_model.fit_regularized(method=''elastic_net'',

    L1_wt=1, alpha=0.1, refit=True)

    ```


    We will follow the same steps for LASSO as with ridge regression in that we first
    check the errors on the training data, then again on the test data to see how
    the models generalize:


    ```

    print(''OLS Error: '', MSE(y_train, compiled_model.predict(X_train)))

    print(''LASSO Regression Error: '', MSE(y_train, compiled_model_lasso.predict(X_train)))

    ```


    The output shows OLS regression slightly outperforming LASSO. This could be due
    to higher variance. However, practically speaking, the results are the same:


    OLS Error: 530.7235449265926

    LASSO Regression Error: 531.2440812254207


    Now, we need to check the model''s performance on the holdout data:


    ```

    print(''OLS Error: '', MSE(y_test, compiled_model.predict(X_test)))

    print(''LASSO Regression Error: '', MSE(y_test, compiled_model_lasso.predict(X_test)))

    ```'

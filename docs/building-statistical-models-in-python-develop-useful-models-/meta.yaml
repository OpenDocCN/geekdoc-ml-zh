    In Python, we can implement the code as follows:


    ```python

    #calculate z scores at x=95 and 104

    zscore_95 = round((95-98)/12,2)

    zscore_104 = round((104-98)/12,2)


    #calculate cdf and probability

    cdf_95 = stats.norm.cdf(zscore_95)

    cdf_104 = stats.norm.cdf(zscore_104)

    prob = abs(cdf_95-cdf_104)


    #print the probability

    print(f"The probability that the taken score between 95 and 104 is {round(prob*100,2)}%!")

    ```


    Another question raised is what is the probability that the mean score $\bar{x}$
    of four scores taken randomly is between 95 and 104? To solve this question, we
    use the notion of the z-statistic. We assume the mean of $\bar{x}$ is also 98
    and $\bar{x}$ has a normal distribution. Then, the standard error of $\bar{x}$
    is:


    $$\sigma_{\bar{x}} = \frac{\sigma}{\sqrt{n}} = \frac{12}{\sqrt{4}} = 6,$$


    then:


    $$z = \frac{\bar{x} - \mu_{\bar{x}}}{\sigma_{\bar{x}}} = \frac{\bar{x} - 98}{6}.$$


    It is easy to calculate $z_{95} = -0.5$ and $z_{104} = 1$. By using the z-table,
    we can get the probability that the mean score $\bar{x}$ of four scores taken
    randomly is between 95 and 104 as follows:


    0.8413 - 0.3085 = 0.5328


    Or, about 53.28%. To use this idea, we can implement the code in Python as follows:


    ```python

    import pandas as pd

    import numpy as np

    import scipy.stats as stats

    import math


    # standard error

    n= 4

    sigma = 12

    se = sigma/math.sqrt(n)


    #calculate z scores at x=95 and 104

    zscore_95 = round((95-98)/se,2)

    zscore_104 = round((104-98)/se,2)


    #calculate cdf and probability

    cdf_95 = stats.norm.cdf(zscore_95)

    cdf_104 = stats.norm.cdf(zscore_104)

    prob = abs(cdf_95-cdf_104)


    #print the probability

    print(f"The probability that the taken score between 95 and 104 is {round(prob*100,2)}%!")

    ```


    Note that in the preceding code, we also need the library called `math` for calculating
    the square root function, `math.sqrt()`.


    In the following section, we will discuss a z-test for means.


    ## A z-test for means


    In this part, one-sample and two-sample z-tests related to a population mean or
    means of two populations respectively are considered.


    ## A one-sample z-test


    A selected sample for research from a population should be normally distributed.
    The population standard deviation is supposed to be known, at least for practical
    purposes.


    This test is still applicable in cases where the population cannot be assumed
    to be normally distributed but the sample size needs to be considered large enough
    by a rule of thumb, based on the experiences of researchers involved in the study.
    To perform the hypothesis testing, we need to develop the null and alternative
    hypotheses. The following figure illustrates three null and alternative hypotheses
    corresponding to left-tailed, right-tailed, and two-tailed z-tests.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_92_0.png)


    $H_0: \mu \ge \mu_0$'

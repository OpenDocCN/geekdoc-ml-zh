    ## 9 判别分析


    在上一章中，我们讨论了离散回归模型，包括使用逻辑回归进行分类。在本章中，我们将从概率概述开始，扩展到条件概率和独立概率。然后，我们讨论这两种理解概率定律的方法如何构成贝叶斯定理的基础，该定理直接用于扩展一种称为贝叶斯统计的方法。在此主题之后，我们深入探讨**线性判别分析
    (LDA)** 和**二次判别分析 (QDA)**，这两种强大的分类器使用贝叶斯概率建模方法对数据进行建模。


    在本章中，我们将涵盖以下主要主题：


    - 贝叶斯定理

    - LDA

    - QDA


    ### 贝叶斯定理


    在本节中，我们将讨论**贝叶斯定理**，它用于本章后面描述的分类模型。我们将从讨论概率基础开始本章。然后，我们将研究相关事件，并讨论贝叶斯定理如何与相关事件相关联。


    ### 概率


    概率是对事件发生或特定结果发生可能性的度量。通常，我们可以将事件分为两类：**独立事件**和**相关事件**。事件类型的区别就在名称中。独立事件是不受其他事件发生影响或影响的事件，而相关事件则受其他事件发生的影响或影响。


    让我们思考一些这些事件的例子。第一个例子，想想一枚公平的硬币抛掷。硬币抛掷可以产生两种状态之一：正面和反面。如果硬币是公平的，抛掷结果为正面或反面的机会是二分之一。这意味着在公平的硬币抛掷中，正面或反面的概率是
    0.5。当事件可计数时，我们可以使用以下公式计算概率：


    $$P(E) = \frac{\text{期望结果的计数}}{\text{结果总数}}$$


    这里，$P(E)$ 是期望结果的概率。在硬币抛掷的例子中，期望结果是正面或反面，每次抛掷只能发生一次。因此，对于硬币抛掷，期望事件的计数为一。结果总数为二，因为硬币抛掷有两种可能的状态。将这些数字代入前面的方程，得出正面为
    0.5，反面为 0.5。现在，运用你的经验，之前的抛掷是否给你提供了关于同一枚硬币下一次抛掷的任何知识？它没有，因为*每次抛掷都独立于其他每次抛掷*；它是一个独立事件。


    现在，让我们考虑另一个例子。假设我们有一个袋子，里面有三个红色弹珠和五个蓝色弹珠。让我们计算从袋子中选出一个红色弹珠的概率：$P(Red)$。总共有八个弹珠，这是方程中的结果总数。我们想选出一个红色弹珠，这意味着期望结果的计数是三。这意味着从袋子中选出红色弹珠的概率是
    3/8。现在，让我们计算从袋子中选出一个蓝色弹珠的概率：$P(Blue)$。有五个蓝色弹珠和八个总弹珠，所以从袋子中选出蓝色弹珠的概率是 5/8。注意这两个概率之和为一：$P(Red)
    + P(Blue) = 3/8 + 5/8 = 1$。这引出了概率的一个重要性质：总概率必须等于一。这当然意味着，一旦我们计算出选出红色弹珠的概率，我们就可以通过用一减去选出红色弹珠的概率来计算选出蓝色弹珠的概率。概率的这个性质非常有用，在统计学和**机器学习
    (ML)** 中经常使用。


    回到红色和蓝色弹珠的例子，让我们思考这个例子所代表的事件类型。我们从袋子中选出一个弹珠。现在，接下来有两种可能的选择：(1) 我们将选出的弹珠放回，然后再次从袋子中选出一个弹珠；(2)
    我们不放回弹珠，然后从袋子中剩余的七个弹珠中选出一个新的弹珠。第一种情况称为**有放回抽样**。有放回抽样是一个独立事件，因为每次从袋子中抽取之前，袋子都会重置。第二种情况称为**无放回抽样**。无放回抽样是你发现相关事件的地方。第一次选出弹珠时，概率与之前描述的相同（一个独立事件）。然而，如果弹珠没有放回，袋子的状态就发生了变化，下一次选出弹珠的概率取决于上一次从袋子中选出了哪一个。那么，在无放回抽样中，每一次后续的弹珠抽取都是一个相关事件。在讨论相关事件时，使用**条件概率**来描述事件很有用。现在让我们讨论条件概率。'

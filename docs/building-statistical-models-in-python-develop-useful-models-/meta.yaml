    \ **R-squared** 统计量为 0.944。由于这两个变量是常数和输入变量，这个 R-squared 统计量仅解释了输入变量。\n\n### R-squared\
    \ 与调整后的 r-squared\n\n对于多元回归，我们会查看调整后的 r-squared 值，在单变量/简单回归的情况下，我们可以看到它与 r-squared\
    \ 值相同。\n\n**决定系数**（也称为拟合优度）为 0.944，意味着实际国内私人总投资解释了实际私人可支配收入 94.4% 的方差。\n\n根据表格，我们可以看到截距和\

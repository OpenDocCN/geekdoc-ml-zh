  md: 'We can see based on the PACF plot we have what appears to be an AR(2), but
    possibly an AR(4). After lag 4, the partial autocorrelations lose statistical
    significance at the 5% level of significance. We can see, however, when considering
    the statistical significance of lag 4 in the PACF, however slight, lag 4 in the
    ACF is significant. While the value at lag 4 is not the value of the coefficient,
    its significance is useful in helping determine order p. Nonetheless, an AR(4)
    may overfit and fail to generalize as well as an AR(2). Next, we will use **Aikake
    Information Criterion (AIC)** and **Bayesian Information Criterion (BIC)** to
    help make our determination.


    Based on the constant mean and the fact we do not have an exponentially dampening
    (which would also need to be significant) ACF, there does not appear to be a trend.


    # Step 2 - selecting the order of AR(p)


    Since we are uncertain based on the visual inspection of the order we should use
    for the AR(p) model, we will use AIC and BIC to help our decision. The AIC and
    BIC process will fit models using order zero up to the `max_ar` value provided
    in the upcoming code. The models will fit the entire dataset. The order with the
    lowest error is generally the best. Their error calculations are as follows:


    $$AIC = 2k - 2ln(\hat{L})$$

    $$BIC = kln(n) - 2ln(\hat{L})$$


    This is where $k$ is the number of lags – up to the maximum order tested – for
    the data, $\hat{L}$ is the maximum likelihood estimate, and $n$ is the sample
    size (or length of the dataset being tested). For both tests, the lower error
    is better.


    We will import `arma_order_select_ic` from `Statsmodels` and test it using up
    to a maximum of 4 lags based on our observation in the PACF plot in *Figure 11.4*.
    As noted, based on our visual inspection, we do not appear to have a trend. However,
    we can verify this statistically with an OLS-based unit root test called the **Dickey-Fuller
    test**. The **null hypothesis** of the Dickey-Fuller test is that a unit root
    (and therefore, trend) is present at some point in the maximum number of lags
    tested (maxlag). The alternative hypothesis is that there is no unit root (no
    trend) in the data. For reference, the alternative hypothesis states that the
    data is an order zero - I(0) - integrated process while the null hypothesis states
    that the data is an order one - I(1) - integrated process. If the absolute value
    of the test statistic is greater than the critical value or the p-value is significant,
    we can conclude there is no trend present (no unit root).


    The Dickey-Fuller test considers each data point out to the number of lags included
    in the regression test. We will need to analyze the ACF plot for this; because
    we want to consider as far out as a trend could be possible, we must choose the
    longest lag that has significance. The idea is that if we have a strong trend
    in our data, such as growth, for the most part, each sequential value will lead
    to another increasing subsequent value for as long as the trend exists. In our
    case, the maximum significant lag in the ACF plot is approximately 25. The Dickey-Fuller
    test has relatively low statistical power (prone to Type II error or failing to
    reject the null when the null should be rejected) so a high order of lags is not
    concerning so long as it is practical; the risk is failing to include enough lags.'

    | 126 | H | 16 | 16 |

    | 127 | H | 17 | 17 |

    | 128 | H | 18 | 18.5 |

    | 128 | H | 19 | 18.5 |


    Figure 5.3 – Corrected ranks for Rank-Sum test


    We can also perform this test with software using `mannwhitneyu` from `scipy`.
    For the following code sample, the values corresponding to L and H from the preceding
    table are contained in the `lower_score_iqs` and `higher_score_iqs` variables,
    respectively:


    ```

    mannwhitneyu(higher_score_iqs, lower_score_iqs).pvalue

    # 0.00222925216588146

    ```


    In this section, we discussed the Rank-Sum test, which is a non-parametric alternative
    to the t-test. The Rank-Sum test is used to test for a difference in the locations
    of two distributions of sample data. In the next section, we will look at a similar
    rank-based test, which is used to compare paired data like the paired t-test from
    *Chapter 4, Parametric Tests*.


    # The Signed-Rank test


    The Wilcoxon Signed-Rank test is a non-parametric alternative version of the paired
    t-test that is used when the assumption of normality is violated. This test is
    robust to outliers because of the use of ranks and medians instead of means in
    the null and alternative hypotheses. As indicated by the name of the test, it
    uses the magnitudes of differences between two stages and their signs.


    In research, a null hypothesis considers that the median difference between stage
    1 and stage 2 is zero. Similarly, as in a paired t-test, for the alternative hypothesis,
    for a two-tailed test, the median difference between Stage 1 and Stage 2 is considered
    not to be zero, or for a one-tailed test, the median difference between Stage
    1 and Stage 2 is greater (or less) than zero.


    Though the normality requirement is relaxed, the test requires independence between
    paired observations and these observations to be from the same population. In
    addition, the dependent variable is required to be continuous.'
  - '[PAGE 151]


    To compute the test statistic, there are the following procedures:


    +   1. Calculate the differences in each pair between the two stages.

    2. Drop pairs with zero difference, if they exist.

    3. Take the absolute difference between each pair and rank them from smallest
    to largest.

    4. Calculate the signed-rank statistic S by summing the ranks with a positive
    sign.


    Let us consider the simple example that follows. We consider generic data for
    two stages (before and after the treatment) of nine samples.


    | Pair | Before the treatment | After the treatment | Absolute difference | Sign
    | Rank |

    | :---: | :---: | :---: | :---: | :---: | :---: |

    | 1 | 37 | 38 | 1 | - | 1 |

    | 2 | 14 | 17 | 3 | - | 2.5 |

    | 3 | 22 | 19 | 3 | + | 2.5 |

    | 4 | 12 | 7 | 5 | + | 4 |

    | 5 | 24 | 15 | 9 | + | 5 |

    | 6 | 35 | 25 | 10 | + | 6 |

    | 7 | 35 | 24 | 11 | + | 7 |

    | 8 | 51 | 38 | 13 | + | 8 |

    | 9 | 39 | 19 | 20 | + | 9 |


    Figure 5.4 – Demonstration of rank calculation for sign-rank test


    By observing the preceding table, we can see the second and the third pairs have
    the same absolute difference. Therefore, their ranks are computed by averaging
    their original rank, (2+3)/2 = 2.5. The null and alternative hypotheses for a
    one-sided test are as follows:


    $H_0$ : The median difference between before and after treatment is zero


    $H_a$ : The median difference between before treatment and after treatment is
    positive


    The signed-rank statistic is the sum of ranks for positive differences and it
    is given as follows:


    $$S = 2.5 + 4 + 5 + 6 + 7 + 8 + 9 = 41.5.$$


    The mean of $S$ is:


    $$Mean(S) = \frac{n(n+1)}{4} = \frac{9 \cdot 10}{4} = 22.5$$


    And the standard deviation of $S$ is:


    $$SD(S) = \sqrt{\frac{n(n+1)(2n+1)}{24}} = \sqrt{\frac{9 \cdot 10 \cdot 19}{24}}
    = 8.44.$$'
  - '[PAGE 152]


    Then, the test statistic is calculated by the following formula:


    $$Z_{statistic} = \frac{S - Mean(S)}{SD(S)} = \frac{41.5 - 22.5}{8.44} = 2.2511.$$


    Referring to *Chapter 3, Hypothesis Testing*, we could use `scipy.stats.norm.sf()`
    to calculate the approximate one-sided p-value 0.012 using the $Z_{statistic}$.


    At $\alpha = 0.05$ - level of significance - with p-value < $\alpha$, we reject
    the null hypothesis. There is strong evidence that the median before the treatment
    is greater than the median after the treatment. In Python, it is simple to implement
    the test as follows:


    ```

    import scipy.stats as stats

    import numpy as np


    before_treatment = np.array([37, 14, 22, 12, 24, 35, 35, 51, 39])

    after_treatment = np.array([38,17, 19, 7, 15, 25, 24, 38, 19])


    # Signed Rank Test

    stats.wilcoxon(before_treatment, after_treatment, alternative = ''greater'')

    ```


    The documentation for this test can be found at the following link:


    https://docs.scipy.org/doc/scipy/reference/generated/scipy.stats.wilcoxon.html


    # The Kruskal-Wallis test


    Another non-parametric test we will now discuss is the Kruskal-Wallis test. It
    is an alternative to the one-way ANOVA test when the normality assumption is not
    satisfied. It uses the medians instead of the means to test whether there are
    statistically significant differences between two or more independent groups.
    Let us consider a generic example of three independent groups:


    ```

    group1 = [8, 13, 13, 15, 12, 10, 6, 15, 13, 9]

    group2 = [16, 17, 14, 14, 15, 12, 9, 12, 11, 9]

    group3 = [7, 8, 9, 9, 4, 15, 13, 9, 11, 9]

    ```


    The null and alternative hypotheses are stated as follows.


    $H_0$: The medians are equal among these three groups


    $H_a$: The medians are not equal among these three groups'
  - '[PAGE 153]


    In Python, it is easy to implement by using the `scipy.stats.kruskal` function.
    The documentation can be found at the following link:


    https://docs.scipy.org/doc/scipy/reference/generated/scipy.stats.kruskal.html


    ```

    from scipy import stats

    group1 = [8, 13, 13, 15, 12, 10, 6, 15, 13, 9]

    group2 = [16, 17, 14, 14, 15, 12, 9, 12, 11, 9]

    group3 = [7, 8, 9, 9, 4, 15, 13, 9, 11, 9]

    #Kruskal-Wallis Test

    stats.kruskal(group1, group2, group3)

    ```


    The output of the preceding code is as follows:


    `KruskalResult(statistic=5.7342701722574905, pvalue=0.056861597028239855)`


    As $\alpha = 0.05$ – the level of significance – with p-value > $\alpha$, we fail
    to reject the null hypothesis. There is no strong evidence to show that the medians
    are not equal across these three groups.


    # Chi-square distribution


    Researchers are often faced with the need to test hypotheses on categorical data.
    The parametric tests covered in *Chapter 4, Parametric Tests*, are often not very
    helpful for this type of analysis. In the last chapter, we discussed using an
    F-test to compare sample variances. Extending that concept, we can consider the
    non-parametric and non-symmetric chi-square probability distribution, which is
    a distribution useful for comparing the means of sampling distribution variances
    to their population variances, specifically when the mean of a sampling distribution
    of sample variances is expected to equal the population variance under the null
    hypothesis. Because variance cannot be negative, the distribution starts at an
    origin of 0. Here, we can see the **chi-square distribution**:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_153_0.png)


    Figure 5.5 – Chi-square distribution with seven degrees of freedom'
  - '[PAGE 154]


    The shape of the chi-square distribution does not represent an assumption that
    percentiles are fixed to standard deviations, as with standard normal distribution;
    it is expected to change with each additional sample variance calculated. When
    the original population data from which the sampling distribution of variances
    is calculated can be assumed to be normally distributed, the chi-square standardized
    test statistic is calculated as:


    $$\chi^2 = \frac{(n-1)s^2}{\sigma^2}$$


    Where (n-1) is used to calculate the degrees of freedom, which are used to explain
    errors in sampling when building the test statistic. The critical values are based
    on table lookups using degrees of freedom and desired levels of significance.
    The null hypothesis is always $H_0: \sigma_{\chi}^2 = \sigma_0^2$, where $\sigma_{\chi}^2$
    is the observed distribution variance and $\sigma_0^2$ is the expected variance.
    The alternative hypothesis for a one-tailed test is $H_a: \sigma_{\chi}^2 \geq
    \sigma_0^2$ when testing the right tail and $H_a: \sigma_{\chi}^2 \leq \sigma_0^2$
    when testing the left tail. The alternative hypothesis for a two-tailed test is
    $H_a: \sigma_{\chi}^2 \neq \sigma_0^2$. This test, when the population data can
    be assumed to be normally distributed, is similar to the F-test in that the two
    variances are being compared and the result is 1 when both are the same. The difference
    is that the chi-square test statistic factors in the degrees of freedom and is
    therefore less sensitive to differences.


    Understanding how this test is useful for comparing variances is helpful for understanding
    how the chi-square distribution also relates to frequencies of occurrences of
    categorical data. In the preceding chi-square statistic, we can relate the sample
    statistic for variance as an observed value whereas the population parameter for
    variance is what we expect to occur. When determining whether there is statistical
    significance in the occurrence of categorical factor levels, we can *compare the
    observed occurrences to expected occurrences*. We will illustrate examples for
    arguably the two most widely used versions of this test, the **chi-square goodness-of-fit
    test** and the **chi-square test of independence**, in the following sections.
    These tests are considered non-parametric as they do not require the assumptions
    stated in the first section of *Chapter 4, Parametric Tests*.


    > **Tailedness of chi-square goodness-of-fit and independence tests**

    The chi-square goodness-of-fit test and chi-square test of independence in the
    following two sections are always right-tailed tests. The null hypothesis in these
    tests states a difference of zero between the observed and expected frequencies.
    The alternative hypothesis is that the observed and expected frequencies are not
    the same. The closer to 0 the $\chi^2$ test statistic, the more likely the observed
    and expected frequencies approximate each other.'
- md: "## Chi-square goodness-of-fit\n\nThe **chi-square goodness-of-fit test** compares\
    \ the count of occurrences of multiple factor levels for a single variable (factor)\
    \ to determine whether the levels are statistically equal. For example, a vendor\
    \ offers three models of phones – three levels (brands) of the single factor (phone)\
    \ – to customers, who purchase in total an average of 90 phones per week. We can\
    \ say the expected frequency is 1/3 – so, 30 phones of each model are sold per\
    \ week, on average. Pearson's chi-square test statistic, which is calculated by\
    \ measuring the observed frequencies against expected frequencies, is the test\
    \ statistic used for the chi-square goodness-of-fit test. The linear equation\
    \ for this test statistic is as follows:\n\n$$\\chi^2 = \\sum \\frac{(O_i - E_i)^2}{E_i},\
    \ \\text{degrees of freedom} = k-1$$\n\nWhere $O_i$ is the observed frequency,\
    \ $E_i$ is the expected frequency, and $k$ is the number of factor levels. Using\
    \ our phone example, we learn from the vendor the expected frequency of 1/3 is\
    \ not actually what is observed; the vendor sells an average of 45, 30, and 15\
    \ phones of models A, B, and C, respectively. Suppose we want to know whether\
    \ this observed frequency differs with statistical significance from the expected\
    \ frequency. The null hypothesis is that the frequencies are equal. We formulate\
    \ the **Pearson's chi-square test statistic** as follows:\n\n$$\\chi^2 = \\frac{(45\
    \ - 30)^2}{30} + \\frac{(30 - 30)^2}{30} + \\frac{(15 - 30)^2}{30} = 15$$\n\n\
    Suppose we want to use a hypothesis test (right-tailed) with a 0.05 level of significance,\
    \ thus forming the alternative hypothesis that the observed and expected frequencies\
    \ are not equal. The chi-square critical value table shows that for a level of\
    \ significance of 0.05 with $df: 3 - 1 = 2$ degrees of freedom, the critical value\
    \ is 5.9915. Because $15 > 5.9915$, we may conclude to reject the null hypothesis\
    \ based on the critical value test.\n\nTo perform this operation in Python, we\
    \ can use the `statsmodels.stats.gof` module's `chisquare` function. Each group\
    \ volume needs to be passed into a list or array, both for the observed frequencies\
    \ and the expected frequencies. The `statsmodels` `chisquare` test will automatically\
    \ calculate the k-1 degrees of freedom based on the counts of values in the observed\
    \ (`f_obs`) list, but the degrees of freedom must be provided for the `scipy`\
    \ `chi2.ppf` function, which provides the critical value, bypassing the need for\
    \ a manual table lookup:\n\n```\nfrom statsmodels.stats.gof import chisquare\n\
    from scipy.stats import chi2\n\nchi_square_stat, p_value = chisquare(f_obs=[45,\
    \ 30, 15],\n                                    f_exp=[30, 30, 30])\nchi_square_critical_value\
    \ = chi2.ppf(1-.05, df=2)\nprint('Chi-Square Test Statistic: %.4f'%chi_square_stat)\n\
    print('Chi-Square Critical Value: %.4f'%chi_square_critical_value)\nprint('P-Value:\
    \ %.4f'%p_value)\n```\n\nAs noted previously, since the p-value is below the 0.05\
    \ level of significance and the test statistic is larger than the critical value,\
    \ we can assume we have a reasonable amount of evidence to reject the null hypothesis\
    \ and conclude we have statistical significance indicating the phone models are\
    \ not purchased in equal quantities:\n\nChi-Square Test Statistic: 15.0000\n\n\
    Chi-Square Critical Value: 5.9915\n\nP-Value: 0.0006\n\nWe could then rerun the\
    \ test for two frequencies at that point, comparing 45 to 30 or 45 to 15, for\
    \ example, with expected frequencies of 37.5 and 37.5 or 30 and 30, respectively,\
    \ to identify which phone may be the largest influencer on sales imbalance.\n\n\
    ## Chi-square test of independence\n\nSuppose we have a dataset of observed vehicle\
    \ crashes in the state of Texas in 2021, *Restraint Use by Injury Severity and\
    \ Seat Position* (https://www.txdot.gov/data-maps/crash-reports-records/motor-vehicle-crash-statistics.html),\
    \ and want to know whether using a seat belt resulted in a statistically significant\
    \ difference in fatalities. We have the table of observed values as follows:\n\
    \n| | Restrained | Unrestrained | Total |\n|---|---|---|---|\n| Fatal | 1,429\
    \ | 1,235 | 2,664 |\n| Not Fatal | 1,216,934 | 22,663 | 1,239,597 |\n| Total |\
    \ 1,218,363 | 23,898 | 1,242,261 |\n\nFigure 5.6 – Chi-square test of independence\
    \ “observed” table\n\nLet us now create a table of expected values using this\
    \ equation:\n\n$$E_{ij} = \\frac{T_i T_j}{N}$$\n\nWhere $T_i$ is the total in\
    \ the ith row, $T_j$ is the total in the jth column, and $N$ is the total number\
    \ of observations. This yields the following:\n\n| | Restrained | Unrestrained\
    \ | Total |\n|---|---|---|---|\n| Fatal | (2,664 * 1,218,363) / 1,242,261 = 2,612.75\
    \ | (2,664 * 23,898) / 1,242,261 = 51.25 | 2,664 |\n| Not Fatal | (1,216,934 *\
    \ 1,239,597) / 1,242,261 = 1,214,324.31 | (1,239,597 * 23,898) / 1,242,261 = 23,846.75\
    \ | 1,239,597 |\n| Total | 1,218,363 | 23,898 | 1,242,261 |\n\nFigure 5.7 – Chi-square\
    \ test of independence “expected” table\n\nThe modified version of the Pearson's\
    \ chi-square test statistic we used in the goodness-of-fit test that extends to\
    \ the chi-square test of independence follows:\n\n$$\\chi^2 = \\sum \\frac{(O_{ij}\
    \ - E_{ij})^2}{E_{ij}}, \\text{degrees of freedom} = (r-1)(c-1)$$\n\nThe subscript\
    \ $j$ corresponds to columnar data and the subscript $i$ corresponds to the row\
    \ data for the observed and expected values, denoted as $O$ and $E$, respectively.\
    \ The values $r$ and $c$ in the degrees of freedom calculation correspond to the\
    \ number of rows and the number of columns in the table (this is 2x2, so the degrees\
    \ of freedom will equal (2-1)(2-1)=1).\n\nUsing the values from the observed and\
    \ expected tables, we find the chi-square test statistic to equal the following:\n\
    \n$$\\chi^2 = \\frac{(1,429 - 2,612.75)^2}{2,612.75} + \\frac{(1,216,934 - 1,214,324.31)^2}{1,214,324.31}\
    \ + \\frac{(1,235 - 51.25)^2}{51.25} + \\frac{(22,663 - 23,846.75)^2}{23,846.75}\
    \ = 27,942.43$$\n\nThe table lookup test statistic using the one degree of freedom\
    \ calculated here is 3.84. We can reasonably conclude that since the test statistic\
    \ of 27,942.43 is greater than the critical value of 3.84, we can conclude that\
    \ in the state of Texas in 2021, there was a statistically significant difference\
    \ in the rate of fatalities in vehicle crashes where safety restraints were used\
    \ compared to where they were not used.\n\n> **Chi-square contingency tables**\n\
    The test we performed uses two 2x2 tables called contingency tables. The chi-square\
    \ test of independence is frequently referred to as the **chi-squared contingency\
    \ test**. The failure to reject the null hypothesis is **contingent** upon the\
    \ observed table's values matching the expected table's values within a level\
    \ of statistical confidence. However, the chi-square test of independence can\
    \ be extended to **tables of any combination of rows and columns**. However, as\
    \ the rows and columns increase in value, the tables may be less useful to interpret.\n\
    \nTo perform this test in Python, we can use the `chi2_contingency` function from\
    \ the `scipy.stats` module. Inputting only the observed frequencies as a 2x2 numpy\
    \ array, the `chi2_contingency` test provides the expected frequencies should\
    \ the null hypothesis be true– the p-value, degrees of freedom used, and the chi-square\
    \ test statistic:\n\n```\nfrom scipy.stats import chi2_contingency\nfrom scipy.stats\
    \ import chi2\nimport numpy as np\n\nobserved_frequencies = np.array([[1429, 1235],\
    \ [1216934, 22663]])\nchi_square_test_statistic, p_value, degrees_of_freedom,\
    \ expected_frequencies = chi2_contingency(observed_frequencies)\nchi_square_critical_value\
    \ = chi2.ppf(1-.05, df=degrees_of_freedom)\nprint('Chi-Square Test Statistic:\
    \ %.4f'%chi_square_test_statistic)\nprint('Chi-Square Critical Value: %.4f'%chi_square_critical_value)\n\
    print('P-Value: %.4f'%p_value)\n```\n\nHere, we see the chi-square test statistic\
    \ is much larger than the chi-square critical value at the 0.05 level of significance\
    \ and the p-value is significant at p < 0.0000. Therefore, we can conclude there\
    \ is strong statistical evidence to suggest a large difference in car crash fatalities\
    \ when using a safety restraint compared to not using one:\n\nChi-Square Test\
    \ Statistic: 27915.1221\n\nChi-Square Critical Value: 3.8415\n\nP-Value: 0.0000\n\
    \n> **Yates' continuity correction**\n\nAn additional argument can optionally\
    \ be added to the `chi2_contingency` test with the `correction =` argument and\
    \ a bool (True or False) input. This applies Yates' continuity correction, which,\
    \ per the `scipy.stats` documentation, adjusts each observed value by 0.5 toward\
    \ the corresponding expected value. The purpose of the adjustment is to avoid\
    \ incorrectly detecting the presence of statistical significance due to small\
    \ expected sample sizes. Subjectively, this is useful for less than 10 samples\
    \ in an expected frequency cell. However, many practitioners and researchers argue\
    \ against its use.\n\n## Chi-square goodness-of-fit test power analysis\n\nLet's\
    \ use an example where a phone vendor sells four popular models of phones, models\
    \ A, B, C, and D. We want to determine how many samples are required to produce\
    \ a power of 0.8 so we can understand whether there is a statistically significant\
    \ difference between the popularity of different phones so the vendor can more\
    \ properly invest in phone acquisitions. In this case, the null hypothesis asserts\
    \ that 25% of phones from each model were sold. In reality, 20% of phones sold\
    \ were model A, 30% were model B, 19% were model C, and 31% were model D phones.\n\
    \nTesting different values for the `nobs` argument (number of observations), we\
    \ find that a minimum of 224 samples produces a power just greater than 0.801.\
    \ Adding more samples will only improve this. If the true distribution were more\
    \ divergent from the hypothesized 25% even split, fewer samples would be required.\
    \ However, since the splits are relatively close to 25%, a high volume of samples\
    \ is needed:\n\n```\nfrom statsmodels.stats.power import GofChisquarePower\nfrom\
    \ statsmodels.stats.gof import chisquare_effectsize\n\n# probs0 asserts 25% of\
    \ each brand are sold\n# In reality, 12% of Brand A, 25% of Brand B, 33% sold\
    \ were Brand C,\n# and 1% were Brand D.\n```"
  mdcn: "## 卡方拟合优度检验\n\n**卡方拟合优度检验**通过比较单个变量（因子）多个因子水平的出现次数，来判断这些水平在统计上是否相等。例如，某供应商向客户提供三种型号的手机——即单一因子（手机）的三个水平（品牌），客户每周平均购买90部手机。我们可以认为期望频率为1/3——即平均每周售出每种型号30部手机。皮尔逊卡方检验统计量通过比较观测频率与期望频率计算得出，是用于卡方拟合优度检验的统计量。该检验统计量的线性方程如下：\n\
    \n$$\\chi^2 = \\sum \\frac{(O_i - E_i)^2}{E_i}, \\text{自由度} = k-1$$\n\n其中$O_i$为观测频率，$E_i$为期望频率，$k$为因子水平数。以我们的手机示例为例，从供应商处我们得知期望频率1/3实际上并非观测结果；供应商平均每周售出A、B、C型号手机分别为45部、30部和15部。假设我们想知道观测频率与期望频率是否存在统计显著性差异。零假设为频率相等。我们构建**皮尔逊卡方检验统计量**如下：\n\
    \n$$\\chi^2 = \\frac{(45 - 30)^2}{30} + \\frac{(30 - 30)^2}{30} + \\frac{(15 -\
    \ 30)^2}{30} = 15$$\n\n假设我们使用显著性水平为0.05的假设检验（右尾检验），从而形成备择假设：观测频率与期望频率不相等。卡方临界值表显示，在显著性水平0.05、自由度$df:\
    \ 3 - 1 = 2$的条件下，临界值为5.9915。由于$15 > 5.9915$，我们可以根据临界值检验得出拒绝零假设的结论。\n\n要在Python中执行此操作，可以使用`statsmodels.stats.gof`模块的`chisquare`函数。观测频率和期望频率都需要以列表或数组形式传入各组数据量。`statsmodels`的`chisquare`检验会根据观测（`f_obs`）列表中的值数量自动计算k-1自由度，但`scipy`的`chi2.ppf`函数（用于提供临界值）必须提供自由度，从而无需手动查表：\n\
    \n```\nfrom statsmodels.stats.gof import chisquare\nfrom scipy.stats import chi2\n\
    \nchi_square_stat, p_value = chisquare(f_obs=[45, 30, 15],\n                 \
    \                   f_exp=[30, 30, 30])\nchi_square_critical_value = chi2.ppf(1-.05,\
    \ df=2)\nprint('Chi-Square Test Statistic: %.4f'%chi_square_stat)\nprint('Chi-Square\
    \ Critical Value: %.4f'%chi_square_critical_value)\nprint('P-Value: %.4f'%p_value)\n\
    ```\n\n如前所述，由于p值低于0.05的显著性水平且检验统计量大于临界值，我们可以认为有充分证据拒绝零假设，并得出结论：存在统计显著性表明各型号手机的购买量并不相等：\n\
    \nChi-Square Test Statistic: 15.0000\n\nChi-Square Critical Value: 5.9915\n\n\
    P-Value: 0.0006\n\n此时我们可以重新对两个频率进行检验，例如比较45与30或45与15，期望频率分别为37.5和37.5或30和30，以确定哪种手机可能是销售不平衡的最大影响因素。\n\
    \n## 卡方独立性检验\n\n假设我们有一个2021年德克萨斯州观测到的车辆碰撞数据集《按伤害程度和座位位置划分的安全带使用情况》（https://www.txdot.gov/data-maps/crash-reports-records/motor-vehicle-crash-statistics.html），并想知道使用安全带是否导致死亡率存在统计显著性差异。我们有如下观测值表：\n\
    \n| | 使用安全带 | 未使用安全带 | 总计 |\n|---|---|---|---|\n| 致命 | 1,429 | 1,235 | 2,664 |\n\
    | 非致命 | 1,216,934 | 22,663 | 1,239,597 |\n| 总计 | 1,218,363 | 23,898 | 1,242,261\
    \ |\n\n图5.6 – 卡方独立性检验“观测”表\n\n现在让我们使用以下公式创建期望值表：\n\n$$E_{ij} = \\frac{T_i T_j}{N}$$\n\
    \n其中$T_i$为第i行的总计，$T_j$为第j列的总计，$N$为观测总数。计算结果如下：\n\n| | 使用安全带 | 未使用安全带 | 总计 |\n\
    |---|---|---|---|\n| 致命 | (2,664 * 1,218,363) / 1,242,261 = 2,612.75 | (2,664\
    \ * 23,898) / 1,242,261 = 51.25 | 2,664 |\n| 非致命 | (1,216,934 * 1,239,597) / 1,242,261\
    \ = 1,214,324.31 | (1,239,597 * 23,898) / 1,242,261 = 23,846.75 | 1,239,597 |\n\
    | 总计 | 1,218,363 | 23,898 | 1,242,261 |\n\n图5.7 – 卡方独立性检验“期望”表\n\n我们在拟合优度检验中使用的皮尔逊卡方检验统计量的扩展版本（适用于卡方独立性检验）如下：\n\
    \n$$\\chi^2 = \\sum \\frac{(O_{ij} - E_{ij})^2}{E_{ij}}, \\text{自由度} = (r-1)(c-1)$$\n\
    \n下标$j$对应列数据，下标$i$对应行数据，观测值和期望值分别表示为$O$和$E$。自由度计算中的$r$和$c$值对应表格的行数和列数（此处为2x2，因此自由度等于(2-1)(2-1)=1）。\n\
    \n使用观测表和期望表中的值，我们计算出卡方检验统计量等于：\n\n$$\\chi^2 = \\frac{(1,429 - 2,612.75)^2}{2,612.75}\
    \ + \\frac{(1,216,934 - 1,214,324.31)^2}{1,214,324.31} + \\frac{(1,235 - 51.25)^2}{51.25}\
    \ + \\frac{(22,663 - 23,846.75)^2}{23,846.75} = 27,942.43$$\n\n使用此处计算的一个自由度查表得到的检验统计量为3.84。我们可以合理地得出结论：由于检验统计量27,942.43大于临界值3.84，因此在2021年的德克萨斯州，使用安全带与未使用安全带的车辆碰撞死亡率存在统计显著性差异。\n\
    \n> **卡方列联表**\n我们执行的检验使用了两个2x2表格，称为列联表。卡方独立性检验通常被称为**卡方列联检验**。未能拒绝零假设**取决于**观测表的值在统计置信水平内与期望表的值匹配。然而，卡方独立性检验可以扩展到**任意行列组合的表格**。但是，随着行数和列数的增加，表格的可解释性可能会降低。\n\
    \n要在Python中执行此检验，可以使用`scipy.stats`模块的`chi2_contingency`函数。仅输入观测频率作为2x2 numpy数组，`chi2_contingency`检验会提供零假设成立时的期望频率——p值、使用的自由度以及卡方检验统计量：\n\
    \n```\nfrom scipy.stats import chi2_contingency\nfrom scipy.stats import chi2\n\
    import numpy as np\n\nobserved_frequencies = np.array([[1429, 1235], [1216934,\
    \ 22663]])\nchi_square_test_statistic, p_value, degrees_of_freedom, expected_frequencies\
    \ = chi2_contingency(observed_frequencies)\nchi_square_critical_value = chi2.ppf(1-.05,\
    \ df=degrees_of_freedom)\nprint('Chi-Square Test Statistic: %.4f'%chi_square_test_statistic)\n\
    print('Chi-Square Critical Value: %.4f'%chi_square_critical_value)\nprint('P-Value:\
    \ %.4f'%p_value)\n```\n\n此处我们看到卡方检验统计量远大于0.05显著性水平下的卡方临界值，且p值显著（p < 0.0000）。因此，我们可以得出结论：有强有力的统计证据表明，使用安全带与未使用安全带的汽车碰撞死亡率存在巨大差异：\n\
    \nChi-Square Test Statistic: 27915.1221\n\nChi-Square Critical Value: 3.8415\n\
    \nP-Value: 0.0000\n\n> **耶茨连续性校正**\n\n可以向`chi2_contingency`检验添加一个可选参数`correction\
    \ =`，并输入布尔值（True或False）。这将应用耶茨连续性校正，根据`scipy.stats`文档，该方法将每个观测值向相应的期望值调整0.5。调整的目的是避免因期望样本量小而错误检测到统计显著性。主观上，这对于期望频率单元格中少于10个样本的情况很有用。然而，许多从业者和研究者反对使用此方法。\n\
    \n## 卡方拟合优度检验功效分析\n\n让我们以一个手机供应商销售四种流行型号手机（A、B、C、D）为例。我们想确定需要多少样本才能产生0.8的功效，以便了解不同手机的受欢迎程度是否存在统计显著性差异，从而使供应商能更合理地投资手机采购。在此例中，零假设断言每种型号手机的销售占比为25%。实际上，售出的手机中A型号占20%，B型号占30%，C型号占19%，D型号占31%。\n\
    \n测试`nobs`参数（观测数量）的不同值，我们发现至少需要224个样本才能产生略高于0.801的功效。增加样本量只会提高此功效。如果真实分布与假设的25%均等分布差异更大，则需要更少的样本。然而，由于各分布相对接近25%，因此需要大量样本：\n\
    \n```\nfrom statsmodels.stats.power import GofChisquarePower\nfrom statsmodels.stats.gof\
    \ import chisquare_effectsize\n\n# probs0断言每种品牌销售占比为25%\n# 实际上，A品牌占12%，B品牌占25%，C品牌占33%，\n\
    # D品牌占1%。\n```"

- md: '## What is censoring?


    In the field of statistics, **Censoring** refers to a situation where the full
    extent or precise value of a measurement or observation is not entirely known.
    In Survival Analysis, this happens when we have information about sample observations
    and do not know when the given event happened, and is considered a key issue in
    survival analysis, distinguishing time-to-event analysis from the other statistical
    analyses mentioned in the previous chapters. There are several reasons why censoring
    happens; for example, a person withdraws from a study or exits prior to a follow-up,
    or the event in question has already happened before the study starts. The censored
    event is *non-informative*, that is, *censoring causes study failure due to some
    reason other than failure time. In other words, failure caused by censoring is
    not related to the probability of an event occurring.* **Informative censoring**
    happens when an observation is lost to follow-up because of research reasons.
    Three types of informative censoring are **right censoring**, **left censoring**,
    and **interval censoring**. In this book, we focus on **non-informative right
    censoring**.


    ### Left censoring


    When we know the *event has happened before the observation data is collected*,
    then the observation is **left-censored**. An example left-censored scenario is
    where we study the age when a middle-school student begins puberty. There may
    be some students reaching this developmental stage before they enter middle school.
    All of these students are considered left-censored. As another example, consider
    an HIV study for an at-risk group of patients where, by the time the study starts,
    some patients already have HIV.


    ### Right censoring


    When the *event happens after some time point* but we do not know the exact time,
    then it is considered **right-censored**. Applying the previous scenario here,
    imagine there are some students who withdraw from the puberty developmental stage
    study, or we lose them prior to following up (for example, they move to another
    school) or they have a delayed puberty (the developmental stage had still not
    taken place by the time they left middle school to begin high school). Another
    example is a cancer study where a group of patients is recruited for a clinical
    trial to see how a new treatment affects them, but a patient in the group dies
    because of a car accident after 2 years. In that case, we know this patient''s
    survival is at least 2 years during the period of the study, but do not know how
    many years beyond 2 that this patient could have survived with the cancer diagnosis.


    ### Interval censoring


    Left censoring and right censoring are special cases of **interval censoring**.
    A clear example to illustrate interval censoring is a patient that tests negatively
    at time $t_1$ for HIV but positively at time $t_2$. However, we do not know the
    exact time this patient got infected between time interval $[t_1, t_2]$. This
    particular patient had an annual checkup last year and again this year. The lab
    results show he was HIV-negative last year but HIV-positive this year. Therefore,
    the infection occurred at some time point between last year''s and this year''s
    checkups, but we do not know exactly when.


    ### Type I and Type II censoring


    There are two types of right censoring: **Type I censoring** and **Type II censoring**.
    In **Type I censoring**, a study is designed to terminate after some time point
    $t$. Fixed censoring occurs when an object does not have an event after time $t$.
    This object is considered censored at time $t$. Random censoring occurs when censored
    objects do not have the same censoring time. In **Type II censoring**, a study
    terminates after some prespecified number of events occur. This type of censoring
    is frequently used in life testing experiments to save time and money. For example,
    we randomly select $n$ objects as a sample to test whether a new innovation is
    really effective, but instead of testing all these $n$ objects, we define that
    the study terminates if $r$ failures occur to save time and costs. In this case,
    the first $r$ objects have events at time $t_1, t_2, \dots, t_r$ but the remaining
    $n - r$ objects do not have an event at time $T = \max(t_1, t_2, \dots, t_r)$
    and they are therefore considered censored.


    Let us visualize a cancer study for a period of 5 years testing a new treatment.
    The start time point is 0 when the study starts, and the end time point is 5 when
    the study ends.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_375_0.png)


    The first patient was recruited at the beginning of the study, but he died in
    year 2-and-a-half. The second patient was also recruited at the beginning of the
    study but in year 5, he was still surviving. This patient has survived for more
    than 5 years, but we do not know for how many years he can ultimately survive,
    which means that right censoring occurred with this patient. The third patient
    was recruited in year 1 but she died in year 4. The fourth patient joined the
    study in year 2 but by year 4, we were unable to follow up with this patient.
    The reason could be that he moved to another city, for instance. Censoring occurs
    for patient 2 and patient 4.


    The study seems like a regression problem but in this example, the second patient
    was considered to have survived when the study concluded. This makes survival
    analysis different from regular statistical analyses. We also do not remove the
    data of the second patient from the study data since the information is valuable:
    patients can survive for at least 5 years. In addition, patient follow-ups can
    be prevented because they may move to another place or are very sick but instead
    of removing the data, we record the reason why they dropped out of the study.
    Similarly, gender considerations can be biased because, for example, male patients
    may be more likely to withdraw from the study than female patients when they are
    sick, thus resulting in a potentially incorrect conclusion that females survive
    longer than males.


    ## Survival data


    **Survival data** focuses on whether or not an object in a study experiences an
    event. In addition, the follow-up time is also considered. *Time zero* or *time
    origin* is the time when the study starts. Depending on the purpose of a study,
    time zero or time origin can be different. For instance, in a prostate cancer
    study, researchers recruit 40-year-old and older male participants, but in a study
    of puberty developmental ages, male and female teenagers of 12 and older are recruited.
    If the research takes place over a period of time (which could be several months
    or years) then recording the time origin and follow-up time during the study is
    vitally important.


    Lastly, we discuss the *relationship between survival and censoring times* and
    how we *record survival data with censoring*. Suppose that for each object in
    a sample, we know its true event time $T$ and true censoring time $C$. Then, the
    *survival time of an object is the period of time until an event occurs* and the
    *censoring time of an object is the moment when censoring occurs*, when, for example,
    the study ends or we are unable to follow up on this object. Let $\delta_i$ denote
    the status indicator for the object $i$:


    $$\delta_i = \begin{cases} 1 & \text{if the event was observed}, \\ 0 & \text{if
    censoring was observed}. \end{cases}$$


    In other words, $\delta_i = 1$ when the event $T_i$ occurs *before* censoring
    $C_i$ and $\delta_i = 0$ when the event $T_i$ occurs *after* censoring $C_i$.
    The observed outcome variable is


    $$Y_i = \min(T_i, C_i)$$


    and the censored survival data for object $i$ can be captured as $(Y_i, \delta_i)$.


    The following example considers three patients in a cancer study. Time is considered
    here in years and the duration of the study is 5 years.


    | Patient | T | C | δ |

    | :--- | :--- | :--- | :--- |

    | 1 | 3 (the patient died in year 3) | No censoring – patient died in year 3 |
    1 (because the event was observed) |

    | 2 | 7 (the patient died in year 7 but the study ended in year 5) | 5 (the study
    ends in year 5) | 0 (because the censoring was observed) |

    | 3 | No information | 4 (the patient dropped out of the study) | 0 (because the
    censoring was observed) |


    Figure 13.2 – Survival analysis for a cancer study


    The following figure illustrates information about 3 patients in the cancer study.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_377_0.png)


    ## Survival Function, Hazard and Hazard Ratio


    Let us first discuss the survival function. The formula of the function is defined
    as


    $S(t) = P(T > t)$


    and represents the probability that the object survives past time $t$. The survival
    function is a non-increasing function with $t$ ranges from 0 to $\infty$. When
    $t = 0, S(t) = 1$ and when $t = \infty, S(t) = S(\infty) = 0$. It is a smooth
    function theoretically but practically, *events occur on a discrete time scale*
    (days, weeks, years).'
  mdcn: '## 什么是删失？


    在统计学领域，**删失**指的是测量或观察的完整范围或精确值不完全已知的情况。在生存分析中，当我们拥有样本观察的信息，但不知道给定事件何时发生时，就会出现这种情况，这被认为是生存分析中的一个关键问题，将时间-事件分析与前面章节提到的其他统计分析区分开来。删失发生的原因有几个；例如，一个人退出研究或在随访前离开，或者所讨论的事件在研究开始前已经发生。删失事件是*非信息性的*，也就是说，*删失导致研究失败的原因并非失败时间本身。换句话说，由删失引起的失败与事件发生的概率无关。*
    **信息性删失**发生在观察因研究原因而失访时。信息性删失有三种类型：**右删失**、**左删失**和**区间删失**。在本书中，我们重点关注**非信息性右删失**。


    ### 左删失


    当我们知道*事件在收集观察数据之前已经发生*，那么该观察就是**左删失**的。一个左删失场景的例子是，我们研究中学生开始青春期的年龄。可能有一些学生在进入中学之前就已经达到了这个发育阶段。所有这些学生都被视为左删失。再举一个例子，考虑一项针对高危患者群体的HIV研究，其中在研究开始时，一些患者已经感染了HIV。


    ### 右删失


    当*事件在某个时间点之后发生*但我们不知道确切时间时，则被视为**右删失**。将前面的场景应用到这里，想象有一些学生退出了青春期发育阶段的研究，或者我们在随访前失去了他们（例如，他们转学到另一所学校），或者他们青春期延迟（在他们离开中学开始高中时，发育阶段仍未发生）。另一个例子是一项癌症研究，其中招募了一组患者进行临床试验，以观察一种新疗法对他们的影响，但该组中的一名患者在2年后死于车祸。在这种情况下，我们知道该患者在研究期间的生存期至少为2年，但不知道在2年之后，该患者还能存活多少年。


    ### 区间删失


    左删失和右删失是**区间删失**的特例。一个说明区间删失的清晰例子是，一名患者在时间 $t_1$ 检测HIV为阴性，但在时间 $t_2$ 检测为阳性。然而，我们不知道该患者在时间间隔
    $[t_1, t_2]$ 内的确切感染时间。这位特定的患者去年和今年都进行了年度体检。实验室结果显示他去年HIV阴性，今年HIV阳性。因此，感染发生在去年和今年体检之间的某个时间点，但我们不知道确切时间。


    ### I型删失和II型删失


    右删失有两种类型：**I型删失**和**II型删失**。在**I型删失**中，研究设计为在某个时间点 $t$ 后终止。当一个对象在时间 $t$ 后没有发生事件时，发生固定删失。该对象在时间
    $t$ 被视为删失。当删失对象没有相同的删失时间时，发生随机删失。在**II型删失**中，研究在发生预定数量的事件后终止。这种类型的删失经常用于寿命测试实验以节省时间和金钱。例如，我们随机选择
    $n$ 个对象作为样本来测试一项新创新是否真的有效，但为了节省时间和成本，我们不是测试所有这 $n$ 个对象，而是定义如果发生 $r$ 次失败则研究终止。在这种情况下，前
    $r$ 个对象在时间 $t_1, t_2, \dots, t_r$ 发生事件，但剩余的 $n - r$ 个对象在时间 $T = \max(t_1, t_2,
    \dots, t_r)$ 没有发生事件，因此它们被视为删失。


    让我们可视化一项为期5年测试新疗法的癌症研究。开始时间点是研究开始时的0，结束时间点是研究结束时的5。


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_375_0.png)


    第一位患者在研究开始时被招募，但他在2年半时去世。第二位患者也在研究开始时被招募，但在第5年，他仍然存活。该患者已存活超过5年，但我们不知道他最终能存活多少年，这意味着该患者发生了右删失。第三位患者在第1年被招募，但她在第4年去世。第四位患者在第2年加入研究，但到第4年，我们无法随访该患者。原因可能是他搬到了另一个城市。患者2和患者4发生了删失。


    这项研究看起来像一个回归问题，但在这个例子中，第二位患者在研究结束时被视为存活。这使得生存分析不同于常规统计分析。我们也不会从研究数据中移除第二位患者的数据，因为这些信息很有价值：患者可以存活至少5年。此外，患者随访可能会被阻止，因为他们可能搬到另一个地方或病得很重，但我们不是移除数据，而是记录他们退出研究的原因。同样，性别考虑可能会产生偏差，因为例如，男性患者在生病时可能比女性患者更有可能退出研究，从而可能导致女性比男性存活时间更长的错误结论。


    ## 生存数据


    **生存数据**关注研究中的对象是否经历事件。此外，随访时间也被考虑在内。*时间零点*或*时间原点*是研究开始的时间。根据研究目的，时间零点或时间原点可能不同。例如，在一项前列腺癌研究中，研究人员招募40岁及以上的男性参与者，但在一项青春期发育年龄的研究中，招募12岁及以上的男性和女性青少年。如果研究持续一段时间（可能是几个月或几年），那么在研究期间记录时间原点和随访时间至关重要。


    最后，我们讨论*生存时间与删失时间之间的关系*以及我们如何*记录带有删失的生存数据*。假设对于样本中的每个对象，我们知道其真实事件时间 $T$ 和真实删失时间
    $C$。那么，*对象的生存时间是直到事件发生的时间段*，而*对象的删失时间是删失发生的时刻*，例如，当研究结束或我们无法随访该对象时。令 $\delta_i$
    表示对象 $i$ 的状态指示符：


    $$\delta_i = \begin{cases} 1 & \text{如果观察到事件}, \\ 0 & \text{如果观察到删失}. \end{cases}$$


    换句话说，当事件 $T_i$ 发生在删失 $C_i$ *之前*时，$\delta_i = 1$；当事件 $T_i$ 发生在删失 $C_i$ *之后*时，$\delta_i
    = 0$。观察到的结果变量是


    $$Y_i = \min(T_i, C_i)$$


    对象 $i$ 的删失生存数据可以表示为 $(Y_i, \delta_i)$。


    以下示例考虑了一项癌症研究中的三名患者。这里时间以年为单位，研究持续时间为5年。


    | 患者 | T | C | δ |

    | :--- | :--- | :--- | :--- |

    | 1 | 3（患者在第3年去世） | 无删失 – 患者在第3年去世 | 1（因为观察到事件） |

    | 2 | 7（患者在第7年去世，但研究在第5年结束） | 5（研究在第5年结束） | 0（因为观察到删失） |

    | 3 | 无信息 | 4（患者退出研究） | 0（因为观察到删失） |


    图13.2 – 癌症研究的生存分析


    下图说明了癌症研究中3名患者的信息。


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_377_0.png)


    ## 生存函数、风险函数和风险比


    让我们首先讨论生存函数。该函数的公式定义为


    $S(t) = P(T > t)$


    并表示对象存活超过时间 $t$ 的概率。生存函数是一个非增函数，$t$ 的范围从0到 $\infty$。当 $t = 0, S(t) = 1$，当 $t =
    \infty, S(t) = S(\infty) = 0$。理论上它是一个平滑函数，但实际上，*事件发生在离散的时间尺度上*（天、周、年）。'

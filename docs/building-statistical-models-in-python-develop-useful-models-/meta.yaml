    \ the data. Recall that the **null hypothesis for the Dickey-Fuller is that a\
    \ unit root exists**, and the alternative hypothesis is that one does not. We’ll\
    \ execute the following code:\n\n```\nfrom statsmodels.tsa.stattools import adfuller\n\
    for col in ['realcons','realinv','realdpi']:\n    adfuller_test = adfuller(data[col],\
    \ autolag='AIC')\n    print('ADF p-value for {}: {}'.format(col, adfuller_test[1]))\n\
    ```\n\nHere we can see the Dickey-Fuller results for each variable. Recall the\
    \ null hypothesis is the presence of a single unit root. Therefore, since the\
    \ p-values are not low, we will not reject the null hypothesis. This gives us\
    \ statistical evidence to assume the presence of trend:\n\nADF p-value for realcons:\
    \ 0.9976992503412904\n\nADF p-value for realinv: 0.6484956579101141\n\nADF p-value\
    \ for realdpi: 1.0\n\nLet’s difference the data here with a loop:\n\n```\nimport\

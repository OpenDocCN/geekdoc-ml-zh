    # 第1部分：统计学导论


    本部分将涵盖统计建模的基础统计概念。

    它包括以下章节：


    - 第1章，抽样与泛化

    - 第2章，数据分布

    - 第3章，假设检验

    - 第4章，参数检验

    - 第5章，非参数检验


    # 抽样与泛化


    在本章中，我们将描述总体和从总体中抽样的概念，包括一些常见的抽样策略。对抽样的讨论将引出一个描述泛化的部分。泛化将被讨论，因为它涉及使用样本对其各自的总体做出结论。在为统计推断建模时，有必要确保样本可以泛化到总体。我们将通过本章的主题深入概述这座桥梁。


    我们将涵盖以下主要主题：


    - 软件和环境设置

    - 总体与样本

    - 从样本推断总体

    - 抽样策略——随机、系统和分层



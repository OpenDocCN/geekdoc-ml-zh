    \ Just as with the chapters on regression, we may find the multiple variables\
    \ in a time series are related to the outcome of a variable of interest. In *Chapter\
    \ 12, Multivariate Time Series*, we will deal with the extra complexity of multivariate\
    \ time series and extend the single-variable models discussed in *Chapter 11*\
    \ to multiple variables in *Chapter 12*. In this chapter, we will cover the basics\
    \ of time series.\n\nTime series typically exhibit a property called **serial\
    \ correlation**, which means that previous knowledge provides some knowledge about\
    \ the future of the time series. We can measure serial correlation by comparing\
    \ the current value of a time series to the previous values in the series to determine\
    \ if present values are correlated with previous values. This type of correlation\
    \ is also called **autocorrelation**. We will discuss more on autocorrelation\

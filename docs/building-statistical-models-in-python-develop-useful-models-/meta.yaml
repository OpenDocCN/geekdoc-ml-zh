    ## 2 数据分布


    在本章中，我们将涵盖数据和分布的基本方面。我们将首先介绍数据类型和数据分布。在介绍了分布的基本度量之后，我们将描述正态分布及其重要性质，包括中心极限定理。最后，我们将介绍重采样方法（如排列）和转换方法（如对数转换）。本章涵盖了开始统计建模所需的基础知识。



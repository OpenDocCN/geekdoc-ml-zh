    In this section, we discussed the Kaplan-Meier model for survival, which is a
    nonparametric model for survival data. We also discussed how to compare the survival
    functions of multiple groups within a set. In the next section, we will discuss
    the exponential model, which is a parametric model for survival data.


    # Exponential model


    In the last section, we studied the non-parametric **Kaplan-Meier survival model**.
    We will now bridge parametric modeling with the **exponential model** and then
    will discuss a semi-parametric model, the **Cox Proportional Hazards model**,
    in the next section. Before considering the exponential model, we will review
    what the exponential distribution is and why we mention it in this section. This
    distribution is based on the Poisson process. Here, events occur independently
    over time and the event rate, λ, is calculated by the number of occurrences per
    unit of time, as follows:


    $$\lambda = \frac{Y}{t}$$


    The Poisson distribution is a **statistical discrete distribution** concerning
    the number of events occurring in a specified time period. It is defined as follows.
    Let $Y$ be the number of occurrences in time $t$. $Y$ follows the Poisson distribution
    with parameter $\lambda$ if a probability mass function is given by the following
    formula:


    $$f(Y) = Pr(y = Y) = \frac{e^{-\lambda}\lambda^Y}{Y!}$$


    The mean and the variance of the discrete variable $y$ are equal to the event
    rate. Instead of focusing on how many events occur in a specific time period,
    we can think about how long the event occurs; that''s why the exponential distribution
    is considered in this section. Let $T$ be the time until the event occurs ($Y
    = 1$). The probability density function is calculated by the following formula:


    $$f(t) = P(T = t) = \lambda e^{-\lambda t}$$


    And the cumulative distribution function is calculated as follows:


    $$F(t) = P(T \leq t) = 1 - e^{-\lambda t}$$


    The function $F(t)$ represents the probability of not surviving past time $t$
    or the probability that survival time is less than $t$. We can see in *Figure
    14.6* the following probability form:'
  - '[PAGE 389]


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_389_0.png)


    Figure 14.6 – Curve of the probability of not surviving past time t


    In contrast, the survival function is related to the probability of surviving
    past a certain time t:


    $S(t) = P(T > t) = 1 - P(T \leq t) = e^{-\lambda t}$


    By visualization, the survival function will have the form seen in Figure 14.7:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_389_1.png)


    Figure 14.7 – Curve of the survival function


    The **accumulated hazard function** is $H(t) = \lambda t$. We can then we can
    rewrite the survival function in terms of the hazard function as follows:


    $S(t) = e^{-H(t)}$


    Given $S(t)$ and $f(t)$, we can use the idea of the log-likelihood equation approach
    and estimate the value for $\lambda$ via maximum likelihood estimation.'

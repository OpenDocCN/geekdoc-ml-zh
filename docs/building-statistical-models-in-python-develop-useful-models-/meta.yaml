  md: 'Let us consider the one-sample t-test in the following section.


    # One-sample t-test


    Similar to the one-sample z-test, the null and alternative hypotheses need to
    be considered in order to perform the hypothesis test. Three null and alternative
    hypotheses corresponding to left-tailed, right-tailed, and two-tailed t-tests
    are presented as follows:


    $H_0: \mu \geq \mu_0$ &nbsp;&nbsp;&nbsp;&nbsp; $H_0: \mu \leq \mu_0$ &nbsp;&nbsp;&nbsp;&nbsp;
    $H_0: \mu = \mu_0$


    $H_a: \mu < \mu_0$ &nbsp;&nbsp;&nbsp;&nbsp; $H_a: \mu > \mu_0$ &nbsp;&nbsp;&nbsp;&nbsp;
    $H_a: \mu \neq \mu_0$


    Next, the level of significance, $\alpha$, needs to be specified following the
    research purpose. There are two approaches: the p-value approach and the critical
    value approach. In the p-value approach, the rejection rule (reject $H_0$—the
    null hypothesis) is when the p-value is less than or equal to the specified level
    of significance chosen. In the critical value approach, the rejection rule is
    when the test statistic is less than or equal to the critical value $-t_{\alpha}$
    for the left-tailed t-test, the test statistic is greater than or equal to $t_{\alpha}$
    for a right-tailed t-test, and the test statistic is less than or equal to $-t_{\alpha/2}$
    or greater than or equal to $t_{\alpha/2}$ for a two-tailed test. The last step
    is to interpret the statistical conclusion for the hypothesis test.


    To find the p-value based on the value of the student t distribution, we can use
    the following syntax:


    ```

    scipy.stats.t.sf(abs(x), df)

    ```


    Here, x is the test statistic and df is the degree of freedom (df = n-1 where
    $n$ is the sample size) in the formula.


    For example, to find the p-value associated with a t-score of 1.9 with the degree
    of freedom 14 in a left-tailed test, this would be the Python implementation:


    ```

    import scipy.stats

    round(scipy.stats.t.sf(abs(1.9), df=14),4)

    ```


    The output would be 0.0391. If the level of significance $\alpha = 0.05$, then
    we reject the null hypothesis because the p-value is less than $\alpha$. For a
    right-tailed t-test, similar Python code as in the left-tailed t-test is implemented
    to find the p-value. For a two-tailed test, we need to multiply the value by 2,
    as follows:


    ```

    scipy.stats.t.sf(abs(t), df)*2

    ```


    Here, t is the test statistic and df is the degree of freedom (df = n-1 where
    $n$ is the sample size).


    To compute the critical value in Python, we use the following syntax:


    ```

    scipy.stats.t.ppf(q, df)

    ```'

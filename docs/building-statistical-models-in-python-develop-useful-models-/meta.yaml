  - "[PAGE 253]\n\nIn the previous chapter, we identified that `occupation` and `occupation_husb`\
    \ do not capture much difference in explaining affairs so we will drop `occupation_husb`\
    \ from the dataset to minimize the volume of one-hot encodes, as follows:\n\n\
    ```\nimport pandas as pd\npd.options.mode.chained_assignment = None\nX['occupation']\
    \ = X['occupation'].map({1:'Occupation_One',\n                               \
    \        2:'Occupation_Two',\n                                       3:'Occupation_Three',\n\
    \                                       4:'Occupation_Four',\n               \
    \                        5:'Occupation_Five',\n                              \
    \         6:'Occupation_Six'})\n\nX = pd.get_dummies(X, columns=['occupation'])\n\
    X.drop('occupation_husb', axis=1, inplace=True)\n```\n\nLet's build a train/test\
    \ split with a test size of 33% of the overall data:\n\n```\nfrom sklearn.model_selection\
    \ import train_test_split\nX_train, X_test, y_train, y_test = train_test_split(X,\
    \ y, test_size=0.33, random_state=42)\n```\n\nWe want to retain a copy of the\
    \ original data, but as noted earlier, we also need to center and scale the data\
    \ for LDA to have an optimal chance of success. Therefore, we'll take copies of\
    \ the X data and scale them. Note, however, we do not want to scale the one-hot\
    \ encoded data since one-hot encodes cannot be scaled and retain their meaning.\
    \ Therefore, we will use scikit-learn's `ColumnTransformer()` pipeline function\
    \ to apply `StandardScaler()` to all but the one-hot-encoded columns, like so:\n\
    \n```\nfrom sklearn.compose import ColumnTransformer\nfrom sklearn.preprocessing\
    \ import StandardScaler\n\nX_train_sc = X_train.copy()\nX_test_sc = X_test.copy()\n\
    \nct = ColumnTransformer([\n    ('', StandardScaler(), ['rate_marriage','age','yrs_married','children','religious','educ'])],\
    \ remainder='passthrough')\nX_train_sc = ct.fit_transform(X_train_sc)\nct = ColumnTransformer([\n\
    \    ('', StandardScaler(), ['rate_marriage','age','yrs_married','children','religious','educ'])],\
    \ remainder='passthrough')\nX_test_sc = ct.fit_transform(X_test_sc)\n```"
- md: "Now, let's fit the LDA model to the training data. We fit the model to the\
    \ training data and then use that to predict the training data to get a performance\
    \ benchmark. Then, we will use the model to predict the testing data to see how\
    \ well the model can generalize on unseen data.\n\nFit the data, like so:\n\n\
    ```\nfrom sklearn.discriminant_analysis import LinearDiscriminantAnalysis\nlda\
    \ = LinearDiscriminantAnalysis()\nlda.fit(X_train_sc, y_train)\n```\n\nHere, we\
    \ build functions to measure precision and recall. Precision is a measure that\
    \ basically tells you how well a model is at finding only the positive values\
    \ of the target (affairs = 1) and none of the others (affairs = 0). Recall is\
    \ a measure that practically tells you how well the model performs at finding\
    \ all positive values of the target, regardless of how many of the others it finds.\
    \ The ideal scenario is both of these metrics are very high. However, this may\
    \ not be possible. If neither is very high, the use case should determine which\
    \ metric is more important:\n\n```\ndef precision_score(true_positives:int, false_positives:int):\n\
    \    precision = true_positives / (true_positives + false_positives)\n    return\
    \ precision;\n\ndef recall_score(true_positives:int, false_negatives:int):\n \
    \   recall = true_positives / (true_positives + false_negatives)\n    return recall;\n\
    ```\n\nLet's now run the model and verify performance:\n\n```\nfrom sklearn.metrics\
    \ import confusion_matrix\nimport seaborn as sns\n\ny_train_pred = lda.predict(X_train_sc)\n\
    \ncf_train = confusion_matrix(y_train, y_train_pred, labels=[0,1])\ntn_train,\
    \ fp_train, fn_train, tp_train = cf_train.ravel()\n\ncf_matrix = sns.heatmap(cf_train,\
    \ annot=True, fmt='g', cbar=False)\ncf_matrix.set(xlabel='Predicted', ylabel='Actual',\
    \ title='Confusion Matrix - Train');\n\nprint('Precision on Train: ', round(precision_score(tp_train,\
    \ fp_train), 4))\nprint('Recall on Train: ', round(recall_score(tp_train, fn_train),\
    \ 4))\n```\n\nHere we can see our model results on the training data:\n\nPrecision\
    \ on Train: 0.6252\n\nRecall on Train: 0.3444\n\nHere, we can visualize performance\
    \ using a confusion matrix to compare actual target values against the predicted\
    \ values on the training data:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_255_0.png)\n\
    \nFigure 9.1 – Confusion matrix for LDA training data\n\nLet's repeat the process\
    \ on the test data:\n\n```\ny_test_pred = lda.predict(X_test_sc)\n\ncf_test =\
    \ confusion_matrix(y_test, y_test_pred, labels=[0,1])\ntn_test, fp_test, fn_test,\
    \ tp_test = cf_test.ravel()\n\ncf_matrix = sns.heatmap(cf_test, annot=True, fmt='g',\
    \ cbar=False)\ncf_matrix.set(xlabel='Predicted', ylabel='Actual', title='Confusion\
    \ Matrix - Test');\n\nprint('Precision on Test: ', round(precision_score(tp_test,\
    \ fp_test), 4))\nprint('Recall on Test: ', round(recall_score(tp_test, fn_test),\
    \ 4))\n```\n\nHere we can see our model results on the test data:\n\nPrecision\
    \ on Test: 0.6615\n\nRecall on Test: 0.3673\n\nHere, we can visualize performance\
    \ using a confusion matrix to compare actual target values against the predicted\
    \ values on the test data:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_256_0.png)\n\
    \nFigure 9.2 – Confusion matrix for LDA test data\n\nFrom these results, we can\
    \ see the scores are consistent for precision and recall across both training\
    \ and test sets using the model we built on the training data, so we can conclude\
    \ the model generalizes well on unseen data compared to the benchmark (training)\
    \ performance. However, the performance is not great. The issue may be that our\
    \ target encoding is not very useful (perhaps the discretization of affairs is\
    \ not useful and a statistical approach should be taken to discretize the values).\
    \ However, it is also possible the features do not explain enough of the variance\
    \ in the response variable to build a model that is of much use (it's also possible\
    \ affairs cannot be predicted at all and there is too much random noise to model).\
    \ However, for the intent of the chapter, we were able to demonstrate how a model\
    \ using LDA could be constructed and tested in addition to the preprocessing steps\
    \ that must be taken before data can be modeled.\n\n## Supervised dimension reduction\n\
    \nUnlike PCA, which can be used to perform unsupervised dimension reduction, LDA\
    \ can be leveraged to perform supervised dimension reduction. That is, upon training\
    \ the model to learn the input variance in relation to the output target, a derived\
    \ set of features can be obtained. The differences are illustrated in the following\
    \ diagram:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_257_0.png)\n\nSuppose our\
    \ data produced a good result when using LDA for classification. We could then\
    \ confidently use the same data to build a supervised dimension reduction technique.\
    \ To perform this, we would run the following code using `fit_transform()` to\
    \ transform the input data with respect to the target (rather than the `fit()`\
    \ function we used to fit a classifier earlier). As with the classifier, the data\
    \ should still conform to the assumptions of the LDA model. *Data is reduced according\
    \ to the number of classes in the response variable.* Where the number of classes\
    \ is C, the number of reduced features will be C-1. Because we have only two classes\
    \ in our target variable, y, LDA reduces the input features to a dimension of\
    \ 1:\n\n```\nfrom sklearn.discriminant_analysis import LinearDiscriminantAnalysis\n\
    lda = LinearDiscriminantAnalysis()\nX_reduced = lda.fit_transform(X_train_sc,\
    \ y_train)\n```\n\nWe can see the data has now been reduced to a one-dimensional\
    \ feature:\n\n```\nprint('Input data dimensions: ', X_train_sc.shape)\nprint('Transformed\
    \ data dimensions: ', X_reduced.shape)\n```\n\nHere, we can see our data is reduced\
    \ from 12 features to 1:\n\nInput data dimensions: (4265, 12)\n\nTransformed data\
    \ dimensions: (4265, 1)\n\n## Quadratic Discriminant Analysis\n\nIn the last section,\
    \ we discussed LDA. The data within each class needs to be drawn from a multivariate\
    \ Gaussian distribution, and the covariance matrix is the same across different\
    \ classes. In this section, we consider another type of discriminant analysis\
    \ called QDA but the assumptions for QDA can be relaxed on the covariance matrix\
    \ assumption. Here, we do not need the covariance matrix to be identical across\
    \ different classes but only for each class to have its own covariance matrix.\
    \ The multivariate Gaussian distribution with a class-specific mean vector within\
    \ each class for observations is still required to conduct QDA. We assume that\
    \ an observation from a $k^{th}$ class satisfies the following formula:\n\n$X\
    \ \\sim N(\\mu_k, \\Sigma_k)$\n\nWe'll thus consider a generative classifier,\
    \ as follows:\n\n$p(X|y = k, \\theta) = N(X|\\mu_k, \\Sigma_k)$\n\nAnd then, its\
    \ corresponding class posterior is this:\n\n$p(y = k|X, \\theta) \\propto \\pi_k\
    \ N(X|\\mu_k, \\Sigma_k)$.\n\nHere, $\\pi_k = p(y = k)$ is the prior probability\
    \ of the class $k$. In literature, this is called **Gaussian Discriminant Analysis\
    \ (GDA)**. Then, the discriminant function is computed by taking the log posterior\
    \ over $k$ classes, as follows:\n\n$logp(y = k|X, \\theta) = log\\pi_k - \\frac{log|2\\\
    pi\\Sigma_k|}{2} - \\frac{(X - \\mu_k)^T \\Sigma_k^{-1} (X - \\mu_k)}{2} + C$\n\
    \nHere, $C$ is a constant. Unlike in LDA, the quantity of $X$ appears as a quadratic\
    \ function in the preceding formula and it is known as QDA. The choice between\
    \ LDA or QDA is related to the bias-variance trade-off. If the assumption that\
    \ shares the same covariance matrix over $k$ classes is not good, then a high\
    \ bias can be significant in LDA. In other words, LDA is used when a boundary\
    \ between classes is linear, and QDA is performed better in the case of a nonlinear\
    \ boundary between classes.\n\nNow, we consider an example using the same *Iris*\
    \ dataset that we studied in the last chapter. To perform QDA, an option is to\
    \ use `QuadraticDiscriminantAnalysis` in sklearn. As in the last chapter, we use\
    \ a `train_test_split` function to create a training and a test set (80% versus\
    \ 20%), and then we fit a QDA model on the training set and use this model for\
    \ prediction:\n\n```\nfrom sklearn.discriminant_analysis import QuadraticDiscriminantAnalysis\n\
    # fit the model using sklearn\nmodel_qda = QuadraticDiscriminantAnalysis(store_covariance=True)\n\
    model_qda.fit(X_train, y_train)\ny_hat_qda = model_qda.predict(X_test)\npred_qda\
    \ = list(map(round, y_hat_qda))\n```"
  mdcn: "现在，让我们将LDA模型拟合到训练数据上。我们先将模型拟合到训练数据，然后用它来预测训练数据以获得性能基准。接着，我们将使用该模型来预测测试数据，以观察模型在未见数据上的泛化能力。\n\
    \n拟合数据，如下所示：\n\n```\nfrom sklearn.discriminant_analysis import LinearDiscriminantAnalysis\n\
    lda = LinearDiscriminantAnalysis()\nlda.fit(X_train_sc, y_train)\n```\n\n这里，我们构建函数来衡量精确率和召回率。精确率是一个衡量指标，它基本上告诉你模型在只找出目标中的正例（affairs\
    \ = 1）而排除所有负例（affairs = 0）方面表现如何。召回率则是一个衡量指标，它实际上告诉你模型在找出所有目标正例方面表现如何，而不管它找出了多少负例。理想情况是这两个指标都非常高。然而，这可能无法实现。如果两者都不高，那么具体用例应决定哪个指标更重要：\n\
    \n```\ndef precision_score(true_positives:int, false_positives:int):\n    precision\
    \ = true_positives / (true_positives + false_positives)\n    return precision;\n\
    \ndef recall_score(true_positives:int, false_negatives:int):\n    recall = true_positives\
    \ / (true_positives + false_negatives)\n    return recall;\n```\n\n现在让我们运行模型并验证性能：\n\
    \n```\nfrom sklearn.metrics import confusion_matrix\nimport seaborn as sns\n\n\
    y_train_pred = lda.predict(X_train_sc)\n\ncf_train = confusion_matrix(y_train,\
    \ y_train_pred, labels=[0,1])\ntn_train, fp_train, fn_train, tp_train = cf_train.ravel()\n\
    \ncf_matrix = sns.heatmap(cf_train, annot=True, fmt='g', cbar=False)\ncf_matrix.set(xlabel='Predicted',\
    \ ylabel='Actual', title='Confusion Matrix - Train');\n\nprint('Precision on Train:\
    \ ', round(precision_score(tp_train, fp_train), 4))\nprint('Recall on Train: ',\
    \ round(recall_score(tp_train, fn_train), 4))\n```\n\n这里我们可以看到模型在训练数据上的结果：\n\n\
    Precision on Train: 0.6252\n\nRecall on Train: 0.3444\n\n在这里，我们可以使用混淆矩阵来可视化性能，比较训练数据上的实际目标值与预测值：\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_255_0.png)\n\n图 9.1 – LDA训练数据的混淆矩阵\n\
    \n让我们在测试数据上重复这个过程：\n\n```\ny_test_pred = lda.predict(X_test_sc)\n\ncf_test = confusion_matrix(y_test,\
    \ y_test_pred, labels=[0,1])\ntn_test, fp_test, fn_test, tp_test = cf_test.ravel()\n\
    \ncf_matrix = sns.heatmap(cf_test, annot=True, fmt='g', cbar=False)\ncf_matrix.set(xlabel='Predicted',\
    \ ylabel='Actual', title='Confusion Matrix - Test');\n\nprint('Precision on Test:\
    \ ', round(precision_score(tp_test, fp_test), 4))\nprint('Recall on Test: ', round(recall_score(tp_test,\
    \ fn_test), 4))\n```\n\n这里我们可以看到模型在测试数据上的结果：\n\nPrecision on Test: 0.6615\n\n\
    Recall on Test: 0.3673\n\n在这里，我们可以使用混淆矩阵来可视化性能，比较测试数据上的实际目标值与预测值：\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_256_0.png)\n\
    \n图 9.2 – LDA测试数据的混淆矩阵\n\n从这些结果中，我们可以看到，使用我们在训练数据上构建的模型，精确率和召回率在训练集和测试集上是一致的，因此我们可以得出结论：与基准（训练）性能相比，该模型在未见数据上泛化得很好。然而，性能并不理想。问题可能在于我们的目标编码不是很有用（也许对affairs的离散化没有用，应该采用统计方法来离散化值）。然而，也有可能是特征无法解释响应变量中足够的方差，从而无法构建一个非常有用的模型（也有可能affairs根本无法预测，存在太多随机噪声无法建模）。然而，就本章的意图而言，我们能够演示如何构建和测试一个使用LDA的模型，以及在数据建模之前必须采取的预处理步骤。\n\
    \n## 有监督的降维\n\n与可用于执行无监督降维的PCA不同，LDA可用于执行有监督的降维。也就是说，在训练模型以学习与输出目标相关的输入方差后，可以获得一组派生的特征。差异在下图中说明：\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_257_0.png)\n\n假设我们的数据在使用LDA进行分类时产生了良好的结果。那么我们可以放心地使用相同的数据来构建有监督的降维技术。要执行此操作，我们将运行以下代码，使用`fit_transform()`根据目标来转换输入数据（而不是我们之前用于拟合分类器的`fit()`函数）。与分类器一样，数据仍应符合LDA模型的假设。*数据根据响应变量中的类别数量进行缩减。*\
    \ 其中类别数为C，缩减后的特征数将是C-1。因为我们的目标变量y中只有两个类别，所以LDA将输入特征缩减到1维：\n\n```\nfrom sklearn.discriminant_analysis\
    \ import LinearDiscriminantAnalysis\nlda = LinearDiscriminantAnalysis()\nX_reduced\
    \ = lda.fit_transform(X_train_sc, y_train)\n```\n\n我们可以看到数据现在已被缩减为一维特征：\n\n```\n\
    print('Input data dimensions: ', X_train_sc.shape)\nprint('Transformed data dimensions:\
    \ ', X_reduced.shape)\n```\n\n在这里，我们可以看到我们的数据从12个特征缩减到了1个：\n\nInput data dimensions:\
    \ (4265, 12)\n\nTransformed data dimensions: (4265, 1)\n\n## 二次判别分析\n\n在上一节中，我们讨论了LDA。每个类别的数据需要来自多元高斯分布，并且协方差矩阵在不同类别之间是相同的。在本节中，我们考虑另一种称为QDA的判别分析，但QDA的假设在协方差矩阵假设上可以放宽。这里，我们不需要协方差矩阵在不同类别之间相同，只需要每个类别有自己的协方差矩阵。仍然需要每个类别内的观测值具有类别特定的均值向量的多元高斯分布来执行QDA。我们假设来自第$k$个类别的观测值满足以下公式：\n\
    \n$X \\sim N(\\mu_k, \\Sigma_k)$\n\n因此，我们将考虑一个生成式分类器，如下所示：\n\n$p(X|y = k, \\theta)\
    \ = N(X|\\mu_k, \\Sigma_k)$\n\n然后，其对应的类别后验概率如下：\n\n$p(y = k|X, \\theta) \\propto\
    \ \\pi_k N(X|\\mu_k, \\Sigma_k)$。\n\n这里，$\\pi_k = p(y = k)$是类别$k$的先验概率。在文献中，这被称为**高斯判别分析（GDA）**。然后，判别函数通过取$k$个类别的对数后验概率来计算，如下所示：\n\
    \n$logp(y = k|X, \\theta) = log\\pi_k - \\frac{log|2\\pi\\Sigma_k|}{2} - \\frac{(X\
    \ - \\mu_k)^T \\Sigma_k^{-1} (X - \\mu_k)}{2} + C$\n\n这里，$C$是一个常数。与LDA不同，$X$的量在前面的公式中表现为二次函数，因此被称为QDA。在LDA或QDA之间的选择与偏差-方差权衡有关。如果共享相同协方差矩阵的假设在$k$个类别上不好，那么LDA中的高偏差可能很显著。换句话说，当类别之间的边界是线性的时使用LDA，而当类别之间的边界是非线性的时，QDA表现更好。\n\
    \n现在，我们考虑一个使用上一章研究过的相同*Iris*数据集的例子。要执行QDA，一个选择是使用sklearn中的`QuadraticDiscriminantAnalysis`。与上一章一样，我们使用`train_test_split`函数创建训练集和测试集（80%\
    \ 对 20%），然后在训练集上拟合一个QDA模型，并使用该模型进行预测：\n\n```\nfrom sklearn.discriminant_analysis\
    \ import QuadraticDiscriminantAnalysis\n# fit the model using sklearn\nmodel_qda\
    \ = QuadraticDiscriminantAnalysis(store_covariance=True)\nmodel_qda.fit(X_train,\
    \ y_train)\ny_hat_qda = model_qda.predict(X_test)\npred_qda = list(map(round,\
    \ y_hat_qda))\n```"

  md: "The following code sample shows how to implement stratified sampling with numpy\
    \ using the example shown in *Figure 1.5*. First, the instances are split into\
    \ the respective strata: numbers and letters. Then, we use numpy to take random\
    \ samples from each stratum. Like in the previous code example, we utilize the\
    \ choice method to take the random sample, but the sample size for each stratum\
    \ is based on the total number of instances in each stratum rather than the total\
    \ number of instances in the entire population; for example, sampling 50% of the\
    \ numbers and 50% of the letters:\n\n```\nimport numpy as np\n\n# setup generator\
    \ for reproducibility\nrandom_generator = np.random.default_rng(2020)\n\npopulation\
    \ = [\n    1, \"A\", 3, 4,\n    5, 2, \"D\", 8,\n    \"C\", 7, 6, \"B\"\n]\n#\
    \ group strata\nstrata = {\n    'number' : [],\n    'string' : [],\n}\n\nfor item\
    \ in population:\n    if isinstance(item, int):\n        strata['number'].append(item)\n\
    \    else:\n        strata['string'].append(item)\n\n# fraction of population\
    \ to sample\nsample_fraction = 0.5\n# random sample from stata\nsampled_strata\
    \ = {}\n\nfor group in strata:\n    sample_size = int(\n        sample_fraction\
    \ * len(strata[group])\n    )\n    sampled_strata[group] = random_generator.choice(\n\
    \        strata[group],\n        size=sample_size,\n        replace=False\n  \
    \  )\n```"

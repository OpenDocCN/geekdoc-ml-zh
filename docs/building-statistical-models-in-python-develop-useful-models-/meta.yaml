    \ = [3,54,78] and B_new = [41,4,43,5,56]\n\n那么，A_new和B_new之间的平均年龄差为15.2，低于A和B之间原始的平均年龄差（50.4）。换句话说，置换后的P_new对p值没有贡献。我们可以观察到，从P的所有可能置换中抽取的置换，只有一个大于或等于原始平均年龄差本身。现在我们将在Python中实现代码：\n\
    \n```\nimport numpy as np\n# create permutation testing function\ndef permutation_testing(A,B,n_iter=1000):\n\

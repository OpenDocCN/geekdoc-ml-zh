    the strong correlation between advertising expense and sales to predict market
    behavior. This is what we can refer to as a **lag effect**.'
  mdcn: '## 自相关


    现在，让我们使用 Ljung-Box 检验来验证我们关于自相关的假设。我们使用 `statsmodels` 中的 `acorr_ljungbox()` 函数执行此检验。我们应用
    `lags=[50]` 参数来检验自相关在滞后 50 期是否为 0：


    ```python

    from statsmodels.stats.diagnostic import acorr_ljungbox

    acorr_ljungbox(random_white_noise, lags=[50], return_df=True)

    ```


    检验返回了一个不显著的 p 值，如图所示。因此，我们可以断言，在 95% 的置信水平下，数据没有自相关，因此是白噪声：


    | | lb_stat | lb_pvalue |

    |---|---|---|

    | 50 | 51.152656 | 0.428186 |


    图 10.3 – 白噪声数据自相关的 Ljung-Box 检验结果


    正如我们到目前为止所提到的，自相关，也称为序列相关，是衡量给定点与时间受限数据序列中先前点之间相关性的度量。它被称为“自”相关，因为它指的是一个变量与其自身在先前滞后值的相关性。在指定范围内所有先前滞后上的自相关——与特定滞后相对——被称为**自相关结构**。这里，对于任何大于零的给定滞后
    $k$，我们有自相关函数（ACF），$r_k$：


    $$r_k = \frac{\sum_{t=k+1}^{n} (y_t - \bar{y})(y_{t-k} - \bar{y})}{\sum_{t=1}^{n}
    (y_t - \bar{y})^2}$$


    我们在*第 6 章，简单线性回归*中讨论了自相关，当时是在识别序列相关性作为线性回归所需抽样独立性假设的违反的背景下进行的。这里，我们注意到自相关是时间序列数据的核心组成部分。我们之前在*第
    6 章*和本章中使用 ACF 图直观地探索了这些数据。我们还讨论了一阶差分。让我们使用 statsmodels 中的*美国宏观经济*数据集（我们在*第 6
    章*中使用过）来深入探讨这两个概念。这里，我们选择 *realinv* 和 *realdpi*，并将两个变量转换为 32 位浮点数：


    ```python

    import numpy as np

    import pandas as pd

    import statsmodels.api as sm

    import matplotlib.pyplot as plt


    df = sm.datasets.macrodata.load().data


    df[''realinv''] = round(df[''realinv''].astype(''float32''), 2)

    df[''realdpi''] = round(df[''realdpi''].astype(''float32''), 2)


    df_mod = df[[''realinv'',''realdpi'']]

    ```


    接下来，让我们使用 50 个滞后（lags=50）和 5% 的显著性水平（alpha=0.05）绘制数据及其 ACF：


    ```python

    from statsmodels.graphics.tsaplots import plot_acf

    from statsmodels.graphics.tsaplots import plot_pacf


    fig, ax = plt.subplots(2,2, figsize=(15,10))

    plot_acf(df_mod[''realinv''], alpha=0.05, lags=50, ax=ax[0,1])

    ax[0,1].set_title(''Original ACF'')

    ax[0,0].set_title(''Original Data'')

    ax[0,0].plot(df_mod[''realinv''])

    plot_acf(np.diff(df_mod[''realinv''], n=1), alpha=0.05, lags=50,

    ax=ax[1,1])

    ax[1,1].set_title(''Once-Differenced ACF'')

    ax[1,0].set_title(''Once-Differenced Data'')

    ax[1,0].plot(np.diff(df_mod[''realinv''], n=1))

    ```


    我们得到如下结果图：


    我们可以观察到*图 10.4*中的第一个图显示了一个正的、确定性的信号，突出了投资的整体上升趋势。我们还可以观察到——尤其是在时间接近滞后 0 时——数据周围存在一些方差。数据的这两个组成部分是我们最初会尝试建模的。在原始数据的
    ACF 中，我们可以看到一个显著的、衰减的自相关结构，这是指数增长的特征。然而，由于主导自相关的强趋势，我们无法观察到方差中相关性的任何信息，例如潜在的季节性。为了去除强信号，我们使用
    numpy.diff() 函数应用一阶差分，以便我们可以观察方差的自相关结构。查看差分数据的 ACF，当应用 95% 置信水平时，我们可以看到方差中存在一些自相关，延伸到滞后
    3。


    此时，值得一提的是**自回归移动平均（ARMA）**建模，我们将在*第 11 章，ARIMA 模型*中使用。正如我们在 ACF 图中看到的，存在一个长范围的自相关。回到我们之前提到的自相关方程，我们可以看到计算没有控制时间序列中的特定滞后，因为在除以方差之前，每个点的误差都被加总在一起。这就是为什么原始
    ACF 显示出衰减效应；可以合理地假设滞后 0 与每个先前的滞后单独地并非平滑地序列相关。由于 ACF 不控制特定滞后之间的自相关，我们可以利用这些相关性信息来构建一个移动平均函数，该函数可以帮助对长时间内数据的噪声分量进行建模。


    然而，如果我们希望能够在 ARMA 模型的框架内构建一个模型分量，以定义点与点之间的关系，我们还需要观察偏自相关函数（PACF），它确实控制了滞后之间的相关性。注意*图
    10.5*中的原始数据及其 PACF。它显示的粒度水平与 ACF 图非常不同；在 PACF 中，我们没有看到与滞后 0 及其超过滞后 4 的持续显著相关性，直到接近滞后
    30，而在 ACF 中，我们确实看到显著相关性直到几乎滞后 20。然而，原始数据不是非常有用，因为它不是平稳的，这就是为什么我们看到滞后 0 和滞后 45
    之间的相关性几乎与滞后 0 和滞后 1 之间的一样多，这表明如果不进行转换（在这种情况下是一阶差分），我们将无法构建一个收敛的模型：


    *图 10.4*中*转换（差分）数据*的 ACF 结果表明，高达 3 阶的移动平均分量（MA(3)）可能是有用的（尽管 MA(1) 可能更好）。*图 10.5*中*转换数据*的
    PACF 结果表明，1 阶的自回归分量（AR(1)）可能是有用的。使用 PACF，我们也可以得出结论 AR(10) 可能有用，但选择如此高的阶数通常会导致过拟合。一个经验法则是，对于过程建模，不要使用阶数大于约
    5 的 AR 或 MA 分量。然而，模型阶数取决于分析师和过程细节。虽然我们将在*第 11 章，ARIMA 模型*中深入讨论这个概念，但如果我们为此数据构建
    ARIMA 模型，我们将有一个阶数为 (2,1,3) 的模型，遵循我们选择的 *AR(p)* 和 *MA(q)* 结构，并带有我们应用的一阶差分的积分差分
    *d*，表示为阶数 (**p,d,q**) 模型。这些阶数用于基于模型构建**特征多项式方程**，然后我们可以使用这些方程的因式分解形式的根来评估**平稳性**和**可逆性**，这有助于识别**模型唯一性**并评估其**收敛**到解的能力。


    ## 互相关


    接下来，对于任何大于零的给定滞后 *k*，我们有**互相关函数（CCF）**，可用于识别两个变量在时间点上的相关性。此分析可用于促进识别领先或滞后指标。两个一维向量
    *i* 和 *j* 在给定滞后 *k* 下的 CCF，$\hat{p}_{i,j}(k)$，如下所示：


    $$\hat{p}_{i,j}(k) = \frac{\sum_{t=1}^{n-k} (x_{t,i} - \bar{x}_i)(x_{t+k,j} -
    \bar{x}_j)}{\sqrt{\sum_{t=1}^{n} (x_{t,i} - \bar{x}_i)^2} \sqrt{\sum_{t=1}^{n}
    (x_{t+k,j} - \bar{x}_j)^2}}$$


    在考虑一个线性回归案例时，我们有两个有序的、基于序列的输入变量来预测一个有序的、基于序列的因变量，我们在相同的时间 *t* 评估输入和输出变量。然而，如果使用互相关来识别领先或滞后指标，我们可以识别领先变量领先的滞后
    *k*，并通过 *k* 个索引修改其序列位置。例如，如果我们的模型的时间单位是周，并且我们构建一个回归模型来预测销售，使用广告作为输入，我们可能会发现在任何给定的一周，广告对销售没有影响。然而，在执行互相关分析后，我们发现广告和销售之间存在一个强烈的滞后
    1，即一周的广告投资直接影响下一周的销售。然后我们利用这些信息将广告支出变量向前移动 1 周，并重新运行回归模型，以利用广告费用和销售之间的强相关性来预测市场行为。这就是我们可以称之为**滞后效应**。'

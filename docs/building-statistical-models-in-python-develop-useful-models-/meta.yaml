    | IQ | Group | Rank | Corrected Rank |

    |---|---|---|---|

    | 111 | H | 10 | 10.5 |

    | 111 | L | 11 | 10.5 |

    | 112 | H | 12 | 12 |

    | 116 | H | 13 | 13 |


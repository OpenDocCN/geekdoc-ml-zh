  md: 'It can be said that statistics is a science for helping make the best decisions
    when there are quantifiable uncertainties. All statistical tests contain a null
    hypothesis and an alternative hypothesis. That is to say, an assumption that there
    is no statistically significant difference between data (the null hypothesis)
    or that there is a statistically significant difference between data (the alternative
    hypothesis). The term statistically significant difference implies the existence
    of a benchmark – or threshold – beyond which a measure takes place and indicates
    significance. This benchmark is called the **critical value**.


    The measure that is applied against this critical value is called the **test statistic**.
    The critical value is a static value quantified based on behavior in the data,
    such as the average and variation, and is based on the hypothesis. If there are
    two possible routes by which a null hypothesis may be rejected – for example,
    we believe some output is either less than or more than the average – there will
    be two critical values (this test is called a **two-tailed** hypothesis test),
    but if there is only one argument against the null hypothesis, there will be only
    one critical value (this is called a **one-tailed** hypothesis test). Regardless
    of the number of critical values, there will always only be one test statistic
    measurement for each group within a given hypothesis test. If the test statistic
    exceeds the critical value, there is a statistically significant reason to support
    rejecting the null hypothesis and concluding there is a statistically significant
    difference in the data.


    It is useful to understand that a hypothesis test can test the following:


    +   - One variable against another (such as in a t-test)

    - Multiple variables against one variable (for example, linear regression)

    - Multiple variables against multiple variables (for example, MANOVA)


    In the following figure, we can see visually the relationship between the test
    statistic and critical values in a two-tailed hypothesis test.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_30_0.png)


    Based on the figure, we now have a visual idea of how a test statistic exceeding
    the critical value suggests rejecting the null hypothesis.'
  merge: -1
  pgno: 30
- img_proc: true
  md: 'One concern with using only the approach of measuring test statistics against
    critical values in the hypothesis, however, is that test statistics can be impractically
    large. This is likely to occur when there may be a wide range of results that
    are not considered to fall within the bounds of a treatment effect. It is uncertain
    whether a result as extreme as or more extreme than the test statistic is possible.
    To prevent misleadingly rejecting the null hypothesis, a **p-value** is used.
    The p-value represents the probability that chance alone resulted in a value as
    extreme as the one observed (the one that suggests rejecting the null hypothesis).
    If a p-value is low, relative to the level of significance, the null hypothesis
    can be rejected. Common levels of significance are 0.01, 0.05, and 0.10. It is
    beneficial to confirm prior to making a decision on a hypothesis to assess both
    the critical value''s relationship to the test statistic and the p-value. More
    will be discussed in *Chapter 3, Hypothesis Testing*, when we begin discussing
    hypothesis testing.


    # Sampling strategies – random, systematic, stratified, and clustering


    In this section, we will discuss the different sampling methods used in research.
    Broadly speaking, in the real world, it is not easy or possible to get the whole
    population data for many reasons. For instance, the costs of gathering data are
    expensive in terms of money and time. Collecting all the data is impractical in
    many cases and ethical issues are also considered. Taking samples from the population
    can help us overcome these problems and is a more efficient way to collect data.
    By collecting an appropriate sample for a study, we can draw statistical conclusions
    or statistical inferences about the population properties. Inferential statistical
    analysis is a fundamental aspect of statistical thinking. Different sampling methods
    from probability strategies to non-probability strategies used in research and
    industry will be discussed in this section.


    There are essentially two types of sampling methods:


    +   - Probability sampling

    - Non-probability sampling


    # Probability sampling


    In *probability sampling*, a sample is chosen from a population based on the theory
    of probability, or it is chosen randomly using random selection. In *random selection*,
    the chance of each member in a population being selected is equal. For example,
    consider a game with 10 similar pieces of paper. We write numbers 1 through 10,
    with a separate piece of paper for each number. The numbers are then shuffled
    in a box. The game requires picking three of these ten pieces of paper randomly.
    Because the pieces of paper have been prepared using the same process, the chance
    of any piece of paper being selected (or the numbers one through ten) is equal
    for each piece. Collectively, the 10 pieces of paper are considered a population
    and the 3 selected pieces of paper constitute a random sample. This example is
    one approach to the probability sampling methods we will discuss in this chapter.'
  merge: -1
  pgno: 31

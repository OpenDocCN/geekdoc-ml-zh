    \    beta0 = y_mean - (beta1 * x_mean)\n    return beta0, beta1\n```\n\n## 相关系数与决定系数\n\
    \n在本节中，我们将讨论两个相关概念——相关系数和决定系数。\n\n## 相关系数\n\n相关系数是衡量两个变量之间统计线性关系的指标，可以使用以下公式计算：\n\
    \n$$r = \\frac{1}{n-1} \\sum_{i=1}^n \\left( \\frac{x_i - \\bar{x}}{s_x} \\right)\
    \ \\left( \\frac{y_i - \\bar{y}}{s_y} \\right)$$\n\n读者可以访问此处 – https://shiny.rit.albany.edu/stat/corrsim/\
    \ – 来模拟两个变量之间的相关关系。\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_169_0.png)\n\n\
    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_169_1.png)\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_169_2.png)\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_169_3.png)\n\n图 6.3 – 模拟的双变量分布\n\n\
    通过观察散点图，我们可以看到两个变量之间线性关系的方向和强度，以及它们的异常值。如果方向为正（r>0），则两个变量同时增加或减少。\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_170_0.png)\n\
    \n图 6.4 – 模拟的双变量分布\n\n如果方向为负，则一个变量增加而另一个变量减少。我们在下面的散点图中说明这一点：\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_171_0.png)\n\
    \n图 6.5 – 模拟的双变量分布\n\n相关系数的值介于 -1 和 1 之间。当 r = 1 时，我们有完全正相关；当 r = -1 时，我们有完全负相关。请注意，如果例如变量\
    \ x 和变量 y 互换，或者任一变量的所有值进行线性缩放，相关系数的值不会改变。一般来说，相关性并不意味着因果关系。\n\n## 决定系数\n\n决定系数就是\
    \ r²，其中 r 是相关系数，它表示变量 y 的变异中可由变量 x 解释的比例。r² 的值介于 0 和 1 之间，当其值接近 1 时，两个变量之间的线性关系变得更强。r²\
    \ 的值也可以使用以下公式计算：\n\n$$r^2 = 1 - \\frac{SS_{Res}}{SS_{Tot}}$$\n\n这里，$SS_{Res}$\
    \ 是平方误差之和，$SS_{Tot}$ 是实际值与平均值之差的平方的总和。在 `statsmodels` 中，从 OLS 回归结果的输出中，可以获得决定系数的值。本章后续部分将讨论此输出。\n\
    \n## 所需的模型假设\n\n与我们在 *第 4 章，参数检验* 中讨论的参数检验类似，线性回归是一种参数方法，需要满足某些假设才能使结果有效。对于线性回归，有四个假设：\n\
    \n- 变量之间存在线性关系\n- 残差的正态性\n- 残差的同方差性\n- 独立样本\n\n让我们逐一讨论这些假设。\n\n## 变量之间的线性关系\n\n\
    在考虑将线性模型拟合到数据时，我们的首要考虑应该是该模型是否适合数据。在处理两个变量时，变量之间的关系应通过散点图进行评估。让我们看一个例子。*图 6.6*\
    \ 中显示了三个散点图。数据被绘制出来，并在数据点上绘制了用于生成数据的实际函数。最左边的图显示数据呈现线性关系。中间的图显示数据呈现二次关系。最右边的图显示两个不相关的变量。\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_172_0.png)\n\n图 6.6 – 描绘两个变量之间三种不同关系的三个散点图\n\
    \n在 *图 6.6* 的示例数据中，线性模型仅适用于最左边的数据。在这个例子中，我们受益于知道两个变量的实际关系，但在实际问题中，你必须确定线性模型是否合适。一旦我们评估了线性模型是否合适并拟合了线性模型，我们就可以评估依赖于模型残差的两个假设。\n\
    \n## 残差的正态性\n\n在前两章中，我们详细讨论了正态性，并查看了几个正态分布数据的例子和几个非正态分布数据的例子。在这种情况下，我们进行相同的评估，但它是针对模型残差而不是变量本身。事实上，与之前的参数方法不同，*变量本身不需要正态分布，只有残差需要*。让我们看一个例子。我们将在两个变量上拟合一个线性模型，每个变量都呈现偏态分布。如\
    \ *图 6.7* 所示，尽管每个变量都有偏态分布，但变量之间是线性相关的。\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_173_0.png)\n\
    \n现在，让我们看看模型拟合的残差。模型拟合的残差如 *图 6.8* 所示。正如我们所料，该模型拟合的残差似乎呈正态分布。该模型似乎满足残差正态分布的假设。\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_173_1.png)\n\n在验证了残差正态分布的假设后，让我们继续讨论残差同方差性的假设。\n\
    \n## 残差的同方差性\n\n残差不仅应该正态分布，而且在整个线性模型中应具有恒定的方差。**同方差性**指的是残差具有相等的离散度。相反，不表现出相等离散度的残差被称为**异方差**。同方差性通常通过将残差与模型预测值绘制散点图来评估。残差应看起来随机分布，均值为\
    \ 0，并且沿 *x* 轴均匀分散。*图 6.9* 显示了模型残差与 *Y* 的预测值的散点图。这些残差似乎表现出同方差性。\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_174_0.png)\n\
    \n图 6.9 – 模型残差与预测值的散点图\n\n有几种常见的违反残差同方差性的方式：\n\n- 残差显示方差的系统性变化\n- 存在极端异常值\n\n\
    *图 6.10* 显示了这些违反情况的两个例子。左图显示了一个极端异常值，右图显示了残差中的非常数方差。在这两种情况下，模型假设都被违反了。"

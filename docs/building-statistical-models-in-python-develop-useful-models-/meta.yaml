    # Normal approximation


    Once the $T$ statistic is calculated for the Rank-Sum test, we can determine a
    p-value with an exact method or with a normal approximation. We will cover the
    approximation method here as the exact method requires a permutation test, which
    will require the use of software. We approximate the p-value with a z-score (recall
    the z-score from *Chapter 3, Hypothesis Testing*):


    $$Z = \frac{T - \text{Mean}(T)}{\text{STDEV}(T)}$$


    where


    $$\text{Mean}(T) = n_T \bar{R}$$


    and


    $$\text{STDEV}(T) = s_R \sqrt{\frac{n_T n_O}{n_T + n_O}}$$


    In the equations here, $n_T$ is the number of samples in the group used to calculate
    $T$, $n_O$ is the number of samples in the other group, $\bar{R}$ is the mean
    of the corrected ranks, and $s_R$ is the standard deviation of the corrected ranks.
    Once $Z$ is calculated, the corresponding p-value can be looked up for the z-distribution.

    # # 4 Parametric Tests


    In the previous chapter, we introduced the concept of a hypothesis test and showed
    several applications of the z-test. The z-test is a type of hypothesis test in
    a family of hypothesis tests called parametric tests. Parametric tests are powerful
    hypothesis tests, but the application of parametric tests requires certain assumptions
    to be met by the data. While the z-test is a useful test, it is limited by the
    required assumptions. In this chapter, we will discuss several more parametric
    tests, which will expand our parametric tool set. More specifically, we will discuss
    the various applications of the t-test, how to perform tests when more than two
    subgroups of data are present, and the hypothesis test for Pearson''s correlation
    coefficient. We will complete the chapter with a discussion on power analysis
    for parametric tests.


    In this chapter, we''re going to cover the following main topics:


    +   - Assumptions of **parametric tests**

    - **T-test**—a parametric hypothesis test

    - Tests with more than two groups and **analysis of variance (ANOVA)**

    - **Pearson''s correlation coefficient**

    - **Power analysis** examples


    # ## Assumptions of parametric tests


    Parametric tests make assumptions about population data that require the statistics
    practitioner to perform analysis of data prior to modeling, especially when using
    sample data because the sample statistics are leveraged as estimates for the population
    parameters when the true population parameters are unknown. These are the three
    primary assumptions of parametric hypothesis tests:


    +   - Normally distributed population data

    - Samples are independent

    - Equal population variances (when comparing two or more groups)'
  - '[PAGE 108]


    In this chapter, we discuss the z-test, t-test, ANOVA, and Pearson’s correlation.
    These tests are used on continuous data. In addition to these assumptions, Pearson’s
    correlation requires data to contain paired samples. In other words, there must
    be an equal number of samples in each group being compared as Pearson’s correlation
    is based on pairwise comparisons.


    While these assumptions are ideal, there are many occasions where these cannot
    be ensured. Consequently, it is useful to understand there is some robustness
    to these assumptions, depending on the test.


    # Normally distributed population data


    Because in parametric hypothesis tests we are interested in gaining inferences
    about population parameters, such as the mean or standard deviation, we must assume
    the parameter of choice is representative of the distribution and that it is safe
    to assume a central tendency in the data. We must also assume the statistic (parametric
    value taken from a sample or sampling distribution) is representative of its respective
    population parameter. Therefore, since we assume in parametric hypothesis tests
    that the population is normally distributed, the sample should also be normally
    distributed as well. Otherwise, it is not safe to assume the sample is representative
    of the population.


    Parametric hypothesis tests rely heavily on the mean and assume it is strongly
    representative of the data’s central point (all population data is centrally distributed
    around the mean). Consider where the means of two distributions are being compared
    to test if there is a statistically significant difference between them. If the
    distributions are skewed, the mean will not be the center point of the data and,
    consequently, cannot represent the distributions very well. Since this would be
    the case, inference obtained from a test comparing the means would not be reliable.


    # Robustness to normally distributed data


    Many hypothesis tests specify degrees of freedom when using samples to make estimates
    about populations. Degrees of freedom force models to assume there is extra variance
    in the distributions used than actually present. While the statistical parameters
    in the analysis remain the same, the assumed extra variance forces measures of
    central tendency closer. Stated differently, using degrees of freedom forces measures
    of central tendency to be more centrally representative of the distributions from
    which they are calculated. The reason for this is that it is assumed samples—while
    representative of their overall populations—represent their populations with a
    margin of error. Consequently, parametric hypothesis tests using degrees of freedom
    have some robustness to violations of the requirement for normally distributed
    data.


    In the plots shown in Figure 4.1, we have a slightly skewed distribution. One
    applies degrees of freedom while the other does not. We can see the mean and median
    have the same distance between them whether degrees of freedom are used or not.
    However, the distribution using degrees of freedom takes on more errors (more
    variance):'
- md: "## Testing for normally distributed data\n\nThere are multiple methods for\
    \ determining whether a distribution is normally distributed and thus can be used\
    \ in parametric hypothesis testing. Generally, the level of adherence to normality\
    \ is up to the discretion of the researcher. The methods in this section leave\
    \ some margin for debate on normality based on visual inspection as well as levels\
    \ of statistical significance applied.\n\n## Visual inspection\n\nThe best tests\
    \ to identify whether a distribution is normally distributed or not are based\
    \ on visual inspection. We can use **Quantile-Quantile (QQ)** plots and histograms—among\
    \ other tests—to visually inspect the distributions.\n\nIn the following code\
    \ snippet, we generate plots of the original data as well as the QQ plots using\
    \ the `scipy.stats` module's `probplot` function:\n\n```python\nimport matplotlib.pyplot\
    \ as plt\nimport scipy.stats as stats\nimport numpy as np\n\nmu, sigma = 0, 1.1\n\
    normally_distributed = np.random.normal(mu, sigma, 1000)\n```\n\nIn *Figure 4.2*,\
    \ we can see in the first column a histogram of exponentially distributed data\
    \ and, beneath it, its QQ plot. As the points are very far from approximating\
    \ adherence to the 45-degree red line, which represents a pure normal distribution,\
    \ we can conclude the data is not normally distributed. By visually inspecting\
    \ the data in the second column, we can see the histogram exhibits an approximately\
    \ normally distributed dataset. This is backed up by the QQ plot below it, where\
    \ the points mostly approximate the 45-degree red line. With respect to the tails\
    \ of the QQ plot, these data points represent the density of skewness. We expect\
    \ with a normally distributed dataset that the bulk of data points will tend toward\
    \ the center of the red line. With the exponential distribution, we can see a\
    \ heavy density toward the left, lower tail of the red line, and a sparse scattering\
    \ of points toward the upper-right side of the line. The QQ plot can be read left\
    \ to right, mirroring the spread seen in the histogram, where the smallest values\
    \ appear on the left-hand side of the *x* axis and the largest on the right-hand\
    \ side.\n\nVisual inspection of the QQ plots and histograms should be enough to\
    \ help a researcher conclude whether the normality assumption has been violated\
    \ or not. However, in cases where one might not want to perform visual inspection—such\
    \ as when constructing a data science pipeline—there are alternative approaches\
    \ that provide specific measurements of normality. Three of the most commonly\
    \ used tests are the **Kolmogorov-Smirnov**, **Anderson-Darling**, and **Shapiro-Wilk**\
    \ tests.\n\nThe Kolmogorov-Smirnov test focuses more on the centrality of the\
    \ data. Consequently, however, the test has less power if there is a wide variance\
    \ around the center of the data. Anderson-Darling focuses more on the tails of\
    \ the data than the center and is more likely to identify non-conformity to normality\
    \ if data is heavy-tailed with extreme outliers. These two tests perform well\
    \ on large sample sizes but do not have as much power when sample sizes are lower.\
    \ The third test we consider, Shapiro-Wilk, is more general than the Kolmogorov-Smirnov\
    \ and Anderson-Darling tests and therefore more robust to small sample sizes.\
    \ Based on these traits, it may be more useful to use Shapiro-Wilk tests in an\
    \ automated pipeline. Alternatively, it may be better to lower the level of confidence\
    \ for the test being applied.\n\n## Kolmogorov-Smirnov\n\nThe **Kolmogorov-Smirnov**\
    \ test can be used to test the null hypothesis that a given sample distribution\
    \ is normally distributed. This version of the Kolmogorov-Smirnov test is the\
    \ one-sample goodness-of-fit test, which performs analysis against a benchmark\
    \ cumulative density distribution. When running the `kstest` function in the `scipy.stats`\
    \ module, using `stats.norm.cdf` (scipy's cumulative density function) performs\
    \ this one-sample version of the test. The two-sample version tests against a\
    \ specified distribution to determine whether the two distributions match. In\
    \ the two-sample case, the distribution to be tested must be provided as a `numpy`\
    \ array instead of the `stats.norm.cdf` function used in the code snippet shown\
    \ below *Figure 4.3*. However, this is outside of the scope of testing for normality,\
    \ so we will not look at this.\n\nKolmogorov-Smirnov measures a calculated test\
    \ statistic against a table-based critical value (`kstest` calculates this internally).\
    \ As with other hypothesis tests, if the test statistic is larger than the critical\
    \ value, the null hypothesis that the given distribution is normally distributed\
    \ can be rejected. This can also be assessed if the p-value is low enough to be\
    \ significant. The test statistic is calculated as the absolute value of the maximum\
    \ distance between all data points in the given distribution against the cumulative\
    \ density function.\n\n> **Kolmogorov-Smirnov special requirement**\n> The Kolmogorov-Smirnov\
    \ test requires data to be centered around zero and scaled to a standard deviation\
    \ of one. All data must be transformed for the test, but inference can be applied\
    \ to the pre-transformed distribution; the centered and scaled distribution does\
    \ not need to be the distribution used in further statistical testing or analysis.\n\
    \nIn the following code snippet, we test to confirm whether a normally distributed\
    \ dataset, `normally_distributed`, is normally distributed. The dataset has a\
    \ mean of 0 and a standard deviation of 1. The output confirms the data is normally\
    \ distributed. The plots in *Figure 4.3* show the normally distributed distribution\
    \ centered around a mean of 0 with a standard deviation of 1, and on the right\
    \ of it is the exponentially transformed version of the same distribution:\n\n\
    ```python\nfrom scipy import stats\nimport numpy as np\n\nmu, sigma = 0, 1\nnormally_distributed\
    \ = np.random.normal(mu, sigma, 1000)\n```\n\nHere, we run the Kolmogorov-Smirnov\
    \ test:\n\n```python\nstats.kstest(normally_distributed,\n             stats.norm.cdf)\n\
    ```\n\nThe `statsmodels` Kolmogorov-Smirnov test yielded the following results\
    \ for our data:\n\n```\nKstestResult(statistic=0.0191570377833315, pvalue=0.849436919292824)\n\
    ```\n\nIf we use the same data, but transform it exponentially to be right-skewed,\
    \ the same test indicates the data is no longer normally distributed:\n\n```python\n\
    stats.kstest(np.exp(normally_distributed), stats.norm.cdf)\n```\n\nThe significant\
    \ p-value confirms non-normality:\n\n```\nKstestResult(statistic=0.5375205782404135,\
    \ pvalue=9.59979841227121e-271)\n```\n\nNext, let us take a distribution of 1,000\
    \ samples with a mean of 100 and a standard deviation of 2. We need to center\
    \ it to a mean of 0 with unit variance (standard deviation of 1). In the following\
    \ code snippet, we generate the data, then perform the scaling and save it to\
    \ the `normally_distributed_scaled` variable:\n\n```python\nmu, sigma = 100, 2\n\
    normally_distributed = np.random.normal(mu, sigma, 1000)\nnormally_distributed_scaled\
    \ = (\n    normally_distributed - normally_distributed.mean()) /\n    normally_distributed.std()\n\
    )\n```\n\nNow that the data is centered and scaled as required, we check it using\
    \ the Kolmogorov-Smirnov test. As expected, the data is confirmed normally distributed:\n\
    \n```python\nstats.kstest(normally_distributed_scaled, stats.norm.cdf)\n```\n\n\
    This is the output:\n\n```\nKstestResult(statistic=0.02597307287070466, pvalue=0.5016041053535877)\n\
    ```\n\n## Anderson-Darling\n\nSimilar to the Kolmogorov-Smirnov test, the **Anderson-Darling**\
    \ test measures a given distribution against a normally distributed distribution.\
    \ In scipy's anderson test, we can test against other distributions, but the default\
    \ argument specifying a normal distribution, `dist=\"norm\"`, assumes a null hypothesis\
    \ that the given distribution is statistically the same as a normally distributed\
    \ distribution. For each distribution tested against, a different set of critical\
    \ values must be calculated."
  mdcn: "## 正态分布数据的检验\n\n判断一个分布是否为正态分布，从而可用于参数假设检验的方法有多种。通常，对正态性的遵循程度取决于研究者的判断。本节介绍的方法在基于视觉检查和统计显著性水平方面，为正态性判断留下了一定的讨论空间。\n\
    \n## 视觉检查\n\n识别分布是否为正态分布的最佳方法是基于视觉检查。我们可以使用**分位数-分位数（QQ）图**和直方图——以及其他测试——来直观地检查分布情况。\n\
    \n在以下代码片段中，我们使用`scipy.stats`模块的`probplot`函数生成原始数据的图表以及QQ图：\n\n```python\nimport\
    \ matplotlib.pyplot as plt\nimport scipy.stats as stats\nimport numpy as np\n\n\
    mu, sigma = 0, 1.1\nnormally_distributed = np.random.normal(mu, sigma, 1000)\n\
    ```\n\n在*图4.2*中，我们可以在第一列看到指数分布数据的直方图及其下方的QQ图。由于这些点距离近似遵循代表纯正态分布的45度红线非常远，我们可以得出结论：该数据不是正态分布的。通过视觉检查第二列的数据，我们可以看到直方图呈现出一个近似正态分布的数据集。其下方的QQ图也证实了这一点，其中的点大部分近似于45度红线。关于QQ图的尾部，这些数据点代表了偏度的密度。对于正态分布的数据集，我们期望大部分数据点会趋向于红线的中心。对于指数分布，我们可以看到在红线的左下方尾部有很高的密度，而在线的右上方则有稀疏的点分布。QQ图可以从左向右阅读，反映了直方图中看到的分布情况，其中最小值出现在*x*轴的左侧，最大值出现在右侧。\n\
    \n对QQ图和直方图的视觉检查应该足以帮助研究者判断正态性假设是否被违反。然而，在某些情况下，例如构建数据科学流水线时，可能不希望进行视觉检查，此时有其他方法可以提供正态性的具体度量。最常用的三种测试是**Kolmogorov-Smirnov**、**Anderson-Darling**和**Shapiro-Wilk**检验。\n\
    \nKolmogorov-Smirnov检验更侧重于数据的中心性。然而，如果数据在中心附近有较大的方差，该检验的功效就会降低。Anderson-Darling比中心更关注数据的尾部，如果数据具有重尾和极端异常值，它更有可能识别出不符合正态性的情况。这两种检验在大样本量时表现良好，但在样本量较小时功效不足。我们考虑的第三种检验，Shapiro-Wilk，比Kolmogorov-Smirnov和Anderson-Darling检验更通用，因此对小样本量更稳健。基于这些特点，在自动化流水线中使用Shapiro-Wilk检验可能更有用。或者，降低所应用检验的置信水平可能更好。\n\
    \n## Kolmogorov-Smirnov\n\n**Kolmogorov-Smirnov**检验可用于检验给定样本分布为正态分布的原假设。这个版本的Kolmogorov-Smirnov检验是单样本拟合优度检验，它针对基准累积密度分布进行分析。在运行`scipy.stats`模块中的`kstest`函数时，使用`stats.norm.cdf`（scipy的累积密度函数）执行此单样本版本的检验。双样本版本则针对指定分布进行检验，以确定两个分布是否匹配。在双样本情况下，待检验的分布必须作为`numpy`数组提供，而不是下面*图4.3*所示代码片段中使用的`stats.norm.cdf`函数。然而，这超出了正态性检验的范围，因此我们不在此讨论。\n\
    \nKolmogorov-Smirnov将计算出的检验统计量与基于表格的临界值进行比较（`kstest`内部计算此值）。与其他假设检验一样，如果检验统计量大于临界值，则可以拒绝给定分布为正态分布的原假设。如果p值足够低以达到显著性，也可以据此进行评估。检验统计量计算为给定分布中所有数据点与累积密度函数之间最大距离的绝对值。\n\
    \n> **Kolmogorov-Smirnov特殊要求**\n> Kolmogorov-Smirnov检验要求数据以零为中心，并缩放为标准差为一。所有数据都必须经过转换才能进行检验，但推断可以应用于转换前的分布；中心化和缩放后的分布不需要用于进一步的统计检验或分析。\n\
    \n在以下代码片段中，我们测试以确认一个正态分布的数据集`normally_distributed`是否为正态分布。该数据集的均值为0，标准差为1。输出确认数据是正态分布的。*图4.3*中的图表显示了以均值为0、标准差为1为中心的正态分布，其右侧是同一分布的指数变换版本：\n\
    \n```python\nfrom scipy import stats\nimport numpy as np\n\nmu, sigma = 0, 1\n\
    normally_distributed = np.random.normal(mu, sigma, 1000)\n```\n\n这里，我们运行Kolmogorov-Smirnov检验：\n\
    \n```python\nstats.kstest(normally_distributed,\n             stats.norm.cdf)\n\
    ```\n\n`statsmodels`的Kolmogorov-Smirnov检验对我们的数据产生了以下结果：\n\n```\nKstestResult(statistic=0.0191570377833315,\
    \ pvalue=0.849436919292824)\n```\n\n如果我们使用相同的数据，但对其进行指数变换使其右偏，相同的检验表明数据不再呈正态分布：\n\
    \n```python\nstats.kstest(np.exp(normally_distributed), stats.norm.cdf)\n```\n\
    \n显著的p值证实了非正态性：\n\n```\nKstestResult(statistic=0.5375205782404135, pvalue=9.59979841227121e-271)\n\
    ```\n\n接下来，让我们取一个均值为100、标准差为2的1000个样本的分布。我们需要将其中心化到均值为0、单位方差（标准差为1）。在以下代码片段中，我们生成数据，然后执行缩放并将其保存到`normally_distributed_scaled`变量：\n\
    \n```python\nmu, sigma = 100, 2\nnormally_distributed = np.random.normal(mu, sigma,\
    \ 1000)\nnormally_distributed_scaled = (\n    normally_distributed - normally_distributed.mean())\
    \ /\n    normally_distributed.std()\n)\n```\n\n现在数据已按要求中心化和缩放，我们使用Kolmogorov-Smirnov检验进行检查。正如预期，数据被确认为正态分布：\n\
    \n```python\nstats.kstest(normally_distributed_scaled, stats.norm.cdf)\n```\n\n\
    输出如下：\n\n```\nKstestResult(statistic=0.02597307287070466, pvalue=0.5016041053535877)\n\
    ```\n\n## Anderson-Darling\n\n与Kolmogorov-Smirnov检验类似，**Anderson-Darling**检验将给定分布与正态分布进行比较。在scipy的anderson检验中，我们可以针对其他分布进行检验，但默认参数指定正态分布`dist=\"\
    norm\"`，假设原假设是给定分布与正态分布在统计上相同。对于每个被检验的分布，必须计算一组不同的临界值。"

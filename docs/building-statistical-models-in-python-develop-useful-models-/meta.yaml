    Figure 11.21 – US GDP ARIMA forecast over test split


    The forecast of the US GDP in *Figure 11.21* appears to follow the trend of the
    data but does not capture the small variations in the series. However, the variation
    is captured in the prediction interval (labeled as “interval”). This model appears
    to provide a reasonably good prediction of the test data. Note that the interval
    increases over time. This is because predictions become more uncertain farther
    in the future. Generally, shorter forecasts are more likely to be accurate.


    In this section, we built on the ARMA model and extended it to non-stationary
    data using differencing, which formed the ARIMA model. In the next section, we
    will look at non-stationary time series that include seasonal effects and make
    a further extension to the ARIMA model.'

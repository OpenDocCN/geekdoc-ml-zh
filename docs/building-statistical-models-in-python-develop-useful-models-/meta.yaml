  md: '# Contributors


    # About the authors


    **Huy Hoang Nguyen** is a mathematician and data scientist with extensive experience
    in advanced mathematics, strategic leadership, and applied machine learning research.
    He holds a PhD in Mathematics, as well as two Master''s degrees in Applied Mathematics
    and Data Science. His previous work focused on Partial Differential Equations,
    Functional Analysis, and their applications in Fluid Mechanics. After transitioning

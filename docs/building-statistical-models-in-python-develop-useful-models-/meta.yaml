  md: '![](img/3de2e60811d1b90c67f6bb2d5cae034f_94_0.png)


    Figure 3.8 – Critical regions in hypothesis testing


    To compute the critical value in Python, we use the following syntax:


    ```

    scipy.stats.norm.ppf(alpha)

    ```


    Here, alpha is the level of significance to be used. The following is the implementation
    of the code in Python for left-tailed, right-tailed, and two-tailed tests:


    ```

    import scipy.stats

    alpha = 0.05 # level of significance


    #find Z critical value for left-tailed test

    print(f" The critical value is {scipy.stats.norm.ppf(alpha)}")


    #find Z critical value for left-tailed test

    print(f" The critical value is {scipy.stats.norm.ppf(1-alpha)}")


    ##find Z critical value for two-tailed test

    print(f" The critical values are {-scipy.stats.norm.ppf(1-alpha/2)} and {scipy.stats.norm.ppf(1-alpha/2)}")

    ```


    Here''s the output of the preceding code:


    ```

    The critical value is -1.6448536269514729

    The critical value is 1.6448536269514722

    The critical values are -1.959963984540054 and 1.959963984540054

    ```


    At the level of significance α = 0.05 for the left-tailed test, the critical value
    is about -1.64485. Since this is a left-tailed test, if the test statistic is
    less than or equal to this critical value, we reject the null hypothesis. Similarly,
    for the right-tailed test, if the test statistic is greater than or equal to 1.64485,
    we reject the null hypothesis. For the two-tailed test, we reject the null hypothesis
    if the test statistic is greater than or equal to 1.95996 or less than or equal
    to -1.95996.


    After determining whether to reject the null hypothesis, we interpret the statistical
    conclusion.'

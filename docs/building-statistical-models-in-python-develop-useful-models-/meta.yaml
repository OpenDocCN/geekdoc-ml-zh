- md: '## 11 ARIMA Models


    In this chapter, we will discuss univariate time series models. These are models
    that only consider a single variable and create forecasts based only on the previous
    samples in the time series. We will start by looking at models for stationary
    time series data and then progress to models for non-stationary time series data.
    We will also discuss how to identify appropriate models based on the characteristics
    of time series. This will provide a powerful set of models for forecasting time
    series.


    In this chapter, we''re going to cover the following main topics:


    - Models for stationary time series

    - Models for non-stationary time series

    - More on model evaluation


    ## Technical requirements


    In this chapter, we use two additional Python libraries for time series analysis:
    `sktime` and `pmdarima`. Please install the following versions of these libraries
    to run the provided code. Instructions for installing libraries can be found in
    *Chapter 1, Sampling and Generalization*.


    - `sktime==0.15.0`

    - `pmdarima==2.02`


    More information about `sktime` can be found at this link: `https://www.sktime.org/en/stable/get_started.html`


    More information about `pmdarima` can be found at this link: `http://alkaline-ml.com/pmdarima/`


    ## Models for stationary time series


    In this section, we will discuss **Autoregressive (AR)**, **Moving Average (MA)**,
    and **Autoregressive Moving Average (ARMA)** models that are useful for stationary
    data. These models are useful when modeling patterns and variance around process
    means that output over time. *When we have data that does not exhibit autocorrelation,
    we can use statistical and machine learning models that do not make assumptions
    about time, such as Logistic Regression or Naïve Bayes, so long as the data supports
    such use cases.*


    ### Autoregressive (AR) models


    #### The AR(p) model


    In *Chapter 10, Introduction to Time Series* we considered how the **Partial Auto-Correlation
    Function (PACF)** correlates one data point to another lag, controlling for those
    lags between. We also discussed how inspection of the PACF plot is a frequently
    used method for assessing the ordering of an autoregressive model. Thereto, the
    autoregressive model is one that considers specific points in the past to be directly
    correlated to the value of a given point at lag zero. Suppose we have a process
    $y_t$ with random, normally distributed white noise, $\epsilon_t$, where $t =
    \pm 1, \pm 2, \dots$ If – using real constants of $\phi_1, \phi_2, \dots, \phi_p$
    where $\phi_p \neq 0$ – we can formulate the process in the following way:


    $$y_t - \mu - \phi_1(y_{t-1} - \mu) - \phi_2(y_{t-2} - \mu) - \dots - \phi_p(y_{t-p}
    - \mu) = \epsilon_t$$


    Letting $\mu$ represent the overall process sample mean (in our examples, we will
    consider **zero-mean** processes), we can consider this to be an autoregressive
    process of order $p$, or AR(p) [1]. We can define the autocorrelation for the
    AR(p) model as follows:


    $$\rho_k = \phi_1^{|k|}$$


    There is also this example:


    $$\rho_k = \phi_1 \rho_{k-1} + \dots + \phi_p \rho_{k-p}$$


    In the preceding example, where $\rho_k$ is the lag $k$ autocorrelation. $\phi_1$
    is both the slope and autocorrelation for an AR(1) process.


    > **AR(p) model structure and components**


    To prevent confusion, note that with the equation $y_t - \mu - \phi_1(y_{t-1}
    - \mu) - \phi_2(y_{t-2} - \mu) - \dots - \phi_p(y_{t-p} - \mu) = \epsilon_t$ we
    are attempting to build a mathematical model that represents the process such
    that if perfectly modeled, all that remains is the random, normally distributed
    white noise, $\epsilon_t$. This effectively means the model leaves zero residual
    error (in other words, a perfect fit). Each $y_{t-k}$ term – where $k$ is a lag
    in time – represents the value at that point in time and each corresponding value
    of $\phi$ is the coefficient value required for the $y_{t-k}$ such that when taken
    in combination with all other values of $y$, the model statistically approximates
    zero error.


    #### The AR(1) model


    The **backshift operator notation**, or simply **operator notation**, is a simplified,
    shorthand method of formulating models. It is called “backshift” because it shifts
    time back one lag from $t$ to $t-1$. The purpose is to avoid the necessitation
    of writing the subscript $(y_{t-i})$ following every $\phi$ coefficient and instead
    writing $B^{k-1}$ while including only $y_t$ once, which is handy when writing
    AR(p) models with high orders of $p$. In the following equation, the zero-mean
    form of an AR(1) follows the following structure:


    $$y_t - \mu - \phi_1(y_{t-1} - \mu) = \epsilon_t$$


    The equation reduces to the following example:


    $$y_t - \phi_1(y_{t-1}) = \epsilon_t$$


    In backshift operator notation, we can say this:


    $$(1 - \phi_1 B)y_t = \epsilon_t$$


    > **Note on $|\phi_1|$ in an AR(1)**


    It''s worth noting at this point that an AR(1) process is stationary if $|\phi_1|
    < 1$. That is, when the absolute value of the lag-one autocorrelation is < 1,
    the AR(1) process is stationary. When $|\phi_1| = 1$, an ARIMA model may still
    be useful, but when $|\phi_1| > 1$, the process is considered to be explosive
    and should not be modeled. This is because a value $|\phi_1| < 1$ means the root
    is outside of, and not bounded by, the unit circle. A value of $|\phi_1| = 1$
    is on the unit circle but can be differenced to remove the unit root. The root
    for the case of an AR(1) can be calculated as $z = 1/\phi_1$. A set of data producing
    $|\phi_1| > 1$ cannot be filtered in a way that puts its root outside the unit
    circle.


    When all roots of an AR(p) are outside the unit circle, the given realization
    (one time series sampled from a stochastic process) will converge to the mean,
    have constant variance, and be independent of time. This is an ideal scenario
    for time series data.


    Let''s walk through an example of an AR(1) process with $|\phi_1| < 1$ and therefore
    a stationary root. Assume we have identified the following first-order autoregressive
    process:


    $$y_t - 0.5y_{t-1} = \epsilon_t$$


    This is converted to operator notation:


    $$(1 - 0.5B)y_t = \epsilon_t$$


    When looking for roots, we can use the following notation:


    $$(1 - 0.5z) = 0$$


    This gives us a root of $z$:


    $$z = \frac{1}{\phi_1} = \frac{1}{0.5} = 2$$


    Therefore, since the root is greater than 1 and thus outside the unit circle,
    the AR(1) representation of the process is stationary. In Python, we can build
    this process using the upcoming code. First, we build the AR(1) parameters, which
    we want to have a 0.5. Because we substitute 0.5 into the model $X_t - \phi_1(y_{t-1})
    = \epsilon_t$, we insert 0.5 and not -0.5 for arparams. Also, note based on $\rho_k
    = \phi^{|k|}$ that 0.5 is the lag-1 autocorrelation. The process we build will
    have an arbitrary sample size of nsample=200. We build the $(1 - 0.5B)$ component
    of $(1 - 0.5B)y_t = \epsilon_t$ using the np.r_[1, -arparams] step:


    ```python

    from statsmodels.graphics.tsaplots import plot_acf, plot_pacf

    import matplotlib.pyplot as plt

    import statsmodels.api as sm

    import numpy as np

    arparams = np.array([0.5])

    ar = np.r_[1, -arparams]

    ar_process = sm.tsa.ArmaProcess(ar)

    y = ar_process.generate_sample(nsample=200)

    ```


    Now that we have the code to create the AR(1) we looked at the equation for, let''s
    see the roots and compare it to our manually calculated z:


    ```python

    ar_process.arroots

    ```


    array([2.])


    We can see the Python output, 2. is the same as the calculation we performed.
    We know that since the absolute value of the root is greater than 1, the AR(1)
    process is stationary, but let''s confirm with Python:


    ```python

    ar_process.isstationary

    ```


    True


    We can observe by looking at the PACF that this is an autoregressive of order
    $p = 5$. We can also observe by looking at the ACF that the value of $\phi_1$
    is approximately 0.5. For an autoregressive model, the PACF is used to identify
    the number of significant lags to include as the order of the AR, and the ACF
    is used to determine the values of the coefficients, $\phi_k$, included in that
    order. It is simple to observe the values for an AR(1) using the ACF, but less
    obvious when p > 1 since ACF does not control for individual lags when compared
    to the most recent point (lag zero) as the PACF does. Let''s generate the plots
    with Python:


    ```python

    fig, ax = plt.subplots(1,3, figsize=(20,5))

    ax[0].set_title(''Realization'')

    ax[0].plot(y)

    plot_acf(y, alpha=0.05, lags=50, ax=ax[1])

    ax[1].set_title(''ACF'')

    plot_pacf(y, alpha=0.05, lags=50, ax=ax[2])

    ax[2].set_title(''PACF'')

    ```'
  mdcn: '## 11 ARIMA 模型


    在本章中，我们将讨论单变量时间序列模型。这类模型仅考虑单个变量，并仅基于时间序列中的先前样本进行预测。我们将首先探讨平稳时间序列数据的模型，然后过渡到非平稳时间序列数据的模型。我们还将讨论如何根据时间序列的特征来识别合适的模型。这将为时间序列预测提供一套强大的模型。


    在本章中，我们将涵盖以下主要主题：


    - 平稳时间序列的模型

    - 非平稳时间序列的模型

    - 关于模型评估的更多内容


    ## 技术要求


    在本章中，我们使用两个额外的 Python 库进行时间序列分析：`sktime` 和 `pmdarima`。请安装以下版本的这些库以运行提供的代码。安装库的说明可以在*第
    1 章，采样与泛化*中找到。


    - `sktime==0.15.0`

    - `pmdarima==2.02`


    有关 `sktime` 的更多信息，请访问此链接：`https://www.sktime.org/en/stable/get_started.html`


    有关 `pmdarima` 的更多信息，请访问此链接：`http://alkaline-ml.com/pmdarima/`


    ## 平稳时间序列的模型


    在本节中，我们将讨论对平稳数据有用的**自回归 (AR)**、**移动平均 (MA)** 和**自回归移动平均 (ARMA)** 模型。这些模型在对随时间输出的过程均值周围的模式和方差进行建模时非常有用。*当我们拥有不表现出自相关性的数据时，我们可以使用不依赖时间假设的统计和机器学习模型，例如逻辑回归或朴素贝叶斯，只要数据支持此类用例。*


    ### 自回归 (AR) 模型


    #### AR(p) 模型


    在*第 10 章，时间序列简介*中，我们探讨了**偏自相关函数 (PACF)** 如何在控制中间滞后的情况下，将一个数据点与另一个滞后点关联起来。我们还讨论了检查
    PACF 图是评估自回归模型阶数的常用方法。因此，自回归模型认为过去的特定点与滞后零处给定点的值直接相关。假设我们有一个过程 $y_t$，其具有随机的、正态分布的白噪声
    $\epsilon_t$，其中 $t = \pm 1, \pm 2, \dots$ 如果——使用实数常量 $\phi_1, \phi_2, \dots, \phi_p$，其中
    $\phi_p \neq 0$——我们可以将该过程表述如下：


    $$y_t - \mu - \phi_1(y_{t-1} - \mu) - \phi_2(y_{t-2} - \mu) - \dots - \phi_p(y_{t-p}
    - \mu) = \epsilon_t$$


    令 $\mu$ 表示整个过程的样本均值（在我们的示例中，我们将考虑**零均值**过程），我们可以将其视为一个 $p$ 阶自回归过程，即 AR(p) [1]。我们可以将
    AR(p) 模型的自相关定义如下：


    $$\rho_k = \phi_1^{|k|}$$


    还有这个例子：


    $$\rho_k = \phi_1 \rho_{k-1} + \dots + \phi_p \rho_{k-p}$$


    在前面的例子中，$\rho_k$ 是滞后 $k$ 的自相关。$\phi_1$ 既是 AR(1) 过程的斜率也是自相关。


    > **AR(p) 模型结构与组成部分**


    为避免混淆，请注意，对于方程 $y_t - \mu - \phi_1(y_{t-1} - \mu) - \phi_2(y_{t-2} - \mu) - \dots
    - \phi_p(y_{t-p} - \mu) = \epsilon_t$，我们试图构建一个代表该过程的数学模型，使得如果完美建模，剩下的就只有随机的、正态分布的白噪声
    $\epsilon_t$。这实际上意味着模型留下的残差误差为零（换句话说，是完美拟合）。每个 $y_{t-k}$ 项——其中 $k$ 是时间滞后——代表该时间点的值，每个对应的
    $\phi$ 值是 $y_{t-k}$ 所需的系数值，使得当与所有其他 $y$ 值结合时，模型在统计上近似零误差。


    #### AR(1) 模型


    **后移算子表示法**，或简称**算子表示法**，是一种简化的、简写式的模型表述方法。它被称为“后移”，因为它将时间从 $t$ 向后移动一个滞后到 $t-1$。其目的是避免在每个
    $\phi$ 系数后都写上 $(y_{t-i})$ 下标的必要性，而是写成 $B^{k-1}$，同时只包含一次 $y_t$，这在编写高阶 $p$ 的 AR(p)
    模型时非常方便。在下面的方程中，AR(1) 的零均值形式遵循以下结构：


    $$y_t - \mu - \phi_1(y_{t-1} - \mu) = \epsilon_t$$


    该方程简化为以下示例：


    $$y_t - \phi_1(y_{t-1}) = \epsilon_t$$


    用后移算子表示法，我们可以这样写：


    $$(1 - \phi_1 B)y_t = \epsilon_t$$


    > **关于 AR(1) 中 $|\phi_1|$ 的说明**


    值得注意的是，如果 $|\phi_1| < 1$，则 AR(1) 过程是平稳的。也就是说，当滞后一阶自相关的绝对值 < 1 时，AR(1) 过程是平稳的。当
    $|\phi_1| = 1$ 时，ARIMA 模型可能仍然有用，但当 $|\phi_1| > 1$ 时，该过程被认为是爆炸性的，不应建模。这是因为 $|\phi_1|
    < 1$ 的值意味着根在单位圆之外，且不受其约束。$|\phi_1| = 1$ 的值在单位圆上，但可以通过差分来移除单位根。AR(1) 的根可以计算为 $z
    = 1/\phi_1$。产生 $|\phi_1| > 1$ 的数据集无法通过过滤使其根位于单位圆之外。


    当 AR(p) 的所有根都在单位圆之外时，给定的实现（从随机过程中采样的一个时间序列）将收敛于均值，具有恒定方差，并且与时间无关。这是时间序列数据的理想情况。


    让我们来看一个 $|\phi_1| < 1$ 从而具有平稳根的 AR(1) 过程示例。假设我们已识别出以下一阶自回归过程：


    $$y_t - 0.5y_{t-1} = \epsilon_t$$


    将其转换为算子表示法：


    $$(1 - 0.5B)y_t = \epsilon_t$$


    在寻找根时，我们可以使用以下表示法：


    $$(1 - 0.5z) = 0$$


    这给出了 $z$ 的根：


    $$z = \frac{1}{\phi_1} = \frac{1}{0.5} = 2$$


    因此，由于根大于 1，从而在单位圆之外，该过程的 AR(1) 表示是平稳的。在 Python 中，我们可以使用接下来的代码构建此过程。首先，我们构建 AR(1)
    参数，我们希望其为 0.5。因为我们将 0.5 代入模型 $X_t - \phi_1(y_{t-1}) = \epsilon_t$，所以我们插入 0.5 而不是
    -0.5 作为 arparams。另外，请注意根据 $\rho_k = \phi^{|k|}$，0.5 是滞后一阶自相关。我们将构建的过程具有任意样本大小
    nsample=200。我们使用 np.r_[1, -arparams] 步骤构建 $(1 - 0.5B)y_t = \epsilon_t$ 的 $(1 -
    0.5B)$ 部分：


    ```python

    from statsmodels.graphics.tsaplots import plot_acf, plot_pacf

    import matplotlib.pyplot as plt

    import statsmodels.api as sm

    import numpy as np

    arparams = np.array([0.5])

    ar = np.r_[1, -arparams]

    ar_process = sm.tsa.ArmaProcess(ar)

    y = ar_process.generate_sample(nsample=200)

    ```


    现在我们有了创建我们所看方程的 AR(1) 的代码，让我们看看根并将其与我们手动计算的 z 进行比较：


    ```python

    ar_process.arroots

    ```


    array([2.])


    我们可以看到 Python 输出 2. 与我们执行的计算相同。我们知道，由于根的绝对值大于 1，AR(1) 过程是平稳的，但让我们用 Python 确认一下：


    ```python

    ar_process.isstationary

    ```


    True


    通过观察 PACF，我们可以观察到这是一个 $p = 5$ 阶的自回归。通过观察 ACF，我们也可以观察到 $\phi_1$ 的值约为 0.5。对于自回归模型，PACF
    用于识别应作为 AR 阶数包含的显著滞后数，而 ACF 用于确定该阶数中包含的系数 $\phi_k$ 的值。对于 AR(1)，使用 ACF 观察值很简单，但当
    p > 1 时则不那么明显，因为 ACF 在与最近点（滞后零）比较时不像 PACF 那样控制单个滞后。让我们用 Python 生成图表：


    ```python

    fig, ax = plt.subplots(1,3, figsize=(20,5))

    ax[0].set_title(''Realization'')

    ax[0].plot(y)

    plot_acf(y, alpha=0.05, lags=50, ax=ax[1])

    ax[1].set_title(''ACF'')

    plot_pacf(y, alpha=0.05, lags=50, ax=ax[2])

    ax[2].set_title(''PACF'')

    ```'

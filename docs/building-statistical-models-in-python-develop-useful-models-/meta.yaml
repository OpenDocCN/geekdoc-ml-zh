    # Spearman’s rank correlation coefficient


    In *Chapter 4, Parametric Tests*, we looked at the parametric correlation coefficient,
    Pearson’s correlation, where the coefficient is calculated from independently
    sampled, continuous data. However, **when we have ranked, ordinal data**, such
    as that from a satisfaction survey, we would not want to use Pearson’s correlation
    as it cannot be assumed to guarantee the preservation of order. As with Pearson’s
    correlation coefficient, **Spearman’s correlation coefficient** results in a coefficient,
    *r*, that ranges from -1 to 1, with -1 being a strong inverse correlation and
    1 being a strong direct correlation. Spearman’s is derived by dividing the covariance
    of the two variables’ ranks by the product of their standard deviations. The equation
    for the correlation coefficient, *r*, is as follows:


    $$r_s = \frac{S_{xy}}{\sqrt{S_{xx}S_{yy}}}$$


    Where


    $$S_{xy} = \sum(x_i - \bar{x})(y_i - \bar{y})$$

    $$S_{xx} = \sum(x_i - \bar{x})^2$$

    $$S_{yy} = \sum(y_i - \bar{y})^2$$


    The preceding correlation equation is safe to use under all ranking scenarios.
    However, when there are no ties or a minimal proportion of ties compared to the
    overall sample volume, the following equation may be used:


    $$r_s = \frac{6\sum d_i^2}{n(n^2 - 1)}, \text{where } d_i = (x_i - y_i)$$


    However, we will perform this test in Python. Therefore, the more complex and
    less error-prone formula will be applied regardless since computational power
    enables us to bypass the manual process entirely.'

- md: "## Simple random sampling\n\nFirst, simple random sampling is a method to select\
    \ a sample randomly from a population. Every member of the subset (or the sample)\
    \ has an equal chance of being chosen through an unbiased selection method. This\
    \ method is used when all members of a population have similar properties related\
    \ to important variables (important features) and it is the most direct approach\
    \ to probability sampling. The advantages of this method are to minimize bias\
    \ and maximize representativeness. However, while this method helps limit a biased\
    \ approach, there is a risk of errors with simple random sampling. This method\
    \ also has some limitations. For instance, when the population is very large,\
    \ there can be high costs and a lot of time required. Sampling errors need to\
    \ be considered when a sample is not representative of the population and the\
    \ study needs to perform this sampling process again. In addition, not every member\
    \ of a population is willing to participate in the study voluntarily, which makes\
    \ it a big challenge to obtain good information representative of a large population.\
    \ The previous example of choosing 3 pieces of paper from 10 pieces of paper is\
    \ a simple random sample.\n\n## Systematic sampling\n\nHere, members of a population\
    \ are selected at a random starting point with a fixed sampling interval. We first\
    \ choose a fixed sampling interval by dividing the number of members in a population\
    \ by the number of members in a sample that the study conducts. Then, a random\
    \ starting point between the number one and the number of members in the sampling\
    \ interval is selected. Finally, we choose subsequent members by repeating this\
    \ sampling process until enough samples have been collected. This method is faster\
    \ and preferable than simple random sampling when cost and time are the main factors\
    \ to be considered in the study. On the other hand, while in simple random sampling,\
    \ each member of a population has an equal chance of being selected, in systematic\
    \ sampling, a sampling interval rule is used to choose a member from a population\
    \ in a sample for a study. It can be said that systematic sampling is less random\
    \ than simple random sampling. Similarly, as in simple random sampling, member\
    \ properties of a population are similarly related to important variables/features.\
    \ Let us discuss how we perform systematic sampling through the following example.\
    \ In a class at one high school in Dallas, there are 50 students but only 10 books\
    \ to give to these students. The sampling interval is fixed by dividing the number\
    \ of students in the class by the number of books (50/10 = 5). We also need to\
    \ generate a random number between one and 50 as a random starting point. For\
    \ example, take the number 18. Hence, the 10 students selected to get the books\
    \ will be as follows:\n\n18, 23, 28, 33, 38, 43, 48, 3, 8, 13\n\nThe natural question\
    \ arises as to whether the interval sampling is a fraction. For example, if we\
    \ have 13 books, then the sampling interval will be 50/13 ~ 3.846. However, we\
    \ cannot choose this fractional number as a sampling interval that represents\
    \ the number of students. In this situation, we could choose number 3 or 4, alternatively,\
    \ as the sampling intervals (we could also choose either 3 or 4 as the sampling\
    \ interval). Let us assume that a random starting point generated is 17. Then,\
    \ the 13 selected students are these:\n\n17, 20, 24, 27, 31, 34, 38, 41, 45, 48,\
    \ 2, 5, 9\n\nObserving the preceding series of numbers, after reaching the number\
    \ 48, since adding 4 will produce a number greater than the count of students\
    \ (50 students), the sequence restarts at 2 (48 + 4 = 52, but since 50 is the\
    \ maximum, we restart at 2). Therefore, the last three numbers in the sequence\
    \ are 2, 5, and 9, with the sampling intervals 4, 3, and 4, respectively (passing\
    \ the number 50 and back to the number 1 until we have 13 selected students for\
    \ the systematic sample).\n\nWith systematic sampling, there is a biased risk\
    \ when the list of members of a population is organized to match the sampling\
    \ interval. For example, going back to the case of 50 students, researchers want\
    \ to know how students feel about mathematics classes. However, if the best students\
    \ in math correspond to numbers 2, 12, 22, 32, and 42, then the survey could be\
    \ biased if conducted when the random starting point is 2 and the sampling interval\
    \ is 10.\n\n## Stratified sampling\n\nIt is a probability sampling method based\
    \ on dividing a population into homogeneous subpopulations called **strata**.\
    \ Each stratum splits based on distinctly different properties, such as gender,\
    \ age, color, and so on. These subpopulations must be distinct so that every member\
    \ in each stratum has an equal chance of being selected by using simple random\
    \ sampling. *Figure 1.5* illustrates how stratified sampling is performed to select\
    \ samples from two subpopulations (a set of numbers and a set of letters):\n\n\
    The following code sample shows how to implement stratified sampling with numpy\
    \ using the example shown in *Figure 1.5*. First, the instances are split into\
    \ the respective strata: numbers and letters. Then, we use numpy to take random\
    \ samples from each stratum. Like in the previous code example, we utilize the\
    \ choice method to take the random sample, but the sample size for each stratum\
    \ is based on the total number of instances in each stratum rather than the total\
    \ number of instances in the entire population; for example, sampling 50% of the\
    \ numbers and 50% of the letters:\n\n```python\nimport numpy as np\n\n# setup\

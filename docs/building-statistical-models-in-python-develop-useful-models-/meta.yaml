  md: "midpoint is 1 but the range of the odds ratio is from 0 to infinity, then the\
    \ distribution is very skewed with a long right tail. However, we expected it\
    \ to be normally distributed per one of the assumptions of linear regression.\
    \ So, instead of using equation (2), we will consider the following:\n\n$$\\log(\\\
    frac{P}{1-P}) = \\beta_0 + \\beta_1 * Price + \\epsilon$$\n\nThe value of $\\\
    log(\\frac{P}{1-P})$ is in the range of $(-\\infty, \\infty)$ and the midpoint\
    \ is 0. Similar to linear regression, we can use the following formula:\n\n$$\\\
    log(odds) = \\log(\\frac{P}{1-P}) = \\beta_0 + \\beta_1 X_1 + \\beta_2 X_2 + \\\
    dots = z \\quad (3)$$\n\nWe can use this to interpret how the explanatory variables\
    \ are associated with the categorical outcome. We can rewrite the previous equation\
    \ (3) as follows:\n\n$$F(z) = P = \\frac{e^z}{1 + e^z},$$\n\nThe preceding formula\
    \ is bounded below by 0 and above by 1 (the predicted probability, P, of the outcome\
    \ takes place) and is called the logit model. It is the cumulative distribution\
    \ function of the **logistic distribution**.\n\nAnother approach to model the\
    \ probability of a binary dependent variable is **probit regression**. Instead\
    \ of using the cumulative distribution function of logistic regression, we use\
    \ the cumulative distribution function of the standard normal distribution:\n\n\
    $$F(z) = \\int_{-\\infty}^{z} \\phi(u)du = \\phi(z).$$\n\nThe preceding formula\
    \ is bounded below by 0 and above by 1 (the predicted probability, P, of the outcome\
    \ takes place), and is called the **probit model**. Remember the following:\n\n\
    $$\\phi(z) = P(Z \\leq z), \\quad Z \\sim \\mathcal{N}(0,1).$$\n\nBoth the logit\
    \ and probit models are estimated by using the **maximum likelihood method**.\
    \ In statsmodels, we have classes for the probit and logit models. The documentation\
    \ for these classes can be found at https://www.statsmodels.org/dev/generated/statsmodels.discrete.discrete_model.Probit.html\
    \ and https://www.statsmodels.org/dev/generated/statsmodels.discrete.discrete_model.Logit.html.\n\

  md: "# Measuring variability\n\nBy variability, we essentially mean how wide a distribution\
    \ is. The measurements in this category are as follows:\n\n+   - Range\n- Quartile\
    \ ranges\n- Tukey fences\n- Variance\n\nLet's discuss each of them.\n\n# Range\n\
    \nThe range is simply the difference between the maximum value and the minimum\
    \ value in the distribution. Like the mean, the range will be affected by outliers\
    \ since it depends on the max and min values. However, there is another variability\
    \ method that, like the median, is robust to the presence of outliers.\n\nLet's\
    \ take a look at calculating a range with code with numpy:\n\n```\nimport numpy\
    \ as np\nvalues = [85, 99, 70, 71, 86, 88, 94, 105]\nmax_value = np.max(values)\n\
    min_value = np.min(values)\nrange_ = max_value - min_value\nprint(f\"The data\
    \ have a range of {range_}\"\n      f\" with max of {max_value}\"\n      f\" and\
    \ min of {min_value}\")\n# The data have a range of 35 with max of 105 and min\
    \ of 70\n```\n\nWhile numpy does not have a range function, the range can be calculated\
    \ using the min and max functions provided by numpy.\n\n# Quartile ranges\n\n\
    The next measures of variability are determined by sorting the data and then dividing\
    \ the data into four equal sections. The boundaries of the four sections are the\
    \ quartiles, which are called the following:\n\n+   - The lower quartile (Q1)\n\
    - The middle quartile (Q2)\n- The upper quartile (Q3)"
  merge: -1

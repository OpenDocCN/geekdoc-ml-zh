  md: "In many problems, $\\Omega = 0$. That means that for the case of the two-tailed\
    \ test, the null hypothesis is zero, or in other words, $\\mu_1$ and $\\mu_2$\
    \ are equal. The test statistic for hypothesis tests is computed as follows:\n\
    \n$$z = \\frac{(\\bar{x}_1 - \\bar{x}_2) - \\Omega}{\\sqrt{\\frac{\\sigma_1^2}{n_1}\
    \ + \\frac{\\sigma_2^2}{n_2}}}$$\n\nHere, $\\bar{x}_1$ and $\\bar{x}_2$ are the\
    \ sample means with the sample sizes $n_1$ and $n_2$ randomly taken from the two\
    \ populations with the means $\\mu_1$ and $\\mu_2$, respectively. $\\sigma_1$\
    \ and $\\sigma_2$ are the standard deviations for these two populations. With\
    \ two independent simple random samples, the point estimator $\\bar{x}_1 - \\\
    bar{x}_2$ has a standard error given as follows:\n\n$$\\sigma_{\\bar{x}_1 - \\\
    bar{x}_2} = \\sqrt{\\frac{\\sigma_1^2}{n_1} + \\frac{\\sigma_2^2}{n_2}}$$\n\n\
    The distribution of $\\bar{x}_1 - \\bar{x}_2$ can be considered a normal distribution\
    \ when the sample sizes are large enough. The step-by-step approach to the two-sample\
    \ z-test hypothesis test is similar to that of the one-sample z-test.\n\nLet us\
    \ now consider an example. We study the IQ scores of students from two schools,\
    \ named A and B, in Dallas, and we want to know whether the mean IQ levels for\
    \ these two schools are different. A simple random sample of 30 students from\
    \ each school is recorded.\n\nA= [95,110, 105, 120, 125, 110, 98, 90, 99, 100,110,\
    \ 112, 106, 92, 108, 97, 95, 99, 100, 100, 103, 125, 122, 110, 112, 102, 92, 97,\
    \ 89, 102]\n\nB = [98, 90, 100, 93, 91, 79, 90, 100, 121, 89, 101, 98, 75, 90,\
    \ 95, 99, 100, 120, 121, 95, 96, 89, 115, 99, 95, 121, 122, 98, 97, 97]\n\nThe\
    \ null and alternative hypotheses are:\n\n$$H_0: \\mu_1 - \\mu_2 = 0$$\n$$H_a:\
    \ \\mu_1 - \\mu_2 \\neq 0$$\n\nWe choose the level of significance $\\alpha=0.05$.\
    \ In Python, by using the `ztest()` function of the `statsmodels` package, we\
    \ perform the following calculation:\n\n```\nfrom statsmodels.stats.weightstats\
    \ import ztest as ztest\n\n#IQ score\nA= [95,110, 105, 120, 125, 110, 98, 90,\
    \ 99, 100,\n    110, 112, 106, 92, 108, 97, 95, 99, 100, 100,\n    103, 125, 122,\
    \ 110, 112, 102, 92, 97, 89,102] #school A\nB = [98, 90, 100, 93, 91, 79, 90,\
    \ 100, 121, 89,\n     101, 98, 75, 90, 95, 99, 100, 120, 121, 95,\n```"

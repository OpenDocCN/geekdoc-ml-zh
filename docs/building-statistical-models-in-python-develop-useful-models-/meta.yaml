    ```\npython\nfrom scipy.stats import mode\nm = mode([1,2,3,4,4,4,5,5])\nprint(\n\
    \    f\"The mode is {m.mode[0]} with a count of\"\n    f\" {m.count[0]} instances\"\
    \n)\n# The mode is 4 with a count of 3 instances\n```\n\nThe mode function returns\
    \ a mode object containing `mode` and `count` members. Unsurprisingly, the `mode`\
    \ and `count` members contain the modes of the dataset and the number of times\
    \ the modes appear, respectively. Note that `mode` and `count` members are indexable\
    \ (like lists) because a dataset can contain multiple modes."

  md: "+   - value: This is the value of the null hypothesis, equal to the proportion\
    \ in the case of a one-sample test. In the case of a two-sample test, the null\
    \ hypothesis is `prop[0] - prop[1] = value`, where `prop` is the proportion in\
    \ the two samples. If not provided, `value = 0`, and the null hypothesis is `prop[0]\
    \ = prop[1]`. alternative: The alternative hypothesis:\n  - 'two-sided': Two-sided\
    \ test\n  - 'larger': Right-tailed test\n  - 'smaller': Left-tailed test\n\nThe\
    \ researcher gathers a sample of data with an observed sample proportion p = 0.84,\
    \ the hypothesized population proportion $p_0 = 0.8$, and the sample size $n =\
    \ 500$. The null and alternative hypotheses are as follows:\n\n$$H_0: \\bar{p}\
    \ = p_0,$$\n$$H_a: \\bar{p} \\neq p_0.$$\n\nWe will implement a one-proportion\
    \ two-tailed z-test in Python to calculate the test statistic and p-value:\n\n\
    ```\n#import proportions_ztest function\nfrom statsmodels.stats.proportion import\
    \ proportions_ztest\n\ncount = 0.8*500\nnobs = 500\nvalue = 0.84\n\n#perform one\
    \ proportion two-tailed z-test\nz_statistic, p_value = proportions_ztest(count,\
    \ nobs,\n    value, alternative = 'two-sided')\n\nprint(f\"The test statistic\
    \ is {z_statistic} and the\n    corresponding p-value is {p_value}.\")\n```\n\n\
    The test statistic is -2.236067977499786 and the corresponding p-value is 0.0253473186774685.\
    \ Since the p-value < 0.05 (the level of significance), we reject the null hypothesis.\
    \ There is enough evidence to suggest the proportion of students who support the\
    \ changes is different from 0.8.\n\n# **A two-proportion z-test**\n\nThis test\
    \ is used to test the difference between two population proportions. There are\
    \ also three forms of the null and alternative hypotheses. The test statistic\
    \ is computed as follows:\n\n$$z = \\frac{\\bar{P}_1 - \\bar{P}_2}{\\sqrt{\\bar{p}(1\
    \ - \\bar{p})(\\frac{1}{n_1} + \\frac{1}{n_2})}}$$"

  - "[PAGE 103]\n\nthat of the smaller. Discipline A has 181 salaries and discipline\
    \ B has 216. Therefore, 216 will be our numerator corresponding to what we will\
    \ consider as *group 1* (discipline A will be *group 2*).\n\nLet us suppose we\
    \ are not sure whether one group will be larger or smaller than the other; we\
    \ will consider this a two-sided hypothesis test. The effect size for this z-test\
    \ is the difference between the two groups. We will use **Cohen's d**. To calculate\
    \ that, we need to divide the difference between the means of the two groups by\
    \ the pooled standard deviation. Calculated here, the pooled standard deviation\
    \ is the number of samples in group 1 multiplied by the variance of group 1, plus\
    \ the same for group 2, all divided by the combined sample size for the two groups.\
    \ The following is the equation for the pooled standard deviation:\n\n$$\\sqrt{\\\
    frac{n_1 \\sigma_1^2 + n_2 \\sigma_2^2}{n_1 + n_2}}$$\n\nFor effect size, we need\
    \ to divide the difference of means by the effect size as follows:\n\n$$\\frac{|\\\
    mu_1 - \\mu_2|}{\\sqrt{\\frac{n_1 \\sigma_1^2 + n_2 \\sigma_2^2}{n_1 + n_2}}}$$\n\
    \nNote that in the equation for effect size, we take the absolute value of the\
    \ difference of means. That is because, for Cohen's d, we always need a positive\
    \ difference of means for this test.\n\nAs calculated here, if we want a power\
    \ of 80% (the type II error rate is 20%) and a type I error rate (a level of significance)\
    \ of 0.05, we will need 172 samples in group 1 and 145 samples in group 2. However,\
    \ if we wanted a power of 90% and a level of significance of 0.01 (99% confidence),\
    \ we would need 325 samples in group 1 and 274 samples in group 2:\n\n```\nimport\
    \ statsmodels.api as sm\nimport math\n\ndf_prof = sm.datasets.get_rdataset(\"\
    Salaries\", \"carData\").data\n\ndf_prof_A = df_prof.loc[df_prof['discipline']\
    \ == 'A']\ndf_prof_B = df_prof.loc[df_prof['discipline'] == 'B']\n\ndef pooled_standard_deviation(dataset1,\
    \ dataset2, column) -> float:\n    pooledSD = math.sqrt(((len(dataset1) - 1)*(dataset1[column].std()**2)+(len(dataset2)\
    \ - 1)*(dataset2[column].std()**2))/(len(dataset1) + len(dataset2) - 2))\n   \
    \ return pooledSD;\n\nstdDeviation = pooled_standard_deviation(\n    dataset1\
    \ = df_prof_A, dataset2=df_prof_B,\n    column='salary')\nfrom statsmodels.stats.power\
    \ import NormalIndPower\n```"

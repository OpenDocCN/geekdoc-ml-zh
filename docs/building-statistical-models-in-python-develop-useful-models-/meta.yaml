  md: "# Scaling of permutation calculations\n\nIn general, permutation tests can\
    \ be expensive to calculate because the number of permutations grows quickly with\
    \ the size of the distribution. For example, dataset sizes of 3, 5, and 7 samples\
    \ correspond to permutation sizes of 6, 120, and 5,040. The dataset shown here\
    \ has more than 39 million permutations! The runtime performance of a permutation\
    \ test on a large dataset will likely be slow due to the number of permutations\
    \ necessary to compute the null distribution.\n\nWe can perform a permutation\

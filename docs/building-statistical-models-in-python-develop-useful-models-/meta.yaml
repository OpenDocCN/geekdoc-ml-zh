    \nFigure 11.8 – The AR(4) forecast horizon = 5\n\nWe will cover additional steps\
    \ in the model evaluation section of this chapter.\n\n## Moving average (MA) models\n\
    \n### The MA(q) model\n\nWhereas the AR(p) model is a direct function of the correlation\
    \ between lag zero and specific individual lags of order p over time, the moving\
    \ average model of order q, MA(q), is a function of autocorrelation between lag\
    \ zero and all previous lags included in order q. It acts as a low-pass filter\
    \ that models errors to provide a useful fit to data.\n\nLet us take a process,\
    \ $y_t$, that has a mean of zero and a random, normally distributed white noise\

- md: "## Anderson-Darling compared to Kolmogorov-Smirnov\n\nNote that while both\
    \ the Anderson-Darling and Kolmogorov-Smirnov tests use the cumulative density\
    \ frequency distributions to test for normality, the Anderson-Darling test is\
    \ different from the Kolmogorov-Smirnov test because it weights the variance in\
    \ the tails of the cumulative density frequency distribution more than the middle.\
    \ This is because the variance in the tails can be measured in smaller increments\
    \ than in the middle of the distribution. Consequently, the Anderson-Darling test\
    \ is more sensitive to tails than the Kolmogorov-Smirnov test. In line with the\
    \ Kolmogorov-Smirnov test, a test statistic is calculated and measured against\
    \ a critical value. If the test statistic is larger than the critical value, the\
    \ null hypothesis that the given distribution is normally distributed can be rejected\
    \ at the specified level of significance.\n\nHere, we are using the Anderson-Darling\
    \ test to test a random normal probability distribution generated with a mean\
    \ of 19 and a standard deviation of 1.7. We also test an exponentially transformed\
    \ version of this data:\n\n```python\nimport matplotlib.pyplot as plt\nimport\
    \ seaborn as sns\nimport numpy as np\nmu, sigma = 19, 1.7\nnormally_distributed\
    \ = np.random.normal(mu, sigma, 1000)\nnot_normally_distributed = np.exp(normally_distributed);\n\
    ```\n\nFigure 4.4 shows plots of the data:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_114_0.png)\n\
    \nIn the code and output shown next, in *Figure 4.5*, we can see the distribution\
    \ is normally distributed at all levels of significance. Recall that the level\
    \ of significance is the p-value (that is, a level of significance = 15.0 means\
    \ a p-value of 0.15 or smaller is significant):\n\n```python\nfrom scipy import\
    \ stats\nimport pandas as pd\nimport numpy as np\ndef anderson_test(data):\n \
    \   data = np.array(data)\n    test_statistic, critical_values, significance_levels\
    \ = stats.anderson(normally_distributed, dist='norm')\n\n    df_anderson = pd.DataFrame({'Test\
    \ Statistic':np.repeat(test_statistic, len(critical_values)), 'Critical Value':critical_values,\
    \ 'Significance Level': significance_levels})\n    df_anderson.loc[df_anderson['Test\
    \ Statistic'] >= df_anderson['Critical Value'], 'Normally Distributed'] = 'No'\n\
    \    df_anderson.loc[df_anderson['Test Statistic'] < df_anderson['Critical Value'],\
    \ 'Normally Distributed'] = 'Yes'\n    return df_anderson;\nmu, sigma = 19, 1.7\n\
    normally_distributed = np.random.normal(mu, sigma, 1000)\nanderson_test(normally_distributed)\n\
    ```\n\nHere, the data generated through the numpy `random.normal` function is\
    \ tested with the Anderson-Darling method and confirmed to be normally distributed:\n\
    \n| Test statistic | Critical value | Significance level | Normally distributed\
    \ |\n|---|---|---|---|\n| 0.191482344 | 0.574 | 15 | Yes |\n| 0.191482344 | 0.653\
    \ | 10 | Yes |\n| 0.191482344 | 0.784 | 5 | Yes |\n| 0.191482344 | 0.914 | 2.5\
    \ | Yes |\n| 0.191482344 | 1.088 | 1 | Yes |\n\nFigure 4.5 – Anderson-Darling\
    \ results for normally distributed data\n\nHere, we test an exponential transformation\
    \ of the normally distributed data to check for normality. The data is exponentially\
    \ distributed and should reject at all levels of significance. However, we see\
    \ in *Figure 4.6* that it has failed to reject at the 0.01 level of significance\
    \ (99% confidence). Therefore, depending on the use case, it may be prudent to\
    \ check all levels of significance, use a different test, or make a decision based\
    \ on multiple tests:\n\n```python\nnot_normally_distributed = np.exp(normally_distributed)\n\
    anderson_test(not_normally_distributed)\n```\n\nOur Anderson-Darling test of non-normally\
    \ distributed data outputs are as follows in *Figure 4.6*:\n\n| Test statistic\
    \ | Critical value | Significance level | Normally distributed |\n|---|---|---|---|\n\
    | 0.96277351 | 0.574 | 15 | No |\n| 0.96277351 | 0.653 | 10 | No |\n| 0.96277351\
    \ | 0.784 | 5 | No |\n| 0.96277351 | 0.914 | 2.5 | No |\n| 0.96277351 | 1.088\
    \ | 1 | Yes |\n\nFigure 4.6 – Anderson-Darling results for non-normally distributed\
    \ data\n\n## Shapiro-Wilk\n\nThe **Shapiro-Wilk** test is a goodness-of-fit test\
    \ that checks whether a given distribution is normally distributed. The test checks\
    \ how closely a distribution of observed values centered on 0 and scaled to a\
    \ unit variance of 1 approximates an observed centered and scaled standard normal\
    \ distribution. This centering and scaling (called **standardizing**) are performed\
    \ within the function in the `scipy.stats.shapiro` module, so input data does\
    \ not need to be altered prior to testing. The level of significance for this\
    \ test in `scipy` is 0.05.\n\n> **Shapiro-Wilk compared to Kolmogorov-Smirnov\
    \ and Anderson-Darling**\n> Shapiro-Wilk is ideal, compared to Kolmogorov-Smirnov\
    \ and Anderson-Darling, for testing small sample sizes of roughly less than 50.\
    \ However, one drawback is that since Shapiro-Wilk uses repeated sampling and\
    \ testing for the calculated test statistic by applying Monte Carlo simulation,\
    \ the law of large numbers poses a risk that as the sample size increases, there\
    \ is an inherent increase in the risk of encountering a *type II error* (a loss\
    \ of power) and failing to reject the null hypothesis, where the null hypothesis\
    \ states the given distribution is normally distributed.\n\nUsing the same distributions\
    \ as in the Anderson-Darling test, we test with Shapiro-Wilk. We can see with\
    \ the random normal distribution with a mean of 19 and a standard deviation of\
    \ 1.7, the Shapiro-Wilk test has confirmed with a p-value of 0.99 that the null\
    \ hypothesis that the input distribution is normally distributed should not be\
    \ rejected:\n\n```python\nmu, sigma = 19, 1.7\nnormally_distributed = np.random.normal(mu,\
    \ sigma, 1000)\nstats.shapiro(normally_distributed)\n```\n\nThis is the output:\n\
    \nShapiroResult(statistic=0.9993802905082703, pvalue=0.9900037050247192)\n\nWhen\
    \ testing using the exponentially transformed version of the normally distributed\
    \ data, we find a significant p-value (p = 0.0), indicating we have enough evidence\
    \ to reject the null hypothesis and conclude the distribution is not normally\
    \ distributed:\n\n```python\nnot_normally_distributed = np.exp(normally_distributed)\n\
    stats.shapiro(not_normally_distributed)\n```\n\nThis is the output:\n\nShapiroResult(statistic=0.37320804595947266,\
    \ pvalue=0.0)\n\n## Independent samples\n\nIn parametric hypothesis testing, the\
    \ independence of samples is another important assumption. Two effects can occur\
    \ from non-independent sampling. One effect occurs when subgroup sampling is performed.\
    \ The issue here is that responses in one subgroup of the population may be different\
    \ than responses from another subgroup of the same population or even more similar\
    \ to those of a different population. However, when sampling representative of\
    \ the overall population is taken, this type of subgroup difference may not be\
    \ very representative of the population.\n\nAnother effect of non-independent\
    \ sampling is when samples are taken close enough together in time that the occurrence\
    \ of one precludes or excludes the occurrence of another. This is called serial\
    \ (or auto-) correlation.\n\nParametric tests are not typically robust to violations\
    \ of this requirement as it has direct, categorical implications on the interpretability\
    \ of test outcomes. With respect to subgroup sampling, this can be prevented through\
    \ a well-structured sampling approach such as those outlined in *Chapter 1, Sampling\
    \ and Generalization*. However, as regards the serial effect, we can test for\
    \ autoregressive correlation (also called serial correlation) in the data.\n\n\
    ## Durbin-Watson\n\nOne of the most common tests performed to assess a lack of\
    \ independence in sampling is the first-order (also referred to as lag-one) autoregressive\
    \ test called the **Durbin-Watson** test. **Autoregressive** means previous data\
    \ points are used to predict the current data point. First-order means the last\
    \ sampled data point (lag one) is the point most significantly correlated to the\
    \ most recently sampled data point (lag zero) in a sequence of sampled data. In\
    \ first-order autocorrelation, the correlation for each data point is strongest\
    \ with the previous data point. The Durbin-Watson test does not test whether any\
    \ value is correlated to the value before it, but instead if, overall, there is\
    \ a strong enough relationship between each value and the value before it to conclude\
    \ there is significant autocorrelation. In that sense, there is some robustness\
    \ to non-independent sampling such that an accident or two may not completely\
    \ invalidate a hypothesis test, but a consistent recurrence of this type of violation\
    \ will.\n\nA Durbin-Watson value of 2 indicates no significant autocorrelation,\
    \ a value between 0 and 2 represents positive (direct) autocorrelation, and a\
    \ value between 2 and 4 represents negative (inverse) autocorrelation.\n\nIn the\
    \ following example, we have two distributions, each with 1,000 samples. The distribution\
    \ on the left is a sinusoidal distribution that exhibits strong autoregressive\
    \ correlation, and the distribution on the right is a set of randomly generated\
    \ data displaying as white-noise variance (random points centered around a mean\
    \ of 0). Using the `durbin_watson()` function from the `statsmodels.stats` module,\
    \ we are able to confirm direct, positive lag-one autocorrelation in the sinusoidal\
    \ pattern (a very small Durbin-Watson value) and a Durbin-Watson statistic of\
    \ 2.1 with the random noise, indicating no autocorrelation. Therefore, in *Figure\
    \ 4.7*, the plot on the left is not composed of independent samples whereas the\
    \ plot on the right is:\n\n```python\nfrom statsmodels.stats.stattools import\
    \ durbin_watson\nimport matplotlib.pyplot as plt\nimport numpy as np\nmu, sigma\
    \ = 0, 1.1\nindependent_samples = np.random.normal(mu, sigma, 1000)\ncorrelated_samples\
    \ = np.linspace(-np.pi, np.pi, num=1000)\nfig, ax = plt.subplots(1,2, figsize=(10,5))\n\
    ax[0].plot(correlated_samples, np.sin(correlated_samples))\nax[0].set_title('Durbin\
    \ Watson = {}'.format(\n    durbin_watson(correlated_samples)))\nax[1].plot(independent_samples)\n\
    ax[1].set_title('Durbin Watson = {}'.format(\n    durbin_watson(independent_samples)))\n\
    ```"
  mdcn: "## Anderson-Darling 与 Kolmogorov-Smirnov 的比较\n\n请注意，虽然 Anderson-Darling 和\
    \ Kolmogorov-Smirnov 检验都使用累积密度频率分布来检验正态性，但 Anderson-Darling 检验与 Kolmogorov-Smirnov\
    \ 检验的不同之处在于，它对累积密度频率分布尾部的方差赋予的权重高于中间部分。这是因为尾部的方差可以比分布中间部分以更小的增量来测量。因此，Anderson-Darling\
    \ 检验对尾部比 Kolmogorov-Smirnov 检验更敏感。与 Kolmogorov-Smirnov 检验类似，会计算一个检验统计量并与临界值进行比较。如果检验统计量大于临界值，则可以在指定的显著性水平下拒绝给定分布为正态分布的原假设。\n\
    \n在此，我们使用 Anderson-Darling 检验来检验一个均值为 19、标准差为 1.7 的随机正态概率分布。我们还检验了该数据的指数变换版本：\n\
    \n```python\nimport matplotlib.pyplot as plt\nimport seaborn as sns\nimport numpy\
    \ as np\nmu, sigma = 19, 1.7\nnormally_distributed = np.random.normal(mu, sigma,\
    \ 1000)\nnot_normally_distributed = np.exp(normally_distributed);\n```\n\n图 4.4\
    \ 显示了数据的绘图：\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_114_0.png)\n\n在接下来的代码和输出中，即*图\
    \ 4.5*，我们可以看到该分布在所有显著性水平下都是正态分布的。回想一下，显著性水平就是 p 值（即，显著性水平 = 15.0 意味着 p 值 ≤ 0.15\
    \ 是显著的）：\n\n```python\nfrom scipy import stats\nimport pandas as pd\nimport numpy\
    \ as np\ndef anderson_test(data):\n    data = np.array(data)\n    test_statistic,\
    \ critical_values, significance_levels = stats.anderson(normally_distributed,\
    \ dist='norm')\n\n    df_anderson = pd.DataFrame({'Test Statistic':np.repeat(test_statistic,\
    \ len(critical_values)), 'Critical Value':critical_values, 'Significance Level':\
    \ significance_levels})\n    df_anderson.loc[df_anderson['Test Statistic'] >=\
    \ df_anderson['Critical Value'], 'Normally Distributed'] = 'No'\n    df_anderson.loc[df_anderson['Test\
    \ Statistic'] < df_anderson['Critical Value'], 'Normally Distributed'] = 'Yes'\n\
    \    return df_anderson;\nmu, sigma = 19, 1.7\nnormally_distributed = np.random.normal(mu,\
    \ sigma, 1000)\nanderson_test(normally_distributed)\n```\n\n此处，通过 numpy `random.normal`\
    \ 函数生成的数据经过 Anderson-Darling 方法检验，确认为正态分布：\n\n| 检验统计量 | 临界值 | 显著性水平 | 是否正态分布 |\n\
    |---|---|---|---|\n| 0.191482344 | 0.574 | 15 | 是 |\n| 0.191482344 | 0.653 | 10\
    \ | 是 |\n| 0.191482344 | 0.784 | 5 | 是 |\n| 0.191482344 | 0.914 | 2.5 | 是 |\n\
    | 0.191482344 | 1.088 | 1 | 是 |\n\n图 4.5 – 正态分布数据的 Anderson-Darling 结果\n\n在此，我们检验正态分布数据的指数变换以检查其正态性。该数据呈指数分布，应在所有显著性水平下被拒绝。然而，我们在*图\
    \ 4.6*中看到，它在 0.01 显著性水平（99% 置信度）下未能拒绝。因此，根据具体用例，谨慎的做法可能是检查所有显著性水平、使用不同的检验方法，或基于多次检验做出决定：\n\
    \n```python\nnot_normally_distributed = np.exp(normally_distributed)\nanderson_test(not_normally_distributed)\n\
    ```\n\n我们对非正态分布数据的 Anderson-Darling 检验输出如下，见*图 4.6*：\n\n| 检验统计量 | 临界值 | 显著性水平\
    \ | 是否正态分布 |\n|---|---|---|---|\n| 0.96277351 | 0.574 | 15 | 否 |\n| 0.96277351\
    \ | 0.653 | 10 | 否 |\n| 0.96277351 | 0.784 | 5 | 否 |\n| 0.96277351 | 0.914 | 2.5\
    \ | 否 |\n| 0.96277351 | 1.088 | 1 | 是 |\n\n图 4.6 – 非正态分布数据的 Anderson-Darling 结果\n\
    \n## Shapiro-Wilk\n\n**Shapiro-Wilk** 检验是一种拟合优度检验，用于检查给定分布是否为正态分布。该检验检查一个以 0 为中心并缩放为单位方差\
    \ 1 的观测值分布，与一个观测到的、经过中心化和缩放的标准正态分布的近似程度。这种中心化和缩放（称为**标准化**）在 `scipy.stats.shapiro`\
    \ 模块的函数内部执行，因此输入数据在检验前无需修改。`scipy` 中此检验的显著性水平为 0.05。\n\n> **Shapiro-Wilk 与 Kolmogorov-Smirnov\
    \ 和 Anderson-Darling 的比较**\n> 与 Kolmogorov-Smirnov 和 Anderson-Darling 相比，Shapiro-Wilk\
    \ 非常适合检验样本量大致小于 50 的小样本。然而，一个缺点是，由于 Shapiro-Wilk 使用重复抽样并通过蒙特卡洛模拟应用来计算检验统计量，大数定律带来了一个风险：随着样本量的增加，遇到*第二类错误*（功效损失）并未能拒绝原假设（即原假设声称给定分布为正态分布）的内在风险也会增加。\n\
    \n使用与 Anderson-Darling 检验中相同的分布，我们用 Shapiro-Wilk 进行检验。我们可以看到，对于均值为 19、标准差为 1.7\
    \ 的随机正态分布，Shapiro-Wilk 检验以 p 值为 0.99 确认不应拒绝输入分布为正态分布的原假设：\n\n```python\nmu, sigma\
    \ = 19, 1.7\nnormally_distributed = np.random.normal(mu, sigma, 1000)\nstats.shapiro(normally_distributed)\n\
    ```\n\n输出如下：\n\nShapiroResult(statistic=0.9993802905082703, pvalue=0.9900037050247192)\n\
    \n当使用正态分布数据的指数变换版本进行检验时，我们发现一个显著的 p 值（p = 0.0），表明我们有足够的证据拒绝原假设，并得出结论该分布不是正态分布：\n\
    \n```python\nnot_normally_distributed = np.exp(normally_distributed)\nstats.shapiro(not_normally_distributed)\n\
    ```\n\n输出如下：\n\nShapiroResult(statistic=0.37320804595947266, pvalue=0.0)\n\n##\
    \ 独立样本\n\n在参数假设检验中，样本的独立性是另一个重要的假设。非独立抽样可能导致两种效应。一种效应发生在进行子组抽样时。这里的问题是，总体中一个子组的响应可能与同一总体中另一个子组的响应不同，甚至与不同总体的响应更相似。然而，当抽取代表总体的样本时，这种子组差异可能对总体的代表性不强。\n\
    \n非独立抽样的另一个效应是，当样本在时间上足够接近地抽取时，一个事件的发生会排除或阻止另一个事件的发生。这被称为序列（或自）相关。\n\n参数检验通常对违反此要求的情况不具有稳健性，因为它对检验结果的可解释性有直接的、绝对的影响。关于子组抽样，可以通过结构良好的抽样方法来防止，例如*第\
    \ 1 章，抽样与泛化*中概述的方法。然而，关于序列效应，我们可以检验数据中的自回归相关性（也称为序列相关性）。\n\n## Durbin-Watson\n\
    \n评估抽样中缺乏独立性最常进行的检验之一是一阶（也称为滞后一阶）自回归检验，称为 **Durbin-Watson** 检验。**自回归**意味着使用先前的数据点来预测当前数据点。一阶意味着在抽样数据序列中，最后一个抽样数据点（滞后一阶）是与最近抽样数据点（滞后零阶）相关性最强的点。在一阶自相关中，每个数据点与前一个数据点的相关性最强。Durbin-Watson\
    \ 检验并非检验任何值是否与其前一个值相关，而是检验整体上每个值与其前一个值之间是否存在足够强的关系，以得出存在显著自相关的结论。从这个意义上说，对于非独立抽样存在一定的稳健性，即一两次偶然事件可能不会完全使假设检验失效，但这种违规行为的持续重复则会。\n\
    \nDurbin-Watson 值为 2 表示没有显著的自相关，0 到 2 之间的值表示正（直接）自相关，2 到 4 之间的值表示负（反向）自相关。\n\n\
    在以下示例中，我们有两个分布，每个分布有 1,000 个样本。左侧的分布是正弦分布，表现出强烈的自回归相关性；右侧的分布是一组随机生成的数据，表现为白噪声方差（随机点围绕均值\
    \ 0 分布）。使用 `statsmodels.stats` 模块中的 `durbin_watson()` 函数，我们能够确认正弦模式中存在直接的、正的一阶自相关（Durbin-Watson\
    \ 值非常小），而随机噪声的 Durbin-Watson 统计量为 2.1，表明没有自相关。因此，在*图 4.7*中，左侧的图不是由独立样本组成的，而右侧的图是：\n\
    \n```python\nfrom statsmodels.stats.stattools import durbin_watson\nimport matplotlib.pyplot\
    \ as plt\nimport numpy as np\nmu, sigma = 0, 1.1\nindependent_samples = np.random.normal(mu,\
    \ sigma, 1000)\ncorrelated_samples = np.linspace(-np.pi, np.pi, num=1000)\nfig,\
    \ ax = plt.subplots(1,2, figsize=(10,5))\nax[0].plot(correlated_samples, np.sin(correlated_samples))\n\
    ax[0].set_title('Durbin Watson = {}'.format(\n    durbin_watson(correlated_samples)))\n\
    ax[1].plot(independent_samples)\nax[1].set_title('Durbin Watson = {}'.format(\n\
    \    durbin_watson(independent_samples)))\n```"

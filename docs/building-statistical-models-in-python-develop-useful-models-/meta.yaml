    The test statistic is 6.159178830896832 and the corresponding p-value is 5.15076734562176e-07.


    Because the p-value < 0.05 where 0.05 is the level of significance, we have enough
    evidence to reject the null hypothesis and conclude that the true mean IQ scores
    of the students from this school is higher than 100.


    In addition, with 95% confidence, the mean IQ score lies between 104.08 and 107.12.
    We can perform the calculation for the confidence interval in Python as follows:


    ```

    IQmean = np.array(IQscores).mean() # sample mean

    IQsd = np.array(IQscores).std() # sample standard deviation

    sample_size = len(np.array(IQscores)) # sample size

    df = sample_size-1 # degree of freedom

    alpha = 0.05 # level of significance

    t_crit = stats.t.ppf(q=1-alpha, df =df) # critical

    confidence_interval = (IQmean-IQsd*t_crit/np.sqrt(sample_size),

    IQmean+IQsd*t_crit/np.sqrt(sample_size))


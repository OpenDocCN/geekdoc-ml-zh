    \ |\n\nFigure 2.21 – Table of Pearson’s correlation coefficients alongside the\
    \ original samples\n\nIt is common to run around 1,000 to 10,000 bootstrap replicas.\
    \ However, this depends on the type of data being bootstrapped. For example, if\
    \ bootstrapping data from a human genome sequence dataset, it may be useful to\
    \ bootstrap a sample 10 million times, but if bootstrapping a simple dataset,\
    \ it may be useful to bootstrap 1,000 times or less. Ultimately, the researcher\
    \ should perform a visual inspection of the distributions of the means to determine\
    \ whether the results appear logical compared to what is expected. As common with\
    \ statistics, it is best to have some domain knowledge or subject-matter expertise\
    \ to help validate findings, as this will likely be the best for deciding bootstrap\
    \ replication counts.\n\nBootstrapping is also used in machine learning, where\
    \ it underlies the concept of **bootstrap aggregation**, also called **bagging**,\
    \ a process that combines outputs of predictive models built upon bootstrap subsample\
    \ distributions. **Random Forest** is one popular algorithm that performs this\
    \ operation. The purpose of bootstrapping in bagging algorithms is to preserve\
    \ the low-bias behavior of non-parametric (more to be discussed on this in later\
    \ chapters) classification, but also reduce variance, thus using bootstrapping\
    \ as a way to minimize the significance of the bias-variance trade-off in modeling\
    \ errors.\n\nIn the following section, we will consider another non-parametric\
    \ test called permutation testing using resampling data.\n\n# Permutations\n\n\
    Before jumping into this testing analysis, we will review some basic knowledge\
    \ of permutations and combinations.\n\n# Permutations and combinations\n\nPermutations\
    \ and combinations are two mathematical techniques for taking a set of objects\
    \ to create subsets from a population but in two different ways. The order of\
    \ objects matters in permutations but does not matter in combinations."

    \ chapters. There are no graphics or statistics that can be used to determine\
    \ whether samples are independent. *Assessing sample independence requires careful\
    \ analysis of the sampling method and the populations from which the samples are\
    \ drawn.* For example, a common type of data that violates the independence assumption\
    \ is time-series data. Time-series data is a type of data that is sampled over\
    \ time, making it serially correlated. We will discuss analysis methods for time-series\
    \ data in later chapters.\n\nIn this section, we discussed the linear regression\
    \ model assumptions. In the next section, we will discuss how to validate a linear\
    \ model, which will again utilize the model residuals.\n\n## Testing for significance\
    \ and validating models\n\nUp to this point in the chapter, we have discussed\
    \ the concepts of the OLS approach to linear regression modeling; the coefficients\
    \ in a linear model; the coefficients of correlation and determination; and the\
    \ assumptions required for modeling with linear regression. We will now begin\
    \ our discussion on testing for significance and model validation.\n\n## Testing\
    \ for significance\n\nTo test for significance, let us load `statsmodels` macrodata\
    \ data set so we can build a model that tests the relationship between real gross\
    \ private domestic investment, `realinv`, and real private disposable income,\
    \ `realdpi`:\n\n```python\nimport numpy as np\nimport pandas as pd\nimport seaborn\
    \ as sns\nimport statsmodels.api as sm\nimport matplotlib.pyplot as plt\nfrom\
    \ statsmodels.nonparametric.smoothers_lowess import lowess\ndf = sm.datasets.macrodata.load().data\n\
    ```\n\nLeast squares regression requires a constant coefficient in order to derive\
    \ the **intercept**. In the least squares equation, $X^T X \\beta = X^T y$, the\
    \ first column of the **design matrix**, $X$, requires a set of ones. However,\
    \ this `constant` must be added in directly, which we do with `statsmodels`' `add_constant`\
    \ function here:\n\n```python\ndf = sm.add_constant(df, prepend=False)\ndf_mod\
    \ = df[['realinv', 'realdpi', 'const']]\n```\n\nThe input data does not need to\
    \ be normally distributed for least squares regression. However, it is assumed\
    \ that the residuals of the model are normally distributed. However, it is useful\
    \ to see the spread of the data to get an understanding of their statistics, such\
    \ as the mean, median, and range, and whether there are outliers present. If the\
    \ residual analysis after the modeling suggests there may be some issues, having\
    \ inspected the model variables will help the analyst understand potential root\
    \ causes.\n\nWhen visualizing the relationship between *realinv* and *realdpi*,\
    \ we can see a strong linear relationship, but also a potential serial correlation\
    \ in the data as there appears to be a somewhat **cyclical oscillation** in the\
    \ data, which becomes stronger toward the extreme values, seen in the upper right\
    \ of the plot.\n\nFigure 6.12 – Visualizing the relationship between the *realinv*\
    \ and *realdpi* variables\n\nWe will analyze the potential serial correlation\
    \ seen in the preceding plot after a few more steps. First, let us fit the input\
    \ variable and coefficient to the model:\n\n```python\nols_model = sm.OLS(df_mod['realdpi'],\
    \ df_mod[['const','realinv']])\ncompiled_model = ols_model.fit()\n```\n\nNext,\
    \ we will want to print out a summary of the model performance so we can begin\
    \ to gauge the significance of the terms involved:\n\n```python\nprint(compiled_model.summary())\n\
    ```\n\nReferring to the results in *Figure 6.13*, we can see that the **95% confidence\
    \ interval** for neither the intercept, *const*, nor the input variable, *realinv*,\
    \ contains zero. Therefore, in addition to the **significant p-values** for these\
    \ variables, we can conclude they are significant contributors to the target at\
    \ the coefficients provided. Now that we have confirmed there is statistical significance\
    \ for both the intercept and the input variable and their coefficients, we want\
    \ to know the level of correlation to the target they represent. We can see the\
    \ **R-squared** statistic is 0.944. Because the two variables are the constant\
    \ and the input variable, this R-squared statistic explains only the input variable.\n\
    \n### R-squared versus adjusted r-squared\n\nFor multivariate regression, we would\
    \ look at the adjusted r-squared value, which we can also see is the same – in\
    \ the univariate/simple regression case – as the r-squared value.\n\nThe **correlation\
    \ of determination** – also called goodness of fit – of 0.944 means real gross\
    \ private domestic investment explains 94.4% of the variance in real private disposable\
    \ income.\n\nWe can see based on the table that the intercept and the `realinv`\
    \ variable are both significant in predicting the target with very low p-values.\
    \ We can also see that neither of the 95% confidence intervals contains 0, which\
    \ backs up the relevancy of their p-values. However, the confidence interval for\
    \ the constant (intercept) suggests there may be a risk of uncertainty in the\
    \ model and that more variables may be needed to reduce that uncertainty and improve\
    \ model performance. Stated differently, we could say a higher level of uncertainty\
    \ in the constant indicates the model has variance left to be explained and that\
    \ the current model is overly biased.\n\n## Validating models\n\n### The Durbin-Watson\
    \ test\n\nIt is important to acknowledge that based on the fact that data was\
    \ observed over a 50-year period and random sampling was not performed, it is\
    \ possible the residuals will have a **serial correlation**. We observe a possibility\
    \ of serial correlation in the **Durbin-Watson test** statistic of 0.095, which\
    \ suggests the residuals exhibit positive autocorrelation. The Durbin-Watson statistic\
    \ tests whether there is autocorrelation at the first time lag. This means the\
    \ Durbin-Watson tests whether the change in values between each data point is\
    \ correlated with the value of the previous data point. If that correlation exists,\
    \ it is considered **lag-one autocorrelation**.\n\n### Durbin-Watson test statistic\n\
    \nAs a rule of thumb, a Durbin-Watson test statistic below roughly 2.0 (many consider\
    \ 1.5 to 2.0 to be reasonable) is considered a flag for positive autocorrelation,\
    \ while a value above roughly 2.0 (many consider 2.0 to 2.5 to be reasonable)\
    \ indicates possible negative autocorrelation. Procedurally, a table lookup is\
    \ required to identify the critical values against which the test statistic should\
    \ be measured. The process follows the same steps for any hypothesis test with\
    \ respect to comparing the test statistic against the critical value. The Durbin-Watson\
    \ test is typically interpreted as a one-tailed test as inference from a two-tailed\
    \ test is not particularly useful. A version of the Durbin-Watson table can be\
    \ found at https://www.real-statistics.com/statistics-tables/durbin-watson-table/.\
    \ This table produces the critical values for **positive autocorrelation**. To\
    \ find the critical values for **negative autocorrelation**, the positive critical\
    \ values can be subtracted from 4.\n\nAlthough we have a Durbin-Watson statistic\
    \ that suggests serial correlation may be present in the data, we will confirm\
    \ significance by comparing the Durbin-Watson statistic to its corresponding positive\
    \ autocorrelation **table lookup** using the table found at the preceding link.\
    \ We have n=203 samples in our dataset but will use n=200 on the table lookup\
    \ since this value is likely accurate enough to assess, and 203 does not exist\
    \ in the table. At the 0.05 level of significance, which is used by default with\
    \ the Durbin-Watson statistic produced in statsmodels' OLS regression, we find\
    \ the bounds for the k=1 input variable to be [1.758, 1.779]. A value within this\
    \ range should be interpreted as **inconclusive**. A value less than the lower\
    \ bound indicates the presence of enough evidence to reject the null hypothesis\
    \ and thus conclude there is statistically significant positive autocorrelation.\
    \ A value greater than the upper bound indicates there is not enough evidence\
    \ to reject the null hypothesis and thus there is no autocorrelation. Based on\
    \ the results of our model, we can conclude with a 95% level of confidence that\
    \ there is evidence of positive serial correlation in our residuals.\n\n```\n\

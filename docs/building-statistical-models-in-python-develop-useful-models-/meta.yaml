    )\niqr = stats.iqr(values, interpolation='closest_observation')\nprint(f\"The\
    \ interquartile range is {iqr}\")\n# The quartiles are Q1: 71, Q2: 85, Q3: 88\n\
    # The interquartile range is 17\n```"

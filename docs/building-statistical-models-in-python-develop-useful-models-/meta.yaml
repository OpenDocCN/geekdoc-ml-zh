    \ OLS 的单位根检验——**迪基-富勒检验**——在统计上验证这一点。**迪基-富勒检验的原假设**是，在测试的最大滞后数（maxlag）内的某个点存在单位根（因此存在趋势）。备择假设是数据中没有单位根（没有趋势）。作为参考，备择假设指出数据是零阶\

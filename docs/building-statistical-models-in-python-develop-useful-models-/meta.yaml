    \n## 显著性检验\n\n为了进行显著性检验，让我们加载 `statsmodels` 的宏观数据集，以便构建一个模型来检验实际国内私人总投资（`realinv`）与实际私人可支配收入（`realdpi`）之间的关系：\n\
    \n```python\nimport numpy as np\nimport pandas as pd\nimport seaborn as sns\n\
    import statsmodels.api as sm\nimport matplotlib.pyplot as plt\nfrom statsmodels.nonparametric.smoothers_lowess\
    \ import lowess\ndf = sm.datasets.macrodata.load().data\n```\n\n最小二乘回归需要一个常数系数来推导**截距**。在最小二乘方程\
    \ $X^T X \\beta = X^T y$ 中，**设计矩阵** $X$ 的第一列需要一组1。然而，这个 `constant` 必须直接添加，我们在这里使用\
    \ `statsmodels` 的 `add_constant` 函数来完成：\n\n```python\ndf = sm.add_constant(df,\
    \ prepend=False)\ndf_mod = df[['realinv', 'realdpi', 'const']]\n```\n\n最小二乘回归的输入数据不需要服从正态分布。但是，假设模型的残差是正态分布的。然而，查看数据的分布有助于理解其统计特性，例如均值、中位数和范围，以及是否存在异常值。如果建模后的残差分析表明可能存在一些问题，检查模型变量将有助于分析师理解潜在的根本原因。\n\
    \n在可视化 *realinv* 和 *realdpi* 之间的关系时，我们可以看到强烈的线性关系，但数据中也存在潜在的序列相关性，因为数据似乎呈现出某种**周期性振荡**，这种振荡在极端值附近变得更强，如图右上角所示。\n\
    \n图 6.12 – 可视化 *realinv* 和 *realdpi* 变量之间的关系\n\n我们将在几个步骤之后分析前面图中看到的潜在序列相关性。首先，让我们将输入变量和系数拟合到模型中：\n\
    \n```python\nols_model = sm.OLS(df_mod['realdpi'], df_mod[['const','realinv']])\n\
    compiled_model = ols_model.fit()\n```\n\n接下来，我们将打印模型性能摘要，以便开始评估所涉及项的显著性：\n\n```python\n\
    print(compiled_model.summary())\n```\n\n参考 *图 6.13* 中的结果，我们可以看到截距 *const* 和输入变量\

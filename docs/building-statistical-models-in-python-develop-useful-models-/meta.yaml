    import numpy as np

    import pandas as pd

    import statsmodels.api as sm

    import matplotlib.pyplot as plt


    df = sm.datasets.macrodata.load().data


    df[''realinv''] = round(df[''realinv''].astype(''float32''), 2)

    df[''realdpi''] = round(df[''realdpi''].astype(''float32''), 2)



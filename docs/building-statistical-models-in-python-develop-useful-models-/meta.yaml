    and 7, but using lags this far out typically results in overfitting, especially
    when taken alongside the fact that lags 2 through 5 are not significant at the
    5% level of significance:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_305_0.png)'
  merge: -1

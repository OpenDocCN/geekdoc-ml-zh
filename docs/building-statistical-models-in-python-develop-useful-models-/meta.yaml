- img_proc: true
  md: '![](img/3de2e60811d1b90c67f6bb2d5cae034f_51_0.png)


    Note that the mean and the median of these values (84.7 and 86, respectively)
    are not the same value. In general, the mean and median will not be the same value,
    but there are special cases where the mean and median will converge.


    > **Mean and Data Types**

    As for the supported data types, the mean is valid for interval and ratio data
    since the values are added together.


    Now, we will look at how to calculate the mean with numpy. The following code
    example shows the calculation of the mean for the values in the previous example:


    ```

    import numpy as np

    values = [85, 99, 70, 71, 86, 88, 94]

    mean = np.mean(values)

    print(f"The mean value is {mean:.1f}")

    # The mean value is 84.7

    ```


    Like the median function, the mean function returns a single number.


    Before concluding this section on center measures, it is worth discussing the
    use of the mean and median in various situations. As mentioned previously, the
    median and mean will, in general, be different values. This is an effect driven
    by the shape of the distribution.


    > **Shape impacts on Mean and Median**

    If the distribution is symmetric, the mean and median will tend to converge. However,
    if the distribution is not symmetric, the mean and median will diverge.'

    In this chapter, we're going to cover the following main topics:\n\n- Probit and\
    \ logit models\n- Multinomial logit model\n- Poisson model\n- The negative binomial\
    \ regression model\n\n## Probit and logit models\n\nPreviously, we discussed different\
    \ types of problems that can be solved with regression models. In particular,\
    \ the dependent variable is continuous, such as house prices, salaries, and so\
    \ on. A natural question is if dependent variables are not continuous – in other\
    \ words, if they are categorical – how would we adapt our regression equation\
    \ to predict a categorical response variable? For instance, a human resources\
    \ department in a company wants to conduct an attrition study to predict whether\
    \ an employee will stay with the company or a car dealership wants to know if\
    \ one car can be sold or not based on prices, car models, colors, and so on.\n\
    \nFirst, we will study **binary classification**. Here, the outcome (dependent\
    \ variable) is a binary response such as yes/no or to do/not to do. Let's look\
    \ back at the simple linear regression model:\n\n$$y = \\beta_0 + \\beta_1x +\
    \ \\epsilon$$\n\nHere, the predicted outcome is a line crossing data points. With\
    \ this model, we could build a model to predict house prices (the dependent variable)\
    \ based on different independent variables, such as districts, units, stories,\
    \ or distances. The same idea cannot be applied to a binary classification problem.\
    \ Let's consider a simple example that we want to predict if a house is sold only\
    \ based on its price. Let's build a model based on linear regression:\n\n$$Sold\
    \ = \\beta_0 + \\beta_1 * Price + \\epsilon \\quad (1)$$\n\nHere, $Sold = 1$ if\
    \ the house is sold and $Sold=0$ if it was not sold. By performing visualization\
    \ using linear regression, we can draw a line of best fit through the data points.\
    \ It looks like when the price increases, the chance of selling a house decreases:\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_226_0.png)\n\nFigure 8.1 – Line of\
    \ best fit using linear regression\n\nSo, instead of considering the equation\
    \ model (1), we will be considering the following:\n\n$$Prob(Sold) = \\beta_0\
    \ + \\beta_1 * Price + \\epsilon$$\n\nHere, $Prob(Sold)$ is the probability of\
    \ selling a house. The probability value will be between 0 and 1; the midpoint\
    \ of its range is 0.5 when the probability of selling a house is equal to the\
    \ probability of not selling a house. However, when the price of a house is very\
    \ high, then the value of $Prob(Sold)$ can be negative. To avoid this problem,\
    \ we can model the problem with the following equation:\n\n$$\\frac{P}{1-P} =\
    \ \\beta_0 + \\beta_1 * Price + \\epsilon \\quad (2)$$\n\nHere, $P$ is the probability\
    \ of selling a house and $1 - P$ is the probability of not selling a house. The\
    \ value of $\\frac{P}{1-P}$ is in the range of $[0, \\infty)$ and when the probability\
    \ of selling a car is the same as the probability of not selling a car, ($P=0.5$),\
    \ then $\\frac{P}{1-P} = 1$, or the midpoint of its range is 1. This is also called\
    \ the **odds ratio**. To interpret the odds ratio, when $\\frac{P}{1-P} = 1$,\
    \ for every house that is sold, there is a house that is not sold. When $P = 0.75$,\
    \ then the odds ratio is 3. In this case, the interpretation is that the odds\
    \ of being able to sell the house are three times higher than the odds of not\
    \ being able to sell the house. Going back to the equation (2), the range of the\
    \ odds ratio is $[0, \\infty)$ and its lower limit is 0, but as we discussed previously\
    \ for equation (1), when the price of a house is really high, then the estimate\
    \ of the odds ratio could be negative, which contradicts the probability properties.\
    \ In addition, because the midpoint is 1 but the range of the odds ratio is from\
    \ 0 to infinity, then the distribution is very skewed with a long right tail.\
    \ However, we expected it to be normally distributed per one of the assumptions\
    \ of linear regression. So, instead of using equation (2), we will consider the\
    \ following:\n\n$$\\log(\\frac{P}{1-P}) = \\beta_0 + \\beta_1 * Price + \\epsilon$$\n\
    \nThe value of $\\log(\\frac{P}{1-P})$ is in the range of $(-\\infty, \\infty)$\
    \ and the midpoint is 0. Similar to linear regression, we can use the following\
    \ formula:\n\n$$\\log(odds) = \\log(\\frac{P}{1-P}) = \\beta_0 + \\beta_1 X_1\
    \ + \\beta_2 X_2 + \\dots = z \\quad (3)$$\n\nWe can use this to interpret how\
    \ the explanatory variables are associated with the categorical outcome. We can\
    \ rewrite the previous equation (3) as follows:\n\n$$F(z) = P = \\frac{e^z}{1\
    \ + e^z},$$\n\nThe preceding formula is bounded below by 0 and above by 1 (the\
    \ predicted probability, P, of the outcome takes place) and is called the logit\
    \ model. It is the cumulative distribution function of the **logistic distribution**.\n\
    \nAnother approach to model the probability of a binary dependent variable is\
    \ **probit regression**. Instead of using the cumulative distribution function\
    \ of logistic regression, we use the cumulative distribution function of the standard\

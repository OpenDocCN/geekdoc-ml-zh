    # ARIMAX


    In the previous chapter, we discussed the ARIMA family of models and demonstrated
    how to model univariate time-series data. However, as we mentioned in the previous
    section, many time series are multivariate, such as stock data, weather data,
    or economic data. In this section, we will discuss how we can incorporate information
    from covariate variables when modeling time-series data.


    When we model a multivariate time series, we typically have a variable we are
    interested in forecasting. This variable is commonly called the **endogenous**
    variable. The other covariates in the multivariate time series are called **exogenous**
    variables. Recall from *Chapter 11, ARIMA Models*, the equation representing the
    ARIMA model:


    ```

    $$y''_{t} = c + \phi_{1} y''_{t-1} + \dots + \phi_{p} y''_{t-p} + \epsilon_{t}
    + \theta_{1} \epsilon_{t-1} + \dots + \phi_{q} \epsilon_{t-q}$$

    ```


    Here, $y''_{t}$ is the differenced series, differenced $d$ times until it is stationary.
    In this model, $y_{t}$ is the variable we are interested in forecasting; it is
    the endogenous variable. Let us rewrite this equation in a more compact form.
    We collect the terms related to $y''_{t}$ into one summation and the terms related
    to $\epsilon_{t}$ into another summation. Let us start with the $y''_{t}$ terms:


    ```

    $$\phi_{1} y''_{t-1} + \dots + \phi_{p} y''_{t-p} = \sum_{i=1}^{p} \phi_{i} y''_{t-i}$$

    ```


    Then, we will also collect the $\epsilon_{t}$ terms into different summations:


    ```

    $$\epsilon_{t} + \theta_{1} \epsilon_{t-1} + \dots + \phi_{q} \epsilon_{t-q} =
    \epsilon_{t} + \sum_{j=1}^{q} \phi_{j} \epsilon_{t-j}$$

    ```


    Putting these summations together, we get the following more compact version of
    our ARIMA equation:


    ```

    $$y''_{t} = c + \sum_{i=1}^{p} \phi_{i} y''_{t-i} + \epsilon_{t} + \sum_{j=1}^{q}
    \phi_{j} \epsilon_{t-j}$$

    ```'

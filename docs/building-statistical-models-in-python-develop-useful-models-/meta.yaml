- md: "Let us consider the one-sample t-test in the following section.\n\n## One-sample\
    \ t-test\n\nSimilar to the one-sample z-test, the null and alternative hypotheses\
    \ need to be considered in order to perform the hypothesis test. Three null and\
    \ alternative hypotheses corresponding to left-tailed, right-tailed, and two-tailed\
    \ t-tests are presented as follows:\n\n$H_0: \\mu \\geq \\mu_0$ &nbsp;&nbsp;&nbsp;&nbsp;\
    \ $H_0: \\mu \\leq \\mu_0$ &nbsp;&nbsp;&nbsp;&nbsp; $H_0: \\mu = \\mu_0$\n\n$H_a:\
    \ \\mu < \\mu_0$ &nbsp;&nbsp;&nbsp;&nbsp; $H_a: \\mu > \\mu_0$ &nbsp;&nbsp;&nbsp;&nbsp;\
    \ $H_a: \\mu \\neq \\mu_0$\n\nNext, the level of significance, $\\alpha$, needs\
    \ to be specified following the research purpose. There are two approaches: the\
    \ p-value approach and the critical value approach. In the p-value approach, the\
    \ rejection rule (reject $H_0$—the null hypothesis) is when the p-value is less\
    \ than or equal to the specified level of significance chosen. In the critical\
    \ value approach, the rejection rule is when the test statistic is less than or\
    \ equal to the critical value $-t_{\\alpha}$ for the left-tailed t-test, the test\
    \ statistic is greater than or equal to $t_{\\alpha}$ for a right-tailed t-test,\
    \ and the test statistic is less than or equal to $-t_{\\alpha/2}$ or greater\
    \ than or equal to $t_{\\alpha/2}$ for a two-tailed test. The last step is to\
    \ interpret the statistical conclusion for the hypothesis test.\n\nTo find the\
    \ p-value based on the value of the student t distribution, we can use the following\
    \ syntax:\n\n```\nscipy.stats.t.sf(abs(x), df)\n```\n\nHere, x is the test statistic\
    \ and df is the degree of freedom (df = n-1 where $n$ is the sample size) in the\
    \ formula.\n\nFor example, to find the p-value associated with a t-score of 1.9\
    \ with the degree of freedom 14 in a left-tailed test, this would be the Python\
    \ implementation:\n\n```\nimport scipy.stats\nround(scipy.stats.t.sf(abs(1.9),\
    \ df=14),4)\n```\n\nThe output would be 0.0391. If the level of significance $\\\

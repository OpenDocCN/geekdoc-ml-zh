  md: '# # Simple Linear Regression


    In previous chapters, we worked with distributions of single variables. Now we
    will discuss the relationships between variables. In this chapter and the next
    chapter, we will investigate the relationship between two or more variables using
    linear regression. In this chapter, we will discuss simple linear regression within
    the framework of **Ordinary Least Squares (OLS)** regression. Simple linear regression
    is a very useful tool for estimating continuous values from two linearly related
    variables. We will provide an overview of the intuitions and calculations behind
    regression errors. Next, we will provide an overview of the pertinent assumptions
    of linear regression. After that, we will analyze the output summary of OLS in
    `statsmodels`, and finally, we will address the scenarios of serial correlation
    and model validation. As highlighted, our main topics in this chapter follow this
    framework:


    +   - Simple linear regression using OLS

    - Coefficients of correlation and determination

    - Required model assumptions

    - Test for significance

    - Handling model errors

    - Validating models


    # ## Simple linear regression using OLS


    We will study one of the simplest machine learning models – simple linear regression.
    We will provide its overview within the context of OLS, where the objective is
    to minimize the sum of the square of errors. It is a straightforward concept related
    to a dependent variable (quantitative response) $y$ and its independent variable
    $x$, where their relationship can be drawn as a straight line, approximately.
    Mathematically, a simple linear regression model can be written in the following
    form:


    $$y = \beta_0 + \beta_1 x + \epsilon$$'
  merge: -1
  pgno: 165
- img_proc: true
  md: 'Here, $\beta_0$ is the intercept term and $\beta_1$ is the slope of the linear
    model. The error term is denoted as $\epsilon$ in the preceding linear model.
    We can see that in an ideal case where the error term is zero, $\beta_0$ represents
    the value of the dependent variable $y$ at $x = 0$. Within the range of the independent
    variable $x$, $\beta_1$ represents the increase in the outcome $y$ corresponding
    to a unit change in $x$. In literature, the independent variable $x$ can be called
    the explanatory variable, predictor, input, or feature and the dependent variable
    $y$ can be called the response variable, output, or target. The question is raised,
    “If we have a sample from a dataset $(x_i, y_i)$ with $i = 1, 2, \dots, n$ points),
    how do we determine a line of best fit using the intercept term and the slope?”
    By estimating these terms, we will fit the best line through the data to show
    the linear relationship between the independent variable and the dependent variable.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_166_0.png)


    Figure 6.1 – The relationship between x and y – Line of best fit


    In the preceding plot example, the blue points are actual values representing
    the relationship between the independent variable $x$ and the dependent variable
    $y$. The red line is the line of best fit through all these data points. Our objective
    now is to formulate the predicted line (the line of best fit):


    $$\hat{y} = \widehat{\beta}_0 + \widehat{\beta}_1 x$$'
  merge: -1
  pgno: 166
- img_proc: true
  md: 'Take a closer look at the relationship between the predicted values and the
    true values. In order to find the line of best fit, we will minimize the vertical
    distances, meaning that we will minimize the errors between the points and the
    line through the data. In other words, we will minimize the sum of square errors,
    which is computed by the following:


    $$\sum_{i=1}^{n} e_i^2$$


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_167_0.png)


    Figure 6.2 – Errors between data points and the line through the data


    Here,


    $$e_i = y_i - \widehat{y}_i,$$


    where $y_i$ is the observed value and $\widehat{y}_i$ is the predicted value of
    the response variable $y$ for the $i^{th}$ observation. The sum of the square
    of errors is given by:


    $$S = \sum_{i=1}^{n} (y_i - \widehat{\beta}_0 - \widehat{\beta}_1 x_i)^2$$


    To minimize S, we will take the partial derivatives with respect to $\widehat{\beta}_0$
    and $\widehat{\beta}_1$. Then, we see:


    $$\frac{\partial S}{\partial \widehat{\beta}_0} = -2\sum(y_i - \widehat{\beta}_0
    - \widehat{\beta}_1 x_i) = 0,$$


    $$\frac{\partial S}{\partial \widehat{\beta}_1} = -2\sum x_i(y_i - \widehat{\beta}_0
    - \widehat{\beta}_1 x_i) = 0.$$


    Therefore, it is easy to see that:


    $$n\widehat{\beta}_0 + (\sum_{i=1}^{n} x_i)\widehat{\beta}_1 = \sum_{i=1}^{n}
    y_i,$$


    $$(\sum_{i=1}^{n} x_i)\widehat{\beta}_0 + (\sum_{i=1}^{n} x_i^2)\widehat{\beta}_1
    = \sum_{i=1}^{n} x_i y_i,$$'
  merge: -1
  pgno: 167
- img_proc: true
  md: "This implies:\n\n$$\\widehat{\\beta_0} = \\frac{\\sum_{i=1}^n y_i}{n} - \\\
    widehat{\\beta_1} \\frac{\\sum_{i=1}^n x_i}{n},$$\n\n$$\\frac{\\sum_{i=1}^n x_i\
    \ \\sum_{i=1}^n y_i}{n} - \\frac{(\\sum_{i=1}^n x_i)^2}{n} \\widehat{\\beta_1}\
    \ + (\\sum_{i=1}^n x_i^2) \\widehat{\\beta_1} = \\sum_{i=1}^n x_i y_i.$$\n\nBecause\
    \ $\\bar{y} = \\frac{\\sum_{i=1}^n y_i}{n}$ and $\\bar{x} = \\frac{\\sum_{i=1}^n\
    \ x_i}{n}$, we can rewrite the slope and intercept as follows:\n\n$$\\widehat{\\\
    beta_0} = \\bar{y} - \\widehat{\\beta_1} \\bar{x},$$\n\n$$\\widehat{\\beta_1}\
    \ = \\frac{\\sum (x_i - \\bar{x})(y_i - \\bar{y})}{\\sum (x_i - \\bar{x})^2}.$$\n\
    \nIn Python, we can implement the following code to find $\\widehat{\\beta_0}$\
    \ and $\\widehat{\\beta_1}$ as follows:\n\n```\npython\ndef least_squares_method(x,\
    \ y):\n    x_mean = x.mean()\n    y_mean = y.mean()\n    beta1 = ((x - x_mean)\
    \ * (y - y_mean)).sum(axis=0) / ((x - x.mean()) ** 2).sum(axis=0)\n    beta0 =\
    \ y_mean - (beta1 * x_mean)\n    return beta0, beta1\n```\n\n# Coefficients of\
    \ correlation and determination\n\nIn this section, we will discuss two related\
    \ notions – coefficients of correlation and coefficients of determination.\n\n\
    # Coefficients of correlation\n\nA coefficient of correlation is a measure of\
    \ the statistical linear relationship between two variables and can be computed\
    \ using the following formula:\n\n$$r = \\frac{1}{n-1} \\sum_{i=1}^n \\left( \\\
    frac{x_i - \\bar{x}}{s_x} \\right) \\left( \\frac{y_i - \\bar{y}}{s_y} \\right)$$\n\
    \nThe reader can go here – https://shiny.rit.albany.edu/stat/corrsim/ – to simulate\
    \ the correlation relationship between two variables."

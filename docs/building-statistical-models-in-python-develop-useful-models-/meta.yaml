    ## 降维


    在本节中，我们将使用一种特定技术——**主成分回归**——来研究多元线性回归。当我们需要处理多重共线性数据问题时，这种技术非常有用。多重共线性发生在回归模型中，一个自变量与另一个自变量高度相关，或者一个自变量可以从另一个自变量预测出来时。高相关性在拟合模型时可能会对结果产生不良影响。


    主成分回归技术基于无监督机器学习中用于数据压缩和探索性分析的主成分分析。其背后的思想是使用降维技术主成分分析，对这些原始变量进行处理，以创建新的不相关变量。从这些新变量中获得的信息有助于我们理解变量之间的关系，然后将多元线性回归算法应用于这些新变量。主成分分析技术也可用于分类问题，我们将在下一章讨论。


    ## 主成分分析——实践入门


    主成分分析是一种基于线性代数的降维技术，它通过使用原始变量的线性组合将数据线性变换到一个新的坐标系中。这些新的线性组合被称为**主成分**。主成分分析技术与前面章节提到的特征选择技术或收缩方法的区别在于，原始自变量被保留，但新的主成分变量被变换到一个新的坐标空间中。换句话说，主成分分析使用原始数据来获得一种新的表示或新的结构。主成分变量的数量与原始自变量的数量相同，但这些新的主成分变量彼此不相关。主成分变量是按照从最大到最小的变异性顺序创建和排序的。原始自变量和新变换的主成分变量的方差总和是相同的。


    在进行主成分分析之前，我们对数据集进行预处理，从每个数据点中减去均值，并标准化每个自变量的标准差。从高层次结构来看，主成分分析技术的目标是找到向量 $v_1,
    v_2, \dots, v_k$，使得数据集中的任何数据点 $x$ 都可以近似表示为一个线性组合：


    $$x = \sum_{i=1}^{k} a_i v_i$$


    其中 $a_i$ 是常数，$i = \overline{1, k}$。假设我们有这 $k$ 个向量；那么，每个数据点都可以写成 $R^k$ 中的一个向量，对应于投影：


    $$x = \langle x, v_1 \rangle \cdot v_1 + \langle x, v_2 \rangle \cdot v_2 + \dots
    + \langle x, v_k \rangle \cdot v_k$$


    换句话说，如果我们有 $d$ 个原始自变量，我们将构建一个 $d \times k$ 维的变换矩阵，可以将任何数据点映射到一个新的 $k$ 维变量子空间，其中
    $k$ 小于 $d$。这意味着我们通过对原始自变量进行线性变换实现了降维。主成分分析有多种应用，但这里我们将引用一篇发表在《自然》杂志（2008年）上的论文《欧洲内部的基因镜像地理》（https://pubmed.ncbi.nlm.nih.gov/18758442/）。作者考虑了一个包含3000名欧洲个体的样本，这些个体在人类基因组中超过50万个可变DNA位点进行了基因分型；然后，每个个体使用超过50万个遗传标记来表示。这意味着它产生了一个维度大于3000
    x 500,000的矩阵。他们对数据集进行了主成分分析，以找到最有意义的向量 $v_1$ 和 $v_2$（第一和第二主成分），其中每个人只对应两个数字。作者根据这两个数字在二维平面上绘制了每个人，然后根据他们来自的国家为每个点着色。



    \ 表示 V 型，`vs`=1 表示直列）、变速箱类型（`am`=0 表示自动，`am`=1 表示手动）、齿轮数（`gear`）和化油器数量（`carb`）（如果不是燃油喷射）等变量：\n\
    \n```python\nimport statsmodels.api as sm\ndf_cars = sm.datasets.get_rdataset(\"\
    mtcars\", \"datasets\").data\n```\n\n在图 4.19 中，我们可以看到数据集的前五行，该数据集包含适合进行皮尔逊相关分析的数据。\n\

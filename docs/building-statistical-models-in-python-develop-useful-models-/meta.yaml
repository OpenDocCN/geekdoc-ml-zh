    Mathematically, we typically represent a multivariate time-series as a vector-valued
    series, as follows:


    ```

    $$X = \begin{bmatrix} x_{0,0} & x_{1,0} & \dots & x_{t,0} \ x_{0,1} & x_{1,1}
    & \dots & x_{t,1} \ \vdots & \vdots & \ddots & \vdots \end{bmatrix}$$

    ```


    Here, each $X$ instance consists of multiple values at each time step, and there
    are $t$ steps in the series. The first index in the preceding equation represents
    the time step (0 through $t$), and the second index represents the individual
    series (0 through $N$ variables). For example, if $X$ were a time series of stock
    prices, at each time step of $X$, there would be a value of each stock price.
    In that case, $X$ might look like the following equation if the first two stock
    symbols in the series were AAPL and GOOGL:


    ```

    $$X = \begin{bmatrix} x_{0, AAPL} & x_{1, AAPL} & \dots & x_{t, AAPL} \ x_{0,
    GOOGL} & x_{1, GOOGL} & \dots & x_{t, GOOGL} \ \vdots & \vdots & \ddots & \vdots
    \end{bmatrix}$$

    ```


    When we have a multivariate time series, a question arises: *What can we do with
    this additional information?* To answer that question, we need to understand whether
    these time-series variables are related. We can determine how time series are
    related by looking at their cross-correlation. Let''s discuss cross-correlation
    next.


    # Time-series cross-correlation


    We need to understand how time series can be related in order to determine whether
    covariate time series may be useful for forecasting a time series of interest.
    In a previous chapter, we discussed how to understand the relationship between
    two variables using plots and correlation coefficients; we will take a similar
    approach for the time-series data. Recall the following **cross-correlation function**
    (CCF) discussed in *Chapter 10, Introduction to Time Series*:


    ```

    $$\hat{\rho}_k(X, Y) = \frac{\sum_{t=1}^{n-k} (X_t - \bar{X})(Y_{t-k} - \bar{Y})}{\sqrt{\sum_{t=1}^n
    (X_t - \bar{X})^2} \sqrt{\sum_{t=1}^n (Y_t - \bar{Y})^2}}$$

    ```


    Here, $X$ is a univariate time series and $Y$ is a univariate time series. This
    function tells us how $X$ and $Y$ are related at $k$ lags. In this equation, $Y$
    is $k$ time steps behind $X$. In this situation, we say that $X$ is leading $Y$
    by $k$ steps or $Y$ is lagging $X$ by $k$ steps. We will use this CCF to help
    us determine whether two time series are related and at which time steps they
    are related. Notice that if $X = Y$, then the CCF reduces to the **autocorrelation
    function** (ACF).


    > **Cross-correlation significance**

    Just as with the ACF, cross-correlations have a threshold for statistical significance.
    We consider any cross-correlation value with an absolute value greater than $1.96/\sqrt{N}$
    (where $N$ is the sample size of the time series) to be significantly different
    from zero.'

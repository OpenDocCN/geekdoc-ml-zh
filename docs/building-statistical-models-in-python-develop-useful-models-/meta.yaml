- img_proc: true
  md: 'Stated in terms of the probability of success, $p$, the negative binomial variance
    is calculated as follows:


    $$n \frac{1-p}{p^2}$$


    It has the following mean:


    $$n \frac{1-p}{p}$$


    Because the variance is not expected to equal the mean with the negative binomial
    model, the negative binomial is likely to outperform the Poisson approach *when
    the counts are large enough that the variance in response exceeds the mean*. Similarly,
    to Poisson, a negative binomial is a log-linear model with confidence intervals
    being based on the Wald and drop-in-deviance likelihood ratio. The form of the
    negative binomial model''s regression equation, shown here, is the same as that
    for Poisson regression:


    $$\ln(y) = b_0 + b_1 x_1 + \dots + b_n x_n$$


    It reduces to the following:


    $$y = e^{b_0} + e^{b_1 x_1} + \dots + e^{b_n x_n}$$


    The **maximum likelihood estimate** of the probability of success for a given
    sample of the distribution is as follows:


    $$\frac{n}{n + \bar{x}''}$$


    > **Maximum likelihood estimation**


    **Maximum likelihood estimation (MLE)** is an underpinning of the log-odds (or
    logit) and log-likelihood approaches to statistical modeling. Likelihood is the
    probability of the known outcome of a regression model being observed given specific
    regression coefficient values. By default, a set of variables will have a higher
    likelihood than another set of variables if the set provides a higher probability
    of the observed outcome being obtained. The logarithm of the likelihood is taken
    as a measure of goodness-of-fit for a regression model. Out of a set of potential
    coefficient values for each variable, the set of coefficients with the maximum
    log-likelihood values for each variable are referred to as the **maximum likelihood
    estimates**. These values are obtained through an iterative approach that generates
    multiple possible values. If the sample size is sufficiently large and an appropriate
    set of variables has been obtained for the model, the maximum likelihood estimates
    can be considered unbiased.


    Calculating the confidence intervals for negative binomial regression is similar
    to that for logistic regression. The **Wald** approach to the calculation leverages
    a **z-ratio**. Where there are $j$ variables in the model, the z-ratio is calculated
    as follows:


    $$\frac{(\hat{\beta}_j - \beta_j)}{SE(\hat{\beta}_j)}$$'

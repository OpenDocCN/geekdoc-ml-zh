- md: "## Fitting an ARIMA model with seasonality\n\nWe will take the following steps\
    \ to fit an ARIMA model with seasonality:\n\n- Remove seasonality with differencing.\n\
    - Remove additional non-stationarity with differencing.\n- Fit a stationary model\
    \ to the resulting series.\n\nThis is essentially the same process we used to\
    \ fit an ARIMA model, but there is an additional step to handle the seasonal component.\
    \ Let us walk through an example with the airline data.\n\nWe will start with\
    \ using differencing to remove the seasonal component of the time series. Recall\
    \ that the seasonal period of the airline time series is 12, meaning that we need\
    \ to perform differencing at lag 12 as shown with this equation:\n\n$y'_t = y_t\
    \ - y_{t-12}$\n\nWe can perform this difference using the `diff` function from\
    \ `pmdarima`. The following code shows how to perform the 12th lagged difference\
    \ on the airline data:\n\n```\nimport pmdarima as pm\nfrom sktime import datasets\n\
    y_airline = datasets.load_airline()\nseries = pm.utils.diff( y_airline.values,\
    \ lag=12)\n```\n\nAfter performing the seasonal difference, we get the differenced\
    \ series shown in *Figure 11.23* along with the ACF plot. The seasonal portion\
    \ of the time series appears to be completely removed. The differenced series\
    \ does not appear to exhibit any repeating patterns. Additionally, the ACF plot\
    \ does not show the seasonal peak that was present in the ACF plot of the original\
    \ data:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_327_0.png)\n\nFigure 11.23\
    \ – Airline data after seasonal difference\n\nWith the seasonal portion of the\
    \ time series removed, we need to determine whether we need to take any additional\
    \ differences to stationarize the new time series. The differenced series in *Figure\
    \ 11.23* appears to exhibit a trend. The original data also exhibited a trend.\
    \ As before, we can use the Dickey-Fuller test to get additional evidence on whether\
    \ we should apply additional differences. Running the Dickey-Fuller test on this\
    \ series will result in a p-value of 0.099, which suggests that we should take\
    \ a difference in the series to account for a unit root:\n\n```\npython\nadf_test\
    \ = pm.arima.ADFTest()\nadf_test.should_diff(series)\n# (0.09898694171553156,\
    \ True)\n```\n\nTaking the first difference of the series will result in the series\
    \ shown in *Figure 11.24*. After taking these two differences the series appears\
    \ to be sufficiently stationarized.\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_328_0.png)\n\
    \nThe series in *Figure 11.24* shows the stationarized version of the airline\
    \ data. Based on the ACF plot, we should be able to fit a relatively simple ARMA\
    \ model to the stationarized series. We will use `auto_arima` function to make\
    \ an automatic fit as we did in the ARIMA section:\n\n```\npm.auto_arima(\n  \
    \  series, error_action='ignore', trace=False,\n    suppress_warnings=True, maxiter=5,\
    \ seasonal=False,\n    test='adf'\n)\n# ARIMA(1,0,0)(0,0,0)[0]\n```\n\nFitting\
    \ the differenced data with `auto_arima` returns an AR(1) model. A simple model\
    \ as we expected.\n\nPutting this all together our resulting model is an ARIMA(1,1,0,12).\
    \ As with the previous ARIMA example, we could have fit this model with `auto_arima`,\
    \ but we walked through the differencing steps here to help build intuition for\
    \ what each difference element does to the series. Let's take a look at the direct\
    \ fit from `auto_arima` now:\n\n```\npm.auto_arima(\n    y_airline.values, error_action='ignore',\
    \ trace=True,\n    suppress_warnings=True, maxiter=5, seasonal=True, m=12,\n \
    \   test='adf'\n)\n# Best model:  ARIMA(1,1,0)(0,1,0)[12]\n```\n\nWe see that\
    \ `auto_arima` found the same model that we did using manual differencing. Note\
    \ the model is denoted in SARIMA format (see earlier callout about SARIMA). The\
    \ (0,1,0)[12] means seasonality of 12 with one difference for the seasonality.\
    \ Now that we have a fit model, let's look at forecasting for our seasonal model.\n\
    \n## Forecasting ARIMA with seasonality\n\nOnce we have a fit model, we can forecast\
    \ with that model. As mentioned in the section on forecasting with ARIMA, when\
    \ should we make a train-test split so we have data to compare with the predictions?\
    \ We will use the same procedure: split the data, train the model, and forecast\
    \ over the test set size:\n\n```\ntrain, test = train_test_split(y_airline.values,\
    \ train_size=0.9)\nsarima = pm.auto_arima(\n    train, error_action='ignore',\
    \ trace=True,\n    suppress_warnings=True, maxiter=5, seasonal=True, m=12,\n \
    \   test='adf'\n)\npreds, conf_int = sarima.predict(n_periods=test.shape[0], return_conf_int=True)\n\
    ```\n\nThe preceding code fits a full SARIMA model with `auto_arima` and then\
    \ forecasts the size of the test set using the `predict` method. The forecasts\
    \ for the series generated by the code are shown in *Figure 11.25*.\n\n310 ARIMA\
    \ Models\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_330_0.png)\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_330_1.png)\n\
    \nFigure 11.25 – SARIMA forecast of the airline data\n\nThe forecast of the airline\
    \ data in *Figure 11.25* appears to capture the variation of the data very well.\
    \ This is likely due to the strength of the seasonality component in the time\
    \ series. Note that the prediction intervals increase over time just as with the\
    \ ARIMA prediction intervals, but the intervals follow the general pattern of\
    \ the series. This is an impact of the additional knowledge of seasonality in\
    \ the series.\n\nIn this section, we discussed ARIMA models with seasonality and\
    \ showed how to remove seasonal components. We also looked at forecasting a model\
    \ with seasonality. In the next section, we will take a closer look at validating\
    \ time series models.\n\n## More on model evaluation\n\nIn the previous sections,\
    \ we discussed other methods to prepare data, test and validate models. In this\
    \ section, we will discuss how to validate time series models and introduce several\
    \ methods for validating time series models. We will cover the following methods\
    \ for model evaluation: **resampling, shifting, optimized persistence forecasting,\
    \ and rolling window forecasting**.\n\nThe real-world dataset considered in this\
    \ section is Coca Cola stock data collected from Yahoo Finance databases from\
    \ 01/19/1962 to 12/19/2021 for stock price prediction. This is a time series analysis\
    \ to forecast the future stock value of a given stock. The reader can download\
    \ the dataset from the Kaggle platform for this analysis. To motivate the study,\
    \ we first go to explore the Coco Cola stock dataset:\n\n```\ndata = pd.read_csv(\"\
    COCO COLA.csv\", parse_dates=[\"Date\"], index_col=\"Date\")\n```\n\n| Date |\
    \ Open | High | Low | Close | Adj Close | Volume |\n|---|---|---|---|---|---|---|\n\
    | 1962-01-02 | 0.263021 | 0.270182 | 0.263021 | 0.263021 | 0.051133 | 806400 |\n\
    | 1962-01-03 | 0.259115 | 0.259115 | 0.253255 | 0.257161 | 0.049994 | 1574400\
    \ |\n| 1962-01-04 | 0.257813 | 0.261068 | 0.257813 | 0.259115 | 0.050374 | 844800\
    \ |\n| 1962-01-05 | 0.259115 | 0.262370 | 0.252604 | 0.253255 | 0.049234 | 1420800\
    \ |\n| 1962-01-08 | 0.251302 | 0.251302 | 0.245768 | 0.250651 | 0.048728 | 2035200\
    \ |\n\nFigure 11.26 – Coco Cola dataset\n\nThe Date index is related to 15096\
    \ trading days from 01/19/1962 to 12/19/2021. The **High** and **Low** columns\
    \ here refer to the maximum and minimum prices on each trading day. **Open** and\
    \ **Close** refer to the stock prices when the market was open and closed on the\
    \ same trading day. The total amount of trading stocks in each day refers to the\
    \ **Volume** column and the last column (**Adj Close**) refers to adjusted values\
    \ (combining with stock splits, dividends, etc.). To illustrate how resampling,\
    \ shifting, rolling windows, and expanding windows perform, we narrow down to\
    \ use only the **Open** column from the year 2016:\n\n```\ndata= data[data.index>='2016-01-01'][['Open']]\n\
    ```\n\nThe data was collected by trading dates. However, we will perform the study\
    \ monthly. The **resampling** technique is used to aggregate data from days to\
    \ months. This idea motivates us to introduce this technique.\n\n## Resampling\n\
    \n**Resampling** is a method to deal with time frequency. We use this method to\
    \ change time series data frequency by a new time frequency. There are **upsampling**\
    \ and **downsampling**. In upsampling, the *frequency of the samples is increased*\
    \ using interpolation, for instance, from day frequency to minute or second frequency.\
    \ On the other hand, downsampling is used to *decrease the sample time frequency*\
    \ using summary statistics to aggregate the current time frequency in a dataset\
    \ to a new time frequency. Resampling can be used in feature engineering and also\
    \ used for problem framing when time frequency in the dataset is not available\
    \ for our analysis purposes. In Python, we can use the `resample()` function to\
    \ change time frequencies. The following code illustrates the resampling technique\
    \ in Python:\n\n```\nfig, ax = plt.subplots(4,1, figsize=(12,8))\nax[0].set_title('Original\
    \ stock price from 2016')\nax[0].plot(data)\nax[1].plot(data.resample('7D').mean())\n\
    ax[1].set_title('7 days - Downsampling stock price from 2016')\nax[2].plot(data.resample('M').mean())\n\
    ax[2].set_title('Monthly Downsampling stock price from 2016')\nax[3].plot(data.resample('Y').mean())\n\
    ax[3].set_title('Yearly Downsampling stock price from 2016')\nfig.tight_layout(pad=5.0)\n\
    plt.show()\n```"
  mdcn: "## 拟合具有季节性的ARIMA模型\n\n我们将按照以下步骤来拟合一个具有季节性的ARIMA模型：\n\n-   通过差分去除季节性。\n- \
    \  通过差分去除额外的非平稳性。\n-   对得到的序列拟合一个平稳模型。\n\n这本质上与我们拟合ARIMA模型的过程相同，但多了一个处理季节性成分的步骤。让我们以航空数据为例进行说明。\n\
    \n我们将从使用差分去除时间序列的季节性成分开始。回顾一下，航空时间序列的季节性周期是12，这意味着我们需要在滞后12处进行差分，如以下公式所示：\n\n\
    $y'_t = y_t - y_{t-12}$\n\n我们可以使用`pmdarima`中的`diff`函数来执行这个差分。以下代码展示了如何对航空数据进行12阶滞后差分：\n\
    \n```\nimport pmdarima as pm\nfrom sktime import datasets\ny_airline = datasets.load_airline()\n\
    series = pm.utils.diff( y_airline.values, lag=12)\n```\n\n执行季节性差分后，我们得到了如*图11.23*所示的差分序列及其ACF图。时间序列的季节性部分似乎已被完全移除。差分序列没有表现出任何重复的模式。此外，ACF图也没有显示出原始数据ACF图中存在的季节性峰值：\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_327_0.png)\n\n图11.23 – 季节性差分后的航空数据\n\
    \n在移除了时间序列的季节性部分后，我们需要确定是否需要进行任何额外的差分以使新的时间序列平稳化。*图11.23*中的差分序列表现出趋势。原始数据也表现出趋势。和之前一样，我们可以使用迪基-富勒检验来获取是否应该应用额外差分的额外证据。对该序列运行迪基-富勒检验将得到一个0.099的p值，这表明我们应该对序列进行差分以考虑单位根：\n\
    \n```\npython\nadf_test = pm.arima.ADFTest()\nadf_test.should_diff(series)\n#\
    \ (0.09898694171553156, True)\n```\n\n对该序列进行一阶差分将得到如*图11.24*所示的序列。经过这两次差分后，序列似乎已经充分平稳化。\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_328_0.png)\n\n*图11.24*中的序列显示了航空数据的平稳化版本。根据ACF图，我们应该能够对平稳化序列拟合一个相对简单的ARMA模型。我们将使用`auto_arima`函数进行自动拟合，就像在ARIMA部分所做的那样：\n\
    \n```\npm.auto_arima(\n    series, error_action='ignore', trace=False,\n    suppress_warnings=True,\
    \ maxiter=5, seasonal=False,\n    test='adf'\n)\n# ARIMA(1,0,0)(0,0,0)[0]\n```\n\
    \n使用`auto_arima`拟合差分数据返回了一个AR(1)模型。正如我们预期的那样，这是一个简单的模型。\n\n将所有这些结合起来，我们最终的模型是ARIMA(1,1,0,12)。与之前的ARIMA示例一样，我们本可以使用`auto_arima`来拟合这个模型，但这里我们逐步演示了差分过程，以帮助建立对每个差分元素如何影响序列的直观理解。现在让我们看看`auto_arima`的直接拟合结果：\n\
    \n```\npm.auto_arima(\n    y_airline.values, error_action='ignore', trace=True,\n\
    \    suppress_warnings=True, maxiter=5, seasonal=True, m=12,\n    test='adf'\n\
    )\n# Best model:  ARIMA(1,1,0)(0,1,0)[12]\n```\n\n我们看到`auto_arima`找到了与我们使用手动差分相同的模型。注意该模型以SARIMA格式表示（参见前面关于SARIMA的说明）。(0,1,0)[12]表示季节性周期为12，并对季节性进行了一次差分。现在我们有了一个拟合好的模型，让我们来看看季节性模型的预测。\n\
    \n## 具有季节性的ARIMA预测\n\n一旦我们有了一个拟合好的模型，我们就可以用它进行预测。正如在ARIMA预测部分提到的，我们应该在什么时候进行训练-测试划分，以便有数据与预测进行比较？我们将使用相同的程序：划分数据、训练模型，并在测试集大小上进行预测：\n\
    \n```\ntrain, test = train_test_split(y_airline.values, train_size=0.9)\nsarima\
    \ = pm.auto_arima(\n    train, error_action='ignore', trace=True,\n    suppress_warnings=True,\
    \ maxiter=5, seasonal=True, m=12,\n    test='adf'\n)\npreds, conf_int = sarima.predict(n_periods=test.shape[0],\
    \ return_conf_int=True)\n```\n\n前面的代码使用`auto_arima`拟合了一个完整的SARIMA模型，然后使用`predict`方法预测了测试集的大小。代码生成的序列预测如*图11.25*所示。\n\
    \n310 ARIMA模型\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_330_0.png)\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_330_1.png)\n\
    \n图11.25 – 航空数据的SARIMA预测\n\n*图11.25*中航空数据的预测似乎很好地捕捉了数据的变化。这可能是由于时间序列中季节性成分的强度所致。请注意，预测区间随时间增加，就像ARIMA预测区间一样，但这些区间遵循序列的一般模式。这是序列中季节性额外知识的影响。\n\
    \n在本节中，我们讨论了具有季节性的ARIMA模型，并展示了如何移除季节性成分。我们还研究了具有季节性模型的预测。在下一节中，我们将更仔细地研究时间序列模型的验证。\n\
    \n## 关于模型评估的更多内容\n\n在前面的章节中，我们讨论了准备数据、测试和验证模型的其他方法。在本节中，我们将讨论如何验证时间序列模型，并介绍几种验证时间序列模型的方法。我们将涵盖以下模型评估方法：**重采样、移位、优化持久性预测和滚动窗口预测**。\n\
    \n本节考虑的真实世界数据集是从雅虎财经数据库收集的可口可乐股票数据，时间范围从1962年1月19日到2021年12月19日，用于股票价格预测。这是一个时间序列分析，用于预测给定股票的未来价值。读者可以从Kaggle平台下载该数据集进行此分析。为了激发研究兴趣，我们首先探索可口可乐股票数据集：\n\
    \n```\ndata = pd.read_csv(\"COCO COLA.csv\", parse_dates=[\"Date\"], index_col=\"\
    Date\")\n```\n\n| 日期 | 开盘价 | 最高价 | 最低价 | 收盘价 | 调整后收盘价 | 成交量 |\n|---|---|---|---|---|---|---|\n\
    | 1962-01-02 | 0.263021 | 0.270182 | 0.263021 | 0.263021 | 0.051133 | 806400 |\n\
    | 1962-01-03 | 0.259115 | 0.259115 | 0.253255 | 0.257161 | 0.049994 | 1574400\
    \ |\n| 1962-01-04 | 0.257813 | 0.261068 | 0.257813 | 0.259115 | 0.050374 | 844800\
    \ |\n| 1962-01-05 | 0.259115 | 0.262370 | 0.252604 | 0.253255 | 0.049234 | 1420800\
    \ |\n| 1962-01-08 | 0.251302 | 0.251302 | 0.245768 | 0.250651 | 0.048728 | 2035200\
    \ |\n\n图11.26 – 可口可乐数据集\n\n日期索引对应于从1962年1月19日到2021年12月19日的15096个交易日。这里的**最高价**和**最低价**列指的是每个交易日的最高和最低价格。**开盘价**和**收盘价**指的是同一个交易日市场开盘和收盘时的股票价格。每天的总交易股票数量指的是**成交量**列，最后一列（**调整后收盘价**）指的是调整后的数值（结合了股票拆分、股息等）。为了说明重采样、移位、滚动窗口和扩展窗口如何工作，我们缩小范围，仅使用2016年的**开盘价**列：\n\
    \n```\ndata= data[data.index>='2016-01-01'][['Open']]\n```\n\n数据是按交易日期收集的。然而，我们将按月进行研究。**重采样**技术用于将数据从日聚合到月。这个想法促使我们介绍这项技术。\n\
    \n## 重采样\n\n**重采样**是一种处理时间频率的方法。我们使用这种方法通过新的时间频率来改变时间序列数据的频率。有**上采样**和**下采样**。在上采样中，*样本的频率通过插值增加*，例如，从日频率到分钟或秒频率。另一方面，下采样用于*降低样本时间频率*，使用汇总统计将数据集中的当前时间频率聚合到新的时间频率。重采样可用于特征工程，也可用于问题框架，当数据集中的时间频率不适用于我们的分析目的时。在Python中，我们可以使用`resample()`函数来改变时间频率。以下代码说明了Python中的重采样技术：\n\
    \n```\nfig, ax = plt.subplots(4,1, figsize=(12,8))\nax[0].set_title('2016年原始股票价格')\n\

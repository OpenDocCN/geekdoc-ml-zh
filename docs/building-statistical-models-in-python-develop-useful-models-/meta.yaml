  md: "Here, we see the following:\n\n+   - x1: The first of the two independent samples\n\
    - x2: The second of the two independent samples (if performing a two-sample z-test)\n\
    - value: In the one-sample case, value is the mean of x1 under the null hypothesis.\
    \ In the two-sample case, value is the difference between the mean of x1 and the\
    \ mean of x2 under the null hypothesis. The test statistic is x1_mean - x2_mean\
    \ - value.\n- alternative: The alternative hypothesis:\n  'two-sided': Two-sided\
    \ test\n  'larger': Right-tailed test\n  'smaller': Left-tailed test\n\nThe following\
    \ Python code shows how we perform a one-sample z-test:\n\n```\nfrom statsmodels.stats.weightstats\
    \ import ztest as ztest\n\n#IQ scores after training sections\nIQscores = [95,110,\
    \ 105, 120, 125, 110, 98, 90, 99, 100,\n            110, 112, 106, 92, 108, 97,\
    \ 95, 99, 100, 100,\n            103, 125, 122, 110, 112, 102, 92, 97, 89, 102]\n\
    \n#perform one sample z-test\nz_statistic, p_value = ztest(IQscores, value=98,\
    \ alternative = 'larger')\n\nprint(f\"The test statistic is {z_statistic} and\
    \ the corresponding p-value is {p_value}.\")\n```\n\nThe test statistic is 3.3975\
    \ and the p-value = 0.00034 < 0.05, where 0.05 is the level of significance. Therefore,\
    \ we have enough evidence to reject the null hypothesis. This means that the training\
    \ does affect the IQ levels of these students.\n\n# Two-sample z-test\n\nWe consider\
    \ two normally distributed and independent populations. Let Ω be the hypothesized\
    \ difference between two population means, μ₁ and μ₂. Similarly, as in the case\
    \ of the one-sample z-test, we have three forms for the null and alternative hypotheses:\n\
    \n$H_0: \\mu_1 - \\mu_2 \\geq \\Omega$ &nbsp;&nbsp;&nbsp;&nbsp; $H_0: \\mu_1 -\
    \ \\mu_2 \\leq \\Omega$ &nbsp;&nbsp;&nbsp;&nbsp; $H_0: \\mu_1 - \\mu_2 = \\Omega$\n\
    \n$H_a: \\mu_1 - \\mu_2 < \\Omega$ &nbsp;&nbsp;&nbsp;&nbsp; $H_a: \\mu_1 - \\\
    mu_2 > \\Omega$ &nbsp;&nbsp;&nbsp;&nbsp; $H_a: \\mu_1 - \\mu_2 \\neq \\Omega$"

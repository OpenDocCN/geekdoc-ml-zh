    | 2 | 7 (the patient died in year 7 but the study ended in year 5) | 5 (the study
    ends in year 5) | 0 (because the censoring was observed) |

    | 3 | No information | 4 (the patient dropped out of the study) | 0 (because the
    censoring was observed) |


    Figure 13.2 – Survival analysis for a cancer study


    The following figure illustrates information about 3 patients in the cancer study.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_377_0.png)


    # Survival Function, Hazard and Hazard Ratio


    Let us first discuss the survival function. The formula of the function is defined
    as


    $S(t) = P(T > t)$


    and represents the probability that the object survives past time $t$. The survival
    function is a non-increasing function with $t$ ranges from 0 to $\infty$. When
    $t = 0, S(t) = 1$ and when $t = \infty, S(t) = S(\infty) = 0$. It is a smooth
    function theoretically but practically, *events occur on a discrete time scale*
    (days, weeks, years).'
- md: '## 14 Survival Models


    In *Chapter 13, Time-to-Event Variables*, we introduced the topics of survival
    analysis, censoring, and **time-to-event (TTE)** variables. In this chapter, we
    will provide an in-depth overview and walkthrough of the implementation of these
    techniques with respect to three primary model frameworks:


    - Kaplan-Meier model

    - Exponential model

    - Cox Proportional Hazards model


    We will discuss how each approach provides probabilistic insight into the survival
    and hazard risk of study subjects using univariate Kaplan-Meier and exponential
    approaches as well as the multivariate Cox Proportional Hazards regression model.
    We''ll walk through examples using real data and discuss the results so that the
    reader understands how to assess performance and translate test output into useful
    information. Finally, we will show how to use the trained models to provide forecast
    probabilities for unseen data.


    ### Technical requirements


    In this chapter, we use an additional Python library for survival analysis: `lifelines`.
    Please install the following versions of these libraries to run the provided code.
    Instructions for installing libraries can be found in *Chapter 1, Sampling and
    Generalization*:


    - `lifelines== 0.27.4`


    More information about `lifelines` can be found at this link:

    `https://lifelines.readthedocs.io/en/latest/index.html`


    ### Kaplan-Meier model


    The first model for survival analysis we will discuss is the **Kaplan-Meier model**
    (also called the **Kaplan-Meier estimator**). We will start this section with
    a discussion model definition and learn how it is built. Then, we will close this
    section with an example of how to use this model in Python using the `lifelines`
    library. Let''s get started.


    #### Model definition


    The Kaplan-Meier estimator is defined by the following formula:


    $$\hat{S}(t) = \prod_{t_i \le t} \frac{n_i - d_i}{n_i}$$


    Here, $n_i$ is the number of subjects at risk just before time $t$, $d_i$ is the
    number of death events at time $t$, and $\hat{S}(t)$ (the survival function) is
    the probability that life is longer than $t$. The $\Pi$ symbol used in the formula
    is like the symbol $\Sigma$; however, $\Pi$ indicates multiplication. This means
    that the preceding formula will result in a multiplication of fractions for each
    time step $t$. This means that the Kaplan-Meier estimator is a series of declining
    horizontal steps. To make this clear, let''s take a look at its application with
    some example data.


    Let''s say that we have the following data, where the `duration` column represents
    how long a subject survived and the `death` column indicates whether a death was
    observed in the study. Let''s walk through the calculations for the Kaplan-Meier
    estimator for this data:


    | duration | death |

    |---|---|

    | 5 | 1 |

    | 7 | 1 |

    | 3.5 | 1 |

    | 8 | 0 |

    | 2 | 1 |

    | 5 | 1 |


    Figure 14.1 – Death and duration example data


    Initially (at $t = 0$), all subjects are at risk, but no subjects have died. That
    means the current survival rate is 1. We calculate the value of the survival function
    at $t = 0$ as follows:


    $$\hat{S}(0) = \frac{n_0 - d_0}{n_0} = \frac{6 - 0}{6} = 1$$


    The first event occurs at $t = 2$. At this point, all subjects (six subjects)
    are at risk just before the event, and one subject dies at this time. We calculate
    the current survival rate at this point, then multiply this value by all the previous
    values. The survival rate at $t = 2$ is given here:


    $$\frac{n_2 - d_2}{n_2} = \frac{6 - 1}{6} \approx 0.83$$


    Then, we calculate the survival function at $t = 2$:


    $$\hat{S}(2) = \frac{\frac{n_0 - d_0}{n_0} * n_2 - d_2}{n_2} = \frac{\frac{6 -
    0}{6} * 6 - 1}{6} \approx 0.83$$


    The next event occurs at $t = 3.5$. We repeat the process as outlined previously.
    However, there are only five subjects at risk at this point since one has already
    died. Thus, the current survival rate at time $t = 3.5$ is this:


    $$\frac{n_3 - d_3}{n_3} = \frac{5 - 1}{5} = 0.8$$


    Then, we calculate the survival function at this point:


    $$\hat{S}(3.5) = \frac{\frac{n_0 - d_0}{n_0} * n_2 - d_2 * n_{3.5} - d_{3.5}}{n_{3.5}}
    = \frac{\frac{6 - 0}{6} * 6 - 1 * 5 - 1}{5} \approx 0.67$$


    The next event occurs at $t = 5$, where two subjects die. At $t = 5$, there are
    four remaining subjects at risk, and two subjects die. Thus, we have a survival
    rate of 0.5 at $t = 5$. The new value of the survival function is calculated as
    follows:


    $$\hat{S}(5) = 1 * 0.83 * 0.67 * 0.5 \approx 0.33$$


    The final event occurs at $t = 7$. At this point, the survival rate is 0.5 and
    the value of the survival function at this point is approximately 0.167:


    $$\hat{S}(7) = 1 * 0.83 * 0.67 * 0.5 * 0.5 \approx 0.167$$


    Since our study ends here, this is the final value of the survival function, and
    the function value remains constant through the end of the study.


    As you can see, this survival model is simple to calculate. Notice also that we
    did not mention assumptions or underlying statistical distributions. The Kaplan-Meier
    estimator is a nonparametric survival model. As we discussed in *Chapter 5, Non-Parametric
    Tests*, this means it can be used as an alternative to parametric models when
    the data under analysis does not meet the assumptions of parametric models. The
    Kaplan-Meier estimator is a useful model to have in your tool belt for that reason.


    Now that we have had a walkthrough of how this model works, let''s look at how
    to calculate the Kaplan-Meier estimator survival function with the `lifelines`
    package in Python.


    ## Summary


    In this chapter, we provided an overview of time-to-event variable analysis and
    how it differs from other statistical analyses that we have studied in the previous
    chapters. We covered censoring intuition (left, right, and interval censoring)
    and discussed Type I and Type II censoring. We also discussed non-informative
    and informative events in this chapter. We then discussed survival data and the
    relationship between survival and censoring times and how we record survival data
    with censoring. The survival function, hazard, and hazard ratio were also mentioned
    in the last section of this chapter.


    In the next chapter, we will consider the non-parametric Kaplan-Meier model, the
    parametric exponential model, and also the semiparametric Cox Proportional Hazards
    model. We will perform real data analysis in Python by applying these models for
    survival analysis.


    ## 13 Survival Analysis


    In this example, we go back to the cancer study that spanned 5 years. At time
    zero, when the study started, the survival probability was 1 or 100% but at year
    5, the probability of survival was close to 0.2 or 20%.


    Now we consider the *Stanford heart transplant dataset*. The dataset contains
    the information of 103 patients who participated in an experimental heart transplant
    program (see *Figure 13.5*). The patients were seriously ill and had the potential
    to obtain some benefit from being part of the program, as they could be waiting
    anywhere from a few weeks to several months to receive a new heart from a donor.
    The CSV dataset can be downloaded at https://www.openintro.org/data/csv/heart_transplant.csv.


    | id | acceptyear | age | survived | survtime | prior | transplant | wait |

    |---|---|---|---|---|---|---|---|

    | 0 | 15 | 68 | 53 | dead | 1 | no | control | NaN |

    | 1 | 43 | 70 | 43 | dead | 2 | no | control | NaN |

    | 2 | 61 | 71 | 52 | dead | 2 | no | control | NaN |

    | 3 | 75 | 72 | 52 | dead | 2 | no | control | NaN |

    | 4 | 6 | 68 | 54 | dead | 3 | no | control | NaN |


    Figure 13.5 – First five rows of Stanford transplant data


    We are interested in two features here: *survived* (recording the survival status
    of dead versus alive) and *survtime* (the number of days the patients survived
    after they were determined to be a candidate for a heart transplant until the
    study ended). When we sort the data by *survtime*, among the first 15 observations,
    the patient in row 13 is still alive as shown in *Figure 13.6*. Therefore, the
    observation at row number 13 is time censored.


    | survtime | survived |

    | :--- | :--- |

    | 0 | 1 dead |

    | 1 | 2 dead |

    | 2 | 2 dead |

    | 3 | 2 dead |

    | 4 | 3 dead |

    | 5 | 3 dead |

    | 6 | 3 dead |

    | 7 | 5 dead |

    | 8 | 5 dead |

    | 9 | 6 dead |

    | 10 | 6 dead |

    | 11 | 8 dead |

    | 12 | 9 dead |

    | 13 | 11 alive |

    | 14 | 12 dead |


    Figure 13.6 – Status of first 15 transplant patients


    In this example, to calculate the probability of survival beyond survtime = 3,
    we just need to calculate the **probability of survival** in each interval of
    time $[t_0, t_1], (t_1, t_2], (t_2, t_3]$, which is calculated by


    $$P(\text{Survival in } (t_{i-1}, t_i]) = 1 - P(\text{Dead in } (t_{i-1}, t_i]
    \mid \text{Alive in } t_{i-1})$$


    where


    $$P(\text{Dead in } (t_{i-1}, t_i] \mid \text{Alive in } t_{i-1}) = \frac{\text{number
    of deaths in } (t_{i-1}, t_i]}{\text{number of alives at } t_{i-1}},$$


    then


    $$S(t_3) = P(\text{Survival} > t_3) = \left(1 - \frac{0}{103}\right) * \left(1
    - \frac{1}{103}\right) * \left(1 - \frac{3}{102}\right) = 96.12\%.$$


    Next, we discuss hazard function or hazard rate. The **hazard function** is defined
    as


    $$h(t) = \lim_{\Delta t \to 0} \frac{Pr(t < T \le t + \Delta t \mid T > t)}{\Delta
    t},$$


    *the instantaneous rate at which events occur given survival up to that time.
    In other words, it is just the probability of dying in the next few seconds or
    the next day given being alive now. The hazard ratio is* a ratio of death probabilities.
    For example, when a hazard ratio is 3, then the given group has 3 times the chance
    of dying compared to another group.'
  mdcn: '## 14 生存模型


    在*第13章，事件发生时间变量*中，我们介绍了生存分析、删失以及**事件发生时间（TTE）**变量的主题。在本章中，我们将针对三种主要的模型框架，深入概述并逐步讲解这些技术的实现：


    - Kaplan-Meier模型

    - 指数模型

    - Cox比例风险模型


    我们将讨论每种方法如何利用单变量Kaplan-Meier和指数方法以及多变量Cox比例风险回归模型，为研究对象的生存和风险概率提供洞察。我们将通过真实数据示例进行讲解并讨论结果，以便读者理解如何评估性能并将测试输出转化为有用信息。最后，我们将展示如何使用训练好的模型为未见数据提供预测概率。


    ### 技术要求


    在本章中，我们使用一个额外的Python库进行生存分析：`lifelines`。请安装以下版本的库以运行提供的代码。安装库的说明可在*第1章，抽样与泛化*中找到：


    - `lifelines== 0.27.4`


    关于`lifelines`的更多信息，请参见此链接：

    `https://lifelines.readthedocs.io/en/latest/index.html`


    ### Kaplan-Meier模型


    我们将讨论的第一个生存分析模型是**Kaplan-Meier模型**（也称为**Kaplan-Meier估计量**）。本节将从讨论模型定义开始，了解其构建方式。然后，我们将以一个如何在Python中使用`lifelines`库应用此模型的示例结束本节。让我们开始吧。


    #### 模型定义


    Kaplan-Meier估计量由以下公式定义：


    $$\hat{S}(t) = \prod_{t_i \le t} \frac{n_i - d_i}{n_i}$$


    这里，$n_i$是时间$t$之前的风险受试者数量，$d_i$是时间$t$的死亡事件数量，$\hat{S}(t)$（生存函数）是生命长于$t$的概率。公式中使用的$\Pi$符号类似于$\Sigma$符号；然而，$\Pi$表示乘法。这意味着前面的公式将导致每个时间步长$t$的分数相乘。这意味着Kaplan-Meier估计量是一系列递减的水平阶梯。为了清楚起见，让我们通过一些示例数据来看看它的应用。


    假设我们有以下数据，其中`duration`列代表受试者存活了多久，`death`列指示研究中是否观察到死亡。让我们逐步计算此数据的Kaplan-Meier估计量：


    | duration | death |

    |---|---|

    | 5 | 1 |

    | 7 | 1 |

    | 3.5 | 1 |

    | 8 | 0 |

    | 2 | 1 |

    | 5 | 1 |


    图14.1 – 死亡和持续时间示例数据


    最初（在$t = 0$时），所有受试者都处于风险中，但没有受试者死亡。这意味着当前的生存率为1。我们按如下方式计算$t = 0$时的生存函数值：


    $$\hat{S}(0) = \frac{n_0 - d_0}{n_0} = \frac{6 - 0}{6} = 1$$


    第一个事件发生在$t = 2$。此时，在事件发生之前，所有受试者（六名受试者）都处于风险中，并且有一名受试者在此时死亡。我们计算此时的当前生存率，然后将此值与所有先前的值相乘。$t
    = 2$时的生存率如下所示：


    $$\frac{n_2 - d_2}{n_2} = \frac{6 - 1}{6} \approx 0.83$$


    然后，我们计算$t = 2$时的生存函数：


    $$\hat{S}(2) = \frac{\frac{n_0 - d_0}{n_0} * n_2 - d_2}{n_2} = \frac{\frac{6 -
    0}{6} * 6 - 1}{6} \approx 0.83$$


    下一个事件发生在$t = 3.5$。我们重复前面概述的过程。然而，此时只有五名受试者处于风险中，因为已经有一名死亡。因此，时间$t = 3.5$时的当前生存率是：


    $$\frac{n_3 - d_3}{n_3} = \frac{5 - 1}{5} = 0.8$$


    然后，我们计算此时的生存函数：


    $$\hat{S}(3.5) = \frac{\frac{n_0 - d_0}{n_0} * n_2 - d_2 * n_{3.5} - d_{3.5}}{n_{3.5}}
    = \frac{\frac{6 - 0}{6} * 6 - 1 * 5 - 1}{5} \approx 0.67$$


    下一个事件发生在$t = 5$，有两名受试者死亡。在$t = 5$时，有四名剩余受试者处于风险中，两名受试者死亡。因此，我们在$t = 5$时的生存率为0.5。生存函数的新值计算如下：


    $$\hat{S}(5) = 1 * 0.83 * 0.67 * 0.5 \approx 0.33$$


    最后一个事件发生在$t = 7$。此时，生存率为0.5，生存函数的值约为0.167：


    $$\hat{S}(7) = 1 * 0.83 * 0.67 * 0.5 * 0.5 \approx 0.167$$


    由于我们的研究到此结束，这是生存函数的最终值，并且函数值在研究结束前保持不变。


    如您所见，这个生存模型计算起来很简单。还要注意，我们没有提及假设或潜在的统计分布。Kaplan-Meier估计量是一个非参数生存模型。正如我们在*第5章，非参数检验*中所讨论的，这意味着当分析的数据不满足参数模型的假设时，它可以作为参数模型的替代方案。因此，Kaplan-Meier估计量是您工具箱中一个有用的模型。


    既然我们已经了解了这个模型的工作原理，让我们看看如何在Python中使用`lifelines`包计算Kaplan-Meier估计量生存函数。


    ## 总结


    在本章中，我们概述了事件发生时间变量分析及其与我们在前面章节中研究的其他统计分析的区别。我们涵盖了删失直觉（左删失、右删失和区间删失），并讨论了I型和II型删失。我们还在本章中讨论了非信息性和信息性事件。然后我们讨论了生存数据以及生存时间与删失时间之间的关系，以及我们如何记录带有删失的生存数据。生存函数、风险函数和风险比也在本章的最后一节中提及。


    在下一章中，我们将考虑非参数Kaplan-Meier模型、参数指数模型以及半参数Cox比例风险模型。我们将通过在Python中应用这些模型进行生存分析来执行真实数据分析。


    ## 13 生存分析


    在这个例子中，我们回到跨越5年的癌症研究。在时间零点，研究开始时，生存概率为1或100%，但在第5年，生存概率接近0.2或20%。


    现在我们考虑*斯坦福心脏移植数据集*。该数据集包含103名参与实验性心脏移植计划的患者信息（见*图13.5*）。患者病情严重，有可能从参与该计划中获得一些益处，因为他们可能需要等待几周到几个月才能从捐赠者那里获得新的心脏。CSV数据集可从https://www.openintro.org/data/csv/heart_transplant.csv下载。


    | id | acceptyear | age | survived | survtime | prior | transplant | wait |

    |---|---|---|---|---|---|---|---|

    | 0 | 15 | 68 | 53 | dead | 1 | no | control | NaN |

    | 1 | 43 | 70 | 43 | dead | 2 | no | control | NaN |

    | 2 | 61 | 71 | 52 | dead | 2 | no | control | NaN |

    | 3 | 75 | 72 | 52 | dead | 2 | no | control | NaN |

    | 4 | 6 | 68 | 54 | dead | 3 | no | control | NaN |


    图13.5 – 斯坦福移植数据的前五行


    我们在这里对两个特征感兴趣：*survived*（记录死亡与存活的生存状态）和*survtime*（患者从被确定为心脏移植候选者到研究结束所存活的天数）。当我们按*survtime*对数据进行排序时，在前15个观察值中，第13行的患者仍然存活，如*图13.6*所示。因此，第13行的观察值是时间删失的。


    | survtime | survived |

    | :--- | :--- |

    | 0 | 1 dead |

    | 1 | 2 dead |

    | 2 | 2 dead |

    | 3 | 2 dead |

    | 4 | 3 dead |

    | 5 | 3 dead |

    | 6 | 3 dead |

    | 7 | 5 dead |

    | 8 | 5 dead |

    | 9 | 6 dead |

    | 10 | 6 dead |

    | 11 | 8 dead |

    | 12 | 9 dead |

    | 13 | 11 alive |

    | 14 | 12 dead |


    图13.6 – 前15名移植患者的状态


    在这个例子中，要计算survtime = 3之后的生存概率，我们只需要计算每个时间区间$[t_0, t_1], (t_1, t_2], (t_2, t_3]$中的**生存概率**，其计算公式为：


    $$P(\text{在 } (t_{i-1}, t_i] \text{中生存}) = 1 - P(\text{在 } (t_{i-1}, t_i] \text{中死亡}
    \mid \text{在 } t_{i-1} \text{时存活})$$


    其中


    $$P(\text{在 } (t_{i-1}, t_i] \text{中死亡} \mid \text{在 } t_{i-1} \text{时存活}) = \frac{\text{在
    } (t_{i-1}, t_i] \text{中的死亡人数}}{\text{在 } t_{i-1} \text{时的存活人数}},$$


    那么


    $$S(t_3) = P(\text{生存} > t_3) = \left(1 - \frac{0}{103}\right) * \left(1 - \frac{1}{103}\right)
    * \left(1 - \frac{3}{102}\right) = 96.12\%.$$


    接下来，我们讨论风险函数或风险率。**风险函数**定义为


    $$h(t) = \lim_{\Delta t \to 0} \frac{Pr(t < T \le t + \Delta t \mid T > t)}{\Delta
    t},$$


    *给定存活到该时间，事件发生的瞬时速率。换句话说，它就是在接下来的几秒钟或第二天死亡的概率，前提是现在还活着。风险比是*死亡概率的比率。例如，当风险比为3时，那么给定组的死亡机会是另一组的3倍。'

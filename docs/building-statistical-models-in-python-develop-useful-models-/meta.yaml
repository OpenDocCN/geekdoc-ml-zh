  - '[PAGE 382]


    # Kaplan-Meier model


    The first model for survival analysis we will discuss is the **Kaplan-Meier model**
    (also called the **Kaplan-Meier estimator**). We will start this section with
    a discussion model definition and learn how it is built. Then, we will close this
    section with an example of how to use this model in Python using the `lifelines`
    library. Let''s get started.


    # Model definition


    The Kaplan-Meier estimator is defined by the following formula:


    $$\hat{S}(t) = \prod_{t_i \le t} \frac{n_i - d_i}{n_i}$$


    Here, $n_i$ is the number of subjects at risk just before time $t$, $d_i$ is the
    number of death events at time $t$, and $\hat{S}(t)$ (the survival function) is
    the probability that life is longer than $t$. The $\Pi$ symbol used in the formula
    is like the symbol $\Sigma$; however, $\Pi$ indicates multiplication. This means
    that the preceding formula will result in a multiplication of fractions for each
    time step $t$. This means that the Kaplan-Meier estimator is a series of declining
    horizontal steps. To make this clear, let''s take a look at its application with
    some example data.


    Let''s say that we have the following data, where the `duration` column represents
    how long a subject survived and the `death` column indicates whether a death was
    observed in the study. Let''s walk through the calculations for the Kaplan-Meier
    estimator for this data:


    | duration | death |

    |---|---|

    | 5 | 1 |

    | 7 | 1 |

    | 3.5 | 1 |

    | 8 | 0 |

    | 2 | 1 |

    | 5 | 1 |


    Figure 14.1 – Death and duration example data


    Initially (at $t = 0$), all subjects are at risk, but no subjects have died. That
    means the current survival rate is 1. We calculate the value of the survival function
    at $t = 0$ as follows:


    $$\hat{S}(0) = \frac{n_0 - d_0}{n_0} = \frac{6 - 0}{6} = 1$$'
  - '[PAGE 383]


    The first event occurs at $t = 2$. At this point, all subjects (six subjects)
    are at risk just before the event, and one subject dies at this time. We calculate
    the current survival rate at this point, then multiply this value by all the previous
    values. The survival rate at $t = 2$ is given here:


    $$\frac{n_2 - d_2}{n_2} = \frac{6 - 1}{6} \approx 0.83$$


    Then, we calculate the survival function at $t = 2$:


    $$\hat{S}(2) = \frac{\frac{n_0 - d_0}{n_0} * n_2 - d_2}{n_2} = \frac{\frac{6 -
    0}{6} * 6 - 1}{6} \approx 0.83$$


    The next event occurs at $t = 3.5$. We repeat the process as outlined previously.
    However, there are only five subjects at risk at this point since one has already
    died. Thus, the current survival rate at time $t = 3.5$ is this:


    $$\frac{n_3 - d_3}{n_3} = \frac{5 - 1}{5} = 0.8$$


    Then, we calculate the survival function at this point:


    $$\hat{S}(3.5) = \frac{\frac{n_0 - d_0}{n_0} * n_2 - d_2 * n_{3.5} - d_{3.5}}{n_{3.5}}
    = \frac{\frac{6 - 0}{6} * 6 - 1 * 5 - 1}{5} \approx 0.67$$


    The next event occurs at $t = 5$, where two subjects die. At $t = 5$, there are
    four remaining subjects at risk, and two subjects die. Thus, we have a survival
    rate of 0.5 at $t = 5$. The new value of the survival function is calculated as
    follows:


    $$\hat{S}(5) = 1 * 0.83 * 0.67 * 0.5 \approx 0.33$$


    The final event occurs at $t = 7$. At this point, the survival rate is 0.5 and
    the value of the survival function at this point is approximately 0.167:


    $$\hat{S}(7) = 1 * 0.83 * 0.67 * 0.5 * 0.5 \approx 0.167$$


    Since our study ends here, this is the final value of the survival function, and
    the function value remains constant through the end of the study.


    As you can see, this survival model is simple to calculate. Notice also that we
    did not mention assumptions or underlying statistical distributions. The Kaplan-Meier
    estimator is a nonparametric survival model. As we discussed in *Chapter 5, Non-Parametric
    Tests*, this means it can be used as an alternative to parametric models when
    the data under analysis does not meet the assumptions of parametric models. The
    Kaplan-Meier estimator is a useful model to have in your tool belt for that reason.


    Now that we have had a walkthrough of how this model works, let''s look at how
    to calculate the Kaplan-Meier estimator survival function with the `lifelines`
    package in Python.'
- md: '## Model example


    For this example, we will use the `larynx` dataset from `lifelines`. This dataset
    consists of six variables: `time`, `age`, `death`, `Stage_II`, `Stage_III`, and
    `Stage_IV`. The information for this dataset is limited, so we will make the following
    assumptions about the variables for the purposes of this example:


    - `time` is the amount of time a patient lived after diagnosis of larynx cancer

    - `age` is the age of the patient at the time of diagnosis

    - `death` indicates whether the death was observed during the study

    - `Stage_II` indicates that the cancer was at stage two at the time of diagnosis

    - `Stage_III` indicates that the cancer was at stage three at the time of diagnosis

    - `Stage_IV` indicates that the cancer was at stage four at the time of diagnosis

    - When a patient is not indicated in stage two or above, they were in stage one
    at the time of diagnosis


    Let''s start by calculating the survival function of all the patients in the study.
    We will use `KaplanMeierFitter` from `lifelines`. This is an object that will
    be the Kaplan-Meier model we just discussed. To fit this model, we will use the
    `fit()` method, which takes two arguments: `duration` and `event_observed`. `duration`
    is how long the patient lived in the study. `event_observed` is whether the death
    was observed: `True` for observed and `False` for not observed. The data is already
    set up to work with these two arguments. We can fit the model as follows:


    ```python

    import matplotlib.pyplot as plt

    from lifelines import datasets

    from lifelines.fitters.kaplan_meier_fitter import KaplanMeierFitter

    data = datasets.load_larynx()

    kmf = KaplanMeierFitter()

    kmf.fit(data.time, data.death)

    # this prints the first 5 elements of the survival function

    kmf.survival_function_.head()

    ```


    The output of the preceding code is shown in *Figure 14.2*, which is the first
    five elements of the survival function:


    | timeline | KM_estimate |

    | :--- | :--- |

    | 0.0 | 1.000000 |

    | 0.1 | 0.988889 |

    | 0.2 | 0.977778 |

    | 0.3 | 0.944444 |

    | 0.4 | 0.933333 |


    Figure 14.2 – First five elements of the larynx survival function


    The elements of the survival function shown in *Figure 14.2* are slowly decreasing,
    which is indicative of patients dying over time. However, it''s difficult to get
    the full story from a series of numbers. Let''s plot this series. We can also
    get the confidence intervals from the `KaplanMeierFitter` object, as shown in
    the next code block:


    ```python

    fig, ax = plt.subplots(1)

    kmf.survival_function_.plot(ax=ax)

    ci = kmf.confidence_interval_survival_function_

    index = ci.index

    ci_low, ci_high = ci.values[:, 0], ci.values[:, 1]

    ax.fill_between(index, ci_low, ci_high, color=''gray'', alpha=0.3)

    ```


    This code results in the plot shown in *Figure 14.3*, which is the survival function
    over time:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_386_0.png)


    The Kaplan-Meier estimator survival function for the larynx data is shown in *Figure
    14.3*. This function decreases over time until the last observed death at time
    step 8 where the function remains constant until the end of the study.


    Now, consider we have a few features in this dataset that we may want to compare.
    For example, we have the stages of cancer at the initial diagnosis, and we have
    the ages of the individuals. Let us start by comparing the survival functions
    of two age groups. Then, let us compare the survival functions of groups based
    on the cancer stage.


    The ages of individuals in the study range from about 40 to 85, with the bulk
    of the individuals in the range of 60 to 80 years old. Let''s split the individuals
    into groups at the age of 65. Anyone younger than 65 will be in the younger group,
    and anyone 65 or older will be in the older group. The survival functions for
    the two groups are shown in *Figure 14.4*:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_387_0.png)


    Figure 14.4 – Larynx survival functions for older and younger groups


    The survival functions for the older and younger group shown in *Figure 14.4*
    appear to exhibit little difference until around time step 7. However, the confidence
    intervals never appear to diverge. It appears that age does not appear to be a
    strong factor for survival based on this data.


    Now, let''s do a similar survival analysis with the various stages. As mentioned
    previously, we will assume that any individual that is not indicated in stage
    two or above was diagnosed as stage one. The survival functions for these groups
    are shown in *Figure 14.5*:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_387_1.png)


    Figure 14.5 – Larynx survival functions based on stage


    The survival functions for the groups based on stage are shown in *Figure 14.5*.
    This plot omits the confidence intervals for plot clarity. Based on the plot,
    there does not appear to be a significant difference between stage one and stage
    two. We start to see a difference at stage three. The difference between stage
    four and the other stages is distinctly noticeable.


    In this section, we discussed the Kaplan-Meier model for survival, which is a
    nonparametric model for survival data. We also discussed how to compare the survival
    functions of multiple groups within a set. In the next section, we will discuss
    the exponential model, which is a parametric model for survival data.


    ## Exponential model


    In the last section, we studied the non-parametric **Kaplan-Meier survival model**.
    We will now bridge parametric modeling with the **exponential model** and then
    will discuss a semi-parametric model, the **Cox Proportional Hazards model**,
    in the next section. Before considering the exponential model, we will review
    what the exponential distribution is and why we mention it in this section. This
    distribution is based on the Poisson process. Here, events occur independently
    over time and the event rate, λ, is calculated by the number of occurrences per
    unit of time, as follows:


    $$\lambda = \frac{Y}{t}$$


    The Poisson distribution is a **statistical discrete distribution** concerning
    the number of events occurring in a specified time period. It is defined as follows.
    Let $Y$ be the number of occurrences in time $t$. $Y$ follows the Poisson distribution
    with parameter $\lambda$ if a probability mass function is given by the following
    formula:


    $$f(Y) = Pr(y = Y) = \frac{e^{-\lambda}\lambda^Y}{Y!}$$


    The mean and the variance of the discrete variable $y$ are equal to the event
    rate. Instead of focusing on how many events occur in a specific time period,
    we can think about how long the event occurs; that''s why the exponential distribution
    is considered in this section. Let $T$ be the time until the event occurs ($Y
    = 1$). The probability density function is calculated by the following formula:


    $$f(t) = P(T = t) = \lambda e^{-\lambda t}$$


    And the cumulative distribution function is calculated as follows:


    $$F(t) = P(T \leq t) = 1 - e^{-\lambda t}$$


    The function $F(t)$ represents the probability of not surviving past time $t$
    or the probability that survival time is less than $t$. We can see in *Figure
    14.6* the following probability form:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_389_0.png)


    Figure 14.6 – Curve of the probability of not surviving past time t


    In contrast, the survival function is related to the probability of surviving
    past a certain time t:


    $S(t) = P(T > t) = 1 - P(T \leq t) = e^{-\lambda t}$


    By visualization, the survival function will have the form seen in Figure 14.7:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_389_1.png)


    Figure 14.7 – Curve of the survival function


    The **accumulated hazard function** is $H(t) = \lambda t$. We can then we can
    rewrite the survival function in terms of the hazard function as follows:


    $S(t) = e^{-H(t)}$


    Given $S(t)$ and $f(t)$, we can use the idea of the log-likelihood equation approach
    and estimate the value for $\lambda$ via maximum likelihood estimation.


    ## Model example


    We will use the same larynx dataset from lifeline as in the last section. In this
    example, we will use ExponentialFitter from lifelines. Similarly, the fit() method
    takes two arguments: duration and event_observed. We can fit the model as follows:


    ```python

    from lifelines import ExponentialFitter

    from lifelines import datasets

    data = datasets.load_larynx()

    exf = ExponentialFitter()

    exf.fit(data.time, data.death)

    # this print the first 5 elements of the survival function

    exf.survival_function_.head()

    ```


    In the Kaplan-Meier model, the curve looks like stair steps, but using the exponential
    approach, the curve is gradually decreasing continuously, as we can see here:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_390_0.png)


    At time step 8, the function remains constant until the end of the study in the
    Kaplan-Meier model, but in the exponential model, the curve continues to decrease
    until the end of the study. We also perform similar studies between the younger
    group (less than 65 years old) and the older group (from 65 years old) (see Figure
    14.9):'
  mdcn: '## 模型示例


    在本示例中，我们将使用来自 `lifelines` 的 `larynx` 数据集。该数据集包含六个变量：`time`、`age`、`death`、`Stage_II`、`Stage_III`

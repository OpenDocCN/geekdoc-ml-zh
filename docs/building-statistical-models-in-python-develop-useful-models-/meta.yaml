    \ sec\nARIMA(1,0,2)(0,0,0)[0]             : AIC=2206.365, Time=0.02 sec\nARIMA(0,0,2)(0,0,0)[0]\
    \             : AIC=2253.267, Time=0.02 sec\nARIMA(1,0,1)(0,0,0)[0]          \

    \ Durbin-Watson 检验每个数据点之间的值变化是否与前一个数据点的值相关。如果存在这种相关性，则称为**一阶滞后自相关**。\n\n### Durbin-Watson\
    \ 检验统计量\n\n根据经验法则，Durbin-Watson 检验统计量低于大约 2.0（许多人认为 1.5 到 2.0 是合理的）被认为是正自相关的标志，而高于大约\
    \ 2.0（许多人认为 2.0 到 2.5 是合理的）的值则表示可能存在负自相关。在程序上，需要查表来确定检验统计量应与之比较的临界值。该过程遵循任何假设检验的相同步骤，即将检验统计量与临界值进行比较。Durbin-Watson\
    \ 检验通常被解释为单尾检验，因为双尾检验的推断不是特别有用。Durbin-Watson 表的一个版本可以在 https://www.real-statistics.com/statistics-tables/durbin-watson-table/\
    \ 找到。该表提供了**正自相关**的临界值。要找到**负自相关**的临界值，可以用 4 减去正临界值。\n\n尽管我们的 Durbin-Watson 统计量表明数据中可能存在序列相关性，但我们将通过将\
    \ Durbin-Watson 统计量与使用前面链接中表格找到的相应正自相关**查表**进行比较来确认显著性。我们的数据集中有 n=203 个样本，但在查表时将使用\
    \ n=200，因为这个值可能足够准确进行评估，而且 203 在表中不存在。在 0.05 的显著性水平下（statsmodels 的 OLS 回归中默认使用），我们发现\
    \ k=1 个输入变量的边界为 [1.758, 1.779]。在此范围内的值应解释为**不确定**。小于下限的值表明有足够的证据拒绝原假设，从而得出存在统计显著的正自相关的结论。大于上限的值表明没有足够的证据拒绝原假设，因此不存在自相关。根据我们模型的结果，我们可以以\
    \ 95% 的置信水平得出结论，有证据表明我们的残差中存在正序列相关性。\n\n```\nOLS Regression Results\n==============================================================================\n\

  mdcn: "## 简单随机抽样\n\n首先，简单随机抽样是一种从总体中随机选择样本的方法。子集（或样本）中的每个成员都有同等机会通过无偏选择方法被选中。当总体的所有成员在重要变量（重要特征）方面具有相似属性时，使用此方法，它是概率抽样最直接的方法。此方法的优点是最大限度地减少偏差并最大化代表性。然而，虽然此方法有助于限制有偏方法，但简单随机抽样存在出错的风险。此方法也有一些局限性。例如，当总体非常大时，可能需要高昂的成本和大量时间。当样本不能代表总体时，需要考虑抽样误差，并且研究需要再次执行此抽样过程。此外，并非总体的每个成员都愿意自愿参与研究，这使得获取代表大总体的良好信息成为一个巨大挑战。之前从10张纸中选择3张纸的例子就是一个简单随机样本。\n\
    \n## 系统抽样\n\n在这里，总体的成员从一个随机起点开始，以固定的抽样间隔进行选择。我们首先通过将总体中的成员数量除以研究进行的样本中的成员数量来选择固定的抽样间隔。然后，在1到抽样间隔的成员数量之间选择一个随机起点。最后，我们通过重复此抽样过程来选择后续成员，直到收集到足够的样本。当成本和时间是研究中需要考虑的主要因素时，此方法比简单随机抽样更快且更可取。另一方面，在简单随机抽样中，总体的每个成员都有同等机会被选中，而在系统抽样中，使用抽样间隔规则从总体中选择一个成员作为研究的样本。可以说，系统抽样比简单随机抽样随机性更低。同样，与简单随机抽样一样，总体的成员属性与重要变量/特征相似相关。让我们通过以下示例讨论如何进行系统抽样。在达拉斯一所高中的一个班级中，有50名学生，但只有10本书可以分发给这些学生。抽样间隔通过将班级中的学生数量除以书本数量（50/10\
    \ = 5）来固定。我们还需要生成一个1到50之间的随机数作为随机起点。例如，取数字18。因此，被选中获得书本的10名学生如下：\n\n18, 23, 28,\
    \ 33, 38, 43, 48, 3, 8, 13\n\n自然会产生一个问题：间隔抽样是否是一个分数。例如，如果我们有13本书，那么抽样间隔将是50/13\
    \ ≈ 3.846。然而，我们不能选择这个分数作为代表学生数量的抽样间隔。在这种情况下，我们可以选择数字3或4作为抽样间隔（我们也可以选择3或4中的任何一个作为抽样间隔）。让我们假设生成的随机起点是17。那么，被选中的13名学生是：\n\
    \n17, 20, 24, 27, 31, 34, 38, 41, 45, 48, 2, 5, 9\n\n观察前面的数字序列，在达到数字48之后，由于加4将产生一个大于学生数量（50名学生）的数字，序列在2处重新开始（48\
    \ + 4 = 52，但由于50是最大值，我们在2处重新开始）。因此，序列中的最后三个数字是2、5和9，抽样间隔分别为4、3和4（经过数字50并返回数字1，直到我们有13名被选中的学生作为系统样本）。\n\
    \n使用系统抽样时，如果总体的成员列表被组织成与抽样间隔匹配，则存在偏差风险。例如，回到50名学生的案例，研究人员想了解学生对数学课的感受。然而，如果数学最好的学生对应数字2、12、22、32和42，那么如果在随机起点为2且抽样间隔为10的情况下进行调查，则可能存在偏差。\n\
    \n## 分层抽样\n\n这是一种概率抽样方法，基于将总体划分为称为**层**的同质子总体。每个层基于明显不同的属性进行划分，例如性别、年龄、颜色等。这些子总体必须是不同的，以便每个层中的每个成员都有同等机会通过简单随机抽样被选中。*图1.5*说明了如何进行分层抽样以从两个子总体（一组数字和一组字母）中选择样本：\n\
    \n以下代码示例显示了如何使用*图1.5*中所示的示例，使用numpy实现分层抽样。首先，实例被分成各自的层：数字和字母。然后，我们使用numpy从每个层中随机抽样。与之前的代码示例一样，我们使用choice方法进行随机抽样，但每个层的样本大小基于每个层中的实例总数，而不是整个总体中的实例总数；例如，抽样50%的数字和50%的字母：\n\
    \n```python\nimport numpy as np\n\n# setup generator for reproducibility\nrandom_generator\
    \ = np.random.default_rng(2020)\n\npopulation = [\n    1, \"A\", 3, 4,\n    5,\
    \ 2, \"D\", 8,\n    \"C\", 7, 6, \"B\"\n]\n# group strata\nstrata = {\n    'number'\
    \ : [],\n    'string' : [],\n}\n\nfor item in population:\n    if isinstance(item,\
    \ int):\n        strata['number'].append(item)\n    else:\n        strata['string'].append(item)\n\
    \n# fraction of population to sample\nsample_fraction = 0.5\n# random sample from\
    \ strata\nsampled_strata = {}\n\nfor group in strata:\n    sample_size = int(\n\
    \        sample_fraction * len(strata[group])\n    )\n    sampled_strata[group]\
    \ = random_generator.choice(\n        strata[group],\n        size=sample_size,\n\
    \        replace=False\n    )\n\nprint(sampled_strata)\n\n# {'number': array([2,\
    \ 8, 5, 1]), 'string': array(['D', 'C'],\ndtype='<U1')}\n```\n\n此方法的主要优点是样本中的关键总体特征能更好地代表所研究的总体，并且与总体成比例。此方法有助于减少样本选择偏差。另一方面，当将总体的每个成员划分为不同的子总体不明显时，此方法变得不可用。\n\
    \n## 整群抽样\n\n在这里，总体被划分为不同的子组，称为群。每个群具有同质特征。不是随机选择每个群中的单个成员，而是随机选择整个群，并且这些群中的每一个都有同等机会被选为样本的一部分。如果群很大，那么我们可以使用前面的一种抽样方法进行**多阶段抽样**，以选择每个群中的单个成员。现在讨论一个整群抽样的例子。一家当地披萨店计划在附近扩展业务。店主想知道有多少人从他的披萨店订购披萨，以及最受欢迎的披萨是什么。然后他将附近划分为不同的区域，并随机选择客户形成整群样本。向选定的客户发送调查问卷，用于他的业务研究。另一个例子与多阶段整群抽样有关。一家零售连锁店进行研究，以查看连锁店中每家商店的表现。商店根据位置划分为子组，然后随机选择样本形成群，并使用样本群作为其商店的绩效研究。此方法简单方便。然而，样本群不能保证代表整个总体。\n\
    \n## 非概率抽样\n\n另一种抽样方法是非概率抽样，其中总体的部分或所有成员没有同等机会被选为样本参与研究。当随机概率抽样无法进行时，使用此方法，并且与概率抽样方法相比，获取数据更快更容易。使用此方法的原因之一是成本和时间考虑。它允许我们通过基于便利性或特定标准的非随机选择轻松收集数据。此方法可能导致比概率抽样方法更高的偏差风险。该方法通常用于探索性和定性研究。例如，如果一组研究人员想了解客户对公司某一产品的看法，他们向购买并使用该产品的客户发送调查问卷。这是获取意见的便捷方式，但这些意见仅来自已经使用过产品的客户。因此，样本数据仅代表一组客户，不能概括为公司所有客户的意见。"

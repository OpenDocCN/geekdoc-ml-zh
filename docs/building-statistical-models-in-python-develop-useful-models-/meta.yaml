  md: '![](img/3de2e60811d1b90c67f6bb2d5cae034f_273_0.png)


    Now, let''s use the Ljung-Box test to check our assumptions about autocorrelation.
    We perform this test with the `acorr_ljungbox()` function from `statsmodels`.
    We apply the `lags=[50]` argument to test if the autocorrelation is 0 out to 50
    lags:


    ```

    python

    from statsmodels.stats.diagnostic import acorr_ljungbox

    acorr_ljungbox(random_white_noise, lags=[50], return_df=True)

    ```


    The test returns an insignificant p-value, seen here. Therefore, we can assert
    that at a 95% level of confidence, the data has no autocorrelation and is thus
    white noise:


    | | lb_stat | lb_pvalue |

    |---|---|---|

    | 50 | 51.152656 | 0.428186 |


    Figure 10.3 – Ljung-Box test results for autocorrelation on white noise data


    # ## Autocorrelation


    As we''ve mentioned to this point, autocorrelation, also called serial correlation,
    is a measure of correlation for a given point corresponding to previous points
    in the time-constrained sequence of data. It is called “auto” as it refers to
    a variable''s correlation with itself at a previous lag. Autocorrelation across
    all preceding lags in the specified horizon—as opposed to for a specific lag—is
    referred to as **autocorrelation structure**. Here, we have, for any given lag
    $k$ greater than zero, the ACF, $r_k$:


    $$r_k = \frac{\sum_{t=k+1}^{n} (y_t - \bar{y})(y_{t-k} - \bar{y})}{\sum_{t=1}^{n}
    (y_t - \bar{y})^2}$$'
  merge: -1
  pgno: 273
- img_proc: true
  md: 'We discussed autocorrelation in *Chapter 6, Simple Linear Regression*, within
    the context of identifying serial correlation as a violation of the required assumption
    of sampling independence for linear regression. Here, we note that autocorrelation
    is a core component of time-series data. We previously visually explored this
    data in both *Chapter 6* and this chapter using the ACF plot. We also discussed
    first-order differencing. Let''s explore these two concepts in depth using the
    *United States Macroeconomic* data set from statsmodels, which we used in *Chapter
    6*. Here, we select *realinv* and *realdpi*, converting both variables to a 32-bit
    float:



    In *Chapter 10, Introduction to Time Series* we considered how the **Partial Auto-Correlation
    Function (PACF)** correlates one data point to another lag, controlling for those
    lags between. We also discussed how inspection of the PACF plot is a frequently
    used method for assessing the ordering of an autoregressive model. Thereto, the
    autoregressive model is one that considers specific points in the past to be directly
    correlated to the value of a given point at lag zero. Suppose we have a process
    $y_t$ with random, normally distributed white noise, $\epsilon_t$, where $t =
    \pm 1, \pm 2, \dots$ If – using real constants of $\phi_1, \phi_2, \dots, \phi_p$
    where $\phi_p \neq 0$ – we can formulate the process in the following way:


    $$y_t - \mu - \phi_1(y_{t-1} - \mu) - \phi_2(y_{t-2} - \mu) - \dots - \phi_p(y_{t-p}
    - \mu) = \epsilon_t$$


    Letting $\mu$ represent the overall process sample mean (in our examples, we will
    consider **zero-mean** processes), we can consider this to be an autoregressive
    process of order $p$, or AR(p) [1]. We can define the autocorrelation for the
    AR(p) model as follows:


    $$\rho_k = \phi_1^{|k|}$$


    There is also this example:


    $$\rho_k = \phi_1 \rho_{k-1} + \dots + \phi_p \rho_{k-p}$$


    In the preceding example, where $\rho_k$ is the lag $k$ autocorrelation. $\phi_1$
    is both the slope and autocorrelation for an AR(1) process.


    > **AR(p) model structure and components**


    To prevent confusion, note that with the equation $y_t - \mu - \phi_1(y_{t-1}
    - \mu) - \phi_2(y_{t-2} - \mu) - \dots - \phi_p(y_{t-p} - \mu) = \epsilon_t$ we
    are attempting to build a mathematical model that represents the process such
    that if perfectly modeled, all that remains is the random, normally distributed
    white noise, $\epsilon_t$. This effectively means the model leaves zero residual
    error (in other words, a perfect fit). Each $y_{t-k}$ term – where $k$ is a lag
    in time – represents the value at that point in time and each corresponding value
    of $\phi$ is the coefficient value required for the $y_{t-k}$ such that when taken
    in combination with all other values of $y$, the model statistically approximates
    zero error.'
  - '[PAGE 293]


    # The AR(1) model


    The **backshift operator notation**, or simply **operator notation**, is a simplified,
    shorthand method of formulating models. It is called “backshift” because it shifts
    time back one lag from $t$ to $t-1$. The purpose is to avoid the necessitation
    of writing the subscript $(y_{t-i})$ following every $\phi$ coefficient and instead
    writing $B^{k-1}$ while including only $y_t$ once, which is handy when writing
    AR(p) models with high orders of $p$. In the following equation, the zero-mean
    form of an AR(1) follows the following structure:


    $$y_t - \mu - \phi_1(y_{t-1} - \mu) = \epsilon_t$$


    The equation reduces to the following example:


    $$y_t - \phi_1(y_{t-1}) = \epsilon_t$$


    In backshift operator notation, we can say this:


    $$(1 - \phi_1 B)y_t = \epsilon_t$$


    > **Note on $|\phi_1|$ in an AR(1)**


    It''s worth noting at this point that an AR(1) process is stationary if $|\phi_1|
    < 1$. That is, when the absolute value of the lag-one autocorrelation is < 1,
    the AR(1) process is stationary. When $|\phi_1| = 1$, an ARIMA model may still
    be useful, but when $|\phi_1| > 1$, the process is considered to be explosive
    and should not be modeled. This is because a value $|\phi_1| < 1$ means the root
    is outside of, and not bounded by, the unit circle. A value of $|\phi_1| = 1$
    is on the unit circle but can be differenced to remove the unit root. The root
    for the case of an AR(1) can be calculated as $z = 1/\phi_1$. A set of data producing
    $|\phi_1| > 1$ cannot be filtered in a way that puts its root outside the unit
    circle.


    When all roots of an AR(p) are outside the unit circle, the given realization
    (one time series sampled from a stochastic process) will converge to the mean,
    have constant variance, and be independent of time. This is an ideal scenario
    for time series data.


    Let''s walk through an example of an AR(1) process with $|\phi_1| < 1$ and therefore
    a stationary root. Assume we have identified the following first-order autoregressive
    process:


    $$y_t - 0.5y_{t-1} = \epsilon_t$$


    This is converted to operator notation:


    $$(1 - 0.5B)y_t = \epsilon_t$$


    When looking for roots, we can use the following notation:


    $$(1 - 0.5z) = 0$$


    This gives us a root of $z$:


    $$z = \frac{1}{\phi_1} = \frac{1}{0.5} = 2$$'

  md: 'We can also identify the seasonality by observing where peaks occur in the
    ACF plot. The ACF plot in Figure 11.22 shows a peak at 12, indicating a seasonal
    period of 12, which is consistent with our knowledge of the time series.


    We will see how to apply seasonal differences later in this section using `pmdarima`.
    Let''s take a look at how seasonality is included in the model.


    # Seasonal ARIMA


    As mentioned in the ARIMA section, we will be differencing the original series,
    then fitting a stationary model to the differenced data. Then our time series
    would be described by the following equation where $y''_t$ is the differenced
    series (including seasonal and sequential differences):


    $$y''_t = c + \phi_1 y''_{t-1} + \dots + \phi_p y''_{t-p} + \epsilon_t + \theta_1
    \epsilon_{t-1} + \dots + \theta_q \epsilon_{t-q}$$


    We can express the whole model with backshift notation:


    $$(1 - \phi_1 B - \dots - \phi_p B^p)(1 - B)^d(1 - B^s)y_t = c + (1 + \theta_1
    B + \dots + \theta_q B^q)\epsilon_t$$



- md: '## 负二项回归


    以成功概率 $p$ 表示，负二项方差计算如下：


    $$n \frac{1-p}{p^2}$$


    其均值为：


    $$n \frac{1-p}{p}$$


    由于负二项模型的方差不等于均值，因此当计数足够大以至于响应的方差超过均值时，负二项模型很可能优于泊松方法。与泊松类似，负二项模型是一个对数线性模型，其置信区间基于
    Wald 和偏差下降似然比。负二项模型的回归方程形式（如下所示）与泊松回归相同：


    $$\ln(y) = b_0 + b_1 x_1 + \dots + b_n x_n$$


    它可简化为：


    $$y = e^{b_0} + e^{b_1 x_1} + \dots + e^{b_n x_n}$$


    给定分布样本的成功概率的**最大似然估计**如下：


    $$\frac{n}{n + \bar{x}''}$$


    ### 最大似然估计


    **最大似然估计 (MLE)** 是对数几率（或 logit）和对数似然统计建模方法的基础。似然是指在给定特定回归系数值的情况下，观察到回归模型已知结果的概率。默认情况下，如果一组变量比另一组变量提供更高的观察结果获得概率，则该组变量将具有更高的似然。似然的对数被用作回归模型拟合优度的度量。对于每个变量的一组潜在系数值中，具有每个变量最大对数似然值的系数集被称为**最大似然估计**。这些值通过迭代方法生成多个可能值来获得。如果样本量足够大并且为模型获得了适当的变量集，则最大似然估计可被视为无偏的。


    计算负二项回归的置信区间与逻辑回归类似。**Wald** 方法利用 **z 比率** 进行计算。如果模型中有 $j$ 个变量，则 z 比率计算如下：


    $$\frac{(\hat{\beta}_j - \beta_j)}{SE(\hat{\beta}_j)}$$



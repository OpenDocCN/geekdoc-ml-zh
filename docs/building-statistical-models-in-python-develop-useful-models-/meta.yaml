    # # 3 Hypothesis Testing


    In this chapter, we will begin discussing drawing statistical conclusions from
    data, putting together sampling and experiment design from *Chapter 1, Sampling
    and Generalization* and distributions from *Chapter 2, Distributions of Data*.
    Our primary use of statistical modeling is to answer questions of interest from
    data. Hypothesis testing provides a formal framework for answering questions of
    interest with measures of uncertainty. First, we will cover the goals and structure
    of hypothesis testing. Then, we will talk about the errors that can occur from
    hypothesis tests and define the expected error rate. Then, we will walk through
    the hypothesis test process utilizing the z-test. Finally, we will discuss statistical
    power analysis.


    In this chapter, we''re going to cover the following main topics:


    +   - The goal of hypothesis testing

    - Type I and type II errors

    - Basics of the z-test – the z-score, z-statistic, critical values, and p-values

    - One-sample and two-sample z-tests for means and proportions

    - Selecting error rate and power analysis

    - Applying the power analysis to the z-test


    # ## The goal of hypothesis testing


    Put simply, the goal of hypothesis testing is to decide whether the data we have
    is sufficient to support a particular hypothesis. The hypothesis test provides
    a *formal framework* for testing a hypothesis based on our data rather than attempting
    to decide based on visual inspection. In this section, we will discuss the process
    of hypothesis testing. In the next section, *Basics of the z-test – the z-score,
    z-statistic, critical values, and p-values*, we will put the process to work by
    walking through an example in detail with the z-test.'
- md: '## Overview of a hypothesis test for the mean


    To understand the hypothesis testing process, let''s start with a simple example.
    Suppose we have a factory with machines that produce widgets, and we expect our
    machines to produce widgets at a certain rate (30 widgets per hour). We start
    by constructing two hypotheses, the **null hypothesis** and the **alternative
    hypothesis**. The null hypothesis and alternative hypothesis are given the following
    symbols, respectively: $H_0$ and $H_a$. To create the null hypothesis, we will
    start by assuming what we want to test is true. In our example, the null hypothesis
    would be that *the machines output a mean of 30 widgets per hour*. Once we have
    determined the null hypothesis, we then create the alternative hypothesis, which
    is just the contradiction of the null hypothesis. In our example, the alternative
    hypothesis is that *the machines do not output a mean of 30 widgets per hour*.
    Notice that our hypotheses do not indicate any directionality, that is, the alternative
    hypothesis contains values both less than and greater than the expected value.
    This is called a **two-sided test**, meaning there are two alternatives to the
    null hypothesis. We also have **one-sided tests**. For example, if we had said
    the null hypothesis was that *the machines output more than a mean of 30 widgets
    per hour*, the alternative would be that *the machines output less than a mean
    of 30 widgets per hour*. This set of hypotheses would be a one-sided test.


    The two-sided null hypothesis and alternative hypothesis from our example can
    be stated mathematically as follows:


    ```

    $H_0: \bar{x} = 30$

    $H_a: \bar{x} \neq 30$

    ```


    Once we have the null and alternative hypotheses and the data, we will run the
    test with software. Let''s set the implementation details of the test aside for
    now (these will be covered in detail in the next section). There are two possible
    outcomes of a statistical test: reject the null hypothesis or fail to reject the
    null hypothesis. If the mean output of our machines is statistically different
    from the stated value in the null hypothesis, then we will *reject the null hypothesis*.
    This means that, given the data, the value stated in the null hypothesis is not
    a *plausible* value for the mean. However, if the mean output of our machines
    is not statistically different from the value listed in the null hypothesis, we
    *fail to reject the null hypothesis*. This means that, given the data, the value
    stated in the null hypothesis is a *plausible* value for the mean. After running
    the test for the null hypothesis and determining the conclusion, we will provide
    a confidence interval (discussed in the next section) and determine the scope
    of inference.


    ## Scope of inference


    The scope of inference is determined by the sampling design discussed in *Chapter
    1*. There are two questions to consider – *what is the population, and how was
    the sample selected from the population?* In this example, let''s assume that
    we are testing the mean output of machines from a large factory (possibly hundreds
    of machines). The population is then the machines in the factory. If we take a
    random sample of machines, then our conclusion can be extrapolated to the entire
    population.


    While our current example is realistic, it is rather simple. In other scenarios,
    there may be additional considerations. For example, the machines in the factory
    may have different models and different ages, which may impact output. In that
    case, we could use stratified random sampling and make inferences for each stratum.


    ## Hypothesis test steps


    This section provides an overview of hypothesis testing from creating a hypothesis
    to drawing a conclusion. As we continue through this chapter, keep the following
    key hypothesis test steps in mind:


    - State the null hypothesis and alternative hypothesis

    - Perform the statistical test

    - Determine the conclusion: reject or fail to reject the null hypothesis

    - Provide a statistical conclusion, a confidence interval, and a scope of inference


    These steps are applicable to any statistical test, and we will continue to follow
    this series of steps for hypothesis tests. In the next section, we will discuss
    the types of errors that can result from hypothesis tests.


    ## Type I and Type II errors


    While data can give us a good idea of the characteristics of a distribution, it
    is possible for a hypothesis test to result in an error. Errors can occur because
    we are taking a random sample from a population. While randomization makes it
    less likely that a sample contains sampling bias, *there is no guarantee that
    a random sample will be representative of the population*. There are two possible
    errors that could occur as a result of a hypothesis test:


    - **Type I error**: Rejecting the null hypothesis when it is actually true

    - **Type II error**: Failure to reject the null hypothesis when it is actually
    false


    ## Type I errors


    A type I error occurs when a hypothesis test results in *rejecting the null hypothesis,
    but the null hypothesis is actually true*. For example, say we have a distribution
    of data with a population mean of 30. We state our null hypothesis as $H_0: \bar{x}
    = 30$. We take a random sample for our test, but the random values in the sample
    happen to be on the higher side of the distribution. Thus, the test result suggests
    that we should reject the null hypothesis. In this case, we have made a type I
    error. This type of error is also called a **false positive**.


    When we make statistical tests, it is always possible that we will come to an
    incorrect conclusion due to the data sampled from the target population. The *probability
    of making a type one error is specified by α*. Said another way, α represents
    how often we expect to make an error (the expected error rate). This is a free
    parameter we can select for our test (α is also called the *level of significance*).
    It is common to use 0.05 for α, but there is no evidential basis for using 0.05;
    different values may be appropriate in other contexts. Later in the chapter, we
    will discuss selecting the type I error rate.


    ## Type II errors


    The other type of error we can make is called a type II error. In this case, *we
    fail to reject the null hypothesis when it is actually false*. Let''s consider
    another example. Say we have a distribution of data and we want to test whether
    the mean of the distribution is 30 or not. We take a random sample for the test
    and the test suggests that we should not reject the null hypothesis. However,
    the true population mean is 35. In this case, we have made a type II error. This
    type of error is also called a **false negative**.


    As mentioned previously, it is always possible that a statistical test could lead
    to an erroneous conclusion. Thus, we want to control the probability of making
    an error. However, unlike α, the Type II error rate β is not simply a free parameter
    that we can select. To understand the likeliness of making a type II error, we
    generally will conduct a power analysis, which will show how various factors,
    such as sample size, will impact the type II error rate. In the next section,
    we will discuss selecting the error rate and power analysis.


    We can summarize the possible results of a hypothesis test with the help of the
    table in *Figure 3.1*.


    Null Hypothesis is:

    | Decision about Null Hypothesis | True | False |

    | :--- | :--- | :--- |

    | Don''t Reject | Correct Inference (1- α) | Type II Error (β) |

    | Reject | Type I Error (α) | Correct Inference (1-β) |


    Figure 3.1 – Results of the hypothesis test


    In this section, we have discussed the types of errors that can occur when drawing
    conclusions from statistical tests. In the next section, we will walk through
    an example of hypothesis testing with the z-test and later in the chapter, we
    will discuss how to select an error rate and how to analyze statistical power
    and related factors.


    ## Basics of the z-test – the z-score, z-statistic, critical values, and p-values


    In this section, we will discuss a type of hypothesis test called the z-test.
    It is a statistical procedure using sample data assumed to be normally distributed
    to determine whether a statistical statement related to the value of a population
    parameter should be rejected or not. The test can be performed on the following:


    - One sample (a left-tailed z-test, right-tailed z-test, or two-tailed z-test)

    - Two samples (a two-sample z-test)

    - Proportions (a one-proportion z-test or two-proportion z-test)


    The test assumes that the standard deviation is known and the sample size is large
    enough. In practice, a sample size that is larger than 30 should be considered.


    Before going into different types of z-tests, we will discuss the z-score and
    z-statistic.


    ## The z-score and z-statistic


    To measure how far a particular value from a mean is, we could use the z-score
    or the z-statistic as statistical techniques together with the mean and the standard
    deviation to determine the relative location.


    A z-score is computed with the following formula:


    ```

    $$z_i = \frac{x_i - \bar{x}}{\sigma}$$

    ```


    Here, $z_i$ is the z-score for $x_i$, $\bar{x}$ is the sample mean, and $\sigma$
    is the sample standard deviation. The z-score is also known as the z-value, standardized
    value, or standard score. Let''s consider a few examples. The standard deviation
    tells us how far a sample is from the mean of the distribution. If $z_i = 1.8$,
    that point is 1.8 standard deviations away from the mean. Similarly if $z_i =
    -1.5$, then that point is 1.5 standard deviations away from the mean. The sign
    of the determines whether it is greater or less than the sample mean. A $z_i$
    of -1.5 is less than the mean and a $z_i$ of 1.8 is greater than the mean. Now
    let us go through an example. In a high school in Dallas (in the US), we ask students
    to take anonymous IQ tests for some statistical research. The data collected from
    that school is normally distributed with an IQ score population mean $\mu = 98$
    and a population standard deviation $\sigma = 12$. A particular student took an
    IQ test and his score is 110. He has an IQ score greater than the score mean but
    he wants to know whether he is in the top 5%. First, we will use the z-score formula
    to calculate it:


    ```

    $$z_{student} = \frac{110 - 98}{12} = \frac{12}{12} = 1.$$

    ```'
  mdcn: '## 均值假设检验概述


    要理解假设检验的过程，让我们从一个简单的例子开始。假设我们有一家工厂，工厂里的机器生产小部件，我们期望机器以特定的速率（每小时30个小部件）生产。我们首先构建两个假设：**原假设**和**备择假设**。原假设和备择假设分别用以下符号表示：$H_0$
    和 $H_a$。为了建立原假设，我们将从假设我们想要检验的内容为真开始。在我们的例子中，原假设将是*机器平均每小时生产30个小部件*。一旦确定了原假设，我们接着创建备择假设，它只是原假设的矛盾。在我们的例子中，备择假设是*机器平均每小时生产的小部件数不是30个*。请注意，我们的假设没有指明任何方向性，也就是说，备择假设包含小于和大于预期值的值。这被称为**双侧检验**，意味着原假设有两个备择选项。我们也有**单侧检验**。例如，如果我们说原假设是*机器平均每小时生产的小部件数多于30个*，那么备择假设就是*机器平均每小时生产的小部件数少于30个*。这组假设将是单侧检验。


    我们例子中的双侧原假设和备择假设可以用数学方式表述如下：


    ```

    $H_0: \bar{x} = 30$

    $H_a: \bar{x} \neq 30$

    ```


    一旦我们有了原假设、备择假设和数据，我们将使用软件运行检验。现在让我们把检验的实现细节放在一边（这些将在下一节详细讨论）。统计检验有两种可能的结果：拒绝原假设或未能拒绝原假设。如果我们的机器平均产出在统计上不同于原假设中陈述的值，那么我们将*拒绝原假设*。这意味着，给定数据，原假设中陈述的值对于均值来说不是一个*合理的*值。然而，如果我们的机器平均产出在统计上与原假设中列出的值没有显著差异，我们*未能拒绝原假设*。这意味着，给定数据，原假设中陈述的值对于均值来说是一个*合理的*值。在运行原假设检验并确定结论后，我们将在下一节讨论置信区间，并确定推断范围。


    ## 推断范围


    推断范围由*第1章*讨论的抽样设计决定。需要考虑两个问题——*总体是什么，以及样本是如何从总体中选出的？* 在这个例子中，让我们假设我们正在检验一家大型工厂（可能有数百台机器）的机器平均产出。那么总体就是工厂里的机器。如果我们对机器进行随机抽样，那么我们的结论就可以推广到整个总体。


    虽然我们当前的例子是现实的，但它相当简单。在其他情况下，可能还有额外的考虑因素。例如，工厂里的机器可能有不同的型号和不同的使用年限，这可能会影响产出。在这种情况下，我们可以使用分层随机抽样，并对每个层进行推断。


    ## 假设检验步骤


    本节概述了从创建假设到得出结论的假设检验过程。在我们继续学习本章时，请记住以下关键的假设检验步骤：


    -   陈述原假设和备择假设

    -   执行统计检验

    -   确定结论：拒绝或未能拒绝原假设

    -   提供统计结论、置信区间和推断范围


    这些步骤适用于任何统计检验，我们将在假设检验中继续遵循这一系列步骤。在下一节中，我们将讨论假设检验可能导致的错误类型。


    ## 第一类错误和第二类错误


    虽然数据可以让我们很好地了解分布的特征，但假设检验仍有可能导致错误。错误的发生是因为我们是从总体中抽取随机样本。虽然随机化使得样本包含抽样偏差的可能性降低，*但不能保证随机样本能代表总体*。假设检验可能导致两种可能的错误：


    -   **第一类错误**：当原假设实际为真时拒绝原假设

    -   **第二类错误**：当原假设实际为假时未能拒绝原假设


    ## 第一类错误


    当假设检验导致*拒绝原假设，但原假设实际为真*时，就发生了第一类错误。例如，假设我们有一个数据分布，其总体均值为30。我们将原假设陈述为 $H_0: \bar{x}
    = 30$。我们为检验抽取了一个随机样本，但样本中的随机值恰好位于分布的较高一侧。因此，检验结果表明我们应该拒绝原假设。在这种情况下，我们犯了第一类错误。这种错误也称为**假阳性**。


    当我们进行统计检验时，由于从目标总体中抽取的样本，我们总是有可能得出错误的结论。*犯第一类错误的概率由α指定*。换句话说，α代表我们预期犯错的频率（预期错误率）。这是我们为检验选择的一个自由参数（α也称为*显著性水平*）。通常使用0.05作为α，但使用0.05没有实证依据；在其他情况下，不同的值可能更合适。在本章后面，我们将讨论如何选择第一类错误率。


    ## 第二类错误


    我们可以犯的另一种错误称为第二类错误。在这种情况下，*当原假设实际为假时，我们未能拒绝原假设*。让我们考虑另一个例子。假设我们有一个数据分布，我们想检验该分布的均值是否为30。我们为检验抽取了一个随机样本，检验表明我们不应该拒绝原假设。然而，真实的总体均值是35。在这种情况下，我们犯了第二类错误。这种错误也称为**假阴性**。


    如前所述，统计检验总是可能导致错误的结论。因此，我们希望控制犯错的概率。然而，与α不同，第二类错误率β并不是一个我们可以简单选择的自由参数。为了理解犯第二类错误的可能性，我们通常会进行功效分析，这将显示各种因素（如样本量）如何影响第二类错误率。在下一节中，我们将讨论如何选择错误率和进行功效分析。


    我们可以借助*图3.1*中的表格来总结假设检验的可能结果。


    原假设为：

    | 关于原假设的决策 | 真 | 假 |

    | :--- | :--- | :--- |

    | 不拒绝 | 正确推断 (1- α) | 第二类错误 (β) |

    | 拒绝 | 第一类错误 (α) | 正确推断 (1-β) |


    图3.1 – 假设检验的结果


    在本节中，我们讨论了从统计检验中得出结论时可能发生的错误类型。在下一节中，我们将通过一个使用z检验进行假设检验的例子来讲解，在本章后面，我们将讨论如何选择错误率以及如何分析统计功效和相关因素。


    ## z检验基础——z分数、z统计量、临界值和p值


    在本节中，我们将讨论一种称为z检验的假设检验。它是一种统计程序，使用假设为正态分布的样本数据来确定是否应拒绝与总体参数值相关的统计陈述。该检验可用于以下情况：


    -   单样本（左侧z检验、右侧z检验或双侧z检验）

    -   两样本（两样本z检验）

    -   比例（单比例z检验或双比例z检验）


    该检验假设标准差已知且样本量足够大。在实践中，应考虑大于30的样本量。


    在讨论不同类型的z检验之前，我们将讨论z分数和z统计量。


    ## z分数和z统计量


    为了衡量某个值与均值的距离，我们可以使用z分数或z统计量作为统计技术，结合均值和标准差来确定相对位置。


    z分数使用以下公式计算：


    ```

    $$z_i = \frac{x_i - \bar{x}}{\sigma}$$

    ```


    这里，$z_i$ 是 $x_i$ 的z分数，$\bar{x}$ 是样本均值，$\sigma$ 是样本标准差。z分数也称为z值、标准化值或标准分数。让我们考虑几个例子。标准差告诉我们样本距离分布均值有多远。如果
    $z_i = 1.8$，则该点距离均值1.8个标准差。类似地，如果 $z_i = -1.5$，则该点距离均值1.5个标准差。z分数的符号决定了它是大于还是小于样本均值。$z_i$
    为-1.5小于均值，$z_i$ 为1.8大于均值。现在让我们看一个例子。在美国达拉斯的一所高中，我们要求学生参加匿名的智商测试，用于一些统计研究。从该校收集的数据呈正态分布，智商分数的总体均值
    $\mu = 98$，总体标准差 $\sigma = 12$。一名特定的学生参加了智商测试，他的分数是110。他的智商分数高于平均分，但他想知道他是否在前5%。首先，我们将使用z分数公式进行计算：


    ```

    $$z_{student} = \frac{110 - 98}{12} = \frac{12}{12} = 1.$$

    ```'

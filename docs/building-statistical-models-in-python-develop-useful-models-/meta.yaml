  md: '# Permutation tests


    For the first non-parametric test, let''s look more deeply at the definition of
    a p-value. A p-value is the *probability of obtaining a test statistic at least
    as extreme as the observed value* under the assumption of the null hypothesis.
    Then, to calculate a p-value, we need the null distribution and an observed statistic.
    The p-value is the proportion of samples with a test statistic more extreme than
    the observed statistic. It turns out that we can construct the null distribution
    using permutations from data. Let''s see how to construct the null distribution
    using the following dataset. This dataset could represent counts of machine failures
    at low and high temperatures. We assume that the samples are independent:


    ```

    low_temp = np.array([0, 0, 0, 0, 0, 1, 1])

    high_temp = np.array([1, 2, 3, 1])

    ```


    To construct the null hypothesis, we first need to decide on a statistical measure.
    In this case, we will look for a difference in the mean of the two distributions.
    So, our statistical measure will be as follows:


    $\bar{x}_{lowtemp} - \bar{x}_{hightemp}$


    Now, to calculate the distribution values, calculate the statistical measure for
    all permutations of the dataset. Here are a couple of examples of the permutations
    of the dataset.


    | Label | Observed | P1 | P2 | P3 | P4 | P5 | ... |

    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    | low | 0 | 1 | 0 | 1 | 0 | 1 | ... |

    | low | 0 | 1 | 3 | 0 | 3 | 0 | ... |

    | low | 0 | 0 | 0 | 1 | 1 | 3 | ... |

    | low | 0 | 1 | 1 | 0 | 2 | 0 | ... |

    | low | 0 | 0 | 1 | 2 | 0 | 1 | ... |

    | low | 1 | 1 | 1 | 3 | 0 | 1 | ... |

    | low | 1 | 0 | 1 | 1 | 1 | 0 | ... |

    | high | 1 | 0 | 2 | 0 | 1 | 2 | ... |

    | high | 2 | 3 | 0 | 0 | 0 | 1 | ... |

    | high | 3 | 0 | 0 | 1 | 1 | 0 | ... |

    | high | 1 | 2 | 0 | 0 | 0 | 0 | ... |

    | mean difference | -1.46 | -0.68 | 0.5 | 0.89 | 0.5 | 0.11 | ... |


    Figure 5.1 – First five permutations of the observed data and the mean difference


    The table shows the observed data with five randomly generated permutations of
    the values. We calculate the difference in the mean for each permutation. The
    differences in means are the values of the null distribution. Once we have the
    distribution, we can calculate the p-value as the proportion of values more extreme
    than the observed value.'

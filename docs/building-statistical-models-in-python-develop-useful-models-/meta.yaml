  md: "# Step 3\n\nNow, we will use a **log-rank test** to determine if survivor curves\
    \ are statistically different. At this step, we investigate if there is any statistical\
    \ significance in survival between transplant and non-transplant groups. If there\
    \ is no statistical significance, it would not be useful to understand the relationships\
    \ between the covariates and their impacts on survival. We looked at **contingency\
    \ table analysis** using the **Chi-Square test of independence** earlier in the\
    \ book. This is essentially the log-rank test here, where we compare the survival\
    \ distributions of the two groups (transplant versus non-transplant). We use this\
    \ approach because the data is right-censored, and thus right-skewed; as such,\
    \ we are working with non-parametric distributions. The null hypothesis is that\
    \ the hazard ratio between the two groups is equal to 1, which would mean they\
    \ are equal in terms of survival or hazard risk.\n\nIn the following code sample,\
    \ we use the two different patient distributions (those with and those without\
    \ transplants) as groups A and B in the `logrank_test` function:\n\n```\nfrom\
    \ lifelines.statistics import logrank_test\nlr_results = logrank_test(durations_A=data.loc[data['transplant']==0]['stop'],\n\
    \                          durations_B=data.loc[data['transplant']==1]['stop'],\n\
    \                          event_observed_A=data.loc[data['transplant']==0]['event'],\n\
    \                          event_observed_B=data.loc[data['transplant']==1]['event'])\n\
    ```\n\nWe can see the Chi-Square distribution is used:\n\n```\nprint(lr_results.null_distribution)\n\
    ```\n\nThis shows the default distribution is the chi-square distribution:\n\n\
    ```\nchi squared\n```\n\nWe can run the following code to see the results of the\
    \ test:\n\n```\nlr_results.summary\n```\n\nWe can also see a statistically significant\
    \ difference at a 5% level of significance between the two groups. Therefore,\
    \ we can assume there is a purpose in proceeding to use the Cox Proportional Hazards\

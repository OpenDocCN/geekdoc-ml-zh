    and z-statistic were also introduced in the section on different types of z-tests,
    such as one-sample or two-sample z-tests for means or proportions.


    Finally, we discussed the concept and motivation behind the power analysis, which
    can be used to identify the probability of incorrectly rejecting the null hypothesis
    and selecting the sample size. We also explored the parameters of the analysis
    for a two-population pooled z-test. Here, we briefly examined effect size, which
    is the value of impact (the effect of a treatment) we search for when performing
    the hypothesis test. We will discuss power analysis in the next two chapters as
    we iterate over different applications of hypothesis testing.


    In the next chapter, we will discuss more parametric hypothesis tests. While these
    tests will still require distribution assumptions, the assumptions will be less

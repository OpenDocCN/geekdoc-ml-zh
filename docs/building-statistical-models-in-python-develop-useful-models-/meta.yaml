    \n$$e_i = y_i - \\widehat{y}_i,$$\n\nwhere $y_i$ is the observed value and $\\\
    widehat{y}_i$ is the predicted value of the response variable $y$ for the $i^{th}$\
    \ observation. The sum of the square of errors is given by:\n\n$$S = \\sum_{i=1}^{n}\
    \ (y_i - \\widehat{\\beta}_0 - \\widehat{\\beta}_1 x_i)^2$$\n\nTo minimize S,\
    \ we will take the partial derivatives with respect to $\\widehat{\\beta}_0$ and\
    \ $\\widehat{\\beta}_1$. Then, we see:\n\n$$\\frac{\\partial S}{\\partial \\widehat{\\\
    beta}_0} = -2\\sum(y_i - \\widehat{\\beta}_0 - \\widehat{\\beta}_1 x_i) = 0,$$\n\
    \n$$\\frac{\\partial S}{\\partial \\widehat{\\beta}_1} = -2\\sum x_i(y_i - \\\
    widehat{\\beta}_0 - \\widehat{\\beta}_1 x_i) = 0.$$\n\nTherefore, it is easy to\
    \ see that:\n\n$$n\\widehat{\\beta}_0 + (\\sum_{i=1}^{n} x_i)\\widehat{\\beta}_1\
    \ = \\sum_{i=1}^{n} y_i,$$\n\n$$(\\sum_{i=1}^{n} x_i)\\widehat{\\beta}_0 + (\\\
    sum_{i=1}^{n} x_i^2)\\widehat{\\beta}_1 = \\sum_{i=1}^{n} x_i y_i,$$\n\nThis implies:\n\
    \n$$\\widehat{\\beta_0} = \\frac{\\sum_{i=1}^n y_i}{n} - \\widehat{\\beta_1} \\\
    frac{\\sum_{i=1}^n x_i}{n},$$\n\n$$\\frac{\\sum_{i=1}^n x_i \\sum_{i=1}^n y_i}{n}\
    \ - \\frac{(\\sum_{i=1}^n x_i)^2}{n} \\widehat{\\beta_1} + (\\sum_{i=1}^n x_i^2)\
    \ \\widehat{\\beta_1} = \\sum_{i=1}^n x_i y_i.$$\n\nBecause $\\bar{y} = \\frac{\\\
    sum_{i=1}^n y_i}{n}$ and $\\bar{x} = \\frac{\\sum_{i=1}^n x_i}{n}$, we can rewrite\
    \ the slope and intercept as follows:\n\n$$\\widehat{\\beta_0} = \\bar{y} - \\\
    widehat{\\beta_1} \\bar{x},$$\n\n$$\\widehat{\\beta_1} = \\frac{\\sum (x_i - \\\
    bar{x})(y_i - \\bar{y})}{\\sum (x_i - \\bar{x})^2}.$$\n\nIn Python, we can implement\
    \ the following code to find $\\widehat{\\beta_0}$ and $\\widehat{\\beta_1}$ as\
    \ follows:\n\n```python\ndef least_squares_method(x, y):\n    x_mean = x.mean()\n\
    \    y_mean = y.mean()\n    beta1 = ((x - x_mean) * (y - y_mean)).sum(axis=0)\
    \ / ((x - x.mean()) ** 2).sum(axis=0)\n    beta0 = y_mean - (beta1 * x_mean)\n\
    \    return beta0, beta1\n```\n\n## Coefficients of correlation and determination\n\
    \nIn this section, we will discuss two related notions – coefficients of correlation\
    \ and coefficients of determination.\n\n## Coefficients of correlation\n\nA coefficient\
    \ of correlation is a measure of the statistical linear relationship between two\
    \ variables and can be computed using the following formula:\n\n$$r = \\frac{1}{n-1}\
    \ \\sum_{i=1}^n \\left( \\frac{x_i - \\bar{x}}{s_x} \\right) \\left( \\frac{y_i\
    \ - \\bar{y}}{s_y} \\right)$$\n\nThe reader can go here – https://shiny.rit.albany.edu/stat/corrsim/\
    \ – to simulate the correlation relationship between two variables.\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_169_0.png)\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_169_1.png)\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_169_2.png)\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_169_3.png)\n\nFigure 6.3 – Simulated\
    \ bivariate distribution\n\nBy observing the scatter plots, we can see the direction\
    \ and the strength of the linear relationship between the two variables and their\
    \ outliers. If the direction is positive (r>0), then both variables increase or\
    \ decrease together.\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_170_0.png)\n\n\
    Figure 6.4 – Simulated bivariate distribution\n\nIf the direction is negative,\
    \ then one variable increases while the other decreases. We illustrate this in\
    \ the following scatter plot:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_171_0.png)\n\
    \nFigure 6.5 – Simulated bivariate distribution\n\nThe coefficient of correlation\
    \ exists as a value between -1 and 1. When r =1, we have a perfect positive correlation,\
    \ and when r = -1, we have a perfect negative correlation. Observe that the value\
    \ of the coefficient of correlation does not change if, for example, the variable\
    \ x and the variable y are switched or if all values of either variable are linearly\
    \ scaled. In general, correlation does not imply causation.\n\n## Coefficients\
    \ of determination\n\nThe coefficient of determination is just r², where r is\
    \ the coefficient of correlation, which is a proportion of the variation in the\
    \ variable y, explained by the variable x. The value of r² is between 0 and 1,\
    \ with the linear relationship between the two variables becoming stronger as\
    \ its value approaches 1. The value of r² can also be computed using the following\
    \ formula:\n\n$$r^2 = 1 - \\frac{SS_{Res}}{SS_{Tot}}$$\n\nHere, $SS_{Res}$ is\
    \ the sum of the square of errors and $SS_{Tot}$ is the total sum of the square\
    \ of the difference between the actual value and the average value. In `statsmodels`,\
    \ from the output of the OLS regression results, the value of determination can\
    \ be obtained. This output is discussed in the next sections of this chapter.\n\
    \n## Required model assumptions\n\nLike the parametric tests we discussed in *Chapter\
    \ 4, Parametric Tests*, linear regression is a parametric method and requires\
    \ certain assumptions to be met for the results to be valid. For linear regression,\
    \ there are four assumptions:\n\n- A linear relationship between variables\n-\
    \ The normality of the residuals\n- The homoscedasticity of the residuals\n- Independent\
    \ samples\n\nLet's discuss each of these assumptions individually.\n\n## A linear\
    \ relationship between the variables\n\nWhen thinking about fitting a linear model\
    \ to data, our first consideration should be whether the model is appropriate\
    \ for the data. When working with two variables, the relationship between the\
    \ variables should be assessed with a scatter plot. Let's look at an example.\
    \ Three scatter plots are shown in *Figure 6.6*. The data is plotted, and the\
    \ actual function used to generate the data is drawn over the data points. The\
    \ leftmost plot shows data exhibiting a linear relationship. The middle plot shows\
    \ data exhibiting a quadratic relationship. The rightmost plot shows two uncorrelated\
    \ variables.\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_172_0.png)\n\nFigure\
    \ 6.6 – Three scatter plots depicting three distinct relationships between two\
    \ variables\n\nOf the example data in *Figure 6.6*, a linear model would only\
    \ be appropriate for the leftmost data. In this example, we have the benefit of\
    \ knowing the actual relationship of the two variables, but, in real problems,\
    \ you will have to determine whether a linear model is appropriate. Once we have\
    \ assessed whether a linear model is appropriate and fitted a linear model, we\
    \ can assess the two assumptions that depend on the model residuals.\n\n## Normality\
    \ of the residuals\n\nIn the previous two chapters, we discussed normality at\
    \ length and looked at several examples of data that are normally distributed\
    \ and several examples that were not normally distributed. In this case, we are\
    \ making the same assessment, but it is for the model residuals rather than for\
    \ the variables. In fact, unlike the previous parametric methods, the *variables\
    \ themselves do not need to be normally distributed, only the residuals*. Let's\
    \ look at an example. We will fit a linear model on two variables, each of which\
    \ exhibits a skewed distribution. As can be seen in *Figure 6.7*, even though\
    \ each variable has a skewed distribution, the variables are linearly correlated.\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_173_0.png)\n\nNow, let's look at the\
    \ residuals from the model fit. The residuals from the model fit are shown in\
    \ *Figure 6.8*. As we expect, the residuals from this model fit appear to be normally\
    \ distributed. This model appears to meet the assumption of normally distributed\
    \ residuals.\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_173_1.png)\n\nWith the\
    \ assumption of normally distributed residuals verified, let’s move on to the\
    \ assumption of homoscedasticity of the residuals.\n\n## Homoscedasticity of the\
    \ residuals\n\nNot only should the residuals be normally distributed, but the\
    \ residuals should also have constant variance over the linear model. **Homoscedasticity**\
    \ refers to the residuals having equal scatter. Conversely, residuals that do\
    \ exhibit equal spread are said to be **heteroscedastic**. Homoscedasticity is\
    \ generally assessed by plotting the residuals against the model predictions with\
    \ a scatter plot. The residuals should appear to be randomly distributed with\
    \ a mean of 0 and equally dispersed along the *x* axis. *Figure 6.9* shows a scatter\
    \ plot of the model residuals against the predicted value of *Y*. These residuals\
    \ appear to exhibit homoscedasticity.\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_174_0.png)\n\
    \nFigure 6.9 – Scatter plot of model residuals versus prediction\n\nThere are\
    \ a few common ways the homoscedasticity of the residuals could be violated:\n\
    \n- The residuals show a systematic change in variance\n- There is an extreme\
    \ outlier\n\nTwo examples of these violations are shown in *Figure 6.10*. The\
    \ left plot shows an extreme outlier, and the right plot shows non-constant variance\
    \ in the residuals. In both cases, the model assumptions are violated."

    # The ARIMA model


    As mentioned earlier, the ARIMA model is ARMA with the addition of differencing
    to make the time series stationary (stationarize the time series). Then we can
    express an ARIMA model mathematically as follows, where $y''_t$ is the differenced
    series, differenced $d$ times until it is stationary:


    $$y''_t = c + \phi_1 y''_{t-1} + \dots + \phi_p y''_{t-p} + \epsilon_t + \theta_1
    \epsilon_{t-1} + \dots + \theta_q \epsilon_{t-q}$$


    The ARIMA model has three orders, which are denoted ARIMA(p,d,q):


    +   - p – the autoregressive order

    - d – the differencing order

    - q – the moving average order


    With more complicated models such as ARIMA, we will tend to describe them with
    backshift notation since it is easier to express these models with backshift notation.
    An ARIMA model will take the following form using backshift notation:


    $$(1 - \phi_1 B - \dots - \phi_p B^p)(1 - B)^d y_t = c + (1 + \theta_1 B + \dots
    + \theta_q B^q) \epsilon_t$$



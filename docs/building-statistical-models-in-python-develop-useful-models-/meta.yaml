- md: '## A two-proportion z-test


    This test is used to test the difference between two population proportions. There
    are also three forms of the null and alternative hypotheses. The test statistic
    is computed as follows:


    $$z = \frac{\bar{P}_1 - \bar{P}_2}{\sqrt{\bar{p}(1 - \bar{p})(\frac{1}{n_1} +
    \frac{1}{n_2})}}$$


    Here, $\overline{p}_1$ is a sample proportion for a simple random sample from
    population 1 and $\overline{p}_2$ is a sample proportion for a simple random sample
    from population 2, $n_1$ and $n_2$ are the sample sizes, and $\overline{p}$ is
    the total pooled proportion, calculated as follows:


    $$\overline{p} = \frac{n_1\overline{p}_1 + n_2\overline{p}_2}{n_1 + n_2}$$


    We consider a similar example if there is a difference in the proportion of students
    from school A who support the changes compared to the proportion of students from
    school B. Here, $n_1 = 100$, $n_2 = 100$, $\overline{p}_1 = 0.8$, and $\overline{p}_2
    = 0.7$. You can use `proportions_ztest` from the `statsmodels` library (Seabold,
    Skipper, and Josef Perktold, "statsmodels: Econometric and statistical modeling
    with python." *Proceedings of the 9th Python in Science Conference. 2010*) to
    perform the hypothesis test. Here, we will compute the p-value directly using
    the test statistic. The null and alternative hypotheses are as follows:


    $$H_0: \overline{p}_1 = \overline{p}_2 \text{ (The two population proportions
    are equal)}$$

    $$H_a: \overline{p}_1 \neq \overline{p}_2 \text{ (The two population proportions
    are different)}$$


    Next, we specify that the level of significance for the two-tailed test is $\alpha
    = 0.05$. We then calculate the test statistic and p-value as follows:


    ```

    scipy.stats.norm.sf(abs(z))*2

    ```


    The test statistic is 1.633 and the p-value for a two-tailed test is 0.10. Because
    the p-value is greater than the specified level of significance, 0.05, we fail
    to reject the null hypothesis. There is enough evidence to say that the proportion
    of students who support the changes is different between school A and school B.


    Finally, the implemented Python code for the preceding calculation is as follows:


    ```

    import math

    import scipy

    p_1bar = 0.8

    p_2bar = 0.7

    n1 = 100.0

    n2 = 100.0


    p= (p_1bar*n1 + p_2bar*n2)/(n1+n2)    # the total pooled proportion


    z = (p_1bar-p_2bar)/math.sqrt(p*(1-p)*(1/n1+1/n2))

    pval = scipy.stats.norm.sf(abs(z))*2


    print(f"The test statistic is {z} and the p-value for two tailed test is {pval}.")

    ```


    In this section, we went through different important statistical notions such
    as the z-score, z-statistics, critical values, p-value, and z-test for means and
    proportions. We will discuss selecting the error rate and power analysis in the
    next section.


    ## Selecting the error rate and power analysis


    Statistics generalizes approximations around which to form acceptable conclusions
    from behaviors in data. Therefore, errors in statistics are unavoidable. The significance
    of findings from statistical models is essentially determined by the error rate.
    One method that can be used to minimize errors in modeling, especially with lower
    sample volumes, is the power test. Statistical power is the probability of correctly
    rejecting a null hypothesis, thus minimizing type II errors. Where alpha ($\alpha$)
    is a type I error and beta ($\beta$) is a type II error, power''s formulation
    is $1 - \beta$. To refresh, a type I error is the probability of incorrectly rejecting
    the null hypothesis.


    As noted, power is more important with smaller samples because the law of large
    numbers typically helps minimize errors as the sample size increases if an appropriate
    sampling method is chosen. Power is also important when the differences being
    compared are relatively small. One scenario in which power analysis may be particularly
    useful is when sampling is expensive, for example, with human studies. Power analyses
    can be used to find an appropriate minimum sample size given the desired power,
    type I error rate, and effect size. The relationship between these parameters
    can be explored as needed. Effect size is the difference or similarity of the
    data being compared in the hypothesis test, such as a standardized difference
    of means or correlation. As a common level of significance (type I error) in hypothesis
    testing is anywhere between 0.01 and 0.1, a common level of power is anywhere
    between 0.8 and 0.9, although these measures are case-dependent (https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7745163/#:~:text=The%20ideal%20power%20of%20a,high%20as%200.8%20or%200.9).


    A few notable properties of power are as follows:


    - There must be sufficient power to detect a meaningful difference

    - Power increases with sample size

    - Power increases with the effect size

    - Standard deviation (as well as variance and standard error) decreases as power
    increases


    In the following plot, we can see that type I error ($\alpha$) is where we may
    falsely assume the null hypothesis and conclude there is no statistically significant
    difference when, in fact, the data points don''t belong to data source 2 (the
    null hypothesis), but to data source 1. Type II error ($\beta$) is where we might
    make the mistake of assuming the data in that region belongs to data source 1
    (the alternate hypothesis) when, in fact, it belongs to data source 2.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_102_0.png)


    Figure 3.9 – Visualizing error in a left-tailed two-population z-test


    As illustrated in the preceding plot, we see a left-tailed t-test comparing the
    null distribution on the right to the alternate distribution on the left. In this
    plot, we can see two prominent concepts at hand:


    - As $\alpha$ becomes smaller, the critical value slides left, moving more toward
    distributional outliers, $\beta$ becomes larger, and vice versa

    - Statistical power is the area of data source 2 to the right of $\beta$, as $power
    = (1-\beta)$


    A type I error is determined based on a pre-selected threshold; a researcher may
    feel most comfortable with a 90, 95, or 99% level of confidence. However, a type
    II error is based on parameterization (standard deviation, effect size, sample
    size, and so on). Therefore, we can use a power analysis to identify the sample
    size, and vice versa. The implementation of power analysis for various hypothesis
    tests will be implemented in the following two chapters.


    ## Power analysis for a two-population pooled z-test


    Let us look at a dataset of salaries for professors of two different disciplines,
    discipline A and discipline B. We want to know whether there is a statistically
    significant difference between them based on the data we have. First, we need
    to perform a power analysis to know whether we have enough samples to trust the
    results of the z-test we may perform to test this hypothesis. The components of
    a power analysis we need for this include effect size, the type I error rate,
    a desired type II error rate, the direction of the alternate hypothesis (group
    2 is expected to be larger than, smaller than, or could be either larger or smaller
    than group 1), and the ratio of observations in the larger sample relative to'

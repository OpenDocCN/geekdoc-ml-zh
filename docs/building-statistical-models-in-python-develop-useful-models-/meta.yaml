    Recall when we fit the MLR model, the results included a test for statistical
    significance for each feature in the model. We can use that test to select features.
    There are three well-known algorithms for selecting features based on statistical
    significance: **forward selection**, **backward selection**, and **stepwise regression**.
    In forward selection, we start without any variables in the model and then iteratively
    add one variable at a time using the p-value to choose the best feature to add
    at each iteration. We stop once the p-values of any features in the model size
    are above a predefined threshold, such as 0.05. Backward selection takes the opposite
    approach. We start with all features in the model, then iteratively remove features
    one variable at a time using the p-value to determine the least important feature.
    The final algorithm is stepwise regression (also called bidirectional elimination).
    Stepwise regression is performed using both forward and backward tests. Start
    with no features in the model, then in each iteration, perform one forward selection
    step followed by one backward selection pass.


    These selection methods were widely used in the past. However, in recent years,
    performance-based methods have become more widely used. Let''s discuss performance-based
    methods now.


    # Performance-based methods for feature selection


    The primary issue with the statistical feature selection methods mentioned previously
    is that they tend to create **overfit** models. An overfit model is a model that
    fits the given data exactly and fails to generalize to new data. Performance-based
    methods overcome overfitting using a method called **cross-validation**. In cross-validation,
    we have two datasets: a **training dataset** used to fit the model and a **test
    dataset** for evaluating the model. We can build models from multiple sets of
    features, fit all those potential models on the training set, and finally rank
    them based on the performance of the models on the testing set with a given metric.


    # Comparing models


    Before we get into feature selection methods, let''s first discuss how to compare
    models. We use metrics to compare models. On a basic level, we can use metrics
    to help us determine whether one set of features is better than another set of
    features based on model performance. Many metrics can be used for comparing models.
    We will discuss two metrics, **mean square error (MSE)** and **mean absolute percentage
    error (MAPE)**, which are, by far, two of the most commonly used metrics for regression
    models.


    # MSE


    The MSE is given by the following formula, where $N$ is the number of samples,
    $y$ is the response variable, and $\hat{y}$ is the predicted value of the response
    variable.


    ```

    $$MSE = \frac{1}{N} \sum_{i=1}^{N} (y_i - \hat{y}_i)^2$$

    ```'

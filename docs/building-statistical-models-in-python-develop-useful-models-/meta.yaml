  md: "In other words, take the differences between the response values and the predicted\
    \ response values, square the differences, and finally take the mean of the squared\
    \ differences. A small extension of this metric commonly used is the **root mean\
    \ squared error (RMSE)**, which is simply the square root of the MSE. The RMSE\
    \ is used when it is desirable for the metric to have the same units as the response\
    \ variable.\n\n# MAPE\n\nThe MAPE is given by the following formula, where $N$\
    \ is the number of samples, $y$ is the response variable, and $\\hat{y}$ is the\
    \ predicted value of the response variable:\n\n$$MAPE = \\frac{100\\%}{N} \\sum_{i=1}^{N}\
    \ \\left| \\frac{y_i - \\hat{y}_i}{y_i} \\right|$$\n\nThis formula is like the\
    \ formula for the MSE, but instead of taking the mean of the squared error, we\
    \ take the mean of the percent error. This makes the MAPE easier to interpret\
    \ than the MSE, which is a distinct advantage over the MSE.\n\nNow that we have\
    \ discussed model validation and metrics, let's put these concepts together to\
    \ perform feature selection using model performance as an indicator.\n\n# Recursive\
    \ feature elimination\n\n**Recursive feature elimination (RFE)** is a method for\
    \ selecting an optimal number of features in a model using a metric. Much like\
    \ the backward selection method mentioned previously, the RFE algorithm starts\
    \ with all features in the model, then removes features with the least influence\
    \ on the model. At each step, cross-validation is performed. When RFE is completed,\
    \ we will be able to see the cross-validation performance of the model over the\
    \ various sets of features.\n\nIn this example, we use the linear regression implementation\
    \ and RFE implementation from scikit-learn (sklearn), which is a primary package\
    \ used for machine learning in the Python ecosystem. In the following code example,\
    \ we set up RFE to use the MAPE as the scoring metric (make_scorer(mape, greater_is_better=False)),\
    \ remove one feature at each step (step=1), and indicate with cv=2 that it should\
    \ score the model using two cross-validation sets:\n\n```\nlinear_model = LinearRegression()\n\
    linear_model.fit(X, y)\nrfecv = RFECV(\n    estimator=linear_model,\n    step=1,\n\
    \    cv=2,\n    scoring=make_scorer(mape, greater_is_better=False),\n    min_features_to_select=1\n\
    )\nrfecv.fit(X,y)\n```"

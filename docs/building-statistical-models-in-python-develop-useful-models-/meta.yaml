  md: '# The Central Limit Theorem


    When sampling data, it is common to encounter the issue of non-normal data. This
    may be for multiple reasons, such as the population not having a normal distribution
    or the sample being misrepresentative of the population. The Central Limit Theorem,
    which is important in statistical inference, postulates that if random samples
    of *n* observations are taken from a population that has a specific mean, μ, and
    **standard deviation, σ**, the sampling distribution constructed from the means
    of the randomly selected sub-sample distributions will approximate a normal distribution
    having roughly the same mean, μ, and standard deviation, calculated as $\sqrt{\frac{\sum(x_i
    - \mu)^2}{N}}$, as the population. The next section will use bootstrapping to
    demonstrate the Central Limit Theorem in action. A later section discussing transformations
    will provide techniques for reshaping data distributions that do not conform to
    normal distributions so that tools requiring normal distributions can still be
    effectively applied.


    # Bootstrapping


    Bootstrapping is a method of resampling that uses random sampling – typically
    with replacement – to generate statistical estimates about a population by resampling
    from subsets of the sampled distribution, such as the following:


    +   - Confidence intervals

    - Standard error

    - Correlation coefficients (Pearson’s correlation)


    The idea is that repeatedly sampling different random subsets of a sample distribution
    and taking the average each time, given enough repeats, will begin to approximate
    the true population using each subsample’s average. This follows directly the
    concept of the Central Limit Theorem, which to be restated, asserts that sampling
    means begins to approximate normal sampling distributions, centered around the
    original distribution’s mean, as sample sizes and counts increase. Bootstrapping
    is useful when a limited quantity of samples exists in a distribution relative
    to the amount needed for a specific test, but inference is needed.


    As discussed in *Chapter 1, Sampling and Generalization*, constraints such as
    time and expense are common reasons for obtaining samples rather than populations.
    Because the underlying concept of bootstrapping is to make assumptions about the
    population using samples, it is not beneficial to apply this technique to populations
    as the true statistical parameters – such as the percentiles and variance – of
    a population are known. Regarding sample preparation, the balance of attributes
    in the sample should represent the true approximation of the population. Otherwise,
    the results will likely be misleading. For example, if the population of species
    within a zoo is a split of 40% reptiles and 60% mammals and we want to bootstrap
    their longevity to identify the confidence intervals for their lifespans, it would
    be necessary to ensure the dataset to which bootstrapping was applied contained
    a split of 40% reptiles and 60% mammals; a split of 15% reptiles and 85% mammals,
    for example, would lead to misleading results. In other words, the sample stratification
    should be balanced in proportion to the population.'

  md: '# 8

    Discrete Models


    In the previous two chapters, we discussed models for predicting a continuous
    response variable. In this chapter, we will begin discussing models for predicting
    discrete response variables. We will start by discussing the probit and logit
    models for predicting binary outcome variables (categorical variables with two
    levels). Then, we will extend this idea to predicting categorical variables with
    multiple levels. Finally, we will look at predicting count variables, which are
    like categorical variables but only take values of integers and have an infinite
    number of levels.


    In this chapter, we''re going to cover the following main topics:


    +   - Probit and logit models

    - Multinomial logit model

    - Poisson model

    - The negative binomial regression model


    # Probit and logit models


    Previously, we discussed different types of problems that can be solved with regression
    models. In particular, the dependent variable is continuous, such as house prices,
    salaries, and so on. A natural question is if dependent variables are not continuous
    – in other words, if they are categorical – how would we adapt our regression
    equation to predict a categorical response variable? For instance, a human resources
    department in a company wants to conduct an attrition study to predict whether
    an employee will stay with the company or a car dealership wants to know if one
    car can be sold or not based on prices, car models, colors, and so on.


    First, we will study **binary classification**. Here, the outcome (dependent variable)
    is a binary response such as yes/no or to do/not to do. Let''s look back at the
    simple linear regression model:


    ```

    $$y = \beta_0 + \beta_1x + \epsilon$$

    ```'

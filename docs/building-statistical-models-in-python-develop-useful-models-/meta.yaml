  md: '# The AR(1) model


    The **backshift operator notation**, or simply **operator notation**, is a simplified,
    shorthand method of formulating models. It is called “backshift” because it shifts
    time back one lag from $t$ to $t-1$. The purpose is to avoid the necessitation
    of writing the subscript $(y_{t-i})$ following every $\phi$ coefficient and instead
    writing $B^{k-1}$ while including only $y_t$ once, which is handy when writing
    AR(p) models with high orders of $p$. In the following equation, the zero-mean
    form of an AR(1) follows the following structure:


    $$y_t - \mu - \phi_1(y_{t-1} - \mu) = \epsilon_t$$


    The equation reduces to the following example:


    $$y_t - \phi_1(y_{t-1}) = \epsilon_t$$


    In backshift operator notation, we can say this:


    $$(1 - \phi_1 B)y_t = \epsilon_t$$


    > **Note on $|\phi_1|$ in an AR(1)**


    It''s worth noting at this point that an AR(1) process is stationary if $|\phi_1|
    < 1$. That is, when the absolute value of the lag-one autocorrelation is < 1,
    the AR(1) process is stationary. When $|\phi_1| = 1$, an ARIMA model may still
    be useful, but when $|\phi_1| > 1$, the process is considered to be explosive
    and should not be modeled. This is because a value $|\phi_1| < 1$ means the root
    is outside of, and not bounded by, the unit circle. A value of $|\phi_1| = 1$
    is on the unit circle but can be differenced to remove the unit root. The root
    for the case of an AR(1) can be calculated as $z = 1/\phi_1$. A set of data producing
    $|\phi_1| > 1$ cannot be filtered in a way that puts its root outside the unit
    circle.


    When all roots of an AR(p) are outside the unit circle, the given realization
    (one time series sampled from a stochastic process) will converge to the mean,
    have constant variance, and be independent of time. This is an ideal scenario
    for time series data.


    Let''s walk through an example of an AR(1) process with $|\phi_1| < 1$ and therefore
    a stationary root. Assume we have identified the following first-order autoregressive
    process:


    $$y_t - 0.5y_{t-1} = \epsilon_t$$


    This is converted to operator notation:


    $$(1 - 0.5B)y_t = \epsilon_t$$


    When looking for roots, we can use the following notation:


    $$(1 - 0.5z) = 0$$


    This gives us a root of $z$:


    $$z = \frac{1}{\phi_1} = \frac{1}{0.5} = 2$$'

    p, r = pearsonr(df_norm.loc[df_norm['Distribution'] ==\n'Distribution 1', 'X'],\
    \ df_norm.loc[df_norm['Distribution'] ==\n'Distribution 2', 'X'])\nprint(\"p-value\
    \ = %.4f\"%p)\nprint(\"Correlation coefficient = %.4f\"%r)\n```\n\n以下输出表明，在 0.05\

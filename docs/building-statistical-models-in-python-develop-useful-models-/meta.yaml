    # Ratio data


    The final data type is ratio data. Like interval data, ratio data is ordered numeric
    data, but unlike interval data, ratio data has an absolute 0. Absolute 0 means
    that if the value of a ratio-type variable is zero, none of that variable exists
    or is present. For example, consider wait times for rides at an amusement park.
    If no one is in line for the ride, the wait time is 0; new guests can ride the
    amusement ride immediately. There is no meaningful negative measurement for wait
    times. A wait time of 0 is the absolute minimum value. Ratio data also supports
    meaningful multiplication/division, making ratio data the type of data with the
    most supported operations.



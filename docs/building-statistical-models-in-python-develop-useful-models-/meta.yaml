  - '[PAGE 111]


    Visual inspection of the QQ plots and histograms should be enough to help a researcher
    conclude whether the normality assumption has been violated or not. However, in
    cases where one might not want to perform visual inspection—such as when constructing
    a data science pipeline—there are alternative approaches that provide specific
    measurements of normality. Three of the most commonly used tests are the **Kolmogorov-Smirnov**,
    **Anderson-Darling**, and **Shapiro-Wilk** tests.


    The Kolmogorov-Smirnov test focuses more on the centrality of the data. Consequently,
    however, the test has less power if there is a wide variance around the center
    of the data. Anderson-Darling focuses more on the tails of the data than the center
    and is more likely to identify non-conformity to normality if data is heavy-tailed
    with extreme outliers. These two tests perform well on large sample sizes but
    do not have as much power when sample sizes are lower. The third test we consider,
    Shapiro-Wilk, is more general than the Kolmogorov-Smirnov and Anderson-Darling
    tests and therefore more robust to small sample sizes. Based on these traits,
    it may be more useful to use Shapiro-Wilk tests in an automated pipeline. Alternatively,
    it may be better to lower the level of confidence for the test being applied.


    # Kolmogorov-Smirnov


    The **Kolmogorov-Smirnov** test can be used to test the null hypothesis that a
    given sample distribution is normally distributed. This version of the Kolmogorov-Smirnov
    test is the one-sample goodness-of-fit test, which performs analysis against a
    benchmark cumulative density distribution. When running the `kstest` function
    in the `scipy.stats` module, using `stats.norm.cdf` (scipy''s cumulative density
    function) performs this one-sample version of the test. The two-sample version
    tests against a specified distribution to determine whether the two distributions
    match. In the two-sample case, the distribution to be tested must be provided
    as a `numpy` array instead of the `stats.norm.cdf` function used in the code snippet
    shown below *Figure 4.3*. However, this is outside of the scope of testing for
    normality, so we will not look at this.


    Kolmogorov-Smirnov measures a calculated test statistic against a table-based
    critical value (`kstest` calculates this internally). As with other hypothesis
    tests, if the test statistic is larger than the critical value, the null hypothesis
    that the given distribution is normally distributed can be rejected. This can
    also be assessed if the p-value is low enough to be significant. The test statistic
    is calculated as the absolute value of the maximum distance between all data points
    in the given distribution against the cumulative density function.


    > **Kolmogorov-Smirnov special requirement**

    The Kolmogorov-Smirnov test requires data to be centered around zero and scaled
    to a standard deviation of one. All data must be transformed for the test, but
    inference can be applied to the pre-transformed distribution; the centered and
    scaled distribution does not need to be the distribution used in further statistical
    testing or analysis.'

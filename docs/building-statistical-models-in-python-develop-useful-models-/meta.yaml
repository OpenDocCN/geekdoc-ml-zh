    \n## Other Books You May Enjoy\n\n## Preface\n\nStatistics is a discipline of\
    \ study used for applying analytical methods to answer questions and solve problems\
    \ using data, in both academic and industry settings. Many methods have been around\
    \ for centuries, while others are much more recent. Statistical analysis and results\
    \ are fairly straightforward for presenting to both technical and non-technical\
    \ audiences. Furthermore, producing results with statistical analysis does not\
    \ necessarily require large amounts of data or compute resources and can be done\
    \ fairly quickly, especially when using programming languages such as Python,\
    \ which is moderately easy to work with and implement.\n\nWhile artificial intelligence\
    \ (AI) and advanced machine learning (ML) tools have become more prominent and\
    \ popular over recent years with the increase of accessibility in compute power,\
    \ performing statistical analysis as a precursor to developing larger-scale projects\
    \ using AI and ML can enable a practitioner to assess feasibility and practicality\
    \ before using larger compute resources and project architecture development for\
    \ those types of projects.\n\nThis book provides a wide variety of tools that\
    \ are commonly used to test hypotheses and provide basic predictive capabilities\
    \ to analysts and data scientists alike. The reader will walk through the basic\
    \ concepts and terminology required for understanding the statistical tools in\
    \ this book prior to exploring the different tests and conditions under which\
    \ they are applicable. Further, the reader will gain knowledge for assessing the\
    \ performance of the tests. Throughout, examples will be provided in the Python\
    \ programming language to get readers started understanding their data using the\
    \ tools presented, which will be applicable to some of the most common questions\
    \ faced in the data analytics industry. The topics we will walk through include:\n\
    \n- An introduction to statistics\n- Regression models\n- Classification models\n\
    - Time series models\n- Survival analysis\n\nUnderstanding the tools provided\
    \ in these sections will provide the reader with a firm foundation from which\
    \ further independent growth in the statistics domain can more easily be achieved.\n\
    \n## Who this book is for\n\nProfessionals in most industries can benefit from\
    \ the tools in this book. The tools provided are useful primarily at a higher\
    \ level of inferential analysis, but can be applied to deeper levels depending\
    \ on the industry in which the practitioner wishes to apply them. The target audiences\
    \ of this book are:\n\n- Industry professionals with limited statistical or programming\
    \ knowledge who would like to learn to use data for testing hypotheses they have\
    \ in their business domain\n- Data analysts and scientists who wish to broaden\
    \ their statistical knowledge and find a set of tools and their implementations\
    \ for performing various data-oriented tasks\n\nThe ground-up approach of this\
    \ book seeks to provide entry into the knowledge base for a wide audience and\
    \ therefore should neither discourage novice-level practitioners nor exclude advanced-level\
    \ practitioners from the benefits of the materials presented.\n\n## What this\
    \ book covers\n\n*Chapter 1, Sampling and Generalization*, describes the concepts\
    \ of sampling and generalization. The discussion of sampling covers several common\
    \ methods for sampling data from a population and discusses the implications for\
    \ generalization. This chapter also discusses how to setup the software required\
    \ for this book.\n\n*Chapter 2, Distributions of Data*, provides a detailed introduction\
    \ to types of data, common distributions used to describe data, and statistical\
    \ measures. This chapter also covers common transformations used to change distributions.\n\
    \n*Chapter 3, Hypothesis Testing*, introduces the concept of statistical tests\
    \ as a method for answering questions of interest. This chapter covers the steps\
    \ to perform a test, the types of errors encountered in testing, and how to select\
    \ power using the Z-test.\n\n*Chapter 4, Parametric Tests*, further discusses\
    \ statistical tests, providing detailed descriptions of common parametric statistical\
    \ tests, the assumptions of parametric tests, and how to assess the validity of\
    \ parametric tests. This chapter also introduces the concept of multiple tests\
    \ and provides details on corrections for multiple tests.\n\n*Chapter 5, Non-parametric\
    \ Tests*, discuss how to perform statistical tests when the assumptions of parametric\
    \ tests are violated with class of tests without assumptions called non-parametric\
    \ tests.\n\n*Chapter 6, Simple Linear Regression*, introduces the concept of a\
    \ statistical model with the simple linear regression model. This chapter begins\
    \ by discussing the theoretical foundations of simple linear regression and then\
    \ discusses how to interpret the results of the model and assess the validity\
    \ of the model."

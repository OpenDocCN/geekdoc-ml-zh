    \ 是观测值，$\\widehat{y}_i$ 是第 $i^{th}$ 个观测值的响应变量 $y$ 的预测值。平方误差之和由下式给出：\n\n$$S = \\\
    sum_{i=1}^{n} (y_i - \\widehat{\\beta}_0 - \\widehat{\\beta}_1 x_i)^2$$\n\n为了最小化\
    \ S，我们将对 $\\widehat{\\beta}_0$ 和 $\\widehat{\\beta}_1$ 求偏导数。然后，我们得到：\n\n$$\\frac{\\\

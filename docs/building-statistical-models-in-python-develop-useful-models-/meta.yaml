- md: "## Two-sample t-test – Welch’s t-test\n\nThis is a practical two-sample t-test\
    \ when the data is normally distributed but the population standard deviations\
    \ are unknown and unequal. We have the same assumption for normality as with a\
    \ pooled t-test but we can relax the assumption for equal variance when performing\
    \ Welch’s t-test. Let us consider the following example where we have two sample\
    \ datasets:\n\n```\nsample1 = np.array([2,3,4,2,3,4,2,3,5,8,7,10])\nsample2 =\
    \ np.array([30,26,32,34,28,29,31,35,36,33,32,27])\n```\n\nWe assume the independence\
    \ is satisfied, but we will check the normality and equal standard deviation assumptions\
    \ for these two samples, as follows:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_131_0.png)\n\
    \nThere is strong visual evidence against equal standard deviations by looking\
    \ at the x axis scale of the histograms in Figure 4.12. Let us assume the normality\
    \ assumption is satisfied. In this case, a two-sample pooled t-test is not a good\
    \ idea, but Welch’s t-test would suffice. The null and alternative hypotheses\
    \ are given here:\n\n$H_0: \\mu_1 = \\mu_2$\n$H_a: \\mu_1 \\neq \\mu_2$\n\nWe\
    \ specify the level of significance 0.05. To calculate the test statistic and\
    \ p-value, we implement the code as follows:\n\n```\nimport scipy.stats as stats\n\
    t_statistic, p_value = stats.ttest_ind(sample1, sample2,\n    equal_var = False)\n\
    ```\n\nThe test statistic is -22.47 and the p-value is <0.05 (the level of significance).\
    \ We reject the null hypothesis. There is strong evidence to suggest the mean\
    \ of sample data 1 is different from the mean of sample data 2.\n\n## Paired t-test\n\
    \nThe paired t-test is also known as a matched pairs or dependent t-test and is\
    \ used in studies when each element in a sample is tested twice (pre-test and\
    \ post-test or repeated measures) and when the researcher thinks that there are\
    \ some similarities, such as family. The assumptions are set out here:\n\n- Differences\
    \ are normally distributed\n- Differences are independent between observations\
    \ but dependent from one test to another test\n\nThe paired t-test is used in\
    \ many studies, especially in medical reasoning tests related to pre- and post-treatments.\
    \ Let's go back to IQ test scores—a researcher recruits a number of students to\
    \ see whether there is a score difference before and after a training section,\
    \ as represented in the following table:\n\n| Students | Pre-training score |\
    \ Post-training score | Differences |\n| :--- | :--- | :--- | :--- |\n| A | 95\
    \ | 95 | 0 |\n| B | 98 | 110 | 12 |\n| C | 90 | 97 | 7 |\n| D | 115 | 112 | -3\
    \ |\n| E | 112 | 117 | 5 |\n\nFigure 4.13 – Pre-training and post-training scores\n\
    \nIn this case, we should not use an independent two-sample t-test. The mean of\
    \ the differences should be tested here. We can check the assumption about normal\
    \ distribution by using histogram and QQ plots, as follows:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_133_0.png)\n\
    \nFigure 4.14 – Checking normality for the paired t-test\n\nEvidence for the data\
    \ being normally distributed is more obvious by looking at the QQ plot than the\
    \ histogram.\n\nThe differences are assumed to be independent. The null and alternative\
    \ hypotheses are given here:\n\n$$H_0: \\mu_{pos} - \\mu_{pre} = 0$$\n$$H_a: \\\
    mu_{pos} - \\mu_{pre} > 0$$\n\n$d_i$ denotes the difference between the pre-training\
    \ score and the post-training score of each student. The null and alternative\
    \ hypotheses can be rewritten as follows:\n\n$$H_0: \\mu_d = 0$$\n$$H_a: \\mu_d\
    \ > 0$$\n\nThen, the test statistic is computed like so:\n\n$$t = \\frac{\\bar{d}\
    \ - \\mu_d}{\\frac{s_d}{\\sqrt{n}}}$$\n\nHere, $\\bar{d}$ is the sample mean of\
    \ the differences and $s_d$ is the sample standard deviation of differences. In\
    \ other words, a paired t-test is reduced to a one-sample t-test. However, we\
    \ can use the following function in scipy directly:\n\n```\nstats.ttest_rel(data_pos,\
    \ data_pre, alternative = {'two-sided', 'less', 'greater'})\n```\n\nThe alternative\
    \ hypothesis corresponds to a left-tailed, right-tailed, or two-tailed test. Here\
    \ is the Python implementation for the IQ test score study example:\n\n```\nfrom\
    \ scipy import stats\nIQ_pre = [95, 98, 90, 115, 112]\nIQ_pos = [95, 110, 97,\
    \ 112, 117]\nt_statistic, p_value = stats.ttest_rel(IQ_pos, IQ_pre, alternative\
    \ = 'greater')\n```\n\nThe test statistic is 1.594 and the p-value is 0.093. Therefore,\
    \ given the p-value is <0.05 and the level of significance $\\alpha = 0.05$, we\
    \ reject the null hypothesis. There is sufficient evidence to suggest that training\
    \ has a significant effect on IQ scores.\n\n## Tests with more than two groups\
    \ and ANOVA\n\nIn the previous chapter and previous sections, we covered tests\
    \ between two groups. In this section, we will cover two methods for testing differences\
    \ between groups, as follows:\n\n- Pairwise tests with the **Bonferroni correction**\n\
    - ANOVA\n\nWhen testing for differences between more than two groups, we will\
    \ have to use multiple tests, which will affect our *type I* error rate. There\
    \ are several methods to control the error rate. We will see how to utilize the\
    \ Bonferroni correction to control the *Type I* error rate. We will also discuss\
    \ ANOVA in this section, which is used to test for a difference in means of multiple\
    \ groups.\n\n## Multiple tests for significance\n\nIn the previous sections, we\
    \ looked at making a comparison between two groups. In this section, we will consider\
    \ how to perform tests when there are more than two groups present. Let's again\
    \ consider the factory example where we have several models (model A, model B,\
    \ and model C) of machines on"

    \ - \\bar{x}_2} = \\sqrt{\\frac{\\sigma_1^2}{n_1} + \\frac{\\sigma_2^2}{n_2}}$$\n\
    \nThe distribution of $\\bar{x}_1 - \\bar{x}_2$ can be considered a normal distribution\
    \ when the sample sizes are large enough. The step-by-step approach to the two-sample\
    \ z-test hypothesis test is similar to that of the one-sample z-test.\n\nLet us\
    \ now consider an example. We study the IQ scores of students from two schools,\
    \ named A and B, in Dallas, and we want to know whether the mean IQ levels for\
    \ these two schools are different. A simple random sample of 30 students from\
    \ each school is recorded.\n\nA= [95,110, 105, 120, 125, 110, 98, 90, 99, 100,110,\
    \ 112, 106, 92, 108, 97, 95, 99, 100, 100, 103, 125, 122, 110, 112, 102, 92, 97,\
    \ 89, 102]\n\nB = [98, 90, 100, 93, 91, 79, 90, 100, 121, 89, 101, 98, 75, 90,\
    \ 95, 99, 100, 120, 121, 95, 96, 89, 115, 99, 95, 121, 122, 98, 97, 97]\n\nThe\
    \ null and alternative hypotheses are:\n\n$$H_0: \\mu_1 - \\mu_2 = 0$$\n$$H_a:\
    \ \\mu_1 - \\mu_2 \\neq 0$$\n\nWe choose the level of significance $\\alpha=0.05$.\
    \ In Python, by using the `ztest()` function of the `statsmodels` package, we\
    \ perform the following calculation:\n\n```\nfrom statsmodels.stats.weightstats\
    \ import ztest as ztest\n\n#IQ score\nA= [95,110, 105, 120, 125, 110, 98, 90,\
    \ 99, 100,\n    110, 112, 106, 92, 108, 97, 95, 99, 100, 100,\n    103, 125, 122,\
    \ 110, 112, 102, 92, 97, 89,102] #school A\nB = [98, 90, 100, 93, 91, 79, 90,\
    \ 100, 121, 89,\n     101, 98, 75, 90, 95, 99, 100, 120, 121, 95,\n```"
- md: '## z-test for proportions


    We can also test for differences in proportions. Let''s take a look at how to
    perform the z-test for proportions.


    ### A one-proportion z-test


    One-proportion z-tests are used to compare the difference between a sample proportion
    $\bar{p}$ and a hypothesized proportion $p_0$. Similarly, as in a z-test for means,
    we have three forms for the null and alternative hypotheses – left-tailed, right-tailed,
    and two-tailed tests:


    $H_0: \bar{p} \geq p_0$


    In the preceding code, we chose `alternative = ''two-sided''` related to the null
    and alternative hypotheses for the study. The test statistic and the p-value produced
    by the Python code are 1.757 and 0.079, respectively. Using a level of significance
    of 0.05, since the p-value > 0.05, we fail to reject the null hypothesis. In other
    words, we do not have enough evidence to show that the IQ mean scores between
    the students from the two schools are different.


    ```python

    # school B

    B = [96, 89, 115, 99, 95, 121, 122, 98, 97, 97]


    # perform two-sample z-test

    z_statistic, p_value = ztest(A, B, value=0, alternative=''two-sided'')


    print(f"The test statistic is {z_statistic} and the corresponding p-value is {p_value}.")

    ```'

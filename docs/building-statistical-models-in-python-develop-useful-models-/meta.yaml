    \n> **形状对均值和中位数的影响**\n> 如果分布是对称的，均值和中位数将趋于一致。然而，如果分布不对称，均值和中位数将会发散。\n\n度量发散的程度取决于分布的不对称程度。*图2.6*给出了四个示例分布来展示这种效应。分布1和2显示均值被拉向比中位数更高的值。均值被拉向绝对值较大的值。这是均值的一个重要效应，当数据集包含（或可能包含）**异常值**（通常称为离群值或影响点）时需要注意，这些异常值往往会将均值拉向它们的方向。与均值不同，如果异常值占数据的比例较小，中位数不受异常值的影响。异常值将在*度量变异性*部分进一步讨论。\n\

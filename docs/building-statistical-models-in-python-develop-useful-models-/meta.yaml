    # Tukey fences


    In the last few sections on measurements, the concept of outliers has appeared
    a few times. Outliers are values that are atypical compared to the main distribution,
    or anomalous values. While there are methods for classifying data points as outliers,
    there is no generally robust method for classifying data points as outliers. Defining
    outliers typically should be informed by the use case of the data analysis, as
    there will be different factors to consider based on the application domain. However,
    it is worth'
  merge: -1
  pgno: 56
- img_proc: true
  md: "mentioning the common technique shown in the boxplot example called Tukey fences.\
    \ The lower and upper Tukey fences are based on the IQR and defined as follows:\n\
    \n+   - Lower fence: $Q1 - k(IQR)$\n- Upper fence: $Q3 + k(IQR)$\n\nAs mentioned\
    \ earlier, k is often chosen to be 1.5 as a default value, but there may be a\
    \ more appropriate value for a given application domain.\n\nNow let's take a look\
    \ at how to calculate Tukey fences with numpy and scipy. This code example will\
    \ build upon the previous example since there is no function to calculate the\
    \ fences directly. We will again calculate the quartiles and the IQR with numpy\
    \ and scipy. Then, we apply these operations to the values listed in the preceding\
    \ equations:\n\n```\nimport numpy as np\nfrom scipy import stats\nvalues = stats.norm.rvs(10,\
    \ size=3000)\nq1, q3 = np.quantile(values, [.25, .75],\n    method='closest_observation')\n\
    iqr = stats.iqr(values,interpolation='closest_observation')\nlower_fence = q1\
    \ - iqr * 1.5\nupper_fence = q3 + iqr * 1.5\n# may vary due to randomness in data\
    \ generation\nprint(f\"The lower fence is {lower_fence:.2f} and the upper\n  \
    \  fence is {upper_fence:.2f}\")\n# The lower fence is 7.36 and the upper fence\
    \ is 12.67\n```\n\nIn this case, we used both numpy and scipy; however, the scipy\
    \ calculation could be replaced with Q3-Q1 as mentioned previously.\n\n# Variance\n\
    \nThe last measure of variability that will be covered in this section is variance.\
    \ Variance is a measure of dispersion that can be understood as how *spread out*\
    \ the numbers are from the average value. The formula for variance, denoted $S^2$,\
    \ is as follows:\n\n$$S^2 = \\frac{\\sum(x_i - \\bar{x})^2}{N - 1}$$\n\nIn this\
    \ equation, the term $(x_i - \\bar{x})$ is considered the deviation from the mean,\
    \ which leads to another measure that is closely related to variance – the standard\
    \ deviation, which is the square root of variance. The formula for standard deviation,\
    \ denoted $\\sigma$, is given here:\n\n$$\\sigma = \\sqrt{S^2} = \\sqrt{\\frac{\\\
    sum(x_i - \\bar{x})^2}{N - 1}}$$"
  merge: -1
  pgno: 57

  md: 'Before discussing the z-statistic, we will introduce the notion of sampling
    distributions. Going back to the last example, as a rule of thumb, we perform
    the process of selecting a simple random sample of 35 IQ scores from the pool
    of IQ scores of the high school repeatedly, as many times as needed for the study.
    We then compute the mean score of each sample, called $\bar{x}$. Because we have
    various samples selected, we also have various possible values of $\bar{x}$. The
    expected value of $\bar{x}$ is as follows:


    ```

    $$E(\bar{x}) = \mu$$

    ```


    Here, $\mu$ is the population mean. $\sigma_{\bar{x}}$ denotes the standard distribution
    of $\bar{x}$. Practically, in many sampling situations, a population is relatively
    large compared to small sample sizes. Then, the standard deviation of $\bar{x}$
    can be given as follows:


    ```

    $$\sigma_{\bar{x}} = \frac{\sigma}{\sqrt{n}}$$

    ```


    Here, $\sigma$ is the population standard deviation and $n$ is the sample size
    for finite or infinite populations such that the population is large and the sample
    size is small, relatively. Note that $\sigma_{\bar{x}}$ is also called the standard
    error of the mean to help us determine how far the sample mean is from the population
    mean. Note that $E(\bar{x}) = \mu$, independent of the sample size. Sample size
    and standard error are inversely correlated: when the sample size is increased,
    the standard error decreases. Since the sampling distribution of $\bar{x}$ is
    assumed to be normally distributed, the sample distribution is given by the following
    formula:


    ```

    $$z_{\bar{x}} = \frac{\bar{x} - \mu}{\sigma_{\bar{x}}}$$

    ```


    In hypothesis tests about a population mean, we use test statistics where its
    formula is given as follows:


    ```

    $$z = z_{\bar{x}} = \frac{\bar{x} - \mu}{\sigma / \sqrt{n}}$$

    ```


    Here, $\bar{x}$ is the sample mean, $\mu$ is the population mean, $\sigma$ is
    the population standard deviation, and $n$ is the sample size.


    Consider the IQ test example again. The IQ score data has a mean $\mu = 98$ and
    a standard deviation $\sigma = 12$. Suppose the data is normally distributed.
    Let $x$ be the score taken randomly from the IQ data. What is the probability
    that $x$ is between 95 and 104? We will compute the z-scores when $x = 95$ and
    $x = 104$ as follows:


    ```

    $$z_{95} = \frac{95 - 98}{12} = -0.25,$$

    $$z_{100} = \frac{104 - 98}{12} = 0.5.$$

    ```


    Therefore, the probability that the taken score is between 95 and 104 is:


    ```

    $$P(95 < x < 104) = P(-0.25 < z < 0.5) = 0.6915 - 0.4013 = 0.2902.$$

    ```'

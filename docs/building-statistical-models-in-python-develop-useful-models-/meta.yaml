    not control for autocorrelation between specific lags, we can use this correlation
    information to build a moving average function that can help model the noise component
    of the data across a long period.


    However, if we want to be able to construct a component of a model that allows
    us to define the relationship from point to point within the framework of ARMA
    models, we will want to also observe the PACF, which does control for the correlation
    between lags. Note in *Figure 10.5* the original data and its PACF. It shows a

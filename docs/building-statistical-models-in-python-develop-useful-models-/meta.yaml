  md: 'With respect to statistical modeling, the normal distribution represents balance
    and symmetry. This is important when building statistical models as many models
    assume normal distribution and are not robust to many deviations from that assumption,
    as they are built around a mean. Consequently, if variables in such a model are
    not normally distributed, the model''s errors will be increased and inconsistent,
    thus diminishing the model''s stability. When considering multiple variables in
    a statistical model, their interaction is more easily approximated when both are
    normally distributed.


    In the following *Figure 2.16*, in the left plot, variables X and Y interact with
    each other and create a centralized dispersion around a mean. In this case, modeling
    Y using X with a mean line or linear distance can be done reasonably well. However,
    if the two variables'' distributions were skewed, as in the plot on the right,
    this would result in non-constant variance between the two, resulting in an unequal
    distribution of errors and unreliable output.



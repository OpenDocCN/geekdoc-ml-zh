  md: "We observe in *Figure 12.12* that the strongest correlation between *realdpi*\
    \ and *realinv* is at lag 0, but there are at least two other similarly correlated\
    \ lags at *x*=-27 and *x*=-37 in the plot. As we saw in the *ARIMAX* section,\
    \ we can include multiple shifted versions of the same variables as new variables\
    \ to improve the predictive power of the model. This would enable us to take advantage\
    \ of multiple correlations. However, for the purpose of model demonstration, we\
    \ will not include that as the output from the VAR summary can become large. Also,\
    \ as we mentioned, including too many lags of the same variable can result in\
    \ overfitting. It is up to the practitioner to ultimately decide how many lags\
    \ to use. This must be done by assessing model fit and bias/variance trade-offs.\
    \ The function code given here is also in *Chapter 10, Introduction to Time Series*:\n\
    \n```\n# code imported from chapter 10\ndef plot_ccf(data_a, data_b, lag_lookback,\
    \ percentile, ax,\n            title=None):\n\n    n = len(data_a)\n    ccf =\
    \ correlate(data_a - np.mean(data_a), data_b -\n    np.mean(data_b), method='direct')\
    \ / (np.std(data_a) * np.std(data_b) *\n    n)\n\n    _min = (len(ccf)-1)//2 -\
    \ lag_lookback\n    _max = (len(ccf)-1)//2 + (lag_lookback-1)\n\n    zscore_vals={90:1.645,\n\
    \                 95:1.96,\n                 99:2.576}\n\n    markers, stems,\
    \ baseline = ax.stem(np.arange(-lag_lookback, (lag_\n    lookback-1)), ccf[_min:_max],\
    \ markerfmt='o', use_line_collection =\n    True)\n\n    z_score_95pct = zscore_vals.get(percentile)/np.sqrt(n)\
    \ #1.645 for\n    90%, 1.96 for 95%, and 2.576 for 99%\n\n    ax.set_title(title)\n\
    \    ax.set_xlabel('Lag')\n    ax.set_ylabel('Correlation')\n    ax.axhline(y=-z_score_95pct,\
    \ color='b', ls='--')# Z-statistic for\n    95% CL LL\n    ax.axhline(y=z_score_95pct,\
    \ color='b', ls='--')# Z-statistic for\n    95% CL UL\n    ax.axvline(x=0, color='black',\
    \ ls='-');\n\nplot = plot_ccf(data_a=data_1d['realdpi'], data_b=data_1d['realinv'],\n\
    lag_lookback=50, percentile=95)\n```"

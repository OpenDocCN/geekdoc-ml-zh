  md: 'Another interesting aspect of the distribution is that the mean and variance
    are equal. This means that as the mean increases, the spread of the distribution
    also increases. We can see this in action in the examples in *Figure 8.7*. The
    distribution with a mean of 2 has a small spread with a large peak at the mean,
    while the distribution with a mean of 12 has a much wider spread with a lower
    peak at the mean.


    Now that we have discussed the Poisson distribution, let''s look at how to set
    up a Poisson model.


    # Modeling count data


    Now, let''s look at how to model the response variable of counts with the Poisson
    model. As mentioned previously, count data often follows a Poisson distribution.
    The Poisson model is expressed mathematically as follows:


    $$y = e^{b_0 + b_1x_1 + ... + b_nx_n}$$


    Here, *y* is the response variable, *b* values are model coefficients, and *x*
    variables represent explanatory variables. This should appear similar to the equation
    we used in the previous chapter but with the addition of the exponentiation of
    the explanatory variables. This type of model is called a **log-linear** model,
    which is a model where the logarithm of the response variable is modeled by a
    linear combination of variables. We can rewrite this equation by applying the
    natural logarithm to both sides of the equation to make it explicit:


    $$\ln(y) = b_0 + b_1x_1 + ... + b_nx_n$$


    Now, we have the logarithm of the response variable ( $\ln(y)$ ) expressed as
    a linear combination of explanatory variables.


    > **The natural logarithm**

    The Poisson model uses a special logarithm called the natural logarithm. The natural
    logarithm of a number is the logarithm of that number using the mathematical constant
    *e* as the base. The natural logarithm is generally written as $\ln(x)$, $\log_e(x)$,
    or $\log(x)$ (the first two options are explicit, but the third option can be
    ambiguous). The logarithm operation is the inverse of exponentiation. In this
    case, the natural logarithm is the inverse of the exponential function: $\ln(e^x)
    = x = e^{\ln(x)}$. The natural logarithm and exponential function are commonly
    used in statistics, mathematics, and science.


    Let''s look at an example. We will be using the Bike Sharing Dataset from UCI
    (`https://archive.ics.uci.edu/ml/datasets/bike+sharing+dataset.`). In this dataset,
    we have counts of bikes rented each day. There are two types of rentals: pre-registered
    (registered) and on-demand at a location (casual). In this example, we will model
    the weekly mean count of casually rented bikes over a given year. The dataset
    provides several explanatory variables, including environmental factors such as
    temperature and calendar information such as whether a holiday occurred.'

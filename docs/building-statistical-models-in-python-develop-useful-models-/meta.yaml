  md: '# Poisson model


    In the previous section, we discussed models where the response variable was categorical.
    In this section, we will look at a model for count data. Count data is like categorical
    data (the categories are integers), but there are an infinite number of levels
    (0, 1, 2, 3, and so on). We model count data with the **Poisson distribution**.
    In this section, we will start by examining the Poisson distribution and its properties.
    Then, we will model a count variable with explanatory variables using the Poisson
    model.


    # The Poisson distribution


    The Poisson distribution is given by the following formula:


    $$P(k) = \frac{\lambda^k e^{-\lambda}}{k!}$$


    Here, $\lambda$ is the average number of events and $k$ is the number of events
    for which we would like the probability. $P(k)$ is the probability that the $k$
    events occur. This distribution is used to calculate the probability of $k$ events
    occurring in a fixed time interval or a defined space.


    The shape of the distribution changes with the value of $\lambda$. When $\lambda$
    is greater than 10, the distribution appears approximately normal. However, as
    $\lambda$ approaches 0, the distribution becomes right-skewed. This is because
    count data cannot be negative. Three example Poisson distributions are shown in
    *Figure 8.7* with means of 12, 5, and 2. Notice that the distribution with the
    mean of 12 is approximately normally distributed, while the distributions of 5
    and 2 are right-skewed:'

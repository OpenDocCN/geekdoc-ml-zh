  md: "that of the smaller. Discipline A has 181 salaries and discipline B has 216.\
    \ Therefore, 216 will be our numerator corresponding to what we will consider\
    \ as *group 1* (discipline A will be *group 2*).\n\nLet us suppose we are not\
    \ sure whether one group will be larger or smaller than the other; we will consider\
    \ this a two-sided hypothesis test. The effect size for this z-test is the difference\
    \ between the two groups. We will use **Cohen's d**. To calculate that, we need\
    \ to divide the difference between the means of the two groups by the pooled standard\
    \ deviation. Calculated here, the pooled standard deviation is the number of samples\
    \ in group 1 multiplied by the variance of group 1, plus the same for group 2,\
    \ all divided by the combined sample size for the two groups. The following is\
    \ the equation for the pooled standard deviation:\n\n$$\\sqrt{\\frac{n_1 \\sigma_1^2\
    \ + n_2 \\sigma_2^2}{n_1 + n_2}}$$\n\nFor effect size, we need to divide the difference\
    \ of means by the effect size as follows:\n\n$$\\frac{|\\mu_1 - \\mu_2|}{\\sqrt{\\\
    frac{n_1 \\sigma_1^2 + n_2 \\sigma_2^2}{n_1 + n_2}}}$$\n\nNote that in the equation\
    \ for effect size, we take the absolute value of the difference of means. That\

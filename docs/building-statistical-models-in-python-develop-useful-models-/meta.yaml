  md: '# Median


    The next measure of the center is the median. The median is the middle value occurring
    when the values are arranged in an order.


    > **Median and Data Types**

    This measure can be performed on ordinal data, interval data, and ratio data,
    but not on nominal data.


    We will discuss two cases here.


    # Finding the median when the number of instances is odd


    Finding the median of some numeric data is shown in *Figure 2.6*. The data is
    sorted, then the median is identified.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_49_0.png)


    In the preceding example, the instances are odd in number (7 instances), which
    have a center value. However, if the number of instances had been even, it would
    not have been possible to just take the middle number after sorting the values.


    # Finding the median when the number of instances is even


    When there are an even number of instances, the average of the two middle-most
    values is taken. Unlike the mode, there is no concept of multiple medians for
    the same series of data. An example with an even number of instances (8 instances)
    is shown in *Figure 2.7*.'
  merge: -1
  pgno: 49
- img_proc: true
  md: 'Raw Data 85, 99, 70, 71, 86, 88, 94, 105

    Sorted 70, 71, 85, 86, 88, 94, 99, 105

    Middle-Most Two 86 88

    Average 87


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_50_0.png)


    Now, let''s see how to calculate the median of a dataset with numpy. Like scipy,
    numpy contains functions for calculating descriptive statistics. We will calculate
    the median for the eight numbers listed in the preceding example:


    ```

    import numpy as np

    values = [85, 99, 70, 71, 86, 88, 94, 105]

    median = np.median(values)

    print(f"The median value is {median:.2f}")

    # The median value is 87.00

    ```


    The result of the median calculation is 87, as expected. Note that the median
    function returns a single value, in contrast to the mode function in the previous
    code example.


    # Mean


    The next center measure is the mean, which is commonly referred to as the average.
    The mean is defined by the following equation:


    $$\bar{x} = \frac{\sum_{i=0}^{n} x_i}{N}$$


    Let me explain the equation in words. To calculate the mean, we must add all the
    values together, then divide the sum by the number of values. Please refer to
    the following example. The 7 numbers are first added together, which brings the
    total sum to 593. This sum is then divided by the number of instances, resulting
    in a value of 84.7.'
  merge: -1

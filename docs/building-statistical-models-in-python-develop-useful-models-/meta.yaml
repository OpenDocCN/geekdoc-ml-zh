    \ attempting to decide based on visual inspection. In this section, we will discuss\
    \ the process of hypothesis testing. In the next section, *Basics of the z-test\
    \ – the z-score, z-statistic, critical values, and p-values*, we will put the\
    \ process to work by walking through an example in detail with the z-test."

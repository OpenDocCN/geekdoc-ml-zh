  md: '# Fitting an ARIMA model with seasonality


    We will take the following steps to fit an ARIMA model with seasonality:


    +   - Remove seasonality with differencing.

    - Remove additional non-stationarity with differencing.

    - Fit a stationary model to the resulting series.


    This is essentially the same process we used to fit an ARIMA model, but there
    is an additional step to handle the seasonal component. Let us walk through an
    example with the airline data.


    We will start with using differencing to remove the seasonal component of the
    time series. Recall that the seasonal period of the airline time series is 12,
    meaning that we need to perform differencing at lag 12 as shown with this equation:


    $y''_t = y_t - y_{t-12}$


    We can perform this difference using the `diff` function from `pmdarima`. The
    following code shows how to perform the 12th lagged difference on the airline
    data:


    ```

    import pmdarima as pm

    from sktime import datasets

    y_airline = datasets.load_airline()

    series = pm.utils.diff( y_airline.values, lag=12)

    ```


    After performing the seasonal difference, we get the differenced series shown
    in *Figure 11.23* along with the ACF plot. The seasonal portion of the time series
    appears to be completely removed. The differenced series does not appear to exhibit
    any repeating patterns. Additionally, the ACF plot does not show the seasonal
    peak that was present in the ACF plot of the original data:'
  merge: -1
  pgno: 326
- img_proc: true
  md: '![](img/3de2e60811d1b90c67f6bb2d5cae034f_327_0.png)


    Figure 11.23 – Airline data after seasonal difference


    With the seasonal portion of the time series removed, we need to determine whether
    we need to take any additional differences to stationarize the new time series.
    The differenced series in *Figure 11.23* appears to exhibit a trend. The original
    data also exhibited a trend. As before, we can use the Dickey-Fuller test to get
    additional evidence on whether we should apply additional differences. Running
    the Dickey-Fuller test on this series will result in a p-value of 0.099, which
    suggests that we should take a difference in the series to account for a unit
    root:


    ```

    python

    adf_test = pm.arima.ADFTest()

    adf_test.should_diff(series)

    # (0.09898694171553156, True)

    ```'

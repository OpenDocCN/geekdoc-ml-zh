    \ from subsets of the sampled distribution, such as the following:\n\n- Confidence\
    \ intervals\n- Standard error\n- Correlation coefficients (Pearson’s correlation)\n\
    \nThe idea is that repeatedly sampling different random subsets of a sample distribution\
    \ and taking the average each time, given enough repeats, will begin to approximate\

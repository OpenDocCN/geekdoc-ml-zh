    ## 理解数据类型


    在讨论数据分布之前，了解数据类型会很有用。理解数据类型至关重要，因为数据的类型决定了可以使用何种分析，因为数据的类型决定了可以对数据执行哪些操作（这将在本章的示例中变得更加清晰）。数据有四种不同的类型：


    - 名义数据

    - 顺序数据

    - 区间数据

    - 比率数据


    这些数据类型也可以分为两组。前两种数据类型（名义和顺序）是**定性数据**，通常是数字类别。后两种数据类型（区间和比率）是**定量数据**，通常是数值。


    让我们从名义数据开始。


    ## 名义数据


    名义数据是用不同分组标记的数据。例如，以一家标识工厂中的机器为例。工厂从不同供应商采购机器是很常见的，这些机器也会有不同的型号。例如，示例工厂可能有 3 台
    **A 型**机器和 5 台 **B 型**机器（见*图 2.1*）。这些机器构成了一组名义数据，其中 **A 型**和 **B 型**是不同的分组标签。对于名义数据，只能执行一种操作：相等。同一组中的每个成员是相等的，而不同组的成员是不相等的。在我们的工厂示例中，一台
    **A 型**机器将等于另一台 **A 型**机器，而一台 **B 型**机器将不等于一台 **A 型**机器。


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_41_0.png)


    图 2.1 – 工厂中的两组机器


    如我们所见，对于这种类型的数据，我们只能将项目分组到标签下。对于下一种数据类型，我们将引入一个新特征：顺序。


    ## 顺序数据


    下一种数据类型类似于名义数据，但表现出顺序。数据可以标记为不同的组，并且这些组可以排序。我们称这种类型的数据为顺序数据。继续工厂示例，假设有一台 **C 型**机器，并且
    **C 型**与 **B 型**由同一供应商提供。然而，**C 型**是高性能版本，产生更高的输出。在这种情况下，**B 型**和 **C 型**是顺序数据，因为
    **B 型**是输出较低的机器，而 **C 型**是输出较高的机器，这创造了一个自然的顺序。例如，我们可以按性能升序排列型号标签：**B 型**、**C 型**。大学教育水平是顺序数据的另一个例子，包括学士、硕士和博士。如前所述，这种数据类型的新操作是排序，意味着数据可以排序。因此，顺序数据支持顺序和相等。虽然这种数据类型可以按升序或降序排序，但我们不能对数据进行加法或减法运算，这意味着
    **B 型 + C 型**不是一个有意义的陈述。我们将讨论的下一种数据类型将支持加法和减法。


    ## 区间数据


    下一种数据类型，区间数据，用于描述存在于区间尺度上但没有明确定义零点的数据。这意味着两个数据点之间的差异是有意义的。以摄氏温度尺度为例。数据点是数值，并且数据点以相等的间隔排列（例如，20
    和 40 都与 30 相差 10 度）。


    在这个温度尺度的例子中，0 的定义是任意的。对于摄氏度，0 恰好被设定在水的冰点，但这是尺度设计者做出的任意选择。因此，区间数据类型支持相等、顺序和加法/减法。


    ## 比率数据


    最后一种数据类型是比率数据。与区间数据类似，比率数据是有序的数值数据，但与区间数据不同，比率数据具有绝对零点。绝对零点意味着如果比率类型变量的值为零，则该变量不存在或未出现。例如，考虑游乐园游乐设施的等待时间。如果没有人排队等待该游乐设施，则等待时间为
    0；新游客可以立即乘坐游乐设施。等待时间没有有意义的负测量值。等待时间为 0 是绝对最小值。比率数据还支持有意义的乘法/除法，使得比率数据成为支持操作最多的数据类型。


    ## 可视化数据类型


    数据可视化是理解分布和识别数据属性的关键步骤。在本章（以及本书中），我们将使用 `matplotlib` 来可视化数据。虽然其他 Python 库也可用于可视化数据，但
    `matplotlib` 是 Python 的事实标准绘图库。在本节中，我们将开始使用 `matplotlib` 来可视化前面讨论的四种数据类型。


    ## 绘制定性数据类型


    由于前两种数据类型是分类的，我们将使用条形图来可视化这些数据分布。示例条形图如*图 2.2*所示。



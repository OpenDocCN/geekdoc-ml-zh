  md: '# Quadratic Discriminant Analysis


    In the last section, we discussed LDA. The data within each class needs to be
    drawn from a multivariate Gaussian distribution, and the covariance matrix is
    the same across different classes. In this section, we consider another type of
    discriminant analysis called QDA but the assumptions for QDA can be relaxed on
    the covariance matrix assumption. Here, we do not need the covariance matrix to
    be identical across different classes but only for each class to have its own
    covariance matrix. The multivariate Gaussian distribution with a class-specific
    mean vector within each class for observations is still required to conduct QDA.
    We assume that an observation from a $k^{th}$ class satisfies the following formula:


    $X \sim N(\mu_k, \Sigma_k)$


    We''ll thus consider a generative classifier, as follows:


    $p(X|y = k, \theta) = N(X|\mu_k, \Sigma_k)$


    And then, its corresponding class posterior is this:


    $p(y = k|X, \theta) \propto \pi_k N(X|\mu_k, \Sigma_k)$.


    Here, $\pi_k = p(y = k)$ is the prior probability of the class $k$. In literature,
    this is called **Gaussian Discriminant Analysis (GDA)**. Then, the discriminant
    function is computed by taking the log posterior over $k$ classes, as follows:


    $logp(y = k|X, \theta) = log\pi_k - \frac{log|2\pi\Sigma_k|}{2} - \frac{(X - \mu_k)^T
    \Sigma_k^{-1} (X - \mu_k)}{2} + C$


    Here, $C$ is a constant. Unlike in LDA, the quantity of $X$ appears as a quadratic
    function in the preceding formula and it is known as QDA. The choice between LDA
    or QDA is related to the bias-variance trade-off. If the assumption that shares
    the same covariance matrix over $k$ classes is not good, then a high bias can
    be significant in LDA. In other words, LDA is used when a boundary between classes
    is linear, and QDA is performed better in the case of a nonlinear boundary between
    classes.


    Now, we consider an example using the same *Iris* dataset that we studied in the
    last chapter. To perform QDA, an option is to use `QuadraticDiscriminantAnalysis`
    in sklearn. As in the last chapter, we use a `train_test_split` function to create
    a training and a test set (80% versus 20%), and then we fit a QDA model on the
    training set and use this model for prediction:


    ```

    from sklearn.discriminant_analysis import QuadraticDiscriminantAnalysis

    # fit the model using sklearn

    model_qda = QuadraticDiscriminantAnalysis(store_covariance=True)

    model_qda.fit(X_train, y_train)

    y_hat_qda = model_qda.predict(X_test)

    pred_qda = list(map(round, y_hat_qda))

    ```'

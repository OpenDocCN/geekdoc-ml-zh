    ## Dimension reduction


    In this section, we will use a specific technique – **PCR** – to study MLR. This
    technique is useful when we need to deal with a multicollinearity data issue.
    Multicollinearity occurs when an independent variable is highly correlated with
    another independent variable, or an independent variable can be predicted from
    another independent variable in a regression model. A high correlation can affect
    the result poorly when fitting a model.


    The PCR technique is based on PCA as used in unsupervised machine learning for
    data compression and exploratory analysis. The idea behind it is to use the dimension
    reduction technique, PCA, on these original variables to create new uncorrelated
    variables. The information obtained on these new variables helps us to understand
    the relationship and then apply the MLR algorithm to these new variables. The
    PCA technique can also be used in a classification problem, which we will discuss
    in the next chapter.


    ## PCA – a hands-on introduction


    PCA is a dimension reduction technique based on linear algebra by linearly transforming
    data using linear combinations of original variables into a new coordinate system.
    These new linear combinations are called **principal components** (PCs). The difference
    between the PCA technique and the feature selection technique or shrinkage methods
    mentioned in previous sections is that the original independent variables are
    maintained but the new PC variables are transformed into a new coordinate space.
    In other words, PCA uses the original data to arrive at a new representation or
    a new structure. The number of PC variables is the same as the number of original
    independent variables, but these new PC variables are uncorrelated with each other.
    The PC variables are created and ordered from the most to the least amount of
    variability. The sum of variances is the same between the original independent
    variables and the newly transformed PC variables.


    Before conducting PCA, we perform pre-processing for the dataset by subtracting
    the mean from each data point and normalizing the standard deviation of each independent
    variable. In a high-level structure, the goal of the PCA technique is to find
    vectors $v_1, v_2, \dots, v_k$ such that any data point, $x$, in the dataset can
    be approximately represented as a linear combination:


    $$x = \sum_{i=1}^{k} a_i v_i$$


    for some constants $a_i$, with $i = \overline{1, k}$. Assume that we have these
    $k$ vectors; then, each data point can be written as a vector in $R^k$ corresponding
    the projections:


    $$x = \langle x, v_1 \rangle \cdot v_1 + \langle x, v_2 \rangle \cdot v_2 + \dots
    + \langle x, v_k \rangle \cdot v_k$$


    In other words, if we have $d$ original independent variables, we will construct
    a $d \times k$-dimensional transformation matrix that can map any data point onto
    a new $k$-dimensional variable subspace with $k$ smaller than $d$. It means that
    we have performed a dimension reduction by a linear transformation of the original
    independent variables. There are several applications of PCA, but here, we will
    cite a paper, *Gene mirror geography within Europe*, published in *Nature* (2008)
    (https://pubmed.ncbi.nlm.nih.gov/18758442/). Authors considered a sample of 3,000
    European individuals genotyped at over half a million variable DNA sites in the
    human genome; then, each individual was represented using more than half a million
    genetic markers. This means that it produced a matrix with dimensions larger than

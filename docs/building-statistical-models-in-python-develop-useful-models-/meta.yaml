    Therefore, since the root is greater than 1 and thus outside the unit circle,
    the AR(1) representation of the process is stationary. In Python, we can build
    this process using the upcoming code. First, we build the AR(1) parameters, which
    we want to have a 0.5. Because we substitute 0.5 into the model $X_t - \phi_1(y_{t-1})
    = \epsilon_t$, we insert 0.5 and not -0.5 for arparams. Also, note based on $\rho_k
    = \phi^{|k|}$ that 0.5 is the lag-1 autocorrelation. The process we build will
    have an arbitrary sample size of nsample=200. We build the $(1 - 0.5B)$ component
    of $(1 - 0.5B)y_t = \epsilon_t$ using the np.r_[1, -arparams] step:


    ```

    from statsmodels.graphics.tsaplots import plot_acf, plot_pacf

    import matplotlib.pyplot as plt

    import statsmodels.api as sm

    import numpy as np

    arparams = np.array([0.5])

    ar = np.r_[1, -arparams]

    ar_process = sm.tsa.ArmaProcess(ar)

    y = ar_process.generate_sample(nsample=200)

    ```


    Now that we have the code to create the AR(1) we looked at the equation for, let''s
    see the roots and compare it to our manually calculated z:


    ```

    ar_process.arroots

    ```


    array([2.])


    We can see the Python output, 2. is the same as the calculation we performed.
    We know that since the absolute value of the root is greater than 1, the AR(1)
    process is stationary, but let''s confirm with Python:


    ```

    ar_process.isstationary

    ```


    True


    We can observe by looking at the PACF that this is an autoregressive of order
    $p = 5$. We can also observe by looking at the ACF that the value of $\phi_1$
    is approximately 0.5. For an autoregressive model, the PACF is used to identify
    the number of significant lags to include as the order of the AR, and the ACF
    is used to determine the values of the coefficients, $\phi_k$, included in that
    order. It is simple to observe the values for an AR(1) using the ACF, but less
    obvious when p > 1 since ACF does not control for individual lags when compared
    to the most recent point (lag zero) as the PACF does. Let''s generate the plots
    with Python:


    ```

    fig, ax = plt.subplots(1,3, figsize=(20,5))

    ax[0].set_title(''Realization'')

    ax[0].plot(y)

    plot_acf(y, alpha=0.05, lags=50, ax=ax[1])

    ax[1].set_title(''ACF'')

    plot_pacf(y, alpha=0.05, lags=50, ax=ax[2])

    ax[2].set_title(''PACF'')

    ```'

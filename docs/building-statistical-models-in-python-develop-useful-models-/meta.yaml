    \ p-values and confidence intervals for the terms included to identify whether\
    \ they have statistical significance with respect to influence on survival rate.\
    \ We look at the hazard ratio to determine any effects they have provided:\n\n\
    ```python\nfrom lifelines import CoxPHFitter\nCoxPHFitter = CoxPHFitter()\nCoxPHFitter.fit(df=train_data[['age','year','surgery','transplant','stop','event']],\
    \ duration_col='stop', event_col='event')\nCoxPHFitter.print_summary()\n```\n\n\
    We can see three of our four terms are significant at the 5% level of significance\
    \ for predicting survival; our `surgery` variable does not appear to be based\
    \ on the p-value. The 95% confidence interval for surgery does not contain 0,\
    \ however, which suggests statistical significance. The difference is because\
    \ the p-value is calculated based on the test statistic with respect to the critical\
    \ value, which is estimated using the *log of the hazard ratio*, and the confidence\
    \ interval is based on the *hazard ratio* itself. This discrepancy could mean\
    \ the `surgery` variable is significant, but also that it may not be. Since we\
    \ are not statistically certain, we should err on the side of caution and not\
    \ consider it useful when predicting future survival.\n\nNote that `exp(coef)`\
    \ corresponds to the hazard ratio and `coef` is the log of the hazard ratio. This\
    \ follows the equation we provided earlier for the expected hazard value at the\

    \n我们将通过绘制预测值与实际数据点的对比图并计算误差估计值来评估模型的性能。让我们首先查看ARIMAX模型对未来200个观测值的预测。预测值和测试数据点绘制在*图12.6*中：\n\
    \n![图12.6 – 使用ARIMAX模型预测风速](img/3de2e60811d1b90c67f6bb2d5cae034f_353_0.png)\n\n\
    我们可以从*图12.6*中看到使用我们创建的ARIMAX模型对风速的预测。从绘制的预测图中可以观察到两个显著点：\n\n- 预测捕捉到了风速变量的波动。\n\
    - 预测未能捕捉到风速的高峰值。\n\n为了理解外生变量是否在模型中提供了实质价值，我们应该将*图12.6*中显示的ARIMAX模型的预测与单变量模型的预测进行比较。单变量模型的预测显示在*图12.7*中：\n\
    \n![图12.7 – 使用ARIMA模型预测风速](img/3de2e60811d1b90c67f6bb2d5cae034f_354_0.png)\n\n\
    *图12.7*中显示的ARIMA模型的预测，随着预测长度的增加，似乎未能捕捉到时间序列的太多变化。这实际上是ARMA模型的一个特性。从这两个图中可以明显看出，ARIMAX模型提供了比ARIMA模型更好的预测。最后，让我们比较两个模型预测的**均方误差（MSE）**。ARIMAX模型的MSE约为1.5，而ARIMA模型的MSE约为1.7。MSE值证实了我们在图中看到的情况——即ARIMAX模型为此多元时间序列提供了更好的预测。\n\
    \n在本节中，我们讨论了ARIMA模型的一个扩展，它允许我们在多元时间序列中纳入协变量的信息。这只是处理多元时间序列的众多方法之一。在下一节中，我们将讨论处理多元时间序列数据的另一种方法。\n\
    \n## VAR建模\n\n我们在上一章中研究的AR(p)、MA(q)、ARMA(p,q)、ARIMA(p,d,q)m和SARIMA(p,d,q)模型构成了多元VAR建模的基础。在本章中，我们讨论了带有外生变量的ARIMA（ARIMAX）。我们现在将开始讨论VAR模型。首先，重要的是要理解，虽然**ARIMAX需要外生变量的前导（未来）值，但VAR模型不需要这些变量的未来值**，因为它们彼此都是自回归的——因此得名向量自回归——并且根据定义不是外生的。首先，让我们考虑双变量的情况。考虑一个过程\
    \ $y_t$，它是两个不同输入变量 $y_{t1}$ 和 $y_{t2}$ 的输出。注意，在矩阵形式中，我们讨论的是一个 $n \\times m$ 矩阵（$y_{n,m}$）的情况，其中\
    \ $n$ 对应时间点，$m$ 对应涉及的**变量**（变量1,2,…,$m$）。在接下来的讨论中，我们将从符号中省略逗号，但重要的是要理解，当我们讨论多元自回归过程时，我们讨论的是多维矩阵内的数据，而不仅仅是用于单变量时间序列分析的单维向量形式。我们可以用向量符号将我们的过程\
    \ $y_t$ 写成如下形式：\n\n$$y_t = \\begin{bmatrix} y_{t1} \\\\ y_{t2} \\end{bmatrix}.$$\n\
    \n我们可以将输入变量的定义扩展为一个VAR(1)过程，这里针对前面显示的 $y_t$ 中的两个变量：\n\n$$y_{t1} = (1 - \\phi_{11})\\\
    mu_1 - \\phi_{12}\\mu_2 + \\phi_{11}y_{t-11} + \\phi_{12}y_{t-12} + \\varepsilon_{t1}$$\n\
    $$y_{t2} = -\\phi_{21}\\mu_1 + (1 - \\phi_{22})\\mu_2 + \\phi_{21}y_{t-11} + \\\
    phi_{22}y_{t-12} + \\varepsilon_{t2}.$$\n\n项 $(1 - \\phi_{11})\\mu_1 - \\phi_{12}\\\
    mu_2$ 和 $-\\phi_{21}\\mu_1 - (1 - \\phi_{22})\\mu_2$ 是我们的**模型常数**（$\\beta$ 系数）。\n\
    \n我们可以将前面的过程（使用零均值形式）简化为矩阵简化形式，如下所示：\n\n$$y_t = \\Phi_1 y_{t-1} + \\varepsilon_t$$\n\
    \n这里，我们有：\n\n$$\\Phi_1 = \\begin{bmatrix} \\phi_{11} & \\phi_{12} \\\\ \\phi_{21}\
    \ & \\phi_{22} \\end{bmatrix}$$\n\n我们对VAR(1)模型的预测如下所示：\n\n$$\\hat{y}_{t_0,1}(l)\
    \ = (1 - \\phi_{11})\\bar{y}_1 - \\phi_{12}\\bar{y}_2 + \\phi_{11}\\hat{y}_{t_0,1}(l-1)\
    \ + \\phi_{12}\\hat{y}_{t_0,2}(l-1)$$\n$$\\hat{y}_{t_0,2}(l) = -\\phi_{21}\\bar{y}_1\
    \ + (1 - \\phi_{22})\\bar{y}_2 + \\phi_{21}\\hat{y}_{t_0,1}(l-1) + \\phi_{22}\\\
    hat{y}_{t_0,2}(l-1)$$\n\n它还包括：\n\n$$\\hat{y}_{t_0}(l) = \\begin{bmatrix} \\hat{y}_{t_0,1}(l)\
    \ \\\\ \\hat{y}_{t_0,2}(l) \\end{bmatrix}$$\n\n这里，$l$ 代表向前滞后（$t+1, t+2, ..., t+n$），$\\\
    hat{y}_{t,m}$ 代表变量 $m$ 在时间 $t$ 的预测值，$t_0$ 对应最近的时间点（通常是数据的长度）。同样重要的是要注意 $m \\times\
    \ m$ 协方差矩阵如下：\n\n$$\\hat{\\Gamma}(k) = \\begin{bmatrix} \\hat{\\gamma}_{11}(k)\
    \ & \\cdots & \\hat{\\gamma}_{1m}(k) \\\\ \\vdots & \\ddots & \\vdots \\\\ \\\
    hat{\\gamma}_{m1}(k) & \\cdots & \\hat{\\gamma}_{mm}(k) \\end{bmatrix}$$\n\n这里，每个协方差\
    \ $\\hat{\\gamma}_{ij}(k)$（其中 $k$ 对应滞后）计算如下：\n\n$$\\hat{\\gamma}_{ij}(k) = \\\
    frac{1}{n} \\sum_{t=1}^{n-k} (y_{ti} - \\bar{y}_i)(y_{t+k,j} - \\bar{y}_j).$$\n\
    \n因此，我们估计的每个变量 $y_{ti}$ 和 $y_{tj}$ 之间的互相关计算如下：\n\n$$\\hat{\\rho}_{ij}(k) = \\\
    frac{\\hat{\\gamma}_{ij}(k)}{\\sqrt{\\hat{\\gamma}_{ii}(0) \\hat{\\gamma}_{jj}(0)}}$$\n\
    \n理解互相关，特别是协方差的计算，有助于理解变量之间的关系及其对模型拟合的影响。将两个模型组合以生成一个整体过程预测 $\\hat{y}_t$ 的方法是通过将两个输入均值及其相关性加权到一个响应中。正如我们在前面显示的VAR(1)预测中所看到的，每个给定变量与其他变量在不同时间点之间的相关性能够使用VAR模型进行建模。值得注意的是，VAR模型中没有真正的独立变量和因变量；只有每个变量之间的相互作用。需要注意的是，所有使用VAR模型建模的过程都应该是**平稳的**。\n\
    \n使用在 https://www.statsmodels.org/dev/datasets/generated/macrodata.html 找到的*美国宏观经济*数据集，我们可以在VAR建模的背景下，以零均值形式观察实际国内私人投资总额（`realinv`）、实际个人消费支出（`realcons`）和实际私人可支配收入（`realdpi`）之间的关系，如下所示：\n\
    \n$$realcons(t) = \\phi_{11} realcons_{t-11} + \\phi_{12} realinv_{t-12} + \\\
    phi_{13} realdpi_{t-13} + \\varepsilon_{t1}$$\n$$realinv(t) = \\phi_{21} realcons_{t-11}\
    \ + \\phi_{22} realinv_{t-12} + \\phi_{23} realdpi_{t-13} + \\varepsilon_{t2}$$\n\
    $$realdpi(t) = \\phi_{31} realcons_{t-11} + \\phi_{32} realinv_{t-12} + \\phi_{33}\
    \ realdpi_{t-13} + \\varepsilon_{t3}$$"

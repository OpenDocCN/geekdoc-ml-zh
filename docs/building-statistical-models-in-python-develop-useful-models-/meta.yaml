    \n### When parametric test assumptions are violated\n\nIn the previous chapter,\
    \ we discussed parametric tests. Parametric tests have strong statistical power\
    \ but also require adherence to strong assumptions. When the assumptions are not\
    \ satisfied, the test results are not valid. Fortunately, we have alternative\
    \ tests that can be used when the assumptions of a parametric test are not satisfied.\
    \ These tests are called **non-parametric** tests, meaning that they make *no\
    \ assumptions about the underlying distribution of the data*. While non-parametric\
    \ tests do not require distributional assumptions, these *tests will still require\
    \ the samples to be independent*.\n\n### Permutation tests\n\nFor the first non-parametric\
    \ test, let's look more deeply at the definition of a p-value. A p-value is the\
    \ *probability of obtaining a test statistic at least as extreme as the observed\
    \ value* under the assumption of the null hypothesis. Then, to calculate a p-value,\
    \ we need the null distribution and an observed statistic. The p-value is the\
    \ proportion of samples with a test statistic more extreme than the observed statistic.\
    \ It turns out that we can construct the null distribution using permutations\
    \ from data. Let's see how to construct the null distribution using the following\
    \ dataset. This dataset could represent counts of machine failures at low and\
    \ high temperatures. We assume that the samples are independent:\n\n```\nlow_temp\
    \ = np.array([0, 0, 0, 0, 0, 1, 1])\nhigh_temp = np.array([1, 2, 3, 1])\n```\n\
    \nTo construct the null hypothesis, we first need to decide on a statistical measure.\
    \ In this case, we will look for a difference in the mean of the two distributions.\
    \ So, our statistical measure will be as follows:\n\n$\\bar{x}_{lowtemp} - \\\
    bar{x}_{hightemp}$\n\nNow, to calculate the distribution values, calculate the\
    \ statistical measure for all permutations of the dataset. Here are a couple of\
    \ examples of the permutations of the dataset.\n\n| Label | Observed | P1 | P2\
    \ | P3 | P4 | P5 | ... |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :---\
    \ |\n| low | 0 | 1 | 0 | 1 | 0 | 1 | ... |\n| low | 0 | 1 | 3 | 0 | 3 | 0 | ...\
    \ |\n| low | 0 | 0 | 0 | 1 | 1 | 3 | ... |\n| low | 0 | 1 | 1 | 0 | 2 | 0 | ...\
    \ |\n| low | 0 | 0 | 1 | 2 | 0 | 1 | ... |\n| low | 1 | 1 | 1 | 3 | 0 | 1 | ...\
    \ |\n| low | 1 | 0 | 1 | 1 | 1 | 0 | ... |\n| high | 1 | 0 | 2 | 0 | 1 | 2 | ...\
    \ |\n| high | 2 | 3 | 0 | 0 | 0 | 1 | ... |\n| high | 3 | 0 | 0 | 1 | 1 | 0 |\
    \ ... |\n| high | 1 | 2 | 0 | 0 | 0 | 0 | ... |\n| mean difference | -1.46 | -0.68\
    \ | 0.5 | 0.89 | 0.5 | 0.11 | ... |\n\nFigure 5.1 – First five permutations of\
    \ the observed data and the mean difference\n\nThe table shows the observed data\
    \ with five randomly generated permutations of the values. We calculate the difference\
    \ in the mean for each permutation. The differences in means are the values of\
    \ the null distribution. Once we have the distribution, we can calculate the p-value\
    \ as the proportion of values more extreme than the observed value.\n\n### Scaling\
    \ of permutation calculations\n\nIn general, permutation tests can be expensive\
    \ to calculate because the number of permutations grows quickly with the size\
    \ of the distribution. For example, dataset sizes of 3, 5, and 7 samples correspond\
    \ to permutation sizes of 6, 120, and 5,040. The dataset shown here has more than\
    \ 39 million permutations! The runtime performance of a permutation test on a\
    \ large dataset will likely be slow due to the number of permutations necessary\
    \ to compute the null distribution.\n\nWe can perform a permutation test in Python\
    \ using the `permutation_test` function from `scipy`. This function calculates\
    \ the test statistic, the null distribution, and the p-value:\n\n```\ndef statistic_function(set_one,\
    \ set_two):\n    return np.mean(set_one) - np.mean(set_two)\n\nrandom_gen=42\n\
    \nperm_result = sp.stats.permutation_test(\n    (low_temp, high_temp) ,\n    statistic_function,\
    \ random_state=random_gen,\n\n)\n```\n\nThis function produces the following distribution\
    \ from the dataset.\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_147_0.png)\n\n\
    Figure 5.2 – Null distribution from the permutation test\n\nThe null distribution\
    \ from the permutation test and the observed difference in the mean of the two\
    \ groups is shown in *Figure 5.2*. The p-value from the permutation test is 0.036.\
    \ The permutation test is the first of several non-parametric tests that will\
    \ be covered in this section. Again, these types of tests are useful when the\
    \ assumptions for parametric tests are not met. *However, if a parametric test\
    \ can be used, it should be used*; non-parametric tests should not be used as\
    \ default methods.\n\nIn this section, we introduced non-parametric tests with\
    \ permutation tests. The permutation test is a widely applicable non-parametric\
    \ test, but the computations for permutations grow quickly with the size of the\
    \ dataset, which may make its use impractical in some situations. In the following\
    \ sections, we will cover several other non-parametric tests that do not require\
    \ computing a null distribution.\n\n### The Rank-Sum test\n\nWhen the assumptions\
    \ of the t-test are not met, the Rank-Sum test is often a good non-parametric\
    \ alternative test. While the t-test can be used to test for the *difference between\
    \ the means of two distributions*, the Rank-Sum test is used to test for the *difference\
    \ between the locations of two distributions*. This difference in the test utility\
    \ is due to the lack of parametric assumptions in the Rank-Sum test. The null\
    \ hypothesis of the Rank-Sum test is that the distribution underlying the first\
    \ sample is the same as the second sample. If the sample distributions appear\
    \ to be similar, this allows us to use the Rank-Sum test to test for the difference\
    \ in the locations of the two samples. As stated, the Rank-Sum test cannot specifically\
    \ be used for testing the difference between means because it does not require\
    \ assumptions about the sample distributions.\n\n### The test statistic procedure\n\
    \nThe test procedure is straightforward. The process is outlined here and an example\
    \ is shown in the following table:\n\n1. Combine all sample values into one set\
    \ and sort the samples in ascending order, keeping track of their labels.\n2.\
    \ Assign ranks to all samples starting with rank 1 for the lowest sample value.\n\
    3. Where ties occur, replace the rank of the tied values with the mean rank of\
    \ the tied values.\n4. Sum the ranks for the smallest sample group, which is the\
    \ test statistic *T*.\n\nOnce the test statistic is calculated, the p-value can\
    \ be calculated. The p-value can be done with a normal approximation or with an\
    \ exact method. Generally, the exact method is only used when the sample size\
    \ is small (less than 8 samples).\n\n### Normal approximation\n\nOnce the $T$\
    \ statistic is calculated for the Rank-Sum test, we can determine a p-value with\
    \ an exact method or with a normal approximation. We will cover the approximation\
    \ method here as the exact method requires a permutation test, which will require\
    \ the use of software. We approximate the p-value with a z-score (recall the z-score\
    \ from *Chapter 3, Hypothesis Testing*):\n\n$$Z = \\frac{T - \\text{Mean}(T)}{\\\
    text{STDEV}(T)}$$\n\nwhere\n\n$$\\text{Mean}(T) = n_T \\bar{R}$$\n\nand\n\n$$\\\
    text{STDEV}(T) = s_R \\sqrt{\\frac{n_T n_O}{n_T + n_O}}$$\n\nIn the equations\
    \ here, $n_T$ is the number of samples in the group used to calculate $T$, $n_O$\
    \ is the number of samples in the other group, $\\bar{R}$ is the mean of the corrected\
    \ ranks, and $s_R$ is the standard deviation of the corrected ranks. Once $Z$\
    \ is calculated, the corresponding p-value can be looked up for the z-distribution.\
    \ Having described the method, let's look at an example. The data shown in the\
    \ following table can be found in the accompanying Jupyter notebook.\n\n### Rank-Sum\
    \ example\n\nThe following table shows this process performed on a set of data\
    \ for two groups labeled with “L” and “H,” where a Rank-Sum test will be used\
    \ to test for the difference in location of the two sample distributions. The\
    \ test statistic for this table is 42.5, which is the sum of the corrected ranks\
    \ of group L. This test statistic corresponds to an approximate p-value of 0.00194\
    \ (a two-sided test). The data for this table was downloaded from https://github.com/OpenIntroStat/openintro/raw/master/data/gpa_iq.rda.\n\
    \n| IQ | Group | Rank | Corrected Rank |\n|---|---|---|---|\n| 77 | L | 1 | 1\
    \ |\n| 79 | L | 2 | 2 |\n| 93 | L | 3 | 3 |\n| 96 | L | 4 | 4 |\n| 104 | L | 5\
    \ | 5 |\n| 105 | H | 6 | 6 |\n| 106 | H | 7 | 7 |\n| 107 | L | 8 | 8 |\n| 109\
    \ | L | 9 | 9 |"
  mdcn: "## 5 非参数检验\n\n在上一章中，我们讨论了参数检验。当检验假设得到满足时，参数检验非常有用。然而，在某些情况下，这些假设并不成立。在本章中，我们将讨论几种针对上一章介绍的参数检验的非参数替代方法。我们首先介绍非参数检验的概念。然后，我们将讨论几种在\
    \ t 检验或 z 检验假设不满足时可以使用的非参数检验。\n\n在本章中，我们将涵盖以下主要主题：\n\n- 当参数检验假设被违反时\n- 秩和检验\n\
    - 符号秩检验\n- Kruskal-Wallis 检验\n- 卡方检验\n- Spearman 相关分析\n- 卡方功效分析\n\n### 当参数检验假设被违反时\n\
    \n在上一章中，我们讨论了参数检验。参数检验具有很强的统计功效，但也要求严格遵守假设条件。当假设不满足时，检验结果就无效。幸运的是，我们有替代检验方法，可以在参数检验的假设不满足时使用。这些检验被称为**非参数**检验，这意味着它们*不对数据的底层分布做任何假设*。虽然非参数检验不需要分布假设，但这些*检验仍然要求样本是独立的*。\n\
    \n### 置换检验\n\n对于第一个非参数检验，让我们更深入地探讨 p 值的定义。p 值是在原假设成立的条件下，*获得至少与观测值一样极端的检验统计量的概率*。因此，要计算\
    \ p 值，我们需要原分布和一个观测统计量。p 值是检验统计量比观测统计量更极端的样本比例。事实证明，我们可以使用数据的置换来构建原分布。让我们看看如何使用以下数据集构建原分布。该数据集可以表示低温和高温下的机器故障次数。我们假设样本是独立的：\n\
    \n```\nlow_temp = np.array([0, 0, 0, 0, 0, 1, 1])\nhigh_temp = np.array([1, 2,\
    \ 3, 1])\n```\n\n要构建原假设，我们首先需要确定一个统计量。在这种情况下，我们将寻找两个分布均值的差异。因此，我们的统计量如下：\n\n$\\\
    bar{x}_{lowtemp} - \\bar{x}_{hightemp}$\n\n现在，要计算分布值，需要计算数据集所有排列的统计量。以下是数据集排列的几个示例。\n\
    \n| 标签 | 观测值 | P1 | P2 | P3 | P4 | P5 | ... |\n| :--- | :--- | :--- | :--- | :---\
    \ | :--- | :--- | :--- |\n| low | 0 | 1 | 0 | 1 | 0 | 1 | ... |\n| low | 0 | 1\
    \ | 3 | 0 | 3 | 0 | ... |\n| low | 0 | 0 | 0 | 1 | 1 | 3 | ... |\n| low | 0 |\
    \ 1 | 1 | 0 | 2 | 0 | ... |\n| low | 0 | 0 | 1 | 2 | 0 | 1 | ... |\n| low | 1\
    \ | 1 | 1 | 3 | 0 | 1 | ... |\n| low | 1 | 0 | 1 | 1 | 1 | 0 | ... |\n| high |\
    \ 1 | 0 | 2 | 0 | 1 | 2 | ... |\n| high | 2 | 3 | 0 | 0 | 0 | 1 | ... |\n| high\
    \ | 3 | 0 | 0 | 1 | 1 | 0 | ... |\n| high | 1 | 2 | 0 | 0 | 0 | 0 | ... |\n| 均值差\
    \ | -1.46 | -0.68 | 0.5 | 0.89 | 0.5 | 0.11 | ... |\n\n图 5.1 – 观测数据的前五次排列及均值差\n\
    \n该表显示了观测数据以及五个随机生成的值排列。我们计算每次排列的均值差。均值差就是原分布的值。一旦我们有了分布，就可以计算 p 值，即比观测值更极端的值的比例。\n\
    \n### 置换计算的规模\n\n通常，置换检验的计算成本可能很高，因为排列的数量随着分布规模的增加而快速增长。例如，样本量为 3、5 和 7 的数据集对应的排列数量分别为\
    \ 6、120 和 5,040。此处显示的数据集有超过 3900 万种排列！由于计算原分布所需的排列数量庞大，在大数据集上进行置换检验的运行时性能可能会很慢。\n\
    \n我们可以使用 `scipy` 中的 `permutation_test` 函数在 Python 中执行置换检验。该函数计算检验统计量、原分布和 p 值：\n\
    \n```\ndef statistic_function(set_one, set_two):\n    return np.mean(set_one)\
    \ - np.mean(set_two)\n\nrandom_gen=42\n\nperm_result = sp.stats.permutation_test(\n\
    \    (low_temp, high_temp) ,\n    statistic_function, random_state=random_gen,\n\
    \n)\n```\n\n此函数从数据集中生成以下分布。\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_147_0.png)\n\
    \n图 5.2 – 置换检验的原分布\n\n置换检验的原分布和两组均值的观测差异如*图 5.2*所示。置换检验的 p 值为 0.036。置换检验是本节将介绍的几种非参数检验中的第一种。同样，当参数检验的假设不满足时，这类检验非常有用。*但是，如果可以使用参数检验，则应该使用参数检验*；非参数检验不应作为默认方法。\n\
    \n在本节中，我们通过置换检验介绍了非参数检验。置换检验是一种应用广泛的非参数检验，但置换的计算量随着数据集规模的增加而快速增长，这可能使其在某些情况下不实用。在接下来的几节中，我们将介绍几种其他不需要计算原分布的非参数检验。\n\
    \n### 秩和检验\n\n当 t 检验的假设不满足时，秩和检验通常是一个很好的非参数替代检验。虽然 t 检验可用于检验*两个分布均值的差异*，但秩和检验用于检验*两个分布位置的差异*。这种检验用途上的差异是由于秩和检验缺乏参数假设。秩和检验的原假设是第一个样本的底层分布与第二个样本相同。如果样本分布看起来相似，这允许我们使用秩和检验来检验两个样本位置的差异。如前所述，秩和检验不能专门用于检验均值的差异，因为它不需要对样本分布做假设。\n\
    \n### 检验统计量程序\n\n检验程序很简单。流程概述如下，并在下表中给出了示例：\n\n1.  将所有样本值合并为一个集合，并按升序对样本进行排序，同时跟踪它们的标签。\n\
    2.  为所有样本分配秩，从最低样本值的秩 1 开始。\n3.  当出现结时，用结值的平均秩替换结值的秩。\n4.  对最小样本组的秩求和，即为检验统计量\
    \ *T*。\n\n一旦计算出检验统计量，就可以计算 p 值。p 值可以通过正态近似或精确方法计算。通常，精确方法仅在样本量较小（少于 8 个样本）时使用。\n\
    \n### 正态近似\n\n一旦计算出秩和检验的 $T$ 统计量，我们就可以通过精确方法或正态近似来确定 p 值。我们将在此介绍近似方法，因为精确方法需要置换检验，这将需要使用软件。我们用\
    \ z 分数（回顾*第 3 章，假设检验*中的 z 分数）来近似 p 值：\n\n$$Z = \\frac{T - \\text{Mean}(T)}{\\\
    text{STDEV}(T)}$$\n\n其中\n\n$$\\text{Mean}(T) = n_T \\bar{R}$$\n\n且\n\n$$\\text{STDEV}(T)\
    \ = s_R \\sqrt{\\frac{n_T n_O}{n_T + n_O}}$$\n\n在这些方程中，$n_T$ 是用于计算 $T$ 的组中的样本数，$n_O$\
    \ 是另一组中的样本数，$\\bar{R}$ 是校正秩的平均值，$s_R$ 是校正秩的标准差。一旦计算出 $Z$，就可以查找 z 分布对应的 p 值。描述完方法后，让我们看一个例子。下表中显示的数据可以在随附的\
    \ Jupyter 笔记本中找到。\n\n### 秩和检验示例\n\n下表显示了对一组标记为“L”和“H”的两组数据执行此过程的结果，其中将使用秩和检验来检验两个样本分布位置的差异。该表的检验统计量为\
    \ 42.5，即 L 组校正秩的总和。该检验统计量对应的近似 p 值为 0.00194（双侧检验）。该表的数据下载自 https://github.com/OpenIntroStat/openintro/raw/master/data/gpa_iq.rda。\n\
    \n| IQ | 组 | 秩 | 校正秩 |\n|---|---|---|---|\n| 77 | L | 1 | 1 |\n| 79 | L | 2 |\
    \ 2 |\n| 93 | L | 3 | 3 |\n| 96 | L | 4 | 4 |\n| 104 | L | 5 | 5 |\n| 105 | H\
    \ | 6 | 6 |\n| 106 | H | 7 | 7 |\n| 107 | L | 8 | 8 |\n| 109 | L | 9 | 9 |"

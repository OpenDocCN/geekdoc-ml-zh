    0 到 $N$ 个变量）。例如，如果 $X$ 是股票价格的时间序列，那么在 $X$ 的每个时间步，都会有每只股票的价格值。在这种情况下，如果序列中的前两个股票代码是
    AAPL 和 GOOGL，$X$ 可能看起来像下面的方程：


    $$X = \begin{bmatrix} x_{0, AAPL} & x_{1, AAPL} & \dots & x_{t, AAPL} \\ x_{0,
    GOOGL} & x_{1, GOOGL} & \dots & x_{t, GOOGL} \\ \vdots & \vdots & \ddots & \vdots
    \end{bmatrix}$$


    当我们有一个多元时间序列时，一个问题就出现了：*我们能用这些额外的信息做什么？* 要回答这个问题，我们需要理解这些时间序列变量是否相关。我们可以通过查看它们的互相关性来确定时间序列之间的关系。接下来，我们讨论互相关性。


    ## 时间序列互相关性


    我们需要理解时间序列如何相关，以确定协变量时间序列是否有助于预测我们感兴趣的时间序列。在前面的章节中，我们讨论了如何使用图表和相关系数来理解两个变量之间的关系；我们将对时间序列数据采取类似的方法。回顾*第10章，时间序列简介*中讨论的**互相关函数**（CCF）：


    $$\hat{\rho}_k(X, Y) = \frac{\sum_{t=1}^{n-k} (X_t - \bar{X})(Y_{t-k} - \bar{Y})}{\sqrt{\sum_{t=1}^n
    (X_t - \bar{X})^2} \sqrt{\sum_{t=1}^n (Y_t - \bar{Y})^2}}$$


    这里，$X$ 是一个单变量时间序列，$Y$ 是一个单变量时间序列。这个函数告诉我们 $X$ 和 $Y$ 在 $k$ 个滞后处的关系。在这个方程中，$Y$ 比
    $X$ 落后 $k$ 个时间步。在这种情况下，我们说 $X$ 领先 $Y$ $k$ 步，或者说 $Y$ 滞后 $X$ $k$ 步。我们将使用这个 CCF 来帮助我们确定两个时间序列是否相关，以及它们在哪些时间步相关。注意，如果
    $X = Y$，那么 CCF 就简化为**自相关函数**（ACF）。


    > **互相关显著性**

    > 就像 ACF 一样，互相关性也有一个统计显著性的阈值。我们认为任何绝对值大于 $1.96/\sqrt{N}$（其中 $N$ 是时间序列的样本量）的互相关值都显著不为零。


    让我们用一些数据来看看互相关性。这些数据 [1] 来自 *UCI 机器学习库* [2]。这些数据是作为在中国进行的一项污染研究的一部分收集的天气数据。这些数据是几年内每小时采样一次的。我们将数据子集化为前
    1,000 个数据点。此数据集中的天气数据包括温度（TEMP）、气压（PRES）、露点温度（DEWP）、降雨量（RAIN）和风速（WSPM）。我们将从尝试预测风速的角度来看互相关性，这意味着我们将查看风速与其他变量的互相关性。对于想要预测风力发电机发电量的人来说，这可能是一个重要的问题。风速数据和风速数据的
    ACF 绘制在*图 12.1*中：


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_343_0.png)


    从*图 12.1*的图中，我们可以看到风速可能可以通过我们在上一章讨论的平稳单变量模型来建模。虽然没有明显的证据表明存在**自回归积分移动平均（ARIMA）**行为，但在滞后
    24 处似乎有季节性的证据。由于数据是每小时采样的，这种季节性可能是每日模式。我们在*图 12.2*中绘制了其他变量的时间序列。这些是我们可能希望用来帮助预测风速值的其他变量：


    ## 多元时间序列


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_344_0.png)


    图 12.2 – 风速时间序列和三个其他天气变量的图


    虽然我们没有为*图 12.2*中显示的所有时间序列绘制 ACF，但这些时间序列的特征表明它们可能是平稳的。然而，仅从时间序列本身并不清楚这些时间序列是否相关。这就是时间序列互相关性的作用所在。我们可以使用互相关图来确定任何其他时间序列是否与风速相关。我们在*图
    12.3*中绘制了风速与其他变量的互相关性。CCF 绘制了多达 48 个滞后。由于数据是每小时采样的，这给了我们 2 天的滞后来查看互相关性：


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_345_0.png)


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_345_1.png)


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_345_2.png)


    图 12.3 – 风速和三个其他变量的 CCF 图


    图 12.3 中的图显示风速与其他变量之间存在互相关性。虽然我们对互相关性的形状不太感兴趣，但这些模式可能提供关于变量如何相关的更深层次信息。例如，风速和温度的互相关性显示出一个周期约为
    12 小时的振荡模式；这可能对应于阳光对风速的影响。主要发现是这些其他变量与风速存在关系，并且可能帮助我们预测风速值。让我们看看如何使用额外的变量进行建模。


    ## ARIMAX


    在上一章中，我们讨论了 ARIMA 模型族，并演示了如何对单变量时间序列数据进行建模。然而，正如我们在上一节中提到的，许多时间序列是多元的，例如股票数据、天气数据或经济数据。在本节中，我们将讨论如何在建模时间序列数据时纳入协变量的信息。


    当我们对多元时间序列建模时，通常有一个我们感兴趣的预测变量。这个变量通常被称为**内生**变量。多元时间序列中的其他协变量被称为**外生**变量。回顾*第11章，ARIMA
    模型*中表示 ARIMA 模型的方程：


    $$y''_{t} = c + \phi_{1} y''_{t-1} + \dots + \phi_{p} y''_{t-p} + \epsilon_{t}
    + \theta_{1} \epsilon_{t-1} + \dots + \theta_{q} \epsilon_{t-q}$$


    这里，$y''_{t}$ 是差分序列，经过 $d$ 次差分直到平稳。在这个模型中，$y_{t}$ 是我们感兴趣的预测变量；它是内生变量。让我们用更紧凑的形式重写这个方程。我们将与
    $y''_{t}$ 相关的项收集到一个求和中，将与 $\epsilon_{t}$ 相关的项收集到另一个求和中。让我们从 $y''_{t}$ 项开始：


    $$\phi_{1} y''_{t-1} + \dots + \phi_{p} y''_{t-p} = \sum_{i=1}^{p} \phi_{i} y''_{t-i}$$


    然后，我们也将 $\epsilon_{t}$ 项收集到不同的求和中：


    $$\epsilon_{t} + \theta_{1} \epsilon_{t-1} + \dots + \theta_{q} \epsilon_{t-q}
    = \epsilon_{t} + \sum_{j=1}^{q} \theta_{j} \epsilon_{t-j}$$


    将这些求和放在一起，我们得到以下更紧凑的 ARIMA 方程版本：


    $$y''_{t} = c + \sum_{i=1}^{p} \phi_{i} y''_{t-i} + \epsilon_{t} + \sum_{j=1}^{q}
    \theta_{j} \epsilon_{t-j}$$


    现在，让我们将外生变量添加到模型中。我们将通过向模型添加一个求和项来添加外生变量：


    $$y''_{t} = c + \sum_{i=1}^{p} \phi_{i} y''_{t-i} + \epsilon_{t} + \sum_{j=1}^{q}
    \theta_{j} \epsilon_{t-j} + \sum_{k=1}^{r} \beta_{k} X_{tk}$$


    这里，向量值变量 $X$ 中包含 $r$ 个外生变量。回顾本章前面的内容，我们可以表示向量值变量，如下所示，其中第一个索引代表时间步，第二个索引代表向量值变量中的单个序列：


    $$X = \begin{bmatrix} x_{0,0} & x_{1,0} & \dots & x_{t,0} \\ \vdots & \vdots &
    \dots & \vdots \\ x_{0,k} & x_{1,k} & \dots & x_{t,k} \end{bmatrix}$$


    这就是我们将外生变量纳入 ARIMA 模型的方式。现在，让我们谈谈如何选择外生变量。在*第11章，ARIMA 模型*中，使用 ACF 图，我们看到时间序列的某些滞后比其他滞后对建模单变量时间序列更有影响力。我们将使用
    CCF 图对外生变量做出类似的判断。让我们看看示例 CCF 图，并讨论如何做出这些判断。


    风速和温度的 CCF 图显示在*图 12.4*中。我们标记了在 48 小时滞后周期内最显著的互相关发生的位置。回想一下，这些数据是每小时采样的；因此，每个滞后时间步对应于
    1 小时的滞后。该图显示最显著的互相关大约发生在滞后 13、滞后 24 和滞后 37 处：


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_347_0.png)


    图 12.4 – 风速和温度变量的 CCF 图'

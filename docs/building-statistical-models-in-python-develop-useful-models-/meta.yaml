    \ distribution is based on random sampling, whereas the cumulative density distribution\
    \ is based on accumulated data, which is not necessarily random.\n\nThe two-tailed\
    \ probability density function of the standard normal distribution is this:\n\n\
    $$f(x) = \\frac{e^{-\\frac{(x-\\mu)^2}{2\\sigma^2}}}{\\sigma\\sqrt{2\\pi}}$$\n\
    \nThe left-tailed cumulative function of the standard normal distribution is this:\n\
    \n$$f(x) = \\int_{-\\infty}^{x} \\frac{e^{-\\frac{x^2}{2}}}{\\sqrt{2\\pi}}$$\n\
    \nWith respect to statistical modeling, the normal distribution represents balance\
    \ and symmetry. This is important when building statistical models as many models\
    \ assume normal distribution and are not robust to many deviations from that assumption,\
    \ as they are built around a mean. Consequently, if variables in such a model\
    \ are not normally distributed, the model's errors will be increased and inconsistent,\
    \ thus diminishing the model's stability. When considering multiple variables\

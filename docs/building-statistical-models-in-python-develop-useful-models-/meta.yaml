    \ variance. P-value = %.4f, F-statistic = %.4f' % (p_value, f_statistic))\n  \
    \  else:\n        print('The distributions have homogenous variance. P-value =\
    \ %.4f, F-statistic = %.4f' % (p_value, f_statistic))\nf_test(distro3['x'], distro1['x'])\n\
    ```\n\nThis F-test output is as follows:\n\nThe distributions do not have homogenous\
    \ variance. P-value = 0.0000, F-statistic = 102622.9745\n\n## T-test – a parametric\
    \ hypothesis test\n\nIn the last chapter, the z-test for means was applied when\
    \ population standard deviations were known. However, in the real world, it is\
    \ not easy (or virtually impossible) to obtain the population standard deviation.\
    \ In this section, we will discuss another hypothesis test called the **t-test**,\
    \ which is used when the population standard deviations are unknown. The mean\
    \ and the standard deviation of a population are estimated by taking the mean\
    \ and the standard deviation of sample data representative of this population.\n\
    \nBroadly speaking, the method for the t-test for means is very similar to the\
    \ one for the z-test for means, but the calculations for the test statistic and\
    \ p-value are not the same as for the z-test. The test statistic is computed by\
    \ the following formula:\n\n$$t = \\frac{\\bar{x} - \\mu}{s / \\sqrt{n}}$$\n\n\
    Here, $\\bar{x}$, $\\mu$, $s$, and $n$ are the sample mean, population mean, sample\
    \ standard deviation, and sample size, respectively, which has a **t-distribution**\
    \ when the sample data, $x$, is normally distributed. The following code illustrates\
    \ the standard normal distribution (blue curve) with 1,000 samples and t-distribution\
    \ (green and red curves) with two sample sizes—3 and 16 samples:\n\n```python\n\
    # libraries\nimport numpy as np\nimport scipy.stats as stats\n# creating normal\
    \ distribution\nx = np.linspace(-5, 5, 1000) # create 1000 points from -5 to 5\n\
    y = stats.norm.pdf(x) # create probability density for each point x - normal distribution\n\
    \n# creating Student t distributions for 2 sample sizes n = 3 and n = 15\ndegree_freedom1\
    \ = 2\nt_dis1 = stats.t.pdf(x, degree_freedom1)\n\ndegree_freedom2 = 15\nt_dis2\
    \ = stats.t.pdf(x, degree_freedom2)\n```\n\nThe following visualization is for\
    \ these 3 distributions considered.\n\nFigure 4.9 – Normal and t-distributions\n\
    \nObserve that the three curves have similar symmetry and shapes but there is\

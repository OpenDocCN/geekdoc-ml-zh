  md: 'The steps to be taken when performing Cox Proportional Hazards regression modeling
    are outlined next. The sequence is important as the test should only be performed
    when practical. These steps follow the outline provided by the **National Institutes
    of Health** (NIH) (https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7876211/).


    # Step 1


    Set up the null hypothesis to be tested (hypotheses in the multivariate case,
    which we will look at). We will use the *Stanford heart transplant* dataset, which
    lists the survival of the patients waiting for transplants in the Stanford heart
    transplant program. We will use `age` and `year` with respect to the start date
    of the program, `transplant` status, and the existence of previous bypass `surgery`
    as predictors for survival, which ends in either death or transplant. Survival
    duration is the `stop` variable, which is the exit time of the study. `event`
    is the variable confirming right-censoring and corresponds to either death or
    transplant. The null hypothesis for each variable is that there is no statistically
    significant difference in survival between the groups. For example, age has no
    impact on survival, while awaiting transplant would be the null hypothesis. The
    code is shown in the following snippet:


    ```

    import statsmodels.api as sm

    data = sm.datasets.get_rdataset(''heart'', package=''survival'').data

    train_data = data.iloc[0:171]

    test_data = data.iloc[171:]

    exog=train_data[[''age'',''year'', ''transplant'',''surgery'']]#df_

    test[[''age'',''year'',''surgery'',''transplant'']]

    endog=train_data[''stop'']

    data.head(2)

    ```


    Two additional aspects of our data to be aware of are (1) that age has negative
    values; the starting age value is 48 years old, so an age of -1 corresponds to
    a 47-year-old patient and (2) `year` starts November 1, 1967. `id` is unique to
    each patient''s identification. We will not model this variable but can use it
    for reference. In *Figure 14.11* we can see, for reference, the first two rows
    of the data, including all variables we will use to model survival:


    | start | stop | Event | Age | year | surgery | transplant | id |

    |---|---|---|---|---|---|---|---|

    | 0 | 50 | 1 | -17.1554 | 0.123203 | 0 | 0 | 1 |

    | 0 | 6 | 1 | 3.835729 | 0.25462 | 0 | 0 | 2 |


    Figure 14.11 – First two rows of the Stanford Heart Transplant data set'

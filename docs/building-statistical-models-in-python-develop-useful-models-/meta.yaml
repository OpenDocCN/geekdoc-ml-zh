    are all summed together prior to dividing by the variance. This is why the original
    ACF shows a dampening effect; it is reasonable to assume that lag 0 is not smoothly
    serially correlated, individually, with each previous lag. Because the ACF does
    not control for autocorrelation between specific lags, we can use this correlation
    information to build a moving average function that can help model the noise component
    of the data across a long period.


    However, if we want to be able to construct a component of a model that allows
    us to define the relationship from point to point within the framework of ARMA
    models, we will want to also observe the PACF, which does control for the correlation
    between lags. Note in *Figure 10.5* the original data and its PACF. It shows a
    much different level of granularity than the ACF plot does; whereas in the PACF
    we don''t see a continued significant correlation with lag 0 and those beyond
    lag 4 until we near lag 30, we do see significant correlation in the ACF until
    almost lag 20. However, the original data is not very helpful because it is not

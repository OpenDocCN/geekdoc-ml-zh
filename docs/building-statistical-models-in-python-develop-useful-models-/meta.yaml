    \ were stored up to a sample size of 50, but nowadays, with the power of computation\
    \ and the internet, the $t$ values can be obtained easily with any sample size.\n\
    \n## T-test for means\n\nOne-sample and two-sample t-tests related to a population\
    \ mean or means of two populations where the population variances or population\
    \ standard deviations are unknown will be considered in this part.\n\nTo perform\
    \ a t-test, the following assumptions need to be satisfied:\n\n**Normality:**\
    \ The sample is normally distributed\n\n**Independence:** Observations are randomly\
    \ selected from a population to form a sample or, in other words, they are independent"
  mdcn: "## 总体方差相等\n\n与数据正态分布的假设类似，总体方差相等的假设——也称为方差齐性——涉及所比较分布的物理属性的形状。假设总体方差相等有助于提高参数检验的效力。这是因为当均值被识别为不同时，我们不仅有信心，而且也知道潜在分布重叠的程度。当检验对完整分布的位置有直观把握——实际上，对效应量有真实了解时——效力就会增加。反之，随着方差差异增大，效力会降低。\n\
    \n## 对总体方差相等的稳健性\n\n虽然总体方差相等在参数检验中很有用，但对这些检验的修改有助于使结果对偏离方差相等的情况保持稳健。这些检验的一个突出修改版本使用**Welch-Satterthwaite**调整来调整所使用的自由度。因为当每个组具有不同方差时，对每个组应用相同的自由度会导致数据的错误表示，所以Welch-Satterthwaite调整在分配自由度给假设方差相等的参数检验时，会考虑方差差异。使用Welch-Satterthwaite调整的两个常见检验是Welch\
    \ t检验和Welch ANOVA检验。当用于小样本时，这些检验可能不可靠，但当用于样本量足够大以具有足够效力时，结果应与其非Welch对应检验大致相同。\n\
    \n## 检验方差相等\n\n当检验分布间的方差相等时，我们有两个突出的检验：**Levene方差齐性检验**和**Fisher F检验**。\n\n##\
    \ Levene方差齐性检验\n\nLevene方差齐性检验在检验两个或多个组的方差齐性时很有用。在下面的代码片段*图4.8*中，我们使用三个分布进行检验，每个分布的样本量为100，均值为0，标准差分别为0.9、1.1和2。*图4.8*是使用*图4.8*上方代码的数据输出生成的三个分布的图。\n\
    \n```python\nfrom scipy.stats import levene\nnp.random.seed(26)\nmu1, sigma1,\
    \ mu2, sigma2, mu3, sigma3 = 0, 0.9, 0, 1.1, 0, 2\ndistro1, distro2, distro3 =\
    \ pd.DataFrame(), pd.DataFrame(), pd.DataFrame()\ndistro1['x'] = np.random.normal(mu1,\
    \ sigma1, 100)\ndistro2['x'] = np.random.normal(mu2, sigma2, 100)\ndistro3['x']\
    \ = np.random.normal(mu3, sigma3, 100)\n```\n\n我们可以看到它们不同的标准差如何影响其范围。\n\n我们可以看到该检验对违反方差齐性很敏感，因为其结果是一个统计显著的p值，表明方差不齐：\n\
    \n```python\nf_statistic, p_value = levene(distro1['x'], distro2['x'], distro3['x'])\n\
    if p_value <= 0.05:\n    print('The distributions do not have homogenous variance.\
    \ P-value = %.4f, F-statistic = %.4f' % (p_value, f_statistic))\nelse:\n    print('The\
    \ distributions have homogenous variance. P-value = %.4f, F-statistic = %.4f'\
    \ % (p_value, f_statistic))\n```\n\n输出如下：\n\nThe distributions do not have homogenous\
    \ variance. P-value = 0.0000\n\n## Fisher F检验\n\nFisher F检验在一次检验两个组的方差齐性时很有用。该检验将检验统计量与临界值进行比较，以确定方差在统计上是否相同。计算出的F统计量是第一组的方差除以第二组的方差。第一组总是方差较大的组。使用前面的数据，让我们比较分布1和分布3。分布3的方差较大，为2，因此在计算F统计量时，该组的方差将作为分子。由于每个组的样本量为100，它们查表的自由度将各为99。然而，由于我们将使用`scipy`\
    \ Python包来计算检验，这里不需要查表，因为`scipy`会用`f.cdf()`函数为我们完成。与Levene检验的结果一致，F检验表明分布1和分布3不具有方差齐性：\n\
    \n```python\nfrom scipy.stats import f\ndef f_test(inputA, inputB):\n    group1\
    \ = np.array(inputA)\n    group2 = np.array(inputB)\n    if np.var(group1) > np.var(group2):\n\
    \        f_statistic = np.var(group1) / np.var(group2)\n        numeratorDegreesOfFreedom\
    \ = group1.shape[0] - 1\n        denominatorDegreesOfFreedom = group2.shape[0]\
    \ - 1\n    else:\n        f_statistic = np.var(group2)/np.var(group1)\n      \
    \  numeratorDegreesOfFreedom = group2.shape[0] - 1\n        denominatorDegreesOfFreedom\
    \ = group1.shape[0] - 1\n    p_value = 1 - f.cdf(f_statistic, numeratorDegreesOfFreedom,\
    \ denominatorDegreesOfFreedom)\n    if p_value <= 0.05:\n        print('The distributions\
    \ do not have homogenous variance. P-value = %.4f, F-statistic = %.4f' % (p_value,\
    \ f_statistic))\n    else:\n        print('The distributions have homogenous variance.\
    \ P-value = %.4f, F-statistic = %.4f' % (p_value, f_statistic))\nf_test(distro3['x'],\
    \ distro1['x'])\n```\n\n此F检验的输出如下：\n\nThe distributions do not have homogenous\
    \ variance. P-value = 0.0000, F-statistic = 102622.9745\n\n## T检验——一种参数假设检验\n\n\
    在上一章中，当总体标准差已知时，应用了均值的z检验。然而，在现实世界中，获得总体标准差并不容易（或几乎不可能）。在本节中，我们将讨论另一种称为**t检验**的假设检验，它用于总体标准差未知的情况。总体的均值和标准差是通过取代表该总体的样本数据的均值和标准差来估计的。\n\
    \n广义上讲，均值的t检验方法与均值的z检验方法非常相似，但检验统计量和p值的计算与z检验不同。检验统计量通过以下公式计算：\n\n$$t = \\frac{\\\
    bar{x} - \\mu}{s / \\sqrt{n}}$$\n\n这里，$\\bar{x}$、$\\mu$、$s$和$n$分别是样本均值、总体均值、样本标准差和样本量，当样本数据$x$正态分布时，它服从**t分布**。以下代码说明了具有1,000个样本的标准正态分布（蓝色曲线）和具有两个样本量——3个和16个样本——的t分布（绿色和红色曲线）：\n\
    \n```python\n# libraries\nimport numpy as np\nimport scipy.stats as stats\n# creating\
    \ normal distribution\nx = np.linspace(-5, 5, 1000) # create 1000 points from\
    \ -5 to 5\ny = stats.norm.pdf(x) # create probability density for each point x\
    \ - normal distribution\n\n# creating Student t distributions for 2 sample sizes\
    \ n = 3 and n = 15\ndegree_freedom1 = 2\nt_dis1 = stats.t.pdf(x, degree_freedom1)\n\
    \ndegree_freedom2 = 15\nt_dis2 = stats.t.pdf(x, degree_freedom2)\n```\n\n以下是考虑的这3个分布的可视化。\n\
    \n图4.9 – 正态分布和t分布\n\n观察这三条曲线具有相似的对称性和形状，但较小样本量的样本具有更大的变异性（或者换句话说，尾部更重）。历史上，研究人员认为当样本量大于30时，样本标准差可以代表总体，即当$n\
    \ > 30$时，红色曲线近似于蓝色曲线。如果样本分布与标准正态分布重叠，使用z检验也很常见。这种做法背后有一些道理，因为以前临界值表最多存储到样本量为50，但如今，凭借计算和互联网的力量，可以轻松获得任何样本量的$t$值。\n\
    \n## 均值的T检验\n\n本部分将考虑与总体均值或两个总体的均值相关的单样本和双样本t检验，其中总体方差或总体标准差未知。\n\n要进行t检验，需要满足以下假设：\n\
    \n**正态性：** 样本服从正态分布\n\n**独立性：** 观察值是从总体中随机选择形成样本的，或者换句话说，它们是独立的"

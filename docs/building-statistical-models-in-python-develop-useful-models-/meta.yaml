- img_proc: true
  md: 'where RSS = $\|y - X\beta\|_2^2$, $\|\beta\|_2^2$ is the squared $L^2$ **norm**
    (Euclidean norm) of the regression coefficients array, and $X$ is the design matrix.
    Further simplification brings this to the following:


    $$\|y - X\beta\|_2^2 + \lambda \beta^T \beta$$


    which can be rewritten in the closed form by using the tuning parameter''s scalar
    multiple of the identity matrix to derive the **ridge regression coefficient estimates**,
    $\hat{\beta}^R$, as follows:


    $$\hat{\beta}^R = (X^T X + \lambda I)^{-1} X^T y$$


    Simply stated, the ridge regression coefficient estimates are the set of coefficients
    that minimizes the least squares regression output as follows:


    $$\hat{\beta}^R = argmin \left\{ \sum_{i=1}^n \left( y_i - \hat{\beta}_0 - \sum_{j=1}^p
    \hat{\beta}_j x_{ij} \right)^2 + \lambda \sum_{j=1}^p \hat{\beta}_j^2 \right\}$$


    > **Standardizing coefficients prior to applying ridge regression**

    Because ridge regression seeks to minimize the error for the entire dataset and
    the tuning parameter for doing so is applied within the $L^2$-norm normalization
    process of taking the root of summed squared terms, it is important to apply a
    standard scaler to each variable in the model so that all variables are on the
    same scale, prior to applying ridge regression. If this is not performed, ridge
    regression will almost certainly fail to be useful for helping the model generalize
    across datasets.


    In summary, ridge regression reduces variance in a model by using the $L^2$ **penalty**,
    which penalizes the sum of squared coefficients. However, it is important to note
    the $L^2$ **norm**, and consequently, ridge regression, **will never produce a
    zero-valued coefficient**. Therefore, ridge regression is an excellent tool for
    reducing variance when the analyst seeks to use all terms in the model. However,
    ridge regression cannot be used for variable elimination. For variable elimination,
    we can use the LASSO regression shrinkage method, which uses the $L^1$ **penalty**
    to regularize coefficients with the $L^1$ **norm**, which uses the absolute value
    to shrink values to and including zero.


    Let''s walk through an example of a ridge regression implementation in Python.



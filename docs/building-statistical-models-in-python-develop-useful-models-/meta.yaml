    \ | .9945 | .9946 | .9948 | .9949 | .9951 | .9952 |\n\n图 3.2 – z表\n\n在Python中，我们可以使用**累积分布函数**（CDF）来计算它：\n\
    \n```\nimport scipy\nround(scipy.stats.norm.cdf(1), 4)\n# 0.8413\n```\n\n我们在Python中也得到了与z表检查相同的值；在这个例子中，z-score\
    \ = 1时，它是0.8413。\n\n另一个例子是从智商调查中随机抽取的10个分数的简单随机样本：\n\n90, 78, 110, 110, 99, 115,\
    \ 130, 100, 95, 93\n\n要计算样本中每个智商分数的z-score，我们需要计算这个样本的均值和标准差，然后应用z-score公式。幸运的是，我们可以再次使用`scipy`库，如下所示：\n\
    \n```\nimport pandas as pd\nimport numpy as np\nimport scipy.stats as stats\n\n\
    IQ = np.array([90, 78,110, 110, 99, 115,130, 100, 95, 93])\nz_score = stats.zscore(IQ)\n\
    \n# Create dataframe\n\ndata_zscore = {\n    \"IQ score\": IQ,\n    \"z-score\"\
    : z_score\n}\n\nIQ_zscore = pd.DataFrame(data_zscore)\nIQ_zscore\n```\n\n我们创建了一个名为IQ的智商分数数组，并使用scipy.stats中的z-score来计算z_score。最后，我们创建了以下输出DataFrame。\n\
    \n| | IQ score | z-score |\n|---|---|---|\n| 0 | 90 | -0.860663 |\n| 1 | 78 |\
    \ -1.721326 |\n| 2 | 110 | 0.573775 |\n| 3 | 110 | 0.573775 |\n| 4 | 99 | -0.215166\
    \ |\n| 5 | 115 | 0.932385 |\n| 6 | 130 | 2.008214 |\n| 7 | 100 | -0.143444 |\n\
    | 8 | 95 | -0.502053 |\n| 9 | 93 | -0.645497 |\n\n图 3.3 – 输出DataFrame\n\n在讨论z统计量之前，我们将介绍抽样分布的概念。回到上一个例子，根据经验，我们反复从高中智商分数池中抽取35个智商分数的简单随机样本，次数根据研究需要而定。然后我们计算每个样本的平均分，称为$\\\
    bar{x}$。因为我们选择了不同的样本，所以$\\bar{x}$也有各种可能的值。$\\bar{x}$的期望值如下：\n\n$$E(\\bar{x}) =\
    \ \\mu$$\n\n这里，$\\mu$是总体均值。$\\sigma_{\\bar{x}}$表示$\\bar{x}$的标准分布。实际上，在许多抽样情况下，总体相对于小样本量来说是相对较大的。那么，$\\\
    bar{x}$的标准差可以如下给出：\n\n$$\\sigma_{\\bar{x}} = \\frac{\\sigma}{\\sqrt{n}}$$\n\n\
    这里，$\\sigma$是总体标准差，$n$是有限或无限总体的样本量，前提是总体较大而样本量相对较小。注意，$\\sigma_{\\bar{x}}$也称为均值的标准误差，以帮助我们确定样本均值与总体均值的距离。注意，$E(\\\
    bar{x}) = \\mu$，与样本量无关。样本量和标准误差呈负相关：当样本量增加时，标准误差减小。由于假设$\\bar{x}$的抽样分布是正态分布的，因此样本分布由以下公式给出：\n\
    \n$$z_{\\bar{x}} = \\frac{\\bar{x} - \\mu}{\\sigma_{\\bar{x}}}$$\n\n在关于总体均值的假设检验中，我们使用检验统计量，其公式如下：\n\
    \n$$z = z_{\\bar{x}} = \\frac{\\bar{x} - \\mu}{\\sigma / \\sqrt{n}}$$\n\n这里，$\\\
    bar{x}$是样本均值，$\\mu$是总体均值，$\\sigma$是总体标准差，$n$是样本量。\n\n再次考虑智商测试的例子。智商分数数据的均值$\\\
    mu = 98$，标准差$\\sigma = 12$。假设数据是正态分布的。设$x$是从智商数据中随机抽取的分数。$x$在95到104之间的概率是多少？我们将计算当$x\
    \ = 95$和$x = 104$时的z-score，如下所示：\n\n$$z_{95} = \\frac{95 - 98}{12} = -0.25,$$\n\
    $$z_{100} = \\frac{104 - 98}{12} = 0.5.$$\n\n因此，抽取的分数在95到104之间的概率是：\n\n$$P(95\
    \ < x < 104) = P(-0.25 < z < 0.5) = 0.6915 - 0.4013 = 0.2902.$$\n\n那么，从数据中随机抽取的智商分数在95到104之间的概率约为29.02%。我们也可以从z表中获取值，如下所示。\n\

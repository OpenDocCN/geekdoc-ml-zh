  - '[PAGE 395]


    # Step 2


    We estimate the survival function using a **Kaplan-Meier estimate**, which accounts
    for right-censoring in the data. In our example, right-censoring occurs when the
    event variable is equal to one. We can see 171 enter at point 0. On the first
    day (`stop=1`), corresponding to index column `event_at` equal to 1, we have right-censoring
    for three patients. We observed the event take place for one patient (`observed=1`)
    and the other two patients were censored. Here, we show the corresponding data.
    The patient with `id=45` stops but restarts the same day, then survives until
    day 45. We see the same for patient `id=3`, who survives until day 16 when they
    receive a transplant. The patient with `id=15` does not re-enter for follow-up;
    we assume since they did not receive a transplant, they did not survive.


    In the following code sample, the `durations` variable corresponds to survival
    time and `event_observed` corresponds to the event (transplant or death) that
    results in right-censoring:


    ```

    from lifelines import KaplanMeierFitter

    import matplotlib.pyplot as plt

    KaplanMeierFitter = KaplanMeierFitter()

    KaplanMeierFitter.fit(durations=train_data[''stop''], event_observed=train_data[''event''])

    KaplanMeierFitter.event_table.reset_index()

    ```


    Note from the Kaplan-Meier results that `event=1` with `stop=1` results in `observed=1`,
    whereas `event=0` with `stop=1` results in `censored=1` and `stop=1` results in
    `removed=1`. All three conditions result in those corresponding samples being
    removed from the calculation for that day''s calculation, but unlike the patient
    who experienced the event, those who were censored are considered to survive at
    least as long as the study continues. We can see this by considering the Kaplan-Meier
    survival estimation probability function, $S_t$:


    > $$S_t = \frac{n\ Patients\ at\ Start - n\ Patients\ with\ Event = 1\ at\ time\
    t}{n\ Patients\ at\ Start}$$


    Here, survival probability at any time, $t$, is denoted as $S_t$.


    In looking at our event table from the `KaplanMeierFitter` function, we have the
    following:


    > $$S_t = \frac{n\ Patients\ at\ risk - n\ Patients\ observed\ at\ time\ t}{n\
    Patients\ at\ risk}$$


    We can understand that a `removed` patient has limited impact on survival estimations
    unless they were also noted as `observed=1`, which we can ascribe to `event=1`.'

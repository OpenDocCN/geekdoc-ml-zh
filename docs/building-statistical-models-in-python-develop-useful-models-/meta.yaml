    # Elastic Net


    **Elastic Net** is another common shrinkage method that can be applied to manage
    a bias-variance trade-off. This method applies the tuning parameter to a combination
    of ridge and LASSO regression where the proportion of influence from either is
    determined by the hyperparameter $\alpha$. The equation Elastic Net minimizes
    is as follows:


    $$(\widehat{\beta}_0, \widehat{\beta}) = argmin \left\{ \frac{1}{2n} \sum_{i=1}^{n}
    \left( y_i - \widehat{\beta}_0 - \sum_{j=1}^{p} \widehat{\beta}_j x_{ij} \right)^2
    + \lambda \left( \frac{1-\alpha}{2} \sum_{j=1}^{p} \widehat{\beta}_j^2 + \alpha
    \sum_{j=1}^{p} |\widehat{\beta}_j| \right) \right\}$$


    Naturally, depending on the values of $\alpha$, Elastic Net can also generate
    absolute zero-valued coefficient parameter estimates where it cancels out the
    ridge regression penalty term. When all input variables are needed – for example,
    if they have already been pruned following procedures such as those outlined in
    the *Feature selection* section of this chapter – Elastic Net is most likely to
    outperform both ridge and LASSO regression, especially when there are highly correlated
    features in the dataset that must be included to capture necessary variance. In
    the next section, we will discuss dimension reduction. Specifically, we provide
    an in-depth overview of PCR, which uses **Principal Component Analysis (PCA)**
    to extract useful information from systems that contain correlated features required
    to evaluate the target.'

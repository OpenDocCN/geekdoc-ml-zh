    | :---: | :---: | :---: | :---: | :---: | :---: |

    | 1 | 37 | 38 | 1 | - | 1 |

    | 2 | 14 | 17 | 3 | - | 2.5 |

    | 3 | 22 | 19 | 3 | + | 2.5 |

    | 4 | 12 | 7 | 5 | + | 4 |

    | 5 | 24 | 15 | 9 | + | 5 |

    | 6 | 35 | 25 | 10 | + | 6 |

    | 7 | 35 | 24 | 11 | + | 7 |

    | 8 | 51 | 38 | 13 | + | 8 |

    | 9 | 39 | 19 | 20 | + | 9 |



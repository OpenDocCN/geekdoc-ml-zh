    Figure 11.3 – AR(p) order identification


    # AR(p) end-to-end example


    Let us walk through an end-to-end example of AR(p) modeling in Python. First,
    we need to generate a dataset produced by an AR(4) process. We will use this data
    as the process we will attempt to model:


    ```

    arparams = np.array([1.59, -0.544, -0.511, 0.222])

    ar = np.r_[1, -arparams]

    ar_process = sm.tsa.ArmaProcess(ar)

    y = ar_process.generate_sample(nsample=200)

    ```


    For the following steps, let us assume data y is the output of a machine about
    which we know nothing.


    # Step 1 - visual inspection


    We first visualize the original data and its ACF and PACF plots using the code
    we provided earlier in the chapter:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_297_1.png)


    Figure 11.4 – Step 1 in model development: visual inspection'

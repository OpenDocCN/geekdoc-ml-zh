    ```\n\n| n | 皮尔逊相关系数 |\n| :--- | :---: |\n| 原始数据中的 10 个样本 | 0.32 |\n| 10 次重抽样\
    \ | 0.22 |\n| 10,000 次重抽样 | -0.003 |\n\n图 2.21 – 皮尔逊相关系数表及原始样本\n\n通常运行大约 1,000\
    \ 到 10,000 次自助重抽样。然而，这取决于被自助的数据类型。例如，如果对来自人类基因组序列数据集的数据进行自助，对样本进行 1000 万次自助可能很有用，但如果对简单数据集进行自助，进行\
    \ 1,000 次或更少的自助可能就足够了。最终，研究人员应该对均值的分布进行目视检查，以确定结果是否与预期相符。与统计学一样，最好具备一些领域知识或主题专业知识来帮助验证发现，因为这很可能是决定自助重复次数的最佳依据。\n\
    \n自助法也用于机器学习，它是 **自助聚合**（也称为 **装袋**）概念的基础，该过程结合了基于自助子样本分布构建的预测模型的输出。**随机森林** 是执行此操作的一种流行算法。装袋算法中自助法的目的是保留非参数（稍后章节将讨论更多）分类的低偏差行为，同时减少方差，从而使用自助法作为最小化建模误差中偏差-方差权衡重要性的一种方式。\n\

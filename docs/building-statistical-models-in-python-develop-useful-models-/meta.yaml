- md: "## Median\n\nThe next measure of the center is the median. The median is the\
    \ middle value occurring when the values are arranged in an order.\n\n> **Median\
    \ and Data Types**\n> This measure can be performed on ordinal data, interval\
    \ data, and ratio data, but not on nominal data.\n\nWe will discuss two cases\
    \ here.\n\n### Finding the median when the number of instances is odd\n\nFinding\
    \ the median of some numeric data is shown in *Figure 2.6*. The data is sorted,\
    \ then the median is identified.\n\nIn the preceding example, the instances are\
    \ odd in number (7 instances), which have a center value. However, if the number\
    \ of instances had been even, it would not have been possible to just take the\
    \ middle number after sorting the values.\n\n### Finding the median when the number\
    \ of instances is even\n\nWhen there are an even number of instances, the average\
    \ of the two middle-most values is taken. Unlike the mode, there is no concept\
    \ of multiple medians for the same series of data. An example with an even number\
    \ of instances (8 instances) is shown in *Figure 2.7*.\n\nRaw Data 85, 99, 70,\
    \ 71, 86, 88, 94, 105\nSorted 70, 71, 85, 86, 88, 94, 99, 105\nMiddle-Most Two\
    \ 86 88\nAverage 87\n\nNow, let's see how to calculate the median of a dataset\
    \ with numpy. Like scipy, numpy contains functions for calculating descriptive\
    \ statistics. We will calculate the median for the eight numbers listed in the\
    \ preceding example:\n\n```python\nimport numpy as np\nvalues = [85, 99, 70, 71,\
    \ 86, 88, 94, 105]\nmedian = np.median(values)\nprint(f\"The median value is {median:.2f}\"\
    )\n# The median value is 87.00\n```\n\nThe result of the median calculation is\
    \ 87, as expected. Note that the median function returns a single value, in contrast\
    \ to the mode function in the previous code example.\n\n## Mean\n\nThe next center\
    \ measure is the mean, which is commonly referred to as the average. The mean\
    \ is defined by the following equation:\n\n$$\\bar{x} = \\frac{\\sum_{i=0}^{n}\
    \ x_i}{N}$$\n\nLet me explain the equation in words. To calculate the mean, we\
    \ must add all the values together, then divide the sum by the number of values.\
    \ Please refer to the following example. The 7 numbers are first added together,\
    \ which brings the total sum to 593. This sum is then divided by the number of\
    \ instances, resulting in a value of 84.7.\n\nNote that the mean and the median\
    \ of these values (84.7 and 86, respectively) are not the same value. In general,\
    \ the mean and median will not be the same value, but there are special cases\
    \ where the mean and median will converge.\n\n> **Mean and Data Types**\n> As\
    \ for the supported data types, the mean is valid for interval and ratio data\
    \ since the values are added together.\n\nNow, we will look at how to calculate\
    \ the mean with numpy. The following code example shows the calculation of the\
    \ mean for the values in the previous example:\n\n```python\nimport numpy as np\n\
    values = [85, 99, 70, 71, 86, 88, 94]\nmean = np.mean(values)\nprint(f\"The mean\
    \ value is {mean:.1f}\")\n# The mean value is 84.7\n```\n\nLike the median function,\
    \ the mean function returns a single number.\n\nBefore concluding this section\
    \ on center measures, it is worth discussing the use of the mean and median in\
    \ various situations. As mentioned previously, the median and mean will, in general,\
    \ be different values. This is an effect driven by the shape of the distribution.\n\
    \n> **Shape impacts on Mean and Median**\n> If the distribution is symmetric,\
    \ the mean and median will tend to converge. However, if the distribution is not\
    \ symmetric, the mean and median will diverge.\n\nThe degree to which the measures\
    \ diverge is driven by how asymmetric the distribution is. Four example distributions\
    \ are given in *Figure 2.6* to show this effect. Distributions 1 and 2 show the\
    \ mean pulled toward a higher value than the median. The mean is pulled toward\
    \ values with a larger absolute value. This is an important effect of the mean\
    \ to be aware of when a dataset contains (or may contain) **outlier values** (often\
    \ called outliers or influential points), which will tend to pull the mean in\
    \ their direction. Unlike the mean, the median is not affected by outliers if\
    \ outliers account for a smaller percentage of the data. Outliers will be discussed\
    \ further in the *Measuring variability* section.\n\nThe next category of measurements\
    \ for distributions is measures of variability.\n\n## Measuring variability\n\n\
    By variability, we essentially mean how wide a distribution is. The measurements\
    \ in this category are as follows:\n\n- Range\n- Quartile ranges\n- Tukey fences\n\
    - Variance\n\nLet's discuss each of them.\n\n### Range\n\nThe range is simply\
    \ the difference between the maximum value and the minimum value in the distribution.\
    \ Like the mean, the range will be affected by outliers since it depends on the\
    \ max and min values. However, there is another variability method that, like\
    \ the median, is robust to the presence of outliers.\n\nLet's take a look at calculating\
    \ a range with code with numpy:\n\n```python\nimport numpy as np\nvalues = [85,\
    \ 99, 70, 71, 86, 88, 94, 105]\nmax_value = np.max(values)\nmin_value = np.min(values)\n\
    range_ = max_value - min_value\nprint(f\"The data have a range of {range_}\"\n\
    \      f\" with max of {max_value}\"\n      f\" and min of {min_value}\")\n# The\
    \ data have a range of 35 with max of 105 and min of 70\n```\n\nWhile numpy does\
    \ not have a range function, the range can be calculated using the min and max\
    \ functions provided by numpy.\n\n### Quartile ranges\n\nThe next measures of\
    \ variability are determined by sorting the data and then dividing the data into\
    \ four equal sections. The boundaries of the four sections are the quartiles,\
    \ which are called the following:\n\n- The lower quartile (Q1)\n- The middle quartile\
    \ (Q2)\n- The upper quartile (Q3)\n\nAn example of quartiles is shown as follows.\
    \ Like the median, quartiles are robust to outliers so long as the outliers are\
    \ a small percentage of the dataset. Note that the middle quartile is, in fact,\
    \ the median. An adjusted range measurement that is less sensitive to outliers\
    \ than the normal range discussed in the *Range* section is the middle quartile,\
    \ the **interquartile range** (IQR). The IQR is the difference between the upper\
    \ and lower quartiles (Q3 - Q1). While this range is less sensitive to outliers,\
    \ it only contains 50% of the data. Thus, making the interquartile range likely\
    \ to be *less representative of the total variation* of the data.\n\nWe can calculate\
    \ the quartiles and IQR range using `numpy` and `scipy`. In the following code\
    \ example, we use the `quantiles` function to calculate the quartiles. We will\
    \ not discuss `quantiles` here, other than to mention that `quantiles` are a generalization\
    \ where the data can be split into any number of equal parts. Since we are splitting\
    \ the data into four equal parts for quartiles, the `quantiles` values used for\
    \ the calculation are 0.25, 0.5, and 0.75. Quartiles Q1 and Q3 could then be used\
    \ to calculate the IQR. However, we could also use the `iqr` function from `scipy`\
    \ to make the calculation:\n\n```python\nimport numpy as np\nfrom scipy import\
    \ stats\nvalues = [85, 99, 70, 71, 86, 88, 94]\nquartiles = np.quantile(values,\

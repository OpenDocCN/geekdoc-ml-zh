    # QQ plot of residuals


    Assessment of normality for the QQ plot follows the same procedure as assessing
    normality using the QQ plot in *Chapter 4, Parametric Tests*. The primary purpose
    of this plot is to assess the required assumption of the **normal distribution
    of errors**. Minor deviation of the residuals from the 45-degree line in the plot
    is normal, but extreme skewness or deviation from the line may indicate a poor
    fit. Such a scenario could indicate poor statistical power. In the event of skewness,
    data transformation – such as a log transformation – could be useful to resolve
    the issue. Dropping outliers may be another suitable solution. However, rather
    than dropping outliers outright, it is advisable to ensure there was not an error
    in data handling that could be resolved to make the outliers conform.


    In the QQ plot for our model''s residuals, we can see some moderate left-side
    skewness and extreme right-side skewness, which suggests the three values in the
    right tail could be extreme outliers. Aside from this, we can assume that overall,
    the residual error is approximately normally distributed.


    # Scale-location


    The scale-location plot of the square root of the standardized residuals helps
    analysts use visual inspection to determine whether there is **homoscedasticity**
    – or *non-constant* variance – of the residuals, which is required for a least
    squares regression model. The plot visualizes the square root of the absolute
    value of the standardized residuals. Analyzing homoscedasticity can sometimes
    be useful for identifying potential issues related to **sample independence**,
    another requirement of least-squares regression. However, the Durbin-Watson test
    should be given more weight for testing this assumption.


    In assessing our model, we can see the line has some deviation from being perfectly
    horizontal. Additionally, the residuals, while seeming to have a large amount
    of constant variance, nonetheless at times exhibit patterns, which conflicts with
    the behavior of homoscedasticity. Furthermore, there appear to be three very notable
    outliers. Based on this information, we can reasonably assume a risk of heteroscedasticity
    – or *constant* variance – exists within the model''s residuals.


    # Residuals versus leverage influence


    Assessing the residuals versus leverage influence is another approach to assessing
    model fit. In addition to gauging leverage, this plot also shows when **Cook''s
    distance** is beyond a reasonable level.'
- md: '**Leverage** is used to identify the distance of an individual point from all
    other points. High leverage for a residual likely means the corresponding data
    point is an outlier strongly influencing the model to fit less approximately to
    the overall data and instead give more weight to that specific value. Residuals
    should be between -2 and 2 to not be considered potential outliers. Values between
    +/-2.5 to 3 suggest data points are extreme outliers. Overall, this plot is useful
    for separating outliers that have no significant negative impact on the model
    from the ones that do.


    **Cook''s distance** is a measurement that uses both an observation''s leverage
    and its residual value. As the leverage is higher, its calculated Cook''s distance
    is higher. In general, a Cook''s distance value greater than 0.5 means a residual
    has leverage that is negatively impacting the model through over-representation
    – essentially, an outlier. Cook''s distance is included in the code and flags
    the residuals that have distances greater than 0.5. Cook''s distance is particularly
    useful because removing outliers may not have a significant impact on the model.
    However, if the outlier has a high Cook''s distance value, that is a strong indication
    that resolving the outlier **will benefit** the model. Cook''s distance is calculated
    for each data point by removing it from the model and calculating the difference
    in error divided by the mean squared error multiplied by the number of model coefficients
    plus one. Its formulation follows:


    $$D_i = \frac{\sum_{j=1}^{n} (\hat{y}_j - \hat{y}_{j(i)})^2}{(p+1)\hat{\sigma}^2}$$


    where $\hat{y}_j$ is the jth estimate of the response and $\hat{y}_{j(i)}$ is
    the value of the jth fitted value with the ith value removed. $p$ is the number
    of coefficients in the model and $\hat{\sigma}^2$ is the variance of the residuals
    for all observations, including those removed, also called the squared error.


    In the plot for our model, we can observe three extreme outliers. However, we
    can also see no value of Cook''s distance is greater than 0.5. As with the scale-location
    plot, the standardized residuals should follow even distribution around a smoothed
    line that is horizontal, which indicates a constant variance. We can see from
    our model''s output that this is not the case.


    ## Addressing issues with residuals


    Alone, each plot can be considered enough to negate the validity of a model. However,
    it is useful to consider all plots since a model may still be useful if there
    is only some deviance from expectations in the diagnostic plots. Some approaches
    to resolving issues with residuals are as follows:


    - Investigating and resolving any data collection issues that may produce outliers
    or data inconsistencies

    - Removing outliers outright

    - Improving the sampling approach using methods such as using random or stratified
    sampling

    - Performing data transformations, such as a log or square root transformation

    - Including additional input variables that can help explain the target variable
    or any serial correlation that may be present


    ## Handling serial correlation


    If uncertain of the presence of serial correlation in the residuals, a useful
    next step is to analyze a **Partial Autocorrelation Function (PACF)** plot to
    assess whether serial correlation exists in the model at a significant level,
    which could explain issues with the model''s residuals.


    > **ACF and PACF**


    The **PACF** provides a partial correlation between the value of a point and previous
    points, called lags, by controlling for the lags between. Controlling the lags
    between is where the term “partial” comes from. If a specific point at lag zero
    in a dataset is correlated strongly with the value of the third lagging point,
    there would be a significant correlation with a lag of 3, but not a lag of 2 or
    1. In time-series modeling, the PACF is used to directly derive the autoregressive
    orders, denoted as *AR(n)* where *n* is the lag. The **Autocorrelation Function
    (ACF)**, which is used for determining moving average orders, denoted as *MA(n)*,
    considers the correlation between data points at lag zero and all previous lagging
    points without controlling for the relationships between them. Stated alternatively,
    autocorrelation in an ACF plot at lag 3 will provide autocorrelation across points
    0 through 3 whereas correlation in a PACF plot at lag 3 will provide autocorrelation
    only between point 0 and point 3, excluding the impact of values at lags 1 and
    2.


    We can execute the following code to generate the PACF plot with a 95% confidence
    interval using the most recent 50 data points, ordered by index positioning –
    in this case, by date:


    ```

    from statsmodels.graphics.tsaplots import plot_pacf

    plot_pacf(compiled_model.resid, alpha=0.05, lags=50);

    ```


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_185_0.png)


    Figure 6.15 – Partial autocorrelation plot for the model residuals


    In the PACF plot in *Figure 6.15*, we see very strong and significant correlations
    at lags 0 and 1. We observe a low level of significant correlation (approximately
    -0.25) for lags 2 and 36, extending beyond the 95% confidence interval. What this
    tells us is we might be better off modeling the dataset with a first-order autoregressive
    (**AR(1)**) time-series model than a linear regression model.


    Answering regression questions with a least squares method when there is a presence
    of significant autocorrelation creates inherit risk. There are methods to adjust
    the results of a model when there is autocorrelation detected, such as taking
    a **first-order difference** – or another type of low-pass filter - or applying
    the Cochrane-Orcutt, Hildreth-Lu, or Yule-Walker adjustments. However, it is ideal
    to perform a time-series analysis, as the results of that type of modeling are
    more robust to time-dependent patterns. We will introduce time series in *Chapter
    10, Introduction to Time Series*, where we discuss simple and complex methods
    for approximating time series to produce more useful results.


    Let us consider a first-order difference of the data. Regarding *Figure 6.16*,
    we first look at the ACF plot and original data for the input variable, *realdpi*.
    We can see an exponentially growing line (original data) that displays an exponentially
    dampening ACF plot. This ACF behavior is typical for **trended** data that often
    benefits from **first-order differencing**. The low autoregressive ordering identified
    in the PACF indicates this may be sufficient for a regression model to proceed.
    Had the ACF shown different behavior, such as sinusoidal (seasonal) autocorrelation,
    or the PACF shown more partial autocorrelation, we would have evidence against
    a first-order difference being a sufficient solution for resolving serial correlation
    and proceeding with least squares regression. ACFs and PACFs for least squares
    regression should ideally have no significantly correlated lags. However, when
    the ACF exhibits this behavior and the PACF shows no significance, or when the
    level of correlation is very low, regression may perform well. It is preferable
    to see no patterns or peaks in either plot. Regardless, in either case, model
    error should be assessed, in addition to the autocorrelation of the residuals,
    to determine if least squares regression performs as needed.


    Using the `diff()` numpy function, we take a first-order, low-pass difference
    and plot the ACFs, PACFs, and line plots for the original and differenced data.
    We can see a significant reduction in autocorrelation as a result. As an aside,
    the post-differencing autocorrelation suggests an **autoregressive moving average
    (ARMA)** model of AR order 1 and MA order 1 may be better suited than least-squares
    regression. However, we will ignore this for the chapter and continue:


    ```

    from statsmodels.graphics.tsaplots import plot_acf

    from statsmodels.graphics.tsaplots import plot_pacf

    fig, ax = plt.subplots(2,3, figsize=(15,10))

    plot_acf(df_mod[''realdpi''], alpha=0.05, lags=50, ax=ax[0,0])

    ax[0,0].set_title(''Original ACF'')

    plot_pacf(df_mod[''realdpi''], alpha=0.05, lags=50, ax=ax[0,1])

    ax[0,1].set_title(''Original PACF'')

    ax[0,2].set_title(''Original Data'')

    ax[0,2].plot(df_mod[''realdpi''])

    plot_acf(np.diff(df_mod[''realdpi''], n=1), alpha=0.05, lags=50, ax=ax[1,0])

    ```'
  mdcn: '**杠杆值**用于识别单个数据点与其他所有点之间的距离。残差的高杠杆值可能意味着对应的数据点是一个**异常值**，它强烈影响模型，使其对整体数据的拟合度降低，而更多地偏向该特定值。残差应在-2到2之间，才不被视为潜在异常值。介于±2.5到3之间的值表明数据点是极端异常值。总体而言，此图有助于区分那些对模型没有显著负面影响的异常值与那些有负面影响的异常值。


    **库克距离**是一种同时使用观测值的杠杆值及其残差值的度量。杠杆值越高，计算出的库克距离就越高。通常，库克距离值大于0.5意味着残差的杠杆值通过过度代表对模型产生负面影响——本质上就是一个异常值。库克距离包含在代码中，并标记距离大于0.5的残差。库克距离特别有用，因为移除异常值可能不会对模型产生显著影响。然而，如果异常值的库克距离值很高，这强烈表明解决该异常值**将有利于**模型。库克距离的计算方法是：将某个数据点从模型中移除，计算误差的差异除以均方误差，再乘以模型系数数量加一。其公式如下：


    $$D_i = \frac{\sum_{j=1}^{n} (\hat{y}_j - \hat{y}_{j(i)})^2}{(p+1)\hat{\sigma}^2}$$


    其中 $\hat{y}_j$ 是响应变量的第j个估计值，$\hat{y}_{j(i)}$ 是移除第i个值后第j个拟合值。$p$ 是模型中的系数数量，$\hat{\sigma}^2$
    是所有观测值（包括被移除的）的残差方差，也称为平方误差。


    在我们模型的图中，我们可以观察到三个极端异常值。然而，我们也可以看到没有库克距离值大于0.5。与尺度-位置图一样，标准化残差应围绕一条水平的平滑线均匀分布，这表示方差恒定。从我们模型的输出中可以看出，情况并非如此。


    ## 解决残差问题


    单独来看，每个图都足以否定模型的有效性。然而，考虑所有图是有用的，因为如果诊断图中仅存在一些与预期的偏差，模型可能仍然有用。解决残差问题的一些方法如下：


    -   调查并解决可能导致异常值或数据不一致的任何数据收集问题

    -   直接移除异常值

    -   使用随机抽样或分层抽样等方法改进抽样方法

    -   执行数据转换，例如对数转换或平方根转换

    -   包含可以帮助解释目标变量或可能存在的任何序列相关性的额外输入变量


    ## 处理序列相关性


    如果不确定残差中是否存在序列相关性，一个有用的下一步是分析**偏自相关函数（PACF）**图，以评估模型中是否存在显著水平的序列相关性，这可以解释模型残差的问题。


    > **ACF 和 PACF**


    **PACF** 通过控制中间滞后值，提供了一个点的值与之前点（称为滞后）之间的偏相关性。控制中间滞后值是“偏”这个术语的由来。如果数据集中滞后为零的特定点与第三个滞后点的值高度相关，那么滞后为3时会有显著相关性，但滞后为2或1时则没有。在时间序列建模中，PACF
    用于直接推导自回归阶数，记为 *AR(n)*，其中 *n* 是滞后阶数。**自相关函数（ACF）** 用于确定移动平均阶数，记为 *MA(n)*，它考虑了滞后为零的数据点与所有之前滞后点之间的相关性，而不控制它们之间的关系。换句话说，ACF
    图中滞后为3的自相关性将提供从点0到点3的自相关性，而 PACF 图中滞后为3的相关性仅提供点0和点3之间的自相关性，排除了滞后1和2处值的影响。


    我们可以执行以下代码，使用最近50个数据点（按索引位置排序，在本例中是按日期排序）生成带有95%置信区间的 PACF 图：


    ```

    from statsmodels.graphics.tsaplots import plot_pacf

    plot_pacf(compiled_model.resid, alpha=0.05, lags=50);

    ```


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_185_0.png)


    图6.15 – 模型残差的偏自相关图


    在*图6.15*的 PACF 图中，我们看到滞后0和1处有非常强且显著的相关性。我们观察到滞后2和36处有低水平的显著相关性（约-0.25），超出了95%置信区间。这告诉我们，使用一阶自回归（**AR(1)**）时间序列模型可能比线性回归模型更适合对该数据集建模。


    在存在显著自相关性的情况下，使用最小二乘法回答回归问题会产生固有风险。当检测到自相关性时，有方法可以调整模型结果，例如进行**一阶差分**——或其他类型的低通滤波器——或应用
    Cochrane-Orcutt、Hildreth-Lu 或 Yule-Walker 调整。然而，理想的情况是进行时间序列分析，因为这类建模的结果对时间依赖性模式更稳健。我们将在*第10章，时间序列简介*中介绍时间序列，届时我们将讨论用于近似时间序列以产生更有用结果的简单和复杂方法。


    让我们考虑数据的一阶差分。关于*图6.16*，我们首先查看输入变量 *realdpi* 的 ACF 图和原始数据。我们可以看到一条指数增长的线（原始数据），显示出指数衰减的
    ACF 图。这种 ACF 行为是**趋势**数据的典型特征，通常受益于**一阶差分**。PACF 中识别出的低自回归阶数表明，对于回归模型继续进行可能已经足够。如果
    ACF 显示出不同的行为，例如正弦（季节性）自相关，或者 PACF 显示出更多的偏自相关性，那么我们将有证据表明一阶差分不足以解决序列相关性并继续进行最小二乘回归。最小二乘回归的
    ACF 和 PACF 理想情况下应没有显著相关的滞后。然而，当 ACF 表现出这种行为而 PACF 显示不显著，或者相关性水平非常低时，回归可能表现良好。最好在两个图中都没有模式或峰值。无论如何，在这两种情况下，除了残差的自相关性外，还应评估模型误差，以确定最小二乘回归是否按需执行。


    使用 `diff()` numpy 函数，我们进行一阶低通差分，并绘制原始数据和差分数据的 ACF、PACF 和线图。我们可以看到自相关性因此显著降低。顺便提一下，差分后的自相关性表明，阶数为1的自回归和阶数为1的移动平均（**ARMA**）模型可能比最小二乘回归更合适。然而，我们将在本章忽略这一点并继续：


    ```

    from statsmodels.graphics.tsaplots import plot_acf

    from statsmodels.graphics.tsaplots import plot_pacf

    fig, ax = plt.subplots(2,3, figsize=(15,10))

    plot_acf(df_mod[''realdpi''], alpha=0.05, lags=50, ax=ax[0,0])

    ax[0,0].set_title(''Original ACF'')

    plot_pacf(df_mod[''realdpi''], alpha=0.05, lags=50, ax=ax[0,1])

    ax[0,1].set_title(''Original PACF'')

    ax[0,2].set_title(''Original Data'')

    ax[0,2].plot(df_mod[''realdpi''])

    plot_acf(np.diff(df_mod[''realdpi''], n=1), alpha=0.05, lags=50, ax=ax[1,0])

    ```'

  md: '# # 4 Parametric Tests


    In the previous chapter, we introduced the concept of a hypothesis test and showed
    several applications of the z-test. The z-test is a type of hypothesis test in
    a family of hypothesis tests called parametric tests. Parametric tests are powerful
    hypothesis tests, but the application of parametric tests requires certain assumptions
    to be met by the data. While the z-test is a useful test, it is limited by the
    required assumptions. In this chapter, we will discuss several more parametric
    tests, which will expand our parametric tool set. More specifically, we will discuss
    the various applications of the t-test, how to perform tests when more than two
    subgroups of data are present, and the hypothesis test for Pearson''s correlation
    coefficient. We will complete the chapter with a discussion on power analysis
    for parametric tests.


    In this chapter, we''re going to cover the following main topics:


    +   - Assumptions of **parametric tests**

    - **T-test**—a parametric hypothesis test

    - Tests with more than two groups and **analysis of variance (ANOVA)**

    - **Pearson''s correlation coefficient**

    - **Power analysis** examples


    # ## Assumptions of parametric tests


    Parametric tests make assumptions about population data that require the statistics
    practitioner to perform analysis of data prior to modeling, especially when using
    sample data because the sample statistics are leveraged as estimates for the population
    parameters when the true population parameters are unknown. These are the three
    primary assumptions of parametric hypothesis tests:


    +   - Normally distributed population data

    - Samples are independent

    - Equal population variances (when comparing two or more groups)'
  merge: -1
  pgno: 107
- img_proc: true
  md: 'In this chapter, we discuss the z-test, t-test, ANOVA, and Pearson’s correlation.
    These tests are used on continuous data. In addition to these assumptions, Pearson’s
    correlation requires data to contain paired samples. In other words, there must
    be an equal number of samples in each group being compared as Pearson’s correlation
    is based on pairwise comparisons.


    While these assumptions are ideal, there are many occasions where these cannot
    be ensured. Consequently, it is useful to understand there is some robustness
    to these assumptions, depending on the test.


    # Normally distributed population data


    Because in parametric hypothesis tests we are interested in gaining inferences
    about population parameters, such as the mean or standard deviation, we must assume
    the parameter of choice is representative of the distribution and that it is safe
    to assume a central tendency in the data. We must also assume the statistic (parametric
    value taken from a sample or sampling distribution) is representative of its respective
    population parameter. Therefore, since we assume in parametric hypothesis tests
    that the population is normally distributed, the sample should also be normally
    distributed as well. Otherwise, it is not safe to assume the sample is representative
    of the population.


    Parametric hypothesis tests rely heavily on the mean and assume it is strongly
    representative of the data’s central point (all population data is centrally distributed
    around the mean). Consider where the means of two distributions are being compared
    to test if there is a statistically significant difference between them. If the
    distributions are skewed, the mean will not be the center point of the data and,
    consequently, cannot represent the distributions very well. Since this would be
    the case, inference obtained from a test comparing the means would not be reliable.


    # Robustness to normally distributed data


    Many hypothesis tests specify degrees of freedom when using samples to make estimates
    about populations. Degrees of freedom force models to assume there is extra variance
    in the distributions used than actually present. While the statistical parameters
    in the analysis remain the same, the assumed extra variance forces measures of
    central tendency closer. Stated differently, using degrees of freedom forces measures
    of central tendency to be more centrally representative of the distributions from
    which they are calculated. The reason for this is that it is assumed samples—while
    representative of their overall populations—represent their populations with a
    margin of error. Consequently, parametric hypothesis tests using degrees of freedom
    have some robustness to violations of the requirement for normally distributed
    data.


    In the plots shown in Figure 4.1, we have a slightly skewed distribution. One
    applies degrees of freedom while the other does not. We can see the mean and median
    have the same distance between them whether degrees of freedom are used or not.
    However, the distribution using degrees of freedom takes on more errors (more
    variance):'

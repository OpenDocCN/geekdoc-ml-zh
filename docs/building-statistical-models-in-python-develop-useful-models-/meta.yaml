  md: "An example of quartiles is shown as follows. Like the median, quartiles are\
    \ robust to outliers so long as the outliers are a small percentage of the dataset.\
    \ Note that the middle quartile is, in fact, the median. An adjusted range measurement\
    \ that is less sensitive to outliers than the normal range discussed in the *Range*\
    \ section is the middle quartile, the **interquartile range** (IQR). The IQR is\
    \ the difference between the upper and lower quartiles (Q3 - Q1). While this range\
    \ is less sensitive to outliers, it only contains 50% of the data. Thus, making\
    \ the interquartile range likely to be *less representative of the total variation*\
    \ of the data.\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_54_0.png)\n\nWe can\
    \ calculate the quartiles and IQR range using `numpy` and `scipy`. In the following\
    \ code example, we use the `quantiles` function to calculate the quartiles. We\
    \ will not discuss `quantiles` here, other than to mention that `quantiles` are\
    \ a generalization where the data can be split into any number of equal parts.\
    \ Since we are splitting the data into four equal parts for quartiles, the `quantiles`\
    \ values used for the calculation are 0.25, 0.5, and 0.75. Quartiles Q1 and Q3\
    \ could then be used to calculate the IQR. However, we could also use the `iqr`\
    \ function from `scipy` to make the calculation:\n\n```\npython\nimport numpy\
    \ as np\nfrom scipy import stats\nvalues = [85, 99, 70, 71, 86, 88, 94]\nquartiles\
    \ = np.quantile(values, [0.25, 0.5, 0.75],\n    method=\"closest_observation\"\
    )\nprint(f\"The quartiles are Q1: {quartiles[0]},\n    Q2: {quartiles[1]}, Q3:\
    \ {quartiles[2]}\")\niqr = stats.iqr(values,interpolation='closest_observation')\n\
    print(f\"The interquartile range is {iqr}\")\n# The quartiles are Q1: 71, Q2:\
    \ 85, Q3: 88\n# The interquartile range is 17\n```"

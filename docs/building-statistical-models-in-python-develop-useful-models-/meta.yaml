  md: '# Step 5 – testing the forecast


    It is important to note that the prediction for the VAR model is actually quite
    stable compared to the long-running historical performance. The reason we see
    such extreme differences at the end of the forecast is that this time period corresponds
    to the **Great Recession**, which lasted from 2007 to 2009. The last five points
    in our test forecast correspond to the last two quarters of 2008 and the first
    three quarters of 2009:


    ```

    df_pred = results.get_prediction(start=195, end=200).summary_frame(alpha=0.05)

    fig, ax = plt.subplots(1,1,figsize=(20,5))

    ax.plot(data_1d[''realinv''], marker=''o'', markersize=5)

    ax.plot(df_pred[''mean''], marker=''o'', markersize=4)

    ax.plot(df_pred[''mean_ci_lower''], color=''g'')

    ax.plot(df_pred[''mean_ci_upper''], color=''g'')

    ax.fill_between(df_pred.index, df_pred[''mean_ci_lower''], df_pred[''mean_ci_upper''],
    color=''g'', alpha=0.1)

    ax.set_title(''Test Forecast for VAR(1)'')

    ```


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_366_0.png)


    Figure 12.16 – Test forecast for VARMAX with p=1


    We can compare our forecast (*mean*) to actuals (*realinv*) for the investment
    variable, as follows:


    ```

    pd.concat([df_pred,data_1d[''realinv''].iloc[195:]], axis=1)

    ```'

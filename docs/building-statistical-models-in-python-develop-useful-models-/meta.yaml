  - '[PAGE 355]


    # VAR modeling


    The AR(p), MA(q), ARMA(p,q), ARIMA(p,d,q)m, and SARIMA(p,d,q) models we looked
    at in the last chapter form the basis of multivariate VAR modeling. In this chapter,
    we have discussed ARIMA with exogenous variables (ARIMAX). We will now begin discussion
    on the VAR model. First, it is important to understand that while **ARIMAX requires
    leading (future) values of the exogenous variables, no future values of these
    variables are required for the VAR model** as they are all autoregressive to each
    other – hence the name vector autoregressive – and by definition not exogenous.
    To start, let us consider the two-variable, or bivariate, case. Consider a process
    $y_t$ that is the output of two different input variables, $y_{t1}$ and $y_{t2}$.
    Note that in matrix form, we are discussing the case of an $n \times m$ matrix
    ($y_{n,m}$) where $n$ corresponds to the point in time and $m$ corresponds to
    the **variables** involved (variables 1,2,…,$m$). We exclude the comma from notation
    going forward, but it is important to understand when we discuss multivariate
    autoregressive processes that we are discussing data within a multidimensional
    matrix rather than only the single-dimensional vector form we used for univariate
    time-series analysis. We can write our process, $y_t$, in vector notation as follows:


    $$y_t = \begin{bmatrix} y_{t1} \ y_{t2} \end{bmatrix}.$$


    We can expand on the input variables'' definitions as a VAR(1) process, here,
    for the two variables in $y_t$ shown previously:


    $$y_{t1} = (1 - \phi_{11})\mu_1 - \phi_{12}\mu_2 + \phi_{11}y_{t-11} + \phi_{12}y_{t-12}
    + \varepsilon_{t1}$$

    $$y_{t2} = -\phi_{21}\mu_1 + (1 - \phi_{22})\mu_2 + \phi_{21}y_{t-11} + \phi_{22}y_{t-12}
    + \varepsilon_{t2}.$$


    The terms $(1 - \phi_{11})\mu_1 - \phi_{12}\mu_2$ and $-\phi_{21}\mu_1 - (1 -
    \phi_{22})\mu_2$ are our **model constants** ($\beta$ coefficients).


    We can reduce the previous processes (using a zero-mean form) into the matrix-reduced
    form, like so:


    $$y_t = \Phi_1 y_{t-1} + \varepsilon_t$$


    Here, we have the following:


    $$\Phi_1 = \begin{bmatrix} \phi_{11} & \phi_{12} \ \phi_{21} & \phi_{22} \end{bmatrix}$$


    Our forecast for a VAR(1) model is shown here:


    $$\hat{y}_{t_0,1}(l) = (1 - \phi_{11})\bar{y}_1 - \phi_{12}\bar{y}_2 + \phi_{11}\hat{y}_{t_0,1}(l-1)
    + \phi_{12}\hat{y}_{t_0,2}(l-1)$$

    $$\hat{y}_{t_0,2}(l) = -\phi_{21}\bar{y}_1 + (1 - \phi_{22})\bar{y}_2 + \phi_{21}\hat{y}_{t_0,1}(l-1)
    + \phi_{22}\hat{y}_{t_0,2}(l-1)$$'
  - '[PAGE 356]


    It also includes this:


    $$\hat{y}_{t_0}(l) = \begin{bmatrix} \hat{y}_{t_0,1}(l) \ \hat{y}_{t_0,2}(l) \end{bmatrix}$$


    Here, $l$ represents the forward lag ($t+1, t+2, ..., t+n$), $\hat{y}_{t,m}$ represents
    the forecasted value at time $t$ for variable $m$, and $t_0$ corresponds to the
    most recent point in time (often, the length of the data). It is also important
    to note the $m \times m$ covariance matrix is this:


    $$\hat{\Gamma}(k) = \begin{bmatrix} \hat{\gamma}_{11}(k) & \cdots & \hat{\gamma}_{1m}(k)
    \ \vdots & \ddots & \vdots \ \hat{\gamma}_{m1}(k) & \cdots & \hat{\gamma}_{mm}(k)
    \end{bmatrix}$$


    Here, each covariance, $\hat{\gamma}_{ij}(k)$, with $k$ corresponding to the lag,
    is calculated as follows:


    $$\hat{\gamma}_{ij}(k) = \frac{1}{n} \sum_{t=1}^{n-k} (y_{ti} - \bar{y}_i)(y_{t+k,j}
    - \bar{y}_j).$$


    Our estimated cross-correlation between each variable $y_{ti}$ and $y_{tj}$ is
    therefore calculated as follows:


    $$\hat{\rho}_{ij}(k) = \frac{\hat{\gamma}_{ij}(k)}{\sqrt{\hat{\gamma}_{ii}(0)
    \hat{\gamma}_{jj}(0)}}$$


    Understanding the calculations for cross-correlation and, especially, covariance
    helps with understanding the relationships between the variables and their impact
    on model fit. The method for combining the two models to generate one overall
    process forecast, $\hat{y}_t$, is through weighting the two input means and their
    correlations into one response. As we can see in our VAR(1) forecast, shown previously,
    the correlations between each given variable and the other variables across different
    points in time are able to be modeled using a VAR model. Notably, there are no
    truly independent and dependent variables in a VAR model; there is simply an interaction
    between each variable. It is important to note that all processes modeled with
    a VAR model should be **stationary**.


    Using the *United States Macroeconomic* dataset found at https://www.statsmodels.org/dev/datasets/generated/macrodata.html,
    we can observe the relationship between real gross private domestic investment
    (`realinv`), real personal consumption expenditures (`realcons`), and real private
    disposable income (`realdpi`) with a zero-mean form in the context of VAR modeling,
    as follows:


    $$realcons(t) = \phi_{11} realcons_{t-11} + \phi_{12} realinv_{t-12} + \phi_{13}
    realdpi_{t-13} + \varepsilon_{t1}$$

    $$realinv(t) = \phi_{21} realcons_{t-11} + \phi_{22} realinv_{t-12} + \phi_{23}
    realdpi_{t-13} + \varepsilon_{t2}$$

    $$realdpi(t) = \phi_{31} realcons_{t-11} + \phi_{32} realinv_{t-12} + \phi_{33}
    realdpi_{t-13} + \varepsilon_{t3}$$'

    \n通过变换，我们可以看到变换后的直方图比原始直方图更接近正态分布。在这个例子中，似乎最好的变换是立方根变换。对于真实世界的数据，确定是否需要变换以及如果需要，应该使用哪种变换，这一点很重要。\n\
    \n其他数据变换方法，例如查找重复数据、处理缺失值和特征缩放，将在后续章节的Python实践案例中讨论。\n\n## 总结\n\n在本章的第一节中，我们学习了数据类型以及如何可视化这些类型的数据。然后，我们介绍了如何描述和度量数据分布的属性。我们学习了标准正态分布、它的重要性，以及中心极限定理如何通过演示自助法在实践中应用。我们还学习了自助法如何利用非正态分布的数据，通过置信区间来检验假设。接下来，我们介绍了排列和组合的数学知识，并引入了置换检验作为自助法之外的另一种非参数检验。最后，我们以不同的数据变换方法结束了本章，这些方法在许多需要正态分布数据进行统计检验的情况下非常有用。\n\

    beta\\|_2^2 + \\lambda \\|\\beta\\|_2^2$$\n\nwhere RSS = $\\|y - X\\beta\\|_2^2$,\
    \ $\\|\\beta\\|_2^2$ is the squared $L^2$ **norm** (Euclidean norm) of the regression\
    \ coefficients array, and $X$ is the design matrix. Further simplification brings\

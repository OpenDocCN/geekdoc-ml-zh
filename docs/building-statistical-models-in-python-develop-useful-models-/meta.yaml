    \                          event_observed_A=data.loc[data['transplant']==0]['event'],\n\
    \                          event_observed_B=data.loc[data['transplant']==1]['event'])\n\
    ```\n\nWe can see the Chi-Square distribution is used:\n\n```\nprint(lr_results.null_distribution)\n\

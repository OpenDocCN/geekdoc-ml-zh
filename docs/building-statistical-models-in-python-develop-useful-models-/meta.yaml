    # Independent samples


    In parametric hypothesis testing, the independence of samples is another important
    assumption. Two effects can occur from non-independent sampling. One effect occurs
    when subgroup sampling is performed. The issue here is that responses in one subgroup
    of the population may be different than responses from another subgroup of the
    same population or even more similar to those of a different population. However,
    when sampling representative of the overall population is taken, this type of
    subgroup difference may not be very representative of the population.


    Another effect of non-independent sampling is when samples are taken close enough
    together in time that the occurrence of one precludes or excludes the occurrence
    of another. This is called serial (or auto-) correlation.


    Parametric tests are not typically robust to violations of this requirement as
    it has direct, categorical implications on the interpretability of test outcomes.
    With respect to subgroup sampling, this can be prevented through a well-structured
    sampling approach such as those outlined in *Chapter 1, Sampling and Generalization*.
    However, as regards the serial effect, we can test for autoregressive correlation
    (also called serial correlation) in the data.'
  - "[PAGE 118]\n\n# Durbin-Watson\n\nOne of the most common tests performed to assess\
    \ a lack of independence in sampling is the first-order (also referred to as lag-one)\
    \ autoregressive test called the **Durbin-Watson** test. **Autoregressive** means\
    \ previous data points are used to predict the current data point. First-order\
    \ means the last sampled data point (lag one) is the point most significantly\
    \ correlated to the most recently sampled data point (lag zero) in a sequence\
    \ of sampled data. In first-order autocorrelation, the correlation for each data\
    \ point is strongest with the previous data point. The Durbin-Watson test does\
    \ not test whether any value is correlated to the value before it, but instead\
    \ if, overall, there is a strong enough relationship between each value and the\
    \ value before it to conclude there is significant autocorrelation. In that sense,\
    \ there is some robustness to non-independent sampling such that an accident or\
    \ two may not completely invalidate a hypothesis test, but a consistent recurrence\
    \ of this type of violation will.\n\nA Durbin-Watson value of 2 indicates no significant\
    \ autocorrelation, a value between 0 and 2 represents positive (direct) autocorrelation,\
    \ and a value between 2 and 4 represents negative (inverse) autocorrelation.\n\
    \nIn the following example, we have two distributions, each with 1,000 samples.\
    \ The distribution on the left is a sinusoidal distribution that exhibits strong\
    \ autoregressive correlation, and the distribution on the right is a set of randomly\
    \ generated data displaying as white-noise variance (random points centered around\
    \ a mean of 0). Using the `durbin_watson()` function from the `statsmodels.stats`\
    \ module, we are able to confirm direct, positive lag-one autocorrelation in the\
    \ sinusoidal pattern (a very small Durbin-Watson value) and a Durbin-Watson statistic\
    \ of 2.1 with the random noise, indicating no autocorrelation. Therefore, in *Figure\
    \ 4.7*, the plot on the left is not composed of independent samples whereas the\
    \ plot on the right is:\n\n```\nfrom statsmodels.stats.stattools import durbin_watson\n\
    import matplotlib.pyplot as plt\nimport numpy as np\nmu, sigma = 0, 1.1\nindependent_samples\
    \ = np.random.normal(mu, sigma, 1000)\ncorrelated_samples = np.linspace(-np.pi,\
    \ np.pi, num=1000)\nfig, ax = plt.subplots(1,2, figsize=(10,5))\nax[0].plot(correlated_samples,\
    \ np.sin(correlated_samples))\nax[0].set_title('Durbin Watson = {}'.format(\n\
    \    durbin_watson(correlated_samples)))\nax[1].plot(independent_samples)\nax[1].set_title('Durbin\
    \ Watson = {}'.format(\n    durbin_watson(independent_samples)))\n```"
- md: "## Equal population variance\n\nSimilar to the assumption of normally distributed\
    \ data, the assumption of equal population variance—also referred to as homogeneity\
    \ of variance—is about the shape of the physical properties of the distributions\
    \ being compared. Assuming equal population variance helps increase the power\
    \ of a parametric test. This is because there is confidence when means are identified\
    \ as being different; we also know the degree of potential distribution overlap.\
    \ When a test has an intuition about the location of the full distributions—in\
    \ effect, true knowledge of the effect size—power increases. Conversely, as variances\
    \ diverge, power decreases.\n\n## Robustness to equal population variance\n\n\
    While equal population variance is useful in parametric testing, modifications\
    \ to these tests exist that help results be robust to deviance from equal variance.\
    \ One prominent modified version of these tests uses the **Welch-Satterthwaite**\
    \ adjustment to the degrees of freedom used. Because applying the same degree\
    \ of freedom to each group when each group has a different variance would result\
    \ in a misrepresentation of the data, the Welch-Satterthwaite adjustment accounts\
    \ for variance differences when allocating degrees of freedom to parametric tests\
    \ that assume equal variance. Two common tests that use the Welch-Satterthwaite\
    \ adjustment are Welch's t-test and Welch's ANOVA test. When used on small samples,\
    \ these tests may not be reliable, but when used on sample sizes large enough\
    \ to have sufficient power, the results should be approximately the same as their\
    \ non-Welch counterparts.\n\n## Testing for equal variance\n\nWhen testing for\
    \ equal variance among distributions, we have two prominent tests: **Levene's\
    \ test for equality of variances** and **Fisher's F-test**.\n\n## Levene's test\
    \ for equality of variances\n\nLevene's test for equality of variances is useful\
    \ when testing for homogeneity of variance of two or more groups. In the code\
    \ snippet shown below *Figure 4.8*, we test with three distributions, each having\
    \ a sample size of 100, a mean of 0, and standard deviations of 0.9, 1.1, and\
    \ 2. *Figure 4.8* is a plot of the three distributions generated using the data\
    \ output from the code above *Figure 4.8*.\n\n```python\nfrom scipy.stats import\
    \ levene\nnp.random.seed(26)\nmu1, sigma1, mu2, sigma2, mu3, sigma3 = 0, 0.9,\
    \ 0, 1.1, 0, 2\ndistro1, distro2, distro3 = pd.DataFrame(), pd.DataFrame(), pd.DataFrame()\n\
    distro1['x'] = np.random.normal(mu1, sigma1, 100)\ndistro2['x'] = np.random.normal(mu2,\
    \ sigma2, 100)\ndistro3['x'] = np.random.normal(mu3, sigma3, 100)\n```\n\nWe can\
    \ see how their different standard deviations impact their range.\n\nWe can see\
    \ the test is sensitive to violations of non-homogenous variance because the result\
    \ of this is a statistically significant p-value indicating non-homogenous variance:\n\
    \n```python\nf_statistic, p_value = levene(distro1['x'], distro2['x'], distro3['x'])\n\
    if p_value <= 0.05:\n    print('The distributions do not have homogenous variance.\
    \ P-value = %.4f, F-statistic = %.4f' % (p_value, f_statistic))\nelse:\n    print('The\
    \ distributions have homogenous variance. P-value = %.4f, F-statistic = %.4f'\
    \ % (p_value, f_statistic))\n```\n\nThis is the output:\n\nThe distributions do\
    \ not have homogenous variance. P-value = 0.0000\n\n## Fisher’s F-test\n\nFisher’s\
    \ F-test is useful when testing for homogeneity of variance for two groups at\
    \ a time. This test compares a test statistic to a critical value to determine\
    \ whether the variances are statistically the same or not. The calculated F-statistic\
    \ is the variance of group one divided by the variance of group two. Group one\
    \ is always the group with the larger variance. Using the preceding data, let\
    \ us compare distribution 1 with distribution 3. Distribution 3 has a larger variance\
    \ of 2, so that group’s variance will be the numerator when calculating the F-statistic.\
    \ Since each group has a sample size of 100, their degrees of freedom for the\
    \ table lookup will each be 99. However, since we will use the `scipy` Python\
    \ package to compute the test, here, the table lookup is not needed as `scipy`\
    \ does this for us with the `f.cdf()` function. In line with the results of the\
    \ Levene test, the F-test indicates distribution 1 and distribution 3 do not have\
    \ homogenous variance:\n\n```python\nfrom scipy.stats import f\ndef f_test(inputA,\
    \ inputB):\n    group1 = np.array(inputA)\n    group2 = np.array(inputB)\n   \
    \ if np.var(group1) > np.var(group2):\n        f_statistic = np.var(group1) /\
    \ np.var(group2)\n        numeratorDegreesOfFreedom = group1.shape[0] - 1\n  \
    \      denominatorDegreesOfFreedom = group2.shape[0] - 1\n    else:\n        f_statistic\
    \ = np.var(group2)/np.var(group1)\n        numeratorDegreesOfFreedom = group2.shape[0]\
    \ - 1\n        denominatorDegreesOfFreedom = group1.shape[0] - 1\n    p_value\
    \ = 1 - f.cdf(f_statistic, numeratorDegreesOfFreedom, denominatorDegreesOfFreedom)\n\

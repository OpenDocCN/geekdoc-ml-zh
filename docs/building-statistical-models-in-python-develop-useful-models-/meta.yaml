    # Resampling


    **Resampling** is a method to deal with time frequency. We use this method to
    change time series data frequency by a new time frequency. There are **upsampling**
    and **downsampling**. In upsampling, the *frequency of the samples is increased*
    using interpolation, for instance, from day frequency to minute or second frequency.
    On the other hand, downsampling is used to *decrease the sample time frequency*
    using summary statistics to aggregate the current time frequency in a dataset
    to a new time frequency. Resampling can be used in feature engineering and also
    used for problem framing when time frequency in the dataset is not available for
    our analysis purposes. In Python, we can use the `resample()` function to change
    time frequencies. The following code illustrates the resampling technique in Python:


    ```

    fig, ax = plt.subplots(4,1, figsize=(12,8))

    ax[0].set_title(''Original stock price from 2016'')

    ax[0].plot(data)

    ax[1].plot(data.resample(''7D'').mean())

    ax[1].set_title(''7 days - Downsampling stock price from 2016'')

    ax[2].plot(data.resample(''M'').mean())

    ax[2].set_title(''Monthly Downsampling stock price from 2016'')

    ax[3].plot(data.resample(''Y'').mean())

    ax[3].set_title(''Yearly Downsampling stock price from 2016'')

    fig.tight_layout(pad=5.0)

    plt.show()

    ```'

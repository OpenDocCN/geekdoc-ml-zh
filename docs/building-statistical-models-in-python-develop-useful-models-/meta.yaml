  - "[PAGE 130]\n\nWe choose the level of significance α=0.05. We use the `statsmodels.stats.weightstats.ttest_ind`\
    \ function to conduct the t-test. The documentation can be found here: https://www.statsmodels.org/dev/generated/statsmodels.stats.weightstats.ttest_ind.html.\n\
    \nWe can use this function to perform three forms of the alternate hypothesis\
    \ with `alternative='two-sided'`, `'larger'`, or `'smaller'`. In the pooled-variance\
    \ t-test, when the assumption for equal variances is satisfied, the test statistic\
    \ is computed as follows:\n\n$$t = \\frac{(\\bar{x}_1 - \\bar{x}_2) - (\\mu_1\
    \ - \\mu_2)}{s_p \\sqrt{\\frac{1}{n_1} + \\frac{1}{n_2}}}$$\n\nHere, $\\bar{x}_1,\
    \ \\bar{x}_2, \\mu_1, \\mu_2, n_1, \\text{and } n_2$ are sample means, population\
    \ means, and sample sizes of two samples, 1 and 2 respectively, and the pooled\
    \ standard deviation is given here:\n\n$$s_p = \\sqrt{\\frac{(n_1 - 1)s_1^2 +\
    \ (n_2 - 1)s_2^2}{n_1 + n_2 - 2}}$$\n\nThe degree of freedom is shown here:\n\n\
    $$df = n_1 + n_2 - 2.$$\n\nLet's go back to the example:\n\n```\nfrom statsmodels.stats.weightstats\
    \ import ttest_ind as ttest\nt_statistic, p_value, degree_freedom = ttest(IQscoresA,\n\
    \    IQscoresB, alternative='two-sided', usevar='pooled')\n```\n\nThe output returns\
    \ the test statistic 3.78 and the p-value 0.00037, and the degrees of freedom\
    \ used in the t-test are 58 (each sample size has 30 observations, then the degrees\
    \ of freedom are calculated as 30 + 30 - 2 = 58).\n\nBecause the p-value <0.05,\
    \ we reject the null hypothesis. There is sufficient evidence to suggest that\
    \ there is a difference in mean IQ score between students at high schools A and\
    \ B. To perform the confidence level, you can adapt the Python code in the last\
    \ part of the one-sample t-test.\n\nRecall that in some situations, if the histograms\
    \ and QQ plots show some evidence of skewness, we can consider testing the medians\
    \ instead of the means for hypothesis testing. As shown in *Chapter 2, Distributions\
    \ of Data*, we can perform a data transformation (for example, log transformation)\
    \ to obtain the normality assumption. After the transformation, the median of\
    \ `log(data)` is equal to the mean of `log(data)`. This means that the test is\
    \ performed on means of the transformed data."

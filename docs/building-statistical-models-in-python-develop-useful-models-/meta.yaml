    # Moving average (MA) models


    # The MA(q) model


    Whereas the AR(p) model is a direct function of the correlation between lag zero
    and specific individual lags of order p over time, the moving average model of
    order q, MA(q), is a function of autocorrelation between lag zero and all previous
    lags included in order q. It acts as a low-pass filter that models errors to provide
    a useful fit to data.


    Let us take a process, $y_t$, that has a mean of zero and a random, normally distributed
    white noise component, $\epsilon_t$, where $t = \pm 1, \pm 2, ...$ If we can write
    this process as


    $$y_t - \mu = \epsilon_t - \Theta_1 \epsilon_{t-1} - ... - \Theta_q \epsilon_{t-q}$$


    and $\Theta_1, \Theta_2, ..., \Theta_q$ are real constants and $\Theta_q \neq
    0$, then we can call this a moving average process having order q, or MA(q). In
    backshift operator notation, we have the following:


    $$y_t - \mu = (1 - \Theta_1 B - ... - \Theta_q B^q) \epsilon_t$$'
- md: 'We can define the autocorrelations ($\rho_k$) for the MA(q) model thusly:


    $$\rho_k = \frac{-\Theta_k + \sum_{j=1}^{q-k} \Theta_j \Theta_{j+k}}{1 + \sum_{j=1}^q
    \Theta_j^2}$$


    For all lags $k$ in $1,2,\dots,q$. Where $k > q$, we have $\rho_k = 0$.


    When discussing the AR(p) models, we explained how the roots of the AR model must
    be outside the unit circle. When considering MA(q) models, we have the concept
    of invertibility. **Invertibility** essentially ensures a *logical and stable
    correlation with the past*. Typically, this means the current point in time is
    more closely related to nearby points in the past than those more distant. The
    inability to model a process using invertible roots means we cannot ensure our
    model provides a unique solution for the set of model autocorrelations. If points
    in the distant past are more relevant to the current point than those nearby,
    we have a randomness in the process that cannot be reliably modeled or forecasted.


    > **Identifying MA(q) model invertibility**


    For a moving average model to be invertible, all roots must be outside the unit
    circle and non-imaginary; *all roots must be greater than 1*. For an MA(1) process,
    it is invertible when $|\Theta_1| < 1$. An invertible MA(q) process is equivalent
    to an infinite-order, converging AR(p). An AR(p) model converges if its coefficients
    converge to zero as lags k approach p. If an MA(q) is invertible, we can say $y_t
    = \Theta(B)\epsilon_t$ and $\Theta^{-1}(B)y_t = \epsilon_t$ [1].


    ## The MA(1) model


    For an MA(q) model of order 1, we have the following process:


    $$\rho_0 = 1$$


    $$\rho_1 = \frac{\Theta_1}{1 + \Theta_1^2}$$


    $$\rho_{k>1} = 0$$


    For a MA(q) model with zero autocorrelation, the pattern of whose process we are
    attempting to model is random, normally distributed white noise variance, which
    can – at best – only be modeled by its mean. It is important to note that as $\Theta_1
    \rightarrow 0$, $\rho_1 \rightarrow 0$ and for an MA(1) process, this means the
    process can be approximated by white noise.


    Let us consider the following MA(1) zero-mean model following the form $y_t -
    \mu = \epsilon_t - \Theta_1 \epsilon_{t-1}$:


    $$y_t - 0 = a_t - 0.8 \epsilon_{t-1}$$


    In backshift notation we have the following:


    $$y_t = (1 - 0.8B)\epsilon_t$$


    We know this process is invertible because $|\Theta_1| < 1$. Let us confirm this
    with Python using the ArmaProcess function from the statsmodels tsa module:


    ```python

    from statsmodels.graphics.tsaplots import plot_acf, plot_pacf

    import matplotlib.pyplot as plt

    import statsmodels.api as sm

    import numpy as np

    maparams = np.array([0.8])

    ma = np.r_[1, -maparams]

    ma_process = sm.tsa.ArmaProcess(ma=ma)

    print(''MA(1) Roots: '', ma_process.maroots)

    print(''MA(1) Invertibility: '', ma_process.isinvertible)

    ```


    MA(1) Roots: [1.25]


    MA(1) Invertibility: True


    Contrary to the AR(p) model, the MA(q) model''s order is identified using the
    ACF plot. Because the ACF does not control for lags and is a composite autocorrelation
    measure across all lags up to the lag whose autocorrelation measure is considered,
    the function is used to identify the relevant lag order for the moving average
    component. In Figure 11.9, we can see the significant correlation at lag 1 for
    our MA(1) process. There are two additional significant correlations at lags 6
    and 7, but using lags this far out typically results in overfitting, especially
    when taken alongside the fact that lags 2 through 5 are not significant at the
    5% level of significance:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_305_0.png)


    ### Dampening ACFs and PACFs


    For an invertible moving average model, we can observe that the ACF will cut off
    at the order of significance, but the PACF will typically continue and dampen
    *overall* to statistical zero over time. It is not necessarily expected to happen
    smoothly and all at once as all data sets are different, but it is expected that
    over time, more and more lags will dampen to zero. We explain the reason for this
    behavior from the ACFs and PACFs in the ARMA section of this chapter, but it is
    worth noting this is to be expected for invertible processes. Conversely, stationary
    autoregressive processes are expected to cut off at the order of significance
    in the PACF plots while the ACFs dampen to zero over time.


    ## The MA(2) model


    For an MA(q) model of order 2, we have this:


    $$\rho_0 = 1$$

    $$\rho_1 = \frac{-\Theta_1 + \Theta_1 \Theta_2}{1 + \Theta_1^2 + \Theta_2^2}$$

    $$\rho_2 = \frac{-\Theta_2}{1 + \Theta_1^2 + \Theta_2^2}$$

    $$\rho_{k>2} = 0$$


    The following is an MA(2) example we will look at:


    $$y_t = (1 - 1.6B + 0.9B^2)\epsilon_t$$


    Using the model''s polynomial in the quadratic equation form, we can find the
    approximate roots using the quadratic formula:


    $$0.888 \pm 0.567i$$


    Because we have two complex conjugate roots, we can take the same $L^2$ norm we
    did for the AR(p) process, using the form of $a \pm bi$:


    $$\sqrt{0.888^2 + 0.567^2} \approx 1.054$$


    Because 1.054 is greater than 1, we can confirm the MA(2) has invertible roots
    and is thus capable of producing a unique solution and a model whose values are
    logically serially correlated to past values. Let us perform the same analysis
    in Python:


    ```python

    maparams = np.array([1.6, -0.9])

    ma = np.r_[1, -maparams]

    ma_process = sm.tsa.ArmaProcess(ma=ma)

    print(''MA(2) Roots: '', ma_process.maroots)

    print(''MA(2) Invertibility: '', ma_process.isinvertible)

    ```


    The output we see highlighted in green confirms our calculated findings and the
    fact that since the magnitude of the complex conjugate roots is greater than 0,
    we have an invertible MA(2) process:


    ```

    MA(2) Roots:  [0.88888889-0.56655772j 0.88888889+0.56655772j]

    MA(2) Invertibility:  True

    ```


    We can see in the ACF in *Figure 11.10* that this is a second-order moving average
    process:


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_307_0.png)


    The process and code for identifying model ordering, building the model, and generating
    a forecast are the same for the MA(q) model as it is for the AR(p) model. We have
    discussed that the order selection based on visual inspection for the MA(q) is
    performed using the ACF, whereas for the AR(p) this is done using the PACF, and
    that it is the only major difference in the process between the two models. Aside
    from that, `enforce_invertibility` should be set to equal True for MA(q) models
    in place of `enforce_stationarity=True`. Providing a `max_ar` or `max_ma` order
    higher or lower than useful in the `arma_order_select_ic` function may result
    in a *convergence warning* or an *invertibility warning*. One reason for these
    warnings is there was a higher order provided than possible to fit (such as when
    there is no order possible). Another reason is the presence of a **unit root**.
    If there is an apparent trend in the data, it *must be removed* before modeling.
    If there is no trend, it is possible to receive this error due to seasonality
    in the data, which presents a different order of unit root. We will discuss modeling
    in the case of unit roots associated with trend and seasonality in the ARIMA and
    seasonal ARIMA section of this chapter. It is also worth specifying that the Dickey-Fuller
    test can be used for moving average data since moving average processes can be
    influenced by trends.


    ## Autoregressive moving average (ARMA) models


    In the autoregressive model section, we discussed how an AR(p) model is used to
    model process output values using autocorrelation controlling for individual lags.
    The goal of the AR(p) model is to estimate exact values for points corresponding
    to lags in the future using the values for the same specific lags in the context
    of a past horizon. For example, the value at two points in the future is strongly
    correlated with the value at two points in the past. In the moving average model
    section, we discussed how MA(q) models act as low-pass filters that help a model
    explain noise in a process. Rather than seeking to model exact points, we use
    the MA(q) to model variance around the process.


    Consider an example of a four-cylinder car engine that produces constant output.
    Let us assume we have a worn-down motor mount near the fourth cylinder. We can
    expect consistent output vibration related to each cylinder firing, but the vibration
    will increase slightly for each stroke that is closer to the worn motor mount.
    Using an AR-only model would assume each cylinder vibrates a certain amount and
    able to account for that, but we would be missing information. Adding a MA component
    would be able to model the fact that starting at cylinder one, each subsequent
    stroke up through cylinder four will have additional vibration related to the
    worn motor mount and thus explain much more of the overall process. This would
    reasonably be an ARMA(4,4) model. Suppose we replace the worn-down motor mount
    with a mount of equal wear compared to the other mounts; we would then have an
    ARMA(4,0) (or AR(4)) process.


    In many cases, we find we have significant peaks in both autocorrelation and partial
    autocorrelation. Rather than using only MA(q) or AR(p) modeling, respectively,
    we can combine the two. This combination, represented as an ARMA(p,q), enables
    us to model the process as well as any noise component around the process that
    may correlate to specific lags. Because an ARMA(p,q) typically has fewer parameters
    (lower order) for each AR and MA component than AR or MA models do, the ARMA is
    considered a **parsimonious model**, which is a model that uses as few explanatory
    variables (in this case, time lags) as possible to achieve the desired level of
    performance. When $y_t$ is an invertible and stationary process, we can define
    it as an ARMA(p,q):


    $$y_t - \mu = \Phi_1(y_{t-1} - \mu) - \dots - \Phi_p(y_{t-p} - \mu) = \epsilon_t
    - \Theta_1 \epsilon_{t-1} - \dots - \Theta_q \epsilon_{t-q}$$


    Where $\Phi_p \neq 0$ and $\Theta_q \neq 0$, we can re-write the equation for
    ARMA(p,q) in backshift operator notation:


    $$\Phi(B)(y_t - \mu) = \Theta(B) \epsilon_t$$


    Practically speaking, we can expect that for an invertible moving average process,
    we see significant lags in the ACF up to the magnitude of the order $q$, but then
    the PACF will taper off thereafter, typically in lags beyond the order of the
    moving average process identified in the ACF. This is because a finite moving
    average process can be represented as an infinite-order autoregressive process.
    Conversely, because the moving average process that has this behavior is invertible,
    the inverse must also be true; that a finite autoregressive process can be represented
    as an infinite-order moving average process. Therefore, the PACF will dampen to
    zero for an invertible moving average process, and for a stationary autoregressive
    process, the ACF will dampen to zero. Because invertibility is a requirement of
    an ARMA process, it allows us to re-write the equation as an infinite-order MA
    process in general linear form:


    $$y_t = \Phi^{-1}(B)\Theta(B) \epsilon_t$$


    It also allows us to do so as an infinite-order AR process:


    $$\Theta^{-1}(B)\Phi(B) y_t = \epsilon_t$$'

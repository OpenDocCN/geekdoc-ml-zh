- img_proc: true
  md: '# Seasonal ARIMA models


    Let''s look at another characteristic of time series called **seasonality**. Seasonality
    is the presence of a pattern in a time series that repeats at regular intervals.
    Seasonal time series are common in nature. For example, yearly weather patterns
    and daily sunshine patterns are seasonal patterns. Back at the start of the non-stationary
    section, we showed an example of a non-stationary time series with seasonality.
    This time series is shown again in *Figure 11.22* along with its ACF plot.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_324_0.png)


    The time series shown in *Figure 11.22* is the monthly total of international
    airline passengers from 1949 to 1960 [3]. There is a definite repeated pattern
    in this time series. To model this type of data, we will need to an additional
    term to the ARIMA model to account for seasonality.


    # Seasonal differencing


    We will use a similar approach for modeling this type of time series as we did
    with ARIMA. We will start by using differencing to stationarize the data, then
    fit an ARMA model to the differenced data. With seasonal time series, we will
    need to use seasonal differencing to remove the seasonal effects, which we can
    show mathematically:


    $$y''_t = y_t - y_{t-T}$$


    Where $T$ is the period of the season. For example, the time series in *Figure
    11.22* exhibits monthly seasonality and each data point represents one month;
    therefore, the $T = 12$ for the airline volume data. Then, for the airline data,
    we would use the following difference equation to remove seasonality:


    $$y''_t = y_t - y_{t-12}$$'

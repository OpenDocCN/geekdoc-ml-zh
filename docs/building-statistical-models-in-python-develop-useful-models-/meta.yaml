    ```


    在本书中，我们将使用 Python 数据科学生态系统中的几个核心库，例如用于数组操作的 NumPy、用于更高级数据操作的 pandas 以及用于数据可视化的
    matplotlib。本书使用的包版本包含在以下列表中。请确保您环境中安装的版本等于或大于所列版本。这将有助于确保代码示例正确运行：



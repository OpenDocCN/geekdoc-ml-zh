    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_323_0.png)


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_323_1.png)


    Figure 11.21 – US GDP ARIMA forecast over test split


    The forecast of the US GDP in *Figure 11.21* appears to follow the trend of the
    data but does not capture the small variations in the series. However, the variation
    is captured in the prediction interval (labeled as “interval”). This model appears
    to provide a reasonably good prediction of the test data. Note that the interval
    increases over time. This is because predictions become more uncertain farther
    in the future. Generally, shorter forecasts are more likely to be accurate.


    In this section, we built on the ARMA model and extended it to non-stationary
    data using differencing, which formed the ARIMA model. In the next section, we
    will look at non-stationary time series that include seasonal effects and make
    a further extension to the ARIMA model.'
  - '[PAGE 324]


    # Seasonal ARIMA models


    Let''s look at another characteristic of time series called **seasonality**. Seasonality
    is the presence of a pattern in a time series that repeats at regular intervals.
    Seasonal time series are common in nature. For example, yearly weather patterns
    and daily sunshine patterns are seasonal patterns. Back at the start of the non-stationary
    section, we showed an example of a non-stationary time series with seasonality.
    This time series is shown again in *Figure 11.22* along with its ACF plot.


    ![](img/3de2e60811d1b90c67f6bb2d5cae034f_324_0.png)


    The time series shown in *Figure 11.22* is the monthly total of international
    airline passengers from 1949 to 1960 [3]. There is a definite repeated pattern
    in this time series. To model this type of data, we will need to an additional
    term to the ARIMA model to account for seasonality.


    # Seasonal differencing


    We will use a similar approach for modeling this type of time series as we did
    with ARIMA. We will start by using differencing to stationarize the data, then
    fit an ARMA model to the differenced data. With seasonal time series, we will
    need to use seasonal differencing to remove the seasonal effects, which we can
    show mathematically:


    $$y''_t = y_t - y_{t-T}$$


    Where $T$ is the period of the season. For example, the time series in *Figure
    11.22* exhibits monthly seasonality and each data point represents one month;
    therefore, the $T = 12$ for the airline volume data. Then, for the airline data,
    we would use the following difference equation to remove seasonality:


    $$y''_t = y_t - y_{t-12}$$'
- md: 'We can also identify the seasonality by observing where peaks occur in the
    ACF plot. The ACF plot in Figure 11.22 shows a peak at 12, indicating a seasonal
    period of 12, which is consistent with our knowledge of the time series.


    We will see how to apply seasonal differences later in this section using `pmdarima`.
    Let''s take a look at how seasonality is included in the model.


    ## Seasonal ARIMA


    As mentioned in the ARIMA section, we will be differencing the original series,
    then fitting a stationary model to the differenced data. Then our time series
    would be described by the following equation where $y''_t$ is the differenced
    series (including seasonal and sequential differences):


    $$y''_t = c + \phi_1 y''_{t-1} + \dots + \phi_p y''_{t-p} + \epsilon_t + \theta_1
    \epsilon_{t-1} + \dots + \theta_q \epsilon_{t-q}$$


    We can express the whole model with backshift notation:


    $$(1 - \phi_1 B - \dots - \phi_p B^p)(1 - B)^d(1 - B^s)y_t = c + (1 + \theta_1
    B + \dots + \theta_q B^q)\epsilon_t$$'
  mdcn: '我们还可以通过观察ACF图中峰值出现的位置来识别季节性。图11.22中的ACF图在12处显示一个峰值，表明季节性周期为12，这与我们对该时间序列的了解一致。


    我们将在本节后面看到如何使用`pmdarima`应用季节性差分。现在让我们看看季节性是如何被纳入模型的。


    ## 季节性ARIMA


    正如在ARIMA部分提到的，我们将对原始序列进行差分，然后对差分后的数据拟合一个平稳模型。那么我们的时间序列可以用以下方程描述，其中$y''_t$是差分后的序列（包括季节性差分和顺序差分）：


    $$y''_t = c + \phi_1 y''_{t-1} + \dots + \phi_p y''_{t-p} + \epsilon_t + \theta_1
    \epsilon_{t-1} + \dots + \theta_q \epsilon_{t-q}$$


    我们可以用后移算子符号来表示整个模型：


    $$(1 - \phi_1 B - \dots - \phi_p B^p)(1 - B)^d(1 - B^s)y_t = c + (1 + \theta_1
    B + \dots + \theta_q B^q)\epsilon_t$$'

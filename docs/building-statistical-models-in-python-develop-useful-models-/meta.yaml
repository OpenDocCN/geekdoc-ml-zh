    \ arguably the most important precursor to successful time-series forecasting.\n\
    \nIn this chapter, we're going to cover the following main topics:\n\n- What is\
    \ a time series?\n- Goals of time-series analysis\n- Statistical measurements\n\
    - The white-noise model\n- Stationarity\n\n### What is a time series?\n\nIn this\
    \ chapter and the next few chapters, we will work with a type of data called time-series\
    \ data. Up until this point, we have worked with independent data—that is, data\
    \ consisting of samples that are not related. A time series is typically a measurement\
    \ of the same sample taken over time, which makes the samples in this type of\
    \ data related. There are many time series present around us every day. A few\
    \ common examples of time series are daily temperature measurements, stock price\
    \ ticks, and the heights of ocean tides. While a time series does not need to\
    \ be measured at fixed intervals, in this book, we will primarily be concerned\
    \ with measurements taken at fixed intervals, such as daily or every second.\n\
    \nLet's look at some notation. In the following equation, we have a variable $x$\
    \ that is repeatedly sampled over time. The subscripts enumerate the sample points\
    \ (sample 1 through sample $t$), and the whole series of samples is denoted $X$.\
    \ The subscript value is commonly called the **lag** of the variable. For example,\
    \ $x_2$ could be referred to as the second lag of the variable $x$:\n\n$$X = x_1,\
    \ x_2, \\dots x_{t-1}, x_t$$\n\nIn general, the $x$ points can be univariate or\
    \ multivariate. For example, we could take a temperature reading over time that\
    \ would result in a **univariate time series**, meaning each $x$ term would correspond\
    \ to a single temperature value. We could also take a more holistic set of weather\
    \ readings such as temperature, humidity, rainfall, and sunshine, which would\
    \ result in a **multivariate time series**, meaning each $x$ term would correspond\
    \ to a temperature, humidity, rainfall, and sunshine value.\n\nOur discussions\
    \ on time series start with single variable analysis in this chapter and *Chapter\

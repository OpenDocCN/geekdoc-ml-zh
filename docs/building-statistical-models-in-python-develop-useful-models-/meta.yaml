  md: '# # What is a time series?


    In this chapter and the next few chapters, we will work with a type of data called
    time-series data. Up until this point, we have worked with independent data—that
    is, data consisting of samples that are not related. A time series is typically
    a measurement of the same sample taken over time, which makes the samples in this
    type of data related. There are many time series present around us every day.
    A few common examples of time series are daily temperature measurements, stock
    price ticks, and the heights of ocean tides. While a time series does not need
    to be measured at fixed intervals, in this book, we will primarily be concerned
    with measurements taken at fixed intervals, such as daily or every second.


    Let''s look at some notation. In the following equation, we have a variable $x$
    that is repeatedly sampled over time. The subscripts enumerate the sample points
    (sample 1 through sample $t$), and the whole series of samples is denoted $X$.
    The subscript value is commonly called the **lag** of the variable. For example,
    $x_2$ could be referred to as the second lag of the variable $x$:


    $$X = x_1, x_2, \dots x_{t-1}, x_t$$


    In general, the $x$ points can be univariate or multivariate. For example, we
    could take a temperature reading over time that would result in a **univariate
    time series**, meaning each $x$ term would correspond to a single temperature
    value. We could also take a more holistic set of weather readings such as temperature,
    humidity, rainfall, and sunshine, which would result in a **multivariate time
    series**, meaning each $x$ term would correspond to a temperature, humidity, rainfall,
    and sunshine value.


    Our discussions on time series start with single variable analysis in this chapter
    and *Chapter 11, ARIMA Models*. But as with the chapters on regression, we will
    start with a single-variable approach and proceed to work with multivariate time
    series. Just as with the chapters on regression, we may find the multiple variables
    in a time series are related to the outcome of a variable of interest. In *Chapter
    12, Multivariate Time Series*, we will deal with the extra complexity of multivariate
    time series and extend the single-variable models discussed in *Chapter 11* to
    multiple variables in *Chapter 12*. In this chapter, we will cover the basics
    of time series.


    Time series typically exhibit a property called **serial correlation**, which
    means that previous knowledge provides some knowledge about the future of the
    time series. We can measure serial correlation by comparing the current value
    of a time series to the previous values in the series to determine if present
    values are correlated with previous values. This type of correlation is also called
    **autocorrelation**. We will discuss more on autocorrelation later in this chapter,
    including how to determine if a series exhibits autocorrelation. Later in this
    chapter, we will look at how to make the calculations to determine whether data
    exhibits serial correlation and to calculate autocorrelation. However, let''s
    first discuss what we intend to achieve with time-series analysis.'
  merge: -1
  pgno: 268
- img_proc: true
  md: '# Goals of time series analysis


    There are two goals in time-series analysis:


    +   - Identifying any patterns in the time series

    - Forecasting future values of the time series


    We can use time-series analysis methods to uncover the nature of a time series.
    At the most basic level, we may want to know if a series appears to be random
    or if a time series appears to exhibit a pattern. If a time series has a pattern,
    we can determine if it has seasonal behavior, cyclical patterns, or exhibits trending
    behavior. *We will investigate the behaviors of time series both by observation
    and by the results of fitting models.* Models can provide insight into the nature
    of a series and allow us to forecast the future values of a time series.


    The other goal of time-series analysis is **forecasting**. We see examples of
    forecasting in many common situations, such as weather forecasting and stock price
    forecasting. It is important to keep in mind that the methods of forecasting we
    cover in this book are not infallible. Great care should be taken when communicating
    results from forecasting models. Predictions from models are always uncertain.
    *Predictions should always be contextualized with an understanding of the model
    uncertainty.* We will endeavor to reinforce this concept through the use of prediction
    intervals and model error rates.


    Now, with the context of what we hope to achieve with time-series analysis, let''s
    start looking at tools for analyzing univariate time series.


    # Statistical measurements


    When using time-series models to work with serially correlated data sets, we need
    to understand mean and variance – within the context of time – in addition to
    autocorrelation and cross-correlation. Understanding these variables helps build
    an intuition about how time-series models work and when they are more useful than
    models that do not account for time.


    # Mean


    In time-series analysis, the sample mean of a series is the sum of all values
    across each point in time in the series divided by the count of values. Where
    $t$ represents each discrete time step and $n$ is the total number of time steps,
    we can calculate the sample mean of a time series as follows:


    ```

    $$\overline{X} = \frac{1}{n} \sum_{t=1}^{n} x_t$$

    ```'
  merge: -1
  pgno: 269
- img_proc: true
  md: 'There are two types of processes generating time series; one is an ergodic
    process and the other is non-ergodic. An ergodic process has consistent output
    independent of time, whereas a non-ergodic process does not necessarily have consistent
    output over time. The sample mean of an ergodic process converges to the true
    population mean as the sample size increases. However, the sample mean of a non-ergodic
    process does not converge as the sample size increases; the sample mean of one
    end-to-end phase of a process''s output may not converge toward the process population
    mean similarly to the sample mean of another end-to-end phase of the same process.
    One example of a non-ergodic process is a machine that requires frequent recalibration
    as output quality diminishes due to factors such as moisture or vibration. The
    tools introduced in this chapter, and expanded in the next, will help an analyst
    overcome limitations presented by this natural constraint presented in process-driven
    time-series data.


    In time-series analysis, the mean is commonly referred to as the **signal**. With
    respect to forecasting, the mean must be constant across time. We discussed in
    *Chapter 6, Simple Linear Regression* – as we will later in this chapter and in
    the next – the concept of first-order differencing, which is a **low-pass linear
    filter** used to *remove* high-frequency data from our output and *pass through*
    low-frequency data. When a signal is not constant, as when it is monotonically
    increasing or decreasing, for example, a first-order difference can often be applied—and
    repeated as needed—to produce a constant. This is one requirement of a **stationary**
    time series. We will discuss all components of stationarity in the *Stationarity*
    section of this chapter. Once a mean is constant, the variance around it can be
    assessed for autocorrelation. If autocorrelation exists within the variance around
    the mean, we can produce models to learn the patterns of the process producing
    it. We can also forecast the process''s future patterns. A model with a constant
    mean and no autocorrelation can often be forecasted with the mean using a white-noise
    model. For all times, *t*, in a series, the formulation for a first-order linear
    difference is this:


    $$Y''_t = Y_t - Y_{t-1}$$


    Since the first-order difference is a numerical differentiation, it will result
    in the removal of one data point from the time series, so must be applied prior
    to any modeling. Here is an example of a first-order difference in tabular data:


    | Raw Data | First-Order Difference |

    | :---: | :---: |

    | 1.7 | |

    | 1.4 | -0.3 |

    | 1.9 | 0.5 |

    | 2.3 | 0.4 |

    | 2.1 | -0.2 |


    Figure 10.1 – First-order difference in tabular data'
  merge: -1
  pgno: 270
- img_proc: true
  md: 'Here, we have an example of data transformed with a first-order difference.
    The numpy diff() function can be used as follows, where n=1 prescribes a first-order
    difference:


    ```

    numpy.diff(array_x, n=1)

    ```


    # Variance


    Variance is a statistic for measuring the dispersion of data around a mean for
    a given distribution. Within the context of time-series analysis, variance is
    distributed around the mean across time. If we have a discrete and stationary
    process, we can calculate the variance of the sample mean as follows:


    $$Var(\overline{X}) = \frac{\sigma^2}{n} \sum_{k=-(n-1)}^{n-1} \left(1 - \frac{|k|}{n}\right)
    \rho_k$$


    Here, n is the length of the time series, k is the number of lags to be included
    in the series autocorrelation (serial correlation) calculation and $\rho_k$ is
    the autocorrelation for that lookback horizon. This variance calculation can be
    obtained through model construction, which we will walk through in Chapter 11,
    ARIMA Models. It is in model construction – where we build the characteristic
    equations for the time series – that the measurement of variance becomes most
    important. Otherwise, we focus on autocorrelation to build intuition about the
    variance and the process producing it. Oftentimes, we have what is referred to
    as white-noise variance, which is a random distribution of variance generated
    from a stochastic process. White-noise variance has no autocorrelation across
    the time horizon. In the case of white-noise variance, we have only the following
    calculation for variance, which is the same calculation for data that is not serially
    correlated:


    $$Var(\overline{X}) = \frac{\sigma^2}{n}$$


    Data exhibiting white-noise variance can often be modeled with an average as there
    are no correlated errors. However, there may be transformations required in order
    to use an average, such as a first-order difference or a seasonal difference.


    One common hypothesis test used in time-series analysis to assess if the variance
    in a series is white noise is the Ljung-Box test, created by Greta Ljung and George
    Box. The Ljung-Box test has the following hypotheses:


    +   - $H_o$ : Data points are independently distributed with no serially correlated
    errors

    - $H_a$ : Data points are not independently distributed and thus present serially
    correlated errors'
  merge: -1
  pgno: 271
- img_proc: true
  md: 'This test can be applied to the residuals of any time-series model—for example,
    a linear model that uses time as an input or an **autoregressive integrated moving
    average (ARIMA)** model. If the result of the Ljung-Box test is the validation
    of the null hypothesis, the model tested is assumed to be valid. If the null hypothesis
    is rejected, a different model may be required. The Ljung-Box test statistic is
    shown here:


    $$Q = n(n + 2)\sum_{k=1}^{h} \frac{\hat{\rho}_k^2}{n - k}$$


    Here, $n$ is the sample size, $k$ corresponds to each lag in the test, $h$ is
    the total time horizon being tested, and $\hat{\rho}_k$ is the sample autocorrelation
    for each lag. The test follows the Chi-Square ($\chi^2$) distribution and thus
    places more emphasis on more recent lags than those in the distant past. The Ljung-Box
    test statistic is compared to $\chi^2$ distribution with $h$ degrees of freedom,
    as follows:


    $$Q > \chi_{1-\alpha,h}^2$$


    Here, $h$ is the tested horizon. A Q-statistic greater than the $\chi^2$ critical
    value results in rejecting the null hypothesis. The Ljung-Box test can also be
    applied to data without a model to test whether it is constant, zero-mean data
    with white-noise variance. Otherwise, the test is performed on the residuals of
    a model. Let''s generate a random, normally distributed sample of 1,000 data points
    having a mean of 0 and a standard deviation of 1 so that we can test using Ljung-Box
    whether the data is **stationary white noise**:


    ```

    import numpy as np

    import matplotlib.pyplot as plt

    from statsmodels.graphics.tsaplots import plot_acf

    random_white_noise = np.random.normal(loc=0, scale=1, size=1000)

    ```


    We can observe based on the raw data that the mean is constant. We can also see
    that the autocorrelation structure appears to have no significant lags, which
    is a strong indication the variance is randomly distributed white noise. In model
    development, this lack of autocorrelation is what you would want to see from the
    residuals to help verify a model fits the process''s data well:


    ```

    fig, ax = plt.subplots(1, 2, figsize=(10, 5))

    ax[0].plot(random_white_noise)

    ax[0].axhline(0, color=''r'')

    ax[0].set_title(''Raw Data'')

    plot_acf(random_white_noise, ax=ax[1])

    ```


    In *Figure 10.2*, we can see the original white noise data and the ACF plot, which
    exhibits no statistically significant autocorrelation across lags:'

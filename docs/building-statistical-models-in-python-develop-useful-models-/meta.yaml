    \ middle-time series shows more wandering from the mean than the top-time series.\
    \ The bottom time series (with a root of one), does not appear to regress toward\
    \ a mean such as the other two simulations. The second observation is about the\
    \ autocorrelations. As the root of the AR(1) approaches 1, the autocorrelations\
    \ get stronger and decrease slower over the lags. These two observations are characteristic\
    \ of a series with a root near or at one. Additionally, the presence of unit roots\
    \ will dominate the time series behavior, making it easy to recognize from the\
    \ autocorrelation plot.\n\n## Fitting an ARIMA model\n\nThere are two steps to\
    \ fit an ARIMA model: (1) stationarize the series from differencing to determine\
    \ the difference order and (2) fit an ARMA model to the resulting series. In the\
    \ previous section, we discussed how to fit an ARMA model so in this section,\
    \ we will focus on the first step.\n\nAt the beginning of this section, we showed\
    \ a time series of US GDP values. We will use that time series as a case study\
    \ for fitting an ARIMA model. First, let's take a look at the series and its autocorrelations\
    \ again. The series and autocorrelations are shown in *Figure 11.19*.\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_319_0.png)\n\
    \nFigure 11.19 – US GDP time series and autocorrelations\n\nFrom the plots shown\
    \ in *Figure 11.19*, it appears that the time series of US GDP data is non-stationary\
    \ time series. The time series exhibits wandering behavior, and the autocorrelations\
    \ are strong and decrease slowly. As we discussed, this is characteristic behavior\
    \ of unit roots. For secondary evidence, we can use the Dickey-Fuller test for\
    \ unit root. The null hypothesis of the Dickey-Fuller test is that a unit root\
    \ is present in the time series. The following code shows how to use the Dickey-Fuller\
    \ test from pmdarima. The test returns a p-value of 0.74 indicating we cannot\
    \ reject the null hypothesis, meaning that the time series should be differenced:\n\
    \n```\nimport pmdarima as pm\nfrom sktime import datasets\ny_macro_economic =\
    \ datasets.load_macroeconomic()\nadf_test = pm.arima.ADFTest()\nadf_test.should_diff(y_macro_economic.realgdp.values)\n\
    # (0.7423236714537164, True)\n```\n\nWe can take the first difference of time\
    \ series using the diff function from numpy:\n\n```\nfirst_diff = np.diff(y_macro_economic.realgdp.values,\
    \ n=1)\n```\n\nTaking the first difference, we arrive at a new time series as\
    \ shown in *Figure 11.20*:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_320_0.png)\n\
    \nThe first difference of the US GDP time series shown in *Figure 11.20* appears\
    \ to be stationary. In fact, it appears to be consistent with an AR(2) model.\
    \ We double-check whether we need to take an additional difference using the Dickey-Fuller\
    \ test on the first differenced data:\n\n```\nfirst_diff = np.diff(y_macro_economic.realgdp.values,\
    \ n=1)\nadf_test.should_diff(first_diff)\n# (0.01, False)\n```\n\nThe Dickey-Fuller\
    \ test returns a p-value of 0.01 for the first differenced data, which means we\
    \ can reject the null hypothesis and we can stop differencing the data. That means\
    \ that our ARIMA model for this data will have a difference order of 1 ($d = 1$).\n\
    \nAfter finding the difference order, we can fit an ARMA model to the differenced\
    \ data. Since we have already discussed fitting ARMA models, we will use an automated\
    \ fitting method provided by pmdarima. pm.auto_arima is a function for automatically\
    \ fitting an ARIMA model to data, however, in this case, we will use it to fit\
    \ the ARMA portion from the differenced series. The output of pm.auto_arima for\
    \ the first difference data is shown in the following code block:\n\n```\npm.auto_arima(\n\
    \    first_diff, error_action='ignore', trace=True,\n    suppress_warnings=True,\
    \ maxiter=5, seasonal=False,\n    test='adf'\n)\nPerforming stepwise search to\
    \ minimize aic\nARIMA(2,0,2)(0,0,0)[0]             : AIC=2207.388, Time=0.03 sec\n\
    ARIMA(0,0,0)(0,0,0)[0]             : AIC=2338.346, Time=0.01 sec\nARIMA(1,0,0)(0,0,0)[0]\
    \             : AIC=2226.760, Time=0.02 sec\nARIMA(0,0,1)(0,0,0)[0]          \
    \   : AIC=2284.220, Time=0.01 sec\nARIMA(1,0,2)(0,0,0)[0]             : AIC=2206.365,\
    \ Time=0.02 sec\nARIMA(0,0,2)(0,0,0)[0]             : AIC=2253.267, Time=0.02\
    \ sec\nARIMA(1,0,1)(0,0,0)[0]             : AIC=2203.917, Time=0.01 sec\nARIMA(2,0,1)(0,0,0)[0]\
    \             : AIC=2208.521, Time=0.02 sec\nARIMA(2,0,0)(0,0,0)[0]          \
    \   : AIC=2208.726, Time=0.02 sec\nARIMA(1,0,1)(0,0,0)[0] intercept   : AIC=2193.482,\
    \ Time=0.04 sec\nARIMA(0,0,1)(0,0,0)[0] intercept   : AIC=2208.669, Time=0.03\
    \ sec\nARIMA(1,0,0)(0,0,0)[0] intercept   : AIC=2195.212, Time=0.02 sec\nARIMA(2,0,1)(0,0,0)[0]\
    \ intercept   : AIC=2191.810, Time=0.03 sec\nARIMA(2,0,0)(0,0,0)[0] intercept\
    \   : AIC=2190.196, Time=0.02 sec\nARIMA(3,0,0)(0,0,0)[0] intercept   : AIC=2191.589,\
    \ Time=0.03 sec\nARIMA(3,0,1)(0,0,0)[0] intercept   : AIC=2193.567, Time=0.03\
    \ sec\nBest model:  ARIMA(2,0,0)(0,0,0)[0] intercept\nTotal fit time: 0.349 seconds\n\
    ```\n\nSince the ARMA fit for the differenced data is ARMA(2,0), the ARIMA orders\
    \ for the original time series would be ARIMA(2,1,0). Next, we will look at forecasting\
    \ from an ARIMA model.\n\n## Forecasting with ARIMA\n\nOnce we have a fit model,\
    \ we can forecast with that model. As mentioned in previous chapters, when making\
    \ predictions we should create a train-test split, so we have data to compare\
    \ with the predictions. The model should only fit the training data to avoid data\
    \ leakage. We can use the `train_test_split` function from `pmdarima` to split\
    \ the data. Then we proceed with the usual steps: split, train, and predict. The\
    \ code for this is shown in the following code block:\n\n```\nfrom pmdarima.model_selection\
    \ import train_test_split\ntrain, test = train_test_split(y_macro_economic.realgdp.values,\n\
    \                     train_size=0.9\n)\n\narima = pm.auto_arima(\n    train,\
    \ out_of_sample_size=10,\n    suppress_warnings=True, error_action='ignore',\n\
    \    test='adf'\n)\n\npreds, conf_int = arima.predict(\n    n_periods=test.shape[0],\
    \ return_conf_int=True\n)\n```\n\nThe preceding code fits an ARIMA model with\
    \ `auto_arima` and then forecasts the size of the test set using the `predict`\
    \ method of the ARIMA object. The forecasts for the series generated by the code\
    \ are shown in *Figure 11.21*:\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_323_0.png)\n\
    \n![](img/3de2e60811d1b90c67f6bb2d5cae034f_323_1.png)\n\nFigure 11.21 – US GDP\
    \ ARIMA forecast over test split\n\nThe forecast of the US GDP in *Figure 11.21*\
    \ appears to follow the trend of the data but does not capture the small variations\
    \ in the series. However, the variation is captured in the prediction interval\
    \ (labeled as “interval”). This model appears to provide a reasonably good prediction\
    \ of the test data. Note that the interval increases over time. This is because\
    \ predictions become more uncertain farther in the future. Generally, shorter\
    \ forecasts are more likely to be accurate.\n\nIn this section, we built on the\
    \ ARMA model and extended it to non-stationary data using differencing, which\
    \ formed the ARIMA model. In the next section, we will look at non-stationary\
    \ time series that include seasonal effects and make a further extension to the\
    \ ARIMA model.\n\n## Seasonal ARIMA models\n\nLet's look at another characteristic\
    \ of time series called **seasonality**. Seasonality is the presence of a pattern\
    \ in a time series that repeats at regular intervals. Seasonal time series are\
    \ common in nature. For example, yearly weather patterns and daily sunshine patterns\
    \ are seasonal patterns. Back at the start of the non-stationary section, we showed\
    \ an example of a non-stationary time series with seasonality. This time series\
    \ is shown again in *Figure 11.22* along with its ACF plot.\n\n![](img/3de2e60811d1b90c67f6bb2d5cae034f_324_0.png)\n\
    \nThe time series shown in *Figure 11.22* is the monthly total of international\
    \ airline passengers from 1949 to 1960 [3]. There is a definite repeated pattern\
    \ in this time series. To model this type of data, we will need to an additional\
    \ term to the ARIMA model to account for seasonality.\n\n## Seasonal differencing\n\
    \nWe will use a similar approach for modeling this type of time series as we did\
    \ with ARIMA. We will start by using differencing to stationarize the data, then\
    \ fit an ARMA model to the differenced data. With seasonal time series, we will\
    \ need to use seasonal differencing to remove the seasonal effects, which we can\
    \ show mathematically:\n\n$$y'_t = y_t - y_{t-T}$$\n\nWhere $T$ is the period\
    \ of the season. For example, the time series in *Figure 11.22* exhibits monthly\
    \ seasonality and each data point represents one month; therefore, the $T = 12$\
    \ for the airline volume data. Then, for the airline data, we would use the following\
    \ difference equation to remove seasonality:\n\n$$y'_t = y_t - y_{t-12}$$"

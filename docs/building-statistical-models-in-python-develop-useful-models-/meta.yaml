    \n在本章中，我们将涵盖以下主要主题：\n\n-   **参数检验**的假设\n-   **T检验**——一种参数假设检验\n-   超过两组的检验和**方差分析（ANOVA）**\n\
    -   **皮尔逊相关系数**\n-   **统计功效分析**示例\n\n## 参数检验的假设\n\n参数检验对总体数据做出假设，要求统计实践者在建模之前进行数据分析，特别是在使用样本数据时，因为当真实的总体参数未知时，样本统计量被用作总体参数的估计。以下是参数假设检验的三个主要假设：\n\
    \n-   总体数据正态分布\n-   样本独立\n-   总体方差相等（当比较两个或更多组时）\n\n在本章中，我们讨论z检验、t检验、ANOVA和皮尔逊相关。这些检验用于连续数据。除了这些假设外，皮尔逊相关还要求数据包含配对样本。换句话说，被比较的每组中必须有相等数量的样本，因为皮尔逊相关基于成对比较。\n\
    \n虽然这些假设是理想的，但在许多情况下无法确保。因此，了解这些假设具有一定的稳健性是有用的，这取决于具体的检验。\n\n## 总体数据正态分布\n\n因为在参数假设检验中，我们关注的是获得关于总体参数（如均值或标准差）的推断，我们必须假设所选参数代表了分布，并且可以安全地假设数据具有集中趋势。我们还必须假设统计量（从样本或抽样分布中获取的参数值）代表其相应的总体参数。因此，由于我们在参数假设检验中假设总体是正态分布的，样本也应该是正态分布的。否则，假设样本代表总体是不安全的。\n\
    \n参数假设检验严重依赖均值，并假设它强烈代表数据的中心点（所有总体数据围绕均值集中分布）。考虑比较两个分布的均值以检验它们之间是否存在统计显著差异的情况。如果分布是偏斜的，均值将不是数据的中心点，因此不能很好地代表分布。由于这种情况，从比较均值的检验中获得的推断将不可靠。\n\
    \n## 对正态分布数据的稳健性\n\n许多假设检验在使用样本对总体进行估计时指定了自由度。自由度迫使模型假设所使用的分布中存在比实际更多的额外方差。虽然分析中的统计参数保持不变，但假设的额外方差迫使集中趋势度量更接近。换句话说，使用自由度迫使集中趋势度量更集中地代表其计算所依据的分布。这样做的原因是假设样本——虽然代表其整体总体——但代表其总体时存在误差范围。因此，使用自由度的参数假设检验对违反正态分布数据要求具有一定的稳健性。\n\
    \n在图4.1所示的图中，我们有一个略微偏斜的分布。一个应用了自由度，另一个没有。我们可以看到，无论是否使用自由度，均值和中位数之间的距离是相同的。然而，使用自由度的分布承担了更多的误差（更多的方差）："

    Now, let''s add the exogenous variables to the model. We will add the exogenous
    variables by adding a summation term to the model:


    $$y''_{t} = c + \sum_{i=1}^{p} \phi_{i} y''_{t-i} + \epsilon_{t} + \sum_{j=1}^{q}
    \phi_{j} \epsilon_{t-j} + \sum_{k=1}^{r} \beta_{k} X_{tk}$$


    Here, there are $r$ exogenous variables contained in the vector-valued variable
    $X$. Recall from earlier in the chapter, we can represent the vector-valued variable,
    as shown next, where the first index represents the time step, and the second
    index represents an individual series within the vector-valued variable:


    $$X = \begin{bmatrix} x_{0,0} & x_{1,0} & \dots & x_{t,0} \ \vdots & \vdots &
    \dots & \vdots \ x_{0,k} & x_{1,k} & \dots & x_{t,k} \end{bmatrix}$$


    This is how we will incorporate the exogenous variables into the ARIMA model.
    Now, let''s talk about how we would pick the exogenous variables. In *Chapter
    11, ARIMA Models*, using an ACF plot, we saw that certain lags of a time series
    are more influential than others for modeling a univariate time series. We will
    make similar judgments about exogenous variables using CCF plots. Let''s take

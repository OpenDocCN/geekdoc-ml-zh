    Figure 4-4. Volatility Prediction with GARCH


    The main reasons of applying GARCH to volatility modeling are returns are well
    fitted by GARCH model partly due to the volatility clustering and GARCH does not
    assume that the returns are independent that allows modeling the leptokurtic property
    of returns. However, despite these useful properties and intuitiveness, GARCH
    is not able to asymmetric response of the shocks (Karasan and Gaygisiz (2020)).
    To remedy this issue, GJR-GARCH was proposed by Glosten, Jagannathan and Runkle
    (1993).


    # GJR-GARCH


    This model performs well in modeling the asymmetric effects of the announcements
    in a way that bad news has larger impact than that of good news. In other words,
    in the presence of asymmetry, distribution of losses has a fatter tail than the
    distribution of gains. The equation of the model includes one more parameter $\gamma$
    and it takes the following form:'
  merge: -1
  pgno: 112
- img_proc: true
  md: "$$\\sigma_t^2 = \\omega + \\sum_{k=1}^q (\\alpha_k r_{t-k}^2 + \\gamma r_{t-k}^2\
    \ I(\\epsilon_{t-1} < 0)) + \\sum_{k=1}^p \\beta_k \\sigma_{t-k}^2$$\n\nwhere\
    \ $\\gamma$ controls for the asymmetry of the announcements and if\n\n+   - $\\\
    gamma = 0$, then the response to the past shock is the same\n- $\\gamma > 0$,\
    \ then the response to the past negative shock is stronger than that of a positive\
    \ one\n- $\\gamma < 0$, then the response to the past positive shock is stronger\
    \ than that of a negative one\n\n```\nIn [32]: bic_gjr_garch = []\n\n        for\

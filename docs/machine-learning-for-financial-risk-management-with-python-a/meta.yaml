  - '[PAGE 85]


    where $\sigma$ is activation function, $h_{t-1}$ is previous hidden state, $W_I$
    and $W_h$ are weights, and finally $b_f$ is bias parameter in forget cell.


    Input gate is fed by current timestep, $X_t$, and hidden state of the previous
    timestep $t - 1$. The goal of input gate is to determine the extent to information
    that should be added to the long-term state. The input gate can be formulated
    like this:


    $$I_t = \sigma(X_t W_I + h_{t-1} W_h + b_I)$$


    Output gate basically determines the extent of the output that should be read
    and works as follows:


    $$O_t = \sigma(X_t W_O + h_{t-1} W_O + b_I)$$


    The gates are not the sole components of LSTM. The other components are:


    +   - Candidate Memory cell

    - Memory cell

    - Hidden state


    Candidate memory cell determines the extent to which information passes to the
    cell state. Differently, the activation function in the candidate cell is tanh
    and takes the following form:


    $$\widehat{C_t} = \phi(X_t W_c + h_{t-1} W_c + b_c)$$


    Memory cell allows LSTM to remember or to forget the information:


    $$C_t = F_t \odot C + t - 1 + I_t \odot \widehat{C_t}$$


    where $\odot$ is hadamard product.


    In this recurrent network, hidden state is a tool to circulate information. Memory
    cell relates output gate to hidden state:


    $$h_t = \phi(c_t) \odot O_t$$'

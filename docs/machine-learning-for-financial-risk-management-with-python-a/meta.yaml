- md: "## Bayesian Approach\n\nThe way we approach to the probability is of central\
    \ importance in the sense that it distinguishes the classical (or frequentist)\
    \ and Bayesian approach. According to the former method, the relative frequency\
    \ will converge to the true probability. However, Bayesian application is based\
    \ on the subjective interpretation. Unlike frequentists, Bayesian statisticians\
    \ consider the probability distribution as uncertain and it is revised as new\
    \ information comes in.\n\nDue to the different interpretation of the probability\
    \ of these two approaches, likelihood, defined as, given a set of parameters,\
    \ the probability of observed event, is computed differently.\n\nStarting from\
    \ joint density function, we can give the mathematical representation of likelihood\
    \ function:\n\n$\\mathcal{L}(\\theta|x_1, x_2, \\dots, x_p) = \\text{Pr} (x_1,\
    \ x_2, \\dots, x_p|\\theta)$\n\nAmong possible $\\theta$ values, what we are trying\
    \ to do is to decide which one is more likely. Under the statistical model proposed\
    \ by likelihood function, the observed data $x_1, \\dots, x_p$ is the most probable.\n\
    \nIn fact, you are familiar with the method based on the approach, which is maximum\
    \ likelihood estimation. Having defined the main difference between Bayesian and\
    \ Frequentist approaches, it is time to delve more into the Bayes’ Theorem.\n\n\
    ## Bayes’ Theorem\n\nBayesian approach is based on conditional distribution, which\
    \ states that probability gauges the extent to which one has about a uncertain\
    \ event. So, Bayesian application suggests a rule that can be used to update the\
    \ beliefs that one holds in light of new information:\n\n> Bayesian estimation\
    \ is used when we have some prior information regarding a parameter. For example,\
    \ before looking at a sample to estimate the mean of a distribution, we may have\
    \ some prior belief that it is close to 2, between 1 and 3. Such prior beliefs\
    \ are especially important when we have a small sample. In such a case, we are\
    \ interested in combining what the data tells us, namely, the value calculated\
    \ from the sample, and our prior information.\n\n— (Rachev et al., 2008)\n\nSimilar\
    \ to the frequentist application, Bayesian estimation is based on probability\
    \ density Pr ($x|\\theta$). However, as we have discussed before, the way Bayesian\
    \ and frequentist methods treat parameter set $\\theta$ differently. Frequentist\
    \ assumes $\\theta$ to be fixed whereas it is, in Bayesian setting, taken as random\
    \ variable, whose probability is known as prior density Pr ($\\theta$). Oh no!\
    \ We have another different term but no worries it is easy to understand.\n\n\
    In the light of this information, we can estimate $\\mathcal{L}(x|\\theta)$ using\
    \ prior density Pr ($\\theta$) and we come up with the following formula. Prior\
    \ is employed when we need to estimate the conditional distribution of the parameters\
    \ given observations.\n\n$$\\Pr(\\theta|x_1, x_2, \\dots, x_p) = \\frac{\\mathcal{L}(x_1,\
    \ x_2, \\dots, x_p|\\theta) \\Pr(\\theta)}{\\Pr(x_1, x_2, \\dots, x_p)}$$\n\n\
    or\n\n$$\\Pr(\\theta|data) = \\frac{\\mathcal{L}(data|\\theta) \\Pr(\\theta)}{\\\
    Pr(data)}$$\n\nwhere\n\n- $\\Pr(\\theta|data)$ is the posterior density, which\
    \ gives us the information about the parameters given observed data.\n- $\\mathcal{L}(data|\\\
    theta)$ is the likelihood function, which estimates the probability of the data\
    \ given parameters.\n- $\\Pr(\\theta)$ is prior probability. It is the probability\
    \ of the parameters. Prior is basically the initial beliefs about estimates.\n\
    - Finally, Pr is the evidence, which is used to update the prior.\n\nConsequently,\
    \ Bayes’ Theorem suggests that the posterior density is directly proportional\
    \ to the prior and likelihood terms but inversely related to the evidence term.\
    \ As the evidence is there for scaling, we can describe this process as:\n\nrealized_vol.iloc[1:-(n-1)].values.reshape(-1,\
    \ ))③\nNN_predictions = clf.predict(X.iloc[-n:])④\n\nIn [58]: NN_predictions =\
    \ pd.DataFrame(NN_predictions)\n        NN_predictions.index = ret.iloc[-n:].index\n\
    \nIn [59]: rmse_NN = np.sqrt(mean_squared_error(realized_vol.iloc[-n:] / 100,\n\
    \                                        NN_predictions / 100))\n        print('The\
    \ RMSE value of NN is {:.6f}'.format(rmse_NN))\n        The RMSE value of NN is\
    \ 0.000583\n\nIn [60]: plt.figure(figsize=(10, 6))\n        plt.plot(realized_vol\
    \ / 100, label='Realized Volatility')\n        plt.plot(NN_predictions / 100,\
    \ label='Volatility Prediction-NN')\n        plt.title('Volatility Prediction\
    \ with Neural Network', fontsize=12)\n        plt.legend()\n        plt.savefig('images/NN.png')\n\
    \        plt.show()\n\n1. Importing *MLPRegressor* library.\n2. Configuring Neural\
    \ Network model.\n3. Fitting Neural Network model to the training data⁵.\n4. Predicting\
    \ the volatilities based on the last 252 observations and store them in the *NN_predictions*\
    \ variable.\n\nFigure 4-10 shows the volatility prediction result based on neural\
    \ network model. Despite its reasonable performance, we can play with the number\
    \ of hidden neurons to find generate a deep learning model. To do that, we can\
    \ apply Keras library, Python interface for artificial neural networks.\n\n![](img/4d5c72349594c4072f5436e47fcbab43_130_0.png)\n\
    \nFigure 4-10. Volatility Prediction with Neural Network\n\nNow, it is time to\
    \ predict volatility using deep learning. Based on Keras, it is easy to configure\
    \ the network structure. All we need is to determine the number of neuron of the\
    \ specific layer. Here, the number of neuron for first and second hidden layers\
    \ are 256 and 128, respectively. As volatility has a continuous type, we have\
    \ only one output neuron.\n\nIn [61]: import tensorflow as tf\n        from tensorflow\
    \ import keras\n        from tensorflow.keras import layers\n\nIn [62]: model\
    \ = keras.Sequential(\n            [layers.Dense(256, activation=\"relu\"),\n\
    \             layers.Dense(128, activation=\"relu\"),\n             layers.Dense(1,\
    \ activation=\"linear\"),])❶\n\nIn [63]: model.compile(loss='mse', optimizer='rmsprop')❷\n\
    \nIn [64]: epochs_trial = np.arange(100, 400, 4)❸\n        batch_trial = np.arange(100,\
    \ 400, 4)❸\n\nDL_pred = []\nDL_RMSE = []\nfor i, j, k in zip(range(4), epochs_trial,\
    \ batch_trial):\n    model.fit(X.iloc[:-n].values,\n              realized_vol.iloc[1:-(n-1)].values.reshape(-1,),\n\
    \              batch_size=k, epochs=j, verbose=False)④\n    DL_predict = model.predict(np.asarray(X.iloc[-n:]))⑤\n\
    \    DL_RMSE.append(np.sqrt(mean_squared_error(realized_vol.iloc[-n:] / 100,\n\
    \                                             DL_predict.flatten() / 100)))⑥\n\
    \    DL_pred.append(DL_predict)\n    print('DL_RMSE_{}:{:.6f}'.format(i+1, DL_RMSE[i]))\n\
    DL_RMSE_1:0.000524\nDL_RMSE_2:0.001118\nDL_RMSE_3:0.000676\nDL_RMSE_4:0.000757\n\
    \nIn [65]: DL_predict = pd.DataFrame(DL_pred[DL_RMSE.index(min(DL_RMSE))])\n \
    \       DL_predict.index = ret.iloc[-n:].index\n\nIn [66]: plt.figure(figsize=(10,\
    \ 6))\n        plt.plot(realized_vol / 100, label='Realized Volatility')\n   \
    \     plt.plot(DL_predict / 100, label='Volatility Prediction-DL')\n        plt.title('Volatility\
    \ Prediction with Deep Learning', fontsize=12)\n        plt.legend()\n       \
    \ plt.savefig('images/DL.png')\n        plt.show()\n\n1. Configuring network structure\
    \ by deciding number of layers and neurons.\n2. Compiling model with loss and\
    \ optimizer.\n3. Deciding the epoch and batch size using *np.arange*.\n4. Fitting\
    \ the deep learning model.\n5. Predicting the volatility based on the weights\
    \ obtained from the training phase.\n6. Calculating RMSE score by flattening the\
    \ predictions.\n\nIt turns out that we get minimum RMSE score as we increase the\
    \ layer size, which is quite understandable because most of the time number of\
    \ layers and model performance goes hand in hand up a point in which model tends\
    \ to overfit. Figuring out the proper number of layer for a specific data is a\
    \ key in deep learning in the sense that we stop adding more layer before model\
    \ get into the overfitting problem.\n\nFigure 4-11 shows the volatility prediction\
    \ result derived from the following code and it implies that deep learning provides\
    \ a strong tool in modeling volatility, too.\n\n![](img/4d5c72349594c4072f5436e47fcbab43_132_0.png)\n\
    \nFigure 4-11. Volatility Prediction with Deep Learning"
  mdcn: "## 贝叶斯方法\n\n我们处理概率的方式至关重要，因为它区分了经典（或频率学派）方法与贝叶斯方法。根据前一种方法，相对频率将收敛于真实概率。然而，贝叶斯应用基于主观解释。与频率学派不同，贝叶斯统计学家将概率分布视为不确定的，并且会随着新信息的加入而进行修正。\n\
    \n由于这两种方法对概率的解释不同，似然函数——定义为在给定一组参数下观测事件的概率——的计算方式也不同。\n\n从联合密度函数出发，我们可以给出似然函数的数学表示：\n\
    \n$\\mathcal{L}(\\theta|x_1, x_2, \\dots, x_p) = \\text{Pr} (x_1, x_2, \\dots,\
    \ x_p|\\theta)$\n\n在所有可能的 $\\theta$ 值中，我们试图做的是决定哪一个更有可能。在似然函数提出的统计模型下，观测数据 $x_1,\
    \ \\dots, x_p$ 是最可能出现的。\n\n事实上，你熟悉基于这种方法的估计，即最大似然估计。在明确了贝叶斯方法与频率学派方法的主要区别之后，现在是时候深入探讨贝叶斯定理了。\n\
    \n## 贝叶斯定理\n\n贝叶斯方法基于条件分布，该分布表明概率衡量的是一个人对不确定事件的了解程度。因此，贝叶斯应用提出了一种规则，可用于根据新信息更新一个人持有的信念：\n\
    \n> 当我们拥有关于某个参数的先验信息时，就会使用贝叶斯估计。例如，在查看样本以估计分布的均值之前，我们可能有一些先验信念，认为它接近2，介于1和3之间。当我们拥有小样本时，这种先验信念尤其重要。在这种情况下，我们感兴趣的是将数据告诉我们的信息（即从样本计算出的值）与我们的先验信息结合起来。\n\
    \n— (Rachev et al., 2008)\n\n与频率学派应用类似，贝叶斯估计基于概率密度 Pr ($x|\\theta$)。然而，正如我们之前讨论的，贝叶斯方法和频率学派方法处理参数集\
    \ $\\theta$ 的方式不同。频率学派假设 $\\theta$ 是固定的，而在贝叶斯设定中，它被视为随机变量，其概率被称为先验密度 Pr ($\\theta$)。哦不！我们又有了一个不同的术语，但别担心，它很容易理解。\n\
    \n根据这些信息，我们可以使用先验密度 Pr ($\\theta$) 来估计 $\\mathcal{L}(x|\\theta)$，并得出以下公式。当我们需要估计给定观测值的参数的条件分布时，会使用先验。\n\
    \n$$\\Pr(\\theta|x_1, x_2, \\dots, x_p) = \\frac{\\mathcal{L}(x_1, x_2, \\dots,\
    \ x_p|\\theta) \\Pr(\\theta)}{\\Pr(x_1, x_2, \\dots, x_p)}$$\n\n或\n\n$$\\Pr(\\\
    theta|data) = \\frac{\\mathcal{L}(data|\\theta) \\Pr(\\theta)}{\\Pr(data)}$$\n\
    \n其中\n\n- $\\Pr(\\theta|data)$ 是后验密度，它提供了给定观测数据下关于参数的信息。\n- $\\mathcal{L}(data|\\\
    theta)$ 是似然函数，它估计给定参数下数据的概率。\n- $\\Pr(\\theta)$ 是先验概率。它是参数的概率。先验基本上是关于估计的初始信念。\n\
    - 最后，Pr 是证据，用于更新先验。\n\n因此，贝叶斯定理表明后验密度与先验项和似然项成正比，但与证据项成反比。由于证据用于缩放，我们可以将此过程描述为：\n\
    \nrealized_vol.iloc[1:-(n-1)].values.reshape(-1, ))③\nNN_predictions = clf.predict(X.iloc[-n:])④\n\
    \nIn [58]: NN_predictions = pd.DataFrame(NN_predictions)\n        NN_predictions.index\
    \ = ret.iloc[-n:].index\n\nIn [59]: rmse_NN = np.sqrt(mean_squared_error(realized_vol.iloc[-n:]\
    \ / 100,\n                                        NN_predictions / 100))\n   \
    \     print('The RMSE value of NN is {:.6f}'.format(rmse_NN))\n        The RMSE\
    \ value of NN is 0.000583\n\nIn [60]: plt.figure(figsize=(10, 6))\n        plt.plot(realized_vol\
    \ / 100, label='Realized Volatility')\n        plt.plot(NN_predictions / 100,\
    \ label='Volatility Prediction-NN')\n        plt.title('Volatility Prediction\
    \ with Neural Network', fontsize=12)\n        plt.legend()\n        plt.savefig('images/NN.png')\n\
    \        plt.show()\n\n1. 导入 *MLPRegressor* 库。\n2. 配置神经网络模型。\n3. 将神经网络模型拟合到训练数据⁵。\n\
    4. 基于最后252个观测值预测波动率，并将结果存储在 *NN_predictions* 变量中。\n\n图4-10展示了基于神经网络模型的波动率预测结果。尽管其性能合理，但我们可以调整隐藏神经元的数量，以生成一个深度学习模型。为此，我们可以应用Keras库，这是一个人工神经网络的Python接口。\n\
    \n![](img/4d5c72349594c4072f5436e47fcbab43_130_0.png)\n\n图4-10. 使用神经网络进行波动率预测\n\
    \n现在，是时候使用深度学习来预测波动率了。基于Keras，配置网络结构很容易。我们需要做的就是确定特定层的神经元数量。这里，第一个和第二个隐藏层的神经元数量分别为256和128。由于波动率是连续类型，我们只有一个输出神经元。\n\
    \nIn [61]: import tensorflow as tf\n        from tensorflow import keras\n   \
    \     from tensorflow.keras import layers\n\nIn [62]: model = keras.Sequential(\n\
    \            [layers.Dense(256, activation=\"relu\"),\n             layers.Dense(128,\
    \ activation=\"relu\"),\n             layers.Dense(1, activation=\"linear\"),])❶\n\
    \nIn [63]: model.compile(loss='mse', optimizer='rmsprop')❷\n\nIn [64]: epochs_trial\
    \ = np.arange(100, 400, 4)❸\n        batch_trial = np.arange(100, 400, 4)❸\n\n\
    DL_pred = []\nDL_RMSE = []\nfor i, j, k in zip(range(4), epochs_trial, batch_trial):\n\
    \    model.fit(X.iloc[:-n].values,\n              realized_vol.iloc[1:-(n-1)].values.reshape(-1,),\n\
    \              batch_size=k, epochs=j, verbose=False)④\n    DL_predict = model.predict(np.asarray(X.iloc[-n:]))⑤\n\
    \    DL_RMSE.append(np.sqrt(mean_squared_error(realized_vol.iloc[-n:] / 100,\n\
    \                                             DL_predict.flatten() / 100)))⑥\n\
    \    DL_pred.append(DL_predict)\n    print('DL_RMSE_{}:{:.6f}'.format(i+1, DL_RMSE[i]))\n\
    DL_RMSE_1:0.000524\nDL_RMSE_2:0.001118\nDL_RMSE_3:0.000676\nDL_RMSE_4:0.000757\n\
    \nIn [65]: DL_predict = pd.DataFrame(DL_pred[DL_RMSE.index(min(DL_RMSE))])\n \
    \       DL_predict.index = ret.iloc[-n:].index\n\nIn [66]: plt.figure(figsize=(10,\
    \ 6))\n        plt.plot(realized_vol / 100, label='Realized Volatility')\n   \
    \     plt.plot(DL_predict / 100, label='Volatility Prediction-DL')\n        plt.title('Volatility\
    \ Prediction with Deep Learning', fontsize=12)\n        plt.legend()\n       \
    \ plt.savefig('images/DL.png')\n        plt.show()\n\n1. 通过决定层数和神经元数量来配置网络结构。\n\
    2. 使用损失函数和优化器编译模型。\n3. 使用 *np.arange* 决定训练轮次和批大小。\n4. 拟合深度学习模型。\n5. 基于训练阶段获得的权重预测波动率。\n\
    6. 通过展平预测结果来计算RMSE分数。\n\n结果表明，随着层数的增加，我们获得了最小的RMSE分数，这是完全可以理解的，因为在大多数情况下，层数和模型性能在达到某一点之前是同步提升的，之后模型往往会过拟合。为特定数据确定合适的层数是深度学习的关键，这意味着我们在模型出现过拟合问题之前就停止添加更多层。\n\
    \n图4-11展示了由以下代码得出的波动率预测结果，它表明深度学习也为波动率建模提供了强大的工具。\n\n![](img/4d5c72349594c4072f5436e47fcbab43_132_0.png)\n\
    \n图4-11. 使用深度学习进行波动率预测"

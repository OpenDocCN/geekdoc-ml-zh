    # EGARCH


    Together with the GJR-GARCH model, EGARCH proposed by Nelson (1991), is a also
    tool for controlling for the effect of the asymmetric announcements and additionally
    it is specified in logarithmic form, there is no need to put restriction to avoid
    negative volatility.


    $$\log(\sigma_t^2) = \omega + \sum_{k=1}^{p} \beta_k \log\sigma_{t-k}^2 + \sum_{k=1}^{q}
    \alpha_i \frac{|r_{k-1}|}{\sqrt{\sigma_{t-k}^2}} + \sum_{k=1}^{q} \gamma_k \frac{r_{t-k}}{\sqrt{\sigma_{t-k}^2}}$$'

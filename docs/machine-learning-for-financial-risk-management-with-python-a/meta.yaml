  md: '# Risk Management


    Financial risk management is a process to deal with the uncertainties resulting
    from financial markets. It involves assessing the financial risks facing an organization
    and developing management strategies consistent with internal priorities and policies
    (Horcher, 2011).


    According to this definition, as every organization faces different type of risks,
    the way that a company deals with it is completely unique. Every company should
    properly assess and take necessary action against risk. It, however, does not
    necessarily mean that once a risk is identified, it needs to be mitigated as much
    as a company can do.


    Risk management is, therefore, not about mitigating risk at all costs. Mitigating
    risk may require sacrificing return and it can be tolerable up to certain level
    as companies are searching for higher return as much as lowering risk. Thus, to
    maximize profit while lowering the risk should be delicate and well-defined task.


    Managing risk is a delicate task as it comes with a cost and even though dealing
    with it requires specific company policies, there exists a general framework for
    possible risk strategies. These are:


    +   - *Ignore*: In this strategy, companies accept all risks and their consequences
    and prefer to do nothing.

    - *Transfer*: This strategy involves transferring the risks to a third-party by
    hedging or some other ways.

    - *Mitigate*: Companies develop a strategy to mitigate risk partly because its
    harmful effect might be considered too much to bear and/or suppress the benefit
    attached to it.

    - *Accept risk*: If companies embrace the strategy of *accepting the risk*, they
    properly identify risks and acknowledge the benefit of them. In other words, when
    assuming certain risks arising from some activities bring values to shareholder,
    this strategy can be picked.'
  merge: -1
  pgno: 17

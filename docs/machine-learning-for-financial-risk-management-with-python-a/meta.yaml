    # # GARCH Model


    GARCH model is an extension of ARCH model incorporating lagged conditional variance.
    So, ARCH is improved by adding p number of delated conditional variance, which
    makes GARCH model a multivariate one in the sense that it is a autoregressive
    moving average models for conditional variance with p number of lagged squared
    returns and q number of lagged conditional variance. GARCH (p, q) can be formulated
    as:


    $$\sigma_t^2 = \omega + \sum_{k=1}^{q} \alpha_k r_{t-k}^2 + \sum_{k=1}^{p} \beta_k
    \sigma_{t-k}^2$$


    where $\omega$, $\beta$, and $\alpha$ are parameters to be estimated and q and
    p are maximum lag in the model. In order to have consistent GARCH, following conditions'
  merge: -1
  pgno: 105
- img_proc: true
  md: "should hold:\n\n+   - $\\omega > 0$\n- $\\beta \\geq 0$\n- $\\alpha \\geq 0$\n\
    - $\\beta + \\alpha < 1$\n\nARCH model is unable to capture the influence of historical\
    \ innovations. However, as a more parsimonious model, GARCH model can account\
    \ for the change in historical innovations because GARCH models can be expressed\
    \ as an infinite-order ARCH. Let’s show how GARCH can be shown as infinite order\
    \ of ARCH.\n\n$$\\sigma_t^2 = \\omega + \\alpha r_{t-1}^2 + \\beta \\sigma_{t-1}^2$$\n\
    \nThen replace $\\sigma_{t-1}^2$ by $\\omega + \\alpha r_{t-2}^2 + \\beta \\sigma_{t-2}^2$\n\
    \n$$\\sigma_t^2 = \\omega + \\alpha r_{t-1}^2 + \\beta(\\omega + \\alpha r_{t-2}^2\
    \ \\sigma_{t-2}^2)$$\n$$= \\omega(1 + \\beta) + \\alpha r_{t-1}^2 + \\beta \\\
    alpha r_{t-2}^2 + \\beta^2 \\sigma_{t-2}^2)$$\n\nNow, let us substitute $\\sigma_{t-2}^2$\
    \ by $\\omega + \\alpha r_{t-3}^2 + \\beta \\sigma_{t-3}^2$ and do the necessary\
    \ math, we end up with:\n\n$$\\sigma_t^2 = \\omega(1 + \\beta + \\beta^2 + \\\
    dots) + \\alpha \\sum_{k=1}^{\\infty} \\beta^{k-1} r_{t-k}$$\n\nSimilar to ARCH\
    \ model, there are more than one way to model volatility using GARCH in Python.\
    \ Let us try to develop our own Python-based code using optimization technique\
    \ first. In what follows, *arch* library will be used to predict volatility.\n\
    \n```\nIn [19]: a0 = 0.0001\n        sgm2 = ret.var()\n        K = ret.kurtosis()\n\
    ```"

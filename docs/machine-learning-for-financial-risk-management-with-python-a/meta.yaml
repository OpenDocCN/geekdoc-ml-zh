    \ which we need to deal with before moving forward.\n\nTaking difference is an\
    \ efficient technique to remove the stationarity. Taking difference is nothing\
    \ but to subtract current value of series from its first lagged value, i.e., $x_t\
    \ - x_{t-1}$ and the following python code presents how to apply this technique:\n\
    \n```\nIn [16]: diff_SP_price = SP_prices.diff()\n\nIn [17]: plt.figure(figsize=(10,\

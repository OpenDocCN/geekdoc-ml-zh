    It turns out portfolio VaR is less that the sum of individual VaRs, which makes
    no sense due to the risk mitigation throght diversification. More elaborately,
    portfolio VaR should be lower than the sum of individual VaRs via divesification
    as divesification mitigates risk, which in turn have a reduce the portfolio VaR.


    3) Positive homogeneity: For all outcomes Y and a>0, we have

    $$VaR(aY) = aVaR(L)$$

    It implies that risk and value of the portfolio go in tandem, that is, if value
    of a portfolio increases by an amount of a, the risk goes up by an amount of a.


    4) Monotonicity: For any 2 outcomes, $Y_1$ and $Y_2$ if $Y_1 \le Y_2$, then

    $$VaR(Y_1) \ge VaR(Y_2)$$

    At first, it may seem puzzling but it is intuitive. Monotonicity indicates that
    an asset with higher return has a less VaR.


    In the light of above discussion, we now know that VaR is not a coherent risk
    measure. But do not worry, VaR is not the only tool by which we estimate market
    risk. Expected shortfall is another and coherent market risk measure.



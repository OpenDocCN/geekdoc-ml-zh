    \nFigure 2-19. Autoregressive Model Prediction Results\n\n## Autoregressive Integrated\
    \ Moving Average Model\n\nAutoregressive Integrated Moving Average Model, ARIMA\
    \ for short, is a function of past values of a time series and white noise. However,\
    \ ARIMA is proposed as a generalization of AR and MA but they do not have integration\
    \ parameter, which helps us to feed model with the raw data. To this respect,\
    \ even if we include non-stationary data, ARIMA makes it stationary by properly\
    \ defining the integration parameter.\n\nARIMA has three parameters, namely p,\
    \ d, q. As we are familiar from previous time series models p and q refer to order\
    \ of AR and MA, respectively. But d controls for level difference. If d=1, it\
    \ amounts to first difference and if it takes the value of 0, it means that the\
    \ model is ARMA.\n\nIt is possible to have d greater than one but it is not as\
    \ common as having d of 1. The ARIMA (p,1,q) equation has the following structure:\n\
    \n```\n$X_t = \\alpha_1 dX_{t-1} + \\alpha_2 dX_{t-2}... + \\alpha_p dX_{t-p}\
    \ + \\epsilon_t + \\beta_1 d\\epsilon_{t-1} + \\beta_2 d\\epsilon_{t-2}... + \\\
    beta_q d\\epsilon_{t-q}$\n```\n\nwhere d refers to difference.\n\nAs it is widely\
    \ embraced and applicable model, Let us discuss the pros and cons of the ARIMA\
    \ model to get more familiar with the model.\n\n### Pros\n\n- ARIMA allows us\
    \ to work with raw data without considering if it is stationary.\n- It performs\
    \ well with high-frequent data.\n- It is less sensitive to the fluctuation in\
    \ the data compared to other models.\n\n### Cons\n\n- ARIMA might fail in capturing\
    \ seasonality.\n- It work better with a long series and short-term (daily, hourly)\
    \ data.\n- As no automatic updating occurs in ARIMA, no structural break during\
    \ the analysis period should be observed.\n- Having no adjustment in the ARIMA\
    \ process leads to instability.\n\nNow, we will show how ARIMA works and performs\
    \ using the same stocks, namely Apple and Microsoft.\n\nIn [48]: from statsmodels.tsa.arima_model\
    \ import ARIMA\n\nIn [49]: split = int(len(stock_prices['AAPL'].values) * 0.95)\n\

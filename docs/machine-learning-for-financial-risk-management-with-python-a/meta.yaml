    # Moral Hazard


    Market failures also result from asymmetric information. In moral hazard situation,
    one party of the contract assumes more risk than the other party. Formally, moral
    hazard may be defined as a situation in which more informed party takes advantages
    of the private information at his disposal to the detriment of others.


    For a better understanding of moral hazard, a simple example can be given from
    the credit market: Suppose that entity A demands credit for use in financing the
    project, which is considered as feasible to finance. Moral hazard arises if entity
    A utilizes the loan for the payment of credit debt to bank C, without prior notice
    to the lender bank. While allocating credit, the moral hazard situation that banks
    may encounter arises as a result of asymmetric information, decreases banks’ lending
    appetites and appears as one of the reasons why banks put so much labor on credit
    allocation process.'

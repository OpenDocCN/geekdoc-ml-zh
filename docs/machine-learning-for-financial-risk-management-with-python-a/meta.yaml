    # Conclusion


    Volatility prediction is a key to understand the dynamics of financial market
    in the sense that it helps us to gauge the uncertainty. With that being said,
    it is used as input in many financial model including risk models. These facts
    emphasize the importance of having accurate volatility prediction. Traditionally,
    parametric methods such ARCH, GARCH and their extensions have been extensively
    used but these models suffer from being inflexible. To remedy this issue, data-driven
    models are found promising and this chapter attempts to make use of these models,
    namely, Support Vector Machines, Neural Network, and Deep Learning-based models,
    and it turns out data-driven model outperforms the parametric models.'

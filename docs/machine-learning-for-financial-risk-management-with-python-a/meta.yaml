- img_proc: true
  md: 'interpretation. Unlike frequentists, Bayesian statisticians consider the probability
    distribution as uncertain and it is revised as new information comes in.


    Due to the different interpretation of the probability of these two approaches,
    likelihood, defined as, given a set of parameters, the probability of observed
    event, is computed differently.


    Starting from joint density function, we can give the mathematical representation
    of likelihood function:


    $\mathcal{L}(\theta|x_1, x_2, \dots, x_p) = \text{Pr} (x_1, x_2, \dots, x_p|\theta)$


    Among possible $\theta$ values, what we are trying to do is to decide which one
    is more likely. Under the statistical model proposed by likelihood function, the
    observed data $x_1, \dots, x_p$ is the most probable.


    In fact, you are familiar with the method based on the approach, which is maximum
    likelihood estimation. Having defined the main difference between Bayesian and
    Frequentist approaches, it is time to delve more into the Bayes’ Theorem.


    # Bayes’ Theorem


    Bayesian approach is based on conditional distribution, which states that probability
    gauges the extent to which one has about a uncertain event. So, Bayesian application
    suggests a rule that can be used to update the beliefs that one holds in light
    of new information:


    > Bayesian estimation is used when we have some prior information regarding a
    parameter. For example, before looking at a sample to estimate the mean of a distribution,
    we may have some prior belief that it is close to 2, between 1 and 3. Such prior
    beliefs are especially important when we have a small sample. In such a case,
    we are interested in combining what the data tells us, namely, the value calculated
    from the sample, and our prior information.


    — (Rachev et al., 2008)'
  merge: -1
  pgno: 133
- img_proc: true
  md: 'Similar to the frequentist application, Bayesian estimation is based on probability
    density Pr ($x|\theta$). However, as we have discussed before, the way Bayesian
    and frequentist methods treat parameter set $\theta$ differently. Frequentist
    assumes $\theta$ to be fixed whereas it is, in Bayesian setting, taken as random
    variable, whose probability is known as prior density Pr ($\theta$). Oh no! We
    have another different term but no worries it is easy to understand.


    In the light of this information, we can estimate $\mathcal{L}(x|\theta)$ using
    prior density Pr ($\theta$) and we come up with the following formula. Prior is
    employed when we need to estimate the conditional distribution of the parameters
    given observations.


    $$\Pr(\theta|x_1, x_2, \dots, x_p) = \frac{\mathcal{L}(x_1, x_2, \dots, x_p|\theta)
    \Pr(\theta)}{\Pr(x_1, x_2, \dots, x_p)}$$


    or


    $$\Pr(\theta|data) = \frac{\mathcal{L}(data|\theta) \Pr(\theta)}{\Pr(data)}$$


    where


    +   - $\Pr(\theta|data)$ is the posterior density,which gives us the information
    about the parameters given observed data.

    - $\mathcal{L}(data|\theta)$ is the likelihood function, which estimates the probability
    of the data given parameters.

    - $\Pr(\theta)$ is prior probability. It is the probability of the parameteres.
    Prior is basicallt the initial beliefs about estimates.

    - Finally, Pr is the evidence, which is used to update the prior.


    Consequently, Bayes’ Theorem suggests that the posterior density is directly proportional
    to the prior and likelihood terms but inverserly related to the evidence term.
    As the evidence is there for scaling, we can describe this process as:'
  merge: -1
  pgno: 134

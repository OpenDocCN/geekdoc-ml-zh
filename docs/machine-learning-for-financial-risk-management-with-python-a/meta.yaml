  md: "At this conjecture, it is worthwhile discussing the alternative method for\
    \ optimum lag selection for time series models. AIC is the method that I apply\
    \ here to select the proper number of lags. Please note that, even though the\
    \ result of the AIC suggests (4, 0, 4), the model does not convergence with this\
    \ orders. So, (4, 1, 4) is applied instead.\n\n```\nIn [55]: import itertools\n\
    ```\n\n```\nIn [56]: p = q = range(0, 9)❶\n        d = range(0, 3)❷\n        pdq\
    \ = list(itertools.product(p, d, q))❸\n        arima_results_aapl = []❹\n    \

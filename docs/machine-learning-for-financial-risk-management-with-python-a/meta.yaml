    +   - Input layer

    - Hidden layer

    - Output layer


    Input layer includes raw data. In going from input layer to hidden layer, we learn
    coefficients. There may be one or more than one hidden layers depending on the
    network structuree. The more hidden layer the network has, the more complicated
    it is. Hidden layer, locating between inout and output layers, perform nonlinear
    transformation via activation function.


    Finally, output layer is the layer in which output is produced and decision is
    made.


    In Machine Learning, Gradient Descent is the tool applied to minimize the cost
    function but employing only gradient descent in neural network is not feasible
    due to the chain-like structure in neural network. Thus, a new concept known as
    backpropagation is proposed to minimize the cost function. The idea of backpropagation
    rest upon the calculating error between observed and actual output and pass this
    error to the hidden layer. So, we move backward and the main equation takes the
    form of:


    $$\delta^l = \frac{\delta J}{\delta z^l_j}$$



    \nFigure 1-1. Risk-Return Relationship\n\nFigure 1-1, generated via the above-given\
    \ Python code, confirms that the risk and return goes in tandem but the magnitude\
    \ of this correlation varies depending on the individual stock and the financial\
    \ market conditions.\n\n## Risk Management\n\nFinancial risk management is a process\
    \ to deal with the uncertainties resulting from financial markets. It involves\
    \ assessing the financial risks facing an organization and developing management\
    \ strategies consistent with internal priorities and policies (Horcher, 2011).\n\
    \nAccording to this definition, as every organization faces different type of\
    \ risks, the way that a company deals with it is completely unique. Every company\
    \ should properly assess and take necessary action against risk. It, however,\
    \ does not necessarily mean that once a risk is identified, it needs to be mitigated\
    \ as much as a company can do.\n\nRisk management is, therefore, not about mitigating\
    \ risk at all costs. Mitigating risk may require sacrificing return and it can\
    \ be tolerable up to certain level as companies are searching for higher return\
    \ as much as lowering risk. Thus, to maximize profit while lowering the risk should\
    \ be delicate and well-defined task.\n\nManaging risk is a delicate task as it\
    \ comes with a cost and even though dealing with it requires specific company\
    \ policies, there exists a general framework for possible risk strategies. These\
    \ are:\n\n- *Ignore*: In this strategy, companies accept all risks and their consequences\
    \ and prefer to do nothing.\n- *Transfer*: This strategy involves transferring\
    \ the risks to a third-party by hedging or some other ways.\n- *Mitigate*: Companies\
    \ develop a strategy to mitigate risk partly because its harmful effect might\
    \ be considered too much to bear and/or suppress the benefit attached to it.\n\
    - *Accept risk*: If companies embrace the strategy of *accepting the risk*, they\
    \ properly identify risks and acknowledge the benefit of them. In other words,\
    \ when assuming certain risks arising from some activities bring values to shareholder,\
    \ this strategy can be picked.\n\n## Main Financial Risks\n\nFinancial companies\
    \ face various risks over their business life. These risks can be divided into\
    \ different categories in a way to identify and assess in an easier manner. These\
    \ main financial risk types are market risk, credit risk, operational risk, and\
    \ liquidity risk but again this is not an exhaustive list. However, we confine\
    \ our attention to the main financial risk types throughout the book. Let’s take\
    \ a look at these risk categories.\n\n## Market Risk\n\nThis risk arises due to\
    \ a change in factors in financial market. To be clearer, for instance, an increase\
    \ in *interest rate* might badly affect a company, which has a short position.\n\
    \nA second example can be given about another source of market risk; *exchange\
    \ rate*. A company involving international trade, whose commodities are priced\

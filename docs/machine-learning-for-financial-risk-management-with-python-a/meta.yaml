  - '[PAGE 151]


    main four risk types. So, these types of risks will be our focus throughout this
    chapter.


    Market risk is the risk arising from changes on financial indicators such as exchange
    rate, interest rate, inflation and so on. Differently, market risk can be referred
    to a risk of losses in on and off-balance-sheet positions arising from movements
    in market prices (BIS, 2020). Let us now see how these factors affect market risk.
    Suppose that a raise in inflation rate might pose a threat to current profitability
    of the financial institutions with a view to inflation creates pressure to interest
    rate. This, in turn, affects borrower’s cost of funds. These instances can be
    amplified but we should also note the interactions of these financial risk sources.
    That is, while a single source of financial risk changes, other risk sources cannot
    stay constant. With that being said, to some extent, financial indicators are
    interrelated, meaning that interactions of these risks sources should be taken
    into account.


    As you can imagine, there are different tools to measure market risk. Of them,
    the most prominent and widely acceptable tools are Value-at-Risk (VaR) and Expected
    Shortfall (ES). The ultimate aim of this chapter is to augment these approaches
    using recent developments in Machine Learning. At this juncture, it would be tempting
    to ask: Does the traditional model fail in finance? And what makes the ML-based
    model different?


    I will start tackling the first question. The first and foremost challenge that
    traditional models unable to address is the complexity of the financial system.
    Due either to the some strong assumptions or simply inability to capture the complexity
    introduced by the data, long-standing traditional models has been started to be
    replaced by ML-based models.


    This fact is well put by Prado:


    > Considering the complexity of modern financial systems, it is unlikely that
    a researcher will be able to uncover the ingredients of a theory by visual inspection
    of the data or by running a few regressions.

    —Prado (Machine Learning for Asset Managers, 2020, p.4)'
  - '[PAGE 152]


    To address the second question, it would be wise to think about the working logic
    of ML models. ML models, as opposed to old statistical methods, tries to unveil
    the association between variables, identify key variables, and enable us to to
    find out the impact of the variables on the dependent variable without a need
    of a well established theory. This is, in fact, the beauty of ML model as ML models,
    without requiring many restrictive and strong assumptions, allow us to discover
    theories, let alone require them.


    > Many methods from statistics and machine learning (ML) may, in principle, be
    used for both prediction and inference. However, statistical methods have a long-standing
    focus on inference, which is achieved through the creation and fitting of a project-specific
    probability model... By contrast, ML concentrates on prediction by using general-pur-
    pose learning algorithms to find patterns in often rich and unwieldy data.

    —Bzdok (Statistics versus machine learning, 2018, p.232)


    In the following part, we initiate our discussion on the market risk models. We,
    first, talk about the application of Value-at-Risk (VaR) and Expected Shortfall
    (ES). Subsequent to the traditional application of these models, we will learn
    how to them using the ML-based approach. Let’s jump in.


    # Value-at-Risk


    The emergence of VaR model rests upon a request for a JP Morgan executive who
    wanted to have a summary report showing possible losses as well as risks in one
    day that JP Morgan is exposed to. In this report, executives are informed about
    the risk assumed by the institution in an aggregated manner. The method by which
    market risk is computed is known as VaR. So, it is the starting point of VaR and,
    now, it has become so widespread that its adoption has been forced by regulators.


    The adoption of VaR dates back to 1990s and despite numerous extensions to VaR
    and new proposed models, it is still in use. So, what makes it so appealing? maybe
    the question to be addressed. The answer comes from Kevin Dowd:'
  - '[PAGE 153]


    > The VaR figure has two important characteristics. The first is that it provides
    a common consistent measure of risk across different positions and risk factors.
    It enables us to measure the risk associated with a fixed-income position, say,
    in a way that is comparable to and consistent with a measure of the risk associated
    with equity positions. VaR provides us with a common risk yardstick, and this
    yardstick makes it possible for institutions to manage their risks in new ways
    that were not possible before. The other characteristic of VaR is that it takes
    account of the correlations between different risk factors. If two risks offset
    each other, the VaR allows for this offset and tells us that the overall risk
    is fairly low.


    —Dowd (2002, p.10)


    In fact, VaR basically address one of the most common question of an investor:


    Given the risk level, what is the maximum expected loss of my investment?


    VaR provides a very intuitive and practical answer to this question. In this regard,
    it is used to measure the worst expected loss of a company over a given period
    and a pre-defined confidence interval. Suppose that a daily VaR of an investment
    is $10 million with 95% confidence interval. This reads as: There is a 5% chance
    that investor can incur a loss greater than $10 million loss in a day.


    Based on the above-given definition, it turns out that the components of VaR are
    confidence interval, time period, value of an asset or portfolio and standard
    deviation as we are talking about risk.


    In summary, there are some important points in VaR analysis that needs to be highlighted:


    +   - VaR needs an estimation of the probability of loss

    - VaR concentrates on the potential losses. We are not talking about actual or
    realized losses rather VaR is a kind of loss projection

    - VaR has three key ingredients:'
  - '[PAGE 154]


    +   - Standard deviation that defines the level of loss

    - Fixed time horizon over which risk is assessed

    - Confidence Interval


    Well, VaR can be measured via three different approaches:


    +   - Variance-Covariance VaR

    - Historical Simulation VaR

    - Monte-Carlo VaR


    # Variance-Covariance Method


    Variance-Covariance Method is also known as parametric method, because the data
    is assumed to be normally distributed. Variance-Covariance method is commonplace
    due to this assumption, however it is worth noting that returns are not normal
    distributed. Parametric form assumption makes the application of Variance-Covariance
    method practical and easy-to-apply.


    As in all VaR approaches, we can either work with single asset or a portfolio.
    However, working with portfolio requires careful treatment in the sense that correlation
    structure and portfolio variance need to be estimated. Exactly at this point,
    correlation comes into the picture and historical data is used to calculate correlation,
    mean, and standard deviation. While augmenting this with ML-based approach, correlation
    structure will be our main focus.


    Suppose that we have a single asset, in Figure 5-1, it is shown that the mean
    of this asset is zero and standard deviation is 1 and if the holding period is
    1, the corresponding VaR value can be computed the value of the asset by corresponding
    Z-value and standard deviation. Hence, normality assumption makes things easier
    but it is a strong assumption because there is no guarantee that asset returns
    are normally distributed rather most of the asset returns do not follow normal
    distribution. Moreover, due to the normality'
  - '[PAGE 155]


    assumption, potential risk in tail might not be captured. Therefore normality
    assumption comes with a cost.



    # Bayesian Approach


    The way we approach to the probability is of central importance in the sense that
    it distinguishes the classical (or frequentist) and Bayesian approach. According
    to the former method, the relative frequency will converge to the true probability.
    However, Bayesian application is based on the subjective'
  merge: -1

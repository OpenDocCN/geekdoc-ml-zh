    It implies that risk and value of the portfolio go in tandem, that is, if value
    of a portfolio increases by an amount of a, the risk goes up by an amount of a.


    4) Monotonicity: For any 2 outcomes, $Y_1$ and $Y_2$ if $Y_1 \le Y_2$, then

    $$VaR(Y_1) \ge VaR(Y_2)$$

    At first, it may seem puzzling but it is intuitive. Monotonicity indicates that
    an asset with higher return has a less VaR.



    \n```python\nIn [68]: prin_comp1_rescaled = prin_comp.iloc[:,0] * prin_comp.iloc[:,0].std()\\\
    n                  + prin_comp.iloc[:, 0].mean()❶\n        prin_comp2_rescaled\

  md: '# Autoregressive Integrated Moving Average Model


    Autoregressive Integrated Moving Average Model, ARIMA for short, is a function
    of past values of a time series and white noise. However, ARIMA is proposed as
    a generalization of AR and MA but they do not have intergration parameter, which
    helps us to feed model with the raw data. To this respect, even if we include
    non-stationary data, ARIMA makes it stationary by properly defining the integration
    parameter.


    ARIMA has three parameters, namely p, d, q. As we are familiar from previous time
    series models p and q refer to order of AR and MA, respectively. But d controls
    for level difference. If d=1, it amounts to first difference and if it takes the
    value of 0, it means that the model is ARMA.


    It is possible to have d greater than one but it is not as common as having d
    of 1. The ARIMA (p,1,q) equation has the following structure:


    ```

    $X_t = \alpha_1 dX_{t-1} + \alpha_2 dX_{t-2}... + \alpha_p dX_{t-p} + \epsilon_t
    + \beta_1 d\epsilon_{t-1} + \beta_2 d\epsilon_{t-2}... + \beta_q d\epsilon_{t-q}$

    ```


    where d refers to difference.


    As it is widely embraced and applicable model, Let us discuss the pros and cons
    of the ARIMA model to get more familiar with the model.


    # Pros


    +   - ARIMA allows us to work with raw data without considering if it is stationary.

    - It performs well with high-frequent data.

    - It is less sensitive to the fluctuation in the data compared to other models.


    # Cons


    +   - ARIMA might fail in capturing seasonality.

    - It work better with a long series and short-term (daily, hourly) data.

    - As no automatic updating occurs in ARIMA, no structural break during the analysis
    period should be observed.

    - Having no adjustment in the ARIMA process leads to instability.'

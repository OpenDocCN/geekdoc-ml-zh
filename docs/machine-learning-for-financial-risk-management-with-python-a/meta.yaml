- md: "## Relation of number of observations T to the number of variables N.\n2. Identifying\
    \ the bandwidth for kernel density estimation.\n3. Generating the denoised covariance\
    \ matrix.\n4. Incorporating the denoised covariance matrix into the VaR formula.\n\
    \nThe difference of the traditionally applied VaR and the denoised VaR are even\
    \ more pronounced in the crisis period. During crisis period, correlation among\
    \ assets becomes higher, it is sometimes referred to as *correlation breakdown*.\
    \ The likely consequences of correlation breakdown can be twofold:\n\n- An increase\
    \ on market risk that makes diversification becomes less effective.\n- Making\
    \ hedging even more difficult.\n\nIn order to check this phenomenon, we consider\
    \ the 2017-2018 financial crisis period and the exact crisis period is obtained\
    \ from NBER, which announces business cycles (see [https://www.nber.org/research/data/us-business-cycle-expansions-and-contractions](https://www.nber.org/research/data/us-business-cycle-expansions-and-contractions)\
    \ for further information).\n\nThe result confirms that the correlation and thereby\
    \ VaR becomes higher during crisis period.\n\nNow, we manage to obtained ML-based\
    \ VaR using denoised covariance matrix in lieu of empirical matrix that we calculate\
    \ directly from the data. Despite its appealing and easiness VaR is not a coherent\
    \ risk measure. Being a coherent risk measure requires certain conditions or axioms\
    \ to satisfy. You can think of these axioms as a technical requirements for a\
    \ risk measure.\n\nLet $\\alpha \\in (0, 1)$ be fixed confidence level and $(\\\
    Omega, \\mathcal{F}, P)$ be a probability space in which $\\Omega$ represents\
    \ a sample space, $\\mathcal{F}$ denotes subset of sample space, and $P$ is probability\
    \ measure.\n\n> **NOTE**\n\nTo illustrate, say $\\omega$ is the set of all possible\
    \ outcomes in the event of tossing a coin, $\\omega=\\{H,T\\}$. $\\mathscr{F}$\
    \ can be treated as tossing a coin twice, $F=2^{|\\omega|}=2^2$. Finally, probability\
    \ measure, P, is the odds of getting tails is 0.5.\n\nHere is the four axioms\
    \ of a coherent risk measure:\n\n1) Translation Invariance: For all outcomes Y\
    \ and a constant $a \\in \\mathscr{R}$, we have\n\n$$VaR(Y_1 + Y_2) = VaR(Y) +\
    \ a$$\n\nIt means that if a riskless amount of a is added to the portfolio, it\
    \ results in lower VaR by the amount of a.\n\n2) Sub-additivity: For all $Y_1$\
    \ and $Y_2$ we have\n\n$$VaR(Y_1 + Y_2) \\leq VaR(Y_1) + VaR(Y_2)$$\n\nThis axiom\
    \ stress the importance of diversification in risk management. Take $Y_1$ and\
    \ $Y_2$ as two assets if you both are included in the portfolio, then it results\
    \ in lower Value-at-Risk than including them separately. Let’s check whether or\
    \ not VaR satisfy sub-additivity assumption:\n\n```\nIn [41]: asset1 = [-0.5,\
    \ 0, 0.1, 0.4]❶\n        VaR1 = np.percentile(asset1, 90)\n        print('VaR\
    \ for the Asset 1 is {:.4f}'.format(VaR1))\n        asset2 = [0, -0.5, 0.01, 0.4]❷\n\
    \        VaR2 = np.percentile(asset2, 90)\n        print('VaR for the Asset 2\
    \ is {:.4f}'.format(VaR2))\n        VaR_all = np.percentile(asset1 + asset2, 90)\n\
    \        print('VaR for the portfolio is {:.4f}'.format(VaR_all))\n        VaR\
    \ for the Asset 1 is 0.3100\n        VaR for the Asset 2 is 0.2830\n        VaR\
    \ for the portfolio is 0.4000\n\nIn [42]: asset1 = [-0.5, 0, 0.05, 0.03]❶\n  \
    \      VaR1 = np.percentile(asset1, 90)\n        print('VaR for the Asset 1 is\
    \ {:.4f}'.format(VaR1))\n        asset2 = [0, -0.5, 0.02, 0.8]❷\n        VaR2\
    \ = np.percentile(asset2,90)\n        print('VaR for the Asset 2 is {:.4f}'.format(VaR2))\n\
    \        VaR_all = np.percentile(asset1 + asset2 , 90)\n        print('VaR for\
    \ the portfolio is {:.4f}'.format(VaR_all))\n        VaR for the Asset 1 is 0.0440\n\
    \        VaR for the Asset 2 is 0.5660\n        VaR for the portfolio is 0.2750\n\
    ```\n\n- Asset return for the first asset\n- Asset return for the second asset\n\
    \nIt turns out portfolio VaR is less that the sum of individual VaRs, which makes\
    \ no sense due to the risk mitigation through diversification. More elaborately,\
    \ portfolio VaR should be lower than the sum of individual VaRs via diversification\
    \ as diversification mitigates risk, which in turn have a reduce the portfolio\
    \ VaR.\n\n3) Positive homogeneity: For all outcomes Y and a>0, we have\n$$VaR(aY)\
    \ = aVaR(L)$$\nIt implies that risk and value of the portfolio go in tandem, that\
    \ is, if value of a portfolio increases by an amount of a, the risk goes up by\
    \ an amount of a.\n\n4) Monotonicity: For any 2 outcomes, $Y_1$ and $Y_2$ if $Y_1\
    \ \\le Y_2$, then\n$$VaR(Y_1) \\ge VaR(Y_2)$$\nAt first, it may seem puzzling\
    \ but it is intuitive. Monotonicity indicates that an asset with higher return\
    \ has a less VaR.\n\nIn the light of above discussion, we now know that VaR is\
    \ not a coherent risk measure. But do not worry, VaR is not the only tool by which\
    \ we estimate market risk. Expected shortfall is another and coherent market risk\
    \ measure.\n\n# Expected Shortfall\n\nUnlike VaR, Expected Shortfall focuses on\
    \ the tail of the distribution. More elaboratively, Expected Shortfall enable\
    \ us to take into account the unexpected risks in the market. However, it does\
    \ not mean that Expected Shortfall and VaR are two entirely different concepts.\
    \ Rather, they are related, that is, it is possible to express Expected Shortfall\
    \ using VaR.\n\nLet us now assume that loss distribution is continuous, then Expected\
    \ Shortfall can be mathematically defined as:\n\n$$ES_{\\alpha} = \\frac{1}{1-\\\
    alpha} \\int_{\\alpha}^{1} q_u du$$\n\nwhere q denotes quantile of the loss distribution.\
    \ Expected Shortfall formula suggests that it is nothing but a probability weights\
    \ average of $(1 - \\alpha)\\%$ of losses.\n\nLet us substitute $q_u$ and VaR,\
    \ which gives us the following equation:\n\n$$ES_{\\alpha} = \\frac{1}{1-\\alpha}\
    \ \\int_{\\alpha}^{1} VaR_u du$$\n\nAlternatively, it is mean of losses exceeding\
    \ VaR as shown below:\n\n$$ES_{\\alpha} = E(L|L > VaR_{\\alpha})$$\n\nLoss distribution\
    \ can be continuous or discrete and, as you can imagine, if it takes the discrete\
    \ form, the Expected Shortfall becomes different as given below:\n\n$$ES_{\\alpha}\
    \ = \\frac{1}{1-\\alpha} \\sum_{n=0}^{1} max(L_n) * P(L_n)$$\n\nwhere $max(L_n)$\
    \ shows the highest nth loss and $Prob(L_n)$ indicates probability of pth highest\
    \ loss.\n\n```\nIn [43]: def ES_parametric(initial_investment , conf_level):\n\
    \            alpha = - norm.ppf(1 - conf_level,stocks_returns_mean,port_std)\n\
    \            for i,j in zip(stocks.columns, range(len(stocks.columns))):\n   \
    \             VaR_param = (initial_investment * alpha)[j]❶\n                ES_param\
    \ = (1 / (1 - conf_level)) * norm.expect(lambda x:\nVaR_param,\n             \
    \                                                    lb = conf_level)❷\n     \
    \           print(f\"Parametric ES result for {i} is {ES_param}\")\n\nIn [44]:\
    \ ES_parametric(initial_investment, conf_level)\n        Parametric ES result\
    \ for IBM is 144370.82004213505\n        Parametric ES result for MSFT is 138959.76972934653\n\
    \        Parametric ES result for INTC is 146091.9565067016\n```\n\n- Estimating\
    \ the Variance-Covariance VaR.\n- Given confidence interval, estimating the ES\
    \ based on VaR.\n\nES can also be computed based on the historical observations.\
    \ Similar to historical simulation VaR method, parametric assumption can be relaxed.\
    \ To do that, first return (or loss) corresponding to the 95% is found and then\
    \ the mean of the observations greater than the 95% gives us the result. Here,\
    \ this is what we do:\n\n```\nIn [45]: def ES_historical(initial_investment, conf_level):\n\
    \            for i, j in zip(stocks_returns.columns,\nrange(len(stocks_returns.columns))):\n\
    \                ES_hist_percentile95 = np.percentile(stocks_returns.loc[:, i],\
    \ 5)❶\n                ES_historical = stocks_returns[str(i)][stocks_returns[str(i)]\
    \ <=\n                                        ES_hist_percentile95].mean()\n❷\n\
    \                print(\"Historical ES result for {} is {:.4f} \"\n          \
    \            .format(i, initial_investment * ES_historical))\n\nIn [46]: ES_historical(initial_investment,\
    \ conf_level)\n        Historical ES result for IBM is -64802.3898\n        Historical\
    \ ES result for MSFT is -65765.0848\n        Historical ES result for INTC is\
    \ -88462.7404\n```\n\n- Calculating the 95% of the returns.\n- Estimating the\
    \ ES based on the historical observations.\n\nThus far, we have seen how to model\
    \ the expected shortfall in a traditional way. Now, it is time to introduce ML-based\
    \ approach to further enhance the estimation performance and reliability of the\
    \ ES model.\n\n# Liquidity Augmented Expected Shortfall"
  mdcn: "## 观测值数量 T 与变量数量 N 的关系。\n2.  确定核密度估计的带宽。\n3.  生成去噪协方差矩阵。\n4.  将去噪协方差矩阵纳入\
    \ VaR 公式。\n\n传统 VaR 与去噪 VaR 之间的差异在危机时期更为显著。在危机期间，资产之间的相关性会变得更高，这有时被称为*相关性崩溃*。相关性崩溃可能带来的后果是双重的：\n\
    \n-   市场风险增加，导致分散化投资的效果减弱。\n-   使得对冲变得更加困难。\n\n为了验证这一现象，我们考察了 2017-2018 年的金融危机时期，确切的危机时期由美国国家经济研究局（NBER）确定，该机构负责公布商业周期（更多信息请参见\
    \ [https://www.nber.org/research/data/us-business-cycle-expansions-and-contractions](https://www.nber.org/research/data/us-business-cycle-expansions-and-contractions)）。\n\
    \n结果证实，在危机期间，相关性以及 VaR 都会变高。\n\n现在，我们设法使用去噪协方差矩阵（而非直接从数据计算得到的经验矩阵）来获得基于机器学习的 VaR。尽管\
    \ VaR 具有吸引力且易于使用，但它并非一个一致的风险度量。要成为一个一致的风险度量，需要满足某些条件或公理。你可以将这些公理视为风险度量的技术要求。\n\
    \n令 $\\alpha \\in (0, 1)$ 为固定的置信水平，$(\\Omega, \\mathcal{F}, P)$ 为一个概率空间，其中 $\\\
    Omega$ 代表样本空间，$\\mathcal{F}$ 表示样本空间的子集，$P$ 是概率测度。\n\n> **注意**\n\n举例说明，假设 $\\omega$\
    \ 是抛硬币所有可能结果的集合，$\\omega=\\{H,T\\}$（H 代表正面，T 代表反面）。$\\mathscr{F}$ 可以视为抛两次硬币，$F=2^{|\\\
    omega|}=2^2$。最后，概率测度 P 表示得到反面的概率是 0.5。\n\n以下是一致风险度量的四个公理：\n\n1)  平移不变性：对于所有结果\
    \ Y 和常数 $a \\in \\mathscr{R}$，我们有\n\n$$VaR(Y_1 + Y_2) = VaR(Y) + a$$\n\n这意味着，如果向投资组合中加入无风险金额\
    \ a，其 VaR 将减少 a 的数额。\n\n2)  次可加性：对于所有 $Y_1$ 和 $Y_2$，我们有\n\n$$VaR(Y_1 + Y_2) \\\
    leq VaR(Y_1) + VaR(Y_2)$$\n\n此公理强调了分散化在风险管理中的重要性。将 $Y_1$ 和 $Y_2$ 视为两项资产，如果两者都包含在投资组合中，其结果应比单独包含它们时具有更低的在险价值。让我们检查\
    \ VaR 是否满足次可加性假设：\n\n```\nIn [41]: asset1 = [-0.5, 0, 0.1, 0.4]❶\n        VaR1\
    \ = np.percentile(asset1, 90)\n        print('VaR for the Asset 1 is {:.4f}'.format(VaR1))\n\
    \        asset2 = [0, -0.5, 0.01, 0.4]❷\n        VaR2 = np.percentile(asset2,\
    \ 90)\n        print('VaR for the Asset 2 is {:.4f}'.format(VaR2))\n        VaR_all\
    \ = np.percentile(asset1 + asset2, 90)\n        print('VaR for the portfolio is\
    \ {:.4f}'.format(VaR_all))\n        VaR for the Asset 1 is 0.3100\n        VaR\
    \ for the Asset 2 is 0.2830\n        VaR for the portfolio is 0.4000\n\nIn [42]:\
    \ asset1 = [-0.5, 0, 0.05, 0.03]❶\n        VaR1 = np.percentile(asset1, 90)\n\
    \        print('VaR for the Asset 1 is {:.4f}'.format(VaR1))\n        asset2 =\
    \ [0, -0.5, 0.02, 0.8]❷\n        VaR2 = np.percentile(asset2,90)\n        print('VaR\
    \ for the Asset 2 is {:.4f}'.format(VaR2))\n        VaR_all = np.percentile(asset1\
    \ + asset2 , 90)\n        print('VaR for the portfolio is {:.4f}'.format(VaR_all))\n\
    \        VaR for the Asset 1 is 0.0440\n        VaR for the Asset 2 is 0.5660\n\
    \        VaR for the portfolio is 0.2750\n```\n\n-   第一项资产的收益率\n-   第二项资产的收益率\n\
    \n结果表明，投资组合的 VaR 小于各项资产 VaR 之和，这由于通过分散化降低了风险，因此是合理的。更详细地说，通过分散化，投资组合的 VaR 应低于各项资产\
    \ VaR 之和，因为分散化降低了风险，进而降低了投资组合的 VaR。\n\n3)  正齐次性：对于所有结果 Y 和 a>0，我们有\n$$VaR(aY)\
    \ = aVaR(L)$$\n这意味着风险与投资组合的价值同步变化，即如果投资组合的价值增加 a 的数额，风险也增加 a 的数额。\n\n4)  单调性：对于任意两个结果\
    \ $Y_1$ 和 $Y_2$，如果 $Y_1 \\le Y_2$，则\n$$VaR(Y_1) \\ge VaR(Y_2)$$\n起初这可能令人费解，但它是直观的。单调性表明，具有更高回报的资产具有更低的\
    \ VaR。\n\n根据以上讨论，我们现在知道 VaR 不是一个一致的风险度量。但不要担心，VaR 并非我们估计市场风险的唯一工具。预期短缺是另一种一致的市场风险度量。\n\
    \n# 预期短缺\n\n与 VaR 不同，预期短缺关注分布的尾部。更详细地说，预期短缺使我们能够考虑市场中的意外风险。然而，这并不意味着预期短缺和 VaR\
    \ 是两个完全不同的概念。相反，它们是相关的，即可以用 VaR 来表达预期短缺。\n\n现在让我们假设损失分布是连续的，那么预期短缺可以数学定义为：\n\n\
    $$ES_{\\alpha} = \\frac{1}{1-\\alpha} \\int_{\\alpha}^{1} q_u du$$\n\n其中 q 表示损失分布的分位数。预期短缺公式表明，它不过是\
    \ $(1 - \\alpha)\\%$ 损失的概率加权平均值。\n\n让我们代入 $q_u$ 和 VaR，得到以下等式：\n\n$$ES_{\\alpha}\
    \ = \\frac{1}{1-\\alpha} \\int_{\\alpha}^{1} VaR_u du$$\n\n或者，它是超过 VaR 的损失的均值，如下所示：\n\
    \n$$ES_{\\alpha} = E(L|L > VaR_{\\alpha})$$\n\n损失分布可以是连续的或离散的，正如你可以想象的，如果它是离散形式，预期短缺会有所不同，如下所示：\n\
    \n$$ES_{\\alpha} = \\frac{1}{1-\\alpha} \\sum_{n=0}^{1} max(L_n) * P(L_n)$$\n\n\
    其中 $max(L_n)$ 表示第 n 个最高损失，$Prob(L_n)$ 表示第 p 个最高损失的概率。\n\n```\nIn [43]: def ES_parametric(initial_investment\

  md: "> NOTE\n\nLiquidity can be defined as the easiness of the trasaction with which\
    \ assets can be sold in a very short time period without a significant impact\
    \ on market price. There are two main measures of liquidity:\n\n*   Market liquidity:\
    \ The ease with which an asset is traded.\n*   Funding liquidity: The ease with\
    \ which investor can obtain funding.\n\nLiquidity and the risk arising from it\
    \ will be discussed in a greater detail in Chapter-7. So, much of the discussion\
    \ is left to this chapter.\n\nIn the literature, bid-ask spread measures are commonly\
    \ used for modeling liquidity. Shortly, bid-ask spread is the difference of bid-ask\
    \ prices. Put differently, it is the difference between the highest available\
    \ price (bid price) that a buyer is willing to pay and the lowest price (ask price)\
    \ that a seller is willing to get. So, bid-ask spread gives a tool to measure\
    \ the transaction cost.\n\nTo the extent that bid-ask spread is a good indicator\
    \ of transaction cost, it is also a good proxy of liquidity in the sense that\
    \ transaction cost is one of the components of liquidity. Spreads can be defined\
    \ various ways depending on their focus. Here is the bid-ask spreads that we will\
    \ use to incorporate liquidity risk into ES model.\n\n+   *   Effective Spread\n\
    \n    Effective Spread $= 2 * |(P_t - P_{mid})|$\n\n    where $P_t$ is the price\
    \ of trade at time t and $P_{mid}$ is the midpoint of the bid-ask offer ($ (P_{ask}\
    \ - P_{bid})/2 $) prevailing at the time of the $t$.\n\n*   Proportional Quoted\
    \ Spread\n\n    Proportional Quoted Spread $= (P_{ask} - P_{bid})/P_{mid}$\n\n\
    \    where $P_{ask}$ is the ask price and $P_{bid}$ and $P_{mid}$ are bid price\
    \ and mid price, respectively."

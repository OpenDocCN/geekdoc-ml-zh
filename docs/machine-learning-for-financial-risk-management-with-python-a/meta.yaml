- md: '## Conclusion


    Market risk has been always under scrutiny as it gives us the extent to which
    a company is vulnerable to risk emanating from market events. In a financial risk
    management textbook, it is customary to find a VaR and ES model, which are two
    prominent and commonly applied model in theory and practice. In this chapter,
    after providing an introduction to these models, a cutting edge models are introduced
    to revisit and improve model estimation. To this end, first we try to distinguish
    information flowing in the form of noise and signal, which is called denoising.
    In what follows, denoised covariance matrix is employed to improve the VaR estimation.
    Then, ES model are discussed as a coherent risk measure. The method that we applied
    to improve this model is liquidity-based approach by which we revisit eS model
    and augment using liquidity component so that it is possible to consider liquidity
    risk in estimating ES.


    Further improvements in market risk estimation are also possible but the aim is
    to give an idea and tools to provide a decent ground for ML-based market risk
    approaches. However, you can go further and apply different tools. In the next
    chapter, we will discuss the credit risk modeling suggested by regulatory bodies
    such as the Basel Committee on Banking Supervision (BCBS) and enrich this model
    using ML-based approach.



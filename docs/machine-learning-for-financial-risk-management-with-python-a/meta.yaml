  md: '# Cyclicality


    What if data does not show fixed period movements? At this point, cyclicality
    comes into the picture. It exists when higher periodic variation than the trend
    emerges. Some confuse cyclicality and seasonality in a sense that they both exhibit
    expansion and contraction. We can, however, think of cyclicality as business cycles,
    which takes a long time to complete its cycle and the ups and downs over a long
    horizon. So, cyclicality is different from seasonality in the sense that there
    is no fluctuation in a fixed period. An example for cyclicality may be the house
    purchases (or sales) depending on mortgage rate. That is, when a mortgage rate
    is cut (or raise), it leads to a boost for house purchase (or sales).


    # Residual


    Residual is known as irregular component of time series. Technically speaking,
    residual is equal to the difference between observations and related fitted values.
    So, we can think of it as a left over from the model.


    As we have discussed before time series models lack in some core assumptions but
    it does not necessarily mean that time series models are free from assumptions.
    I would like to stress the most prominents one, which is called *stationarity*.


    Stationarity means that statistical properties such as mean, variance, and covariance
    of the time series do not change over time.


    There are two forms of stationarity:


    1) Weak Stationarity: Time series, $X_t$, is said to be stationarity if


    +   - $X_t$ has finite variance, $\mathbb{E}(X_t^2) < \infty, \forall t \in \mathbb{Z}$

    - Mean value of $X_t$ is constant and does solely depend on time, $\mathbb{E}(X_t)
    = \mu, t \forall \in \mathbb{Z}$

    - Covariance structure, $\gamma(t, t+h)$, depends on the time difference only:


    $\gamma(h) = \gamma_h + \gamma(t+h, t)$


    In words, time series should have finite variance with constant mean, and covariance
    structure that is a function of time difference.'
  merge: -1
  pgno: 40
- img_proc: true
  md: "2) Strong Stationarity: If the joint distribution of $X_{t1}, X_{t2}, \\dots\
    \ X_{tk}$ is the same with the shifted version of set $X_{t1+h}, X_{t2+h}, \\\
    dots X_{tk+h}$, it is referred to as strong stationarity. Thus, strong stationarity\
    \ implies that distribution of random variable of a random process is the same\
    \ with shifting time index.\n\nThe question is now why do we need stationarity?\
    \ The reason is two fold.\n\nFirst, in the estimation process, it is essential\
    \ to have some distribution as time goes on. In other words, if distribution of\
    \ a time series change over time, it becomes unpredictable and cannot be modeled.\n\
    \nThe ultimate aim of time series models is forecasting. To do that we should\
    \ estimate the coefficients first, which corresponds to learning in Machine Learning.\
    \ Once we learn and conduct forecasting analysis, we assume that the distribution\
    \ of the data in estimation stays the same in a way that we have the same estimated\
    \ coefficients. If this is not the case, we should re-estimate the coefficients\
    \ because we are unable to to forecast with the previous estimated coefficients.\n\
    \nHaving structural break such as financial crisis generates a shift in distribution.\
    \ We need to take care of this period cautiously and separately.\n\nThe other\
    \ reason of having stationarity data is, by assumption, some statistical models\
    \ require stationarity data, but it does not mean that some models requires stationary\
    \ only. Instead, all models require stationary but event if you feed the model\
    \ witn non-stationary data, some model, by design, turn it into stationary one\
    \ and process it. Built-in functions in Python facilitates this analysis as follows:\n\
    \n```\nIn [15]: stat_test = adfuller(SP_prices)[0:2]①\n        print(\"The test\
    \ statistic and p-value of ADF test are {}\".format(stat_test))②\nThe test statistic\
    \ and p-value of ADF test are (0.030295120072926063,\n0.9609669053518538)\n```\n\
    \n+   ① ADF test for stationarity\n② Printing the first four decimals test statistic\
    \ and p-value of ADF test\n\nFigure 2-4 below shows the slow decaying lags amounting\
    \ to non-stationary because persistence of the high correlation between lag of\
    \ the time series continues."

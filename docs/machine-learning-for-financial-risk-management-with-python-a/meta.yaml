  md: 'Up to now, we have discussed the classical volatility models but from this
    point on we will see how Machine Learning and Bayesian Approach can be used to
    model volatility. In the context of Machine Learning, Support Vector Machines
    and Neural Network will be the first models to visit. Let’s get started.


    # Support Vector Regression-GARCH


    Support Vector Machines (SVM) is a supervised learning algorithm, which can be
    applicable to both classification and regression. The aim in SVM is to find a
    line that separate two classes. It sounds easy but here is the challenging part:
    There are almost infinitely many lines that can be used to distinguish the classes.
    But we are looking for the optimal line by which the classes can be perfectly
    discriminated.


    In linear algebra, the optimal line is called *hyperplane*, which maximize the
    distance between the points, which are closest to the hyperplane but belonging
    to different classes. The distance between the two points, i.e., support vectors,
    is known as *margin*. So, in SVM, what we are trying to do is to maximize the
    margin between support vectors.


    SVM for classification is labeled as Support Vector Classification (SVC). Keeping
    all characteristics of SVM, it can be applicable to regression. Again, in regression,
    the aim is to find the hyperplane that minimize the error and maximize the margin.
    This method is called Support Vector Regression (SVR) and, in this part, we will
    apply this method to GARCH model. Combining these two models comes up with a different
    name: *SVR-GARCH*.'

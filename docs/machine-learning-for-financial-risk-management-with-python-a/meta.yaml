  md: '# INFORMATION CRITERIA


    Detecting the optimal number of lag is a cumbersome task. We need to have a criteria
    to decide which model fits best to the data as there may be numerous potentially
    good models. Akaike Information Criteria, a.k.a AIC, as Cavanaugh and Neath (2019)
    denote that


    > AIC is introduced as an extension to the Maximum Likelihood Principle. Maximum
    likelihood is conventionally applied to estimate the parameters of a model once
    structure and dimension of the model have been formulated.


    AIC can be mathematically defined as:


    $AIC = -2ln(MaximumLikelihood) + 2d$


    where d is the total number of parameters. The last term, 2d in the equation aims
    at reducing the risk of overfitting. It is also called as *penalty term* by which
    I can filter out the unnecessary redundancy in the model.


    BIC is the other information criteria used to select best model. The penalty term
    in BIC is larger than that of AIC.


    $BIC = -2ln(MaximumLikelihood) + ln(n) * d$


    where n is the number of observations.


    Please note that you need to treat the AIC with caution if the proposed model
    is finite dimensional. This fact is well put by Clifford and Hurvich (1989):


    > If the true model is infinite dimensional, a case which seems most realistic
    in practice, AIC provides an asymptotically efficient selection of a finite dimensional
    approximating model. If the true model is finite dimensional, however, the asymptotically
    efficient methods, e.g., Akaike''s FPE (Akaike, 1970), AIC, and Parzen''s CAT
    (Parzen, 1977), do not provide consistent model order selections.


    Let''s get started to visit classical time series model with Moving Average model.


    # Moving Average Model'

  md: 'To address the second question, it would be wise to think about the working
    logic of ML models. ML models, as opposed to old statistical methods, tries to
    unveil the association between variables, identify key variables, and enable us
    to to find out the impact of the variables on the dependent variable without a
    need of a well established theory. This is, in fact, the beauty of ML model as
    ML models, without requiring many restrictive and strong assumptions, allow us
    to discover theories, let alone require them.


    > Many methods from statistics and machine learning (ML) may, in principle, be
    used for both prediction and inference. However, statistical methods have a long-standing
    focus on inference, which is achieved through the creation and fitting of a project-specific
    probability model... By contrast, ML concentrates on prediction by using general-pur-
    pose learning algorithms to find patterns in often rich and unwieldy data.

    —Bzdok (Statistics versus machine learning, 2018, p.232)


    In the following part, we initiate our discussion on the market risk models. We,
    first, talk about the application of Value-at-Risk (VaR) and Expected Shortfall
    (ES). Subsequent to the traditional application of these models, we will learn
    how to them using the ML-based approach. Let’s jump in.


    # Value-at-Risk


    The emergence of VaR model rests upon a request for a JP Morgan executive who
    wanted to have a summary report showing possible losses as well as risks in one
    day that JP Morgan is exposed to. In this report, executives are informed about
    the risk assumed by the institution in an aggregated manner. The method by which
    market risk is computed is known as VaR. So, it is the starting point of VaR and,
    now, it has become so widespread that its adoption has been forced by regulators.


    The adoption of VaR dates back to 1990s and despite numerous extensions to VaR
    and new proposed models, it is still in use. So, what makes it so appealing? maybe
    the question to be addressed. The answer comes from Kevin Dowd:'
  merge: -1
  pgno: 152
- img_proc: true
  md: '> The VaR figure has two important characteristics. The first is that it provides
    a common consistent measure of risk across different positions and risk factors.
    It enables us to measure the risk associated with a fixed-income position, say,
    in a way that is comparable to and consistent with a measure of the risk associated
    with equity positions. VaR provides us with a common risk yardstick, and this
    yardstick makes it possible for institutions to manage their risks in new ways
    that were not possible before. The other characteristic of VaR is that it takes
    account of the correlations between different risk factors. If two risks offset
    each other, the VaR allows for this offset and tells us that the overall risk
    is fairly low.


    —Dowd (2002, p.10)


    In fact, VaR basically address one of the most common question of an investor:


    Given the risk level, what is the maximum expected loss of my investment?


    VaR provides a very intuitive and practical answer to this question. In this regard,
    it is used to measure the worst expected loss of a company over a given period
    and a pre-defined confidence interval. Suppose that a daily VaR of an investment
    is $10 million with 95% confidence interval. This reads as: There is a 5% chance
    that investor can incur a loss greater than $10 million loss in a day.


    Based on the above-given definition, it turns out that the components of VaR are
    confidence interval, time period, value of an asset or portfolio and standard
    deviation as we are talking about risk.


    In summary, there are some important points in VaR analysis that needs to be highlighted:


    +   - VaR needs an estimation of the probability of loss

    - VaR concentrates on the potential losses. We are not talking about actual or
    realized losses rather VaR is a kind of loss projection

    - VaR has three key ingredients:'
  merge: -1
  pgno: 153

    # Time Series Models


    Traditional time series models are univariate models and they follow the following
    phases:


    +   - Identification: In this process, we explore the data using ACF, PACF, identifying
    pattern, and conducting statistical tests.

    - Estimation: This part belongs to estimation coefficients via proper optimization
    technique.

    - Diagnostics: Having estimated, we need to check if information criteria or ACF/PACF
    suggest that the model is valid. If so, we move on to forecasting stage.'

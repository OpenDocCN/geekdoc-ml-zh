  md: '> **NOTE**


    The central idea of Root Mean Square Propagation, *RMSprop* for short, is a optimization
    method in which we calculate weighted average of squares gradients and exponential
    average of squares of gradients the moving average of the squared gradients for
    each weight. Then, find the difference of weight, which is to be used to compute
    new weight.


    $$v_t = \rho v_{t-1} + 1 - \rho g_t^2$$


    $$\Delta w_t = -\frac{\nu}{\sqrt{\eta + \epsilon}} g_t$$


    $$w_{t+1} = w_t + \Delta w_t$$



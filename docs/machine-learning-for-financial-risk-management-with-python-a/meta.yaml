    \ the components of a time series by *seasonal_decompose* function:\n\n```\nIn\
    \ [4]: import yfinance as yf\n        import numpy as np\n        import pandas\
    \ as pd\n        import datetime\n        import statsmodels.api as sm\n     \
    \   from statsmodels.tsa.stattools import adfuller\n        from statsmodels.tsa.seasonal\
    \ import seasonal_decompose\n\nIn [5]: ticker = '^GSPC'\n        start = datetime.datetime(2015,\
    \ 1, 1)\n        end = datetime.datetime(2021, 1, 1)\n        SP_prices = yf.download(ticker,\
    \ start=start, end=end, interval='1mo').Close\n```"
- md: "## Trend\n\nTrend indicates a general tendency of an increase or decrease during\
    \ a given time period. Generally speaking, trend is present when the starting\
    \ and ending points are different or having upward/downward slope in a time series.\n\
    \n```python\nIn [7]: plt.figure(figsize=(10, 6))\n        plt.plot(SP_prices)\
    \ ❶\n        plt.title('S&P-500 Prices')\n        plt.ylabel('$')\n        plt.xlabel('Date')\n\
    \        plt.savefig('images/SP_price.png')\n        plt.show()\n```\n\nAside\
    \ from the period in which S&P-500 index price plunges, we see a clear upward\
    \ trend in the Figure 2-3 between 2010 and 2020.\n\n![](img/4d5c72349594c4072f5436e47fcbab43_33_0.png)\n\
    \nPlotting line plot is not the mere option used for understanding trend. Rather\
    \ we have some other strong tool for this task. So, at this point, it is worthwhile\
    \ to talk about the two important statistical concepts:\n\n- Autocorrelation Function\n\
    - Partial Autocorrelation Function\n\nAutocorrelation function, known as ACF,\
    \ is a statistical tool to analyze the relationship between current value of a\
    \ time series and its lagged values. Graphing ACF enables us to readily observe\
    \ the serial dependence in a time series.\n\n$$\\hat{\\rho}(h) = \\frac{\\text{Cov}(X_t,\
    \ X_{t-h})}{\\text{Var}(X_t)}$$\n\nFigure 2-4 denotes autocorrelation function\
    \ plot. The vertical lines shown in the Figure 2-4 represents the correlation\
    \ coefficients, the first line denotes the correlation of the series with its\
    \ 0 lag, i.e., it is the correlation with itself. The second line indicates the\
    \ correlation between series value at time t-1 and t. In the light of these, we\
    \ can conclude that S&P-500 shows a serial dependence. It appears to be a strong\
    \ dependence between the current value and lagged values of S&P-500 data because\
    \ the correlation coefficients, represented by lines in the ACF plot, decays in\
    \ a slow fashion.\n\n```python\nIn [8]: sm.graphics.tsa.plot_acf(SP_prices, lags=30)\n\
    \        plt.xlabel('Number of Lags')\n        plt.savefig('images/acf_SP.png')\n\
    \        plt.show()\n```\n\nPlotting Autocorrelation Function\n\n![](img/4d5c72349594c4072f5436e47fcbab43_35_0.png)\n\
    \nFigure 2-4. Autocorrelation Function Plot of S&P-500\n\nNow, the question is\
    \ what would be the likely sources of autocorrelations? Here are some reasons:\n\
    \n- The primary source of autocorrelation is “carryover” meaning that the preceding\
    \ observation has an impact on the current one.\n- Model misspecification.\n-\
    \ Measurement error, which is basically the difference between observed and actual\
    \ values.\n- Dropping a variable, which has an explanatory power.\n\nPartial autocorrelation\
    \ function (PACF) is another method to examine the relationship between $X_t$\
    \ and $X_{t-p}, p \\in \\mathbb{Z}$. ACF is commonly considered as a useful tool\
    \ in MA(q) model simply because PACF does not decay fast but approaches towards\
    \ 0. However, the pattern of ACF is more applicable to MA. PACF is, on the other\
    \ hand, work well with AR(p) process.\n\nPACF provides information on correlation\
    \ between current value of a time series and its lagged values controlling for\
    \ the other correlations.\n\nIt is not easy to figure out what is going on at\
    \ first glance. Let me give you an example. Suppose that we want to compute the\
    \ partial correlation $X_t$ and $X_{t-h}$. To do that, I take into account the\
    \ correlation structure between $X_t$ and $X_{t-1}$ and $X_{t-2}$.\n\nPut mathematically:\n\
    \n$$\\hat{\\rho}(h) = \\frac{\\text{Cov}(X_t, X_{t-h} | X_{t-1}, X_{t-2}, \\dots,\
    \ X_{t-h-1})}{\\sqrt{\\text{Var}(X_t | X_{t-1}, X_{t-2}, \\dots, X_{t-h-1}) \\\
    text{Var}(X_{t-h} | X_{t-1}, X_{t-2}, \\dots, X_{t-h-1})}}$$\n\nwhere h is the\
    \ lag.\n\n```python\nIn [9]: sm.graphics.tsa.plot_pacf(SP_prices, lags=30)\n \
    \       plt.xlabel('Number of Lags')\n        plt.savefig('images/pacf_SP.png')\n\
    \        plt.show()\n```\n\nPlotting Partial Autocorrelation Function\n\nFigure\
    \ 2-5 exhibits the PACF of raw S&P-500 data. In interpreting the PACF, we focus\
    \ on the spikes outside the dark region representing confidence interval. Figure\
    \ 2-5 exhibits some spikes at different lags but the lag 16 is outside the confidence\
    \ interval. So, it may be wise to select a model with 16 lags so that I am able\
    \ to include all the lags up to lag 16.\n\n![](img/4d5c72349594c4072f5436e47fcbab43_37_0.png)\n\
    \nFigure 2-5. Partial Autocorrelation Function Plot of S&P-500\n\nAs discussed,\
    \ PACF measures the correlation between current values of series and lagged values\
    \ of it in a way to isolate in between effects.\n\n## Seasonality\n\nSeasonality\
    \ exists if there are regular fluctuations over a given period of time. For instance,\
    \ energy usages can show seasonality characteristic. To be more specific, energy\
    \ usage goes up and down in certain periods over a year.\n\nTo show how we can\
    \ detect seasonality component, let us use FRED database, which includes more\
    \ than 500,000 economic data series from over 80 sources covering issues and information\
    \ relating to many areas such as banking, employment, exchange rates, gross domestic\
    \ product, interest rates, trade and international transactions, and so on.\n\n\
    ```python\nIn [10]: from fredapi import Fred\n         import statsmodels.api\
    \ as sm\n\nIn [11]: fred = Fred(api_key='78b14ec6ba46f484b94db43694468bb1')#insert\
    \ you api key\n\nIn [12]: energy = fred.get_series(\"CAPUTLG2211A2S\",\n     \
    \                            observation_start=\"2010-01-01\",\n         energy.head(12)\n\
    Out[12]: 2010-01-01    83.7028\n         2010-02-01    84.9324\n         2010-03-01\
    \    82.0379\n         2010-04-01    79.5073\n         2010-05-01    82.8055\n\
    \         2010-06-01    84.4108\n         2010-07-01    83.6338\n         2010-08-01\
    \    83.7961\n         2010-09-01    83.7459\n         2010-10-01    80.8892\n\
    \         2010-11-01    81.7758\n         2010-12-01    85.9894\n         dtype:\
    \ float64\n```\n\n```python\nIn [13]: plt.plot(energy)\n         plt.title('Energy\
    \ Capacity Utilization')\n         plt.ylabel('$')\n         plt.xlabel('Date')\n\
    \         plt.savefig('images/energy.png')\n         plt.show()\n```\n\n```python\n\
    In [14]: sm.graphics.tsa.plot_acf(energy, lags=30)\n         plt.xlabel('Number\
    \ of Lags')\n         plt.savefig('images/energy_acf.png')\n         plt.show()\n\
    ```\n\nAccessing the energy capacity utilization from Fred database for the period\
    \ of 2010-2020.\n\nFigure 2-6 indicates a periodic ups and downs over nearly 10-year\
    \ period as to have high capacity utilization in the first months of every year\
    \ and then goes down towards the end of year confirming that there is a seasonality\
    \ in energy capacity utilization.\n\n![](img/4d5c72349594c4072f5436e47fcbab43_39_0.png)\n\
    \nFigure 2-6. Seasonality in Energy Capacity Utilization\n\n![](img/4d5c72349594c4072f5436e47fcbab43_39_1.png)\n\
    \nFigure 2-7. ACF of Energy Capacity Utilization\n\n## Cyclicality\n\nWhat if\
    \ data does not show fixed period movements? At this point, cyclicality comes\
    \ into the picture. It exists when higher periodic variation than the trend emerges.\
    \ Some confuse cyclicality and seasonality in a sense that they both exhibit expansion\
    \ and contraction. We can, however, think of cyclicality as business cycles, which\
    \ takes a long time to complete its cycle and the ups and downs over a long horizon.\
    \ So, cyclicality is different from seasonality in the sense that there is no\
    \ fluctuation in a fixed period. An example for cyclicality may be the house purchases\
    \ (or sales) depending on mortgage rate. That is, when a mortgage rate is cut\
    \ (or raise), it leads to a boost for house purchase (or sales).\n\n## Residual\n\
    \nResidual is known as irregular component of time series. Technically speaking,\
    \ residual is equal to the difference between observations and related fitted\
    \ values. So, we can think of it as a left over from the model.\n\nAs we have\
    \ discussed before time series models lack in some core assumptions but it does\
    \ not necessarily mean that time series models are free from assumptions. I would\
    \ like to stress the most prominents one, which is called *stationarity*.\n\n\
    Stationarity means that statistical properties such as mean, variance, and covariance\
    \ of the time series do not change over time.\n\nThere are two forms of stationarity:\n\
    \n1) Weak Stationarity: Time series, $X_t$, is said to be stationarity if\n\n\
    - $X_t$ has finite variance, $\\mathbb{E}(X_t^2) < \\infty, \\forall t \\in \\\
    mathbb{Z}$\n- Mean value of $X_t$ is constant and does solely depend on time,\
    \ $\\mathbb{E}(X_t) = \\mu, t \\forall \\in \\mathbb{Z}$\n- Covariance structure,\
    \ $\\gamma(t, t+h)$, depends on the time difference only:\n\n$\\gamma(h) = \\\
    gamma_h + \\gamma(t+h, t)$\n\nIn words, time series should have finite variance\
    \ with constant mean, and covariance structure that is a function of time difference."
  mdcn: "## 趋势\n\n趋势表示在给定时间段内增加或减少的一般倾向。一般来说，当时间序列的起始点和结束点不同，或呈现上升/下降斜率时，就存在趋势。\n\n\
    ```python\nIn [7]: plt.figure(figsize=(10, 6))\n        plt.plot(SP_prices) ❶\n\
    \        plt.title('S&P-500 Prices')\n        plt.ylabel('$')\n        plt.xlabel('Date')\n\
    \        plt.savefig('images/SP_price.png')\n        plt.show()\n```\n\n除了标普500指数价格暴跌的时期外，我们在图2-3中看到2010年至2020年间有明显的上升趋势。\n\
    \n![](img/4d5c72349594c4072f5436e47fcbab43_33_0.png)\n\n绘制折线图并非理解趋势的唯一选择。相反，我们有一些其他强大的工具来完成这项任务。因此，在这一点上，值得讨论两个重要的统计概念：\n\
    \n- 自相关函数\n- 偏自相关函数\n\n自相关函数，简称ACF，是一种分析时间序列当前值与其滞后值之间关系的统计工具。绘制ACF图使我们能够轻松观察时间序列中的序列依赖性。\n\
    \n$$\\hat{\\rho}(h) = \\frac{\\text{Cov}(X_t, X_{t-h})}{\\text{Var}(X_t)}$$\n\n\
    图2-4表示自相关函数图。图2-4中显示的垂直线代表相关系数，第一条线表示序列与其0阶滞后的相关性，即与其自身的相关性。第二条线表示时间t-1和t处的序列值之间的相关性。根据这些，我们可以得出结论，标普500表现出序列依赖性。标普500数据的当前值与滞后值之间似乎存在很强的依赖性，因为ACF图中线条所代表的相关系数衰减缓慢。\n\
    \n```python\nIn [8]: sm.graphics.tsa.plot_acf(SP_prices, lags=30)\n        plt.xlabel('Number\
    \ of Lags')\n        plt.savefig('images/acf_SP.png')\n        plt.show()\n```\n\
    \n绘制自相关函数\n\n![](img/4d5c72349594c4072f5436e47fcbab43_35_0.png)\n\n图2-4. 标普500的自相关函数图\n\
    \n那么，自相关的可能来源是什么？以下是一些原因：\n\n- 自相关的主要来源是“延续”，即先前的观测值对当前观测值有影响。\n- 模型设定错误。\n- 测量误差，这基本上是观测值与实际值之间的差异。\n\
    - 遗漏了一个具有解释力的变量。\n\n偏自相关函数（PACF）是另一种检验$X_t$与$X_{t-p}, p \\in \\mathbb{Z}$之间关系的方法。ACF通常被认为是MA(q)模型中的有用工具，仅仅因为PACF不会快速衰减而是趋近于0。然而，ACF的模式更适用于MA。另一方面，PACF与AR(p)过程配合良好。\n\
    \nPACF提供了在控制其他相关性的情况下，时间序列当前值与其滞后值之间相关性的信息。\n\n乍一看不容易理解发生了什么。让我给你举个例子。假设我们想计算$X_t$和$X_{t-h}$之间的偏相关。为此，我考虑$X_t$与$X_{t-1}$和$X_{t-2}$之间的相关结构。\n\
    \n用数学表达：\n\n$$\\hat{\\rho}(h) = \\frac{\\text{Cov}(X_t, X_{t-h} | X_{t-1}, X_{t-2},\
    \ \\dots, X_{t-h-1})}{\\sqrt{\\text{Var}(X_t | X_{t-1}, X_{t-2}, \\dots, X_{t-h-1})\
    \ \\text{Var}(X_{t-h} | X_{t-1}, X_{t-2}, \\dots, X_{t-h-1})}}$$\n\n其中h是滞后阶数。\n\
    \n```python\nIn [9]: sm.graphics.tsa.plot_pacf(SP_prices, lags=30)\n        plt.xlabel('Number\
    \ of Lags')\n        plt.savefig('images/pacf_SP.png')\n        plt.show()\n```\n\
    \n绘制偏自相关函数\n\n图2-5展示了原始标普500数据的PACF。在解释PACF时，我们关注代表置信区间的深色区域之外的尖峰。图2-5在不同滞后阶数处显示了一些尖峰，但滞后16阶超出了置信区间。因此，选择一个具有16阶滞后的模型可能是明智的，这样我就能包含所有直到16阶的滞后。\n\
    \n![](img/4d5c72349594c4072f5436e47fcbab43_37_0.png)\n\n图2-5. 标普500的偏自相关函数图\n\n\
    如前所述，PACF以隔离中间效应的方式衡量序列当前值与其滞后值之间的相关性。\n\n## 季节性\n\n如果存在固定时间段内的规律性波动，则存在季节性。例如，能源使用可能表现出季节性特征。更具体地说，能源使用量在一年中的某些时期会上升和下降。\n\
    \n为了展示我们如何检测季节性成分，让我们使用FRED数据库，该数据库包含来自80多个来源的超过500,000个经济数据系列，涵盖与许多领域相关的问题和信息，如银行、就业、汇率、国内生产总值、利率、贸易和国际交易等。\n\
    \n```python\nIn [10]: from fredapi import Fred\n         import statsmodels.api\
    \ as sm\n\nIn [11]: fred = Fred(api_key='78b14ec6ba46f484b94db43694468bb1')#插入你的api密钥\n\
    \nIn [12]: energy = fred.get_series(\"CAPUTLG2211A2S\",\n                    \
    \             observation_start=\"2010-01-01\",\n         energy.head(12)\nOut[12]:\
    \ 2010-01-01    83.7028\n         2010-02-01    84.9324\n         2010-03-01 \
    \   82.0379\n         2010-04-01    79.5073\n         2010-05-01    82.8055\n\
    \         2010-06-01    84.4108\n         2010-07-01    83.6338\n         2010-08-01\
    \    83.7961\n         2010-09-01    83.7459\n         2010-10-01    80.8892\n\
    \         2010-11-01    81.7758\n         2010-12-01    85.9894\n         dtype:\
    \ float64\n```\n\n```python\nIn [13]: plt.plot(energy)\n         plt.title('Energy\
    \ Capacity Utilization')\n         plt.ylabel('$')\n         plt.xlabel('Date')\n\
    \         plt.savefig('images/energy.png')\n         plt.show()\n```\n\n```python\n\
    In [14]: sm.graphics.tsa.plot_acf(energy, lags=30)\n         plt.xlabel('Number\
    \ of Lags')\n         plt.savefig('images/energy_acf.png')\n         plt.show()\n\
    ```\n\n从FRED数据库获取2010-2020年期间的能源产能利用率。\n\n图2-6显示了近10年期间的周期性起伏，每年年初产能利用率较高，然后在年底下降，证实了能源产能利用率存在季节性。\n\
    \n![](img/4d5c72349594c4072f5436e47fcbab43_39_0.png)\n\n图2-6. 能源产能利用率的季节性\n\n\
    ![](img/4d5c72349594c4072f5436e47fcbab43_39_1.png)\n\n图2-7. 能源产能利用率的ACF\n\n##\
    \ 周期性\n\n如果数据没有显示固定周期的运动怎么办？这时，周期性就出现了。当出现高于趋势的周期性变化时，它就存在。有些人混淆了周期性和季节性，因为它们都表现出扩张和收缩。然而，我们可以将周期性视为商业周期，它需要很长时间才能完成其周期，并且在长期内有起伏。因此，周期性与季节性的不同之处在于没有固定时期的波动。周期性的一个例子可能是房屋购买（或销售）取决于抵押贷款利率。也就是说，当抵押贷款利率下调（或上调）时，会促进房屋购买（或销售）。\n\
    \n## 残差\n\n残差被称为时间序列的不规则成分。从技术上讲，残差等于观测值与相关拟合值之间的差异。因此，我们可以将其视为模型的剩余部分。\n\n正如我们之前讨论的，时间序列模型缺乏一些核心假设，但这并不一定意味着时间序列模型没有假设。我想强调最突出的一个，即*平稳性*。\n\
    \n平稳性意味着时间序列的统计特性，如均值、方差和协方差，不会随时间变化。\n\n平稳性有两种形式：\n\n1) 弱平稳性：如果时间序列$X_t$满足以下条件，则称其为平稳的：\n\
    \n- $X_t$具有有限方差，$\\mathbb{E}(X_t^2) < \\infty, \\forall t \\in \\mathbb{Z}$\n\
    - $X_t$的均值是常数且仅依赖于时间，$\\mathbb{E}(X_t) = \\mu, t \\forall \\in \\mathbb{Z}$\n\
    - 协方差结构$\\gamma(t, t+h)$仅依赖于时间差：\n\n$\\gamma(h) = \\gamma_h + \\gamma(t+h, t)$\n\
    \n换句话说，时间序列应具有有限方差、常数均值，以及作为时间差函数的协方差结构。"

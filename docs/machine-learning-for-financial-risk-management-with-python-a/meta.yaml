    \ known as *ReLU*, can take 0 if the input is zero or below zero. If the input\
    \ is greater than 0, it goes up in line with x. Mathematically:\n\n$$ReLU(x) =\
    \ \\max(0, x)$$\n\n- Softmax: It is widely applicable to classification problem\
    \ as in sigmoid because *softmax* converts input into probabilistic distribution\
    \ proportional to the exponential of the input numbers:\n\n$$softmax(x_i) = \\\
    frac{exp(x_i)}{\\sum_i exp(x_i)}$$\n\nDrawbacks of RNN are well-stated by Haviv\
    \ et al. (2019) as:\n\n> *This is due to the dependency of the network on its\

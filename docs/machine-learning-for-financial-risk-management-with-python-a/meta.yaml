  md: 'The logic behind Monte Carlo is well-defined by Glasserman:


    > Monte Carlo methods are based on the analogy between probability and volume.
    The mathematics of measure formalizes the intuitive notion of probability, associating
    an event with a set of outcomes and defining the probability of the event to be
    its volume or measure relative to that of a universe of possible outcomes. Monte
    Carlo uses this identity in reverse, calculating the volume of a set by interpreting
    the volume as a probability.


    ——Glasserman (Monte Carlo Methods in Financial Engineering, 2003, p.11)


    From the application standpoint, Monte Carlo is very similar to Historical Simulation
    VaR but it does not use historical observations. Rather, it generates random samples
    from a given distribution. So, Monte Carlo helps decision makers by providing
    link between possible outcomes and probabilities, which makes it a efficient and
    applicable tool in finance.


    Mathematical Monte Carlo can be defined as:


    Let $X_1, X_2, \dots, X_n$ are independent and identically distributed random
    variables and $f(x)$ is a real-valued function. Then, Law of Large Number states
    that:


    $$E(f(X)) \approx \frac{1}{N} \sum_{i}^{N} f(X_i)$$


    In a nutshell, Monte Carlo simulation is nothing but generating random samples
    and calculating its mean. Computationally, it follows the following steps:


    +   - Define the domain

    - Generate random numbers

    - Iteration and aggregation the result


    Determination of mathematical $\pi$ is a toy but illustrative example for Monte
    Carlo application.'

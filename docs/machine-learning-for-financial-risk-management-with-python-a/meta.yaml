- md: "## PCA and Liquidity-Adjusted ES\n\n### PCA Analysis\n\nPCA is a method used\
    \ to reduce dimensionality. It is used to extract as much information as possible\
    \ using as few components as possible. That is, in this example, out of 5 features,\
    \ we pick 2 components relying on the Figure 5-4 given below. So, we reduce dimensionality\
    \ at the expense of losing information. Because, depending on the cut-off point\
    \ that we decide, we pick the number of components and we lose information as\
    \ much as how many components we left off.\n\nTo be more specific, the point at\
    \ which Figure 5-4 gets flatter implies that we retain less information and this\
    \ is the cut-off point for the PCA. However, it is not an easy call in that there\
    \ is a trade-off between the cut-off point and information retained. That is,\
    \ on the one hand, the higher the cut-off point (the higher number of components)\
    \ we have, the more information we retain (the less dimensionality we reduce).\
    \ On the other hand, the less the cut-off point (the less number of components\
    \ we have), the less information we retain (the higher dimensionality we reduce).\
    \ Getting a flatter scree plot is not the sole criterion for selecting a suitable\
    \ number of components. So, what would be the possible criteria to picking a proper\
    \ number of components? Here are the possible cut-off criteria for PCA:\n\n- Greater\
    \ than 80% explained variance\n- Greater than 1 eigenvalue\n- The point at which\
    \ the scree plot gets flatter\n\nHowever, dimensionality reduction is not the\
    \ only thing that we take advantage of. In this study, we apply PCA to benefit\
    \ from getting peculiar features of liquidity. Because, PCA filters the most important\
    \ information from the data for us.\n\nThe mathematics behind the PCA is discussed\
    \ in detail in the Appendix.\n\n> ### WARNING\n>\n> Please note that liquidity\
    \ adjustment can be applied to VaR, too. The same procedure applies to VaR. Mathematically,\n\
    >\n> $$VaR_L = \\sigma_p \\sqrt{t} Z_{\\alpha} + \\frac{1}{2} P_{last} (\\mu +\
    \ k\\sigma)$$\n>\n> This application is left to the reader.\n\n### PCA Implementation\n\
    \n```python\nIn [60]: from sklearn.decomposition import PCA\n        from sklearn.preprocessing\
    \ import StandardScaler\n```\n\n```python\nIn [61]: scaler = StandardScaler()\n\
    \        spread_measures_scaled = scaler.fit_transform(np.abs(spread_measures))❶\n\
    \        pca = PCA(n_components=5)❷\n        prin_comp = pca.fit_transform(spread_measures_scaled)❸\n\
    ```\n\n```python\nIn [62]: var_expl = np.round(pca.explained_variance_ratio_,\

  md: "# KERNEL FUNCTION\n\nWhat happens if the data we are working on cannot be linearly\
    \ separable. That would be a huge headache for us but no worries we have Kernel\
    \ functions to remedy this problem. It is a nice and easy method to model non-linear\
    \ and high dimensional data. The steps we take in Kernel SVM are:\n\n+   1. Move\
    \ the data into high dimension\n2. Find suitable hyperplane\n3. Go back to initial\
    \ data\n\nTo do that we use kernel functions. Using the idea of feature map indicating\
    \ that our original variables mapped to new set of quantities and passed to learning\
    \ algorithm.\n\nFinally, instead of input data we use following main Kernel functions\
    \ in optimization procedures:\n\n+   - Polynomial Kernel: $K(x, z) = (x^T z +\
    \ b)$.\n- Radial Basis (Gaussian) Kernel: $K(x, z) = \\exp\\left(-\\frac{|x-z|^2}{2\\\
    sigma^2}\\right)$.\n- Exponential Kernel: $K(x, z) = \\exp\\left(-\\frac{|x-z|}{\\\
    sigma}\\right)$. where x is input, b is bias or constant, and z is linear combination\
    \ of $x^2$.\n\nThe following code shows us the preparations before running then\
    \ SVR-GARCH in Python. The most crucial step here is to obtain independent variables,\
    \ which are realized volatility and square of historical returns.\n\n```\nIn [38]:\
    \ from sklearn.svm import SVR\n    from scipy.stats import uniform as sp_rand\n\
    \    from sklearn.model_selection import RandomizedSearchCV\n    from sklearn.metrics\
    \ import mean_squared_error\n```"

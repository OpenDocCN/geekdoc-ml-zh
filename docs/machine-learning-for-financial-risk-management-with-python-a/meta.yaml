    \ of the variance obtained above gives us the portfolio standard deviation:\n\n\
    $$\\sigma_p = \\sqrt{\\sigma_p^2}$$\n\nIn other words, portfolio expected return\
    \ is a weighted average of the individual returns and can be shown as:\n\n$$\\\
    mathbb{E}(R) = \\sum_{i}^{n} w_i R_i = w_1 R_1 + w_2 R_2 \\cdots + w_n R_n$$\n\
    \nLet us explore the risk-return relationship by visualization. To do that, a\

  md: "Moving average (MA) and residuals are closely related models. Moving average\
    \ can be considered as smoothing model as it tends to take into account the lag\
    \ values of residual. For the sake of simplicity, let us start with MA(1):\n\n\
    $$X_t = \\epsilon_t + \\alpha\\epsilon_{t-1}$$\n\nAs long as $\\alpha \\neq 0$,\
    \ it has nontrivial correlation structure. Intuitively, MA(1) tells us that the\
    \ time series has been affected by $\\epsilon_t$ and $\\epsilon_{t-1}$ only.\n\
    \nIn general form, MA(q) equation becomes:\n\n$$X_t = \\epsilon_t + \\alpha_1\\\
    epsilon_{t-1} + \\alpha_2\\epsilon_{t-2}\\dots + \\alpha_q\\epsilon_{t-q}$$\n\n\
    From this point on, to be consistent, we will model the data of two major IT companies,\
    \ namely *Apple* and *Microsoft*. *Yahoo Finance* provides a convenient tool to\
    \ access closing price of the related stocks for the period of 01-01-2019 and\
    \ 01-01-2021.\n\nAs a first step, we dropped the missing values and check if the\
    \ data is stationary and it turns out neither Apple nor Microsoft stock prices\
    \ have stationary structure as expected. Thus, taking first difference to make\

    \ Moving Average Model Prediction Result for Microsoft\n\n## Autoregressive Model\n\
    \nDependence structure of successive terms is the most distinctive feature of\
    \ the autoregressive model in the sense that current value is regressed over its\
    \ own lag values in this model. So, we basically forecast the current value of\
    \ the time series $X_t$ by using a linear combination of its past values. Mathematically,\
    \ the general form of AR(p) can be written as:\n\n$$X_t = c + \\alpha_1 X_{t-1}\
    \ + \\alpha_2 X_{t-2}... + \\alpha_p X_{t-p} + \\epsilon_t$$\n\nwhere $\\epsilon_t$\
    \ denotes the residuals and c is the intercept term. AR(p) model implies that\
    \ past values up to order p have somewhat explanatory power on $X_t$. If the relationship\
    \ has shorter memory, then it is likely to model $X_t$ with less number of lags.\n\
    \nWe have discussed the one of the main properties in time series, which is *stationarity*\
    \ and the other important property is *invertibility*. After introducing AR model,\
    \ it is time to show the invertibility of the MA process. It is said to be invertible\
    \ if it can be converted to infinite AR model.\n\nDifferently, under some circumstances,\
    \ MA can be written as an infinite AR process. These circumstances are to have\
    \ stationary covariance structure, deterministic part, and invertible MA process.\
    \ In doing so, we have another model called *infinite AR* thanks to the assumption\
    \ of $|\\alpha| < 1$.\n\n$$X_t = \\epsilon_t + \\alpha\\epsilon_{t-1}$$\n$$= \\\
    epsilon_t + \\alpha(X_{t-1} - \\alpha\\epsilon_{t-2})$$\n$$= \\epsilon_t + \\\
    alpha X_{t-1} - \\alpha^2\\epsilon_{t-2}$$\n$$= \\epsilon_t + \\alpha X_{t-1}\
    \ - \\alpha^2(X_{t-2} + \\alpha\\epsilon_{t-3})$$\n$$= \\epsilon_t + \\alpha X_{t-1}\
    \ - \\alpha^2 X_{t-2} + \\alpha^3\\epsilon_{t-3})$$\n$$= ...$$\n$$= \\alpha X_{t-1}\
    \ - \\alpha^2 X_{t-2} + \\alpha^3\\epsilon_{t-3} - \\alpha^4\\epsilon_{t-4} +\
    \ ... - (-\\alpha)^n\\epsilon_{t-n}$$\n\nAfter doing necessary math equation gets\
    \ the following form:\n\n$$\\alpha^n\\epsilon_{t-n} = \\epsilon_t - \\sum_{i=0}^{n-1}\
    \ \\alpha^i X_{t-i}$$\n\nIn this case, if $|\\alpha| < 1$. Then $n \\rightarrow\
    \ \\infty$\n\n$$\\mathbb{E}\\left(\\epsilon_t - \\sum_{i=0}^{n-1} \\alpha^i X_{t-i}\\\
    right)^2 = \\mathbb{E}(\\alpha^{2n}\\epsilon_{t-n}^2 \\rightarrow \\infty)$$\n\
    \nFinally, MA(1) process turns out to be:\n\n$$\\epsilon_t = \\sum_{i=0}^{\\infty}\
    \ \\alpha^i X_{t-i}$$\n\nDue to the duality between AR and MA processes, it is\
    \ possible to represent AR(1) as infinite MA, MA($\\infty$). In other words, the\
    \ AR(1) process can be expressed as a function of past values of innovations.\n\
    \n$$X_t = \\epsilon_t + \\theta X_{t-1}$$\n$$= \\theta(\\theta X_{t-2} + \\epsilon_{t-1})\
    \ + \\epsilon_t$$\n$$= \\theta^2 X_{t-2} + \\theta \\epsilon_{t-1} + \\epsilon_t$$\n\
    $$= \\theta^2(\\theta X_{t-3} + \\theta \\epsilon_{t-2}) \\theta \\epsilon_{t-1}\
    \ + \\epsilon_t$$\n$$X_t = \\epsilon_t + \\epsilon_{t-1} + \\theta^2 \\epsilon_{t-2}\
    \ + \\dots + \\theta^t X_t$$\n\nAs $n \\rightarrow \\infty$, $\\theta^t \\rightarrow\
    \ 0$, so I can represent AR(1) as an infinite MA process.\n\nIn the following\
    \ analysis, we run autoregressive model to predict Apple and Microsoft stock prices.\
    \ Unlike moving average, partial autocorrelation function is a useful tool to\
    \ find out the optimum order in autoregressive model. This is because, in AR,\
    \ we aim at finding out the relationship of a time series between two different\
    \ time, say $X_t$ and $X_{t-k}$ and to do that I need to filter out the effect\
    \ of other lags in between.\n\n```\nIn [37]: sm.graphics.tsa.plot_pacf(diff_train_aapl,lags=30)\n\
    \        plt.title('PACF of Apple')\n        plt.xlabel('Number of Lags')\n  \
    \      plt.savefig('images/pacf_ar_aapl.png')\n        plt.show()\nIn [38]: sm.graphics.tsa.plot_pacf(diff_train_msft,lags=30)\n\
    \        plt.title('PACF of Microsoft')\n        plt.xlabel('Number of Lags')\n\
    \        plt.savefig('images/pacf_ar_msft.png')\n        plt.show()\n```\n\nBased\
    \ on Figure 2-17, obtained from first differenced of Apple stock price, we observe\
    \ a significant spike at lag 29 and Figure 2-18 exhibits that we have a similar\

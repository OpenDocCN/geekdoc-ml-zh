  md: 'Thus, the global financial crisis was not the sole event that led regulators
    and institutions to redesign its financial risk management. Rather, it is the
    drop that filled the glass and, in the aftermath of the crisis, both regulators
    and institutions have adopted lessons learned and improved their process. Eventually,
    these series of events led to a rise in financial risk management.


    # Information Asymmetry in Financial Risk Management


    Though it is theoretically intuitive, the assumption of completely rational decision
    maker, main building block in modern finance theory, is too perfect to be real.
    This idea, therefore, attacked by behavioral economists, who believes that psychology
    plays a key role in decision making process.


    > Making decisions is like speaking prose—people do it all the time, knowingly
    or unknowingly. It is hardly surprising, then, that the topic of decision making
    is shared by many disciplines, from mathematics and statistics, through economics
    and political science, to sociology and psychology.


    —Kahneman and Tversky (1984)


    Information asymmetry and financial risk management goes hand in hand as cost
    of financing and firm valuation are deeply affected by the information asymmetry.
    That is, uncertainty in valuation of a firm’s assets might raise the borrowing
    cost posing a threat to a firm’s sustainability (See DeMarzo and Darrell (1995)
    and Froot, Scharfstein, and Stein (1993)).


    Thus, roots of the failures described above lie deeper in such a way that perfect
    hypothetical world in which rational decision maker lives is unable to explain
    them. At this point, human instincts and imperfect world come into play and a
    mixture of disciplines provide more plausible justifications. So, it turns out
    *Adverse Selection* and *Moral Hazard* are two prominents categories accounting
    for the market failures.


    # Adverse Selection'

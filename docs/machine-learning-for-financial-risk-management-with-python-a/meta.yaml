  md: "![](img/4d5c72349594c4072f5436e47fcbab43_189_0.png)\n\nFigure 5-5. PCA Biplot\n\
    \nAll right, we have all the necessary information now and incorporating this\
    \ information, we are able to calculate liquidity adjusted ES. Unsurprisingly,\
    \ the following code reveals that the liquidity adjusted ES provides larger values\
    \ compared to standard ES application. This implies that including liquidity dimension\
    \ in ES estimation results in higher risk. Please note that the difference will\
    \ be more pronounced during crisis.\n\n```\nIn [68]: prin_comp1_rescaled = prin_comp.iloc[:,0]\
    \ * prin_comp.iloc[:,0].std()\\n                  + prin_comp.iloc[:, 0].mean()❶\n\
    \        prin_comp2_rescaled = prin_comp.iloc[:,1] * prin_comp.iloc[:,1].std()\\\
    n                  + prin_comp.iloc[:, 1].mean()❷\n        prin_comp_rescaled\
    \ = pd.concat([prin_comp1_rescaled, prin_comp2_rescaled],\n                  axis=1)\n\
    \        prin_comp_rescaled.head()\nOut[68]:    Component 1  Component 2\n0  \
    \    1.766661    1.256192\n1      4.835170    1.939466\n2      3.611486    1.551059\n\
    ```"

- md: '## Chapter 5


    Employs machine learning-based models to boost estimation performance of the traditional
    market risk models, namely Value-at-Risk (VaR) and Expected Shortfall (ES). VaR
    is a quantitative approach for the potential loss of fair value due to market
    movements that will not be exceeded in a defined period of time and with a defined
    confidence level. Expected Shortfall, on the other hand, focuses on the tail of
    the distribution referring to big and unexpected losses. VaR model is developed
    using denoised covariance matrix and ES is developed incorporating liquidity dimension
    of the data.


    ## Chapter 6


    Tries to introduce comprehensive machine learning-based approach to estimate credit
    risk. Machine Learning models are applied based on the past credit information
    along with others. The approach starts with risk bucketing, which is suggested
    by Basel Accord and continue with different models bayesian estimation, Markov
    Chain model, support vector classification, random forest, neural network, and
    deep learning. In the last part of the chapter, the performance of these models
    will be compared.


    ## Chapter 7


    Gaussian Mixture model is used to model the liquidity, which is thought to be
    a neglected dimension in risk management. This model allows us to incorporate
    different aspects of the liquidity proxies in this chapter so that we will be
    able to capture the effect of liquidity on financial risk in a more robust way.


    ## Chapter 8


    Covers the operational risk, which may result in a failure mostly due to companies
    internal weakness. There are several sources of operational risks but fraud risk
    is one of the most time-consuming and detrimental one to the companies operations.
    Here, in this chapter, fraud is will be our main focus and new approaches will
    be developed to have better-performing fraud application based on machine learning
    models.


    ## Chapter 9


    Introduces a brand new approach in modeling the corporate governance risk: Stock
    Price Crash. Many studies find an empirical link between stock price crash and
    corporate governance. This chapter, using Minimum Covariance Determinant model,
    attempts to unveil the relationship between the components of corporate governance
    risk and stock price crash.


    ## Chapter 10


    Makes use of synthetic data to estimate different financial risks. The aim of
    this chapter is to highlight the emergence of synthetic data that helps us to
    minimize the impact of limited historical data. So, synthetic data allows us to
    have large enough and high-quality data, which improves the quality of the model.


    # Part I. Risk Management Foundation


    ## Chapter 1. Fundamentals of Risk Management


    > **A NOTE FOR EARLY RELEASE READERS**


    With Early Release ebooks, you get books in their earliest form—the author’s raw
    and unedited content as they write—so you can take advantage of these technologies
    long before the official release of these titles.


    This will be the 1st chapter of the final book. Please note that the GitHub repo
    will be made active later on.


    If you have comments about how we might improve the content and/or examples in
    this book, or if you notice missing material within this chapter, please reach
    out to the editor at mcronin@oreilly.com.


    > *In 2007, no one would have thought that risk functions could have changed as
    much as they have in the last eight years. It is a natural temptation to expect
    that the next decade has to contain less change. However, we believe that the
    opposite will likely be true.*


    —Harle et al. (2016)


    Risk management is a constantly evolving process. Constant evolution is inevitable
    due to the fact that long-standing risk management practice cannot keep pace with
    recent development or be a precursor of unfolding crises. Therefore, it is of
    importance to monitor and adopt the changes brought by structural breaks in a
    risk management process. Adoption to the changes implies re-defining the components
    and tools of risk management and this is what this book is all about.



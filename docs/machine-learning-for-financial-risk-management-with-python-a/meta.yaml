    Well, VaR can be measured via three different approaches:


    +   - Variance-Covariance VaR

    - Historical Simulation VaR

    - Monte-Carlo VaR


    # Variance-Covariance Method


    Variance-Covariance Method is also known as parametric method, because the data
    is assumed to be normally distributed. Variance-Covariance method is commonplace
    due to this assumption, however it is worth noting that returns are not normal
    distributed. Parametric form assumption makes the application of Variance-Covariance
    method practical and easy-to-apply.


    As in all VaR approaches, we can either work with single asset or a portfolio.
    However, working with portfolio requires careful treatment in the sense that correlation
    structure and portfolio variance need to be estimated. Exactly at this point,
    correlation comes into the picture and historical data is used to calculate correlation,
    mean, and standard deviation. While augmenting this with ML-based approach, correlation
    structure will be our main focus.


    Suppose that we have a single asset, in Figure 5-1, it is shown that the mean
    of this asset is zero and standard deviation is 1 and if the holding period is
    1, the corresponding VaR value can be computed the value of the asset by corresponding
    Z-value and standard deviation. Hence, normality assumption makes things easier
    but it is a strong assumption because there is no guarantee that asset returns
    are normally distributed rather most of the asset returns do not follow normal
    distribution. Moreover, due to the normality'

- md: "## Forecast\n\nThis part is more about the performance of the model. In forecasting,\
    \ we predict future values based on our estimation.\n\nFigure 2-12 indicates the\
    \ modeling process. Accordingly, subsequent to identification of the variables\
    \ and the estimation process, model is run. Only after running a proper diagnostics,\
    \ we are able to perform the forecast analysis.\n\n![](img/4d5c72349594c4072f5436e47fcbab43_48_0.png)\n\
    \nIn modeling a data with a time dimension, we should consider correlation in\
    \ adjacent points in time. This consideration takes us to time series modeling\
    \ as we discuss before. My aim, in modeling time series, is to fit a model and\
    \ comprehend statistical character of a time series, which fluctuates randomly\
    \ in time.\n\nRecall the discussion about the IID process, which is the most basic\
    \ time series model and is sometimes referred to as white noise. Let’s touch the\
    \ concept of white noise.\n\n## White Noise\n\nThe time series $\\epsilon_t$ is\
    \ said to be white noise if it satisfies the following:\n\n$$\\epsilon_t \\sim\
    \ WN(0, \\sigma_\\epsilon^2)$$\n$$\\text{Corr}(\\epsilon_t, \\epsilon_s) = 0,\
    \ \\forall t \\neq s$$\n\nIn words, $\\epsilon_t$ has mean of 0 and constant variance.\
    \ Moreover, there is no correlation between successive terms of $\\epsilon_t$.\n\
    \nWell, it is easy to say that white noise process is stationary and plot of white\
    \ noise exhibits fluctuations around mean in a random fashion in time.\n\nHowever,\
    \ as the white noise is formed by uncorrelated sequence, it is not an appealing\
    \ model from forecasting standpoint. Differently, uncorrelation prevents us to\
    \ forecast future values.\n\nAs we can observe from the Figure Figure 2-13 below,\
    \ white noise oscillates around mean and it is completely erratic.\n\n```\nIn\
    \ [25]: mu = 0\n        std = 1\n        WN = np.random.normal(mu, std, 1000)\n\
    \n        plt.plot(WN)\n        plt.xlabel('Number of Simulation')\n        plt.savefig('images/WN.png')\n\
    \        plt.show()\n```\n\n![](img/4d5c72349594c4072f5436e47fcbab43_50_0.png)\n\
    \nFigure 2-13. White Noise Process\n\nFrom this point on, we need to identify\
    \ the optimum number of lag before running the time series model. As you can imagine\
    \ deciding the optimal number of lag is a challenging task. The most widely used\
    \ methods are: *ACF*, *PACF*, and *information criteria*. ACF and PACF have been\
    \ discussed and, for the sake of comprehensiveness, information criteria, AIC\
    \ for short, will also be introduced.\n\n## Information Criteria\n\nDetecting\
    \ the optimal number of lag is a cumbersome task. We need to have a criteria to\
    \ decide which model fits best to the data as there may be numerous potentially\
    \ good models. Akaike Information Criteria, a.k.a AIC, as Cavanaugh and Neath\
    \ (2019) denote that\n\n> AIC is introduced as an extension to the Maximum Likelihood\
    \ Principle. Maximum likelihood is conventionally applied to estimate the parameters\
    \ of a model once structure and dimension of the model have been formulated.\n\
    \nAIC can be mathematically defined as:\n\n$AIC = -2ln(MaximumLikelihood) + 2d$\n\
    \nwhere d is the total number of parameters. The last term, 2d in the equation\
    \ aims at reducing the risk of overfitting. It is also called as *penalty term*\
    \ by which I can filter out the unnecessary redundancy in the model.\n\nBIC is\
    \ the other information criteria used to select best model. The penalty term in\
    \ BIC is larger than that of AIC.\n\n$BIC = -2ln(MaximumLikelihood) + ln(n) *\
    \ d$\n\nwhere n is the number of observations.\n\nPlease note that you need to\
    \ treat the AIC with caution if the proposed model is finite dimensional. This\
    \ fact is well put by Clifford and Hurvich (1989):\n\n> If the true model is infinite\
    \ dimensional, a case which seems most realistic in practice, AIC provides an\
    \ asymptotically efficient selection of a finite dimensional approximating model.\
    \ If the true model is finite dimensional, however, the asymptotically efficient\
    \ methods, e.g., Akaike's FPE (Akaike, 1970), AIC, and Parzen's CAT (Parzen, 1977),\
    \ do not provide consistent model order selections.\n\nLet's get started to visit\
    \ classical time series model with Moving Average model.\n\n## Moving Average\
    \ Model\n\nMoving average (MA) and residuals are closely related models. Moving\
    \ average can be considered as smoothing model as it tends to take into account\
    \ the lag values of residual. For the sake of simplicity, let us start with MA(1):\n\
    \n$$X_t = \\epsilon_t + \\alpha\\epsilon_{t-1}$$\n\nAs long as $\\alpha \\neq\
    \ 0$, it has nontrivial correlation structure. Intuitively, MA(1) tells us that\
    \ the time series has been affected by $\\epsilon_t$ and $\\epsilon_{t-1}$ only.\n\
    \nIn general form, MA(q) equation becomes:\n\n$$X_t = \\epsilon_t + \\alpha_1\\\
    epsilon_{t-1} + \\alpha_2\\epsilon_{t-2}\\dots + \\alpha_q\\epsilon_{t-q}$$\n\n\
    From this point on, to be consistent, we will model the data of two major IT companies,\
    \ namely *Apple* and *Microsoft*. *Yahoo Finance* provides a convenient tool to\
    \ access closing price of the related stocks for the period of 01-01-2019 and\
    \ 01-01-2021.\n\nAs a first step, we dropped the missing values and check if the\
    \ data is stationary and it turns out neither Apple nor Microsoft stock prices\
    \ have stationary structure as expected. Thus, taking first difference to make\
    \ these data stationary and splitting the data as `train` and `test` are the steps\
    \ to be taken at this point. The following code shows us how we can do these in\
    \ Python.\n\n```\nIn [26]: ticker = ['AAPL', 'MSFT']\n        start = datetime.datetime(2019,\
    \ 1, 1)\n        end = datetime.datetime(2021, 1, 1)\n        stock_prices = yf.download(ticker,\
    \ start=start, end = end, interval='1d').Close❶\n        [*********************100%**********************]\
    \  2 of 2 completed\n\nIn [27]: stock_prices = stock_prices.dropna()\n\nIn [28]:\
    \ for i in ticker:\n            stat_test = adfuller(stock_prices[i])[0:2]\n \
    \           print(\"The ADF test statistic and p-value of {} are {}\".format(i,stat_test))\n\
    \        The ADF test statistic and p-value of AAPL are  (0.29788764759932335,\
    \ 0.9772473651259085)\n        The ADF test statistic and p-value of MSFT are\
    \  (-0.8345360070598484, 0.8087663305296826)\n\nIn [29]: diff_stock_prices = stock_prices.diff().dropna()\n\
    \nIn [30]: split = int(len(diff_stock_prices['AAPL'].values) * 0.95)❷\n```\n\n\
    ```\ndiff_train_aapl = diff_stock_prices['AAPL'].iloc[:split]③\ndiff_test_aapl\
    \ = diff_stock_prices['AAPL'].iloc[split:]④\ndiff_train_msft = diff_stock_prices['MSFT'].iloc[:split]⑤\n\
    diff_test_msft = diff_stock_prices['MSFT'].iloc[split:]⑥\n```\n\n```\nIn [31]:\
    \ diff_train_aapl.to_csv('diff_train_aapl.csv')⑦\n        diff_test_aapl.to_csv('diff_test_aapl.csv')\n\
    \        diff_train_msft.to_csv('diff_train_msft.csv')\n        diff_test_msft.to_csv('diff_test_msft.csv')\n\
    ```\n\n```\nIn [32]: fig, ax = plt.subplots(2, 1, figsize=(10, 6))\n        plt.tight_layout()\n\
    \        sm.graphics.tsa.plot_acf(diff_train_aapl,lags=30, ax=ax[0], title='ACF\
    \ - Apple')\n        sm.graphics.tsa.plot_acf(diff_train_msft,lags=30, ax=ax[1],\
    \ title='ACF - Microsoft')\n        plt.savefig('images/acf_ma.png')\n       \
    \ plt.show()\n```\n\n1. Retrieving monthly closing stock prices.\n2. Splitting\
    \ data as 95% and 5%.\n3. Assigning 95% of the Apple stock price data to the train\
    \ set.\n4. Assigning 5% of the Apple stock price data to the test set.\n5. Assigning\
    \ 95% of the Microsoft stock price data to the train set.\n6. Assigning 5% of\
    \ the Microsoft stock price data to the test set.\n7. Saving the data for future\
    \ use.\n\nLooking at the first panel of Figure 2-14, it can be observed that there\
    \ is a significant spikes at some lags and, to be on the safe side, we choose\
    \ lag 9 for short moving average model and 22 for long moving average. These implies\
    \ that order of 9 will be our short-term order and 22 will become our long-term\
    \ order in modeling MA.\n\n![](img/4d5c72349594c4072f5436e47fcbab43_54_0.png)\n\
    \n![](img/4d5c72349594c4072f5436e47fcbab43_54_1.png)\n\nFigure 2-14. ACF After\
    \ First Difference\n\n```\nIn [33]: short_moving_average_appl = diff_train_aapl.rolling(window=9).mean()\n\
    \        long_moving_average_appl = diff_train_aapl.rolling(window=22).mean()\n\
    ```\n\n```\nIn [34]: fig, ax = plt.subplots(figsize=(10, 6))\n        ax.plot(diff_train_aapl.loc[start:end].index,\n\
    \                diff_train_aapl.loc[start:end],\n                label='Stock\
    \ Price', c='b')\n        ax.plot(short_moving_average_appl.loc[start:end].index,\n\
    \                short_moving_average_appl.loc[start:end],\n                label\
    \ = 'Short MA',c='g')\n        ax.plot(long_moving_average_appl.loc[start:end].index,\n\
    \                long_moving_average_appl.loc[start:end],\n                label\
    \ = 'Long MA',c='r')\n        ax.legend(loc='best')\n        ax.set_ylabel('Price\
    \ in $')\n        ax.set_title('Stock Prediction-Apple')\n        plt.savefig('images/ma_apple.png')\n\
    \        plt.show()\n```\n\n1. Moving average with short window for Apple stock\n\
    2. Moving average with long window for Apple stock"
  mdcn: "## 预测\n\n这部分更多涉及模型的性能。在预测中，我们基于估计来预测未来值。\n\n图2-12展示了建模过程。因此，在变量识别和估计过程之后，模型得以运行。只有在运行了适当的诊断之后，我们才能进行预测分析。\n\
    \n![](img/4d5c72349594c4072f5436e47fcbab43_48_0.png)\n\n在对具有时间维度的数据进行建模时，我们应该考虑相邻时间点之间的相关性。这种考虑将我们引向之前讨论过的时间序列建模。我在时间序列建模中的目标是拟合一个模型，并理解一个在时间上随机波动的时间序列的统计特性。\n\
    \n回顾一下关于IID过程的讨论，这是最基本的时间序列模型，有时也被称为白噪声。让我们来探讨白噪声的概念。\n\n## 白噪声\n\n如果时间序列 $\\\
    epsilon_t$ 满足以下条件，则称其为白噪声：\n\n$$\\epsilon_t \\sim WN(0, \\sigma_\\epsilon^2)$$\n\
    $$\\text{Corr}(\\epsilon_t, \\epsilon_s) = 0, \\forall t \\neq s$$\n\n换句话说，$\\\
    epsilon_t$ 的均值为0，方差恒定。此外，$\\epsilon_t$ 的连续项之间没有相关性。\n\n嗯，很容易说白噪声过程是平稳的，白噪声的图在时间上围绕均值以随机方式波动。\n\
    \n然而，由于白噪声是由不相关的序列构成的，从预测的角度来看，它并不是一个有吸引力的模型。不同的是，不相关性阻碍了我们预测未来值。\n\n正如我们在下面的图2-13中可以观察到的，白噪声围绕均值振荡，且完全无规律。\n\
    \n```\nIn [25]: mu = 0\n        std = 1\n        WN = np.random.normal(mu, std,\
    \ 1000)\n\n        plt.plot(WN)\n        plt.xlabel('Number of Simulation')\n\
    \        plt.savefig('images/WN.png')\n        plt.show()\n```\n\n![](img/4d5c72349594c4072f5436e47fcbab43_50_0.png)\n\
    \n图2-13. 白噪声过程\n\n从现在开始，我们需要在运行时间序列模型之前确定最佳的滞后数。可以想象，决定最佳滞后数是一项具有挑战性的任务。最广泛使用的方法是：*ACF*、*PACF*和*信息准则*。ACF和PACF已经讨论过，为了全面起见，信息准则（简称AIC）也将被介绍。\n\
    \n## 信息准则\n\n检测最佳滞后数是一项繁琐的任务。我们需要一个标准来决定哪个模型最适合数据，因为可能存在许多潜在的好模型。赤池信息准则，简称AIC，正如Cavanaugh和Neath（2019）所指出的：\n\
    \n> AIC被引入作为最大似然原理的扩展。最大似然通常用于在模型的结构和维度确定后估计模型的参数。\n\nAIC的数学定义为：\n\n$AIC = -2ln(MaximumLikelihood)\
    \ + 2d$\n\n其中d是参数的总数。方程中的最后一项2d旨在降低过拟合的风险。它也被称为*惩罚项*，通过它我可以过滤掉模型中不必要的冗余。\n\nBIC是另一个用于选择最佳模型的信息准则。BIC中的惩罚项大于AIC中的惩罚项。\n\
    \n$BIC = -2ln(MaximumLikelihood) + ln(n) * d$\n\n其中n是观测值的数量。\n\n请注意，如果所提出的模型是有限维的，你需要谨慎对待AIC。Clifford和Hurvich（1989）很好地阐述了这一点：\n\

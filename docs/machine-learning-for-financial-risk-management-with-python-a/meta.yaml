    Now, the question is what would be the likely sources of autocorrelations? Here
    are some reasons:


    +   - The primary source of autocorrelation is “carryover” meaning that the preceding
    observation has an impact on the current one.

    - Model misspecification.

    - Measurement error, which is basically the difference between observed and actual
    values.

    - Dropping a variable, which has an explanatory power.


    Partial autocorrelation function (PACF) is another method to examine the relationship
    between $X_t$ and $X_{t-p}, p \in \mathbb{Z}$. ACF is commonly considered as a
    useful tool in MA(q) model simply because PACF does not decay fast but approaches
    towards 0. However, the pattern of ACF is more applicable to MA. PACF is, on the
    other hand, work well with AR(p) process.


    PACF provides information on correlation between current value of a time series
    and its lagged values controlling for the other correlations.'

  md: "$$\\sigma_p^2 = w_a^2\\sigma_a^2 + w_b^2\\sigma_b^2 + 2w_aw_b\\text{Cov}(r_a,\
    \ r_b)$$\n\nwhere w denotes weight, $\\sigma^2$ is variance, and $Cov$ is covariance\
    \ matrix.\n\nTaking square root of the variance obtained above gives us the portfolio\
    \ standard deviation:\n\n$$\\sigma_p = \\sqrt{\\sigma_p^2}$$\n\nIn other words,\
    \ portfolio expected return is a weighted average of the individual returns and\
    \ can be shown as:\n\n$$\\mathbb{E}(R) = \\sum_{i}^{n} w_i R_i = w_1 R_1 + w_2\
    \ R_2 \\cdots + w_n R_n$$\n\nLet us explore the risk-return relationship by visualization.\
    \ To do that, an hypothetical portfolio is constructed to calculate necessary\
    \ statistics with Python.\n\n```\nIn [1]: import statsmodels.api as sm\n     \
    \  import numpy as np\n       import plotly.graph_objs as go\n       import matplotlib.pyplot\
    \ as plt\n       import plotly\n       import warnings\n       warnings.filterwarnings('ignore')\n\
    ```\n\n```\nIn [2]: n_assets = 5\n       n_simulation = 500\n```\n\n```\nIn [3]:\
    \ returns = np.random.randn(n_assets, n_simulation)\n```\n\n```\nIn [4]: rand\
    \ = np.random.rand(n_assets)\n       weights = rand/sum(rand)\n```\n\n```\n  \
    \     def port_return(returns):\n           rets = np.mean(returns, axis=1)\n\
    \           cov = np.cov(rets.T, aweights=weights, ddof=1)\n           portfolio_returns\
    \ = np.dot(weights, rets.T)\n           portfolio_std_dev = np.sqrt(np.dot(weights,\
    \ np.dot(cov, weights)))\n           return portfolio_returns, portfolio_std_dev\n\
    ```\n\n```\nIn [5]: portfolio_returns, portfolio_std_dev = port_return(returns)\n\
    ```"

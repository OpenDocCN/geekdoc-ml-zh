    \ is, once a financial crisis hit the market, market risk surges align with the\
    \ drawdown on lines of credit, which in turn increase liquidity risk.\n\nGiven\
    \ the situation of the economy, the effect of illiquidity varies as it becomes\
    \ commonplace during huge market downturns but it is more manageable during normal\
    \ times. Therefore, its impact will be more distinct in down market.\n\nThis fact\
    \ is supported by Antoniades stating that\n\n> Common pool of liquid assets is\
    \ the resource constraint through which liquidity risk can affect the supply of\
    \ mortgage credit. During the financial crisis of 2007–2008 the primary source\
    \ of stresses to bank funding conditions arose from the funding illiquidity experienced\
    \ in the markets for wholesale funding.\n\n—Antoniades (Liquidity Risk and the\
    \ Credit Crunch of 2007-2008: Evidence from Micro-Level Data on Mortgage Loan\
    \ Applications, 2014, p.6)\n\nIgnoring liquidity dimension of risk may cause underestimating\
    \ the market risk. Therefore, augmenting ES with liquidity risk may result in\
    \ more accurate and reliable estimation. Well, it sounds appealing but how can\
    \ we find a proxy for liquidity?\n\n> NOTE\n\nLiquidity can be defined as the\
    \ easiness of the transaction with which assets can be sold in a very short time\
    \ period without a significant impact on market price. There are two main measures\
    \ of liquidity:\n\n- Market liquidity: The ease with which an asset is traded.\n\
    - Funding liquidity: The ease with which investor can obtain funding.\n\nLiquidity\
    \ and the risk arising from it will be discussed in a greater detail in Chapter-7.\
    \ So, much of the discussion is left to this chapter.\n\nIn the literature, bid-ask\
    \ spread measures are commonly used for modeling liquidity. Shortly, bid-ask spread\
    \ is the difference of bid-ask prices. Put differently, it is the difference between\
    \ the highest available price (bid price) that a buyer is willing to pay and the\
    \ lowest price (ask price) that a seller is willing to get. So, bid-ask spread\
    \ gives a tool to measure the transaction cost.\n\nTo the extent that bid-ask\
    \ spread is a good indicator of transaction cost, it is also a good proxy of liquidity\
    \ in the sense that transaction cost is one of the components of liquidity. Spreads\
    \ can be defined various ways depending on their focus. Here is the bid-ask spreads\
    \ that we will use to incorporate liquidity risk into ES model.\n\n- Effective\
    \ Spread\n\n    Effective Spread $= 2 * |(P_t - P_{mid})|$\n\n    where $P_t$\
    \ is the price of trade at time t and $P_{mid}$ is the midpoint of the bid-ask\
    \ offer ($ (P_{ask} - P_{bid})/2 $) prevailing at the time of the $t$.\n\n- Proportional\
    \ Quoted Spread\n\n    Proportional Quoted Spread $= (P_{ask} - P_{bid})/P_{mid}$\n\
    \n    where $P_{ask}$ is the ask price and $P_{bid}$ and $P_{mid}$ are bid price\
    \ and mid price, respectively.\n\n- Quoted Spread\n\n    Quoted Spread = $P_{ask}\
    \ - P_{bid}$\n\n- Proportional Effective Spread\n\n    Proportional Effective\
    \ Spread = $2 * (|P_t - P_{mid}|)/P_{mid}$\n\n### Effective Cost\n\nEffective\
    \ Cost = $\\begin{cases} (P_t - P_{mid})/P_{mid} & \\text{for buyer initiated}\
    \ \\\\ (P_{mid}/P_t)/P_{mid} & \\text{for seller initiated} \\end{cases}$\n\n\
    Buyer-initiated trade occurs when a trade is executed at a price above quoted\
    \ mid price. Similarly, seller-initiated trade occurs when a trade is executed\
    \ at a price below than the quoted mid price.\n\nNow, we need to find a way to\
    \ incorporate these bid-ask spreads into the ES model so that we are able to account\
    \ for the liquidity risk as well as market risk. We employ two different methods\

    >\n> 与梯度消失问题不同，梯度爆炸问题发生在反向传播中的微小变化导致优化过程中权重发生巨大更新时。\n\n## 激活函数\n\n激活函数是用于确定神经网络结构中输出的数学方程。激活函数是在隐藏层中引入非线性的工具，从而使我们能够对非线性问题进行建模。\n\

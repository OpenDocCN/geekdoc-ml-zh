    Now, the problem turns out to be the differentiating the flow of information to
    the financial markets. How can we differentiate noise from signal? and how can
    we utilize this information.


    It is now appropriate to discuss the Marcenko Pastur Theorem that helps us to
    have homogeneous covariance matrix. The Marcenko-Pastur theorem allows us to etract
    signal from noise using eigenvalues of covariance matrix.


    > NOTE


    Let $A \in \mathbb{R}^{n \times n}$ be a square matrix. Then, $\lambda \in \mathbb{R}$
    is an eigenvalue of A and $x \in \mathbb{R}^n \setminus \{0\}$ is the corresponding
    eigenvector of A if


    $Ax = \lambda x$


    Eigenvalue and eigenvector have special meaning in financial context. Eigenvector
    corresponds the variance in covariance matrix while eigenvalue shows the magnitude
    of the eigenvector. Specifically, largest eigenvector corresponds to largest variance
    and the magnitude of this equals to the corresponding eigenvalue. Due to noise
    in the data some eigenvalues can be thought of as random and it makes sense to
    detect and filter these eigenvalues in order to retain signals only.


    To differentiate noise and signal, we fit the Marcenko Pastur Theorem PDF to the
    noisy covariance. The PDF of Marcenko Pastur Theorem takes the following form
    (Prado, 2020):


    $$f(\lambda) = \begin{cases} \frac{T}{N} \sqrt{(\lambda_+ - \lambda)(\lambda -
    \lambda_-)} & \text{if } \lambda \in [\lambda_-, \lambda_+] \ 0, & \text{if }
    \lambda \notin [\lambda_-, \lambda_+] \end{cases}$$


    where $\lambda_+$ and $\lambda_-$ are maximum and minimum eigenvalues respectively.



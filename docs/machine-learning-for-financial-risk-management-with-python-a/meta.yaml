    > ## NOTE


    Vanishing gradient is a commonplace problem in deep learning, which is not properly
    designed. Vanishing gradient problem arises if the gradient tends to get smaller
    as we are conducting backpropagation. It implies that neurons are learning so
    slow that optimization grind to a halt.


    Unlike vanishing gradient problem, exploding gradient problem occurs when small
    changes in the backpropagation result in huge updates in the weights during optimization
    process.'
  - '[PAGE 82]


    # ACTIVATION FUNCTIONS


    Activation functions are mathematical equations that are used to determine the
    output in neural network structure. Activation function is a tool to introduce
    non-linearity in the hidden layers so that we are able to model the non-linear
    issues.


    Of the activation function, the followings are the most famous ones:


    +   - Sigmoid: This activation function allows us to incorporate small amount
    of output as we introduce small changes in the model. It takes values between
    0 and 1. The mathematical representation of *sigmoid* is:


    $$\text{sigmoid}(x) = \frac{1}{1 + \exp(-\sum_i w_i x_i - b)}$$


    where w is weight, x denotes data, b represents bias, and subscript i shows features.


    +   - Tanh: If you are handling with negative numbers, *tanh* is your activation
    function. As opposed to sigmoid function, it ranges between -1 and 1. The tanh
    formula is:


    $$\tanh(x) = \frac{\sinh(x)}{\cosh(x)}$$


    +   - Linear: Using *linear* activation function enables us to build linear relationship
    between independent and dependent variables. *Linear* activation function takes
    the inputs and multiplies by the weights and form the outputs. proportional to
    the input. So, it is convenient activation function for time-series models. Linear
    activation function takes the form of:


    $$f(x) = wx$$'
  - '[PAGE 83]


    +   - Rectified Linear: *Rectified Linear* activation function, known as *ReLu*,
    can take 0 if the input is zero or below zero. If the input is greater than 0,
    it goes up in line with x. Mathematically:


    $$ReLu(x) = \max(0, x)$$


    - Softmax: It is widely applicable to classification problem as in sigmoid because
    *softmax* converts input into probabilistic distribution proportional to the exponential
    of the input numbers:


    $$softmax(x_i) = \frac{exp(x_i)}{\sum_i exp(x_i)}$$


    Drawbacks of RNN are well-stated by Haviv et al. (2019) as:


    > *This is due to the dependency of the network on its past states, and through
    them on the entire input history. This ability comes with a cost - RNNs are known
    to be hard to train (Pascanu et al., 2013a). This difficulty is commonly associated
    with the vanishing gradient that appears when trying to propagate errors over
    long times (Hochreiter, 1998). When training is successful, the network''s hidden
    state represents these memories. Understanding how such representation forms throughout
    training can open new avenues for improving learning of memory-related tasks.*


    # Long-Short Term Memory


    Long-Short Term Memory, LSTM for short, deep learning approach has been developed
    by Hochreiter and Schmidhuber (1997) and it is mainly based on Gated Recurrent
    Unit (GRU).


    GRU is proposed to deal with vanishing gradient problem, which is a common problem
    in neural network structure and occurs when weight update becomes too small to
    create a significant change in the network. GRU'
  - '[PAGE 84]


    consists of two gates: *Update* and *reset*. When an early observation is detected
    as highly important, then we do not update the hidden state. In a similar fashion,
    when early observations are not significant, it leads to reset the state.


    As we previously discussed, the one of the most appealing features of RNN is its
    ability to connect past and present information. However, this ability turns out
    to be a failure when “long-term dependencies” comes into the picture. Long-term
    dependencies mean that model learns from early observations.


    For instance, let us examine the following sentence:


    > *Countries have their own currencies as in USA where people transact with dollar*


    In the case of short-dependencies, it is known that the next predicted word is
    about a currency but if it is asked which currency is that? Then, things get complicated
    as we might have various currencies in the text implying long-term dependencies.
    It is needed to go way back to find something relevant about country using dollar.


    LSTM tries to attack the weakness of RNN in long-term dependencies in a way that
    LSTM has a quite useful tool to get rid of the unnecessary information so that
    it works more efficiently. LSTM works with gates, enabling LSTM to forget irrelevant
    data. These are:


    +   - Forget gates

    - Input gates

    - Output gates


    Forget gates is created to sort out the necessary and unnecessary information
    so that LSTM performs more efficiently than RNN. In doing so, the value of activation
    function, sigmoid, becomes zero if the information is irrelevant. Forget gate
    can be formulated as:


    ```

    $$F_t = \sigma(X_t W_I + h_{t-1} W_f + b_f)$$


  md: 'It is a type of asymmetric information in which one party tries to exploit
    its informational advantage. Adverse selection arises when seller are better informed
    than buyers. This phemomenon is perfectly coined by Akerlof (1970) as “The Markets
    for Lemons”. Within this framework, lemons refer to low-quality.


    Consider a market with lemon and high-quality cars and buyers know that it is
    likely to buy a lemon, which lowers then equilibrium price. However, seller is
    better informed if the car is lemon or high-quality. So, in this situation, benefit
    from exchange might disappear and no transaction takes place.


    Due to the complexity and opaqueness, mortgage market in the pre-crisis era is
    a good example of adverse selection. More elaborately, borrowers knew more about
    their willingness and ability to pay than lenders. Financial risk was created
    through the securitizations of the loans, i.e., mortgage backed securities. From
    this point on, the originators of the mortgage loans knew more about the risks
    than the people they were selling them to investors in the mortgage backed securities.


    Let us try to model adverse selection using Python. It is readily observable in
    insurance industry and therefore I would like to focus on this industry to model
    adverse selection.


    Suppose that the consumer utility function is:


    $$U(x) = e^{\gamma x}$$


    where x is income and $\gamma$ is a parameter, which takes on values between 0
    and 1.


    > **NOTE**


    Utility function is a tool used to represent consumer preferences for goods and
    service and it is concave for risk-averse individuals.'

    \ GJR-GARCH was proposed by Glosten, Jagannathan and Runkle (1993).\n\n## GJR-GARCH\n\
    \nThis model performs well in modeling the asymmetric effects of the announcements\
    \ in a way that bad news has larger impact than that of good news. In other words,\
    \ in the presence of asymmetry, distribution of losses has a fatter tail than\
    \ the distribution of gains. The equation of the model includes one more parameter\
    \ $\\gamma$ and it takes the following form:\n\n$$\\sigma_t^2 = \\omega + \\sum_{k=1}^q\

    |---|---|\n| ARCH | 0.0896 |\n| GARCH | 0.0878 |\n| GJR-GARCH | 0.0880 |\n| EGARCH\
    \ | 0.0895 |\n\nUp to now, we have discussed the classical volatility models but\
    \ from this point on we will see how Machine Learning and Bayesian Approach can\
    \ be used to model volatility. In the context of Machine Learning, Support Vector\
    \ Machines and Neural Network will be the first models to visit. Let’s get started.\n\
    \n## Support Vector Regression-GARCH\n\nSupport Vector Machines (SVM) is a supervised\
    \ learning algorithm, which can be applicable to both classification and regression.\
    \ The aim in SVM is to find a line that separate two classes. It sounds easy but\
    \ here is the challenging part: There are almost infinitely many lines that can\
    \ be used to distinguish the classes. But we are looking for the optimal line\
    \ by which the classes can be perfectly discriminated.\n\nIn linear algebra, the\
    \ optimal line is called *hyperplane*, which maximize the distance between the\
    \ points, which are closest to the hyperplane but belonging to different classes.\
    \ The distance between the two points, i.e., support vectors, is known as *margin*.\
    \ So, in SVM, what we are trying to do is to maximize the margin between support\
    \ vectors.\n\nSVM for classification is labeled as Support Vector Classification\
    \ (SVC). Keeping all characteristics of SVM, it can be applicable to regression.\
    \ Again, in regression, the aim is to find the hyperplane that minimize the error\
    \ and maximize the margin. This method is called Support Vector Regression (SVR)\
    \ and, in this part, we will apply this method to GARCH model. Combining these\
    \ two models comes up with a different name: *SVR-GARCH*.\n\n## KERNEL FUNCTION\n\
    \nWhat happens if the data we are working on cannot be linearly separable. That\
    \ would be a huge headache for us but no worries we have Kernel functions to remedy\
    \ this problem. It is a nice and easy method to model non-linear and high dimensional\
    \ data. The steps we take in Kernel SVM are:\n\n1. Move the data into high dimension\n\
    2. Find suitable hyperplane\n3. Go back to initial data\n\nTo do that we use kernel\
    \ functions. Using the idea of feature map indicating that our original variables\
    \ mapped to new set of quantities and passed to learning algorithm.\n\nFinally,\
    \ instead of input data we use following main Kernel functions in optimization\
    \ procedures:\n\n- Polynomial Kernel: $K(x, z) = (x^T z + b)$.\n- Radial Basis\
    \ (Gaussian) Kernel: $K(x, z) = \\exp\\left(-\\frac{|x-z|^2}{2\\sigma^2}\\right)$.\n\
    - Exponential Kernel: $K(x, z) = \\exp\\left(-\\frac{|x-z|}{\\sigma}\\right)$.\
    \ where x is input, b is bias or constant, and z is linear combination of $x^2$.\n\
    \nThe following code shows us the preparations before running then SVR-GARCH in\
    \ Python. The most crucial step here is to obtain independent variables, which\
    \ are realized volatility and square of historical returns.\n\n```\nIn [38]: from\
    \ sklearn.svm import SVR\n    from scipy.stats import uniform as sp_rand\n   \
    \ from sklearn.model_selection import RandomizedSearchCV\n    from sklearn.metrics\
    \ import mean_squared_error\n```"

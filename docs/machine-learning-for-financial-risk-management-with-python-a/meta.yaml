    \ based on our first model is shown in Figure 4-3.\n\n![](img/4d5c72349594c4072f5436e47fcbab43_105_0.png)\n\
    \nFigure 4-3. Volatility Prediction with ARCH\n\n## GARCH Model\n\nGARCH model\
    \ is an extension of ARCH model incorporating lagged conditional variance. So,\
    \ ARCH is improved by adding p number of delated conditional variance, which makes\
    \ GARCH model a multivariate one in the sense that it is a autoregressive moving\
    \ average models for conditional variance with p number of lagged squared returns\
    \ and q number of lagged conditional variance. GARCH (p, q) can be formulated\
    \ as:\n\n$$\\sigma_t^2 = \\omega + \\sum_{k=1}^{q} \\alpha_k r_{t-k}^2 + \\sum_{k=1}^{p}\
    \ \\beta_k \\sigma_{t-k}^2$$\n\nwhere $\\omega$, $\\beta$, and $\\alpha$ are parameters\
    \ to be estimated and q and p are maximum lag in the model. In order to have consistent\
    \ GARCH, following conditions should hold:\n\n- $\\omega > 0$\n- $\\beta \\geq\
    \ 0$\n- $\\alpha \\geq 0$\n- $\\beta + \\alpha < 1$\n\nARCH model is unable to\
    \ capture the influence of historical innovations. However, as a more parsimonious\
    \ model, GARCH model can account for the change in historical innovations because\
    \ GARCH models can be expressed as an infinite-order ARCH. Let’s show how GARCH\
    \ can be shown as infinite order of ARCH.\n\n$$\\sigma_t^2 = \\omega + \\alpha\
    \ r_{t-1}^2 + \\beta \\sigma_{t-1}^2$$\n\nThen replace $\\sigma_{t-1}^2$ by $\\\
    omega + \\alpha r_{t-2}^2 + \\beta \\sigma_{t-2}^2$\n\n$$\\sigma_t^2 = \\omega\
    \ + \\alpha r_{t-1}^2 + \\beta(\\omega + \\alpha r_{t-2}^2 \\sigma_{t-2}^2)$$\n\
    $$= \\omega(1 + \\beta) + \\alpha r_{t-1}^2 + \\beta \\alpha r_{t-2}^2 + \\beta^2\
    \ \\sigma_{t-2}^2)$$\n\nNow, let us substitute $\\sigma_{t-2}^2$ by $\\omega +\
    \ \\alpha r_{t-3}^2 + \\beta \\sigma_{t-3}^2$ and do the necessary math, we end\
    \ up with:\n\n$$\\sigma_t^2 = \\omega(1 + \\beta + \\beta^2 + \\dots) + \\alpha\
    \ \\sum_{k=1}^{\\infty} \\beta^{k-1} r_{t-k}$$\n\nSimilar to ARCH model, there\
    \ are more than one way to model volatility using GARCH in Python. Let us try\
    \ to develop our own Python-based code using optimization technique first. In\
    \ what follows, *arch* library will be used to predict volatility.\n\n```\nIn\
    \ [19]: a0 = 0.0001\n        sgm2 = ret.var()\n        K = ret.kurtosis()\n```\n\
    \n```\nh = 1 - alpha / sgm2\nalpha = np.sqrt(K * (1 - h ** 2) / (2.0 * (K + 3)))\n\
    beta = np.abs(h - omega)\nomega = (1 - omega) * sgm2\ninitial_parameters = np.array([omega,\
    \ alpha, beta])\nprint('Initial parameters for omega, alpha, and beta are \\n{}\\\
    n{}\\n{}'.format(omega, alpha, beta))\n```\n\nInitial parameters for omega, alpha,\
    \ and beta are\n0.43471178001576827\n0.512827280537482\n0.02677799855546381\n\n\
    ```\nIn [20]: retv = ret.values\n```\n\n```\nIn [21]: @jit(nopython=True, parallel=True)\n\
    def garch_likelihood(initial_parameters, retv):\n    omega = initial_parameters[0]\n\
    \    alpha = initial_parameters[1]\n    beta = initial_parameters[2]\n    T =\
    \ len(retv)\n    logliks = 0\n    sigma2 = np.zeros(T)\n    sigma2[0] = np.var(retv)\n\
    \    for t in range(1, T):\n        sigma2[t] = omega + alpha * (retv[t - 1])\
    \ ** 2 + beta * sigma2[t-1]\n    logliks = np.sum(0.5 * (np.log(sigma2) + retv\
    \ ** 2 / sigma2))\n    return logliks\n```\n\n```\nIn [22]: logliks = garch_likelihood(initial_parameters,\
    \ retv)\nprint('The Log likelihood is {:.4f}'.format(logliks))\n```\n\nThe Log\
    \ likelihood is 1387.7215\n\n```\nIn [23]: def garch_constraint(initial_parameters):\n\
    \    alpha = initial_parameters[0]\n    gamma = initial_parameters[1]\n    beta\
    \ = initial_parameters[2]\n    return np.array([1 - alpha - beta])\n```\n\n```\n\
    In [24]: bounds = [(0.0, 1.0), (0.0, 1.0), (0.0, 1.0)]\n```\n\n```\nIn [25]: def\
    \ opt_paramsG(initial_parameters, retv):\n    opt_result = opt.minimize(garch_likelihood,\n\
    \                              x0=initial_parameters,\n                      \
    \        constraints=np.array([1 - alpha - beta]),\n                         \
    \     bounds=bounds, args=(retv),\n                              method='Nelder-Mead',\n\
    \                              options={'maxiter': 5000})\n    params = opt_result.x\n\
    ```"
  mdcn: "尽管开发我们自己的代码总是有益的，并能加深我们的理解，但内置代码的美妙之处不仅限于其简洁性。使用内置代码寻找最优滞后值是其另一个优势，同时还具备优化的运行流程。\n\
    \n我们所需要做的就是创建一个`for`循环并定义一个合适的信息准则。下面，我们选择贝叶斯信息准则（BIC）作为模型选择方法，以确定滞后阶数。选择BIC的原因在于，只要我们有足够大的样本量，BIC就是一个可靠的模型选择工具，正如Burnham和Anderson（2002年和2004年）所讨论的那样。现在，我们从1到5阶滞后迭代ARCH模型。\n\

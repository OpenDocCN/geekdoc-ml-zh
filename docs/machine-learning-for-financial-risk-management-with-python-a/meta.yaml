    so that we can plug it into the VaR model, which is called *Denoised VaR* estimation.
    Denoising covariance matrix is nothing but taking unnecessary information (noise)
    out of the data. So, we make use of signal from the market, which tells us something
    important is going on in the market. Denoising the covariance matrix includes
    following stages¹:



  md: 'Posterior ∝ Likelihood×prior


    where ∝ means “is proportional to”


    Within this context, Bayes’ Theorem sounds attractive, doesn’t it? Well, it does
    but it comes with a cost, which is analytical intractability. Even if Bayes’ Theorem
    is theoretically intuitive, it is, by and large, hard to solve analytically. This
    is the major drawback in wide applicability of Bayes’ Theorem. However, good news
    is that numerical methods provide solid methods to solve this probabilistic model.


    So, some methods proposed to deal with the computational issue in Bayes’ Theorem.
    These methods provides solution with approximation, which can be listed as:


    +   - Quadrature approximation

    - Maximum a posteriori estimation

    - Grid Approach

    - Sampling Based Approach

    - Metropolis-Hastings

    - Gibbs Sampler

    - No U-Turn Sampler



  md: '# Chapter 1. Fundamentals of Risk Management


    > **A NOTE FOR EARLY RELEASE READERS**


    With Early Release ebooks, you get books in their earliest form—the author’s raw
    and unedited content as they write—so you can take advantage of these technologies
    long before the official release of these titles.


    This will be the 1st chapter of the final book. Please note that the GitHub repo
    will be made active later on.


    If you have comments about how we might improve the content and/or examples in
    this book, or if you notice missing material within this chapter, please reach
    out to the editor at mcronin@oreilly.com.


    > *In 2007, no one would have thought that risk functions could have changed as
    much as they have in the last eight years. It is a natural temptation to expect
    that the next decade has to contain less change. However, we believe that the
    opposite will likely be true.*


    —Harle et al. (2016)


    Risk management is a constantly evolving process. Constant evolution is inevitable
    due to the fact that long-standing risk management practice cannot keep pace with
    recent development or be a precursor of unfolding crises. Therefore, it is of
    importance to monitor and adopt the changes brought by structural breaks in a
    risk management process. Adoption to the changes implies re-defining the components
    and tools of risk management and this is what this book is all about.


    Traditionally, in finance, empirical research in finance has a strong focus on
    statistical inference. Econometric has been built upon the rationale of'
  merge: -1
  pgno: 10
- img_proc: true
  md: 'statistical inference. These types of models concentrate on the structure of
    underlying data generating process and relationship among variables. Machine learning
    models, however, are not assumed to define the underlying data generating process
    but are considered as a means to an end for the purpose of prediction (Lommers
    et al. 2021). Thus, machine learning models are tend to be more data-centric and
    prediction accuracy-oriented.


    Moreover, data scarcity and unavailability has always been an issue in finance
    and it is not hard to guess that the econometric models cannot perform well in
    this case. Given the solution of machine learning models to the data unavailability
    via synthetic data generation, machine learning models has been on the top of
    the agenda in finance and financial risk management is, of course, no exception.


    Before going into the detail and discuss these tools, it is worth introducing
    the main risk management concepts. Thus, this part of the book presents basic
    concepts of financial risk management, which I will refer throughout the book.
    These concepts include risk, types of risks, risk management, returns, and some
    concepts related to risk management.


    # Risk


    Risk is always out there during the course of life but understanding and assessing
    risk is a bit tougher than knowing it due to its abstract nature. Risk is perceived
    as something hazardous and it might be in the forms of expected or unexpected.
    The expected risk is something that is priced but the unexpected risk can be barely
    accounted for, so it might be devastating.


    As you can imagine there is no general consensus on the definition of risk. However,
    from the financial standpoint, risk refers to a likely potential loss or the level
    of uncertainty to which a company can expose. Differently, McNeil et al. (2015)
    define risk as:'
  merge: -1
  pgno: 11
- img_proc: true
  md: '> Any event or action that may adversely affect an organization''s ability
    to achieve its objectives and execute its strategies or, alternatively, the quantifiable
    likelihood of loss or less-than-expected returns.

    —Harle et al. (2016)


    These definitions focus on the downside of the risk implying that cost goes hand
    in hand with risk but it should also be noted that there is no necessarily one-to-one
    relationship among them. For instance, if a risk is expected, a cost incurred
    is relatively lower (or even ignorable) than that of unexpected risk.


    # Return


    All financial investments are undertaken to gain profit, which is also called
    return. More formally, return is the gain made on an investment in a given period
    of time. Thus, return refers to the upside of the risk. Throughout the book, risk
    and return will refer to downside and upside risk, respectively.


    As you can imagine, there is a trade-off between risk and return, the higher risk
    assumed, the greater the return realized. As it is a formidable task to come up
    with a optimum solution, this trade-off is one of the most controversial issues
    in finance. However, Markowitz (1952) proposes an intuitive and appealing solution
    to this long-standing issue. The way he defined risk, which was until then ambiguous,
    is nice and clean and led to a shift in landscape in financial research. Markowitz
    (1952) used standard deviation $\sigma_{R_i}$ to quantify risk. This intuitive
    definition allows researchers to use mathematics and statistics in finance. The
    standard deviation can be mathematically defined as (Hull, 2012):


    ```

    $$\sigma = \sqrt{\mathbb{E}(R^2) - [\mathbb{E}(R)]^2}$$

    ```


    where R and $\mathbb{E}$ symbols refer to annual return and expectation, respectively.
    The book uses the symbol $\mathbb{E}$ numerous times as expected return represent
    the return of interest. This is because it is probability we are talking about
    in defining risk. When it comes to portfolio variance, covariance comes into the
    picture and the formula turns out to be:'
  merge: -1
  pgno: 12

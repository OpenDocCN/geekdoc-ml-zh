    # Monte Carlo-Simulation VaR


    Before delving into the Monte Carlo simulation VaR estimation, it would be better
    to make a brief introduction about Monte Carlo simulation. Monte Carlo is a computerized
    mathematical method used to make an estimation in the case where there is no closed-form
    solution. So, it is a highly efficient tool for numerical approximation. Monte
    Carlo relies on repeated random sample form a given distribution.'

  md: "unexpected risks in the market. However, it does not mean that Expected Shortfall\
    \ and VaR are two entirely different concepts. Rather, they are related, that\
    \ is, it is possible to express Expected Shortfall using VaR.\n\nLet us now assume\
    \ that loss distribution is continuous, then Expected Shortfall can be mathematically\
    \ defined as:\n\n$$ES_{\\alpha} = \\frac{1}{1-\\alpha} \\int_{\\alpha}^{1} q_u\
    \ du$$\n\nwhere q denotes quantile of the loss distribution. Expected Shortfall\
    \ formula suggests that it is nothing but a probability weights average of $(1\
    \ - \\alpha)\\%$ of losses.\n\nLet us substitute $q_u$ and VaR, which gives us\
    \ the following equation:\n\n$$ES_{\\alpha} = \\frac{1}{1-\\alpha} \\int_{\\alpha}^{1}\
    \ VaR_u du$$\n\nAlternatively, it is mean of losses exceeding VaR as shown below:\n\
    \n$$ES_{\\alpha} = E(L|L > VaR_{\\alpha})$$\n\nLoss distribution can be continuous\
    \ or discrete and, as you can imagine, if it takes the discrete form, the Expected\
    \ Shortfall becomes different as given below:\n\n$$ES_{\\alpha} = \\frac{1}{1-\\\
    alpha} \\sum_{n=0}^{1} max(L_n) * P(L_n)$$\n\nwhere $max(L_n)$ shows the highest\
    \ nth loss and $Prob(L_n)$ indicates probability of pth highest loss.\n\n```\n\

    # Metropolis-Hastings


    Metropolis-Hastings (M-H) allows us to have efficient sampling procedure with
    two steps: First we draw sample from proposal density and, in the second step,
    we decide either to accept or reject.


    Let $q(\theta|\theta^{t-1})$ be a proposal density and $\theta$ be a parameter
    space. The entire algorithm of M-H can be summarized as:


    +   1. Select initial value for $\theta^1$ from parameter space $\theta$'

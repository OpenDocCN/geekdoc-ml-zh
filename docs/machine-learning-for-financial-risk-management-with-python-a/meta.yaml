    \ as 2 to be used in PCA analysis.\n8. Drawing the *biplot* to observe the relationship\
    \ between components and features.\n\n![Figure 5-4. PCA Scree Plot](img/4d5c72349594c4072f5436e47fcbab43_188_0.png)\n\
    \n![Figure 5-5. PCA Biplot](img/4d5c72349594c4072f5436e47fcbab43_189_0.png)\n\n\
    ### Liquidity-Adjusted ES Calculation\n\nAll right, we have all the necessary\

    \n## Recurrent Neural Network\n\nRecurrent Neural Network has a neural network\
    \ structure with at least one feedback connection so that network can learn sequences.\
    \ Feedback connection results in a loop enabling us unveil the non-linear characteristics.\
    \ This type of connection brings us a new and quite useful property: *Memory*.\
    \ Thus, RNN cannot only make use of the input data, but also the previous outputs,\
    \ which sounds compelling when it comes to time series modeling.\n\nRNN comes\
    \ in many forms such as:\n\n- One-to-One: It consists of single input and single\
    \ output, which makes it most basic type of RNN.\n- One-to-Many: In this form,\
    \ RNN produces multiple outputs for a single input.\n- Many-to-One: As opposed\

    PCA is a method used to reduce dimensionality. It is used to extract as much as
    information as possible using as few component as possible. That is, in this example,
    out of 5 features, we pick 2 components relying on the Figure 5-4 given below.
    So, we reduce dimensionality at the expense of losing information. Because, depending
    on the cut-off point that we decide, we pick the number of components and we lose
    information as much as how many components we left off.


    To be more specific, point at which Figure 5-4 gets flatter implies that we retain
    less information and this is the cut-off point for the PCA. However, it is not
    an easy call in that there is a trade-off between the cut-off point and information
    retained. That is, on the one hand, the higher the cut-off point (the higher number
    the components) we have, the more information we retain (the less dimensionality
    we reduce). On the other hand, the less the cut-off point (the less number of
    components we have), the less information we retain (the higher dimensionality
    we reduce). Getting flatter scree plot is not the mere criteria for selecting
    suitable number of components. So, what would be the'

  - '[PAGE 96]


    It is time to dig into the classical volatility models. Let’s start off with ARCH
    model.


    # ARCH Model


    One of the early attempt to model the volatility was proposed by Engel (1982)
    and it is known as ARCH model. ARCH model is a univariate model and it is based
    on the historical asset returns. The ARCH(p) model has the following form:


    $$\sigma_t^2 = \omega + \sum_{k=1}^p \alpha_k (r_{t-k})^2$$


    where


    $$r_t = \sigma_t \epsilon_t$$


    where $\epsilon_t$ is assumed to be normally distributed. In this parametric model,
    we need to satisfy some assumptions to have strictly positive variance. To this
    respect, following condition should hold:


    +   - $\omega > 0$

    - $\alpha_k \geq 0$


    All these equations tell us that ARCH is a univariate and non-linear model in
    which volatility is estimated with squared of past returns. The one of the most
    distinctive feature of ARCH is that it has the property of the time-varying conditional
    variance$^1$ so that ARCH is able to model the phenomenon known as volatility
    clustering, that is large changes tend to be followed by large changes of either
    sign, and small changes tend to be followed by small changes as put by Benoit
    Mandelbrot (1963). Hence, once an important announcement arrives into the market,
    it might results in a huge volatility.'

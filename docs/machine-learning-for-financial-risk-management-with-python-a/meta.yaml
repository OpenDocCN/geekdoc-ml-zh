  md: "> **NOTE**\n\nTo illustrate, say $\\omega$ is the set of all possible outcomes\
    \ in the event of tossing a coin, $\\omega=\\{H,T\\}$. $\\mathscr{F}$ can be treated\
    \ as tossing a coin twice, $F=2^{|\\omega|}=2^2$. Finally, probability measure,\
    \ P, is the odds of getting tails is 0.5.\n\nHere is the four axioms of a coherent\
    \ risk measure:\n\n1) Translation Invariance: For all outcomes Y and a constant\
    \ $a \\in \\mathscr{R}$, we have\n\n$$VaR(Y_1 + Y_2) = VaR(Y) + a$$\n\nIt means\
    \ that if a riskless amount of a is added to the portfolio, it results in lower\
    \ VaR by the amount of a.\n\n2) Sub-additivity: For all $Y_1$ and $Y_2$ we have\n\
    \n$$VaR(Y_1 + Y_2) \\leq VaR(Y_1) + VaR(Y_2)$$\n\nThis axiom stress the importance\
    \ of diversification in risk management. Take $Y_1$ and $Y_2$ as two assets if\

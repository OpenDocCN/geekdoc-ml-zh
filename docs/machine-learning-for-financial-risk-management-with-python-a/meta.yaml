  md: 'RNN and LSTM are two of them. In this part, we will concentrate on the practicality
    of these models in Python after briefly discussing the theoretical background.


    # Recurrent Neural Network


    Recurrent Neural Network has a neural network structure with at least one feedback
    connection so that network can learn sequences. Feedback connection results in
    a loop enabling us unveil the non-linear characteristics. This type of connection
    brings us a new and quite useful property: *Memory*. Thus, RNN cannot only make
    use of the input data, but also the previous outputs, which sounds compelling
    when it comes to time series modeling.


    RNN comes in many forms such as:


    +   - One-to-One: It consists of single input and single output, which makes it
    most basic type of RNN.

    - One-to-Many: In this form, RNN produces multiple outputs for a single input.

    - Many-to-One: As opposed to One-to-Many structure, Many-to-one has multiple inputs
    for a singly output.

    - Many-to-Many: It has multiple outputs and inputs and is known as most complicated
    structure of RNN.


    Hidden unit in RNN feeds itself back into the neural network so that RNN has,
    unlike feed-forward neural network, recurrent layers, which makes it a suitable
    method to model a time series data. Therefore, in RNN, activations of a neuron
    comes from previous time step indication that RNN represents accumulating state
    of the network instance (Buduma, 2017)


    As summarized by Nielsen (2019):


    +   - RNN has time steps one at a time in an orderly fashion.

    - The state of the network stays as it is from one time step to another.'
  merge: -1
  pgno: 76
- img_proc: true
  md: '+   - RNN updates its state based on the time step.



    > *The most critical feature of the conditional return distribution is arguably
    its second moment structure, which is empirically the dominant time-varying characteristic
    of the distribution. This fact has spurred an enormous literature on the modeling
    and forecasting of return volatility.*


    —Andersen et al. (2003)


    “Some concepts are easy to understand but hard to define. This also holds true
    for volatility” This could be a quote from someone living before Markowitz because
    the way he model the volatility is very clear and intuitive. Markowitz proposes
    his celebrated portfolio theory in which volatility is defined as standard deviation
    so that from then onward finance has become more intertwined with mathematics.


    Volatility is the backbone of finance in the sense that it does not only provide
    information signal to investors but also inputs of various financial models.'

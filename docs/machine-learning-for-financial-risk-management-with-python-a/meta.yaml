    The difference of the traditionally applied VaR and the denoised VaR are even
    more pronounced in the crisis period. During crisis period, correlation among
    assets becomes higher, it is sometimes referred to as *correlation breakdown*.
    The likely consequences of correlation breakdown can be twofold:


    +   - An increase on market risk that makes diversification becomes less effective.

    - Making hedging even more difficult.


    In order to check this phenomenon, we consider the 2017-2018 financial crisis
    period and the exact crisis period is obtained from NBER, which announces business
    cycles (see [https://www.nber.org/research/data/us-business-cycle-expansions-and-contractions](https://www.nber.org/research/data/us-business-cycle-expansions-and-contractions)
    for further information).


    The result confirms that the correlation and thereby VaR becomes higher during
    crisis period.


    Now, we manage to obtained ML-based VaR using denoised covariance matrix in lieu
    of empirical matrix that we calculate directly from the data. Despite its appealing
    and easiness VaR is not a coherent risk measure. Being a coherent risk measure
    requires certain conditions or axioms to satisfy. You can think of these axioms
    as a technical requirements for a risk measure.


    Let $\alpha \in (0, 1)$ be fixed confidence level and $(\Omega, \mathcal{F}, P)$
    be a probability space in which $\Omega$ represents a sample space, $\mathcal{F}$
    denotes subset of sample space, and $P$ is probability measure.'

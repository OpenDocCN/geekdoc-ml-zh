    \ decimals=4))❺\n        print('Individually Explained Variances are:\\n{}'.format(var_expl))\n\
    \        print('=='*30)\n        print('Cumulative Explained Variances are: {}'.format(cum_var))\n\
    \        Individually Explained Variances are:\n        [0.7494 0.1461 0.0983\
    \ 0.0062 0.    ]\n        ============================================================\n\

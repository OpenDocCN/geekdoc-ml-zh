  md: "# White Noise\n\nThe time series $\\epsilon_t$ is said to be white noise if\
    \ it satisfies the following:\n\n$$\\epsilon_t \\sim WN(0, \\sigma_\\epsilon^2)$$\n\
    $$\\text{Corr}(\\epsilon_t, \\epsilon_s) = 0, \\forall t \\neq s$$\n\nIn words,\
    \ $\\epsilon_t$ has mean of 0 and constant variance. Moreover, there is no correlation\
    \ between successive terms of $\\epsilon_t$.\n\nWell, it is easy to say that white\
    \ noise process is stationary and plot of white noise exhibits fluctuations around\
    \ mean in a random fashion in time.\n\nHowever, as the white noise is formed by\
    \ uncorrelated sequence, it is not an appealing model from forecasting standpoint.\
    \ Differently, uncorrelation prevents us to forecast future values.\n\nAs we can\
    \ observe from the Figure Figure 2-13 below, white noise oscillates around mean\
    \ and it is completely erratic.\n\n```\nIn [25]: mu = 0\n        std = 1\n   \
    \     WN = np.random.normal(mu, std, 1000)\n\n        plt.plot(WN)\n        plt.xlabel('Number\
    \ of Simulation')\n        plt.savefig('images/WN.png')\n        plt.show()\n\
    ```"

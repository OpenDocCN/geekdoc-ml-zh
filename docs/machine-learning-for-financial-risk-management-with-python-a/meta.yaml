    As is discussed, ES provides us a coherent risk measure to gauge market risk.
    However, even though we differentiate financial risk as market, credit, liquidity,
    and operational, it does not necessarily mean that these risks are entirely unrelated
    to each other. Rather, they are, to some extent, correlated. That is, once a financial
    crisis hit the market, market risk surges align with the drawdown on lines of
    credit, which in turn increase liquidity risk.


    Given the situation of the economy, the effect of illiquidity varies as it becomes
    commonplace during huge market downturns but it is more manageable during normal
    times. Therefore, its impact will be more distinct in down market.


    This fact is supported by Antoniades stating that


    > Common pool of liquid assets is the resource constraint through which liquidity
    risk can affect the supply of mortgage credit. During the financial crisis of
    2007–2008 the primary source of stresses to bank funding conditions arose from
    the funding illiquidity experienced in the markets for wholesale funding.


    —Antoniades (Liquidity Risk and the Credit Crunch of 2007-2008: Evidence from
    Micro-Level Data on Mortgage Loan Applications, 2014, p.6)


    Ignoring liquidity dimension of risk may cause underestimating the market risk.
    Therefore, augmenting ES with liquidity risk may result in more accurate and reliable
    estimation. Well, it sounds appealing but how can we find a proxy for liquidity?'
  - "[PAGE 180]\n\n> NOTE\n\nLiquidity can be defined as the easiness of the trasaction\
    \ with which assets can be sold in a very short time period without a significant\
    \ impact on market price. There are two main measures of liquidity:\n\n*   Market\
    \ liquidity: The ease with which an asset is traded.\n*   Funding liquidity: The\
    \ ease with which investor can obtain funding.\n\nLiquidity and the risk arising\
    \ from it will be discussed in a greater detail in Chapter-7. So, much of the\
    \ discussion is left to this chapter.\n\nIn the literature, bid-ask spread measures\
    \ are commonly used for modeling liquidity. Shortly, bid-ask spread is the difference\
    \ of bid-ask prices. Put differently, it is the difference between the highest\
    \ available price (bid price) that a buyer is willing to pay and the lowest price\
    \ (ask price) that a seller is willing to get. So, bid-ask spread gives a tool\
    \ to measure the transaction cost.\n\nTo the extent that bid-ask spread is a good\
    \ indicator of transaction cost, it is also a good proxy of liquidity in the sense\
    \ that transaction cost is one of the components of liquidity. Spreads can be\
    \ defined various ways depending on their focus. Here is the bid-ask spreads that\
    \ we will use to incorporate liquidity risk into ES model.\n\n+   *   Effective\
    \ Spread\n\n    Effective Spread $= 2 * |(P_t - P_{mid})|$\n\n    where $P_t$\
    \ is the price of trade at time t and $P_{mid}$ is the midpoint of the bid-ask\
    \ offer ($ (P_{ask} - P_{bid})/2 $) prevailing at the time of the $t$.\n\n*  \
    \ Proportional Quoted Spread\n\n    Proportional Quoted Spread $= (P_{ask} - P_{bid})/P_{mid}$\n\
    \n    where $P_{ask}$ is the ask price and $P_{bid}$ and $P_{mid}$ are bid price\
    \ and mid price, respectively."
  - '[PAGE 181]


    +   - Quoted Spread


    Quoted Spread = $P_{ask} - P_{bid}$


    +   - Proportional Effective Spread:


    Proportional Effective Spread = $2 * (|P_t - P_{mid}|)/P_{mid}$


    # Effective Cost


    Effective Cost = $\begin{cases} (P_t - P_{mid})/P_{mid} & \text{for buyer initiated}
    \ (P_{mid}/P_t)/P_{mid} & \text{for seller initiated} \end{cases}$


    Buyer-initiated trade occurs when a trade is executed at a price abover quoted
    mid price. Similarly, seller-initiated trade occurs when a trade is executed at
    a price below than the quoted mid price.


    Now, we need to find a way to incorporate these bid-ask spreads into the ES model
    so that we are able to account for the liquidity risk as well as market risk.
    We employ two different methods to accomplish this task. First one is to take
    the cross-sectional mean of the bid ask spread as suggested by Chordia et al.,
    (2000) and Pastor and Stambaugh (2003). The second method is to apply Principal
    Component Analysis (PCA) as proposed by Mancini et al. (2013).


    Cross-sectional mean is nothing but averaging the bid-ask spread. Using this method,
    we are able to generate a measure for market-wide liquidity. The averaging formula
    is as follows:


    $L_{M,t} = \frac{1}{N} \sum_{i}^{N} L_{i,t}$


    where $L_{M,t}$ is the market liquidity and $L_{i,t}$ is the individual liquidity
    measure, namely bid-ask spread in our case.


    $ES_L = ES + \text{Liquidity Cost}$


    $ES_L = \frac{1}{1-\alpha} \int_{\alpha}^{1} VaR_u du + \frac{1}{2} P_{last}(\mu
    + k\sigma)$



    \n## 自回归模型\n\n连续项之间的依赖结构是自回归模型最显著的特征，因为在这个模型中，当前值是对其自身滞后值进行回归。因此，我们基本上是通过使用其过去值的线性组合来预测时间序列\
    \ $X_t$ 的当前值。从数学上讲，AR(p) 的一般形式可以写成：\n\n$$X_t = c + \\alpha_1 X_{t-1} + \\alpha_2\
    \ X_{t-2}... + \\alpha_p X_{t-p} + \\epsilon_t$$\n\n其中 $\\epsilon_t$ 表示残差，c 是截距项。AR(p)\
    \ 模型意味着直到 p 阶的过去值对 $X_t$ 具有一定的解释力。如果这种关系的记忆较短，那么很可能用较少的滞后数来建模 $X_t$。\n\n我们已经讨论了时间序列的一个主要特性，即*平稳性*，另一个重要特性是*可逆性*。在介绍了\
    \ AR 模型之后，现在是时候展示 MA 过程的可逆性了。如果它可以转换为无限 AR 模型，则称其为可逆的。\n\n不同地，在某些情况下，MA 可以写成一个无限\
    \ AR 过程。这些情况是具有平稳协方差结构、确定性部分和可逆的 MA 过程。这样做，我们得到了另一个模型，称为*无限 AR*，这得益于 $|\\alpha|\
    \ < 1$ 的假设。\n\n$$X_t = \\epsilon_t + \\alpha\\epsilon_{t-1}$$\n$$= \\epsilon_t\
    \ + \\alpha(X_{t-1} - \\alpha\\epsilon_{t-2})$$\n$$= \\epsilon_t + \\alpha X_{t-1}\
    \ - \\alpha^2\\epsilon_{t-2}$$\n$$= \\epsilon_t + \\alpha X_{t-1} - \\alpha^2(X_{t-2}\
    \ + \\alpha\\epsilon_{t-3})$$\n$$= \\epsilon_t + \\alpha X_{t-1} - \\alpha^2 X_{t-2}\
    \ + \\alpha^3\\epsilon_{t-3})$$\n$$= ...$$\n$$= \\alpha X_{t-1} - \\alpha^2 X_{t-2}\
    \ + \\alpha^3\\epsilon_{t-3} - \\alpha^4\\epsilon_{t-4} + ... - (-\\alpha)^n\\\
    epsilon_{t-n}$$\n\n进行必要的数学运算后，方程得到以下形式：\n\n$$\\alpha^n\\epsilon_{t-n} = \\epsilon_t\
    \ - \\sum_{i=0}^{n-1} \\alpha^i X_{t-i}$$\n\n在这种情况下，如果 $|\\alpha| < 1$。那么 $n \\\
    rightarrow \\infty$\n\n$$\\mathbb{E}\\left(\\epsilon_t - \\sum_{i=0}^{n-1} \\\
    alpha^i X_{t-i}\\right)^2 = \\mathbb{E}(\\alpha^{2n}\\epsilon_{t-n}^2 \\rightarrow\
    \ \\infty)$$\n\n最终，MA(1) 过程变为：\n\n$$\\epsilon_t = \\sum_{i=0}^{\\infty} \\alpha^i\
    \ X_{t-i}$$\n\n由于 AR 和 MA 过程之间的对偶性，可以将 AR(1) 表示为无限 MA，即 MA($\\infty$)。换句话说，AR(1)\
    \ 过程可以表示为创新项过去值的函数。\n\n$$X_t = \\epsilon_t + \\theta X_{t-1}$$\n$$= \\theta(\\\
    theta X_{t-2} + \\epsilon_{t-1}) + \\epsilon_t$$\n$$= \\theta^2 X_{t-2} + \\theta\
    \ \\epsilon_{t-1} + \\epsilon_t$$\n$$= \\theta^2(\\theta X_{t-3} + \\theta \\\
    epsilon_{t-2}) \\theta \\epsilon_{t-1} + \\epsilon_t$$\n$$X_t = \\epsilon_t +\
    \ \\epsilon_{t-1} + \\theta^2 \\epsilon_{t-2} + \\dots + \\theta^t X_t$$\n\n当\
    \ $n \\rightarrow \\infty$ 时，$\\theta^t \\rightarrow 0$，因此我可以将 AR(1) 表示为一个无限 MA\
    \ 过程。\n\n在接下来的分析中，我们运行自回归模型来预测苹果和微软的股票价格。与移动平均不同，偏自相关函数是找出自回归模型中最佳阶数的有用工具。这是因为在\
    \ AR 中，我们的目标是找出时间序列在两个不同时间点（例如 $X_t$ 和 $X_{t-k}$）之间的关系，为此我需要过滤掉中间其他滞后的影响。\n\n\
    ```\nIn [37]: sm.graphics.tsa.plot_pacf(diff_train_aapl,lags=30)\n        plt.title('PACF\

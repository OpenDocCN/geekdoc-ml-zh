    \ and statistical method. The latter, of course, has better and robust way of\
    \ detecting the non-stationarity. However, to improve our understanding, let’s\
    \ start with the ACF. Slow-decaying ACF implies that the data is non-stationary\
    \ because it presents a strong correlation in time. That is what I observe in\

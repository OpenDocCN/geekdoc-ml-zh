    \ sigmoid，因为 *softmax* 将输入转换为与输入数字的指数成正比的概率分布：\n\n$$softmax(x_i) = \\frac{exp(x_i)}{\\\
    sum_i exp(x_i)}$$\n\nHaviv 等人 (2019) 对 RNN 的缺点进行了很好的阐述：\n\n> *这是由于网络对其过去状态的依赖，并通过它们依赖于整个输入历史。这种能力是有代价的——RNN\
    \ 以难以训练而闻名 (Pascanu et al., 2013a)。这种困难通常与在尝试跨长时间传播误差时出现的梯度消失有关 (Hochreiter, 1998)。当训练成功时，网络的隐藏状态代表了这些记忆。理解这种表示如何在训练过程中形成，可以为改进记忆相关任务的学习开辟新的途径。*\n\
    \n## 长短期记忆\n\n长短期记忆，简称 LSTM，是一种深度学习方法，由 Hochreiter 和 Schmidhuber (1997) 开发，主要基于门控循环单元\
    \ (GRU)。\n\nGRU 的提出是为了解决梯度消失问题，这是神经网络结构中的一个常见问题，当权重更新变得太小以至于无法在网络中产生显著变化时就会发生。GRU\
    \ 由两个门组成：*更新*门和*重置*门。当检测到早期观测值非常重要时，我们就不更新隐藏状态。类似地，当早期观测值不显著时，它会导致状态重置。\n\n正如我们之前讨论的，RNN\
    \ 最吸引人的特点之一是其连接过去和现在信息的能力。然而，当“长期依赖”问题出现时，这种能力就变成了一个弱点。长期依赖意味着模型从早期的观测中学习。\n\n\
    例如，让我们看下面的句子：\n\n> *Countries have their own currencies as in USA where people\
    \ transact with dollar*\n\n在短期依赖的情况下，已知下一个预测的词是关于一种货币，但如果问是哪种货币？那么，事情就变得复杂了，因为文本中可能有各种货币，这意味着长期依赖。需要追溯到很早才能找到关于使用美元的国家的相关信息。\n\
    \nLSTM 试图以一种方式解决 RNN 在长期依赖方面的弱点，即 LSTM 有一个非常有用的工具来消除不必要的信息，从而使其工作更高效。LSTM 通过门来工作，使\

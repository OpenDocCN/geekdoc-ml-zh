    \ 1.0647130086973815\n```\n\n```\nIn [70]: k = 1.96\nfor i, j in zip(range(len(symbols)),\
    \ symbols):\n    print('The liquidity Adjusted ES of {} is {}'.format(j, ES_params[i]\
    \ + (df.loc[j].values[0] / 2) * (mean_pca_liq + k * std_corr)))\nThe liquidity\
    \ Adjusted ES of IBM is 144476.18830537834\nThe liquidity Adjusted ES of MSFT\
    \ is 139145.94711344707\nThe liquidity Adjusted ES of INTC is 146133.65849966934\n\
    ```\n\n+   1. Calculating the liquidity part of liquidity-adjusted ES formula\
    \ for the first principal component.\n2. Calculating the liquidity part of liquidity-adjusted\
    \ ES formula for the first principal component.\n3. Calculating cross-sectional\
    \ mean of the two principal components.\n4. Estimating the liquidity-adjusted\
    \ ES.\n\n# Conclusion\n\nMarket risk has been always under scrutiny as it gives\
    \ us the extent to which a company is vulnerable to risk emanating from market\
    \ events. In a financial risk management textbook, it is customary to find a VaR\
    \ and ES model, which are two prominent and commonly applied model in theory and\
    \ practice. In this chapter, after providing an introduction to these models,\
    \ a cutting edge models are introduced to revisit and improve model estimation.\
    \ To this end, first we try to distinguish information flowing in the form of\
    \ noise and signal, which is called denoising. In what follows, denoised covariance\
    \ matrix is employed to improve the VaR estimation."

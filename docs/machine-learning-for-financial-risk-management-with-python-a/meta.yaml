    plt.show()\n```\n\n- 1. 在指定区间内迭代ARCH参数p。\n- 2. 使用不同的p值运行ARCH模型。\n- 3. 寻找最小的贝叶斯信息准则分数以选择最佳模型。\n\
    - 4. 使用最佳p值运行ARCH模型。\n- 5. 基于优化的ARCH模型预测波动率。\n- 6. 计算RMSE分数。\n\n基于我们第一个模型的波动率预测结果如图4-3所示。\n\
    \n![](img/4d5c72349594c4072f5436e47fcbab43_105_0.png)\n\n图4-3. 使用ARCH进行波动率预测\n\
    \n## GARCH模型\n\nGARCH模型是ARCH模型的扩展，它纳入了滞后的条件方差。因此，通过添加p个滞后的条件方差，ARCH得到了改进，这使得GARCH模型成为一个多元模型，因为它是一个针对条件方差的自回归移动平均模型，包含p个滞后的平方收益率和q个滞后的条件方差。GARCH\
    \ (p, q) 可以表述为：\n\n$$\\sigma_t^2 = \\omega + \\sum_{k=1}^{q} \\alpha_k r_{t-k}^2\
    \ + \\sum_{k=1}^{p} \\beta_k \\sigma_{t-k}^2$$\n\n其中 $\\omega$、$\\beta$ 和 $\\\
    alpha$ 是待估计的参数，q 和 p 是模型中的最大滞后阶数。为了得到一致的GARCH模型，应满足以下条件：\n\n- $\\omega > 0$\n\
    - $\\beta \\geq 0$\n- $\\alpha \\geq 0$\n- $\\beta + \\alpha < 1$\n\nARCH模型无法捕捉历史新息的影响。然而，作为一个更简约的模型，GARCH模型可以解释历史新息的变化，因为GARCH模型可以表示为无限阶的ARCH。让我们展示GARCH如何表示为无限阶的ARCH。\n\
    \n$$\\sigma_t^2 = \\omega + \\alpha r_{t-1}^2 + \\beta \\sigma_{t-1}^2$$\n\n然后将\
    \ $\\sigma_{t-1}^2$ 替换为 $\\omega + \\alpha r_{t-2}^2 + \\beta \\sigma_{t-2}^2$\n\
    \n$$\\sigma_t^2 = \\omega + \\alpha r_{t-1}^2 + \\beta(\\omega + \\alpha r_{t-2}^2\
    \ \\sigma_{t-2}^2)$$\n$$= \\omega(1 + \\beta) + \\alpha r_{t-1}^2 + \\beta \\\
    alpha r_{t-2}^2 + \\beta^2 \\sigma_{t-2}^2)$$\n\n现在，让我们将 $\\sigma_{t-2}^2$ 替换为\
    \ $\\omega + \\alpha r_{t-3}^2 + \\beta \\sigma_{t-3}^2$ 并进行必要的数学运算，我们最终得到：\n\n\
    $$\\sigma_t^2 = \\omega(1 + \\beta + \\beta^2 + \\dots) + \\alpha \\sum_{k=1}^{\\\
    infty} \\beta^{k-1} r_{t-k}$$\n\n与ARCH模型类似，在Python中使用GARCH建模波动率有多种方法。让我们首先尝试使用优化技术开发我们自己的Python代码。接下来，将使用\
    \ *arch* 库来预测波动率。\n\n```\nIn [19]: a0 = 0.0001\n        sgm2 = ret.var()\n   \
    \     K = ret.kurtosis()\n```\n\n```\nh = 1 - alpha / sgm2\nalpha = np.sqrt(K\
    \ * (1 - h ** 2) / (2.0 * (K + 3)))\nbeta = np.abs(h - omega)\nomega = (1 - omega)\
    \ * sgm2\ninitial_parameters = np.array([omega, alpha, beta])\nprint('Initial\
    \ parameters for omega, alpha, and beta are \\n{}\\n{}\\n{}'.format(omega, alpha,\
    \ beta))\n```\n\nomega、alpha和beta的初始参数为\n0.43471178001576827\n0.512827280537482\n\
    0.02677799855546381\n\n```\nIn [20]: retv = ret.values\n```\n\n```\nIn [21]: @jit(nopython=True,\
    \ parallel=True)\ndef garch_likelihood(initial_parameters, retv):\n    omega =\
    \ initial_parameters[0]\n    alpha = initial_parameters[1]\n    beta = initial_parameters[2]\n\
    \    T = len(retv)\n    logliks = 0\n    sigma2 = np.zeros(T)\n    sigma2[0] =\
    \ np.var(retv)\n    for t in range(1, T):\n        sigma2[t] = omega + alpha *\
    \ (retv[t - 1]) ** 2 + beta * sigma2[t-1]\n    logliks = np.sum(0.5 * (np.log(sigma2)\
    \ + retv ** 2 / sigma2))\n    return logliks\n```\n\n```\nIn [22]: logliks = garch_likelihood(initial_parameters,\
    \ retv)\nprint('The Log likelihood is {:.4f}'.format(logliks))\n```\n\n对数似然值为\
    \ 1387.7215\n\n```\nIn [23]: def garch_constraint(initial_parameters):\n    alpha\
    \ = initial_parameters[0]\n    gamma = initial_parameters[1]\n    beta = initial_parameters[2]\n\
    \    return np.array([1 - alpha - beta])\n```\n\n```\nIn [24]: bounds = [(0.0,\
    \ 1.0), (0.0, 1.0), (0.0, 1.0)]\n```\n\n```\nIn [25]: def opt_paramsG(initial_parameters,\
    \ retv):\n    opt_result = opt.minimize(garch_likelihood,\n                  \
    \            x0=initial_parameters,\n                              constraints=np.array([1\
    \ - alpha - beta]),\n                              bounds=bounds, args=(retv),\n\
    \                              method='Nelder-Mead',\n                       \
    \       options={'maxiter': 5000})\n    params = opt_result.x\n```"

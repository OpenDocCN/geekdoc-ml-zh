  md: '# Preface


    AI and ML reflect the natural evolution of technology as increased computing power
    enables computers to sort through large data sets and crunch numbers to identify
    patterns and outliers.


    > —BlackRock (2019)


    Financial modeling has a long history with many successfully accomplished task
    but at the same time it has been fiercely critized due mainly to lack of *flexibility*
    and *non-inclusiveness* of these models. 2007-2008 financial crisis fueled this
    debate and paved the way for innovations and different approaches in the field
    of financial modeling.


    Of course, this financial crisis is not the mere reason that precipitates the
    growth of AI applications in finance but also two more main drivers have spurred
    the adoption of AI in finance. That being said, data availability has enhanced
    computing power and intensified researches in 1990s.


    Financial Stability Board (2017) stresses the validity this fact by stating:


    > “Many applications, or use “cases”, of AI and machine learning already exist.
    The adoption of these use cases has been driven by both supply factors, such as
    technological advances and the availability of financial sector data and infrastructure,
    and by demand factors, such as profitability needs, competition with other firms,
    and the demands of financial regulation.”


    > —FSB


    As a sub-branch of financial modeling, financial risk management has been evolving
    with the adoption of AI in parallell with ever-growing role in financial decision
    making process. In his celebrated book, Bostrom (2014) denotes that there are
    two important revolutions in the history of mankind: *Agricultural Revolution*
    and *Industrial Revolution*. These two revolutions have such a profound impact
    that any third revolution of similar magnitude would double in size of world economy
    in 2 weeks. Even more strikingly, if'
  merge: -1
  pgno: 4
- img_proc: true
  md: 'the third revolution accomplishes by artificial intelligence, the impact would
    be way more profound.


    So, the expectation is sky-high about AI applications shaping financial risk management
    at an unprecedented scale by making use of big data and understanding the complex
    structure of risk processes.


    With this study, I aim to fill the void about machine learning-based applications
    in finance so that predictive and measurement performance of financial models
    can be improved. As parametric models suffer from low variance-high bias issue,
    machine learning models, with their flexibility, can address this problem. Moreover,
    as a common problem in finance, changing distribution of the data always poses
    a thread to the realibility of the model result but machine learning models can
    adapt themselves to this changing pattern in a way that models fits better. So,
    there is a huge need and demand about applicable machine learning models in finance
    and what mainly distinguish this book is the inclusion of brand new machine learning-based
    modeling approaches in financial risk management.


    In a nutshell, this book aims to shift the current landscape of financial risk
    management, which is heavily based on the parametric models. The main motivation
    for this shift is the recent experience in highly accurate financial models based
    on Machine Learning models. Thus, this book is intended for those who has some
    initial thoughts about finance and Machine Learning in the sense that I just provide
    brief explanations on these topics.


    Consequently, the targeted audience of the book includes, but not limited to,
    financial risk analysts, financial engineers, risk associates, risk modelers,
    model validators, quant risk analysts, portfolio analyst and those who are interested
    in finance and data science.


    In light of the background of the targeted audience, having introductory level
    of finance and data science knowledge would enable the highest benefit that you
    can get from the book. It does not, however, mean that people from different background
    cannot follow this book topics. Rather, readers from different background can
    grasp the concepts as long as they spend enough'
  merge: -1
  pgno: 5
- img_proc: true
  md: 'time and refer to some other finance and data science books along with this
    one.

    The book consists of ten chapters.


    # Chapter 1


    Gives an introduction about the main risk management concepts. So, it covers risks,
    types of risks such as market, credit, operational, liquidity, risk management.
    After defining what the risk is, types of risks are discussed, and then risk management
    is explained and the issues of why it is important and how it can be used to mitigate
    losses is addressed. In what follows, asymmetric information, which can address
    the market failures are discussed. To do that, we will focus on the information
    asymmetry and adverse selection.


    # Chapter 2


    Shows the time-series applications using traditional models, namely moving average
    model, autoregressive model, autoregressive integrated moving average model. In
    this part, we learn how to use an API to access financial data and how to employ
    it. This chapter main aims to provide us a benchmark to compare the traditional
    time series approach with recent development in time series modeling, which is
    the main focus of the next chapter.


    # Chapter 3


    Introduces the deep learning tools for time series modeling. Recurrent Neural
    Network and Long Short Term Memory are two approaches by which we are able to
    model the data with time dimension. Besides, this chapter gives us an impression
    about the applicability of deep learning models to time series modeling.


    # Chapter 4


    Focuses on the volatility prediction. Increased integration of financial markets
    has led to a prolonged uncertainty in financial markets, which in'
  merge: -1
  pgno: 6
- img_proc: true
  md: 'turn stresses the importance of volatility. Volatility is used in measuring
    the degree of risk, which is one of the main engagements of the area of finance.
    The fourth chapter deals with the novel volatility modeling based on Support Vector
    Regression, Neural Network, Deep Learning, and Bayesian approach. For the sake
    of comparison of the performances, traditional ARCH and GARCH-type models are
    also employed.


    # Chapter 5


    Employs machine learning-based models to boost estimation performance of the traditional
    market risk models, namely Value-at-Risk (VaR) and Expected Shortfall (ES). VaR
    is a quantitative approach for the potential loss of fair value due to market
    movements that will not be exceeded in a defined period of time and with a defined
    confidence level. Expected Shortfall, on the other hand, focuses on the tail of
    the distribution referring to big and unexpected losses. VaR model is developed
    using denoised covariance matrix and ES is developed incorporating liquidity dimension
    of the data.


    # Chapter 6


    Tries to introduce comprehensive machine learning-based approach to estimate credit
    risk. Machine Learning models are applied based on the past credit information
    along with others. The approach starts with risk bucketing, which is suggested
    by Basel Accord and continue with different models bayesian estimation, Markov
    Chain model, support vector classification, random forest, neural network, and
    deep learning. In the last part of the chapter, the performance of these models
    will be compared.


    # Chapter 7


    Gaussian Mixture model is used to model the liquidity, which is thought to be
    a neglected dimension in risk management. This model allows us to incorporate
    different aspects of the liquidity proxies in this chapter so'
  merge: -1
  pgno: 7
- img_proc: true
  md: 'that we will be able to capture the effect of liquidity on financial risk in
    a more robust way.


    # Chapter 8


    Covers the operational risk, which may result in a failure mostly due to companies
    internal weakness. There are several sources of operational risks but fraud risk
    is one of the most time-consuming and detrimental one to the companies operations.
    Here, in this chapter, fraud is will be our main focus and new approaches will
    be developed to have better-performing fraud application based on machie learning
    models.


    # Chapter 9


    Introduces a brand new approach in modeling the corporate governance risk: Stock
    Price Crash. Many studies find an empirical link between stock price crash and
    corporate governance. This chapter, using Minimum Covariance Determinant model,
    attempts to unveil the relationship between the components of corporate governance
    risk and stock price crash.


    # Chapter 10


    Makes use of synthetic data to estimate different financial risks. The aim of
    this chapter is to highlight the emergence of synthetic data that helps us to
    minimize the impact of limited historical data. So, synthetic data allows us to
    have large enough and high-quality data, which improves the quality of the model.'

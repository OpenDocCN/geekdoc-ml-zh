    # Denoising


    Volatility is everywhere but it is formidable task to find out what kind of volatility
    is most valuable. In general, there are two types of information in the market:
    *noise* and *signal*. The former generates nothing but random information but
    the latter equip us with a valuable information by which investor can make money.
    To illustrate, consider that there are two main players in the market the one
    use noisy information called noise trader and informed trader who exploits signal
    or insider information. Noise traders trading motivation is driven by random behavior.
    So, information flow to the market signals are thought to be as buying signal
    for some noise traders and selling for others.


    However, informed trader is considered to be a rational one in the sense that
    insider informed trader is able to assess a signal because she knows that it is
    a private information.


    Consequently, continuous flow of information should be treated with caution. In
    short, information coming from noise trader can be considered as noise and information
    coming from insider can be taken as signal and this is the sort of information
    that matters. Investor who cannot distinguish noise and signal can fail to gain
    profit and/or assess the risk in a proper way.'

    \n## Neural Network\n\nNeural Network (NN) is the building block for deep learning.\
    \ In NN, data is processed by multiple stages in a way to make a decision. Each\
    \ neuron takes a result of a dot product as input and use it as input in activation\
    \ function to make a decision.\n\n$$z = w_1x_1 + w_2x_2 + b$$\n\nwhere b is bias,\
    \ w is weight, and x is input data.\n\nDuring this process, input data is undertaken\
    \ various mathematical manipulation in hidden and output layers. Generally speaking,\
    \ NN has three types of layers:\n\n- Input layer\n- Hidden layer\n- Output layer\n\
    \nInput layer includes raw data. In going from input layer to hidden layer, we\
    \ learn coefficients. There may be one or more than one hidden layers depending\
    \ on the network structure. The more hidden layer the network has, the more complicated\
    \ it is. Hidden layer, locating between input and output layers, perform nonlinear\
    \ transformation via activation function.\n\nFinally, output layer is the layer\
    \ in which output is produced and decision is made.\n\nIn Machine Learning, Gradient\
    \ Descent is the tool applied to minimize the cost function but employing only\
    \ gradient descent in neural network is not feasible due to the chain-like structure\
    \ in neural network. Thus, a new concept known as backpropagation is proposed\
    \ to minimize the cost function. The idea of backpropagation rest upon the calculating\
    \ error between observed and actual output and pass this error to the hidden layer.\
    \ So, we move backward and the main equation takes the form of:\n\n$$\\delta^l\
    \ = \\frac{\\delta J}{\\delta z^l_j}$$\n\nwhere z is linear transformation and\
    \ $\\delta$ represents error. There is much more to say but to keep myself on\
    \ track I stop here. For those who wants to dig more into math behind Neural Network\
    \ please refer to Wilmott (2013) and Alpaydin (2020).\n\n## Gradient Descent\n\
    \nSuppose that we are at the top of the hill and try to reach to the plateau at\
    \ which we minimize the cost function. Formally, Gradient Descent is an optimization\
    \ algorithm used to search for best parameter space (w, b) which minimize cost\
    \ function via following update rule:\n\n$$\\theta_{t+1} = \\theta_t - \\lambda\
    \ \\frac{\\delta J}{\\delta \\theta_t}$$\n\nwhere $\\theta(w, b)$ is the function\
    \ of weight, w, and bias, b. J is cost function, and $\\lambda$ is the learning\
    \ rate, which is a constant number deciding how fast we want to minimize the cost\
    \ function. Well, at each iteration, we update the parameters to minimize the\
    \ error.\n\nShortly, The gradient descent algorithm works in the following way:\n\
    \n1. Select initial values for w and b.\n2. Take an $\\lambda$ step in the direction\
    \ opposite to where the gradient points.\n3. Update w and b at each iteration.\n\

    There are two common MCMC methods: Metropolis-Hastings and Gibbs Sampler. Here,
    we delve into the former one.


    # Metropolis-Hastings


    Metropolis-Hastings (M-H) allows us to have efficient sampling procedure with
    two steps: First we draw sample from proposal density and, in the second step,
    we decide either to accept or reject.


    Let $q(\theta|\theta^{t-1})$ be a proposal density and $\theta$ be a parameter
    space. The entire algorithm of M-H can be summarized as:


    +   1. Select initial value for $\theta^1$ from parameter space $\theta$'
  - "[PAGE 139]\n\n+   2. Select a new parameter value $\\theta^2$ from proposal density,\
    \ which can be, for the sake of easiness, Gaussian or Uniform distribution.\n\
    3. Compute the following acceptance probability:\n$$\\text{Pr}_a \\left(\\theta^*,\
    \ \\theta^{t-1}\\right) = min \\left(1, \\frac{p(\\theta^*) / q(\\theta^* | \\\
    theta^{t-1})}{p(\\theta^{t-1}) / q(\\theta^{t-1} | \\theta^*)}\\right)$$\n4. If\
    \ $\\text{Pr}_a \\left(\\theta^*, \\theta^{t-1}\\right)$ is greater than a sample\
    \ value drawn from uniform distribution U(0,1).\n5. Repeat from step 2.\n\nWell,\
    \ it appears intimidating but don’t be. We have built-in code in Python makes\
    \ the applicability of the M-H algorithm way easier. We use *PyFlux* library to\
    \ make use of Bayes’ Theorem. Let’s go and apply M-H algorithm to predict volatility.\n\
    \n```\nIn [73]: import pyflux as pf\n        from scipy.stats import kurtosis\n\
    \nIn [74]: model = pf.GARCH(ret.values, p=1, q=1)❶\n        print(model.latent_variables)❷\n\
    \        model.adjust_prior(1, pf.Normal())❸\n        model.adjust_prior(2, pf.Normal())❸\n\
    \        x = model.fit(method='M-H', iterations='1000')❹\n        print(x.summary())\n\
    \        Index  Latent Variable  Prior  Prior Hyperparameters\n        V.I. Dist\
    \  Transform\n        ========================================\n        ========================================\n\
    \        0  Vol Constant  Normal  mu0: 0, sigma0: 3\n        Normal  exp\n   \
    \     1  q(1)  Normal  mu0: 0, sigma0: 0.5\n        Normal  logit\n        2 \
    \ p(1)  Normal  mu0: 0, sigma0: 0.5\n        Normal  logit\n        3  Returns\
    \ Constant  Normal  mu0: 0, sigma0: 3\n        Normal  None\n        Acceptance\
    \ rate of Metropolis-Hastings is 0.00285\n        Acceptance rate of Metropolis-Hastings\
    \ is 0.2444\n```"

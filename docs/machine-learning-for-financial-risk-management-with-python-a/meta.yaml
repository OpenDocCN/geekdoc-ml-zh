    Even if we can have satisfactory predictive performance, the drawbacks of the
    RNN model should not be overlooked. The main drawbacks of the model are:


    +   - Vanishing or exploding gradient problem. Please see the side note below
    for detailed explanation.

    - Training an RNN is a very difficult task as it require consideranle amount of
    data.

    - RNN is unable to process very long sequences when *tanh* activation function
    is used.


    > ## NOTE


    Vanishing gradient is a commonplace problem in deep learning, which is not properly
    designed. Vanishing gradient problem arises if the gradient tends to get smaller
    as we are conducting backpropagation. It implies that neurons are learning so
    slow that optimization grind to a halt.


    Unlike vanishing gradient problem, exploding gradient problem occurs when small
    changes in the backpropagation result in huge updates in the weights during optimization
    process.'

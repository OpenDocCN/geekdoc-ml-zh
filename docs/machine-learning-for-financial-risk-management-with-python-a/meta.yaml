    \ the following acceptance probability:\n$$\\text{Pr}_a \\left(\\theta^*, \\theta^{t-1}\\\
    right) = min \\left(1, \\frac{p(\\theta^*) / q(\\theta^* | \\theta^{t-1})}{p(\\\
    theta^{t-1}) / q(\\theta^{t-1} | \\theta^*)}\\right)$$\n4. If $\\text{Pr}_a \\\

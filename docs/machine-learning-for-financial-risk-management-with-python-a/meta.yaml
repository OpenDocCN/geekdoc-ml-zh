    > ## NOTE


    Following Fama (1965), it is realized that some stock price returns do not follow
    normal distribution due to fat tail and asymmetry. Rather they follow leptokurtic
    distribution. This empirical observation implies stock returns have higher kurtosis
    than that of normal distribution.


    Having high kurtosis amounts to fat-tail and this might results in extreme negative
    returns. As the Variance-Covariance method is unable to capture fat-tail, it cannot,
    therefore, estimate extreme negative return, which is likely to occur especially
    in the crisis period.'

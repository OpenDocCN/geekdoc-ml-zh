  mdcn: "## ARCH 模型\n\n早期对波动率建模的尝试之一由恩格尔（Engel，1982）提出，被称为 ARCH 模型。ARCH 模型是一个单变量模型，基于历史资产收益率。ARCH(p)\
    \ 模型具有以下形式：\n\n$$\\sigma_t^2 = \\omega + \\sum_{k=1}^p \\alpha_k (r_{t-k})^2$$\n\
    \n其中\n\n$$r_t = \\sigma_t \\epsilon_t$$\n\n其中 $\\epsilon_t$ 被假定服从正态分布。在这个参数模型中，我们需要满足一些假设才能保证方差严格为正。为此，应满足以下条件：\n\
    \n- $\\omega > 0$\n- $\\alpha_k \\geq 0$\n\n所有这些方程告诉我们，ARCH 是一个单变量非线性模型，其中波动率是用过去收益率的平方来估计的。ARCH\
    \ 最显著的特征之一是它具有时变条件方差$^1$的性质，因此 ARCH 能够对被称为波动率聚集的现象进行建模，即正如本华·曼德博（Benoit Mandelbrot，1963）所指出的，大的变动往往伴随着同方向的大变动，小的变动往往伴随着小变动。因此，一旦重要公告进入市场，可能会导致巨大的波动。\n\
    \n以下代码块展示了如何绘制聚集现象及其外观：\n\n```\nIn [5]: retv = ret.values\n\nIn [6]: plt.figure(figsize=(10,\
    \ 6))\n        plt.plot(s_p500.index[1:], ret)\n        plt.title('Volatility\
    \ clustering of S&P-500')\n        plt.ylabel('Daily returns')\n        plt.xlabel('Date')\n\
    \        plt.savefig('images/vol_clustering.png')\n        plt.show()\n```\n\n\
    ❶ 将数据框转换为 numpy 表示。\n\n与已实现波动率中的尖峰类似，图 4-2 显示了一些大的波动，毫不奇怪，这些起伏发生在重要事件周围，例如 2020\
    \ 年中期的 Covid-19 大流行。\n\n![](img/4d5c72349594c4072f5436e47fcbab43_98_0.png)\n\n\
    图 4-2. 波动率聚集 - S&P-500\n\n尽管它具有诸如简单性、非线性、易用性和可调整用于预测等吸引人的特点，但它也有某些缺点，可以列举如下：\n\
    \n- 对正负冲击的反应相同。\n- 强假设，例如对参数的限制。\n- 由于对大的变动调整缓慢，可能导致错误预测。\n\n这些缺点促使研究人员致力于 ARCH\
    \ 模型的扩展，Bollerslev（1986）和 Taylor（2008）提出了 GARCH 模型。\n\n现在，我们将使用 ARCH 模型来预测波动率，但首先让我们生成自己的\
    \ Python 代码，然后将其与内置的 Python 代码进行比较以查看差异。\n\n```\nIn [7]: n = 252\n        split_date\
    \ = ret.iloc[-n:].index\n```\n\n```\nIn [8]: sgm2 = ret.var()\n    K = ret.kurtosis()\n\
    \    alpha = (-3.0 * sgm2 + np.sqrt(9.0 * sgm2 ** 2 - 12.0 * (3.0 * sgm2 - K)\
    \ * K)) / (6 * K)\n    omega = (1 - alpha) * sgm2\n    initial_parameters = [alpha,\
    \ omega]\n    omega,alpha\nOut[8]: (0.6345749196895419, 0.46656704131150534)\n\
    ```\n\n```\nIn [9]: @jit(nopython=True, parallel=True)\n    def arch_likelihood(initial_parameters,\
    \ retv):\n        omega = abs(initial_parameters[0])\n        alpha = abs(initial_parameters[1])\n\
    \        T = len(retv)\n        logliks = 0\n        sigma2 = np.zeros(T)\n  \
    \      sigma2[0] = np.var(retv)\n        for t in range(1, T):\n            sigma2[t]\
    \ = omega + alpha * (retv[t - 1]) ** 2\n        logliks = np.sum(0.5 * (np.log(sigma2)+retv\
    \ ** 2 / sigma2))\n        return logliks\n```\n\n```\nIn [10]: logliks = arch_likelihood(initial_parameters,\
    \ retv)\n    logliks\nOut[10]: 1453.127184488521\n```\n\n```\nIn [11]: def opt_params(x0,\
    \ retv):\n        opt_result = opt.minimize(arch_likelihood, x0=x0, args = (retv),\n\
    \                                 method='Nelder-Mead',\n                    \
    \             options={'maxiter': 5000})\n        params = opt_result.x\n    \
    \    print('\\nResults of Nelder-Mead minimization\\n{}\\n{}'\n              .format(''.join(['-']\
    \ * 28), opt_result))\n        print('\\nResulting params = {}'.format(params))\n\
    \        return params\n```\n\n```\nIn [12]: params = opt_params(initial_parameters,\

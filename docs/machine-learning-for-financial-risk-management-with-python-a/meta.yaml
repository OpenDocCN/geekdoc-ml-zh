    \ So, Monte Carlo helps decision makers by providing link between possible outcomes\
    \ and probabilities, which makes it a efficient and applicable tool in finance.\n\
    \nMathematical Monte Carlo can be defined as:\n\nLet $X_1, X_2, \\dots, X_n$ are\
    \ independent and identically distributed random variables and $f(x)$ is a real-valued\
    \ function. Then, Law of Large Number states that:\n\n$$E(f(X)) \\approx \\frac{1}{N}\

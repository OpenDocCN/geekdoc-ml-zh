    Risk is ubiquitous in finance but it is hard to quantify. The first and foremost
    thing to know is differentiating the sources of financial risks on the grounds
    that it might not be a wise move to utilize same tools against financial risk
    arising from different sources.


    Thus, treating different sources of financial risk is crucial as the impact of
    different financial risks as well as tools developed to mitigate risk are completely
    different. Pretending that firms are subject to large market fluctuations, all
    assets in the portfolio of the firms are susceptible to risk originating from
    these fluctuations. However, a different tool should be developed to cope with
    a risk emanating from customer profile. In addition, it should be kept in mind
    that different risk factors contribute significantly to the asset prices. All
    these examples implies that assessing risk factors need careful consideration
    in finance.


    As is briefly discussed previously, these are, mainly, market, credit, liquidity,
    and operational risks. It is evident that some other types can be added to this
    list of financial risks but they can be thought of a subset of these'
  merge: -1
  pgno: 150
- img_proc: true
  md: 'main four risk types. So, these types of risks will be our focus throughout
    this chapter.


    Market risk is the risk arising from changes on financial indicators such as exchange
    rate, interest rate, inflation and so on. Differently, market risk can be referred
    to a risk of losses in on and off-balance-sheet positions arising from movements
    in market prices (BIS, 2020). Let us now see how these factors affect market risk.
    Suppose that a raise in inflation rate might pose a threat to current profitability
    of the financial institutions with a view to inflation creates pressure to interest
    rate. This, in turn, affects borrower’s cost of funds. These instances can be
    amplified but we should also note the interactions of these financial risk sources.
    That is, while a single source of financial risk changes, other risk sources cannot
    stay constant. With that being said, to some extent, financial indicators are
    interrelated, meaning that interactions of these risks sources should be taken
    into account.


    As you can imagine, there are different tools to measure market risk. Of them,
    the most prominent and widely acceptable tools are Value-at-Risk (VaR) and Expected
    Shortfall (ES). The ultimate aim of this chapter is to augment these approaches
    using recent developments in Machine Learning. At this juncture, it would be tempting
    to ask: Does the traditional model fail in finance? And what makes the ML-based
    model different?


    I will start tackling the first question. The first and foremost challenge that
    traditional models unable to address is the complexity of the financial system.
    Due either to the some strong assumptions or simply inability to capture the complexity
    introduced by the data, long-standing traditional models has been started to be
    replaced by ML-based models.


    This fact is well put by Prado:


    > Considering the complexity of modern financial systems, it is unlikely that
    a researcher will be able to uncover the ingredients of a theory by visual inspection
    of the data or by running a few regressions.

    —Prado (Machine Learning for Asset Managers, 2020, p.4)'

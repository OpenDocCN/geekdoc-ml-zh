  - '[PAGE 93]


    What makes volatility so important? The answer stresses the importance of uncertainty,
    which is the main characteristic of the financial model.


    Increased integration of financial markets has led to a prolonged uncertainty
    in financial market which in turn stresses the importance of volatility, degree
    at which values of financial assets changes. Volatility has been used as a proxy
    of risk that in an among the most important variable in many field such as asset
    pricing and risk management. Its strong presence and latency make it even compulsory
    to model. Basel Accord, therefore, came into effect in 1996, and volatility as
    a risk measure has taken the key role in risk management (Karasan and Gaygisiz,
    2020).


    There is a large and growing body of literature regarding the volatility estimation
    after the ground-breaking study of Black (1976), Raju and Ghosh (2004), Andersen
    and Bollerslev (1997), Dokuchaev (2014), and De Stefani et al. (2017). So, we
    are talking about a long tradition in volatility prediction using ARCH and GARCH-type
    models in which there are certain drawbacks that might cause failures, e.g., volatility
    clustering, information asymmetry and so on. Even though, this issues are addressed
    via differently models, the recent fluctuations in financial markets coupled with
    the development in machine learning make researchers to rethink volatility estimation.


    In this chapter, our aim is to show how we can enhance the predictive performance
    using machine learning-based model. We will visit various machine learning algorithms,
    namely support vector regression, neural network, and deep learning, so that we
    are able to compare the predictive performance.


    Modeling volatility amounts to modeling uncertainty so that we better understand
    and approach the uncertainty enabling us to have good enough approximation to
    the real world. In order to gauge the extent to which proposed model accounts
    for the real situation, we need to calculate the return volatility, which is also
    known as *realized volatility*. Realized volatility is the square root of realized
    variance, which is the sum of squared return. Realized volatility is used to calculate
    the performance of the volatility prediction method. Here is the formula for return
    volatility:'
- md: "## ARCH Model\n\nOne of the early attempt to model the volatility was proposed\
    \ by Engel (1982) and it is known as ARCH model. ARCH model is a univariate model\
    \ and it is based on the historical asset returns. The ARCH(p) model has the following\
    \ form:\n\n$$\\sigma_t^2 = \\omega + \\sum_{k=1}^p \\alpha_k (r_{t-k})^2$$\n\n\
    where\n\n$$r_t = \\sigma_t \\epsilon_t$$\n\nwhere $\\epsilon_t$ is assumed to\
    \ be normally distributed. In this parametric model, we need to satisfy some assumptions\
    \ to have strictly positive variance. To this respect, following condition should\
    \ hold:\n\n- $\\omega > 0$\n- $\\alpha_k \\geq 0$\n\nAll these equations tell\
    \ us that ARCH is a univariate and non-linear model in which volatility is estimated\
    \ with squared of past returns. The one of the most distinctive feature of ARCH\
    \ is that it has the property of the time-varying conditional variance$^1$ so\
    \ that ARCH is able to model the phenomenon known as volatility clustering, that\
    \ is large changes tend to be followed by large changes of either sign, and small\
    \ changes tend to be followed by small changes as put by Benoit Mandelbrot (1963).\
    \ Hence, once an important announcement arrives into the market, it might results\
    \ in a huge volatility.\n\nThe following code block shows how to plot clustering\
    \ and what it looks like:\n\n```\nIn [5]: retv = ret.values\n\nIn [6]: plt.figure(figsize=(10,\
    \ 6))\n        plt.plot(s_p500.index[1:], ret)\n        plt.title('Volatility\
    \ clustering of S&P-500')\n        plt.ylabel('Daily returns')\n        plt.xlabel('Date')\n\
    \        plt.savefig('images/vol_clustering.png')\n        plt.show()\n```\n\n\
    ❶ Return dataframe into numpy representation.\n\nSimilar to spikes in realized\

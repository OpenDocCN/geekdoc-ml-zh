  md: '# Main Financial Risks


    Financial companies face various risks over their business life. These risks can
    be divided into different categories in a way to identify and assess in an easier
    manner. These main financial risk types are market risk, credit risk, operational
    risk, and liquidity risk but again this is not an exhaustive list. However, we
    confine our attention to the main financial risk types throughout the book. Let’s
    take a look at these risk categories.


    # Market Risk


    This risk arises due to a change in factors in financial market. To be clearer,
    for instance, an increase in *interest rate* might badly affect a company, which
    has a short position.


    A second example can be given about another source of market risk; *exchange rate*.
    An company involving involving international trade, whose commodities are priced
    in US dollars, are highly exposed to a change in US dollars.


    As you can imagine, any change in *commodity price* might pose a threat to a company’s
    financial sustainability. There are many fundamentals that have direct effect
    on commodity price, which are market players, transportation cost and so on.


    # Credit Risk


    Credit risk is one of the most pervasive risks. Credit risk emerges when counterparty
    fails to honor debt. For instance, if a borrower is unable to pay its payment,
    credit risk is realized. The deterioration of credit quality is also a source
    of risk through the reduced market value of securities that an organization might
    own (Horcher, 2011).


    # Liquidity Risk


    Liquidity risk has been overlooked until 2007-2008 financial crisis, which hit
    the financial market hard. From that point on, researches on liquidity risk have
    been intensified. Liquidity refers to speed and ease with which an'
  merge: -1
  pgno: 18
- img_proc: true
  md: 'investor executes her transaction. This definition is also known as trading
    liquidity risk. The other dimension of liquidity risk is funding liquidity risk,
    which can be defined as the ability to raise cash or availability of credit to
    finance a company’s operations.


    If a company cannot turn its assets into cash within a short period of time, this
    falls under liquidity risk category and it is quite detrimental to company’s financial
    management and reputation.


    # Operational Risk


    Managing operational risk is beyond being a clear and foreseeable task and exploits
    a great deal of resources of a company due to intricate and internal nature of
    the risk. Now the questions are: How do financial companies do a good job for
    managing risk? Do they allocate necessary resources for this task? Is the importance
    of risk to a companies sustainability gauged properly?


    As the name suggests, operational risk arises when inherent operation(s) in a
    company or industry poses a threat to day-to-day operations, profitability, or
    sustainability of that company. Operational risk includes fraudulent activities,
    failure to adhere regulations or internal procedures, losses due to lack of training
    etc.


    Well, what happens if a company exposes to one or more than one of these risks
    in an unprepared way. Though it is not frequent, we know the answer from the historical
    events, company might default and run into a big financial bottleneck.


    # Big Financial Collapse


    How important is the risk management? This question can be addressed by a book
    with hundreds of pages but, in fact, the rise of risk management in financial
    institutions speaks itself. In particular, after the global financial crisis,
    the risk management is characterized as “colossal failure of risk management”
    (Buchholtz and Wiggins,2019). In fact, the global financial crisis, emerged in
    2007-2008, is just a tip of the iceberg. Numerous failures'
  merge: -1
  pgno: 19
- img_proc: true
  md: 'in risk management pave the way for this breakdown in the financial system.
    To understand this breakdown, we need to go back to dig into past financial risk
    management failures. A hedge fund called Long-Term Capital Management (LTCM) presents
    a vivid instance of a financial collapse.


    LCTM forms a team with top-notch academics and practitioners. This led to a fund
    inflow to the firm and began trading with 1 billion USD. In 1998, LCTM controlled
    over $100 billion and heavily invested in some emerging markets including Russia.
    So, Russian debt default deeply affected the LCTM’s portfolio due to *fligh to
    quality* ¹ and it got a severe blow, which led LCTM to bust (Allen, 2003).


    Metallgesellschaft (MG) is another company that no longer exists due to bad financial
    risk management. MG was largely operating in gas and oil markets. Due to high
    exposure to the gas and oil prices, MG needed funds in the aftermath of the large
    drop in gas and oil prices. Closing the short position resulted in losses around
    1.5 billion USD.


    Amaranth Advisors (AA) is another hedge fund, which went into bankruptcy due to
    heavily investing in a single market and misjudging the risks arising from its
    investments. By 2006, AA attracted roughly $9 billion USD worth of assets under
    management but lost nearly half of it because of the natural gas futures and options
    downward move. The default of AA is attributed to low natural gas prices and misleading
    risk models (Chincarini, 2008).


    Long story short, Stulz’s paper titled “Risk management failures: What are they
    and when do they happen?” (2008) summarizes the main risk management failures
    resulting in default:


    +   1) Mismeasurement of known risks

    2) Failure to take risks into account

    3) Failure in communicating the risks to top management

    4) Failure in monitoring risks

    5) Failure in managing risks

    6) Failure to use appropriate risk metrics'

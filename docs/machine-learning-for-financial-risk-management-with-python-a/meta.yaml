    \ difficulty is commonly associated with the vanishing gradient that appears when\
    \ trying to propagate errors over long times (Hochreiter, 1998). When training\
    \ is successful, the network's hidden state represents these memories. Understanding\
    \ how such representation forms throughout training can open new avenues for improving\
    \ learning of memory-related tasks.*\n\n## Long-Short Term Memory\n\nLong-Short\
    \ Term Memory, LSTM for short, deep learning approach has been developed by Hochreiter\
    \ and Schmidhuber (1997) and it is mainly based on Gated Recurrent Unit (GRU).\n\
    \nGRU is proposed to deal with vanishing gradient problem, which is a common problem\
    \ in neural network structure and occurs when weight update becomes too small\
    \ to create a significant change in the network. GRU consists of two gates: *Update*\
    \ and *reset*. When an early observation is detected as highly important, then\
    \ we do not update the hidden state. In a similar fashion, when early observations\
    \ are not significant, it leads to reset the state.\n\nAs we previously discussed,\
    \ the one of the most appealing features of RNN is its ability to connect past\
    \ and present information. However, this ability turns out to be a failure when\
    \ “long-term dependencies” comes into the picture. Long-term dependencies mean\
    \ that model learns from early observations.\n\nFor instance, let us examine the\
    \ following sentence:\n\n> *Countries have their own currencies as in USA where\
    \ people transact with dollar*\n\nIn the case of short-dependencies, it is known\

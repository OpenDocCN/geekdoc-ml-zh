- md: "Now, the problem turns out to be differentiating the flow of information to\
    \ the financial markets. How can we differentiate noise from signal? And how can\
    \ we utilize this information?\n\nIt is now appropriate to discuss the Marcenko-Pastur\
    \ Theorem that helps us to have a homogeneous covariance matrix. The Marcenko-Pastur\
    \ theorem allows us to extract signal from noise using eigenvalues of the covariance\
    \ matrix.\n\n> NOTE\n\nLet $A \\in \\mathbb{R}^{n \\times n}$ be a square matrix.\
    \ Then, $\\lambda \\in \\mathbb{R}$ is an eigenvalue of A and $x \\in \\mathbb{R}^n\
    \ \\setminus \\{0\\}$ is the corresponding eigenvector of A if\n\n$Ax = \\lambda\
    \ x$\n\nEigenvalue and eigenvector have special meaning in the financial context.\
    \ Eigenvector corresponds to the variance in the covariance matrix while eigenvalue\
    \ shows the magnitude of the eigenvector. Specifically, the largest eigenvector\
    \ corresponds to the largest variance and the magnitude of this equals the corresponding\
    \ eigenvalue. Due to noise in the data, some eigenvalues can be thought of as\
    \ random and it makes sense to detect and filter these eigenvalues in order to\
    \ retain signals only.\n\nTo differentiate noise and signal, we fit the Marcenko-Pastur\
    \ Theorem PDF to the noisy covariance. The PDF of the Marcenko-Pastur Theorem\
    \ takes the following form (Prado, 2020):\n\n$$f(\\lambda) = \\begin{cases} \\\
    frac{T}{N} \\sqrt{(\\lambda_+ - \\lambda)(\\lambda - \\lambda_-)} & \\text{if\
    \ } \\lambda \\in [\\lambda_-, \\lambda_+] \\\\ 0, & \\text{if } \\lambda \\notin\
    \ [\\lambda_-, \\lambda_+] \\end{cases}$$\n\nwhere $\\lambda_+$ and $\\lambda_-$\
    \ are the maximum and minimum eigenvalues respectively.\n\nIn the following code\

    \ 4-6. Volatility Prediction with EGARCH\n\nGiven the RMSE result, the best and\
    \ worst performing models are GARCH and ARCH, respectively. But there is no big\
    \ differences among the performance of the model we have used above. In particular,\
    \ during bad/good news announcement, the performances of EGARCH and GJR-GARCH\

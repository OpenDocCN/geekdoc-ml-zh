- md: "## EGARCH\n\nTogether with the GJR-GARCH model, EGARCH proposed by Nelson (1991),\
    \ is also a tool for controlling for the effect of the asymmetric announcements\
    \ and additionally it is specified in logarithmic form, there is no need to put\
    \ restriction to avoid negative volatility.\n\n$$\\log(\\sigma_t^2) = \\omega\
    \ + \\sum_{k=1}^{p} \\beta_k \\log\\sigma_{t-k}^2 + \\sum_{k=1}^{q} \\alpha_i\
    \ \\frac{|r_{k-1}|}{\\sqrt{\\sigma_{t-k}^2}} + \\sum_{k=1}^{q} \\gamma_k \\frac{r_{t-k}}{\\\
    sqrt{\\sigma_{t-k}^2}}$$\n\nThe main difference of EGARCH equation is that logarithm\
    \ is taken of the variance on the left-hand-side of the equation. This indicates\
    \ the leverage effect meaning that there exists a negative correlation between\
    \ past asset returns and volatility. If $\\gamma < 0$, it implies leverage effect\
    \ and if $\\gamma \\neq 0$, it shows asymmetry in volatility.\n\n```\nIn [35]:\

  md: '# 2- Calculate the Class/Event Prior Probability and Attribute Prior Probability


    No let’s calculate the prior probability of the events:

    P(A) when Diabetic (Yes) = 4/12 = 0.33

    P(A) when Diabetic (No) = 8/12 = 0.67

    Finally let’s find the prior probability of the features:

    P(B) when Overweight = 4/12 = 0.33

    P(B) when Normal= 4/12 = 0.33

    P(B) when Underweight = 4/12 = 0.33


    3- Now if a new patient comes, we have to find whether he is diabetic depending
    upon his weight. There can be two outcomes: diabetic or not. We will find probabilities
    for both. The class that results in higher probability will be assigned to the
    patient.


    Suppose an overweight patient arrives to the clinic and we have to test him for
    diabetes. We need to solve two equations:


    a) P(Yes|Overweight) = P(Overweight|Yes) x P(Yes) / P(Overweight)


    = (0.75 x 0.33) / 0.33


    = 0.75


    b) P(No|Overweight) = P(Overweight|No) x P(No) / P(Overweight)


    = (0.125 x 0.67) / 0.33'

  md: 'be minimized.


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_65_0.png)


    In polynomial regression we try to find models that are not straight lines but
    they fit the data points more accurately.


    In the last chapter we discussed that the straight linear model can be represented
    as:


    ```

    B= A1X1+ A2X2+A3X3 + ................. ANXN

    ```


    On the other hand, polynomial regression results in a mode of degree greater than
    1 e.g


    ```

    B= + + .................


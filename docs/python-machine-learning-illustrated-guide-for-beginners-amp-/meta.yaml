- md: "## Steps of K-Mean Clustering\n\nK-Means clustering algorithm is extremely\
    \ simple and easy to understand. Following are the steps involved in K-Means clustering:\n\
    \n- 1- Randomly choose the number of centroids K. Where K corresponds to the number\
    \ of clusters that you want your data grouped to.\n- 2- Find the distance between\
    \ all the data points and all the centroids. The distance can be Euclidean or\
    \ Manhattan but normally Euclidean distance is used.\n- 3- Assign the data points\
    \ to the centroid with least distance. Repeat this step for all the data points\

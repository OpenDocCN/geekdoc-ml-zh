  md: '# Decision Tree for Regression


    In the last two chapters we studied Linear Regression and Polynomial Regression
    algorithms. These algorithms are based on the principle of error correction using
    gradient decent algorithm. In this chapter we are going to study another extremely
    powerful machine learning algorithm based on entropy.


    The principle behind the working of a decision tree is very simple. Each feature
    in the dataset is treated as a node in the decision tree. At each node a decision
    is made regarding which path to choose in the tree depending upon the value of
    the feature at that particular node. The process continues until the leaf node
    is reached. Leaf node contains the final decision.


    This explanation might seem daunting at first but we have been using decision
    trees all our life. Suppose there is a bank that has to decide whether loan should
    be given to a particular customer or not. The bank has customer data including
    age, gender and salary. The bank has to decide whether the customer should be
    given a loan or not.


    A bank may define criteria which consists of set of rules that defines whether
    the loan will be awarded or not. These rules can look like this.


    If the age of the customer is greater than 25 and less than 60, then go to next
    step. Else simply reject the loan application. If the first condition is satisfied,
    then check if the person is salaried or not. If the person is salaried, go to
    step 3 else if the person is jobless, reject the loan application.'
  merge: -1
  pgno: 73
- img_proc: true
  md: 'If the person is salaried and gender is male, go to step 4. Else if the gender
    is female go to step 5.

    If the salary is greater than 35000 dollars per year, award the loan else reject
    the application.

    If the salary is greater than 45000 dollars per year, award the loan else reject
    the application.


    The decision tree based on such rules looks like this:


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_74_0.png)


    The above set of rules is very simplistic and is chosen randomly. In real world
    the data is much more complex and statistical techniques such as entropy are used
    to create these nodes. Entropy refers to the impurity of classification in the
    labeled data. Basically in decision trees, the feature that results in minimum
    entropy in the output labels is set at root node. For instance, if 95% of the
    times when the age is greater than 60 and less than 25, the application for loan
    is rejected, the impurity in the output will be 5% for Age with values between
    60 and 25. Similarly, if in 80 of the cases the loan for jobless person is rejected,

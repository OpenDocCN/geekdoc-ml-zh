    Share your notebooks, packages, projects and environments on Anaconda Cloud!


    - [ ] Learn more about Anaconda Cloud

    - [ ] Learn how to get started with Anaconda


    # Running your First Program


    We have installed environment required to run Python scripts. Now is the time
    to run our first program. With Anaconda, you have several ways to do so. We will
    see two of those in this section.


    Go to your window search box and type “Anaconda Navigator” and then select the
    “Anaconda Navigator” application as shown below:


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_26_0.png)


    Anaconda Navigator Dashboard will appear that looks like this.


    Note: It takes some time for Anaconda Navigator to start, so be patient.


    From the dashboard, you can see all of the tools available to develop your python
    applications. In this book we will mostly use “Jupyter Notebook” (second from
    top). Though in this chapter we shall also see how to run python script via “Spyder”.


    # Running Scripts via Jupyter Notebook


    Jupyter notebook runs in your default browser. From the navigator, launch “Jupyter
    Notebook” (Second option from the top).


    Another way to launch Jupyter is by typing “Jupyter Notebook” in the search box
    and selecting the “Jupyter Notebook” application from the start menu as shown
    below:


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_28_0.png)


    Jupyter notebook will launch in a new tab of your default browser.


    To create a new notebook, click “new” button at the top-right corner of the Jupyter
    notebook dashboard. From dropdown, select “Python 3.”


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_28_1.png)


    You will see new Python 3 notebook that looks like this:


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_29_0.png)


    Jupyter notebook consists of cells. Python script is written inside these cells.
    Let’s print hello world using Jupyter notebook. In the first cell of the notebook
    enter “print(‘hello world’)” and press CTRL+ ENTER. The script in the first cell
    will be executed as shown below:


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_29_1.png)


    The “print” function prints the string passed to it as parameter, in the output.
    To create a new cell, click the “+” button from the top left menu as shown below:


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_29_2.png)


    You can write Python script in the new cell and press CTRL + ENTER to execute
    it.


    # Running Scripts via Spyder


    While Jupyter notebook is a good place to start writing Python programs, once
    you get comfortable with Python, you should move to Spyder IDE. Spyder allows
    us to directly create Python files. Spyder is similar to more conventional text
    editors with options to Run file, Run piece of code, debug code etc.


    Just like Jupyter notebook, you can run Spyder from Anaconda Navigator or directly
    from Start Menu. You will be presented with the following interface once you run
    Spyder.


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_30_0.png)


    On the left side of the Spyder interface, you can see text editor; this is where
    you enter your script. On the bottom right you have console window. You can directly
    execute scripts in the console window. Furthermore, the output of the code written
    in the editor also appears in the console window. Let’s write hello world program
    in Spyder.


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_30_1.png)


    To run script in Python you have two options. You can either click the green triangle
    from the top menu or you can select the piece of code you want to execute and
    press CTRL + ENTER from the keyboard. You will see the output in the console window.


    # What’s next?


    In this chapter we saw the process of setting up the environment required to run
    python programs. We wrote our first python program in two different editors. In
    the next chapter we will start our discussion about data preprocessing for machine
    learning.


    # Chapter 3


    # Data Preprocessing For Machine Learning


    Data has to be in a specific format before you can apply machine learning algorithms
    to them. Converting data to the right format for machine learning algorithms is
    usually known as data preprocessing. Depending upon the dataset, there are several
    preprocessing steps that are required to be performed to convert data into a format
    usable by machine learning algorithm. Following are the steps involved in preprocessing
    data for machine learning algorithms:


    1. Getting the dataset

    2. Import libraries

    3. Import the dataset

    4. Handling missing values

    5. Handling categorical data

    6. Dividing data into training and tests sets

    7. Scaling the data


    In this chapter we will study each of these steps in details.


    # Getting the Dataset


    All the datasets that we are going to use in this book can be found at this link:

    https://drive.google.com/file/d/1TBotMuLvuLoAd1dzHRyxBX9cseOhUs_4/view?usp=sharing


    Download the “rar” file, and copy the “Datasets” folder into your D drive. All
    the algorithms in the book access the datasets from “D:/Datasets” folder. The
    dataset that we are going to use in this first chapter for preprocessing is called
    “patients.csv”.

    If you go to your Datasets folder and open the patients.csv file with Microsoft
    Excel, it looks like this:


    | Age | BMI | Gender | Diabetic |

    |---|---|---|---|

    | 25 | 25 | Male | No |

    | 55 | 31 | Female | Yes |

    | 40 | 28 | Male | Yes |

    | 61 | 24 | Male | No |

    | 24 | | Female | No |

    | 35 | 35 | Male | Yes |

    | 52 | 32 | Male | Yes |

    | 67 | 26 | Female | No |

    | 44 | 27 | Male | No |

    | 19 | 22 | Female | No |

    | 58 | 89 | Female | Yes |

    | 48 | 39 | Male | Yes |


    The dataset contains information about Age, BMI (Body Mass Index) and Gender of
    12 patients. The dataset also contains a column that shows whether patients are
    Diabetic or not. The Age and BMI columns are numeric since they contain numeric
    values while the Gender and Diabetic columns are categorical.


    Another important distinction that you need to make before you use your dataset
    for machine learning is between independent and dependent variable. As a rule
    of thumb, the variable whose value is to be predicted is dependent variable and
    the variables that are used for making predictions are independent variables.
    For instance in the patients.csv dataset, Age, BMI and Gender variables are independent
    while the fourth column i.e. Diabetic is the dependent variable as its value is
    dependent on the first three columns.


    # Import Libraries


    Python comes with a variety of prebuild libraries that perform different tasks.
    In this book we will be using Python''s Scikit Learn Library. However for now
    we will only install three of the most essential libraries that we will need in
    almost every machine learning application. These libraries are *matplotlib.pyplot*
    and *pandas*.


    # numpy


    The *numpy* library is used performs variety of advanced mathematical functions.
    Since machine learning algorithms make heavy use of mathematics, it is highly
    recommended that you install the *numpy* library.


    # matplotlib.pyplot


    This library is used to plot beautiful charts. To get intuition about our data
    and results, we will need to this library.


    # pandas


    Finally, the third library that we are going to install in this chapter is the
    *pandas* library. The *pandas* library is used to easily import and view the datasets.


    To import these three libraries, create a new Python notebook in *Jupyter* or
    Open a new file in *Spyder* (The codes in this chapter are executed in and execute
    the following lines of code.


    ```

    import numpy as np

    import matplotlib.pyplot as plt

    import pandas as pd

    ```


    To import a library in Python, keyword *import* is used. In the script above we
    import *numpy* as *np*, *matplotlib.pyplot* as *plt* and *pandas* as respectively.
    Here *np*, *plt* and *pd* are nicknames. We will use these nicknames to call different
    functions of these libraries.'
  mdcn: '# 感谢安装 Anaconda3！


    Anaconda 是最受欢迎的 Python 数据科学平台。

    在 Anaconda Cloud 上分享你的笔记本、包、项目和环境！


    - [ ] 了解更多关于 Anaconda Cloud 的信息

    - [ ] 了解如何开始使用 Anaconda


    # 运行你的第一个程序


    我们已经安装了运行 Python 脚本所需的环境。现在是时候运行我们的第一个程序了。使用 Anaconda，你有多种方式可以做到这一点。本节我们将介绍其中两种。


    前往你的 Windows 搜索框，输入“Anaconda Navigator”，然后选择“Anaconda Navigator”应用程序，如下所示：


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_26_0.png)


    Anaconda Navigator 仪表板将会出现，看起来像这样。


    注意：Anaconda Navigator 启动需要一些时间，请耐心等待。


    从仪表板中，你可以看到所有可用于开发 Python 应用程序的工具。在本书中，我们将主要使用“Jupyter Notebook”（从上往下数第二个）。不过在本章中，我们也将了解如何通过“Spyder”运行
    Python 脚本。


    # 通过 Jupyter Notebook 运行脚本


    Jupyter Notebook 在你的默认浏览器中运行。从 Navigator 中，启动“Jupyter Notebook”（从上往下数第二个选项）。


    另一种启动 Jupyter 的方式是在搜索框中输入“Jupyter Notebook”，然后从开始菜单中选择“Jupyter Notebook”应用程序，如下所示：


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_28_0.png)


    Jupyter Notebook 将在你的默认浏览器的新标签页中启动。


    要创建一个新的笔记本，请点击 Jupyter Notebook 仪表板右上角的“new”按钮。从下拉菜单中，选择“Python 3”。


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_28_1.png)


    你将看到一个新的 Python 3 笔记本，看起来像这样：


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_29_0.png)


    Jupyter Notebook 由单元格组成。Python 脚本就写在这些单元格中。让我们使用 Jupyter Notebook 打印“hello world”。在笔记本的第一个单元格中输入“print(''hello
    world'')”并按 CTRL+ENTER。第一个单元格中的脚本将被执行，如下所示：


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_29_1.png)


    “print”函数会将其作为参数传递的字符串打印到输出中。要创建一个新单元格，请点击左上角菜单中的“+”按钮，如下所示：


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_29_2.png)


    你可以在新单元格中编写 Python 脚本，然后按 CTRL + ENTER 来执行它。


    # 通过 Spyder 运行脚本


    虽然 Jupyter Notebook 是开始编写 Python 程序的好地方，但一旦你熟悉了 Python，就应该转向 Spyder IDE。Spyder
    允许我们直接创建 Python 文件。Spyder 类似于更传统的文本编辑器，具有运行文件、运行代码片段、调试代码等选项。


    就像 Jupyter Notebook 一样，你可以从 Anaconda Navigator 运行 Spyder，也可以直接从开始菜单运行。运行 Spyder
    后，你将看到以下界面。


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_30_0.png)


    在 Spyder 界面的左侧，你可以看到文本编辑器；这是你输入脚本的地方。在右下角是控制台窗口。你可以直接在控制台窗口中执行脚本。此外，编辑器中编写的代码的输出也会出现在控制台窗口中。让我们在
    Spyder 中编写“hello world”程序。


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_30_1.png)


    要运行 Python 脚本，你有两个选择。你可以点击顶部菜单中的绿色三角形，或者你可以选择要执行的代码片段，然后按键盘上的 CTRL + ENTER。你将在控制台窗口中看到输出。


    # 下一步是什么？


    在本章中，我们了解了设置运行 Python 程序所需环境的过程。我们在两个不同的编辑器中编写了我们的第一个 Python 程序。在下一章中，我们将开始讨论机器学习的数据预处理。


    # 第 3 章


    # 机器学习的数据预处理


    在将机器学习算法应用于数据之前，数据必须处于特定的格式。将数据转换为适合机器学习算法的格式通常称为数据预处理。根据数据集的不同，需要执行几个预处理步骤，将数据转换为机器学习算法可用的格式。以下是为机器学习算法预处理数据所涉及的步骤：


    1.  获取数据集

    2.  导入库

    3.  导入数据集

    4.  处理缺失值

    5.  处理分类数据

    6.  将数据划分为训练集和测试集

    7.  数据缩放


    在本章中，我们将详细研究这些步骤中的每一个。


    # 获取数据集


    我们将在本书中使用的所有数据集都可以在此链接找到：

    https://drive.google.com/file/d/1TBotMuLvuLoAd1dzHRyxBX9cseOhUs_4/view?usp=sharing


    下载“rar”文件，并将“Datasets”文件夹复制到你的 D 盘。本书中的所有算法都从“D:/Datasets”文件夹访问数据集。我们将在第一章用于预处理的数据集名为“patients.csv”。

    如果你进入 Datasets 文件夹并用 Microsoft Excel 打开 patients.csv 文件，它看起来像这样：


    | 年龄 | BMI | 性别 | 是否糖尿病 |

    |---|---|---|---|

    | 25 | 25 | 男 | 否 |

    | 55 | 31 | 女 | 是 |

    | 40 | 28 | 男 | 是 |

    | 61 | 24 | 男 | 否 |

    | 24 | | 女 | 否 |

    | 35 | 35 | 男 | 是 |

    | 52 | 32 | 男 | 是 |

    | 67 | 26 | 女 | 否 |

    | 44 | 27 | 男 | 否 |

    | 19 | 22 | 女 | 否 |

    | 58 | 89 | 女 | 是 |

    | 48 | 39 | 男 | 是 |


    该数据集包含 12 名患者的年龄、BMI（身体质量指数）和性别信息。数据集还包含一列，显示患者是否患有糖尿病。年龄和 BMI 列是数值型的，因为它们包含数值，而性别和糖尿病列是分类型。


    在将数据集用于机器学习之前，你需要做出的另一个重要区分是自变量和因变量。根据经验，要预测其值的变量是因变量，而用于进行预测的变量是自变量。例如，在 patients.csv
    数据集中，年龄、BMI 和性别变量是自变量，而第四列（即糖尿病）是因变量，因为它的值取决于前三列。


    # 导入库


    Python 附带了各种预构建的库，用于执行不同的任务。在本书中，我们将使用 Python 的 Scikit Learn 库。然而，目前我们只安装三个最基本的库，这些库几乎在每个机器学习应用中都会用到。这些库是
    *matplotlib.pyplot* 和 *pandas*。


    # numpy


    *numpy* 库用于执行各种高级数学函数。由于机器学习算法大量使用数学，强烈建议你安装 *numpy* 库。


    # matplotlib.pyplot


    此库用于绘制漂亮的图表。为了对我们的数据和结果有直观的了解，我们将需要这个库。


    # pandas


    最后，我们将在本章中安装的第三个库是 *pandas* 库。*pandas* 库用于轻松导入和查看数据集。


    要导入这三个库，请在 *Jupyter* 中创建一个新的 Python 笔记本，或在 *Spyder* 中打开一个新文件（本章中的代码在其中执行），并执行以下代码行。


    ```

    import numpy as np

    import matplotlib.pyplot as plt

    import pandas as pd

    ```


    在 Python 中导入库，使用关键字 *import*。在上面的脚本中，我们将 *numpy* 导入为 *np*，*matplotlib.pyplot*
    导入为 *plt*，将 *pandas* 导入为 *pd*。这里 *np*、*plt* 和 *pd* 是别名。我们将使用这些别名来调用这些库的不同函数。'

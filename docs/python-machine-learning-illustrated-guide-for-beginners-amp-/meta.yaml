- img_proc: true
  md: '# Steps of K-Mean Clustering


    K-Means clustering algorithm is extremely simple and easy to understand. Following
    are the steps involved in K-Means clustering:


    +   1- Randomly choose the number of centroids K. Where K corresponds to the number
    of clusters that you want your data grouped to.


    2- Find the distance between all the data points and all the centroids. The distance
    can be Euclidean or Manhattan but normally Euclidean distance is used.


    3- Assign the data points to the centroid with least distance. Repeat this step
    for all the data points forming K clusters of points.


    4- Update the location of each centroid by taking mean of x and y components of
    all the points in the cluster.


    5- Repeat steps 2, 3 and 4 until updated positions of all the centroids are same
    as their previous positions.


    Luckily for us, we don''t have to perform all these steps manually. We can simply
    use Python''s Scikit Learn library for clustering tasks as well.'

    print(rf_accuracies.mean())\n```\n\n结果显示：0.69788，即 69.788%。\n\n最后，要查看标准差，请执行以下脚本：\n\
    \n```\nprint(rf_accuracies.std())\n```\n\n上述脚本返回 0.0135 或 1.35%，这个值非常小。因此我们可以说，我们的数据集方差很小，在所有集合上获得的结果可以被认为是正确且接近平均值的。\n\
    \n## 用于参数选择的网格搜索\n\n机器学习算法的工作是找到能产生最佳结果的最佳参数集或权重。这些参数由算法找到，并取决于数据集。我们无法控制这些参数。\n\
    \n然而，还有另一组参数是在算法运行之前指定的。例如，KNN 算法的 K 值、SVM 算法的核类型、随机森林算法的估计器数量、神经网络的节点数量等等。这些参数可以被控制或指定。\n\
    \n然而，我们并不真正知道这些参数的最佳值。在上一节中，我们将随机森林算法的 `n_estimator` 设置为 500。但我们不知道这是否是理想的。如果算法在\
    \ 200 或 700 个节点时表现更好呢？或者 K 的最佳值是多少？10 还是 20？我们不知道这些问题的答案。\n\n网格搜索算法帮助我们解决这个问题。网格搜索算法基本上做的是，它自动从一组参数中为特定算法找到最佳参数。\n\
    \n## 使用 Sklearn 实现网格搜索\n\nPython 的 Scikit Learn 库包含一个用于实现网格搜索的包。为此，`sklearn.model_selection`\
    \ 类包含 `GridSearchCV` 类，可用于实现网格搜索。但在此之前，需要进行一些预处理。\n\n### 创建参数字典\n\n网格搜索算法不会随机运行并找到算法的所有最佳参数，因为它可能需要数年时间。例如，如果网格搜索算法开始从\
    \ 1 到 1000 测试估计器数量参数的每个值，该算法至少需要运行 1000 次，而这仅仅是为了 1 个参数。因此，你需要测试的每个参数的一组值会传递给\
    \ `GridSearchCV` 类。这些参数集以字典的形式表示。\n\n假设我们想测试随机森林算法的 `n_estimators`、`warm_start`\
    \ 和 `criterion` 参数的不同值，我们可以创建一个如下所示的字典：\n\n```\nparam = {\n    'n_estimators':\
    \ [100, 250, 500, 750, 1000],\n    'warm_start': ['True', 'False'],\n    'criterion':\
    \ ['entropy', 'gini']\n}\n```\n\n在上面的脚本中，我们创建了一个名为 \"param\" 的字典，字典的键是参数的名称，字典的值对应于参数的值。网格搜索算法将从这些值集中返回最佳组合。\n\
    \n例如，我们想测试 `n_estimators` 参数的最佳值，并传递了 100、250、500、750 和 1000。网格搜索将从这五个值中选择最佳值。这里需要提到的是，网格搜索算法可能需要很长时间，这取决于你要测试的值以及交叉验证的折数。\n\
    \n例如，在我们的例子中，`n_estimators` 参数有 5 个值，`warm_start` 有 2 个值，`criterion` 有 2 个值。这种情况下可能的组合总数是\
    \ 5 x 2 x 2 = 20。将这个值乘以折数，例如 5。那就是 100 次执行。这可能会稍微减慢算法的速度。\n\n### 执行网格搜索\n\n要执行网格搜索，我们需要创建\
    \ `GridSearchCV` 类的对象，并传递分类器（我们将使用上一节创建的随机森林分类器）、我们刚刚创建的参数字典、性能评估指标（我们将使用准确率）、交叉验证折数和作业数量。当\
    \ `n_jobs = -1` 时，意味着所有 CPU 都应被用于执行网格搜索。执行以下脚本以创建 GridSearch 对象。\n\n```\nfrom\
    \ sklearn.model_selection import GridSearchCV\ngrid_search = GridSearchCV(estimator=rf_clf,\n\
    param_grid=param,\nscoring='accuracy',\ncv=5,\nn_jobs=-1)\n```\n\n最后一步是在 `GridSearchCV`\
    \ 对象上调用 `fit` 方法，并传递训练集和测试集，如下所示：\n\n```\ngrid_search.fit(train_features, train_labels)\n\
    ```\n\n这可能需要一些时间来执行。\n\n一旦上述脚本执行完毕，最后一步是查看网格搜索选择的参数，为此你可以使用 `GridSearchCV` 类的\
    \ `best_params_` 属性，如下所示：\n\n```\noptimal_parameters = grid_search.best_params_\n\
    print(optimal_parameters)\n```\n\n输出如下所示：\n\n```\n{'criterion': 'gini', 'n_estimators':\
    \ 750, 'warm_start': 'True'}\n```\n\n使用上述参数值获得了最佳结果。最后，要查看使用最佳参数达到的准确率，请执行以下脚本：\n\
    \n```\noptimal_results = grid_search.best_score_\nprint(optimal_results)\n```\n\
    \n## 结论\n\n随着本章的结束，本书也告一段落。从这里开始，我建议你自行学习机器学习。以下是一些非常好的资源：\n\n- Python：https://www.python.org/\n\
    - 机器学习：http://scikit-learn.org/stable/\n- 深度学习：https://keras.io/\n- 数据集：https://archive.ics.uci.edu/ml/index.php"
  merge: 0

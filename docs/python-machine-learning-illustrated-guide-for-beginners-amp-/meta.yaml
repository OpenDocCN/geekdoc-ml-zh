    \ to call the fit and transform methods and pass them the training and test features.\
    \ We do not need to pass the output since PCA is an unsupervised learning technique\
    \ and calculates variance from the feature set alone. Execute the following script\
    \ to get all the four principal components for the banknote_data.csv dataset.\n\
    \n```\nfrom sklearn.decomposition import PCA\npca = PCA()\ntrain_features = pca.fit_transform(train_features)\n\
    test_features = pca.transform(test_features)\n```\n\nNow, to see the variance\

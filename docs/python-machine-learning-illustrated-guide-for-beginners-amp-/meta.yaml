- md: "You can see that accuracies of all the five folds are more or less similar.\n\
    \nTo see the average of all the accuracies, you can call mean() function on the\
    \ list as shown below:\n\n```\nprint(rf_accuracies.mean())\n```\n\nThe result\
    \ shows: 0.69788 i.e. 69.788%.\n\nFinally to see the standard deviation, execute\
    \ the following script:\n\n```\nprint(rf_accuracies.std())\n```\n\nThe above script\
    \ returns 0.0135 or 1.35% which is very less. Therefore we can say that our dataset\
    \ has very less variance and results obtained on all the sets are can be considered\
    \ correct and close to the average.\n\n## Grid Search for Parameter Selection\n\
    \nJob of a machine learning algorithm is to find best set of parameters or weights\
    \ that yield best results. These parameters are found by the algorithms and depend\
    \ upon the dataset. We cannot control these parameters.\n\nHowever there is another\
    \ set of parameters that is specified before the algorithm is run. For instance\
    \ value of K for the KNN algorithm, the type of kernel for the SVM algorithm,\
    \ the number of estimators for the Random forest algorithm, number of nodes for\
    \ the neural network and so on. These parameters can be controlled or specified.\n\
    \nHowever we do not really know the best value for these parameters. In the last\
    \ section we set the n_estimator for the Random Forest algorithm to 500. However\
    \ we do not know if this is the ideal. What if the algorithm performs better with\
    \ 200 or 700 nodes? OR what is the best value of K? 10 or 20? We do not know the\
    \ answer to these questions.\n\nGrid Search algorithm helps us solve this problem.\
    \ Basically what Grid Search algorithm does is, it automatically finds best parameters\
    \ for a particular algorithm from a set of parameters.\n\n## Implementing Grid\
    \ Search with Sklearn\n\nThe Python’s Scikit Learn library comes with a package\
    \ to implement Grid Search. For this purpose the sklearn.model_selection class\
    \ contains GridSearchCV class that can be used to implement Grid Search. However\
    \ before that some preprocessing is required.\n\n### Creating Parameter Dictionary\n\
    \nGrid search algorithm doesn’t just randomly run and finds all the best parameters\
    \ for an algorithm because it can take years. For instance if grid search algorithm\
    \ starts testing each value for the number of estimators parameter from 1 to 1000,\
    \ the algorithm has to run a minimum of 1000 times and that’s just for 1 parameter.\
    \ Therefore a set of values for each parameter that you want to test, is passed\
    \ to the GridSearchCV class. These set of parameters and are expressed in the\
    \ form of a dictionary.\n\nSuppose we want to test different values for n_estimators,\
    \ warm_start and criterion parameters of the Random Forest algorithm, we can create\
    \ a dictionary that looks like this:\n\n```\nparam = {\n    'n_estimators': [100,\
    \ 250, 500, 750, 1000],\n    'warm_start': ['True', 'False'],\n    'criterion':\
    \ ['entropy', 'gini']\n}\n```\n\nIn the script above we create a dictionary named,\
    \ “param” the keys for the dictionary are the names of the parameters and the\
    \ values of the dictionary corresponds to values of the parameter. From these\
    \ set of values, the Grid Search algorithm will return the best combination.\n\
    \nFor instance we want to test the best value for n_estimators parameter and we\
    \ passed 100, 250, 500, 750 and 1000. Grid search will select best value from\
    \ these five values. It is important to mention here that grid search algorithm\
    \ can take lot of time depending upon the values that you want to test and the\
    \ number of folds for the cross validation.\n\nFor instance in our case we have\
    \ 5 values for n_estimators parameter, 2 values for warm_start and two values\
    \ for criterion. Total possible combinations in this case are 5 x 2 x 2 = 20.\
    \ Multiply this value with number of folds e.g 5. That makes it 100 executions.\
    \ This can slow down the algorithm a bit.\n\n### Executing Grid Search\n\nTo execute\
    \ the Grid Search, we need create object of GridSearchCV class and pass it the\
    \ classifier (we will use Random Forest classifier created in the last section),\
    \ the parameter dictionary that we just created, the performance evaluation metrics\
    \ (we will use accuracy), cross validation folds and the number of jobs. When\
    \ n_jobs = -1, it means that all the CPU's should be used for performing Grid\
    \ Search. Execute the following script to create GridSearch object.\n\n```\nfrom\
    \ sklearn.model_selection import GridSearchCV\ngrid_search = GridSearchCV(estimator=rf_clf,\n\
    param_grid=param,\nscoring='accuracy',\ncv=5,\nn_jobs=-1)\n```\n\nThe final step\
    \ is to call fit method on the GridSearchCV object and pass it the training and\
    \ test set as shown below:\n\n```\ngrid_search.fit(train_features, train_labels)\n\
    ```\n\nThis can take a bit of time to execute.\n\nOnce the above script executes,\
    \ the last and final step is to see the parameters selected by grid search, to\
    \ do so you can use the best_params_ attribute of the GridSearchCV class as shown\
    \ below:\n\n```\noptimal_parameters = grid_search.best_params_\nprint(optimal_parameters)\n\
    ```\n\nThe output looks like this:\n\n```\n{'criterion': 'gini', 'n_estimators':\
    \ 750, 'warm_start': 'True'}\n```\n\nBest achieved with aforementioned parameters\
    \ values. Finally to see the accuracy achieved using most optimal parameters,\
    \ execute the following script:\n\n```\noptimal_results = grid_search.best_score_\n\
    print(optimal_results)\n```\n\n## Conclusion\n\nWith this chapter, this book comes\
    \ to its end. From here on I would suggest you to study machine learning on your\
    \ own. Following are some of the very good resources:\n\n- For Python: https://www.python.org/\n\
    - For Machine Learning: http://scikit-learn.org/stable/\n- For Deep Learning:\
    \ https://keras.io/\n- For datasets: https://archive.ics.uci.edu/ml/index.php"

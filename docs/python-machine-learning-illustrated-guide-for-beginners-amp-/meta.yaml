    \ import LabelEncoder\nlabelencoder_features = LabelEncoder()\nfeatures[:,2]=\
    \ labelencoder_features.fit_transform(features[:,2])\n```\n\n与 Imputer 类类似，*LabelEncoder*\
    \ 类有 *fit_transform* 方法，这基本上是 *fit* 和 *transform* 方法的组合。该类以分类列作为输入并返回相应的数值。在上面的脚本中，我们将\
    \ Gender 列（即索引为 2 的列）传递给 *LabelEncoder* 类。执行上面的脚本后，如果你检查 Gender 列的值，你会看到 1 和 0\
    \ 代替了 Male 和 Female，如下所示：\n\n```\narray([[25, 25.0, 1],\n       [55, 31.0, 0],\n\

  md: '# Environment Setup


    In this chapter we will install the software that we are going to use to run our
    Machine learning Programs. There are several options available to implement machine
    learning, however we will be using Python since most of the advanced machine learning
    community is working with Python for machine learning. To install Python several
    options available. You can simply install core Python and use a text editor like
    notepad to write Python programs. These programs can then be run via command line
    utilities. The other option is to install an Integrated Develop Environment (IDE)
    for Python. IDE provides a complete programming environment including Python installation,
    Editors and debugging tools. Most of the advanced programmers take the IDE route
    for Python development. We are also going to take the same route.


    Anaconda is the IDE that we are going to use throughout this book. Anaconda is
    light, easy to install and comes with variety of development tools. Anaconda has
    its own command line utility to install third party software. And the good thing
    is that with Anaconda, you don’t have to separately install Python environment.'
  merge: -1

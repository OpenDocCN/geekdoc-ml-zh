    \n## 第 15 章\n\n## 层次聚类\n\n在上一章中，我们研究了 K-Means 聚类，这是一种无监督学习。在本章中，我们将研究另一种聚类技术，即层次聚类。层次聚类形成的簇有时可能与\
    \ K-Means 聚类相似；然而，层次聚类的过程却大不相同。层次聚类有两种类型：分裂式和凝聚式。在分裂式聚类中，数据点最初被视为一个大簇，并采用自顶向下的方法将这个大簇划分为几个小簇。另一方面，凝聚式聚类采用自底向上的方法。在本章中，我们将介绍凝聚式聚类，因为它是最常用的聚类类型。\n\
    \n### 层次聚类理论\n\n层次聚类涉及以下步骤：\n\n- 一开始，每个数据点都被视为一个簇。因此，如果有 N 个数据点，最初的簇总数就是 N。\n\

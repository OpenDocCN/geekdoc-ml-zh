    \n# Chapter 7\n\n## Random Forest for Regression\n\nIn the last chapter we studied\
    \ decision trees. A single decision tree can be biased depending upon the data.\
    \ A better approach could be to use multiple decision trees that make their own\
    \ prediction and then final prediction can be calculated by finding the average\
    \ of all predictions made by all the trees. This approach is known as ensemble\
    \ learning. In ensemble learning multiple algorithms of same or different types\
    \ are joined together to create a more powerful machine learning model. Random\
    \ forest is a type of ensemble learning models and can be used for supervised\
    \ machine learning.\n\nRandom forest algorithm unites multiple decision tree algorithms,\
    \ creating a forest. Therefore, the algorithm is called “Random Forest” algorithm.\
    \ Like decision tree algorithm, random forest algorithm can be used to predict\
    \ continuous values (regression) as well as discrete values (classification).\
    \ In this article we will implement random forest algorithm with the help of Python’s\
    \ Scikit learn library for regression purpose. We will see how we can use random\
    \ forest algorithm for Classification in the Classification section of the book.\n\
    \n## Working of Random Forest Algorithm\n\nRandom forest algorithm performs following\
    \ steps:\n\n1. Choose K random data points from the dataset.\n2. Create a decision\
    \ tree regression or classification algorithm based on the K data points.\n3.\
    \ Select the number of trees for random forest algorithm and perform steps 1 and\
    \ 2 on each tree.\n4. If the problem is regression, each tree predicts a continuous\
    \ value; the final output can be calculated by taking mean of the values predicted\
    \ by all the trees. If the problem at hand is classification problem, each tree\
    \ predicts a discrete value. Final category can be selected by majority voting.\n\
    \n## Pros of Random Forest Algorithm\n\nThere are several advantages of random\
    \ forest algorithm, some of which have been enlisted below:\n\n- A random forest\
    \ algorithm is one of the most stable algorithm and scales very well. Since there\
    \ are multiple trees in the forest, introduction or removal of data from the dataset\
    \ can impact a small portion of trees but not all trees. The overall stability\
    \ of the algorithm is not affected.\n- Random forest algorithm performs equally\
    \ well in case of numerical as well as categorical features.\n- You don’t need\
    \ to perform feature scaling in case of random forest algorithm since it doesn’t\
    \ rely on the distance between the data points in the feature space.\n\n## Cons\
    \ of Random Forest Algorithm\n\nOne of the biggest disadvantages of random forest\
    \ algorithm is its complexity. Since hundreds or sometimes thousands of trees\
    \ are involved in prediction, it is not easy to understand how the final prediction\
    \ was made.\n\nThe complexity of an algorithm comes with the cost of time. Random\
    \ forest algorithm can take a lot of time to execute depending upon the number\
    \ of trees in the forest.\n\n## Implementing Random Forest Algorithm using Scikit\
    \ Learn\n\nIn this section, we will use random forest algorithm to predict how\
    \ much points can a player score in a basketball match based on his height, weight,\
    \ percentage of successful field goals out of all attempts, percentage of successful\

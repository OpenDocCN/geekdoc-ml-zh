  md: '# Performance Evaluation with Cross Validation and Grid Search


    Welcome to the final chapter of the book. In this chapter we are going to see
    how we can evaluate performance of an algorithm in a more robust way.


    Till now we have been evaluating algorithm performance using by splitting the
    data into training and test sets and then training the model on the training set
    and testing it on the test set. However there are certain problems associated
    with this approach. One such problem is variance. This problem can be solved using
    Cross Validation.


    Another problem that affects the performance comparison of different algorithms
    is use of various hyper parameters such as K in KNN algorithm and n_estimators
    in Random Forest algorithm. To compare two algorithms, we need to find the parameters
    that result in best performance. This problem can be solved using Grid Search
    algorithm.


    In this chapter, we will study Cross Validation and Grid Search in detail.'
  merge: -1
  pgno: 184
- img_proc: true
  md: '# Cross Validation


    Earlier we said that splitting data randomly into training and test set can lead
    to variance problem. Variance in performance evaluation of an algorithm refers
    to scenario where an algorithm performance varies depending upon the test set
    being used.


    Cross validation is the solution to variance problem. In cross validation, dataset
    is divided into K folds where K is any integer. Each of the K folds or partition
    is at least once used in the training set as well as testing set. For instance
    let''s divide the dataset into 5 partitions. In the first iteration, first 4 partitions
    are used for training and partition is used as testing. In the second fold, 1,2,3
    and partition is used for training and partition is used for testing. In this
    way every partition is used at least once for testing. The final performance of
    the algorithm can be evaluated by taking mean of the results from individual tests.
    This solves variance problem since now the result is based on algorithm being
    trained and tested on the complete dataset.'
  merge: -1
  pgno: 185

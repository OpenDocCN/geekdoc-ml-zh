  md: '# Hierarchical Clustering


    In the last chapter we studied K-Mean clustering which is a type of unsupervised
    learning. In this chapter we are going to study another clustering technique i.e.
    Hierarchical Clustering. Clustered formed by hierarchical clustering, can be sometimes
    similar to the K-Means clustering; however the process of Hierarchical Clustering
    is quite different. Hierarchical Clustering has two types: Divisive and Agglomerative.
    In divisive clustering, the data points are initially treated as one big cluster
    and a top-down approach is followed to divide this one big cluster into several
    small clusters. On the other hand in Agglomerative clustering involves bottom-up
    approach. In this chapter, we will cover Agglomerative clustering since it is
    the most commonly used clustering type.'
  merge: -1
  pgno: 158
- img_proc: true
  md: '# Hierarchical Clustering Theory


    Hierarchical clustering involves following steps:


    In the beginning every data point is treated as one cluster. Therefore, if there
    are N data points the total number of clusters at the beginning are N.

    Join the two closest points, resulting in N-1 clusters.

    Again join the two closest clusters from to form N-2 clusters.

    Repeat step 3 until one huge cluster is formed.

    Use dendrograms to divide one big cluster into required number of clusters. We
    will study the concept of dendrograms in details


    # Calculating Cluster Distance


    It is important to mention here that there are several ways to find distance between
    the two clusters and both Euclidean and Manhattan distances can be used for this
    purpose. Distance between the clusters can be calculated using one of the following
    ways:


    Distance between two closest points of the cluster can be calculated.

    Distance between two farthest points of the cluster can be calculated.

    Distance between the centroids of two clusters can be calculated.

    Mean of the distance between all possible combinations of points can be calculated.'
  merge: -1
  pgno: 159
- img_proc: true

    # Advantages of Naïve Bayes Algorithm


    NB algorithm is very simple and fast to train since no complex mathematics and
    error correction or back propagations is involved.

    NB algorithms outperform most of the other algorithms in case of categorical data.
    For numeric features, NB algorithm assumes normal distribution.'

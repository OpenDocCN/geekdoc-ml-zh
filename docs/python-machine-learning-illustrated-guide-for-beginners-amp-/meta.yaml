    In this chapter we will study linear regression with one variable as well as linear
    regression with multiple variables. Using linear regression with one variable,
    we will predict price of a car based on the year of manufacture. We will then
    move to more complex problem where we will predict the points that a basketball
    player can score based on height, weight, field goals and throws. However, first
    let’s study theoretical back ground of linear regression.'

    # Dimensionality Reduction with PCA


    Machine learning as a discipline has advanced quite a bit in recent years owing
    to the availability of high performance hardware and storage spaces. Algorithms
    that use to take months to run 20 years ago can now be run in minutes. Though
    execution speed of machine learning algorithms has improved significantly, there
    are still few bottlenecks that slow machine learning algorithms down.


    Huge dataset and large number of features per dataset is one of the reasons of
    slow execution of the algorithms. It is not advisable to reduce number of records
    from a dataset since they may contain useful information. However, number of features
    in a dataset can be reduced.


    There are two main ways to reduce features in a dataset:


    +   - Correlated features can be merged resulting in lesser number of features.

    - Choose features that cause maximum variance in the dataset as well as in the
    output.


    The second method is normally preferred and several statistical techniques have
    been developed in this regard e.g. Factor Analysis, Linear Discriminant Analysis
    (LDA) and Principal Component Analysis (PCA). In this chapter we will study PCA
    and in the next chapter we will study LDA.'
  - '[PAGE 169]


    # Principal Component Analysis Theory


    Principal component analysis is one of the most widely used techniques for dimensionality
    reduction. PCA works by selecting features that cause maximum variance in the
    output, leaving behind features that have no effect on the output. The intuition
    behind this approach is that variance can be used as a measure for distinguishing
    output; hence features that are responsible for distinguishing outputs are more
    important and hence should be selected. First principal component is the feature
    that results in maximum variance, similarly second principal component is the
    feature that causes second largest variance and so on.


    PCA has two major advantages:


    Reduced number of features means reduced training time, thus faster execution
    time.

    We can only view data in three dimensions; in higher dimensions it is not particularly
    easy to view the data. With reduced number of features, data can easily be viewed.


    It is important to mention here that data must be scaled before applying PCA since
    variance can be huge for features expressed in higher units such as kilograms,
    millions, light years etc. Therefore, PCA can be biased towards features these
    features.'

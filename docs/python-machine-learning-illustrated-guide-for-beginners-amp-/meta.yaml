  md: '# Data Preprocessing For Machine Learning


    Data has to be in a specific format before you can apply machine learning algorithms
    to them. Converting data to the right format for machine learning algorithms is
    usually known as data preprocessing. Depending upon the dataset, there are several
    preprocessing steps that are required to be performed to convert data into a format
    usable by machine learning algorithm. Following are the steps involved in preprocessing
    data for machine learning algorithms:


    +   1. Getting the dataset

    2. Import libraries

    3. Import the dataset

    4. Handling missing values

    5. Handling categorical data

    6. Dividing data into training and tests sets

    7. Scaling the data


    In this chapter we will study each of these steps in details.'
  merge: -1
  pgno: 32

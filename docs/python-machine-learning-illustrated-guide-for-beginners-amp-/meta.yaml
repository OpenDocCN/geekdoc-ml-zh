  md: 'the performance of classification algorithms. Let''s briefly review Confusion
    Matrix, Accuracy Precision, Recall and F1 Measures are:


    Confusion Matrix:


    A confusion matrix is a matrix that displays true positive, true negative, false
    positive and false positive predicted values.


    True positives (TP) are those values which are actually positive and they are
    also predicted positive. Similarly, True Negatives (TN) are those values which
    are actually negative and predicted negative.


    On the other hand, False Positives are the values which are actually negative
    but have been falsely predicted as positive. Similarly, False Negatives are those
    which are actually positive but falsely predicted as negative.


    A confusion matrix looks like this:

    this: this:

    this: this:

    this: this:


    **Accuracy:**


    The simplest parameter to evaluate the performance of a machine learning algorithm
    is Accuracy. Accuracy refers to the number of correctly predicted instance divided
    the total number of instances. Mathematically it can be represented as:

    Accuracy = (TP + TN) / (TP + FP + TN + FN)


    **Precision:**


    Precision refers to the ability of an algorithm to make precise predictions. It
    can be calculated by dividing the true positives by predicted positives ( true
    positives + false positives) Mathematically it is represented as:

    Precision = TP / (TP +FP)


    **Recall**'

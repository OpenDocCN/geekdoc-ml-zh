    # Chapter 1'
  - '[PAGE 10]


    # Introduction to machine Learning


    Machine learning is a branch of Artificial Intelligence that deals with learning
    implicitly from data using various statistical techniques. Unlike traditional
    computer programs where all the application logic is explicitly programed, machine
    learning applications learn implicitly from the data without being explicitly
    programmed. The idea behind machine learning is that instead of hard coded logic,
    large amount of data is fed into the application. It is then the responsibility
    of the application to learn from that data and make decisions.'
  - '[PAGE 11]


    # Definition


    The first definition of machine learning was coined by [Arthur Samuel](https://en.wikipedia.org/wiki/Arthur_Samuel)
    back in 1959. He defined machine learning as:


    > of study that enables computers to learn without being explicitly programmed.”


    [Tom Mitchel](https://en.wikipedia.org/wiki/Tom_M._Mitchell) from Carnegie Mellon
    University defined machine learning in mathematically understandable terms as
    in 1997. He said:


    > “A computer program is said to learn from experience E with respect to some
    task T and some performance measure P, if its performance on T, as measured by
    P, improves with experience E.”


    The definition provided by Tom Mitchel is widely regarded as the most precise
    yet clear definition of machine learning. Now we know what machine learning is,
    but a question still remains that how machines learning and what is their inner
    working. The next section will answer this question:'
  - '[PAGE 12]


    # How Machines Learn?


    Before dwelling into the details of machine learning, let us first recapitulate
    that how humans learn. For instance, how we humans know that we should not touch
    a heating plates when they are on with bare hands. How we know that they can cause
    burns? Well there can be two possibilities: Either we have been burned in the
    past by heating stove or we have been taught by elders not to touch the heating
    plates. In both the cases we have had some experience in the past that stops us
    from touching heating plates when they are on. In other words, we had some past
    information, on the basis of which we make future decisions.


    Machine learns in a similar way. In the beginning they have no knowledge. They
    are just like a newborn child with zero knowledge. To make machines learn, information
    is passed to these machines. From this information, machines identify patterns
    using various statistical techniques. Once machines learn to identify patterns
    from the data for making decisions, they can be used to make decisions on unseen
    data.


    Workflow of a typical learning process of a machine learning model is shown in
    the following figure:'
- md: 'Training data is fed into machine learning algorithms that are nothing but
    complex mathematical algorithms. The algorithms results in machine learning models.
    Machine learning models are capable of making predictions on new unseen data which
    is also known as test data.


    ## Importance of Machine Learning


    The ultimate goal of AI is to make machines as intelligent as humans. However
    initial work in AI showed that we cannot hardcode machines that are as intelligent
    as humans. Humans learn from the environment which is consistently evolving. Therefore,
    the best way to make intelligent machines is to make them learn themselves. Therefore,
    machine learning was recognized as a discipline of science that teaches machines
    how to automatically learn from the data.


    The idea behind machine learning is that instead of hardcoding the logic, data
    is fed into the machines and make machines themselves learn from the data by identifying
    patterns from the data. Interestingly machines learning techniques are quicker
    than humans in identifying patterns.


    Machine learning techniques have been around for quite a while. However owing
    to the lack of high performance hardware, these techniques were not implemented
    before to solve real world problems. Now, with the availability of complex hardware
    and huge amount of data, machine learning techniques have resurfaced and have
    been successful in developing intelligent machines.


    ## Types of Machine Learning


    Machine learning techniques have been broadly categorized into two types:


    - 1- Supervised Learning

    - 2- Unsupervised Learning


    ## Supervised Learning


    In supervised learning, both the input data and the corresponding category that
    the input data belongs to is provided to the learning algorithm. The learning
    algorithm learns the relationship between the input and the output and then predicts
    the output of the unseen input data samples.


    For instance, supervised machine learning algorithm is fed with images of apples
    labeled as fruit and potatoes labeled as vegetable. After training on this data,
    the supervised machine learning algorithm should be able to classify new unlabeled
    images of apples as fruit and unlabeled potatoes as vegetable.


    Following are the steps involved in supervised machine learning algorithm:


    - 1- Feed the algorithm with input records X, and output labels y.

    - 2- For each input record the algorithm predicts an output y''.

    - 3- Error in prediction is calculated by subtracting y from y''.

    - 4- The algorithm corrects itself by removing the error.

    - 5- Steps 1 to 4 continue for multiple iterations until error is minimized.


    In mathematical terms, you have input variable X and output variable y, and you
    have to find a function that captures relationship between the two i.e. y= f(X)


    Supervised Learning is used to solve two different types of problems: classification
    and regression.


    **Classification:** Classification refers to process of predicting discrete output
    values for an input. For instance, given an input predicting whether a mail is
    spam or ham, a tumor is benign or malignant or whether a student will pass or
    fail the exam.


    **Regression:** In regression problems the task of machine learning model is to
    predict a continuous value. For instance for given input, predict the price of
    the house or predict the marks obtained by a student on an exam etc.


    ## Unsupervised Learning


    In supervised learning, the algorithms are fed with the input data with no labels.
    It is the responsibility of the algorithm to identify patterns in the data and
    cluster records with similar characteristics. Normally, most of the real world
    data is unlabeled; therefore unsupervised learning can be used as a precursor
    to supervised learning.


    For instance, customers shopping trend can be fed into an unsupervised learning
    algorithm. The algorithm can find trends in the shopping. Consider a scenario
    where the algorithm finds that the customers who buy baby products also buy milk.
    Therefore, a business decision to place the milk close to the baby products can
    be based on this information.


    ## Conclusion


    In this chapter we introduced the machine learning as subject matter. We saw what
    machine learning is and what different types of machine learning are. The next
    chapter is dedicated to installing the software required to run machine learning
    algorithms in this chapter. We will be using Python''s Scikit Learn Library for
    implementing different machine learning algorithms.


    ## Chapter 2


    ## Environment Setup


    In this chapter we will install the software that we are going to use to run our
    Machine learning Programs. There are several options available to implement machine
    learning, however we will be using Python since most of the advanced machine learning
    community is working with Python for machine learning. To install Python several
    options available. You can simply install core Python and use a text editor like
    notepad to write Python programs. These programs can then be run via command line
    utilities. The other option is to install an Integrated Develop Environment (IDE)
    for Python. IDE provides a complete programming environment including Python installation,
    Editors and debugging tools. Most of the advanced programmers take the IDE route
    for Python development. We are also going to take the same route.


    Anaconda is the IDE that we are going to use throughout this book. Anaconda is
    light, easy to install and comes with variety of development tools. Anaconda has
    its own command line utility to install third party software. And the good thing
    is that with Anaconda, you don’t have to separately install Python environment.


    ## Downloading and Installing Anaconda


    Follow these steps to download and install anaconda. In this section we will show
    the process of installing Anaconda for windows. The installation process remains
    almost same for Linux and Mac.


    - 1- Go to the following URL https://www.anaconda.com/download/

    - 2- You will be presented with the following webpage. Select Python 3.6 version
    as this is currently the latest version of Python. Click the “Download” button
    to download the executable file. It takes 2-3 minutes to download the file depending
    upon the speed of your internet.

    - 3- Once the executable file is downloaded, go to the download folder and run
    the executable. The name of the executable file should be similar to “Anaconda3-5.1.0-Windows-x86_64.”
    When you run the file you will see installation wizard like the one in the following
    screenshot. Click “Next” button.

    - 4- “License Agreement” dialogue box will appear. Read the license agreement
    and Click “I Agree” button.

    - 5- From the “Select Installation Type” dialogue box, check the “Just Me” radio
    button and click “Next” button as shown in the following screenshot.

    - 6- Choose the installation directory (Default is preferred) from the “Choose
    Install Location” dialogue box and click “Next” button. You should have around
    3 GB of free space in your installation directory.

    - 7- From the “Advanced Installation Options” dialogue box, select the second
    checkbox “Register Anaconda as my default Python 3.6” and click the “Install”
    button as shown in the following screenshot.


    The installation process will start which can take some time to complete. Sit
    back and enjoy a cup of coffee.


    - 8- Once the installation completes, click the “Next” button as shown below.

    - 9- “Microsoft Visual Studio Code Installation” window appear, click “Skip” button.

    - 10- Congratulations, you have installed Anaconda. Uncheck the both the checkboxes
    on the dialogue box that appears and “Finish” button.'
  mdcn: '训练数据被输入到机器学习算法中，这些算法本质上是复杂的数学算法。算法的结果是生成机器学习模型。机器学习模型能够对新的、未见过的数据（也称为测试数据）进行预测。


    ## 机器学习的重要性


    人工智能的终极目标是让机器变得像人类一样智能。然而，人工智能的早期工作表明，我们无法通过硬编码的方式制造出与人类一样智能的机器。人类从不断演变的环境中学习。因此，制造智能机器的最佳方式是让它们自己学习。因此，机器学习被认定为一门教机器如何从数据中自动学习的科学学科。


    机器学习背后的理念是，不硬编码逻辑，而是将数据输入机器，让机器通过识别数据中的模式自己从数据中学习。有趣的是，机器学习技术在识别模式方面比人类更快。


    机器学习技术已经存在相当长一段时间了。然而，由于缺乏高性能硬件，这些技术以前并未用于解决现实世界的问题。现在，随着复杂硬件和海量数据的可用性，机器学习技术重新兴起，并在开发智能机器方面取得了成功。


    ## 机器学习的类型


    机器学习技术大致分为两类：


    - 1- 监督学习

    - 2- 无监督学习


    ## 监督学习


    在监督学习中，输入数据及其所属的相应类别都会提供给学习算法。学习算法学习输入和输出之间的关系，然后预测未见过的输入数据样本的输出。


    例如，监督机器学习算法被输入标记为水果的苹果图像和标记为蔬菜的土豆图像。在此数据上训练后，监督机器学习算法应该能够将新的未标记的苹果图像分类为水果，将未标记的土豆分类为蔬菜。


    监督机器学习算法涉及以下步骤：


    - 1- 将输入记录 X 和输出标签 y 输入算法。

    - 2- 对于每个输入记录，算法预测一个输出 y''。

    - 3- 通过从 y'' 中减去 y 来计算预测误差。

    - 4- 算法通过消除误差来自我修正。

    - 5- 步骤 1 到 4 重复多次迭代，直到误差最小化。


    用数学术语来说，你有输入变量 X 和输出变量 y，你需要找到一个捕捉两者之间关系的函数，即 y= f(X)


    监督学习用于解决两种不同类型的问题：分类和回归。


    **分类：** 分类是指为输入预测离散输出值的过程。例如，给定一个输入，预测邮件是垃圾邮件还是正常邮件，肿瘤是良性还是恶性，或者学生是否会通过考试。


    **回归：** 在回归问题中，机器学习模型的任务是预测一个连续值。例如，对于给定的输入，预测房屋的价格或预测学生在考试中获得的分数等。


    ## 无监督学习


    在无监督学习中，算法被输入没有标签的输入数据。算法的责任是识别数据中的模式并将具有相似特征的记录进行聚类。通常，大多数现实世界的数据都是无标签的；因此，无监督学习可以作为监督学习的前导。


    例如，客户的购物趋势可以输入到无监督学习算法中。算法可以发现购物中的趋势。考虑这样一种情况：算法发现购买婴儿用品的客户也会购买牛奶。因此，基于此信息，可以做出将牛奶放置在婴儿用品附近的商业决策。


    ## 结论


    在本章中，我们介绍了机器学习这一主题。我们了解了什么是机器学习以及机器学习的不同类型。下一章将专门介绍安装运行本章机器学习算法所需的软件。我们将使用 Python
    的 Scikit Learn 库来实现不同的机器学习算法。


    ## 第 2 章


    ## 环境设置


    在本章中，我们将安装用于运行机器学习程序的软件。有多种选项可用于实现机器学习，但我们将使用 Python，因为大多数高级机器学习社区都在使用 Python
    进行机器学习。安装 Python 有多种选择。你可以简单地安装核心 Python 并使用像记事本这样的文本编辑器来编写 Python 程序。然后可以通过命令行工具运行这些程序。另一个选项是安装
    Python 的集成开发环境（IDE）。IDE 提供了一个完整的编程环境，包括 Python 安装、编辑器和调试工具。大多数高级程序员在 Python 开发中都选择
    IDE 路线。我们也将采用同样的路线。


    Anaconda 是我们将在本书中使用的 IDE。Anaconda 轻量、易于安装，并附带各种开发工具。Anaconda 有自己的命令行工具来安装第三方软件。而且，好消息是，使用
    Anaconda，你不必单独安装 Python 环境。


    ## 下载和安装 Anaconda


    按照以下步骤下载和安装 Anaconda。在本节中，我们将展示在 Windows 上安装 Anaconda 的过程。Linux 和 Mac 的安装过程几乎相同。


    - 1- 转到以下网址 https://www.anaconda.com/download/

    - 2- 你将看到以下网页。选择 Python 3.6 版本，因为这是目前最新的 Python 版本。单击“Download”按钮下载可执行文件。根据你的互联网速度，下载文件需要
    2-3 分钟。

    - 3- 可执行文件下载完成后，转到下载文件夹并运行该可执行文件。可执行文件的名称应类似于“Anaconda3-5.1.0-Windows-x86_64”。运行文件时，你将看到如下截图所示的安装向导。单击“Next”按钮。

    - 4- 将出现“License Agreement”对话框。阅读许可协议并单击“I Agree”按钮。

    - 5- 在“Select Installation Type”对话框中，选中“Just Me”单选按钮，然后单击“Next”按钮，如下截图所示。

    - 6- 从“Choose Install Location”对话框中选择安装目录（建议使用默认值），然后单击“Next”按钮。你的安装目录应有大约 3 GB
    的可用空间。

    - 7- 在“Advanced Installation Options”对话框中，选中第二个复选框“Register Anaconda as my default
    Python 3.6”，然后单击“Install”按钮，如下截图所示。


    安装过程将开始，可能需要一些时间才能完成。请坐下来享受一杯咖啡。


    - 8- 安装完成后，单击“Next”按钮，如下所示。

    - 9- 出现“Microsoft Visual Studio Code Installation”窗口，单击“Skip”按钮。

    - 10- 恭喜，你已安装 Anaconda。取消选中出现的对话框上的两个复选框，然后单击“Finish”按钮。'

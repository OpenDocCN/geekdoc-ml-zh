  md: '# SVM Theory


    For typical linear regression in two dimensional feature space, the task is to
    find a straight line that successfully bisects the data points. However in real
    world, there can be multiple decision boundaries that can successfully classify
    the data points as shown in Fig1.


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_93_0.png)


    Fig1: Multiple boundaries


    However whether a new data point will be successfully classified or not depends
    upon the decision boundary chosen for classification.


    For instance take a look at Fig2. Suppose we have to classify new data point i.e.
    the Red Circle. If we have the decision boundary as in Fig2, the new data point
    will be classified as blue.'
  merge: -1
  pgno: 93
- img_proc: true
  md: '![](img/ad33dc2a5dce297b964e4e76b53c2309_94_0.png)


    Fig2: New data point classified as blue


    On the other hand if we have the decision boundary as in Fig3, the new data point
    will be classified as yellow as shown below:


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_94_1.png)


    Fig3: New data point classified as yellow


    From Fig2 and it can be clearly seen that there can be multiple decision boundaries
    that successfully classify a dataset. However, not all of them are optimal. Given
    a new data point, different decision boundaries may classify data differently.


    The job of SVM algorithm is to find the decision boundary that classifies data
    in such a way that the chances of misclassification can be minimized. SVM algorithm
    does so by maximizing the distance between the closest data points from all the
    classes in the dataset.


    The SVM algorithm finds such a boundary with the help of support vectors, hence
    the name Support Vector Machines. Support vectors are the vectors that pass through
    the closest'

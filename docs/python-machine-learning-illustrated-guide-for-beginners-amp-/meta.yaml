  md: '# Random Forest for Regression


    In the last chapter we studied decision trees. A single decision tree can be biased
    depending upon the data. A better approach could be to use multiple decision trees
    that make their own prediction and then final prediction can be calculating by
    finding the average of all predictions made by all the trees. This approach is
    known as ensemble learning. In ensemble learning multiple algorithms of same or
    different types are joined together to create a more powerful machine learning
    model. Random forest is a type of ensemble learning models and can be used for
    supervised machine learning.


    Random forest algorithm unites multiple decision tree algorithms, creating a forest.
    Therefore, the algorithm is called “Random Forest” algorithm. Like decision tree
    algorithm, random forest algorithm can be used to predict continuous values (regression)
    as well as discrete values (classification). In this article we will implement
    random forest algorithm with the help of Python’s Scikit learn library for regression
    purpose. We will see how we can use random forest algorithm for Classification
    in the Classification section of the book.'
  merge: -1
  pgno: 83
- img_proc: true
  md: '# Working of Random Forest Algorithm


    Random forest algorithm performs following steps:


    +   1. Choose K random data points from the dataset

    2. Create a decision tree regression or classification algorithm based on the
    K data points.

    3. Select the number of trees for random forest algorithm and perform steps 1
    and 2 on each tree.

    4. If the problem is regression, each tree predicts a continuous value; the final
    output can be calculated by taking mean of the values predicted by all the trees.
    If the problem at hand is classification problem, each tree predicts a discrete
    value. Final category can be selected by majority voting.'
  merge: -1

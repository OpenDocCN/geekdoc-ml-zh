    \ variable and c is the y intercept.\nIf we look at the equation we can see that\
    \ b and x remain constant since they are the data variables. Therefore, linear\
    \ regression algorithm gives us the slope and the intercept that best result in\
    \ line which best fits the dataset.\n\nThis concept can be extended to more than\
    \ one independent variable. The equation for linear regression function will then\
    \ be represented as:\n\n```\nB = A1X1 + A2X2 + A3X3 + ....... ANXN + C\n```\n\n\
    Here is n is the total number of independent variables. This equation basically\
    \ represents a hyper plane with n-dimension. It is important to mention that in\
    \ two-dimensions linear regression model can be represented as a straight line.\
    \ In three dimensions, it is represented in the form of plane and in more than\

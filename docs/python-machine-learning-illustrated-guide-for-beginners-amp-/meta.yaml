    \ dtype=object)\n```\n\n## 处理分类数据\n\n我们知道机器学习算法基于数学概念，而数学是关于数字的。因此，将数据集中的所有分类值转换为数值是方便的。如果我们查看\
    \ patients.csv，我们有两列包含分类值：Gender 和 Diabetic。\n\n幸运的是，在 sklearn.preprocessing 库中，我们有\

    \ Analysis (PCA) to reduce number of features in a dataset. In this chapter we\
    \ will see how we can use LDA for the same purpose.\n\n## Linear Discriminant\
    \ Analysis Theory\n\nLDA is a supervised dimensionality reduction technique which\
    \ tries to select features based on their ability to distinguish the output. LDA\
    \ relies on the output of the records as well. Where as in PCA, feature set is\
    \ enough and labels are not required for feature reduction. As a first step in\
    \ LDA, related data points are clustered together before being projected into\

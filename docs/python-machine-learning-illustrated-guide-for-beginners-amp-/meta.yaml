    \ refers to the number of correctly predicted instances divided by the total number\
    \ of instances. Mathematically it can be represented as:\nAccuracy = (TP + TN)\
    \ / (TP + FP + TN + FN)\n\n**Precision:**\n\nPrecision refers to the ability of\
    \ an algorithm to make precise predictions. It can be calculated by dividing the\
    \ true positives by predicted positives (true positives + false positives). Mathematically\
    \ it is represented as:\nPrecision = TP / (TP + FP)\n\n**Recall:**\n\nRecall can\
    \ be calculated by dividing the true positives by actual number of positives (true\
    \ positive + false negative).\nRecall = TP / (TP + FN)\n\n**F1 – Measure:**\n\n\

    \n随机森林算法将多个决策树算法结合在一起，形成一个森林。因此，该算法被称为“随机森林”算法。与决策树算法一样，随机森林算法可用于预测连续值（回归）和离散值（分类）。在本文中，我们将借助Python的Scikit\

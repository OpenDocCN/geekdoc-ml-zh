    \ 10\n\n## K Nearest Neighbors Algorithm for Classification\n\nIn the last chapter\
    \ we studied Naïve Bayes algorithm for classification. We said that NB algorithm\
    \ assumes feature independence. Furthermore, one of the drawbacks of the NB algorithm\
    \ is that it assumes that categorical feature values are normally distributed.\
    \ However in most of the cases, real world data doesn’t follow any trend e.g.\
    \ uniform distribution or linear separability etc. In such cases a non-parametric\
    \ algorithm can come handy. K Nearest Neighbors (KNN) algorithm is one such non-parametric\
    \ algorithm.\n\n## Theory of KNN\n\nThe intuition behind KNN algorithm is extremely\
    \ simple. KNN algorithm simply finds the distance between the new test data points\
    \ from all the other data points in the dataset. It then ranks all the other data\
    \ points in ascending order according to their distance with the test point. Finally\
    \ it chooses the top K nearest data points. It then assigns the new data point\
    \ to the class of the majority of K data points. Now you should know that why\
    \ we scale our data down so that the distance between the different dimensions\
    \ of the data points remain meaningful. Distance can be Manhattan as well as Euclidean\
    \ depending upon the problem.\n\nLet's visually see the working of a KNN algorithm.\n\
    Suppose we have some data points in two dimensional space, divided into two categories:\
    \ red and blue as shown in the following figure.\n\n![](img/ad33dc2a5dce297b964e4e76b53c2309_117_0.png)\n\
    \nNow if we have to classify a new data point. We will calculate its distance\
    \ from all the red and blue data points. Then we will choose K nearest data points.\
    \ Suppose new data point is yellow circle and the value of K is three as shown\
    \ below:\n\n![](img/ad33dc2a5dce297b964e4e76b53c2309_118_0.png)\n\nYou can see\
    \ that out of the three nearest neighbors of the yellow data point, two are blue\
    \ and one is red. Therefore, the yellow data point will be classified in the blue\
    \ class.\n\nKNN algorithm has no training phase; in fact it uses whole dataset\
    \ for classifying a new data point. It is for this purpose, it is known as lazy\
    \ learning algorithm.\n\n## Advantages of KNN Algorithm\n\nUnlike other algorithms,\
    \ the list of parameters required by KNN algorithm is not very exhaustive. You\
    \ only need to specify the number of nearest neighbor K and the type of distance\
    \ function.\n\nKNN algorithm is extremely fast when compared to logistic regression,\
    \ decision trees and other classification algorithm since there is no training\
    \ phase involved in KNN. New data point can directly be classified without extensive\
    \ training, simply by finding its distance from the other data points.\n\nKNN\
    \ is very simple and easy to implement. Furthermore, new data points can be added\
    \ at any time since whenever a prediction has to be made, distance with all the\
    \ data points is recalculated.\n\n## Disadvantages of KNN Algorithm\n\nKNN algorithm\
    \ work well with numerical features but in case of categorical features, its performance\
    \ decreases. This is because for categorical features, the distance between two\
    \ data points cannot be calculated precisely.\n\nPrediction cost of KNN algorithm\
    \ increases with increase in the size of the data and dimensions because it is\
    \ time consuming to calculate distance between large number of data points with\
    \ high dimensions."
  mdcn: "如果你查看数据集，会发现其缩放效果不佳，例如`petal_width`列的值在0到1之间，而其他列的值则更高。因此，在训练算法之前，我们需要对数据进行缩放。还记得我们在第3章讨论过缩放吗？这里我们将使用标准缩放器类。\n\
    \n```python\nfrom sklearn.preprocessing import StandardScaler\nfeature_scaler\
    \ = StandardScaler()\ntrain_features = feature_scaler.fit_transform(train_features)\n\
    test_features = feature_scaler.transform(test_features)\n```\n\n## 12- 训练算法并进行预测\n\
    \n我们可以看到特征值呈正态分布；因此，我们可以使用高斯朴素贝叶斯来解决这个问题。要使用Scikit learn实现高斯朴素贝叶斯算法，我们需要使用*sklearn.naive_bayes*库中的*GaussianNB*类。执行以下脚本，在train_features和train_labels上训练模型。\n\
    \n```python\nfrom sklearn.naive_bayes import GaussianNB\nnb_clf = GaussianNB()\n\
    nb_clf.fit(train_features, train_labels)\n```\n\n执行以下脚本，预测测试特征的标签：\n\n```python\n\
    predictions = nb_clf.predict(test_features)\n```\n\n要将预测结果与真实输出进行比较，请执行以下脚本：\n\
    \n```python\ncomparison = pd.DataFrame({'Real': test_labels,\n               \
    \            'Predictions': predictions})\nprint(comparison)\n```\n\n输出如下所示：\n\
    \n![](img/ad33dc2a5dce297b964e4e76b53c2309_112_0.png)\n\n从输出中可以看出，我们的算法在预测花卉类型方面表现出色。在30个测试实例中，有29个被正确预测，只有一个（以红色高亮显示）被错误分类。\n\
    \n## 评估算法\n\n我们使用平均绝对误差、均方根误差和均方误差来评估回归算法。对于分类问题，性能指标则不同。通常使用精确率、召回率和F1值来评估分类算法的性能。让我们简要回顾一下混淆矩阵、准确率、精确率、召回率和F1值。\n\
    \n**混淆矩阵：**\n\n混淆矩阵是一个显示真正例、真负例、假正例和假负例预测值的矩阵。\n\n真正例（TP）是那些实际为正且也被预测为正的值。同样，真负例（TN）是那些实际为负且被预测为负的值。\n\
    \n另一方面，假正例是那些实际为负但被错误预测为正的值。同样，假负例是那些实际为正但被错误预测为负的值。\n\n混淆矩阵如下所示：\n\n|       \
    \         | 预测为正 | 预测为负 |\n|----------------|--------------------|--------------------|\n\
    | 实际为正| 真正例 (TP) | 假负例 (FN)|\n| 实际为负| 假正例 (FP)| 真负例 (TN) |\n\n**准确率：**\n\n评估机器学习算法性能最简单的参数是准确率。准确率是指正确预测的实例数除以总实例数。数学上可以表示为：\n\
    准确率 = (TP + TN) / (TP + FP + TN + FN)\n\n**精确率：**\n\n精确率是指算法进行精确预测的能力。它可以通过将真正例除以预测为正的实例数（真正例\
    \ + 假正例）来计算。数学上表示为：\n精确率 = TP / (TP + FP)\n\n**召回率：**\n\n召回率可以通过将真正例除以实际为正的实例数（真正例\
    \ + 假负例）来计算。\n召回率 = TP / (TP + FN)\n\n**F1值：**\n\nF1值是精确率和召回率的调和平均值。\n\n与回归性能指标一样，我们不必手动计算上述指标的值。Python\
    \ Scikit Learn库提供了可用于此目的的类。执行以下脚本，查看我们训练的用于预测鸢尾花类型的朴素贝叶斯算法的性能：\n\n```python\n\
    from sklearn.metrics import classification_report, confusion_matrix, accuracy_score\n\
    print(confusion_matrix(test_labels, predictions))\nprint(classification_report(test_labels,\
    \ predictions))\nprint(accuracy_score(test_labels, predictions))\n```\n\n上述脚本的输出如下所示：\n\
    \n```\n[[11  0  0]\n [ 0 13  0]\n [ 0  1  5]]\n              precision    recall\
    \  f1-score   support\n\n      setosa       1.00      1.00      1.00        11\n\
    \  versicolor       0.93      1.00      0.96        13\n   virginica       1.00\
    \      0.83      0.91         6\n\navg / total       0.97      0.97      0.97\
    \        30\n\n0.9666666666666667\n```\n\n从输出中可以看出，我们的算法达到了96.66%的准确率。\n\n## 结论\n\
    \n在本章中，我们开始了关于分类算法的讨论。本章我们研究的第一个分类算法是朴素贝叶斯算法。我们了解了该算法背后的理论及其Python实现。\n\n# 第10章\n\
    \n## 用于分类的K近邻算法\n\n在上一章中，我们研究了用于分类的朴素贝叶斯算法。我们说过NB算法假设特征独立。此外，NB算法的一个缺点是它假设分类特征值呈正态分布。然而在大多数情况下，现实世界的数据并不遵循任何趋势，例如均匀分布或线性可分性等。在这种情况下，非参数算法会派上用场。K近邻（KNN）算法就是这样一种非参数算法。\n\
    \n## KNN的理论\n\nKNN算法背后的直觉非常简单。KNN算法只是计算新的测试数据点与数据集中所有其他数据点之间的距离。然后，它根据与测试点的距离，按升序对所有其他数据点进行排序。最后，它选择前K个最近的数据点。然后，它将新数据点分配给K个数据点中多数所属的类别。现在你应该明白为什么我们要对数据进行缩放，以便数据点不同维度之间的距离保持有意义。距离可以是曼哈顿距离，也可以是欧几里得距离，具体取决于问题。\n\
    \n让我们直观地看看KNN算法的工作原理。\n假设我们在二维空间中有一些数据点，分为两类：红色和蓝色，如下图所示。\n\n![](img/ad33dc2a5dce297b964e4e76b53c2309_117_0.png)\n\
    \n现在，如果我们需要对一个新的数据点进行分类。我们将计算它与所有红色和蓝色数据点之间的距离。然后我们将选择K个最近的数据点。假设新数据点是黄色圆圈，K的值为三，如下所示：\n\
    \n![](img/ad33dc2a5dce297b964e4e76b53c2309_118_0.png)\n\n你可以看到，在黄色数据点的三个最近邻中，有两个是蓝色，一个是红色。因此，黄色数据点将被分类到蓝色类别中。\n\
    \nKNN算法没有训练阶段；事实上，它使用整个数据集来对新数据点进行分类。正是由于这个目的，它被称为惰性学习算法。\n\n## KNN算法的优点\n\n与其他算法不同，KNN算法所需的参数列表并不十分详尽。你只需要指定最近邻的数量K和距离函数的类型。\n\
    \n与逻辑回归、决策树和其他分类算法相比，KNN算法极其快速，因为KNN不涉及训练阶段。新数据点可以直接进行分类，无需大量训练，只需计算其与其他数据点的距离即可。\n\
    \nKNN非常简单且易于实现。此外，可以随时添加新的数据点，因为每当需要进行预测时，都会重新计算与所有数据点的距离。\n\n## KNN算法的缺点\n\n\
    KNN算法在处理数值特征时表现良好，但在处理分类特征时，其性能会下降。这是因为对于分类特征，无法精确计算两个数据点之间的距离。\n\nKNN算法的预测成本随着数据规模和维度的增加而增加，因为计算大量高维数据点之间的距离非常耗时。"

    crucial information and should not be removed just because one column has a missing
    value.


    Another approach to deal with missing values is to replace missing value with
    some value. Missing values can be replaced by mean or median of all the values
    in the column.


    To handle the missing values we will use the *Imputer* class of the *sklearn.preprocessing*
    library. Take a look at the following script.


    ```

    from sklearn.preprocessing import Imputer

    imputer = Imputer(missing_values="NaN", strategy="mean", axis=0)

    imputer = imputer.fit(features[:,1:2])

    features[:,1:2] = imputer.transform(features[:,1:2])

    ```


    In the script above, the first line imports the *Imputer* class from *sklearn.preprocessing*
    library. Next we create object of the Imputer class. Imputer class constructor
    takes three parameters: *strategy* and The *missing_value* parameter specifies
    the value that is required to be replaced. In our dataset, missing values have
    been denoted by “nan”, therefore we specified “NaN” for *missing_value* parameter.
    Strategy parameter specifies the type of strategy we want to use to fill missing
    value, it can have *mean*, and *most_frequent* values. Finally, the *axis* parameter
    denotes the'
  - "[PAGE 41]\n\naxis along which we want to imputate. The *axis 0* specifies the\
    \ column axis whereas *axis 1* specifies the row axis.\n\nNext we execute *fit*\
    \ method of the Imputer class. This method takes the column that we want to handle\
    \ missing values for, as input. Finally we execute *transform* function which\
    \ actually fills missing values in column 1 by the mean of the column. When you\
    \ execute the script above you will see that that the record at index 4 that previously\
    \ had missing value for column 1 i.e. BMI, now contains the mean of all the values\
    \ in the BMI column. This is shown in the following screenshot:\n\n```\narray([[25,\

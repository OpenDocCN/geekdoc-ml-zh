    To create the dendrograms we can use the *dendrogram* and *linkage* classes of
    the *scipy.cluster.hierarchy* library.


    The dendrograms generated for the above data points looks like this:


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_162_0.png)


    Dendrograms are created following the steps we mentioned earlier. First the two
    closest points are joined together. These points are depicted at the bottom of
    the dendrogram hierarchy. For instance points 6 and 1, 5 and 3, 4 and 2, 10 and
    7, these points are closest to each other. The vertical height of the point corresponds
    to Euclidean distance between the points. Finally when the closes points are joined
    to form clusters, the closest clusters are joined together, for instance cluster
    of points 5, 3 and 3, 4 have been joined together. This process continues until

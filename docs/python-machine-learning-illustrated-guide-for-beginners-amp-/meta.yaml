  md: '# K Nearest Neighbors Algorithm for Classification


    In the last we studied Naïve Bayes algorithm for classification. We said that
    NB algorithm assumes feature independence. Furthermore, one of the drawbacks of
    the NB algorithm is that it assumes that categorical feature values are normally
    distributed. However in most of the cases, real world data doesn’t follow any
    trend e.g. uniform distribution or linear separability etc. In such cases a non-parametric
    algorithm can come handy. K Nearest Neighbors (KNN) algorithm is one such non-parametric
    algorithm.'
  merge: -1
  pgno: 116
- img_proc: true
  md: '# Theory of KNN


    The intuition behind KNN algorithm is extremely simple. KNN algorithm simply finds
    the distance between the new test data points from all the other data points in
    the dataset. It then ranks all the other data points in ascending order of their
    according to their distance with the test point. Finally it chooses the top K
    nearest data points. It then assigns the new data point to the class of the majority
    of K data points. Now you should know that why scale our data down so that the
    distance between the different dimensions of the data points remain distance.
    Distance can be Manhattan as well as Euclidean depending upon the problem.


    Let''s visually see the working of a KNN algorithm.

    Suppose we have some data points in two dimensional space, divided into two categories:
    red and blue as shown in the following figure.


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_117_0.png)


    Now if we have to classify a new data point. We will calculate its distance from
    all the red and blue data points. Then we will choose K nearest data points. Suppose
    new data point is yellow circle and the value of K is three as shown below:'
  merge: -1
  pgno: 117
- img_proc: true
  md: '![](img/ad33dc2a5dce297b964e4e76b53c2309_118_0.png)


    You can see that out of the three nearest neighbors of the yellow data point,
    two are blue and one is red. Therefore, the yellow data point will be classified
    in the blue class.


    KNN algorithm has no training phase; in fact it uses whole dataset for classifying
    a new data point. It is for this purpose, it is known as lazy learning algorithm.'
  merge: -1
  pgno: 118
- img_proc: true
  md: '# Advantages of KNN Algorithm


    Unlike other algorithms, the list of parameters required by KNN algorithm is not
    very exhaustive. You only need to specify the number of nearest neighbor K and
    the type of distance function.


    KNN algorithm is extremely fast when compared to logistic regression, decision
    trees and other classification algorithm since there is no training phase involved
    in KNN. New data point can directly be classified without extensive training,
    simply by finding its distance from the other data points.


    KNN is very simple and easy to implement. Furthermore, new data points can be
    added at any time anytime since whenever a prediction has to be made, distance
    with all the data points is recalculated.'
  merge: -1
  pgno: 119
- img_proc: true
  md: '# Disadvantages of KNN Algorithm


    KNN algorithm work well with numerical features but in case of categorical features,
    its performance decreases. This is because for categorical features, the distance
    between two data points cannot be calculated precisely.


    Prediction cost of KNN algorithm increases with increase in the size of the data
    and dimensions because it is time consuming to calculate distance between large
    number of data points with high dimensions.'
  merge: -1

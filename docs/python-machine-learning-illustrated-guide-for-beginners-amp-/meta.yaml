    \ and 99.63%. This shows that the accuracy improvement diminishes after 3 components;\
    \ therefore 3 components can be retained.\n\n## Conclusion\n\nIn this chapter,\
    \ we saw how we can use PCA for dimensionality reduction. In the next chapter,\
    \ we will see how we can use LDA for dimensionality reduction. Happy Coding!\n\
    \n## Chapter 17\n\n## Dimensionality Reduction with LDA\n\nIn the previous we\

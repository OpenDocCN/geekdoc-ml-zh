  md: '# Polynomial Regression


    In the last chapter we studied how linear regression algorithm can be used to
    find the straight line that best fits the data points. However, in real world,
    data is not always linearly related. For instance if you take a look at the data
    distribution in the following figure


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_64_0.png)


    Here if we draw a straight line that best fits the data points, some points will
    end up above the line the other would end up below the line as shown in the following
    figure. In such a case, the chance of error in prediction will be higher.


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_64_1.png)


    On the other hand if we have a curved line that fits all the data points as shown
    in the following figure, the chance of error can'

  md: '# Scaling the Data


    The final preprocessing step before we can feed our data to machine learning algorithm
    is that of feature scaling. We need to scale features because in some datasets
    there is a huge difference between the values of different features. For instance
    if we add number of red blood cells of patients out patients.csv dataset, the
    column will have values in hundreds of thousands, on the other hand the Age column
    can have very small values. Many of the machines learning models use Euclidean
    distance to find distance between data points. If features are not scaled, these
    algorithms can be biased towards features with large values.


    There are two ways to scale features:

    Standardization:

    And

    Normalization:


    The *sklearn.preprocessing* library contains *StandardScaler* class that can be
    used to implement standardization of features. Like other preprocessing classes,
    it contains *fit_transform* method that takes dataset as input and returns scaled
    dataset. The following script scales both the *train_features* and *test_features*
    datasets.


    ```

    from sklearn.preprocessing import StandardScaler

    feature_scaler = StandardScaler()

    train_features = feature_scaler.fit_transform(train_features)

    test_features = feature_scaler.transform(test_features)

    ```


    Now if you see *train_features* and *test_features*, you can see scaled values
    as shown below:'

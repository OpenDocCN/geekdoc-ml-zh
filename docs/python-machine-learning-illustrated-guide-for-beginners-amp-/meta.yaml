    # Dividing data into training and tests sets


    In the first chapter we discussed that machine learning models are trained on
    subset of dataset and tested on another subset of the dataset. This splitting
    between the training and test set is done to ensure that our machine learning
    algorithm doesn''t *Overfitting* refers to the phenomena where machine learning
    performs excellent results on training data but poor results on test data. A good
    machine learning model is the one that gives good result on both training and
    test data. That way we can say that our model has correctly learned the underlying
    assumptions from the dataset and can be used to correctly make decisions on any
    new dataset.


    The *sklearn.model_selection* library contains *train_test_split* class that can
    be used to divide data into train and test sets. The class accepts features, labels
    and *test_size* as parameters. The *test_size* defines the size of the test set.
    Test size of 0.5 means split the data into 50% of test size and 50% of training
    size. The following script divides the data into 75% train size and 25% test size.


    ```

    from sklearn.model_selection import train_test_split

    train_features, test_features, train_labels, test_labels = train_test_split(features,
    labels, test_size = 0.25, random_state = 0)

    ```


    When you execute the above script you will see that *train_features* variable
    will contain matrix of 9 features (75% of 12) while *train_labels* will contain
    corresponding 9 labels. Similarly *test_features* will contain a matrix of 3 features
    (25% of 12) while *test_labels* will contain corresponding 3 labels.'

    # 5- Generating Polynomial Features


    To implement Polynomial Regression using Python’s Scikit Learn library, the same
    LinearRegression class is used. However before feeding our data to the algorithm,
    we need to convert linear features into polynomial features i.e. feature with
    higher degrees. If you look at the feature set we have 4 features at the moment.
    If we convert these linear features to polynomial features of degree 2, we will
    end up with 15 features. Three features for each column, i.e. feature with degree
    0, 1 and 2. We have 4 features, therefore 4 x 3 = 12. In addition we also have
    cross terms in polynomial regression. We have four features, therefore we will
    have three cross terms i.e. column1 x column2, column2 x column3 and column3xcolumn4.


    Let’s see how we can convert linear features to polynomial features with Python
    Scikit learn library. Execute the following script:


    ```

    from sklearn.preprocessing import PolynomialFeatures

    poly_reg_feat = PolynomialFeatures(degree=2)

    train_features_poly = poly_reg_feat.fit_transform(train_features)

    test_features_poly = poly_reg_feat.transform(test_features)

    ```


    Take a careful look at the script above. To implement polynomial regression the
    *PolynomialFeature* class from the *sklearn.preprocessing* library is used. Degree
    of polynomial is passed to the class constructor. Next the *fit_transform* method
    is called and the original feature set is passed to this method. The'

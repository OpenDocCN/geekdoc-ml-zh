  md: '# Introduction


    Machine learning is one of the hottest buzz words around. With the advancement
    in high computing hardware and availability of thousands of terra bytes of data,
    more and more companies and research organizations are using machine learning
    to build intelligent machines that can perform variety of tasks and can help humans
    make better decisions.


    This book contains detailed overview of all the latest concepts in machine learning.
    Each chapter in this book is dedicated to one machine learning algorithm. Each
    chapter begins with the brief theory of the algorithm followed by implementation
    of the algorithm in Python’s Scikit learn library.


    The book is aimed towards novice as well as expert users. On hand it can be used
    as handbook of machine learning for the beginners, while on the other hand it
    can also be used by expert users as reference for different machine learning algorithms.
    To get out of this book, you are requested to not mere read the book but to actually
    hand code all the examples provided in this book.


    In the end, I wish you best in your machine learning endeavors. I hope once you
    read this book, you have all the basic tools in your machine learning arsenal
    to solve any type of machine learning problem.'

    \n## 8- 评估算法\n\n一如既往，任何机器学习过程的最后一步都是评估训练好的算法的性能。如前所述，对于回归问题，性能是通过平均绝对误差、均方误差和均方根误差来评估的。以下脚本计算了我们算法的这些值：\n\

    # Handling Categorical Data


    We know machine learning algorithms are based on mathematical concepts and mathematics
    is all about numbers. Therefore, it is convenient to convert all the categorical
    values in our dataset to numeric values. If we look at the patients.csv we have
    two columns with categorical values: Gender and Diabetic.


    Luckily, in sklearn.preprocessing library we have LabelEncoder class which takes
    categorical column as input and returns corresponding numerical output. Take a
    look at the following script:


    ```

    from sklearn.preprocessing import LabelEncoder

    labelencoder_features = LabelEncoder()

    features[:,2]= labelencoder_features.fit_transform(features[:,2])

    ```


    Like Imputer class, *LabelEncoder* class has *fit_transform* method, which is
    basically a combination of *fit* and *transform* methods. The class takes categorical
    column as input and returns corresponding numeric values. In the script above
    we pass it Gender column i.e. the column at index 2 to the *LabelEncoder* class.
    After executing the script above if you check the values of Gender column, you

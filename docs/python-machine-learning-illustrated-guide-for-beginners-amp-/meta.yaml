    # Chapter 8


    # Support Vector Regression


    Support Vector Regression (SVR) is a type of Support Vector Machines (SVM) Algorithm
    and can be used for performing linear as well as non-linear regression. Introduced
    in 1960’s SVM is one of the most famous supervised machine learning algorithms.
    Before neural networks became common, SVM was said to be the most accurate machine
    learning algorithm.


    In this chapter we will briefly review the intuition behind SVM algorithm and
    how they actually work. Since we are in regression section, we will implement
    SVR algorithm using Python library to predict the price of a car based on the
    year. But first let’s study the theory behind SVM.


    # SVM Theory


    For typical linear regression in two dimensional feature space, the task is to
    find a straight line that successfully bisects the data points. However in real
    world, there can be multiple decision boundaries that can successfully classify
    the data points as shown in Fig1.


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_93_0.png)


    Fig1: Multiple boundaries


    However whether a new data point will be successfully classified or not depends
    upon the decision boundary chosen for classification.


    For instance take a look at Fig2. Suppose we have to classify new data point i.e.
    the Red Circle. If we have the decision boundary as in Fig2, the new data point
    will be classified as blue.


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_94_0.png)


    Fig2: New data point classified as blue


    On the other hand if we have the decision boundary as in Fig3, the new data point
    will be classified as yellow as shown below:


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_94_1.png)


    Fig3: New data point classified as yellow


    From Fig2 and it can be clearly seen that there can be multiple decision boundaries
    that successfully classify a dataset. However, not all of them are optimal. Given
    a new data point, different decision boundaries may classify data differently.


    The job of SVM algorithm is to find the decision boundary that classifies data
    in such a way that the chances of misclassification can be minimized. SVM algorithm
    does so by maximizing the distance between the closest data points from all the
    classes in the dataset.


    The SVM algorithm finds such a boundary with the help of support vectors, hence
    the name Support Vector Machines. Support vectors are the vectors that pass through
    the closest data points of the two classes to classify. The job is to maximize
    the distance between these two vectors. A line parallel to both these support
    vectors is drawn in the middle of these support vectors. This decision boundary
    is considered the most optimal decision boundary. The decision boundary found
    by Support Vector along with support vector machines looks like the one in Fig4.


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_95_0.png)


    Fig4: Decision boundary with Support Vectors


    Enough of the theory, now let''s see how we can use Support Vector regression
    which is a type of SVM to predict price of a car based on year it was manufactured.
    We will use Python''s Scikit Learn Library for that.


    # IMPLEMENTING SVR WITH PYTHON SCIKIT LEARN


    In this section we will use the dataset to predict the price of car (dependent
    variable) based on the year of manufacture (independent variable). You can find
    the dataset in the supplementary “Datasets” folder.


    ## 1- Importing Required Libraries



    # Linear Discriminant Analysis Theory


    LDA is a supervised dimensionality reduction technique which tries to select features
    based on their ability to distinguish the output. LDA relies on the output of
    the records as well. Where as in PCA, feature set is enough and labels are not
    required for feature reduction. As a first step in LDA, related data points are
    clustered together before being projected into a new dimension where the distance
    between each cluster is maximized. Similarly, the distance between each data points
    and its corresponding cluster centroid is minimized.'

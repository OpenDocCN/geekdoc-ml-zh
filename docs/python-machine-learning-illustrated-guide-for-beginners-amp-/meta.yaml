    \ 0],\n       [35, 35.0, 1],\n       [52, 32.0, 1],\n       [67, 26.0, 0],\n \
    \      [44, 27.0, 1],\n       [19, 22.0, 0],\n       [58, 89.0, 0],\n       [48,\
    \ 39.0, 1]], dtype=object)\n```\n\n类似地，标签向量也可以转换为数值集合，如下所示：\n\n```\nlabels = labelencoder_features.fit_transform(labels)\n\
    ```\n\n## 将数据划分为训练集和测试集\n\n在第一章中，我们讨论了机器学习模型是在数据集的子集上训练，并在数据集的另一个子集上测试的。这种训练集和测试集之间的划分是为了确保我们的机器学习算法不会*过拟合*。过拟合是指机器学习在训练数据上表现优异，但在测试数据上表现不佳的现象。一个好的机器学习模型是在训练数据和测试数据上都能给出良好结果的模型。这样我们可以说我们的模型已经从数据集中正确地学习了潜在的假设，并可以用于在任何新数据集上做出正确的决策。\n\
    \n*sklearn.model_selection* 库包含 *train_test_split* 类，可用于将数据划分为训练集和测试集。该类接受 features、labels\
    \ 和 *test_size* 作为参数。*test_size* 定义了测试集的大小。测试大小为 0.5 意味着将数据划分为 50% 的测试集和 50% 的训练集。以下脚本将数据划分为\
    \ 75% 的训练集和 25% 的测试集。\n\n```\nfrom sklearn.model_selection import train_test_split\n\
    train_features, test_features, train_labels, test_labels = train_test_split(features,\
    \ labels, test_size = 0.25, random_state = 0)\n```\n\n当你执行上面的脚本时，你会看到 *train_features*\
    \ 变量将包含一个 9 个特征的矩阵（12 的 75%），而 *train_labels* 将包含对应的 9 个标签。类似地，*test_features*\
    \ 将包含一个 3 个特征的矩阵（12 的 25%），而 *test_labels* 将包含对应的 3 个标签。"

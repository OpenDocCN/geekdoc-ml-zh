    \n# 第5章\n\n## 多项式回归\n\n在上一章中，我们学习了如何使用线性回归算法来找到最适合数据点的直线。然而，在现实世界中，数据并不总是线性相关的。例如，如果你看一下下图中的数据分布\n\

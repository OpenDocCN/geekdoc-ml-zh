  mdcn: "## 数据缩放\n\n在将数据输入机器学习算法之前，最后一个预处理步骤是特征缩放。我们需要缩放特征，因为在某些数据集中，不同特征的数值之间存在巨大差异。例如，如果我们添加患者数据集\
    \ `out patients.csv` 中的红细胞数量，该列的值将达到数十万，而年龄列的值可能非常小。许多机器学习模型使用欧几里得距离来计算数据点之间的距离。如果特征未经缩放，这些算法可能会偏向于具有较大数值的特征。\n\
    \n缩放特征有两种方法：\n标准化：\n和\n归一化：\n\n*sklearn.preprocessing* 库包含 *StandardScaler* 类，可用于实现特征的标准化。与其他预处理类一样，它包含\
    \ *fit_transform* 方法，该方法以数据集作为输入并返回缩放后的数据集。以下脚本对 *train_features* 和 *test_features*\
    \ 数据集都进行了缩放。\n\n```\nfrom sklearn.preprocessing import StandardScaler\nfeature_scaler\

    \ can be sometimes similar to the K-Means clustering; however the process of Hierarchical\
    \ Clustering is quite different. Hierarchical Clustering has two types: Divisive\
    \ and Agglomerative. In divisive clustering, the data points are initially treated\
    \ as one big cluster and a top-down approach is followed to divide this one big\
    \ cluster into several small clusters. On the other hand, Agglomerative clustering\
    \ involves a bottom-up approach. In this chapter, we will cover Agglomerative\
    \ clustering since it is the most commonly used clustering type.\n\n### Hierarchical\

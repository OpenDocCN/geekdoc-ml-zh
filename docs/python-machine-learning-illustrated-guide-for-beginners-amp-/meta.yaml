    \nAlso, you can find all scripts used in the book within this link below:\n[https://drive.google.com/file/d/1qn9G-W7v2mXcTSxk9ejbqiHjD_pxat1U/view?usp=sharing](https://drive.google.com/file/d/1qn9G-W7v2mXcTSxk9ejbqiHjD_pxat1U/view?usp=sharing)\n\
    \n# Introduction\n\nMachine learning is one of the hottest buzz words around.\
    \ With the advancement in high computing hardware and availability of thousands\
    \ of terabytes of data, more and more companies and research organizations are\
    \ using machine learning to build intelligent machines that can perform a variety\
    \ of tasks and can help humans make better decisions.\n\nThis book contains a\
    \ detailed overview of all the latest concepts in machine learning. Each chapter\
    \ in this book is dedicated to one machine learning algorithm. Each chapter begins\
    \ with the brief theory of the algorithm followed by implementation of the algorithm\
    \ in Python’s Scikit learn library.\n\nThe book is aimed towards novice as well\
    \ as expert users. On one hand it can be used as a handbook of machine learning\
    \ for the beginners, while on the other hand it can also be used by expert users\
    \ as a reference for different machine learning algorithms. To get the most out\
    \ of this book, you are requested to not merely read the book but to actually\
    \ hand code all the examples provided in this book.\n\nIn the end, I wish you\
    \ the best in your machine learning endeavors. I hope once you read this book,\
    \ you have all the basic tools in your machine learning arsenal to solve any type\
    \ of machine learning problem.\n\n# Chapter 1\n\n# Introduction to machine Learning\n\
    \nMachine learning is a branch of Artificial Intelligence that deals with learning\
    \ implicitly from data using various statistical techniques. Unlike traditional\
    \ computer programs where all the application logic is explicitly programmed,\
    \ machine learning applications learn implicitly from the data without being explicitly\
    \ programmed. The idea behind machine learning is that instead of hard coded logic,\
    \ a large amount of data is fed into the application. It is then the responsibility\
    \ of the application to learn from that data and make decisions.\n\n# Definition\n\
    \nThe first definition of machine learning was coined by [Arthur Samuel](https://en.wikipedia.org/wiki/Arthur_Samuel)\
    \ back in 1959. He defined machine learning as:\n\n> \"The field of study that\
    \ enables computers to learn without being explicitly programmed.\"\n\n[Tom Mitchell](https://en.wikipedia.org/wiki/Tom_M._Mitchell)\
    \ from Carnegie Mellon University defined machine learning in mathematically understandable\
    \ terms in 1997. He said:\n\n> \"A computer program is said to learn from experience\
    \ E with respect to some task T and some performance measure P, if its performance\
    \ on T, as measured by P, improves with experience E.\"\n\nThe definition provided\
    \ by Tom Mitchell is widely regarded as the most precise yet clear definition\
    \ of machine learning. Now we know what machine learning is, but a question still\
    \ remains: how do machines learn and what is their inner working? The next section\
    \ will answer this question:\n\n# How Machines Learn?\n\nBefore dwelling into\
    \ the details of machine learning, let us first recapitulate how humans learn.\
    \ For instance, how do we humans know that we should not touch a heating plate\
    \ when it is on with bare hands? How do we know that it can cause burns? Well,\
    \ there can be two possibilities: Either we have been burned in the past by a\
    \ heating stove or we have been taught by elders not to touch the heating plate.\
    \ In both cases we have had some experience in the past that stops us from touching\
    \ a heating plate when it is on. In other words, we had some past information,\
    \ on the basis of which we make future decisions.\n\nMachine learns in a similar\
    \ way. In the beginning they have no knowledge. They are just like a newborn child\
    \ with zero knowledge. To make machines learn, information is passed to these\
    \ machines. From this information, machines identify patterns using various statistical\
    \ techniques. Once machines learn to identify patterns from the data for making\
    \ decisions, they can be used to make decisions on unseen data.\n\nWorkflow of\
    \ a typical learning process of a machine learning model is shown in the following\
    \ figure:"

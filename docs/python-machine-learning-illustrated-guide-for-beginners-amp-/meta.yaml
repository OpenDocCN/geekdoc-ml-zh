    \nOur dataset is in CSV (Comma Separated Values) format. The *pandas* library\
    \ contains *read_csv* function that takes the path to the CSV formatted dataset\
    \ as parameter and loads the dataset into *pandas dataframe* which is basically\
    \ an object that stores dataset in the form of columns and rows.\n\nExecute the\
    \ following script (below the script that loads the libraries) to load the patients.csv\
    \ dataset to the application.\n\n```\npatient_data = pd.read_csv(\"D:/Datasets/patients.csv\"\
    )\n```\n\nThe script above loads the patients.csv dataset in the Datasets folder\
    \ of the D drive to **patients_data dataframe.**\n\nIf you are using *Jupyter*\
    \ notebook, simply execute the following script to see how your data looks:\n\n\
    ```\npatient_data.head()\n```\n\nOn the other hand, if you are using go to Variable\
    \ explorer and double click *patient_data* variable from the list of variables\
    \ as shown below:\n\n![](img/ad33dc2a5dce297b964e4e76b53c2309_37_0.png)\n\nOnce\
    \ you click the *patient_data* variable, you will see the details of the patients.csv\
    \ dataset as shown in the figure below:\n\n![](img/ad33dc2a5dce297b964e4e76b53c2309_38_0.png)\n\
    \nYou can see that a *pandas dataframe* looks like a matrix with zero based index.\n\
    \nOnce we have loaded the dataset, the next step is to divide the dataset into\
    \ a matrix of features and vector of dependent variables. Feature set consists\
    \ of all the independent variables. For instance the feature matrix for the patients.csv\
    \ dataset will contain Age, BMI and Gender columns. The size of the feature matrix\
    \ is equal to the number of independent variables by the number of records. In\
    \ this case the feature matrix will be of size 3 x 12 since there are three independent\
    \ variable and 12 records.\n\nLet's first create a feature features. You can give\
    \ any name to the feature matrix but conventionally in machine learning community,\
    \ feature matrix is denoted by capital X. However for the sake of readability\
    \ we will name it *features* Execute the following script:\n\n```\nfeatures= patient_data.iloc[:,0:3].values\n\
    ```\n\nIn the script above we use the *iloc* function of the *dataframe* to select\
    \ all the rows and the first three columns from the *patient_data* dataframe.\
    \ The iloc function takes two parameters.\n\nThe first is the range of rows to\
    \ select and the second is the range of columns to select. We only specified colon\
    \ as first parameter which means that filter all the rows from the dataset. In\
    \ the second parameter after the comma we specified a range of columns i.e. column\
    \ 0 to 3. This returns columns 0, 1 and 2. Remember the *iloc* returns one less\
    \ than the upper range of column. The 0, 1 and 2 columns mean Age, BMI and Gender\
    \ since python follows zero based index. Therefore Age is considered column.\n\
    \nIf now you print the features in the console window, you will see following\
    \ result:\n\n```\narray([[25, 25.0, 'Male'],\n       [55, 31.0, 'Female'],\n \
    \      [40, 28.0, 'Male'],\n       [61, 24.0, 'Male'],\n       [24, nan, 'Female'],\n\
    \       [35, 35.0, 'Male'],\n       [52, 32.0, 'Male'],\n       [67, 26.0, 'Female'],\n\
    \       [44, 27.0, 'Male'],\n       [19, 22.0, 'Female'],\n       [58, 89.0, 'Female'],\n\
    \       [48, 39.0, 'Male']], dtype=object)\n```\n\nYou can see it is a two dimensional\
    \ array of feature set.\n\nSimilarly, to create a label vector, execute the following\
    \ script:\n`labels= patient_data.iloc[:,3].values`\n\nNow we have our feature\
    \ matrix as well as label vector. The next step is to handle the missing values\
    \ (if any) in the dataset.\n\n## Handling Missing Values\n\nIf you look at the\
    \ patient_data object you will see that the record at index 4 has missing value\
    \ for BMI column. To handle missing values, the simplest approach is to remove\
    \ the record with missing values. However, sometimes a record contains crucial\
    \ information and should not be removed just because one column has a missing\
    \ value.\n\nAnother approach to deal with missing values is to replace missing\
    \ value with some value. Missing values can be replaced by mean or median of all\
    \ the values in the column.\n\nTo handle the missing values we will use the *Imputer*\
    \ class of the *sklearn.preprocessing* library. Take a look at the following script.\n\
    \n```\nfrom sklearn.preprocessing import Imputer\nimputer = Imputer(missing_values=\"\
    NaN\", strategy=\"mean\", axis=0)\nimputer = imputer.fit(features[:,1:2])\nfeatures[:,1:2]\
    \ = imputer.transform(features[:,1:2])\n```\n\nIn the script above, the first\
    \ line imports the *Imputer* class from *sklearn.preprocessing* library. Next\
    \ we create object of the Imputer class. Imputer class constructor takes three\
    \ parameters: *strategy* and The *missing_value* parameter specifies the value\
    \ that is required to be replaced. In our dataset, missing values have been denoted\
    \ by “nan”, therefore we specified “NaN” for *missing_value* parameter. Strategy\
    \ parameter specifies the type of strategy we want to use to fill missing value,\
    \ it can have *mean*, and *most_frequent* values. Finally, the *axis* parameter\
    \ denotes the axis along which we want to imputate. The *axis 0* specifies the\
    \ column axis whereas *axis 1* specifies the row axis.\n\nNext we execute *fit*\
    \ method of the Imputer class. This method takes the column that we want to handle\
    \ missing values for, as input. Finally we execute *transform* function which\
    \ actually fills missing values in column 1 by the mean of the column. When you\
    \ execute the script above you will see that that the record at index 4 that previously\
    \ had missing value for column 1 i.e. BMI, now contains the mean of all the values\
    \ in the BMI column. This is shown in the following screenshot:\n\n```\narray([[25,\
    \ 25.0, 'Male'],\n       [55, 31.0, 'Female'],\n       [40, 28.0, 'Male'],\n \
    \      [61, 24.0, 'Male'],\n       [24, 34.36363636363637, 'Female'],\n      \
    \ [35, 35.0, 'Male'],\n       [52, 32.0, 'Male'],\n       [67, 26.0, 'Female'],\n\
    \       [44, 27.0, 'Male'],\n       [19, 22.0, 'Female'],\n       [58, 89.0, 'Female'],\n\
    \       [48, 39.0, 'Male']], dtype=object)\n```\n\n## Handling Categorical Data\n\
    \nWe know machine learning algorithms are based on mathematical concepts and mathematics\
    \ is all about numbers. Therefore, it is convenient to convert all the categorical\
    \ values in our dataset to numeric values. If we look at the patients.csv we have\
    \ two columns with categorical values: Gender and Diabetic.\n\nLuckily, in sklearn.preprocessing\
    \ library we have LabelEncoder class which takes categorical column as input and\
    \ returns corresponding numerical output. Take a look at the following script:\n\
    \n```\nfrom sklearn.preprocessing import LabelEncoder\nlabelencoder_features =\
    \ LabelEncoder()\nfeatures[:,2]= labelencoder_features.fit_transform(features[:,2])\n\
    ```\n\nLike Imputer class, *LabelEncoder* class has *fit_transform* method, which\
    \ is basically a combination of *fit* and *transform* methods. The class takes\
    \ categorical column as input and returns corresponding numeric values. In the\
    \ script above we pass it Gender column i.e. the column at index 2 to the *LabelEncoder*\
    \ class. After executing the script above if you check the values of Gender column,\
    \ you will see ones and zeros in place of Male and Female as shown below:\n\n\
    ```\narray([[25, 25.0, 1],\n       [55, 31.0, 0],\n       [40, 28.0, 1],\n   \
    \    [61, 24.0, 1],\n       [24, 34.36363636363637, 0],\n       [35, 35.0, 1],\n\
    \       [52, 32.0, 1],\n       [67, 26.0, 0],\n       [44, 27.0, 1],\n       [19,\
    \ 22.0, 0],\n       [58, 89.0, 0],\n       [48, 39.0, 1]], dtype=object)\n```\n\
    \nSimilarly, the labels vector can also be converted into set of numeric values\
    \ as follows:\n\n```\nlabels = labelencoder_features.fit_transform(labels)\n```\n\
    \n## Dividing data into training and tests sets\n\nIn the first chapter we discussed\
    \ that machine learning models are trained on subset of dataset and tested on\
    \ another subset of the dataset. This splitting between the training and test\
    \ set is done to ensure that our machine learning algorithm doesn't *Overfitting*\
    \ refers to the phenomena where machine learning performs excellent results on\
    \ training data but poor results on test data. A good machine learning model is\
    \ the one that gives good result on both training and test data. That way we can\
    \ say that our model has correctly learned the underlying assumptions from the\
    \ dataset and can be used to correctly make decisions on any new dataset.\n\n\
    The *sklearn.model_selection* library contains *train_test_split* class that can\
    \ be used to divide data into train and test sets. The class accepts features,\
    \ labels and *test_size* as parameters. The *test_size* defines the size of the\
    \ test set. Test size of 0.5 means split the data into 50% of test size and 50%\
    \ of training size. The following script divides the data into 75% train size\
    \ and 25% test size.\n\n```\nfrom sklearn.model_selection import train_test_split\n\
    train_features, test_features, train_labels, test_labels = train_test_split(features,\
    \ labels, test_size = 0.25, random_state = 0)\n```\n\nWhen you execute the above\
    \ script you will see that *train_features* variable will contain matrix of 9\
    \ features (75% of 12) while *train_labels* will contain corresponding 9 labels.\
    \ Similarly *test_features* will contain a matrix of 3 features (25% of 12) while\
    \ *test_labels* will contain corresponding 3 labels."

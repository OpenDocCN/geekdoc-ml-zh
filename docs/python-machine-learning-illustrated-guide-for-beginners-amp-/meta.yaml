    # Theory of Naïve Bayes (NB) Algorithm


    Naïve Bayes algorithm is a supervised machine learning algorithm based on Bayes’s
    Theorem. NB algorithm is based on principle of feature independence which states
    that features within a dataset have no relation to each other. For instance a
    fruit may be considered as banana if it is 5 or more inches long, yellow in color
    and 1 cm in diameter. Naïve Bayes have no concern if these features depend on
    each other. The fruit is declared as a banana via independent contribution of
    these features. Due to this independence assumption, NB algorithm is called Naïve.


    Naïve Bayes algorithm is the simplest of all the machine learning algorithms and
    yet very powerful.


    Mathematically Bayes theorem can be represented as:


    ```

    P(A|B) = \frac{P(B|A) \cdot P(A)}{P(B)}

    ```


    The aforementioned terms are explained as follows:


    +   1- P(A|B) is the probability that event A will occur given attribute set B

    2- P(A) is the prior probability of the occurrence of event A

    3- P(B|A) is the probability of attribute set if the event A occurs

    4- P(B) is the prior probability of the occurrence of predictors


    Let’s understand this concept with the help of an example.

    Suppose we have weight profile of 12 individuals and based on that we want to
    predict whether or not the patients are diabetic.

    The record set looks like this:'

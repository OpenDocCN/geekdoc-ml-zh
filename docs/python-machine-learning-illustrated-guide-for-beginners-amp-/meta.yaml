  - '[PAGE 49]


    # Theory of Linear Regression


    In simple words, linear regression is an approach that identifies relationship
    between two or more than two variables.

    Mathematical, linear regression finds a linear function that maps independent
    variables to dependent variables. If this function is plotted on 2-D space, it
    results in a straight line.

    Consider a scenario where we want to find relationship between the price of cars
    and the year of manufacture. If we plot the year on x-axis and price on y-axis,
    linear regression algorithm will find a straight line that best fits the data
    points. This is shown in the figure below:


    ![](img/ad33dc2a5dce297b964e4e76b53c2309_49_0.png)


    We know that straight line can be represented as:

    $$B= AX1 + C$$

    Here b is the dependent variable, $a$ is the slope of the line, $x$ is the independent
    variable and c is the y intercept.

    If we look at the equation we can see that b and x remain constant since they
    are the data variables. Therefore, linear regression algorithm gives us the slope
    and the intercept that best result in line which best fits the dataset.'
  - '[PAGE 50]


    This concept can be extended to more than one independent variable. The equation
    for linear regression function will then be represented as:


    ```

    B = A1X1 + A2X2 + A3X3 + ....... ANXN + C

    ```


    Here is n is the total number of independent variables. This equation basically
    represents a hyper plane with n-dimension. It is important to mention that in
    two-dimensions linear regression model can be represented as a straight line.
    In three dimensions, it is represented in the form of plane and in more than three
    dimensions; it is represented as hyper plane.


    Enough of the theory, let’s implement linear regression with the help of Python’s
    Scikit learn library.'
  - '[PAGE 51]



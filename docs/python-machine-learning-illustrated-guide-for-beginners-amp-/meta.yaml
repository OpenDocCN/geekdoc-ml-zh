    # Chapter 9


    ## Naïve Bayes Algorithm for Classification


    In the previous we covered some of the most commonly used algorithms for regression
    e.g. Linear Regression, Support Vector Regression, Polynomial Regression, Decision
    Trees and Random Forest algorithms. Some of these algorithms have variants that
    can be used for classification as well which we will see in the upcoming chapters.
    In this chapter we will start our discussion about classification algorithms i.e.
    Algorithms used to predict discrete value, or a class label for input data. The
    first classification algorithm that we are going to cover in this section is the
    Naïve Bayes Algorithm.


    ## Theory of Naïve Bayes (NB) Algorithm


    Naïve Bayes algorithm is a supervised machine learning algorithm based on Bayes’s
    Theorem. NB algorithm is based on principle of feature independence which states
    that features within a dataset have no relation to each other. For instance a
    fruit may be considered as banana if it is 5 or more inches long, yellow in color
    and 1 cm in diameter. Naïve Bayes have no concern if these features depend on
    each other. The fruit is declared as a banana via independent contribution of
    these features. Due to this independence assumption, NB algorithm is called Naïve.


    Naïve Bayes algorithm is the simplest of all the machine learning algorithms and
    yet very powerful.


    Mathematically Bayes theorem can be represented as:


    ```

    P(A|B) = \frac{P(B|A) \cdot P(A)}{P(B)}

    ```


    The aforementioned terms are explained as follows:


    - 1- P(A|B) is the probability that event A will occur given attribute set B

    - 2- P(A) is the prior probability of the occurrence of event A

    - 3- P(B|A) is the probability of attribute set if the event A occurs

    - 4- P(B) is the prior probability of the occurrence of predictors


    Let’s understand this concept with the help of an example.

    Suppose we have weight profile of 12 individuals and based on that we want to
    predict whether or not the patients are diabetic.

    The record set looks like this:


    There are three steps involved in manually implementing the NB algorithm.


    - 1- Create a frequency table for the data as shown below:


    ## 2- Calculate the Class/Event Prior Probability and Attribute Prior Probability


    No let’s calculate the prior probability of the events:

    P(A) when Diabetic (Yes) = 4/12 = 0.33

    P(A) when Diabetic (No) = 8/12 = 0.67

    Finally let’s find the prior probability of the features:

    P(B) when Overweight = 4/12 = 0.33

    P(B) when Normal= 4/12 = 0.33

    P(B) when Underweight = 4/12 = 0.33


    3- Now if a new patient comes, we have to find whether he is diabetic depending
    upon his weight. There can be two outcomes: diabetic or not. We will find probabilities
    for both. The class that results in higher probability will be assigned to the
    patient.


    Suppose an overweight patient arrives to the clinic and we have to test him for
    diabetes. We need to solve two equations:


    a) P(Yes|Overweight) = P(Overweight|Yes) x P(Yes) / P(Overweight)


    = (0.75 x 0.33) / 0.33


    = 0.75


    b) P(No|Overweight) = P(Overweight|No) x P(No) / P(Overweight)


    = (0.125 x 0.67) / 0.33


    = 0.25


    You can see that probability of being diabetic when overweight is 0.75 which is
    greater than probability of not being diabetic which is 0.25, therefore NB algorithm
    will classify this patient as diabetic.


    In the above case there was only one attribute, in case of multiple attributes,
    the probability can be calculated as:


    P(A|B) = P(B1|A) x P(B2|A) x P(B3|A) ....... P(BN|A) x P (A)


    ## Advantages of Naïve Bayes Algorithm


    NB algorithm is very simple and fast to train since no complex mathematics and
    error correction or back propagations is involved.

    NB algorithms outperform most of the other algorithms in case of categorical data.
    For numeric features, NB algorithm assumes normal distribution.


    ## Disadvantages of Naïve Bayes Algorithm


    In real world data, features are mostly dependent on other features. The independence
    assumption of NB algorithm makes it a bad predictor for datasets with interdependent
    features. If a categorical feature has such a value in test set which was not
    seen in the training set, the NB algorithm will assign zero probability to such
    instance. Therefore, it is very important to cross validate results obtained using
    NB algorithm.


    ## Naïve Bayes Algorithm Applications


    NB algorithm is ideal for multi-class problems and is commonly employed for text
    classification problems such as sentimental analysis and email spam filtering.

    NB algorithm is also widely used in combination of collaborative filtering algorithms
    for building machine learning based recommender systems.

    NB is extremely fast compared to other advanced algorithms and is therefore incorporated
    in real time applications.



    layer with 3 units to it. We also specify the input shape as (2, 1) since our
    input data has 2 time steps and 1 feature. Then we compile the model by specifying
    the optimizer as ''adam'' and the loss function as ''mse'' (mean squared error).


    Next, we fit the model to the data by passing in the input data X and the target
    data y. The input data X has the shape (2, 2, 1) which means it has 2 samples,
    2 time steps, and 1 feature. The target data y has the same shape. We specify
    the number of epochs as 100.


    In this example, the RNN will learn to predict the next value in a sequence given

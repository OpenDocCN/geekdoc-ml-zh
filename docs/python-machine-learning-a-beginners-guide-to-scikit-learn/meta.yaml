    example:


    ```

    from functools **import** reduce


    numbers = [1, 2, 3, 4, 5]


    product = reduce(**lambda** x, y: x * y, numbers)


    **print**(product)

    ```


    THIS WILL OUTPUT 120.


    In conclusion, Python provides a variety of built-in functions that make it easy
    to manipulate lists. The **len()**, **sort()**, **sorted()**, **filter()**, **map()**
    and **reduce()** functions are commonly used for tasks such as determining the

    \ regression\nX, y = make_regression(n_features=4, random_state=0)\n\n# Fit a\
    \ random forest model\nrf = RandomForestRegressor(random_state=0)\nrf.fit(X, y)\n\
    \n# Initialize an empty dictionary to store the permutation importances\nperm_importances\
    \ = {}\n\n# Iterate over each feature\nfor feature in range(X.shape[1]):\n   \
    \ # Shuffle the values of the feature\n    X_shuffled = X.copy()\n    X_shuffled[:,\
    \ feature] = np.random.permutation(X_shuffled[:, feature])\n    # Compute the\
    \ model's performance on the shuffled dataset\n    y_pred = rf.predict(X_shuffled)\n\
    \    score = mean_squared_error(y, y_pred)\n```"

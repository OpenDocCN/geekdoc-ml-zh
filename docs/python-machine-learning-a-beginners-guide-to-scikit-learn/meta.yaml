    # Syntax of Python


    THE SYNTAX OF PYTHON is designed to be easy to read and understand, with a focus
    on readability and simplicity. Python uses **indentation** to indicate code blocks,
    rather than curly braces or keywords like "begin" and "end." This makes the code
    more organized and easy to read. Python also uses a simple, consistent syntax
    for basic operations like assignment and comparison. For example, the assignment
    operator is the single equal sign (=), and the comparison operator is the double
    equal sign (==).


    # Comments in Python


    COMMENTS IN PYTHON are used to add notes and explanations to your code, making
    it easier to understand and maintain. They are ignored by the interpreter and
    do not affect the execution of the program.'

    # 4.2 LOGISTIC REGRESSION


    Logistic regression is a type of supervised machine learning algorithm used for
    classification tasks. It is used to predict the probability of an outcome belonging
    to a particular class. The goal of logistic regression is to find the best fitting
    model to describe the relationship between the independent variables and the dependent
    variable, which is binary in nature (0/1, true/false, yes/no).


    The logistic regression model is an extension of the linear regression model,
    with the main difference being that the outcome variable is dichotomous, and the
    linear equation is transformed using the logistic function, also known as the
    sigmoid function. The logistic function produces an S-shaped curve, which allows
    the model to predict the probability of the outcome belonging to one class or
    the other. The difference between linear and logistic regression can be seen visually
    below:'
  - '[PAGE 253]


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_253_0.png)


    The logistic regression model estimates the probability that a given input belongs
    to a particular class, using a probability threshold. If the predicted probability
    is greater than the threshold, the input is classified as belonging to the class.
    Otherwise, it is classified as not belonging to the class.


    One of the main advantages of logistic regression is that it is easy to implement
    and interpret. It also does not require a large sample size, and it is robust
    to noise and outliers. However, it can be prone to overfitting if the number of
    independent variables is large compared to the number of observations. Logistic
    regression is used in various fields such as healthcare, marketing, and social
    sciences to predict the likelihood of a certain event happening.



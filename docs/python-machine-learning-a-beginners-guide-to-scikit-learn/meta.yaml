  mdcn: '单变量分析中的描述性统计可以分为两大类：集中趋势度量和离散程度度量。


    ## 集中趋势度量


    集中趋势度量用于描述分布的典型值或中心值。最常见的集中趋势度量包括：


    1.  **均值**：它是数据集中所有观测值的总和除以观测值的总数。

    2.  **中位数**：它是数据集中的中间值。当数据集有偶数个观测值时，中位数是两个中间值的平均值。

    3.  **众数**：它是数据集中出现频率最高的值。


    ## 离散程度度量


    离散程度度量用于描述数据的分布或分散程度。最常见的离散程度度量包括：


    1.  **极差**：它是数据集中最大值和最小值之间的差。

    2.  **方差**：它是每个值与均值之差的平方的平均值。

    3.  **标准差**：它是方差的平方根，用于描述数据围绕均值的分布情况。


    其他离散程度度量包括百分位数，用于描述数据在整个范围内的分布情况。


    描述性统计可以使用不同类型的图形表示来呈现，例如直方图、箱线图和散点图。这些可视化有助于识别数据中的模式和异常值。


    单变量分析的一个常见示例是使用 Pandas 库计算数据集的描述性统计。以下是如何对数据集 "data" 中的变量 "Age" 进行单变量分析的示例：


    ```python

    import pandas as pd


    # Import the data

    data = pd.read_csv("example_data.csv")


    # Extract the variable "Age"

    age = data["AGE"]


    # Calculate descriptive statistics

    print("Mean: ", age.mean())

    print("Median: ", age.median())

    print("Mode: ", age.mode())

    print("Standard Deviation: ", age.std())

    print("Minimum Value: ", age.min())

    print("Maximum Value: ", age.max())

    ```


    在此示例中，第一行导入 Pandas 库并为其分配别名 "pd"。第二行使用 Pandas 提供的 "read_csv" 函数从 "example_data.csv"
    文件导入数据，并将其存储在名为 "data" 的变量中。


    第三行使用方括号表示法从数据框中提取变量 "AGE"，并将其存储在名为 "age" 的变量中。


    第四行使用 mean() 函数计算变量 "Age" 的均值，使用 median() 函数计算变量的中位数，使用 mode() 函数计算变量的众数，使用 std()
    函数计算变量的标准差，使用 min() 函数计算变量的最小值，使用 max() 函数计算变量的最大值。


    描述性统计的结果可用于理解变量 "Age" 的分布情况，例如，如果均值接近中位数，则表明该变量呈正态分布；如果均值和中位数相差较大，则表明该变量呈偏态分布。标准差也可用于理解变量的离散程度，其中较低的标准差表明变量紧密分布在均值周围，而较高的标准差表明变量广泛分布在均值周围。


    在此示例中，我们展示了如何使用 Pandas 库进行单变量分析，特别是计算变量的描述性统计。这只是可用于执行单变量分析的众多技术之一，不同的方法可能根据数据的特性而更有效。


    总之，单变量分析中的描述性统计对于总结和描述单个变量的属性至关重要。这些统计提供了对数据分布的宝贵见解，并有助于识别任何模式或异常值。数据分析师和数据科学家使用这些度量来对数据做出明智的决策，并构建用于数据预测和预报的模型。


    ## 直方图


    直方图是数值数据分布的图形表示。它们显示落在特定范围或区间内的值的频率或比例。在单变量分析中，直方图用于可视化单个变量的分布。


    例如，假设我们有一个包含一组人身高数据的数据集。我们可以创建一个直方图来可视化这些身高的分布。直方图将显示每个区间内身高的人的频率或比例。


    要在 Python 中创建直方图，我们可以使用 Matplotlib 库。以下是一个示例代码片段：


    ```python

    import matplotlib.pyplot as plt

    import numpy as np


    # Generate some random data

    data = np.random.normal(size=1000)


    # Create histogram

    plt.hist(data, bins=30, alpha=0.5, color=''b'')


    # Add labels and title

    plt.xlabel(''Height'')

    plt.ylabel(''Frequency'')

    plt.title(''Distribution of Heights'')


    # Show plot

    plt.show()

    ```


    输出如下所示：


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_173_0.png)


    在此示例中，我们首先使用 NumPy 库生成一些随机数据。然后，我们使用 **plt.hist()** 函数创建直方图，指定要使用的区间数量、条形的透明度和颜色以及其他属性。然后，我们为图表添加标签和标题，并使用
    **plt.show()** 显示它。


    生成的直方图将显示数据中身高的分布，其中 x 轴显示身高范围，y 轴显示该范围内身高的人的频率或比例。


    直方图是单变量分析中的有用工具，因为它们允许我们快速可视化变量的分布，并识别数据中的模式或异常值。


    ## 箱线图


    在统计学中，单变量分析涉及对单个变量的检查。可视化总结单个变量分布的一种方法是通过箱线图。箱线图，也称为箱须图，显示数据的中位数、四分位数和范围的摘要。该图有助于识别异常值和比较不同数据集的分布。


    要构建箱线图，你需要最小值、下四分位数（Q1）、中位数、上四分位数（Q3）和最大值。四分位距（IQR）是上四分位数和下四分位数之间的距离。箱体代表 IQR，中位数显示为箱体内的线。须线从箱体延伸到最小值和最大值，不包括异常值。


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_175_0.png)


    以下是考试成绩数据集的箱线图示例：


    数据集：40, 60, 70, 75, 80, 85, 90, 95, 100


    最小值：40


    下四分位数（Q1）：70


    中位数：80


    上四分位数（Q3）：90


    最大值：100


    IQR：Q3 - Q1 = 20


    ```

    40 60 70 75 80 85 90 95 100

    |___| |___|

    Q1 Median Q3

    ```


    须线：40 和 100


    异常值：无


    在此示例中，数据集的最小值为 40，下四分位数为 70，中位数为 80，上四分位数为 90，最大值为 100。IQR 计算为 20。箱线图显示大部分数据落在
    70 到 90 之间，有两个分数在此范围之外（75 和 100）。


    箱线图也可用于比较多个数据集。对于多个数据集，每个箱线图并排绘制，便于直观比较它们的中位数、IQR 和范围。这种比较有助于识别数据分布的差异。


    以下是使用 Matplotlib 库在 Python 中创建箱线图的示例：


    ```python

    import matplotlib.pyplot as plt

    import numpy as np


    # generate some random data

    data = np.random.normal(size=100)


    # create a box plot of the data

    fig, ax = plt.subplots()

    ax.boxplot(data)


    # set the title and labels

    ax.set_title(''Box Plot of Random Data'')

    ax.set_ylabel(''Values'')


    # show the plot

    plt.show()

    ```


    输出将如下所示：


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_177_0.png)'

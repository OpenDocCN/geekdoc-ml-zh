- img_proc: true
  md: '![](img/a86802873e5d6145f81c2d3a0cf0e53d_358_0.png)


    IN THIS EXAMPLE, WE first generate a random dataset with 100 normal samples and
    20 anomalous samples. We then fit an Isolation Forest model to the dataset with
    a contamination rate of 0.1, which specifies the proportion of anomalies we expect
    to have in the dataset. The model is then used to predict the anomalies, and we
    plot the dataset and the predicted anomalies with red dots.


    The Isolation Forest algorithm works by constructing isolation trees for the dataset,
    which are binary trees that randomly select a feature and split the data along
    a randomly selected value for that feature. Anomalies are typically found to have
    shorter path lengths from the root node to the leaf nodes, since they are isolated
    more easily than normal points. The Isolation Forest algorithm takes advantage
    of this property to detect anomalies.'

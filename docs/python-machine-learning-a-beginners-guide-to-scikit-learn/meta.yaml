    # # 4 SUPERVISED LEARNING


    Supervised learning is a type of machine learning where the model is trained on
    labeled data to make predictions on new, unseen data. In supervised learning,
    the goal is to learn mapping from input features to output labels. The input features
    are often represented as a set of numerical or categorical values, while the output
    labels can be either continuous or discrete values. In this chapter, we will delve
    into the different types of supervised learning algorithms, and explore how to
    use scikit-learn to train, evaluate and improve models for different types of
    problems. We will cover topics such as linear and logistic regression, decision
    trees, and support vector machines, among others, as well as techniques for handling
    overfitting, underfitting, and improving model performance.'
- md: '## 4.1 LINEAR REGRESSION


    Linear regression is a supervised learning algorithm used for modeling the linear
    relationship between a dependent variable and one or more independent variables.
    The goal of linear regression is to find the best-fitting straight line through
    the data points. Linear regression can be used for both simple and multiple regression
    analysis.


    ### Simple Linear Regression


    In simple linear regression, there is only one independent variable and the line
    of best fit is represented by the equation:


    y = mx + b


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_239_0.png)


    Where y is the dependent variable, x is the independent variable, m is the slope
    of the line, and b is the y-intercept. The slope of the line represents the relationship
    between x and y, while the y-intercept represents the point at which the line
    crosses the y-axis.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_240_0.png)


    ### Multiple Linear Regression


    In multiple linear regression, there are two or more independent variables, and
    the line of best fit is represented by the equation:


    y = b0 + b1x1 + b2x2 + ... + bnxn


    Where y is the dependent variable, x1, x2, ..., xn are the independent variables,
    and b0, b1, b2, ..., bn are the coefficients of the line. Each coefficient represents
    the change in the dependent variable for a one-unit change in the corresponding
    independent variable, holding all other independent variables constant.


    Linear regression can be used for both continuous and categorical dependent variables,
    but the independent variables must be continuous. The method of least squares
    is used to find the coefficients of the line of best fit, which minimize the sum
    of the squared differences between the predicted and actual values.


    Scikit-learn library in Python provides an easy implementation of linear regression
    via the LinearRegression class. The class provides several methods for model fitting
    and prediction such as **fit()**, **predict()**, **score()** etc. Linear regression
    can be used for various real-world problems such as predicting housing prices,
    stock prices, and many more.


    Here''s a coding example to illustrate linear regression using scikit-learn library
    and a randomly generated dataset:


    ```python

    # Import required libraries

    import numpy as np

    from sklearn.linear_model import LinearRegression

    from sklearn.model_selection import train_test_split


    # Generate random dataset

    np.random.seed(123)

    num_samples = 100

    x1 = np.random.normal(10, 2, num_samples) # Independent variable 1 (age)

    x2 = np.random.normal(5, 1, num_samples) # Independent variable 2 (income)

    y = 2*x1 + 3*x2 + np.random.normal(0, 1, num_samples) # Dependent variable (savings)


    # Reshape independent variables

    X = np.column_stack((x1, x2))


    # Split dataset into train and test sets

    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2, random_state=123)


    # Create a Linear Regression model

    model = LinearRegression()


    # Fit the model on training data

    model.fit(X_train, y_train)


    # Predict the savings using the test set

    y_pred = model.predict(X_test)


    # Print model coefficients and intercept

    print(''Coefficients:'', model.coef_)

    print(''Intercept:'', model.intercept_)


    # Print model performance metrics

    from sklearn.metrics import mean_squared_error, r2_score

    print(''Mean squared error: %.2f'' % mean_squared_error(y_test, y_pred))

    print(''R2 score: %.2f'' % r2_score(y_test, y_pred))

    ```


    The output will look like this:


    Coefficients: [2.00633802 3.0088422 ]

    Intercept: -0.19265156903176717

    Mean squared error: 0.85

    R2 score: 0.95


    In this example, we are generating a random dataset with 2 independent variables
    and 1 dependent variable. The independent variables are age and income, and the
    dependent variable is savings. We are assuming that savings is a linear combination
    of age and income, with some added noise.


    We are using the **numpy** library to generate the random dataset, and the **LinearRegression**
    class from the **sklearn.linear_model** module to create a linear regression model.


    We are then splitting the dataset into a training set and a test set using the
    **train_test_split** function from the **sklearn.model_selection** module.


    We are fitting the linear regression model on the training data using the **fit**
    method, and using the **predict** method to predict the savings for the test set.


    We are then printing the model coefficients and intercept, and evaluating the
    model performance using the mean squared error and R2 score metrics from the **sklearn.metrics**
    module.


    Note that we have used meaningful and realistic variable names to make the example
    easier to understand. We have also added a test-train split to evaluate the model''s
    performance on unseen data.


    After going through above example, you may have question that What is Mean Squared
    Error or What is R2 Score? Let’s discuss these two concept first below:


    ### What is Mean Squared Error?


    Mean Squared Error (MSE) is a popular metric used to measure the average squared
    difference between the actual and predicted values of a regression problem. It
    is a common evaluation metric used in regression analysis and is the average of
    the squared differences between predicted and actual values. The MSE provides
    a relative measure of how well a regression model fits the data. The lower the
    MSE, the better the model is at predicting the target variable.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_245_0.png)


    The formula for MSE is:


    MSE = (1/n) * Σ(yi - ŷi)^2


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_245_1.png)


    Where:

    - n: the number of observations in the dataset

    - yi: the actual value of the target variable for the ith observation

    - ŷi: the predicted value of the target variable for the ith observation


    In essence, MSE measures the average squared distance between the predicted and
    actual values. By squaring the differences between the predicted and actual values,
    the metric is able to give higher weights to larger errors, providing a more accurate
    reflection of the overall performance of the model.


    ### What is R2 Score?


    R2 Score, also known as the coefficient of determination, is a statistical measure
    that represents the proportion of variance in the dependent variable that can
    be explained by the independent variable(s).


    R2 score is a value between 0 and 1, where a value of 1 indicates that the model
    perfectly fits the data, while a value of 0 indicates that the model does not
    explain any of the variability in the data.


    The formula for R² score is:


    $R^2 = 1 - \frac{\text{unexplained variation}}{\text{total variation}} = 1 - \frac{\sum_i
    (y_i - \hat{y}_i)^2}{\sum_i (y_i - \bar{y})^2}$


    Here''s an example of calculating the R2 score using Python:


    ```python

    from sklearn.linear_model import LinearRegression

    from sklearn.metrics import r2_score

    import numpy as np


    # Generate some random data

    x = np.array([1, 2, 3, 4, 5, 6])

    y = np.array([2, 4, 5, 6, 7, 8])


    # Fit a linear regression model

    model = LinearRegression().fit(x.reshape(-1,1), y)


    # Predict the y values using the model

    y_pred = model.predict(x.reshape(-1,1))


    # Calculate the R2 score

    r2 = r2_score(y, y_pred)


    print(f"R2 score: {r2}")

    ```


    In this example, we generated some random data and fit a linear regression model
    to it using scikit-learn''s **LinearRegression** class. We then used the **r2_score**
    function from scikit-learn''s **metrics** module to calculate the R2 score of
    the model. The resulting R2 score tells us how well the model fits the data.


    If you want to create a linear regression model on your own data, you can use
    the below code.


    ```python

    from sklearn.linear_model import LinearRegression

    from sklearn.model_selection import train_test_split

    import pandas as pd


    # read data

    data = pd.read_csv("data.csv")


    # split data into dependent and independent variables

    X = data[[''feature1'', ''feature2'', ''feature3'']]

    y = data[''target'']


    # split data into training and testing sets

    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2, random_state=0)


    # create linear regression object

    reg = LinearRegression()


    # fit the model to the training data

    reg.fit(X_train, y_train)


    # predict the target variable for the test data

    y_pred = reg.predict(X_test)

    ```'
  mdcn: '## 4.1 线性回归


    线性回归是一种监督学习算法，用于建模因变量与一个或多个自变量之间的线性关系。线性回归的目标是找到一条最能拟合数据点的直线。线性回归可用于简单回归分析和多元回归分析。


    ### 简单线性回归


    在简单线性回归中，只有一个自变量，最佳拟合线由以下方程表示：


    y = mx + b


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_239_0.png)


    其中 y 是因变量，x 是自变量，m 是直线的斜率，b 是 y 轴截距。直线的斜率表示 x 和 y 之间的关系，而 y 轴截距表示直线与 y 轴相交的点。


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_240_0.png)


    ### 多元线性回归


    在多元线性回归中，有两个或更多个自变量，最佳拟合线由以下方程表示：


    y = b0 + b1x1 + b2x2 + ... + bnxn


    其中 y 是因变量，x1, x2, ..., xn 是自变量，b0, b1, b2, ..., bn 是直线的系数。每个系数表示在保持所有其他自变量不变的情况下，相应自变量每变化一个单位所引起的因变量的变化量。


    线性回归可用于连续型和分类型因变量，但自变量必须是连续型的。最小二乘法用于找到最佳拟合线的系数，这些系数使预测值与实际值之间差值的平方和最小化。


    Python 中的 Scikit-learn 库通过 `LinearRegression` 类提供了线性回归的便捷实现。该类提供了多种用于模型拟合和预测的方法，例如
    **fit()**、**predict()**、**score()** 等。线性回归可用于解决各种现实世界的问题，例如预测房价、股价等等。


    以下是一个使用 scikit-learn 库和随机生成的数据集来说明线性回归的编码示例：


    ```python

    # Import required libraries

    import numpy as np

    from sklearn.linear_model import LinearRegression

    from sklearn.model_selection import train_test_split


    # Generate random dataset

    np.random.seed(123)

    num_samples = 100

    x1 = np.random.normal(10, 2, num_samples) # Independent variable 1 (age)

    x2 = np.random.normal(5, 1, num_samples) # Independent variable 2 (income)

    y = 2*x1 + 3*x2 + np.random.normal(0, 1, num_samples) # Dependent variable (savings)


    # Reshape independent variables

    X = np.column_stack((x1, x2))


    # Split dataset into train and test sets

    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2, random_state=123)


    # Create a Linear Regression model

    model = LinearRegression()


    # Fit the model on training data

    model.fit(X_train, y_train)


    # Predict the savings using the test set

    y_pred = model.predict(X_test)


    # Print model coefficients and intercept

    print(''Coefficients:'', model.coef_)

    print(''Intercept:'', model.intercept_)


    # Print model performance metrics

    from sklearn.metrics import mean_squared_error, r2_score

    print(''Mean squared error: %.2f'' % mean_squared_error(y_test, y_pred))

    print(''R2 score: %.2f'' % r2_score(y_test, y_pred))

    ```


    输出将如下所示：


    Coefficients: [2.00633802 3.0088422 ]

    Intercept: -0.19265156903176717

    Mean squared error: 0.85

    R2 score: 0.95


    在这个例子中，我们生成了一个包含 2 个自变量和 1 个因变量的随机数据集。自变量是年龄和收入，因变量是储蓄。我们假设储蓄是年龄和收入的线性组合，并带有一些添加的噪声。


    我们使用 **numpy** 库生成随机数据集，并使用 **sklearn.linear_model** 模块中的 **LinearRegression**
    类来创建线性回归模型。


    然后，我们使用 **sklearn.model_selection** 模块中的 **train_test_split** 函数将数据集划分为训练集和测试集。


    我们使用 **fit** 方法在训练数据上拟合线性回归模型，并使用 **predict** 方法预测测试集的储蓄。


    然后，我们打印模型的系数和截距，并使用 **sklearn.metrics** 模块中的均方误差和 R2 分数指标来评估模型性能。


    请注意，我们使用了有意义且现实的变量名，以使示例更易于理解。我们还添加了测试-训练集划分，以评估模型在未见数据上的性能。


    在阅读上述示例后，您可能会有疑问：什么是均方误差？或者什么是 R2 分数？让我们先在下面讨论这两个概念：


    ### 什么是均方误差？


    均方误差（MSE）是一种流行的指标，用于衡量回归问题中实际值与预测值之间差值的平方的平均值。它是回归分析中常用的评估指标，是预测值与实际值之间差值的平方的平均值。MSE
    提供了回归模型拟合数据好坏的相对度量。MSE 越低，模型预测目标变量的能力越好。


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_245_0.png)


    MSE 的公式为：


    MSE = (1/n) * Σ(yi - ŷi)^2


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_245_1.png)


    其中：

    - n：数据集中的观测数量

    - yi：第 i 个观测的目标变量的实际值

    - ŷi：第 i 个观测的目标变量的预测值


    本质上，MSE 衡量的是预测值与实际值之间差值的平方的平均距离。通过对预测值与实际值之间的差值进行平方，该指标能够给较大的误差赋予更高的权重，从而更准确地反映模型的整体性能。


    ### 什么是 R2 分数？


    R2 分数，也称为决定系数，是一种统计度量，表示因变量中可由自变量解释的方差比例。


    R2 分数是一个介于 0 和 1 之间的值，其中值为 1 表示模型完美拟合数据，而值为 0 表示模型无法解释数据中的任何变异性。


    R² 分数的公式为：


    $R^2 = 1 - \frac{\text{unexplained variation}}{\text{total variation}} = 1 - \frac{\sum_i
    (y_i - \hat{y}_i)^2}{\sum_i (y_i - \bar{y})^2}$


    以下是使用 Python 计算 R2 分数的示例：


    ```python

    from sklearn.linear_model import LinearRegression

    from sklearn.metrics import r2_score

    import numpy as np


    # Generate some random data

    x = np.array([1, 2, 3, 4, 5, 6])

    y = np.array([2, 4, 5, 6, 7, 8])


    # Fit a linear regression model

    model = LinearRegression().fit(x.reshape(-1,1), y)


    # Predict the y values using the model

    y_pred = model.predict(x.reshape(-1,1))


    # Calculate the R2 score

    r2 = r2_score(y, y_pred)


    print(f"R2 score: {r2}")

    ```


    在这个例子中，我们生成了一些随机数据，并使用 scikit-learn 的 **LinearRegression** 类为其拟合了一个线性回归模型。然后，我们使用
    scikit-learn 的 **metrics** 模块中的 **r2_score** 函数计算了模型的 R2 分数。得到的 R2 分数告诉我们模型拟合数据的程度。


    如果您想在自己的数据上创建线性回归模型，可以使用以下代码。


    ```python

    from sklearn.linear_model import LinearRegression

    from sklearn.model_selection import train_test_split

    import pandas as pd


    # read data

    data = pd.read_csv("data.csv")


    # split data into dependent and independent variables

    X = data[[''feature1'', ''feature2'', ''feature3'']]

    y = data[''target'']


    # split data into training and testing sets

    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2, random_state=0)


    # create linear regression object

    reg = LinearRegression()


    # fit the model to the training data

    reg.fit(X_train, y_train)


    # predict the target variable for the test data

    y_pred = reg.predict(X_test)

    ```'

    One of the key features of logistic regression is that it estimates the probability
    of an instance belonging to a particular class. The class with the highest probability
    is the one that the instance is assigned to. This makes logistic regression a
    popular choice for binary classification problems, such as spam detection and
    medical diagnosis.'

  mdcn: "## 2.11 Python 中的模块\n\nPython 中的模块是预先编写的代码库，你可以用它们为你的 Python 程序添加额外功能。它们是组织和重用代码的一种方式，可以帮助你编写更高效、更有条理的代码。Python\
    \ 拥有种类繁多的内置模块，你也可以使用 pip 等包管理器安装第三方模块。\n\n**import** 语句用于在 Python 中导入模块。例如：\n\n\
    ```python\nimport math\n```\n\n这会导入 math 模块，该模块提供了诸如 **sqrt()**、**sin()** 和 **cos()**\
    \ 等数学函数。\n\n你也可以使用 **from** 关键字从模块中导入特定的函数或变量。例如：\n\n```python\nfrom math import\
    \ sqrt\n```\n\n这只会从 math 模块中导入 **sqrt()** 函数。\n\n你还可以使用 **as** 关键字在导入模块或函数时为其指定一个不同的名称。例如：\n\
    \n```python\nimport math as m\n```\n\n这会导入 math 模块并将其命名为 'm'，这样你就可以使用 **m.sqrt()**\

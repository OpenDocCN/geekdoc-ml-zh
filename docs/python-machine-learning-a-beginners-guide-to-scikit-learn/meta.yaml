  md: '# 4.6 SUPPORT VECTOR MACHINES


    Support Vector Machines (SVMs) are a type of supervised learning model that can
    be used for classification and regression tasks. The basic idea behind SVMs is
    to find the best boundary (or hyperplane) that separates the data into different
    classes. The best boundary is the one that maximizes the margin, which is the
    distance between the boundary and the closest data points from each class.


    SVMs are particularly useful when the data is not linearly separable, which means
    that a straight line cannot be used to separate the classes. In such cases, SVMs
    can map the data into a higher dimensional space, where it becomes linearly separable.
    This process is called **kernel trick** and it allows SVMs to handle non-linear
    problems.


    The main advantage of SVMs is that they can handle high-dimensional data and they
    are less prone to overfitting compared to other models such as decision trees.
    However, SVMs can be sensitive to the choice of kernel function and the regularization
    parameter, which can affect the performance of the model.


    In python, scikit-learn library provides SVM classifier with different kernel
    options such as linear, polynomial and radial'

  md: '+   - **Filter methods**: Filter methods evaluate each feature independently
    and select a subset based on a certain criteria, such as correlation or mutual
    information. These methods are simple and fast, but they do not take into account
    the relationship between the features and the target variable.

    - **Wrapper methods**: Wrapper methods evaluate the feature subset in combination
    with a specific model, and select a subset based on the performance of the model.
    These methods are more computationally expensive, but they take into account the
    relationship between the features and the target variable.

    - **Embedded methods**: Embedded methods select features as part of the model
    training process. These methods are typically used in ensemble methods and tree-based
    models, such as random forests and gradient boosting.

    - **Lasso regularization**: Lasso regularization is a technique that can be used

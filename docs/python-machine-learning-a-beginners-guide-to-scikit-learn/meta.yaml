    K-means clustering is a popular and widely used unsupervised learning technique
    for grouping similar data points together. It is a centroid-based algorithm, or
    a distance-based algorithm, where we calculate the distances to assign a point
    to a cluster. The objective of the K-means algorithm is to minimize the sum of
    distances between the data points and the cluster centroid.


    The algorithm works as follows:


    1.  Select K initial centroids, where K is the number of clusters we want to form.
    These centroids can be chosen randomly from the data points.

    2.  Assign each data point to the closest centroid.

    3.  Recalculate the centroid for each cluster by taking the mean of all the data
    points in the cluster.

    4.  Repeat steps 2 and 3 until convergence, i.e., until the centroids stop changing.


    One of the main advantages of K-means is its computational efficiency, as it has
    a linear time complexity with respect to the number of data points. However, it
    also has some limitations. For example, it is sensitive to initial centroid selection
    and assumes that the clusters are spherical, which may not always be the case
    in real-world data.


    An example of using K-means clustering in Python with scikit-learn would be:


    ```python

    import numpy as np

    from sklearn.cluster import KMeans

    import matplotlib.pyplot as plt


    # Set random seed for reproducibility

    np.random.seed(42)


    # Generate random dataset with 2 features and 3 clusters

    X = np.random.randn(150, 2)

    X[:50] += 5

    X[50:100] -= 5


    y = np.concatenate([np.zeros(50), np.ones(50), np.ones(50) * 2])


    # Instantiate KMeans algorithm with 3 clusters

    kmeans = KMeans(n_clusters=3)


    # Fit KMeans to data

    kmeans.fit(X)


    # Predict cluster labels for data points

    y_pred = kmeans.predict(X)


    # Plot data points with different colors for each cluster

    plt.scatter(X[:, 0], X[:, 1], c=y_pred)

    plt.title("K-means Clustering")

    plt.show()


    # Get cluster assignments for each data point

    print(kmeans.labels_)


    # Get cluster centroids

    print(kmeans.cluster_centers_)

    ```


    WHEN YOU RUN THE CODE, you should see a scatter plot of the data points, with
    different colors for each of the 3 clusters. The algorithm has correctly identified
    the 3 clusters based on their proximity to each other. This is just a simple example,
    but K-means clustering can be used for a variety of applications, such as customer
    segmentation, image segmentation, and anomaly detection.



    ## 6.4 CONVOLUTIONAL NEURAL NETWORKS


    Convolutional Neural Networks (CNNs) are a type of deep learning model that are
    specifically designed to process data that has a grid-like structure, such as
    an image. CNNs use a technique called convolution to automatically and adaptively
    learn spatial hierarchies of features from input images.


    The architecture of a CNN typically consists of several layers, including:


    - The input layer: which receives the image data

    - The convolutional layers: which apply a set of filters to the input image to
    extract features

    - The pooling layers: which down-sample the output from the convolutional layers

    - The fully connected layers: which take the output from the pooling layers and
    use it to make a prediction


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_391_0.png)


    One of the key advantages of CNNs is their ability to learn hierarchical representations
    of the input data. The early layers in the network learn simple features such
    as edges, while the later layers learn more complex features such as shapes and
    object parts.


    CNNs have been successfully applied in a wide range of computer vision tasks such
    as image classification, object detection, and semantic segmentation. They have
    also been used in other domains such as natural language processing and speech
    recognition.


    In order to train a CNN, large amounts of labeled training data is required. The
    training process involves adjusting the parameters of the network (i.e., the weights
    and biases of the filters and fully connected layers) to minimize the difference
    between the predicted output and the true output. This is typically done using
    stochastic gradient descent or a variant thereof.


    ## Example


    HERE IS A GENERAL EXAMPLE of how to train a CNN on the CIFAR-10 dataset using
    Keras:


    ```python

    import tensorflow as tf

    from tensorflow import keras

    from tensorflow.keras import layers

    import numpy as np

    import matplotlib.pyplot as plt


    # Load the dataset

    (x_train, y_train), (x_test, y_test) = keras.datasets.cifar10.load_data()


    # Keep only cat and dog images and their labels

    train_mask = np.any(y_train == [3, 5], axis=1)

    test_mask = np.any(y_test == [3, 5], axis=1)


    x_train, y_train = x_train[train_mask], y_train[train_mask]

    x_test, y_test = x_test[test_mask], y_test[test_mask]


    # Preprocess the data

    x_train = x_train.astype("float32") / 255.0

    x_test = x_test.astype("float32") / 255.0


    y_train = keras.utils.to_categorical(y_train == 3, num_classes=2)

    y_test = keras.utils.to_categorical(y_test == 3, num_classes=2)


    # Define the model

    model = keras.Sequential(

    [

    layers.Conv2D(32, (3, 3), activation="relu", input_shape=(32, 32, 3)),

    layers.MaxPooling2D((2, 2)),

    layers.Conv2D(64, (3, 3), activation="relu"),

    layers.MaxPooling2D((2, 2)),

    layers.Conv2D(128, (3, 3), activation="relu"),

    layers.Flatten(),

    layers.Dense(64, activation="relu"),

    layers.Dense(2, activation="softmax"),

    ]

    )


    # Compile the model

    model.compile(optimizer="adam", loss="categorical_crossentropy", metrics=["accuracy"])


    # Train the model

    history = model.fit(x_train, y_train, epochs=10, validation_data=(x_test, y_test))


    # Plot the training history

    plt.plot(history.history["accuracy"], label="accuracy")

    plt.plot(history.history["val_accuracy"], label="val_accuracy")

    plt.xlabel("Epoch")

    plt.ylabel("Accuracy")

    plt.legend()

    plt.show()

    ```


    ## Evaluate the model


    ```python

    model.evaluate(x_test, y_test)

    ```



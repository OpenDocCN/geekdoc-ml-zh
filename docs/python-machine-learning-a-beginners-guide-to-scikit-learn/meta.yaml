    # 6.6 GENERATIVE MODELS


    Generative models are a class of unsupervised machine learning models that are
    trained to generate new data that is similar to the training data. These models
    are trained to learn the underlying probability distribution of the data and can
    be used to generate new data samples that are similar to the training data. There
    are several different types of generative models, including generative adversarial
    networks (GANs), variational autoencoders (VAEs), and normalizing flow models.


    GANs consist of two main components: a generator network and a discriminator network.
    The generator network is trained to generate new data samples, while the discriminator
    network is trained to distinguish between the generated samples and the real data
    samples. The two networks are trained together in an adversarial manner, with
    the generator trying to fool the discriminator and the discriminator trying to
    correctly identify the generated samples.


    VAEs are a type of generative model that uses an encoder-decoder architecture.
    The encoder network is trained to learn a compact representation of the data,
    called the latent space, while the decoder network is trained to generate new
    data'
  - '[PAGE 402]


    samples from this latent space. The goal of VAEs is to learn a probability distribution
    over the data that can be used to generate new samples.


    Normalizing flow models are a type of generative model that use a series of invertible
    transformations to map the data from a simple prior distribution to the true data
    distribution. These models can be used to generate new data samples by sampling
    from the simple prior and then applying the invertible transformations.


    Generative models have a wide range of applications, including image and video
    synthesis, text generation, and data augmentation. They can also be used in tasks
    such as anomaly detection, where the model is trained to identify samples that
    are not similar to the training data.'
  - '[PAGE 403]


    # 6.7 TRANSFER LEARNING


    Transfer learning is a technique that allows a model trained on one task to be
    applied to a different but related task. This is particularly useful in deep learning,
    where training a model from scratch on a new task can be computationally expensive
    and time-consuming.


    The basic idea behind transfer learning is that a model that has been trained
    on a large dataset for a task with a similar feature space can be used as a starting
    point for a new task with a smaller dataset. The pre-trained model can be used
    as a feature extractor, where its layers are used to extract features from the
    new dataset and then a new classifier is trained on top of these features.


    There are two main types of transfer learning:


    +   1. Fine-tuning: This involves training a new classifier on top of the pre-trained
    model, while keeping the weights of the pre-trained model fixed. The new classifier
    is trained using the new dataset, and its weights are updated.

    2. Feature extraction: This involves using the pre-trained model as a feature
    extractor, where the output of the pre-trained model''s layers are used as input
    for a new classifier. The new classifier is trained using the new dataset, and
    its weights are updated.'
  - '[PAGE 404]


    There are several pre-trained models available for transfer learning, such as
    VGG, Inception, and ResNet. These models have been trained on large datasets such
    as ImageNet and can be used for a variety of tasks such as image classification,
    object detection, and semantic segmentation.


    Transfer learning is widely used in computer vision and natural language processing
    tasks, where the availability of large amounts of labeled data is limited. It
    has also been applied to other domains such as speech recognition and reinforcement
    learning.


    To use transfer learning in practice, one can use pre-trained models available
    in deep learning libraries such as TensorFlow and PyTorch. These libraries provide
    pre-trained models and also have interfaces to easily fine-tune or use the pre-trained
    models for feature extraction on new datasets.'
  - '[PAGE 405]



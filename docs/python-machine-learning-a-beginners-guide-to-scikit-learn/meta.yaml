    # 7.14 PRECISION-RECALL CURVES


    Precision-Recall (PR) curves are another visualization technique used to evaluate
    the performance of binary classifiers. PR curves plot the precision (the proportion
    of true positive predictions among all positive predictions) against the recall
    (the proportion of true positive predictions among all actual positive instances)
    for different classification thresholds.


    A perfect classifier would have a precision of 1 and a recall of 1, resulting
    in a point in the top right corner of the PR space (coordinates (1,1)). A random
    classifier would have a precision and recall of 0.5, resulting in a point along
    the diagonal line from the bottom left to the top right corners (coordinates (0,0)
    and (1,1)).



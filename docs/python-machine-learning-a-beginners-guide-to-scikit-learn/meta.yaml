  md: '# 2.10 FILE HANDLING IN PYTHON


    File handling in Python allows you to read from and write to files on your computer''s
    file system. Python provides a variety of built-in functions and methods for working
    with files, including opening, reading, writing, and closing files.


    The **open()** function is used to open a file. It takes the file name and the
    mode in which the file should be opened as arguments. The mode can be ''r'' for
    reading, ''w'' for writing, and ''a'' for appending. For example:


    ```

    file = open(''example.txt'', ''r'')

    ```


    THIS OPENS THE FILE ''example.txt'' in read mode.


    The **read()** method is used to read the contents of a file. For example:


    ```

    file = open(''example.txt'', ''r'')

    contents = file.read()

    print(contents)

    file.close()

    ```'

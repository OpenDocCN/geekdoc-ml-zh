  md: '# # 1.6 TYPE OF DATA


    When working with datasets in machine learning, it is important to understand
    the different types of data that can be encountered. Data can be broadly classified
    into two categories: structured and unstructured. Understanding the different
    types of data and their characteristics can help in selecting the appropriate
    machine learning algorithms and preprocessing techniques.


    # ## Structured Data


    STRUCTURED DATA IS data that is organized and can be easily understood by a computer.
    It can be represented in tabular form and can be easily stored in a relational
    database. Examples of structured data include numerical data (such as age, income)
    and categorical data (such as gender, occupation). Structured data can be further
    classified into two types: numerical and categorical.


    **Numerical Data:** Numerical data is data that consists of numbers. It can be
    further divided into two types: **discrete and continuous**. Discrete data is
    data that can only take on certain values, such as the number of children in a
    family. Continuous data, on the other hand, can take on any value within a range,
    such as the temperature.'
  merge: -1
  pgno: 64
- img_proc: true
  md: '**Categorical Data:** Categorical data is data that consists of categories.
    Examples include gender, occupation, and country of origin. Categorical data can
    be further divided into two types: **ordinal and nominal**. Ordinal data is data
    that can be ordered, such as education level (high school, undergraduate, graduate).
    Nominal data is data that cannot be ordered, such as gender (male, female).


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_65_0.png)


    # Unstructured Data


    UNSTRUCTURED DATA IS data that is not organized and is difficult for a computer
    to understand. Examples include text, images, and audio. Unstructured data is
    often more challenging to work with, as it requires additional preprocessing steps
    to convert it into a format that can be understood by a computer. This can include
    text mining, image processing, and audio processing.'
  merge: -1
  pgno: 65
- img_proc: true
  md: '**Text data** is one of the most common types of unstructured data. It can
    be found in emails, social media posts, and customer reviews. Text data requires
    preprocessing techniques such as tokenization, stemming, and lemmatization to
    convert it into a format that can be understood by a machine learning model.


    **Images and videos** are also common types of unstructured data. They require
    preprocessing techniques such as image processing, object detection, and feature
    extraction to convert them into a format that can be understood by a machine learning
    model.


    # Semi-structured Data


    SEMI-STRUCTURED DATA is a type of data that does not conform to a specific data
    model or schema. It contains elements of both structured and unstructured data.
    Semi-structured data is often represented in a format that can be easily processed
    by computers, such as JSON, XML, or CSV files, but it may not have a fixed structure
    or defined data types.


    One of the main advantages of semi-structured data is its flexibility. Because
    the data does not have to conform to a specific schema, it can be easily modified
    or extended to accommodate new data elements. This makes it well-suited'
  merge: -1

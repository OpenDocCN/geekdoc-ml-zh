    Supervised learning is a type of machine learning where the model is trained on
    labeled data to make predictions on new, unseen data. In supervised learning,
    the goal is to learn mapping from input features to output labels. The input features
    are often represented as a set of numerical or categorical values, while the output
    labels can be either continuous or discrete values. In this chapter, we will delve
    into the different types of supervised learning algorithms, and explore how to
    use scikit-learn to train, evaluate and improve models for different types of

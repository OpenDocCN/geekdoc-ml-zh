  md: '# # 7.3 OVERFITTING AND UNDERFITTING


    Overfitting and underfitting are two common problems in machine learning. These
    problems occur when a model is too complex or too simple for the data it is trying
    to fit, resulting in poor performance on new, unseen data. In this article, we
    will discuss overfitting and underfitting in detail and provide examples to help
    understand these concepts.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_430_0.png)


    # ## Overfitting


    OVERFITTING OCCURS when a model is too complex and is able to fit the training
    data perfectly but performs poorly on'
  merge: -1
  pgno: 430
- img_proc: true
  md: 'new, unseen data. This happens when the model learns the noise in the data
    rather than the underlying pattern. As a result, the model becomes too specific
    to the training data and is unable to generalize to new data.


    # Example


    Suppose we have a dataset that contains the age and height of a group of people.
    We want to build a model that predicts the height of a person given their age.
    We decide to use a polynomial regression model with a degree of 20 to fit the
    data.


    ```

    import numpy as np


    import matplotlib.pyplot as plt


    # Generate random data


    np.random.seed(42)


    X = np.random.rand(50, 1)


    y = X ** 2 + np.random.randn(50, 1) * 0.1


    # Fit polynomial regression model


    from sklearn.preprocessing import PolynomialFeatures


    from sklearn.linear_model import LinearRegression


    from sklearn.metrics import mean_squared_error


    degrees = [1, 20]


    for degree in degrees:

    ```'
  merge: -1
  pgno: 431
- img_proc: true
  md: '```

    poly_features = PolynomialFeatures(degree=degree, include_bias=False)

    X_poly = poly_features.fit_transform(X)

    lin_reg = LinearRegression()

    lin_reg.fit(X_poly, y)

    y_pred = lin_reg.predict(X_poly)

    # Plot data and model predictions

    plt.scatter(X, y)

    plt.plot(X, y_pred, label=''degree={}''.format(degree))

    plt.legend()

    plt.show()

    # Calculate mean squared error

    mse = mean_squared_error(y, y_pred)

    print(''Degree {}: MSE = {}''.format(degree, mse))

    ```



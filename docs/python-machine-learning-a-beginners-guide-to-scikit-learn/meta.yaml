    \ X_test, y_train, y_test = train_test_split(X, y, test_size=0.3,\n          \
    \                                          random_state=42)\n\n# Fit Gradient\
    \ Boosting model\ngb = GradientBoostingRegressor(n_estimators=100, learning_rate=0.1,\n\
    \                              max_depth=3, random_state=42)\ngb.fit(X_train,\
    \ y_train)\n\n# Make predictions on test data\ny_pred = gb.predict(X_test)\n\n\
    # Evaluate model performance\nmse = mean_squared_error(y_test, y_pred)\nprint(\"\
    Mean squared error: \", mse)\n```\n\nIN THIS EXAMPLE, WE first generate a random\
    \ dataset using **make_regression** function from **sklearn.datasets** module.\
    \ We set the number of samples to 1000, the number of features to 10, and the\
    \ noise level to 20. Then we split the dataset into training and testing sets\
    \ using **train_test_split** function from **sklearn.model_selection** module.\
    \ We set the test size to 0.3, which means 30% of the data will be used for testing.\n\
    \nNext, we define the Gradient Boosting model using **GradientBoostingRegressor**\
    \ class from **sklearn.ensemble** module. We set the number of estimators to 100,\
    \ learning rate to 0.1, and max depth to 3. Then we fit the model to the training\
    \ data using the **fit** method.\n\nWe make predictions on the test data using\
    \ the **predict** method and calculate the mean squared error between the predicted\
    \ and actual values using the **mean_squared_error** function from **sklearn.metrics**\
    \ module.\n\nGradient Boosting is an ensemble method that combines multiple weak\
    \ models (decision trees in this case) to form a strong model. It trains the models\
    \ in a sequential manner, where each subsequent model tries to correct the errors\
    \ of the previous model. The learning rate parameter controls the contribution\
    \ of each model to the final prediction, and the max depth parameter limits the\

  md: '# F. GLOSSARY


    A


    +   - **Accuracy**: A measure of how well a model correctly predicts the outcomes
    of a dataset, typically measured as the ratio of correct predictions to total
    predictions.

    - **Activation function**: A function applied to the output of a neuron in order
    to introduce non-linearity into the model.

    - **Adaline**: Adaptive Linear Neuron, an algorithm developed by Bernard Widrow
    and Tedd Hoff in 1960, which is considered a precursor to modern artificial neural
    networks.

    - **AUC-ROC**: Area Under the Receiver Operating Characteristic Curve, a metric
    used to evaluate the performance of binary classification models.

    - **Autoencoder**: A type of neural network architecture in which the input and
    output layers have the same number of nodes, and the network is trained to reconstruct
    the input from the output.


    B


    +   - **Backpropagation**: An algorithm used to train artificial neural networks
    by iteratively adjusting the weights of'
  merge: -1
  pgno: 722
- img_proc: true
  md: 'the network in order to minimize the error between the predicted and actual
    outputs.


    +   - **Batch Gradient Descent**: A variation of gradient descent algorithm where
    the parameters are updated after calculating the gradients of the loss function
    w.r.t to the parameters, from the entire training dataset.

    - **Bias**: A term used to describe the difference between a model''s predictions
    and the true values of the data.

    - **Bias-Variance Trade-off**: A concept in machine learning that refers to the
    balancing act between a model''s ability to fit the training data well (low bias)
    and its ability to generalize to new data (low variance).


    # C


    +   - **Classification**: A type of supervised machine learning task in which
    the model is trained to predict a categorical label for a given input.

    - **Clustering**: A type of unsupervised machine learning task in which the model
    is trained to group similar inputs together based on certain features.

    - **Convolutional Neural Network (CNN)**: A type of neural network architecture
    commonly used for image and video processing tasks.


    # D'
  merge: -1
  pgno: 723
- img_proc: true
  md: '+   - **Decision Tree**: A type of model used for both classification and regression
    tasks, in which the model is trained to make a series of decisions based on the
    input data.

    - **Deep Learning**: A subfield of machine learning focused on building complex
    neural network architectures, such as convolutional neural networks and recurrent
    neural networks.

    - **Density-Based Clustering**: A clustering algorithm in which clusters are defined
    as dense regions of the data space.

    - **Dimensionality Reduction**: A technique used to reduce the number of features
    in a dataset by transforming the data into a lower-dimensional space.


    # E


    +   - **Ensemble Methods**: A method of combining multiple models to improve the
    overall performance of the model.

    - **Epoch**: A complete iteration over all the training data during the training
    of a model.

    - **Extreme Gradient Boosting (XGBoost)**: An open-source library for gradient
    boosting, which is used to improve the performance of decision trees.


    # F'
  merge: -1
  pgno: 724
- img_proc: true
  md: '+   - **Feature**: A measurable property of the input data used to make predictions.

    - **Feature Engineering**: The process of selecting and transforming features
    to improve the performance of a model.

    - **Feature Scaling**: A technique used to normalize the range of features in
    a dataset.

    - **F1 Score**: A metric used to evaluate the performance of classification models,
    which is the harmonic mean of precision and recall.


    # G


    +   - **Gradient Descent**: An optimization algorithm used to minimize the loss
    function of a model by adjusting the model''s parameters.

    - **Gaussian Mixture Model (GMM)**: A generative probabilistic model that represents
    a set of data as a mixture of Gaussian distributions.


    # H


    +   - **Hyperparameter**: A value that is set before training a machine learning
    model and is not learned during the training process. Examples include the learning
    rate and number of hidden layers in a neural network.


    # K'
  merge: -1
  pgno: 725
- img_proc: true
  md: '+   - **K-fold cross-validation**: A technique used to evaluate the performance
    of a model by dividing the data into k partitions, training on k-1 partitions,
    and evaluating on the remaining partition. This process is repeated k times, with
    each partition serving as the evaluation set once.


    L


    +   - **L1 regularization**: A technique used to prevent overfitting by adding
    a penalty term to the cost function that is proportional to the absolute value
    of the coefficients. This technique results in sparse solutions, with many coefficients
    equal to zero.

    - **L2 regularization**: A technique used to prevent overfitting by adding a penalty
    term to the cost function that is proportional to the square of the coefficients.
    This technique results in small, non-zero coefficients.

    - **Learning rate**: A hyperparameter that controls the step size in the optimization
    of a model''s parameters. A small learning rate may result in slow convergence,
    while a large learning rate may overshoot the optimal solution.

    - **Log loss**: A loss function used in classification tasks that measures the
    performance of a classifier by penalizing false classifications.

    - **Label**: The output or target variable of a supervised learning problem.'
  merge: -1
  pgno: 726
- img_proc: true
  md: '+   - **Linear Regression**: A supervised learning algorithm used for predicting
    a continuous target variable based on one or more input features. Linear regression
    models the relationship between the input features and the target variable as
    a linear equation.

    - **Logistic Regression**: A supervised learning algorithm used for classification
    problems, where the goal is to predict a binary outcome. Logistic regression models
    the probability of the positive class as a logistic function of the input features.

    - **Loss Function**: A function used to evaluate the performance of a machine
    learning model, typically by penalizing the model for incorrect predictions. The
    goal of training a machine learning model is to minimize the loss function.


    M


    +   - **Machine Learning**: A subfield of artificial intelligence that involves
    the development of algorithms that can learn from data and make predictions or
    decisions without being explicitly programmed.

    - **Model**: A representation of a system or problem that can be used to make
    predictions or decisions. In machine learning, models are trained on a dataset
    and are then used to make predictions on new, unseen data.'
  merge: -1
  pgno: 727
- img_proc: true
  md: '+   - **Metric**: A function used to evaluate the performance of a model, such
    as accuracy or F1 score.


    # O


    +   - **Overfitting**: A common problem in machine learning, where a model is
    trained too well on the training data and performs poorly on new, unseen data.
    Overfitting occurs when a model is too complex and is able to memorize the training
    data instead of generalizing to new data.


    # P


    +   - **Precision**: A metric used in classification problems to evaluate the
    number of true positive predictions made by a model, as a proportion of all positive
    predictions made.


    # R


    +   - **Recall**: A metric used in classification problems to evaluate the number
    of true positive predictions made by a model, as a proportion of all actual positive
    instances in the dataset.

    - **Regularization**: A technique used to prevent overfitting in machine learning
    models by adding a penalty term to the loss function that discourages large values
    of the model parameters.

    - **Root Mean Squared Error (RMSE)**: A metric used to evaluate the performance
    of a regression model,'
  merge: -1
  pgno: 728
- img_proc: true
  md: 'calculated as the square root of the mean of the squared differences between
    the predicted and actual values.


    # S


    +   - **Supervised Learning**: A type of machine learning where the goal is to
    learn a mapping from input features to output labels, using a labeled dataset.

    - **Scikit-learn**: A popular Python library for machine learning that provides
    a consistent interface to a wide range of machine learning algorithms.


    # T


    +   - **Test set**: A set of data used to evaluate the performance of a trained
    model, separate from the training and validation sets.

    - **Training set**: A set of data used to train a model, separate from the test
    and validation sets.


    # U


    +   - **Unsupervised Learning**: A type of machine learning where the goal is
    to discover hidden patterns or structure in an unlabeled dataset, without a specific
    target variable in mind.'
  merge: -1
  pgno: 729
- img_proc: true
  md: '+   - **Underfitting**: A situation in which a model is too simple to capture
    the underlying relationship in the data, resulting in poor performance on both
    the training and test sets.


    # V


    +   - **Validation**: The process of evaluating a machine learning model on a
    separate dataset, after training, to estimate its performance on new, unseen data.

    - **Variance**: A measure of the variability of a model''s predictions for different
    training sets. A high variance model is sensitive to small fluctuations in the
    training data and is at risk of overfitting.


    # W


    +   - **Weight**: A parameter learned by a model during training.


    # Z


    +   - **Zero-one loss**: A loss function used in classification tasks that measures
    the performance of a classifier by counting the number of incorrect classifications.'
  merge: -1
  pgno: 730

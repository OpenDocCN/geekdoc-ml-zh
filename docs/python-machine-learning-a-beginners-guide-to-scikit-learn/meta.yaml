    ## Parallel coordinates


    Parallel coordinates is a powerful technique for visualizing high-dimensional
    data. In this technique, each variable is represented by a vertical axis, and
    a line is drawn connecting the values of each variable for each data point. This
    allows us to identify patterns and relationships between variables that may not
    be apparent in other types of visualizations.


    Here''s an example scenario where parallel coordinates can be used in multivariate
    analysis:


    Suppose we have a dataset of customer reviews for a restaurant, with features
    such as food quality, service, ambiance, price, and overall rating. We want to
    explore the relationship between these features and the overall rating given by
    the customers.


    We can create a parallel coordinates plot to visualize this relationship. Here''s
    an example code using Python''s matplotlib library:


    ```python

    import numpy as np

    import matplotlib.pyplot as plt


    np.random.seed(42)


    # Generate random data for 5 features and 100 samples

    food_quality = np.random.randint(1, 6, size=100)

    service = np.random.randint(1, 6, size=100)

    ambiance = np.random.randint(1, 6, size=100)

    price = np.random.randint(1, 6, size=100)

    overall_rating = np.random.randint(1, 6, size=100)


    # Create parallel coordinates plot

    fig, ax = plt.subplots()

    plt.title(''Customer Reviews for a Restaurant'')

    plt.xlabel(''Features'')

    plt.ylabel(''Rating'')

    plt.xticks(range(5), [''Food Quality'', ''Service'', ''Ambiance'', ''Price'',
    ''Overall Rating''])

    plt.ylim(0, 5)

    plt.plot([0, 1, 2, 3, 4], [food_quality, service, ambiance, price, overall_rating],
    color=''blue'', alpha=0.1)

    plt.plot([0, 1, 2, 3, 4], [np.mean(food_quality), np.mean(service), np.mean(ambiance),
    np.mean(price), np.mean(overall_rating)], color=''red'', alpha=0.9)

    plt.show()

    ```


    In this example, we first generated random data for the five features and overall
    rating for 100 customer reviews, using the **numpy.random.randint()** function
    with a seed of 42 to ensure the same data is generated each time.


    We then created a parallel coordinates plot using matplotlib''s **plot()** function,
    where each feature is plotted as a separate line and the overall rating is shown
    on the y-axis. The blue lines represent individual customer reviews, while the
    red line represents the mean rating for each feature.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_192_0.png)


    From this plot, we can observe the following:


    - Customers tend to rate food quality and service higher than ambiance and price.

    - The overall rating is positively correlated with food quality and service, but
    less so with ambiance and price.

    - There is a wide range of ratings for each feature, indicating that different
    customers have different preferences and priorities.


    This type of visualization can be useful for quickly identifying patterns and
    relationships in multivariate data, and can help guide further analysis and decision-making.


    ## Cluster Analysis


    Cluster analysis, also known as clustering, is a technique used in multivariate
    analysis to group a set of objects in a way that objects in the same group (called
    a cluster) are more similar to each other than to those in other groups. The objective
    of cluster analysis is to find a structure or pattern in the data that can be
    useful in discovering relationships or identifying groups within the data.


    Cluster analysis can be used for a wide range of applications in different fields,
    such as market segmentation, image segmentation, anomaly detection, customer profiling,
    biological classification, and many others.


    There are different methods of cluster analysis, but the most common ones are
    hierarchical clustering and k-means clustering.


    ### Hierarchical Clustering


    Hierarchical clustering is a method of cluster analysis that builds a hierarchy
    of clusters by recursively dividing the data set into smaller and smaller groups.
    There are two types of hierarchical clustering: agglomerative and divisive. Agglomerative
    clustering starts with each data point as its own cluster and then successively
    merges the closest pairs of clusters until all the data points belong to a single
    cluster. Divisive clustering starts with all the data points in a single cluster
    and then successively divides the cluster into smaller clusters until each data
    point belongs to its own cluster.


    Here''s an example of hierarchical clustering using Python''s **scipy** library:


    ```python

    import numpy as np

    from scipy.cluster import hierarchy

    import matplotlib.pyplot as plt


    # Generate some random data

    np.random.seed(123)

    x = np.random.rand(10, 2)


    # Perform hierarchical clustering

    dendrogram = hierarchy.dendrogram(hierarchy.linkage(x, method=''ward''))


    # Visualize the dendrogram

    plt.title(''Hierarchical Clustering Dendrogram'')

    plt.xlabel(''Data point'')

    plt.ylabel(''Distance'')

    plt.show()

    ```


    In this example, we first generate a random dataset with 10 data points and 2
    features. We then use the **hierarchy.linkage** function from **scipy** to perform
    hierarchical clustering using the "ward" method. Finally, we use the **hierarchy.dendrogram**
    function to generate a visualization of the dendrogram.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_195_0.png)


    The resulting plot shows the hierarchical clustering dendrogram, where the y-axis
    represents the distance between the clusters being merged and the x-axis represents
    the data points being clustered. The height of each horizontal line in the dendrogram
    indicates the distance between the two clusters being merged. We can use this
    plot to determine the optimal number of clusters to use in our analysis, by selecting
    a horizontal line that cuts through the longest vertical line without intersecting
    any other lines.


    ### K-means Clustering


    K-means clustering is a method of cluster analysis that partitions the data set
    into k clusters by minimizing the sum of squared distances between each data point
    and the centroid of its cluster. The algorithm starts by randomly assigning each
    data point to one of the k clusters, and then iteratively updates the centroids
    and re-assigns the data points to the closest cluster until convergence.



  md: '# # 7.9 SIMPLIFYING THE MODEL


    Simplifying a machine learning model, also known as model compression or pruning,
    is the process of reducing the complexity of a model without sacrificing its performance.
    This can be useful for a number of reasons, such as reducing the memory and computational
    requirements of a model, making it easier to interpret and understand, or making
    it more suitable for deployment in resource-constrained environments.


    There are several techniques that can be used to simplify a machine learning model,
    including:'
  merge: -1
  pgno: 518
- img_proc: true
  md: '![](img/a86802873e5d6145f81c2d3a0cf0e53d_519_0.png)


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_519_1.png)


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_519_2.png)


    WEIGHT PRUNING: THIS TECHNIQUE INVOLVES REMOVING THE WEIGHTS WITH THE LOWEST ABSOLUTE
    VALUES FROM THE MODEL, EFFECTIVELY REDUCING THE NUMBER OF PARAMETERS.


    NEURON PRUNING: THIS TECHNIQUE INVOLVES REMOVING ENTIRE NEURONS OR LAYERS FROM
    THE MODEL, AGAIN REDUCING THE NUMBER OF PARAMETERS.


    QUANTIZATION: THIS TECHNIQUE INVOLVES REDUCING THE PRECISION OF THE MODEL''S WEIGHTS,
    FOR EXAMPLE, BY CONVERTING THEM FROM 32-BIT FLOATING POINT VALUES TO 8-BIT INTEGERS.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_519_3.png)


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_519_4.png)


    LOW-RANK APPROXIMATION: THIS TECHNIQUE INVOLVES APPROXIMATING THE MODEL''S WEIGHT
    MATRIX WITH A LOWER-RANK MATRIX, EFFECTIVELY REDUCING THE NUMBER OF PARAMETERS.



    for testing).

    3. Next, a random sample of the data is selected according to the chosen ratio,
    and this sample is used as the training set.

    4. The remaining data is used as the testing set.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_439_0.png)


    Simple random sampling is a simple and straightforward method for splitting data
    and it is easy to implement. However, it may not be suitable for datasets with

    the network in order to minimize the error between the predicted and actual outputs.


    +   - **Batch Gradient Descent**: A variation of gradient descent algorithm where
    the parameters are updated after calculating the gradients of the loss function
    w.r.t to the parameters, from the entire training dataset.

    - **Bias**: A term used to describe the difference between a model''s predictions
    and the true values of the data.

    - **Bias-Variance Trade-off**: A concept in machine learning that refers to the
    balancing act between a model''s ability to fit the training data well (low bias)
    and its ability to generalize to new data (low variance).


    # C


    +   - **Classification**: A type of supervised machine learning task in which
    the model is trained to predict a categorical label for a given input.

    - **Clustering**: A type of unsupervised machine learning task in which the model
    is trained to group similar inputs together based on certain features.

    - **Convolutional Neural Network (CNN)**: A type of neural network architecture
    commonly used for image and video processing tasks.


    # D'

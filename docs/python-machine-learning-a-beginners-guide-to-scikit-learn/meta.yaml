- md: "## 3.4 FEATURE ENGINEERING\n\nFeature engineering is the process of transforming\
    \ raw data into features that can be used in a machine learning model. It is a\
    \ crucial step in the machine learning pipeline as the quality and nature of the\
    \ features can greatly affect the performance of the model. The goal of feature\
    \ engineering is to extract meaningful information from the raw data and create\
    \ new features that can improve the predictive power of the model.\n\nThere are\
    \ many different techniques that can be used in feature engineering, such as:\n\
    \n## Feature extraction\n\nFeature extraction is a technique in feature engineering\
    \ that involves creating new features from the raw data by applying mathematical\
    \ functions or algorithms. The goal is to extract meaningful information from\
    \ the raw data and create new features that can improve the predictive power of\
    \ the model. There are several ways to perform feature extraction, some of which\
    \ include:\n\n- **Mathematical functions**: Applying mathematical functions, such\
    \ as square root, logarithm, or trigonometric functions, to a feature can extract\
    \ new information from the data. For example, taking the square root of a feature\
    \ that represents the area of a house can create a new feature that represents\
    \ the side length of the house.\n- **Aggregations**: Grouping the data by a certain\
    \ variable and calculating aggregate statistics, such as mean, median, or standard\
    \ deviation, can create new features. For example, taking the mean of a feature\
    \ that represents the temperature of a city over a period of time can create a\
    \ new feature that represents the average temperature of the city.\n- **Derived\
    \ features**: Creating new features by combining or manipulating existing features.\
    \ For example, creating a new feature that represents the ratio of two existing\
    \ features, such as the ratio of income to expenditure.\n- **Signal processing**:\
    \ Applying signal processing techniques, such as Fourier transform or wavelet\
    \ transform, to time series data can extract new features from the data. For example,\
    \ applying a Fourier transform to a time series of stock prices can create new\
    \ features that represent the frequencies of the price movements.\n- **NLP techniques**:\
    \ Applying natural language processing techniques to text data can extract new\
    \ features. For example, counting the number of words in a sentence, or creating\
    \ bag-of-words representations of a document.\n\nAn example of feature extraction\
    \ is as follows: Consider a dataset that contains information about houses, including\
    \ the number of bedrooms, number of bathrooms, square footage, and price. We would\
    \ like to use this data to train a model to predict the price of a house based\
    \ on the other features. One of the features \"Square footage\" may be very large\
    \ and may not be useful in predicting the price of a house directly. Instead,\
    \ we can extract a new feature from the square footage by applying a mathematical\
    \ function such as square root. This can create a new feature that represents\
    \ the side length of the house, which may be more meaningful and useful in predicting\
    \ the price.\n\nWe can do this using the following code snippet in python using\
    \ the Pandas library:\n\n```python\nimport numpy as np\nimport pandas as pd\n\n\
    # Set random seed for reproducibility\nnp.random.seed(123)\n\n# Generate random\
    \ data for house pricing\nnum_houses = 1000\nsqft = np.random.normal(1500, 250,\
    \ num_houses)\nbedrooms = np.random.randint(1, 6, num_houses)\nbathrooms = np.random.randint(1,\
    \ 4, num_houses)\nyear_built = np.random.randint(1920, 2022, num_houses)\n\nprice\
    \ = (sqft * 200) + (bedrooms * 10000) + (bathrooms * 7500) - (house_age * 1000)\
    \ + np.random.normal(0, 50000, num_houses)\n\n# Create pandas dataframe from random\
    \ data\nhouses = pd.DataFrame({\n    'sqft': sqft,\n    'bedrooms': bedrooms,\n\
    \    'bathrooms': bathrooms,\n    'year_built': year_built,\n    'price': price\n\
    })\n\n# Extract the new feature\nhouses[\"house_age\"] = 2022 - houses[\"year_built\"\
    ]\nprint(\"New feature (house_age) after using feature extraction by mathematic\
    \ function is here: \")\nprint(houses[\"house_age\"])\n\n# Extract the new feature\n\
    houses[\"side_length\"] = houses[\"sqft\"].apply(np.sqrt)\nprint(\"New feature\
    \ (side_length) after using feature extraction by mathematic function is here:\
    \ \")\nprint(houses[\"side_length\"])\n```\n\nIn this example, the first line\
    \ imports the Pandas library. After that, we create data using random function\
    \ from numPy and create a data frame from that data. In the next few lines, we\
    \ extracted two new variables namely house_age and side_length using mathematical\
    \ functions.\n\nThis is just one example of how feature extraction can be used\
    \ in practice. It's important to note that feature extraction should be done carefully\
    \ and with domain knowledge, as it can greatly affect the performance of the model.\
    \ Additionally, it's a good practice to test multiple different features and techniques\
    \ to identify the optimal set of features for a given problem.\n\n## Feature selection\n\
    \nFeature selection is a technique in feature engineering that involves selecting\
    \ a subset of the original features based on their relevance or importance for\
    \ the prediction task. The goal is to select a subset of features that contain\
    \ the most informative and useful information, while reducing the dimensionality\
    \ of the data and avoiding the inclusion of irrelevant or redundant features.\
    \ This can lead to improved model performance, faster training times, and more\
    \ interpretable models.\n\nThere are several ways to perform feature selection,\
    \ some of which include:\n\n- **Filter methods**: Filter methods evaluate each\
    \ feature independently and select a subset based on a certain criteria, such\
    \ as correlation or mutual information. These methods are simple and fast, but\
    \ they do not take into account the relationship between the features and the\
    \ target variable.\n- **Wrapper methods**: Wrapper methods evaluate the feature\
    \ subset in combination with a specific model, and select a subset based on the\
    \ performance of the model. These methods are more computationally expensive,\
    \ but they take into account the relationship between the features and the target\
    \ variable.\n- **Embedded methods**: Embedded methods select features as part\
    \ of the model training process. These methods are typically used in ensemble\
    \ methods and tree-based models, such as random forests and gradient boosting.\n\
    - **Lasso regularization**: Lasso regularization is a technique that can be used\
    \ to select features by adding a penalty term to the cost function that encourages\
    \ the model to select a smaller number of features.\n\nAn example of feature selection\
    \ using filter method is as follows: Consider a dataset that contains information\
    \ about houses, including the number of bedrooms, number of bathrooms, square\
    \ footage, and price. We would like to use this data to train a model to predict\
    \ the price of a house based on the other features. One way to perform feature\
    \ selection is to use a filter method called correlation-based feature selection\
    \ (CFS). This method selects a subset of features based on the correlation between\
    \ the features and the target variable.\n\nWe can do this using the following\
    \ code snippet in python using the scikit-learn library:\n\n```python\nimport\
    \ pandas as pd\nfrom sklearn.feature_selection import SelectKBest\nfrom sklearn.feature_selection\
    \ import chi2, f_classif\n\n# Import the data\ndata = pd.read_csv(\"house-prices.csv\"\
    )\nX = data.drop(columns = [\"Price\", \"Neighborhood\", \"Brick\"], axis=1)\n\
    y = data[\"Price\"]\n\n# Perform feature selection using CFS\nselector = SelectKBest(score_func=f_classif,\
    \ k=2)\nX_new = selector.fit_transform(X, y)\n```\n\nIn this example, the first\
    \ two lines import the pandas and the feature selection module of scikit-learn.\
    \ The third line uses the \"read_csv\" function provided by pandas to import the\
    \ data from the \"house-prices.csv\" file and store it in a variable called \"\
    data\". The fourth line separates the predictor variables (X) from the target\
    \ variable(y) and also drop the non-numeric columns. The fifth line instantiates\
    \ the feature selection method by specifying the scoring function \"f_classif\"\
    \ and the number of features to select \"k=2\". The sixth line applies the feature\
    \ selection method to the data and returns a new dataset that contains only the\
    \ selected features.\n\nIn the above example, the feature selection method used\
    \ is correlation-based feature selection (CFS) which is a filter method. CFS calculates\
    \ the correlation between each feature and the target variable and selects the\
    \ k features with the highest correlation. It is a simple and fast method but\
    \ it does not take into account the relationship between the features and the\
    \ target variable, which may be important for certain types of data and problems.\n\
    \nAnother example of feature selection method is Wrapper Method, which uses a\
    \ specific model to evaluate the feature subset and select a subset based on the\
    \ performance of the model. This method is more computationally expensive, but\
    \ it takes into account the relationship between the features and the target variable.\
    \ An example of wrapper method is Recursive Feature Elimination (RFE) which uses\
    \ a specific model (such as SVM) and recursively removes the feature with the\
    \ lowest coefficient until the desired number of features are selected."
  mdcn: "## 3.4 特征工程\n\n特征工程是将原始数据转换为可用于机器学习模型的特征的过程。它是机器学习流程中的关键步骤，因为特征的质量和性质会极大地影响模型的性能。特征工程的目标是从原始数据中提取有意义的信息，并创建能够提升模型预测能力的新特征。\n\
    \n特征工程中可以使用多种不同的技术，例如：\n\n## 特征提取\n\n特征提取是特征工程中的一种技术，它通过应用数学函数或算法从原始数据中创建新特征。其目标是从原始数据中提取有意义的信息，并创建能够提升模型预测能力的新特征。执行特征提取有多种方式，其中一些包括：\n\
    \n- **数学函数**：对特征应用数学函数，如平方根、对数或三角函数，可以从数据中提取新信息。例如，对表示房屋面积的特征取平方根，可以创建一个表示房屋边长的新特征。\n\
    - **聚合**：按某个变量对数据进行分组，并计算聚合统计量，如均值、中位数或标准差，可以创建新特征。例如，对表示一段时间内城市温度的特征取均值，可以创建一个表示该城市平均温度的新特征。\n\
    - **衍生特征**：通过组合或操作现有特征来创建新特征。例如，创建一个表示两个现有特征比率的新特征，如收入与支出的比率。\n- **信号处理**：对时间序列数据应用信号处理技术，如傅里叶变换或小波变换，可以从数据中提取新特征。例如，对股票价格时间序列应用傅里叶变换，可以创建表示价格变动频率的新特征。\n\
    - **自然语言处理技术**：对文本数据应用自然语言处理技术可以提取新特征。例如，计算句子中的单词数量，或创建文档的词袋表示。\n\n特征提取的一个示例如下：考虑一个包含房屋信息的数据集，包括卧室数量、浴室数量、平方英尺数和价格。我们希望使用这些数据训练一个模型，根据其他特征预测房屋价格。其中一个特征“平方英尺数”可能数值很大，可能无法直接用于预测房屋价格。相反，我们可以通过应用数学函数（如平方根）从平方英尺数中提取一个新特征。这可以创建一个表示房屋边长的新特征，它可能在预测价格时更有意义和实用。\n\
    \n我们可以使用以下Python代码片段，利用Pandas库来实现：\n\n```python\nimport numpy as np\nimport pandas\
    \ as pd\n\n# Set random seed for reproducibility\nnp.random.seed(123)\n\n# Generate\
    \ random data for house pricing\nnum_houses = 1000\nsqft = np.random.normal(1500,\
    \ 250, num_houses)\nbedrooms = np.random.randint(1, 6, num_houses)\nbathrooms\
    \ = np.random.randint(1, 4, num_houses)\nyear_built = np.random.randint(1920,\
    \ 2022, num_houses)\n\nprice = (sqft * 200) + (bedrooms * 10000) + (bathrooms\
    \ * 7500) - (house_age * 1000) + np.random.normal(0, 50000, num_houses)\n\n# Create\
    \ pandas dataframe from random data\nhouses = pd.DataFrame({\n    'sqft': sqft,\n\
    \    'bedrooms': bedrooms,\n    'bathrooms': bathrooms,\n    'year_built': year_built,\n\
    \    'price': price\n})\n\n# Extract the new feature\nhouses[\"house_age\"] =\
    \ 2022 - houses[\"year_built\"]\nprint(\"New feature (house_age) after using feature\
    \ extraction by mathematic function is here: \")\nprint(houses[\"house_age\"])\n\
    \n# Extract the new feature\nhouses[\"side_length\"] = houses[\"sqft\"].apply(np.sqrt)\n\
    print(\"New feature (side_length) after using feature extraction by mathematic\
    \ function is here: \")\nprint(houses[\"side_length\"])\n```\n\n在这个例子中，第一行导入了Pandas库。之后，我们使用numPy的随机函数创建数据，并从该数据创建一个数据框。在接下来的几行中，我们使用数学函数提取了两个新变量，即`house_age`和`side_length`。\n\
    \n这只是一个特征提取在实践中如何应用的例子。需要注意的是，特征提取应谨慎进行，并结合领域知识，因为它会极大地影响模型的性能。此外，测试多种不同的特征和技术以确定给定问题的最佳特征集是一个好的实践。\n\
    \n## 特征选择\n\n特征选择是特征工程中的一种技术，它涉及根据原始特征与预测任务的相关性或重要性来选择一个子集。其目标是选择包含最具信息量和最有用信息的特征子集，同时降低数据维度并避免包含不相关或冗余的特征。这可以带来模型性能的提升、更快的训练时间以及更易于解释的模型。\n\
    \n执行特征选择有多种方式，其中一些包括：\n\n- **过滤法**：过滤法独立评估每个特征，并根据某些标准（如相关性或互信息）选择一个子集。这些方法简单快速，但它们没有考虑特征与目标变量之间的关系。\n\
    - **包装法**：包装法将特征子集与特定模型结合进行评估，并根据模型的性能选择一个子集。这些方法计算成本更高，但它们考虑了特征与目标变量之间的关系。\n\
    - **嵌入法**：嵌入法在模型训练过程中选择特征。这些方法通常用于集成方法和基于树的模型，如随机森林和梯度提升。\n- **Lasso正则化**：Lasso正则化是一种可以通过向损失函数添加惩罚项来选择特征的技术，该惩罚项鼓励模型选择更少的特征。\n\
    \n使用过滤法进行特征选择的一个示例如下：考虑一个包含房屋信息的数据集，包括卧室数量、浴室数量、平方英尺数和价格。我们希望使用这些数据训练一个模型，根据其他特征预测房屋价格。执行特征选择的一种方法是使用一种称为基于相关性的特征选择的过滤法。该方法根据特征与目标变量之间的相关性选择一个特征子集。\n\

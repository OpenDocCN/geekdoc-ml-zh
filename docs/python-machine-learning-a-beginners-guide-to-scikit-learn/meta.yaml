    predictions.

    - **Activation function**: A function applied to the output of a neuron in order
    to introduce non-linearity into the model.

    - **Adaline**: Adaptive Linear Neuron, an algorithm developed by Bernard Widrow
    and Tedd Hoff in 1960, which is considered a precursor to modern artificial neural
    networks.

    - **AUC-ROC**: Area Under the Receiver Operating Characteristic Curve, a metric
    used to evaluate the performance of binary classification models.

    - **Autoencoder**: A type of neural network architecture in which the input and
    output layers have the same number of nodes, and the network is trained to reconstruct
    the input from the output.


    B


    +   - **Backpropagation**: An algorithm used to train artificial neural networks
    by iteratively adjusting the weights of'

    Next, we performed divisive hierarchical clustering by transposing the dataset
    and performing agglomerative clustering on it. This effectively treats the features
    as data points and the data points as features. The resulting hierarchical structure
    is also visualized with a dendrogram using Matplotlib.


    Agglomerative clustering starts with each data point in its own cluster and merges
    the most similar clusters at each step until all data points belong to the same
    cluster. Divisive clustering starts with all data points in a single cluster and
    recursively divides the cluster into smaller and smaller clusters until each data
    point is in its own cluster.


    The choice of linkage method can greatly affect the resulting clusters and dendrogram
    structures, and different linkage methods may be more appropriate for different
    datasets and clustering objectives. If we just change the linkage method in the
    code above, the result will look completely different:'

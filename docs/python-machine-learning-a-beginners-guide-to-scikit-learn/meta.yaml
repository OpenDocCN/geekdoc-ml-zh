  md: '# 5.3 HIERARCHICAL CLUSTERING


    Hierarchical clustering is a type of unsupervised machine learning algorithm used
    for grouping similar data points into clusters. The main idea behind hierarchical
    clustering is to build a hierarchy of clusters in a top-down or bottom-up manner.


    There are two main types of hierarchical clustering: **agglomerative and divisive**.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_305_0.png)


    +   - Agglomerative hierarchical (bottom-up) clustering starts with each data
    point as its own cluster and iteratively merges the closest clusters together
    until all points are part of a single cluster.

    - Divisive hierarchical (top-down) clustering starts with all data points in a
    single cluster and iteratively splits the cluster into smaller clusters.'
  merge: -1
  pgno: 305
- img_proc: true
  md: '![](img/a86802873e5d6145f81c2d3a0cf0e53d_306_0.png)


    One of the main advantages of hierarchical clustering is that it allows for the
    representation of the hierarchy of clusters in a dendrogram, which can be used
    to visualize the relationships between different clusters. Another advantage is
    that it can handle non-linearly separable data and can be used with any distance
    metric.


    However, one of the main disadvantages of hierarchical clustering is that it can
    be computationally expensive and time-consuming, especially for large datasets.
    Additionally, it can be sensitive to the choice of linkage criteria and distance
    metric used. Some commonly used linkage criteria include single linkage, complete
    linkage, average linkage, and Ward linkage.'
  merge: -1
  pgno: 306
- img_proc: true
  md: 'An example of hierarchical clustering could be grouping customer data into
    segments for targeted marketing. By using clustering algorithms such as hierarchical
    clustering on customer data, such as their demographics, purchase history, and
    behavior, a company can create segments of similar customers that they can target
    with tailored marketing campaigns.


    Hierarchical clustering is a method of clustering in which clusters are organized
    into a tree-like structure. It is also known as **hierarchical cluster analysis
    (HCA)** or agglomerative clustering.


    Here is an example of how to perform agglomerative and divisive hierarchical clustering
    on a randomly generated dataset using Python and visualize the results with Matplotlib:


    ```

    import numpy as np

    import matplotlib.pyplot as plt

    from scipy.cluster.hierarchy import dendrogram, linkage


    # Generate random dataset with seed for reproducibility

    np.random.seed(123)

    X = np.random.randn(50, 2)


    # Perform agglomerative clustering

    Z_agg = linkage(X, method=''ward'')


    # Plot dendrogram for agglomerative clustering

    ```'
  merge: -1
  pgno: 307
- img_proc: true
  md: '```

    plt.figure(figsize=(10, 5))

    plt.title("Agglomerative Clustering Dendrogram")

    plt.xlabel("Data point index")


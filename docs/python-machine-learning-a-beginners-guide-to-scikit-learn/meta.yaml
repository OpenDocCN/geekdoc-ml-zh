  md: '# # 4.1 LINEAR REGRESSION


    Linear regression is a supervised learning algorithm used for modeling the linear
    relationship between a dependent variable and one or more independent variables.
    The goal of linear regression is to find the best-fitting straight line through
    the data points. Linear regression can be used for both simple and multiple regression
    analysis.


    # ## Simple Linear Regression


    IN SIMPLE LINEAR REGRESSION, there is only one independent variable and the line
    of best fit is represented by the equation:


    y = mx + b


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_239_0.png)'
  merge: -1
  pgno: 239
- img_proc: true
  md: 'WHERE Y IS THE DEPENDENT variable, x is the independent variable, m is the
    slope of the line, and b is the y-intercept. The slope of the line represents
    the relationship between x and y, while the y-intercept represents the point at
    which the line crosses the y-axis.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_240_0.png)


    # Multiple Linear Regression


    IN MULTIPLE LINEAR regression, there are two or more independent variables, and
    the line of best fit is represented by the equation:


    y = b0 + b1x1 + b2x2 + ... + bnxn


    Where y is the dependent variable, x1, x2, ..., xn are the independent variables,
    and b0, b1, b2, ..., bn are the coefficients of the line. Each coefficient represents
    the change in the dependent variable for a one-unit change in the corresponding
    independent variable, holding all other independent variables constant.


    Linear regression can be used for both continuous and categorical dependent variables,
    but the independent variables must be continuous. The method of least squares
    is'
  merge: -1
  pgno: 240
- img_proc: true
  md: 'used to find the coefficients of the line of best fit, which minimize the sum
    of the squared differences between the predicted and actual values.


    Scikit-learn library in Python provides an easy implementation of linear regression
    via the LinearRegression class. The class provides several methods for model fitting
    and prediction such as **fit()**, **predict()**, **score()** etc. Linear regression
    can be used for various real-world problems such as predicting housing prices,
    stock prices, and many more.


    Here''s a coding example to illustrate linear regression using scikit-learn library
    and a randomly generated dataset:


    ```

    # Import required libraries


    import numpy as np


    from sklearn.linear_model import LinearRegression


    from sklearn.model_selection import train_test_split


    # Generate random dataset


    np.random.seed(123)


    num_samples = 100


    x1 = np.random.normal(10, 2, num_samples) # Independent variable 1 (age)


    x2 = np.random.normal(5, 1, num_samples) # Independent variable 2 (income)


    y = 2*x1 + 3*x2 + np.random.normal(0, 1, num_samples) # Dependent variable (savings)


    # Reshape independent variables

    ```'

    +   - **Feature**: A measurable property of the input data used to make predictions.

    - **Feature Engineering**: The process of selecting and transforming features
    to improve the performance of a model.

    - **Feature Scaling**: A technique used to normalize the range of features in
    a dataset.

    - **F1 Score**: A metric used to evaluate the performance of classification models,
    which is the harmonic mean of precision and recall.



  mdcn: '## 5.2 K均值聚类


    K均值聚类是一种流行且广泛使用的无监督学习技术，用于将相似的数据点分组在一起。它是一种基于质心的算法，或称为基于距离的算法，我们通过计算距离来将一个点分配到一个簇中。K均值算法的目标是最小化数据点与簇质心之间的距离总和。


    该算法的工作流程如下：


    1.  选择K个初始质心，其中K是我们想要形成的簇的数量。这些质心可以从数据点中随机选择。

    2.  将每个数据点分配到最近的质心。

    3.  通过计算簇中所有数据点的平均值，重新计算每个簇的质心。

    4.  重复步骤2和3，直到收敛，即质心停止变化。


    K均值的主要优点之一是其计算效率，因为它相对于数据点数量具有线性时间复杂度。然而，它也有一些局限性。例如，它对初始质心的选择敏感，并且假设簇是球形的，这在现实世界的数据中可能并不总是如此。


    一个使用scikit-learn在Python中进行K均值聚类的示例如下：


    ```python

    import numpy as np

    from sklearn.cluster import KMeans

    import matplotlib.pyplot as plt


    # Set random seed for reproducibility

    np.random.seed(42)


    # Generate random dataset with 2 features and 3 clusters

    X = np.random.randn(150, 2)

    X[:50] += 5

    X[50:100] -= 5


    y = np.concatenate([np.zeros(50), np.ones(50), np.ones(50) * 2])


    # Instantiate KMeans algorithm with 3 clusters

    kmeans = KMeans(n_clusters=3)


    # Fit KMeans to data

    kmeans.fit(X)


    # Predict cluster labels for data points

    y_pred = kmeans.predict(X)


    # Plot data points with different colors for each cluster

    plt.scatter(X[:, 0], X[:, 1], c=y_pred)

    plt.title("K-means Clustering")

    plt.show()


    # Get cluster assignments for each data point

    print(kmeans.labels_)


    # Get cluster centroids

    print(kmeans.cluster_centers_)

    ```


    当你运行这段代码时，你应该会看到一个数据点的散点图，其中3个簇用不同的颜色表示。该算法根据数据点彼此之间的接近程度正确地识别出了这3个簇。这只是一个简单的例子，但K均值聚类可以用于各种应用，例如客户细分、图像分割和异常检测。



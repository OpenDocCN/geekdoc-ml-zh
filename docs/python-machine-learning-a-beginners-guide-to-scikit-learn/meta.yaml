    a key or value and removing key-value pairs. These functions can make your code
    more readable, efficient, and organized. Understanding and using these built-in
    functions effectively can help you write more efficient and organized code.'
- md: "## 2.8 STRING MANIPULATION FUNCTION\n\nPython provides a variety of built-in\
    \ functions and methods for manipulating strings. These functions and methods\
    \ make it easy to perform common operations on strings, such as concatenation,\
    \ slicing, formatting, and searching.\n\nThe **len()** function is used to determine\
    \ the length of a string, which is the number of characters it contains. For example:\n\
    \n```\nname = \"John\"\nprint(len(name))\n```\n\nTHIS WILL OUTPUT 4.\n\nThe **+**\
    \ operator is used to concatenate two or more strings together. For example:\n\
    \n```\nfirst_name = \"John\"\nlast_name = \"Doe\"\nfull_name = first_name + \"\
    \ \" + last_name\nprint(full_name)\n```\n\nTHIS WILL OUTPUT \"JOHN Doe\".\n\n\
    The * operator is used to repeat a string a certain number of times. For example:\n\
    \n```\nname = \"John\"\nprint(name * 3)\n```\n\nTHIS WILL OUTPUT \"JOHNJOHNJOHN\"\
    .\n\nThe [:] notation is used to slice a string. It allows you to extract a substring\
    \ from a string by specifying the start and end index. For example:\n\n```\nname\
    \ = \"John Doe\"\nprint(name[0:4])\n```\n\nTHIS WILL OUTPUT \"JOHN\".\n\nThe **in**\
    \ keyword is used to check if a substring exists in a string. For example:\n\n\
    ```\nname = \"John Doe\"\nprint(\"John\" in name) # Output: True\nprint(\"Jane\"\
    \ in name) # Output: False\n```\n\nThe **replace()** method is used to replace\
    \ a substring with another substring in a string. For example:\n\n```\nname =\
    \ \"John Doe\"\nnew_name = name.replace(\"John\", \"Jane\")\nprint(new_name)\n\
    ```\n\nTHIS WILL OUTPUT \"JANE Doe\".\n\nThe **split()** method is used to split\
    \ a string into a list of substrings using a specified delimiter. For example:\n\
    \n```\nname = \"John,Doe,30\"\nname_list = name.split(\",\")\nprint(name_list)\n\
    ```\n\nTHIS WILL OUTPUT **['John', 'Doe', '30']**\n\nThe **format()** method is\
    \ used to format strings by replacing placeholders with values. Placeholders are\
    \ represented by curly braces **{}**. For example:\n\n```\nname = \"John\"\nage\
    \ = 30\nprint(\"My name is {} and I am {} years old.\".format(name, age))\n```\n\
    \nTHIS WILL OUTPUT \"MY name is John and I am 30 years old.\"\n\nThe **join()**\
    \ method is used to join a list of strings into a single string using a specified\
    \ delimiter. For example:\n\n```\nnames = [\"John\", \"Doe\", \"Jane\"]\nstring_of_names\
    \ = \",\".join(names)\nprint(string_of_names)\n```\n\nTHIS WILL OUTPUT \"JOHN,Doe,Jane\"\
    \n\nIn conclusion, Python provides a variety of built-in functions and methods\
    \ for manipulating strings. The **len()**, + operator, * operator, [:] notation,\
    \ **in** keyword, **replace()**, **split()**, **format()** and **join()** are\
    \ commonly used for tasks such as determining the length of a string, concatenating\
    \ multiple strings, repeating a string, slicing substrings, checking for the existence\
    \ of a substring, replacing substrings, splitting strings into a list of substrings,\
    \ formatting strings with placeholders and joining a list of strings into a single\
    \ string. These functions and methods can make your code more readable, efficient,\
    \ and organized. Understanding and using these built-in functions and methods\
    \ effectively can help you write more efficient and organized code. It's important\
    \ to note that some methods like **replace()**, **split()**, **format()** and\
    \ **join()** are specific to strings and can't be used on other data types.\n\n\
    ## 2.9 EXCEPTION HANDLING\n\nException handling is a mechanism in Python that\
    \ allows you to handle errors and exceptional situations in your code. It allows\
    \ you to write code that can continue to execute even when an error occurs. This\
    \ is important because it allows your program to continue running and avoid crashing,\
    \ which can lead to a better user experience.\n\nThe **try** and **except** keywords\
    \ are used to handle exceptions in Python. The **try** block contains the code\
    \ that may raise an exception. The **except** block contains the code that will\
    \ be executed if an exception is raised. For example:\n\n```\ntry:\n    num1 =\
    \ 7\n    num2 = 0\n    print(num1 / num2)\nexcept ZeroDivisionError:\n    print(\"\
    Division by zero is not allowed.\")\n```\n\nIN THIS EXAMPLE, THE code in the **try**\
    \ block raises a **ZeroDivisionError** exception when it attempts to divide **num1**\
    \ by **num2**, which has a value of 0. The code in the **except** block is executed\
    \ and the message \"Division by zero is not allowed.\" is printed.\n\nYou can\
    \ use multiple **except** blocks to handle different types of exceptions. For\
    \ example:\n\n```\ntry:\n    variable = \"hello\"\n    print(int(variable))\n\
    except ValueError:\n    print(\"ValueError: could not convert string to int.\"\
    )\nexcept TypeError:\n    print(\"TypeError: int() argument must be a string,\
    \ a bytes-like object or a number, not 'list'\")\n```\n\nIN THIS EXAMPLE, THE\
    \ code in the **try** block raises a **ValueError** exception when it attempts\
    \ to convert the string \"hello\" to an integer, which is not possible. The first\
    \ **except** block is executed and the message \"ValueError: could not convert\
    \ string to int.\" is printed.\n\nYou can also use the **finally** block to include\
    \ code that will be executed regardless of whether an exception was raised or\
    \ not. For example:\n\n```\ntry:\n    num1 = 7\n    num2 = 0\n    print(num1 /\
    \ num2)\nexcept ZeroDivisionError:\n    print(\"Division by zero is not allowed.\"\
    )\nfinally:\n    print(\"This code will be executed no matter what.\")\n```\n\n\
    IN THIS EXAMPLE, THE code in the **finally** block will be executed regardless\
    \ of whether the code in the **try** block raises an exception or not.\n\nIn addition,\
    \ you can use the **raise** keyword to raise an exception manually.\n\n```\nraise\
    \ ValueError(\"Invalid Value\")\n```\n\nIN CONCLUSION, EXCEPTION handling is an\
    \ important feature in Python that allows you to handle errors and exceptional\
    \ situations in your code. The **try** and **except** keywords are used to handle\
    \ exceptions, while the **finally** block can be used to include code that will\
    \ be executed regardless of whether an exception was raised or not. Using multiple\
    \ **except** blocks allows you to handle different types of exceptions separately.\
    \ The **raise** keyword can be used to raise an exception manually. Exception\
    \ handling allows your program to continue running and avoid crashing, which can\
    \ lead to a better user experience. It is important to use exception handling\
    \ in your code to anticipate and handle unexpected situations, and to make your\
    \ code more robust and reliable.\n\n## 2.10 FILE HANDLING IN PYTHON\n\nFile handling\
    \ in Python allows you to read from and write to files on your computer's file\
    \ system. Python provides a variety of built-in functions and methods for working\
    \ with files, including opening, reading, writing, and closing files.\n\nThe **open()**\
    \ function is used to open a file. It takes the file name and the mode in which\
    \ the file should be opened as arguments. The mode can be 'r' for reading, 'w'\
    \ for writing, and 'a' for appending. For example:\n\n```\nfile = open('example.txt',\
    \ 'r')\n```\n\nTHIS OPENS THE FILE 'example.txt' in read mode.\n\nThe **read()**\
    \ method is used to read the contents of a file. For example:\n\n```\nfile = open('example.txt',\
    \ 'r')\ncontents = file.read()\nprint(contents)\nfile.close()\n```\n\nTHIS READS\
    \ THE CONTENTS of the file 'example.txt' and stores it in the variable 'contents'\
    \ and prints it. it's important to close the file after reading it by calling\
    \ **file.close()**\n\nThe **write()** method is used to write to a file. It takes\
    \ a string as an argument. For example:\n\n```\nfile = open('example.txt', 'w')\n\
    file.write(\"Hello World!\")\nfile.close()\n```\n\nTHIS WRITES THE STRING \"Hello\
    \ World!\" to the file 'example.txt'.\n\nThe **append()** method is used to add\
    \ new data to the end of a file without overwriting the existing contents. It\
    \ works similar to the write method. For example:\n\n```\nfile = open('example.txt',\
    \ 'a')\nfile.write(\"\\nThis is an added text\")\nfile.close()\n```\n\nTHIS WILL\
    \ ADD \"THIS is an added text\" to the end of the file 'example.txt' without overwriting\
    \ the existing contents.\n\nThe **with** statement is used to open a file and\
    \ automatically close it when you are done with it. This is considered as a best\
    \ practice to avoid file not closed errors. For example:\n\n```\nwith open('example.txt',\
    \ 'r') as file:\n    contents = file.read()\n    print(contents)\n```\n\nTHIS\
    \ WILL OPEN THE file 'example.txt' in read mode, read its contents and print it,\
    \ and then automatically close the file when it's done.\n\nThe **readline()**\
    \ method is used to read a single line from a file. For example:\n\n```\nwith\
    \ open('example.txt', 'r') as file:\n    line = file.readline()\n    print(line)\n\
    ```\n\nTHIS WILL READ THE first line of the file 'example.txt' and print it.\n\
    \nFile handling in Python allows you to read from and write to files on your computer's\
    \ file system. Python provides a variety of built-in functions and methods for\
    \ working with files."
  mdcn: "## 2.8 字符串操作函数\n\nPython 提供了多种内置函数和方法来操作字符串。这些函数和方法使得对字符串执行常见操作变得简单，例如连接、切片、格式化和搜索。\n\
    \n**len()** 函数用于确定字符串的长度，即它包含的字符数。例如：\n\n```\nname = \"John\"\nprint(len(name))\n\
    ```\n\n这将输出 4。\n\n**+** 运算符用于将两个或多个字符串连接在一起。例如：\n\n```\nfirst_name = \"John\"\n\
    last_name = \"Doe\"\nfull_name = first_name + \" \" + last_name\nprint(full_name)\n\
    ```\n\n这将输出 \"JOHN Doe\"。\n\n* 运算符用于将字符串重复一定次数。例如：\n\n```\nname = \"John\"\nprint(name\
    \ * 3)\n```\n\n这将输出 \"JOHNJOHNJOHN\"。\n\n[:] 表示法用于切片字符串。它允许你通过指定起始和结束索引从字符串中提取子字符串。例如：\n\
    \n```\nname = \"John Doe\"\nprint(name[0:4])\n```\n\n这将输出 \"JOHN\"。\n\n**in**\
    \ 关键字用于检查子字符串是否存在于字符串中。例如：\n\n```\nname = \"John Doe\"\nprint(\"John\" in name)\
    \ # 输出：True\nprint(\"Jane\" in name) # 输出：False\n```\n\n**replace()** 方法用于将字符串中的一个子字符串替换为另一个子字符串。例如：\n\
    \n```\nname = \"John Doe\"\nnew_name = name.replace(\"John\", \"Jane\")\nprint(new_name)\n\
    ```\n\n这将输出 \"JANE Doe\"。\n\n**split()** 方法用于使用指定的分隔符将字符串分割成子字符串列表。例如：\n\n```\n\
    name = \"John,Doe,30\"\nname_list = name.split(\",\")\nprint(name_list)\n```\n\
    \n这将输出 **['John', 'Doe', '30']**。\n\n**format()** 方法用于通过将占位符替换为值来格式化字符串。占位符由花括号\
    \ **{}** 表示。例如：\n\n```\nname = \"John\"\nage = 30\nprint(\"My name is {} and I\
    \ am {} years old.\".format(name, age))\n```\n\n这将输出 \"My name is John and I am\
    \ 30 years old.\"。\n\n**join()** 方法用于使用指定的分隔符将字符串列表连接成单个字符串。例如：\n\n```\nnames\
    \ = [\"John\", \"Doe\", \"Jane\"]\nstring_of_names = \",\".join(names)\nprint(string_of_names)\n\
    ```\n\n这将输出 \"JOHN,Doe,Jane\"。\n\n总之，Python 提供了多种内置函数和方法来操作字符串。**len()**、+ 运算符、*\
    \ 运算符、[:] 表示法、**in** 关键字、**replace()**、**split()**、**format()** 和 **join()** 常用于诸如确定字符串长度、连接多个字符串、重复字符串、切片子字符串、检查子字符串是否存在、替换子字符串、将字符串分割成子字符串列表、使用占位符格式化字符串以及将字符串列表连接成单个字符串等任务。这些函数和方法可以使你的代码更具可读性、效率和组织性。有效理解和使用这些内置函数和方法可以帮助你编写更高效和有组织的代码。需要注意的是，像\
    \ **replace()**、**split()**、**format()** 和 **join()** 这样的方法是字符串特有的，不能用于其他数据类型。\n\
    \n## 2.9 异常处理\n\n异常处理是 Python 中的一种机制，允许你处理代码中的错误和异常情况。它允许你编写即使在发生错误时也能继续执行的代码。这很重要，因为它允许你的程序继续运行并避免崩溃，从而带来更好的用户体验。\n\
    \n**try** 和 **except** 关键字用于处理 Python 中的异常。**try** 块包含可能引发异常的代码。**except** 块包含如果引发异常将执行的代码。例如：\n\
    \n```\ntry:\n    num1 = 7\n    num2 = 0\n    print(num1 / num2)\nexcept ZeroDivisionError:\n\
    \    print(\"Division by zero is not allowed.\")\n```\n\n在这个例子中，**try** 块中的代码在尝试将\
    \ **num1** 除以值为 0 的 **num2** 时，会引发 **ZeroDivisionError** 异常。**except** 块中的代码被执行，并打印消息\
    \ \"Division by zero is not allowed.\"。\n\n你可以使用多个 **except** 块来处理不同类型的异常。例如：\n\
    \n```\ntry:\n    variable = \"hello\"\n    print(int(variable))\nexcept ValueError:\n\
    \    print(\"ValueError: could not convert string to int.\")\nexcept TypeError:\n\
    \    print(\"TypeError: int() argument must be a string, a bytes-like object or\
    \ a number, not 'list'\")\n```\n\n在这个例子中，**try** 块中的代码在尝试将字符串 \"hello\" 转换为整数时（这是不可能的），会引发\
    \ **ValueError** 异常。第一个 **except** 块被执行，并打印消息 \"ValueError: could not convert\
    \ string to int.\"。\n\n你也可以使用 **finally** 块来包含无论是否引发异常都会执行的代码。例如：\n\n```\ntry:\n\
    \    num1 = 7\n    num2 = 0\n    print(num1 / num2)\nexcept ZeroDivisionError:\n\
    \    print(\"Division by zero is not allowed.\")\nfinally:\n    print(\"This code\
    \ will be executed no matter what.\")\n```\n\n在这个例子中，**finally** 块中的代码无论 **try**\
    \ 块中的代码是否引发异常都会被执行。\n\n此外，你可以使用 **raise** 关键字手动引发异常。\n\n```\nraise ValueError(\"\
    Invalid Value\")\n```\n\n总之，异常处理是 Python 中的一个重要特性，允许你处理代码中的错误和异常情况。**try** 和 **except**\
    \ 关键字用于处理异常，而 **finally** 块可用于包含无论是否引发异常都会执行的代码。使用多个 **except** 块允许你分别处理不同类型的异常。**raise**\
    \ 关键字可用于手动引发异常。异常处理允许你的程序继续运行并避免崩溃，从而带来更好的用户体验。在代码中使用异常处理来预见和处理意外情况，并使你的代码更加健壮和可靠，这一点很重要。\n\
    \n## 2.10 Python 中的文件处理\n\nPython 中的文件处理允许你从计算机文件系统读取文件和写入文件。Python 提供了多种内置函数和方法来处理文件，包括打开、读取、写入和关闭文件。\n\
    \n**open()** 函数用于打开一个文件。它接受文件名和文件应以何种模式打开作为参数。模式可以是 'r' 表示读取，'w' 表示写入，'a' 表示追加。例如：\n\
    \n```\nfile = open('example.txt', 'r')\n```\n\n这将以读取模式打开文件 'example.txt'。\n\n\
    **read()** 方法用于读取文件的内容。例如：\n\n```\nfile = open('example.txt', 'r')\ncontents =\
    \ file.read()\nprint(contents)\nfile.close()\n```\n\n这会读取文件 'example.txt' 的内容并将其存储在变量\
    \ 'contents' 中，然后打印出来。读取后通过调用 **file.close()** 来关闭文件，这一点很重要。\n\n**write()** 方法用于写入文件。它接受一个字符串作为参数。例如：\n\
    \n```\nfile = open('example.txt', 'w')\nfile.write(\"Hello World!\")\nfile.close()\n\
    ```\n\n这会将字符串 \"Hello World!\" 写入文件 'example.txt'。\n\n**append()** 方法用于在不覆盖现有内容的情况下向文件末尾添加新数据。它的工作方式类似于\
    \ write 方法。例如：\n\n```\nfile = open('example.txt', 'a')\nfile.write(\"\\nThis is\
    \ an added text\")\nfile.close()\n```\n\n这会将 \"This is an added text\" 添加到文件 'example.txt'\
    \ 的末尾，而不会覆盖现有内容。\n\n**with** 语句用于打开一个文件，并在你使用完毕后自动关闭它。这被认为是避免文件未关闭错误的最佳实践。例如：\n\
    \n```\nwith open('example.txt', 'r') as file:\n    contents = file.read()\n  \
    \  print(contents)\n```\n\n这将以读取模式打开文件 'example.txt'，读取其内容并打印出来，然后在完成后自动关闭文件。\n\
    \n**readline()** 方法用于从文件中读取单行。例如：\n\n```\nwith open('example.txt', 'r') as file:\n\
    \    line = file.readline()\n    print(line)\n```\n\n这会读取文件 'example.txt' 的第一行并打印出来。\n\
    \nPython 中的文件处理允许你从计算机文件系统读取文件和写入文件。Python 提供了多种内置函数和方法来处理文件。"

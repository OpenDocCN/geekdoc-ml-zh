  md: '# 7.2 UNDERSTANDING THE BIAS-VARIANCE TRADE-OFF


    The bias-variance trade-off is a fundamental concept in machine learning and refers
    to the trade-off between the ability of a model to fit the training data well
    (low bias) and its ability to generalize well to unseen data (low variance).


    Bias refers to the error introduced by approximating a real-life problem, which
    may be extremely complex, with a simpler model. High bias models are often oversimplified,
    which leads to poor performance on the training set and high error on the test
    set. You can check in the below chart that when bias is decreasing, complexity
    of model is increasing.


    On the other hand, variance refers to the error introduced by the model''s sensitivity
    to small fluctuations in the training set. High variance models are often too
    complex, which leads to overfitting and poor performance on the test set.


    A good model should have a balance of both low bias and low variance. However,
    it is often difficult to find a model that satisfies both. In practice, it is
    often necessary to make a trade-off between bias and variance by adjusting model
    complexity.'
  merge: -1
  pgno: 427
- img_proc: true
  md: 'For example, a decision tree can have a very low bias, as it can fit the training
    data well, but it also has a high variance, as it is sensitive to small fluctuations
    in the training set. On the other hand, a linear regression model has a high bias,
    as it is a simple model, but it also has a low variance, as it is not sensitive
    to small fluctuations in the training set.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_428_0.png)


    TO FIND THE BEST BALANCE between bias and variance, different techniques can be
    used such as cross-validation, ensemble methods and regularization.


    Regularization is a technique used to reduce the variance of a model by adding
    a penalty term to the cost function, which helps to prevent overfitting.'
  merge: -1
  pgno: 428

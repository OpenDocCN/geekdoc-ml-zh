    然后，我们使用shap库中的不同绘图函数来可视化结果。**summary_plot**绘制每个特征在所有实例上的平均贡献，**dependence_plot**绘制特定实例中某个特征与预测之间的关系，**force_plot**提供每个特征对特定实例预测贡献的交互式可视化。



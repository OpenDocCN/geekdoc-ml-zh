    numbers = [3, 1, 4, 2, 5]


    sorted_numbers = **sorted(numbers)**


    **print(sorted_numbers)**

    ```


    THIS WILL OUTPUT [1, 2, 3, 4, 5].


    The **filter()** function is used to filter the elements of a list based on a
    certain condition. It returns an iterator, which can be converted to a list. For
    example:


    ```

    numbers = [1, 2, 3, 4, 5]


    even_numbers = **filter(lambda x: x % 2 == 0, numbers)**


    **print(list(even_numbers))**

    ```



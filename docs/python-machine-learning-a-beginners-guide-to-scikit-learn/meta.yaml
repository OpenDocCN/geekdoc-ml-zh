    ## 7.4 将数据划分为训练集和测试集


    将数据划分为训练集和测试集是机器学习中的一项基本技术，用于评估模型的性能。其基本思想是将可用数据分为两部分：训练集和测试集。模型在训练集上进行训练，其性能在测试集上进行评估。这使我们能够估计模型在未见数据上的表现，这对于确定模型泛化到新数据的能力至关重要。


    有几种将数据划分为训练集和测试集的方法，其中最流行的是：


    ### 简单随机抽样


    简单随机抽样是一种将数据划分为训练集和测试集的方法，其中数据按固定比例随机分为两组。当数据量较大，且目标是获得具有代表性的数据样本用于训练和测试时，通常使用此方法。


    简单随机抽样的过程很简单：


    1.  首先，随机打乱数据以消除任何顺序或模式。

    2.  然后，选择一个固定的划分比例（例如，80%用于训练，20%用于测试）。

    3.  接下来，根据选定的比例随机选择数据样本，该样本用作训练集。

    4.  剩余的数据用作测试集。


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_439_0.png)


    简单随机抽样是一种简单直接的数据划分方法，易于实现。但是，它可能不适用于类别分布不平衡的数据集或小型数据集。在这些情况下，分层抽样可能是更好的选择。


    重要的是要记住，使用简单随机抽样时，训练集和测试集可能无法代表整个数据集。因此，在划分之前随机打乱数据非常重要，以确保样本具有整个数据集的代表性。


    **一个例子**是在创建机器学习模型将电子邮件分类为垃圾邮件或非垃圾邮件时，可以看到简单随机抽样。假设我们有一个包含10,000封电子邮件的数据集，其中7,000封不是垃圾邮件，3,000封是垃圾邮件。我们希望将数据划分为训练集和测试集。


    1.  首先，我们随机打乱数据以消除任何顺序或模式。

    2.  接下来，我们选择一个固定的划分比例，假设是80%用于训练，20%用于测试。

    3.  我们随机选择8,000封电子邮件（占总电子邮件的80%）作为训练集，2,000封电子邮件（占总电子邮件的20%）作为测试集。

    4.  我们使用训练集来训练我们的机器学习模型，并使用测试集来评估其性能。


    需要注意的是，在这个例子中，80%用于训练和20%用于测试的划分比例是任意的，可以根据项目的具体需求进行调整。


    在这个例子中，我们使用了简单随机抽样将数据划分为训练集和测试集。我们随机打乱数据以消除任何顺序或模式，并选择了80%用于训练和20%用于测试的固定比例。通过使用此方法，我们可以使用训练集来训练我们的机器学习模型，并使用测试集来评估其性能。这种方法简单直接，易于实现，但它可能不适用于类别分布不平衡的数据集或小型数据集。


    以下是使用Python **sklearn.model_selection** 模块中的 **train_test_split** 函数实现简单随机抽样的一个示例：


    ```python

    import numpy as np


    from sklearn.model_selection import train_test_split


    # Generate a random dataset with 1000 rows and 5 columns

    X = np.random.rand(1000, 5)


    # Generate a random target variable with 1000 rows

    y = np.random.rand(1000)


    # Split the dataset into training and testing sets

    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.3, random_state=42)


    # Print the number of rows in the training and testing sets

    print("Number of rows in the training set:", len(X_train))

    print("Number of rows in the testing set:", len(X_test))

    ```


    ```

    Number of rows in the training set: 700

    Number of rows in the testing set: 300

    ```


    在这个例子中，我们首先导入必要的模块，包括 **numpy** 和 **sklearn.model_selection**。然后，我们生成一个包含1000行和5列的随机数据集，以及一个包含1000行的随机目标变量。


    接下来，我们使用 **train_test_split** 函数将数据集划分为训练集和测试集。我们通过设置 **test_size=0.3** 指定使用30%的数据进行测试，并通过设置
    **random_state=42** 将随机种子设置为42，以确保划分是可重现的。


    最后，我们打印训练集和测试集的行数，以验证划分是否正确执行。


    简单随机抽样是机器学习中用于将数据集划分为训练集和测试集的常用技术。它涉及随机选择一部分数据用于测试，而剩余的数据用于训练。这确保了测试集具有整个数据集的代表性，并可用于评估机器学习模型的性能。**sklearn.model_selection**
    中的 **train_test_split** 函数使得在Python中执行简单随机抽样变得容易。


    > 在划分之前随机打乱数据非常重要，以确保样本具有整个数据集的代表性。


    ### 分层抽样


    分层抽样是一种将数据划分为训练集和测试集的方法，其中数据以**保持目标变量在两个集合中的比例**的方式进行划分。当数据不平衡时，即目标变量在不同类别中的分布不成比例时，此方法很有用。


    分层抽样的过程如下：


    1.  首先，根据目标变量的值将数据划分为不同的层。

    2.  接下来，选择一个固定的划分比例（例如，80%用于训练，20%用于测试）。

    3.  然后，根据选定的比例从每个层中随机选择数据样本，这些样本组合形成训练集。

    4.  剩余的数据用作测试集。


    当数据不平衡时，分层抽样很有用。使用简单随机抽样时，训练集和测试集可能无法保持与整个数据集相同的目标变量比例。这可能导致模型产生偏差和不准确的预测。通过使用分层抽样，我们确保训练集和测试集具有与整个数据集相同的目标变量比例。


    重要的是要记住，使用分层抽样时，样本量可能不足以代表整个数据集。因此，使用足够大的样本量以确保样本具有整个数据集的代表性非常重要。


    **一个例子**是在创建机器学习模型将信用卡申请分类为批准或拒绝时，可以看到分层抽样。假设我们有一个包含10,000份申请的数据集，其中7,000份被批准，3,000份被拒绝。我们希望将数据划分为训练集和测试集。


    1.  首先，我们根据目标变量的值（在这种情况下是批准或拒绝）将数据划分为不同的层。

    2.  接下来，我们选择一个固定的划分比例，假设是80%用于训练，20%用于测试。

    3.  我们随机选择5,600份被批准的申请（占总被批准申请的80%）和2,400份被拒绝的申请（占总被拒绝申请的80%）作为训练集。

    4.  我们将剩余的1,400份被批准的申请（占总被批准申请的20%）和600份被拒绝的申请（占总被拒绝申请的20%）用作测试集。

    5.  我们使用训练集来训练我们的机器学习模型，并使用测试集来评估其性能。'

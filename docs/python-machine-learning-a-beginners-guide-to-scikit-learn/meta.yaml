    fig2, axes2 = plt.subplots(3, sharex=True, figsize=(8, 8))

    ax4, ax5, ax6 = axes2

    ax4.plot(S_hat[:, 0], color=''r'')

    ax4.set_title(''Recovered Signal 1'')

    ax5.plot(S_hat[:, 1], color=''g'')


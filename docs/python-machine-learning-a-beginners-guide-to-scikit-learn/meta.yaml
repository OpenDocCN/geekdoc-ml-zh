    ## Handling outliers


    Handling outliers is an important step in data preprocessing as it can have a
    significant impact on the performance of machine learning models. Outliers are
    observations that deviate significantly from the majority of the data. They can
    occur for various reasons, such as measurement errors, data entry errors, or data
    from a different distribution.


    There are several techniques for handling outliers, including:


    - 1. **Removing outliers**: This method involves identifying and removing observations
    that deviate significantly from the majority of the data. This method can be useful
    when the number of outliers is small, but it can result in a loss of important
    information if a large number of observations are removed.

    - 2. **Transforming the data**: This method involves transforming the data using
    techniques such as log transformation, square root transformation, or reciprocal
    transformation to reduce the impact of outliers.

    - 3. **Imputing outliers**: This method involves replacing outliers with a substitute
    value, such as the mean, median, or mode of the variable. This method can be useful
    when the number of outliers is small, but it can introduce bias if the outliers
    are not missing at random.

    - 4. **Using robust models**: This method involves using models that are less
    sensitive to outliers such as decision trees or linear discriminant analysis.


    We can do this using the following code snippet in python using the scikit-learn
    library:


    ```python

    from sklearn.covariance import EllipticEnvelope


    # Import the data

    data = pd.read_csv("example_data.csv")

    X = (data.drop(columns =["EMPLOYEE_ID", "FIRST_NAME", "LAST_NAME",

    "EMAIL",

    "PHONE_NUMBER", "HIRE_DATE", "JOB_ID",

    "COMMISSION_PCT",

    "MANAGER_ID", "DEPARTMENT_ID", "SALARY"],

    axis=1))


    ############## Handling missing values #################


    # Create an imputer object

    imputer = SimpleImputer(strategy="mean")


    # Fit the imputer object to the data

    imputer.fit(X)


    # Transform the data

    X_imputed = imputer.transform(X)

    X = X_imputed


    ############## Handling outliers #################


    # Create an EllipticEnvelope object

    outlier_detector = EllipticEnvelope(contamination=0.05)


    # Fit the outlier detector to the data

    outlier_detector.fit(X)


    # Predict the outliers

    y_pred = outlier_detector.predict(X)


    # Identify the outliers

    outliers = X[y_pred == -1]

    ```


    In this example, the first line imports the EllipticEnvelope class from the scikit-learn
    library. The second line imports the data from the "example_data.csv" file and
    stores it in a variable called "data". The third line separates the predictor
    variables (X) and non-numeric variable from the target variable. After that, we
    handle missing values as described in previous section.


    The next line after comment (############### Handling outliers ####################)
    creates an outlier detector object and sets the contamination parameter to 0.05
    which means that 5% of the data is considered as outliers. The next line fits
    the outlier detector to the data. The next line uses the predict method to identify
    the observations that deviate significantly from the majority of the data. The
    next line identifies the outliers by using the predictions from the outlier detector.


    It''s important to keep in mind that the chosen method for handling outliers should
    be based on the specific characteristics of the data and the research question.
    Additionally, it''s also important to check the distribution of the data after

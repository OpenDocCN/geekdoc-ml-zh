    # K-means Clustering


    K-MEANS CLUSTERING is a method of cluster analysis that partitions the data set
    into k clusters by minimizing the sum of squared distances between each data point
    and the centroid of its cluster. The algorithm starts by randomly assigning each
    data point to one of the k clusters, and then iteratively updates the centroids
    and re-assigns the data points to the closest cluster until convergence.


    Here''s an example of how to perform cluster analysis using K-Means algorithm
    in Python:


    ```

    # Import libraries


    import numpy as np


    import pandas as pd


    import matplotlib.pyplot as plt


    from sklearn.cluster import KMeans


    # Generate some random data


    np.random.seed(123)


    x = np.random.normal(0, 1, 100)


    y = np.random.normal(0, 1, 100)


    z = np.random.normal(0, 1, 100)


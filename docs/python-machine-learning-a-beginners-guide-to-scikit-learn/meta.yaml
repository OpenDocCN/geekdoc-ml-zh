    # Cluster Analysis


    CLUSTER ANALYSIS, ALSO known as clustering, is a technique used in multivariate
    analysis to group a set of objects in a way that objects in the same group (called
    a cluster) are more similar to each other than to those in other groups. The objective
    of cluster analysis is to find a structure or pattern in the data that can be
    useful in discovering relationships or identifying groups within the data.


    Cluster analysis can be used for a wide range of applications in different fields,
    such as market segmentation, image segmentation, anomaly detection, customer profiling,
    biological classification, and many others.


    There are different methods of cluster analysis, but the most common ones are
    hierarchical clustering and k-means clustering.


    # Hierarchical Clustering


    HIERARCHICAL CLUSTERING is a method of cluster analysis that builds a hierarchy
    of clusters by recursively dividing the data set into smaller and smaller groups.
    There are two types of hierarchical clustering: agglomerative and divisive. Agglomerative
    clustering starts with each data point as its own cluster and then successively
    merges the closest pairs of'
  merge: -1
  pgno: 193
- img_proc: true
  md: 'clusters until all the data points belong to a single cluster. Divisive clustering
    starts with all the data points in a single cluster and then successively divides
    the cluster into smaller clusters until each data point belongs to its own cluster.


    Here''s an example of hierarchical clustering using Python''s **scipy** library:


    ```

    import numpy as np


    from scipy.cluster import hierarchy


    import matplotlib.pyplot as plt


    # Generate some random data


    np.random.seed(123)


    x = np.random.rand(10, 2)


    # Perform hierarchical clustering


    dendrogram = hierarchy.dendrogram(hierarchy.linkage(x, method=''ward''))


    # Visualize the dendrogram


    plt.title(''Hierarchical Clustering Dendrogram'')


    plt.xlabel(''Data point'')


    plt.ylabel(''Distance'')


    plt.show()

    ```'

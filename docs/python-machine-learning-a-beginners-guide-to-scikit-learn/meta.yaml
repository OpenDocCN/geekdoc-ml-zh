    # # 3.3 EXPLORATORY DATA ANALYSIS


    Exploratory Data Analysis (EDA) is a technique used to understand and analyze
    data. The goal of EDA is to gain insights and understand the underlying structure
    of the data, as well as identify any patterns, relationships, or anomalies that
    may be present. EDA is an iterative process, and it is typically the first step
    in the data analysis pipeline. In this section, we will discuss the process of
    EDA, and the various techniques used to explore and understand the data.


    # ## Univariate Analysis


    THE FIRST STEP IN EDA is to perform univariate analysis, which involves **analyzing
    each variable individually**. This helps to understand the distribution of the
    data and identify any outliers or anomalies. Some common techniques used in univariate
    analysis include:


    # ### Descriptive statistics


    DESCRIPTIVE STATISTICS are a crucial part of data analysis that allows us to summarize
    and describe the main characteristics of a dataset. In univariate analysis, descriptive
    statistics are used to summarize and describe the properties of a single variable.'
- md: 'Descriptive statistics in univariate analysis can be classified into two broad
    categories: measures of central tendency and measures of variability.


    ## Measures of Central Tendency


    Measures of central tendency are used to describe the typical or central value
    of a distribution. The most common measures of central tendency are:


    1.  **Mean**: It is the sum of all observations in the dataset divided by the
    total number of observations.

    2.  **Median**: It is the middle value in a dataset. When a dataset has an even
    number of observations, the median is the average of the two middle values.

    3.  **Mode**: It is the value that occurs most frequently in a dataset.


    ## Measures of Variability


    Measures of variability are used to describe the spread or dispersion of the data.
    The most common measures of variability are:


    1.  **Range**: It is the difference between the maximum and minimum values in
    a dataset.

    2.  **Variance**: It is the average of the squared differences of each value from
    the mean.

    3.  **Standard Deviation**: It is the square root of the variance and is used
    to describe the spread of data around the mean.


    Other measures of variability include percentiles, which are used to describe
    the distribution of the data over the entire range.


    Descriptive statistics can be presented using different types of graphical representations
    such as histograms, boxplots, and scatterplots. These visualizations help to identify
    patterns and outliers in the data.


    A common example of univariate analysis is using the Pandas library to calculate
    descriptive statistics of a dataset. The following is an example of how to perform
    univariate analysis on a variable "Age" in a dataset "data":


    ```python

    import pandas as pd


    # Import the data

    data = pd.read_csv("example_data.csv")


    # Extract the variable "Age"

    age = data["AGE"]


    # Calculate descriptive statistics

    print("Mean: ", age.mean())

    print("Median: ", age.median())

    print("Mode: ", age.mode())

    print("Standard Deviation: ", age.std())

    print("Minimum Value: ", age.min())

    print("Maximum Value: ", age.max())

    ```


    In this example, the first line imports the Pandas library and assigns it the
    alias "pd". The second line uses the "read_csv" function provided by Pandas to
    import the data from the "example_data.csv" file and store it in a variable called
    "data".


    The third line uses the bracket notation to extract the variable "AGE" from the
    dataframe and store it in a variable called "age".


    The fourth line uses the mean() function to calculate the mean of the variable
    "Age", the median() function to calculate the median of the variable, the mode()
    function to calculate the mode of the variable, the std() function to calculate
    the standard deviation of the variable, the min() function to calculate the minimum
    value of the variable, and the max() function to calculate the maximum value of
    the variable.


    The results of the descriptive statistics can be used to understand the distribution
    of the variable "Age", for example, if the mean is close to the median, it indicates
    that the variable is distributed normally, if the mean and median are far apart
    it indicates that the variable is distributed skew. The standard deviation can
    also be used to understand the variability of the variable, where a low standard
    deviation indicates that the variable is distributed closely around the mean,
    while a high standard deviation indicates that the variable is distributed widely
    around the mean.


    In this example, we have shown how to perform univariate analysis using the Pandas
    library, specifically calculating descriptive statistics of a variable. This is
    just one of the many techniques that can be used to perform univariate analysis,
    and different methods may work better depending on the characteristics of the
    data.


    In conclusion, descriptive statistics in univariate analysis are essential for
    summarizing and describing the properties of a single variable. These statistics
    provide valuable insights into the distribution of the data and help to identify
    any patterns or outliers. Data analysts and data scientists use these measures
    to make informed decisions about the data and to build models for data prediction
    and forecasting.


    ## Histograms


    Histograms are a graphical representation of the distribution of numerical data.
    They display the frequency or proportion of values that fall within specific ranges
    or bins. In univariate analysis, histograms are used to visualize the distribution
    of a single variable.


    For example, let''s say we have a dataset that contains the heights of a group
    of people. We can create a histogram to visualize the distribution of these heights.
    The histogram will show the frequency or proportion of people with heights in
    each bin.


    To create a histogram in Python, we can use the Matplotlib library. Here''s an
    example code snippet:


    ```python

    import matplotlib.pyplot as plt

    import numpy as np


    # Generate some random data

    data = np.random.normal(size=1000)


    # Create histogram

    plt.hist(data, bins=30, alpha=0.5, color=''b'')


    # Add labels and title

    plt.xlabel(''Height'')

    plt.ylabel(''Frequency'')

    plt.title(''Distribution of Heights'')


    # Show plot

    plt.show()

    ```



  md: '# 4.3 DECISION TREES


    Decision trees are a popular and widely used supervised learning algorithm for
    both classification and regression problems. The algorithm creates a tree-like
    model of decisions and their possible consequences, with the goal of correctly
    classifying or predicting the outcome of new instances.


    At the top of the tree is a root node that represents the entire dataset. The
    root node is then split into two or more child nodes, each representing a subset
    of the data that has certain characteristics. This process continues recursively
    until the leaf nodes are reached, which represent the final decision or prediction.'
  merge: -1
  pgno: 257
- img_proc: true
  md: '![](img/a86802873e5d6145f81c2d3a0cf0e53d_258_0.png)


    One of the main advantages of decision trees is their interpretability. The tree
    structure makes it easy to understand the logic behind the predictions and the
    decision-making process. Additionally, decision trees can handle both categorical
    and numerical data and can handle missing values without the need for imputation.


    However, decision trees also have some limitations. They can easily overfit the
    training data, especially if the tree is allowed to grow deep. To prevent overfitting,
    techniques such as pruning, limiting the maximum depth of the tree, or using ensembles
    of trees like random forests can be used.'
  merge: -1
  pgno: 258
- img_proc: true
  md: 'Decision trees are also sensitive to small changes in the data. A small change
    in the training data can lead to a completely different tree being generated.
    This can be mitigated by using ensembles of trees like random forests, which average
    the predictions of multiple trees to reduce the variance.



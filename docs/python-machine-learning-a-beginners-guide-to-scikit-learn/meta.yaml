    +   - **K-fold cross-validation**: A technique used to evaluate the performance
    of a model by dividing the data into k partitions, training on k-1 partitions,
    and evaluating on the remaining partition. This process is repeated k times, with
    each partition serving as the evaluation set once.


    L


    +   - **L1 regularization**: A technique used to prevent overfitting by adding
    a penalty term to the cost function that is proportional to the absolute value
    of the coefficients. This technique results in sparse solutions, with many coefficients

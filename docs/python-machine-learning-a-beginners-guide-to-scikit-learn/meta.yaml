    # # 3.1 IMPORTING DATA


    Importing and cleaning data is an essential step in the machine learning process.
    The quality and characteristics of the data plays a crucial role in the performance
    of the model, and it is important to ensure that the data is in a format that
    can be understood by the machine learning model. In this section, we will discuss
    the process of importing and cleaning data, and the various techniques used to
    preprocess the data.


    The first step in the data preparation process is to import the data into the
    program. In Python, there are several libraries that can be used to import data,
    including Pandas, NumPy, and CSV.


    **Pandas** is a library that provides easy-to-use data structures and data analysis
    tools. It can be used to import data from a variety of sources, including CSV,
    Excel, and SQL databases.


    **NumPy** is a library for numerical computation that provides support for large,
    multi-dimensional arrays and matrices. It can be used to import data in the form
    of arrays.


    **CSV** (Comma Separated Values) is a common file format for storing data in a
    tabular form. In Python, the CSV module can be used to import data from a CSV

    探索性数据分析（EDA）是一种用于理解和分析数据的技术。EDA的目标是获得洞察并理解数据的底层结构，以及识别可能存在的任何模式、关系或异常。EDA是一个迭代过程，通常是数据分析流程中的第一步。在本节中，我们将讨论EDA的过程，以及用于探索和理解数据的各种技术。


    ### 单变量分析


    EDA的第一步是进行单变量分析，这涉及**单独分析每个变量**。这有助于理解数据的分布并识别任何异常值或异常情况。单变量分析中常用的一些技术包括：



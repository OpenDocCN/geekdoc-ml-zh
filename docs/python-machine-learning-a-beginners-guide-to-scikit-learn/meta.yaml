    ## 7.4 SPLITTING THE DATA INTO TRAINING AND TESTING SETS


    Splitting the data into training and testing sets is a fundamental technique in
    machine learning that is used to evaluate the performance of a model. The basic
    idea is to divide the available data into two parts: a training set and a testing
    set. The model is trained on the training set and its performance is evaluated
    on the testing set. This allows us to get an estimate of how well the model will
    perform on unseen data, which is critical for determining the model''s ability
    to generalize to new data.


    There are several ways to split the data into training and testing sets, with
    the most popular being:


    ### Simple random sampling


    SIMPLE RANDOM SAMPLING is a method for splitting data into training and testing
    sets, where the data is randomly split into two sets with a fixed ratio. This
    method is often used when the data is large, and the goal is to have a representative
    sample of the data for training and testing.


    The process of simple random sampling is straightforward:


    1. First, the data is shuffled randomly to remove any ordering or patterns.

    2. Then, a fixed ratio is chosen for the split (e.g. 80% for training and 20%
    for testing).

    3. Next, a random sample of the data is selected according to the chosen ratio,
    and this sample is used as the training set.

    4. The remaining data is used as the testing set.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_439_0.png)


    Simple random sampling is a simple and straightforward method for splitting data
    and it is easy to implement. However, it may not be suitable for datasets with
    imbalanced class distribution or small datasets. In these cases, stratified sampling
    could be a better choice.


    It''s important to keep in mind that when using simple random sampling, the training
    set and testing set may not be representative of the entire dataset. Therefore,
    it''s important to shuffle the data randomly before splitting, to ensure that
    the samples are representative of the entire dataset.


    **An example** of simple random sampling can be seen when creating a machine learning
    model to classify emails as spam or not spam. Suppose we have a dataset of 10,000
    emails, where 7,000 are not spam and 3,000 are spam. We want to split the data
    into a training set and a testing set.


    1. First, we shuffle the data randomly to remove any ordering or patterns.

    2. Next, we choose a fixed ratio for the split, let''s say 80% for training and
    20% for testing.

    3. We randomly select 8,000 emails (80% of the total emails) as the training set
    and 2,000 emails (20% of the total emails) as the testing set.

    4. We use the training set to train our machine learning model and use the testing
    set to evaluate its performance.


    It''s important to note that in this example, the split ratio of 80% for training
    and 20% for testing is arbitrary, and the ratio can be adjusted to better suit
    the specific needs of the project.


    In this example, we used simple random sampling to split the data into a training
    and testing set. We shuffled the data randomly to remove any ordering or patterns,
    and we chose a fixed ratio of 80% for training and 20% for testing. By using this
    method, we can use the training set to train our machine learning model and use
    the testing set to evaluate its performance. This method is simple and straightforward
    and it''s easy to implement, but it may not be suitable for datasets with imbalanced
    class distribution or small datasets.


    Here is an example of how simple random sampling can be implemented using Python''s
    **train_test_split** function from the **sklearn.model_selection** module:


    ```python

    import numpy as np


    from sklearn.model_selection import train_test_split


    # Generate a random dataset with 1000 rows and 5 columns

    X = np.random.rand(1000, 5)


    # Generate a random target variable with 1000 rows

    y = np.random.rand(1000)


    # Split the dataset into training and testing sets

    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.3, random_state=42)


    # Print the number of rows in the training and testing sets

    print("Number of rows in the training set:", len(X_train))

    print("Number of rows in the testing set:", len(X_test))

    ```


    ```

    Number of rows in the training set: 700

    Number of rows in the testing set: 300

    ```


    IN THIS EXAMPLE, WE start by importing the necessary modules, including **numpy**
    and **sklearn.model_selection**. We then generate a random dataset with 1000 rows
    and 5 columns, and a random target variable with 1000 rows.


    Next, we use the **train_test_split** function to split the dataset into training
    and testing sets. We specify that we want to use 30% of the data for testing by
    setting **test_size=0.3**, and we set the random seed to 42 using **random_state=42**
    to ensure that the split is reproducible.


    Finally, we print the number of rows in the training and testing sets to verify
    that the split was performed correctly.


    Simple random sampling is a commonly used technique in machine learning for splitting
    a dataset into training and testing sets. It involves randomly selecting a subset
    of the data to use for testing, while the remaining data is used for training.
    This ensures that the testing set is representative of the entire dataset and
    can be used to evaluate the performance of a machine learning model. The **train_test_split**
    function in **sklearn.model_selection** makes it easy to perform simple random
    sampling in Python.


    > It''s important to shuffle the data randomly before splitting to ensure that
    the samples are representative of the entire dataset.


    ### Stratified sampling


    STRATIFIED SAMPLING is a method for splitting data into training and testing sets,
    where the data is split into two sets in a way that **preserves the proportion
    of the target variable in both sets.** This method is useful when the data is
    imbalanced, meaning that the target variable has a disproportionate distribution
    among the different classes.


    The process of stratified sampling is as follows:


    1. First, the data is divided into different strata based on the value of the
    target variable.

    2. Next, a fixed ratio is chosen for the split (e.g. 80% for training and 20%
    for testing).

    3. A random sample of the data is then selected from each stratum according to
    the chosen ratio, and these samples are combined to form the training set.

    4. The remaining data is used as the testing set.


    Stratified sampling is useful when the data is imbalanced. With simple random
    sampling, the training set and testing set may not have the same proportion of
    the target variable as the entire dataset. This can lead to bias in the model
    and inaccurate predictions. By using stratified sampling, we ensure that the training
    set and testing set have the same proportion of the target variable as the entire
    dataset.


    It''s important to keep in mind that when using stratified sampling, the sample
    size may not be large enough to represent the entire dataset. Therefore, it''s
    important to use a large enough sample size to ensure that the samples are representative
    of the entire dataset.


    **An example** of stratified sampling can be seen when creating a machine learning
    model to classify credit card applications as approved or denied. Suppose we have
    a dataset of 10,000 applications, where 7,000 are approved and 3,000 are denied.
    We want to split the data into a training set and a testing set.


    1. First, we divide the data into different strata based on the value of the target
    variable, in this case, approved or denied.

    2. Next, we choose a fixed ratio for the split, let''s say 80% for training and
    20% for testing.

    3. We randomly select 5,600 approved applications (80% of the total approved applications)
    and 2,400 denied applications (80% of the total denied applications) as the training
    set.

    4. We use the remaining 1,400 approved applications (20% of the total approved
    applications) and 600 denied applications (20% of the total denied applications)
    as the testing set.

    5. We use the training set to train our machine learning model and use the testing
    set to evaluate its performance.'

    \ MacOS：\n\n- 1. 前往 Python 官方网站 (https://www.python.org/)\n- 2. 点击 \"Downloads\"\
    \ 按钮。\n- 3. 点击 \"MacOS\" 按钮。\n- 4. 点击 \"Latest Python 3 Release\" 按钮。\n\n![](img/a86802873e5d6145f81c2d3a0cf0e53d_55_0.png)\n\
    \n- 1. 点击 \"macOS 64-bit installer\" 按钮下载安装程序。\n- 2. 下载完成后，双击安装程序文件开始安装过程。\n-\
    \ 3. 在安装程序的第一个屏幕上，点击 \"Continue\" 按钮。\n- 4. 在下一个屏幕上，您将被要求确认安装位置。保留默认位置并点击 \"Install\"\

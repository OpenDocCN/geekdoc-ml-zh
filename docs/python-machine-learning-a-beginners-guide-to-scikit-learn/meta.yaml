    ## List of function to clean data


    There are several Python functions that can be used to clean data in a Python
    script, including:


    - 1. **pandas.DataFrame.drop()** - This function can be used to drop specified
    labels from rows or columns. It can be used to drop rows or columns based on their
    index or column name, and can also be used to drop rows or columns based on certain
    conditions.

    - 2. **pandas.DataFrame.fillna()** - This function can be used to fill missing
    values with a specific value or method. It can be used to fill missing values
    with a specific value, such as the mean or median of the data, or it can be used
    to forward-fill or backward-fill missing values.

    - 3. **pandas.DataFrame.replace()** - This function can be used to replace values
    in a DataFrame. It can be used to replace a specific value or a set of values
    with another value or set of values.

    - 4. **pandas.DataFrame.drop_duplicates()** - This function can be used to remove
    duplicate rows from a DataFrame. It can be used to drop duplicate rows based on
    one or more columns and can also be used to keep the first or last occurrence
    of duplicate rows.

    - 5. **pandas.DataFrame.query()** - This function can be used to filter rows of
    a DataFrame based on a Boolean expression. It can be used to filter rows based
    on certain conditions, such as removing rows with missing values or removing rows
    with specific values.

    - 6. **pandas.DataFrame.rename()** - This function can be used to rename columns
    or row indexes of a DataFrame. It can be used to rename one or multiple columns
    or indexes.

    - 7. **pandas.DataFrame.sort_values()** - This function can be used to sort a
    DataFrame by one or more columns. It can be used to sort the data in ascending
    or descending order and can also be used to sort based on multiple columns.

    - 8. **pandas.DataFrame.groupby()** - This function can be used to group rows

    # Feature selection


    FEATURE SELECTION IS a technique in feature engineering that involves selecting
    a subset of the original features based on their relevance or importance for the
    prediction task. The goal is to select a subset of features that contain the most
    informative and useful information, while reducing the dimensionality of the data
    and avoiding the inclusion of irrelevant or redundant features. This can lead
    to improved model performance, faster training times, and more interpretable models.


    There are several ways to perform feature selection, some of which include:'

    \nDegree 20: MSE = 0.004045051566147512\n\n在这个例子中，我们生成了年龄和身高之间具有二次关系的随机数据。我们拟合了次数为1和20的多项式回归模型，并绘制了每个次数的模型预测图。从图中可以看出，次数为20的模型完美拟合了训练数据，但过于复杂，无法很好地泛化到新数据。这一点从次数为20的模型的高均方误差（MSE）值可以明显看出，该值远高于次数为1的模型的MSE值。\n\
    \n### 欠拟合\n\n当模型过于简单，无法捕捉数据中的潜在模式时，就会发生欠拟合。这导致模型在训练数据和新的、未见数据上表现都不佳。当模型不够复杂，无法捕捉特征与目标变量之间的关系时，就会发生欠拟合。\n\

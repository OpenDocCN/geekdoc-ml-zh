    ## Feature scaling


    Feature scaling is a technique in feature engineering that involves transforming
    the scale of a feature to a common range, such as between 0 and 1. This can be
    important for some machine learning algorithms that are sensitive to the scale
    of the input features. Feature scaling is typically applied to the data before
    training a model, and it can have a significant impact on the performance of the
    model.


    There are several ways to perform feature scaling, some of which include:


    ### Min-Max scaling:


    Min-Max scaling scales the data to a specific range, such as [0,1]. It is calculated
    by subtracting the minimum value of the feature from each value and then dividing
    by the range (max-min). This method is sensitive to outliers, so it''s important
    to make sure that the data is cleaned before applying min-max scaling.


    $$X_{new} = \frac{X_i - \min(X)}{\max(x) - \min(X)}$$


    An example of feature scaling using min-max scaling is as follows: Consider a
    dataset that contains information about houses, including the number of bedrooms,
    number of bathrooms, square footage, and price. We would like to use this data
    to train a model to predict the price of a house based on the other features.
    One of the features "Square footage" may have a much larger scale than the other
    features and may not be useful in predicting the price of a house directly. Instead,
    we can scale the "Square footage" feature to a common range using min-max scaling.


    We can do this using the following code snippet in python using the scikit-learn
    library:


    ```python

    import pandas as pd

    from sklearn.preprocessing import MinMaxScaler


    # Import the data

    data = pd.read_csv("house-prices.csv")

    X = data.drop(columns = ["Price", "Neighborhood", "Brick"], axis=1)


    # Initialize the scaler

    scaler = MinMaxScaler()


    # Fit and transform the data

    X_scaled = scaler.fit_transform(X[["SqFt"]])


    print(X_scaled)

    ```



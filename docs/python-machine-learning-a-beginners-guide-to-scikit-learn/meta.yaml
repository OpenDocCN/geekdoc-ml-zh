    4. We predict the cluster labels for each data point using the **predict** method.

    5. Finally, we plot the data points colored by their predicted cluster using **scatter**
    method of matplotlib.


    The resulting plot shows three distinct customer segments based on their purchasing
    behavior: younger customers with lower purchase amounts (cluster 0), older customers
    with higher purchase amounts (cluster 1), and middle-aged customers with moderate
    purchase amounts (cluster 2).


    > GMM algorithm can be applied to many other use cases such as image segmentation,
    anomaly detection, and speech recognition.'

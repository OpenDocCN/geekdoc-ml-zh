    One of the main advantages of K-means is its computational efficiency, as it has
    a linear time complexity with respect to the number of data points. However, it
    also has some limitations. For example, it is sensitive to initial centroid selection
    and assumes that the clusters are spherical, which may not always be the case
    in real-world data.


    An example of using K-means clustering in Python with scikit-learn would be:


    ```

    python

    import numpy as np


    from sklearn.cluster import KMeans


    import matplotlib.pyplot as plt


    # Set random seed for reproducibility

    np.random.seed(42)


    # Generate random dataset with 2 features and 3 clusters

    X = np.random.randn(150, 2)

    X[:50] += 5


    # LIME (Local Interpretable Model-agnostic Explanations)


    LIME (LOCAL INTERPRETABLE Model-agnostic Explanations) is a technique used to
    interpret the predictions of complex machine learning models. It is a model-agnostic
    approach, which means it can be applied to any type of model, regardless of its
    architecture or algorithm.


    The idea behind LIME is to explain the predictions of a model by training a simple
    interpretable model on a small subset of the data, locally around the instance
    of interest. This approach allows us to understand how the model is making its
    predictions, even for instances where the global behavior of the model is not
    clear.


    Here''s how LIME works:'
  - '[PAGE 495]


    +   1. For an instance of interest, a perturbation of the data is generated by
    randomly sampling instances from the dataset and replacing some of the feature
    values of the instance of interest with those of the sampled instances.

    2. A simple interpretable model (e.g. linear regression) is trained on the perturbed
    data.

    3. The coefficients of the interpretable model are used as feature importances
    to explain the prediction of the instance of interest.



    The basic idea behind Bayesian optimization is to use a probabilistic model to
    represent the relationship between the hyperparameters and the performance of
    the model. This model is then used to guide the search for the optimal hyperparameters.
    The model is updated after each iteration with the new data obtained from evaluating
    the model with different hyperparameters.


    The process of Bayesian optimization involves the following steps:


    +   1. Define a probabilistic model that maps hyperparameters to the performance
    of the model.

    2. Sample the next set of hyperparameters to try by optimizing the acquisition
    function.

    3. Train the model using the sampled hyperparameters.

    4. Evaluate the model''s performance on a validation set or using cross-validation.

    5. Update the probabilistic model with the new data.

    6. Repeat steps 2-5 until a stopping criterion is met.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_470_0.png)'

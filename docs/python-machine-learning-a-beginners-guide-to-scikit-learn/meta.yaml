  md: '# 8.8 ADVERSARIAL TRAINING


    Adversarial examples are crafted by adding a small perturbation to the input data
    that is not noticeable to the human eye but can significantly change the model''s
    output. Adversarial training involves generating such examples and training the
    model with them, which makes the model more robust and able to handle adversarial
    attacks.


    One common approach to generate adversarial examples is the Fast Gradient Sign
    Method (FGSM). This method computes the gradient of the loss function with respect
    to the input data and adds a small perturbation in the direction that maximizes
    the loss. The perturbation is scaled by a small value, which controls the magnitude
    of the perturbation.


    Adversarial training involves generating such adversarial examples and incorporating
    them into the training data. During training, the model learns to recognize and
    classify these examples correctly, which improves its ability to handle adversarial
    attacks.


    If cleverhans is not installed on your device, you need to install cleverhans
    by using the below command:


    ```

    pip install cleverhans

    ```


    # Adversarial Training Example'
  merge: -1
  pgno: 618
- img_proc: true
  md: 'LET''S CONSIDER AN EXAMPLE where we generate a random dataset and train a classifier
    using adversarial training. We will use scikit-learn library to generate random
    data and create a SVM classifier. We will then generate adversarial examples using
    the FGSM method and use these examples for adversarial training.


    ```

    import numpy as np


    from sklearn.svm import SVC


    from sklearn.metrics import accuracy_score


    from cleverhans.future.tf2.attacks import fast_gradient_method


    from cleverhans.future.tf2.attacks import projected_gradient_descent


    from cleverhans.future.tf2.attacks import sparse_l1_descent_attack


    from cleverhans.future.tf2.attacks import carlini_wagner_l2_attack


    # Generate random data

    np.random.seed(42)


    X_train = np.random.rand(100, 2)


    y_train = (X_train[:, 0] < X_train[:, 1]).astype(int)


    # Create SVM classifier

    clf = SVC(kernel=''linear'', probability=True)


    # Train SVM classifier on original data

    clf.fit(X_train, y_train)


    y_pred = clf.predict(X_train)

    ```'

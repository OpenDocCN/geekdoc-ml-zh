  md: '# 3.2 CLEANING DATA


    After importing the data, the next step is to clean it. Data cleaning is the process
    of removing or correcting inaccurate, incomplete, or irrelevant data. This step
    is important because the quality of the data can have a significant impact on
    the performance of the machine learning model. The following are some common data
    cleaning techniques:


    **Removing duplicate data**


    REMOVING DUPLICATE data is an important step in data preprocessing as it can improve
    the accuracy and efficiency of machine learning models. Duplicate data can occur
    for various reasons, such as data entry errors, data merging, or data scraping.


    There are several techniques for removing duplicate data, including:


    +   1. **Removing duplicate rows:** This method involves identifying and removing
    duplicate rows based on one or more columns. This method can be useful when the
    duplicate data is limited to a small number of rows.

    2. **Removing duplicate columns:** This method involves identifying and removing
    duplicate columns based on one'
  merge: -1
  pgno: 149
- img_proc: true
  md: 'or more columns. This method can be useful when duplicate data is limited to
    a small number of columns.


    3. **Removing duplicate records based on a subset of columns:** This method involves
    identifying and removing duplicate records based on a subset of columns. This
    method can be useful when duplicate data is limited to a specific subset of columns.


    We can do this using the following code snippet in python using the pandas library:


    ```

    # Import the data

    data = pd.read_csv("example_data.csv")


    # Remove duplicate rows

    data = data.drop_duplicates()


    # Remove duplicate columns

    data = data.loc[:,~data.columns.duplicated()]


    #Remove duplicate records based on a subset of columns


  md: '# 6.1 WHAT IS DEEP LEARNING


    Deep learning is a subfield of machine learning that is inspired by the structure
    and function of the brain, specifically the neural networks that make up the brain.
    It involves training artificial neural networks (ANNs) on a large dataset, allowing
    the network to learn and improve on its own without the need for explicit programming.


    Deep learning models are composed of multiple layers, hence the term "deep" learning.
    Each layer processes and transforms the input data, passing the result to the
    next layer. The final output of the network is a prediction or decision based
    on the input data. The layers in between the input and output layers are called
    hidden layers.


    The most commonly used deep learning architectures are feedforward neural networks,
    convolutional neural networks (CNNs), and recurrent neural networks (RNNs). Feedforward
    neural networks are the simplest type of deep learning model, where data flows
    in one direction from input to output. CNNs are commonly used in image and video
    recognition tasks, as they are able to learn features from the input data in a
    hierarchical manner. RNNs are used in tasks where the input data has a temporal
    dimension, such as speech or video recognition.'
  merge: -1
  pgno: 378
- img_proc: true
  md: 'Deep learning models are trained using a variant of stochastic gradient descent
    algorithm called backpropagation. This algorithm adjusts the weights of the network
    in order to minimize the error between the predicted output and the true output.


    Deep learning has shown to be very effective in many applications such as image
    and speech recognition, natural language processing, and even playing games like
    chess and Go. The ability to automatically learn features from data has led to
    significant improvements in performance in many areas, surpassing traditional
    machine learning techniques in many cases.'
  merge: -1
  pgno: 379
- img_proc: true
  md: '# 6.2 NEURAL NETWORKS


    Neural networks are a set of algorithms that are designed to recognize patterns
    in data. They are inspired by the structure and function of the human brain, and
    are used to model complex relationships between inputs and outputs.


    A neural network is made up of layers of interconnected nodes, also known as neurons.
    These layers are organized into input, hidden, and output layers. The input layer
    receives data, the hidden layers process the data, and the output layer produces
    the final result. Each neuron in a layer is connected to the neurons in the next
    layer through pathways called edges or connections, which are assigned a weight
    value. These weight values are adjusted during the learning process to improve
    the accuracy of the model.'
  merge: -1
  pgno: 380
- img_proc: true
  md: '![](img/a86802873e5d6145f81c2d3a0cf0e53d_381_0.png)


    THE LEARNING PROCESS in a neural network is called training, and it involves adjusting
    the weight values of the edges to minimize the error between the predicted output
    and the actual output. This is done using an optimization algorithm, such as stochastic
    gradient descent, which iteratively updates the weights in the direction that
    reduces the error.


    Neural networks can be used for a variety of tasks, including image and speech
    recognition, natural language processing, and time series forecasting. They are
    particularly useful for problems with large and complex data sets, where traditional

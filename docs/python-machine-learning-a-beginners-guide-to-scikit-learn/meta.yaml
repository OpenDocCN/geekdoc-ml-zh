    ## 4.2 逻辑回归


    逻辑回归是一种监督机器学习算法，用于分类任务。它用于预测一个结果属于特定类别的概率。逻辑回归的目标是找到最佳拟合模型，以描述自变量和因变量之间的关系，其中因变量是二元的（0/1，真/假，是/否）。


    逻辑回归模型是线性回归模型的扩展，主要区别在于结果变量是二分的，并且线性方程使用逻辑函数（也称为sigmoid函数）进行转换。逻辑函数产生一条S形曲线，允许模型预测结果属于一个类别或另一个类别的概率。线性回归和逻辑回归之间的区别可以从下面的可视化中看出：


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_253_0.png)


    逻辑回归模型使用概率阈值来估计给定输入属于特定类别的概率。如果预测概率大于阈值，则将输入分类为属于该类别。否则，它被分类为不属于该类别。


    逻辑回归的主要优点之一是它易于实现和解释。它不需要大样本量，并且对噪声和异常值具有鲁棒性。然而，如果自变量的数量相对于观测值的数量较大，它可能容易过拟合。逻辑回归被用于医疗保健、市场营销和社会科学等多个领域，以预测某个事件发生的可能性。


    编码示例：


    以下是使用Python的Scikit-learn库实现逻辑回归的示例：


    ```python

    import numpy as np


    from sklearn.linear_model import LogisticRegression


    from sklearn.model_selection import train_test_split


    # Generate random dataset


    np.random.seed(123)


    age = np.random.normal(40, 10, 100)


    income = np.random.normal(50000, 10000, 100)


    education = np.random.choice([0, 1], size=100)


    # Define dependent and independent variables


    X = np.column_stack((age, income, education))


    y = np.random.choice([0, 1], size=100)


    # Split data into training and testing sets


    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2, random_state=123)


    # Create logistic regression model


    model = LogisticRegression()


    # Train the model using the training data


    model.fit(X_train, y_train)


    # Make predictions on the test data


    y_pred = model.predict(X_test)


    # Print the accuracy of the model


    print("Accuracy:", model.score(X_test, y_test))

    ```


    在这个例子中，我们首先生成一个包含三个自变量（年龄、收入和教育）的随机数据集。我们还生成了一个二元结果变量y。然后，我们使用Scikit-learn中的**train_test_split**函数将数据拆分为训练集和测试集。


    接下来，我们使用Scikit-learn中的**LogisticRegression**函数创建一个逻辑回归模型。然后，我们通过调用**fit**函数并传入自变量和结果变量，使用训练数据训练模型。


    模型训练完成后，我们可以通过调用**predict**函数并传入自变量来对测试数据进行预测。最后，我们使用**score**函数打印模型在测试数据上的准确度。


    代码的输出将是逻辑回归模型在测试数据上的准确度。


    逻辑回归的一个关键特征是它估计一个实例属于特定类别的概率。概率最高的类别就是该实例被分配到的类别。这使得逻辑回归成为二元分类问题（如垃圾邮件检测和医疗诊断）的热门选择。


    逻辑回归算法通过最大化给定模型参数的观测数据的似然性来进行训练。模型参数的最大似然估计随后用于对新数据进行预测。


    逻辑回归的主要优点之一是它是一个简单且可解释的模型。它易于理解和解释输入特征与输出类别之间的关系。它还具有低方差，使其比其他模型更不容易过拟合。


    然而，逻辑回归确实有一些局限性。它假设输入特征和输出类别之间的关系是线性的，这对于所有问题可能并非如此。此外，它对异常值敏感，当数据高度不平衡时可能表现不佳。


    ## 4.3 决策树


    决策树是一种流行且广泛使用的监督学习算法，用于分类和回归问题。该算法创建一个树状的决策模型及其可能的结果，目标是正确分类或预测新实例的结果。


    树的顶部是一个根节点，代表整个数据集。然后，根节点被拆分为两个或多个子节点，每个子节点代表具有某些特征的数据子集。这个过程递归进行，直到达到叶节点，叶节点代表最终的决策或预测。'

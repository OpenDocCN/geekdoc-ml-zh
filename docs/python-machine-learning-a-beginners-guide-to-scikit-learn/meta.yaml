    ## 8.1 集成学习方法的类型


    集成学习是机器学习中的一种技术，它组合多个单独的模型，以实现比任何单个模型更好的预测性能。在机器学习中可以使用不同类型的集成学习方法，每种方法都有其自身的优点和缺点。在本文中，我们将列出不同类型的集成学习方法。



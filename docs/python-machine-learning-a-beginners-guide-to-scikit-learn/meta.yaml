    # What is R2 Score?


    R2 SCORE, ALSO KNOWN as the coefficient of determination, is a statistical measure
    that represents the proportion of variance in the dependent variable that can
    be explained by the independent variable(s).


    R2 score is a value between 0 and 1, where a value of 1 indicates that the model
    perfectly fits the data, while a value of 0 indicates that the model does not
    explain any of the variability in the data.


    The formula for R² score is:'
  - '[PAGE 247]


    $R^2 = 1 - \frac{\text{unexplained variation}}{\text{total variation}} = 1 - \frac{\sum_i
    (y_i - \hat{y}_i)^2}{\sum_i (y_i - \bar{y})^2}$


    Here''s an example of calculating the R2 score using Python:


    ```

    from sklearn.linear_model import LinearRegression


    from sklearn.metrics import r2_score


    import numpy as np


    # Generate some random data

    x = np.array([1, 2, 3, 4, 5, 6])

    y = np.array([2, 4, 5, 6, 7, 8])


    # Fit a linear regression model

    model = LinearRegression().fit(x.reshape(-1,1), y)


    # Predict the y values using the model

    y_pred = model.predict(x.reshape(-1,1))


    # Calculate the R2 score

    r2 = r2_score(y, y_pred)


    print(f"R2 score: {r2}")

    ```



    clf3 = SVC(kernel=''linear'', probability=True, random_state=42)


    # Define the Voting Classifier


    voting_clf = VotingClassifier(estimators=[(''dt'', clf1), (''lr'', clf2), (''svm'',
    clf3)], voting=''hard'')



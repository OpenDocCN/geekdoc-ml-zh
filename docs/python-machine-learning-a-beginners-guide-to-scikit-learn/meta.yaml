    # 2.7 FUNCTION FOR DICTIONARY


    Python provides a variety of built-in functions that can be used to manipulate
    dictionaries. These functions make it easy to perform common operations on dictionaries,
    such as iterating through keys and values, adding and updating key-value pairs,
    and checking for the existence of a key or value.


    The **len()** function is used to determine the number of key-value pairs in a
    dictionary. For example:


    ```

    person = {"name": "John", "age": 30}


    print(len(person))

    ```


    THIS WILL OUTPUT 2.


    The **keys()** function is used to return a view of all the keys in a dictionary.
    For example:


    ```

    person = {"name": "John", "age": 30}


    print(person.keys())

    ```


    THIS WILL OUTPUT **dict_keys([''name'', ''age''])**'
  - '[PAGE 108]


    The **values()** function is used to return a view of all the values in a dictionary.
    For example:


    ```

    person = {"name": "John", "age": 30}

    print(person.values())

    ```


    THIS WILL OUTPUT **dict_values([''John'', 30])**


    The **items()** function is used to return a view of all the key-value pairs in
    a dictionary as a list of tuple. For example:


    ```

    person = {"name": "John", "age": 30}

    print(person.items())

    ```


    THIS WILL OUTPUT **dict_items([(''name'', ''John''), (''age'', 30)])**


    The **get()** function is used to retrieve the value of a key in a dictionary.
    If the key is not found, it returns None or a default value that can be specified
    as an argument. For example:


    ```

    person = {"name": "John", "age": 30}

    print(person.get("name")) # Output: John

    print(person.get("address", "Unknown")) # Output: Unknown

    ```'
  - '[PAGE 109]


    THE **update()** function is used to update the key-value pairs of a dictionary.
    It can take another dictionary or key-value pairs as argument. For example:


    ```

    person = {"name": "John", "age": 30}

    person.update({"name": "Jane", "gender": "female"})

    print(person) # Output: {''name'': ''Jane'', ''age'': 30, ''gender'': ''female''}

    ```


    THE **pop()** function is used to remove a key-value pair from a dictionary. It
    takes the key as an argument and returns the value of the key that was removed.
    If the key is not found, it raises a **KeyError** or return a default value that
    can be specified as an argument. For example:


    ```

    person = {"name": "John", "age": 30}

    print(person.pop("name")) # Output: John

    print(person) # Output: {''age'': 30}

    ```


    THE **in** keyword is used to check if a key or a value exists in a dictionary.
    For example:


    ```

    person = {"name": "John", "age": 30}

    print("name" in person) # Output: True

    print("address" in person) # Output: False

    ```'
  - '[PAGE 110]



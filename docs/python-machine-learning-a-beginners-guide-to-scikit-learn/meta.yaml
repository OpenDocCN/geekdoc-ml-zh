    - 数据准备中使用的技术包括：导入和清洗数据、探索性数据分析、特征工程、数据可视化以及将数据划分为训练集和测试集。

    - 导入数据可以使用诸如 **pandas.read_csv()**、**pandas.read_excel()**、**pandas.read_json()**
    等函数。


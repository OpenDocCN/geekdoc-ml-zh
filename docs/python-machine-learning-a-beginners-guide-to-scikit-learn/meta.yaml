    of the data, as well as identify any patterns, relationships, or anomalies that
    may be present. EDA is an iterative process, and it is typically the first step
    in the data analysis pipeline. In this section, we will discuss the process of
    EDA, and the various techniques used to explore and understand the data.


    # ## Univariate Analysis


    THE FIRST STEP IN EDA is to perform univariate analysis, which involves **analyzing
    each variable individually**. This helps to understand the distribution of the
    data and identify any outliers or anomalies. Some common techniques used in univariate
    analysis include:


    # ### Descriptive statistics


    DESCRIPTIVE STATISTICS are a crucial part of data analysis that allows us to summarize
    and describe the main characteristics of a dataset. In univariate analysis, descriptive
    statistics are used to summarize and describe the properties of a single variable.'
  merge: -1
  pgno: 167
- img_proc: true
  md: 'Descriptive statistics in univariate analysis can be classified into two broad
    categories: measures of central tendency and measures of variability.


    # Measures of Central Tendency


    MEASURES OF CENTRAL tendency are used to describe the typical or central value
    of a distribution. The most common measures of central tendency are:


    +   1. **Mean**: It is the sum of all observations in the dataset divided by the
    total number of observations.

    2. **Median**: It is the middle value in a dataset. When a dataset has an even
    number of observations, the median is the average of the two middle values.

    3. **Mode**: It is the value that occurs most frequently in a dataset.


    # Measures of Variability


    MEASURES OF VARIABILITY are used to describe the spread or dispersion of the data.
    The most common measures of variability are:


    +   1. **Range**: It is the difference between the maximum and minimum values
    in a dataset.'
  merge: -1
  pgno: 168
- img_proc: true
  md: '+   2. **Variance**: It is the average of the squared differences of each value
    from the mean.

    3. **Standard Deviation**: It is the square root of the variance and is used to
    describe the spread of data around the mean.


    Other measures of variability include percentiles, which are used to describe
    the distribution of the data over the entire range.


    Descriptive statistics can be presented using different types of graphical representations
    such as histograms, boxplots, and scatterplots. These visualizations help to identify
    patterns and outliers in the data.


    A common example of univariate analysis is using the Pandas library to calculate
    descriptive statistics of a dataset. The following is an example of how to perform
    univariate analysis on a variable "Age" in a dataset "data":


    ```

    import pandas as pd


    # Import the data

    data = pd.read_csv("example_data.csv")


    # Extract the variable "Age"

    age = data["AGE"]


    # Calculate descriptive statistics

    print("Mean: ", age.mean())

    ```'

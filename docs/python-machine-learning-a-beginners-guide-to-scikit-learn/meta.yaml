- md: '## 5.3 HIERARCHICAL CLUSTERING


    Hierarchical clustering is a type of unsupervised machine learning algorithm used
    for grouping similar data points into clusters. The main idea behind hierarchical
    clustering is to build a hierarchy of clusters in a top-down or bottom-up manner.


    There are two main types of hierarchical clustering: **agglomerative and divisive**.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_305_0.png)


    - Agglomerative hierarchical (bottom-up) clustering starts with each data point
    as its own cluster and iteratively merges the closest clusters together until
    all points are part of a single cluster.

    - Divisive hierarchical (top-down) clustering starts with all data points in a
    single cluster and iteratively splits the cluster into smaller clusters.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_306_0.png)


    One of the main advantages of hierarchical clustering is that it allows for the
    representation of the hierarchy of clusters in a dendrogram, which can be used
    to visualize the relationships between different clusters. Another advantage is
    that it can handle non-linearly separable data and can be used with any distance
    metric.


    However, one of the main disadvantages of hierarchical clustering is that it can
    be computationally expensive and time-consuming, especially for large datasets.
    Additionally, it can be sensitive to the choice of linkage criteria and distance
    metric used. Some commonly used linkage criteria include single linkage, complete
    linkage, average linkage, and Ward linkage.


    An example of hierarchical clustering could be grouping customer data into segments
    for targeted marketing. By using clustering algorithms such as hierarchical clustering
    on customer data, such as their demographics, purchase history, and behavior,
    a company can create segments of similar customers that they can target with tailored
    marketing campaigns.


    Hierarchical clustering is a method of clustering in which clusters are organized
    into a tree-like structure. It is also known as **hierarchical cluster analysis
    (HCA)** or agglomerative clustering.


    Here is an example of how to perform agglomerative and divisive hierarchical clustering
    on a randomly generated dataset using Python and visualize the results with Matplotlib:


    ```python

    import numpy as np

    import matplotlib.pyplot as plt

    from scipy.cluster.hierarchy import dendrogram, linkage


    # Generate random dataset with seed for reproducibility

    np.random.seed(123)

    X = np.random.randn(50, 2)


    # Perform agglomerative clustering

    Z_agg = linkage(X, method=''ward'')


    # Plot dendrogram for agglomerative clustering

    plt.figure(figsize=(10, 5))

    plt.title("Agglomerative Clustering Dendrogram")

    plt.xlabel("Data point index")

    plt.ylabel("Distance")

    dendrogram(Z_agg)

    plt.show()


    # Perform divisive clustering

    Z_div = linkage(X.T, method=''ward'')


    # Plot dendrogram for divisive clustering

    plt.figure(figsize=(10, 5))

    plt.title("Divisive Clustering Dendrogram")

    plt.xlabel("Data point index")

    plt.ylabel("Distance")

    dendrogram(Z_div)

    plt.show()

    ```


    THE OUTPUT WILL LOOK like this:


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_309_0.png)


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_309_1.png)


    In the above example, we first generated a random dataset with 50 data points
    and 2 features using NumPy''s **randn** function with seed 123. We then performed
    agglomerative hierarchical clustering using the **linkage** function from **scipy.cluster.hierarchy**
    module with the **ward** method, which minimizes the variance of the distances
    between the clusters being merged. The resulting hierarchical structure is visualized
    with a dendrogram using Matplotlib''s **dendrogram** function.


    Next, we performed divisive hierarchical clustering by transposing the dataset
    and performing agglomerative clustering on it. This effectively treats the features
    as data points and the data points as features. The resulting hierarchical structure
    is also visualized with a dendrogram using Matplotlib.


    Agglomerative clustering starts with each data point in its own cluster and merges
    the most similar clusters at each step until all data points belong to the same
    cluster. Divisive clustering starts with all data points in a single cluster and
    recursively divides the cluster into smaller and smaller clusters until each data
    point is in its own cluster.


    The choice of linkage method can greatly affect the resulting clusters and dendrogram
    structures, and different linkage methods may be more appropriate for different
    datasets and clustering objectives. If we just change the linkage method in the
    code above, the result will look completely different:


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_311_0.png)


    It''s important to note that hierarchical clustering is a form of clustering that
    builds a hierarchy of clusters, with each node in the hierarchy representing a
    cluster. The leaves of the hierarchy are the individual data points, and each
    node is connected to its parent by a linkage criterion, such as single linkage,
    complete linkage, etc.


    ## 5.4 DBSCAN


    DBSCAN (Density-Based Spatial Clustering of Applications with Noise) is a density-based
    clustering algorithm that is used to identify clusters of arbitrary shapes in
    large datasets. It is particularly useful when the data is not well-separated,
    and traditional clustering methods like K-means and hierarchical clustering may
    not work well.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_312_0.png)


    THE BASIC IDEA BEHIND DBSCAN is to group together data points that are close to
    each other in the feature space, based on a distance metric and a density threshold.
    The algorithm starts by picking a random data point, and then looks for all the
    points within a certain distance (eps) of that point. If a minimum number (min_samples)
    of points are found within that distance, then a cluster is formed. The process
    is then repeated for all the points in the cluster, until no more points can be
    added. Points that are not part of any cluster are considered as noise.


    One of the key advantages of DBSCAN is that it can find clusters of **arbitrary
    shapes**, unlike K-means and hierarchical clustering that assume clusters to be
    spherical or hierarchical in shape. Additionally, DBSCAN does not require prior
    knowledge of the number of clusters in the data, as it automatically detects the
    number of clusters based on the density of the data.


    However, one of the major disadvantages of DBSCAN is that it is sensitive to the
    choice of parameters, particularly eps and min_samples. Choosing the right values
    for these parameters can be difficult and requires some experimentation. Additionally,
    DBSCAN can be sensitive to the scale of the data, and may not work well when the
    data has varying densities or different types of features.


    In Python, DBSCAN can be implemented using the scikit-learn library. The DBSCAN
    class in scikit-learn requires two main parameters: eps and min_samples. The eps
    parameter defines the maximum distance between two points for them to be considered
    as part of the same cluster, while the min_samples parameter defines the minimum
    number of points required to form a cluster. The algorithm can also take an optional
    metric parameter, which specifies the distance metric to use (default is Euclidean
    distance).


    ### Example:


    HERE''S A REAL-LIFE example of how DBSCAN can be used to cluster customer data
    based on their purchasing behavior in a retail store.


    Suppose a retail store has collected data on customers'' purchasing behavior,
    including the amount spent, the number of items purchased, and the time spent
    in the store. The store wants to use this data to segment customers into different
    groups based on their purchasing behavior. DBSCAN can be used to identify groups
    of customers that have similar purchasing behavior.


    Let’s see the code below:


    ```python

    import numpy as np

    from sklearn.cluster import DBSCAN

    import matplotlib.pyplot as plt


    # Generate random data

    np.random.seed(0)

    X = np.random.rand(100, 2)

    ```'
  mdcn: '## 5.3 层次聚类


    层次聚类是一种无监督机器学习算法，用于将相似的数据点分组到簇中。其核心思想是以自顶向下或自底向上的方式构建簇的层次结构。


    层次聚类主要有两种类型：**凝聚型和分裂型**。


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_305_0.png)


    -   凝聚型层次（自底向上）聚类从每个数据点作为其自身的簇开始，迭代地合并最接近的簇，直到所有点都属于一个簇。

    -   分裂型层次（自顶向下）聚类从所有数据点在一个簇中开始，迭代地将簇分裂成更小的簇。


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_306_0.png)


    层次聚类的主要优点之一是它允许以树状图的形式表示簇的层次结构，可用于可视化不同簇之间的关系。另一个优点是它可以处理非线性可分的数据，并且可以使用任何距离度量。


    然而，层次聚类的主要缺点之一是它可能计算成本高昂且耗时，尤其是在大型数据集上。此外，它可能对所使用的连接标准和距离度量的选择敏感。一些常用的连接标准包括单连接、完全连接、平均连接和Ward连接。


    层次聚类的一个例子可以是将客户数据分组为细分市场，用于定向营销。通过对客户数据（如人口统计信息、购买历史和行为）使用聚类算法（如层次聚类），公司可以创建相似客户的细分市场，并针对这些客户开展定制化的营销活动。


    层次聚类是一种将簇组织成树状结构的聚类方法。它也被称为**层次聚类分析（HCA）**或凝聚型聚类。


    以下是一个使用Python在随机生成的数据集上执行凝聚型和分裂型层次聚类，并使用Matplotlib可视化结果的示例：


    ```python

    import numpy as np

    import matplotlib.pyplot as plt

    from scipy.cluster.hierarchy import dendrogram, linkage


    # Generate random dataset with seed for reproducibility

    np.random.seed(123)

    X = np.random.randn(50, 2)


    # Perform agglomerative clustering

    Z_agg = linkage(X, method=''ward'')


    # Plot dendrogram for agglomerative clustering

    plt.figure(figsize=(10, 5))

    plt.title("Agglomerative Clustering Dendrogram")

    plt.xlabel("Data point index")

    plt.ylabel("Distance")

    dendrogram(Z_agg)

    plt.show()


    # Perform divisive clustering

    Z_div = linkage(X.T, method=''ward'')


    # Plot dendrogram for divisive clustering

    plt.figure(figsize=(10, 5))

    plt.title("Divisive Clustering Dendrogram")

    plt.xlabel("Data point index")

    plt.ylabel("Distance")

    dendrogram(Z_div)

    plt.show()

    ```


    输出结果将如下所示：


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_309_0.png)


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_309_1.png)


    在上面的例子中，我们首先使用NumPy的**randn**函数（种子为123）生成了一个包含50个数据点和2个特征的随机数据集。然后，我们使用**scipy.cluster.hierarchy**模块中的**linkage**函数，采用**ward**方法执行了凝聚型层次聚类，该方法最小化被合并簇之间距离的方差。生成的层次结构使用Matplotlib的**dendrogram**函数以树状图的形式可视化。


    接下来，我们通过转置数据集并对其执行凝聚型聚类来执行分裂型层次聚类。这实际上将特征视为数据点，将数据点视为特征。生成的层次结构也使用Matplotlib以树状图的形式可视化。


    凝聚型聚类从每个数据点在自己的簇中开始，并在每一步合并最相似的簇，直到所有数据点属于同一个簇。分裂型聚类从所有数据点在一个簇中开始，并递归地将簇分裂成越来越小的簇，直到每个数据点都在自己的簇中。


    连接方法的选择会极大地影响生成的簇和树状图结构，并且不同的连接方法可能更适合不同的数据集和聚类目标。如果我们只更改上面代码中的连接方法，结果将看起来完全不同：


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_311_0.png)


    需要注意的是，层次聚类是一种构建簇层次结构的聚类形式，层次结构中的每个节点代表一个簇。层次结构的叶子是单个数据点，每个节点通过连接标准（如单连接、完全连接等）与其父节点连接。


    ## 5.4 DBSCAN


    DBSCAN（基于密度的带噪声应用空间聚类）是一种基于密度的聚类算法，用于在大型数据集中识别任意形状的簇。当数据分离度不高，传统的聚类方法（如K-means和层次聚类）可能效果不佳时，它尤其有用。


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_312_0.png)


    DBSCAN背后的基本思想是根据距离度量和密度阈值，将特征空间中彼此接近的数据点分组在一起。该算法从选择一个随机数据点开始，然后查找该点一定距离（eps）内的所有点。如果在该距离内找到至少最小数量（min_samples）的点，则形成一个簇。然后对簇中的所有点重复此过程，直到无法再添加更多点。不属于任何簇的点被视为噪声。


    DBSCAN的一个关键优势是它可以发现**任意形状**的簇，不像K-means和层次聚类那样假设簇是球形或层次结构的。此外，DBSCAN不需要事先知道数据中的簇数量，因为它会根据数据的密度自动检测簇的数量。


    然而，DBSCAN的一个主要缺点是对参数选择敏感，特别是eps和min_samples。为这些参数选择合适的值可能很困难，需要一些实验。此外，DBSCAN可能对数据的尺度敏感，当数据具有不同的密度或不同类型的特征时，可能效果不佳。


    在Python中，可以使用scikit-learn库实现DBSCAN。scikit-learn中的DBSCAN类需要两个主要参数：eps和min_samples。eps参数定义了两个点被视为同一簇一部分的最大距离，而min_samples参数定义了形成簇所需的最小点数。该算法还可以接受一个可选的metric参数，用于指定使用的距离度量（默认是欧几里得距离）。


    ### 示例：


    以下是一个现实生活中的例子，说明如何使用DBSCAN根据顾客在零售店的购买行为对顾客数据进行聚类。


    假设一家零售店收集了顾客购买行为的数据，包括消费金额、购买商品数量和在店内停留的时间。该店希望利用这些数据根据顾客的购买行为将顾客细分为不同的群体。DBSCAN可用于识别具有相似购买行为的顾客群体。


    让我们看看下面的代码：


    ```python

    import numpy as np

    from sklearn.cluster import DBSCAN

    import matplotlib.pyplot as plt


    # Generate random data

    np.random.seed(0)

    X = np.random.rand(100, 2)

    ```'

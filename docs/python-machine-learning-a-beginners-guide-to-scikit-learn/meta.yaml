- md: '## Bivariate Analysis


    Once the univariate analysis is complete, the next step is to perform bivariate
    analysis, which involves **analyzing the relationship between two variables**.
    This helps to understand how the variables are related and identify any patterns
    or correlations in the data. Some common techniques used in bivariate analysis
    include:


    ### Scatter Plots


    In statistical analysis, bivariate analysis refers to the analysis of two variables.
    One common method of visualizing bivariate data is through a scatter plot. A scatter
    plot is a graph in which the values of two variables are plotted along two axes,
    with each individual data point represented by a dot on the graph. The position
    of the dot on the graph indicates the value of the two variables for that particular
    data point.


    For example, suppose we want to analyze the relationship between the height and
    weight of a group of individuals. We can create a scatter plot with height on
    the x-axis and weight on the y-axis, with each individual represented by a dot
    on the graph.


    In the resulting scatter plot, each dot represents a single individual, and the
    position of the dot on the graph indicates both the height and weight of that
    individual. By looking at the scatter plot, we can see the overall pattern of
    the relationship between the two variables.


    If the dots on the graph form a roughly linear pattern, we can say that there
    is a positive correlation between the two variables, which means that as one variable
    increases, so does the other. On the other hand, if the dots on the graph are
    spread out randomly with no discernible pattern, we can say that there is no correlation
    between the two variables.


    In addition to examining the overall pattern of the relationship between the two
    variables, scatter plots can also be used to identify outliers, which are individual
    data points that fall far outside the range of the other data points.


    Here''s an example code for creating a scatter plot using the **matplotlib** library
    in Python:


    ```python

    import matplotlib.pyplot as plt


    # Sample data

    x = [1, 2, 3, 4, 5, 6, 7, 8, 9, 9, 8, 7, 6, 5, 4, 3, 3]

    y = [3, 5, 2, 7, 4, 2, 4, 5, 5, 6, 2, 3, 4, 5, 7, 2, 1]


    # Create scatter plot

    plt.scatter(x, y)


    # Add axis labels and title

    plt.xlabel(''X-axis'')

    plt.ylabel(''Y-axis'')

    plt.title(''Scatter Plot Example'')


    # Show the plot

    plt.show()

    ```


    In this example, we first import the **matplotlib.pyplot** module and create two
    lists of data, **x** and **y**. We then call the **scatter()** function from **matplotlib.pyplot**
    to create the scatter plot using the data.


    Next, we add axis labels and a title to the plot using the **xlabel()**, **ylabel()**,
    and **title()** functions.


    Finally, we call the **show()** function to display the plot.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_182_0.png)


    The resulting scatter plot will have the **x** values on the horizontal axis and
    the **y** values on the vertical axis, with a point representing each pair of
    values. The axis labels and title provide additional information about the data
    being plotted.


    Overall, scatter plots provide a useful way to explore the relationship between
    two variables and identify any patterns or outliers in the data.


    ### Correlation


    In statistics, correlation is a measure of the strength and direction of the relationship
    between two variables. Correlation analysis is used in bivariate analysis to identify
    the extent to which two variables are related to each other.


    For example, suppose we are interested in examining the relationship between the
    age of a car and its price. We can use correlation analysis to determine if there
    is a relationship between these two variables, and if so, whether it is a positive
    or negative relationship.


    Correlation is usually measured using a correlation coefficient, which ranges
    from -1 to +1. A coefficient of +1 indicates a perfect positive correlation, a
    coefficient of -1 indicates a perfect negative correlation, and a coefficient
    of 0 indicates no correlation.


    There are two main types of correlation: Pearson correlation and Spearman correlation.
    Pearson correlation is used when both variables are normally distributed, while
    Spearman correlation is used when one or both variables are not normally distributed.


    Here is an example of using Pearson correlation to examine the relationship between
    the age of a car and its price in Python:


    ```python

    import numpy as np

    import pandas as pd

    import matplotlib.pyplot as plt


    # create a sample dataset

    age = np.array([1, 3, 5, 7, 9])

    price = np.array([10000, 9000, 7000, 5000, 3000])


    # calculate the correlation coefficient

    corr_coef = np.corrcoef(age, price)[0, 1]


    # plot the data and the regression line

    plt.scatter(age, price)

    plt.plot(age, np.poly1d(np.polyfit(age, price, 1))(age))

    plt.xlabel(''Age (years)'')

    plt.ylabel(''Price ($)'')

    plt.title(f''Correlation Coefficient: {corr_coef:.2f}'')

    plt.show()

    ```


    In this example, we first create a sample dataset with the age of the car in years
    and its price in dollars. We then calculate the Pearson correlation coefficient
    using the **np.corrcoef** function, and plot the data using **plt.scatter**. Finally,
    we plot the regression line using **np.polyfit** and **plt.plot**, and display
    the correlation coefficient in the title using string formatting.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_185_0.png)


    The resulting plot shows that there is a strong negative correlation between the
    age of the car and its price, with a correlation coefficient of -0.99. This indicates
    that as the age of the car increases, its price decreases.


    This is just one of the many techniques that can be used to perform bivariate
    analysis, and different methods such as heatmap, line plot, bar plot, etc. may
    work better depending on the characteristics of the data. It''s important to note
    that bivariate analysis is a powerful tool that can be used to identify patterns,
    relationships, and correlations between variables, which can be useful for understanding
    the underlying structure of the data and guiding further analysis.


    ## Multivariate Analysis


    After performing univariate and bivariate analysis, the next step is to perform

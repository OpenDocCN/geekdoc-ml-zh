    ## One-hot encoding


    ONE-HOT ENCODING IS a technique used in feature engineering to represent categorical
    variables as numerical values. It is particularly useful when working with categorical
    variables that have a small number of possible values, also called nominal variables.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_222_0.png)


    In one-hot encoding, a new binary feature is created for each possible value of
    the categorical variable. The value of the new feature is 1 if the original variable
    has that value and 0 (zero) otherwise. For example, if we have a categorical variable
    called "Neighborhood" with three possible values "East", "West", and "North",
    three new binary features will be created: "Neighborhood_East", "Neighborhood_West",
    and "Neighborhood_North". The value of "Neighborhood_East" will be 1 if the original
    Neighborhood variable is "East" and 0 otherwise. The same applies to "Neighborhood_West"
    and "Neighborhood_North".


    We can do this using the following code snippet in python using the pandas library:


    ```python

    import pandas as pd


    # Import the data

    data = pd.read_csv("house-prices.csv")


    # Perform one-hot encoding on the "Neighborhood" variable

    data = pd.get_dummies(data, columns=["Neighborhood"])


    data.head()

    ```



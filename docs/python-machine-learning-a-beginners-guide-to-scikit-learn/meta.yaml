    \ to generalize well to unseen data (low variance).\n\nBias refers to the error\
    \ introduced by approximating a real-life problem, which may be extremely complex,\
    \ with a simpler model. High bias models are often oversimplified, which leads\
    \ to poor performance on the training set and high error on the test set. You\
    \ can check in the below chart that when bias is decreasing, complexity of model\
    \ is increasing.\n\nOn the other hand, variance refers to the error introduced\
    \ by the model's sensitivity to small fluctuations in the training set. High variance\
    \ models are often too complex, which leads to overfitting and poor performance\
    \ on the test set.\n\nA good model should have a balance of both low bias and\
    \ low variance. However, it is often difficult to find a model that satisfies\
    \ both. In practice, it is often necessary to make a trade-off between bias and\
    \ variance by adjusting model complexity.\n\nFor example, a decision tree can\
    \ have a very low bias, as it can fit the training data well, but it also has\
    \ a high variance, as it is sensitive to small fluctuations in the training set.\
    \ On the other hand, a linear regression model has a high bias, as it is a simple\
    \ model, but it also has a low variance, as it is not sensitive to small fluctuations\
    \ in the training set.\n\n![](img/a86802873e5d6145f81c2d3a0cf0e53d_428_0.png)\n\
    \nTO FIND THE BEST BALANCE between bias and variance, different techniques can\
    \ be used such as cross-validation, ensemble methods and regularization.\n\nRegularization\
    \ is a technique used to reduce the variance of a model by adding a penalty term\
    \ to the cost function, which helps to prevent overfitting.\n\nCross-validation\
    \ is a technique used to estimate the performance of a model on unseen data. By\
    \ splitting the data into training and test sets, it is possible to estimate the\
    \ performance of a model on unseen data, which helps to identify overfitting.\n\
    \nEnsemble methods are a set of techniques that combine the predictions of multiple\
    \ models to improve overall performance. Ensemble methods are very powerful, as\
    \ they can reduce both bias and variance.\n\nIn summary, understanding the bias-variance\
    \ trade-off is essential for building good machine learning models. It is important\
    \ to find a balance between bias and variance by adjusting model complexity and\
    \ using techniques such as cross-validation, ensemble methods and regularization.\n\
    \n## 7.3 OVERFITTING AND UNDERFITTING\n\nOverfitting and underfitting are two\
    \ common problems in machine learning. These problems occur when a model is too\
    \ complex or too simple for the data it is trying to fit, resulting in poor performance\
    \ on new, unseen data. In this article, we will discuss overfitting and underfitting\
    \ in detail and provide examples to help understand these concepts.\n\n![](img/a86802873e5d6145f81c2d3a0cf0e53d_430_0.png)\n\
    \n### Overfitting\n\nOVERFITTING OCCURS when a model is too complex and is able\
    \ to fit the training data perfectly but performs poorly on new, unseen data.\
    \ This happens when the model learns the noise in the data rather than the underlying\
    \ pattern. As a result, the model becomes too specific to the training data and\
    \ is unable to generalize to new data.\n\n### Example\n\nSuppose we have a dataset\
    \ that contains the age and height of a group of people. We want to build a model\
    \ that predicts the height of a person given their age. We decide to use a polynomial\
    \ regression model with a degree of 20 to fit the data.\n\n```python\nimport numpy\
    \ as np\nimport matplotlib.pyplot as plt\n\n# Generate random data\nnp.random.seed(42)\n\
    X = np.random.rand(50, 1)\ny = X ** 2 + np.random.randn(50, 1) * 0.1\n\n# Fit\
    \ polynomial regression model\nfrom sklearn.preprocessing import PolynomialFeatures\n\
    from sklearn.linear_model import LinearRegression\nfrom sklearn.metrics import\
    \ mean_squared_error\n\ndegrees = [1, 20]\nfor degree in degrees:\n    poly_features\
    \ = PolynomialFeatures(degree=degree, include_bias=False)\n    X_poly = poly_features.fit_transform(X)\n\
    \    lin_reg = LinearRegression()\n    lin_reg.fit(X_poly, y)\n    y_pred = lin_reg.predict(X_poly)\n\
    \    # Plot data and model predictions\n    plt.scatter(X, y)\n    plt.plot(X,\
    \ y_pred, label='degree={}'.format(degree))\n    plt.legend()\n    plt.show()\n\
    \    # Calculate mean squared error\n    mse = mean_squared_error(y, y_pred)\n\
    \    print('Degree {}: MSE = {}'.format(degree, mse))\n```\n\nTHE OUTPUT WILL\
    \ LOOK like this:\n\n![](img/a86802873e5d6145f81c2d3a0cf0e53d_433_0.png)\n\nDegree\
    \ 1: MSE = 0.013559152877012677\n\n![](img/a86802873e5d6145f81c2d3a0cf0e53d_433_1.png)\n\
    \nDegree 20: MSE = 0.004045051566147512\n\nIN THIS EXAMPLE, WE generate random\
    \ data with a quadratic relationship between age and height. We fit a polynomial\
    \ regression model with degrees of 1 and 20 and plot the model predictions for\
    \ each degree. As we can see from the plots, the model with a degree of 20 fits\
    \ the training data perfectly, but is too complex and does not generalize well\
    \ to new data. This is evident from the high mean squared error (MSE) value of\
    \ the model with a degree of 20, which is much higher than the MSE value of the\
    \ model with a degree of 1.\n\n### Underfitting\n\nUNDERFITTING OCCURS when a\
    \ model is too simple and is unable to capture the underlying pattern in the data.\
    \ This results in poor performance on both the training data and new, unseen data.\
    \ Underfitting occurs when the model is not complex enough to capture the relationship\
    \ between the features and the target variable.\n\n### Example\n\nSuppose we have\
    \ a dataset that contains the age and salary of a group of people. We want to\
    \ build a model that predicts the salary of a person given their age. We decide\
    \ to use a linear regression model to fit the data.\n\n```python\nimport numpy\
    \ as np\nimport matplotlib.pyplot as plt\n\n# Generate random data\nnp.random.seed(42)\n\
    X = np.random.rand(50, 1) * 10\ny = X * 1000 + np.random.randn(50, 1) * 2000\n\
    \n# Fit linear regression model\nfrom sklearn.linear_model import LinearRegression\n\
    from sklearn.metrics import mean_squared_error\n\nlin_reg = LinearRegression()\n\
    lin_reg.fit(X, y)\ny_pred = lin_reg.predict(X)\n\n# Plot data and regression line\n\
    plt.scatter(X, y)\nplt.plot(X, y_pred, color='red')\nplt.title('Underfitting Example')\n\
    plt.xlabel('X')\nplt.ylabel('y')\nplt.show()\n\n# Compute mean squared error\n\
    mse = mean_squared_error(y, y_pred)\nprint(f\"Mean Squared Error: {mse}\")\n```\n\
    \nTHE OUTPUT WILL LOOK like this:\n\n![](img/a86802873e5d6145f81c2d3a0cf0e53d_436_0.png)\n\
    \nTHE CODE FIRST GENERATES random data using the **numpy** library's **rand()**\
    \ function. The data is then used to train a linear regression model using the\

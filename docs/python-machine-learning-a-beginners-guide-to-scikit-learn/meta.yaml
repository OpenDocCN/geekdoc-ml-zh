  - '[PAGE 65]


    **Categorical Data:** Categorical data is data that consists of categories. Examples
    include gender, occupation, and country of origin. Categorical data can be further
    divided into two types: **ordinal and nominal**. Ordinal data is data that can
    be ordered, such as education level (high school, undergraduate, graduate). Nominal
    data is data that cannot be ordered, such as gender (male, female).


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_65_0.png)


    # Unstructured Data


    UNSTRUCTURED DATA IS data that is not organized and is difficult for a computer
    to understand. Examples include text, images, and audio. Unstructured data is
    often more challenging to work with, as it requires additional preprocessing steps
    to convert it into a format that can be understood by a computer. This can include
    text mining, image processing, and audio processing.'
  - '[PAGE 66]


    **Text data** is one of the most common types of unstructured data. It can be
    found in emails, social media posts, and customer reviews. Text data requires
    preprocessing techniques such as tokenization, stemming, and lemmatization to
    convert it into a format that can be understood by a machine learning model.


    **Images and videos** are also common types of unstructured data. They require
    preprocessing techniques such as image processing, object detection, and feature
    extraction to convert them into a format that can be understood by a machine learning
    model.


    # Semi-structured Data


    SEMI-STRUCTURED DATA is a type of data that does not conform to a specific data
    model or schema. It contains elements of both structured and unstructured data.
    Semi-structured data is often represented in a format that can be easily processed
    by computers, such as JSON, XML, or CSV files, but it may not have a fixed structure
    or defined data types.


    One of the main advantages of semi-structured data is its flexibility. Because
    the data does not have to conform to a specific schema, it can be easily modified
    or extended to accommodate new data elements. This makes it well-suited'
  - '[PAGE 67]


    for applications that deal with rapidly changing data or data that has a high
    degree of variability.


    Semi-structured data is commonly used in applications such as web scraping, social
    media analysis, and machine learning. It is also often used as an intermediary
    format for converting data between different systems or applications.


    However, working with semi-structured data can also have some drawbacks. Because
    the data is not well-defined, it can be more difficult to perform certain types
    of analysis, such as querying or joining data across multiple sources. It may
    also require more preprocessing and cleaning before it can be used in a particular
    application.


    An **example** of working with different types of data in machine learning is
    building a model to predict the price of a house based on various features. Let''s
    assume that the dataset contains the following features:


    +   - Sale Price (Target variable)

    - Number of Bedrooms (Numerical Data)

    - Number of Bathrooms (Numerical Data)

    - Size of the House in square feet (Numerical Data)

    - Type of the House (Categorical Data, Nominal)

    - Year Built (Numerical Data)

    - Zipcode (Categorical Data, Nominal)'
  - '[PAGE 68]


    In this example, the target variable is the Sale Price, which is a numerical data
    as it is represented by a number, and we want to predict this variable based on
    other variables.


    The first feature is the number of bedrooms, which is numerical data as it is
    represented by a number. This feature can be used as is in the model, and it can
    be useful in predicting the Sale Price as the number of bedrooms can affect the
    overall size of the house and the price.


    The second feature is the number of bathrooms, which is also numerical data as
    it is represented by a number. This feature can also be used as is in the model,
    and it can be useful in predicting the Sale Price as the number of bathrooms can
    affect the overall amenities of the house and the price.


    The third feature is the size of the house in square feet, which is numerical
    data as it is represented by a number. This feature can also be used as is in
    the model, and it can be useful in predicting the Sale Price as the size of the
    house can affect the overall space of the house and the price.


    The fourth feature is the type of the house, which is categorical data, nominal
    type, as it consists of categories such as "Single Family", "Townhouse", "Apartment"
    etc. This feature can not be used as is in the model, as the model will not be
    able to understand the categorical data. So, we will use one-hot encoding to convert
    this feature into numerical'
  - '[PAGE 69]


    data. One-hot encoding creates a new binary column for each category and assigns
    a value of 1 or 0 depending on whether the category is present in the original
    data or not.


    The fifth feature is the year built, which is numerical data as it is represented
    by a number. This feature can also be used as is in the model, and it can be useful
    in predicting the Sale Price as the age of the house can affect the overall condition
    of the house and the price.


    The sixth feature is the zipcode, which is also categorical data, nominal type,
    as it consists of categories such as "90210", "10001" etc. Similar to the type
    of the house, this feature also needs to be transformed using one-hot encoding.


    Once the data is preprocessed, it can be used to train and test a machine learning
    model, such as a linear regression or a decision tree, to predict the Sale Price
    based on the other features. By understanding the types of data and their characteristics,
    we were able to preprocess the data and feed it into a model for further analysis.


    In this example, we have covered three types of data: numerical, categorical (nominal),
    and unstructured. Understanding the types of data and preprocessing them accordingly
    is an important step in the machine learning process, as it ensures that the data
    is in a format that can be'
  - '[PAGE 70]


    understood by a machine learning model, and that it accurately represents the
    problem we are trying to solve.


    Understanding the different types of data and their characteristics is an important
    step in the machine learning process. It can help in selecting the appropriate
    machine learning algorithms and preprocessing techniques, and in understanding
    the potential issues and challenges that can be encountered when working with
    a dataset. Structured data is easier to work with as it is organized and can be
    easily understood by a computer. Unstructured data is more challenging as it requires
    additional preprocessing steps to convert it into a format that can be understood
    by a machine learning model.'
  - '[PAGE 71]


    # 1.7 TYPES OF MACHINE LEARNING MODELS


    Machine learning models are algorithms that are used to make predictions or take
    decisions based on data. There are several types of machine learning models, each
    with their own strengths and weaknesses. Understanding the different types of
    models is crucial for selecting the right model for a specific problem and for
    interpreting the results of a model. The main types of machine learning models
    are:


    +   1. **Supervised learning**: Supervised learning models are used to make predictions
    based on labeled data. The model is trained on a labeled dataset, where the output
    variable is known. Once the model is trained, it can be used to make predictions
    on new, unseen data. Examples of supervised learning models include linear regression,
    logistic regression, and decision trees.

    2. **Unsupervised learning**: Unsupervised learning models are used to find patterns
    or structure in unlabeled data. The model is not given any labeled data, and instead
    must find patterns and structure on its own. Examples of unsupervised learning
    models include k-means clustering, hierarchical clustering, and principal component
    analysis.'
  - '[PAGE 72]


    3. **Semi-supervised learning**: Semi-supervised learning models are a combination
    of supervised and unsupervised learning. The model is given some labeled data,
    but not enough to fully train the model. The model must use the labeled data and
    the structure of the unlabeled data to make predictions. Examples of semi-supervised
    learning models include self-training and co-training.


    4. **Reinforcement learning**: Reinforcement learning models are used to make
    decisions in an environment where the model is given feedback in the form of rewards
    or penalties. The model learns to make decisions by maximizing the rewards over
    time. Examples of reinforcement learning models include Q-learning and SARSA.


    5. **Deep Learning**: Deep learning models are a subfield of machine learning
    that is inspired by the structure and function of the human brain. These models
    are composed of multiple layers of interconnected nodes, called artificial neurons,
    which can learn and represent highly complex patterns in data. Examples of deep
    learning models include convolutional neural networks, recurrent neural networks,
    and deep belief networks.


    In conclusion, understanding the different types of machine learning models is
    crucial for selecting the right model for a specific problem and for interpreting
    the results of a model.'

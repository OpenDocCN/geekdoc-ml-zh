- md: 'A common example of importing data in Python is using the Pandas library to
    import a CSV file. The following is an example of how to import a CSV file called
    "example_data.csv" using Pandas. The file "example_data.csv" contain employee
    data with following columns:


    EMPLOYEE_ID, FIRST_NAME, LAST_NAME, EMAIL, PHONE_NUMBER, HIRE_DATE, JOB_ID, YEAR_OF_EXP,
    EDUCATION, CERTIFICATION, COMMISSION_PCT, MANAGER_ID, DEPARTMENT_ID, AGE, SALARY


    The file will be available on this book GitHub repository. Here is the code for
    importing the csv file:


    ```

    import pandas as pd


    # Import the data from the CSV file

    data = pd.read_csv("example_data.csv")

    ```


    In this example, the first line imports the Pandas library and assigns it the
    alias "pd". The second line uses the "read_csv" function provided by Pandas to
    import the data from the "example_data.csv" file and store it in a variable called
    "data". The "read_csv" function automatically detects the delimiter (comma) used
    in the CSV file and separates the data into columns and rows.


    Once the data is imported, it can be easily manipulated and analyzed. For example,
    you can view the first five rows of the data using the following code:


    ```

    print(data.head())

    ```


    You can also access specific columns and rows of the data using the following
    code:


    ```

    # Access the column "AGE"

    age = data["AGE"]


    # Access the row with index 2

    row_2 = data.loc[2]

    ```


    In this example, we have shown how to import a CSV file into python using Pandas,
    and also how to access specific columns and rows of the data once imported. Pandas
    is a powerful library that makes it easy to import and manipulate structured data,
    it''s easy to use and understand, it''s widely adopted in data science and machine
    learning, and it is one of the most important libraries for data preparation.


    ## List of function for importing data


    There are several python functions that can be used to import data into a python
    script, including:


    1. **pandas.read_csv()** - This function can be used to import data from a CSV
    file into a pandas DataFrame.

    2. **pandas.read_excel()** - This function can be used to import data from an
    Excel file into a pandas DataFrame.

    3. **pandas.read_json()** - This function can be used to import data from a JSON
    file into a pandas DataFrame.

    4. **pandas.read_sql()** - This function can be used to import data from a SQL
    database into a pandas DataFrame.

    5. **pandas.read_html()** - This function can be used to import data from an HTML
    file into a pandas DataFrame.

    6. **pandas.read_pickle()** - This function can be used to import data from a
    pickle file into a pandas DataFrame.

    7. **pandas.read_fwf()** - This function can be used to import data from a fixed-width-format
    file into a pandas DataFrame.

    8. **pandas.read_stata()** - This function can be used to import data from a STATA
    file into a pandas DataFrame.

    9. **pandas.read_sas()** - This function can be used to import data from a SAS
    file into a pandas DataFrame.

    10. **pandas.read_clipboard()** - This function can be used to import data from
    the clipboard into a pandas DataFrame.


    These are some of the most common functions used for importing data in python
    using pandas library. Depending on the format and source of the data, different
    functions can be used to import it into python.


    In addition, the Pandas library provides many useful functions for data manipulation,
    such as sorting, filtering, and aggregating the data. This makes it a powerful
    tool for data analysis and preparation.


    Once the data is imported, it can be easily manipulated and analyzed.


    To explore the data importing, cleaning and transformation in more detail, you
    can read the book “Python for Data Analysis” by the same author. There we explain
    all the above process and their relevant library such as NumPy, pandas in more
    detail.


    ## 3.2 CLEANING DATA


    After importing the data, the next step is to clean it. Data cleaning is the process
    of removing or correcting inaccurate, incomplete, or irrelevant data. This step
    is important because the quality of the data can have a significant impact on
    the performance of the machine learning model. The following are some common data
    cleaning techniques:


    ### Removing duplicate data


    Removing duplicate data is an important step in data preprocessing as it can improve
    the accuracy and efficiency of machine learning models. Duplicate data can occur
    for various reasons, such as data entry errors, data merging, or data scraping.


    There are several techniques for removing duplicate data, including:


    1. **Removing duplicate rows:** This method involves identifying and removing
    duplicate rows based on one or more columns. This method can be useful when the
    duplicate data is limited to a small number of rows.

    2. **Removing duplicate columns:** This method involves identifying and removing
    duplicate columns based on one or more columns. This method can be useful when
    duplicate data is limited to a small number of columns.

    3. **Removing duplicate records based on a subset of columns:** This method involves
    identifying and removing duplicate records based on a subset of columns. This
    method can be useful when duplicate data is limited to a specific subset of columns.


    We can do this using the following code snippet in python using the pandas library:


    ```

    # Import the data

    data = pd.read_csv("example_data.csv")


    # Remove duplicate rows

    data = data.drop_duplicates()


    # Remove duplicate columns

    data = data.loc[:,~data.columns.duplicated()]



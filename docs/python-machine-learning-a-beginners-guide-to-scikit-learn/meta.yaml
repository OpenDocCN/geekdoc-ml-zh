  mdcn: "## 5.5 高斯混合模型（GMM）\n\n高斯混合模型（GMM）是一种生成式概率模型，它假设所有数据点都来自有限个具有未知参数的高斯分布的混合。它是一种聚类算法，通过假设数据点由具有未知参数的高斯分布混合生成，试图在数据中找到自然的分组。\n\

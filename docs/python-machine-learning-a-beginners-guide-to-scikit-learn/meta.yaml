  md: '# 3.4 FEATURE ENGINEERING


    Feature engineering is the process of transforming raw data into features that
    can be used in a machine learning model. It is a crucial step in the machine learning
    pipeline as the quality and nature of the features can greatly affect the performance
    of the model. The goal of feature engineering is to extract meaningful information
    from the raw data and create new features that can improve the predictive power
    of the model.


    There are many different techniques that can be used in feature engineering, such

    # Stratified sampling'
  - '[PAGE 443]


    STRATIFIED SAMPLING is a method for splitting data into training and testing sets,
    where the data is split into two sets in a way that **preserves the proportion
    of the target variable in both sets.** This method is useful when the data is
    imbalanced, meaning that the target variable has a disproportionate distribution
    among the different classes.


    The process of stratified sampling is as follows:


    +   1. First, the data is divided into different strata based on the value of
    the target variable.

    2. Next, a fixed ratio is chosen for the split (e.g. 80% for training and 20%
    for testing).

    3. A random sample of the data is then selected from each stratum according to
    the chosen ratio, and these samples are combined to form the training set.

    4. The remaining data is used as the testing set.


    Stratified sampling is useful when the data is imbalanced. With simple random
    sampling, the training set and testing set may not have the same proportion of
    the target variable as the entire dataset. This can lead to bias in the model
    and inaccurate predictions. By using stratified sampling, we ensure that the training
    set and testing set have the same proportion of the target variable as the entire
    dataset.


    It''s important to keep in mind that when using stratified sampling, the sample
    size may not be large enough to'

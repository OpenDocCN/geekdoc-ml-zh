    \ data and model predictions\n    plt.scatter(X, y)\n    plt.plot(X, y_pred, label='degree={}'.format(degree))\n\
    \    plt.legend()\n    plt.show()\n    # Calculate mean squared error\n    mse\
    \ = mean_squared_error(y, y_pred)\n    print('Degree {}: MSE = {}'.format(degree,\
    \ mse))\n```\n\n输出将如下所示：\n\n![](img/a86802873e5d6145f81c2d3a0cf0e53d_433_0.png)\n\

    In this example, we first generate some random data using the NumPy library. We
    then create a histogram using the **plt.hist()** function, specifying the number
    of bins to use, the transparency and color of the bars, and other properties.
    We then add labels and a title to the plot and display it using **plt.show()**.


    The resulting histogram will display the distribution of the heights in the data,
    with the x-axis showing the height range and the y-axis showing the frequency
    or proportion of people with heights in that range.


    Histograms are a useful tool in univariate analysis as they allow us to quickly
    visualize the distribution of a variable and identify patterns or outliers in
    the data.


    ## Box Plots


    In statistics, univariate analysis involves the examination of a single variable.
    One way to visually summarize the distribution of a single variable is through
    box plots. A box plot, also known as a box and whisker plot, displays a summary
    of the data''s median, quartiles, and range. This graph is useful in identifying
    outliers and comparing the distribution of different datasets.


    To construct a box plot, you need the minimum value, lower quartile (Q1), median,
    upper quartile (Q3), and maximum value. The interquartile range (IQR) is the distance
    between the upper and lower quartiles. The box represents the IQR, with the median
    shown as a line inside the box. The whiskers extend from the box to the minimum
    and maximum values, excluding outliers.


    ![](img/a86802873e5d6145f81c2d3a0cf0e53d_175_0.png)


    Here is an example of a box plot for a dataset of exam scores:


    Dataset: 40, 60, 70, 75, 80, 85, 90, 95, 100


    Minimum value: 40


    Lower quartile (Q1): 70


    Median: 80


    Upper quartile (Q3): 90


    Maximum value: 100


    IQR: Q3 - Q1 = 20


    ```

    40 60 70 75 80 85 90 95 100

    |___| |___|

    Q1 Median Q3

    ```


    Whiskers: 40 and 100


    Outliers: None


    In this example, the dataset has a minimum value of 40, a lower quartile of 70,
    a median of 80, an upper quartile of 90, and a maximum value of 100. The IQR is
    calculated as 20. The box plot shows that the majority of the data falls between
    70 and 90, with two scores outside this range (75 and 100).


    Box plots can also be used to compare multiple datasets. In the case of multiple
    datasets, each box plot is drawn side by side, making it easy to visually compare
    their median, IQR, and range. This comparison can help to identify differences
    in the distribution of the data.


    Here is an example of how to create a box plot in Python using the Matplotlib
    library:


    ```python

    import matplotlib.pyplot as plt

    import numpy as np


    # generate some random data

    data = np.random.normal(size=100)


    # create a box plot of the data

    fig, ax = plt.subplots()

    ax.boxplot(data)


    # set the title and labels

    ax.set_title(''Box Plot of Random Data'')

    ax.set_ylabel(''Values'')


    # show the plot

    plt.show()

    ```



  md: '# 4.5 CONFUSION MATRIX


    In the field of machine learning, a confusion matrix is a table that is often
    used to describe the performance of a classification model on a set of data for
    which the true values are known. It is a useful tool for evaluating the performance
    of a model and helps in identifying the areas where the model may be making errors.
    In this section, we will discuss the concept of confusion matrix in detail, along
    with an example in Python using the scikit-learn library.


    # What is a Confusion Matrix?


    A CONFUSION MATRIX is a table that is used to evaluate the performance of a classification
    model by comparing the predicted values with the true values. It is a matrix with
    four different values: true positives (TP), false positives (FP), true negatives
    (TN), and false negatives (FN). These values are derived from the predicted and
    true values of the data set. The following table shows the layout of a confusion
    matrix:


    | | ACTUAL POSITIVE | ACTUAL NEGATIVE |

    |---|---|---|

    | Predicted Positive | True Positives (TP) | False Positives (FP) |

    | Predicted Negative | False Negatives (FN) | True Negatives (TN) |'
  merge: -1
  pgno: 272
- img_proc: true
  md: '+   - True Positives (TP): The number of correctly predicted positive instances.

    - False Positives (FP): The number of instances predicted positive but are actually
    negative.

    - False Negatives (FN): The number of instances predicted negative but are actually
    positive.

    - True Negatives (TN): The number of correctly predicted negative instances.



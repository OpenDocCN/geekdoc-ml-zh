    \ numpy as np\nimport matplotlib.pyplot as plt\nfrom sklearn.mixture import GaussianMixture\n\
    \n# Generate random dataset\nnp.random.seed(0)\nn_samples = 500\nX = np.zeros((n_samples,\
    \ 2))\nX[:200, :] = np.random.multivariate_normal(mean=[0, 0], cov=[[1, 0.3],\
    \ [0.3, 2]], size=200)\nX[200:400, :] = np.random.multivariate_normal(mean=[5,\

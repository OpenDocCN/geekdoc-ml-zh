    # 5.1.2 Multiple Linear Regression


    An extension of simple linear regression, multiple linear regression allows correlations
    to be modeled between a dependent variable and several independent variables.
    It suggests that the independent and dependent variables have a linear relationship.
    The model''s equation has the following format:


    $$y = b0 + b1x1 + b2x2 + \dots + bnxn$$


    The dependent variable in this equation is y, while the independent variables
    are x1, x2, . . . , xn. With respect to each independent variable, the coefficients
    (or weights) b0, b1, b2, . . . , bn correspond. Interestingly, the intercept term
    is b0.


    Methods like ordinary least squares (OLS), which minimize the sum of squared discrepancies
    between actual and predicted values, are used to estimate the coefficients. Metrics
    like MSE and R2 are used to assess the model''s performance and determine its
    goodness of fit.


    Multiple linear regression enables the modeling of more intricate relationships
    and interactions among multiple predictors, making it a versatile tool in diverse
    fields such as finance, economics, engineering, and social sciences. However,
    it assumes linearity, independence of predictors, constant variance of errors,
    and normally distributed residuals, all of which should be examined before interpretation.


    A multiple linear regression model''s coefficients are interpreted by evaluating
    each independent variable''s effect on the dependent variable while holding the
    other variables constant. Assuming that all other variables stay constant, the
    coefficients show how the dependent variable changes for every unit change in
    the corresponding independent variable.


    Multiple linear regression can be performed using various methods, each with its
    advantages and disadvantages.


    # The Ordinary Least Squares (OLS) Method


    A popular strategy for fitting a multiple linear regression model to a given dataset
    is ordinary least squares (OLS). Finding the regression model''s coefficients,
    or weights, is its main goal in order to reduce the sum of squared differences
    between the dependent variable''s observed and predicted values. The OLS method
    is computationally efficient and produces objective estimations of the coefficients.'

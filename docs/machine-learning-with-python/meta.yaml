- md: "## 5.6 Principal Component Analysis\n\nPCA, commonly known as Principal Component\
    \ Analysis, is a highly prevalent method employed for the purpose of reducing\
    \ dimensionality in various domains such as machine learning, data mining, and\
    \ signal processing. It is an empirical procedure that converts a dataset with\
    \ a high number of dimensions into a subspace with fewer dimensions, while retaining\
    \ a significant portion of the original data's variability. Especially when confronted\
    \ with datasets with a high number of dimensions, PCA proves to be highly beneficial\
    \ as it aids in simplifying computational complexity, eliminating noise, and facilitating\
    \ data visualization within a lower-dimensional space.\n\n## Mathematical Concepts\
    \ Employed in PCA\n\n**Covariance matrix:** PCA commences by standardizing the\
    \ data in order to achieve a mean of zero and a standard deviation of one for\
    \ each feature. Subsequently, the covariance matrix is calculated to capture the\
    \ associations between pairs of features.\n\nThe computation of the covariance\
    \ between two features xi and xj is performed as follows:\n\n```\ncov(x_i, y_i)\
    \ = 1/(n-1) * Σ_{k=1}^{n} (x_{ki} - x̄_i) (x_{kj} - x̄_j)\n```\n\nwhere n represents\
    \ the total number of samples, xki and xkj denote the values of the ith and jth\
    \ features of the kth sample, and μi and μj correspond to the means of features\
    \ xi and xj, respectively.\n\n## Eigendecomposition\n\nPCA employs eigendecomposition\
    \ on the covariance matrix to ascertain the principal components. The eigenvectors\
    \ of said matrix encapsulate the directions of maximal variance, commonly identified\
    \ as the principal components. Moreover, the corresponding eigenvalues offer vital\
    \ information regarding the proportion of variance elucidated by each distinct\
    \ component.\n\nCovariance Matrix × Eigenvector = Eigenvalue × Eigenvector\n\n\
    Moreover, the eigenvectors are mutually orthogonal and collectively establish\
    \ a fresh foundation for the data.\n\n## Selecting Principal Components\n\n- The\
    \ principal components are ranked in a descending order based on the eigenvalues,\
    \ with the first component capturing the highest amount of variance, followed\
    \ by the second component capturing the second highest amount of variance, and\
    \ so on.\n- It is a widely accepted convention to choose a particular percentage\
    \ of the total variance, such as 90%, as a threshold for determining the number\
    \ of principal components to retain.\n\n## Projection\n\nFinally, the data is\
    \ projected onto the designated principal components in order to acquire the representation\
    \ with reduced dimensions. This projection is accomplished by performing the multiplication\
    \ of the original data matrix with the matrix consisting of the chosen eigenvectors\
    \ (principal components).\n\n## Mathematical Representation\n\n- Let X denote\
    \ the standardized data matrix, which possesses n × m dimensions, with n representing\
    \ the number of samples and m representing the number of features.\n- PCA identifies\
    \ k principal components, whereby k is less than or equal to m, which are characterized\
    \ by the eigenvectors V originating from the covariance matrix of X. The initial\
    \ k principal components are selected with respect to their associated eigenvalues.\n\
    - The reduced-dimensional representation Y of the data is obtained by projecting\
    \ X onto the selected principal components:\n\n$$Y = X \\cdot Vk$$\n\nwhere Vk\
    \ is the matrix of the first k eigenvectors.\n\nPCA is an influential instrument\
    \ utilized for the pre-processing of data, visualization, and the extraction of\
    \ features. Its extensive employment can be witnessed across diverse domains,\
    \ such as machine learning, signal processing, and image analysis. Through its\
    \ mathematical underpinnings, PCA affords valuable perspectives into the inherent\
    \ structure of data with high dimensions, consequently facilitating the computation\
    \ of reduced-dimensional representations in an efficient manner.\n\nPCA finds\
    \ multiple applications, such as the visual representation of data, reduction\
    \ of noise, extraction of features, and compression of data. It is extensively\
    \ utilized as a preliminary step in machine learning pipelines, particularly when\
    \ handling high-dimensional data, for example, images, signals, or textual data.\n\
    \nBelow are the steps to perform PCA:\n\n1. **Data preprocessing:**\n    - Standardization\
    \ of the data is achieved by subtracting the mean value from each feature and\
    \ subsequently dividing by the standard deviation. This crucial step guarantees\
    \ that all features are uniformly scaled and possess equal significance in the\
    \ subsequent analysis.\n2. **Calculate the covariance matrix:**\n    - Compute\
    \ the covariance matrix of the standardized data, whereby the covariance matrix\
    \ denotes the measure of the variance and covariance among the features.\n3. **Calculate\
    \ eigenvectors and eigenvalues:**\n    - Compute the eigenvectors and associated\
    \ eigenvalues of the covariance matrix.\n    - The eigenvectors depict the principal\
    \ components, while the eigenvalues indicate the extent to which each principal\
    \ component captures the variance.\n4. **Sort eigenvectors by eigenvalues:**\n\
    \    - Sort the eigenvectors in descending order based on their corresponding\
    \ eigenvalues.\n    - The principal component that captures the maximum variance\
    \ in the data is the eigenvector associated with the highest eigenvalue.\n5. **Select\
    \ principal components:**\n    - Decide the number of principal components to\
    \ retain by considering the extent of variance you wish to preserve or the intended\
    \ reduction in dimensionality.\n    - One common approach is to choose the top\
    \ k principal components that capture a certain percentage (e.g., 95%) of the\
    \ total variance in the data.\n6. **Project data onto principal components:**\n\
    \    - Project the original data onto the selected principal components by multiplying\
    \ the original data with the chosen eigenvectors.\n    - This procedure converts\
    \ the data from the initial feature space to the subsequent subspace specified\
    \ by the principal components.\n7. **Dimensionality reduction:**\n    - The transformed\
    \ data now exists in the lower-dimensional subspace defined by the selected principal\
    \ components.\n    - If one were to select k principal components, the dimensionality\
    \ of the data would be diminished from the initial number of features to k dimensions.\n\
    8. **Optional: reconstruction or visualization:**\n    - Optionally, it is possible\
    \ to restore the initial data from the diminished representation by performing\
    \ the multiplication of the transformed data with the transposed chosen eigenvectors.\n\
    \    - Visualize the transformed data in the lower-dimensional subspace for exploration\
    \ or interpretation purposes.\n\nIt is important to highlight that PCA is a type\
    \ of unsupervised technique, indicating that it does not take into account any\
    \ class labels or target variables. It solely concentrates on capturing the maximum\
    \ variance in the data, which may or may not be significant for a specific supervised\
    \ learning task.\n\n### 5.6.1 Dimensionality Reduction\n\nDimensionality reduction\
    \ is a crucial technique in the realm of machine learning and data analysis, especially\
    \ when dealing with data that contains a large number of dimensions. The main\
    \ objective of dimensionality reduction is to reduce the number of features or\
    \ dimensions in a dataset while retaining as much relevant information as possible.\n\
    \nThe ultimate goal of dimensionality reduction is to transform data with a high\
    \ number of dimensions into a space with fewer dimensions, making it more manageable\
    \ and computationally efficient. By doing so, it helps overcome the challenges\
    \ posed by the “curse of dimensionality,” which occurs when the complexity of\
    \ the data increases exponentially with the number of dimensions. This, in turn,\
    \ leads to issues like overfitting, increased computational costs, and data sparsity.\n\
    \nThere are two primary approaches to dimensionality reduction: feature selection\
    \ and feature extraction. Feature selection involves choosing a subset of the\
    \ original features, while feature extraction involves creating new features by\
    \ combining or transforming the original ones.\n\nPCA is a commonly used technique\
    \ for feature extraction. It identifies the directions of maximum variance in\
    \ the data and projects the data onto a lower-dimensional subspace defined by\
    \ these directions, known as principal components.\n\nOther notable techniques\
    \ for dimensionality reduction include Linear Discriminant Analysis (LDA), which\
    \ aims to maximize the separability between classes, and t-Distributed Stochastic\
    \ Neighbor Embedding (t-SNE), a non-linear technique suitable for visualizing\
    \ high-dimensional data in a lower-dimensional space.\n\nDimensionality reduction\
    \ has the potential to improve the performance of machine learning models by eliminating\
    \ irrelevant or redundant features, reducing noise, and enhancing the interpretability\
    \ of the data. However, it is important to strike a balance between reducing dimensions\
    \ and preserving essential information for the specific task at hand. Dimensionality\
    \ reduction techniques find extensive use in diverse domains such as image and\
    \ signal processing, text mining, bioinformatics, and recommendation systems,\
    \ among others. They play a fundamental role in data preprocessing, visualization,\
    \ and feature engineering pipelines within the context of machine learning workflows.\n\
    \nFeature selection and feature extraction are two frequently utilized methodologies\
    \ within the domains of machine learning and data analysis, which aim to reduce\
    \ the dimensionality of datasets and amplify the efficacy of models. Herein lies\
    \ an extensive elucidation of each approach:\n\n## Feature Selection\n\nFeature\
    \ selection involves the careful selection of a subset of the original features\
    \ from the dataset, with the exclusion of any features that are deemed irrelevant\
    \ or redundant. The primary objective is to ameliorate model performance by curbing\
    \ overfitting, diminishing computational complexity, and augmenting interpretability.\
    \ The techniques employed for feature selection can be classified into three distinct\
    \ types:\n\n- **Filter Methods:** Filter methods assess the relevance of features\
    \ independently of the chosen learning algorithm. Standard techniques encompass\
    \ correlation analysis, information gain, and statistical tests such as ANOVA\
    \ and chi-square.\n- **Wrapper Methods:** Wrapper methods appraise feature subsets\
    \ by iteratively training the model using different combinations of features and\
    \ evaluating their performance. Techniques such as forward selection, backward\
    \ elimination, and recursive feature elimination (RFE) correspond to this category."
  mdcn: "## 5.6 主成分分析\n\nPCA，即主成分分析，是一种在机器学习、数据挖掘和信号处理等多个领域中广泛使用的降维方法。它是一种经验性过程，能够将高维数据集转换为低维子空间，同时保留原始数据的大部分变异性。尤其是在处理高维数据集时，PCA被证明非常有益，因为它有助于简化计算复杂度、消除噪声，并在低维空间中促进数据可视化。\n\
    \n## PCA中使用的数学概念\n\n**协方差矩阵：** PCA首先对数据进行标准化，使每个特征的均值为零，标准差为一。随后，计算协方差矩阵以捕捉特征对之间的关联。\n\
    \n两个特征xi和xj之间的协方差计算如下：\n\n```\ncov(x_i, y_i) = 1/(n-1) * Σ_{k=1}^{n} (x_{ki} -\
    \ x̄_i) (x_{kj} - x̄_j)\n```\n\n其中n代表样本总数，xki和xkj分别表示第k个样本的第i个和第j个特征的值，μi和μj分别对应特征xi和xj的均值。\n\
    \n## 特征分解\n\nPCA对协方差矩阵进行特征分解以确定主成分。该矩阵的特征向量封装了最大方差的方向，通常被称为主成分。此外，相应的特征值提供了关于每个不同成分所解释方差比例的重要信息。\n\
    \n协方差矩阵 × 特征向量 = 特征值 × 特征向量\n\n此外，特征向量彼此正交，并共同为数据建立一个新的基础。\n\n## 选择主成分\n\n- 主成分根据特征值按降序排列，第一个成分捕捉最高量的方差，第二个成分捕捉第二高的方差，依此类推。\n\
    - 一个广泛接受的惯例是选择总方差的特定百分比（例如90%）作为确定要保留的主成分数目的阈值。\n\n## 投影\n\n最后，将数据投影到指定的主成分上，以获得降维后的表示。此投影通过将原始数据矩阵与由所选特征向量（主成分）组成的矩阵相乘来完成。\n\
    \n## 数学表示\n\n- 设X表示标准化的数据矩阵，其维度为n × m，其中n代表样本数，m代表特征数。\n- PCA识别出k个主成分，其中k小于或等于m，这些主成分由来自X协方差矩阵的特征向量V表征。前k个主成分根据其相关的特征值进行选择。\n\
    - 数据的降维表示Y通过将X投影到所选主成分上获得：\n\n$$Y = X \\cdot Vk$$\n\n其中Vk是前k个特征向量的矩阵。\n\nPCA是一种用于数据预处理、可视化和特征提取的强大工具。其广泛的应用可见于机器学习、信号处理和图像分析等多个领域。通过其数学基础，PCA为理解高维数据的内在结构提供了有价值的视角，从而能够高效地计算降维表示。\n\
    \nPCA有多种应用，例如数据的可视化表示、噪声降低、特征提取和数据压缩。它被广泛用作机器学习流程中的初步步骤，特别是在处理高维数据时，例如图像、信号或文本数据。\n\
    \n以下是执行PCA的步骤：\n\n1. **数据预处理：**\n    - 通过从每个特征中减去均值，然后除以标准差来实现数据的标准化。这一关键步骤确保所有特征具有统一的尺度，并在后续分析中具有同等的重要性。\n\
    2. **计算协方差矩阵：**\n    - 计算标准化数据的协方差矩阵，其中协方差矩阵表示特征之间的方差和协方差的度量。\n3. **计算特征向量和特征值：**\n\
    \    - 计算协方差矩阵的特征向量和相关的特征值。\n    - 特征向量描述主成分，而特征值表示每个主成分捕捉方差的程度。\n4. **按特征值对特征向量排序：**\n\
    \    - 根据对应的特征值，将特征向量按降序排列。\n    - 捕捉数据中最大方差的主成分是与最高特征值相关的特征向量。\n5. **选择主成分：**\n\
    \    - 通过考虑希望保留的方差程度或预期的降维程度，决定要保留的主成分数目。\n    - 一种常见的方法是选择捕捉数据总方差特定百分比（例如95%）的前k个主成分。\n\
    6. **将数据投影到主成分上：**\n    - 通过将原始数据与所选特征向量相乘，将原始数据投影到所选主成分上。\n    - 此过程将数据从初始特征空间转换到由主成分指定的后续子空间。\n\
    7. **降维：**\n    - 转换后的数据现在存在于由所选主成分定义的低维子空间中。\n    - 如果选择k个主成分，数据的维度将从初始特征数减少到k维。\n\
    8. **可选：重建或可视化：**\n    - 可选地，可以通过将转换后的数据与转置的所选特征向量相乘，从降维表示中恢复初始数据。\n    - 在低维子空间中可视化转换后的数据，以用于探索或解释目的。\n\
    \n需要强调的是，PCA是一种无监督技术，这意味着它不考虑任何类别标签或目标变量。它仅专注于捕捉数据中的最大方差，而这对于特定的监督学习任务可能重要也可能不重要。\n\
    \n### 5.6.1 降维\n\n降维是机器学习和数据分析领域的一项关键技术，尤其是在处理包含大量维度的数据时。降维的主要目标是在保留尽可能多相关信息的同时，减少数据集中的特征或维度数量。\n\
    \n降维的最终目标是将高维数据转换为低维空间，使其更易于管理和计算效率更高。通过这样做，它有助于克服“维度灾难”带来的挑战，即数据复杂性随维度数量呈指数级增长。这反过来会导致过拟合、计算成本增加和数据稀疏等问题。\n\
    \n降维有两种主要方法：特征选择和特征提取。特征选择涉及从原始特征中选择一个子集，而特征提取涉及通过组合或转换原始特征来创建新特征。\n\nPCA是一种常用的特征提取技术。它识别数据中方差最大的方向，并将数据投影到由这些方向定义的低维子空间上，这些方向被称为主成分。\n\
    \n其他值得注意的降维技术包括线性判别分析（LDA），其目标是最大化类别之间的可分性，以及t-分布随机邻域嵌入（t-SNE），这是一种适用于在低维空间中可视化高维数据的非线性技术。\n\
    \n降维有可能通过消除不相关或冗余特征、降低噪声和增强数据的可解释性来提高机器学习模型的性能。然而，重要的是要在降维和保留特定任务所需的基本信息之间取得平衡。降维技术在图像和信号处理、文本挖掘、生物信息学和推荐系统等多个领域得到广泛应用。它们在机器学习工作流程中的数据预处理、可视化和特征工程流程中发挥着基础性作用。\n\
    \n特征选择和特征提取是机器学习和数据分析领域中两种常用的方法，旨在降低数据集的维度并提高模型的效率。以下是对每种方法的详细阐述：\n\n## 特征选择\n\
    \n特征选择涉及从数据集中仔细选择原始特征的一个子集，排除任何被认为不相关或冗余的特征。主要目标是通过抑制过拟合、降低计算复杂度和增强可解释性来改善模型性能。用于特征选择的技术可分为三种不同类型：\n\
    \n- **过滤方法：** 过滤方法独立于所选学习算法评估特征的相关性。标准技术包括相关性分析、信息增益和统计检验，如方差分析（ANOVA）和卡方检验。\n\
    - **包装方法：** 包装方法通过使用不同的特征组合迭代训练模型并评估其性能来评估特征子集。诸如前向选择、后向消除和递归特征消除（RFE）等技术属于此类。"

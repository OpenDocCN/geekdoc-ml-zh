  md: '1. **Collaborative filtering:** Collaborative filtering (CF) methods analyze
    the interactions and preferences of users to generate recommendations. There are
    five main approaches within CF:


    +   1. **User-based collaborative filtering:** This approach recommends items
    to a user based on the preferences of users with similar tastes. It identifies
    users who have similar item ratings or interactions and recommends items that
    those similar users have liked or interacted with.

    2. **Item-based collaborative filtering:** In this approach, similarities between
    items are calculated based on the ratings or interactions of users. It recommends
    items that are similar to ones the user has already interacted with or liked.

    3. **Enriching user and item profiles:** Utilize NLP techniques to extract sentiment,
    topics, and themes from user reviews or feedback, enriching user profiles and
    leading to more nuanced recommendations.

    4. **Aspect-based sentiment analysis:** Analyze user reviews to understand opinions
    towards specific aspects (e.g., price and performance) of items, enabling recommendations
    that cater to user priorities.

    5. **Natural language understanding (NLU):** Utilize NLP models to understand
    the context and intent behind user queries, refining recommendations based on
    the user''s specific needs expressed in natural language.


    2. **Content-based filtering:** Content-based filtering methods recommend items
    to users based on the attributes or features of the items and the user''s preferences.
    It analyzes the content of items (such as textual descriptions, metadata, or features)
    and recommends items that are similar in content to those the user has liked or
    interacted with in the past. The content based filtering can be divided into the
    several techniques.



    **步骤 3：模型拟合**

    现在，使用简单线性回归模型为数据拟合一条直线。

    我们将使用的公式是 y = mx + b。

    其中：


    - x 是学习时间；

    - m 是直线的斜率；

    - b 是 y 轴截距；

    - y 是预测的考试成绩。


    **步骤 4：计算斜率 (m) 和截距 (b)**

    使用以下公式计算 m 和 b：


    $$m = \frac{n(\sum xy) - (\sum x)(\sum y)}{n(\sum x^2) - (\sum x)^2}$$


    $$b = \frac{\sum y - m(\sum x)}{n}$$


    其中：


    - n 是数据点的数量，

    - $\sum xy$ 是 x 和 y 乘积的总和，

    - $\sum x$ 是 x 值的总和，

    - $\sum y$ 是 y 值的总和，

    - $\sum x^2$ 是 x 值平方的总和。


    对于上述示例：


    - n = 5

    - $\sum xy = 1550$

    - $\sum x = 20$

    - $\sum y = 375$

    - $\sum x^2 = 90$


    $$m = \frac{5 * 1550 - 20 * 375}{5 * 90 - 20^2}$$


    $$m = \frac{7750 - 7500}{450 - 400}$$


    $$m = \frac{250}{50}$$


    $$m = 5$$


    $$b = \frac{375 - 5 * 20}{5}$$

    $$b = \frac{375 - 100}{5}$$

    $$b = \frac{275}{5}$$

    $$b = 55$$


    计算后，斜率 m = 5，y 轴截距 b = 55。


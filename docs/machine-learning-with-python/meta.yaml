    ## 4.3.1 Metrics for Classification


    The assessment of the efficacy of machine learning models in tasks involving categorical
    output variables is heavily reliant on metrics for classification. These metrics
    provide valuable insights into the model''s capacity to accurately categorize
    instances into various classes, allowing for the evaluation of its accuracy, precision,
    recall, and other performance-related factors.


    Accuracy is a noteworthy indicator among the fundamental metrics employed in classification.
    It measures the ratio of accurately classified instances to the total number of
    instances. The calculation for accuracy entails the application of the subsequent
    formula:


    $$Accuracy = \frac{TP + TN}{TP + TN + FP + FN}$$


    TP represents the count of accurate positive predictions, TN represents the count
    of accurate negative predictions, FP represents the count of inaccurate positive
    predictions, and FN represents the count of inaccurate negative predictions.


    However, accuracy in isolation may not provide a comprehensive representation
    of the model''s performance, especially in datasets that demonstrate an unequal
    distribution, where one class dominates the others. In such circumstances, precision
    and recall assume crucial roles as metrics. Precision measures the proportion
    of correct positive predictions relative to all positive predictions, and it can
    be calculated as follows:


    Precision = TP / (TP + FP)


    Recall, also referred to as sensitivity or true positive rate, quantifies the
    ratio of accurate positive forecasts in relation to the entirety of genuine positive
    occurrences, and its computation can be accomplished by:


    Recall = TP / (TP + FN)


    The F1 score, known as the harmonic mean of precision and recall, offers an equilibrium
    between these two metrics and proves particularly advantageous when dealing with
    imbalanced datasets. One can compute it using the subsequent formula:


    F1 = 2 * (Precision * Recall) / (Precision + Recall)


    Let us examine a numerical illustration to elucidate the aforementioned metrics.
    Let us assume that we are faced with a binary classification quandary, wherein
    we aim to forecast whether an email is spam (positive class) or not spam (negative
    class). Consequently, we possess a dataset containing precisely 100 emails, of
    which 80 are classified as not spam and 20 are classified as spam. Subsequently,
    we proceed to train a classification model and acquire the ensuing confusion matrix.


    | True/predicted | Not spam | Spam |

    | :--- | :---: | :---: |

    | Not spam | 70 | 5 |

    | Spam | 10 | 15 |


    Using this matrix of confusion, we can derive the accuracy, precision, recall,
    and F1 score of the model.


    Accuracy = (70 + 15) / (70 + 5 + 10 + 15) = 85%

    Precision = 70 / (70 + 10) = 87.5%

    Recall = 70 / (70 + 5) = 93.3%

    F1 score = 2 * (0.875 * 0.933) / (0.875 + 0.933) = 90.3%


    In this particular instance, the model achieved a level of correctness of 85%,
    signifying that 85% of the forecasts were accurate. The precision of 87.5% signifies
    that among all emails predicted as spam, 87.5% were in fact spam. The recall of
    93.3% indicates that the model accurately identified 93.3% of all genuine spam
    emails. The F1 score of 90.3% offers a balanced evaluation of precision and recall,
    taking into account both false positives and false negatives.


    Metrics for classification offer valuable insights into the performance of a model
    by quantifying its accuracy, precision, recall, and F1 score. Comprehending these
    metrics is vital for assessing the efficacy of classification models and making
    well-informed decisions in applications of machine learning.


    Several Python libraries offer functionality for computing metrics commonly used
    for evaluating classification models.


    **scikit-learn:** Scikit-learn, a machine learning library extensively employed
    in Python, furnishes a broad range of tools for the purpose of classification
    analysis. Within this library, one can find functions that enable the computation
    of diverse classification metrics, encompassing accuracy, precision, recall, F1
    score, and area under the ROC curve (ROC AUC).



    # 5.4.1 Linear SVM


    The Linear Support Vector Machine (SVM) is a supervised learning technique utilized
    for the purpose of binary classification tasks. Its main objective is to ascertain
    the most suitable hyperplane that efficiently partitions the classes within the
    feature space. A comprehensive explanation of the Linear SVM is provided hereafter:


    **Objective:** The aim of the Linear Support Vector Machine (SVM) is to identify
    the hyperplane possessing the utmost margin, thereby distinguishing the classes
    within the feature space.'

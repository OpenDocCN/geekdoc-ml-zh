    - **梯度下降（GD）：** 一种经典算法，通过在每次迭代中沿减小损失的方向更新权重，每次迈一小步。梯度下降是一种优化算法。它也被称为函数的斜率。如果梯度更高，则斜率更陡，模型学习得越快。它用于最小化成本并提高模型的准确性。例如，如果我们想下山，我们应该迈小步，而不是一下子跳下去。就像同一个例子，如果我们从点
    ''a'' 开始，我们必须慢慢走下去。即我们及时更新位置到 x，并持续这样做，直到我们到达底部。底部被认为是成本的最低点。

    - **动量梯度下降（Momentum GD）：** 类似于 GD，但引入了动量，累积过去的梯度以加速向最小值的收敛。

    - **Adam：** 一种自适应学习率优化算法，根据每个权重的过去更新自动调整其学习率，通常能带来更快的收敛。



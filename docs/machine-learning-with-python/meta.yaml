    # Working Principle


    +   1. **Model representation**: Logistic regression is a statistical model that
    estimates the likelihood of an input being a member of a specific category. It
    employs a logistic function, also known as a sigmoid function, to transform the
    result of a linear combination of features into a probability value ranging from
    0 to 1.


    $$P(y=1|x) = \frac{1}{1+e^{-z}}$$


    The linear combination of feature values, denoted as z, can be expressed as θ0
    + θ1x1 + θ2x2 + ... + θnxn, where θ represents the coefficients.


    2. **Decision boundary**: Logistic regression makes predictions about class labels
    by determining if the predicted probability exceeds a specified threshold, usually
    set at 0.5. The decision boundary is the hypersurface that distinguishes the different
    classes within the feature space.


    3. **Training**: The model undergoes training through the utilization of optimization
    algorithms such as gradient descent or Newton''s method, with the purpose of identifying
    the most favorable coefficients that lead to the minimization of the logistic
    loss function.'
  - '[PAGE 217]


    4. **Evaluation**: The evaluation of the model''s performance is conducted by
    employing metrics such as accuracy, precision, recall, F1-score, and ROC-AUC.

    5. **Prediction**: Once the model has undergone training, it is capable of estimating
    the likelihood of a new instance being a member of each class, subsequently assigning
    the appropriate class label in accordance with the predetermined threshold.


    # Advantages


    +   - **Simple and efficient**: Logistic regression is computationally efficient
    and easy to implement.

    - **Interpretability**: The logistic regression coefficients offer valuable insights
    into the significance of individual features as well as the direction in which
    they influence the target variable.

    - **Probabilistic interpretation**: Logistic regression outputs probabilities,
    allowing for uncertainty estimation.


    # Limitations


    +   - **Linear decision boundary**: Logistic regression postulates a linear association
    between the characteristics and the logarithm of the odds of the dependent variable,
    which might fail to encompass intricate non-linear connections.

    - **Binary classification**: Logistic regression is limited to binary classification
    tasks and cannot be directly applied to multi-class problems without modifications.


    # Applications


    +   - **Medical diagnosis**: Logistic regression is used in medical diagnosis,
    such as predicting the likelihood of a disease based on patient characteristics.

    - **Credit scoring**: It is employed in credit scoring models to predict the likelihood
    of default based on financial attributes.

    - **Marketing analytics**: Logistic regression is used in marketing analytics
    for customer segmentation and predicting customer churn.



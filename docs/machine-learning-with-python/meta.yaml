    \ $q$ 相对于给定集合上分布 $p$ 的交叉熵在交叉熵公式中定义如下：\n\n$$H(p,q) = -E_p[\\log(q)]$$\n\n其中 $E_p[\\\
    cdot]$ 是关于分布 $p$ 的期望算子。\n具有相同支撑集 $x$ 的离散概率分布 $p$ 和 $q$ 如下：\n\n$$H(p,q) = -\\sum_{x\
    \ \\in X} p(x)\\log q(x)$$\n\n最后，我们可以说 Boosting 是 XGBoost 中的一个核心概念，在其令人印象深刻的性能和能力中起着至关重要的作用。它与传统的梯度提升线完全不同。它顺序地构建一个弱学习器（通常是决策树）的集成。每个新的学习器都专注于纠正先前学习器所犯的错误，并使用损失函数的梯度来指导学习过程。XGBoost\
    \ 的一些关键组件如下所示：\n\n![](img/c3c5898a15ab3a66ce4ae6d1872b8b51_335_1.png)\n\n**二阶优化：**\
    \ 采用泰勒近似来优化损失函数，从而实现更快的收敛和潜在的更高精度。\n\n**正则化：** 结合了 L1/L2 正则化和收缩等多种技术，以防止过拟合并提高泛化能力。\n\
    \n**并行化：** 利用跨核心和机器的并行化，显著加快了大型数据集的训练速度。\n\n**稀疏数据处理：** 高效处理具有许多缺失值的数据，使其适用于现实场景。\n\
    \n提升 XGBoost 性能有几个步骤，其中一些如下所示：\n\n**初始化：** 从一个常量预测开始（例如，目标变量的均值）。\n\n图 6.3 展示了\
    \ Boosting 算法。\n\n### 迭代\n\n- a) 计算每个数据点的残差（实际值与预测值之间的差异）。\n- b) 在残差上构建一个新的决策树，专注于减少错误。\n\
    - c) 根据学习率对新树的预测进行加权，更新最终预测。\n- d) 重复：迭代步骤 a-c，直到满足停止标准（例如，最大迭代次数，最小进展）。\n\n##\

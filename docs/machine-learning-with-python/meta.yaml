    ```python

    import numpy as np

    import pandas as pd


    # 计算准确性

    accuracy = np.mean(y_true == y_pred)


    # 计算精确率

    true_positives = np.sum((y_true == 1) & (y_pred == 1))

    false_positives = np.sum((y_true == 0) & (y_pred == 1))

    precision = true_positives / (true_positives + false_positives)


    # 计算召回率


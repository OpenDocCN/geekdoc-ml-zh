    SVM encompasses several hyperparameters, including:


    +   - The kernel type refers to the specific type of kernel function utilized,
    such as linear, polynomial, or radial basis function (RBF).

    - The regularization parameter (C) plays a crucial role in balancing the optimization
    of margin maximization and classification error minimization.

    - Additionally, kernel-specific parameters, such as the degree of the polynomial
    kernel or the gamma parameter for the RBF kernel, further contribute to the customization

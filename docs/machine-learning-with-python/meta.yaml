    # 6.3 Anomaly Detection


    Anomaly detection stands for *identifying the Unusual*, also known as outlier
    detection, which involves identifying data points that deviate significantly from
    the expected pattern in a dataset. This is an important task in various fields,
    from fraud detection to system health monitoring. Some of the important anomaly
    detection techniques are based on their type to detect anomalies are described
    below.


    # 6.3.1 Statistical Methods


    # 6.3.1.1 Z-Score


    Z-score, also known as the standard score, is a simple yet powerful statistical
    method for anomaly detection. It tells you how many standard deviations a particular
    data point is away from the mean of the dataset, providing a standardized measure
    of deviation from the average. It measures how many standard deviations a data
    point is away from the mean. Points with high Z-scores are potential anomalies:


    ```

    $$Z - score = \frac{x - mean}{standard\ deviation}$$

    ```


    where mean is the average of all data points in the dataset and standard deviation
    measures the spread of the data around the mean.


    A Z-score of 0 means the data point is exactly equal to the mean. Positive Z-scores
    indicate points above the mean, with higher values representing larger deviations.
    Negative Z-scores indicate points below the mean, with absolute values signifying
    the degree of deviation. Typically, data points with absolute Z-scores greater
    than 2 or 3 are considered potential anomalies, as they fall outside the expected
    range of the majority of data points. However, this threshold can be adjusted
    based on your specific data and desired sensitivity. Let''s have a look on the
    code:'

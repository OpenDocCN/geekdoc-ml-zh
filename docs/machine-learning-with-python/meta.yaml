  md: '# 7.8 Recurrent Neural Networks (RNNs)


    Recurrent neural networks (RNNs) stand out for their ability to process and learn
    from sequential data, where elements are ordered and have dependencies. This makes
    them ideal for tasks like natural language processing (NLP), speech recognition,
    and time series analysis. Unlike traditional neural networks, RNNs have an internal
    memory that allows them to retain information from previous inputs and use it
    to process the current one. This memory enables them to capture the context and
    relationships within sequences as shown in Fig. 7.8.


    ![](img/c3c5898a15ab3a66ce4ae6d1872b8b51_400_0.png)


    Fig. 7.8: Recurrent neural network.


    The Fig. 7.8 shows the Recurrent neural network.


    An RNN can be imagined as unfolding its layers over time, where each layer receives
    not only the current input but also the hidden state from the previous layer,
    effectively carrying information across time steps. We can use RNNs in NLP machine
    translation, sentiment analysis, text generation, chatbots, converting spoken
    language into text, predicting future values in a sequence (e.g., stock prices
    and weather patterns), and creating realistic and coherent musical pieces.


    # 7.8.1 Types of RNNs


    +   1. **Vanilla RNN**: The basic RNN architecture, but can suffer from vanishing
    and exploding gradients, limiting its ability to learn long-term dependencies.
    Vanilla RNNs struggle with vanishing and exploding gradients, making it difficult
    to learn dependencies over long sequences. LSTMs address this by introducing gating
    mechanisms that control the flow of information through the network.

    2. **Long short-term memory (LSTM)**: Introduces gating mechanisms to control
    the flow of information, addressing the gradient issues and enabling learning
    of long-term dependencies.'
  merge: -1
  pgno: 400
- img_proc: true
  md: 'ger dependencies. LSTM networks stand out for their ability to learn and exploit
    long-term dependencies within sequential data as shown in Fig. 7.9.


    ![](img/c3c5898a15ab3a66ce4ae6d1872b8b51_401_0.png)


    **Fig. 7.9:** Long-short term memory.


    The Fig. 7.9 shows the Long-short term memory.


    This makes them particularly well-suited for tasks like NLP, speech recognition,
    and time series forecasting, where understanding the context across extended periods
    is crucial. The three main important gates available are


    +   A) **Forget gate:** Decides what information from the previous cell state
    (memory) to discard.

    B) **Input gate:** Controls what information from the current input to integrate
    into the cell state.

    C) **Output gate:** Determines what part of the cell state to expose as the output
    of the unit.


    3. **Gated recurrent unit (GRU):** Similar to LSTM but with simpler architecture
    and fewer parameters, offering a balance between performance and efficiency. GRU
    emerges as a compelling alternative to LSTMs. While both excel at learning long-term
    dependencies within sequential data, GRUs offer a more streamlined architecture
    with certain advantages. GRUs aim to provide comparable performance to LSTMs while
    being simpler and potentially less computationally expensive. GRUs combine the
    Forget and Input gates of LSTMs into a single update gate and introduce a reset
    gate to control the flow of information. This reduces the number of parameters
    and operations compared to LSTMs.'

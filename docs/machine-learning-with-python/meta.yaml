  md: '# Step 3: Model Fitting


    Now, use the simple linear regression model to fit a line to the data.

    The formula we''ll use is y = mx + b.b

    where:


    +   - x is the number of study hours;

    - m is the line''s slope; and

    - b is the y-intercept.

    - y is the expected exam score.


    # Step 4: Calculating Slope (m) and Intercept (b)


    Calculate m and b using the following formulas:


    ```

    $$m = \frac{n(\sum xy) - (\sum x)(\sum y)}{n(\sum x^2) - (\sum x)^2}$$


    $$b = \frac{\sum y - m(\sum x)}{n}$$

    ```


    where:


    +   - n is the number of data points,

    - $\sum xy$ is the sum of the product of x and y,

    - $\sum x$ is the sum of x values,

    - $\sum y$ is the sum of y values, and

    - $\sum x^2$ is the sum of the squares of x values.


    For the above example:


    +   - n = 5

    - $\sum xy = 1550$

    - $\sum x = 20$

    - $\sum y = 375$

    - $\sum x^2 = 90$


    ```

    $$m = \frac{5 * 1550 - 20 * 375}{5 * 90 - 20^2}$$


    $$m = \frac{7750 - 7500}{450 - 400}$$


    $$m = \frac{250}{50}$$


    $$m = 5$$

    ```'

    The Drawing 6.2 shows the Bagging method. The boosting technique combines weak
    learners sequentially so that every new tree corrects the error of the previous
    one. There are several different loss functions but for multiclass classification,
    cross-entropy is a very popular option. The cross-entropy of the distribution
    $q$ relative to a distribution $p$ over a given set is defined in the cross-entropy
    formula:


    $$H(p,q) = -E_p[\log(q)]$$


    where $E_p[\cdot]$ is the expected value operator with respect to the distribution
    $p$.

    The discrete probability distributions $p$ and $q$ with the same support $x$ are
    as follows:


    $$H(p,q) = -\sum_{x \in X} p(x)\log q(x)$$


    Finally, we can say that boosting is a core concept in XGBoost and plays a crucial
    role in its impressive performance and capabilities. It is completely different
    from traditional gradient boosting line. It builds an ensemble of weak learners
    (often decision trees) sequentially. Each new learner focuses on correcting the
    errors made by previous learners and uses the gradient of the loss function to
    guide the learning process. Some of the key components of XGBoost are given below:


    ![](img/c3c5898a15ab3a66ce4ae6d1872b8b51_335_1.png)


    **Second-order optimization:** Employs Taylor approximations to optimize the loss
    function, leading to faster convergence and potentially better accuracy.


    **Regularization:** Incorporates various techniques like L1/L2 regularization
    and shrinkage to prevent overfitting and improve generalization.


    **Parallelization:** Leverages parallelization across cores and machines, significantly
    speeding up training for large datasets.


    **Sparse data handling:** Efficiently handles data with many missing values, making
    it suitable for real-world scenarios.'

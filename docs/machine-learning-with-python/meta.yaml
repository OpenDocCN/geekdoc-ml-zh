    ```\n\n## LightGBM的组件\n\n主要有两个组件：\n\n1.  **基于梯度的单边采样 (GOSS)：** 该技术根据梯度智能地采样数据实例，专注于对改进模型贡献更多的信息性示例。它是在提升过程的每次迭代中高效选择训练数据子集的一种方法。\n\

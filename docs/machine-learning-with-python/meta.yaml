    \ maximizes the cumulative reward over time.\n\n5. **Policy:** The agent's strategy\
    \ for choosing actions is based on the current state of the environment. A policy\
    \ is a mapping from states to actions that defines the agent's behavior. It specifies\
    \ the action the agent should take in each state to maximize expected cumulative\

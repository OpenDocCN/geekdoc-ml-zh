    交叉验证是一种常用的评估模型性能的方法，尤其在数据不足的情况下。它涉及将数据集划分为若干子集，在一个子集上训练模型，然后在其余子集上评估其性能。此过程重复多次，并计算各子集上的平均性能，以获得模型性能的可靠估计。


    总而言之，评估标准在评估机器学习模型在各种任务和数据集中的有效性方面起着关键作用。通过仔细选择合适的评估标准并利用交叉验证等方法，专家可以深入了解模型性能，并做出明智的选择以提高模型的准确性和泛化能力。


    ## 4.3.1 分类指标


    机器学习模型在涉及分类输出变量的任务中的有效性评估，严重依赖于分类指标。这些指标为模型将实例准确分类到不同类别的能力提供了宝贵的见解，从而可以评估其准确性、精确率、召回率和其他与性能相关的因素。


    准确性是分类基础指标中一个值得注意的指标。它衡量正确分类的实例数与总实例数的比例。准确性的计算需要应用以下公式：


    $$Accuracy = \frac{TP + TN}{TP + TN + FP + FN}$$


    TP代表正确正向预测的数量，TN代表正确负向预测的数量，FP代表不正确正向预测的数量，FN代表不正确负向预测的数量。


    然而，单独的准确性可能无法全面反映模型的性能，尤其是在数据分布不均、某一类别占主导地位的数据集中。在这种情况下，精确率和召回率作为指标就变得至关重要。精确率衡量正确正向预测相对于所有正向预测的比例，其计算如下：


    Precision = TP / (TP + FP)


    召回率，也称为灵敏度或真正例率，量化了正确正向预测相对于所有真实正向实例的比例，其计算可通过以下方式完成：


    Recall = TP / (TP + FN)


    F1分数，即精确率和召回率的调和平均数，在这两个指标之间提供了平衡，在处理不平衡数据集时尤其有利。可以使用以下公式计算：


    F1 = 2 * (Precision * Recall) / (Precision + Recall)


    让我们通过一个数值示例来阐明上述指标。假设我们面临一个二元分类难题，旨在预测一封电子邮件是垃圾邮件（正类）还是非垃圾邮件（负类）。因此，我们拥有一个包含恰好100封电子邮件的数据集，其中80封被归类为非垃圾邮件，20封被归类为垃圾邮件。随后，我们训练一个分类模型并获得以下混淆矩阵。


    | 真实/预测 | 非垃圾邮件 | 垃圾邮件 |

    | :--- | :---: | :---: |

    | 非垃圾邮件 | 70 | 5 |

    | 垃圾邮件 | 10 | 15 |


    使用此混淆矩阵，我们可以推导出模型的准确性、精确率、召回率和F1分数。


    准确性 = (70 + 15) / (70 + 5 + 10 + 15) = 85%

    精确率 = 70 / (70 + 10) = 87.5%

    召回率 = 70 / (70 + 5) = 93.3%

    F1分数 = 2 * (0.875 * 0.933) / (0.875 + 0.933) = 90.3%


    在这个特定实例中，模型达到了85%的正确率，意味着85%的预测是准确的。87.5%的精确率意味着在所有被预测为垃圾邮件的邮件中，87.5%确实是垃圾邮件。93.3%的召回率表明模型准确识别了93.3%的真实垃圾邮件。90.3%的F1分数提供了精确率和召回率的平衡评估，同时考虑了假正例和假负例。


    分类指标通过量化模型的准确性、精确率、召回率和F1分数，为其性能提供了宝贵的见解。理解这些指标对于评估分类模型的有效性以及在机器学习应用中做出明智决策至关重要。



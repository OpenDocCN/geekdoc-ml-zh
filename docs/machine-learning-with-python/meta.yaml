    There are few steps to boost the performance of the XGBoost, and some of them
    are given below:


    **Initialize:** Begin with a constant prediction (e.g., mean of target variable).


    The Drawing 6.3 shows the Boosting algorithm.


    # Iteration


    +   a) Calculate the residual (difference between actual and predicted values)
    for each data point.

    b) Build a new decision tree on the residuals, focusing on reducing errors.

    c) Update the final prediction by weighting the new tree''s predictions based
    on the learning rate.

    d) Repeat: Iterate steps a-c until a stopping criterion is met (e.g., maximum
    iterations, minimal progress).


    # 6.1.2 LightGBM Versus XGBoost


    LightGBM, short for “light gradient boosting machine,” is a powerful open-source
    machine learning library that leverages gradient boosting to tackle both regression
    and classification tasks. LightGBM is well known for its blazing-fast training
    speed. It outperforms many gradient boosting alternatives, making it ideal for
    large datasets. It consumes significantly less memory in all other algorithms
    even after bigger datasets on machines with limited resources. It supports the
    multiple machine execution in the same time. This is how we can reduce the training
    and execution time. It can handle more set of hyperparameters with fine grain
    control over the learning process. LightGBM is a compelling choice for machine
    learning tasks, where speed, efficiency, and memory usage are critical. Its impressive
    performance and ease of use make it a valuable tool for both beginners and experts.
    This algorithm can be used in multiple sectors like:


    +   1. **Finance:** Fraud detection, credit risk assessment, and stock price prediction

    2. **E-commerce:** Product recommendation, customer churn prediction, and anomaly
    detection

    3. **Natural language processing (NLP):** Text classification, sentiment analysis,
    and machine translation

    4. **Computer vision:** Image classification, object detection, and image segmentation



    marks. For example, the sentence “The quick brown fox jumps over the lazy dog”
    would be tokenized into [“The”, “quick”, “brown”, “fox”, “jumps”, “over”, “the”,
    “lazy”, “dog”].

    2. **Sentence tokenization:** Sentence tokenization involves splitting a paragraph
    or document into individual sentences. This is useful for tasks that require analyzing'

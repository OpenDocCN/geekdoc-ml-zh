    Basics of Python Programming


    ## 2.1 Why Python?


    Python, a widely used general-purpose interpreted programming language, has gained
    immense popularity. It boasts a dynamic type system, automatic memory management,
    and supports multiple programming paradigms such as imperative, functional, and
    procedural. Python enables the creation of automated solutions for various tasks.
    Currently, major IT companies including Google, Microsoft, and Apple rely on Python
    as their primary programming language. Notably, Python stands out as the easiest
    programming language to learn within a short period of time. It empowers developers
    to build a wide range of applications, such as desktop, web, and mobile, with
    minimal coding effort, thanks to the abundance of frameworks and libraries available.


    Furthermore, Python is free and open source, with comprehensive documentation
    accessible online. Python primarily emphasizes business logic over basic programming
    concepts. Although Python is available in various versions, we will primarily
    focus on version 3.7, with the upcoming release of Python 3.8 in October 2019,
    which will introduce new features and address performance-related issues. Python
    possesses the traits of being dynamically typed, automatically garbage-collected,
    and having memory management capabilities, while supporting multiple programming
    paradigms including procedural, object-oriented, and functional. It is an agile
    language that allows for rapid development of customized solutions in a short
    span of time. Additionally, Python facilitates modular application development,
    enabling developers to join modules together seamlessly before the final release.


    ### 2.1.1 Drawbacks of Python


    All programming languages possess both advantages and disadvantages. Python, too,
    exhibits certain disadvantages, some of which are outlined below.


    - In comparison to other programming languages like C, C++, and Java, Python''s
    program execution is considerably slower. Java, being the fastest language, owes
    its speed to the Java Virtual Machine (JVM) and Just-In-Time (JIT) compiler. For
    more detailed information, please refer to YouTube videos.

    - The generation of intricate graphics places a heavy computational burden, resulting
    in a degradation of graphics quality.

    - In the absence of Cython, code execution suffers from sluggishness. Cython allows
    for code compilation at the C level, leveraging C compiler optimizations.

    - Improved performance necessitates the utilization of GPU or Cython.

    - To avoid resource wastage, the application''s speed can be constrained.


    ### 2.1.2 History of Python


    Python language, which was created by Guido van Rossum in 1991, is not named after
    the type of snake, but rather after a British Comedy group called “Monty Python’s
    Flying Circus.” Guido van Rossum, being a big fan of the group and their quirky
    humor, named the language in their honor. In the year 2000, Python 2.0 was released
    with new features such as comprehensions, cycle detecting garbage collection,
    and Unicode support, 10 years after the initial release of Python 1.0. Python
    programs often pay tribute to the group by incorporating their jokes and famous
    quotes into the code.


    Python is available in two major versions: Python 3.x and Python 2.x. Python 2.x,
    which is considered a legacy version, will be supported until 2020, while Python
    3.x is the more frequently updated and popular version. Some features from Python
    3 can be imported into Python 2.x using the “__future__” module. Python 3.0, released
    in 2008, was a major release that lacked backward compatibility, meaning that
    code written in Python 2.x could not run on the Python 3.x series.


    However, this issue was addressed in Python 2.7, as a large amount of code had
    already been written in the Python 2.x series. Initially, support for Python 2.7
    was set to end in 2015, but it has since been extended to 2020. Guido van Rossum
    took on the responsibility of leading the Python project until July 2018, when
    he passed on the role to a five-person steering council. This council will now
    be responsible for releasing future versions of Python.


    ### 2.1.3 Major Features of Python


    - Reading and comprehension are facilitated due to the presence of tabular space
    rather than curly braces, making it effortless to learn.

    - Using the English language facilitates the coding of Python programs, rendering
    the process significantly easier.

    - The Python programming language is built upon an interpreted language, which
    greatly reduces the time required to execute our applications.

    - Procedural programming, object-oriented programming, and functional programming
    are all supported by Python through the Thread module, allowing for the use of
    Multi Threading.

    - Parsing Python, Android, and iOS templates facilitates the generation of dynamic
    pages for clients.

    - Interactive language, python code does not perform any conversion of human-readable
    code into executable code. This characteristic renders python highly interactive
    as it allows for real-time modifications.

    - The KIVY framework provides support for Python, Android, and iOS.

    - Same code can be executed on all available platforms due to platform independence.


    ### 2.1.4 Market Demand


    There are numerous programming languages currently utilized for application development

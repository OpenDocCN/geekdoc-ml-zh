    # 5.7.2 Multinomial Naive Bayes


    The Multinomial Naive Bayes algorithm is a variation of the Naive Bayes algorithm
    that is excellently suited for tasks involving the classification of text. In
    these tasks, the features are indicative of the occurrence frequency of words
    or tokens within a document.

    The key assumptions made by Multinomial Naive Bayes are:


    +   1. The data is generated from a multinomial distribution, where each feature
    (word) is drawn independently from the same vocabulary.'
  merge: -1
  pgno: 302
- img_proc: true
  md: '2. The feature vectors are sparse, meaning that most word counts are zero for
    a given document.

    3. The order of the words in the document is not important, only the word counts
    matter.


    The algorithm works as follows:

    1. Calculate the prior probabilities of each class from the training data, P(class).

    2. For each class, calculate the likelihood of observing a particular word count
    vector by modeling it as a multinomial distribution:


    $$P(words|class) = (n! / (n1! * n2! * ... * nk!)) * (p1^{n1} * p2^{n2} * ... *
    pk^{nk})$$


    In the given context, n represents the overall number of words, k denotes the
    size of the vocabulary, ni signifies the count of word i, and pi indicates the
    probability of word i in that particular class.


    3. The probabilities pi are estimated from the training data as (count of word
    i in class + alpha) / (total word count in class + alpha * vocabulary size), where
    alpha is a smoothing parameter to avoid zero probabilities.

    4. To categorize a novel record, one must compute the posterior probability for
    each category by utilizing Bayes'' theorem:


    $$P(class | words) = (P(word | class) * P(class)) / (words)$$


    5. Classify the document as the category possessing the utmost likelihood after
    considering the prior probability.


    Multinomial Naive Bayes is particularly effective for text classification because
    it captures the frequency information of the words, which is often more important
    than the presence or absence of a word in a document. It also handles the sparse
    nature of text data well.


    However, it assumes that the words are independent, which may not be a valid assumption
    in natural language. Additionally, it does not account for word order or semantic
    relationships between words.


    Despite these limitations, Multinomial Naive Bayes is a simple and efficient algorithm
    that often works well in practice for text classification tasks. It is widely
    used as a baseline model or as part of more complex ensemble models.


    Let''s consider a numerical example of using Multinomial Naive Bayes for text
    classification.



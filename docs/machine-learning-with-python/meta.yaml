    print(animal.speak()) # Output: Some generic sound\nprint(dog.speak()) # Output:\
    \ Some generic sound\nprint(dog.bark()) # Output: Woof!\n```\n\nIn this particular\
    \ instance, the Animal class serves as the fundamental class, while the Dog class\
    \ functions as the subclass. The Dog class acquires the speak method from its\
    \ parent class Animal.\n\n# Example of Multiple Inheritance\n\n```\n# Base classes\n\

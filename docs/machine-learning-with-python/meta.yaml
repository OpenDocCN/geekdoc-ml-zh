    # How Spectral Clustering Works?


    +   1. **Construct a similarity graph**: Represent data points as nodes and connect
    similar points with edges (weighted based on similarity).

    2. **Calculate the Laplacian matrix**: This matrix encodes the connections between
    nodes and reflects the similarity graph''s structure.

    3. **Extract eigenvectors and eigenvalues**: Compute the eigenvectors and eigenvalues
    of the Laplacian matrix.

    4. **Project data onto lower dimensions**: Use the eigenvectors associated with
    the smallest eigenvalues to project data points into a lower dimensional space.'

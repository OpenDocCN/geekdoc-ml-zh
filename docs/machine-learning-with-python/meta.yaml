    熵量化了给定数据集中不纯度或不确定性的程度，它通过分析数据集中各类别或分类的分布来确定。


    公式：对于一个有 K 个类别且第 i 类占比为 $p_i$ 的数据集：


    $$Entropy(S) = -\sum_{i=1}^{K} p_i log_2(p_i)$$


    考虑一个包含 10 个实例的数据集，其中 6 个实例属于 A 类，其余 4 个实例属于 B 类。


    A 类的占比：


    $$p_A = \frac{6}{10} = 0.6$$


    B 类的占比：


    $$p_B = \frac{4}{10} = 0.4$$


    $$Entropy(S) = -0.6 \log_2(0.6) + 0.4 \log_2(0.4)$$


    $$Entropy(S) = -0.6 * (-0.737) + 0.4 * (-1.322)$$


    $$Entropy(S) = -(-0.4422 - 0.5288)$$


    $$Entropy(S) = 0.971$$


    ## 信息增益


    信息增益评估了根据特定特征划分数据集后，熵或不确定性的减少程度。它量化了该特征为类标签提供信息的程度。


    对于一个包含 $N$ 个实例的数据集 $S$，以及根据特征 $A$ 划分后得到的 $m$ 个子集：


    $$IG(S, A) = Entropy(S) - \sum_{j=1}^{m} \frac{N_j}{N} * Entropy(S_j)$$


    假设我们希望根据一个特定特征（记为 X）对数据集进行划分，从而得到两个子集 S1 和 S2，分别包含 7 个和 3 个实例。


    划分前的熵：$Entropy(S) = 0.971$


    子集 $S_1$ 的熵：$Entropy(S_1) = -(0.7 * \log_2(0.7) + 0.3 * \log_2(0.3))$


    子集 $S_2$ 的熵：$Entropy(S_2) = -(0.3 * \log_2(0.3) + 0.7 * \log_2(0.7))$


    $IG(S, X) = 0.971 - \left(\frac{7}{10} * Entropy(S_1) + \frac{3}{10} * Entropy(S_2)\right)$


    | 天气情况 | 温度 | 是否踢足球 |

    | :--- | :--- | :--- |

    | 晴天 | 炎热 | 否 |

    | 晴天 | 炎热 | 否 |

    | 多云 | 炎热 | 是 |

    | 雨天 | 温和 | 是 |

    | 雨天 | 凉爽 | 是 |

    | 雨天 | 凉爽 | 否 |

    | 多云 | 凉爽 | 是 |


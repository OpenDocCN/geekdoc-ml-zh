    **步骤 5：进行预测**

    使用直线方程对新数据点进行预测。例如，如果一个学生学习七小时，我们可以预测其考试成绩如下：


    $$y = (5 \times 7) + 55 = 90$$


    因此，学习 7 小时的学生的预测考试成绩为 90。



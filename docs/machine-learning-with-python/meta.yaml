    plt.show()\n\n上述代码的步骤：\n\n- 从scikit-learn库加载鸢尾花数据集，并仅选择前两个特征。\n- 创建一个管道，首先使用StandardScaler缩放数据，然后使用LinearSVC应用线性SVM。\n\

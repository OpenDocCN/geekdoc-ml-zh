  md: '# 5.3.3 Random Forests and Bagging


    Random Forests and Bagging, specifically ensemble learning techniques, are utilized
    in order to augment the effectiveness and robustness of machine learning models
    by merging numerous individual models.


    Bagging, also known as Bootstrap Aggregating, is a methodology in which numerous
    foundational models, often in the form of decision trees, are independently trained
    on randomly selected subsets of the training data. This selection process involves
    replacement, resulting in each base model acquiring unique insights into the underlying
    data due to the inherent randomness. The predictions generated by these models
    are subsequently combined through averaging or aggregation techniques to formulate
    the final prediction.


    For instance, consider a dataset comprising 1,000 instances, where the objective
    is to train a decision tree. In the context of bagging, the following steps are
    undertaken:


    +   1. A random sample, consisting of 70% of the instances, is selected (with
    replacement) to train the initial decision tree.

    2. This process is repeated multiple times to train several decision trees, with
    each model utilizing a distinct subset of the data.

    3. To formulate a prediction, the predictions derived from all decision trees
    are aggregated, employing methods such as averaging in the case of regression
    or voting for classification.


    By adhering to the principles of bagging, the aforementioned steps facilitate
    the creation of an ensemble model capable of leveraging the diverse perspectives
    acquired by the individual base models.


    Random Forests is a method that builds on the idea of bagging by introducing an
    additional element of randomness. This is accomplished by choosing a random subset
    of features at each decision tree node. The aim of this random feature selection
    is to decrease the correlation between the trees, thus reducing the risk of overfitting
    and improving the overall generalization capability.


    # Example


    Continuing with the previous example, in Random Forests:


    +   1. When training each decision tree, instead of using all features, we randomly
    select a subset of features.

    2. The subset of characteristics is employed to ascertain the optimal division
    at every node within the tree.

    3. The variability in the process of selecting features guarantees that every
    decision tree within the collection acquires distinct characteristics of the dataset,
    thereby resulting in a more heterogeneous assortment of models.

    4. Predictions are aggregated as in bagging.'

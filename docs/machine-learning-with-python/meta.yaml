    fruits = ["apple", "banana", "orange"]

    new_fruits = ["grape", "kiwi"]

    fruits.extend(new_fruits)


    # 输出：["apple", "banana", "orange", "grape", "kiwi"]

    ```


    在这个例子中，来自 `new_fruits` 列表的元素被添加到了 `fruits` 列表的末尾。


    - **使用 += 运算符添加单个元素：**

    += 运算符也可以将单个元素添加到列表的末尾。


    ```

    fruits = ["apple", "banana", "orange"]

    fruits += ["grape"]


    # 输出：["apple", "banana", "orange", "grape"]

    ```


    在这个特定的例子中，元素 "grape" 通过使用 += 运算符被添加到了 `fruits` 列表中。


    ## 移除元素


    从 Python 列表中移除元素是维护和调整列表的一项基本操作。可以根据具体需求采用不同的方法。


    - **使用 remove() 方法：**

    remove() 函数负责从列表中移除第一个匹配的指定元素。


    ```

    fruits = ["apple", "banana", "orange", "banana"]

    fruits.remove("banana")


    # 输出：["apple", "orange", "banana"]

    ```


    在这个例子中，第一个 "banana" 元素从水果列表中被移除了。


    - **使用 pop() 方法：**

    pop() 方法用于移除并返回指定索引处的元素。如果未指定索引，则该方法会移除并返回最后一个元素。


    ```

    fruits = ["apple", "banana", "orange"]

    removed_fruit = fruits.pop(1)


    # 输出：removed_fruit = "banana", fruits = ["apple", "orange"]

    ```


    这里，索引为 1 的元素（"banana"）被移除并赋值给了变量 `removed_fruit`。


    - **使用 del 语句：**

    del 语句可用于按索引移除元素或删除整个列表。


    ```

    fruits = ["apple", "banana", "orange"]

    del fruits[1]


    # 输出：["apple", "orange"]

    ```


    在这个例子中，使用 del 语句移除了索引为 1 的元素（"banana"）。


    - **使用 clear() 方法：**

    clear() 方法会移除列表中的所有元素，使其变为空列表。


    ```

    fruits = ["apple", "banana", "orange"]

    fruits.clear()


    # 输出：[]

    ```


    ## 列表的长度


    len() 函数用于计算给定列表中元素的数量。


    ```

    num_elements = len(numbers)


    # 输出：5

    ```


    ## 嵌套列表


    在 Python 编程语言中创建嵌套列表，意味着创建一个列表，其元素本身也是列表。这种技术有助于生成复杂的数据结构，包括但不限于矩阵或包含其他列表的列表。需要注意的是，外层列表中的每个元素本身都有可能是一个列表。


    ```

    nested_list = [[1, 2, 3], ["a", "b", "c"]]

    print(nested_list[0][1])


    # 输出：2

    ```


    ## 元组


    Python 元组是一个由有序且不可变的元素组成的集合。元组一旦创建，其元素就不能被修改、添加或删除。元组使用圆括号 `()` 创建，可以存储多种数据类型，包括可以容纳不同数据类型的元素。下面将详细介绍元组操作，并附有示例和详细说明。


    ### 创建元组


    在 Python 中创建元组是一个简单的过程，只需使用圆括号 `()`。元组可以包含不同数据类型的元素，一旦创建，其值就不能更改。有多种方法可以创建元组：


    - **使用圆括号：**

    通常通过将元素括在圆括号中来创建元组，这是最常用的方法。


    ```

    fruits_tuple = ("apple", "banana", "orange")

    ```


    在这个例子中，`fruits_tuple` 是一个包含三个字符串元素的元组。


    - **不使用圆括号：**

    元组也可以在没有显式圆括号的情况下创建。仅使用逗号就足以定义一个元组。


    ```

    numbers_tuple = 1, 2, 3

    ```


    在这种情况下，`numbers_tuple` 是一个包含三个整数元素的元组。


    - **混合数据类型：**

    元组可以包含来自不同数据类型的元素。


    ```

    mixed_tuple = (1, "apple", 3.14, True)

    ```


    这里，`mixed_tuple` 是一个包含整数、字符串、浮点数和布尔值的元组。


    - **创建空元组：**

    可以使用一对空的圆括号来创建一个空元组。


    ```

    empty_tuple = ()

    ```


    `empty_tuple` 是一个没有元素的元组。


    - **单元素元组：**

    只包含一个元素的元组需要包含一个尾随逗号，以将其与括在圆括号中的普通值区分开来。


    ```

    single_element_tuple = ("apple",)

    ```


    这里，`single_element_tuple` 是一个包含单个字符串元素的元组。


    ### 访问元素


    访问元组中的元素与访问 Python 中其他序列（如列表或字符串）中的元素类似。元组使用从零开始的索引，可以使用方括号 `[]` 来检索单个元素。


    - **基本索引：**

    要访问元组中的元素，请在方括号内指定其索引。


    ```

    fruits_tuple = ("apple", "banana", "orange")

    first_fruit = fruits_tuple[0]


    # 输出："apple"

    ```


    在这个例子中，`first_fruit` 被赋值为索引 0 处的值，即 "apple"。


    - **负索引：**

    负索引可以从元组的末尾开始检索元素。


    ```

    last_fruit = fruits_tuple[-1]


    # 输出："orange"

    ```


    这里，`last_fruit` 使用负索引被赋值为最后一个元素的值。


    - **切片：**

    元组切片允许你通过提取元素的子集来创建一个新的元组。


    ```

    numbers_tuple = (1, 2, 3, 4, 5)

    subset = numbers_tuple[1:4]


    # 输出：(2, 3, 4)

    ```


    在这个例子中，`subset` 包含从索引 1 到 3 的元素。


    - **省略索引：**

    在对元组进行切片时，如果未提供起始或结束索引，则默认行为是分别使用元组的开头或结尾。'

    \n- **基于密度：** 与 DBSCAN 类似，它基于**密度**识别簇，专注于有许多邻居点的区域，并排除稀疏区域。\n- **快速搜索：** 利用决策图高效地识别核心点及其潜在的簇成员关系。\n\

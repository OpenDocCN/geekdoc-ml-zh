    \ s):\n    return 1 / (1 + np.exp(-s))\n\ndef sigmoidPrime(self, s):\n    return\
    \ s * (1 - s)\n```\n\n```python\n# Create a Backward Propagation Function\ndef\
    \ backward(self, X, y, o):\n    self.o_error = y - o\n    self.o_delta = self.o_error\
    \ * self.sigmoidPrime(o)\n    self.z2_error = np.matmul(self.o_delta,\n      \
    \                       np.matrix.transpose(self.W2))\n    self.z2_delta = self.z2_error\
    \ * self.sigmoidPrime(self.z2)\n    self.W1 += np.matmul(np.matrix.transpose(X),\
    \ self.z2_delta)\n    self.W2 += np.matmul(np.matrix.transpose(self.z2),\n   \
    \                      self.o_delta)\n```\n\n```python\n# Create a Training Function\n\
    def train(self, X, y, epochs):\n    for epoch in range(epochs):\n        o = self.forward(X)\n\

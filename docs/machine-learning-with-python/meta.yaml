  md: 'The essential principles of SVM comprise support vectors, which are the data
    points closest to the hyperplane, and the margin, which denotes the distance between
    the hyperplane and the support vectors.


    The objective of SVMs is to maximize this margin, thereby endowing the decision
    boundary with resilience against noise and outliers. In situations where classes
    are not able to be linearly separated, SVMs can employ kernel functions to map
    input features into a space of higher dimensionality. This allows for the establishment
    of non-linear decision boundaries.


    The versatility of SVMs is underscored by their manifold applications, including
    text classification, image recognition, and bioinformatics. Due to their effectiveness
    and scalability, SVMs are prevalently utilized in both binary and multiclass classification
    problems. Nevertheless, it should be noted that SVMs can impose a notable computational
    burden and necessitate the judicious selection of hyperparameters in order to
    achieve optimal performance. All in all, SVMs are a potent tool for classification
    tasks, as they offer flexibility, accuracy, and robustness in their treatment
    of diverse datasets.


    # Types of Support Vector Machines


    **Linear support vector machines:** Linear Support Vector Machines classify data
    by detecting the optimal hyperplane that efficiently separates classes in the
    feature space. It demonstrates impressive performance when the data demonstrates
    linear separability.


    **Kernel support vector machines:** Kernel Support Vector Machines augment the
    capabilities of linear Support Vector Machines through the application of kernel
    functions (such as polynomial and radial basis functions) to convert the input
    features into a higher-dimensional space, thereby establishing non-linear decision
    boundaries. In an efficient manner, Kernel Support Vector Machines effectively
    manage data that is not linearly separable.


    # Working Principle


    +   - Support vector machines (SVMs) strive to discover the hyperplane that maximizes
    the margin, which refers to the distance between the hyperplane and the closest
    data points (known as support vectors) from each class.

    - In the case of linearly separable data, the equation for the hyperplane can
    be expressed as w·x + b = 0, where w represents the weight vector, x denotes the
    feature vector, and b signifies the bias term.'

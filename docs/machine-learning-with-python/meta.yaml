    plt.scatter(centers[:, 0], centers[:, 1], c='red', s=100, alpha=0.5)\n\nplt.show()\n\
    ```\n\n步骤：\n\n1.  导入执行各种操作所需的库。需要导入的库包括用于执行数值操作的numpy，用于可视化的matplotlib.pyplot，以及分别用于处理数据集和聚类算法的sklearn中的datasets和cluster。\n\

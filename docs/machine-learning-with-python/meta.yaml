  mdcn: "以下是理解神经网络的一些关键概念：\n\n1.  **神经元：** 神经网络的基本单元。每个神经元接收来自其他神经元的输入，应用激活函数进行处理，然后将其输出发送给其他神经元。\n\
    2.  **层：** 神经元被组织成层：输入层（接收原始数据）、隐藏层（处理信息）和输出层（生成最终输出）。\n3.  **激活函数：** 决定神经元如何转换其输入。常见类型包括\
    \ sigmoid、ReLU 和 tanh。\n4.  **学习：** 神经网络通过调整神经元之间连接的权重来学习。这是通过反向传播等算法完成的，该算法最小化网络输出与期望输出之间的误差。在神经网络的世界里，激活函数扮演着至关重要的角色，它们就像守门员，决定哪些信息被传递到下一层。它们接收神经元输入的加权和，并将其转换为输出值，引入非线性，使网络能够学习复杂的模式。\n\
    5.  **训练数据：** 需要大量数据才能有效训练神经网络。数据的质量和数量对性能有显著影响。\n\n图 7.2 展示了人工神经网络。\n\n![](img/c3c5898a15ab3a66ce4ae6d1872b8b51_370_0.png)\n\
    \n图 7.2：人工神经网络。\n\n## 神经网络的类型\n\n- **前馈：** 信息单向流动，从输入到输出。常见例子包括多层感知机（MLPs）和卷积神经网络（CNNs）。\n\
    - **循环：** 信息可以循环流动，使其能够处理序列数据，如文本或时间序列。例子包括长短期记忆（LSTM）网络。\n\n## 神经网络的优势\n\n- **高精度**：可以在许多任务上实现最先进的性能：\n\
    \n  $$Accuracy = \\frac{True\\ positive + true\\ negative}{True\\ positive + true\\\
    \ negative + false\\ positive + false\\ negative}$$\n\n- **灵活性**：可以通过改变架构和训练数据来适应各种任务。\n\
    - **从数据中学习**：可以从大量数据中学习复杂的模式，无需显式编程。\n\n## 神经网络的挑战\n\n- **数据需求**：需要大量数据进行训练，这可能既昂贵又耗时。\n\
    - **黑箱问题**：可能难以理解它们如何做出决策。\n- **计算成本**：训练大型网络可能需要大量的计算能力。\n\n## 7.2 感知机\n\n感知机是神经网络的基本构建块，作为计算的基本单元。虽然看似简单，但当它们组合并经过训练时，具有巨大的能力，可以实现复杂的学习和问题解决。以下是其关键特征的分解：\n\
    \n### 7.2.1 感知机的结构\n\n- **输入**：感知机接收多个输入，代表数据的特征或属性。\n- **权重**：每个输入都与一个权重相关联，该权重决定了其影响输出的重要性。这些权重最初是随机的，并在训练过程中进行调整。\n\
    - **求和**：计算所有输入的加权和。\n- **激活函数**：此函数将总和转换为输出值。常见的有阶跃函数（二元输出）和 sigmoid 函数（连续输出）。\n\
    - **输出**：最终结果，代表感知机的分类或预测。\n\n### 7.2.2 感知机的功能\n\n感知机充当线性分类器，这意味着它们只能学习和表示线性可分的模式。这一局限性促使了更复杂架构的发展，例如具有多层和非线性激活函数的\

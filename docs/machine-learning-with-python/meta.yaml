- md: 'One of the main metrics used for regression analysis is the MSE, which measures
    the average squared difference between predicted and actual values. Its calculation
    involves the use of the following formula:


    $$\text{MSE} = \frac{1}{n} \sum_{i=1}^{n} (y_i - \hat{y}_i)^2$$


    where $n$ is the number of instances, $y_i$ is the true value, and $\hat{y}_i$
    is the predicted value for the $i$th instance.


    MAE is another metric that is frequently employed. It quantifies the average absolute
    disparity between the predicted and actual values. The calculation involves determining
    the absolute difference:


    $$\text{MAE} = \frac{1}{n} \sum_{i=1}^{n} |y_i - \hat{y}_i|$$


    where $|\cdot|$ denotes the absolute value.


    The root mean squared error (RMSE) is an alternative form of MSE which offers
    an assessment of the standard deviation of the residuals. By taking the square
    root of MSE, RMSE can be computed:


    $$\text{RMSE} = \sqrt{\text{MSE}}$$


    These metrics provide different perspectives on model performance. MSE and RMSE
    penalize large errors more heavily, making them sensitive to outliers. MAE, on
    the other hand, treats all errors equally and is more robust to outliers.


    Let''s consider a numerical example to illustrate these metrics. Suppose we have
    a dataset with five instances:


    $$(x_1, y_1) = (1, 3)$$

    $$(x_2, y_2) = (2, 5)$$

    $$(x_3, y_3) = (3, 7)$$

    $$(x_4, y_4) = (4, 9)$$

    $$(x_5, y_5) = (5, 11)$$


    A regression model is utilized to make predictions on $y$ by taking $x$ as input.
    The following predictions are made by the model:


    $$\hat{y}_1 = 2$$

    $$\hat{y}_2 = 4$$

    $$\hat{y}_3 = 6$$

    $$\hat{y}_4 = 8$$

    $$\hat{y}_5 = 10$$


    Using these estimations, it is feasible to compute the MSE, MAE, and RMSE of the
    model:


    $$\text{MSE} = \frac{1}{5} \sum_{i=1}^{5} (y_i - \hat{y}_i)^2 = \frac{1}{5} \times
    (0^2 + 1^2 + 1^2 + 1^2 + 1^2) = 0.8$$

    $$\text{MAE} = \frac{1}{5} \sum_{i=1}^{5} |y_i - \hat{y}_i| = \frac{1}{5} \times
    (0 + 1 + 1 + 1 + 1) = 0.8$$

    $$\text{RMSE} = \sqrt{\text{MSE}} = \sqrt{0.8} \approx 0.894$$


    The aforementioned illustration showcases the accomplishment of the model in achieving
    a MSE of 0.8. This numerical value essentially represents the average of the squared
    differences between the predicted and actual values, amounting to 0.8. The MAE,
    also standing at 0.8, signifies the average absolute difference between the predicted
    and actual values. Moreover, the RMSE, which is approximately 0.894, acts as a
    gauge for the standard deviation of the residuals, thereby offering valuable insight
    into the typical error associated with the model''s predictions.


    In summary, regression metrics, such as MSE, MAE, and RMSE, provide significant
    insights into the performance of a model by assessing its accuracy and precision.
    A comprehensive understanding of these metrics is imperative when evaluating the
    effectiveness of regression models and making well-informed decisions in the field
    of machine learning applications.


    Several Python libraries provide functionality for computing metrics commonly
    used for evaluating regression models. Here are some popular ones:


    **scikit-learn:** Scikit-learn, a Python machine learning library that is extensively
    utilized, provides an extensive array of tools for the analysis of regression.
    It encompasses functionalities for the computation of diverse regression metrics,
    including but not limited to MSE, MAE, and R^2 score.


    ```

    from sklearn.metrics import mean_squared_error, mean_absolute_error, r2_score


    # Compute Mean Squared Error

    mse = mean_squared_error(y_true, y_pred)


    # Compute Mean Absolute Error

    mae = mean_absolute_error(y_true, y_pred)


    # Compute R-squared score

    r2 = r2_score(y_true, y_pred)

    ```


    **TensorFlow and PyTorch:** While TensorFlow and PyTorch are primarily deep learning
    libraries, they also offer functionality for computing regression metrics. These
    libraries are particularly useful when working with neural network models.


    ```

    import torch

    import torch.nn as nn


    # Define a custom loss function (e.g., Mean Squared Error)

    criterion = nn.MSELoss()


    # Compute Mean Squared Error

    mse = criterion(y_pred, y_true)


    # Optionally, compute Mean Absolute Error and R-squared score manually

    mae = torch.mean(torch.abs(y_pred - y_true))

    r2 = 1 - (torch.sum((y_true - y_pred)**2) / torch.sum((y_true - torch.mean(y_true))**2))

    ```


    **Pandas and NumPy:** Pandas and NumPy are essential libraries utilized to manipulate
    data and execute numerical computations within the Python programming language.
    Although these libraries do not offer dedicated functionalities for the calculation
    of regression metrics, they are frequently employed alongside other libraries
    to preprocess data and manually compute metrics.


    ```


    \nFig. 6.3展示了应用核方法之前作者的原始图像。\n\n如果这些点是线性可分的（例如，一条直线可以将它们分开），传统的线性算法如线性回归或线性支持向量机（SVM）效果很好。然而，如果这些点形成更复杂的模式，比如一个圆圈或一个螺旋呢？线性算法将无法有效地分离它们。\n\
    \n![](img/c3c5898a15ab3a66ce4ae6d1872b8b51_341_0.png)\n\nFig. 6.4展示了应用核方法后作者的图像。\n\

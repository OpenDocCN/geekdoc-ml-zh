  mdcn: "## 8.4.1 目标检测与分割\n\n目标检测与分割是计算机视觉中的两项重要任务，都涉及在图像或视频中识别和定位物体。目标检测与分割是计算机视觉的基础任务，拥有众多应用，包括自动驾驶、监控、医学成像和增强现实。这些任务使机器能够理解和交互视觉数据，为广泛的智能应用和服务铺平了道路。\n\
    \n- **目标检测：** 目标检测的任务是在图像或视频帧中定位和分类多个物体。它涉及识别图像中物体的存在并确定其各自的类别或分类。目标检测通常使用边界框来勾勒物体所在区域。常见的目标检测技术包括：\n\
    \    - **单次多框检测器（SSD）：** SSD是一种流行的实时目标检测方法，它直接从多个尺度的特征图预测边界框和类别概率。它通过CNN的单次前向传播高效处理图像，实现了高速度和高精度。\n\
    \    - **Faster R-CNN：** Faster R-CNN是一个两阶段目标检测框架，它使用区域提议网络生成候选物体区域，然后通过检测网络优化提议并对物体进行分类。它通过联合优化区域提议和目标检测实现了高精度。\n\
    \    - **YOLO（You Only Look Once）：** YOLO是另一种实时目标检测方法，它将输入图像划分为网格单元，并为每个网格单元预测边界框和类别概率。它通过CNN的单次前向传播处理整个图像，使其比Faster\
    \ R-CNN等两阶段方法更快。\n- **目标分割：** 目标分割的任务是将图像分割或划分为多个区域，每个区域对应一个不同的物体或物体实例。与识别物体存在及其边界框的目标检测不同，目标分割为图像中的每个物体提供像素级的掩码。常见的目标分割技术包括：\n\
    \    - **Mask R-CNN：** Mask R-CNN扩展了Faster R-CNN，在预测边界框和类别概率的同时，增加了一个用于预测分割掩码的分支。它为图像中的每个物体实例生成像素级掩码，能够精确分割具有复杂形状和重叠实例的物体。\n\
    \    - **U-Net：** U-Net是一种全卷积网络（FCN）架构，最初为生物医学图像分割设计，但也广泛应用于其他领域。它由编码器-解码器结构组成，并带有跳跃连接，以保留不同尺度的空间信息。U-Net以其在有限训练数据下分割物体的有效性而闻名。\n\
    \    - **语义分割：** 语义分割为图像中的每个像素分配一个类别标签，而不区分同一类别的不同实例。它提供整个图像的密集像素级分类，允许场景理解和像素级分析。FCN和DeepLab等技术通常用于语义分割任务。\n\

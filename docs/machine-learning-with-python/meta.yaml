    In the context of regularization in the L2 norm, which is alternatively referred
    to as “Ridge regularization,” an additional term is incorporated into the cost
    function that is directly proportional to the square of the magnitude of the coefficients
    of the model:


    $$J_{L2}(\theta) = J(\theta) + \lambda \sum_{j=1}^{n} \theta_j^2$$


    the regularization parameter, denoted by $\lambda$, and the number of features,

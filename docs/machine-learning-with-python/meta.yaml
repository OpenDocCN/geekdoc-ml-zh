  mdcn: '## 4.1 监督学习与无监督学习


    监督学习和无监督学习是机器学习领域的两大基本框架，各自针对不同的学习任务类别和方法论。


    监督学习侧重于利用带标签的信息训练模型，将每个输入数据点与一个输出标签或目标相关联。其主要目标是建立从输入到输出的映射，使模型能够对新数据进行预测。监督学习常用于分类任务（旨在将输入实例分配到特定类别或标签）以及回归任务（目标是预测一个连续值）。监督学习中的著名算法包括决策树、支持向量机和神经网络。


    相比之下，无监督学习处理的是未标记的数据，要求模型在没有明确指导的情况下识别潜在的模式或结构。无监督学习算法的目标不是对特定输出进行预测，而是揭示数据中固有的关系或分组。聚类算法（如K均值和层次聚类）根据相似性将数据划分为不同的簇，而关联算法（如Apriori）则发现不同属性之间的规则或关联。无监督学习在异常检测、数据压缩和特征提取任务中尤其具有优势。


    监督学习依赖带标签的数据来学习输入与输出之间的相关性，从而实现预测任务。相反，无监督学习则基于未标记数据来揭示隐藏的结构或模式，在没有明确指导的情况下提供对原始数据的洞察和理解。这两种范式在各种机器学习应用中都扮演着重要角色，根据具体问题和可用数据，各自提供独特的优势和挑战。


    ## 监督学习的类型


    **分类：** 分类的目标是利用先前的观察结果，对新实例的类别标签进行预测。当输出变量为类别值时，会使用这种方法。例如电子邮件垃圾识别、情感分析和医疗诊断。


    **回归：** 回归是根据输入特征来估计连续的输出值。当输出变量为数值时，会使用这种方法。例如预测房价、股票价格和温度预测。


    ## 无监督学习的类型


    **聚类：** 聚类算法根据数据点的相似性将其划分为簇或组。其目标是在没有任何预定标签的情况下，发现数据中的自然分组。客户细分、文档聚类和图像分割是常见的例子。


    **关联：** 关联规则学习是一种在大型数据集中识别变量之间有趣关系或关联的方法。其主要关注点是发现项目之间的共现或相关模式。市场篮子分析是关联规则学习的一个具体应用，旨在发现经常一起购买的商品。另一方面，推荐系统则根据用户行为推荐相关产品或内容。这两个例子都说明了关联规则学习在实践中的应用。


    监督学习和无监督学习方法涵盖了广泛的技术和算法，是应对金融、医疗保健、电子商务等众多领域现实世界挑战不可或缺的工具。


    ## 4.1.1 分类与回归


    分类和回归是机器学习领域监督学习任务的两个基本类别，各自有独特的目标并需要特定的方法。


    在分类领域，目标是将输入数据点分配到预先存在的类别或标签中。当输出变量具有类别特征时，通常使用这种方法。例如，在电子邮件垃圾检测中，目标是根据发件人、主题和内容等各种属性，将电子邮件分类为“垃圾邮件”或“非垃圾邮件”。同样，在情感分析中，文本数据根据所表达的情感被分类为“积极”、“消极”或“中性”。用于分类的著名算法包括逻辑回归、决策树和支持向量机。


    相比之下，回归是利用输入特征来预测连续的输出值。当输出变量具有数值特征时，会使用这种方法。例如，在房地产领域，回归可用于根据位置、面积和设施等因素预测房价。在股票市场分析领域，可以通过分析历史数据和市场指标，使用回归模型来预测未来的股票价格。常见的回归技术包括线性回归、多项式回归和决策树回归。


    举个例子，让我们来看一个简单的分类问题：预测银行的贷款申请人是否会无法偿还贷款。这种情况下的输入特征可能包括申请人的信用评分、收入和债务收入比，而输出则是一个二元标签，表示“违约”或“不违约”。可以使用逻辑回归模型在历史数据上进行训练，从而根据这些特征对潜在的贷款申请人进行分类。


    相反，假设我们想根据房屋的面积、卧室数量和地理位置来预测其价格。这种情况引入了一个回归问题，因为输出变量（即房屋价格）表现出连续特征。在这种情况下，可以利用线性回归模型，通过使用包含历史房地产交易的数据集，来建立输入属性与房屋价格之间的联系。这样，我们就能对新建房屋的价格进行预测。


    分类涉及将数据分类到类别或标签中，而回归则侧重于预测数值。在选择合适的算法和方法以有效解决各种现实世界问题时，全面理解这两种监督学习任务之间的差异至关重要。


    ## 分类的类型


    **二元分类：** 在二元分类中，目标是将实例分为两个不同的类别之一。实例可能包括垃圾邮件识别（将电子邮件区分为垃圾邮件或非垃圾邮件）、欺诈检测（区分欺诈性和非欺诈性交易）以及医疗诊断（确定疾病的存在与否）。


    **多类分类：** 多类分类涉及将实例分类到多个不同的类别或类别中。实例可能包括识别手写数字（0到9）、进行情感分析（将实例识别为积极、消极或中性）以及将文档分类到不同主题。


    ## 回归的类型


    **线性回归：** 线性回归使用线性方程构建一个模型，表示因变量与一个或多个自变量之间的关系。其应用在于预测连续的数值。例如根据面积和卧室数量预测房价、利用历史数据预测股票价格以及考虑营销费用来估计销售收入。


    **多项式回归：** 多项式回归通过使用多项式函数（而不仅仅是直线）来拟合数据，从而扩展了线性回归的范围。这种方法有效地捕捉了'

    \ (slopes) for these adjustments to occur, enabling the network to learn from\
    \ its mistakes. The backpropagation is displayed in the next figure.\n- **Sparsity\
    \ and efficiency:** Some activation functions, like ReLU, encourage sparsity,\
    \ where most neurons have zero outputs. This can improve efficiency and reduce\
    \ the number of parameters to train.\n\n![](img/c3c5898a15ab3a66ce4ae6d1872b8b51_373_0.png)\n\
    \nThe Fig. 7.3 shows the Backpropagation method.\n\nWhile we are selecting the\
    \ correct activation function then we need to take care of few things like:\n\n\
    - **Type of problem:** Classification, regression, or other tasks?\n- **Network\
    \ architecture:** Deep or shallow network?\n- **Computational efficiency:** How\
    \ fast does it need to run?\n- **Sparsity:** Is encouraging sparsity desired?\n\
    \nSome of the common activation functions are given below\n\n- **Sigmoid:** Outputs\
    \ a value between 0 and 1, resembling a smooth S-shaped curve. Versatile but can\

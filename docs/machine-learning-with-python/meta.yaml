    \ CNNs automatically learn relevant features directly from the data. This is crucial\
    \ for complex datasets where manually identifying features is impractical. CNNs\
    \ are less sensitive to small shifts in the input image due to the use of shared\
    \ weights and pooling. This makes them robust to variations in object position\
    \ and viewpoint. CNNs can be easily scaled to larger and more complex datasets\
    \ by adding more layers and increasing the number of filters. Some of the key\
    \ concepts are given below:\n\n1.  **Convolution:** The core operation of CNNs\
    \ involves applying a filter (kernel) to an input image. This filter slides across\
    \ the image, calculating the dot product between its elements and the corresponding\
    \ elements of the image at each position. This process helps identify local features\
    \ like edges, textures, and colors.\n2.  **Pooling:** After convolution, pooling\
    \ layers reduce the dimensionality of the data, summarizing the information extracted\
    \ by the filters. Common pooling methods include max pooling, which selects the\
    \ maximum value from a region, and average pooling, which takes the average. Average\
    \ pooling computes the average value within the window. This summarizes the overall\
    \ information in the region and can be helpful for capturing smoother features\
    \ like textures. The pooling layer is used to reduce computational cost while\
    \ smaller data size translates to less computation needed during training and\
    \ inference, making the model run faster. Overfitting prevention is a very important\
    \ part in any AI model. The pooling layer helps us by reducing data complexity.\
    \ Pooling helps control model capacity and prevent it from memorizing the training\
    \ data too closely, leading to better generalization on unseen data. Pooling can\
    \ sometimes lead to better feature extraction by highlighting the most important\
    \ information and suppressing insignificant details.\n3.  **Activation functions:**\
    \ As activation function has been already discussed in the section 7.2.4, CNNs\
    \ use activation functions to introduce nonlinearity and improve the model's ability\
    \ to learn complex patterns. Popular choices include ReLU and Leaky ReLU.\n4.\
    \  **Layers:** CNNs typically consist of multiple convolutional and pooling layers\
    \ stacked together, followed by fully connected layers for classification or regression\
    \ tasks. Each layer learns increasingly complex features from the previous layer's\
    \ output.\n\nCNN is best in recognizing objects, scenes, and activities in images\

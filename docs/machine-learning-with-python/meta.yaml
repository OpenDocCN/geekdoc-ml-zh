    \nCNN 是一种强大的深度学习架构，专门设计用于处理网格状数据，最著名的是图像。它们能够从视觉输入中自动提取和学习特征，这使它们成为从图像分类和目标检测到自动驾驶汽车和医学图像分析等各种应用的基石。CNN\
    \ 以图像处理而闻名。与需要手动特征工程的传统方法不同，CNN 直接从数据中自动学习相关特征。这对于手动识别特征不切实际的复杂数据集至关重要。由于使用了共享权重和池化，CNN\
    \ 对输入图像中的小位移不太敏感。这使得它们对物体位置和视角的变化具有鲁棒性。通过添加更多层和增加过滤器数量，CNN 可以轻松扩展到更大、更复杂的数据集。以下是一些关键概念：\n\
    \n1.  **卷积：** CNN 的核心操作涉及将过滤器（核）应用于输入图像。该过滤器在图像上滑动，在每个位置计算其元素与图像对应元素之间的点积。此过程有助于识别边缘、纹理和颜色等局部特征。\n\
    2.  **池化：** 卷积之后，池化层降低数据的维度，总结过滤器提取的信息。常见的池化方法包括最大池化（从区域中选择最大值）和平均池化（取平均值）。平均池化计算窗口内的平均值。这总结了区域内的整体信息，有助于捕获纹理等更平滑的特征。池化层用于降低计算成本，因为较小的数据尺寸意味着训练和推理期间所需的计算更少，从而使模型运行更快。过拟合预防是任何\
    \ AI 模型中非常重要的一部分。池化层通过降低数据复杂性来帮助我们。池化有助于控制模型容量，防止其过于紧密地记忆训练数据，从而在未见过的数据上获得更好的泛化能力。池化有时可以通过突出最重要的信息并抑制不重要的细节来带来更好的特征提取。\n\
    3.  **激活函数：** 正如第 7.2.4 节已经讨论过的，CNN 使用激活函数来引入非线性并提高模型学习复杂模式的能力。流行的选择包括 ReLU 和\
    \ Leaky ReLU。\n4.  **层：** CNN 通常由多个卷积层和池化层堆叠而成，后接用于分类或回归任务的全连接层。每一层从前一层的输出中学习越来越复杂的特征。\n\
    \nCNN 在识别图像中的物体、场景和活动方面表现最佳（例如，对手写数字进行分类和检测照片中的面部）。它在定位和分类图像中的物体方面表现良好（例如，在自动驾驶汽车应用中识别汽车、行人和交通标志）。图像分割是\
    \ CNN 的一个非常强大的功能，它通过将图像划分为对应于物体或语义类别的不同区域来帮助我们（例如，在医学图像中分割器官）。CNN 擅长将一张图像的艺术风格应用到另一张图像上（例如，创建看起来像是由梵高绘制的图像）。一些流行的\
    \ CNN 架构包括 *LeNet-5*、*AlexNet*、*VGGNet*、*ResNet* 和 *Inception*。TensorFlow 和 PyTorch\
    \ 等框架提供了构建和训练 CNN 的工具。让我们看看在 Python 中训练的 CNN 模型：\n\n376 — 第 7 章 神经网络与深度学习\n\n\

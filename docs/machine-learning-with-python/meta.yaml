    # 8.10 Policy Gradient Methods


    Policy gradient methods are a powerful class of RL algorithms that directly optimize
    the policy of an agent to maximize its long-term reward in an environment. Unlike
    value-based methods like Q-learning, which focus on learning the value of states
    and actions, policy gradient methods directly learn a policy that maps states
    to actions. The policy gradient methods directly learn a policy – a mapping from
    states to actions – by optimizing the expected cumulative reward. Unlike value-based
    methods like Q-learning, which estimate the value of state-action pairs, policy
    gradient methods directly parameterize the policy and update its parameters to
    maximize the expected return. Policy gradient methods offer several advantages
    including the ability to learn stochastic policies and handle continuous action
    spaces. Some terminology those are used in the policy gradient methods:


    +   1. **Policy (π):** Represents the probability distribution over possible actions
    the agent can take in a given state.

    2. **State (s):** The current situation or configuration the agent is in.

    3. **Action (a):** The possible choices the agent can make in a given state.

    4. **Reward (r):** The feedback signal the environment provides after the agent
    takes an action.


    They have been successfully applied to a wide range of RL tasks including robotics,
    game playing, and NLP. Examples of policy gradient methods include REINFORCE,
    actor-critic methods, and proximal policy optimization (PPO). The policy gradient
    methods offer a powerful approach to RL, enabling agents to learn effective policies
    for complex tasks. However, addressing the challenges of variance, sample efficiency,
    and hyperparameter tuning is critical for successful application. Here are some
    steps that show how policy gradient method works:


    Step 1. **Policy parameterization:** The agent interacts with the environment
    following its current policy and collects data (state-action-reward tuples). In
    policy gradient methods, the policy is typically parameterized by a neural network
    or another function approximator. The parameters of the policy network are denoted
    by **θ**, and the policy itself is denoted by **πθ (a | s)**, representing the
    probability of taking action **a** in state **s** given the parameters **θ**.


    Step 2. **Objective function:** The objective of policy gradient methods is to
    maximize the expected cumulative reward, also known as the return. This can be
    formalized as maximizing the expected value of the cumulative reward under the
    policy:


    ```

    $$J(\theta) = E_{\pi\theta} \left[ \sum_{t=0}^{T} \gamma^t r_t \right]$$

    ```'
  - '[PAGE 469]


    where $r_t$ is the reward received at time step $t$, $T$ is the time horizon,
    and $\gamma$ is the discount factor that determines the importance of future rewards.


    Step 3. **Gradient ascent:** Policy gradient methods use gradient ascent to update
    the policy parameters $\theta$ in the direction of the gradient of the objective
    function $J(\theta)$. The gradient of $J(\theta)$ with respect to the policy parameters
    is given by


    $$\nabla_{\theta}J(\theta) = E_{\pi_{\theta}}\left[\sum_{t=0}^{T} \nabla_{\theta}\log\pi_{\theta}(a_t
    \vee s_t).G_t\right]$$


    where $G_t$ is the return from time step $t$ onward, also known as the return
    or advantage.


    Step 4. **Policy update:** The policy parameters are updated using stochastic
    gradient ascent:


    $$\theta \leftarrow \theta + \alpha\nabla_{\theta}J(\theta)$$


    where $\alpha$ is the learning rate.


    Step 5. **Reward-to-go:** In practice, policy gradient methods often use the reward-to-go
    formulation, where the gradient is scaled by the return from the current time
    step onward rather than the total return. This helps reduce variance in the gradient
    estimates and improves training stability.


    Challenges vs. benefits of policy gradient method is given in the table given
    below:


    | Benefit | Challenges |

    | :--- | :--- |

    | **Direct policy optimization:** They directly optimize the policy, which can
    be more efficient than learning state-action values, especially in large state
    spaces. | **High variance:** Estimating the policy gradient can be noisy and lead
    to unstable learning, requiring careful implementation and techniques like variance
    reduction. |

    | **Policy interpretability:** In some cases, the learned policy can be interpreted,

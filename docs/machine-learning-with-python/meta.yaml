    \ Without activation functions, neural networks would be limited to learning only\
    \ linear relationships, which wouldn't be enough for real-world problems. Activation\
    \ functions introduce nonlinearity, allowing the network to model complex curves\
    \ and interactions between features.\n\n- **Gradient propagation:** Activation\
    \ functions are essential for backpropagation, the training algorithm used to\

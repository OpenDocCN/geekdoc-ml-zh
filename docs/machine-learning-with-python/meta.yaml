    ```\n\n- **Element modification is not allowed:**\n  - Once a tuple is created,\
    \ cannot change the value of its elements.\n  - Modifying a tuple will lead to\
    \ the occurrence of a TypeError.\n\n```python\nfruits_tuple = (\"apple\", \"banana\"\
    , \"orange\")\nfruits_tuple[1] = \"kiwi\" # Raises TypeError\n```\n\n- **Adding\
    \ and removing elements is prohibited:**\n  - Tuples do not support operations\
    \ like append() or remove() that modify the tuple in-place.\n  - We cannot add\
    \ or remove elements from an existing tuple.\n\n```python\nfruits_tuple.append(\"\
    grape\") # Raises AttributeError\n```\n\n- **Immutable through iterations:**\n\
    \  - The immutability of tuples extends to all elements contained within the tuple.\n\
    \  - If a tuple contains mutable objects (e.g., lists), the tuple itself remains\
    \ immutable, but the objects inside it can be modified.\n\n```python\nnested_tuple\
    \ = ([1, 2, 3], \"apple\")\nnested_tuple[0][1] = 10 # Valid, as the list inside\
    \ the tuple is mutable\n```\n\n## Tuple Unpacking\n\nTuple unpacking is a functionality\
    \ present in the Python programming language, which facilitates the assignment\
    \ of values from a tuple to separate variables within a single line of code. This\
    \ characteristic offers a practical and efficient approach to extracting elements\
    \ from a tuple and assigning them to variables, thereby eliminating the need for\
    \ multiple assignment statements.\n\n### Basic tuple unpacking\n\n```python\n\
    # Creating a tuple\ncoordinates = (3, 7)\n\n# Tuple unpacking\nx, y = coordinates\n\
    \n# Variables x and y now hold the values 3 and 7, respectively\n```\n\nIn this\
    \ illustration, the values of the coordinates tuple are decomposed into the variables\
    \ x and y. It is essential that the count of variables on the left side of the\
    \ assignment corresponds to the count of elements in the tuple.\n\n### Unpacking\
    \ in functions:\n\nTuple unpacking is often used in function returns to conveniently\
    \ capture multiple values.\n\n```python\ndef get_coordinates():\n    return 5,\
    \ 10\n\n# Calling the function and unpacking the result\nx, y = get_coordinates()\n\
    # x is now 5, y is now 10\n```\n\nHere, the function get_coordinates returns a\
    \ tuple, and the values are unpacked into variables x and y when calling the function.\n\
    \n### Extended unpacking:\n\nIn Python, we can use the * operator to capture remaining\
    \ elements when unpacking.\n\n```python\n# Creating a tuple\nnumbers = (1, 2,\
    \ 3, 4, 5)\n\n# Unpacking with extended unpacking\nfirst, *rest, last = numbers\n\
    \n# first is 1, rest is [2, 3, 4], last is 5\n```\n\nIn this example, the *rest\
    \ syntax captures all elements between the first and last elements in the tuple.\n\
    \n- **Ignoring elements:**\n  We can use an underscore _ to ignore specific elements\
    \ during unpacking.\n\n```python\n# Creating a tuple\npoint = (8, 3, 5)\n\n# Unpacking\
    \ and ignoring the middle value\nx, _, z = point\n\n# x is 8, z is 5\n```\n\n\
    Here, the underscore _ is used to ignore the second element in the tuple.\n\n\
    ## 2.3.3 Dictionaries and Sets\n\n## Dictionaries\n\nA Python dictionary is a\
    \ nonsequential aggregation of key-value pairs, where every key must be exclusive.\
    \ In alternative programming languages, dictionaries are referred to as associative\
    \ arrays or hash maps. They are established by employing curly braces {} and encompass\
    \ keys along with their corresponding values.\n\n## Creating a Dictionary\n\n\
    Defining a collection of key-value pairs using curly braces {} is a fundamental\
    \ step in the creation of a dictionary in Python. It is of utmost importance that\
    \ each key within the dictionary is distinct, as the keys are intrinsically linked\
    \ to their corresponding values. Dictionaries present a versatile and effective\
    \ means of organizing and retrieving data by means of keys.\n\n- **Basic dictionary\
    \ creation:**\n\n```python\n# Creating a dictionary of student information\nstudent\
    \ = {\n    \"name\": \"John Doe\",\n    \"age\": 20,\n    \"grade\": \"A\",\n\
    \    \"courses\": [\"Math\", \"Physics\", \"English\"]\n}\n```\n\nIn this particular\
    \ instance, a dictionary, by the name of “student,” is established, consisting\
    \ of four pairs of keys and values. These keys, indeed, are strings – specifically\
    \ “name,” “age,” “grade,” and “courses” – while the values can take on various\
    \ data types. These data types encompass strings, integers, lists, and, intriguingly,\
    \ even other dictionaries.\n\n- **Creating an empty dictionary:**\n  An empty\
    \ dictionary may be generated through the utilization of vacant curly braces {}.\n\
    \n```python\n# Creating an empty dictionary\nempty_dict = {}\n```\n\n- **Dictionary\
    \ with mixed data types:**\n  Dictionaries have the capability to store values\
    \ that belong to various data types.\n\n```python\n# Creating a dictionary with\
    \ mixed data types\nmixed_dict = {\n    \"name\": \"Alice\",\n    \"age\": 25,\n\
    \    \"is_student\": False,\n    \"grades\": {\"Math\": \"A\", \"English\": \"\
    B\"}\n}\n```\n\nHere, the “grades” key is associated with another dictionary containing\
    \ subject grades.\n\n- **Using the dict() constructor:**\n  We may also construct\
    \ a dictionary by utilizing the dict() constructor and providing key-value pairs\
    \ as arguments.\n\n```python\n# Creating a dictionary using dict() constructor\n\
    fruit_dict = dict(apple=3, banana=5, orange=2)\n```\n\n## Accessing Elements in\
    \ Dictionary\n\nAccessing elements in a dictionary in Python involves retrieving\
    \ the values associated with specific keys. Dictionaries use keys to uniquely\
    \ identify and access their corresponding values.\n\n- **Basic accessing:**\n\n\
    ```python\n# Creating a dictionary of student information\nstudent = {\n    \"\
    name\": \"John Doe\",\n    \"age\": 20,\n    \"grade\": \"A\",\n    \"courses\"\
    : [\"Math\", \"Physics\", \"English\"]\n}\n\n# Accessing elements using keys\n\
    student_name = student[\"name\"]\nstudent_age = student[\"age\"]\n```\n\nIn this\
    \ example, the values associated with the keys “name” and “age” are accessed and\
    \ assigned to variables.\n\n### Default value with get():\n\nThe get() method\
    \ enables the specification of a default value that will be returned in the event\
    \ that the key is not discovered.\n\n```python\n# Providing a default value with\
    \ get()\ninstructor = student.get(\"instructor\", \"Not specified\")\n\n# If \"\
    instructor\" key exists, instructor will contain its value;\n# otherwise, it will\
    \ be \"Not specified\"\n```\n\n### Handling key errors:\n\nIf one attempts to\
    \ retrieve a key that is not present in the dictionary, it will lead to the occurrence\
    \ of a KeyError. To prevent this from happening, one can utilize the get() method,\
    \ which will yield a value of None if the specified key is not found.\n\n```python\n\
    # Using get() to handle key errors\ngrade = student.get(\"grade\")\n\n# If \"\
    grade\" key exists, grade will contain its value; otherwise, it\n# will be None\n\
    ```\n\n### Checking key existence:\n\nWe are able to utilize the “in” keyword\
    \ to verify the existence of a specific key within the dictionary prior to accessing\
    \ it.\n\n```python\n# Checking if a key exists\nif \"courses\" in student:\n \
    \   student_courses = student[\"courses\"]\nelse:\n    student_courses = []\n\
    ```\n\n- **Using keys(), values(), and items() methods:**\n  The methods keys(),\
    \ values(), and items() provide the means to retrieve keys, values, and key-value\
    \ pairs, correspondingly.\n\n```python\n# Accessing keys, values, and items\n\
    all_keys = student.keys()\nall_values = student.values()\nall_items = student.items()\n\
    ```\n\n## Modifying and Adding Elements in Dictionary\n\nModifying and adding\
    \ elements in a dictionary in Python are common operations that allow us to update\
    \ the content of the dictionary.\n\n- **Modifying existing elements:**\n\n```python\n\
    # Creating a dictionary of student information\nstudent = {\n    \"name\": \"\
    John Doe\",\n    \"age\": 20,\n    \"grade\": \"A\",\n    \"courses\": [\"Math\"\
    , \"Physics\", \"English\"]\n}\n# Modifying the value associated with the \"age\"\
    \ key\nstudent[\"age\"] = 21\n```\n\nIn this instance, the numerical value linked\
    \ to the designated identifier “age” has been altered from 20 to 21.\n\n- **Adding\
    \ new elements:**\n\n```python\n# Creating a dictionary of student information\n\
    student = {\n    \"name\": \"John Doe\",\n    \"age\": 20,\n    \"grade\": \"\
    A\",\n    \"courses\": [\"Math\", \"Physics\", \"English\"]\n}\n# Adding a new\
    \ key-value pair for the \"gender\" information\nstudent[\"gender\"] = \"Male\"\
    \n```\n\nHere, a novel key-value pair consisting of the key “gender” and the value\
    \ “Male” is appended to the dictionary."
  mdcn: "## 不可变特性\n\n元组在Python中区别于其他数据结构（如列表）的特征在于其不可变性。不可变性意味着，一旦元组被创建，其元素就不能被更改、调整、追加或删除。\n\
    \n```python\ntuple2[1] = \"kiwi\" # 引发 TypeError\n```\n\n- **不允许修改元素：**\n  - 元组一旦创建，就不能更改其元素的值。\n\
    \  - 修改元组将导致 `TypeError` 的发生。\n\n```python\nfruits_tuple = (\"apple\", \"banana\"\
    , \"orange\")\nfruits_tuple[1] = \"kiwi\" # 引发 TypeError\n```\n\n- **禁止添加和删除元素：**\n\
    \  - 元组不支持像 `append()` 或 `remove()` 这样就地修改元组的操作。\n  - 我们无法向现有元组添加或删除元素。\n\n```python\n\
    fruits_tuple.append(\"grape\") # 引发 AttributeError\n```\n\n- **通过迭代保持不可变：**\n\
    \  - 元组的不可变性延伸到其包含的所有元素。\n  - 如果元组包含可变对象（例如列表），元组本身保持不可变，但其内部的对象可以被修改。\n\n```python\n\
    nested_tuple = ([1, 2, 3], \"apple\")\nnested_tuple[0][1] = 10 # 有效，因为元组内的列表是可变的\n\
    ```\n\n## 元组解包\n\n元组解包是Python编程语言中的一项功能，它便于在单行代码中将元组的值分配给单独的变量。这一特性提供了一种实用且高效的方法，从元组中提取元素并将其分配给变量，从而消除了对多条赋值语句的需求。\n\
    \n### 基本元组解包\n\n```python\n# 创建一个元组\ncoordinates = (3, 7)\n\n# 元组解包\nx, y = coordinates\n\
    \n# 变量 x 和 y 现在分别持有值 3 和 7\n```\n\n在此示例中，`coordinates` 元组的值被分解到变量 `x` 和 `y` 中。赋值左侧的变量数量必须与元组中的元素数量相对应，这一点至关重要。\n\
    \n### 在函数中解包：\n\n元组解包常用于函数返回值，以便方便地捕获多个值。\n\n```python\ndef get_coordinates():\n\
    \    return 5, 10\n\n# 调用函数并解包结果\nx, y = get_coordinates()\n# x 现在是 5，y 现在是 10\n\
    ```\n\n这里，函数 `get_coordinates` 返回一个元组，在调用函数时，值被解包到变量 `x` 和 `y` 中。\n\n### 扩展解包：\n\
    \n在Python中，我们可以使用 `*` 运算符在解包时捕获剩余的元素。\n\n```python\n# 创建一个元组\nnumbers = (1, 2,\
    \ 3, 4, 5)\n\n# 使用扩展解包\nfirst, *rest, last = numbers\n\n# first 是 1，rest 是 [2,\
    \ 3, 4]，last 是 5\n```\n\n在此示例中，`*rest` 语法捕获了元组中第一个和最后一个元素之间的所有元素。\n\n- **忽略元素：**\n\
    \  我们可以在解包期间使用下划线 `_` 来忽略特定元素。\n\n```python\n# 创建一个元组\npoint = (8, 3, 5)\n\n#\
    \ 解包并忽略中间值\nx, _, z = point\n\n# x 是 8，z 是 5\n```\n\n这里，下划线 `_` 用于忽略元组中的第二个元素。\n\
    \n## 2.3.3 字典和集合\n\n## 字典\n\nPython字典是一种键值对的非序列聚合，其中每个键必须是唯一的。在其他编程语言中，字典被称为关联数组或哈希映射。它们通过使用花括号\
    \ `{}` 创建，并包含键及其对应的值。\n\n## 创建字典\n\n使用花括号 `{}` 定义一组键值对是创建Python字典的基本步骤。字典中的每个键都必须是唯一的，这一点至关重要，因为键与其对应的值是内在关联的。字典提供了一种灵活且有效的方式来组织和通过键检索数据。\n\
    \n- **基本字典创建：**\n\n```python\n# 创建一个学生信息字典\nstudent = {\n    \"name\": \"John\
    \ Doe\",\n    \"age\": 20,\n    \"grade\": \"A\",\n    \"courses\": [\"Math\"\
    , \"Physics\", \"English\"]\n}\n```\n\n在这个特定实例中，创建了一个名为“student”的字典，由四对键值组成。这些键确实是字符串——具体是“name”、“age”、“grade”和“courses”——而值可以是各种数据类型。这些数据类型包括字符串、整数、列表，甚至有趣的是，其他字典。\n\
    \n- **创建空字典：**\n  可以通过使用空的花括号 `{}` 来生成一个空字典。\n\n```python\n# 创建一个空字典\nempty_dict\
    \ = {}\n```\n\n- **包含混合数据类型的字典：**\n  字典能够存储属于各种数据类型的值。\n\n```python\n# 创建一个包含混合数据类型的字典\n\
    mixed_dict = {\n    \"name\": \"Alice\",\n    \"age\": 25,\n    \"is_student\"\
    : False,\n    \"grades\": {\"Math\": \"A\", \"English\": \"B\"}\n}\n```\n\n这里，“grades”键关联到另一个包含科目成绩的字典。\n\
    \n- **使用 `dict()` 构造函数：**\n  我们也可以通过使用 `dict()` 构造函数并提供键值对作为参数来构建字典。\n\n```python\n\
    # 使用 dict() 构造函数创建字典\nfruit_dict = dict(apple=3, banana=5, orange=2)\n```\n\n\
    ## 访问字典中的元素\n\n在Python中访问字典中的元素涉及检索与特定键关联的值。字典使用键来唯一标识和访问其对应的值。\n\n- **基本访问：**\n\
    \n```python\n# 创建一个学生信息字典\nstudent = {\n    \"name\": \"John Doe\",\n    \"age\"\
    : 20,\n    \"grade\": \"A\",\n    \"courses\": [\"Math\", \"Physics\", \"English\"\
    ]\n}\n\n# 使用键访问元素\nstudent_name = student[\"name\"]\nstudent_age = student[\"\
    age\"]\n```\n\n在此示例中，与键“name”和“age”关联的值被访问并分配给变量。\n\n### 使用 `get()` 获取默认值：\n\n\
    `get()` 方法允许指定一个默认值，该值将在未找到键时返回。\n\n```python\n# 使用 get() 提供默认值\ninstructor =\
    \ student.get(\"instructor\", \"Not specified\")\n\n# 如果 \"instructor\" 键存在，instructor\
    \ 将包含其值；\n# 否则，它将是 \"Not specified\"\n```\n\n### 处理键错误：\n\n如果尝试检索字典中不存在的键，将导致\
    \ `KeyError` 的发生。为防止这种情况，可以使用 `get()` 方法，如果未找到指定的键，它将返回 `None` 值。\n\n```python\n\
    # 使用 get() 处理键错误\ngrade = student.get(\"grade\")\n\n# 如果 \"grade\" 键存在，grade 将包含其值；否则，它\n\
    # 将是 None\n```\n\n### 检查键是否存在：\n\n我们可以在访问字典中的特定键之前，使用“in”关键字来验证其是否存在。\n\n```python\n\
    # 检查键是否存在\nif \"courses\" in student:\n    student_courses = student[\"courses\"\
    ]\nelse:\n    student_courses = []\n```\n\n- **使用 `keys()`、`values()` 和 `items()`\
    \ 方法：**\n  `keys()`、`values()` 和 `items()` 方法分别提供了检索键、值和键值对的手段。\n\n```python\n\
    # 访问键、值和项\nall_keys = student.keys()\nall_values = student.values()\nall_items\
    \ = student.items()\n```\n\n## 修改和添加字典中的元素\n\n在Python中修改和添加字典中的元素是常见操作，允许我们更新字典的内容。\n\
    \n- **修改现有元素：**\n\n```python\n# 创建一个学生信息字典\nstudent = {\n    \"name\": \"John\
    \ Doe\",\n    \"age\": 20,\n    \"grade\": \"A\",\n    \"courses\": [\"Math\"\
    , \"Physics\", \"English\"]\n}\n# 修改与 \"age\" 键关联的值\nstudent[\"age\"] = 21\n```\n\
    \n在此实例中，与标识符“age”关联的数值已从20更改为21。\n\n- **添加新元素：**\n\n```python\n# 创建一个学生信息字典\n\
    student = {\n    \"name\": \"John Doe\",\n    \"age\": 20,\n    \"grade\": \"\
    A\",\n    \"courses\": [\"Math\", \"Physics\", \"English\"]\n}\n# 添加一个新的键值对用于\
    \ \"gender\" 信息\nstudent[\"gender\"] = \"Male\"\n```\n\n这里，一个由键“gender”和值“Male”组成的新键值对被添加到字典中。"

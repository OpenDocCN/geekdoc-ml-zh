    \ -0.05268396  0.19692806]\nPC4: [ 0.06137164 -0.21480074 -0.46028731  0.85920298]\n\
    \nProjected Data:\n[[-1.19221144e+00 -8.55705150e-01  7.67212816e-04  1.11022302e-16]\n\
    \ [-8.47493183e-01  6.74024515e-01 -3.23459052e-02  2.22044605e-16]\n [-2.15425975e-01\
    \  4.29221847e-01  7.04290811e-02 -2.49800181e-16]\n [ 8.11531693e-01 -1.36927178e-03\
    \ -7.08126875e-02  3.60822483e-16]\n [ 1.44359890e+00 -2.46171940e-01  3.19622988e-02\
    \ -5.55111512e-17]]\n```\n\n图5.28：用于降维的主成分分析（PCA）。\n\n图5.28展示了主成分分析（PCA）的结果，这是一种用于降维的技术，展示了转换后的数据集，其中数据点在低维空间中表示，同时保留了原始特征中最重要的方差。\n\
    \n代码打印出均值、协方差矩阵、特征值、排序后的特征向量（标记为PC1、PC2等）以及投影数据X_projected。\n\n下面是一个Python代码示例，展示了在IRIS数据集上实现PCA。此外，它还演示了PCA前后结果的可视化。\n\
    \n```python\nimport numpy as np\nimport matplotlib.pyplot as plt\nfrom sklearn.datasets\
    \ import load_iris\nfrom sklearn.preprocessing import StandardScaler\nfrom sklearn.decomposition\
    \ import PCA\n\n# Load the Iris dataset\niris = load_iris()\nX = iris.data\ny\

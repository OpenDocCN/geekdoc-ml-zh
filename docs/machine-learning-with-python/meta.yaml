- md: "## 5.7.2 Multinomial Naive Bayes\n\nThe Multinomial Naive Bayes algorithm is\
    \ a variation of the Naive Bayes algorithm that is excellently suited for tasks\
    \ involving the classification of text. In these tasks, the features are indicative\
    \ of the occurrence frequency of words or tokens within a document.\nThe key assumptions\
    \ made by Multinomial Naive Bayes are:\n\n1.  The data is generated from a multinomial\
    \ distribution, where each feature (word) is drawn independently from the same\
    \ vocabulary.\n\n- Next, we will create an instance of the GaussianNB classifier\
    \ and fit it to the training data using the `gnb.fit(X_train, y_train)` command.\n\
    - Once the classifier has been trained, we can proceed to make predictions on\
    \ the test set. This can be done using the `y_pred = gnb.predict(X_test)` command.\n\
    - To assess the performance of our model, we need to calculate the classification\
    \ accuracy. This can be achieved by utilizing the `accuracy_score` function and\
    \ passing in the true labels (`y_test`) and the predicted labels (`y_pred`). The\
    \ resulting accuracy can then be printed for further analysis.\n- Finally, we\
    \ can visualize the test data after applying the Naive Bayes classifier. This\
    \ can be done by plotting the test data and coloring the points according to the\
    \ predicted class labels (`y_pred`).\n\n```python\nimport numpy as np\nimport\
    \ matplotlib.pyplot as plt\nfrom sklearn.datasets import make_blobs\nfrom sklearn.naive_bayes\
    \ import GaussianNB\nfrom sklearn.model_selection import train_test_split\nfrom\
    \ sklearn.metrics import accuracy_score\n\n# Generate synthetic dataset\nX, y\
    \ = make_blobs(n_samples=1000, centers=2, n_features=2,\n                  random_state=0)\n\
    \n# Split data into train and test sets\nX_train, X_test, y_train, y_test = train_test_split(X,\
    \ y, test_size=0.2,\n                                                    random_state=0)\n\
    \n# Plot the data before applying Naive Bayes\nplt.figure(figsize=(10, 6))\nplt.scatter(X_train[:,\
    \ 0], X_train[:, 1], c=y_train, cmap='viridis',\n            edgecolor='k')\n\
    plt.title('Data before applying Naive Bayes')\nplt.xlabel('Feature 1')\nplt.ylabel('Feature\
    \ 2')\nplt.show()\n\n# Train the Gaussian Naive Bayes classifier\ngnb = GaussianNB()\n\
    gnb.fit(X_train, y_train)\n\n# Make predictions on the test set\ny_pred = gnb.predict(X_test)\n\
    \n# Calculate accuracy\naccuracy = accuracy_score(y_test, y_pred)\nprint(f'Accuracy:\
    \ {accuracy:.2f}')\n\n# Plot the data after applying Naive Bayes\nplt.figure(figsize=(10,\
    \ 6))\nplt.scatter(X_test[:, 0], X_test[:, 1], c=y_pred, cmap='viridis',\n   \
    \         edgecolor='k')\nplt.title('Data after applying Naive Bayes')\nplt.xlabel('Feature\

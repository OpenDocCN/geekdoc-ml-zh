    ## Where to Use Z-Score?


    - **Anomaly detection:** Z-score is widely used for identifying unusual data points,
    such as fraudulent transactions, system errors, or outliers in scientific experiments.

    - **Feature scaling:** In machine learning, Z-score is often used to standardize
    features before processing by algorithms, ensuring all features have similar scales
    and preventing one feature from dominating the analysis.

    - **Quality control:** Monitoring process variables in manufacturing or other
    industries often involves using Z-scores to detect deviations from normal operating
    ranges.


    ## Where Should Z-Score Not Be Used?


    1. Can be sensitive to outliers itself, as they affect the mean and standard deviation
    used for normalization.

    2. Less effective for skewed or heavy-tailed data distributions.


    ### 6.3.1.2 Interquartile range (IQR)


    Interquartile range (IQR) is a robust measure of variability in statistics, focusing
    on the middle 50% of your data. It helps you understand how spread out your data
    is without being overly influenced by extreme values, unlike the range. It identifies
    points outside the range between Q1 (25th percentile) and Q3 (75th percentile).


    ## Steps to Calculate IQR


    - Order all data points from smallest to largest (ascending order).

    - Identify the first quartile (Q1): the median of the lower half of the data.

    - Identify the third quartile (Q3): the median of the upper half of the data.

    - Calculate the IQR: Q3–Q1.


    ## Where to Use IQR?


    1. **Outlier detection:** Points falling outside the range Q1 – 1.5 IQR and Q3
    + 1.5 IQR can be considered potential outliers.

    2. **Data exploration:** IQR provides a quick grasp of the central tendency and
    spread of your data, complementing the median.

    3. **Comparing data distributions:** You can compare the IQRs of different groups
    or datasets to understand their relative variability.

    4. **Robust measure of variability:** IQR is less sensitive to outliers compared
    to the range, making it more reliable for skewed or noisy data.


    ## Where Should IQR Not Be Used?


    - Doesn''t provide information about the entire data range.

    - Sensitive to the presence of a few very large or small values within the middle
    50%.


    ### 6.3.1.3 One-Class SVMs (OCSVM)


    One-class SVM (OCSVM) is also known as learning normalcy for anomaly detection.
    OCSVM is a powerful and versatile tool for anomaly detection, leveraging the principles
    of SVMs to learn the *normal* behavior of your data and identify points that deviate
    significantly. Let''s imagine you have a training dataset containing only examples
    of “normal” data. An OCSVM analyzes this data and constructs a boundary around
    it, capturing the essential characteristics of normalcy. It learns a boundary
    around the normal data and flags points outside as anomalies. Data points falling
    outside this boundary are then flagged as potential anomalies. Some of the famous
    applications are *fraud detection, anomaly detection in sensor data, network intrusion
    detection*, and *industrial process monitoring*.


    ## How Does OCSVM Work?


    1. **Choose a kernel**: Similar to SVMs, OCSVMs use a kernel function to convert
    data points into higher dimensional space, potentially enabling better separation
    of normal and abnormal regions.

    2. **Optimize the boundary**: The algorithm seeks to find the maximum-margin hyperplane
    (decision boundary) in the high-dimensional space that encloses most of the training
    data with the largest possible margin.

    3. **Identify anomalies**: New data points are projected onto the same high-dimensional
    space. Points falling outside the learned boundary or exceeding a distance threshold
    are considered anomalies.


    ## Where Should OCSVM Not Be Used?


    - **Parameter tuning**: Choosing the optimal kernel and regularization parameters
    can impact performance.

    - **High-dimensional data challenges**: Performance might decrease in extremely
    high-dimensional settings.

    - **One-class limitation**: Requires only normal data for training, limiting its
    use to scenarios where abnormal examples are scarce.


    ### 6.3.2 Distance-Based Methods


    ### 6.3.2.1 Nearest Neighbors


    Nearest neighbor (NN) is a versatile technique for anomaly detection. Points with
    very few or many neighbors compared to others might be anomalies. The assumption
    is that normal data points tend to cluster together, while anomalies deviate from
    these clusters, having fewer (or more) similar neighbors. By analyzing the number
    of NN for each data point, we can identify those significantly different and flag
    them as potential anomalies. We can use NN in *fraud detection*, *intrusion detection
    in networks*, and *anomaly detection in sensor data*.


    ## Industrial process monitoring


    Some of the very popular approaches are given below:


    1. **k-Nearest neighbors (kNN)**: Define a fixed number of neighbors (k) to consider.
    Points with significantly fewer or more neighbors than the typical number in their
    local area might be anomalies.

    2. **Local outlier factor (LOF)**: Calculate the ratio of a point''s local density
    (number of close neighbors) to the density of its neighbors'' neighbor. High LOF
    values indicate potential anomalies.

    3. **Isolation forest**: Randomly partition the data and measure the isolation
    depth of each point, which reflects the number of splits needed to isolate it
    completely. Anomalies are easier to isolate and have lower depths.


    ## Where Should NN Not Be Used?


    - Performance can be sensitive to the choice of the “k” parameter in kNN.

    - Can be computationally expensive for large datasets, especially with high-dimensional
    data.

    - Might not be effective for complex anomaly shapes or overlapping clusters.


    ### 6.4 Clustering


    Clustering in deep learning refers to using deep neural networks to automatically
    group data points into meaningful clusters based on their underlying similarities.
    Unlike traditional clustering algorithms, deep learning approaches can discover
    complex, nonlinear relationships between data points, making them particularly
    suitable for analyzing high-dimensional data. Data points not assigned to any
    cluster or belonging to small clusters could be anomalous. We can use it in the
    following fields:


    - **Image segmentation**: Grouping pixels into regions based on their content
    (e.g., segmenting objects in an image)

    - **Document clustering**: Categorizing documents based on their topics or themes

    - **Customer segmentation**: Grouping customers based on their behavior or preferences

    - **Anomaly detection**: Identifying data points that deviate significantly from
    the typical clusters

    - **Scientific data analysis**: Discovering hidden patterns and relationships
    in complex datasets


    Some of the advantages of clustering techniques are *automatic feature learning*,
    *handling complex data*, *identifying complex clusters*, and *scalability*. Some
    of the common approaches are given below:


    - **Deep autoencoders**: These networks learn compressed representations of the
    data, with similar data points having similar code representations. Clustering
    can be performed on these encoded representations.

    - **Clustering with generative models:** Generative models like variational autoencoders
    can learn to generate data similar to the input data. Clustering can be done based
    on the latent variables that control the generation process.

    - **Graph-based approaches:** Deep learning techniques can be combined with graph-based
    clustering methods to leverage the network structure inherent in some data types.


    ### 6.4.1 Isolation Forest


    Isolation forest is a powerful anomaly detection algorithm that utilizes isolation
    trees to identify anomalies in your data. This isolates anomalies by randomly
    partitioning the data space and measuring the isolation depth of each point. Its
    functions are given below:


    1. Randomly select features and split points within their ranges.

    2. Divide the data into two branches based on the chosen split.

    3. Repeat steps 1 and 2 recursively until reaching isolation or a maximum depth.

    4. Each data point has a path length representing the number of splits needed
    to isolate it.

    5. Average the path lengths of a data point across all isolation trees in the
    forest.

    6. Points with shorter path lengths (easier to isolate) are considered more anomalous.


    ### 6.4.2 Density-Based Methods


    **LOF:** LOF is another powerful algorithm for anomaly detection, utilizing the
    concept of local density to identify data points deviating from their surroundings.
    It is used to calculate the ratio of the local density of a point to the density
    of its neighbors. High LOF values indicate potential anomalies. LOF compares the
    local density of a data point (its neighborhood) to the local densities of its
    neighbors. Anomalies are considered points with significantly lower local density,
    indicating they reside in sparse regions compared to their neighbors. The working
    mechanism and steps involved in smooth working are given below:


    1. **Define the neighborhood:** Choose a parameter “k” representing the number
    of NN to consider for each data point.

    2. **Calculate reachability distance:** Measure the reachability distance from
    each point to its neighbors, considering both their distance and the density of
    their neighborhoods.

    3. **Compute local density:** Estimate the local density of each point by inverting
    the average reachability distance of its kNN.

    4. **Calculate LOF:** Divide the local density of a point by the average local
    density of its kNN.'

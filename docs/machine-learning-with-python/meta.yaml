    \n![](img/c3c5898a15ab3a66ce4ae6d1872b8b51_337_0.png)\n\nFig. 6.2: 用于LightGBM模型训练的数据集。\n\
    \nFig. 6.2展示了用于LightGBM模型训练的数据集。\n\n```\nimport pandas as pd\nfrom sklearn.model_selection\
    \ import train_test_split\nimport lightgbm as lgb\n\ndata = pd.read_csv(\"SVMtrain.csv\"\
    )\n# 定义输入和输出特征\nx = data.drop(['Embarked', 'PassengerId'], axis=1)\ny = data.Embarked\n\
    # 划分训练集和测试集\nx_train, x_test, y_train, y_test = train_test_split(x, y,\ntest_size=0.33,\
    \ random_state=42)\nmodel = lgb.LGBMClassifier(learning_rate=0.09, max_depth=-5,\n\
    random_state=42)\nmodel.fit(x_train, y_train, eval_set=[(x_test, y_test), (x_train,\n\
    y_train)],\nverbose=20, eval_metric='logloss')\nprint('Training accuracy {:.4f}'.format(model.score(x_train,\
    \ y_train)))\nprint('Testing accuracy {:.4f}'.format(model.score(x_test, y_test)))\n\
    ```\n\n## Components of LightGBM\n\n主要有两个组件：\n\n1.  **Gradient-based one-side\
    \ sampling (GOSS):** 该技术根据梯度智能地采样数据实例，专注于对改进模型贡献更多的信息性示例。它是在提升过程的每次迭代中高效选择训练数据子集的一种方法。\n\
    2.  **Exclusive feature bundling (EFB):** 在树构建过程中将相似的特征捆绑在一起，减少内存使用并可能提高效率。EFB旨在减少学习过程中涉及的特征数量，同时最小化信息损失。它专注于“互斥”特征，即很少同时取非零值的特征。让我们假设代表不同颜色（红色、蓝色和绿色）的特征。它们是互斥的，因为一个物体不能同时是红色和蓝色。\n\
    3.  **Gradient centralized (GC) algorithm:** 它围绕梯度优化计算，从而加快训练速度，并旨在通过修改优化过程中使用的梯度来提高训练效率，甚至可能提高最终模型的性能。在这里，梯度告诉优化器在每一步中更新神经网络权重的程度。GC集中这些梯度，这意味着它从梯度矩阵的每一列中减去平均值。这本质上迫使梯度的平均值为零。GC不同于梯度裁剪，后者限制单个梯度的大小。虽然裁剪可以防止梯度爆炸，但GC专注于整体梯度方向。总的来说，我们可以说GC算法是一种有前景的技术，可以改善深度神经网络的训练。它实现相对简单，并在各种应用中显示出积极的结果。然而，重要的是要考虑其局限性，并根据具体情况评估其有效性。\n\
    \n## Steps to Implement GOSS Works\n\nGOSS是一种强大的技术，有助于提高LightGBM模型的效率和准确性。它专为梯度提升算法设计，可能不直接适用于其他机器学习模型。\n\
    \n1.  **Calculate gradients:** 对于每个数据点，算法计算损失函数相对于当前模型预测的梯度。想象一个景观，其中损失函数代表山谷和山丘，梯度指向最陡下降的方向。\n\
    2.  **Sort by gradients:** 然后根据梯度的绝对大小对数据点进行排序。具有较大梯度的点（意味着它们远离理想预测）被认为对训练更“重要”。\n\
    \n## Selective Sampling\n\n1.  **Large gradients:** 所有具有大梯度的数据点都**保留**用于训练。这些点包含用于改进的有价值信息。\n\
    2.  **Small gradients:** 具有小梯度的点**以一定的概率随机采样**。这在训练集中保持了多样性，同时专注于更具信息性的点。\n\n\
    ## Steps to Work with EFB\n\nEFB是一种有价值的技术，可以提高LightGBM模型的效率和潜在准确性，尤其是在处理大型数据集和高维特征空间时。然而，重要的是要考虑其局限性，并根据您的具体情况评估其有效性。步骤如下：\n\
    \n1.  **Identify exclusive features:** 算法搜索在非零值上重叠最小的特征。\n2.  **Bundle creation:**\
    \ 这些识别出的特征被分组为一个单一的“捆绑包”。这个捆绑特征充当各个特征的组合表示。\n3.  **Decision tree splitting:**\

  mdcn: '## 第2章

    Python编程基础


    ## 2.1 为什么选择Python？


    Python是一种广泛使用的通用型解释型编程语言，已获得巨大普及。它拥有动态类型系统、自动内存管理，并支持多种编程范式，如命令式、函数式和过程式。Python能够为各种任务创建自动化解决方案。目前，包括谷歌、微软和苹果在内的主要IT公司都依赖Python作为其主要编程语言。值得注意的是，Python是在短时间内最容易学习的编程语言。得益于丰富的框架和库，它使开发者能够以最少的编码工作量构建各种应用程序，如桌面应用、Web应用和移动应用。


    此外，Python是免费且开源的，拥有全面的在线文档。Python主要强调业务逻辑而非基本编程概念。尽管Python有多个版本，但我们将主要关注3.7版本，而即将于2019年10月发布的Python
    3.8将引入新功能并解决与性能相关的问题。Python具有动态类型、自动垃圾回收和内存管理能力等特性，同时支持多种编程范式，包括过程式、面向对象和函数式。它是一种敏捷语言，允许在短时间内快速开发定制解决方案。此外，Python促进了模块化应用开发，使开发者能够在最终发布前无缝地将模块组合在一起。


    ### 2.1.1 Python的缺点


    所有编程语言都有其优点和缺点。Python也不例外，它也存在一些缺点，以下列举了其中一些。


    - 与C、C++和Java等其他编程语言相比，Python的程序执行速度相当慢。Java作为最快的语言，其速度归功于Java虚拟机（JVM）和即时（JIT）编译器。如需更详细信息，请参考YouTube视频。

    - 生成复杂的图形会带来沉重的计算负担，导致图形质量下降。

    - 在没有Cython的情况下，代码执行会变得迟缓。Cython允许在C级别编译代码，利用C编译器优化。

    - 提高性能需要使用GPU或Cython。

    - 为避免资源浪费，可以限制应用程序的速度。


    ### 2.1.2 Python的历史


    Python语言由Guido van Rossum于1991年创建，其名称并非源于蛇的种类，而是以一个名为“蒙提·派森的飞行马戏团”的英国喜剧团体命名。Guido
    van Rossum是该团体及其古怪幽默的忠实粉丝，为表敬意而命名了该语言。在Python 1.0首次发布10年后的2000年，Python 2.0发布，引入了推导式、循环检测垃圾回收和Unicode支持等新功能。Python程序经常通过将该团体的笑话和名言融入代码中来向其致敬。


    Python有两个主要版本：Python 3.x和Python 2.x。Python 2.x被视为旧版，将支持到2020年，而Python 3.x是更新更频繁、更受欢迎的版本。Python
    3的一些功能可以通过“__future__”模块导入到Python 2.x中。2008年发布的Python 3.0是一个重大版本，缺乏向后兼容性，这意味着用Python
    2.x编写的代码无法在Python 3.x系列上运行。


    然而，这个问题在Python 2.7中得到了解决，因为Python 2.x系列中已经编写了大量代码。最初，对Python 2.7的支持定于2015年结束，但后来延长至2020年。Guido
    van Rossum负责领导Python项目，直到2018年7月，他将这一角色移交给了一个五人指导委员会。该委员会现在将负责发布Python的未来版本。


    ### 2.1.3 Python的主要特性


    - 由于使用制表符空格而非花括号，阅读和理解变得容易，使其易于学习。

    - 使用英语语言有助于编写Python程序，使过程显著简化。

    - Python编程语言建立在解释型语言之上，这大大减少了执行应用程序所需的时间。

    - Python通过Thread模块支持过程式编程、面向对象编程和函数式编程，允许使用多线程。

    - 解析Python、Android和iOS模板有助于为客户生成动态页面。

    - 交互式语言，Python代码不会将人类可读的代码转换为可执行代码。这一特性使Python具有高度交互性，因为它允许实时修改。

    - KIVY框架为Python、Android和iOS提供支持。

    - 由于平台独立性，相同的代码可以在所有可用平台上执行。


    ### 2.1.4 市场需求



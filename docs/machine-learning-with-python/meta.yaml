    \ indicate a comment in Python?**\n   A. //\n   B. #\n   C. –\n   D. /* */\n\n\
    3. **What is the purpose of variables in Python?**\n   A. To store data\n   B.\
    \ To perform mathematical operations\n   C. To create loops\n   D. To define functions\n\
    \n4. **Which of the following is a primitive data type in Python?**\n   A. List\n\
    \   B. Tuple\n   C. String\n   D. Dictionary\n\n5. **Which data type is mutable\
    \ in Python?**\n   A. List\n   B. Tuple\n   C. String\n   D. Dictionary\n\n6.\
    \ **What does a set in Python contain?**\n   A. Duplicate elements\n   B. Ordered\
    \ elements\n   C. Unique elements\n   D. Key-value pairs\n\n7. **How is an element\
    \ accessed in a list or tuple in Python?**\n   A. Using dot notation\n   B. Using\
    \ square brackets and index\n   C. Using parentheses and index\n   D. Using the\
    \ get method\n\n8. **What is a class in Python?**\n   A. A function\n   B. A module\n\
    \   C. A blueprint for creating objects\n   D. A loop structure\n\n9. **In OOP,\
    \ what are instances of classes called?**\n   A. Objects\n   B. Functions\n  \
    \ C. Variables\n   D. Methods\n\n10. **What does inheritance allow in Python?**\n\
    \    A. Code duplication\n    B. Code reuse\n    C. Method overloading\n    D.\
    \ Variable overloading\n\n11. **Which type of inheritance involves a class inheriting\
    \ from more than one base class?**\n    A. Single inheritance\n    B. Multiple\
    \ inheritance\n    C. Multilevel inheritance\n    D. Hierarchical inheritance\n\
    \n## Answers\n\n1. C\n2. B\n3. A\n4. C\n5. A\n6. C\n7. B\n8. C\n9. A\n10. B\n\
    11. B\n\n## Fill in the Blanks\n\n1. Proper ________ is crucial in Python to indicate\
    \ block structure.\n2. Comments in Python start with the ________ character.\n\
    3. Python supports various data types, including integers, floats, strings, and\

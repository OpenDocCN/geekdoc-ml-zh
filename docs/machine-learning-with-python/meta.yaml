    # ## 6.1 Gradient Boosted Trees: XGBoost and LightGBM


    In the 1990s, Robert Schapire and Yoav Freund developed a very popular algorithm
    called AdaBoost, where underfitting and reducing bias were introduced for the
    first time. AdaBoost is known as a parent of all gradient boosted decision trees.
    In the same series of algorithm development, the gradient boosted trees (GBTs)
    are a powerful and versatile machine learning technique that can be used for both
    regression and classification tasks. GBT is another popular model ensembling method
    which works by combining multiple weak learners, such as decision trees, with
    a single strong learner. Each weak learner is trained to improve the predictions
    of the previous learner, and the final prediction is made by combining the predictions
    of all weak learners. Various advantages of GBTs were described further.


    # ### High Accuracy


    GBTs can often achieve high accuracy on a variety of tasks, even with complex
    datasets.


    # ### Flexibility


    GBTs can be adapted to a wide range of tasks by changing the type of weak learner,
    the loss function, and other hyperparameters.


    # ### Faster Interpretability


    Unlike some other machine learning models, GBTs can be relatively easy to interpret,
    which can be helpful for understanding why the model is making certain predictions.


    # ### Quick Response


    XGBoost is well known for slow learning and quick response.



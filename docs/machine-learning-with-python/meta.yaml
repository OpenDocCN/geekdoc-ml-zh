    **Pandas and NumPy:** Pandas and NumPy constitute essential libraries utilized
    for the manipulation of data and numerical computations within the Python programming
    language. Despite their lack of dedicated functions for the computation of classification
    metrics, they are frequently employed in tandem with other libraries to preprocess
    data and manually derive metrics.


    ```python

    import numpy as np

    import pandas as pd


    # Compute accuracy

    accuracy = np.mean(y_true == y_pred)


    # Compute precision

    true_positives = np.sum((y_true == 1) & (y_pred == 1))

    false_positives = np.sum((y_true == 0) & (y_pred == 1))

    precision = true_positives / (true_positives + false_positives)


    # Compute recall

    false_negatives = np.sum((y_true == 1) & (y_pred == 0))

    recall = true_positives / (true_positives + false_negatives)


    # Compute F1 score

    f1 = 2 * (precision * recall) / (precision + recall)

    ```



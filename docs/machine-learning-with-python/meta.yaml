- img_proc: true
  md: '# 7.2.2 Function of Perceptron


    Perceptrons act as linear classifiers, meaning they can only learn and represent
    linearly separable patterns. This limitation led to the development of more complex
    architectures like MLPs with multiple layers and nonlinear activation functions.
    Despite their limitations, perceptrons are powerful tools for understanding the
    basic principles of neural networks and learning algorithms like perceptron learning
    rule.


    # 7.2.3 Where to Use Perceptron


    +   - While not used in complex tasks anymore, perceptrons still find application
    in:

    - Simple classification problems like spam filtering

    - Feature extraction and dimensionality reduction

    - Understanding the theoretical foundations of neural networks

    - To delve deeper, consider exploring concepts like

    - MLPs and their ability to learn nonlinear relationships

    - Different activation functions and their impact on learning

    - Perceptron learning rule and its limitations

    - Advanced neural network architectures like CNNs and recurrent neural networks
    (RNNs) built upon the foundation of perceptrons


    # 7.2.4 Where to Use Activation Function


    **Nonlinearity:** Without activation functions, neural networks would be limited
    to learning only linear relationships, which wouldn''t be enough for real-world
    problems. Activation functions introduce nonlinearity, allowing the network to
    model complex curves and interactions between features.


    +   - **Gradient propagation:** Activation functions are essential for backpropagation,
    the training algorithm used to adjust weights and biases in the network. They
    provide the necessary gradients (slopes) for these adjustments to occur, enabling
    the network to learn from its mistakes. The backpropagation is displayed in the
    next figure.

    - **Sparsity and efficiency:** Some activation functions, like ReLU, encourage
    sparsity, where most neurons have zero outputs. This can improve efficiency and
    reduce the number of parameters to train.'

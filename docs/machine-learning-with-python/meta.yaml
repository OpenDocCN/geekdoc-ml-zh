    In the context of regularization in the L2 norm, which is alternatively referred
    to as “Ridge regularization,” an additional term is incorporated into the cost
    function that is directly proportional to the square of the magnitude of the coefficients
    of the model:


    $$J_{L2}(\theta) = J(\theta) + \lambda \sum_{j=1}^{n} \theta_j^2$$


    the regularization parameter, denoted by $\lambda$, and the number of features,
    denoted by $n$, are the key components in this context. The regularization parameter
    is responsible for governing the intensity of regularization, with higher values
    resulting in a more robust regularization.


    In the context of L1 regularization, which is also referred to as “Lasso regularization,”
    an additional term is incorporated into the cost function that is directly proportional
    to the absolute value of the coefficients of the model:


    $$J_{L1}(\theta) = J(\theta) + \lambda \sum_{j=1}^{n} |\theta^j|$$


    The strength of regularization is controlled by the regularization parameter $\lambda$,

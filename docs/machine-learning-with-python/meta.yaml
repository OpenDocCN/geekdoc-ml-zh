    # ### 7.1 Introduction to Neural Networks


    Neural networks are a type of artificial intelligence inspired by the human brain.
    They consist of interconnected nodes called neurons, which process information
    in a similar way to biological neurons. It is inspired by the biological neural
    networks that constitute in human brain. The trained system can learn and make
    decision like human. This whole thing is based upon given prior data and its training.
    It learns from its mistakes and improves system according to time. Fundamentally
    mimics human brains to develop algorithms to build predictive models and complex
    patterns. The human brain consists of fundamental cells known as neurons to store
    and process information. In the form of electronic signals these neural neurons
    will process the input data. The signals are passed to other neurons. The component
    stimuli receive the signal by dendrites of neuron. Resulting, processed information
    in the neuron cells and covered as an output. The resultant generated after processing,
    which is passed through the Axon to the next available neuron. It is depending
    upon the strength of the signal. Then finally it depends upon neuron which can
    accept or reject produced output until output accuracy not reaches to the maximum
    level as we can see in Fig. 7.1.


    ![](img/c3c5898a15ab3a66ce4ae6d1872b8b51_369_0.png)


    **Fig. 7.1:** Biological neuron in the human brain.


    The Fig. 7.1 shows the Biological neuron in the human brain.

    These networks learn by adjusting the connections between neurons based on data,
    enabling them to perform complex tasks like:


    +   - **Image recognition:** Classifying objects in images (e.g., cats, dogs,
    and cars)

    - **Natural language processing:** Understanding and generating text (e.g., machine
    translation and chatbots)

    - **Recommendation systems:** Suggesting products or content users might like

    - **Fraud detection:** Identifying suspicious financial transactions



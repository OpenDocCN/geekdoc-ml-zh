    loss, accuracy = model.evaluate(x_test, y_test)\nprint(f\"Test accuracy: {accuracy:.4f}\"\
    )\n```\n\n# 7.5.1 Difference between Keras and Tensorflow\n\nKeras is a high-level\
    \ API built on top of TensorFlow, designed for ease of use and rapid prototyping.\
    \ It offers prebuilt components like layers, optimizers, and loss functions, simplifying\
    \ the process of building and experimenting with neural networks. Keras is known\
    \ for its readability and Pythonic syntax, making it easier to learn and"

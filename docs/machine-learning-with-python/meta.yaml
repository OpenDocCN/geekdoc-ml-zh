    \ 2')\nplt.colorbar()\n\n# Plot data after PCA\nplt.subplot(1, 2, 2)\nplt.scatter(X_pca[:,\
    \ 0], X_pca[:, 1], c=y, cmap='viridis', edgecolor='k')\nplt.title('Data After\

    Hello, stranger!\")\n\n# Call the function\nwelcome(\"Bob\")\n```\n\nThe example\
    \ provided above illustrates how the scope of the if-else block is determined\
    \ by the indentation, specifically the whitespace that precedes the print statements\
    \ and else statement. Typically, this indentation consists of four spaces, although\
    \ it is also possible to use a tab. It is crucial to maintain consistency in the\
    \ chosen indentation style across the entire codebase.\n\n**Whitespace**\n\nWhitespace,\
    \ including spaces and tabs, is used for separation and clarity in Python code.\
    \ However, excessive or inconsistent use of whitespace can lead to syntax errors.\n\
    \n```\n# Good use of whitespace for readability\ntotal = 5 + 3 * 2\n\n# Avoid\

    \    metrics=[keras.metrics.BinaryAccuracy()],\n)\n\nepochs = 1\nprint(\"Fitting\
    \ the end-to-end model\")\nmodel.fit(train_ds, epochs=epochs, validation_data=validation_ds)\n\
    \nprint(\"Test dataset evaluation\")\nmodel.evaluate(test_ds)\n```\n\n## 7.11\
    \ Using Pretrained Models\n\nIn the realm of deep learning, pretrained models\
    \ stand as powerful allies, offering a significant head start for tackling new\
    \ tasks. By leveraging their prelearned knowledge, you can accelerate training,\
    \ enhance performance, and overcome data scarcity challenges. These are deep neural\
    \ networks already trained on large, diverse datasets for general tasks like image\
    \ recognition or NLP. They act as a foundation upon which you build further capabilities.\
    \ This is the core technique where you utilize a pretrained model as a starting\
    \ point for your specific task. It involves:\n\n- **Feature extraction:** The\
    \ pretrained model's earlier layers extract general features like edges in images\
    \ or word embeddings in text.\n- **Fine-tuning:** You adjust the final layers\
    \ of the pretrained model using your own, task-specific data to adapt these features\
    \ to your unique needs.\n\nWe can consider pretrained model to leverage the prelearned\
    \ features, saving time and computational resources compared to training from\

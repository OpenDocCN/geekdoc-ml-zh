    slide over the image, computing dot products to identify local patterns like edges
    and textures.

    2. **Pooling layer:** Reduces the dimensionality of the data, summarizing the
    information captured by the convolutional layer. Common methods include max pooling
    and average pooling. Pooling layers play a crucial role in *reducing* the dimensionality
    of data while preserving important features. This compression helps manage computational
    costs, prevents overfitting, and can even strengthen the feature extraction process.
    Pooling layers reduce the spatial dimensions (width and height) of the data, typically
    by a factor of 2 or more. This results in a smaller output with fewer elements.
    By applying different pooling operations, the layer summarizes the information
    contained within a specific region of the input data. This region is often called
    a pooling window.

    3. **Activation function:** Introduces nonlinearity, allowing the network to learn
    complex relationships between features. Popular choices include ReLU and Leaky
    ReLU.

    4. **Fully connected layer:** Typically used in the final stages for tasks like
    classification or regression. Connects all neurons in one layer to all neurons
    in the next, integrating the learned features.


    Common architecture in any CNN is


    +   1. **LeNet-5:** A pioneering CNN architecture, used for handwritten digit
    recognition.

    2. **AlexNet:** Introduced deeper architectures with stacked convolutional and
    pooling layers, achieving state-of-the-art performance on ImageNet classification.

    3. **VGGNet:** Explored the use of smaller filters and deeper networks, demonstrating
    the benefits of increasing depth.

    4. **ResNet:** Introduced skip connections, allowing gradients to flow directly
    through the network, addressing the vanishing gradient problem in deep architectures.'
- md: "## 7.6 CNN架构选择\n\n5. **Inception**：使用滤波器分解和并行处理来高效提取特征。\n\n最佳架构取决于您的具体问题、数据集大小和计算资源。实验和探索是找到最适合您需求配置的关键。在开发任何CNN模型之前，必须牢记以下几点：\n\
    \n- **层数**：更深的网络通常能学习更复杂的特征，但需要更多的数据和计算资源。\n- **滤波器大小和数量**：较小的滤波器捕捉局部细节，而较大的滤波器捕捉更大的特征。更多的滤波器允许学习更广泛的模式。\n\
    - **池化类型和步幅**：最大池化识别主导特征，而平均池化汇总信息。步幅控制下采样率。最大池化选择池化窗口内的最大值。这强调了最强的激活，对于检测边缘等主导特征很有用。\n\
    - **激活函数**：选择取决于任务和所需属性（例如，ReLU用于效率，Leaky ReLU用于避免神经元死亡）。\n- **批归一化**：有助于稳定训练并提高泛化能力。\n\
    - **正则化技术**：Dropout和L1/L2正则化通过降低模型复杂度来防止过拟合。\n- **迁移学习**：利用在大型数据集（如ImageNet）上预训练的模型作为起点，在您的特定任务上进行微调。\n\
    - **数据增强**：通过变化（如翻转和旋转）人为扩展数据集，以提高泛化能力。\n\n## 7.7 Dropout层\n\nDropout层是防止过拟合的强大工具，过拟合是一个主要挑战，即模型过于紧密地记忆训练数据，无法很好地泛化到未见过的示例。在训练期间，Dropout层会随机丢弃每一层中一定比例的神经元（单元），有效地在该训练迭代中关闭它们。这些被丢弃的神经元在该特定步骤中不参与计算或更新。这个过程迫使剩余的神经元学习更鲁棒和独立的特征表示，因为它们不能依赖于任何特定神经元的存在。通过防止神经元变得过度相互依赖，Dropout鼓励它们学习更多样化和可泛化的特征，提高模型在新数据上的表现。由于在每次训练迭代中丢弃不同的神经元，模型有效地学习了略有不同的网络的集成，使其对训练数据中的特定噪声或模式不那么敏感。通过在训练期间有效减少网络的有效大小，Dropout有时可以带来更快的收敛和训练时间，特别是对于较大的模型。\n\
    \n## 7.8 循环神经网络（RNNs）\n\n循环神经网络（RNNs）因其处理和学习序列数据的能力而脱颖而出，其中元素是有序的且具有依赖性。这使得它们非常适合自然语言处理（NLP）、语音识别和时间序列分析等任务。与传统神经网络不同，RNNs具有内部记忆，允许它们保留先前输入的信息并用于处理当前输入。这种记忆使它们能够捕获序列中的上下文和关系，如图7.8所示。\n\
    \n![图7.8：循环神经网络](img/c3c5898a15ab3a66ce4ae6d1872b8b51_400_0.png)\n\n图7.8：循环神经网络。\n\
    \n图7.8展示了循环神经网络。\n\n可以将RNN想象为将其层在时间上展开，其中每一层不仅接收当前输入，还接收来自前一层的隐藏状态，从而有效地跨时间步携带信息。我们可以在NLP机器翻译、情感分析、文本生成、聊天机器人、将口语转换为文本、预测序列中的未来值（例如股票价格和天气模式）以及创作逼真连贯的音乐作品中使用RNNs。\n\
    \n### 7.8.1 RNN的类型\n\n1. **普通RNN**：基本的RNN架构，但可能遭受梯度消失和爆炸问题，限制了其学习长期依赖性的能力。普通RNNs在梯度消失和爆炸方面存在困难，使得学习长序列的依赖性变得困难。LSTMs通过引入控制信息流的门控机制来解决这个问题。\n\
    2. **长短期记忆（LSTM）**：引入门控机制来控制信息流，解决梯度问题并实现长期依赖性的学习。LSTM网络因其学习和利用序列数据中长期依赖性的能力而脱颖而出，如图7.9所示。\n\
    \n![图7.9：长短期记忆](img/c3c5898a15ab3a66ce4ae6d1872b8b51_401_0.png)\n\n**图7.9：** 长短期记忆。\n\
    \n图7.9展示了长短期记忆。\n\n这使得它们特别适合NLP、语音识别和时间序列预测等任务，在这些任务中，理解跨越较长时间段的上下文至关重要。三个主要的重要门控是：\n\
    \n- **A) 遗忘门：** 决定丢弃前一个单元状态（记忆）中的哪些信息。\n- **B) 输入门：** 控制将当前输入的哪些信息整合到单元状态中。\n\
    - **C) 输出门：** 决定将单元状态的哪一部分作为单元的输出暴露出来。\n\n3. **门控循环单元（GRU）：** 与LSTM类似，但架构更简单，参数更少，在性能和效率之间提供了平衡。GRU作为LSTMs的一个引人注目的替代方案而出现。虽然两者都擅长学习序列数据中的长期依赖性，但GRUs提供了更简化的架构，具有某些优势。GRUs旨在提供与LSTMs相当的性能，同时更简单且可能计算成本更低。GRUs将LSTMs的遗忘门和输入门合并为一个更新门，并引入一个重置门来控制信息流。与LSTMs相比，这减少了参数和操作的数量。\n\
    \n让我们看一下RNN的Python代码：\n\n```python\nimport numpy as np # linear algebra\nimport\
    \ pandas as pd # data processing, CSV file I/O (e.g. pd.read_csv)\nimport matplotlib.pyplot\
    \ as plt\n\n# Input data files are available in the \"../input/\" directory.\n\
    # For example, running this (by clicking run or pressing Shift+Enter)\n# will\
    \ list the files in the input directory\n\nimport os\nprint(os.listdir(\"../input\"\
    ))\ndataset_train = pd.read_csv('../input/stockprice-train/Stock_Price_Train.csv')\n\
    dataset_train.head()\ntrain = dataset_train.loc[:, ['Open']].values #array'e çevirdik\n\
    train\nfrom sklearn.preprocessing import MinMaxScaler #bununla, 0-1 arasına scale\
    \ ettik\nscaler = MinMaxScaler(feature_range = (0, 1))\ntrain_scaled = scaler.fit_transform(train)\n\
    train_scaled\n\nplt.plot(train_scaled)\n\n# ilk 1-50 yi alıp X_train'e, 51. data\
    \ point'i de y_train'e,\n# 2-51'i alıp X_train'e, 52'yi y_train'e ...olacak şekilde\
    \ data frame i oluşturuyoruz:\nX_train = []\ny_train = []\ntimesteps = 50\n\n\
    for i in range(timesteps, 1250):\n    X_train.append(train_scaled[i - timesteps:i,\
    \ 0])\n    y_train.append(train_scaled[i, 0])\n\nX_train, y_train = np.array(X_train),\
    \ np.array(y_train)\n\n#Reshaping:\nX_train = np.reshape(X_train, (X_train.shape[0],\
    \ X_train.shape[1], 1))\n```\n\n```python\n#import libraries and packages:\nfrom\
    \ keras.models import Sequential\nfrom keras.layers import Dense\nfrom keras.layers\
    \ import SimpleRNN\nfrom keras.layers import Dropout\n```\n\n```python\n#Initialize\
    \ RNN:\nregressor = Sequential()\n```\n\n```python\n#Adding the first RNN layer\
    \ and some Dropout regularization\nregressor.add(SimpleRNN(units = 50, activation='tanh',\n\
    return_sequences=True, input_shape= (X_train.shape[1],1)))\nregressor.add(Dropout(0.2))\n\
    ```\n\n```python\n#Adding the second RNN layer and some Dropout regularization\n\
    regressor.add(SimpleRNN(units = 50, activation='tanh',\nreturn_sequences=True))\n\
    regressor.add(Dropout(0.2))\n```\n\n```python\n#Adding the third RNN layer and\
    \ some Dropout regularization\nregressor.add(SimpleRNN(units = 50, activation='tanh',\n\
    return_sequences=True))\nregressor.add(Dropout(0.2))\n```\n\n```python\n#Adding\
    \ the fourth RNN layer and some Dropout regularization\nregressor.add(SimpleRNN(units\
    \ = 50))\nregressor.add(Dropout(0.2))\n```\n\n```python\n#Adding the output layer\n\
    regressor.add(Dense(units = 1))\n```\n\n```python\n#Compile the RNN\nregressor.compile(optimizer='adam',\
    \ loss='mean_squared_error')\n```\n\n```python\n#Fitting the RNN to the Training\
    \ set\nregressor.fit(X_train, y_train, epochs=100, batch_size=32)\n```\n\n```python\n\
    dataset_test = pd.read_csv('../input/stockprice-test/Stock_Price_Test.csv')\n\
    dataset_test.head()\n```"

  mdcn: "## 2.4 控制结构\n\nPython 中的控制语句用于调节程序内的执行流程。它们使我们能够根据预定条件做出决策、遍历代码块或跳过特定代码部分。Python\
    \ 中的关键控制语句包括以下几种：\n\n- 条件语句\n- 循环\n\n## 2.4.1 条件语句\n\n编程中的条件语句是允许根据指定条件执行不同代码块的结构。这些结构使程序能够进行判断、在不同操作之间进行选择，并控制执行流程。条件语句对于编写动态和适应性强的代码至关重要。\n\
    \n条件语句在设计算法、处理用户输入以及响应程序中的各种场景方面发挥着基础性作用。它们有助于构建计算机程序的逻辑结构和决策能力。\n\n其基本概念是评估特定条件的真假，然后根据结果执行不同的代码部分。\n\
    \n- **if 语句：**\nif 语句用于在指定条件为真时执行一段代码块。\n\n### 语法\n\n```python\nif condition:\n\
    \    # 如果条件为真，则执行此代码\n\nx = 10\nif x > 5:\n    print(\"x is greater than 5\")\n\
    ```\n\n在此示例中，仅当条件 `x > 5` 被验证为真时，才会执行 print 语句。\n\n- **if-else 语句：**\nif-else\
    \ 语句提供了在给定条件为真时执行特定代码块，而在条件为假时执行另一段不同代码块的能力。\n\n```python\nif condition:\n   \
    \ # 如果条件为真，则执行此代码\nelse:\n    # 如果条件为假，则执行此代码\n\nx = 3\n\nif x % 2 == 0:\n   \
    \ print(\"x is even\")\nelse:\n    print(\"x is odd\")\n```\n\n在此实例中，程序将根据条件输出\
    \ x 是偶数还是奇数。\n\n- **if-elif-else 语句：**\nif-elif-else 语句是 if-else 语句的扩展，允许按顺序检查多个条件。\n\
    \n```python\nif condition1:\n    # 如果 condition1 为真，则执行此代码\nelif condition2:\n\
    \    # 如果 condition2 为真，则执行此代码\nelse:\n    # 如果没有条件为真，则执行此代码\n\nx = 0\n\nif x\
    \ > 0:\n    print(\"x is positive\")\nelif x < 0:\n    print(\"x is negative\"\
    )\nelse:\n    print(\"x is zero\")\n```\n\n此示例中的程序会验证 x 是正数、负数还是零，并显示相应的通知。\n\n\
    ## 2.4.2 循环\n\n编程中的循环语句允许根据指定条件多次执行指定的代码块。它们在自动化重复任务、遍历数据集合以及执行操作直到满足特定条件方面起着至关重要的作用。Python\
    \ 提供两种主要的循环语句类型：for 循环和 while 循环。\n\n- **for 循环：**\nfor 循环用于遍历一个序列，无论是列表、元组、字符串、范围，还是任何其他可迭代对象。此循环对序列中的每个元素执行一组指令。\n\
    \n### 语法\n\n```python\nfor variable in iterable:\n    # 每次迭代要执行的代码\n\nfruits =\
    \ [\"apple\", \"banana\", \"orange\"]\nfor fruit in fruits:\n    print(fruit)\n\
    ```\n\n在此示例中，for 循环遍历水果列表，循环内的代码打印每个水果。\n\n- **while 循环：**\nwhile 循环在指定条件保持为真时持续执行一段代码块。它会迭代执行，直到条件变为假。\n\
    \n### 语法\n\n```python\nwhile condition:\n    # 只要条件为真，就执行此代码\n\ncount = 0\nwhile\
    \ count < 5:\n    print(count)\n    count += 1\n```\n\n在此特定情况下，while 循环会输出 count\
    \ 值，并在每次迭代中将其增加 1，前提是 count 小于 5。\n\n## 2.5 函数与模块\n\n函数和模块是 Python 中的基本原则，它们支持代码的组织、可读性和可重用性。函数封装了代码逻辑，而模块和包则提供了一种结构化的方法来组织和聚合相关功能。\n\
    \nPython 中的函数使我们能够封装和重用代码，从而提高程序的可读性和可维护性。\n\n模块和包有助于将代码组织成可管理的单元，从而便于代码重用和维护。\n\
    \n## 2.5.1 定义函数\n\n在 Python 中，函数是为了执行特定任务而创建的可重用代码块。函数在组织代码、提高可读性和鼓励代码重用方面起着至关重要的作用。\n\
    \n在 Python 中定义函数时，使用 `def` 关键字，后跟函数名、一组可包含可选参数的括号和一个冒号。函数体是缩进的，并且可以包含一个 return\
    \ 语句，该语句指定函数的输出。\n\n### 语法\n\n```python\ndef function_name(parameters):\n    #\
    \ 要执行的代码\n    return result # 可选\n```\n\n**示例 1：简单的加法函数：**\n\n```python\ndef add_numbers(a,\
    \ b):\n    sum_result = a + b\n    return sum_result\n\n# 调用函数\nresult = add_numbers(5,\
    \ 3)\nprint(result) # 输出：8\n```\n\n在此示例中，`add_numbers` 函数接受两个参数 `a` 和 `b`，对它们执行求和操作，然后将结果作为返回值提供。\n\
    \n**示例 2：问候函数：**\n\n```python\ndef greet(name):\n    greeting_message = f\"Hello,\
    \ {name}!\"\n    return greeting_message\n\n# 调用函数\nmessage = greet(\"Alice\"\
    )\nprint(message) # 输出：Hello, Alice!\n```\n\n这里，`greet` 函数接受一个 `name` 参数，并返回一条个性化的问候消息。\n\
    \n**示例 3：带默认参数的平方函数：**\n\n```python\ndef square_number(number, power=2):\n   \
    \ result = number ** power\n    return result\n\n# 调用函数\nsquare_result = square_number(4)\n\
    print(square_result) # 输出：16\n\n# 使用不同的幂次调用函数\ncube_result = square_number(4,\
    \ 3)\nprint(cube_result) # 输出：64\n```\n\n在此特定示例中，`square_number` 函数的默认行为是计算给定数字的平方，但也可以将其配置为计算立方或任何其他所需的幂次。\n\
    \n## 2.5.2 Lambda 函数\n\nLambda 函数，也称为“匿名函数”，其特点是简洁，常用于执行小型、简单的任务。这些函数通过使用 `lambda`\
    \ 关键字建立，能够接受任意数量的参数；但是，它们仅限于包含单个表达式。当处理可以作为参数传递给高阶函数的临时操作时，使用 Lambda 函数尤其有利。\n\
    \n当需要一个小型的一次性函数，并且使用 `def` 定义完整函数显得过于冗长时，Lambda 函数特别有用。它们通常用于函数被视为一等公民的情况，例如将函数作为参数传递给高阶函数时。\n\
    \n### 语法\n\n```python\nlambda arguments: expression\n```\n\n`lambda` 关键字后跟一系列参数、一个冒号和一个表达式。表达式的结果构成了\
    \ lambda 函数的输出值。"

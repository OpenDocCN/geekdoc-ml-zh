    \n-   第一个图展示了实施K-Means聚类之前的合成数据。\n-   第二个图显示了使用K-Means聚类后的数据。每个点根据其分配的簇进行着色，聚类的质心用红色标记。这种可视化帮助我们理解K-Means如何根据相似性将数据分组为簇。\n\
    \n让我们检查另一个Python脚本，该脚本对从scikit-learn获取的数据集执行k-means聚类算法，同时生成使用k-means聚类算法前后的数据图形描述。\n\
    \n```\nimport numpy as np\nimport matplotlib.pyplot as plt\nfrom sklearn import\
    \ datasets\nfrom sklearn.cluster import KMeans\n\n# Load the iris dataset\niris\

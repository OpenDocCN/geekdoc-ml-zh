    \n# Plot the data before applying k-means\nplt.figure(figsize=(10, 6))\nplt.subplot(1,\
    \ 2, 1)\nplt.title('Data before K-Means')\nplt.scatter(X[:, 0], X[:, 1], cmap='viridis')\n\
    \n# Apply k-means clustering\nkmeans = KMeans(n_clusters=3, random_state=42)\n\

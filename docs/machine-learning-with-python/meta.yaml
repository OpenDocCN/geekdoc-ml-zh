    # Reshaping Arrays Using reshape()


    Reshaping arrays constitutes a critical operation within the context of NumPy,
    entailing the modification of the shape or dimensions of an extant array. The
    manipulation of the reshape() method within NumPy represents a widely employed
    approach to attain this objective.


    **Example 1: Reshaping a 1D array to a 2D array:**


    ```

    import numpy as np


    # Creating a 1D array

    arr1d = np.arange(6)

    print("Original 1D Array:")

    print(arr1d)


    # Reshaping to a 2D array with 2 rows and 3 columns

    arr2d = arr1d.reshape(2, 3)

    print("\nReshaped 2D Array:")

    print(arr2d)

    ```


    In this particular illustration, we commence with a one-dimensional array, denoted
    as arr1d, which has been generated through the utilization of np.arange(). Subsequently,
    we employ the reshape() function to convert it into a two-dimensional array, referred
    to as arr2d, encompassing two rows and three columns.


    **Example 2: Reshaping a 1D array to a 3D array:**


    ```

    # Reshaping to a 3D array with 2 planes, 2 rows, and 3 columns

    arr3d = arr1d.reshape(2, 2, 3)

    print("\nReshaped 3D Array:")

    print(arr3d)

    ```'

    \nx = 0\n\nif x > 0:\n    print(\"x is positive\")\nelif x < 0:\n    print(\"\
    x is negative\")\nelse:\n    print(\"x is zero\")\n```\n\nThe program in this\
    \ illustration verifies the positivity, negativity, or neutrality of x, and proceeds\
    \ to display the associated notification.\n\n## 2.4.2 Loops\n\nLooping statements\
    \ in programming enable the execution of a designated block of code multiple times\

    # 7.6 Convolutional Neural Network (CNN)


    CNNs are a powerful type of deep learning architecture specifically designed for
    processing grid-like data, most notably images. Their ability to automatically
    extract and learn features from visual inputs has made them a cornerstone of various
    applications from image classification and object detection to self-driving cars
    and medical image analysis. CNN is well known for image processing. Unlike traditional
    methods requiring manual feature engineering, CNNs automatically learn relevant
    features directly from the data. This is crucial for complex datasets where manually
    identifying features is impractical. CNNs are less sensitive to small shifts in
    the input image due to the use of shared weights and pooling. This makes them
    robust to variations in object position and viewpoint. CNNs can be easily scaled
    to larger and more complex datasets by adding more layers and increasing the number
    of filters. Some of the key concepts are given below:'
  - '[PAGE 384]


    +   1. **Convolution:** The core operation of CNNs involves applying a filter
    (kernel) to an input image. This filter slides across the image, calculating the
    dot product between its elements and the corresponding elements of the image at
    each position. This process helps identify local features like edges, textures,
    and colors.

    2. **Pooling:** After convolution, pooling layers reduce the dimensionality of
    the data, summarizing the information extracted by the filters. Common pooling
    methods include max pooling, which selects the maximum value from a region, and
    average pooling, which takes the average. Average pooling computes the average
    value within the window. This summarizes the overall information in the region
    and can be helpful for capturing smoother features like textures. The pooling
    layer is used to reduced computational cost while Smaller data size translates
    to less computation needed during training and inference, making the model run
    faster. Overfitting prevention is very important part in any AI model. The pooling
    layer helps us by reducing data complexity. Pooling helps control model capacity
    and prevent it from memorizing the training data too closely, leading to better
    generalization on unseen data. Pooling can sometimes lead to better feature extraction
    by highlighting the most important information and suppressing insignificant details.

    3. **Activation functions:** As activation function has been already discussed
    in the section 7.2.4 CNNs use activation functions to introduce nonlinearity and
    improve the model''s ability to learn complex patterns. Popular choices include
    ReLU and Leaky ReLU.

    4. **Layers:** CNNs typically consist of multiple convolutional and pooling layers
    stacked together, followed by fully connected layers for classification or regression
    tasks. Each layer learns increasingly complex features from the previous layer''s
    output.


    CNN is best in the recognizing objects, scenes, and activities in images (e.g.,
    classifying handwritten digits and detecting faces in photos). It performs well
    in Locating and classifying objects within an image (e.g., identifying cars, pedestrians,
    and traffic signs in self-driving car applications). Image segmentation is the
    very powerful feature of CNN which is helping us by dividing an image into different
    regions corresponding to objects or semantic categories (e.g., segmenting organs
    in medical images). CNN is good in applying the artistic style of one image to
    another (e.g., creating images that look like they were painted by Van Gogh).
    Some of the popular CNN architectures include *LeNet-5*, *AlexNet*, *VGGNet*,
    *ResNet*, and *Inception*. Frameworks like TensorFlow and PyTorch offer tools
    for building and training CNNs. Let''s have a look on CNN model trained in python:'

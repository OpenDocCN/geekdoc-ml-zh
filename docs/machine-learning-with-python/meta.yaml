    # Components of LightGBM


    There are two major components:


    +   1. **Gradient-based one-side sampling (GOSS):** This technique intelligently
    samples data instances based on their gradients, focusing on informative examples
    that contribute more to improving the model. It is a method for efficiently selecting
    a subset of the training data during each iteration of the boosting process.

    2. **Exclusive feature bundling (EFB):** Bundles similar features together during
    tree construction, reducing memory usage and potentially improving efficiency.
    EFB aims to reduce the number of features involved in the learning process, while
    minimizing information loss. It focuses on “mutually exclusive” features, meaning
    features that rarely take nonzero values simultaneously. Let’s assume features
    representing different colors (red, blue, and green). They are mutually exclusive
    because an object cannot be red and blue at the same time.

    3. **Gradient centralized (GC) algorithm:** It optimizes calculations around gradients,
    leading to faster training times and aims to improve training efficiency and potentially
    even the final model’s performance by modifying the gradients used in the optimization
    process. Here, gradients tell the optimizer how much to update the weights of
    the neural network in each step. GC centralizes these gradients, meaning it subtracts
    the mean value from each column of the gradient matrix. This essentially forces
    the gradients to have an average of zero. GC differs'
  - '[PAGE 339]


    from gradient clipping, which limits the magnitude of individual gradients. While
    clipping prevents exploding gradients, GC focuses on overall gradient direction.
    Overall, we can say GC algorithm is a promising technique for improving the training
    of DNNs. It is relatively simple to implement and has shown positive results in
    various applications. However, it is important to consider its limitations and
    evaluate its effectiveness on a case-by-case basis.


    # Steps to Implement GOSS Works


    GOSS is a powerful technique that contributes to the efficiency and accuracy of
    LightGBM models. It is specifically designed for gradient boosting algorithms
    and might not be directly applicable to other machine learning models.


    +   1. **Calculate gradients:** For each data point, the algorithm calculates
    the gradient of the loss function with respect to the current model''s predictions.
    Imagine a landscape where the loss function represents the valleys and hills,
    and the gradient points you in the direction of steepest descent.

    2. **Sort by gradients:** Data points are then sorted based on the absolute magnitude
    of their gradients. Points with larger gradients (meaning they are farther away
    from the ideal prediction) are considered more “important” for training.


    # Selective Sampling


    +   1. **Large gradients:** All data points with large gradients are **retained**
    for training. These points contain valuable information for improvement.

    2. **Small gradients:** Points with small gradients are **randomly sampled with
    a certain probability**. This maintains diversity in the training set while focusing
    on more informative points.


    # Steps to Work with EFB


    EFB is a valuable technique for improving the efficiency and potentially the accuracy
    of LightGBM models, especially when dealing with large datasets and high-dimensional
    feature spaces. However, it is important to consider its limitations and evaluate
    its effectiveness in your specific context. Steps are given below:


    +   1. **Identify exclusive features:** Algorithms search for features with minimal
    overlap in nonzero values.

    2. **Bundle creation:** These identified features are grouped into a single “bundle.”
    This bundled feature acts as a combined representation of the individual features.

    3. **Decision tree splitting:** During tree building, the algorithm considers
    these bundles instead of individual features for splitting decisions. This reduces
    the search space and overall computation.

    4. **Unbundling (optional):** If needed, predictions can be “unbundled” back to
    the original features for interpretability.'

    \ words into their base form called?**\n   A) Tokenization  B) Lemmatization \
    \ C) Stemming  D) Normalization\n\n3. **Which of the following is an example of\
    \ a stop word?**\n   A) Computer  B) The  C) Algorithm  D) Language"

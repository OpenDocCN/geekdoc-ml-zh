    # 1.3.4 Using Package Managers: Pip and Conda


    Package managers are essential tools for managing Python libraries and dependencies.
    Two widely used package managers in the Python ecosystem are pip and conda. Here''s
    an overview of how to use them.


    # pip


    **Description:** pip serves as the primary package manager for the Python programming
    language. It streamlines the procedure of installation, enhancement, and administration
    of Python packages.

    **Installation:** If one is utilizing Python 3.4 or a more recent version, it
    is probable that the pip package manager is already present. To enhance the pip
    package manager to the most recent iteration, execute the following command:'
  - '[PAGE 29]


    ```

    $ python -m pip install --upgrade pip

    Installing a package:

    $ pip install package_name

    Example (installing NumPy):

    $ pip install numpy

    ```


    # conda


    **Description:** conda is a cross-platform package manager and environment management
    system. It is particularly powerful for managing packages with complex dependencies.

    **Installation:** Install conda by downloading and installing Anaconda or Miniconda.


    ```

    Creating a virtual environment

    $ conda create --name myenv

    Activating the virtual environment:

    $ conda activate myenv

    Installing a package:

    (myenv) $ conda install package_name

    Example (installing NumPy):

    (myenv) $ conda install numpy

    Deactivating the virtual environment:

    (myenv) $ conda deactivate

    Removing a virtual environment:

    $ conda env remove --name myenv

    ```


    Using pip and conda appropriately is crucial for managing dependencies in your
    Python environment. Choose the one that best fits your project requirements and
    ecosystem compatibility. It''s common to use pip for general Python packages and
    conda for packages with non-Python dependencies or in data science environments.


    # 1.3.5 Setting Up Jupyter Notebook


    The Jupyter Notebook, which is extensively utilized for interactive data analysis,
    exploration, and ML development, possesses significant capabilities. A comprehensive
    tutorial outlining the process of setting up Jupyter Notebook in your Python environment
    is presented here.'
  - "[PAGE 30]\n\n# Installation\n\n+   - Ensure that your Python environment is activated\
    \ (either globally or within a virtual environment).\n- Use **pip** to install\
    \ Jupyter Notebook:\n  $ pip install jupyter\n\n# Starting Jupyter Notebook\n\n\
    +   - To initiate the Jupyter Notebook server, execute the provided command in\
    \ your terminal or command prompt.\n  $ jupyter notebook\n\nThis action will initiate\
    \ the launch of a fresh tab in the web browser, thereby revealing the Jupyter\
    \ Notebook dashboard.\n\n# Creating a New Notebook\n\n+   - In the Jupyter Notebook\
    \ dashboard, one should proceed by selecting the “New” button and subsequently\
    \ opting for the “Python” option to generate a fresh Python notebook.\n\n# Using\
    \ Jupyter Notebooks\n\n+   - Jupyter Notebooks are composed of cells that can\
    \ contain either code or markdown (text). The execution of a cell can be initiated\
    \ by selecting it and clicking the “Run” button or by utilizing the appropriate\
    \ keyboard shortcut, typically Shift + Enter.\n- To incorporate an additional\
    \ cell, one may employ the “+” icon located in the toolbar or alternatively press\
    \ the B key on the keyboard to introduce a cell beneath the presently chosen cell.\n\
    \n# Installing Additional Kernels\n\n+   - Jupyter facilitates the utilization\
    \ of diverse programming languages by means of distinct kernels. If one desires\
    \ to employ a virtual environment other than the standard Python environment,\
    \ it is possible to procure a kernel for said environment. By installing the ipykernel\
    \ package, it becomes feasible to generate a fresh kernel.\n  $ pip install ipykernel\n\
    \  $ python -m ipykernel install -user -name=myenv -display-name=\"My Environment\"\
    \n\nNow, in your Jupyter Notebook, you can choose “My Environment” as a kernel."

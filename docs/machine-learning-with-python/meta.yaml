    print(hybrid_car.charge()) # 输出：Charging electric power\nprint(hybrid_car.drive())\
    \ # 输出：Driving in hybrid mode\n```\n\n该示例演示了一个名为“HybridCar”的派生类的使用，它同时继承自 `Engine`\

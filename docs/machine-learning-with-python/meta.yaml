    \n## 3.4.2 特征缩放\n\n特征缩放是一种预处理技术，用于标准化或归一化给定数据集中数值特征的范围。主要目的是确保所有特征具有可比的尺度，从而减少某些特征在模型训练过程中主导其他特征的可能性。标准化涉及将数据转换为均值为0、标准差为1，而归一化则将数据缩放到0到1的范围。\n\
    \n特征缩放对于严重依赖基于距离度量的算法（如k近邻和支持向量机）尤为重要。此外，对于由梯度下降驱动的优化算法（如线性回归和神经网络）也至关重要。通过将所有特征置于可比的尺度，特征缩放有可能提高收敛速度、防止数值不稳定，并增强机器学习模型的性能和可解释性。通常采用多种方法进行特征缩放，包括最小-最大缩放、Z分数缩放和鲁棒缩放。\n\
    \n## 标准化\n\n标准化是一种用于规范化数值特征的方法，通过转换使其均值为0、标准差为1。此过程涉及从每个特征的相应值中减去其均值，然后将结果除以标准差。\n\
    \n标准化的使用对于假设输入数据符合正态分布并赋予所有特征同等重要性的算法是有益的。它确保具有较大尺度的特征不会主导学习过程。例如，在一个包含年龄、收入和教育水平等具有不同尺度特征的数据集中，标准化将能够实现这些特征之间的比较。\n\
    \n```python\nfrom sklearn.preprocessing import StandardScaler\nimport pandas as\
    \ pd\n\n# 示例数值数据\ndata = {'Age': [30, 40, 50, 60],\n        'Income': [50000,\
    \ 60000, 70000, 80000],\n        'Education_Level': [12, 16, 18, 20]}\ndf = pd.DataFrame(data)\n\
    \n# 标准化\nscaler = StandardScaler()\ndf_scaled = pd.DataFrame(scaler.fit_transform(df),\
    \ columns=df.columns)\n\nprint(\"原始数据框:\")\nprint(df)\nprint(\"\\n标准化后的数据框:\"\
    )\nprint(df_scaled)\n```\n\n输出：\n\n```\n原始数据框:\n   Age  Income  Education_Level\n\
    0   30   50000               12\n1   40   60000               16\n2   50   70000\
    \               18\n3   60   80000               20\n\n标准化后的数据框:\n        Age\
    \    Income  Education_Level\n0 -1.341641 -1.341641        -1.521278\n1 -0.447214\
    \ -0.447214        -0.169031\n2  0.447214  0.447214         0.507093\n3  1.341641\
    \  1.341641         1.183216\n```\n\n图 3.18：数据框的标准化。\n\n在这个实例中，描述年龄、收入和教育水平的初始数值数据通过使用scikit-learn中实现的StandardScaler进行了标准化。每个特征都被调整为具有平均值0和标准差1，从而使它们能够在不同尺度上进行比较。这种保障确保了在严重依赖数值数据的机器学习算法中，没有任何单个特征对学习过程产生不当影响。\n\
    \n## 归一化\n\n归一化是一种特征缩放技术，它将数值数据转换为通常在0到1之间的标准化尺度。此过程涉及调整每个特征的值，使其落在此范围内，同时保留它们的相对关系。\n\
    \n当特征的量级表现出显著差异时，归一化尤其有利，因为它确保所有特征对学习过程的贡献是公平的。它被广泛应用于要求输入数据限制在特定范围内的算法，例如神经网络和基于距离的算法（如k近邻）。详细来说，例如，如果我们拥有年龄、收入和教育水平等具有不同尺度的特征，归一化将它们统一到一个标准化尺度上，从而便于直接比较。\n\
    \n```python\nfrom sklearn.preprocessing import MinMaxScaler\nimport pandas as\
    \ pd\n\n# 示例数值数据\ndata = {'Age': [30, 40, 50, 60],\n        'Income': [50000,\
    \ 60000, 70000, 80000],\n        'Education_Level': [12, 16, 18, 20]}\ndf = pd.DataFrame(data)\n\

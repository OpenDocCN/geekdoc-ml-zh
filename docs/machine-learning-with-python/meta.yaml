    - 显示绘图。\n\n上述代码显示了两个子图。第一个子图显示了应用SVM之前的原始数据点，根据其类别标签着色。第二个子图显示了应用线性SVM之后的数据点，以及分隔类别的决策边界（超平面），如下所示。\n\
    \n![](img/c3c5898a15ab3a66ce4ae6d1872b8b51_258_0.png)\n\n图 5.17：SVM之前的IRIS数据和之后的IRIS数据。\n\
    \n图 5.17 展示了应用支持向量机（SVM）算法之前和之后的鸢尾花数据集的对比可视化。\n\n## 5.4.2 核SVM\n\n核支持向量机（SVM）以其相对于传统SVM算法的重大进步而闻名。这使得SVM能够对无法线性分离的数据进行分类。这是通过将数据隐式映射到更高维度的特征空间来实现的。\n\
    \n核SVM的主要目标是在特征空间中找到能够分隔类别的最优超平面。这是通过使用核函数对数据进行非线性变换来实现的。\n\n被称为核技巧的技术在允许计算高维特征空间中的点积方面起着至关重要的作用，同时避免了对数据的显式变换。使用了各种核函数，例如线性核、多项式核、径向基函数（RBF）核和Sigmoid核，来衡量不同数据点之间的相似性。\n\
    \n通过将数据转换到更高维度的空间，核SVM使得在原始特征空间中建立本质上非线性的决策边界成为可能。这允许对类别进行线性分离。\n\n核SVM有多种类型的核可用：\n\
    \n- 线性核：计算输入特征之间的点积。\n- 多项式核：基于输入特征的多项式展开计算相似性。\n- RBF核：基于高斯径向基函数计算相似性。\n- Sigmoid核：基于双曲正切函数计算相似性。\n\
    \n核SVM的优化问题通过诸如序列最小优化（SMO）算法或二次规划等技术来解决。这些方法通过最大化类别之间的间隔或最小化分类误差来确定高维空间中的最优超平面。\n\
    \n在可扩展性方面，对于大型数据集，核SVM可能在计算上要求很高，特别是当涉及非线性核和高维特征空间时。\n\n核SVM在各种机器学习任务中得到了广泛应用，包括分类、回归和异常检测，其中数据中存在明显的非线性关系。\n\
    \n总之，核SVM是一种处理数据中非线性关系的通用且有效的算法，能够在特征空间中构建复杂的决策边界。它使用核函数隐式转换数据的能力使其适用于广泛的机器学习应用。\n\
    \n下面是一个演示核SVM实现的Python代码。\n\n步骤：\n\n- 首先使用scikit-learn中的make_circles函数生成合成数据，创建带有一些噪声的圆形簇。\n\
    - 使用plt.scatter绘制应用SVM之前生成的数据。\n- 使用scikit-learn库中的支持向量分类器（SVC）训练一个具有径向基函数（RBF）核的模型，以进行核支持向量机（SVM）训练。\n\
    - SVM模型训练完成后，需要通过绘图可视化数据，并使用contourf方法叠加从SVM模型得出的决策边界。\n\n```python\nimport numpy\
    \ as np\nimport matplotlib.pyplot as plt\nfrom sklearn.datasets import make_circles\n\
    from sklearn.svm import SVC\n\n# 生成合成数据\nX, y = make_circles(n_samples=100, noise=0.1,\
    \ factor=0.4,\n                    random_state=42)\n\n# 绘制SVM之前的数据\nplt.figure(figsize=(10,\
    \ 5))\nplt.scatter(X[:, 0], X[:, 1], c=y, cmap='coolwarm', edgecolors='k')\nplt.title('SVM之前的数据')\n\
    plt.xlabel('特征 1')\nplt.ylabel('特征 2')\n\n# 训练核SVM\nsvm_model = SVC(kernel='rbf',\
    \ gamma='auto')\nsvm_model.fit(X, y)\n\n# 绘制SVM之后的数据\nplt.figure(figsize=(10,\
    \ 5))\nplt.scatter(X[:, 0], X[:, 1], c=y, cmap='coolwarm', edgecolors='k')\n\n\
    # 绘制决策边界\nax = plt.gca()\nxlim = ax.get_xlim()\nylim = ax.get_ylim()\nxx, yy =\
    \ np.meshgrid(np.linspace(xlim[0], xlim[1], 50),\n    np.linspace(ylim[0], ylim[1],\
    \ 50))\nZ = svm_model.decision_function(np.c_[xx.ravel(), yy.ravel()])\nZ = Z.reshape(xx.shape)\n\
    plt.contourf(xx, yy, Z, cmap='coolwarm', alpha=0.3)\nplt.title('应用SVM及超平面后的数据')\n\
    plt.xlabel('特征 1')\nplt.ylabel('特征 2')\n\nplt.show()\n```\n\n![](img/c3c5898a15ab3a66ce4ae6d1872b8b51_261_0.png)\n\
    \n图 5.18：应用核SVM之前的数据。\n\n图 5.18 展示了应用核支持向量机（SVM）算法之前的数据集的散点图可视化。该图显示了数据点，每个点代表一个单独的观察值或实例，分布在两个维度或特征上。这些特征分别由x轴和y轴表示。\n\
    \n然而，在此图中，散点图上叠加了一个额外的组件：核SVM模型在变换后的高维特征空间中学习到的决策边界或分离超平面。\n\n- 第一个图显示了使用 **make_circles**\

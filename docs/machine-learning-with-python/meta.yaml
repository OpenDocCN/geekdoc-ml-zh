    \ B 键在当前选定单元格下方插入一个单元格。\n\n### 安装额外内核\n\n- Jupyter 通过不同的内核支持多种编程语言。如果您希望使用标准 Python\
    \ 环境以外的虚拟环境，可以为该环境获取内核。通过安装 ipykernel 包，可以生成一个新的内核。\n  ```\n  $ pip install ipykernel\n\
    \  $ python -m ipykernel install --user --name=myenv --display-name=\"My Environment\"\
    \n  ```\n\n现在，在您的 Jupyter Notebook 中，可以选择“My Environment”作为内核。\n\n### 导出笔记本\n\n\
    - 您可以将 Jupyter Notebooks 导出为多种格式，包括 HTML、PDF 和 Markdown。使用“File”菜单访问“Download\
    \ as”选项，然后选择您喜欢的格式。\n\n### 关闭 Jupyter Notebook\n\n- 要停止 Jupyter Notebook 服务器，请返回到运行它的终端，然后按\
    \ Ctrl + C。确认时输入 Y 并按 Enter。\n\n设置 Jupyter Notebook 为构建机器学习模型、可视化数据和记录工作提供了一个交互式和直观的环境。它与\
    \ Python 框架无缝集成，使其成为数据科学家和程序员的多功能工具。\n\n## 1.3.6 在 Python 中管理机器学习项目的最佳实践\n\n在\
    \ Python 中管理机器学习项目不仅仅是编写代码。采用最佳实践可确保项目组织、可重复性和协作。以下是详细指南。\n\n### 项目结构\n\n- 使用清晰的目录结构组织您的项目。常用的结构包括将数据、代码和文档分离到不同的目录中。\n\
    \n```\nmy_project/\n├── data/\n├── src/\n│   ├── __init__.py\n│   ├── data_processing.py\n\
    │   └── model_training.py\n├── notebooks/\n├── README.md\n└── requirements.txt\n\
    ```\n\n### 使用 Git 进行版本控制\n\n- 使用 Git 进行版本控制。在项目根目录初始化一个 Git 仓库并定期提交。将代码托管在 GitHub\

    \ the **order and context** of elements within the sequence. ARIMA models are\
    \ a class of statistical models commonly used for time series analysis and forecasting.\
    \ They are particularly useful when dealing with data that exhibits non-stationarity,\
    \ meaning the statistical properties of the data (such as mean and variance) change\
    \ over time. They are particularly useful when the data exhibits **stationarity**,\
    \ meaning the statistical properties (mean, variance, and autocorrelation) remain\
    \ constant over time. Prophet is an open-source forecasting tool developed by\
    \ Facebook's Core Data Science team. It is designed to handle time series data\
    \ with strong seasonal effects and multiple seasonality. Prophet uses an additive\
    \ model where different components of the time series (trend, seasonality, and\
    \ holiday effects) are modeled separately and combined to make predictions. Both\
    \ **Prophet** and **neural networks** are powerful tools for **time series forecasting**,\
    \ but they differ in their approach, strengths, and weaknesses:\n\nCollaborative\
    \ filtering (CF) is a technique used in recommender systems to predict the preferences\
    \ of a user based on the preferences of similar users or items. It's a powerful\
    \ tool for personalizing recommendations across various domains like suggesting\
    \ products, movies, music, or even news articles. The underlying idea is to leverage\
    \ the collective wisdom of a group of users to infer preferences for individual\
    \ users.\n\n# Exercise (MCQs)\n\n+   1. **Which of the following is NOT a common\
    \ task in NLP?**\n   A) Machine translation\n   B) Image recognition\n   C) Text\

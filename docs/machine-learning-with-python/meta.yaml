    \ DataFrame 的框架。\n\n```python\nimport pandas as pd\n\n# Creating a DataFrame\n\
    data = {'Date': ['2022-01-01', '2022-01-01', '2022-01-02', '2022-01-02'],\n  \
    \      'Category': ['A', 'B', 'A', 'B'],\n        'Value': [10, 20, 15, 25]}\n\
    df = pd.DataFrame(data)\n\n# Reshaping with pivot\ndf_pivot = df.pivot(index='Date',\
    \ columns='Category', values='Value')\n\nprint(\"Original DataFrame:\")\nprint(df)\n\
    print(\"\\nDataFrame after Pivot:\")\nprint(df_pivot)\n```\n\n**输出：**\n\n```\n\
    Original DataFrame:\n         Date Category  Value\n0  2022-01-01        A   \
    \  10\n1  2022-01-01        B     20\n2  2022-01-02        A     15\n3  2022-01-02\
    \        B     25\n\nDataFrame after Pivot:\nCategory     A   B\nDate        \
    \      \n2022-01-01  10  20\n2022-01-02  15  25\n```\n\n图 3.12：使用 pivot 进行重塑。\n\
    \n在此示例中，原始 DataFrame 采用长格式，每个日期都有单独的行对应类别 A 和 B。应用 pivot 后，数据被重塑为宽格式，日期作为索引，类别作为列，提供了更清晰的表格结构。\n\
    \n**数据融合：**\n在 pandas 库中使用 `melt` 函数对于将宽格式数据转换为长格式至关重要。当数据以表格或水平结构排列并需要转换为堆叠或垂直格式时，这变得特别有价值。该方法中包含的\

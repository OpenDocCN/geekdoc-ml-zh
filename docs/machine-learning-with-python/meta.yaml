- md: "## 2.4 Control Structures\n\nControl statements in Python are utilized to regulate\
    \ the progression of execution within a program. They afford us the ability to\
    \ render decisions, iterate through a code block, or bypass specific sections\
    \ of code contingent upon predetermined conditions. The key control statements\
    \ in Python encompass the following:\n\n- Conditional statements\n- Loops\n\n\
    ## 2.4.1 Conditional Statements\n\nConditional statements in programming are constructs\
    \ that facilitate the execution of diverse code blocks predicated on specified\
    \ conditions. These constructs empower a program to exercise discernment, select\
    \ between disparate actions, and govern the progression of execution. Conditional\
    \ statements are paramount for composing dynamic and adaptable code.\n\nConditional\
    \ statements play a fundamental role in designing algorithms, handling user inputs,\
    \ and responding to various scenarios within a program. They contribute to the\
    \ logical structure and decision-making capabilities of computer programs.\n\n\
    The fundamental concept entails evaluating the veracity or falsity of a particular\
    \ condition, and subsequently, implementing distinct sections of code in accordance\
    \ with the outcome.\n\n- **if statement:**\nThe if statement is employed to execute\
    \ a block of code on the condition that a specified condition holds true.\n\n\
    ### Syntax\n\n```python\nif condition:\n    # code to be executed if the condition\
    \ is true\n\nx = 10\nif x > 5:\n    print(\"x is greater than 5\")\n```\n\nThe\
    \ print statement will be executed solely if the condition `x > 5` is verified,\
    \ as illustrated in this example.\n\n- **if-else statement:**\nThe if-else statement\
    \ grants the capability to execute a specific block of code when a given condition\
    \ is found to be true, and alternatively, to execute a distinct block of code\
    \ when the condition is found to be false.\n\n```python\nif condition:\n    #\
    \ code to be executed if the condition is true\nelse:\n    # code to be executed\
    \ if the condition is false\n\nx = 3\n\nif x % 2 == 0:\n    print(\"x is even\"\
    )\nelse:\n    print(\"x is odd\")\n```\n\nIn this instance, the program shall\
    \ output whether x is classified as even or odd contingent upon the condition.\n\
    \n- **if-elif-else statement:**\nThe if-elif-else statement is an expansion of\
    \ the if-else statement, enabling the examination of multiple conditions in a\
    \ sequential manner.\n\n```python\nif condition1:\n    # code to be executed if\
    \ condition1 is true\nelif condition2:\n    # code to be executed if condition2\

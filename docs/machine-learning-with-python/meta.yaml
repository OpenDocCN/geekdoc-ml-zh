    Some of the common activation functions are given below


    +   - **Sigmoid:** Outputs a value between 0 and 1, resembling a smooth S-shaped
    curve. Versatile but can suffer from vanishing gradients in deep networks.

    - **Tanh:** Similar to Sigmoid but with an output range of -1 to 1. Less susceptible
    to vanishing gradients but can saturate at the extremes.

    - **ReLU (rectified linear unit):** Simple and computationally efficient, outputs
    the input directly if positive, otherwise outputs zero. Popular choice due to
    its speed and sparsity.

    - **Leaky ReLU:** Similar to ReLU but allows a small nonzero gradient for negative
    inputs, preventing neurons from dying completely.

    - **ELU (exponential linear unit):** Smoothly transitions between linear and nonlinear
    behavior, addressing some issues of ReLU.



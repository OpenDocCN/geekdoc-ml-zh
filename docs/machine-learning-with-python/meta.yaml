  md: 'on its actions. The agent''s goal is to learn a policy – a mapping from states
    to actions – that maximizes cumulative rewards over time.


    +   2. **Environment:** The system or world the agent interacts with, providing
    feedback through rewards and penalties. The environment represents the external
    system or process with which the agent interacts. It is defined by a set of states,
    actions, and transition dynamics. The environment also provides feedback to the
    agent in the form of rewards or penalties based on its actions.


    +   3. **Action:** The choices the agent can make within the environment. An action
    is a decision or choice made by the agent that affects the state of the environment.
    Actions can be discrete (e.g., selecting from a finite set of options) or continuous
    (e.g., specifying a value within a continuous range).


    +   4. **Reward:** The feedback signal the environment provides to the agent,
    indicating the goodness or badness of its actions. A reward is a scalar feedback
    signal provided by the environment to the agent after each action. It indicates
    the immediate desirability or quality of the action taken by the agent. The agent''s
    goal is to learn a policy that maximizes the cumulative reward over time.


    +   5. **Policy:** The agent''s strategy for choosing actions is based on the
    current state of the environment. A policy is a mapping from states to actions
    that defines the agent''s behavior. It specifies the action the agent should take
    in each state to maximize expected cumulative rewards. Policies can be deterministic
    or stochastic, depending on whether they directly specify actions or provide a
    probability distribution over actions.


    +   6. **State:** A state represents the current situation or configuration of
    the environment. It contains all the relevant information needed for the agent
    to make decisions. States can be discrete or continuous, depending on the nature
    of the environment.


    +   7. **Value functions:** The value function estimates the expected cumulative
    reward that an agent can achieve from a given state or state-action pair. It quantifies
    the desirability of being in a particular state or taking a particular action
    and is used to guide the agent''s decision-making process.


    +   8. **Exploration and exploitation:** RL involves a trade-off between exploration
    (trying out new actions to discover potentially better strategies) and exploitation
    (selecting actions that are known to yield high rewards based on current knowledge).
    Balancing exploration and exploitation is crucial for effective learning.


    # 8.5.2 Learning Process


    +   1. **Trial and error:** Through interacting with the environment and receiving
    rewards, the agent learns by trial and error. It gradually improves its policy
    by selecting actions that lead to higher rewards over time.'

    # 3.4.1 Encoding Categorical Variables


    Encoding categorical variables is an essential step in feature engineering, especially
    for tasks related to machine learning. It involves transforming categorical data
    into a numerical format that algorithms can understand. One common technique is
    called “one-hot encoding,” where each category is represented by a binary value
    (0 or 1) in a separate column. This approach preserves the categorical information
    without imposing any ordinality. Another approach is label encoding, where each
    category is assigned a unique integer. However, label encoding can introduce ordinality
    that is not present in the original data, potentially misleading the algorithm.
    Therefore, selecting the appropriate encoding method is crucial to ensure an accurate
    representation of categorical variables during the model training process.


    # One-Hot Encoding


    One-hot encoding is a technique that is used to convert categorical variables
    into a numerical format that is suitable for machine learning algorithms. In this
    methodology, each category is represented as a binary vector, where only one bit
    is assigned a value of 1 to indicate the presence of the respective category.
    This approach ensures that the categorical information is preserved without introducing
    any form of ordinality. For example, if we have three categories, namely ‘Red’,
    ‘Green’, and ‘Blue’, they would be encoded as [1, 0, 0], [0, 1, 0], and [0, 0,
    1], respectively.


    ```

    import pandas as pd


    # Sample categorical data

    data = {''Color'': [''Red'', ''Green'', ''Blue'', ''Red'', ''Blue'']}

    df = pd.DataFrame(data)


    # One-hot encoding

    one_hot_encoded = pd.get_dummies(df[''Color''])


    print("Original DataFrame:")

    print(df)

    print("\nOne-hot Encoded DataFrame:")

    print(one_hot_encoded)

    ```'

    - 4. __________ 是一种使用全局词共现统计的方法，基于单词在整个语料库中共同出现的频率来捕捉语义关系。

    - 5. GRU 是 __________ 的另一种变体，通过将输入门和遗忘门合并为单个更新门，简化了与 LSTM 相比的架构。



    \ For example, a class may inherit from one class using multiple inheritance and\
    \ from another class using single inheritance.\n\n# Example of Single Inheritance\n\
    \n```\n# Base class\nclass Animal:\n    def __init__(self, name):\n        self.name\
    \ = name\n\n    def speak(self):\n        return \"Some generic sound\"\n\n# Derived\

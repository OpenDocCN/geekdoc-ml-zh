    ## 5.7 Naive Bayes


    Naive Bayes, a classification algorithm that leverages Bayes'' theorem and assumes
    independence between features, is both simple and effective. Despite its oversimplified
    assumptions, it often performs exceptionally well in practical scenarios, especially
    in the realm of text classification problems.


    The core idea of Naive Bayes is to calculate the probability of each class based
    on the feature values of the instance being classified. Subsequently, predictions
    are made by selecting the class with the highest probability.


    Naive Bayes, a powerful probabilistic classifier, relies on Bayes'' theorem and
    assumes feature independence in a straightforward manner.


    ## Bayes'' Theorem


    Naive Bayes is grounded on Bayes'' theorem, an articulated principle that outlines
    the probability of a hypothesis when provided with the evidence:


    $P(class|data) = (P(data|class) * P(class)) / P(data)$


    Where:


    - P(class|data) represents the likelihood of the class in relation to the given
    data, which is determined by the feature values.

    - P(data|class) signifies the conditional probability of the data based on the
    class.

    - P(class) denotes the prior probability associated with the class.

    - P(data) serves as the evidence and functions as a constant that scales the probabilities.


    The "naive" assumption is derived from the notion that Naive Bayes assumes conditional
    independence among all features, given the class label. This simplification enables
    the calculation of P(data|class) to be performed in the subsequent manner:


    Mathematically, this is expressed as:


    $P(data|class) = P(feature1|class) * P(feature2|class) * ... * P(featureN|class)$


    This assumption, although seldom valid in practical scenarios, renders the computations
    significantly more manageable and enables the application of Naive Bayes to problems
    with a high number of dimensions.


    To conduct training for a Naive Bayes classifier, it is imperative to compute
    the prior probabilities P(class) and the likelihood probabilities P(feature|class)
    based on the available training data. In the case of numerical features, it is
    often assumed that they follow a Gaussian distribution, and consequently, the
    mean and variance for each class are estimated. As for categorical features, the
    frequency of each feature value for each class can be straightforwardly calculated.


    During the prediction phase, the posterior probability P(class|data) is computed
    for each class, utilizing the prior and likelihood probabilities estimated during
    the training phase. The class that possesses the greatest posterior probability
    is subsequently chosen as the anticipated class for the given example.


    Despite its straightforwardness, Naive Bayes frequently serves as a reliable benchmark
    classifier and can exhibit remarkable effectiveness, particularly when the assumption
    of feature independence is not flagrantly violated. Moreover, it is highly efficient
    for both training and prediction, rendering it well suited for real-time applications
    and large datasets.


    There are different variants of Naive Bayes classifiers, including:


    - Gaussian Naive Bayes: Assumes that continuous features adhere to a Gaussian
    (normal) distribution.

    - Multinomial Naive Bayes: Suitable for discrete attributes, such as word frequencies
    in the task of categorizing text.

    - Bernoulli Naive Bayes: Assumes binary features, often used for document classification
    tasks.


    Let''s consider a simple example of using Naive Bayes for email spam classification.


    We consider a dataset consisting of emails, each classified as either "spam" or
    "not spam" (ham). Our objective is to construct a Naive Bayes classifier that
    can forecast whether a new email is spam or not by analyzing the presence or absence
    of specific words within the email''s body.


    Let''s say we have the following training data:


    ```

    Email 1 (ham): "You have won a free vacation!"

    Email 2 (spam): "Make money fast with our secret system!"

    Email 3 (ham): "Meeting at 3 pm to discuss project."

    Email 4 (spam): "Earn $$$$ from home today!"

    ```


    We can extract the unique words (features) from the dataset:


    ```

    [''you'', ''have'', ''won'', ''free'', ''vacation'', ''make'', ''money'', ''fast'',

    ''secret'', ''system'', ''meeting'', ''pm'', ''discuss'', ''project'', ''earn'',

    ''from'', ''home'', ''today'']

    ```


    In order to educate the Naive Bayes classifier, it is necessary to compute the
    prior probabilities P(spam) and P(ham), as well as the likelihood probabilities
    P(word|spam) and P(word|ham) for each individual word.


    Given that an equivalent amount of spam and ham emails are present in the training
    data, the prior probabilities would be as follows:


    P(spam) = P(ham) = 0.5



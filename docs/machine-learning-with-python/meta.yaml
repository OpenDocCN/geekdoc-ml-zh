    # 2.1.2 History of Python


    Python language, which was created by Guido van Rossum in 1991, is not named after
    the type of snake, but rather after a British Comedy group called “Monty Python’s
    Flying Circus.” Guido van Rossum, being a big fan of the group and their quirky
    humor, named the language in their honor. In the year 2000, Python 2.0 was released
    with new features such as comprehensions, cycle detecting garbage collection,
    and Unicode support, 10 years after the initial release of Python 1.0. Python
    programs often pay tribute to the group by incorporating their jokes and famous
    quotes into the code.


    Python is available in two major versions: Python 3.x and Python 2.x. Python 2.x,
    which is considered a legacy version, will be supported until 2020, while Python
    3.x is the more frequently updated and popular version. Some features from Python
    3 can be imported into Python 2.x using the “__future__” module. Python 3.0, released
    in 2008, was a major release that lacked backward compatibility, meaning that
    code written in Python 2.x could not run on the Python 3.x series.


    However, this issue was addressed in Python 2.7, as a large amount of code had
    already been written in the Python 2.x series. Initially, support for Python 2.7
    was set to end in 2015, but it has since been extended to 2020. Guido van Rossum
    took on the responsibility of leading the Python project until July 2018, when
    he passed on the role to a five-person steering council. This council will now
    be responsible for releasing future versions of Python.



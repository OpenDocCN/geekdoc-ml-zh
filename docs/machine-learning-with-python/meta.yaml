    \n## 2.8.2 继承与多态\n\n### Python 中的继承\n\n在面向对象编程领域，继承的概念具有重要意义，因为它允许一个新类从一个已存在的类中获取属性和方法。这个已存在的类通常被称为“基类”或“父类”，而新形成的类则扮演派生类或子类的角色。通过利用继承，可以促进代码的重用并建立包含各种类的层次结构。\n\
    \n```python\n# 基类\nclass Animal:\n    def __init__(self, name):\n        self.name\

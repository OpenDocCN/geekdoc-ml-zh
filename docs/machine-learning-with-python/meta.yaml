    \    - It has similar parameters to **AdaBoostClassifier**, but it is used for\
    \ predicting continuous target variables instead of discrete class labels.\n \
    \   - After training, the model can predict the continuous target values of new\
    \ data points.\n\nBoth **AdaBoostClassifier** and **AdaBoostRegressor** follow\
    \ the scikit-learn estimator API, which means they can be used in conjunction\
    \ with other scikit-learn functions like **fit**, **predict**, **score**, and\
    \ cross-validation methods.\n\nGradient boosting is a method of ensemble learning\
    \ that generates a robust predictive model through the gradual, additive, and\
    \ sequential combination of numerous less influential models. The following are\
    \ the essential stages:\n\n+   1. Start with an initial model / estimate (like\
    \ small decision tree)\n2. Calculate the loss function (like deviance loss) to\
    \ quantify the error in initial model's predictions on training data\n3. Fit a\
    \ new weak model to predict the residuals or errors of the previous model. This\
    \ model tries to correct errors from previous model.\n4. Add the new weak model\
    \ to ensemble with a multiplier (learning rate). Update the predictions from aggregate\
    \ ensemble."

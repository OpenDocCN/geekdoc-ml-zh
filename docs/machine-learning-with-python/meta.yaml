    # 5.6 Principal Component Analysis


    PCA, commonly known as Principal Component Analysis, is a highly prevalent method
    employed for the purpose of reducing dimensionality in various domains such as
    machine learning, data mining, and signal processing. It is an empirical procedure
    that converts a dataset with a high number of dimensions into a subspace with
    fewer dimensions, while retaining a significant portion of the original data''s
    variability. Especially when confronted with datasets with a high number of dimensions,
    PCA proves to be highly beneficial as it aids in simplifying computational complexity,
    eliminating noise, and facilitating data visualization within a lower-dimensional
    space.


    # Mathematical Concepts Employed in PCA


    **Covariance matrix:** PCA commences by standardizing the data in order to achieve
    a mean of zero and a standard deviation of one for each feature. Subsequently,
    the covariance matrix is calculated to capture the associations between pairs
    of features.'
  - '[PAGE 280]


    The computation of the covariance between two features xi and xj is performed
    as follows:


    ```

    $cov(x_i, y_i) = \frac{1}{n-1} \sum_{k=1}^{n} (x_{ki} - \bar{x}_i) (x_{kj} - \bar{x}_j)$

    ```


    where n represents the total number of samples, xki and xkj denote the values
    of the ith and jth features of the kth sample, and μi and μj correspond to the
    means of features xi and xj, respectively.


    # Eigendecomposition


    PCA employs eigendecomposition on the covariance matrix to ascertain the principal
    components. The eigenvectors of said matrix encapsulate the directions of maximal
    variance, commonly identified as the principal components. Moreover, the corresponding
    eigenvalues offer vital information regarding the proportion of variance elucidated
    by each distinct component.


    Covariance Matrix × Eigenvector = Eigenvalue × Eigenvector

    Moreover, the eigenvectors are mutually orthogonal and collectively establish
    a fresh foundation for the data.


    # Selecting Principal Components


    +   - The principal components are ranked in a descending order based on the eigenvalues,
    with the first component capturing the highest amount of variance, followed by
    the second component capturing the second highest amount of variance, and so on.

    - It is a widely accepted convention to choose a particular percentage of the
    total variance, such as 90%, as a threshold for determining the number of principal
    components to retain.


    # Projection


    Finally, the data is projected onto the designated principal components in order
    to acquire the representation with reduced dimensions. This projection is accomplished
    by performing the multiplication of the original data matrix with the matrix consisting
    of the chosen eigenvectors (principal components).'

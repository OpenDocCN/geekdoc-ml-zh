    ## 第1章

    ### 机器学习简介


    #### 1.1 什么是机器学习？


    机器学习是人工智能领域内的一个学科，专注于创建算法和模型，使计算机系统能够在无需明确编程的情况下获取知识并做出预测或决策。机器学习的主要目标是使计算机能够基于经验或数据自主学习并提升其性能。


    ![图 1.1：人工智能、机器学习与深度学习。](img/c3c5898a15ab3a66ce4ae6d1872b8b51_10_0.png)


    ##### 1.1.1 机器学习的定义


    不同的专家和资料来源可能会提供略有差异的机器学习定义，这反映了对该领域的不同视角。以下是不同权威人士给出的一些不同定义：


    https://doi.org/10.1515/9783110697186-001


    Arthur Samuel (1959)

    “机器学习是一个研究领域，它赋予计算机无需明确编程即可学习的能力。”


    Tom Mitchell (1997)

    “对于某类任务T和性能度量P，如果一个计算机程序在T中的任务上，以P衡量的性能，随着经验E而改善，则称该程序从经验E中学习。”


    Andrew Ng（Coursera联合创始人，斯坦福大学）

    “机器学习是让计算机在无需明确编程的情况下行动的科学。”


    Pedro Domingos（《终极算法》作者）

    “机器学习是发现的自动化，它负责让我们的智能手机工作，帮助医生诊断疾病，在棋类游戏中击败人类，以及更多。”


    Ian Goodfellow 和 Yoshua Bengio（《深度学习》作者）

    “机器学习是一个研究领域，它赋予计算机无需明确编程即可学习的能力。它是一种人工智能，为系统提供了从经验中自动学习和改进的能力。”


    微软 Azure 机器学习文档

    “机器学习是使用算法使计算机在无需明确编程的情况下做出决策的过程。这些算法使用统计模型，使计算机能够在没有特定编程的情况下执行任务。”


    ##### 1.1.2 历史背景


    机器学习的历史进程跨越了数十年，其发展以重要的里程碑和贡献为特征。以下是机器学习历史背景的简要概述。


    **1950年代 – 早期概念**


    机器学习的建立可以追溯到1950年代，当时像艾伦·图灵这样的著名人物做出了重大贡献。图灵提出了机器能够通过经验获取知识的概念，这为该领域的未来发展铺平了道路。


    **1956年 – 达特茅斯会议**


    “人工智能”一词在1956年的达特茅斯会议上被提出。这次会议为人工智能和机器学习作为多学科研究领域的发展奠定了基础。


    **1960年代 – 决策树与最近邻算法**


    决策树算法的发展和最近邻算法的引入发生在1960年代，从而为早期的模式识别技术做出了显著贡献。


    **1970年代 – 反向传播与基于规则的系统**


    用于训练人工神经网络的算法，即反向传播，于1970年代首次被提出。同样，强调决策规则明确编程的基于规则的系统，在这一时期也经历了流行度的激增。


    **1980年代 – 专家系统**


    采用基于规则的逻辑来模仿人类决策的专家系统，在1980年代获得了显著地位。然而，由于它们无法有效处理不确定性并轻松适应新信息，人们的注意力发生了转移。


    **1990年代 – 支持向量机与提升算法**


    1990年代见证了支持向量机在分类任务中的出现，以及提升算法在增强弱学习器效能方面的应用。


    **1990年代末 – 数据挖掘的兴起**


    由于大型数据集的可用性增加，1990年代末人们对数据挖掘的兴趣激增，这是一个与机器学习密切相关的领域，专注于从数据中提取知识。


    **2000年代 – 集成学习与深度学习**


    2000年代见证了集成学习技术的流行激增，该技术结合多个模型以提升性能。与此同时，深度学习的出现——机器学习的一个分支，专注于具有多层的神经网络——是由计算能力的进步推动的。


    **2010年代 – 深度学习的主导地位**


    2010年代见证了深度学习在各个领域的盛行，在图像和语音识别、自然语言理解等领域取得了重大进展。技术基础设施的进步，特别是图形处理单元的使用，被证明是深度学习成功的关键。


    **当前 – 持续进步**


    机器学习正在经历快速演变，其特点是在强化学习、迁移学习和可解释人工智能等多个领域持续进行研究和开发。该领域的应用跨越了医疗保健、金融和自主系统等多个行业。


    机器学习的历史背景展示了从最初的构想到当今复杂算法和广泛实际应用时代的演进。计算能力的进步、大规模数据集的可用性以及跨学科合作共同推动了该领域的发展。


    ##### 1.1.3 机器学习的类型


    机器学习是人工智能的一个分支，使计算机能够在无需明确指令的情况下获取知识并得出结论。这一革命性的学科包含不同的方法论，每种方法论都旨在解决特定的学习情境。机器学习的主要形式包括监督学习、无监督学习和强化学习，每种形式都为解决各种问题提供了不同的方法和应用。现在，让我们深入探讨这些基础分类。


    ###### 1.1.3.1 监督学习


    在监督学习中，算法在一个已标记的数据集上进行训练，其中输入数据与相应的输出标签相匹配。目标是让算法学习从输入到输出的映射，以便在面对新的、未见过的输入数据时，能够对相应的输出做出准确的预测。'

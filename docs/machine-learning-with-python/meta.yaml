    \n图 5.25：K-Means聚类前的数据。\n\n图 5.25 展示了应用k-means聚类算法之前数据集的散点图可视化。该图显示了数据点，每个点代表一个单独的观测值或实例，分布在两个维度或特征上。这些特征分别由x轴和y轴表示。\n\
    \n![](img/c3c5898a15ab3a66ce4ae6d1872b8b51_276_1.png)\n\n图 5.26：K-Means聚类后的数据。\n\

    \n## 4.3 评估指标\n\n评估指标是评估机器学习模型有效性的基本工具，提供了关于模型泛化能力和在新数据上做出准确预测能力的宝贵信息。这些指标衡量模型性能的各个方面，例如准确率、精确率、召回率和F1分数等。理解和选择合适的评估指标对于评估模型的有效性和指导改进其性能的策略至关重要。\n\

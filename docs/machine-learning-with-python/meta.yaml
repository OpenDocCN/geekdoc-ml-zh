  md: "2. Finding the inverse of a quadratic function in this case involves:\n   \
    \ (i) Replacing the function's output (usually denoted by y) with a new variable\
    \ (often x').\n    (ii) Swapping the roles of x and x' in the equation.\n    (iii)\
    \ Solving the equation for x' in terms of y (which now represents the input).\n\
    3. This process can result in various solutions depending on the original quadratic\

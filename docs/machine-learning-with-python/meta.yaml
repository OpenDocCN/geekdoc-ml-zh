    # 5.2.2 Multiclass Classification


    Multiclass classification pertains to a task in machine learning wherein the objective
    is to categorize input data into three or more classes or categories. Distinct
    from binary classification, which entails solely two classes, multiclass classification
    encompasses the prediction of multiple potential outcomes. We shall now elucidate
    the concept of multiclass classification through the employment of a numerical
    illustration.


    # Example


    Consider a dataset consisting of images depicting handwritten digits ranging from
    0 to 9. Each individual image is represented as a matrix encompassing pixel values.
    The primary objective is to accurately classify each image into one of ten possible
    digit classes, specifically 0, 1, 2, . . . , 9.


    # Working Principle


    The fundamental principle behind multiclass classification is to acquire knowledge
    of the mapping from input features to discrete class labels. In this context,
    each data point is assigned to one and only one class.'
  - '[PAGE 224]


    +   - **Dataset preparation**: The dataset is divided into distinct features,
    which represent the input data, and their corresponding class labels. It should
    be noted that each data point is characterized by multiple features and is assigned
    to one of several classes.

    - **Model selection**: There are numerous algorithms that can be utilized for
    multi-class classification, such as Logistic Regression, Decision Trees, Random
    Forests, Support Vector Machines (SVM), and Neural Networks. Some algorithms inherently
    support multiclass classification, while others can be extended using techniques
    like One-vs-Rest (OvR) or One-vs-One (OvO).

    - **Model training**: The selected algorithm undergoes training using a labeled
    dataset, where it learns the underlying patterns and relationships between the
    features and class labels. Throughout the training process, the algorithm adjusts
    its internal parameters to minimize a predefined loss or error function.

    - **Model evaluation**: The performance of the trained model is assessed using
    various metrics, including accuracy, precision, recall, F1-score, and confusion
    matrix. These metrics provide an evaluation of how effectively the model predicts
    the true class labels for unseen data.

    - **Prediction**: Once the model has been trained and evaluated, it can be utilized
    to make predictions on new data instances. This involves assigning each instance
    to one of the multiple classes based on its feature values.


    # Evaluation Metrics


    +   - **Accuracy**: Accuracy is defined as the ratio of correctly classified instances
    to the total number of instances.

    - **Precision**: Precision, on the other hand, is the ratio of true positive predictions
    for each class to all positive predictions for that class.

    - **Recall (sensitivity)**: Recall, also known as sensitivity, is the ratio of
    true positive predictions for each class to all actual positive instances for
    that class.

    - **F1-score**: The F1-score, which is the harmonic mean of precision and recall,
    serves as a means of striking a balance between the two.

    - **Confusion matrix**: A confusion matrix is a table that displays the counts
    of true positive, true negative, false positive, and false negative predictions
    for each class.


    # Applications


    Multiclass classification has numerous real-world applications across various
    domains, including:


    +   - Handwritten digit recognition

    - Speech recognition

    - Image classification

    - Natural language processing (e.g., sentiment analysis, topic classification)

    - Medical diagnosis (e.g., disease classification)'

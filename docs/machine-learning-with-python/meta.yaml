    +   - **Target network:** To stabilize training, DQN introduces a separate target
    network that is periodically updated to approximate the target Q-values. The target
    network is a copy of the Q-network with frozen parameters and is used to compute
    the target Q-values for updating the Q-network. Periodically updating the target
    network helps prevent oscillations and divergence during training. The target
    network introduces a separate target network that is periodically updated with
    the weights of the main Q-network. This helps stabilize the learning process by
    reducing the correlation between the target and action selection in the Q-learning
    update.

    - **Loss function:** DQN uses the mean squared error (MSE) loss between the predicted
    Q-values and the target Q-values to update the Q-network parameters. The target
    Q-values are computed using the Bellman equation with the target network.

    - **ε-Greedy exploration:** To balance exploration and exploitation, DQN employs
    ε-greedy exploration, where the agent selects a random action with probability
    ε and selects the action with the highest Q-value with probability 1 – ε. The
    value of ε is annealed over time to gradually shift from exploration to exploitation.

    - **Training procedure:** During training, the agent interacts with the environment,
    collects experiences, and updates the Q-network parameters using stochastic gradient
    descent based on the sampled minibatches of transitions. The target network is
    periodically updated to track the changes in the Q-network.



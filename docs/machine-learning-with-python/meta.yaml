    # 4.1.2 Clustering vs Association


    Clustering and association are two separate categories of unsupervised learning
    tasks in the realm of machine learning, each serving different purposes and employing
    varied methodologies.


    Clustering entails the process of grouping similar data points together based
    on their inherent characteristics, without any predefined labels. The primary
    aim is to discover inherent groupings or clusters within the data. For example,
    in the context of customer segmentation, clustering algorithms can effectively
    divide customers into distinct groups based on their purchasing behavior, demographics,
    or other relevant features. A well-known algorithm for clustering is the K-means
    algorithm, which assigns data points to clusters by minimizing the distance between
    each point and the centroid of its assigned cluster. Another technique, called
    “hierarchical clustering,” constructs a hierarchical structure of clusters by
    recursively merging or splitting clusters based on their similarity.


    On the contrary, association rule learning seeks to uncover intriguing connections
    or associations amidst various variables within extensive datasets. The primary
    em-'

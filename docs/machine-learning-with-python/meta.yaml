    # 5.3 Decision Trees and Random Forests


    Decision Trees and Random Forests have gained considerable popularity as machine
    learning algorithms employed in the domains of classification and regression tasks.


    # Decision Trees


    Definition: Decision Trees are hierarchical structures that bear semblance to
    trees. Each internal node within these structures represents a decision predicated
    on a specific characteristic. Meanwhile, each branch signifies the resulting outcome
    of said decision. Finally, each leaf node serves as a representation of the ultimate
    decision or prediction.


    **Working principle:** Decision Trees repeatedly divide the feature space by considering
    the values of input features. At each node, the algorithm selects the feature
    that most effectively separates the data into similar subsets. This process persists
    until either all data points are assigned to the same category or a predetermined
    stopping criterion is met.


    **Advantages:**

    Interpretability: Decision Trees possess a straightforward and comprehensible
    nature, rendering them appropriate for elucidating the rationale behind predictions.'
  merge: -1
  pgno: 231
- img_proc: true
  md: 'Non-parametric: They refrain from making presumptions about the underlying
    distribution of data. Accommodate both numerical and categorical data.


    **Disadvantages:**

    Prone to overfitting: Decision Trees possess the inclination to produce excessively
    complex models that excessively adhere to the training data, hence leading to
    insufficient generalization on unseen data.

    Instability: Minor fluctuations in the data can give rise to dissimilar tree structures,
    thus rendering them susceptible to noise.


    # Random Forests


    **Definition:** Random Forests are a type of ensemble learning methodology that
    consists of a group of Decision Trees. Every individual tree in the forest is
    trained on a randomly chosen subset of the training data along with a randomized
    subset of features. The predictions made by each tree are then combined to formulate
    the ultimate prediction.


    **Working principle:** Random Forests combine the predictive power of multiple
    Decision Trees to improve generalization performance and mitigate overfitting.
    In the training phase, each tree is grown independently using a random subset
    of the training data and features. The final prediction is obtained by averaging
    the predictions made by all the trees (for regression) or by majority voting (for
    classification).


    **Advantages:**

    Enhanced generalization: Random Forests alleviate the problem of overfitting by
    aggregating the predictions of numerous individual trees.

    Robustness: They adeptly handle noisy data and outliers due to the amalgamation
    effect. Feature importance: They furnish a metric of feature importance, affording
    users the ability to discern the most pertinent features for prediction.


    **Disadvantages:**

    Complexity: Random Forests exhibit greater intricacy compared to individual Decision
    Trees, rendering them more arduous to interpret.

    Computational cost: Training and predicting with Random Forests can incur considerable
    computational expenses, particularly when confronted with voluminous datasets.


    # Applications


    Decision Trees and Random Forests are extensively utilized in diverse domains,
    encompassing but not limited to:


    +   - Finance: The assessment of creditworthiness and the identification of fraudulent
    activities. Healthcare: The determination of diseases and the prognostic evaluation.'

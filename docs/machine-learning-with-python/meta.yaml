    ## 5.2 Logistic Regression


    Logistic regression, a well-received algorithm in supervised learning, is commonly
    employed in binary classification tasks wherein the target variable exhibits two
    potential outcomes. Contrary to its nomenclature, logistic regression is categorized
    as a classification algorithm as opposed to a regression algorithm.


    Fig. 5.7 depicts a polynomial regression model, which is a form of regression
    analysis that fits a non-linear relationship between the independent variable(s)
    and the dependent variable.


    ![](img/c3c5898a15ab3a66ce4ae6d1872b8b51_216_0.png)


    ```

    Intercept: [-0.12211726]

    Coefficients: [[0.00000000e+00 2.08372128e+00 1.31488961e-03]]

    ```


    Fig. 5.7: Polynomial regression.


    ### Working Principle


    1. **Model representation**: Logistic regression is a statistical model that estimates
    the likelihood of an input being a member of a specific category. It employs a
    logistic function, also known as a sigmoid function, to transform the result of
    a linear combination of features into a probability value ranging from 0 to 1.


    $$P(y=1|x) = \frac{1}{1+e^{-z}}$$


    The linear combination of feature values, denoted as z, can be expressed as θ0
    + θ1x1 + θ2x2 + ... + θnxn, where θ represents the coefficients.


    2. **Decision boundary**: Logistic regression makes predictions about class labels
    by determining if the predicted probability exceeds a specified threshold, usually
    set at 0.5. The decision boundary is the hypersurface that distinguishes the different
    classes within the feature space.


    3. **Training**: The model undergoes training through the utilization of optimization
    algorithms such as gradient descent or Newton''s method, with the purpose of identifying
    the most favorable coefficients that lead to the minimization of the logistic
    loss function.


    4. **Evaluation**: The evaluation of the model''s performance is conducted by
    employing metrics such as accuracy, precision, recall, F1-score, and ROC-AUC.


    5. **Prediction**: Once the model has undergone training, it is capable of estimating
    the likelihood of a new instance being a member of each class, subsequently assigning
    the appropriate class label in accordance with the predetermined threshold.


    ### Advantages


    - **Simple and efficient**: Logistic regression is computationally efficient and
    easy to implement.

    - **Interpretability**: The logistic regression coefficients offer valuable insights
    into the significance of individual features as well as the direction in which
    they influence the target variable.

    - **Probabilistic interpretation**: Logistic regression outputs probabilities,
    allowing for uncertainty estimation.


    ### Limitations


    - **Linear decision boundary**: Logistic regression postulates a linear association
    between the characteristics and the logarithm of the odds of the dependent variable,
    which might fail to encompass intricate non-linear connections.

    - **Binary classification**: Logistic regression is limited to binary classification
    tasks and cannot be directly applied to multi-class problems without modifications.


    ### Applications


    - **Medical diagnosis**: Logistic regression is used in medical diagnosis, such
    as predicting the likelihood of a disease based on patient characteristics.

    - **Credit scoring**: It is employed in credit scoring models to predict the likelihood
    of default based on financial attributes.

    - **Marketing analytics**: Logistic regression is used in marketing analytics
    for customer segmentation and predicting customer churn.


    ### Example


    Consider a situation in which we aim to forecast whether an electronic mail is
    classified as spam or not, utilizing the characteristics of its content such as
    word frequency and the presence of specific keywords. Logistic regression has
    the ability to be educated on a labeled collection of electronic mails (spam or
    non-spam) to categorize new electronic mails as either spam or not spam based
    on the attributes of their content.


    Let''s go through a numerical example of simple logistic regression step by step:


    ## Step 1: Data Preparation


    Suppose we possess a dataset encompassing two characteristics, namely x and y,
    alongside a binary target variable y which signifies whether a student triumphs
    (1) or falters (0) an examination. Here is a condensed rendition of our dataset:


    | x | y | Pass/Fail |

    |---|---|---|

    | 2.5 | 3.5 | 1 |

    | 3.0 | 4.0 | 1 |

    | 2.0 | 3.0 | 0 |

    | 2.5 | 3.0 | 1 |

    | 3.5 | 4.0 | 0 |


    ## Step 2: Model Representation


    We depict the association between the characteristics and the likelihood of achieving
    success in the examination by employing logistic regression:


    $$P(y=1|x) = \frac{1}{1+e^{-z}}$$


    where $z = \theta_0 + \theta_1x_1 + \theta_2x_2$ is the linear combination of
    features and coefficients.


    ## Step 3: Training


    We employ optimization algorithms such as gradient descent to identify the most
    favorable coefficients ($\theta_0$, $\theta_1$, $\theta_2$) that minimize the
    logistic loss function. The logistic loss function gauges the disparity between
    the anticipated probabilities and the factual categories.


    ## Step 4: Prediction


    Once the logistic regression model has undergone training, it becomes capable
    of forecasting the likelihood of success in the examination for incoming students,
    taking into consideration their respective characteristic values. To illustrate,
    if a fresh student possesses x = 2.8 and y = 3.7, we are able to anticipate the
    probability of success by employing the acquired coefficients.


    ## Step 5: Evaluation


    We assess the model''s performance by employing various metrics such as accuracy,
    precision, recall, and F1-score on a distinct validation or test dataset. These
    metrics serve as indicators of the model''s ability to accurately predict the
    true classes.


    ### Example


    Let us consider a scenario in which we have successfully trained a logistic regression
    model. The model is characterized by the coefficients θ0 = −1, θ1 = 2, and θ2
    = 3.


    For a new student with x = 2.8 and y = 3.7, we compute:


    $$z = -1 + 2 \times 2.8 + 3 \times 3.7 = 8.4$$


    $$P(y=1|x) = \frac{1}{1+e^{-8.4}} \approx 0.9997$$


    So, the logistic regression model predicts with high probability that the new
    student will pass the exam.


    ## 5.2.1 Binary Classification


    Binary classification is an essential undertaking in the realm of machine learning,
    where the primary aim revolves around categorizing input data into one of two
    potential categories or classes. This encompasses the determination of whether
    an email is deemed as spam or not, as well as whether a tumor is classified as
    malignant or benign, or whether a transaction is characterized as fraudulent or
    legitimate. Let us now proceed to comprehensively explore the intricate realm
    of binary classification:


    ### Working Principle


    - The aim of binary classification is to acquire knowledge about the relationship
    between input features and discrete binary labels, commonly represented as 0 or
    1, which signify the two classes.

    - Dataset Preparation: The dataset is segregated into independent variables (features)
    and their corresponding dependent variable (binary labels). Each data point comprises
    feature values and the associated class label.

    - Model Selection: Multiple algorithms, including but not limited to Logistic
    Regression, Decision Trees, Support Vector Machines (SVM), Random Forests, and
    Neural Networks, have the potential to be utilized for the purpose of binary classification.

    - Model Training: The selected algorithm is subjected to training with the aid
    of a labeled dataset, enabling it to grasp the intricate patterns and interconnections
    between various features and class labels. During the duration of the training
    procedure, the algorithm modifies its internal parameters with the objective of
    minimizing a pre-established loss or error function.

    - Model Evaluation: The evaluation of the trained model is conducted by employing
    assessment metrics such as accuracy, precision, recall, F1-score, and receiver
    operating characteristic (ROC) curve. These metrics are utilized to measure the
    model''s performance.'

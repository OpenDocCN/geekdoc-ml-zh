    One of the main metrics used for regression analysis is the MSE, which measures
    the average squared difference between predicted and actual values. Its calculation
    involves the use of the following formula:


    $$\text{MSE} = \frac{1}{n} \sum_{i=1}^{n} (y_i - \hat{y}_i)^2$$


    where $n$ is the number of instances, $y_i$ is the true value, and $\hat{y}_i$
    is the predicted value for the $i$th instance.


    MAE is another metric that is frequently employed. It quantifies the average absolute
    disparity between the predicted and actual values. The calculation involves determining
    the absolute difference:


    $$\text{MAE} = \frac{1}{n} \sum_{i=1}^{n} |y_i - \hat{y}_i|$$


    where $|\cdot|$ denotes the absolute value.


    The root mean squared error (RMSE) is an alternative form of MSE which offers
    an assessment of the standard deviation of the residuals. By taking the square
    root of MSE, RMSE can be computed:


    $$\text{RMSE} = \sqrt{\text{MSE}}$$


    These metrics provide different perspectives on model performance. MSE and RMSE
    penalize large errors more heavily, making them sensitive to outliers. MAE, on
    the other hand, treats all errors equally and is more robust to outliers.


    Let''s consider a numerical example to illustrate these metrics. Suppose we have
    a dataset with five instances:


    $$(x_1, y_1) = (1, 3)$$

    $$(x_2, y_2) = (2, 5)$$

    $$(x_3, y_3) = (3, 7)$$

    $$(x_4, y_4) = (4, 9)$$

    $$(x_5, y_5) = (5, 11)$$


    A regression model is utilized to make predictions on $y$ by taking $x$ as input.
    The following predictions are made by the model:


    $$\hat{y}_1 = 2$$

    $$\hat{y}_2 = 4$$

    $$\hat{y}_3 = 6$$

    $$\hat{y}_4 = 8$$

    $$\hat{y}_5 = 10$$'

- md: '## 4.1.2 Clustering vs Association


    Clustering and association are two separate categories of unsupervised learning
    tasks in the realm of machine learning, each serving different purposes and employing
    varied methodologies.


    Clustering entails the process of grouping similar data points together based
    on their inherent characteristics, without any predefined labels. The primary
    aim is to discover inherent groupings or clusters within the data. For example,
    in the context of customer segmentation, clustering algorithms can effectively
    divide customers into distinct groups based on their purchasing behavior, demographics,
    or other relevant features. A well-known algorithm for clustering is the K-means
    algorithm, which assigns data points to clusters by minimizing the distance between
    each point and the centroid of its assigned cluster. Another technique, called
    “hierarchical clustering,” constructs a hierarchical structure of clusters by
    recursively merging or splitting clusters based on their similarity.


    On the contrary, association rule learning seeks to uncover intriguing connections
    or associations amidst various variables within extensive datasets. The primary
    emphasis resides in the identification of patterns of co-occurrence or correlation
    among items. An exemplary illustration of this phenomenon is market basket analysis,
    where association rules are employed to unveil the relationships between products
    that are frequently purchased together during transactions. The Apriori algorithm
    is commonly employed for this endeavor, as it systematically generates potential
    itemsets and eliminates those that fail to satisfy the minimum support criteria,
    thus effectively identifying frequent itemsets and association rules.


    To exemplify, let us contemplate a retail establishment that desires to scrutinize
    customer acquisition data. By employing clustering, the establishment can effectively
    classify customers into discrete categories based on their preferences when it
    comes to procuring merchandise. This invaluable data can subsequently be employed
    to fabricate targeted marketing strategies or personalized recommendations. Meanwhile,
    association analysis can reveal patterns such as “customers who acquire diapers
    are inclined to also obtain baby formula,” thus enabling the establishment to
    optimize the positioning of products or promotional undertakings.


    In summary, the focus of clustering is on the identification of natural groupings
    or clusters within data. On the other hand, association rule learning is primarily
    concerned with the discovery of relationships or patterns of co-occurrence among
    variables. The utilization of both approaches is extremely valuable in the process
    of uncovering insights and patterns within unlabeled data. Ultimately, this enables
    businesses to make well-informed decisions and enhance their operational efficiency.


    ## Types of Clustering


    **K-means clustering:** The technique of K-means clustering divides the data into
    a pre-established quantity (k) of clusters, aiming to minimize the distance between
    data points and the centroid of their designated cluster. This iterative process
    updates centroids until convergence is reached. K-means clustering is extensively
    utilized owing to its straightforwardness and effectiveness, although it necessitates
    the prior specification of the cluster count.


    **Hierarchical clustering:** Hierarchical clustering, conversely, builds a dendrogram,
    a tree-like arrangement, through iterative merging or splitting of clusters based
    on the similarity of data points. It does not require the prior specification
    of cluster numbers and can yield a valuable understanding of the hierarchical
    composition of the data. Two frequently employed techniques in hierarchical clustering
    are agglomerative (bottom-up) and divisive (top-down) clustering.


    **DBSCAN:** Density-based clustering (DBSCAN) is a clustering algorithm that detects
    clusters by taking into account areas of high density that are separated by areas
    of low density. This method can identify clusters of various shapes and is robust
    against noise and outliers. DBSCAN, abbreviated from density-based spatial clustering
    of applications with noise, is a widely used density-based clustering algorithm
    that necessitates the specification of two parameters: epsilon, which denotes
    the maximum distance between points for them to be considered part of the same
    cluster, and minPts, which represents the minimum number of points required to
    form a dense region.


    **Mean shift clustering:** Mean shift clustering, on the other hand, is a clustering
    technique devoid of parameters that detects clusters through the displacement
    of centroids towards areas of heightened data density. Comparable to hierarchical
    clustering, it does not necessitate the a priori specification of cluster quantity
    and can autonomously ascertain the optimal number of clusters based on the distribution
    of data.


    ## Types of Association


    **Apriori algorithm:** The Apriori algorithm, which is widely recognized, is a
    notable algorithm for learning association rules. This algorithm is employed to
    identify frequent itemsets in transactional datasets. By generating candidate
    itemsets and subsequently eliminating ones that do not meet the minimum support
    criteria, the algorithm effectively identifies frequent itemsets. From these frequent
    itemsets, association rules are derived, thereby providing valuable insights into
    the probability of one item being purchased given the purchase of another item.


    **FP-growth algorithm:** The FP-growth algorithm presents an alternative technique
    for mining frequent itemsets in transactional datasets. It employs the construction
    of a concise data structure called the FP-tree (frequent pattern tree) to efficiently
    identify frequent itemsets, eliminating the need for explicit generation of candidate
    itemsets. This property renders it especially advantageous for processing large
    datasets containing a substantial number of transactions.


    **Eclat algorithm:** The Eclat algorithm is an additional and widely recognized
    algorithm for association rule learning. It explores frequent itemsets by intersecting
    transaction tidsets. Through the utilization of the downward closure property
    of support, it effectively detects frequent itemsets.


    **PrefixSpan algorithm:** The PrefixSpan algorithm, conversely, is utilized specifically
    to extract sequential patterns in sequence databases. It employs a recursive approach
    to generate frequent sequences through the extension of prefix patterns, subsequently
    optimizing the search space to effectively discern frequent sequential patterns.


    Various types of clustering and association techniques play a crucial role in
    the domain of data mining and pattern recognition. They facilitate the identification
    of significant patterns and valuable insights from extensive datasets across a
    wide range of fields, including market basket analysis, customer segmentation,
    and recommendation systems.'
  mdcn: '## 4.1.2 聚类与关联


    聚类和关联是机器学习领域中两类独立的无监督学习任务，它们服务于不同的目的，并采用不同的方法论。


    聚类涉及将相似的数据点根据其内在特征分组在一起的过程，无需任何预定义的标签。其主要目标是发现数据中固有的分组或簇。例如，在客户细分的背景下，聚类算法可以根据客户的购买行为、人口统计特征或其他相关特征，有效地将客户划分为不同的群体。一个著名的聚类算法是K-means算法，它通过最小化每个数据点与其所属簇的质心之间的距离，将数据点分配到簇中。另一种称为“层次聚类”的技术，则通过递归地合并或分裂簇来构建簇的层次结构，其依据是簇之间的相似性。


    相反，关联规则学习旨在揭示大型数据集中各种变量之间有趣的联系或关联。其主要重点在于识别项目之间的共现模式或相关性。一个典型的例子是购物篮分析，其中关联规则被用来揭示在交易中经常一起购买的产品之间的关系。Apriori算法通常被用于这项工作，因为它系统地生成潜在的项集，并剔除那些不满足最小支持度标准的项集，从而有效地识别频繁项集和关联规则。


    举例来说，让我们考虑一家希望分析客户获取数据的零售企业。通过运用聚类，该企业可以根据客户在采购商品时的偏好，有效地将客户分类为不同的类别。这些宝贵的数据随后可用于制定有针对性的营销策略或个性化推荐。与此同时，关联分析可以揭示诸如“购买尿布的客户也倾向于购买婴儿配方奶粉”这样的模式，从而使该企业能够优化产品定位或促销活动。


    总而言之，聚类的重点在于识别数据中的自然分组或簇。另一方面，关联规则学习主要关注发现变量之间的关系或共现模式。这两种方法的运用对于从无标签数据中发掘洞见和模式都极具价值。最终，这使得企业能够做出明智的决策并提高其运营效率。


    ## 聚类的类型


    **K-means聚类：** K-means聚类技术将数据划分为预先设定数量（k）的簇，旨在最小化数据点与其指定簇的质心之间的距离。这个迭代过程会更新质心，直到达到收敛。K-means聚类因其简单性和有效性而被广泛使用，尽管它需要预先指定簇的数量。


    **层次聚类：** 相反，层次聚类通过基于数据点相似性的迭代合并或分裂簇，构建一个树状图（dendrogram），即一种树状结构。它不需要预先指定簇的数量，并且可以提供对数据层次结构的宝贵理解。层次聚类中两种常用的技术是凝聚（自底向上）和分裂（自顶向下）聚类。


    **DBSCAN：** 基于密度的聚类（DBSCAN）是一种通过考虑被低密度区域分隔的高密度区域来检测簇的聚类算法。这种方法可以识别各种形状的簇，并且对噪声和异常值具有鲁棒性。DBSCAN是“基于密度的带噪声应用空间聚类”的缩写，是一种广泛使用的基于密度的聚类算法，它需要指定两个参数：epsilon，表示点之间被视为同一簇部分的最大距离；以及minPts，表示形成密集区域所需的最小点数。


    **均值漂移聚类：** 另一方面，均值漂移聚类是一种无参数的聚类技术，它通过将质心向数据密度更高的区域移动来检测簇。与层次聚类类似，它不需要预先指定簇的数量，并且可以根据数据的分布自主确定最佳的簇数。


    ## 关联的类型


    **Apriori算法：** 广为人知的Apriori算法是关联规则学习的一个著名算法。该算法用于在事务数据集中识别频繁项集。通过生成候选项集，然后剔除那些不满足最小支持度标准的项集，该算法有效地识别频繁项集。从这些频繁项集中，可以导出关联规则，从而提供关于在购买一个项目的情况下购买另一个项目的概率的宝贵见解。


    **FP-growth算法：** FP-growth算法为挖掘事务数据集中的频繁项集提供了一种替代技术。它通过构建一种称为FP-tree（频繁模式树）的简洁数据结构来高效地识别频繁项集，无需显式生成候选项集。这一特性使其在处理包含大量事务的大型数据集时尤其具有优势。


    **Eclat算法：** Eclat算法是另一种广泛认可的关联规则学习算法。它通过交叉事务的事务ID集来探索频繁项集。利用支持度的向下封闭性，它有效地检测频繁项集。


    **PrefixSpan算法：** 另一方面，PrefixSpan算法专门用于从序列数据库中提取序列模式。它采用递归方法，通过扩展前缀模式来生成频繁序列，随后优化搜索空间以有效地识别频繁序列模式。


    各种类型的聚类和关联技术在数据挖掘和模式识别领域扮演着至关重要的角色。它们有助于从涵盖市场篮子分析、客户细分和推荐系统等广泛领域的大型数据集中，识别出重要的模式和有价值的洞见。'

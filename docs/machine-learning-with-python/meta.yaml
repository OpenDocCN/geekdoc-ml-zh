  mdcn: "其行动。智能体的目标是学习一个策略——一个从状态到行动的映射——以最大化随时间累积的奖励。\n\n2. **环境：** 智能体与之交互的系统或世界，通过奖励和惩罚提供反馈。环境代表智能体与之交互的外部系统或过程。它由一组状态、行动和转移动态定义。环境还根据智能体的行动，以奖励或惩罚的形式向其提供反馈。\n\
    \n3. **行动：** 智能体在环境中可以做出的选择。行动是智能体做出的、影响环境状态的决策或选择。行动可以是离散的（例如，从有限选项集中选择）或连续的（例如，在连续范围内指定一个值）。\n\
    \n4. **奖励：** 环境提供给智能体的反馈信号，指示其行动的好坏。奖励是环境在每次行动后提供给智能体的标量反馈信号。它表示智能体所采取行动的即时可取性或质量。智能体的目标是学习一个能最大化随时间累积奖励的策略。\n\
    \n5. **策略：** 智能体根据环境当前状态选择行动的策略。策略是一个从状态到行动的映射，定义了智能体的行为。它指定了智能体在每个状态下应采取的行动，以最大化预期累积奖励。策略可以是确定性的或随机性的，取决于它们是直接指定行动还是提供行动的概率分布。\n\
    \n6. **状态：** 状态表示环境的当前情况或配置。它包含智能体做出决策所需的所有相关信息。状态可以是离散的或连续的，取决于环境的性质。\n\n7. **价值函数：**\
    \ 价值函数估计智能体从给定状态或状态-行动对中可实现的预期累积奖励。它量化了处于特定状态或采取特定行动的可取性，并用于指导智能体的决策过程。\n\n8.\
    \ **探索与利用：** 强化学习涉及在探索（尝试新行动以发现潜在更好的策略）和利用（根据当前知识选择已知能产生高奖励的行动）之间的权衡。平衡探索与利用对于有效学习至关重要。\n\
    \n### 8.5.2 学习过程\n\n1. **试错：** 通过与环境交互并接收奖励，智能体通过试错进行学习。它通过选择能随时间带来更高奖励的行动来逐步改进其策略。\n\
    \n2. **无明确指令：** 与监督学习不同，强化学习智能体不会收到关于如何执行任务的明确指令。它们完全通过奖励反馈机制进行学习。\n\n3. **延迟满足：**\
    \ 强化学习智能体需要考虑其行动的长期后果，而不仅仅是即时奖励，以实现最佳结果。\n\n让我们看看 Python 代码实现：\n\n```python\n\
    import gymnasium as gym\nimport math\nimport random\nimport matplotlib\nimport\

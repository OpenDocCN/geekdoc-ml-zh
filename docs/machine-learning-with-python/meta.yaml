    \n3.  **子词分词：** 子词分词将单词分解为更小的有意义单元，称为子词或语素。这对于处理词汇表外单词和处理具有复杂形态学的语言特别有用。字节对编码和WordPiece等技术通常用于子词分词。\n\
    4.  **字符分词：** 在字符分词中，文本中的每个字符都成为一个独立的标记。当需要在非常细粒度的级别分析文本或处理具有复杂文字系统的语言时，这种方法很有用。它将文本分解为单个字符，这对于拼写纠正或字符级语言模型等某些任务很有用。\n\
    5.  **短语分词：** 短语分词涉及根据预定义的规则或模式，将连续的单词分组为短语或块。这对于命名实体识别或分块等任务很有用。\n6.  **N-gram分词：**\
    \ 这会创建n个连续单词的序列，对于语言建模和机器翻译等任务很有用。\n\n## 8.1.2 词嵌入\n\n词嵌入是自然语言处理中的一种词表示方法，旨在将单词的语义含义捕获在一个连续的向量空间中。传统的词表示方法，如独热编码或词袋模型，缺乏捕获单词之间语义关系的能力，并且通常导致高维和稀疏的表示。词嵌入通过将单词表示为连续向量空间中的稠密向量来解决这些限制，其中相似的单词被映射到附近的点。这些嵌入是使用无监督或半监督技术（如神经网络模型）从大型文本语料库中学习到的。词嵌入是将单词表示为数值向量的强大技术。这些向量捕获了单词的语义含义和关系，使机器能够理解超越单个单词本身的语言细微差别。词嵌入是许多自然语言处理任务的基础构建块。通过编码语义含义和关系，它们使机器能够以更接近人类的方式理解和处理语言。有两种流行的方法或算法用于生成词嵌入，例如：\n\
    \n1.  **Word2Vec：** Word2Vec是一种流行的算法，通过分析句子或周围上下文中单词的共现来学习词嵌入。由谷歌研究人员开发的Word2Vec是一个浅层神经网络模型，它通过预测文本窗口内单词的上下文来学习词嵌入。它包含两种主要架构：连续词袋模型和Skip-gram。CBOW根据上下文词预测目标词，而Skip-gram则根据给定的目标词预测上下文词。\n\
    2.  **GloVe（全局词向量表示）：** GloVe是一种使用全局单词共现统计的方法，基于单词在整个语料库中共同出现的频率来捕获语义关系。GloVe是一种无监督学习算法，通过对语料库中单词的共现矩阵进行分解来获得词嵌入。它利用整个语料库的全局统计信息来学习词表示。\n\

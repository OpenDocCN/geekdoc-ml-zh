  md: 'larization are L1 regularization (also known as Lasso) and L2 regularization
    (frequently referred to as Ridge).


    +   - **L1 regularization (Lasso):** L1 regularization incorporates the absolute
    values of the coefficients into the loss function. This mechanism promotes sparsity
    in the model by driving certain coefficients to zero, effectively performing feature
    selection.

    - **L2 regularization (Ridge):** L2 regularization includes the squared values
    of the coefficients in the loss function. It penalizes the presence of large coefficient
    values, leading to their reduction and preventing overfitting.

    - **Regularization parameter (λ):** The strength of regularization is determined
    by a hyperparameter denoted as λ (lambda). Higher values of λ correspond to more
    intense regularization, resulting in smaller coefficient values and simpler models.


    # Example


    Suppose a logistic regression model is constructed with two features, namely x1
    and x2, alongside a binary target variable denoted as y, which signifies whether
    a customer will engage in purchasing a product (1) or not (0). In the absence
    of regularization, the model may exhibit impeccable fitting to the training data,
    yet its ability to generalize to novel data may be limited.


    By implementing L1 or L2 regularization, a penalty term is incorporated into the
    loss function, taking into account the magnitude of the coefficients. For instance,
    when utilizing L2 regularization, the loss function is modified.


    $$Loss = -\frac{1}{N} \sum_{i=1}^{N} [y_i \log(\hat{y}_i) + (1 - y_i) \log(1 -
    \hat{y}_i)] + \lambda \sum_{j=1}^{p} \theta_j^2$$


    the regularization parameter λ, the number of instances N, the number of features
    p, and the coefficients θj are all important factors in this context.


    Regularization confers several advantages. Firstly, it serves as a preventative
    measure against overfitting. By effectively managing the complexity of the model,
    regularization ensures that the model does not become excessively sensitive to
    noise present in the training data. Moreover, regularization enhances the generalization
    abilities of the model. The inclusion of regularization techniques often results
    in models that are more adept at extrapolating to unseen data, as it helps to
    minimize variance.


    Below, an example of Python code is presented, which demonstrates the implementation
    of L2 regularization (also known as Ridge) in logistic regression. This example
    includes the usage of plots and evaluation metrics. In order to apply regularization
    and prevent overfitting, the Iris dataset from scikit-learn is utilized.



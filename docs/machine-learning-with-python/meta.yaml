- img_proc: true
  md: '# Entropy


    Entropy quantifies the degree of impurity or uncertainty within a given dataset,
    and it is determined through the analysis of the dataset''s distribution in terms
    of various classes or categories.


    Formula: For a dataset with K classes and proportion $p_i$ of class i:


    $$Entropy(S) = -\sum_{i=1}^{K} p_i log_2(p_i)$$


    Consider a dataset comprising 10 instances, wherein 6 instances are categorized
    under class A, while the remaining 4 instances fall under class B.


    Proportion of class A:


    $$p_A = \frac{6}{10} = 0.6$$


    Proportion of class B:


    $$p_B = \frac{4}{10} = 0.4$$


    $$Entropy(S) = -0.6 \log_2(0.6) + 0.4 \log_2(0.4)$$


    $$Entropy(S) = -0.6 * (-0.737) + 0.4 * (-1.322)$$


    $$Entropy(S) = -(-0.4422 - 0.5288)$$


    $$Entropy(S) = 0.971$$


    # Information Gain


    Information Gain assesses the decrease in entropy or uncertainty obtained by dividing
    the dataset according to a specific characteristic. It quantifies the extent to
    which a characteristic imparts knowledge about the class labels.


    For a dataset $S$ with $N$ instances, and $m$ subsets after splitting based on
    feature $A$:


    $$IG(S, A) = Entropy(S) - \sum_{j=1}^{m} \frac{N_j}{N} * Entropy(S_j)$$


    Suppose that we are interested in partitioning the dataset according to a specific
    feature, denoted as X, thereby yielding two subsets, S1 and S2, which consist
    of 7 and 3 instances, respectively.


    Entropy before split: $Entropy(S) = 0.971$


    Entropy of subset $S_1$: $Entropy(S_1) = -(0.7 * \log_2(0.7) + 0.3 * \log_2(0.3))$'

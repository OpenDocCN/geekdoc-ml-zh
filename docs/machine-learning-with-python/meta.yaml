    \ for loops and while loops.\n\n- **for loop:**\nThe for loop is employed to iterate\
    \ through a sequence, be it a list, tuple, string, or range, or any other iterable\
    \ objects. This loop carries out a set of instructions for every element present\
    \ in the sequence.\n\n### Syntax\n\n```python\nfor variable in iterable:\n   \
    \ # code to be executed for each iteration\n\nfruits = [\"apple\", \"banana\"\
    , \"orange\"]\nfor fruit in fruits:\n    print(fruit)\n```\n\nIn this example,\
    \ the for loop iterates over the list of fruits, and the code inside the loop\
    \ prints each fruit.\n\n- **while loop:**\nThe while loop persists in executing\
    \ a block of code for as long as a specified condition remains true. It iterates\

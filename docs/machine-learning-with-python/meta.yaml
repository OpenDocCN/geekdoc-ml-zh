    \n### Syntax\n\n```python\ndef function_name(parameters):\n    # code to be executed\n\
    \    return result # optional\n```\n\n**Example 1: Simple addition function:**\n\
    \n```python\ndef add_numbers(a, b):\n    sum_result = a + b\n    return sum_result\n\
    \n# Calling the function\nresult = add_numbers(5, 3)\nprint(result) # Output:\

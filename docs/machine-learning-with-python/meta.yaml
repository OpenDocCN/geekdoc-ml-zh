    # 5.7.2 Multinomial Naive Bayes


    The Multinomial Naive Bayes algorithm is a variation of the Naive Bayes algorithm
    that is excellently suited for tasks involving the classification of text. In
    these tasks, the features are indicative of the occurrence frequency of words
    or tokens within a document.

    The key assumptions made by Multinomial Naive Bayes are:


    +   1. The data is generated from a multinomial distribution, where each feature
    (word) is drawn independently from the same vocabulary.'
- md: "2. The feature vectors are sparse, meaning that most word counts are zero for\
    \ a given document.\n3. The order of the words in the document is not important,\
    \ only the word counts matter.\n\nThe algorithm works as follows:\n1. Calculate\
    \ the prior probabilities of each class from the training data, P(class).\n2.\
    \ For each class, calculate the likelihood of observing a particular word count\
    \ vector by modeling it as a multinomial distribution:\n\n$$P(words|class) = (n!\

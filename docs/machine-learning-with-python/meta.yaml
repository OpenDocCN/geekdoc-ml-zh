    model can learn. It is used to minimizing the cost and increasing accuracy of
    the model. For example, if we want to climb down the hill we should take small
    steps instead of jumping down at once. Like the same example if we starts from
    point ''a'', we have to walk down slowly. i.e. we update the position to x timely
    and we continue the same until, we reach at the bottom. The bottom is considered
    as the lowest point of cost.

    - **Momentum GD:** Similar to GD but incorporates momentum, accumulating past
    gradients to accelerate convergence toward the minimum.

    - **Adam:** An adaptive learning rate optimization algorithm that automatically
    adjusts the learning rate for each weight based on its past updates, often leading
    to faster convergence.



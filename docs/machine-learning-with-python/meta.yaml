  md: "# How CLARA Works?\n\n+   1. Calculate local density and reachability distance:\n\
    \   1. **Local density (ρ):** Number of neighbors within a specific distance.\n\
    \   2. **Reachability distance (δ):** Distance to the farthest neighbor with higher\
    \ density.\n2. **Identify core points:** Points with both high density and large\
    \ reachability distance.\n3. **Build decision graph:** Connect core points based\
    \ on their reachability distances.\n4. **Order points:** Traverse the decision\
    \ graph from higher to lower density, assigning points to clusters based on their\
    \ connections.\n5. **Refine clusters:** Optionally adjust cluster boundaries based\
    \ on additional criteria.\n\n# Where Not to Use CLARA?\n\n+   - **Parameter sensitivity:**\
    \ Like DBSCAN, choosing optimal parameters (distance threshold and density ratio)\
    \ can impact results.\n- **Curse of dimensionality:** Similar to DBSCAN, performance\
    \ can decrease in high-dimensional data.\n\n**Mixture models:** These models assume\
    \ that the data arises from a mixture of probability distributions, where each\
    \ distribution represents a cluster. Popular examples include Gaussian mixture\
    \ models (GMMs) and latent Dirichlet allocation (LDA). GMMs are a powerful tool\
    \ for data clustering and density estimation, particularly when dealing with data\
    \ that can be represented as a mixture of multiple overlapping Gaussian distributions\

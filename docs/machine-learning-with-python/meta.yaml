    - Python is an object-oriented language, with classes and objects serving as its\
    \ core concepts.\n- A class functions as a blueprint for creating objects, while\
    \ objects are instances of classes.\n- Inheritance allows a class to inherit attributes\
    \ and methods from another class.\n- Polymorphism enables objects of different\
    \ types to be treated as if they were objects of a common type.\n\n## Exercise\

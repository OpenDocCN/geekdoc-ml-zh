  md: 'represents how confident the CNN is that a particular output is the solution.
    The probability of an output $Y_k$ is calculated as


    $$P(Y_k) = \frac{e^{Y_k}}{\sum_{i=1}^{L} Y_i},$$


    where each probability is between 0 and 1 even for negative values of CNN outputs.


    For a fully-connected ANN with a single hidden layer containing $H$ neurons, the
    computational cost of training will be $\mathcal{O}(I_{ann} \times H)$ for one
    epoch, where $\mathcal{O}$ shows the order of magnitude of the number of computational
    operations [35]. If there are multiple hidden layers, for each layer $i$ with
    $H_i$ neurons, a computation load of $\mathcal{O}(H_{i-1} \times H_i)$ is added.
    For training a CNN for $E$ epochs, the computational cost is multiplied by $E$.
    In addition, if there are $N$ input matrices used in a sample set, the cost must
    also be multiplied by $N$.


    In real-life applications, it is customary to employ several consecutive CL–PL
    pairs in a CNN to improve its prediction ability and reduce the dimensions of
    the matrices before they are fed into the ANN, where each additional CL–PL pair
    typically uses twice as many filters as the previous pair, thereby reducing the
    matrix size by the order of $\mathcal{O}(1/s_{pl})$ while increasing the number
    of output matrices by $\mathcal{O}(f_{cl})$. There are several mechanisms employed
    to reduce matrix sizes in neural networks, such as embedding layers (see Section
    10.5 in Chapter 10). In Appendix C, we present training steps for a CNN using
    a numerical example. We recommend the readers study the CNN training process to
    appreciate its computational cost.


    Let us now present a simple numerical example to examine the number of operations
    needed to train a CNN. Suppose an image of $(3 \times 1000 \times 1000)$ is used
    to train a CNN with 3 CL–PL pairs. From Eq. (7.1), the first CL (let us call it
    CL-1), using $F = 20$ filters each of size $f_{cl} = 5$, generates 20 output matrices,
    each of size $(996 \times 996)$. Based on Eq. (7.2), for the first PL (let us
    call it PL-1), using a pool size of $p = 3$ and stride of $s = 3$, the output
    will be 20 matrices, each of size $(332 \times 332)$. At CL-2, suppose there are
    $F = 35$ filters, each of size $f_{cl} = 5$. Using the outputs of PL-1, CL-2 generates
    35 output matrices, each of size $(328 \times 328)$. In turn, PL-2, with pool
    size of $p = 3$ and stride of $s = 3$, generates 35 output matrices, each of size
    $(109 \times 109)$. Similarly, CL-3, using $F = 50$ filters, each of size $f_{cl}
    = 5$, generates 50 output matrices, each of size $(105 \times 105)$. PL-3, with
    pool size of $p = 3$ and stride of $s = 3$, generates 50 output matrices, each
    of size $(35 \times 35)$. At this point the output is fed into the UL, which will
    unroll the matrices and generate an input for the ANN of size $(61\,250 \times
    1 \times 1)$. Suppose the fully-connected ANN has three hidden layers, each with
    1000 neurons. In this case, the number of operations for ANN training in forward
    propagation is


    $T_{cnn} = (61\,250 \times 1000) + (1000 \times 1000) + (1000 \times 1000) + (1000
    \times L) \approx 63M,$


    where $L$ is the number of CNN outputs (insignificant in the total, which is why
    it is not shown in the estimate). With back-propagation, the number of operations
    are doubled to approximately $126M$. For a typical ANN training with $E = 1000$
    epochs, the total cost for one input image is $126B$ operations. If there are
    10000 images in a moderate-sized sample set, the training cost adds up to one
    quadrillion operations: $T_{cnn} = \mathcal{O}(10^{15})$. Figure 7.21 illustrates
    this example.


    The cost could be much higher if larger images, more CL–PL layer pairs and ANN
    hidden layers with higher numbers of epochs are employed. Depending on the specific
    requirements of an application, the data scientists and subject matter experts
    should find an optimal balance among such parameters. Our goal by giving this
    numerical example here is to underline the fact that the computational cost of
    training a CNN can easily be prohibitively high if special attention is not paid
    to the characteristics of each CNN layer.'

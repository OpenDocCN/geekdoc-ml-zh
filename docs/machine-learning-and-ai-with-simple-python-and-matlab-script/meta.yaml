    \ your answer.\n\n# 6 ANNs for Natural Language Processing\n\n## 6.1 Introduction\n\
    \nAs one of the fastest growing applications of AI, `natural language processing`\
    \ (NLP) aims to allow computers to understand, interpret, and manipulate human\
    \ language. In this chapter we present an NLP application that attempts to identify\
    \ a possible and typically previously unrevealed relationship between words presented\
    \ in a content (e.g. speech, written document or text message) and external events\
    \ happening in various seemingly unrelated venues. Examples of this type of application\
    \ include a speech given by a politician followed by rising oil prices, or a famous\
    \ singer praising a specific brand of shoes in her concert causing an increased\
    \ demand on foreign labour in the shoe industry. NLP is often seen as an intersection\
    \ between linguistics, computational disciplines and engineering and involves\
    \ algorithmic analysis of natural languages [63].\n\nInputs to NLP algorithms\
    \ are typically a set of `features` that are generated based on information collected\
    \ from external sources or various existing platforms. Information to be explored\
    \ by an NLP application could be verbal or written content, from which the input\
    \ features could be derived using various approaches (e.g. a set of key words\
    \ in specific content such as text messages from a prominent person in a given\
    \ field). For example, a given set of interaction fragments (e.g. a chain of emails,\
    \ voice messages or text message exchanges) can be analysed by an NLP algorithm\
    \ to explore whether a connection between them can be formed (e.g. if they discuss\
    \ the same subject). Similarly, NLP techniques can identify what topics are covered\
    \ within a single body of text by defining keywords that are strongly associated\
    \ with a specific topic or by assigning relevant meanings to words that have multiple\
    \ interpretations. In another application, NLP algorithms may explore whether\
    \ there is a relationship between a basketball team manager's pre-game comments\
    \ and the game outcome. It is possible that the manager inadvertently uses a weaker\
    \ form of speech if they do not have confidence in their team for that game, but\
    \ cannot say so publicly (e.g. saying \"we should win\" versus \"we shall win\"\
    ). If, through NLP, opponents identify such an association, they may use it against\
    \ this team in betting sites or by fielding a weaker team and resting strong players\
    \ for other games. Similarly, political leaders may influence the outcomes of\
    \ various seemingly unrelated events through their posts in social media or press\
    \ conferences they give for news outlets. One can imagine that a fiery speech\
    \ given by a leader may have a positive or unfavourable effect on external elements\
    \ such as financial markets, labour unions or economic policy decisions (Figure\
    \ 6.1). These dependencies are often very difficult, if not impossible, to identify\
    \ without the help of specialized tools such as NLP.\n\nIn general, NLP techniques\
    \ can be classified into two groups: rule-based and statistics-based approaches\
    \ [64]. `Decision trees` [65] are typical examples for rule-based NLP techniques,\
    \ where tree vertices and edges represent conditions and possible outcomes, respectively.\

    ### 18.4.3 A Simple GA to Implement GE


    Let us now understand how a phenotype, which is a valid program generated by a
    given BNF, will be used as part of an evolutionary algorithm. For simplicity,
    let us first suppose that we will use GAs as the method to evolve the genotypes.


    As we studied in Chapter 14, in implementing a GA, an initial population of candidate
    solutions is first formed, each of which possesses chromosomes with randomly chosen
    codon values. The fitness of each candidate solution is then evaluated, and the
    population is sorted based on the candidate fitness values (Figure 14.3). According
    to a pre-determined criterion, a set of candidates is then selected as parents
    to generate the offspring for the next generation by employing crossover and mutation
    operators. The fitness of the offspring is computed, and the previous population
    and the offspring are temporarily merged; however, only the best-performing part
    of the population is kept for future generations. Based on their fitness, it is
    possible that the non-performing offspring will not be included in the new populations.


    In adaptation of GE into the GA framework, each phenotype is evaluated by running
    it in the environment that is native to the given BNF grammar. For example, if
    the BNF was written for a C++ program, the phenotype will be a C++ program which
    will be a compiled and executed, and the output will be evaluated for a given
    criterion. If, on the other hand, the BNF was written for a Python script, then
    it will be directly executed in the environment specified for the BNF. Suppose
    that the BNF was written to perform algorithmic trading as described in Chapter
    4. The phenotype will then be placed into an electronic trading environment and
    its performance will be observed. Based on a desired criterion (e.g. the amount
    of profit it makes), a fitness value will be assigned to the phenotype (i.e. the
    candidate solution in the GA population).


    ### 18.4.4 Remarks on GE


    GE is a powerful technique for spanning large solution spaces. It is applicable
    to problems where the solution is a computer program. Since GE is independent
    of programming languages and program execution environments, it is a ubiquitous
    technique applicable to a wide range of applications, from the financial arena
    to space exploration missions. The depth of BNF grammar and the computational
    cost of the fitness function calculation for each genome define the computational
    complexity of the GE.


    ## Appendix A


    ## ANNs with Bias


    ### A.1 Introduction


    In ANN models representing real-life problems, a bias input is needed to adjust
    the weights with more accuracy and faster convergence to reduce output errors.
    For inclusion of a bias as part of an ANN model, one has to add an additional
    input at each hidden layer and the output layer of the ANN. Similar to regular
    ANN synapses connecting neurons, the weights of bias synapses are also associated
    with weights that are initially assigned random values. Bias inputs, therefore,
    become intermixed with link weights through summation and activation functions
    in forward and back propagation calculations. During training, bias weights are
    updated based on error values in a manner similar to synapse weights. In this
    appendix, we will derive the equations used in updating weights of neuron synapses
    and bias links in an ANN employing input biases at every iteration of training.


    ### A.2 Training with Bias Input


    A hidden-layer neuron with a bias input is given in Figure A.1, where a bias link
    with weight of $B$ is added as one of the neuron inputs. Let us now formulate
    the weights for the incoming and outgoing links of a neuron that includes bias
    inputs. As shown in Figure A.2, the summation function works as follows:


    ```

    $e_1 = (x_1 \cdot w_1) + (x_2 \cdot w_4) + b_1$

    $e_2 = (x_1 \cdot w_2) + (x_2 \cdot w_5) + b_2$

    $e_3 = (x_1 \cdot w_3) + (x_2 \cdot w_6) + b_3$.

    ```


    An activation function $f(.)$ is applied to the summed signals at each hidden
    neuron as follows:


    ```

    $a_1 = f(e_1)$

    $a_2 = f(e_2)$

    $a_3 = f(e_3)$,

    ```


    where the $a_1$, $a_2$ and $a_3$ values are determined based on the activation
    function employed at the neurons, as presented in Eqs. (2.1) and (2.3) in Chapter
    2. Similarly, at the output layer, the output neuron has three inputs which are
    aggregated as:


    ```

    $e_4 = (a_1 \cdot w_7) + (a_2 \cdot w_8) + (a_3 \cdot w_9) + b_4$.

    ```


    After $e_4$ is obtained, it is fed to an activation as $a_4 = f(e_4)$.


    318 | Appendix A ANNs with Bias


    ![](img/a83d807f9a9119b1472555c0ef55797e_339_0.png)


    Figure A.1 A neuron with bias input at the output layer of an ANN.


    ![](img/a83d807f9a9119b1472555c0ef55797e_339_1.png)


    Figure A.2 Summation and activation in hidden-layer neurons.


    ### A.3 Forward Propagation


    A simple ANN with two inputs, one hidden layer and one output layer utilizing
    bias inputs is presented in Figure A.3. Similar to the derivation presented in
    Section 2.3.4 in Chapter 2, we have $x_1, x_2$ and bias as the inputs to the neuron.


    ![](img/a83d807f9a9119b1472555c0ef55797e_339_2.png)


    Figure A.3 Example ANN with two inputs with bias, one hidden layer and one output
    with bias.


    #### A.3.1 Forward Propagation from Input to Hidden Layer


    Let us now consider the forward propagation step in the ANN training process.
    For the derivations in this section, as in Section 2.5, we will use a simple ANN
    with one hidden layer as given in Figure A.3. For forward propagation from input
    to hidden layer of this simple ANN, we have:


    $Z_{(11)}^{(2)} = x_1 \cdot w_{11}^{(1)} + x_2 \cdot w_{21}^{(1)} + b_1^{(1)}$

    $Z_{(12)}^{(2)} = x_1 \cdot w_{12}^{(1)} + x_2 \cdot w_{22}^{(1)} + b_2^{(1)}$

    $Z_{(13)}^{(2)} = x_1 \cdot w_{13}^{(1)} + x_2 \cdot w_{23}^{(1)} + b_3^{(1)}$


    Using the definition of sigmoid activation given in Eq. (2.1) in Chapter 2, we
    have the following outputs of the hidden-layer neurons:


    $Z_{(11)}^{(2)} = x_1 \cdot w_{11}^{(1)} + x_2 \cdot w_{21}^{(1)} + b_1^{(1)}$

    $Z_{(12)}^{(2)} = x_1 \cdot w_{12}^{(1)} + x_2 \cdot w_{22}^{(1)} + b_2^{(1)}$

    $Z_{(13)}^{(2)} = x_1 \cdot w_{13}^{(1)} + x_2 \cdot w_{23}^{(1)} + b_3^{(1)}$


    At the output-layer neuron, aggregation of the three input synapses and the bias
    yields


    $Z^{(3)} = a_{11}^{(2)} \cdot w_1^{(2)} + a_{12}^{(2)} \cdot w_2^{(2)} + a_{13}^{(2)}
    \cdot w_3^{(2)} + b_1^{(2)}$


    Finally at the output layer, using a sigmoid activation function generates $\hat{y}$
    as


    $\hat{y} = f(Z^{(3)}) = \frac{1}{1 + e^{-Z}}$

    $= \frac{1}{1 + e^{-(a_{11}^{(2)} \cdot w_1^{(2)} + a_{12}^{(2)} \cdot w_2^{(2)}
    + a_{13}^{(2)} \cdot w_3^{(2)} + b_1^{(2)})}}$


    #### A.3.2 Neuron Back Propagation with Bias Input


    Let us go over the steps of back propagation over a neuron with a bias input for
    a neuron with two inputs $x_a$ and $x_b$ and a bias incoming over synapses using
    weights $w_a$, $w_b$, and $B$, respectively, generating an output of $\hat{y}$,
    as shown in Figure A.4. The output of a neuron and its partial derivation are
    defined as


    $\hat{y} = f(e)$, $\frac{\partial \hat{y}}{\partial e} = f''(e)$.


    For $e = x_a w_a + x_b w_b + B$, partial derivatives of $e$ with respect to $w_a$,
    $w_b$ and $B$ are as follows:


    $\frac{\partial e}{\partial w_a} = x_a$, $\frac{\partial e}{\partial w_b} = x_b$,
    $\frac{\partial e}{\partial B} = 1$.


    For error $J$ defined as $J = \frac{1}{2}(y - \hat{y})^2$, the partial derivative
    of $J$ with respect to $w_a$ is


    $\frac{\partial J}{\partial W_i} = -(y - \hat{y}) \frac{\partial \hat{y}}{\partial
    W_i} = -(y - \hat{y}) \frac{\partial \hat{y}}{\partial e} \frac{\partial e}{\partial
    W_i}$.


    Let us define $\delta = -(y - \hat{y})f''(e)$ and plug it into the above error
    equation:


    $\frac{\partial J}{\partial w_a} = \delta \frac{\partial e}{\partial w_a} = \delta
    x_a$.


    The partial derivative of $J$ with respect to $w_b$ is


    $\frac{\partial J}{\partial w_b} = -(y - \hat{y}) \frac{\partial \hat{y}}{\partial
    w_b} = -(y - \hat{y}) \frac{\partial \hat{y}}{\partial e} \frac{\partial e}{\partial
    w_b}$.'

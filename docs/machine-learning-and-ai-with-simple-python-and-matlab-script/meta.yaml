  md: '# 8


    # CNNs for Optical Character Recognition


    # 8.1 Introduction


    Optical character recognition (OCR) is the process of digitizing and recognizing
    images of written, typed or printed text [78]. A typical example of OCR usage
    is postal automation, where letters and packages are classified based on their
    hand-written or typed addresses and labels. Rather than manually reading and typing
    the address of each letter into a computer, OCR allows the computer to recognize
    and process the addresses automatically. Other applications of OCR include capturing
    licence plate numbers, conversion of physical documents to editable text documents
    and assistance for the blind and visually impaired. A popular information source
    used for OCR is the MNIST dataset [79]. It consists of 70 000 greyscale images
    of handwritten numerical digits ranging from 0 to 9. Each digit is stored as a
    (28x × 28) pixel image. The dataset is divided into 60 000 training samples and
    10 000 test samples. Figure 8.1a displays a few examples from the MNIST dataset
    [80]. The MNIST website contains the performance of various classification methods
    trained on the dataset. It is reported on the MNIST website that CNNs currently
    outperform every other classifier for character recognition applications. In Figure
    8.1b, the lowest error rate corresponding to each classifier is listed.


    # 8.2 A Simple CNN for OCR


    In this chapter, we introduce a CNN for implementing a simple OCR task, namely
    recognizing several hand-written characters. The CNN in this example reads a hand-drawn
    greyscale image of size (1 × 28 × 28) and identifies the input character as one
    of the reference images that it has stored. Multiple consecutive CL–PL pairs are
    employed to increase the prediction capability of the CNN (Figure 8.2). There
    are three convolutional layers (CLs), using $F_{cl} = 8$, 16 and 32 filters in
    three CLs, each with a size of $f_{cl} = 3 \times 3$. There are three RELU entities
    and two pooling layers (PLs), each with a pooling size of $p = 2$ using stride

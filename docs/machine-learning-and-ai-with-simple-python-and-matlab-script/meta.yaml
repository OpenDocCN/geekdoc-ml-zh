    \ $f_{cl} = 3$，滤波器数量为 $F_{cl} = 8$。如第7章所述，设置了填充，以便在输入图像上添加零，使其在卷积后保持相同尺寸，从而避免因卷积层滤波器\
    \ $f_{cl}$ 尺寸较小而丢失信息。在第29行进行批量归一化后，第32行定义了RELU激活函数，第36行设置了第一个池化层，其尺寸为 $p = 2$，步幅为\
    \ $s_{pl} = 2$。第二个卷积层-池化层对在第41行和第47行定义。然后，第三个卷积层的尺寸、滤波器数量、RELU和归一化在第51至53行。最后，全连接的ANN在第58行定义。注意，在Matlab中，输出层是自动实现的。在第71至73行，训练选项定义为sgdm（即随机梯度下降），学习率为0.01，最大训练轮数为50。训练好的CNN在第82行保存到名为\
    \ `net` 的对象中。\n\n```matlab\nfunction net = CNN_Train(train_dir)\n%\n% Train a\
    \ new CNN using information from TrainingSet directory\n% Then return trained\
    \ CNN\n\n    %%%%%%%%%%% TRAIN THE CNN %%%%%%%%%%%\n\n    % load the training\
    \ image dataset into an imageDatastore\n    % train_path contains the path to\
    \ the dataset\n    imds_train = imageDatastore(train_dir, ...\n              \
    \                  'IncludeSubfolders',true,...\n                            \
    \    'LabelSource','foldernames');\n    % get the number of unique training labels\
    \ in the training data\n    noof_labels = height(countEachLabel(imds_train));\n\
    \n    layers = [\n        % set the size of the input image as 28x28 pixels with\
    \ 1 color\n        % channel (grayscale)\n        imageInputLayer([28 28 1])\n\
    \n        % create the first convolution layer, it has 8 convolutional\n     \
    \   % filters, each with a height and width of 3 and input is 0 padded.\n    \
    \    % the input is padded with the appropriate number of zeros so that\n    \
    \    % the size of the output is the same size as the input.\n        convolution2dLayer(3,8,'Padding','same')\n\
    \        % normalize the output of the convolution between the range -1\n    \
    \    % and 1. this prevents the updated weights from increasing\n        % explosively\
    \ during training.\n        batchNormalizationLayer\n        % apply rectilinear\
    \ unit activation function that sets all negative\n        % values to zero\n\
    \        reluLayer\n\n        % apply max pooling using a pooling size of (2x2),\
    \ and using a\n        % stride of 2\n        maxPooling2dLayer(2,'Stride',2)\n\
    \n        % create a second convolution layer, it has 16 convolutional\n     \
    \   % filters, each filter has a height and width of 3 and the input is\n    \
    \    % zero padded.\n        convolution2dLayer(3,16,'Padding','same')\n     \
    \   batchNormalizationLayer\n        reluLayer\n\n        % apply max pooling\
    \ using a pooling size of (2x2), and using a\n        % stride of\n        maxPooling2dLayer(2,'Stride',2)\n\
    \        % create a third convolution layer, it has 32 convolutional\n       \
    \ % filters, each filter has a height and width of 3 and the input is\n      \
    \  % zero padded.\n        convolution2dLayer(3,32,'Padding','same')\n       \
    \ batchNormalizationLayer\n        reluLayer\n\n        % create the ouput layer\n\
    \        % the number of neurons in the output layer is equal to the number\n\
    \        % of image labels\n        fullyConnectedLayer(noof_labels)\n       \
    \ % use a softmax layer to convert the outputs to a set of\n        % probalities\
    \ where each output represents the probability that the\n        % image is a\
    \ corresponding label.\n        softmaxLayer\n        % add a classification layer\
    \ to make each output mutually\n        % exclusive, in other words there's only\
    \ a single correct label for\n        % each image\n        classificationLayer];\n\
    \        %END OF layers\n\n\n        % specify CNN training options\n        options\
    \ = trainingOptions('sgdm', ...\n                                    'InitialLearnRate',0.01,\
    \ ...\n                                    'MaxEpochs',500);\n\n        % sleep\
    \ for a second to display the GUI\n        pause(1);\n        % start training\
    \ the CNN\n        % imds_train is imageDatastore that holds all training images\
    \ and labels\n        % layers is the architecture of the CNN\n        % options\
    \ contains the training parameters\n        net = trainNetwork(imds_train,layers,options);\n\
    end\n```\n\n现在我们介绍名为 `CNN_Predict` 的函数，它有三个输入参数：`net`、`ref_path` 和 `char_img`，分别指向训练好的CNN、`ReferenceSet`\
    \ 文件夹的地址以及用户绘制的输入图像。训练好的CNN在第19行生成输出如下：\n\n```matlab\n[Prediction, ] = classify(net,\
    \ char_img);\n```\n\n其中 `Prediction` 包含指向 `ReferenceSet` 文件夹中某个子文件夹的索引。在第22至33行，显示了由\
    \ `Prediction` 顶部元素指向的参考输出图像。\n\n```matlab\nfunction Prediction = CNN_Predict(net,ref_path,char_img)\n\
    % this GUI shows prediction for the character drawn by the user\n\n    S.net =\
    \ net;\n    S.ref = ref_path;\n    % open a window(figure) for the GUI\n    S.fh\
    \ = figure('units','pixels',...\n                'position',[500 300 600 400],...\n\
    \                'menubar','none',...\n               'name','Character Recognition\
    \ Using CNN',...\n               'numbertitle','off',...\n               'resize','off',...\n\
    \               'Color',[0.8588 0.9412 0.8275]);\n\n   % create an axes to hold\
    \ the images\n   S.ax = axes('units','pix',...\n               'position',[100\
    \ 250 200 90]);\n   % pass the drawing to the CNN and get a prediction\n   [Prediction,~]\
    \ = classify(net, char_img);\n\n   % retrieve the appropriate reference image\
    \ for prediction\n   full_ref_path = fullfile(ref_path,char(Prediction));\n  \
    \ ref_imd = imageDatastore(full_ref_path);\n\n   % display user input image\n\
    \   subplot(1,2,1);\n   imshow(char_img);\n   title('YOUR CHARACTER','FontSize',15);\n\
    \n   % display prediction image\n   subplot(1,2,2);\n   imshow(ref_imd.Files{1});\n\
    \   title('CNN PREDICTION','FontSize',15);\nend\n```"

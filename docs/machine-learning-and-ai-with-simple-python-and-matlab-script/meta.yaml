- img_proc: true
  md: 'which corresponds to a completely-connected graph $G$ with undirected edges,
    as presented in Section 17.2. For this simplified case, a chromosome may encode
    the cities in the order to be visited. A fitness function can be defined to represent
    the total cost of a cycle that is dictated by a chromosome as its fitness as defined
    in Eqn. (17.1). A generation of the GA will evolve a set of individuals in its
    population, where each individual corresponds to a TSP solution.


    In Figure 17.8a, an example graph is shown where the nodes are connected with
    undirected edges, each of which is associated with an integer cost value representing
    the difficulty of traversing the edge. This example uses a `completely-connected
    graph`, where every node is connected to every other one with an undirected edge.
    In this simplified form, the salesman can travel either from node $i$ to $j$ or
    from $j$ to $i$ with the same cost. However, in the general case, the TSP graph
    does not have to be completely-connected and the edges may not be undirected (i.e.
    an edge directed from node $i$ to $j$ does not imply in general that the salesman
    can also travel from $j$ to $i$). The TSP aims to find the minimum cost cycle
    among all possible cycles starting and ending at $A$ while covering all edges
    only once. Even for this simple example, there are $4^5$ possibilities to consider.


    In Figure 17.8b, a connectivity matrix called $CM$ is presented, which is derived
    from the completely-connected graph in Figure 17.8a. Connectivity matrix $CM$
    is an ($n \times n$) matrix where an element $CM[i][j]$ represents the cost from
    node $i$ to node $j$. For example, using a $CM$ matrix of size ($5 \times 5$),
    the cost associated with the edge from node 0 to 2 (i.e. from node A to node C)
    is $CM[0][2] = 12$. Since we are using an undirected graph $G$ for this example,
    an edge from $i$ to $j$ implies that there is also a connection from $j$ to $i$
    with the same cost. As seen in Figure 17.8b, $CM[0][2] = 12$ implies that $CM[2][0]
    = 12$. Diagonal elements of $CM$ are zero (i.e. $CM[i][i] = 0$ for ($i = 0, \cdots,
    n-1$)), since the distance to itself is zero for each city.


    Let us now define a chromosome as the order to visit cities $[c_i, c_j, \cdots,
    c_x]$, where we assume that the last city $c_x$ and the first city $c_i$ are connected
    covering all vertices in $V$. For the example in Figure 17.8, chromosome length
    is 5 since there are five cities. The fitness function is the total weight (i.e.
    the cost) for the edges selected in a chromosome:


    $$\text{Fitness of a candidate} = \sum_{(i=1)}^{m} w_i + w_R,$$


    where $w_i$ is the weight of the edge in codon $c_m$ (i.e. the last one in the
    chromosome) and $w_R$ the weight of the return edge from the last node to the
    start. For the example in Figure 17.8, starting from node $A$, the TSP is defined
    as finding the order in which a salesman must visit each node once and return

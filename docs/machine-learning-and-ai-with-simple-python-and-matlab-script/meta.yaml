    % chromosome : b2blb0 -> convert to decimal 0-7 and use as an index (+1):\n% [N,\
    \ NE, E, SE, S, SW, W, NW]\n% chromosome 101 -> 5 -> 5+1 -> SW\ndisplacement_vectors\
    \ = [[0, 1]; [1/sqrt(2), 1/sqrt(2)]; ...\n                        [1, 0]; [1/sqrt(2),\
    \ -1/sqrt(2)]; ...\n                        [0, -1]; [-1/sqrt(2), -1/sqrt(2)];\

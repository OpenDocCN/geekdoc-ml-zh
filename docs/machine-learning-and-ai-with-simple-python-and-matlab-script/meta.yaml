    \ ANN for forward propagation;\n\n    // back propagation through CNN:\n    perform\
    \ back propagation in ANN;\n    for j = N_{CL} to 1 do\n        for each n in\
    \ j\n            calculate error of current weights;\n        end for\n    end\
    \ for\n    adjust W_{NN} and B_{NN} using calculated error;\nend for\n```\n\n\
    图7.3 训练CNN的简单算法。\n\n## 7.2 CNN的变体\n\nCNN的层数可以从几层到数百层不等[71]，其分类能力也从简单的数字识别任务到识别数千种不同的信息类别。例如，一个相对简单的CNN，称为LeNet，被设计用于识别印刷和手写数字[72]。它处理一个由（32\

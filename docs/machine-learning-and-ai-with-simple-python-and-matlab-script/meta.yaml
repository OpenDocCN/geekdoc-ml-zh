    \ of epochs have been reached.\n\nOnce the weight values are decided, the trained\
    \ ANN can then be used to generate predictions for new inputs. Different ANN training\
    \ processes include:\n\n+   - Supervised training: inputs are mapped to a set\
    \ of known output signals [32].\n- Unsupervised training: this uses inputs to\

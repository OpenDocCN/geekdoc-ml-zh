- md: '## 11.6 Concluding Remarks


    In this chapter, we introduce an important application of RNNs, namely the chatbot,
    which generates a response when a user enters a query in the form of a sentence
    in a natural language. The characteristics of this application require a many-to-many
    RNN architecture, where the output sequence is generated by the RNN only after
    the user input sequence ends, and the input and output sequences may differ in
    length and vary for each query. As described in Chapter 10, a many-to-many RNN
    implemented as a chatbot typically employs hidden and embedding layers to improve
    its prediction power and reduce the computation cost of the training process.


    For this simple example, we show how to construct an RNN using the library functions
    available in Python and Matlab. As its sample data, a small set of user text message
    exchanges taken from the internet are used. The chatbot implementation demonstrates
    that it is possible to generate predictions that are not present in the sample
    data set when the user enters unique queries (using only the words existing in
    sample training data). Even this simplistic RNN example is capable of generating
    predictions that are bound to improve with more epochs and hidden layers, pointing
    to the power of RNN-based models in implementing the chatbot class of applications.


    **Figure 11.6** Sample outputs generated by the Matlab script presented in Section
    11.5: (a) user queries and responses taken from the sample training data and the

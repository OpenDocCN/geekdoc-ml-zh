    # 16


    ## 用于无人机飞行控制的遗传算法


    ### 16.1 引言


    在本章中，我们将介绍遗传算法在现实问题中的一个流行应用，即作为集群成员运行的无人机的飞行控制。通常，无人机能够自主做出飞行决策。在这个示例应用中，我们假设每架无人机的目标是在感兴趣的区域内均匀分布，使得每架无人机在通信范围允许的情况下，尽可能远离其近邻。当无人机之间没有同步、协作或主从机制时，这项任务尤其艰巨。选择无人机飞行控制作为本章主题，旨在展示遗传算法处理这些原本棘手问题的能力。


    ### 16.2 无人机集群


    无人机，通常被称为 drone，能够在许多工程应用中消除部署昂贵设备和派遣人员以完成复杂目标的需要。一个无人机集群可以快速部署到感兴趣的区域，作为一个团队在没有预先存在的基础设施支持的情况下运行。无人机可以形成并维持一个移动自组织网络，以完成那些在传统通信基础设施（具有集中控制器、人工操作员和无人机间同步）下难以实现的任务
    [18]。典型例子包括：在工业场地上空部署无人空中巡逻以检测有害气体泄漏；检查农田作物健康状况；早期检测森林火灾；在灾难场景中为地面实体（如消防员）维持临时通信基础设施（接入点和基站的星座）；或在救援任务中定位无线电波源
    [19]。


    如果无人机的重量小于 2 公斤且翼展小于一米，则通常被视为小型无人机。使用小型、廉价且可一次性使用的无人机，可以组建拥有数十甚至数百名成员的集群。可以从不同区域发射它们，例如固定地面（例如从基站）、移动地面（例如从卡车）或空中平台（例如直升机）。这类小型集群对于在难以到达的位置执行任务特别有用。尽管具有优势，小型无人机可能因其有限的电源和有效载荷能力而受到固有限制，这将其使用限制在短时间飞行。它们还具有有限的机载处理能力，这需要轻量级但快速的飞行控制算法。在图
    16.1a 所示的示例中，美国国防部进行的一系列实验中，成功部署了超过 100 架小型无人机集群。从空中平台发射后，自主的 3D 打印 Perdix 无人机相互通信，完成了在目标上空盘旋并在空中形成圆圈的任务
    [117]。


    大型无人机的重量和尺寸范围很广。大型无人机可能重达一吨，翼展超过 10 米。与小型版本相比，它们具有能够携带更重有效载荷、飞行更远距离和更长时间的优势。然而，与小型无人机相比，它们的运营成本也往往更高，并且需要更广泛的基础设施来维护。由于大型无人机潜在坠毁的风险可能是灾难性的，它们在整个飞行过程中通常由飞行员操作。因此，大型无人机通常用于组建小型集群。农业任务，如作物喷粉和田地浇水，是经常分配给大型无人机的应用。图
    16.1b 显示了一个大型无人机集群，其中每架无人机能够携带 10 升除草剂罐，并且每小时可以喷洒数十英亩。大型无人机集群大多在农村地区使用，由具有有限自主权的人类飞行员操作
    [118]。


    由于其操作灵活性和低维护成本，小型无人机集群的使用要广泛得多。在本章的其余部分，不失一般性，我们将重点介绍使用移动自组织网络作为通信手段的小型无人机集群。但是，我们应该注意，本章介绍的基于遗传算法的飞行控制算法同样可以有效地应用于大型无人机集群。在本章中，我们将交替使用
    `drone`、`node`、`mobile node` 和 `UAV` 这些术语。


    ### 16.3 无人机飞行控制


    不失一般性且为了简单起见，假设所有无人机在飞行和通信能力方面都是相同的。在这种设定下，所有无人机具有相同的最大通信范围，可以向范围内的近邻广播消息，空中速度和机动能力相同，并且都配备了能够做出飞行决策的机载计算机。


    在为自主无人机设计飞行控制算法时，必须考虑几个因素。电源、飞行持续时间和有效载荷能力的限制只是其中的'

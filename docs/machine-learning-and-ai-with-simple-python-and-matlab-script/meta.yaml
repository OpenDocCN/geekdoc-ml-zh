    $$X = \begin{bmatrix} x_{11} & x_{12} \ x_{21} & x_{22} \ x_{31} & x_{32} \end{bmatrix}.$$


    Matrix dimensions for the weights between the input and hidden layers is the number
    of ANN inputs by the number of neurons in the hidden layer. For the ANN in Figure

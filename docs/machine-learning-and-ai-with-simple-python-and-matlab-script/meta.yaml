    \ + 3 + 10 = 31 |\n\n类似的解法适用于旅行商问题的一般情况，其中部分节点并非与所有其他节点直接相连，且边可以是无向的、单向的或双向的。然而，由于染色体可能无意中包含未直接相连的城市，因此需要对每个染色体的有效性进行额外检查。\n\
    \n在本节中，我们将展示一个Python脚本实现，用于解决第17.5节讨论的简化版旅行商问题，其中所有城市通过双向边相互连接。假设我们有15个待访问的城市，其坐标如图17.10a和b所示。这些城市对应的连通性矩阵如图17.11所示。\n\
    \n在下面给出的示例Python脚本的第16行，指定了存储城市坐标的输入文件。第20行使用此输入文件创建了一个名为`df`的二维矩阵（即数据框）。第22行调用了`gps`库中定义的`generate_distance_matrix`函数来计算城市的连通性矩阵。第25行将染色体长度定义为城市数量。第32至50行定义了染色体和种群，供后续Python库中的遗传算法实现使用。第53至62行将适应度函数实现为一个循环，累加连通性矩阵中呈现的城市间距离。适应度值在第56行包含了从最后一个城市返回起点的距离。交叉、变异和选择算子分别在第69、72和75行定义。Python中的遗传算法实现格式如下：\n\
    \n```\nalgorithms.eaSimple(pop, toolbox, xoProb, mutProb, gens, selectCrit)\n\
    ```\n\n其中`pop`、`toolbox`、`xoProb`、`mutProb`、`gens`和`selectCrit`分别代表种群、Python库名称、交叉概率、变异概率、代数和选择标准。因此，第84行调用遗传算法的语句变为\n\
    \n```\nalgorithms.eaSimple(pop, toolbox, 0.7, 0.2, 40, halloffame=best_genome)\n\
    ```\n\n其中`halloffame`被指定为要选择的最佳基因组。第103至156行将最佳解绘制在地图上。\n\n请注意，对于基于遗传算法的旅行商问题实现，如果设计不当，常规的交叉算子可能会出现问题。一对有效的染色体在应用交叉算子后可能产生无效的后代。例如，考虑图17.12a中所示的父代染色体，定义为[1\
    \ 2 3 4 5]和[3 2 1 5 4]。假设在最高两位之后进行交叉。在这种情况下，后代将是[1 2 1 5 4]和[3 2 3 4 5]，由于两种情况都存在重复城市，因此是无效的。一种交叉操作，其后代的密码子被生成为父代密码子的排列，在第69行实现为\n\
    \n```\ntoolbox.register(\"mate\", cxPartiallyMatched)\n```\n\n其中部分匹配（或映射）交叉[131]使用两个交叉点实现，如图17.12b所示。首先，将父代1和父代2的中间部分分别复制到后代2和后代1中，这定义了一个映射：3\
    \ ⇔ 2，4 ⇔ 6，5 ⇔ 1。然后，基于此映射，父代1的最高两位（即1和2）被映射到后代1的第5位和第3位。类似地，父代1的最低位（即6）被映射到后代1的第4位。后代2以相同方式获得。\n\
    \n图17.13 (a) 变异算子产生具有重复城市的无效后代，(b) 用于变异的索引打乱保留了后代的有效性。\n\n对于变异算子也存在类似的担忧。如果不特别小心地实现，变异后的后代可能是无效的。考虑图17.13a中的例子，一个定义为[\
    \ 1 2 3 4 5 ]的后代将在次高位发生变异。通过随机替换此密码子（例如从2变为4），后代可能最终变为[ 1 4 3 4 5 ]，由于存在重复的密码子值，因此是无效的。然而，将变异实现为打乱两个密码子将始终保留后代的有效性。在图17.13b中，变异算子选择两个密码子并打乱它们，产生一个变异但有效的后代。这种打乱密码子值的变异算子在第72行实现为\n\
    \n```\ntoolbox.register(\"mutate\", mutShuffleIndexes, indpb=0.05)\n```\n\n这表明变异算子将以0.05的概率执行。在第87行，最佳解被保存到名为`best_path`的数组中。在第93-101行，计算了最佳路径的成本。在第106至156行之间，使用Python库在地图上显示了此路径。\n\

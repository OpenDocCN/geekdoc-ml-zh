    # 2.6.2 Back Propagation – from Output to Hidden Layer


    Let us now derive back-propagation equations for the ANN shown in Figure 2.6.
    The error at the output layer is defined as half of the square of the difference
    between the real and the calculated output values, namely $y$ and $\hat{y}$, respectively:


    $$J = \sum \frac{1}{2}(y - \hat{y})^2 = \sum \frac{1}{2}(y - f(f(XW^{(1)})W^{(2)})^2).$$


    To reduce the error, $J$ has to be minimized, which means that its partial derivatives
    with respect to $W^{(1)}$ and $W^{(2)}$ must be equal to 0.


    $$\frac{\partial}{\partial W} \sum \frac{1}{2}(y - \hat{y})^2 = \sum (y - f(f(XW^{(1)})W^{(2)})^2)
    \frac{\partial}{\partial W}(y - \hat{y}).$$


    Since the link weights between output and hidden layers are represented as $W^{(2)}$
    as shown in Figure 2.6, let us first calculate the partial derivative of $J$ with
    respect to $W^{(2)}$:


    $$\frac{\partial J}{\partial W^{(2)}} = \frac{\partial}{\partial W^{(2)}} \sum
    \frac{1}{2}(y - \hat{y})^2 = (y - \hat{y}) \frac{\partial}{\partial W^{(2)}} \sum
    (y - \hat{y})$$

    $$= -(y - \hat{y}) \frac{\partial}{\partial W^{(2)}} \sum \hat{y}.$$


    Since $\hat{y} = f(Z^{(3)})$, we have


    $$\frac{\partial J}{\partial W^{(2)}} = -(y - \hat{y}) \frac{\partial \sum \hat{y}}{\partial
    W^{(2)}} = -(y - \hat{y}) \frac{\partial \sum \hat{y}}{\partial Z^{(3)}} \frac{\partial
    Z^{(3)}}{\partial W^{(2)}}.$$


    Given that $Z^{(3)} = a^{(2)} \cdot W^{(2)}$, we get


    $$\frac{\partial Z^{(3)}}{\partial W^{(2)}} = a^{(2)}.$$


    For the sigmoid activation function, we have


    $$f(Z^{(3)}) = \hat{y} = \frac{1}{1 + e^{-Z^{(3)}}},$$


    which means that


    $$\frac{\partial \sum \hat{y}}{\partial Z^{(3)}} = f''(Z^{(3)}) = \frac{e^{-Z^{(3)}}}{(1
    + e^{-Z^{(3)}})^2}.$$


    We now have


    $$\frac{\partial J}{\partial W^{(2)}} = -(y - \hat{y})f''(Z^{(3)})a^{(2)}.$$


    Let us define the back-propagated error, called $\delta^{(3)}$, as follows:


    $$\delta^{(3)} = -(y - \hat{y}) \cdot f''(Z^{(3)}),$$


    where $-(y - \hat{y})$ and $f''(Z^{(3)})$ are multiplied element by element. We
    now have


    $$\frac{\partial J}{\partial W^{(2)}} = \delta^{(3)}a^{(2)}.$$


    We should note that back propagation is based on gradient descent, which is prone
    to getting stuck at local extreme points. Since $f''(Z^{(3)})$, $y$ and $\hat{y}$
    have the same dimensions (i.e. the number of samples by the number of outputs),
    $\delta^{(3)}$ will also have the same dimensions. However, to perform a matrix
    multiplication for $\delta^{(3)}$ and $a^{(2)}$, we must transpose $a^{(2)}$,
    which yields


    $$\frac{\partial J}{\partial W^{(2)}} = a^{(2)\dagger} \delta^{(3)},$$


    where $\dagger$ represents the matrix transposition operation.'
  - '[PAGE 37]


    # 2.6.3 Back Propagation – from Hidden Layer to Input


    For back propagation from hidden to input layer, we need to calculate the partial
    derivative of the error $J$ with respect to link weights of $W^{(1)}$ as shown
    in Figure 2.6. Hence,


    $$\frac{\partial J}{\partial W^{(1)}} = \frac{\partial}{\partial W^{(1)}} \sum
    \frac{1}{2}(y - \hat{y})^2 = (y - \hat{y}) \frac{\partial}{\partial W^{(1)}} \sum
    (y - \hat{y}) = -(y - \hat{y}) \frac{\partial}{\partial W^{(1)}} \sum \hat{y}.$$


    Since $\hat{y} = f(Z(3))$, we have


    $$\frac{\partial J}{\partial W^{(1)}} = -(y - \hat{y}) \frac{\partial \sum \hat{y}}{\partial
    W^{(1)}} = -(y - \hat{y}) \frac{\partial \sum \hat{y}}{\partial Z^{(3)}} \frac{\partial
    Z^{(3)}}{\partial W^{(1)}}.$$


    We know that


    $$\frac{\partial Z^{(3)}}{\partial W^{(1)}} = \frac{\partial Z^{(3)}}{\partial
    a^{(2)}} \frac{\partial a^{(2)}}{\partial W^{(1)}}.$$


    We then obtain


    $$\frac{\partial J}{\partial W^{(1)}} = -(y - \hat{y}) f''(Z^{(3)}) \frac{\partial
    Z^{(3)}}{\partial a^{(2)}} \frac{\partial a^{(2)}}{\partial W^{(1)}}.$$


    Given that $Z(3) = a(2) \cdot W^{(2)}$, we get


    $$\frac{\partial Z(3)}{\partial a^{(2)}} = W^{(2)\dagger}.$$


    Recall from Eq. (2.13) that we defined $\delta^{(3)}$ as $-(y - \hat{y}) f''(Z(3))$.
    We know that


    $$\frac{\partial a^{(2)}}{\partial W^{(1)}} = \frac{\partial a^{(2)}}{\partial
    Z^{(2)}} \frac{\partial Z^{(2)}}{\partial W^{(1)}}.$$


    Therefore, we now have


    $$\frac{\partial J}{\partial W^{(1)}} = \delta^{(3)} W^{(2)\dagger} \frac{\partial
    a^{(2)}}{\partial Z^{(2)}} \frac{\partial Z^{(2)}}{\partial W^{(1)}}.$$


    Recall from Figure 2.6 that $a^{(2)} = f(Z^{(2)})$; then we have


    $$\frac{\partial a^{(2)}}{\partial Z^{(2)}} = f''(Z^{(2)}).$$


    Also recall from Figure 2.6 that $Z^{(2)} = XW^{(1)}$; we now have


    $$\frac{\partial Z^{(2)}}{\partial W^{(1)}} = X.$$


    This yields


    $$\frac{\partial J}{\partial W^{(1)}} = \delta^{(3)} W^{(2)\dagger} f''(Z^{(2)})
    X.$$


    As before, the dimensions need to be adjusted as


    $$\frac{\partial J}{\partial W^{(1)}} = X^{\dagger} \delta^{(3)} W^{(2)\dagger}
    f''(Z^{(2)}).$$


    Let us define $\delta^2$ as follows:


    $$\delta^2 = \delta^{(3)} W^{(2)\dagger} \cdot f''(Z^{(2)}),$$


    where $f''(Z^{(2)})$ needs to be transposed and multiplied by $W^{(2)\dagger}$
    element by element. Then we have


    $$\frac{\partial J}{\partial W^{(1)}} = X^{\dagger} \delta^{(2)}.$$'
- md: "## 2.7 Updating Weights\n\nDuring training of an ANN, after each back propagation,\
    \ the weights are updated such that the error is reduced after each iteration,\
    \ which is based on the modifications of the gradients modified through the hidden\
    \ layers as described above.\n\nLet $\\alpha$ be defined as the *learning rate*,\
    \ a real number that specifies the amount of modification chosen in updating the\
    \ weights during training. Using the derivatives in Eqs. (2.14) and (2.16), the\
    \ weights will be updated at each iteration as follows:\n\n$$W_{new}^{(1)} = W^{(1)}\
    \ - \\alpha \\frac{\\partial J}{\\partial W^{(1)}}$$\n$$W_{new}^{(2)} = W^{(2)}\
    \ - \\alpha \\frac{\\partial J}{\\partial W^{(2)}},$$\n(2.17)\n\nwhere the weights\
    \ on the left-hand side with subscript *new* are the updated values at that iteration,\
    \ whereas the right-hand side of the equations have the current weight values.\
    \ After updating the weights, a new forward and back propagation are performed.\
    \ At each iteration the weights are updated using the new gradients with Eq. (2.17).\
    \ Successive updatings of weights are expected to reduce the error in ANN outputs.\
    \ Training continues until a satisfactorily small amount of error is obtained\
    \ or a pre-determined number of iterations are performed.\n\n## 2.8 ANN with Input\
    \ Bias\n\nIn real-life problems, adjusting the weights to minimize output errors\
    \ requires that a bias is employed at every layer of the ANN, as shown in Figure\
    \ 2.8. Bias values, similar to synapse weights, are first randomly initialized.\
    \ During training, they are propagated forward and back and updated at each iteration\
    \ of training. Step by step derivation of updating bias and weight values during\
    \ the training process using input bias is presented in Appendix B.\n\n![](img/a83d807f9a9119b1472555c0ef55797e_38_0.png)\n\
    \n```\nset number of layers in ANN as NofLayers;\ninitialize random weights for\
    \ all links as W<sub>ANN</sub>;\ninitialized random bias for all layers as B<sub>ANN</sub>;\n\
    set number of epochs for training ANN as NofEpochs;\n\nfor i = 1 to NofEpochs\
    \ do\n    // forward propagation\n    for j = 1 to NofLayers do\n        for each\
    \ neuron in j do\n            multiply outputs from previous layer with weights;\n\
    \            add bias;\n            apply activation function;\n        end for\n\
    \    end for\n\n    // back propagation\n    for j = NofLayers to 1 do\n     \
    \   for each neuron j\n            calculate error of current weights;\n     \
    \       calculate gradient of current weights;\n        end for\n    end for\n\
    \    adjust W<sub>ANN</sub> and B<sub>ANN</sub> for epoch i;\nend for\n```\n\n\
    Figure 2.9 A simple algorithm describing the ANN training process.\n\n## 2.9 A\
    \ Simple Algorithm for ANN Training\n\nA simple algorithm outlining the ANN training\
    \ process is shown in Figure 2.9. The algorithm first defines the structure of\
    \ the ANN and the number of epochs (i.e. forward and back propagations) to be\
    \ used for training. Next, it initializes random weights and biases for all layers.\
    \ For each epoch, it performs forward propagation to yield a preliminary output\
    \ of the ANN and its associated error or cost. After forward propagation, it uses\
    \ back propagation to calculate the error and the gradients to adjust the weight\
    \ and bias values. This process is repeated until a maximum number of epochs have\
    \ been reached.\n\nOnce the weight values are decided, the trained ANN can then\
    \ be used to generate predictions for new inputs. Different ANN training processes\
    \ include:\n\n- Supervised training: inputs are mapped to a set of known output\
    \ signals [32].\n- Unsupervised training: this uses inputs to form data categorization\
    \ [33].\n- Reinforcement training: this continuously improves an ANN based on\
    \ new input data evaluated by a fitness function [34].\n\n## 2.10 Computational\
    \ Complexity of ANN Training\n\nComputational complexity of training includes\
    \ all the operations performed in Sections 2.5, 2.6 and 2.7. They are repeated\
    \ at each epoch for each of the data samples available in training. As can be\
    \ seen in Figure 2.5, in the first hidden layer, each neuron performs a summation\
    \ proportional to the number of inputs multiplied by the number of links: since\
    \ the hidden layer has 6 incoming links to 3 neurons, there are 6 sets of multiplications\
    \ and 3 computations of the activation function. For the single output layer,\
    \ there are 3 incoming links, there are 3 multiplications and 3 computations of\
    \ activation function. Let the number of links and neurons in the $i^{th}$ layer\
    \ be $|W^{(i)}|$ and $|S^{(i)}|$, respectively. For the general case, for forward\
    \ propagation, the number of multiplications and activation function computations\
    \ for one input–output sample are\n\n$$cost_M^1 = \\sum_{i=1}^{H} |W^{(i)}||S^{(i)}|c_m\
    \ \\quad cost_A^1 = \\sum_{i=1}^{H} |W^{(i)}||S^{(i)}|c_a,$$\n\nwhere $c_m$ and\
    \ $c_a$ are the computational costs for multiplication and activation function\
    \ computation, respectively. For the sake of simplicity, suppose back-propagation\
    \ cost is comparable to forward propagation for a given iteration. If there are\
    \ $|X|$ samples, the computational cost of training for one epoch is\n\n$$cost_{ANN}^1\
    \ = 2|X| \\left( \\sum_{i=1}^{H} |W^{(i)}||S^{(i)}|(c_m + c_a) \\right).$$\n\n\
    For $N$ forward- and back-propagation iterations, the training cost becomes\n\n\
    $$cost_{ANN}^N = 2N|X| \\left( \\sum_{i=1}^{H} |W^{(i)}||S^{(i)}|(c_m + c_a) \\\
    right). \\tag{2.18}$$\n\nUsing $\\mathcal{O}$ notation to indicate the order of\
    \ magnitude for computational complexity [35], the cost for training a fully-connected\
    \ ANN (i.e. all neurons are connected to all others in consecutive hidden layers),\
    \ we have\n\n$$cost_{ANN}^N = \\mathcal{O}(N \\ |X| \\ H \\ |W| \\ |S|)(c_m +\
    \ \\cdot c_a). \\tag{2.19}$$\n\nConsider a typical numerical application for a\
    \ fully-connected ANN with $H = 32$ layers, each with $S = 32$ neurons, using\
    \ $X = 10^5$ data samples over $N = 10^4$ iterations. Using Eq. 2.18, the computational\
    \ cost for training such an ANN is\n\n$$cost_{ANN}^{10^4} = 2 \\cdot 10^4 \\cdot\
    \ 10^5 \\left( \\sum_{i=1}^{32} 10^3(c_m + c_a) \\right) = \\mathcal{O}(10^{13})(c_m\
    \ + c_a).$$\n\nSince for realistic applications, training may require hundreds\
    \ or thousands of iterations using tens of thousands of samples over ANNs with\
    \ tens of hidden layers each of which has tens of neurons, computational complexity\
    \ may quickly become infeasibly large if design engineers are not cognizant of\
    \ such costs.\n\n## 2.11 Normalization of ANN Inputs and Outputs\n\nFor applications\
    \ where there are numerical imbalances between input and output values, it is\
    \ possible to experience computational inaccuracies due to rounding, truncation\
    \ and similar types of approximations. To alleviate such numerical problems, inputs\
    \ and outputs are typically scaled down (i.e. normalized) to be within the range\
    \ of relatively small integers. An example of normalization is as follows:\n\n\
    $$\\overline{X}_i = \\frac{X_i - \\min(X)}{\\max(X) - \\min(X)}, \\quad \\overline{Y}_i\
    \ = \\frac{Y_i - \\min(Y)}{\\max(Y) - \\min(Y)},$$\n\nwhere $X_i$ and $\\overline{X}_i$\
    \ are the values of the $i^{th}$ input before and after normalization, respectively.\
    \ Similarly, $Y_i$ and $\\overline{Y}_i$ are the $i^{th}$ output values before\
    \ and after normalization, respectively. Depending on the application, inputs\
    \ are normalized separately over multiple samples. Similarly, values of a single\
    \ output over multiple samples are normalized. If a group of inputs are at the\
    \ same level of importance, they may be normalized together. For example, if the\
    \ input values are positive, we can use $\\min(X) = 0$. Similarly, if the output\
    \ range is $[0, 100]$, we have $\\min(Y) = 0$ and $\\max(Y) = 100$. Normalization\
    \ is a sound practice since it tries to prevent precision issues in calculations\
    \ and helps accelerate convergence to better solutions [36].\n\n## 2.12 Concluding\
    \ Remarks\n\nIn this chapter, general concepts of ANN architecture and training\
    \ process are outlined. ANNs are one of the most popular tools in AI for solving\
    \ problems that are based on large amounts of data. In an ANN, a given set of\
    \ inputs are modified by a set of weights and activation functions to generate\
    \ outputs that match the real data points measured in an experiment or an event.\
    \ There are a class of problems that are suitable to be solved by ANNs. For example,\
    \ `classification problems` and image identification tasks are excellent candidates\
    \ for ANNs. In such applications, there are typically a large number of inputs,\
    \ and their respective outputs are available (typically sample sizes range from\
    \ tens to hundreds of thousands or higher). A process called `training` aims to\
    \ find the weight values such that the difference between real and calculated\
    \ values of outputs are minimized (or they are as small as possible within the\
    \ limits defined for the process).\n\nThere have been several different types\
    \ of ANNs developed in recent years. Convolutional neural networks (CNNs), recurrent\
    \ neural networks (RNNs), large language models (LLMs) and transformers are among\
    \ the most popular ones. In an RNN (See Chapters 10 and 11), values from the output\
    \ layer are sent back to the hidden layers to be used in follow-up processing\
    \ of the signal. Using the attention mechanism in RNNs, machine translation tasks\
    \ become feasible, as discussed in Chapters 12 and 13. A good survey for language\
    \ models can be found in [37].\n\nModelling challenging real-life problems to\
    \ be solved by ANNs requires experience and the analytical skill set of engineering\
    \ disciplines. Computational complexity of training grows by the product of the\
    \ number of neurons and the number of hidden layers. Therefore, one has to be\
    \ cognizant of computational cost of training when designing ANN architectures\
    \ for real-life applications.\n\n## 2.13 Exercises for Chapter 2\n\n- 1) How would\
    \ the performance of the ANN given in Figure 2.6 be impacted if there were two\
    \ hidden layers?\n- 2) How would the performance of the ANN given in Figure 2.6\
    \ be impacted if the learning rate of $\\alpha$ were increased tenfold in terms\
    \ of converging to an acceptable solution by reducing the output error?\n- 3)\
    \ How would the performance of the ANN given in Figure 2.6 be impacted if the\
    \ learning rate of $\\alpha$ were decreased tenfold in terms of converging to\
    \ an acceptable solution by reducing the output error? Compare your answer with\
    \ Exercise 2.\n- 4) Consider the ANN given in Figure 2.6. Suppose one doubles\
    \ the number of neurons. How will the ANN performance be impacted in terms of\
    \ converging to an acceptable solution by reducing the output error?"
  mdcn: "## 2.7 权重更新\n\n在人工神经网络的训练过程中，每次反向传播后都会更新权重，以使每次迭代后的误差减小。这基于如上所述通过隐藏层修改的梯度。\n\
    \n设 $\\alpha$ 为*学习率*，这是一个实数，指定了在训练过程中更新权重时选择的修改量。使用公式 (2.14) 和 (2.16) 中的导数，权重将在每次迭代中按如下方式更新：\n\
    \n$$W_{new}^{(1)} = W^{(1)} - \\alpha \\frac{\\partial J}{\\partial W^{(1)}}$$\n\
    $$W_{new}^{(2)} = W^{(2)} - \\alpha \\frac{\\partial J}{\\partial W^{(2)}},$$\n\
    (2.17)\n\n其中，左侧带下标 *new* 的权重是该次迭代的更新值，而等式右侧是当前的权重值。更新权重后，会执行新的前向和反向传播。在每次迭代中，权重使用公式\
    \ (2.17) 和新的梯度进行更新。连续的权重更新有望减少人工神经网络输出的误差。训练持续进行，直到获得令人满意的微小误差或达到预定的迭代次数。\n\n\
    ## 2.8 带输入偏置的人工神经网络\n\n在实际问题中，调整权重以最小化输出误差需要在人工神经网络的每一层都使用偏置，如图 2.8 所示。偏置值类似于突触权重，首先被随机初始化。在训练过程中，它们被前向和反向传播，并在每次训练迭代中更新。附录\
    \ B 中介绍了在训练过程中使用输入偏置逐步推导更新偏置和权重值的过程。\n\n![](img/a83d807f9a9119b1472555c0ef55797e_38_0.png)\n\
    \n```\nset number of layers in ANN as NofLayers;\ninitialize random weights for\
    \ all links as W<sub>ANN</sub>;\ninitialized random bias for all layers as B<sub>ANN</sub>;\n\
    set number of epochs for training ANN as NofEpochs;\n\nfor i = 1 to NofEpochs\
    \ do\n    // forward propagation\n    for j = 1 to NofLayers do\n        for each\
    \ neuron in j do\n            multiply outputs from previous layer with weights;\n\
    \            add bias;\n            apply activation function;\n        end for\n\
    \    end for\n\n    // back propagation\n    for j = NofLayers to 1 do\n     \
    \   for each neuron j\n            calculate error of current weights;\n     \
    \       calculate gradient of current weights;\n        end for\n    end for\n\
    \    adjust W<sub>ANN</sub> and B<sub>ANN</sub> for epoch i;\nend for\n```\n\n\
    图 2.9 描述人工神经网络训练过程的简单算法。\n\n## 2.9 人工神经网络训练的简单算法\n\n图 2.9 展示了一个概述人工神经网络训练过程的简单算法。该算法首先定义人工神经网络的结构和用于训练的迭代次数（即前向和反向传播次数）。接下来，它为所有层初始化随机权重和偏置。对于每次迭代，它执行前向传播以产生人工神经网络的初步输出及其相关的误差或成本。前向传播后，它使用反向传播来计算误差和梯度，以调整权重和偏置值。此过程重复进行，直到达到最大迭代次数。\n\
    \n一旦权重值确定，训练好的人工神经网络就可以用于对新输入进行预测。不同的人工神经网络训练过程包括：\n\n- 监督训练：输入被映射到一组已知的输出信号 [32]。\n\
    - 无监督训练：这使用输入来形成数据分类 [33]。\n- 强化训练：这基于由适应度函数评估的新输入数据持续改进人工神经网络 [34]。\n\n## 2.10\
    \ 人工神经网络训练的计算复杂度\n\n训练的计算复杂度包括第 2.5、2.6 和 2.7 节中执行的所有操作。对于训练中可用的每个数据样本，这些操作在每次迭代中重复执行。如图\
    \ 2.5 所示，在第一个隐藏层中，每个神经元执行的求和与输入数量乘以连接数量成正比：由于隐藏层有 6 个传入连接到 3 个神经元，因此有 6 组乘法运算和\
    \ 3 次激活函数计算。对于单个输出层，有 3 个传入连接，因此有 3 次乘法运算和 3 次激活函数计算。设第 $i^{th}$ 层的连接数和神经元数分别为\
    \ $|W^{(i)}|$ 和 $|S^{(i)}|$。对于一般情况，对于前向传播，一个输入-输出样本的乘法运算和激活函数计算次数为\n\n$$cost_M^1\
    \ = \\sum_{i=1}^{H} |W^{(i)}||S^{(i)}|c_m \\quad cost_A^1 = \\sum_{i=1}^{H} |W^{(i)}||S^{(i)}|c_a,$$\n\
    \n其中 $c_m$ 和 $c_a$ 分别是乘法运算和激活函数计算的计算成本。为简单起见，假设对于给定的迭代，反向传播成本与前向传播成本相当。如果有 $|X|$\
    \ 个样本，则一次迭代的训练计算成本为\n\n$$cost_{ANN}^1 = 2|X| \\left( \\sum_{i=1}^{H} |W^{(i)}||S^{(i)}|(c_m\
    \ + c_a) \\right).$$\n\n对于 $N$ 次前向和反向传播迭代，训练成本变为\n\n$$cost_{ANN}^N = 2N|X| \\\
    left( \\sum_{i=1}^{H} |W^{(i)}||S^{(i)}|(c_m + c_a) \\right). \\tag{2.18}$$\n\n\
    使用 $\\mathcal{O}$ 符号表示计算复杂度的数量级 [35]，训练一个全连接人工神经网络（即所有神经元都与连续隐藏层中的所有其他神经元相连）的成本为\n\
    \n$$cost_{ANN}^N = \\mathcal{O}(N \\ |X| \\ H \\ |W| \\ |S|)(c_m + \\cdot c_a).\
    \ \\tag{2.19}$$\n\n考虑一个典型的数值应用，使用一个具有 $H = 32$ 层、每层 $S = 32$ 个神经元的全连接人工神经网络，使用\
    \ $X = 10^5$ 个数据样本进行 $N = 10^4$ 次迭代。使用公式 2.18，训练这样一个人工神经网络的计算成本为\n\n$$cost_{ANN}^{10^4}\
    \ = 2 \\cdot 10^4 \\cdot 10^5 \\left( \\sum_{i=1}^{32} 10^3(c_m + c_a) \\right)\
    \ = \\mathcal{O}(10^{13})(c_m + c_a).$$\n\n由于对于实际应用，训练可能需要使用数万个样本进行数百或数千次迭代，而人工神经网络具有数十个隐藏层，每层有数十个神经元，如果设计工程师没有意识到这些成本，计算复杂度可能会迅速变得大到不可行。\n\
    \n## 2.11 人工神经网络输入和输出的归一化\n\n对于输入和输出值之间存在数值不平衡的应用，可能会由于舍入、截断和类似类型的近似而导致计算不准确。为了缓解此类数值问题，通常将输入和输出按比例缩小（即归一化）到相对较小的整数范围内。归一化的一个示例如下：\n\
    \n$$\\overline{X}_i = \\frac{X_i - \\min(X)}{\\max(X) - \\min(X)}, \\quad \\overline{Y}_i\
    \ = \\frac{Y_i - \\min(Y)}{\\max(Y) - \\min(Y)},$$\n\n其中 $X_i$ 和 $\\overline{X}_i$\
    \ 分别是第 $i^{th}$ 个输入在归一化前后的值。类似地，$Y_i$ 和 $\\overline{Y}_i$ 分别是第 $i^{th}$ 个输出在归一化前后的值。根据应用的不同，输入在多个样本上分别进行归一化。类似地，单个输出在多个样本上的值也被归一化。如果一组输入具有相同的重要性级别，它们可以一起归一化。例如，如果输入值为正，我们可以使用\
    \ $\\min(X) = 0$。类似地，如果输出范围是 $[0, 100]$，我们有 $\\min(Y) = 0$ 和 $\\max(Y) = 100$。归一化是一种合理的做法，因为它试图防止计算中的精度问题，并有助于加速收敛到更好的解决方案\
    \ [36]。\n\n## 2.12 总结性评述\n\n本章概述了人工神经网络架构和训练过程的一般概念。人工神经网络是人工智能中最流行的工具之一，用于解决基于大量数据的问题。在人工神经网络中，给定的一组输入通过一组权重和激活函数进行修改，以生成与实验或事件中测量的真实数据点相匹配的输出。有一类问题适合用人工神经网络解决。例如，`分类问题`和图像识别任务是人工神经网络的绝佳候选。在此类应用中，通常有大量的输入，并且有相应的输出可用（通常样本大小从几十到几十万或更高）。一个称为`训练`的过程旨在找到权重值，使得输出的真实值和计算值之间的差异最小化（或在过程定义的限制内尽可能小）。\n\
    \n近年来已经开发了几种不同类型的人工神经网络。卷积神经网络（CNN）、循环神经网络（RNN）、大型语言模型（LLM）和 Transformer 是其中最受欢迎的几种。在\
    \ RNN 中（参见第 10 章和第 11 章），输出层的值被发送回隐藏层，用于信号的后续处理。使用 RNN 中的注意力机制，机器翻译任务变得可行，如第 12\
    \ 章和第 13 章所述。关于语言模型的一个很好的综述可以在 [37] 中找到。\n\n对具有挑战性的实际问题进行建模以通过人工神经网络解决，需要经验和工程学科的分析技能集。训练的计算复杂度随神经元数量和隐藏层数量的乘积而增长。因此，在为实际应用设计人工神经网络架构时，必须意识到训练的计算成本。\n\
    \n## 2.13 第 2 章练习题\n\n- 1) 如果图 2.6 中的人工神经网络有两个隐藏层，其性能会受到怎样的影响？\n- 2) 如果图 2.6 中的人工神经网络的学习率\
    \ $\\alpha$ 增加十倍，在通过减少输出误差收敛到可接受解方面，其性能会受到怎样的影响？\n- 3) 如果图 2.6 中的人工神经网络的学习率 $\\\
    alpha$ 减小十倍，在通过减少输出误差收敛到可接受解方面，其性能会受到怎样的影响？将你的答案与练习 2 进行比较。\n- 4) 考虑图 2.6 中的人工神经网络。假设神经元数量加倍。在通过减少输出误差收敛到可接受解方面，人工神经网络的性能将受到怎样的影响？"

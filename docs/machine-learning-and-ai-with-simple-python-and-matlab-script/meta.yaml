    \ / close [5 days ago]\n32 df.Momentum = df.Close./ lagmatrix(df.Close, short_window);\n\
    33 std_vals = movstd(df.Close, short_window, 'Endpoints', 'discard');\n34 % calculate\
    \ the standard deviation of SMA over a rolling window\n35 % set degree of freedom\
    \ to zero to get the population std\n36 df.STD = padarray(std_vals, [short_window-1\
    \ 0], NaN, 'pre');\n37 % calculate the Bollinger Band for each day\n38 % BB >\
    \ 1 means the closing price is above the upper band\n39 % BB < -1 means the closing\
    \ price is below the lower band\n40 df.BB = (df.Close - df.SMA)./ (2 * df.STD);\n\
    41 \n42 % calculate the percent change of closing price for each day\n43 % shift(1)\
    \ means yesterday (applies to each element of df)\n44 increase = df.Close - lagmatrix(df.Close,\
    \ 1);\n45 % shift percent change to the previous day so that it now represents\

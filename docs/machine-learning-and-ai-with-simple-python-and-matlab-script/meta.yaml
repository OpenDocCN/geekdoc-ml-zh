    Chapter 5 introduces the reader to AI applications in the life sciences. A simple
    case study is presented, where medical data collected from Alzheimer’s disease
    (AD) patients are used to train an ANN which exploits a possible relationship
    between expressions of AD-related genes and cognitive exam scores. This ANN then
    can be deployed as a tool to predict personalized disease progression for new
    patients.


    Chapter 6 presents a natural language processing (NLP) application, where an ANN
    is set up to explore a possible relationship between the tweets from a former
    president of the USA and financial assets listed in public markets. ANN inputs
    include keywords extracted from tweets and daily financial stock market data,
    and the output is the predicted price change for the following day.


    In Chapter 7, we introduce the main concepts governing the operations and capabilities
    of convolutional neural networks (CNNs). These are ideal for identification (or
    classification) of multi-dimensional inputs such as images and speech. We study
    the steps of training a CNN and modification of weights for more accurate predictions.
    Chapters 8 and 9 present two very popular applications of CNNs, namely optical
    character recognition (OCR) and speech recognition, respectively. For each chapter,
    simple but illustrative CNNs are implemented in Python and Matlab scripts.


    Recurrent neural networks (RNNs), which are the building blocks of language-related
    applications, are introduced in Chapter 10. RNNs are fundamentally different to
    ANNs and CNNs because RNNs can handle a sequence of inputs, where prior inputs
    have an impact on future outputs. This capability of possessing a memory of previous
    inputs make RNNs a vital part of applications such as chatbots and machine translation.
    Training process for RNNs including forward and back propagation operations is
    described in detail. Chapter 11 presents a simplistic chatbot architecture, which
    is then implemented in Python and Matlab scripts. This chatbot is trained with
    a few hundred text message exchanges taken from the internet and demonstrates
    limited attempts in generating responses for original user queries within the
    same dictionary of words.


    In Chapter 12, the RNN with attention mechanism (RNN-Att) is introduced, which
    makes use of historical inputs in an even more pronounced manner. For example,
    in natural language translation, one has to wait until a sentence is complete
    before translating it to another language since even the last words in a sentence
    may affect the translation significantly. We study the training process, weight
    updating and reduction of error through forward and back propagation operation
    in an RNN-Att. In Chapter 13, we present a simplistic RNN-Att architecture for
    machine translation and its implementation in Python and Matlab scripts. The example
    translator is trained using a few thousand German sentences and their English
    translations, and then demonstrates a remarkable capacity to attempt translating
    new German sentences into English (using only the words in the training dictionary).



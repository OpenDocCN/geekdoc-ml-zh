    # Appendix B


    # Sleep Study ANN with Bias


    # B.1 Inclusion of Bias Term in ANN


    Including the bias input into a simple ANN, we have the ANN shown in Figure B.1.

    A neuron with bias for back propagation is shown in Figure B.2.


    $$J = \frac{1}{2}(y - \hat{y})^2$$


    The partial derivative of $J$ with respect to $b$ is


    $$\frac{\partial J}{\partial b} = -(y - \hat{y})\frac{\partial \hat{y}}{\partial
    b} = -(y - \hat{y})\frac{\partial \hat{y}}{\partial e}\frac{\partial e}{\partial
    b}.$$


    For $\delta = -(y - \hat{y})f''(e)$, we have


    $$\frac{\partial J}{\partial b} = \delta \cdot 1 = \delta.$$


    # B.1.1 Inclusion of Bias in Matrices


    Suppose there are $k$ different bias values, one for each neuron at layer $i$
    with $k$ neurons:


    $$b^{(i)} = [b_1 \ b_2 \ \cdots \ b_k].$$


    For $n$ samples, the dimensions of the bias matrix become the number of samples
    by the number of neurons at layer $i$:


    $$b^{(i)} = \begin{bmatrix} b_1 & b_2 & \cdots & b_k \ b_1 & b_2 & \cdots & b_k
    \ \vdots & \vdots & \ddots & \vdots \ b_1 & b_2 & \cdots & b_k \end{bmatrix}.$$


    $B^{(i)}$ has $n$ rows, each with $k$ elements. At each row $a$, the $j^{th}$
    element is the same, ending up with each column of $B^{(i)}$ having the same values
    of bias as shown above. Similarly, for the $\delta$ values, we have the following
    matrix:


    $$\delta^{(i)} = \begin{bmatrix} \delta_1 & \delta_2 & \cdots & \delta_k \ \delta_1
    & \delta_2 & \cdots & \delta_k \ \vdots & \vdots & \ddots & \vdots \ \delta_1
    & \delta_2 & \cdots & \delta_k \end{bmatrix}.$$


    For the $mean(\delta^{(i)})$, a matrix can be defined as:


    $$mean(\delta^{(i)}) = [mean(\delta^{(1)}) \ mean(\delta^{(2)}) \ \cdots \ mean(\delta^{(k)})].$$'

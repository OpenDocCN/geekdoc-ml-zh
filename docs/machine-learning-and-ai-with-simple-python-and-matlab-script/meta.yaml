    \ -> 5 -> 5+1 -> 西南\ndisplacement_vectors = [[0, 1]; [1/sqrt(2), 1/sqrt(2)]; ...\n\
    \                        [1, 0]; [1/sqrt(2), -1/sqrt(2)]; ...\n              \

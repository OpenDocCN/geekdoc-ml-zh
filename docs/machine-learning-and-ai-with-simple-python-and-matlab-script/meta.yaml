    ## 11 用于聊天机器人实现的循环神经网络


    ### 11.1 引言


    艾伦·图灵于1950年提出的模仿游戏[2]指出，如果一台机器（例如计算机）能够使用普通人会使用的词语来回答任何问题，那么我们就可以称这台机器是智能的。图灵测试[97]正是基于这个游戏，其目标是判断机器提供的答案是否与人类的答案无法区分。图灵测试中，机器试图模仿人类，这被认为是定义人工智能的最早尝试之一，尽管对于此类问题的回答是否需要真正的智能（而非仅仅基于先前对话的简单搜索技术）仍存在争议。


    该实验的现代实现会采用聊天机器人[98]，这是一种通过自然语言交互（例如文本或语音）来模拟与人类对话的程序[99, 100]。当前的聊天机器人通常是在线的，能够基于用户提供的输入刺激，用自然语言维持对话。近年来，聊天机器人已发展到可能在许多专业环境中取代人类，从而产生重大的社会影响，包括应答服务和客户服务运营。


    在本章中，我们将介绍一个基于第10章引入的RNN的简单聊天机器人的实现。对于其他AI工具（如人工神经网络ANN和卷积神经网络CNN）来说，这是一个相当困难的问题，因为它们不寻找输入序列不同元素之间的时间关联，而是专注于当前的输入/输出对，而不考虑先前应用的输入及其相应的输出（即它们缺乏隐藏状态）。聊天机器人实现的另一个难点是输入和输出序列长度之间的不对称关系。例如，用户向一个模仿个人助理的聊天机器人输入“今天下午天气怎么样？”，可能会生成“将会多云且凉爽”的回复；而较短的输入“今天会下雨吗？”可能会生成长度不同的输出，例如“是的，很有可能”。能够处理可变长度输入序列并生成可变长度输出序列的RNN被称为多对多RNN
    [87]，将在下面的11.2节中研究。使用多对多RNN实现简单聊天机器人的Python和Matlab脚本分别在11.4节和11.5节中给出。


    ### 11.2 多对多RNN架构


    聊天机器人等应用需要RNN以特殊方式运行，如下所述。在用户完成输入序列 $X_1, \cdots, X_{k-1}$ 之前，RNN不会生成任何外部输出，而只计算其隐藏状态
    $h_1, \cdots, h_{k-1}$。在第 $k$ 步，用户输入 $X_k$ 作为序列的最后一个输入，RNN为其生成输出 $\hat{Y}_k$。在第
    $(k + 1)$ 步，该输出 $\hat{Y}_k$ 被反馈回RNN作为输入 $X_{k+1}$，以生成输出 $\hat{Y}_{k+1}$。类似地，在第
    $(k + 2)$ 步，$\hat{Y}_{k+1}$ 被作为输入 $X_{k+2}$ 应用于RNN，依此类推。通常，RNN开始生成输出的输入 $X_k$
    是一个特殊的输入字符，例如序列结束指示符。图11.1展示了一个具有多个隐藏层的多对多RNN示例，其中在用户于第 $k$ 步完成输入序列之前不生成任何输出，之后生成外部输出并将其作为输入反馈回RNN（即输出
    $\hat{Y}_k, \hat{Y}_{k+1}, \cdots$ 分别作为输入 $X_{k+1}, X_{k+2}, \cdots$ 应用于RNN）。


    ![Figure 11.1](img/a83d807f9a9119b1472555c0ef55797e_197_0.png)


    **图11.1** 用于聊天机器人实现的具有多个隐藏层的多对多RNN，其中在用户于第 $k$ 步完成输入序列 $x_1, \cdots, x_k$ 之前不生成任何输出，之后生成外部输出并将其作为输入反馈回RNN（即输出
    $\hat{y}_k, \hat{y}_{k+1}, \cdots$ 分别作为输入 $x_{k+1}, x_{k+2}, \cdots$ 应用于RNN）。


    ### 11.3 一个简单的聊天机器人


    在本章中，我们使用一个采用隐藏层和嵌入层的多对多RNN来实现一个简单的聊天机器人。该聊天机器人将使用从互联网上获取的500个样本查询和响应对进行训练，这些样本包含565个唯一单词。对于真实的聊天机器人实现，将需要数千万对数据。图11.2显示了用于训练RNN的样本数据子集，包含查询和响应。在训练数据中，用户查询给出如下：


    ```

    <start> hi, how are you doing ? <end>

    ```


    样本数据为其定义的响应为：


    ```

    <start> I am fine. how about yourself ? <end>

    ```


    其中，特殊词（或标记）<start> 和 <end> 被添加到每个样本中，以分别指示每个查询和响应对的开始和结束。借助这些特殊标记，RNN将知道当它在用户查询中读取
    <start> 时，它开始生成隐藏状态而不产生外部输出，直到读取 <end>，之后RNN开始生成外部输出，并将每个输出用作下一步的输入，如前所述。一旦RNN生成包含
    <end> 的单词输出，它就停止生成输出。RNN训练完成后，用户可以输入任意查询，只要它们仅包含字母表中存在的单词。例如，以下用户查询不在训练数据中：


    <start> how was your day today ? <end>


    对于此用户查询，11.4节中Python脚本实现的RNN生成以下响应，该响应也不在训练数据使用的任何查询中：


    <start> i am a movie ?. <end>


    当然，该响应在语义上没有任何意义，因为我们使用了非常少的数据样本，并且仅训练了RNN几个轮次；然而，值得注意的是，这个简单的RNN示例能够处理独特的查询并生成独特的响应。显然，如果我们使用数百万个数据样本并训练RNN数万个轮次，响应将显著改善。



    ## 10.2.2 Forward and Back Propagation


    It is time to demonstrate the operations when an input is applied to the one-to-one
    single cell RNN given in Figures 10.2a and b using our simple example alphabet
    of $I = \{\mathbf{h}, \mathbf{e}, \mathbf{1}, \mathbf{o}\}$. Suppose a sequence
    of input characters $x_1, x_2, \cdots$ is applied to the RNN. For a user input
    $x_t$ at time $t$, the RNN computes a hidden state as follows:


    $$h_t = \tanh(U \cdot x_t + W \cdot h_{t-1} + b).$$


    As shown in Figures 10.2a and b, the raw output before the softmax unit, $\Omega_t$,
    is computed as


    $$\Omega_t = V \cdot h_t + c.$$


    Recall from Eqn. (10.1) that the softmax unit converts elements of $\Omega_t$
    to probability values between 0 and 1 and assigns these to $\hat{y}_t$:


    $$\hat{y}_t = \frac{e^{\Omega_t}}{\sum_{j=1}^{|I|} e^{\Omega_{t,j}}},$$


    where $\Omega_{t,j}$ represents the $j^{th}$ element of the $\Omega_t$ vector.
    Cross-entropy loss $L$ [93] is an entity defined to represent the difference between
    the RNN prediction and the real output value. For the prediction $\hat{y}_t$ at
    step $t$, $L$ is computed as


    $$L_t = -y_t^o \ln(\hat{y}_t),$$


    where $y_t^o$ is the one-hot encoded value of the target (i.e. correctly predicted)
    output. For an input sequence of length $\mathcal{T}$, the total loss after $\mathcal{T}$
    steps becomes


    $$L = \sum_{t=1}^{\mathcal{T}} L_t.$$


    In order to minimize the loss $L$ in Eq. (10.7), its gradients with respect to
    RNN parameters such as $U, W, V, b$ and $c$ must be computed. Computation of gradients
    corresponds to a back-propagation operation starting from the predicted output
    back to the input, each step performed by a partial derivation. Step-by-step derivations
    of these gradients are presented in Appendix D. We strongly encourage the reader
    to go over this material to understand the actions taken to train an RNN. The
    partial derivatives of $L$ with respect to the weights are as follows:


    $$\frac{\partial L_t}{\partial \Omega_t} = (\hat{y}_t - y_t^o)$$


    $$\frac{\partial L}{\partial V} = \sum_{t=1}^{\mathcal{T}} (\hat{y}_t - y_t^o)
    \cdot h_t^\top$$


    $$\frac{\partial L}{\partial c} = \sum_{t=1}^{\mathcal{T}} (\hat{y}_t - y_t^o)$$


    $$\frac{\partial L}{\partial W} = \sum_{t=1}^{T} \left( \sum_{k=1}^{t} (\hat{y}_t
    - y_t^o) V^\dagger \left( \prod_{j=k}^{t-1} W^\dagger (1 - h_{j+1}^2) \right)
    (1 - h_k^2) h_{k-1} \right)$$ (10.11)


    $$\frac{\partial L}{\partial U} = \sum_{t=1}^{T} \left( \sum_{k=1}^{t} (\hat{y}_t
    - y_t^o) V^\dagger \left( \prod_{j=k}^{t-1} W^\dagger (1 - h_{j+1}^2) \right)
    (1 - h_k^2) x_k \right)$$ (10.12)


    $$\frac{\partial L}{\partial b} = \sum_{t=1}^{T} \left( \sum_{k=1}^{t} (\hat{y}_t
    - y_t^o) V^\dagger \prod_{j=k}^{t-1} \left( W^\dagger (1 - h_{j+1}^2) \right)
    (1 - h_k^2) \right),$$ (10.13)


    where $\dagger$ represents the matrix transpose operation. Using these gradients,
    values of the $U$, $W$, $V$, $b$ and $c$ matrices are updated after a back propagation
    by subtracting the current value scaled by a learning rate of $\eta$ (similar
    to the learning rate $\alpha$ used in ANNs in Chapter 2):


    $$V_{new} = V - \eta \frac{\partial L}{\partial V}$$ (10.14)


    $$c_{new} = c - \eta \frac{\partial L}{\partial c}$$ (10.15)


    $$W_{new} = W - \eta \frac{\partial L}{\partial W}$$ (10.16)


    $$U_{new} = U - \eta \frac{\partial L}{\partial U}$$ (10.17)


    $$b_{new} = b - \eta \frac{\partial L}{\partial b},$$ (10.18)


    where subscript $new$ is used to represent the updated parameter values. Since
    these parameters are updated by using gradients of loss $L$, it is expected that
    the next forward propagation using the updated parameters will yield a smaller
    loss. This is demonstrated in the numerical example presented below.


    ## 10.3 A Numerical Example


    Recall the simple alphabet of four characters: $I = \{\mathbf{h}, \mathbf{e},
    \mathbf{1}, \mathbf{o}\}$. One-hot encodings of each character in $I$ are


    $$\mathbf{h}^o : [1, 0, 0, 0]^\dagger \quad \mathbf{e}^o : [0, 1, 0, 0]^\dagger
    \quad \mathbf{1}^o : [0, 0, 1, 0]^\dagger \quad \mathbf{o}^o : [0, 0, 0, 1]^\dagger,$$


    where $\dagger$ represents the matrix transpose operation. Suppose the initial
    values for $U$, $W$, $V$, $b$ and $c$ are randomly assigned as follows:


    $$U = [0.144 \ -0.232 \ -0.669 \ 1.159] \quad W = [-0.587] \quad b = [0]$$

    $$V = [-0.225 \ -0.305 \ 0.491 \ 0.277]^\dagger \quad c = [0 \ 0 \ 0 \ 0]^\dagger.$$


    Let us now apply the sequence of inputs $\mathbf{h}$, $\mathbf{e}$, $\mathbf{1}$
    and $\mathbf{1}$, with the expectation that the RNN will generate predictions
    of $\mathbf{e}$, $\mathbf{1}$, $\mathbf{1}$ and $\mathbf{o}$, respectively, as
    presented in Table 10.1. Since we expect our simple RNN to generate a single character
    output at a time as part of completing the word **hello**, when the user applies
    the input character $x_1 = \mathbf{h}$, the RNN is expected to generate $\mathbf{e}$.
    One-hot encoding for this input is


    $$x_1^o = [1, 0, 0, 0]^\dagger.$$


    For input $x_1 = \mathbf{h}$, using Eq. (10.3), hidden state $h_1$ is computed
    as follows:


    $$h_1 = \Theta_h(U \cdot x_1 + W \cdot h_0 + b)$$

    $$= \tanh \left( \begin{bmatrix} 0.144 & -0.232 & -0.669 & 1.159 \end{bmatrix}
    \cdot \begin{bmatrix} 1 \ 0 \ 0 \ 0 \end{bmatrix} + [-0.587] \cdot [0] + [0] \right)$$

    $$= [0.143].$$


    From Eq. (10.4), we obtain raw output values as follows:



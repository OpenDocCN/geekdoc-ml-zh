- md: "## 9.5 Matlab Script for Speech Recognition Using a CNN\n\nA sample Matlab\
    \ script is presented below, which implements a simple CNN with the architecture\
    \ shown in Figure 9.2 constructed for speech recognition. This implementation\
    \ uses a similar structure to the Python script presented in Section 9.4 for ease\
    \ of comparison for the reader. The audio files for training and reference pronunciations\
    \ are assumed to have been created and stored in `TrainingSet` and `ReferenceSet`\
    \ folders and their sub-folders as defined above.\n\nIn the Matlab script below,\
    \ in lines 14–16, the user is prompted to either train a new CNN or load a previously\
    \ trained and saved one. If training a new CNN is chosen by entering 1, the function\
    \ named `cnn_train` is called in line 21:\n\n```\ncnn_trained = CNN_Train(train_dir);\n\
    ```\n\nwhere `train_dir` is a pointer containing the address of the `TrainingSet`\
    \ folder. A new CNN is created by `CNN_train`, which is then saved in an object\
    \ named `cnn_trained`. If the user wants to use a previously trained CNN, this\
    \ is loaded into `cnn_trained` in lines 30 and 31:\n\n```\ncnn_trained = load_data.cnn_trained;\n\
    ```\n\nAfter setting the recording parameters such as sampling and bit-per-sample\
    \ rates and recording duration in lines 47–50, the user is prompted to say a phrase\
    \ into the microphone of the device, which is recorded as an object named `recObj`\
    \ in lines 51–53. This recording is first played back in line 59, and, in lines\
    \ 64–83, the user is asked to select a target language into which the phrase will\
    \ be translated. In line 85, `CNN_predict` is called:\n\n```\ncnn_prediction =\
    \ CNN_Predict(recObj, cnn_trained);\n```\n\nwhere `cnn_prediction` contains the\
    \ location of the prediction, which is then played back in the user-selected language\
    \ in line 90. Finally, in lines 96–100, the user is asked whether the trained\
    \ CNN is to be saved for later use.\n\n```\n% The City College of New York, City\
    \ University of New York\n% Written by Ricardo Valdez\n% August, 2020\n% Speech\
    \ Recognition and Translator System using CNNs\nclc;\nclear;\n% select training\
    \ directory\ntrain_dir = 'TrainingSet';\n% select reference directory\nref_dir\
    \ = 'ReferenceSet';\n\nmessage = sprintf('WELCOME TO UNIVERSAL TRANSLATOR. MAKE\
    \ YOUR SELECTION:');\ndisp(message);\ndisp('Enter 1 to train a new CNN');\ndisp('Enter\
    \ 2 to load an existing CNN');\nuser_entry = input('Enter your choice: ');\n\n\
    if (user_entry == 1)\n    % train a new CNN:\n    disp('Be patient until statistics\
    \ are displayed...');\n    cnn_trained = CNN_Train(train_dir);\n    input('CNN\
    \ training is complete. Press enter to start using CNN.\\n');\nelseif (user_entry\
    \ == 2)\n    % use an existing CNN:\n    cnn_file = input('Enter CNN name (dont\
    \ forget .mat extension): ', 's');\n    cnn_path = pwd;\n    disp(cnn_file);\n\
    \    try\n        % load the CNN and assign it to cnn_trained\n        load_data\
    \ = load(fullfile(cnn_path,cnn_file));\n        cnn_trained = load_data.cnn_trained;\n\
    \    catch\n        disp('Enter a valid file name next time... Leaving... Bye');\n\
    \        return;\n    end\nelse\n    disp('Enter a valid choice next time... Leaving...\
    \ Bye');\n    return;\nend\n\n% Now there is a trained CNN loaded (either a new\
    \ one or an existing one).\n% Use trained CNN to make predictions:\ninput('PRESS\
    \ ENTER AND IMMEDIATELY SAY A WORD INTO YOUR MICROPHONE');\ndisp('Recording...');\n\
    \n% setup recording parameters for microphone\nsample_rate = 16000;\nbits_per_sample\
    \ = 8;\nnoof_channels = 1;\nrecording_duration = 2;\n\n% create the object that\
    \ performs recording:\nrecObj = audiorecorder(sample_rate, bits_per_sample, noof_channels);\n\
    % recording now:\nrecordblocking(recObj, recording_duration);\n\n% playback the\
    \ voice recorded:\ndisp('Replaying recording...');\nplay(recObj);\nrecording_duration\
    \ = recObj.TotalSamples / recObj.SampleRate;\npause(recording_duration);\n\n%\
    \ read languages from reference directory and store them into a list\ndirectories\
    \ = dir(ref_dir);\nlanguages = {};\nfor i = 1:length(directories)\n    directory\
    \ = directories(i);\n    if directory.isdir && ~strcmp(directory.name,...\n  \
    \          '.') && ~strcmp(directory.name,'..')\n        % append languages with\
    \ directory.name\n        languages{length(languages)+1} = directory.name;\n \
    \       fprintf('Enter %d for %s\\n', length(languages), directory.name);\n  \
    \  end\nend\ntry\n    % select translation output language\n    user_input = input('What\
    \ is your language choice: ');\n    output_lang = languages{user_input};\n   \
    \ fprintf('You selected %s as the output language.\\n', output_lang);\ncatch\n\
    \    fprintf('Your selection is out of bounds... Leaving... Bye\\n');\n    return;\n\
    end\n% CNN predicts the translation\ncnn_prediction = CNN_Predict(recObj, cnn_trained);\n\
    full_ref_path = fullfile(ref_dir, output_lang, char(cnn_prediction));\ntry\n \
    \   % ads: audio data store is an object that holds audio files\n    ref_ads =\
    \ audioDatastore(full_ref_path);\n    PlayBack_Translation(recObj, ref_ads);\n\
    catch\n    fprintf('translation for %s is not available in %s\\n',output_lang,\
    \ ...\n        char(cnn_prediction));\nend\nuser_entry = input('Do you want to\
    \ save CNN? (y/n) ','s');\nif(user_entry == 'y')\n    file_name = input('Enter\
    \ file name (do not forget .mat extension): ',...\n        's');\n    save(file_name,\
    \ 'cnn_trained');\nelse\nend\ndisp('Have a predictably nice day!');\n```\n\nA\
    \ sample implementation of the CNN_Predict function that generates a prediction\
    \ by the trained CNN is presented below. The inputs of this function are the recorded\
    \ user input, data sample rate, trained CNN object and address of the TrainingSet\
    \ folder. After setting up audio parameters in lines 18–22, a spectrogram is computed\
    \ for the user input audio in lines 26–29 and saved in the X_test object. Using\
    \ the trained CNN, a prediction for this input is generated in line 31:\n\n```\n\
    predictions = model.predict(X_test)\n```\n\nwhere the object named predictions\
    \ contains the probabilities for all CNN outputs. The index for the output with\
    \ the maximum probability is obtained in line 32:\n\n```\npredicted_class = np.argmax(predictions,\
    \ axis=1)[0]\n```\n\nwhich is then used to select the audio files in the TrainingSet\
    \ folder.\n\n```\nimport os\nimport numpy as np\nimport soundfile as sf\nfrom\
    \ Speech_Spectrograms import speech_spectrograms\n\n# CNN_Predict: Use CNN to\
    \ predict the word\ndef CNN_Predict(rec_data, sample_rate, model, audio_files):\n\
    \n    # Save audio data to a temporary file\n    temp_file = \"temp.wav\"\n  \
    \  sf.write(temp_file, rec_data, sample_rate)\n\n    # Compute the mel-spectrogram\
    \ from the audio data\n    # set audio parameters\n    # Duration of the entire\
    \ recording\n    segment_duration = len(rec_data) / sample_rate\n    frame_duration\
    \ = 0.025\n    hop_duration = 0.010\n    num_bands = 40\n    epsil = 1e-6\n\n\
    \    # compute speech spectrograms, they will be the inputs\n    # to the CNN\n\
    \    X_test = speech_spectrograms([temp_file], segment_duration,\n           \
    \                     frame_duration, hop_duration, num_bands)\n    X_test = np.log10(X_test\
    \ + epsil)\n    X_test = np.expand_dims(X_test, axis=-1)\n    # Use the model\
    \ to predict the class\n    predictions = model.predict(X_test)\n    predicted_class\
    \ = np.argmax(predictions, axis=1)[0]\n\n    # Delete the temporary file\n   \
    \ os.remove(temp_file)\n\n    return audio_files[predicted_class]\n```\n\nA sample\
    \ Python implementation of the `speech_spectrograms` function is given below,\
    \ which computes the spectrograms for audio files. Input parameters for this function\
    \ include the address of the folder where the audio files are stored and audio\
    \ file characteristics such as the segment and frame durations used in the audio\
    \ recordings.\n\n```\nimport librosa\nimport numpy as np\n\ndef speech_spectrograms(files,\
    \ segment_duration, frame_duration,\n                        hop_duration, num_bands,\
    \ sr=16000):\n    print(\"Computing speech spectrograms...\")\n\n    hop_length\
    \ = int(hop_duration * sr)\n\n    all_spectrograms = []\n\n    # 1. Calculate\
    \ the spectrograms for all files\n    for file in files:\n        y, _ = librosa.load(file,\
    \ sr=sr)\n        mel_spec = librosa.feature.melspectrogram(y=y, sr=sr, n_fft=512,\n\
    \                                                  hop_length=hop_length, n_mels=num_bands)\n\
    \        all_spectrograms.append(mel_spec)\n\n    # 2. Determine the maximum width\
    \ among all spectrograms\n    max_width = 419\n\n    final_spectrograms = []\n\
    \n    # 3. Pad each spectrogram to the maximum width\n    for i, mel_spec in enumerate(all_spectrograms):\n\
    \        spec_width = mel_spec.shape[1]\n        left = (max_width - spec_width)\
    \ // 2\n        padded_spec = np.zeros((num_bands, max_width))\n\n        # Diagnostic\
    \ information\n\n        try:\n            padded_spec[:, left:left + spec_width]\
    \ = mel_spec\n        except ValueError as e:\n            print(f\"Error while\
    \ processing file {files[i]}: {e}\")\n            continue\n\n        final_spectrograms.append(padded_spec)\n\
    \n        if (i + 1) % 1000 == 0:\n            print(f\"Processed {i + 1} files\
    \ out of {len(files)}\")\n\n    print(\"...done\")\n\n    return np.array(final_spectrograms)\n\
    ```\n\n```python\nlayers.BatchNormalization(),\nlayers.Activation('relu'),\nlayers.MaxPooling2D((3,\
    \ 3), padding='same', strides=(2, 2)),\n\nlayers.Conv2D(48, (3, 3), padding='same'),\n\
    layers.BatchNormalization(),\nlayers.Activation('relu'),\n\nlayers.Conv2D(48,\
    \ (3, 3), padding='same'),\nlayers.BatchNormalization(),\nlayers.Activation('relu'),\n\
    layers.MaxPooling2D((1, 13)),\n\nlayers.Flatten(),\nlayers.Dense(num_classes,\
    \ activation='softmax')\n])\n\n# Compile the model\nmodel.compile(optimizer='adam',\n\
    \              loss='sparse_categorical_crossentropy',\n              metrics=['accuracy'])\n\
    \n# train the CNN\nmodel.fit(X_train, Y_train, epochs=50, batch_size=32, shuffle=True)\n\
    \nreturn model, audio_files\n```"
  mdcn: "## 9.5 用于语音识别的CNN的Matlab脚本\n\n下面展示了一个示例Matlab脚本，它实现了一个简单的CNN，其架构如图9.2所示，专为语音识别而构建。此实现使用了与第9.4节中介绍的Python脚本类似的结构，以便读者进行比较。用于训练和参考发音的音频文件被假定已创建并存储在`TrainingSet`和`ReferenceSet`文件夹及其子文件夹中，如上文所定义。\n\

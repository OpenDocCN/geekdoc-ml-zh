    A sample implementation for the speech_Spectrograms function is presented below.
    It computes the spectrograms for a the audio file(s) that is (are) passed to it.
    Inputs to this function include a reference to the folder where the audio file
    is stored and the audio characteristics of the file, such as segment and frame
    durations.


    ```

    1  % speechSpectrograms(ads,segmentDuration,frameDuration,hopDuration,numBands)

    2  % computes speech spectrograms for the files in the datastore ads.

    3  % segmentDuration is the total duration of the speech clips (in seconds),

    4  % frameDuration the duration of each spectrogram frame, hopDuration the

    5  % time shift between each spectrogram frame, and numBands the number of

    6  % frequency bands.

    7  function X = speechSpectrograms(ads,segmentDuration,frameDuration,...

    8      hopDuration,numBands,fs)

    9

    10 disp("Computing speech spectrograms...");

    11

    12 %fs         = 16e3;

    13 FFTLength = 512;

    14 persistent filterBank

    15 if isempty(filterBank)

    16     filterBank = designAuditoryFilterBank(fs,''FrequencyScale'',''mel'',...

    17                                         ''FFTLength'',FFTLength,...

    18                                         ''NumBands'',numBands,...

    19                                         ''FrequencyRange'',[50,7000]);

    20 end

    21 numHops = ceil((segmentDuration - frameDuration)/hopDuration);

    22 numFiles = length(ads.Files);

    23 X = zeros([numBands,numHops,1,numFiles],''single'');

    24 for i = 1:numFiles

    25

    26     x = read(ads);

    27

    28     frameLength = round(frameDuration*fs);

    29     hopLength = round(hopDuration*fs);

    30

    31     [~,~,~,spec] = spectrogram(x,hann(frameLength,''periodic''),...

    32         frameLength - hopLength,FFTLength,''onesided'');

    33     spec = filterBank * spec;

    34

    35     % If the spectrogram is less wide than numHops, then put spectrogram in

    36     % the middle of X.

    37     w = size(spec,2);

    38     left = floor((numHops-w)/2)+1;

    39     ind = left:left+w-1;

    40     X(:,ind,1,i) = spec;

    41

    42     if mod(i,1000) == 0

    43         disp("Processed " + i + " files out of " + numFiles)

    44     end

    45 end

    46 disp("...done");

    47 end

    ```'

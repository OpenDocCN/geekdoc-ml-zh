    \ line 22, a function defined in the gps library called `generate_distance_matrix`\
    \ is invoked to compute the connectivity matrix for the cities. Chromosome length\
    \ is defined as the number of cities in line 25. In lines 32 to 50, the chromosome\
    \ and population are defined for use later by the GA implementation in the Python\
    \ library. In lines 53 to 62, the fitness function is implemented as a loop adding\
    \ the cities' distances as presented in the connectivity matrix. The fitness value\
    \ includes the distance for the return journey from the last city to the start\
    \ in line 56. Crossover, mutation and selection operators are defined in lines\
    \ 69, 72 and 75, respectively. The GA implementation in Python has the following\
    \ format:\n\n```\nalgorithms.eaSimple(pop, toolbox, xoProb, mutProb, gens, selectCrit)\n\
    ```\n\nwhere `pop`, `toolbox`, `xoProb`, `mutProb`, `gens` and `selectCrit` are\
    \ the population, Python library name, crossover probability, mutation probability,\
    \ number of generations and selection criteria, respectively. Therefore, the call\
    \ to invoke the GA in line 84 becomes\n\n```\nalgorithms.eaSimple(pop, toolbox,\
    \ 0.7, 0.2, 40, halloffame=best_genome)\n```\n\nwhere `halloffame` is identified\
    \ as the best genome to be selected. In lines 103 to 156, the best solution is\
    \ plotted on a map.\n\nNote that a regular crossover operator for GA-based TSP\
    \ implementation may be problematic if it is not designed carefully. It is possible\
    \ that a pair of valid chromosomes may generate invalid offspring after the crossover\
    \ operator is applied. For example, consider the parent chromosomes shown in Figure\
    \ 17.12a defined as [1 2 3 4 5] and [3 2 1 5 4]. Suppose crossover will be applied\
    \ after the top two most significant positions. In this case, the offspring will\
    \ be [1 2 1 5 4] and [3 2 3 4 5], which are invalid since there are duplicate\
    \ cities in both cases. A crossover operation where the codons of an offspring\
    \ are generated as permutations of the parent codons is implemented in line 69\
    \ as\n\n```\ntoolbox.register(\"mate\", cxPartiallyMatched)\n```\n\nwhere partially\
    \ matched (or mapped) crossover [131] is implemented with two crossover points\
    \ as shown in Figure 17.12b. First the middle sections of parents 1 and 2 are\
    \ copied into offspring 2 and 1, respectively, which defines a mapping as: 3 ⇔\
    \ 2, 4 ⇔ 6, and 5 ⇔ 1. Then, based on this mapping, the most significant two bits\
    \ of parent 1 (i.e. 1 and 2) are mapped into offspring 1 as bits 5 and 3. Similarly\
    \ the least significant bit of parent 1 (i.e. 6) is mapped into offspring 1 as\
    \ bit 4. Offspring 2 is obtained in the same manner.\n\nFigure 17.13 (a) Mutation\
    \ operator generates an invalid offspring with duplicated cities, and (b) shuffling\
    \ indices for mutation preserves the validity of an offspring.\n\nA similar concern\
    \ is also present for the mutation operator. If it is implemented without special\
    \ care, a mutated offspring may be invalid. Consider the example in Figure 17.13a,\
    \ where an offspring defined as [ 1 2 3 4 5 ] will be mutated at the second most\
    \ significant position. By replacing this codon randomly (e.g. from 2 to 4), an\
    \ offspring may end up as [ 1 4 3 4 5 ], which is invalid since there is a duplicate\
    \ codon value. However, implementing mutation as shuffling two codons will always\
    \ preserve the validity of an offspring. In Figure 17.13b, mutation operator selects\
    \ two codons and shuffles them, resulting in a mutated but valid offspring. This\
    \ mutation operator that shuffles the codon values is implemented in line 72 as\n\
    \n```\ntoolbox.register(\"mutate\", mutShuffleIndexes, indpb=0.05)\n```\n\nwhich\
    \ indicates that the mutation operator is to be executed with a probability of\

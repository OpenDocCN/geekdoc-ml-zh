- img_proc: true
  md: 'many aspects that influence operation of a drone and the types of tasks that
    it can perform. Flight control algorithms must be designed such that these hardware
    limitations are taken into account to fully utilize UAV capabilities in a diverse
    set of operations.


    Let us also consider the environmental conditions in which small UAV swarms commonly
    operate. MANETs are typically deployed for applications with severe restrictions
    in communication, power and knowledge. Dynamically and rapidly changing operational
    conditions make topology control tasks even more challenging for swarms of autonomous
    UAVs using MANETs:


    +   - Each UAV makes movement decisions independently and without humans.

    - The UAVs have limited power and range of sensing.

    - Range of communication is limited such that each UAV can only communicate with
    its near neighbours.

    - There are no central controllers.

    - The UAVs do not have global network knowledge since the topology changes continuously.

    - Each UAV has to use only information in its locale for making movement decisions
    (e.g. obstacles and terrain surface knowledge).

    - The UAVs do not have any knowledge of the deployment terrain in advance.


    A swarm of autonomous UAVs, an arrangement in which each drone makes independent
    flight decisions and controls its own actions, is necessary to accomplish a broad
    range of applications. Such drones are specifically designed to operate in dynamic
    environments. Among various flight control strategies, GA-based techniques are
    good candidates to provide autonomous control for each drone. If correctly implemented,
    GA-based flight control can provide real-time guidance for tasks requiring independence
    and agility. Well-designed GAs can adapt to unpredictable situations without the
    need for superfluous computations and high-speed coordination with other swarm
    members.


    # 16.4 A Simple GA for UAV Flight Control


    Let us now present a sketch for a GA-based flight control algorithm that can guide
    an autonomous UAV. Obtaining a good fitness function is crucial for a GA to adequately
    control the actions of autonomous UAVs. A computationally efficient fitness function
    should be defined to closely correlate flight and assignment goals. Carefully
    defined chromosome structure and fitness function(s) are essential for a GA-based
    flight control algorithm to converge to a good solution. In our context, convergence
    means that UAVs are spread uniformly over an area of interest. Coverage of operational
    area by UAVs approaches a maximum if the UAVs end up being separated from each
    other as far away as their communication range allows. Crossover and mutation
    operations can greatly affect computation time to find a satisfactory solution
    while eliminating unnecessary movements of the UAVs [18, 19].


    Let a chromosome represent a candidate position for a UAV to move to at the next
    time point. In the pseudocode shown in Figure 16.2, the GA starts by generating
    a population of individuals (i.e. a set of candidate positions to move). For our
    example, each candidate position is evaluated using a fitness function, which
    considers the near-neighbour locations of the UAV. At each generation, the best
    parents are selected for a crossover operation to obtain the next (and hopefully
    improved) set of candidate positions. This process is repeated throughout many
    generations until a satisfactory next location is found or a predetermined number
    of generations is reached. The UAV then moves to the best location found by the
    GA.'

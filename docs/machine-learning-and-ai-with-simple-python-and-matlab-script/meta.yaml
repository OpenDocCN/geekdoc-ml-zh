    \n### 9.1 引言\n\n在本章中，我们介绍一种用于语音识别的简单 CNN 实现，即计算机程序识别任何格式的语音或录制音频的能力。在典型应用中，识别和识别的语音很可能会被转换为另一种格式，例如文本或数字记录，从而显著提高语音识别在各种智能系统日常使用中的影响力。许多现代设备通过虚拟助手应用程序（如亚马逊的\
    \ Alexa 和苹果的 Siri [81]）内置了语音识别功能。其他流行的语音识别应用包括许多商业实体（从汽车租赁公司到信用卡服务）使用的客户服务系统、自动生成字幕、机器翻译任务、辅助残疾人以及在嘈杂环境中消除背景噪音（例如直升机或潜艇中使用的降噪设备）。\n\
    \n频谱图 [82] 是一种图表，它绘制了音频样本中频率谱随时间的变化。频谱图是通过使用傅里叶变换来识别给定时间窗口 [83] 内音频片段中存在的频率来计算的。频谱图的像素宽度代表音频文件中的时间划分数。对于每个时间划分，计算傅里叶变换，生成一列像素，显示该时间片段内的频率谱。高值像素表示在该时刻音频片段中某个频率是活跃的。图\

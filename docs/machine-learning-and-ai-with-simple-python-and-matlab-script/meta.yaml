    16 and 21, input samples are saved in a vector called X. Similarly, outputs from
    the samples are saved in Y in line 25. In lines 36 and 37, output values (i.e.
    decline slopes of MMSE scores) are normalized to avoid numerical inaccuracies
    during training. The loop between lines 56 and 245 processes four patients, which
    are taken out of sample set during training as part of LOOCV method described
    above. In this LOOCV implementation, only four patients are taken out of the 215-patient
    sample set during training (one patient at a time for each iteration of the loop),
    and hence the ANN was trained four separate times, each with 214 patients. In

  md: "# 3 ANNs for Optimized Prediction\n\n```\ntrain_data_file = 'london_bike_sharing_data.csv'\n\
    \nprint('\\n********** NOW TRAINING ANN USING', train_data_file,'**********')\n\
    time.sleep(3)\n\n## load the training data\ndf = pd.read_csv(train_data_file)\n\
    \n## the training data contains 7 columns:\n##\n##      timestamp - the date and\
    \ time the sample was recorded\n##      new_bikes_shared - number of new bikes\
    \ shared over the last hour\n##      is_weekend - boolean that is 1 (true) if\
    \ the day is a weekend\n##      temp_c - the temperature in Celcius\n##      wind_speed\
    \ - wind speed in km/h\n##      weather_code - category of weather: 1 = clear\n\
    ##                                        2 = scattered clouds\n##           \
    \                             3 = broken clouds\n##                          \
    \              4 = cloudy\n##                                        7 = rain\n\
    ##                                        10 = thunderstorm\n##              \
    \                          26 = snow\n##                                     \
    \   94 = freezing fog\n\n## the timestamp column of df are stored as strings.\
    \ We want to\n## convert each timestamp string into a datetime objects using the\n\
    ## function datetime.strptime(). The first input of datetime.strptime()\n## is\
    \ the string you want to convert, and the second input is the\n## format of the\
    \ string, where\n## %m = month, %d = day, %Y = year, %H = hour, %M = minute.\n\
    ##\n## create lambda function to perform conversion and return the hour.\nget_hour\
    \ = lambda timestamp: datetime.strptime(timestamp,\n                         \
    \                      '%m/%d/%Y %H:%M').hour\n## apply the lambda function to\
    \ every timestamp in column df['timestamp']\ndf['time_hour'] = df['timestamp'].apply(get_hour)\n\
    \n## define input matrix X (get rid of columns called timestamp and\n## new_bikes_shared)\n\
    X = np.array(df.drop(['timestamp','new_bikes_shared'], axis=1))\n## define expected\
    \ output matrix Y\nY = np.array(df['new_bikes_shared'])\n\n## create a model for\
    \ the ANN\nmodel = keras.Sequential()\n## add a hidden layer that accepts 5 input\
    \ features (time_hour, temp_c\n## wind_speed, weather_code, is_weekend)\n## the\
    \ hidden layer has 5 neurons.\n## Dense means every neuron in the layer connects\
    \ to every neuron in the\n## previous layer.\nmodel.add(keras.layers.Dense(5,\
    \ activation='relu', input_shape=(5,)))\n## add another hidden layer with 6 neurons\
    \ to the ANN\nmodel.add(keras.layers.Dense(6, activation='relu'))\n## add an output\
    \ layer with a single output (new_bikes_shared)\nmodel.add(keras.layers.Dense(1,\

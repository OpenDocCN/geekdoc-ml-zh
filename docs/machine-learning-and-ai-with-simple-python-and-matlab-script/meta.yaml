    # D.2 Embedding Layer


    When an embedding layer is used in an RNN as discussed in Section 10.5 in Chapter
    10, we have


    $$x_t = E \cdot x_t^o, \quad (D.24)$$


    where $x_t^o$''s the one-hot-encoded input vector and $E$ is the embedding weight
    matrix. For an RNN with an embedding layer, all forward propagation equations
    given above in Eqs. (D.1) to (D.4) are still valid. However, we now need to include
    the partial derivative of $L$ with respect to $E$ since the weights in $E$ will
    be updated as training goes from one epoch to another. The only equation that
    is related to $E$ is Eq. (D.24). For steps $t = 1, \cdots, 4$, we have the partial
    derivative of $L$ with respect to $E$ as


    $$\frac{\partial L_1}{\partial E} = \frac{\partial L_1}{\partial \hat{y}_1} \frac{\partial
    \hat{y}_1}{\partial h_1} \frac{\partial h_1}{\partial x_1} \frac{\partial x_1}{\partial
    E}$$

    $$\frac{\partial L_2}{\partial E} = \frac{\partial L_2}{\partial \hat{y}_2} \frac{\partial
    \hat{y}_2}{\partial h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial h_1}{\partial
    x_1} \frac{\partial x_1}{\partial E} + \frac{\partial L_2}{\partial \hat{y}_2}
    \frac{\partial \hat{y}_2}{\partial h_2} \frac{\partial h_2}{\partial x_2} \frac{\partial
    x_2}{\partial E}$$

    $$\frac{\partial L_3}{\partial E} = \frac{\partial L_3}{\partial \hat{y}_3} \frac{\partial
    \hat{y}_3}{\partial h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial h_2}{\partial
    h_1} \frac{\partial h_1}{\partial x_1} \frac{\partial x_1}{\partial E} + \frac{\partial
    L_3}{\partial \hat{y}_3} \frac{\partial \hat{y}_3}{\partial h_3} \frac{\partial
    h_3}{\partial h_2} \frac{\partial h_2}{\partial x_2} \frac{\partial x_2}{\partial
    E} + \frac{\partial L_3}{\partial \hat{y}_3} \frac{\partial \hat{y}_3}{\partial
    h_3} \frac{\partial h_3}{\partial x_3} \frac{\partial x_3}{\partial E}$$

    $$\frac{\partial L_4}{\partial E} = \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial
    \hat{y}_4}{\partial h_4} \frac{\partial h_4}{\partial h_3} \frac{\partial h_3}{\partial
    h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial h_1}{\partial x_1} \frac{\partial
    x_1}{\partial E} + \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial \hat{y}_4}{\partial
    h_4} \frac{\partial h_4}{\partial h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial
    h_2}{\partial x_2} \frac{\partial x_2}{\partial E} + \frac{\partial L_4}{\partial
    \hat{y}_4} \frac{\partial \hat{y}_4}{\partial h_4} \frac{\partial h_4}{\partial
    h_3} \frac{\partial h_3}{\partial x_3} \frac{\partial x_3}{\partial E} + \frac{\partial
    L_4}{\partial \hat{y}_4} \frac{\partial \hat{y}_4}{\partial h_4} \frac{\partial
    h_4}{\partial x_4} \frac{\partial x_4}{\partial E}.$$



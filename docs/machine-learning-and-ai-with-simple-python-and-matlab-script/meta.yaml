- md: "## 15.7 Matlab Script for Dietary Menu Selection Using a GA\n\nMatlab has a\
    \ built-in function to implement a GA, called `ga`, which requires several options\
    \ to be defined as shown in Figure 15.9. In the Matlab implementation, each chromosome\
    \ in a population must satisfy an inequality defined as\n\n> A · chromosome† ≤\
    \ b† (15.3)\n\nwhere, for this example, A is a vector containing calorie values,\
    \ b is the calorie upper limit and † represents the matrix transpose operator.\
    \ If this inequality is not satisfied, Matlab declares the individual invalid\
    \ and discards it.\n\nAs can be seen in Figure 15.9, the parameters of `ga` include\
    \ the name of the fitness function, chromosome length, linear inequality constraints\
    \ (i.e. so-called A and b matrices), non-linear inequality constraints (if any),\
    \ lower and upper bounds for codon values in a chromosome, non-linear constraints\
    \ (if any), locations of integer codons in a chromosome, and additional options\
    \ such as population size, crossover function definition and the maximum number\
    \ of generations. At completion, `ga` returns the resulting population array from\
    \ the last generation where the top performing candidates are placed at the top\
    \ of the array.\n\nA sample Matlab script implementing the KP using a GA is presented\
    \ below. The sugar capacity is defined in line 13. At line 40, the fitness function\
    \ is defined as the multiplication of the chromosome and the protein column of\
    \ the food items table. The negative sign in line 40 indicates that it is a maximization\
    \ problem. At line 45, calorie values constitute the A vector, and at line 46\
    \ the calorie capacity from line 13 is used as the b value needed for the `ga`\
    \ function as defined in Eq. (15.3).\n\n```matlab\n% The City College of New York,\
    \ City University of New York\n% Written by Ricardo Valdez and Kelvin Ma\n% August,\
    \ 2020\n%\n% KNAPSACK PROBLEM DESCRIPTION:\n% Given a knapsack (bag) with a maximum\
    \ capacity of W and a set of items\n% of varying weights and value, select items\
    \ to put place into the\n% knapsack such that the total value of the selected\
    \ items is maximized\n% without exceeding the weight limit W.\n%\nclc;\nclear;\n\
    calorie_capacity = 290; % user input; max calorie carried by knapsack;\nitems_file\
    \ = 'items.csv'; % user input; data file\n%\n% load the items from a csv file\
    \ and store it into a table\nitems_table = readtable(items_file);\nfprintf('***********\
    \ READING ITEMS FROM %s ***********\\n',items_file);\n%fprintf('SUGAR CAPACITY\
    \ IS SET TO %d\\n',sugar_capacity);\n%fprintf('CALORY CAPACITY IS SET TO %d\\\
    n', calory_capacity);\nfprintf('CALORIE LIMIT IS SET TO %d\\n', calorie_capacity);\n\
    %\n% the chromosome for the genetic algorithm will be a vector of binary\n% digits,\
    \ where each bit represents the selection of a paticular item:\n%   - 0 if the\
    \ item is NOT selected\n%   - 1 if the item is selected\n%       chromosome length\
    \ is the number of items in iventory\n% example:\n%    [1 0 1 0 0 0 0 1 1] - this\
    \ chromosome represents a set of 10 items\n% out of which four items are selected\n\
    %\n\n% set the length of the chromosome to the number of items\nchromosome_length\
    \ = height(items_table);\n\n% fit_func is the fitness function that will be minimized\
    \ by the genetic\n% algorithm. fit_func returns the negative of the sum of the\
    \ value\n% in fit_func: input is the chromosome, body is what follows it:\n% -(chromosome\
    \ * items_table.value)\nfit_func = @(chromosome) -(chromosome * items_table.Protein);\n\
    \n% A and b are used to used to apply the following constraint on the\n% genetic\
    \ algorithm: A*chromosome <= b\n% We set A to the vector of calories and b to\
    \ the calorie capacity\nA = items_table.Calories'; % ' means tranposed\nb = calorie_capacity;\n\
    \n% Lb is a vector that represents the lowerbounds for each gene.\n% since all\
    \ genes are binary digits, the lowerbounds will be set to 0\n% put zeros into\
    \ Lb[1][length]\nLb = zeros(1,chromosome_length);\n% Ub is a vector that represents\
    \ the upperbounds for each gene.\n% since all genes are binary digits, the upperbounds\
    \ will be set to 1\n% put ones into Ub[1] [length]\nUb = ones(1,chromosome_length);\n\
    \n% int_indices is an vector containing the indices of genes that are\n% integers.\
    \ since all genes are binary digits, all genes are integers.\n% 1:chromosome_length\
    \ creates a vector that increments from 1 to\n% chromosome_length\nint_indices\
    \ = 1:chromosome_length;\n\n% run the genetic algorithm\ndisp('*******************\
    \ GA STARTING *******************');\n% set options to: do not display\noptions\
    \ = optimoptions('ga','display','off');\n%options = optimoptions('ga','display','on');\
    \ % set to: display\n\n% ga(fitness func, noof genes in chromosoem, A, b, A_eq,\
    \ b_eq, Lb, Ub,...\n% Non-lin contraint, indices for integer genes, additional\
    \ options)\n% vector of Aeq <= equations, vector of beq <= equations\n% if integers\
    \ are used in chromosome, they have to be left blank\nselection = ga(fit_func,chromosome_length,A,b,\
    \ ...\n               [],[],Lb,Ub,[],int_indices, options);\ndisp('*******************\
    \ GA FINISHED *******************');\n\n% print out the genetic algorithm result:\n\
    message = sprintf('OPTIMAL SELECTION OF ITEMS: [');\nfor i = 1:chromosome_length\n\
    \    if selection(i) == 1\n        message = sprintf('%s %s', message, string(items_table.Name(i)));\n\
    \    end\nend\nfprintf('%s]\\n',message);\nfprintf('TOTAL PROTEIN VALUE OF SELECTION:\
    \ %d\\n', ...\n    selection * items_table.Protein);\nfprintf('TOTAL CALORIE OF\
    \ SELECTION: %d\\n', ...\n    selection * items_table.Calories);\ndisp('***************************************************')\n\
    ```\n\nSince GA is nondeterministic in nature, the results may differ for multiple\
    \ runs of the same script with the same input data, all of which satisfy the restrictions\
    \ of the KP but make different selections. In other words, while keeping the total\
    \ number of calories to be less than or equal to the defined limit, GA tries to\
    \ maximize the total protein amount by the selections from the food table. Two\
    \ runs of the Matlab script presented above are shown in Figures 15.10a and b.\
    \ In the first run, the choice is egg, shrimp, swordfish with 287 calories and\
    \ a protein total of 62 grams, whereas the second run chooses egg, shrimp, tomato,\
    \ banana with 277 calories and 62 grams of protein. Of course, both results are\
    \ below the limit of 290 grams of sugar.\n\n**Figure 15.10** Sample runs of the\
    \ Matlab script presented in Section 15.7 generating results with (a) 287 total\
    \ calories and 62 grams of protein, and (b) 277 total calories and 62 grams of\
    \ protein.\n\n## 15.8 Concluding Remarks\n\nA wide variety of real-life applications\
    \ can be modeled as the KP or MKP class of problems. Modeling a real-life problem\
    \ as a KP or MKP requires the experience and skill-set typically available to\
    \ computationally trained engineers. Because the KP and MKP are NP-complete problems,\
    \ evolutionary algorithms such as GAs are required to obtain solutions in linear\
    \ time. When employing off-the-shelf software packages such as Matlab, Python\
    \ or similar software, one has to be careful about the assumptions used, not typically\
    \ stated, in the implementations since they may restrain evolutionary searches\
    \ in exploring large solution spaces. For this reason, it may be necessary to\
    \ implement special-purpose software custom-tailored to handling computationally\
    \ expensive problems with large sets of data to control mutation probabilities,\
    \ number of generations and stopping criteria for the GA.\n\n## 15.9 Exercises\
    \ for Chapter 15\n\n- 1) Shopping planning: Given a list of items to buy as shown\
    \ in Figure 15.11a, Roberta has a shopping trolley that can carry up to ten kilos\
    \ of clothes. Roberta is at a market trying to buy as many clothes as possible\
    \ while staying under 10 kilos. Write a Matlab script similar to the one given\
    \ in Section 15.7 to find an acceptable solution for Roberta.\n- 2) Air conditioner\
    \ selection: Given the list of air conditioner manufacturers in Figure 15.11b,\
    \ the Schon family is planning to buy two units for their home. They want to make\
    \ sure that the units"
  mdcn: "## 15.7 使用遗传算法进行膳食菜单选择的Matlab脚本\n\nMatlab有一个内置函数来实现遗传算法，称为`ga`，它需要定义几个选项，如图15.9所示。在Matlab实现中，种群中的每条染色体必须满足一个不等式约束，定义为\n\
    \n> A · 染色体† ≤ b† (15.3)\n\n其中，在本例中，A是包含卡路里值的向量，b是卡路里上限，†表示矩阵转置运算符。如果此不等式不满足，Matlab会声明该个体无效并将其丢弃。\n\
    \n如图15.9所示，`ga`的参数包括适应度函数名称、染色体长度、线性不等式约束（即所谓的A和b矩阵）、非线性不等式约束（如果有）、染色体中密码子值的下界和上界、非线性约束（如果有）、染色体中整数密码子的位置，以及附加选项，如种群大小、交叉函数定义和最大代数。完成时，`ga`返回来自最后一代的最终种群数组，其中表现最佳的候选解位于数组顶部。\n\
    \n下面展示了一个使用遗传算法实现背包问题的Matlab脚本示例。糖容量在第13行定义。在第40行，适应度函数定义为染色体与食物项目表中蛋白质列的乘积。第40行的负号表示这是一个最大化问题。在第45行，卡路里值构成A向量，在第46行，第13行的卡路里容量被用作`ga`函数所需的b值，如公式(15.3)所定义。\n\
    \n```matlab\n% The City College of New York, City University of New York\n% Written\
    \ by Ricardo Valdez and Kelvin Ma\n% August, 2020\n%\n% KNAPSACK PROBLEM DESCRIPTION:\n\
    % Given a knapsack (bag) with a maximum capacity of W and a set of items\n% of\

    # 14 遗传算法


    ## 14.1 引言


    优化不同于在给定约束下寻找绝对最大值或最小值，它是在一*组*约束条件下为问题寻找最合适的解决方案。对于非线性、离散或不连续空间问题——这些是二十一世纪许多现实应用的特征——寻找最优解通常是一项具有挑战性的任务。当前与工程和管理任务相关的大多数优化问题往往涉及大量通常相互冲突的需求。一架飞往夏威夷的客机旨在通过选择最短路径来优化燃油消耗，同时避开途中的厚云层以减少可能给机翼带来额外压力的湍流，但又不能进行可能让乘客感到不适的剧烈机动。一位负责制造用于减轻帕金森病对老年患者影响的大脑监测芯片的经理，必须从具有不同经验水平和薪资要求的候选人中组建一个团队，成员包括医生、工程师、科学家、芯片制造商、法律专家以及销售和市场专家，同时还要控制在给定预算内。由于预算限制或候选人可用性，他们可能无法负担只选择每个领域的顶尖候选人，因此将被迫做出对项目有不利影响的决定。每位电影制片人、足球队经理或太空任务指挥官每天都面临着这类挑战。通过引入额外的复杂性层次，现代任务要求采用新的问题解决框架，因为这些需求通常超出了传统优化方法的范围。尽管满足多个相互冲突的标准对传统方法来说是一个艰巨的挑战，但多目标优化问题非常适合*受生物启发*（或*仿生*）的计算技术，这些技术旨在模拟自然界中发现的过程。受生物启发方法的典型例子包括：


    -   *适者生存*：在给定种群中，只有更好（更适应）的个体才能生存，通常是那些能够适应动态变化环境条件的个体。

    -   *群体行为*：一群鸟作为一个单一实体执行对群体生存至关重要的任务；例如，如果鸟群中的一只鸟在飞行时发现了一个好的食物源，整个鸟群都会受益于这个信息。

    -   *物种进化*：在给定的物种种群中，为了生存，个体会进化以适应变化的环境条件；例如，岩石岛屿上的鸟类会长出长喙，以便从岩石缝隙中啄食蠕虫。

    -   *社会行为*：不同物种之间以及同一物种种群内部的生存有利于那些即使只有微弱优势的个体，因此不同物种之间以及给定物种的成员之间存在着激烈的竞争。


    满足于一个最优或近优解（而非全局最小值或最大值），仿生算法能够通过模拟自然界中观察到的进化过程，在原本大得难以处理的问题空间中进行操作。仿生技术的特点包括：


    -   处理不可微、非线性和多模态问题；

    -   并行化以应对计算密集型成本函数；

    -   控制变量的可观察性（例如收敛性、适应度、多样性）；以及

    -   如果设置得当，计算复杂度较低。


    最受欢迎的仿生计算方法包括：


    -   `遗传算法` [104] （第14、15、16和17章）

    -   `粒子群优化` [105] （第18章第18.2节）

    -   `差分进化` [106] （第18章第18.3节）以及

    -   `语法进化` [107] （第18章第18.4节）。


    在本章的剩余部分，我们将介绍遗传算法的基本要素及其基本操作和功能。


    ## 14.2 遗传算法要素


    遗传算法模拟了自然界中观察到的进化过程。因此，采用了生物学术语来描述这些相似之处。一个所谓的`染色体`代表给定问题的一个可能解，被称为一个`个体`。通常，染色体由不可分割的构建块组成，称为`密码子`，其值随着遗传算法的进展而更新。以下是各种遗传算法应用中个体的几个例子：


    -   移动节点要移动到的位置

    -   买卖特定金融股票的价格

    -   施加到给定端口的电压

    -   切割特定机器零件的角度

    -   添加到给定药物中的药物剂量

    -   重复实验前的等待时间


    在给定世代中个体的集合称为`种群`。种群中的每个个体独立地寻求找到最优解。种群中个体的数量代表了遗传算法在搜索空间中采用的并行度。尽管种群中的个体在每一代都会发生变化（更适应的子代取代适应性较差的亲代），但种群大小通常在整个世代中保持不变。


    一个选择机制挑选亲代染色体进行`交叉`操作，产生一个或多个`后代`。以较小的概率，密码子可能会发生`突变`（其某些属性被随机改变）。一个种群通过选择、交叉和突变操作从一个`世代`进化到下一个世代。一个称为`适应度`的数学函数提供了候选解与整体优化目标接近程度的数值表示。为给定问题确定一个合适的适应度函数在所有仿生算法中都至关重要。'

    # 13


    # RNNs with Attention for Machine Translation


    # 13.1 Introduction


    In this chapter we introduce a simple example for machine translation using an
    RNN with the attention mechanism. As discussed in Chapter 12, for applications
    where it is important to remember the hidden states generated by previous words
    in translation, we need the attention mechanism.


    In natural languages, placements of the subject, verb, preposition and tense information
    in a sentence significantly vary from one language to another. For example, if
    one would like to say The sky is viewed only by me in Polish, it would be Niebo
    oglądam tylko ja. However, the statement The sky is viewed only by you is translated
    into Polish as Niebo oglądasz tylko ty. As can be seen in Figures 13.1a and b,
    the translation of this sentence into Polish cannot be determined until the user
    enters the last English word either as me in the first sentence or you in the
    second. Entering the last word as me causes the inclusion of words oglądam and
    ja in the Polish translation, whereas the last word of you will place the words
    oglądasz and ty in the Polish sentence.


    Another observation from Figure 13.1 is the difference between the number of words
    in the English input and Polish output sentences. As described in Section 11.4
    in Chapter 11, one popular solution for handling input and output sequences with
    different lengths is adopting padding techniques, which insert blank characters
    for shorter sequences to make all inputs and outputs appear equal in length.


    This example clearly illustrates that, in applications such as machine translation,
    the influence of a word at the end of an input sequence has the potential to completely
    change the predicted output, which necessitates keeping previous hidden states
    available at every step. Also in translations an input sequence may generate an
    output sequence with a different length. Such characteristics indicate that for
    a class of applications like machine translation, we need to employ a many-to-many
    RNN-Att. Because of the large number of samples, each with a large dictionary,
    RNN-Att architectures with multiple hidden and embedding layers are customary.


    In this chapter, we present a machine translation example where a simplistic many-to-many
    RNN-Att with hidden and embedding layers is implemented for translating sentences
    from German to English. Due to space restrictions, we use a small set of 3000
    translation samples with a total of 1576 German and 896 English words. Python
    and Matlab implementations for the translator are presented in Sections 13.3 and
    13.4, respectively.'

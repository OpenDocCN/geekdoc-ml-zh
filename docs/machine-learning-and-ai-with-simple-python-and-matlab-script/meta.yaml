    # 14.5 Convergence in GAs


    Convergence is a metric indicating if the solutions found by a GA from one generation
    to the next are approaching an acceptable and good-quality solution. A desirable
    outcome is that the best (or average) fitness of a population steadily improves.
    Sometimes, a bio-inspired method cannot find a solution due to improper setting
    up of a problem. Possible reasons for a non-convergent GA include:


    +   - the chromosome size is to small

    - the number of generations is insufficient

    - the population size is too small

    - the fitness function cannot properly identify fit and unfit individuals

    - the GA mechanism is not suitable to find a solution for this problem type'

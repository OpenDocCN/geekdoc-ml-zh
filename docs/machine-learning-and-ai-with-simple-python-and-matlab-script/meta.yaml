    \n## 5.6 结论性评述\n\n随着机器学习的最新进展和个人医疗数据收集能力的增强，通过挖掘多模态数据集来开发神经退行性疾病预后的预测模型成为可能。通过整合ADNI数据库（其中存储了AD患者的广泛信息），可以探索MCI患者认知衰退率与某些连续个性化测量值之间可能存在的相关性。在本章中，我们展示了人工神经网络利用AD患者基因表达与其随时间测量的MMSE评分所衡量的认知衰退之间可能存在的关系是可行的。\n\
    \n领域专家（在本例中为生物学家和医学研究人员）与计算专家（例如统计学家、软件工程师和数据科学家）结合他们的经验，设计有效的人工神经网络架构（例如选择人工神经网络的输入和输出、隐藏层数、每层神经元数、激活函数、训练轮数和学习率）。同样重要的决策包括选择可能重要的生物标志物，例如血液成分、蛋白质、MRI信息和大脑海马体图像[60]。\n\
    \n通过本章提出的简单示例，我们表明使用人工神经网络来估计AD患者的个性化疾病进展值得进一步研究和实验。我们希望，通过整合有效的计算方法和全面的数据集，越来越多专注于增强我们对AD早期检测和预后理解的研究，最终将在不久的将来为更有效的干预和治疗铺平道路。同样，也可以为其他神经退行性疾病（如帕金森病和肌萎缩侧索硬化症（ALS））以及包括各种形式癌症在内的进行性疾病开发类似的工具[13]。\n\

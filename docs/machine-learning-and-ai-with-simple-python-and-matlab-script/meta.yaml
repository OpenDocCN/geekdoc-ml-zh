  - "[PAGE 277]\n\nwhere $n$ is the number of near neighbours of candidate position\
    \ $p_C$. The fitness is computed using the total distance of $p_C$ to its near\
    \ neighbours, as long as it has at least one near neighbour. If $p_C$ does not\
    \ have any near neighbours, it means that mobile node will be disconnected from\
    \ the other nodes if it moves to position $p_C$. In this case, a large integer\
    \ value is assigned as its fitness as a penalty against further consideration\
    \ of candidate position $p_C$. Although Eq. (16.2) tries to eliminate candidate\
    \ positions that are isolated, a node may still be disconnected from a swarm after\
    \ it moves (i.e. swarm may be partitioned) due to other operational conditions.\
    \ For example, if the mobile nodes are moving much faster than the frequency at\
    \ which the FGA is updating its movement decisions, it may be possible that, by\
    \ the time an FGA computes a new direction, its neighbours are no longer at their\
    \ positions, and the swarm may be partitioned by mistake. Finding a balance between\
    \ the frequency of running the FGA and the node speed is an empirical problem\
    \ to be solved by engineers operating in a specific field. As the FGA proceeds\
    \ for node $a$ from generation $g$ to $(g + 1)$, it performs the following genetic\
    \ operations:\n\n+   - evaluate the fitness of each individual (i.e. candidate\
    \ position)\n- sort the individuals based on their fitness from best to worst\n\
    - select parents giving preference to better performing individuals in generation\
    \ $g$ (the so-called elitist method)\n- perform crossover to generate offspring\
    \ from the selected parents\n- perform mutation on offspring based on a mutation\
    \ probability\n- evaluate the fitness of offspring\n- replace less fit individuals\
    \ in generation $g$ with better-performing offspring (if any) and form generation\
    \ $(g + 1)$ as follows:\n  $P_0^{(g+1)}(a), P_1^{(g+1)}(a), \\cdots, P_{(N-1)}^{(g+1)}(a)$\n\
    - repeat the above steps until a stopping criterion is satisfied\n\nAs the number\
    \ of generations increases, the FGA finds more suitable positions for a mobile\
    \ node to eventually move to. However, one must identify a stopping criterion\
    \ for the FGA to avoid oscillations and possibly infinite loops. This criterion\
    \ is highly dependent on the application requirements. A few examples can be listed\
    \ as follows:\n\n+   - a predetermined number of generations or a time limit has\
    \ been reached\n- fitness of the best individual has reached a satisfactory value\n\
    - fitness of the best individual has not improved for several generations\n- average\
    \ fitness of the population has reached a satisfactory value\n- average fitness\
    \ of the population has not improved for several generations\n\nAfter a node stops\

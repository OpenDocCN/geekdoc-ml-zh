- md: "In this chapter, we present a GA-based solution for the TSP which computes\
    \ optimal routes (although not necessarily the absolute minimum-cost ones) in\
    \ linear time using GAs. We show that this relatively simple transformation of\
    \ the problem to the AI domain can be implemented using the library functions\
    \ in Python and Matlab.\n\n## 17.2 Definition of the TSP\n\nAn example of the\
    \ TSP is presented in Figure 17.1a, where each red dot must be visited once with\
    \ minimum total length of the cycle [124]. A possible solution is shown in Figure\
    \ 17.1b. Another TSP example and one possible solution are shown in Figure 17.2\
    \ [125]. There are worldwide competitions among researchers for measuring the\
    \ effectiveness of their TSP solutions. Examples include covering 24,978 cities\
    \ and towns in Sweden and 15,112 in Germany (Figure 17.3) [124] and 3,143 counties\
    \ of the USA (a near-optimal length of 93,466 miles) (Figure 17.4) [126]. For\
    \ these benchmarks, the length of the road between two cities is taken as the\
    \ cost of the edge.\n\nAnother simple example of TSP is shown in Figure 17.5,\
    \ where a traveller starting in Detroit has to visit Chicago, Columbus and Indianapolis\
    \ before returning to Detroit. The roads connecting these cities, together with\
    \ their lengths, are shown in Figure 17.5, where several possible solutions are\
    \ presented. The trip that visits Detroit, Chicago, Indianapolis, Columbus and\
    \ back to Detroit is the minimum-cost solution in Figure 17.5b. Note that the\
    \ solution to a TSP may not be unique, and there may be multiple cycles with the\
    \ same minimal cost.\n\nLet us now formally define the TSP. Suppose an edge-weighted,\
    \ undirected graph $G$ is given as $G = (V, E, w)$, where $V$ is a set of vertices\
    \ with $|V| = n$ (i.e. $V = v_1, v_2, \\cdots, v_n$) and $E$ is a set of directed\
    \ edges with $|E| = m$ (i.e. $E = e_1, e_2, \\cdots, e_m$). A function $w$ maps\
    \ the edges to their corresponding weights (e.g. traversal costs, lengths or difficulty);\
    \ hence $w(e_i) = w_i, \\forall e_i \\in E$. In other words, each edge $e_i \\\
    in E$ is associated with a cost $w_i$. A *path* in $G$ is defined as a sequence\
    \ of edges, where each edge appears only once (all edges may not be included in\
    \ a path). A *cycle* in $G$ is defined as a path that starts and ends at the same\
    \ node. A *Hamiltonian cycle* $H_c$ is a cycle that covers all nodes in $G$ exactly\
    \ once except for the starting and ending nodes. Based on these definitions, the\
    \ goal of the TSP is to find a Hamiltonian cycle with the lowest total weight\
    \ in a given weighted graph. Formally, we define the TSP as an optimization problem\
    \ as follows:\n\n$$\\text{minimize} \\sum_{j=1}^{n} w_j \\text{ for } \\forall\
    \ e_i \\in H_c \\text{ and a given start vertex } v_s. \\quad (17.1)$$\n\n## 17.3\
    \ A Simple Algorithm for the TSP\n\nA straightforward solution for the TSP that\
    \ compares travelling costs of all possible cycles among $n$ nodes is shown in\
    \ Figure 17.6. All possible cycles starting and ending at a selected city, while\
    \ visiting the remaining $(n - 1)$ cities, are considered before selecting a cycle\
    \ with the lowest cost as the solution.\n\nAs can be seen in Figure 17.6, the\
    \ number of steps needed to find a solution to the TSP is exponential with respect\
    \ to the number of cities to be visited and, hence, belongs to the NP-complete\
    \ class of problems [128]. The algorithm in Figure 17.6 has a complexity of $\\\
    mathcal{O}(n!)$, which means that it will need $n!$ iterations to complete for\
    \ $n$ cities, making it applicable only to problems with relatively small numbers\
    \ of cities. In Section 17.5 of this chapter, we will introduce a computationally\
    \ lightweight implementation for the TSP class of problems using GAs.\n\n```\n\
    TSP = \\phi; // empty TSP cycle\nTSP_{best} = TSP; // initialize best solution;\n\
    C_{best} = C_{TSP}; // initialize best cost;\n\n// for all permutations of n cities\
    \ in a cycle:\nwhile ( there are more permutations of TSP ) do\n    TSP = get\
    \ a new combination of n cities;\n    if(C_{TSP} \\leq C_{best}) then\n      \
    \  TSP_{best} = TSP; // update best solution;\n        C_{best} = C_{TSP}; //\
    \ update best cost;\n    end if\nend while\n\nreturn TSP_{best} as the best cycle\
    \ with cost of C_{best};\n```\n\nFigure 17.6 A simple algorithm to find the lowest-cost\
    \ Hamiltonian cycles in a graph.\n\n## 17.4 Variations of the TSP\n\nThere are\
    \ several variations of the TSP, each with a different set of restrictions imposed\
    \ on its solutions. It is possible that visiting each city exactly once may be\
    \ too restrictive for certain applications. For example, if there is a costly\
    \ edge between two cities (e.g. due to a congested highway, speed limitations\
    \ or a traffic condition), it may be preferable to avoid such edges by visiting\
    \ some of the remaining cities more than once. In the TSP with multiple visits\
    \ (TSPM), the aim is to minimize the total cost of the trip while visiting each\
    \ vertex at least once (i.e. allowing multiple visits at each city as needed).\
    \ The path shown in Figure 17.7a is a solution to the TSP which visits each city\
    \ exactly once with a cost of 510 miles. If the problem is formulated as a TSPM,\
    \ the solution has a total travelled distance of 320 miles with Toledo visited\
    \ twice, as shown in Figure 17.7b.\n\nIn another variation of the TSP, called\
    \ the clustered TSP (CTSP), the cities are partitioned into clusters such that\
    \ a minimum-cost tour of all clusters is to be determined and each city within\
    \ a cluster has to be visited before moving to the next cluster. A solution to\
    \ the CTSP may aim to optimize both an ordering of cities to be visited within\
    \ each cluster and a sequence in which clusters are toured [129]. As an example\
    \ of the CTSP, consider testing integrated circuits where it is common to cluster\
    \ ports such that any port in a cluster will have the same voltage requirements\
    \ [123]. To complete the inspection of an integrated circuit, a robotic test probe\
    \ has to measure the voltages at all ports of a cluster before moving to the next\
    \ one. Minimizing the movements of the robot is equivalent to the CTSP, where\
    \ every port at every cluster has to be visited with minimal cost.\n\nThe TSP\
    \ variation that divides the graph vertices into subsets and aims to find the\
    \ minimum-cost tour by passing through exactly one node from each of the subsets\
    \ is called the set TSP (STSP). In some cases the STSP is also referred to as\
    \ the covering salesmen problem (CSP) since it can be applied to find a minimum-cost\
    \ tour among a subset of n cities such that every city not in the tour is within\
    \ a predefined distance of a city that is in the tour. In the CSP, each visited\
    \ city together with its neighbouring cities constitute a neighbourhood set [130].\
    \ As a typical STSP application, consider the task of testing integrated circuits\
    \ by measuring several ports, where the ports are divided into groups such that\
    \ only one port in each group needs to be measured. Minimizing the movements of\
    \ a robotic test probe can be modelled as an STSP.\n\n## 17.5 GA Solution for\
    \ the TSP\n\nGenetic algorithms can find solutions for the travelling salesman\
    \ class of problems, even for cases where the number of nodes to be covered is\
    \ in the tens of thousands or more. For simplicity and without loss of generality,\
    \ suppose that all cities are interconnected by two-way roads, which corresponds\
    \ to a completely-connected graph $G$ with undirected edges, as presented in Section\
    \ 17.2. For this simplified case, a chromosome may encode the cities in the order\
    \ to be visited. A fitness function can be defined to represent the total cost\
    \ of a cycle that is dictated by a chromosome as its fitness as defined in Eqn.\
    \ (17.1). A generation of the GA will evolve a set of individuals in its population,\
    \ where each individual corresponds to a TSP solution.\n\nIn Figure 17.8a, an\
    \ example graph is shown where the nodes are connected with undirected edges,\
    \ each of which is associated with an integer cost value representing the difficulty\
    \ of traversing the edge. This example uses a `completely-connected graph`, where\
    \ every node is connected to every other one with an undirected edge. In this\
    \ simplified form, the salesman can travel either from node $i$ to $j$ or from\
    \ $j$ to $i$ with the same cost. However, in the general case, the TSP graph does\
    \ not have to be completely-connected and the edges may not be undirected (i.e.\
    \ an edge directed from node $i$ to $j$ does not imply in general that the salesman\
    \ can also travel from $j$ to $i$). The TSP aims to find the minimum cost cycle\
    \ among all possible cycles starting and ending at $A$ while covering all edges\
    \ only once. Even for this simple example, there are $4^5$ possibilities to consider.\n\
    \nIn Figure 17.8b, a connectivity matrix called $CM$ is presented, which is derived\
    \ from the completely-connected graph in Figure 17.8a. Connectivity matrix $CM$\
    \ is an ($n \\times n$) matrix where an element $CM[i][j]$ represents the cost\
    \ from node $i$ to node $j$. For example, using a $CM$ matrix of size ($5 \\times\
    \ 5$), the cost associated with the edge from node 0 to 2 (i.e. from node A to\
    \ node C) is $CM[0][2] = 12$. Since we are using an undirected graph $G$ for this\
    \ example, an edge from $i$ to $j$ implies that there is also a connection from\
    \ $j$ to $i$ with the same cost. As seen in Figure 17.8b, $CM[0][2] = 12$ implies\
    \ that $CM[2][0] = 12$. Diagonal elements of $CM$ are zero (i.e. $CM[i][i] = 0$\
    \ for ($i = 0, \\cdots, n-1$)), since the distance to itself is zero for each\
    \ city.\n\nLet us now define a chromosome as the order to visit cities $[c_i,\
    \ c_j, \\cdots, c_x]$, where we assume that the last city $c_x$ and the first\
    \ city $c_i$ are connected covering all vertices in $V$. For the example in Figure\
    \ 17.8, chromosome length is 5 since there are five cities. The fitness function\
    \ is the total weight (i.e. the cost) for the edges selected in a chromosome:\n\
    \n$$\\text{Fitness of a candidate} = \\sum_{(i=1)}^{m} w_i + w_R,$$\n\nwhere $w_i$\
    \ is the weight of the edge in codon $c_m$ (i.e. the last one in the chromosome)\
    \ and $w_R$ the weight of the return edge from the last node to the start. For\
    \ the example in Figure 17.8, starting from node $A$, the TSP is defined as finding\
    \ the order in which a salesman must visit each node once and return to $A$ with\
    \ a minimum total cost. Two candidate solutions are given in Figure 17.9, namely\
    \ $P_1 = A, B, C, D, E, A$ and $P_2 = A, B, C, E, D, A$. The total cost for cycle\
    \ $P_1$ is 24, whereas it is 31 for $P_2$. Between these two candidates, it is\
    \ clear that $P_1$ is fitter than $P_2$."
  mdcn: "在本章中，我们提出一种基于遗传算法的旅行商问题解决方案，该方案利用遗传算法在线性时间内计算出最优路径（尽管不一定是绝对最小成本的路径）。我们展示了这种将问题相对简单地转化到人工智能领域的方法，可以使用Python和Matlab中的库函数来实现。\n\
    \n## 17.2 旅行商问题的定义\n\n图17.1a展示了一个旅行商问题的示例，其中每个红点必须被访问一次，且环路的总长度最小[124]。一个可能的解如图17.1b所示。另一个旅行商问题的示例及其一个可能的解如图17.2所示[125]。研究人员之间存在全球性的竞赛，以衡量他们旅行商问题解决方案的有效性。示例包括覆盖瑞典的24,978个城镇和德国的15,112个城镇（图17.3）[124]，以及美国的3,143个县（接近最优的长度为93,466英里）（图17.4）[126]。对于这些基准测试，两个城市之间的道路长度被视为边的成本。\n\
    \n图17.5展示了旅行商问题的另一个简单示例，其中一位旅行者从底特律出发，必须在返回底特律之前访问芝加哥、哥伦布和印第安纳波利斯。连接这些城市的道路及其长度如图17.5所示，其中给出了几个可能的解。图17.5b中访问底特律、芝加哥、印第安纳波利斯、哥伦布并返回底特律的行程是成本最低的解。请注意，旅行商问题的解可能不是唯一的，并且可能存在多个具有相同最小成本的环路。\n\
    \n现在让我们正式定义旅行商问题。假设给定一个边加权的无向图 $G$，表示为 $G = (V, E, w)$，其中 $V$ 是一个顶点集，$|V| = n$（即\
    \ $V = v_1, v_2, \\cdots, v_n$），$E$ 是一个有向边集，$|E| = m$（即 $E = e_1, e_2, \\cdots,\
    \ e_m$）。函数 $w$ 将边映射到其对应的权重（例如遍历成本、长度或难度）；因此 $w(e_i) = w_i, \\forall e_i \\in E$。换句话说，每条边\
    \ $e_i \\in E$ 都关联一个成本 $w_i$。$G$ 中的*路径*定义为边的序列，其中每条边只出现一次（路径中可能不包含所有边）。$G$ 中的*环路*定义为从同一节点开始和结束的路径。*哈密顿环路*\
    \ $H_c$ 是一个覆盖 $G$ 中所有节点恰好一次（起始和结束节点除外）的环路。基于这些定义，旅行商问题的目标是在给定的加权图中找到一个总权重最低的哈密顿环路。形式上，我们将旅行商问题定义为一个优化问题，如下所示：\n\
    \n$$\\text{minimize} \\sum_{j=1}^{n} w_j \\text{ for } \\forall e_i \\in H_c \\\
    text{ and a given start vertex } v_s. \\quad (17.1)$$\n\n## 17.3 旅行商问题的一个简单算法\n\
    \n图17.6展示了一个直接的旅行商问题解决方案，该方案比较 $n$ 个节点之间所有可能环路的旅行成本。在选择成本最低的环路作为解之前，会考虑所有从选定城市出发并返回，同时访问其余\
    \ $(n - 1)$ 个城市的可能环路。\n\n如图17.6所示，找到旅行商问题解所需的步骤数量随着待访问城市数量呈指数增长，因此属于NP完全问题类[128]。图17.6中的算法复杂度为\
    \ $\\mathcal{O}(n!)$，这意味着对于 $n$ 个城市，它需要 $n!$ 次迭代才能完成，使其仅适用于城市数量相对较少的问题。在本章的第17.5节，我们将介绍一种使用遗传算法实现旅行商问题类问题的轻量级计算方法。\n\
    \n```\nTSP = \\phi; // 空的TSP环路\nTSP_{best} = TSP; // 初始化最佳解；\nC_{best} = C_{TSP};\
    \ // 初始化最佳成本；\n\n// 对于环路中n个城市的所有排列：\nwhile ( TSP还有更多排列 ) do\n    TSP = 获取n个城市的新组合；\n\
    \    if(C_{TSP} \\leq C_{best}) then\n        TSP_{best} = TSP; // 更新最佳解；\n  \
    \      C_{best} = C_{TSP}; // 更新最佳成本；\n    end if\nend while\n\nreturn TSP_{best}\
    \ 作为成本为 C_{best} 的最佳环路；\n```\n\n图17.6 在图中找到最低成本哈密顿环路的一个简单算法。\n\n## 17.4 旅行商问题的变体\n\
    \n旅行商问题有几种变体，每种变体对其解施加了不同的限制。对于某些应用来说，每个城市恰好访问一次可能过于严格。例如，如果两个城市之间存在一条成本高昂的边（例如由于高速公路拥堵、速度限制或交通状况），通过多次访问某些剩余城市来避免此类边可能是更可取的。在允许多次访问的旅行商问题中，目标是在至少访问每个顶点一次（即根据需要允许在每个城市多次访问）的同时，最小化行程的总成本。图17.7a所示的路径是旅行商问题的一个解，它恰好访问每个城市一次，成本为510英里。如果将问题表述为允许多次访问的旅行商问题，如图17.7b所示，解的总行驶距离为320英里，其中托莱多被访问了两次。\n\
    \n在旅行商问题的另一个变体中，称为聚类旅行商问题，城市被划分为若干聚类，目标是确定访问所有聚类的最小成本路线，并且在移动到下一个聚类之前必须访问聚类内的每个城市。聚类旅行商问题的解可能旨在优化每个聚类内要访问的城市顺序以及聚类被访问的序列[129]。作为聚类旅行商问题的一个示例，考虑测试集成电路，通常将端口聚类，使得聚类中的任何端口具有相同的电压要求[123]。为了完成集成电路的检测，机器人测试探针必须在移动到下一个聚类之前测量聚类中所有端口的电压。最小化机器人的移动等同于聚类旅行商问题，其中每个聚类的每个端口都必须以最小成本被访问。\n\
    \n将图顶点划分为子集，并旨在通过恰好经过每个子集中的一个节点来找到最小成本路线的旅行商问题变体称为集合旅行商问题。在某些情况下，集合旅行商问题也被称为覆盖旅行商问题，因为它可以应用于在n个城市的一个子集中找到最小成本路线，使得不在路线中的每个城市都在路线中某个城市的预定义距离内。在覆盖旅行商问题中，每个被访问的城市及其相邻城市构成一个邻域集[130]。作为集合旅行商问题的典型应用，考虑通过测量多个端口来测试集成电路的任务，其中端口被分组，使得每组中只有一个端口需要被测量。最小化机器人测试探针的移动可以建模为集合旅行商问题。\n\
    \n## 17.5 旅行商问题的遗传算法解决方案\n\n遗传算法可以为旅行商类问题找到解决方案，即使需要覆盖的节点数量达到数万甚至更多。为简单起见且不失一般性，假设所有城市都通过双向道路相互连接，这对应于一个具有无向边的完全连通图\
    \ $G$，如第17.2节所述。对于这种简化情况，染色体可以按访问顺序对城市进行编码。可以定义一个适应度函数来表示由染色体决定的环路的总成本，作为其适应度，如公式(17.1)所定义。遗传算法的一代将进化其种群中的一组个体，其中每个个体对应一个旅行商问题的解。\n\
    \n图17.8a展示了一个示例图，其中节点通过无向边连接，每条边关联一个整数成本值，表示遍历该边的难度。此示例使用了一个`完全连通图`，其中每个节点都通过无向边与其他所有节点连接。在这种简化形式中，旅行者可以从节点\
    \ $i$ 到 $j$ 或从 $j$ 到 $i$，成本相同。然而，在一般情况下，旅行商问题图不必是完全连通的，边也不一定是无向的（即，从节点 $i$ 到 $j$\
    \ 的有向边通常并不意味着旅行者也可以从 $j$ 到 $i$）。旅行商问题旨在找到从 $A$ 出发并返回 $A$，同时恰好覆盖所有边一次的所有可能环路中的最小成本环路。即使对于这个简单的例子，也有\
    \ $4^5$ 种可能性需要考虑。\n\n图17.8b展示了一个称为 $CM$ 的连通性矩阵，它源自图17.8a中的完全连通图。连通性矩阵 $CM$ 是一个\
    \ ($n \\times n$) 矩阵，其中元素 $CM[i][j]$ 表示从节点 $i$ 到节点 $j$ 的成本。例如，使用一个大小为 ($5 \\times\
    \ 5$) 的 $CM$ 矩阵，从节点0到2（即从节点A到节点C）的边关联的成本是 $CM[0][2] = 12$。由于我们在此示例中使用无向图 $G$，从\
    \ $i$ 到 $j$ 的边意味着从 $j$ 到 $i$ 也存在一条成本相同的连接。如图17.8b所示，$CM[0][2] = 12$ 意味着 $CM[2][0]\
    \ = 12$。$CM$ 的对角线元素为零（即对于 ($i = 0, \\cdots, n-1$)，$CM[i][i] = 0$），因为每个城市到自身的距离为零。\n\
    \n现在让我们将染色体定义为访问城市的顺序 $[c_i, c_j, \\cdots, c_x]$，我们假设最后一个城市 $c_x$ 和第一个城市 $c_i$\
    \ 是连接的，覆盖了 $V$ 中的所有顶点。对于图17.8中的示例，染色体长度为5，因为有五个城市。适应度函数是染色体中选定边的总权重（即成本）：\n\n\
    $$\\text{候选解的适应度} = \\sum_{(i=1)}^{m} w_i + w_R,$$\n\n其中 $w_i$ 是密码子 $c_m$（即染色体中的最后一个）中边的权重，$w_R$\
    \ 是从最后一个节点返回到起点的返回边的权重。对于图17.8中的示例，从节点 $A$ 出发，旅行商问题被定义为找到旅行者必须访问每个节点一次并以最小总成本返回\
    \ $A$ 的顺序。图17.9给出了两个候选解，即 $P_1 = A, B, C, D, E, A$ 和 $P_2 = A, B, C, E, D, A$。环路\
    \ $P_1$ 的总成本为24，而 $P_2$ 为31。在这两个候选解之间，显然 $P_1$ 比 $P_2$ 更优。"

    \ 2).\n\n![](img/a83d807f9a9119b1472555c0ef55797e_327_0.png)\n\n## 18.4 Grammatical\
    \ Evolution\n\nGrammatical evolution (GE) is a powerful technique to generate\
    \ solutions to problems where the solutions are computer programs. As for any\
    \ programming language, GE requires that a syntax must be defined for acceptable\
    \ solutions, specific for each application. The programs generated by GE can be\
    \ implemented using any standard programming language. GE is a powerful AI tool,\
    \ especially for problems where a large number of parameters, each with its own\
    \ search space, need to be considered before reaching a solution. An example GE\
    \ application would be designing an effective autonomous driving protocol for\
    \ self-driven vehicles, where hundreds of input variables with different parameter\
    \ values are required to be evaluated in order to make safe decisions in real\
    \ time.\n\n### 18.4.1 A Simple Algorithm for GE\n\nFigure 18.16 shows a simple\
    \ algorithm for implementing GE. In this algorithm, first an initial population\
    \ of randomly selected candidate solutions is created. This step is common in\
    \ most evolution-based computation techniques such as GA, PSO and DE. A candidate\
    \ solution is represented by a chromosome, which consists of an array of codons.\
    \ A program is generated using the codon values of the individual and the language\
    \ rules defined for this application. In GE, Backus-Naur form (BNF) [148, 149]\
    \ is used to define a set of rules for describing the grammar for the application\
    \ at hand. Derivation of a program for a given chromosome based on the BNF rules\
    \ is described in the next section.\n\nOnce a program is derived from a chromosome,\
    \ its fitness value must be calculated. Since the solution is a program, there\
    \ has to be a medium where this program will execute and generate results for\
    \ the application. Similar to the other evolutionary methods, based on the performance\
    \ of the candidate, a fitness value will be assigned to it. For example, if the\
    \ candidate program is intended for an algorithmic trading application, it will\
    \ be executed over historical financial data. The fitness could be the profit\
    \ that a candidate program generates over a period of time. The implementation\
    \ of GE in Figure 18.16 uses standard selection, crossover and mutation operations\
    \ seen in traditional GAs to promote fitter individuals from one generation to\
    \ the next. Evolutionary operations are repeated until a satisfactory solution\
    \ is found or a stopping criterion is reached.\n\n```\ninitialize population;\
    \ // random population;\nfor each individual in population do\n    generate candidate\
    \ solution using BNF rules;\n    evaluate fitness of candidate;\nend for\n\nwhile\
    \ (EndCriteria == false)\n{\n    select parents for reproduction;\n        //\
    \ typically among the fittest\n        // individuals are selected\n        //\
    \ as parents;\n    generate offspring by crossover and mutation;\n    generate\
    \ candidate solution using BNF rules;\n    evaluate offspring and form new generation;\n\
    \        // offspring replaces less fit\n        // members of the population\
    \ (if any)\n}\n```\n\n**Figure 18.16** Rosenbrock function as a benchmark for\
    \ PSO.\n\n### 18.4.2 Definition of GE\n\nSince the solutions in GE are computer\
    \ programs, a grammar for valid syntax defining acceptable programs is needed\
    \ for each specific application. In BNF the syntax of a programming language is\
    \ given by a tuple {N, T, P, S}, where N is the set of non-terminal variables,\
    \ T is the terminals (e.g. literal symbols such as numbers or values of Boolean\
    \ variables), P is a set of production rules and S ∈ N is the start symbol [148].\
    \ Every rule in P uses a meta-symbol ::= to define how to expand the non-terminals.\
    \ In a production rule, the symbol “|” separates alternative definitions for non-terminals.\
    \ A pair of symbols < and > define the start and the end of a non-terminal, respectively.\
    \ Elements of N are mapped to T using a sequence of rules. In these rules, an\
    \ element of N may appear either on the left or right side of a rule. However,\
    \ terminals cannot be on the left"

    ## 11 RNNs for Chatbot Implementation


    ### 11.1 Introduction


    The imitation game, proposed by Alan Turing in 1950 [2], states that if a machine
    (e.g. a computer) can answer any question put to it using the words that an ordinary
    human would, then we may call this machine intelligent. The Turing test [97] is
    based on this game, whose goal is to determine if the answers provided by the
    machine are indistinguishable from those by a human. The Turing test, where a
    machine tries to impersonate a human, is considered one of the earliest attempts
    at defining artificial intelligence, although it is debatable that answers to
    such questions requires any real intelligence other than simple search techniques
    based on previous conversations.


    A modern implementation of this experiment would employ a chatbot [98], which
    is a program that mimics a conversation with a human using natural language interactions
    (e.g. text or voice) [99, 100]. Current chatbots are typically online and capable
    of maintaining a conversation in a natural language based on input stimulus provided
    by the user. Recently chatbots have evolved to bring a significant societal impact
    by potentially replacing humans in many professional settings, including answering
    services and customer service operations.


    In this chapter, we present an implementation of a simplistic chatbot based on
    an RNN, which was introduced in Chapter 10. This is a fairly difficult problem
    for other AI tools such as ANNs and CNNs since they do not look for a temporal
    association between different elements of an input sequence but rather focus on
    current input/output pairs without taking into account previously applied inputs
    and their respective outputs (i.e. they lack a hidden state). Another difficulty
    in chatbot implementation is the asymmetric relationship between the lengths of
    input and output sequences. For example, a user input of how is the weather this
    afternoon? send to a chatbot impersonating a personal assistant may generate a
    response of it will be cloudy and chilly, whereas a shorter input of will it rain
    today? may generate an output with a different length, such as yes it is likely.
    RNNs that can handle variable-length input sequences and generate variable-length
    output sequences are called many-to-many RNNs [87], as studied below in Section
    11.2. Python and Matlab scripts implementing a simplistic chatbot using a many-to-many
    RNN are given in Sections 11.4 and 11.5, respectively.


    ### 11.2 Many-to-Many RNN Architecture


    Applications such as chatbots require RNNs that operate in a special way as follows.
    Until a user completes entering a sequence of inputs $X_1, \cdots, X_{k-1}$, the
    RNN does not generate any external outputs but only computes its hidden states
    $h_1, \cdots, h_{k-1}$. At step $k$, the user enters $X_k$ as the last input in
    the sequence, for which the RNN generates an output $\hat{Y}_k$. At step $(k +
    1)$, this output $\hat{Y}_k$ is fed back into the RNN as an input $X_{k+1}$ to
    generate output $\hat{Y}_{k+1}$. Similarly, at step $(k + 2)$, $\hat{Y}_{k+1}$
    is applied to the RNN as an input $X_{k+2}$, and so on. Typically, the input $X_k$
    at which the RNN starts generating outputs is a special input character such as
    an end-of-sequence indicator. Figure 11.1 illustrates an example for a many-to-many
    RNN with multiple hidden layers, where no outputs are generated until the user
    completes entering an input sequence at step $k$, after which external outputs
    are generated and fed back into the RNN as inputs (i.e. outputs $\hat{Y}_k, \hat{Y}_{k+1},
    \cdots$ are applied to the RNN as inputs of $X_{k+1}, X_{k+2}, \cdots$, respectively).


    ![Figure 11.1](img/a83d807f9a9119b1472555c0ef55797e_197_0.png)


    **Figure 11.1** A many-to-many RNN with multiple hidden layers used in a chatbot
    implementation, where no outputs are generated until the user completes entering
    an input sequence of $x_1, \cdots, x_k$ until step $k$, after which external outputs
    are generated and fed back into the RNN as inputs (i.e. outputs $\hat{y}_k, \hat{y}_{k+1},
    \cdots$ are applied to the RNN as inputs $x_{k+1}, x_{k+2}, \cdots$, respectively).


    ### 11.3 A Simple Chatbot


    In this chapter, we implement a simplistic chatbot using a many-to-many RNN employing
    hidden and embedding layers. This chatbot will be trained with 500 sample query
    and response pairs taken from the internet, which contain 565 unique words. For
    a real-life chatbot implementation, tens of millions of pairs will be needed.
    Figure 11.2 shows a subset of sample data containing queries and responses used
    in training the RNN. In the training data, a user query is given as


    ```

    <start> hi, how are you doing ? <end>

    ```


    for which the sample data defines a response as


    ```

    <start> I am fine. how about yourself ? <end>

    ```


    where special words (or tokens) of <start> and <end> are added to each sample
    to indicate the beginning and end, respectively, for each query and response pair.
    With the help of these special tokens, the RNN will know that when it reads <start>
    in a user query, it starts generating hidden states without external outputs until
    it reads <end>, after which the RNN starts generating external outputs and using
    each output as an input for the next step, as described previously. Once the RNN
    generates a word output containing <end>, it stops generating outputs. Once the
    RNN is trained, the user may enter arbitrary queries as long as they contain only
    the words present in the alphabet. For example, the following user query is not
    part of the training data:


    <start> how was your day today ? <end>


    For this user query, the RNN implemented by the Python script in Section 11.4
    generates the following response, which is also not present in any of the queries
    used in the training data:


    <start> i am a movie ?. <end>


    Of course the response does not make any sense semantically since we are using
    very few data samples and training the RNN for only a few epochs; however, it
    is remarkable that this simplistic RNN example is capable of handling unique queries
    and generating unique responses. It is clear that if we use millions of data samples
    and train the RNN for tens of thousands of epochs, the responses will significantly
    improve.


    As described in Section 10.4 in Chapter 10, it is customary to include multiple
    hidden layers for realistic RNN implementations to improve the effectiveness of
    training, where hidden layers offer parallel and simultaneous searches at the
    expense of increasing weight matrix dimensions. In Figure 11.3, we show the matrix
    dimensions for a many-to-many RNN with 256 hidden layers, for an alphabet size
    of 565 unique words as used in our Python and Matlab implementations in Sections
    11.4 and 11.5 below.



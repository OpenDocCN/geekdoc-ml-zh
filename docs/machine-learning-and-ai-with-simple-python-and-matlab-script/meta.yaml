    \        options);\n```\n\n在第46-66行，定义了名为`get_distance`的函数，该函数计算给定为纬度和经度对的两个城市之间的距离。在第68-78行，名为`getDistMat`的函数为城市列表生成距离矩阵。在第80-88行，名为`initPop`的函数为旅行商问题生成随机初始种群，其中染色体由城市的索引组成。在第90-129行，名为`orderexo`的函数对两个父代执行部分映射交叉。在第131-176行，绘制最佳路径。在第178-190行，名为`TSFitness`的函数通过计算城市之间的总距离来计算个体的适应度。在第192-208行，通过名为`swapMut`的函数执行变异操作，该操作交换染色体的两个密码子。最后，在第210至229行之间，一个名为`print_best_path`的函数在屏幕上打印旅行商问题的解。\n\
    \n```matlab\n% The City College of New York, City University of New York\n% Written\
    \ by Olga Chsherbakova and Hasan Suca Kayman\n% August, 2024\n\n% Genetic Algorithms\
    \ for travelling Salesman\n\n% Function to calculate distance between two geographic\

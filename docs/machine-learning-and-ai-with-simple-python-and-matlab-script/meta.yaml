    $a_{(12)}^{2} = f(Z_{(12)}^{(2)}) = \frac{1}{(1 + e^{-(x_1 \cdot w_{12}^{(1)}
    + x_2 \cdot w_{22}^{(1)})^2})}$


    $a_{(13)}^{2} = f(Z_{(13)}^{(2)}) = \frac{1}{(1 + e^{-(x_1 \cdot w_{13}^{(1)}
    + x_2 \cdot w_{23}^{(1)})^2})}$.


    At the output layer neuron, aggregation of the three input synapses yields


    $Z^{(3)} = a_{11}^{(2)} \cdot w_1^{(2)} + a_{12}^{(2)} \cdot w_2^{(2)} + a_{13}^{(2)}
    \cdot w_3^{(2)}$.


    Finally, at the output layer, using a sigmoid activation function generates $\hat{y}$
    as


    $\hat{y} = f(Z^{(3)}) = \frac{1}{1 + e^{-Z}} = \frac{1}{1 + e^{-(a_{11}^{(2)}
    \cdot w_1^{(2)} + a_{12}^{(2)} \cdot w_2^{(2)} + a_{13}^{(2)} \cdot w_3^{(2)})}}$.


    ## 2.6 Back Propagation


    ### 2.6.1 Back Propagation for a Neuron


    Once forward propagation is performed, the error must be back propagated starting
    from output layer all the way to the input layer so that the synapse weights can
    be updated based on the error values. Let us explore how the back-propagation
    process works for a given neuron. Without loss of generality, suppose there are
    two inputs, namely $x_a$ and $x_b$, over two incoming links with weights $w_a$
    and $w_b$, as shown in Figure 2.7. Let the output of this neuron be $\hat{y} =
    f(e)$, where $e$ is the aggregation and is defined as $e = x_a w_a + x_b w_b$.
    To minimize the error on $\hat{y}$, one has to compute its derivation with respect
    to $e$. For a rectilinear activation function, we then have


    $f''(e) = \frac{\partial \hat{y}}{\partial e}$.


    Partial derivatives of $\hat{y}$ with respect to $w_a$ and $w_b$ are as follows:


    $\frac{\partial \hat{y}}{\partial w_a} = \frac{\partial (x_a w_a + x_b w_b)}{\partial
    w_a} = x_a$


    $\frac{\partial \hat{y}}{\partial w_b} = \frac{\partial (x_a w_a + x_b w_b)}{\partial
    w_b} = x_b$.


    For the real value of $y$ at this neuron, error $E$ is defined as


    $E = \frac{1}{2}(y - \hat{y})^2$.


    The partial derivative of $E$ with respect to $w_a$ is


    $\frac{\partial E}{\partial w_a} = -(y - \hat{y}) \frac{\partial \hat{y}}{\partial
    w_a} = -(y - \hat{y}) \frac{\partial \hat{y}}{\partial e} \frac{\partial e}{\partial
    w_a}$.


    Let us define $\delta = -(y - \hat{y})f''(e)$ and plug it into the above error
    equation:


    $\frac{\partial E}{\partial w_a} = \delta \frac{\partial e}{\partial w_a} = \delta
    x_i$. (2.10)


    Similarly, the partial derivative of $E$ with respect to $w_b$ is


    $\frac{\partial E}{\partial w_b} = -(y - \hat{y}) \frac{\partial \hat{y}}{\partial
    w_b} = -(y - \hat{y}) \frac{\partial \hat{y}}{\partial e} \frac{\partial e}{\partial
    w_b}$.


    Again, using $\delta = -(y - \hat{y})f''(e)$ we have


    $\frac{\partial E}{\partial w_b} = \delta \frac{\partial e}{\partial w_b} = \delta
    x_j$. (2.11)


    Using the values from Eqs. (2.10) and (2.11), updating the weights for a learning
    rate of $\alpha$ will give


    $w_a = w_a - \alpha \frac{\partial E}{\partial w_a}$


    $w_b = w_b - \alpha \frac{\partial E}{\partial w_b}$, (2.12)


    where $\alpha$ is a real number specifying the modification rate of weights during
    training. We will see in the reminder of this chapter that synapse weights will
    be modified in a similar fashion to Eq. (2.12).


    ### 2.6.2 Back Propagation – from Output to Hidden Layer


    Let us now derive back-propagation equations for the ANN shown in Figure 2.6.
    The error at the output layer is defined as half of the square of the difference
    between the real and the calculated output values, namely $y$ and $\hat{y}$, respectively:


    $$J = \sum \frac{1}{2}(y - \hat{y})^2 = \sum \frac{1}{2}(y - f(f(XW^{(1)})W^{(2)})^2).$$


    To reduce the error, $J$ has to be minimized, which means that its partial derivatives
    with respect to $W^{(1)}$ and $W^{(2)}$ must be equal to 0.


    $$\frac{\partial}{\partial W} \sum \frac{1}{2}(y - \hat{y})^2 = \sum (y - f(f(XW^{(1)})W^{(2)})^2)
    \frac{\partial}{\partial W}(y - \hat{y}).$$


    Since the link weights between output and hidden layers are represented as $W^{(2)}$
    as shown in Figure 2.6, let us first calculate the partial derivative of $J$ with
    respect to $W^{(2)}$:


    $$\frac{\partial J}{\partial W^{(2)}} = \frac{\partial}{\partial W^{(2)}} \sum
    \frac{1}{2}(y - \hat{y})^2 = (y - \hat{y}) \frac{\partial}{\partial W^{(2)}} \sum
    (y - \hat{y})$$

    $$= -(y - \hat{y}) \frac{\partial}{\partial W^{(2)}} \sum \hat{y}.$$


    Since $\hat{y} = f(Z^{(3)})$, we have


    $$\frac{\partial J}{\partial W^{(2)}} = -(y - \hat{y}) \frac{\partial \sum \hat{y}}{\partial
    W^{(2)}} = -(y - \hat{y}) \frac{\partial \sum \hat{y}}{\partial Z^{(3)}} \frac{\partial
    Z^{(3)}}{\partial W^{(2)}}.$$


    Given that $Z^{(3)} = a^{(2)} \cdot W^{(2)}$, we get


    $$\frac{\partial Z^{(3)}}{\partial W^{(2)}} = a^{(2)}.$$


    For the sigmoid activation function, we have


    $$f(Z^{(3)}) = \hat{y} = \frac{1}{1 + e^{-Z^{(3)}}},$$


    which means that


    $$\frac{\partial \sum \hat{y}}{\partial Z^{(3)}} = f''(Z^{(3)}) = \frac{e^{-Z^{(3)}}}{(1
    + e^{-Z^{(3)}})^2}.$$


    We now have


    $$\frac{\partial J}{\partial W^{(2)}} = -(y - \hat{y})f''(Z^{(3)})a^{(2)}.$$


    Let us define the back-propagated error, called $\delta^{(3)}$, as follows:


    $$\delta^{(3)} = -(y - \hat{y}) \cdot f''(Z^{(3)}),$$


    where $-(y - \hat{y})$ and $f''(Z^{(3)})$ are multiplied element by element. We
    now have


    $$\frac{\partial J}{\partial W^{(2)}} = \delta^{(3)}a^{(2)}.$$


    We should note that back propagation is based on gradient descent, which is prone
    to getting stuck at local extreme points. Since $f''(Z^{(3)})$, $y$ and $\hat{y}$
    have the same dimensions (i.e. the number of samples by the number of outputs),
    $\delta^{(3)}$ will also have the same dimensions. However, to perform a matrix
    multiplication for $\delta^{(3)}$ and $a^{(2)}$, we must transpose $a^{(2)}$,
    which yields


    $$\frac{\partial J}{\partial W^{(2)}} = a^{(2)\dagger} \delta^{(3)},$$


    where $\dagger$ represents the matrix transposition operation.


    ### 2.6.3 Back Propagation – from Hidden Layer to Input


    For back propagation from hidden to input layer, we need to calculate the partial
    derivative of the error $J$ with respect to link weights of $W^{(1)}$ as shown
    in Figure 2.6. Hence,


    $$\frac{\partial J}{\partial W^{(1)}} = \frac{\partial}{\partial W^{(1)}} \sum
    \frac{1}{2}(y - \hat{y})^2 = (y - \hat{y}) \frac{\partial}{\partial W^{(1)}} \sum
    (y - \hat{y}) = -(y - \hat{y}) \frac{\partial}{\partial W^{(1)}} \sum \hat{y}.$$


    Since $\hat{y} = f(Z^{(3)})$, we have


    $$\frac{\partial J}{\partial W^{(1)}} = -(y - \hat{y}) \frac{\partial \sum \hat{y}}{\partial
    W^{(1)}} = -(y - \hat{y}) \frac{\partial \sum \hat{y}}{\partial Z^{(3)}} \frac{\partial
    Z^{(3)}}{\partial W^{(1)}}.$$


    We know that


    $$\frac{\partial Z^{(3)}}{\partial W^{(1)}} = \frac{\partial Z^{(3)}}{\partial
    a^{(2)}} \frac{\partial a^{(2)}}{\partial W^{(1)}}.$$


    We then obtain


    $$\frac{\partial J}{\partial W^{(1)}} = -(y - \hat{y}) f''(Z^{(3)}) \frac{\partial
    Z^{(3)}}{\partial a^{(2)}} \frac{\partial a^{(2)}}{\partial W^{(1)}}.$$


    Given that $Z^{(3)} = a^{(2)} \cdot W^{(2)}$, we get


    $$\frac{\partial Z^{(3)}}{\partial a^{(2)}} = W^{(2)\dagger}.$$


    Recall from Eq. (2.13) that we defined $\delta^{(3)}$ as $-(y - \hat{y}) f''(Z^{(3)})$.
    We know that


    $$\frac{\partial a^{(2)}}{\partial W^{(1)}} = \frac{\partial a^{(2)}}{\partial
    Z^{(2)}} \frac{\partial Z^{(2)}}{\partial W^{(1)}}.$$


    Therefore, we now have


    $$\frac{\partial J}{\partial W^{(1)}} = \delta^{(3)} W^{(2)\dagger} \frac{\partial
    a^{(2)}}{\partial Z^{(2)}} \frac{\partial Z^{(2)}}{\partial W^{(1)}}.$$


    Recall from Figure 2.6 that $a^{(2)} = f(Z^{(2)})$; then we have


    $$\frac{\partial a^{(2)}}{\partial Z^{(2)}} = f''(Z^{(2)}).$$


    Also recall from Figure 2.6 that $Z^{(2)} = XW^{(1)}$; we now have


    $$\frac{\partial Z^{(2)}}{\partial W^{(1)}} = X.$$


    This yields


    $$\frac{\partial J}{\partial W^{(1)}} = \delta^{(3)} W^{(2)\dagger} f''(Z^{(2)})
    X.$$


    As before, the dimensions need to be adjusted as


    $$\frac{\partial J}{\partial W^{(1)}} = X^{\dagger} \delta^{(3)} W^{(2)\dagger}
    f''(Z^{(2)}).$$


    Let us define $\delta^{(2)}$ as follows:


    $$\delta^{(2)} = \delta^{(3)} W^{(2)\dagger} \cdot f''(Z^{(2)}),$$


    where $f''(Z^{(2)})$ needs to be transposed and multiplied by $W^{(2)\dagger}$
    element by element. Then we have


    $$\frac{\partial J}{\partial W^{(1)}} = X^{\dagger} \delta^{(2)}.$$'

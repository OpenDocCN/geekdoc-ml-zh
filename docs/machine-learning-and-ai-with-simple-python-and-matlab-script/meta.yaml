    # 12


    # RNNs with Attention


    # 12.1 Introduction


    In this chapter we introduce `attention`, an enhancement mechanism for an RNN
    providing the capability that the information generated by the previous hidden
    states is *directly* available at each step [102, 103]. Recall from Chapter 10
    that in an RNN, at step $t$, only the hidden state information from the previous
    step $h_{t-1}$ can be directly used. Recursively, $h_{t-1}$ only has direct access
    to the hidden state information of $h_{t-2}$ from step $(t-2)$, which, in turn,
    has utilized the hidden state of $h_{t-3}$, and so on. But the indirect information
    from distant past hidden states only has a weak influence on the current hidden
    state, especially as the distance to a past hidden state grows. On the other hand,
    in an RNN with attention, denoted as RNN-Att, all hidden states generated at the
    previous steps (i.e. $h_{t-1}, h_{t-2}, \cdots h_{t-k}$ for a sequence of $(k+1)$
    consecutive inputs) are directly available when computing the hidden state $h_t$
    and the output prediction $\hat{y}_t$ at step $t$. The main purpose of utilizing
    all previous hidden states at every step is to explore a possible relationship
    between a current input and the previous hidden states generated by the inputs
    applied earlier. The attention mechanism is especially important when processing
    input sequences where the relationship with previously used inputs (typically
    more than one previous input) has a significant impact on how to process the current
    input. Typical examples of such systems are machine translators, which convert
    sentences written (or spoken) in one natural language to another. We will introduce
    a simple machine translation example using an RNN-Att in Chapter 13.


    # 12.2 One-to-One RNN Cell with Attention


    A one-to-one single cell RNN with attention is shown in Figure 12.1, which consists
    of three functional parts, namely an `encoder`, `attention` and `decoder`. Similar
    to the RNN presented in Chapter 10, the encoder unit of an RNN-Att accepts an
    input vector $x_t$ at step $t$, which is scaled by a weight matrix $U$ and combined
    with both a bias vector $b$ and the previous hidden state information $h_{t-1}$
    via a weight matrix $W$. After applying an activation function, which is selected
    as `tanh` in Figure 12.1, hidden state $h_t$ is generated as the output of the
    encoder.

    In the attention unit of an RNN-Att, current hidden state information $h_t$ from
    the encoder is individually multiplied with each of the previous hidden states
    generated before this step (i.e. $\forall h_{\delta}$ where $\delta < t$), and
    the results are individually fed into a `softmax` unit. These inputs are called
    `attention coefficients` as shown in Figure 12.1. The outputs of the `softmax`
    unit are called `attention weights`. Each output of `softmax` is then individually
    multiplied by'
- md: '## 12.3 Forward and Back Propagation


    Let us now explore the forward and back propagation operations in an RNN-Att.
    In Figure 12.2, four steps of a one-to-one single RNN-Att cell are presented,
    where input $X_t$ considers all hidden states before it (i.e. $h_{t-3}, \cdots,
    h_{t-1}$) for computations in the attention unit. We can see in Figure 12.2 that
    when the input vector of $x_t$ is applied (i.e. the rightmost step), the attention
    unit accepts hidden states of $h_{t-3}, h_{t-2}, h_{t-1}$ and $h_t$ as it computes
    its context vector.


    For the general case, when an input sequence of single characters $x_1, x_2, \cdots,
    x_T$ is applied to the example RNN-Att shown in Figure 12.2, the hidden state
    of $h_t$ at step $t$ is computed as


    $h_t = \Theta_h(U \cdot X_t + W \cdot h_{t-1} + b)$, (12.1)


    where the activation function $\Theta_h$ is typically selected as tanh. The inputs
    for the softmax unit in attention are called attention scores. The number of attention
    scores grow as more inputs are processed by an RNN-Att. Therefore, at step $t$,
    there are $t$ inputs for the softmax unit, of which the $i^{th}$ input is defined
    as


    $A_{t,i} = h_t^\dagger \cdot h_i$


    where $\dagger$ is the matrix transpose operation and $(i = 1, \cdots t)$. For
    example, at $t = 1$, the $softmax$ unit has only one input:


    $$\mathcal{A}_{1,1} = h_1^{\dagger} \cdot h_1.$$


    However, at step $t = 2$, hidden state $h_2$ is combined with both $h_1$ and $h_2$
    before being fed into the $softmax$ unit:


    $$\mathcal{A}_{2,1} = h_2^{\dagger} \cdot h_1 \quad \mathcal{A}_{2,2} = h_2^{\dagger}
    \cdot h_2.$$


    Using Eq. (10.1) in Chapter 10, the output of the $softmax$ unit in attention
    is


    $$softmax(\mathcal{A}_{t,i}) = \frac{e^{\mathcal{A}_{t,i}}}{\sum_{j=1}^{t} e^{\mathcal{A}_{t,j}}},
    \tag{12.2}$$


    where $t$ is the current step. In attention, the outputs of the $softmax$ unit
    are referred to as $attention$ $weights$, which are probabilities summing to 1.
    At the output of the $softmax$, the $i^{th}$ attention weight is multiplied by
    the hidden state of $h_i$. Then all of them are summed (row-wise if multiple cells
    are present) to form a $context$ $vector$, denoted as $\mathcal{Z}_t$ at step
    $t$:


    $$\mathcal{Z}_t = \sum_{k=1}^{t} softmax(\mathcal{A}_{t,k}) \cdot h_k. \tag{12.3}$$


    We can see from Eq. (12.3) that context vector $\mathcal{Z}_t$ reflects the impact
    of previous hidden states on a current hidden state value before being sent into
    the decoder, as shown in Figure 12.2. In the decoder, the output before the $softmax$,
    $\Omega_t$, is


    $$\Omega_t = V \cdot \mathcal{Z}_t + c. \tag{12.4}$$


    The output of the $softmax$ unit in decoder, $\hat{y}_t$, for each input, is


    $$softmax(\Omega_t) = \hat{y}_t = \frac{e^{\Omega_t}}{\sum_{k=1}^{|I|} e^{\Omega_{t,k}}}
    \text{ for } k = 1, \dots, |I|. \tag{12.5}$$


    Finally, the cross-entropy loss for prediction $\hat{y}_t$ at step $t$ is defined
    as


    $$L_t = -y_t^o \ln(\hat{y}_t). \tag{12.6}$$


    Once a forward propagation operation is performed, to reduce loss $L$, RNN-Att
    parameters such as $U, W, V, b$ and $c$ must be updated using the partial derivatives
    of $L$ with respect to these parameters. This update, which is conducted after
    each forward and back propagation during training, ultimately minimizes $L$ (or
    reduces it as much as it can), providing a more powerful prediction mechanism.
    Steps of obtaining partial derivative formulas can be found in Appendix E. We
    strongly recommend that the reader goes over these steps to fully understand the
    training process, which resides at the heart of making successful predictions
    for all neural networks. The partial derivatives of loss with respect to RNN-Att
    parameters are as follows:


    $$\frac{\partial L_t}{\partial \hat{y}_t} \frac{\partial \hat{y}_t}{\partial \Omega_t}
    = (\hat{y}_t - y_t^o) \tag{12.7}$$


    $$\frac{\partial L}{\partial V} = \sum_{t=1}^{T} (\hat{y}_t - y_t^o) \cdot h_t^{\dagger}
    \tag{12.8}$$


    $$\frac{\partial L}{\partial c} = \sum_{t=1}^{T} (\hat{y}_t - y_t^o)$$


    $$\frac{\partial L}{\partial W} = \sum_{t=1}^{T} (\hat{y}_t - y_t^o) V^\dagger
    \left( \sum_{m=1}^{t} \sum_{k=1}^{m} A_{t,m} \prod_{j=k}^{m-1} W^\dagger (1 -
    h_{j+1}^2) ((1 - h_k^2) h_{k-1}) \right)$$


    $$\frac{\partial L}{\partial U} = \sum_{t=1}^{T} (\hat{y}_t - y_t^o) V^\dagger
    \left( \sum_{m=1}^{t} \sum_{k=1}^{m} A_{t,m} \prod_{j=k}^{m-1} W^\dagger (1 -
    h_{j+1}^2) ((1 - h_k^2) x_k) \right)$$


    $$\frac{\partial L}{\partial b} = \sum_{t=1}^{T} (\hat{y}_t - y_t^o) V^\dagger
    \left( \sum_{m=1}^{t} \sum_{k=1}^{m} A_{t,m} \prod_{j=k}^{m-1} W^\dagger (1 -
    h_{j+1}^2) ((1 - h_k^2)) \right).$$


    Using the above partial derivatives, the parameters are updated by subtracting
    the gradient from the current parameter value scaled by a learning rate of $\eta$:


    $$V_{new} = V - \eta \frac{\partial L}{\partial V}$$


    $$c_{new} = c - \eta \frac{\partial L}{\partial c}$$


    $$W_{new} = W - \eta \frac{\partial L}{\partial W}$$


    $$U_{new} = U - \eta \frac{\partial L}{\partial U}$$


    $$b_{new} = b - \eta \frac{\partial L}{\partial b},$$


    where subscript $new$ indicates the updated value of a parameter on the left-hand
    side of each equation.


    ## 12.4 A Numerical Example


    We will use the same simplistic example presented in Chapter 10, where a user
    applies a single character input using an alphabet of $I = \{h, e, l, o\}$, engaging
    one-hot encoding for inputs:


    $$c_i^o = \begin{cases} 1 & \text{if } I_i = c, \\ 0 & \text{otherwise.} \end{cases}$$


    Table 12.1 shows all single character inputs and the expected outputs together
    with their one-hot-encoded representations for each input in this example RNN-Att.


    We will first examine the forward propagation process for four steps. Suppose
    the network parameters for this simple RNN-Att are initialized randomly as follows:


    $$U = [0.144 \ -0.232 \ -0.669 \ 1.159], \ W = [-0.587], \ b = [0]$$


    $$V = \begin{bmatrix} -0.225 \ -0.305 \ 0.491 \ 0.277 \end{bmatrix}, \ c = \begin{bmatrix}
    0 \ 0 \ 0 \ 0 \end{bmatrix}.$$


    Table 12.1 Previous and current inputs and expected outputs with their one-hot
    forms for the one-on-one RNN-Att example († denotes the matrix transpose operation).


    | Previous character | Input character | One-hot encoding | Target output | One-hot
    encoding |

    | :--- | :--- | :--- | :--- | :--- |

    | - | h | $x_1 = [1\ 0\ 0\ 0]^\dagger$ | e | $y_1 = [0\ 1\ 0\ 0]^\dagger$ |

    | h | e | $x_2 = [0\ 1\ 0\ 0]^\dagger$ | l | $y_2 = [0\ 0\ 1\ 0]^\dagger$ |

    | e | l | $x_3 = [0\ 0\ 1\ 0]^\dagger$ | l | $y_3 = [0\ 0\ 1\ 0]^\dagger$ |

    | l | l | $x_4 = [0\ 0\ 1\ 0]^\dagger$ | o | $y_4 = [0\ 0\ 0\ 1]^\dagger$ |


    Since all previous hidden state information are required for the attention mechanism,
    let us first compute $h_1, \cdots, h_4$ at steps $t = 1, \cdots, 4$ as follows:



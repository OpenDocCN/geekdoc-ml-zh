    \ 3.6 说明了自行车租赁示例的人工神经网络层，为简化起见，图中省略了层之间的大部分连接。训练过程与第 3.5 节中睡眠-学习示例描述的类似，每个周期包括一次前向传播以进行预测，然后通过反向传播调整人工神经网络的权重和偏置。这个简单示例中的周期数保持为\
    \ 2000。现实生活中的人工神经网络训练通常使用多达数百万个数据样本和数万个周期。\n\n### 3.6.1 使用人工神经网络进行自行车租赁预测的 Python\
    \ 脚本\n\n下面给出了实现图 3.6 中人工神经网络的示例 Python 脚本。在第 32-125 行，评估用户选择是训练新的人工神经网络还是加载现有的。如果用户输入\

    ## 10.5.1 带有嵌入层的正向和反向传播


    现在让我们研究在正向和反向传播过程中实现嵌入层对RNN操作的影响。正向传播的第一步是将 $E$ 矩阵应用于独热编码的输入元素：


    $x_t = E \cdot x_t^o$。 (10.20)


    在独热编码输入 $x_t^o$ 通过乘以嵌入权重矩阵 $E$ 转换为稠密向量 $x_t$ 之后，第10.2.2节中公式(10.3)–(10.7)描述的正向传播过程对于带有嵌入层的RNN仍然有效。类似地，反向传播操作以及公式(10.8)–(10.13)给出的
    $L$ 对RNN权重矩阵的偏导数在带有嵌入层时也是相同的。然而，由于我们现在有一个额外的参数——权重矩阵 $E$，我们需要计算 $L$ 对 $E$ 的偏导数，如下所示（获得此公式的详细步骤在附录D中给出）：


    $\frac{\partial L}{\partial E} = \sum_{t=1}^{S} \left( \sum_{k=1}^{t} (\hat{y}_t
    - y_t^o) V^\dagger \prod_{j=k}^{t-1} \left( W^\dagger (1 - h_{j+1}^2) \right)
    (1 - h_k^2) U x_k^o \right)$。 (10.21)



    h_3}{\partial h_2} \frac{\partial h_2}{\partial x_2} \frac{\partial x_2}{\partial
    E} + \frac{\partial L_3}{\partial \hat{y}_3} \frac{\partial \hat{y}_3}{\partial
    h_3} \frac{\partial h_3}{\partial x_3} \frac{\partial x_3}{\partial E}$$


    $$\frac{\partial L_4}{\partial E} = \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial
    \hat{y}_4}{\partial h_4} \frac{\partial h_4}{\partial h_3} \frac{\partial h_3}{\partial
    h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial h_1}{\partial x_1} \frac{\partial
    x_1}{\partial E} + \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial \hat{y}_4}{\partial
    h_4} \frac{\partial h_4}{\partial h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial
    h_2}{\partial x_2} \frac{\partial x_2}{\partial E} + \frac{\partial L_4}{\partial
    \hat{y}_4} \frac{\partial \hat{y}_4}{\partial h_4} \frac{\partial h_4}{\partial
    h_3} \frac{\partial h_3}{\partial x_3} \frac{\partial x_3}{\partial E} + \frac{\partial
    L_4}{\partial \hat{y}_4} \frac{\partial \hat{y}_4}{\partial h_4} \frac{\partial
    h_4}{\partial x_4} \frac{\partial x_4}{\partial E}.$$


    Let us now expand $\frac{\partial h_i}{\partial h_k}$ as follows:


    $$\frac{\partial L_1}{\partial E} = \frac{\partial L_1}{\partial \hat{y}_1} \frac{\partial
    \hat{y}_1}{\partial h_1} \frac{\partial h_1}{\partial x_1} \frac{\partial x_1}{\partial
    E}$$


    $$\frac{\partial L_2}{\partial E} = \frac{\partial L_2}{\partial \hat{y}_2} \frac{\partial
    \hat{y}_2}{\partial h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial h_1}{\partial
    x_1} \frac{\partial x_1}{\partial E} + \frac{\partial L_2}{\partial \hat{y}_2}
    \frac{\partial \hat{y}_2}{\partial h_2} \frac{\partial h_2}{\partial x_2} \frac{\partial
    x_2}{\partial E}$$


    $$\frac{\partial L_3}{\partial E} = \frac{\partial L_3}{\partial \hat{y}_3} \frac{\partial
    \hat{y}_3}{\partial h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial h_2}{\partial
    h_1} \frac{\partial h_1}{\partial x_1} \frac{\partial x_1}{\partial E} + \frac{\partial
    L_3}{\partial \hat{y}_3} \frac{\partial \hat{y}_3}{\partial h_3} \frac{\partial
    h_3}{\partial h_2} \frac{\partial h_2}{\partial x_2} \frac{\partial x_2}{\partial
    E} + \frac{\partial L_3}{\partial \hat{y}_3} \frac{\partial \hat{y}_3}{\partial
    h_3} \frac{\partial h_3}{\partial x_3} \frac{\partial x_3}{\partial E}$$


    $$\frac{\partial L_4}{\partial E} = \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial
    \hat{y}_4}{\partial h_4} \frac{\partial h_4}{\partial h_3} \frac{\partial h_3}{\partial
    h_2} \frac{\partial h_2}{\partial h_1} \frac{\partial h_1}{\partial x_1} \frac{\partial
    x_1}{\partial E} + \frac{\partial L_4}{\partial \hat{y}_4} \frac{\partial \hat{y}_4}{\partial
    h_4} \frac{\partial h_4}{\partial h_3} \frac{\partial h_3}{\partial h_2} \frac{\partial
    h_2}{\partial x_2} \frac{\partial x_2}{\partial E} + \frac{\partial L_4}{\partial
    \hat{y}_4} \frac{\partial \hat{y}_4}{\partial h_4} \frac{\partial h_4}{\partial
    h_3} \frac{\partial h_3}{\partial x_3} \frac{\partial x_3}{\partial E} + \frac{\partial
    L_4}{\partial \hat{y}_4} \frac{\partial \hat{y}_4}{\partial h_4} \frac{\partial
    h_4}{\partial x_4} \frac{\partial x_4}{\partial E}.$$


    For step $t$, we then have the following:


    $$\frac{\partial L_t}{\partial E} = \sum_{k=1}^{t} \frac{\partial L_t}{\partial
    \hat{y}_t} \frac{\partial \hat{y}_t}{\partial h_t} \prod_{j=k}^{t-1} \left( \frac{\partial
    h_{j+1}}{\partial h_j} \right) \frac{\partial h_k}{\partial x_k} \frac{\partial
    x_k}{\partial E}.$$


    For $S$ steps we have


    $$\frac{\partial L}{\partial E} = \sum_{t=1}^{T} \left( \sum_{k=1}^{t} \frac{\partial
    L_t}{\partial \hat{y}_t} \frac{\partial \hat{y}_t}{\partial h_t} \prod_{j=k}^{t-1}
    \left( \frac{\partial h_{j+1}}{\partial h_j} \right) \frac{\partial h_k}{\partial
    x_k} \frac{\partial x_k}{\partial E} \right). \quad (D.25)$$


    Recall that we have the individual partial derivatives from above as


    $$\frac{\partial L_t}{\partial \hat{y}_t} = (\hat{y}_t - y_t^o)$$


    $$\frac{\partial \hat{y}_t}{\partial h_t} = V^\dagger$$


    $$\frac{\partial h_{j+1}}{\partial h_j} = W^\dagger (1 - h_{j+1}^2)$$


    $$\frac{\partial h_k}{\partial x_k} = (1 - h_k^2) U$$


    $$\frac{\partial x_k}{\partial E} = x_k^o.$$


    By substituting them into Eq. (D.25), we obtain


    $$\frac{\partial L}{\partial E} = \sum_{t=1}^{T} \left( \sum_{k=1}^{t} (\hat{y}_t
    - y_t^o) V^\dagger \prod_{j=k}^{t-1} \left( W^\dagger (1 - h_{j+1}^2) \right)
    (1 - h_k^2) U x_k^o \right). \quad (D.26)$$


    # Appendix E


    ## Back Propagation Through Time in an RNN with Attention


    ### E.1 Back Propagation in an RNN-Att


    In this appendix, for an RNN utilizing an attention mechanism, we present computing
    the partial derivatives of loss with respect to parameters of $h$, $A$, $W$, $Z$,
    $\Omega$, $V$, $c$ and $b$ during a back propagation through time used in RNN-Att
    in Chapter 12.


    $h_t = \Theta_h(W h_{t-1} + U x_t + b)$ (E.1)


    $A_{t,i} = h_i \cdot h_t$ for $i = 1, \dots t$ (E.2)


    $softmax(A_{t,i}) = \frac{e^{A_{t,i}}}{\sum_{k=0}^t e^{A_{t,k}}}$ for $i = 1,
    \dots t$ (E.3)


    $Z_t = \sum_{k=0}^t softmax(A_{t,k}) \cdot h_k$ (E.4)


    $\Omega_t = V \cdot Z_t + c$ (E.5)


    $\hat{y}_t = \Theta_y(\Omega_t)$ (E.6)


    $L_t = -\sum_{i=1}^{|I|} y_{t(i)}^o \ ln(\hat{y}_{t(i)}),$ (E.7)


    where $\Theta_h$ and $\Theta_y$ represent $tanh$ in Eq. (E.1) and $softmax$ in
    Eq. (E.6), respectively. The partial derivative of $\hat{y}_t$ with respect to
    $\Omega_t$ presented in Eq. (D.5) in Appendix D is also valid for an RNN-Att as
    follows:


    $\frac{\partial L_t}{\partial \Omega_t} = \hat{y}_t - y_t^o.$ (E.8)


    Since weight matrix V stays consistent during time steps, we can perform differentiation
    at each time step and then aggregate the results. From Eqs. (E.8), (E.4) and (E.5),
    we have


    $\frac{\partial L}{\partial V} = \sum_{t=1}^T \frac{\partial L_t}{\partial V}
    = \sum_{t=1}^T \frac{\partial L_t}{\partial \hat{y}_t} \frac{\partial \hat{y}_t}{\partial
    \Omega_t} \frac{\partial \Omega_t}{\partial V} = \sum_{t=1}^T (\hat{y}_t - y_t^o)
    \cdot h_t^\top.$ (E.9)


    For $c$, from Eqs. (E.8) and (E.5), we have


    $\frac{\partial L}{\partial c} = \sum_{t=1}^T \frac{\partial L_t}{\partial c}
    = \sum_{t=1}^T \frac{\partial L_t}{\partial \hat{y}_t} \frac{\partial \hat{y}_t}{\partial
    \Omega_t} \frac{\partial \Omega_t}{\partial c} = \sum_{t=1}^T (\hat{y}_t - y_t^o).$

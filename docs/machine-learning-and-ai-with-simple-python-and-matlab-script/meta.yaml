    \quad 0 \quad 1 ] \cdot \begin{bmatrix} 5 \ 36 \ 21 \ 21 \ 36 \ 4 \ 8 \ 1 \ 1
    \ 20 \end{bmatrix} = 5 + 21 + 36 + 20 = 82.$$'
